 action_should_pay_ransom_desc: "Seu [actor.Custom2('RelationToMe', secondary_recipient)], [secondary_recipient.Custom('GetPrimaryTitleTierIcon')][secondary_recipient.GetShortUIName] [secondary_recipient.Custom2('GetSuccessionLinePositionCurrentSituation', actor)], está em [secondary_recipient.Custom('PrisonTypeModifier')] e pode adoecer ou até ser [Concept( 'executed', 'executad' )|E][secondary_recipient.Custom('ES_OA')] se permanecer em [prison|lE]. Você deveria pagar o resgate dele se quiser proteger sua [health|lE].\n\nO resgate dele é @gold_icon!#V [secondary_recipient.MakeScope.ScriptValue('ransom_cost_value')|0]#! de [gold|lE].$action_should_pay_ransom_HELP$"
 action_should_pay_ransom_combined_group_description: "Personagens importantes para você estáo [Concept( 'imprisoned', 'encarcerados' )|E], e você deveria pagar seus resgates se quiser proteger sua [health|lE].$action_vassal_ransom_gives_hook_HELP$"
 action_should_pay_ransom_label: "@gold_icon! Você deve pagar o Resgate de seu [actor.Custom2('RelationToMe', secondary_recipient)] [secondary_recipient.Custom('GetPrimaryTitleTierIcon')][secondary_recipient.GetShortUINameNoTooltip] [secondary_recipient.Custom2('GetSuccessionLinePositionCurrentSituation', actor)], @gold_icon!#V [secondary_recipient.MakeScope.ScriptValue('ransom_cost_value')|0]#!"
 action_should_pay_ransom_combined_label: "Seu [actor.Custom2('RelationToMe', secondary_recipient)], [secondary_recipient.Custom('GetPrimaryTitleTierIcon')][secondary_recipient.GetShortUINameNoTooltip] [secondary_recipient.Custom2('GetSuccessionLinePositionCurrentSituation', actor)], @gold_icon!#V [secondary_recipient.MakeScope.ScriptValue('ransom_cost_value')|0]#!"
 action_should_pay_ransom_click: "#I Clique para Pagar o Resgate#!"
 action_should_pay_ransom_HELP: "\n\n#help Deberías asegurarte de que tus [heirs|lE] estén sanos y salvos, especialmente tu [player_heir|lE].\n\nBueno, a menos que #EMP dé la casualidad#! de que sus [skills|lE] sean escasas y uno de sus hermanos pequeños sea mejor. En tal caso, su inevitable muerte en una mazmorra extranjera no es más que una horrorosa tragedia…#!"
