 action_not_rightful_liege_desc: "Você não é o [rightful_liege|lE] de seu/da sua [actor.Custom2('RelationToMe', recipient)] [recipient.GetShortUIName].\n\nVocê deve verificar se pode [create|lE] ou [usurp|lE] reivindicar um título que faria de você o seu [liege|lE] [de_jure|lE]; isso melhorará a [opinion|lE] dessa pessoa sobre você, além de aumentar os [taxes|lE] e [levies|lE] que você recebe de [recipient.Custom('ES_ElElla')].\n\nSe isso não for possível, talvez queira considerar [Concept( 'transferring', 'transferir' )|E] essa pessoa para outro de seus vassalos, especialmente se esse vassalo for o seu [rightful_liege|lE]."
 action_not_rightful_liege_combined_group_description: "Você não é o [rightful_liege|lE] de vários de seus vassalos.\n\nVerifique se você pode [create|lE] ou [usurp|lE] títulos que farão de você o seu [liege|lE] [de_jure|lE]; isso melhorará a [opinion|lE] deles sobre você, além de aumentar os [taxes|lE] e [levies|lE] que você recebe deles.\n\nSe isso não for possível, talvez valha considerar [Concept( 'transferring', 'transferírselos' )|E] para outro de seus vassalos, especialmente se esse vassalo fosse o seu [rightful_liege|lE]."
