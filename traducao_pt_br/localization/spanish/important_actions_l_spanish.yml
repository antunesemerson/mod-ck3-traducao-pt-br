 action_send_child_to_university_label: "@child_icon! Enviar Criança para a Universidade"
 action_send_child_to_university_click: "#I Clique para enviar sua Criança para a Universidade#!"
 action_send_child_to_university_desc: "Puedes enviar a tus hijos a la universidad\n\n#help ¡Existe en tu [realm|El] un [building|lE] de tipo [Concept('holy_site', 'sagrado')|E] como una [GetBuilding('holy_site_cathedral_01').GetName|l], un [building|El] de tipo [GetBuilding('generic_university').GetName|l] o la [realm_capital|El] de [GetTitleByKey('h_china').GetName]! Mandar allí a un hijo para que se eduque es beneficioso porque mejorará sus [Concept('education_trait', 'rasgos educativos')|E] cuando alcance la [Concept('adult', 'edad adulta')|E].\n\nNo obstante, puede que ya hayas pensado en un [guardian|lE] específico.#!"
