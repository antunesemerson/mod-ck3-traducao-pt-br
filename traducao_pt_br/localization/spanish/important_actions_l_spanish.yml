 action_mega_duke_penalty_label: "@titles_icon! [counties|lE] Demais"
 action_mega_duke_penalty_desc: "Tu señorío es [Concept( 'realm_size', 'demasiado grande' )|E] para un título de [Concept( 'duke', 'ducado' )|E], por lo que tendrás una [megaduke_penalty|lE].\n\n#help Los ducados no pueden ser demasiado grandes, ni tener demasiados [counties|lE] en su [realm|lE]. Tus [income|lE] se reducirán mientras tengas un exceso de [counties|lE]. Deberías crear un título de [kingdom|lE].#!"
 action_mega_duke_penalty_click: ""
 action_in_debt: "Em dívida"
 action_in_debt_label: "@debt_icon! Você está em Dívida"
 action_in_debt_desc: "¡Posees menos de #V 0#! [gold|lE] [gold_i|E] y, por lo tanto, tienes [Concept( 'debt', 'deudas' )|E]!\n\nTener deudas conlleva los siguientes efectos:\n$BULLET_WITH_TAB$No puedes declarar la [war|lE]\n$BULLET_WITH_TAB$No puedes reforzar tus [men_at_arms|lE] que necesiten [gold|lE] [gold_i|E]\n$BULLET_WITH_TAB$La [county_corruption|lE] se propaga en tu [domain|lE]\n$BULLET_WITH_TAB$Es más probable que los [vassals|lE] se unan a [factions|lE]\n\nCuanto mayor sea tu deuda, más duras serán las penalizaciones. Tu nivel actual de deuda tiene los siguientes efectos extra:\n\n[GetPlayer.GetDebtModifierDescription]\n\n#help Si no ganas oro todos los meses, plantéate reducir gastos, como por ejemplo:\n$BULLET_WITH_TAB$Licenciar a tus [armies|lE]\n$BULLET_WITH_TAB$Reducir el tamaño de tus [regiments|lE] de [men_at_arms|lE] o destruirlos\n$BULLET_WITH_TAB$Aumentar el [control|lE] utilizando a tu [marshal|lE]\n$BULLET_WITH_TAB$Revocar [court_positions|lE]#!"
 action_in_debt_click: ""
 action_in_treasury_debt: "$action_in_debt$"
 action_in_treasury_debt_label: "$action_in_debt_label$"
 action_in_treasury_debt_desc: "Você possui menos de #V 0#! [treasury|El] [treasury_i|E] e, portanto, está em [treasury_debt|El]!\n\nEstar em dívida tem os seguintes efeitos:\n$BULLET_WITH_TAB$Você não pode declarar a [war|lE]\n$BULLET_WITH_TAB$Você não pode reforçar seus [men_at_arms|lE] que exijam [treasury|El] [treasury_i|E]\n$BULLET_WITH_TAB$A [county_corruption|lE] se espalha em seu [domain|lE]\n$BULLET_WITH_TAB$É mais provável que os [vassals|lE] se juntem a [factions|lE]\n\nQuanto mais profunda for sua dívida, mais severas serão as penalidades que você enfrentará. Seu nível atual de dívida tem os seguintes efeitos adicionais:\n\n[GetPlayer.GetTreasuryDebtModifierDescription]\n\n#help Se você não ganha tesouro todos os meses, considere reduzir suas despesas, por exemplo:\n$BULLET_WITH_TAB$Dissolver seus [armies|lE]\n$BULLET_WITH_TAB$Reduzir o tamanho dos seus [regiments|lE] de [men_at_arms|lE] ou destruí-los\n$BULLET_WITH_TAB$Aumentar o [control|lE] usando seu [marshal|lE]\n$BULLET_WITH_TAB$Revogar [court_positions|lE]#!"
 action_in_treasury_debt_click: "$action_in_debt_click$"
