 action_can_demand_payment_combined_group_name: "$action_can_demand_payment_combined_group_label$"
 action_can_demand_payment_desc: "Você pode usar o [hook|lE] que possui sobre [recipient.GetUIName] para exigir que lhe pague em [gold|lE].\n\n[recipient.GetSheHe|U] tem agora mesmo #V [recipient.MakeScope.ScriptValue('golden_obligation_value_check_current_situation')|0]/[recipient.MakeScope.ScriptValue('golden_obligation_value')|0]#! @gold_icon! do ouro que você pode exigir.$action_can_demand_payment_HELP$"
 action_can_demand_payment_combined_group_description: "Você pode gastar [hooks|lE] que possui para exigir pagamentos em [gold|lE].$action_can_demand_payment_HELP$"
 action_can_demand_payment_label: "@cs_weak_hook_icon! Você pode Exigir Pagamento de seu [actor.Custom2('RelationToMe', recipient)] [recipient.GetShortUINameNoTooltip], @gold_icon!#V [recipient.MakeScope.ScriptValue('golden_obligation_value_check_current_situation')|0]/[recipient.MakeScope.ScriptValue('golden_obligation_value')|0]#!"
 action_can_demand_payment_combined_label: "Seu [actor.Custom2('RelationToMe', recipient)], [recipient.GetUINameNoTooltip], @gold_icon!#V [recipient.MakeScope.ScriptValue('golden_obligation_value_check_current_situation')|0]/[recipient.MakeScope.ScriptValue('golden_obligation_value')|0]#!"
 action_can_demand_payment_click: "#I Clique para Exigir Pagamento#!"
 action_can_demand_payment_HELP: "\n\n#help Puedes hacer esto porque tienes el [perk|lE] [GetPerk('golden_obligations_perk').GetName(GetPlayer)]\n\nAl exigir un pago a alguien, gastarás el [hook|lE] que tengas sobre esa persona, ¡así que asegúrate bien de lo que haces!#!"
 action_hook_expiring: "@cs_weak_hook_icon! Gancho expirando em breve"
 action_hook_expiring_combined_group_label: "@cs_weak_hook_icon! Ganchos expirando em breve"
 action_hook_expiring_combined_group_name: "$action_hook_expiring_combined_group_label$"
 action_hook_expiring_desc: "Você deve gastar em breve o [hook|lE] que tem sobre seu [actor.Custom2('RelationToMe', recipient)] [recipient.GetUIName], ou ele expirará em [actor.GetHookOn( recipient.Self ).GetExpirationDate.GetString]."
 action_hook_expiring_combined_group_description: "Você deve gastar os [hooks|lE] que estão expirando, ou eles simplesmente desaparecerão"
 action_hook_expiring_label: "@cs_weak_hook_icon! Seu [hook|lE] sobre seu [actor.Custom2('RelationToMe', recipient)] [recipient.GetShortUINameNoTooltip] logo expirará"
 action_hook_expiring_combined_label: "Seu [actor.Custom2('RelationToMe', recipient)], [recipient.GetUINameNoTooltip]"
 action_hook_expiring_click: "#I Clique para abrir a Visão do Personagem#!"
 action_can_use_hook_to_change_contract: "@cs_weak_hook_icon! Você pode Modificar um Contrato"
 action_can_use_hook_to_change_contract_combined_group_label: "@cs_weak_hook_icon! Você pode Modificar Contratos"
 action_can_use_hook_to_change_contract_combined_group_name: "$action_can_use_hook_to_change_contract_combined_group_label$"
 action_can_use_hook_to_change_contract_desc: "Como você tem um [hook|lE] sobre seu [vassal|lE] [GetGovernment( 'feudal_government' ).GetName|l] [recipient.GetUIName], pode gastá-lo para modificar seu [vassal_contract|lE].\n\n#help Aumentar as [obligations|lE] dos [vassals|lE] em relação a você é um dos usos mais valiosos de um [hook|lE].\n\nNormalmente, propor uma alteração injusta em um [vassal_contract|lE] incorreria em [tyranny|lE], mas isso pode ser evitado gastando um [hook|lE]. Você só pode propor uma alteração injusta; se propuser mais, ainda assim receberá [tyranny|lE].\n\nLembre-se de #high marcar a caixa 'Usar um gancho'#! ao modificar o [vassal_contract|lE]!#!"
 action_can_use_hook_to_change_contract_combined_group_description: "Como você tem [hooks|lE] sobre seus [vassals|lE] de governo [GetGovernment( 'feudal_government' ).GetName|l], pode gastá-los para modificar seus [vassal_contracts|lE].\n\n#help Aumentar as [obligations|lE] dos [vassals|lE] para com você é um dos usos mais valiosos de um [hook|lE].\n\nNormalmente, propor uma alteração injusta de [vassal_contract|lE] acarretaria [tyranny|lE], mas isso pode ser evitado ao gastar um [hook|lE]. Você só pode propor uma alteração injusta; quaisquer outras ainda lhe concederão [tyranny|lE].\n\nLembre-se de #high marcar a caixa 'Usar um anzol'#! ao modificar o [vassal_contract|lE]!#!"
 action_can_use_hook_to_change_contract_label: "@cs_weak_hook_icon! Você pode mudar o contrato do seu [actor.Custom2('RelationToMe', recipient)] [recipient.GetShortUINameNoTooltip]"
 action_can_use_hook_to_change_contract_combined_label: "Seu [actor.Custom2('RelationToMe', recipient)], [recipient.GetUINameNoTooltip]"
 action_can_use_hook_to_change_contract_click: "#I Clique para Modificar o Contrato#!"
 action_can_ask_hof_for_money: "@gold_icon!Você pode pedir Ouro ao seu Chefe de Fé"
 action_can_ask_hof_for_money_label: "$action_can_ask_hof_for_money$"
 action_can_ask_hof_for_money_desc: "Seu [head_of_faith|lE], [recipient.GetUIName], aceitaria um pedido de [gold|lE].\n\n#help Se você está com pouco [gold|lE], esta é uma forma de gastar sua [piety|lE] para ampliar seu tesouro!#!"
 action_can_ask_hof_for_money_click: "#I Clique para $hof_ask_for_gold_interaction$#!"
 action_title_election: "@law_icon! Eleição Ativa em [landed_title.GetBaseNameNoTooltip]"
 action_title_election_combined_group_label: "Eleições Ativas"
 action_title_election_combined_group_name: "Eleições Ativas podem ser Visualizadas"
 action_title_election_desc: "Hay una elección activa en [landed_title.GetName] [landed_title.Custom('GetTierIcon')], un [title|lE] gobernado por [landed_title.GetHolder.GetShortUIName]. En este momento, [landed_title.GetHeir.Custom('ES_ElLa')] candidat[landed_title.GetHeir.Custom('ES_OA')] en cabeza es [landed_title.GetHeir.GetUIName].\n\n#help Si eres [elector|lE], merece la pena seguir las elecciones activas, incluso si ya has votado. ¡Recuerda que puedes cambiar tu voto en cualquier momento!\n\nY aunque no seas [elector|lE], es buena idea estar al tanto de las elecciones. Después de todo, puede pasar cualquier cosa… ¡Hasta podrías ser #emp tú#! el candidato principal!#!"
 action_title_election_combined_group_description: "Há eleições ativas em seu domínio.\n\n#help Se você é [elector|lE] , vale a pena acompanhar as eleições ativas, mesmo que já tenha votado. Lembre-se de que você pode mudar seu voto a qualquer momento!\n\nE mesmo que você não seja [elector|lE] , é bom ficar de olho nas eleições. Afinal, qualquer coisa pode acontecer… Você pode até ser #emp tú#! o principal candidato!#!"
 action_title_election_label: "@law_icon! Eleição Ativa em [landed_title.GetBaseNameNoTooltip]"
 action_title_election_combined_label: "[landed_title.Custom('GetTierIcon')] [landed_title.GetNameNoTooltip|U]"
 action_title_election_click: "#I Clique para ver a Eleição#!"
 action_grant_vassal_to_rightful_liege: "@vassal_icon! Pode conceder Vassalo ao Suserano Legítimo"
 action_grant_vassal_to_rightful_liege_combined_group_label: "@vassal_icon! Pode conceder Vassalos ao Suserano Legítimo"
 action_grant_vassal_to_rightful_liege_combined_group_name: "@vassal_icon! Vassalos podem ser concedidos a seu Suserano Legítimo"
 action_grant_vassal_to_rightful_liege_desc: "Ao transferir [secondary_actor.GetNameNoTooltip] para [recipient.GetNameNoTooltip], você se livrará da penalidade de [rightful_liege|lE].$action_grant_vassal_to_rightful_liege_HELP$"
 action_grant_vassal_to_rightful_liege_combined_group_description: "Você pode transferir um [vassal|lE] para seu [rightful_liege|lE].$action_grant_vassal_to_rightful_liege_HELP$"
 action_grant_vassal_to_rightful_liege_label: "@vassal_icon! Você pode transferir [secondary_actor.GetPrimaryTitle.Custom('GetTierIcon')][secondary_actor.GetUINameNoTooltip] para [recipient.GetPrimaryTitle.Custom('GetTierIcon')][recipient.GetUINameNoTooltip]"
 action_grant_vassal_to_rightful_liege_combined_label: "Grant [secondary_actor.GetPrimaryTitle.Custom('GetTierIcon')][secondary_actor.GetUINameNoTooltip] to [recipient.GetPrimaryTitle.Custom('GetTierIcon')][recipient.GetUINameNoTooltip]"
 action_grant_vassal_to_rightful_liege_click: "#I Clique para Conceder o Vassalo#!"
 action_grant_vassal_to_rightful_liege_HELP: "\n\n#help Los [vassals|lE] para los que no eres su señor legítimo te darán menos recursos y tendrán una [opinion|lE] reducida de ti. A veces es mejor dárselos a su señor legítimo, suponiendo que este sea también tu vasallo.\n\nAl otorgar un vasallo a su señor legítimo a veces se gana menos, pero normalmente merece la pena de todos modos. Su señor legítimo tendrá una penalización de opinión alta contra ti por retener a un vasallo que considera suyo.\n\nMantener una buena estructura de vasallos es clave para la estabilidad del señorío.#!"
 action_can_create_head_of_faith_title: "@titles_icon! Você pode Criar o [head_of_faith|lE] [actor.GetFaith.GetAdjectiveNoTooltip]"
 action_can_create_head_of_faith_title_desc: "$action_can_create_head_of_faith_title_spiritual_desc$\n\n#help Ao criar o título de chefe de fé, você também se torna o [temporal_head_of_faith|lE]!#!"
 action_can_create_head_of_faith_title_label: "@titles_icon! Você pode Criar o [head_of_faith|lE] [actor.GetFaith.GetAdjectiveNoTooltip]"
 action_can_create_head_of_faith_title_click: "#I Clique para ver a Fé#!"
 action_can_claim_liege_title: "@titles_icon! Você pode Reivindicar o Título de seu Suserano"
