 action_can_vassalize_HELP: "\n\n#help Os governantes [Concept( 'independent', 'independentes' )|E] podem buscar sua proteção e pedir para se tornarem seus [Concept( 'vassal', 'vassalos' )|E]. Expandir seu [realm|lE] sem ter que recorrer à [war|lE] costuma ser benéfico na maioria dos casos.#!"
 action_can_propose_alliance_to_family_member: "@alliance_icon! Você pode Negociar uma Aliança"
 action_can_propose_alliance_to_family_member_combined_group_label: "@alliance_icon! Você pode Negociar Alianças"
 action_can_propose_alliance_to_family_member_combined_group_name: "$action_can_propose_alliance_to_family_member_combined_group_label$"
 action_can_propose_alliance_to_family_member_desc: "Puedes negociar una [alliance|lE] con tu [actor.Custom2('RelationToMe', recipient)] [recipient.GetUIName], ya que compartís vínculos de sangre.\n\n[actor.Custom2('GetInOrOutsideRealmAllianceInfo', recipient)]#help \n\nPero recuerda: algunas [alliances|lE] dan más problemas que beneficios…\n\nAsegúrate de que te interesa esta [alliance|lE] porque podría arrastrarte a conflictos inútiles.#!"
 action_can_propose_alliance_to_family_member_combined_group_description: "Puedes negociar [alliances|lE] con algunos [Concept( 'family', 'familiares' )|E] o con quienes estén casados sin tener que crear un nuevo [marriage|lE], ya que compartís vínculos de sangre.#help \n\nPero recuerda: algunas [alliances|lE] dan más problemas que beneficios…\n\nAsegúrate de que te interesa esta [alliance|lE] porque podría arrastrarte a conflictos inútiles.#!"
 action_can_propose_alliance_to_family_member_label: "@alliance_icon! Você pode Negociar uma Aliança com seu [actor.Custom2('RelationToMe', recipient)] [recipient.GetPrimaryTitle.Custom('GetTierIcon')][recipient.GetShortUINameNoTooltip], #low @soldier_icon![recipient.GetMilitaryStrengthText]#! [actor.Custom2('GetInOrOutsideRealm', recipient)]"
