 action_can_propose_alliance_to_family_member_click: "#I Clique para Negociar uma Aliança#!"
 action_can_propose_alliance_to_family_member_combined_unimportant: "@warning_icon! #X Você não poderá chamá-los para a Guerra#!"
 action_can_propose_alliance_to_family_member_unimportant: "@warning_icon! #X Você não poderá chamar [recipient.GetHerHim] para a Guerra#!"
 action_can_potentially_propose_alliance_to_family_member: "@alliance_icon! Negociações Potenciais de Aliança"
 action_can_potentially_propose_alliance_to_family_member_combined_group_label: "@alliance_icon! Negociações Potenciais de Aliança"
 action_can_potentially_propose_alliance_to_family_member_combined_group_name: "$action_can_potentially_propose_alliance_to_family_member_combined_group_label$"
 action_can_potentially_propose_alliance_to_family_member_desc: "Tu [actor.Custom2('RelationToMe', recipient)] [recipient.GetUIName] #EMP no#! aceptaría una [alliance|lE] contigo ahora mismo, pero se le podría convencer.\n\n[actor.Custom2('GetInOrOutsideRealmAllianceInfo', recipient)]#help \n\nSi necesitas una alianza, mejorar la [opinion|lE] o ganar un [hook|lE] podría permitirte negociar una.\n\nPuedes comprobar lo cerca que está de aceptar tu oferta de alianza pasando por encima de la puntuación de aceptación cuando la interacción esté abierta.#!"
 action_can_potentially_propose_alliance_to_family_member_combined_group_description: "Estos personajes #EMP no#! aceptarían una [alliance|lE] contigo ahora mismo, pero se les podría convencer.\n\n[actor.Custom2('GetInOrOutsideRealmAllianceInfo', recipient)]#help \n\nSi necesitas una alianza, mejorar la [opinion|lE] o ganar un [hook|lE] podría permitirte negociar una.\n\nPuedes comprobar lo cerca que están de aceptar tu oferta de alianza pasando por encima de la puntuación de aceptación cuando la interacción esté abierta.#!"
 action_can_potentially_propose_alliance_to_family_member_label: "@alliance_icon! Você pode Potencialmente Negociar uma Aliança com seu [actor.Custom2('RelationToMe', recipient)] [recipient.GetPrimaryTitle.Custom('GetTierIcon')][recipient.GetShortUINameNoTooltip], #low @soldier_icon![recipient.GetMilitaryStrengthText]#! [actor.Custom2('GetInOrOutsideRealm', recipient)]"
