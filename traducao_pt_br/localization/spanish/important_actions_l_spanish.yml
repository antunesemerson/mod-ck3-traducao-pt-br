 CREATE_USURP_TITLE_PROS_CONS: "\n$BULLET_WITH_TAB$Você pode aumentar seu [rank|lE]\n$BULLET_WITH_TAB$Você ganhará [casus_bellis|lE] [de_jure|lE]\n$BULLET_WITH_TAB$Seus [vassals|lE] agora podem considerá-lo seu [rightful_liege|lE]\n$BULLET_WITH_TAB$Você ganha [prestige|lE]\n\nNo entanto, há algumas desvantagens:\n$BULLET_WITH_TAB$Seus vassalos podem desejar o título\n$BULLET_WITH_TAB$Se seu [realm|lE] tiver uma [succession_law|lE] com múltiplos [realm_heirs|lE], isso afetará quem herda quais títulos."
 action_above_domain_limit: "@domain_icon! Above [domain_limit|lE]"
 action_above_domain_limit_label: "@domain_icon! Acima do [domain_limit|lE]"
 action_above_domain_limit_desc: "Superas en [actor.GetDomainLimitOverrunWithoutGracePeriod|V] [holdings|lE] tu límite de [domain|lE] de [actor.GetDomainLimit|V], lo que reducirá tus [taxes|lE] y [levies|lE].\n\n#help Como [ruler|lE], solo puedes tener una cantidad limitada de posesiones. El resto de posesiones de tu [realm|lE] debe estar en manos de tus [vassals|lE].\n\nDebes ceder parte de tus [titles|lE], por ejemplo a [courtiers|lE] o [guests|lE], ya que serán débiles. Los vasallos existentes también pueden aceptar títulos, ¡pero eso los hará más poderosos y podrían ser una amenaza en el futuro!#!"
 action_above_domain_limit_click: "#I Clique para mostrar seus Títulos#!"
