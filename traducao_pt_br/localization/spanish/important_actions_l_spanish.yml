 action_vassal_ransom_gives_hook_desc: "Seu [vassal|lE], [secondary_recipient.Custom('GetPrimaryTitleTierIcon')][secondary_recipient.GetShortUIName], tem uma [personality|lE] honrosa e lhe deverá um [weak_hook|lE] [hook_i] se você pagar o resgate dele.\n\nO resgate dele é #V [secondary_recipient.MakeScope.ScriptValue('ransom_cost_value')|0]#! @gold_icon! de [gold|lE].$action_vassal_ransom_gives_hook_HELP$"
 action_vassal_ransom_gives_hook_combined_group_description: "Você tem [vassals|lE] com [personalities|lE] Honradas que lhe deveriam um [hook_i][weak_hook|E] se você pagasse seus resgates.$action_vassal_ransom_gives_hook_HELP$"
 action_vassal_ransom_gives_hook_label: "@cs_weak_hook_icon! Puedes pagar el rescate por tu vasall[secondary_recipient.Custom('ES_OA')] [secondary_recipient.GetShortUINameNoTooltip] [secondary_recipient.Custom('GetPrimaryTitleTierIcon')], #V [secondary_recipient.MakeScope.ScriptValue('ransom_cost_value')|0]#! @gold_icon!"
 action_vassal_ransom_gives_hook_combined_label: "Seu [actor.Custom2('RelationToMe', secondary_recipient)], [secondary_recipient.Custom('GetPrimaryTitleTierIcon')][secondary_recipient.GetShortUINameNoTooltip], @gold_icon!#V [secondary_recipient.MakeScope.ScriptValue('ransom_cost_value')|0]#!"
 action_vassal_ransom_gives_hook_click: "#I Clique para Pagar o Resgate#!"
 action_vassal_ransom_gives_hook_HELP: "\n\n#help Conseguir um Gancho sobre um Vassalo pode ser benéfico, especialmente se você quiser aumentar as [obligations|lE] dele para com você alterando o [vassal_contract|lE], o que neste caso é possível!#!"
