 cycle_history_key_rise_of_the_qin: "A dinastia Qin, a primeira dinastia verdadeiramente imperial, unifica as terras do que antes eram os Sete Estados Combatentes."
 cycle_history_key_collapse_of_the_qin: "Acometida por rebeliões internas, a dinastia Qin logo entra em colapso e se divide em dezoito reinos em conflito."
 cycle_history_key_rise_of_the_han: "O triunfo da dinastia Han sobre seus rivais restaura a ordem nestas terras."
 cycle_history_key_yellow_turban_rebellion: "Massas descontentes, inspiradas por uma profecia revolucionária, se levantam contra a dinastia Han, levando a décadas de conflitos internos."
 cycle_history_key_three_kingdoms_period: "Com a abdicação forçada do último imperador da dinastia Han, inicia-se oficialmente uma era de divisão entre os três reinos de Wei, Shu e Wu."
 cycle_history_key_rise_of_the_jin: "O período dos Três Reinos chega ao fim pelas mãos do regente de Wei, que força o imperador a abdicar e estabelece a dinastia Jin."
 cycle_history_key_war_of_the_eight_princes: "O reinado do imperador Hui de Jin é marcado por frequentes conflitos, à medida que os príncipes da casa imperial travam guerras pelo controle do imperador."
 cycle_history_key_sixteen_kingdoms: "O estabelecimento de um reino separatista em Sichuan anuncia a desintegração do norte em vários estados rivais fragmentados."
 cycle_history_key_northern_southern_dynasties: "O caos do período dos Dezesseis Reinos aos poucos dá lugar às mais consolidadas Dinastias do Norte e do Sul, embora a reunificação continue sendo um sonho."
 cycle_history_key_rise_of_the_sui: "Após a morte do instável imperador Xuan de Zhou do Norte, seu sogro toma o poder e funda a dinastia Sui."
 cycle_history_key_decline_of_the_sui: "Os custosos projetos de infraestrutura e os fracassos militares levam a dinastia Sui à ruína; o imperador é assassinado, e uma criança se senta em seu lugar"
 cycle_history_key_rise_of_the_tang: "Ao forçar o imperador-menino dos Sui a abdicar, o regente imperial ascende como o primeiro imperador da dinastia Tang."
 cycle_history_key_an_lushan_rebellion: "O general Ān Lùshān lidera uma rebelião malsucedida contra os Tang, com consequências catastróficas para milhões de pessoas."
 cycle_history_key_collapse_of_the_tang: "O assassinato do último imperador Tang marca o fim da dinastia, com mais de uma dezena de senhores da guerra rivalizando para serem reconhecidos como seu sucessor."
 cycle_history_key_rise_of_the_song: "Um brilhante general unifica os reinos em guerra e inaugura uma nova era de paz e prosperidade como fundador da dinastia Song."
 cycle_history_key_sack_of_kaifeng_by_jin: "A dinastia Song sofre uma derrota devastadora quando a capital imperial é invadida pela dinastia Jurchen Jin, e o próprio imperador é feito prisioneiro."
