l_spanish:
 test_text_to_use_explanation: "O termo \"[Concept( 'primary_title', 'título principal' )|E]\" é um conceito do jogo."
 game_concept_vassal: "Vassalo"
 game_concept_vassals: "Vassalos"
 game_concept_vassalage: "Vassalagem"
 game_concept_vassal_possessive: "do Vassalo"
 game_concept_vassals_possessive: "dos Vassalos"
 game_concept_direct_vassal: "Vassalo Direto"
 game_concept_direct_vassals: "Vassalos Diretos"
 game_concept_direct_vassal_desc: "Os vassalos diretos são aqueles [vassals|lE] que nos servem pessoalmente. #emphasis No#! inclui os vassalos de vassalos."
 game_concept_vassalize: "Vassalizar"
 game_concept_vassalization: "Vassalização"
 game_concept_vassal_desc: "Um vassalo é um [ruler|lE] que jurou lealdade a outro, seu [liege|lE].\n\nOs vassalos têm a [obligation|lE] de fornecer [levies|lE] e pagar [taxes|lE] ao seu senhor e recebem sua proteção em troca.\n\nSe a [opinion|lE] de um vassalo em relação ao seu senhor for baixa, ele pode se juntar a [factions|lE] ou [schemes|lE] para substituir seu senhor por outra pessoa."
 game_concept_ruler: "Governante"
 game_concept_rulers: "Governantes"
 game_concept_rulerpossessive: "do Governante"
 game_concept_ruler_desc: "Um $game_concept_ruler$ é um [character|lE] que detém pelo menos um [title|lE]."
 game_concept_title: "Título"
 game_concept_title_i: "@titles_icon!"
 game_concept_titles: "Títulos"
 game_concept_titlepossessive: "do Título"
 game_concept_title_desc: "Um título é basicamente um certificado de propriedade de terras.\n\nA menor unidade de terra no mapa é a [barony|lE]. As baronias são organizadas em áreas maiores chamadas [counties|lE]. Os condados [de_jure|E] pertencem a um [duchy|lE], os ducados a um [kingdom|lE] e os reinos a um [empire|lE].\n\nDucados, reinos e impérios nem sempre têm um [holder|lE], mas são Títulos que um governante pode [Concept( 'created', 'crear' )|E] se controlar uma porção suficiente do território."
 game_concept_holder: "Detentor"
 game_concept_holders: "Detentores"
 game_concept_holder_possessive: "do Detentor"
 game_concept_holders_possessive: "dos Detentores"
 game_concept_hold: "Possuir"
 game_concept_holder_desc: "O titular de um [Concept( 'title', 'título' )|E] é o personagem que o possui. Uma vez estabelecidos, os títulos de [Concept( 'barony', 'baronia' )|E] e [Concept( 'county', 'condado' )|E] sempre terão um titular, enquanto os títulos de [Concept( 'duchy', 'ducado' )|E], [Concept( 'kingdom', 'reino' )|E] ou [Concept( 'empire', 'império' )|E] talvez ainda não tenham sido criados. Além disso, o titular de um Título de alto nível pode não controlar de fato nenhum território dentro da área [Concept( 'de_jure', 'de jure' )|E] do título.\n\nTer títulos de nível mais alto permite ter [Concept( 'vassals', 'vassalos' )|E] de nível mais alto. Por exemplo, os duques podem ter condes como vassalos, e os reis podem ter duques."
 game_concept_de_jure: "De Jure"
 game_concept_de_jure_desc: "A maioria dos [titles|lE] é considerada parte de um título de nível superior de jure (por lei).\n\nPor exemplo, um [ruler|lE] pode ser [king|lE] da Inglaterra e seu [realm|lE] ainda não conter todas as terras que são legalmente consideradas parte da Inglaterra.\n\nO [holder|lE] de um [duchy|lE], [kingdom|lE] ou [empire|lE] sempre tem um [casus_belli|lE] para tomar o controle de seus títulos constituintes de jure.\n\nOs [vassals|lE] também decidem quem é seu [rightful_liege|lE], dependendo de que título seu [primary_title|lE] faz parte de jure."
 game_concept_de_jure_drift: "Deriva De Jure"
 game_concept_de_jure_drift_drifted: "Derivado"
 game_concept_de_jure_drift_drift: "Deriva"
 game_concept_de_jure_drifting: "Derivando De Jure"
 game_concept_de_jure_drift_desc: "$game_concept_de_jure_drift_desc_part_1$\n\n$game_concept_de_jure_drift_desc_part_2$"
 game_concept_de_jure_drift_desc_part_1: "Este lento processo permite mudar o [Concept( 'liege', 'senhor' )|E] [Concept( 'de_jure', 'de iure' )|E] de um [Concept( 'title', 'título' )|E]. Ocorre naturalmente quando um [Concept( 'duchy', 'ducado' )|E] ou [Concept( 'kingdom', 'reino' )|E] está totalmente controlado por um [Concept( 'ruler', 'governante' )|E] que não possui o título de senhor de iure do território.\n\nEste processo pode ser acelerado se atribuirmos ao nosso [Concept( 'chancellor', 'chanceler' )|E] a [Concept( 'councillor_task', 'tarefa de conselheiro' )|E] adequada #weak ($task_integrate_title$)#!. Os ducados só podem derivar de iure para reinos, enquanto os reinos só podem derivar para [Concept( 'empires', 'impérios' )|E].\n\nDeixar que os títulos de iure derivem para o nosso [Concept( 'primary_title', 'título principal' )|E] é uma boa forma de se livrar da penalidade de [Concept( 'rightful_liege', 'senhor legítimo' )|E]."
 game_concept_de_jure_drift_desc_part_2: "#weak Exemplo: o Ducado de $d_northumberland$ faz parte de jure de $k_england$, mas o território do ducado está inteiramente dentro de $k_scotland$. Como o Rei de $k_scotland$ também não possui $k_england$, o ducado começará a sofrer deriva de jure para se tornar parte de $k_scotland$.#!"
 game_concept_primary_title: "Título Primário"
 game_concept_primary_titles: "Títulos Primários"
 game_concept_primary_title_desc: "O título principal de um [Concept( 'ruler', 'governante' )|E] é o [Concept( 'title', 'título' )|E] de maior patente com o qual mais se identifica e que determina tanto seu brasão de armas quanto o nome de seu [Concept( 'realm', 'senhorio' )|E].\n\nSe você controlar vários títulos do mesmo nível, poderá escolher qual deles será seu título principal."
 game_concept_recently_acquired_holding: "Propriedade Adquirida Recentemente"
 game_concept_recently_acquired_holdings: "Propriedades Adquiridas Recentemente"
 game_concept_recently_acquired_holding_desc: "As [Concept( 'holdings', 'propriedades' )|E] adquiridas no último ano que coloquem um governante acima de seu [Concept( 'domain_limit', 'limite de domínio' )|E] não causam penalidades às outras posses, mas também não fornecem nem [Concept( 'taxes', 'impostos' )|E] nem [Concept( 'levies', 'levas' )|E]."
 game_concept_domain_size: "Tamanho do Domínio"
 game_concept_domain_size_desc: "O tamanho de domínio de um personagem reflete quantos [Concept( 'titles', 'títulos' )|E] de [Concept( 'baronies', 'baronias' )|E] e [Concept( 'counties', 'condados' )|E] possui pessoalmente."
 game_concept_levies: "Recrutas"
 game_concept_levy: "Recrutas"
 game_concept_levies_desc: "O grosso dos [armies|lE] é composto por $game_concept_levies$.\n\nToda [holding|lE] fornece ao seu [holder|lE] uma quantidade fixa de $game_concept_levies$. Por sua vez, os [vassals|lE] fornecem uma parte de seus $game_concept_levies$ ao seu [liege|lE].\n\nAs $game_concept_levies$ são compostas principalmente por combatentes mal armados #weak (campesinos, rufianes y mercenarios locales)#!, e são consideradas seu próprio tipo de unidade.\n\nUma $game_concept_levy$ tem [damage|lE] [GetDefine('NCombat', 'LEVY_ATTACK')|0] e [toughness|lE] [GetDefine('NCombat', 'LEVY_TOUGHNESS')|0] [toughness|lE]. O outro tipo de [Concept('soldiers', 'tropas')|E] do jogo são os [men_at_arms|E], caros profissionais treinados."
 game_concept_vassal_obligations: "Obrigações de Vassalo"
 game_concept_obligations: "Obrigações"
 game_concept_obligation: "Obrigação"
 game_concept_vassal_obligations_desc: "As obrigações definem quanto [Concept( 'taxes', 'impostos' )|E] e [Concept( 'levies', 'levas' )|E] um [Concept( 'vassal', 'vassalo' )|E] proporciona ao seu [Concept( 'liege', 'senhor' )|E]. Uma [government_form|lE] forma de governo de um vassalo determina como suas obrigações são modificadas.\n\n#weak Por exemplo, as obrigações dos [vassals|lE] de governo [GetGovernment('feudal_government').GetName|l] e [GetGovernment('clan_government').GetName|l] dependem de seu [vassal_contract|lE], enquanto os de governo [GetGovernment('administrative_government').GetName|l] dependem de sua [province_administration|lE]."
 game_concept_contract: "Contrato"
 game_concept_crown_authority: "Autoridade da Coroa"
 game_concept_crown_authority_desc: "A Autoridade da Coroa representa o poder geral que um [Concept( 'ruler', 'governante' )|E] exerce sobre seus [Concept( 'vassals', 'vassalos' )|E].\n\nHá quatro níveis de Autoridade da Coroa: [Concept( 'autonomous_vassals', 'autônoma' )|E], [Concept( 'limited', 'limitada' )|E], [Concept( 'high', 'alta' )|E] e [Concept( 'absolute', 'absoluta' )|E]. Aumentar a Autoridade da Coroa custa uma quantidade de [Concept( 'prestige', 'prestígio' )|E] dependendo do nível e da [Concept( 'learning_skill', 'habilidade de aprendizagem' )|E] do governante.\n\n#weak Os vassalos não gostam de níveis mais altos de Autoridade da Coroa, e o objetivo principal das [Concept( 'liberty_faction', 'facções da liberdade' )|E] é reduzi-la.#!"
 game_concept_autonomous_vassals: "Vassalos Autônomos"
 game_concept_autonomous_vassals_crown_authority: "Autoridade da Coroa de Vassalos Autônomos"
 game_concept_autonomous_vassals_crown_authority_desc: "'' é o nível mais baixo de [crown_authority|lE]. Nesse nível, [vassals|lE] não têm penalidade de [opinion|lE] em relação ao seu [liege|lE], e o suserano só tem poder básico sobre eles."
 game_concept_limited: "Limitada"
 game_concept_limited_crown_authority: "Autoridade da Coroa Limitada"
 game_concept_limited_crown_authority_desc: "'' é o segundo nível mais baixo de [crown_authority|lE]. [vassals|lE] têm uma penalidade de [opinion|lE] de #N -10#! em relação ao seu [liege|lE], e o suserano pode [revoke|lE] [titles|lE] e [retract|lE] os vassalos de um vassalo. O [ruler|lE] pode alternar entre [succession_laws|lE] de Partilha disponíveis."
 game_concept_high: "Alta"
 game_concept_high_crown_authority: "Alta Autoridade da Coroa"
 game_concept_high_crown_authority_desc: "A autoridade da coroa alta é o segundo nível mais alto. Os [vassals|lE] têm uma penalidade de [opinion|lE] em relação ao seu [liege|lE] de #N -20#!.\n\nNesse nível, além dos poderes que o senhor obtém com [limited_crown_authority|lE], os vassalos do mesmo senhor não podem mais guerrear entre si. Além disso, o governante pode mudar para qualquer [succession_laws|lE] disponível e ninguém que esteja fora do [realm|lE] de seu senhor pode herdar os [titles|lE] dos vassalos.\n\nPor fim, recusar a [revocation|lE] de títulos ou a [retraction|lE] de vassalos é considerado um [crime|lE] mesmo que o senhor careça de justificativa suficiente."
 game_concept_absolute: "Absoluta"
 game_concept_absolute_crown_authority: "Autoridade da Coroa Absoluta"
 game_concept_absolute_crown_authority_desc: "$game_concept_absolute_crown_authority$ é o nível mais alto de [crown_authority|lE]. Os [vassals|lE] têm uma penalidade de [opinion|lE] de #N -30#! em relação ao seu [liege|lE].\n\nNeste nível — além dos efeitos de Autoridade da Coroa [high|lE] e [limited|lE] — o governante pode nomear um [designated_heir|lE] pagando [prestige|lE].\n\nAlém disso, os vassalos não podem declarar guerra nem mesmo contra governantes estrangeiros."
 game_concept_tribal_authority: "Autoridade Tribal"
 game_concept_tribal_authority_desc: "A autoridade tribal representa a influência geral que um [ruler|lE] [tribal|lE] exerce sobre seus [vassals|lE]. Em comparação com a [Concept( 'crown_authority', 'autoridade da coroa' )|E], oferece menos poderes e isso ocorre nos níveis mais altos.\n\nHá quatro níveis de autoridade tribal: [Concept( 'disparate_tribes', 'dispersa' )|E], [Concept( 'limited_tribal', 'limitada' )|E], [Concept( 'high_tribal', 'alta' )|E] e [Concept( 'absolute_tribal', 'absoluta' )|E]. Aumentar a autoridade tribal custa uma quantidade de [prestige|lE] que depende do nível e da [learning_skill|lE] do governante, mas geralmente é mais caro do que aumentar a autoridade da coroa.\n\n#weak Os vassalos não gostam de níveis altos de autoridade tribal, e o objetivo principal das [Concept( 'liberty_faction', 'facções de liberdade' )|E] é reduzi-los.#!"
 game_concept_disparate_tribes: "Tribos Dispersas"
 game_concept_disparate_tribes_tribal_authority: "Autoridade Tribal de Tribos Dispersas"
 game_concept_disparate_tribes_tribal_authority_desc: "As tribos dispersas são o nível mais baixo de [Concept( 'tribal_authority', 'autoridade tribal' )|E]. Nesse nível, os [Concept( 'vassals', 'vassalos' )|E] não têm penalidade de [Concept( 'opinion', 'opinião' )|E] em relação ao seu [Concept( 'liege', 'senhor' )|E] e o suserano não tem nenhum poder sobre eles além de exigir [Concept( 'levies', 'levas' )|E] e [Concept( 'taxes', 'impostos' )|E]."
 game_concept_limited_tribal: "Limitada"
 game_concept_limited_tribal_authority: "Autoridade Tribal Limitada"
 game_concept_limited_tribal_authority_desc: "A autoridade tribal limitada é o segundo nível mais baixo de [Concept( 'tribal_authority', 'autoridade tribal' )|E]. Os [Concept( 'vassals', 'vassalos' )|E] têm uma penalidade de [Concept( 'opinion', 'opinião' )|E] em relação ao seu [Concept( 'liege', 'senhor' )|E] de #N -10#! e o senhor agora pode [Concept( 'imprison', 'encarcerar' )|E] os [Concept( 'characters', 'personagens' )|E] de seu [Concept( 'realm', 'senhorio' )|E]."
 game_concept_high_tribal: "Alta"
 game_concept_high_tribal_authority: "Alta Autoridade Tribal"
 game_concept_high_tribal_authority_desc: "A autoridade tribal alta é o segundo nível em importância de a [Concept( 'tribal_authority', 'autoridade tribal' )|E]. Os [Concept( 'vassals', 'vassalos' )|E] têm uma penalidade de [Concept( 'opinion', 'opinião' )|E] em relação ao seu [Concept( 'liege', 'senhor' )|E] de #N -20#!.\n\nNeste nível, além da capacidade de [Concept( 'imprison', 'encarcerar' )|E] a outros [Concept( 'characters', 'personagens' )|E], o senhor pode [Concept( 'revoking', 'revogar' )|E] [Concept( 'titles', 'títulos' )|E] e [Concept( 'retracting', 'retirar' )|E] aos vassalos de outro vassalo."
 game_concept_absolute_tribal: "Absoluta"
 game_concept_absolute_tribal_authority: "Autoridade Tribal Absoluta"
 game_concept_absolute_tribal_authority_desc: "A autoridade tribal absoluta é o nível mais alto de [Concept( 'tribal_authority', 'autoridade tribal' )|E]. Os [Concept( 'vassals', 'vassalos' )|E] têm uma penalidade de [Concept( 'opinion', 'opinião' )|E] de #N -30#! em relação ao seu [Concept( 'liege', 'senhor' )|E].\n\nNeste nível, além dos efeitos de autoridade tribal [Concept( 'limited_tribal', 'limitada' )|E] e [Concept( 'high_tribal_authority', 'alta' )|E], os governantes agora podem se estabelecer e se tornar [Concept( 'feudal', 'feudal' )|E].\n\nUm governante [Concept( 'tribal', 'tribal' )|E] de fé [GetReligionFamily('rf_pagan').GetName|l] não reformada precisa desta lei para reformar sua [Concept( 'faith', 'fé' )|E]."
 game_concept_powerful_vassal: "Vassalo Poderoso"
 game_concept_powerful_vassal_powerful: "Poderoso"
 game_concept_powerful_vassals: "Vassalos Poderosos"
 game_concept_powerful_vassal_possessive: "do Vassalo Poderoso"
 game_concept_powerful_vassal_desc: "Os vassalos poderosos são aqueles [vassals|lE] que têm mais [soldiers|lE] e [Concept( 'income', 'renda' )|E]. à preciso ter muito cuidado com eles, pois esperam ocupar uma cadeira no [council|lE] e terão [Concept( 'opinion', 'opinião' )|E] de você significativamente mais baixa se não o fizerem.\n\nPara mudar uma [succession_law|lE] à necessório que todos os vassalos poderosos tenham uma [opinion|lE] positiva de você, estejam [Concept( 'cowed', 'amedrontados' )|E] ou estejam [Concept( 'imprisoned', 'encarcerados' )|E]."
 game_concept_realm_law: "Lei do Reino"
 game_concept_realm_law_desc: "É o conjunto de leis que regem o domínio deste personagem, como o nível de [crown_authority|lE] ou [tribal_authority|lE]."
 game_concept_title_law: "Lei de Título"
 game_concept_title_laws: "Leis de Título"
 game_concept_title_law_desc: "[titles|lE] podem receber uma Lei de [title_specific_succession|lE] específica para aquele Título. Essa Lei ditará regras de sucessão diferentes das de outros títulos mantidos pelo mesmo personagem."
 game_concept_strong_vassal: "Vassalo Forte"
 game_concept_strong_vassals: "Vassalos Fortes"
 game_concept_strong_vassal_desc: "Um vassalo forte é [Concept( 'vassal', 'aquel' )|E] que se aproxima ou supera seu [liege|lE] em poder, o que acarreta uma penalidade de [opinion|lE]. #weak Considera débil a su senhor y lo ve poco adecuado para gobernar el senhorio.#!"
 game_concept_domain_limit: "Limite de Domínio"
 game_concept_domain_limit_desc: "O limite de dománio determina quantas [Concept( 'holdings', 'propriedades' )|E] podem ser mantidas legalmente em seu [Concept( 'domain', 'dománio' )|E]. Esse limite à afetado por muitos fatores, como a [Concept( 'succession_law', 'lei sucessória' )|E] ou o nível do [Concept( 'primary_title', 'título principal' )|E].\n\nEmbora seja possível ultrapassar seu limite de dománio, isso reduzirà sua [Concept( 'income', 'renda' )|E] e as [opinions|El] dos [vassals|El]."
 game_concept_vassal_limit: "Limite de Vassalos"
 game_concept_vassal_limit_desc: "O limite de vassalagem determina o máximo de [Concept( 'direct_vassals', 'vassalos diretos' )|E] que se pode ter (sem contar os de nível [Concept( 'barony', 'baronia' )|E]).\n\nEmbora seja possível ultrapassar o limite de vassalagem, os [taxes|lE] e [levies|lE] que seus vassalos fornecem serão reduzidos, então talvez seja melhor [Concept( 'transferring', 'transferir' )|E] alguns vassalos para ficar abaixo do limite."
 game_concept_leasing: "Arrendamento"
 game_concept_lease: "Arrendamento"
 game_concept_leases: "Arrendamentos"
 game_concept_leased: "Arrendado"
 game_concept_lessee: "Arrendatário"
 game_concept_leasing_desc: "Podem ser arrendadas [Concept( 'baronies', 'baronias' )|E] menores para [Concept( 'holy_orders', 'ordens sagradas' )|E] ou ao [Concept( 'clergy', 'clero' )|E]. As baronias arrendadas fornecerão [Concept( 'taxes', 'impostos' )|E] e [Concept( 'levies', 'levas' )|E] ao [Concept( 'lessee', 'arrendatério' )|E] em vez de ao [Concept( 'holder', 'titular' )|E].\n\nUma ordem sagrada pode arrendar [Concept( 'castle_holdings', 'propriedades de castelo' )|E], enquanto o clero pode arrendar [Concept( 'temple_holdings', 'propriedades de templo' )|E].\n\nAs [Concept( 'holdings', 'propriedades' )|E] arrendadas ainda são consideradas parte do [Concept( 'realm', 'senhorio' )|E] do titular. As [Concept( 'county_capitals', 'capitais de condado' )|E] não podem ser arrendadas."
 game_concept_succession: "Sucessão"
 game_concept_succession_desc: "A sucessão ocorre quando um [ruler|lE] morre, dividindo seu [gold|lE] e [titles|lE] entre os [Concept( 'heirs', 'herdeiros' )|E] de acordo com as [Concept( 'succession_laws', 'leis de sucessão' )|E].\n\nOs jogadores continuarão jogando como seu [Concept( 'player_heir', 'Herdeiro do Jogador' )|E] mesmo que alguns títulos sejam perdidos para outros personagens.\n\nSe não houver um $game_concept_player_heir$, a partida terminará.\n\n#weak Algumas circunstâncias raras podem forçar uma sucessão mesmo antes da morte de um governante, como perder uma [excommunication_war|lE]. Porém, em termos legais, os governantes não podem abdicar por iniciativa própria.#!"
 game_concept_heir: "Herdeiro"
 game_concept_heirs: "Herdeiros"
 game_concept_heir_possessive: "do Herdeiro"
 game_concept_heir_desc: "Um herdeiro é um personagem que pode herdar um ou mais [titles|lE].\n\n Todo [title|lE] que se possui conta com um herdeiro, que depende da [succession_law|lE] de seu [holder|lE] atual. Quando este morrer ou houver uma [succession|lE] por outro motivo, o atual herdeiro do título o receberá.\n\nTenha em mente que os diversos títulos de um [ruler|lE] podem ter herdeiros diferentes. O principal é que o [primary_title|lE] será herdado pelo [primary_heir|lE] e os jogadores continuarão jogando com seu [player_heir|lE]."
 game_concept_primary_heir: "Herdeiro Primário"
 game_concept_primary_heirs: "Herdeiros Primários"
 game_concept_primary_heir_possessive: "do Herdeiro Primário"
 game_concept_primary_heir_desc: "O herdeiro principal é o personagem que herda o [Concept( 'primary_title', 'título principal' )|E] de um [Concept( 'ruler', 'governante' )|E] na [Concept( 'succession', 'sucessão' )|E]. Normalmente é o mesmo personagem que o [Concept( 'player_heir', 'herdeiro jogável' )|E], mas nem sempre é o caso."
 game_concept_player_heir: "Herdeiro do Jogador"
 game_concept_player_heir_desc: "O $game_concept_player_heir$ é o [heir|El] com quem o jogador continua jogando após uma [succession|El].\n\nO $game_concept_player_heir$ costuma ser o mesmo que o [primary_heir|El], mas, se a [Concept( 'succession_law', 'lei de sucessão' )|E] do [primary_title|El] determinar que ele deve passar para um personagem fora da [dynasty|El] do jogador, este continuará jogando como herdeiro dinástico do segundo título de maior nível (terceiro, quarto, etc.).\n\nEssa situação é comum quando o $game_concept_player_heir$ é derrotado na votação sob uma lei de sucessão eletiva. Se você é o [house_head|El] de uma [noble_family|El] em um [realm|El] [administrative|El], você pode perder seu domínio para herdeiros principais fora de sua [house|El], mas manter seu título de família nobre."
 game_concept_title_heir: "Herdeiro do Título"
 game_concept_title_heirs: "Herdeiros do Título"
 game_concept_title_heir_desc: "O Herdeiro do Título é o [heir|lE] de um [title|lE] específico com sua própria [title_succession|El]. Ele receberá esse Título quando o [holder|lE] atual morrer."
 game_concept_realm_heir: "Herdeiro do Reino"
 game_concept_realm_heirs: "Herdeiros do Reino"
 game_concept_realm_heir_desc: "Herdeiro do Reino é um dos [heirs|lE] de um [realm|lE], que receberá um ou todos os [titles|lE] do Reino que o [ruler|lE] tiver em seu poder no momento de morrer.\n\nUm Reino pode ter um ou mais Herdeiros do Reino, dependendo de sua [succession_law|lE]."
 game_concept_disinherit: "Deserdar"
 game_concept_disinherited: "Deserdado"
 game_concept_disinheriting: "Deserdando"
 game_concept_disinherits: "Deserda"
 game_concept_disinherit_desc: "Um [Concept( 'dynast', 'cabeça da dinastia' )|E] pode deserdar um membro de sua [dynasty|lE] ao custo de [Concept( 'dynasty_prestige', 'renome' )|E].\n\nAssim, esse membro será removido da [line_of_succession|lE] de quaisquer títulos que atualmente estejam nas máos de outros membros da dinastia."
 game_concept_council: "Conselho"
 game_concept_council_i: "@council_icon!"
 game_concept_council_desc: "O conselho é composto por seis [Concept( 'councillors', 'conselheiros' )|E] que auxiliam o [Concept( 'ruler', 'governante' )|E] na administração do [Concept( 'realm', 'senhorio' )|E]. Como chefes de seus respectivos departamentos, podem receber diversas [Concept( 'councillor_tasks', 'tarefas de conselheiros' )|E] importantes."
 game_concept_councillor: "Conselheiro"
 game_concept_councillors: "Conselheiros"
 game_concept_councillor_desc: "Os conselheiros são os principais ajudantes de qualquer [ruler|lE] e formam o [council|lE]. Há seis cargos no conselho: [chancellor|lE], [steward|lE], [marshal|lE], [spymaster|lE], [court_chaplain|lE] (ou [realm_priest|lE]) e, por fim, [spouse|lE].\n\nCada um à responsóvel por um departamento ao qual podem ser atribuídas diferentes [Concept( 'councillor_tasks', 'tarefas' )|E].\n\nOs [powerful_vassals|lE] ficarão irritados se não forem nomeados para um desses cargos, o que significa que muitas vezes será preciso escolher entre apaziguar um vassalo poderoso ou nomear alguém que seja realmente competente.\n\nServir como conselheiro do nosso [liege|lE] nos concede um bônus, que aumenta de acordo com o [rank|lE] do senhor."
 game_concept_councillor_task: "Tarefa do Conselheiro"
 game_concept_councillor_tasks: "Tarefas do Conselheiro"
 game_concept_councillor_task_desc: "As tarefas de conselheiro são trabalhos importantes que podem ser atribuídos aos seus [councillors|lE]. Elas podem ser gerais ou específicas de um [county|lE] ou de uma [court|lE].\n\nSe temos uma [relation|lE] com um conselheiro, as tarefas com tempo de conclusão podem levar mais ou menos tempo.\n\n#weak Observe que os conselheiros não estáo fisicamente presentes para realizar essas tarefas, apenas lideram os esforços.#!"
 game_concept_councillor_task_possible_side_effects: "Possíveis Efeitos Colaterais"
 game_concept_councillor_task_possible_side_effects_desc: "Uma [councillor_task|lE] pode ter consequências inesperadas ao longo do tempo. Elas podem ser boas ou ruins, com efeitos positivos sendo mais prováveis quanto maior for a [skill|lE] relevante do Conselheiro, e efeitos negativos sendo mais prováveis quanto menor for a Skill relevante."
 game_concept_chancellor: "Chanceler"
 game_concept_chancellors: "Chanceleres"
 game_concept_chancellor_desc: "O chanceler é o [Concept( 'councillor', 'conselheiro' )|E] responsável pelas funções diplomáticas, tanto dentro quanto fora do [Concept( 'realm', 'senhorio' )|E]."
 game_concept_steward: "Tesoureiro"
 game_concept_stewards: "Tesoureiros"
 game_concept_steward_desc: "O Tesoureiro é o [Concept( 'councillor', 'conselheiro' )|E] responsável pela administração do [Concept( 'domain', 'domínio' )|E], por exemplo em assuntos relacionados à [Concept( 'taxation', 'tributação' )|E], à [Concept( 'culture', 'cultura' )|E] ou à [Concept( 'development', 'desenvolvimento' )|E]."
 game_concept_marshal: "Marechal"
 game_concept_marshals: "Marechais"
 game_concept_marshal_desc: "O marechal é nosso [Concept( 'commander', 'comandante' )|E] em chefe e o [Concept( 'councillor', 'conselheiro' )|E] responsável pelos assuntos militares em geral."
 game_concept_spymaster: "Mestre de Espionagem"
 game_concept_spymaster_desc: "Nosso espião-mor é nosso [Concept( 'councillor', 'conselheiro' )|E] responsável pelos assuntos de intriga e inteligência. Cuidado ao ter um espião-mor desleal, pois ele pode facilmente ocultar e participar de qualquer [GetScheme('murder').GetTypeName|l] contra você e sua família próxima."
 game_concept_court_chaplain: "Capelão da Corte"
 game_concept_court_chaplains: "Capelães da Corte"
 game_concept_court_chaplain_desc: "O capelão da corte é o [Concept( 'councillor', 'conselheiro' )|E] responsável pelos assuntos religiosos e espirituais da [Concept( 'faith', 'fé' )|E] com [Concept( 'doctrine', 'doutrina' )|E] [GetFaithDoctrine('doctrine_theocracy_lay_clergy').GetBaseName].\n\nAs fés com doutrina [GetFaithDoctrine('doctrine_theocracy_temporal').GetBaseName] terão [Concept( 'realm_priests', 'bispos' )|E] mais poderosos (e problemáticos) em vez de um mero capelão da corte."
 game_concept_realm_priest: "Sacerdote do Reino"
 game_concept_realm_priests: "Sacerdotes do Reino"
 game_concept_realm_priest_possessive: "do Sacerdote do Reino"
 game_concept_realm_priest_desc: "O bispo é o [Concept( 'councillor', 'conselheiro' )|E] responsável pelos assuntos religiosos e espirituais da [Concept( 'faith', 'fé' )|E] com a [Concept( 'doctrine', 'doutrina' )|E] [GetFaithDoctrine('doctrine_theocracy_temporal').GetBaseName].\n\nAo contrário de seus equivalentes ([Concept( 'court_chaplains', 'capelães da corte' )|E]) da doutrina [GetFaithDoctrine('doctrine_theocracy_lay_clergy').GetBaseName], os bispos [Concept( 'lease', 'arrendam' )|E] arrendam todas as [Concept( 'temple_holdings', 'posses consagradas' )|E] do [Concept( 'domain', 'domínio' )|E] de um [Concept( 'ruler', 'governante' )|E] e também recebem uma parte dos [Concept( 'taxes', 'impostos' )|E] e [Concept( 'levies', 'levas' )|E] dos bispos [Concept( 'lease', 'arrendam' )|E] [Concept( 'vassals', 'vassalos' )|E].\n\nOs bispos fornecem a seu [Concept( 'liege', 'senhor' )|E] levas e impostos se tiverem uma opinião positiva dele. Quanto maior for a [Concept( 'opinion', 'opinião' )|E] sobre seu [Concept( 'liege', 'senhor' )|E], mais eles fornecerão.\n\nBispos com uma opinião baixa de seus suseranos não lhes fornecerão impostos nem levas, e podem causar problemas."
 game_concept_law: "Lei"
 game_concept_laws: "Leis"
 game_concept_law_i: "@law_icon!"
 game_concept_law_desc: "As leis de um [realm|lE] determinam como esse reino é estruturado.\n\nA mais fundamental delas é a [crown_authority|lE] da autoridade régia (ou [tribal_authority|lE] para as [tribes|lE] , [imperial_bureaucracy|lE] para as [Concept( 'administrative', 'administraciones' )|lE] e [nomadic_authority|lE] para os [nomads|lE]) já que essas leis determinam como [lieges|lE] e [vassals|lE] interagem no dia a dia.\n\nEmbora tenham menos impacto na vida cotidiana dos [rulers|lE] em um reino, as [succession_laws|lE] e as [title_laws|lE] continuam sendo muito importantes para a [succession|lE]."
 game_concept_succession_law: "Lei de Sucessão"
 game_concept_succession_laws: "Leis de Sucessão"
 game_concept_succession_law_desc: "Todo [ruler|lE] tem uma lei de sucessão principal que determina o que acontece com seus [titles|lE] ao ocorrer a [succession|lE].\n\nAlém disso, às vezes um título individual pode ter sua própria lei de [title_succession|El] com precedência sobre a lei padrão. Por exemplo, o Sacro Império Romano pode ser eletivo, mesmo que o imperador tenha a partilha como lei de sucessão principal.\n\nA lei de sucessão só pode ser alterada quando houver um nível apropriado de [crown_authority|lE]."
 game_concept_religious_head_succession_law: "Lei de Sucessão do Chefe de Fé"
 game_concept_religious_head_succession_law_short: "Lei do Chefe de Fé"
 game_concept_religious_head_succession_laws: "Lei de Sucessão do Chefe de Fé"
 game_concept_religious_head_succession_laws_short: "Leis do Chefe de Fé"
 game_concept_religious_head_succession_law_desc: "Os [rulers|lE] que também sejam [heads_of_faith|lE] têm uma lei adicional de [Concept( 'succession', 'sucessão' )|E] do domínio que exige que seu [heir|lE] seja da mesma [faith|lE]. Isso nunca pode ser mudado e os [Concept( 'titles', 'títulos' )|E] da cabeça da fé não podem ter uma [Concept( 'title_succession', 'sucessão de título' )|E] separada. A única maneira de remover esse tipo de lei do domínio é que uma força externa destrua o título de [head_of_faith|lE]."
 game_concept_opinion: "Opinião"
 game_concept_opinions: "Opiniões"
 game_concept_opinion_i: "@opinion_icon!"
 game_concept_opinion_desc: "Todo personagem tem uma opinião unidirecional sobre todos os demais, representada por um valor que vai de #N -100#! a #P +100#!.\n\nA opinião que outro personagem tem sobre você é de importância crucial, pois ela conduzirá seu comportamento!\n\nTenha muito cuidado com as opiniões dos [Concept( 'powerful_vassals', 'vassalos poderosos' )|E], [Concept( 'spymaster', 'mestres-espiões' )|E] e [Concept( 'spouse', 'cónyuges' )|E]."
 game_concept_faction: "Facção"
 game_concept_factions: "Facções"
 game_concept_faction_desc: "Uma facção é um grupo de [vassals|El] com interesses políticos comuns. A população local dos [counties|El] também pode se juntar a certos tipos de facções, como a facção camponesa.\n\nAs facções se tornam perigosas quando seu [Concept( 'faction_discontent', 'descontentamento' )|E] chega a certo ponto, momento em que apresentarão um ultimato.\n\nSe o [liege|El] não aceitar, a facção se rebelará e uma [civil_war|El] será desencadeada. Se a facção se dissolver, o senhor deverá ter uma [war_score|El] mínima de [GetDefine( 'NFaction', 'MIN_WARSCORE_FOR_VICTORY_ON_FACTION_INVALIDATION' )|V0] para vencer a guerra."
 game_concept_faction_discontent: "Descontentamento"
 game_concept_discontent: "Descontentamento"
 game_concept_faction_discontent_desc: "O descontentamento indica o quão perto está uma [Concept( 'faction', 'facción' )|E] de lançar um ultimato.\n\nSe o [Concept( 'military_power', 'poder militar' )|E] de uma facção atingir o limite, seu descontentamento aumentará a cada mês. Se esse poder militar permanecer abaixo desse limite, o descontentamento diminuirá. O descontentamento de uma facção poderosa cresce muito rapidamente."
 game_concept_military_power: "Poder Militar"
 game_concept_faction_military_power: "Poder Militar da Facção"
 game_concept_faction_military_power_desc: "O poder militar da facção mede a força militar de uma [Concept( 'faction', 'facción' )|E] em relação ao seu objetivo.\n\nCada membro da facção soma toda a sua força à facção enquanto permanecer nela. Se o objetivo da facção for o [Concept( 'liege', 'senhor' )|E] de um membro da facção, a força do membro também será subtraída do poder relativo do senhor."
 game_concept_scheme: "Esquema"
 game_concept_scheming: "Esquematizando"
 game_concept_schemes: "Esquemas"
 game_concept_scheme_desc: "Uma conspiração é uma tentativa de afetar o mundo ao seu redor a longo prazo. Conspirações podem ter como alvo [characters|lE], [titles|lE], [cultures|lE] e [faiths|lE] e vêm em quatro tipos: [Concept( 'personal', 'pessoais' )|E], [Concept( 'scheme_hostile', 'hostis' )|E], [Concept( 'political', 'políticas' )|E] e [Concept( 'contract_schemes', 'de contrato' )|E].\n\nA [success_chance|lE] da sua conspiração cresce com o tempo, dependendo de quão habilidoso você à na [skill|lE] associada, e também pode ser influenciada pelos [agents|lE] com os quais você trama a sua conspiração.\n\n#WEAK As [secret_schemes|lE] ficam ocultas de seu alvo, mas podem ser descobertas se sua [secrecy|lE] for baixa. #!"
 game_concept_scheme_countermeasure: "Foco de Contramedida"
 game_concept_scheme_countermeasures: "Focos de Contramedida"
 game_concept_scheme_countermeasure_countermeasure: "Contramedida"
 game_concept_scheme_countermeasure_countermeasures: "Contramedidas"
 game_concept_scheme_countermeasure_desc: "Quando suspeitarmos de que há uma [scheme|lE] contra nós, podemos fazer algo a respeito: direcionar todas as defesas contra um tipo de conspiração à custa das demais.\n\nPor causa disso, apenas uma pode ficar ativa por vez, e reforçar as defesas em uma área implica desviar a atenção de outra.\n\nPodem ser empregadas para reduzir a [secrecy|lE] ou ajustar a [success_chance|lE] de diferentes grupos de $game_concept_schemes$. Podem nos dar tempo ou reforçar nossas defesas, mas trazem desvantagens que farão com que não queiramos ter uma sempre ativa."
 game_concept_scheme_precaution: "Medida Extra"
 game_concept_scheme_precautions: "Medidas Extras"
 game_concept_scheme_precaution_precaution: "Medida"
 game_concept_scheme_precaution_precautions: "Medidas"
 game_concept_scheme_precaution_desc: "Nem todos os [characters|lE] conseguem executar uma $game_concept_scheme$ apenas com [skill|lE]; quando o [scheme_target_target|lE] à forte demais, pagar por $game_concept_scheme_precautions$ pode ajudar a compensar uma fraqueza às custas de outra.\n\n#WEAK As $game_concept_scheme_precaution_precautions$ são opcionais: use-as taticamente.#!"
 game_concept_personal_scheme: "Esquema Pessoal"
 game_concept_personal_schemes: "Esquemas Pessoais"
 game_concept_personal: "Pessoal"
 game_concept_personal_scheme_desc: "Os $game_concept_personal_schemes$ são [schemes|El] que buscam alcançar uma situação entre [scheme_owner|lE] e [scheme_target|lE].\n\nExemplos de $game_concept_personal_schemes$ são:\n$BULLET_WITH_TAB$[GetScheme('sway').GetTypeName]\n$BULLET_WITH_TAB$[GetScheme('befriend').GetTypeName]\n$BULLET_WITH_TAB$[GetScheme('seduce').GetTypeName]\n$BULLET_WITH_TAB$[GetScheme('elope').GetTypeName]"
 game_concept_scheme_owner: "Dono do Esquema"
 game_concept_schemer: "Conspirador"
 game_concept_scheme_owners: "Donos de Esquema"
 game_concept_scheme_owner_owner: "Dono"
 game_concept_scheme_owner_desc: "O $game_concept_scheme_owner_owner$ do $game_concept_scheme$ é aquele [character|lE] que trama intrigas contra o [Concept( 'scheme_target', 'alvo da trama' )|E].\n\n#WEAK Por exemplo, o pretenso assassino em uma $game_concept_scheme$ de [GetScheme('murder').GetTypeName|l].#!"
 game_concept_scheme_target: "Alvo do Esquema"
 game_concept_scheme_targets: "do Alvo do Esquema"
 game_concept_scheme_target_target: "Alvo"
 game_concept_scheme_target_desc: "O $game_concept_scheme_target_target$ de uma $game_concept_scheme$ é aquele [character|lE] contra o qual o [Concept( 'scheme_owner', 'líder da trama' )|E] trama intrigas.\n\n#WEAK Por exemplo, a vítima potencial em uma $game_concept_scheme$ de [GetScheme('murder').GetTypeName|l].#!"
 game_concept_secret_scheme: "Esquema Secreto"
 game_concept_secret_scheme_single: "Secreto"
 game_concept_secret_schemes: "Esquemas Secretos"
 game_concept_secret_scheme_desc: "Uma conjura secreta à [Concept( 'scheme', 'aquela' )|E] que progride às escondidas do [Concept( 'scheme_target', 'alvo da conjura' )|E].\n\nNo entanto, pode ser descoberta, o que reduz a [Concept( 'success_chance', 'probabilidade de sucesso' )|E] e aumenta a possibilidade de que o [Concept( 'scheme_owner', 'líder da conjura' )|E] seja descoberto quando essa conjura for executada.\n\nOs [Concept( 'agent', 'agentes' )|E] recrutados para uma conjura secreta têm a possibilidade de ser [Concept( 'agent_discovery_discovered', 'descobertos' )|E]."
 game_concept_agent: "Agente"
 game_concept_agents: "Agentes"
 game_concept_agent_i: "@scheme_agent_icon!"
 game_concept_agents_desc: "Um agente é um participante em uma [scheme|lE] que pode fornecer um dos três benefécios. Eles podem aumentar sua [success_chance|lE], reduzir a [scheme_speed_single|lE] ou melhorar o [secrecy|lE]. Somente os [courtiers|lE], [guests|lE] e [Concept( 'direct_vassals', 'vassalos diretos' )|E] do alvo da conjura podem ser recrutados como agentes.\n\nPara uma conjura [Concept( 'scheme_hostile', 'hostil' )|E] hostil, ter agentes próximos ao alvo à muito importante. Por exemplo, [councillors|lE] ou [Concept( 'close_family', 'familiares próximos' )|E] do alvo da conjura contribuem mais para a velocidade da conjura e para sua chance de sucesso.\n\nSer um agente em uma [scheme_hostile|lE] hostil é um [crime|lE] e os agentes correm o risco de serem [Concept( 'agent_discovery_discovered', 'descobertos' )|E]."
 game_concept_agent_discovery: "Descoberta de Agente"
 game_concept_agent_discovery_discovered: "Descoberto"
 game_concept_agent_discovery_desc: "Aos [agents|lE] descobertos de [Concept( 'secret_scheme', 'conjuras secretas' )|E], seu [liege|lE] os considera [criminals|lE] e, por isso, podem acabar [Concept( 'imprisoned', 'encarcelados' )|E]."
 game_concept_scheme_discovery_chance: "Chance de Descoberta do Esquema"
 game_concept_scheme_discovery_chance_desc: "Esse número é deduzido diretamente da pontuação de [secrecy|lE] de qualquer [secret_scheme|lE] contra você ou seus [courtiers|lE].\n\n#WEAK $game_concept_secrecy$ é verificado quando um $game_concept_scheme$ é executado, e a uma taxa reduzida uma vez por mês.#!"
 game_concept_predicted_scheme_difficulty: "Dificuldade Prevista do Esquema"
 game_concept_predicted_difficulty: "Dificuldade Prevista"
 game_concept_predicted_scheme_difficulty_desc: "Muitos fatores entram em uma [scheme|lE] de sucesso, alguns dos quais só podem ser conhecidos quando ela começa e são recrutados [agents|lE].\n\nEmbora qualquer $game_concept_scheme$ seja possível, muitas podem ser custosas.\n\nOs cinco níveis de dificuldade são:\n$EFFECT_LIST_BULLET$$scheme_odds_prediction_level_excellent$ #WEAK é provavelmente fécil, rápido e discreto#!\n$EFFECT_LIST_BULLET$$scheme_odds_prediction_level_high$ #WEAK exige esforço mánimo#!\n$EFFECT_LIST_BULLET$$scheme_odds_prediction_level_medium$ #WEAK exige alguns subornos podem ser necessórios#!\n$EFFECT_LIST_BULLET$$scheme_odds_prediction_level_low$ #WEAK é o sucesso será caro#!\n$EFFECT_LIST_BULLET$$scheme_odds_prediction_level_abysmal$ #WEAK é o sucesso é improvável e custoso#!"
 game_concept_prevented_murder: "Assassinato Impedido"
 game_concept_prevented_murder_prevent: "Impedir"
 game_concept_prevented_murder_desc: "Muito raramente, certas situações na vida do [scheme_target_target|lE] de um [GetScheme('murder').GetTypeName|l] podem provocar o fracasso de uma [scheme|lE] durante as etapas finais de sua execução.\n\nIsso anula a [success_chance|lE].\n\n#WEAK Os exemplos incluem a intervenção de um guarda-costas, um provador, uma donzela escudeira ou um mascote leal.#!"
 game_concept_political_scheme: "Esquema Político"
 game_concept_political_schemes: "Esquemas Políticos"
 game_concept_political: "Político"
 game_concept_political_scheme_desc: "[SelectLocalization( HasDlcFeature( 'all_under_heaven' ), 'game_concept_political_scheme_desc_tgp', 'game_concept_political_scheme_desc_default' )]"
 game_concept_political_scheme_desc_default: "As $game_concept_political_schemes$ incluem todas as [Concept( 'schemes', 'conjuras' )|E] empregadas exclusivamente por [administrative_governments|lE]. Incluem:\n$BULLET_WITH_TAB$[GetScheme('challenge_status').GetTypeName]\n$BULLET_WITH_TAB$[GetScheme('depose').GetTypeName]\n$BULLET_WITH_TAB$[GetScheme('expand_power_base').GetTypeName]\n$BULLET_WITH_TAB$[GetScheme('generate_claim').GetTypeName]\n$BULLET_WITH_TAB$[GetScheme('promote').GetTypeName]\n$BULLET_WITH_TAB$[GetScheme('slander').GetTypeName]\n"
 game_concept_political_scheme_desc_tgp: "As $game_concept_political_schemes$ incluem [Concept('schemes', 'conjuras')|E] que são sobretudo de natureza política e burocrática, normalmente usadas pelos tipos de governo [Concept('administrative', 'administrativo')|E] e [Concept('mandala_government', 'mandala')|E].\n\nConjuras políticas administrativas:\n$BULLET_WITH_TAB$[GetScheme('challenge_status').GetTypeName]\n$BULLET_WITH_TAB$[GetScheme('depose').GetTypeName]\n$BULLET_WITH_TAB$[GetScheme('expand_power_base').GetTypeName]\n$BULLET_WITH_TAB$[GetScheme('generate_claim').GetTypeName]\n$BULLET_WITH_TAB$[GetScheme('promote').GetTypeName]\n$BULLET_WITH_TAB$[GetScheme('slander').GetTypeName]\n\nConjuras políticas mandala:\n$BULLET_WITH_TAB$[GetScheme('coerce_tributary').GetTypeName]\n"
 game_concept_hostile_scheme: "Esquema Hostil"
 game_concept_scheme_hostile: "Hostil"
 game_concept_hostile_schemes: "Esquemas Hostis"
 game_concept_hostile_scheme_desc: "$game_concept_hostile_schemes$ são [Concept('schemes', 'conjuras')|E] que visam causar dano a um [character|lE]. A maioria das conjuras hostis utiliza a [secrecy|lE].\n\nExemplos de $game_concept_hostile_schemes$ são:\n$BULLET_WITH_TAB$[GetScheme('murder').GetTypeName]\n$BULLET_WITH_TAB$[GetScheme('abduct').GetTypeName]\n$BULLET_WITH_TAB$[GetScheme('claim_throne').GetTypeName]\n$BULLET_WITH_TAB$[GetScheme('fabricate_hook').GetTypeName]"
 game_concept_scheme_phase: "Fase do Esquema"
 game_concept_scheme_phases: "Fases do Esquema"
 game_concept_scheme_phase_phase: "Fase"
 game_concept_scheme_phase_phases: "Fases"
 game_concept_scheme_phase_desc: "A $game_concept_scheme_phase_phase$ é o tempo necessório para aumentar #EMP uma vez#! a [scheme_success_chance|lE].\n\nA cada $game_concept_scheme_phase_phase$, a $game_concept_scheme$ ganhará uma [scheme_opportunity_opportunity|lE]. A [scheme_speed_single|lE] pode ser reduzida ao nomear [agents|lE], e aumenta pela [scheme_resistance|lE] do alvo."
 game_concept_secret: "Segredo"
 game_concept_secrets: "Segredos"
 game_concept_secret_desc: "Segredos são coisas que os personagens não desejam que os outros saibam porque são embaraçosos, imorais ou diretamente [Concept( 'criminal', 'criminoso' )|E].\n\nSegredos podem ser descobertos por meio da [Concept( 'councillor_task', 'tarefa de conselheiro' )|E] \"$task_find_secrets$\" do [Concept( 'spymaster', 'mestre-espião' )|E]. Quando você descobre o segredo de alguém, pode [Concept( 'blackmail', 'chantagear' )|E] o personagem para obter um [Concept( 'hook', 'gancho' )|E]."
 #RANKS/TIERS
 game_concept_barony: "Baronia"
 game_concept_baronies: "Baronias"
 game_concept_barons: "Barões"
 game_concept_baron: "Barão"
 game_concept_barony_desc: "$game_concept_barony$ é um [title|El] do [title_tier|El] mais baixo.\n\nAs $game_concept_baronies$ têm a menor presença no mapa e se organizam em [counties|El] de maior tamanho.\n\nOs $game_concept_titles$ de baronia que contiverem uma [holding|El] sempre deverão ter um [holder|El]."
 game_concept_baron_desc: "$game_concept_baron$ é aquele [ruler|El] cujo [primary_title|El] é uma [barony|El].\n\nSeu [rank|El] é o mais baixo possível, logo abaixo do de [count|El]. Portanto, não pode ter [vassals|El] e qualquer não-barão pode ser seu [liege|El]."
 game_concept_county: "Condado"
 game_concept_counties: "Condados"
 game_concept_count: "Conde"
 game_concept_counts: "Condes"
 game_concept_county_desc: "Um condado é um [title|El] um [title_tier|lE] abaixo de um [duchy|El] e um acima de um [barony|lE].\n\nO título inclui a [Concept( 'county_capital', 'capital do condado' )|El], bem como direitos [de_jure|El] sobre todas as baronias do $game_concept_county$.\n\nOs condados sempre terão [holders|El] porque os $game_concept_county_capitals$ não podem ser destruídos."
 game_concept_count_desc: "Um $game_concept_count$ é um [ruler|El] cujo [primary_title|El] é um [county|El].\n\nSeu [rank|El] está apenas acima dos [barons|El] e diretamente abaixo dos [dukes|El], e assim ele pode ter $game_concept_barons$ como [vassals|El] e um $game_concept_duke$ ou superior como [liege|lE]."
 game_concept_duchy: "Ducado"
 game_concept_duchies: "Ducados"
 game_concept_duke: "Duque"
 game_concept_dukes: "Duques"
 game_concept_duchy_desc: "$game_concept_duchy$ é um [title|El] um [title_tier|lE] abaixo de [kingdom|El] e outro acima de [county|El].\n\nO [holder|El] de um ducado tem direitos [de_jure|El] sobre os $game_concept_counties$ que o constituem, e entre seus [vassals|El] pode haver condes.\n\nOs ducados podem estar latentes e não ter titular em um dado momento, mas um [ruler|El] que controle ao menos a metade de seus condados pode criar esta $game_concept_title_succession$."
 game_concept_duke_desc: "Um $game_concept_duke$ é um [ruler|El] cujo [primary_title|El] é um [duchy|El].\n\nSeu [rank|El] está diretamente acima dos [counts|El] e diretamente abaixo dos [kings|El], e assim ele pode ter $game_concept_counts$ como [vassals|El] e um $game_concept_king$ ou superior como [liege|El]."
 game_concept_kingdom: "Reino"
 game_concept_kingdoms: "Reinos"
 game_concept_king: "Rei"
 game_concept_kings: "Reis"
 game_concept_kingdom_desc: "$game_concept_kingdom$ é um [title|lE] com um [title_tier|El] abaixo de [empire|lE] e um acima de [duchy|lE].\n\nO [holder|lE] de um reino tem direitos [de_jure|lE] sobre os territórios que o constituem.\n\nAlguns $game_concept_kingdoms$ podem ficar adormecidos e não ter um $game_concept_holder$ no momento. Um [ruler|lE] que controle pelo menos metade dos condados que o constituem pode criar estes $game_concept_titles$."
 game_concept_king_desc: "$game_concept_king$ é aquele [ruler|El] cujo [primary_title|El] é um [kingdom|El].\n\nSua [rank|El] é superior ao dos [dukes|El] e inferior ao dos [emperors|El]; portanto, pode ter como [vassals|El] a duques e inferiores, e como [liege|El] a um $game_concept_emperor$ ou superior."
 game_concept_empire: "Império"
 game_concept_empires: "Impérios"
 game_concept_emperor: "Imperador"
 game_concept_emperors: "Imperadores"
 game_concept_empire_desc: "$game_concept_empires$ é um [title|El] com um [title_tier|El] abaixo de [hegemony|El] e um acima de [kingdom|El].\n\nO [holder|El] de um império tem direitos [de_jure|El] sobre seu território constitutivo e pode ter como [vassals|El] a [kings|El].\n\nOs $game_concept_empires$ podem estar adormecidos e não ter nenhum $game_concept_holder$ no momento. Esses [ruler|El] que controlam mais de 80 % dos [counties|El] dentro dele podem ser criados por um $game_concept_titles$."
 game_concept_emperor_desc: "Um $game_concept_emperor$ é um [ruler|El] cujo [primary_title|El] é um [empire|lE].\n\nSeu [rank|El] está diretamente acima dos [kings|El] e diretamente abaixo dos [hegemons|El], e assim ele pode ter $game_concept_kings$ e inferiores como [vassals|El], e apenas um $game_concept_hegemon$ como [liege|El]."
 game_concept_hegemony: "Hegemonia"
 game_concept_hegemonies: "Hegemonias"
 game_concept_hegemon: "Hegemão"
 game_concept_hegemons: "Hegemões"
 game_concept_hegemony_desc: "Uma $game_concept_hegemony$ é um [title|lE] do mais alto [title_tier|El].\n\nO [holder|lE] de uma $game_concept_hegemony$ tem direitos [de_jure|lE] sobre seu território constituinte e pode ter [emperors|El] como [vassals|lE]."
 game_concept_hegemon_desc: "$game_concept_hegemon$ é aquele [ruler|El] cujo [primary_title|El] é uma [hegemony|El].\n\nSeu [rank|El] é o mais alto possível, diretamente acima dos [emperors|El]. Portanto, pode ter como [vassal|El] qualquer um que não seja $game_concept_hegemon$, e nunca terá um [liege|El]."
 game_concept_culture: "Cultura"
 game_concept_cultures: "Culturas"
 game_concept_culture_possessive: "da Cultura"
 game_concept_cultural: "Cultural"
 game_concept_culture_desc: "A cultura representa o idioma e os costumes de um personagem ou de um [Concept( 'county', 'condado' )|E].\n\nPersonagens de culturas diferentes terão piores [Concept( 'opinions', 'opiniões' )|E] uns dos outros. Essa penalização pode ser reduzida aumentando a [cultural_acceptance|lE]."
 game_concept_culture_i: "@culture_icon!"
 game_concept_religion: "Religião"
 game_concept_religions: "Religiões"
 game_concept_religion_desc: "Uma $game_concept_religion$ pode consistir em muitas denominações diferentes, chamadas [faiths|lE]. As Religiões, por sua vez, pertencem a uma de quatro [religious_families|lE] maiores: [GetReligionFamily('rf_abrahamic').GetName], [GetReligionFamily('rf_eastern').GetName], [GetReligionFamily('rf_sinitic').GetName] ou [GetReligionFamily('rf_pagan').GetName]."
 game_concept_heresy: "Heresia"
 game_concept_heresies: "Heresias"
 game_concept_heresy_desc: "Quando o [Concept( 'fervor', 'fervor' )|E] de uma [Concept( 'faith', 'fé' )|E] está baixo, pode surgir uma heresia. Quando isso acontece, um [Concept( 'ruler', 'governante' )|E] da fé com baixo fervor se converterá a outra fé e, a partir de então, será um [GetTrait('heresiarch').GetName( GetNullCharacter )|l]. Então, espalhará sua nova fé por seus [Concept( 'counties', 'condados' )|E] e entre seus [Concept( 'vassals', 'vassalos' )|E].\n\nSe o surto for menor, ele terminará aí. Se for um surto maior, mais governantes da mesma área também se converterão. Se você estiver nessa área, também terá a opção de se converter, caso assim deseje."
 game_concept_faith: "Fé"
 game_concept_faiths: "Fés"
 game_concept_faithpossessive: "da Fé"
 game_concept_faith_desc: "A Fé é a denominação específica de uma [religion|lE] maior. Todos os personagens e [counties|lE] têm uma Fé, assim como têm uma [culture|lE].\n\nCada Fé é definida por um conjunto de [doctrines|lE] com consequências amplas para seus adeptos.\n\nToda Fé também tem um valor de [fervor|lE] que controla o quão vulnerável ela é à [heresy|lE] (que consiste na conversão de [rulers|lE] e condados para outra Fé dentro da mesma religião)."
 game_concept_tolerance: "Tolerância"
 game_concept_tolerate: "Tolerar"
 game_concept_tolerates: "Tolera"
 game_concept_fervor: "Fervor"
 game_concept_fervor_desc: "O fervor de uma [faith|lE] varia de #V 0#! a #V 100 %#!. Um fervor baixo facilita que os [rulers|lE] criem novas fés próprias e aumenta a probabilidade de que os [counties|lE] e personagens se convertam a outras fés, incluindo [heresies|lE]. Um fervor alto acelera a velocidade de conversão dos condados.\n\nO fervor muda naturalmente com o tempo. Fés menores tendem a ter fervor mais alto, e fés maiores tendem a ter fervor mais baixo.\n\nLançar Grandes Guerras Santas e vencer Guerras Santas diminuirá o fervor, enquanto ser o alvo delas aumentará o fervor. Surtos de [heresy|lE] aumentarão significativamente o fervor."
 game_concept_doctrine: "Doutrina"
 game_concept_doctrines: "Doutrinas"
 game_concept_doctrines_desc: "As doutrinas podem ser consideradas leis religiosas que determinam o comportamento aceitável dentro de uma [Concept( 'faith', 'fé' )|E]."
 game_concept_gender_doctrines: "Doutrinas de Gênero"
 game_concept_gender_doctrines_desc: "Estas [Concept( 'doctrines', 'doutrinas' )|E] determinam quais [Concept( 'gender_laws', 'leis de gênero' )|E] estão disponíveis para os personagens da [Concept( 'faith', 'fé' )|E].\n\nTambém determinam certas regras adicionais, como quais [Concept( 'claims', 'direitos' )|E] podem ser herdados, quem pode ser [Concept( 'commanders', 'comandantes' )|E] e [Concept( 'knights', 'cavaleiros' )|E], e a qual [Concept( 'house', 'casa' )|E] um [Concept( 'bastard', 'bastardo' )|E] pertencerá, de acordo com quem sejam seus pais.\n\nAs doutrinas de gênero são:\n$BULLET_WITH_TAB$Dominado por homens\n$BULLET_WITH_TAB$Igual\n$BULLET_WITH_TAB$Dominado por mulheres"
 game_concept_realm_capital: "Capital do Reino"
 game_concept_realm_capitals: "Capitais do Reino"
 game_concept_realm_capital_possessive: "da Capital do Reino"
 game_concept_capital: "Capital"
 game_concept_capitals: "Capitais"
 game_concept_capital_possessive: "da Capital"
 game_concept_realm_capital_desc: "A capital do reino é a [Concept( 'holding', 'posse' )|E] onde reside um [Concept( 'ruler', 'governante' )|E] e sua [Concept( 'court', 'corte' )|E]. Esta posse tem um bônus de [tax|lE] e é sempre herdada pelo [Concept( 'primary_heir', 'herdeiro principal' )|E].\n\nA [Concept( 'occupy', 'ocupação' )|E] da capital do reino inimigo durante uma guerra concede uma [Concept( 'war_score', 'pontuação de guerra' )|E] significativa e, às vezes, permite [Concept( 'imprison', 'encarcerar' )|E] a membros da família do inimigo."
 game_concept_county_capital: "Capital do Condado"
 game_concept_county_capitals: "Capitais do Condado"
 game_concept_county_capital_desc: "A capital do condado é a [Concept( 'holding', 'posesión' )|E] principal de um [Concept( 'county', 'condado' )|E]. Esta posse não pode ser destruída nem [Concept( 'leased', 'arrendada' )|E] e sempre estará em posse do [Concept( 'ruler', 'governante' )|E] que tenha o [Concept( 'title', 'título' )|E] do condado.\n\nAs capitais do condado permitem a construção de mais [Concept( 'buildings', 'edifécios' )|E] do que uma posse menor."
 game_concept_de_jure_capital: "Capital De Jure"
 game_concept_de_jure_capital_desc: "A capital de iure de um [title|lE] é a capital histórica de um [county|lE]. Você sempre pode escolher mover sua [realm_capital|lE] para a capital de iure do seu [primary_title|lE], mesmo que ela já tenha sido movida."
 game_concept_capital_duchy: "Ducado da Capital"
 game_concept_capital_duchy_desc: "O modificador da capital do ducado aumenta a quantidade de [Concept( 'levies', 'levas' )|E] que podem ser obtidas de todas as [holdings|lE] que possuirmos no mesmo [duchy|lE] [de_jure|lE] da nossa [capital|lE]. Além disso, concede um bônus a todos os [men_at_arms|lE] [Concept( 'stationed', 'estacionados' )|lE]. Para que este modificador fique ativo, à necessório possuir pessoalmente o ducado associado.\n\nEste modificador não se acumula com o bônus da capital do dománio."
 game_concept_liege: "Suserano"
 game_concept_lieges: "Suseranos"
 game_concept_liege_possessive: "do Suserano"
 game_concept_liege_desc: "Um suserano é aquele [Concept( 'ruler', 'governante' )|E] que tem ao menos um [Concept( 'vassal', 'vassalo' )|E]. Os suseranos podem ser, por sua vez, vassalos de governantes de patente ainda maior, e assim por diante."
 game_concept_rightful_liege: "Suserano Legítimo"
 game_concept_rightful_liege_desc: "$game_concept_rightful_liege_desc_part1$\n\n$game_concept_rightful_liege_desc_part2$"
 game_concept_rightful_liege_desc_part1: "O senhor legítimo de um [vassal|lE] é aquele [ruler|lE] que possui o [title|lE] direto de [liege|lE] [de_jure|lE] do [primary_title|lE] do título primário do vassalo. Se um vassalo não estiver sob seu senhor legítimo, contribuirá com menos [taxes|lE] e [levies|lE], além de sofrer uma penalidade de [opinion|lE] para com seu senhor. Possuir um título de tier mais alto de [title_tier|lE] do mesmo título de jure reduzirá as penalidades.\n\nUma exceção a isso são os [dukes|lE] que fazem parte da hierarquia de jure de um [empire|lE] e são diretamente vassalos de seu imperador. Ainda contribuirão integralmente, exatamente como se o imperador detivesse seu [Concept( 'kingdom', 'rey' )|E] de jure."
 game_concept_rightful_liege_desc_part2: "#weak Exemplo: O Conde de $c_dunbar$ é um vassalo direto do Rei de $k_england$. Como o Rei não é nem Duque de $d_lothian$, nem Rei de $k_scotland$, nem Imperador de $e_britannia$, o Conde de $c_dunbar$ contribui apenas com uma pequena quantidade de seus impostos e levas.\n\nO Conde de $c_norfolk$ também é um vassalo direto do Rei de $k_england$. O Rei não detém o Ducado de $d_norfolk$, então o Conde também contribui com impostos e levas reduzidos. No entanto, como $k_england$ é o Reino De Jure de $c_norfolk$, o Conde de $c_norfolk$ ainda contribui com significativamente mais impostos e levas ao Rei do que o Conde de $c_dunbar$.#!"
 game_concept_megaduke_penalty: "Sobre-extensão"
 game_concept_megaduke_penalty_desc: "Quando você à [duke|lE] e tem mais de [GetDefine('NCharacter', 'MAX_COUNTIES_IN_REALM_AS_DUKE')] [counties|lE] em seu [realm|lE], você sofrerá uma penalidade de megaduque, reduzindo sua renda de [Concept( 'tax', 'impostos' )|E].\n\nSe você alcançar o [rank|lE] de [king|lE] ou [emperor|lE], essa penalidade será removida."
 game_concept_top_liege: "Suserano Supremo"
 game_concept_top_lieges: "Suseranos Supremos"
 game_concept_top_liege_possessive: "do Suserano Supremo"
 game_concept_top_liege_desc: "O suserano principal é aquele [Concept( 'liege', 'suserano' )|E] no topo da hierarquia dos [Concept( 'vassals', 'vassalos' )|E].\n\nSão [Concept( 'rulers', 'governantes' )|E] totalmente [Concept( 'independent', 'independentes' )|E] que não respondem a nenhum mortal."
 game_concept_top_realm: "Reino Supremo"
 game_concept_top_realm_desc: "O reino principal é o [Concept( 'realm', 'senhorio' )|E] do [Concept( 'top_liege', 'senhor principal' )|E]."
 game_concept_domain: "Domínio"
 game_concept_domains: "Domínios"
 game_concept_domain_i: "@domain_icon!"
 game_concept_domain_desc: "O domínio de um [Concept( 'ruler', 'governante' )|E] é o conjunto de todas as [Concept( 'holdings', 'propriedades' )|E] que possui.\n\nO caráter estático do [Concept( 'domain_limit', 'limite de domínio' )|E] implica que os governantes deverão recorrer aos seus [Concept( 'vassals', 'vassalos' )|E] para aumentar o tamanho do seu [Concept( 'realm', 'senhorio' )|E] a partir de determinado momento."
 game_concept_regiment: "Regimento"
 game_concept_regiments: "Regimentos"
 game_concept_regiment_desc: "Um regimento é um grupo de [soldiers|lE] de um único tipo (por exemplo, arqueiros, infantaria, [levies|lE]…). Embora as levas sejam organizadas em regimentos, os que realmente interessam são os [men_at_arms|lE]."
 game_concept_realm: "Reino"
 game_concept_realms: "Reinos"
 game_concept_realm_possessive: "do Reino"
 game_concept_realm_desc: "Um reino corresponde a todas as terras que um [Concept( 'ruler', 'governante' )|E] controla diretamente ou por meio de [Concept( 'vassals', 'vassalos' )|E]. Ao contrário dos [Concept( 'domain', 'domínios' )|E] que incluem apenas as [Concept( 'holdings', 'propriedades' )|E] pessoais de um governante."
 game_concept_gold: "Ouro"
 game_concept_gold_desc: "'Ouro' representa, na verdade, todos os ativos líquidos de um Personagem; sua riqueza. Ele pode ser gasto em muitas coisas, principalmente na construção de [buildings|lE], no pagamento de [regiments|lE] e na criação de [titles|lE]."
 game_concept_gold_i: "@gold_icon!"
 game_concept_income: "Renda"
 game_concept_income_desc: "Há muitas formas de conseguir [Concept( 'gold', 'ouro' )|E], mas as duas mais importantes são a [Concept( 'taxation', 'tributação' )|E] das [Concept( 'holdings', 'propriedades' )|E] próprias e as dos [Concept( 'vassals', 'vassalos' )|E]."
 game_concept_trait: "Traço"
 game_concept_traits: "Traços"
 game_concept_trait_desc: "O traço de um personagem descreve sua personalidade, peculiaridades, feitos e estado de ser.\n\nOs traços podem ter muitos efeitos, mas muitos afetam as [Concept( 'skills', 'habilidades' )|E] de um personagem.\n\nOs traços de personalidade também afetam de forma muito significativa o comportamento que se pode esperar de um personagem. Agir contra a própria Personalidade causa [Concept( 'stress', 'estrés' )|E].\n\nAlguns traços são [Concept( 'congenital', 'congénitos' )|E] e podem ser herdados pelos descendentes."
 game_concept_spouse: "Cônjuge"
 game_concept_spouses: "Cônjuges"
 game_concept_spouse_possessive: "do Cônjuge"
 game_concept_spouse_desc: "O cônjuge é o esposo ou esposa de um personagem como resultado de um [marriage|lE].\n\nPara ter descendência llegítima e [heirs|lE], à necessório ter um cônjuge ou [Concept( 'concubine', 'concubino/a' )|E] (embora se possam legitimar os [bastards|lE]).\n\nA única forma de forjar uma [alliance|lE] à por meio de casamento ou [betrothal|lE]; seja o seu ou o de um parente próximo.\n\nO cônjuge (principal) também será membro do [council|lE] e poderá realizar muitas [councillor_tasks|lE] úteis.\n\nAs [doctrines|lE] da [faith|lE] determinaráo quantos cônjuges você pode ter e como eles podem se [Concept( 'divorced', 'divorciar' )|E]."
 game_concept_primary_spouse: "Cônjuge Principal"
 game_concept_primary_spouse_desc: "Em [faiths|lE] de [GetFaithDoctrine('doctrine_polygamy').GetBaseName], [rulers|lE] devem escolher um de seus [spouses|lE] para ser seu $game_concept_primary_spouse$. O $game_concept_primary_spouse$ de um governante ganha [fertility|lE] aumentada com ele, [opinion|lE] aumentada dele e pode servir em seu [council|lE]."
 game_concept_available_spouse: "Cônjuge Disponível"
 game_concept_available_spouse_desc: "Para servir no [Concept( 'council', 'conselho' )|E] do governante, um [spouse|lE] deve estar disponível para cumprir as responsabilidades desse cargo.\n\nPodem ocorrer várias circunstâncias que impeçam um cônjuge de cumprir essas responsabilidades, entre elas:\n$BULLET_WITH_TAB$Ser [ruler|El] de seu próprio [realm|lE]\n$BULLET_WITH_TAB$Residir na [court|lE] de outro governante\n$BULLET_WITH_TAB$Estar [Concept( 'imprisonment', 'encarcelado' )|E], no país ou no exterior\n$BULLET_WITH_TAB$Ter o [trait|lE] [GetTrait('incapable').GetName( GetNullCharacter )|l]\n\nSe um cônjuge voltar a ficar disponível, retomará automaticamente seus deveres no conselho.\n\nOs cônjuges que sejam governantes por direito próprio ainda podem servir no conselho se forem [direct_vassals|lE] nossos. Caso contrário, nunca serão considerados disponíveis."
 game_concept_holding: "Propriedade"
 game_concept_holdings: "Propriedades"
 game_concept_holding_desc: "Uma posse é o assentamento principal de uma [Concept( 'barony', 'baronia' )|E] ou [Concept( 'county_capital', 'capital condal' )|E].\n\nFornece [Concept( 'taxes', 'impostos' )|E] e [Concept( 'levies', 'levas' )|E] ao seu [Concept( 'holder', 'titular' )|E], dependendo do seu [Concept( 'holding_type', 'tipo de posesión' )|E]. O conjunto de posses que um [Concept( 'ruler', 'governante' )|E] possui pessoalmente é chamado de [Concept( 'domain', 'domínio' )|E]."
 game_concept_holding_type: "Tipo de Propriedade"
 game_concept_holding_types: "Tipos de Propriedade"
 game_concept_holding_type_desc: "Há quatro tipos de [holdings|lE]: [castles|lE], [cities|lE], [tribes|lE] e [temples|lE]. Cada tipo permite diferentes tipos de [buildings|lE]. A [government_form|lE] de um [ruler|lE] determina quais tipos de Propriedade o Governante pode possuir pessoalmente sem penalidade. No caso dos Templos, as [doctrines|lE] de sua [faith|lE] também podem desempenhar um papel."
 game_concept_castle_holding: "Propriedade de Castelo"
 game_concept_castle: "Castelo"
 game_concept_castles: "Castelos"
 game_concept_castle_holdings: "Propriedades de Castelo"
 game_concept_castle_holding_desc: "Os castelos são o [Concept( 'holding_type', 'tipo de posse' )|E] mais fortificado e o tipo padrão para [Concept( 'ruler', 'governantes' )|E] [Concept( 'feudal', 'feudais' )|E], [Concept( 'tribal', 'tribais' )|E] e [Concept( 'clan', 'de clãs' )|E], assim como para [Concept( 'holy_orders', 'ordens militares' )|E]. Costumam fornecer mais [Concept( 'levies', 'recrutas' )|E] que [Concept( 'taxes', 'impostos' )|E]."
 game_concept_temple_holding: "Propriedade de Templo"
 game_concept_temple: "Templo"
 game_concept_temples: "Templos"
 game_concept_temple_holdings: "Propriedades de Templo"
 game_concept_temple_holding_desc: "Os templos são o [Concept( 'holding_type', 'tipo de propriedade' )|E] que pode ser mantido por membros do [Concept( 'clergy', 'clero' )|E] como [Concept( 'church_property', 'propriedade eclesiàstica' )|E] (a [Concept( 'government_form', 'forma de governo' )|E] [Concept( 'theocratic', 'teocrática' )|E]). No entanto, em [Concept( 'faiths', 'fés' )|E] com a [Concept( 'doctrine', 'doutrina' )|E] [GetFaithDoctrine('doctrine_theocracy_lay_clergy').GetBaseName|l], qualquer pessoa pode manter Templos sem penalidade.\n\nOs templos fornecem uma mistura bastante equilibrada de [Concept( 'levies', 'levas' )|E] e [Concept( 'taxes', 'impostos' )|E]."
 game_concept_city_holding: "Propriedade de Cidade"
 game_concept_city: "Cidade"
 game_concept_cities: "Cidades"
 game_concept_city_holdings: "Propriedades de Cidade"
 game_concept_tribal_holding: "Propriedade Tribal"
 game_concept_tribal_holdings: "Propriedades Tribais"
 game_concept_tribal_holding_desc: "As tribos são pobres em [Concept( 'taxes', 'impostos' )|E], mas ricas em [Concept( 'levies', 'levas' )|E], [Concept( 'prestige', 'prestágio' )|E] e melhorias de [Concept( 'men_at_arms', 'homens de armas' )|E]. Têm um potencial de melhoria limitado e, embora sejam fortes no início, seu poder diminui à medida que o tempo passa. Apenas os personagens [Concept( 'tribal', 'tribais' )|E] podem possuí-las sem penalidades.\n\nSe existir uma Tribo em um [Concept( 'county', 'condado' )|E], nenhuma outra [Concept( 'holdings', 'propriedade' )|E] poderá ser construída. Os governantes [Concept( 'feudal', 'feudais' )|E] terão de gastar [Concept( 'gold', 'ouro' )|E] para transformar Tribos em [Concept( 'castles', 'castelos' )|E]."
 game_concept_tribe: "Tribo"
 game_concept_tribes: "Tribos"
 game_concept_city_holding_desc: "As cidades são o [Concept( 'holding_types', 'tipo de propriedade' )|E] que mais valor tem e favorecem os [Concept( 'taxes', 'impostos' )|E] em detrimento das [Concept( 'levies', 'levas' )|E]. Eestão associadas às [Concept( 'republics', 'repúblicas' )|E] e mantê-las, como qualquer outra [Concept( 'government_forms', 'forma de governo' )|E] jogável, sempre acarretará uma penalidade."
 game_concept_rally_point: "Ponto de Reunião"
 game_concept_rally_points: "Pontos de Reunião"
 game_concept_rally_point_desc: "Um ponto de reunião é um local de concentração para as [Concept( 'levies', 'levas' )|E] e [Concept( 'men_at_arms', 'homens de armas' )|E] sob seu comando.\n\nEm tempos de [Concept( 'war', 'guerra' )|E] , você pode convocar seus soldados a um ponto de reunião para reunir um [Concept( 'army', 'exército' )|E].\n\nAs levas atribuídas a um ponto de reunião devem vir do seu próprio [Concept( 'domain', 'domínio' )|E] ou dos seus [Concept( 'vassals', 'vassalos' )|E]. Os pontos de reunião podem ser reorganizados, divididos e mesclados como você achar melhor."
 game_concept_piety: "Piedade"
 game_concept_pious: "Piedoso"
 game_concept_piety_i: "[GetLocalPlayerPietyTextIcon]"
 game_concept_piety_desc: "A [Concept( 'piety', 'piedade' )|E] representa a virtude de um personagem.\n\nAgir de forma piedosa (segundo as [doctrines|El] de sua [faith|El]) aumentará a Piedade de um personagem, como no caso de embarcar-se em uma [GetActivityType('activity_pilgrimage').GetName|l].\n\nA Piedade pode ser gasta em vários assuntos religiosos dependendo da [government_form|El], doutrinas etc.\n\nCada vez que um personagem ganha Piedade, ele também avança em direção ao próximo [piety_level|El]."
 game_concept_piety_experience: "Devoção"
 game_concept_piety_experience_desc: "Por cada ponto de devoção que um personagem ganha, aumenta seu progresso rumo ao próximo [Concept( 'piety_level', 'nível de devoção' )|E]. Quando um personagem ganha [Concept( 'piety', 'piedade' )|E], também ganha uma quantidade equivalente de devoção."
 game_concept_maximum_piety_level: "Nível Máximo de Devoção"
 game_concept_maximum_piety_level_desc: "O $game_concept_maximum_piety_level$ representa o mais alto [piety_level|El] que um [ruler|El] pode alcançar em vida. Por padrão, esse nível é [GetModifier( 'piety_level_5' ).GetNameWithTooltip|L].[AddLocalizationIf( GetPlayer.GetGovernment.HasGovernmentFlag( 'government_is_mandala' ), 'maximum_piety_level_mandala')]"
 maximum_piety_level_mandala: "\n\nNo obstante, quando um [ruler|lE] [Concept( 'mandala', 'mandala' )|E] morre de uma maneira aceitável para seu [aspect|El] após alcançar o nível [GetModifier( 'piety_level_5' ).GetNameWithTooltip|L], o [heir|lE] desse governante consegue a capacidade de avançar até o próximo nível de devoção até alcançar o nível [GetModifier( 'piety_level_8' ).GetNameWithTooltip|l]."
 game_concept_piety_level: "Nível de Devoção"
 game_concept_piety_levels: "Nível(is) de Devoção"
 additional_mandala_government_piety_levels: "O [government|lE] [mandala|lE] pode desbloquear Níveis de Devoção adicionais após [GetModifier( 'piety_level_5' ).GetNameWithTooltip|L] até, e incluindo, [GetModifier( 'piety_level_8' ).GetNameWithTooltip|L]. Para alcançar esse grau de divindade, sua Devoção precisa ser comprovada ao longo de gerações."
 game_concept_piety_level_desc: "O nível de piedade de um personagem mede sua virtude e devoção, assim como sua posição em relação aos outros membros de sua [faith|lE].\n\nCada vez que um personagem ganha [piety|lE], ele também progride em direção ao próximo nível de devoção.\n\n[AddLocalizationIf( HasDlcFeature( 'all_under_heaven' ), 'additional_mandala_government_piety_levels' )]\n\nOs níveis são:\n$EFFECT_LIST_BULLET$[GetModifier( 'piety_level_0' ).GetNameWithTooltip|L]\n$EFFECT_LIST_BULLET$[GetModifier( 'piety_level_1' ).GetNameWithTooltip|L]\n$EFFECT_LIST_BULLET$[GetModifier( 'piety_level_2' ).GetNameWithTooltip|L]\n$EFFECT_LIST_BULLET$[GetModifier( 'piety_level_3' ).GetNameWithTooltip|L]\n$EFFECT_LIST_BULLET$[GetModifier( 'piety_level_4' ).GetNameWithTooltip|L]\n$EFFECT_LIST_BULLET$[GetModifier( 'piety_level_5' ).GetNameWithTooltip|L][AddLocalizationIf( HasDlcFeature( 'all_under_heaven' ), 'game_concept_additional_piety_level_desc' )]"
 game_concept_additional_piety_level_desc: "\n$EFFECT_LIST_BULLET$[GetModifier( 'piety_level_6' ).GetNameWithTooltip|L]\n$EFFECT_LIST_BULLET$[GetModifier( 'piety_level_7' ).GetNameWithTooltip|L]\n$EFFECT_LIST_BULLET$[GetModifier( 'piety_level_8' ).GetNameWithTooltip|L]"
 game_concept_prestige: "Prestígio"
 game_concept_prestigious: "Prestigioso"
 game_concept_prestige_i: "@prestige_icon!"
 game_concept_prestige_desc: "O prestígio representa a fama e a posição social de um personagem.\n\nO prestígio pode ser gasto em diversos assuntos mundanos dependendo da [Concept( 'government_form', 'forma de governo' )|E], as [Concept( 'doctrines', 'doutrinas' )|E], etc.\n\nToda vez que um personagem ganha prestígio, também avança em direção ao [Concept( 'prestige_level', 'nivel de prestígio' )|E] seguinte."
 game_concept_prestige_experience_i: "$game_concept_prestige_i$"
 game_concept_prestige_experience: "Fama"
 game_concept_prestige_experience_desc: "Cada ponto de fama que um personagem recebe aumenta seu progresso em direção ao próximo [Concept( 'prestige_level', 'nivel de prestígio' )|E]. Quando um personagem ganha [Concept( 'prestige', 'prestígio' )|E], ele também ganha uma quantidade equivalente de fama."
 game_concept_prestige_level: "Nível de Fama"
 game_concept_prestige_levels: "Níveis de Fama"
 game_concept_prestige_level_desc: "O nível de prestígio de um personagem mede sua reputação geral e como é percebido por todos.\n\nCada vez que um personagem ganha [prestige|lE], também progride em direção ao próximo nível.\n\nOs níveis são:\n$EFFECT_LIST_BULLET$[GetModifier( 'prestige_level_0' ).GetNameWithTooltip|L]\n$EFFECT_LIST_BULLET$[GetModifier( 'prestige_level_1' ).GetNameWithTooltip|L]\n$EFFECT_LIST_BULLET$[GetModifier( 'prestige_level_2' ).GetNameWithTooltip|L]\n$EFFECT_LIST_BULLET$[GetModifier( 'prestige_level_3' ).GetNameWithTooltip|L]\n$EFFECT_LIST_BULLET$[GetModifier( 'prestige_level_4' ).GetNameWithTooltip|L]\n$EFFECT_LIST_BULLET$[GetModifier( 'prestige_level_5' ).GetNameWithTooltip|L]"
 game_concept_dynast: "Chefe da Dinastia"
 game_concept_dynast_desc: "$game_concept_dynast$ é o [house_head|lE] que lidera uma [dynasty|lE] inteira e todas as suas [houses|lE].\n\nO líder da dinastia exerce poderes únicos sobre os membros da dinastia, conhecidos como [dynast_interactions|lE]. O $game_concept_dynast$ também escolhe [dynasty_perks|lE] para seu $game_concept_dynasty$.\n\nNormalmente, o $game_concept_dynast$ é o $game_concept_house_head$ que pode ter mais [soldiers|lE]. Se todos os $game_concept_house_heads$ tiverem o [government|lE] [Concept('administrative', 'administrativo')|lE], o $game_concept_dynast$ será então quem tiver a maior [powerful_family_rating|lE]."
 game_concept_dynasty: "Dinastia"
 game_concept_dynasties: "Dinastias"
 game_concept_dynastic: "Dinástico"
 game_concept_dynasty_members: "Membros da Dinastia"
 game_concept_dynasty_desc: "Uma $game_concept_dynasty$ é um grupo de descendentes [nobles|lE] de um antepassado [Concept( 'landed', 'com terras' )|E], o fundador da dinastia. A [house|lE] original pode se dividir em outras ([cadet_branches|lE]) novas, que fazem parte da dinastia mais ampla.\n\nQuando o personagem do jogador morrer, deverá ter um [player_heir|lE] de sua dinastia ou a partida terminará (embora sempre seja possível escolher outro governante e continuar jogando no mesmo mundo).\n\nAssim como os personagens têm [prestige|lE], as dinastias têm [Concept( 'dynasty_prestige', 'renome' )|E]."
 game_concept_dynast_interaction: "Interação do Chefe da Dinastia"
 game_concept_dynast_interactions: "Interações do Chefe da Dinastia"
 game_concept_dynast_interaction_desc: "Estas interações estáo disponíveis apenas para o [Concept( 'dynast', 'chefe da dinastia' )|E] contra outros membros desta [dynasty|lE].\n\nSeu uso custa [Concept( 'dynasty_prestige', 'Renome' )|E]."
 game_concept_dynasty_prestige: "Renome"
 game_concept_dynasty_prestige_i: "@dynasty_prestige_icon!"
 game_concept_renown: "$game_concept_dynasty_prestige$"
 game_concept_dynasty_prestige_desc: "O renome é como o [Concept( 'prestige', 'prestígio' )|E], mas compartilhado por uma [Concept( 'dynasty', 'dinastia' )|E] inteira.\n\nUma dinastia ganha renome dependendo de:\n$BULLET_WITH_TAB$ O número de membros da dinastia que estão vivos.\n$BULLET_WITH_TAB$ O número de [rulers|lE].\n$BULLET_WITH_TAB$ O número de [spouses|lE] casadas com outros governantes.\nUm governante não gerará renome se tiver um [liege|lE] da mesma dinastia.\n\nAssim como o Prestígio, o renome também conta para aumentar o [dynasty_prestige_level|lE].\n\nA [dynast|lE] pode gastar o renome para desbloquear [dynasty_perks|lE] e influenciar os membros da dinastia de várias maneiras.\n\n#weak Se a dinastia estiver espalhada por vários [realms|lE], gerará mais renome do que uma concentrada em um único senhorio.#!"
 game_concept_dynasty_prestige_level: "Nível de Esplendor"
 game_concept_dynasty_prestige_level_desc: "O nível de esplendor mede a fama de uma [dynasty|lE]. Esse nível aumentará à medida que a dinastia ganhar [dynasty_prestige|lE]. Os personagens recebem uma quantidade inicial de [prestige|lE] ao nascer, dependendo de seu nível de esplendor. Da mesma forma, os [Concept( 'spouses', 'cônjuges' )|E] ganham um pouco de Prestágio das respectivas dinastias ao [Concept( 'marry', 'casar' )|E].\n\nOs níveis são:\n$EFFECT_LIST_BULLET$[dynasty_prestige_level_0|E]\n$EFFECT_LIST_BULLET$[dynasty_prestige_level_1|E]\n$EFFECT_LIST_BULLET$[dynasty_prestige_level_2|E]\n$EFFECT_LIST_BULLET$[dynasty_prestige_level_3|E]\n$EFFECT_LIST_BULLET$[dynasty_prestige_level_4|E]\n$EFFECT_LIST_BULLET$[dynasty_prestige_level_5|E]\n$EFFECT_LIST_BULLET$[dynasty_prestige_level_6|E]\n$EFFECT_LIST_BULLET$[dynasty_prestige_level_7|E]\n$EFFECT_LIST_BULLET$[dynasty_prestige_level_8|E]\n$EFFECT_LIST_BULLET$[dynasty_prestige_level_9|E]\n$EFFECT_LIST_BULLET$[dynasty_prestige_level_10|E]"
 game_concept_house: "Casa"
 game_concept_houses: "Casas"
 game_concept_house_possessive: "da Casa"
 game_concept_house_desc: "Uma $game_concept_house$ é um ramo de membros da árvore maior de uma [dynasty|lE]. As casas são criadas pelos [Concept( 'ruler', 'governantes' )|E] que já não desejam responder ao seu [Concept( 'house_head', 'jefé' )|E] atual, e preferem ser o chefe de uma nova Casa.\n\nEmbora as Casas tenham seus próprios nomes e brasões, elas ainda compartilham [dynasty_prestige|lE], e outros membros da Dinastia ainda podem ser seu [player_heir|lE]."
 game_concept_house_head: "Chefe da Casa"
 game_concept_house_heads: "Chefes da Casa"
 game_concept_house_heads_possessive: "do Chefe da Casa"
 game_concept_house_head_head: "Chefe"
 game_concept_house_head_heads: "Chefes"
 game_concept_house_head_desc: "Toda [house|lE] dentro de uma [dynasty|lE] tem um $game_concept_house_head$ que possui poderes únicos sobre os membros da Casa.\n\nEm particular, pode legitimar [bastards|lE], convocar os membros da Casa para a [war|lE] e exigir a conversão dos membros [Concept( 'landed', 'com terras' )|E]. Enquanto estiver no poder, o $game_concept_house_head$ também recebe um [weak_hook|lE] sobre todos os membros de sua Casa que nascerem enquanto estiver no poder.\n\nQuando morre, seu [primary_heir|lE] se torna o novo $game_concept_house_head$.\n\nOs [clan_house_heads|lE] têm regras e privilégios especiais."
 game_concept_clan_house_head: "Chefe da Casa do Clã"
 game_concept_clan_house_heads: "Chefes da Casa do Clã"
 game_concept_clan_house_head_head: "$game_concept_house_head_head$"
 game_concept_clan_house_head_desc: "Um $game_concept_clan_house_head$ é, em muitos aspectos, como um [house_head|lE] normal, mas difére em alguns pontos notáveis.\n\nOs $game_concept_clan_house_heads$ não recebem um [weak_hook|lE] sobre todos os membros de sua [house|lE]. Eles têm mais influência sobre a [house_unity|lE] do que outros membros da casa. Além disso, qualquer membro da casa pode desafiá-los pela supremacia para se tornar $game_concept_house_head$."
 game_concept_denounce: "Denunciar"
 game_concept_denouncement: "Denúncia"
 game_concept_denounce_desc: "Um [Concept( 'dynast', 'cabeça da dinastia' )|E] pode denunciar um membro de sua [dynasty|lE] em troca de [Concept( 'dynasty_prestige', 'renome' )|E].\n\nQualquer membro da mesma dinastia (incluindo o cabeça da dinastia) receberá um [imprisonment_reason|lE] contra o membro denunciado."
 game_concept_hook: "Gancho"
 game_concept_hooks: "Ganchos"
 game_concept_hooked: "Sob gancho"
 game_concept_hook_i: "@cs_weak_hook_icon!"
 game_concept_hook_desc: "Por gancho entendemos uma relação entre personagens na qual um pode conseguir que o outro faça o que lhe pedir.\n\nHá dois tipos de ganchos, [Concept( 'weak_hooks', 'fracos' )|E] e [Concept( 'strong_hooks', 'fuertes' )|E], que são obtidos de modos distintos.\n\nOs ganchos podem ser usados para forçar muitas interações, por exemplo, propostas de [Concept( 'marriage', 'matrimônio' )|E] ou mudanças no [vassal_contract|lE]."
 game_concept_weak_hook: "Gancho Fraco"
 game_concept_weak_hooks: "Ganchos Fracos"
 game_concept_weak_hook_desc: "Um $game_concept_weak_hook$ é um [Concept( 'hook', 'gancho' )|E] que podemos ter sobre um personagem que nos deve um favor ou que manipulamos para fazer o que queremos.\n\nEmbora haja muitas interações em que se pode usar um gancho fraco, por exemplo, em propostas de [Concept( 'marriage', 'casamento' )|E], não se pode empregá-lo para obrigar alguém a ser [agent|lE] nosso em uma conjura de [GetScheme('murder').GetTypeName|l] e não oferece um benefécio passivo #weak (para isso à necessório um [Concept( 'strong_hook', 'gancho forte' )|E])#!.\n\nTodos os filhos nascidos em uma [house|lE] [noble|lE] também devem um gancho fraco inicial ao [Concept( 'house_head', 'chefe da casa' )|E].\n\nQuando um gancho fraco à usado, ele à #emphasis gasto#!."
 game_concept_perpetual_hook: "Gancho Perpétuo"
 game_concept_perpetual_hooks: "Ganchos Perpétuos"
 game_concept_perpetual_hook_desc: "Os [Concept( 'perpetual_hook', 'ganchos perpétuos' )|E] são [Concept('hook', 'ganchos' )|E] que surgem quando um personagem nos deve um favor ou o manipulamos para que faça o que queremos.\n\nNão podem ser usados para obrigar alguém a se tornar nosso [agent|lE] em uma conspiração de [GetScheme('murder').GetTypeName|l] e não concedem um benefécio passivo #weak (para isso à necessório um [strong_hook|lE])#!.\n\nOs ganchos perpétuos não são gastos ao serem usados, mas entram em recarga antes de poderem ser usados novamente.#!"
 game_concept_strong_hook: "Gancho Forte"
 game_concept_strong_hooks: "Ganchos Fortes"
 game_concept_strong_hook_i: "@unspent_strong_hook_icon!"
 game_concept_strong_hook_desc: "Este tipo de [hook|lE] tão intenso se tem sobre um personagem que foi [Concept( 'blackmailed', 'chantajeado' )|E].\n\nOs ganchos fortes são muito mais poderosos que os [Concept( 'weak_hooks', 'fracos' )|E] e podem obrigar alguém a fazer coisas terríveis por nós, como ser [agent|lE] nosso em uma conspiração de [GetScheme('murder').GetTypeName|l] #weak (somado a tudo que um gancho fraco pode conseguir!).#!\n\nUm gancho forte também impede que o alvo realize ações hostis contra seu portador.\n\nOs ganchos fortes não são consumidos ao serem usados, mas entram em recarga até poderem ser usados novamente. O efeito passivo não se perde quando o Gancho é usado."
 game_concept_favor: "Favor"
 game_concept_favors: "Favores"
 game_concept_favor_desc: "Os personagens podem dever favores uns aos outros, o que à considerado uma classe de [Concept( 'hook', 'gancho' )|E].\n\nOs favores podem ser obtidos de muitas maneiras, mas geralmente por meio de vários eventos programados. Todo filho nascido em uma [Concept( 'house', 'casa' )|E] [Concept( 'noble', 'nobre' )|E] também deve um favor inicial ao [Concept( 'house_head', 'chefe da casa' )|E]."
 game_concept_blackmail: "Chantagem"
 game_concept_blackmailed: "Chantageado"
 game_concept_blackmailing: "Chantageando"
 game_concept_blackmail_desc: "Se você conhece um [secret|lE] [Concept( 'criminal', 'criminal' )|E] de outro personagem, você pode usar uma [character_interaction|lE] para potencialmente obter um [hook|lE].\n\nA força desse gancho varia conforme a gravidade do segredo, que, por sua vez, costuma ser determinada pelas [doctrines|lE]."
 game_concept_manipulation: "Manipulação"
 game_concept_manipulation_desc: "A manipulação é uma forma de [Concept( 'hook', 'gancho' )|E] por meio da qual a mente de outro personagem é manipulada de alguma forma para que ele cumpra a sua vontade."
 game_concept_soldier: "Soldado"
 game_concept_soldiers: "Soldados"
 game_concept_soldier_i: "@soldier_icon!"
 game_concept_soldiers_desc: "Utiliza-se o termo soldado para nos referirmos às tropas de um [regiment|lE] ou de um [army|lE], sejam elas [levies|lE], [men_at_arms|lE] ou [knights|lE].\n\nTer mais soldados ajuda a vencer [battles|lE] e [sieges|lE]."
 game_concept_health: "Saúde"
 game_concept_healthy: "Saudável"
 game_concept_health_desc: "A [Concept( 'health', 'salud' )|E] mede a probabilidade de que um personagem morra por [illnesses|El] ou devido à idade.\n\nPersonagens idosos têm chance de perder saúde a cada ano, aumentando quanto mais velhos são."
 game_concept_child_health: "Saúde Infantil"
 game_concept_child_health_desc: "Certos [traits|lE], como [GetTrait('measles').GetName( GetNullCharacter )|l], são especialmente perigosos para [children|lE].\n\nQualquer penalidade a $game_concept_child_health$ se acumula com penalidades normais de [health|lE], mesmo vindas do mesmo Traço."
 game_concept_adult_health: "Saúde Adulta"
 game_concept_adult_health_desc: "Certos [traits|lE], como [GetTrait('ill').GetName( GetNullCharacter )|l], são mais perigosos para [adults|lE].\n\nQualquer penalidade a $game_concept_adult_health$ se acumula com penalidades normais de [health|lE], mesmo vindas do mesmo Traço."
 game_concept_elderly_health: "Saúde na Velhice"
 game_concept_elderly_health_desc: "Certos [traits|lE], como [GetTrait('pneumonic').GetName( GetNullCharacter )|l], são mais perigosos para aqueles com pelo menos [GetDefine( 'NCharacter', 'FEMALE_ELDERLY_AGE' )|V] anos de idade.\n\nQualquer penalidade a $game_concept_elderly_health$ se acumula com penalidades normais de [health|lE], mesmo vindas do mesmo Traço."
 game_concept_character_death: "Morte de Personagem"
 game_concept_character_death_death: "Morte"
 game_concept_character_death_deaths: "Mortes"
 game_concept_character_death_dying: "Morrendo"
 game_concept_character_death_die: "Morrer"
 game_concept_character_death_dies: "Morre"
 game_concept_character_death_desc: "A morte traz consigo uma [succession|lE], o que é importante para os [Concept( 'rulers', 'governantes' )|E].\n\nSe o personagem do jogador morrer, o jogador continuará a partida com o [Concept( 'player_heir', 'herdeiro' )|E] deste… ou, se não tiver um herdeiro válido, será apresentado a um Game Over."
 game_concept_death_natural_causes: "Causas Naturais"
 game_concept_death_natural_cause: "Causa Natural"
 game_concept_death_natural_causes_desc: "Partir em paz é a chave para morrer de $game_concept_death_natural_causes$. Para isso, a velhice e as doenças crônicas são as principais formas de deixar este mundo."
 game_concept_death_religion: "Religião"
 game_concept_death_religious: "Religioso"
 game_concept_death_religion_desc: "Ser enviado ao outro mundo por infiéis e pelo sacrilégio do fim de sua vida mortal — martírio, crucificação — permanecendo fiel à sua fé até o fim, que forma mais genuína haveria de partir."
 game_concept_death_combat: "Combate"
 game_concept_death_combat_desc: "Receber um golpe fatal enquanto participa de uma batalha, duelo ou outros confrontos ligados às artes marciais, como Torneios, são as principais formas de morrer de maneira $game_concept_death_combat$."
 game_concept_death_murder: "Assassinato"
 game_concept_death_murder_desc: "A morte finalmente alcançando você por meio de um assassinato — uma morte em meio ao engano. O jeito como você viveu; o jeito como você morreu."
 game_concept_fertility: "Fertilidade"
 game_concept_fertility_desc: "A fertilidade indica a capacidade de um personagem para ter filhos."
 game_concept_life_expectancy: "Expectativa de Vida"
 game_concept_life_expectancy_desc: "A expectativa de vida indica os anos que se espera que um personagem viverá antes de morrer por causas naturais.\n\nUma expectativa de vida alta fará com que o personagem envelheça muito mais devagar. Além disso, poderá ter [Concept( 'children', 'hijos' )|E] por muito mais tempo."
 game_concept_betrothal: "Noivado"
 game_concept_betrothals: "Noivados"
 game_concept_betrothed: "Noivo"
 game_concept_betrothal_desc: "[SelectLocalization( HasDlcFeature( 'tours_and_tournaments' ), 'game_concept_betrothal_desc_TOTO_DLC', 'game_concept_betrothal_desc_NO_TOTO_DLC' )]"
 game_concept_betrothal_desc_NO_TOTO_DLC: "Um [Concept( 'betrothal', 'compromiso' )|E] é a promessa de um [marriage|El] futuro. Pode ser feito embora qualquer uma das partes ainda não seja [adult|El] ainda.\n\nOs compromissos podem conceder [alliances|El], assim como os casamentos, mas podem ser facilmente desfeitos. Ao atingir a maioridade, o compromisso pode ser convertido em um casamento adequado."
 game_concept_betrothal_desc_TOTO_DLC: "Um [Concept( 'betrothal', 'noivado' )|E] é a promessa de um [marriage|El] futuro. Pode ser firmado quando uma das partes ainda não for [adult|El] ou quando uma [grand_wedding_promised|El] à [GetActivityType( 'activity_wedding' ).GetName|l].\n\nOs noivados podem conceder [alliances|lE], assim como os casamentos. Os noivados comuns podem durar o tempo que for necessório e podem ser facilmente rompidos. Eles podem se converter em um casamento de fato ao atingir a maioridade, enquanto os noivados de casamento grandioso se convertem em um casamento ao concluir uma [GetActivityType( 'activity_wedding' ).GetName|l]."
 game_concept_marriage: "Casamento"
 game_concept_marriages: "Casamentos"
 game_concept_marry: "Casar"
 game_concept_marries: "Casa"
 game_concept_married: "Casado"
 game_concept_marrying: "Casar-se"
 game_concept_marriage_desc: "O [Concept( 'marriage', 'matrimônio' )|E] é uma união entre dois [spouses|lE] e, junto com os [betrothals|El] , constituem a principal maneira de forjar uma [alliance|lE] com outro [ruler|lE].\n\nOs [spouses|lE] podem ter filhos [Concept( 'legitimate', 'legítimos' )|E] que podem ser [Concept( 'bred', 'criar' )|E] e criados como [heirs|lE].\n\nUm casamento só termina quando um dos cônjuges morre ou [Concept( 'divorces', 'se divorcia' )|El] do outro.[SelectLocalization( HasDlcFeature( 'tours_and_tournaments' ), 'game_concept_marriage_desc_TOTO_DLC', '' )]"
 game_concept_marriage_desc_TOTO_DLC: "\n\nRealizar um [GetActivityType( 'activity_wedding' ).GetName|l] aumenta muito a aceitação de uma proposta de Casamento."
 game_concept_concubinage: "Concubinato"
 game_concept_concubine: "Concubina"
 game_concept_concubines: "Concubinas"
 game_concept_concubine_male: "Concubino"
 game_concept_concubine_female: "Concubina"
 game_concept_concubinage_desc: "Concubinas e concubinos têm um status inferior ao de um [Concept( 'spouse', 'cónyuge' )|E] e são permitidos nas [Concept( 'faith', 'fés' )|E] com a [Concept( 'doctrine', 'doutrina' )|E] [GetFaithDoctrine('doctrine_concubines').GetBaseName|l].\n\nO concubinato, ao contrário do [Concept( 'marriage', 'matrimônio' )|E], não produz [Concept( 'alliances', 'alianças' )|E]. Também se pode repudiar concubinas e consortes à vontade, sem as complicações de um [Concept( 'divorce', 'divórcio' )|E]. Os filhos de concubinos são considerados [Concept( 'legitimate', 'legítimos' )|E].\n\nO concubinato é mutuamente exclusivo com [GetFaithDoctrine('doctrine_polygamy').GetBaseName|l]."
 game_concept_bastard: "Bastardo"
 game_concept_bastards: "Bastardos"
 game_concept_bastard_desc: "Os bastardos são filhos ilegítimos nascidos fora do casamento. Como tais, eles não podem herdar [titles|lE]. No entanto, seus pais podem [Concept( 'legitimized', 'legitimar' )|E] a seu filho com a aprovação de seu [house_head|lE].\n\nA [house|lE] de um bastardo será determinada pelas [doctrines|lE] das [faiths|lE] de seus pais quando ele nascer.\n\nSe a um bastardo forem concedidos Títulos ou tiver filhos próprios, formará uma nova [dynasty|lE] própria."
 game_concept_legitimized_bastard: "Bastardo Legitimado"
 game_concept_legitimized: "Legitimado"
 game_concept_legitimized_bastard_desc: "Um [Concept( 'bastard', 'bastardo' )|E] pode ser legitimado, seja ao nascer ou mais tarde por meio da [Concept( 'character_interaction', 'interação de personagem' )|E], dependendo da aprovação do [Concept( 'house_head', 'chefe da casa' )|E].\n\nUm bastardo legitimado tem os mesmos direitos de herança que os filhos [Concept( 'legitimate', 'legítimos' )|E], mas a mancha da bastardia o acompanhará por toda a vida."
 game_concept_bastardy: "Bastardia"
 game_concept_bastardy_desc: "$game_concept_bastard_desc$"
 game_concept_real_father: "Pai Biológico"
 game_concept_real_father_desc: "O verdadeiro pai de um personagem. Na maioria dos casos, é o personagem amplamente reconhecido como seu pai, mas, no caso de bastardos secretos, é outra pessoa."
 game_concept_legitimate: "Legítimo"
 game_concept_legitimate_desc: "Filhos nascidos de pais em um [Concept( 'marriage', 'matrimônio' )|E] são considerados legítimos, ao contrário dos [Concept( 'bastards', 'bastardos' )|E], que podem não herdar nenhum [Concept( 'title', 'título' )|E]. Os filhos de [Concept( 'concubine', 'concubinos/as' )|E] também são considerados [Concept( 'legitimate', 'legítimo' )|E], embora tenham um status ligeiramente inferior."
 game_concept_matrilineal: "Matrilinear"
 game_concept_matrilineally: "Matrilinearmente"
 game_concept_matrilineal_desc: "Em um [Concept( 'marriage', 'matrimônio' )|E] matrilineal, os filhos nascerão dentro da [Concept( 'house', 'casa' )|E] de sua mãe, e não na de seu pai."
 game_concept_patrilineal: "Patrilinear"
 game_concept_patrilineal_desc: "Em um [Concept( 'marriage', 'matrimônio' )|E] patrilineal, os filhos nascerão dentro da [Concept( 'house', 'casa' )|E] de seu pai."
 game_concept_divorce: "Divórcio"
 game_concept_divorced: "Divorciado"
 game_concept_divorcing: "Divorciando"
 game_concept_divorces: "Divórcios"
 game_concept_divorce_desc: "Um [Concept( 'spouse', 'cónyuge' )|E] [Concept( 'married', 'casado' )|E] pode solicitar o divórcio, embora as regras, requisitos e consequências dependam das [Concept( 'doctrines', 'doutrinas' )|E] da sua [Concept( 'faith', 'fé' )|E].\n\nAs [Concept( 'concubines', 'concubinas' )|E] podem ser deixadas de lado a qualquer momento, sem mais."
 game_concept_stress: "Estresse"
 game_concept_stress_i: "@stress_icon!"
 game_concept_stress_gain_i: "@stress_gain_icon!"
 game_concept_stress_loss_i: "@stress_loss_icon!"
 game_concept_stress_loss: "Perda de Estresse"
 game_concept_stress_critical_i: "@stress_critical_icon!"
 game_concept_stress_desc: "Um personagem acumula Estresse ao realizar ações que entrem em conflito com suas [personality_traits|El].\n\nPersonagens que acumularem Estresse suficiente também obterão um [stress_level|El] que terá efeitos negativos em sua saúde mental e que persistirão até conseguirem reduzi-lo.\n\nUma forma bastante direta de aliviar o Estresse é participar em [activities|El] como pode ser uma [GetActivityType( 'activity_hunt' ).GetName|l]."
 game_concept_adult: "Adulto"
 game_concept_adults: "Adultos"
 game_concept_adulthood: "Vida Adulta"
 game_concept_adult_desc: "Um adulto é um personagem de pelo menos #V 16#! anos."
 game_concept_child: "Criança"
 game_concept_children: "Crianças"
 game_concept_child_possessive: "da Criança"
 game_concept_child_desc: "Uma criança é uma personagem menor de #V 16#! anos."
 game_concept_eligible_child: "Criança Elegível"
 game_concept_eligible_children: "Crianças Elegíveis"
 game_concept_eligible_child_desc: "As crianças elegíveis, por lei, podem herdar os [Concept( 'titles', 'títulos' )|E] de seus pais.\n\nOs [Concept( 'bastards', 'bastardos' )|E] não são considerados elegíveis, assim como as crianças de certos gêneros, conforme as [Concept( 'gender_laws', 'leis de gênero' )|E] em vigor."
 game_concept_alliance: "Aliança"
 game_concept_alliances: "Alianças"
 game_concept_allies: "Aliados"
 game_concept_allied: "Aliado"
 game_concept_ally: "Aliado"
 game_concept_ally_i: "@alliance_icon!"
 game_concept_alliance_desc: "Uma aliança é uma relação diplomática entre dois [rulers|lE]. Os governantes [Concept( 'independent', 'independentes' )|E] podem convocar seus aliados para se juntarem às suas [wars|lE].\n\nAs alianças são criadas e mantidas por meio de [marriage|lE] ou [betrothal|lE], desde que os personagens casados sejam próximos o bastante dos governantes. Por exemplo, se um [king|lE] casa sua filha com o filho de outro monarca, os dois reis se tornarão aliados.\n\nOs [lieges|lE] também podem criar alianças com seus [vassals|lE]. O suserano não pode chamar o vassalo para a guerra, mas isso impede que ele se junte a [factions|lE]."
 game_concept_war: "Guerra"
 game_concept_wars: "Guerras"
 game_concept_war_desc: "O conflito armado é o modo mais direto para ampliar um [Concept( 'realm', 'senhorio' )|E]. No entanto, para declarar uma guerra é necessária uma justificativa ou [Concept( 'casus_belli', 'casus belli' )|E]. Em uma guerra, não se pode obter mais do que o casus belli selecionado अनुमति.\n\nAs guerras são vencidas derrotando [Concept( 'armies', 'exércitos' )|E] inimigos na [Concept( 'battle', 'batalha' )|E] e [Concept( 'occupying', 'ocupando' )|E] [Concept( 'holdings', 'propriedades' )|E] inimigas. Isso aumentará a [Concept( 'war_score', 'pontuação de guerra' )|E] e acabará forçando o inimigo a aceitar a [Concept( 'defeat', 'derrota' )|E] na [Concept( 'peace_offer', 'oferta de paz' )|E].\n\nIndependentemente do resultado de uma guerra, o atacante ganhará uma [Concept( 'truce', 'tregua' )|E] com o defensor por um tempo, mas o defensor está livre para declarar uma nova guerra imediatamente."
 game_concept_civil_war: "Guerra Civil"
 game_concept_civil_wars: "Guerras Civis"
 game_concept_raid: "Saque"
 game_concept_raids: "Saques"
 game_concept_raiding: "Saqueando"
 game_concept_raider: "Saqueador"
 game_concept_raiders: "Saqueadores"
 game_concept_raided: "Saqueado"
 game_concept_raid_desc: "Podem ser recrutados [Concept( 'armies', 'exércitos' )|E] como $game_concept_raiders$ nos [Concept( 'rally_points', 'pontos de reunião' )|E]. Os saqueadores podem avançar para terras vizinhas e saqueá-las para obter [gold|lE].\n\nPara realizar um saque, o exército de saqueio deve parar em uma [holding|lE] de um [ruler|lE] estrangeiro e iniciar o saque. Ele permanecerá ali e, após algum tempo, saqueará a posse e obterá ouro.\n\nO ouro será armazenado no exército e só será adicionado ao tesouro quando os soldados chegarem em casa. Se você derrotar um exército de saqueio que esteja levando ouro, ficará com o saque e esse exército não poderá saquear você por algum tempo.\n\nApenas alguns governantes podem realizar um saque, principalmente governantes [Concept( 'tribal', 'tribais' )|E] e de [GetGovernment( 'nomad_government' ).GetName|l].\n\nPodem ser definidos [raid_intents|lE] específicos para obter recompensas diferentes."
 game_concept_raid_i: "@raid_icon!"
 game_concept_loot: "Saque"
 game_concept_loot_desc: "Se uma [holding|lE] é [Concept( 'raid', 'asaltada' )|E] , [Concept( 'occupied', 'ocupada' )|E] em um [Concept( 'siege', 'asedio' )|E] ou estiver envolvida em um [bartering|lE] , o atacante ou o [barterer|lE] conseguirá uma quantidade de [Concept( 'gold', 'ouro' )|E] igual ao $game_concept_loot$. Quanto mais próspera for uma [holding|lE] , maior será o botim.\n\nUma posse que tenha sido assaltada, sitiada ou negociada recentemente não terá nenhum botim."
 game_concept_loot_i: "@loot_icon!"
 game_concept_barter: "Escambo"
 game_concept_barter_i: "@barter_icon!"
 game_concept_barter_desc: "Os [rulers|El] [GetGovernment( 'wanua_government' ).GetName|L] podem recrutar [barterers|El] para obter [gold|El] por meios pacíficos. A barganha funciona de forma semelhante a [raiding|El] , com algumas diférenças importantes: não é uma ação de um [hostile_army|El] e você precisa de [barter_goods|El].\n\nVocê precisa de #V 2#! bens de barganha para obter #V 1#! [loot|El] de uma [holding|El]. Se tiver muito pouco, nada acontecerá.\n\nA barganha é uma ação amigável e a propriedade-alvo receberá [GetModifier('recently_bartered_modifier').GetNameWithTooltip] ao ser concluída. Diferentemente do saque, você pode fazer barganha livremente nas terras de seus [tributaries|El] e do [suzerain|El]."
 game_concept_bartering: "Praticando Escambo"
 game_concept_bartered: "Escambo Realizado"
 game_concept_barterer: "Escambista"
 game_concept_barterers: "Escambistas"
 game_concept_barters: "Escambos"
 game_concept_barterer_desc: "[GetGovernment( 'wanua_government' ).GetName|l] [rulers|El] podem [barter|El] ao convocar seus [armies|El] como $game_concept_barterers$. Eles funcionam de forma semelhante a [raiders|El], exceto pelo fato de não serem [hostile_army|El] para o [holder|El] da [holding|El] alvo.\n\nExércitos Saqueadores de outros Governantes podem lutar contra Escambistas e roubar seu [loot|El]."
 game_concept_barter_goods: "Bens de Escambo"
 game_concept_barter_goods_desc: "Os [rulers|El] [GetGovernment( 'wanua_government' ).GetName] usam os bens de troca, que representam vários tipos de mercadorias das ilhas, como peixe seco ou artesanatos de [Glossary('ratán', 'RATTAN_GLOSS')]. para fazer [barter|El] e manter os [armies|El].\n\nOs $game_concept_barter_goods$ se produzem no [GetBuilding('tribe_01').GetName] e outros [buildings|El]."
 game_concept_barter_goods_i: "@barter_goods_icon!"
 game_concept_revolt: "Revolta"
 game_concept_revolts: "Revoltas"
 game_concept_revolting: "Revoltando-se"
 game_concept_civil_war_desc: "Uma [war|lE] em que um ou mais [vassals|lE] e/ou [counties|lE] se revoltam contra seu [liege|lE]. Na maioria das vezes, é o resultado de uma [faction|lE].\n\nPerder uma guerra civil costuma trazer consequências muito mais severas do que as exigências originais da facção rebelde."
 game_concept_casus_belli: "Casus Belli"
 game_concept_casus_bellis: "Casus Belli"
 game_concept_casus_belli_desc: "É necessário um casus belli (\"causa de guerra\") para declarar a [war|lE] a outro [ruler|lE].\n\nO casus belli especifica sobre o que é a guerra, geralmente um território específico (o [war_target|lE]). Não é possível obter nada além do que o casus belli permitir, independentemente de quão derrotado o inimigo tenha sido.\n\nUm dos casus belli mais importantes é a posse de [claims|lE], venham eles da [succession|lE] ou da tarefa [fabricate_claim|El]."
 game_concept_war_score: "Pontuação de Guerra"
 game_concept_war_score_desc: "Este parâmetro mede qual lado está vencendo em uma [war|lE] e vai de #N -100#! a #P 100#!; por exemplo, #N -25#! para um lado e #P 25#! para o outro. Com uma pontuação de guerra de #P 100#!, pode-se forçar o outro lado a aceitar nossa [peace_offer|lE].\n\nA pontuação de guerra pode ser obtida por:\n$EFFECT_LIST_BULLET$ Derrotando [armies|lE] em [Concept( 'battle', 'batalhas' )|E]\n$EFFECT_LIST_BULLET$ [Concept( 'imprisoning', 'Encarcelando' )|E] o [ruler|lE] inimigo ou seus [heirs|lE] (mas não seus [allies|lE] )\n$EFFECT_LIST_BULLET$ [Concept( 'occupying', 'Ocupando' )|E] [holdings|lE] inimigas (especialmente dentro do [war_target|lE] )\n$EFFECT_LIST_BULLET$ Ocupando a [realm_capital|lE] inimiga\n$EFFECT_LIST_BULLET$ Controlando todos os [objectives|lE] por um longo período de tempo"
 game_concept_war_target: "Alvo de Guerra"
 game_concept_war_targets: "Alvos de Guerra"
 game_concept_war_target_desc: "A região no mapa visada por um [Concept( 'casus_belli', 'casus belli' )|E] em uma [Concept( 'war', 'guerra' )|E]. Se o casus belli não visar uma região específica, a [Concept( 'realm_capital', 'capital del senhorio' )|E] do defensor será o objetivo de guerra.\n\nO lado atacante ganha mais [Concept( 'war_score', 'pontuação de guerra' )|E] [Concept( 'occupying', 'ocupando' )|E] [Concept( 'holdings', 'propriedades' )|E] ao ocupar possessões dentro do objetivo de guerra. Por outro lado, o defensor — após um período inicial de graça — começará a acumular pontos de guerra por manter todos os [Concept( 'counties', 'condados' )|E] da região que é o objetivo de guerra."
 game_concept_occupation: "Ocupação"
 game_concept_occupations: "Ocupações"
 game_concept_occupy: "Ocupar"
 game_concept_occupies: "Ocupa"
 game_concept_occupying: "Ocupando"
 game_concept_occupied: "Ocupado"
 game_concept_occupation_desc: "As [Concept( 'holdings', 'propriedades' )|E] ocupadas estão temporariamente sob o controle de um [Concept( 'ruler', 'governante' )|E] hostil durante uma [Concept( 'war', 'guerra' )|E]. O [Concept( 'army', 'exército' )|E] que permanecer em uma [Concept( 'barony', 'baronia' )|E] com uma [Concept( 'fortified_holding', 'posse fortificada' )|E] hostil começará a [Concept( 'besiege', 'sitiá-la' )|E] se o número de [Concept( 'soldiers', 'soldados' )|E] do exército ultrapassar o da [Concept( 'garrison', 'guarnição' )|E].\n\nSe o cerco for bem-sucedido, a posse será ocupada, o que dará [Concept( 'war_score', 'pontuação de guerra' )|E] ao lado ocupante.\n\nOcupar uma posse não significa que ela agora é sua! Apenas o território especificado no [Concept( 'war_target', 'objetivo bélico' )|E] pode realmente mudar de mãos, e somente se o atacante [Concept( 'wins', 'gana' )|E]."
 game_concept_peace: "Paz"
 game_concept_peace_offer: "Oferta de Paz"
 game_concept_peace_offers: "Ofertas de Paz"
 game_concept_peace_desc: "Uma [war|lE] pode terminar com três tipos de paz: [victory|lE], [defeat|lE] ou [white_peace|lE].\n\nSe um lado obtiver uma [war_score|lE] de #V 100 %#! , o outro lado não poderá recusar a Oferta de Paz e deverá aceitar a [defeat|lE].\n\nOs efeitos da vitória ou da derrota dependem inteiramente do tipo de [casus_belli|E] usado para declarar a guerra, bem como do [war_target|lE]."
 game_concept_victory: "Vitória"
 game_concept_win: "Vencer"
 game_concept_wins: "Vence"
 game_concept_winning: "Vencendo"
 game_concept_victory_desc: "A vitória é uma das três [Concept( 'peace_offers', 'ofertas de paz' )|E] possíveis. O resultado exato de uma vitória em uma [Concept( 'war', 'guerra' )|E] depende do [Concept( 'casus_belli', 'casus belli' )|E].\n\nPara o atacante, normalmente envolve a tomada de [Concept( 'titles', 'títulos' )|E] dentro da região do [Concept( 'war_target', 'objetivo bélico' )|E].\n\nPara o defensor, a vitória geralmente significa que o atacante terá de pagar uma grande quantia de ouro como reparação de guerra."
 game_concept_defeat: "Derrota"
 game_concept_defeat_desc: "A derrota é uma das três [Concept( 'peace_offers', 'ofertas de paz' )|E] possíveis. O resultado exato de uma derrota em uma [Concept( 'war', 'guerra' )|E] depende do [Concept( 'casus_belli', 'casus belli' )|E], mas normalmente os defensores derrotados perderão seus [Concept( 'titles', 'títulos' )|E] dentro da região do [Concept( 'war_target', 'objetivo bélico' )|E], enquanto os atacantes derrotados perderão [Concept( 'gold', 'ouro' )|E], [Concept( 'prestige', 'prestígio' )|E] e [Concept( 'piety', 'piedade' )|E]."
 game_concept_white_peace: "Paz Branca"
 game_concept_white_peace_desc: "A paz branca é uma das três [Concept( 'peace_offers', 'ofertas de paz' )|E] possíveis. Às vezes, ambos os lados concordam que não vale mais a pena prosseguir com a [Concept( 'war', 'guerra' )|E].\n\nCom uma paz branca, o Atacante normalmente ainda perde alguma [Concept( 'piety', 'piedade' )|E] ou [Concept( 'prestige', 'prestígio' )|E], mas muito menos do que com uma [Concept( 'defeat', 'derrota' )|E] humilhante."
 game_concept_siege: "Cerco"
 game_concept_sieges: "Cercos"
 game_concept_besiege: "Sitiar"
 game_concept_besieging: "Sitiando"
 game_concept_besieged: "Sitiado"
 game_concept_siege_desc: "Um cerco é quando um [Concept( 'army', 'exército' )|E] cerca uma [Concept( 'fortified_holding', 'posse fortificada' )|E] para fazer com que os cidadãos se submetam pela fome, de modo que possa ser [Concept( 'occupy', 'ocuparla' )|E]. Um cerco começa automaticamente assim que um exército entra na localização de uma possessão fortificada hostil e permanece parado — se o exército superar em número a [Concept( 'garrison', 'guarnição' )|E].\n\nO exército sitiador pode [Concept( 'assault', 'asaltar' )|E] a posse se suas muralhas estiverem rompidas."
 game_concept_assault: "Assalto"
 game_concept_assaults: "Assaltos"
 game_concept_assaulting: "Assaltando"
 game_concept_assaulted: "Assaltado"
 game_concept_assault_desc: "O assalto ocorre quando o [Concept( 'army', 'exército' )|E] [Concept( 'besieging', 'sitiador' )|E] tenta tomar uma [Concept( 'fortified_holding', 'posse fortificada' )|E] correndo o risco de perder muitos [Concept( 'soldiers', 'soldados' )|E]. Os assaltos só podem ser tentados se houver uma brecha nas muralhas da posse, o que exige que o exército tenha [Concept( 'siege_weapons', 'armas de asedio' )|E]."
 game_concept_fort_level: "Nível de Fortaleza"
 game_concept_fort_level_i: "@fort_icon!"
 game_concept_fort_level_desc: "Algumas [holdings|El] estáo fortificadas, então precisam ser [Concept( 'siege', 'sitiadas' )|E] e [Concept( 'occupy', 'ocupadas' )|E] para obter o controle do [county|El].\n\nO nível de fortaleza de tais [Concept( 'fortified_holdings', 'propriedades fortificadas' )|E] indica quanto tempo o cerco pode durar.\n\nUm nível alto exigirá [siege_weapons|El] para completá-lo de forma eficiente, embora cada arma de cerco seja eficaz apenas até certo nível de fortaleza.\n\nAumentar o nível de fortaleza de uma posse não fortificada não tem efeito."
 game_concept_garrison: "Guarnição"
 game_concept_garrison_desc: "A guarnição protege uma [fortified_holding|lE] de [Concept( 'besieged', 'cercos' )|E] de [armies|lE] menores.\n\nO exército sitiador precisa ter mais [soldiers|lE] do que a guarnição para que o cerco progrida.\n\nQuando um [siege|lE] é perdido, a $game_concept_garrison$ é definida como [GetDefine('NDomain', 'HOLDING_MIN_GARRISON_COUNT')|0]. A partir daí, a $game_concept_garrison$ se reabastece todo mês de acordo com a [garrison_reinforcement|lE] até atingir sua capacidade máxima.\n\nQuando um [siege|lE] começa, o efetivo da $game_concept_garrison$ afeta a quantidade necessária de [siege_progress|lE]."
 game_concept_garrison_reinforcement: "Taxa de Reforço da Guarnição"
 game_concept_garrison_reinforcement_desc: "A $game_concept_garrison_reinforcement$ de uma [fortified_holding|lE] indica a rapidez com que a [garrison|lE] se recupera após perder um [siege|lE].\n\nTodo mês, a [garrison|lE] recuperará uma porcentagem de sua capacidade máxima equivalente à taxa atual. Ela pode ser aumentada ao aprimorar a [holding|lE].\n\nPorém, durante um [siege|lE], os reforços ficam congelados e a taxa é definida como 0."
 game_concept_fortified_holding: "Propriedade Fortificada"
 game_concept_fortified_holdings: "Propriedades Fortificadas"
 game_concept_fortified_holding_desc: "Uma [Concept( 'holding', 'posesión' )|E] fortificada conta com [Concept( 'buildings', 'edifécios' )|E] que aumentam seu [Concept( 'fort_level', 'nivel de fortaleza' )|E]. As [Concept( 'county_capitals', 'capitales condales' )|E] sempre estão fortificadas.\n\nPara [Concept( 'occupy', 'ocupar' )|E] totalmente um [Concept( 'county', 'condado' )|E], todas as suas posses fortificadas devem estar ocupadas."
 game_concept_army: "Exército"
 game_concept_armies: "Exércitos"
 game_concept_army_desc: "Os exércitos são usados para vencer [wars|lE] ao se enfrentarem em [Concept( 'battle', 'batalha' )|E] contra outros exércitos, e para [besiege|lE] e [Concept( 'occupy', 'ocupar' )|E] [Concept( 'fortified_holdings', 'propriedades fortificadas' )|E] inimigas. Os exércitos são reunidos nos [Concept( 'rally_points', 'pontos de reunião' )|E] e consistem principalmente de [Concept( 'levies', 'levas' )|E] e [Concept( 'men_at_arms', 'homens de armas' )|E], mas também podem ser reforçados por [mercenaries|lE] e [Concept( 'holy_orders', 'ordens sagradas' )|E].\n\nOs exércitos podem atravessar a água gastando uma quantidade de [gold|lE] para garantir o transporte. Podem sofrer perdas por [attrition|lE] se a [barony|lE] local não for capaz de fornecer-lhes adequadamente [Concept( 'supply', 'suprimentos' )|E]."
 game_concept_holy_order: "Ordem Sagrada"
 game_concept_holy_orders: "Ordens Sagradas"
 game_concept_holy_order_i: "@government_type_holy_order!"
 game_concept_holy_order_desc: "As ordens sagradas são organizações militares independentes que trabalham para defender e expandir a influência de sua [faith|lE].\n\nPor um custo de [piety|lE], os governantes de sua fé podem contraté-las para lutar em [Concept( 'war', 'guerras' )|E] contra inimigos de fé [Concept( 'faith_hostile', 'hostis' )|E] ou [Concept( 'faith_evil', 'malignas' )|E]. Quando essa guerra terminar, elas não lutarão mais por esse governante.\n\nUma ordem sagrada pode ter um [Concept( 'holy_order_patron', 'patrono' )|E], que não precisa pagar para contratar seus serviços."
 game_concept_holy_order_patron: "Patrono da Ordem Sagrada"
 game_concept_holy_order_patron_desc: "O patrono de uma [holy_order|lE] é um rei ou imperador que compartilha sua [Concept( 'faith', 'fé' )|E] e cujo [Concept( 'realm', 'senhorio' )|E] contém sua capital.\n\nO patrono pode invocar gratuitamente o apoio da ordem militar contra inimigos religiosos em vez de pagar [Concept( 'piety', 'piedade' )|E].\n\nNem todas as ordens militares têm patrono."
 game_concept_mercenary_company: "Companhia Mercenária"
 game_concept_mercenaries: "Mercenários"
 game_concept_mercenary: "Mercenário"
 game_concept_mercenary_i: "@government_type_mercenary!"
 game_concept_mercenary_company_desc: "Os [mercenaries|lE] são [Concept( 'soldiers', 'soldados' )|E] soldados contratados que lutam em troca de [gold|lE]. Os [armies|lE] exércitos mercenários vêm em vários tamanhos, com diferentes tipos de [men_at_arms|lE] e uma quantidade de [knights|lE].\n\nOs mercenários assinam contratos de #V [GetDefine('NMercenary', 'BASE_HIRE_MONTHS')] meses#! que podem ser estendidos por mais #V [GetDefine('NMercenary', 'BASE_HIRE_MONTHS')] meses#! se você ainda estiver em [war|lE]. Os contratos mercenários persistem mesmo se seus Regimentos forem dissolvidos — eles podem ser levantados novamente sem custo adicional.\n\nÉ permitido contrair [debt|lE] para contratar mercenários #weak (hasta [GetDefine('NMercenary', 'ALLOWED_DEBT_MONTHS')] meses)#!."
 game_concept_mercenary_contract: "Contrato Mercenário"
 game_concept_mercenary_contracts: "Contratos Mercenários"
 game_concept_mercenary_contract_desc: "Firmar um Contrato [mercenary|lE] incorre em um custo único que permite o uso de suas tropas por #V [GetDefine('NMercenary', 'BASE_HIRE_MONTHS')] meses#!."
 game_concept_hired_troops: "Tropas Contratadas"
 game_concept_hired_troops_desc: "Soldados contratados são ou [mercenaries|lE] ou [Concept( 'holy_orders', 'órdenes militares' )|E]."
 game_concept_commander: "Comandante"
 game_concept_commanders: "Comandantes"
 game_concept_army_commanders: "Comandantes de Exército"
 game_concept_commanding: "Comandando"
 game_concept_army_commander: "Comandante de Exército"
 game_concept_army_commander_desc: "Um comandante de exército é o personagem no comando de um [Concept( 'army', 'exército' )|E]. Em princípio, qualquer [Concept( 'courtiers', 'cortesóo' )|E] ou [Concept( 'vassals', 'vassalo' )|E] direto pode ser nomeado Comandante (em função de sua idade, [health|lE], e [Concept( 'doctrines', 'doutrinas' )|E]).\n\nNa [Concept( 'battle', 'batalha' )|E] , a [martial_skill|lE] do Comandante influencia muito a [advantage|lE]. Enquanto houver um Comandante presente, serão feitas [rolls|lE] extras para tentar aumentar a vantagem.\n\nAlém disso, os [commander_traits|lE] podem proporcionar muitos benefícios a um exército, tanto dentro quanto fora da batalha."
 game_concept_commander_trait: "Traço de Comandante"
 game_concept_commander_traits: "Traços de Comandante"
 game_concept_commander_trait_desc: "Estes [traits|lE] especiais conferem vantagens muito úteis aos personagens quando atuam como [Concept( 'commanders', 'comandantes' )|E] de um [Concept( 'army', 'exército' )|E].\n\nCrianças que tenham estudado com um [education_focus|lE] militar costumam adquirir os traços de comandante, mas também podem ser obtidos por meio do [martial_lifestyle|lE] e de outros meios."
 game_concept_battle_advantage: "Vantagem em Batalha"
 game_concept_advantage: "Vantagem"
 game_concept_battle_advantage_desc: "A vantagem faz com que um lado na [Concept( 'battle', 'batalha' )|E] cause mais dano. Quanto maior for a vantagem, mais dano os [Concept( 'soldiers', 'soldados' )|E] causarão.\n\nAs batalhas costumam começar com um lado tendo mais Vantagem com base no [terrain|lE], na [martial_skill|lE] e nos [Concept( 'commander_traits', 'rasgos' )|E] do [Concept( 'commander', 'comandante' )|E]. Então, qualquer um dos lados pode ganhar Vantagem adicional com as [rolls|lE] do comandante."
 game_concept_education_trait: "Traço de Educação"
 game_concept_education_traits: "Traços de Educação"
 game_concept_education_trait_desc: "Ao atingir a [adulthood|lE], todo personagem recebe um traço de educação.\n\nHá cinco tipos de traços de educação que correspondem diretamente a cada tipo de [skill|lE].\n\nA qualidade do [trait|lE] que o personagem recebe dependerá de quão bem seu [childhood_trait|lE] combinou com o [education_focus|lE] e da habilidade relevante de seu [guardian|lE].\n\nOs traços de educação de um personagem melhoram a velocidade com que ele progride no [lifestyle|lE] correspondente."
 game_concept_education_focus: "Foco de Educação"
 game_concept_education: "Educação"
 game_concept_educations: "Educações"
 game_concept_educate: "Educar"
 game_concept_educated: "Educado"
 game_concept_education_focus_short: "Foco"
 game_concept_education_focus_desc: "Todo [child|lE] entre os #V 6#! e #V 9#! anos pode receber um foco de educação voltado para uma das cinco [Concept( 'skills', 'habilidades' )|E].\n\nA educação termina com um [education_trait|lE] ao chegar à [adulthood|lE].\n\nA qualidade do traço educacional recebido dependerá de quão bem seu [childhood_trait|lE] combinou com o foco de educação, assim como da habilidade relevante de seu [guardian|lE].\n\nAo definir o foco de educação, também é possível especificar se a criança deve ser criada na [faith|lE] e/ou [culture|lE] do [guardian|lE]."
 game_concept_childhood_trait: "Traço de Infância"
 game_concept_childhood_trait_desc: "Toda criança ganha um Traço de Infância enquanto cresce, como [GetTrait('rowdy').GetName( GetNullCharacter )|l] ou [GetTrait('charming').GetName( GetNullCharacter )|l].\n\nO traço obtido indica qual [education_focus|lE] mais lhe convém."
 game_concept_diplomacy: "Diplomacia"
 game_concept_diplomacy_i: "@skill_diplomacy_icon!"
 game_concept_diplomacy_skill: "Skill de Diplomacia"
 game_concept_diplomacy_skill_desc: "A diplomacia é uma [Concept( 'skill', 'habilidade' )|E] que representa a capacidade de um personagem de encantar, negociar e persuadir.\n\nA diplomacia afeta diretamente as [Concept( 'opinions', 'opiniões' )|E] de outros personagens sobre você. Também à usada para impulsionar [Concept( 'schemes', 'conjuras' )|E] diplomáticas.\n\nSeu [lifestyle|lE] correspondente é a [Concept( 'diplomacy_lifestyle', 'diplomacia' )|E]."
 game_concept_martial: "Marcial"
 game_concept_martial_i: "@skill_martial_icon!"
 game_concept_martial_skill: "Skill Marcial"
 game_concept_martial_skill_desc: "A [skill|lE] marcial indica o quão bom um personagem à ao [Concept( 'war', 'travar guerra' )|E] e comandar exércitos em [Concept( 'battle', 'combate' )|E].\n\nUma habilidade marcial alta à importante para os [army_commanders|lE], pois melhora sua [advantage|lE] em [battle|lE].\n\nSua [lifestyle|lE] correspondente é o [Concept( 'martial_lifestyle', 'estilo de vida marcial' )|E]."
 game_concept_stewardship: "Administração"
 game_concept_stewardship_i: "@skill_stewardship_icon!"
 game_concept_stewardship_skill: "Habilidade de Administração"
 game_concept_stewardship_skill_desc: "A Tesouraria é uma [skill|El] que ajuda o [ruler|El] a administrar seus [domains|El]. Aumenta diretamente a [taxation|El], tornando-a uma Habilidade muito útil para todos os governantes.\n\nSeu [lifestyle|El] correspondente é o [Concept( 'stewardship_lifestyle', 'administrativo' )|E]."
 game_concept_intrigue: "Intriga"
 game_concept_intrigue_i: "@skill_intrigue_icon!"
 game_concept_intrigue_skill: "Skill de Intriga"
 game_concept_intrigue_skill_desc: "A [Concept( 'skill', 'habilidade' )|E] de intriga representa a capacidade de um personagem de entender e manipular outros personagens, e organizar conspirações elaboradas.\n\nÉ usada principalmente para impulsionar [Concept( 'schemes', 'conjuras' )|E] de intriga — e se defender contra elas.\n\nSeu [lifestyle|lE] correspondente é o [Concept( 'intrigue_lifestyle', 'intrigante' )|E]."
 game_concept_learning: "Erudição"
 game_concept_learning_i: "@skill_learning_icon!"
 game_concept_learning_skill: "Skill de Erudição"
 game_concept_learning_skill_desc: "A [Concept( 'skill', 'habilidade' )|E] de Aprendizagem mede a alfabetização e a sabedoria de um personagem. A habilidade de Aprendizagem de um [Concept( 'ruler', 'governante' )|E] afeta o custo de aumentar a [Concept( 'crown_authority', 'autoridade da coroa' )|E] e também gera uma certa quantidade de [Concept( 'piety', 'piedade' )|E] por mês.\n\nÉ de se esperar que personagens com alta Aprendizagem tenham amplo conhecimento de todas as atividades acadêmicas comuns, incluindo teologia, filosofia, linguagem e matemática.\n\nSeu [lifestyle|lE] correspondente é a [Concept( 'learning_lifestyle', 'erudita' )|E]."
 PROWESS_MUSCLE_INFO: "Aumentar a destreza por meios naturais #weak (não por [artifacts|lE])#! aumentará a massa muscular de um Personagem."
 PROWESS_MUSCLE_INFO_PERSONAL: "Aumentar [prowess|lE] aumentará sua massa muscular"
 game_concept_prowess: "Destreza"
 game_concept_prowess_i: "@skill_prowess_icon!"
 game_concept_prowess_skill: "Habilidade de Destreza"
 game_concept_prowess_skill_desc: "A destreza é uma [skill|lE] que reflete a aptidão de um personagem no combate pessoal.\n\nUma habilidade alta de destreza indica uma grande probabilidade de sobreviver e uma grande capacidade como [knight|lE] tanto em [battles|lE] quanto em [single_combat_duel_plural|lE].\n\nCada ponto de destreza concede a um cavaleiro:\n$BULLET_WITH_TAB$[damage|E]: #V [GetDefine('NCombat', 'KNIGHT_DAMAGE_PER_PROWESS')]#!\n$BULLET_WITH_TAB$[toughness|E]: #V [GetDefine('NCombat', 'KNIGHT_TOUGHNESS_PER_PROWESS')]#!\n\n$PROWESS_MUSCLE_INFO$"
 game_concept_natural_prowess: "Destreza Natural"
 game_concept_lifestyle: "Estilo de Vida"
 game_concept_lifestyles: "Estilos de Vida"
 game_concept_lifestyle_desc: "Os [rulers|lE] [Concept( 'adult', 'adultos' )|E] podem escolher um $game_concept_lifestyle$ que lhes permitirá selecionar um [focus|lE] e começar a obter [perks|lE].\n\nTodo estilo de vida tem suas [Concept( 'experience', 'experiências' )|E] próprias, usadas para adquirir $game_concept_perks$. Por exemplo, à necessória experiência no [intrigue_lifestyle|lE] para ganhar benefécios como [GetPerk( 'dreadful_perk' ).GetName( GetNullCharacter )|l] ou [GetPerk( 'like_weed_in_a_garden_perk' ).GetName( GetNullCharacter )|l].\n\nOs estilos de vida são:\n$BULLET_WITH_TAB$ [diplomacy_lifestyle|E]\n$BULLET_WITH_TAB$ [stewardship_lifestyle|E]\n$BULLET_WITH_TAB$ [martial_lifestyle|E]\n$BULLET_WITH_TAB$ [intrigue_lifestyle|E]\n$BULLET_WITH_TAB$ [learning_lifestyle|E]\n$BULLET_WITH_TAB$ [wanderer_lifestyle|E]"
 game_concept_lifestyle_experience: "Experiência de Estilo de Vida"
 game_concept_experience: "Experiência"
 game_concept_lifestyle_experience_desc: "A experiência de estilo de vida se acumula passivamente ao selecionar um [focus|lE] ou é concedida por eventos. Existem diferentes tipos de experiências, um por categoria de [lifestyle|lE].\n\nAo ganhar experiência de estilo de vida suficiente em uma categoria, será concedido um [perk|lE]."
 game_concept_focus: "Foco"
 game_concept_focuses: "Focos"
 game_concept_focus_desc: "Cada [lifestyle|lE] contém vários enfoques disponíveis, mas apenas um deve ser escolhido ao selecionar o .\n\nOs enfoques fornecem bônus passivos e influenciam os tipos de eventos que aparecem. #weak (Por exemplo, el enfoque \"$intrigue_temptation_focus$\" potenciará la [fertility|lE] y aumentará la aparición de eventos relacionados con la seducción).#!\n\nPersonagens podem alternar entre enfoques dentro do mesmo estilo de vida sem perder a capacidade de ganhar experiência nesse estilo de vida."
 game_concept_dynasty_perk: "Legado Dinástico"
 game_concept_dynasty_perks: "Legados Dinásticos"
 game_concept_dynasty_perk_desc: "Os legados dinásticos são benefícios desbloqueáveis que proporcionam efeitos de grande alcance a todos os membros de uma [dynasty|lE].\n\nO [dynast|lE] os desbloqueia ao gastar [dynasty_prestige|lE] e cada Legado na mesma trilha será progressivamente mais caro e poderoso.\n\nSão lentos de conseguir, mas permanecem na dinastia para sempre."
 game_concept_perk: "Benefício"
 game_concept_perks: "Benefícios"
 game_concept_perk_desc: "Os dons são benefícios desbloqueáveis que proporcionam muitos efeitos úteis e interessantes. Eles são desbloqueados escolhendo um [focus|lE] dentro de um [lifestyle|lE] e gastando a forma correspondente de [experience|lE] #weak (por exemplo, é preciso escolher a intriga se quiser desbloquear um dom do estilo de vida intrigante).#!"
 game_concept_decision: "Decisão"
 game_concept_decisions: "Decisões"
 game_concept_decide: "Decidir"
 game_concept_decision_desc: "Uma decisão é uma ação especial que um [character|lE] pode tomar quando quiser.\n\nCada decisão tem seus próprios efeitos predefinidos, que podem variar de mudanças menores no personagem a efeitos que abalem os [Concept( 'empire', 'impérios' )|E].\n\nAs decisões que levam um personagem a uma localização específica por um período de tempo são chamadas de [activities|lE]."
 game_concept_activity: "Atividade"
 game_concept_activities: "Atividades"
 game_concept_activity_desc: "Uma [Concept( 'activity', 'atividade' )|E] é uma ocasião especial organizada para um propósito específico, como ir em [GetActivityType( 'activity_hunt' ).GetName|l] para aliviar o [stress|El].\n\nO [activity_host_short|El] realiza a atividade em uma [location|El] específica, o que a afeta de várias maneiras, e todos os que participam devem ir até lá de [travel|El].\n\nTodos os personagens que participarem interagem entre si por meio de uma [intent|El], que é o objetivo que tentam perseguir durante a atividade.[SelectLocalization( HasDlcFeature( 'advanced_activities' ), 'game_concept_activity_desc_GRAND_ACTIVITY_DLC', '' )]"
 game_concept_activity_desc_GRAND_ACTIVITY_DLC: "\n\nUma [Concept( 'activity', 'atividade' )|E] comum, como um [GetActivityType( 'activity_feast' ).GetName|l] ou um [GetActivityType( 'activity_hunt' ).GetName|l] são coisas menores e menos impressionantes que as [grand_activities|El]."
 game_concept_activity_option: "Opção de Atividade"
 game_concept_activity_options: "Opções de Atividade"
 game_concept_activity_option_desc: "Todas as [activities|El] têm Opções que permitem personalizar o planejamento da sua atividade. As opções têm vários custos e requisitos."
 game_concept_activity_type: "Tipo de Atividade"
 game_concept_activity_types: "Tipos de Atividade"
 game_concept_activity_type_desc: "Algumas [activities|El] e [grand_activities|El] têm tipos diferentes correspondentes a variantes especiais da atividade.\n\nPor exemplo, ao planejar uma Caçada, você pode escolher entre Padrão, Falcoaria e Lendária se cumprir os requisitos para esse tipo."
 game_concept_activity_phase: "Fase da Atividade"
 game_concept_activity_phases: "Fases da Atividade"
 game_concept_activity_phase_desc: "Uma fase de ação de uma atividade, como uma [contest|lE] em um [GetActivityType( 'activity_tournament' ).GetName|l], uma [stop|E] em uma [tour|lE], ou o destino de uma [pilgrimage|lE] durante a qual ocorrem eventos."
 game_concept_activity_phase_action: "Ação da Fase da Atividade"
 game_concept_activity_phase_action_desc: "Enquanto ocorre uma [activity|lE], existe a chance de que a cada #V 7#! dias aconteça #EMP algo#! fora dos eventos normais. Essas ocorrências aparecem no canto superior direito da janela de Atividade.\n\nO que pode acontecer depende do [activity_type|El]; por exemplo, o [activity_host|El] pode ganhar [prestige|lE] ou [opinion|lE] sobre o [activity_guest|lE] em um [GetActivityType('activity_feast').GetName|l].\n\nSempre há uma chance de nada acontecer; isso é especialmente provável antes que a [activity_phase|lE] entre em estado [activity_state_active|lE]."
 game_concept_activity_state_passive: "Passiva"
 game_concept_activity_state_passive_desc: "Uma [activity|El] está em fase passiva quando o anfitrião ou os convidados ainda não chegaram, ou quando estão entre uma [stop|El] e a seguinte em uma [tour|El]."
 game_concept_activity_state_active: "Ativa"
 game_concept_activity_state_active_desc: "Quando o anfitrião e os convidados chegaram e estão envolvidos em uma [activity|El], ela é considerada ativa."
 game_concept_activity_host: "Anfitrião da Atividade"
 game_concept_activity_host_possessive: "do Anfitrião da Atividade"
 game_concept_activity_host_short: "Anfitrião"
 game_concept_activity_host_desc: "O Anfitrião de uma [activity|El] é o [ruler|El] que a iniciou.\n\nEle escolhe o [activity_type|El], a [location|El], as [activity_options|El] e quais [activity_guests_short|El] convidar."
 game_concept_activity_guest: "Convidado da Atividade"
 game_concept_activity_guest_short: "Convidado"
 game_concept_activity_guests: "Convidados da Atividade"
 game_concept_activity_guests_short: "Convidados"
 game_concept_activity_attending: "Participando"
 game_concept_activity_guest_desc: "Um Convidado em uma [activity|El] é qualquer [character|El] convidado pelo [activity_host|El].\n\nEmbora normalmente não possa afetar a Atividade tanto quanto seu Anfitrião, ele ainda pode perseguir sua [intent|El]."
 game_concept_intent: "Intenção"
 game_concept_intents: "Intenções"
 game_concept_intent_desc: "Uma $game_concept_intent$ representa o que um personagem busca realizar pessoalmente em uma [activity|lE]; o anfitrião e os convidados têm, cada um, seus próprios motivos e objetivos."
 game_concept_location: "Localização"
 game_concept_locations: "Localizações"
 game_concept_location_desc: "Todo [character|El] tem uma localização indicando onde está no mundo no momento. Para ir de um local a outro, é preciso [travel|El]."
 game_concept_feast: "$activity_feast$"
 game_concept_feast_desc: "Numa [activity|lE], os governantes e cortesãos do domínio se reúnem para celebrar… algo.\n\nOs participantes perderão [stress|lE] e aumentarão sua [opinion|lE] em relação ao anfitrião. Também poderá haver qualquer número de outras consequências por reunir tanta gente.\n\nOs [Concept( 'ruler', 'governantes' )|E] convidarão seus [Concept( 'liege', 'senhores' )|E] e seus [vassals|lE] (junto com vários [Concept( 'courtiers', 'cortesãos' )|E])."
 game_concept_hunt_success_chance: "Chance de Sucesso na Caçada"
 game_concept_hunt_success_chance_no_prefix: "Chance de Sucesso"
 game_concept_hunt_success_chance_desc: "Ao partir em uma [GetActivityType('activity_hunt').GetName|l], não há garantia de que você conseguirá encurralar sua presa. Os principais fatores são:\n$BULLET_WITH_TAB$A [trait_level_track_xp|El] de [GetTrait('lifestyle_hunter').GetName( GetNullCharacter )|l]\n$BULLET_WITH_TAB$A [aptitude|El] do [GetCourtPositionType('master_of_hunt_court_position').GetName()|l]\n$BULLET_WITH_TAB$Os [buildings|El], o [terrain|El] e o [development|El]\n$BULLET_WITH_TAB$Os [hunt_sightings_no_prefix|El] de animais\n\nA [Concept( 'hunt_success_chance', 'probabilidade de sucesso da caçada' )|E] jamais poderá ser maior que #V 80#!.\n\n#weak Caçadas bem-sucedidas terminam com o abate da presa, da qual se podem obter [artifacts|El] como troféu, enquanto o caçador recebe grande [prestige|El] [prestige_i|E].#!"
 game_concept_hunt_danger: "Perigo da Caçada"
 game_concept_hunt_danger_no_prefix: "Perigo"
 game_concept_hunt_dangerous: "Perigoso"
 game_concept_hunt_danger_desc: "A imprevisibilidade das feras, mesmo das mais dóceis, unida ao frenesi da caçada, acabou com mais de um poderoso guerreiro.\n\nQuanto mais [hunt_dangerous|lE] o animal, mais [prestige|El] [prestige_i|E] obtém o caçador.\n\nNem a distância das terras selvagens nem a abundância de oportunidades devem ser ignoradas ao escolher convidados…"
 game_concept_playdate: "$activity_playdate$"
 game_concept_playdate_desc: "Nesta [activity|lE], os governantes e cortesãos menores de [EmptyScope.ScriptValue('less_than_two_years_to_adulthood_value')|0V] anos se reúnem para brincar e esquecer a monotonia do dia a dia.\n\nOs participantes perderão [stress|lE] e sua [opinion|lE] sobre o anfitrião aumentará. Também poderá haver qualquer número de outras consequências por reunir tantas crianças.\n\nOs [Concept( 'ruler', 'governantes' )|E] convidarão seu [Concept( 'liege', 'senhores' )|E] e seus [vassals|lE] (juntamente com diversos [courtiers|lE])."
 game_concept_wedding_ceremony: "Cerimônia"
 game_concept_wedding_ceremony_desc: "A [activity_phase|lE] de uma [GetActivityType('activity_wedding').GetName|l] em que os [spouses|lE] trocam votos e acabam [Concept( 'married', 'casados' )|E]."
 game_concept_wedding_banquet: "Banquete"
 game_concept_wedding_banquet_desc: "A [activity_phase|lE] de um [GetActivityType('activity_wedding').GetName|l] em que comida e bebida são servidas, e os convidados aproveitam o entretenimento e socializam."
 game_concept_wedding_night: "Noite de Núpcias"
 game_concept_wedding_night_desc: "A [activity_phase|lE] de um [GetActivityType('activity_wedding').GetName|l] em que os [spouses|lE] consumam o casamento, e os convidados continuam sua celebração."
 game_concept_grand_wedding_promise: "Promessa de Grande Casamento"
 game_concept_grand_wedding_promises: "Promessas de Grande Casamento"
 game_concept_grand_wedding_promised: "Prometido"
 game_concept_grand_wedding_promise_desc: "Um [betrothal|lE] com a promessa adicional de que um [GetActivityType('activity_wedding').GetName|l] será celebrado para a união dos dois personagens envolvidos.\n\nA Promessa de Grande Casamento expirará após 3 anos. Não organizar um [GetActivityType('activity_wedding').GetName|l] a tempo ou romper o Noivado trará consequências severas."
 game_concept_taxes: "Impostos"
 game_concept_tax: "Imposto"
 game_concept_taxation: "Tributação"
 game_concept_taxes_desc: "Os impostos são a fonte mensal mais importante de [Concept( 'income', 'renda' )|E] em [gold|lE] que os [rulers|E] têm.\n\nToda [holding|lE] fornece mensalmente [domain_taxes|lE] ao seu governante. Além disso, a maioria de [vassals|lE] tem a [obligation|lE] de pagar ao seu [liege|lE] uma parte dos seus próprios impostos na forma de [liege_taxes|lE]."
 game_concept_dread: "Temor"
 game_concept_dreadful: "Temível"
 game_concept_dreaded: "Temido"
 game_concept_dread_i: "@dread_icon!"
 game_concept_dread_desc: "O pavor indica quanto desassossego suscita um [ruler|lE].\n\nO pavor que um governante inspira aumenta conforme realiza atos cruéis e hediondos, como torturar ou executar [prisoners|lE].\n\nO pavor permite jogar como um [tyrant|lE], porque os [vassals|lE] rebeldes podem se sentir [Concept( 'intimidated', 'intimidados' )|E] ou [Concept( 'cowed', 'amedrontados' )|E] e não se atreverão a enfrentar você.\n\nO pavor de um personagem vai de 0 a 100, exceto para os [nomads|lE], que podem chegar a 150, e, com o tempo, tenderá a retornar ao seu valor natural definido pelas [personality_traits|lE].\n\n#high Um [ruler|lE] temível consegue estes benefícios:#!\n$BULLET_WITH_TAB$ Os [vassals|lE] são menos propensos a se unir a [factions|lE].\n$BULLET_WITH_TAB$ Os [vassals|lE] não se sentem dispostos a [Concept( 'scheming', 'conspirações' )|E].\n$BULLET_WITH_TAB$ Aumenta a aceitação dos [vassals|lE] #weak (por exemplo, para a revogação de títulos).#!\n$BULLET_WITH_TAB$ Aumenta a aceitação de [offér_vassalization|lE].\n$BULLET_WITH_TAB$ Aumenta a probabilidade de que os [electors|lE] votem como você.\n$BULLET_WITH_TAB$ Faz com que os vassalos fiquem menos propensos a se opor a mudanças na [law|lE].\n\n#weak Atenção! Os [vassals|lE] mais valentes são menos afetados pelo pavor.#!"
 game_concept_truce: "Trégua"
 game_concept_truces: "Tréguas"
 game_concept_truce_desc: "Toda [Concept( 'war', 'guerra' )|E] termina com uma trégua, um período durante o qual o atacante não pode declarar guerra novamente ao mesmo [Concept( 'ruler', 'governante' )|E] (porém, o defensor não fica vinculado pela trégua).\n\nAs tréguas podem ser rompidas, mas isso acarreta uma penalidade muito severa."
 game_concept_government: "Governo"
 game_concept_governments: "Governos"
 game_concept_government_form: "Forma de Governo"
 game_concept_government_forms: "Formas de Governo"
 game_concept_government_desc: "A $game_concept_government_form$ de um [ruler|lE] determina a quais tipos de [laws|lE] ele tem acesso, bem como quais [obligations|lE] ele tem com seu [liege|lE] caso não seja [independent|lE].\n\nAs Formas de Governo são: [feudal|lE], [tribal|lE], [clan|lE], [theocracy|lE], [republic|lE], [administrative|lE], [GetGovernment( 'nomad_government' ).GetName|l] e [herder|lE]."
 game_concept_feudal: "Feudal"
 game_concept_feudal_government: "Governo Feudal"
 game_concept_feudalism: "Feudalismo"
 game_concept_feudal_i: "@government_type_feudal!"
 game_concept_feudal_desc: "Sob a [government_form|lE] Feudal, um [liege|lE] concede [land|lE] a seus [vassals|lE] para governarem em troca de [levies|lE] e [taxes|lE], regulados por [vassal_contract|lE] individuais entre Vassalo e Suserano."
 game_concept_tribal: "Tribal"
 game_concept_tribal_government: "Governo Tribal"
 game_concept_tribal_i: "@government_type_tribal!"
 game_concept_tribal_desc: "Os reinos tribais têm um [Concept( 'development', 'desenvolvimento' )|E] raquítico, não podem avançar além das [innovations|lE] da Era Tribal, não podem construir novos [holdings|lE] e normalmente não conseguem mudar suas [Concept( 'succession_laws', 'leis de sucessão' )|E].\n\nNo entanto, podem usar o [Concept( 'prestige', 'prestígio' )|E] em vez do [Concept( 'gold', 'ouro' )|E] para construir seus reinos e contratar [Concept( 'men_at_arms', 'homens de armas' )|E]. Além disso, têm acesso a mais [Concept( 'casus_belli', 'casus belli' )|E] em comparação com reinos [Concept( 'feudal', 'feudais' )|E]. Exércitos não tribais sofrem uma penalidade de [supply_limit|lE] em território tribal hostil."
 game_concept_clan: "Clã"
 game_concept_clans: "Clãs"
 game_concept_clan_government: "Governo de Clã"
 game_concept_clan_i: "@government_type_clan!"
 game_concept_clan_desc: "Clãs são uma [government_form|lE] em que a quantidade de [levies|lE] e [taxes|lE] dada a um [liege|lE] por seus [vassals|lE] é determinada pela [aptitude|lE] do [tax_collector|lE] desse Suserano. Clãs também fazem uso de [house_unity|lE]."
 game_concept_theocracy: "Teocracia"
 game_concept_theocracies: "Teocracias"
 game_concept_theocratic: "Teocrático"
 game_concept_theocratic_government: "Governo Teocrático"
 game_concept_theocracy_government: "Governo Teocrático"
 game_concept_theocracy_i: "@government_type_theocracy!"
 game_concept_theocracy_desc: "A teocracia é uma [Concept( 'government_form', 'forma de governo' )|E] não jogável disponível para algumas [Concept( 'faith', 'fés' )|E] dependendo das [Concept( 'doctrines', 'doutrinas' )|E].\n\nGeralmente são lideradas por um [head_of_faith|lE] ou um [Concept( 'realm_priest', 'bispo' )|E] [Concept( 'landed', 'com terras' )|E]. Bispos também podem se tornar governantes teocráticos [Concept( 'independent', 'independentes' )|E] por direito próprio."
 game_concept_republic: "República"
 game_concept_republics: "Repúblicas"
 game_concept_republican: "Republicano"
 game_concept_republic_government: "Governo Republicano"
 game_concept_republic_i: "@government_type_republic!"
 game_concept_republic_desc: "A república é uma [government_form|lE] não jogável em que um cidadão eleito governa por toda a vida. É a forma de governo para burgueses e mercadores.\n\nOs [vassals|lE] das repúblicas têm [obligations|lE] estáticas que não podem ser alteradas e, portanto, sempre fornecem uma quantidade previsível de [levies|lE] e [taxes|lE]."
 game_concept_skill: "Habilidade"
 game_concept_skills: "Habilidades"
 game_concept_skills_desc: "As habilidades de um personagem medem o quão bom ele é em diversos aspectos.\n\nAs cinco habilidades principais são: [Concept( 'diplomacy', 'diplomacia' )|E], [Concept( 'martial', 'marcial' )|E], [Concept( 'stewardship', 'administração' )|E], [Concept( 'intrigue', 'intriga' )|E] e [Concept( 'learning', 'aprendizado' )|E]."
 game_concept_building: "Construção"
 game_concept_buildings: "Edifícios"
 game_concept_building_desc: "As construções são melhorias que podem ser erguidas em [Concept( 'holdings', 'propriedades' )|E].\n\nMuitos tipos de construções só podem ser erguidos em [Concept( 'baronies', 'baronias' )|E] específicas ou em um [terrain|lE] em especial.\n\nCada dománio tem uma quantidade limitada de espaços de construção, então um dománio não pode conter todos os tipos de construções. A [Concept( 'county_capital', 'capital do condado' )|E] tem acesso a um espaço adicional de construção.\n\nOs [duchy_buildings|lE] e os [special_buildings|lE] usam seus próprios espaços."
 game_concept_duchy_building: "Construção Ducal"
 game_concept_duchy_buildings: "Construções Ducais"
 game_concept_duchy_building_desc: "Os [Concept( 'buildings', 'edifécios' )|E] ducais são poderosos e exclusivos da [de_jure_capital|lE] de um [Concept( 'duchy', 'ducado' )|E]. Só se pode construir um por ducado.\n\nOs edifícios ducais só estão ativos se seu proprietário também possuir o [Concept( 'title', 'título' )|E] de ducado associado.\n\nMuitos desses edifícios têm modificadores que afetam todas as [Concept( 'holdings', 'propriedades' )|E] do ducado, tornando-os ferramentas poderosas para especializar nosso [Concept( 'domain', 'domínio' )|E]."
 game_concept_special_building: "Construção Especial"
 game_concept_special_buildings: "Construções Especiais"
 game_concept_special_building_desc: "Os [Concept( 'buildings', 'edifécios' )|E] especiais são únicos e estão presentes em um número reduzido de lugares predeterminados ao redor do mundo.\n\nEntre outros, há maravilhas antigas, grandes catedrais e minas notáveis. Algumas já estão construídas no início do jogo, enquanto outras terão de ser construídas.\n\nOs edifícios especiais são normalmente muito poderosos e valem a pena lutar por eles."
 game_concept_great_building: "Grande Construção"
 game_concept_great_buildings: "Grandes Construções"
 game_concept_great_building_desc: "Os $game_concept_great_buildings$ são [Concept( 'buildings', 'edifécios' )|E] únicos construídos como resultado de [great_projects|lE]. Um exemplo famoso é o da Grande Muralha da China.\n\nOs $game_concept_great_buildings$ são normalmente muito poderosos, mas sua utilidade está ligada a condições específicas."
 game_concept_ruined_building: "Construção Arruinada"
 game_concept_ruined: "Arruinado"
 game_concept_ruined_building_desc: "Uma construção que foi $game_concept_ruined$ foi destruída, desfigurada ou saqueada em busca de peças por forças externas.\n\nEssas forças externas podem ser coisas como:\n$BULLET_WITH_TAB$[natural_disasters|E][AddLocalizationIf( HasDlcFeature( 'all_under_heaven' ), 'game_concept_ruined_buildings_tgp' )]"
 game_concept_ruined_buildings_tgp: "\n$BULLET_WITH_TAB$Governantes [mandala|lE] vingativos"
 game_concept_rebuilt_building: "Construção Reconstruída"
 game_concept_rebuilt: "Reconstruído"
 game_concept_rebuilding: "Reconstrução"
 game_concept_rebuilt_building_desc: "O ato de reconstruir uma [ruined|lE] construção, restaurando-a à sua glória anterior."
 game_concept_economic_building: "Construção Econômica"
 game_concept_economic_buildings: "Construções Econômicas"
 game_concept_economic_building_desc: "A função dos [Concept( 'buildings', 'edifécios' )|E] econômicos é aumentar os [domain_income|lE] de sua posse."
 game_concept_military_building: "Construção Militar"
 game_concept_military_buildings: "Construções Militares"
 game_concept_military_building_desc: "A função principal dos [Concept( 'buildings', 'edifécios' )|E] militares é aumentar a quantidade de [Concept( 'levies', 'levas' )|E] que fornecem ao seu [Concept( 'holder', 'titular' )|E]."
 game_concept_fortification_building: "Construção de Fortificação"
 game_concept_fortification_buildings: "Construções de Fortificação"
 game_concept_fortification_building_desc: "A função principal dos [Concept( 'buildings', 'edifécios' )|E] de fortificação é aumentar o [Concept( 'fort_level', 'nivel de fortaleza' )|E] de sua posse ou fornecer uma [advantage|lE] extra aos defensores."
 game_concept_pious_building: "Construção Piedosa"
 game_concept_pious_buildings: "Construções Piedosas"
 game_concept_pious_building_desc: "$game_concept_pious_buildings$ são [Concept( 'buildings', 'edifécios' )|E] cuja função primária à aumentar a [piety|lE] de sua posse."
 game_concept_battle: "Batalha"
 game_concept_battles: "Batalhas"
 game_concept_battle_desc: "As batalhas começam quando dois [Concept( 'armies', 'exércitos' )|E] hostis entram na mesma [Concept( 'barony', 'baronia' )|E].\n\nNo início de uma batalha, um dos lados geralmente começa com [advantage|lE] dependendo de fatores como o [terrain|lE], o [commander|lE] ou os [commander_traits|lE].\n\nAs [casualties|lE] dos exércitos dependerão do [damage|lE] sofrido. A batalha entra em suas [aftermath|lE] quando um dos lados fica sem [Concept( 'soldiers', 'soldados' )|E].\n\nO vencedor de uma batalha recebe uma [Concept( 'war_score', 'pontuação de guerra' )|E], dependendo da magnitude da vitória."
 game_concept_aftermath: "Rescaldo"
 game_concept_aftermath_desc: "A fase de $game_concept_aftermath$ de uma [battle|lE] ocorre quando um dos lados vence. O vencedor tentará caçar o máximo possível de [soldiers|lE] [Concept( 'retreat', 'en retirada' )|E] que puder.\n\nOs [Concept( 'men_at_arms', 'hombres de armas' )|E] com um nível alto de [pursuit|lE] podem matar mais soldados durante essa fase, enquanto aqueles que tiverem uma [screen|lE] alta protegerão mais tropas amigas."
 game_concept_casualty: "Baixa"
 game_concept_casualties: "Baixas"
 game_concept_casualty_desc: "Os [Concept( 'armies', 'exércitos' )|E] terão um número determinado de baixas durante uma [Concept( 'battle', 'batalha' )|E] dependendo da quantidade de [damage|lE] recebida.\n\nQuando os [Concept( 'soldiers', 'soldados' )|E] forem retirados de uma batalha, serão classificados como [routed_soldiers|lE] ou [dead_soldiers|lE]."
 game_concept_retreat: "Retirada"
 game_concept_retreats: "Retiradas"
 game_concept_retreat_desc: "Um [Concept( 'army', 'exército' )|E] realizará uma retirada se perder uma [Concept( 'battle', 'batalha' )|E]. Também é possível ordenar que os exércitos realizem uma retirada durante uma batalha. Enquanto estiver em retirada, o exército não poderá ser dissolvido nem receber novas ordens de movimento."
 game_concept_illness: "Doença"
 game_concept_ill: "Doente"
 game_concept_sick: "Enfermo"
 game_concept_sickness: "Enfermidade"
 game_concept_illnesses: "Doenças"
 game_concept_diseases: "Doenças"
 game_concept_illness_desc: "Doenças são um tipo de [traits|lE] negativos que reduzem a [health|lE] de um Personagem. Traços de Doença podem durar períodos variados e diferem muito em letalidade."
 game_concept_medical_treatments: "Tratamentos Médicos"
 game_concept_medical_treatments_desc: "Quando um personagem fica [ill|lE] ou [GetTrait('wounded_1').GetName( GetNullCharacter )|l], um tratamento médico pode ajudá-lo a se recuperar mais rápido.\n\nO responsável por tratar seus [courtiers|lE] e você é o [GetCourtPositionType('court_physician_court_position').GetName()|l]. Tente sempre manter um em serviço se puder pagar seu salário.\n\nQuanto mais tratamentos um $court_physician_court_position$ realiza, mais sua habilidade cresce, concedendo-lhe [traits|lE] de [GetTrait('lifestyle_physician').GetName( GetNullCharacter )|l]."
 game_concept_combat_width: "Largura de Combate"
 game_concept_combat_width_desc: "A largura de combate indica quantos [soldiers|lE] de cada lado podem lutar em uma [battle|lE] ao mesmo tempo, o que pode ser afetado por fatores como o [terrain|lE].\n\nIsso impede que um lado esmague completamente o outro e é determinado no início da batalha."
 game_concept_roll: "Rolagem"
 game_concept_rolls: "Rolagens"
 game_concept_combat_roll: "Rolagem de Batalha"
 game_concept_advantage_roll: "Rolagem de Vantagem"
 game_concept_advantage_rolls: "Rolagens de Vantagem"
 game_concept_combat_roll_desc: "Cada [Concept( 'commanders', 'comandante' )|E] realiza tiradas de [advantage|lE] durante a [Concept( 'battle', 'batalha' )|E]. Têm uma escala de 0 a 10 e são totalmente aleatórias, mas podem ter um efeito decisivo no resultado da batalha."
 game_concept_terrain: "Terreno"
 game_concept_terrains: "Terrenos"
 game_concept_terrain_desc: "Toda [barony|lE] tem um [terrain|lE] dominante específico que pode afetar coisas como os [Concept( 'supply', 'suministros' )|E], a velocidade de movimento dos [armies|lE], a eficácia dos diferentes tipos de [regiments|lE] de [Concept( 'men_at_arms', 'hombres de armas' )|E] na [battle|lE] e os [buildings|lE] que podem ser construídos lá.\n\nMuitos [commander_traits|lE] também estão relacionados ao terreno."
 game_concept_independent_ruler: "Governante Independente"
 game_concept_independent_rulers: "Governantes Independentes"
 game_concept_independent_ruler_desc: "Um [Concept( 'ruler', 'governante' )|E] independente não tem [Concept( 'liege', 'suserano' )|E], por isso desfruta de maior liberdade de ação (por exemplo, para declarar [Concept( 'war', 'guerra' )|E]).\n\nNo entanto, ao contrário dos [Concept( 'vassals', 'vassalos' )|E] também podem ser atacados diretamente por [Concept( 'rulers', 'governantes' )|E] estrangeiros."
 game_concept_independent: "Independente"
 game_concept_unlanded: "sem terras"
 game_concept_unlanded_desc: "Um personagem sem títulos não tem [Concept( 'holdings', 'propriedades' )|E] em seu [Concept( 'domain', 'domínio' )|E], mas teoricamente ainda pode ser [Concept( 'ruler', 'governante' )|E] à sua maneira. Por exemplo, pode ser o caso dos [Concept( 'heads_of_faith', 'cabeças da fé' )|E] e dos grandes mestres das [Concept( 'holy_orders', 'órdenes militares' )|E]."
 game_concept_landed: "com terras"
 game_concept_land: "Terra"
 game_concept_landed_desc: "Personagens com terras são aqueles [Concept( 'ruler', 'governantes' )|E] com [Concept( 'holdings', 'propriedades' )|E]. Exceto nas [theocracies|lE] e [republics|lE], os [commoners|lE] se tornam automaticamente [Concept( 'nobles', 'nobres' )|E] quando recebem terras, o que leva à fundação de uma nova [Concept( 'dynasty', 'dinastia' )|E]."
 game_concept_head_of_faith: "Chefe de Fé"
 game_concept_heads_of_faith: "Chefes de Fé"
 game_concept_head_of_faith_desc: "Um $game_concept_head_of_faith$ é o líder formal de uma [faith|E]. Os poderes e a natureza do $game_concept_head_of_faith$ dependem das [doctrines|E] da fé.\n\nAlgumas fés têm um [spiritual_head_of_faith|E] #weak (por exemplo, o Papa)#!, algumas têm um [temporal_head_of_faith|E] #weak (por exemplo, um Califa)#!, e algumas não têm nenhum $game_concept_head_of_faith$."
 game_concept_spiritual_head_of_faith: "Chefe de Fé Espiritual"
 game_concept_head_of_faith_spiritual: "Espiritual"
 game_concept_spiritual_head_of_faith_desc: "Um [GetFaithDoctrine('doctrine_spiritual_head').GetBaseName] [head_of_faith|E] à [Concept( 'theocratic', 'teocrático' )|E] e não precisa [Concept( 'landed', 'possuir terras' )|E] #weak (embora possa fazê-lo).#!\n\n$game_concept_head_of_faith_spiritual$ $game_concept_heads_of_faith$ geralmente têm acesso a interações como conceder [claims|lE] ou [gold|lE].\n\nSe as [Concept( 'doctrines', 'doutrinas' )|E] da [faith|lE] permitirem [great_holy_wars|lE], elas seráo [Concept( 'great_holy_war_undirected', 'não direcionadas' )|E] #weak (como as Cruzadas).#!"
 game_concept_temporal_head_of_faith: "Chefe de Fé Temporal"
 game_concept_head_of_faith_temporal: "Temporal"
 game_concept_temporal_head_of_faith_desc: "Um [head_of_faith|lE] [GetFaithDoctrine('doctrine_temporal_head').GetBaseName|l] se comporta como um [ruler|lE] normal e seu [title|lE] de cabeça da fé é destruído se perder todas as suas terras.\n\nSe as [doctrines|lE] da [faith|lE] permitirem [great_holy_wars|lE], serão [Concept( 'great_holy_war_directed', 'dirigidas' )|E] #weak (por exemplo, yihads)#!."
 game_concept_routed_soldiers: "Baixas Debandadas"
 game_concept_routed_soldiers_desc: "Durante uma [battle|lE], a maioria das [casualties|lE] são na verdade soldados em fuga, em vez de mortos ou gravemente feridos. Ao contrário dos [Concept( 'dead_soldiers', 'mortos' )|E], estes [soldiers|lE] viverão para lutar outro dia e retornarão ao [Concept( 'army', 'exército' )|E] quando a batalha tiver sido concluída. No entanto, o lado vencedor ainda pode acabar com eles nos [aftermath|lE] da batalha, mesmo que o exército [Concept( 'retreats', 'se retire' )|E] voluntariamente."
 game_concept_dead_soldiers: "Baixas Fatais"
 game_concept_dead_soldiers_desc: "Durante uma [Concept( 'battle', 'batalha' )|E], muitos [Concept( 'soldiers', 'soldados' )|E] (embora normalmente não a maioria) morrem ou ficam gravemente feridos a ponto de nunca mais lutar. São [casualties|lE] permanentes, ao contrário dos [routed_soldiers|lE]."
 game_concept_title_claim: "Reivindicação de Título"
 game_concept_title_claims: "Reivindicações de Título"
 game_concept_claims: "Reivindicações"
 game_concept_claim: "Reivindicação"
 game_concept_claimed: "Reivindicado"
 game_concept_claim_i: "@pressed_claim!"
 game_concept_title_claim_desc: "Ter um direito sobre um [title|lE] representa o direito legal de possuí-lo e fornece um [casus_belli|lE] para conquistá-lo por meio da [war|lE]. Os direitos também fornecem um motivo válido para [revoke|lE] [titles|lE] dos [Concept( 'vassal', 'vassalos' )|E] [holders|lE].\n\nOs direitos costumam ser concedidos aos [rulers|lE] quando perdem o controle de Títulos para outra pessoa, mas também podem ser criados por meio da [Concept( 'fabricate_claim_short', 'fabricação de direito' )|E].\n\nAlém disso, todos os filhos de um governante (até os [bastards|lE]) têm um [implicit_claim|lE] sobre todos os [titles|lE] do governante. Se não herdarem esse título do [ruler|lE] quando ele morrer, esses [implicit_claims|lE] se converterão em [Concept( 'pressed_claims', 'reivindicações pressionadas' )|E] e então poderão ser herdados por seus próprios filhos como [Concept( 'unpressed_claims', 'reivindicações não pressionadas' )|E]."
 game_concept_pressed_claim: "Reivindicação Pressionada"
 game_concept_pressed_claims: "Reivindicações Pressionadas"
 game_concept_pressed_claim_i: "@pressed_claim!"
 game_concept_pressed: "Pressionada"
 game_concept_pressed_claim_desc: "Um [claim|lE] reivindicado é considerado juridicamente sólido, e os filhos do [claimant|lE] o herdam como [unpressed_claim|lE]."
 game_concept_unpressed_claim: "Reivindicação Não Pressionada"
 game_concept_unpressed_claims: "Reivindicações Não Pressionadas"
 game_concept_unpressed_claim_i: "@unpressed_claim!"
 game_concept_unpressed: "Não Pressionada"
 game_concept_unpressed_claim_desc: "Um [claim|lE] não reivindicado é legalmente frágil e não é herdado pelos filhos do [claimant|lE].\n\nNo entanto, os direitos não reivindicados se tornam [pressed|lE] se forem usados em um [Concept( 'casus_belli', 'casus belli' )|E] para declarar uma [Concept( 'war', 'guerra' )|E], mesmo que a guerra termine em [Concept( 'white_peace', 'paz blanca' )|E]."
 game_concept_implicit_claim: "Reivindicação Implícita"
 game_concept_implicit_claims: "Reivindicações Implícitas"
 game_concept_implicit_claim_i: "@implicit_claim!"
 game_concept_implicit_claim_desc: "Os direitos implícitos são aqueles [claims|lE] que os progenitores dão aos [eligible_children|lE] sobre todos os [titles|lE] que possuem. Se o progenitor perder o [title|lE], sua descendência também perderá seus direitos implícitos."
 game_concept_claimant: "Pretendente"
 game_concept_claimants: "Pretendentes"
 game_concept_claimant_possessive: "do Pretendente"
 game_concept_claimant_desc: "Um pretendente é uma pessoa com uma ou mais [Concept( 'claims', 'reivindicações' )|E] a [Concept( 'titles', 'títulos' )|E]. Um [Concept( 'ruler', 'governante' )|E] pretendente pode reivindicá-las usando o [Concept( 'casus_belli', 'casus belli' )|E] de reivindicações para declarar [wars|lE].\n\nTambém se pode usar este casus belli para reivindicar as reivindicações dos [Concept( 'vassals', 'vassalos' )|E] e até mesmo dos personagens [unlanded|E] de nosso [Concept( 'realm', 'senhorio' )|E].\n\nOs pretendentes também podem liderar [Concept( 'factions', 'facções' )|E], mesmo que não residam em nosso senhorio."
 game_concept_renounce: "Renunciar"
 game_concept_renounced: "Renunciado"
 game_concept_renounce_desc: "Os [prisoners|lE] podem ser libertos em troca de renunciar a todos os seus [Concept( 'claims', 'direitos' )|E] sobre [Concept( 'titles', 'títulos' )|E] dentro do nosso [Concept( 'realm', 'senhorio' )|E].\n\nNo entanto, os filhos do [Concept( 'holder', 'titular' )|E] atual nunca perderão seus direitos enquanto o titular estiver vivo."
 game_concept_court: "Corte"
 game_concept_courts: "Cortes"
 game_concept_court_desc: "Todo [ruler|lE] tem uma corte, que consiste em distintos personagens [unlanded|lE] que servem ao seu [liege|lE].\n\nNormalmente, esses [courtiers|lE] consistem na família de um governante e uma mistura de parentes, [nobles|lE] e plebeus não aparentados, mas muito úteis."
 game_concept_courtier: "Cortesão"
 game_concept_courtiers: "Cortesãos"
 game_concept_courtier_desc: "$game_concept_courtier$ é aquele personagem [unlanded|lE] que serve a um [ruler|lE] em sua [court|lE].\n\nOs cortesãos podem:\n$BULLET_WITH_TAB$Servir como [councillors|lE]\n$BULLET_WITH_TAB$Servir em [court_positions|lE]\n$BULLET_WITH_TAB$Servir em [armies|lE] como [commanders|lE] ou [knights|lE]\n$BULLET_WITH_TAB$Tornar-se [Concept( 'vassal', 'vassalos' )|E] de seu governante se lhe for concedido um [title|lE]\n$BULLET_WITH_TAB$Deixar que seu governante faça valer suas [claims|lE] em uma [war|lE]\n\n#WEAK Os [adventurers|lE] têm [followers|lE] em vez de $game_concept_courtiers$; desempenham o mesmo papel, embora geralmente cheirem pior e estejam mais enlameados.#!"
 game_concept_court_guest: "Convidado da Corte"
 game_concept_guest: "Convidado"
 game_concept_guests: "Convidados"
 game_concept_court_guest_desc: "[wanderers|lE] às vezes aparecem na [court|El] como Convidados. Eles ficarão apenas por um tempo limitado, mas podem ser recrutados como [courtiers|El] permanentes pelo [ruler|El]."
 game_concept_wanderer: "Andarilho"
 game_concept_wanderers: "Andarilhos"
 game_concept_wanderer_desc: "Os personagens que não pertencem a uma [Concept( 'court', 'corte' )|E] nem possuem [Concept( 'titles', 'títulos' )|E] são chamados de andarilhos. Eles percorrem o mundo visitando cortes como [Concept( 'guests', 'convidados' )|E]. Um andarilho pode se tornar capitão [mercenary|lE], líder de uma [Concept( 'holy_order', 'orden militar' )|E], membro do [Concept( 'clergy', 'clero' )|E] ou titular de uma [city|lE]."
 game_concept_court_host: "Anfitrião da Corte"
 game_concept_court_host_desc: "Um [court_host|lE] é aquele [ruler|lE] que, sem ser o senhor de um personagem, o mantém em sua [court|lE].\n\nHá vários motivos para que isso ocorra, como a visita de [wanderers|lE] a um governante, ou a presença de [wards|lE] na mesma corte que seu [guardian|lE]."
 game_concept_host: "Anfitrião"
 game_concept_hosting: "Hospedando"
 game_concept_noble: "Nobre"
 game_concept_nobles: "Nobres"
 game_concept_nobleman: "Nobre"
 game_concept_noblemen: "Nobres"
 game_concept_noblewoman: "Nobre"
 game_concept_noblewomen: "Nobres"
 game_concept_nobility: "Nobreza"
 game_concept_noble_desc: "Os nobres são personagens membros de uma [Concept( 'dynasty', 'dinastia' )|E]. Os personagens sem dinastia são considerados [commoners|lE] de baixa origem."
 game_concept_commoner: "Plebeu"
 game_concept_lowborn: "Plebeu"
 game_concept_commoners: "Plebeus"
 game_concept_commoner_desc: "Um personagem plebeu ou de baixa linhagem não é membro de uma [Concept( 'dynasty', 'dinastia' )|E] [Concept( 'noble', 'nobre' )|E]. No entanto, ainda pode ser um poderoso [Concept( 'rulers', 'governante' )|E] de [theocracies|lE] e [republics|lE].\n\nSe um plebeu se torna [land|lE], imediatamente se torna nobre e funda sua própria [Concept( 'dynasty', 'dinastia' )|E] (exceto nas [republics|lE] e [theocracies|lE], que são em grande parte governadas por plebeus)."
 game_concept_martial_lifestyle: "Estilo de Vida Marcial"
 game_concept_martial_lifestyle_i: "@martial_lifestyle_icon!"
 game_concept_martial_lifestyle_desc: "O estilo de vida Marcial é adequado para personagens que queiram melhorar seus [Concept( 'men_at_arms', 'hombres de armas' )|E] e [Concept( 'knights', 'cavaleiros' )|E], aumentar o [control|lE] em seu [Concept( 'domain', 'dominio' )|E] ou aumentar suas chances de vencer [wars|lE]."
 game_concept_intrigue_lifestyle: "Estilo de Vida de Intriga"
 game_concept_intrigue_lifestyle_i: "@intrigue_lifestyle_icon!"
 game_concept_intrigue_lifestyle_desc: "O estilo de vida de Intriga é adequado para personagens que queiram ter sucesso em seus [Concept( 'schemes', 'conjuras' )|E], ganhar [dread|lE] ou seduzir outros com facilidade."
 game_concept_intrigue_lqwuljxh: "Lqwuljxh"
 game_concept_intrigue_9_14_20_18_9_7_21_5: "9 14 20 18 9 7 21 5"
 game_concept_intrigue_rigueint: "Rigueint"
 game_concept_diplomacy_lifestyle: "Estilo de Vida Diplomático"
 game_concept_diplomacy_lifestyle_i: "@diplomacy_lifestyle_icon!"
 game_concept_diplomacy_lifestyle_desc: "O estilo de vida diplomático é adequado para personagens que queiram ganhar [Concept( 'claims', 'direitos' )|E] e [casus_bellis|lE], aumentar sua [Concept( 'prestige', 'prestígio' )|E] ou ganhar benefícios de família e amigos."
 game_concept_stewardship_lifestyle: "Estilo de Vida de Administração"
 game_concept_stewardship_lifestyle_i: "@stewardship_lifestyle_icon!"
 game_concept_stewardship_lifestyle_desc: "O estilo de vida de Tesouraria é adequado para personagens que queiram melhorar seu [Concept( 'domain', 'domínio' )|E], apaziguar seu [Concept( 'liege', 'senhor' )|E] e [Concept( 'vassals', 'vassalos' )|E] ou ganhar uma grande quantidade de [Concept( 'gold', 'ouro' )|E]."
 game_concept_learning_lifestyle: "Estilo de Vida de Erudição"
 game_concept_learning_lifestyle_i: "@learning_lifestyle_icon!"
 game_concept_learning_lifestyle_desc: "O estilo de vida de Aprendizado é adequado para personagens que queiram ter uma vida longa e saudável, ganhar [Concept( 'piety', 'piedade' )|E], ou bônus adicionais por sua [Concept( 'faith', 'fé' )|E]."
 game_concept_wanderer_lifestyle: "Estilo de Vida Errante"
 game_concept_wanderer_lifestyle_desc: "O $game_concept_wanderer_lifestyle$ é adequado para personagens que querem visitar [points_of_interest|lE] ou ganhar bônus adicionais com seus [Concept( 'traveling', 'viajes' )|E]."
 game_concept_crime: "Crime"
 game_concept_crimes: "Crimes"
 game_concept_criminal: "Criminoso"
 game_concept_criminals: "Criminosos"
 game_concept_crime_i: "@crime_icon!"
 game_concept_crime_desc: "Os crimes são ações que a sociedade considera suficientemente condenáveis para merecer punição.\n\nOs crimes podem ser seculares (um [vassal|lE] [Concept( 'revolting', 'que se rebela' )|E] contra seu [liege|lE] ) ou religiosos (qualquer tipo de comportamento [shunned|lE] e ilegal aos olhos de uma [doctrine|lE]). Os crimes seculares só podem ser punidos pelo personagem ou pelos personagens prejudicados pela ofénsa, mas qualquer [ruler|lE] pode punir seus súditos por crimes religiosos.\n\nTodos os crimes dão aos governantes um motivo válido para [Concept( 'imprison', 'encarcerar' )|E] os criminosos e, dependendo da gravidade do crime, para [revoke|lE] seus [titles|lE], [Concept( 'banish', 'exiliarlos' )|E] , [Concept( 'torture', 'torturarlos' )|E] ou [Concept( 'execute', 'ejecutarlos' )|E]. Um governante só pode punir um crime uma vez, embora alguns crimes deem ao criminoso um [fame_trait|lE] negativo que ele levará para o túmulo.\n\nÀs vezes, os personagens escapam impunes dos crimes, que então são [secrets|lE] e podem ser descobertos por outros personagens e usados para [Concept( 'blackmail', 'hacer chantaje' )|E]."
 game_concept_shunned: "Reprovado"
 game_concept_shunned_desc: "Muitas [faiths|lE] consideram certos comportamentos como evitados segundo suas [doctrines|lE]. Dependendo da doutrina específica, esses comportamentos também podem ser considerados [Concept( 'criminal', 'crime' )|E].\n\nQuando um personagem à flagrado praticando comportamentos evitados por sua fé, perde um [piety_level|lE] e ganha uma [fame_trait|lE], que será malvista por todos cuja fé considere esse comportamento como evitado ou criminoso.\n\nExemplos de comportamentos evitados incluem:\n$EFFECT_LIST_BULLET$[GetTrait('fornicator').GetName( GetNullCharacter )]\n$EFFECT_LIST_BULLET$[GetTrait('adulterer').GetName( GetNullCharacter )]\n$EFFECT_LIST_BULLET$[GetTrait('deviant').GetName( GetNullCharacter )]\n$EFFECT_LIST_BULLET$[GetTrait('sodomite').GetName( GetNullCharacter )]\n$EFFECT_LIST_BULLET$[GetTrait('kinslayer_3').GetName( GetNullCharacter )]\n$EFFECT_LIST_BULLET$[GetTrait('witch').GetName( GetNullCharacter )]"
 game_concept_refuse_conversion_crime: "Recusar Conversão"
 game_concept_refusing_conversion_crime: "Recusando Conversão"
 game_concept_refused_conversion_crime: "Conversão Recusada"
 game_concept_refuse_conversion_crime_desc: "Recusar a conversão será considerado um [Concept( 'crime', 'delito' )|E] se:\n$EFFECT_LIST_BULLET$O personagem que recusa é da mesma [religion|lE] que o personagem que faz a exigência.\n$EFFECT_LIST_BULLET$A religião tem [heresies|lE].\n$EFFECT_LIST_BULLET$A [faith|lE] do personagem que faz a exigência é [faith_hostile|lE] ou pior em relação à fé do personagem que recusa a conversão."
 game_concept_prison: "Prisão"
 game_concept_imprisons: "Aprisiona"
 game_concept_imprison: "Aprisionar"
 game_concept_imprisoning: "Aprisionando"
 game_concept_imprisoned: "Aprisionado"
 game_concept_imprisonment: "Aprisionamento"
 game_concept_prisons: "Prisões"
 game_concept_prisoner: "Prisioneiro"
 game_concept_prisoners: "Prisioneiros"
 game_concept_jailor: "Carcereiro"
 game_concept_prison_desc: "Os [rulers|lE] [landed|lE] podem manter outros personagens como prisioneiros, seja em sua [dungeon|lE] ou em simples [house_arrest|lE]. Em um [camp|lE], todos os prisioneiros são mantidos no [stockade|lE]. Os personagens correm o risco de serem presos em [Concept( 'battle', 'batalhas' )|E] ou ao final de um [Concept( 'siege', 'cerco' )|E].\n\nOs personagens também podem prender qualquer pessoa dentro de seu próprio [realm|lE]. No entanto, isso à visto como [Concept( 'tyrannical', 'tirúnico' )|E] a menos que o personagem seja culpado de um [crime|lE].\n\nOs prisioneiros estáo à sua mercê e podem ser [Concept( 'executed', 'executados' )|E] ou [Concept( 'tortured', 'torturados' )|E], podem ser resgatados ou simplesmente libertados."
 game_concept_dungeon: "Masmorra"
 game_concept_stockade: "Paliçada"
 game_concept_dungeons: "Masmorras"
 game_concept_stockades: "Paliçadas"
 game_concept_dungeon_desc: "Um personagem [Concept( 'imprisonment', 'aprisionado' )|E] aprisionado em uma $game_concept_dungeon$ ou $game_concept_stockade$ sofre um aumento de [Concept( 'stress', 'estresse' )|E] assim como uma penalidade de [health|lE]. Com o tempo, é mais provável que morra de uma [illness|lE] ou sofra ataques nervosos.\n\nPara os [rulers|lE] [Concept('landed', 'com terras' )|E], os [commoners|lE] são aprisionados automaticamente no calabouço, mas podem ser transferidos para [house_arrest|lE]."
 game_concept_stockade_desc: "$game_concept_dungeon_desc$"
 game_concept_house_arrest: "Prisão Domiciliar"
 game_concept_house_arrest_desc: "O arresto domiciliar é uma forma menos severa de [Concept( 'prison', 'encarcelamiento' )|E] na qual os personagens não sofrem efeitos negativos, exceto o tédio. Os [Concept( 'rulers', 'governantes' )|E] podem mandá-los para a [dungeon|lE], embora isso reduza as [Concept( 'opinions', 'opiniones' )|E] do [Concept( 'close_family', 'familiares cercanos' )|E] do prisioneiro.\n\nOs [Concept( 'nobles', 'nobles' )|E] capturados são automaticamente colocados em [house_arrest|lE]."
 game_concept_tyranny: "Tirania"
 game_concept_tyrant: "Tirano"
 game_concept_tyrannical: "Tirânico"
 game_concept_tyranny_desc: "Muitos atos de um [Concept( 'ruler', 'governante' )|E] são considerados tirânicos ou contrários à lei ou à [Concept( 'doctrine', 'doutrina' )|E] religiosa. Por exemplo, considera-se tirânico o ato de [Concept( 'imprison', 'encarcerar' )|E] ou [Concept( 'revoking', 'revogar' )|E] [Concept( 'titles', 'títulos' )|E] de alguém que não cometeu nenhum [Concept( 'crime', 'delito' )|E].\n\nA tirania funciona como um modificador geral de [Concept( 'opinion', 'opinião' )|E] para todos os personagens do [Concept( 'realm', 'senhorio' )|E]."
 game_concept_execute: "Executar"
 game_concept_executed: "Executado"
 game_concept_executing: "Executando"
 game_concept_execution: "Execução"
 game_concept_executions: "Execuções"
 game_concept_execute_desc: "Os personagens [Concept( 'imprisonment', 'encarcerados' )|E] podem ser executados. Isso à considerado uma decisão [Concept( 'tyrannical', 'tirúnica' )|E] a menos que o carcereiro tenha um [execute_reason|lE].\n\nAs execuções aumentam nosso [dread|lE] e nunca são bem recebidas pelos [Concept( 'close_family', 'familiares próximos' )|E] da infeliz vítima."
 game_concept_torture: "Tortura"
 game_concept_tortured: "Torturado"
 game_concept_torturing: "Torturando"
 game_concept_torture_desc: "O personagem [Concept( 'imprisonment', 'encarcelado' )|E] pode ser torturado, férindo sua [health|lE] ou até mesmo mutilando-o de diferentes formas.\n\nA tortura pode aliviar [Concept( 'stress', 'estrés' )|E] para personagens [GetTrait('callous').GetName( GetNullCharacter )] e [GetTrait('sadistic').GetName( GetNullCharacter )], mas causará Estresse em pessoas de natureza bondosa.\n\nOs [Concept( 'rulers', 'governantes' )|E] torturadores também podem aumentar nosso [dread|lE]."
 game_concept_banish: "Banir"
 game_concept_banished: "Banido"
 game_concept_banishment: "Banimento"
 game_concept_banishment_desc: "Os personagens [Concept( 'imprisonment', 'encarcerados' )|E] podem ser desterrados do [realm|lE], o que provavelmente é a forma mais severa de punição. Os governantes [Concept( 'landed', 'com terras' )|E] desterrados são depostos, enquanto aos [courtiers|lE] seus bens são confiscados.\n\nDesterrar alguém sem um motivo (um [Concept( 'crime', 'crime' )|E] grave) à considerado um ato [Concept( 'tyrannical', 'tirúnico' )|E] extremamente tirúnico."
 game_concept_revoke: "Revogar"
 game_concept_revoked: "Revogado"
 game_concept_revoking: "Revogando"
 game_concept_revocation: "Revogação"
 game_concept_revocations: "Revogações"
 game_concept_revoke_desc: "Com [limited_crown_authority|lE] ou superior, os [Concept( 'rulers', 'governantes' )|E] podem revogar os [Concept( 'titles', 'títulos' )|E] de seus [Concept( 'vassals', 'vassalos' )|E], mas isso é considerado arriscado a menos que o vassalo esteja [Concept( 'imprisonment', 'encarcelado' )|E], pois ele pode recusar e se rebelar.\n\nRevogar títulos é considerado [Concept( 'tyrannical', 'tiránico' )|E] a menos que o vassalo seja culpado de um [Concept( 'crime', 'delito' )|E] bastante grave."
 game_concept_retract: "Retirar"
 game_concept_retracted: "Retirado"
 game_concept_retracting: "Retirando"
 game_concept_retraction: "Retirada"
 game_concept_retractions: "Retiradas"
 game_concept_retract_desc: "Com [limited_crown_authority|lE] ou maior, os [Concept( 'rulers', 'governantes' )|E] podem retrair o [Concept( 'vassal', 'vassalo' )|E] de um vassalo, mas é arriscado a menos que este último esteja [Concept( 'imprisonment', 'encarcelado' )|E], pois este pode se recusar e se rebelar.\n\nRetrair um vassalo é considerado [Concept( 'tyrannical', 'tiránico' )|E] a menos que o alvo seja culpado de um [Concept( 'crime', 'delito' )|E] bastante grave."
 game_concept_transfer: "Transferir"
 game_concept_transferred: "Transférido"
 game_concept_transferring: "Transférindo"
 game_concept_transfer_desc: "Os [Concept( 'rulers', 'governantes' )|E] podem transferir um de seus [Concept( 'vassals', 'vassalos' )|E] para outro, desde que o primeiro tenha um posto inferior ao do segundo. É uma boa maneira de aumentar a [Concept( 'opinion', 'opinião' )|E] de um vassalo, especialmente se o vassalo transferido fizer parte [Concept( 'de_jure', 'de iure' )|E] do seu [Concept( 'realm', 'senhorio' )|E]."
 game_concept_men_at_arms: "Homens de Armas"
 game_concept_men_at_arms_desc: "$game_concept_men_at_arms$ são [Concept( 'soldiers', 'soldados' )|E] profissionais superiores às [Concept( 'levies', 'levas' )|E].\n\nO jogador tem controle direto sobre a composição e o tamanho dos [Concept( 'regiments', 'regimientos' )|E] de homens de armas.\n\nOs diferentes tipos de homens de armas podem ser melhores ou piores em um [terrain|lE] determinado. Além disso, cada tipo [Concept( 'counters', 'contrarresta' )|E] contrasta com outro.\n\nOs homens de armas podem ser [Concept( 'stationed', 'acantonar' )|E] em [holdings|lE] para aumentar sua efetividade."
 game_concept_skirmishers: "Escaramuçadores"
 game_concept_skirmisher: "Escaramuçador"
 game_concept_skirmishers_desc: "Os escaramuçadores são [men_at_arms|El] com armamento leve, hábeis em assediar o inimigo.\n\nEmbora cada tipo de escaramuçador seja único, normalmente [Concept( 'counter', 'contrarrestan' )|E] à [heavy_infantry|lE] e, por sua vez, são contrarrestados pelos [archers|lE]."
 game_concept_archers: "Arqueiros"
 game_concept_archer: "Arqueiro"
 game_concept_archers_desc: "Os arqueiros são [men_at_arms|El] que lutam a pé com armas de longo alcance.\n\nEmbora cada tipo de arqueiro seja único, normalmente [Concept( 'counter', 'contrarrestan' )|E] aos [skirmishers|lE] e, por sua vez, são neutralizados pela [heavy_cavalry|lE] e pela [Concept( 'light_cavalry', 'ligera' )|E]."
 game_concept_light_cavalry: "Cavalaria Leve"
 game_concept_light_cavalry_desc: "A cavalaria leve é composta por [men_at_arms|lE] montados que se destacam na vigilância e na perseguição do inimigo.\n\nEmbora cada tipo de cavalaria leve seja único, normalmente a cavalaria [Concept( 'counter', 'contrarresta' )|E] contrarresta os [archers|lE], e, por sua vez, é contrarrestada pelos [spearmen|lE].\n\nA cavalaria leve também costuma ser forte em [terrain|lE] planície.\n\nComparada com a [heavy_cavalry|lE] , se sai melhor na [pursuit|lE] e [screen|lE]."
 game_concept_heavy_cavalry: "Cavalaria Pesada"
 game_concept_heavy_cavalry_desc: "A cavalaria pesada é composta por [men_at_arms|lE] montados, com armadura pesada.\n\nEmbora cada tipo de cavalaria pesada seja único, normalmente [Concept( 'counter', 'contrarresta' )|E] contra os [archers|lE], e, por sua vez, é contrariada pelos [spearmen|lE].\n\nA cavalaria pesada também costuma ser forte em [terrain|lE] terreno plano.\n\nComparada com a [light_cavalry|lE] , costuma ser mais forte em [damage|lE] puro e [toughness|lE]."
 game_concept_spearmen: "Lanceiros"
 game_concept_spearmen_desc: "Os lanceiros são [men_at_arms|lE] que lutam a pé com diversas armas de haste.\n\nEmbora cada tipo de lanceiro seja único, normalmente [Concept( 'counter', 'contrarrestan' )|E] à [heavy_cavalry|lE] e à [Concept( 'light_cavalry', 'ligera' )|E] e, por sua vez, são neutralizados pela [heavy_infantry|lE].\n\nOs lanceiros também costumam ser fortes em [terrain|lE] acidentado e montanhoso."
 game_concept_heavy_infantry: "Infantaria Pesada"
 game_concept_heavy_infantry_desc: "A infantaria pesada é composta por [men_at_arms|lE] que lutam a pé, com armaduras e armas mais pesadas.\n\nEmbora cada tipo de infantaria pesada seja único, normalmente [Concept( 'counter', 'contrarrestan' )|E] aos [spearmen|lE] e, por sua vez, são contrarrestados pelos [skirmishers|lE]."
 game_concept_archer_cavalry: "Cavalaria Arqueira"
 game_concept_archer_cavalry_desc: "A cavalaria arqueira são [men_at_arms|lE] montados e equipados com armas de longo alcance.\n\nEmbora cada tipo de cavalaria com arco seja único, geralmente [Concept( 'counter', 'contrabalançar' )|E] contra a [heavy_infantry|lE] e, por sua vez, são contrarrestados por [archers|lE] com bestas.\n\nA cavalaria arqueira também costuma ser forte em [terrain|lE] plano, especialmente nas estepes."
 game_concept_camel_cavalry: "Cavalaria de Camelos"
 game_concept_camel_cavalry_desc: "A cavalaria de camelos são [men_at_arms|lE] montados, semelhantes à [light_cavalry|lE], que se destacam na exploração e na perseguição ao inimigo.\n\nNormalmente [Concept( 'counter', 'contrarrestan' )|E] contra a $game_concept_light_cavalry$, e, por sua vez, são contra-atacados por [spearmen|lE].\n\nA cavalaria de camelos também costuma ser forte em desertos e terras áridas."
 game_concept_elephant_cavalry: "Cavalaria de Elefantes"
 game_concept_elephant_cavalry_desc: "A cavalaria de elefantes é formada por [men_at_arms|lE] montados, normalmente blindados.\n\nEmbora cada cavalaria de elefantes seja única, geralmente [Concept( 'counter', 'contrabalançar' )|E] com força as unidades de infantaria e, por sua vez, é contrabalançada por [spearmen|lE].\n\nO [terrain|lE] onde é mais forte é a selva."
 game_concept_gunpowders: "Armeiros de Fogo"
 game_concept_gunpowder: "Armeiro de Fogo"
 game_concept_gunpowder_desc: "Os atiradores de mão são [men_at_arms|El] equipados com poderosas armas de pólvora.\n\nEmbora cada tipo de atirador de mão seja único, geralmente [Concept( 'counter', 'contrarrestan' )|E] contra a [heavy_infantry|lE] e, por sua vez, são contra-atacados pela [heavy_cavalry|lE] e pela [Concept( 'light_cavalry', 'ligera' )|E]."
 game_concept_peasant_militia: "Milícia Camponesa"
 game_concept_peasant_militias: "Milícias Camponesas"
 game_concept_peasant_militia_desc: "As milícias camponesas são [men_at_arms|El] equipadas com forcados e lanças.\n\nEmbora cada tipo de milícia seja único, normalmente [Concept( 'counter', 'contrarrestan' )|E] contra a [heavy_infantry|lE] e a [light_cavalry|El] e, por sua vez, são contrarrestadas pela [heavy_infantry|lE].\n\nAs milícias camponesas são fortes em [terrain|El] montanhoso e fértil."
 game_concept_special_troops: "Tropas Especiais"
 game_concept_special_troops_desc: "As tropas especiais não são como os [Concept( 'armies', 'exércitos' )|E] regulares, pois não são levantadas de um(a) [Concept( 'holding', 'posesión' )|E]. Elas podem ser obtidas por meio de Eventos e representam várias coisas, como séquitos, hordas vorazes e camponeses ambiciosos.\n\nNormalmente não custam manutenção e não se reforçam. Use-as com sabedoria se as tiver.\n\nVários [Concept( 'rulers', 'governantes' )|E] históricos começam com tropas especiais."
 game_concept_line: "Linha"
 game_concept_line_of_succession: "Linha de Sucessão"
 game_concept_line_of_succession_desc: "A linha de sucessão é a ordem em que certos personagens podem herdar determinados [Concept( 'titles', 'títulos' )|E]. Essa linha é determinada pela [Concept( 'succession_law', 'ley de sucessão' )|E]."
 game_concept_counter: "Contra"
 game_concept_counters: "Contras"
 game_concept_men_at_arms_counter: "Contra Homens de Armas"
 game_concept_men_at_arms_counter_desc: "A maioria dos [Concept( 'men_at_arms', 'hombres de armas' )|E] pode contra-atacar outro tipo de homens de armas.\n\nQuando um [Concept( 'regiment', 'regimiento' )|E] é contra-atacado, sua eficácia durante a [Concept( 'battle', 'batalha' )|E] é reduzida. Quanto mais um regimento for superado em número pelo seu contra-atacante, maior será a penalidade."
 game_concept_intimidated: "Intimidado"
 game_concept_intimidated_i: "@intimidated_icon!"
 game_concept_intimidated_desc: "Personagens que temem profundamente outro personagem ficam intimidados por ele. Isso costuma ser causado por [dread|lE] e/ou uma personalidade covarde.\n\nPersonagens intimidados têm menos probabilidade de iniciar ações hostis contra o personagem que temem, incluindo se juntar a [Concept( 'factions', 'facções' )|E] ou iniciar facções.\n\nPersonagens que são ainda mais temerosos são marcados como [Concept( 'cowed', 'amedrentados' )|E]."
 game_concept_cowed: "Aterrorizado"
 game_concept_terrified_i: "@terrified_icon!"
 game_concept_cowed_desc: "Personagens aterrorizados ficam paralisados de medo de outro personagem e raramente tomarão ações hostis contra esse personagem, incluindo iniciar [factions|lE].\n\nPersonagens podem estar aterrorizados ou [Concept( 'intimidated', 'intimidado' )|E] por [dread|lE] ou por uma personalidade covarde."
 game_concept_provisions: "Provisões"
 game_concept_provision: "Provisão"
 game_concept_provisions_i: "@provisions_icon!"
 game_concept_provisions_desc: "As $game_concept_provisions$ representam a quantidade total de comida, água e abrigo que um [camp|lE] pode fornecer.\n\nOs $game_concept_camps$ perderão $game_concept_provisions$ enquanto se deslocam de [location|lE] e essa perda será afetada pelo tamanho de suas [men_at_arms|lE], o [terrain|lE] atravessado e os [officers|lE] atualmente contratados.\n\nOs seguidores do $game_concept_camp$ que ficarem sem $game_concept_provisions$ começarão a sofrer eventos de [privation|lE]: começando com [characters|lE] que rapidamente perderão a [opinion|lE] de seu líder, evoluindo rapidamente para fome e morte.\n\n#WEAK É possível recuperar $game_concept_provisions$ quando estivermos parados, seja solicitando-as aos nossos [contact_list_contacts|lE], tomando [Concept( 'decision', 'decisões' )|E] ou com recompensas de [task_contract|lE].#!"
 game_concept_privation: "Privação"
 game_concept_privation_desc: "Quando um [camp|lE] está parado, pode se sustentar trocando comida por bicos, com caça, coleta, pesca onde for permitido e possível e, de modo geral, tentando se manter #EMP à tona#! com seus suprimentos.\n\nAssim que precisam voltar a [Concept('traveling', 'viajar' )|E], passam a depender totalmente de suas $game_concept_provisions$ para sobreviver, já que à impossível se mover e obter comida suficiente. à medida que as provisóes diminuem (e depois se #EMP esgotam#!), os ânimos vão se acirrar e os [followers|lE] morrerão de fome.\n\nQuando isso acontecer, os [characters|lE] começarão a abandonar o acampamento, os [modifiers|lE] negativos seráo aplicados cada vez mais, e aqueles que restarem acabarão se amotinando ou morrendo."
 game_concept_supply: "Suprimentos"
 game_concept_supply_state: "Estado dos Suprimentos"
 game_concept_supply_desc: "Os suprimentos são a quantidade de comida e equipamento que um [army|lE]. Um exército começará a perder suprimentos quando seu tamanho ultrapassar o [supply_limit|lE] de sua localização atual.\n\nUm exército com poucos suprimentos sofrerá uma penalidade de [advantage|lE] na [battle|lE] e, se ficar completamente sem eles, sofrerá [attrition|lE].\n\nOs suprimentos aumentam com o tempo, desde que o exército permaneça abaixo do limite em território amigo."
 game_concept_supplied: "Abastecido"
 game_concept_supplies: "Suprimentos"
 game_concept_supply_limit_mult: "Multiplicador de Limite de Suprimentos"
 game_concept_supply_limit: "Limite de Suprimentos"
 game_concept_supply_limit_desc: "O limite de suprimentos indica a quantidade de [Concept( 'soldiers', 'soldados' )|E] que se podem ter em uma [Concept( 'barony', 'baronia' )|E], em função do [terrain|E] e do [Concept( 'development', 'desarrollo' )|E] da província.\n\nSe o tamanho total do [Concept( 'army', 'exército' )|E] superar o limite, o exército perderá [supplies|lE] e acabará sofrendo [attrition|lE]."
 game_concept_attrition: "Atrito"
 game_concept_attrition_desc: "Os [armies|lE] podem sofrer desgaste, que é a perda de [soldiers|lE] por deserções, doenças ou fome.\n\nO desgaste ocorre quando um exército fica sem [supplies|lE], sitia uma [fortified_holding|lE] ou se move de um [county|lE] hostil para outro quando o alvo não faz fronteira com um condado que já esteja sob controle."
 game_concept_attrition_i: "@attrition_icon!"
 game_concept_objectives: "Objetivos"
 game_concept_objectives_desc: "Certas partes de um [realm|lE] inimigo (normalmente a [Concept( 'realm_capital', 'capital del senhorio' )|E] e as [holdings|lE] da região que é [Concept('war_target', 'el blanco')|E] da [war|lE]) são consideradas objetivos. Se [Concept( 'occupying', 'ocupas' )|E] algum objetivo, você começará a ganhar [war_score|lE].\n\nPara o defensor, a [war_score|lE] começa a contar (após um período inicial) caso possa impedir que o lado atacante ocupe algum objetivo."
 game_concept_war_contribution: "Contribuição de Guerra"
 game_concept_contribution: "Contribuição"
 game_concept_contribute: "Contribuir"
 game_concept_war_contribution_desc: "Os [rulers|lE] que lutam no mesmo lado em uma [war|lE] ganham contribuições bélicas dependendo do número e tamanho das [battles|lE] que travam e do número de [holdings|lE] que conseguem [Concept( 'occupy', 'ocupar' )|E].\n\nApós uma guerra, cada participante será recompensado de acordo com sua contribuição. O espólio exato dependerá do [casus_belli|lE], mas normalmente será [gold|lE], [prestige|lE] ou [piety|lE].\n\nLembre-se de que a contribuição aumenta mesmo quando se perdem batalhas."
 game_concept_scheme_speed: "Duração da Fase do Esquema"
 game_concept_scheme_speed_single: "Duração da Fase"
 game_concept_scheme_speed_i: "@scheme_phase_duration_icon!"
 game_concept_scheme_speed_desc: "$game_concept_scheme_speed_single$ refére-se a quantos dias leva para completar uma única [scheme_phase|lE]. A velocidade é afetada pela sua [skill|lE], pelos [agents|lE] e pelo seu [spymaster|lE], além da [councillor_task|lE] '$task_support_schemes$' se o Esquema for [scheme_hostile|lE].\n\n#WEAK Uma $game_concept_scheme_speed_single$ menor é benéfica porque fará com que um [scheme|lE] progrida mais rápido."
 game_concept_scheme_resistance: "Resistência a Esquema"
 game_concept_scheme_resistance_single: "Resistência"
 game_concept_hostile_scheme_resistance: "Resistência a Esquema Hostil"
 game_concept_scheme_resistance_desc: "A $game_concept_scheme_resistance$ de um [character|lE] desacelera as $game_concept_schemes$ contra ele.\n\nA [scheme_speed|lE] do [scheme_owner|lE] é reduzida por esse valor, aumentando o tempo necessário para ganhar [scheme_opportunity_opportunities|lE].\n\n#WEAK La $game_concept_scheme_resistance$ se incrementa con la [skill|lE] correspondiente del [Concept( 'scheme_target', 'objetivo' )|E] y su [spymaster|lE], así como con la [councillor_task|lE] \"$task_disrupt_schemes$\" (si la conjura es [Concept( 'scheme_hostile', 'hostil' )|E]).#!"
 game_concept_scheme_success_chance: "Chance de Sucesso do Esquema"
 game_concept_success_chance: "Chance de Sucesso"
 game_concept_success_chance_i: "@scheme_success_icon!"
 game_concept_scheme_success_chance_desc: "A $game_concept_success_chance$ de uma [scheme|lE] indica o quão provável à que tenha sucesso quando executada.\n\nA probabilidade de sucesso de uma conjura [Concept('scheme_growth_grow', 'crescerá')|E] com o tempo e à baseada nos [agents|lE] atribuídos, assim como na [skill|lE] associada. A probabilidade de sucesso à limitada pelo [scheme_potential|lE]. Nenhuma conjura poderá ter uma probabilidade de sucesso superior a 95%, exceto as [contract_schemes|lE].\n\n#WEAK As [secret_schemes|lE] correm o risco de serem descobertas pelo alvo. Se isso acontecer, sua probabilidade de sucesso será muito reduzida. #!"
 game_concept_scheme_growth: "Crescimento do Esquema"
 game_concept_success_chance_growth_i: "@scheme_success_growth_icon!"
 game_concept_scheme_growth_growth: "Crescimento"
 game_concept_scheme_growth_desc: "Em cada [scheme_phase_phase|lE], a [success_chance|lE] de um $game_concept_scheme$ aumenta nesse valor, até atingir o [scheme_potential_potential|E] máximo atual.\n\n#WEAK Por exemplo, se um $game_concept_scheme$ tem atualmente 50% de $game_concept_success_chance$, um $game_concept_scheme_potential_potential$ de 54% e um $game_concept_scheme_growth_growth$ de 3%, então, após uma $game_concept_scheme_phase_phase$, terá 53% de $game_concept_success_chance$.\n\nComo o $game_concept_scheme_growth_growth$ ainda é limitado pelo $game_concept_scheme_potential_potential$, após a fase seguinte, o $game_concept_scheme$ teria apenas 54% de $game_concept_success_chance$.#!"
 game_concept_scheme_growth_grow: "crescer"
 game_concept_scheme_growth_grow_desc: "$game_concept_scheme_growth_desc$"
 game_concept_scheme_potential: "Potencial do Esquema"
 game_concept_scheme_potential_potential: "Potencial"
 game_concept_success_chance_max_i: "@scheme_success_max_icon!"
 game_concept_scheme_potential_desc: "Um [scheme|lE] tem uma [success_chance|lE], um valor percentual que determina seu resultado, alcançado por meio do [scheme_growth|lE]. Isso é limitado pelo $game_concept_scheme_potential$, que serve como limite superior de um $game_concept_scheme$.\n\nO $game_concept_scheme_potential$ pode aumentar ao contratar os [agents|lE] apropriados, mas nunca pode exceder 95%, exceto nas [contract_schemes|lE].\n\n#WEAK $game_concept_agents$ harmoniosos podem conceder mais [modifiers|lE] de bônus por meio de eventos.\n\nO excesso de $game_concept_success_chance$ acima do $game_concept_scheme_potential_potential$ de uma $game_concept_scheme$ é perdido.#!"
 game_concept_secrecy: "Sigilo"
 game_concept_secrecy_i: "@scheme_secrecy_icon!"
 game_concept_secrecy_desc: "O $game_concept_secrecy$ de uma [hostile_scheme|lE] indica o quão provável é que ela permaneça indetectada.\n\nO $game_concept_secrecy$ de uma [scheme|lE] terá um período inicial de imunidade durante o qual não poderá ser descoberta. Após esse período, a conspiração correrá o risco de ser descoberta a cada mês por meio de uma [scheme_breach_short|lE]. Seus [agents|lE] podem influenciar muito o quão bem você consegue manter o segredo da conspiração.\n\n#WEAK Uma $game_concept_scheme$ com $game_concept_secrecy$ de 80 % tem 20 % de chance de ser descoberta durante sua execução e 2 % de chance de ser descoberta a cada mês em que continuar.#!"
 game_concept_secrecy_grace: "Período de Graça"
 game_concept_secrecy_grace_desc.boilerplate: "A maioria dos $game_concept_schemes$ tem um período de graça de cerca de ~[EmptyScope.ScriptValue('secrecy_grace_period_value')] meses antes de poder ser descoberta mensalmente."
 game_concept_secrecy_grace_desc: "$game_concept_secrecy_grace_desc.boilerplate$\n\nDepois que o período de graça termina, $game_concept_schemes$ podem ser descobertos mensalmente, causando um [scheme_breach_short|lE]. Isso ocorre em uma taxa bem menor do que quando o esquema é executado, mas é verificado com frequência significativamente maior."
 game_concept_county_development: "Desenvolvimento"
 game_concept_development_i: "@development_icon!"
 game_concept_development: "Desenvolvimento"
 game_concept_county_development_desc: "O desenvolvimento do condado mede a infraestrutura local e o avanço tecnológico de um [Concept( 'county', 'condado' )|E]. \n\nUm desenvolvimento do condado mais alto aumenta as [Concept( 'levies', 'levas' )|E], os [Concept( 'taxes', 'impostos' )|E], e o [supply_limit|lE] obtidos de um condado."
 game_concept_county_development_growth: "Crescimento do Desenvolvimento"
 game_concept_development_growth: "Crescimento do Desenvolvimento"
 game_concept_county_development_growth_desc: "O crescimento do desenvolvimento mede o quanto o [Concept( 'county', 'condado' )|E] avançou em seu [Concept( 'development', 'desarrollo' )|E].\n\nCom um crescimento do desenvolvimento de 100, o desenvolvimento do condado aumenta em 1."
 game_concept_existing_development: "Desenvolvimento Existente"
 game_concept_existing_development_desc: "A tarefa de Tesoureiro de [develop_county|lE] sofre retornos decrescentes. Quanto mais [Concept( 'development', 'desenvolvimento' )|E] um [county] já tiver, mais penalizado será o [development_growth|lE].\n\nPor padrão, os [counties|lE] alcançam a penalidade máxima de [existing_development] com 10 de [development|lE]. Cada [era|lE] tem uma [innovation|lE] que aumenta significativamente esse limite, chegando até 90 de [development|E] na $culture_era_late_medieval$.\n\nInovações que afetam o modificador $game_concept_existing_development$:\n$EFFECT_LIST_BULLET$ $innovation_development_01$\n$EFFECT_LIST_BULLET$ $innovation_development_02$\n$EFFECT_LIST_BULLET$ $innovation_development_03$\n$EFFECT_LIST_BULLET$ $innovation_development_04$"
 game_concept_county_control: "Controle do Condado"
 game_concept_control: "Controle"
 game_concept_control_i: "@control_icon!"
 game_concept_county_control_desc: "O [Concept( 'county_control', 'controle do condado' )|E] mede o domínio que um governo tem sobre a população de um [county|lE]. É crucial especialmente para coletar [taxes|lE] das [holdings|El].\n\nQuando um condado muda de mãos por meio de uma [war|lE], o controle cai drasticamente, o que é um bom motivo para tornar vassalo o [holder|El] atual (se o [casus_belli|lE] permitir). O Controle do Condado também pode ser prejudicado por [sieges|lE] e por [Concept( 'peasant_faction', 'revoltas camponesas' )|lE].\n\nO baixo controle pode levar à [county_corruption|lE], e a principal forma de aumentá-lo é uma [councillor_task|lE], disponível para o [marshal|lE]."
 game_concept_absolute_control: "Controle Absoluto"
 game_concept_absolute_control_short: "Absoluto"
 game_concept_absolute_control_desc: "O controle absoluto é um estado especial de [control|lE] que é habilitado por [perk|lE] $absolute_control_perk_name$ e indica que o governante domina a população com mão de férro.\n\nQuando o controle estiver em #V 100#! aparecerá como \"$ABSOLUTE_COUNTY_CONTROL$\" e concederá bônus adicionais a [Concept( 'taxes', 'impostos' )|E] e [Concept( 'levies', 'levas' )|E]."
 game_concept_county_corruption: "Corrupção do Condado"
 game_concept_county_corruption_desc: "Quando um [Concept( 'county', 'condado' )|E] tem um [control|lE] baixo ou seu [Concept( 'holder', 'titular' )|E] está [Concept( 'debt', 'endeudado' )|E], pode ocorrer corrupção no condado, que consiste em vários tipos de [county_modifiers|lE] negativos.\n\nA corrupção do condado vai desaparecer com o tempo, mas, se a causa raiz persistir ([debt|lE] ou [control|lE] baixos), ela pode reaparecer.\n\nA tarefa de aumento de controle do conselho do marechal pode eliminar a corrupção do condado mais rapidamente."
 game_concept_county_modifier: "Modificador de Condado"
 game_concept_county_modifiers: "Modificadores de Condado"
 game_concept_county_modifier_desc: "Os modificadores de condado são aqueles que afetam os diferentes valores do [county|lE].\n\nTodo condado pode ter seus próprios modificadores, que podem ser consultados nas [Concept( 'holdings', 'propriedades' )|E] do condado."
 game_concept_fleet: "Frota"
 game_concept_fleets: "Frotas"
 game_concept_fleet_desc: "Os [armies|lE] que entram em uma zona marítima [Concept( 'embark', 'embarcam' )|E] automaticamente em uma frota. O [Concept( 'embarking', 'embarque' )|E] custa uma quantidade de [gold|lE] que simboliza a aquisição e construção de navios.\n\nEnquanto estiverem na frota, os [armies|lE] poderão viajar rapidamente pela água, embora a manutenção custe #V 25%#! a mais e começarão a perder [supplies|lE] após #V [GetDefine('NFleet', 'ATTRITION_AFTER_DAYS')|0]#! dias no mar.\n\nAs frotas não se enfrentam entre si nas [battles|lE].\n\nQuando um exército desembarca, a frota desaparece e este passa a ser [recently_disembarked|lE]."
 game_concept_domain_income: "Renda do Domínio"
 game_concept_domain_taxes: "Impostos do Domínio"
 game_concept_domain_income_desc: "Seu rendimento de domínio consiste nos [taxes|lE] que você arrecada em seu próprio [domain|lE]. A quantia arrecadada depende do [control|lE] local e dos níveis de [development|lE]."
 game_concept_vassal_taxes: "Impostos dos Vassalos"
 game_concept_vassal_taxes_desc: "Seus tributos de vassalagem consistem nos [taxes|lE] que você recebe de seus [vassals|lE]. O valor depende das [obligations|lE] de cada vassalo.\n\nDo ponto de vista do seu vassalo, esses mesmos impostos são chamados de [liege_taxes|lE] para distingui-los dos que arrecadam de seus próprios vassalos."
 game_concept_tributary_taxes: "Impostos dos Tributários"
 game_concept_tributary_taxes_desc: "Seus $game_concept_tributary_taxes$ consistem nos [taxes|lE] que você recebe de seus [tributaries|lE]. A quantidade depende das [obligations|lE] de cada tributário.\n\nDo ponto de vista dos seus tributários, esses mesmos impostos são chamados de [suzerain_taxes|lE] para distingui-los dos que arrecadam de seus próprios tributários."
 game_concept_liege_taxes: "Impostos do Suserano"
 game_concept_liege_taxes_desc: "Seus tributos senhoriais são aqueles [taxes|lE] que devemos pagar ao nosso [liege|lE] como parte de nossas [obligations|lE]. Se somos [Concept( 'independent', 'independentes' )|E], não pagaremos tributos senhoriais.\n\nDo ponto de vista do nosso suserano, esses mesmos impostos são chamados de [vassal_taxes|lE] para distingui-los de quaisquer impostos que ele possa dever ao seu próprio suserano."
 game_concept_suzerain_taxes: "Impostos do Suserano"
 game_concept_suzerain_taxes_desc: "Os tributos soberanos são aqueles [taxes|lE] que devemos pagar ao nosso [suzerain|lE] como parte de nossas [obligations|lE].\n\nDo ponto de vista do nosso suserano, esses mesmos impostos são chamados de [tributary_taxes|lE] para distingui-los de qualquer tributo que ele tenha de pagar ao seu próprio soberano."
 game_concept_usurp_title: "Usurpar Título"
 game_concept_usurp: "Usurpar"
 game_concept_usurped: "Usurpado"
 game_concept_usurpation: "Usurpação"
 game_concept_usurp_title_desc: "Pode-se usurpar um [Concept( 'title', 'título' )|E] em posse de um [Concept( 'ruler', 'governante' )|E] estrangeiro se mais de #V 50 %#! de seus [Concept( 'counties', 'condados' )|E] [Concept( 'de_jure', 'de jure' )|E] estiverem dentro do nosso [Concept( 'realm', 'domínio' )|E]. Esse processo nos concede o [Concept( 'title', 'título' )|E], o que é especialmente importante para garantir que sejamos o [rightful_liege|lE] de nossos [Concept( 'vassals', 'vassalos' )|E].\n\nA usurpação é mais difícil se a [Concept( 'faith', 'fé' )|E] do atual titular for hostil à nossa; nesse caso, a usurpação só será possível se o titular já não possuir em seu domínio nenhum dos [Concept( 'counties', 'condados' )|E] [Concept( 'de_jure', 'de jure' )|E]."
 game_concept_close_family: "Família Próxima"
 game_concept_close_family_members: "Membros da Família Próxima"
 game_concept_close_family_member: "Membro da Família Próxima"
 game_concept_close_family_desc: "Os familiares próximos de um personagem são:\n$BULLET_WITH_TAB$Pais\n$BULLET_WITH_TAB$Avós\n$BULLET_WITH_TAB$Filhos\n$BULLET_WITH_TAB$Netos\n$BULLET_WITH_TAB$Irmãos"
 game_concept_extended_family: "Família Estendida"
 game_concept_extended_family_members: "Membros da Família Estendida"
 game_concept_extended_family_desc: "A Famália Estendida de um personagem inclui:\n$BULLET_WITH_TAB$Primos\n$BULLET_WITH_TAB$Tios\n$BULLET_WITH_TAB$Tias\n$BULLET_WITH_TAB$Sobrinhos\n$BULLET_WITH_TAB$Sobrinhas"
 game_concept_family: "Família"
 game_concept_family_members: "Membros da Família"
 game_concept_family_member: "Membro da Família"
 game_concept_family_desc: "A família de um personagem é composta por [Concept( 'close_family_members', 'familiares próximos' )|E] e [Concept( 'extended_family_members', 'parentes' )|E]."
 game_concept_kinslayer: "Assassino de Parentes"
 game_concept_kinslayers: "Assassinos de Parentes"
 game_concept_kinslaying: "Assassinato de Parentes"
 game_concept_kinslaying_desc: "Familicida é um personagem conhecido por ter matado um [family_member|lE]. Algumas [Concept( 'faith', 'fés' )|E] o consideram um [Concept( 'criminal', 'crime' )|E].\n\nOs três traços de Familicida são:\n$BULLET_WITH_TAB$[GetTrait('kinslayer_3').GetName( GetNullCharacter )]: quem mata seus [Concept( 'close_family', 'familiares próximos' )|E].\n$BULLET_WITH_TAB$[GetTrait('kinslayer_2').GetName( GetNullCharacter )]: quem mata seus [extended_family|lE].\n$BULLET_WITH_TAB$[GetTrait('kinslayer_1').GetName( GetNullCharacter )]: quem mata membros de sua [Concept( 'dynasty', 'dinastia' )|E]."
 game_concept_gender_law: "Lei de Gênero"
 game_concept_gender_laws: "Leis de Gênero"
 game_concept_gender_law_desc: "Todo [Concept( 'ruler', 'governante' )|E] tem uma Lei de Gênero principal que determina a quem seus [Concept( 'titles', 'títulos' )|E] podem ser transmitidos na [Concept( 'succession', 'sucessão' )|E]. As Leis de Gênero também afetam quem pode comandar [Concept( 'armies', 'exércitos' )|E] e a possibilidade de ter múltiplos [Concept( 'spouses', 'cónyuges' )|E] ou [Concept( 'concubines', 'concubinas' )|E].\n\nAs Leis de Gênero disponíveis dependem da [Concept( 'doctrine', 'doutrina' )|E] sobre gênero da [Concept( 'faith', 'fé' )|E]."
 game_concept_depose: "Depor"
 game_concept_deposed: "Deposto"
 game_concept_depose_desc: "Os [Concept( 'rulers', 'governantes' )|E] podem ser depostos como resultado das exigências de uma [Concept( 'faction', 'facção' )|E] ou devido a eventos especiais. Seus [Concept( 'heirs', 'herdeiros' )|E] receberão seus [Concept( 'titles', 'títulos' )|E] embora o antigo governante ainda esteja vivo."
 game_concept_virtue: "Virtude"
 game_concept_virtues: "Virtudes"
 game_concept_virtuous: "Virtuoso"
 game_concept_virtue_desc: "Toda [faith|lE] considera certos [traits|lE] como Virtuosos. Personagens com esses Traços ganham bônus de [opinion|lE] de todos os personagens que consideram esses traços Virtuosos, mesmo que não compartilhem a mesma Fé. Além disso, Personagens que possuem Traços que sua própria Fé considera Virtuosos ganharão [piety|lE] bônus todo mês.\n\nQuais traços são considerados Virtudes varia de Fé para Fé, mas normalmente isso é determinado por uma combinação dos [core_tenets|lE] dessa Fé e da [religion|lE] à qual ela pertence."
 game_concept_sin: "Pecado"
 game_concept_sins: "Pecados"
 game_concept_sinful: "Pecaminoso"
 game_concept_sin_desc: "Toda [faith|lE] considera certos [traits|lE] como Pecaminosos. Personagens com esses Traços sofrem penalidades de [opinion|lE] de todos os personagens que consideram esses traços Pecaminosos, mesmo que não compartilhem a mesma Fé. Além disso, Personagens que possuem Traços que sua própria Fé considera Pecaminosos perderão [piety|lE] todo mês.\n\nQuais traços são considerados Pecados varia de Fé para Fé, mas normalmente isso é determinado por uma combinação dos [core_tenets|lE] dessa Fé e da [religion|lE] à qual ela pertence."
 game_concept_excommunicate: "Excomungar"
 game_concept_excommunicated: "Excomungado"
 game_concept_excommunication: "Excomunhão"
 game_concept_excommunication_desc: "Os personagens [GetTrait('excommunicated').GetName( GetNullCharacter )] por seu [head_of_faith|lE] são vistos como um [Concept( 'criminal', 'criminoso' )|E] por outros personagens de sua [Concept( 'faith', 'fé' )|E].\n\nPode ser declarada uma [excommunication_war|lE] contra o [Concept( 'ruler', 'governante' )|E] [Concept( 'independent', 'independente' )|E] que tenha sido [GetTrait('excommunicated').GetName( GetNullCharacter )|l].\n\nA excomunhão pode ser removida pedindo perdão ao [head_of_faith|lE] ou ao mudar para uma [Concept( 'faith', 'fé' )|E] diferente."
 game_concept_legalism: "Legalismo"
 game_concept_legalistic: "Legalista"
 game_concept_legalism_desc: "Trata-se de um [core_tenet|lE] que enfatiza a prática legal e a tradição na teologia e na devoção. Aféta os custos de lei e a filiação de um [Concept( 'vassal', 'vassalo' )|E] a uma [Concept( 'faction', 'facción' )|E] em função do número de [sins|lE] ou [virtues|lE] que um [Concept( 'ruler', 'governante' )|E] tenha."
 game_concept_dynasty_prestige_level_0: "Origens Básicas"
 game_concept_dynasty_prestige_level_1: "Obscura"
 game_concept_dynasty_prestige_level_2: "Insignificante"
 game_concept_dynasty_prestige_level_3: "Notável"
 game_concept_dynasty_prestige_level_4: "Respeitável"
 game_concept_dynasty_prestige_level_5: "Bem Conhecida"
 game_concept_dynasty_prestige_level_6: "Importante"
 game_concept_dynasty_prestige_level_7: "Famosa"
 game_concept_dynasty_prestige_level_8: "Gloriosa"
 game_concept_dynasty_prestige_level_9: "Lendária"
 game_concept_dynasty_prestige_level_10: "Legendária"
 game_concept_dynasty_prestige_level_0_desc: "#T $game_concept_dynasty_prestige_level_0$#!\n[GetDynastyPrestigeLevelEfféct('(int32)0')][GetDynastyPrestigeLevelNext('(int32)0')]"
 game_concept_dynasty_prestige_level_1_desc: "#T $game_concept_dynasty_prestige_level_1$#!\n[GetDynastyPrestigeLevelEfféct('(int32)1')][GetDynastyPrestigeLevelNext('(int32)1')]"
 game_concept_dynasty_prestige_level_2_desc: "#T $game_concept_dynasty_prestige_level_2$#!\n[GetDynastyPrestigeLevelEfféct('(int32)2')][GetDynastyPrestigeLevelNext('(int32)2')]"
 game_concept_dynasty_prestige_level_3_desc: "#T $game_concept_dynasty_prestige_level_3$#!\n[GetDynastyPrestigeLevelEfféct('(int32)3')][GetDynastyPrestigeLevelNext('(int32)3')]"
 game_concept_dynasty_prestige_level_4_desc: "#T $game_concept_dynasty_prestige_level_4$#!\n[GetDynastyPrestigeLevelEfféct('(int32)4')][GetDynastyPrestigeLevelNext('(int32)4')]"
 game_concept_dynasty_prestige_level_5_desc: "#T $game_concept_dynasty_prestige_level_5$#!\n[GetDynastyPrestigeLevelEfféct('(int32)5')][GetDynastyPrestigeLevelNext('(int32)5')]"
 game_concept_dynasty_prestige_level_6_desc: "#T $game_concept_dynasty_prestige_level_6$#!\n[GetDynastyPrestigeLevelEfféct('(int32)6')][GetDynastyPrestigeLevelNext('(int32)6')]"
 game_concept_dynasty_prestige_level_7_desc: "#T $game_concept_dynasty_prestige_level_7$#!\n[GetDynastyPrestigeLevelEfféct('(int32)7')][GetDynastyPrestigeLevelNext('(int32)7')]"
 game_concept_dynasty_prestige_level_8_desc: "#T $game_concept_dynasty_prestige_level_8$#!\n[GetDynastyPrestigeLevelEfféct('(int32)8')][GetDynastyPrestigeLevelNext('(int32)8')]"
 game_concept_dynasty_prestige_level_9_desc: "#T $game_concept_dynasty_prestige_level_9$#!\n[GetDynastyPrestigeLevelEfféct('(int32)9')][GetDynastyPrestigeLevelNext('(int32)9')]"
 game_concept_dynasty_prestige_level_10_desc: "#T $game_concept_dynasty_prestige_level_10$#!\n[GetDynastyPrestigeLevelEfféct('(int32)10')]\n\nEste é o nível mais alto de esplendor."
 game_concept_excommunication_war: "Guerra de Excomunhão"
 game_concept_excommunicated_ruler: "Governante Excomungado"
 game_concept_excommunicated_ruler_desc: "Em uma guerra de excomunhão, os atacantes lutam para tirar do poder um [ruler|lE] [excommunicated|lE].\n\nSe vencerem, os atacantes ganharão uma grande quantidade de [piety|lE] e a aprovação do [head_of_faith|lE], enquanto o [ruler|lE] [excommunicated|lE] será obrigado a abdicar em favor de seu [heir|lE].\n\nNo entanto, se o [ruler|lE] [excommunicated|lE] vencer, o [head_of_faith|lE] revogará a [excommunication|lE], pois terá demonstrado sua retidão no campo de batalha."
 game_concept_holy_site: "Local Sagrado"
 game_concept_holy_sites: "Locais Sagrados"
 game_concept_holy_site_desc: "Um local sagrado é um [county|lE] no qual há um lugar de importância religiosa para uma [faith|lE]. Os locais sagrados em mãos de um personagem da fé correta afetarão todos os que seguirem essa fé. Também será possível criar [special_buildings|lE] ou [Concept( 'holy_orders', 'órdenes militares' )|E]. Cada fé tem um conjunto diferente de locais sagrados."
 game_concept_cultural_acceptance_i: "@cultural_acceptance_icon!"
 game_concept_cultural_acceptance: "Aceitação Cultural"
 game_concept_cultural_acceptance_desc: "A aceitação cultural indica até que ponto duas [cultures|lE] se aceitam mutuamente.\n\nAféta principalmente o quanto a [opinion|lE] é reduzida entre personagens de culturas diferentes. Também afeta a [county_opinion|lE] e o custo de formar uma [hybrid_culture|lE].\n\nA aceitação cultural pode mudar por muitas ações, em particular [wars|lE], a concessão ou revogação de [titles|lE] e a [councillor_task|lE] [accept_culture|lE].\n\nCom o tempo, a aceitação retornará ao [cultural_acceptance_baseline|lE] se for ultrapassada."
 game_concept_cultural_acceptance_baseline: "Base de Aceitação Cultural"
 game_concept_cultural_acceptance_baseline_desc: "A [cultural_acceptance|lE] tem uma base para a qual decairá se a exceder. Essa base depende de:\n$EFFECT_LIST_BULLET$[heritage|E] compartilhada\n$EFFECT_LIST_BULLET$[language|E] compartilhado\n$EFFECT_LIST_BULLET$[faith|E] e [religion|lE] compartilhados, especialmente se forem [GetFaithDoctrine('doctrine_pluralism_pluralistic').GetBaseName] ou [GetReligionFamily('rf_eastern').GetName]\n$EFFECT_LIST_BULLET$[ethos|E] compartilhada dentro da mesma [region|lE]"
 game_concept_culture_pillar: "Pilar Cultural"
 game_concept_culture_pillars: "Pilares Culturais"
 game_concept_culture_pillar_desc: "[SelectLocalization( HasDlcFeature( 'reform_culture' ), 'game_concept_culture_pillar_desc_REFORM_DLC', 'game_concept_culture_pillar_desc_NO_REFORM_DLC' )]"
 game_concept_culture_pillar_desc_REFORM_DLC: "Os pilares são qualidades que refletem as origens de uma [culture|lE].\n\nHá 5 pilares culturais distintos:\n$EFFECT_LIST_BULLET$[ethos|E]\n$EFFECT_LIST_BULLET$[heritage|E]\n$EFFECT_LIST_BULLET$[language|E]\n$EFFECT_LIST_BULLET$[martial_custom|E]\n$EFFECT_LIST_BULLET$Estética\n\nDesses, o [culture_head|lE] pode mudar ethos, idioma e costumes marciais por meio de [reformation|lE]."
 game_concept_culture_pillar_desc_NO_REFORM_DLC: "Os pilares são qualidades imutáveis que refletem as origens de uma [culture|lE].\n\nHá 5 pilares culturais distintos:\n$EFFECT_LIST_BULLET$[ethos|E]\n$EFFECT_LIST_BULLET$[heritage|E]\n$EFFECT_LIST_BULLET$[language|E]\n$EFFECT_LIST_BULLET$[martial_custom|E]\n$EFFECT_LIST_BULLET$Estética"
 game_concept_culture_tradition: "Tradição Cultural"
 game_concept_culture_traditions: "Tradições Culturais"
 game_concept_tradition: "Tradição"
 game_concept_traditions: "Tradições"
 game_concept_culture_tradition_desc: "As tradições representam as práticas, costumes, atitudes e valores das [cultures|lE] individuais.\n\nCada tradição concede algum tipo de bônus ou habilidade especial aos [characters|lE] ou [counties|lE] daquela cultura.\n\n[SelectLocalization( HasDlcFeature( 'reform_culture' ), 'game_concept_culture_tradition_desc_REFORM_DLC', 'game_concept_culture_tradition_desc_NO_REFORM_DLC' )]\n\nAs culturas podem ter até 6 tradições, mas a maioria tem menos."
 game_concept_culture_tradition_desc_REFORM_DLC: "O [culture_head|lE] pode estabelecer novas Tradições ou substituir as existentes de uma Cultura por meio de [reformation|lE]."
 game_concept_culture_tradition_desc_NO_REFORM_DLC: "O [culture_head|lE] pode estabelecer novas Tradições para uma Cultura, ao custo de [prestige|lE]."
 game_concept_ethos: "Ethos"
 game_concept_ethos_desc: "O Ethos de uma [culture|lE] define seus valores centrais, princípios orientadores e a atitude geral de seus membros em relação à vida de modo geral.\n\nAlém disso, o Ethos afeta fortemente o custo para um [culture_head|lE] estabelecer novas [traditions|lE].[SelectLocalization( HasDlcFeature( 'reform_culture' ), 'game_concept_ethos_desc_REFORM_DLC', '' )]"
 game_concept_ethos_desc_REFORM_DLC: "\n\nO [culture_head|lE] pode substituir seu $game_concept_ethos$ atual por meio de [reformation|lE]."
 game_concept_language: "Idioma"
 game_concept_languages: "Idiomas"
 game_concept_language_desc: "O idioma é o [culture_pillar|lE] que determina a língua falada pela população em geral de uma [culture|lE]. As culturas que falarem o mesmo idioma recebem um bônus permanente em sua [cultural_acceptance_baseline|lE].\n\nUm [character|lE] pode dominar um ou mais idiomas. Conhecer um idioma reduz pela metade a penalidade de [opinion|lE] de [cultural_acceptance|lE] em relação a personagens e [counties|lE] que o falam. Também desencoraja as facções [Concept( 'faction_independence', 'independentistas' )|E] e [Concept( 'claimant_factions', 'legitimistas' )|E]\n\nOs personagens podem aprender novos idiomas tranquilamente usando a [scheme|lE] [GetScheme('learn_language').GetTypeName] até alcançar seu [language_limit|lE]."
 game_concept_language_limit: "Limite de Idiomas Estrangeiros"
 game_concept_language_limit_desc: "Uma pessoa consegue se lembrar confortavelmente de uma certa quantidade de [languages|lE]. Se ultrapassar esse limite, você terá de esquecer um idioma ou sofrer [stress|lE].\n\nO idioma da [culture|lE] própria não conta para esse limite.\n\nO limite é determinado por:\n$EFFECT_LIST_BULLET$Todos têm uma base de #V 1#!\n$EFFECT_LIST_BULLET$Cada [EmptyScope.ScriptValue('language_learning_divide_value')|V0] pontos de [learning|lE] [learning_i] aumenta em #V 1#!\n$EFFECT_LIST_BULLET$O [perk|lE] [GetPerk('open_minded_perk').GetName(GetNullCharacter)|l] aumenta em #V 2#!\n$EFFECT_LIST_BULLET$O [perk|lE] [GetPerk('smooth_operator_perk').GetName(GetNullCharacter)|l] aumenta em #V 1#!\n$EFFECT_LIST_BULLET$O [dynasty_perk|lE] [GetDynastyPerk('ep1_culture_legacy_1').GetName|l] aumenta em #V 1#!"
 game_concept_heritage: "Herança"
 game_concept_heritage_desc: "Uma Herança é o [culture_pillar|lE] que representa a ancestralidade comum de várias [cultures|lE].\n\nCulturas da mesma Herança geralmente têm uma maior [Concept( 'cultural_acceptance', 'aceptación' )|E] entre si."
 game_concept_martial_custom: "Costume Marcial"
 game_concept_martial_custom_desc: "Costume Marcial é o [culture_pillar|lE] que determina quais gêneros podem atuar como [commanders|lE] ou [knights|lE].\n\nAlgumas [traditions|lE] e [doctrines|lE] podem modificar essas regras para certos [characters|lE]."
 game_concept_culture_intermingling: "Interação Cultural"
 game_concept_culture_intermingling_desc: "Quanto mais duas [cultures|lE] coexistem no mesmo [realm|lE], mais interação acontecerá e mais as Culturas aumentarão sua [cultural_acceptance|lE]."
 game_concept_cultural_head: "Líder Cultural"
 game_concept_culture_head: "Chefe da Cultura"
 game_concept_culture_head_desc: "\"$game_concept_culture_head$\" é o [ruler|lE] que tem maior influência sobre sua [culture|lE].\n\nEspecificamente, o governante com o maior número de [counties|lE] da mesma cultura de seu [realm|lE] se tornará o líder cultural, independentemente de onde esteja seu [domain|lE] ou quais condados de outras culturas ele possa possuir.[AddLocalizationIf( HasDlcFeature( 'khans_of_the_steppe' ), 'game_concept_culture_head_desc_NOMAD_DLC', )]\n\nEste líder pode influenciar qual [innovation|lE] deve ser priorizada para descoberta ao definir a [cultural_fascination|lE].\n\n[SelectLocalization( HasDlcFeature( 'reform_culture' ), 'game_concept_culture_head_desc_REFORM_DLC', 'game_concept_culture_head_desc_NO_REFORM_DLC' )]"
 game_concept_culture_head_desc_NOMAD_DLC: "\n\nNo entanto, os governantes [nomadic|lE] escolherão seu $game_concept_cultural_head$ conforme quem tiver a maior [herd|lE], independentemente do posto. Caso governantes assentados façam parte da mesma [culture|lE] que os nômades, o fator decisivo será o [military_power|lE]."
 game_concept_culture_head_desc_REFORM_DLC: "O líder cultural também pode [reform|lE] partes de sua Cultura."
 game_concept_culture_head_desc_NO_REFORM_DLC: "O líder cultural também pode estabelecer novas [traditions|lE] em sua Cultura."
 game_concept_county_opinion: "Opinião Popular"
 game_concept_county_opinion_desc: "A população geral de cada [county|lE] tem opinião sobre o [character|lE] a quem esse condado pertence. Se a população estiver infeliz, pode fundar ou se unir a uma [peasant_faction|lE] ou [Concept( 'popular_faction', 'facção popular' )|E]. Qualquer uma delas pode se espalhar por todo o [realm|lE].\n\nA forma mais fécil de controlar a opinião popular à garantir que o [holder|lE] do condado seja da mesma [culture|lE] e [faith|lE] que a população.\n\nA opinião popular por ter uma [faith|lE] diferente à modificada pela [faith_hostility|lE] e pelo [fervor|lE] do condado, escalando linearmente entre 0 e 100 de $game_concept_fervor$."
 game_concept_core_tenet: "Princípio"
 game_concept_core_tenet_desc: "Enquanto as [Concept( 'doctrines', 'doutrinas' )|E] incluem aqueles assuntos sobre os quais [Concept( 'faith', 'fé' )|E] deve tomar uma posição, os dogmas centrais representam as peculiaridades e ritos únicos da Fé."
 game_concept_core_tenets: "Princípios"
 game_concept_holy_war: "Guerra Santa"
 game_concept_holy_wars: "Guerras Santas"
 game_concept_holy_war_holy: "Santa"
 game_concept_holy_war_desc: "Uma Guerra Santa é um tipo especial de [war|lE] travada por um [ruler|lE] de uma [faith|lE] contra um governante de uma fé diferente.\n\nCostumam ser bastante destrutivas, pois o vencedor normalmente toma para si todos os [counties|lE] da área alvo. No entanto, se a fé do atacante for [GetFaithDoctrine('doctrine_pluralism_pluralistic').GetBaseName] ou se o defensor tiver [vassals|lE] da mesma fé do atacante, alguns ou todos os governantes vassalos da área alvo podem ser simplesmente transferidos para o atacante.\n\nAo contrário de outras guerras, os governantes que compartilham a fé do alvo podem se juntar à sua defesa sem a necessidade de uma [alliance|lE].\n\nAs Guerras Santas podem ser permitidas ou restringidas dependendo das diferentes [religious_families|lE]."
 game_concept_great_holy_war: "Grande Guerra Santa"
 game_concept_great_holy_wars: "Grandes Guerras Santas"
 game_concept_great_holy_war_desc: "Uma Grande Guerra Santa é um tipo especial de [war|lE] que só pode ser declarada pelos [Concept( 'head_of_faith', 'cabeças' )|E] de certas [faith|E] com o objetivo de colocar um [kingdom|lE] inteiro sob o domínio de sua fé.\n\nAs Grandes Guerras Santas têm como alvo todos os [rulers|lE] de outra [religion|lE] dentro do [kingdom|lE] escolhido, forçando-os a defender-se juntos. Se forem vitoriosos, todos os [titles|lE] dentro do reino-alvo serão tomados e divididos entre os atacantes.\n\nDependendo de seus [doctrines|lE], uma fé pode ter acesso a [directed_great_holy_wars|lE], [undirected_great_holy_wars|lE] ou a nenhuma Grande Guerra Santa de forma alguma:\n$EFFECT_LIST_BULLET$São necessários os [core_tenets|lE] [GetFaithDoctrine('tenet_armed_pilgrimages').GetBaseName], [GetFaithDoctrine('tenet_struggle_submission').GetBaseName] ou [GetFaithDoctrine('tenet_warmonger').GetBaseName] para acessar Grandes Guerras Santas em geral.\n$EFFECT_LIST_BULLET$As fés com uma cabeça [GetFaithDoctrine('doctrine_temporal_head').GetBaseName] só terão acesso a Grandes Guerras Santas Direcionadas.\n$EFFECT_LIST_BULLET$As fés com uma cabeça [GetFaithDoctrine('doctrine_spiritual_head').GetBaseName] só terão acesso a Grandes Guerras Santas Não Direcionadas.\n$EFFECT_LIST_BULLET$As fés que não têm uma Cabeça da Fé não podem declarar nenhuma Grande Guerra Santa, mesmo que normalmente fossem elegíveis.\n\nAlgumas fés têm nomes especiais para essas guerras, como Cruzada ou Jihad. Essas Grandes Guerras Santas diferem apenas no nome e funcionam como qualquer outra Grande Guerra Santa."
 game_concept_directed_great_holy_war: "Grande Guerra Santa Direcionada"
 game_concept_directed_great_holy_wars: "Grandes Guerras Santas Direcionadas"
 game_concept_directed_great_holy_war_desc: "Uma [kingdom|lE] é declarada por um \n\nOs [rulers|lE] de sua [faith|lE] podem escolher ajudar o Chefe da Fé, e podem receber recompensas por isso. As recompensas incluem [piety|lE] e a possibilidade de que sua [dynasty|lE] se torne [land|lE] no reino conquistado.\n\nOs governantes da [religion|lE] alvo podem escolher se defender desta guerra sem necessidade de uma [alliance|lE]."
 game_concept_undirected_great_holy_war: "Grande Guerra Santa Não Direcionada"
 game_concept_undirected_great_holy_wars: "Grandes Guerras Santas Não Direcionadas"
 game_concept_undirected_great_holy_war_desc: "Os [heads_of_faith|lE] declaram as Grandes Guerras Santas não direcionadas com o objetivo de trazer um [Concept( 'kingdom', 'reino' )|E] sob o dománio de sua [Concept( 'faith', 'fé' )|E].\n\nAs Grandes Guerras Santas não direcionadas não começam imediatamente; em vez disso, entram em uma [preparation_phase|lE].\n\nAntes da guerra e durante ela, os governantes da fé atacante podem escolher doar [Concept( 'gold', 'ouro' )|E] ao [war_chest|lE].\n\nSe forem vitoriosos, o Reino alvo será tomado e dado a um personagem da fé atacante. As recompensas para os atacantes incluem [Concept( 'piety', 'piedade' )|E] e a possibilidade de que sua [Concept( 'dynasty', 'dinastia' )|E] se torne [land|lE] no Reino conquistado."
 game_concept_preparation_phase: "Fase de Preparação"
 game_concept_preparation_phase_desc: "A fase de preparação é o período de tempo antes de ser declarada uma [undirected_great_holy_war|lE].\n\nDurante esse tempo, os [rulers|lE] da [faith|lE] atacante podem prometer apoio militar à guerra e/ou doar para o [war_chest|lE].\n\nUm temporizador indicará o tempo restante da fase e, quando o tempo acabar, a guerra será declarada.\n\nPor sua vez, os governantes das [religions|lE] defensoras podem prometer apoio militar durante esse tempo, dando uma ideia da força de ambos os lados."
 game_concept_war_chest: "Tesouro de Guerra"
 game_concept_war_chest_desc: "O baú de guerra é um conjunto de [gold|lE], [piety|lE] e [prestige|lE]. Seu conteúdo à usado principalmente como recompensa por vencer [undirected_great_holy_wars|lE] com sucesso e será dividido entre os atacantes com base em sua participação na [war|lE].\n\nUma certa parte do que está nele também será dividida entre os atacantes quando a guerra for declarada.\n\nSe a [undirected_great_holy_war|lE] acabar em derrota, os defensores dividirão entre si a parte de piedade e prestágio do baú #weak (o ouro à perdido).#!"
 game_concept_crusade: "Cruzada"
 game_concept_great_holy_war_undirected: "Não Direcionada"
 game_concept_crusades: "Cruzadas"
 game_concept_jihad: "Jihad"
 game_concept_great_holy_war_directed: "Direcionada"
 game_concept_jihads: "Jihads"
 game_concept_title_tier: "Nível"
 game_concept_title_tiers: "Níveis"
 game_concept_rank: "Grau"
 game_concept_title_rank: "Grau"
 game_concept_title_ranks: "Graus"
 game_concept_ranks: "Graus"
 game_concept_title_tier_desc: "O $game_concept_title_tier$, equivalente em terras ao [rank|lE] de títulos, determina a posição de um [ruler|lE] ou [title|lE] na hierarquia do jogo.\n\nTodos os Títulos têm um Grau, que determina o mais alto Grau possível de [vassals|lE] que o [holder|lE] pode ter.\n\n[hegemony|E]. > [empire|lE] > [kingdom|lE] > [duchy|lE] > [county|lE] > [barony|lE]."
 game_concept_title_rank_desc: "O $game_concept_title_rank$, equivalente pessoal ao [title_tier|lE] de títulos, indica a posição de um [ruler|lE] ou [title|lE] na hierarquia do jogo.\n\nTodos os graus de títulos têm um posto associado, que indica o posto mais alto de [vassals|lE] que pode ter um [holder|lE].\n\n[hegemon|E] >[emperor|lE] > [king|lE] > [duke|lE] > [count|lE] > [baron|lE]."
 game_concept_clergy: "Clero"
 game_concept_clergy_desc: "Considera-se que são membros do clero [court_chaplains|lE] e [realm_priests|lE] governantes [Concept( 'theocratic', 'teocráticos' )|E] e qualquer pessoa com o traço [GetTrait('devoted').GetName( GetNullCharacter )].\n\nAs [doctrines|lE] da [faith|lE] determinam quem pode ser membro do clero e se os membros do clero podem se casar, herdar terras, etc."
 game_concept_church_property: "Propriedades da Igreja"
 game_concept_church_holdings: "Propriedades da Igreja"
 game_concept_church_holding: "Propriedade da Igreja"
 game_concept_church: "Igreja"
 game_concept_church_property_desc: "As propriedades eclesiásticas são [Concept( 'temples', 'templos' )|E] sob o controle de um [Concept( 'realm_priest', 'bispo' )|E].\n\nNas [Concept( 'faith', 'fés' )|E] com a [Concept( 'doctrine', 'doutrina' )|E] [GetFaithDoctrine('doctrine_theocracy_lay_clergy').GetBaseName|l], não existem propriedades eclesiásticas e os [Concept( 'rulers', 'governantes' )|E] leigos podem possuir [Concept( 'temples', 'templos' )|E] diretamente sem penalidade."
 game_concept_temple_citadel: "Cidadela do Templo"
 game_concept_temple_citadels: "Cidadelas do Templo"
 game_concept_temple_citadel_holding: "Propriedade de Cidadela do Templo"
 game_concept_temple_citadel_holdings: "Propriedades de Cidadela do Templo"
 game_concept_temple_citadel_holding_desc: "Cidadelas do Templo são uma mistura pragmática da fortificação [castle|lE] com o culto [temple|lE] — é o [holding_type|lE] padrão para [rulers|lE] [mandala|lE]. Elas fornecem uma quantidade equilibrada de [levies|lE], [piety|lE] e [taxes|lE]."
 game_concept_embarking: "Embarque"
 game_concept_embarked: "Embarcado"
 game_concept_embarked_i: "@embarked_icon!"
 game_concept_embark: "Embarcar"
 game_concept_embarkation: "Embarque"
 game_concept_embarking_desc: "Um [army|lE] embarca automaticamente em uma [fleet|lE] quando lhe é dada uma ordem de movimento para uma Zona Marítima, ou quando não há caminho terrestre até a [barony|lE] alvo.\n\nEmbarcar custa uma quantia de [gold|lE] que simboliza a aquisição e construção de navios. Para cada #V 100#! homens embarcados, paga-se um custo de #V [GetDefine('NFleet', 'EMBARK_GOLD_COST_PER_HUNDRED')|0]#! [gold_i]."
 game_concept_era: "Era"
 game_concept_eras: "Eras"
 game_concept_era_desc: "[innovations|lE] só podem ser descobertas se a [culture|lE] tiver alcançado a Era necessária. A próxima Era só pode começar após um certo ano e se pelo menos #V 50%#! das Inovações da Era anterior tiverem sido descobertas.\n\nGovernantes com [tribal_government|lE] e [nomadic_government|lE] só podem fazer uso de Inovações da Era Tribal."
 game_concept_innovation: "Inovação"
 game_concept_innovations: "Inovações"
 game_concept_innovation_desc: "As inovações são tecnologias e outros avanços que beneficiam todos os personagens de determinada [Concept( 'culture', 'cultura' )|E]. As inovações são agrupadas nas [eras|lE] em que podem ser descobertas.\n\nGraças ao contato com culturas vizinhas, uma cultura sempre se [Concept( 'spread', 'propaga' )|E] em direção a uma inovação específica que será descoberta muito mais rapidamente.\n\nAlém disso, o [culture_head|lE] pode definir outra inovação (ou a mesma) como [cultural_fascination|lE] para dar um impulso adicional ao seu desenvolvimento."
 game_concept_cultural_fascination: "Fascinação Cultural"
 game_concept_fascination: "Fascinação"
 game_concept_cultural_fascination_desc: "Cada Cultura é sempre Fascinada por uma [innovation|El] específica, o que aumenta muito a velocidade de descoberta a uma taxa que depende das [skills|El] do [culture_head|El] atual. Cada Inovação se beneficia de uma Skill específica.\n\nO Chefe da Cultura pode mudar livremente a Fascinação Cultural."
 game_concept_cultural_spread: "Disseminação Cultural"
 game_concept_spread: "Disseminação"
 game_concept_cultural_spread_desc: "O contato com outras [cultures|lE] que tenham descoberto [innovations|lE] fará com que uma dessas inovações seja descoberta mais rapidamente. Entre as [cultures|lE] disponíveis, aquela com a maior [cultural_acceptance|lE] será selecionada para propagar o progresso de [innovation|lE]."
 game_concept_congenital: "Congênito"
 game_concept_congenital_trait: "Traço Congênito"
 game_concept_congenital_traits: "Traços Congênitos"
 game_concept_congenital_desc: "Certos [traits|lE] são congênitos e podem ser herdados pela descendência. Com uma [breeding|lE] adequada, é até possível reforçar tais Traços.\n\nPor exemplo, se ambos os pais têm o Traço [GetTrait('intellect_good_1').GetName( GetNullCharacter )|l], há uma chance de que seus filhos recebam o Traço ainda melhor [GetTrait('intellect_good_2').GetName( GetNullCharacter )|l].\n\nAs [Concept( 'skills', 'habilidades' )|E] básicas não são congênitas."
 game_concept_breeding: "Criação Seletiva"
 game_concept_bred: "Criado"
 game_concept_breed: "Linhagem"
 game_concept_breeding_desc: "Se arranjarem [marriages|lE] entre personagens com bons [traits|lE] [Concept( 'congenital', 'congénitos' )|E], é possível gerar filhos com os mesmos Traços. Filhos sortudos podem até receber uma versão reforçada desses Traços.\n\nNo entanto, o mesmo vale para os Traços Congênitos ruins, como [GetTrait('beauty_bad_2').GetName( GetNullCharacter )|l].\n\nPode ser tentador arranjar casamentos entre personagens com parentesco próximo para produzir Traços melhores em seus filhos, mas isso também traz o risco de defeitos por [inbreeding|lE]."
 game_concept_inbreeding: "Endogamia"
 game_concept_inbred: "Endogâmico"
 game_concept_inbreeding_desc: "Os [children|lE] de dois [characters|lE] que sejam parentes próximos correm o risco de nascer com um defeito [Concept( 'congenital', 'congênito' )|E]. O mais grave é o [trait|lE] [GetTrait('inbred').GetName( GetNullCharacter )|l].\n\nÉ raro que isso aconteça na primeira geração, mas as endogamias sucessivas aumentam o risco.\n\nNo entanto, as gerações endogâmicas também podem conceder o traço benéfico de [GetTrait('pure_blooded').GetName( GetNullCharacter )|l], que torna a descendência imune a defeitos de nascimento, já que todas as falhas foram eliminadas da linhagem."
 game_concept_cadet_branching: "Criação de Ramo Cadete"
 game_concept_cadet_branch: "Ramo Cadete"
 game_concept_cadet_branches: "Ramos Cadetes"
 game_concept_cadet_branching_desc: "[dynasties|lE] sempre têm uma [house|lE] fundadora, mas, para se tornarem [house_heads|lE] por conta própria, membros de uma [house|lE] podem optar por criar sua própria nova Casa — um Ramo Cadete.\n\nMembros dessas Casas derivadas podem fazer o mesmo, levando eventualmente a uma árvore de Casas dentro da Dinastia maior."
 game_concept_house_head_interaction: "Interação do Chefe da Casa"
 game_concept_house_head_interaction_desc: "[Concept( 'interactions', 'interacciones' )|E] especiais que podem ser realizadas por um [house_head|lE] contra membros da sua [Concept( 'house', 'casa' )|E]."
 game_concept_demand_conversion: "Exigir Conversão"
 game_concept_demanding_conversion: "Exigindo conversão"
 game_concept_demand_conversion_desc: "Os [rulers|lE] com súditos de outra [faith|lE] podem exigir a conversão para mudar a fé do súdito para a sua. A habilidade de [learning|lE] do governante e a [opinion|lE] do súdito sobre seu suserano são fatores determinantes para saber se o súdito aceitará esse pedido ou se a [Concept('refuse_conversion_crime','rejeitará' )|E]."
 game_concept_damage: "Dano"
 game_concept_damage_desc: "O dano de um [soldier|lE] determina quantas [casualties|lE] pode infligir ao inimigo em uma [battle|lE].\n\nUm soldado de [levy|lE] inflige [GetDefine('NCombat', 'LEVY_ATTACK')|0] de dano."
 game_concept_toughness: "Resistência"
 game_concept_toughness_desc: "A dureza de um [soldier|lE] determina quanto [damage|lE] pode receber em [battle|lE] antes de se tornar uma [casualty|lE].\n\nUm soldado de [levy|lE] tem [GetDefine('NCombat', 'LEVY_TOUGHNESS')|0] de dureza."
 game_concept_pursuit: "Perseguição"
 game_concept_pursuit_desc: "Um [army|lE] vitorioso aumenta a quantidade de [casualties|lE] que inflige nas [aftermath|lE] da [battle|lE] segundo o valor combinado da perseguição do exército, o que converterá os [routed_soldiers|lE] em [Concept( 'dead_soldiers', 'soldados mortos' )|E]."
 game_concept_screen: "Tela"
 game_concept_screen_desc: "Um exército derrotado reduz a quantidade de [casualties|lE] que recebe nas [aftermath|lE] da [Concept( 'battle', 'batalha' )|E] segundo o valor combinado da tela do exército."
 game_concept_siege_progress: "Progresso do cerco"
 game_concept_siege_progress_desc: "Este progresso indica o quanto falta para que um [siege|lE] seja concluído e por quanto tempo o $game_concept_siege$ deve durar. Quando o progresso se completar, a [Concept( 'holding', 'propriedade' )|E] se tornará [Concept( 'occupied', 'ocupada' )|E].\n\nA quantidade de $game_concept_siege_progress$ necessária é afetada pelo [Concept( 'fort_level', 'nível de fortaleza' )|E] e pela quantidade de tropas da [garrison|lE].\n\nO progresso é obtido diariamente e é afetado por Eventos de Cerco. Também pode ser aumentado ao ter [Concept( 'siege_weapons', 'armas de cerco' )|E] ou um [Concept( 'army', 'exército' )|E] que supere em muito a [Concept( 'garrison', 'guarnição' )|E]."
 game_concept_siege_weapon: "Arma de cerco"
 game_concept_siege_weapons: "Armas de cerco"
 game_concept_siege_weapon_desc: "As armas de cerco são [Concept( 'men_at_arms', 'homens de armas' )|E] especializadas inteiramente em [sieges|lE].\n\nNão têm impacto nas [battles|lE], mas farão um cerco terminar muito mais rápido ao aumentar o [Concept( 'siege_progress', 'progresso' )|E].\n\nNo entanto, as armas de cerco só são eficazes para sitiar [Concept( 'holding', 'propriedades' )|E] até determinado [fort_level|lE]."
 game_concept_completely_controls: "Controla totalmente"
 game_concept_completely_control: "Controle total"
 game_concept_completely_controlled: "Totalmente controlado"
 game_concept_complete_control: "Controle total"
 game_concept_complete_control_desc: "Esta condição é cumprida quando todos os [Concept( 'titles', 'títulos' )|E] de vassalos [de_jure|lE] do título alvo são controlados tanto pelo [ruler|lE] quanto por seus [vassals|lE], e nenhum de seus condados está [Concept( 'occupied', 'ocupado' )|E] por [armies|lE] hostis."
 game_concept_complete_control_region: "Controle total"
 game_concept_completely_controls_region: "Controla totalmente"
 game_concept_completely_control_region: "Controle Total"
 game_concept_complete_control_region_desc: "Esta condição é cumprida quando todos os [Concept( 'counties', 'condados' )|E] da [Concept( 'region', 'região' )|E] objetivo estão nas mãos do governante ou dos seus [Concept( 'vassals', 'vassalos' )|E] e nenhuma de suas províncias foi ocupada por exércitos hostis."
 game_concept_region: "Região"
 game_concept_regions: "Regiões"
 game_concept_region_desc: "Uma região constitui uma área geográfica específica do mapa. Ao contrário das [Concept( 'de_jure', 'de iure' )|E] , as regiões nunca estão sujeitas a mudanças."
 game_concept_recently_disembarked: "Recentemente desembarcado"
 game_concept_recently_disembarked_desc: "Um [Concept( 'army', 'exército' )|E] estará recém-desembarcado quando desembarcar depois de ter estado no mar. Isso causará ao exército uma penalidade de [advantage|lE] nas [Concept( 'battles', 'batalhas' )|E] por um certo tempo."
 game_concept_diplomatic_range: "Alcance diplomático"
 game_concept_range: "Alcance"
 game_concept_diplomatic_range_desc: "Só à possível interagir com personagens que estejam dentro do Alcance Diplomático. No entanto, os [realms|lE] vizinhos sempre estáo ao alcance."
 game_concept_mongol_empire: "Império Mongol"
 game_concept_mongol_empire_desc: "Um poderoso governante tribal das Estepes pode criar este [Concept( 'title', 'título' )|E] de [Concept( 'empire', 'império' )|E] que permite o [mongol_invasion_casus_belli|lE].\n\nO título é criado ao tomar a [decision|lE] #EMP de \"$become_greatest_of_khans_decision$\"#!"
 game_concept_mongol_invasion_casus_belli: "Casus belli de invasão mongol"
 game_concept_mongol_invasion_casus_belli_desc: "Este poderoso [Concept( 'casus_belli', 'casus belli' )|E] só está disponível para o [Concept( 'ruler', 'governante' )|E] do [mongol_empire|lE].\n\nPode ter como alvo o [Concept( 'title', 'título' )|E] de um [Concept( 'kingdom', 'reino' )|E] inteiro e permite uma expansão rápida em grandes extensões de terreno."
 game_concept_hungarian_invasion_casus_belli: "Casus belli $HUNGARIAN_INVASION_CB_NAME$"
 game_concept_hungarian_invasion: "$HUNGARIAN_INVASION_CB_NAME$"
 game_concept_hungarian_invasion_casus_belli_desc: "Um [casus_belli|lE] poderoso, que só pode ser usado uma vez por campanha - no total - para conquistar todos os territórios controlados pelo alvo dentro da Panônia.\n\nCom a vitória, todos os mogyeres do [realm|lE] do atacante se deslocarão para a Panônia, [counties|lE] #EMP e#! [vassals|lE], deslocando os condados Ávaros. Os demais vassalos fora da Panônia seráo abandonados, enquanto os condados antes ocupados por mogyeres ficarão à disposição dos senhores locais e das tribos rivais das estepes."
 game_concept_pax_romana_invasion_casus_belli: "Casus belli Pax Romana"
 game_concept_pax_romana_invasion_casus_belli_desc: "Este poderoso [casus_belli|lE] só está disponível para o [ruler|lE] do Império Romano, com o objetivo de inaugurar uma nova [Glossary( 'Pax Romana', 'PAX_ROMANA_GLOSS' )].\n\nPode ter como alvo o [title|lE] de um [empire|lE] inteiro e permite uma expansão rápida por grandes extensões de terra."
 game_concept_eastern_roman_empire: "Império Romano do Oriente"
 game_concept_eastern_roman_empire_desc: "Um [title|lE] de [empire|lE] que pode ser criado pelo titular do Império Romano.\n\nO título é criado ao tomar a [decision|lE] de #EMP \"$split_roman_empire_decision$\"#!"
 game_concept_imperial_expedition_cb: "Expedição imperial"
 game_concept_imperial_expedition_cb_expedition: "Expedição"
 game_concept_imperial_expedition_cb_desc: "Um [casus_belli|lE] extremamente poderoso que os [co_emperors|lE] podem usar em $game_concept_duumvirates$.\n\nUma $game_concept_imperial_expedition_cb$ pode ser lançada contra qualquer [realm|lE] que faça fronteira com o [empire|lE] ou possua terras que pertençam [de_jure|lE] ao imperador sênior.\n\nPode ser dirigida (e normalmente será) contra #BER todos#! os [duchies|lE] que tenham fronteira de facto com o $game_concept_empire$ ou pertençam a este $game_concept_de_jure$.\n\nAlém disso, todo [governor|lE] fronteiriço com o defensor será convocado para a [war|lE] à força como [ally|lE]. Os $game_concept_governors$ remotos com [province_administrations|lE] militares terão a opção de se juntar ao conflito.\n\nSe a guerra for ganha, o $game_concept_co_emperor$ deverá decidir entre:\n$EFFECT_LIST_BULLET$ Entregar as terras conquistadas ao imperador sênior em troca de [influence|lE] e [opinion|lE]\n$EFFECT_LIST_BULLET$ Ficar com os territórios para si (custará $game_concept_opinion$)\n$EFFECT_LIST_BULLET$ Entregar a maior parte, mas ficar com o melhor [duchy|lE] ([influence|lE] e [opinion|lE] levemente reduzidos)\n$EFFECT_LIST_BULLET$ Nomear $game_concept_governors$ provisórios locais que ficarão em dívida com o co-imperador\n\n#WEAK Todas as recompensas escalam com a terra tomada: uma grande conquista proporciona #EMP significativamente#! mais $game_concept_influence$ que uma pequena guerra fronteiriça.#!"
 game_concept_knight: "Cavaleiro"
 game_concept_knights: "Cavaleiros"
 game_concept_knight_i: "@knight_icon!"
 game_concept_knights_possessive: "de cavaleiro"
 game_concept_knight_desc: "Um $game_concept_knight$ é um [vassal|lE], [courtier|lE] ou [follower|lE] que luta diretamente em seu [army|lE].\n\nDurante as [battles|lE], os cavaleiros usam sua [prowess_skill|lE] para lutar com eficácia. Com um nível alto de destreza, podem causar mais dano ao inimigo e sobreviver, ou até mesmo sair ilesos da batalha.\n\n[SelectLocalization( HasDlcFeature( 'tours_and_tournaments' ), 'game_concept_knight_desc_TOTO_DLC', 'game_concept_knight_desc_NO_TOTO_DLC' )][SelectLocalization( HasDlcFeature( 'accolades' ), 'game_concept_knight_desc_ACCOLADE_DLC', '' )]#weak Os cavaleiros podem ter nomes diferentes dependendo da [culture|lE] e da [faith|lE]. Por exemplo, podem ser $knight_champion_no_tooltip_plural$, $knight_faris_no_tooltip_plural$ ou $knight_baghatur_no_tooltip_plural$.\n\nOs cavaleiros representam tanto o personagem quanto o conjunto de tropas que o acompanha.#!"
 game_concept_knight_desc_TOTO_DLC: "Você ganha [prestige|lE] cada vez que um dos seus [knights|lE] vença ou [Concept( 'contest_qualifies', 'se classifique em' )|E] uma [contest|El] de um [GetActivityType( 'activity_tournament' ).GetName|l].\n\n"
 game_concept_knight_desc_NO_TOTO_DLC: ""
 game_concept_knight_desc_ACCOLADE_DLC: "Os cavaleiros que recebem um [accolade|El] se tornam [acclaimed_knights|El].\n\n"
 game_concept_knight_effectiveness: "Efétividade dos Cavaleiros"
 game_concept_knight_effectiveness_desc: "A eficácia de Cavaleiros de um [ruler|lE] indica o quão bem seus [knights|lE] lutam em cada [battle|lE].\n\nA 100 %, lutam normalmente, mas a 200 % lutam como se tivessem o dobro de [prowess|lE]."
 game_concept_short_reign: "Reinado curto"
 game_concept_short_reign_desc: "O reinado curto é uma penalidade de [opinion|lE] decrescente que todos os personagens de um [realm|lE] recebem com um [liege|lE] novo.\n\nDe maneira semelhante, os súditos recebem um bônus de opinião crescente de [long_reign|lE] com aqueles senhores que os governam há muito tempo."
 game_concept_long_reign: "Reinado longo"
 game_concept_long_reign_desc: "O reinado longo é uma bonificação de [opinion|lE] crescente que todos os personagens de um [realm|lE] recebem quando o [liege|lE] governa sobre eles há muito tempo.\n\nDe modo semelhante, os súditos terão uma penalidade de opinião decrescente por [short_reign|lE] com os novos suseranos."
 game_concept_troop_quality: "Qualidade"
 game_concept_troop_quality_desc: "A qualidade mede o poder de um [Concept( 'army', 'exército' )|E] em relação ao número de [Concept( 'soldiers', 'soldados' )|E] que possui.\n\nUm exército que contenha apenas [Concept( 'knights', 'cavaleiros' )|E] e [Concept( 'men_at_arms', 'homens de armas' )|E] terá alta qualidade, enquanto um exército que contenha um grande número de [Concept( 'levies', 'levas' )|E] terá qualidade menor.\n\nIsso significa que um exército menor, mas com alta qualidade, vai se sair muito melhor do que parece à considere cuidadosamente tanto a quantidade de soldados #emphasis quanto#! a qualidade antes de enfrentar o inimigo!"
 game_concept_religious_family: "Família Religiosa"
 game_concept_religious_families: "Famílias Religiosas"
 game_concept_religious_family_desc: "Uma família religiosa é um grupo de [religions|lE]. Este conceito afeta como as diferentes religiões e [faiths|lE] nelas contidas veem umas às outras.\n\nA família [GetReligionFamily('rf_abrahamic').GetName] tolera [holy_wars|lE] contra todos #weak (incluindo outros abraâmicos).#! As religiões são suscetíveis à [heresy|lE].\n\nA família [GetReligionFamily('rf_eastern').GetName] só tolera Guerras Santas contra outras Famálias Religiosas.\n\nA família [GetReligionFamily('rf_pagan').GetName] tolera Guerras Santas contra todos, mas, para acessar essas guerras, as fés dentro das religiões devem ser reformadas."
 game_concept_debt: "Dívida"
 game_concept_debt_desc: "Você está em dívida quando tem uma quantidade negativa de [gold|lE] [gold_i]. Isso geralmente acontece quando um [ruler|lE] em guerra contrata [mercenaries|lE] sem ter ouro suficiente para cobrir o custo total, ou quando a guerra se prolonga demais.\n\n Se você está em dívida, não pode declarar novas [wars|lE], suas [men_at_arms|lE] não se reforçarão e seus inimigos terão uma [advantage|lE] nas batalhas. Quanto mais você se endividar, mais penalidades receberá — menos [levies|lE], uma [county_opinion|lE] reduzida e seus [vassals|lE] gostarão menos de você.\n\nAlém disso, podem ocorrer outros eventos menores de desestabilização, como os [counties|lE] de seu [domain|lE] ganharem [county_corruption|lE]. \n\n#help En general, es buena idea atacar a tus enemigos cuando estén endeudados, ya que lucharán con una [advantage|lE] reducida!#!"
 game_concept_treasury_debt: "Dívida do Tesouro"
 game_concept_treasury_debt_desc: "A Dívida do Tesouro é o estado de possuir uma quantidade negativa de [treasury|lE] [treasury_i]. Isso geralmente acontece quando um [governor|lE] em guerra contrata [mercenaries|lE] sem ter Tesouro suficiente para cobrir o custo total, quando a guerra se prolonga demais ou se pagam [Concept( 'treasury_budgeting', 'salários' )|E] salários altos demais em relação ao que arrecadam com os [vassals|El]. \n\nSe você estiver em Dívida, não poderá declarar novas [wars|lE], suas [men_at_arms|lE] que dependem do Tesouro não se reforçarão e seus inimigos terão [advantage|lE] nas batalhas. Quanto mais profunda for a sua dívida, mais penalidades você receberá — menos [levies|lE], uma [county_opinion|lE] reduzida e seus [vassals|lE] gostarão menos de você.\n\nAlém disso, podem ocorrer outros pequenos eventos desestabilizadores, como ganhar [counties|lE] em seus [domain|lE] do [county_corruption|lE]. \n\n#help En general, es buena idea atacar a tus enemigos cuando estén endeudados, ya que lucharán con una [advantage|lE] reducida!#!"
 game_concept_beneficiary: "Beneficiário"
 game_concept_beneficiaries: "Beneficiários"
 game_concept_beneficiary_desc: "Todo participante em uma [great_holy_war|E] pode selecionar um beneficiário de sua [Concept( 'dynasty', 'dinastia' )|E]. Com a vitória, o beneficiário receberá terras no reino-alvo proporcionais à [war_contribution|lE] de seu governante.\n\nO maior contribuinte pode forçar seu Beneficiário a receber o título principal em disputa."
 game_concept_papal_recipient: "Candidato Favorecido"
 game_concept_papal_recipient_desc: "Se o objetivo principal de uma [Concept( 'great_holy_war', 'gran guerra santa' )|E] já estiver tomado ou reivindicado por um membro da fé agressora, ele será considerado o legítimo destinatário do título em disputa, a menos que o [Concept( 'war_contribution', 'contribuyente ' )|E] principal decida dar preférência ao seu próprio [beneficiary|lE]."
 game_concept_end_date: "Data final"
 game_concept_end_date_desc: "1453 d.C. é a Data Final, e ao alcançá-la o jogo terminará."
 game_concept_realm_size: "Tamanho do Reino"
 game_concept_realm_size_desc: "O tamanho do domínio de um personagem é o número de [counties|lE] que eles possuem e de seus [vassals|lE] e ele."
 game_concept_voter_strength: "Força do Eleitor"
 game_concept_voting_strength: "Força de Voto"
 game_concept_voting_power: "Poder de Voto"
 game_concept_voter_strength_desc: "A força do eleitor representa a influência que um eleitor exerce ao votar em uma [Concept( 'succession_law', 'ley de sucessão' )|E] eletiva. Esse valor geralmente aumenta dependendo do [rank|lE] do governante, mas outros fatores podem entrar em jogo dependendo da lei [titlepossessive|lE]."
 game_concept_stress_level: "Nível de Estresse"
 game_concept_stress_levels: "Níveis de Estresse"
 game_concept_stressed: "Estressado"
 game_concept_stress_level_desc: "Por cada 100 pontos de [Concept( 'stress', 'estrés' )|E] que um personagem acumular, isso também lhe fará ganhar um nível de estresse. Os níveis de estresse variam de 0 a 3, e cada nível impõe penalidades crescentes à [fertility|lE] e à [health|lE] de um personagem.\n\nAlém disso, enquanto um personagem tiver pelo menos 1 nível de estresse, ele ficará vulnerável a [mental_breaks|lE]."
 game_concept_mental_break: "Colapso Mental"
 game_concept_mental_breaks: "Colapsos Mentais"
 game_concept_mental_break_desc: "Quando o [Concept( 'stress', 'estresse' )|E] sobrecarrega um personagem, ele sofrerá um Colapso Mental é uma crise pessoal em que sente que precisa fazer algo para reduzir seu Estresse, custe o que custar.\n\nOs personagens que sofrem um Colapso Mental terão várias maneiras de lidar com a situação, embora muitas delas tragam consequências negativas.\n\nEm [stress_levels|lE] baixos, as consequências seráo pequenas e féceis de administrar. à medida que o Nível de Estresse aumenta, porém, essas consequências também aumentam, levando eventualmente à insanidade e até à morte."
 stress_icon_tooltip: "$game_concept_mental_break_desc$"
 game_concept_clergy_opinion: "Opinião do Clero"
 game_concept_clergy_opinion_desc: "Este tipo de [Concept( 'opinion', 'opinião' )|E] só afeta o [Concept( 'clergy', 'clero' )|E] de nossa própria [Concept( 'faith', 'fé' )|E]."
 game_concept_secular_opinion: "Opinião Secular"
 game_concept_secular_opinion_desc: "Este tipo de [Concept( 'opinion', 'opinião' )|E] afécta a todos los personagens que #emphasis no#! son pertenecen al [Concept( 'clergy', 'clero' )|E]."
 game_concept_title_allegiance: "Lealdade ao Título"
 game_concept_title_allegiance_desc: "Os [Concept( 'vassals', 'vassalos' )|E] podem dever lealdade a um [Concept( 'title', 'título' )|E] específico em vez da pessoa que é seu [Concept( 'liege', 'senhor' )|E]. Isso só acontece se o título tiver uma [Concept( 'succession_law', 'ley de sucessão' )|E] própria. Na ocasião da [Concept( 'succession', 'sucessão' )|E] , esses vassalos se tornarão vassalos do novo [Concept( 'holder', 'titular' )|E] do título."
 game_concept_nominate: "Nomear"
 game_concept_nominate_heir: "Nomear Herdeiro"
 game_concept_nomination: "Nomeação"
 game_concept_nominations: "Nomeações"
 game_concept_nominate_desc: "Sob [succession_laws|lE] eletivas, cada [elector|lE] pode Nomear seu [title_heir|lE] preferido. Os candidatos válidos e as preférências de voto dos Eleitores variam conforme a Lei específica."
 game_concept_elector: "Eleitor"
 game_concept_electors: "Eleitores"
 game_concept_elector_desc: "Eleitores são os personagens que podem votar em seu [title_heir|lE] preferido sob [succession_laws|lE] eletivas. A Lei específica determina quem é considerado Eleitor."
 game_concept_attraction: "Atração"
 game_concept_attracted: "Atraído"
 game_concept_attraction_desc: "A atração é um tipo de [Concept( 'opinion', 'opinião' )|E] que só afeta personagens cuja [sexuality|lE] corresponda ao nosso gênero.\n\nPor exemplo, um homem [homosexual|lE] experimentará essa opinião em relação a outros homens, enquanto um personagem [asexual|lE] não a experimentará em relação a ninguém e uma mulher [heterosexual|lE] a experimentará em relação a homens.\n\nEsse tipo de opinião deixa de ter efeito em mulheres com mais de [GetDefine('NCharacter', 'FEMALE_ATTRACTION_CUTOFF_AGE')] anos de idade, e em homens com mais de [GetDefine('NCharacter', 'MALE_ATTRACTION_CUTOFF_AGE')] anos de idade."
 game_concept_sexuality: "Orientação Sexual"
 game_concept_sexuality_desc: "A orientação sexual de um personagem determina por quais outros personagens ele pode se sentir [attracted|lE].\n\nA orientação sexual não afeta com quem eles podem se [Concept( 'marry', 'casar' )|E], mas pode reduzir a [fertility|lE] da dupla se um dos cônjuges não corresponder à preférência do outro.\n\nAs orientações sexuais modeladas em #EMP Crusader Kings III#! são:\n$EFFECT_LIST_BULLET$[heterosexual|E]\n$EFFECT_LIST_BULLET$[homosexual|E]\n$EFFECT_LIST_BULLET$[bisexual|E]\n$EFFECT_LIST_BULLET$[asexual|E]"
 sexuality_ho: "[homosexual|E]"
 game_concept_homosexual: "Homossexual"
 game_concept_homosexual_desc: "Em #EMP Crusader Kings III#!, este personagem sente atração por personagens do próprio gênero."
 sexuality_he: "[heterosexual|E]"
 game_concept_heterosexual: "Heterossexual"
 game_concept_heterosexual_desc: "Em #EMP Crusader Kings III#!, este personagem sente atração por personagens do gênero oposto."
 sexuality_bi: "[bisexual|E]"
 game_concept_bisexual: "Bissexual"
 game_concept_bisexual_desc: "Em #EMP Crusader Kings III#!, este personagem sente atração por personagens tanto do mesmo gênero quanto do gênero oposto."
 sexuality_as: "[asexual|E]"
 game_concept_asexual: "Assexual"
 game_concept_asexual_desc: "Em #EMP Crusader Kings III#!, este personagem sente pouca ou nenhuma atração por outros personagens, independentemente do gênero."
 sexuality_none: "#V Nenhuma#!"
 game_concept_title_succession: "Sucessão do Título"
 game_concept_title_specific_succession: "Específica do Título"
 game_concept_title_succession_desc: "Um [title|El] pode ter sua própria [succession_law|El], que é diferente da do [realm|El] do [holder|El].\n\nOs [kingdoms|El] e [empires|El] têm mais probabilidade de possuir uma [Concept( 'title_succession', '$game_concept_title_succession|q$' )|l] tradicional.\n\nO [Concept( 'holder', '$game_concept_holder|q$' )|l] do título pode adicionar ou remover leis de sucessão específicas de títulos, geralmente ao custo de [prestige|El].\n\nOs [domiciles|El] também têm sua própria [Concept( 'title_succession', '$game_concept_title_succession|q$' )|l], que não pode ser removida."
 game_concept_designated_heir: "Herdeiro Designado"
 game_concept_designated_heir_desc: "O herdeiro designado tem prioridade ao decidir quem será o próximo [realm_heir|lE]."
 game_concept_incest: "Incesto"
 game_concept_incestuous: "Incestuoso"
 game_concept_incest_desc: "O incesto se refére à atividade sexual entre parentes próximos.\nÉ a [Concept( 'doctrine', 'doutrina' )|E] de $doctrine_consanguinity_name$ da [Concept( 'faith', 'fé' )|E] de um personagem que determina quais relações são consideradas incestuosas."
 game_concept_relation: "Relação Especial"
 game_concept_relations: "Relações Especiais"
 game_concept_relationship: "Relacionamento Especial"
 game_concept_relation_desc: "As relações especiais são aquelas que vinculam dois personagens que não são família nem têm uma relação de [vassalage|lE]. Existem várias categorias, podem implicar [character_modifiers|lE] para os personagens envolvidos e chegam a determinar o que pode acontecer entre eles.\n\nRelações padrão são:\n$EFFECT_LIST_BULLET$ [friend|E]\n$EFFECT_LIST_BULLET$ [lover|E]\n$EFFECT_LIST_BULLET$ [rival|E]\n$EFFECT_LIST_BULLET$ [guardian|E]\n$EFFECT_LIST_BULLET$ [ward|E]\n$EFFECT_LIST_BULLET$ [mentor|E]\n$EFFECT_LIST_BULLET$ [student|E]\n$EFFECT_LIST_BULLET$ [elder|E]\n$EFFECT_LIST_BULLET$ [disciple|E]\n\nRelações aprimoradas são:\n$EFFECT_LIST_BULLET$ [best_friend|E]\n$EFFECT_LIST_BULLET$ [soulmate|E]\n$EFFECT_LIST_BULLET$ [nemesis|E]\n\nRelações de infância são:\n$EFFECT_LIST_BULLET$ [bully|E]\n$EFFECT_LIST_BULLET$ [victim|E]\n$EFFECT_LIST_BULLET$ [crush|E]"
 game_concept_lover: "Amante"
 game_concept_lovers: "Amantes"
 game_concept_lover_possessive: "do Amante"
 game_concept_lovers_possessive: "dos Amantes"
 game_concept_lover_desc: "Os amantes são dois [characters|lE] que mantêm uma relação com conexão amorosa e sexual.\n\nComo isso frequentemente acontece fora do [marriage|lE] ou do [concubinage|lE], a maioria das relações entre amantes começa como [secrets|lE].\n\nSe um homem e uma mulher forem amantes, a mulher pode engravidar do homem. Se eles não forem casados (nem estiverem em concubinato), o filho será [bastard|lE], seja secreto ou não.\n\nOs amantes especialmente leais e afetuosos podem se tornar [soulmates|lE]."
 game_concept_soulmate: "Alma Gêmea"
 game_concept_soulmates: "Almas Gêmeas"
 game_concept_soulmate_possessive: "da Alma Gêmea"
 game_concept_soulmates_possessive: "das Almas Gêmeas"
 game_concept_soulmate_desc: "Um alma gêmea é uma relação especial que indica um amor romântico profundo. É uma relação especial mais forte do que a de um [lover|lE]. Cada personagem só pode ter um alma gêmea."
 game_concept_friend: "Amigo"
 game_concept_friends: "Amigos"
 game_concept_friendships: "Amizades"
 game_concept_friend_possessive: "do Amigo"
 game_concept_friends_possessive: "dos Amigos"
 game_concept_friendship: "Amizade"
 game_concept_friend_desc: "Um amigo é uma relação que indica grande amizade e apoio, podendo existir tanto entre [children|lE] quanto entre [adults|lE].\n\nOs amigos com uma ligação profunda podem se tornar [best_friends|lE]."
 game_concept_best_friend: "Melhor Amigo"
 game_concept_best_friends: "Melhores Amigos"
 game_concept_best_friend_possessive: "do Melhor Amigo"
 game_concept_best_friends_possessive: "dos Melhores Amigos"
 game_concept_best_friend_desc: "Um melhor amigo é uma relação que indica dedicação e apoio por toda a vida. É uma relação mais forte do que a mera [Concept( 'friend', 'amistad' )|E]. Cada [character|lE] só pode ter um melhor amigo."
 game_concept_rival: "Rival"
 game_concept_rivals: "Rivais"
 game_concept_rivalries: "Rivalidades"
 game_concept_rivalry: "Rivalidade"
 game_concept_rival_possessive: "do Rival"
 game_concept_rivals_possessive: "dos Rivais"
 game_concept_rival_desc: "Um rival é uma relação que indica ressentimento vitalício, senão ódio.\n\nQuando dois rivais se odeiam de verdade, podem se tornar [nemeses|lE]."
 game_concept_nemesis: "Arqui-inimigo"
 game_concept_nemeses: "Arqui-inimigos"
 game_concept_nemesis_possessive: "do Arqui-inimigo"
 game_concept_nemeses_possessive: "dos Arqui-inimigos"
 game_concept_nemesis_desc: "Uma nêmesis é uma relação que indica o mais absoluto ódio e desprezo mútuos. É algo mais intenso do que ser [Concept( 'rival', 'rivales' )|E]. Um personagem só pode ter uma nêmesis."
 game_concept_grudge: "Rancor"
 game_concept_grudges: "Rancores"
 game_concept_grudge_possessive: "do Rancor"
 game_concept_grudges_possessive: "dos Rancores"
 game_concept_grudge_desc: "Um $game_concept_grudge$ é uma $game_concept_relation$ que indica ódio e ressentimento unilaterais. O alvo de um rancor não retribui esses sentimentos e talvez nem saiba disso.\n\n#WEAK $game_concept_grudges$ se formam com mais frequência quando um [character|lE] faz algo horrível a outro sem sequer perceber que ele existe — por exemplo, um rei deixando um camponês em sua [dungeon|lE] por quarenta anos.#!"
 game_concept_guardian: "Guardião"
 game_concept_guardians: "Guardiões"
 game_concept_guardian_possessive: "do Guardião"
 game_concept_guardians_possessive: "dos Guardiões"
 game_concept_guardianship: "Tutela"
 game_concept_guardian_desc: "Um tutor é um [character|lE] designado para [educate|lE] a um [child|lE] (chamado de seu [ward|lE]).\n\nOs tutores geralmente transmitem suas [personality_traits|lE] aos seus pupilos, assim como sua [culture|lE] e/ou [faith|lE], se isso for especificado no foco de educação.\n\nO tutor pode residir em uma [court|lE] diferente. Confiar um [close_family_member|lE] ao cuidado de outro [ruler|lE] dessa forma aumentará sua [opinion|lE] sobre você."
 game_concept_ward: "Tutelado"
 game_concept_wards: "Tutelados"
 game_concept_ward_possessive: "do Tutelado"
 game_concept_wards_possessive: "dos Tutelados"
 game_concept_ward_desc: "Um pupilo é um [child|lE] [educated|lE] por um [guardian|lE]. Todo tutor pode cuidar de até dois pupilos."
 game_concept_mentor: "Mentor"
 game_concept_mentors: "Mentores"
 game_concept_mentor_possessive: "do Mentor"
 game_concept_mentors_possessive: "dos Mentores"
 game_concept_mentor_desc: "Os mentores são [characters|lE] que ajudam a melhorar as [skills|lE] de seus [student|lE]. Você pode obter um por meio de eventos se seu [focus|lE] de [lifestyle|lE] estiver definido para uma habilidade específica."
 game_concept_student: "Aluno"
 game_concept_students: "Alunos"
 game_concept_student_possessive: "do Aluno"
 game_concept_students_possessive: "dos Alunos"
 game_concept_student_desc: "Os estudantes são [characters|lE] que se beneficiam da orientação de seu [mentor|lE] que os ajuda a desenvolver uma de suas [skills|lE]. Você recebe mentores por meio de eventos se seu [focus|lE] de [lifestyle|lE] se volta para aquelas habilidades em que se destacam."
 game_concept_bully: "Valentão"
 game_concept_bullies: "Valentões"
 game_concept_bully_possessive: "do Valentão"
 game_concept_bullies_possessive: "dos Valentões"
 game_concept_bully_desc: "Um valentão é um [child|lE] cruel que intimida outro (sua [victim|lE]) por diversão, ganho ou até por tédio. Ao chegar à [adulthood|lE], um valentão pode se tornar um [rival|lE] ou superar seu ódio infantil."
 game_concept_victim: "Vítima"
 game_concept_victims: "Vítimas"
 game_concept_victim_possessive: "da Vítima"
 game_concept_victims_possessive: "das Vítimas"
 game_concept_victim_desc: "Uma vítima é uma [child|lE] que sofre o abuso de outro, em geral por motivos que só compreende seu [bully|lE]. Ao chegar à [adulthood|lE] pode ser [rival|lE] desse abusão ou deixar para trás os problemas de sua juventude."
 game_concept_crush: "Paixão"
 game_concept_crushes: "Paixões"
 game_concept_crush_possessive: "da Paixão"
 game_concept_crushes_possessive: "das Paixões"
 game_concept_crush_desc: "Uma paixonite é um [child|lE] por quem este outro está desenvolvendo seus primeiros sentimentos (bastante desajeitados e dolourosos). Ao atingir a [adulthood|lE], e se o sentimento de paixonite for mútuo, pode se transformar em uma relação de [lovers|lE] ou talvez o [character|lE] em questão siga em frente com a vida."
 game_concept_blood_brother: "Irmão de Sangue"
 game_concept_blood_brothers: "Irmãos de Sangue"
 game_concept_blood_brother_possessive: "do Melhor Amigo"
 game_concept_blood_brothers_possessive: "dos Melhores Amigos"
 game_concept_blood_brother_desc: "$game_concept_blood_brother$ é uma forma especial de [friend|lE] e [ally|lE]. Os [characters|lE] só podem ter um $game_concept_blood_brother$: esse passa a ser um membro simbólico de sua família (e, portanto, não pode já fazer parte da [family|lE]. Se o chamado à [war|lE] de um $game_concept_blood_brother$ for recusado, a [relation|lE] se rompe e os dois se tornam [rivals|lE].\n\nOs irmãos de sangue, seus [children|lE] e cônjuges primários têm aumento da [opinion|lE] mútua e podem negociar [alliances|lE] entre si.\n\nA Irmandade de Sangue está disponível por meio de um [nomadic_government|lE], o [trait|lE] [GetTrait('nomadic_philosophy').GetName( GetNullCharacter )|l] ou por meio de uma [tradition|lE]."
 game_concept_modifier: "Modificador"
 game_concept_modifiers: "Modificadores"
 game_concept_modifier_desc: "Um modificador é um efeito que altera um valor ao longo de um período mais longo. Por exemplo, pode alterar o valor das [Concept( 'skills', 'habilidades' )|E] de um personagem ou a [Concept( 'success_chance', 'probabilidade de sucesso' )|E] de uma [Concept( 'scheme', 'conjura' )|E].\n\nOs modificadores geralmente aparecem para personagens, conjuras ou [Concept( 'counties', 'condados' )|E]."
 game_concept_character_modifier: "Modificador de Personagem"
 game_concept_character_modifiers: "Modificadores de Personagem"
 game_concept_character_modifier_desc: "Os [modifiers|E] de um personagem afetam sua personalidade, [skills|lE], e até mesmo sua [income|lE]. Diferentemente dos [traits|lE] , os modificadores costumam representar efeitos temporários."
 game_concept_critical_failure: "Falha Crítica"
 game_concept_critically_fail: "Falhar Criticamente"
 game_concept_critical_failure_desc: "Alguns [schemes|E] têm a possibilidade de $game_concept_critical_failure$ durante a execução.\n\nOs resultados exatos variam, mas incluem o $game_concept_scheme$ sair pela culatra contra o [scheme_owner_owner|lE], ou impedi-lo de tentar o mesmo $game_concept_scheme$ contra o mesmo [scheme_target_target|lE] por algum tempo."
 game_concept_espionage: "$task_find_secrets$"
 game_concept_espionage_desc: "Espionagem é uma [councillor_task|lE] realizada pelo [Concept( 'spymaster', 'mestre-espião' )|E].\n\nSeu objetivo é a [court|lE] de um [ruler|lE] com a intenção de descobrir os [secrets|lE] dos personagens que estejam lá."
 game_concept_disrupt_schemes: "$task_disrupt_schemes$"
 game_concept_disrupt_schemes_desc: "$game_concept_disrupt_schemes$ é uma [councillor_task|lE] executada pelo [spymaster|lE].\n\nEla aumenta a [scheme_discovery_chance|lE] de um [ruler|lE] e desacelera as ações hostis do $game_concept_spymaster$ de outros $game_concept_ruler$s, como [espionage|lE]."
 game_concept_increase_control: "$task_increase_control$"
 game_concept_increase_control_desc: "$game_concept_increase_control$ é uma [councillor_task|lE] realizada pelo [Concept( 'marshal', 'mariscal' )|E].\n\nSeu objetivo é um [county|lE] onde aumentará seu [control|lE]. Remove a [county_corruption|lE] com o passar do tempo."
 game_concept_manage_guards: "$task_manage_guards$"
 game_concept_manage_guards_desc: "Dirigir a guarda é uma [councillor_task|lE] que é realizada pelo [marshal|lE].\n\nAumenta a [knight_efféctiveness|lE] e reduz a [success_chance|E] de [Concept( 'hostile_scheme', 'conjuras hostiles' )|E] contra o [liege|lE] do conselheiro."
 game_concept_collect_taxes: "$task_collect_taxes$"
 game_concept_collect_taxes_desc: "$game_concept_collect_taxes$ é uma [councillor_task|lE] executada pelo [steward|lE].\n\nEla aumenta todos os impostos no [domain|lE] pessoal de um personagem."
 game_concept_promote_culture: "$task_promote_culture$"
 game_concept_promote_culture_desc: "$game_concept_promote_culture$ é uma [councillor_task|lE] executada pelo [steward|lE].\n\nMuda a [culture|lE] de um [county|lE] para corresponder à cultura do seu governante."
 game_concept_accept_culture: "$task_accept_culture$"
 game_concept_promoting_cultural_acceptance: "Promovendo Aceitação"
 game_concept_accept_culture_desc: "$game_concept_accept_culture$ é uma [councillor_task|lE] realizada pelo [steward|lE].\n\nAumenta a [cultural_acceptance|lE] entre a [culture|lE] alvo e a [Concept( 'rulerpossessive', 'do senhor' )|E]."
 game_concept_theocratic_vassal: "Vassalo Teocrático"
 game_concept_theocratic_vassals: "Vassalos Teocráticos"
 game_concept_theocratic_vassal_desc: "Vassalos com a forma de [theocratic_government|lE].\n\nSeu funcionamento é determinado pelas [doctrines|lE] de sua [faith|lE]."
 game_concept_ducal_conquest_casus_belli: "Casus Belli de Conquista Ducal"
 game_concept_ducal_conquest: "Conquista Ducal"
 game_concept_ducal_conquest_casus_belli_desc: "Este [Concept( 'casus_belli', 'casus belli' )|E] permite a tomada dos [Concept( 'counties', 'condados' )|E] necessários para criar um [uncreated_title|lE] de posto de [Concept( 'duchy', 'ducado' )|E]."
 game_concept_vassalize_casus_belli: "Casus Belli de Vassalização Forçada"
 game_concept_vassalization_casus_belli: "Vassalização Forçada"
 game_concept_vassalized_casus_belli: "Forçosamente Vassalizado"
 game_concept_vassalize_casus_belli_desc: "É um [casus_belli|lE] que permite a [vassalization|lE] forçada de um [ruler|lE] vizinho independente de posto inferior. É desbloqueado pelo [perk|lE] [GetPerk( 'forced_vassalage_perk' ).GetName( GetNullCharacter )].\n\nVocê pode vassalizar qualquer governante que não tenha mais de #V [EmptyScope.ScriptValue('vassalize_default_size')|0]#! [counties|lE] em seu [realm|lE].\n\nEsse limite aumenta em #P +[EmptyScope.ScriptValue('vassalize_growth_per_innovation')|0]#! com cada uma das seguintes inovações:\n$EFFECT_LIST_BULLET$#V $innovation_casus_belli$#!\n$EFFECT_LIST_BULLET$#V $innovation_chronicle_writing$#!\n$EFFECT_LIST_BULLET$#V $innovation_divine_right$#!\n$EFFECT_LIST_BULLET$#V $innovation_rightful_ownership$#!"
 game_concept_title_creation: "Criação de Título"
 game_concept_create: "Criar"
 game_concept_created: "Criado"
 game_concept_create_title: "Criar Título"
 game_concept_created_title: "Título Criado"
 game_concept_uncreated_title: "Título Não Criado"
 game_concept_title_creation_desc: "O [ruler|lE] que controla a maioria das terras [de_jure|lE] [Concept( 'titlepossessive', 'de um título' )|E] ainda não criado pode criá-lo gastando [gold|lE], mas receberá [prestige|lE] em troca.\n\nSó se podem criar títulos de nível de [duchy|lE], [kingdom|lE] ou [empire|lE].\n\nA férramenta Assuntos contêm uma lista com todos os títulos que podemos criar no momento."
 game_concept_foreign_affairs: "$task_foreign_affairs$"
 game_concept_foreign_affairs_desc: "$task_foreign_affairs$ é [councillor_task|lE] desempenhada pelo [chancellor|lE].\nPara um [ruler|lE] [independent|lE], aumenta a opinião que outros governantes independentes tenham dele. Para um vassalo, aumenta a opinião que os demais vassalos do mesmo [liege|lE]."
 game_concept_domestic_affairs: "$task_domestic_affairs$"
 game_concept_domestic_affairs_desc: "É uma [Concept( 'councillor_task', 'tarefa de conselheiro' )|E] que é realizada pelo [Concept( 'chancellor', 'canciller' )|E] e melhora a opinião que os [vassals|lE] do [Concept( 'realm', 'senhorio' )|E] têm do [Concept( 'liege', 'senhor' )|E]."
 game_concept_bestow_royal_favor: "$task_bestow_royal_favor$"
 game_concept_bestow_royal_favor_desc: "Uma [councillor_task|lE] realizada pelo [chancellor|lE] que melhora a opinião de um [vassal|E] escolhido do [realm|lE] sobre seu [liege|lE]."
 game_concept_integrate_title: "$task_integrate_title$"
 game_concept_integrate_title_desc: "Uma [councillor_task|lE] executada pelo [chancellor|lE], que acelera o processo de [de_jure_drift|lE] de um [title|lE]."
 game_concept_fabricate_claim: "$task_fabricate_claim$"
 game_concept_fabricate_claim_short: "Fabricar Reivindicação"
 game_concept_fabricated_claims_short: "Reivindicações Fabricadas"
 game_concept_fabricating_claims: "Fabricando Reivindicações"
 game_concept_fabricate_claim_desc: "$task_fabricate_claim$ é uma [Concept( 'councillor_task', 'tarefa de conselheiro' )|E] realizada pelo [Concept( 'court_chaplain', 'capelão da corte' )|E].\nTem como alvo um [Concept( 'county', 'condado' )|E] e progride com o tempo. Com 100% de progresso, à possível forjar um [claim|lE] ao custo de [Concept( 'gold', 'ouro' )|E]."
 game_concept_religious_relations: "$task_religious_relations$"
 game_concept_religious_relations_desc: "$task_religious_relations$ é uma [Concept( 'councillor_task', 'tarefa de conselheiro' )|E] exercida pelo [Concept( 'court_chaplain', 'capelão da corte' )|E].\nAumenta a opinião que os governantes [Concept( 'theocratic', 'teocráticos' )|E] da mesma [Concept( 'faith', 'fé' )|E] têm sobre o personagem e aumenta o ganho mensal de [Concept( 'piety', 'piedade' )|E]."
 game_concept_interaction: "Interação"
 game_concept_interactions: "Interações"
 game_concept_interacting: "Interagindo"
 game_concept_character_interaction: "Interação entre Personagens"
 game_concept_interaction_desc: "Ações realizadas por um personagem em relação a outro podem ter uma ampla variedade de propósitos e efeitos.\n\nAlgumas interações exigem a aprovação do alvo, enquanto outras podem ser realizadas sem ela.\n\nNormalmente, chega-se a elas clicando com o botão direito do mouse no personagem-alvo para acessar o menu Interação desse personagem, mas às vezes elas estão disponíveis por meio de interfaces especiais."
 game_concept_offer_vassalization: "Oferecer Vassalização"
 game_concept_offer_vassalization_interaction: "Interação de Oferecer Vassalização"
 game_concept_offer_vassalization_desc: "Com esta interação, oferece-se a um [Concept( 'ruler', 'governante' )|E] [Concept( 'independent', 'independente' )|E] de [title_rank|lE] inferior a possibilidade de se submeter a [vassalage|lE] e juntar-se pacificamente ao reino."
 game_concept_extort_subjects_decision: "Decisão de Extorquir Súditos"
 game_concept_extort_subjects: "Extorquir Súditos"
 game_concept_extort_subjects_decision_desc: "Uma [decision|lE] que oferece diferentes oportunidades para exigir [Concept( 'gold', 'ouro' )|E] extra dos súditos, a um custo diferente…"
 game_concept_sell_titles_decision: "Decisão de Vender Títulos"
 game_concept_sell_titles: "Vender Títulos"
 game_concept_sell_titles_decision_desc: "Uma [decision|lE] que permite vender títulos triviais — títulos de importância puramente simbólica. Concede [gold|lE] em troca de [prestige|lE]."
 game_concept_embrace_celibacy: "Abraçar o Celibato"
 game_concept_embrace_celibacy_decision: "Decisão de Abraçar o Celibato"
 game_concept_embrace_celibacy_desc: "Uma [decision|lE] que permite a um personagem ganhar o [trait|lE] [GetTrait('celibate').GetName( GetNullCharacter )|l] por vontade própria."
 game_concept_abandon_celibacy: "Abandonar o Celibato"
 game_concept_abandon_celibacy_decision: "Decisão de Abandonar o Celibato"
 game_concept_abandon_celibacy_desc: "Uma [decision|lE] que permite a um personagem perder o [trait|lE] [GetTrait('celibate').GetName( GetNullCharacter )|l] por vontade própria."
 game_concept_convert_county: "$task_conversion$"
 game_concept_convert_county_desc: "$task_conversion$ É uma [Concept( 'councillor_task', 'tarefa de conselheiro' )|E] realizada pelo [Concept( 'court_chaplain', 'capelão da corte' )|E] e direcionada a um [Concept( 'county', 'condado' )|E] de uma fé diferente da do [Concept( 'liege', 'senhor' )|E].\nO progresso aumenta a cada mês e, ao chegar a 100 %, a maioria do condado-alvo terá mudado de sua fé anterior para a fé do senhor.\n\nMuitos fatores afetam a سرعة de conversão, incluindo a [Concept( 'learning_skill', 'habilidad de aprendizado' )|E] do [Concept( 'councillor', 'conselheiro' )|E] e o [Concept( 'fervor', 'fervor' )|E] das duas fés."
 game_concept_convert: "Converter"
 game_concept_converted: "Convertido"
 game_concept_converting: "Convertendo"
 game_concept_commission_epic: "$commission_epic_decision$"
 game_concept_commission_epic_decision: "Decisão de encomendar epopeia"
 game_concept_commission_epic_desc: "Uma [decision|lE] que permite a um personagem trocar [gold|lE] por um [artifact|lE], ao encomendar uma epopeia familiar.\nA epopeia concederá [dynasty_prestige|lE] e também pode conceder outros bônus dependendo de suas escolhas."
 game_concept_draw_up_new_charts: "$draw_up_new_charts_decision$"
 game_concept_draw_up_new_charts_decision: "Decisão de $draw_up_new_charts_decision$"
 game_concept_draw_up_new_charts_desc: "Uma [decision|lE] que permite a um personagem trocar [gold|lE] por um [artifact|lE], ao encomendar um itinerário de viagem descrevendo lugares que visitou.\nO [artifact|lE] de itinerário concederá efeitos diferentes dependendo de onde você esteve e das escolhas que fizer."
 game_concept_local_arbitration: "$local_arbitration_decision$"
 game_concept_local_arbitration_decision: "Decisão de $local_arbitration_decision$"
 game_concept_local_arbitration_desc: "Uma [decision|lE] que permite a um personagem melhorar um [county|lE] em sua localização atual."
 game_concept_exceptional_epic: "Epopeia Excepcional"
 game_concept_exceptional_epic_desc: "A epopeia familiar criada por meio da decisão de encomendar epopeia tem uma chance de ser uma Epopeia Excepcional, que concede bônus maiores do que uma epopeia normal.\n\nA chance de a epopeia ser excepcional pode ser afetada por escolhas em eventos."
 game_concept_demand_payment: "Exigir Pagamento"
 game_concept_demand_payment_decision: "Interação de Exigir Pagamento"
 game_concept_demand_payment_desc: "Uma interação diplomática que permite a um personagem exigir o pagamento de [Concept( 'gold', 'ouro' )|E] em troca de quaisquer [hooks|lE] que possua."
 game_concept_independence_faction: "Facção de Independência"
 game_concept_independence_factions: "Facções de Independência"
 game_concept_faction_independence: "Independência"
 game_concept_independence_faction_desc: "A facção independentista busca a independência de seus membros. Se tiver sucesso, eles ficarão [Concept( 'independent', 'independientes' )|E] de seu [Concept( 'liege', 'senhor' )|E]."
 game_concept_liberty_faction: "$liberty_faction$"
 game_concept_faction_liberty: "Liberdade"
 game_concept_liberty_factions: "Facções de Liberdade"
 game_concept_liberty_faction_desc: "A facção da liberdade busca reduzir a [crown_authority|lE] e, se possível, os [vassal_contracts|lE] próprios. Se for bem-sucedida, seu [liege|lE] não poderá alterar a autoridade da coroa do [realm|lE] por algum tempo."
 game_concept_claimant_faction: "$claimant_faction$"
 game_concept_claimant_factions: "Facções de Pretendentes"
 game_concept_claimant_faction_desc: "A facção do pretendente busca colocar um [Concept( 'title', 'título' )|E] de seu [Concept( 'liege', 'senhor' )|E] específico no trono de um [claimant|lE]. Se for bem-sucedido, o senhor terá de renunciar ao Título em favor do pretendente e a estrutura de [Concept( 'vassal', 'vassalos' )|E] será atualizada de acordo. Todos os membros da [Concept( 'faction', 'facción' )|E] ganharão uma [Concept( 'hook', 'gancho' )|E] sobre o pretendente."
 game_concept_peasant_faction: "$peasant_faction$"
 game_concept_peasant_factions: "Facções Camponesas"
 game_concept_peasant_faction_desc: "A facção camponesa à composta por [Concept( 'counties', 'condados' )|lE] com uma [county_opinion|lE] baixa. Ao contrário de outras [Concept( 'factions', 'facções' )|lE], esta sempre se revoltará mesmo que o [faction_military_power|lE] seja baixo, pois os camponeses geralmente são otimistas e analfabetos... Revoltas camponesas bem-sucedidas reduzirão significativamente o Controle em nosso [Concept( 'realm', 'senhorio' )|E]."
 game_concept_escalated_peasant_faction: "$peasant_faction$ exacerbada"
 game_concept_escalated_peasant_factions: "Facções Camponesas Escaladas"
 game_concept_escalated_peasant_faction_desc: "A $game_concept_escalated_peasant_faction$ é composta por [counties|El] com baixa [county_opinion|El] que já impuseram as exigências de uma [peasant_faction|El] a um de seus [vassals|El]. Liderada por um líder infame, a facção é perigosa e capaz de se separar de seu [realm|El]."
 game_concept_popular_faction: "$populist_faction$"
 game_concept_popular_factions: "Facções Populistas"
 game_concept_popular_faction_desc: "A facção populista é composta por [Concept( 'counties', 'condados' )|E] com uma [county_opinion|lE] baixa que compartilham um elemento em comum, como a [Concept( 'culture', 'cultura' )|E] ou a [Concept( 'faith', 'fé' )|E]. Buscam se libertar e escolher um novo [Concept( 'ruler', 'governante' )|E] que tenha sua mesma cultura ou fé. Esse tipo de rebelião é normalmente muito perigoso."
 game_concept_buy_claim: "$buy_claim_interaction$"
 game_concept_buy_claim_interaction: "Interação de comprar reivindicação"
 game_concept_buy_claim_desc: "Uma interação que permite a um personagem comprar [unpressed_claims|lE] em troca de [piety|lE].\n\n$EFFECT_LIST_BULLET$Um [vassal|lE] não pode comprar reivindicações sobre nenhum [title|lE] de um [liege|lE], e este não pode comprar reivindicações sobre o título de nenhum vassalo.\n$EFFECT_LIST_BULLET$Um [Concept( 'king', 'rei' )|E] ou [emperor|lE] não pode comprar reivindicações sobre títulos de reinos e um imperador não pode comprar reivindicações sobre outros impérios.\n$EFFECT_LIST_BULLET$Ninguém pode comprar reivindicações sobre seu [head_of_faith|lE]"
 game_concept_develop_county: "$task_develop_county$"
 game_concept_develop_county_desc: "Esta [Concept( 'councillor_task', 'tarefa de conselheiro' )|E] executada pelo [Concept( 'steward', 'administrador' )|E] se dirige a um [Concept( 'county', 'condado' )|E] onde acelerará o [development_growth|lE] e reduzirá o custo e o tempo de construção de [Concept( 'buildings', 'construções' )|E]."
 game_concept_convince_dejure: "$task_convince_dejure$"
 game_concept_convince_dejure_desc: "Uma [councillor_task|E] realizada pelo [steward|E]. Seu objetivo é o [county|lE] [de_jure|lE] [liege|lE] do conselheiro em posse de um [ruler|lE] [independent|lE]. Quando o condado for persuadido, pedirá ao seu [ruler|lE] que o libere para seu [liege|lE] [de_jure|E]."
 game_concept_organize_levies: "$task_organize_levies$"
 game_concept_organize_levies_desc: "Uma [councillor_task|lE] realizada pelo [marshal|lE]. Aumenta o tamanho da [garrison|lE] e a taxa de reforço das [Concept( 'levy', 'levas' )|E] do [realm|lE] do [liege|lE] do conselheiro."
 game_concept_hostile_army: "Hostil"
 game_concept_hostile_army_desc: "É possível enfrentar um [Concept( 'army', 'exército' )|E] hostil como se estivéssemos em [Concept( 'war', 'guerra' )|E] com seu proprietário, embora sem receber [Concept( 'war_score', 'pontuação bélica' )|E].\n\nA hostilidade é causada por você ter interesses conflitantes, incluindo:\n$BULLET_WITH_TAB$Inimigos do nosso [Concept( 'liege', 'suserano' )|E]\n$BULLET_WITH_TAB$[Concept( 'vassals', 'vassalos' )|E] de nossos inimigos\n$BULLET_WITH_TAB$Governantes #emphasis que atacam #! o mesmo inimigo"
 game_concept_war_leaders: "Líderes de Guerra"
 game_concept_war_leader: "Líder de Guerra"
 game_concept_war_leaders_desc: "É o atacante principal e defensor principal de uma [Concept( 'war', 'guerra' )|E]. Normalmente é o personagem que provocou a guerra e o [Concept( 'top_liege', 'senhor principal' )|E] do personagem que possui o [Concept( 'war_target', 'objetivo bélico' )|E].\n\nExiste uma grande variedade de [Concept( 'casus_belli', 'casus belli' )|E] para muitos tipos de guerra, alguns com personagens diferentes no papel de líderes de guerra."
 game_concept_offensive_war_opinion: "Opinião por Guerra Ofensiva"
 game_concept_offensive_war_opinion_short: "Guerra Ofensiva"
 game_concept_offensive_war_opinion_desc: "Ser o principal atacante em uma guerra fará com que nossos [Concept( 'vassals', 'vassalos' )|E] passem a gostar menos de nós depois de [GetDefine('NCharacterOpinion', 'OFFENSIVE_WAR_PENALTY_GRACE_PERIOD')] meses. As [civil_wars|lE] e [great_holy_wars|lE] ficam excluídas disso. Quando não estivermos mais em uma guerra assim, a penalidade diminuirá lentamente."
 game_concept_at_peace_opinion: "Opinião em Paz"
 game_concept_at_peace_opinion_short: "Em Paz"
 game_concept_at_peace_opinion_desc: "Personagens com o [core_tenet|lE] [GetFaithDoctrine('tenet_warmonger').GetBaseName|l] como parte de sua [Concept( 'faith', 'fé' )|E] terão a opinião pacífica em vez da penalização por [offénsive_war_opinion|lE].\n\nSe ficarmos em paz por tempo demais, nossos [Concept( 'vassals', 'vassalos' )|E] pensarão pior de nós #weak (si comparten nuestra fé).#!"
 game_concept_character: "Personagem"
 game_concept_characters: "Personagens"
 game_concept_character_possessive: "do Personagem"
 game_concept_characters_possessive: "dos Personagens"
 game_concept_character_desc: "Um personagem pode ser [Concept( 'noble', 'nobre' )|E], [lowborn|lE], [Concept( 'landed', 'proprietário de terras' )|E] ou [unlanded|lE], e cada um tem seu próprio conjunto de [Concept( 'skills', 'habilidades' )|E] e [traits|lE], metas e aspirações. Os personagens podem aparecer como [Concept( 'rulers', 'governantes' )|E], [Concept( 'courtiers', 'cortesãos' )|E] e [Concept( 'guests', 'convidados' )|E]. Enquanto estiverem dentro do [diplomatic_range|lE], pode-se interagir com eles."
 game_concept_highlighted_text: "Texto Destacado"
 game_concept_highlighted_text_desc: "Esta informação está aqui para você sempre que tiver dívida sobre um conceito do jogo.\n\n#TUT Você pode até mover o cursor para dentro #EMP desta#! dica para obter ainda mais informações! [highlighted_text_example|lE]#!"
 game_concept_highlighted_text_example: "Legal!"
 game_concept_highlighted_text_example_desc: "Bom trabalho!"
 game_concept_detail_zoom: "$ZOOM_LEVEL_DETAILS$"
 game_concept_detail_zoom_desc: "$ZOOM_LEVEL_DETAILS_TOOLTIP$"
 game_concept_political_zoom: "$ZOOM_LEVEL_POLITICAL$"
 game_concept_political_zoom_desc: "$ZOOM_LEVEL_POLITICAL_TOOLTIP$"
 game_concept_paper_zoom: "$ZOOM_LEVEL_PAPER_MAP$"
 game_concept_paper_zoom_desc: "$ZOOM_LEVEL_PAPER_MAP_TOOLTIP$"
 game_concept_tutorial_education_trait: "Traço de Educação"
 game_concept_tutorial_education_trait_i: "@tutorial_education_trait_icon!"
 game_concept_tutorial_education_trait_desc: "Pequeno Rei Murchad (seu [character|lE]) seguiu uma [education|lE] [martial|lE]. Ao alcançar a idade adulta, ele recebeu o traço Estrategista Habilidoso."
 game_concept_organized: "Organizada"
 game_concept_organized_desc: "Uma [faith|lE] Organizada possui uma hierarquia religiosa. O culto e as práticas são mais organizados, e as escrituras são formalizadas.\n\nFés [GetReligionFamily('rf_pagan').GetName] [GetFaithDoctrine('unreformed_faith_doctrine').GetBaseName] podem se tornar Organizadas por meio de reforma, enquanto outras Fés são sempre consideradas Organizadas."
 game_concept_flowery_war: "Incursão por Cativos"
 game_concept_flowery_wars: "Incursões por Cativos"
 game_concept_flowery_warring: "Incursionando por Cativos"
 game_concept_flowery_war_desc: "Trata-se de um tipo especial de [war|lE], iniciada por um [ruler|lE] cuja [faith|lE] pratique sacrifécios humanos. O objetivo principal de uma guerra floral desse tipo à lutar e capturar [prisoners|lE] para sacrificá-los. Ambos os lados podem obter pontuação de guerra suficiente em [Concept( 'war_score', 'pontuação de guerra' )|E] para vencer sem precisar realizar [Concept( 'sieges', 'cercos' )|E].\n\nSe o vencedor (incluindo o defensor) seguir uma fé que pratique sacrifécios humanos, então tomará vários prisioneiros da [court|lE] do perdedor quando a guerra terminar. Se os dois combatentes principais em uma guerra floral seguirem a mesma fé, então a guerra à considerada sagrada, o que significa que o perdedor ainda recebe [Concept( 'piety', 'piedade' )|E] (reduzida) mesmo na derrota.\n\nVocê não pode conduzir nem continuar uma guerra floral se tiver quaisquer prisioneiros obtidos ao vencer uma guerra floral em sua [dungeon|lE]."
 game_concept_partition_share: "Quota da Partilha"
 game_concept_partition_share_desc: "Sob qualquer [succession_law|lE] com [realm_heirs|lE] múltiplos, a partilha [character_possessive|lE] consiste nos [titles|lE] que um herdeiro específico receberá quando ocorrer a [succession|lE]. Normalmente, isso significa dividi-los entre os filhos de um [ruler|lE] ou, mais raramente, seus irmãos.\n\nO normal, dependendo do tipo de sucessão em vigor, é dividir os títulos de forma igual entre [realms|lE] distintos ou dentro do mesmo $game_concept_realm$, ou então entregá-los majoritariamente ao herdeiro principal, enquanto o restante é dividido igualmente entre os demais herdeiros."
 game_concept_banish_reason: "Motivo de Banimento"
 game_concept_banish_reasons: "Motivos de Banimento"
 game_concept_banish_reason_desc: "Um motivo de banimento dá a um [Concept( 'liege', 'senhor' )|E] a oportunidade de [banish|lE] livremente qualquer súdito que tenha em sua [dungeon|lE]. Geralmente é obtido quando o súdito é um [Concept( 'criminal', 'delincuente' )|E]."
 game_concept_imprisonment_reason: "Motivo de Aprisionamento"
 game_concept_imprisonment_reasons: "Motivos de Aprisionamento"
 game_concept_imprisonment_reason_desc: "Um motivo de encarceramento dá a um [Concept( 'liege', 'senhor' )|E] a oportunidade de [Concept( 'imprison', 'encarcerar' )|E] livremente um vassalo. Geralmente é obtido quando o vassalo é um [Concept( 'criminal', 'criminoso' )|E]."
 game_concept_revoke_title_reason: "Motivo de Revogação de Título"
 game_concept_revoke_title_reasons: "Motivos de Revogação de Título"
 game_concept_revoke_title_reason_desc: "Um motivo para revogar um título dá a um [Concept( 'liege', 'senhor' )|E] a oportunidade de [revoke|lE] livremente um [Concept( 'title', 'título' )|E] de um súdito. Geralmente é obtido quando o súdito é um [Concept( 'criminal', 'delincuente' )|E]."
 game_concept_execute_reason: "Motivo de Execução"
 game_concept_execute_reasons: "Motivos de Execução"
 game_concept_execute_reason_desc: "Um motivo de execução dá a um [Concept( 'liege', 'senhor' )|E] a oportunidade de [execute|lE] livremente qualquer súbdito que tenha em sua [dungeon|lE]. Geralmente é obtido quando o súbdito é um [Concept( 'criminal', 'criminoso' )|E]."
 game_concept_movement_lock: "Trava de Movimento"
 game_concept_movement_locked: "Movimento Travado"
 game_concept_movement_locked_desc: "Quando um [Concept( 'army', 'exército' )|E] tiver completado mais da metade de uma ordem de movimento dada, não será possível alterá-la até que cheguem ao destino."
 game_concept_extramarital_sex: "Sexo Extraconjugal"
 game_concept_extramarital_sex_sleeping_with: "dormindo com"
 game_concept_extramarital_sex_desc: "Se dois personagens que praticam sexo extraconjugal forem descobertos, sofrerão consequências que dependerão das [doctrines|lE] de sua [faith|lE].\n\n$EFFECT_LIST_BULLET$Cada um dos personagens será conhecido como [GetTrait('fornicator').GetName( GetNullCharacter )|l] ou [GetTrait('adulterer').GetName( GetNullCharacter )|l], dependendo de seu estado civil.\n$EFFECT_LIST_BULLET$Se um homem e uma mulher dormirem juntos, isso pode resultar em uma gravidez [bastard|lE].\n$EFFECT_LIST_BULLET$Se os personagens forem do mesmo gênero, as consequências serão determinadas pela [doctrine|lE] doutrina sobre homossexualidade de sua [faith|lE].\n$EFFECT_LIST_BULLET$Uma personagem pode inféctar a outra com suas [diseases|lE] de transmissão sexual."
 game_concept_titular_title: "Título Titular"
 game_concept_titular_title_desc: "Um [Concept( 'title', 'título' )|E] nominal é aquele que não tem terra [Concept( 'de_jure', 'de iure' )|E] no mapa. Títulos não nominais podem se tornar nominais por meio de uma [de_jure_drift|lE].\n\nOs títulos de [mercenary|lE], [head_of_faith|lE] e [holy_order|lE] costumam ser nominais."
 game_concept_pilgrimage: "Peregrinação"
 game_concept_pilgrimages: "Peregrinações"
 game_concept_pilgrimage_desc: "Personagens da maioria das [faiths|lE] podem [decide|lE] realizar uma [activity|lE] que consista em ir em peregrinação a um [holy_site|lE]. Todo [holy_site|lE] tem um período de graça individual antes de poder revisitá-lo. \n\nTal jornada pode estar repleta de oportunidades e perigos, mas, ao alcançar seu destino, os personagens ganharão [piety|lE] e poderão receber outras recompensas."
 game_concept_hajj: "Hajj"
 game_concept_hajjes: "Hajjs"
 game_concept_hajj_desc: "Os personagens da maioria das [Concept( 'faith', 'fés' )|E] islâmicas podem decidir participar da [activity|lE] de fazer a [hajj|lE] a Meca como parte de sua [doctrine|lE] de peregrinação uma vez por ano.\n\nTal jornada pode estar repleta de oportunidades e perigos, mas, ao alcançar a cidade sagrada, os personagens ganharão [piety|lE] e poderão receber outras recompensas."
 game_concept_faith_righteous: "Justa"
 game_concept_faith_righteous_desc: "Esta [Concept( 'faith', 'fé' )|E] à considerada llegítima.\nOs casamentos mistos são comuns.\n\n#S Efeitos:\n#![GetHostilityDescription( '(int32)0' )]"
 game_concept_faith_astray: "Desviada"
 game_concept_faith_astray_desc: "As discrepâncias desta [Concept( 'faith', 'fé' )|E] não são especialmente importantes.\nAinda podem ocorrer casamentos mistos.\n\n#S Eféctos:\n#![GetHostilityDescription( '(int32)1' )]"
 game_concept_faith_hostile: "Hostil"
 game_concept_faith_hostile_desc: "Esta [Concept( 'faith', 'fé' )|E] apresenta discrepâncias muito notáveis.\nContinuam a ocorrer casamentos mistos e podem ser travadas [holy_wars|lE].\n\n#S Efeitos:\n#![GetHostilityDescription( '(int32)2' )]"
 game_concept_faith_evil: "Mau"
 game_concept_faith_evil_desc: "Esta [Concept( 'faith', 'fé' )|E] à considerada anátema.\nCasamentos inter-religiosos acontecem muito raramente e podem ser travadas [holy_wars|E].\n\n#S Efeitos:\n#![GetHostilityDescription( '(int32)3' )]"
 game_concept_faith_hostility: "Hostilidade da Fé"
 game_concept_faith_hostility_desc: "Todas as [faiths|lE] mantêm uma relação entre si condicionada por sua proximidade.\n\nEssa é determinada por vários fatores: se compartilham [religion|lE], [Concept( 'religious_family', 'familia religiosa' )|E], se a fé tem [doctrines|lE] especiais…\n\nSe duas fés estão distantes, muitas vezes poderão declarar uma [holy_war|lE].\n\nAs relações podem ser dos seguintes tipos: [faith_righteous|L], [faith_astray|L], [faith_hostile|L] e [faith_evil|L]."
 game_concept_command_modifier: "Modificador de Comando"
 game_concept_command_modifier_desc: "Este [modifier|lE] só à ativo para [Concept( 'commanders', 'comandantes' )|E].\n\nSe um personagem com um modificador de comando lidera um [Concept( 'army', 'exército' )|E], suas forças receberáo este modificador."
 game_concept_command_modifier_i: "@command_modifier_icon!"
 game_concept_command_modifiers: "Modificadores de Comando"
 #game_concept_pic: "@test_flower!"
 game_concept_nickname: "Apelido"
 game_concept_epithet: "Epíteto"
 game_concept_cognomen: "Cognome"
 game_concept_nicknames: "Apelidos"
 game_concept_epithets: "Epítetos"
 game_concept_cognomens: "Cognomes"
 game_concept_nickname_desc: "Apelidos, epítetos e cognomes são nomes secundários adotados por ou atribuídos a [characters|lE] (como \"Carlos, o Calvo\"). Os apelidos são meramente estéticos, embora as circunstâncias que cercam sua aquisição frequentemente sejam dramáticas ou dignas de nota.\n\nÀs vezes, um apelido ruim pode ser substituído por um bom (como Guilherme, o Bastardo, tornando-se Guilherme, o Conquistador)."
 game_concept_main_phase: "Fase Principal"
 game_concept_main_phase_desc: "Na fase principal de uma [battle|lE], os [soldiers|lE] e [knights|lE] de ambos os lados se enfrentam entre si.\n\nEsta fase principal termina quando todas as tropas de um lado se tornam [casualties|E] ou quando um lado decide [Concept( 'retreat', 'retirarse' )|E].\n\nApós a fase principal, o combate entra em suas [aftermath|lE]."
 game_concept_personality_trait: "Traço de Personalidade"
 game_concept_personality_traits: "Traços de Personalidade"
 game_concept_personality_trait_desc: "Um traço de personalidade é um [trait|lE] que determina a visão de mundo de uma pessoa e quais ações ela tem mais probabilidade de tomar. Também afeta a [opinion|lE] que os outros têm dessa pessoa. Uma pessoa pode tanto perder quanto ganhar novos traços ao longo da vida. Agir contra a própria personalidade causa [stress|lE]."
 game_concept_lifestyle_trait: "Traço de Estilo de Vida"
 game_concept_lifestyle_traits: "Traços de Estilo de Vida"
 game_concept_lifestyle_trait_desc: "O $game_concept_lifestyle_trait$ é o resultado de escolher certas vantagens de [lifestyle|lE], [decisions|lE], ou [interactions|lE].\n\nAlguns traços de estilo de vida podem ser aprimorados à medida que o personagem melhora seu domínio da habilidade. Os níveis variam entre 1 e 3, e as estrelas no ícone do traço indicam o nível atual."
 game_concept_physical_trait: "Traço Físico"
 game_concept_physical_traits: "Traços Físicos"
 game_concept_physical_trait_desc: "O $game_concept_physical_trait$ descreve uma [trait|lE] físico relacionado à aparência, ao comportamento e ao nível de intelecto de um personagem. Muitas características físicas determinam o grau de [Concept( 'attracted', 'atracción' )|lE] que os outros sentem pelo seu personagem.\n\nCostumam ser [Concept( 'congenital', 'congénitos' )|E], o que significa que são obtidas ao nascer e são permanentes."
 game_concept_fame_trait: "Traço de Fama"
 game_concept_fame_traits: "Traços de fama"
 game_concept_fame_trait_desc: "Um $game_concept_fame_trait$ é um [trait|lE] especial ganho em circunstâncias específicas e afeta a [opinion|lE] que os outros têm do personagem. Esses traços podem ser obtidos como resultado de uma ação positiva, ou quando os [secrets|lE] obscuros de alguém são expostos. Outros são resultado das circunstâncias do nascimento."
 game_concept_health_trait: "Traço de Saúde"
 game_concept_health_trait_desc: "Um $game_concept_health_trait$ é um [trait|El] que afeta diretamente a [health|El] fésica e mental do personagem, como as [diseases|El]. Os traços temporários que afetam as capacidades corporais do personagem, como gravidezes e ferimentos, também se enquadram nesta categoria.\n\nOs [characters|El] anciões podem obter [Concept( 'elder_traits', 'traços de ancião' )|E]."
 game_concept_modifier_contribution: "Contribuição"
 game_concept_modifier_contributions: "Contribuições"
 game_concept_modifier_contributes: "Contribui"
 game_concept_modifier_contribution_desc: "Um [modifier|lE] pode alterar as contribuições das [obligations|lE] de seus [vassals|lE]. Isso não é o mesmo que [modifier_base_contribution|lE].\n\nSe você tiver um [vassal|lE] que lhe paga #V 1#! de [gold|lE] por mês e ganhar um [modifier|lE] que aumenta a contribuição em um #V 10 %#!, então o [vassal|lE] passará a lhe pagar #V 1,1#! de [gold|lE]."
 game_concept_modifier_base_contribution: "Contribuição Base"
 game_concept_modifier_base_contributions: "Contribuições Base"
 game_concept_modifier_base_contributes: "Contribuições Base"
 game_concept_modifier_base_contribution_desc: "Um [modifier|lE] pode alterar as contribuições base das [obligations|lE] de seus [vassals|lE]. Isso não é o mesmo que uma [modifier_contribution|lE].\n\nSe você tem um [vassal|l] com uma receita total de [income|lE] de #V 10#! em [gold|lE] e lhe paga #V 1#! [gold|l] por mês, e você ganha um [modifier|l] que aumenta a$game_concept_modifier_base_contribution$ em #V 10 %#!, então o [vassal|l] em vez disso lhe pagará #V 2#! em [gold|l]."
 game_concept_maneuver: "Manobra"
 game_concept_maneuver_desc: "A fase de manobra ocorre no início de uma [battle|lE] e indica o tempo que falta para começar a [main_phase|lE] e que os [armies|lE] se enfrentem em combate."
 game_concept_combat_phase: "Fase de Batalha"
 game_concept_combat_phase_desc: "A fase de combate é uma das partes de uma [battle|lE]. Existem três fases distintas em uma batalha: [maneuver|lE], [main_phase|lE] e [aftermath|lE]."
 game_concept_unreformed_pagan_combat_bonus: "Vantagem de Combate Pagã Não Reformada"
 game_concept_unreformed_pagan_combat_bonus_desc: "[faiths|lE] [GetReligionFamily('rf_pagan').GetName] [GetFaithDoctrine('unreformed_faith_doctrine').GetBaseName] recebem [advantage|lE] em [battle|lE] dentro de [counties|lE] de sua fé."
 game_concept_personality: "Personalidade"
 game_concept_character_personality: "Personalidade do Personagem"
 game_concept_personalities: "Personalidades"
 game_concept_personality_desc: "Os personagens agirão em relação a você e aos outros de acordo com sua Personalidade, que é determinada principalmente por seus [personality_traits|lE]."
 game_concept_economical_archetype: "Arquétipo Econômico"
 game_concept_economical_archetype_desc: "O Arquétipo Econômico de um [ruler|lE] afeta como ele decide gastar sua [gold|lE] [gold_i]. Em grande parte, baseia-se em suas [traits|lE].\n\n#low Os arquétipos econômicos são:#!\n$EFFECT_LIST_BULLET$[ai_warlike_personality|E]\n$EFFECT_LIST_BULLET$[ai_cautious_personality|E]\n$EFFECT_LIST_BULLET$[ai_economical_boom_personality|E]\n$EFFECT_LIST_BULLET$[ai_economical_unpredictable_personality|E]\n$EFFECT_LIST_BULLET$[ai_conqueror_personality|E]"
 game_concept_gift: "Presente"
 game_concept_gifts: "Presentes"
 game_concept_send_gift: "Enviar Presente"
 game_concept_gift_desc: "Ao enviar um presente a outro personagem, aumentará a sua [opinion|lE] sobre você em troca de [gold|lE] [gold_i].\n\nQuanto mais ganancioso for o destinatário, mais ouro você terá de enviar e mais opinião receberemos.\n\nQuanto maior for sua [diplomacy|lE], mais opinião você obterá."
 game_concept_vote_strength: "Força de Voto"
 game_concept_valuable_prisoner: "Prisioneiro Valioso"
 game_concept_valuable_prisoners: "Prisioneiros Valiosos"
 game_concept_valuable_prisoner_desc: "Um [valuable_prisoner|lE] é aquele [prisoner|lE] que fornece uma [war_score|lE] ao ser capturado durante uma [war|lE].\n\nPara ser considerado [valuable_prisoner|lE], ele precisa estar em terceiro lugar ou acima na linha de sucessão do título primário de seu líder de guerra.\n\nOs [valuable_prisoners|lE] são libertados quando a guerra termina, ao contrário dos [prisoners_of_war|lE]."
 game_concept_prisoner_of_war: "Prisioneiro de Guerra"
 game_concept_prisoners_of_war: "Prisioneiros de Guerra"
 game_concept_prisoner_of_war_desc: "Um [prisoner_of_war|lE] é um [prisoner|lE] capturado durante uma [war|lE], mas não é importante o suficiente para fornecer [war_score|lE] aos seus captores.\n\nOs [valuable_prisoners|lE] são libertados quando a guerra termina, ao contrário dos prisioneiros de guerra, mas ainda podem ser resgatados para serem libertados."
 game_concept_single_combat_fight: "Combate Singular"
 game_concept_single_combat_duel: "Duelo"
 game_concept_single_combat_fight_plural: "Combates Singulares"
 game_concept_single_combat_duel_plural: "Duelos"
 game_concept_single_combat_fight_sudden_death: "Morte Súbita"
 game_concept_single_combat_fight_desc: "Em um combate individual, dois [characters|lE] lutam, seja até a [character_death_death|lE] ou até o primeiro sangue. A cada rodada, ambos os personagens escolhem uma opção aleatória dentre uma lista, trocando golpes até que um personagem consiga um golpe sólido, com as opções disponíveis dependendo de sua [prowess|lE] e de seus [traits|lE].\n\nAlgumas opções podem conceder efeitos especiais, e a maioria aumentará sua [single_combat_success_chance|lE] e [single_combat_injury_chance|lE]. À medida que os combates individuais prosseguem, eles se tornam mais perigosos e incertos, e fica mais fácil vencer ou se ferir. Após várias rodadas, os duelos entram em morte súbita, terminando imediatamente com a vitória do combatente de maior destreza.\n\nQuando lutamos em duelos, podemos ganhar [character_modifiers|lE] temporários de [single_combat_prowess_bonus|lE] ou [single_combat_prowess_malus|lE] que aumentem ou reduzam nossa destreza até que o duelo termine."
 game_concept_single_combat_success_chance: "Probabilidade de Sucesso"
 game_concept_single_combat_success_chance_skill: "Sucesso em Duelo"
 game_concept_single_combat_success_chance_desc: "Em um combate individual, nossa chance de sucesso indica o quão bem você está se saindo no duelo. Para vencer, você precisará ter uma chance de sucesso muito superior à do seu oponente.\n\nConforme os rounds avançam, fica mais fácil vencer, o que significa que você precisa de uma vantagem menor sobre seu oponente.\n\nO contraponto da chance de sucesso é o [single_combat_injury_chance|lE]."
 game_concept_single_combat_injury_chance: "Risco de Ferimento"
 game_concept_single_combat_injury_chance_injure: "Ferir"
 game_concept_single_combat_injury_chance_injury_risk: "Risco de Ferimento"
 game_concept_single_combat_injury_chance_desc: "Os [characters|lE] que participam em combates individuais correm o risco de se ferir, seja ao baixar a guarda acidentalmente diante do oponente, seja por se machucarem com a própria arma. Ao lutar, também acumulam $game_concept_single_combat_injury_chance$.\n\nQuanto mais longos forem os combates, mais fácil será se ferir.\n\nA contrapartida à chance de férimento é a [single_combat_success_chance|lE]."
 game_concept_single_combat_prowess_bonus: "Bônus de Vantagem no Duelo"
 game_concept_single_combat_prowess_bonus_desc: "Quando os [characters|lE] se enfrentam em duelo, podem ganhar vantagens temporárias como por um [terrain|lE] vantajoso ou [traits|lE] especiais. Isso aumenta sua [prowess|lE] enquanto durar o combate e se perde imediatamente depois.\n\nO oposto da vantagem de duelo é a [single_combat_prowess_malus|lE]."
 game_concept_single_combat_prowess_malus: "Penalidade de Vantagem no Duelo"
 game_concept_single_combat_prowess_malus_desc: "Quando os [characters|lE] duelam, eles podem ser afetados por desvantagens temporárias, muitas vezes porque o oponente os intimida ou os fere gravemente. Isso reduz sua [prowess|lE] durante a duração do combate atual, mas é recuperado imediatamente depois.\n\nO oposto da desvantagem de duelo é a [single_combat_prowess_bonus|lE]."
 game_concept_game_over: "Fim de Jogo"
 game_concept_game_over_desc: "O jogo termina quando sua linhagem atual se extingue.\n\nNo entanto, mesmo que seu linhagem tenha desaparecido, você ainda pode escolher jogar como qualquer outro [ruler|lE] do mundo.\n\nO jogo pode terminar de duas formas:\n$BULLET_WITH_TAB$Ao morrer sem [player_heir|lE]\n$BULLET_WITH_TAB$Ao chegar ao ano 1453"
 game_concept_de_jure_partition: "Partilha De Jure"
 game_concept_de_jure_partitioned: "Partilhado De Jure"
 game_concept_de_jure_partition_desc: "Os [realms|El] que sofreram uma $game_concept_de_jure_partitioned$ foram divididos em dois [titles|El] do mesmo [title_tier|El], mas ainda podem ser reunidos facilmente.\n\nQualquer $game_concept_title$ pode [Concept( 'de_jure_drift_drift', 'derivar de jure' )|E] [duchies|El] [Concept( 'completely_control', 'controlados totalmente' )|E] do outro $game_concept_title$ em seu [de_jure|El] de forma instantânea por meio de uma [decision|El].\n\nSe algum $game_concept_title$ for destruído ou perder o último de seus [counties|El] $game_concept_de_jure$, então o restante absorverá todos os seus $game_concept_de_jure$."
 game_concept_hybrid_culture: "Cultura Híbrida"
 game_concept_hybrid_cultures: "Culturas Híbridas"
 game_concept_hybridize: "Hibridizar"
 game_concept_hybridized: "Hibridizada"
 game_concept_hybridizing: "Hibridizando"
 game_concept_hybridizes: "Hibridiza"
 game_concept_hybrid_culture_desc: "[SelectLocalization( HasDlcFeature( 'hybridize_culture' ), 'game_concept_hybrid_culture_desc_DLC', 'game_concept_hybrid_culture_desc_NO_DLC' )]"
 game_concept_hybrid_culture_desc_DLC: "Uma $game_concept_hybrid_culture$ é aquela [culture|lE] criada por um [ruler|lE] ao combinar duas culturas existentes.\n\nA $game_concept_hybrid_culture$ é uma mistura das [traditions|lE], [culture_pillars|lE] e da estática das duas culturas.\n\nSó à possível formar uma cultura híbrida a partir de culturas de diferentes [Concept( 'heritage', 'heranças' )|E], e o custo de [prestige|lE] envolvido baseia-se na [cultural_acceptance|lE] mátua.\n\nQuanto maior for a aceitação cultural, mais [counties|lE] se converterão quando uma híbrida se formar. Os governantes de uma cultura híbrida podem [promote_culture|lE] muito mais rapidamente em condados de suas culturas-máe durante #V [EmptyScope.ScriptValue('culture_hybrid_cooldown')|0]#! anos após sua formação.\n\nNovas culturas também podem surgir como [divergent_culture|lE]."
 game_concept_hybrid_culture_desc_NO_DLC: "Uma $game_concept_hybrid_culture$ é uma [culture|lE] formada como combinação de duas outras Culturas.\n\nNovas Culturas também podem surgir como [divergent_culture|lE]."
 game_concept_divergent_culture: "Cultura Divergente"
 game_concept_divergent_cultures: "Culturas Divergentes"
 game_concept_diverge: "Divergir"
 game_concept_diverges: "Diverge"
 game_concept_divergent_culture_desc: "[SelectLocalization( HasDlcFeature( 'diverge_culture' ), 'game_concept_divergent_culture_desc_DLC', 'game_concept_divergent_culture_desc_NO_DLC' )]"
 game_concept_divergent_culture_desc_DLC: "Um $game_concept_divergent_culture$ é uma ramificação de uma [culture|lE] existente criada por um [ruler|lE].\n\nA cultura divergente mantém sua [heritage|lE], mas outros aspectos da cultura original podem mudar.\n\nA cultura da qual ela diverge deve ter pelo menos [EmptyScope.ScriptValue('culture_divergence_cooldown')|0] anos, e o custo em [prestige|lE] da divergência dependerá do [realm_size|lE] do governante que a criar.\n\nNovas culturas também podem surgir como [hybrid_culture|lE]."
 game_concept_divergent_culture_desc_NO_DLC: "Uma $game_concept_divergent_culture$ é um ramo derivado de uma [culture|lE] existente.\n\nNovas Culturas também podem surgir como [hybrid_culture|lE]."
 game_concept_winter: "Severidade do Inverno"
 game_concept_winter_desc: "O inverno drena os [Concept( 'supply', 'suprimentos' )|E] de forma constante ao longo do tempo e faz com que os exércitos percam suprimentos enquanto permanecerem em uma baronia afetada pelo inverno. A penalidade de suprimentos aumenta com cada severidade. O inverno tem três severidades diferentes: [Concept( 'winter_severity_mild', 'suave' )|E], [Concept( 'winter_severity_normal', 'normal' )|E] e [Concept( 'winter_severity_harsh', 'rigoroso' )|E]."
 game_concept_winter_severity_mild: "Inverno Leve"
 game_concept_winter_severity_mild_desc: "[GetModifier( 'winter_mild_modifier' ).GetDescWithEffects]"
 game_concept_winter_severity_normal: "Inverno Normal"
 game_concept_winter_severity_normal_desc: "[GetModifier( 'winter_normal_modifier' ).GetDescWithEffects]"
 game_concept_winter_severity_harsh: "Inverno Severo"
 game_concept_winter_severity_harsh_desc: "[GetModifier( 'winter_harsh_modifier' ).GetDescWithEffects]"
 game_concept_deceitful_progress_hostile_schemes_decision: "Decisão de $deceitful_progress_hostile_schemes_decision$"
 game_concept_deceitful_progress_hostile_schemes_decision_desc: "Uma [decision|lE] que permite melhorar seus [hostile_schemes|lE]. Concede [success_chance|lE] e [scheme_speed|lE] em troca de [stress|lE]."
 game_concept_diligent_development_focus_decision: "Decisão de $diligent_development_focus_decision$"
 game_concept_diligent_development_focus_decision_desc: "Uma [decision|lE] que permite melhorar sua [capital|lE]. Concede [development|lE] em troca de [stress|lE]."
 game_concept_impatient_rushing_all_schemes_decision: "Decisão de $impatient_rushing_all_schemes_decision$"
 game_concept_impatient_rushing_all_schemes_decision_desc: "Uma [decision|lE] que permite acelerar seu [scheme|lE]. Concede [scheme_opportunity_opportunities|lE] em troca de [stress|lE]."
 game_concept_dismiss_strong_hook_interaction: "Interação de $dismiss_strong_hook_interaction$"
 game_concept_dismiss_strong_hook_interaction_desc: "Uma [interaction|lE] que permite dispensar um [hook|lE] direcionado a você em troca de [prestige|lE]."
 game_concept_abandon_hook_interaction: "Interação de $abandon_hook_interaction$"
 game_concept_abandon_hook_interaction_desc: "Uma [interaction|lE] que permite abandonar um [hook|lE] que você possui em troca de perder [stress_loss_i][stress|lE]."
 game_concept_force_duel_criminals_interaction: "Interação de $force_duel_criminals_interaction$"
 game_concept_force_duel_criminals_interaction_desc: "Uma [interaction|lE] que permite [single_combat_duel|E] com criminosos quando você está [stressed|lE]."
 game_concept_force_duel_anyone_interaction: "Interação de $force_duel_anyone_interaction$"
 game_concept_force_duel_anyone_interaction_desc: "Uma [interaction|lE] que permite [single_combat_duel|E] com qualquer pessoa quando você está [stressed|lE]."
 game_concept_artifact_rarity: "Raridade de Artefato"
 game_concept_rarity: "Raridade"
 game_concept_artifact_rarity_desc: "Alguns [artifacts|lE] são mais raros que outros, o que se reflete em sua raridade.\n\nOs níveis, do mais baixo ao mais alto:\n$BULLET_WITH_TAB$Comum (não aparece, pois é o padrão)\n$BULLET_WITH_TAB$$masterwork$\n$BULLET_WITH_TAB$$famed$\n$BULLET_WITH_TAB$$illustrious$"
 game_concept_promote_other_culture_development_decision: "Decisão de $promote_other_culture_development_decision_name$"
 game_concept_promote_other_culture_development_decision_desc: "Uma [decision|lE] que permite melhorar os custos de [development|lE], [control|lE], [building|lE] e a [advantage|lE] defénsiva em [counties|lE] de [cultures|lE] diferentes com uma [cultural_acceptance|lE] de #V 75 %#! ou mais.\n\nTomar a decisão também aumentará seu prestígio [prestige|lE] [prestige_i] e [levies|lE].\n\nTodos os condados do [realm|lE]. O custo em [gold|lE] varia de acordo com o número de condados afetados."
 game_concept_reform: "Reforma"
 game_concept_reformation: "Reforma"
 game_concept_reformation_desc: "O [culture_head|lE] pode alterar certas partes de sua [culture|lE] por meio de reformas. Este é um processo que leva muito tempo e não pode ser interrompido depois de iniciado. \n\nAs partes reformáveis são:\n$BULLET_WITH_TAB$[traditions|E]\n$BULLET_WITH_TAB$[ethos|E]\n$BULLET_WITH_TAB$[martial_custom|E]"
 game_concept_buy_artifact_claim: "$buy_artifact_claim_interaction$"
 game_concept_buy_artifact_claim_interaction: "Interação de $buy_artifact_claim_interaction$"
 game_concept_buy_artifact_claim_desc: "Uma Interação que permite a um personagem comprar [personal_artifact_claims|lE] em troca de [piety|lE] ou [prestige|lE]."
 game_concept_vassal_contract: "Contrato de Vassalagem"
 game_concept_vassal_contracts: "Contratos de Vassalagem"
 game_concept_vassal_contract_desc: "Os $game_concept_vassal_contracts$ ditam as [obligations|lE] entre um [vassal|lE] e seu [liege|lE].\n\nOs vassalos das $game_concept_government_forms$ [feudal|lE], [clan|lE], [administrative|lE] e [nomadic|lE] têm acesso a diferentes [obligations|lE], negociadas individualmente para cada vassalo.\n\nTodos os vassalos pagam ao seu suserano uma porcentagem de seus [taxes|lE] e [levies|lE] totais, dependendo de suas [obligations|lE]. #EMP Por sua parte, essas [modifier_contributions|lE] podem ser modificadas por opções de letra miúda como [GetSubjectContractType( 'fortification_rights' ).GetObligationName( 'fortification_rights_granted' )|l].#!\n\nAlguns contratos especiais são limitados a certos níveis:\n$EFFECT_LIST_BULLET$[GetSubjectContractType( 'special_contract' ).GetObligationName( 'special_contract_march' )|V] e [GetSubjectContractType( 'special_contract' ).GetObligationName( 'special_contract_scutage' )|V]: [duke|lE] e superior\n$EFFECT_LIST_BULLET$[GetSubjectContractType( 'special_contract' ).GetObligationName( 'special_contract_palatinate' )|V]: [count|lE] e superior\n$EFFECT_LIST_BULLET$[GetSubjectContractType( 'special_contract' ).GetObligationName( 'special_contract_castellan' )|V]: apenas [count|lE]\n\n#weak Atenção, as [obligations|lE] de [governor|lE] também são conhecidas como [province_administrations|lE].#!"
 game_concept_vassal_directive: "Diretiva de Vassalo"
 game_concept_vassal_directives: "Diretivas de Vassalo"
 game_concept_directive: "Diretiva"
 game_concept_directives: "Diretivas"
 game_concept_vassal_directive_desc: "Como [liege|lE], você pode emitir Diretivas aos seus [vassals|lE] que influenciem suas [councillor_tasks|lE] e os [buildings|lE] que construam.\n\nPara emitir uma Diretiva, você precisa ativá-la, como por exemplo tendo #P 50#! de [opinion|lE] com o Vassalo. As [government_forms|lE] avançadas não exigem isso."
 game_concept_tributary_contract: "Contrato de Tributário"
 game_concept_tributary_contracts: "Contratos de Tributário"
 game_concept_tributary_contract_desc: "Um $game_concept_tributary_contract$ estabelece as [obligations|lE] entre um [tributary|lE] e seu [suzerain|lE].\n\nCada tributário tem acesso a [obligations|lE] diferentes, negociadas individualmente por cada um.\n\nOs tributários pagam ao seu soberano uma porcentagem de seus [taxes|lE] , [levies|lE] , [herd|lE] , [prestige|lE] ou até [piety|lE] totais, de acordo com suas [obligations|lE]."
 game_concept_board_game_match: "Partida"
 game_concept_board_game: "Jogo de Tabuleiro"
 game_concept_board_games: "Jogos de Tabuleiro"
 game_concept_board_game_game: "Jogo"
 game_concept_board_game_match_desc: "Um jogo de tabuleiro consiste em dois jogadores testando sua sorte e habilidade um contra o outro em um jogo de raciocínio e acaso. Eles podem ser disputados como partidas amistosas ou com algum tipo de aposta.\n\n#weak Existem muitos [board_game_types|lE] diferentes, embora as formas de [board_game_win|lE] e de jogar cada um permaneçam as mesmas. Apenas as habilidades usadas diferem.#!"
 game_concept_board_game_winning: "Vencendo"
 game_concept_board_game_win: "Vencer"
 game_concept_board_game_winning_sudden_death: "Morte Súbita"
 game_concept_board_game_winning_desc: "Vencer em um $game_concept_board_game$ é alcançado de uma de duas formas:\n$EFFECT_LIST_BULLET$ Obter uma vantagem dramática na pontuação sobre seu oponente.\n$EFFECT_LIST_BULLET$ Ser o jogador defensor se não houver um vencedor claro após a rodada [EmptyScope.ScriptValue('bg_round_cap_value')|0]."
 game_concept_board_game_type: "Tipo de Jogo de Tabuleiro"
 game_concept_board_game_types: "Tipos de Jogo de Tabuleiro"
 game_concept_board_game_type_counter: "peça"
 game_concept_board_game_type_counters: "peças"
 game_concept_board_game_type_desc_guts: "Ao jogar um jogo de tabuleiro, há diferentes estilos de jogo com os quais [Concept( 'counter', 'contrabalançar' )|E] ao seu oponente. Contrabalançar seus movimentos reduz seriamente os pontos que ele ganha com eles, mesmo se tiver sucesso. Oponentes habilidosos podem perceber suas próprias habilidades e tentar #EMP contrabalançarte#! de propósito."
 game_concept_board_game_type_desc: "$game_concept_board_game_type_desc_guts$\n\nOs jogos disponíveis são:\n$EFFECT_LIST_BULLET$ [board_game_type_chess|E]\n$EFFECT_LIST_BULLET$ [board_game_type_pachisi|E]\n$EFFECT_LIST_BULLET$ [board_game_type_hnefatafl|E]\n$EFFECT_LIST_BULLET$ [board_game_type_tabula|E]\n$EFFECT_LIST_BULLET$ [board_game_type_go|E]\n$EFFECT_LIST_BULLET$ [board_game_type_fidchell|E]"
 game_concept_board_game_type_chess: "Xadrez"
 game_concept_board_game_type_chess_desc: "$game_concept_board_game_type_desc_guts$\n\nNo xadrez:\n$EFFECT_LIST_BULLET$ [martial|E] $game_concept_board_game_type_counters$ [learning|lE]\n$EFFECT_LIST_BULLET$ [learning|E] $game_concept_board_game_type_counters$ [intrigue|lE]\n$EFFECT_LIST_BULLET$ [intrigue|E] $game_concept_board_game_type_counters$ [martial|lE]"
 game_concept_board_game_type_pachisi: "Pachisi"
 game_concept_board_game_type_pachisi_desc: "$game_concept_board_game_type_desc_guts$\n\nNo ludo:\n$EFFECT_LIST_BULLET$ [diplomacy|E] $game_concept_board_game_type_counters$ [intrigue|lE]\n$EFFECT_LIST_BULLET$ [intrigue|E] $game_concept_board_game_type_counters$ [stewardship|lE]\n$EFFECT_LIST_BULLET$ [stewardship|E] $game_concept_board_game_type_counters$ [diplomacy|lE]"
 game_concept_board_game_type_hnefatafl: "Hnefatafl"
 game_concept_board_game_type_hnefatafl_desc: "$game_concept_board_game_type_desc_guts$\n\nNo hnefatafl:\n$EFFECT_LIST_BULLET$ [intrigue|E] $game_concept_board_game_type_counters$ [martial|lE]\n$EFFECT_LIST_BULLET$ [martial|E] $game_concept_board_game_type_counters$ [prowess|lE]\n$EFFECT_LIST_BULLET$ [prowess|E] $game_concept_board_game_type_counters$ [intrigue|lE]"
 game_concept_board_game_type_tabula: "Tabula"
 game_concept_board_game_type_tabula_desc: "$game_concept_board_game_type_desc_guts$\n\nNa tabula:\n$EFFECT_LIST_BULLET$ [intrigue|E] $game_concept_board_game_type_counters$ [learning|lE]\n$EFFECT_LIST_BULLET$ [learning|E] $game_concept_board_game_type_counters$ [stewardship|lE]\n$EFFECT_LIST_BULLET$ [stewardship|E] $game_concept_board_game_type_counters$ [intrigue|lE]"
 game_concept_house_unity: "União da Casa"
 game_concept_unity: "União"
 game_concept_house_unity_i: "@dynasty_house_unity!"
 game_concept_house_unity_desc: "A $game_concept_house_unity$ indica o estado das relações internas dentro de uma [house|lE] de um [clan|lE] e a atitude que os membros têm uns em relação aos outros.\n\nExistem vários [house_unity_levels|lE] que concedem aos membros de uma Casa diversos benefícios e penalidades.\n\nA unidade da Casa muda dependendo das ações que os membros da Casa tomam uns em relação aos outros. As [house_unity_unifying_actions|lE] geralmente aumentarão a unidade, enquanto as [house_unity_devisive_actions|lE] a reduzirão. Em geral, o [house_head|lE] tem um grau maior de influência sobre a $game_concept_unity$ de sua Casa."
 game_concept_house_unity_level: "Nível de União da Casa"
 game_concept_house_unity_levels: "Níveis de União da Casa"
 game_concept_house_unity_level_desc: "O $game_concept_house_unity_level$ é o estado atual de [house_unity|lE]. O nível ativo muda à medida que a unidade aumenta por meio de [house_unity_unifying_actions|lE] ou diminui por meio de [house_unity_devisive_actions|lE], e cada nível concede aos membros de uma [house|lE] vários benefícios e penalidades.\n\nExistem cinco níveis diferentes:\n[GetCurrentHouseUnityStagesDescForLocalPlayer]\n\nCada nível implica sua própria [succession_law|lE] da [house|lE]."
 game_concept_house_unity_unifying_actions: "Ações Unificadoras"
 game_concept_house_unity_unifying_actions_desc: "As ações unificadoras em relação aos membros da sua [house|lE] aumentaráo a [Concept( 'house_unity', 'unidade' )|E] desta.\n\nOs [house_heads|lE] podem usar a [decision|lE] #V $unity_steer_house_direction_decision$#! e a [interaction|lE] #V $extoll_virtuousness_interaction$#! para aumentar enormemente a unidade.\n\n#weak Alguns exemplos de ações unificadoras são:$house_unity_increase_examples$#!"
 game_concept_house_unity_devisive_actions: "Ações Divisivas"
 game_concept_house_unity_devisive_actions_desc: "As ações divisivas contra os membros da sua [house|lE] reduzirão a [Concept( 'house_unity', 'unidade' )|E] desta.\n\nOs [house_heads|lE] podem usar a [decision|lE] #V $unity_steer_house_direction_decision$#! e a [interaction|lE] #V $accuse_of_decandence_interaction$#! para reduzir enormemente a unidade.\n\n#weak Alguns exemplos de ações divisivas são:$house_unity_decrease_examples$#!"
 game_concept_house_succession_law: "Lei de Sucessão da Casa"
 game_concept_house_succession_law_desc: "Em [realms|lE] [GetGovernment('clan_government').GetName|l], o [house_unity_level|lE] atual determina qual [succession_law|lE] é usada.\n\nClãs podem mudar para uma Lei de Sucessão $SUCCESSION_LAW_CHANGE_WINDOW_SINGLE_HEIR_LAWS$, o que impedirá [house_unity|lE] de alterá-la, mas fazer isso é muito mais difícil do que o normal."
 house_unity_increase_examples: "\n$EFFECT_LIST_BULLET$ $negotiate_alliance_interaction$\n$EFFECT_LIST_BULLET$ $join_war_interaction$\n$EFFECT_LIST_BULLET$ $gift_artifact_interaction$\n$EFFECT_LIST_BULLET$ $pay_ransom_interaction$\n$EFFECT_LIST_BULLET$ $offér_guardianship_interaction$\n$EFFECT_LIST_BULLET$ $send_to_holy_order_interaction$\n$EFFECT_LIST_BULLET$ $restore_inheritance_interaction$\n$EFFECT_LIST_BULLET$ $abandon_hook_interaction$\n$EFFECT_LIST_BULLET$ $stop_attacker_vassal_war_interaction$\n$EFFECT_LIST_BULLET$ $fund_inspiration_interaction$\n$EFFECT_LIST_BULLET$ $propose_best_friendship_interaction$"
 house_unity_decrease_examples: "\n$EFFECT_LIST_BULLET$ $revoke_title_interaction$\n$EFFECT_LIST_BULLET$ $declare_war_interaction$\n$EFFECT_LIST_BULLET$ $imprison_interaction$\n$EFFECT_LIST_BULLET$ $move_to_dungeon_interaction$\n$EFFECT_LIST_BULLET$ $force_join_faction_interaction$\n$EFFECT_LIST_BULLET$ $disinherit_interaction$\n$EFFECT_LIST_BULLET$ $denounce_interaction$\n$EFFECT_LIST_BULLET$ $expose_secret_interaction$\n$EFFECT_LIST_BULLET$ $blackmail_interaction$\n$EFFECT_LIST_BULLET$ $break_betrothal_interaction$\n$EFFECT_LIST_BULLET$ $join_independence_faction_interaction$\n$EFFECT_LIST_BULLET$ $sumptuary_law_debate_interaction$\n$EFFECT_LIST_BULLET$ $vassal_claim_liege_title_interaction$"
 game_concept_dreams: "Sonhos"
 game_concept_dreams_desc: "Personagens que seguem uma fé com o dogma de adivinhação podem ocasionalmente ter sonhos. Esses sonhos podem então ser interpretados por um místico, o que pode levar a uma variedade de resultados, bons ou ruins."
 game_concept_board_game_type_go: "Go"
 game_concept_board_game_type_go_desc: "$game_concept_board_game_type_desc_guts$\n\nNo go:\n$EFFECT_LIST_BULLET$ [learning|E] $game_concept_board_game_type_counters$ [martial|lE]\n$EFFECT_LIST_BULLET$ [martial|E] $game_concept_board_game_type_counters$ [intrigue|lE]\n$EFFECT_LIST_BULLET$ [intrigue|E] $game_concept_board_game_type_counters$ [learning|lE]"
 game_concept_board_game_type_fidchell: "Fidchell"
 game_concept_board_game_type_fidchell_desc: "$game_concept_board_game_type_desc_guts$\n\nNo fidchell:\n$EFFECT_LIST_BULLET$ [learning|E] $game_concept_board_game_type_counters$ [prowess|lE]\n$EFFECT_LIST_BULLET$ [prowess|E] $game_concept_board_game_type_counters$ [diplomacy|lE]\n$EFFECT_LIST_BULLET$ [diplomacy|E] $game_concept_board_game_type_counters$ [learning|lE]"
 #### DIARCHY/REGENCIES
 game_concept_strife: "Discórdia"
 game_concept_strife_opinion: "Opinião por Discórdia"
 game_concept_strife_desc: "O [Concept( 'strife', 'conflito' )|E] representa uma penalização de [opinion|El] para outros [vassals|El].\n\nO conflito ocorre quando um súdito do [liege|lE] realiza uma ação contra outro [vassal|El]. Por exemplo, o $game_concept_diarch$ utiliza seus [diarch_powers|El], ou em eventos de [mandate|El], já que este não tem a mesma autoridade que seu [liege|El]."
 game_concept_diarchy: "Compartilhamento de Poder"
 game_concept_diarchies: "Compartilhamento de Poder"
 game_concept_share_power: "Compartilhar Poder"
 game_concept_sharing_power: "Compartilhando Poder"
 game_concept_power_sharing: "Compartilhamento de Poder"
 game_concept_diarchy_desc: "A partilha de poder ocorre quando um [ruler|lE] compartilha parte de sua autoridade com um de seus [vassals|lE] ou [courtiers|lE], que se torna seu [diarch|lE].\n\nO governante que compartilha seu poder pode definir [mandates|lE] para o $game_concept_diarch$, enquanto este último pode usar [diarch_powers|lE] especiais.\n\nA [scales_of_power|lE] indica quem tem mais autoridade, o governante ou o $game_concept_diarch$."
 game_concept_diarch: "Diarca"
 game_concept_diarchs: "Diarcas"
 game_concept_diarch_possessive: "do Diarca"
 game_concept_diarchs_possessive: "dos Diarcas"
 game_concept_diarch_desc: "Um [Concept( 'diarch', 'diarca' )|E] é o sócio menor de uma [diarchy|El] e ajuda seu [liege|El] a governar o [realm|El].\n\nTem acesso aos [diarch_powers|El], que vão se expandindo à medida que a [scales_of_power|El] se inclina a seu favor."
 game_concept_regent: "Regente"
 game_concept_regents: "Regentes"
 game_concept_regent_possessive: "do Regente"
 game_concept_regents_possessive: "dos Regentes"
 game_concept_regent_desc: "Um Regente é o nome dado a um [diarch|El] durante uma [regency|El].\n\nUm [ruler|El] pode designar um Regente antes que uma Regência ocorra. Caso contrário, o candidato com a maior [regent_succession_score|El] é escolhido automaticamente."
 #For stapling to the bottom of new diarchy types.
 variant_diarchs_replace_regents_boilerplate: "#WEAK Como um governante só pode ter um $game_concept_diarch$ de cada vez, este permanecerá caso ocorra uma [regency|lE].#!"
 game_concept_vizier: "Vizir"
 game_concept_viziers: "Vizires"
 game_concept_vizierate: "Vizirato"
 game_concept_vizier_desc: "$game_concept_vizier$ é aquele tipo de [diarch|lE] que os [rulers|lE] de um [clan|lE] podem nomear voluntariamente para ajudá-los a aumentar sua [income|lE]. Tem menos [diarch_powers|lE], mas removê-lo do cargo pode ser bastante difícil.\n\nOs $game_concept_viziers$ concedem ao seu [liege|lE] [tax_jurisdictions|lE] extras em relação à sua [stewardship|lE] e aumentam a [aptitude|lE] dos [tax_collectors|lE] dependendo de quanto a [scales_of_power|lE] os favoreça.\n\nO mais importante é que os [lieges|lE] poderão privar os seus [viziers|lE] de sua [gold|lE] [gold_i] por meio da [interaction|lE] $mulct_vizier_interaction$.\n\n#WEAK Por serem servidores civis empoderados, os $game_concept_viziers$ não são considerados uma posição prestigiosa para os [nobles|lE], apesar de sua influência. Seu sucessor é escolhido de acordo com a [vizier_succession_score|lE].#!\n\n$variant_diarchs_replace_regents_boilerplate$"
 game_concept_confidant: "$councillor_vizier$"
 game_concept_confidant_desc: "$councillor_vizier_desc$"
 game_concept_vizier_succession_score: "Pontuação de Sucessão do Vizir"
 game_concept_vizier_succession_score_desc: "Em um [vizierate|lE], é escolhido o próximo $game_concept_vizier$ com base em qual candidato possui o maior $game_concept_vizier_succession_score$.\n\nCandidatos em potencial às vezes podem tentar convencer o [ruler|lE] a deixá-los substituir o vizir em exercício em troca de [gold|lE].\n\n#WEAK Isso é permitido apenas para [characters|lE] sem terras e de [title_tier|lE] [baron|lE], favorecendo aqueles com [diplomacy|lE], [stewardship|lE] e [intrigue|lE] fortes, bem como [traits|lE] que façam deles bons servidores civis.\n\nAs [relations|lE] com o $game_concept_vizier$ atual ou com [spouses|lE], [concubines|lE] e [children|lE] [Concept( 'adult', 'adultos' )|E] sem terras do [liege|lE] podem afetar drasticamente a pontuação.#!"
 game_concept_vizier_extravagance: "Extravagância do Vizir"
 game_concept_vizier_extravagances: "Extravagâncias do Vizir"
 game_concept_vizier_extravagance_extravagance: "Extravagância"
 game_concept_vizier_extravagance_extravagances: "Extravagâncias"
 game_concept_vizier_extravagance_desc: "Uma vez no cargo, os [viziers|lE] gastarão seu [gold|lE] em [modifiers|lE] de $game_concept_vizier_extravagance_extravagances$ cada vez mais ornamentados, mimando a si mesmos e ao restante da elite social da [capital|lE] de seu [liege|lE].\n\nO $game_concept_liege$ pode saquear estes $game_concept_modifiers$ usando a [interaction|lE] $mulct_vizier_interaction$ e transformá-los em $game_concept_gold$ que o $game_concept_vizier$ será obrigado a transferir.\n\n#WEAK Cuando un $game_concept_vizier$ deje de [Concept( 'sharing_power', 'compartir poder' )|E], perderá la capacidad de mantener su estilo de vista extravagante y se perderán el resto de $game_concept_modifiers$.\n\nRobar más y mayores niveles proporciona más $game_concept_gold$. Los cuatro niveles de $game_concept_vizier_extravagance_extravagance$ son:\n$EFFECT_LIST_BULLET$ $vizier_extravagance_t1_title$\n$EFFECT_LIST_BULLET$ $vizier_extravagance_t2_title$\n$EFFECT_LIST_BULLET$ $vizier_extravagance_t3_title$\n$EFFECT_LIST_BULLET$ $vizier_extravagance_t4_title$#!"
 game_concept_co_rulership: "Corregência"
 game_concept_co_rulerships: "Corregências"
 game_concept_co_ruler: "Correinante"
 game_concept_co_rulers: "Correinantes"
 game_concept_co_rulership_desc: "Os $game_concept_co_rulers$ são uma forma de [diarchies|lE] em que se considera que o [diarch|lE] compartilha oficial e permanentemente o governo do [realm|lE].\n\nSóo sempre o [designated_heir|lE] (embora ainda possam perder as eleições), e só podem ser removidos do cargo por meio de [execution|lE]; a menos que seu [liege|lE] tenha uma [culture_tradition|lE] adequada, caso em que podem ser mutilados.\n\nExcepcionalmente, quando um $game_concept_co_ruler$ executa seu $game_concept_liege$ ou o derrota em uma guerra, [Concept( 'usurp', 'usurpa' )|E] seus [titles|lE]. Em [cultures|lE] onde mutilar é uma forma aceitável de remover um $game_concept_co_ruler$, então o $game_concept_co_ruler$ também pode mutilar seu $game_concept_liege$ para usurpar seus títulos.\n\n#WEAK Exemplos de $game_concept_co_rulerships$ incluem:\n$EFFECT_LIST_BULLET$[duumvirates|E]\n$EFFECT_LIST_BULLET$[nominal_duumvirates|E]\n$EFFECT_LIST_BULLET$[co_monarchies|E]#!"
 game_concept_duumvirate: "Diarquia"
 game_concept_duumvirates: "Diarquias"
 game_concept_co_emperor: "Coimperador"
 game_concept_co_emperors: "Coimperadores"
 game_concept_duumvirate_desc: "Uma $game_concept_duumvirate$ consiste em que um [empire|lE] seja governado por dois [characters|lE]. Um imperador sênior (o [liege|lE]), e um imperador júnior (o $game_concept_co_emperor$).\n\nGera [influence|lE] passiva tanto para si quanto para o imperador sênior. Quanto exatamente escala a cada [EmptyScope.ScriptValue('co_emperor_scale_years_in_job_value')|0] anos no cargo, incluindo o tempo passado como [junior_emperor|lE].\n\nNa prática, a maior parte do poder ainda repousa nas mãos do $game_concept_liege$, que de fato possui o título imperial, mais do que em seu [diarch|lE], mas o $game_concept_co_emperor$ tem acesso a várias formas poderosas de afetar o [realm|lE] e é um candidato mais barato de promover para cargos [administrative|lE].\n\nNotavelmente, os $game_concept_co_emperors$ podem usar o [casus_belli|lE] [imperial_expedition_cb|lE] com níveis mais altos de movimentação da [scales_of_power|lE].\n\n#WEAK Os $game_concept_co_emperors$ podem [usurp|lE] o imperador sênior por meio de mutilação ritual.#!"
 game_concept_nominal_duumvirate: "Diarquia Nominal"
 game_concept_nominal_duumvirates: "Diarquias Nominais"
 game_concept_junior_emperor: "Coimperador Nominal"
 game_concept_junior_emperors: "Coimperadores Nominais"
 game_concept_nominal_duumvirate_desc: "Um $game_concept_duumvirate$ consiste no governo de um [empire|lE] por dois [characters|lE]. O imperador sênior (o [liege|lE]), e um imperador júnior (o $game_concept_junior_emperor$).\n\nSão considerados $game_concept_nominal_duumvirate$ quando o imperador júnior é uma [child|lE] que não pode governar de forma eficaz, mas se transformará em um [duumvirate|lE] quando atingir a idade adulta.\n\nOs $game_concept_junior_emperors$ geram [influence|lE] passiva tanto para si quanto para o imperador sênior. Exatamente quanto escala a cada [EmptyScope.ScriptValue('co_emperor_scale_years_in_job_value')|0] anos no cargo, sendo transferido para ele quando se tornar um $game_concept_co_emperor$.\n\n#WEAK Nombrar un $game_concept_child$ $game_concept_junior_emperor$ cuenta como si se le formase para que un día acabe siendo el emperador superior. Cuanto más practica este, más formación recibe.\n\nEsto se refleja como [skill|lE] extra que se le distribuye cuando se vuelva [adult|lE], dependiendo de su movimiento de [scales_of_power|lE].\n\nLos niños no recibirán eventos de [mandate|lE].#!"
 game_concept_co_monarchy: "Comonarquia"
 game_concept_co_monarchies: "Comonarquias"
 game_concept_co_monarch: "Comonarca"
 game_concept_co_monarchs: "Comonarcas"
 game_concept_co_monarchy_desc: "$game_concept_co_monarchies$ são um tipo de [diarchy|lE] que oferece aos governantes de tipo [feudal|lE] uma forma de escolher um [designated_heir|lE] até em [eras|lE] anteriores.\n\nO custo disso é entrar em um $game_concept_diarchy$ com o herdeiro, o que lhe proporciona acesso mais fácil a muitos dos mesmos poderes de um [entrenched_regent|lE].\n\n#WEAK Os $game_concept_co_monarchs$ só estão disponíveis para [kings|lE] e [emperors|lE].#!"
 game_concept_regency: "Regência"
 game_concept_regencies: "Regências"
 game_concept_regency_possessive: "da Regência"
 game_concept_regencies_possessive: "das Regências"
 game_concept_regency_desc: "Uma regência é uma forma especial de [diarchy|El] quando o [ruler|El] não é capaz de governar seu [realm|El] por si mesmo.\n\nPor geralmente, isso ocorre se o governante é uma [child|El], fica [imprisoned|El] , resulta [GetTrait('incapable').GetName(GetNullCharacter )|l] ou participa de uma [activity|El] fora de seu domínio.\n\nUma regência que se prolonga demais pode se tornar uma [entrenched_regency|El]."
 game_concept_regency_veto: "Veto da Diarquia"
 game_concept_veto: "Veto"
 game_concept_regency_veto_desc: "Quando um [diarch|El] usa seus [diarch_powers|El], seu [liege|El] pode usar seu Veto da Diarquia para impedi-lo, ao custo de [prestige|El]"
 game_concept_regent_succession_score: "Pontuação de Sucessão da Regência"
 game_concept_regent_succession_score_desc: "Em uma [regency|lE], o [regent|lE] seguinte à escolhido com base no candidato que tiver a maior $game_concept_regent_succession_score$.\n\nSe o [ruler|lE] do [realm|lE] designar um regente, ele substituirá a ordem de sucessão e será escolhido em seu lugar.\n\n#WEAK Isso favorece [characters|lE] relacionados ao $game_concept_ruler$, especialmente [Concept( 'family', 'familiares' )|E] sem terras em sua [court|lE] e os politicamente habilidosos.#!"
 game_concept_diarch_power: "Poder Emprestado"
 game_concept_diarch_powers: "Poderes Emprestados"
 game_concept_diarch_power_power: "Poder"
 game_concept_diarch_power_powers: "Poderes"
 game_concept_diarch_power_possessive: "do Poder Emprestado"
 game_concept_diarch_powers_possessive: "dos Poderes Emprestados"
 game_concept_diarch_power_power_possessive: "do Poder"
 game_concept_diarch_power_powers_possessive: "dos Poderes"
 game_concept_diarch_power_desc: "Um [diarch|El] em uma situação ativa de [power_sharing|El] tem acesso a [Concept( 'diarch_powers', 'poderes delegados' )|E] especiais.\n\nEstes são [Concept( 'character_interaction', 'interações de personagem' )|E] especiais que imitam as que seu [liege|El] possui ou constituem outros abusos de poder. Exemplos disso incluem a [Concept( 'revoking', 'revogação' )|E] de [titles|El] de outros [vassals|El] ou o desvio de [gold|El] de seu senhor.\n\nMuitos poderes delegados dão ao senhor a oportunidade de [Concept( 'veto', 'vetá-los' )|E]."
 game_concept_trilateral_interaction: "Interação Trilateral"
 game_concept_trilateral_interactions: "Interações Trilaterais"
 game_concept_trilateral_interaction_desc: "$game_concept_trilateral_interactions$ exigem não apenas a aprovação de um destinatário, mas também de uma terceira parte.\n\nUm exemplo seriam os [diarch_powers|El], nos quais um [liege|El] pode usar seu [regency_veto|El]."
 game_concept_mandate: "Mandato"
 game_concept_mandates: "Mandatos"
 game_concept_mandate_possessive: "do Mandato"
 game_concept_mandates_possessive: "dos Mandatos"
 game_concept_mandate_desc: "Os [Concept( 'mandates', 'mandatos' )|E] são tarefas úteis que um [liege|lE] pode atribuir ao seu [diarch|lE] quando [Concept( 'sharing_power', 'comparten poder' )|E].\n\nDe maneira parecida às [councillor_tasks|lE], o [Concept( 'liege', 'senhor' )|E] seleciona um [Concept( 'mandate', 'mandato' )|E] e então recebe lentamente os benefícios dele.\n\nQuando um [Concept( 'diarch', 'diarca' )|E] faz bem o seu trabalho, ele move a [scales_of_power|lE] para si #EMP y#! e gera [strifé|lE] com seus colegas [vassals|lE].\n\nA quantidade de benefício que o [Concept( 'liege', 'senhor' )|E] recebe depende da [diarch_aptitude|lE] e da [diarch_loyalty|lE] de seu diarca."
 game_concept_diarch_aptitude: "Aptidão do Diarca"
 game_concept_diarch_aptitude_desc: "A [Concept( 'diarch_aptitude', 'aptidão' )|E] determina o quão bem este cumpre cada [mandate|El] dado por seu [liege|El].\n\nTanto as [skills|El] quanto os [personality_traits|El] desempenham um papel. Por exemplo, um [Concept( 'diarch', 'diarca' )|E] [GetTrait('greedy').GetName(GetNullCharacter)|l] encarregado do Mandato de $fill_coffers_mandate$ pode não enviar tanto [gold|El] ao seu suserano.\n\n#WEAK Os [diarchs|El] se adaptam bem a um [Concept( 'mandate', 'mandato' )|E] quando têm cerca de 40 de [Concept( 'aptitude', 'aptidão' )|E] ou mais para ele.#!"
 game_concept_diarch_loyalty: "Lealdade"
 game_concept_diarch_loyalty_explicit: "Lealdade do Diarca"
 game_concept_diarch_loyal: "Leal"
 game_concept_diarch_loyalty_desc: "La lealdade de um [diarch|El] determinará o quão propenso ele está a abusar de seus poderes e beneficiar-se às custas de seu [liege|lE] (ou do [realm|lE]).\n\nUm [Concept( 'diarchs', 'diarca' )|E] $DIARCHY_WINDOW_VISIBLY_LOYAL$ se abstém de usar os [diarch_powers|lE], tenta cumprir obedientemente o [mandate|lE] que lhe foi designado e renuncia voluntariamente ao seu poder quando solicitado.\n\nUm [Concept( 'diarchs', 'diarca' )|E] $DIARCHY_WINDOW_VISIBLY_DISLOYAL$ usa livremente seus poderes, tenta cumprir seu mandato para inclinar a [scales_of_power|lE] a seu favor e pode se recusar a abrir mão do poder se a balança pender o suficiente para o seu lado.\n\nUm diarca $DIARCHY_WINDOW_UNKNOWN_LOYALTY$ pode usar seus poderes, e geralmente dividirá os benefícios de seu mandato com seu [Concept( 'liege', 'senhor' )|E] ou ignorará isso por completo, e talvez seja necessário um suborno para que abandone o cargo, se a balança de poder lhe for favorável."
 game_concept_diarch_succession: "Sucessão"
 game_concept_diarch_succession_explicit: "Sucessão do Diarca"
 game_concept_diarch_succession_desc: "A [Concept( 'diarch_succession_explicit', 'sucessão de diarca' )|E] determina qual dos [vassals|lE] diretos de um [liege|lE] ou [courtiers|lE] é automaticamente nomeado [diarch|lE] quando for necessário.\n\nIsso ocorre seja porque um [Concept( 'liege', 'senhor' )|E] inicia uma [diarchy|lE] ou porque o diarca atual morre ou é removido do cargo.\n\n#weak Diferentes tipos de [Concept( 'power_sharing', 'compartilhamento de poder' )|E] podem calcular a ordem de sucessão de modo diferente; em uma [regency|lE], [characters|lE] sem terras com fortes conexões pessoais com seu senhor tendem a dominar.\n\nFalar o [language|lE] do [Concept( 'liege', 'senhor' )|E] (e a [court_language|lE], se houver uma) quase sempre é crucial.#!"
 game_concept_scales_of_power: "Balança de Poder"
 game_concept_scales_of_power_scales: "Escalas"
 game_concept_scales_of_power_desc: "Durante [Concept( 'sharing_power', 'compartilhamento de poder' )|E], o equilíbrio de poder entre o [liege|lE] e seu [diarch|El] é medido na [Concept( 'scales_of_power', 'balança de poder' )|E].\n\nÀ medida que a balança de poder se inclina para o [Concept( 'diarch', 'diarca' )|E], eles desbloqueiam [diarch_powers|lE] e podem adicionar custos às [diarch_affécted_actions|El] do senhor.\n\nÀ medida que se inclina para o [Concept( 'liege', 'senhor' )|E], isso, por outro lado, facilita para o senhor encerrar a [diarchy|lE].\n\nA $game_concept_scales_of_power_scales$ pode ser inclinada por:\n$EFFECT_LIST_BULLET$ Usando a [character_interaction|lE] $swing_scales_currency_interaction$ contra a parte oposta\n$EFFECT_LIST_BULLET$ Como [Concept( 'diarch', 'diarca' )|E], servindo bem ao seu senhor (ainda que cinicamente) nos eventos de [mandate|lE]"
 game_concept_entrenched_regency: "Regência Entrincheirada"
 game_concept_entrenched_regency_entrenched: "Entrincheirada"
 game_concept_entrenched_regency_regency: "Regência"
 game_concept_entrenched_regent: "Regente Entrincheirado"
 game_concept_entrenched_regents: "Regentes Entrincheirados"
 game_concept_entrenched_regency_entrench: "Entrincheirar"
 game_concept_entrenched_regencies: "Regências Entrincheiradas"
 game_concept_entrenched_regency_desc: "Se uma [regency|El] durar demais, pode se entrincheirar, e o [regent|El] se torna ainda mais poderoso em comparação com seu [liege|El].\n\nOs benefícios que o [regent|El] obtém da [scales_of_power|El] tornam-se muito mais poderosos.\n\nPara pôr fim a uma [entrenched_regency|lE], o regente deve aceitar um presente de seu senhor ou este último deve inclinar a balança a seu favor."
 game_concept_diarch_affected_actions: "Ações Cotidianas"
 game_concept_diarch_affected_actions_desc: "Quando a [scales_of_power|El] favorecer o [diarch|El] durante uma situação de [power_sharing|El], é possível que algumas [interactions|El] que o [liege|El] passem a custar [prestige|El].\n\nAs ações afetadas são:\n$EFFECT_LIST_BULLET$[revoking|EU] um [title|lE]\n$EFFECT_LIST_BULLET$[retracting|EU] de um [vassal|lE]\n$EFFECT_LIST_BULLET$[imprisoning|EU] [characters|lE]\n$EFFECT_LIST_BULLET$[executing|EU] [Concept( 'characters', 'personagens' )|E] #weak (a menos que la fé del [Concept( 'liege', 'senhor' )|E] practique alguna forma de sacrificio humano)#!"
 ######## GRAND ACTIVITIES ETC
 game_concept_grand_activity: "Grande Atividade"
 game_concept_grand_activities: "Grandes Atividades"
 game_concept_grand_activity_desc: "As [grand_activities|lE] são esplêndidas demonstrações de riqueza e magnificência e, por natureza, #EMP mayores#! do que as [activities|El] normais. Podem ter várias [activity_phases|El] e oferecem mais possibilidades de personalização no planejamento.\n\nAs viagens oferecem a oportunidade de visitar vários [vassals|El] em seu [realm|El], enquanto os torneios oferecem uma variedade de [contests|E] para organizar."
 game_concept_special_guest: "Convidado Especial"
 game_concept_special_guests: "Convidados Especiais"
 game_concept_honorary_guest: "Convidado de Honra"
 game_concept_honorary_guest_desc: "$honorary_guest_desc$"
 game_concept_special_guest_desc: "Convidados especiais ocupam um lugar de honra em [grand_activities|El]. Honre alguém em seu [GetActivityType( 'activity_feast' ).GetName|l] ou escolha um campeão para representá-lo em seu [GetActivityType( 'activity_tournament' ).GetName|l]!\n\nEles têm mais chances de aceitar seu convite, e qualquer atividade para a qual forem convidados não começará até que cheguem."
 game_concept_contest: "Competição"
 game_concept_contests: "Competições"
 game_concept_contest_desc: "Uma [GetActivityType( 'activity_tournament' ).GetName|l] consiste em uma série de [contests|lE], selecionadas pelo [activity_host|El] em que os [contestants|El] [Concept( 'contest_qualifying', 'clasificados' )|E] podem competir para ganhar [prizes|lE] e outras recompensas.\n\nCada [contest|lE] determina o vencedor de uma das quatro formas: [contest_category_versus|lE], [contest_category_turn|lE], [contest_category_team|lE] e [contest_category_race|lE].\n\nSuas chances de vencer em uma competição são determinadas por suas [skills|El], [traits|El], a preparação e outros fatores. A elegibilidade para entrar nas competições físicas é determinada pela saúde e pelo sexo, com base na [culture|El] e na [faith|El] do [activity_host|El]."
 game_concept_prize: "Prêmio"
 game_concept_prizes: "Prêmios"
 game_concept_prize_desc: "Os prêmios são [artifacts|lE] que são entregues aos vencedores daqueles [contests|El] de [GetActivityType( 'activity_tournament' ).GetName|l] que tenham um único vencedor.\n\nA qualidade do [prize|lE] depende das opções escolhidas pelo [activity_host|El] e da [era|lE]."
 game_concept_contest_category_team: "Equipes"
 game_concept_contest_category_team_desc: "Nas [contests|lE] por equipes, são recompensados todos os [contestants|El] [Concept( 'contest_qualifying', 'classificados' )|E] da equipe que tiver mais pontos combinados ao final da competição.\n\nCompetições de equipe:\n$EFFECT_LIST_BULLET$Corpo a corpo"
 game_concept_contest_category_versus: "Eliminatória"
 game_concept_contest_category_versus_desc: "O vencedor de uma [contest|El] eliminatória é o último a ficar de pé depois de três [contest_rounds|El] entre os [contestants|El] [Concept( 'contest_qualifying', 'classificados' )|E].\n\nCompetições eliminatórias:\n$EFFECT_LIST_BULLET$Luta\n$EFFECT_LIST_BULLET$Duelo\n$EFFECT_LIST_BULLET$Justa\n$EFFECT_LIST_BULLET$Jogos de tabuleiro"
 game_concept_contest_category_turn: "Rodadas"
 game_concept_contest_category_turn_desc: "O vencedor de uma [contest|El] por turnos é o [contestant|lE] [Concept( 'contest_qualifying', 'classificado' )|E] com mais pontos ao final da competição.\n\nCompetições por turnos:\n$EFFECT_LIST_BULLET$Tiro com arco\n$EFFECT_LIST_BULLET$Recital"
 game_concept_contest_category_race: "Corrida"
 game_concept_contest_category_race_desc: "O vencedor de uma [contest|El] de corridas é o [contestant|lE] [Concept( 'contest_qualifying', 'classificado' )|E] cujo cavalo inscrito tenha ficado em primeiro lugar ao final da corrida.\n\nCompetições de corrida:\n$EFFECT_LIST_BULLET$Corrida de cavalos"
 game_concept_contest_round: "Rodada da Competição"
 game_concept_contest_rounds: "Rodadas da Competição"
 game_concept_contest_round_desc: "As [contests|lE] de [contest_category_versus|lE] decidirão seu vencedor colocando todos os [contestants|lE] [Concept( 'contest_qualifying', 'calificados' )|E] entre si em combates eliminatórios até que reste apenas um.\n\nHá três rodadas: quartas de final, semifinais e final."
 game_concept_contest_qualification: "Classificação"
 game_concept_contest_qualify: "Classificar-se"
 game_concept_contest_qualifier: "Classificado"
 game_concept_contest_qualifiers: "Classificados"
 game_concept_contest_qualifying: "Classificando-se"
 game_concept_contest_qualifies: "Classifica-se"
 game_concept_contest_qualification_desc: "Embora um [GetActivityType( 'activity_tournament' ).GetName|l] atraia muitos [contestants|lE] elegíveis, apenas um pequeno número se classificará para cada [contest|lE], com chance de ganhar glória e seu [prize|lE].\n\nPara garantir a Classificação, seu [progress_to_victory|lE] deve estar acima do limiar quando a Competição começar."
 game_concept_contestant: "Competidor"
 game_concept_contestants: "Competidores"
 game_concept_contestant_desc: "Para competir nas [contests|lE] de um [GetActivityType( 'activity_tournament' ).GetName|l], é preciso cumprir os requisitos. Jogos de tabuleiro permitem que todos os personagens participem, enquanto outras competições, como a luta, dependem de regras marciais.\n\nOs personagens que não competem serão [spectators|lE] e os [contestants|lE] em potencial podem optar por não participar se quiserem assistir.\n\nA elegibilidade para participar das competições é determinada pelo sexo e pela saúde, com base na [culture|lE] e na [religion|lE] do anfitrião."
 game_concept_spectator: "Espectador"
 game_concept_spectators: "Espectadores"
 game_concept_spectating: "Assistindo"
 game_concept_spectate: "Assistir"
 game_concept_spectator_desc: "Todo personagem a quem não seja permitido competir em uma [contest|lE] a [Concept( 'spectate', 'contemplará' )|E] em seu lugar.\n\nOs [contestants|lE] potenciais também podem optar por não participar em vez de competir."
 game_concept_progress_to_victory: "Progresso até a Vitória"
 game_concept_progress_to_victory_desc: "Uma abstração da probabilidade de você vencer uma [contest|lE] determinada em relação aos outros contendores, com base em suas [skills|lE], [health|lE] e [traits|lE]. Por exemplo, um [GetTrait('giant').GetName( GetNullCharacter )|l] com alta [prowess|lE] tem vantagem em contendas físicas travadas a pé, como a luta.\n\nÉ necessário um $game_concept_progress_to_victory$ mínimo para garantir a [contest_qualification|E] em uma [contest|lE]. Visite os [locales|lE] em busca de oportunidades para melhorar suas chances e sabotar seus oponentes.\n\nA #V tabela de classificação#! do torneio exibe o [progress_to_victory|lE] atual de todos os contendores."
 game_concept_progress_to_victory_locale_tt: "Visite [locales|lE] para oportunidades de melhorar suas chances ou sabotar as de seus oponentes."
 game_concept_contest_aptitude: "Aptidão para Competição"
 game_concept_contest_aptitude_desc: "Diferentes [contests|lE] exigem talentos diferentes: a pé, cavalo, arco, engenho ou uma combinação.\n\nSua aptidão será derivada de suas [skills|lE], [health|lE], [traits|lE] e [trait_level_track_xp|lE] de [GetTrait('tourney_participant').GetName( GetNullCharacter )|l].\n\nPor exemplo, um [GetTrait('giant').GetName( GetNullCharacter )|l] com alta [prowess|lE] tem uma vantagem natural em uma competição de luta."
 game_concept_locale: "Locais"
 game_concept_locales: "Locais"
 game_concept_locale_desc: "Você pode escolher explorar o [GetActivityType( 'activity_tournament').GetName|l] enquanto as [contests|lE].\n\nCada cenário oferece oportunidades para socializar com os convidados, melhorar o [progress_to_victory|lE] ou sabotar os [contestants|lE].\n\nSe um cenário não for selecionado, você visitará um aleatoriamente após um breve período de tempo."
 game_concept_travel: "Viagem"
 game_concept_travels: "Viagens"
 game_concept_traveling: "Viajando"
 game_concept_traveled: "Viajado"
 game_concept_travel_desc: "[Concept( 'travel', 'Viajar' )] é o meio pelo qual um [character|El] vai de uma [location|El] a outra, principalmente para assistir a [activities|El].\n\nHá inúmeras formas de planejar sua jornada, como escolher um [GetCourtPositionType('travel_leader_court_position').GetName()|l] para contratar, selecionando \"[travel_options|EU]\" e personalizando sua rota. Você encontrará muitos personagens interessantes ao longo do caminho, mas tome cuidado com os [Concept( 'travel_danger', 'peligros' )|El] que podem estar à espreita."
 game_concept_travel_option: "Opção de Viagem"
 game_concept_travel_options: "Opções de Viagem"
 game_concept_travel_option_desc: "Uma opção escolhida ao planejar sua [travel|El] para aprimorar ou modificar a jornada que você está prestes a iniciar."
 game_concept_travel_danger: "Perigo da Viagem"
 game_concept_travel_danger_i: "@travel_danger_icon!"
 game_concept_travel_danger_desc: "Em suas [travels|lE] você pode atravessar terras perigosas — por exemplo, desertos ou pântanos — que podem impedir sua jornada.\n\nVocê pode mitigar os riscos do Perigo ao melhorar sua [travel_saféty|lE]. Para isso, invista em [travel_options|lE] ou contrate um [GetCourtPositionType('travel_leader_court_position').GetName()|l].\n\nVárias [culture_traditions|lE] reduzem ou eliminam o risco de certos tipos de Perigo."
 game_concept_travel_safety: "Segurança"
 game_concept_travel_safety_desc: "Ter um valor alto de Segurança ajudará você a evitar o [travel_danger|lE] durante suas [travels|lE]. Sua Segurança é afetada por suas [skills|El] e as de seu [GetCourtPositionType('travel_leader_court_position').GetName()|l].\n\n$min_travel_contribution$"
 game_concept_travel_speed: "Velocidade"
 game_concept_travel_speed_desc: "Ter uma boa Velocidade durante [Concept( 'traveling', 'viagem' )|E] permitirá que você chegue ao seu destino mais rápido. Sua Velocidade à afetada pelas suas [skills|El] e pelas do seu [GetCourtPositionType('travel_leader_court_position').GetName()|l].\n\n$min_travel_contribution$"
 game_concept_entourage: "Comitiva"
 game_concept_entourage_desc: "É perigoso aventurar-se sozinho, então você deveria levar consigo alguns companheiros em sua comitiva. Todos os que [Concept( 'travel', 'viajam' )|E] com você fazem parte dela e compartilharão os desafios que você possa enfrentar em sua jornada.\n\nSeu [GetCourtPositionType('travel_leader_court_position').GetName()|l] é o líder da comitiva e faz os planos de viagem.\n\nAlguns [characters|El] se juntam à comitiva automaticamente quando você planeja viajar. As [travel_options|El] e [activity_options|El] oferecem mais formas de adicionar personagens."
 min_travel_contribution: "A contribuição de [character|lE] jamais pode ser inferior a #HIGH 0#!."
 game_concept_point_of_interest: "Ponto de Interesse"
 game_concept_points_of_interest: "Pontos de Interesse"
 game_concept_point_of_interest_desc: "Um [point_of_interest|lE] é uma localização no mundo que vale a pena visitar. Quando você visitar essa localização pela primeira vez, você receberá os benefícios associados a ela."
 game_concept_vassal_stance: "Postura do Vassalo"
 game_concept_vassal_stances: "Posturas do Vassalo"
 game_concept_preferred_heir: "Herdeiro Preferido"
 game_concept_unpreferred_heir: "Herdeiro Não Preferido"
 game_concept_preferred_heirs: "Herdeiros Preferidos"
 game_concept_unpreferred_heirs: "Herdeiros Não Preferidos"
 game_concept_vassal_stance_desc: "Todo [vassal|lE] tem uma postura de vassalo que afeta a [opinion|lE] que tem por você como seu [liege|lE] e qual [heir|lE] prefere como sucessor do [realm|lE].\n\nVassalos com a mesma postura vão gostar e desgostar das mesmas coisas. Por exemplo, todos os vassalos do tipo [GetVassalStance( 'glory_hound' ).GetName] [GetVassalStance( 'glory_hound' ).GetTextIcon] vão desgostar que você perca [wars|lE].\n\nToda postura de vassalo prefere um herdeiro específico. Na sucessão, cada herdeiro preferido terá menores [legitimacy_expectations|lE] com os vassalos dessa postura.\n\n#low As posturas de vassalo são:#!\n$EFFECT_LIST_BULLET$[GetVassalStance( 'courtly' ).GetName|l] [GetVassalStance( 'courtly' ).GetTextIcon]\n$EFFECT_LIST_BULLET$[GetVassalStance( 'parochial' ).GetName|l] [GetVassalStance( 'parochial' ).GetTextIcon]\n$EFFECT_LIST_BULLET$[GetVassalStance( 'glory_hound' ).GetName|l] [GetVassalStance( 'glory_hound' ).GetTextIcon]\n$EFFECT_LIST_BULLET$[GetVassalStance( 'zealot' ).GetName|l] [GetVassalStance( 'zealot' ).GetTextIcon]\n$EFFECT_LIST_BULLET$[GetVassalStance( 'minority' ).GetName|l] [GetVassalStance( 'minority' ).GetTextIcon]\n$EFFECT_LIST_BULLET$[GetVassalStance( 'barons_and_minor_landholders' ).GetName|l] [GetVassalStance( 'barons_and_minor_landholders' ).GetTextIcon]\n$EFFECT_LIST_BULLET$[GetVassalStance( 'belligerent' ).GetName|l] [GetVassalStance( 'belligerent' ).GetTextIcon]"
 game_concept_personality_i: "@personality_icon!"
 game_concept_warlike_i: "@warlike_icon!"
 game_concept_unpredictable_i: "@unpredictable_icon!"
 game_concept_cautious_i: "@cautious_icon!"
 game_concept_builder_i: "@builder_icon!"
 game_concept_conqueror_i: "@conqueror_icon!"
 game_concept_pious_builder_i: "@pious_builder_icon!"
 game_concept_ai_pious_builder_personality: "Construtor Piedoso"
 game_concept_ai_pious_builder_personality_desc: "Um $game_concept_ai_pious_builder_personality$ quer investir todo o seu [gold|lE] para aumentar sua [piety|lE].\n\nEsses personagens esvaziarão seu tesouro para financiar [buildings|lE], [great_projects|lE], [activities|lE] e [decisions|E] de caráter religioso e cerimonial, e frequentemente constroem mais [pious_buildings|lE] e [holdings|lE] [Concept('temple', 'de templo')|E] ou da classe [temple_citadel|E]. Só guardam ouro se estiverem ameaçados diretamente, por exemplo por uma [faction|lE] forte.\n\nOs governantes de caráter $game_concept_ai_pious_builder_personality$ são ligeiramente mais propensos a criar e promover [legends|lE] sagradas.\n\nOs [rulers|lE] fervourosos do tipo [AddLocalizationIf( HasDlcFeature( 'all_under_heaven' ), 'game_concept_ai_pious_builder_personality_desc_or_mandala' )] com tendência à [virtue|lE] e sem inclinação particular à [war|lE] tendem a ser do tipo $game_concept_ai_pious_builder_personality$.\nOs traços comuns incluem [GetTrait('zealous').GetName( GetNullCharacter )|l], [GetTrait('forgiving').GetName( GetNullCharacter )|l], [GetTrait('improvident').GetName( GetNullCharacter )|l], [GetTrait('humble').GetName( GetNullCharacter )|l], [GetTrait('patient').GetName( GetNullCharacter )|l], [GetTrait('diligent').GetName( GetNullCharacter )|l] e [GetTrait('generous').GetName( GetNullCharacter )|l]. Governantes com [GetFocus('learning_theology_focus').GetName|l] também tenderão a ser do tipo $game_concept_ai_pious_builder_personality$."
 game_concept_ai_pious_builder_personality_desc_or_mandala: "ou [mandala|lE]"
 game_concept_ai_warlike_personality: "Belicoso"
 game_concept_ai_warlike_personality_desc: "Um [ruler|lE] $game_concept_ai_warlike_personality$ deseja estar sempre pronto para declarar a [war|lE]. Guardará [gold|lE] para a [war|lE] antes de investi-lo no desenvolvimento de seu [realm|lE]. Se um governante $game_concept_ai_warlike_personality$ estiver em paz por um período prolongado de tempo, usará o ouro de seu cofre de guerra para construir [buildings|lE].\n\nGovernantes belicosos têm maior probabilidade de criar e promover [legends|lE] heroicas.\n\nGovernantes corajosos e gananciosos tendem a ser belicosos.\nOs traços comuns incluem [GetTrait('wrathful').GetName( GetNullCharacter )|l], [GetTrait('impatient').GetName( GetNullCharacter )|l], [GetTrait('sadistic').GetName( GetNullCharacter )|l],[GetTrait('ambitious').GetName( GetNullCharacter )|l],[GetTrait('vengeful').GetName( GetNullCharacter )|l],[GetTrait('irritable').GetName( GetNullCharacter )|l] e [GetTrait('zealous').GetName( GetNullCharacter )|l]."
 game_concept_ai_cautious_personality: "Cauteloso"
 game_concept_ai_cautious_personality_desc: "Um [ruler|lE] $game_concept_ai_cautious_personality$ quer estar preparado para quando lhe declararem a [war|lE]. É um tanto relutante em declarar guerras ofensivas, preferindo em vez disso uma preparação lenta. Mantém uma reserva de [gold|lE] para ajudar a se defender e investe em [buildings|lE] e [men_at_arms|lE] para ajudá-lo a se sentir seguro.\n\nGovernantes cautelosos têm menos probabilidade de criar e promover [legends|lE].\n\nGovernantes reservados e cuidadosos tendem a ser cautelosos.\nOs traços comuns incluem [GetTrait('patient').GetName( GetNullCharacter )|l], [GetTrait('calm').GetName( GetNullCharacter )|l], [GetTrait('craven').GetName( GetNullCharacter )|l], [GetTrait('paranoid').GetName( GetNullCharacter )|l] e [GetTrait('content').GetName( GetNullCharacter )|l]. Jamais serão de personalidade [GetTrait('fickle').GetName( GetNullCharacter )|l]."
 game_concept_ai_conqueror_personality: "Conquistador"
 game_concept_ai_conquerors_personality: "Conquistadores"
 game_concept_ai_conqueror_personality_desc: "Um $game_concept_ai_conqueror_personality$ quer expandir seu [realm|lE] por meio da [war|lE], a qualquer custo. Ele investirá todo o seu [gold|lE] no [war_chest|lE] ou para comprar [men_at_arms|lE].\n\nTende a declarar muito mais [wars|lE] do que o normal e é um [ally|lE] bastante pouco confiável. Renuncia à maioria dos prazeres fúteis da vida, como sediar [activities|lE] ou participar delas e patrocinar [inspirations|lE], para assim economizar [gold|lE] para esmagar seus inimigos. Só usará Atividades para ganhar [prestige|lE] e [piety|lE] suficientes para ir à [war|lE].\n\nQualquer [ruler|lE] que não seja [ai_cautious_personality|lE] tem o potencial de se tornar um $game_concept_ai_conqueror_personality$, mas normalmente não há mais do que uma mão cheia de governantes no mundo com esse arquétipo."
 game_concept_ai_economical_boom_personality: "Construtor"
 game_concept_ai_economical_boom_personality_desc: "Um $game_concept_ai_economical_boom_personality$ quer investir todo o seu [gold|lE] no [realm|lE]. Esses personagens esvaziarão seu tesouro para financiar [buildings|lE] e [men_at_arms|lE] e, frequentemente, constroem mais [economic_buildings|lE] e [holdings|lE]. Eles só guardam ouro se estiverem diretamente ameaçados, por exemplo por uma [faction|lE] forte.\n\nOs governantes de caráter $game_concept_ai_economical_boom_personality$ são um pouco menos propensos a criar e promover [legends|lE].\n\nGovernantes ousados com tendência a construir e sem inclinação particular para a [war|lE] tendem a ser de caráter $game_concept_ai_economical_boom_personality$.\nOs traços comuns incluem [GetTrait('calm').GetName( GetNullCharacter )|l], [GetTrait('patient').GetName( GetNullCharacter )|l], [GetTrait('diligent').GetName( GetNullCharacter )|l], [GetTrait('generous').GetName( GetNullCharacter )|l], [GetTrait('stubborn').GetName( GetNullCharacter )|l] e [GetTrait('profligate').GetName( GetNullCharacter )|l]. Os governantes com [GetFocus('stewardship_domain_focus').GetName|l] também tenderão a ser de caráter $game_concept_ai_economical_boom_personality$."
 game_concept_ai_economical_unpredictable_personality: "Imprevisível"
 game_concept_ai_economical_unpredictable_personality_desc: "Um [ruler|lE] $game_concept_ai_economical_unpredictable_personality$ não tem [traits|lE] que o empurrem para qualquer Arquétipo Econômico específico e pode decidir por qualquer estratégia.\n\nEle pode escolher investir temporariamente pesadamente em [buildings|lE], como um [ai_economical_boom_personality|lE], ou desenvolver seu [realm|lE] lentamente com uma reserva de [gold|lE]. Ele vai à [war|lE] em um ritmo regular."
 game_concept_trait_level_track: "Trilha de Traço"
 game_concept_trait_level_track_desc: "Alguns [traits|El] oferecem várias trilhas, cada uma das quais melhorará o Traço de formas diferentes.\n\nGanhar [trait_level_track_xp|El] é necessário para avançar mais em uma trilha."
 game_concept_trait_level_track_xp: "Experiência de Traço"
 game_concept_trait_level_track_xp_desc: "É necessária experiência para avançar mais em uma [trait_level_track|El] e mudar as bonificações que a [trait|El] fornece."
 game_concept_hunt_sighting: "Avistamento de Caça"
 game_concept_hunt_sightings: "Avistamentos de Caça"
 game_concept_hunt_sighting_no_prefix: "Avistamento"
 game_concept_hunt_sightings_no_prefix: "Avistamentos"
 game_concept_hunt_sighting_desc: "A [hunt_sighting|lE] é um relatório que confirma a presença de animais prestígiosos específicos em um [county|lE], que podem ser perseguidos em uma [GetActivityType('activity_hunt').GetName|l] realizada ali.\n\nO [court_position|lE] de [GetCourtPositionType('master_of_hunt_court_position').GetName()|l] buscará [hunt_sightings_no_prefix|lE]."
 game_concept_stationed_regiment: "Regimento Estacionado"
 game_concept_stationed_regiment_desc: "Um [regiment|lE] de [men_at_arms|lE] recebe bônus de efetividade ao ser estacionado em uma [holding|lE].\n\nOs [buildings|lE] podem aumentar ainda mais esses bônus — às vezes para qualquer tipo de Homens de Armas, mas mais comumente para um ou dois. Por exemplo, os [GetBuilding('stables_01').GetName|l] concedem um bônus à [heavy_cavalry|lE] e à [Concept( 'light_cavalry', 'leve' )|E] estacionada.\n\nVocê pode estacionar a qualquer momento, exceto durante uma [war|lE] ou se a posse estiver [Concept( 'occupied', 'ocupada' )|E]. Se uma posse for perdida, quaisquer Homens de Armas estacionados serão desestacionados."
 game_concept_stationed: "Estacionado"
 game_concept_station: "Posto"
 game_concept_station_regiment: "Estacionar Regimento"
 game_concept_stationed_holding: "Propriedade Estacionada"
 game_concept_tour: "Viagem"
 game_concept_tour_desc: "Uma [grand_activity|lE] na qual um [liege|lE] faz uma visita real a um conjunto de seus [vassals|lE] para colher recompensas como [gold|lE], [dread|lE], [opinion|lE], [control|lE] e [cultural_acceptance|lE]."
 game_concept_tours: "Viagens"
 game_concept_royal_tour: "Viagem Real"
 game_concept_royal_tours: "Viagens Reais"
 game_concept_grand_tour: "Grande Viagem"
 game_concept_grand_tours: "Grandes Viagens"
 game_concept_culture_festival: "Festival de Cultura"
 game_concept_cultural_festival_desc: "Uma [activity_phase|lE] durante um [royal_tour|lE] na qual se espera que um [vassal|lE] entretenha seu [liege|E], o que frequentemente resulta em aumento de [county_opinion|lE] e [cultural_acceptance|lE]."
 game_concept_cultural_festival: "Festival Cultural"
 game_concept_cultural_festivals: "Festivais Culturais"
 game_concept_culture_festivals: "Festivais de Cultura"
 game_concept_hosted_dinner: "Jantar Oférecido"
 game_concept_hosted_dinner_desc: "Uma [activity_phase|lE] durante um [royal_tour|lE] na qual se espera que um [vassal|lE] entretenha seu [liege|lE], o que frequentemente resulta em aumento de [hooks|lE] e [relations|lE] formados mutuamente."
 game_concept_hosted_dinners: "Jantares Oférecidos"
 game_concept_host_a_dinner: "Oferecer um Jantar"
 game_concept_tour_the_grounds: "Inspecionar as Terras"
 game_concept_tour_the_grounds_desc: "Uma [activity_phase|lE] durante um [royal_tour|lE] na qual um [vassal|lE] é visitado por seu [liege|lE], o que frequentemente resulta em aumento de [control|lE] em seus [counties|lE]."
 game_concept_touring_the_grounds: "Inspecionando as Terras"
 game_concept_tour_of_the_grounds: "Inspeção das Terras"
 game_concept_tour_grounds: "Inspecionar Terras"
 game_concept_tour_stop: "Parada da viagem"
 game_concept_tour_stop_desc: "Uma [activity_phase|lE] durante um [royal_tour|lE] na qual um suserano pode: participar de um [hosted_dinner|lE], [tour_the_grounds|lE] de seu [vassal|lE], ou aproveitar um [cultural_féstival|lE]."
 game_concept_stop: "Parada"
 game_concept_stops: "Paradas"
 game_concept_tour_stops: "Paradas da viagem"
 game_concept_tour_success: "Sucesso da viagem"
 game_concept_tour_success_desc: "Um valor que determina quais recompensas você receberá ao final de seu [grand_tour|lE]. Você pode ganhar e perder pontos ao selecionar certas opções no início de seu tour e tomar decisões que se alinhem ao seu [tour_type|lE]."
 game_concept_tour_success_points: "Pontos de sucesso da viagem"
 game_concept_tour_success_point: "Ponto de sucesso da viagem"
 game_concept_tour_type: "Tipo de viagem"
 game_concept_tour_type_desc: "Uma opção que determina que tipo de [tour|lE] você está realizando e quais recompensas obtém. Os tipos de tour incluem [majesty_tour|lE], [intimidation_tour|lE] e [taxation_tour|lE]."
 game_concept_majesty_tour: "Viagem de Majestade"
 game_concept_majesty_tour_desc: "Um [tour_type|lE] no qual você tenta influenciar seus [vassals|lE] aumentando a [opinion|lE] deles."
 game_concept_intimidation_tour: "Viagem de Intimidação"
 game_concept_intimidation_tour_desc: "Um [tour_type|lE] no qual você tenta intimidar seus [vassals|lE], ganhando [dread|lE] e forçando-os a sair de [factions|lE]."
 game_concept_taxation_tour: "Viagem de Tributação"
 game_concept_taxation_tour_desc: "Um [tour_type|lE] no qual você tenta extrair riqueza de seus [vassals|lE], ganhando [gold|lE]."
 game_concept_accolade: "Aclamação"
 game_concept_accolade_possessive: "da Aclamação"
 game_concept_accolades: "Aclamações"
 game_concept_acclaimed: "Aclamado"
 game_concept_accolade_desc: "As condecorações são honrarias concedidas aos [knights|El] por seu [liege|El].\n\nO cavaleiro que recebe uma condecoração se torna um [acclaimed_knight|El].\n\nÀ medida que este ganha [glory|El], aumenta a aptidão de seus [accolade_squires|El] (melhorando a [accolade_succession|El] ) e podem ser obtidos [accolade_ranks|El]. Isso permite desbloquear mais [accolade_types|El], oferecendo bônus mais fortes.\n\nQuando um Cavaleiro Aclamado morre, ocorre uma [accolade_succession|El] e o cavaleiro é imediatamente substituído por um sucessor cujas habilidades são modificadas pela aptidão dos [accolade_squires|El].\n\nAs [innovations|El] e os [title_tiers|El] mais altos permitem que os [rulers|El] tenham mais condecorações ao mesmo tempo."
 game_concept_acclaimed_knight: "Cavaleiro Aclamado"
 game_concept_acclaimed_knights: "Cavaleiros Aclamados"
 game_concept_acclaimed_knight_possessive: "do Cavaleiro aclamado"
 game_concept_acclaimed_knight_desc: "O [knight|El] que ostenta um [accolade|El].\n\nPara ser um Cavaleiro Aclamado, um cavaleiro deve [Concept( 'unlanded', 'não possuir terras' )|El] ou ser um [baron|El], com pelo menos [EmptyScope.ScriptValue('accolade_prowess_requirement_value')|0V] de [prowess|El]. Um Cavaleiro Aclamado deve ser elegível para pelo menos um [accolade_types|El], que não seja já possuído por outro dos Cavaleiros Aclamados de seu [liege|El].\n\nOs Cavaleiros Aclamados têm menos chance de serem mortos ou capturados em batalha. Eles podem melhorar sua [glory|El] principalmente lutando em [war|El] e participando de [activities|El] como o [GetActivityType( 'activity_tournament' ).GetName|l].\n\nOs Cavaleiros Aclamados podem ocasionalmente ganhar [skills|El] e [traits|El] relacionados aos Atributos de sua Distinção."
 game_concept_accolade_type: "Atributo da Aclamação"
 game_concept_accolade_types: "Atributos da Aclamação"
 game_concept_accolade_type_desc: "Um [accolade|El] tem até #value 3#! atributos que fornecem bônus que escalam à medida que seus níveis superiores são desbloqueados. Cada atributo tem #value 3#! níveis. Quando um atributo aumenta seu [accolade_rank|El], seu dono pode aumentar o nível de um atributo existente ou adicionar um novo atributo ao galardão. Porém, um [acclaimed_knight|El] deve satisfazer todos os requisitos do novo atributo.\n\nTodo [knight|El] só à elegível para certos atributos, que podem se basear em [traits|El], [skills|El] ou desbloqueios por experiência durante seu serviço como cavaleiro.\n\nTodo galardão deve ter atributos únicos: um senhor #high não pode#! duplicar atributos entre galardões. Além disso, cada galardão só pode se especializar em #value 1#! atributo de tipo de [men_at_arms|El]."
 game_concept_accolade_succession: "Sucessão da Aclamação"
 game_concept_accolade_succession_desc: "A sucessão da insígnia ocorre quando o [acclaimed_knight|El] de um [accolade|El] morre ou se torna inválido.\n\nO antigo Cavaleiro aclamado é substituído imediatamente. Os [courtiers|El] e [knights|El] jovens treinados devido à Aptidão dos [accolade_squires|El] da insígnia são os primeiros favorecidos como sucessores; depois, outros cavaleiros, outros cortesãos, andarilhos e, por fim, [characters|El] recém-criados. Com base na Aptidão dos [accolade_squires|El] da insígnia, o novo Cavaleiro receberá aumento em [Concept('prowess_skill', 'destreza')|E], [Concept('martial_skill', 'marcial')|E], [trait_level_track_xp|El] de [GetTrait('tourney_participant').GetName( GetNullCharacter )|l] e, possivelmente, outras [skills|El].\n\nApós a Sucessão da insígnia, uma pequena quantidade de [glory|El] pode ser perdida e a Aptidão dos Escudeiros da insígnia é reiniciada para refletir agora as habilidades e a experiência de seu novo Cavaleiro aclamado.\n\nA morte do Cavaleiro aclamado em batalha, em um duelo ou de outra maneira honrosa anulará a perda de Glória e melhorará os Escudeiros da insígnia."
 game_concept_accolade_rank: "Nível da Aclamação"
 game_concept_accolade_ranks: "Níveis da Aclamação"
 game_concept_accolade_rank_short: "Nível"
 game_concept_accolade_rank_desc: "Um [accolade|El] tem #value 6#! graus progressivos que permitem ao seu dono desbloquear e melhorar bônus de seus [accolade_types|El] como os [knight_army_modifiers|El].\n\nGanhar [glory|El] desbloqueia cada grau, enquanto perdê-la pode fazer com que eles sejam perdidos. Quando um galardão perder um grau, um nível de [accolade_type|El] será desativado. Recuperar o grau restaurará o atributo e seus bônus."
 game_concept_glory: "Glória"
 game_concept_glory_desc: "A glória de um [accolade|El] aumenta seu [accolade_rank|El].\n\nUm [acclaimed_knight|El] consegue glória ao vencer [battles|El], derrotando guerreiros, competindo em [contests|lE] de [GetActivityType( 'activity_tournament' ).GetName|l] e participando de [activities|El].\n\nNo entanto, a glória da condecoração é reduzida quando o cavaleiro aclamado participa de batalhas perdidas e também pode diminuir na [accolade_succession|El] se o cavaleiro aclamado não morrer em combate, em um duelo ou de alguma outra forma honrosa."
 game_concept_accolade_squires: "Escudeiros"
 game_concept_accolade_squire: "Escudeiro"
 game_concept_accolade_squires_desc: "Todo [accolade|El] tem um marcador de Aptidão de Escudeiros que modifica os [traits|El] e [skills|El] (principalmente a [Concept('prowess_skill', 'destreza')|E], a [Concept('martial_skill', 'marcial')|E] e a [trait_level_track_xp|El] de [GetTrait('tourney_participant').GetName( GetNullCharacter )|l]) do seu próximo [acclaimed_knight|El].\n\nHá 5 níveis de Aptidão para Escudeiros:\n$EFFECT_LIST_BULLET$Realizado\n$EFFECT_LIST_BULLET$Capaz\n$EFFECT_LIST_BULLET$Inexperiente\n$EFFECT_LIST_BULLET$Fraco\n$EFFECT_LIST_BULLET$Patético\n\nTer uma Aptidão de Inexperiente ou superior fará com que o Cavaleiro Aclamado influencie esporadicamente os [traits|El] e [skills|El] de jovens [courtiers|El] de gênero marcial, concedendo-lhes prioridade para assumir a Insígnia na hora da [Concept('accolade_succession', 'sucessão')|E]\n\nOs Escudeiros são aprimorados principalmente pelo ganho de [glory|El], mas também:\n$EFFECT_LIST_BULLET$A [prowess_skill|El] do Cavaleiro Aclamado\n$EFFECT_LIST_BULLET$A [martial_skill|El] do Cavaleiro Aclamado\n$EFFECT_LIST_BULLET$Que o Cavaleiro Aclamado ganhe [trait_level_track_xp|El] [GetTrait('tourney_participant').GetName( GetNullCharacter )]\n$EFFECT_LIST_BULLET$Que o Cavaleiro Aclamado ganhe [trait_level_track_xp|El] de [GetTrait('lifestyle_blademaster').GetName( GetNullCharacter )|l]\n$EFFECT_LIST_BULLET$A [martial_skill|El] do [liege|El] da Insígnia\n$EFFECT_LIST_BULLET$A [Concept('prowess_skill', 'destreza')|E] do [liege|El] da Insígnia\n\nCada [accolade_succession|El] redefine os Escudeiros da Insígnia."
 game_concept_tax_collector: "Coletor de Impostos"
 game_concept_tax_collector_desc: "Um $game_concept_tax_collector$ permite que [tax_jurisdictions|lE] funcionem.\n\nSua [aptitude|lE] determina a quantidade de [taxes|lE] e [levies|lE] que ele coleta para seu [liege|lE]."
 game_concept_tax_collectors: "Coletores de Impostos"
 game_concept_tax_decree: "Decreto Fiscal"
 game_concept_tax_decree_desc: "Cada [tax_jurisdiction|lE] pode ter um $game_concept_tax_decree$ diferente, modificando os [taxes|lE] e as [levies|lE] contribuídas por seus [taxpayers|lE].\n\n$game_concept_tax_decrees$ frequentemente alteram as [obligations|lE] em troca de outra penalidade ou benefício."
 game_concept_tax_decrees: "Decretos Fiscais"
 game_concept_tax_jurisdiction: "Jurisdição Fiscal"
 game_concept_tax_jurisdictions: "Jurisdições Fiscais"
 game_concept_tax_jurisdiction_desc: "Uma $game_concept_tax_jurisdiction$ é um grupo de [taxpayers|lE] composto por [vassals|lE] de [clan|lE]. Cada jurisdição comporta até #V 12#! $game_concept_taxpayers$.\n\nCada $game_concept_tax_jurisdiction$ pode ter um [tax_decree|lE].\n\nO número de $game_concept_tax_jurisdictions$ disponíveis é determinado por [rank|lE], [traditions|lE] e [innovations|lE].\n\nToda $game_concept_tax_jurisdiction$ exige que um [tax_collector|lE] seja nomeado."
 game_concept_untaxed_jurisdiction: "Jurisdição Não Tributável"
 game_concept_untaxed_jurisdictions: "Jurisdições Não Tributáveis"
 game_concept_untaxed_jurisdiction_short: "Sem Tributação"
 game_concept_untaxed_jurisdiction_desc: "Uma $game_concept_untaxed_jurisdiction$ é uma [tax_jurisdiction|lE] com [taxpayers|lE], mas sem um [tax_collector|lE]. Isso significa que os $game_concept_taxpayers$ atribuídos não fornecerão [taxes|lE] nem [levies|lE] ao seu [liege|lE]."
 game_concept_taxpayer: "Contribuinte"
 game_concept_taxpayers: "Contribuintes"
 game_concept_taxpayer_desc: "Os $game_concept_taxpayers$ são [vassals|lE] do clã [clan|lE] designados a uma [tax_jurisdiction|lE] que contribuirão mensalmente com renda de [taxes|lE] e [levies|lE] enquanto houver um [tax_collector|lE]."
 game_concept_taxpayer_i: "@tax_collector_icon!"
 game_concept_unassigned_vassal: "Vassalos Sem Tributação"
 game_concept_unassigned_vassals: "Vassalos Sem Tributação"
 game_concept_unassigned_vassal_short: "Sem Tributação"
 game_concept_unassigned_vassal_desc: "$game_concept_unassigned_vassals$ são [clan|lE] [vassals|lE] que não foram atribuídos a uma [tax_jurisdiction|lE] como [taxpayers|lE] e, portanto, não contribuem com [taxes|lE] nem [levies|lE].\n\nDepois de atribuídos a uma $game_concept_tax_jurisdiction$ com um [tax_collector|lE], eles começarão a pagar mensalmente."
 game_concept_retinue_maa: "Homens de Armas de Retinua"
 game_concept_retinue_maa_desc: "Alguns [accolade_types|El] concedem acesso a [men_at_arms|El] especiais. Eles são desbloqueados ao ter um [acclaimed_knight|El] que tenha progredido na [trait_level_track|El] relevante como [GetTrait('tourney_participant').GetName( GetNullCharacter )|l] ou que possua o [commander_trait|El] pertinente.\n\nAs tropas de retinua estão restritas a um [regiment|El]. Elas são duas vezes mais eficazes ao neutralizar outras tropas de armamento e melhoram a cada era que passa."
 game_concept_knight_army_modifier: "Modificador de Exército do Cavaleiro"
 game_concept_knight_army_modifiers: "Modificadores de Exército do Cavaleiro"
 game_concept_knight_army_modifier_desc: "Um efeito aplicado a qualquer [army|El] que #high contenha#! o [acclaimed_knight|El] relevante.\n\nO [knight|El] #high não precisa#! ser o [commander|El] do Exército para que seu Modificador de Exército do Cavaleiro se aplique."
 game_concept_piety_level_impact: "Impacto do Nível de Devoção"
 game_concept_piety_level_impact_desc: "O Impacto do Nível de Devoção aumenta ou reduz os [modifiers|El] obtidos do seu [piety_level|El] atual."
 game_concept_prestige_level_impact: "Impacto do Nível de Fama"
 game_concept_prestige_level_impact_desc: "O Impacto do Nível de Fama aumenta ou reduz os [modifiers|El] obtidos do seu [prestige_level|El] atual."
 game_concept_hostage: "Refém"
 game_concept_hostages: "Reféns"
 game_concept_hostages_possessive: "do Refém"
 game_concept_hostage_desc: "Um [close_family_member|El] de um [ruler|El], enviado para longe de sua [Concept('home_court', 'corte de origem')|E] como garantia de paz ou submissão.\n\nA reputação dos $game_concept_rulers$ que declarem a [war|lE] apesar de terem enviado ou recebido um $game_concept_hostage$ será gravemente prejudicada, e os $game_concept_wardens$ poderão executar livremente os $game_concept_hostages$ de seus inimigos.\n\nÉ provável que os $game_concept_hostages$ bem tratados se tornem leais ao seu $game_concept_warden$, que pode ganhar um [hook|lE] ou até se tornar [Concept( 'friend', 'amigo dele' )|E].\n\nOs $game_concept_hostages$ devem ser filhos, irmãos, sobrinhos ou netos sem terras do $game_concept_ruler$ de sua corte de origem.\n\nOs $game_concept_wardens$ têm chance de ganhar um [perpetual_hook|lE] sobre um $game_concept_hostage$ criança quando atingirem a maioridade, com base na personalidade, opinião e anos passados na corte dos $game_concept_wardens$."
 game_concept_home_court: "Corte de Origem"
 game_concept_home_courts: "Cortes de Origem"
 game_concept_home_courts_possessive: "da Corte de Origem"
 game_concept_home_court_desc: "Um [ruler|lE] que é [close_family_member|lE] de um [hostage|lE] e o enviou a um [warden|lE] como garantia de paz ou submissão."
 game_concept_warden: "Guardião"
 game_concept_wardens: "Guardiões"
 game_concept_wardens_possessive: "do Guardião"
 game_concept_warden_desc: "Um [ruler|lE] a quem um [hostage|lE] foi enviado por uma [home_court|lE] estrangeira como garantia de paz ou submissão.\n\nUm [warden|lE] acumulará [prestige_i|E][prestige|lE] ao longo do tempo para cada [hostage|lE] em sua [court|lE]."
 game_concept_goliardic_shenanigans: "Travessuras Goliárdicas"
 game_concept_goliardic_shenanigans_desc: "Um personagem em [GetActivityType('activity_adult_education').GetName|l] pode se meter em todo tipo de travessura ao abraçar a vida de estudante. As consequências de suas aventuras são imprevisíveis e incluem pontos de [skill|lE], [traits|El] de estilo de vida e estresse, experiência de estilo de vida, doenças e ferimentos."
 game_concept_adoption: "Adoção"
 game_concept_adopt: "Adotar"
 game_concept_adopts: "Adota"
 game_concept_adopting: "Adotando"
 game_concept_adopted: "Adotado"
 game_concept_adoption_desc: "A adoção é o ato de trazer outro [character|El] para sua [house|El] e [dynasty|El]."
 game_concept_legitimacy: "Legitimidade"
 game_concept_legitimacy_desc: "A $game_concept_legitimacy$ é a representação do direito de reinar de um [ruler|lE]. Os [vassals|lE] também geram [legitimacy_expectations|lE] que o [liege|lE] deve atender.\n\nApenas os [rulers|lE] têm $game_concept_legitimacy$, que é calculada no momento em que se tornam governantes e resulta em sua [initial_legitimacy|lE]. O [heir|lE] do governante anterior também herda uma parte de sua $game_concept_legitimacy$.\n\nA $game_concept_legitimacy$ afeta muitos dos sistemas do jogo, tornando propostas de [marriage|lE], [vassalization|lE] e [alliances|lE] mais propensas a serem aceitas, além de deixar os [claims|lE] mais baratos e influenciar as [scales_of_power|lE] em uma [regency|lE].\n\nA $game_concept_legitimacy$ normalmente tem cinco [legitimacy_levels|lE] e um nível inferior: #weak Ilegítimo#!.[AddLocalizationIf( GetPlayer.GetGovernment.HasGovernmentFlag( 'government_is_nomadic' ), 'game_concept_legitimacy_desc_nomadic' )][AddLocalizationIf( GetPlayer.GetGovernment.HasGovernmentFlag( 'government_is_mandala' ), 'game_concept_legitimacy_desc_mandala' )]"
 game_concept_legitimacy_i: "[GetLocalPlayerLegitimacyTextIcon]"
 game_concept_legitimacy_desc_nomadic: "\n\nOs [rulers|El] de governo [GetGovernment( 'nomad_government' ).GetName|l] têm um tipo especial de $game_concept_legitimacy$, independente de sua [rank|El]."
 game_concept_legitimacy_desc_mandala: "\n\nOs [rulers|El] de governo [GetGovernment( 'mandala_government' ).GetName|l] têm um tipo especial de $game_concept_legitimacy$, independente de sua [rank|El] e com níveis adicionais."
 game_concept_legitimacy_level: "Nível de Legitimidade"
 game_concept_legitimacy_level_desc: "Pode-se ganhar $game_concept_legitimacy_levels$ de várias maneiras: vencendo [wars|lE], libertando [valuable_prisoners|lE], criando [legends|lE], realizando [court|lE] ou participando de [activities|lE].\n\nNo entanto, também podem ser perdidos. Alguns dos principais meios de reduzir a $game_concept_legitimacy$ são: [epidemics|lE] devastando a [capital|lE], derrotas em guerras (especialmente guerras de [Concept('faction', 'facções' )|E]), perda de [titles|lE] ou a descoberta de uma [hostile_scheme|lE].[AddLocalizationIf( GetPlayer.GetGovernment.HasGovernmentFlag( 'government_is_nomadic' ), 'game_concept_legitimacy_level_desc_nomadic' )]"
 game_concept_legitimacy_levels: "Níveis de Legitimidade"
 game_concept_legitimacy_gain: "Ganho de Legitimidade"
 game_concept_legitimacy_level_desc_nomadic: "\n\nGovernantes de [GetGovernment( 'nomad_government' ).GetName|l] obtêm #V 50 %#! a mais de Legitimidade ao vencer guerras, mas também perdem o dobro ao serem derrotados. Eles também ganharão Legitimidade com os [single_combat_duel_plural|lE] e ao se casar com [courtiers|lE] nobres, ou com alguém com uma [dominance|lE] semelhante ou superior."
 game_concept_expected_legitimacy: "Legitimidade Esperada"
 game_concept_expected_legitimacy_desc: "O [legitimacy_level|lE] que os [vassals|lE] esperam de seu [ruler|lE], com base em seu relacionamento histórico. Alguns fatores que reduzem as Expectativas são:\n$BULLET_WITH_TAB$Ser o [liege|lE] [de_jure|lE] do vassalo\n$BULLET_WITH_TAB$Ser [Concept( 'close_family', 'familiar cercano' )|E] do vassalo\n$BULLET_WITH_TAB$Ser o [preférred_heir|lE] do vassalo\n$BULLET_WITH_TAB$Ser da mesma [dynasty|lE] a que o vassalo serviu por mais de #color_white 50#! anos\n$BULLET_WITH_TAB$O vassalo não é [powerful_vassal|lE]\n\nSe o nível real estiver abaixo de suas Expectativas, os vassalos podem se tornar indisciplinados: sua [opinion|lE] será menor e poderão se unir a [factions|lE] contra seu [liege|lE].\n\nAs Expectativas aumentam com o nível de seu [primary_title|lE], assim como com a [era|lE]."
 game_concept_legitimacy_expectations: "Expectativas de Legitimidade"
 game_concept_legitimacy_expectations_desc: "$game_concept_expected_legitimacy_desc$"
 game_concept_initial_legitimacy: "Legitimidade Inicial"
 game_concept_initial_legitimacy_desc: "A $game_concept_legitimacy$ que um [character|lE] tem ao receber terras.\n\nÉ calculada com base em seu [dynasty_prestige_level|lE], relação com seu predecessor, [court_grandeur|lE], gênero, [bastardy|lE], anos como [ruler|lE], a [dynasty_perk|lE] de [legitimacy|lE], [diplomacy|lE], [virtues|lE],[sins|lE], e outros [traits|lE] especiais, como [GetTrait('sayyid').GetName( GetNullCharacter )|l], [GetTrait('diplomat').GetName( GetNullCharacter )|l] e [GetTrait('just').GetName( GetNullCharacter )|l].\n\nOs [heirs|lE] receberão um [GetDefine( 'NCharacter', 'LEGITIMACY_INHERITED' )|V%^] da $game_concept_legitimacy$ do governante anterior se herdarem um [title|lE] de [title_tier|lE] superior."
 game_concept_court_position_task_short: "Tarefa"
 game_concept_court_position_task_short_desc: "$game_concept_court_position_task_desc$"
 game_concept_court_position_tasks_short: "Tarefas"
 game_concept_court_position_tasks_short_desc: "$game_concept_court_position_task_desc$"
 game_concept_court_position_task: "Tarefa de Cargo da Corte"
 game_concept_court_position_tasks: "Tarefas de Cargo da Corte"
 game_concept_court_position_tasks_desc: "$game_concept_court_position_task_desc$"
 game_concept_court_position_task_desc: "Alguns [court_positions|lE] podem realizar uma tarefa adicional, frequentemente concedendo mais benefícios a um custo extra.\n\nApenas uma tarefa pode estar ativa por vez para cada [court_position|lE]."
 game_concept_fatalities: "Fatalidades"
 game_concept_fatalities_desc: "[characters|E] que pereceram como resultado direto de uma [epidemic|lE] ou [natural_disaster|lE]."
 game_concept_funeral: "Funeral"
 game_concept_funeral_desc: "Uma [activity|lE] em que um [host|lE] convida vários [characters|lE] para prestar suas homenagens após uma [character_death|lE] recente. Funerais frequentemente resultam em aumentos de [legitimacy|lE], reduções de [stress|lE] e oportunidades de demonstrar [piety|lE]."
 game_concept_funerals: "Funerais"
 game_concept_scheme_group_calculating: "Calculista"
 game_concept_calculating_schemes: "Esquemas Calculistas"
 game_concept_scheme_group_calculating_desc: "As $game_concept_calculating_schemes$ envolvem ações premeditadas, geralmente com um incidente final em que os conspiradores atacam.\n\nA melhor maneira de frustrá-las é por meio de $game_concept_scheme_countermeasure_countermeasures$ armadas como #V $scheme_countermeasure_type_redouble_guards$#!.\n\nAlguns exemplos incluem:\n$EFFECT_LIST_BULLET$[GetScheme('abduct').GetTypeName]\n$EFFECT_LIST_BULLET$[GetScheme('murder').GetTypeName]\n$EFFECT_LIST_BULLET$[GetScheme('overthrow_regent').GetTypeName]\n$EFFECT_LIST_BULLET$[GetScheme('steal_back_artifact').GetTypeName]"
 game_concept_scheme_group_opportunistic: "Oportunista"
 game_concept_opportunistic_schemes: "Esquemas Oportunistas"
 game_concept_scheme_group_opportunistic_desc: "As $game_concept_opportunistic_schemes$ envolvem ações improvisadas e repetidas entre [characters|lE] que se reúnem de modo informal.\n\nA melhor maneira de frustrá-las é por meio de $game_concept_scheme_countermeasure_countermeasures$ vigilantes como #V $scheme_countermeasure_type_strengthen_sentries$#!.\n\nAlguns exemplos incluem:\n$EFFECT_LIST_BULLET$[GetScheme('seduce').GetTypeName]\n$EFFECT_LIST_BULLET$[GetScheme('befriend').GetTypeName]\n$EFFECT_LIST_BULLET$[GetScheme('convert_to_witchcraft').GetTypeName]\n$EFFECT_LIST_BULLET$[GetScheme('courting').GetTypeName]\n$EFFECT_LIST_BULLET$[GetScheme('elope').GetTypeName]"
 game_concept_scheme_group_indirect: "Indireto"
 game_concept_indirect_schemes: "Esquemas Indiretos"
 game_concept_scheme_group_indirect_desc: "As $game_concept_indirect_schemes$ geralmente não precisam interagir pessoalmente com seu [scheme_target|lE].\n\nPor isso não podem ser contrabalançadas com eficácia, mas algumas $game_concept_scheme_countermeasure_countermeasures$ podem piorá-las.\n\nAlguns exemplos incluem:\n$EFFECT_LIST_BULLET$[GetScheme('claim_throne').GetTypeName]\n$EFFECT_LIST_BULLET$[GetScheme('fabricate_hook').GetTypeName]"
 game_concept_scheme_opportunity: "Vantagem de Esquema"
 game_concept_scheme_opportunities: "Vantagens de Esquema"
 game_concept_scheme_opportunity_opportunity: "Vantagem"
 game_concept_scheme_opportunity_opportunities: "Vantagens"
 game_concept_scheme_opportunity_i: "@scheme_opportunity_icon!"
 game_concept_scheme_opportunity_desc: "$game_concept_scheme_opportunity_opportunities$ representam o progresso feito em direção ao objetivo de um [scheme|lE]. Elas podem ser gastas para convencer [agents|lE] a se juntarem a um $game_concept_scheme$ ou para executar um com [success_chance|lE] aumentada."
 game_concept_favorite_child: "Filho Favorito"
 game_concept_favorite_child_desc: "Um $game_concept_favorite_child$ é um descendente direto da mesma [dynasty|lE] que um governante do Jogador pode escolher favorecer. Eles terão uma [opinion|lE] maior sobre você e, quando você morrer, poderá escolher continuar seu legado como eles, em vez de seu herdeiro.\n\nSeu filho favorito pode ser qualquer filho, neto ou bisneto, desde que esteja em sua dinastia."
 game_concept_scheme_breach_short: "Brecha"
 game_concept_scheme_breaches_short: "Brechas"
 game_concept_scheme_breach: "Brecha de esquema"
 game_concept_scheme_breaches: "Brechas de esquema"
 game_concept_scheme_breach_desc: "Uma $game_concept_scheme_breach_short$ representa uma complicação em um [secret_scheme|lE]. Quando um [scheme|lE] é violado, sua [success_chance|lE] é reduzida. A penalidade para $game_concept_success_chance$ aumenta para cada $game_concept_scheme_breach_short$ cumulativa. Quando um $game_concept_scheme$ atingir #V 5#! $game_concept_scheme_breaches_short$, ele falhará automaticamente.\n\n#WEAK $game_concept_schemes$ também verificam sua $game_concept_secrecy$ quando são finalmente executados — violações não têm efeito sobre isso de uma forma ou de outra.#!"
 game_concept_influence_ward_personality: "Influenciar a Personalidade do Pupilo"
 game_concept_influence_ward_personality_desc: "Uma [interaction|lE] em que se pode tentar influenciar um [ward|lE] para que escolha um [personality_trait|lE] afim ao próprio."
 game_concept_faction_commitment: "Comprometimento com Facção"
 game_concept_faction_commitment_desc: "A probabilidade de um [character|lE] apoiar uma [faction|lE] contra seu [liege|lE].\n\nIsso pode ser afetado por uma multitude de razões, sendo as mais comuns [personality|lE], [opinion|lE] e [culture|lE]."
 game_concept_state_faith: "Fé Estatal"
 game_concept_state_faith_desc: "$game_concept_state_faith$ é a [faith|lE] apoiada e sancionada por um [administrative_government|lE]. Essa fé está vinculada ao [title|lE] e não a qualquer [character|lE] específico. É mais fácil converter personagens no [realm|lE] para a fé estatal e muito difícil convertê-los para longe dela.\n\nApenas o [ruler|lE] de um Reino Administrativo pode mudar a Fé Estatal, mas [governors|lE] podem se converter livremente a ela."
 game_concept_story_cycle: "História"
 game_concept_story_cycles: "Histórias"
 game_concept_story_cycle_desc: "Uma História é uma situação pessoal vinculada a um [ruler|El].\n\nHá muitos tipos de Histórias — desde possuir um [GetModifier('dog_story_modifier').GetNameWithTooltip|l] até se tornar um #V [GetTrait('conqueror').GetName( GetNullCharacter )|l]#!. Cada uma é construída a partir de diferentes elementos, normalmente envolvendo os principais [characters|El] , [titles|El] ou [decisions|El]."
 game_concept_story_generic_prefix: "A História de"
 game_concept_story_generic_desc_boilerplate: "#WEAK O conteúdo de história é opcional. Você sempre pode optar por não usá-lo depois de começar a jogar."
 game_concept_story_content_hereward: "$game_concept_story_generic_prefix$ $bookmark_laamps_hereweard_the_wake$"
 game_concept_story_content_hereward_desc: "#tooltip_heading Estilo de história: extenso#!\n\nComo Hereward, seu exílio no exterior será breve. Com a Inglaterra sob o jugo estrangeiro, você retornará para casa para lutar pela liberdade, limpar seu nome e matar normandos.\n\nHaverá uma mecúnica especial durante sua duração que reflita a resistência inglesa ao dománio normando e eventos de história roteirizados ocorrerão durante isso. Sua história terminará em morte: a sua ou a de seu inimigo.\n\n$game_concept_story_generic_desc_boilerplate$"
 game_concept_story_content_el_cid: "$game_concept_story_generic_prefix$ $bookmark_laamps_el_cid$"
 game_concept_story_content_el_cid_desc: "#tooltip_heading Estilo de história: leve#!\n\nComo O Cid, seu suserano o desterrará injustamente. No exílio, você poderá optar por permanecer leal ou forjar seu próprio caminho que culmine com um retorno à corte #EMP ou#! o prêmio definitivo: Valência.\n\n$game_concept_story_generic_desc_boilerplate$"
 game_concept_story_content_wallada: "$game_concept_story_generic_prefix$ $bookmark_laamps_wallada_bint_al_mustakfi$"
 game_concept_story_content_wallada_desc: "#tooltip_heading Estilo de história: moderado#!\n\nComo Wallada, você elevará o nível do indicado [GetTrait('violet_poet').GetName( GetNullCharacter )] ao escrever poemas e fundar salões líricos por todo o mundo, aprimorando um tomo único ao longo da jornada.\n\nA conclusão da sua história será tão dramática quanto você quiser que seja, mas, apesar de não ter descendência, serão oferecidas maneiras de continuar jogando.\n\n$game_concept_story_generic_desc_boilerplate$"
 game_concept_story_content_hasan: "$game_concept_story_generic_prefix$ $bookmark_laamps_hassan_sabbah$"
 game_concept_story_content_hasan_desc: "#tooltip_heading Estilo de história: moderado#!\n\nComo Hasan, você será conduzido por um caminho de fanatismo religioso e escolherá um lugar para trazer à luz a Fé Verdadeira e converter [counties|lE] para separá-los de seus [rulers|lE].\n\nAo final, sua história culminará em uma grande revolta religiosa contra o inimigo que você tenha escolhido.\n\n$game_concept_story_generic_desc_boilerplate$"
 game_concept_harrying_widget_i: "@harrying_widget!"
 game_concept_harrying_widget: "@harrying_widget! Devastação do Norte"
 game_concept_harrying_widget_desc: "Os governantes normandos e os nobres anglo-saxões recentemente depostos estão em uma batalha féroz pelo controle da Inglaterra. Tal disputa não terminará até que um ou ambos os grupos tenham sido totalmente removidos do poder.\n\nÀ medida que a situação progride, as ações deles e de outros personagens afetarão os níveis de [harrying_resistance|lE] e [harrying_pacification|lE] da região.\n\n#TS Uma #EMP resistencia#! mais alta levará a:#!\n$EFFECT_LIST_BULLET$Menor [cultural_acceptance|lE]\n$EFFECT_LIST_BULLET$Menor [county_control|lE]\n$EFFECT_LIST_BULLET$Maior chance de [claimant_factions|lE] ou até mesmo uma [civil_war|lE].\n\n#TS Uma #EMP pacificación#! mais alta levará a:#!\n$EFFECT_LIST_BULLET$Maior [cultural_acceptance|lE]\n$EFFECT_LIST_BULLET$Aumento de [dread|lE] para o governante da Inglaterra\n$EFFECT_LIST_BULLET$Acesso à [decision|lE] $embrace_english_culture_decision$."
 game_concept_harrying_resistance: "Resistência"
 game_concept_harrying_resistance_desc: "A resistência mede a oposição contínua ao domínio normando na Inglaterra por parte da população anglo-saxã já existente. Se a resistência estiver #BOL superior#! maior que a [harrying_pacification|lE] ela concede efeitos nos seguintes níveis:\n\n#S Resistência acima de #V 7#!#!\n$EFFECT_LIST_BULLET$[cultural_acceptance|E] anglo-saxã/normanda: [EmptyScope.ScriptValue('miniscule_cultural_acceptance_loss')|0V] por mês\n\n#S Resistência acima de #V 10#!#!\n$EFFECT_LIST_BULLET$[cultural_acceptance|E] anglo-saxã/normanda: [EmptyScope.ScriptValue('minor_cultural_acceptance_loss')|0V] por mês\n$EFFECT_LIST_BULLET$Aumenta levemente a chance de [claimant_factions|lE] contra o governante da Inglaterra\n\n#S Resistência acima de #V 13#!#!\n$EFFECT_LIST_BULLET$[cultural_acceptance|E] anglo-saxã/normanda: [EmptyScope.ScriptValue('medium_cultural_acceptance_loss')|0V] por mês\n$EFFECT_LIST_BULLET$Aumenta um pouco a chance de [claimant_factions|lE] contra o governante da Inglaterra\n$EFFECT_LIST_BULLET$A redução de [county_control|lE] em todos os [counties|lE] é de [EmptyScope.ScriptValue('minor_discontent_loss')|0V] a cada #V 3#! meses para cada [vassal|lE] da Inglaterra\n\n#S Resistência acima de #V 16#!#!\n$EFFECT_LIST_BULLET$[cultural_acceptance|E] anglo-saxã/normanda: [EmptyScope.ScriptValue('major_cultural_acceptance_loss')|0V] por mês\n$EFFECT_LIST_BULLET$Aumenta muito a chance de [claimant_factions|lE] contra o governante da Inglaterra\n$EFFECT_LIST_BULLET$A redução de [county_control|lE] em todos os [counties|lE] é de [EmptyScope.ScriptValue('medium_discontent_loss')|0V] a cada #V 3#! meses para cada [vassal|lE] da Inglaterra"
 game_concept_harrying_pacification: "Pacificação"
 game_concept_harrying_pacification_desc: "Pacificação mede a eficácia dos novos governantes normandos da Inglaterra em subjugar a ressentida população anglo-saxã. Se for considerado que a pacificação está #BOL superior#! acima de [harrying_resistance|lE], ela concede efeitos nos seguintes níveis:\n\n#S Pacificação acima de #V 5#!#!\n$EFFECT_LIST_BULLET$[cultural_acceptance|E] anglo-saxônica/normanda: +[EmptyScope.ScriptValue('miniscule_cultural_acceptance_gain')|0V] por mês\n\n#S Pacificação acima de #V 8#!#!\n$EFFECT_LIST_BULLET$[cultural_acceptance|E] anglo-saxônica/normanda: +[EmptyScope.ScriptValue('minor_cultural_acceptance_gain')|0V] por mês\n$EFFECT_LIST_BULLET$Adiciona #V 1#! de [dread|lE] [dread_i] ao governante da Inglaterra por mês\n\n#S Pacificação acima de #V 11#!#!\n$EFFECT_LIST_BULLET$[cultural_acceptance|E] anglo-saxônica/normanda: +[EmptyScope.ScriptValue('medium_cultural_acceptance_gain')|0V] por mês\n$EFFECT_LIST_BULLET$Adiciona #V 2#! de [dread|lE] [dread_i] ao governante da Inglaterra por mês\n\n#S Pacificação acima de #V 14#!#!\n$EFFECT_LIST_BULLET$[cultural_acceptance|E] anglo-saxônica/normanda: +[EmptyScope.ScriptValue('major_cultural_acceptance_gain')|0V] por mês\n$EFFECT_LIST_BULLET$Adiciona #V 3#! de [dread|lE] [dread_i] ao governante da Inglaterra por mês\n$EFFECT_LIST_BULLET$Ativa a [decision|lE] #V $embrace_english_culture_decision$#!"
 game_concept_game_rule_extreme_i: "@warning_icon!"
 game_concept_game_rule_extreme: "Regra de Jogo Extrema"
 game_concept_game_rule_extreme_desc: "Esta Regra de Jogo torna o jogo #bold significativamente#! mais difícil."
 game_concept_game_rule_unique_i: "@alert_icon!"
 game_concept_game_rule_unique: "Regra de Jogo Única"
 game_concept_game_rule_unique_desc: "Esta Regra de Jogo altera #bold significativamente#! a experiência de jogo."
 ### BP3
 game_concept_swing_scales_of_power: "$swing_scales_currency_interaction$"
 game_concept_swing_scales_of_power_interaction: "$game_concept_swing_scales_of_power$"
 game_concept_swing_scales_of_power_desc: "Ao custo de [prestige|lE], [piety|lE] ou [gold|lE], um [liege|lE] ou um [diarch|lE] pode mover as [scales_of_power|lE] a seu favor."
 game_concept_destination: "Destino"
 game_concept_travel_destination: "Destino de Viagem"
 game_concept_destination_desc: "O Destino é o objetivo enquanto se [Concept( 'traveling', 'viaja' )|E], ou um de vários objetivos. No caso de uma [pilgrimage|lE], seria o [holy_site|lE] ao qual se viaja, enquanto que para uma [tour|lE], todo [vassal|lE] ao qual se visite será considerado um Destino."
 game_concept_roaming_longer_length_travel: "Caminhada Longa"
 game_concept_roaming_longer_length_travel_desc: "Caminhada Longa é uma [activity_option|lE] da [activity|lE] [GetActivityType('activity_roaming').GetName|l]. O personagem passará um tempo significativamente maior na atividade e receberá mais oportunidades."
 game_concept_inspection_success_chance: "Chance de Sucesso da Inspeção"
 game_concept_inspection_success_chance_no_prefix: "Chance de Sucesso"
 game_concept_inspection_success_chance_desc: "O sucesso não é garantido ao realizar uma [inspection|lE]. Os principais fatores que afetam essas chances são:\n$BULLET_WITH_TAB$@skill_learning_icon![skills|E]\n$BULLET_WITH_TAB$@control_icon![county_control|E]\n$BULLET_WITH_TAB$@county_icon!Ter fronteira com um [realm|lE] estrangeiro\n\nA probabilidade de sucesso da inspeção jamais poderá ser maior que #bold 95#!."
 game_concept_inspection: "Inspeção"
 game_concept_inspections: "Inspeções"
 game_concept_inspection_i: "@activity_inspection!"
 game_concept_inspection_desc: "Uma atividade em que o [liege|lE] viaja até um [county|lE] no [realm|lE] para supervisionar os magnatas e nobres locais.\n\nEles terão oportunidades em uma das seguintes áreas de foco: $rewards_inspection_tt$"
 game_concept_skill_challenges: "Desafios de Perícia"
 game_concept_skill_challenges_no_prefix: "Desafios"
 game_concept_skill_challenges_desc: "Desafios de perícia são momentos em que um personagem tem a chance de usar uma de suas [skills|lE] para afetar o resultado de um evento. Quanto maior a perícia, ou as perícias, mais provável será que o personagem consiga o que deseja ou que um resultado benéfico aconteça."
 game_concept_hike: "Caminhada"
 game_concept_hike_i: "@activity_hike!"
 game_concept_hike_desc: "Parta em uma expedição solitária para fazer uma pausa da pressão da vida cortesã.\n\nRecompensas previstas:\n$activity_roaming_host_desc$"
 game_concept_monument_expedition: "Expedição a Monumento"
 game_concept_monument_expedition_i: "@activity_monument_expedition!"
 game_concept_monument_expedition_desc: "Uma atividade em que um personagem escolhe viajar até um monumento ou marco famoso para se aprimorar, aprofundando-se em sua história, conhecimento e mistérios.\n\nRecompensas previstas:\n	$BULLET_WITH_TAB$Pontos de [skill|lE] de [intrigue_i|E][diplomacy_i|E][martial_i|E][learning_i|E][stewardship_i|E]\n$BULLET_WITH_TAB$[court_positions|E] [court_position_i] com [aptitude|lE] excelente\n$BULLET_WITH_TAB$[prestige|E] [prestige_i|E]"
 game_concept_designated_terrain: "Terreno Designado"
 game_concept_designated_terrain_desc: "Uma [decision|lE] que é desbloqueada na árvore de [wanderer_lifestyle|lE], em que você pode escolher um grupo de [terrains|lE] para se especializar. Alguns [perks|lE] fornecerão diferentes benefícios ao grupo de terrenos escolhido.\n\nGrupos de terrenos entre os quais se pode escolher:\n$BULLET_WITH_TAB$Florestas @forest!/Selvas @jungle!/Taiga @taiga!/Pântanos @wetlands!\n$BULLET_WITH_TAB$Montanhas @mountains!/Colinas @hills!/Montanhas desérticas @desert_mountains!\n$BULLET_WITH_TAB$Planícies @plains!/Estepe @steppe!/Terras agrícolas @farmlands!/Planícies aluviais @floodplains!\n$BULLET_WITH_TAB$Desertos @desert!/Terras áridas @drylands!/Oásis @oasis!"
 game_concept_master_terrain: "Terreno Mestre"
 game_concept_master_terrain_desc: "Uma [decision|lE] que é desbloqueada na árvore de [wanderer_lifestyle|lE], com a qual você pode escolher um grupo de [terrains|lE] para se especializar, com base no grupo escolhido como [designated_terrain|lE].\n\nEsta decisão concederá bônus significativos para o terreno escolhido, dando benefícios como aumento da [advantage|lE] , melhor [combat_roll|lE], redução de [attrition|lE] e aumento da [prestige|lE] e da [prestige_experience|lE] em [battle|lE]."
 game_concept_story_content_temujin: "$game_concept_story_generic_prefix$ $bookmark_nomads_temujin$"
 game_concept_story_content_temujin_desc: "#tooltip_heading Estilo de história: leve#!\n\nComo Temájin, você buscará vingança contra a tribo rival que aprisionou seu cônjuge e testará a lealdade de seu vassalo e amigo mais próximo: Yamuja.\n\n$game_concept_story_generic_desc_boilerplate$"
 game_concept_story_content_jamukha: "$game_concept_story_generic_prefix$ $bookmark_nomads_temujin$"
 game_concept_story_content_jamukha_desc: "#tooltip_heading Estilo de história: leve#!\n\nComo Yamuja, você sempre viveu sob a longa sombra de Temájin, mas chegou a hora de provar seu próprio poder. Você permanecerá leal a ele ou cortarà sua garganta no escuro?\n\n$game_concept_story_generic_desc_boilerplate$"
 game_concept_wanua: "Wanua"
 game_concept_wanua_government: "Governo Wanua"
 game_concept_wanua_i: "@government_type_wanua!"
 game_concept_wanua_desc: "O [government|El] $wanua_government_adjective$ compartilha fraquezas com o [government|El] [GetGovernment('tribal_government').GetNameWithIcon|l], mas também tem um [domain_limit|El] e [vassal_limit|El] reduzidos. Embora use [gold|El] para construir [buildings|El] e recrute [men_at_arms|El] , obtém muito pouco ouro dos edifícios.\n\nNo entanto, pode [Concept('barter', 'trocar')|E] [barter_goods_i], realizar um [raid|El] e ter sinergias com o governo [GetGovernment('mandala_government').GetName|l] à medida que ganha [legitimacy|El] por ser [Concept('tributary', 'tributario')|E]."
 game_concept_bloc_supremacy_war: "Guerra de Supremacia de Bloco"
 game_concept_bloc_supremacy: "Supremacia de Bloco"
 game_concept_supremacy: "Supremacia"
 game_concept_bloc_supremacy_war_desc: "Uma $game_concept_bloc_supremacy_war$ é um tipo especial de [war|lE] travada entre as [leading_houses|lE] de dois [house_blocs|lE] [soryo|lE].\n\n#high Al contrario que otras guerras, se unirán todos los miembros de ambos $game_concept_blocs$.#!\n\nO bloco vencedor ganhará [cohesion|lE], enquanto o perdedor perderá um terço de sua $game_concept_cohesion$.\n\nAlém disso, toda [member_house|lE] [soryo|lE] do bloco perdedor cujo [house_head|lE] não seja [GetTrait('loyal').GetName( GetNullCharacter )|l], esteja [Concept('hooked', 'sometido a un gancho')|E] de, seja uma sub[vassal|lE] de, uma [ally|lE] de, [friend|lE] ou esteja [cowed|lE] por o $game_concept_house_head$ $game_concept_leading_house_possessive$ se juntará ao $game_concept_bloc$ vitorioso."
 game_concept_bloc_expansion_war: "Guerra de Expansão de Bloco"
 game_concept_bloc_expansion: "Expansão de Bloco"
 game_concept_bloc_expansion_war_desc: "Uma $game_concept_bloc_expansion_war$ é um tipo especial de [war|lE] travada por um membro de um [bloc|lE].\n\nSe sair vitorioso, o vencedor poderá nomear um [ruler|lE] para os [titles|lE] disputados ou mantê-los para si.\n\nNomear um $game_concept_ruler$ dessa forma concederá um [hook|lE] sobre o receptor, o adicionará ao $game_concept_bloc$ do vencedor e fundará uma [house|lE] nova se o receptor não for o [house_head|lE]."
 game_concept_retirement_age: "$celestial_retirement_law$"
 game_concept_retirement_age_desc: "A [law|lE] $celestial_retirement_law$ é a idade, determinada pelo [top_liege|El] do [realm|El], a partir da qual [governors|El] e [ministers|El] podem optar por se aposentar por meio de [decision|El] ou serem compelidos a fazê-lo com uma [character_interaction|El], sob a justificativa de sua decrepitude iminente e capacidade reduzida de servir."
