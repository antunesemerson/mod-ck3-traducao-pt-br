 court_diplomatic: "Corte Diplomática"
 court_diplomatic_desc: "#low A diplomacia é fundamental para conquistar o respeito de nossos pares e manter o reino em paz. Um vassalo satisfeito é um vassalo leal. \n\nOs cortesãos ganham os traços [GetTrait('diplomatic_court_1').GetName( GetNullCharacter )].#!"
 court_diplomatic_tooltip_desc: "Em uma $court_diplomatic$, muito foco é colocado em relacionamentos e na resolução pacífica de conflitos."
 court_warlike: "Corte Belicosa"
 court_warlike_desc: "#low Uma demonstração de força é a única forma de impor assombro e respeito! Nossos cavaleiros e soldados são famosos por sua destreza. \n\nOs cortesãos recebem os traços [GetTrait('warlike_court_1').GetName( GetNullCharacter )].#!"
 court_warlike_tooltip_desc: "Em uma $court_warlike$, um corpo forte e uma mente estratégica são altamente valorizados."
 court_administrative: "Corte Administrativa"
 court_administrative_desc: "#low Só uma corte eficiente e bem mantida fará com que o nosso senhorio prospere. \n\nOs membros da corte ganham os traços [GetTrait('administrative_court_1').GetName( GetNullCharacter )].#!"
 court_administrative_tooltip_desc: "Uma $court_administrative$ é uma corte focada em desenvolver o reino."
 court_intrigue: "Corte de Intriga"
 court_intrigue_desc: "#low É perigoso deixar as pessoas na corte sem controle. Devemos garantir que ninguém possa tramar nada sem que saibamos. \n\nOs cortesãos ganham os traços [GetTrait('intrigue_court_1').GetName( GetNullCharacter )].#!"
 court_intrigue_tooltip_desc: "Em uma $court_intrigue$, você precisa vigiar as costas; um segredo pode ser tão mortal quanto uma faca na noite, e nesta corte ambos abundam."
 court_scholarly: "Corte Erudita"
 court_scholarly_desc: "#low Uma corte consiste acima de tudo em atrair mentes cultas e pessoas de talento excepcional. \n\nOs cortesãos ganham os traços [GetTrait('scholarly_court_1').GetName( GetNullCharacter )].#!"
 court_scholarly_tooltip_desc: "Conhecimento e estudo diligente são valorizados em uma $court_scholarly$."
 court_tribal: "Corte Tribal"
 court_tribal_desc: "#low Na corte, a força faz a lei, e os salões se enfeitarão com botim e pilhagem! \n\nOs cortesãos ganham os traços [GetTrait('warlike_court_1').GetName( GetNullCharacter )].#!"
 court_tribal_tooltip_desc: "Valor marcial e resiliência são valorizados em uma $court_tribal$."
 court_nomadic: "Corte Nômade"
 court_nomadic_desc: "#low Nossa corte cavalga com a força de mil cascos, onde o arco e a espada imperam. A glória se alcança pela conquista, e nosso povo prospera com os despojos de guerra. \n\nOs cortesãos ganham os traços [GetTrait('warlike_court_1').GetName( GetNullCharacter )|l].#!"
 court_nomadic_tooltip_desc: "Valor marcial e resiliência são valorizados em uma $court_nomadic$."
