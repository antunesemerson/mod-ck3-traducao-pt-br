l_spanish:
 game_concept_royal_court: "Corte Real"
 game_concept_royal_courts: "Cortes Reais"
 game_concept_royal_court_desc: "Os [rulers|lE] ilustres são famosos o bastante para manter uma Corte Real, o que dá acesso a uma variedade de bônus e oportunidades.\n\nQuando o [ruler|lE] de um [GetGovernment( 'feudal_government' ).GetName], um [GetGovernment( 'clan_government' ).GetName] ou um [GetGovernment( 'tribal_government' ).GetName] se torna [king|lE] ou [emperor|lE], ele ganha acesso à sua Corte Real.\n\nCada Corte Real tem um [court_grandeur_level|lE] que traz benefícios com base na fama da Corte Real e em que [Concept( 'court_type', 'tipo' )|E] ela é.\n\nPeticionários, [vassals|lE] e [courtiers|lE] podem aparecer em sua Corte Real, ou você pode [hold_court|lE] para convidar qualquer pessoa do [realm|lE] a apresentar suas queixas.\n\nUma Corte Real também permite ao governante exibir seus [court_artifacts|lE], e podem aparecer [guests|lE] [Concept( 'inspired', 'inspirados' )|E] oferecendo-se para criar novos [artifacts|lE].\n\nQuando você morrer, seu [Concept( 'player_heir', 'herdeiro' )|E] herdará sua Corte Real."
 game_concept_court_grandeur_level: "Nível de Grandeza da Corte"
 game_concept_court_grandeur_levels: "Níveis de Grandeza da Corte"
 game_concept_grandeur_level: "Nível de Grandeza"
 game_concept_grandeur_levels: "Níveis de Grandeza"
 game_concept_court_grandeur_level_desc: "O nível de grandeza de uma [royal_court|lE] concede bônus ao seu proprietário e é desbloqueado conforme aumenta o [court_grandeur_value|lE] da corte.\n\nAlém dos efeitos de cada nível, espera-se que grandes [realms|lE] alcancem níveis mais altos de grandeza. Isso é conhecido como [court_grandeur_expectations|lE]."
 game_concept_court_grandeur: "Grandeza da Corte"
 game_concept_grandeur: "Grandeza"
 game_concept_court_grandeur_value: "Valor da Grandeza da Corte"
 game_concept_court_grandeur_desc: "O $game_concept_court_grandeur_value$ de uma [royal_court|lE] mostra o quão famosa é a corte e desbloqueia novos [court_grandeur_levels|E] à medida que aumenta.\n\nSeu valor varia de 0 a 100 e, com o tempo, tende ao seu valor-base. O valor-base é afetado por coisas como [dynasty_perks|lE], quanto se gasta em [court_amenities|lE] e se você possui [court_artifacts|lE] magníficos.\n\nUma parte da grandeza é perdida na [succession|lE]."
 game_concept_court_amenities: "Comodidades da Corte"
 game_concept_court_amenity: "Amenidade da Corte"
 game_concept_amenities: "Amenidades"
 game_concept_court_amenities_desc: "As $game_concept_court_amenities$ se referem ao padrão de vida na [royal_court|lE].\n\nEsses padrões são definidos pelo [ruler|lE] da [royal_court|lE], e cada categoria (moda, comida, alojamento e servos) tem vários níveis. Gastar mais com Amenidades normalmente gera mais [court_grandeur_value|lE].\n\nGovernantes com [GetGovernment( 'tribal_government' ).GetName] não podem escolher Amenidades mais elevadas."
 game_concept_court_grandeur_expectations: "Expectativas de Grandeza da Corte"
 game_concept_court_grandeur_expectation: "Expectativa de Grandeza da Corte"
 game_concept_grandeur_expectations: "Expectativas de Grandeza"
 game_concept_court_grandeur_expectations_desc: "Espera-se que você tenha um [court_grandeur_level|lE] alto o suficiente em comparação ao seu [Concept( 'realm_size', 'tamanho do senhorio' )|E].\n\nÀ medida que seu [realm|lE] cresce, seus súditos e o mundo em geral esperam que sua [royal_court|lE] seja igualmente grandiosa.\n\nSe você não atender às expectativas, várias penalidades serão aplicadas. Por outro lado, se você as superar, receberá várias bonificações.\n\nAs expectativas dos governantes de um [GetGovernment( 'tribal_government' ).GetName] são sempre as mesmas que sua Grandeza atual."
 game_concept_hold_court: "$activity_hold_court$"
 game_concept_holding_court: "Mantendo Audiência"
 game_concept_hold_court_desc: "Se trata de una [activity|lE] en la que se reúne [vassals|lE] y [courtiers|lE] de un [realm|lE] en una [royal_court|lE] para presentar peticiones a su [liege|lE] y exponer sus agravios.\n\nLas situaciones sobre las que el señor deberá juzgar pueden ir desde disputas y malentendidos menores, a catástrofes a escala nacional. La mayoría de los asuntos tendrán una solución beneficiosa, si no para las partes involucradas, al menos para el señor."
 game_concept_court_type: "Tipo de Corte"
 game_concept_court_types: "Tipos de Corte"
 game_concept_court_type_desc: "Como parte de sua [royal_court|lE], os [rulers|lE] podem ter um $game_concept_court_type$ especial.\n\nCada tipo proporciona ao governante e à [court|lE] uma série de bônus, dependendo do [court_grandeur_level|lE].\n\nA [ethos|lE] da [culture|lE] do governante determina quais tipos de corte ele pode ter.\n\nSão:\n$BULLET_WITH_TAB$[GetCourtType('court_diplomatic').GetName]\n$BULLET_WITH_TAB$[GetCourtType('court_warlike').GetName]\n$BULLET_WITH_TAB$[GetCourtType('court_administrative').GetName]\n$BULLET_WITH_TAB$[GetCourtType('court_intrigue').GetName]\n$BULLET_WITH_TAB$[GetCourtType('court_scholarly').GetName]\n$BULLET_WITH_TAB$[GetCourtType('court_tribal').GetName]"
 game_concept_court_type_trait: "Traço do Tipo de Corte"
 game_concept_court_type_trait_desc: "Após servir [EmptyScope.ScriptValue('years_to_gain_court_type_trait')|0] anos em uma [royal_court|lE], um [Concept( 'courtier', 'cortesão' )|E] recebe um [trait|lE] que reflete o [Concept( 'court_type', 'tipo' )|E] daquela corte.\n\nA qualidade desse traço será determinada pelo tempo que o [Concept( 'character', 'personagem' )|E] serviu como cortesão na corte."
 game_concept_court_language: "Idioma da Corte"
 game_concept_court_languages: "Idiomas da Corte"
 game_concept_court_language_desc: "O idioma da corte é o [Concept( 'language', 'idioma oficial' )|E] de uma [royal_court|lE], falado pela nobreza e usado pela burocracia.\n\nO valor-base de [court_grandeur|lE] aumenta para cada [county|lE] do [realm|lE] que compartilha o idioma, para cada Corte Real que fale o mesmo idioma da corte e se for a língua nativa de seu [ruler|lE]."
 game_concept_inspiration: "Inspiração"
 game_concept_inspirations: "Inspirações"
 game_concept_inspired: "Inspirado"
 game_concept_inspiration_desc: "Os [Concept( 'characters', 'personagens' )|E] inspirados são artesãos habilidosos com um [project|lE] que poderia se tornar realidade se você se tornar seu [sponsor|lE].\n\nVocê pode usar a [decision|lE] Encomendar artefato para contratar tal personagem, a fim de criar um [artifact|lE].[SelectLocalization( HasDlcFeature( 'royal_court' ), 'game_concept_inspiration_desc_DLC', '' )]\n\nQuando o projeto for concluído, o patrocinador fica com o resultado, normalmente um artefato."
 game_concept_inspiration_desc_DLC: "\n\nAlém disso, personagens inspirados aparecem periodicamente em [royal_courts|lE], especialmente aquelas com um alto [court_grandeur_level|lE]."
 game_concept_sponsor: "Patrocinador"
 game_concept_sponsored: "Patrocinado"
 game_concept_sponsor_desc: "Um $game_concept_sponsor$ é um [ruler|lE] que financia o [project|lE] de um [character|lE] [inspired|lE]."
 game_concept_artifact: "Artefato"
 game_concept_artifacts: "Artefatos"
 game_concept_artifact_i: "@artifact_icon!"
 game_concept_artifact_desc: "Um artefato é um objeto notável que concede bônus especiais ao [character|lE] que o usa.\n\n[SelectLocalization( HasDlcFeature( 'court_artifacts' ), 'game_concept_artifact_desc_DLC', 'game_concept_artifact_desc_NO_DLC' )]\n\nAlguns artefatos são mais especiais do que outros e têm uma [rarity|lE] mais alta.\n\nAssim como os [titles|lE], os personagens podem ter [artifact_claims|lE] sobre um artefato e tentar tomá-lo para si.\n\nEles também têm [durability|lE]: quando chega a zero, o artefato é destruído.\n\nO [player_heir|lE] do proprietário sempre herda os artefatos. Se alguém que não seja [close_family_member|lE] herdar um artefato, ele perderá [durability|lE] ou até mesmo será destruído imediatamente."
 game_concept_artifact_desc_NO_DLC: "Como os artefatos são usados ou carregados no corpo, eles também são conhecidos como [inventory_artifacts|lE]."
 game_concept_artifact_desc_DLC: "Os artefatos são divididos em duas categorias:\n$BULLET_WITH_TAB$[inventory_artifacts|lE] são usados ou carregados por um personagem\n$BULLET_WITH_TAB$[court_artifacts|lE] residem dentro da [royal_court|lE] de um [ruler|lE]"
 game_concept_court_artifact: "Artefato da Corte"
 game_concept_court_artifacts: "Artefatos da Corte"
 game_concept_court_artifact_desc: "Artefacto de corte es [Concept( 'artifact', 'aquel' )|E] que se guarda en la [royal_court|lE] de un [ruler|lE] como tapices o libros bellamente ilustrados.\n\nLos artefactos de corte son un factor que determina la [court_grandeur|lE] de la corte real.\n\nUn personaje puede tener todos los artefactos de corte que desee, pero para que hagan efecto tendrán que estar dispuestos en una casilla de su tipo.\n\nPuedes crear nuevos artefactos de inventario de [characters|lE] [Concept( 'inspired', 'inspirados' )|E], de la decisión Encargar artefacto o si eliges [reforge|lE] un [inventory_artifact|lE]"
 game_concept_inventory_artifact: "Artefato do Inventário"
 game_concept_inventory_artifacts: "Artefatos do Inventário"
 game_concept_inventory_artifact_desc: "Artefactos de inventario son [Concept( 'artifacts', 'aquellos' )|E] que un personaje lleva consigo, como un arma o una corona.\n\nUn personaje puede poseer todos los artefactos que desee, pero para que tengan efecto tendrán que estar equipados en una casilla de su tipo.\n\nPuedes crear nuevos artefactos de inventario de [characters|lE] [Concept( 'inspired', 'inspirados' )|E] o de la decisión Encargar artefacto."
 game_concept_project: "Projeto"
 game_concept_project_desc: "Um projeto é algo que um [character|lE] [inspired|lE] realiza com a ajuda de um [sponsor|lE] para tornar sua visão realidade, normalmente na forma de um [artifact|lE]."
 game_concept_artifact_durability: "Durabilidade do Artefato"
 game_concept_durability: "Durabilidade"
 game_concept_artifact_durability_desc: "Todo [artifact|lE] tem uma durabilidade. Quando toda ela se perde, o artefato é destruído.\n\nA durabilidade se deteriora com o tempo, mas também pode ser perdida em certos eventos, como [sieges|lE] e durante a [succession|lE].\n\nA durabilidade pode ser restaurada ao escolher [reforge|lE] ou [repair|lE] o artefato."
 game_concept_artifact_claim: "Reivindicação de Artefato"
 game_concept_artifact_claims: "Reivindicações de Artefato"
 game_concept_artifact_claim_desc: "Uma $game_concept_artifact_claim$ é o direito legal sobre um [artifact|lE].\n\nTer direitos sobre um [artifact|lE] permite realizar várias ações em relação ao artefato e ao seu proprietário, se você atualmente não o possuir (por exemplo, usando a [scheme|lE] de [GetScheme('steal_back_artifact').GetTypeName|l]).\n\nHá [personal_artifact_claims|lE] para [character|lE] e [house_artifact_claims|lE] para [houses|lE].\n\nAs reivindicações sobre artefatos são mais simples do que as [title_claims|lE]; elas existem ou não. Também não são herdadas além da primeira geração."
 game_concept_personal_artifact_claim: "Reivindicação Pessoal de Artefato"
 game_concept_personal_artifact_claims: "Reivindicações Pessoais de Artefato"
 game_concept_personal_artifact_claim_desc: "Um $game_concept_personal_artifact_claim$ é um [artifact_claim|lE] pessoal, em oposição a um [house_artifact_claim|lE].\n\nAo morrer, seus filhos obterão reivindicações sobre todos os seus artefatos.\n\nVocê também obterá uma reivindicação sobre um artefato se ele for roubado durante um [siege|lE] ou um [raid|lE].\n\nAs reivindicações sobre artefatos nunca são herdadas."
 game_concept_house_artifact_claim: "Reivindicação de Artefato da Casa"
 game_concept_house_artifact_claims: "Reivindicações de Artefato da Casa"
 game_concept_house_artifact_claim_desc: "Se você conservar um [artifact|lE] tempo suficiente, sua [house|lE] conseguirá um [artifact_claim|lE] sobre ele: um $game_concept_house_artifact_claim$.\n\nVocê só pode agir com base em um $game_concept_house_artifact_claim$ se o artefato não estiver em posse de um membro de sua casa.\n\nQuando uma [cadet_branch|lE] for formada, quaisquer direitos de Casa existentes sobre Artefatos em posse dos membros da nova Casa serão transferidos para a nova Casa."
 game_concept_court_position: "Posição na Corte"
 game_concept_court_position_i: "@court_position_icon!"
 game_concept_court_positions: "Posições na Corte"
 game_concept_court_position_desc: "Los $game_concept_court_position$ son cargos especializados que se pueden conceder a [courtiers|lE] y [vassals|lE] para que ayuden a su [liege|lE].\n\nLos beneficios que se ganan con un puesto en la corte dependen de la [aptitude|lE] del titular para el mismo.\n\nOtorgar $game_concept_court_positions$ es gratis, pero hay que pagar un salario mensual en [gold|lE] y revocarlos te costará [prestige|lE]"
 game_concept_aptitude: "Aptidão"
 game_concept_aptitude_desc: "A $game_concept_aptitude$ de um [character|lE] indica o quão eficiente ele é em diferentes funções na [court|lE]. Essas funções incluem [court_positions|lE], [diarchs|lE] e [tax_collectors|lE].\n\nA $game_concept_aptitude$ é medida em 5 níveis, que vão de Terrível a Excelente. O nível de aptidão do personagem determina as bonificações que o [liege|lE] recebe por empregá-lo em uma função na [court|lE].\n\nPor exemplo, um personagem que seja [GetTrait('lifestyle_physician').GetName( GetNullCharacter )|l] estará naturalmente melhor preparado para servir como $court_physician_court_position$."
 game_concept_aptitude_i: "#P @aptitude:5:inherit_color!#!"
 game_concept_court_event: "Evento na Corte"
 game_concept_court_events: "Eventos na Corte"
 game_concept_court_event_desc: "Um $game_concept_court_event$ é um evento que envolve os membros de sua [court|lE]. Eles podem ser vistos na [royal_court|lE]."
 game_concept_petition_liege: "Petição"
 game_concept_petition_liege_desc: "Uma oportunidade para que os [vassals|lE] solicitem ajuda ao seu [liege|lE].\n\nDiversos problemas podem ser apresentados, e cabe ao [liege|lE] decidir se aceita ou não."
 game_concept_pay_homage: "Homenagem"
 game_concept_pay_homage_desc: "Uma [activity|lE] em que os [vassals|lE] podem formalmente exibir sua lealdade ao seu [liege|lE].\n\nA homenagem pode ser feita de diversas formas e pode conceder [opinion|lE], [prestige|lE] e [dynasty_prestige|lE] para ambas as partes."
 repair_or_reforge_and_repair: "[SelectLocalization( HasDlcFeature( 'court_artifacts' ), 'repair_and_reforge', 'just_repair' )]"
 repair_and_reforge: "[reforge|E] ou [repair|lE]"
 just_repair: "[repair|E]"
 game_concept_reforge_artifact: "Reforjar Artefato"
 game_concept_reforge: "Reforjar"
 game_concept_reforge_artifact_desc: "Algunos [inventory_artifacts|lE] pueden ser reforjados para convertirse en [court_artifacts|lE].\n\nHace falta tener un [GetCourtPositionType('antiquarian_court_position').GetName()|l] y pagar [gold|lE] para reforjar un [artifact|lE], aunque los artefactos más antiguos serán más baratos de reforjar.\n\nLa [durability|lE] del [artifact|lE] se restaurará, igual que cuando se [Concept( 'repair', 'repare' )|E].\n\nSolo se pueden reforjar armas, armaduras, coronas y vestiduras, y siempre se convertirán en objetos de pedestal."
 game_concept_repair_artifact: "Reparar Artefato"
 game_concept_repair: "Reparar"
 game_concept_repair_artifact_desc: "Quando um [artifact|lE] tem baixa [durability|lE], você pode optar por repará-lo.\n\nÉ necessário pagar [gold|lE] para reparar um artefato.[SelectLocalization( HasDlcFeature( 'court_artifacts' ), 'game_concept_repair_artifact_desc_DLC', '' )]"
 game_concept_repair_artifact_desc_DLC: "\n\nPor outro lado, você pode escolher [reforge|lE] o artefato."
