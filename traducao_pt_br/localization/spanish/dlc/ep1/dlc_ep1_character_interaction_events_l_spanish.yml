l_spanish:
 #Indebt Guest Loc
 ep1_character_interaction.0001.t: "Uma Recompensa Sensata"
 ep1_character_interaction.0001.desc.intro: "[recipient.GetFirstName] parece realmente #EMP aterrorizad[recipient.Custom('ES_OA')]#! quando um servo após outro é trazido para acusar[recipient.GetHerHim]. Cada um deles atesta que"
 ep1_character_interaction.0001.desc.lustful: "irreparavelmente sujou a maioria da roupa de cama cara da corte,"
 ep1_character_interaction.0001.desc.chaste: "move ou oculta continuamente qualquer obra de arte que considera de mau gosto, obrigando-os a passar horas por dia consertando as coisas e"
 ep1_character_interaction.0001.desc.gluttonous: "comeu mais [recipient.Custom('ES_ElElla')] sozinho[recipient.Custom('ES_OA')] do que todo o resto da corte junto,"
 ep1_character_interaction.0001.desc.temperate: "expulsou três de nossos melhores cozinheiros ao torcer o nariz para o jantar atrás do jantar,"
 ep1_character_interaction.0001.desc.greedy: "foi visto cortando pedaços de metais preciosos de nossos ornamentos mais caros,"
 ep1_character_interaction.0001.desc.generous: "repetidamente deu a propriedade da corte como se fosse sua própria,"
 ep1_character_interaction.0001.desc.lazy: "toma mais tempo com tarefas triviais do que o resto da corte com as tarefas vitais,"
 ep1_character_interaction.0001.desc.diligent: "os forçou a repetir o trabalho até a perfeição sem levar em consideração o volume de tarefas,"
 ep1_character_interaction.0001.desc.wrathful: "jogou a maioria dos assentos de uma pessoa da corte de sua varanda,"
 ep1_character_interaction.0001.desc.calm: "adiou o jantar semana após semana com deliberações meditativas sobre qual prato preferia,"
 ep1_character_interaction.0001.desc.patient: "continuamente emite tarefas que levarão semanas ou meses para serem concluídas,"
 ep1_character_interaction.0001.desc.impatient: "dá-lhes centenas de tarefas por dia, raramente esperando por uma para começar antes de adicionar a próxima e"
 ep1_character_interaction.0001.desc.arrogant: "recusa-se a permitir que os serventes comuns realizem tarefas por [recipient.GetSheHe] e insiste em tomar o tempo da equipe principal e"
 ep1_character_interaction.0001.desc.humble: "finge ser humilde, mas na verdade passa o tempo desviando a equipe com arrogância. O caos é"
 ep1_character_interaction.0001.desc.deceitful: "parece gostar de espalhar informações falsas sem motivo aparente, semeando o caos por toda a corte e"
 ep1_character_interaction.0001.desc.honest: "humilha-os diariamente com opiniões francas sobre sua aparência, atitudes e ética de trabalho. A equipe perdida sozinha é"
 ep1_character_interaction.0001.desc.craven: "obriga-os a esfregar com sabão cada pedaço de comida que come por medo de veneno,"
 ep1_character_interaction.0001.desc.brave: "nunca recusa a menor chance de uma briga, causando [recipient.Custom('ES_ElElla')] mism[recipient.Custom('ES_OA')] a maior parte da limpeza por"
 ep1_character_interaction.0001.desc.shy: "vive em pânico constante quando os servos entram inesperadamente em sua presença, causando atrasos por onde quer que vá e"
 ep1_character_interaction.0001.desc.gregarious: "faz constantemente festas pessoais extravagantes com os estoques do tribunal,"
 ep1_character_interaction.0001.desc.ambitious: "obriga-os sempre a ficar horas na multidão e a aplaudir seus discursos,"
 ep1_character_interaction.0001.desc.content: "sempre os encoraja a deixar trabalhos pela metade ou nem fazer, criando na verdade mais trabalho depois e"
 ep1_character_interaction.0001.desc.arbitrary: "solicita rotineiramente que cometam pequenos crimes em seu nome, resultando em multas"
 ep1_character_interaction.0001.desc.just: "já relatou tantas pequenas indiscrições entre a equipe que eles gastam mais tempo discutindo sobre culpa percebida do que trabalhando,"
 ep1_character_interaction.0001.desc.cynical: "fez algo indizível à porta do [actor.GetFaith.HouseOfWorship] particular da corte,"
 ep1_character_interaction.0001.desc.zealous: "passa horas de seu dia todos os dias com sua pregação e fanatismo,"
 ep1_character_interaction.0001.desc.paranoid: "insiste em supervisionar pessoalmente cada tarefa deles com medo de trapaça,"
 ep1_character_interaction.0001.desc.trusting: "continuamente traz charlatões e bandidos para os corredores para enganar e roubar,"
 ep1_character_interaction.0001.desc.compassionate: "doou quase todo o estoque de comida para mendigos sem-teto,"
 ep1_character_interaction.0001.desc.callous: "abusou da equipe sem remorso, fazendo muitos saírem e"
 ep1_character_interaction.0001.desc.sadistic: "atacou uma cabra prêmio com um facão de carne,"
 ep1_character_interaction.0001.desc.stubborn: "provocou uma discussão com o séquito de um nobre visitante, causando destruição"
 ep1_character_interaction.0001.desc.fickle: "ocupou hordas de seu número com pedidos em constante mudança,"
 ep1_character_interaction.0001.desc.vengeful: "consistentemente destrói utensílios de mesa caros por despeito mesquinho,"
 ep1_character_interaction.0001.desc.forgiving: "apenas finge ser perdoador e, em vez disso, é $ep1_character_interaction.0001.desc.vengeful$"
 ep1_character_interaction.0001.desc.fallback_1: "tentou criar uma ninhada de galinhas em seus aposentos, causando danos"
 ep1_character_interaction.0001.desc.fallback_2: "aniquilou completamente meu banheiro pessoal, causando danos"
 ep1_character_interaction.0001.desc.fallback_3: "trocou um dos meus cavalos premiados por uma cabra \"mágica\""
 ep1_character_interaction.0001.desc.fallback_4: "somente [recipient.GetSheHe] foi responsável por um incêndio que incendiou a ala oeste,"
 ep1_character_interaction.0001.desc.fallback_5: "desfigurou meu trono com grafites retratando os seus atributos,"
 ep1_character_interaction.0001.desc.outro: "-ou assim dizem-, o que me custou uma pequena fortuna pessoal.\n\nEst[recipient.Custom('ES_EA')] [recipient.GetWomanMan] mal começou a gaguejar sobre sua inocência e uma conspiração quando ergo a mão.\n\n\"É evidente que vós transgredistes, [recipient.GetFirstNameNoTooltip]. #EMP Podría#! perdoar vossas falcatruas, se aceitardes me fazer uma promessa #EMP de nada#!…\""
 ep1_character_interaction.0001.a: "*Rindo maliciosamente* Oh sim, [actor_nemesis.GetFirstNameNoTooltip] nunca verá isso chegando!"
 ep1_character_interaction.0001.b: "Excelente! Agora, você irá para a corte de [actor_rival.GetFirstNameNoTooltip]…"
 ep1_character_interaction.0001.c: "Saia daqui até que eu precise de você!"
 ep1_character_interaction.0001.d: "Naturalmente, você ficar? onde eu possa vigi?-lo."
