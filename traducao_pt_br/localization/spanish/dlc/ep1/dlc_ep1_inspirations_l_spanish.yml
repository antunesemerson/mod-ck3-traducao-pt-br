 weapon_inspiration: "Inspiração de Arma"
 weapon_inspiration_desc: "Um personagem que tem uma Inspiração de Arma é [inspired|lE] a forjar um [artifact|lE] de arma. Isso pode incluir desde espadas até lanças e será carregado na mão."
 armor_inspiration: "Inspiração de Armadura"
 armor_inspiration_desc: "Um personagem que tem uma Inspiração de Armadura é [inspired|lE] a forjar um [artifact|lE] de armadura ou escudo. Isso pode incluir qualquer coisa, desde cota de malha até lâminas."
 book_inspiration: "Inspiração de Livro"
 book_inspiration_desc: "Um personagem que tem uma Inspiração de Livro é [inspired|lE] a escrever e produzir um [artifact|lE] de livro. Os tópicos abordados podem variar muito - assim como a qualidade - mas resultará em um tomo digno de realeza."
 weaver_inspiration: "Inspiração de Tapeçaria"
 weaver_inspiration_desc: "O personagem com Inspiração em tecelagem fica [inspired|lE] a tecer um [artifact|lE] do tipo tapeçaria. As imagens e cenas retratadas podem variar enormemente — assim como sua qualidade —, mas o resultado será uma tapeçaria digna de adornar as paredes da sua [royal_court|lE]."
 adventure_inspiration: "Inspiração de Aventura"
 adventure_inspiration_desc: "O personagem com Inspiração de aventura fica [inspired|lE] inspirado a partir em uma grande aventura e trazer para você um [artifact|lE]. Os artefatos obtidos com essa Inspiração podem variar enormemente e podem ser desde o crânio de uma fera poderosa até uma herança roubada."
 artisan_inspiration: "Inspiração de Artesão"
 artisan_inspiration_desc: "Um personagem que tem uma Inspiração de Artesão é [inspired|lE] a aplicar seu conhecimento especializado em uma habilidade específica para produzir um [artifact|lE] de grande habilidade. Marceneiros e alfaiates são exemplos de especializações de artesãos."
 smith_inspiration: "Inspiração de Ferraria"
 smith_inspiration_desc: "Um personagem que tem uma Inspiração de Ferraria é [inspired|lE] a forjar algo mais extravagante e menor do que uma espada ou uma armadura. Estes são os artistas que fazem coroas e taças, brilhantes e adornados."
 alchemy_inspiration: "Inspiração de Alquimia"
 alchemy_inspiration_desc: "Um personagem que tem uma Inspiração de Alquimia é [inspired|lE] a explorar, purificar e criar substâncias e metais, criar elixires e, em última análise, aperfeiçoar o corpo e a alma humana."
 research_inspiration: "Inspiração de Pesquisa"
 research_inspiration_desc: "Um personagem que tenha uma inspiração de pesquisa se sente [inspired|lE] para descobrir um novo conhecimento em benefício de seu [sponsor|lE]. Se tiver sucesso, melhorará a aprendizagem na [dynasty|lE] de seu patrono, ou até mesmo descobrirá uma nova [innovation|lE] para sua cultura."
 bow_inspiration: "Inspiração de arco"
 bow_inspiration_desc: "Um personagem com Inspiração de Arco fica [inspired|lE] a encordoar um [artifact|lE] de tipo arco. Isso pode incluir tudo, de arcos compostos a bestas, e será carregado na mão."
