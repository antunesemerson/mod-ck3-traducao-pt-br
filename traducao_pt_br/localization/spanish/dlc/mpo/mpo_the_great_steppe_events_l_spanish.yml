l_spanish:
 mpo_the_great_steppe.0001.t: "A Grande Estepe"
 mpo_the_great_steppe.0001.desc: "Um mar interminável de grama e rochas. A estepe não é um lar misericordioso. As tendas são montadas e desmontadas com a passagem das estações - vilarejos inteiros se deslocam por causa de uma nevasca feroz ou de um inimigo mais poderoso.\n\nO homem está à mercê das feras. O que o rebanho precisa para sobreviver é o que o rebanho receberá.\n\nQuem dominará os elementos e se erguerá como Cã dos Cãs?"
 mpo_the_great_steppe.0001.a: "Juntos, cavalgamos!"
 mpo_the_great_steppe.0002.t: "[my_subregion.GetNameNoTooltip]: [my_subregion.GetCurrentPhase.GetName]"
 mpo_the_great_steppe.0002.desc.cold_zud: "O frio corta a pele de forma aguda; a pele ao redor das minhas bochechas começou a descascar. Os animais tremem sob os ventos fortes, sem energia para se alimentar."
 mpo_the_great_steppe.0002.desc.drought: "A terra está rachada e árida como um corte cicatrizando. A grama secou e os animais disputam os últimos talos.\n\nChegou a hora de lutar ou fugir."
 mpo_the_great_steppe.0002.desc.white_zud: "Nenhuma grama pode ser vista sob as camadas de neve. Branca como a lua, a morte veio levar nossos animais."
 mpo_the_great_steppe.0002.desc.warm_nights: "Os pássaros cantam e as crianças brincam. Encontro [person.GetFirstName] deitado na grama com os olhos fechados, banhad[person.Custom('ES_OA')] pelo sol.\n\nSons tênues vêm de entre os animais; os bezerros e cordeirinhos recém-nascidos são cuidados com o mais terno zelo.\n\nSe ao menos pudesse ser sempre assim."
 mpo_the_great_steppe.0002.desc.abundant_grazing: "A grama cresceu tanto que as crianças se perdem nela, com as mães rindo enquanto as encontram.\n\nSeria impossível imaginar um rebanho mais saudável, ou uma época mais feliz."
 mpo_the_great_steppe.0002.desc.havsarsan_zud: "Os rios secam e os prados se tornam estéreis. O gelo cobre o terreno onde nada pode crescer. Os animais caem mortos, e nós seremos os próximos.\n\nQue [ROOT.Char.GetFaith.HighGodName] nos ampare, pois isto há de ser [ROOT.Char.GetFaith.NegativeAfterLife]."
 mpo_the_great_steppe.0002.desc.sky_blessing: "As flores desabrocham e os animais ficam mais saudáveis do que nunca. As pastagens se estendem até áreas consideradas mortas por gerações.\n\nTodo recém-nascido recebe a bênção de [ROOT.Char.GetFaith.HealthGodName] e a força de [ROOT.Char.GetFaith.WarGodName].\n\nSe eu apenas fechar os olhos, posso imaginar que estamos no [ROOT.Char.GetFaith.PositiveAfterLife]."
 mpo_the_great_steppe.0002.desc.obedience: "\n\nNo entanto, com menores chances de sobrevivência, as pessoas ficam muito mais suscetíveis a jurar sua obediência."
 mpo_the_great_steppe.0002.a: "E assim o mundo continua girando."
 mpo_the_great_steppe.0002.tt: "A [steppe_season|E] mudou"
 mpo_the_great_steppe_0002_souvenirs_aplenty_tt: "Graças ao seu [perk|El] [GetPerk('souvenirs_aplenty_perk').GetName( GetPlayer )]"
 souvenirs_aplenty_perk_county_modifier: "Mudança das Estações"
 souvenirs_aplenty_perk_county_modifier_desc: "Graças à sua experiência de vida, este personagem aprendeu a melhor forma de lidar com a mudança das estações."
