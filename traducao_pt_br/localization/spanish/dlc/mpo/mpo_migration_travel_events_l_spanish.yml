l_spanish:
 mpo_migration_travel_events.0001.t: "\"Presente\" de [ruler.GetFirstNameNoTooltip]"
 mpo_migration_travel_events.0001.desc: "Um[messenger.Custom('ES_XA')] [messenger.GetWomanMan] que pastoreia algumas ovelhas se aproxima e diz: \"Saudações, [ROOT.Char.GetTitledFirstNameNoTooltip|l]\".\n\n\"Meu [ruler.GetTitleAsNameNoTooltip|l], [ruler.GetFirstName], e eu observamos como vosso rebanho mingua dia após dia. Por favor, aceitai este pequeno rebanho como presente. Tudo o que [ruler.Custom('ES_ElLa')] [ruler.GetTitleAsNameNoTooltip|l] pede em troca é um pequeno favor\"."
 mpo_migration_travel_events.0001.a: "Aceito humildemente o presente."
 mpo_migration_travel_events.0001.b: "Diga a [ruler.GetFirstNameNoTooltip] que não estou interessado."
 mpo_migration_travel_events.0010.t: "Rebanho Excessivo"
 mpo_migration_travel_events.0010.desc: "\"[ROOT.Char.GetTitleAsNameNoTooltip], não podeis levar um rebanho tão enorme para atravessar a estepe!\", exclama [messenger.GetFirstName]. \"Nossos pastores já têm lutado há tanto tempo, certamente não precisais de tudo isso!\".\n\n[messenger.GetFirstNameNoTooltip] recupera a compostura. \"Em vez disso, imploro que concedais alguns dos vossos animais a um dos vossos súditos, nem que seja para aliviar a tensão entre os nossos rebanhos. [vassal_1.Custom('ES_ElLa')|U] [vassal_1.GetTitledFirstName|l] vos serve bem, mas [vassal_2.Custom('ES_ElLa')] [vassal_2.GetTitledFirstName|l] poderia apreciar o gesto de seu nov[ROOT.Char.Custom('ES_OA')] governante\"."
 mpo_migration_travel_events.0010.a: "[vassal_1.GetFirstNameNoTooltip] pode ficar com alguns, como presente de despedida."
 mpo_migration_travel_events.0010.b: "Melhor investir nas terras de [vassal_2.GetFirstNameNoTooltip]."
 mpo_migration_travel_events.0010.c: "Deixe os animais excedentes para trás."
 mpo_migration_travel_events.0010.d: "Este é o meu rebanho, e o levarei comigo."
 no_longer_herd_limit_tt: "Você não está mais acima do seu limite de [herd|lE]."
 nomad_keep_herd_modifier: "Rebanho Estagnado"
 nomad_keep_herd_modifier_desc: "O rebanho deste personagem cresceu demais e terá dificuldades para continuar se expandindo no mesmo ritmo."
 mpo_migration_travel_events.0020.t: "Terras Áridas"
 mpo_migration_travel_events.0020.desc: "À medida que nosso rebanho avança, batedores trazem notícias preocupantes. As pastagens em [target_title.GetNameNoTier], o local onde pretendemos nos estabelecer, são escassas, e a terra parece quase inabitável."
 mpo_migration_travel_events.0020.a: "Ainda assim, [target_title.GetNameNoTierNoTooltip] será nosso lar."
 mpo_migration_travel_events.0020.b: "Voltemos! Não podemos sobreviver lá!"
 mpo_migration_travel_events.0020.c: "Reduzir nossos números pode ajudar na sobrevivência."
 mpo_migration_travel_events.0020.d: "[ROOT.Char.GetFaith.FertilityGodName], por favor, nos ajude!"
 mpo_migration_travel_events.0020.d_tt: "Você pede para [astrologer.GetFirstName] orar por fertilidade."
 mpo_migration_travel_events.0020.win: "As preces de [astrologer.GetFirstNameNoTooltip] foram atendidas!"
 mpo_migration_travel_events.0020.lose: "As palavras de [astrologer.GetFirstNameNoTooltip] foram inúteis"
 mpo_migration_travel_events.0030.t: "$travel_danger_prefix$ Uma Praga Sobre o Rebanho"
 mpo_migration_travel_events.0030.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('messenger'))|l] cavalga até mim em um cavalo frágil, com o rosto tomado pela preocupação.\n\n“Meu [ROOT.Char.GetTitleAsNameNoTooltip|l], nosso rebanho adoeceu. Os animais estão morrendo, e a doença se espalha a cada dia. Por favor, nos ajude, ou não nos restará nada!”, suplica [messenger.GetFirstName].\n\nEnquanto recebo seu apelo, vejo animais doentes ao longe e observo como o cavalo de [messenger.GetFirstNameNoTooltip] bufa de forma irregular."
 mpo_migration_travel_events.0030.a: "Matem os animais doentes para evitar o contágio."
 mpo_migration_travel_events.0030.b: "Talvez um pastor local conheça esse mal."
 mpo_migration_travel_events.0030.b_good: "O tratamento do pastor se mostra inestimável"
 mpo_migration_travel_events.0030.b_bad: "O tratamento do pastor ajuda muito pouco"
 mpo_migration_travel_events.0030.c: "Devemos esperar a natureza seguir seu curso."
 mpo_migration_travel_events.0030.c_none: "A doença é contida"
 mpo_migration_travel_events.0030.c_medium: "A doença passa com poucas perdas"
 mpo_migration_travel_events.0030.c_massive: "A doença devasta o rebanho"
 mpo_migration_travel_events.0030.c_major: "O rebanho é enfraquecido pela doença"
 nomad_weak_herd_modifier: "Rebanho Enfraquecido"
 nomad_weak_herd_modifier_desc: "O rebanho deste personagem foi enfraquecido por uma doença."
 nomad_slow_horses_modifier: "Cavalos Lentos"
 mpo_migration_travel_events.0040.t: "O Rio Furioso"
 mpo_migration_travel_events.0040.desc: "Uma corrente repentina assusta meu cavalo quando nos aproximamos do rio próximo a [county.GetNameNoTier]. A água, ao que parece, está alta demais para atravessar, e os menores do rebanho podem ser levados pela correnteza.\n\nNão parece haver caminho fácil, e o rebanho começa a se agitar."
 mpo_migration_travel_events.0040.a: "Vamos atravessar essas águas com força!"
 mpo_migration_travel_events.0040.a_tt: "Você conduz o rebanho através do rio"
 mpo_migration_travel_events.0040.win: "O rebanho atravessa o rio em segurança"
 mpo_migration_travel_events.0040.lose: "Você perde alguns animais para a correnteza"
 mpo_migration_travel_events.0040.b: "Balsas nos levarão em segurança."
 mpo_migration_travel_events.0040.b_flavor: "Você constrói balsas para ajudar o rebanho a cruzar."
 mpo_migration_travel_events.0040.c: "Será que há um vau por perto?"
 mpo_migration_travel_events.0040.c_christian: "Se [ROOT.Char.GetFaith.HighGodName] pôde dividir o mar ao meio, certamente poderá nos ajudar a atravessar."
 mpo_migration_travel_events.0050.t: "Amor nas Estepes"
 mpo_migration_travel_events.0050.desc: "Ao meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('courtier'))|l] , [courtier.GetFirstName] , ele/ela é visto(a) [courtier.GetHerHim] mais frequentemente longe do rebanho do que com ele. Quando nos preparamos para partir para o próximo destino, aproxima-se de mim com os olhos cheios de anseio.\n\n«[ROOT.Char.GetTitleAsNameNoTooltip] , aqui encontrei meu par», confessa [courtier.GetFirstNameNoTooltip]. «Desejo deixar o rebanho e ficar com [local.GetSheHe] , minha [local.GetFirstName]. Por favor, deixem-me ir»."
 mpo_migration_travel_events.0050.a: "Vá onde seu coração desejar, [courtier.GetFirstNameNoTooltip]."
 mpo_migration_travel_events.0050.b: "Abandonar seu[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] em nome do amor? Hah!"
 mpo_migration_travel_events.0050.c: "Direcione seus sentimentos para mim, [courtier.GetFirstNameNoTooltip]."
 mpo_migration_travel_events.0050.c_tt: "Você tenta seduzir [courtier.GetFirstNameNoTooltip]"
 mpo_migration_travel_events.0050.win: "[courtier.GetFirstNameNoTooltip] se rende aos seus encantos"
 mpo_migration_travel_events.0050.lose: "[courtier.GetFirstNameNoTooltip] parte mesmo assim"
 mpo_migration_travel_events.0050.d: "Como você pôde se apaixonar por outr[local.Custom('ES_OA')]?!"
 mpo_migration_travel_events.0060.t: "$travel_danger_prefix$ Cascos Selvagens"
 mpo_migration_travel_events.0060.desc: "O pânico se espalha pelo acampamento, quando um cavalo se solta de sua rédea e quase derruba a [courtier.GetFirstName] do lombo. Ele enlouqueceu por causa da viagem, ou talvez tenha sido provocado, e corre em fúria, ignorando qualquer um que tente acalmá-lo.\n\n[courtier.GetFirstNameNoTooltip] grita ao perceber que já não controla a besta e está cada vez mais perto de cair a cada corcoveio."
 mpo_migration_travel_events.0060.a: "Acabem com ele, rápido!"
 mpo_migration_travel_events.0060.a_tt: "Você sacrifica o cavalo para salvar [courtier.GetFirstNameNoTooltip] e os demais"
 mpo_migration_travel_events.0060.a_bad: "O cavalo morre"
 mpo_migration_travel_events.0060.a_bad_tt: "@death_icon!#n Um cortesão morre#!"
 mpo_migration_travel_events.0060.win: "O cavalo é acalmado sem mais incidentes"
 mpo_migration_travel_events.0060.b: "Eu cuido disso. Afastem-se!"
 mpo_migration_travel_events.0060.tt: "Você tenta acalmar o cavalo"
 mpo_migration_travel_events.0060.lose: "O cavalo investe"
 mpo_migration_travel_events.0060.c: "Esperemos que [courtier.GetFirstNameNoTooltip] seja a única vítima..."
 mpo_migration_travel_events.0060.herd: "O cavalo atropela parte do rebanho"
 mpo_migration_travel_events.0060.people: "O cavalo atropela mais membros da comitiva"
 mpo_migration_travel_events.0060.people_tt: "#n Mais alguns podem ter sido vítimas do cavalo#!"
