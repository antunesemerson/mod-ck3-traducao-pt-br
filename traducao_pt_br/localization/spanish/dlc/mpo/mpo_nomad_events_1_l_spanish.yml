l_spanish:
 mpo_nomad_events.1000.t: "Uma Cabeça Resgatada"
 mpo_nomad_events.1000.army_camp: "Os sobreviventes da sangrenta batalha em [beheaded_warrior_location.GetName] se juntam ao meu exército, esporeando seus cavalos até o último suspiro. Das rédeas de um deles balança uma cabeça ensanguentada — com o rosto mortal de"
 mpo_nomad_events.1000.capital: "Os sobreviventes da sangrenta batalha em [beheaded_warrior_location.GetName] enviam notícias dos campos de matança, e com as novas... a cabeça ensanguentada de"
 mpo_nomad_events.1000.family: "[beheaded_warrior.GetFirstName], m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('beheaded_warrior'))]."
 mpo_nomad_events.1000.vassal: "[beheaded_warrior.GetName], meu subordinado[beheaded_warrior.Custom('ES_OA')] outrora tão poderoso[beheaded_warrior.Custom('ES_OA')]."
 mpo_nomad_events.1000.councillor: "[beheaded_warrior.GetName], meu leal conselheiro[beheaded_warrior.Custom('ES_OA')]."
 mpo_nomad_events.1000.generic_knight: "[beheaded_warrior.GetName], meu honrado [ROOT.Char.Custom('KnightCultureNoTooltip')|l]."
 mpo_nomad_events.1000.desc: "\n\n«[beheaded_warrior.GetFirstNameNoTooltip] morreu como um[beheaded_warrior.Custom('ES_XA')] guerreiro[beheaded_warrior.Custom('ES_OA')], lutou até chegar ao coração da hoste de guerra [beheaded_warrior_foe.Custom('ES_DelDela')] [beheaded_warrior_foe.GetTitledFirstName|l] até que lhe separaram a cabeça dos ombros! Por amor a [beheaded_warrior.GetSheHe], nossos cavaleiros recuperaram o que puderam».\n\nUm fim cruel, mas nossos sábios anciãos dizem que a cabeça de tão nobre guerreiro[beheaded_warrior.Custom('ES_OA')] conserva parte de seu vigor e destino."
 mpo_nomad_events.1000.a: "Eu honrarei a cabeça dest grande [beheaded_warrior.GetWomanMan]."
 mpo_nomad_events.1000.a.flavor: "Será colocado [beheaded_warrior.Custom('ES_AlAla')] [beheaded_warrior.GetTitledFirstNameNoTooltip|l] sobre um tapete branco de feltro, onde minha família lhe oferecerá bebidas cerimoniais e realizará ritos."
 mpo_nomad_events.1000.b: "[beheaded_warrior.GetFirstNameNoTooltip] pertence ao seu povo."
 mpo_nomad_events.1000.c: "Que meus [ROOT.Char.Custom('KnightCulturePluralNoTooltip')|l] venerem seu camarada caíd[beheaded_warrior.Custom('ES_OA')]."
 mpo_nomad_events.1000.d: "Coloque [beheaded_warrior.GetFirstNameNoTooltip] no solo."
 mpo_warriors_grave_modifier: "Cova do Guerreiro Decapitado"
 mpo_warriors_grave_modifier_desc: "Cortada do corpo na batalha, uma cabeça distorcida pelos gritos de guerra é enterrada no solo desta terra. Esta cova é frequentemente visitada por famílias cujos entes queridos partiram para a guerra."
 mpo_noble_warriors_grave_modifier: "Cova do Nobre Decapitado"
 mpo_noble_warriors_grave_modifier_desc: "Cortada do corpo na batalha, uma cabeça de alta reputação é enterrada no solo desta terra. Sua cova é um lugar sagrado, bem conhecido e frequentemente visitado."
 custom.every_beheaded_family: "Cada [close_family_member|lE] de [beheaded_warrior.GetShortUIName]"
 warriors_head_artifact: "Cabeça venerada [beheaded_warrior.Custom('ES_DelDela')] [beheaded_warrior.GetTitledFirstNameNoTooltip|l]"
 kin_head_artifact_desc: "O rosto decomposto e irreconhecível de [beheaded_warrior.GetFirstName] de uma querida descendência da Casa [beheaded_warrior.GetHouse.GetName], que foi morto pelas forças de [beheaded_warrior_foe.GetName] em [beheaded_warrior_location.GetName]."
 accolade_head_artifact_desc: "Os restos horripilantes de [beheaded_warrior.GetFirstName], [ROOT.Char.Custom('KnightCultureNoTooltip')|l] de renome, conhecido como \"[beheaded_warrior_accolade.GetName]\". Os guerreiros de [beheaded_warrior_foe.GetName] reivindicam a honra de terem sido os responsáveis por derrubar [beheaded_warrior.GetSheHe] no campo de batalha de [beheaded_warrior_location.GetName]."
 warriors_head_artifact_desc: "A cabeça decepada [beheaded_warrior.Custom('ES_DelDela')] valente [ROOT.Char.Custom('KnightCultureNoTooltip')|l] [beheaded_warrior.GetFirstName], que caiu lutando contra o exército de [beheaded_warrior_foe.GetName] em [beheaded_warrior_location.GetName]. Tratada com reverência pelos outros guerreiros, apesar do seu cheiro fétido."
 keep_warrior_head_tt: "Você mantém a cabeça de [head_artifact.GetName|l]"
 gain_illustrious_victim_head_artifact_tt: "Pode-se conservar a cabeça de [victim.GetFirstName] como [inventory_artifact|lE] $illustrious$"
 gain_famed_victim_head_artifact_tt: "Pode-se guardar a cabeça de [victim.GetFirstName] como [inventory_artifact|lE] $famed$"
 send_head_for_warscore_tt: "Enviar a cabeça de [victim.GetFirstName] ao seu [heir|lE] pode aumentar a Aceitação da [peace|lE] em relação a #high você#!"
 send_head_for_vassalization_tt: "Enviar a cabeça de [victim.GetFirstName] ao seu [heir|lE] pode aumentar sua aceitação de [vassalization|lE]"
 send_head_for_hook_tt: "Enviar a cabeça de [victim.GetFirstName] ao seu [heir|lE] pode fornecer um [weak_hook|lE]"
 send_head_for_prestige_tt: "Pode-se ganhar [prestige|lE] ao enviar a cabeça de [victim.GetFirstName] ao seu [heir|lE]"
 send_head_for_obedience_tt: "Enviar a cabeça de [victim.GetFirstName] ao seu [heir|lE] pode torná-los [obedient|E]"
 headless_heir_rises_to_challenge_tt: "#N Se o sucessor ousadamente jurar vingança:#!"
 mpo_nomad_events.1011.t: "Decapitação"
 mpo_nomad_events.1011.desc_execution_spite: "[victim.GetName] cospe maldições e, mesmo enquanto a lâmina leva sua cabeça, lança-me um olhar furioso."
 mpo_nomad_events.1011.desc_execution_beg: "[victim.GetName] gagueja e implora por sua vida. Em seguida, com um golpe pesado, a cabeça é decepada dos ombros."
 mpo_nomad_events.1011.desc_execution_pray: "Enquanto continua murmurando preces, força-se [victim.GetName] a se ajoelhar. Então, um único golpe poderoso separa a cabeça dos ombros."
 mpo_nomad_events.1011.desc_bad_execution: "Não é com um único golpe limpo, mas com vários golpes grosseiros que a cabeça de [victim.GetName] é separada do seu corpo miserável."
 mpo_nomad_events.1011.desc: "\n\nMiro nos olhos do governante da nação [victim.GetCulture.GetName] quando eles viram em branco pela última vez e seu sangue encharca a terra."
 mpo_nomad_events.1011.desc_send_head: "\n\nSe essa visão macabra fosse compartilhada com [Select_CString(headless_heir.IsFemale, 'la sucesora', 'el sucesor' )] de [victim.GetFirstNameNoTooltip], [headless_heir.Custom('ES_ElLa')] [headless_heir.GetTitledFirstName|l], aprenderia a temer meu poder, minha vontade feroz…"
 mpo_nomad_events.1011.desc_cant_send: "[victim.GetFirtNameNoTooltip] é um pedaço de carne consumido, uma refeição para a carniça…"
 mpo_nomad_events.1011.desc_keep_head: "\n\n… ou talvez esta famosa cabeça pertença a [Select_CString(ROOT.Char.IsFemale, 'aquella', 'aquel' )] que a tomou."
 mpo_nomad_events.1011.a: "Que ninguém esqueça este[victim.Custom('ES_EA')] [victim.GetTitleAsNameNoTooltip|l] decapitado[victim.Custom('ES_OA')]."
 mpo_nomad_events.1011.a.flavor: "E que fui #EMP eu#! quem acabou com sua vida gloriosa!"
 mpo_nomad_events.1011.b: "Enviar este “presente” [headless_heir.Custom('ES_AlAla')][headless_heir.GetTitledFirstNameNoTooltip|l]."
 mpo_nomad_events.1011.b.success: "Seu insulto cruel amedronta [headless_heir.Custom('ES_AlAla')] [headless_heir.GetTitledFirstNameNoTooltip|l]."
 mpo_nomad_events.1011.b.fail: "[headless_heir.Custom('ES_ElLa')|U] [headless_heir.GetTitledFirstNameNoTooltip|l] jura vingança corajosamente"
 mpo_nomad_events.1011.b.flavor: "[Select_CString(headless_heir.IsFemale, 'A nova senhora', 'O novo senhor' )] de [victim.GetPrimaryTitle.GetNameNoTierNoTooltip] deve saber que este é o único fim que aguarda meus inimigos! #EMP Verá com seus próprios olhos!#!"
 mpo_nomad_events.1011.c: "Deixe [victim.GetFirstNameNoTooltip] para os abutres."
 headless_heir_high_tier_warning_tt: "@alert_icon! #alert_trial Aviso: [headless_heir.GetShortUIName] não tem medo de você!#!"
 headless_heir_ignores_challenge_tt: "#P Se o destinatário recuar desse insulto:#!"
 mpo_nomad_events.1012.t: "[victim.Custom('ES_ElLa')|U] [victim.GetTitleAsNameNoTooltip|l] retorna"
 mpo_nomad_events.1012.desc: "Me digno a deixar que o sangue velho me encharque os sapatos, a agarrar a pele fria com as mãos, pois me devolveram a cabeça decepada de [victim.GetName].\n\n“Um insulto! Uma humilhação!”, gritam aos meus ouvidos, enquanto as crianças choram. Meus [ROOT.Char.Custom('KnightCulturePluralNoTooltip')|l] brandem suas espadas e juram vingança.\n\nMas será que mandaram esta cabeça apenas para incutir medo em meu coração? Ou… será que [executioner.Custom('ES_ElLa')] [executioner.GetTitledFirstName|l] deseja meu ódio?"
 mpo_nomad_events.1012.a: "O mais importante é honrar os restos de [victim.GetFirstNameNoTooltip]."
 mpo_nomad_events.1012.a_flavor: "Este \"insulto\" nos permite lavar, adornar e oferecer preces diante da nobre cabeça [victim.Custom('ES_DelDela')] [victim.GetTitledFirstNameNoTooltip|l]."
 mpo_nomad_events.1012.b: "#EMP Este insulto será vingado!#!"
 mpo_nomad_events.1012.b_flavor: "Recebi o rosto ensanguentado da guerra. A voz cadavérica de [victim.GetFirstName] reclama o sangue [executioner.Custom('ES_DelDela')] [executioner.GetTitledFirstName|l]!"
 mpo_nomad_events.1012.c: "Devo recuar, ou enfrentar esse destino..."
 peace_acceptance_head_scare_tt: "Aceitação de [peace|lE] de [headless_heir.GetShortUIName] para #high ti#!. #P +30#! durante #high 20 años#!"
 COWED_BY_SEVERED_HEAD_MODIFIER: "Amedrontado pela decapitação do predecessor: $VALUE|+=0$"
 severed_head_revenge_modifier: "Buscando vingança pela decapitação do predecessor: $VALUE|+=0$"
 severed_head_cb_revenge_tt: "[casus_belli|lE] contra #high [executioner.GetShortUIName]#!: #P -75%#!"
 severed_head_vassalization_tt: "[offer_vassalization|E] de [headless_heir.GetShortUIName] $ep3_laamps.0010.connector$ #high $demand_tributary_interaction$#! Aceitação de [executioner.GetShortUIName]: #P +200#! durante #high 20 anos#!"
 mpo_nomad_events.1013: "Assassino [victim.Custom('ES_DelDela')] [victim.GetTitledFirstNameNoTooltip|l],"
 mpo_nomad_events.1013.desc_takes_it_sedentary: "Uma ameaça selvagem mancha minha [headless_heir.Custom('ResidenceBuilding')|l]; a cabeça decepada de um[victim.Custom('ES_XA')] magnata nobre, meu própri[victim.Custom('ES_OA')] antepassad[victim.Custom('ES_OA')].\n\nPor favor, senhor dos cavalos! Em [headless_heir.GetPrimaryTitle.GetNameNoTier] não costumamos lidar com tais horrores, e temos pouco apreço por eles. Eu preferiria tratar com você de forma amigável a ser tão brutalmente rebaixado."
 mpo_nomad_events.1013.desc_takes_it: "Os [victim.GetCulture.GetCollectiveNoun] haviam esperado voltar a contemplar seu rosto. Agora, sua cabeça repousa sobre o sangue e seus corações se enegreceram com essa visão tão antinatural.\n\nPor favor, permitam que [victim.GetFirstName] tenha paz em [headless_heir.GetFaith.PositiveAfterLife]. Livrai-nos de vossa poderosa ira!"
 mpo_nomad_events.1013.desc_angeee: "Ao me enviarem a cabeça [Select_CString(victim.IsFemale, 'de la señora', 'del señor' )] de [victim.GetPrimaryTitle.GetNameNoTier] me enviaram o rosto ensanguentado da guerra; lábios cinzentos que ainda clamam por vingança.\n\nVerá apodrecer seu corpo. Derrubarei você como uma árvore velha.\n\nPorei a cabeça de [victim.GetFirstName] entre os seus ossos."
 mpo_nomad_events.1013.a.cowed: "Como um cordeirinho, [headless_heir.Custom('ES_ElLa')] [headless_heir.GetTitleAsNameNoTooltip|l] berra e geme!"
 mpo_nomad_events.1013.a.revenge: "E assim... [headless_heir.GetFirstNameNoTooltip] jura vingança."
 executed_head_artifact: "Cabeça régia [victim.Custom('ES_DelDela')] [victim.GetTitledFirstNameNoTooltip|l]"
 executed_head_emperor_artifact_desc: "Ainda usando uma coroa, com seus lábios cinzentos e sobrancelhas costuradas com crina de cavalo para dar uma expressão altiva, a cabeça decepada [victim.Custom('ES_DelDela')] [victim.GetTitleAsNameNoTooltip|l] de [victim.GetPrimaryTitle.GetNameNoTier] inspira temor e admiração.\n\nSe um soberano tão grande[victim.Custom('ES_OA')] pôde enfrentar um destino tão terrível, que horrores aguardam o restante?"
 executed_head_king_artifact_desc: "O último remanescente de [victim.GetName], preservado e decorado como convém ao seu posto na vida. Um testemunho da vontade implacável de seu guardião."
 nomad_defected_invite_desc: "Você exilou este personagem nos últimos 5 anos"
 nomad_defector_wont_come_back_tt: "Você não pode usar #high Convocar para a Corte#! em [rowdy_boy.GetShortUIName] por #high 5 anos#!"
 nomad_defector_family_tt: "Membros da família de [rowdy_boy.GetShortUIName] deixam sua corte"
 nomad_defector_family_wont_come_back_tt: "Você não pode usar #high Convocar para a Corte#! nestes exilados por #high 5 anos#!"
 nomad_defector_gain_all_courtiers_tt: "Ganha alguns dos seus [courtiers|lE] desempregados"
 mpo_nomad_events.1020.t: "O Mais Faminto Entre os Filhotes"
 mpo_nomad_events.1020.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('rowdy_boy'))] [rowdy_boy.GetFirstName] está inquiet[rowdy_boy.Custom('ES_OA')] ultimamente.\n\n\"Roer os ossos da sua carne! Sugar coalhada azeda à sombra da sua yurta! É esta #EMP mi#! vida?\", cospe. \"Estou preparad[rowdy_boy.Custom('ES_OA')] para liderar, [rowdy_boy.Custom2('RelationToMeShort', SCOPE.sC('root_scope'))]! E há alguns entre a sua hoste [ROOT.Char.GetDomicile.GetCulture.GetName] que me seguiriam\".\n\n[Select_CString( rowdy_boy.IsFemale, 'Esta guerrera orgullosa', 'Este guerrero orgulloso' )] [rowdy_boy.GetHouse.GetName] que conservo como um mascote impotente… mostra os dentes."
 mpo_nomad_events.1020.a: "\"Cale-se, [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('rowdy_boy'))]. Saiba seu lugar.\""
 mpo_nomad_events.1020.b: "\"Ninguém pode me desafiar e #EMP viver!#!"
 mpo_nomad_events.1020_duel_tt: "#V Duelo con#! [rowdy_boy.GetFirstName].\n@death_icon! #X ¡Este duelo es a muerte!#!\nSe vencer, ganhará [prowess|lE] @skill_prowess_icon!, [dread|lE] @dread_icon!, [prestige|lE] @prestige_icon! e [stress|lE] @stress_icon!. Se perder, [rowdy_boy.GetShortUIName] tomará seus [titles|lE] como [primary_heir|lE].\n\nSeu [prowess|lE]: #V [root_scope.GetProwess]#! [prowess_i]\n[prowess|lE] de [rowdy_boy.GetFirstName] : #V [rowdy_boy.GetProwess]#! [prowess_i]"
 mpo_nomad_events.1020.c: "\"Eu tenho terras de pasto de sobra.\""
 mpo_nomad_events.1020.c.flavor: "Vou deixar que es[rowdy_boy.Custom('ES_EA')] advenediz[rowdy_boy.Custom('ES_OA')] tenha seus próprios rebanhos… sob meu domínio."
 mpo_nomad_events.1020.d: "\"Cavaleiro, vá longe e faça honra ao seu nome!\""
 mpo_nomad_events.1020.d.flavor: "[rowdy_boy.GetFirstNameNoTooltip] terá tudo o que precisa para se estabelecer por si mesm[rowdy_boy.Custom('ES_OA')]."
 mpo_nomad_events.1020.e: "Vocês não ficarão se voss[ROOT.Char.Custom('ES_OA')] [rowdy_boy.Custom2('RelationToMeShort', SCOPE.sC('root_scope'))] o deseja?"
 mpo_nomad_events.1020.e.success: "[rowdy_boy.GetFirstNameNoTooltip] concorda em permanecer e servir"
 mpo_nomad_events.1020.e.failure: "[rowdy_boy.GetFirstNameNoTooltip] e seus apoiadores saem sorrateiramente"
 mpo_nomad_events.1020.f: "\"Você está desterrad[rowdy_boy.Custom('ES_OA')], [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('rowdy_boy'))]! V? embora!\""
 mpo_nomad_events.1020.f.flavor: "O caminho selvagem e solitário da liberdade espera!"
 attacked_family_opinion: "Atacou um Membro da Minha Família"
 mpo_nomad_events.1022.t: "A morte de um[rowdy_boy.Custom('ES_XA')] advenedizo[rowdy_boy.Custom('ES_OA')]"
 mpo_nomad_events.1022.desc: "Como a pantera que salta temerariamente de um penhasco, como o falcão que mergulha contra sua própria sombra, como o camelo macho que morde os calcanhares de sua cria…, me vejo consumido[ROOT.Char.Custom('ES_OA')] pela ira.\n\nAo final do nosso duelo de honra, [rowdy_boy.GetFirstName] —meu própri[rowdy_boy.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('rowdy_boy'))]— jaz mort[rowdy_boy.Custom('ES_OA')].\n\nÀ medida que os tambores da minha ira legítima se aquietam, começo a ouvir sons de luto. Meu povo chora diante da demonstração do meu poder."
 mpo_nomad_events.1022.a: "Fiz o que um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] deve fazer."
 mpo_quelled_family_dissent_modifier: "Mata a Parente Dissidente"
 mpo_quelled_family_dissent_modifier_desc: "Um membro da família que desafiou a temível autoridade deste personagem... não sobreviveu por muito tempo."
 mpo_nomad_events.1030.t: "Educação nos Três"
 mpo_nomad_events.1030.desc: "Enquanto considero as habilidades guerreiras dos meus [ROOT.Char.Custom('KnightCulturePluralNoTooltip')|l], m [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))] [child.GetFirstName] é trazido até mim.\n\n\"[child.Custom2('RelationToMeShort', SCOPE.sC('root_scope'))|U],\" o(a) filho(a) pergunta, \"qual é o principal entre os três?"
 mpo_nomad_events.1030.desc_mongolic: "[Glossary( 'nadaam', 'NADAAM_GLOSS')]?\n\nM [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))] pode se comprometer ao brutal teste do [Glossary( 'bökh', 'BOKH_GLOSS')],"
 mpo_nomad_events.1030.desc_non_mongolic: "grandes esportes?\n\nM [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))] pode se comprometer ao brutal teste da luta,"
 mpo_nomad_events.1030.desc.outro: "com a sutil arte do arco… ou talvez deva dominar a arte equestre que guia nossos rebanhos e traz nossos saqueadores rapidamente de volta para casa?\""
 NADAAM_GLOSS: "O #bold Erin Gurban Naadam#! ou 'três jogos viris' são os esportes principais praticados pelos povos Mongólicos desde a era Neolítica, e os principais espetáculos de festivais e competições. Estes são: arco composto, luta e corrida de longa distância a cavalo."
 BOKH_GLOSS: "O estilo tradicional e antigo de luta Mongólica, onde o objetivo principal é arrastar a parte superior do corpo do oponente para o chão. Alguns estilos permitem técnicas como agarrar e chutar as pernas, mas em geral é um teste de força bruta e imobilidade, e pode durar horas."
 mpo_nomad_events.1030.a: "Deixe-me para o meu treinamento!"
 mpo_nomad_events.1030.a.flavor: "Esforçar-se até ficar sem fôlego e com dores é tudo o que importa!"
 mpo_nomad_events.1030.b: "Prove que você pode se manter firme como uma montanha."
 mpo_nomad_events.1030.c: "Você ganhará o jantar com suas flechas."
 mpo_nomad_events.1030.c.flavor: "Um marmoto é mais astuto do que qualquer um dos alvos em nosso território... mas pelo menos é uma marca maior."
 mpo_nomad_events.1030.d: "Ganhe a confiança de um corcel, [child.Custom('GirlBoy')]."
 mpo_nomad_events.1030.d.flavor: "E sobre seu cavalo obediente, você poderá cantar e se juntar às grandes corridas."
 is_nomadic_tt: "Você tem [nomadic_government|lE]"
 capital_county_not_in_steppe_tt: "Sua [capital|lE] não está em [the_great_steppe|lE]"
 higher_prestige_cost_because_pagan_tt: "@warning_icon! #X O custo de @prestige_icon![prestige|lE] é quadruplicado porque sua [faith|lE] é [GetFaithDoctrine('unreformed_faith_doctrine').GetBaseName|l]"
 nomad_domicile_buildings_converted: "Os [buildings|lE] do [domicile|lE] de [Select_CString( former_nomad.IsLocalPlayer, 'seu personagem', former_nomad.GetShortUIName )] são trocados por [gold|lE] [gold_i]"
 nomad_settling_gain_kingdom_counties_tt: "É [revoked|lE], se mantido por um [vassal|lE] de [culture|lE] diferente"
 mpo_nomad_events.1040.t: "Uma Casa Além das Estepes"
 mpo_nomad_events.1040.desc_duchy: "#EMP ¡Fuera, [defender.GetTitledFirstName|l]!#! Fora com os pusilânimes, fora deste lugar com voss[defender.Custom('ES_OA')] [defender.Custom('MistressMaster')] derrotad[defender.Custom('ES_OA')]! Aos brandos [expelled_culture.GetCollectiveNoun] são governados por um[ROOT.Char.Custom('ES_XA')] nov[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsName|l]. Aprenderão a agradar[ROOT.Char.GetHerHim] ou descobrirão que isto é apenas o alvorecer de sua subjugação!\n\n[target.GetBaseNameNoTierNoTooltip] será um ótimo lar para o meu povo. Chega de sermos espalhados como poeira pelas planícies! Aqui, a vida sedentária é nossa, e os habitantes locais trabalharão para nos proporcionar conforto.\n\nEm [ROOT.Char.GetCapitalLocation.GetName], na opulência da minha [ROOT.Char.Custom('ResidenceBuilding')] que domina seu [ROOT.Char.GetCapitalLocation.GetTerrain.GetNameNoTooltip|l], meu corpo cansado da guerra descansará… enquanto minha mente começa a refletir sobre"
 mpo_nomad_events.1040.desc: "#EMP Fuera, [defender.GetTitledFirstName|l]! Fuera, [expelled_culture.GetCollectiveNoun]!#! Com seus filhos gordinhos nos ombros, sua fortuna espalhada à sua frente, fujam do cavaleiro [ROOT.Char.GetCulture.GetName] e de suas flechas!\n\n[target.GetBaseNameNoTier] fica para o meu povo. Nunca mais seremos espalhados como poeira pelas planícies. Aqui, as vidas assentadas são nossas: o trabalho dos habitantes locais que restam e do nosso próprio povo comum servirá ao nosso conforto.\n\nEm [ROOT.Char.GetCapitalLocation.GetName], na opulência da minha [ROOT.Char.Custom('ResidenceBuilding')] que domina sua [ROOT.Char.GetCapitalLocation.GetTerrain.GetNameNoTooltip|l], meu corpo exausto da guerra descansará… enquanto minha mente começa a refletir sobre"
 mpo_nomad_events.1040.desc_tribal: "onde um [ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] sedentário[ROOT.Char.Custom('ES_OA')]."
 mpo_nomad_events.1040.desc_clan: "o clã nobre de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] e seus muitos impostos."
 mpo_nomad_events.1040.desc_feudal: "as leis de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] feudal."
 mpo_nomad_events.1040.a: "Aqui termina o vagar do meu povo."
