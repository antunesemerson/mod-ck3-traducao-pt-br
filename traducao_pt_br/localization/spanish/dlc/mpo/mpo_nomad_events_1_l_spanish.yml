 mpo_nomad_events.1050.t: "Terras de Pastagem Mais Amplas"
 mpo_nomad_events.1050.desc: "[herder.Custom('ES_ElLa')|U] [herder.GetTitledFirstName|l], um[herder.Custom('ES_XA')] [herder.GetWomanMan] vindo[herder.Custom('ES_OA')] a menos que cheira a mijo de cabra, se proclama [Select_CString( herder.IsFemale, 'la guardiana', 'el guardián' )] do/de a [herder.GetCapitalLocation.GetTerrain.GetNameNoTooltip|l] junto a [herder_county.GetNameNoTier].\n\n«Vosso exército [ROOT.Char.GetPrimaryTitle.GetAdjective] de pastores não faz caso dos limites tradicionais!», diz. «Levo meu rebanho para um novo terreno, e a terra já está esgotada! O vento traz as risadas dos vossos cavaleiros e o som de seus cavalos gordos».\n\n«Podemos compartilhar a terra honestamente, [ROOT.Char.GetTitleAsName|l]?»."
 mpo_nomad_events.1050.a: "Para mim, os limites tradicionais não significam #EMP nada#!."
 mpo_nomad_events.1050.b: "\"Empreste-me sua língua honesta, e sua coragem!\""
 mpo_nomad_events.1050.b.flavor: "Transformarei em um[herder.Custom('ES_XA')] cavaleiro honrado a [Select_CString( herder.IsFemale, 'esta pastora', 'este pastor' )] repelente e linguarud[herder.Custom('ES_OA')]!"
 mpo_nomad_events.1050.c: "\"Arruinarei aqueles que lhe prejudicaram.\""
 mpo_nomad_events.1050.c.flavor: "Pois parece que meu rebanho cresceu além do meu controle..."
 mpo_nomad_events.1050.d: "#EMP Fujam dos meus animais, [Select_CString( herder.IsFemale, 'pastorinha', 'pastorzinho' )]#!!."
 mpo_nomad_events.1060.t: "Troca com as Ovelhas"
 mpo_nomad_events.1060.desc: "Além de minhas terras de pastagem, agacha-se o assentamento de [neighbor_province.GetName], um lugar que ressoa com o bater de martelos, o rangido das rodas e o falatório da multidão de [county_culture.GetName].\n\nVisitamos para trocar animais por bens refinados. Os comerciantes barrigudos nos encaram com suspeita e medo.\n\n\"Vejam, armas forjadas em [neighbor.Custom('RegionalWeaponMetal')]! Roupas elegantes de [neighbor.Custom('RegionalFabric')]!\", grasnam meus companheiros. \"E moedas de metal precioso!\"."
 mpo_nomad_events.1060.a: "Vocês acham que #EMP é isso#! o que vale uma moeda de prata...?"
 mpo_nomad_events.1060.a.flavor: "Esses fracos assentados logo aprenderão que nós 'selvagens' não somos tão facilmente enganados..."
 mpo_nomad_events.1060.b: "\"Pegue tudo! #EMP E cavalgue rápido!#!"
 mpo_nomad_events.1060.b.flavor: "Um[ROOT.Char.Custom('ES_XA')] autêntic[ROOT.Char.Custom('ES_OA')] [ROOT.Char.Custom('GetDaughterSon')] da estepe não negocia com os fracos!"
 mpo_nomad_events.1060.b.success: "Sua comitiva escapa com os bens roubados"
 mpo_nomad_events.1060.b.failure: "Você abandona o saque para escapar por pouco"
 mpo_nomad_events.1060.c: "\"Tragam peles, iogurte, cavalos finos!\""
 mpo_nomad_events.1060.c.flavor: "Trocar nossos bens com os assentamentos de [neighbor.GetTopLiege.GetPrimaryTitle.GetNameNoTooltip] só pode nos beneficiar."
 nomad_trading_mastery_modifier: "Magnata do Comércio"
 nomad_trading_mastery_modifier_desc: "Este nômade entende bem o verdadeiro valor das moedas estrangeiras e dos bens de luxo. Talvez até melhor do que seus fornecedores."
 nomad_trading_partners_modifier: "Acordos Comerciais Sedentários"
 nomad_trading_partners_modifier_desc: "Este nômade engaja ativamente no comércio de produtos animais pastoris por ferramentas, luxos e moedas."
 mpo_nomad_events.1070.t: "Perdido na Noite"
 mpo_nomad_events.1070.desc_intro: "Desperto sentindo hálito de cavalo na boca.\n\n"
 mpo_nomad_events.1070.desc_has_horse: "Enquanto meu corcel [ROOT.Char.Custom('WarhorseStoryName')]"
 mpo_nomad_events.1070.desc_new_horse: "Como um cavalo desconhecido"
 mpo_nomad_events.1070.desc: "me cutuca com o focinho; o vento uiva pela [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip|l]. Nós dois estamos sozinhos na natureza.\n\nMinha mente é uma pedra lisa; o que #EMP passou#! entre o último entardecer e este frio amanhecer? Meu povo… me abandonou? Não! As lembranças vêm,"
 mpo_nomad_events.1070.desc_spiritual: "carregando os sussurros dos espíritos, contando sobre o transe sagrado que me acordou da cama, me levou até um cavalo solitário à luz da lua..."
 mpo_nomad_events.1070.desc_mental_thing: "uivando minhas próprias maldições loucas da meia-noite: embora minha gente tenha tentado me acalmar, eu não poderia estar entre eles. Fui para a noite com apenas este cavalo silencioso..."
 mpo_nomad_events.1070.desc_new_drunk: "carregando pesadas tigelas de [Glossary( 'kumis', 'KUMIS_GLOSS')], batidas de cascos, e a sensação de uma crina escura pressionada contra minha bochecha..."
 mpo_nomad_events.1070.a: "Você é uma besta leal, não é?"
 begin_warhorse_story_tt: "Este cavalo se torna o seu querido favorito"
 mpo_nomad_events.1070.b: "Nunca mais! Juro, cavalo: #EMP nunca mais!#!"
 mpo_nomad_events.1070.c: "[ROOT.Char.GetFaith.HighGodNamePossessive] me trouxe até este lugar sagrado."
 mpo_nomad_events.1070.c.flavor: "Não devo sucumbir ao pânico. Há forças naturais aqui com as quais sou amigo, e elas me levarão para casa."
 mpo_nomad_events.1070.d: "De volta para casa! Um[ROOT.Char.Custom('ES_XA')] nômade nunca se perde."
 mpo_nomad_events.1070.d.flavor: "Mesmo quando a cabeça lhe dói tanto que mal consegue enxergar…"
 mpo_nomad_events.1070.d.success: "Você refaz os rastros do cavalo"
 mpo_nomad_events.1070.d.failure: "Você não encontra o caminho para casa antes que a noite retorne"
 mpo_nomad_events.1070.e: "Certamente, cavalo, você se lembra do caminho de volta..."
 nomad_alone_in_adversity_modifier: "Confia nos Cavalos"
 nomad_alone_in_adversity_modifier_desc: "Quando em uma situação terrível, este nômade confia nada mais do que no instinto de sobrevivência e na velocidade dos cavalos."
