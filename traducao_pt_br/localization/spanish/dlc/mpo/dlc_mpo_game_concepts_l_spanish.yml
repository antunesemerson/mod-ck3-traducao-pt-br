l_spanish:
 game_concept_nomadic_government: "Governo Nômade"
 game_concept_nomadic: "Nômade"
 game_concept_nomadic_desc: "Os [rulers|lE] nômades pastam [county_fertility|lE] para aumentar sua [herd|lE]. Podem empregar a manada como [horde|lE], que pode ser melhorada para [men_at_arms|lE]. Eles têm uma [yurt|lE].\n\nOs nômades podem [migrate|lE] para encontrar terras mais férteis, embora os grandes [realms|lE] nômades possam aumentar sua manada por meio de [tributaries|lE] ou ao alcançar um [fertility_equilibrium|lE] alto.\n\nOs nômades têm um [dread|lE] máximo mais alto."
 game_concept_nomad_i: "@government_type_nomad!"
 game_concept_nomads: "Nômades"
 game_concept_nomads_desc: "$game_concept_nomadic_desc$"
 game_concept_nomad: "Nômade"
 game_concept_nomad_desc: "$game_concept_nomadic_desc$"
 game_concept_confederation_government: "Governo de Confederação"
 game_concept_confederation: "Confederação"
 game_concept_confederations: "Confederações"
 game_concept_confederation_desc: "Uma relação que une [rulers|lE] [Concept('tribal', 'tribais')|E] ou [Concept('nomadic', 'nômades')|E] em defesa mútua, semelhante a uma [alliance|lE]. Uma confederação é formada por meio da [decision|lE] #high $call_for_confederation_decision$#! e exige que seus membros se juntem às [wars|lE] defensivas uns dos outros. As confederações são visíveis na aba Diplomacia.\n\nOs outros [confederates|lE] também não podem se atacar nem [Concept('raid', 'atacar')|E] entre si. Eles ficam impedidos de adotar níveis altos de [tribal_authority|lE] e [nomadic_authority|lE], e não podem criar novos [titles|lE].\n\nOs [confederates|lE] podem usar a [decision|lE] #high $leave_confederation_decision$#! ou [migrate|lE] para se tornarem [Concept('independent', 'independentes')|E]. Se uma confederação ficar com apenas um membro, ela é destruída."
 game_concept_confederate: "Confederado"
 game_concept_confederates: "Confederados"
 game_concept_confederate_desc: "Um [ruler|lE] que está em uma [confederation|lE]. Eles se unem automaticamente às [wars|lE] defensivas dos outros confederados e têm restrição para atacá-los ou [Concept('raiding', 'asaltarlos')|E]."
 game_concept_county_fertility: "Fertilidade do Condado"
 game_concept_county_fertility_desc: "A $game_concept_county_fertility$ existe nos [counties|lE] localizados na [the_great_steppe|lE], e os [rulers|lE] [GetGovernment( 'nomad_government' ).GetName|l]s podem pastar neles para aumentar seu [herd|lE].\n\nA fertilidade de um condado representa a qualidade dos pastos.\n\nA fertilidade se estabiliza em torno do [fertility_equilibrium|lE], permitindo que os governantes nômades com um [domain_limit|lE] elevado sustentem o crescimento de seu rebanho. A fertilidade é afetada pelas [steppe_seasons|lE], e os [herders|lE] a repõem lentamente.\n\nQuando a fertilidade de um [realm|lE] está baixa, é um sinal para [migrate|lE].\n\nO [county_control|lE] reduz a taxa de crescimento da fertilidade em uma porcentagem igual ao controle atual."
 game_concept_county_fertility_i: "@county_fertility_icon!"
 game_concept_fertility_equilibrium: "Equilíbrio de Fertilidade"
 game_concept_fertility_equilibrium_desc: "O equilíbrio de fertilidade é uma previsão de quão fértil o [county|lE] se tornará no longo prazo. É o valor para o qual a [county_fertility|lE] tende ao longo do tempo.\n\nSe a [county_fertility|lE] atual estiver abaixo do equilíbrio, ela crescerá; se estiver acima, diminuirá.\n\nO equilíbrio de fertilidade e a velocidade de mudança dependem principalmente da proporção entre os modificadores de Crescimento e Consumo do [county|lE]. Se tanto o Crescimento quanto o Consumo forem relativamente baixos, qualquer mudança terá um efeito muito maior sobre o equilíbrio."
 game_concept_equilibrium: "Equilíbrio"
 game_concept_domain_fertility: "Fertilidade do Domínio"
 game_concept_domain_fertility_desc: "A fertilidade do domínio é o total da [Concept('county_fertility', 'fertilidad')|E] de todos os [counties|lE] que você possui."
 game_concept_seasonal_prediction: "Previsão Sazonal"
 game_concept_seasonal_prediction_desc: "Um habilidoso $court_position_court_astrologer$ pode prever a próxima [steppe_season|El] em uma região, oferecendo informações úteis ao seu liege para planejar seus próximos movimentos."
 game_concept_kurultai: "Curiltai"
 game_concept_kurultais: "Curiltais"
 game_concept_kurultai_member: "Membro do Curiltai"
 game_concept_kurultai_members: "Membros do Curiltai"
 game_concept_kurultai_desc: "O Curiltai substitui o [council|lE] para o [nomadic_government|lE]. Os membros do Curiltai estão entre a elite do reino e devem ser ou apaziguados ou forçados à [obedience|lE] para garantir uma [succession|lE] tranquila.\n\nApós um evento de sucessão caótica, eles podem roubar parte do [herd|lE], abandonar seu novo [liege|lE], e ganhar uma [claim|lE] sobre o [title|lE] do [realm|lE]."
 game_concept_kurultai_1_desc: "$game_concept_kurultai_desc$"
 game_concept_kurultai_2_desc: "$game_concept_kurultai_desc$"
 game_concept_kurultai_3_desc: "$game_concept_kurultai_desc$"
 game_concept_kurultai_4_desc: "$game_concept_kurultai_desc$"
 game_concept_herd: "Rebanho"
 game_concept_herd_desc: "A $game_concept_herd$ representa o povo e o rebanho de um [ruler|lE] [GetGovernment( 'nomad_government' ).GetName|l], composto por animais como cavalos, ovelhas e cabras.\n\nPode ser obtido ao possuir [counties|El] com alta [county_fertility|lE], [vassals|lE] ou [tributaries|lE]. As [traditions|lE] culturais, as [dynasty_perks|lE], a [legitimacy|lE] e certos [Concept('yurt_buildings', 'edifícios')|E] de [yurt|lE] podem oferecer bônus à obtenção de $game_concept_herd$.\n\nUma fração do rebanho é convertida em [horde|lE] quando um governante reúne seus [armies|lE], e então pode ser transformada em [men_at_arms|lE] a um custo reduzido. Quando esses exércitos forem dissolvidos, o restante da horda voltará a ser rebanho.\n\nO rebanho também fornece um pequeno fluxo de ouro e pode ser usado como moeda para tomar certas [decisions|lE] ou aumentar a aceitação de [migration|lE]."
 game_concept_herd_i: "@herd_icon!"
 game_concept_horde: "Horda Nômade"
 game_concept_horde_desc: "A $game_concept_horde$ é a representação da força militar de um [ruler|lE] [GetGovernment( 'nomad_government' ).GetName|l]. É obtida como uma fração de seu [herd|lE] e só aparece quando o [ruler|lE] reúne seus [armies|lE].\n\nEles são convertidos em [GetMaA('nomadic_riders').GetName|l] que podem ser aprimorados para outros [men_at_arms|lE] mediante o pagamento de [gold|lE].\n\nCertas [traditions|lE] culturais, legados de dinastia [Concept('dynasty', 'dinásticos')|E] e [yurt_buildings|lE] podem aumentar a taxa de conversão."
 game_concept_herder: "Pastor"
 game_concept_herder_desc: "Os reinos de pastores estão à margem de todo aspecto de governo. Não comandam [armies|lE], não possuem [buildings|lE], não criam [alliances|lE] nem declaram [wars|lE]. Quando os [nomads|lE] [Concept('migrate', 'migran')|E] de uma [holding|lE], os pastores reporão lentamente a [county_fertility|lE] local em virtude do menor tamanho de seu rebanho.\n\nTemem legítimos [rulers|lE] [Concept('nomad', 'nómadas')|E] e entregarão imediatamente suas terras quando desafiados."
 game_concept_herder_i: "@government_type_herder!"
 game_concept_herders: "Pastores"
 game_concept_herders_desc: "$game_concept_herder_desc$"
 game_concept_nomadic_holding: "Assentamento Nômade"
 game_concept_nomadic_holding_desc: "Os $game_concept_nomadic_holdings$ indicam a existência de uma [yurt|lE] no mapa. São um [holding_type|lE] usado por [rulers|lE] [GetGovernment( 'nomad_government' ).GetName|l] e fornecem pequenas quantidades de [Concept('county_control', 'control')|E] e [county_opinion|lE]."
 game_concept_nomadic_holdings: "Assentamento Nômade"
 game_concept_nomadic_holdings_desc: "$game_concept_nomadic_holding_desc$"
 game_concept_herder_holding: "Assentamento Pastoril"
 game_concept_herder_holding_desc: "Um $game_concept_herder_holding$ é o menor dos [holding_types|lE]. Eles indicam a presença de [herders|lE] na região e fornecem bônus à [county_fertility|lE]."
 game_concept_nomadic_authority: "Dominância"
 game_concept_nomadic_authority_desc: "A $game_concept_nomadic_authority$ representa o poder projetado de um [ruler|lE] [GetGovernment( 'nomad_government' ).GetName|l]. Pode aumentar com o tamanho da [herd|lE] e desbloqueará opções adicionais de [migration|lE].\n\nExistem cinco níveis diferentes de $game_concept_nomadic_authority$: [unruly_nomadic|lE], [limited_nomadic|lE], [high_nomadic|lE], [absolute_nomadic|lE] e [unrestricted_nomadic|lE].\n\n #weak Apenas um governante por partida pode obter o último nível.#!"
 game_concept_dominance: "$game_concept_nomadic_authority$"
 game_concept_unruly_nomadic: "Nômades Indisciplinados"
 game_concept_unruly_nomadic_desc: "$game_concept_unruly_nomadic$ é o nível mais baixo de [nomadic_authority|lE]. Com este nível, a [migration|lE] só pode ser direcionada para [titles|lE] de [county|lE] [de_jure|lE] que estejam em [the_great_steppe|lE], e não podem ser [Concept('imprisoned', 'encarcelar')|lE] [characters|lE]."
 game_concept_limited_nomadic: "Limitado"
 game_concept_limited_nomadic_desc: "A $game_concept_limited_nomadic$ é o segundo nível mais baixo de [nomadic_authority|lE]. A [migration|lE] pode ser direcionada contra [titles|lE] de [duchy|lE] [de_jure|lE] que estejam em [the_great_steppe|lE]. Os títulos podem ser revogados e o suserano pode [Concept( 'imprison', 'encarcelar' )|E] os [characters|lE] de seu [realm|lE].\n\nPode-se usar a [decision|lE] #V $step_away_from_the_steppe_decision$#!"
 game_concept_high_nomadic: "Alta"
 game_concept_high_nomadic_desc: "$game_concept_high_nomadic$ é o nível intermediário de [nomadic_authority|lE]. Nesse nível, [migration|lE] pode ter como alvo [titles|lE] [de_jure|lE] de [kingdom|lE] dentro da [the_great_steppe|lE], e o suserano pode [retract|lE] os vassalos de um [vassal|lE]."
 game_concept_absolute_nomadic: "Absoluta"
 game_concept_absolute_nomadic_desc: "$game_concept_absolute_nomadic$ é o segundo nível mais alto da [nomadic_authority|lE]. Com este nível, a [migration|lE] pode se direcionar contra [titles|lE] de [empire|lE] [de_jure|lE] que estejam em [the_great_steppe|lE].\n\nOs [rulers|lE] [Concept('independent', 'independientes')|E] podem se estabelecer fora da estepe com a [decision|lE] #high $settle_the_steppe_decision$#!"
 game_concept_unrestricted_nomadic: "Irrestrita"
 game_concept_unrestricted_nomadic_desc: "$game_concept_unrestricted_nomadic$ é o nível mais alto de [nomadic_authority|lE]. Apenas um [character|lE] em toda a partida pode obter esse nível e se tornará [GetTrait('greatest_of_khans').GetName( GetNullCharacter )|l].\n\nOs [rulers|lE] [Concept('independent', 'independientes')|E] podem usar as [decisions|E] #high $mpo_become_greatest_of_khans_decision$#! e #high $mpo_gok_world_conquest_decision$#!"
 game_concept_the_great_steppe: "A Grande Estepe"
 game_concept_the_great_steppe_desc: "$game_concept_the_great_steppe$ representa o mar de grama interminável da Estepe Eurasiática e as condições climáticas que a moldam, e está dividida em três regiões: ocidental, central e oriental.\n\nAs diferentes [steppe_seasons|lE] apresentam eventos positivos e negativos que oferecem oportunidades para realizar ações especiais disponíveis somente nesse período, que modificam a [Concept('county_fertility', 'fertilidade')|E] de cada região.\n\nSó os [rulers|lE] [GetGovernment( 'nomad_government' ).GetName|l]s e [Concept('herder', 'pastores')|E] podem participar dessas [Concept('situation', 'situações')|E], e o [gurkhan|lE] representa o governante mais poderoso de toda a região."
 game_concept_suzerain: "Suserano"
 game_concept_suzerain_desc: "$game_concept_suzerain$ é aquele [ruler|lE] com pelo menos um [tributary|lE]. Os soberanos podem ser, por sua vez, tributários de outro [ruler|lE], mas jamais serão [vassals|lE]."
 game_concept_suzerains: "Suseranos"
 game_concept_suzerains_desc: "$game_concept_suzerain_desc$"
 game_concept_suzerain_possessive: "do Suserano"
 game_concept_tributary: "Tributário"
 game_concept_tributary_desc: "$game_concept_tributary$ é aquele [ruler|lE] que chegou a um acordo com outro governante: seu [suzerain|lE].\n\nO $game_concept_tributary$ fornece um tributo periódico na forma de [herd|lE], [taxes|lE], [prestige|lE] e até mesmo [piety|lE] (dependendo do seu tipo) e, em troca, ganha uma [truce|lE] com o $game_concept_suzerain$.\n\nOs tributários são uma forma menos rígida de súditos que não podem se juntar a [factions|lE], mas podem se libertar se suas exigências não forem atendidas.\n\nSe o suserano não [Concept('landed', 'tem terras')|E] nem está [migrating|El], os tributários se libertarão após um curto período de tempo."
 game_concept_tributaries: "Tributários"
 game_concept_tributary_possessive: "do tributário"
 game_concept_tributaries_desc: "$game_concept_tributary_desc$"
 game_concept_subject: "Súdito"
 game_concept_subject_desc: "$game_concept_subject$ é qualquer [ruler|lE] que tenha jurado lealdade a outro. Eles podem ser de tipos שונים, como [vassals|lE] ou [tributaries|lE], cada um com suas próprias características."
 game_concept_subjects: "Súditos"
 game_concept_subjects_desc: "$game_concept_subject_desc$"
 game_concept_steppe_season: "Estação da Estepe"
 game_concept_steppe_season_desc: "Uma $game_concept_steppe_season$ representa o clima atual da [the_great_steppe|lE] e os efeitos que isso tem em [county_fertility|El], assim como as ações disponíveis para os [rulers|lE] envolvidos na [situation|lE].\n\nAs $game_concept_steppe_seasons$ são independentes em cada região, e os governantes [GetGovernment( 'nomad_government' ).GetName|l] podem querer se deslocar para uma com estações ativas positivas.\n\nEm algumas ocasiões, a mesma estação pode ocorrer em mais de uma [situation_sub_region|lE] ao mesmo tempo."
 game_concept_steppe_seasons: "Estações da Estepe"
 game_concept_steppe_seasons_desc: "$game_concept_steppe_season_desc$"
 game_concept_situation: "Situação"
 game_concept_situation_situations: "Situações"
 game_concept_situation_desc: "Os $game_concept_situation_situations$ são eventos de médio a longo prazo que envolvem personagens em uma [situation_sub_region|El], alternando entre diferentes [situation_phases|El]."
 game_concept_situation_phase: "Fase da Situação"
 game_concept_situation_phase_desc: "Cada $game_concept_situation_phase$ possui seus próprios modificadores e condições que afetam os personagens envolvidos.\n\nAlgumas $game_concept_situation_phases$ são ativadas por condições específicas, enquanto outras apenas seguem a passagem do tempo."
 game_concept_situation_phases: "Fases da Situação"
 game_concept_situation_phases_desc: "$game_concept_situation_phase_desc$"
 game_concept_situation_sub_region: "Região da Situação"
 game_concept_situation_sub_regions: "Regiões da Situação"
 game_concept_situation_sub_region_desc: "[situation_situations|El] podem ter mais de uma região, cada uma com [situation_phases|El] independentes."
 game_concept_situation_sub_regions_desc: "$game_concept_situation_sub_region_desc$"
 game_concept_situation_participant_group: "Grupo Participante"
 game_concept_situation_participant_groups: "Grupos de participantes"
 game_concept_situation_participant_group_desc: "Os grupos de participantes em uma [situation|El] são uma coleção de personagens que compartilham os mesmos efeitos durante cada [situation_phase|El]."
 game_concept_situation_catalyst: "Catalisador da situação"
 game_concept_situation_catalyst_catalyst: "Catalisador"
 game_concept_situation_catalyst_catalysts: "Catalisadores"
 game_concept_situation_catalyst_desc: "Certas [situation_situations|lE] mudam entre [situation_phases|lE] quando ocorre um $game_concept_situation_catalyst$\n\nNa janela de $game_concept_situation$ pode-se encontrar uma lista de quais $game_concept_situation_catalyst$ são importantes em cada $game_concept_situation_phase$."
 game_concept_migration: "Migração"
 game_concept_migration_desc: "A $game_concept_migration$ é essencial para os [nomads|lE]. Quando a [Concept('county_fertility', 'fertilidade')|E] de seus [realms|lE] é baixa, eles frequentemente se deslocarão em busca de pastos mais verdes.\n\nA migração só pode ser direcionada a [titles|lE] [de_jure|lE], e os [title_tiers|lE] acessíveis são limitados pela [nomadic_authority|lE] do [ruler|lE].\n\nUma proposta será enviada ao nômade com a maior [herd|lE] na área desejada, e ele poderá decidir se deixará suas terras voluntariamente ou se irá à guerra para defendê-las.\n\nOs [herders|lE] sempre deixarão suas terras, pois não têm meios para se defender."
 game_concept_migrate: "Migrar"
 game_concept_migrate_desc: "$game_concept_migration_desc$"
 game_concept_migrates: "Migra"
 game_concept_migrated: "Migrado"
 game_concept_migrating: "Migrando"
 game_concept_raid_intent: "Intenção de Saque"
 game_concept_raid_intent_desc: "Um $game_concept_raid_intent$ pode modificar os tipos de recompensas obtidas em um [raid|lE], a velocidade de movimento de um exército ou a capacidade de [loot|lE]. Além das incursões normais para obter [gold|lE] e [prestige|lE], há alternativas, como tentar destruir [buildings|lE] ou aumentar a chance de [imprisoning|lE] [characters|lE]."
 game_concept_raid_intents: "Intenções de Saque"
 game_concept_raid_intents_desc: "$game_concept_raid_intent_desc$"
 game_concept_gurkhan: "Grão-Cã"
 game_concept_gurkhan_desc: "A maior ameaça da [the_great_steppe|lE]. O $game_concept_gurkhan$ é o [ruler|lE] [GetGovernment( 'nomad_government' ).GetName|l] com o maior [herd|lE] de toda a região, sendo um poderoso aliado ou um inimigo temível.\n\nApenas o $game_concept_gurkhan$ pode alcançar o nível mais alto de [nomadic_authority|E], o que permite que ele se torne o [GetTrait('greatest_of_khans').GetName( GetNullCharacter )|l] e o marca como alvo."
 game_concept_yurt: "Capital Nômade"
 game_concept_yurt_desc: "As $game_concept_yurts$ são conjuntos móveis de tendas, gado, pessoas e cavalos. Podem variar de apenas algumas ovelhas a uma horda estrondosa.\n\nOs [rulers|lE] [GetGovernment( 'nomad_government' ).GetName|l]s têm uma $game_concept_yurt$ que desenvolvem por meio de [yurt_buildings|lE] e levam consigo quando [migrate|lE]. Não podem construir [buildings|lE] normais em [holdings|lE].\n\nA $game_concept_yurt$ tem uma [faith|lE] e [culture|lE] que representam a maioria do povo migrante, e que podem ser diferentes das do [ruler|lE].\n\nA [court|lE] inteira viaja com ele, assim como sua [family|lE], [kurultai|lE] e [knights|lE]."
 game_concept_yurts: "Capitais Nômades"
 game_concept_yurts_desc: "$game_concept_yurt_desc$"
 game_concept_yurt_buildings: "Edifícios da Capital Nômade"
 game_concept_yurt_buildings_desc: "Os $game_concept_yurt_buildings$ são melhorias especiais para a $game_concept_yurt$.\n\nNa prática, são [domicile_buildings|El], embora muitos deles representem costumes sociais ou simplesmente áreas de interesse da tribo $game_concept_nomad$, em vez de serem estruturas literalmente.\n\nEntre os bônus que conferem, estão:\n$EFFECT_LIST_BULLET$ Desbloqueio de [court_positions|El] e [decisions|El] nômadas e [Concept('character_interaction', 'interações de personagens')|E]\n$EFFECT_LIST_BULLET$ Vários bônus para a [herd|El] e para a [county_fertility|El], incluindo especializações de [terrain|El]\n$EFFECT_LIST_BULLET$ Desbloqueio e melhoria dos [men_at_arms|El] nômadas e aumento da força da [horde|El]\n$EFFECT_LIST_BULLET$ Bônus únicos de [culture_tradition|El] nômada\n$EFFECT_LIST_BULLET$ Formas de gerenciar seus [vassals|El] e [tributaries|El], bem como influenciar os [characters|El] de sua corte.\n$EFFECT_LIST_BULLET$ Bônus para o [kurultai|El] e para a [obedience|El]."
 game_concept_yurt_building: "Edifício da Capital Nômade"
 game_concept_yurt_building_desc: "$game_concept_yurt_buildings_desc$"
 game_concept_obedience: "Obediência"
 game_concept_obedience_desc: "Nos [realms|lE] [GetGovernment( 'nomad_government' ).GetName|l]s, a obediência indica a lealdade de um [character|lE] ao seu [liege|lE], [suzerain|lE] ou ao titular de sua [court|lE]. Os personagens só podem ser obedientes a um [ruler|lE] de cada vez.\n\nOs personagens obedientes têm menor probabilidade de participar em [hostile_schemes|lE], tomar parte em [wars|lE] ou se juntar a [factions|lE] contra seu senhor. Sempre apoiarão as preferências de seu senhor durante uma [succession|lE] e não reivindicarão os [claims|lE] que tiverem. Os [tributaries|lE] não obedientes podem tentar se libertar.\n\nQuando a pontuação de um personagem ultrapassa o [obedience_threshold|lE], ele se torna obediente."
 game_concept_obedient: "Obediente"
 game_concept_obedience_i: "@obedience_icon!"
 game_concept_obedient_desc: "$game_concept_obedience_desc$"
 obedience_value: "[obedience|E]:"
 obedience_threshold_value: "[obedience_threshold|E]:"
 game_concept_disobedient: "Desobediente"
 game_concept_disobedience_i: "@disobedience_icon!"
 game_concept_disobedient_desc: "$game_concept_obedience_desc$"
 game_concept_obedience_threshold: "Limite de Obediência"
 game_concept_obedience_threshold_desc: "O $game_concept_obedience_threshold$ é a pontuação que os [characters|lE] precisam alcançar para serem considerados [Concept('obedient', 'obedientes')|E].\n\nO limite é afetado por uma série de fatores: se são [close_family|lE] do [overlord|lE], se são o [primary_heir|lE], sua [friendship|lE] ou [rivalry|lE], seus [traits|lE] e se você os emprega ou não em seu [kurultai|lE] ou [court|lE]. As [children|lE] têm mais chance de serem obedientes do que os adultos.\n\nOs [rulers|lE] [GetGovernment( 'nomad_government' ).GetName|l]s podem usar a [decision|lE] #EMP $mpo_desperate_stance_decision$#! para tornar todos obedientes, o [intent|El] #EMP $impose_obedience_intent$#! durante uma [GetActivityType( 'activity_hunt').GetName|l] para mirar um personagem e a [character_interaction|El] #EMP $mpo_demand_obedience_interaction$#! se tiverem [dread|El] suficiente."
 game_concept_overlord: "Senhor Feudal"
 game_concept_overlord_desc: "$game_concept_overlord$ é aquele [ruler|lE] a quem outro governante jurou obediência, seja como [vassal|lE] ou como [tributary|lE]. Tanto [suzerains|lE] como [lieges|lE] são suseranos."
 game_concept_overlord_possessive: "do suserano"
 game_concept_settlement_issue: "Questão de Colonização"
 game_concept_settlement_issue_desc: "Questões de Colonização são tarefas dadas a um [ruler|El] [nomad|El] após concluir uma [migration|El] para novas terras. Elas oferecem a oportunidade de resolver conflitos e aumentar o [county_control|El] local no novo [domain|El].\n\nEssas questões continuarão a ocorrer nos primeiros anos após a migração, enquanto o condado estiver com baixo controle."
 game_concept_settlement_issue_tier: "Nível da Questão de Colonização"
 game_concept_settlement_issue_tier_desc: "Cada [settlement_issue|lE] possui um Nível de Questão de Colonização, que reflete as recompensas gerais da questão quando resolvida com sucesso. Resolver uma questão de nível mais alto normalmente concede mais recompensas além de [county_control|El]."
 game_concept_unmanaged_holdings: "Posse Não Administrada"
 game_concept_unmanaged_holding: "Posse Não Administrada"
 game_concept_unmanaged_holdings_desc: "Estas são [holdings|lE] desativadas que não contam para o seu [domain_limit|lE]."
 game_concept_nerge: "Nerge"
 game_concept_nerge_outcome: "Resultado do Nerge"
 game_concept_nerge_desc: "A nerge é um tipo especial de [GetActivityType('activity_hunt').GetName|l] que pode ser realizada pelos [rulers|El] [GetGovernment( 'nomad_government' ).GetName|l]. Em vez de caçar um único animal, trata-se de uma caçada em grande escala em que centenas, ou até milhares, de animais são abatidos.\n\nEm vez de usar a [hunt_success_chance|El] como de costume, registra-se uma pontuação no Resultado da Nerge com base no número de animais abatidos, que decide a classe de recompensas que receberão o [activity_host_short|El] e os [activity_guests_short|El].\n\nConcluir uma Nerge normalmente concederá estas recompensas:\n$BULLET_WITH_TAB$[legitimacy|E] [legitimacy_i]\n$BULLET_WITH_TAB$[prestige|E] [prestige_i]\n$BULLET_WITH_TAB$[dread|E] [dread_i]\n$BULLET_WITH_TAB$[gold|E] [gold_i]\nEm alguns casos, pode recompensar com:\n$BULLET_WITH_TAB$[martial|E] [martial_i]\n$BULLET_WITH_TAB$[commander_trait|E] [command_modifier_i] ou [trait_level_track_xp|El]"
 game_concept_dominate_title: "Dominar Título"
 game_concept_domination_war: "Guerra de Dominação"
 game_concept_dominate_title_desc: "Os [nomads|El] que desejam obter um [title|El] de nível superior [title_tier|El] sem [Concept('migrating', 'migrar' )|E] têm a alternativa de lutar contra os habitantes locais da região pelo título, desde que tenham o nível de [dominance|El] adequado.\n\nSe alguém possuir o título em questão, iniciará uma guerra contra esse alvo para usurpar o título. Se ninguém possuir o título em questão, em vez disso, lutarão contra cada alvo não [tributary|El] e não [ally|El] na área [de_jure|El] do título.\n\nSe vencer, o agressor ganhará o título em questão, e todos os defensores se tornarão seus tributários. Se perder, o agressor pagará [gold|El] [gold_i] ao defensor e perderá uma quantidade significativa de [dread|El] [dread_i].\n\nSe o tomador da [decision|El] possui toda a área de iure, simplesmente obterá o título imediatamente, pois não há mais defensores contra os quais lutar."
 game_concept_expand_dominance: "Expandir Domínio"
 game_concept_dominance_expansion: "Expansão de Domínio"
 game_concept_expand_dominance_desc: "Uma guerra especial para [rulers|El] [GetGovernment( 'nomad_government' ).GetName|l]s por qualquer área dentro de suas terras [de_jure|El], ou para expandir sua zona [de_jure|El] a novas fronteiras.\n\nTodos os governantes nômades de [title_tier|El] [duchy|El] ou superior podem começar esta guerra dentro de sua área de iure. Se vencerem, tentarão [vassalize|El] o defensor, obrigá-lo a se tornar um [tributary|El], ou conquistar suas terras se elas estiverem fora da área-alvo da guerra.\n\nPara expandir seu domínio a terras estrangeiras, um governante nômade deve ser de nível [kingdom|El] ou superior. Se vencer, tentará vassalizar, tornar tributário ou conquistar as terras, mas essas terras também passarão imediatamente de iure para o título principal do governante nômade."
 game_concept_paiza: "Paiza"
 game_concept_paiza_desc: "Paiza, ou gerege, é uma pequena placa de metal concedida por [characters|El] poderosos de [the_great_steppe|E], que estende o poder do cã a quem a carrega.\n\nMecanicamente, são [artifacts|El] que um governante [GetGovernment( 'nomad_government' ).GetName|l] poderoso entrega a seus favoritos por meio da [character_interaction|El] #V $mpo_interaction_grant_paiza$#!.\nDepois de adotar a [decision|El] #V $mpo_establish_paiza_system_decision$#!, você terá acesso à [decision|El] #V $mpo_call_for_merchants_decision$#!, que permite comerciar com os povos assentados, o que pode ser aprimorado pelas diversas [internal_upgrades|El] aos [yurt_buildings|El] [GetDomicileBuilding('trade_yurt_01').GetName|l].\n\nNo entanto, os [characters|El] que carregarem [artifacts|El] de paiza com o nome de um [gurkhan|El] vivo terão acesso à [decision|El] #V $mpo_abuse_authority_paiza_decision$#! e à [character_interaction|El] #V $mpo_interaction_leverage_khan_authority$#!.\n\n#weak Pelo poder do Céu Eterno. Pela proteção da boa fortuna imperial. Este é um edito do cã: qualquer um que ousar desrespeitá-lo será punido com a morte.#!"
