l_spanish:
 mpo_events_anna.0001.t: "Treinar Desde Jovem"
 mpo_events_anna.0001.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('pushy_adult'))] [pushy_adult.GetFirstName] e eu observamos meu [child.Custom('GetDaughterSon')] [child.GetFirstName] pular felizmente pelo acampamento com algumas pedras na mão, prontas para brincar. [pushy_adult.GetFirstNameNoTooltip] se vira animadamente para mim com um enorme sorriso.\n\n\"Você não acha que já está na hora de [child.GetFirstNameNoTooltip] aprender a montar a cavalo em vez de brincar de jogos infantis? Preparei um potro bem dócil e uma corda que deve manter [child.GetHerHim] segura durante sua primeira cavalgada.\""
 mpo_events_anna.0001.a: "Coloque [child.GetFirstNameNoTooltip] sozinh no cavalo."
 mpo_events_anna.0001.a.tt: "Eu amarro [child.GetFirstNameNoTooltip] a um cavalo com a corda."
 mpo_events_anna.0001.a.toast.good: "[child.GetFirstNameNoTooltip] aprende a montar"
 mpo_events_anna.0001.a.toast.neutral: "[child.GetFirstNameNoTooltip] não aprende a montar"
 mpo_events_anna.0001.a.toast.bad: "[child.GetFirstNameNoTooltip] cai do cavalo"
 mpo_events_anna.0001.b: "Cavalgar com [child.GetFirstNameNoTooltip] para que aprenda."
 mpo_events_anna.0001.c: "\"[child.GetFirstNameNoTooltip] vai entender como se faz com o tempo.\""
 mpo_events_anna.0005.t: "Histórias do Passado"
 mpo_events_anna.0005.desc: "Ao cair da noite, as estrelas brilham intensamente nos cantos mais escuros do céu. Uma fogueira crepita entre as iurtas, uma cena convidativa para a multidão reunida.\n\n[storyteller.GetFirstName], nosso[storyteller.Custom('ES_OA')] narrador[storyteller.Custom('ES_XA')] para esta noite, observa a multidão entusiasmada, aparentemente procurando algo ou a #EMP alguien#!.\n\nNossos olhares se encontram e [storyteller.GetFirstNameNoTooltip] dá um salto repentino em minha direção, e o grupo recua, ligeiramente abalado com o susto. Um dedo é erguido lentamente por ele, acabando por apontar para mim. «Agora é sua vez de escolher uma história de terras distantes para ser recontada!»."
 mpo_events_anna.0005.a: "\"Conte-nos algo fantástico.\""
 mpo_events_anna.0005.a.tt: "Cavalos indomáveis com asas para voar, animais falando com humanos e clima tempestuoso controlado por deuses."
 mpo_events_anna.0005.b: "\"Talvez algumas risadas para animar a noite?\""
 mpo_events_anna.0005.b.tt: "Travessuras de velhos, pedidos mal interpretados e corridas que tomam rumos totalmente inesperados."
 mpo_events_anna.0005.c: "\"Lendas de heroísmo!\""
 mpo_events_anna.0005.c.tt: "Batalhas gloriosas, companheirismo e guerreiros lendários trazendo medo aos inimigos."
 mpo_events_anna.0010.t: "Assobie Como uma Flecha"
 mpo_events_anna.0010.desc: "Ao longe, vejo alguns dos cavalos do nosso acampamento pastando em paz. Eu realmente gostaria de conhecê-los melhor, mas conseguir chamar sua atenção tem se mostrado difícil. Tentei fazer gestos, andar de um lado para o outro e gritar — apenas para ser recebido pelo silêncio.\n\nFrustrado[ROOT.Char.Custom('ES_OA')] com minhas tentativas inúteis, viro-me para voltar ao acampamento, apenas para trombar de frente com [whistler.GetFirstName].\n\n«Vamos precisar lhe ensinar alguns truques novos para invocar sua montaria. Siga meu exemplo»."
 mpo_events_anna.0010.a: "Ouça atentamente as instruções."
 mpo_events_anna.0010.a.tt.learning: "[learning skill|lE] de [whistler.GetFirstName] aumentará sua chance de sucesso"
 mpo_events_anna.0010.a.tt.success: "Você consegue assobiar com sucesso"
 mpo_events_anna.0010.a.tt.failure: "Você não entende as instruções de [whistler.GetFirstNameNoTooltip]"
 mpo_events_anna.0010.b: "\"Eu aprendo quando bem entender!\""
 mpo_events_anna.0015.t: "Um Pedaço de Carne"
 mpo_events_anna.0015.desc: "Tenues gritos e gemidos animais ecoam pelas colinas. Tomado pela curiosidade, aproximo-me para dar uma olhada.\n\nHá um filhote de cervo abandonado preso em um [Glossary( 'khogste', 'KHOGSTE_GLOSS' )], que tenta desesperadamente soltar a pata enquanto chama pela companhia reconfortante da mãe — mas sem sucesso algum.\n\nEmbora não nos pertença, devemos fazer tudo o que pudermos para sobreviver à árdua jornada que temos pela frente."
 mpo_events_anna.0015.a: "Roubar a presa para reabastecer."
 mpo_events_anna.0015.b: "Mentir dizendo que a armadilha era minha desde o início."
 mpo_events_anna.0015.c: "Liberar o animal para ter uma chance de crescer."
 mpo_events_anna.0015.d: "Não é meu para tomar."
 KHOGSTE_GLOSS: "Uma armadilha de pé que foi enterrada e ancorada no chão, feita de vários tipos de pedra."
 mpo_events_anna.0020.t: "Corrida Contra o Tempo"
 mpo_events_anna.0020.desc: "Cascores trovejantes atravessam os campos, vindo diretamente na nossa direção. Surge a silhueta de [Select_CString( messenger.IsFemale, 'una mensajera', 'un mensajero' )] a cavalo, fazendo tudo ao seu alcance para não cair da montaria e lutando para se manter sobre ela.\n\nPara abruptamente diante de nós, desce lentamente do cavalo com notável dificuldade. Vê-se uma ferida grave em suas costas. É um milagre que ainda esteja de pé.\n\n«P-p-por fav-vor… v-vocês p-p-rec-isam en-entregar…», são as últimas palavras que consegue balbuciar enquanto aponta dolorosamente para o horizonte, segurando uma mensagem cifrada na mão, antes de fechar os olhos e desabar…"
 mpo_events_anna.0020.war_impact.tt: "O resultado da sua escolha #EMP pode#! afetar outros em outro lugar"
 mpo_events_anna.0020.a: "Cuide de seus ferimentos, rápido!"
 mpo_events_anna.0020.a.toast.good: "Você consegue curar [Select_CString( messenger.IsFemale, 'a la mensajera', 'al mensajero' )]"
 mpo_events_anna.0020.a.toast.bad: "Você não trata os ferimentos [Select_CString( messenger.IsFemale, 'de la mensajera', 'del mensajero' )]"
 mpo_events_anna.0020.b: "Assuma o último desejo de entregar a mensagem pessoalmente."
 mpo_events_anna.0020.b.toast.good: "Você entregou com sucesso a mensagem para a próxima pessoa"
 mpo_events_anna.0020.b.toast.bad: "Você está perdid[ROOT.Char.Custom('ES_OA')] e não é capaz de entregar a mensagem"
 mpo_events_anna.0020.c: "Não conheço essa pessoa nem se podemos confiar nela."
 mpo_events_anna.0020.c_flavor: "#EMP Registras el cadáver; no es que vaya a necesitar nada ya#!"
 mpo_events_anna.0025.t: "Melodias Familiares"
 mpo_events_anna.0025.desc: "As canções nos fazem sentir mais unidos como povo séculos depois de terem sido escritas. Outras podem inspirar, ou nos trazer consolo e o tão buscado repouso durante as dificuldades. Algumas existem para avivar nossos espíritos e nos fazer continuar lutando. Tais canções raramente são esquecidas e fazem parte da nossa herança.\n\nUm encontro com um[throat_singer.Custom('ES_XA')] cantor sentado[throat_singer.Custom('ES_OA')] sobre uma pedra me lembrou de tudo isso enquanto sua apresentação me encanta."
 mpo_events_anna.0025.a: "Tentar imitá-lo e cantar com [throat_singer.GetSheHe]."
 mpo_events_anna.0025.a.toast.success: "Você cantou com sucesso junto de [throat_singer.GetFirstName]"
 mpo_events_anna.0025.a.toast.failure: "Seu ritmo e tom estão um pouco fora"
 mpo_events_anna.0025.b: "Ouvir e aproveitar."
