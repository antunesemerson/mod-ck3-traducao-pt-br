 # Events
 steal_herd_event_title: "Roubo de Rebanho:"
 steal_herd_outcome.1001.t: "$steal_herd_event_title$ Sucesso!"
 steal_herd_outcome.1001.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('courtier'))], [courtier.GetName], entra trotando orgulhosamente no acampamento. Atrás de [courtier.GetSheHe], um pastor desconhecido conduz o gado em minha direção.\n\n"Do acampamento [target.Custom('ES_DelDela')] [target.GetTitledFirstName]!", exclama. Ao redirecionar o manejo dos meus novos animais, não consigo evitar abrir um sorriso malicioso. Meu rebanho fica cada vez mais forte, a um custo baixo para mim."
 steal_herd_outcome.1001.a: "Estou grato pela sua 'generosidade', [target.GetFirstNameNoTooltip]!"
 steal_herd_outcome.1003.desc: "[courtier.GetFirstNameNoTooltip] aprofunda nos detalhes do nosso furto, incluindo como superamos as defesas de [target.GetFirstNameNoTooltip]. Como nos infiltramos no acampamento de com tanta facilidade, me pergunto o que mais posso arrancar de suas mãos…"
 steal_herd_outcome.1003.a: "[courtier.GetFirstNameNoTooltip], pode explicar isso novamente?"
 steal_herd_outcome.1003.a_desc: "Você tenta roubar mais [herd|lE] de [target.GetFirstNameNoTooltip]"
 steal_herd_outcome.1003.win: "Seu roubo continua"
 steal_herd_outcome.1003.lose: "Você não conseguiu roubar mais"
 steal_herd_outcome.1003.b: "Eu revisaria seus cofres."
 steal_herd_outcome.1003.b_desc: "Você tenta roubar ouro de [target.GetFirstNameNoTooltip]"
 steal_herd_outcome.1003.c: "[target.GetPrimarySpouse.GetFirstName] também pertence a [target.GetFirstNameNoTooltip], por enquanto."
 steal_herd_outcome.1003.c_tt: "Empiezo una [scheme|lE] de [GetScheme('seduce').GetTypeName|l] contra [target.GetPrimarySpouse.GetFirstName] con una #V probabilidad de éxito#! #p aumentada#!"
 mpo_steal_herd_seduce_modifier: "Toque do Pastor"
 mpo_steal_herd_murder_modifier: "Agentes nos Pastos"
 steal_herd_outcome.1003.d: "Talvez a vida dele?"
 steal_herd_outcome.1003.d_tt: "Empiezo una [scheme|lE] de [GetScheme('murder').GetTypeName|l] contra [target.GetFirstName] con una #V probabilidad de éxito#! #p aumentada#!"
 steal_herd_outcome.1003.e: "Já peguei o suficiente por agora."
 steal_herd_outcome.1002.t: "$steal_herd_event_title$ Rebanho Roubado!"
 steal_herd_outcome.1002.desc: "[spymaster.GetName] vem até mim com notícias graves. \"[ROOT.Char.GetFirstName], alguns dos animais que mantivemos no pátio desapareceram.\"\n\n limpa a garganta, \"Após uma investigação minuciosa, parece que [owner.GetName] enviou alguns capangas para 'recuperar' o rebanho, e convenceu o pastor de que era por sua ordem.\""
 steal_herd_outcome.1002.desc_monies: "\n\nApós ouvir essa revelação, percebo um baú, antes meio cheio de joias finas, agora empobrecido. Sabendo que o criminoso é o mesmo, suspiro."
 steal_herd_outcome.1002.a: "Que você viva eternamente em [ROOT.Char.GetFaith.NegativeAfterLife], [owner.GetFirstNameNoTooltip]!"
 steal_herd_outcome.2001.t: "$steal_herd_event_title$ Falha"
 steal_herd_outcome.2001.desc: "Meu plano para roubar o rebanho de [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] foi executado como planejado, mas meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('courtier'))], [courtier.Custom('ES_ElLa')] [courtier.GetTitledFirstName|l], retorna de mãos vazias, sem nem mesmo uma meada de lã para exibir seu triunfo.\n\n"[owner.GetFirstNameNoTooltip], sinto muito. [target.GetFirstNameNoTooltip] estava no nosso encalço", suspira [courtier.GetFirstNameNoTooltip]. "Felizmente, escapamos antes que seus cavaleiros nos alcançassem"."
 steal_herd_outcome.2001.a: "[target.GetFirstNameNoTooltip] deve ter proteção divina..."
 steal_herd_outcome.2002.desc: "[courtier.GetName] me leva para fora e, para meu espanto, está faltando um rebanho!\n\n[courtier.GetFirstNameNoTooltip] explica que não conseguimos roubar o rebanho de [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l], mas, em vez de deixar nossos cavaleiros escaparem, ele se vingou imediatamente e enviou um grupo atrás de [courtier.GetFirstNameNoTooltip] e dos demais envolvidos, levando-os diretamente aos meus pastos. Seus cavaleiros levaram ovelhas e outro gado e partiram rapidamente."
 steal_herd_outcome.2002.a: "Como pudemos ser tão incompetentes?!"
 steal_herd_outcome.2003.t: "O rebanho de [owner.Custom('ES_DelDela')] [owner.GetTitledFirstName|l]"
 steal_herd_outcome.2003.desc: "Uma agitação se aproxima, e [courtier.GetName] com ela. Ele sorri e me faz gestos para que eu entre no pátio.\n\nLá fora, aponta para um rebanho de ovelhas e cavalos, guiado por um dos meus cavaleiros. [courtier.GetFirstNameNoTooltip] me olha fixamente. \"Que ousadia a de [owner.GetFirstNameNoTooltip]!\", afirma. \"Tentou #italic debilitaros#! e levar seu rebanho! Felizmente, [courtier.GetFaith.HighGodName] tinha outros planos. Esses animais pertenciam a [owner.GetFirstNameNoTooltip] em pessoa\"."
 steal_herd_outcome.2003.a: "Seus fracassos me beneficiam hoje, [owner.GetFirstNameNoTooltip]!"
 steal_herd_ongoing.1001.t: "$steal_herd_event_title$ Guarda"
 steal_herd_ongoing.1001.desc: "Para roubar o rebanho [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l], preciso conhecer suas terras e seu povo. Então, parto para anotar quais pastagens ficam perto de sua casa e quais estão distantes e isoladas.\n\nAo observar as elevações perto de [target.GetCapitalLocation.GetTitle.GetName], guerreiros liderados por um[target_knight.Custom('ES_XA')] [target_knight.GetWomanMan] montado a cavalo se aproximam de meu séquito por trás. "O que traz vocês por aqui?", pergunta seu líder, [target_knight.GetFirstName]."
 steal_herd_ongoing.1001.a: "Alguém para testar minha coragem!"
 steal_herd_ongoing.1001.a_win: "Você impressiona [target_knight.GetFirstNameNoTooltip] com suas habilidades de combate"
 steal_herd_ongoing.1001.duel_desc: "Você tenta desviar a atenção de [target_knight.GetFirstNameNoTooltip]"
 steal_herd_ongoing.1001.lose: "[target_knight.GetFirstNameNoTooltip] te vence"
 steal_herd_ongoing.1001.b: "Admirando os domínios de [target.GetFirstNameNoTooltip], é claro."
 steal_herd_ongoing.1001.b_win: "[target_knight.GetFirstNameNoTooltip] aprecia seu sentimento"
 steal_herd_ongoing.1001.c: "Apreciando uma bebida! Vai se juntar?"
 steal_herd_ongoing.1001.c_win: "Você e [target_knight.GetFirstNameNoTooltip] bebem até o amanhecer"
 steal_herd_ongoing.1001.c_win_big: "Você convence [Select_CString( target_knight.IsFemale, 'a la embriagada', 'al embriagado' )] [target_knight.GetFirstNameNoTooltip] para se juntar à sua causa"
 steal_herd_ongoing.1001.d: "Nada, vou seguir meu caminho."
 steal_herd_ongoing.1002.t: "$steal_herd_event_title$ Pastor Disfarçado"
 steal_herd_ongoing.1002.desc: "[chosen_agent.GetName] me conta que os pastores [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] muitas vezes falham em conduzir uma única ovelha para seu rebanho.\n\n"Por que não se vestem como pastor[chosen_agent.Custom('ES_XA')]? Vão até [target.GetFirstNameNoTooltip] e ofereçam \"ajuda\" aos seus pastores incompetentes", sugiro a [chosen_agent.GetFirstNameNoTooltip], que me lança um olhar preocupado e suspira."
 steal_herd_ongoing.1002.a: "Vá em frente, [chosen_agent.GetFirstNameNoTooltip] me ajude a ajudar[target.GetHerHim]!"
 steal_herd_ongoing.1002.b: "E eu sei exatamente o que você deve dizer..."
 steal_herd_ongoing.1002.c: "Na verdade, nunca minda."
 steal_herd_ongoing.1002.duel_desc: "[chosen_agent.GetFirstName] se passa por pastor[chosen_agent.Custom('ES_XA')]"
 steal_herd_ongoing.1002.win: "Seu disfarce é convincente"
 steal_herd_ongoing.1002.b_tt: "Você ajuda [chosen_agent.GetFirstName] com o disfarce"
 steal_herd_ongoing.1002.lose: "[chosen_agent.GetFirstNameNoTooltip] não consegue sustentar a aparência convincente"
 random_negative_scheme_modifier_tt: "O esquema Roubar o Rebanho de [target.GetNameNoTooltip] ganha um modificador #n negativo#!"
