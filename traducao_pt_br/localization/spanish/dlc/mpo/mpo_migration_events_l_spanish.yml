l_spanish:
 migration_events.0001.t: "Um Lugar para Chamar de Lar"
 migration_events.0001.desc.intro: "O céu sem nuvens está prestes a se tornar vermelho enquanto chegamos em [ROOT.Char.GetCurrentLocation.GetName]. A cor de uma ferida recém-aberta.\n\n"
 migration_events.0001.desc.drought: "A terra rachada nos recebe com uma cor doentia. A seca não foi gentil aqui.\n\n"
 migration_events.0001.desc.white_zud: "A neve macia estala sob as cascos de nossos cavalos. A camada está tão espessa que cobre toda a grama.\n\n"
 migration_events.0001.desc.havsarsan_zud: "Chuva, neve, ventos fortes. O clima não é tão acolhedor quanto esperávamos.\n\n"
 migration_events.0001.desc.blessing: "Raios de sol banham as flores em flor que cobrem os campos até onde conseguimos ver. Inclino a cabeça para trás e me deixo aproveitar um pouco de seu calor.\n\n"
 migration_events.0001.desc.tributary: "\"Estas terras pagam tributo diligentemente a [overlord.Custom('ES_AlAla')] [overlord.GetTitledFirstName|l]\", nos adverte [recipient.Custom('ES_ElLa')] [recipient.GetTitledFirstName|l]. \"Não creio que tolerará o contrário\".\n\n"
 migration_events.0001.desc.nomad: "“Cuide da terra”, [recipient.Custom('ES_ElLa')] [recipient.GetTitledFirstName|l] na entrada do assentamento, embora a maioria das pessoas já tenha partido.\n\n"
 migration_events.0001.desc.herder: "[recipient.Custom('ES_ElLa')|U] [recipient.GetTitledFirstName|l] guia seu pequeno rebanho com certa dificuldade e desaparece à distância.\n\n"
 migration_events.0001.desc.nomad_obedient: "\"Meu [ROOT.GetCharacter.Custom('GetMongolHonorific')|l] [ROOT.Char.GetTitleAsNameNoTooltip|l]\", [recipient.Custom('ES_ElLa')] [recipient.GetTitledFirstName|l] nos recebe à entrada do assentamento: \"É com grande honra que ofereço minhas terras\n\n\"."
 migration_events.0001.desc.nomad_angry: "[recipient.Custom('ES_ElLa')|U] [recipient.GetTitledFirstName|l] está na retaguarda do séquito que está deixando o acampamento. \"Boa sorte\", diz secamente antes de se juntar a eles.\n\n"
 migration_events.0001.desc.good: "O cheiro de pastagem fresca é tão promissor quanto eu esperava. Estaremos bem."
 migration_events.0001.desc.bad: "A pastagem seca e amarelada morre enquanto o sol sangra. Não será fácil, mas uma vida fácil nunca fez um guerreiro valioso."
 migration_events.0001.desc.meh: "A qualidade da pastagem não é tão boa quanto eu gostaria. Poucas coisas na vida são."
 migration_events.0001.aaa: "Respeitarei os costumes desta terra."
 migration_events.0001.aa: "Não me curvo a ninguém."
 migration_events.0001.aa.cb_tt: "Recebe um [casus_belli|El] de #EMP $retaliation_cb$#! contra você por #V 5#! anos"
 migration_events.0001.a: "Finalmente, chegamos ao lugar certo."
 migration_events.0001.a.tt: "Esta opção está disponível porque você seguiu os desejos do seu [GetCourtPositionType('court_astrologer_court_position').GetName()|l]"
 migration_events.0001.b: "Vamos montar as tendas."
 astrologer_desired_area_modifier: "Migração Desejada"
 astrologer_desired_area_modifier_desc: "Graças a seguir os desejos de seu $court_astrologer_court_position$, o povo deste personagem está determinado a garantir o melhor cuidado possível para suas novas pastagens."
 msg_tributary_toast: "Oferta de Tributo"
 msg_tributary_toast_tt: "[new_tributary.GetShortUIName] se mudou para as terras ocupadas por um de seus [tributaries|El] e se curvou diante de você"
 msg_tributary_toast_bad: "Recusa de Tributo"
 msg_tributary_toast_bad_tt: "[new_tributary.GetShortUIName] se mudou para as terras ocupadas por um dos seus [tributaries|El]\nVocê ganha um [casus_belli|El] de $retaliation_cb$ contra [new_tributary.GetSheHe] por #V 5#! anos"
 migration_events.0002.t: "Migração: Terra Tomada"
 migration_events.0002.desc.intro: "Sangue escorre pelo meu cotovelo, manchando o solo. Conquistamos essas novas terras e nossas tendas logo estarão erguidas.\n\n"
 migration_events.0002.desc: "No entanto, o governante anterior costumava pagar tributo [overlord.Custom('ES_AlAla')] [overlord.GetTitledFirstName|l], e não creio que ele aceite nada diferente de nós."
 migration_events.0002.desc.high_dominance: "Diz-se que [overlord.Custom('ES_ElLa')] [overlord.GetTitledFirstName|l] tem a soberania suprema sobre estas terras, pois [recipient.Custom('ES_ElLa')] [recipient.GetTitledFirstName|l] lhe oferecia tributos regularmente. Somos tão fortes quanto [overlord.GetSheHe], por que deveríamos nos prostrar aos seus pés e suplicar proteção?"
 migration_events.0002.a: "É apenas justo."
 migration_events.0002.b: "Eu conquistei minha terra!"
 migration_events.0002.b.alt: "Hah, se quiser meu ouro, que venha."
 migration_events.1000.t: "Um Ponto Verde"
 migration_events.1000.desc: "Os cavalos da minha tribo ofegam e bufam, ansiosos para saborear a grama local. Aqui, em [ROOT.Char.GetCurrentLocation.GetTitle.GetNameNoTier], ela cresce espessa e verde no solo. Aqui, os locais prósperos"
 migration_events.1000.desc.ruler_present: "respondem a [local_ruler.GetFirstName], um[local_ruler.Custom('ES_XA')] [local_ruler.GetTitleAsNameNoTooltip|l] menor da nação [local_ruler.GetCulture.GetName]."
 migration_events.1000.desc.ruler_away: "devem lealdade a [local_ruler.Custom('ES_AlAla')] [local_ruler.GetTitleAsNameNoTooltip|l] da nação [local_ruler.GetCulture.GetName], embora seus cavaleiros não sejam vistos em lugar nenhum."
 migration_events.1000.desc_outro: "\n\nSomos recebidos calorosamente, oferecidos leite e carne... mas, com vozes trêmulas, meus [ROOT.Char.GetCulture.GetCollectiveNoun] são instados a seguir em frente."
 migration_events.1000.a: "Marmotas, sable... bons peles a serem obtidas aqui."
 migration_events.1000.a.flavor: "Você caça um pouco da vida selvagem local."
 migration_events.1000.b: "\"#EMP Presentes! Tributo!#! Ou cairão sobre vocês como lobos!\""
 migration_events.1000.b.flavor: "Você extorque os prósperos locais e saqueia seu acampamento."
 migration_events.1000.c: "Meu rebanho pastará aqui por um tempo."
 migration_events.1000.d: "Eu dou graças e monto meu cavalo."
 custom.every_consort: "Cada [spouse|lE] e [concubine|lE]"
 nomadic_comforts_modifier: "Confortos Nômades de Viagem"
 nomadic_comforts_modifier_desc: "Este raro nômade escolhe a segurança confortável sobre a sela."
 migration_events.1010.t: "Por Que Tropeçar Quando Você Pode Andar?"
 migration_events.1010.desc: "Da grande iurta sobre rodas que, sob estandartes de cauda de cavalo, marca o coração da nossa coluna, chega minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('spouse'))|l] [spouse.GetFirstName]\n\n«O poderoso boi chora quando se acrescenta à sua carga o peso de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan]?», pergunta. «Não? Então, por que não vens sentar-te com a tua família…?».\n\nMuitos desses bois puxam a minha casa. E há almofadas quentes lá dentro. Mas os outros cavaleiros me julgam com o olhar."
 migration_events.1010.a: "Meu corpo precisa de descanso."
 migration_events.1010.b: "\"Meu amado... pode haver um #EMP caminho acidentado#! à frente.\""
 migration_events.1010.c: "\"Eu cavalgarei à frente dos meus [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]. Sempre.\""
 migration_events.1010.d: "Subirei a bordo."
 migration_events.1010.d.flavor: "Depois de horas de cavalgada… qualquer um anseia pelo conforto trêmulo e pelos solavancos do lar."
 migration_events.1020.t: "Um Mestre para Pastores"
 migration_events.1020.desc: "«¡[ROOT.Char.GetCurrentLocation.GetTitle.GetNameNoTier] é assim que chamam este lugar!», exclama meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('aspirant'))|l] [aspirant.GetFirstName]. «Seus rebanhos de ovelhas… quem os protege? Um cão e alguém chamado [herder.GetTitledFirstName]!».\n\n«Alguns cavalos, alguns bons cavaleiros —#EMP el cuello de [herder.GetFirstNameNoTooltip] en mis manos#!— e o/a [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip|l] seria meu!».\n\n[aspirant.GetFirstNameNoTooltip] observa com cobiça algumas cabras passando… e aguarda a bênção de seu [aspirant.Custom2('RelationToMeShort', SCOPE.sC('root_scope'))|l]."
 migration_events.1020.a: "\"Você me deve tributo, [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('aspirant'))|l].\""
 migration_events.1020.b: "\"Vá, e empunhe o poder da [ROOT.Char.GetHouse.GetNameNoTooltip]!\""
 migration_events.1020.b.flavor: "Você vê que seu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('aspirant'))|l] está bem estabelecid[aspirant.Custom('ES_OA')] aqui."
 migration_events.1020.c: "\"Leve um pequeno grupo, e diga adeus aos seus parentes.\""
 migration_events.1020.d: "\"Fique com seu povo, [aspirant.GetFirstNameNoTooltip].\""
 migration_events.1030.t: "Uma Trilha Estéril"
 migration_events.1030.desc: "Seguimos com as grandes massas de meus cavalos, gado, cabras e ovelhas. Se passássemos por bons pastos, os animais poderiam descansar e se alimentar... mas a terra aberta, onde a grama não foi comida, é escassa em [location_county.GetNameNoTier].\n\nDeixamos meus melhores cavalos pastarem a grama que existe. O resto cresce fraco de fome."
 migration_events.1030.a: "O governante local nos #EMP deixará#! usar suas melhores terras."
 migration_events.1030.b: "Eu poderia trocar os animais mais fracos..."
 migration_events.1030.b.flavor: "Suas ofertas parecem morte, mas [local_ruler.GetNameNoTooltip] ainda pode ser convencido a comprar."
 migration_events.1030.c: "Se eles vão morrer... melhor que sejam comidos."
 migration_events.1030.c.flavor: "Abate os animais e faça um banquete para seu povo."
 migration_events.1030.d: "Devemos procurar boas pastagens nesta terra."
 migration_events.1030.d.success: "Você conduz seus rebanhos até a plenitude."
 migration_events.1030.d.failure: "Você não encontra nada, e os animais morrem de fome."
 migration_events.1040.t: "Bem-vindo em [ROOT.Char.GetCurrentLocation.GetTitle.GetNameNoTierNoTooltip]"
 migration_events.1040.desc: "Saudando-nos calorosamente, o governante local, [local_ruler.GetName], aproxima-se. Meus [ROOT.Char.GetCulture.GetCollectiveNoun] e seus animais passam por nós.\n\n\"[ROOT.Char.GetTitleAsName], sentar-se-ão ao meu lado e compartilharão uma refeição quente?\", pergunta [local_ruler.GetFirstNameNoTooltip] como é costume entre viajantes.\n\nSeus acompanhantes me apresentam presentes:"
 migration_events.1040.furs: "ornamentos esculpidos em chifre, peles e um jovem garanhão animado."
 migration_events.1040.camels: "água fresca de uma fonte local e uma linha de camelos altos."
 migration_events.1040.wool: "finas capas de lã, uma bandada de ovelhas e uma cabra alta como um cavalo."
 migration_events.1040.horses: "reins de couro fino e um par de cavalos fortes."
 migration_events.1040.a: "\"#EMP Isso#! é tudo...? Isso é tudo o que você me dá...?"
 migration_events.1040.b: "Com alegria, troco presentes por presentes."
 migration_events.1040.c: "Não tenho tempo para você, [local_ruler.GetTitleAsNameNoTooltip|l] de pouca monta."
 migration_events.1040.d: "Eu vou comer."
 mpo_refusing_diplomatic_stops_modifier: "Rejeição a Paradas Diplomáticas"
 mpo_refusing_diplomatic_stops_modifier_desc: "Este nômade guia seu povo sempre em frente, além dos locais amigáveis e suas cortesia."
 cultural_acceptance_meal_of_hospitality: "Hospitalidade para migrantes e viajantes"
 migration_raiding_effect_tt: "As [holdings|lE] pelas quais [Concept('migrate', 'migres')|E] te fornecerão [gold|lE] @gold_icon! e [herd|lE] @herd_icon!, mas você perderá [opinion|lE] e [cultural_acceptance|lE] de seu [holder|lE]"
 migration_raiding_effect_no_culture_tt: "As [holdings|lE] pelas quais [Concept('migrate', 'migres')|E] te fornecerão [gold|lE] @gold_icon! e [herd|lE] @herd_icon!, mas você perderá [opinion|lE] com o [holder|lE]"
 cultural_acceptance_recompense_for_raiding: "Reparações pela violência"
 cultural_acceptance_raiding_migrators: "Saques e pilhagem de migrantes"
 migration_events.1051_title: "Saque Migratório"
 migration_events.1051_tooltip: "Seu povo saqueou [raided_settlement.GetName]."
 migration_events.1050.t: "Passando Como Fogo"
 migration_events.1050.desc: "Os exploradores de meu povo, espalhados muito além de nossos rebanhos e carroças, rondam as terras por onde passamos como panteras.\n\n\"Os locais soltaram a primeira flecha contra nós!\" reporta meu chefe dos exploradores, [warrior.GetFirstName], \"mas com fogo e espada, fizemos-os se arrepender! Trouxemos todos os despojos do acampamento deles — e este [newly_created_artifact.GetName]!\""
 migration_events.1050.a: "A ferocidade de [warrior.GetFirstNameNoTooltip] merece uma recompensa."
 migration_events.1050.b: "\"#EMP Caiam sobre todas as casas que passarmos, meus guerreiros!#!\""
 migration_events.1050.c: "Devolvam os despojos e peçam perdão ao mestre deles."
 migration_events.1050.d: "Distribuam os despojos entre meus guerreiros."
 migration_events.1050.e: "Eu reivindico os despojos de [ROOT.Char.GetCurrentLocation.GetTitle.GetNameNoTierNoTooltip]."
 migration_events.1060.t: "Lento como a Ovelha"
 migration_events.1060.desc_desert: "Os animais do meu rebanho estão com sede, mas ao longo do nosso caminho por [root_location.GetName], há pouca água. Nós seguimos lentamente sob o sol ardente."
 migration_events.1060.desc_forest: "As árvores em [root_location.GetName] estão próximas como guerreiros a pé, e a vegetação é ainda mais densa. Os espinhos rasgam a lã das minhas ovelhas. Forçamos meu rebanho por um caminho estreito."
 migration_events.1060.desc_wetlands: "Nosso caminho por [root_location.GetName] ? como atravessar o intestino de uma besta: tudo ? lama fedida e poças de água podre. Meus animais tropeçam molhados, chorando de tristeza. De tempos em tempos, meu povo precisa libert?-los do lamaçal."
 migration_events.1060.desc_hilly: "Nosso caminho por [root_location.GetName] serpenteia por encostas íngremes, desce em desfiladeiros estreitos, e exaure tanto homens quanto bestas. Meus pastores colocam os ombros contra o gado relutante, gritam e puxam, mas ainda assim as criaturas exaustas mal conseguem subir."
 migration_events.1060.desc_winter: "A neve branca sufoca a terra em [root_location.GetName], e nosso caminho é feito apenas por chutes e passos lentos pelo frio. Os animais do meu rebanho se apertam para se aquecer, e são retardados pela fome."
 migration_events.1060.desc: "\n\nMeu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('warrior'))|l] [warrior.GetFirstName] não tem paciência para suportar esse ritmo lamentável.\n\n\"Deixem-me reunir os cavaleiros mais jovens!\", implora. \"Galoparíamos até [destination.GetNameNoTier] e prepararíamos a sua chegada. Esse trabalho penoso, esse arrastar-se com bois e cabras, está abaixo de seus guerreiros!\"."
 migration_events.1060.a: "Eu encontrarei um caminho mais ameno e rápido."
 mpo_migration_events.1060.a.success: "Você lidera seu povo por um caminho mais suave"
 mpo_migration_events.1060.a.failure: "Um desvio exaustivo e tolo"
 migration_events.1060.b: "\"Vá, explore nosso novo lar! Prepare-o bem.\""
 migration_events.1060.c: "\"Fique, e ajude os fracos. Eles precisam da sua força.\""
 mpo_migration_prepared_home_modifier: "Novo Lar Bem Preparado"
 mpo_migration_prepared_home_modifier_desc: "Os melhores locais para assentamentos nômades foram encontrados e limpos de obstruções locais."
 mpo_migrating_accolade_duke_modifier: "Bando de guerra migratório"
 mpo_migrating_accolade_king_modifier: "$mpo_migrating_accolade_duke_modifier$"
 mpo_migrating_accolade_emperor_modifier: "$mpo_migrating_accolade_duke_modifier$"
 mpo_migrating_without_labor_modifier: "Migração Sem Trabalho"
 mpo_migrating_without_labor_modifier_desc: "Este personagem move seus anfitriões pela terra sem a ajuda dos guerreiros mais jovens de seu povo."
 mpo_found_paths_for_herds_modifier: "Caminhos Suaves para o Rebanho"
 mpo_found_paths_for_herds_modifier_desc: "Este líder sábio guia seus animais com discrição e uma compreensão da terra."
