l_spanish:
 feast_type_tsagaan_sar: "Tsagaan Sar"
 feast_type_tsagaan_sar_desc: "$EFFECT_LIST_BULLET$ O brinde final é uma ocasião para receber presentes, como [herd|lE] e [gold|lE]\n $EFFECT_LIST_BULLET$ Os eventos proporcionarão oportunidades para ganhar [opinion|lE]\n $EFFECT_LIST_BULLET$ Certas opções permitirão perder [stress|El]\n\n #weak Uma nova Lua Branca se ergue - e nos regozijamos!#!"
 feast_type_tsagaan_sar_valid_tt: "Você organizou um Tsagaan Sar [GetActivityType('activity_feast').GetName|l] nos últimos 5 anos"
 feast_type_tsagaan_sar_valid_tt_time: "Um Tsagaan Sar só pode ser organizado de janeiro a março"
 # Events
 feast_tsagaan_sar_events.0001.t: "A Noite que Vem"
 feast_tsagaan_sar_events.0001.desc: "Os cavalos se reúnem do lado de fora das yurts do acampamento; seus cavaleiros lhes oferecem uma última carícia antes de irem se misturar. Os jovens correm de um lado para o outro, brincando de pega-pega e pregando peças nos mais velhos. Todos estão vestidos de um branco brilhante, com suas túnicas recém-costuradas, tão novas quanto o ano.\n\n[ROOT.Char.Custom('GetWomenOrMenBasedOnFaith')|U] dão cambalhotas e lutam, há paz no ar; suas brigas e apostas sem importância fortalecem sua irmandade. [ROOT.Char.Custom('GetWomenOrMenBasedOnFaithOpposite')|U] preparam as mesas do banquete, e o cheiro de carne de carneiro chega até mim.\n\nEste banquete será inesquecível — desde que eu preste atenção em…"
 feast_tsagaan_sar_events.0001.a: "… os baús de moedas que receberei."
 feast_tsagaan_sar_events.0001.a_tt: "Você terá mais chance de receber [gold|lE] dos convidados"
 feast_tsagaan_sar_events.0001.b: "… as bugigangas que receberei e as histórias que contam."
 feast_tsagaan_sar_events.0001.b_tt: "Você terá mais chance de receber [artifacts|lE] dos convidados"
 feast_tsagaan_sar_events.0001.c: "… os convidados. Sem eles, não teria muito sentido."
 feast_tsagaan_sar_events.0001.c_tt: "É mais provável que você receba [hooks|lE] dos convidados"
 feast_tsagaan_sar_events.0001.d: "… as bênçãos de [ROOT.Char.GetFaith.HighGodName] neste novo ano."
 feast_tsagaan_sar_events.0001.d_tt: "Você terá mais chance de receber [piety|lE] dos convidados"
 feast_tsagaan_sar_events.0001.e: "… a comida!"
 feast_tsagaan_sar_events.0001.f: "… a celebração!"
 feast_tsagaan_sar_events.0001_none: "Nenhum dos seus [activity_guests|lE] conseguiu lhe dar um presente este ano"
 feast_tsagaan_sar_events.0001_tt: "#V [gifters_list_size]#! convidados #p irão#! lhe dar algo"
 feast_tsagaan_sar_events.0002.t: "Preparando o Presente"
 feast_tsagaan_sar_events.0002.desc: "Os festejos começaram, e embora eu agradeça a [host.GetName] pelo convite, reflito sobre o presente que devo lhe oferecer. Isso vai além de uma questão de tradição: é uma questão de honra.\n\nObservo outros nobres trazendo arcas de moedas estrangeiras, e camponeses com pequenos sacos de objetos de valor. Outros trotam em cavalos e cuidam deles para prepará-los para conhecer [Select_CString( host.IsFemale, 'sua nova dona', 'seu novo dono' )]. Alguns convidados concedem uma oferenda intangível, pronunciando valiosos juramentos de fidelidade.\n\nMas a questão surge: o que posso dar ao meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('host'))], [host.GetFirstNameNoTooltip]?"
 feast_tsagaan_sar_events.0002.desc_again: "Preciso pensar novamente em como mostrar meu respeito a [host.GetName]. Eu poderia muito bem resistir, na esperança de que ele não se importe, ou melhor ainda, de que não perceba.\n\nO tempo não está a meu favor, pois esta pode ser minha última chance de preparar algo para ele."
 feast_tsagaan_sar_events.0002.nothing_arrogant: "Minha presença é o bastante para [host.GetFirstName]."
 feast_tsagaan_sar_events.0002.nothing_fickle: "Talvez eu decida depois?"
 feast_tsagaan_sar_events.0002.nothing: "Parece que não há nada que eu possa oferecer..."
 feast_tsagaan_sar_events.0002.herd_1: "Algumas ovelhas lhe farão bem."
 feast_tsagaan_sar_events.0002.herd_2: "Tenho um cavalo sobrando..."
 feast_tsagaan_sar_events.0002.herd_3: "Bovinos ou ovelhas, o que escolher?"
 feast_tsagaan_sar_events.0002.herd_4: "Meu rebanho pode ser uma boa escolha, afinal."
 feast_tsagaan_sar_events.0002.herd_tt: "Você escolherá quanto [herd_i] [herd|lE] oferecer a [host.GetName]"
 feast_tsagaan_sar_events.0002.gold_1: "Suponho que posso separar algumas moedas para [host.GetSheHe]."
 feast_tsagaan_sar_events.0002.gold_2: "Um saquinho de ouro será suficiente!"
 feast_tsagaan_sar_events.0002.gold_3: "Não me importo em dividir minha riqueza com [host.GetFirstNameNoTooltip]!"
 feast_tsagaan_sar_events.0002.gold_tt: "Você escolherá quanto [gold_i] [gold|lE] oferecer a [host.GetName]"
 feast_tsagaan_sar_events.0002.artifact: "Posso abrir mão de um dos meus itens."
 feast_tsagaan_sar_events.0002.artifact_tt: "Você escolherá um [artifact|lE] para oferecer a [host.GetName]"
 feast_tsagaan_sar_events.0002.loyalty: "Minha lealdade é o maior presente de todos."
 feast_tsagaan_sar_events.0002.prestige: "Falarei bem de [host.GetSheHe]!"
 feast_tsagaan_sar_events.0002.prestige_tt: "Você espalhará relatos sobre a majestade de [host.GetFirstNameNoTooltip], o que lhe dará parte do seu [prestige|lE] [prestige_i]"
 feast_tsagaan_sar_events.0002.blessing: "Que [host.GetFaith.HighGodName] [host.GetHerHim] abençoará; eu vou garantir isso."
 feast_tsagaan_sar_events.0002.blessing_tt: "Você concederá bênçãos a [host.GetFirstNameNoTooltip] concedendo-lhe parte da sua [piety|lE] [piety_i]"
 feast_tsagaan_sar_events.0002.nothing_important: "@warning_icon! #warning Como eres importante para [host.GetFirstNameNoTooltip], esto hará que se ofenda.#!"
 feast_tsagaan_sar_events.0002.nothing_tt: "Como você não tem nada para oferecer a [host.GetFirstNameNoTooltip]."
 feast_tsagaan_sar_events.0002.nothing_unimportant: "@warning_icon! #warning Aunque no tienes importancia para [host.GetFirstNameNoTooltip], puede que se ofenda por tu falta de regalos.#!"
 feast_tsagaan_sar_events.0003.herd: "Meu rebanho será um presente formidável para [host.GetName]. Sua gente prosperará enquanto migra pelas estepes e luta em batalhas sobre meus cavalos. Mas ainda fica a questão: de quanto eu abrirei mão?"
 feast_tsagaan_sar_events.0003.gold: "Moedas são valiosas em qualquer lugar, e tenho certeza que [host.GetName] concorda. Meus cofres não são infinitos, porém, e [host.GetFirstNameNoTooltip] só pode levar uma parte."
 feast_tsagaan_sar_events.0003.prestige: "[host.GetName] é conhecido por seu povo como alguém [host.Custom('ComplimentAdjective')], e desejo espalhar esse sentimento."
 feast_tsagaan_sar_events.0003.piety: "[host.GetFaith.HighGodName] verá com bons olhos a [host.GetName], mas, para isso, devo olhar para [host.GetFaith.PositiveAfterLife] e contar a [host.GetFaith.HighGodName] as boas ações de [host.GetFirstNameNoTooltip]."
 feast_tsagaan_sar_events.0003.minor.herd: "Um cavalo deve bastar."
 feast_tsagaan_sar_events.0003.minor.herd_2: "Talvez uma ou duas ovelhas."
 feast_tsagaan_sar_events.0003.medium.herd: "Alguns rebanhos de gado devem ser suficientes."
 feast_tsagaan_sar_events.0003.medium.herd_2: "Um grupo de cavalos, suficiente para a família."
 feast_tsagaan_sar_events.0003.major.herd: "[host.GetFirstNameNoTooltip] terá gado suficiente para quilômetros!"
 feast_tsagaan_sar_events.0003.minor.gold: "Vou jogar algumas moedas na direção dele."
 feast_tsagaan_sar_events.0003.minor.gold_2: "Um pequeno saquinho, de fato."
 feast_tsagaan_sar_events.0003.medium.gold: "Um baú para [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip|l]!"
 feast_tsagaan_sar_events.0003.medium.gold_2: "[host.GetFirstNameNoTooltip] merece muito mais do que um punhado."
 feast_tsagaan_sar_events.0003.major.gold: "Que a tesouraria de [host.GetFirstNameNoTooltip] transborde!"
 feast_tsagaan_sar_events.0003.minor.prestige: "Meu povo conhecerá [host.GetFirstNameNoTooltip]."
 feast_tsagaan_sar_events.0003.medium.prestige: "Vou cantar canções sobre [host.GetSheHe]!"
 feast_tsagaan_sar_events.0003.major.prestige: "O nome de [host.GetFirstNameNoTooltip] ecoará pela terra e [ROOT.Char.GetFaith.PositiveAfterLife] por igual!"
 feast_tsagaan_sar_events.0003.minor.piety: "Eu sei que [host.GetFirstNameNoTooltip] é um verdadeiro [host.GetFaith.GetAdherentName]!"
 feast_tsagaan_sar_events.0003.medium.piety: "Com minhas orações, [host.GetFirstNameNoTooltip] está destinado a [host.GetFaith.PositiveAfterLife]."
 feast_tsagaan_sar_events.0003.major.piety: "Todos os [host.GetFaith.GetAdherentNamePlural] conhecerão o nome de [host.GetFirstNameNoTooltip]!"
 feast_tsagaan_sar_events.0002.choose: "Talvez eu devesse escolher outra coisa."
 feast_tsagaan_sar_events.0002.choose_tt: "Você escolherá um presente diferente para [host.GetName]"
 feast_tsagaan_sar_events.0002.none: "Na verdade, não darei nada a [host.GetFirstNameNoTooltip]."
 feast_tsagaan_sar_events.0004.desc: "Por sorte, meu inventário não está vazio e [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] poderá aproveitar um dos meus objetos.\n\nFica a questão de qual ele apreciaria, ou então eu poderia escolher o que me é menos útil…"
 feast_tsagaan_sar_events.0004.a: "[artifact_1.GetName] será!"
 feast_tsagaan_sar_events.0004.b: "Eu nem precisava de [artifact_2.GetName] mesmo..."
 feast_tsagaan_sar_events.0004.c: "[host.GetFirstNameNoTooltip] poderia me livrar de [artifact_3.GetName]!"
 feast_tsagaan_sar_events.0100.t: "Presente Mal Entregue"
 feast_tsagaan_sar_events.0100.desc: "[gift_collector.GetName], cortesão[gift_collector.Custom('ES_OA')] de [host.GetName], se aproxima a mim. «Saudações, [host.GetTitleAsNameNoTooltip|l] de espírito [ROOT.Char.Custom('ComplimentAdjective')]. Ainda não recebemos sua oferenda para [host.Custom('ES_ElLa')] [host.GetTitledFirstNameNoTooltip|l]», afirma [gift_collector.GetFirstNameNoTooltip]. «Não vai me dizer que você apareceu de mãos vazias!», brinca.\n\n«Do que você está falando?», respondo. «Já dei [ROOT.Char.Custom('GetTsagaanSarGiftDesc')], isso não é suficiente para [host.GetFirstNameNoTooltip]?». [gift_collector.GetFirstNameNoTooltip] suspira, «Talvez não tenha sido registrado»."
 feast_tsagaan_sar_events.0100.a: "Escolherei outro presente para [host.GetSheHe]."
 feast_tsagaan_sar_events.0100.b: "Acho que posso poupar um pouco mais..."
 feast_tsagaan_sar_events.0100.c: "Parece que desta vez não vai ganhar nada!"
 feast_tsagaan_sar_events.0100.c_paranoid: "Perdido, é? Não acredito nisso."
 feast_tsagaan_sar_events.0101.t: "Uma Égua Gloriosa"
 feast_tsagaan_sar_events.0101.desc: "Do outro lado do campo, avisto um magnífico corcel, com sua pelagem branca como a lua. É uma beleza que rivaliza até com a mais bela das donzelas, com sua crina longa e solta e olhos que brilham como as estrelas.\n\nSua cavaleira, [horse_haver.GetName], percebe meu olhar fixo. \"Vejo que você tem um bom olhar\", diz ela. \"Você pode levá-la para um breve passeio, se quiser, mas tome cuidado. Ela é bem selvagem.\""
 feast_tsagaan_sar_events.0101.a: "Aceito sua oferta."
 feast_tsagaan_sar_events.0101.b: "Estou interessado em um arranjo mais #EMP permanente#!."
 feast_tsagaan_sar_events.0101.b.success: "[horse_haver.GetFirstNameNoTooltip] concorda em vender o cavalo para você"
 feast_tsagaan_sar_events.0101.b.failure: "[horse_haver.GetFirstNameNoTooltip] não quer se desfazer da égua"
 feast_tsagaan_sar_events.0101.b.duel: "Você pede a [horse_haver.GetFirstNameNoTooltip] para comprar o cavalo"
 feast_tsagaan_sar_events.0101.c: "Claro, só um passeio 'rápido'."
 feast_tsagaan_sar_events.0101.c.duel: "Você tenta roubar o cavalo durante o passeio"
 feast_tsagaan_sar_events.0101.c.success: "Você cavalga para longe da vista de [horse_haver.GetFirstNameNoTooltip]"
 feast_tsagaan_sar_events.0101.c.failure: "[horse_haver.GetFirstNameNoTooltip] alcança você"
 rival_stole_my_horse: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'robaste', 'robó' )] a adorada égua de [TARGET_CHARACTER.GetShortUIName]."
 rival_stole_my_horse_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'robaste', 'robó' )] a adorada égua de [CHARACTER.GetShortUIName]."
 feast_tsagaan_sar_events.0200.t: "Um Jogo de Shagai"
 feast_tsagaan_sar_events.0200.desc: "\"Saudações, [ROOT.Char.GetFirstNameNoTooltip]!\", [gambler.GetName] me chama. \"Vejo que vocês têm tempo de sobra. Gostariam de se juntar a mim em uma partida de [Glossary( 'shagai', 'SHAGAI_GLOSS' )]?\", pergunta, enchendo a mão com algumas astrágalos.\n\nEle se senta no chão de pernas cruzadas e me faz sinais para fazer o mesmo. [gambler.GetFirstNameNoTooltip] me relembra as regras, e nós nos revezamos para lançar os ossos."
 ts_wager: "Você aposta [gold_i]"
 feast_tsagaan_sar_events.0200.a: "Qual é a graça sem risco?"
 feast_tsagaan_sar_events.0200.a_tt: "$ts_wager$#V [GetPlayer.MakeScope.ScriptValue('medium_gold_value')]#!"
 feast_tsagaan_sar_events.0200.b_tt: "$ts_wager$#V [GetPlayer.MakeScope.ScriptValue('minor_gold_value')]#!"
 feast_tsagaan_sar_events.0200.c_tt: "$ts_wager$#V [GetPlayer.MakeScope.ScriptValue('tiny_gold_value')]#!"
 feast_tsagaan_sar_events.0200.b: "Posso apostar um pouco mais que uma quantia pequena."
 feast_tsagaan_sar_events.0200.c: "Apostarei uma pequena fração da minha riqueza."
 feast_tsagaan_sar_events.0200.d_content: "Não tenho necessidade de apostar."
 feast_tsagaan_sar_events.0200.d: "Não, mas obrigado."
 feast_tsagaan_sar_events.0200_lose: "Você perde o jogo"
 feast_tsagaan_sar_events.0200_win: "Você vence o jogo"
 friend_played_party_games: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer),'congeniasteis', 'congeniaron')] por jogos de azar."
 friend_played_party_games_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] [Select_CString(Or(TARGET_CHARACTER.IsLocalPlayer, CHARACTER.IsLocalPlayer),'congeniasteis', 'congeniaron')] pelos jogos de azar."
 SHAGAI_GLOSS: "#bold Shagai#! é um jogo de adivinhação jogado com ossos do tornozelo de ovelhas ou cabras. Os ossos são lançados como dados e caem em um dos quatro lados: cavalo, ovelha, camelo ou cabra. O cavalo e o camelo são considerados sortudos, enquanto a ovelha e a cabra não são."
 feast_tsagaan_sar_events.0210.t: "Sabedoria do Pastor"
 feast_tsagaan_sar_events.0210.desc: "As famílias se reúnem ao redor das fogueiras e das mesas, compartilhando comida e histórias. Estou sentado ao lado de [Select_CString( herder.IsFemale, 'una pastora entendida', 'un pastor entendido' )]. Ele se inclina para mim e aponta para um grande rebanho de ovelhas ao longe. \"Aquelas são minhas\", diz [herder.GetFirstNameNoTooltip]. \"Um presente para [ROOT.Char.GetInvolvedActivity.GetHost.Custom('ES_ElLa')] [ROOT.Char.GetInvolvedActivity.GetHost.GetTitleAsNameNoTooltip|l] que dou neste ano.\"\n\nContemplo as ovelhas, observando sua calma, maravilhado com sua quantidade incontável. Talvez eu devesse pedir conselhos a [herder.GetFirstNameNoTooltip] sobre como lidar com meu próprio rebanho."
 feast_tsagaan_sar_events.0210.a: "Perguntar como mantém um rebanho tão grande."
 feast_tsagaan_sar_events.0210.tt: "Você paga a [herder.GetFirstNameNoTooltip] por conselhos"
 feast_tsagaan_sar_events.0210.b: "Perguntar sobre métodos inteligentes de pastoreio."
 feast_tsagaan_sar_events.0210.c: "Não preciso de conselhos."
 feast_tsagaan_sar_events.0220.t: "O Reencontro com um Rival"
 feast_tsagaan_sar_events.0220.desc: "Me encontro cara a cara com [old_rival.GetName]. semelhante [old_rival.Custom2('InsultAdjectiveArticle', ROOT.Char)]. \"Ah... Vejo que vocês estão aqui, [ROOT.Char.GetFirstNameNoTooltip]. Espero que não tenham esquecido nosso passado, nem os males que me fizeram\", zomba [old_rival.GetFirstNameNoTooltip].\n\nSinto a tensão em suas palavras, mas continua calmamente. \"Em vista do ano novo, peço que deixemos nossas transgressões para trás\"."
 feast_tsagaan_sar_events.0220.a: "Concordo, a paz é o melhor caminho."
 feast_tsagaan_sar_events.0220.b: "Oh, podemos fazer algo #EMP muito mais#! interessante que isso."
 feast_tsagaan_sar_events.0220.b_flavor: "Uma faísca de paixão se acende, oculta pela tensão do passado."
 feast_tsagaan_sar_events.0220_win: "[old_rival.GetFirstNameNoTooltip] corresponde aos seus sentimentos"
 feast_tsagaan_sar_events.0220_lose: "[old_rival.GetFirstNameNoTooltip] sente repulsa"
 feast_tsagaan_sar_events.0220.c: "Por que não levar a anistia um passo adiante?"
 feast_tsagaan_sar_events.0220.d_vengeful: "Enquanto você viver, não!"
 feast_tsagaan_sar_events.0220.d: "Não, acho que não."
 friend_feast_rivalry: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'entablasteis', 'entablaron')] amizade durante um banquete após deixarem de lado sua rivalidade."
 feast_tsagaan_sar_events.0230.t: "Voz da Lua"
 feast_tsagaan_sar_events.0230.desc_intro: "Um grupo de convidados se dirige a uma iurta ao longe; entre eles se fala de uma apresentação. Sigo a agitação e observo enquanto todos os olhares se voltam para [throat_singer.GetName]. Ela começa a cantar, entoando sobre [throat_singer.Custom('GetRandomThroatSingingTheme')].\n\nO som se assemelha a"
 feast_tsagaan_sar_events.0230.desc_sygyt: "um assobio agudo e claro, como o vento soprando entre as árvores."
 feast_tsagaan_sar_events.0230.desc_hoomei: "um zumbido que cresce como uma tempestade ou segue a corrente deixada por um pássaro em voo."
 feast_tsagaan_sar_events.0230.desc_kargyraa: "um rosnado profundo e gutural, como o estrondo de uma tempestade ou o rugido de um urso."
 feast_tsagaan_sar_events.0230.desc_outro: "[observer.GetName] se vira para mim e sussurra, \"O(a) seu(ua) [throat_singer.Custom('GetThroatSingingStyle')|l] é bastante impressionante, não acha?\"\n\nObservo enquanto ele(a) termina a primeira melodia, e o público aplaude."
 feast_tsagaan_sar_events.0230.a: "[throat_singer.GetFirstNameNoTooltip] é realmente talentos."
 feast_tsagaan_sar_events.0230.b: "Poderia melhorar…"
 feast_tsagaan_sar_events.0230.b_tt: "Você vaia a apresentação de [throat_singer.GetFirstNameNoTooltip], causando constrangimento"
 feast_tsagaan_sar_events.0230.c: "Talvez eu cante junto com [throat_singer.GetSheHe]."
 feast_tsagaan_sar_events.0230.d: "Ah, eu também gostaria de cantar em [throat_singer.Custom('GetThroatSingingStyle')]!"
 feast_tsagaan_sar_events.0230.d.duel: "Você tenta imitar o estilo"
 feast_tsagaan_sar_events.0230.d.success: "Sua tentativa é bem-sucedida"
 feast_tsagaan_sar_events.0230.d_tt: "Você aprende o estilo de canto gutural [throat_singer.Custom('GetThroatSingingStyle')]"
 feast_tsagaan_sar_events.0230.d.failure: "Sua tentativa falha, mas você aprende um pouco mesmo assim"
 feast_tsagaan_sar_events.0240.t: "Um Presente em Forma de Canção"
 feast_tsagaan_sar_events.0240.desc: "Ao curtir uma noite de bebida e risadas com meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('audience'))], [audience.GetFirstName] comenta o tema do canto gutural. Menciono brevemente minha própria experiência e [audience.GetSheHe] sorri animadamente.\n\n\"Você consegue cantar em [ROOT.Char.Custom('GetThroatSingingStyle')|l]?\", pergunta. \"Eu adoraria ouvir uma canção!\"."
 feast_tsagaan_sar_events.0240.a: "Considere isto, então, como seu presente."
 feast_tsagaan_sar_events.0240.duel: "Você se apresenta para [audience.GetFirstNameNoTooltip]"
 feast_tsagaan_sar_events.0240.duel_new: "Você se apresenta para [audience.GetFirstNameNoTooltip], em um novo estilo"
 feast_tsagaan_sar_events.0240.success: "[audience.GetHerHim|U] cativa com seu talento"
 feast_tsagaan_sar_events.0240.ok: "Sua apresentação impressiona um pouco [audience.GetFirstNameNoTooltip]"
 feast_tsagaan_sar_events.0240.sygyt: "Estava pensando em tentar uma canção em [Glossary( 'sygyt', 'SYGYT_GLOSS' )]..."
 feast_tsagaan_sar_events.0240.hoomei: "Que tal uma melodia em [Glossary( 'hoomei', 'HOOMEI_GLOSS' )]?"
 feast_tsagaan_sar_events.0240.kargyraa: "Na verdade, gostaria de cantar em [Glossary( 'kargyraa', 'KARGYRAA_GLOSS' )]."
 feast_tsagaan_sar_events.0240.d_shy: "Eu não devia ter falado nada."
 feast_tsagaan_sar_events.0240.d: "Não sou muito bom em me apresentar."
 feast_tsagaan_sar_events.0240.success_sygyt_tt: "Você esquece seu estilo anterior e aprende o estilo de canto gutural sygyt"
 feast_tsagaan_sar_events.0240.success_hoomei_tt: "Você esquece seu estilo anterior e aprende o estilo de canto gutural hoomei"
 feast_tsagaan_sar_events.0240.success_kargyraa_tt: "Você esquece seu estilo anterior e aprende o estilo de canto gutural kargyraa"
 SYGYT_GLOSS: "#bold Sygyt#! é um estilo de canto gutural que muitas vezes se assemelha a um assobio ou flauta. Por ser claro e agudo, é usado para imitar o som da brisa ou o canto dos pássaros."
 HOOMEI_GLOSS: "O estilo de canto gutural mais popular, #bold Hoomei#! ou #bold Khoomei#!, pode ser descrito como um som zumbido, geralmente cantado na faixa média da voz do cantor."
 KARGYRAA_GLOSS: "O estilo profundo e quase gutural de canto é conhecido como #bold Kargyraa#!. Utilizando as cordas vocais falsas do cantor, é comparado ao som de um animal rosnando ou ao trovão ribombando."
 friend_throat_singing: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'congeniasteis', 'congeniaron')] por meio de uma apresentação de canto gutural."
 rival_throat_singing: "[CHARACTER.GetShortUIName|U] [CHARACTER.LocalPlayerString( 'insultaste', 'insultou' )] o canto gutural de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'seu personagem', TARGET_CHARACTER.GetShortUIName )]."
 rival_throat_singing_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] [TARGET_CHARACTER.LocalPlayerString( 'insultaste', 'insultou' )] o canto gutural de [Select_CString( CHARACTER.IsLocalPlayer, 'seu personagem', CHARACTER.GetShortUIName )]."
 feast_tsagaan_sar_events.0250.t: "Os Cavaleiros de [ROOT.Char.GetInvolvedActivity.GetCurrentPhase.GetLocation.GetName]"
 feast_tsagaan_sar_events.0250.desc: "Um vaqueiro traz um grupo de cavalos; seus pelos brilham à luz da lua. Os convidados se reúnem e admiram os animais, [horse_rider_1.GetName] corre animadamente [horse_rider_1.Custom('ES_OA')] a montar um cavalo, com [horse_rider_2.GetName] atrás.\n\n\"Eu contra você, [horse_rider_1.GetFirstNameNoTooltip]!\" grita [horse_rider_2.GetFirstNameNoTooltip]. [horse_rider_1.GetFirstNameNoTooltip] responde com uma risada. \"Não tenhamos pressa, [horse_rider_2.GetFirstNameNoTooltip]. Precisamos guardar energia para a corrida!\"\n\n[horse_rider_2.GetFirstNameNoTooltip] assente com a cabeça. \"Mais alguém quer se juntar a nós? Ou talvez apostar?\" pergunta [horse_rider_2.GetFirstNameNoTooltip]."
 feast_tsagaan_sar_events.0250.a: "[horse_rider_1.GetFirstNameNoTooltip] vai vencer!"
 feast_tsagaan_sar_events.0250.a_tt: "Você aposta que [horse_rider_1.GetFirstNameNoTooltip] vencerá a corrida"
 feast_tsagaan_sar_events.0250.b: "[horse_rider_2.GetFirstNameNoTooltip] parece um[horse_rider_2.Custom('ES_XA')] competidor[horse_rider_2.Custom('ES_XA')] forte."
 feast_tsagaan_sar_events.0250.b_tt: "Você aposta que [horse_rider_2.GetFirstNameNoTooltip] vencerá a corrida"
 feast_tsagaan_sar_events.0250.c: "Eu consigo vencer vocês dois![Select_CString(And(horse_rider_1.IsFemale, horse_rider_2.IsFemale),'las','los')] dois!"
 feast_tsagaan_sar_events.0250.c_tt: "Você entra na corrida"
 feast_tsagaan_sar_events.0250.d: "Vou apenas assistir."
 feast_tsagaan_sar_events.0250.after_tt: "A corrida começa..."
 feast_tsagaan_sar_events.0251.desc_intro: "[Select_CString(And(horse_rider_1.IsFemale, horse_rider_2.IsFemale),'Las','Los')] os cavaleiros estão prontos, e o público está ansioso para ver o resultado. [horse_rider_1.GetName] e [horse_rider_2.GetName] estão [Select_CString(And(horse_rider_1.IsFemale, horse_rider_2.IsFemale),'preparadas','preparados')] e os demais convidados estão prontos para assistir."
 feast_tsagaan_sar_events.0251.desc_watch: "Monto em um cavalo próximo e troto lentamente até uma colina, garantindo uma melhor visão do percurso da corrida. Eles partem, e os convidados aplaudem enquanto galopam pelo/a [ROOT.Char.GetCurrentLocation.Custom('GetTerrainType')|l]."
 feast_tsagaan_sar_events.0251.desc_race: "Ao montar em meu cavalo, [horse_rider_1.GetFirstNameNoTooltip] e [horse_rider_2.GetFirstNameNoTooltip] me lançam um olhar de lado. \"Vocês vão se juntar a [Select_CString(And(horse_rider_1.IsFemale, horse_rider_2.IsFemale),'nosotras','nosotros')]?\", pergunta [horse_rider_1.GetFirstNameNoTooltip]. \"Eu vou\", respondo, e partimos, correndo pela [ROOT.Char.GetCurrentLocation.Custom('GetTerrainType')]. \n\nCavalgamos em um ritmo constante, e logo pondero como posso levar vantagem."
 feast_tsagaan_sar_events.0251.a: "Que cavaleiros impressionantes!"
 feast_tsagaan_sar_events.0251.b: "Um empurrãozinho em [horse_rider_1.GetFirstNameNoTooltip] deve resolver."
 feast_tsagaan_sar_events.0251.b.duel: "Você tenta derrubar [horse_rider_1.GetFirstNameNoTooltip] do cavalo"
 feast_tsagaan_sar_events.0251.b_tt: "#p [horse_rider_1.GetFirstNameNoTooltip] está fora da corrida#!"
 feast_tsagaan_sar_events.0251.c: "[horse_rider_2.GetFirstNameNoTooltip] parece perigoso..."
 feast_tsagaan_sar_events.0251.c.duel: "Você tenta derrubar [horse_rider_2.GetFirstNameNoTooltip] do cavalo"
 feast_tsagaan_sar_events.0251.c_tt: "#p [horse_rider_2.GetFirstNameNoTooltip] está fora da corrida#!"
 feast_tsagaan_sar_events.0251.success: "Você consegue sabotar [Select_CString(Or(horse_rider_1.IsFemale, horse_rider_2.IsLocalPlayer), 'a la', 'al')] cavaleiro"
 feast_tsagaan_sar_events.0251.failure: "Você não consegue ferir [Select_CString(Or(horse_rider_1.IsFemale, horse_rider_2.IsLocalPlayer), 'a la', 'al')] cavaleiro"
 feast_tsagaan_sar_events.0251.lose: "#n Você está fora da corrida#!"
 feast_tsagaan_sar_events.0251.d: "Vou manter meu ritmo."
 feast_tsagaan_sar_events.0251.d.knocked_out_1: "[horse_rider_1.GetFirstNameNoTooltip] não consegue acompanhar"
 feast_tsagaan_sar_events.0251.d.knocked_out_2: "[horse_rider_2.GetFirstNameNoTooltip] fica para trás"
 feast_tsagaan_sar_events.0251.d.knocked_out_3: "Seu ritmo está muito lento"
 feast_tsagaan_sar_events.0251.after_tt: "A corrida continua..."
 feast_tsagaan_sar_events.0251.d_title: "Alguém está fora da corrida!"
 rival_cheated_horse_race: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'hiciste', 'hizo' )] trapaceou em uma corrida de cavalos contra [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'ti', TARGET_CHARACTER.GetShortUIName )]"
 rival_cheated_horse_race_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'hiciste', 'hizo' )] trapaceou em uma corrida de cavalos contra [CHARACTER.LocalPlayerString( 'ti', CHARACTER.GetShortUINameNoTooltip )]"
 feast_tsagaan_sar_events.0252.desc_knocked: "Observo os dois cavaleiros passarem por mim, e não consigo deixar de sentir um pouco de inveja. Eu é que deveria ter vencido, mas não consegui acompanhar a velocidade deles."
 feast_tsagaan_sar_events.0252.desc_knocked_1: "Olho para trás e vejo [horse_rider_1.GetFirstNameNoTooltip] cair no chão, restando apenas [horse_rider_2.GetFirstNameNoTooltip]. Estamos lado a lado, e os convidados vibram de empolgação."
 feast_tsagaan_sar_events.0252.desc_knocked_2: "Olho para trás e vejo [horse_rider_2.GetFirstNameNoTooltip] cair no chão, restando apenas [horse_rider_1.GetFirstNameNoTooltip]. Estamos lado a lado, e os convidados vibram de empolgação."
 feast_tsagaan_sar_events.0252.desc_watch: "[horse_rider_1.GetFirstNameNoTooltip] e [horse_rider_2.GetFirstNameNoTooltip] estão empatados e o público está na ponta da cadeira. [Select_CString(And(horse_rider_1.IsFemale, horse_rider_2.IsFemale), 'Las', 'Los')] os cavaleiros estão perto da linha de chegada, e os convidados os incentivam."
 feast_tsagaan_sar_events.0252.a: "Com certeza [final_opponent.GetFirstNameNoTooltip] não se importará se eu vencer..."
 feast_tsagaan_sar_events.0252.a.duel: "Você tenta superar [final_opponent.GetFirstNameNoTooltip]"
 feast_tsagaan_sar_events.0252.success: "Você engana [final_opponent.GetFirstNameNoTooltip]"
 feast_tsagaan_sar_events.0252.failure: "[final_opponent.GetFirstNameNoTooltip] percebe seu plano"
 feast_tsagaan_sar_events.0252.b: "Vamos ver como isso termina..."
 feast_tsagaan_sar_events.0252.c: "Só mais um esforço!"
 feast_tsagaan_sar_events.0252.after_tt: "A corrida chega ao fim"
 feast_tsagaan_sar_events.0253.desc_lost: "[rider_winner.GetName] faz girar seu cavalo com rapidez e eu fico para trás. Observo enquanto cruza a linha de chegada, e a multidão explode em excitação."
 feast_tsagaan_sar_events.0253.desc_won: "Faço um esforço final, e meu cavalo dispara à frente de [rider_winner.GetName]. Cruzo a linha de chegada, e a multidão explode em excitação."
 feast_tsagaan_sar_events.0253.desc_watch: "[horse_rider_1.GetName] e [horse_rider_2.GetName] aceleram lentamente, e o vencedor ainda é incerto. De repente, [rider_winner.GetFirstNameNoTooltip] dispara à frente e cruza a linha de chegada primeiro. A multidão explode em excitação."
 feast_tsagaan_sar_events.0253.a: "Que espetáculo!"
 feast_tsagaan_sar_events.0253.winner: "Sou [ROOT.Char.Custom('ES_ElLa')] o melhor!"
 feast_tsagaan_sar_events.0253.b: "Impressionante, [rider_winner.GetFirstNameNoTooltip]."
 feast_tsagaan_sar_events.0253.c: "Eu mereço uma vitória na próxima vez."
 feast_tsagaan_sar_events.0253.d: "Um[rider_winner.Custom('ES_XA')] cavaleiro como você, [rider_winner.GetFirstNameNoTooltip]."
 feast_tsagaan_sar_events.0253.bet_tt: "Você ganhou sua aposta"
 feast_tsagaan_sar_events.0260.t: "O grande conjunto de [drip_haver.GetFirstNameNoTooltip]"
 feast_tsagaan_sar_events.0260.desc: "Vejo ao longe [drip_haver.GetName] e me pego admirando suas vestes eloquentes. Ele/ela está adornado(a) com um belo [Glossary( 'deel', 'DEEL_GLOSS' )] branco, decorado com suaves penas.\n\n[drip_haver.GetFirstNameNoTooltip] se aproxima de mim e sorri embriagado(a). \"Ah, [ROOT.Char.GetFirstNameNoTooltip]! Espero que vocês tenham paz em seu coração nesta noite\", e aceno com a cabeça, pensando no que dizer em seguida."
 feast_tsagaan_sar_events.0260.a: "Elogiar[drip_haver.GetHerHim] por seu traje."
 feast_tsagaan_sar_events.0260.b_shy: "Saia de maneira estranha."
 feast_tsagaan_sar_events.0260.b: "Tome seu caminho."
 friend_tsagaan_sar_compliment: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer),'firmastes', 'firmaram')] amizade depois que [CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'elogiaste', 'elogiou' )] o traje de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'seu personagem', TARGET_CHARACTER.GetShortUIName )]."
 feast_tsagaan_sar_events.0270.t: "Desafio da Taça"
 feast_tsagaan_sar_events.0270.desc: "[drinker.GetName] vem até mim com um copo de [Glossary( 'airag', 'AIRAG_GLOSS' )] na mão. Sorri e ergue o copo em um brinde. \"À sua saúde, [ROOT.Char.GetFirstNameNoTooltip]!\", exclama [drinker.GetFirstNameNoTooltip].\n\nTomo a taça e a levo aos lábios. O airag é forte e noto os efeitos quase de imediato. \"Aposto que consigo beber mais que você\", me desafia [drinker.GetFirstNameNoTooltip]."
 AIRAG_GLOSS: "#bold Airag#! ou #bold Kumis#! é uma bebida tradicional mongol e turcomana feita com leite de égua fermentado."
 feast_tsagaan_sar_events.0270.win: "Você bebe muito mais que [drinker.GetFirstNameNoTooltip]"
 feast_tsagaan_sar_events.0270.win_price: "Você bebe mais que [drinker.GetFirstNameNoTooltip], mas com um preço"
 feast_tsagaan_sar_events.0270.lose: "[drinker.GetFirstNameNoTooltip] te supera"
 feast_tsagaan_sar_events.0270.a: "Você está feito, [drinker.GetFirstNameNoTooltip]!"
 feast_tsagaan_sar_events.0270.b: "Já bebi o suficiente por hoje."
 feast_tsagaan_sar_events.0270.b_paranoid: "Espere... o que você acabou de me dará"
 feast_tsagaan_sar_events.0280.t: "A Sabedoria do Ancião"
 feast_tsagaan_sar_events.0280.desc: "Em um momento de silêncio, vejo [elder.GetName] sentad[elder.Custom('ES_OA')] sozinhe, cochilando em seus pensamentos. Toco de leve seu ombro para ver se ainda está acordad[elder.Custom('ES_OA')] e se assusta de repente.\n\n«Ah, [ROOT.Char.GetFirstNameNoTooltip]», ri [elder.GetFirstNameNoTooltip]. «Peço desculpas. Já estive em celebrações como esta muitas vezes e ainda encho demais a minha taça. Espero que esteja se divertindo». Faço uma reverência adequada, sento-me ao lado de [elder.GetSheHe] e compartilhamos um momento de silêncio. [elder.GetFirstNameNoTooltip] aperta minha mão e começa a falar.\n\n«Vejo que você é uma pessoa de grande potencial, [ROOT.Char.GetFirstNameNoTooltip]. Pergunte-me como lidar com qualquer assunto, e responderei da melhor forma possível»."
 feast_tsagaan_sar_events.0280.a: "Conte-me sobre minha família."
 feast_tsagaan_sar_events.0280.a_grow: "Ele sugere que você aumente sua família"
 feast_tsagaan_sar_events.0280.a_strength: "Ele sugere que você fortaleça os laços da sua família"
 feast_tsagaan_sar_events.0280.b: "Conte-me sobre a guerra."
 feast_tsagaan_sar_events.0280.b_defense: "Sugerem que você se concentre em defender suas terras"
 feast_tsagaan_sar_events.0280.b_attack: "Sugerem que você se concentre em conquistar seus inimigos"
 feast_tsagaan_sar_events.0280.c: "Conte-me sobre o meu rebanho."
 feast_tsagaan_sar_events.0280.c_tend: "Sugere que você cuide do seu rebanho"
 feast_tsagaan_sar_events.0280.c_migrate: "Ele ancião sugere que você migre com eles"
 feast_tsagaan_sar_events.0280.d: "Eu simplesmente desejo aproveitar sua companhia."
 feast_tsagaan_sar_events.0290.t: "Ano do [ROOT.Char.Custom('GetLunarNewYearAnimal')]"
 feast_tsagaan_sar_events.0290.desc: "A noite foi longa; o som de risadas e copos tilintando enche o ar. [wise_guy.GetName] se reúne ao redor da iurta para fazer um brinde. \"Irmãos e irmãs!\" grita.\n\n\"Assim como a lua nova se ergue, reverenciamos o poder do/de da [ROOT.Char.Custom('GetLunarNewYearAnimal')], e as bênçãos que ele traz. Que [ROOT.Char.Custom('GetLunarNewYearAnimalToastDesc')]\". [wise_guy.GetFirstNameNoTooltip] ergue sua taça, e os convidados o(a) seguem, aplaudindo em uníssono.[wise_guy.GetHerHim]"
 feast_tsagaan_sar_events.0290.a: "Ao [ROOT.Char.Custom('GetLunarNewYearAnimal')]!"
 feast_tsagaan_sar_events.0290.b: "Uau, [wise_guy.GetFirstNameNoTooltip] é muito sábio."
 feast_tsagaan_sar_events.0300.t: "Uma Mão Amiga"
 feast_tsagaan_sar_events.0300.desc: "A noite vai caindo e me encontro em um canto silencioso da iurta. [cleaner.GetName] cantarola suavemente enquanto arruma o local às pressas, recolhendo todos os restos e migalhas que ficaram para três. Embora meus convidados sejam bem-vindos a se divertir sem precisar trabalhar, [cleaner.GetFirstNameNoTooltip] assumiu para si a tarefa de limpar o que eles deixam para três, mantendo o espaço fresco para o Ano-Novo."
 feast_tsagaan_sar_events.0300.a: "Obrigado pelo seu trabalho árduo, [cleaner.GetFirstNameNoTooltip]."
 feast_tsagaan_sar_events.0300.a_tt: "Você demonstra sua gratidão a [cleaner.GetFirstNameNoTooltip]"
 feast_tsagaan_sar_events.0300.b: "Ops, parece que você deixou um local sujo."
 feast_tsagaan_sar_events.0300.b_tt: "Você faz uma bagunça propositalmente para [cleaner.GetFirstNameNoTooltip] limpar"
 feast_tsagaan_sar_events.0300.c: "Ah, isso é bom."
 feast_tsagaan_sar_events.0310.t: "Confissões Impulsivas"
 feast_tsagaan_sar_events.0310.desc: "«Um presente para [ROOT.Char.GetFirstName]? Ha! Eu preferiria ser devorado vivo por corvos», gaba-se [bragger.GetName] para [bragger_friend.GetName]. «Shh!», sussurra [bragger_friend.GetFirstNameNoTooltip], lançando um olhar na minha direção. «Nunca se sabe quem pode estar ouvindo».\n\nMas o apelo de [bragger_friend.GetFirstNameNoTooltip] chega tarde demais, e já ouvi bravatas suficientes para saber que [bragger.GetFirstNameNoTooltip] não me presenteou com um presente neste ano."
 feast_tsagaan_sar_events.0310.a: "Você não tem lugar na minha casa."
 feast_tsagaan_sar_events.0310.b: "É necessário um presente para ficar."
 feast_tsagaan_sar_events.0310.b.duel: "Você tenta pegar um presente de [bragger.GetFirstNameNoTooltip]"
 feast_tsagaan_sar_events.0310.b.success: "[bragger.GetFirstNameNoTooltip] cede e escolhe um presente"
 feast_tsagaan_sar_events.0310.b.failure: "[bragger.GetFirstNameNoTooltip] se recusa a te dar um presente"
 feast_tsagaan_sar_events.0310.c: "Não prestarei atenção às palavras dele/ dela, desta vez."
 feast_tsagaan_sar_events.0320.t: "Honrando os Anciãos"
 feast_tsagaan_sar_events.0320.desc: "Com o passar do tempo, a sabedoria cresce. Existem aqueles que sobreviveram a muitas luas, transmitindo suas histórias de conquistas e lições de vida. Seus corpos são frágeis, seus sentidos estão diminuindo, mas suas mentes estão afiadas, e suas palavras têm significado.\n\nÀ medida que o tempo deles na terra diminui, não custa mostrar um pouco de respeito com uma oferta."
 feast_tsagaan_sar_events.0320.a: "Derrame presentes sobre eles!"
 feast_tsagaan_sar_events.0320.a_tt: "Cada [activity_guest|lE] com mais de #V 50#!:\n$EFFECT_LIST_BULLET$ Ganha #p 10#! [opinion|lE] de #V você#!"
 feast_tsagaan_sar_events.0320.b: "Eles já foram o suficiente honrados."
 feast_tsagaan_sar_events.0010.t: "O Tsagaan Sar"
 feast_tsagaan_sar_events.0010.desc: "[ROOT.Char.GetTitleAsNameNoTooltip], chama [gift_collector.GetName]. É hora de reunir as oferendas dos convidados. Espero que estejam pront[ROOT.Char.Custom('ES_OA')] para recebê-las. [gift_collector.GetFirstNameNoTooltip] faz um gesto em direção à entrada da iurta, onde uma fila de convidados espera para apresentar seus presentes.\n\nAceno com a cabeça e me preparo para o resto da noite."
 feast_tsagaan_sar_events.0010.a: "Traga os presentes!"
 feast_tsagaan_sar_events.0010.a_tt: "No total, você recebeu:\n $EFFECT_LIST_BULLET$ #V [GetPlayer.MakeScope.Var('feast_gold_total').GetValue]#! de [gold|lE] [gold_i]\n $EFFECT_LIST_BULLET$ #V [GetPlayer.MakeScope.Var('feast_herd_total').GetValue]#! de [herd|lE] [herd_i]\n $EFFECT_LIST_BULLET$ #V [GetPlayer.MakeScope.Var('feast_piety_total').GetValue]#! de [piety|lE] [piety_i]\n $EFFECT_LIST_BULLET$ #V [GetPlayer.MakeScope.Var('feast_prestige_total').GetValue]#! de [prestige|lE] [prestige_i]"
 tsagaan_sar_gift_title: "Presente do Tsagaan Sar"
 tsagaan_sar_gift_received: "Presente Recebido"
 # Modifiers
 stole_my_courtier_opinion: "Roubou a Opinião do Meu Cortesão"
 mpo_throatsinging_practice_modifier: "Prática de Canto de Garganta"
 mpo_throatsinging_practice_modifier_desc: "Este personagem tem praticado canto de garganta e está aprimorando suas habilidades."
 mpo_throatsinging_great_practice_modifier: "Grande Prática de Canto de Garganta"
 mpo_throatsinging_great_practice_modifier_desc: "Este personagem tem praticado canto de garganta e está dominando suas habilidades."
 mpo_throatsinging_duet_modifier: "Vozes Gêmeas"
 mpo_throatsinging_duet_modifier_desc: "Este personagem tem se apresentado cantando de garganta com um parceiro, alcançando uma excelente harmonia."
 mpo_throatsinging_good_performance_modifier: "Performance Impressionante"
 mpo_throatsinging_good_performance_modifier_desc: "Este personagem recentemente se apresentou cantando de garganta e fez uma boa apresentação para o público."
 mpo_throatsinging_great_performance_modifier: "Performance Magistral"
 mpo_throatsinging_great_performance_modifier_desc: "Este personagem recentemente se apresentou cantando de garganta e deixou o público maravilhado."
 mpo_big_herd_modifier: "Rebanho em Crescimento"
 mpo_big_herd_modifier_desc: "Este rebanho está sendo cuidado por um pastor habilidoso e está crescendo em tamanho."
 mpo_efficent_herd_modifier: "Pastoreio Eficiente"
 mpo_efficent_herd_modifier_desc: "Este personagem aprendeu métodos eficientes de pastoreio com um pastor habilidoso."
 mpo_horse_ride_modifier: "Cavalgada Majestosa"
 mpo_horse_ride_modifier_desc: "Este personagem recentemente andou em um cavalo majestoso e está se sentindo muito bem com isso."
 mpo_appreciate_fashion_modifier: "Apreciando Coisas Finas"
 mpo_appreciate_fashion_modifier_desc: "Este personagem ficou impressionado com a moda de outro e tem incorporado isso em sua própria corte."
 mpo_queasy_modifier: "Enjoado"
 mpo_queasy_modifier_desc: "Este personagem exagerou na bebida recentemente."
 mpo_elder_family_grow_modifier: "Conselho do Ancião: Crescimento"
 mpo_elder_family_grow_modifier_desc: "Este personagem foi aconselhado por um ancião a expandir sua família."
 mpo_elder_family_strength_modifier: "Conselho do Ancião: Força"
 mpo_elder_family_strength_modifier_desc: "Este personagem foi aconselhado por um ancião a fortalecer os laços familiares."
 mpo_elder_war_defense_modifier: "Conselho do Ancião: Defesa"
 mpo_elder_war_defense_modifier_desc: "Este personagem foi aconselhado por um ancião a defender suas terras."
 mpo_elder_war_attack_modifier: "Conselho do Ancião: Conquista"
 mpo_elder_war_attack_modifier_desc: "Este personagem foi aconselhado por um ancião a atacar seus inimigos."
 mpo_elder_flock_migrate_modifier: "Conselho do Ancião: Migração"
 mpo_elder_flock_migrate_modifier_desc: "Este personagem foi aconselhado por um ancião a migrar seu rebanho.\n\nAceitação da Migração: #p +5#!"
 mpo_elder_flock_tend_modifier: "Conselho do Ancião: Cuidar"
 mpo_elder_flock_tend_modifier_desc: "Este personagem foi aconselhado por um ancião a cuidar de seu rebanho."
 mpo_lunar_new_year_monkey_modifier: "Tsagaan Sar: Macaco"
