l_spanish:
 jamukha_choose_blood_brother_tt: "[jamukha.GetShortUIName] decidirá se seguirá em frente com o pacto de [blood_brothers|lE]"
 jamukha_warhorse_tt: "#high Você#! dará a [jamukha.GetShortUIName] um [GetModifier('horse_story_modifier').GetNameWithTooltip|l]"
 temujin_warhorse_tt: "[jamukha.GetShortUIName] lhe dará um [GetModifier('horse_story_modifier').GetNameWithTooltip|l]"
 temujin_warhorse_jamukha_tt: "#high Você#! dá a [temujin.GetShortUIName] um [GetModifier('horse_story_modifier').GetNameWithTooltip|l]"
 jamukha_warhorse_jamukha_tt: "[temujin.GetShortUIName] lhe dá um [GetModifier('horse_story_modifier').GetNameWithTooltip|l]"
 blood_brother_gains_hook_tt: "Recebe um [strong_hook|lE] #EMP (Irmão de Sangue)#! sobre #high você#!"
 blood_brother_gains_hook_other_tt: "#high Você#! recebe um [strong_hook|lE] #EMP (Irmão de Sangue)#! sobre [blood_bro.GetShortUIName]"
 mpo_jamukha_flavor.0001.t: "Anos de Irmandade"
 mpo_jamukha_flavor.0001.desc: "[temujin.Custom('ES_ElLa')|U] [temujin.GetTitledFirstName|l] y yo nos sentamos junto al fuego. Nuestras gentes se han unido en torno a nosotros en un único gran campamento.\n\nHan pasado años desde que le ofrecí amistad por primera vez, al guerrero joven abandonado por el clan de su padre. Echamos tabas sobre el hielo del río Onon. Juramos que siempre seríamos amigos.\n\nAún éramos niños. Desde entonces hemos guerreado juntos y nuestra amistad ha crecido. Ahora, como hombres, conocemos las palabras para ser [Glossary( 'anda', 'ANDA_GLOSS' )] de por vida."
 mpo_jamukha_flavor.0001.a: "Darei a [temujin.GetFirstNameNoTooltip] minha promessa de irmandade."
 mpo_jamukha_flavor.0001.a.tt: "E trocaremos presentes dignos."
 mpo_jamukha_flavor.0001.b: "Estou aqui para disputar poder. Não por amor."
 mpo_nerge_promised_feast_failed: "Falsas Promessas de Carne"
 mpo_nerge_promised_feast_failed_desc: "Aos nobres caçadores, este personagem prometeu uma montanha de boa carne. E não entregou."
 jamukha_temujin_response_warning_tt: "@warning_icon! #X [temujin.GetShortUIName] pode prejudicar seu @prestige_icon![prestige|lE] e @dread_icon![dread|lE]#!"
 negotiate_togrul_alliance_effect_tooltip: "[jamukha.GetShortUIName] e [togrul.GetShortUIName] entram em uma [alliance|lE] mútua"
 mpo_jamukha_flavor.0010.t: "Ofensas que Nenhum Mongol Pode Suportar"
 mpo_jamukha_flavor.0010.desc: "He dirigido a mi pueblo, durante un tiempo ya, junto [temujin.Custom('ES_AlAla')] [temujin.GetTitledFirstName|l], leal a sus caprichos, constante a pesar de mi mente atribulada.\n\nLas mujeres murmuran ponzoña en el oído de [temujin.GetFirstNameNoTooltip]. Sus guardias de noche me observan ceñudos cuando me acerco a su yurta. ¿Cuánto tiempo soportaré estos desaires?\n\n"
 mpo_jamukha_flavor.0010.desc_togrul: "E [Select_CString(togrul.IsFemale, 'a poderosa', 'o poderoso' )] [togrul.GetName|l] me prometeu sua proteção se eu abandonasse [temujin.GetFirstNameNoTooltip]..."
 mpo_jamukha_flavor.0020.t: "Homens com Sonhos Sangrentos"
 mpo_jamukha_flavor.0020.desc: "Cabalgo de noche al campamento [temujin.Custom('ES_DelDela')] [temujin.GetTitledFirstName|l], ardo de ira y vergüenza. El destino —pensamientos oscuros más allá de la luz del fuego de mi mente— me obliga.\n\nCuando [temujin.GetFirstNameNoTooltip] y yo éramos niños, partimos el cadáver de una marmota. Su carne ha permanecido en mis tripas, como un veneno, todos estos años. Nuestras palabras de amistad arden en mi mente y me desuellan el rostro cuando las recuerdo. ¿#EMP Cómo#! pude comprometer #EMP mi#! destino al hombre escogido para gobernar a todos los mongoles? Con mis promesas infantiles, me he dado la vida de un traidor.\n\n#EMP «¡Te destruiré!»#!, grito mientras [temujin.GetFirstNameNoTooltip] se burla. #EMP «Yo, [ROOT.Char.GetFirstName], soy kan de los [ROOT.Char.GetDomicile.GetCulture.GetCollectiveNoun]!»#!."
 mpo_jamukha_flavor.0010.a: "Preciso buscar meu destino. Sem [temujin.GetFirstNameNoTooltip]."
 mpo_jamukha_flavor.0010.b: "Minha palavra me prende, como uma espada no cinto de [temujin.GetFirstNameNoTooltip]."
 jamukha_chose_loyalty_modifier: "Escolheu Lealdade a Temujin"
 jamukha_chose_loyalty_modifier_desc: "Jamukha provou ser um amigo nobre e verdadeiro, mesmo à custa de seu próprio ego."
 jamukha_temujin_no_more_positive_tt: "@alert_icon! #X Todas as [relations|lE] positivas entre #high você#! e [temujin.GetShortUIName] foram destruídas"
 jamukha_temujin_rivals_tt: "[temujin.GetShortUIName] tornou-se seu [rival|lE]"
 jamukha_gain_from_defectors_tt: "#weak @herd_icon![herd|lE] e @prestige_icon![prestige|lE] ganhos devido aos mongóis se reunindo para a guerra"
 temujin_gain_from_defectors_tt: "$jamukha_gain_from_defectors_tt$"
 mpo_jamukha_flavor.0020.a: "#EMP "Seu maldito vira-lata, que já foi meu irmão!"#!"
 mpo_jamukha_flavor.0020.b: ""Sua morte será lamentável, [temujin.GetFirstNameNoTooltip]...""
 mpo_jamukha_flavor.0020.c: ""No campo de batalha, #EMP seu destino será meu!#!""
 mpo_jamukha_flavor.0020.b_murder: "Você ganha um bônus #P #EMP massivo#!#! para [schemes|lE] de [GetScheme('murder').GetTypeName|l] visando [temujin.GetShortUIName]"
 mpo_jamukha_flavor.0020.a_war_win: "Vencer uma [war|lE] #high ofensiva#! contra [temujin.GetShortUIName] concederá @legitimacy_icon![legitimacy|lE] e @prestige_icon![prestige|lE] adicionais"
