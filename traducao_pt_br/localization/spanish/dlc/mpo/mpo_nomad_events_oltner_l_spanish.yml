l_spanish:
 nomad_events_oltner.0001.t: "Pegadas Frescas"
 nomad_events_oltner.0001.desc: "Há muita caça em minhas terras. Os caçadores me falam de um/a [sighting_county_1.Custom('GetAnimalGroup')] de [sighting_county_1.Custom('GetAnimalPlural')] nos/as [sighting_province_1.Custom('GetTerrainTypePlural')] de [sighting_county_1.GetBaseNameNoTier], e de um exemplar particularmente [sighting_county_2.Custom('GetAnimalAdjective')] de [sighting_county_2.Custom('GetAnimalType')] que se esconde no/a [sighting_province_2.Custom('GetTerrainType')] de [sighting_county_2.GetBaseNameNoTier].\n\nComo [ROOT.Char.GetTitleAsNameNoTooltip|l] , devo escolher qual perseguir."
 nomad_events_oltner.0001.a: "Vamos nos fartar com [sighting_county_1.Custom('GetAnimalType')] esta noite."
 nomad_events_oltner.0001.b: "Matar o [sighting_county_2.Custom('GetAnimalAdjective')] [sighting_county_2.Custom('GetAnimalType')] provará meu valor."
 nomad_events_oltner.0001.c: "Outras questões exigem minha atenção."
 nomad_events_oltner.0002.t: "Trilhas de Penas"
 nomad_events_oltner.0002.desc: "Rumores dizem de um [sighting_province_1.Custom('GetAnimalGroup')] de [sighting_county_1.Custom('GetAnimalPlural')] avistado nas [sighting_province_1.Custom('GetTerrainTypePlural')] de [sighting_county_1.GetBaseNameNoTier] — uma oportunidade perfeita para treinar nossos falcões.\n\nClaro, eu poderia escolher perseguir caça maior em vez disso."
 nomad_events_oltner.0002.a: "Uma [sighting_county_1.Custom('GetAnimalType')] gorda logo estará cozinhando na minha panela."
 nomad_events_oltner.0002.b: "Prefiro treinar os cães."
 nomad_events_oltner.0002.c: "Não posso perder tempo com isso."
 nomad_events_oltner.0003.t: "Um [sighting_county_1.Custom('GetAnimalGroup')|U] de [sighting_county_1.Custom('GetAnimalPlural')]"
 nomad_events_oltner.0003.desc: "Vinte ovelhas mortas, um pastor mutilado e pegadas levando para as [sighting_province_1.Custom('GetTerrainTypePlural')]. Um [sighting_county_1.Custom('GetAnimalAdjective')] [sighting_county_1.Custom('GetAnimalGroup')] de [sighting_county_1.Custom('GetAnimalPlural')] está matando o que é meu em [sighting_county_1.GetBaseNameNoTier].\n\nDevo preparar meu arco e aljava. Minha reputação como [ROOT.Char.GetTitleAsNameNoTooltip|l] está em jogo."
 nomad_events_oltner.0003.a: "Minhas flechas irão perfurar os corações dos [sighting_county_1.Custom('GetAnimalPlural')]."
 nomad_events_oltner.0003.b: "Meu [maa_regiment.GetNameNoTooltip] matará o [sighting_county_1.Custom('GetAnimalGroup')]."
 nomad_events_oltner.0003.c: "[ROOT.Char.GetFaith.FertilityGodName] fará com que se afastem."
 nomad_events_oltner.0004.t: "[sighting_county_1.Custom('GetAnimalPlural')|U] no Zud"
 nomad_events_oltner.0004.desc: "O [my_subregion.GetCurrentPhase.GetName] não oferece nada além de neve e gelo. Até que o [sighting_county_1.Custom('GetAnimalGroup')] de [sighting_county_1.Custom('GetAnimalPlural')] se instalou. Eles comem tudo o que veem. Agora também nos oferecem a morte.\n\nNão ficarei parado enquanto meu rebanho e meu povo morrem."
 nomad_events_oltner.0004.a: "Eu caçarei cada último [sighting_county_1.Custom('GetAnimalType')]!"
 nomad_events_oltner.0004.b: "Esqueça os [sighting_county_1.Custom('GetAnimalPlural')]. Precisamos partir."
 nomad_events_oltner.0005.t: "Novas Trilhas a Seguir"
 nomad_events_oltner.0005.desc: "Este tempo de [my_subregion.GetCurrentPhase.GetName] chama por boa caça. A presa é abundante, reunindo-se nas [sighting_province_1.Custom('GetTerrainTypePlural')] de [sighting_county_1.GetBaseNameNoTier] em grande número — uma estação verdadeiramente abençoada por [ROOT.Char.GetFaith.WealthGodName].\n\nNão importa o que eu escolha caçar, terei minha escolha."
 nomad_events_oltner.0005.a: "Eu buscarei uma besta feroz."
 nomad_events_oltner.0005.b: "Cavalgamos em busca de veados e alces!"
 nomad_events_oltner.0005.c: "As garras de nossos falcões buscam novas presas."
 nomad_events_oltner.0006.t: "Tributo da Caçada"
 nomad_events_oltner.0006.desc: "«Me inclino ante vós, meu soberano[ROOT.Char.Custom('ES_OA')] de porte [ROOT.Char.Custom('FormalComplimentAdjective')]», diz meu tributári[generous_tributary.Custom('ES_OA')] [generous_tributary.Custom('ES_ElLa')] [generous_tributary.GetTitledFirstName|l], prostrando-se diante de mim.\n\n«Ofereço-vos o serviço de [offered_master_of_the_hunt.GetFirstNameNicknamed], [offered_master_of_the_hunt.Custom('ES_ElLa')] melhor [GetCourtPositionType('master_of_hunt_court_position').CalcTriggeredNameNoTooltip( ROOT.Char )|l] de todo o território [generous_tributary.GetPrimaryTitle.GetAdjective]. Que ele abata muitos veados em vosso nome…»."
 nomad_events_oltner.0006.a: "[offered_master_of_the_hunt.GetFirstNameNoTooltip] me servirá bem."
 nomad_events_oltner.0006.b: "Uma oferta esplêndida, deixe-me recompensá-lo."
 nomad_events_oltner.0006.c: "Mantenha-se[offered_master_of_the_hunt.GetHerHim] e que suas caçadas sejam bem-sucedidas."
 nomad_events_oltner.0007.t: "Tributo de Penas"
 nomad_events_oltner.0007.desc: "Soberano[ROOT.Char.Custom('ES_OA')] de porte [ROOT.Char.Custom('FormalComplimentAdjective')], ofereço-vos este presente. [generous_tributary.Custom('ES_ElLa')|U] [generous_tributary.GetTitledFirstName|l], meu tributári[generous_tributary.Custom('ES_OA')] carrega uma ave majestosa diante de mim.\n\nEste falcão vem das [tribute_capital.Custom('GetTerrainTypePlural')|l] de [tribute_capital_county.GetBaseNameNoTier], e eu mesmo o treinei desde que era um filhote. Ele derrubará centenas de patos e sisões para vós, eu vos juro."
 nomad_events_oltner.0007.a: "Eu a chamarei de '[ROOT.Char.Custom('GetBirdName')|U]!'"
 nomad_events_oltner.0007.b: "Por favor, fique com ela."
 chaotic_kurultai_title: "Sucessão Caótica:"
 chaotic_kurultai_intro_1: "M [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('dead_parent'))] [dead_parent.GetFirstNameNicknamed] [dead_parent.GetDeathReasonHideKiller]. O amanhecer do meu reinado começa. As vozes desunidas do Curiltai ecoam sobre o [ROOT.Char.GetCapitalLocation.Custom('TerrainTypeProvincePrefix')] [ROOT.Char.GetCapitalLocation.Custom('TerrainTypeProvince')].\n\n"
 chaotic_kurultai_intro_2: "O amanhecer do meu reinado começa. As vozes desunidas do Curiltai ecoam por todo o [ROOT.Char.GetCapitalLocation.Custom('TerrainTypeProvincePrefix')] [ROOT.Char.GetCapitalLocation.Custom('TerrainTypeProvince')]\n\n"
 mpo_chaotic_kurultai_succession.0001.t: "$chaotic_kurultai_title$ Ciúmes"
 mpo_chaotic_kurultai_succession.0001.desc: "Meu #EMP "[sibling_rival_1.Custom('ComplimentAdjective')]"#! [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('sibling_rival_1'))], [sibling_rival_1.GetFirstNameNicknamed], jura pela própria vida que deveria reinar sobre [ROOT.Char.GetPrimaryTitle.GetName]. O fato de que eu seja seu [ROOT.Char.GetTitleAsName|l] é uma piada dos [sibling_rival_1.GetFaith.EvilGodNames]. É um ser [sibling_rival_1.Custom('DescriptorNegativeStandalone')] e fraco."
 mpo_chaotic_kurultai_succession.0001.desc_addition: "\n\nE parece que essa espécie de [sibling_rival_2.Custom2('InsultNoun', ROOT.Char)] que é meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('sibling_rival_2'))] de [sibling_rival_2.GetFirstNameNicknamed] decidiu seguir o mesmo caminho."
 mpo_chaotic_kurultai_succession.0001.a: "Eu provarei meu valor com o tempo."
 rival_kurultai_succession: "[TARGET_CHARACTER.GetShortUIName|U] não [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'fuiste', 'fue')] eleita[TARGET_CHARACTER.Custom('ES_OA')] por unanimidade pelo kurultai durante a sucessão, o que [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'te', 'le')] rendeu a ira de [Select_CString(CHARACTER.IsLocalPlayer,'tu persona', CHARACTER.GetShortUIName)]"
 rival_kurultai_succession_corresponding: "[CHARACTER.GetShortUIName|U] não [Select_CString(CHARACTER.IsLocalPlayer, 'fuiste', 'fue')] escolhid[CHARACTER.Custom('ES_OA')] por unanimidade pelo kurultai durante a sucessão, o que [Select_CString(CHARACTER.IsLocalPlayer, 'te', 'le')] rendeu a ira de [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'tu persona', TARGET_CHARACTER.GetShortUIName)]."
 mpo_chaotic_kurultai_succession.0002.t: "$chaotic_kurultai_title$ Usurpação do Tributário"
 sibling_usurped_tributary_lands_tt: "[sibling_rival_1.GetShortUIName|U] usurpou todas as terras e vassalos de seu [tributary|lE] [tributary_usurped.GetShortUIName|U] e se tornou um [independent_ruler|lE]"
 mpo_chaotic_kurultai_succession.0002.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('sibling_rival_1'))] , [sibling_rival_1.GetFirstNameNicknamed] decidiu liderar um grupo de [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] às terras do meu tributário[tributary_usurped.Custom('ES_OA')] , [tributary_usurped.GetTitledFirstNameNicknamed|l] e tomou seu domínio à força."
 mpo_chaotic_kurultai_succession.0002.desc_addition: "Com o apoio de um[backing_kurultai.Custom('ES_XA')] traidor[backing_kurultai.Custom('ES_XA')] no kurultai, [backing_kurultai.GetFirstNameNicknamed]."
 mpo_chaotic_kurultai_succession.0002.desc_end: "\n\nIsso foi um erro fatal."
 mpo_chaotic_kurultai_succession.0002.a: "Atreve-se [sibling_rival_1.GetSheHe]a tomar o que é meu?"
 mpo_chaotic_kurultai_succession.0003.t: "$chaotic_kurultai_title$ Tributo Cessado"
 mpo_chaotic_kurultai_succession.0003.desc: "Meu tributário[tributary_leaving.Custom('ES_OA')] de [tributary_leaving.GetFirstNameNicknamed] de [tributary_leaving.GetPrimaryTitle.GetName] decidiu cessar os pagamentos de"
 mpo_chaotic_kurultai_succession.0003.desc_addition: "[backing_kurultai.GetFirstNameNicknamed], um[backing_kurultai.Custom('ES_XA')] membro rebelde do kurultai é cúmplice nesta traição."
 mpo_chaotic_kurultai_succession.0003.a: "![tributary_leaving.GetHerHim|U] destruirei por sua insolência!"
 mpo_chaotic_kurultai_succession.0003.desc_end: "\n\nEu terei meu tributo, de um jeito ou de outro."
 mpo_chaotic_kurultai_succession.0004.t: "$chaotic_kurultai_title$ Perda de Controle"
 mpo_chaotic_kurultai_succession.0004.desc: "Minhas terras de pastoreio estão infestadas de saqueadores, cães e vagabundos de temperamento [ROOT.Char.Custom2('InsultAdjective', ROOT.Char)]. Eles saqueiam minhas iurtas, matam meus cavalos e queimam meus estandartes."
 mpo_chaotic_kurultai_succession.0004.desc_addition: "É evidente que são incitados por [backing_kurultai.GetFirstNameNicknamed], um[backing_kurultai.Custom('ES_XA')] membro do kurultai tão [backing_kurultai.Custom2('InsultAdjective', ROOT.Char)]."
 mpo_chaotic_kurultai_succession.0004.a: "A ordem será restaurada, a seu tempo."
 mpo_chaotic_kurultai_succession.0004.desc_end: "\n\nEles entrarão na linha."
 mpo_chaotic_kurultai_succession.0005.t: "$chaotic_kurultai_title$ Desonra"
 mpo_chaotic_kurultai_succession.0005.desc: "Meu nome, arrastado pela sujeira. Pisoteado por cavalos. Desrespeitado, descartado."
 mpo_chaotic_kurultai_succession.0005.desc_addition: "E a maior parte das calúnias vem diretamente da boca do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('backing_kurultai'))] , [backing_kurultai.GetFirstNameNicknamed] , seu [backing_kurultai.Custom2('InsultAdjective', ROOT.Char)]."
 mpo_chaotic_kurultai_succession.0005.a: "Minha honra será restaurada."
 mpo_chaotic_kurultai_succession.0006.t: "$chaotic_kurultai_title$ Rebanho Perdido"
 mpo_chaotic_kurultai_succession.0006.desc: "Durante a noite, uma grande parte do meu rebanho desapareceu. Perdido ou roubado."
 mpo_chaotic_kurultai_succession.0006.desc_addition: "Suspeito que essa espécie de [backing_kurultai.Custom2('InsultAdjective', ROOT.Char)] do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('backing_kurultai'))] , [backing_kurultai.GetFirstNameNicknamed] a tenha libertado na noite."
 mpo_chaotic_kurultai_succession.0006.desc_end: "\n\nEles podem estar a meio caminho da [rustler.GetCapitalLocation.Custom('TerrainTypeProvince')] de [rustler.GetCapitalLocation.GetName], tanto faz. Eu não os verei novamente."
 mpo_chaotic_kurultai_succession.0006.a: "Minha força retornará."
 mpo_chaotic_kurultai_succession.1006.t: "Rebanho Perdido"
 mpo_chaotic_kurultai_succession.1006.desc: "Um rebanho de cabras e ovelhas, perdido ou abandonado, apareceu esta noite.\n\nAlguns dos animais são dóceis e poderiam aumentar facilmente meu rebanho. Há quem diga que a causa é a sucessão caótica [ruler_rustled.Custom('ES_DelDela')] [ruler_rustled.GetTitledFirstNameNicknamed|l] de [ruler_rustled.GetPrimaryTitle.GetName]."
 mpo_chaotic_kurultai_succession.1006.desc_addition: "Meus cavaleiros relatam ter visto [backing_kurultai.Custom('ES_AlAla')] [backing_kurultai.GetTitledFirstNameNicknamed|l], um[backing_kurultai.Custom('ES_XA')] membro rebelde do kurultai de [ruler_rustled.GetFirstNameNoTooltip], rondando pelas redondezas. Provavelmente isso é obra dele."
 mpo_chaotic_kurultai_succession.1006.a: "Adicionem-nos aos meus rebanhos."
 mpo_chaotic_kurultai_succession.1006.b: "Devolvam-nos a [ruler_rustled.GetFirstNameNoTooltip] como um presente."
 mpo_chaotic_kurultai_succession.1006.b.title: "[rustler.GetFirstName] devolve seu Rebanho"
 mpo_chaotic_kurultai_succession.1006.b.tt: "É devolvida a [herd|lE] perdida de [ruler_rustled.GetShortUIName]"
 mpo_chaotic_kurultai_succession.0007.t: "$chaotic_kurultai_title$ Cortesãos Defeituosos"
 mpo_chaotic_kurultai_succession.0007.desc: "Três dos meus melhores cortesãos desapareceram: [courtier_1.GetFirstNameNicknamed], [courtier_2.GetFirstNameNicknamed], e [courtier_3.GetFirstNameNicknamed] — sua ira foi provocada pelo debate da sucessão."
 mpo_chaotic_kurultai_succession.0007.desc_addition: "Incitados por essa espécie de [backing_kurultai.Custom2('InsultAdjective', ROOT.Char)] de meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('backing_kurultai'))], [backing_kurultai.GetFirstNameNicknamed], sem dúvida."
 mpo_chaotic_kurultai_succession.0007.desc_end: "\n\nDesprezam minha autoridade e agora cavalgam para [courtier_stealer.GetCapitalLocation.GetName] em busca de [Select_CString(ROOT.Char.IsFemale, 'uma nova senhora', 'um novo senhor' )]."
 mpo_chaotic_kurultai_succession.0007.a: "Ainda tenho muitos súditos leais."
 mpo_chaotic_kurultai_succession.1007.t: "Novos Chegados"
 mpo_chaotic_kurultai_succession.1007.desc: "Três viajantes, [courtier_1.GetFirstNameNicknamed], [courtier_2.GetFirstNameNicknamed] e [courtier_3.GetFirstNameNicknamed], chegaram buscando um lugar em minha corte.\n\nSão de [ruler_rustled.GetPrimaryTitle.GetName], e foram expulsos pela sucessão caótica [ruler_rustled.Custom('ES_DelDela')] [ruler_rustled.GetTitledFirstNameNicknamed|l]."
 mpo_chaotic_kurultai_succession.1007.desc_addition: "Provavelmente são incitados por [backing_kurultai.Custom('ES_ElLa')] [backing_kurultai.GetTitledFirstNameNicknamed|l], uma voz dissonante no kurultai de [ruler_rustled.GetFirstNameNoTooltip]."
 mpo_chaotic_kurultai_succession.1007.a: "Eles me servirão bem."
 mpo_chaotic_kurultai_succession.1007.b: "Devolva-os a [ruler_rustled.GetFirstNameNoTooltip]."
 mpo_chaotic_kurultai_succession.1007.b.title: "[courtier_stealer.GetFirstName] devolve seus Cortesãos"
 mpo_chaotic_kurultai_succession.0008.t: "$chaotic_kurultai_title$ Soldados Desertores"
 mpo_chaotic_kurultai_succession.0008.desc: "No caos da sucessão, meu melhor contingente de [defecting_maa.GetName] acabou desiludido. Essa hoste de caráter [maa_stealer.Custom2('InsultAdjective', ROOT.Char)] agora me abandona."
 mpo_chaotic_kurultai_succession.0008.desc_addition: "Provavelmente foram incitados por essa espécie de [backing_kurultai.Custom2('InsultAdjective', ROOT.Char)] que é meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('backing_kurultai'))], [backing_kurultai.GetFirstNameNicknamed]."
 mpo_chaotic_kurultai_succession.0008.desc_end: "\n\nA poeira das patas de seus cavalos segue em direção a [maa_stealer.GetPrimaryTitle.GetName]. Espero que pereçam lá."
 mpo_chaotic_kurultai_succession.0008.a: "Quem precisa deles?"
 mpo_chaotic_kurultai_succession.1008.t: "Soldados [defecting_maa.GetNameNoTooltip] Dispostos"
 mpo_chaotic_kurultai_succession.1008.desc: "Uma tropa bem armada de [defecting_maa.GetName] se apresenta diante de mim. Não parecem ser bandidos; pelo contrário, desejam servir em minhas fileiras.\n\nVêm de [ruler_rustled.GetPrimaryTitle.GetName], onde a sucessão caótica [ruler_rustled.Custom('ES_DelDela')] [ruler_rustled.GetTitledFirstNameNicknamed|l] causou sua deserção."
 mpo_chaotic_kurultai_succession.1008.desc_addition: "O fato é que provavelmente estejam aqui por causa [backing_kurultai.Custom('ES_DelDela')] [backing_kurultai.GetTitledFirstNameNicknamed|l], um[backing_kurultai.Custom('ES_XA')] membro desobediente do kurultai de [ruler_rustled.GetFirstNameNoTooltip]."
 mpo_chaotic_kurultai_succession.1008.a: "Eu poderia usar esses soldados."
 mpo_chaotic_kurultai_succession.1008.b: "Devolva-os a [ruler_rustled.GetFirstNameNoTooltip]."
 mpo_chaotic_kurultai_succession.1008.b.title: "[courtier_stealer.GetFirstName] te devolve os soldados"
 chaos_upgrade_maa_tt: "Outros [men_at_arms|lE] podem ser melhorados"
 regiment_destroyed_tt: "O [regiment|lE] de [defecting_maa.GetName] se juntou a [maa_stealer.GetFirstName]"
 mpo_chaotic_kurultai_succession.0009.t: "$chaotic_kurultai_title$ Tesouro Dividido"
 mpo_chaotic_kurultai_succession.0009.desc: "Meus irmãos estão furiosos com o veredicto do Curiltai, saqueando os cofres por sua parte."
 mpo_chaotic_kurultai_succession.0009.desc_addition: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('sibling_rival_1'))] [sibling_rival_1.GetFirstNameNicknamed] está furioso[sibling_rival_1.Custom('ES_OA')] com o veredito do kurultai e saqueou os cofres para conseguir sua parte.\n\nPagará por esta traição."
 mpo_chaotic_kurultai_succession.0009.desc_addition2: "\n\n[sibling_rival_1.GetFirstNameNicknamed], [sibling_rival_2.GetFirstNameNicknamed],"
 mpo_chaotic_kurultai_succession.0009.desc_addition3: "[sibling_rival_3.GetFirstNameNicknamed],"
 mpo_chaotic_kurultai_succession.0009.desc_addition4: "[sibling_rival_4.GetFirstNameNicknamed],"
 mpo_chaotic_kurultai_succession.0009.desc_addition5: "[sibling_rival_5.GetFirstNameNicknamed],"
 mpo_chaotic_kurultai_succession.0009.desc_end: "eles pagarão por essa traição."
 mpo_chaotic_kurultai_succession.0009.a: "A ganância deles será punida."
 mpo_chaotic_kurultai_succession.0010.t: "$chaotic_kurultai_title$ Autoridade Enfraquecida"
 mpo_chaotic_kurultai_succession.0010.desc: "Todos estão rindo de mim, me chamando de [ROOT.Char.Custom2('InsultAdjective', ROOT.Char)]. Dizem que sou fraco, inadequado para ser [ROOT.Char.GetTitleAsNameNoTooltip]."
 mpo_chaotic_kurultai_succession.0010.desc_addition: "Essa espécie de [backing_kurultai.Custom2('InsultAdjective', ROOT.Char)] que é meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('backing_kurultai'))] [backing_kurultai.GetFirstNameNicknamed] está rindo mais alto que todos os outros."
 mpo_chaotic_kurultai_succession.0010.desc_end: "\n\nComo ousam insultar minha força!?"
 mpo_chaotic_kurultai_succession.0010.a: "Preciso provar que estão errados..."
 mpo_chaotic_kurultai_succession.0011.t: "$chaotic_kurultai_title$ Fuga em Massa!"
 mpo_chaotic_kurultai_succession.0011.desc: "No meio da noite, minha manada entrou em pânico — os incêndios ardiam, os animais estavam desesperados. Isso não foi um acidente; eles foram incitados, foram feridos."
 mpo_chaotic_kurultai_succession.0011.desc_addition: "Meu [backing_kurultai.Custom2('InsultAdjective', ROOT.Char)] que é meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('backing_kurultai'))] [backing_kurultai.GetFirstNameNicknamed] me saúda com um sorriso cheio de dentes."
 mpo_chaotic_kurultai_succession.0011.desc_end: "\n\nRecuperei a maior parte deles. O restante ainda trota em direção a [rustler.GetCapitalLocation.GetName]."
 mpo_chaotic_kurultai_succession.0011.a: "Malditos animais medrosos!"
 mpo_chaotic_kurultai_succession.0012.t: "$chaotic_kurultai_title$ Reino Dividido"
 mpo_chaotic_kurultai_succession.0012.desc: "Está decidido. Herdarei apenas metade do reino. O resto irá para esse [sibling_rival_1.Custom2('InsultAdjective', ROOT.Char)] que é meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('sibling_rival_1'))] [sibling_rival_1.GetFirstNameNicknamed], que já se mudou para [sibling_rival_1.GetCapitalLocation.GetName]!\n\nMais da metade do kurultai apoiou isso. São uns tolos enganados."
 mpo_chaotic_kurultai_succession.0012.a: "O Curiltai pagará por isso!"
 sibling_tool_50_percent_tt: "[sibling_rival_1.GetFirstNameNicknamed], com a ajuda do [kurultai|lE], dividiu uma grande parte do seu [realm|lE] como um novo [kingdom|lE] [de_jure|lE]"
 mpo_chaotic_kurultai_succession.0013.t: "$chaotic_kurultai_title$ Reino Fragmentado"
 mpo_chaotic_kurultai_succession.0013.desc: "O veredicto está claro: a maior parte de nossas terras é minha. O resto recai sobre es[sibling_rival_1.Custom('ES_EA')] [sibling_rival_1.Custom2('InsultAdjective', ROOT.Char)] que é meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('sibling_rival_1'))] [sibling_rival_1.GetFirstNameNicknamed].\n\nQue apodreça em [sibling_rival_1.GetCapitalLocation.GetName]."
 mpo_chaotic_kurultai_succession.0013.a: "Será minha..."
 sibling_tool_20_percent_tt: "[sibling_rival_1.GetFirstNameNicknamed], com a ajuda do [kurultai|lE], dividiu uma pequena parte do seu [realm|lE] como um novo [kingdom|lE] [de_jure|lE]"
 mpo_chaotic_kurultai_succession.0014.t: "$chaotic_kurultai_title$ Dissolução"
 mpo_chaotic_kurultai_succession.0014.desc: "Irritados, aborrecidos, gritando, discutindo. Não há espaço para a lei, não há espaço para decisões. Apenas desunião.\n\nEste é o fim de [ROOT.Char.GetPrimaryTitle.GetName]."
 mpo_chaotic_kurultai_succession.0014.desc_alt: "Mas as vozes são fracas, impotentes. Não pode haver decisão, não pode haver direito, nem lei.\n\nEste é o fim de [ROOT.Char.GetPrimaryTitle.GetName]. Se ao menos meu predecessor tivesse escolhido membros suficientes para o Curiltai..."
 mpo_chaotic_kurultai_succession.0014.a: "Eu forjarei meu reino novamente!"
 liege_primary_title_chaos_desc: "Seu suserano perdeu seu [primary_title|lE] devido a uma [succession|lE] caótica"
 title_chaos_dissolved_tt: "O [kurultai|lE] , incapaz de chegar a uma conclusão, provocou a dissolução do seu [realm|lE]"
 mpo_chaotic_kurultai_succession.0015.t: "$chaotic_kurultai_title$ Trovão sem Cavaleiro"
 mpo_chaotic_kurultai_succession.0015.desc: "Começaram a dividir a manada, discutindo, brigando, até que a luta estourou. Os animais se dispersaram, correndo em todas as direções."
 mpo_chaotic_kurultai_succession.0015.desc_addition: "Semejante [backing_kurultai.Custom2('InsultAdjective', ROOT.Char)] que é meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('backing_kurultai'))] [backing_kurultai.GetFirstNameNicknamed] tentou, impotente, tentar encurralar as feras que precisamente [backing_kurultai.GetSheHe] espantou."
 mpo_chaotic_kurultai_succession.0015.desc_end: "\n\nPassei o dia tentando controlá-los. A maioria se perdeu em direção a [rustler.GetCapitalLocation.GetName]."
 mpo_chaotic_kurultai_succession.0015.a: "Minha manada está dizimada!"
 mpo_chaotic_kurultai_succession.0016.t: "$chaotic_kurultai_title$ Tributários Fugiram"
 mpo_chaotic_kurultai_succession.0016.desc: "[tributary_leaving.GetFirstNameNicknamed] de [tributary_leaving2.GetPrimaryTitle.GetName], [tributary_leaving2.GetFirstNameNicknamed] de [tributary_leaving.GetPrimaryTitle.GetName], e [tributary_leaving3.GetFirstNameNicknamed] de [tributary_leaving3.GetPrimaryTitle.GetName] cessaram seu tributo de moedas e gado."
 mpo_chaotic_kurultai_succession.0016.desc_addition: "Esse [backing_kurultai.Custom2('InsultAdjective', ROOT.Char)] que é meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('backing_kurultai'))] [backing_kurultai.GetFirstNameNicknamed] lhes deu coragem para me desafiar."
 mpo_chaotic_kurultai_succession.0016.desc_end: "\n\nEles se ajoelharão novamente em breve."
 mpo_chaotic_kurultai_succession.0016.a: "Ovelhas para o abate."
 mpo_chaotic_kurultai_succession.0017.t: "$chaotic_kurultai_title$ Tributo Murchando"
 mpo_chaotic_kurultai_succession.0017.desc: "Meus tributários assistiram à discórdia se desenrolar. Eles viram fraqueza, zombaram e partiram. As discussões abafaram minhas palavras."
 mpo_chaotic_kurultai_succession.0017.desc_addition: "Mais do que qualquer outra pessoa, esse tipo de [backing_kurultai.Custom2('InsultAdjective', ROOT.Char)] que é meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('backing_kurultai'))] [backing_kurultai.GetFirstNameNicknamed] atiçou as chamas, dando a eles coragem para me virar as costas."
 mpo_chaotic_kurultai_succession.0017.desc_end: "\n\nApenas os mansos permanecem."
 mpo_chaotic_kurultai_succession.0017.a: "Eles me servirão novamente em breve."
 mpo_chaotic_kurultai_succession.1000.t: "Canatos sucessores"
 mpo_chaotic_kurultai_succession.1000.desc: "O império está dividido. Os herdeiros disputam o controle, mas ninguém é forte o bastante para tomá-lo. Exceto por…"
 mpo_chaotic_kurultai_succession.1000.a: "Eu, claro."
