l_spanish:
 bp2_yearly.5000.t: "A Ponta Solta"
 bp2_yearly.5000.desc: "Meu poder como regente é quase total, mas ainda não consigo me livrar da sensação de que minha autoridade se apoia em bases instáveis. Sou [Select_CString( ROOT.Char.IsFemale, 'uma usurpadora', 'um usurpador' )] e os da minha laia muitas vezes precisam tomar medidas drásticas.\n\nHá um espinho em meu lado, em especial, do qual eu poderia me livrar com cuidado. [tower_prince.GetFirstName|U] é jovem, mas ainda é [tower_prince.Custom('ES_ElLa')] [tower_prince.GetTitleAsNameNoTooltip|l] legítim[tower_prince.Custom('ES_OA')]. Embora meu controle sobre este senhorio seja forte, haverá quem questione minha posição quando [Select_CString( tower_prince.IsFemale, 'a pirralha', 'o pirralho' )] atingir a idade adulta.\n\nEntão, talvez eu possa colocar [Select_CString( tower_prince.IsFemale, 'a menina', 'o menino' )] sob meu controle? Subornando as pessoas certas..."
 bp2_yearly.5000.a: "Isso deve ser feito."
 bp2_yearly.5000.a.flavor: "#WEAK A imponente torre prenderá [Select_CString( tower_prince.IsFemale, 'a desafortunada', 'o desafortunado' )] [tower_prince.Custom('GetPrincessPrince')|l]!#!"
 bp2_yearly.5000.a.success: "O ardil tem sucesso"
 bp2_yearly.5000.a.failure: "Sua estratégia falha"
 bp2_yearly.5000.a.tt: "Todos los vasallos de [tower_prince.GetFirstName|U] pierden #negative_value 15#! de opinión sobre #value ti#!"
 bp2_yearly.5000.b: "Eu não sou um monstro."
 bp2_yearly.5001.t: "[tower_prince.Custom('ES_ElLa')|U] [tower_prince.Custom('GetPrincessPrince')|l] na torre"
 bp2_yearly.5001.desc: "Agora que minha jogada deu certo e [tower_prince.GetFirstName|U] está tranquilamente trancad[tower_prince.Custom('ES_OA')], minha autoridade é quase incontestável. Ainda assim, ouço rumores nos lábios da corte, sussurros que perguntam, imploram, exigem: #EMP Onde está [tower_prince.Custom('ES_ElLa')] jovem [tower_prince.GetTitleAsNameNoTooltip|l]?#!\n\nDeixar [Select_CString( tower_prince.IsFemale, 'a criança', 'o garoto' )] ali resolverá muitos problemas."
 bp2_yearly.5001.a: "Adeus, doce perturbador[tower_prince.Custom('ES_XA')] dos meus sonhos…"
 bp2_yearly.5001.a.flavor: "[tower_prince.Custom('ES_ElLa')|U] jovem [tower_prince.Custom('GetPrincessPrince')|l] voltará a ver a luz do dia, mas com olhos bem diferentes…"
 bp2_yearly.5001.b: "Talvez agora eu possa forçar algumas mãos..."
 bp2_yearly.5001.b.tt: "Todos los [vassals|lE] de [tower_prince.GetFirstName|U] ganan #P 25#! de opinión sobre #value ti#!"
 bp2_yearly.5001.b.flavor: "Uma quantia substancial de moedas nos lugares certos, e eu terei lançado as bases para um golpe!"
 bp2_yearly.5001.b.bypass: "#WEAK Isto permitirá superar qualquer requisito temporal de [regency|lE] para a [decision|lE] Tentativa de derrubar o senhor#!"
 bp2_yearly.5001.c: "Pode ser libertado, se apoiar minha posição."
 bp2_yearly.5005.t: "Um[foreign_hostage.Custom('ES_XA')] estrangeir[foreign_hostage.Custom('ES_OA')] de aspecto [foreign_hostage.Custom('GetPrettyAdjective')]"
 bp2_yearly.5005.desc: "Quanto mais vejo de [foreign_hostage.GetFirstName], mais me cativa sua presença. Ele se vira e se prepara para tentar me ultrapassar como uma flecha enquanto corremos pelo jardim; os raios solares manchados de luz caem sobre seu rosto.\n\nO coração dispara por algo mais do que o esforço. Eu diminuo o ritmo até parar. O que está acontecendo comigo?\n\n\"[ROOT.Char.GetFirstNameNoTooltip]? O que houve?\" [foreign_hostage.GetFirstName] parou por um instante, ligeiramente preocupad[foreign_hostage.Custom('ES_OA')] com minha consternação.\n\nEstou #EMP tão#! nervoso[ROOT.Char.Custom('ES_OA')]..."
 bp2_yearly.5005.a: "Eu..."
 bp2_yearly.5005.a.tt: "Talvez [foreign_hostage.GetSheHe] sinta o mesmo?"
 bp2_yearly.5005.b: "É... nada."
 bp2_yearly.5006.t: "Palavras Doces"
 bp2_yearly.5006.desc: "Enquanto [crusher.GetFirstName] e eu corremos e brincamos no jardim, percebo que ele parou. Viro-me para olhar[crusher.GetHerHim] mas ele desvia o olhar, encarando o chão.\n\n“Eu... eu...”, consegue gaguejar depois de alguns segundos. Engolindo em seco, ele ergue a cabeça para olhar diretamente para um ponto logo acima da minha cabeça.\n\n“Eu realmente... gosto de você!”, consegue dizer, quase tremendo de nervosismo."
 bp2_yearly.5006.a: "Eu também gosto de você!"
 bp2_yearly.5006.b: "Que coisa mais estranha. Você é estranh[crusher.Custom('ES_OA')]."
 bp2_yearly.5007.t: "Amor Jovem"
 bp2_yearly.5007.desc: "Para meu alívio infinito, o rosto de [foreign_hostage.GetFirstName] se ilumina. [foreign_hostage.GetSheHe|U] sorri, assentindo timidamente, mas com entusiasmo. Nenhum de nós consegue encontrar palavras para dizer.\n\nEm vez disso, [foreign_hostage.GetFirstNameNoTooltip] estende a mão e segura a minha suavemente. \n\nPasseamos pelo jardim com colunatas, de mãos dadas, alheios ao mundo exterior. Em silêncio, desejo que este momento nunca acabe."
 bp2_yearly.5007.a: "Eu tenho um presente para você."
 bp2_yearly.5007.b: "Funcionou! É assim que eu me senti melhor na vida!"
 bp2_yearly.5008.t: "Punhal no Coração"
 bp2_yearly.5008.desc: "Para meu horror, o rosto de [foreign_hostage.GetFirstName] se contorce em uma careta incerta.\n\n\"O que quer dizer? Por que você está tão estranh[ROOT.Char.Custom('ES_OA')] ado?\" pergunta com desprezo.\n\nMeu coração jaz despedaçado sobre a cascalheira do jardim. Escondo o rosto para que [foreign_hostage.GetSheHe] não possa ver as lágrimas.\n\n\"Não é nada. Preciso ir embora.\""
 bp2_yearly.5008.a: "Talvez... talvez mude de ideia depois?"
 bp2_yearly.5008.b: "Como você pode ser tão #EMP cruel#!, [foreign_hostage.GetFirstNameNoTooltip]?"
 bp2_yearly.5009.t: "Planejando o Futuro"
 bp2_yearly.5009.desc: "O sol castiga com força enquanto [marry_crush.GetFirstName] e eu passeamos pelo jardim. [marry_crush.GetSheHe|U] se vira para mim.\n\n“Quando formos mais velhos, nós nos casaremos?”, pergunta seriamente. Minha expressão de confusão claramente provoca uma resposta. “Quando ambos tivermos idade suficiente, certamente devemos nos casar. É o nosso destino!”.\n\nConsidero essa possibilidade em silêncio. Minhas paixões queimam tão intensamente: certamente não pode haver futuro para mim sem [marry_crush.GetFirstNameNoTooltip], não é?"
 bp2_yearly.5009.a: "Claro que vamos!"
 bp2_yearly.5009.b: "Muita coisa pode mudar..."
 bp2_yearly.5010.t: "Recordações do Passado"
 bp2_yearly.5010.desc: "“É como nos velhos tempos, não é?”.\n\n[marry_crush.GetFirstName] me tira da minha divagação. Ele se senta ao meu lado e sorri amplamente. Só de ter[marry_crush.GetHerHim] comigo neste jardim realmente me traz lembranças de quando ambos éramos jovens e vergonhosamente devotos um ao outro.\n\n“Você se lembra de todo aquele tempo atrás? Nós até fizemos votos de nos casar um com o outro se ainda estivéssemos solteiros quando fôssemos adultos!” Ele ri alto ao lembrar disso. Éramos mesmo tão ingênuos, de verdade.\n\nEmbora..."
 bp2_yearly.5010.a: "Bem... que tal?"
 bp2_yearly.5010.a.flavor: "Alguns lampejos dessas brasas da infância ainda permanecem..."
 bp2_yearly.5010.a.tt: "Você pede [marry_crush.GetFirstNameNoTooltip] em casamento"
 bp2_yearly.5010.b: "Foram bons tempos, não foram?"
 bp2_yearly.5011.t: "Uma Proposta Decente"
 bp2_yearly.5011.desc: "\"Você se lembra…\", diz [root_crush.GetFirstName], virando-se para mim enquanto conversamos no jardim, \"que prometemos nos casar quando éramos crianças, se estivéssemos ambos solteiros quando adultos?\".\n\nSurpreendid[ROOT.Char.Custom('ES_OA')], volto meus pensamentos às minhas lembranças. #EMP Sí#! que me lembro. Em um jardim muito parecido com este, fizemos aquelas promessas ingênuas e esperançosas da infância. Éramos tão jovens, tão apaixonados. A lembrança me arranca um sorriso involuntário.\n\n\"Não me esqueci\". [root_crush.GetFirstNameNoTooltip] fica um pouco mais sincer[root_crush.Custom('ES_OA')] do que eu esperava. Toma minha mão entre as suas. \"Eu falava sério. Estamos ambos solteiros. Lembro como éramos felizes\"."
 bp2_yearly.5011.a: "… Sim. Sim, vamos fazer isso."
 bp2_yearly.5011.b: "Que tolice infantil! Se recomponha."
 bp2_yearly.5012.t: "Reacendido"
 bp2_yearly.5012.desc: "O rosto de [marry_crush.GetFirstName] é indecifrável por alguns instantes, mas rapidamente se transforma em feliz surpresa.\n\n\"É claro que eu vou! É claro!\" [marry_crush.GetSheHe|U] se lança em meus braços. Por um momento, é como se fôssemos novamente crianças, tateando nosso caminho por sentimentos confusos e eufóricos.\n\nSeguro sua mão e seguimos em direção à entrada do jardim. Afinal, há muito a organizar."
 bp2_yearly.5012.a: "Para sempre e sempre!"
 bp2_yearly.5012.b: "… Na verdade, talvez eu devesse repensar isso."
 bp2_yearly.5013.t: "Apagado"
 bp2_yearly.5013.desc: "O rosto de [marry_crush.GetFirstName] é indecifrável por alguns instantes, mas logo se transforma em confusão.\n\n“O que você quer dizer? Você está falando sério?”. [marry_crush.GetFirstNameNoTooltip] franze a testa. “Por que você está falando de velhas promessas de criança?”.\n\nTento formular as palavras, mas [marry_crush.GetSheHe] já está indo embora, balançando a cabeça com desdém[marry_crush.Custom('ES_OA')] com a cabeça."
 bp2_yearly.5013.a: "Oh..."
 bp2_yearly.5050.t: "O Poliglota"
 bp2_yearly.5050.desc: "Enquanto caminho pelo pátio, um pedaço de pergaminho rodopia na brisa. Eu o apanho, mas os estranhos traços borrados sobre ele não se parecem com nada que eu tenha visto antes.\n\nAh! Encontrastes meu bilhete! A voz de [polyglot.GetFirstName] me assusta. Ao perceber meu espanto, ele toca o fragmento com um gesto tranquilizador.\n\nÉ de outro idioma, [Select_CString( ROOT.Char.IsFemale, 'minha pequena senhora', 'meu pequeno senhor' )], não se preocupem! Eu consigo lê-lo, mas vocês não precisam se preocupar com isso por enquanto."
 bp2_yearly.5050.a: "\"Eu já sei mais de um! Me ensine!\""
 bp2_yearly.5050.b: "Mas... eu quero!"
 bp2_yearly.5050.c: "Isso é bom saber, pelo menos."
 bp2_yearly.5051.t: "Esconde-Esconde!"
 bp2_yearly.5051.desc: "Ecoam pelo meu [ROOT.Char.Custom('ResidenceBuilding')]. Risadinhas leves, que de vez em quando explodem em gargalhadas. Ao entrar em um(a) [ROOT.Char.Custom('GetRoom')], os culpados são revelados para mim.[child.GetHerHim] s culpados.\n\n[child.GetFirstName] —que, a julgar pelos livros jogados sobre a mesa, abandonou bastante os estudos— tem seu/sua [child.Custom2('RelationToMe', baby)] [baby.GetFirstName] nos braços. O bebê balbucia feliz enquanto [child.GetFirstNameNoTooltip] esconde o rosto com as mãos, e amb[child.Custom('ES_OA')] s riem felizes."
 bp2_yearly.5051.a: "É bom que eles estejam passando tempo juntos!"
 bp2_yearly.5051.b: "\"[child.GetFirstNameNoTooltip]! Lembre-se de fazer seus estudos!\""
 bp2_yearly.5052.t: "Velhas Histórias"
 bp2_yearly.5052.desc: "Meu passo se apressa menos ao me aproximar de uma [ROOT.Char.Custom('GetRoom')]. Acho que ouço uma voz. Sim, aí está!\n\nEspio meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('grandparent'))], [grandparent.GetFirstName], segurando com pompa seu net[child.Custom('ES_OA')], [child.GetFirstName], encantad[child.Custom('ES_OA')] com uma história. Eu também escuto, mas só capto trechos soltos.\n\n[grandparent.GetFirstNameNoTooltip] está contando algumas histórias de uma vida bem vivida, e fica claro que as histórias de tempos novos e antigos soam muito verdadeiras para [child.GetFirstNameNoTooltip], que fica de boca aberta."
 bp2_yearly.5052.a: "\"Bem... e sobre a vez #EMP que eu#! fiz isso, hein?\""
 bp2_yearly.5052.b: "\"Se importa se eu me juntar a este círculo animado?\""
 bp2_yearly.5052.c: "Isso é fofo. É melhor deixá-los em paz."
 bp2_yearly.5053.t: "Refém do Coração"
 bp2_yearly.5053.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('ward'))], [ward.GetFirstName], sorri com minha piada e se despede com carinho ao retornar aos estudos. De repente, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('angry_kid'))] [angry_kid.GetFirstName] irrompe furios[angry_kid.Custom('ES_OA')].\n\n\"Admita!\", grita [angry_kid.GetSheHe] com raiva. \"Você vem se encantando cada vez mais com ess[ward.Custom('ES_EA')] #EMP estrangeir[ward.Custom('ES_OA')]#!.\""
 bp2_yearly.5053.a: "\"Você sabe que nunca posso substituir minha família, [angry_kid.GetFirstNameNoTooltip].\""
 bp2_yearly.5053.b: "\"Eu nunca me sentiria assim!\""
 bp2_yearly.5053.b.success: "[angry.GetHerHim|U] convence"
 bp2_yearly.5053.b.failure: "Não [angry.GetHerHim] convences"
 bp2_yearly.5053.c: "![ward.GetFirstNameNoTooltip] é mais [ward.Custom('GetDaughterSon')] para mim do que você jamais foi!"
 bp2_yearly.5054.t: "Amigos Firmes"
 bp2_yearly.5054.desc: "Risos e luz irrompem em meus aposentos, anunciando a chegada do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))] [child.GetFirstName] e do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hostage'))] [hostage.GetFirstName]. Os dois ficam correndo alegremente um atrás do outro com brinquedos.\n\nDuas crianças de origens bastante diferentes se encontrando brincando inocentemente; suas semelhanças acabam sendo mais numerosas do que suas diferenças.\n\nSerá que isso é bom?"
 bp2_yearly.5054.a: "É bom vê-los se dando bem."
 bp2_yearly.5054.b: "\"[child.GetFirstNameNoTooltip]! Espere um momento e ouça...\""
 bp2_yearly.5054.b.tt: "Terá que saber que não se pode simplesmente confiar em todo mundo."
 bp2_yearly.5100.t: "Desafiante Aproximando-se"
 bp2_yearly.5100.desc: "#EMP Ziuu-crac!#! O som de uma espada de madeira zunindo no ar e acertando seu alvo me empolga. Preparo-me para dar outro golpe, mas chamei a atenção de outr[challenger.Custom('ES_OA')]. [challenger.GetFirstName] desce os degraus brandindo sua própria espada.\n\n\"[ROOT.Char.GetFirstNameNoTooltip]! Vamos ver como você se sai contra #EMP mim#!.\"\n\nOlho para [challenger.GetFirstNameNoTooltip] de cima a baixo com desconfiança."
 bp2_yearly.5100.a: "Tudo bem. Assuma sua postura!"
 bp2_yearly.5100.a.tt: "Inicia um duelo com [challenger.GetFirstNameNoTooltip]."
 bp2_yearly.5100.b: "Que tal realizarmos uma batalha simulada, em vez disso?"
 bp2_yearly.5100.b.tt: "Com foco em manobras, certamente pouparemos nossas cabeças de dores..."
 bp2_yearly.5101.t: "Passatempo de Cavalo"
 bp2_yearly.5101.desc: "A porta se abre de repente quando galopo atrás de [child.GetFirstName], montados em nossos cavalinhos de madeira e rindo entusiasmad[ROOT.Char.Custom('ES_OA')] enquanto corremos pelo gabinete. [councillor.GetFirstName], meu/minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('councillor'))], ergue o olhar cansad[councillor.Custom('ES_OA')] dos maços de pergaminhos que examinava.\n\n\"Tendes que organizar este estudo\", diz [councillor.GetSheHe]."
 bp2_yearly.5101.a: "Como #EMP ousa#! me dar ordens?!"
 bp2_yearly.5101.b: "Eu vou te desafiar lá fora, [child.GetFirstNameNoTooltip]!"
 bp2_yearly.5101.b.tt: "Nenhum deles vai perceber que estou fazendo isso apenas para tirar a gente da sala..."
 bp2_yearly.5101.b.success: "Você vence a corrida"
 bp2_yearly.5101.b.failure: "Você perde a corrida"
 bp2_yearly.5101.c: "\"Desculpe, [councillor.GetFirstNameNoTooltip]. Nós vamos parar.\""
 bp2_yearly.5102.t: "Repercussões Imediatas"
 bp2_yearly.5102.desc: "É a vez de [sibling.GetFirstName] de me perseguir enquanto brincamos no pátio, e meu coração dispara enquanto me esquivo entre os canteiros de flores.\n\nDesequilibrad[sibling.Custom('ES_OA')], [sibling.GetFirstNameNoTooltip] e dá uma cambalhota, e, sem pensar duas vezes, dou-lhe um empurrão oportunista. [sibling.GetFirstNameNoTooltip] despenca... bem em cima de um roseiral cheio de espinhos!\n\nOs gritos imediatos que cortam o ar eram tão previsíveis quanto estridentes. Erguendo-se cambaleante, imediatamente — observo com horror — começa a trotar na direção dos aposentos de noss[parent.Custom('ES_OA')] [parent.GetMotherFather]."
 bp2_yearly.5102.a: "Por favor, pare! Eu... Eu vou... vou comprar um brinquedo para você!"
 bp2_yearly.5102.a.tt: "[sibling.GetFirstNameNoTooltip] recebe [newly_created_artifact.GetName]"
 bp2_yearly.5102.b: "Não, não conte para [parent.GetMotherFather]!"
 bp2_yearly.5102.b.success: "Você convence [sibling.GetFirstNameNoTooltip]"
 bp2_yearly.5102.b.failure: "[sibling.GetFirstNameNoTooltip] não se deixa persuadir"
 bp2_yearly.5102.c: "\"Ah, supera isso, seu chorãozinho[sibling.Custom('ES_OnOna')]!\""
 bp2_yearly.5103.t: "Contrabando de Doces"
 bp2_yearly.5103.desc: "Ao passar, sinto um aroma maravilhoso vindo das cozinhas. Meu estômago roncando me leva até a porta, e uma espiada cautelosa revela exatamente o que eu esperava.\n\n[ROOT.Char.Custom('FavoriteTreatDemand')|U]! Sem vigilância! Ou, pelo menos, isso #EMP parece#!. Outro olhar cauteloso pela sala não revela nada óbvio. Só preciso correr até lá e...\n\n\"[ROOT.Char.GetFirstNameNoTooltip]!\" Congelo, com a mão estendida, a meros centímetros."
 bp2_yearly.5103.a: "\"Você não pode me impedir! Eu vou #EMP dominar#! em breve!\""
 bp2_yearly.5103.b: "Hora de dar o fora!"
 bp2_yearly.5103.b.success: "Você consegue escapar, com um doce na mão"
 bp2_yearly.5103.b.failure: "Seu [child.Custom2('RelationToMeShort', parent)] o pega e lhe dá uma surra"
 bp2_yearly.5103.c: "\"Desculpe. Não farei isso de novo.\""
 bp2_yearly.5104.t: "A Criança Solitária"
 bp2_yearly.5104.desc: "Entro no pátio, com um brinquedo na mão, só para encontrar [child.GetFirstName] largad[child.Custom('ES_OA')] em um banco. Mal percebe minha presença e suspira diante das minhas tentativas de animá-l[child.Custom('ES_OA')]. Meu brinquedo fica intocado, e eu fico coçando a cabeça.\n\nO que faço agora?"
 bp2_yearly.5104.a: "Vou apenas sentar aqui e compartilhar o clima com eles."
 bp2_yearly.5104.b: "\"Vamos lá, [child.GetFirstNameNoTooltip], venha brincar!\""
 bp2_yearly.5104.b.success: "Você consegue persuadir [child.GetFirstNameNoTooltip] a brincar, e eles logo ficam mais animados"
 bp2_yearly.5104.b.failure: "Nada que você faça consegue animar [child.GetFirstNameNoTooltip]"
 bp2_yearly.5104.c: "Bem… melhor deixá-los sozinhos?[child.GetHerHim] deixo?"
 bp2_yearly.5104.c.tt: "Talvez eu possa aprender algo com isso..."
 bp2_yearly.5105.t: "Pela Honra e Glória!"
 bp2_yearly.5105.desc: "\"[ROOT.Char.GetFirstNameNoTooltip]!\", ecoa uma voz estridente pelo pátio. \"Desafio você para um torneio de justa para defender sua honra! Escolha seu corcel e empunhe sua lança, poderos[ROOT.Char.Custom('ES_OA')] guerreir[ROOT.Char.Custom('ES_OA')]\".\n\n[child.GetFirstName] brandindo um galho, segurando um cavalinho de madeira entre as pernas. Minha própria montaria foi cuidadosamente deixada em um banco próximo, ao lado de um galho de tamanho semelhante.\n\nParece que [child.GetFirstNameNoTooltip] veio muito preparad[child.Custom('ES_OA')] para a batalha!"
 bp2_yearly.5105.a: "\"Venha então, [child.GetLadyLord] [child.GetFirstNameNoTooltip]! Vamos duelar!\""
 bp2_yearly.5105.a.tt: "A justa começa!"
 bp2_yearly.5105.a.success: "Você marca um golpe bem-sucedido"
 bp2_yearly.5105.a.failure: "[child.GetFirstNameNoTooltip] dá o primeiro golpe"
 bp2_yearly.5105.b: "Acho que a discrição é a melhor parte da coragem aqui."
 bp2_yearly.5106.t: "Um Golpe, Registrado"
 bp2_yearly.5106.desc.winning: "Meu \"lança\" atinge [child.GetFirstName] no peito, deixando uma pequena marca na pele. Eu me afasto triunfante enquanto [child.GetSheHe] esfrega o torso, magoado[child.Custom('ES_OA')]."
 bp2_yearly.5106.desc.losing: "A lança de [child.GetFirstName] me acerta em cheio no peito, me fazendo cambalear. [child.GetSheHe|U] se afasta triunfante."
 bp2_yearly.5106.ending: "\n\nA primeira investida é sempre uma loteria. Agora, tudo se resume a lembrar o treinamento e os ensinamentos, e a considerar quaisquer vantagens táticas.\n\nO vento agita as folhas das árvores enquanto nos alinhamos para outra investida — possivelmente decisiva."
 bp2_yearly.5106.a: "Vamos ver como isso se desenrola..."
 bp2_yearly.5106.a.tt: "Esta rodada é crucial: ou vencer, ou permanecer na competição..."
 bp2_yearly.5106.a.success: "Seu golpe é preciso"
 bp2_yearly.5106.a.failure: "O bastão de [child.GetFirstNameNoTooltip] se esgueira"
 bp2_yearly.5106.b: "\"Podemos parar agora?\""
 bp2_yearly.5107.t: "Um Golpe, Retornando"
 bp2_yearly.5107.desc.winning: "Meu bastão afunda, se ergue, passa por baixo de [child.GetFirstName] e [child.Custom('ES_LeLa')] acerta perfeitamente o estômago! [child.GetFirstNameNoTooltip], sem fôlego, luta para se levantar."
 bp2_yearly.5107.desc.losing: "[child.GetFirstName] não é tão fácil de vencer quanto eu esperava. Em vez de fraquejar, seu bastão golpeia meu abdômen. Eu me curvo, lutando para esconder minha irritação enquanto [child.GetFirstNameNoTooltip] esboça um sorriso."
 bp2_yearly.5107.ending: "Agora amb[ROOT.Char.Custom('ES_OA')] s carregamos as marcas de batalha em nossos corpos.\n\nA primeira investida acalma os nervos, a segunda emprega táticas, mas a terceira... a terceira rodada trata de ler o oponente, colocar em prática todo o conhecimento que adquirimos até agora, e identificar sinais.\n\nEstou pront[ROOT.Char.Custom('ES_OA')]."
 bp2_yearly.5107.a: "Pela vitória!"
 bp2_yearly.5107.a.success: "Você acerta em cheio e vence a justa"
 bp2_yearly.5107.a.failure: "É que [child.GetFirstNameNoTooltip] é simplesmente rápido demais[child.Custom('ES_OA')]"
 bp2_yearly.5107.b: "\"Bem, ambos vencemos uma, que tal chamarmos de empate?\""
 bp2_yearly.5107.b.tt: "\"Uma justa equilibrada mesmo\""
 bp2_yearly.5107.b.tt_success: "Você pode vencer o próximo torneio"
 bp2_yearly.5107.b.tt_fail: "Foi apenas um jogo"
 bp2_yearly.5107.b_tt_fail: "Você não aprende nada com isso"
 bp2_yearly.5108.t: "Uma Justa Excelente!"
 bp2_yearly.5108.desc.winning: "Quase fecho os olhos no momento do impacto, mas, ainda assim, meu golpe acerta mais uma vez. Meu bastão se choca contra o esterno de [child.GetFirstName], estilhaçando-se espetacularmente.\n\nDe fato, [child.Custom('ES_LeLa')] o derruba completamente, e me vejo de pé sobre seu corpo caído por um instante, Antes que [child.GetFirstNameNoTooltip] se levante com dificuldade.\n\nA vitória é minha e, sem dúvida, é muito #EMP muito#! doce."
 bp2_yearly.5108.desc.losing: "O bastão de [child.GetFirstName] balança por um instante, mas não é um vacilo, e sim uma finta. Ele golpeia meu torso, tira o ar dos meus pulmões e eu caio no chão.\n\n[child.GetFirstNameNoTooltip] recua enquanto me esforço para me levantar, mas a dor da derrota fere ainda mais do que meus arranhões e hematomas."
 bp2_yearly.5108.a: "\"Você duelou com grande habilidade, [child.GetFirstNameNoTooltip].\""
 bp2_yearly.5108.b: "\"Ha! E é por isso que sou [ROOT.Char.Custom('ES_ElLa')] #EMP melhor#!!\"."
 bp2_yearly.5108.c: "\"Uma justa excelente, [child.GetFirstNameNoTooltip]!\""
 bp2_yearly.5108.d: "Já [child.Custom('ES_LeLa')] vou pegá-lo por essa sorte absurda que teve…"
 bp2_yearly.5109.t: "Coração Partido Duradouro"
 bp2_yearly.5109.desc: "O pátio ecoa com o som de suaves soluços. [child.GetFirstName] se senta em um banco, com lágrimas escorrendo pelo rosto. Tenta contê-las enquanto eu me aproximo, apontando tristemente para o espaço ao lado dele.\n\n"
 bp2_yearly.5109.desc_unrelated: "\"Sinto tanta falta do meu [parent.GetMotherFather]. Eu... eu não consigo parar de pensar em [parent.GetSheHe].\"\n\nJá faz bastante tempo desde que [parent.GetFirstName], [Select_CString( parent.IsFemale, 'a mãe', 'o pai' )] de [child.GetFirstNameNoTooltip], morreu, mas está claro que ainda sente profundamente sua perda."
 bp2_yearly.5109.desc_sibling: "\"Sinto tanta falta de [parent.GetMotherFather]. Eu… eu não consigo parar de pensar em [parent.GetSheHe]\".\n\nFaz bastante tempo desde que nosso [parent.GetFirstName], noss[parent.Custom('ES_OA')] [parent.GetMotherFather], mas está claro que ainda sente profundamente essa perda."
 bp2_yearly.5109.a: "\"Lembre-se. [parent.GetSheHe] está cuidando de você, sempre.\""
 bp2_yearly.5109.b: "Posso tentar tirar isso[child.GetHerHim] da cabeça."
 bp2_yearly.5109.b.success: "Você consegue consolar[child.GetHerHim]"
 bp2_yearly.5109.b.failure: "[child.GetFirstNameNoTooltip] está inconsolável"
 bp2_yearly.5109.c: "Não tenho certeza do que dizer aqui."
 bp2_yearly.5109.c.tt: "Vou ver se posso me afastar discretamente..."
