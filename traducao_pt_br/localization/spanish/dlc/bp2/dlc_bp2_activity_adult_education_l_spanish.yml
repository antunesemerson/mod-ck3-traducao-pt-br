 #EVENTS
 goliardic_shenanigans_effect_tt: "Você participa de [goliardic_shenanigans|lE]!"
 bp2_adult_education.0005.t: "Invalidado"
 bp2_adult_education.0005.desc: "Minhas esperanças e sonhos de crescimento pessoal foram destruídos.\n\nEnquanto estou em minha cela, só posso imaginar com nostalgia todo o conhecimento que eu poderia estar adquirindo. Isso terá que esperar para outro momento."
 bp2_adult_education.0005.a: "Em breve."
 bp2_adult_education.0009.t: "Conclusão"
 bp2_adult_education.0009.desc: "Esta tem sido uma experiência incrível!\n\nQuando parti, não podia imaginar a quantidade de homens sábios que estudam em [province.GetName], a profundidade de seu pensamento e a amplitude de sua pesquisa! Só estar no mesmo ambiente deles me tornou uma pessoa muito melhor, e com o conhecimento que adquiri, posso voltar para casa muito satisfeito."
 bp2_adult_education.0009.desc_teacher_1: "\n\nNo entanto, durante minha estadia, me aproximei muito de um[teacher_1.Custom('ES_OA')] dos meus professore[teacher_1.Custom('ES_EA')]s, [teacher_1.GetFirstName], e já detesto ter de me despedir de [teacher_1.GetSheHe]."
 bp2_adult_education.0009.desc_teacher_2: "\n\nPor outro lado, meu professor[teacher_2.Custom('ES_XA')], [teacher_2.GetFirstName] me causou uma ótima impressão, e eu gostaria de passar mais tempo juntos."
 bp2_adult_education.0009.a: "Conhecimento é poder!"
 bp2_adult_education.0009.b: "[teacher_1.GetFirstNameNoTooltip] seria uma ótima adição ao meu [ROOT.Char.Custom('GetCourt')]."
 bp2_adult_education.0009.c: "[teacher_2.GetFirstNameNoTooltip], preciso que você me ensine mais!"
 bp2_adult_education.0009.d: "O lugar de um professor é com seus alunos."
 bp2_adult_education.0009.e: "Vamos manter contato."
 imprisoned_adult_education: "[GetActivityType('activity_adult_education').GetName] Interrompida por Prisão"
 imprisoned_adult_education_desc: "meu [GetActivityType('activity_adult_education').GetName|l] foi interrompida quando [jailor.Custom('ES_ElLa')] [jailor.GetTitledFirstName|l] me aprisionou"
 imprisoned_adult_education_desc_second_perspective: "sua [GetActivityType('activity_adult_education').GetName|l] foi interrompida quando [jailor.Custom('ES_ElLa')] [jailor.GetTitledFirstName|l] o aprisionou"
 imprisoned_adult_education_desc_third_perspective: "o [GetActivityType('activity_adult_education').GetName|l] [owner.Custom('ES_DelDela')] [owner.GetTitledFirstName|l] foi interrompido quando [jailor.Custom('ES_ElLa')] [jailor.GetTitledFirstName|l] [owner.GetHerHim] o encarcerou"
 completed_adult_education: "[GetActivityType('activity_adult_education').GetName] Concluída"
 completed_adult_education_desc: "Concluí meus estudos de [GetActivityType('activity_adult_education').GetName|l] em [ROOT.Var('education_destination').GetProvince.GetName]"
 completed_adult_education_desc_second_perspective: "você completou seus estudos de [GetActivityType('activity_adult_education').GetName|l] em [ROOT.Var('education_destination').GetProvince.GetName]"
 completed_adult_education_desc_third_perspective: "[owner.Custom('ES_ElLa')] [owner.GetTitledFirstName|l] concluiu seu [GetActivityType('activity_adult_education').GetName|l] em [ROOT.Var('education_destination').GetProvince.GetName]"
 bp2_adult_education.0010.t: "Chegada em [location.GetBaronyNameExplicitlyNoTooltip]"
 bp2_adult_education.0010.desc_uni: "Aqui estou, finalmente às portas de [location.GetBaronyNameExplicitly], a renomada sede da Universidade.\n\nTodo o conhecimento é reunido nestes sagrados corredores, e estudiosos de renome de todo o mundo se reúnem nestes mesmos corredores para preservar e aumentar uma verdadeira riqueza de sabedoria. E logo me juntarei a eles!"
 bp2_adult_education.0010.desc_religious: "Por fim estou aqui, percorrendo os sagrados corredores de [location.GetBaronyNameExplicitly], venerada sede de todo o conhecimento do mundo [location.GetCounty.GetFaith.GetAdherentName].\n\nTenho tanto a aprender com os santos homens e mulheres que se reuniram entre estes veneráveis muros! E o que dizer de todos os pergaminhos e livros antigos?"
 bp2_adult_education.0010.desc_end: "\n\nÉ claro que os principais centros de cultura também são mercados ativos e oferecem todas as #EMP distrações#! que um estudante poderia desejar..."
 bp2_adult_education.0010.desc_very_very_far: "\n\nEnquanto considero todas as minhas possibilidades, os locais me olham com uma mistura de curiosidade e confusão. Está claro que não é todo dia que eles veem nós [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip]!"
 bp2_adult_education.0010.a: "Hora de começar."
 #An Intellectual Debate
 bp2_adult_education.1000.t: "Um Debate Intelectual"
 bp2_adult_education.1000.desc: "Em [location.GetBaronyNameExplicitly] costumam surgir debates acalorados entre professores e alunos. Depois de uma aula especialmente esclarecedora de [Select_CString( teacher.IsFemale, 'nossa professora', 'nosso professor' )], [teacher.Custom('ES_ElLa')] [teacher.GetTitledFirstName|l], me vejo arrastad[ROOT.Char.Custom('ES_OA')] a um desses debates com outr[student.Custom('ES_OA')] estudante, [student.GetFirstName].\n\n\"NÃO! O que você está dizendo não faz sentido! Você está deturpando completamente a ideia do filósofo!\", grito.\n\n\"#EMP Você#! está completamente delirando!\", rebate [student.GetSheHe].\n\nPelo canto do olho, vejo que [teacher.GetFirstNameNoTooltip] nos observa com um olhar pensativo."
 bp2_adult_education.1000.a: "Mas, como disse o Mestre..."
 bp2_adult_education.1000.a.tt: "Você cita os clássicos"
 bp2_adult_education.1000.b: "Meu ponto está correto, e você não pode lutar!"
 bp2_adult_education.1000.b.tt: "Você tenta confundir[student.GetHerHim] com rimas provocativas"
 bp2_adult_education.1000.b.success: "[student.GetFirstNameNoTooltip] fica sem palavras"
 bp2_adult_education.1000.b.success.tt: "Você venceu [student.GetFirstNameNoTooltip]"
 bp2_adult_education.1000.b.failure: "[student.GetFirstNameNoTooltip] não é convencido"
 bp2_adult_education.1000.b.failure.tt: "Você não convenceu [student.GetFirstNameNoTooltip]"
 bp2_adult_education.1000.c: "Deixa pra lá, tenho mais livros para ler."
 bp2_adult_education.1000.a.success: "[student.GetFirstNameNoTooltip] está convencido[student.Custom('ES_OA')]"
 bp2_adult_education.1000.a.success.tt: "Você convenceu [student.GetFirstNameNoTooltip]"
 bp2_adult_education.1000.a.failure: "Você admite que [student.GetFirstNameNoTooltip] está certo"
 bp2_adult_education.1000.a.failure.tt: "[student.GetFirstNameNoTooltip] te superou"
 university_debate_won_log: "[CHARACTER.Custom('ES_ElLa')|U] [CHARACTER.GetTitledFirstName|l] superou [TARGET_CHARACTER.Custom('ES_AlAla')] [TARGET_CHARACTER.GetTitledFirstName|l] em um debate intelectual"
 university_debate_won_log_title: "Debate Intelectual Vencido"
 #The Language of the People/of Knowledge/of the Master
 bp2_adult_education.1010.t: "A Linguagem do Povo"
 bp2_adult_education.1010.desc: "Meus estudos em [location.GetBaronyNameExplicitly] vão bem, mas não consigo evitar sentir-me um pouco isolad[ROOT.Char.Custom('ES_OA')] da comunidade que me rodeia.\n\nSou [Select_CString( ROOT.Char.IsFemale, 'uma forasteira', 'um forasteiro' )] em terra estranha, e a língua destas terras, o [location.GetCounty.GetCulture.GetLanguage.GetName], tal como é falada pelos locais nas tavernas e mercados da cidade, soa exótica e misteriosa para mim. Mesmo entre meus colegas e professores, muitos nasceram e foram criados aqui. Poder compartilhar conhecimento com eles de forma mais direta certamente melhoraria a qualidade dos meus estudos."
 learned_language_of_uni_log: "[CHARACTER.Custom('ES_ElLa')|U] [CHARACTER.GetTitledFirstName|l] aprendeu o idioma falado na universidade"
 learned_language_of_uni_log_title: "Aprendeu a Língua da Universidade"
 bp2_adult_education.1010.a: "Preciso estudar muito para me integrar!"
 bp2_adult_education.1010.b: "A poesia será minha professora!"
 bp2_adult_education.1010.c: "Não posso me distrair com isso."
 bp2_adult_education.1010.d: "Qual professor melhor do que o povo em si?"
 bp2_adult_education.1010.d.tt: "Você tenta aprender a língua em bordéis, tavernas e mercados."
 bp2_adult_education.1010.b.success: "Você domina a língua local"
 bp2_adult_education.1010.b.success.tt: "Você dominou a língua local"
 bp2_adult_education.1010.b.failure: "Você ainda não entende a língua local"
 bp2_adult_education.1010.b.failure.tt: "A língua local ainda escapa de você!"
 bp2_adult_education.1011.t: "A Linguagem do Conhecimento"
 bp2_adult_education.1011.desc: "Pessoas de todo o mundo conhecido se reúnem em universidades e centros religiosos para adquirir e compartilhar conhecimentos, mas isso só é possível graças ao conhecimento compartilhado de uma língua comum, normalmente alguma antiga língua litúrgica carregada de autoridade tradicional.\n\nInfelizmente, não estou muito familiarizad[ROOT.Char.Custom('ES_OA')] com a língua culta falada em [location.GetBaronyNameExplicitly], o que dificulta meus estudos muito mais do que seria necessário.\n\nNão é uma tarefa fácil, mas não é exatamente disso que se trata a educação superior?"
 learned_language_of_lithurgy_log: "[CHARACTER.Custom('ES_ElLa')|U] [CHARACTER.GetTitledFirstName|l] aprendeu a língua litúrgica da Universidade"
 learned_language_of_lithurgy_log_title: "Aprendeu Língua Litúrgica"
 bp2_adult_education.1011.a: "Hora de estudar muito."
 bp2_adult_education.1011.b: "As aulas são mais do que suficientes."
 bp2_adult_education.1011.b.failure: "As aulas não são suficientes"
 bp2_adult_education.1011.b.tt: "Mas pelo menos você teve tempo livre para perseguir seus outros interesses"
 bp2_adult_education.1011.d: "Os Mestres mesmos me ensinarão!"
 bp2_adult_education.1011.d.success: "Você domina a língua litúrgica"
 bp2_adult_education.1011.d.success.tt: "Você dominou a língua litúrgica"
 bp2_adult_education.1011.d.failure: "Você se faz de bobo"
 bp2_adult_education.1011.d.failure.tt: "Você não aprendeu a língua litúrgica"
 bp2_adult_education.1012.t: "A Linguagem do Mestre"
 bp2_adult_education.1012.desc: "[teacher.GetFirstName|U], um[teacher.Custom('ES_OA')] de [Select_CString( teacher.IsFemale, 'professoras', 'professores' )] mais respeitad[teacher.Custom('ES_OA')]s de [location.GetBaronyNameExplicitly], é claramente de fora: seu sotaque e maneiras denunciam sua cultura [teacher.GetCulture.GetName].\n\nEmbora não seja estritamente necessário para meus estudos, aprender sua língua materna fomentaria uma relação privilegiada com [teacher.GetFirstNameNoTooltip], o que sem dúvida seria um bom investimento para o futuro."
 learned_language_of_teacher_log: "[CHARACTER.Custom('ES_ElLa')|U] [CHARACTER.GetTitledFirstName|l] aprendeu o idioma falado por um dos professores da universidade"
 learned_language_of_teacher_log_title: "Aprendeu a Língua do Mestre"
 bp2_adult_education.1012.a: "Isso vai me aproximar mais [teacher.Custom('ES_AlAla')] mestre[teacher.Custom('ES_OA')]!"
 bp2_adult_education.1012.b: "Vou precisar de alguém para me ajudar..."
 bp2_adult_education.1012.b.tt: "Tudo é possível com as conexões certas!"
 bp2_adult_education.1012.a.success: "Você aprende o idioma de [teacher.GetFirstNameNoTooltip]"
 bp2_adult_education.1012.a.success.tt: "Aprendeste a língua de [teacher.GetFirstNameNoTooltip]"
 bp2_adult_education.1012.a.failure: "Você não consegue aprender o idioma de [teacher.GetFirstNameNoTooltip]"
 bp2_adult_education.1012.a.failure.tt: "Você não aprendeu o idioma de [teacher.GetFirstNameNoTooltip]"
 #The Goliards
 bp2_adult_education.1020.t: "Os Goliards"
 bp2_adult_education.1020.desc: "Enquanto saio da aula após uma aula profunda e instigante de [teacher.GetFirstName], minha atenção é atraída pelas risadas caóticas e gritos vindos de fora."
 bp2_adult_education.1020.desc.lusty_poetry: "\n\nAproxima-se um grupo barulhento de estudantes liderados por [student.GetFirstName] cantando uma canção #EMP libertina#! sobre suas aventuras sexuais — e com bastante detalhe, se me permite dizer—."
 bp2_adult_education.1020.desc.drinking_poetry: "\n\n[student.GetFirstName], tão claramente embriag[student.Custom('ES_OA')] que mal consegue ficar de pé, está, no entanto, encantando uma multidão entusiasmada com alguns versos elegantes sobre as alegrias de beber, como bem sabe o clero local."
 bp2_adult_education.1020.desc.satyre_poetry: "\n\nSe aproxima o que só posso descrever como uma #EMP procesión#! de estudantes, com [student.GetFirstName] à frente. Enquanto tentam manter a compostura, alternam citações de seu [location.GetCounty.GetFaith.ReligiousText] com paródias sacrílegas de seus ritos."
 bp2_adult_education.1020.desc.carmina_burana: "\n\n\"#EMP O Fortuna velut luna statu variabilis, semper crescis aut decrescis#!\", canta [student.GetFirstName], cercado(a) por uma multidão entusiasmada."
 bp2_adult_education.1020.desc.dice: "\n\nUm grupo alvoroçado de estudantes cerca [student.GetFirstName] e outra pessoa que eu não conheço, que jogavam dados na escadaria do [location.Custom('GetLocationFaithTemple')]."
 bp2_adult_education.1020.desc.donkey: "\n\n[student.GetFirstName] está guiando um #EMP burro#!, cantando seus louvores. Uma multidão de estudantes responde \"Êê, senhor jumento, êê!\" após cada linha."
 bp2_adult_education.1020.desc.end: "Quando me notam, eles me gritam: \"JUNTE-SE A NÓS! JUNTE-SE A NÓS!\"\n\nA carranca de [teacher.GetFirstNameNoTooltip] diz muito sobre o que pensa sobre toda a questão."
 participated_in_goliardy_log: "[CHARACTER.Custom('ES_ElLa')|U] [CHARACTER.GetTitledFirstName|l] seguiu [TARGET_CHARACTER.Custom('ES_AlAla')] [TARGET_CHARACTER.GetTitledFirstName|l] e os outros goliardos em suas folias"
 participated_in_goliardy_log_title: "Uniu-se aos Goliards"
 bp2_adult_education.1020.a: "Isso é #EMP ABSURDO#!!"
 bp2_adult_education.1020.b: "Por que não...?"
 bp2_adult_education.1020.c: "Você precisa perguntar?"
 bp2_adult_education.1020.d: "Talvez na próxima vez."
 goliard_shenanigans_get_lovers_pox.tt: "Você contrai [GetTrait('lovers_pox').GetName( GetNullCharacter )|l]"
 bp2_adult_education.1020.c.tt: "Você se meteu em algumas confusões sérias!"
 bp2_adult_education.1020.b.tt: "Ter um gostinho desse estilo de vida \"Goliardic\" não pode ser tão ruim, não é?"
 #One of the GirlsBoys
 bp2_adult_education.1030.t: "[Select_CString( ROOT.Char.IsFemale, 'Uma das', 'Um dos' )] [ROOT.Char.Custom('GirlBoyPlural')]"
 bp2_adult_education.1030.desc: "As universidades e os centros de ensino superior são colmeias sempre agitadas de socialização.\n\nNestas salas sagradas, todos os estudantes são pares, aprendizes no caminho para o conhecimento, por isso pode ser útil fazer amigos e sentir-se parte de uma comunidade."
 bp2_adult_education.1030.desc_alcohol: "\n\nPelo menos, é a primeira coisa que penso quando [student.GetFirstName] se aproxima de mim, com hálito de [student.Custom('RegionalAlcoholicDrink')|l].\n\n“Junte-se a meus amigos e a mim, [ROOT.Char.GetFirstNameNoTooltip]! Mostre-nos a força de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] virando mais taças do que qualquer um, e o consideraremos um[ROOT.Char.Custom('ES_OA')] dos nossos!”."
 bp2_adult_education.1030.desc_fallback: "\n\nPelo menos, é o primeiro que penso quando [student.GetFirstName] se aproxima de mim, com um sorriso suspeito no rosto.\n\n\"Junte-se a mim e aos meus amigos, [ROOT.Char.GetFirstNameNoTooltip]! Mostre-nos a resistência de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] passando a noite inteira na farra! Então o consideraremos um[ROOT.Char.Custom('ES_OA')] dos nossos!\"."
 bp2_adult_education.1030.a: "… talvez?"
 bp2_adult_education.1030.b: "Me chama!"
 bp2_adult_education.1030.b.tt: "Eles estão impressionados com você!"
 bp2_adult_education.1030.a.success: "Os outros estudantes entoam seu nome"
 bp2_adult_education.1030.a.success.tt: "Eles gostaram de você"
 bp2_adult_education.1030.a.failure: "Os outros estudantes riem de suas tentativas insignificantes"
 bp2_adult_education.1030.a.failure.tt: "Você não os impressionou"
 bp2_adult_education.1030.c: "Não, obrigado."
 one_of_the_boys_log: "[CHARACTER.Custom('ES_ElLa')|U] [CHARACTER.GetTitledFirstName|l] impressionou seu colega estudante, [TARGET_CHARACTER.GetFirstName], com suas farras"
 one_of_the_boys_log_title: "Um de Nós"
 #Schools of Thought
 bp2_adult_education.1040.t: "Escolas de Pensamento"
 bp2_adult_education.1040.desc: "Os corredores da Universidade de [location.GetBaronyNameExplicitly] frequentemente ecoam com os debates de estudantes e professores, alguns dos quais se transformam em rivalidades notórias, como entre [teacher_1.GetFirstName] e [teacher_2.GetFirstName].\n\nQuando os encontro hoje, eles estão, como de costume, gritando um com o outro, tentando provar qual campo de estudo está melhor equipado para discutir [teacher_1.Custom('EruditeTopic')]. Algo menos comum, no entanto, é que eles de repente me notam se aproximando e pedem #EMP a mim#! para tomar uma posição."
 bp2_adult_education.1040.a: "[teacher_1.GetFirstNameNoTooltip] está certo."
 bp2_adult_education.1040.b: "[teacher_2.GetFirstNameNoTooltip] busca o conhecimento mais valioso."
 bp2_adult_education.1040.c: "Há grandes méritos em ambas as disciplinas."
 bp2_adult_education.1040.c.success: "Eles estão convencidos e satisfeitos com a sua tese"
 bp2_adult_education.1040.c.success.tt: "Você impressionou seus professores"
 bp2_adult_education.1040.c.failure: "Eles acham que você está apenas confundindo as águas"
 bp2_adult_education.1040.c.failure.tt: "Os professores não estão impressionados"
 bp2_adult_education.1040.d: "Por que não mudamos a discussão para a taverna?"
 bp2_adult_education.1040.d.success: "Eles encontram um acordo graças a você"
 bp2_adult_education.1040.d.success.tt: "Você pacificou os professores"
 bp2_adult_education.1040.d.failure: "A discussão se intensifica"
 bp2_adult_education.1040.d.failure.tt: "Os professores te culparam"
 bp2_adult_education.1040.d.tt: "Você talvez possa acalmar [teacher_1.GetFirstNameNoTooltip] e [teacher_2.GetFirstNameNoTooltip] com boa comida e bebidas"
 bp2_adult_education.1040.e: "Isso realmente importa?"
 sided_with_teacher_log: "[CHARACTER.Custom('ES_ElLa')|U] [CHARACTER.GetTitledFirstName|l] ficou do lado de [TARGET_CHARACTER.Custom('ES_DelDela')] [TARGET_CHARACTER.GetFirstName|l] em uma disputa acadêmica"
 sided_with_teacher_log_title: "Apoiou o Professor"
 balanced_teachers_opinions_log: "[CHARACTER.Custom('ES_ElLa')|U] [CHARACTER.GetTitledFirstName|l] conduziu seus professores a um acordo em uma disputa acadêmica"
 balanced_teachers_opinions_log_title: "Encontrou Equilíbrio Entre Professores"
 #Foreigners in This Land
 bp2_adult_education.1050.t: "Estrangeiros nesta Terra"
 bp2_adult_education.1050.desc: "[location.GetBaronyNameExplicitly] é um centro de estudos que realmente atrai estudantes de todos os cantos do mundo!\n\nPercebo isso ao contemplar como eu mesm[ROOT.Char.Custom('ES_OA')] e muitos dos meus companheiros em busca do conhecimento — entre eles [student_1.GetFirstName] e [student_2.GetFirstName]— somos todos estrangeiros em [location.GetBaronyNameExplicitlyNoTooltip]. Fico me perguntando se haveria alguma forma de aproveitar isso…"
 bp2_adult_education.1050.a: "Podemos todos aprender uns com os outros!"
 bp2_adult_education.1050.b: "Um brinde às nossas diferenças!"
 bp2_adult_education.1050.c: "Eu estou aqui apenas para estudar."
 #Yes and No
 bp2_adult_education.1060.t: "Sim e Não"
 bp2_adult_education.1060.desc: "Meus estudos aprofundados da doutrina [ROOT.Char.GetFaith.GetAdjective] em [location.GetBaronyNameExplicitly] me confrontaram com muitas perguntas novas, nem todas parecem ter respostas claras. Algumas até parecem ter explicações contraditórias!\n\nA fé deve ser completada pela razão ou não?\nA fé lida apenas com o que é invisível ou não?\nPodemos sequer saber o que é invisível ou não?\n\n #EMP Sí o no?#!"
 bp2_adult_education.1060.a: "Deve haver significado nas contradições..."
 bp2_adult_education.1060.b: "A resposta deve vir da experiência empírica!"
 bp2_adult_education.1060.c: "Minha cabeça está doendo."
 bp2_adult_education.1060.a.tt: "Você ganha um Artefato de Livro"
 sic_et_non_log: "[CHARACTER.Custom('ES_ElLa')|U] [CHARACTER.GetTitledFirstName|l] escreveu um livro sobre temas teológicos baseado nas anotações que fez durante os estudos"
 sic_et_non_log_title: "Escreveu um Livro"
 bp2_adult_education.1060.a.crit_success: "Suas reflexões são tão esclarecedoras que podem ajudar futuros estudiosos também"
 bp2_adult_education.1060.a.crit_success.tt: "Agora tudo faz sentido"
 bp2_adult_education.1060.a.success: "Você se sente mais sábio[ROOT.Char.Custom('ES_OA')] e mais próximo[ROOT.Char.Custom('ES_OA')] da verdade"
 bp2_adult_education.1060.a.success.tt: "Você fez algum progresso"
 bp2_adult_education.1060.a.failure: "Você está ainda mais confuso[ROOT.Char.Custom('ES_OA')] do que antes"
 bp2_adult_education.1060.a.failure.tt: "Você não consegue entender"
 sic_et_non_book_name: "Sim e Não"
 sic_et_non_book_desc: "Este livro é o resultado das reflexões teológicas e filosóficas [book_creator.Custom('ES_DelDela')] [book_creator.GetTitledFirstName|l] quando estudou em [location.GetBaronyNameExplicitly].\n\nContém uma discussão profunda e bem articulada sobre as contradições da teologia [book_creator.GetFaith.GetAdjective] e a melhor forma de conciliá-las."
 bp2_adult_education.1060.b.tt: "Qual era a pergunta mesmo?"
 #The Debate
 bp2_adult_education.1070.t: "O Debate"
 bp2_adult_education.1070.desc: "O ensino em [location.GetBaronyNameExplicitly] ocorre em sua maioria na forma oral, e os estudantes são incentivados a exercitar sua habilidade retórica e a mostrar o progresso de seu aprendizado em debates diante de seus colegas e professores.\n\nHoje, [teacher.GetFirstName] pediu a mim e a [student.GetFirstName] que adotássemos lados opostos sobre o tópico de [teacher.Custom('EruditeTopic')] para debatê-lo."
 bp2_adult_education.1070.a: "Deixe-me começar a partir do [ROOT.Char.GetFaith.ReligiousText|U]. Como todos sabem..."
 bp2_adult_education.1070.b: "Não posso dizer que você está errado, mas estaria mentindo se dissesse?"
 bp2_adult_education.1070.c: "Achei que [student_2.GetFirstNameNoTooltip] quisesse uma chance!"
 won_a_debate_log: "[CHARACTER.Custom('ES_ElLa')|U] [CHARACTER.GetTitledFirstName|l] venceu [TARGET_CHARACTER.Custom('ES_AlAla')] [TARGET_CHARACTER.GetFirstName|l] em um debate acadêmico em aula"
 won_a_debate_log_title: "Debate de Aula"
 bp2_adult_education.1070.a.success: "Sua posição está mais forte"
 bp2_adult_education.1070.a.success.tt: "Você ganhou o debate!"
 bp2_adult_education.1070.a.failure: "Você está superado[ROOT.Char.Custom('ES_OA')]"
 bp2_adult_education.1070.a.failure.tt: "Você perdeu o debate!"
 bp2_adult_education.1070.b.success: "Você confunde habilmente as águas o suficiente para que seu adversário se renda"
 bp2_adult_education.1070.b.failure: "Não pode confundir as ideias de [student.GetFirstNameNoTooltip]"
 #A Matter of Faith?
 bp2_adult_education.1080.t: "Questão de Fé?"
 bp2_adult_education.1080.desc: "[location.GetBaronyNameExplicitly] é um renomado centro de estudos que acolhe tanto professores quanto estudantes de perto e de longe.\n\nEu mal tinha pensado nisso até hoje, quando uma referência religiosa de [teacher.GetFirstName] me abalou profundamente por ser blasfema e contrária a tudo o que me ensinaram na vida. Revelou [teacher.Custom('ES_XA')] [teacher.GetFaith.GetAdherentNameNoTooltip] como um [ROOT.Char.Custom2('GetUnbelieverTerm', teacher)] , e não sei como me sentir em relação a isso."
 bp2_adult_education.1080.a: "Não me importo, desde que [teacher.GetSheHe] tenha algo a ensinar."
 bp2_adult_education.1080.b: "É meu dever [ROOT.Char.GetFaith.GetReligion.GetAdjectiveNoTooltip] pregar uma peça no [ROOT.Char.Custom2('GetUnbelieverTerm', teacher)]!"
 bp2_adult_education.1080.c: "Como um [teacher.GetFaith.GetAdherentNameNoTooltip] poderia me ensinar algo de valor?!"
 bp2_adult_education.1080.d: "Talvez [teacher.GetSheHe] tenha as respostas que estou perdendo..."
 bp2_adult_education.1080.e: "[teacher.GetFirstNameNoTooltip] deve ter muito mais a ensinar então!"
 bp2_adult_education.1080.b.tt: "A brincadeira teve resultados inesperados"
 #To Have a Gander
 bp2_adult_education.1090.t: "Dar uma Olhada"
 bp2_adult_education.1090.desc: "\"Hoje\", começa [Select_CString( teacher.IsFemale, 'nossa professora', 'nosso professor' )] [teacher.GetFirstName], \"vamos examinar a anatomia de um falcão.\"\n\nUm murmúrio animado se espalha pelo salão de conferências, enquanto todos nós admiramos a ave encapuzada, orgulhosamente empoleirada no braço enluvado [Select_CString( teacher.IsFemale, 'da professora', 'do professor' )].\n\n\"Pode-se aprender muito estudando o corpo dos animais, como nos ensinaram os antigos. Alguém quer me ajudar com a demonstração de dissecação?\""
 bp2_adult_education.1090.a: "Eu me voluntario[ROOT.Char.Custom('ES_OA')] para ajudar!"
 bp2_adult_education.1090.a.tt: "Essa ação contradiz suas crenças"
 bp2_adult_education.1090.b: "Mestre[teacher.Custom('ES_OA')], deixe-me cuidar do animal…"
 bp2_adult_education.1090.b.tt: "Você rapidamente o desmascara e o solta na classe para estudar o caos que se segue!"
 bp2_adult_education.1090.c: "Muito interessante."
