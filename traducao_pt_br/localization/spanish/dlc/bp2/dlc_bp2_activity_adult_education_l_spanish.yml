 activity_adult_education_desc: "Passe um semestre em um renomado centro de estudos, aprendendo com as mentes mais sábias da terra.\n\nÉ uma ocasião para preencher as lacunas em sua educação juvenil, mas também para melhorar-se como um todo, desenvolver suas habilidades, aprender novas capacidades e fazer conexões importantes."
 activity_adult_education_host_desc: "$BULLET_WITH_TAB$Pode melhorar sua [education_trait|lE]\n$BULLET_WITH_TAB$Pode ganhar pontos de [skill|lE]\n$BULLET_WITH_TAB$Pode ganhar [lifestyle_experience|lE]\n$BULLET_WITH_TAB$Pode ganhar [lifestyle_traits|lE]\n$BULLET_WITH_TAB$Pode ganhar [artifacts|lE] de livros\n$BULLET_WITH_TAB$Pode recrutar um personagem de grande talento\n$BULLET_WITH_TAB$[trait_level_track_xp|E] de [GetTrait('confucian_education').GetName( GetNullCharacter )|l] em universidades [GetReligionByKey('confucianism_religion').GetAdjective]s"
