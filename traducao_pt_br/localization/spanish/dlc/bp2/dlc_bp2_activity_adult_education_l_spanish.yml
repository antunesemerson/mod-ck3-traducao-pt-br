 apa_leveraging_language_skills_title: "foi elogiada a interpretação que [first.GetShortUIName] [Select_CString( first.IsLocalPlayer, 'hiciste', 'hizo' )] dos manuscritos em [second.Custom('GetFaithSacredLanguage')]"
 apa_bonded_during_studies_title: "[first.GetShortUIName|U] e [second.GetShortUIName|U] [Select_CString(Or(first.IsLocalPlayer, second.IsLocalPlayer),'congeniasteis', 'congeniaron')] durante [Select_CString(Or(first.IsLocalPlayer, second.IsLocalPlayer), 'vuestros', 'sus')] estudos"
 apa_procrastination_title: "[first.GetShortUIName|U] não [Select_CString( first.IsLocalPlayer, 'estudiaste', 'estudió' )] para um exame importante"
 apa_university_discussions_title: "[first.GetShortUIName|U] discutiu [Select_CString( first.IsLocalPlayer, 'debatiste', 'debatió' )] sobre [second.Custom('education_conversation_subject')|l] com [second.LocalPlayerString( 'você', second.GetShortUIName )]"
 apa_night_on_books_title: "[first.GetShortUIName|U] [Select_CString( first.IsLocalPlayer, 'pasaste', 'pasó' )] passou a noite mergulhado em livros"
 apa_student_disagreement_title: "[first.GetShortUIName|U] e [second.GetShortUIName] [Select_CString( first.IsLocalPlayer, 'discrepasteis', 'discreparon' )] sobre [second.Custom('education_conversation_subject')|l]"
 apa_rowdy_student_title: "[first.GetShortUIName|U] [Select_CString( first.IsLocalPlayer, 'irrompeu', 'irrompeu' )], embriag[first.Custom('ES_OA')], na aula de [second.LocalPlayerString( 'você', second.GetShortUIName )]"
 apa_impromptu_poetry_title: "A poesia improvisada de [first.LocalPlayerString( 'sua pessoa', first.GetShortUIName )] foi bem recebida"
 apa_impressed_teacher_title: "Os conhecimentos de [first.LocalPlayerString( 'sua pessoa', first.GetShortUIName )] impressionaram a [second.LocalPlayerString( 'sua pessoa', second.GetShortUIName )]"
 apa_revelry_hangover_title: "Depois de uma noite de farra, [first.GetShortUIName] [Select_CString( first.IsLocalPlayer, 'sufriste', 'sufrió' )] uma ressaca horrível"
 apa_local_food_title: "[first.GetShortUIName|U] [Select_CString( first.IsLocalPlayer, 'compartiste', 'compartió' )] compartiu com todo mundo uma iguaria da terra natal"
 apa_aced_homework_title: "[first.GetShortUIName|U] [Select_CString( first.IsLocalPlayer, 'te luciste', 'se lució' )] em uma tarefa"
 apa_pangur_ban_title: "[first.GetShortUIName|U] [Select_CString( first.IsLocalPlayer, 'escribiste', 'escribió' )] escreveu um pequeno poema: um gato caça ratos, [first.GetShortUIName] em busca de conhecimento"
 apa_studied_confucian_classics_title: "[first.GetShortUIName|U] [Select_CString( first.IsLocalPlayer, 'estudiaste', 'estudió' )] estudou os clássicos confucianos."
 bp2_adult_education.9000.t: "O Palestrante Convidado"
 bp2_adult_education.9000.desc: "\"Alunos, hoje nos acompanha [Select_CString( guest_speaker.IsFemale, 'uma oradora apreciada', 'um orador apreciado' )]!\", exclama minha professor[teacher.Custom('ES_OA')] [teacher.GetFirstName]. \"Vamos dar as boas-vindas a [guest_speaker.GetFullName], a maior autoridade em doutrina [guest_speaker.GetFaith.GetAdjective] de [location.GetName].\"\n\n\"Saudações\", começa solenemente [guest_speaker.GetFirstNameNoTooltip], enquanto [guest_speaker.Custom('quirk_pos_pp')]. \"Hoje vamos explorar [guest_speaker.Custom('education_conversation_subject')], e como esse tema se conecta com a natureza de [guest_speaker.GetFaith.HighGodName].\"\n\nOs outros estudantes endireitam as costas e pegam suas penas. Isso vai levar um tempo."
 bp2_adult_education.9000.a: "O quê!? Isso é pensamento herético!"
 bp2_adult_education.9000.a.success: "Você destrói [guest_speaker.GetFirstNameNoTooltip] com #EMP fatos#! e #EMP lógica#!"
 bp2_adult_education.9000.a.failure: "Você é sumariamente escoltado para fora do auditório"
 defeated_guest_speaker_log: "[CHARACTER.GetShortUIName|U] [CHARACTER.LocalPlayerString( 'derrotou', 'derrotou' )] completamente [TARGET_CHARACTER.LocalPlayerString( 'você', TARGET_CHARACTER.GetShortUIName )] em um debate"
 defeated_guest_speaker_log_title: "Palestrante Convidado Derrotado"
 defeated_by_guest_speaker_log: "[TARGET_CHARACTER.GetShortUIName|U] [TARGET_CHARACTER.LocalPlayerString( 'derrotou', 'derrotou' )] completamente [CHARACTER.LocalPlayerString( 'você', CHARACTER.GetShortUIName )] em um debate"
 defeated_by_guest_speaker_log_title: "Derrotado por Palestrante Convidado"
 bp2_adult_education.9000.b: "#EMP *Rabiscar furiosamente notas*#!"
 bp2_adult_education.9000.c: "\"Todo mundo sabe que está ligado à natureza de [guest_speaker.GetFaith.random_EvilGodNames]!\""
 bp2_adult_education.9000.d: "Não posso ficar. Tenho um encontro com uma taça de [ROOT.Char.Custom('GetExpensiveDrink_Singular')|l]!"
 bp2_adult_education.9000.e: "Aha? Hm. Oh? Fascinante, sim, sim..."
 you_learn_something: "Você Aprende Algo"
 you_are_hampered: "Seus Estudos São Prejudicados"
 bp2_adult_education.9100.t: "Uma Festa de Camponeses"
 bp2_adult_education.9100.desc: "De repente, sou distraído dos meus estudos da madrugada por um forte #EMP *estrépito*#!, um #EMP *portazo*#! ensurdecedor e algo que parece caro se despedaçando #EMP *añicos*#!. O que diabos está acontecendo?\n\nA origem da confusão parece ser dois camponeses, [ROOT.Char.GetFaith.HighGodName] sabe como eles entraram aqui, virando vorazmente um barril de [ROOT.Char.Custom('GetExpensiveDrink_Singular')|l] da universidade!\n\n\"Então #EMP *hip*#! aprenderão!\", grita um deles. \"É, acham que são melhores que nós só porque sabem #EMP leer#!!\", completa o outro."
 bp2_adult_education.9100.read: "Pobres almas infelizes... Verei que vocês aprendam a ler!"
 bp2_adult_education.9100.a: "Eu poderia usar alguns servos para carregar todos os meus livros..."
 bp2_adult_education.9100.b: "\"Camponeses — peguem mais copos para nós, estou trazendo os outros estudantes!\""
 bp2_adult_education.9100.c: "É melhor avisar aos professores antes que eles destruam tudo..."
 changed_my_life_opinion: "Mudou a Minha Vida"
 bp2_adult_education.9200.t: "Uma Pausa Sensual nos Estudos"
 bp2_adult_education.9200.desc: "A biblioteca está vazia, exceto por mim e [student_flirt.GetFirstName]. Tenho lido a mesma página de [SCOPE.Custom('RandomInformativeTextName')] sem parar, mas é inútil, não consigo me concentrar.\n\nNão quando [student_flirt.GetSheHe] continua mordiscando suavemente a ponta de sua pena, enquanto desliza delicadamente um dedo por sua [student_flirt.Custom('ObjectifiedFeature')] e continua me olhando #EMP diretamente nos olhos#! enquanto faz isso!\n\n\"Acho que merecemos um... descanso, não, minha [ROOT.Char.Custom('RomanticComplimentNoun')|l] querid[ROOT.Char.Custom('ES_OA')]?\", sussurra [student_flirt.GetSheHe] docemente."
 bp2_adult_education.9200.a: "Devo. Me. Concentrar. No. Livro."
 bp2_adult_education.9200.b: "\"Quer fazer isso no telhado da universidade?\""
 bp2_adult_education.9200.c: "Acho que é hora de um estudo anatômico prático!"
 bp2_adult_education.9200.d: "Isso é inútil... Preciso descansar..."
 blew_off_some_steam_opinion: "Desestressei um pouco juntos"
 bp2_adult_education.9300.t: "Ideias Excêntricas"
 bp2_adult_education.9300.desc: "\"Escutem-me!\" [eccentric_student.GetFirstName] grita, maniacamente. \"Se vocês lerem nas entrelinhas de [SCOPE.Custom('RandomInformativeTextName')], é óbvio; vocês só precisam combinar [eccentric_student.Custom('ThrowableObjectArticle')], um [eccentric_student.Custom('RandomWeirdObject')], e um [eccentric_student.Custom('GetObjectToBalanceOnNose')] — tudo enquanto aderem aos princípios de [eccentric_student.Custom('EruditeTopic')] — confiem em mim, #EMP isso vai funcionar!#!\"\n\nTalvez não tenha sido uma boa ideia para [eccentric_student.GetFirstNameNoTooltip] estudar por trinta e seis horas seguidas..."
 bp2_adult_education.9300.eccentric: "É autoevidente!"
 bp2_adult_education.9300.a: "Não tenho tempo para suas bobagens, [eccentric_student.GetFirstNameNoTooltip]."
 bp2_adult_education.9300.b: "Conte-me mais! Conte-me #EMP tudo!#!"
 bp2_adult_education.9300.c: "Eu... só vou embora."
 bp2_adult_education.9400.t: "Uma visita [local_ruler.Custom('ES_DelDela')] [local_ruler.GetTitleAsNameNoTooltip|l]"
 bp2_adult_education.9400.desc: "\"Atenção, alunos!\", grita meu professor[teacher.Custom('ES_XA')], [teacher.GetFirstName], com [local_ruler.Custom('ES_ElLa')] [local_ruler.GetTitledFirstName|l] atrás. \"Noss[local_ruler.Custom('ES_OA')] benfeitor[local_ruler.Custom('ES_XA')], [local_ruler.Custom('ES_ElLa')] [local_ruler.GetTitledFirstNameNoTooltip|l], dignou-se a nos visitar. Trata-se [local_ruler.Custom('ES_DelDela')] governante destas terras; comportem-se da melhor maneira possível!\"\n\n\"Ah, debatendo sobre [local_ruler.Custom('education_conversation_subject')]? É um tema de que gosto muito! Espero que seus estudos estejam indo bem\", diz [local_ruler.Custom('ES_ElLa')] [local_ruler.GetTitleAsNameNoTooltip|l] enquanto [local_ruler.Custom('quirk_pos_pp')].\n\n[local_ruler.Custom('ES_ElLa')|U] [local_ruler.GetTitleAsNameNoTooltip|l] tem o poder de conceder privilégios especiais a estudantes como eu. Talvez eu deva aproveitar esta oportunidade para falar..."
 bp2_adult_education.9400.friend: "\"É um prazer te reencontrar!\""
 bp2_adult_education.9400.liege: "\"Ah, meu súdit[local_ruler.Custom('ES_OA')] leal. Você se importaria de lembrar a todos quem eu sou?\""
 bp2_adult_education.9400.tier: "\"Vocês devem se sentir honrad[local_ruler.Custom('ES_OA')] de que compareça um[root_scope.Custom('ES_XA')] [root_scope.GetTitleAsNameNoTooltip|l]!\"."
 bp2_adult_education.9400.tier.toast: "[root_scope.Custom('ES_ElLa')|U] [root_scope.GetTitleAsNameNoTooltip|l] visita sua Universidade"
 bp2_adult_education.9400.gold_lots: "\"Eu gostaria de fazer uma doação generosa!\""
 bp2_adult_education.9400.gold_lots.toast: "Estudante Universitário Faz Doação Generosa"
 bp2_adult_education.9400.drink: "\"Que desinteressante. Vou para a cidade!\""
 bp2_adult_education.9400.gold: "\"Por favor, aceite este humilde presente.\""
 bp2_adult_education.9400.gold.toast: "Estudante Universitário Faz Doação de Ouro"
 bp2_adult_education.9400.nothing: "\"Você é muito [local_ruler.Custom('ComplimentAdjective')].\""
 available_friend_lover: "Essa opção está disponível por você ser [friends|lE] ou [lovers|lE]"
 available_liege: "Esta opção está disponível porque você é [liege|lE] de [local_ruler.GetFirstName]"
 available_higher_tier: "Essa opção está disponível porque o seu [rank|lE] é superior ao de [local_ruler.GetFirstName]"
