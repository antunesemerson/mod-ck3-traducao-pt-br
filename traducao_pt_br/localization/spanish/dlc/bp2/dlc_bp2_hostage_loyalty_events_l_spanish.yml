l_spanish:
 bp2_yearly.8050.t: "Quem Sou Eu?"
 bp2_yearly.8050.desc.intro: "Hoje encontro [hostage.GetName] pensativ[hostage.Custom('ES_OA')] e meditabund[hostage.Custom('ES_OA')], observando as pessoas abaixo de nós.\n\nAproximo-me e pouso a mão em seu ombro caído, e pergunto o que pesa tanto em sua mente.\n\n"Oh, [ROOT.Char.Custom('GetAuntUncle')],"
 bp2_yearly.8050.desc.mid.friendship: "você foi mais amigo[ROOT.Char.Custom('ES_OA')] para mim do que qualquer outra pessoa lá no lugar que eu antes chamava de lar."
 bp2_yearly.8050.desc.mid.childhood_friendship: "[hostage_friend.GetFirstName] foi mais amig[hostage_friend.Custom('ES_OA')] para mim do que qualquer outra pessoa lá no lugar que um dia chamei de lar."
 bp2_yearly.8050.desc.mid.hatred: "[hated_parent.Custom2('MyCharacterIntroduction', SCOPE.sC('hostage'))] é um[hated_parent.Custom('ES_XA')] completo [hated_parent.Custom2('InsultNoun', SCOPE.sC('hostage'))] [hated_parent.Custom2('InsultAdjective', SCOPE.sC('hostage'))], e não suporto a ideia de voltar para [hated_parent.GetSheHe]."
 bp2_yearly.8050.desc.mid.culture: "Já não sinto conexão com a cultura [hated_parent.GetCulture.GetName] e sinto que seria [Select_CString( hostage.IsFemale, 'uma estranha', 'um estranho' )] para o meu [hated_parent.GetMotherFather]. Sinto-me muito mais à vontade com as práticas [hostage.GetCulture.GetName] que adotei aqui."
 bp2_yearly.8050.desc.mid.faith: "meu [hated_parent.GetMotherFather] segue o credo [hated_parent.GetFaith.GetAdherentName] e eu o [hostage.GetFaith.GetAdherentName]. Como posso me chamar [hostage.Custom('GetDaughterSon')] seu[hostage.Custom('ES_OA')] quando nossas crenças estão tão em conflito?"
 bp2_yearly.8050.desc.mid.traits: "Sinto que temos muito mais em comum do que eu tenho com as pessoas no lugar que eu costumava chamar de lar."
 bp2_yearly.8050.desc.outro: "Não posso deixar de me perguntar, quem sou eu? [hostage.GetHouse.GetName|U] ou [ROOT.Char.GetHouse.GetName]?"
 bp2_yearly.8050.a: ""Sou seu[ROOT.Char.Custom('ES_OA')] [ROOT.Char.Custom('GetAuntieUncle')], claro"."
 bp2_yearly.8050.b: "Sois [Select_CString( hostage.IsFemale, 'uma refém', 'um refém' )] e nada mais."
 bp2_yearly.8051.t: "Cartas Comprometedoras"
 bp2_yearly.8051.desc: "Entro na alcova de [hostage.GetFirstName], mas encontro o quarto sem sua presença. No entanto, espalhada sobre sua escrivaninha, encontro uma pilha de cartas semiescritas endereçadas a [hostage.GetHomeCourt.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nAs cartas estão cheias de detalhes sobre minha corte: esconderijos, quem me fornece as refeições e os nomes dos servos insatisfeitos com probabilidade de me trair. Me viro e vejo [hostage.GetFirstNameNoTooltip] desarmad[hostage.Custom('ES_OA')] na porta, como um animal caçado momentos antes de fugir."
 bp2_yearly.8051.a: "\"Oh [hostage.Custom('GetNieceNephew')], tudo está perdoado.\""
 bp2_yearly.8051.b: "\"Você nunca mais escreverá para casa.\""
 bp2_yearly.8051.c: "\"Você nunca mais sairá do seu quarto!\""
 invalidates_hostage_tt: "[hostage.GetFirstName|U] deixará de ser seu cativo[hostage.Custom('ES_OA')]"
 bp2_yearly.8052.t: "Bullying"
 bp2_yearly.8052.desc: "O pátio está cheio dos sons familiares de gritos e correria quando as crianças da corte participam de suas brincadeiras. Apesar da algazarra, tudo está curiosamente em paz, até que os gritos de dor de [hostage.GetFirstName] me incitam a intervir.\n\n"Para! Para! [ROOT.Char.GetFirstNameNoTooltip], [mean_child.GetFirstName] está me batendo!"."
 bp2_yearly.8052.a: "[mean_child.GetFirstNameNoTooltip] deve parar de ser [Select_CString( mean_child.IsFemale, 'uma valentona', 'um valentão' )]."
 bp2_yearly.8052.b: "Devo encorajar [hostage.GetFirstNameNoTooltip] a se defender por si mesm[hostage.Custom('ES_OA')]."
 bp2_yearly.8052.b.success: "[hostage.GetFirstName] apreciou a lição"
 bp2_yearly.8052.b.failure: "[hostage.GetFirstName] ficou ferid[hostage.Custom('ES_OA')]"
 bp2_yearly.8052.c: "Não me importo."
 bp2_yearly.8053.t: "Uma Frase Maravilhosa"
 bp2_yearly.8053.desc: "As crianças voltam a brincar no pátio, e hoje o fazem com suas espadas de brinquedo. [hostage.GetFirstName|U] parece implacável com as outras crianças, enfrentando várias delas ao mesmo tempo e vencendo-as com facilidade.\n\nEntre os habituais gritos da brincadeira, meus ouvidos se aguçam de repente quando [hostage.GetSheHe] grita #EMP [ROOT.Char.GetHouse.GetMotto]#!, escória!"
 bp2_yearly.8053.a: "Uma bela frase."
 bp2_yearly.8053.b: "Essas palavras são apenas para os lábios de [ROOT.Char.GetHouse.GetNameNoTooltip]!"
 bp2_yearly.8054.t: "Lendas dos [ROOT.Char.GetHouse.GetNameNoTooltip]"
 bp2_yearly.8054.desc: "Encontro-me em um raro momento a sós com [hostage.GetFirstName], dando minhas habituais lições sobre assuntos tanto mundanos quanto piedosos, mas [hostage.Custom('ES_ElLa')] [hostage.Custom('GirlBoy')] parece estar pensando em outra coisa.\n\nEstou fascinado com sua ilustre casa, [ROOT.Char.Custom('GetAuntUncle')]. Você poderia me contar algumas das lendas da Casa de [ROOT.Char.GetHouse.GetNameNoTooltip]?"
 bp2_yearly.8054.a: "Você já ouviu falar de [ROOT.Char.GetHouse.GetFounder.GetNameNoTooltip]?"
 bp2_yearly.8054.b: "Eu mesmo[ROOT.Char.Custom('ES_OA')] sou uma espécie de lenda."
 bp2_yearly.8054.b.success: "[hostage.GetFirstName] fica impressionado com sua história"
 bp2_yearly.8054.b.failure: "[hostage.GetFirstName] não acredita em você"
 bp2_yearly.8054.c: "Já mencionei que matei um dragão?"
 bp2_yearly.8055.t: "Choque de Personalidades"
 bp2_yearly.8055.desc: "[hostage.GetFirstName] parece bastante distante e reservad[hostage.Custom('ES_OA')] comigo ultimamente, evitando-me nos momentos de contato que temos. Quando finalmente tenho um instante a sós com [hostage.GetSheHe], ponho uma mão compassiva sobre seus ombros gelados.\n\nEle apenas se esquiva e se afasta de mim. "O que você quer de mim? Cada momento em que estamos juntos é pura tortura! Você é um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('hostage'))] e mal posso esperar para sair deste lugar.""
 bp2_yearly.8055.a: "Talvez eu possa mudar!"
 bp2_yearly.8055.b: "Não vivo para impressionar[hostage.GetHerHim]."
 bp2_yearly.8055.c: "É preciso incentivar[hostage.GetHerHim] a mudar."
 bp2_yearly.8055.c.success: "[hostage.GetHerHim|U] convences de tu modo de ser"
 bp2_yearly.8055.c.failure: "[hostage.GetFirstName|U] está ofendido[hostage.Custom('ES_OA')]"
 bp2_yearly.8056.t: "Um Refém Cordial"
 bp2_yearly.8056.desc: "Conversar com [hostage.GetFirstName] é uma verdadeira delícia e parece que [hostage.GetSheHe] se sente da mesma forma. Temos tanto em comum que muitas vezes parece que compartilhamos a mesma mente.\n\nDurante nossa lição de hoje, presta atenção a cada palavra minha; é realmente [Select_CString( hostage.IsFemale, 'uma menina', 'um menino' )] a quem vale a pena chamar de [hostage.Custom('GetNieceNephew')]."
 bp2_yearly.8056.a: "Maravilhoso."
 bp2_yearly.8056.b: "Finalmente, alguém que realmente me #EMP entende#!."
 bp2_yearly.8057.t: "Como um[hostage.Custom('ES_XA')] [hostage.Custom('SisterBrother')]"
 bp2_yearly.8057.desc: "No pátio, [hostage.GetFirstName] e [nice_child.GetFirstName] estão felizes brincando, como todas as crianças deveriam estar. Entre os cantos habituais e o farfalhar da criação de [ROOT.Char.GetFaith.CreatorNamePossessive], estão as risadas alegres das crianças, e o mundo parece como deveria.\n\nNo meu momento de paz, até ouço [nice_child.GetFirstNameNoTooltip] casualmente chamar [hostage.GetFirstNameNoTooltip] de \"[hostage.Custom('SisterBrother')]\"."
 bp2_yearly.8057.a: "Que maravilha."
 bp2_yearly.8057.b: "Isso deve ser elogiado!"
 bp2_yearly.8060.t: "[ROOT.Char.GetMotherFather|U]?"
 bp2_yearly.8060.desc: "Por fim, [hostage.GetFirstName] é [Select_CString( hostage.IsFemale, 'uma mulher', 'um homem' )] e não poderia estar mais orgulhoso ao vê-lo passear com tanta confiança pela corte nesta manhã, com toda a graça e grandeza que se esperaria de um[hostage.Custom('ES_OA')] dos meus. Resta saber se continuará na corte, mas quando se aproxima de mim para os cumprimentos cortesãos habituais, é como se eu estivesse vendo meu [Select_CString( hostage.IsFemale, 'própria filha', 'próprio filho' )].\n\n"Que honra vê-lo, [ROOT.Char.GetMotherFather]." Foram precisos alguns suspiros e murmúrios na corte para que percebesse seu erro. "Oh, quero dizer [ROOT.Char.Custom('GetAuntUncle')]!""
 bp2_yearly.8060.a: "\"[ROOT.Char.GetMotherFather|U] servirá muito bem.\""
 bp2_yearly.8060.b: "\"Você é meu(a) [hostage.Custom('GetDaughterSon')], apenas no nome.\""
 bp2_yearly.8060.c: ""Serei sempre sua[ROOT.Char.Custom('ES_OA')] [ROOT.Char.Custom('GetAuntUncle')]"."
 bp2_yearly.8061.t: "[ROOT.Char.Custom('GetAuntUncle')|U] para Sempre"
 bp2_yearly.8061.desc: "Já faz muito tempo desde que [hostage.GetFirstName] veio à corte e me tornei seu [ROOT.Char.Custom('GetAuntUncle')]. Agora que [hostage.GetHerHim] o vejo como adult[hostage.Custom('ES_OA')], sinto um vínculo familiar com [hostage.GetSheHe], como se fôssemos do mesmo sangue.\n\n[hostage.GetFirstNameNoTooltip] se inclina diante de mim na corte e me jura lealdade eterna como seu [ROOT.Char.Custom('GetAuntUncle')] favorit[ROOT.Char.Custom('ES_OA')]."
 bp2_yearly.8061.a: "Maravilhoso."
 bp2_yearly.8063.t: "Um Refém Desprezado"
 bp2_yearly.8063.desc: "Já faz muito tempo desde que [hostage.GetFirstName] veio à corte e me tornei seu [ROOT.Char.Custom('GetAuntUncle')]. Agora que é [Select_CString( hostage.IsFemale, 'uma mulher', 'um homem' )], mal consigo suportar que me olhe. Sentad[hostage.Custom('ES_OA')] na corte, seus olhos mostram um ódio e uma malícia direcionados contra mim que só podem ser atribuídos à minha tentativa desajeitada de uma educação adequada como [ROOT.Char.GetHouse.GetNameNoTooltip]."
 bp2_yearly.8063.a: "Oops."
 bp2_yearly.8065.t: "[ROOT.Char.Custom2('AppropriateGreetingNegative', ROOT.Char )]"
 bp2_yearly.8065.desc: "Há muito tempo sinto que [new_parent.GetFirstName] é meu verdadeiro[new_parent.Custom('ES_OA')] [new_parent.GetMotherFather], e enfim colocamos isso por escrito. A partir de hoje, desvinculo-me da minha antiga casa e agora sou um[ROOT.Char.Custom('ES_XA')] membro pleno de [new_parent.GetHouse.GetName]."
 bp2_yearly.8065.a: "Loucura!"
 rival_manipulated_me: "[TARGET_CHARACTER.GetShortUIName|U] [TARGET_CHARACTER.LocalPlayerString( 'tentou', 'tentou' )] manipular [CHARACTER.LocalPlayerString( 'você', '' )][CHARACTER.LocalPlayerString( '', CHARACTER.GetShortUIName )]."
 rival_manipulated_me_corresponding: "[CHARACTER.GetShortUIName|U] [CHARACTER.LocalPlayerString( 'tentou', 'tentou' )] manipular [TARGET_CHARACTER.LocalPlayerString( 'você', '' )][TARGET_CHARACTER.LocalPlayerString( '', TARGET_CHARACTER.GetShortUIName )]."
 friend_deep_understanding: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [CHARACTER.LocalPlayerString( 'compartisteis', 'compartieron' )] uma profunda compreensão mútua"
 rival_chastised_child: "[CHARACTER.GetShortUIName|U][TARGET_CHARACTER.LocalPlayerString( ' te', '' )] [CHARACTER.LocalPlayerString( 'reprendiste', 'reprendió' )] a [TARGET_CHARACTER.LocalPlayerString( 'ti', TARGET_CHARACTER.GetShortUIName )]"
 rival_chastised_child_corresponding: "[TARGET_CHARACTER.GetShortUIName|U][CHARACTER.LocalPlayerString( ' te', '' )] [TARGET_CHARACTER.LocalPlayerString( 'reprendiste', 'reprendió' )] a [CHARACTER.LocalPlayerString( 'ti', CHARACTER.GetShortUIName )]"
 bp2_security_compromised: "Segurança Comprometida"
 bp2_security_compromised_desc: "Este personagem descobriu que alguém na corte está compartilhando informações comprometedoras"
 bp2_start_loyalty_story_cycle: "[hostage.GetFirstName] começará a se perguntar a quem deve sua lealdade."
 bp2_make_hostage_more_loyal: "Será mais provável que [hostage.GetFirstName] seja mais leal a você quando se tornar adult[hostage.Custom('ES_OA')]"
 bp2_make_hostage_less_loyal: "É menos provável que [hostage.GetFirstName] seja mais leal a você quando se tornar adulto[hostage.Custom('ES_OA')]"
 hostage_loyalty: "Refém Leal"
