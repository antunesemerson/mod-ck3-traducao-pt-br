l_spanish:
 destiny_child.0001.t: "Crian[destiny_child.Custom('ES_OA')] do destino"
 destiny_child.0001.desc: "Há uma intensidade palpável no olhar de [destiny_child.GetFirstName].\n\nTambém caminha com uma graça orgulhosa. Fala com convicção e firmeza, pronunciando cada sílaba com clareza exquisita. Pessoas cinco vezes mais velhas que ele a escutam atentamente toda vez que o faz, atraídas pelo magnetismo de sua personalidade, como mariposas em direção à chama.\n\nEst[destiny_child.Custom('ES_EA')] men[destiny_child.Custom('ES_OA')] tem algo especial. As canções antigas falam de indivíduos destinados a conduzir seu povo, figuras de grande porte e habilidade. Poderia ser verdade?\n\nSerá que o destino escolheu [destiny_child.GetFirstNameNoTooltip]?"
 destiny_child.0001.a: "Esta criança precisa de cuidado."
 destiny_child.0001.a.tt: "Há algo #EMP especial#! sobre [destiny_child.GetSheHe]..."
 destiny_child.0001.b: "Que absurdo. O[destiny_child.Custom('ES_EA')] filhote [destiny_child.Custom('ES_OA')] precisa saber qual é o seu lugar."
 destiny_child.1000.t: "Um Jovem Robusto"
 destiny_child.1000.desc: "Ao ver [destiny_child.GetFirstName] praticando golpes de espada, percebo que está realmente se tornando um belo espécime físico.\n\nCada golpe que corta o ar evidencia seu equilíbrio e determinação. Arrepio-me ao imaginar como seria estar do outro lado de um golpe assim, mas uma pequena parte de mim se pergunta se esse foco em poder é realmente benéfico."
 destiny_child.1000.a: "\"Excelente golpe! Continue assim!\""
 destiny_child.1000.b: "\"Não negligencie a resistência, [destiny_child.GetFirstNameNoTooltip].\""
 destiny_child.1005.t: "Pensamento Lateral"
 destiny_child.1005.desc: "Ao virar uma esquina, encontro [destiny_child.GetFirstName] e meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('realm_priest'))] [realm_priest.GetFirstName] envolvidos em um debate. Pelo que posso ver, não é uma discussão, mas sim uma troca animada de ideias.\n\nCom os olhos brilhando, [destiny_child.GetFirstNameNoTooltip] está contestando com fervor um detalhe de natureza religiosa, em grande detalhe. [realm_priest.GetFirstNameNoTooltip|U], para seu crédito, parece estar tratando [destiny_child.GetFirstNameNoTooltip] como um[destiny_child.Custom('ES_XA')] igual, apesar da diferença de idade."
 destiny_child.1005.a: "Tanta eloquência! Tanta sabedoria!"
 destiny_child.1005.b: "\"Você está impedindo [destiny_child.GetFirstNameNoTooltip] de prosseguir nas suas atividades marciais, [realm_priest.GetFirstNameNoTooltip].\""
 destiny_child.1005.c: "Tenho certeza de que [destiny_child.GetFirstNameNoTooltip] aprenderá muito com isso."
 destiny_child.1010.t: "Mente Militar"
 destiny_child.1010.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('marshal'))] [marshal.GetFirstName] e eu estamos imersos em um jogo de guerra, analisando uma mesa com pequenas peças que representam várias tropas. Mal percebo quando [destiny_child.GetFirstName] se aproxima de mansinho, mas o olhar feroz dirigido ao tabuleiro logo denuncia a intensidade de seus cálculos internos.\n\n\"Aqui.\" A voz de [destiny_child.GetFirstNameNoTooltip] me surpreende. \"Esse grupo está engajado frontalmente. Se você usasse aquela floresta para encobrir sua aproximação, poderia pegá-los totalmente desprevenidos...\".\n\n[marshal.GetFirstNameNoTooltip] ergue as sobrancelhas por trás de [destiny_child.GetFirstNameNoTooltip] enquanto se inclina para mover as peças."
 destiny_child.1010.a: "\"Verdade, mas isso os deixaria expostos. Veja!\""
 destiny_child.1010.a.tt: "Os conhecimentos de [destiny_child.GetFirstNameNoTooltip|U] sobre táticas marciais estão muito avançados, mas ainda há muito que ele/a não sabe."
 destiny_child.1010.b: "Minha nossa. [destiny_child.GetFirstNameNoTooltip|U] está certo(a)!"
 destiny_child.1010.c: "\"Aqui, repasse comigo mais uma vez?"
 destiny_child.1015.t: "A Prática Faz..."
 destiny_child.1015.desc: "Duas lâminas se chocam sob os raios brilhantes do sol, raspando uma contra a outra ao longo de todo o comprimento com um #EMP chirridos#! metálico.\n\n[destiny_child.GetFirstName] recua com leveza, segurando a espada como se fosse uma extensão de seu braço. Seu companheir[knight.Custom('ES_OA')] de treinamento, [knight.GetFirstName|U], cambaleia, ofegante.\n\nOs dois já vêm treinando há algum tempo, e [destiny_child.GetFirstNameNoTooltip] mal suou. Eu me pergunto se [destiny_child.GetSheHe] está sequer tentando?"
 destiny_child.1015.a: "\"Você deve se esforçar mais, [destiny_child.GetFirstNameNoTooltip]!\""
 destiny_child.1015.a.success: "[destiny_child.GetFirstNameNoTooltip] atinge novos patamares de habilidade"
 destiny_child.1015.a.failure: "[destiny_child.GetSheHe|U] se esforça até se fatigarse"
 destiny_child.1015.a.critfailure: "Comete um erro crítico devido à pressão"
 destiny_child.1015.b: "Talvez eu deva assumir?"
 destiny_child.1015.b.success: "Seus ensinamentos provaram ser ainda mais valiosos do que os de [knight.GetFirstNameNoTooltip]"
 destiny_child.1015.b.failure: "Você se mostra igualmente incapaz de acompanhar [destiny_child.GetFirstNameNoTooltip]"
 destiny_child.1015.c: "“Continuem assim, vocês dois, e aqui vai uma gorjeta pelas incômodas que estão causando a [knight.GetFirstNameNoTooltip]!”"
 destiny_child.1020.t: "Aprendizado Extracurricular"
 destiny_child.1020.desc: "Os acontecimentos mais estranhos costumam acontecer quando menos se espera. Assim parece ser quando meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('physician'))] [physician.GetFirstName] e [herbalist.GetFirstName], um[herbalist.Custom('ES_XA')] curandeiro[herbalist.Custom('ES_OA')] experiente, vêm até mim junto com um[destiny_child.Custom('ES_XA')] emocionad[destiny_child.Custom('ES_OA')] [destiny_child.GetFirstName].\n\n«[destiny_child.Custom('ES_ElLa')|U] jovem [destiny_child.GetFirstNameNoTooltip] deseja aprender uma de nossas profissões, [ROOT.Char.Custom('FormOfAddressForLiege')]», diz-me [physician.GetFirstNameNoTooltip]. «E gostaríamos de ensiná-lo». [herbalist.GetFirstNameNoTooltip] nos interrompe exasperad[herbalist.Custom('ES_OA')].\n\n«Só precisamos da sua aprovação, porque não serei eu quem afastará [destiny_child.GetFirstNameNoTooltip] dos estudos!»."
 destiny_child.1020.a: "Tempo com um médico pode ser bem gasto..."
 destiny_child.1020.b: "A botânica é uma área interessante de pesquisa!"
 destiny_child.1020.c: "\"Apenas... não permita que isso tome muito tempo dos estudos dela.\""
 destiny_child.1025.t: "Palavra Viaja Longe"
 destiny_child.1025.desc: "O relinchar de um cavalo me assusta. Um[famous_knight.Custom('ES_XA')] [famous_knight.Custom('KnightCultureNoTooltip')|l] faz trotar sua montaria de guerra em minha direção.\n\n"[ROOT.Char.GetTitledFirstName|l]! É você?" [famous_knight.GetSheHe|U] inclina a cabeça com respeito. "Venho em busca de um[destiny_child.Custom('ES_XA')], crianç[destiny_child.Custom('ES_OA')]; [destiny_child.GetFirstNameNoTooltip] está sob seus cuidados, não está?" Faço que sim, enquanto meus vigilantes guardas se aproximam.\n\n"Não tema. Ganhei minha fama por mérito próprio, mas as notícias sobre o talento de seu[destiny_child.Custom('ES_OA')] [destiny_child.GetFirstNameNoTooltip] se espalham como fogo em palha seca! Seria uma honra conhecer [destiny_child.GetHerHim] e, talvez, ajudar a cultivar o que promete.""
 destiny_child.1025.a: "#EMP Fora daqui,#! assassino[famous_knight.Custom('ES_OA')]! #EMP Guardas!#!"
 destiny_child.1025.b: "Trein[destiny_child.Custom('ES_OA')]? Que ideia maravilhosa!"
 destiny_child.1025.c: "\"Talvez você possa até ser persuadido a ficará\""
 destiny_child.1030.t: "O Próximo na Linha?"
 destiny_child.1030.desc: "[destiny_child.GetFirstName] tem muito talento. Suas palavras soam como as de alguém dez anos mais velho e as pessoas [destiny_child.Custom('ES_LoLa')] seguem-no instintivamente. Não pode haver dúvidas quanto ao futuro da minha família. E, no entanto…\n\nApesar da presença e da habilidade de [destiny_child.GetFirstNameNoTooltip], as leis [SelectLocalization( IsLandlessAdventurer( ROOT.Char ), 'del campamento', 'de estas tierras')] são o que são. [destiny_child.GetSheHe|U] não é meu herdeir[destiny_child.Custom('ES_OA')] principal. Quando eu partir, todo esse talento e habilidade serão usados a serviço das maquinações de seu [destiny_child.Custom2('RelationToMeShort', SCOPE.sC('current_heir'))] [current_heir.GetFirstName].\n\nNum canto da minha mente, pesam as apostas. O destino do meu legado depende desta decisão."
 destiny_child.1030.a: "Se eu usar todos os meus truques, talvez isso se encaixe..."
 destiny_child.1030.a.success: "Suas maquinações silenciosas têm sucesso"
 destiny_child.1030.a.failure: "Seus planos são notados, e uma agitação se desenvolve"
 destiny_child.1030.b: "Não posso arriscar deixar a história de [destiny_child.GetFirstNameNoTooltip] sem contar."
 destiny_child.1030.c: "As leis são como são. Elas não podem ser subvertidas."
 destiny_child.1030.c.tt: "Devo preparar [current_heir.Custom('ES_AlAla')] verdadeir[current_heir.Custom('ES_OA')] herdeir[current_heir.Custom('ES_OA')], mas também dotar [destiny_child.GetFirstNameNoTooltip] de habilidades para proteger[current_heir.Custom('ES_LoLa')]."
 destiny_child.1035.t: "Amor Jovem"
 destiny_child.1035.desc: "[destiny_child.GetFirstName] tem tamanha habilidade que às vezes me esqueço de que é apenas uma[destiny_child.Custom('ES_XA')] criança[destiny_child.Custom('ES_OA')]. Ao cruzarmos o [ROOT.Char.Custom('GetCourtyard')], ouço a agitação de duas crianças ao nosso lado, o que me lembra que os pequenos ainda são pequenos.\n\nHá uma evidente fascinação dos dois crianças sorridentes por [destiny_child.GetFirstNameNoTooltip] a ponto de ambos baixarem imediatamente o olhar, furiosos, diante da saudação animada de est[destiny_child.Custom('ES_EA')]."
 destiny_child.1035.interested: "\n\nEmbora [destiny_child.GetFirstNameNoTooltip] seja mais sábio[destiny_child.Custom('ES_OA')] do que o normal para sua idade, consigo ver um sorriso no canto dos lábios..."
 destiny_child.1035.notinterested: "\n\nPara minha surpresa, no entanto, não diz mais nada. Sem se deixar abater, segue em frente, saltando os degraus que levam para dentro."
 destiny_child.1035.a: "[destiny_child.GetFirstNameNoTooltip] parece estar atraídp(a) por [flirter_1.GetFirstNameNoTooltip]..."
 destiny_child.1035.b: "Acho que [destiny_child.GetFirstNameNoTooltip] está interessado(a) por [flirter_2.GetFirstNameNoTooltip]!"
 destiny_child.1035.c: "\"É bom que você não deixe essas bobagens te afetarem, [destiny_child.GetFirstNameNoTooltip].\""
 destiny_child.1035.d: "\"Você deve se concentrar, [destiny_child.GetFirstNameNoTooltip]!\""
 destiny_child.1035.d.tt: "Já haverá tempo para #EMP eso#! mais adiante em sua vida..."
 destiny_child.9999.t: "Destino Realizado"
 destiny_child.9999.desc: "O crescimento contínuo de [destiny_child.GetFirstName] me pegou de surpresa, mas agora [destiny_child.Custom('ES_LoLa')] o/a olho com os olhos de um[destiny_child.Custom('ES_XA')] igual. Há muito tempo, vi esse potencial e decidi cultivá-lo. Eu mal sabia o que esperar na época, mas está claro que meus esforços não foram em vão.\n\n[destiny_child.GetFirstNameNoTooltip] me encara sorrindo, e, apesar da nossa familiaridade, não consigo deixar de sentir essa atração natural que ele/ela exala. Não há dúvida: es[destiny_child.Custom('ES_EA')] [destiny_child.GetWomanMan] está destinad[destiny_child.Custom('ES_OA')] para a grandeza de alguma forma misteriosa.\n\nTenho certeza de que fiz a coisa certa ao ajudar[destiny_child.Custom('ES_LoLa')] em sua jornada pelo traiçoeiro caminho tecido pelo destino."
 destiny_child.9999.a: "Foi uma honra."
