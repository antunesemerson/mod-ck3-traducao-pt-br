l_spanish:
 story_event_legends.0001.t: "No Fim da Lenda"
 story_event_legends.0001.desc.intro: "Aqui termina o livro [legend_protagonist.Custom('ES_DelDela')] [legend_protagonist.GetTitledFirstName|l] e seus nobres feitos, que não tiveram paralelo em toda a terra. Eis aqui o final de [promoted_legend.GetName].\n\n"
 story_event_legends.0001.desc.famous_deed: "#EMP [promoted_legend.GetChapterDescriptionByName('famous_deed')]#!"
 story_event_legends.0001.desc.battle: "#EMP [promoted_legend.GetChapterDescriptionByName('battle')]#!"
 story_event_legends.0001.desc.hunt: "#EMP [promoted_legend.GetChapterDescriptionByName('hunt')]#!"
 story_event_legends.0001.desc.fallback: "#EMP A lenda [legend_protagonist.Custom('ES_DelDela')] [legend_protagonist.GetTitledFirstNameNoTooltip|l] culmina em uma aventura magnífica: seus grandes feitos de armas foram tais que maravilharam todos os reis, e muitos nobres e plebeus vieram ao seu encontro, pois desejavam ver a lenda em carne e osso.#!"
 story_event_legends.0001.desc.outro: "\n\nE aqui tudo foi escrito, [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], [GetCurrentDate.GetStringLong]."
 story_event_legends.0001.a: "Que seja contado."
 story_event_legends.0002.t: "O Livro da Casa de [legend_protagonist.GetHouse.GetBaseNameNoTooltip]"
 story_event_legends.0002.desc.intro: "Aqui termina o livro [legend_protagonist.Custom('ES_DelDela')] [legend_protagonist.GetTitledFirstName|l] e de sua nobre família, [legend_protagonist.GetHouse.GetBaseName], cuja fama e legitimidade são conhecidas em toda a terra. E eis aqui o fim de [promoted_legend.GetName].\n\n"
 story_event_legends.0002.desc.famous_deed: "#EMP [promoted_legend.GetChapterDescriptionByName('famous_deed')]#!"
 story_event_legends.0002.desc.battle: "#EMP [promoted_legend.GetChapterDescriptionByName('battle')]#!"
 story_event_legends.0002.desc.fallback: "$story_event_legends.0001.desc.fallback$"
 story_event_legends.0002.desc.outro: "\n\nE aqui tudo foi escrito, [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], [GetCurrentDate.GetStringLong]."
 story_event_legends.0002.a: "#EMP [legend_protagonist.GetHouse.GetMotto].#!"
 story_event_legends.0003.t: "Os milagres [legend_protagonist.Custom('ES_DelDela')] [legend_protagonist.GetTitledFirstNameNoTooltip|l]"
 story_event_legends.0003.desc.intro: "Aqui termina o livro [legend_protagonist.Custom('ES_DelDela')] [legend_protagonist.GetTitledFirstName|l] e seus milagres, que foram famosos entre todos os [legend_protagonist.GetFaith.GetAdherentNamePluralNoTooltip]. Rogo a [legend_protagonist.GetFaith.HighGodName] onipotente que abençoe este livro, [promoted_legend.GetName].\n\n"
 story_event_legends.0003.desc.famous_deed: "#EMP [promoted_legend.GetChapterDescriptionByName('famous_deed')]#!"
 story_event_legends.0003.desc.fallback: "#EMP A lenda [legend_protagonist.Custom('ES_DelDela')] [legend_protagonist.GetTitledFirstNameNoTooltip|l] é uma entre muitas maravilhas. [legend_protagonist.GetFirstNameNoTooltip] realizou incontáveis milagres e floresceu em muitas virtudes. Em sua presença, os enfermos eram curados e plantas brotavam da terra estéril.#!"
 story_event_legends.0003.desc.outro: "\n\nE aqui tudo foi escrito, [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], [GetCurrentDate.GetStringLong]."
 story_event_legends.0003.a: "Assim seja."
 can_select_legendary_culture_pillars_tt: "Você pode escolher a [heritage|lE] e [language|lE] de sua cultura lendária quando [Concept( 'diverge', 'divergir' )|E] de sua [culture|lE]"
 legend_title_does_not_exist_sub_realm_claims_given_tt: "Você receberá um [claim|lE] em cada [title|lE] de jure existente dentro de [title_claim.GetName]"
