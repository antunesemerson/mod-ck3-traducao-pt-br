 CE1_ADVENTURER_CB_NAME: "Aventura Lendária"
 CE1_ADVENTURER_TRUCE: "$FP1_VARANGIAN_ADVENTURER_INDEPENDENCE_TRUCE_NAME$"
 DEMAND_FEALTY_NAME: "[ConcatIfNeitherEmpty('$ORDER|q$', ' ')] Vassalização de [ATTACKER.GetPrimaryTitle.GetAdjective] de [DEFENDER.GetName]"
 DEMAND_FEALTY_NAME_BASE: "[ATTACKER.GetPrimaryTitle.GetAdjective][DEFENDER.GetPrimaryTitle.GetName]"
 DEMAND_FEALTY_CB_NAME: "Exigir Fidelidade"
 ADVENTURER_KINGDOM_NAME: "Aventureiro [target_kingdom.GetNameNoTierNoTooltip]"
 adventuring_host: "Anfitrião Aventureiro"
 legendary_adventure.troops_raised.tt: "Os Aventureiros Chegam"
 legendary_adventure_cb_tt: "Desbloqueado via decisão"
 launch_a_legendary_adventure_tt: "Obtenha acesso único ao [casus_belli|lE] Aventura Lendária, permitindo que você abandone seu reino atual e busque sua fortuna em um [kingdom|lE] estrangeiro."
 bonus_holy_war_tt: "Obtenha acesso a uma guerra santa adicional [casus_belli|lE] de nível de [kingdom|lE]"
 any_drifting_empire_tt: "Uma das opções:\n$BULLET_WITH_TAB$ Deve haver um [empire|El] com algum progresso de [de_jure_drift|El] em direção ao seu [primary_title|El]\n$BULLET_WITH_TAB$ Você detém outro [title|El] de [empire|El] a mais"
 any_drifting_kingdom_tt: "Qualquer um dos seguintes deve ser verdadeiro:\n $BULLET_WITH_TAB$ Deve haver um [kingdom|lE] com qualquer progresso de [de_jure_drift|lE] em direção ao seu [primary_title|lE]\n $BULLET_WITH_TAB$ Você possui um [title|lE] de [kingdom|lE] adicional"
 any_drifting_duchy_tt: "Uma de duas:\n$BULLET_WITH_TAB$ Deve haver um [duchy|El] com algum progresso de [de_jure_drift|El] em direção ao seu [primary_title|El]\n$BULLET_WITH_TAB$ Você possui outro [title|El] de [duchy|El] a mais"
 not_already_de_jure_your_title_tt: "O título ainda não é parte [de_jure|lE] do seu [primary_title|lE]"
 legendary_conversion_tt: "Conversão imediata de vastas extensões do seu [realm|lE] para a sua [faith|lE]"
 leg_demand_fealty_v_attacker: "[defender.GetName] torna-se seu [vassal|lE]"
 leg_demand_fealty_v_neutral: "[defender.GetName] se torna [vassal|lE] de [attacker.GetName]"
 legend_demand_fealty: "Exigir Submissão Local"
 legend_demand_fealty_desc: "Lendas de feitos heroicos me cercam. Agora sou mais do que um[ROOT.Char.Custom('ES_XA')] mer[ROOT.Char.Custom('ES_OA')] mortal, sou uma lenda viva e todos devem se curvar diante de mim."
 legend_demand_fealty_tooltip: "$fifteen_year_vassalization_tt$"
 legend_demand_fealty_confirm: "Todos se curvarão diante de mim."
 launch_a_legendary_adventure: "Iniciar uma Aventura Lendária"
 launch_a_legendary_adventure_desc: "Parece que minha lenda por aqui chegou ao fim, mas ainda sinto o anseio por mais grandes feitos antes de partir deste mundo. Deve haver mais lá fora, e pretendo levar minha lenda para terras distantes e míticas!"
 launch_a_legendary_adventure_tooltip: "$launch_a_legendary_adventure_tt$"
 launch_a_legendary_adventure_confirm: "A lenda nunca acaba!"
 legendary_integration_e: "Exaltar o reino"
 legendary_integration_e_desc: "Por todo o domínio contam-se lendas que reforçam a autoridade do meu reinado. Minha palavra é incontestável e, se eu quisesse proclamar que dois impérios são um só, assim seria."
 legendary_integration_e_tooltip: "$select_empire_to_drift_tt$"
 legendary_integration_e_confirm: "Minha vontade será feita."
 control_the_entirety_of_title_empire_tt: "Você deve controlar todo o [empire|El] inteiro"
 legendary_integration_k: "Consolidar o Reino"
 legendary_integration_k_desc: "Lendas são contadas por todo o reino que cimentam a autoridade do meu governo. Minha palavra é absoluta, e se eu declarasse que dois reinos são um só, assim seria."
 legendary_integration_k_tooltip: "$select_kingdom_to_drift_tt$"
 legendary_integration_k_confirm: "Minha vontade seja feita."
 control_the_entirity_of_title_tt: "Você deve controlar a totalidade do [kingdom|lE]"
 legendary_integration_d: "Expandir o Reino"
 legendary_integration_d_desc: "Lendas são contadas por todo o reino que cimentam a autoridade do meu governo. Essa legitimidade recém-adquirida poderia ser utilizada para expandir o que é considerado o território central do meu reino e exigir a fidelidade perpétua de um duque historicamente estrangeiro."
 legendary_integration_d_tooltip: "$select_duchy_to_drift_tt$"
 legendary_integration_d_confirm: "Minha vontade seja feita."
 legendary_holy_war: "Reafirmar a Missão Sagrada"
 legendary_holy_war_desc: "Minha lenda de piedade chegou ao fim, e embora seja louvada por verdadeiros crentes, pouco fez para conquistar os corações dos não crentes. Devemos continuar a espalhar nossas formas pacíficas da única maneira que conhecemos: pela espada."
 legendary_holy_war_tooltip: "$bonus_holy_war_tt$"
 legendary_holy_war_confirm: "A bandeira da retidão se ergue!"
 legendary_pacifism_spread: "Evangelizar o Pacifismo"
 legendary_pacifism_spread_desc: "Contos piedosos se espalharam muito além de minhas fronteiras e agarraram os corações dos não crentes. Nossos contos de paz e coexistência ameaçam desafiar os senhores da guerra briguentos em nossas fronteiras, e com um pequeno empurrão, esses selvagens certamente verão o valor de uma vida não violenta."
 legendary_pacifism_spread_tooltip: "$legendary_pacifism_spread_tt$"
 legendary_pacifism_spread_confirm: "A paz prevalecerá!"
 legendary_conversion: "Evangelizar para o Reino"
 legendary_conversion_desc: "Um conto lendário de piedade e devoção agarrou os corações de todos no reino. Com um pouco de incentivo, os não crentes do reino podem ser encorajados a adorar do mesmo modo que eu."
 legendary_conversion_tooltip: "$legendary_conversion_tt$"
 legendary_conversion_confirm: "A verdadeira fé prevalecerá."
 ce1_decision_events.1020.conversion: "[liege_convert.GetFirstName] se Converte!"
 ce1_decision_events.1000.t: "Integração Lendária"
 ce1_decision_events.1000.desc: "Como um [ROOT.Char.GetTitleAsNameNoTooltip|l] grandioso e renomado, mantenho muitos títulos dentro do meu reino. Embora nem todos eles sejam considerados parte de [ROOT.Char.GetPrimaryTitle.GetName], minha custódia sobre eles certamente deixou sua marca.\n\nCom meu status agora lendário, minha palavra tem muito peso e sinto que há poucos que ousariam questionar-me. Se eu dissesse que o dia era noite, seria registrado como tal. Da mesma forma, se eu dissesse que [kingdom_01.GetName] era parte legítima de [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip], assim seria escrito."
 ce1_decision_events.1000.a.empire: "[kingdom_01.GetName] agora é [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip]!"
 ce1_decision_events.1000.a.kingdom: "[kingdom_01.GetNameNoTooltip] não existe mais."
 ce1_decision_events.1000.b.empire: "[kingdom_02.GetNameNoTooltip] é uma excelente adição ao império."
 ce1_decision_events.1000.b.kingdom: "No fundo, [kingdom_02.GetNameNoTooltip] não é um verdadeiro reino."
 ce1_decision_events.1000.c.empire: "[kingdom_03.GetNameNoTooltip] é a melhor opção."
 ce1_decision_events.1000.c.kingdom: "[kingdom_03.GetNameNoTooltip] será território [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip] para sempre."
 ce1_decision_events.1000.d: "Eu escolho [kingdom_04.GetNameNoTooltip]."
 ce1_decision_events.1000.e: "Não consigo pensar em acréscimo melhor do que [kingdom_05.GetNameNoTooltip]."
 ce1_decision_events.1000.f: "É [kingdom_06.GetNameNoTooltip]."
 ce1_decision_events.1010.t: "$ce1_decision_events.1000.t$"
 ce1_decision_events.1010.desc: "Como um [ROOT.Char.GetTitleAsNameNoTooltip|l] lendariamente renomado, meu nome é celebrado por todo o meu reino e além.\n\nAlgumas terras, como [duchy_01.GetName], têm um futuro incerto, dentro ou fora de [ROOT.Char.GetPrimaryTitle.GetName], mas com minha popularidade em seu auge e o status desses títulos em fluxo, posso usar meu status lendário para resolver a questão de uma vez por todas."
 ce1_decision_events.1010.a: "[duchy_01.GetNameNoTooltip] [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip]"
 ce1_decision_events.1010.b: "[duchy_02.GetNameNoTooltip] é uma ótima adição ao meu reino."
 ce1_decision_events.1010.c: "[duchy_03.GetNameNoTooltip] é a melhor opção."
 ce1_decision_events.1010.d: "Opto por [duchy_04.GetNameNoTooltip]."
 ce1_decision_events.1010.e: "Não consigo pensar em uma adição melhor do que [duchy_05.GetNameNoTooltip]."
 ce1_decision_events.1010.f: "É [duchy_06.GetNameNoTooltip]."
 ce1_decision_events.1015.t: "$ce1_decision_events.1000.t$"
 ce1_decision_events.1015.desc: "Como grande [ROOT.Char.GetTitleAsNameNoTooltip|l] de renome, ostento numerosos títulos em meu domínio. Embora nem todos sejam considerados parte de [ROOT.Char.GetPrimaryTitle.GetName], minha custódia sobre eles certamente deixou sua marca.\n\nAgora que meu status é lendário, minha palavra pesa muito e sinto que há poucos que ousariam me questionar. Se eu dissesse que o dia é noite, assim ficaria escrito. Da mesma forma, se eu dissesse que [empire_01.GetDefinitiveName] é parte legítima de [ROOT.Char.GetPrimaryTitle.GetDefinitiveNameNoTooltip], assim também seria."
 ce1_decision_events.1015.a: "![empire_01.GetNameNoTooltip] agora é [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip]!"
 ce1_decision_events.1015.b: "[empire_02.GetNameNoTooltip] é uma bela adição ao império."
 ce1_decision_events.1015.c: "[empire_03.GetNameNoTooltip] é a melhor opção."
 ce1_decision_events.1015.d: "Opto por [empire_04.GetNameNoTooltip]."
 ce1_decision_events.1015.e: "Não consigo imaginar melhor acréscimo do que [empire_05.GetNameNoTooltip]."
 ce1_decision_events.1015.f: "Será [empire_06.GetNameNoTooltip]."
 ce1_decision_events.1020.t: "Paz em Nosso Tempo"
 ce1_decision_events.1020.desc: "As histórias de um guerreiro que resolve os conflitos não com a espada, mas com palavras e razão se tornaram tremendamente populares por todo o reino. Embora eu reze a [ROOT.Char.GetFaith.HighGodName|U] da forma tradicional [ROOT.Char.GetFaith.GetAdjective], não posso deixar de me comover com este relato do [legendary_character.GetFaith.GetName|l].\n\nAgora meu reino está cheio de rumores sobre essa figura lendária e o poder da paz que sua fé concedeu a ele. Um pregador [legendary_character.GetFaith.GetAdherentName] vindo de [legendary_character.GetPrimaryTitle.GetName] vem até mim na corte; esta pode ser minha chance de me converter a um modo de vida mais pacífico."
 ce1_decision_events.1020.a: "Eu baixo minha espada."
 ce1_decision_events.1020.b: "Tire este herege da minha corte."
 ce1_decision_events.1021.t: "Uma Conversão Lendária"
 ce1_decision_events.1021.desc: "As histórias de um guerreiro que resolve conflitos não com a espada, mas com palavras e razão tornaram-se tremendamente populares em todo o reino. [legendary_character.GetName|U] tocou os corações de muitos, incluindo [liege_convert.Custom2('MyCharacterIntroduction', ROOT.Char)]. [liege_convert.GetFirstName] adotou a fé de [legendary_character.GetFaith.GetName|l] e deixou de lado toda ideia de violência, e está exigindo que todos os seus súditos façam o mesmo."
 ce1_decision_events.1021.a: "A paz é a única opção."
 ce1_decision_events.1021.b: "A paz nunca foi uma opção."
 fifteen_year_vassalization_tt: "Você terá quinze anos de acesso ao [casus_belli|lE] Demand Fealty."
 select_empire_to_drift_tt: "Você pode selecionar um [empire|El] para que [Concept( 'de_jure_drift', 'derive de iure' )|E] permanentemente derive de iure para o seu reino. O império deve estar em sua posse ou ter algum progresso de deriva para um dos títulos que você possui."
 select_kingdom_to_drift_tt: "Você pode selecionar um [kingdom|lE] para que [Concept( 'de_jure_drift', 'derive de iure' )|E] permanentemente derive de iure para o seu domínio. O reino deve estar sob seu controle ou ter algum progresso de deriva em um dos títulos que você possui."
 select_duchy_to_drift_tt: "Você pode selecionar um [duchy|lE] para que [Concept( 'de_jure_drift', 'derive de iure' )|E] permanentemente derive para o seu reino. O ducado deve estar em sua posse ou ter algum progresso de deriva em direção a um dos títulos que você possui."
 legendary_pacifism_spread_tt: "Todos os reinos vizinhos terão a oportunidade de converter-se à sua fé."
 unlock_legendary_adventure_tt: "Ganhe acesso à [decision|lE] de #EMP $launch_a_legendary_adventure$#!, permitindo que você abandone seu domínio e comece uma nova vida em um [kingdom|lE] distante."
 unlock_legendary_fealty_tt: "Você obtém acesso à [decision|lE] #EMP $legend_demand_fealty$#! [decision|lE], permitindo que você subjugue qualquer reino próximo."
 unlock_legendary_integration_d_tt: "Você ganha acesso à [decision|lE] #EMP $legendary_integration_d$#!, permitindo que você [Concept( 'de_jure_drift', 'derivar de iure' )|E] imediatamente um título de [duchy|lE] ao seu domínio."
 unlock_legendary_integration_k_tt: "Você ganha acesso à [decision|lE] #EMP $legendary_integration_k$#!, permitindo que você [Concept( 'de_jure_drift', 'derivar de iure' )|E] imediatamente um reino em seu domínio.[kingdom|lE]"
 unlock_legendary_integration_e_tt: "Você passa a ter acesso à [decision|El] #EMP $legendary_integration_e$#!, permitindo que você [Concept( 'de_jure_drift', 'derivar de iure' )|E] imediatamente um título de [empire|El] ao seu domínio."
 unlock_legendary_conversion_tt: "Ganhe acesso à [decision|lE] #EMP $legendary_conversion$#!, convertendo imediatamente vastas áreas do seu [realm|lE] para a sua [faith|lE]."
 unlock_legendary_pacifism_spread_tt: "Ganhe acesso à [decision|lE] #EMP $legendary_pacifism_spread$#!, permitindo que você evangelize sua [faith|lE] para reinos estrangeiros em suas fronteiras."
 unlock_legendary_holy_war_tt: "Ganhe acesso à [decision|lE] #EMP $legendary_holy_war$#!, concedendo-lhe um uso adicional do $major_religious_war$ [casus_belli|lE]."
 non_true_faith_neighbour: "Você deve ter pelo menos um governante vizinho que não siga a sua [faith|lE]."
 leg_conv_valid_county: "Deve haver pelo menos um [county|lE] em seu [realm|lE] que não siga a sua [faith|lE]."
 every_same_faith_vassal: "Cada [vassal|lE] de sua [faith|lE]"
