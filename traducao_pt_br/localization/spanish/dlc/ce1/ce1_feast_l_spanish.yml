l_spanish:
 feast_type_legendary: "Banquete Legendário"
 feast_type_legendary_desc: "$EFFECT_LIST_BULLET$ O $feast_phase_toast$ se concentra em sua [legend|lE]\n$EFFECT_LIST_BULLET$ Os eventos levarão a ocasiões para ganhar [opinion|El]\n$EFFECT_LIST_BULLET$ Certas opções permitirão perder [stress|El]\n\n#weak Uma história para a posteridade.#!"
 legendary_feast_valid_tt: "Você #bold não#! tem um [promoted_legend|lE]"
 feast.7204.t: "Uma História para Contar"
 feast.7204.desc: "O som de [ROOT.GetCharacter.Custom('GetMusicalInstrumentPlural')] enche os salões de [activity.GetCurrentPhase.GetLocation.GetNameNoTooltip] enquanto os convidados sorvem as últimas gotas de [ROOT.Char.Custom('RegionalAlcoholicDrink')]. Acima deles, a voz de [bard.Custom('ES_DelDela')] [bard.GetTitledFirstName|l] se eleva harmonicamente.\n\n"Escutem! Escutem bem! Pois vou contar a história de [ROOT.Char.GetPromotedLegend.GetName]!""
 feast.7204.a: "Todo mundo vai estar falando sobre isso!"
 feast.7204.b: "Ha! Não se esqueçam de que é #EMP minha#! lenda!"
 feast.7204.c: "Meus convidados nunca esquecerão uma performance como essa."
 feast.7204.d: "Que venham muitos mais!"
 feast.7205.t: "Uma História para Ouvir"
 feast.7205.desc: "$feast.7204.desc$\n\nJunto a [bard.GetSheHe], [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] sorri orgulhosamente."
 feast.7205.a: "Que música maravilhosa!"
 feast.7205.b: "#EMP Oh!#! Eles até têm [host.Custom('GetExpensiveDessert')] aqui!"
 legendary_feast_legend_modifier: "Anfitrião Legendário"
 legendary_feast_legend_modifier_desc: "Este personagem teve sua lenda cantada em um grande banquete - e ainda está se banhando nessa glória."
 legendary_feast_legend_boost_modifier: "Banquete Legendário"
 legendary_feast_legend_boost_modifier_desc: "Este personagem teve sua lenda cantada em um grande banquete."
