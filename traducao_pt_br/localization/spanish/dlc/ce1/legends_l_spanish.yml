 #Legend Chapters
 legend_chapter_opening_generic: "A lenda de [ROOT.Legend.GetProtagonist.GetNameNoTooltip] é tão grande e vasta quanto o mundo, pois seus feitos são incomparáveis."
 legend_chapter_extra_deed_memory: "[ROOT.Legend.GetProtagonist.GetNameNoTooltip], porém, não parou por aí, pois seguiu adiante e, com grande bravura, [ROOT.Legend.MakeScope.Var('extra_deed_memory').CharacterMemory.GetThirdPerspectiveDescription]."
 legend_chapter_motivation_generic: "Ao ouvir rumores vagos que assolavam a terra, [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] determinou-se a realizar a difícil empreitada."
 legend_chapter_motivation_evil: "Não foram os apelos do povo, nem o desespero que assolava a terra que o levou a buscar aventuras, mas o desejo do próprio coração sombrio."
 legend_chapter_motivation_peasant: "Quando um camponês pobre, choroso e desesperado solicitou uma audiência com [ROOT.Legend.GetProtagonist.GetSheHe], [Select_CString( ROOT.Legend.GetProtagonist.IsFemale, 'la piadosa', 'el piadoso' )] [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] não pôde deixar de ouvir suas súplicas e partiu rapidamente para uma aventura."
 legend_chapter_motivation_spouse: "Numa manhã, o cônjuge de [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip|U] chegou até ela/ele com rumores alarmantes, [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] apressou-se e prometeu honrar seu amor eterno."
 legend_chapter_motivation_honor_lady: "Quando os olhos de [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip|U] se encontraram com seu amante, tudo estava decidido. Ao ouvir os pedidos de ajuda e querendo provar quão grande era sua bravura, [ROOT.Legend.GetProtagonist.GetSheHe] partiu em uma aventura."
 legend_chapter_discovery_generic: "[ROOT.Legend.GetProtagonist.GetNameNoTooltip] observou [Localize( location )] com seu séquito, e não demorou muito para encontrar o local exato."
 legend_chapter_hunt_generic: "A [Localize( beast )] já estava lá, bebendo de um riacho. Ergueu a cabeça e avançou rapidamente em direção a [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip]. Faminto. Mas [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] foi mais rápido e com um golpe hábil matou a besta."
 legend_chapter_battle_generic: "A batalha foi feroz. [ROOT.Legend.GetProtagonist.GetNameNoTooltip] encontrou-se com [loser.GetNameNoTooltip] no meio do campo, com os olhos cheios de bravura. Levantou a arma e desferiu um golpe no peito de seu inimigo. O sangue jorrou. Vitória."
 legend_chapter_conclusion_generic: "A viagem de volta para casa não foi fácil, mas [ROOT.Legend.GetProtagonist.Custom('ES_ElLa')] [ROOT.Legend.GetProtagonist.GetTitledFirstNameNoTooltip|l] entrou na cidade entre cânticos triunfantes. E agora, alegremo-nos e festejemos, pois sua lenda deve ser celebrada!"
 legend_chapter_famous_deed_generic: "A lenda de [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip|U] culmina em uma aventura maravilhosa: seus grandes feitos de armas foram tais que maravilharam todos os reis, e muitos nobres e plebeus foram ao seu encontro, pois desejavam ver a lenda em carne e osso."
 legend_chapter_extra_deed_generic: "Mas não foi esse o final da história, pois quando [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] chegou ao seu lar, havia ajudado aqueles em perigo e vingado suas afrontas. Bandidos, bestas e malfeitores não puderam se esconder da fúria de sua espada."
 legend_chapter_opening_debug: "#D Capítulo de abertura#!"
 legend_chapter_motivation_debug: "#D Capítulo de motivação#!"
 legend_chapter_discovery_debug: "#D Capítulo de descoberta#!"
 legend_chapter_hunt_debug: "#D Capítulo de caçada#!"
 legend_chapter_battle_debug: "#D Capítulo de batalha#!"
 legend_chapter_famous_deed_debug: "#D Capítulo de feitos famosos#!"
 legend_chapter_extra_deed_debug: "#D Capítulo de feitos extras#!"
 legend_chapter_conclusion_debug: "#D Capítulo de conclusão#!"
 legend_chapter_motivation_delicious_meats: "Sabia-se que tal [Localize( beast )] era feroz e perigosa, mas isso não negou o propósito de [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip]. [ROOT.Legend.GetProtagonist.GetSheHe|U] insistiu em provar a carne da fera e se impeliu a cumprir esse sonho."
 legend_chapter_motivation_dead_parent: "Semelhante [Localize( beast )] tinha um perigo inegável, mas o coração de [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip|U] era firme. [ROOT.Legend.GetProtagonist.GetSheHe|U] nutria um ressentimento pessoal contra o animal, pois corria o rumor de que ele havia matado seu progenitor."
 legend_chapter_motivation_great_venator: "Nessa época, já se conhecia [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] como [ROOT.Legend.GetProtagonist.Custom('ES_ElLa')] melhor caçador[ROOT.Legend.GetProtagonist.Custom('ES_XA')] em sua terra, mas [ROOT.Legend.GetProtagonist.Custom('ES_ElLa')] valente [ROOT.Legend.GetProtagonist.GetTitleAsNameNoTooltip|l] ainda precisava continuar pondo essa verdade à prova."
 legend_chapter_motivation_accomplished_hunter: "[ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip|U] estava decidido[ROOT.Legend.GetProtagonist.Custom('ES_OA')] a provar seu valor como caçador[ROOT.Legend.GetProtagonist.Custom('ES_XA')]. E, enfim, teve a chance de mostrar sua habilidade, quando o/a poderoso/a [Localize( beast )] se aproximava."
 legend_chapter_discovery_befriended_cyclops: "[ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip|U] demonstrou ser capaz de fazer amizade com todos os tipos exóticos e incomuns que encontrou pelo caminho, chegando até mesmo a se tornar amig[ROOT.Legend.GetProtagonist.Custom('ES_OA')] de um ciclope grande e irritadiço!"
 legend_chapter_discovery_cyclops: "Em sua jornada, conheceu as pessoas mais exóticas e incomuns, culminando na descoberta da existência de um poderoso ciclope!"
 legend_chapter_discovery_renowned_herbalist: "Apesar da fama de [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] como herborista, mais celebridade alcançou quando descobriu um bosque de plantas letais e atravessou suas trepadeiras tóxicas."
 legend_chapter_discovery_evil_plants: "As viagens de [ROOT.Legend.GetProtagonist.GetFirstName] estiveram repletas de perigos desde o início. Foi até atacado por uma moita de plantas tóxicas, cujo pólen deixa tonto e atordoa qualquer um que se aproxime."
 legend_chapter_discovery_legendary_archer: "As viagens de [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] levaram [ROOT.Legend.GetProtagonist.GetHerHim] a um trecho de terra onde havia um arqueiro fanfarrão, que desafiou [Select_CString( ROOT.Legend.GetProtagonist.IsFemale, 'a boa', 'o bom' )] [ROOT.Legend.GetProtagonist.GetLadyLord] a uma competição de tiro com arco. [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] prontamente partiu a flecha do arqueiro em duas com uma das suas!"
 legend_chapter_discovery_archery_contest_won: "As viagens de [ROOT.Legend.GetProtagonist.GetFirstName] levaram [ROOT.Legend.GetProtagonist.GetHerHim] a um território onde havia um arqueiro fanfarrão, que desafiou [Select_CString( ROOT.Legend.GetProtagonist.IsFemale, 'a boa', 'o bom' )] [ROOT.Legend.GetProtagonist.GetLadyLord] a uma competição de tiro com arco. A competição foi feroz, mas, no final, [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] demonstrou ter a mira mais certeira."
 legend_chapter_discovery_bog_stronk: "A rota de [ROOT.Legend.GetProtagonist.GetFirstName] [ROOT.Legend.GetProtagonist.GetHerHim] levou por um terreno traiçoeiro, onde até o próprio solo tentou sugar[ROOT.Legend.GetProtagonist.GetHerHim] sob a terra. Só a imensa força que possuía [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] permitiu que se soltasse."
 legend_chapter_discovery_bog_struggle: "A trilha de [ROOT.Legend.GetProtagonist.GetFirstName] [ROOT.Legend.GetProtagonist.GetHerHim] levou por um terreno traiçoeiro, onde até o próprio chão tentou succionar[ROOT.Legend.GetProtagonist.GetHerHim] para baixo da terra. Lutando com todas as forças, acabou se libertando do chão traiçoeiro."
 legend_chapter_discovery_wildflower_expert: "As viagens de [ROOT.Legend.GetProtagonist.GetFirstName] [ROOT.Legend.GetProtagonist.GetHerHim] o levaram a terras novas e exóticas, onde até mesmo as plantas se mostravam desconhecidas e incomuns. De fato, chegou até a encontrar uma planta jamais vista antes ou depois, escondida entre o mato frondoso."
 legend_chapter_discovery_cannibal_scarred: "[ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip|U] viajou por todos os cantos do mundo, e até foi atacad[ROOT.Legend.GetProtagonist.Custom('ES_OA')] por canibais vorazes! Derrotou dezenas deles, e as cicatrizes em seu rosto testemunharão a luta pelo resto de seus dias."
 legend_chapter_discovery_cannibal_fight: "[ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip|U] viajou por toda parte, e até mesmo foi atacad[ROOT.Legend.GetProtagonist.Custom('ES_OA')] por canibais vorazes! A luta durou até o pôr do sol, com nosstr[ROOT.Legend.GetProtagonist.Custom('ES_OA')] adalid exaust[ROOT.Legend.GetProtagonist.Custom('ES_OA')] enquanto o restante dos canibais fugia."
 legend_chapter_battle_enemy_commander: "Em meio à refrega, [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip|U] se viu cara a cara nada menos que com o desgraçado comandante inimigo! Após um duelo formidável, o vil canalha foi abatido por [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip], com o sangue escorrendo livremente por sua espada enquanto a batalha girava ao redor deles."
 legend_chapter_battle_faked_retreat: "A perspicácia tática de [ROOT.Legend.GetProtagonist.GetFirstName] foi posta à prova no fogo da batalha, mas provou estar à altura da tarefa. Uma astuta retirada fingida reuniu o inimigo em uma posição vulnerável, apenas para que noss[ROOT.Legend.GetProtagonist.Custom('ES_OA')] bravo [Select_CString( ROOT.Legend.GetProtagonist.IsFemale, 'heroína', 'héroe' )] avançasse novamente e os abatesse."
 legend_chapter_battle_flanking_success: "As manobras agressivas e brilhantes de [ROOT.Legend.GetProtagonist.GetFirstName] no campo de batalha foram mais uma vez demonstradas, quando liderou pessoalmente uma estrondosa carga de flanqueio. O inimigo covarde vacilou e então fugiu; um único golpe decidiu o dia."
 legend_chapter_battle_ravished_maiden: "[ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip], que jamais deixou um inocente perecer, encontrou tempo em plena batalha para não apenas resgatar, mas também #EMP seducir#! a um[ROOT.Legend.GetProtagonist.Custom('ES_XAOpp')] bonit[ROOT.Legend.GetProtagonist.Custom('ES_OAOpp')] plebeu[ROOT.Legend.GetProtagonist.Custom('ES_OAOpp')] que havia se metido no meio do perigo!"
 legend_chapter_battle_maiden_kiss: "Ao se deparar com [Select_CString( ROOT.Legend.GetProtagonist.IsFemale, 'um camponês indefeso', 'uma camponesa indefesa' )] — mas certamente atraent[ROOT.Legend.GetProtagonist.Custom('ES_OAOpp')] — em meio ao tumulto da batalha, [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] se lançou para tirá-l[ROOT.Legend.GetProtagonist.Custom('ES_OAOpp')] de lá. Noss[Select_CString( ROOT.Legend.GetProtagonist.IsFemale, 'a heroína', 'o herói' )] recebeu um beijo como recompensa, como convém a um[ROOT.Legend.GetProtagonist.Custom('ES_XA')] [ROOT.Legend.GetProtagonist.GetWomanMan] de tal galhardia!"
 legend_chapter_battle_wounded: "A batalha foi feroz e o combate brutal. [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip|U] sofreu muitas feridas duradouras como resultado; um pequeno preço a pagar por um[ROOT.Legend.GetProtagonist.Custom('ES_XA')] [ROOT.Legend.GetProtagonist.GetWomanMan] de tamanha convicção e honra!"
 legend_chapter_battle_reinforcement_arrival: "Quando a batalha atingiu seu auge, [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip|U] chegou à frente de uma hoste de reforços. E assim, o combate se inclinou a favor de noss[ROOT.Legend.GetProtagonist.Custom('ES_OA')] valente [Select_CString( ROOT.Legend.GetProtagonist.IsFemale, 'heroína', 'héroe' )], que liderou a investida contra as fileiras inimigas."
 legend_chapter_opening_new_faith: "[ROOT.Legend.GetProtagonist.GetNameNoTooltip|U] nasceu quando a religião [ROOT.Legend.GetProperty( 'religion' ).Religion.GetAdjective] havia se afastado da vontade de [ROOT.Legend.GetProperty( 'faith' ).Faith.HighGodNamePossessive]. Pregadores e [ROOT.Legend.GetProperty( 'faith' ).Faith.PriestNeuterPlural] pregavam heresias em SEU nome enquanto abandonavam e deixavam apodrecer seus [ROOT.Legend.GetProperty( 'faith' ).Faith.HouseOfWorshipPlural]. O povo se voltou para outras religiões, abrindo caminho para que os rivais [ROOT.Legend.GetProperty( 'faith' ).Faith.HighGodNamePossessive] conquistassem os corações dos homens."
 legend_chapter_motivation_new_faith: "Vendo a fraqueza e corrupção da fé, [ROOT.Legend.GetProtagonist.GetNameNoTooltip|U] partiu com uma nova visão para [ROOT.Legend.GetProperty( 'religion' ).Religion.GetNameNoTooltip|l] — uma nova perspectiva de fé que não permitiria desvios da vontade de [ROOT.Legend.GetProperty( 'faith' ).Faith.PantheonTerm]; uma fé forte e unida que se espalharia por todos os cantos do mundo!"
 legend_chapter_famous_deed_new_faith: "[ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip], em busca de solidão diante da tagarelice insustancial dos hereges, subiu à mais alta das montanhas de toda a terra tendo apenas a misericórdia de [ROOT.Legend.GetProperty( 'faith' ).Faith.HealthGodName] como proteção. No cume, as nuvens se abriram, [ROOT.Legend.GetProperty( 'faith' ).Faith.PantheonTerm] apareceu a [ROOT.Legend.GetProtagonist.GetHerHim] e lhe enviou uma visão. O corpo esquelético de um velho [ROOT.Legend.GetProperty( 'faith' ).Faith.PriestNeuter] jazia em seu leito de morte, agarrando-se ciumentamente à vida enquanto um [ROOT.Legend.GetProperty( 'faith' ).Faith.PriestNeuter] mais novo e bem mais jovem velava seu antecessor. Essa visão sem dúvida prenunciava a bênção de [ROOT.Legend.GetProperty( 'faith' ).Faith.PantheonTerm] à nova fé [ROOT.Legend.GetProperty( 'faith' ).Faith.GetNameNoTooltip|l]."
 legend_chapter_extra_deed_new_faith: "A humanidade criou tantos rivais para [ROOT.Legend.GetProperty( 'faith' ).Faith.PantheonTerm] e [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] os desmantelou a todos, reunindo assim para si um vasto rebanho para pastorear."
 legend_chapter_conclusion_new_faith: "Com os [ROOT.Legend.GetProperty( 'faith' ).Faith.PriestNeuterPlural] reunidos e o [ROOT.Legend.GetProperty( 'faith' ).Faith.ReligiousText|U] reescrito, [ROOT.Legend.GetProperty( 'religion' ).Religion.GetNameNoTooltip|l] foi finalmente restaurado na visão de [ROOT.Legend.GetProperty( 'faith' ).Faith.PantheonTerm]!"
 legend_chapter_battle_legendary_battle: "$legendary_battle_desc$"
 legend_chapter_opening_struggle: "Nascid[ROOT.Legend.GetProtagonist.Custom('ES_OA')] da tormenta caótica no coração do conflito chamado [ROOT.Legend.GetProperty( 'struggle' ).GetFlagName], [ROOT.Legend.GetProtagonist.GetNameNoTooltip] não mostrou nenhuma inclinação de que traria paz e ordem para a região."
 legend_chapter_motivation_struggle: "Ao ver irmão contra irmão, [ROOT.Legend.GetProtagonist.GetFaith.GetAdherentNameNoTooltip] contra [ROOT.Legend.GetProtagonist.GetFaith.GetAdherentNameNoTooltip], [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] apenas murmurou \"acabou\" para os tolos brigões que buscavam despedaçar a região. Ficou claro que as lutas de seu povo deviam chegar ao fim, e um novo futuro precisava ser forjado a partir dos restos do conflito chamado [ROOT.Legend.GetProperty( 'struggle' ).GetFlagName]."
 legend_chapter_extra_deed_struggle: "Apesar de toda a grandeza que [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] havia conquistado, ainda havia aqueles que duvidavam de sua visão para solucionar tal [ROOT.Legend.GetProperty('struggle' ).GetFlagName]. Seus inimigos logo foram derrotados em todos os campos de batalha, tanto no debate quanto na guerra, até que todos se arrastaram aos seus pés e imploraram sua clemência."
 legend_chapter_conclusion_ended_struggle: "[ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip|U] viu que as regras do mundo estavam erradas, mas, graças aos seus esforços, o chamado [ROOT.Legend.GetProperty( 'struggle' ).GetFlagName] chegou ao fim e a região nunca mais será a mesma. [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip|U] emerge como [ROOT.Legend.GetProtagonist.Custom('ES_ElLa')] [ROOT.Legend.GetProtagonist.GetTitleAsNameNoTooltip|l] vitorios[ROOT.Legend.GetProtagonist.Custom('ES_OA')] sobre todos os demais."
 legend_chapter_opening_priesthood_restoration: "[ROOT.Legend.GetProtagonist.GetNameNoTooltip|U] entrou neste mundo quando os fiéis [ROOT.Legend.GetProperty( 'faith' ).Faith.GetAdherentNamePluralNoTooltip] estavam destroçados pelo mundo em uma diáspora sem esperança. Com visões de uma tão imponente [ROOT.Legend.GetProperty( 'faith' ).Faith.HouseOfWorship] erguendo-se sobre a criação em sua mente, [ROOT.Legend.GetProtagonist.GetSheHe] soube que lhe havia sido confiada uma missão sagrada de [ROOT.Legend.GetProperty( 'faith' ).Faith.HighGodName] para unir todos os [ROOT.Legend.GetProperty( 'faith' ).Faith.GetAdherentNamePluralNoTooltip]."
 legend_chapter_famous_deed_religious: "[ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip|U] se dedicou a [ROOT.Legend.GetProperty( 'faith' ).Faith.HighGodName] e agiu inteiramente segundo Sua vontade. Todo [ROOT.Legend.GetProperty( 'faith' ).Faith.GetReligion.GetAdherentNameNoTooltip] percorria a terra com o nome \"[ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip]\" nos lábios e, em seu nome, narrava histórias dos incontáveis acontecimentos sagrados."
 legend_chapter_extra_deed_religious: "No entanto, isso não foi o fim da história, pois os fiéis ainda eram assediados por bandidos e malfeitores, e escravizados por hereges! [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip|U] ajudou aqueles que viviam sob tirania a se erguerem para o abraço de [ROOT.Legend.GetProperty( 'faith' ).Faith.HighGodName|U], triunfando sobre [ROOT.Legend.GetProperty( 'faith' ).Faith.DevilName] e seus asseclas."
 legend_chapter_conclusion_priesthood_restored: "Os sacerdotes se reuniram e a diáspora chegou ao fim. Nunca mais os [ROOT.Legend.GetProperty( 'faith' ).Faith.GetAdherentNamePluralNoTooltip] ficarão abandonados à própria sorte sem liderança, pois [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] anuncia um[ROOT.Legend.GetProtagonist.Custom('ES_XA')] nov[ROOT.Legend.GetProtagonist.Custom('ES_OA')] [ROOT.Legend.GetProperty( 'faith' ).Faith.ReligiousHeadName|l]."
 legend_chronicle_opening_exotic_backstory: "[ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip|U] viajou da distante terra mística de [ROOT.Legend.GetProperty( 'location' ).GetFlagName] com uma missão. [ROOT.Legend.GetProtagonist.GetSheHe|U] era [Select_CString( ROOT.Legend.GetProtagonist.IsFemale, 'uma heroína', 'um herói' )] entre os seus, mas agora se oferece para conceder sua benevolência ao nosso pequeno recanto deste vasto e interminável mundo."
 legend_chronicle_motivation_exotic_backstory: "[ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip|U] contemplou seu novo lar e chorou, pois suas tecnologias e sua cultura eram tão primitivas em comparação com as maravilhas às quais se havia acostumado em [ROOT.Legend.GetProperty( 'location' ).GetFlagName]. Sua tarefa estava clara: [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] devia espalhar a iluminação de sua terra natal a este canto da criação."
 legend_chronicle_conclusion_exotic_backstory: "Muita coisa havia mudado desde que [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] chegara. Onde antes os camponeses se arrastavam na miséria e os bárbaros esgotavam a terra, [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] espalhou a luz da civilização. Embora houvesse muitas pedras em seu caminho, ele as recolheu todas como meios para construir uma nova [ROOT.Legend.GetProperty( 'location' ).GetFlagName]. Por todo o reino, bebês são nomeados em homenagem a [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] e as massas cantam em coro agradecido pelo estrangeiro de [ROOT.Legend.GetProperty( 'location' ).GetFlagName] que construiu sua grande cidade."
 legend_chronicle_divine_intervention_motivation: "[Localize( god )|U] falou com [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] no plano dos sonhos e lhe confiou uma missão sagrada. Desde então, [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip|U] tem orado e buscado pelas terras por um sinal da verdadeira natureza desta incumbência de [ROOT.Legend.GetProtagonist.GetFaith.PantheonTerm]."
 legend_chapter_famous_deed_divine_intervention: "[ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip|U] se dedicou a [Localize( god )] e agiu inteiramente segundo a vontade de [ROOT.Legend.GetProtagonist.GetFaith.PantheonTerm]. Após muitos dias e muitas noites isolad[ROOT.Legend.GetProtagonist.Custom('ES_OA')] em oração, finalmente foi revelada a verdadeira natureza de sua missão!"
 legend_chapter_extra_deed_divine_intervention: "As terras estavam repletas de bandidos implacáveis que queriam prejudicar os fiéis, mas com [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] e sua turma de seguidores, esses servos de [ROOT.Legend.GetProtagonist.GetFaith.DevilName|U] foram expulsados de volta para [ROOT.Legend.GetProtagonist.GetFaith.NegativeAfterLife|U], onde pertencem, e o povo ficou livre. [Localize( god )|U] sorriu para [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] pela bondade que havia feito, e sua missão sagrada chegou quase ao auge."
 legend_chapter_conclusion_divine_intervention: "[ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip|U] governou de forma justa e piedosa, com [Localize( god )] como seu guia. O plano divino foi cumprido, e [ROOT.Legend.GetProtagonist.GetSheHe] viveu uma vida de grande honra e piedade."
 legend_chapter_opening_ancestral_glory: "[ROOT.Legend.GetProtagonist.GetNameNoTooltip|U] nasceu da própria carne e sangue de [ROOT.Legend.Custom('GetAncestorNameNoTooltip')]. Com o poder natural desta grande linhagem, havia alguma dúvida de que [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] alcançaria grandes feitos?"
 legend_chapter_motivation_ancestral_glory: "Não havia dúvidas em sua mente; [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] unificaria tudo [ROOT.Legend.GetProperty('title' ).Title.GetBaseNameNoTooltip] sob seu domínio. Em nome de [ROOT.Legend.Custom('GetAncestorFirstNameNoTooltip')], as disputas entre senhores e damas menores estavam prestes a chegar ao fim, e todos reconheceriam [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] como seu soberan[ROOT.Legend.GetProtagonist.Custom('ES_OA')]."
 legend_chapter_famous_deed_ancestral_glory: "Os tolos se ajuntavam para desafiar a [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip], mas eram como o vento diante da montanha. Os seguidores de [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip|U] cresciam a cada feito maravilhoso que est[ROOT.Legend.GetProtagonist.Custom('ES_EA')] realizava em nome de [ROOT.Legend.GetProtagonist.GetFaith.PantheonTerm] e se tornou o próprio reflexo de [ROOT.Legend.Custom('GetAncestorFirstNameNoTooltip')]."
 legend_chapter_extra_deed_ancestral_glory: "O belo campo de [ROOT.Legend.GetProperty( 'title' ).Title.GetBaseNameNoTooltip] havia caído em mãos de bandidos e salteadores desde a época de [ROOT.Legend.Custom('GetAncestorFirstNameNoTooltip')], mas [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] logo se pôs a corrigir os erros e proteger as pessoas que ele tinha direito a governar."
 legend_chapter_conclusion_ancestral_glory: "A jornada foi repleta de perigos, mas com tudo o que [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] havia feito por [ROOT.Legend.GetProperty( 'title' ).Title.GetBaseNameNoTooltip] e seu povo, havia alguma dúvida de que [ROOT.Legend.GetProtagonist.GetSheHe] havia sido escolhid[ROOT.Legend.GetProtagonist.Custom('ES_OA')] por [ROOT.Legend.GetProtagonist.GetFaith.PantheonTerm|U] para governar? Da cidade à mais humilde morada, todos clamam o nome de \"[ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip]\" em júbilo extasiante!"
 legend_chapter_opening_ancient_people: "[ROOT.Legend.GetProtagonist.GetNameNoTooltip|U] nasceu de uma grande linhagem da [ROOT.Legend.GetProperty( 'culture' ).Culture.GetNameNoTooltip] para governar [ROOT.Legend.GetProperty( 'title' ).Title.GetBaseNameNoTooltip] como fariam seus antepassados."
 legend_chapter_conclusion_ancient_people: "Com tremendo trabalho, [ROOT.Legend.GetProtagonist.GetNameNoTooltip] trabalhou incansavelmente para transformar [ROOT.Legend.GetProperty( 'title' ).Title.GetNameNoTooltip] em uma visão da perfeição da [ROOT.Legend.GetProperty( 'culture' ).Culture.GetNameNoTooltip]. Graças apenas aos feitos lendários de [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip], o povo de [ROOT.Legend.GetProperty( 'title' ).Title.GetNameNoTooltip] clama com orgulho por suas raízes na [ROOT.Legend.GetProperty( 'culture' ).Culture.GetNameNoTooltip]!"
 legend_chapter_motivation_saintly_deed: "A missão de [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] encomendada por [ROOT.Legend.GetProtagonist.GetFaith.PantheonTerm] estava clara: [ROOT.Legend.GetProtagonist.GetSheHe] tinha que fazer maravilhas! Todos os [ROOT.Legend.GetProperty('religion').Religion.GetAdherentNamePluralNoTooltip] têm [ROOT.Legend.Custom('GetAncestorNameNoTooltip')] em seus corações, mas ninguém sabia os milagres que [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] ainda tinha de realizar!"
 legend_chapter_extra_deed_saintly_deed: "Os caminhos dos fiéis eram atacados pelos ímpios, e com uma lâmina abençoada pelo todo-poderoso, [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] os afastou a todos. Porém feras selvagens e serpentes ainda vagavam pelo caminho e faziam mal aos fiéis, então [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] pegou seu [ROOT.Legend.GetProtagonist.Custom('GetMusicalInstrument')] e encantou as criações de [ROOT.Legend.GetProtagonist.GetFaith.CreatorNamePossessive] para fora das terras."
 legend_chapter_conclusion_saintly_deed: "[ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip|U] havia trabalhado incansavelmente por toda a [ROOT.Legend.GetProperty('religion').Religion.GetNameNoTooltip|l] e combatido contra os sequazes de [ROOT.Legend.GetProtagonist.GetFaith.DevilName] aqui na Terra, mas, finalmente, suas lutas chegaram ao fim. Cumprido o plano divino, [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] viveu uma vida de grande honra e piedade."
 legend_chapter_opening_mythical_descent: "Como todos os membros da família [ROOT.Legend.GetProtagonist.GetDynastyNameNoTooltip] antes de [ROOT.Legend.GetProtagonist.GetSheHe], [ROOT.Legend.GetProtagonist.GetNameNoTooltip] nasceu com sangue de [ROOT.Legend.GetProperty( 'beast' ).GetFlagName]. Suas origens extraordinárias [ROOT.Legend.GetProtagonist.GetHerHim] o(a) colocam acima de todos os outros, destinad[ROOT.Legend.GetProtagonist.Custom('ES_OA')](a) à grandeza."
 legend_chapter_famous_deed_mythical_descent: "[ROOT.Legend.GetProtagonist.GetNameNoTooltip|U] foi ferido em uma grande batalha com algum vilão que duvidava de sua linhagem, seu sangue divino espalhou-se por um campo. O sangue brilhava e cintilava como gemas recém-cortadas, e em poucos dias, o solo inóspito floresceu com flores de cores magníficas."
 legend_chapter_extra_deed_mythical_descent: "Mas este não foi o fim da história, pois muitos ainda duvidariam da divindade presente em sua sangue. Usando seus grandes poderes, [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] atormentou aqueles que duvidavam de [ROOT.Legend.GetProtagonist.GetSheHe] com uma grande praga de feras, e seus palácios e lares se encheram de latidos e gritos ferozes."
 legend_chapter_opening_godly_descent: "[ROOT.Legend.GetProperty( 'god' ).GetFlagName|U] fecundou o ancestral de [ROOT.Legend.GetProtagonist.GetNameNoTooltip] e deu à luz o primeiro [ROOT.Legend.GetProtagonist.GetDynastyNameNoTooltip] do ventre do mundo. Desde o nascimento, a todos os membros da família [ROOT.Legend.GetProtagonist.GetDynastyNameNoTooltip] foi confiada a missão divina de levar a prosperidade e a [ROOT.Legend.GetProtagonist.GetFaith.GetNameNoTooltip|l] a todos os cantos de [ROOT.Legend.GetProperty( 'title' ).Title.GetBaseNameNoTooltip]."
 legend_chapter_famous_deed_war_won: "Travaram-se batalha após batalha, e a guerra tingiu a terra de escarlate com o sangue de justos e vilões em igual medida. [ROOT.Legend.GetProperty( 'winner' ).Char.GetNameNoTooltip|U] permaneceu inabalável enquanto as forças do mal tentavam superar sua magistral estratégia militar. No final, os esforços deles acabaram sendo infrutíferos."
 legend_chapter_conclusion_war_won: "[ROOT.Legend.GetProperty( 'loser' ).Char.GetNameNoTooltip|U] e seus asseclas baixaram a cabeça sob seu estandarte quebrado e suplicaram a clemência de [ROOT.Legend.GetProperty( 'winner' ).Char.GetFirstNameNoTooltip]. Nos dias mais sombrios da guerra, [ROOT.Legend.GetProperty( 'winner' ).Char.GetSheHe] só conseguia se imaginar como alguém que sobreviveria à guerra, mas emerge como o vencedor[ROOT.Legend.GetProperty( 'winner' ).Char.Custom('ES_XA')]. [ROOT.Legend.GetProperty( 'winner' ).Char.Custom('ES_ElLa')|U] únic[ROOT.Legend.GetProperty( 'winner' ).Char.Custom('ES_OA')] vencedor[ROOT.Legend.GetProperty( 'winner' ).Char.Custom('ES_XA')]."
 legend_chapter_motivation_new_title: "Muito antes de que a família [ROOT.Legend.GetProperty( 'founder' ).Char.GetDynastyNameNoTooltip] passasse a servir como Tesoureiros de [ROOT.Legend.GetProperty( 'title' ).Title.GetBaseNameNoTooltip], [ROOT.Legend.GetProperty( 'founder' ).Char.GetNameNoTooltip] recebeu uma visão de [ROOT.Legend.GetProperty( 'founder' ).Char.GetFaith.PantheonTerm]. A partir daquele momento, [ROOT.Legend.GetProperty( 'founder' ).Char.GetFirstNameNoTooltip] soube que seu destino era governar."
 legend_chapter_famous_deed_new_title: "As terras que chegariam a compor [ROOT.Legend.GetProperty( 'title' ).Title.GetBaseNameNoTooltip] sofriam sob o jugo dos terríveis servos de [ROOT.Legend.GetProperty( 'founder' ).Char.GetFaith.DevilName]. Mas [ROOT.Legend.GetProperty( 'founder' ).Char.GetNameNoTooltip] foi libertando vila após vila, cidade após cidade, com seus grandes exércitos. O povo se levantou em armas e derrubou seus governantes malignos para servir a [ROOT.Legend.GetProperty( 'founder' ).Char.GetFirstNameNoTooltip], disposto a morrer por seu legítimo governante. [ROOT.Legend.GetProperty( 'founder' ).Char.GetFaith.HighGodName] os privou de seu sacrifício ao conceder-lhes SUA proteção divina. Nenhuma espada podia ferir os exércitos cada vez maiores de [ROOT.Legend.GetProperty( 'founder' ).Char.GetFirstNameNoTooltip] enquanto continuava libertando o povo de [ROOT.Legend.GetProperty( 'title' ).Title.GetBaseNameNoTooltip]."
 legend_chapter_conclusion_new_title: "As disputas entre duques e pequenos nobres sem nome chegaram finalmente ao fim quando [ROOT.Legend.GetProperty( 'founder' ).Char.GetNameNoTooltip] os obrigou a jurar lealdade a perpetuidade. Quando [ROOT.Legend.GetProperty( 'title' ).Title.GetBaseNameNoTooltip] renasceu, a forma do mundo mudou para sempre."
 legend_chronicle_sacred_birth_opening: "Desde o dia em que [ROOT.Legend.GetProtagonist.GetSheHe] nasceu, ficou claro que [ROOT.Legend.GetProtagonist.GetFaith.PantheonTerm] tinha planos maiores para [ROOT.Legend.GetProtagonist.GetNameNoTooltip]. [ROOT.Legend.Custom('GetBirthCircumstancesLegend')|U], sua grandeza estava predestinada."
 born_to_a_virgin_mother: "nascido de uma mãe virgem"
 born_under_auspicious_stars: "nascido sob estrelas auspiciosas"
 legend_chapter_motivation_sacred_birth: "[ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip|U] passou muitas noites em claro atormentad[ROOT.Legend.GetProtagonist.Custom('ES_OA')] por visões de seu próprio nascimento, até que, numa noite fatídica, [ROOT.Legend.GetProtagonist.GetFaith.HighGodName|U] se apresentou diante de [ROOT.Legend.GetProtagonist.GetSheHe]. [ROOT.Legend.GetProtagonist.GetFaith.HighGodName|U] declarou que [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] havia sido colocado na Terra com um propósito divino, um que superava o chamado típico de um[ROOT.Legend.GetProtagonist.Custom('ES_XA')] [ROOT.Legend.GetProtagonist.GetWomanMan] comum. Desde aquele dia, [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] soube que as circunstâncias de seu nascimento não eram nem rumor nem coincidência, mas uma intervenção direta de [ROOT.Legend.GetProtagonist.GetFaith.PantheonTerm]!"
 legend_chapter_conclusion_sacred_birth: "Com todas as grandes façanhas que [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] havia realizado em nome de [ROOT.Legend.GetProtagonist.GetFaith.PantheonTerm], recebeu outra visita, embora desta vez não tenha sido um mero sonho ou visão. [ROOT.Legend.GetProtagonist.GetFaith.HighGodName|U] se manifestou em forma física e ofereceu a [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] um copo de água para beber, concedendo-lhe um toque de divindade. As massas aclamaram o nome de [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip|U], suplicando apenas o toque de suas divinas mãos curadoras."
 legend_chronicle_unsuspecting_opening: "[ROOT.Legend.GetProtagonist.GetNameNoTooltip|U] nasceu como um[ROOT.Legend.GetProtagonist.Custom('ES_XA')] [ROOT.Legend.GetProtagonist.GetWomanMan] qualquer, sem imaginar a grandeza que alcançaria em nome de [ROOT.Legend.GetProtagonist.GetFaith.PantheonTerm]."
 legend_chapter_motivation_fought_devil: "Devastado[ROOT.Legend.GetProtagonist.Custom('ES_OA')] por pesadelos, [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] era assombrado por visões de [ROOT.Legend.GetProperty( 'faith' ).Faith.DevilName], que sibilava e o atormentava. E todos os dias [ROOT.Legend.GetProtagonist.GetSheHe] despertava de seu sono com um novo propósito e a sensação de que [ROOT.Legend.GetProtagonist.GetFaith.PantheonTerm] tinha um plano para [ROOT.Legend.GetProtagonist.GetSheHe]."
 legend_chapter_famous_deed_fought_devil: "Numa noite, [ROOT.Legend.GetProperty( 'faith' ).Faith.DevilName|U] visitou [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] com toda sorte de chicotes e cruéis engenhos de tortura espalhados pelas paredes manchadas de sangue. Desnud[ROOT.Legend.GetProtagonist.Custom('ES_OA')] e inabalável, [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] lutou contra [ROOT.Legend.GetProperty( 'faith' ).Faith.DevilName|U] com a força e a convicção de [ROOT.Legend.GetProperty( 'faith' ).Faith.HighGodName|U] pulsando por todo o seu ser. Com [ROOT.Legend.GetProperty( 'faith' ).Faith.DevilName|U] impotente e imobilizado sob [ROOT.Legend.GetProtagonist.Custom('ES_XA')] simples [ROOT.Legend.GetProtagonist.GetWomanMan]!"
 legend_chapter_extra_deed_fought_devil: "Insatisfeito e tomado de ódio por tudo o que é bom e justo, [ROOT.Legend.GetProperty( 'faith' ).Faith.DevilName|U] desafiou [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] para uma competição de [ROOT.Legend.GetProtagonist.Custom('GetMusicalInstrument')]. A melodia que [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] interpretou fez com que [ROOT.Legend.GetProperty( 'faith' ).Faith.DevilName|U] se desfizesse em [ROOT.Legend.GetProperty( 'faith' ).Faith.NegativeAfterLife|U]. A melodia se esvaiu da mente de [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] como fumaça, sem dúvida divina demais para o mundo dos homens."
 legend_chapter_conclusion_fought_devil: "Com a derrota de [ROOT.Legend.GetProperty( 'faith' ).Faith.DevilName|U], [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] se dedicou a aniquilar as forças do mal no mundo dos mortais. Levou consigo um brilho sagrado ao longo de seus dias e deixou paz e civilização em seu rastro."
 legend_chapter_famous_deed_tournament_won: "Mentes e vozes se enfrentaram em igual medida às espadas em um grande espetáculo das artes marciais, mas não havia mente mais astuta nem espada mais afiada do que a de [ROOT.Legend.GetProtagonist.GetNameNoTooltip]! Um após outro, os competidores se alinharam apenas para acabar em lágrimas diante de [ROOT.Legend.GetProtagonist.Custom('ES_ElLa')] intocável [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip]."
 legend_chapter_extra_deed_tournament_won: "Ninguém conseguia deixar de lembrar a glória do primeiro torneio de [ROOT.Legend.GetProtagonist.GetNameNoTooltip], mas uma única vitória não foi suficiente para [ROOT.Legend.GetProtagonist.GetHerHim]. Os outros competidores cercaram [ROOT.Legend.GetProtagonist.GetHerHim] em uma tempestade de lâminas, mas [ROOT.Legend.GetProtagonist.GetSheHe] permaneceu inabalável. [ROOT.Legend.GetProtagonist.GetSheHe|U] saiu vitorios[ROOT.Legend.GetProtagonist.Custom('ES_OA')] diante de uma multidão que gritava seu nome!"
 legend_chronicle_opening_raised_by_animals: "Sem comida ou esperança de resgate, [ROOT.Legend.GetProtagonist.GetNameNoTooltip] jazia perdid[ROOT.Legend.GetProtagonist.Custom('ES_OA')] como um bebê às margens de um rio até que uma poderosa mãe [ROOT.Legend.GetProperty( 'beast' ).GetFlagName] encontrou [ROOT.Legend.GetProtagonist.GetHerHim]. Ela alimentou [ROOT.Legend.GetProtagonist.GetHerHim] em seu seio, fazendo o bebê crescer e se tornar um[ROOT.Legend.GetProtagonist.Custom('ES_XA')] [ROOT.Legend.GetProtagonist.GetWomanMan] hercúle[ROOT.Legend.GetProtagonist.Custom('ES_OA')], com toda a força e coragem de [ROOT.Legend.GetProperty( 'beast' ).GetFlagName]."
 legend_chapter_motivation_raised_by_animals: "Retornando à humanidade, [ROOT.Legend.GetProtagonist.GetFirstName] descobriu como o caos havia assolado a terra. Vizinho se lançava contra vizinho como um [ROOT.Legend.GetProperty( 'beast' ).GetFlagName] em sua presa, e [ROOT.Legend.GetProtagonist.GetFirstName] sabia que seu povo precisava de um líder forte para unir a matilha por trás de sua causa compartilhada."
 legend_chapter_conclusion_raised_by_animals: "[ROOT.Legend.GetProtagonist.GetFirstName|U] governou como o melhor exemplar de [ROOT.Legend.GetProperty( 'beast' ).GetFlagName], com força e orgulho. Embora nunca tenha voltado a ver sua mãe [ROOT.Legend.GetProperty( 'beast' ).GetFlagName], nunca duvidou de que este mensageiro animal de [ROOT.Legend.GetProtagonist.GetFaith.PantheonTerm] contemplaria seu reinado com grande orgulho. As terras permaneceram tranquilas e pacíficas, sem que nenhum de seus inimigos ousasse sair da linha, com medo de enfrentar a fúria de semelhante [ROOT.Legend.GetProperty( 'beast' ).GetFlagName]."
 legend_chapter_extra_deed_recent_battle: "Durante seu retorno para casa, [ROOT.Legend.GetProtagonist.Custom('ES_ElLa')] [ROOT.Legend.GetProtagonist.GetTitledFirstNameNoTooltip|l] lutou bravamente contra seus inimigos, liderando com coragem incomparável e brilhantismo estratégico. Com sua espada erguida bem alto e sua determinação inabalável, inspirou a vitória contra seus inimigos."
 legend_chapter_extra_deed_recent_siege: "Durante seu retorno ao lar, [ROOT.Legend.GetProtagonist.Custom('ES_ElLa')] [ROOT.Legend.GetProtagonist.GetTitledFirstNameNoTooltip|l] liderou o cerco a uma fortaleza inimiga com determinação inabalável e destroçou a cidade como se fosse o mais fino cristal. Com suas forças reunidas e seus estandartes desfraldados, [ROOT.Legend.GetProtagonist.GetSheHe] lançou uma carga implacável que abriu uma brecha nas defesas e conquistou a vitória."
 legend_chapter_extra_deed_recent_imprisonment: "Nas profundezas da masmorra mais sombria, sem comida nem água, acorrentad[ROOT.Legend.GetProtagonist.Custom('ES_OA')] e rodead[ROOT.Legend.GetProtagonist.Custom('ES_OA')] de sombras, [ROOT.Legend.GetProtagonist.Custom('ES_ElLa')] [ROOT.Legend.GetProtagonist.GetTitledFirstNameNoTooltip|l] encontrou a determinação necessária para escapar. Rangendo os dentes e com um coração inflamado de rebeldia, planejou sua fuga noite após noite. Por meio de uma astuta manipulação e pura força de vontade, seguiu passagens secretas até sair à luz do dia."
 legend_chapter_extra_deed_recent_tournament: "Durante seu retorno ao lar, [ROOT.Legend.GetProtagonist.Custom('ES_ElLa')] [ROOT.Legend.GetProtagonist.GetTitledFirstNameNoTooltip|l] se viu cativad[ROOT.Legend.GetProtagonist.Custom('ES_OA')] pelo esplendor do glorioso recinto do torneio. Espada em punho e com a armadura reluzindo sob o olhar do sol, [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] enfrentou oponentes formidáveis com determinação inabalável. A plateia aclamou, e belas damas e pajens impressionáveis se atiraram a seus pés! [Select_CString(ROOT.Legend.GetProtagonist.IsFemale, 'A vencedora', 'O vencedor' )]! [Select_CString(ROOT.Legend.GetProtagonist.IsFemale, 'A melhor guerreira', 'O melhor cavaleiro' )]!"
 legend_chapter_famous_deed_saintly_deed: "Entre sussurros de dúvida e sombras de incredulidade por parte do populacho, [ROOT.Legend.GetProtagonist.Custom('ES_ElLa')] [ROOT.Legend.GetProtagonist.GetTitledFirstNameNoTooltip|l] se manteve inabalável em sua fé. Tudo parecia perdido, o sangue tingia o campo de batalha e havia lanças fincadas no chão, cravadas ali por seus portadores. Mas [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] se ajoelhou e sua boca se encheu de orações; então, flores brotaram das lanças. Os inimigos caíram prostrados por haver contemplado um milagre."
 legend_chapter_famous_deed_holy_warrior: "Sempre um[ROOT.Legend.GetProtagonist.Custom('ES_XA')] firme defensor[ROOT.Legend.GetProtagonist.Custom('ES_XA')] da fé, [ROOT.Legend.GetProtagonist.Custom('ES_ElLa')] [ROOT.Legend.GetProtagonist.GetTitledFirstNameNoTooltip|l] demonstrou ser um[ROOT.Legend.GetProtagonist.Custom('ES_XA')] [Select_CString(ROOT.Legend.GetProtagonist.IsFemale, 'auténtica heroína', 'auténtico héroe' )] na guerra santa contra os inimigos de [ROOT.Legend.GetProtagonist.GetFaith.HighGodName]. [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] viajou para terras estrangeiras, decidid[ROOT.Legend.GetProtagonist.Custom('ES_OA')] a restaurar a paz e a prosperidade que os falsos deuses haviam arrancado de seu povo inconsciente. Gravou o símbolo de [ROOT.Legend.GetProtagonist.GetFaith.GetNameNoTooltip|l] no antebraço, derramando sangue sobre os cadáveres dos infiéis."
 legend_chapter_opening_legendary_battle: "Nas crônicas da antiguidade, resplandece a saga de uma batalha tão gloriosa que ecoa por toda a eternidade, uma em que [ROOT.Legend.GetProtagonist.Custom('ES_ElLa')] [ROOT.Legend.GetProtagonist.GetTitledFirstNameNoTooltip|l] se ergueu como um titã em meio à tormenta da guerra."
 legend_chapter_famous_deed_raised_by_animals: "A cada dia que passava, [ROOT.Legend.GetProtagonist.Custom('ES_ElLa')] [ROOT.Legend.GetProtagonist.GetTitledFirstNameNoTooltip|l] crescia em força e sabedoria, sem que a barbárie da civilização [ROOT.Legend.GetProtagonist.GetHerHim] reivindicasse. Como os fundadores de Roma, [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] abraçou o mundo que lhe deu vida e ensinou aos habitantes das casas a maestria da caça, abatendo um exemplar de [ROOT.Legend.GetProtagonist.Custom('RegionalFerociousAnimal')] de pelagem branca."
 legend_chapter_conclusion_dead_loved_spouse: "Quando [ROOT.Legend.GetProtagonist.Custom('ES_ElLa')] [ROOT.Legend.GetProtagonist.GetTitledFirstNameNoTooltip|l] retornou ao lar, seu coração parecia uma pequena pomba prestes a saltar do peito. Chei[ROOT.Legend.GetProtagonist.Custom('ES_OA')] de emoção, mal podia esperar para se reunir com seu amor verdadeiro. Um grito terrível, e a dor encheu os salões do castelo, pois os lábios pálidos de seu cônjuge já não tinham vida alguma. No silêncio de sua solidão, as lembranças de um amor que inflamou seu coração encheram [ROOT.Legend.GetProtagonist.GetHerHim] de uma dor horrível. De que valia sua lenda se não havia ninguém com quem compartilhá-la?"
 legend_chapter_conclusion_point_of_interest: "Nas vastas viagens [ROOT.Legend.GetProtagonist.Custom('ES_DelDela')] [ROOT.Legend.GetProtagonist.GetTitledFirstNameNoTooltip|l], ele se deparou com uma maravilha impressionante que desafiava os limites terrenos; um lugar onde a beleza da natureza se entrelaçava perfeitamente com a engenhosidade humana. Agulhas altíssimas de requintado trabalho alcançavam os céus, suas formas graciosas banhadas pelo suave brilho da primeira luz da alvorada. [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] respirou fundo, pois não poderia ter desejado um final melhor."
 legend_chapter_motivation_child_mother: "Nos tranquilos corredores do castelo, onde as sombras dançam sobre os muros de pedra e os rumores de histórias antigas permanecem no ar, [ROOT.Legend.GetProtagonist.Custom('ES_ElLa')] [ROOT.Legend.GetProtagonist.GetTitledFirstNameNoTooltip|l] embalava seu filho recém-nascido em um abraço terno. Ao fitar os olhos inocentes do bebê, seu coração se inflamou de determinação. Que legado deixaria? Queria ser lembrado como um[ROOT.Legend.GetProtagonist.Custom('ES_LeLa')] lembrado como um[ROOT.Legend.GetProtagonist.Custom('ES_XA')] covarde que se abriga entre sedas e flores?"
 legend_chapter_motivation_child_father: "Nas câmaras solenes de seu lar ancestral, onde o tremeluzir das velas projetava sombras sobre as antigas tapeçarias, [ROOT.Legend.GetProtagonist.Custom('ES_ElLa')] [ROOT.Legend.GetProtagonist.GetTitledFirstNameNoTooltip|l] contemplava com admiração o milagre da vida que lhe fora concedido. Com aquela criança, nasceu uma determinação de proteger seu legado."
 legend_chapter_opening_witch: "O interesse [ROOT.Legend.GetProtagonist.Custom('ES_DelDela')] [ROOT.Legend.GetProtagonist.GetTitledFirstNameNoTooltip|l] pelas artes ocultas sempre havia despertado suspeitas. Acusações de bruxaria e feitiçaria se arremolinavam em torno de [ROOT.Legend.GetProtagonist.GetSheHe], lançando uma sombra sombria sobre seu ilustre nome. E, enquanto seus súditos leais seguiam cada movimento seu, [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] sentia o peso da desconfiança pressionando[ROOT.Legend.GetProtagonist.GetHerHim]."
 legend_chapter_motivation_celibacy: "Outrora enfeitado[ROOT.Legend.GetProtagonist.Custom('ES_OA')] com vestes régias, [ROOT.Legend.GetProtagonist.Custom('ES_ElLa')] [ROOT.Legend.GetProtagonist.GetTitledFirstNameNoTooltip|l] ergueu-se trajado[ROOT.Legend.GetProtagonist.Custom('ES_OA')] com as humildes vestes de um [ROOT.Legend.GetProtagonist.GetFaith.PriestNeuter], despojado[ROOT.Legend.GetProtagonist.Custom('ES_OA')] de sua coroa. Mas [ROOT.Legend.GetProtagonist.Custom('ES_ElLa')] [ROOT.Legend.GetProtagonist.GetTitledFirstNameNoTooltip|l] jamais esqueceu [ROOT.Legend.GetProtagonist.GetFaith.HighGodName] porque sua devoção ardia ainda mais forte, eterna. Impulsionad[ROOT.Legend.GetProtagonist.Custom('ES_OA')] pela inspiração divina que pulsava dentro de [ROOT.Legend.GetProtagonist.GetSheHe] , [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] decidiu traçar um caminho que imortalizaria seu nome para sempre."
 legend_chapter_opening_new_culture: "[ROOT.Legend.GetProtagonist.Custom('ES_ElLa')|U] [ROOT.Legend.GetProtagonist.GetTitledFirstNameNoTooltip] nasceu quando as tradições de outrora se tornaram obsoletas. Com uma visão em sua mente, decidiu forjar suas próprias tradições; assim, criou a cultura [ROOT.Legend.GetProtagonist.GetCulture.GetNameNoTooltip]."
 legend_chapter_opening_new_faith_generic: "[ROOT.Legend.GetProtagonist.GetNameNoTooltip|U] nasceu quando a religião havia caído longe da vontade de [ROOT.Legend.GetProtagonist.GetFaith.GetNameNoTooltip|l]. Pregadores pregavam heresia em nome de [ROOT.Legend.GetProtagonist.GetFaith.HighGodNamePossessive] enquanto a fé se deteriorava e era abandonada. As pessoas voltavam-se para outras religiões, abrindo caminho para que os rivais de [ROOT.Legend.GetProtagonist.GetFaith.HighGodNamePossessive] conquistassem os corações dos homens."
 legend_chapter_winner_change_toast: "[winner.GetPromotedLegend.GetName] muda"
 legend_chapter_change_toast: "[ROOT.Char.GetPromotedLegend.GetName] muda"
 legend_chapter_change_culture_toast: "[founder.GetPromotedLegend.GetName] muda"
 spread_legend_intent: "Espalhar Lenda"
 spread_legend_intent_desc: "Você usará esta atividade como uma oportunidade para divulgar sua [legend|lE]."
 spread_legend_intent_not_valid_desc: "#X Você não possui atualmente uma [legend|lE]"
 legend_chronicle_war_won_chronicle: "Conquista de [title.GetNameNoTooltip]"
 legend_chronicle_war_won_chronicle_desc: "[winner.Custom('ES_ElLa')|U] [winner.GetTitledFirstName|l] conquistou legitimamente [title.GetName] [Select_CString( loser.IsFemale, 'a la indigna', 'al indigno' )] [loser.GetFirstName]."
 legend_chronicle_new_title: "Fundação de [title.GetNameNoTooltip]"
 legend_chronicle_new_title_desc: "Pela vontade, força e astúcia de [founder.GetName], [title.GetName] veio à existência e jamais vacilará!"
 legend_chronicle_great_deed_faith: "O Triunfo Espiritual de [new_faith.GetNameNoTooltip|l]"
 legend_chronicle_great_deed_faith_desc: "Guiado[founder.Custom('ES_OA')] por sua fé em [new_faith.HighGodName], [founder.GetName] conduziu os [new_faith.GetAdherentNamePlural] fiéis à vitória sobre o [old_faith.GetAdherentName|l], liderado por [antagonist.Custom('ES_ElLa')] vil [antagonist.GetName]"
 legend_chronicle_great_deed_title: "Grande Deed para [title.GetNameNoTooltip]"
 legend_chronicle_great_deed_title_desc: "Em toda a história, entre todos os governantes de [title.GetName], ninguém realizou tanto, nem se falará de ninguém antes do grande [founder.Custom('ES_DelDela')] [founder.GetName]."
 legend_chronicle_great_deed_region: "O autêntico herói de [legend_region.GetNameNoTooltip]"
 legend_chronicle_great_deed_region_desc: "Não há alma em [legend_region.GetName] que não conheça o nome de [founder.GetName] e suas realizações."
 legend_chronicle_great_deed_dynasty: "Um Grande Esforço para [dynasty.GetNameNoTooltip]"
 legend_chronicle_great_deed_dynasty_desc: "Poucos que carregam o nome de [dynasty.GetName] fizeram tanto por sua dinastia quanto [founder.GetName]."
 legend_chronicle_valiant_defense: "Uma Defesa Valente"
 legend_chronicle_valiant_defense_desc: "Contra todas as probabilidades, [defender.GetName] repeliu as hordas de [attacker.GetName]."
 legend_chronicle_tournament_won: "Três Vitórias de [winner.GetFirstNameNoTooltip]"
 legend_chronicle_tournament_won_desc: "Nos campos de justa de [location.GetName], [winner.GetName], [winner.Custom('ES_ElLa')] contendor definitiv[winner.Custom('ES_OA')] venceu o torneio pela terceira vez. Nenhuma alma viva na Terra poderia rivalizar com [winner.GetSheHe]."
 legend_chronicle_accolade_chronicle: "O mais valente entre os [founder.Custom( 'KnightCulturePluralNoTooltipLowercase' )]"
 legend_chronicle_accolade_chronicle_desc: "[founder.GetName|U] tinha uma grande quantidade de magníficos [founder.Custom( 'KnightCulturePluralNoTooltipLowercase' )], mas ninguém[first_accolade_knight.Custom('ES_OA')] melhor do que [first_accolade_knight.GetName] de [first_accolade.GetName]."
