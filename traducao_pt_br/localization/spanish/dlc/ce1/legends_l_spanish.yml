 legend_chronicle_conqueror_chronicle_desc: "Já não é mais um[ROOT.Char.Custom('ES_XA')] andarilho. Um[ROOT.Char.Custom('ES_XA')] conquistador[ROOT.Char.Custom('ES_XA')] nasceu de uma alma indomável."
 legend_chapter_opening_conqueror: "Nada voltará a surgir das cinzas. [ROOT.Legend.GetProtagonist.Custom('ES_ElLa')|U] [ROOT.Legend.GetProtagonist.GetTitledFirstNameNoTooltip|l] jurou tornar-se o flagelo de [ROOT.Legend.GetProtagonist.GetFaith.HighGodName] e erguer-se sobre um solo escarlate. E, de agora em diante, o único escarlate será a terra."
 legend_chapter_famous_deed_conqueror: "Batalha após batalha, o cântico ficava mais alto. Batalha após batalha, o saque ficava maior. Batalha após batalha, a lenda de [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] brilhava cada vez mais."
