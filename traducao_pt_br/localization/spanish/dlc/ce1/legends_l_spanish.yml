 #Legend seed tooltips
 no_pagans_in_britannia_tt: "Não deve haver [rulers|lE] [Concept( 'independent', 'independentes' )|E] [GetReligionFamily('rf_pagan').GetName|l]s em [GetGeographicalRegion('world_europe_west_britannia').GetName]"
 must_own_france_or_hre_tt: "Você deve possuir pessoalmente [GetTitleByKey('k_france').GetNameNoTier], [GetTitleByKey('e_france').GetNameNoTier], ou [GetTitleByKey('e_hre').GetNameNoTier]"
 must_own_georgia_or_be_georgian_tt: "Você deve ou possuir [GetTitleByKey('k_georgia').GetNameNoTier], ter sua capital em [GetTitleByKey('k_georgia').GetNameNoTier], ou ser da cultura Georgiana"
 persian_or_zoroastrian_tt: "Sua capital deve estar em [GetGeographicalRegion('world_middle_east_persia').GetName], sua [culture|lE] deve ter $heritage_iranian_name$, ou você deve ser [GetReligionByKey('zoroastrianism_religion').GetAdjective]"
