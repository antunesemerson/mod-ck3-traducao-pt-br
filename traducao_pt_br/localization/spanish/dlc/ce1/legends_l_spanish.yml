 game_concept_legend: "Lenda"
 game_concept_legend_i: "@legend_icon!"
 game_concept_legend_desc: "Uma $game_concept_legend$ representa os feitos importantes que um personagem realizou em vida e é criada a partir de [legend_seeds|lE].\n\nAs lendas são uma ótima forma de obter [legitimacy|lE] e outras possíveis recompensas, como aumentos de [skill|lE], bônus de [opinion|lE], [dynasty_prestige|lE], [prestige|lE] ou [piety|lE]. As [baronies|lE] nas quais uma $game_concept_legend$ se espalhou também podem receber efeitos adicionais se estiverem em posse do dono da $game_concept_legend$ ou de um [legend_promoter|E].\n\nAs $game_concept_legends$ têm um [legend_type|lE] que rege essas recompensas: podem ser legitimadoras, sagradas ou heroicas. Toda lenda também tem um nível de [legend_quality|lE], que influencia a força dessas recompensas, assim como sua disseminação."
 game_concept_owned_legend: "Lenda Possuída"
 game_concept_owning_legend: "Lenda Proprietária"
 game_concept_owned_legend_desc: "Uma $game_concept_owned_legend$ é aquela [legend|lE] em posse de um [ruler|lE], que é o principal beneficiário de seus efeitos.\n\nO proprietário de uma $game_concept_legend$ pode ser seu [legend_protagonist|lE], mas não necessariamente.\n\nUma $game_concept_legend$ também pode contar com o apoio de [legend_promoters|lE], que pagam uma contribuição mensal para também obter parte de seus bônus."
 game_concept_owning_legend_desc: "$game_concept_owned_legend_desc$"
 game_concept_promoted_legend: "Lenda Promovida"
 game_concept_promoted_legend_desc: "Uma $game_concept_promoted_legend$ é uma [legend|lE] possuída por um [ruler|lE] diferente que está sendo apoiada por [legend_promoters|lE], que pagam uma contribuição mensal para também receber parte de seus bônus."
 game_concept_promoting_legend: "Espalhando"
 game_concept_promoting_legend_desc: "$game_concept_promoting_legend$"
 game_concept_legend_promoter: "Promotor de Lenda"
 game_concept_legend_promoter_desc: "[Concept( 'legend_promoter', 'Impulsor' )|lE] é aquele [ruler|lE] que dá apoio à [legend|lE] de outro.\n\nO $game_concept_legend_promoter$ recebe bônus extras –variáveis conforme o [Concept( 'legend_type', 'tipo' )|E] e a [Concept( 'legend_quality', 'calidad' )|E] da lenda– em troca de uma contribuição mensal de [gold|lE]."
 game_concept_legend_promoters: "Promotores de Lenda"
 game_concept_legend_promoters_desc: "$game_concept_legend_promoter_desc$"
 game_concept_legends: "Lendas"
 game_concept_legends_desc: "$game_concept_legend_desc$"
 game_concept_legend_seed: "Semente de Lenda"
 game_concept_legend_seed_desc: "Uma [legend|lE] em formação. As $game_concept_legend_seeds$ são a base de uma $game_concept_legend$ e, ao fundá-las, um [ruler|lE] pode iniciar uma $game_concept_legend$.\n\nÉ possível obter $game_concept_legend_seeds$ ao cumprir alguns critérios, como ser o herdeiro de Carlos Magno ou realizar feitos lendários: grandes [decisions|lE], vencer uma [great_holy_war|lE], tornar-se [king|lE] ou [emperor|lE], organizar uma grande [activity|lE], caçar um animal lendário, etc.\n\n$game_concept_legend_seeds$ inativas não têm custo, mas não produzem efeitos. Fundar uma $game_concept_legend_seed$ pela primeira vez custará [gold|lE]."
 game_concept_legend_seeds: "Sementes de Lenda"
 game_concept_legend_seeds_desc: "$game_concept_legend_seed_desc$"
 game_concept_legend_quality: "Qualidade da Lenda"
 game_concept_legend_quality_desc: "A qualidade de uma [legend|lE] determina tanto a força de seus efeitos quanto o alcance de sua propagação, além de afetar suas recompensas finais. As $game_concept_legends$ podem ser afamadas, ilustres ou míticas — não existem lendas comuns.\n\nA qualidade pode ser aumentada ao espalhar a lenda para mais [baronies|lE] e pagar o custo da melhoria.\n\nQuando o dono de uma $game_concept_legend$ morre, sua família pode continuá-la sem prejudicar sua qualidade."
 game_concept_legend_famed: "Famosa"
 game_concept_legend_famed_desc: "$game_concept_legend_quality_desc$"
 game_concept_legend_illustrious: "Ilustre"
 game_concept_legend_illustrious_desc: "$game_concept_legend_quality_desc$"
 game_concept_legend_mythical: "Mítica"
 game_concept_legend_mythical_desc: "$game_concept_legend_quality_desc$"
 game_concept_legend_protagonist: "Protagonista da Lenda"
 game_concept_legend_protagonist_desc: "O $game_concept_legend_protagonist$ é o personagem principal de uma [legend|lE], cujos feitos são descritos nela. O dono de uma $game_concept_legend$ também pode ser seu $game_concept_legend_protagonist$, assim como qualquer membro de sua família — vivo ou morto, desde que tenha 16 anos.\n\nOs $game_concept_legend_protagonists$ não recebem bônus diretos extras para si mesmos, mas o conteúdo sobre a $game_concept_legend$ será focado neles. No entanto, eles concederão [legitimacy|lE] #color_white adicional#! ao dono da lenda, com base em quantos [traits|lE] [virtuous|lE] possuem.\n\nO $game_concept_legend_protagonist$ deve ser adulto, pois afirmar que um bebê matou um dragão pode ser controverso."
 game_concept_legend_protagonists: "Protagonistas da Lenda"
 game_concept_legend_protagonists_desc: "$game_concept_legend_protagonist_desc$"
 game_concept_legend_type: "Tipo de Lenda"
 game_concept_legend_types: "Tipos de Lenda"
 game_concept_legend_types_desc: "$game_concept_legend_type_desc$"
 game_concept_legend_type_desc: "Uma [legend|lE] tem um Tipo que influencia a categoria dos efeitos que concederá, bem como o tema de seu conteúdo.\n\nOs $game_concept_legend_types$ são Legitimadora, Heroica e Sagrada, concedendo [legitimacy|lE], [prestige|lE] e [piety|lE], respectivamente."
 game_concept_legend_heroic: "Lenda Heroica"
 game_concept_legend_heroic_desc: "$game_concept_legend_type_desc$"
 game_concept_legend_holy: "Lenda Sagrada"
 game_concept_legend_holy_desc: "$game_concept_legend_type_desc$"
 game_concept_legend_legitimizing: "Lenda Legitimadora"
 game_concept_legend_legitimizing_desc: "$game_concept_legend_type_desc$"
 game_concept_legend_library: "Biblioteca de Lendas"
 game_concept_legend_library_i: "@legend_icon!"
 game_concept_legend_library_desc: "A [legend_library|lE] contém [legends|lE] concluídas que se espalharam para seu [domain|lE], que você criou ou estava promovendo ativamente.\nVocê também pode adicionar ativamente [legends|lE] concluídas se estiver viajando pela área de disseminação da lenda.\n\nVocê pode remover [legends|lE] de sua biblioteca a qualquer momento."
 game_concept_ancestral_claim: "Reivindicação Ancestral"
 game_concept_ancestral_claim_desc: "Um [casus_belli|lE] de reivindicação ancestral permite anexar todas as terras dentro de um título sobre o qual você tem uma reivindicação obtida por meio de uma [legend|lE] legitimadora."
 legend_heroic: "Lenda Heroica"
 legend_heroic_name: "A Lenda de [ROOT.Legend.GetOwner.GetNameNoTooltip]"
 legend_heroic_desc: "[ROOT.Legend.GetOwner.Custom('ES_ElLa')|U] [ROOT.Legend.GetOwner.GetTitledFirstNameNoTooltip|l] é reconhecid[ROOT.Legend.GetProtagonist.Custom('ES_OA')] por seus feitos heroicos."
 legend_legitimizing: "Lenda Legitimadora"
 legend_legitimizing_name: "A Genealogia de [ROOT.Legend.GetOwner.GetNameNoTooltip]"
 legend_legitimizing_desc: "A linhagem da dinastia [ROOT.Legend.GetOwner.GetDynasty.GetBaseNameNoTooltip] governa estas terras há séculos."
 legend_holy: "Lenda Sagrada"
 legend_holy_name: "Os Milagres de [ROOT.Legend.GetOwner.GetNameNoTooltip]"
 legend_holy_desc: "Todo devoto de [ROOT.Char.GetFaith.HighGodName] admira a santidade demonstrada por [ROOT.Legend.GetOwner.Custom('ES_ElLa')] [ROOT.Legend.GetOwner.GetTitledFirstNameNoTooltip|l]."
 legend_king_arthur: "O Legado de Arthur Pendragon"
 legend_king_arthur_desc: "O rei uma vez e futuro vive através do sangue desta dinastia."
 legend_carolingian: "Os Herdeiros de Carlos Magno"
 legend_carolingian_desc: "O grande rei Carlos Magno uma vez governou esta terra antes desta dinastia, que alega ser descendente direta de seu sangue imperial."
 legend_holy_warrior: "O Punho Sagrado"
 legend_holy_warrior_desc: "Um grande guerreiro santo, este herói lutou valorosamente por sua fé."
 legend_chapter_opening_holy_warrior: "Um[ROOT.Legend.GetProtagonist.Custom('ES_XA')] grande guerreiro[ROOT.Legend.GetProtagonist.Custom('ES_OA')] de [religion.GetNameNoTooltip|l], a lenda [ROOT.Legend.GetProtagonist.Custom('ES_DelDela')] [ROOT.Legend.GetProtagonist.GetTitledFirstNameNoTooltip|l] começa com um nascimento auspicioso. Desde muito cedo, [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] ouviu o chamado de [ROOT.Legend.GetProtagonist.GetFaith.HighGodName]."
 legend_el_cid: "A Canção de El Cid"
 legend_el_cid_desc: "Rodrigo Díaz de Vivar era um nobre menor desonrado, agora tornou-se um rei por direito próprio."
 legend_alfred_of_wessex: "O Rei Santo"
 legend_alfred_of_wessex_desc: "[ancestor.GetNameNoTooltip|U] resistiu às invasões dos nórdicos na Inglaterra, e ergueu-se como um bastião e propagador do cristianismo."
 legend_sons_of_david: "Herdeiros de Davi"
 legend_sons_of_david_desc: "Davi, Rei de Israel, foi ordenado por Deus e seu sangue corre nas veias de cada [GetDynastyHouseByID('house_bagrationi').GetNameNoTooltip]."
 legend_peasant_emperor: "Do Camponês ao Basileu"
 legend_peasant_emperor_desc: "Basil nasceu de agricultores camponeses e entrou ao serviço do Imperador antes de se casar com sua filha e ascender ao posto de Basileu ele mesmo."
 legend_the_wheelwright: "A Adega da Abundância"
 legend_the_wheelwright_desc: "No sétimo aniversário de seu filho, Piast, o Carpinteiro, foi visitado por dois estranhos. Em agradecimento pela sua hospitalidade, os estranhos lançaram um feitiço fazendo com que a adega de Piast estivesse eternamente cheia."
 legend_vercingetorix: "Herdeiros de Vercingetórix"
 legend_vercingetorix_desc: "Vercingetórix uniu uma vez as tribos gaulesas em uma rebelião contra a invasão romana. Embora tenha caído nas mãos de César, seu espírito celta vive em nosso sangue."
 legend_saman_khudah: "Descendente de Bahram Chobin"
 legend_saman_khudah_desc: "General, conquistador e usurpador, Bahram Chobin tomou o trono sassânida para si, e seu sangue heróico corre em nossas veias."
 legend_bahram_gur: "Linhagem Gur"
 legend_bahram_gur_desc: "Bahram Gur foi um grande rei guerreiro que lutou e resistiu a inúmeros invasores. Seu sangue flui em nossas veias, tornando-nos heróis persas."
 bahram_gur: "Bahram Gur"
 legend_cadell: "O Sangue de Cadell"
 legend_cadell_desc: "Cadell começou a vida como um escravo menino, e com a bênção de um santo concedida a ele, ele tirou o reino de Powys de Vortigern."
 legend_descendants_of_brahman: "Sangue de Brahman"
 legend_descendants_of_brahman_desc: "Somos filhos e filhas dos Deuses. Brahman, Vishnu, nosso sangue pode ser rastreado até o início dos tempos."
 legend_gothic_kings: "Reis Góticos"
 legend_gothic_kings_desc: "Os Godos trouxeram a destruição de Roma e fundaram nosso Reino. Somos seus herdeiros, os Reis e Rainhas dos Godos."
 legend_sons_of_rurik: "Filhos de Rurik"
 legend_sons_of_rurik_desc: "O Príncipe Varangiano Rurik levou sua horda de aventureiros para o leste e estabeleceu o grande Reino de Novgorod. É o seu lendário sangue que corre em nossas veias."
 legend_william_gellones: "La Prise d'Orange"
 legend_william_gellones_desc: "Derrotador dos exércitos islâmicos em Orange, Guillaume Gellones foi um guerreiro para a Cristandade e fundou a abadia em Gellone onde ele mais tarde se aposentaria do governo como monge e lá se aposentaria."
 legend_edward_the_martyr: "Eduardo, o Mártir"
 legend_edward_the_martyr_desc: "Assassinado e enterrado sem honras, o corpo de Eduardo, o Mártir, foi encontrado incorrupto após um ano. Diz-se que ele abraçou sua própria morte por um profundo amor a Cristo."
 legend_yazdagird_iii: "Sangue de [ancestor.GetFirstNameNoTooltip] III"
 legend_yazdagird_iii_desc: "O sangue [ancestor.Custom('ES_DelDela')] últim[ancestor.Custom('ES_OA')] do xá sassânida final corre em nossas veias. Embora tenha sido sitiado por turcos, cazares e invasores árabes de todos os lados, permaneceu leal à Pérsia até seu último suspiro."
 legend_afrasiyab: "O Rei de Turan: Afrasiyab"
 legend_afrasiyab_desc: "O magnífico rei de Turan e herói dos Turcos, Afrasiyab foi o nêmesis do Império Persa e o maior de todos os reis Turanianos. Seu sangue mágico corre em nossas veias e nos dá o direito divino de governar Turan mais uma vez."
 legend_sceafa: "Sceafa, Neto de Noé"
 legend_sceafa_desc: "O antigo rei lombardo Sceafa saiu do mar quando criança e governou a Inglaterra. Sabemos que ele era neto de Noé, e é dele que herdamos nosso sangue divino."
 legend_new_troy_london: "Nova Troia"
 legend_new_troy_london_desc: "Bruto, banido de Troia, foi guiado por Diana para Albion. Após derrotar os grandes gigantes que ocupavam a terra, ele fundou Troia Nova, a cidade que hoje conhecemos como Londres."
 legend_corineus: "A Balada de Corineus"
 legend_corineus_desc: "Corineus, antigo guerreiro troiano, foi o fundador original da Cornualha. Ele veio para a Britânia e matou os gigantes que ocupavam a área e nomeou o lugar de Cornualha em sua homenagem."
 legend_scota: "Filhos de Scota"
 legend_scota_desc: "É de Scota, filha de um grande Faraó egípcio, que chamamos nossa terra de \"Escócia\". Ela é a mãe de todos os escoceses, e é o sangue dos antigos Faraós que corre em nossas veias."
 legend_pyusawhti: "Herdeiros da Deusa Dragão"
 legend_pyusawhti_desc: "Nascidos do útero de uma deusa dragão, e descendentes de Mahasammata, temos o mais santo e poderoso sangue carregado por nossa linhagem."
 legend_tosny: "O Cavaleiro do Cisne"
 legend_tosny_desc: "O poderoso Roger de Tosny era descendente do Cavaleiro do Cisne, e usamos o Distintivo do Cisne até hoje para honrar sua lenda."
 legend_menelik_i: "Filhos de Davi"
 legend_menelik_i_desc: "O fundador de nossa dinastia, Menelik I, foi o resultado do amor entre Salomão de Israel e a Rainha de Sabá."
 legend_kings_of_semien: "Reis de Semien"
 legend_kings_of_semien_desc: "Beta Israel é o lendário reino judeu que continua a resistir fervorosamente à cristianização. Somos descendentes da Tribo de Dã, que fugiu de Israel durante a guerra civil entre as forças de Reoboão e Jeroboão."
 legend_roman_heritage: "Herança Romana"
 legend_roman_heritage_desc: "Nossa família não apenas governa em um Império Romano moderno, mas tem sido cortesã influente em Roma desde os dias da República."
 legend_hunnic_heritage: "Herança Hunnica"
 legend_hunnic_heritage_desc: "Nosso povo pode traçar suas linhagens de volta às famílias dos Hunos, e o fundador de nossa dinastia foi, na verdade, o feroz Átila que colocou Roma de joelhos."
 legend_premysl: "Přemysl, o Agricultor"
 legend_premysl_desc: "Nosso ancestral começou a vida como um mero camponês na aldeia de Stadice, mas logo chamou a atenção de Libuše e casou-se com ela para se tornar Príncipe dos Tchecos."
 legend_borjigin: "O Visitante Cintilante"
 legend_borjigin_desc: "Alan Gua, a mãe de todos os [GetDynastyByID('11100').GetNameNoTooltip], era visitada por uma estranha figura cintilante todos os dias e noites. Como um grande cachorro amarelo, ele rastejava para dentro de sua tenda através dos raios da lua à noite e dos raios do sol durante o dia, e lhe presenteou com três filhos. Ela avisou seus filhos concebidos divinamente que deveriam permanecer juntos como um feixe de cinco flechas ou seriam quebrados como cinco flechas solitárias."
 legend_naga_descent: "Sangue do Naga"
 legend_naga_descent_desc: "Os Naga são criaturas santas meio humanas e meio serpentes que residem em Patala, e ocasionalmente podem atravessar para nosso mundo como humanos completos. Nossa família pode traçar sua linhagem até um Naga que uma vez visitou Caxemira e se deitou com um humano."
 legend_hieros_gamos_skirnismal: "Hieros Gamos"
 legend_hieros_gamos_skirnismal_desc: "Fjolnir, fundador da dinastia Yngling, foi gerado dos lombos de Gerðr em seu amor por Freyr. Quem mais além dos descendentes de Fjolnir poderia possuir o sangue divino necessário para governar a Noruega?"
 legend_shibi_chakravarti: "Shibi Chakravarti"
 legend_shibi_chakravarti_desc: "Paradigma de humildade e piedade, o heróico Rei Shibi foi encarregado de proteger o sábio Agni, que havia sido transformado em um pássaro. Quando um gavião exigiu que ele sacrificasse sua própria carne para salvar a pomba, Shibi deu-se inteiramente de bom grado, mas foi poupado e recompensado com seu filho Kapotaroma. É o sangue deste rei altruísta que corre nas veias de cada [GetDynastyByID('1043008').GetNameNoTooltip]."
 legend_magi: "Filhos dos Magos"
 legend_magi_desc: "Após o nascimento de Jesus, Ele foi visitado pelos Magos Bíblicos, que trouxeram presentes de ouro, incenso e mirra. O Evangelho de Mateus afirma que os Três Reis Magos vieram do Oriente.\nUm viajante ocidental desinformado poderia situar a visão da Estrela de Belém na cidade persa de Saba.\nMas o sol nasce mais a leste. As riquezas vêm das cidades, mas a fé inabalável vem da dura estepe.\nA Bíblia fala de Melchior, Gaspar e Baltasar retornando às suas terras natais após prestar homenagem ao recém-nascido Rei dos Judeus. Sua carne e sangue, os mais piedosos nestorianos, ainda adoram o único Deus verdadeiro e Seu Filho."
 legend_the_red_hand: "A Mão Vermelha de Ulster"
 legend_the_red_hand_desc: "Dizem que nos primeiros dias da Irlanda foi feita uma promessa: o primeiro a colocar a mão em Ulster teria direito a ela e se tornaria o Rei Supremo da Irlanda. Foi nosso ancestral quem teve a sagacidade de cortar a própria mão e lançá-la em Ulster, manchando a grama esmeralda com seu sangue."
 legend_ragnarr: "Filhos de $nick_lodbrok$"
 legend_ragnarr_desc: "Rei dos Dinamarqueses e matador de um poderoso dragão, [ancestor.GetFirstNameNoTooltip] foi um terror para os cristãos e um aventureiro lendário. As grandes realizações de sua vida são muitas para enumerar, e com seu sangue fluindo por mim, é apenas justo que eu reivindique seu legado e construa uma história lendária só minha!"
 legend_holy_site: "$legend_saintly_location_name$"
 legend_holy_site_desc: "$legend_saintly_location_desc$"
 legend_saintly_location_name: "[ROOT.Char.CustomFixedRandom('GetCustodianSynonym')|U] do Santuário Sagrado [protagonist.GetFaith.GetAdjectiveNoTooltip]"
 legend_saintly_location_desc: "Possuir um local sagrado para [faith.GetNameNoTooltip|l] é uma marca de santidade em si."
 legend_chapter_opening_saintly_location: "A terra de [location.GetNameNoTooltip] é de valor piedoso supremo, e de seu solo diz-se que brota água milagrosa, capaz de curar todas as doenças."
 legend_chapter_motivation_religious: "Quando [ROOT.Legend.GetProtagonist.Custom('ES_ElLa')] [ROOT.Legend.GetProtagonist.GetTitledFirstNameNoTooltip|l] soube disso, sentiu um grande calor em seu coração, pois sua devoção era tão grande que a mera ideia de um lugar sagrado fez seus olhos se encherem de lágrimas."
 legend_saintly_life_name: "O muito [ROOT.Char.CustomFixedRandom('GetPiousAdj')] percurso de vida santíssimo de [protagonist.Custom('ES_DelDela')] [protagonist.GetTitledFirstNameNoTooltip|l]"
 legend_saintly_life_desc: "A vida devota de [protagonist.Custom('ES_DelDela')] [protagonist.GetTitledFirstNameNoTooltip|l] lhe conferiu um status quase santo."
 legend_chapter_opening_saintly_life: "[ROOT.Legend.GetProtagonist.Custom('ES_ElLa')|U] [ROOT.Legend.GetProtagonist.GetTitledFirstNameNoTooltip|l] nasceu com o amor mais profundo por [ROOT.Legend.GetProtagonist.GetFaith.HighGodName|l] e dedicou sua vida inteira a honrar sua fé."
 holy_seed_toast: "[legend_seed|lE] Sagrada Obtida"
 holy_seed_toast_traits: "Sua natureza [ROOT.Char.CustomFixedRandom('GetSaintlyTrait')|l] é reconhecida"
 legend_saintly_building_name: "O Construtor Mais [ROOT.Char.CustomFixedRandom('GetPiousAdj')] de [location.GetNameNoTooltip]"
 legend_saintly_building_desc: "Construir [ROOT.Char.GetFaith.HouseOfWorshipPlural] é um ato de altruísmo; uma grande prova de uma alma piedosa."
 legend_ancient_people_name: "[culture.GetNameNoTooltip] [ROOT.Char.CustomFixedRandom('GetDescendantSynonym')|U]"
 legend_ancient_people_desc: "No sangue de todo nosso povo corre o mesmo sangue que fluía pelos [culture.GetCollectiveNoun]."
 legend_saintly_deed_name: "Feitos [ROOT.Char.CustomFixedRandom('GetPiousAdj')] de [ancestor.GetNameNoTooltip]"
 legend_saintly_deed_desc: "Os atos piedosos de [ancestor.GetShortUIName] em nome de [religion.GetName|l] são sem dúvida dignos de veneração."
 legend_saintly_descent_name: "[ROOT.Char.CustomFixedRandom('GetDescendantSynonym')|U] de [Localize( ancestor_flag )]"
 legend_saintly_descent_desc: "O sangue sagrado de [Localize( ancestor_flag )] corre em nossas veias, e com ele realizaremos milagres."
 legend_mythical_descent_name: "Sangue de [Localize( creature )]"
 legend_mythical_descent_desc: "Um dos meus ancestrais foi um poderoso [Localize( creature )]."
 legend_godly_descent_name: "O Sangue de [Localize( god )]"
 legend_godly_descent_desc: "[Localize( god )|U] é meu ancestral, e com esse sangue em minhas veias, realizarei maravilhas."
 legend_chronicle_ancestral_glory_desc: "[ancestor.GetName] foi um[ancestor.Custom('ES_XA')] grande [ancestor.GetWomanMan], venerad[ancestor.Custom('ES_OA')] por todos."
 legend_chronicle_ancestral_glory_nohistory_desc: "Nosso ancestral foi verdadeiramente um dos grandes, venerado por todos."
 legend_crusader: "[ancestor.GetTitleAsNameNoTooltip|U] [GetTrait('faith_warrior').GetNameNoTooltip( protagonist )|l]"
 legend_crusader_desc: "[protagonist.GetName] realizou muitos feitos grandiosos e piedosos na tomada da Terra Santa."
 legend_chronicle_raised_by_animals: "Filho de [Localize( beast )]"
 legend_chronicle_raised_by_animals_desc: "Um exemplar de [Localize( beast )] criou [protagonist.GetNameNoTooltip|U] e essa experiência árdua na criação [protagonist.GetFaith.CreatorNamePossessive] lhe deu uma preparação divina para governar."
 legend_auspicious_birth: "Nascimento Auspicioso"
 legend_auspicious_birth_desc: "[protagonist.GetNameNoTooltip|U] nasceu quando o céu noturno brilhava com estrelas auspiciosas, um sinal claro das grandes façanhas a que estava destinad[protagonist.Custom('ES_OA')]."
 legend_virgin_birth: "Concepção Imaculada"
 legend_virgin_birth_desc: "[protagonist.GetMother.GetNameNoTooltip] conseguiu, de alguma forma, gerar uma criança sem consumar com o marido. Na verdade, isso é um sinal de que foi [protagonist.GetFaith.HighGodName|U] em pessoa quem lhe concedeu esta criança."
 legend_sacred_birth_name: "O nascimento [ROOT.Char.CustomFixedRandom('GetPiousAdj')] de [protagonist.GetFirstNameNoTooltip]"
 legend_sacred_birth_desc: "As circunstâncias do nascimento de [protagonist.GetNameNoTooltip] estão envoltas em misticismo, sinal inequívoco de que foi abençoad[protagonist.Custom('ES_OA')] por [protagonist.GetFaith.HighGodName|U] desde o princípio."
 legend_divine_intervention_name: "Abençoado por [Localize( god )|U]"
 legend_divine_intervention_desc: "[protagonist.GetNameNoTooltip|U] falou com [Localize( god )] em sonhos, encarregando-o de uma missão divina."
 legend_fought_devil_name: "Um Confronto com [protagonist.GetFaith.DevilName|U]"
 legend_fought_devil_desc: "Em um sonho, [protagonist.GetNameNoTooltip] lutou contra [protagonist.GetFaith.DevilName] em pessoa, um sinal auspicioso de que estava destinad[protagonist.Custom('ES_OA')] vencer o mal."
 legend_exotic_backstory_name: "A odisseia de [protagonist.GetNameNoTooltip|U]"
 legend_exotic_backstory_desc: "Certa vez, [protagonist.GetName] viajou até [Localize( location.GetString )] e voltou."
 pilgrim_legend_name: "Peregrino pelo Mundo"
 pilgrim_legend_desc: "[ancestor.GetName|U] dedicou a vida à interminável e árdua jornada rumo a [ancestor.GetFaith.PositiveAfterLife]. Só [ancestor.GetFaith.HighGodName|U] conhece de verdade todos os feitos que ocorreram na santa jornada de [ancestor.GetFirstNameNoTooltip] para a salvação."
 consecrated_blood_legend: "O Sangue Sagrado"
 consecrated_blood_legend_desc: "A sangue de [founder.GetName|U] corre por todos os membros da família [dynasty.GetName]. Nossa devoção a [founder.GetFaith.HighGodName|U] é absoluta e nossas ações são realizadas apenas em Seu nome."
 dyn_many_crown_legend: "A Soberania dos [dynasty.GetNameNoTooltip|U]"
 dyn_many_crown_legend_desc: "Seja por destino ou por desígnio, o poder cai nas mãos da [dynasty.GetName]. Nossas terras são vastas e nossos feitos grandiosos, e nosso domínio sobre os tronos do mundo é predestinado."
 legend_of_rome_name: "Um Novo César"
 legend_of_israel_name: "[Select_CString( founder.IsFemale, 'A nova', 'O novo' )] [founder.GetTitleAsNameNoTooltip|l] de Israel"
 legend_of_slavia_name: "O Império dos Eslavos"
 legend_of_n_sea_name: "Domínio do Mar"
 legend_of_mann_name: "[founder.Custom('ES_ElLa')] [founder.GetTitleAsNameNoTooltip|l] pirata"
 legend_of_genghis_name: "O Maior dos Cãs"
 new_title_name: "[Select_CString( founder.IsFemale, 'Uma nova', 'Um novo' )] [founder.GetTitleAsNameNoTooltip|l]"
 jewish_priesthood_name: "A Profecia Cumprida"
 zoroast_priesthood_name: "Reacendendo as Chamas"
 priesthood_restoration_name: "Uma Nova Sacerdócio"
 iberian_ender_name: "O Destino de [GetTitleByKey('e_spain').GetNameNoTierNoTooltip]"
 persian_ender_name: "O Destino de [GetTitleByKey('e_persia').GetNameNoTierNoTooltip]"
 struggle_conclusion_name: "O Fim de [Localize(struggle.GetString)]"
 legendary_battle_name: "A Batalha de [location.GetName]"
 reformed_faith: "A Consolidação de [religion.GetNameNoTooltip|l]"
 new_faith_legend_name: "[faith.GetNameNoTooltip|U] Vitoriosa"
 khan_beater_name: "O Flagelo dos Cãs"
 legend_of_rome_desc: "Roma, outrora reduzida a uma memória distante, agora ressurge com um novo César, pronto para trazer civilização mais uma vez a uma nova era."
 legend_of_israel_desc: "Israel, um Reino para o povo escolhido de Deus, subjugado por assírios, babilônios e romanos. Nosso êxodo da Terra Prometida enviou nosso povo em uma jornada ao redor do mundo, mas agora um novo Reino de Israel se ergue e o povo de Deus habita suas terras mais uma vez!"
 legend_of_slavia_desc: "Os povos eslavos se espalharam por toda a Europa, mas agora [founder.GetFirstName] se ergue como [Select_CString( founder.IsFemale, 'la primera', 'el primer' )] [founder.GetTitleAsNameNoTooltip|l] de todos os eslavos!"
 legend_of_n_sea_desc: "O Mar do Norte tem sido o domínio dos dinamarqueses, e agora, sob o governo de [founder.GetName], um império se ergue sobre as ondas."
 legend_of_mann_desc: "Pelos mares que banham a Britânia, os marinheiros contam histórias de um[founder.Custom('ES_XA')] grande e temível [founder.GetTitleAsNameNoTooltip|l] pirata, [founder.Custom('ES_ElLa')] temível [founder.GetName]. Até o mais poderoso dos guerreiros empalidece ao ver esses barcos aparecerem em suas costas. A rendição seria a única opção, se é que [founder.GetTitleAsNameNoTooltip|l] a aceita."
 legend_of_genghis_desc: "Tudo o que está sob o céu pertence ao maior de todos os cãs. Com o povo mongol unido em torno de um[founder.Custom('ES_XA')] [founder.GetTitleAsNameNoTooltip], os lobos uivam e as águias gritam enquanto Gêngis Cã grava seu nome pelo mundo afora."
 new_title_desc: "[Select_CString( founder.IsFemale, 'Uma nova', 'Um novo' )] [founder.GetTitleAsNameNoTooltip|l] se ergue das cinzas para trazer prosperidade sob seu governo benevolente."
 jewish_priesthood_desc: "A diáspora era considerada eterna, mas sob [founder.GetName], um novo Sumo Sacerdócio emergiu para liderar o povo [faith.GetName|l] para uma nova e mais brilhante era."
 zoroast_priesthood_desc: "A fé Zoroastrista foi liderada pelos grandes Magos do passado, mas a ordem foi desmantelada. Pela graça de Ahuramazda, Anahita e Mithra, [protagonist.GetName] restaurou os Magos."
 priesthood_restoration_desc: "A [faith.GetName|l] foi reduzida a cinzas pela cruel mão do tempo. Agora, pela graça de [faith.HighGodName|U], [founder.GetName] reconstrói o sacerdócio."
 iberian_ender_desc: "As disputas da nobreza ibérica chegaram ao fim, e [struggle_ender.GetFirstName] emerge como seu salvador[struggle_ender.Custom('ES_XA')]. [struggle_ender.Custom('ES_ElLa')|U] [struggle_ender.GetTitleAsNameNoTooltip|l] sai vitorios[struggle_ender.Custom('ES_OA')]."
 struggle_conclusion_desc: "[Localize(struggle.GetString)|U] terminou por fim e [struggle_ender.GetFirstName] surge como [Select_CString( struggle_ender.IsFemale, 'a heroína', 'o herói' )] que inaugura uma nova era para a região."
 khan_beater_desc: "Supostamente, o lendário \"Gengis Khan\" ia colocar tudo o que há sob o céu sob seu império, mas [Select_CString( loser.IsFemale, 'a poderosa', 'o poderoso' )] [loser.GetTitleAsNameNoTooltip|l] viu seu intento fracassar por causa [Select_CString( winner.IsFemale, 'da heroica', 'do heroico' )] [winner.GetName]!"
 legendary_battle_desc: "[loser.GetName|U] tentou destruir [winner.GetName] e foi [Select_CString( loser.IsFemale, 'uma digna', 'um digno' )] oponente. Com [winner.GetFirstNameNoTooltip] emergindo vitorios[winner.Custom('ES_OA')], suas façanhas de bravura não terão fim!"
 reformed_faith_desc: "A religião organizada estava determinada a destruir os velhos costumes, mas sob a orientação sábia e piedosa de [reformer.GetName], a fé [faith.GetName|l] foi trazida para uma nova era. As lendas agora codificadas em um livro sagrado e uma classe sacerdotal estruturada estabelecida, a vontade de [faith.HighGodNamePossessive] será feita!"
 new_faith_legend_desc: "A igreja fraca e corrupta se desviou dos desígnios [faith.HighGodNamePossessive] para a humanidade. Sob a liderança divina de [reformer.GetName] nasceu a única fé verdadeira, a [faith.GetName|l]."
 legend_chronicle_debug_legend: "#D A Lenda do QA#!"
 legend_chronicle_debug_legend_desc: "#D QA é uma profissão ancestral e nobre#!"
