 legend_events.0001.t: "Crônica: Uma Lenda Encontrada"
 legend_events.0001.desc.intro: "[chronicler.Custom2('MyCharacterIntroduction', ROOT.Char)|U] corre animad[chronicler.Custom('ES_OA')] ao meu encontro quando entro na corte.\n\n"
 legend_events.0001.desc.mid.slew_dragon: "\"Tenho notícias excelentes, meu [ROOT.Char.GetTitleAsNameNoTooltip]! Estive procurando livros e lendas sobre [legend_character.GetName], e tenho motivos para acreditar que ele lutou contra um dragão e o matou!"
 legend_events.0001.desc.mid.ancestral_saint: "\"[ROOT.Char.GetFaith.HighGodName|U] sorri hoje sobre a vossa casa, meu [ROOT.Char.GetTitleAsNameNoTooltip|l]. Tenho buscado informações sobre voss[legend_character.Custom('ES_OA')] promissor[legend_character.Custom('ES_XA')] antepassad[legend_character.Custom('ES_OA')] [legend_character.GetName] e encontrei informações que poderiam torná-l[legend_character.Custom('ES_OA')] dign[legend_character.Custom('ES_OA')] de alcançar o reconhecimento de [GetTrait('saint').GetNameNoTooltip( ROOT.Char )]!"
 legend_events.0001.desc.mid.godly_descent: "[chronicler.GetSheHe|U] se ajoelha e beija meus pés. \"Oh, santíssim[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]. Tenho fortes razões para suspeitar que descendeis diretamente de [ROOT.Char.GetFaith.HighGodName|U] em pessoa!"
 legend_events.0001.desc.mid.old_godly_descent: "\"Bom dia, meu [ROOT.Char.GetTitleAsNameNoTooltip|l], ou deveria chamar-vos de \"[ROOT.Char.Custom('GetDaughterSon')|U] de [legend_character.GetFaith.HighGodName|U]\"? De fato, vasculhei os registros e acredito que o \"deus\" de vossos antepassados era, na verdade, um mortal heroico que realizou uma grande quantidade de feitos heroicos."
 legend_events.0001.desc.mid.raised_by_animals: "\"Bom dia, meu [ROOT.Char.GetTitleAsNameNoTooltip|l]. Quanto você se lembra da sua primeira infância? Alguns tomos do arquivo indicariam que você foi realmente criado(a) na natureza selvagem por [ROOT.Char.Custom('GetAnimalPlural')]."
 legend_events.0001.desc.mid.auspicious_stars: "\"[ROOT.Char.GetFaith.HighGodName|U] nos sorri hoje, meu [ROOT.Char.GetTitleAsNameNoTooltip|l], assim como sorriu no dia em que vieste ao mundo. De fato, nasceste sob estrelas auspiciosas, um sinal dos grandes feitos que realizarias ao longo da vida."
 legend_events.0001.desc.mid.virgin_birth: "[ROOT.Char.GetFaith.HighGodName|U] nos sorri hoje, meu [ROOT.Char.GetTitleAsNameNoTooltip][ROOT.Char.Custom('ES_OA')], assim como sorriu à sua mãe quando você foi concebido. De fato, você não era um bastardo, sua mãe teve a sorte de ser abençoada com uma concepção imaculada!"
 legend_events.0001.desc.mid.spoke_to_angels: "\"Lembro-me de muitas noites atrás, quando me dissestes que havíeis sido visitado por anjos. Meu [ROOT.Char.GetTitleAsNameNoTooltip|l] tenho motivos para crer que isso não foi mero sonho, mas uma visão de [ROOT.Char.GetFaith.PositiveAfterLife]."
 legend_events.0001.desc.mid.fought_the_devil: "\"Estou ciente de que você tem sido atormentado por pesadelos ultimamente. Tenho motivos para acreditar que essas visões são flashes de sua batalha com [ROOT.Char.GetFaith.DevilName] no [ROOT.Char.GetFaith.NegativeAfterLife]."
 legend_events.0001.desc.mid.exotic_backstory: "\" [ROOT.Char.GetTitleAsNameNoTooltip|l], você nunca se sentiu completamente um [ROOT.Char.GetCulture.GetName] [ROOT.Char.GetWomanMan], não é mesmo? Acredito que muitos anos atrás, você veio de uma terra mística longe daqui."
 legend_events.0001.desc.mid.ancient_people: "\"Meu [ROOT.Char.GetTitleAsNameNoTooltip|l]; pesquisei nos arquivos e encontrei informações que indicam que sua linhagem pode ser traçada até as grandes dinastias de [ancient_culture.GetName]!"
 legend_events.0001.desc.outro: "Algumas pessoas podem achar isso um pouco fantasioso e seria necessário algum esforço para provar que é verdade, mas há uma base sólida para torná-lo uma lenda viva!"
 legend_events.0001.a: "Excelente trabalho!"
 legend_events.0001.b: "Até eu acho isso difícil de acreditar."
 legend_events.0010.t: "$chronicler_court_position$: A Lenda se Espalha"
 legend_events.0010.desc: "[chronicler.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me recebe na corte esta manhã, ansioso de quem tem notícias na ponta da língua.\n\n\"Meu [ROOT.Char.GetTitleAsNameNoTooltip], acredito que [potential_promoter.Custom2('YourCharacterIntroduction', ROOT.Char)] está quase convencid[potential_promoter.Custom('ES_OA')] da veracidade de [ROOT.Char.GetPromotedLegend.GetName]! Conhece a história e parece estar completamente encantado por ela; mas a verdade por trás dela não o convence\"."
 legend_events.0010.a: "Talvez ele/ela possa ser persuadido(a)."
 legend_events.0010.a.success: "[potential_promoter.GetName] está convencido"
 legend_events.0010.a.failure: "[potential_promoter.GetName] não está convencido"
 legend_events.0010.b: "Talvez distorcer a verdade [potential_promoter.GetHerHim] faria crer."
 legend_events.0010.c: "[potential_promoter.GetSheHe|U] pode pensar o que mais lhe agradar."
 legend_events.0020.t: "Cooptação da Lenda"
 legend_events.0020.desc: "Um convidado estrangeiro se aproxima de meu trono e proclama em voz alta:\n\n\"Faz algum tempo que cheguei à vossa corte. Observei atentamente como governais e cuidais dos assuntos do reino, tanto dos pequenos quanto dos grandiosos. E fiquei profundamente impressionado.\n\nEntre os [seed_presenter.GetCulture.GetCollectiveNoun] temos uma antiga história sobre um[ROOT.Char.Custom('ES_OA')] governante lendár[ROOT.Char.Custom('ES_OA')] de uma dinastia distinta. É um conto que minha mãe me contou quando era jovem, e ela o ouviu de sua mãe há muito, muito tempo.\n\nE agora tenho o grande prazer de dizer que acredito que vós sois o lendár[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|U] da história [seed_presenter.GetCulture.GetName]. E afirmo que qualquer verdadeiro filho de [seed_presenter.GetCulture.GetName] certamente concordaria comigo!\"."
 legend_events.0020.a: "Sim! Seus anciãos falavam sobre o [ROOT.Char.GetDynasty.GetNameNoTooltip]!"
 legend_events.0020.b: "[ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] é o tema de relatos da cultura [seed_presenter.GetCulture.GetNameNoTooltip]."
 legend_events.0020.c: "Um[ROOT.Char.Custom('ES_XA')] governante de herança [ROOT.Char.GetCulture.GetNameNoTooltip] não se importa com o que os camponeses de ascendência [seed_presenter.GetCulture.GetCollectiveNounNoTooltip]."
