 building_legendary_shrine_desc: "Este lugar de adora??o n?o ? apenas uma grande proeza de engenharia em si, mas tamb?m ? um ref?gio seguro para peregrinos e devotos, e um testemunho da piedade de quem o encomendou. Embora n?o seja considerado um local sagrado, a magnific?ncia do edif?cio fez com que o condado se tornasse um grande centro religioso na regi?o."
 building_legendary_palace_desc: "Um grande e vasto palácio com jardins e terrenos de caça circundantes. Esta luxuosa morada não só proporciona conforto e entretenimento a qualquer governante que nela permaneça, mas também funciona como um símbolo de status de riqueza e poder."
 building_legendary_statue_desc: "A imagem de um governante lendário agora imortalizada em pedra. Este monumento não apenas celebra as grandes proezas de seu comissionário, mas qualquer um que o tenha em seu domínio reivindica a custódia da própria lenda."
 building_legendary_watchtower_desc: "Este enorme monumento imponente n?o apenas intimida por sua presen?a, mas tamb?m ? uma fortaleza altamente defens?vel por si s? e ? usado para defender o reino contra poss?veis invasores."
 building_legendary_hunting_lodge_desc: "Este local tornou-se famoso por sua fauna estranha e lendária, e assim foi construída uma vasta cabana de caça aqui para fornecer conforto aos caçadores que buscam tornar seus nomes imortais."
