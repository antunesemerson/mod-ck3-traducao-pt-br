 fp3_antagonize_character_interaction.success_notif.t: "[recipient.GetTitledFirstNameNoTooltip] acredita nos rumores sobre você"
 fp3_antagonize_character_interaction.success_notif.discovered: "[secondary_recipient.Custom('ES_ElLa')|U] [secondary_recipient.GetTitledFirstNameNoTooltip|l] sabe!"
 fp3_antagonize_character_interaction.success_notif.discovered.tooltip: "[secondary_recipient.Custom('ES_ElLa')|U] [secondary_recipient.GetTitledFirstName|l] rastreia os rumores até você!"
 fp3_antagonize_character_interaction.success_notif.positive.desc: "Rumores agradáveis sobre você têm circulado, fazendo com que seu [secondary_recipient.Custom2('RelationToMe', SCOPE.sC('recipient'))] [recipient.Custom('ES_ElLa')], [recipient.GetTitledFirstName|l] pense melhor de você.\n"
 fp3_antagonize_character_interaction.success_notif.positive.desc.alt: "[actor.Custom('ES_ElLa')|U] [actor.GetTitledFirstName|l] tem estado espalhando rumores agradáveis sobre você, fazendo com que seu [secondary_recipient.Custom2('RelationToMe', SCOPE.sC('recipient'))] [recipient.Custom('ES_ElLa')] [recipient.GetTitledFirstName|l], pense melhor de você.\n"
 fp3_antagonize_character_interaction.success_notif.negative.desc: "Abundam rumores desagradáveis e mentiras a seu respeito,[secondary_recipient.Custom2('RelationToMe', SCOPE.sC('recipient'))] seu [recipient.Custom('ES_ElLa')], [recipient.GetTitledFirstName|l] os acreditou e agora pensa pior de você!\n"
 fp3_antagonize_character_interaction.success_notif.negative.desc.alt: "[actor.Custom('ES_ElLa')|U] [actor.GetTitledFirstName|l] tem espalhado mentiras escandalosas sobre você, o que fez com que seu [secondary_recipient.Custom2('RelationToMe', SCOPE.sC('recipient'))], [recipient.Custom('ES_ElLa')] [recipient.GetTitledFirstName|l], pensasse pior de você!\n"
 fp3_antagonize_character_interaction.success_notif.negative.desc.alt.alt: "O boato não é rastreado até você..."
 fp3_antagonize_character_interaction.success_tooltip.positive: "Acredita em você e #P mejora#! a [opinion|lE] sobre [secondary_recipient.Custom('ES_ElLa')] [secondary_recipient.GetTitledFirstName|l]"
 fp3_antagonize_character_interaction.success_tooltip.negative: "Acredita em você e #N empeora#! a [opinion|lE] de [secondary_recipient.Custom('ES_ElLa')] [secondary_recipient.GetTitledFirstName|l]"
 fp3_antagonize_character_interaction.success_tooltip.positive.past: "[recipient.Custom('ES_ElLa')|U] [recipient.GetTitledFirstName|l] #P mejoró#! sua [opinion|lE] sobre você"
 fp3_antagonize_character_interaction.success_tooltip.negative.past: "[recipient.Custom('ES_ElLa')|U] [recipient.GetTitledFirstName|l] #N empeoró#! sua [opinion|lE] sobre você"
 fp3_antagonize_character_interaction.recipient_message.fallback: "Deveis saber que [secondary_recipient.Custom('ES_ElLa')] [secondary_recipient.GetTitledFirstName|l] é um vulgar exemplar de [secondary_recipient.Custom2('InsultNoun', SCOPE.sC('secondary_recipient'))] e, como tal, deve ser tratado assim, não concordais?"
 fp3_antagonize_character_interaction.recipient_message.01: "Deveis saber que [Select_CString( secondary_recipient.IsFemale, 'vossa própria senhora', 'vosso próprio senhor' )], [secondary_recipient.Custom('ES_ElLa')] [secondary_recipient.GetTitledFirstName|l], conspira contra vós às escondidas. Deveis desconfiar da vossa relação com semelhante rato!"
 fp3_antagonize_character_interaction.recipient_message.02: "Tenho motivos para crer que [Select_CString( secondary_recipient.IsFemale, 'vossa própria senhora', 'vosso próprio senhor' )], [secondary_recipient.Custom('ES_ElLa')] [secondary_recipient.GetTitledFirstName|l], planeja assassinar-vos! Cuidado com [secondary_recipient.GetSheHe], por mais amigáv[secondary_recipient.Custom('ES_OA')] que pareça!"
 fp3_antagonize_character_interaction.recipient_message.03: "Diz-se entre meus cortesãos que [Select_CString( secondary_recipient.IsFemale, 'vossa senhora', 'vosso senhor' )], [secondary_recipient.Custom('ES_ElLa')] [secondary_recipient.GetTitledFirstName|l], está vos vigiando #italic muito atentamente#! sem que saibais. Não tenho certeza de quais são suas intenções, mas eu, no vosso lugar, teria cuidado com [secondary_recipient.GetSheHe]."
 fp3_antagonize_character_interaction.recipient_message.04: "Voss[secondary_recipient.Custom('ES_OA')] [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [secondary_recipient.Custom('ES_ElLa')] [secondary_recipient.GetTitledFirstName|l], fez papel de bobo recentemente e manchou o bom nome da casa [recipient.GetHouse.GetBaseNameNoTooltip] entre o povo."
 fp3_antagonize_character_interaction.recipient_message.05: "Creio que devo informar-vos de que [Select_CString( secondary_recipient.IsFemale, 'vossa senhora', 'vosso senhor' )], [secondary_recipient.Custom('ES_ElLa')] [secondary_recipient.GetTitledFirstName|l], na verdade é um fantoche de seus próprios cortesãos! Toda vez que [secondary_recipient.GetSheHe] ignorava os vossos conselhos, era a mando dessa ralé de baixa extração!"
 fp3_antagonize_character_interaction.recipient_message.06: "Saibam que seu[secondary_recipient.Custom('ES_OA')] [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [secondary_recipient.Custom('ES_ElLa')] [secondary_recipient.GetTitledFirstName|l], tem feito perguntas #italic peligrosas#! sobre a casa [recipient.GetHouse.GetBaseNameNoTooltip]… Levem esta advertência a sério, mas não digam a ninguém que eu lhes informei disto!"
 fp3_antagonize_character_interaction.recipient_message.07: "Vosso[secondary_recipient.Custom('ES_OA')] [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [secondary_recipient.Custom('ES_ElLa')] [secondary_recipient.GetTitledFirstName|l], busca manchar o bom nome da casa [recipient.GetHouse.GetBaseNameNoTooltip] ao afirmar pelas suas costas que você está roubando gado!"
 fp3_antagonize_character_interaction.recipient_message.08: "Vosso[secondary_recipient.Custom('ES_OA')] [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [secondary_recipient.Custom('ES_ElLa')] [secondary_recipient.GetTitledFirstName|l], não para de mandar cartas à minha corte proclamando a \"superioridade\" da casa [recipient.GetHouse.GetBaseNameNoTooltip]. Eu vos peço, façam algo a respeito!"
 fp3_antagonize_character_interaction.recipient_message.09: "[secondary_recipient.Custom('ES_ElLa')|U] [secondary_recipient.GetTitledFirstName|l] vem espalhando rumores desagradáveis sobre você, para depois afirmar que \"era só uma brincadeira\" quando [secondary_recipient.Custom('ES_LoLa')] o pegaram! Pessoas que espalham rumores são terríveis, e mancharam seu nome!"
 fp3_antagonize_character_interaction.recipient_message.10: "Ao que parece, a voss[secondary_recipient.Custom('ES_OA')] [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))][secondary_recipient.Custom('ES_ElLa')] [secondary_recipient.GetTitledFirstName|l], foi pego comendo comida do chão como um cão comum! Na minha humilde opinião, deveríeis trat[recipient.GetHerHim] como tal!"
 fp3_antagonize_character_interaction.recipient_message.11: "Voss[secondary_recipient.Custom('ES_OA')] [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [secondary_recipient.Custom('ES_ElLa')] [secondary_recipient.GetTitledFirstName|l], derrotou [Select_CString( secondary_recipient.IsFemale, 'ela sozinha', 'ele sozinho' )] uma dúzia de assassinos armados. Não contou isso a ninguém para não preocupar a corte, mas achei que devia informar-vos dessa grande façanha para que seus feitos não passem sem reconhecimento!"
 fp3_antagonize_character_interaction.recipient_message.12: "Vocês têm sorte de ter um[secondary_recipient.Custom('ES_XA')] [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))] como [secondary_recipient.Custom('ES_ElLa')] [secondary_recipient.GetTitledFirstName|l]. Soube que, recentemente, ele devolveu uma enorme soma de ouro a um de seus vassalos ao ficar sabendo que o Tesoureiro havia calculado errado o que era devido!"
 fp3_antagonize_character_interaction.recipient_message.13: "Vosso[secondary_recipient.Custom('ES_OA')] [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [secondary_recipient.Custom('ES_ElLa')] [secondary_recipient.GetTitledFirstName|l], recentemente se encontrou com outro membro da [house|lE] [secondary_recipient.GetHouse.GetBaseName], a quem ajudou a resolver uma disputa que poderia ter prejudicado a reputação de [secondary_recipient.GetFirstName] se tivesse dado errado."
 fp3_antagonize_character_interaction.recipient_message.14: "Vosstr[secondary_recipient.Custom('ES_OA')] [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [secondary_recipient.Custom('ES_ElLa')] [secondary_recipient.GetTitledFirstName|l], em verdade não há igual; nunca antes vi alguém tão disposto a defender sua [house|lE] como [secondary_recipient.GetSheHe]. Vós tendes recebido uma grande bênção ao contar com tal [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))] tão dign[secondary_recipient.Custom('ES_OA')] de confiança."
 fp3_antagonize_character_interaction.recipient_message.15: "[secondary_recipient.Custom('ES_ElLa')|U] [secondary_recipient.GetTitledFirstName|l] é uma pessoa maravilhosa, já considerou reavaliar sua percepção sobre [secondary_recipient.GetSheHe]?"
