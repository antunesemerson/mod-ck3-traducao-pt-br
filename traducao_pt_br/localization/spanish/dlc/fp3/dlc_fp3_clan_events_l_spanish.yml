l_spanish:
 ##################################################
 #/|\ ^._.^ /|\  CLAN EVENTS  /|\ ^._.^ /|\
 ##################################################
 #Usury against Unity, by Ola Jentzsch
 fp3_clan.8000.t: "Usura contra a Unidade"
 fp3_clan.8000.desc: "[concerned_one.GetName] se aproxima de mim, aparentemente preocupad[concerned_one.Custom('ES_OA')]. \"Ouvi dizer que [usurer.Custom('ES_ElLa')] [usurer.GetTitledFirstName|l] empresta dinheiro a cortesãos com problemas financeiros, alimentando-se da desgraça deles com juros exorbitantes. Todo mundo diz que é [Select_CString( usurer.IsFemale, 'uma usurária', 'um usurário' )] e precisa prestar contas.\"\n\nQuando confronto meu cortesão, ele apenas sorri."
 fp3_clan.8000.a: "Tempo na masmorra mudará seus modos, [usurer.GetFirstName]."
 fp3_clan.8000.b: "Compartilhe seus ganhos ilícitos, e podemos esquecer disso."
 fp3_clan.8000.c: "Parece algo para resolverem entre vocês."
 fp3_relations_reaction_to_imprisonment.tt: "Os membros do clã e vassalos que gostem de [usurer.Custom('ES_ElLa')] [usurer.GetTitledFirstNameNoTooltip|l] reagirão negativamente a isso."
 #Clan Quarrel, by Ola Jentzsch
 fp3_clan.8001.t: "Disputa no Clã"
 fp3_clan.8001_beginning: "[bickerer_1.Custom('ES_ElLa')|U] [bickerer_1.GetTitledFirstName|l] e [bickerer_2.Custom('ES_ElLa')] [bickerer_2.GetTitledFirstName|l] brigaram recentemente durante uma celebração privada e insistem para que eu tome partido no conflito."
 fp3_clan.8001_faith_schism: "A discordância parece surgir de uma discussão acalorada sobre a natureza de [bickerer_1.GetFaith.PantheonTerm].\n\n[bickerer_1.GetFirstNameNoTooltip] tem opiniões #EMP muito#! discutíveis, afirma [bickerer_2.GetFirstNameNoTooltip]. Eu, em vosso lugar, faria expulsá-l[bickerer_1.Custom('ES_OA')] da corte!\n\n\"Vou poupá-lo dos detalhes horríveis dos supostos argumentos de [bickerer_2.GetFirstNameNoTooltip]\", objeta [bickerer_1.GetFirstNameNoTooltip], \"mas está claro que não podemos continuar assim.\""
 fp3_clan.8001_generic_fallback: "Embora não esteja claro o que exatamente aconteceu, ambos estão ansiosos para me contar em detalhes o que pensam um do outro.\n\n\"[bickerer_2.GetFirstNameNoTooltip] é [Select_CString(bickerer_2.IsFemale,'uma cabeça de vento','um bronco')]\", argumenta [bickerer_1.GetFirstNameNoTooltip].\n\n\"Fiquem calados, seu [bickerer_1.Custom2('InsultNoun', SCOPE.sC('bickerer_2'))]!\", retruca [bickerer_2.GetFirstNameNoTooltip]."
 fp3_clan.8001.a: "É hora de deixar isso para trás, para o bem de todos."
 fp3_clan.8001.b: "[bickerer_1.GetFirstNameNoTooltip] tem alguns pontos válidos, na verdade..."
 fp3_clan.8001.c: "Tenho algo mais importante para fazer... em algum lugar."
 fp3_clan.8001.d: "Me deixe fora disso."
 fp3_clan_making_conflict_worse_flavor: "Você tenta aprofundar a divisão entre [bickerer_1.GetFirstNameNoTooltip] e [bickerer_2.GetFirstNameNoTooltip]."
 fp3_clan.8001.b.success: "Eles caem na sua manipulação"
 fp3_clan.8001.b.failure: "Eles enxergam através do seu engano"
 fp3_clan.8001.b.success.tt: "Você causou uma ruptura no clã"
 fp3_clan.8001.b.failure.tt: "Você falhou em semear a discórdia"
 fp3_clan.8001.a.success: "Você resolveu com sucesso essa divisão"
 fp3_clan.8001.a.success.tt: "Sua mediação teve sucesso"
 fp3_clan.8001.a.failure: "Você só piora as coisas"
 fp3_clan.8001.a.failure.tt: "Sua mediação falhou"
 #Bonds of Faith, by Ola Jentzsch
 fp3_clan.8002.t: "Laços de Fé"
 fp3_clan.8002.desc: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U]\", diz com preocupação meu [chaplain.GetCouncilTitle|l] [chaplain.GetFirstName], \"precisamos falar sobre assuntos espirituais\". Ele faz uma pausa para se certificar de que estamos sozinhos.\n\n\"Ouvi [clan_member.GetName] murmurar sobre quão raramente visitais a [ROOT.Char.GetFaith.HouseOfWorship].\n\nJamais me rebaixaria a especular sobre a vossa relação pessoal com o divino, ó, [ROOT.Char.GetTitleTierName|l]. Mas o quão se #EMP percibe#! vossa piedade é primordial para aqueles que governais\"."
 fp3_clan.8002.a: "Talvez eu tenha falhado e negligenciado meu dever..."
 fp3_clan.8002.b: "Uma doação será reservada para o [ROOT.Char.GetFaith.HouseOfWorship] local."
 fp3_clan.8002.c: "Deixe aqueles tolos crédulos #EMP pensarem#! que eu me importo..."
 fp3_clan.8002.d: "Você disse [clan_member.GetFirstNameNoTooltip]? Vou arrancar sua língua por isso…"
 fp3_clan.8002.e: "Não preciso mentir sobre minha fidelidade."
 fp3_pretending_to_be_pious_flavor: "Você passa mais tempo na [ROOT.Char.GetFaith.HouseOfWorship] - ou melhor, faz as pessoas pensarem que você faz."
 fp3_clan.8002.b.success: "Sua decepção foi bem-sucedida"
 fp3_clan.8002.b.failure: "Você não engana ninguém"
 fp3_clan.8002.b.success.tt: "Sua piedade está além de qualquer reprovação"
 fp3_clan.8002.b.failure.tt: "Sua falsa devoção foi revelada"
 #The Power of a Name, by Ola Jentzsch
 fp3_clan.8003.t: "O Poder de um Nome"
 fp3_clan.8003_fear_opening: "[ROOT.Char.GetName], você se tornou grande entre [ROOT.Char.GetHerHim] s [ROOT.Char.Custom('LevyMenWomen')] e suas obras e nome são respeitados... e temidos. [hof_emissary.GetFirstName], [Select_CString( hof_emissary.IsFemale, 'a enviada', 'o enviado' )] [righteous_caliph.Custom('ES_DelDela')], [righteous_caliph.GetTitledFirstName|l], faz uma pausa com apreensão.\n\n"
 fp3_clan.8003_respect_opening: "[ROOT.Char.GetName], vocês se tornaram grandes entre [ROOT.Char.GetHerHim] s [ROOT.Char.Custom('LevyMenWomen')] e seus feitos e sua casa são respeitados e honrados por todos. [hof_emissary.GetFirstName], [Select_CString( hof_emissary.IsFemale, 'a enviada', 'o enviado' )] [righteous_caliph.Custom('ES_DelDela')] [righteous_caliph.GetTitledFirstName|l], faz uma pausa solene.\n\n"
 fp3_clan.8003_ending: "\"Estas foram as palavras [righteous_caliph.Custom('ES_DelDela')] [righteous_caliph.GetTitleTierName|l]\", então proclama, \"e [righteous_caliph.GetSheHe] decidiu conceder-vos uma grande honra. Vosso nome será lido durante a oração de sexta-feira, no próprio [caliphal_location.GetName]. Tudo o que [righteous_caliph.Custom('ES_ElLa')] [righteous_caliph.GetTitleTierName|l] pede em troca é que não esqueçais sua benevolência ao vos conceder esta bênção...\".\n\nSua voz vai se apagando, como para enfatizar um significado oculto nessas palavras."
 fp3_clan.8003.a: "É uma honra."
 fp3_clan.8003.b: "Lê-lo uma vez será suficiente."
 fp3_clan.8003.c: "Eu não mereço isso."
 #Bonds of Fear, by Ola Jentzsch
 fp3_clan.8004.t: "Laços de Medo"
 fp3_clan.8004.desc: "Meu [murder_enthusiast.Custom('GetCouncilOrCourtPosition')] [murder_enthusiast.GetFirstName] me pediu uma conversa particular, com uma expressão preocupada no rosto.\n\n\"Escutai, ó [ROOT.Char.GetTitleTierName|l]\", diz, quase sussurrando. \"[clan_member.GetName] está tramando algo, provavelmente conspirando contra vós outra vez. Talvez seja hora de agir contra alguém próximo de [clan_member.GetSheHe] para mandar um recado? Ouvi dizer que [clan_member.GetNameNoTooltip] favorece um certo servo…\"."
 fp3_clan.8004.a: "Faça isso, mas seja discreto."
 fp3_clan.8004.b: "Não há necessidade de discrição - apenas os mate sem rodeios."
 fp3_clan.8004.c: "Não, e nunca fale disso novamente."
 fp3_clan.8004.a.success: "Você consegue intimidar [clan_member.Custom('ES_AlAla')] [clan_member.GetTitledFirstNameNoTooltip|l]"
 fp3_clan.8004.a.success.tt: "Você é temido no clã"
 fp3_clan.8004.a.failure: "Seu plano fracassa"
 fp3_clan.8004.a.failure.tt: "[clan_member.Custom('ES_ElLa')|U] [clan_member.GetTitledFirstNameNoTooltip|l] não se abala"
 #A Proper Position, by Ola Jentzsch
 fp3_clan.8005.t: "Uma Posição Adequada"
 fp3_clan.8005.desc: "\"Não é justo\", queixa-se [ambitious_consort.Custom('ES_ElLa')] [ambitious_consort.GetTitledFirstName|l], dando finalmente voz ao ressentimento que parece ter sido acumulado por muito tempo.\n\n\"[heir_child.GetFirstName], [Select_CString( heir_child.IsFemale, 'a mimada', 'o mimado' )] [heir_child.Custom('GetDaughterSon')] [heir_parent.Custom('ES_DelDela')] [heir_parent.GetTitledFirstName|l], herdará o [ROOT.Char.GetPrimaryTitle.GetNameNoTier].\""
 fp3_clan.8005.a: "#EMP Nunca#!, me ouviu? E não ouse falar disso novamente."
 fp3_clan.8005.b: "Isso é absurdo, mas muito bem..."
 fp3_clan.8005.d: "É jovem demais para ostentar um título!"
 fp3_clan.8005.e: "Prometo que receberá uma herança no devido tempo."
 original_heir_upset_flavor: "O herdeiro original do título ficará chateado se você fizer isso."
 fp3_clan.8005.e.success: "Você tranquiliza [ambitious_consort.GetFirstNameNoTooltip]"
 fp3_clan.8005.e.success.tt: "Você apaziguou [ambitious_consort.GetFirstNameNoTooltip]"
 fp3_clan.8005.e.failure: "Você não consegue convencer[ambitious_consort.Custom('ES_LoLa')]"
 fp3_clan.8005.e.failure.tt: "[ambitious_consort.GetFirstNameNoTooltip] desconfia de você"
 fp3_empowered_child.tt: "Daqui a alguns anos, se [empowered_child.GetFirstNameNoTooltip] ainda possuir este título, receberá melhorias em [skill|lE] dependendo de suas [traits|lE] atuais."
 fp3_8007_studies_pay_off_toast: "[empowered_child.GetFirstName] mostra promessa"
 #Smaller Spies, by Ola Jentzsch
 fp3_clan.8006.t: "Espiões Menores"
 fp3_clan.8006.desc: "[paranoia_enthusiast.GetName], meu [paranoia_enthusiast.Custom('GetCouncilOrCourtPosition')|l], parece ter se interessado ultimamente de forma especial por meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('sneaky_child'))] [sneaky_child.GetFirstName].\n\n\"[ROOT.Char.Custom('FormOfAddressForLiege')|U], a situação na casa de [ROOT.Char.GetDynastyHouseNameNoTooltip] está cada vez mais tensa. Vossos parentes não param de conspirar contra vós\", diz, empurrando [sneaky_child.GetFirstNameNoTooltip] para que avance. \n\n\"Mas tenho cultivado uma rede de jovens informantes para ajudar-vos a ganhar vantagem, pois espiões pequenos têm muitos usos… Embora essas crianças sejam plebeias, [sneaky_child.Custom('ES_ElLa')] jovem [sneaky_child.GetLadyLord] [sneaky_child.GetFirstNameNoTooltip] aqui presente tem talentos notáveis e poderia beneficiar-vos…\"."
 fp3_clan.8006.a: "Meu [sneaky_child.Custom('GetDaughterSon')] é um[sneaky_child.Custom('ES_XA')] nobre, não um[sneaky_child.Custom('ES_XA')] espião miserável!"
 fp3_clan.8006.b: "Vá, pequen[sneaky_child.Custom('ES_OA')] , mantenha os olhos abertos para o caso de haver traição em nossa casa…"
 fp3_clan.8006.c: "Aqui, contrate alguns espiões, mas mantenha-se afastada da minha família."
 #Bleeding Them Dry, by Ola Jentzsch
 fp3_clan.8008.t: "Sangrando-os Até o Fim"
 fp3_clan.8008.desc: "Ultimamente, meu implacável cobrador de impostos, [ambitious_tax_collector.GetName], faz algum tempo que ele vinha refletindo em silêncio. Mas parece que, enfim, algo deu frutos, pois ele vem me procurar.\n\n\"[ROOT.Char.Custom('FormOfAddressForLiege')|U], vossos vassalos têm inventado todo tipo de justificativas para não pagar tantos impostos quanto deveriam. Mas eu também posso produzir tais… #italic justificaciones#!…\".\n\nTira um documento de aparência antiga: \"Esta escritura aqui prova que voss[beleaguered_clan_member.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('beleaguered_clan_member'))], [beleaguered_clan_member.Custom('ES_ElLa')] [beleaguered_clan_member.GetTitledFirstName|l], vos deve mais do que se pensava. E também tenho algo para vossos outros súditos…\"."
 fp3_clan.8008.a: "Quanto mais, melhor!"
 fp3_clan.8008.b: "Vamos nos concentrar em [beleaguered_clan_member.Custom('ES_ElLa')] [beleaguered_clan_member.GetTitledFirstNameNoTooltip|l]."
 fp3_clan.8008.c: "Não permitirei que a ganância cause uma divisão em minha casa."
 unlock_extortion.tt: "Desbloqueia a [decision|lE] [extort_subjects|lE] por 20 anos."
 #Popular with the People, by Ola Jentzsch
 fp3_clan.8009.t: "Popular entre o Povo"
 fp3_clan.8009.desc: "\"Além disso, [corrupt_mayor.GetName] é [Select_CString( corrupt_mayor.IsFemale, 'uma administradora', 'um administrador' )] bastante capaz e popular tanto entre o povo de sua possessão quanto entre o de [fawazil_county.GetNameNoTier] como um todo. No entanto, tem o hábito de desviar furtivamente quantias significativas dos tributos que lhe envia.\""
 fp3_clan.8009.a: "Me roubando? Crucifiquem[corrupt_mayor.GetHerHim]!"
 fp3_clan.8009.b: "A lei está do nosso lado; expulsem[corrupt_mayor.GetHerHim]."
 fp3_clan.8009.c: "Pfft, [corrupt_mayor.GetTitleAsNameNoTooltip]? Apenas um pequeno [ROOT.Char.Custom('GetRegionalFish')]."
 fp3_clan.8009.a.success: "Você amedronta os seguidores de [corrupt_mayor.GetFirstNameNoTooltip] para que se submetam"
 fp3_clan.8009.a.failure: "As pessoas ficam mais irritadas do que com medo"
 fp3_clan.8009.a.success.tt: "Sua crueldade foi recompensada"
 fp3_clan.8009.a.failure.tt: "Sua crueldade foi em vão"
 fp3_clan.8009.a.eccentric: "Como ousa me desafiar?!"
 #More Magistrates, by Ola Jentzsch
 fp3_clan.8010.t: "Mais Magistrados"
 fp3_clan.8010_muslim.t: "Qadis Competentes"
 fp3_clan.8010.desc_beginning: "\"Não posso trabalhar assim\", exclama meu/minha coletor[competent_tax_collector.Custom('ES_XA')] de impostos [competent_tax_collector.GetName], [Select_CString( competent_tax_collector.IsFemale, 'frustrada e abatida', 'frustrado e abatido' )].\n\n"
 fp3_clan.8010_muslim_version: "\"Cada #italic sharia#! da [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] é um covil miserável de incompetência, prejudicando todos os meus esforços. Boa arrecadação de impostos precisa de #italic qadis#! competentes, para manter os magnatas locais sob controle, para tornar seu governo justo aos olhos de [ROOT.Char.GetFaith.HighGodNameAlternate] e sua reivindicação à maior parte dos impostos justificada.\n\nVocê deve me fornecer fundos para empregar mais e melhores pessoas nos tribunais, e a autoridade para demitir os qadis corruptos."
 fp3_clan.8010_non_muslim_version: "\"Cada tribunal da [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] é um lugar triste onde a ganância reina sobre a eficiência e a justiça, prejudicando todos os meus esforços. Boa arrecadação de impostos precisa de magistrados competentes, para manter os magnatas locais sob controle, para tornar seu governo justo e sua reivindicação aos impostos justificada.\n\nVocê deve me fornecer fundos para empregar mais e melhores pessoas nos tribunais, e a autoridade para demitir os imbecis atualmente alojados lá."
 fp3_clan.8010.a: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('capable_magistrate_candidate'))] [capable_magistrate_candidate.GetFirstNameNoTooltip] é competente, vocês terão que se conformar com [capable_magistrate_candidate.GetSheHe]."
 fp3_clan.8010.b: "Deixe comigo, fornecerei o que você precisa."
 fp3_clan.8010.c: "Eu pareço feito de dinheiro?"
 tax_farming_capable_courtier_flavor: "Você envia [capable_magistrate_candidate.GetFirstNameNoTooltip] para trabalhar como magistrado[capable_magistrate_candidate.Custom('ES_OA')]."
 increase_aptitude.tt: "Este modificador pode aumentar a [aptitude|lE] de [competent_tax_collector.GetFirstNameNoTooltip]"
 #A Proper Paymaster, by Ola Jentzsch
 fp3_clan.8011.t: "Um Pagador Adequado"
 fp3_clan.8011.desc: "Nunca carente de ideias para melhorar as receitas do senhorio, [competent_tax_collector.GetName] se aproxima de mim enquanto realizo uma inspeção rotineira das tropas.\n\nOh, [ROOT.Char.GetTitleTierName|l], percebi que, em seu próprio domínio, os pequenos potentados locais estão sempre tentando engordar os próprios bolsos às custas de suas tropas. Sugiro que me dê autoridade para supervisionar os pagamentos dos soldados; assim, eu poderia combater a corrupção para garantir que seu exército seja financiado de maneira mais eficiente.\n\nNo entanto, prevejo que [concerned_marshal.Custom('ES_ElLa')] [concerned_marshal.GetTitledFirstName|l] ficará ofendid[concerned_marshal.Custom('ES_OA')], já que tudo o que diz respeito aos seus soldados até agora tem sido o domínio de"
 fp3_clan.8011.a: "De qualquer forma, [concerned_marshal.GetSheHe] já tem coisas demais para resolver…"
 fp3_clan.8011.b: "Você pode compartilhar essa responsabilidade entre vocês."
 fp3_clan.8011.c: "Não, deixarei as coisas como estão."
 fp3_clan.8011.b.success: "[competent_tax_collector.GetFirstNameNoTooltip] e [concerned_marshal.GetFirstNameNoTooltip] concordam relutantemente em colaborar"
 fp3_clan.8011.b.failure: "Ambos detestam essa reforma"
 fp3_clan.8011.b.success.tt: "Você negociou um compromisso"
 fp3_clan.8011.b.failure.tt: "Seu compromisso falhou"
 fp3_clan.8012.t: "A Avareza Auspiciosa"
 fp3_clan.8012.desc: "\"Às vezes, [ROOT.Char.Custom('FormOfAddressForLiege')], as bonanças acontecem\". Meu coletor de impostos[greedy_tax_collector.Custom('ES_XA')], [greedy_tax_collector.GetName], esfrega as mãos com uma satisfação mal contida.\n\n\"Encontrei uma testemunha disposta a depor que [extorted_vassal.Custom('ES_ElLa')] [extorted_vassal.GetTitledFirstName|l] devia a vocês uma quantia significativa em impostos fundiários, convenientemente #italic olvidados#! sobre árvores perenes e moinhos d’água. Tomei a liberdade de coletá-los.\n\nNo entanto, um dos meus servos teve dificuldade para retirar o ouro de [extorted_vassal.GetCapitalLocation.GetName] por causa do assédio dos guardas locais, então talvez vocês precisem ficar de olho em [extorted_vassal.GetFirstNameNoTooltip]...\"."
 fp3_clan.8012.a: "Bom trabalho!"
 fp3_clan.8012.b: "Dê para a minha [ROOT.Char.GetFaith.HouseOfWorship], assim não poderá objetar."
 fp3_clan.8012.c: "Exibirei magnanimidade, devolvendo-lhe parte disso como presente."
 fp3_clan.8013.t: "O Ônus da Arrecadação de Impostos"
 fp3_clan.8013.desc: "Enquanto caminho por meu [ROOT.Char.Custom('ResidenceBuilding')], passo pela biblioteca, onde meu arrecadador[stressed_tax_collector.Custom('ES_XA')], [stressed_tax_collector.GetName], em um estado bastante abatido.\n\n\"Oh, [ROOT.Char.GetFaith.HighGodNameAlternate]\", murmura para si. \"Não consigo fazer isso. Estes tratados de direito tributário são antigos demais, vagos demais e desorganizados demais. Como vou encontrar alguma coisa aqui?\n\nSó queria conferir um pequeno detalhe antes de sair novamente para as províncias...\"."
 fp3_clan.8013.a: "Acalme-se, podemos dar uma olhada juntos."
 fp3_clan.8013.b: "Faça seu trabalho, ou mandarei açoitar você!"
 fp3_clan.8013.c: "Apenas continuarei andando..."
 fp3_clan.8013.a.success: "Você tranquiliza [stressed_tax_collector.GetFirstNameNoTooltip]"
 fp3_clan.8013.a.failure: "[stressed_tax_collector.GetSheHe|U] continua a desesperar"
 fp3_clan.8013.b.success: "Você assusta [stressed_tax_collector.GetFirstNameNoTooltip] a trabalhar mais"
 fp3_clan.8013.b.failure: "Sua intimidação tem pouco efeito"
 fp3_clan.8013.a.success.tt: "[stressed_tax_collector.GetFirstNameNoTooltip] ganhou um novo foco"
 fp3_clan.8013.a.failure.tt: "[stressed_tax_collector.GetFirstNameNoTooltip] se tornou descuidado[stressed_tax_collector.Custom('ES_OA')]"
 fp3_clan.8013.b.success.tt: "[stressed_tax_collector.GetFirstNameNoTooltip] tem medo de você"
 fp3_clan.8013.b.failure.tt: "[stressed_tax_collector.GetFirstNameNoTooltip] percebeu sua ameaça"
 fp3_clan.8015.t: "Descendência Escandalosa"
 fp3_clan.8015.desc: "[concerned_parent.GetName] entra em meu salão, arrastando consigo seu/sua [scandalous_scion.Custom('GetDaughterSon')], [scandalous_scion.GetFirstName], que não parece muito feliz.\n\n\"Meu [ROOT.Char.GetTitleTierName|l]\", diz [concerned_parent.GetFirstNameNoTooltip]. \"Talvez tenhais ouvido falar de como [Select_CString( scandalous_scion.IsFemale, 'esta minha filha', 'este meu filho' )] anda confraternizando nos clubes de #EMP futuwwa#!.\""
 fp3_clan.8015.a: "Muito bem, pode se juntar à minha corte."
 fp3_clan.8015.b: "É o fruto de suas entranhas, não das minhas."
 fp3_clan.8016.t: "Caos no Hammam"
 fp3_clan.8016.opening_desc: "Enquanto eu desfrutava de um banho relaxante com meu [chaplain.GetCouncilTitle|l], [chaplain.GetFirstName], de repente ele traz à tona um assunto mais sério.\n\n\"[ROOT.Char.Custom('FormOfAddressForLiege')|U]\", sussurra, \"ontem à noite [scandalous_clan_member.GetName] esteve aqui, na casa de banhos, com uma comitiva de canalhas mal barbeados"
 fp3_clan.8016.deviant_desc: ", desviados e um burro."
 fp3_clan.8016.drunkard_desc: ", beberrões e devassos."
 fp3_clan.8016.rakish_desc: ", prostitutas e degenerados."
 fp3_clan.8016.hashishiyah_desc: "e delinquentes alucinados por drogas."
 fp3_clan.8016.ending_desc: "Em seguida, entregaram-se a atos que mal ouso descrever e mostraram-se relutantes em ser expulsos das instalações. E este está longe de ser o primeiro delito de [scandalous_clan_member.GetFirstNameNoTooltip]\". [chaplain.GetFirstNameNoTooltip] faz uma pausa, olhando apreensivo.\n\n\"Deveríeis denunciar[scandalous_clan_member.GetHerHim], antes que suas inclinações se tornem uma mancha para toda a casa\"."
 fp3_clan.8016.a: "Muito bem, [scandalous_clan_member.GetHerHim] o repreenderei"
 fp3_clan.8016.b: "Não, eu apoio os membros da minha família, quaisquer que sejam suas diversões."
 fp3_clan.8017.t: "Uma Posição Questionável"
 fp3_clan.8017.opening_desc: "\"[tax_collector.GetName] tem servido por algum tempo como seu[tax_collector.Custom('ES_OA')] coletor de impostos[tax_collector.Custom('ES_XA')] em minhas terras e tem feito um trabalho bastante aceitável, mas também começou a agir como supervisor[tax_collector.Custom('ES_XA')] da moral pública\".\n[unclan_taxpayer.Custom('ES_ElLa')|U] [unclan_taxpayer.GetTitledFirstName|l] parece preocupad[unclan_taxpayer.Custom('ES_OA')] e talvez um pouco culpado.\n\n"
 fp3_clan.8017.overly_eager.desc: "\"[tax_collector.GetNameNoTooltip] tem sido excessivamente zelos[tax_collector.Custom('ES_OA')] e mandou açoitar súditos pela menor infração: desde travessuras inofensivas de bêbados até tocar música nas ruas, ou homens e mulheres se misturarem brevemente nos banhos...\"."
 fp3_clan.8017.corrupt.desc: "Ai, parece que [tax_collector.GetNameNoTooltip] não tem sido nem íntegro nem justo[tax_collector.Custom('ES_OA')] ao aceitar prata em troca de fechar os olhos."
 fp3_clan.8017.cruel.desc: "Temo que [tax_collector.GetNameNoTooltip] demonstrou ser bastante cruel e ansioso para usar o açoitamento ou até mesmo o apedrejamento como punições para os crimes mais leves."
 fp3_clan.8017.generic.desc: "Ser fervoroso[tax_collector.Custom('ES_OA')] , corrupto[tax_collector.Custom('ES_OA')] ou cruel não é um vício, mas os locais [tax_collector.GetHerHim] o odeiam."
 fp3_clan.8017.ending.desc: "\n\n\"Por favor, sei que [tax_collector.GetFirstNameNoTooltip] é sua[tax_collector.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('tax_collector'))], mas você precisa dizer a ele para parar\"."
 fp3_clan.8017.a: "[tax_collector.GetSheHe|U] está fazendo o trabalho de [ROOT.Char.GetFaith.HighGodNameAlternatePossessive]."
 fp3_clan.8017.b: "Do que você tem medo que [tax_collector.GetNameNoTooltip] descubra?"
 fp3_clan.8017.c: "Muito bem, mas não esqueça deste favor."
 fp3_clan.8017.d: "Vocês devem resolver isso entre vocês."
 fp3_clan_protect_kinsman_flavor: "Você protege [tax_collector.GetNameNoTooltip] contra essas acusações"
 fp3_clan_accuse_accuser_flavor: "Ameaçar [unclan_taxpayer.Custom('ES_AlAla')] [unclan_taxpayer.GetTitledFirstNameNoTooltip|l] fará com que repense seu pedido"
 fp3_clan.3000.t: "Tulipas Devastadas"
 fp3_clan.3000.desc: "Hoje, o clima agradável me havia convidado a ir ao jardim.\nAqui foram plantadas meticulosamente, fileira após fileira, as flores mais bonitas de [fp3_clan_3000_loc_loc.GetNameNoTooltip] para meu prazer pessoal.\n\nNo entanto, meu prazer é interrompido quando, ao ir visitar meus preciosos tulipas, minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('fp3_clan_3000_bad_child'))] [fp3_clan_3000_bad_child.GetFirstName] arrancou sem piedade as belas tulipas de seu lugar para dá-las de presente a seu [SCOPE.sC('fp3_clan_3000_bad_child').Custom2('RelationToMeShort', SCOPE.sC('fp3_clan_3000_random_family_member'))]. \"Olha, encontrei umas flores bonitas; acho que [fp3_clan_3000_random_family_member.GetFirstName] vai gostar delas!\"."
 fp3_clan.3000.a: "Que fofo, sua [SCOPE.sC('fp3_clan_3000_bad_child').Custom2('RelationToMeShort', SCOPE.sC('fp3_clan_3000_random_family_member'))] vai adorar!"
 fp3_clan.3000.b: "Saia do meu jardim! #italic Devolva essas flores!!#!"
 fp3_clan.3000.c: "Que tal plantarmos o próximo lote juntos?"
 fp3_clan.3000.c.flavor: "Você aproveita essa oportunidade para ensinar [fp3_clan_3000_bad_child.GetFirstNameNoTooltip] as alegrias da jardinagem"
 fp3_clan.3000.d: "É isso. #italic Vou transformar você em adubo.#!"
