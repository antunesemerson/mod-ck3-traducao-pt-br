l_spanish:
 #Struggle
 game_concept_persian_struggle: "Intermezzo Iraniano"
 game_concept_persian_struggle_desc: "O $game_concept_persian_struggle$ mostra o turbulento declínio do califado abássida, durante o qual a Mesopotâmia foi devastada por revoltas e lutas pelo poder, e vários governantes persas proclamaram sua independência.\n\nEmbora os [characters|lE] [Concept( 'struggle_involved', 'envolvidos' )|E] possam ter muitos objetivos, a maioria vai querer se tornar um [GetTrait('fp3_struggle_supporter').GetName( GetNullCharacter )|l] e trabalhar para restaurar o poder do califado, ou um [GetTrait('fp3_struggle_detractor').GetName( GetNullCharacter )|l] e tentar destruí-lo.\n\nA [struggle|lE] oscilará entre duas [struggle_phase_phases|lE]: [struggle_persia_phase_unrest|lE] e [struggle_persia_phase_stabilisation|lE]."
 #Legacy Track Stuff
 game_concept_kindle_royal_fire_decision: "Decisão Acender Fogo Real"
 game_concept_kindle_royal_fire_decision_desc: "Uma [decision|lE] que permite que você acenda um fogo real, ganhando bônus para a [health|lE] e o [dynasty_prestige|lE]."
 game_concept_fp3_embellish_capital_decision: "Decisão de $fp3_embellish_capital_decision_name$"
 game_concept_fp3_embellish_capital_decision_desc: "Uma [decision|lE] que permite melhorar sua [capital|lE] ao custo de um [county|lE] recentemente conquistado"
 game_concept_master_assassin: "Mestre Assassino"
 game_concept_master_assassin_desc: "O $game_concept_master_assassin$ é um [court_position|lE] habilitado por [faiths|lE] com o [core_tenet|lE] [GetFaithDoctrine('tenet_fp3_fedayeen').GetBaseName|l]. O [master_assassin|lE] é um fanático perigoso que trabalha com assassinos menores para matar aqueles que considera inimigos de sua fé."
 game_concept_assassin: "Assassino"
 game_concept_research_project: "Projeto de Pesquisa"
 game_concept_research_projects: "Projetos de Pesquisa"
 game_concept_research_project_desc: "Um Projeto de Pesquisa é uma [inspiration|lE] que depende da [aptitude|lE] de um $court_scholar_court_position$ para trazer benefícios ao seu empregador.\n\nEm alguns casos raros, o Projeto de Pesquisa pode descobrir uma nova [innovation|lE]."
 game_concept_ending_phase: "Fase Final"
 game_concept_ending_phase_desc: "Uma $game_concept_ending_phase$ é um tipo especial de [struggle_phase|lE] que encerra a [struggle|lE] quando é ativada. Os [characters|lE] [Concept( 'struggle_involved', 'envolvidos' )|E] e [Concept( 'struggle_interloper', 'entrometidos' )|E] podem avançar normalmente em direção à fase final, usando [struggle_catalyst_catalysts|lE]."
 game_concept_struggle_ending_decision: "Decisão Final"
 game_concept_struggle_ending_decisions: "Decisões Finais"
 game_concept_struggle_ending_decision_desc: "Uma $game_concept_struggle_ending_decision$ é uma [decision|lE] única que encerra uma [struggle|lE]. Tais decisões muitas vezes só estão disponíveis durante algumas [struggle_phase_phases|lE] em particular."
 game_concept_struggle_persia_phase_stabilisation: "Estabilização"
 game_concept_struggle_persia_phase_stabilisation_desc: "Apesar dos problemas que se aproximam, o califa ainda inspira respeito. As rebeliões e o faccionalismo estão em retrocesso, mas não será fácil dobrar os senhores da Pérsia.\n\nA tensão poderia evoluir para [struggle_persia_phase_unrest|lE], o que significaria mais caos no futuro."
 game_concept_struggle_persia_phase_unrest: "Inquietação"
 game_concept_struggle_persia_phase_unrest_desc: "Atingido por rebeliões e intrigas, o califado desmorona. Tanto ambiciosos líderes militares quanto astutos governadores se agarram a qualquer poder que possam usurpar, em constante disputa.\n\nCom o tempo, a menos que a situação seja resolvida por meio de uma [ending_phase|lE], o reino entrará em uma fase de [struggle_persia_phase_stabilisation|lE] à medida que os apoiadores desesperados recuperam a autoridade califal."
 game_concept_struggle_persia_phase_concession: "Concessão"
 game_concept_struggle_persia_phase_concession_desc: "Com o tempo, à medida que as tensões na Pérsia se acalmam e tanto apoiadores quanto detratores do Califado se cansam do derramamento constante de sangue, o [persian_struggle|lE] pode chegar ao fim naturalmente: não com um estrondo, mas com um sussurro."
 game_concept_fp3_request_turkic_invasion_interaction: "$fp3_request_turkic_invasion_interaction$"
 game_concept_fp3_request_turkic_invasion_interaction_desc: "Financie qualquer [ruler|lE] de herança turca para conquistar qualquer um dos governantes vizinhos."
 game_concept_fp3_install_loyalist_cb: "Instalar um Apoiador"
 game_concept_fp3_install_loyalist_cb_desc: "Permite que você declare uma [war|lE] para instalar um [GetTrait('fp3_struggle_supporter').GetName( GetNullCharacter )|l] do califado à frente do [realm|lE] alvo"
 game_concept_fp3_demand_submission_interaction: "$fp3_demand_submission_interaction$"
 game_concept_fp3_demand_submission_interaction_desc: "Exija a lealdade de um [character|lE] na forma de um [hook|lE] por meio do uso de piedade, astúcia ou intimidação."
 game_concept_fp3_request_house_unity_change_interaction: "$fp3_request_house_unity_change_interaction$"
 game_concept_fp3_request_house_unity_change_interaction_desc: "$fp3_request_house_unity_change_interaction_desc$"
 game_concept_fp3_request_honorary_titles_interaction: "$fp3_request_honorary_titles_interaction$"
 game_concept_fp3_request_honorary_titles_interaction_desc: "$fp3_request_honorary_titles_interaction_desc$"
 game_concept_fp3_free_house_member_cb: "$fp3_free_house_member_cb_name$"
 game_concept_fp3_free_house_member_cb_desc: "Uma [casus_belli|lE] disponível para [house_heads|El] que obriga o alvo a libertar todos os membros [Concept( 'imprisoned', 'aprisionados' )|E] da [house|lE]."
 game_concept_fp3_unify_house_cb: "$fp3_unify_house_cb_name$"
 game_concept_fp3_unify_house_cb_desc: "Um [casus_belli|lE] que permite a um [house_head|E] reivindicar membros da [house|lE] de outro [realm|lE] como [Concept( 'vassal', 'vassalos' )|E]."
