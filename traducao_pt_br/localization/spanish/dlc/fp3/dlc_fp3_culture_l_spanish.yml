 tradition_fp3_enlightened_magnates_name: "Magnatas Iluminados"
 tradition_fp3_enlightened_magnates_desc: "Esta cultura tem uma herança célebre de astúcia administrativa e habilidade poética. Um bom governante deve possuir uma mistura gloriosa de ambos - ou procurar conselhos daqueles que a possuem."
