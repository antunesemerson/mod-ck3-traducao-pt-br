l_spanish:
 ###################################
 #Regiments
 ###################################
 asawira: "Asawira"
 asawira_flavor: "#F As fileiras dos Asawira são compostas por nobres iranianos habilidosos com lança e arco. Agora restaurados como uma força militar, eles estão prontos para atacar os inimigos da Pérsia.#!"
 tarkhan: "Tarkhans"
 tarkhan_flavor: "#F Cavalaria de elite das estepes, a combinação de lança, maça e arco dos Tarkhans pode quebrar quase qualquer defesa.#!"
 zupin_warrior: "Lanceiros Zupin"
 zupin_warrior_flavor: "#F Esses guerreiros Daylamitas são uma força altamente flexível, igualmente capazes de formar fortes paredes de escudos e se espalhar para arremessar suas lanças curtas no inimigo.#!"
 tawashi: "Tawashi"
 tawashi_flavor: "#F Esta força de cavalaria flexível combina espada, lança e arco para defender suas terras montanhosas de intrusos.#!"
 ###################################
 #Court Positions
 ###################################
 master_assassin_court_position: "Mestre Assassino"
 master_assassin_court_position_desc: "Vinculado pela fé ou credo, o Mestre Assassino auxilia seu suserano com abordagens não convencionais para a guerra, espionagem, terror e assassinato."
 has_no_particular_noble_roots_trigger: "É [lowborn|lE] ou de uma [dynasty|lE] insignificante"
 court_scholar_court_position: "Erudito da Corte"
 court_scholar_court_position_desc: "O erudito da corte, que representa o corpo intelectual do seu domínio, auxilia na descoberta de [innovations|lE] futuras."
 ###################################
 #Buildings
 ###################################
 building_type_sar_i_sang_mines_01: "Minas de Sar-i Sang"
 building_type_sar_i_sang_mines_01_desc: "A principal fonte de lápis-lazúli no mundo, as minas de Sar-i Sang estão ativas desde tempos pré-históricos, e suas pedras azuis podem ser vistas em todas as cortes da antiguidade. Trabalhadores locais se esforçam aqui dia e noite para extrair as cobiçadas pedras azuis."
 building_sar_i_sang_mines_01: "Mina Antiga de Sar-i Sang"
 building_sar_i_sang_mines_01_desc: "$building_type_sar_i_sang_mines_01_desc$"
 building_sar_i_sang_mines_02: "Mina Restaurada de Sar-i Sang"
 building_sar_i_sang_mines_02_desc: "Os túneis antigos foram expandidos e seguros, e engenheiros foram trazidos para abrir um novo poço, e novas possibilidades."
 building_sar_i_sang_mines_03: "Mina de Sar-i Sang Expandida"
 building_sar_i_sang_mines_03_desc: "À medida que as operações de mineração crescem, as próprias minas também crescem. Mais entradas são construídas, e o poço antigo fica cada vez mais profundo."
 building_sar_i_sang_mines_04: "Complexo de Mineração de Sar-i Sang"
 building_sar_i_sang_mines_04_desc: "A extração de pedras de lápis-lazúli atingiu uma escala quase industrial, com milhares de trabalhadores. Esta antiga montanha, uma vez remota, é agora o centro de uma economia vibrante."
 ###################################
