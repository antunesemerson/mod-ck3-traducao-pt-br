 culture_parameter_pragmatic_traits_county_opinion_modifiers: "Os [traits|lE] [GetTrait('diligent').GetName( GetNullCharacter )|l] e [GetTrait('shrewd').GetName( GetNullCharacter )|l] concedem [county_opinion|lE]"
 culture_parameter_unlock_maa_zupin_warrior: "Pode recrutar [GetMaA('zupin_warrior').GetName|l] como [men_at_arms|lE]."
 culture_parameter_innovative_traits_more_valued: "Os [traits|lE] [GetTrait('lifestyle_gardener').GetName( GetNullCharacter )|l], [GetTrait('patient').GetName( GetNullCharacter )|l] e [GetTrait('scholar').GetName( GetNullCharacter )|l] concedem um bônus de [tax|lE] em desertos, terras áridas e montanhas desérticas"
