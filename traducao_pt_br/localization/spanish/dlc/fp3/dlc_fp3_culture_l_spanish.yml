 #Olde Traditions
 ###################################
 #Turko-Iranian
 tradition_fp3_frontier_warriors_name: "Guerreiros da Fronteira"
 tradition_fp3_frontier_warriors_desc: "Esta cultura está em constante luta para domar a fronteira selvagem, utilizando uma mistura volátil de soldados de elite, mercenários tribais e voluntários fanáticos."
 tradition_fp3_irrigation_experts_name: "Especialistas em Irrigação"
 tradition_fp3_irrigation_experts_desc: "Esta cultura é mestra em tecnologia da água e, por meio da inventividade e esforço comunitário, pode fazer até os desertos mais áridos florescerem."
 tradition_fp3_beacon_of_learning_name: "Farol do Conhecimento"
 tradition_fp3_beacon_of_learning_desc: "Nexo de erudição grega, indiana e árabe, esta cultura se orgulha do avanço científico."
 culture_parameter_can_appoint_court_scholar: "Pode nomear o #high $court_scholar_court_position$#! [court_position|lE]"
 culture_parameter_guardian_education_better_outcomes: "Os [guardians|lE] desta cultura t?m maior probabilidade de conceder melhores [education_traits|lE] a seus [wards|lE]"
 tradition_fp3_jirga_name: "Jirga"
 tradition_fp3_jirga_desc: "Os anciãos e líderes desta cultura podem convocar assembleias segundo seu antigo código tribal para resolver disputas e coroar reis de suas terras."
 tradition_fp3_pragmatic_creed_name: "Credo Pragmático"
 tradition_fp3_pragmatic_creed_desc: "Os guerreiros desta cultura não estão presos a pompas e enfatizam o valor e a adaptabilidade do soldado comum em detrimento da elite montada tradicional."
 tradition_fp3_fierce_independence_name: "Independência Feroz"
 tradition_fp3_fierce_independence_desc: "Ao longo dos anos, muitos tiranos tentaram suprimir essa cultura. No entanto, por meio de resiliência e conquistas militares, ela sobreviveu."
 not_of_central_asian_heritage_desc: "A [culture|lE] não é de [heritage|lE] iraniano, tocário, túrquico ou mongólico"
 culture_on_eastern_frontier_desc: "A [culture|lE] não possui #V 20%#! de seus [counties|lE] em [GetGeographicalRegion('world_transoxiana').GetName], [GetGeographicalRegion('world_khorasan').GetName] ou [GetGeographicalRegion('world_steppe_tarim').GetName]."
 culture_not_iranian_desc: "A [culture|lE] não é de [heritage|lE] iraniana"
 steppe_or_desert_percentage_desc: "A [culture|lE] não tem #V 30 %#! de seus [counties|lE] em [terrain|lE] de estepe ou deserto"
 culture_parameter_unlock_maa_tarkhan: "Pode recrutar [GetMaA('tarkhan').GetName|l] como [men_at_arms|lE]."
 culture_parameter_faith_warrior_traits_more_valued: "Os [traits|lE] [GetTrait('faith_warrior').GetName( GetNullCharacter )|l] e [GetTrait('order_member').GetName( GetNullCharacter )|l] são vistos como [Concept( 'prestigious', 'prestigiosos' )|E] [prestige_i]"
 culture_parameter_tribal_elective_enabled: "Pode promulgar a [succession_law|lE] [GetLaw('tribal_elective_succession_law').GetName|l]."
