l_spanish:
 clan_event.2000.t: "Aprendendo no Trabalho"
 clan_event.2000.desc: "Parece que meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('improved_tax_collector'))|l] [improved_tax_collector.GetName] tem trabalhado excepcionalmente bem ultimamente. E, assim, surgiu uma oportunidade que me permitiria orientar e influenciar enormemente seu trabalho no futuro próximo.\n\nTalvez esta seja a oportunidade de aprimorar ainda mais suas habilidades?"
 clan_event.2000.a: "Atender às necessidades do povo."
 clan_event.2000.b: "Organizar patrulhas de guarda. #EMP Isso#! manterá os vassalos na linha."
 clan_event.2000.c: "Manter um livro-caixa e organizar seu trabalho."
 clan_event.2000.d: "Espiar meus súditos. Você aprenderá muito mantendo um olhar atento."
 clan_event.2000.d.tt: "Se houver um segredo desconhecido disponível, aprenda um segredo de um vassalo taxado por [improved_tax_collector.GetName]."
 clan_event.2000.e1: "Dedicar seu tempo a estudos acadêmicos."
 clan_event.2000.e2: "Dedicar seu tempo a assuntos de fé. Ninguém está acima de [ROOT.Char.GetFaith.HighGodName]."
 clan_event.2000.option_f: "Você está aqui para coletar impostos, não é? Então, #EMP me#! traga impostos!"
 clan_event.2000.g: "Fale favoravelmente de mim enquanto viaja."
 clan_event.2000.a.success: "[improved_tax_collector.GetNameNoTooltip] agradou os vassalos"
 clan_event.2000.b.success: "[improved_tax_collector.GetNameNoTooltip] deixa os vassalos nervosos"
 clan_event.2000.c.success: "[improved_tax_collector.GetNameNoTooltip] melhora a arrecadação de impostos"
 clan_event.2000.d.success: "[improved_tax_collector.GetNameNoTooltip] descobriu um segredo"
 every_taxed_vassal_tt: "Todo [taxpayer|lE] atribuído a [tax_collector_name.GetName]"
 clan_event.2001.t: "Impostos Educacionais"
 clan_event.2001.opening_desc: "Parece que [educational_tax_collector.GetName] aprendeu bastante em suas funções como coletor de impostos. O que fica bem claro quando [educational_tax_collector.GetSheHe] relata suas tarefas mais recentes.\n\n"
 clan_event.2001.education_diplomacy: "\"... e consegui resolver toda a situação apenas com palavras! A maravilhosa arte da diplomacia.\""
 clan_event.2001.education_martial: ""… mas aproveitei bem os soldados que me acompanhavam, que se certificaram de que recebêssemos cada única moeda que lhe deviam, meu [ROOT.Char.GetLadyLord]!"."
 clan_event.2001.education_stewardship: "… resulta que fiquei #EMP mucho#! por manter registros tão detalhados. A partir de agora, vou garantir que trarei os livros-caixa comigo."
 clan_event.2001.education_intrigue: "\"... depois de algumas ameaças veladas, finalmente pagaram e pude seguir meu caminho. Fico pensando se terei que cuidar das minhas costas quando for lá na próxima vez...\""
 clan_event.2001.education_learning: "\"... e então acabamos em um debate acalorado. Naturalmente, usei uma lógica superior para vencer a argumentação. No final, eles estavam até #EMP felizes#! em pagar aquelas últimas moedas!\""
 clan_event.2001.a: "Impostos beneficiam a ambos!"
 clan_event.2001.b: "Certamente você poderia fazer melhor?"
 clan_event.2001.success: "Habilidade aumentada de [educational_tax_collector.GetNameNoTooltip]"
 clan_event.2002.t: "Coletor de Impostos Sobrecarregado"
 clan_event.2002.desc: "A hora está avançada, mas vejo um lampejo de luz vindo da sala ao lado, onde a porta foi deixada entreaberta. Empurro a porta com cuidado e encontro meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('troubled_tax_collector'))|l] [troubled_tax_collector.GetName], de olhos pesados, curvado[troubled_tax_collector.Custom('ES_OA')] sobre um livro-caixa aberto. Há outra pilha de livros-caixa ao lado de [troubled_tax_collector.GetSheHe].\n\nEleva a cabeça e percebe minha presença: \"Oh, perdoe-me, meu [ROOT.Char.GetLadyLord], mas ainda preciso organizar estas últimas contas de impostos...\"."
 clan_event.2002.a: "Permita-me ajudar!"
 clan_event.2002.b: "Por que você não tira um descanso?"
 clan_event.2002.c: "Bom. Meus vassalos #EMP esperam#! que seus impostos sejam tratados eficientemente..."
 clan_event.2005.t: "Oferecendo uma Substituição"
 clan_event.2005.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('loyal_vassal'))] [loyal_vassal.GetName] apareceu inesperadamente em minha corte, trazendo consigo um[tax_collector_replacement.Custom('ES_XA')] [tax_collector_replacement.GetWomanMan].\n\n“Ó grande [ROOT.Char.GetTitleAsNameNoTooltip|l]! Não me passou despercebido que seu[bad_tax_collector.Custom('ES_OA')] cobrador de impostos[bad_tax_collector.Custom('ES_XA')] , [bad_tax_collector.GetName] , por assim dizer, #EMP carece#! das habilidades necessárias para desempenhar seu trabalho adequadamente. Portanto, trago-lhe um presente.”\n\n[loyal_vassal.GetFirstNameNoTooltip] faz sinal para seu acompanhante; “[tax_collector_replacement.GetName] lhe servirá admiravelmente.”"
 clan_event.2005.a: "Um presente muito apreciado!"
 clan_event.2005.b: "Podeis ficar com vosso[tax_collector_replacement.Custom('ES_OA')] servo[tax_collector_replacement.Custom('ES_EA')]. Com a vossa lealdade me basta."
 clan_event.2005.c: "[bad_tax_collector.GetNameNoTooltip] simplesmente terá que trabalhar mais..."
 clan_event.2007.t: "Um Livro-caixa Problemático"
 clan_event.2007.desc: "Estou há horas encarando este estúpido livro-caixa. Está #EMP evidente#! claro que não bate. Ainda assim, não consigo encontrar o problema de fato…\n\nDe repente, percebo que meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('helping_tax_collector'))] [helping_tax_collector.GetName] me olha por cima do ombro, examinando o livro à minha frente. Ele/Ela bate com o dedo na parte de cima da página.\n\n“Talvez vocês queiram começar por aí, [ROOT.Char.Custom('FormOfAddressForLiege')]”."
 clan_event.2007.a: "Ehm. Talvez você pudesse me ajudar com isso?"
 clan_event.2007.b: "Eu consigo lidar com isso sozinho, muito obrigado."
 clan_event.2007.c: "Você acabou de se oferecer para cuidar disso[helping_tax_collector.Custom('ES_OA')]? Muito obrigado!"
 clan_event.2007.success_tt: "Você supera o livro-caixa e encontra o problema"
 clan_event.2007.success: "Você classificou com sucesso o livro-caixa"
 clan_event.2007.failure_tt: "Você não consegue entender"
 clan_event.2007.failure: "O livro-caixa continua uma bagunça caótica"
 clan_event.2007.tt: "#weak [helping_tax_collector.GetName] encontra irregularidades adicionais no livro-caixa, onde alguns pequenos detentores de terras lhe devem impostos.#!"
 clan_event.2007.successful_tax_collector: "[helping_tax_collector.GetName] coletou os impostos em falta"
 fp3_efficient_tax_collector: "Coletor de Impostos Habilidoso"
 fp3_efficient_tax_collector_desc: "Um coletor de impostos no governo deste personagem é especialmente habilidoso e não deixa uma única pedra sem ser virada em busca de moedas."
 fp3_outrageous_tax_collection_opinion: "Indignado com a tributação"
 fp3_diplomatic_tax_collection_opinion: "Satisfeito com [tax_collector|lE]"
 fp3_thankful_tax_collector_opinion: "Grato"
