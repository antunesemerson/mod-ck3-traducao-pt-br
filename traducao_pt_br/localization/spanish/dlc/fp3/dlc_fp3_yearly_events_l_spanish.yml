l_spanish:
 ##################################################
 #IRANIAN INTERMEZZO FRONTIER FLAVOR EVENTS
 ##################################################
 fp3_yearly.2000.t: "Sensores da Luz do Dia"
 fp3_yearly.2000.desc_drinking: "A noite toda eu estive bebendo com meus colegas vassalos e companheiros. Enquanto saboreio o último gole da bebida matinal,"
 fp3_yearly.2000.desc_hashish: "A noite toda eu tenho compartilhado haxixe com meus colegas vassalos e companheiros até o sol nascer. Enquanto roubo o último pedaço dos bolos de haxixe,"
 fp3_yearly.2000.desc_warning: "[cautious_vassal.Custom('ES_ElLa')] [cautious_vassal.GetTitledFirstName|l] me puxa de lado em meu estado de euforia:\n\n\"Se o #italic muhtasib#! [prudish_liege.Custom('ES_DelDela')] [prudish_liege.GetTitledFirstName|l] os vir assim no bazar, fará com que vos prendam e vos agridam com o chicote. Descansem aqui dentro até a oração #italic dhuhr#! da tarde e depois vão quando estiverem sóbrios[ROOT.Char.Custom('ES_OA')]\"."
 fp3_yearly.2000.a: "Sim, você sabe melhor."
 fp3_yearly.2000.b: "[prudish_liege.Custom('ES_ElLa')|U] [prudish_liege.GetTitleAsNameNoTooltip|l] jamais me prenderia!"
 fp3_yearly.2000.b_flavor: "Creio que [prudish_liege.Custom('ES_ElLa')] [prudish_liege.GetTitledFirstName|l] jamais me faria mal de propósito em nome da lei [prudish_liege.GetFaith.GetAdjective]."
 fp3_yearly.2000.b_success: "Eu volto para casa em segurança"
 fp3_yearly.2000.b_failure: "O #italic muhtasib#! [prudish_liege.Custom('ES_DelDela')] [prudish_liege.GetTitledFirstName|l] me pega e me chicoteia"
 fp3_yearly.2001.t: "Embriaguez Pública"
 fp3_yearly.2001.desc_intro: "Meus #italic muhtasib#! me informam que [intoxicated.Custom2('MyCharacterIntroduction', ROOT.Char)] está vagando pelo bazar,"
 fp3_yearly.2001.desc_drinking: "tropeçando e balbuciando seu discurso,"
 fp3_yearly.2001.desc_hashish: "rir e olhar para as nuvens"
 fp3_yearly.2001.desc_outro: "a plena luz do dia, nada menos!\n\nA punição normal por esse comportamento libertino, me informam, é prender e açoitar est[intoxicated.Custom('ES_EA')] crente desorientad[intoxicated.Custom('ES_OA')]."
 fp3_yearly.2001.a: "Poupe a vara..."
 fp3_yearly.2001.b: "[ROOT.Char.GetFaith.HighGodName] perdoará, desta vez."
 fp3_yearly.2010.t: "Alqueires de Trigo"
 fp3_yearly.2010.desc: "Não chegaram aos meus ouvidos notícias de secas ou fomes, mas o povo de [bakers_county.GetNameNoTier] reclama que o pão está ficando caro de maneira injustificável.\n\n\"É o seu padeiro real [greedy_baker.Custom('ES_OA')] [greedy_baker.Custom('ES_OA')] local, [greedy_baker.GetFirstName]\", me diz [random_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)]. \"Ele/Ela comprou todas as cargas de trigo e farinha que entram na cidade e não nos permite comprar nem mesmo um único #italic mun#! para nós.\""
 fp3_yearly.2010.a: "Será lançado sob os pés de"
 fp3_yearly.2010.a.tt: "[greedy_baker.GetFirstName] acaba sendo pisotead[greedy_baker.Custom('ES_OA')] e compensamos a falta de trigo local para apaziguar os"
 fp3_yearly.2010.a_elephants: "elefantes!"
 fp3_yearly.2010.a_camels: "camelos!"
 fp3_yearly.2010.a_horses: "cavalos!"
 fp3_yearly.2010.b: "Fascinante, devo mantê-[greedy_baker.GetHerHim] ao meu lado."
 fp3_yearly.2010.c: "O verdadeiro crime é esconder esses lucros de mim."
 fp3_yearly.2020.t: "Ajustar a Balança"
 fp3_yearly.2020.desc_intro: "O coletor de impostos do meu senhor[ROOT.Char.Custom('ES_XA')], [sinful_tax_collector.Custom('ES_ElLa')] [sinful_tax_collector.GetTitledFirstName|l], está longe de ser um[sinful_tax_collector.Custom('ES_XA')] [sinful_tax_collector.GetWomanMan] virtuoso[sinful_tax_collector.Custom('ES_OA')]."
 fp3_yearly.2020.desc_greedy: "Seu amor pelo ouro só é comparável ao seu amor pela própria vida; ele fará qualquer coisa para cobrar até mesmo uma peça de prata a mais do que é devido."
 fp3_yearly.2020.desc_arbitrary: "Não tem amor pela justiça; cobra impostos conforme seu capricho e ignorará qualquer regulamento que lhe pareça incômodo."
 fp3_yearly.2020.desc_cynical: "Mostra pouco interesse por assuntos religiosos e nenhum amor por [ROOT.Char.GetFaith.HighGodName]; dorme durante as orações da manhã e se [sinful_tax_collector.Custom('ES_LeLa')] pode ver roubando bocados durante o ramadã."
 fp3_yearly.2020.desc_contrite: "Não se pode contar com sua discrição, pois compartilhará as finanças alheias com liberalidade; nada chega aos ouvidos de meu senhor[liege.Custom('ES_XA')] sem que já tenha chegado aos ouvidos de outros nove."
 fp3_yearly.2020.desc_outro: "\n\nComo tal [sinful_tax_collector.GetWomanMan] pode ser confiado com as finanças do reino – e as minhas também?"
 fp3_yearly.2020.a: "[liege.Custom('ES_ElLa')|U] [liege.GetTitledFirstNameNoTooltip|l] deve responder pelos pecados [sinful_tax_collector.Custom('ES_DelDela')] [sinful_tax_collector.GetTitledFirstNameNoTooltip|l]."
 fp3_yearly.2020.a_success: "É demitido [sinful_tax_collector.Custom('ES_AlAla')] [sinful_tax_collector.GetTitledFirstNameNoTooltip|l] de seu cargo"
 fp3_yearly.2020.a_failure: "Minhas protestos não são ouvidos"
 fp3_yearly.2020.a_failure.tt: "[sinful_tax_collector.Custom('ES_ElLa')|U] [sinful_tax_collector.GetTitledFirstNameNoTooltip|l] pode começar a me causar problemas."
 fp3_yearly.2020.b: "Devo denunciar [sinful_tax_collector.Custom('ES_AlAla')] [sinful_tax_collector.GetTitledFirstNameNoTooltip|l] para o bem do reino."
 fp3_yearly.2020.b.t: "Coletor de Impostos Denunciado"
 fp3_yearly.2020.b.desc: "Isso aconteceu porque [denouncing_taxpayer.GetShortUIName], seu vassal[denouncing_taxpayer.Custom('ES_OA')], denunciou a pecaminosidade de [sinful_tax_collector.GetShortUIName]."
 fp3_yearly.2020.c: "Rezarei por [sinful_tax_collector.GetSheHe]."
 fp3_yearly.2021.desc_intro: "Embora meu coletor de impostos[sinful_tax_collector.Custom('ES_XA')]; [sinful_tax_collector.Custom('ES_ElLa')] [sinful_tax_collector.GetTitledFirstName|l], é bastante capaz, [denouncing_taxpayer.GetName] veio até mim com fortes reservas a esse respeito.\n\n"
 fp3_yearly.2021.desc_greedy: ""[sinful_tax_collector.Custom('ES_ElLa')|U] [sinful_tax_collector.GetTitledFirstNameNoTooltip|l] é totalmente egoísta e movido pelo amor ao dinheiro em vez da justiça. Costuma arrecadar mais do que o devido e não contribui em nada para o imposto de esmolas"."
 fp3_yearly.2021.desc_arbitrary: ""[sinful_tax_collector.Custom('ES_ElLa')|U] [sinful_tax_collector.GetTitledFirstNameNoTooltip|l] raramente respeita quaisquer leis ou regulamentos, e em vez disso arrecada impostos com base em seus caprichos. Os camponeses costumam ser prejudicados por suas cobranças inconsistentes"."
 fp3_yearly.2021.desc_cynical: ""[sinful_tax_collector.Custom('ES_ElLa')|U] [sinful_tax_collector.GetTitledFirstNameNoTooltip|l] não teme a [ROOT.Char.GetFaith.HighGodName], costuma dormir durante as orações da manhã e rouba bocados durante o Ramadã. Todos tememos a justiça [ROOT.Char.GetFaith.HighGodNamePossessive] por culpa dele"."
 fp3_yearly.2021.desc_contrite: ""Não se pode contar com a discrição [sinful_tax_collector.Custom('ES_DelDela')] [sinful_tax_collector.GetTitledFirstNameNoTooltip|l]; compartilhará as finanças do senhorio com qualquer um que apenas escute. É só questão de tempo até que essas informações caiam nas mãos do inimigo"."
 fp3_yearly.2021.desc_outro: "\n\n[denouncing_taxpayer.Custom('ES_ElLa')|U] [denouncing_taxpayer.GetTitledFirstNameNoTooltip|l] [denouncing_taxpayer.Custom('quirk_pos_present')], claramente espera que eu demita [sinful_tax_collector.Custom('ES_AlAla')] [sinful_tax_collector.GetTitledFirstNameNoTooltip|l] por tais transgressões."
 fp3_yearly.2021.a: "Será demitido [sinful_tax_collector.Custom('ES_AlAla')] [sinful_tax_collector.GetTitledFirstNameNoTooltip|l], inshallah."
 fp3_yearly.2021.b: "Vou ter suas palavras em mente."
 fp3_yearly.2030.t: "Um Governo Belo"
 fp3_yearly.2030.desc_intro: "Enquanto eu olho para minha imagem no espelho, apoiado no meu"
 fp3_yearly.2030.desc_beauty_bad: "feiúra terrível,"
 fp3_yearly.2030.desc_spindly: "membros finos e nodosos,"
 fp3_yearly.2030.desc_disfigured: "rostro torturado por trás da máscara,"
 fp3_yearly.2030.desc_scaly: "pele manchada e coçante,"
 fp3_yearly.2030.desc_albino: "pele espectral e olhos demoníacos,"
 fp3_yearly.2030.desc_hunchbacked: "protrusão infeliz,"
 fp3_yearly.2030.desc_inbred: "corpo distorcido,"
 fp3_yearly.2030.desc_outro: "me preocupa que o povo me odeie por causa da minha aparência desagradável. É então que [reassuring_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)] oferece sua sabedoria:\n\n"Se só considerardes o ouro como inimigo, então tod[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetWomanMan] vos considerará sua amig[ROOT.Char.Custom('ES_OA')]"."
 fp3_yearly.2030.a: "Então, deixe-me ser amigo de todo o reino."
 fp3_yearly.2030.b: "Obrigado, [reassuring_courtier.GetNameNoTooltip]."
 fp3_yearly.2030.c: "O medo, não o amor, comprará a lealdade deles."
 fp3_yearly.2030.d: "Com o tempo, eles vão me conhecer."
 fp3_yearly.2040.t: "Comandante dos Fiéis"
 fp3_yearly.2040.desc_attacker_is_muslim: "Quem se opuser a mim se opõe ao próprio Profeta, e ainda assim, [infidel.Custom('ES_ElLa')] [infidel.GetTitledFirstName|l], valente [infidel.Custom2('InsultNoun', ROOT.Char)], ousou declarar guerra contra mim.\n\nMas nem todos são tão ímpios. Se eu me apresentasse diante do exército [infidel.Custom('ES_DelDela')] [infidel.GetTitledFirstNameNoTooltip|l] e lhes lembrasse minha autoridade perante o Profeta, certamente um grande número de soldados recuaria."
 fp3_yearly.2040.desc_attacker_is_not_muslim: "Desconhecedor[infidel.Custom('ES_XA')] das palavras do Profeta, [infidel.Custom('ES_ElLa')] [infidel.GetTitledFirstName|l], valente [infidel.Custom2('InsultNoun', ROOT.Char)], declarou guerra contra mim e busca destruir meu reinado divino.\n\nMas nem todos são tão ímpios: há alguns nas terras [infidel.Custom('ES_DelDela')] [infidel.GetTitledFirstNameNoTooltip|l] que obedecem às palavras de [caliph.GetFaith.HighGodName]. Se eu me colocasse diante deles e lhes lembrasse minha autoridade perante o Profeta, certamente recuariam."
 fp3_yearly.2040.a: "O Mensageiro me guiará!"
 fp3_yearly.2040.a.flavor: "Minha piedade e conhecimento do [caliph.GetFaith.ReligiousText] guiarão minhas palavras."
 fp3_yearly.2040.a_success: "Os soldados obedecem à sua autoridade"
 fp3_yearly.2040.a_failure: "Os soldados zombam do seu apelo e o derrubam"
 fp3_yearly.2040.b: "O Mensageiro guiará [imam.Custom('ES_AlAla')] [imam.GetTitledFirstName|l]."
 fp3_yearly.2040.b.flavor: "[imam.Custom('ES_ElLa')|U] [imam.GetTitledFirstName|l] é mais versad[imam.Custom('ES_OA')] em assuntos religiosos do que eu."
 fp3_yearly.2040.b_success: "Os soldados respeitam o seu [imam.Custom('MyPriestTitle')|l]"
 fp3_yearly.2040.b_failure: "Os soldados derrubam o seu [imam.Custom('MyPriestTitle')|l]"
 fp3_yearly.2040.c: "Não, é muito arriscado."
 fp3_yearly.2041.desc_cynical: "[caliph.Custom('ES_ElLa')|U] [caliph.GetTitledFirstName|l] exigiu que meus soldados [caliph.GetFaith.GetReligion.GetAdherentNamePluralNoTooltip] recuem sob a alegação de que é [Select_CString( caliph.IsFemale, 'la legítima sucesora', 'el legítimo sucesor' )] do Profeta, e eles lhe obedeceram!\n\nQuem diabos se importa de quem seja [Select_CString( caliph.IsFemale, 'la sucesora', 'el sucesor' )]? Isso não vai me impedir de chutá-lo no traseiro."
 fp3_yearly.2041.desc_fallback: "Sei bem que minha guerra contra [caliph.GetName] conta com a aprovação de [ROOT.Char.GetFaith.HighGodName]. Ainda assim, esse [caliph.Custom2('InsultNoun', ROOT.Char)] conseguiu convencer meus soldados de fé [caliph.GetFaith.GetReligion.GetAdjectiveNoTooltip] de que, como [caliph.GetSheHe] é [Select_CString( caliph.IsFemale, 'la sucesora', 'el sucesor' )] do Profeta, devem se retirar e voltar para casa.\n\nMuitas das minhas tropas obedeceram e agora devo lidar com as consequências de um exército devoto, porém menor…"
 fp3_yearly.2041.a: "Maldito[actor.Custom('ES_OA')] seja[actor.Custom('ES_XA')]  [caliph.Custom2('InsultNoun', ROOT.Char)]!"
 fp3_yearly.2050.t: "Lojas Futuwaa"
 fp3_yearly.2060.t_madrasas: "Madrasas"
 fp3_yearly.2060.t_houses_of_worship: "Educação em [ROOT.Char.GetFaith.HouseOfWorshipPlural]"
 #Ghazi Gone Bad, by Ola Jentzsch
 fp3_yearly.8000.t: "Ghazi Gone Bad"
 fp3_yearly_non_islamic.t: "Um Lutador pela Fronteira?"
 fp3_yearly.8000.desc_opening: "[raging_ghazi.GetFirstName] era um[raging_ghazi.Custom('ES_OA')] de [raging_ghazi.GetHerHim]s muito[raging_ghazi.Custom('ES_OA')]s autoproclamad[raging_ghazi.Custom('ES_OA')]s #italic ghazis#! que se dirigiam à fronteira para lutar contra os pagãos,"
 fp3_yearly.8000.desc_unislamic_opening: "[raging_ghazi.GetFirstName] era um[raging_ghazi.Custom('ES_XA')] autoproclamad[raging_ghazi.Custom('ES_OA')] #italic [Select_CString( raging_ghazi.IsFemale, 'campeona', 'campeón' )] de [ROOT.Char.GetFaith.WarGodName]#! e seguia para a fronteira para lutar contra os bárbaros,"
 fp3_yearly.8000_dancing_girl.desc: "quando foi beber na cidade de [murder_barony.GetNameNoTier]. Lá, em estado de embriaguez, acabou se envolvendo[raging_ghazi.Custom('ES_OA')] em uma briga e matou a pauladas um estalajadeiro, uma dançarina e o macaco de estimação dela.\n\n"
 fp3_yearly.8000_bath_inspector.desc: "quando foi se divertir com cortesãs e patifes na cidade de [murder_barony.GetNameNoTier]. Em companhia tão desonrosa, acabou brigando com um guarda e um inspetor de banhos, e esfaqueou ambos até a morte.\n\n"
 fp3_yearly.8000_townsfolk.desc: "quando [raging_ghazi.GetHerHim] enganaram e roubaram [Select_CString( raging_ghazi.IsFemale, 'unos seductores embusteros', 'unas seductoras embusteras' )] na cidade de [murder_barony.GetNameNoTier]. Descarregou sua ira no mercado local, espancando até a morte, com um pufe acolchoado, um vendedor ambulante de chá e um burro.\n\n"
 fp3_yearly.8000.desc: "“É preciso castigar severamente est[raging_ghazi.Custom('ES_EA')] [raging_ghazi.GetWomanMan]”, diz meu íntegro[righteous_marshal.Custom('ES_OA')] [righteous_marshal.GetCouncilTitle|l] [righteous_marshal.GetFirstName], “para apaziguar as boas gentes de [murder_barony.GetNameNoTierNoTooltip]”.\n\n“Não”, implora [raging_ghazi.GetFirstNameNoTooltip] acorrentad[raging_ghazi.Custom('ES_OA')] em minhas masmorras, “deveis permitir-me ir para a fronteira, pois esse é o propósito [ROOT.Char.GetFaith.HighGodNameAlternatePossessive]”."
 fp3_yearly.8000.a: "Eu também segui o caminho sagrado - vá em paz."
 fp3_yearly.8000.b: "Eu tenho uma cela nova e bonita, só para você!"
 fp3_yearly.8000.c: "Eu poderia usar um[raging_ghazi.Custom('ES_XA')] [raging_ghazi.GetWomanMan] com seus talentos…"
 fp3_yearly.8000.flavor.a.tt: "Você permite que [raging_ghazi.GetFirstNameNoTooltip] continue em sua busca pelo martírio."
 fp3_yearly.8000.flavor.b.tt: "Isso aplacará os habitantes da cidade."
 #Frontier Fortress Benefactor, by Ola Jentzsch
 fp3_yearly.8001.t: "Benfeitor da Fortaleza da Fronteira"
 fp3_yearly.8001.desc: "Meu vigilante [concerned_councillor.GetCouncilTitle|l] [concerned_councillor.GetFirstName] cada vez está mais preocupado com o estado de nossas defesas fronteiriças.\n\n"Deveis fazer uma visita às fortalezas de [frontier_fort_county.GetName], [ROOT.Char.Custom('FormOfAddressForLiege')]. Isso melhoraria consideravelmente a moral dos vossos soldados, que, de outro modo, ficariam bastante desamparados".\n\nFaz uma pausa. "Mas devo mencionar que correm rumores, completamente infundados, sobre um pequeno surto de doença…"."
 fp3_yearly.8001.a: "Muito bem, irei."
 fp3_yearly.8001.b: "Meu [dutiful_spouse.GetWifeHusband] [dutiful_spouse.GetFirstName] precisa de mais tarefas, pode ir [dutiful_spouse.GetSheHe]."
 fp3_yearly.8001.c: "Vou sair... em alguns dias..."
 fp3_yearly.8001.d: "A fronteira é para soldados e colonos, não para mim."
 convincing_councillor_toast.success: "[concerned_councillor.GetFirstName] confia em você"
 convincing_councillor_toast.failure: "[concerned_councillor.GetFirstName] acha que você a está enganando"
 delegated_fortress_inspection_toast.success: "[dutiful_spouse.GetFirstName] causou boa impressão nos soldados"
 delegated_fortress_inspection_toast.failure: "[dutiful_spouse.GetFirstName] não conseguiu incentivar os soldados"
 fp3_yearly.8001.flavor.b.tt: "[concerned_councillor.GetFirstNameNoTooltip] não aprova que [dutiful_spouse.GetHerHim]s [dutiful_spouse.GetWomenMen]assumam papéis militares."
 fp3_yearly.8001.flavor.c.tt: "Você não pretende realmente fazer isso."
 #Faith at the Frontier, by Ola Jentzsch
 fp3_yearly.8002.t: "Fé na Fronteira"
 fp3_yearly.8002.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('concerned_person'))] [concerned_person.GetFirstName] recebeu notícias preocupantes sobre os soldados que guarnecem os fortes de [frontier_fort_county.GetName].\n\n"Eles se converteram sub-repticiamente à vil heresia de [regional_heresy.GetName|l]", ele me diz com voz trêmula. "Embora eu não saiba quem é seu líder, temo que, se nada for feito, em breve poderão pegar as armas que #italic vos#! pagasteis e tentar derrubar-vos"."
 fp3_yearly.8002.a: "Vou queimá-los todos e salgar a terra."
 fp3_yearly.8002.b: "[regional_heresy.GetNameNoTooltip], você diz? Parece interessante..."
 fp3_yearly.8002.c: "Já que você está tão preocupado, #italic você#! pode ir lá e convertê-los de volta."
 fp3_yearly.8002.d: "Devemos esperar para ver como a situação se desenvolve."
 dealing_with_soldier_heresy_toast.success: "[concerned_person.GetNameNoTooltip] trouxe os hereges de volta à linha."
 dealing_with_soldier_heresy_toast.failure: "[concerned_person.GetNameNoTooltip] não conseguiu convencer os soldados."
 fp3_county_pacified.tt: "Os hereges estão dispersos"
 fp3_county_converted.tt: "[concerned_person.GetNameNoTooltip] traz os soldados de volta à verdadeira fé"
 fp3_county_galvanized.tt: "Os hereges estão revigorados"
 frontier_heresy_eased: "A heresia diminuiu"
 frontier_heresy_mega_outbreak: "A heresia se espalhou"
 #Exotic Espand, by Ola Jentzsch
 fp3_yearly.8003.t: "Espand Exótico"
 fp3_yearly.8003.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('superstitious_consort'))] [superstitious_consort.GetFirstName] tem o hábito de queimar sementes de #italic alharma#! para afugentar as forças do mal. Mas agora afirma que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('cruel_consort'))] [cruel_consort.GetFirstName] lhe lançou o mau-olhado e roubou as provisões de alharma. Claro, [cruel_consort.GetFirstNameNoTooltip] nega ter qualquer envolvimento nisso, mas [superstitious_consort.GetFirstNameNoTooltip] parece completamente decidid[superstitious_consort.Custom('ES_OA')] a conseguir mais alharma para se livrar dessa suposta maldição.\n\n“Por favor, [ROOT.Char.Custom('FormOfAddressForLiege')]”, implora, “um mago me falou de uma montanha sagrada em [espad_mountain_province.GetName], só lá florescem as melhores flores de alharma. Vós deveis mandar buscá-las para mim”."
 fp3_yearly.8003.a: "Coloque sua fé em [ROOT.Char.GetFaith.HighGodNameAlternate], não em superstições bobas."
 fp3_yearly.8003.b: "Vou enviar os melhores exploradores que o ouro pode comprar."
 fp3_yearly.8003.c: "Vou enviar meu [quest_chaplain.GetCouncilTitle|l] [quest_chaplain.GetFirstName] para pegá-las para você."
 fp3_yearly.8003.d: "Você não pode pegar espand normal como todo mundo?"
 questing_for_espand_toast.success: "[quest_chaplain.GetFirstName] voltou com as melhores sementes de espand."
 questing_for_espand_toast.failure: "[quest_chaplain.GetFirstName] voltou de mãos vazias."
 fp3_espand_found.tt: "[quest_chaplain.GetFirstName] encontra as sagradas ervas espand"
 fp3_espand_unfound.tt: "[quest_chaplain.GetFirstNameNoTooltip] falha em sua missão"
 fp3_closer_to_love.tt: "Você e [superstitious_consort.GetFirstNameNoTooltip] se aproximam"
 ####The Frontiers' Call, by Ola Jentzsch####
 fp3_yearly.8004.t: "A Fronteira Chama"
 fp3_yearly.8004.desc: "Para alguns dos que habitam as esplêndidas cidades desta terra, o uivo dos ventos das estepes do norte ainda ecoa em seus corações. Para o bem ou para o mal, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('fp3_child_to_leave'))] [fp3_child_to_leave.GetFirstName] começou a sentir esse chamado.\n\n"[parent.GetMotherFather|U], deve me deixar ir. Quero lapidar minha mente e minha espada na fronteira selvagem, viajar com caravanas e povos das montanhas, e talvez até encontrar a lendária montanha #italic Hara Berezaiti#!".\n\nMas [worried_relation.GetFirstName] ama profundamente [fp3_child_to_leave.GetFirstNameNoTooltip] e me implora que recuse o pedido dele(a)."
 fp3_yearly.8004.a: "Desembainhe, [Select_CString( fp3_child_to_leave.IsFemale, 'polluela atolondrada', 'polluelo atolondrado' )]!"
 fp3_yearly.8004.b: "Você não vai ficar, pelo bem de [worried_relation.GetFirstNameNoTooltip]?"
 fp3_yearly.8004.c: "Se você for embora, já não será [Select_CString( fp3_child_to_leave.IsFemale, 'hija mía', 'hijo mío' )]."
 fp3_yearly.8004.d: "Eu também senti esse chamado. Você deve partir, [Select_CString( fp3_child_to_leave.IsFemale, 'hija mía', 'hijo mío' )]."
 fp3_yearly.8004.c.flavor: "Você deserdará [fp3_child_to_leave.GetFirstNameNoTooltip] se partir."
 fp3_yearly.8004.a.tt: "#V ¡Te bates con#! [fp3_child_to_leave.GetFirstName] para que ele fique!\n#weak Este duelo NO es a muerte.#!\nSe você vencer, ganhará [prestige|lE] [prestige_i]\n\nSeu [prowess|lE]: #V [parent.GetProwess]#! [prowess_i]\n[prowess|E] de [fp3_child_to_leave.GetFirstName]; #V [fp3_child_to_leave.GetProwess]#! [prowess_i]"
 fp3_yearly.8004.b.success: "[fp3_child_to_leave.GetFirstNameNoTooltip] desiste de seus sonhos de aventura"
 fp3_yearly.8004.b.failure: "[fp3_child_to_leave.GetFirstNameNoTooltip] segue decidido[fp3_child_to_leave.Custom('ES_OA')] a partir"
 fp3_yearly.8007.t: "[ROOT.Char.GetCulture.GetName] Paternidade"
 fp3_yearly.8007.desc: "“Eu me rendo! Eu me rendo, [parent.GetMotherFather], chega!” Meu [fp3_child_to_leave.Custom('GetDaughterSon')] recua.\n\n“Se é assim que tanto me queres aqui, então ficarei. Serei [fp3_child_to_leave.Custom('ES_ElLa')] [fp3_child_to_leave.Custom('GetDaughterSon')] que queres que eu seja. [ROOT.Char.GetFaith.HighGodNameAlternate] te julgará no final”."
 fp3_yearly.8007.a: "Não serei considerado insuficiente."
 fp3_yearly.8007.b: "Bom. Tenho #italic verdadeiras#! responsabilidades para você."
 fp3_yearly.8007.c: "E agora você deve se casar!"
 fp3_yearly.8008.t: "Uma Derrota Ignominiosa"
 fp3_yearly.8008.desc: "Recuo cambaleando, machucad[parent.Custom('ES_OA')] e exaust[parent.Custom('ES_OA')] enquanto [fp3_child_to_leave.GetFirstNameNoTooltip] se aproxima de mim, espada em mãos.\n\n\"Eu já lhe disse, [parent.GetMotherFather]. #italic partiré#!. Vou para a fronteira, como meu coração deseja, bem longe, pela Rota da Seda, e #italic vos#! vocês pagarão por isso.\"\n\nNão posso fazer nada além de ver minha [fp3_child_to_leave.Custom('GetDaughterSon')] partir, de cabeça erguida, com um saco de moedas de ouro kushan e sassânida do meu tesouro."
 fp3_yearly.8008.a: "Eu posso perder meu [fp3_child_to_leave.Custom('GetDaughterSon')], mas também meu ouro?"
 fp3_yearly.8008.b: "Seria melhor ser um eunuco..."
 fp3_yearly.8008.c: "O destino o trará de volta para mim, você verá..."
 fp3_yearly.8009.t: "Preocupações do [ROOT.Char.GetFaith.GetReligiousHeadTitle.GetAdjectiveNoTooltip]"
 fp3_yearly.8009.desc_beginning: "A Fronteira Oriental há muito tempo é refúgio para pagãos e seitas estranhas. No entanto, em [caliphal_location.GetName], [righteous_caliph.Custom('ES_AlAla')] [righteous_caliph.GetTitleTierName|l] [righteous_caliph.GetFirstName] cada vez mais está preocupado com isso.\n\n“Ouvimos falar de [very_heretic_county.GetCountyData.GetFaith.GetAdherentNamePlural] em [very_heretic_county.GetName], que praticam rituais estranhos”. [Select_CString( hof_emissary.IsFemale, 'La enviada', 'El enviado' )] da missão [ROOT.Char.GetFaith.GetReligiousHeadTitle.GetAdjectiveNoTooltip], [hof_emissary.GetName], faz uma pausa, como se reunisse coragem, antes de continuar em voz baixa, escandalizad[hof_emissary.Custom('ES_OA')]. “Alguns até falam… de rituais de natureza #italic carnal#!. Já chega."
 fp3_yearly.8009.desc_muslim_or_jewish_insult_ending: "[righteous_caliph.Custom('ES_ElLa')|U] [righteous_caliph.GetTitleTierName|l] quer que vocês cuidem desses canalhas"."
 fp3_yearly.8009.desc_other_insult_ending: "[righteous_caliph.Custom('ES_ElLa')|U] [righteous_caliph.GetTitleTierName|l] quer que você cuide desses blasfemos imundos"."
 fp3_yearly.8009.qurans.flavor: "Você patrocina cópias do [righteous_caliph.GetFaith.ReligiousText] em [righteous_caliph.GetCulture.GetLanguage.GetNameNoTooltip]."
 fp3_yearly.8009.a: "Farei um exemplo deles."
 fp3_yearly.8009.b: "A escritura na língua apropriada mostrará o caminho para eles."
 fp3_yearly.8009.c: "Meu [loyal_chaplain.GetCouncilTitle|l] [loyal_chaplain.GetFirstName] lhes pregará."
 fp3_yearly.8009.d: "Infelizmente, tenho preocupações mais urgentes."
 cultural_acceptance_gain_arabic_books: "Produziu livros em árabe"
 dealing_with_frontier_heresy_toast.success: "A missão [loyal_chaplain.Custom('ES_DelDela')] [loyal_chaplain.GetTitledFirstNameNoTooltip|l] obteve algum sucesso"
 dealing_with_frontier_heresy_toast.failure: "[loyal_chaplain.Custom('ES_ElLa')|U] [concerned_person.GetTitledFirstNameNoTooltip|l] não conseguiu convencer ninguém"
 fp3_county_listened.tt: "Alguns dos locais são trazidos de volta à verdadeira fé"
 fp3_county_unfazed.tt: "Os locais permanecem indiferentes"
 fp3_gross_persecutions_toast: "Os hereges estão dispersos"
 fp3_galvanized_heretics_toast: "Os hereges estão revigorados"
 fp3_yearly.8010.t: "O Domínio da Guerra"
 fp3_yearly.8010.desc_muslim: "Os eruditos da Mesopotâmia dividiram o mundo em três partes. Falam da #italic dar al-Tawhid#! dos fiéis e da #italic dar al-'Ahd#! de nossos aliados, mas também da #italic dar al-Harb#!, a fronteira, a morada da guerra. [righteous_caliph.Custom('ES_ElLa')|U] [righteous_caliph.GetTitleTierName|l] [righteous_caliph.GetFirstName] é muito crente dessa visão de mundo e fica perpetuamente preocupado com a ameaça do leste.\n\n"É nosso dever como [ROOT.Char.GetFaith.GetReligion.GetAdherentNamePluralNoTooltip] colocar a fronteira pagã sob nossa vigilância", me diz. "Tempo demais toleramos as práticas idólatras [pagan_ruler.Custom('ES_DelDela')] [pagan_ruler.GetTitledFirstName|l]. Enviarei tropas #italic ghazis#! leais e mercenários turcos para que você possa libertar [pagan_county.GetNameNoTier] de seu domínio"."
 fp3_yearly.8010.desc_not_muslim: "[righteous_caliph.Custom('ES_ElLa')|U] [righteous_caliph.GetTitleTierName|l] [righteous_caliph.GetFirstName] tem uma crença profunda em uma visão de mundo como um conflito incessante entre civilização e barbárie, e está perpetuamente preocupado com inimigos infiéis que espreitam e conspiram no selvagem leste.\n\n"É seu dever como parte do mundo [ROOT.Char.GetFaith.GetReligion.GetAdherentNameNoTooltip]", diz ele a mim, "colocar a fronteira pagã sob nossa vigilância. Por tempo demais temos tolerado as práticas idólatras [pagan_ruler.Custom('ES_DelDela')] [pagan_ruler.GetTitledFirstName|l]. Enviarei tropas #italic ghazis#! leais e mercenários turcos para que você possa libertar [pagan_county.GetNameNoTier] de seu domínio"."
 fp3_yearly.8010.a: "Vou atacá-lo sem demora!"
 fp3_yearly.8010_warmonger.tt: "Espera-se que você capture [pagan_county.GetNameNoTier] dentro de #bold cinco anos#!."
 fp3_yearly.8010.b: "Ajude-me a financiar esta guerra, e eu a começarei."
 fp3_yearly.8010.c: "Deveis entender, grande [righteous_caliph.GetTitleTierName|l], que não é o momento adequado."
 fp3_yearly.8010.d: "Você não tem autoridade sobre minhas terras."
 convincing_the_caliph_toast.success: "Você convence [righteous_caliph.Custom('ES_AlAla')] [righteous_caliph.GetTitleTierName|l] a reconsiderar"
 convincing_the_caliph_toast.failure: "Seus argumentos não conseguiram convencer ninguém"
 fp3_caliph_convinced.tt: "[righteous_caliph.Custom('ES_ElLa')|U] [righteous_caliph.GetTitleTierName|l] evitará a guerra por enquanto."
 fp3_caliph_unconvinced.tt: "[righteous_caliph.Custom('ES_AlAla')|U] [righteous_caliph.GetTitleTierName|l] fica indignado com a sua fraqueza."
 fp3_caliph_dead.title: "Promessa Anulada"
 fp3_caliph_dead.desc: "Seu antigo chefe de fé não está mais disponível, e o juramento de conquista que você fez se tornou nulo e sem efeito."
 fp3_yearly.8012.t: "Uma Promessa Cumprida"
 fp3_yearly.8012.desc: ""Bem se vê", proclama [righteous_caliph.Custom('ES_ElLa')] [righteous_caliph.GetTitleTierName|l] [righteous_caliph.GetFirstName], "que não vos atrasastes em cumprir vossa promessa de conquistar [pagan_county.GetNameNoTier] em nome da nossa fé. Demonstrastes ser um[ROOT.Char.Custom('ES_XA')] governante de confiança e um[ROOT.Char.Custom('ES_XA')] membro devoto da fé [ROOT.Char.GetFaith.GetReligion.GetAdjectiveNoTooltip], e não nos esqueceremos disso tão cedo"."
 fp3_yearly.8012.a: "Fiz o que qualquer [ROOT.Char.GetFaith.GetReligion.GetAdjectiveNoTooltip] faria."
 become_faith_warrior.toast: "Você se tornou um[ROOT.Char.Custom('ES_XA')] campeão de [ROOT.Char.GetFaith.GetReligion.GetNameNoTooltip|l]"
 fp3_yearly.8013.t: "Desapontamento do [ROOT.Char.GetFaith.GetReligiousHeadTitle.GetAdjectiveNoTooltip]"
 fp3_yearly.8013.desc: ""Há cinco anos", proclama [righteous_caliph.Custom('ES_ElLa')] [righteous_caliph.GetTitleTierName|l] [righteous_caliph.GetFirstName], "nos prometestes libertar [pagan_county.GetNameNoTier] dos pagãos. Como pode ser que isso não tenha acontecido?"."
 fp3_yearly.8013.a: "Peço desculpas, as circunstâncias conspiraram contra mim."
 fp3_yearly.8013.b: "Não reconheço você, nem qualquer juramento feito."
 fp3_yearly.8014.t: "Segredos do Bule"
 fp3_yearly.8014.desc: "Há muito tempo luto para conciliar meu amor por bebidas alcoólicas com a piedosa opinião [ROOT.Char.GetFaith.GetAdjective] sobre tais assuntos. Felizmente, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('smart_courtier'))] [smart_courtier.GetFirstName] chegou a mim com uma solução.\n\n“Ouvi falar de anciã[ROOT.Char.Custom('ES_OA')] de Osrushana”, diz ele, “que precisam de uma certa quantidade de bebida para suportar o clima frio. E para se divertir em geral, é claro. Têm o hábito de despejar suas bebidas em uma chaleira de cobre, de modo que qualquer observador excessivamente zeloso suponha que estejam bebendo chá, e não vinho. Eu mesmo tenho feito isso há bastante tempo, e é bastante conveniente.”"
 fp3_yearly.8014.a: "Que boa ideia!"
 fp3_yearly.8014.b: "Pode ser que [ROOT.Char.GetHerHim]s [ROOT.Char.Custom('LevyMenWomen')|U]não me julguem, mas [ROOT.Char.GetFaith.HighGodNameAlternate]sim julgará."
 fp3_yearly.8014.c: "Eu não farei isso, e #italic nem você#!."
 f3_yearly.8014_forbidding_teapot_alcohol_flavor: "Você força [smart_courtier.GetNameNoTooltip] a parar de esconder seu pecado."
 #Forgotten Runestones, by Ola Jentzsch
 fp3_yearly.8016.t: "Pedras Esquecidas"
 fp3_yearly.8016.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('hyrcanian_vassal'))] [hyrcanian_vassal.GetFirstName] me convidou para dar uma olhada em um trio de estranhas pedras entalhadas, no fundo da floresta hircânia em suas terras.\n\n“Devem ter sido erguidas por uma expedição perdida de selvagens #italic rusiyyas#!”, ele me diz. “Agora, os moradores das florestas locais passaram a gostar dessas pedras e acreditam que seus desconhecidos criadores descerão sobre eles do mar Cáspio com uma vingança rápida e sangrenta se as pedras forem destruídas. Mas eu não acredito nessas histórias. Embora eu não consiga ler as letras nessas pedras, tenho certeza[hyrcanian_vassal.Custom('ES_OA')] de que são ídolos pagãos e devem ser despedaçadas. Não é assim, meu [ROOT.Char.GetLadyLord]?”."
 fp3_yearly.8016.a: "Me entregue um martelo grande!"
 fp3_yearly.8016.b: "Não, vamos ouvir os habitantes da floresta."
 fp3_yearly.8016.c: "Eu os farei remover e erguê-los fora do meu [ROOT.Char.Custom('ResidenceBuilding')]..."
 fp3_hyrcanian_vassal_convinced.tt: "[hyrcanian_vassal.GetFirstNameNoTooltip] aceita essa solução."
 fp3_hyrcanian_vassal_unconvinced.tt: "[hyrcanian_vassal.GetFirstNameNoTooltip] se pergunta por que você faria tal coisa."
 convincing_the_hyrcanian_vassal_toast.success: "[hyrcanian_vassal.Custom('ES_ElLa')|U] [hyrcanian_vassal.GetTitledFirstName|l] aceitou sua proposta."
 convincing_the_hyrcanian_vassal_toast.failure: "[hyrcanian_vassal.Custom('ES_ElLa')|U] [hyrcanian_vassal.GetTitledFirstName|l] observou em silêncio carrancudo enquanto as pedras eram levadas."
 #Hyrcanian Havoc, by Ola Jentzsch
 fp3_yearly.8017.t: "Devastação Hyrcanian"
 fp3_yearly.8017.desc: "Ocorreu uma tragédia! Guerreiros furiosos da #italic Rus#! desceram sobre [runestone_county.GetNameNoTier] como aves de rapina sobre um cadáver, massacrando todos que viam. [hyrcanian_vassal.Custom('ES_ElLa')|U][hyrcanian_vassal.Custom('ES_OA')] [hyrcanian_vassal.GetTitledFirstName|l] recebeu um golpe de machado e agora está em estado crítico, gravemente mutilad[hyrcanian_vassal.Custom('ES_OA')]. Mas tão rapidamente quanto chegaram, os invasores voltaram para seus barcos e desapareceram na neblina da manhã do mar Cáspio.\n\nEntre os sobreviventes correm rumores de que os atacantes podem ter buscado vingança contra [hyrcanian_vassal.GetFirstNameNoTooltip] pela profanação das pedras rúnicas dos Rus, tantos anos atrás…"
 fp3_yearly.8017.a: "[ROOT.Char.GetFaith.HighGodNameAlternate], o que fizemos para te irritar?"
 fp3_yearly.8017.b: "Enviarei algum ouro, seja lá qual for sua utilidade."
 fp3_yearly.8017.c: "Isso é um mau presságio... Eu deveria restaurar as pedras para [runestone_county.GetNameNoTierNoTooltip]."
 #A Heavenly Horse, by Ola Jentzsch
 fp3_yearly.8018.t: "Um Cavalo Celestial"
 fp3_yearly.8018.desc_eunuch: "Enquanto treino com [ROOT.Char.Custom('WarhorseStoryName')], um viajante de terras distantes se aproxima de mim. Ele se curva com movimentos sutis, cuidadosamente medidos, insinuando uma longa carreira em cortes esplêndidas.\n\n"Sirvo a uma grande dama", diz ele, "na China, além destas grandes montanhas. Minha senhora é uma jogadora ávida de #italic chovgan#!, mas também é dada a exageros e disse a seus amigos que, no próximo jogo, cavalgaria o melhor cavalo sob o céu. Meu povo há muito preza os #italic caballos celestiales#! de vossa terra, e parece que, [ROOT.Char.Custom('FormOfAddressForLiege')], vós possuís o maior de todos. Mas também acontece que sei que tendes algumas dificuldades #italic financieras#!…".\n\n"Então, o que dizeis, posso comprar este excelente [ROOT.Char.Custom('HorseStoryMareStallion')]?"."
 fp3_yearly.8018.desc_grand_old_lady: "Enquanto treino com [ROOT.Char.Custom('WarhorseStoryName')], uma nobre dama em trajes exóticos se aproxima de mim com seu séquito.\n\n"Venho", ela me diz, "das grandes cortes da China. Recentemente, passei a me interessar pelo #italic chovgan#!, o esporte equestre que é popular até mesmo em vosso pequeno domínio. Mas, para o próximo jogo, prometi montar um #italic caballo celestial#!, os cavalos de Ferghana que suam sangue, que meu povo valoriza acima até mesmo da Pílula da Imortalidade. Pois bem, soube que vós, [ROOT.Char.Custom('ES_ElLa')] pequen[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetLadyLord] de estas terras, possuís tal [ROOT.Char.Custom('HorseStoryMareStallion')] incomparável. Também soube que estais em dívida…".\n\nEla lhe entrega uma bolsa pesada de ouro, e sua intenção é bastante clara."
 fp3_yearly.8018.a: "Muito bem, vou vender meu cavalo."
 fp3_yearly.8018.b: "Eu nunca me separaria de [ROOT.Char.Custom('WarhorseStoryName')]."
 fp3_yearly.8018.c: "Saia da minha vista, velha sem cavalo!"
 ##################################################
 #THE FRONTIER STORY CYCLE
 ##################################################
 fp3_yearly.8888.t: "Uma Ofensa no Pasto"
 fp3_yearly.8888.desc: "[upset_vassal.GetName] me procura, visivelmente irritado[upset_vassal.Custom('ES_OA')].\n\n“Meu senhor[ROOT.Char.Custom('ES_XA')]”, declara, “a tribo [turkic_leader.GetCulture.GetName] liderada por [turkic_leader.GetName] tem se apossado de todos os pastos em [nomads_county.GetNameNoTier] e, em geral, tem causado problemas para o bom povo assentado. Tentei enviar guerreiros #italic ghazis#! para expulsá-los, mas eles apenas recuam e se escondem nas terras desabitadas, só para retornar um mês depois. O senhor deve me ajudar a expulsar esses bárbaros imundos... de uma vez por todas”.\n\n“Eu posso lidar com eles”, diz meu [possibly_capable_marshal.GetCouncilTitle|l] [possibly_capable_marshal.GetFirstName], “mande-me para [nomads_county.GetNameNoTierNoTooltip]”."
 fp3_yearly.8888.a: "Não, irei falar com eles pessoalmente."
 fp3_yearly.8888.b: "Muito bem, [possibly_capable_marshal.GetFirstNameNoTooltip] - leve suas tropas para [nomads_county.GetNameNoTierNoTooltip]."
 fp3_yearly.8888.c: "[upset_vassal.GetTitledFirstNameNoTooltip], isso é entre você e [turkic_leader.GetFirstNameNoTooltip]."
 fp3_fighting_turks.success.tt: "[possibly_capable_marshal.GetFirstName] captura [turkic_leader.Custom('ES_AlAla')] líder nômade"
 fp3_fighting_turks.failure.tt: "Eles escapam de seus soldados"
 fp3_treating_with_turks.success.tt: "[turkic_leader.GetCulture.GetName] concorda em negociar"
 fp3_treating_with_turks.failure.tt: "Você não consegue convencê-los"
 fp3_treating_with_turks_toast.failure: "Os nômades se recusaram a negociar com você."
 fp3_fighting_turks_toast.failure: "[possibly_capable_marshal.Custom('ES_ElLa')|U] [possibly_capable_marshal.GetTitledFirstName] fracassou em derrotar os nômades indisciplinados."
 fp3_yearly.8889.t: "Grama Suficiente para Todos"
 fp3_yearly.8889.desc: "[turkic_leader.GetName] me recebe com toda a hospitalidade que meu posto exige, oferecendo chá, cecina de cavalo e água fresca de nascente. Mas fala de [upset_vassal.GetName] com desprezo.\n\n"[upset_vassal.Custom('ES_ElLa')|U] [upset_vassal.GetTitledFirstNameNoTooltip|l] mente", diz [turkic_leader.Custom('ES_ElLa')] líder nômade, "há grama suficiente para todos. Deixem meu povo permanecer em [nomads_county.GetNameNoTierNoTooltip], e emprestaremos nossos arcos e espadas aos vossos exércitos. Eu mesmo irei à vossa corte para servir como [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')]"."
 fp3_yearly.8889.a: "Isso parece razoável."
 fp3_yearly.8889.b: "Você não pode ficar aqui, mas venha pastar em [nomads_new_county.GetNameNoTierNoTooltip]."
 fp3_yearly.8889.c: "Ai, não pode haver tal acordo."
 fp3_yearly.8890.t: "O destino de [Select_CString(turkic_leader.IsFemale,'uma chefe','um chefe')]"
 fp3_yearly.8890.desc_beginning: "Arrastrei[turkic_leader.Custom('ES_OA')] ante mim, o chefe nômade [turkic_leader.GetName] parece bastante desamparad[turkic_leader.Custom('ES_OA')]. Não conta com muitos aliados aqui, se é que tem algum.\n\n"Conseguimos emboscar a horda [turkic_leader.GetCulture.GetName]", explica [possibly_capable_marshal.GetFirstName], "e capturar est[turkic_leader.Custom('ES_EA')] [turkic_leader.GetWomanMan] e alguns de seus guerreiros".\n\n"
 fp3_yearly.8890_brutal_demands: "\"Peguem suas cabeças\", insiste [upset_vassal.GetName], \"pois esses selvagens mataram muitos dos meus súditos.\"\n\n"
 fp3_yearly.8890_nonbrutal_demands: ""Façam-nos prometer que deixarão minhas terras para sempre", sugere [upset_vassal.Custom('ES_ElLa')] [upset_vassal.GetTitledFirstName|l], "mantenham como refém[turkic_leader.Custom('ES_OA')] a [turkic_leader.GetFirstNameNoTooltip] para garantir que cumpram a promessa".\n\n"
 fp3_yearly.8890.desc_ending: "“De fato”, diz [turkic_leader.GetNameNoTooltip]“, não temo matar aqueles que vêm com lanças contra mim. Mas minha espada e meu arco, e os de meus guerreiros, poderiam estar a seu serviço, grande [ROOT.Char.GetTitleTierName|l]“, se me deixar ir.”"
 fp3_yearly.8890.a: "Muito bem, deixe seu povo se estabelecer em [nomads_new_county.GetNameNoTierNoTooltip] - e me sirva."
 fp3_yearly.8890.b: "Não, sua vida é perdida."
 fp3_yearly.8890.c: "Vou apenas mantê-l[turkic_leader.Custom('ES_OA')] como refém para acalmar sua tribo."
 nomad_friction_gone.tt: "Os nômades estão pacificados"
 nomad_friction_active.tt: "Os nômades estão enfurecidos"
 fp3_frontier_story_cycle.0001_opening: "Meu estimado suserano[ROOT.Char.Custom('ES_XA')]"
 fp3_frontier_story_cycle.0001_letter: "Estarei enviando a você dois órfãos pobres, cujos pais pereceram pela fome depois que uma horda de [turkic_leader.GetCulture.GetName] deixou seus cavalos pisotearem seus campos e pomares. Como você tem uma queda por nômades selvagens, confio que você também pode se responsabilizar pelas vítimas deles. Que a luz de [ROOT.Char.GetFaith.HighGodNameAlternatePossessive] brilhe sobre o seu reinado."
 fp3_frontier_story_cycle.0001.a: "O que..."
 children_arriving_shortly.tt: "As crianças estarão chegando em breve"
 fp3_frontier_story_cycle.0002_opening: "Grande [ROOT.Char.GetTitleTierName|l]"
 fp3_frontier_story_cycle.0002_letter: "Lamento meu comportamento durante o incidente com os nômades. Eles realmente deixaram [nomads_county.GetNameNoTier], e ouvi dizer que os conflitos entre eles e os agricultores diminuíram. Embora eu ainda insista que você deve levar a sério a ameaça nômade, gostaria de lhe oferecer estas belas moedas de ouro, cunhadas no Império Kushan há muito tempo, como um símbolo do meu respeito."
 fp3_frontier_story_cycle.0002.a: "Um presente excelente. Tudo está perdoado."
 fp3_frontier_story_cycle.0002.b: "Não preciso de seus trinkets, nem aceito sua desculpa."
 fp3_frontier_story_cycle.0003.t: "Pagando Sua Parte"
 fp3_frontier_story_cycle.0003_beginning: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('greedy_chaplain'))] [greedy_chaplain.GetFirstName], ao que parece, passou muito tempo pensando em [turkic_leader.GetName] e sua tribo nômade.\n\n“De fato, [ROOT.Char.Custom('FormOfAddressForLiege')]”, diz [greedy_chaplain.GetFirstNameNoTooltip], “eles têm estado em minhas orações. Pois soube que alguns deles ainda seguem sua fé pagã."
 fp3_frontier_story_cycle.0003_jizya: "Deveríamos fazê-los pagar um imposto #italic jizya#! pelo privilégio de manter seus costumes idólatras".\n\n"
 fp3_frontier_story_cycle.0003_not_jizya: "Deveríamos proceder como os muçulmanos costumam fazer e obrigá-los a pagar um imposto extra, pois certamente vocês foram extremamente generos[ROOT.Char.Custom('ES_OA')] com eles?\n\n"
 fp3_frontier_story_cycle.0003_ending: "\"Isso não é justo\", protesta [turkic_leader.GetFirstNameNoTooltip]. \"Dediquei cem arqueiros a cavalo ao seu serviço, assim como a mim mesmo. Se você se abstiver de nos taxar dessa maneira, prometo não esquecer o favor.\""
 fp3_frontier_story_cycle.0003.a: "Vamos encontrar cada moeda que a sua tribo escondeu."
 fp3_frontier_story_cycle.0003.b: "Não, [greedy_chaplain.GetFirstNameNoTooltip] está certo, você deve ser taxado."
 fp3_frontier_story_cycle.0003.c: "Muito bem, [turkic_leader.GetFirstNameNoTooltip], isso parece justo."
 resentful_nomads.toast: "Os nômades estão chateados"
 fp3_frontier_story_cycle.0004.t: "Órfãos pela [turkic_leader.GetCulture.GetNameNoTooltip]"
 fp3_frontier_story_cycle.0004.desc: "[orphan_girl.GetName] está em péssimo estado, assim como seu irmão pequeno [orphan_boy.GetName], que parece assolado por todo tipo de infortúnio.\n\n“Por favor, meu [ROOT.Char.GetTitleTierName|l]”, diz ela com a voz trêmula, “não comemos há uma semana. Posso pedir só um pedaço de pão? Não importa se estiver mofado, contanto que possam nos dar um pouco…”.\n\nAo ser interrogada, ela não parece saber ao certo quem é o culpado pelo infortúnio de sua família. “Uns cavaleiros vieram e arrasaram nossas colheitas, e roubaram nossas ovelhas… depois desapareceram. Agora não sei o que será de nós, mas sinto muito que [upset_vassal.Custom('ES_ElLa')] [upset_vassal.GetTitledFirstName|l] tenha incomodado vocês com este assunto banal”."
 fp3_frontier_story_cycle.0004.a: "Não se preocupe, eu vou cuidar de vocês."
 fp3_frontier_story_cycle.0004.b: "Me parece justo que você seja adotado pela tribo de [turkic_leader.GetFirstNameNoTooltip]."
 fp3_frontier_story_cycle.0004.c: "Vou enviar você para um mosteiro."
 fp3_frontier_story_cycle.0004.d: "Não faço ideia do que [upset_vassal.GetFirstNameNoTooltip] esperava. Vão encontrar um orfanato."
 fp3_pay_for_upkeep_flavor: "Você terá que pagar pelas despesas deles."
 fp3_frontier_story_cycle.0005.t: "Duzentos Cavaleiros"
 fp3_frontier_story_cycle.0005.desc: "Enquanto pondero sobre estratégia e batalhas, [turkic_leader.GetName] chega com centenas de cavaleiros em seu encalço\n\nMeu [ROOT.Char.GetTitleTierName|l], diz, fazendo uma reverência. Prometi apoiá-lo, assim como toda a minha tribo. Agora que você está em guerra, podemos lhe oferecer mais duzentos arqueiros montados habilidosos, mas só podemos poupá-los para o conflito em curso. Quando as coisas se acalmarem, eles voltarão para suas tendas e suas famílias. Tudo o que pedimos em troca é que você não se esqueça deste favor."
 fp3_frontier_story_cycle.0005.a: "Posso concordar com isso."
 fp3_frontier_story_cycle.0005.b: "Estou farto desta conversa de favores!"
 fp3_frontier_story_cycle.0005.c: "Não, obrigado, posso me virar sem eles."
 fp3_frontier_story_cycle.0006.t: "Uma Flecha Desgarrada"
 fp3_frontier_story_cycle.0006_beginning: "[one_eyed_child.GetName] corria explorando meu [ROOT.Char.Custom('ResidenceBuilding')], como gosta de fazer, quando a tragédia aconteceu. [turkic_leader.GetName] estava praticando tiro com arco com alguns de seus guerreiros e uma flecha perdida atingiu meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('one_eyed_child'))] alucad[one_eyed_child.Custom('ES_OA')] no olho."
 fp3_frontier_story_cycle.0006_has_court_physician: "“[one_eyed_child.GetNameNoTooltip] ficará bem, acredito”, diz meu médic[scoped_physician.Custom('ES_OA')] [scoped_physician.GetFirstName]. “Mas, ai, passará pela vida com um olho a menos. Posso aconselhá-los humildemente a que, no futuro, voem menos flechas pelo pátio?”.\n\n"
 fp3_frontier_story_cycle.0006_no_court_physician: "Um médico local chamado às pressas confirmou que [one_eyed_child.GetNameNoTooltip] se recuperará, mas o olho foi perdido para sempre.\n\n"
 fp3_frontier_story_cycle.0006_ending: ""Foi um acidente", suplica [turkic_leader.GetFirstName]. "Não tenha tanta pressa em me punir, [ROOT.Char.Custom('FormOfAddressForLiege')]. Se não praticarmos, como iremos defender suas terras?"."
 fp3_frontier_story_cycle.0006.a: "Você pode ponderar suas habilidades de arquearia... na masmorra."
 fp3_frontier_story_cycle.0006.b: "Daqui em diante, a arquearia está proibida ao redor do [ROOT.Char.Custom('ResidenceBuilding')]."
 fp3_frontier_story_cycle.0006.c: "Acho que foi a vontade de [ROOT.Char.GetFaith.HighGodNameAlternatePossessive]."
 fp3_frontier_story_cycle.0007.t: "Calamidade de Caravana"
 fp3_frontier_story_cycle.0007.desc: ""Oh, [ROOT.Char.GetTitleTierName|l]", diz meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('warmonger_councillor'))] [warmonger_councillor.GetFirstName], "os mercadores de [bandits_county.GetName] falam de ataques de bandidos a cavalo. Agora, as caravanas desviam dessa terra, prejudicando nosso comércio na Rota da Seda. Rogo que me envie para investigar esse assunto".\n\n"Não", interrompe ferozmente [turkic_leader.GetName]", posso enviar meus guerreiros para proteger permanentemente as rotas das caravanas… se pudermos deixar nossos cavalos pastarem em [bandits_county.GetNameNoTierNoTooltip] daqui em diante. Não seria uma medida melhor?".\n\nMas [warmonger_councillor.GetFirstNameNoTooltip] protesta. "Cuidado, [ROOT.Char.Custom('FormOfAddressForLiege')], os camponeses odeiam quando você permite que os nômades vaguem livremente"."
 fp3_frontier_story_cycle.0007.a: "Ainda assim, o plano de [turkic_leader.GetFirstNameNoTooltip] é o melhor."
 fp3_frontier_story_cycle.0007.b: "Justo o suficiente, vou lhe dar essa chance."
 fp3_frontier_story_cycle.0007.c: "Se apenas esperarmos, os comerciantes voltarão eventualmente."
 fp3_investigating_attacks_successful: "[warmonger_councillor.GetFirstNameNoTooltip] impede os ataques e aprende com isso"
 fp3_investigating_attacks_dismal_failure: "[warmonger_councillor.GetFirstNameNoTooltip] retorna sem resultados"
 fp3_investigating_attacks_toast_successful: "[bandits_county.GetNameNoTierNoTooltip] está seguro"
 fp3_investigating_attacks_toast_dismal_failure: "Bandidos reinam em [bandits_county.GetNameNoTierNoTooltip]"
 attacks_abated.toast: "Os ataques dos bandidos diminuíram"
 fp3_frontier_story_cycle.0099.t: "Enfeudação de [turkic_leader.GetFirstNameNoTooltip]"
 fp3_frontier_story_cycle.0099.desc: ""Há muito tempo vos sirvo lealmente, meu senhor[ROOT.Char.Custom('ES_XA')], e dei grande apoio à vossa causa a um alto custo pessoal". Parece que [turkic_leader.GetName] tem aguardado este momento, e não é preciso ser vidente para perceber o que vem a seguir.\n\n"Já passou da hora de me concederdes a recompensa e a responsabilidade que me são devidas. Concedei-me o título de [title_to_grant.GetName|l] para que eu o detenha em perpetuidade, e minha tribo servirá à casa de [ROOT.Char.GetDynastyHouseName] pelos séculos vindouros. Está longe de ser a mais rica de vossas terras, mas precisa urgentemente de uma administração mais direta. Honrai-me dessa forma, ou talvez eu leve meus guerreiros para outro lugar"."
 fp3_frontier_story_cycle.0099.a: "Considere-o seu."
 fp3_frontier_story_cycle.0099.b: "Você não preferiria meu título de [extra_title_to_grant.GetNameNoTooltip|l]?"
 fp3_frontier_story_cycle.0099.c: "Posso conceder-lhe meu título de [extra_extra_title_to_grant.GetNameNoTierNoTooltip|l], mas isso é tudo."
 fp3_frontier_story_cycle.0099.d: "Não."
 #Refuge of Light, by Ola Jentzsch
 fp3_yearly.8019.t: "Refúgio da Luz"
 fp3_yearly.8019.desc: "[hateful_ruler.Custom('ES_ElLa')|U] [hateful_ruler.GetTitleTierName|l] [hateful_ruler.GetFirstName] iniciou uma perseguição aos [manichean_leader.GetFaith.GetAdherentNamePlural] que restam em suas terras. [manichean_leader.GetName], um[manichean_leader.Custom('ES_XA')] líder desta fé sitiada vem me procurar, trazendo uma grande pilha de livros empoeirados.\n\n"Grande [ROOT.Char.GetTitleTierName|l]", diz ele, "minha fé é antiga, uma rival do cristianismo quando este ainda era jovem. Temos muito conhecimento sobre este mundo material decaído e até mesmo alguma humilde compreensão do mundo superior da luz. Alguns de nossos correligionários já se estabeleceram em [refuge_of_light.GetNameNoTier]… Permitiríeis que meus seguidores fizessem o mesmo?".\n\n"Em troca, posso ficar e servir a você, e compartilhar com você este tesouro de conhecimento de nossas antigas bibliotecas em Bagdá e Ctesifonte, antes de sua queda"."
 fp3_yearly.8019.a: "Aceito de bom grado essa proposta."
 fp3_yearly.8019.b: "Vocês podem se estabelecer em [refuge_of_light.GetNameNoTierNoTooltip] - se pagarem os impostos apropriados."
 fp3_yearly.8019.c: "Não abrigarei vocês em minhas terras."
 manicheans_sent_away.tt: "Você envia os [manichean_leader.GetFaith.GetAdherentNamePlural] embora"
 #The Lady of the Land, by Ola Jentzsch
 fp3_yearly.8020.t: "A Dama da Terra"
 fp3_yearly.8020.desc: "Há um santuário em [temple_county.GetNameNoTier], dedicado a [bibi_shahrbanu.GetFirstName] uma princesa sassânida que se casou com [imam_husayn.Custom('ES_ElLa')] o grande [imam_husayn.GetTitledFirstName|l]. Diz-se que, ao fugir a cavalo da Batalha de Karbala, ela clamou por salvação, e uma montanha se abriu e a acolheu. מאז então, muitas peregrinas têm ido a esse lugar para venerá-la.\n\nMas [righteous_caliph.Custom('ES_ElLa')] [righteous_caliph.GetTitledFirstName|l] afirma que o santuário era originalmente dedicado à divindade pagã [GetFaithByKey('mazdayasna').FertilityGodName], e que a devoção demonstrada ali é deturpada e ímpia. Ele quer que seja destruído.\n\n\"Não pode fazer isso\", me implora minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('pious_woman'))] [pious_woman.GetFirstName]. \"[bibi_shahrbanu.GetFirstNameNoTooltip] é um ícone para todas as mulheres da Pérsia. Você deve deixar o santuário em paz\"."
 fp3_yearly.8020.a: "Até mesmo colocarei guardas para protegê-lo, por sua causa."
 fp3_yearly.8020.b: "Ela era uma #italic princesa#! da Pérsia! Ninguém deve danificar esse santuário."
 fp3_yearly.8020.c: "Ai, ele deve ser destruído."
 supporting_womens_faith_flavor: "Você começa a apoiar o culto de [bibi_shahrbanu.GetFirstNameNoTooltip]."
 fp3_sharhabanu_devotees_angry.tt: "Devotos de [bibi_shahrbanu.GetFirstNameNoTooltip] em sua corte podem discordar disso"
 #Acidic Advancements, by Ola Jentzsch
 fp3_yearly.8021.t: "Um Acidente Ácido"
 fp3_yearly.8021.desc: "Há alguns dias, [alchemy_enthusiast.GetName], [Select_CString( alchemy_enthusiast.IsFemale, 'a erudita', 'o erudito' )] [alchemy_enthusiast.Custom2('RelationToMe', SCOPE.sC('upset_vassal'))] de meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('upset_vassal'))] [upset_vassal.GetFirstName] participou de um experimento com óleo de vitríolo elaborado pelo [enthusiastic_alchemist.Custom('ES_ElLa')] célebre alquimista [enthusiastic_alchemist.GetName]. Ao que parece, algo deu terrivelmente errado.\n\n“Você deve punir severamente [enthusiastic_alchemist.GetFirstNameNoTooltip]”, me diz [upset_vassal.Custom('ES_ElLa')] [upset_vassal.GetTitledFirstNameNoTooltip|l], “vejais o lamentável estado do meu [alchemy_enthusiast.Custom2('RelationToMe', SCOPE.sC('upset_vassal'))]!”.\n\n“Não, [ROOT.Char.GetTitleTierName|l] meu[ROOT.Char.Custom('ES_OA')]”, suplica [enthusiastic_alchemist.GetFirstNameNoTooltip], “eu apenas aperfeiçoei uma fórmula há muito buscada pelos sábios. Não é culpa minha que [alchemy_enthusiast.Custom('ES_ElLa')] [alchemy_enthusiast.GetTitledFirstNameNoTooltip|l] tenha sido negligente com uma #italic uqiyyah#! inteira da substância mais corrosiva já vista sobre a face da terra”."
 fp3_acid_delving_deeper_tooltip: "Você ignora a queixa de [upset_vassal.GetFirstNameNoTooltip] para explorar as descobertas de [enthusiastic_alchemist.GetNameNoTooltip]."
 fp3_yearly.8021.a: "[enthusiastic_alchemist.GetNameNoTooltip], me conte mais sobre essas descobertas..."
 fp3_yearly.8021.b: "Muito bem, [upset_vassal.GetTitledFirstNameNoTooltip|l], [enthusiastic_alchemist.GetHerHim] mandarei executar."
 fp3_yearly.8021.c: "Tenho espaço de sobra em minha masmorra para um[enthusiastic_alchemist.Custom('ES_XA')] alquimista mirrad[enthusiastic_alchemist.Custom('ES_OA')]…"
 fp3_yearly.8021.d: "Ninguém tem culpa aqui, vocês devem se perdoar mutuamente."
 fp3_yearly.8022.t: "Visões Vitríolicas"
 fp3_yearly.8022.desc: ""O que inventei deriva de um mineral vítreo que os babilônios e gregos da antiguidade chamavam #italic vitriolo#!", explica [enthusiastic_alchemist.GetName]. "Criei esta substância corrosiva ao torrar cuidadosamente vitriolo verde em uma retorta de ferro. Enxergo nela usos tanto acadêmicos quanto medicinais, mas cuidado, meu [ROOT.Char.GetLadyLord], não se deve brincar com ela, como aprendeu [alchemy_enthusiast.Custom('ES_ElLa')] [alchemy_enthusiast.GetTitledFirstName|l]. Talvez pudesse patrocinar minha pesquisa?"."
 fp3_yearly.8022.a: "Estudarei a substância pessoalmente!"
 fp3_yearly.8022.b: "Poderia ter algum... uso militar? #italic military#!"
 fp3_yearly.8022.c: "Bem feito, mas eu não tenho uso para isso."
 fp3_studying_acid_ominously_tooltip: "Você busca estudos adicionais..."
 fp3_yearly.8022.b.flavor: "[enthusiastic_alchemist.GetNameNoTooltip] permanece em sua corte para continuar a pesquisa."
 fp3_yearly.8022.c.flavor: "[enthusiastic_alchemist.GetNameNoTooltip] leva seu conhecimento para outro lugar."
 fp3_yearly.8023.t: "Enigmas Corrosivos"
 fp3_yearly.8023.desc: "Enquanto vou derramando cuidadosamente líquidos que crepitam sinistramente de uma garrafa para outra, [enthusiastic_alchemist.GetName] me olha com apreensão.\n\n“Oh, [ROOT.Char.GetTitleTierName]”, diz, “Comparad[enthusiastic_alchemist.Custom('ES_OA')] com vos, sou erudit[enthusiastic_alchemist.Custom('ES_OA')] em história e teologia, mas [Select_CString( enthusiastic_alchemist.IsFemale, 'una aficionada', 'un aficionado' )] sem mais nada em alquimia. Ainda assim, minha experiência me diz que não podemos aprender mais por enquanto. Devíamos parar de experimentar com este óleo de vitríolo que criei, ou temo que [ROOT.GetCharacter.GetFaith.HighGodNameAlternate] nos castigue por nossa vaidade. Pode ser que esse ácido não devesse ter sido colocado nesta terra.”"
 fp3_yearly.8023.a: "Não, eu verei isso até o fim."
 fp3_yearly.8023.b: "Talvez você tenha razão. Ainda assim, você deveria ficar e me servir."
 fp3_yearly.8023.c: "Como desejar. Vá e leve seu ácido consigo."
 experimenting_with_acid_toast.failure: "Seus experimentos falharam"
 experimenting_with_acid_toast.success: "Seus experimentos foram bem-sucedidos"
 fp3_horrible_accident.flavor: "Você corre o risco de um acidente horrível."
 fp3_yearly.8024.t: "O Retorno ao Céu"
 fp3_yearly.8024.desc: "Quando a febre e os calafrios cedem por um breve momento, [dying_consort.GetFirstName] me olha com um sorriso pálido. “Meu bom[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWifeHusband], não me resta muito tempo neste mundo. Nem o melhor dos médicos poderia adiar o inevitável, eu posso sentir isso”. Parece exigir grande esforço para permanecer consciente por mais algum tempo.\n\n“Escuta”, diz [dying_consort.GetFirstNameNoTooltip] com a voz enfraquecida, “pois este é o meu último desejo. Quero que meu corpo seja entregue às aves de rapina, como fizeram meus ancestrais, para que minha alma possa ser levada de volta à sua morada no céu. Nada de enterro nem cremação, por favor, eu lhe imploro. Vislumbrei o mundo além em meus sonhos febris... Quero terminar à moda antiga, como um[dying_consort.Custom('ES_XA')] verdadeiro[dying_consort.Custom('ES_OA')] [dying_consort.Custom('GetDaughterSon')] de Pérsia”."
 fp3_yearly.8024.a: "Verei que isso seja feito, prometo."
 fp3_yearly.8024.b: "Posso lhe proporcionar um funeral celeste em segredo, mas o reino nunca deve saber."
 fp3_yearly.8024.c: "Ai, não posso cometer tal afronta ao [ROOT.GetCharacter.GetFaith.HighGodNameAlternate]."
 fp3_relations_care_about_sky_burial.tt: "Seus [courtiers|lE], [vassals|lE] e [close_family_members|lE] terão opiniões sobre isso."
 hiding_sky_burial_toast.success: "Você ocultou o Funeral Celeste"
 hiding_sky_burial_toast.failure: "Seu Funeral Celeste foi revelado"
 fp3_hidden_sky_burial.tt: "Você realiza o ritual em segredo"
 fp3_unhidden_sky_burial.tt: "O ritual é descoberto após o fato"
 fp3_helpful_courtier.tt: "[helpful_courtier.GetName] ajudará você nesse empreendimento"
 fp3_yearly.8025.t: "A Quarta Manhã"
 fp3_yearly.8025.desc: "Com toda a cerimônia apropriada, o corpo de [dying_consort.GetName] repousa nos nichos de uma antiga #italic dakhma#!, exposta ao céu e aos abutres da estepe que já circulam acima.\n\nFaz três dias que ele morreu, e eu me vejo permanecendo junto à dakhma até o amanhecer. Segundo a tradição antiga, na quarta manhã após a morte, a alma retornaria ao seu espírito #italic fravashi#! no mundo superior. Ali, ela transmitiria aos fravashi tudo o que havia aprendido em vida, para ajudá-los na eterna batalha contra o mal. Mas não vejo nenhuma alma se elevando ao céu desde os muros ressequidos da dakhma, apenas a silhueta escura de aves carroçoeiras contra a pálida luz do sol nascente."
 fp3_yearly.8025.a: "Que ele/ela siga em paz para a outra margem."
 fp3_yearly.8025.b: "Cumpri o último desejo dele."
 fp3_yearly.8026.t: "O Dakhma Secreto"
 fp3_yearly.8026.desc: "Longe de minha [ROOT.Char.Custom('ResidenceBuilding')] há uma velha #italic dakhma#!, uma Torre do Silêncio, que desmorona lentamente com os ventos frios das estepes. Aqui, ao que parece, não há olhos curiosos e, junto com [helpful_courtier.GetFirstName], levo o corpo [dying_consort.Custom('ES_DelDela')] [dying_consort.GetTitledFirstName|l] ao seu lugar de descanso final nos nichos ressequidos no interior. Observo em silêncio enquanto os abutres da estepe descem como uma nuvem negra e, por um momento, me pergunto de onde vieram: teriam sido enviados pelos deuses antigos ou [ROOT.Char.GetFaith.DevilName]? Nunca saberei.\n\n[helpful_courtier.GetFirstNameNoTooltip] permanece em silêncio, aparentemente afetad[helpful_courtier.Custom('ES_OA')] pelo clima sombrio."
 fp3_yearly.8026.a: "Espero que ninguém descubra isso..."
 fp3_yearly.8026.b: "Eu deveria silenciar [helpful_courtier.GetFirstNameNoTooltip] para sempre, só para ter certeza[ROOT.Char.Custom('ES_OA')]…"
 fp3_yearly.8027.t: "Novecentos e Noventa Capítulos de Ouro"
 fp3_yearly.8027.desc: "[snubbed_poet.Custom('ES_ElLa')|U] célebre escritor[snubbed_poet.Custom('ES_XA')] [snubbed_poet.GetName] teve um desentendimento com seu antigo mecenas, [former_employer.GetName].\n\n"[former_employer.GetSheHe|U] me prometeu novecentos e noventa talentos de ouro", me diz [snubbed_poet.GetFirstNameNoTooltip], "um por cada capítulo da epopeia que preparei por tanto tempo em seu nome. Eu havia planejado usá-los para restaurar os #italic qanats#! derrubados em minha aldeia natal. Quando eu estava na casa de banhos, chegou um mensageiro com a recompensa prometida... mas as moedas eram de #italic prata#!! Indignad[snubbed_poet.Custom('ES_OA')] por essa traição, dei tudo ao mensageiro, ao dono da casa de banhos e a um vendedor ambulante de sucos. Agora preciso de um novo patrono, enquanto termino os últimos capítulos, e me disseram que você tem bastante ouro para igualar a oferta anterior...""
 fp3_yearly.8027.a: "Eu lhe darei #italic metade#! dessa quantia - quando eu vir o livro terminado."
 fp3_yearly.8027.b: "Deve ter sido um mal-entendido com [former_employer.Custom('ES_ElLa')] [former_employer.GetTitledFirstNameNoTooltip|l]…"
 fp3_yearly.8027.c: "Você me toma por um gastador? Vá a outro lugar."
 fp3_mediation_fails.tt: "Sua mediação falha"
 fp3_mediation_succeeds.tt: "Sua mediação é bem-sucedida"
 fp3_poet_leaves.tt: "[snubbed_poet.GetNameNoTooltip] se mudará para a corte de [former_employer.GetFirstNameNoTooltip], mas você ganhará [opinion|lE] e [prestige|lE]"
 fp3_promise_to_pay_for_book.tt: "Você promete pagar 495 peças de [gold|lE] pelo livro quando ele estiver terminado."
 fp3_mediate_between_them.flavor: "Você tenta esclarecer a situação entre [snubbed_poet.GetNameNoTooltip] e [former_employer.GetFirstNameNoTooltip]."
 fp3_yearly.8028.t: "O Livro dos Reis"
 fp3_yearly.8028.desc: "Está concluído\", declara [snubbed_poet.GetName], “Como prometi, todos os 990 capítulos, contos épicos do heroísmo persa e maravilhas em eras longínquas. Eu derramei minha alma neste trabalho, e nunca mais farei outro igual. Sou apenas um humilde poeta mortal. No entanto, graças ao seu patrocínio, talvez meu livro possa durar através das eras, e tornar-se um farol de orgulho ressurgente para a Pérsia.\"\n\n\"Agora... você tinha me prometido 495 talentos de ouro?"
 fp3_yearly.8028.a: "Eles são seus, e você deve ficar e me servir."
 fp3_yearly.8028.b: "Sim, pegue-os e vá ajudar sua vila."
 fp3_yearly.8028.c: "#italic Isso#! é pelo que paguei? Que decepção."
 shahnameh_name: "O Livro dos Reis"
 shahnameh_desc: "Este imenso tomo conta, em verso e detalhe requintados, da história mítica do Império Persa desde a criação do mundo até a conquista muçulmana. Parece mexer com o coração de cada persa que o lê."
 persian_epic_name: "Épico Persa"
 persian_epic_desc: "Este livro está repleto de poesia épica que celebra as ações e destinos dos heróis persas nos dias de antigamente."
 fp3_yearly.8029.t: "Um Conto da Antiga Glória"
 fp3_yearly.8029.desc: "[snubbed_poet.GetName] me entrega seu manuscrito, e muitas páginas já estão adornadas com finas miniaturas desenhadas com mão hábil. "Aqui está o livro que vos prometi", declara triunfante. "E com a humilde habilidade que eu possa possuir, prometo que não o considerareis insuficiente. Fala de heróis como Arash, o Arqueiro, Fereydun, o Matador de Dragões, belas princesas e a antiga glória da Pérsia. Até fiz um dístico ligando toda a vossa grande dinastia a isso…".\n\n"E então, não dissemos algo sobre 495 talentos de ouro?"."
 fp3_yearly.8029.a: "Eles são seus, e você deve ficar e me servir."
 fp3_yearly.8029.b: "Sim, pegue-os e vá ajudar sua vila."
 fp3_yearly.8029.c: "Tanto ouro por #italic isso#!?"
 fp3_yearly.8030.opening: "[former_employer.Custom2('AppropriateGreetingNegative', ROOT.Char)]"
 fp3_yearly.8030.desc: "Vocês me tomaram por um idiota? [snubbed_poet.GetName] gastou minhas riquezas em miseráveis vendedores ambulantes e donos de #italic hamam#! depravados, e embora agora afirme que recebeu prata, pessoas mais confiáveis do que você me disseram que, de fato, foi ouro. E mesmo assim, roubou o livro que me havia sido prometido, para #italic vos#!. Que [former_employer.GetFaith.HighGodNameAlternate]o tire do jardim do paraíso!"
 fp3_yearly.8030.a: "Uma pena que você não possa ver a razão..."
 fp3_yearly.8031.opening: "[former_employer.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 fp3_yearly.8031.desc: "De fato, aconteceu que um cortesão meu, rancoroso, me traiu e deu a [snubbed_poet.GetName] menos do que eu lhe havia prometido. Obrigado por esclarecer este mal-entendido entre [Select_CString( snubbed_poet.IsFemale, 'a poetisa', 'o poeta' )], que agora voltará a meu serviço, e eu. Falarei bem de você com outros governantes deste mundo."
 fp3_yearly.8031.a: "Foi um prazer."
 fp3_yearly.8032.t: "Os Dez Dias dos Mortos"
 fp3_yearly.8032.desc: "À medida que o fim do ano do antigo calendário persa se aproxima, é hora do #italic Frawardigan#!, um antigo festival que comemora as almas dos mortos. Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('death_enthusiast'))], [death_enthusiast.Custom('ES_ElLa')] [death_enthusiast.GetTitledFirstName|l], tem se tornado notavelmente mais silencios[death_enthusiast.Custom('ES_OA')], quase abatid[death_enthusiast.Custom('ES_OA')], e coloca, junto às portas, oferendas de comida para os espíritos ancestrais.\n\n“Vocês deveriam ir acender as lamparinas”, me diz, “para receber os espíritos #italic fravashi#!, pois, sem dúvida, seus antepassados estão nos observando agora, além das finas paredes deste mundo material. Pensem em [ancestor_1.GetName] e em outros poderosos antepassados de sua casa.”"
 fp3_yearly.8032.a: "Ai, eu não celebro rituais pagãos."
 fp3_yearly.8032.b: "Claro, meu querido[death_enthusiast.Custom('ES_OA')]."
 fp3_yearly.8032.c: "A casa [ROOT.Char.GetDynastyHouseName] é bastante gloriosa, agora que você mencionou..."
 fp3_yearly.8032.d: "De fato... a vida é como uma vela breve, facilmente apagada."
 fp3_yearly.8033.t: "Delícias Congeladas"
 fp3_yearly.8033.desc: "Antes que ninguém mais, o olhar atento e guloso de minha[sorbet_enthusiast.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('sorbet_enthusiast'))], [sorbet_enthusiast.Custom('ES_ElLa')] [sorbet_enthusiast.GetTitledFirstName|l], notou uma escassez evidente nas mesas.\n\n«Não há #italic falude#!!», exclama, referindo-se a essa sobremesa gelada com macarrão, xarope e água de rosas que é a delícia de todo persa. «Mandei chamar o fornecedor», continua, «e me disseram que um terremoto derrubou as casas de gelo #italic yakhchal#! de [yakhchal_county.GetNameNoTier]. Precisamos fazer algo imediatamente, ou toda a corte sofrerá e ficará tão abatida que alguém poderia nos confundir com místicos do Oriente!»."
 fp3_yearly.8033.a: "Devo garantir todo o suprimento de faloodeh do reino, enquanto ainda posso!"
 fp3_yearly.8033.b: "Não preciso desse tipo de excesso, nem você."
 fp3_yearly.8033.c: "Você está certo. Vou enviar ouro para restaurar as casas de gelo."
 fp3_yearly.8033.d: "Da próxima vez, me incomode com um problema #italic real#!"
 fp3_yearly.8034.t: "O Tesouro dos Hephtalitas"
 fp3_yearly.8034.desc: ""Escute, meu [ROOT.Char.GetTitleTierName|l]", suplica diante de mim [wronged_vassal.GetName]. "Há um mês, eu estava inspecionando umas terras junto a um rio em [hephthalite_hoard_province.GetNameNoTier], quando dei de cara com um magnífico tesouro de ouro. Pelo formato alongado dos crânios dos reis representados nas moedas, pude ver que o tesouro devia ter sido escondido por um povo huno, talvez os heftalitas imperiais, que governaram minhas terras não faz muito tempo. Agora, sendo descendente de sua linhagem, acho que tenho o direito de reivindicar esse tesouro. Mas meu senhor[greedy_vassal.Custom('ES_XA')], [greedy_vassal.Custom('ES_ElLa')] [greedy_vassal.GetTitledFirstName|l], contesta isso. Ele está tentando tirar o tesouro de mim, alegando que ele é seu direito como sucessor[greedy_vassal.Custom('ES_XA')] do domínio heftalita dessas terras. Por favor, apoie-me"."
 fp3_yearly.8034.a: "Vamos facilitar isso - #italic Eu#! ficarei com o ouro."
 fp3_yearly.8034.b: "Você deve dar tudo a [greedy_vassal.GetFirstNameNoTooltip]."
 fp3_yearly.8034.c: "Um compromisso é necessário - dê ao povo de [hephthalite_hoard_province.GetNameNoTierNoTooltip]."
 fp3_yearly.8034.d: "Vou deixar você ficar com ele - mas não esqueça deste favor."
 fp3_yearly.8035.t: "O Coração e o Criador"
 fp3_yearly.8035.desc: "Enquanto caminho inquiet[ROOT.GetCharacter.Custom('ES_OA')] sob a luz da lua, [sufi_mystic.Custom('ES_ElLa')] [sufi_mystic.GetTitledFirstName|l] se junta a mim.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U]", diz solenemente, "gostariais de se aproximar de [ROOT.GetCharacter.GetFaith.HighGodNameAlternate]? Conheci um místico sufista do Coração, que me ensinou a meditação #italic muraqaba#!. O caminho não é fácil, mas por meio dela, podeis expurgar vossos instintos mortais mais baixos, revelar o conhecimento oculto e ascender a estados de bem-aventurança e unidade com o/a [ROOT.Char.GetFaith.ReligiousText] e o universo. Me deixareis guiar-vos?"."
 fp3_yearly.8035.a: "Sim, estou preparado[ROOT.GetCharacter.Custom('ES_OA')] para tentar."
 fp3_yearly.8035.b: "Seja o que for, deve ser profano."
 fp3_yearly.8035.c: "Prefiro dormir, obrigado."
 fp3_unlock_meditation.tt: "Desbloqueia a [decision|lE] Meditar em Solidão"
 learning_muraqaba_toast.success: "Você aprendeu o básico de #italic muraqabah#!."
 learning_muraqaba_toast.failure: "Você falhou em aprender o básico de #italic muraqabah#!."
 fp3_yearly.8036.t: "A Cidade dos Sem Bocas"
 fp3_yearly.8036.desc: "O sol já se pôs enquanto cavalgava pelos ermos nos arredores de [spooky_county.GetNameNoTier] com meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('superstitious_councillor'))] [superstitious_councillor.Custom('ES_ElLa')] [superstitious_councillor.GetTitledFirstName|l] a tiracolo.\n\nÀ luz sombria da lua, chegamos a um lugar de que já ouvi falar antes. Um vasto labirinto de pedras erguidas — irregulares e inclinadas —, um lugar de sepultamento ou local sagrado de um povo esquecido de tempos remotos. Mas nas pedras foram entalhadas feições humanas, exceto pela falta de bocas. Esses ídolos ressequidos nos encaram friamente quando tentamos passar e quase parecem se mover.\n\n\"Não demoremos aqui\", diz [superstitious_councillor.GetFirstNameNoTooltip], tremendo. Ainda assim, não consigo evitar perguntar-me: quem eram essas pessoas? Será que existem fantasmas mesmo?"
 fp3_yearly.8036.a: "Ficaremos por um momento e investigaremos este lugar."
 fp3_yearly.8036.b: "Deixemos este lugar com pressa e encontremos mais guardas..."
 fp3_yearly.8036.c: "Acalme-se, [superstitious_councillor.GetFirstNameNoTooltip]. São apenas sombras e poeira."
 fp3_yearly.8036.d: "Devo ler uma prece, apenas para ter certeza."
 fp3_yearly.8037.t: "Uma Cura para Acedia"
 fp3_yearly.8037.desc: "Enquanto vagueio sem vontade à luz da lua, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('court_physician'))], [court_physician.Custom('ES_ElLa')] [court_physician.GetTitledFirstName|l], aproxima-se.\n\n “Meu [ROOT.Char.GetTitleAsNameNoTooltip|l]”, diz, “ultimamente tendes parecido bastante abatid[ROOT.Char.Custom('ES_OA')]. Não pude evitar tentar diagnosticar... Creio que sofreis de acídia, esse estado miserável de tédio que costuma afligir eremitas e [Select_CString(ROOT.Char.IsFemale,'sabias','sabios')]. Mas temos [Select_CString(persian_polymath.IsFemale,'a la erudita','al erudito')] [persian_polymath.GetName], muito melhor [Select_CString(persian_polymath.IsFemale,'médica','médico')] que eu. Escreveu recentemente um livro sobre as aflições da mente e talvez possa tratar-vos”."
 fp3_yearly.8037.a: "Envie[persian_polymath.GetHerHim] chamar, custe o que custar."
 fp3_yearly.8037.b: "Deixe-me em paz."
 fp3_yearly.8038.t: "Bile Negra"
 fp3_yearly.8038.desc: "Após me observar atentamente desde que chegou à minha [ROOT.Char.Custom('GetCourt')], [persian_polymath.GetFirstName] já tem um diagnóstico.\n\n"Trata-se de um excesso de bile negra no cérebro, meu [ROOT.Char.GetTitleTierName|l]. Até mesmo os antigos compreendiam os fundamentos dessa afecção, mas meus colegas eruditos de Coração e Corásmia a estudam há muito tempo. Chamamos de #italic malikhulia#! e isso nos deixa sem alegria e abatidos. Alguns pacientes perdem o apetite ou imitam o comportamento dos animais, mas também podem se tornar propensos à inovação e à inteligência, o que talvez não seja tão infeliz".\n\n"Mas estou divagando… experimentaria uma dieta de peixe salgado e talos de aipo? A experiência mostrou que isso pode ser eficaz"."
 fp3_yearly.8038.a: "Muito bem, vou tentar."
 fp3_yearly.8038.b: "#italic Isso#! é o melhor tratamento que você tem? Vou procurar alguém mais..."
 lackluster_diet.tt: "Você não conseguirá tomar a decisão Indulge in Food [decision|lE] enquanto estiver nesta dieta"
 fp3_yearly.8039.t: "Ervas e Humores"
 fp3_yearly.8039.desc: "[persian_polymath.GetFirstName] está imerso em pensamentos. "A dieta que prescrevi a vós parece não ter tido efeito, [ROOT.Char.Custom('FormOfAddressForLiege')]. Deveis abster-vos de buscar consolo na lua e nas estrelas, amuletos e outros remédios igualmente primitivos, pois não têm efeito algum. Eu sugeriria o consumo diário de certas ervas medicinais, como talos de funcho, pepinos e incenso. Isso pode neutralizar a bile negra, reequilibrar os vossos humores e melhorar a vossa potência espiritual, o que certamente vos beneficiaria"."
 fp3_yearly.8039.a: "Parece valer a pena tentar."
 fp3_yearly.8039.b: "Prefiro manter a fé na minha dieta, vamos mantê-la um pouco mais."
 fp3_yearly.8039.c: "Cansado de seus remédios ineficazes. Deixe-me."
 fp3_yearly.8040.t: "Potência Psíquica"
 fp3_yearly.8040.desc: ""Ai, [ROOT.Char.Custom('FormOfAddressForLiege')]", diz. "Embora eu acredite que tenhamos visto alguma melhora em seu humor e em sua condição física, ainda não curei sua melancolia. As doenças da mente são inimigos obstinados. Ainda há remédios a tentar. Em meu livro, afirmei que a psique humana é um sistema independente, que influencia seu aspecto físico. Devemos melhorar sua potência psíquica, provando ao seu subconsciente que o espírito é eterno, intacto pela morte. Em poucas palavras, você deve reafirmar sua fé em [ROOT.GetCharacter.GetFaith.HighGodNameAlternate]"."
 fp3_yearly.8040.a: "Buscarei ensinamentos sufistas."
 fp3_yearly.8040.b: "Vou consultar [court_chaplain.Custom('ES_ElLa')] [court_chaplain.GetTitledFirstName|l]."
 fp3_yearly.8040.c: "Minha fé nunca vacilou. Quem você pensa que sou?"
 fp3_yearly.8040.d: "Isso é inútil, vá e venda suas 'soluções' em outro lugar."
 fp3_refusing_faith_treatment_flavor: "Você recusa este tratamento, mas os esforços de [persian_polymath.GetFirstNameNoTooltip] poderão continuar."
 fp3_yearly.8041.t: "O Consolo do Silêncio"
 fp3_yearly.8041.desc: "“Este seria um caminho difícil”, declara [sufi_mystic.GetName] depois de ter sido informado dos meus problemas.\n\n“Os caminhos das ordens sufis #italic tariqa#! podem trazer grande compreensão sobre o ser e o universo, mas é necessária uma disciplina tremenda para alcançá-la. Eu mesm[sufi_mystic.Custom('ES_OA')] não sou mais que [Select_CString( sufi_mystic.IsFemale, 'una iniciada', 'un iniciado' )] no caminho. No entanto, meu [ROOT.Char.GetTitleTierName|l], poderíamos tentar alcançar o #italic fana#!, esse estado de meditação em que, mesmo sendo apenas uma pequena gota de água no sonho [ROOT.GetCharacter.GetFaith.HighGodNameAlternatePossessive], nos tornamos conscientes do oceano ao nosso redor. Acho que isso poderia lhes trazer uma nova perspectiva sobre esta breve vida”."
 fp3_yearly.8041.a: "Estou pront[ROOT.Char.Custom('ES_OA')]."
 fp3_yearly.8041.b: "Prefiro buscar algum outro remédio..."
 fp3_yearly.8042.t: "O Espírito Imortal"
 fp3_yearly.8042.desc: "Certamente, diz meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('court_chaplain'))] [court_chaplain.GetFirstName], nossas provações e aflições nesta vida terrena não são mais do que coisas passageiras, mas vosso espírito perdurará. Ainda assim, compreendo, [ROOT.Char.Custom('FormOfAddressForLiege')], que essa afirmação por si só não seja suficiente para vos consolar.\n\nDesenrola um pergaminho. Isto é uma parte de meu [ROOT.Char.GetFaith.ReligiousText2], que sant[ROOT.Char.Custom('ES_OA')]s muito mais sabi[ROOT.Char.Custom('ES_OA')]s do que nosotr[ROOT.Char.Custom('ES_OA')]s transcreveram há muito tempo. Contém descrições vívidas do Além e versículos que podem conter algumas pistas sobre o significado de tudo isso. Sugiro que o estudeis, muitas vezes se necessário, até que vossa alma esteja em paz. Mas, se a leitura não for do vosso agrado, podeis visitar o/a [ROOT.Char.GetFaith.HouseOfWorship], para ter um diálogo interior com [ROOT.GetCharacter.GetFaith.HighGodName]."
 fp3_yearly.8042.a: "Os textos serão suficientes."
 fp3_yearly.8042.b: "Talvez o [ROOT.Char.GetFaith.HouseOfWorship] seja mais para mim."
 fp3_yearly.8042.c: "Parece que você não pode me ajudar afinal."
 fp3_yearly.8043.t: "Fim dos Remédios"
 fp3_yearly.8043.desc: "[persian_polymath.GetFirstName] me observou durante muitas semanas, imerso[persian_polymath.Custom('ES_OA')] em seus pensamentos.\n\n“Infelizmente, não sei mais o que fazer, grande [ROOT.Char.GetTitleTierName|l]. Empreguei todo o conhecimento e habilidade que possuo, mas, como eu disse antes, doenças da mente são muito difíceis de curar. Ainda assim, creio que fizemos progresso, pois seus humores parecem estar melhor equilibrados e seu espírito se fortaleceu. Se tiver paciência e continuar consumindo quantidades saudáveis de peixe, bem como algumas das ervas que lhe prescrevi, creio que, [ROOT.GetCharacter.GetFaith.HighGodNameAlternate] mediante, ainda poderá vencer a #italic malikhulia#!”.\n\n“Mas preciso partir, pois tenho conhecimentos a buscar em outro lugar”."
 fp3_yearly.8043.a: "Vou comprar todos os livros que você quiser. Ainda preciso de você."
 fp3_yearly.8043.b: "Talvez tenha sido sem esperança desde o início."
 fp3_polymath_stays_flavor: "[persian_polymath.GetFirstNameNoTooltip] permanece em sua corte."
 fp3_yearly.8044.t: "A Luz do Mundo"
 fp3_yearly.8044.desc: "Durante muito tempo, o mundo me pareceu monótono e triste. As coisas de que eu costumava gostar pareciam distrações passageiras, desprovidas de significado ou substância. Meus pensamentos vagavam por regiões escuras e lúgubres, e meus sonhos eram cheios de medo. No entanto, esse desânimo tão prolongado começou a se dissipar.\n\nAo contemplar as terras ao meu redor, vejo a luz atravessando as nuvens. Vejo a beleza do mundo e todos os seus mistérios. Talvez tenham sido todos os tratamentos que [persian_polymath.GetFirstName] me receitou, talvez tenha sido outra coisa. Talvez eu nunca saiba. Mas algo mudou dentro de mim. Volto a me sentir complet[ROOT.Char.Custom('ES_OA')]."
 fp3_yearly.8044.a: "Devo valorizar esse sentimento, pode não durar."
 #Sick Monkey Chain
 fp3_yearly.8045.t: "O Pacote Misterioso"
 fp3_yearly.8045.desc: "Durante um passeio à luz do luar, encontro meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('buzina_enthusiast'))], [buzina_enthusiast.GetName], que embala um embrulho do tamanho de um bebê. Mas as aparências enganam: de dentro da envoltura saem sons estranhos e o rosto de [buzina_enthusiast.GetNameNoTooltip] apresenta inúmeras arranhaduras.\n\n"Não é uma criança, [ROOT.Char.Custom('FormOfAddressForLiege')], mas uma macaca", sussurra. "Enquanto arrecadava impostos para [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip|l], aceitei-a como pagamento em vez de ouro. Diz-se que ela pertencia anteriormente a um grande rei oriental que lhe ensinou a jogar xadrez. Mas, infelizmente, ela adoeceu e se tornou um pouco… agressiva".\n\n[buzina_enthusiast.GetSheHe|U] me entrega o embrulho e continua. "Mas certamente, sob seus cuidados, em breve ela recuperará a saúde"."
 fp3_yearly.8045.a: "Meu médico provavelmente tem algum remédio..."
 fp3_yearly.8045.b: "Pago a você para coletar ouro, #EMP não macacos!#!"
 fp3_yearly.8045.c: "Não sei sobre isso..."
 sick_monkey_flavor_desc: "Um macaco que sabe jogar xadrez seria certamente divertido."
 playing_with_monkey.tt: "Desbloqueia a [decision|lE] Brincar com o Macaco enquanto você a tiver"
 fp3_inspired_tax_collector: "[buzina_enthusiast.GetShortUIName] se esforça para ser melhor na arrecadação de impostos"
 fp3_yearly.8046.t: "Remédio para o Macaco"
 fp3_yearly.8046.desc: ""Até onde sei", diz [court_physician.GetName], "os macacos são descendentes de Gayōmart, o primeiro homem. Sua condição corporal é semelhante à nossa e talvez também sua condição espiritual. Alguns, segundo ouvi, até conseguem falar!".\n\n"Deveria ser capaz de curar esta pequena de sua enfermidade, mas o melhor método seria uma poção de ervas que é cara de obter. A alternativa seria uma dieta de peixe salgado e incenso…".\n\n[court_physician.GetNameNoTooltip] observa as garras afiadas da macaca com grande preocupação."
 fp3_yearly.8046.a: "Não poupe despesas."
 fp3_yearly.8046.b: "Ela é forte, uma dieta saudável será suficiente."
 fp3_wait_and_see.tt: "Apenas o tempo dirá se a cura se mostrará eficaz"
 monkey_recover_better_chances_tt: "As chances de recuperação do macaco serão melhoradas"
 playing_chess_with_monkey.tt: "Agora você pode usar a interação Desafiar para um Jogo de Tabuleiro [interaction|lE] enquanto o macaco estiver vivo."
 fp3_yearly.8047.t: "Sentindo-se Melhor"
 fp3_yearly.8047.desc: "Meu médico vem me ver com a macaca doente que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('buzina_enthusiast'))], [buzina_enthusiast.GetName] trouxe para casa.\n\n“Meu senhor[ROOT.Char.Custom('ES_XA')], tenho o prazer de informar que a macaca recuperou a vontade de viver e seu temperamento se suavizou. Embora ela não pareça ser uma #EMP maestra#! de xadrez, sem dúvida foi treinada para jogar em certa medida”.\n\nMesmo que essa macaca não seja mestra do jogo, pessoas virão de todos os cantos para presenciar semelhante maravilha do treinamento…"
 fp3_yearly.8047.a: "Hora de enviar os convites!"
 monkey_died_from_sickness_toast: "Seu macaco de estimação morreu devido à sua doença."
 ##################################################
 #ZOROASTRIAN EVENTS
 ##################################################
 fp3_yearly.8050.t: "O Destino dos Mortos"
 fp3_yearly.8050_zoroastrian.desc: "Como [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip] temos o dever sagrado de lutar contra a influência de Nasu, o daeva da decomposição. Portanto, meu [dakhma_enthusiast.GetCouncilTitle|l] [dakhma_enthusiast.GetFirstName] parece bastante preocupad[dakhma_enthusiast.Custom('ES_OA')] com as notícias que traz de [dakhma_county.GetName]."
 fp3_yearly.8050_unzoroastrian.desc: "Há queixas sobre as práticas funerárias dos meus súditos zoroastrianos de [dakhma_county.GetName], e meu [dakhma_enthusiast.GetCouncilTitle|l] [dakhma_enthusiast.GetFirstName] parece especialmente preocupado[dakhma_enthusiast.Custom('ES_OA')]."
 fp3_yearly.8050_early_period.desc: "\n\n"No passado, meu sabi[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleTierName|l]", começa, "o costume era deixar os corpos dos mortos expostos na natureza, onde não podem contaminar os três elementos sagrados".\n\n"Mas, à medida que os assentamentos cresceram em [dakhma_county.GetNameNoTierNoTooltip], já não há espaço suficiente e as pessoas começaram a perturbar acidentalmente os mortos. Deveríamos construir uma #italic dakhma#!, uma Torre do Silêncio, onde os mortos possam ser alojados com segurança, expostos a cães e aves carniceiras, até que só reste poeira"."
 fp3_yearly.8050_late_period.desc: "\n\n“Há muito tempo, meu sábio[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleTierName|l]”, diz, “foi construída uma pequena #italic dakhma#! em [dakhma_county.GetNameNoTierNoTooltip], onde os mortos podiam ser expostos aos elementos e às aves carniceiras. Mas a torre é velha, está desmoronando e há preocupação de que a matéria dos cadáveres esteja vazando, contaminando os três elementos sagrados”.\n\n“Os habitantes locais agradeceriam muito se os ajudássemos a construir uma nova torre, onde seus mortos possam descansar em নিরাপ..."
 fp3_yearly.8050.a: "Meu arquiteto [architect.GetFirstNameNoTooltip] pode nos ajudar a economizar algum dinheiro aqui..."
 fp3_yearly.8050.b: "Certamente, posso contribuir com parte do meu tesouro para isso."
 fp3_yearly.8050.c: "Esses hereges podem deixar seus mortos em uma vala, tanto faz para mim."
 fp3_yearly.8050.d: "Isso parece caro. O que funcionava no passado pode funcionar agora também."
 fp3_zoroastrian_courtiers_and_vassals_happy: "[courtiers|E], [guests|lE] e [vassals|lE] [GetReligionByKey('zoroastrianism_religion').GetAdherentNamePlural] piedosos aumentarão sua [opinion|lE] sobre você."
 building_a_dakhma.failure: "[architect.GetFirstName] projetou uma Torre do Silêncio defeituosa"
 building_a_dakhma.success: "[architect.GetFirstName] projetou uma Torre do Silêncio funcional"
 fp3_cheap_architecture_flavor: "Quanto mais barato, melhor!"
 fp3_silence_architecture_success_toast: "A economia de custos foi bem-sucedida"
 fp3_silence_architecture_failure_toast: "A construção é #italic muito#! questionável"
 fp3_yearly.8051.t: "O Fogo Mais Puro"
 fp3_yearly.8051_opening.desc: "O fogo sagrado que costumava queimar no templo de [sacred_fire_province.GetName] foi recentemente"
 fp3_yearly.8051_torrential_rain: "apagado por uma chuva torrencial, tão intensa que vazou através das rachaduras no teto do templo e atingiu o fogo abaixo."
 fp3_yearly.8051_earthquake: "apagado quando um terremoto atingiu o templo, quase dividindo o prédio ao meio."
 fp3_yearly.8051_sandstorm: "apagado por uma tempestade de areia tão violenta que quebrou as portas do templo."
 fp3_yearly.8051_gust_of_wind: "apagado por uma rajada de vento gelado, que deve ter vindo de alguma fenda oculta nas paredes do templo."
 fp3_yearly.8051_islamic_zealots: "extinto por fanáticos muçulmanos, que invadiram o templo e o profanaram de maneiras muito criativas."
 fp3_yearly.8051_invisible_hand: "e bastante misteriosamente apagado, como por uma mão invisível."
 fp3_yearly.8051_ending.desc: "Apesar deste mau presságio, [magi.GetName] não parece se desesperar.\n\n\"Devemos reacender o fogo\", declara. \"A chama mais pura e grandiosa de todas seria #italic Atash Behram#!, o Fogo da Vitória, nascido do relâmpago entre as nuvens. Mas, como este é um templo menor, talvez devêssemos nos contentar com #italic Atash Adaran#!, o Fogo dos Fogos, que a forja de um ourives poderia nos fornecer. Ou até mesmo o de grau mais baixo, o #italic Atash Dadgah#!, que pode ser consagrado a partir de qualquer chama doméstica...\"."
 fp3_yearly.8051.a: "Só um raio servirá. Vou encontrá-lo para você. "
 fp3_yearly.8051.b: "Vamos conseguir um fogo de ourives."
 fp3_yearly.8051.c: "Não me preocupo muito com presságios. Uma chama doméstica será suficiente."
 fp3_yearly.8051_chasing_lightning.tt: "Você aguardará a próxima tempestade..."
 fp3_yearly.8052.t: "Perseguindo as Nuvens"
 fp3_yearly.8052.desc: "Os [ROOT.Char.GetFaith.AltPriestTermPlural] têm me lembrado constantemente da promessa de encontrar um fogo da vitória para o templo de [sacred_fire_province.GetName]. Não é que eu tenha esquecido… Enviei batedores em todas as direções em busca de uma tempestade, em busca de um sinal de [ROOT.GetCharacter.GetFaith.HighGodName], mas o raio tem se mostrado esquivo.\n\nNo entanto, agora mesmo estou do lado de fora da minha [ROOT.Char.Custom('ResidenceBuilding')], enquanto o trovão ecoa à distância e relâmpagos cortam as nuvens escuras. Meus servos correm de um lado para outro tentando captar os relâmpagos com altos postes, enquanto observo a terra em busca de qualquer indício de chama. Nossos esforços são em vão: as nuvens logo se dissipam e o raio desaparece nos céus elevados.\n\n[ROOT.GetCharacter.GetFaith.HighGodName], é realmente esta a tua vontade? Nunca encontrarei o fogo que procuro?"
 fp3_yearly.8052.a: "Deveria apenas levar ao templo um fogo de ourives..."
 fp3_yearly.8052.b: "Posso muito bem me contentar com uma chama inferior."
 fp3_give_up_the_quest.flavor: "Você desiste da busca pelo Fogo da Vitória... por enquanto."
 fp3_yearly.8053.t: "O Fogo da Vitória"
 fp3_yearly.8053.desc: "Dias e semanas se passaram, meus exploradores vasculhando o reino em busca de fogo gerado por raios, sem sucesso. Mas, à medida que começo a ficar desanimado, nuvens escuras surgem no horizonte, um som retumbante de trovão ecoando ao longe. Eu saio apressado de minha [ROOT.Char.Custom('ResidenceBuilding')] em direção à tempestade, com servos ao meu lado, e de fato, ela se aproxima, como se fosse chamada por uma mão invisível.\n\nEntão, bem na minha frente, uma luz brilhante perfura as nuvens e desce como uma lança de [ROOT.Char.GetFaith.DivineRealm], atingindo uma árvore solitária. A madeira seca se inflama imediatamente, queimando com uma chama branca, tão pura quanto os espíritos #italic fravashi#!. Eu encontrei, o Fogo da Vitória. Ele veio até mim!"
 fp3_yearly.8053.a: "Não posso acreditar nisso..."
 ##################################################
 #SCHOLARSHIP EVENTS
 ##################################################
 fp3_scholarship.0001.t: "Erudito Chegou"
 fp3_scholarship.0001.desc: "[scholar.Custom('ES_ElLa')|U] [scholar.GetTitledFirstName|l] chegou na esperança de receber patrocínio científico"
 fp3_scholarship.1000.t: "Um Segundo Aryabhata"
 fp3_scholarship.1000.desc: "O prestígio das matemáticas indianas chegou aos meus ouvidos, proferido até mesmo pelos mais humildes estudantes de aritmética. Se eu enchesse os salões da minha corte com a erudição [nearby_indian_ruler.GetCulture.GetName] talvez [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] pudesse se tornar um centro de matemática por mérito próprio.\n\nPoderia pedir a [nearby_indian_ruler.Custom('ES_AlAla')] [nearby_indian_ruler.GetTitledFirstName|l] que me enviasse vários desses eruditos, mas [nearby_indian_ruler.GetSheHe] aceitaria tal proposta?"
 fp3_scholarship.1000.a: "Certamente não recusará meu pedido."
 fp3_scholarship.1000.b: "Um presente generoso adoçará a proposta."
 fp3_scholarship.1000.c: "Eruditos [ROOT.Char.GetCulture.GetNameNoTooltip] não precisam da ajuda de [nearby_indian_ruler.GetCulture.GetNameNoTooltip]!"
 fp3_scholarship.1000.duel_success: "[nearby_indian_ruler.GetNameNoTooltip] aceita meu pedido."
 fp3_scholarship.1000.duel_success_tt: "Vários matemáticos [nearby_indian_ruler.GetCulture.GetNameNoTooltip] chegarão em breve à minha corte."
 fp3_scholarship.1000.duel_failure: "[nearby_indian_ruler.GetNameNoTooltip] zomba da minha impudência."
 fp3_scholarship.1000.gift_failure: "[nearby_indian_ruler.GetNameNoTooltip] guarda meu presente."
 fp3_scholarship.1000.native_tt: "Um matemático da cultura [SCOPE.GetRootScope.GetCharacter.GetCulture.GetNameNoTooltip] será elevado à corte graças ao nosso financiamento."
 fp3_scholarship.1001.t: "Matemático Chegou"
 fp3_scholarship.1001.desc: "[nearby_indian_ruler.Custom('ES_ElLa')|U] [nearby_indian_ruler.GetTitledFirstNameNoTooltip|l] enviou [mathematician.Custom('ES_AlAla')] [mathematician.GetTitledFirstName|l] para se juntar à minha corte."
 fp3_scholarship.1001.native.desc: "[mathematician.Custom('ES_ElLa')|U] [mathematician.GetTitledFirstName|l] juntou-se à minha corte."
 fp3_scholarship.1000.d: "Eu não tenho tempo nem inclinação para isso."
 fp3_scholarship.1010.t: "O Mago Solitário"
 fp3_scholarship.1010.desc_dying_faith: ""Deseamos apenas praticar nossa fé em paz até o fim de nossos dias. Se nos prometer isso, eu mesmo o servirei até que meu coração pare de bater".\n\nEmbora a [magus_faith.GetName|l] esteja morrendo, os adoradores errantes parecem persistir nos templos de fogo abandonados de [magus_county.GetProvince.GetCounty.GetName]. Este sacerdote agora se lançou diante da minha [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')], implorando minha misericórdia.\n\n"
 fp3_scholarship.1010.desc_living_faith: "“Tenha misericórdia! Desejamos apenas honrar nossos ancestrais. Se nos conceder proteção, prometo servi-lo pessoalmente até o dia da minha morte”.\n\nA [magus_faith.GetName|l] continua sendo um espinho em meu lado, parece que os templos do fogo de [magus_county.GetProvince.GetCounty.GetName] voltam a se aquecer sob a cobertura da noite. Parece que meu [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')] e eu apanhamos um magus renegado em seus rituais inescrutáveis, mas, em vez de fugir, ele se joga bravamente diante de mim."
 fp3_scholarship.1010.a: "Nunca, a vontade de [ROOT.Char.GetFaith.HighGodName] é sua ruína!"
 fp3_scholarship.1010.b: "Vou conceder proteção a [magus_county.GetNameNoTooltip]."
 fp3_scholarship.1010.b.tt: "Não poderá ser convertido [magus_county.GetNameNoTooltip] durante 20 anos\nNunca poderá ser convertido em [magus.GetShortUINameNoTooltip]"
 fp3_scholarship.1010.c: "Sem promessas para o futuro, mas podemos deixar você ir."
 fp3_scholarship.2000.t: "Vale Seu Peso"
 fp3_scholarship.2000.desc: "O fornecimento de papel vindo do Oriente quase se esgotou, e alguns poetas menores recorrem a folhas de palmeira e casca para registrar suas reflexões. Em breve, nem mesmo meu sábio[court_scholar.Custom('ES_OA')] da corte, [court_scholar.Custom('ES_ElLa')] [court_scholar.GetTitledFirstName|l], consegue adquirir com segurança as folhas douradas.\n\n“Eu poderia voltar ao pergaminho, suponho, mas hoje em dia é terrivelmente raro de conseguir. Mais papel certamente seria uma solução melhor…”."
 fp3_scholarship.2000.a: "Todo papel será confiscado para seus propósitos."
 fp3_scholarship.2000.b: "Devemos importar o papel, então."
 fp3_scholarship.2000.c: "Você terá que se contentar com o que tem."
 fp3_scholarship.2010.t: "Sabedoria Líquida"
 fp3_scholarship.2010.desc: "Meus censores me informam que [court_scholar.Custom('ES_ElLa')]sábio[court_scholar.Custom('ES_OA')] da corte, [court_scholar.Custom('ES_ElLa')] [court_scholar.GetTitledFirstName|l], bebe em segredo com um erudito estrangeiro.\n\nSe fosse com qualquer outra pessoa, eu encerraria o encontro e lhe daria [court_scholar.Custom('ES_AlAla')] [court_scholar.GetTitledFirstNameNoTooltip|l] uma severa advertência. No entanto, parece que [court_scholar.GetSheHe] está envolvid[court_scholar.Custom('ES_OA')] em uma conversa esclarecedora com seu companheiro de coração. Ou assim me dizem."
 fp3_scholarship.2010.a: "Nosso dever para com [ROOT.Char.GetFaith.HighGodName] vem primeiro."
 fp3_scholarship.2010.b: "Talvez eles estejam apenas tomando chá?"
 fp3_scholarship.2020.t: "Visões Mórbidas"
 fp3_scholarship.2020.desc: "“Meus estudos chegaram a um impasse”, me diz meu sábio[court_scholar.Custom('ES_OA')] da corte, [court_scholar.Custom('ES_ElLa')] [court_scholar.GetTitledFirstNameNoTooltip|l], [ROOT.Char.Custom2('QuirkAdverbPosOrNeg', court_scholar)]. “Não se pode extrair muito dos livros. Mas se você me emprestar [specimen.Custom('ES_AlAla')] [specimen.GetTitledFirstName|l] por um breve período, estou certo[court_scholar.Custom('ES_OA')] de que juntos poderemos chegar a um avanço”.\n\n[court_scholar.GetSheHe|U] não pode garantir a segurança [specimen.Custom('ES_DelDela')] [specimen.GetTitledFirstNameNoTooltip|l]."
 fp3_scholarship.2020.a: "Você tem minha permissão total."
 fp3_scholarship.2020.b: "Mantenha seus experimentos distorcidos dentro de seus diários."
 fp3_scholarship.2030.t: "Resultados Publicados"
 fp3_scholarship.2030.desc: "\"…e, por isso, com grande prazer posso informar meu progresso constante na compreensão de [ROOT.Char.Custom('education_conversation_subject')]\".\n\nÀs vezes, pode ser difícil justificar a manutenção de eruditos em nossa folha de pagamento. Seu trabalho raramente beneficia diretamente o reino.\nSem dúvida, é algo de que meu sábio[court_scholar.Custom('ES_OA')] da corte, [court_scholar.GetName]. O relatório detalhado de progresso de hoje é apresentado com tanto entusiasmo que beira a falta de sinceridade."
 fp3_scholarship.2030.a: "O progresso só pode ser algo bom."
 fp3_scholarship.2030.tt: "[court_scholar.GetNameNoTooltip] se beneficiou dos centros de estudos superiores dentro do seu reino."
 fp3_research_project_title: "Pesquisa:"
 fp3_scholarship_research_success_loss_effect: "O [research_project|lE] de [inspiration_owner.GetShortUIName|U] terá uma #N probabilidade menor#! de sucesso"
 fp3_scholarship_research_success_slight_loss_effect: "O [research_project|lE] de [inspiration_owner.GetShortUIName|U] terá uma #N probabilidade um pouco menor#! de sucesso"
 fp3_scholarship_research_success_gain_effect: "O [research_project|lE] de [inspiration_owner.GetShortUIName|U] terá uma #P probabilidade maior#! de sucesso"
 fp3_scholarship_research_success_slight_gain_effect: "O [research_project|lE] de [inspiration_owner.GetShortUIName|U] terá uma #P probabilidade um pouco maior#! de sucesso"
 fp3_scholarship.8000.t: "Um Novo $game_concept_research_project$"
 fp3_scholarship.8000.desc: "Meu erudito[court_scholar.Custom('ES_OA')] da corte, [court_scholar.GetName], corre até mim, com vários servos atrás dele, todos carregando livros, rolos ou pergaminhos antigos.\n\n“Acredito que posso alcançar um grande avanço, se me for dado tempo suficiente, fundos generosos e tinta suficiente para tingir de preto o Indo."
 fp3_scholarship.8000.a: "Assuma as rédeas, [court_scholar.GetFirstNameNoTooltip]."
 fp3_scholarship.8000.b: "Talvez em outra ocasião?"
 fp3_scholarship.8000.a.tt: "[court_scholar.GetFirstNameNoTooltip] começará a realizar uma [research_project|lE]"
 fp3_scholarship.8500.t: "O Chamariz do Ouro"
 fp3_scholarship.8500.desc: "«Tenho certeza[court_scholar.Custom('ES_OA')] de que posso desvendar os segredos da própria criação, desde que me forneçam as ferramentas e os ajudantes certos!».\n\n[court_scholar.GetName], meu sábio[court_scholar.Custom('ES_OA')] da corte, já vem falando disso há algum tempo. Ele me implora que o deixe gastar #EMP mi oro y mi plata#! na tentativa de descobrir os segredos de como elementos como #EMP el oro#! e #EMP la plata#! são feitos.\n\n[court_scholar.GetFirstNameNoTooltip] está claramente muito entusiasmado[court_scholar.Custom('ES_OA')] e impressiona que tenha conseguido dar algum sentido a notas tão enigmáticas quanto as que decifrou sobre este assunto, mas não está claro se isso será um empreendimento lucrativo"
 fp3_scholarship.8500.a.tt: "[court_scholar.GetFirstNameNoTooltip] começará a realizar uma [inspiration|lE] de Alquimia"
 fp3_scholarship.8600.t: "Poder da Palavra Escrita"
 fp3_scholarship.8600.desc: "“Seu apoio contínuo já é, por si só, muito nobre e altruísta, mas observações brilhantes que não são registradas correm o risco de ser esquecidas! Quem saberá dos meus pensamentos quando eu estiver morto e já não puder falar sobre eles? O mundo seria um lugar pobre se eles não fossem preservados.”\n\n[court_scholar.GetName], meu sábio[court_scholar.Custom('ES_OA')] da corte, tem um novo projeto. Quer me convencer a financiar a criação de um novo livro. Um manuscrito luxuoso que, segundo [court_scholar.GetSheHe], fará meus rivais empalidecerem de inveja.\nTalvez a ideia sirva tanto ao prestígio dele quanto ao meu, mas isso não significa necessariamente que seja uma má ideia…"
 fp3_scholarship.8600.a.tt: "[court_scholar.GetFirstNameNoTooltip] começará a realizar uma [inspiration|lE] para escrever um Livro"
 fp3_scholarship.8999.tt_failure: "A pesquisa de [court_scholar.GetShortUINameNoTooltip] não produz nada útil"
 fp3_scholarship.8999.tt_success: "[court_scholar.GetShortUINameNoTooltip] faz uma pequena descoberta científica para a casa de [THIS.Char.GetHouse.GetNameNoTooltip]"
 fp3_scholarship.8999.tt_crit_success: "[court_scholar.GetShortUINameNoTooltip] descobre uma nova inovação para a cultura [THIS.Char.GetCulture.GetName]"
 fp3_scholarship.8100.t: "$fp3_research_project_title$ Uma Biblioteca Melhor"
 fp3_scholarship.8100.desc: "[inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] tem reclamado sem parar do estado da biblioteca real, trazendo diante de mim um monte de pergaminhos amarelados e livros em ruínas.\n\n"Alguns destes textos estão defasados há centenas de anos, ou até mais. Como vou conduzir as pesquisas mais avançadas com tomos tão arcaicos?"."
 fp3_scholarship.8100.a: "A biblioteca real será equipada conforme o seu desejo."
 fp3_scholarship.8100.b: "A biblioteca real está perfeita como está."
 fp3_scholarship.9000.t: "$fp3_research_project_title$ Fracasso"
 fp3_scholarship.9000.desc: ""Não adianta!", chora para mim [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)]. Seus olhos estão marcados por profundas olheiras de tantas noites sem dormir.\n\n"Não consigo ver além dos mares de números. Terei que abandonar este projeto, pelo menos por enquanto"."
 fp3_scholarship.9000.a: "Muito bem então."
 fp3_scholarship.9000.b: "Eu te pago para pesquisar, não para inventar desculpas!"
 fp3_scholarship.9100.t: "$fp3_research_project_title$ Uma Nova Descoberta"
 fp3_scholarship.9100.desc: ""[ROOT.Char.Custom2('RelationToMeAddress', inspiration_owner)|U]! Meu trabalho está concluído".\n\n[inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se alonga sobre suas descobertas e sobre como isso pode afetar nosso domínio. Tento encaixar uma palavra, mas sem sucesso.\n\nQuando finalmente se senta, posso ver minha própria confusão refletida nos olhos de meus cortesãos, mas ainda assim dou a única resposta de que consigo me lembrar."
 fp3_scholarship.9100.a: "Bom trabalho, [inspiration_owner.GetShortUINameNoTooltip]."
 fp3_scholarship.9200.t: "$fp3_research_project_title$ Uma Nova Inovação"
 fp3_scholarship.9200.desc: "“[ROOT.Char.Custom2('RelationToMeAddress', inspiration_owner)|U]!”, grita para mim. Me viro e encontro seus olhos cansados, transbordantes de alegria, e os braços cheios de rabiscos; seu trabalho foi concluído.\n\nSó mais tarde compreenderei a importância de sua descoberta, e não viverei o bastante para vê-la mudar toda a história. Mas, por enquanto, basta-me dizer:"
 fp3_scholarship.9200.a: "Muito bem feito."
 fp3_scholarship.9900.t: "$fp3_research_project_title$ Descartado"
 fp3_scholarship.9900.tt: "[court_scholar.GetShortUIName|U] faleceu e não pode continuar sua pesquisa."
 fp3_scholarship.9901.tt: "[court_scholar.GetShortUIName|U] não é mais meu $court_scholar_court_position$ e não pode continuar sua pesquisa."
 #Al-Khul Event
 fp3_h_yearly.0001.t: "O Fascínio de Al-Khul"
 fp3_h_yearly.0001.desc.main: "Enquanto relaxo em um canto tranquilo da minha [ROOT.Char.Custom('FortifiedBuilding' )] de [ROOT.GetCharacter.GetCurrentLocation.GetTitle.GetNameNoTierNoTooltip] com uma taça de [ROOT.Char.Custom('RegionalAlcoholicDrink')] na mão, minha [ROOT.Char.Custom2('RelationToMe', ulema_member)] [ulema_member.GetName] se aproxima com uma expressão severa.\n\n“Sua obsessão com o #italic al-khul#! é vergonhosa!\nMetade desta corte perdeu o respeito por você e a outra metade perdeu o próprio senso de moralidade! Nas ruas, os descontentes desafiam abertamente as regras da nossa fé, um reflexo dos pecados de seus senhores neste mesmo palácio!”.\n\n[ulema_member.GetNameNoTooltip|U] está fumegando, [ulema_member.GetSheHe] grita e chama atenção. Alguns cortesãos baixam suas próprias taças em silêncio, sem querer chamar a atenção [Select_CString( ulema_member.IsFemale, 'de la iracunda clériga', 'del iracundo clérigo' )]."
 fp3_h_yearly.0001.a: "Palavras corajosas de outr[ulema_member.Custom('ES_OA')] escrav[ulema_member.Custom('ES_OA')] de seu [ulema_member.Custom('RegionalAlcoholicDrink')]!"
 fp3_h_yearly.0001.a.notif.t: "Faça como eu digo, não como eu faço!"
 fp3_h_yearly.0001.b: "Embora [ROOT.Char.Custom('RegionalAlcoholicDrink')] possa inibir a mente, ela acalma o espírito."
 fp3_h_yearly.0001.bb: "Beber é a alegria de todos os [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip]. Não podemos existir sem esse prazer!"
 fp3_h_yearly.0001.b.desc: "Você tenta convencer [ulema_member.GetFirstNameNoTooltip] e sua corte de que beber pode ser benéfico"
 fp3_h_yearly.0001.b.success: "Você consegue humilhar [ulema_member.GetFirstNameNoTooltip]"
 fp3_h_yearly.0001.b.failure: "Você se faz de tolo"
 fp3_h_yearly.0001.c: "Estou dispost[ROOT.Char.Custom('ES_OA')] a fazer uma doação beneficente"
 fp3_h_yearly.0001.c.tt: "Você tenta subornar [ulema_member.GetNameNoTooltip]."
 fp3_h_yearly.0001.c.success: "A doação silencia as objeções de [ulema_member.GetNameNoTooltip]"
 fp3_h_yearly.0001.c.failure: "[ulema_member.GetNameNoTooltip] rejeita o suborno"
 fp3_h_yearly.0001.d: "Não sou mais que [Select_CString( ROOT.Char.IsFemale, 'uma pecadora', 'um pecador' )], mas tentarei melhorar."
 fp3_h_yearly.0001.e: "Silêncio! Você esquece com quem está falando."
 #Seljuk story cycle
 fp3_story_cycle_seljuks_invasion_events.0001.t: "Nômades Desesperados"
 fp3_story_cycle_seljuks_invasion_events.0001.desc: "nômades [lead_seljuk.GetCulture.GetNameNoTooltip] das terras fronteiriças vieram suplicar diante de mim. Eles buscam se estabelecer em [fp3_seljuk_settle_target.GetNameNoTier]"
 fp3_story_cycle_seljuks_invasion_events.0001.desc_vassal: "como meus súditos, oferecendo sua lealdade e perícia em batalha em troca de "descansar sob minha grande sombra".\n\nSua desesperação é evidente. Sem outro lugar para onde ir, negar seu pedido inevitavelmente levará ao conflito."
 fp3_story_cycle_seljuks_invasion_events.0001.desc_independent: "como meus novos vizinhos, oferecendo sua perícia em batalha em troca de parte das minhas terras.\n\nSua desesperação é óbvia. Mas o feroz exército atrás deles me diz que é mais um ultimato do que um pedido."
 fp3_story_cycle_seljuks_invasion_events.0001.a_liege: "Enquanto responderdes ao chamado de [Select_CString( ROOT.Char.IsFemale, 'vossa senhora', 'vosso senhor' )], [fp3_seljuk_settle_target.GetNameNoTierNoTooltip] será vosso."
 fp3_story_cycle_seljuks_invasion_events.0001.a: "[fp3_seljuk_settle_target.GetNameNoTierNoTooltip] é seu, vizinho!"
 fp3_story_cycle_seljuks_invasion_events.0001.b: "Nunca! Não permitirei que minhas terras sejam ocupadas por sua sujeira!"
 #Zanj Rebellion
 fp3_story_cycle_zanj_rebellion_events.0002.t: "O Rebelde Falador"
 fp3_story_cycle_zanj_rebellion_events.0002.desc: "A [outspoken_rebel.GetName], um[outspoken_rebel.Custom('ES_XA')] rebelde carismátic[outspoken_rebel.Custom('ES_OA')] conhecido por ter tentado uma revolta em Bahrein, foi avistado recentemente em [outspoken_rebel.GetCurrentLocation.GetCounty.GetName].\n\nEste autoproclamad[outspoken_rebel.Custom('ES_OA')] sant[outspoken_rebel.Custom('ES_OnOna')] tem vagueado pelos pântanos salgados, causando problemas com os locais. Entre eles estão os zanj, um povo das terras orientais da África, muitos dos quais trabalham ali, escravizados ou como homens livres. Esta pode ser uma chance de capturar[outspoken_rebel.GetHerHim] e punir[outspoken_rebel.GetHerHim]."
 fp3_story_cycle_zanj_rebellion_events.0002.a: "Vamos armar uma armadilha para."
 fp3_story_cycle_zanj_rebellion_events.0002.a.success: "Você prende [Select_CString( outspoken_rebel.IsFemale, 'a agitadora', 'o agitador' )]"
 fp3_story_cycle_zanj_rebellion_events.0002.a.failure: "[outspoken_rebel.GetSheHe|U] escapa do seu alcance"
 fp3_story_cycle_zanj_rebellion_events.0002.a.failure.tt: "Sua causa ganhará mais seguidores"
 fp3_story_cycle_zanj_rebellion_events.0002.c: "Não dêem atenção a ela, é inofensiv[outspoken_rebel.Custom('ES_OA')]."
 fp3_story_cycle_zanj_rebellion_events_cause_strengthened_tt: "A causa de [outspoken_rebel.GetName] é fortalecida"
 fp3_story_cycle_zanj_rebellion_events_cause_greatly_strengthened_tt: "A causa de [outspoken_rebel.GetName] é grandemente fortalecida"
 fp3_zanj_rebellion_opressed_me: "[outspoken_rebel.Custom('ES_LoLa')] foi oprimido por você"
 fp3_story_cycle_zanj_rebellion_leaves_for_baghdad: "[outspoken_rebel.GetName] parte para Bagdá"
 fp3_story_cycle_zanj_rebellion_events.0004.t: "Reivindicações de Divindade"
 fp3_story_cycle_zanj_rebellion_events.0004.desc: "[zanj_leader.GetName], [Select_CString( zanj_leader.IsFemale, 'conocida alborotadora', 'conocido alborotador' )], apareceu em Bagdá. Escapou de Basra após uma tentativa frustrada de iniciar uma revolta. É[zanj_leader.Custom('ES_EA')] um agitador arrogante[zanj_leader.Custom('ES_XA')] afirma ser descendente de Zayd Ibn Ali e, portanto, fazer parte da casa do Profeta.\n\nEmbora essas alegações sejam ridículas, meus oponentes poderiam achar conveniente dar-lhes credibilidade e permitir que esse intruso[zanj_leader.Custom('ES_OA')] semeie dúvidas sobre a legitimidade do meu próprio reinado."
 fp3_story_cycle_zanj_rebellion_events.0004.a: "Vou refutar suas alegações."
 fp3_story_cycle_zanj_rebellion_events.0004.a.success: "Você prova que é um[zanj_leader.Custom('ES_XA')] farsante"
 fp3_story_cycle_zanj_rebellion_events.0004.a.failure: "Não consigo refutar sua afirmação exagerada"
 fp3_story_cycle_zanj_rebellion_events.0004.b: "Vou ignorar est[zanj_leader.Custom('ES_EA')] idiota."
 fp3_story_cycle_zanj_rebellion_events.0006.t: "Um Zanj Se Apresenta"
 fp3_story_cycle_zanj_rebellion_events.0006.desc.a: "[zanj_representative.GetName], um líder dos trabalhadores Zanj, designado para a tarefa interminável de drenar os pântanos salgados de Basra, vem a mim suplicando por melhores condições de trabalho. Eles estão na região há gerações e formam uma minoria significativa em Basra.\n\n"
 fp3_story_cycle_zanj_rebellion_events.0006.desc.b: "Suspeito que [zanj_leader.Custom('ES_ElLa')] intrometid[zanj_leader.Custom('ES_OA')] [zanj_leader.GetName] e seu discurso rebelde pode ter algo a ver com o aumento de seu descontentamento.\n\n"
 fp3_story_cycle_zanj_rebellion_events.0006.desc.c: "\"Meu [ROOT.Char.GetTitleAsName|l], por favor, [ROOT.Char.GetFaith.HighGodName] não valoriza o tratamento digno dos trabalhadores, independentemente de sua origem?\""
 fp3_story_cycle_zanj_rebellion_events.0006.a: "Você será recompensado por seu trabalho árduo."
 fp3_rival_gave_title_away: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'cedeu', 'cedeu' )] terras pertencentes a [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetShortUIName )]."
 fp3_landed_zanj_reason: "Trocou terras por paz"
 fp3_story_cycle_zanj_rebellion_events.0006.b: "Posso fazer pequenas concessões..."
 fp3_zanj_rebellion_interfered_with_my_workers: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'interferiu', 'interferiu' )] com a força de trabalho de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetShortUIName )]."
 fp3_story_cycle_zanj_rebellion_events.0006.c: "Isso é o destino dos Zanj."
 fp3_rival_stayed_out_of_my_business: "[CHARACTER.GetShortUIName|U] não se intrometeu nos assuntos de [Select_CString( CHARACTER.IsLocalPlayer, 'interferiste', 'interfirió' )] de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'tu persona', TARGET_CHARACTER.GetShortUIName )]."
 fp3_story_cycle_zanj_rebellion_events.0008.t: "A Rebelião Zanj"
 fp3_story_cycle_zanj_rebellion_events.0008.desc.a: "Relatos de insurreição aberta nos pântanos salgados de Basra chegam até mim."
 fp3_story_cycle_zanj_rebellion_events.0008.desc.b: "[zanj_leader.GetName], a quem muitos consideravam [Select_CString( zanj_leader.IsFemale, 'uma charlatã', 'um charlatão' )] inofensiv[zanj_leader.Custom('ES_OA')], conseguiu unir os trabalhadores zanj descontentes e as tribos árabes rebeldes sob seu estandarte. Apesar de ser da nação [zanj_leader.GetCulture.GetName] e não um[zanj_leader.Custom('ES_XA')] zanj, os rebeldes passaram a vê[zanj_leader.GetHerHim] como líder."
 fp3_story_cycle_zanj_rebellion_events.0008.desc.c: "[zanj_leader.GetName], um[zanj_leader.Custom('ES_XA')] zanj especialmente critic[zanj_leader.Custom('ES_OA')], uniu os trabalhadores exaustos e as tribos árabes rebeldes sob sua bandeira. Apesar de ser da nação [zanj_leader.GetCulture.GetName] e não árabe, os rebeldes passaram a ver[zanj_leader.GetHerHim] como líder."
 fp3_story_cycle_zanj_rebellion_events.0008.desc.d: "\n\nEles enviaram uma balsa rio abaixo em direção a Basra, e nela estão as cabeças dos senhores assassinados dos Zanj. Um desafio inconfundível à minha autoridade."
 fp3_story_cycle_zanj_rebellion_events.0008.a: "O Arvand se tornará um rio de sangue."
