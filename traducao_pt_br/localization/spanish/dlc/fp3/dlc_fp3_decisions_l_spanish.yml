 fp3_promote_persian_scripture_decision_desc: "A língua árabe tem sido considerada superior há muito tempo, especialmente em questões de fé. É hora de desafiar essa crença, promover a literatura islâmica em persa e até mesmo traduzir hadiths importantes. Isso pode não me tornar querido pelos árabes ou pelos vassalos e clérigos conservadores, mas as pessoas merecem conhecer [ROOT.Char.GetFaith.HighGodNameAlternate] em sua própria língua, como faziam nos dias antigos."
