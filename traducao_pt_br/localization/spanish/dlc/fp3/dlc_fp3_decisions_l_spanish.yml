 fp3_rally_troops_in_rebellion_decision: "Agrupar Tropas na Rebelião"
 fp3_rally_troops_in_rebellion_decision_desc: "Em meio ao caos, a oportunidade sempre surge. Esta era não é exceção, pois como [ROOT.Char.Custom('GetCouncilOrCourtPosition')|l] tenho centenas — talvez até milhares — de camaradas prontos para se reunir e me ajudar a conquistar terras para mim. Certa vez, [ROOT.Char.GetLiege.Custom('ES_ElLa')] [ROOT.Char.GetLiege.GetPrimaryTitle.GetBaseName|l] reconheceu meus méritos e me deu um poder escasso. Hoje, com a espada em mãos, o destino reconhecerá minhas verdadeiras ambições."
