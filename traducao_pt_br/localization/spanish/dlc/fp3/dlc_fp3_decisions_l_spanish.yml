 avenge_the_battle_of_nahrawan_decision_desc: "Nos primeiros dias de [ROOT.Char.GetFaith.GetReligion.GetName|l], os haruritas, após serem traídos pelo Califado Rashidun, foram ignominiosamente derrotados na Batalha de Nahrawan. מאז então, temos lutado sem descanso para destruir todos os apóstatas e provar que o julgamento pertence somente a [ROOT.Char.GetFaith.HighGodNameAlternate]. Decidi pôr fim de uma vez por todas à luta contra os falsos crentes."
