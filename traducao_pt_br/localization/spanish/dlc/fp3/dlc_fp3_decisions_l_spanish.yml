 fp3_sponsor_persian_scholars_decision: "Patrocinar Eruditos Persas"
 fp3_sponsor_persian_scholars_decision_desc: "Não podemos permitir que sejamos eclipsados pela Casa da Sabedoria de Bagdá. Vamos chamar os melhores eruditos persas à corte na esperança de fortalecer nosso próprio avanço científico."
