 invite_former_slave_soldiers_decision: "Alistar Guerreiros Tribais"
 invite_former_slave_soldiers_decision_desc: "Como [ROOT.Char.GetTitleAsNameNoTooltip|l] de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], sempre preciso de almas intrépidas que preencham as fileiras dos meus $knight_culture_player_plural_no_tooltip_lowercase$ de elite. Para os bravos e audazes, não há fonte melhor do que os guerreiros das muitas tribos dispersas dentro e ao redor do meu domínio; portanto, posso ordenar ao meu [marshal|lE] que selecione cuidadosamente os melhores entre eles para servir diretamente à minha corte."
 invite_former_slave_soldiers_decision_confirm: "Que os melhores sejam trazidos perante mim!"
 invite_former_slave_soldiers_decision_tooltip: "Convidar guerreiros tribais para servir como $knight_culture_player_plural_no_tooltip_lowercase$ leais"
 invite_former_slave_soldiers_decision_effect_desc: "Dentro de dois meses, serão recrutados para sua [court|lE] #P uno o más#! indivíduos de alta [prowess|lE], dependendo da habilidade de [stewardship|lE] de seu [marshal|lE]"
