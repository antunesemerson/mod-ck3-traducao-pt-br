l_spanish:
 fp3_brutal_predations_county_modifier: "Predações Brutais"
 fp3_brutal_predations_county_modifier_desc: "Os habitantes desta área estão consternados com uma série de atos violentos cometidos por um mercenário assassino, que permanece à solta."
 fp3_low_frontier_morale_county_modifier: "Moral Baixa na Fronteira"
 fp3_low_frontier_morale_county_modifier_desc: "Os soldados que guarnecem as fortalezas desta região se sentem esquecidos por seu governante."
 fp3_boosted_frontier_morale_county_modifier: "Moral Impulsionada na Fronteira"
 fp3_boosted_frontier_morale_county_modifier_desc: "Os soldados que guarnecem as fortalezas desta região se sentem fortalecidos desde que seu governante os visitou pessoalmente."
 fp3_visited_the_frontier_modifier: "Visitou a Fronteira"
 fp3_visited_the_frontier_modifier_desc: "Este personagem recentemente conviveu com soldados em fortalezas na fronteira, expondo-se assim à rica flora de doenças que povoam seus alojamentos lotados."
 fp3_frontier_heresy_county_modifier: "Heresias na Fronteira"
 fp3_frontier_heresy_county_modifier_desc: "Crenças radicais se enraizaram tanto entre os soldados quanto entre os colonos neste condado."
 fp3_garrison_decimated_county_modifier: "Guarnição Decimada"
 fp3_garrison_decimated_county_modifier_desc: "Os soldados que costumavam proteger esta província foram massacrados por seu governante, por seguirem uma crença pagã."
 fp3_jinx_modifier: "Enfeitiçado"
 fp3_jinx_modifier_desc: "Este personagem acredita que alguém com intenções malévolas usou o Olho do Mal contra eles."
 fp3_call_of_the_wild_modifier: "Atraído pela Fronteira"
 fp3_call_of_the_wild_modifier_desc: "Este personagem sente-se compelido a explorar as estepes distantes, os desertos proibidos e as montanhas imponentes, e ver o que se esconde além."
 fp3_marriage_material_modifier: "Material de Casamento"
 fp3_marriage_material_modifier_desc: "Este personagem foi convencido de que é do seu melhor interesse obedecer aos pais e se casar - mas será mesmo?"
 fp3_dutiful_scion_modifier: "Herdeiro Devotado"
 fp3_dutiful_scion_modifier_desc: "Este personagem está dedicando sua vida à dinastia, sem distrações triviais como aventuras ou felicidade pessoal."
 fp3_worried_sick_modifier: "Preocupado até a Alma"
 fp3_worried_sick_modifier_desc: "Este personagem está preocupado até a alma com um ente querido que partiu para enfrentar perigos distantes."
 fp3_gross_persecutions_county_modifier: "Perseguições Atrozes"
 fp3_gross_persecutions_county_modifier_desc: "Muitos fiéis nesta província estão se escondendo ou fugindo, após uma violenta perseguição religiosa por parte de seu senhor."
 fp3_galvanized_heretics_county_modifier: "Hereges Galvanizados"
 fp3_galvanized_heretics_county_modifier_desc: "A opressão transformou a população deste condado em radicais amargurados, se é que já não eram, determinados a defender sua fé a qualquer custo."
 fp3_promoting_arabic_modifier: "Promovendo o Árabe"
 fp3_promoting_arabic_modifier_desc: "Este personagem está promovendo a língua árabe."
 fp3_conversion_curious_county_modifier: "Curiosidade de Conversão"
 fp3_conversion_curious_county_modifier_desc: "Entre a população deste condado, há uma crescente curiosidade sobre outras fés."
 fp3_teapot_alcoholism_modifier: "Bebedor Prolífico de Chá"
 fp3_teapot_alcoholism_modifier_desc: "Este personagem sempre mantém um pequeno bule ao seu lado e é conhecido por consumir grandes quantidades de seu conteúdo misterioso."
 ulema_displeased_drinking: "Escândalo Público por Beber"
 ulema_displeased_drinking_desc: "Os conhecidos hábitos de beber deste personagem levaram a um escândalo público, com o clero questionando abertamente os impactos em sua capacidade de governar."
 fp3_mountain_redoubt_modifier: "Fortaleza de Badd"
 fp3_mountain_redoubt_modifier_desc: "Esta fortaleza, empoleirada no topo de uma montanha imponente, é quase inexpugnável. Mantida pelos líderes Khurramitas Javidhan e Babak no passado, agora foi reconstruída e tornou-se uma reduto formidável para os belicosos habitantes das Montanhas Negras."
 fp3_royal_fire_modifier: "Fogo Real"
 fp3_royal_fire_modifier_desc: "Este governante tem um fogo eterno que queima em seu nome, abençoando seu reinado com a luz da glória."
 fp3_plundered_county_modifier: "Extorquido e Saqueado"
 fp3_plundered_county_modifier_desc: "Este condado foi espremido até secar pelo governante do reino, para financiar projetos ostentosos em outros lugares."
 fp3_architectural_splendor_county_modifier: "Esplendor Monumental"
 fp3_architectural_splendor_county_modifier_desc: "Este condado viu um grande investimento em arquitetura monumental e grandes obras públicas."
 fp3_efficient_splendor_county_modifier: "Construtores Eficientes"
 fp3_efficient_splendor_county_modifier_desc: "Este condado viu uma frenesi de atividade na construção de monumentos e grandes obras públicas."
 fp3_luxurious_bathhouse_modifier: "Hammam Celestial"
 fp3_luxurious_bathhouse_modifier_desc: "Este personagem adornou sua capital com um novo hammam de excepcional grandiosidade e qualidade."
 fp3_less_luxurious_bathhouse_modifier: "Hammam Danificado pela Umidade"
 fp3_less_luxurious_bathhouse_modifier_desc: "Embora este personagem tenha um hammam luxuoso, sua construção deixa um pouco a desejar, e rachaduras começaram a aparecer nos azulejos e nas pedras."
 fp3_very_lofty_tower_modifier: "Torre Imponente"
 fp3_very_lofty_tower_modifier_desc: "A residência deste personagem possui uma torre extremamente alta e muito bonita, cujas escadas eles podem subir para contemplar o mundo - e ganhar reclusão de todos os olhares curiosos."
 fp3_less_lofty_tower_modifier: "Torre Menos Imponente"
 fp3_less_lofty_tower_modifier_desc: "A residência deste personagem possui uma torre muito alta e esbelta. Embora não tão alta quanto originalmente pretendido, ainda assim a vista do topo agita a alma - e proporciona reclusão, se necessário."
 fp3_spiritual_splendor_county_modifier: "Esplendor Espiritual"
 fp3_spiritual_splendor_county_modifier_desc: "Este condado viu uma grande construção e renovação de monumentos religiosos de todos os tipos."
 fp3_great_tower_of_silence_modifier: "Grande Torre do Silêncio"
 fp3_great_tower_of_silence_modifier_desc: "Este personagem supervisionou a construção de um dakhma de escala sem precedentes, e frequentemente contempla o edifício macabro, ponderando o que está além deste mundo de terra e carne."
 fp3_less_great_tower_of_silence_modifier: "Torre do Silêncio"
 fp3_less_great_tower_of_silence_modifier_desc: "Este personagem supervisionou a construção de um dakhma grande e, ao ver os abutres da estepe descerem em direção a ele, frequentemente reflete sobre a vida e a morte."
 police_chief_of_baghdad_modifier: "Capitão de Bagdá"
 police_chief_of_baghdad_modifier_desc: "Este personagem detém o título de Sahib al-Shurta, capitão da guarda de Bagdá. Apesar das recentes turbulências, o cargo ainda oferece algumas oportunidades de influência."
 fp3_light_of_the_walayah_modifier: "Luz da Walayah"
 fp3_light_of_the_walayah_modifier_desc: "Diz-se que esta dinastia possui #italic nūr#!, a luz mística da orientação de Deus."
 fp3_azariqa_ascendancy_modifier: "Ascendência Muhakkima"
 fp3_azariqa_ascendancy_modifier_desc: "Este personagem liderou os Muhakkima para uma grandeza sem precedentes."
 fp3_promoted_persian_scripture_modifier: "Grande Tradutor"
 fp3_promoted_persian_scripture_modifier_desc: "Este personagem supervisionou traduções de obras religiosas árabes; algo anteriormente considerado tabu."
 fp3_persian_resurgence_county_modifier: "Ressurgimento Persa"
 fp3_persian_resurgence_county_modifier_desc: "Este condado está fervendo com fervor religioso misturado com um ressurgimento do patriotismo local, do qual coisas inesperadas podem acontecer."
 fp3_forgotten_runestones_county_modifier: "Pedras Rúnicas Esquecidas"
 fp3_forgotten_runestones_county_modifier_desc: "Neste condado, erguem-se três pedras misteriosas, esculpidas com runas requintadas no estilo dos Rus. No entanto, elas estão um pouco desgastadas, e ninguém consegue mais discernir seu significado."
 fp3_dismayed_daylamites_county_modifier: "Moradores da Floresta Amedrontados"
 fp3_dismayed_daylamites_county_modifier_desc: "A população local desenvolveu superstições temerosas em torno de um conjunto de pedras rúnicas misteriosas profundas na floresta. Agora que as pedras estão perdidas, as pessoas temem retaliação de seus criadores, quem quer que sejam."
 fp3_insulted_chinese_noble_modifier: "Desprezado na China"
 fp3_insulted_chinese_noble_modifier_desc: "Este personagem insultou um nobre chinês proeminente, que agora está espalhando rumores viscerais sobre eles nas cortes de Chang'an, Kaifeng e Luoyang."
 fp3_vengeful_nomads_county_modifier: "Nômades Vingativos"
 fp3_vengeful_nomads_county_modifier_desc: "Este condado está sofrendo ataques indiscriminados de nômades determinados a vingar um líder que foi injustamente morto."
 fp3_nomad_recruits_modifier: "Recrutas Nômades"
 fp3_nomad_recruits_modifier_desc: "Esta dinastia permitiu que nômades se estabelecessem em suas terras, fornecendo uma excelente fonte de recrutamento de cavaleiros capazes."
 fp3_nomad_friction_county_modifier: "Luta por Terras de Pastagem"
 fp3_nomad_friction_county_modifier_desc: "Este condado é afligido por atritos entre agricultores estabelecidos e tribos nômades."
 fp3_resentful_nomads_county_modifier: "Nômades Resentidos"
 fp3_resentful_nomads_county_modifier_desc: "Este condado está enfrentando conflitos devido a nômades irritados e indisciplinados."
 fp3_banning_archery_modifier: "Proibição de Arco e Flecha"
 fp3_banning_archery_modifier_desc: "Este personagem proibiu a prática de tiro com arco em partes de seu reino, prejudicando seus arqueiros, mas certamente tornando os acidentes menos prováveis."
 fp3_crushed_by_failure_modifier: "Abalado pelo Fracasso"
 fp3_crushed_by_failure_modifier_desc: "Seja lá o que tenha sido, este personagem falhou espetacularmente nisso, e a dúvida agora rói sua mente."
 fp3_silk_road_secure_county_modifier: "Rota da Seda Segura"
 fp3_silk_road_secure_county_modifier_desc: "Guerreiros nômades nesta província estão jurados a manter as estradas das caravanas seguras."
 fp3_nomad_attacks_county_modifier: "Saques Desenfreados"
 fp3_nomad_attacks_county_modifier_desc: "Este condado está sofrendo com ataques contra caravanas que passam, interrompendo significativamente o fluxo de comércio."
 fp3_gnostic_fervor_county_modifier: "Fervor Gnóstico"
 fp3_gnostic_fervor_county_modifier_desc: "Este condado recentemente se tornou lar de um grupo diligente de refugiados maniqueístas."
 fp3_lackluster_diet_modifier: "Dieta Desinteressante"
 fp3_lackluster_diet_modifier_desc: "Este personagem foi colocado em uma dieta desinteressante de peixe salgado e talos de aipo não cozidos, na esperança de curar sua melancolia."
 fp3_herbal_remedies_modifier: "Remédios Herbais"
 fp3_herbal_remedies_modifier_desc: "Este personagem consome uma mistura de sementes de funcho, pepinos e outras ervas para tentar curar sua melancolia."
 fp3_worshipping_in_solitude_modifier: "Adoração em Solidão"
 fp3_worshipping_in_solitude_modifier_desc: "Este personagem passou a dedicar longas horas em sua capela privada, longe de todos os olhares curiosos. Especulações estão em alta sobre o que acontece lá dentro."
 fp3_rare_books_modifier: "Livros Raros"
 fp3_rare_books_modifier_desc: "Este personagem entrou em posse de uma pequena coleção de livros raros, resgatados de bibliotecas lendárias como as de Ctesifonte, Gundeshapur, talvez até Alexandria."
 fp3_oil_of_vitriol_modifier: "Óleo de Vitríolo"
 fp3_oil_of_vitriol_modifier_desc: "Este personagem tem acesso a quantidades perigosas de uma substância extremamente corrosiva concoctada por um alquimista persa."
 fp3_dabbling_in_alchemy_modifier: "Experimentando com Alquimia"
 fp3_dabbling_in_alchemy_modifier_desc: "Este personagem tem experimentado com alquimia e, ao fazê-lo, foi exposto a todos os tipos de substâncias prejudiciais."
 fp3_alchemical_insights_modifier: "Percepções Alquímicas"
 fp3_alchemical_insights_modifier_desc: "Junto com um alquimista persa, este personagem fez grandes descobertas no estudo de líquidos e matéria, e aprendeu muito sobre a estrutura deste mundo."
 fp3_reneged_on_promise_modifier: "Quebrou a Promessa"
 fp3_reneged_on_promise_modifier_desc: "Este personagem quebrou uma promessa que havia feito para pagar pelos esforços literários de um famoso poeta, e agora é considerado um tanto inconfiável."
 fp3_broken_icehouses_county_modifier: "Yakhchals Quebrados"
 fp3_broken_icehouses_county_modifier_desc: "Este condado era famoso por sua produção de doces gelados antes que os armazéns de gelo desabassem em um terremoto."
 fp3_court_austerity_modifier: "Austeridade na Corte"
 fp3_court_austerity_modifier_desc: "Uma rigorosa austeridade reina na corte deste personagem - há pouquíssimos luxos, poucas risadas e especialmente - sem sobremesas doces."
 fp3_securing_sorbet_supply_modifier: "Garantiu o Suprimento de Faloodeh"
 fp3_securing_sorbet_supply_modifier_desc: "Este personagem apoderou-se de todo o suprimento do reino de doces gelados - para deleite de seus cortesãos, mas a ira de seus vassalos."
 fp3_thinking_about_the_afterlife_modifier: "Pensando na Morte"
 fp3_thinking_about_the_afterlife_modifier_desc: "Este personagem passou recentemente muito tempo pensando no que os espera no além."
 fp3_sufi_initiate_modifier: "Iniciado Sufi"
 fp3_sufi_initiate_modifier_desc: "Este personagem desenvolveu um interesse no misticismo sufi e na meditação Muraqaba, aprofundando-se na relação do coração com o Criador."
 fp3_avoiding_dark_places_modifier: "Evitando Lugares Sombrios"
 fp3_avoiding_dark_places_modifier_desc: "Este personagem teve uma experiência sinistra demais e agora está bastante interessado em evitar lugares escuros."
 fp3_looking_for_bodyguards_modifier: "Procurando Por Guarda-costas"
 fp3_looking_for_bodyguards_modifier_desc: "Este personagem teve uma experiência assustadora demais e está agora no mercado em busca de mais guarda-costas."
 fp3_relentless_skeptic_modifier: "Cético Incansável"
 fp3_relentless_skeptic_modifier_desc: "Este personagem começou a questionar muitas crenças populares e suposições sobre o mundo invisível. Outros podem considerá-lo um cínico, um dissidente grosseiro, até mesmo um apóstata."
 fp3_womens_faith_galvanized_modifier: "Fé Feminina"
 fp3_womens_faith_galvanized_modifier_desc: "Este personagem se sente perseguido por venerar uma santa feminina, mas isso apenas fortaleceu sua determinação."
 fp3_promoted_persian_mathematics_modifier: "Promoveu a Matemática Persa"
 fp3_promoted_persian_mathematics_modifier_desc: "Os estudiosos deste personagem estão descobrindo suas próprias inovações matemáticas para rivalizar com as do $indo_aryan_group_collective_noun$."
 fp3_denied_religious_protection_modifier: "Negou Proteção Religiosa"
 fp3_denied_religious_protection_modifier_desc: "Este governante negou aos pagãos a liberdade de praticar sua própria fé."
 patron_of_the_sciences: "Embora nenhuma descoberta importante tenha sido feita, este projeto lhe conferiu notoriedade como um grande patrono das ciências."
 fp3_treatise_on_development_modifier: "Tratado sobre Administração"
 fp3_treatise_on_development_modifier_desc: "Um artigo sobre o valor da burocracia, com várias sugestões sobre como garantir uma comunicação adequada, desde a realeza até o nível local."
 fp3_treatise_on_building_modifier: "Tratado sobre Gerenciamento"
 fp3_treatise_on_building_modifier_desc: "Um tratado sobre como se deve gerenciar os recursos para maximizar a eficiência."
 fp3_treatise_on_control_modifier: "Tratado sobre Autoridade"
 fp3_treatise_on_control_modifier_desc: "Um artigo sobre como um líder deve abordar a tarefa de governar e subjugar rebeliões."
 fp3_treatise_on_mathematics_modifier: "Monografia em Matemática"
 fp3_treatise_on_mathematics_modifier_desc: "Uma tese especializada em matemática, com várias notas sobre como aplicá-la na vida cotidiana."
 fp3_treatise_on_taxation_modifier: "Tratado sobre Tributação"
 fp3_treatise_on_taxation_modifier_desc: "Um longo tratado sobre tributação e quais medidas se pode tomar para abordar da melhor forma a questão da tributação."
 fp3_treatise_on_light_warfare_modifier: "Guia sobre Escaramuças"
 fp3_treatise_on_light_warfare_modifier_desc: "Uma breve tese sobre o valor da infantaria leve e como melhor utilizá-la."
 fp3_treatise_on_heavy_warfare_modifier: "Manual sobre Guerra Defensiva"
 fp3_treatise_on_heavy_warfare_modifier_desc: "Um tratado sobre formações relevantes para infantaria pesada, com um pequeno guia no final sobre que tipos de exercícios se pode fazer para alcançar uma maior coesão em seu exército."
 fp3_treatise_on_cavalry_modifier: "História da Guerra de Cavalaria"
 fp3_treatise_on_cavalry_modifier_desc: "Um extenso artigo sobre a história das cargas de cavalaria ao longo da história, com foco em como se pode virar o jogo a partir do dorso de um cavalo."
 fp3_treatise_on_siege_modifier: "Manual sobre Desconstrução"
 fp3_treatise_on_siege_modifier_desc: "Um manual curto e conciso sobre a natureza dos cercos e como abordar um inimigo com ou sem armamento de cerco."
 fp3_treatise_on_strategy_modifier: "História da Estratégia"
 fp3_treatise_on_strategy_modifier_desc: "Um tratado longo, mas acessível, sobre a história da estratégia e táticas, com exemplos que remontam a vários séculos."
 fp3_fearsome_example_modifier: "Exemplo Temível"
 fp3_fearsome_example_modifier_desc: "Este governante destruiu brutalmente uma comunidade religiosa na fronteira, demonstrando uma disposição intimidadora para suprimir qualquer heresia."
 fp3_refused_the_caliph_modifier: "Recusou o Pedido de Guerra Santa"
 fp3_refused_the_caliph_modifier_desc: "Este personagem recusou um pedido do chefe da fé para atacar um governante pagão vizinho."
 fp3_praying_too_much_modifier: "Orações Excessivas"
 fp3_praying_too_much_modifier_desc: "Este personagem tem dedicado significativas quantidades de tempo ao templo, negligenciando outras tarefas."
 fp3_name_read_in_friday_prayer_modifier: "Nome Lido na Oração de Sexta-feira"
 fp3_name_read_in_friday_prayer_modifier_desc: "Este personagem decretou que seu nome seja lido no lugar do califa durante a mais importante assembleia de culto da semana; uma declaração pública recorrente de sua lealdade e importância."
 fp3_displayed_pious_submission_to_caliph_modifier: "Ênfase na Submissão ao Califa"
 fp3_displayed_pious_submission_to_caliph_modifier_desc: "Este personagem deu instruções rigorosas para que o nome do califa seja lido primeiro durante a Oração de Sexta-feira, a adoração mais importante de cada mesquita - o mundo sabe a quem obedecem."
 fp3_honored_by_the_faithful_modifier: "Honrado pelos Fiéis"
 fp3_honored_by_the_faithful_modifier_desc: "O nome deste personagem é lido durante a oração de sexta-feira no assento do líder de sua fé, concedendo-lhes legitimidade significativa como governante."
 fp3_rule_by_fear_modifier: "Governo pelo Medo"
 fp3_rule_by_fear_modifier_desc: "Este personagem demonstrou que está disposto e é capaz de mandar matar pessoas arbitrariamente, mantendo seu reino unido pelo medo."
 fp3_minor_child_spy_network_modifier: "Rede de Espiões Infantis"
 fp3_minor_child_spy_network_modifier_desc: "Este personagem emprega uma pequena rede de crianças como espiões para descobrir os segredos do clã."
 fp3_better_company_modifier: "Companhia Melhor"
 fp3_better_company_modifier_desc: "Este personagem foi repreendido por seus mais velhos e está aprendendo a se comportar de maneira mais adequada a um descendente de seu clã."
 fp3_justification_for_taxation_modifier: "Justificativas para Tributação"
 fp3_justification_for_taxation_modifier_desc: "O coletor de impostos deste personagem criou justificativas questionáveis para fazer com que seus vassalos contribuíssem mais do que a maioria consideraria justo."
 fp3_excuses_for_extortion_modifier: "Desculpas para Extorsão"
 fp3_excuses_for_extortion_modifier_desc: "$fp3_justification_for_taxation_modifier_desc$"
 fp3_locals_intimidated_county_modifier: "Locais Intimidados"
 fp3_locals_intimidated_county_modifier_desc: "O povo comum deste condado foi amedrontado até a submissão."
 fp3_locals_infuriated_county_modifier: "Locais Enfurecidos"
 fp3_locals_infuriated_county_modifier_desc: "O povo comum deste condado está enfurecido com o tratamento do governante a um magistrado local popular."
 fp3_looking_the_other_way_modifier: "Fazendo Vista Grossa"
 fp3_looking_the_other_way_modifier_desc: "Este personagem adotou uma política de ignorar certas condutas econômicas de seus vassalos e súditos - pelo bem do reino ou por sua própria paz de espírito."
 fp3_capable_magistrates_modifier: "Magistrados Capazes"
 fp3_capable_magistrates_modifier_desc: "Este personagem conta com magistrados especialmente capazes, que podem fazer quase qualquer decisão parecer justa."
 fp3_delegated_payments_modifier: "Pagamentos Delegados"
 fp3_delegated_payments_modifier_desc: "Este personagem designou seu coletor de impostos como pagador do exército, uma medida eficaz até agora."
 fp3_army_influence_modifier: "Influência no Exército"
 fp3_army_influence_modifier_desc: "Este personagem foi investido com significativa influência sobre o exército por seu suserano."
 fp3_messy_payments_modifier: "Pagamentos Irregulares"
 fp3_messy_payments_modifier_desc: "A responsabilidade pelo pagamento dos soldados deste personagem foi dividida de maneira desajeitada, causando às vezes atrasos que prejudicam a moral."
 fp3_cutting_corners_modifier: "Atalhando Caminhos"
 fp3_cutting_corners_modifier_desc: "Este personagem está sobrecarregado e, consequentemente, tornou-se um pouco descuidado."
 fp3_promoting_zoroastrianism_modifier: "Amigo dos Zoroastristas"
 fp3_promoting_zoroastrianism_modifier_desc: "Este personagem é conhecido por se esforçar para ajudar a comunidade zoroastrista."
 fp3_blessed_by_fire_modifier: "Abençoado pelo Fogo"
 fp3_blessed_by_fire_modifier_desc: "Este personagem teve uma experiência profunda ao encontrar fogo proveniente de um raio, o elemento mais puro neste mundo."
 fp3_bad_tower_of_silence_county_modifier: "Torre da Loucura"
 fp3_bad_tower_of_silence_county_modifier_desc: "Uma tentativa foi feita de construir uma grande e nova dakhma neste condado, mas erros foram cometidos na construção, e matéria de cadáver putrefato está envenenando a água subterrânea."
 fp3_wary_of_sabotage_modifier: "Cauteloso com Sabotagem"
 fp3_wary_of_sabotage_modifier_desc: "Este personagem não tolerará trapaças em seu condado designado."
