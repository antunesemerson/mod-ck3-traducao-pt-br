l_spanish:
 secret_faith.1001.message: "Indução em [guardian.GetSecretFaith.GetName|l]"
 child_secret_faith_conversion_success_effect.desc: "[child.GetFirstNameNoTooltip] está convencid[child.Custom('ES_OA')]"
 child_secret_faith_conversion_failure_effect.desc: "[child.GetFirstNameNoTooltip] está em dúvida"
 child_secret_faith_conversion_critical_failure_effect.desc: "[child.GetFirstNameNoTooltip] revela meu segredo"
 child_secret_faith_conversion_critical_failure_effect.liege.desc: "[child.GetFirstNameNoTooltip] revela um tutor [guardian.GetSecretFaith.GetAdherentName]"
 secret_faith.1002.t: "A Era do Conhecimento"
 secret_faith.1002.desc: "[child.Custom2('MyCharacterIntroduction', ROOT.Char)|U] está en el limbo entre infancia y edad adulta. Le he enseñado lo suficiente para comprender la verdad y es lo bastante joven para tener una mente abierta.\n\nSi quiero introducir[child.Custom('ES_LoLa')] al servicio de [ROOT.Char.GetSecretFaith.HighGodName], es ahora o nunca."
 secret_faith.1002.a: "[child.GetFirstNameNoTooltip] merece conhecer o poder [ROOT.Char.GetSecretFaith.HighGodNameAlternatePossessive]."
 secret_faith.1002.b: "[child.GetFirstNameNoTooltip] é uma causa perdida."
 secret_faith.1003.t: "Conhecimento Oculto"
 secret_faith.1003.desc: "Hay ciertas cosas que [guardian.Custom2('MyCharacterIntroduction', ROOT.Char)] me ha contado de las que nadie más habla. Nunca profundizamos sobre estos temas y sé que lo mejor es no hacer preguntas. \n\nSin embargo, esta tarde, algo parece distinto. Cuando nos sentamos a leer, [guardian.GetFirstNameNoTooltip] me pregunta si siento curiosidad por algo…"
 secret_faith.1003.a: "Sim, me conte tudo! Por favor!"
 secret_faith.1003.b: "Não, acho que não..."
 secret_faith.1003.c: "Isso é blasfêmia!"
