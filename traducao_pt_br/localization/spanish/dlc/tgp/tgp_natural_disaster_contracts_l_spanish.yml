l_spanish:
 tgp_admin_contract_natural_disaster_tt_rewards: "Você pode escolher entre uma variedade de recompensas, incluindo:#indent_newline:3 \n$EFFECT_LIST_BULLET$$admin_contract_success_tt_xp$\n$EFFECT_LIST_BULLET$[experience|E] em [lifestyles|lE]\n$EFFECT_LIST_BULLET$[influence|E] [influence_i|E]\n$EFFECT_LIST_BULLET$[prestige|E] [prestige_i|E]\n$EFFECT_LIST_BULLET$[piety|E] [piety_i|E]\n$EFFECT_LIST_BULLET$[county_opinion|E]\n$EFFECT_LIST_BULLET$Melhorias para seus [counties|lE]#!"
 tgp_admin_contract_natural_disaster_failure_tt: "Você pode sofrer penalidades, como perda de [prestige|lE] [prestige_i|E] ou [influence|lE] [influence_i|E]"
 tgp_natural_disaster_travel_to_contract_destination: "Viajar a [natural_disaster_contract_destination.GetName] e investigar o problema"
 #Food
 #CONTRACT
 tgp_food_shortage: "Escassez de alimentos"
 tgp_food_shortage_contract: "$tgp_food_shortage$"
 tgp_food_shortage_desc_title: "$task_contract_governance_desc_title$"
 tgp_food_shortage_request: "$admin_request_choose_opportunity$"
 tgp_food_shortage_desc: "Uma catástrofe atingiu este condado, tornando a comida escassa entre a população."
 #FIRST EVENT OPT IN OR OUT
 tgp_natural_disaster_contract_event.0001.t: "$tgp_food_shortage$"
 tgp_natural_disaster_contract_event.0001.desc: "A comida está escassa em [natural_disaster_contract_destination.GetName], deixando os cidadãos sem outra opção senão buscar desesperadamente fontes de sustento alternativas — e às vezes #EMP poco ortodoxas#!. Aqueles com meios estão fazendo o que podem para prestar auxílio, mas nossa intervenção foi solicitada."
 tgp_natural_disaster_contract_event.0001.a: "O povo clama de fome, e não ficará sem resposta."
 tgp_natural_disaster_contract_event.0001.b: "Nossas próprias reservas são preciosas e não nos sobra nada."
 #EVENT
 tgp_natural_disaster_contract_event.0002.t: "$tgp_food_shortage$"
 tgp_natural_disaster_contract_event.0002.desc: "Os gritos lastimosos dos famintos ecoam por toda a rua enquanto minha comitiva é atacada por famélicos esgotados no momento em que chegamos; os olhos vazios desses mendigos estão tão desprovidos de esperança quanto seus estômagos estão de sustento. O grão que trouxemos conosco é suficiente para alimentar alguns, mas não todos — e a privação rapidamente se transforma em uma desesperação perigosa."
 tgp_natural_disaster_contract_event.0002.a: "Alcancem todos os súditos!"
 tgp_natural_disaster_contract_event.0002.b: "Conseguem o que precisarem, não importa o custo; eu pagarei do meu próprio bolso."
 tgp_natural_disaster_contract_event.0002.c: "Persuadirei os comerciantes a abrir seus armazéns."
 tgp_natural_disaster_contract_event.0002.c.tt.success: "Os comerciantes concordaram em ajudar nos esforços de socorro"
 tgp_natural_disaster_contract_event.0002.c.tt.failure: "Os mercadores escolheram, sem piedade, o lucro em vez da benevolência"
 tgp_natural_disaster_contract_event.0002.d: "Compelir os privilegiados a contribuir para o socorro."
 #MODIFIERS
 tgp_distribution_of_food_character_modifier: "Dar de comer aos necessitados"
 tgp_distribution_of_food_character_modifier_desc: "Este personagem convenceu seus súditos a distribuir comida para os necessitados da região."
 tgp_distribution_of_food_modifier: "Distribuição de alimentos"
 tgp_distribution_of_food_modifier_desc: "Este condado ganhou suprimentos adicionais na forma de comida."
 tgp_pay_from_own_pocket_character_modifier: "Pago do próprio bolso"
 tgp_pay_from_own_pocket_character_modifier_desc: "Este personagem empregou, desprendidamente, o próprio dinheiro para alimentar os famintos."
 tgp_pay_from_own_pocket_modifier: "Dinheiro pessoal"
 tgp_pay_from_own_pocket_modifier_desc: "Este condado recebeu ajuda diretamente do bolso do próprio governante."
 tgp_haggle_with_merchants_modifier: "Comerciantes benéficos"
 tgp_haggle_with_merchants_modifier_desc: "Este condado recebe ajuda extra de mercadores itinerantes."
 tgp_demand_food_from_nobles_modifier: "Exigir comida dos nobres"
 tgp_demand_food_from_nobles_modifier_desc: "As reservas de grãos deste condado foram reforçadas ao obrigar os notáveis locais a ajudar."
 #CONTRACT REWARD
 task_contract_reward_effect_distribution_of_food_desc: "$label_success_standard$"
 task_contract_reward_effect_pay_from_own_pocket_desc: "$label_success_standard$"
 task_contract_reward_effect_haggle_with_merchants_desc: "$label_success_standard$"
 task_contract_reward_effect_demand_food_from_nobles_desc: "$label_success_standard$"
 task_contract_reward_effect_haggle_with_merchants_failure_desc: "$label_failure_standard$"
 #Reconstruction
 #CONTRACT
 tgp_ravaged_buildings: "Destruído pela natureza"
 tgp_ravaged_buildings_contract: "$tgp_ravaged_buildings$"
 tgp_ravaged_buildings_desc_title: "$task_contract_governance_desc_title$"
 tgp_ravaged_buildings_request: "$admin_request_choose_opportunity$"
 tgp_ravaged_buildings_desc: "Esta terra foi assolada pela calamidade, sua infraestrutura está desmoronando e precisa urgentemente de reparos."
 #FIRST EVENT OPT IN OR OUT
 tgp_natural_disaster_contract_event.0005.t: "$tgp_ravaged_buildings$"
 tgp_natural_disaster_contract_event.0005.desc: "Após um desastre recente, os cidadãos de [natural_disaster_contract_destination.GetName] inundam meu escritório com petições e solicitações de ajuda para reconstruir suas casas."
 tgp_natural_disaster_contract_event.0005.a: "Supervisionarei pessoalmente os esforços de socorro."
 tgp_natural_disaster_contract_event.0005.b: "Suas penúrias são trágicas, mas suas desgraças são apenas uma entre muitas."
 #EVENT
 tgp_natural_disaster_contract_event.0006.t: "$tgp_ravaged_buildings$"
 tgp_natural_disaster_contract_event.0006.desc: "Os destroços espalhados diante dos meus olhos são testemunho da gravidade do desastre que atingiu [natural_disaster_contract_destination.GetName].\n\nPrivados de seus lares, os feridos e desesperados contam comigo para lhes encontrar abrigo, enquanto das ruínas ecoam os gritos abafados dos que estão presos. E, com as nuvens de tempestade se acumulando no horizonte, sua necessidade é ainda mais urgente."
 tgp_natural_disaster_contract_event.0006.a: "Levem o máximo possível para um lugar seguro; nós ficaremos para resgatar o resto."
 tgp_natural_disaster_contract_event.0006.b: "Os soterrados não podem ser salvos; devemos abrigar os sobreviventes."
 tgp_natural_disaster_contract_event.0006.c: "Nossa primeira prioridade deve ser libertar os presos sob os escombros."
 tgp_natural_disaster_contract_event.0006.c.tt.desc.success: "As vítimas presas são libertadas com sucesso"
 tgp_natural_disaster_contract_event.0006.c.tt.success: "As vítimas presas foram libertadas com sucesso"
 tgp_natural_disaster_contract_event.0006.c.tt.desc.failure: "As ruínas desmoronam antes que você consiga libertar os presos sob elas"
 tgp_natural_disaster_contract_event.0006.c.tt.failure: "As ruínas desmoronaram durante a tempestade, esmagando os presos sob elas"
 tgp_natural_disaster_contract_event.0006.d: "Um lugar para viver em troca de sua força parece um negócio justo."
 #MODIFIERS
 tgp_rebuild_settlement_character_modifier: "Mestre da reconstrução"
 tgp_rebuild_settlement_character_modifier_desc: "Este personagem está acostumado a lidar com as consequências de desastres e conhece bem as complexidades da reconstrução."
 tgp_rebuild_settlement_modifier: "Reconstrução de assentamento"
 tgp_rebuild_settlement_modifier_desc: "Foram tomadas medidas extensas para reconstruir o que este condado perdeu em um desastre recente."
 tgp_temporary_shelters_modifier: "Refugiados da tempestade"
 tgp_temporary_shelters_modifier_desc: "Embora tenham perdido seus lares em um desastre recente, as pessoas daqui receberam alojamentos temporários."
 tgp_remove_debris_modifier: "Livres de escombros"
 tgp_remove_debris_modifier_desc: "Durante o processo de libertar aqueles presos nas ruínas de seus lares, os locais também foram convenientemente desobstruídos para a reconstrução."
 tgp_labor_exchange_character_modifier: "Mão de obra relutante"
 tgp_labor_exchange_character_modifier_desc: "Em troca de abrigo contra a tempestade, este personagem fez um acordo para obter mão de obra extra em seu domínio."
 #CONTRACT REWARD
 task_contract_reward_effect_rebuild_settlement_desc: "$label_success_standard$"
 task_contract_reward_effect_temporary_shelters_desc: "$label_success_standard$"
 task_contract_reward_effect_remove_debris_desc: "$label_success_standard$"
 task_contract_reward_effect_labor_exchange_desc: "$label_success_standard$"
 task_contract_reward_effect_remove_debris_failure_desc: "$label_failure_standard$"
 #Health Care
 #CONTRACT
 tgp_medieval_medicine: "Tratar os desafortunados"
 tgp_medieval_medicine_contract: "$tgp_medieval_medicine$"
 tgp_medieval_medicine_desc_title: "$task_contract_governance_desc_title$"
 tgp_medieval_medicine_request: "$admin_request_choose_opportunity$"
 tgp_medieval_medicine_desc: "O desastre atingiu este condado! O número de mortos é considerável, superado apenas pelo número de deslocados e feridos que precisam de ajuda."
 #FIRST EVENT OPT IN OR OUT
 tgp_natural_disaster_contract_event.0010.t: "$tgp_medieval_medicine$"
 tgp_natural_disaster_contract_event.0010.desc: "Chegou um cavaleiro com notícias terríveis da calamidade que se abateu sobre [natural_disaster_contract_destination.GetName]; os mortos são incontáveis, e os sobreviventes e feridos precisam desesperadamente de cuidados."
 tgp_natural_disaster_contract_event.0010.a: "Envie um cavaleiro descansado para dizer que estou a caminho."
 tgp_natural_disaster_contract_event.0010.b: "Os mortos já não têm mais salvação; meu dever recai sobre aqueles que ainda estão em perigo."
 #EVENT
 tgp_natural_disaster_contract_event.0011.t: "$tgp_medieval_medicine$"
 tgp_natural_disaster_contract_event.0011.desc: "A mensagem do cavaleiro mal faz jus à situação; os mortos superam em muito os vivos, e é impossível escapar do fedor pútrido da morte e da decomposição.\n\nOs sobreviventes mal parecem estar em melhor estado que seus parentes falecidos, e quase nenhum saiu ileso do desastre.\n\nDiante de tanta dor e sofrimento, mal sei por onde começar a direcionar nossos esforços."
 tgp_natural_disaster_contract_event.0011.a: "Que nossos médicos atendam primeiro aos feridos."
 tgp_natural_disaster_contract_event.0011.b: "Tragam-me as crianças e os idosos, eu mesmo cuidarei deles."
 #rephrase this
 tgp_natural_disaster_contract_event.0011.b.tt.success: "Foi possível ajudar os necessitados"
 #rephrase this
 tgp_natural_disaster_contract_event.0011.b.tt.failure: "Uma tentativa fútil de ajudar os necessitados"
 tgp_natural_disaster_contract_event.0011.c: "Honre os mortos e cuide para que recebam sepultamentos adequados."
 tgp_natural_disaster_contract_event.0011.d: "O cuidado pode chegar àqueles que puderem pagá-lo."
 #MODIFIERS
 tgp_assisting_physician_modifier: "Apoio médico"
 tgp_assisting_physician_modifier_desc: "Uma constelação de médicos desceu sobre este condado para aliviar o sofrimento dos feridos e lesionados."
 tgp_medical_assistance_character_modifier: "Arremangado"
 tgp_medical_assistance_character_modifier_desc: "Este personagem participou de forma muito pessoal no atendimento aos mutilados e aleijados."
 tgp_medical_assistance_modifier: "Medicina malfeita"
 tgp_medical_assistance_modifier_desc: "Boas intenções nem sempre levam a bons resultados. Os habitantes deste condado já experimentaram em primeira mão as mãos bem-intencionadas, mas inexperientes, de seu governador."
 tgp_prayers_to_the_people_character_modifier: "Respeitador dos mortos"
 tgp_prayers_to_the_people_character_modifier_desc: "Este personagem demonstrou claramente o respeito que tem pelos falecidos."
 #CONTRACT REWARD
 task_contract_reward_effect_assisting_physician_desc: "$label_success_standard$"
 task_contract_reward_effect_medical_assistance_desc: "$label_success_standard$"
 task_contract_reward_effect_prayers_to_the_people_desc: "$label_success_standard$"
 task_contract_reward_effect_better_pay_up_desc: "$label_success_standard$"
 task_contract_reward_effect_medical_assistance_failure_desc: "$label_failure_standard$"
 #Relocation
 #CONTRACT
 tgp_disaster_displacement: "Ceifadores da Ruína"
 tgp_disaster_displacement_contract: "$tgp_disaster_displacement$"
 tgp_disaster_displacement_desc_title: "$task_contract_governance_desc_title$"
 tgp_disaster_displacement_request: "$admin_request_choose_opportunity$"
 tgp_disaster_displacement_desc: "Saqueadores e catadores de carcaças tomaram este condado de assalto, na esteira da recente devastação."
 #FIRST EVENT OPT IN OR OUT
 tgp_natural_disaster_contract_event.0015.t: "$tgp_disaster_displacement$"
 tgp_natural_disaster_contract_event.0015.desc: "Pode ser que o pior do recente desastre em [natural_disaster_contract_destination.GetName] mas aqueles com avareza no coração aproveitaram esta oportunidade para enriquecer às custas dos deslocados."
 tgp_natural_disaster_contract_event.0015.a: "Parece que é necessária uma mão firme para restabelecer a ordem."
 tgp_natural_disaster_contract_event.0015.b: "Os males que os homens cometem não têm remédio."
 #EVENT
 tgp_natural_disaster_contract_event.0016.t: "$tgp_disaster_displacement$"
 tgp_natural_disaster_contract_event.0016.desc: "A baixeza da natureza humana fica exposta em [natural_disaster_contract_destination.GetName]; aqui as pessoas parecem mais interessadas em livrar seus vizinhos de seus objetos de valor do que em lhes oferecer uma mão amiga.\n\nÉ preciso restabelecer algum tipo de ordem antes que se possa fazer qualquer tentativa de reconstrução."
 tgp_natural_disaster_contract_event.0016.a: "Desloquem nossas tropas e façam com que prendam os saqueadores."
 tgp_natural_disaster_contract_event.0016.a.tt.desc.success: "Suas tropas conseguem prender os saqueadores"
 tgp_natural_disaster_contract_event.0016.a.tt.success: "Suas tropas conseguiram capturar os saqueadores com sucesso"
 tgp_natural_disaster_contract_event.0016.a.tt.desc.failure: "Os saqueadores escorregadios escapam de seus esforços para capturá-los"
 tgp_natural_disaster_contract_event.0016.a.tt.failure: "Suas tropas foram incapazes de deter os saqueadores"
 tgp_natural_disaster_contract_event.0016.b: "Passe alguns saqueadores pela espada, isso servirá de exemplo para o resto."
 tgp_natural_disaster_contract_event.0016.c: "Confisque o que tiver sido recuperado para minha inspeção #EMP personalmente#!."
 tgp_natural_disaster_contract_event.0016.d: "Pague aos saqueadores para que vão embora de vez."
 #MODIFIERS
 tgp_deployed_troops_character_modifier: "Defensor da ordem"
 tgp_deployed_troops_character_modifier_desc: "Este personagem é um defensor entusiasta da aplicação rigorosa da lei, pela força das armas, se necessário."
 tgp_setting_an_example_character_modifier: "Ordem à ponta de espada"
 tgp_setting_an_example_character_modifier_desc: "Este personagem demonstrou estar disposto a trazer a ordem de forma rápida, eficaz e sem hesitação."
 tgp_deployed_troops_modifier: "Saques desenfreados"
 tgp_deployed_troops_modifier_desc: "Nem mesmo o espetáculo impressionante de nossas tropas conseguiu conter a avareza desenfreada de saqueadores e carroñeros neste condado."
 tgp_paying_off_the_looters_modifier: "Saqueadores subornados"
 tgp_paying_off_the_looters_modifier_desc: "Em troca de um pouco de ouro, os saques desenfreados desapareceram da região, deixando espaço para a recuperação."
 #CONTRACT REWARD
 task_contract_reward_effect_deployed_troops_desc: "$label_success_standard$"
 task_contract_reward_effect_setting_an_example_desc: "$label_success_standard$"
 task_contract_reward_effect_confiscate_for_personal_inspection_desc: "$label_success_standard$"
 task_contract_reward_effect_paying_off_the_looters_desc: "$label_success_standard$"
 task_contract_reward_effect_deployed_troops_failure_desc: "$label_failure_standard$"
