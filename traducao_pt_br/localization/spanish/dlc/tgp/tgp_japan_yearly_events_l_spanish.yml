l_spanish:
 #Wordplay of the word "shiki" in Japanese meaning "spread"
 tgp_japan_yearly_events.0001.t: "Espalhando a alegria"
 tgp_japan_yearly_events.0001.desc: "Embora eu me sinta próximo de meu [ROOT.Char.Custom2('RelationToMe', gift_receiver)] [gift_receiver.GetFirstName], não posso deixar de notar que ele/ela sorri menos do que o habitual. Eu odiaria pensar que é por minha causa!\n\nEnquanto aprecio as delícias que o mercado oferece, encontro um vendedor que oferece uma variedade de [Glossary( 'uchiwa', 'UCHIWA_GLOSS' )] elegante. Ele insiste:\n\n"Envolva isto em seu [Glossary( 'furoshiki', 'FUROSHIKI_GLOSS' )] e quem o receber saberá que você quer espalhar alegria!"."
 tgp_japan_yearly_events.0001.a: "É o gesto perfeito para alegrar minha querid[gift_receiver.Custom('ES_OA')] [gift_receiver.GetFirstNameNoTooltip]."
 tgp_japan_yearly_events.0001.tt.gift_appreciation: "agradece o presente"
 tgp_japan_yearly_events.0001.a_spouse_toast: "[gift_receiver.GetTitledFirstNameNoTooltip] $tgp_japan_yearly_events.0001.tt.gift_appreciation$"
 tgp_japan_yearly_events.0001.friend_toast: "[gift_receiver.GetTitledFirstNameNoTooltip] $tgp_japan_yearly_events.0001.tt.gift_appreciation$"
 tgp_japan_yearly_events.0001.lover_toast: "[gift_receiver.GetTitledFirstNameNoTooltip] $tgp_japan_yearly_events.0001.tt.gift_appreciation$"
 tgp_japan_yearly_events.0001.b: "Não, este é um presente bonito demais para [gift_receiver.GetSheHe]…"
 tgp_japan_yearly_events.0001.b.flavor: "… mas é o presente perfeito para mim!"
 tgp_japan_yearly_events.0001.c: "Esses mercadores sanguessugas são exaustivos."
 UCHIWA_GLOSS: "Um leque de mão redondo e elegante da dinastia Tang da China (618-907 d.C.), que se tornou popular entre a nobreza japonesa em نتيجة das missões comerciais com a China. Muitas vezes era associado ao verão e à feminilidade. Sua popularidade e seus belos desenhos acabaram resultando na criação de leis suntuárias para restringir sua decoração."
 FUROSHIKI_GLOSS: "Um pano decorativo e funcional. Literalmente, \"forro de banho\", de furo ou \"banho\" e shiki como \"forro\". O termo se origina dos nobres que visitavam a casa de banhos e guardavam seus pertences em um pano adornado com o brasão da família."
 #Artifact
 uchiwa: "Uchiwa"
 uchiwa_desc: "Padrões delicados adornam este leque feito à mão, fabricado com bambu e papel."
 tgp_japan_yearly_events.0006.t: "Tesouros do Mar"
 tgp_japan_yearly_events.0006.desc: "Ao percorrer a costa de [pearl_diver.GetCurrentLocation.GetBaronyNameExplicitly], dou de cara com um grupo de mergulhadoras [Glossary( 'ama', 'AMA_DIVERS_GLOSS' )] que examina sua captura.\n\nSua líder se cobre e se aproxima de mim: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], contemplai os dons que o mar nos entrega!".\n\nA profusão de pérolas e suculentas orelhas-do-mar é certamente impressionante."
 tgp_japan_yearly_events.0006.a: "Esta captura deve ser compartilhada com os locais."
 tgp_japan_yearly_events.0006.tt.success: "Você consegue chegar a um acordo"
 tgp_japan_yearly_events.0006.tt.failure: "Não convence [pearl_diver.Custom('ES_AlAla')] [pearl_diver.GetTitledFirstNameNoTooltip|l]"
 tgp_japan_yearly_events.0006.b: "Posso poupar-lhe uma viagem ao mercado."
 tgp_japan_yearly_events.0006.c: "O templo se sentiria honrado com o que [ROOT.Char.GetFaith.WaterGodName]."
 tgp_japan_yearly_events.0006.d: "És uma prova do teu ofício, mas devo partir."
 AMA_DIVERS_GLOSS: "#bold Ama#! — ou "mulheres do mar" — são mergulhadoras especializadas em coletar pérolas e frutos do mar do fundo do mar. São famosas por sua capacidade de prender a respiração por longos períodos de tempo."
 tgp_japan_yearly_events.0012.t: "Travessuras"
 tgp_japan_yearly_events.0012.desc: "Subindo pelas [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] de [ROOT.Char.GetCurrentLocation.GetBaronyNameExplicitly], uma névoa morna desce sobre mim.\n\nQue sorte! Avisto um [Glossary( 'onsen', 'ONSEN_GLOSS' )] fumegante, mas parece que não sou [ROOT.Char.Custom('ES_ElLa')] primeiro[ROOT.Char.Custom('ES_XA')] hóspede do dia.\n\nUm macaco-das-neves travesso já entrou na banheira! Embora meus músculos estejam cansados e minhas axilas já comecem a feder, me pergunto se é seguro tomar banho com um animal selvagem."
 tgp_japan_yearly_events.0012.a: "#EMP Balance os braços, gritando."
 tgp_japan_yearly_events.0012.a.monkey.martial.tt.success: "O macaco foge apavorado"
 tgp_japan_yearly_events.0012.a.monkey.martial.tt.failure: "O macaco ignora minha tentativa patética de assustá-lo"
 tgp_japan_yearly_events.0012.b: "Finja que não sou uma ameaça."
 tgp_japan_yearly_events.0012.b.monkey.intrigue.tt.success: "O macaco parece intrigado, mas me deixa em paz"
 tgp_japan_yearly_events.0012.b.monkey.intrigue.tt.failure: "O macaco avança contra mim, ameaçando-me para que eu recue"
 tgp_japan_yearly_events.0012.c: "Não mexa com o macaco."
 tgp_japan_yearly_events.0013.t: "Purificando o espírito"
 tgp_japan_yearly_events.0013.desc: "Um canto suave me chama pelo caminho da montanha. Ao me aproximar de sua origem, deparo-me com uma densa névoa quente que envolve a silhueta de um[mystic.Custom('ES_XA')] [mystic.GetWomanMan].\n\nBasta olhar na minha direção e faz um gesto para que eu me junte a [mystic.GetSheHe] no [Glossary( 'onsen', 'ONSEN_GLOSS' )]. Ao que parece, um ritual está prestes a ser realizado."
 tgp_japan_yearly_events.0013.a: "Participar do ato."
 tgp_japan_yearly_mystic_positive.tt: "Mergulho fundo em meu interior para encontrar uma verdade"
 tgp_japan_yearly_mystic_neutral.tt: "Tento entender o significado por trás das palavras"
 tgp_japan_yearly_mystic_negative.tt: "Não entendo o que me é pedido"
 tgp_japan_yearly_events.0013.b: "Peça orientação ao místico em vez disso.[mystic.Custom('ES_AlAla')] místico[mystic.Custom('ES_OA')] em vez disso."
 tgp_japan_yearly_events.0013.b.mystic.learning.tt.success: "Entendo o significado por trás da sabedoria"
 tgp_japan_yearly_events.0013.b.mystic.learning.tt.failure: "Não tenho a menor ideia do que está sendo dito"
 tgp_japan_yearly_events.0013.c: "Deixemos[mystic.Custom('ES_LoLa')] em paz."
 tgp_japan_yearly_events.0014.t: "Uma trégua bem-vinda"
 tgp_japan_yearly_events.0014.desc: "Respiro com dificuldade ao inalar o ar rarefeito e gelado da montanha. Ao olhar para cima, do meu caminho em direção ao cume, me deparo com a visão de névoa ondulante e neve derretida nas árvores próximas.\n\nAo chegar à sua origem, posso finalmente respirar um pouco e admirar o convidativo [Glossary( 'onsen', 'ONSEN_GLOSS' )] diante de mim."
 tgp_japan_yearly_events.0014.a: "Quem pode resistir a umas águas termais?!"
 tgp_japan_yearly_events.0014.b: "Fique mais um pouco."
 tgp_japan_yearly_events.0014.c: "Não há tempo a perder."
 ONSEN_GLOSS: "#bold Onsen#! — fontes termais japonesas—, uma nascente natural conhecida por suas propriedades terapêuticas."
 tgp_japan_yearly_events.0021.t: "Entre as flores"
 tgp_japan_yearly_events.0021.desc: "A temporada do [Glossary( 'hanami', 'HANAMI_GLOSS' )] chegou! As cerejeiras, carregadas de flores suntuosas, alegram a todos. O povo de [ROOT.Char.GetCurrentLocation.GetName] prevê quando plantar o arroz e reza para que a colheita vindoura seja farta.\n\nMeu [ROOT.Char.Custom2('RelationToMe', hanami_enjoyer)], [hanami_enjoyer.Custom('ES_ElLa')] [hanami_enjoyer.GetTitledFirstNameNoTooltip|l], proclama. \"A vida é como a beleza fugaz de uma flor\". Suas palavras me lembram que é preciso fazer uma oferenda."
 tgp_japan_yearly_events.0021.a: "Ofereço um pouco de saquê."
 tgp_japan_yearly_events.0021.a_pleased_deities.tt: "#EMP Parece#! que as divindades viram minhas ações"
 tgp_japan_yearly_events.0021.a_char_modifier.tt: "Sinto como se um grande peso tivesse sido tirado dos meus ombros"
 tgp_japan_yearly_events.0021.a_county_modifier.tt: "Os cidadãos viram minhas ações"
 tgp_japan_yearly_events.0021.a_nothing_happens.tt: "Minhas ações caem em ouvidos surdos"
 tgp_japan_yearly_events.0021.b: "Levo um tempo para admirar as árvores."
 HANAMI_GLOSS: "#bold Hanami#!: "contemplar as flores"; uma tradição japonesa herdada da admiração das flores de ameixeira na China. Com o passar do tempo e com influências poéticas como "O Conto de Genji", no período Heian o foco havia mudado para dar prioridade às flores de cerejeira."
 tgp_japan_yearly_events.0026.t: "Histórias do tengu"
 tgp_japan_yearly_events.0026.desc: "A voz familiar do meu [ROOT.Char.Custom2('RelationToMe', rumormonger)], [rumormonger.Custom('ES_ElLa')|U] [rumormonger.GetTitledFirstName|l], ecoa de uma taverna, seguida pelas risadinhas carregadas de saquê do meu [ROOT.Char.Custom2('RelationToMeShort', gossiper)], [gossiper.Custom('ES_ElLa')] [gossiper.GetTitledFirstName|l].\n\n"Em nossas terras selvagens e indomáveis, espreita o [Glossary( 'tengu', 'TENGU_GLOSS' )]! Um monstro coberto de penas, cujo gênio é tão feroz quanto sua perícia com a espada. Esse espírito perverso condena tudo o que é sagrado!".\n\nToma outro gole de seu saquê e diz: "Mas é preciso dizer que quem conseguir provar seu valor aos olhos da besta será recompensado com o domínio da astúcia marcial. Mas, quando olho para este mar de covardes, tenho certeza de que é uma causa perdida!"."
 tgp_japan_yearly_events.0026.a: "Pergunto-me se é verdade."
 tgp_japan_yearly_events.0026.a.tt: "Da próxima vez que viajar pelas montanhas ou pela floresta, ficarei atento a esta criatura misteriosa."
 tgp_japan_yearly_events.0026.b: "Não passam de balbucios de bêbados…"
 TENGU_GLOSS: "#bold Tengu#! —"cão celestial"— é uma forma de [Glossary( 'yōkai', 'YOKAI_GLOSS' )], frequentemente representado como uma criatura aviária. Espíritos protetores, porém perigosos, que habitam montanhas ou florestas. A versão mais conhecida de um tengu nos tempos modernos seria a de um rosto vermelho combinado com um nariz comprido."
 tgp_japan_yearly_events.0027.t: "Demonstre seu valor"
 tgp_japan_yearly_events.0027.desc: "Ao caminhar pelas terras selvagens de [ROOT.Char.GetCurrentLocation.GetBaronyNameExplicitly], não consigo tirar da cabeça as histórias que ouvi sobre o [Glossary( 'tengu', 'TENGU_GLOSS' )].\n\nSem uma alma à vista, tudo o que ouço é o bater do meu coração. Enquanto tento controlar minha respiração apavorada, um arrepio me percorre a espinha... Estou sendo observado.\n\nMeus olhos se voltam para o som de passos. Buscando desesperadamente ao meu redor, avisto o reflexo de uma lâmina entre a densa neblina."
 tgp_japan_yearly_events.0027.a: "Devo lutar."
 tgp_japan_yearly_events.0027.a.tt.success: "Vivo para lutar mais um dia"
 tgp_japan_yearly_events.0027.a.tt.success_explanation: "Você pode conseguir [traits|lE] #P positivos#! extras."
 tgp_japan_yearly_events.0027.a.tt.failure: "Perco a batalha, mas não ileso"
 tgp_japan_yearly_events.0027.b: ""Ouça o que tenho a dizer!""
 tgp_japan_yearly_events.0027.b.tt.success: "Parece que minhas palavras o convenceram"
 tgp_japan_yearly_events.0027.b.tt.failure: "Não se importa com o que tenho a dizer"
 tgp_japan_yearly_events.0027.c: "Fugirei enquanto ainda posso."
 tgp_japan_yearly_events.0028.t: "Desviados"
 tgp_japan_yearly_events.0028.desc: "Ao me encontrar nos/as [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] de [ROOT.Char.GetCurrentLocation.GetBaronyNameExplicitly], não consigo evitar ficar com os olhos bem abertos em busca de um [Glossary( 'tengu', 'TENGU_GLOSS' )].\n\nNunca em toda a minha vida tive uma caminhada mais sem graça pelos/as [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')]. Deveria ter sido mais sensat[ROOT.Char.Custom('ES_OA')] e não ter confiado nas histórias de um bêbado."
 tgp_japan_yearly_events.0028.a: "Não serei enganado de novo."
 tgp_japan_yearly_events.0028.b: "Solto um grito."
 tgp_japan_yearly_events.0029.t: "Técnicas tengu"
 tgp_japan_yearly_events.0029.desc: "Embora [tengu_warrior.Custom('ES_ElLa')] [tengu_warrior.GetTitledFirstName|l] não seja um[tengu_warrior.Custom('ES_XA')] [Glossary( 'tengu', 'TENGU_GLOSS' )] , mas é mestre da espada!\n\nIncontáveis horas de treinamento diligente sob seu olhar atento finalmente deram resultado.\n\nMinha espada já não me parece um machado de lenhador, feito para cortar os membros dos homens, mas uma bela extensão do meu corpo, pronta para alcançar e tocar aqueles que quiserem me fazer mal.\n\nMeu mestre[tengu_warrior.Custom('ES_OA')] me lembra: \"Isto é apenas o começo, você ainda tem muito a dominar\"."
 tgp_japan_yearly_events.0029.a: "Não me basta derrubar os homens, devo liderá-los."
 tgp_japan_yearly_events.0029.b: "Esperarei para ver aonde seu treinamento me levará."
 tgp_japan_yearly_events.0036.t: "Reflexo da Terra Pura"
 tgp_japan_yearly_events.0036.desc: "Meu [ROOT.Char.Custom2('RelationToMe', gardener)], [gardener.Custom('ES_ElLa')] [gardener.GetTitledFirstName|l], está dando os últimos retoques à ampliação do lago no meu jardim.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], vosso jardim é um reflexo perfeito do paraíso de [ROOT.Char.GetFaith.GetName|l]. Há algum detalhe final que eu possa acrescentar?"
 tgp_japan_yearly_events.0036.a: "Mais flores de lótus e talvez…"
 tgp_japan_yearly_events.0036.a.random_chance: "Quanto maior sua [stewardship|El], melhores são as chances:"
 tgp_japan_yearly_events.0036.b: "Mais peixes!"
 tgp_japan_yearly_events.0036.b.flavor: "Muito da política da corte pode ser resolvida quando um homem está focado em um peixe."
 ONIBI_GLOSS: "O #bold onibi#! ou "fogo demoníaco" é uma forma de [Glossary( 'yōkai', 'YOKAI_GLOSS' )] que se manifesta como uma esfera de luz ou de chamas, nascida das almas dos mortos. Costuma ser maligna, conduzindo viajantes a situações perigosas, quando não mortais."
 YOKAI_GLOSS: "Os #bold yōkai#! ou "aparições estranhas" são seres sobrenaturais encontrados na mitologia japonesa, variando de fantasmas, demônios, monstros, metamorfos e trapaceiros. Eles costumam aparecer com traços semelhantes aos de animais."
 SORIBASHI_GLOSS: "Os #bold soribashi#! ou "pontes da lua", originários da China, são pontes para pedestres com arco acentuado. São usadas para fins ornamentais em jardins ou erguidas para que pedestres atravessem riachos enquanto permitem a passagem de barcos por baixo."
 tgp_japan_yearly_events.1000.t: "Chamas dançantes"
 tgp_japan_yearly_events.1000.desc: "Uma leve chuva nos acompanha enquanto atravessamos [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip].\n\nÀ medida que a garoa se intensifica, noto luzes dançantes, tremeluzindo à distância.\n\nMeu [ROOT.Char.Custom2('RelationToMe', chaplain)]; [chaplain.GetFirstNameNoTooltip] sugere cautela, pois podem ser [Glossary( 'onibi', 'ONIBI_GLOSS' )] que buscam nos atrair para o perigo."
 tgp_japan_yearly_events.1000.a: "Esqueça o perigo! Vamos ver o que são essas luzes!"
 tgp_japan_yearly_events.1000.a.tt.success: "Ao perseguir o Onibi, você encontrou um tesouro escondido"
 tgp_japan_yearly_events.1000.a.tt.failure: "Ao perseguir os onibi, você escorregou no terreno molhado e se machucou"
 tgp_japan_yearly_events.1000.b: "Conte-me mais quando tivermos nos abrigado desta chuva"
 tgp_japan_yearly_events.1000.b.tt.success: "[chaplain.GetFirstNameNoTooltip] te dá detalhes sobre os onibi que complementam suas outras leituras"
 tgp_japan_yearly_events.1000.b.tt.failure: "As incoerências na explicação de [chaplain.GetFirstNameNoTooltip] fazem sua cabeça doer"
 tgp_japan_yearly_events.1000.c: "Sim, melhor não ficarmos aqui."
 tgp_japan_yearly_events.1010.t: "Disputa sectária"
 tgp_japan_yearly_events.1010.desc: ""A tensão entre os [buddhist_councillor_1.GetFaith.GetAdherentNamePlural] de traço [buddhist_councillor_1.Custom('DescriptorPositiveStandalone')] e os [buddhist_councillor_2.GetFaith.GetAdherentNamePlural] de traço [buddhist_councillor_2.Custom('DescriptorNegativeStandalone')] aumenta a cada dia, [ROOT.Char.Custom('FormOfAddressForLiege')]!".\n\nO veemente protesto vem de meu [ROOT.Char.Custom2('RelationToMeShort', buddhist_councillor_1)] [buddhist_councillor_1.GetFirstName].\n\n"Os monges [buddhist_councillor_2.GetFaith.GetAdherentNameNoTooltip] de perfil [buddhist_councillor_2.Custom('DescriptorNegativeStandalone')|l] rezam pela nossa queda. Eu vos suplico, por [ROOT.Char.GetFaith.HighGodName], deixai claro que estais com os [buddhist_councillor_1.GetFaith.GetAdherentNamePluralNoTooltip] de traço [buddhist_councillor_1.Custom('DescriptorPositiveStandalone')|l] e ficará evidente que seremos favorecidos!"."
 tgp_japan_yearly_events.1010.a: "Ficarei do lado dos monges [buddhist_councillor_1.GetFaith.GetAdherentNamePluralNoTooltip]."
 tgp_japan_yearly_events.1010.b: "Os [buddhist_councillor_2.GetFaith.GetAdherentNamePluralNoTooltip] estão certos."
 tgp_japan_yearly_events.1010.c: "Por que eu deveria me importar com a forma como [ROOT.Char.GetFaith.HighGodName]?"
 faith_conversion_cost_tgp_japan_1010_event: "Por eventos"
 tgp_japan_yearly_events.1010.a_discount: "Você ganha um desconto de #p 50 %#! por se converter ao [buddhist_councillor_1.GetFaith.GetName|l]"
 tgp_japan_yearly_events.1010.b_discount: "Você recebe um desconto de #p 50 %#! por se converter ao [buddhist_councillor_2.GetFaith.GetName|l]"
 every_buddhist_sect_1_vassal: "Todo [vassal|lE] de [buddhist_councillor_1.GetFaith.GetName|l]"
 every_buddhist_sect_2_vassal: "Todo [vassal|lE] do [buddhist_councillor_2.GetFaith.GetName|l]"
 tgp_japan_yearly_events.1010.c.tt: "A luta causa agitação em todo o reino"
 tgp_japan_yearly_events.1020.t_siren: "A melodia de um oni"
 tgp_japan_yearly_events.1020.t_garden: "A cabeça florescida"
 tgp_japan_yearly_events.1020.t_shadow: "A Profundidade da Minha Sombra"
 tgp_japan_yearly_events.1020.desc_siren: "Uma melodia assombrosa me chama do meu sono. Uma mulher, pálida e elegante, flutua acima de mim, cantando sobre um coração partido.\n\nAo tentar alcançá-la, sua imagem se dissipa. Quando volto à consciência, a angústia dessa mulher dos meus sonhos e do amor que poderia ter sido me assombram."
 tgp_japan_yearly_events.1020.a_siren: "O amor do qual ela canta, eu preciso ter!"
 tgp_japan_yearly_events.1020.b_siren: "Tal beleza deve ser compartilhada, espalhem sua palavra por todo o reino."
 tgp_japan_yearly_events.1020.desc_garden: "Enquanto caminho pelo jardim, noto uma flor exótica.\n\nAo aspirar seu aroma, uma brisa me envolve numa sensação que parece um suave sussurro. Ao erguer o olhar, o sol me atinge em cheio nos olhos. Volto o olhar para a flor apenas para ver uma cabeça grotesca me lançando um olhar carrancudo. Pisquei novamente e o rosto havia desaparecido."
 tgp_japan_yearly_events.1020.a_garden: "Este solo deve ser especial, vamos continuar cultivando-o."
 tgp_japan_yearly_events.1020.b_garden: "Devo construir sobre este jardim para selá-lo."
 tgp_japan_yearly_events.1020.desc_shadow: "Minha sombra tem estado... estranha. Parece demorar um instante após eu começar a andar. Quando desvio o olhar, ela quase parece dançar com outras sombras, mas quando volto a olhar, retorna ao meu lado.\n\nEmbora ainda não tenha me ferido, uma sombra que pode abandonar seu mestre parece perigosa."
 tgp_japan_yearly_events.1020.a_shadow: "Apenas meus inimigos deveriam temer a minha sombra!"
 tgp_japan_yearly_events.1020.b_shadow: "Devo manter as tochas acesas o tempo todo; não deixo nada escapar."
 tgp_japan_yearly_events.1020.desc_end: "\n\nSerá que o estresse de ser [ROOT.Char.GetTitleAsNameNoTooltip|l] ou será obra de algum [Glossary( 'yōkai', 'YOKAI_GLOSS' )]?"
 tgp_japan_yearly_events.1020.c: "Bah! É [ROOT.Char.GetFaith.TricksterGodName] que está pregando peças em mim."
 tgp_japan_yearly_events.1030.t: "Reflexões sobre o futuro"
 tgp_japan_yearly_events.1030.desc: "Os aplausos silenciosos dos fiéis que imploram boa sorte a [ROOT.Char.GetFaith.HighGodName] em sua [ROOT.Char.GetFaith.HouseOfWorship] me atraem até o lugar.\n\nJá faz um tempo desde que tive a oportunidade de me dedicar à oração e à reflexão. Em que devo me concentrar nos próximos anos?"
 tgp_japan_yearly_events.1030.a: "Minha saúde, acima de tudo."
 tgp_japan_yearly_events.1030.b: "É preciso garantir o futuro da [ROOT.Char.GetDynasty.GetNameNoTooltip]."
 tgp_japan_yearly_events.1030.c: "A prosperidade de nossa família é da máxima importância."
 tgp_japan_yearly_events.1030.d: "Só preciso do favor de [ROOT.Char.GetFaith.HighGodName]!"
 tgp_japan_yearly_events.1030.e: "Não deixarei que a oração perturbe minha paz."
 tgp_japan_yearly_events.1040.t: "Uma ponte de lua"
 tgp_japan_yearly_events.1040.desc: "Ao tentar atravessar um canal, encontro uma bela ponte arqueada escarlate. Paro, maravilhado, para observar a sutil elegância deste [Glossary( 'soribashi', 'SORIBASHI_GLOSS' )].\n\nÀs vezes, um ato tão pequeno quanto atravessar um riacho pode ser carregado de intenção."
 tgp_japan_yearly_events.1040.a: "É uma ponte sagrada, a cruzaremos com cuidado."
 tgp_japan_yearly_events.1040.b: "Como [ROOT.Char.GetTitleAsNameNoTooltip], ninguém o cruzará antes de mim."
 tgp_japan_yearly_events.1040.c: "Não ouso andar sobre algo assim, e se ceder?"
 faith_conversion_cost_tgp_japan_1040_event: "Por cruzar a Ponte Vermelha"
 tgp_japan_yearly_events.1040.discount: "Você ganha um desconto de #p 50 %#! por se converter ao [GetReligionByKey('shintoism_religion').GetName|l]"
 tgp_japan_yearly_events.1050.opening: "[messenger.Custom2('AppropriateGreeting', ROOT.Char)]"
 tgp_japan_yearly_events.1050.desc: "Lamento informar que vocês estão violando uma regra imperativa:"
 tgp_japan_yearly_events.1050.desc.a: "#EMP Vosso jardim contém flores amarelas demais.#!"
 tgp_japan_yearly_events.1050.desc.b: "#EMP As armas de vossos quartéis são afiadas com pouca frequência.#!"
 tgp_japan_yearly_events.1050.desc.c: "#EMP Seguís sosteniendo el [Glossary( 'sensu', 'SENSU_GLOSS' )] de manera incorrecta.#!"
 tgp_japan_yearly_events.1050.desc.outro: "\n\nPor tal infração, ordena-se que você faça uma doação considerável aos cofres da sua[ROOT.Char.GetLiege.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', ROOT.Char.GetLiege)], [ROOT.Char.GetLiege.Custom('ES_ElLa')] [ROOT.Char.GetLiege.GetTitledFirstName|l]."
 tgp_japan_yearly_events.1050.a: "Como [ROOT.Char.GetLiege.GetSheHe] deseje."
 tgp_japan_yearly_events.1050.b: "Essa norma já não consta mais nos livros."
 tgp_japan_yearly_events.1050.b.tt: "Você tenta convencer a [messenger.GetFirstNameNoTooltip] de que esta norma obscura já não é válida"
 tgp_japan_yearly_events.1050.c: "![ROOT.Char.GetLiege.GetFirstNameNoTooltip] não ficará impune!"
 tgp_japan_yearly_events.1050.tt.success: "A multa é anulada"
 tgp_japan_yearly_events.1050.tt.failure: "[messenger.GetSheHe|U] te ordena que pague"
 tgp_japan_yearly_events.1060.t: "Por misericórdia ou por justiça"
 tgp_japan_yearly_events.1060.desc: "[Select_CString(prisoner.IsFemale, 'Desaliñada y descontenta', 'Desaliñado y descontento' )], semelhante [prisoner.Custom2('InsultAdjective', ROOT.Char)] que é [prisoner.GetName] incomoda os guardas buscando atenção, pedindo que [prisoner.GetHerHim] o ouçam. Por curiosidade, vou vê-lo[prisoner.GetHerHim] em sua [prisoner.Custom('PrisonTypeCell')], à espera de ouvir o que ele tem a dizer com tanto desespero.\n\n[prisoner.GetSheHe|U] me olha e chora:"
 tgp_japan_yearly_events.1060.desc_old: ""Meus ossos estão quebradiços e rígidos; já passei tempo demais neste mundo."
 tgp_japan_yearly_events.1060.desc_young: ""Não vi muito em minha vida, mas não posso me satisfazer com as lembranças desta prisão."
 tgp_japan_yearly_events.1060.desc_long: ""Estou detido(a) há tempo demais[prisoner.Custom('ES_OA')] e cheguei à conclusão de que não desejo voltar."
 tgp_japan_yearly_events.1060.desc_injured: ""Minha saúde está definhando, e as cascas que arranco já não cicatrizam. A dor se intensifica cada vez mais, sem fim à vista."
 tgp_japan_yearly_events.1060.desc_generic: ""Não desejo mais viver nos confins desta cela."
 tgp_japan_yearly_events.1060.desc_outro: "“Se tendes clemência no coração, dareis um fim rápido à minha vida!”"
 tgp_japan_yearly_events.1060.a: "Muito bem, concederei seu desejo."
 tgp_japan_yearly_events.1060.b: "Talvez eu possa tornar seu confinamento melhor."
 tgp_japan_yearly_events.1060.c: "Seu sofrimento não terá alívio!"
 tgp_japan_yearly_events.1060.d: "Não, suas condições não mudarão."
 tgp_japan_yearly_events.1070.t: "Cinzas sagradas"
 tgp_japan_yearly_events.1070.desc: ""Um edifício do recinto do/a [ROOT.Char.Custom('GetFaithTemple')] em [province.GetName] foi consumido pelas chamas até os alicerces!", grita meu [ROOT.Char.Custom2('RelationToMeShort', messenger)] [messenger.GetName].\n\n"Monges e eruditos se apressam para encontrar um novo lugar para seu trabalho", continua [messenger.GetNameNoTooltip]. "Se vocês ajudassem a restaurar o [ROOT.Char.Custom('GetFaithTemple')], certamente [ROOT.Char.GetFaith.HighGodName] os abençoaria"."
 tgp_japan_yearly_events.1070.a: "Vamos reconstruí-lo melhor do que antes."
 tgp_japan_yearly_events.1070.b: "Talvez [ROOT.Char.GetFaith.HighGodName] esteja abrindo espaço para algo novo."
 tgp_japan_yearly_events.1070.c: "Devo ver como tal [ROOT.Char.Custom('GetFaithTemple')] foi incendiado…"
 tgp_japan_yearly_events.1070.c_tt: "Você inicia uma investigação sobre como o incêndio começou"
 tgp_japan_yearly_events.1071.desc: "[ROOT.Char.Custom2('RelationToMeShort', messenger)|U] traz notícias do recente incêndio do/do [ROOT.Char.Custom('GetFaithTemple')] e me assegura que seus esforços de investigação foram bem-sucedidos.\n\n"
 tgp_japan_yearly_events.1071.desc_yokai: ""Muitos na região afirmam ter visto um [Glossary( 'yōkai', 'YOKAI_GLOSS' )] estranho dias antes do incêndio. Talvez ele seja o culpado por esta tragédia?", pergunta meu [ROOT.Char.Custom2('RelationToMeShort', messenger)] [messenger.GetFirstName]."
 tgp_japan_yearly_events.1071.desc_heretics: ""Os habitantes locais apontaram um grupo de dissidentes como culpados. Precisamos enviar uma mensagem a esses hereges!", insiste meu [ROOT.Char.Custom2('RelationToMeShort', messenger)] [messenger.GetFirstName]."
 tgp_japan_yearly_events.1071.desc_rival: ""Viram [rival.GetName] rondar os arredores da cidade antes do incidente, tentando causar o caos sob vosso governo. Não deveria sair impune, não é mesmo?", insiste meu [ROOT.Char.Custom2('RelationToMeShort', messenger)] [messenger.GetFirstName]."
 tgp_japan_yearly_events.1071.desc_weather: ""O fogo foi o resultado de um fenômeno natural. Com o ar tão seco e o sol abrasador, não é de se espantar que um incêndio tenha começado. Seria melhor reforçar nosso abrigo contra os elementos", comenta [messenger.GetFirstName]."
 tgp_japan_yearly_events.1071.a: "Isso não vai acontecer de novo!"
 tgp_japan_yearly_events.1071.b: "Ah, bem, isso já é passado..."
 1071_rival_tt: "Durante #V 2#! anos, toda [scheme|El] hostil que iniciares contra [rival.GetNameNoTooltip] verá aumentada sua [success_chance|lE]"
 scheme.target.japan_1071.value_desc: "Vingança contra [target.GetFirstName]: $VALUE|+=0$"
 SENSU_GLOSS: "Um #bold sensu#! é um leque de mão dobrável, comumente usado no verão."
 TSURIDONO_GLOSS: "#bold Tsuridono#! —"pavilhão de pesca"— é uma estrutura construída sobre um lago, usada para observar o jardim e sediar pequenas apresentações de entretenimento."
 tgp_japan_yearly_events.1080.t: "Um pescador errante"
 tgp_japan_yearly_events.1080.desc: "O [Glossary( 'tsuridono', 'TSURIDONO_GLOSS' )] do meu jardim é um lugar para descansar e refletir, e a vista serena oferece um fim perfeito para um passeio ao entardecer. As águas que o cercam costumam estar tranquilas, interrompidas apenas pela ocasional carpa que abocanha um inseto na superfície. No entanto, hoje a atmosfera tranquila é rompida por violentos respingos!\n\nMeu [ROOT.Char.Custom2('RelationToMeShort', fisherman)] [fisherman.GetName] está à beira da água, com a vara de pesca lançada no que antes era um lago sereno. Será que ele ousa procurar sua próxima refeição no meu lago?!"
 tgp_japan_yearly_events.1080.a: "Em minha magnanimidade, decido esquecer esta má conduta."
 tgp_japan_yearly_events.1080.b: "¿Qué más ha visto en mi jardín?"
 tgp_japan_yearly_events.1080.b.tt: "Você interroga [fisherman.GetNameNoTooltip] em busca de informações sobre a corte"
 tgp_japan_yearly_events.1080.tt.success: "Fornece insights valiosos"
 tgp_japan_yearly_events.1080.tt.failure: "Não diz muito"
 tgp_japan_yearly_events.1080.tt_secret: "Revela um [secret|lE] ao acaso de um dos seus [courtiers|lE]"
 tgp_japan_yearly_events.1080.tt_family: "Todo [courtier|lE] que seja membro da família:\n$BULLET$Ganha [GetModifier('tgp_scheme_wary_modifier').GetNameWithTooltip] durante #V 3 años#!"
 tgp_japan_yearly_events.1080.c: "E não pode fazer isso em outro lugar?!"
 tgp_japan_yearly_events.1090.t: "Uma herança estéril"
 tgp_japan_yearly_events.1090.desc_intro_dead: "Sobrevivi a todos os meus filhos, e todos os meus descendentes repousam na terra."
 tgp_japan_yearly_events.1090.desc_intro_none: "Apesar da minha longa vida, não consegui trazer filhos a este mundo."
 tgp_japan_yearly_events.1090.desc_intro: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], você não estará aqui para governar para sempre", chora [informer.Custom('ES_ElLa')] [informer.GetTitledFirstName|l]. "Seria uma pena ver seu legado cair no esquecimento! Alguém precisa assumir [target_title.GetName] em seu lugar".\n\n"
 tgp_japan_yearly_events.1090.desc: "Meus [ROOT.Char.GetAge] anos se passaram como a vida de uma efêmera. Meus cabelos estão ficando grisalhos e meus ossos rangem. Os bebês que vi agarrados aos seios de suas mães agora cresceram e encontraram seu propósito na vida. Antes que meu fim me encontre, talvez eu possa agir em resposta ao apelo de [informer.GetNameNoTooltip]."
 tgp_japan_yearly_events.1090.a: "Redobrarei meus esforços."
 tgp_japan_yearly_events.1090.a_tt: "Você consegue alguém novo para o [Concept('concubine', 'concubinato' )|E]"
 tgp_japan_yearly_events.1090.b: "Meu herdeiro será de minha escolha!"
 tgp_japan_yearly_events.1090.b_tt: "Você obtém acesso a [interaction|El] #V $adopt_interaction$#! até a morte"
 tgp_japan_yearly_events.1090.c_uncaring: "Por que eu me importaria com o que aconteça quando eu me for?"
 tgp_japan_yearly_events.1090.c: "Reinarei o máximo que puder."
 tgp_japan_yearly_events.1100.t: "Uma febre consumida pela culpa"
 tgp_japan_yearly_events.1100.desc: "Sinto-me cada vez mais preocupado[ROOT.Char.Custom('ES_OA')] desde a morte de [victim.GetName], mas nenhum tratamento me traz alívio. Vejo seu rosto em todos os espelhos, pairando como um espectro atrás de mim. Seus últimos instantes se repetem em minha cabeça, o ato cruel se torna mais repugnante a cada repetição."
 tgp_japan_yearly_events.1100.desc_2: "\n\nAlém disso, a voz de [victim_2.GetName] sussurra para mim à noite, despertando-me do sono mais profundo. [victim_2.GetFirstNameNoTooltip] deveria descansar em paz; algo que, ultimamente, eu não consigo."
 tgp_japan_yearly_events.1100.desc_3: "A menção do nome de [victim_3.GetName] me provoca arrepios, me atormenta como os outros que caíram por minhas ordens."
 tgp_japan_yearly_events.1100.desc_outro: "\n\nSou o arquiteto da prisão em que me encontro. Roubar tantas vidas me despojou de toda paz."
 tgp_japan_yearly_events.1100.a_tt: "Você expõe todos os seus [secrets|lE] de assassinato"
 tgp_japan_yearly_events.1100.a: "É um sinal, devo me redimir!"
 tgp_japan_yearly_events.1100.b: "Minhas falhas permanecerão enterradas em mim."
 tgp_japan_yearly_events.1100.b_tt: "#warning Não é possível iniciar uma [scheme|lE] de assassinato por #V 5#! anos #!"
 guilt_fever_tt: "Você sofre de febre de culpa"
 tgp_japan_yearly_events.1110.t: "Veados [ROOT.Char.GetFaith.FateGodNamePossessive]"
 tgp_japan_yearly_events.1110.desc: "O santuário de [ROOT.Char.GetFaith.FateGodName|U] recebe muitos visitantes de todas as facetas da vida. Hoje não é exceção, com um magnífico cervo desfrutando da paz.\n\nNo entanto, este animal demonstrou interesse por mim, fitando-me sem piscar. Alguns dizem que os animais agem como médiuns, e talvez este cervo seja [ROOT.Char.GetFaith.FateGodName] que me traz uma mensagem."
 tgp_japan_yearly_events.1110.a: "[ROOT.Char.GetFaith.FateGodSheHe|U] deseja que eu reflita."
 tgp_japan_yearly_events.1110.b: "Um sinal de boa fortuna está por vir!"
 tgp_japan_yearly_events.1110.b.tt: "O cervo te leva a um tesouro"
 tgp_japan_yearly_events.1110.c: "Ficaria maravilhoso em meus salões."
 tgp_japan_yearly_events.1110.c.tt: "Você tenta abater o cervo onde ele está"
 tgp_japan_yearly_events.1110.tt.success: "O cervo cai diante de tua força"
 tgp_japan_yearly_events.1110.tt.failure: "O cervo foge apressado"
 tgp_reflection_modifier_desc_tt: "[GetModifier('tgp_reflection_modifier').GetNameWithTooltip]"
 tgp_japan_yearly_events.1120.t: "O desafio final"
 tgp_japan_yearly_events.1120.desc_intro: "Uma figura solitária, com sua [warrior_monk.Custom('GetRegionalSword')|l] desembainhada, bloqueia nosso avanço."
 tgp_japan_yearly_events.1120.desc_intro_river: "Ao tentarmos cruzar uma ponte, uma figura solitária desembainha sua [warrior_monk.Custom('GetRegionalSword')|l] e bloqueia nosso avanço."
 tgp_japan_yearly_events.1120.desc: "\n\n“Só os verdadeiros guerreiros trilham este caminho. Passei anos me dedicando[warrior_monk.Custom('ES_OA')] aos ensinamentos de [warrior_monk.GetFaith.WarGodName|U], e ainda não encontrei um adversário digno da minha espada”, diz.\n\nAo perceber meu status como [ROOT.Char.GetTitleAsName|l], estreita os olhos e sorri: “Vença-me em combate, e eu o seguirei até que minha cabeça deixe meu corpo ou até que os vermes me reduzam a nada.”"
 tgp_japan_yearly_events.1120.a: "Aceito o seu desafio!"
 tgp_japan_yearly_events.1120.a_warrior: "Vencê-lo será um prazer. Prepare-se!"
 tgp_japan_yearly_events.1120.b: "A corte é meu campo de batalha. Meu engenho, minha espada."
 tgp_japan_yearly_events.1120.b.tt: "Você tenta convencer [Select_CString(warrior_monk.GetTopLiege.IsFemale, 'a monja', 'o monge' )] a te seguir sem necessidade de combate físico"
 tgp_japan_yearly_events.1120.tt.success: "[Select_CString(warrior_monk.GetTopLiege.IsFemale, 'A monja guerreira', 'O monge guerreiro' )] se junta às suas fileiras"
 tgp_japan_yearly_events.1120.tt.failure: "Você não consegue convencer [Select_CString(warrior_monk.GetTopLiege.IsFemale, 'a monja', 'o monge' )]"
 tgp_japan_yearly_events.1120.c: "Guardas, saiam[warrior_monk.GetHerHim] do meu caminho!"
 tgp_japan_yearly_events.1120.c_tt: "Seus guardas lutam contra [Select_CString(warrior_monk.GetTopLiege.IsFemale, 'a monja', 'o monge' )] e permitem que seu grupo passe sem atraso."
 tgp_japan_yearly_events.1120.d: "Vamos pelo caminho panorâmico."
 SHOJI_GLOSS: "Um biombo com moldura treliçada, geralmente composto por folhas translúcidas que permitem a passagem da luz e das sombras."
 tgp_japan_yearly_events.1130.t: "Versos de [poet_daughter.GetFirstNameNoTooltip]"
 tgp_japan_yearly_events.1130.desc: "Ao meu [ROOT.Char.Custom2('RelationToMeShort', poet_daughter)] , [poet_daughter.GetName], toda noite ela fica olhando para a lua. Manchas de tinta estragam suas mãos delicadas, embora eu não saiba de ela escrever cartas. Essas excentricidades poderiam ser toleradas, mas agora ela começou a negligenciar a própria saúde, e isso pode pegar mal para mim.\n\nAo segui-la[poet_daughter.GetHerHim] até seus aposentos, espreito através do [Glossary( 'shoji', 'SHOJI_GLOSS' )] a causa de seu comportamento estranho.\n\n«[poet_daughter.Custom2('RelationToMeShort', ROOT.Char)|U]! Parece que não consigo esconder meu trabalho de você», diz, entregando-me seu [ROOT.Char.Custom('GetWritingMaterial')] repleto de versos."
 tgp_japan_yearly_events.1130.a: ""Suas palavras são maravilhosas, [poet_daughter.GetFirstNameNoTooltip]"."
 tgp_japan_yearly_events.1130.a.tt: "Você a incentiva a se tornar poetisa"
 tgp_japan_yearly_events.1130.poet_critical: "Ela se torna uma poetisa saudável"
 tgp_japan_yearly_events.1130.poet: "Torna-se poetisa"
 tgp_japan_yearly_events.1130.nice_try: "Ela progride em sua escrita"
 tgp_japan_yearly_events.1130.b: "Que disparate! Comportem-se como [poet_daughter.Custom('ES_ElLa')] [ROOT.Char.Custom2('RelationToMeShort', poet_daughter)] de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]!"
 tgp_learning_poetry_modifier: "Aprendendo poesia"
 tgp_learning_poetry_modifier_desc: "Este personagem está praticando seus versos"
 tgp_japan_yearly_events.1140.t: "Parada na estrada do clã"
 tgp_japan_yearly_events.1140.desc: "Ao atravessar as terras de [local_county.GetNameNoTier] nosso avanço é interrompido por um grupo de homens armados.\n\n“Em nome de [local_ruler.GetName], devo cobrar uma pequena taxa”, diz ele. Ao notar minha confusão, acrescenta: “Estas não são mais estradas imperiais. Aqui, só se impõe a vontade de [local_ruler.Custom('ES_DelDela')] [local_ruler.GetTitleAsName|l]”."
 tgp_japan_yearly_events.1140.a: "Deixem que ele receba seu pedágio, mas eu me lembrarei disto."
 tgp_japan_yearly_events.1140.b: ""Vocês sabem quem eu sou?!""
 tgp_japan_yearly_events.1140.b.tt: "Você tenta apelar ao respeito de [toll_warrior.GetNameNoTooltip] pelo status"
 tgp_japan_yearly_events.1140.tt.success: "Você conquista os guerreiros"
 tgp_japan_yearly_events.1140.tt.failure: "Você é forçado a encontrar outro caminho"
 tgp_japan_yearly_events.1140.c: "Não pagarei um único moeda ao seu[local_ruler.Custom('ES_OA')] "[local_ruler.GetTitleAsNameNoTooltip|l]!"
 tgp_japan_yearly_events.1150.t: "Avistamento do soberano"
 tgp_japan_yearly_events.1150.desc: "Meus cortesãos me informam de que [emperor.Custom('ES_ElLa')] [emperor.GetTitleAsNameNoTooltip|l] [emperor.GetFirstName] percorre minhas terras.\n\n"[emperor.Custom('ES_ElLa')|U] [emperor.GetTitleAsNameNoTooltip|l] em [emperor_location.GetNameNoTooltip]? Que fortuna! É raro ter um acesso tão próximo a [emperor.Custom('FormOfAddressForLiege')] em pessoa".\n\nÉ uma oportunidade ideal para enviar-lhe uma mensagem…"
 tgp_japan_yearly_events.1150.a: "Um tributo modesto é apropriado."
 tgp_japan_yearly_events.1150.b: "Estendamos a hospitalidade [local_ruler.GetHouse.GetNameNoTooltip] [emperor.Custom('ES_AlAla')] [emperor.GetTitleAsNameNoTooltip|l]."
 tgp_japan_yearly_events.1150.b.flavor: "Ao compartilhar o arroz e beber bastante, certamente colocará sua casa em boa posição."
 tgp_japan_yearly_events.1150.c: "Eu lhe dedicarei um verso!"
 tgp_japan_yearly_events.1150.c_tt: "Você escreve um poema para aumentar a opinião dele/dela sobre você, dependendo da sua [learning_skill|lE] [learning_i]"
 tgp_japan_yearly_events.1150.d: "[emperor.Custom('ES_ElLa')|U] [emperor.GetTitleAsNameNoTooltip|l] deveria compartilhar sua riqueza…"
 tgp_japan_yearly_events.1150.d.flavor: "Você envia guerreiros para libertar ouro"
 tgp_japan_yearly_events.1150.f: "Sua proximidade me lembra o quanto [emperor.GetHerHim] detesto!"
 tgp_japan_yearly_events.1150.f.flavor: "Destronar a aranha levará algum tempo, primeiro você deve revelar seus modos desagradáveis a todos"
 tgp_japan_yearly_events.1150.f.tt: "$tgp_japan_yearly_events.1200.b.tt$"
 tgp_japan_yearly_events.1151.t: "Uma mensagem de parte [local_ruler.Custom('ES_DelDela')] [local_ruler.GetTitleAsNameNoTooltip|l]"
 tgp_japan_yearly_events.1151.desc: "Ao cruzarmos [emperor_location.GetName] é abordado por um cortesão de seu [local_ruler.GetTitleAsNameNoTooltip|l] [local_ruler.GetName].\n\n"
 tgp_japan_yearly_events.1151.desc_bandits: ""[local_ruler.Custom('ES_ElLa')|U] [local_ruler.GetTitledFirstNameNoTooltip|l] exige tributo para permitir a passagem por suas terras. Não haveria necessidade de recorrer à violência".\n\nO tom de [messenger.GetName] é razoável, embora o grupo de guerreiros armados que [local_ruler.GetHerHim] o acompanha sugira o contrário."
 tgp_japan_yearly_events.1151.desc_hospitality: ""[local_ruler.Custom('ES_ElLa')|U] [local_ruler.GetTitledFirstNameNoTooltip|l] vos dá as boas-vindas a [local_ruler.GetPrimaryTitle.GetNameNoTierNoTooltip]", diz [messenger.GetName], inclinando-se graciosamente. Seria uma honra para [local_ruler.GetSheHe] que vos detivésseis a desfrutar de nossa hospitalidade"."
 tgp_japan_yearly_events.1151.desc_poem: ""Alguns versos de [local_ruler.GetNameNoTooltip]", diz [messenger.GetName] e me entrega um [emperor.Custom('GetWritingMaterial')] banhado a ouro, repleto de caracteres. "Espero que encontreis sua obra de vosso agrado"."
 tgp_japan_yearly_events.1151.desc_gift: ""Um presente, cortesia de [local_ruler.GetNameNoTooltip]", diz [messenger.GetName] e me entrega uma bolsa de ouro. "Desejamos o melhor em suas viagens, [emperor.GetTitleAsNameNoTooltip|l]"."
 tgp_japan_yearly_events.1151.a: "Você me honra, [local_ruler.GetNameNoTooltip]!"
 tgp_japan_yearly_events.1151.b: "Um esforço admirável, suponho…"
 tgp_japan_yearly_events.1151.c: "Ninguém me intimida!"
 tgp_japan_yearly_events.1151.c_bandits: "Guardas, rechaçai-os!"
 tgp_japan_yearly_events.1151.d: "Suponho que teremos que dar a volta, então."
 tgp_japan_yearly_events.1151.d_bandits: "Que levem um pouco de ouro. Não vale a pena lutar."
 japan_yearly_1151_bandits: "Você tenta expulsar os bandidos de [local_ruler.GetNameNoTooltip]"
 japan_yearly_1151_bandits_win: "Os bandidos ficam com um belo cofre de ouro"
 japan_yearly_1151_bandits_lose: "Os bandidos fracassam e retornam de mãos vazias"
 japan_yearly_1151_success: "Seu plano funciona"
 japan_yearly_1151_fails: "Seu plano fracassa"
 tgp_japan_yearly_events.1151.tt_good.success: "O governante aprecia seu gesto"
 tgp_japan_yearly_events.1151.tt_good.failure: "Seu gesto não impressiona o governante"
 friend_nice_gesture: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'tiveste', 'teve')] um gesto amistoso com [Select_CString(CHARACTER.IsLocalPlayer,'você', CHARACTER.GetShortUIName)] durante [Select_CString( CHARACTER.IsLocalPlayer, 'tuas', 'suas' )] viagens."
 friend_nice_gesture_corresponding: "[CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsLocalPlayer, 'tiveste', 'teve')] um gesto amistoso com [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'você', TARGET_CHARACTER.GetShortUIName)] durante [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'tuas', 'suas' )] viagens."
 tgp_japan_yearly_events.1160.t: "Uma oferenda [feuding_house.GetNameNoTooltip]"
 tgp_japan_yearly_events.cannibal.1160.t: "Uma oferenda de carne [feuding_house.GetNameNoTooltip]"
 tgp_japan_yearly_events.1160.desc: "A amarga inimizade entre minha grande casa de [ROOT.Char.GetHouse.GetName] e os inúteis [feuding_house.GetName] é conhecida por todos. Até hoje, esses porcos não tinham feito nenhuma tentativa de paz!\n\nPor isso, fico ainda mais curioso quando me apresentam [Select_CString(new_concubine.IsFemale, 'una bella', 'un hermoso' )] jovem, [new_concubine.GetName], como uma oferenda. Embora eu esteja encantado com o quão [new_concubine.Custom('ComplimentAdjective')] é, não consigo deixar de pensar que se trata de mais uma armação dos [feuding_house.GetNameNoTooltip]…"
 tgp_japan_yearly_events.1160.a: "… Mas [new_concubine.GetSheHe] é uma oferta tentadora demais para não explorar."
 tgp_japan_yearly_events.1160.b: "Isso é uma piada? Envie[new_concubine.GetHerHim] de volta."
 tgp_japan_yearly_events.1160.c: "Como posso confiar neles? Matem[new_concubine.GetHerHim]!"
 tgp_japan_yearly_events.1160.d: "Ela fará uma ótima refeição."
 tgp_japan_yearly_events.1200.t: "Congestionamento na capital"
 tgp_japan_yearly_events.1200.desc: "Foi uma manhã longa de reuniões em [kampaku.GetCurrentLocation.GetBaronyNameExplicitly], o trabalho [kampaku.Custom('ES_DelDela')] [kampaku.GetTitleAsName|l] jamais termina! Meu grupo parte para o edifício de [GetBuilding('heian_palace_01').GetName] para assistir a uma cerimônia em que estará presente [emperor.Custom('ES_ElLa')] [emperor.GetTitleAsName|l].\n\nPara muitos, o vai e vem da capital é um desafio a ser enfrentado, mas, diante de [kampaku.Custom('ES_ElLa')] [kampaku.GetTitleAsNameNoTooltip|l], as pessoas se afastam como sardinhas na presença de um tubarão.\n\nDe repente, a progressão do meu grupo é interrompida. Meus assistentes me avisam que o presunçoso [upstart.Custom('ES_EA')] advenediz[upstart.Custom('ES_OA')] de [upstart.GetName] passou à nossa frente na estrada e não moverá seu cavalo para o lado e nos deixar passar. Porc[upstart.Custom('ES_OA')] obstinad[upstart.Custom('ES_OA')]!"
 tgp_japan_yearly_events.1200.a: "Arrastem-no para fora do cavalo!"
 tgp_japan_yearly_events.1200.b: "Que ele ache que pode escapar impune disso."
 tgp_japan_yearly_events.1200.b.tt: "Seu [scheme|lE] de [GetScheme('slander').GetTypeName|l] recebe o modificador [GetModifier('bided_my_time').GetNameWithTooltip]"
 tgp_japan_yearly_events.1200.c: "A maior vitória é a amizade."
 tgp_japan_yearly_events.1200.c.tt: "Seu [scheme|lE] de [GetScheme('slander').GetTypeName|l] ganha [GetModifier('settled_differences_modifier').GetNameWithTooltip]"
 tgp_japan_yearly_events.1210.t: "Aptidão para liderar?"
 tgp_japan_yearly_events.1210.desc.intro: "Meu ascenso como chef[ROOT.Char.Custom('ES_EA')] da casa [ROOT.Char.GetHouse.GetName] foi arruinado. Meu [ROOT.Char.Custom2('RelationToMeShort', contester)], essa aranha de [contester.GetName], teceu uma teia de mentiras que envenenaram os ouvidos de todos que as escutam.\n\n"[ROOT.Char.Custom('ES_ElLa')|U] [ROOT.Char.GetTitledFirstName|l] é indign[ROOT.Char.Custom('ES_OA')] de liderar a casa [ROOT.Char.GetHouse.GetNameNoTooltip]!",\n\ndiz acima de tudo,"
 tgp_japan_yearly_events.1210.desc.reason_weak_prowess: "minha destreza lamentável"
 tgp_japan_yearly_events.1210.desc.reason_bad_health: "minha saúde debilitante"
 tgp_japan_yearly_events.1210.desc.reason_drunkard: "meu alcoolismo incessante"
 tgp_japan_yearly_events.1210.desc.bad_genetic: "todo defeito lamentável do meu nascimento"
 tgp_japan_yearly_events.1210.desc.sinful: "meu comportamento pecaminoso"
 tgp_japan_yearly_events.1210.desc.low_legitimacy: "minha legitimidade questionável"
 tgp_japan_yearly_events.1210.desc.older_sibling: "a existência do meu irmão mais velho"
 tgp_japan_yearly_events.1210.desc.illegitimized: "minha ilegitimidade"
 tgp_japan_yearly_events.1210.desc.concubine_child: "minha condição como filho de uma concubina"
 tgp_japan_yearly_events.1210.desc.reason_non_dominant_gender: "meu gênero menos que ideal"
 tgp_japan_yearly_events.1210.desc.reason_fallback: "seu primeiro sonho do ano foi desfavorável e"
 tgp_japan_yearly_events.1210.desc.outro: "deveria me excluir de liderar a família e exige meu lugar. Se eu deixar esse câncer se agravar, ele consumirá o corpo inteiro. Pelo bem da casa [ROOT.Char.GetHouse.GetNameNoTooltip], devo agir."
 tgp_japan_yearly_events.1210.a: ""Tenha noção do seu lugar ou suma!""
 tgp_japan_yearly_events.1210.b: "A planta madura de arroz abaixa a cabeça."
 tgp_japan_yearly_events.1210.b.flavor: "Uma liderança duradoura se constrói com base no compromisso. Você dá permissão a [contester.GetName] para fundar uma [house|lE] nova"
 tgp_japan_yearly_events.1210.b.tt: "[contester.GetName] fundará uma [house|lE] nova. Pensará com carinho em você e nos seus."
 house_relation_friendly_reason_cadet_branch_permission_desc: "Onde o arroz pode cair, uma árvore com muitos galhos pode ser sustentada para não cair."
 tgp_japan_yearly_events.1210.c: "Vou mudar a perspectiva dele."
 tgp_japan_yearly_events.1210.c.good: "A ferida mais fácil de curar é aquela que nunca existiu"
 tgp_japan_yearly_events.1210.c.good.tt: "$custom.every_house_member$"
 tgp_japan_yearly_events.1210.c.bad: "Tive que facilitar as coisas…"
 tgp_japan_yearly_events.1210.c.ugly: "Parece que arrumei um inimigo, ao que parece"
 tgp_japan_yearly_events.1210.d: "Por que reconhecer uma queixa imaginária?"
 tgp_japan_yearly_events.1210.d.flavor: "Eu não dou a mínima para ele"
 tgp_japan_yearly_events.1210.d.tt: "[contester.GetName] fundará uma [house|lE] nova. Eles terão uma péssima opinião sobre você e os seus."
 house_relation_quarrel_reason_cadet_branch_permission_desc: "Ignoraste suas preocupações"
 tgp_japan_yearly_events.1225.t: "Uma vida poética"
 tgp_japan_yearly_events.1225.desc.intro.influencer: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('poet_influencer'))] tem um brilho no olhar esta manhã. Sempre ansioso pela minha melhoria, ele/ela começa uma recitação apaixonada.\n\n"
 tgp_japan_yearly_events.1225.desc.intro: "Ao vasculhar textos para meu aprimoramento, me deparo com uma passagem que me chama a atenção."
 tgp_japan_yearly_events.1225.desc: "#EMP A semente da poesia [ROOT.Char.GetTopLiege.GetCulture.GetNameNoTooltip] reside nos corações de todos. Se for alimentada, florescerá em folhas de dez mil palavras.\n\nEssas palavras podem tomar as pequenas coisas que vemos e ouvimos e dar-lhes o poder de mover céus e terra, agitar os sentimentos dos deuses e espíritos invisíveis, suavizar as relações entre homens e mulheres e acalmar os corações de guerreiros ferozes!.#!\n\nSer poeta é viver e, vivendo, podemos nos tornar poetas melhores."
 tgp_japan_yearly_events.1225.a: "Então começarei a viver!"
 tgp_japan_yearly_events.1225.a.flavor: "Com o tempo, serei [Select_CString(ROOT.Char.IsFemale, 'poetisa', 'poeta' )] não apenas de nome"
 tgp_japan_yearly_events.1225.b: "Estudarei poesia hoje, mas buscarei uma vida menos frívola."
 tgp_japan_yearly_events.1260.t: "$tgp_japan_yearly_events.1225.t$: amor e morte"
 tgp_japan_yearly_events.1260.desc: "A manhã se anuncia com o doce ar sonoro das aves buscando parceiro.\n\n"Logo morrerão e, ainda assim, vivem plenamente e compõem palavras de amor durante toda a manhã".\n\nObservo também como os insetos são arrancados do ar, desmembrados e devorados por esses amantes vorazes e alados.\n\nComo [Select_CString(ROOT.Char.GetTopLiege.IsFemale, 'poetisa', 'poeta' )], minha vocação e meu dever é destilar toda a beleza e o horror em poucas palavras escolhidas para que outros reflitam sobre elas. Toda a poesia fala do amor ou da morte. A morte nos cerca a todos, mas o amor… O amor é o que devemos buscar."
 tgp_japan_yearly_events.1260.a: "É meu dever buscar encontros amorosos!"
 tgp_japan_yearly_events.1260.a.flavor: "De que outra forma posso esperar aprimorar minha arte?"
 tgp_japan_yearly_events.1260.b: "O romance está além da minha capacidade, assim como a poesia, temo."
 tgp_japan_yearly_events.1261.t: "$tgp_japan_yearly_events.1225.t$: imortalidade imperial"
 tgp_japan_yearly_events.1261.desc: "Minhas proezas poéticas chamaram a atenção [top_liege_spouse.Custom('ES_DelDela')] [top_cuckold.Custom2('RelationToMeShort', SCOPE.sC('top_liege_spouse'))]do meu [inspired_poet.Custom2('RelationToMeShort', SCOPE.sC('top_cuckold'))] [top_cuckold.GetTitledFirstName|l], [top_liege_spouse.Custom('ES_ElLa')] [top_liege_spouse.GetTitledFirstName|l]:\n\n“Suas palavras já conquistaram a imortalidade na mente de todo o povo da esfera [inspired_poet.GetTopLiege.GetCulture.GetNameNoTooltip], mas e se pudésseis garantir a imortalidade do corpo?”.\n\nSeus elogios chegam a um fim elegante à soleira de seus aposentos. Parece que [top_liege_spouse.GetSheHe] busca algo além de confirmar os rumores de minha destreza entre os lençóis. Será que ela espera que nossa união gere um novo herdeiro para seu [top_cuckold.GetTitleAsNameNoTooltip|l]?!"
 tgp_japan_yearly_events.1261.chop.desc: "\n\nNão deve saber da minha falta de aparelho reprodutivo…"
 tgp_japan_yearly_events.1261.a: "Meu sangue fortalecerá [top_cuckold.GetPrimaryTitle.GetNameNoTooltip]!"
 tgp_japan_yearly_events.1261.a.flavor: "Mais bela do que quaisquer palavras minhas, meu sangue ecoará pela história."
 tgp_japan_yearly_events.1261.b: "Melhor trocarmos poemas, não…"
 tgp_japan_yearly_events.1261.c: "Não revelarei a inadequada arte amatória [top_cuckold.Custom('ES_DelDela')] [top_cuckold.GetTitleAsNameNoTooltip|l]."
 tgp_japan_yearly_events.1261.d: "Vamos nos divertir mesmo assim!"
 tgp_japan_yearly_events.1262.t: "$tgp_japan_yearly_events.1225.t$: uma troca de versos"
 tgp_japan_yearly_events.1262.desc.intro: "Muitos versos poderosos são descobertos enquanto se toma o ar noturno. Enquanto medito sobre"
 tgp_japan_yearly_events.1262.inspo: "uma força além de mim,"
 tgp_japan_yearly_events.1262.japan.inspo: "o [Glossary('mono no aware', 'MONONOAWARE_GLOSS')],"
 tgp_japan_yearly_events.1262.desc: "dou de repente com [Select_CString( local_poet.IsFemale, 'la cautivadora poetisa', 'el cautivador poeta' )] [local_poet.GetName], que recita um poema:\n\n#EMP «[local_poet_spot.Custom('GetTerrainType')|U] en silencio,\n\naguardo oír tus pasos,\n\nen [local_poet_spot.Custom('RoamingLegendaryBeastProvinceWeather')] de la tarde».#!\n\nAo sentir minha disposição poética, ele/ela me faz um gesto para que eu me junte a [local_poet.GetSheHe] nas sombras. Poderia ser um convite para participar de"
 tgp_japan_yearly_events.1262.japan.outro: "uma [Glossary('renga', 'RENGA_GLOSS')]"
 tgp_japan_yearly_events.1262.outro: "um intercâmbio poético"
 tgp_japan_yearly_events.1262.japan.outro.outro: "ou seu olhar semelhante a [local_poet.Custom('VenomousCreature')] prenuncia algo mais lascivo?"
 tgp_japan_yearly_events.1262.a: "Tenho apenas o verso!"
 tgp_japan_yearly_events.1262.a.flavor: "#EMP O vento traz sua voz,\n\nsuave como o suspiro das folhas ao cair,\n\nsob céus de outono.#!"
 tgp_japan_yearly_events.1262.b: "Vamos trocar mais do que palavras..."
 tgp_japan_yearly_events.1262.b.flavor: "À noite, nossas vozes ecoarão incontáveis versos."
 tgp_japan_yearly_events.1262.c: "Ou será [Select_CString( local_poet.IsFemale, 'uma assassina', 'um assassino' )]?!"
 MONONOAWARE_GLOSS: "Uma disposição em que se entra ao compor poesia no Japão Heian. Envolve uma sensibilidade emocional intensa, porém contida, com foco na beleza efêmera e um reconhecimento saudoso da tirania do tempo."
 RENGA_GLOSS: "A poesia encadeada japonesa é uma forma em que vários poetas contribuem com estrofes alternadas."
 tgp_japan_yearly_events.1263.t: "$tgp_japan_yearly_events.1225.t$: [SCOPE.Custom('ArtifactFlowerSpeciesPlural')] e sua efemeridade"
 tgp_japan_yearly_events.1263.desc: "¡La verdad del mundo se revela a través de la naturaleza! Mientras doy un breve paseo por [rural_beauty_location.Custom('GetTerrainType')] de aspecto suntuoso cerca de [inspired_poet.GetCurrentLocation.GetBaronyNameExplicitly], me atrapa un chaparrón repentino.\n\nAl buscar refugio, doy con un[rural_beauty.Custom('ES_XA')] [rural_beauty.GetWomanMan] que danza sobre un lecho de [SCOPE.Custom('ArtifactFlowerSpeciesPlural')].\n\nLa lluvia cae como sus pies, destrozando los delicados pétalos. Esta belleza fugaz se ve realzada por la aparente destrucción descuidada. Al notar mi silueta empapada en la lluvia, [rural_beauty.GetSheHe] me hace una señal para que me acerque, alzando la barbilla."
 tgp_japan_yearly_events.1263.a: "Vamos celebrar nossas vidas fugazes..."
 tgp_japan_yearly_events.1263.a.flavor: "Tanto faz a chuva, você se espoja entre [SCOPE.Custom('ArtifactFlowerSpeciesPlural')]. Com certeza, essa lembrança fortalecerá sua poesia!"
 tgp_japan_yearly_events.1263.b: "Preciso conservar até o último exemplar de [SCOPE.Custom('ArtifactFlowerSpecies')]!"
 tgp_japan_yearly_events.1263.b.flavor: "Uma pequena rebelião contra a tirania do tempo."
 tgp_japan_yearly_events.1263.c: "Os pétalas esmagadas poderiam ter outra utilidade?"
 tgp_japan_yearly_events.1263.c.poisonous: "#EMP Regalos de [rural_beauty.GetFaith.DeathDeityName]…#!"
 tgp_japan_yearly_events.1263.c.medicinal: "#EMP Regalos de [rural_beauty.GetFaith.HealthGodName]…#!"
 tgp_japan_yearly_events.1270.t: "$tgp_japan_yearly_events.1225.t$: mil folhas imortais"
 tgp_japan_yearly_events.1270.desc: "Embora todos nasçamos com sementes de poesia no coração, o meu foi nutrido por um sol amoroso em cuja luz busquei me deleitar e pelas doces águas da morte que nos cerca a todos.\n\nIsso culminou na criação de #EMP $poetic_life_artifact_name$#!, certamente, um pilar da cultura [ROOT.Char.GetTopLiege.GetCulture.GetNameNoTooltip] daqui para frente.\n\nTodos se lembrarão de quando,"
 tgp_japan_yearly_events.1270.desc.love_memory_1: "#EMP [love_memory_1.GetDescription]#!,"
 tgp_japan_yearly_events.1270.desc.love_memory_2: "#EMP [love_memory_2.GetDescription]#!,"
 tgp_japan_yearly_events.1270.desc.love_memory_3: "#EMP [love_memory_3.GetDescription]#!,"
 tgp_japan_yearly_events.1270.desc.death_memory_1: "#EMP [death_memory_1.GetDescription]#!,"
 tgp_japan_yearly_events.1270.desc.death_memory_2: "#EMP [death_memory_2.GetDescription]#!,"
 tgp_japan_yearly_events.1270.desc.death_memory_3: "#EMP [death_memory_3.GetDescription].#!"
 tgp_japan_yearly_events.1270.a: "Meu [ROOT.Char.Custom('GetCourt')] deve se beneficiar da minha sabedoria amorosa!"
 tgp_japan_yearly_events.1270.b: "Ainda que minha carne murche e apodreça, minha virilidade permanecerá eterna."
 poetic_life_artifact_name: "$tgp_japan_yearly_events.1270.t$"
 poetic_life_artifact_description: "Uma obra seminal de poesia que imortaliza a alegria fugaz de quando\n\n"
 poetic_life_artifact_description.love_memory_1: "[newly_created_artifact.GetDesc]$tgp_japan_yearly_events.1270.desc.love_memory_1$"
 poetic_life_artifact_description.love_memory_2: "[newly_created_artifact.GetDesc]$tgp_japan_yearly_events.1270.desc.love_memory_2$"
 poetic_life_artifact_description.love_memory_3: "[newly_created_artifact.GetDesc]$tgp_japan_yearly_events.1270.desc.love_memory_3$"
 poetic_life_artifact_description.death_memory_1: "[newly_created_artifact.GetDesc]$tgp_japan_yearly_events.1270.desc.death_memory_1$"
 poetic_life_artifact_description.death_memory_2: "[newly_created_artifact.GetDesc]$tgp_japan_yearly_events.1270.desc.death_memory_2$"
 poetic_life_artifact_description.death_memory_3: "[newly_created_artifact.GetDesc]$tgp_japan_yearly_events.1270.desc.death_memory_3$"
 poetic_life_artifact_description.end: "[newly_created_artifact.GetDesc]\n\nCriação de [ROOT.Char.GetFirstNameNoTooltip]."
 tgp_japan_yearly_events.1270.a_effect: "[newly_created_artifact.GetName] se transforma em um [court_artifact|lE] e receberá um modificador de [grandeur|lE]"
 tgp_japan_yearly_events.1270.b_effect: "Você recebe o [artifact|lE] [newly_created_artifact.GetName]"
 tgp_japan_yearly_events.1170.t: "Traços cativantes"
 tgp_japan_yearly_events.1170.desc: "Embora eu não fale [foreign_ruler.GetCulture.GetLanguage.GetName], a poesia de [foreign_ruler.GetPrimaryTitle.GetName] é bem conhecida por sua profundidade e nuances.\n\nÉ interessante identificar ideogramas familiares, mas tenho dificuldade em decifrar todas as alusões e sutilezas em jogo."
 tgp_japan_yearly_events.1170.a: "Talvez seja hora de aprender nossa língua irmã."
 tgp_japan_yearly_events.1170.b: "Bah! Diga a [foreign_ruler.GetFirstNameNoTooltip] que os poetas dele são uma droga!"
 tgp_japan_yearly_events.1170.c: "A falta de clareza é bela!"
 tgp_japan_yearly_events.1170.c.flavor: "A distração passageira fortalece sua imaginação"
 BONSAI_GLOSS: "#bold Bonsái#! é a arte de cultivar e moldar árvores pequenas em recipientes. Alguns estudiosos dizem que as árvores refletem seus donos."
 tgp_japan_yearly_events.1180.t: "Dando forma ao crescimento"
 tgp_japan_yearly_events.1180.desc: "Uma nova adição ao meu jardim tem sido o assunto da corte. Embora não dê frutos e seja pequeno demais para oferecer sombra, esta árvore [Glossary( 'bonsái', 'BONSAI_GLOSS' )] revela anos de paciência.\n\nMeu [GetCourtPositionType('court_gardener_court_position').GetName()|l] [gardener.GetFirstName] me vê examinando-o.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], deixar uma árvore à própria sorte é algo rudimentar. Só quando moldada com carinho sua forma e estilo adquirem a capacidade de inspirar. Isso desperta algo em você?".\n\n"
 court_position_from_event: "Por eventos"
 tgp_japan_yearly_events.1180.a: "Sua estabilidade me guiará."
 tgp_japan_yearly_events.1180.b: "A árvore honra a [ROOT.Char.GetFaith.FertilityGodName], cuidem bem dela."
 tgp_japan_yearly_events.1180.c: "Gostaria de assumir a tarefa de moldá-lo."
 tgp_japan_yearly_events.1190.t: "Em apuros com meus deveres"
 tgp_japan_yearly_events.1190.desc_annoyed: "A tagarelice da corte e as queixas dos senhores me irritam, e a última coisa em que penso são as disputas de um cidadão comum."
 tgp_japan_yearly_events.1020.desc_drunk: "Bebo um generoso trago de [ROOT.Char.Custom('RegionalAlcoholicDrink')], mas isso me oferece pouco consolo. Por mais lamentável que seja, cumprir meus deveres embriagado tornou-se minha segunda natureza."
 tgp_japan_yearly_events.1020.desc_dumb: "Mais uma vez, sou incapaz de entender as maquinações diárias da corte. Infelizmente, ninguém poderia me confundir com um[ROOT.Char.Custom('ES_XA')] erudit[ROOT.Char.Custom('ES_OA')] ou sequer um[ROOT.Char.Custom('ES_XA')] burocrata capaz."
 tgp_japan_yearly_events.1190.desc: "\n\nObservo uma pilha de [ROOT.Char.Custom('GetWritingMaterialPlural')], tendo esquecido por que eram importantes. Releê-las não traz nenhuma clareza, mas as exigências do Estado me obrigam a tomar decisões, por mais mal informadas que sejam."
 tgp_japan_yearly_events.1190.a: "Tenho de lidar com esta calamidade!"
 tgp_japan_yearly_events.1190.b: "Meu conselho decidirá em meu lugar."
 tgp_japan_yearly_events.1190.c: "Mais vale uma má decisão do que nenhuma…"
 tgp_japan_yearly_events.1190.c_tt: "Um [county|lE] aleatório do seu reino perderá um pouco de [control|lE]"
 tgp_japan_yearly_events.1220.t: "Um milagre com hábito"
 tgp_japan_yearly_events.1220.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', miracle_recipient)] [miracle_recipient.GetName] me traz notícias [Select_CString( monk.IsFemale, 'de la monja', 'del monje' )] itinerante, [monk.GetName], que realizou um milagre.\n\n"
 tgp_japan_yearly_events.1220.desc_health: ""Minha doença já não me atormenta, [miracle_recipient.Custom2('RelationToMeShort', ROOT.Char)]! Na verdade, o poder de suas preces me tornou mais forte do que antes da minha doença"."
 tgp_japan_yearly_events.1220.desc_wealth: "Ofereci [Select_CString(monk.IsFemale, 'à freira', 'ao monge' )] uma bolsa de ouro e, meses depois, me entregou uma com dez vezes o valor da minha, retribuindo o favor!"
 tgp_japan_yearly_events.1220.desc_knowledge: ""Alguns me consideravam insuls[miracle_recipient.Custom('ES_OA')] antes de conhecer [Select_CString(monk.IsFemale, 'esta monja', 'este monge' )]. Mas, depois de receber seus ensinamentos, minha mente transborda de conhecimento e acuidade mental!""
 tgp_japan_yearly_events.1220.a: "Incrível! Preciso ir atrás dess[Select_CString(monk.IsFemale, 'a monja', 'e monge' )]."
 tgp_japan_yearly_events.1220.b: "Há uma explicação lógica… em algum lugar."
 tgp_japan_yearly_events.1220.c: "Devo aprender seus métodos…"
 tgp_japan_yearly_events.1220.tt: "[Select_CString(monk.IsFemale, 'A monja', 'O monge' )] realiza um milagre em você"
 tgp_japan_yearly_events.1220.c.tt: "Você estuda o milagre"
 tgp_japan_yearly_events.1220.tt_win: "Você aprende os métodos [Select_CString(monk.IsFemale, 'da monja', 'do monge' )]"
 tgp_japan_yearly_events.1220.tt_lose: "Os métodos do monge se te escapam"
 tgp_japan_yearly_events.1220.tt_wealth: "Você faz seus próprios investimentos no templo; parece que eles pagam dividendos confiáveis."
 tgp_japan_yearly_events.1230.t: "Assombrado por negligência"
 tgp_japan_yearly_events.1230.desc: "Meu [cursed_artifact.GetName] já não é [cursed_artifact.GetSlotType|l] como antes. Com [cursed_artifact.Custom('GetArtifactDecayDesc')] e [cursed_artifact.GetAge] anos de idade, o artefato já está precisando de reparos.\n\nAs lendas falam de objetos que possuem memórias e emoções como nós, e, se forem negligenciados, podem acabar possuídos por um [Glossary( 'yōkai', 'YOKAI_GLOSS' )]…"
 tgp_japan_yearly_events.1230.a: "Conserte-o antes que ganhe vida!"
 tgp_japan_yearly_events.1230.b: "Não serei assombrado por um objeto…"
 tgp_japan_yearly_events.1230.c: "Esperemos que nada aconteça…"
 tgp_japan_yearly_events.1230.c_cynical: "Bem, eu não acredito em histórias assim."
 artifact_decay_scratched: "sua superfície arranhada e perfurada"
 artifact_decay_dull: "um fio que vai ficando sem corte"
 artifact_decay_torn: "seus fechos e tecidos rasgados"
 artifact_decay_cracked: "sua superfície cheia de rachaduras"
 artifact_decay_fracture: "sua superfície repleta de fissuras"
 artifact_decay_worn: "o quão desgastado ele ficou"
 tgp_japan_yearly_events.1240.t: "Perdidos nas linhas" # in the sauce
 tgp_japan_yearly_events.1240.desc: "[Select_CString(traveler.IsFemale, 'Uma poetisa', 'Um poeta' )] da nação [traveler.GetCulture.GetName], [traveler.GetName], que percorre minhas terras se aproxima de mim com um texto em [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip].\n\n"[ROOT.Char.GetTitleAsNameNoTooltip], ouvi falar da rica tradição poética de vosso povo, mas não consigo decifrar os escritos do vosso povo".\n\n[traveler.GetFirstNameNoTooltip] começa a ler o pergaminho com um forte sotaque e o problema se torna evidente. Ele lê da esquerda para a direita, enquanto a escrita tradicional do [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip] é vertical.\n\nOs cortesãos observam e riem baixinho, enquanto [traveler.GetSheHe] continua com sua torrente de palavras."
 tgp_japan_yearly_events.1240.a: "Buscai-lhe um tutor, por favor!"
 tgp_japan_yearly_events.1240.b: "Ha! Como isso foi engraçado."
 tgp_japan_yearly_events.1240.c: "Vamos ver se consigo explicar isso na sua língua…"
 artifact_fertility_gain_2_modifier: "Fertilidade"
 artifact_powerful_vassal_opinion_5_modifier: "$artifact_powerful_vassal_opinion_1_modifier$"
 artifact_monthly_prestige_add_3_modifier: "$artifact_monthly_prestige_add_1_modifier$"
 artifact_kakejiku_scroll_name: "Pergaminho kakejiku"
 KAKEJIKU_GLOSS: "Um #bold pergamino kakejiku#! (ou #bold kakemono#!) é um pergaminho que exibe caligrafia ou pinturas, geralmente contando uma história."
 artifact_kakejiku_scroll_desc: "Um [Glossary( 'pergamino kakejiku', 'KAKEJIKU_GLOSS' )] que narra a história de"
 artifact_kakejiku_scroll_crane_desc: "$artifact_kakejiku_scroll_desc$ uma garça solitária cuidando de uma árvore.\n\n#weak Las plumas de la grulla se agitan en el viento, observando el árbol joven. Las grullas solo tienen una pareja de por vida, pero a este árbol le lleva siglos crecer…#!"
 artifact_kakejiku_scroll_friends_desc: "$artifact_kakejiku_scroll_desc$ duas pessoas unidas pelo destino, que crescem através das dificuldades e cultivam uma amizade profunda.\n\n#weak Dos figuras se encuentran bajo un cielo estrellado, su vínculo marcado por un puente celestial…#!"
 artifact_kakejiku_scroll_sword_desc: "$artifact_kakejiku_scroll_desc$ uma espada encantada, que só pode ser empunhada pelos guerreiros mais honrados.\n\n#weak Un cerezo florece cerca de un estanque en calma, y bajo él, una espada desenvainada…#!"
 tgp_japan_yearly_events.1250.t: "Uma história para a posteridade"
 tgp_japan_yearly_events.1250.desc: "[scroll_gifter.GetName] dá um passo à frente, carregando um longo objeto enrolado. "[scroll_gifter.Custom2('RelationToMeShort', ROOT.Char)|U], tenho um presente para a vossa união", diz [scroll_gifter.GetNameNoTooltip] e apresenta um pergaminho. "Um [Glossary( 'kakejiku', 'KAKEJIKU_GLOSS' )], com prosa do mais fino poeta. Que possais lembrar seu significado quando os tempos ficarem difíceis"."
 tgp_japan_yearly_events.1250.a: "Pendure-o acima da cama conjugal."
 tgp_japan_yearly_events.1250.b: "Exiba-o na corte, onde todos possam vê-lo."
 tgp_japan_yearly_events.1250.c: "Que seja guardado em segurança, para que nossos descendentes possam lê-lo."
