l_spanish:
 tgp_forced_labor_modifier: "Trabalho forçado"
 tgp_forced_labor_modifier_desc: "Os súditos deste condado são forçados a trabalhar sob ameaça de violência, e seu ressentimento contra a autoridade cresce."
 tgp_recruited_charlatan_modifier: "Charlatão recrutado"
 tgp_recruited_charlatan_modifier_desc: "Este personagem ganhou experiência em intrigas por interagir com um poeta de quinta."
 tgp_unpressed_taxes_modifier: "Impostos não reclamados"
 tgp_unpressed_taxes_modifier_desc: "Este condado prospera sob o governo de um magistrado indulgente."
 tgp_lowborn_chastiser_modifier: "Repressor de plebeus"
 tgp_lowborn_chastiser_modifier_desc: "Este personagem ajudou seus súditos a se livrarem da vergonha de serem pobres, por meio do uso de ameaças e ordens de violência física."
 tgp_lowborn_tenderizer_modifier: "Abrandador de plebeus"
 tgp_lowborn_tenderizer_modifier_desc: "Este personagem ajudou seus súditos a se livrarem da vergonha de serem pobres, e as medidas disciplinares deixaram pouco mais."
 tgp_aided_farmers_modifier: "Auxílio aos agricultores"
 tgp_aided_farmers_modifier_desc: "Este condado pôde recuperar seus jovens dos esforços de guerra de seu suserano."
 tgp_disciplined_farmers_modifier: "Agricultores disciplinados"
 tgp_disciplined_farmers_modifier_desc: "Os camponeses deste condado têm trabalhado vigorosamente depois de testemunhar um enforcamento público."
 tgp_sworn_service_modifier: "Jurado ao serviço"
 tgp_sworn_service_modifier_desc: "Este personagem está pagando a dívida de seu progenitor servindo na corte. Ele não pode partir até que a dívida seja paga."
 tgp_courtly_influence_modifier: "Influência cortesã"
 tgp_courtly_influence_modifier_desc: "Os camponeses deste condado estão se beneficiando dos conhecimentos que um deles adquiriu durante sua permanência na corte."
 tgp_sanctioned_deity_modifier: "Divindade aprovada"
 tgp_sanctioned_deity_modifier_desc: "Este condado adora uma deidade recém-aprovada, e a chegada constante de visitantes ao seu santuário faz bem às pessoas que vivem ali."
 tgp_debunked_deity_modifier: "Divindade desmascarada"
 tgp_debunked_deity_modifier_desc: "Este personagem conseguiu destruir uma divindade em seu início, matando-a por meio de uma retórica habilidosa."
 tgp_resisted_alcohol_modifier: "Resistência ao álcool"
 tgp_resisted_alcohol_modifier_desc: "Este personagem se absteve de participar de uma festa de bebedeira de baijiu."
 tgp_stationed_troops_modifier: "Região fortificada"
 tgp_trained_monks_modifier: "Monges bem treinados"
 tgp_trained_monks_modifier_desc: "O treinamento em artes marciais dos monges desta região foi supervisionado por seu senhor, e eles estão preparados para defender sua posição contra qualquer atacante."
 tgp_adequately_trained_monks_modifier: "Monges adequadamente treinados"
 tgp_adequately_trained_monks_modifier_desc: "O treinamento de artes marciais dos monges desta região foi supervisionado pelo marechal de seu senhor, e eles estão ao menos um pouco preparados para defender sua posição contra qualquer atacante."
 tgp_fattened_vanguard_modifier: "Vanguarda engordada"
 tgp_fattened_vanguard_modifier_desc: "Este condado fornece todo corpo apto disponível para o exército de seu suserano."
 tgp_diligent_workers_modifier: "Trabalhadores diligentes"
 tgp_diligent_workers_modifier_desc: "Os camponeses desta região se desdobram para apaziguar seu suserano e evitar que seus jovens sejam recrutados."
 tgp_well_equipped_soldiers_modifier: "Soldados bem equipados"
 tgp_well_equipped_soldiers_modifier_desc: "Os soldados estacionados nesta propriedade estão melhor equipados do que a maioria."
 tgp_greatly_equipped_soldiers_modifier: "Soldados impressionantemente equipados"
 tgp_greatly_equipped_soldiers_modifier_desc: "Equipados com o melhor equipamento disponível, os soldados estacionados aqui certamente terão um bom desempenho na batalha."
 tgp_outmatched_local_warriors_modifier: "Instintos de batalha lapidados"
 tgp_outmatched_local_warriors_modifier_desc: "Este personagem buscou novos desafios em novos lugares, apenas para descobrir que é superior a todos."
 tgp_strengthen_capital_character_modifier: "Construtor da capital"
 tgp_strengthen_capital_character_modifier_desc: "A capital do Filho do Céu passou recentemente por uma renovação, o que melhorou enormemente a majestade do local. Agora, é indiscutível que a região é o centro do reino."
 tgp_strengthen_capital_modifier: "Capital celestial"
 tgp_strengthen_capital_modifier_desc: "$tgp_strengthen_capital_character_modifier_desc$\n\n[dynastic_cycle|E]: #EMP no#! haverá deriva anual do [favored_movement|El] em nenhuma [dynastic_cycle_era_type_stable|El] enquanto esta for a [realm_capital|El][AddLocalizationIf( HasDlcFeature( 'wards_and_wardens' ), 'tgp_strengthen_capital_modifier_education_bonus')]"
 tgp_strengthen_capital_architects_modifier: "Arquitetura impecável"
 tgp_strengthen_capital_architects_modifier_desc: "A capital do Filho do Céu foi renovada sob a supervisão de arquitetos habilidosos, melhorando enormemente sua capacidade de crescimento populacional e comércio."
 tgp_strengthen_capital_engineers_modifier: "Engenharia engenhosa"
 tgp_strengthen_capital_engineers_modifier_desc: "A capital do Filho do Céu foi renovada sob a supervisão de engenheiros talentosos, melhorando enormemente a infraestrutura da capital e suas conexões com assentamentos próximos."
 tgp_strengthen_capital_sculptors_modifier: "Esculturas gloriosas"
 tgp_strengthen_capital_sculptors_modifier_desc: "Durante a renovação da capital do Filho do Céu, foram contratados os melhores escultores que o domínio podia oferecer para embelezar cuidadosamente todos os aspectos da nova arquitetura."
 tgp_strengthen_capital_modifier_education_bonus: "\nAumenta o sucesso da [activity|lE] [GetActivityType('activity_adult_education').GetName] [GetActivityType('activity_adult_education').GetTextIcon] nesta [location|lE]"
 tgp_minister_project_development_modifier: "Comunidades desenvolvidas"
 tgp_minister_project_development_modifier_desc: "Recentemente, um [great_project|El] fez esforços consideráveis para desenvolver esta área, melhorando cidades, vilas locais e as estradas que as conectam."
 tgp_grand_canal_modifier: "Grande Canal"
 tgp_grand_canal_modifier_desc: "Esta região se beneficia de um canal, uma série de cursos d’água e aquedutos que facilitam o transporte de mercadorias e o movimento dos comerciantes."
 tgp_minister_project_establish_control_modifier: "Burocracia integrada"
 tgp_minister_project_establish_control_modifier_desc: "Recentemente, este condado viu melhorias em sua administração, aumentando consideravelmente o controle do governo sobre a área."
 tgp_minister_project_train_troops_modifier: "$great_project_type_minister_project_train_troops_contribution_train_troops$"
 tgp_minister_project_train_troops_modifier_desc: "Os homens de armas deste condado concluíram um treinamento rigoroso sancionado pelo Ministério da Guerra."
 tgp_minister_project_train_troops_levy_bootcamp_modifier: "$great_project_type_minister_project_train_troops_contribution_levy_bootcamp$"
 tgp_minister_project_train_troops_levy_bootcamp_modifier_desc: "As tropas deste condado recebem instrução dos generais da repartição central do Ministério da Guerra."
 tgp_minister_project_train_troops_siege_exercise_modifier: "$great_project_type_minister_project_train_troops_contribution_siege_exercise$"
 tgp_minister_project_train_troops_siege_exercise_modifier_desc: "Este condado ? treinado pelo Minist?rio da Guerra para lan?ar cercos devastadores e resistir a cercos duas vezes mais fortes."
 tgp_minister_project_train_troops_natural_disaster_test_modifier: "$great_project_type_minister_project_train_troops_contribution_natural_disaster_test$"
 tgp_minister_project_train_troops_natural_disaster_test_modifier_desc: "Este condado está preparado para uma evacuação organizada, redução de danos e reconstrução rápida em caso de qualquer desastre natural graças aos exercícios obrigatórios do Ministério da Guerra."
 tgp_minister_project_conduct_census_modifier: "Conforme ao censo"
 tgp_minister_project_conduct_census_modifier_desc: "Este [minister_of_revenue|El] realizou um censo neste condado"
 tgp_minister_project_conduct_census_purge_treasury_debt_modifier: "Medidas antidesgaste"
 tgp_minister_project_conduct_census_purge_treasury_debt_modifier_desc: "Este personagem se beneficia do programa do Ministério da Receita para a prevenção de [treasury_debt|El] instituído durante a [GetGreatProjectType('minister_project_conduct_census').GetName|l]."
 tgp_minister_project_conduct_census_fertility_effort_modifier: "$great_project_type_minister_project_conduct_census_contribution_fertility_effort$"
 tgp_minister_project_conduct_census_fertility_effort_modifier_desc: "O [holder|El] deste condado se beneficiará do programa do Ministério da Receita para incentivar a fertilidade instituído durante a [GetGreatProjectType('minister_project_conduct_census').GetName|l]. O Ministério da Receita pagará [treasury|El] pelo próximo recém-nascido."
 tgp_minister_project_conduct_census_natural_disaster_insurance_modifier: "$great_project_type_minister_project_conduct_census_contribution_natural_disaster_insurance$"
 tgp_minister_project_conduct_census_natural_disaster_insurance_modifier_desc: "Este [holder|El] deste condado se beneficiará do seguro do Ministério da Receita contra [natural_disasters|El] instituído durante a [GetGreatProjectType('minister_project_conduct_census').GetName|l]. O Ministério da Receita pagará [treasury|El] quando ocorrer uma catástrofe."
 tgp_child_exam_cooldown_modifier: "Exame infantil reprovado"
 tgp_child_exam_cooldown_modifier_desc: "Assistir aos Exames Imperiais é um evento formativo para todos os que contemplam os céus, mas esta personagem tem sofrido sob a pressão."
 tgp_local_exam_initial_success: "Começo forte no exame"
 tgp_local_exam_initial_success_desc: "O sucesso inicial deixa uma impressão duradoura."
 tgp_local_exam_impressed_examiner: "Examinador impressionado"
 tgp_local_exam_strong_finish: "Final forte na avaliação"
 tgp_local_exam_strong_finish_desc: "Ao final de uma tarde de provas longas e desafiadoras, os alunos mais brilhantes se destacam da multidão."
 tgp_child_focused_studies_modifier: "Estudos focados"
 tgp_forced_to_retake_exam_modifier: "À espera do exame palaciano"
 tgp_forced_to_retake_exam_modifier_desc: "Este personagem aguarda nervosamente o próximo [GetActivityType('activity_imperial_examination').GetName|l] sob pressão de sua família para competir no mais alto nível."
 tgp_joined_grand_campaign_modifier: "Juntado à Grande Campanha"
 tgp_joined_grand_campaign_modifier_desc: "Este personagem contribuiu para a guerra ordenada pelo Estado. Com o apoio do governo, vêm grandes expectativas."
 tgp_wiles_is_the_way_modifier: "O melhor caminho é um atalho"
 tgp_wiles_is_the_way_modifier_desc: "Por que seguir o caminho quando voc? pode pegar um atalho?"
 tgp_honor_is_the_way_modifier: "A honra é o caminho"
 tgp_honor_is_the_way_modifier_desc: "Este personagem se inspira na influência orientadora de seus professores e família."
 tgp_passed_provincial_exam_modifier: "Exame provincial aprovado"
 tgp_bypassed_provincial_exam_modifier: "Exame ignorado"
 tgp_bypassed_provincial_exam_modifier_desc: "Este personagem concluiu com sucesso os exames de nível mais alto sem antes passar no exame local."
 tgp_passed_metropolitan_exam_modifier: "Exame metropolitano aprovado"
 tgp_passed_palace_exam_modifier: "Exame palaciano aprovado"
 tea_ceremony_health_benefit: "Uma xícara de chá saudável"
 tea_ceremony_health_benefit_desc: "Este personagem bebeu uma xícara de chá e se sente muito melhor por isso."
 tea_ceremony_perfect_tea: "Um serviço de chá perfeito"
 tea_ceremony_perfect_tea_desc: "Este personagem serviu uma chaleira de chá perfeita — pelo menos segundo os presentes"
 tea_ceremony_peace_of_mind: "Chá para a mente"
 tea_ceremony_peace_of_mind_desc: "Este personagem tomou uma xícara de chá benéfica para a mente"
 tea_ceremony_spirit: "Chá para o espírito"
 tea_ceremony_spirit_desc: "Este personagem tomou uma xícara de chá enquanto refletia sobre o mundo espiritual"
 tea_ceremony_family: "Chá em família"
 tea_ceremony_family_desc: "Este personagem reuniu sua família em torno de uma chaleira de chá"
 tgp_aspiration_great_salary_modifier: "Salário enormemente melhorado"
 tgp_aspiration_great_salary_modifier_desc: "Este personagem teve um desempenho excepcional em suas funções e conquistou um bônus salarial significativo."
 tgp_aspiration_modest_salary_modifier: "Salário melhorado"
 tgp_aspiration_modest_salary_modifier_desc: "Este personagem desempenhou bem suas funções e conquistou um bônus salarial."
 claim_mandate_decision_modifier: "$game_concept_son_of_heaven$"
 minister_scheme_slots_modifier: "Chefe do Ministério"
 minister_scheme_slots_modifier_desc: "Este personagem está a cargo de um dos principais departamentos do governo celestial. Ter toda a máquina à sua disposição aumenta enormemente o alcance de qualquer possível conjuração."
 hegemony_of_china_desc: "[GetTitleByKey('h_china').GetName] $game_concept_de_jure$: $VALUE|+0=$"
 is_already_administrative: "Já é $game_concept_administrative_government$; $VALUE|+0=$"
 impugned_my_sovereignty: "Questionou minha soberania" # Opinion Modifier
 tgp_known_exam_cheater_modifier: "Trapaceiro em exames"
 tgp_known_exam_cheater_modifier_desc: "Foi revelado que este personagem trapaceou em exames."
