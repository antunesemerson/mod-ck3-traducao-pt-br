 # Modifiers
 tgp_natural_disaster_earthquake_1_county_modifier: "Terremoto"
 tgp_natural_disaster_earthquake_1_county_modifier_desc: "Este condado está passando por um terremoto leve.\n$tgp_natural_disaster_cleanup_tt$"
 tgp_natural_disaster_earthquake_2_county_modifier: "Terremoto grave"
 tgp_natural_disaster_earthquake_2_county_modifier_desc: "Este condado é afetado por uma atividade sísmica severa, com um terremoto poderoso causando destruição generalizada.\n$tgp_natural_disaster_cleanup_tt$"
 tgp_natural_disaster_earthquake_3_county_modifier: "Terremoto terrível"
 tgp_natural_disaster_earthquake_3_county_modifier_desc: "Este condado está à beira da devastação devido a uma agitação sísmica extrema.\n$tgp_natural_disaster_cleanup_tt$"
 tgp_natural_disaster_flood_1_county_modifier: "Inundação"
 tgp_natural_disaster_flood_1_county_modifier_desc: "Este condado está sofrendo uma enchente leve.$tgp_natural_disaster_cleanup_tt$"
 tgp_natural_disaster_flood_2_county_modifier: "Inundação grave"
 tgp_natural_disaster_flood_2_county_modifier_desc: "Este condado é afetado por uma inundação terrível, deixando danos em seu rastro.\n$tgp_natural_disaster_cleanup_tt$"
 tgp_natural_disaster_flood_3_county_modifier: "Inundação tremenda"
 tgp_natural_disaster_flood_3_county_modifier_desc: "Uma inundação coloca em perigo a própria sobrevivência deste condado, com o potencial de deixá-lo desolado e despojado de todo valor.\n$tgp_natural_disaster_cleanup_tt$"
