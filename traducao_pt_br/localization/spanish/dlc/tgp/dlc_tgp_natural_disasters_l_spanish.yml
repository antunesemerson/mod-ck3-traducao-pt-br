 ### FLOODS
 situation_type_natural_disaster_flood: "$natural_disaster_flood_situation$"
 situation_natural_disaster_flood: "$natural_disaster_flood_situation$"
 situation_type_natural_disaster_flood_desc: "$situation_natural_disaster_flood_desc$"
 situation_natural_disaster_flood_desc: "Uma [flood|lE] é um [natural_disaster|lE] que causa danos crescentes em uma grande quantidade de [counties|lE].\n\nAs $game_concept_floods$ só podem ocorrer nas margens dos grandes rios."
 natural_disaster_flood_situation: "Inundação em [Situation.MakeScope.Var('river_region').GeographicalRegion.GetNameNoTooltip]"
 natural_disaster_flood_situation_desc: "$situation_natural_disaster_flood_desc$"
 natural_disaster_flood_warning_situation_phase: "Advertência"
 natural_disaster_flood_warning_situation_phase_desc: "Poças de água e solo úmido começam a aparecer pela região. A chuva pode aumentar significativamente, causando o transbordamento das margens dos rios. Embora ainda não esteja em força total, é claro que a água logo poderá infiltrar-se nos edifícios e saturar o solo abaixo."
 natural_disaster_flood_impact_situation_phase: "Impacto"
 natural_disaster_flood_impact_situation_phase_desc: "As águas da enchente entram nas casas, cobrem as estradas e afogam aqueles que não conseguem resistir à corrente. Os campos, antes maduros e cheios de promessa, agora estão encharcados e estéreis, pressagiando maus augúrios para a próxima colheita."
 flood_aftermath: "$natural_disaster_flood_impact_situation_phase$"
 situation_natural_disaster_phase_flood_aftermath_effects: "$situation_natural_disaster_flood_phase_impact$"
 flood_aftermath_effects: "Consequências da inundação"
