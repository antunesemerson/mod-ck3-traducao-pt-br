 ### EARTHQUAKES
 situation_type_natural_disaster_earthquake: "$natural_disaster_earthquake_situation$"
 situation_natural_disaster_earthquake: "$natural_disaster_earthquake_situation$"
 situation_type_natural_disaster_earthquake_desc: "Um [earthquake|lE] é um tipo de [natural_disaster|lE] que causa uma destruição grave e súbita em uma pequena quantidade de [counties|lE].\n\nOs $game_concept_earthquakes$ só podem ocorrer em regiões mais propensas à atividade sísmica."
 situation_natural_disaster_earthquake_desc: "$situation_type_natural_disaster_earthquake_desc$"
 natural_disaster_earthquake_situation: "Terremoto em [Situation.MakeScope.Var('epicenter_county').Title.GetNameNoTierNoTooltip]"
 natural_disaster_earthquake_situation_desc: "$situation_type_natural_disaster_earthquake_desc$"
 natural_disaster_earthquake_warning_situation_phase: "Tremores preliminares"
 natural_disaster_earthquake_warning_situation_phase_desc: "Na [situation_phase|lE] de tremores preliminares, pequenos tremores são sentidos por toda a terra. Embora tenham apenas a intensidade de uma manada a galope, esse tremor pode ser o prenúncio de uma força muito maior e devastadora que se move sob a terra."
 earthquake_warning: "$natural_disaster_earthquake_warning_situation_phase$"
 situation_natural_disaster_phase_earthquake_warning_effects: "$situation_natural_disaster_earthquake_phase_warning$"
 natural_disaster_earthquake_impact_situation_phase: "Impacto"
 natural_disaster_earthquake_impact_situation_phase_desc: "Após os tremores sutis, o solo treme violentamente. Edifícios podem desabar, e pessoas podem ser feridas ou mortas por escombros que caem. Pode se formar uma ruptura no epicentro do terremoto, dividindo a paisagem em dois. O movimento repentino pode lançar poeira e destroços no ar, aumentando a letalidade para qualquer um que esteja por perto."
 situation_natural_disaster_phase_earthquake_impact_effects: "$situation_natural_disaster_earthquake_phase_impact$"
 natural_disaster_earthquake_recovery_situation_phase: "Recuperação"
 natural_disaster_earthquake_recovery_situation_phase_desc: "Após o impacto principal, os efeitos totais do desastre se tornam evidentes. Os súditos podem ficar contrariados ao ver suas propriedades e meios de subsistência danificados ou destruídos. Os escombros dificultam os esforços de reconstrução e, com vidas perdidas, a recuperação é desacelerada por uma população e força de trabalho reduzidas."
 earthquake_recovery: "$natural_disaster_earthquake_recovery_situation_phase$"
 earthquake_recovery_effects: "Recuperação de terremoto"
 earthquake_recovery_effects_concept: "[natural_disaster|E]"
 natural_disaster_earthquake_affected_ruler: "Catástrofe: #weak terremoto#!"
 natural_disaster_earthquake_affected_vassal: "$natural_disaster_earthquake_affected_ruler$"
 natural_disaster_flood_affected_ruler: "Catástrofe: #weak inundación#!"
 natural_disaster_flood_affected_vassal: "$natural_disaster_flood_affected_ruler$"
 natural_disaster_earthquake_spawn_tooltip: "Ocorreu um [earthquake|lE] em [situation.MakeScope.Var('epicenter_county').Title.GetNameNoTier]"
