 warning: "Advertência"
 warning_desc: "Antes de muitos [natural_disasters|lE], costumam aparecer sinais que precedem o acontecimento. Óbvias ou sutis, essas mudanças no ambiente podem servir de alerta. Um governante vigilante que preste atenção pode ser capaz de agir a tempo para minimizar as perdas."
 impact: "Impacto"
 impact_desc: "Quando a catástrofe atinge, os preparativos do governante serão postos à prova. Apesar dos esforços, é provável que haja mortes e que o progresso na região seja interrompido. A região entrará em um período de instabilidade devido à perda de [development|lE] e aos danos à infraestrutura existente."
 recovery: "Recuperação"
 recovery_desc: "Após o impacto, reconstruir a região, às vezes por meio de um [great_project|lE]. Um suserano perspicaz também tomará medidas para ajudar na prevenção, para que outro [natural_disaster|lE] volte a atingir."
