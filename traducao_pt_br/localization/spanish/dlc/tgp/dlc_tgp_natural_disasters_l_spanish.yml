 tgp_natural_disaster_fortification_county_modifier_desc: "As muralhas deste condado começaram a desmoronar e enfraquecer por causa de um [natural_disaster|lE] recente.\n $tgp_natural_disaster_cleanup_tt$"
 tgp_natural_disaster_exodus_1_county_modifier: "Êxodo Limitado"
 tgp_natural_disaster_exodus_1_county_modifier_desc: "Muitos residentes deste condado fugiram por causa de um(a) [natural_disaster|lE] recente.\n $tgp_natural_disaster_cleanup_tt$"
 tgp_natural_disaster_exodus_2_county_modifier: "Êxodo"
 tgp_natural_disaster_exodus_2_county_modifier_desc: "Devido a uma [natural_disaster|lE], a maior parte da população deste condado fugiu em busca de segurança.\n $tgp_natural_disaster_cleanup_tt$"
 tgp_natural_disaster_exodus_3_county_modifier: "Êxodo extenso"
 tgp_natural_disaster_exodus_3_county_modifier_desc: "Uma [natural_disaster|lE] devastadora deixou este condado quase desabitado.\n$tgp_natural_disaster_cleanup_tt$"
 tgp_natural_disaster_fertility_1_county_modifier: "Pastagens encharcadas"
 tgp_natural_disaster_fertility_1_county_modifier_desc: "Uma enchente recente deixou parte do solo deste condado incapaz de dar frutos.\n $tgp_natural_disaster_cleanup_tt$"
 tgp_natural_disaster_fertility_2_county_modifier: "Pastagens encharcadas"
 tgp_natural_disaster_fertility_2_county_modifier_desc: "Uma enchente desastrosa devastou os campos deste condado, deixando-os impróprios para o cultivo.\n $tgp_natural_disaster_cleanup_tt$"
 tgp_natural_disaster_fertility_3_county_modifier: "Pastagens enlameadas"
 tgp_natural_disaster_fertility_3_county_modifier_desc: "Uma enchente deixou as pastagens deste condado completamente estéreis e incapazes de sustentar a vida.\n $tgp_natural_disaster_cleanup_tt$"
 tgp_natural_disaster_resettlement_county_modifier: "Reassentamento de refugiados"
 tgp_natural_disaster_resettlement_county_modifier_desc: "Os cidadãos estão retornando a este condado na esperança de restaurá-lo após um [natural_disaster|lE] recente."
 tgp_natural_disaster_aid_county_modifier: "Ajuda distribuída"
 tgp_natural_disaster_aid_county_modifier_desc: "Estão sendo realizadas ações de auxílio aos sobreviventes de um [natural_disaster|lE] para restaurar a estabilidade e a moral."
 tgp_natural_disaster_flood_fertility_county_modifier: "Fertilidade de inundação"
 tgp_natural_disaster_flood_fertility_county_modifier_desc: "As enchentes recentes enriqueceram o solo deste condado e aumentaram sua fertilidade."
