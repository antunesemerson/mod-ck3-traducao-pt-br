l_spanish:
 tgp_go_board: "Tabuleiro de Go da Sorte"
 tgp_go_board_desc: "Vital para una partida rotundamente exitosa contra [bg_loser.Custom('ES_ElLa')] [bg_loser.GetTitledFirstName|l], esta herramienta de ocio trajo su suerte patente [bg_victor.Custom('ES_AlAla')] [bg_victor.GetTitledFirstName|l].\n\nAlgunos podrían decir que, en un juego como el go, la suerte no cuenta mucho; no obstante, este tablero se ha conservado en buen estado desde ese acontecimiento."
 artifact_pedestal_baekje_incense_burner_name: "Queimador de Incenso de Bronze Dourado"
 artifact_pedestal_baekje_incense_burner_description: "Este queimador de incenso exibe imensa habilidade artesanal, apesar de, ao que tudo indica, ser um objeto muito antigo da dinastia Baekje. A tampa é adornada com um botão em forma de fênix, é circundada por 74 montanhas fundidas em camadas e apresenta um rico conjunto de figuras e paisagens."
 artifact_armillary_sphere_china_name: "Esfera Armilar Imperial"
 artifact_armillary_sphere_china_desc: "Este globo celeste foi montado por eruditos e artesãos chineses experientes e é usado para fazer cálculos relacionados a fenômenos astronômicos. Como ferramenta para examinar o calendário celeste, a esfera armilar também é um símbolo do direito divino do Filho do Céu."
 artifact_eight_fold_chest_name: "Baú de oito lados"
 artifact_eight_fold_chest_description: "Se trata de un conjunto de ocho cofres pequeños, donde cada uno contiene el siguiente, con la reliquia de un hueso de un dedo de Buda en el cofre central. La reliquia se había empleado en ceremonias de bienvenida de los sucesivos emperadores Tang hasta que se construyeron estos cofres por orden del emperador Yizong.\n\nCada cofre está tiene una factura intricada en sándalo, plata, oro y jade. El último cofre es una pagoda de cuatro puertas de oro puro que aloja el dedo en sí. La parte superior de la pagoda es una flor de loto que sostiene una perla de oro."
 artifact_military_classics_name: "Princípios Gerais dos Clássicos Militares"
 artifact_military_classics_description: "O "Wujing Zongyao" ou "Princípios gerais dos clássicos da guerra" é uma compilação de conhecimentos militares com ilustrações. Escrito por uma equipe sob a direção de Zeng Gongliang a pedido do imperador Renzong, abrange um amplo conjunto de tecnologia militar e pretende ser um resumo dos clássicos militares para uma disseminação mais ampla.\n\nEntre os temas do livro estão as máquinas de cerco, a guerra naval e fórmulas para fazer explosivos."
