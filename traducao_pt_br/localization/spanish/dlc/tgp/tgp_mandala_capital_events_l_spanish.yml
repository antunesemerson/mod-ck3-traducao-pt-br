 mandala_capital_05_talisman_base: "Uma peça faltante dos relevos adornados com joias do $building_mandala_capital_05$ de [target_talisman.MakeScope.Var('mandala_temple_location').GetProvince.GetName]."
 mandala_capital_05_creation_talisman_desc: "$mandala_capital_05_talisman_base$ As gemas preciosas chamam a atenção e retratam a divindade com flores crescendo espontaneamente aos seus pés enquanto constroem seu reino, assim como seus habitantes, do zero."
 mandala_capital_05_serenity_talisman_desc: "$mandala_capital_05_talisman_base$ As elegantes gemas brilham com um brilho sereno, representando histórias de serenidade, aceitação e paz eterna."
 mandala_capital_05_destruction_talisman_desc: "$mandala_capital_05_talisman_base$ Os reflexos vermelhos das gemas inspiram temor e respeito em quem contempla a divindade da destruição cumprindo suas tarefas temíveis, mas necessárias."
 mandala_capital_05_trickery_talisman_desc: "$mandala_capital_05_talisman_base$ As gemas, enganosamente sutis, contam a história do trapaceiro, envolvido em toda sorte de artimanhas para testar os humanos."
