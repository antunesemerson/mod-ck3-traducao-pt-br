l_spanish:
 tgp_east_asia_mandala_capital_events.1000.t.base: "Capital"
 tgp_east_asia_mandala_capital_events.1000.t: "$tgp_east_asia_mandala_capital_events.1000.t.base$: o $building_mandala_capital_01$"
 tgp_east_asia_mandala_capital_events.1000.t.second: "$tgp_east_asia_mandala_capital_events.1000.t.base$: o $building_mandala_capital_02$"
 tgp_east_asia_mandala_capital_events.1000.t.third: "$tgp_east_asia_mandala_capital_events.1000.t.base$: o $building_mandala_capital_03$"
 tgp_east_asia_mandala_capital_events.1000.t.fourth: "$tgp_east_asia_mandala_capital_events.1000.t.base$: a $building_mandala_capital_04$"
 tgp_east_asia_mandala_capital_events.1000.t.final: "$tgp_east_asia_mandala_capital_events.1000.t.base$: o $building_mandala_capital_05$"
 tgp_east_asia_mandala_capital_events.1000.desc: "Enquanto observo o templo, os trabalhadores, agora livres de suas obrigações, se dispersam. Eles deixaram uma robusta estrutura de pedra que emerge do solo — uma manifestação de seu fervor. \n\nInclino ligeiramente a cabeça para trás para acompanhar com o olhar as torres que se erguem em direção ao céu.\n\nSim, sim, isto servirá. Serei o glorioso devaraja, governando este templo e provando meu valor."
 tgp_east_asia_mandala_capital_events.1000.desc.second: "O templo foi ampliado e agora abrange mais santuários e ornamentos. Tudo foi construído com cuidado, manifestando sua reverência a #EMP mí#!. \n\nMeus servos me rodeiam como sombras enquanto caminho pelo templo, observando cada canto, conhecendo meus fiéis. Sinto meu poder crescer a cada cabeça inclinada e olhar desviado com respeito.\n\nÉ #EMP mi#! momento."
 tgp_east_asia_mandala_capital_events.1000.desc.third: "O templo, ampliado para abrigar um complexo maior, está cheio de agitação. Agora há espaço para abrigar dezenas de viajantes de terras distantes, além do clero local. A adoração diária nunca cessa.\n\nOs viajantes — aqui para me ver. O clero — aqui para me adorar.\n\nA multidão se afasta diligentemente à minha passagem, e eu paro brevemente para tocar algumas cabeças inclinadas ao longo do meu caminho. Meu povo. Meus seguidores. Minha divindade."
 tgp_east_asia_mandala_capital_events.1000.desc.fourth: "Enquanto o sol nasce sobre o complexo de templos, os espelhos d’água se iluminam com divina magnificência.\n\nContemplo a visão do templo, agora completo com amplas instalações aquáticas e um pequeno relicário, reunindo as relíquias mais requintadas.\n\nLentamente, aceno com a cabeça — sim, este é o meu lugar. Isto é o que devo fazer. Meus seguidores precisam de mim; estou aqui para guiar seu caminho, e em troca me construíram este esplêndido templo. Realizaremos grandes feitos #EMP juntos.#!"
 tgp_east_asia_mandala_capital_events.1000.desc.final: "Finalmente, a última pedra foi colocada no meu complexo em [project_location.GetNameNoTooltip].\n\nO palácio do templo nos aguarda. Permito-me um momento de pura alegria e admiração enquanto contemplo as torres, arcos e [Glossary( 'barays', 'BARAY_GLOSS' )] que conferem ao templo um esplendor de outro mundo.\n\nAo meu redor, as pessoas aplaudem e dançam, celebrando uma das minhas maiores conquistas — uma que será lembrada por eras vindouras."
 tgp_east_asia_mandala_capital_events.1000.a: "Uma divindade em formação."
 tgp_east_asia_mandala_capital_events.1000.a.second: "A transcendência me espera!"
 tgp_east_asia_mandala_capital_events.1000.a.third: "Por fim, estamos progredindo…"
 tgp_east_asia_mandala_capital_events.1000.a.fourth: "Este é meu #EMP verdadero#! propósito."
 tgp_east_asia_mandala_capital_events.1000.a.final: "Vamos inspecionar os adereços de um #EMP dios#!."
 tgp_east_asia_mandala_capital_events.1010.t: "Recompensas da capital"
 tgp_east_asia_mandala_capital_events.1010.desc: "[Select_CString(envoy.IsFemale, 'A enviada', 'O enviado' )] de meu [ROOT.Char.Custom2('RelationToMe', overlord_scope)], [overlord_scope.Custom('ES_ElLa')] [overlord_scope.GetTitledFirstName|l], chega até mim logo cedo pela manhã: \"[ROOT.Char.Custom('FormOfAddressForLiege')|U]! A capital do grande templo de [project_location.GetNameNoTooltip] por fim foi concluída!\"\n\n\"Noss[overlord_scope.Custom('ES_OA')] gentil [overlord_scope.GetTitleAsNameNoTooltip|l] me enviou até aqui para mostrar seu agradecimento por vossa generosa contribuição para este fim!\" Seus olhos brilham com fervor quando relata a visão das agulhas, arcos e [Glossary( 'barays', 'BARAY_GLOSS' )] que concedem ao templo uma magnificência de outro mundo.\n\nAssinto, satisfeit[ROOT.Char.Custom('ES_OA')] com minha contribuição para a causa..."
 tgp_east_asia_mandala_capital_events.1010.a: "Mandem lembranças."
