l_spanish:
 natural_disaster_flavor_events.0001.t: "Quando os carniceiros se reúnem"
 natural_disaster_flavor_events.0001.desc: "Entre os destroços, os carniceiros se reúnem para se banquetear com aquelas almas desafortunadas que não deram ouvidos ao aviso das forças da natureza. Fios musculosos se rompem dos cadáveres, expondo sua carne pútrida a quem conseguir suportar olhar.\n\nPoucos aproveitariam a chance de vasculhar estas terras amaldiçoadas, mas onde outros fraquejam, surgem novas oportunidades."
 natural_disaster_flavor_events.0001.a: "Buscar nas ruínas por objetos de valor."
 natural_disaster_flavor_events.0001.a.gold.toast: "Você encontrou ouro"
 natural_disaster_flavor_events.0001.a.provisions.toast: "Você encontra provisões comestíveis"
 natural_disaster_flavor_events.0001.a.artifact.toast: "Você encontrou um artefato"
 random_misc_artifact: "Anel abandonado"
 random_misc_artifact_desc: "Um anel peculiar escavado entre algumas ruínas atingidas pela própria natureza."
 natural_disaster_flavor_events.0001.b: "Vamos procurar por sobreviventes."
 natural_disaster_flavor_events.0001.b.success.toast: "Encontre e resgate um sobrevivente"
 natural_disaster_flavor_events.0001.b.failure.toast: "Sua busca foi em vão"
 natural_disaster_flavor_events.0001.c: "Não há nada para nós aqui."
 natural_disaster_flavor_events.0005.t: "Pesadelo desperto"
 natural_disaster_flavor_events.0005.desc: "Desperto sobressaltado com os gritos de indivíduos correndo pelo acampamento em todas as direções. Em meio à confusão, sonolento, tento me manter firme para descobrir o que está acontecendo, mas tremo até o fundo da alma quando um estrondo desconhecido vai se aproximando à distância.\n\nSeja o que for que esteja para acontecer, devo agir agora antes que seja tarde demais."
 natural_disaster_flavor_events.0005.a: "Salve-se quem puder!"
 natural_disaster_flavor_events.0005.a.success.toast: "Você consegue encontrar um local razoavelmente seguro"
 natural_disaster_flavor_events.0005.a.failure.toast: "Você não encontra um lugar seguro a tempo"
 natural_disaster_flavor_events.0005.b: "Preciso sair daqui, rapidamente."
 natural_disaster_flavor_events.0005.b.success.toast: "Você encontra um abrigo suficientemente bom"
 natural_disaster_flavor_events.0005.b.failure.toast: "Seu conhecimento sobre essas forças é insuficiente"
 tgp_selfish_actions_character_modifier: "Por um triz"
 tgp_selfish_actions_character_modifier_desc: "A resistência deste personagem se mostrou valiosa durante um encontro com a natureza."
 tgp_finding_safe_spot_character_modifier: "Um local seguro"
 tgp_finding_safe_spot_character_modifier_desc: "A percepção dos arredores deste personagem o levou a um lugar seguro."
 natural_disaster_flavor_events.0010.t: "Almas desesperadas"
 natural_disaster_flavor_events.0010.desc: "Uma multidão de desesperados e despossuídos se encontra no limiar da calamidade. As emoções percorrem a turba esfarrapada; o ar é rasgado por soluços, lamentos e gritos.\n\nAo ver meu séquito, avançam aos tropeços, quase como um só, meio mortos, com olhos vazios e mãos estendidas, caindo de joelhos em súplica.\n\nAcham que viemos para ajudá-los, mas quanto posso fazer por tantos?"
 natural_disaster_flavor_events.0010.a: "Assegure-lhes que a ajuda é iminente."
 natural_disaster_flavor_events.0010.a.success.toast: "Tranquilize-os dizendo que a ajuda está a caminho"
 natural_disaster_flavor_events.0010.a.failure.toast: "A multidão já esperou o bastante"
 natural_disaster_flavor_events.0010.b: "Invente uma mentira para aqueles que buscam respostas."
 natural_disaster_flavor_events.0010.b.success.toast: "Você mente para a multidão"
 natural_disaster_flavor_events.0010.b.failure.toast: "O povo não se deixa enganar pelas suas mentiras"
 natural_disaster_flavor_events.0010.c: "Não deixe essas patas imundas me tocarem!"
 natural_disaster_flavor_events.0010.c.tt: "Seu séquito empurra a frágil turba para o lado com facilidade."
 tgp_deceitful_overconfidence_character_modifier: "Falhar aos desventurados"
 tgp_deceitful_overconfidence_character_modifier_desc: "Este personagem escolheu abandonar os poucos que buscaram orientação em tempos difíceis."
 tgp_abandoned_population_modifier: "População abandonada"
 tgp_abandoned_population_modifier_desc: "Esta província tem líderes mentirosos e covardes."
 natural_disaster_flavor_events.0015.t: "Atos altruístas"
 natural_disaster_flavor_events.0015.desc: "Um passeio casual pelo jardim junto a [spouse.GetFirstName], [heir.GetFirstName] e [courtier.GetFirstName] se transforma de repente em um pesadelo.\n\nUm grito agudo ecoa por toda a cidade, causando temor e consternação em todos os que o ouvem. Olho para [spouse.GetFirstNameNoTooltip] em busca de confirmação, mas seu rosto já diz tudo o que preciso saber.\n\nSem pensar duas vezes, sei que precisamos encontrar um lugar mais seguro do que o que estamos agora."
 natural_disaster_flavor_events.0015.a: "Resgate seu cônjuge, [spouse.GetFirstNameNoTooltip]."
 natural_disaster_flavor_events.0015.a.success: "Vocês escapam do desastre ilesos"
 natural_disaster_flavor_events.0015.a.failure: "Ferimentos Sustentados"
 natural_disaster_flavor_events.0015.b: "Ajude seu herdeiro[heir.Custom('ES_OA')], [heir.GetFirstNameNoTooltip]."
 natural_disaster_flavor_events.0015.b.success: "$natural_disaster_flavor_events.0015.a.success$"
 natural_disaster_flavor_events.0015.b.failure: "$natural_disaster_flavor_events.0015.a.failure$"
 natural_disaster_flavor_events.0015.c: "Ajude seu cortesão[courtier.Custom('ES_OA')], [courtier.GetFirstNameNoTooltip]"
 natural_disaster_flavor_events.0015.c.success: "$natural_disaster_flavor_events.0015.a.success$"
 natural_disaster_flavor_events.0015.c.failure: "$natural_disaster_flavor_events.0015.a.failure$"
 natural_disaster_flavor_events.0015.d: "Salve-se #EMP tú.#!"
