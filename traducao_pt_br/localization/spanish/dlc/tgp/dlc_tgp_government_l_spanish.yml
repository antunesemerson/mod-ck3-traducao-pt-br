l_spanish:
 # Meritocratic
 meritocratic_obligations: "Obrigações meritocráticas"
 meritocratic_provinces: "$administrative_themes$"
 meritocratic_vassal: "$meritocratic_government$"
 meritocratic_government: "Meritocrático"
 meritocratic_government_adjective: "$meritocratic_government$"
 meritocratic_government_with_icon: "$meritocratic_government$ @government_type_meritocratic!"
 meritocratic_government_desc: "\n$game_concept_meritocratic_desc$\n\n#F El sistema $meritocratic_government$ hace referencia al gobierno administrativo centralizado de los vecinos de China, inspirado en la burocracia confuciana.#!"
 meritocratic_province_standard: "Administração padrão @meritocratic_standard_administration!"
 meritocratic_province_standard_short: "@meritocratic_standard_administration! Padrão"
 meritocratic_province_standard_text_icon: "@meritocratic_standard_administration!"
 meritocratic_province_standard_benefits: "#emphasis #bold Beneficios de [vassal|lE]:#!#!\nUsa [GetLaw('meritocratic_appointment_succession_law').GetName|l]"
 meritocratic_province_standard_desc: "#low Um tipo civil que atende às necessidades cotidianas do governo e dos habitantes locais#!"
 meritocratic_province_industrial: "Administração industrial @meritocratic_industrial_administration!"
 meritocratic_province_industrial_short: "@meritocratic_industrial_administration! Industrial"
 meritocratic_province_industrial_text_icon: "@meritocratic_industrial_administration!"
 meritocratic_province_industrial_benefits: "#emphasis #bold Beneficios de [vassal|lE]:#!#!\nUsa [GetLaw('meritocratic_appointment_succession_law').GetName|l]\n\n#alert_trial @alert_icon! Limitado a [EmptyScope.ScriptValue('meritocratic_province_industrial_max_value')|V0]#!"
 meritocratic_province_industrial_desc: "#low Uma administração civil voltada para melhorar a produtividade da área e seu desenvolvimento de longo prazo.#!"
 meritocratic_province_industrial_amount_desc: "Limite de $meritocratic_province_industrial_short$ alcançado"
 meritocratic_province_metropolitan: "Administração metropolitana @meritocratic_metropolitan_administration!"
 meritocratic_province_metropolitan_short: "@meritocratic_metropolitan_administration! Metropolitana"
 meritocratic_province_metropolitan_text_icon: "@meritocratic_metropolitan_administration!"
 meritocratic_province_metropolitan_benefits: "#emphasis #bold Beneficios de [vassal|lE]:#!#!\n$EFFECT_LIST_BULLET$ Aumenta a [governor_efficiency|lE] de acordo com a [diplomacy|lE]#indent_newline:4 \n#weak Añade un [EmptyScope.ScriptValue('efficiency_skill_increase_value')|+1%/] extra por cada punto de [skill|lE]#!#!\n$EFFECT_LIST_BULLET$ Usa [GetLaw('meritocratic_appointment_succession_law').GetName|l]\n\n#alert_trial @alert_icon! Se limita a [EmptyScope.ScriptValue('meritocratic_province_metropolitan_max_value')|V0]#!"
 meritocratic_province_metropolitan_desc: "#low Uma administração civil eficiente aplicada a áreas urbanas maiores. Enfatiza fortemente o uso eficiente de impostos e a prosperidade das cidades.#!"
 meritocratic_province_metropolitan_amount_desc: "Limite de $meritocratic_province_metropolitan_short$ alcançado"
 meritocratic_province_military: "Administração militar @meritocratic_military_administration!"
 meritocratic_province_military_short: "@meritocratic_military_administration! Militar"
 meritocratic_province_military_text_icon: "@meritocratic_military_administration!"
 meritocratic_province_military_benefits: "#emphasis #bold Beneficios de [vassal|lE]:#!#!\n $EFFECT_LIST_BULLET$ Usa [GetLaw('celestial_military_appointment_succession_law').GetName|l]\n\n#alert_trial @alert_icon! Se limita a [EmptyScope.ScriptValue('celestial_province_military_max_value')|V0]#!"
 meritocratic_province_military_desc: "#low Uma administração militar que possibilita a mobilização de tropas, dando ao domínio meios de se proteger ou expandir suas fronteiras quando necessário.#!"
 meritocratic_province_military_amount_desc: "Limite de $meritocratic_province_military_short$ alcançado"
 meritocratic_province_protectorate: "Administração do protetorado @meritocratic_protectorate_administration!"
 meritocratic_province_protectorate_short: "@meritocratic_protectorate_administration! Protetorado"
 meritocratic_province_protectorate_text_icon: "@meritocratic_protectorate_administration!"
 meritocratic_province_protectorate_benefits: "#emphasis #bold Beneficios del [liege|lE]:#!#!\n$EFFECT_LIST_BULLET$ Desbloqueia a [interaction|lE] #high $frontier_influence_war_interaction$#! que permite ao senhor pedir ao [vassal|lE] que declare guerra por um [title|lE] estrangeiro de nível [duchy|lE]\n\n#emphasis #bold Beneficios de [vassal|lE]:#!#!\n$EFFECT_LIST_BULLET$ Aumenta a [governor_efficiency|lE] segundo a [Concept('martial', 'marcial' )|E]#indent_newline:4 \n#weak Añade un [EmptyScope.ScriptValue('efficiency_skill_increase_value')|+1%/] extra por cada punto de [skill|lE]#!#!\n$EFFECT_LIST_BULLET$ Usa [GetLaw('meritocratic_military_appointment_succession_law').GetName|l]\n\n#alert_trial @alert_icon! Se limita a [EmptyScope.ScriptValue('meritocratic_province_protectorate_max_value')|V0]#!"
 meritocratic_province_protectorate_amount_desc: "Limite de $meritocratic_province_protectorate_short$ alcançado"
 steppe_admin_government: "Canato meritocrático"
 steppe_admin_government_adjective: "$steppe_admin_government$"
 steppe_admin_government_with_icon: "@government_type_steppe_admin! $steppe_admin_government$"
 steppe_admin_icon_concept: "@government_type_steppe_admin!"
 steppe_admin_government_vassals_label: "As [obligations|El] do tipo $steppe_admin_government$ são baseadas na [GetPlayer.Custom('GetProvinceAdministrationConcept')|l]"
 steppe_admin_government_desc: "\n$game_concept_steppe_admin_desc$\n\n#F El sistema $steppe_admin_government$ hace referencia a una fusión del estilo de vida nómada con la burocracia confuciana del gobierno administrativo chino centralizado.#!"
 steppe_admin_government_house_attribute_flavor_name: "[powerful_family_attribute|E]"
 steppe_admin_government_house_attribute_flavor_name_no_tooltip: "$game_concept_powerful_family_attribute$"
 can_raze_own_holding_meritocratic_khanate_tt: "Para arrasar um [holding|El], um [steppe_admin|El] deve ter uma [castle_holding|El] na capital do [county|El] #weak ([province.GetCountyCapitalProvince.GetBaronyNameExplicitly])#!"
