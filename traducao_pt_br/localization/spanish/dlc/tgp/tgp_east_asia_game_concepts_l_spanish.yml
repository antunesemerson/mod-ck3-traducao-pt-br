l_spanish:
 #Mandala
 game_concept_mandala: "Mandala"
 game_concept_mandala_desc: "Sob o [government_form|El] $game_concept_mandala$, o [domain_limit|El] e a quantidade de [direct_vassals|El] são limitados. Em vez disso, o [liege|El] e o [suzerain|El] dependem de [tributaries|El] para expandir seu reino. \n\nUm [ruler|El] mandala pode aspirar a ser visto como um deus-rei, ou devaraja, e então depende do [mandala_radiance|El] para obter e manter $game_concept_tributaries$.\n\nO $game_concept_ruler$ deve manter a [opinion|El] e fortalecer as relações com seus $game_concept_tributaries$ para conservá-los a longo prazo. Na sucessão, os $game_concept_tributaries$ podem se dispersar, a menos que o $game_concept_ruler$ seja um [mandala_succesor|El] digno."
 game_concept_mandalas: "Mandalas"
 game_concept_mandala_government: "Governo mandala"
 game_concept_mandala_i: "@government_type_mandala!"
 game_concept_mandala_government_desc: "$game_concept_mandala_desc$"
 game_concept_mandala_succession: "Sucessão mandala"
 game_concept_mandala_succession_succession: "Sucessão"
 game_concept_mandala_trials: "Provas de mandala"
 game_concept_mandala_succesor: "Sucessor de devaraja"
 game_concept_mandala_succession_desc: "Quando um [ruler|lE] [mandala|lE] que escolheu um [mandala_aspect|lE] morre, seu [heir|lE] enfrenta as Provas da $game_concept_mandala_succession$. Nessas provas, o herdeiro enfrenta desafios de [skill|lE] que testam sua fibra no Atributo associado, mas também em dois outros Atributos.\n\nSucedê-las significa que o herdeiro conseguiu convencer seus seguidores de que é um sucessor digno e que o [realm|lE] permanece estável.\n\n#EMP Fracassar#!, porém, acarretará penalidades crescentes:\n\n#indent_newline:6 $BULLET_WITH_TAB$#bold 1#! desafio fracassado: perde um [piety_level|lE] e uma pequena quantidade de [tributaries|lE] se liberta.#!\n\n#indent_newline:6 $BULLET_WITH_TAB$#bold 2#! desafios fracassados: perde dois [piety_levels|lE] e todos os tributários se libertam.#!\n\n#indent_newline:6 $BULLET_WITH_TAB$#bold Todos#! os desafios fracassados: perde três [piety_levels|lE] e o [realm|lE] se despedaça.#!"
 game_concept_mandala_radiance: "Esplendor do mandala"
 game_concept_radiance: "Esplendor"
 game_concept_radiant: "Esplendoroso"
 game_concept_mandala_radiance_desc: "O magnetismo de um [ruler|lE] [mandala|lE] para atrair e manter [subjects|lE] é conhecido como esplendor mandala. É uma mistura de seu [piety_level|lE], do nível do [great_building|lE] #V [GetBuilding('mandala_capital_01').GetTypeName]#! e do nível de [mandala_aspect|El].\n\nRecompensas maiores, mais súditos e mais poder aguardam aqueles que combinarem os três para se tornarem mais esplendorosos."
 game_concept_mandala_decree: "Decreto mandala"
 game_concept_mandala_decrees: "Decretos mandala"
 game_concept_mandala_decree_desc: "$game_concept_mandala_decrees$ são os três Decretos mandatados pelo [ruler|lE] [mandala|lE] — em particular os de [Concept( 'prosperity_decree', 'prosperidade')|E], [Concept( 'expansion_decree', 'expansão')|E] e [Concept( 'reverence_decree', 'reverência')|E].\n\nEm geral, o reino mandala tem uma autoridade muito centralizada, onde o poder sobre os [subjects|lE] e as [laws|lE] reside no governante associado, que pode alterá-las conforme necessário com pouca ou nenhuma objeção por parte de seus habitantes."
 game_concept_decree: "Decreto"
 game_concept_decrees: "Decretos"
 game_concept_mandala_decree_prosperity: "Decreto de prosperidade"
 game_concept_mandala_decree_prosperity_desc: "Com o [GetLaw('mandala_decree_prosperity').GetName|l], o [ruler|lE] [mandala|lE] se concentra em estimular e inspirar todos os [subjects|lE] a realizar mudanças construtivas.\n\nOs esforços são direcionados para promover o [development|lE], os [buildings|lE] e acumular riquezas, bem como fortalecer a comunidade por meio de relações pessoais."
 game_concept_prosperity_decree: "Prosperidade"
 game_concept_mandala_decree_expansion: "Decreto de expansão"
 game_concept_mandala_decree_expansion_desc: "O [GetLaw('mandala_decree_expansion').GetName|l] determina que todos os [subjects|lE] concentrem seus esforços em expandir o [realm|lE].\n\nAumentar o número de soldados, as acomodações militares e apoiar qualquer possível [war|lE] liderada por seu [ruler|lE] [mandala|lE] é fundamental."
 game_concept_expansion_decree: "Expansão"
 game_concept_mandala_decree_reverence: "Decreto de reverência"
 game_concept_mandala_decree_reverence_desc: "O [GetLaw('mandala_decree_reverence').GetName|l] impõe aos [subjects|lE] [mandala|lE] que direcionem seus esforços para promover a espiritualidade e o culto.\n\nAs [pilgrimages|lE], os rituais e a [piety|lE] são as pedras angulares deste decreto mandala."
 game_concept_reverence_decree: "Reverência"
 game_concept_mandala_aspect: "Aspecto mandala"
 game_concept_mandala_aspects: "Aspectos mandala"
 game_concept_aspect: "Aspecto"
 game_concept_aspects: "Aspectos"
 game_concept_mandala_aspect_desc: "Para que um [ruler|lE] [mandala|lE] obtenha reverência e divindade eternas, ele precisa se alinhar a um dos Aspectos que o identifiquem como um deus.\n\nOs Aspectos disponíveis são: \n$EFFECT_LIST_BULLET$[aspect_of_creation|E]\n$EFFECT_LIST_BULLET$[aspect_of_serenity|E]\n$EFFECT_LIST_BULLET$[aspect_of_destruction|E]\n$EFFECT_LIST_BULLET$[aspect_of_trickery|E]\n\nEsses Aspectos terão impacto em certas expectativas e ações realizadas pelo governante."
 game_concept_aspect_of_creation: "Aspecto da criação"
 game_concept_aspect_of_creation_desc: "Com a promessa de estimular a produção e gerar abundância para seus seguidores, o Aspecto da Criação concede bônus a empreendimentos econômicos e organizacionais.\n$EFFECT_LIST_BULLET$Foca em [stewardship|lE]\n$EFFECT_LIST_BULLET$Construções em cadeia concedem acúmulos de [GetModifier( 'mandala_creator_modifier' ).GetNameWithTooltip|Ll]\n$EFFECT_LIST_BULLET$Construções normais concedem [piety|lE]\n$EFFECT_LIST_BULLET$Criar [children|lE] [legitimate|lE]s concede [piety|lE]\n$EFFECT_LIST_BULLET$Tem acesso ao [scheme|E] #high [GetScheme('coerce_contribution').GetTypeName]#!\n$EFFECT_LIST_BULLET$Só pode morrer por [character_death_deaths|lE] de [death_natural_cause|lE] ou [death_religious|lE]"
 game_concept_aspect_of_serenity: "Aspecto de serenidade"
 game_concept_aspect_of_serenity_desc: "Um reino em paz é um reino próspero; o Aspecto da Serenidade valoriza a tranquilidade e os tratos diplomáticos, concedendo bônus a quem se alinha à sua causa.\n$EFFECT_LIST_BULLET$Foca em [diplomacy|lE]\n$EFFECT_LIST_BULLET$Evitar [wars|lE] ofensivas é recompensado com acúmulos de [GetModifier( 'mandala_increments_of_peace_modifier' ).GetNameWithTooltip|Ll]\n$EFFECT_LIST_BULLET$As [schemes|lE] de tipo [GetScheme('sway').GetTypeName|l] e [GetScheme('befriend').GetTypeName|l] têm mais sucesso\n$EFFECT_LIST_BULLET$Também pode solicitar #high $request_great_project_contribution_interaction$#! dos [allies|lE]\n$EFFECT_LIST_BULLET$Só pode morrer por [character_death_deaths|lE] de [death_natural_cause|lE] ou [death_religious|lE]"
 game_concept_aspect_of_destruction: "Aspecto de destruição"
 game_concept_aspect_of_destruction_desc: "O medo e o pavor são o caminho para governar. O verdadeiro poder está na capacidade de extinguir vidas. O Aspecto da Destruição concede bônus a quem divide e conquista.\n$EFFECT_LIST_BULLET$Foca em [martial|E]\n$EFFECT_LIST_BULLET$Concede bônus a modificadores militares\n$EFFECT_LIST_BULLET$Dá acesso ao [casus_belli|lE] #high [GetCasusBelliType('mandala_plunder_cb').GetName]#!\n$EFFECT_LIST_BULLET$Só pode morrer por [death_natural_cause|lE], [death_religious|lE] ou em [death_combat|lE] [character_death_deaths|lE]"
 game_concept_aspect_of_trickery: "Aspecto de engano"
 game_concept_aspect_of_trickery_desc: "Benevolente ou ardiloso; o Aspecto da Trapaça recompensa a capacidade de controlar os outros sem que eles saibam. O que é a divindade, senão moldar o mundo à nossa imagem?\n$EFFECT_LIST_BULLET$Foca em [intrigue|lE]\n$EFFECT_LIST_BULLET$Pode usar [piety|lE] para subornar [agents|lE] em [schemes|lE]\n$EFFECT_LIST_BULLET$Tem acesso ao [scheme|lE] #high [GetScheme('leverage_contribution').GetTypeName]#!\n$EFFECT_LIST_BULLET$Só pode morrer de [character_death_deaths|lE] por [death_natural_cause|lE], [death_religious|lE] ou [death_murder|lE]"
 game_concept_mandala_ritual: "Ritual mandala"
 game_concept_mandala_rituals: "Rituais mandala"
 game_concept_ritual: "Ritual"
 game_concept_rituals: "Rituais"
 game_concept_mandala_ritual_desc: "Os rituais mandala são tarefas que às vezes aparecem para os [rulers|lE] [mandala|lE]; são um sinal de que uma parte específica do seu [realm|lE] precisa de sua orientação e elevação divina.\n\nSer mais habilidoso em seu [mandala_aspect|lE] aumentará qualquer ganho ao aparecer perante seus [subjects|lE]."
 game_concept_mandala_ritual_tier: "Nível de ritual mandala"
 game_concept_ritual_tier: "Nível de ritual"
 game_concept_mandala_ritual_tier_desc: "O [Concept('ritual_tier', 'nível')|E] de um [mandala_ritual|lE] indica o quanto esse destino se beneficiará da sua exortação, assim como as recompensas pessoais para você."
 #Tribute Mission
 game_concept_tribute_mission: "Missão de tributo"
 game_concept_tribute_missions: "Missões de tributo"
 game_concept_tribute_mission_desc: "Como [tributary|lE], você deverá pagar tributo e prestar seus respeitos ao [suzerain|lE] com regularidade.\n\nNão fazê-lo terá uma série de consequências, das quais a mais branda será perder [legitimacy|El]."
 game_concept_tribute: "Tributo"
 game_concept_tributes: "Tributos"
