l_spanish:
 tgp_movement_events.0001.t: "Afiar a Lâmina"
 tgp_movement_events.0001.desc: ""[ROOT.Char.GetTitledFirstName]!". Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('marshal'))] [marshal.GetName] cavalga ao meu lado, [marshal.Custom('quirk_pos_pp')].\n\n"Não podemos ficar sentados esperando como ovelhas, prontos para os lobos nos devorarem. Pode ser que estes sejam tempos de [my_situation.GetTopCurrentPhase.GetName|l], mas em breve devemos marchar. Para leste, para oeste, para norte e para sul. Exorto-vos a estarem preparados, meu [ROOT.Char.GetTitleAsNameNoTooltip]!"."
 tgp_movement_events.0001.aa: ""Você está certo. Me ensine como.""
 tgp_movement_events.0001.a: "O [my_movement.GetNameNoTooltip] ouvirá."
 tgp_movement_events.0001.b: "Devo reunir aliados."
 tgp_movement_events.0001.c: "Aprenderei com os generais de antigamente."
 tgp_movement_events.0001.c.tt: "Você ganha um [commander_trait|lE]"
 event_increase_movement_power_major_effect_tooltip: "Aumenta [movement_power|lE] [movement_power_i] de [GetPlayer.Custom('GetMyMovement')] em [EmptyScope.ScriptValue('event_increase_movement_power_major_value')|+0]"
 event_increase_movement_power_medium_effect_tooltip: "Aumenta o [movement_power|lE] [movement_power_i] de [GetPlayer.Custom('GetMyMovement')] em [EmptyScope.ScriptValue('event_increase_movement_power_medium_value')|+0]"
 event_increase_movement_power_minor_effect_tooltip: "Aumenta o [movement_power|lE] [movement_power_i] de [GetPlayer.Custom('GetMyMovement')] em [EmptyScope.ScriptValue('event_increase_movement_power_minor_value')|+0]"
 tgp_movement_events.0010.t: "Um visitante bem-vindo"
 tgp_movement_events.0010.desc: "Quando caminho pelo pátio, [Select_CString(courtier.IsFemale, 'uma aristocrata bem vestida', 'um cortesão bem vestido' )] me saúda com uma reverência cortês.\n\n"Sou [courtier.GetName], [other_ruler.Custom2('RelationToMe', SCOPE.sC('courtier'))] [other_ruler.Custom('ES_DelDela')] [other_ruler.GetTitledFirstName|l]", diz apresentando-se educadamente. "[other_ruler.Custom('ES_ElLa')|U] [other_ruler.GetTitledFirstNameNoTooltip|l] me envia para aprender vossa sabedoria, meu [ROOT.Char.GetTitleAsNameNoTooltip]. Deseja ouvir outros conselhos antes de tomar uma decisão"."
 tgp_movement_events.0010.a: "O [my_movement.GetNameNoTooltip] deve liderar o caminho."
 tgp_movement_events.0010.a.success: "Você convence [other_ruler.GetShortUIName]"
 tgp_movement_events.0010.a.failure: "[other_ruler.GetShortUIName] ignora seus conselhos"
 tgp_movement_events.0010.b: "!Mais deveriam buscar meu conselho!"
 tgp_movement_events.0010.c: "Não posso tomar a decisão por [other_ruler.GetSheHe], mas posso ajudar [other_ruler.GetHerHim]."
 event_increased_personal_movement_power_tt: "Você aumenta sua [personal_movement_power|E] [movement_power_i] em [EmptyScope.ScriptValue('event_increased_personal_movement_power_value')|+0] durante #V 15 años#!"
 tgp_movement_events_0010_add_to_movement_effect_tt: "[other_ruler.GetShortUIName|U] se juntará ao [GetPlayer.Custom('GetMyMovement')]"
 tgp_movement_events.0020.t: "Adiante! Adiante!"
 tgp_movement_events.0020.desc: ""[ROOT.Char.GetTitleAsNameNoTooltip|U] mais [ROOT.Char.Custom('ComplimentAdjective')]", [Select_CString(courtier.IsFemale, 'uma mulher', 'um homem' )] da comunidade [courtier.GetCulture.GetNameNoTooltip] inclina-se profundamente ao entrar no salão do trono. "Trago o selo [other_ruler.Custom('ES_DelDela')] grande [other_ruler.GetTitledFirstName|l]. Meu [other_ruler.GetLadyLord] me insta a apresentar meus respeitos a out[ROOT.Char.Custom('ES_OA')] integrante do respeitado [my_movement.GetName]."\n\n[courtier.GetSheHe|U] [courtier.Custom('quirk_pos_present')] antes de continuar: "[other_ruler.Custom('ES_ElLa')|U] [other_ruler.GetTitledFirstNameNoTooltip|l] sustenta que o reino deve se concentrar nas inovações. A busca por poder pessoal é egoísta e inútil. Devemos todos #EMP avançar#!.""
 tgp_movement_events.0020.aa: "É o único caminho a seguir."
 tgp_movement_events.0020.a: "E avançaremos."
 tgp_movement_events.0020.b: "Não há progresso sem o [my_movement.GetNameNoTooltip]!"
 tgp_movement_events.0020.c: "O rumo deve ser definido de dentro da nave."
 event_decrease_movement_power_medium_effect_tooltip: "Reduz o [movement_power|lE] [movement_power_i] de [GetPlayer.Custom('GetMyMovement')] em #N [EmptyScope.ScriptValue('event_decrease_movement_power_medium_value')|0]#!"
 event_decrease_movement_power_minor_effect_tooltip: "Reduz o [movement_power|lE] [movement_power_i] de [GetPlayer.Custom('GetMyMovement')] em #N [EmptyScope.ScriptValue('event_decrease_movement_power_minor_value')|0]#!"
 tgp_advancement_innovations_modifier: "A grande inovação"
 tgp_advancement_innovations_modifier_desc: "Este personagem utilizou seu conhecimento arquitetônico para se concentrar em inovações e impulsionar o reino rumo a futuros mais promissores."
 tgp_movement_events.0030.opening: "[other_ruler.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 tgp_movement_events.0030.desc: "Como integrantes [Select_CString(And(ROOT.Char.IsFemale, other_ruler.IsFemale), 'as duas', 'os dois')] do [my_movement.GetName], escrevo-vos para pedir que cuidemos dos nossos interesses comuns.\n\nFalarei muito bem de vós, se vós fizerdes o mesmo por mim."
 tgp_movement_events.0030.a: "Nisso podemos concordar."
 tgp_movement_events.0030.b: "Agradeço, mas não preciso de ajuda."
 friend_same_movement_reason: "[CHARACTER.GetShortUINameU] e [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'acordasteis', 'acordaron')] ter em consideração os interesses respectivos como integrantes do mesmo movimento."
 friend_same_movement_reason_corresponding: "$friend_same_movement_reason$"
 tgp_movement_events.0040.t: "A gratidão do Céu"
 tgp_movement_events.0040.desc: ""Vosso trabalho não passou despercebido, [ROOT.Char.GetTitledFirstNameNoTooltip|l]." Uma voz calma chama meu nome. [courtier.Custom('ES_ElLa')|U] [courtier.GetWomanMan] que se inclina diante de mim traz o selo [hegemon.Custom('ES_DelDela')] [hegemon.GetTitledFirstNameNoTooltip|ll].\n\n"[hegemon.Custom('ES_ElLa')|U] [hegemon.GetTitledFirstName|l] agradece vosso apoio e deseja recompensar-vos por isso. O [my_movement.GetName] será exaltado nos corredores do palácio, e vossos nomes serão lembrados.""
 tgp_movement_events.0040.a: ""Sinto igual gratidão"."
 tgp_movement_events.0040.b: ""Serei leal para sempre a [hegemon.Custom('ES_AlAla')] [hegemon.GetTitleAsNameNoTooltip]"."
 tgp_movement_events.0040.c: ""Que estas paredes falem!""
 tgp_loyal_subject_modifier: "Leal ao Céu"
 tgp_loyal_subject_modifier_desc: "Este personagem demonstrou sua lealdade ao hegemon ao se juntar ao movimento pró-hegemon."
 dynastic_cycle_cannot_leave_movement_tt: "@warning_icon! #X Você não poderá abandonar o [my_movement.GetName] por #V 15 anos#!#!"
 situation_dynastic_cycle_choose_movement_decision_cannot_leave_var: "Prometeste [GetTitleByKey('h_china').GetHolder.Custom('ES_AlAla')] [GetTitleByKey('h_china').GetHolder.GetTitleAsName] que não [GetTitleByKey('h_china').GetHolder.GetHerHim] abandonarias"
 tgp_movement_events.0050.t: "Um novo rumo"
 tgp_movement_events.0050.desc.intro: ""Saudações, [ROOT.Char.GetTitledFirstNameNoTooltip|l]." Um[new_elder.Custom('ES_XA')] [new_elder.GetWomanMan] cautelos[new_elder.Custom('ES_OA')] entra silenciosamente em meu gabinete, acompanhado por alguns dos meus próprios oficiais. "Venho em busca de uma audiência privada, se me for permitido."\n\n"Em você, percebo a matéria de um[ROOT.Char.Custom('ES_XA')] erudit[ROOT.Char.Custom('ES_OA')], uma mente cuja disciplina"
 tgp_movement_events.0050.desc.diplomacy: "diplomática"
 tgp_movement_events.0050.desc.stewardship: "Tesouraria"
 tgp_movement_events.0050.desc.intrigue: "intrigante"
 tgp_movement_events.0050.desc.learning: "de aprendizado"
 tgp_movement_events.0050.desc.martial: "marcial"
 tgp_movement_events.0050.desc.outro: "reflete virtude. Gostaria de oferecer minha humilde sabedoria, para que vosso governo seja temperado e vossa espada afiada"."
 tgp_movement_events.0050.a: "[new_elder.Custom('ES_ElLa')|U] [new_elder.GetTitledFirstNameNoTooltip|l] será um[new_elder.Custom('ES_XA')] mentor[new_elder.Custom('ES_XA')] excelente."
 tgp_movement_events.0050.b: "Serei leal para sempre a [old_elder.Custom('ES_AlAla')] [old_elder.GetTitledFirstNameNoTooltip|l]!"
 tgp_movement_events.0050.c: "Concentrar-me nos estudos é o único caminho."
 tgp_movement_events.0060.t: "Tinta nefasta"
 tgp_movement_events.0060.desc: "Meu [ROOT.Char.Custom('GetWritingMaterial')] repousa fresco sobre a escrivaninha. Um único traço poderia manchar a reputação de [rival.Custom('ES_DelDela')] [rival.GetTitledFirstName|l] e de sua [rival_movement.GetName] por gerações. Ainda assim, hesito, caminhando [ROOT.GetCharacter.Custom('quirk_pos_adverb')] pelo gabinete.\n\nA ideia perdura como a fumaça de uma chama sem vigilância."
 tpg_movement_events.0060.aa: "Palavras mais cortantes nunca foram escritas."
 tgp_movement_events.0060.a: "O [rival_movement.GetNameNoTooltip] sofrerá."
 tgp_movement_events.0060.b: "Devo me concentrar em exaltar as virtudes do [my_movement.GetNameNoTooltip]."
 tgp_movement_events.0060.c: "[ROOT.Char.GetFaith.HighGodName] nos ensina a ter compaixão."
 tgp_movement_events.0060.a.tt: "$prelude_events.0040.c.tt$"
 tgp_movement_events.0060.a.rival_tt: "Reduza o [movement_power|lE] [movement_power_i] de [rival_movement.GetName] em #N [EmptyScope.ScriptValue('event_decrease_movement_power_medium_value')|0]#!"
 tgp_movement_events.0070.t: "O pergaminho compartilhado"
 tgp_movement_events.0070.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U]", meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('councillor'))], [councillor.Custom('ES_ElLa')] [councillor.GetTitledFirstName|l] entra em meu gabinete, [councillor.Custom('quirk_pos_pp')]. "Soube que vocês também se interessam pelo tema de [councillor.Custom('MatchingConversationSubject_alone')]".\n\n"Posso propor que estudemos os clássicos [Select_CString(And(ROOT.Char.IsFemale, councillor.IsFemale), 'juntas', 'juntos')]? Ao refletirmos em conjunto, até os governantes e servos podem ascender em sabedoria, como dois espelhos polidos um diante do outro"."
 tgp_movement_events.0070.a: ""Ha! Sem dúvida podemos falar sobre [councillor.Custom('MatchingConversationSubject_alone')].""
 tgp_movement_events.0070.b.councillor: ""Deveis focar em ser [councillor.GetCouncilTitle|l]"."
 tgp_movement_events.0070.b.spouse: ""Eu me importo mais com sua educação"."
 tgp_movement_events.0070.c: "Nunca devo parar de aprender."
 friend_studied_together: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'compartilharam', 'compartilharam' )] uma tarde estudando [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'seu', 'seu' )] tema favorito."
 friend_studied_together_corresponding: "$friend_studied_together$"
 tgp_movement_events.0080.t: "Por nossa casa"
 tgp_movement_events.0080.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('family_member'))], [family_member.Custom('ES_ElLa')] [family_member.GetTitledFirstName|l], [family_member.Custom('quirk_pos_present')] ao entrar na sala. "Querid[ROOT.Char.Custom('ES_OA')] [family_member.Custom2('RelationToMe', SCOPE.sC('root_scope'))]", oferece-me uma reverência cortês, com as vestes bem limpas e o olhar baixo em sinal de respeito.\n\n"Há muito tempo reflito sobre a honra da nossa casa. Talvez isto não seja muito, mas ainda assim quero oferecê-lo a você, para que o [ROOT.Char.GetDomicile.GetName] brilhe intensamente, para todos verem.""
 tgp_movement_events.0080.aa: ""O nome de [ROOT.Char.GetHouse.GetNameNoTooltip] será conhecido por toda parte!"."
 tgp_movement_events.0080.a: ""Agradeço a vocês por esta contribuição"."
 tpg_movement_events.0080.b: ""Devemos usar o ouro para financiar o [my_movement.GetNameNoTooltip]"."
 tgp_movement_events.0080.c: ""Não gaste seu ouro comigo"."
 tgp_subsidised_estate_buildings_modifier: "Propriedade subvencionada"
 tgp_subsidised_estate_buildings_modifier_desc: "A família deste personagem ofereceu dinheiro para ajudar a ampliar sua propriedade.\n\n"
 MODIFIER_DEFINITION_SUBSIDISED_ESTATE: "#emp Usado ao construir um novo edifício de domicílio#!\nRecursos restantes de [domicile_building|lE]: #bold $MULTIPLIER|0$/3#!"
 friend_rejected_funds: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'incentivou', 'incentivou' )] [TARGET_CHARACTER.GetShortUIName] a não gastar [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'seu', 'seu' )] ouro em [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUIName )]."
 friend_rejected_funds_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'foi', 'foi' )] incentivado[TARGET_CHARACTER.Custom('ES_OA')] por [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUIName )] a não gastar [Select_CString( CHARACTER.IsLocalPlayer, 'seu', 'seu' )] ouro em [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetShortUIName )]."
 tgp_movement_events.0090.t: "Feridas antigas"
 tgp_movement_events.0090.desc: ""[ROOT.Char.GetTitledFirstNameNoTooltip]", [Select_CString(courtier.IsFemale, 'uma mulher', 'um homem' )] que carrega o selo da casa de [other_ruler.GetHouse.GetName] se inclina profundamente diante de mim. "Meu [other_ruler.GetLadyLord], [other_ruler.Custom('ES_ElLa')] [other_ruler.GetTitledFirstName|l], ordena-me que leia esta mensagem."\n\n"Embora as estações passadas nos tenham visto caminhar [Select_CString(And(ROOT.Char.IsFemale, other_ruler.IsFemale), 'em oposição', 'em oposição')], o caminho que agora trilhamos como membros do [my_movement.GetName] nos conduz ao mesmo objetivo. Devemos esquecer as feridas do passado.""
 tgp_movement_events.0090.aa: ""Me nego"."
 tgp_movement_events.0090.a: ""Um pedido de desculpas para que #EMP todos#! o ouçam"."
 tgp_movement_events.0090.b: "Só pelo bem do [my_movement.GetNameNoTooltip]."
 tgp_movement_events.0090.c: ""Envie meus cumprimentos a [other_ruler.Custom('ES_AlAla')] [other_ruler.GetTitleAsNameNoTooltip]"."
 tgp_movement_events.0100.t: "Um conselho"
 tgp_movement_events.0100.desc: ""Exaltai[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip]". Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spymaster'))], [spymaster.Custom('ES_ElLa')] [spymaster.GetTitledFirstName|l], chama minha atenção na escuridão. A madeira range sob seus passos rápidos.\n\n"Ficamos sabendo que [rival.Custom('ES_ElLa')] [rival.GetTitledFirstName|l], líder do [rival_movement.GetName], poderia ser mais suscetível a… sugestões do que esperávamos"."
 tgp_movement_events.0100.aa: "Imagino que saberá o que é melhor para [rival.GetSheHe]."
 tgp_movement_events.0100.a: ""Vá em frente"."
 tgp_movement_events.0100.a.success: "[rival.GetShortUIName] deixa o [rival_movement.GetName]"
 tgp_movement_events.0100.a.failure: "Você é exposto como desonroso[ROOT.Char.Custom('ES_OA')] como alguém desonroso."
 tgp_movement_events.0100.b: "Não há sugestão melhor do que ouro."
 tgp_movement_events.0100.c: "Não há necessidade de cortar a cabeça. Danifique o corpo."
 tgp_movement_events_0100_remove_from_movement_effect_tt: "[rival.GetShortUIName] se juntará a [GetSituation('dynastic_cycle').GetTopParticipantGroupByKey( 'undecided_movement' ).GetName]"
 tgp_movement_events.0110.opening: "[other_ruler.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 tgp_movement_events.0110.desc: "Como integrantes [Select_CString(And(ROOT.Char.IsFemale, other_ruler.IsFemale), 'las dos', 'los dos')] do [my_movement.GetName], é nosso dever manter afiadas não apenas as espadas, mas também as mentes.\n\nPor favor, aceitem este livro e estudem-no cuidadosamente."
 tgp_movement_events.0110.a: "Seguirei seu conselho."
 tgp_movement_events.0110.b: "Vai ficar fantástico na minha biblioteca."
 friend_sent_books_reason: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'enviou', 'enviou' )] alguns livros interessantes para [Select_CString( CHARACTER.IsLocalPlayer, 'seu personagem', CHARACTER.GetShortUIName )] porque [Select_CString(Or(TARGET_CHARACTER.IsLocalPlayer, CHARACTER.IsLocalPlayer), 'faziam', 'faziam')] parte do mesmo movimento."
 friend_sent_books_reason_corresponding: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'enviou', 'enviou' )] alguns livros interessantes para [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'seu personagem', TARGET_CHARACTER.GetShortUIName )] porque [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'faziam', 'faziam')] parte do mesmo movimento."
 artifact_movement_gift_desc: "[newly_created_artifact.GetDesc]\n\nUm presente de [other_ruler.GetShortUIName] para [Select_CString( root_scope.IsLocalPlayer, 'você', root_scope.GetShortUIName)] como membros do [my_movement.GetName]."
 tgp_movement_events.0120.t: "Um brinde à virtude"
 tgp_movement_events.0120.desc: "À medida que as taças são reabastecidas com [host.Custom('GetExpensiveDrink')] e os pratos de [host.Custom('GetExpensiveMeal')] desaparecem, [other_ruler.Custom('ES_ElLa')] [other_ruler.GetTitledFirstName|l] se inclina para se aproximar.\n\n“Não podemos decepcionar o [my_movement.GetName]”, diz, [other_ruler.Custom('quirk_pos_pp')]. “Você estudou o tema de [other_ruler.Custom('GetRandomHistoryPassage')], [ROOT.Char.GetTitledFirstNameNoTooltip|l]?”"
 tgp_movement_events.0120.a: "“Por favor, me ensine.”"
 tgp_movement_events.0120.b: "Devemos confiar apenas na força."
 tgp_movement_events.0120.c: ""Um banquete não é lugar para estudar!""
 tgp_movement_events.0130.t: "O idioma dos [capital_culture.GetCollectiveNounNoTooltip]"
 tgp_movement_events.0130.desc: "[Select_CString(courtier.IsFemale, 'Uma mulher vestida', 'Um homem vestido' )] com elegantes roupas de [other_ruler.Custom('RegionalFabric')] se inclina diante de mim:\n\n"Meu [other_ruler.GetLadyLord], [other_ruler.Custom('ES_ElLa')] [other_ruler.GetTitledFirstName|l], pede que eu fale em seu nome, [ROOT.Char.Custom('FormOfAddressForLiege')|l]. Seu temor é que as vozes do [my_movement.GetName] enfraqueçam na capital se seu idioma não for falado."\n\n[courtier.GetSheHe|U] [courtier.Custom('quirk_pos_present')] e prossegue: "Seria uma honra guiar-vos nesta jornada.""
 tgp_movement_events.0130.a: "Devo aprender sua língua!"
 tgp_movement_events.0130.b: "Por que não simplesmente adotar a cultura [capital_culture.GetNameNoTooltip]?"
 tgp_movement_events.0130.c: "Em harmonia, viveremos."
 tgp_cultural_harmony_modifier: "Harmonia cultural"
 tgp_cultural_harmony_modifier_desc: "Este personagem decidiu concentrar seus esforços em viver em harmonia com a cultura da capital."
 tgp_movement_events.0140.t: "O presente do discípulo"
 tgp_movement_events.0140.desc: ""Mestre[ROOT.Char.Custom('ES_OA')]!", ouço a voz de meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('disciple'))], [disciple.Custom('ES_ElLa')] [disciple.GetTitledFirstName|l], antes mesmo de ver[disciple.GetHerHim].\n\n"Muito me ensinastes sobre os anais de [ROOT.Char.Custom('GetRandomAnnalsPassage')] e sobre o tema de [ROOT.Char.Custom('GetRandomHistoryPassage')], e cultivastes meu intelecto com muito cuidado. Como sinal de gratidão, desejo oferecer-vos este presente".\n\n[disciple.GetSheHe|U] [disciple.Custom('quirk_pos_present')] e me entrega um pacote da cor [ROOT.Char.Custom('GetSimpleColor')]."
 tgp_movement_events.0140.a: ""E com prazer eu o aceitarei"."
 tgp_movement_events.0140.b: ""Lembrem-se de que fazemos isso pelo [my_movement.GetNameNoTooltip]"."
 tgp_movement_events.0140.c: ""E o que dizer da passagem de [ROOT.Char.Custom('GetRandomPoetryPassage')]?""
 disciple_gift_desc: "[newly_created_artifact.GetDesc]\n\nUm presente de [disciple.GetShortUIName] para [Select_CString(root_scope.IsLocalPlayer, 'você', root_scope.GetShortUIName)] por ser um[root_scope.Custom('ES_XA')] ancião[root_scope.Custom('ES_OA')] excelente."
 tgp_movement_events.0150.t: "O [monk.GetFaith.DevoteeNeuter] [monk.GetFaith.GetAdherentNameNoTooltip]"
 tgp_movement_events.0150.desc.intro: "Vestido com vestes na cor de [monk.Custom('GetComplexColor')] um [monk.GetFaith.DevoteeNeuter] entra no salão do trono. Um pequeno amuleto de madeira pende de seu cinto, e um leve aroma de incenso o acompanha.\n\n"
 tgp_movement_events.0150.desc.other_ruler: ""Venho trazendo a vontade do meu senhor[other_ruler.Custom('ES_XA')], [other_ruler.Custom('ES_ElLa')] [other_ruler.GetTitledFirstName|l]", diz [monk.Custom('quirk_pos_pp')]. "É meu dever difundir a palavra de [monk.GetFaith.HighGodName]."
 tgp_movement_events.0150.desc.alone: ""Venho trazendo a vontade de [monk.GetFaith.HighGodName], pois dediquei minha vida ao estudo da fé [monk.GetFaith.GetAdjective]."
 tgp_movement_events.0150.desc.outro: "Por favor, acolhei-me em vossa corte para que possamos aprender uns com os outros"."
 tgp_movement_events.0150.aa: ""Dizei ao vostr[other_ruler.Custom('ES_OA')] senhor[other_ruler.Custom('ES_XA')] que admiro sua diplomacia"."
 tgp_movement_events.0150.aa.alliance: "Você entra em uma [alliance|lE] com [other_ruler.GetShortUIName]"
 tgp_movement_events.0150.a: "Conte-me mais sobre os [monk.GetFaith.GetAdherentNamePluralNoTooltip]."
