l_spanish:
 ##################################################
 # STRUGGLE EVENTS
 ##################################################
 tgp_dynastic_cycle.0051.t: "O $dynastic_cycle$ — [GetSituation('dynastic_cycle').GetTopCurrentPhase.GetType.GetNameNoTooltip]"
 tgp_dynastic_cycle.0051.desc.intro: "[GetSituation('dynastic_cycle').GetTopSubRegion.GetName] é uma terra imensa e próspera. Seu soberano, dotado pelo próprio Céu com o mandato de reinar, deve governar com justiça para conservar o favor divino, pois os atos de tirania se expõem à ira do Céu.\n\nNeste período de"
 tgp_dynastic_cycle.0051.desc.advancement: "$tgp_dynastic_cycle.0051.desc.intro$ [GetSituation('dynastic_cycle').GetTopCurrentPhase.GetType.GetNameNoTooltip|l], grandes avanços tecnológicos e acúmulo de riqueza são esperados para todos no reino."
 tgp_dynastic_cycle.0051.desc.expansion: "$tgp_dynastic_cycle.0051.desc.intro$ [GetSituation('dynastic_cycle').GetTopCurrentPhase.GetType.GetNameNoTooltip|l], no reino, todos esperam grandes conquistas e feitos de força."
 tgp_dynastic_cycle.0051.desc.conquest: "$tgp_dynastic_cycle.0051.desc.intro$ [GetSituation('dynastic_cycle').GetTopCurrentPhase.GetType.GetNameNoTooltip|l], o destino de todos no reino é incerto."
 tgp_dynastic_cycle.0051.desc.corruption: "$tgp_dynastic_cycle.0051.desc.intro$ [GetSituation('dynastic_cycle').GetTopCurrentPhase.GetType.GetNameNoTooltip|l], [GetTitleByKey('h_china').GetHolder.GetSheHe] não conseguiu herdar as virtudes de seus antepassados. O Estado caiu presa da imoralidade degenerada e permitiu que proliferassem ministros malignos de caráter ignóbil."
 tgp_dynastic_cycle.0051.desc.consolidation: "$tgp_dynastic_cycle.0051.desc.intro$ [GetSituation('dynastic_cycle').GetTopCurrentPhase.GetType.GetNameNoTooltip|l], [GetSituation('dynastic_cycle').GetTopSubRegion.GetNameNoTooltip] encontra-se agora dividida enquanto senhores da guerra rivais disputam a reivindicação do Mandato do Céu. A busca pelo cultivo moral foi abandonada nestes tempos caóticos."
 tgp_dynastic_cycle.0051.desc.emperor: "\n\nComo soberano[ROOT.Char.Custom('ES_OA')], é minha responsabilidade preservar o Mandato e governar com virtude, assim como a estrela polar, em torno da qual todos os corpos celestes giram."
 tgp_dynastic_cycle.0051.desc.advancement_movement: "Dizem que se deve servir como ministro competente em tempos de paz, mas não se pode negar que os tempos de caos ხშირად recompensam aqueles com astúcia e manhas em vez dos virtuosos…"
 tgp_dynastic_cycle.0051.desc.expansion_movement: "\n\nPessoas como eu, servindo como generais poderosos, garantirão a estabilidade do reino."
 tgp_dynastic_cycle.0051.desc.pro_hegemon_movement: "\n\nSomente o soberano pode cumprir as promessas, e eu lhe darei meu apoio inabalável!"
 tgp_dynastic_cycle.0051.desc.conservative_movement: "\n\nMinha família sempre seguirá a orientação dos Céus."
 tgp_dynastic_cycle.0051.desc.unaligned_movement: "\n\nMeu papel no ciclo interminável é incerto. Os céus me guiarão quando eu estiver pronto para tomar uma posição."
 tgp_dynastic_cycle.0051.desc.interloper: "\n\nPode não ser a terra de nossos antepassados, mas este lugar é rico em oportunidades difíceis de resistir, desde que caminhemos com cuidado."
 tgp_dynastic_cycle.0051.a.emperor: "Que nosso reinado perdure por dez mil anos!"
 tgp_dynastic_cycle.0051.a.involved: "A riqueza e a honra dependem do Céu!"
 tgp_dynastic_cycle.0051.a.interloper: "A fortuna é tão incerta quanto os ventos e as nuvens."
 intro_event_joined_movement: "Juntou-se ao [my_movement.GetName|l]"
 tgp_dynastic_cycle.0052.t: "Juntou-se ao [ROOT.Char.Custom('GetMyMovementNoTooltip')]"
 tgp_dynastic_cycle.0052.desc.intro_common: "[GetTitleByKey('h_china').GetHolder.GetName] foi ungid[GetTitleByKey('h_china').GetHolder.Custom('ES_OA')] pelos Céus para cumprir as promessas de uma Era [GetSituation('dynastic_cycle').GetTopCurrentPhase.GetName]. Enquanto isso, eu escolhi o caminho de [ROOT.Char.Custom('GetMyMovement')]."
 tgp_dynastic_cycle.0052.desc.intro: "$tgp_dynastic_cycle.0052.desc.intro_common$\n\nPor aqui há muitas tentações e pessoas influentes. Por enquanto, devo manter distância de toda essa politicagem e me concentrar em minha propriedade e no meu cargo local.\n\n"
 tgp_dynastic_cycle.0052.desc.advancement: "Anseio pela prosperidade do reino e que o povo possa cultivar suas vidas. Talvez um dia eu veja com mais simpatia juntar-me a [GetSituation('dynastic_cycle').GetTopParticipantGroupByKey('advancement_movement').GetName]."
 tgp_dynastic_cycle.0052.desc.expansion: "Acompanharei de perto as notícias das frentes e aplaudirei todas as conquistas. Talvez então eu considere me juntar a [GetSituation('dynastic_cycle').GetTopParticipantGroupByKey('expansion_movement').GetName]."
 tgp_dynastic_cycle.0052.desc.conquest: "No obstante, observarei o reinado dos [ROOT.Char.GetTopLiege.GetDynastyName] e se acontecer de perderem ou ganharem o favor dos Céus, agirei de acordo."
 tgp_dynastic_cycle.0052.desc.instability: "No entanto, ainda me preocupa para onde o reino está indo e desconfio que a dinastia [ROOT.Char.GetTopLiege.GetDynastyName] reinante perca o [ROOT.Char.GetTopLiege.GetLegitimacyType.GetFlavorName(ROOT.Char.GetTopLiege.GetLegitimacyLevel.Self)]."
 tgp_dynastic_cycle.0052.a: "Manterei a imparcialidade."
 tgp_dynastic_cycle.0053.t: "$tgp_dynastic_cycle.0052.t$"
 tgp_dynastic_cycle.0053.desc.intro: "$tgp_dynastic_cycle.0052.desc.intro_common$\n\nHaverá muitas oportunidades para aprender novas táticas e estratégias militares com meus companheiros. No topo da escala brilha o gabinete do [ROOT.Char.GetTopLiege.GetCouncillor('councillor_marshal').GetCouncilTitle|l], o ápice de uma carreira militar a que todos aqui aspiram."
 tgp_dynastic_cycle.0053.desc.advancement: "Embora a postura atual [ROOT.Char.GetTopLiege.Custom('ES_DelDela')] [ROOT.Char.GetTopLiege.GetName|l] não nos apoie ao máximo. Devem ser tomadas medidas para conduzir o [GetSituation('dynastic_cycle').GetName] rumo a [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_stability_expansion').GetName] e tornar nosso potencial uma realidade."
 tgp_dynastic_cycle.0053.desc.expansion: "A vontade do Céu é que conquistem e estamos prontos!"
 tgp_dynastic_cycle.0053.desc.conquest: "A vontade do Céu é que conquistecemos, e [ROOT.Char.GetTopLiege.GetDynastyName] dará exemplo."
 tgp_dynastic_cycle.0053.desc.instability: "Ainda assim, os tempos são incertos e as visões estão nubladas. Só o exército pode manter a ordem; esperemos que os [ROOT.Char.GetTopLiege.GetDynastyName] se deem conta disso mais cedo do que tarde."
 tgp_dynastic_cycle.0053.a: "Só os mais poderosos podem prevalecer!"
 tgp_dynastic_cycle.0054.t: "$tgp_dynastic_cycle.0052.t$"
 tgp_dynastic_cycle.0054.desc.intro: "$tgp_dynastic_cycle.0052.desc.intro_common$\n\nNossa meta é compartilhar a beleza da arte e do conhecimento. O cultivo da mente e da alma é uma maneira segura de ser agraciado pelos Céus."
 tgp_dynastic_cycle.0054.desc.advancement: "A dinastia [ROOT.Char.GetTopLiege.GetDynastyName] se encontra no mesmo caminho, aquele que trará prosperidade e iluminação a todos sob o Céu! Vamos mantê-lo assim."
 tgp_dynastic_cycle.0054.desc.expansion: "Os [ROOT.Char.GetTopLiege.GetDynastyName] estão em uma senda destrutiva. Os exércitos são caros e os generais são volúveis e perigosos. Temos que arrancar deles o poder."
 tgp_dynastic_cycle.0054.desc.conquest: "Os [ROOT.Char.GetTopLiege.GetDynastyName] são novos, e por isso, são maleáveis para reconhecer que a vontade do Céu é trazida por exames e oficiais justos!"
 tgp_dynastic_cycle.0054.desc.instability: "Os [ROOT.Char.GetTopLiege.GetDynastyName] estão perdidos. No entanto, podemos ajudá-los a voltar ao caminho certo, garantindo exames frequentes e ministros meritórios."
 tgp_dynastic_cycle.0054.a: "O mérito supera tudo."
 tgp_dynastic_cycle.0055.t: "$tgp_dynastic_cycle.0052.t$"
 tgp_dynastic_cycle.0055.desc.intro: "$tgp_dynastic_cycle.0052.desc.intro_common$\n\nMeus companheiros do movimento e eu entregamos nossas vidas a [GetTitleByKey('h_china').GetHolder.GetSheHe]. Graças à sua sabedoria e orientação, traremos"
 tgp_dynastic_cycle.0055.desc.advancement: "prosperidade, riqueza e avanços tecnológicos para todos sob o Céu."
 tgp_dynastic_cycle.0055.desc.expansion: "novas terras e povos que reconheçam seu destino para governá-los com justiça."
 tgp_dynastic_cycle.0055.desc.conquest: "a todos sob o Céu para que reconheçam os [GetTitleByKey('h_china').GetHolder.GetDynastyName] como dignos do Mandato do Céu."
 tgp_dynastic_cycle.0055.desc.instability: "de volta o sol nestes tempos nublados."
 tgp_dynastic_cycle.0055.a: "Louvados sejam os céus e os [ROOT.Char.GetTopLiege.GetDynastyNameNoTooltip]!"
 tgp_dynastic_cycle.0056.t: "$tgp_dynastic_cycle.0052.t$"
 tgp_dynastic_cycle.0056.desc.intro: "$tgp_dynastic_cycle.0052.desc.intro_common$\n\nA tradição construída pelas gerações anteriores deve ser a pedra angular da burocracia de [ROOT.Char.GetTopLiege.GetDynastyName].\n\n"
 tgp_dynastic_cycle.0056.desc.advancement: "No entanto, [ROOT.Char.GetTopLiege.Custom('ES_AlAla')] [ROOT.Char.GetTopLiege.GetName] lhe cegam os exames e permite que camponeses provincianos assumam cargos. Em breve, denegrirão nossa história."
 tgp_dynastic_cycle.0056.desc.expansion: "No entanto, [ROOT.Char.GetTopLiege.Custom('ES_ElLa')] [ROOT.Char.GetTopLiege.GetName|l] está ocupad[ROOT.Char.GetTopLiege.Custom('ES_OA')] desperdiçando a vida de nossos irmãos e irmãs em guerras sem sentido. Enquanto os generais agem sem controle, tomando poder e cargos de nossas famílias."
 tgp_dynastic_cycle.0056.desc.conquest: "[ROOT.Char.GetTopLiege.Custom('ES_ElLa')|U] [ROOT.Char.GetTopLiege.GetName|l] tem que ver que este é o único modo de manter a ordem no senhorio. Todo o mundo sob o Céu reconhecerá o reinado [ROOT.Char.GetTopLiege.Custom('ES_DelDela')] [ROOT.Char.GetTopLiege.GetTitleAsNameNoTooltip|l], se tiver o apoio de nossas famílias amadas."
 tgp_dynastic_cycle.0056.desc.instability: "[ROOT.Char.GetTopLiege.Custom('ES_ElLa')|U] [ROOT.Char.GetTopLiege.GetName|l] perdeu muita credibilidade. A única maneira de restaurar sua graça é garantir que siga nossas famílias."
 tgp_dynastic_cycle.0056.a: "A força se encontra nos laços familiares."
 ### ENTER STABILITY - NEW DYNASTY ### 0061 - 0070 ###
 tgp_dynastic_cycle.0061.t: "[GetTitleByKey('h_china').GetHolder.Custom('ElLa')|U] [GetTitleByKey('h_china').GetHolder.Custom('GetDaughterSon')] preferid[GetTitleByKey('h_china').GetHolder.Custom('ES_OA')] do Céu"
 tgp_dynastic_cycle.0061.desc: "Diz-se que o Céu é imparcial e sempre se alinha com os virtuosos. Também se diz que o vencedor se torna rei e o perdedor, bandido. O trono de [GetTitleByKey('h_china').GetNameNoTierNoTooltip] agora é #EMP mío#!, e com ele, a sanção celestial para governar toda [GetTitleByKey('h_china').GetNameNoTierNoTooltip].\n\nAgora devo decidir uma direção para que meus novos ministros e suas legiões de funcionários canalizem seus esforços."
 tgp_dynastic_cycle.0061.a: "É nosso dever promover a virtude e eliminar o vício."
 tgp_dynastic_cycle.0061.b: "Sob o vasto céu, #EMP todos#! são súditos [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip|l]."
 tgp_dynastic_cycle.0061.c: "Do alto do cume do mundo, todo o resto se tornou pequeno."
 # Notification for relevant people
 tgp_dynastic_cycle.0062.desc.involved: "Os favores concedidos pelo Céu sempre oscilaram conforme a virtude —ou a falta dela— dos soberanos escolhidos.\n\nAgora, a estrela de [GetTitleByKey('h_china').GetHolder.GetDynastyName] está em ascensão e [GetTitleByKey('h_china').GetHolder.Custom('ES_ElLa')] [GetTitleByKey('h_china').GetHolder.GetTitledFirstName|l] possui claramente a aprovação divina."
 tgp_dynastic_cycle.0062.desc.interloper: "À medida que a fortuna concedida a um[GetTitleByKey('h_china').GetHolder.Custom('ES_XA')] [GetTitleByKey('h_china').GetHolder.Custom('WomanMan')]declina, a de outra pessoa aumenta, e nem reis nem imperadores estão imunes aos caprichos do destino.\n\n[GetTitleByKey('h_china').GetHolder.Custom('ES_ElLa')|U] [GetTitleByKey('h_china').GetHolder.GetTitledFirstName|l]reivindicou o Mandato do Céu, e espera-se que todos se prostrem aos pés [GetTitleByKey('h_china').GetHolder.Custom('ES_DelDela')]nov[GetTitleByKey('h_china').GetHolder.Custom('ES_OA')]soberan[GetTitleByKey('h_china').GetHolder.Custom('ES_OA')]es."
 tgp_dynastic_cycle.0062.desc.uninvolved: "Os impérios se erguem e caem, e o antigo cede lugar ao novo. O trono de [GetTitleByKey('h_china').GetNameNoTierNoTooltip] caiu nas mãos de [GetTitleByKey('h_china').GetHolder.Custom('ES_DelDela')] [GetTitleByKey('h_china').GetHolder.GetTitledFirstName|l] e todos devem levar em conta est[GetTitleByKey('h_china').GetHolder.Custom('ES_EA')] nov[GetTitleByKey('h_china').GetHolder.Custom('ES_OA')] soberan[GetTitleByKey('h_china').GetHolder.Custom('ES_OA')], estejam em seu reino ou fora dele.\n\nTais mudanças nos ventos do destino não podem ser levadas de forma leviana."
 tgp_dynastic_cycle.0062.a: "Devemos avaliar suas capacidades com cuidado."
 tgp_dynastic_cycle.0062.b: "$tgp_dynastic_cycle.0072.b$"
 ### ENTER STABILITY - EXISTING DYNASTY ### 0071 - 0080 ###
 tgp_dynastic_cycle.0071.t: "Depois da chuva vem o sol"
 tgp_dynastic_cycle.0071.desc: "As persistentes nuvens de tempestade se dispersaram, e um céu limpo desponta sobre [GetTitleByKey('h_china').GetNameNoTierNoTooltip]. Consegui superar todas as provações que me foram impostas e agora ninguém pode negar ou duvidar de que sou verdadeiramente [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.Custom('GetDaughterSon')] escolhido[ROOT.Char.Custom('ES_OA')] do Céu.\n\nAgora que as dificuldades ficaram para trás, devo traçar um novo rumo para o futuro, para que todos possam se unir em torno de um propósito singular."
 tgp_dynastic_cycle.0071.a: "$tgp_dynastic_cycle.0061.a$"
 tgp_dynastic_cycle.0071.b: "$tgp_dynastic_cycle.0061.b$"
 # Notification for relevant people
 tgp_dynastic_cycle.0072.desc.advancement: "Após suportar um período de grandes dificuldades e convulsão, [GetTitleByKey('h_china').GetNameNoTierNoTooltip] volta a estar em paz. As tribulações enviadas pelo Céu foram superadas, e todos podem estar certos de que [GetTitleByKey('h_china').GetHolder.Custom('ES_ElLa')] [GetTitleByKey('h_china').GetHolder.GetTitledFirstName|l] mantém o favor do Céu."
 tgp_dynastic_cycle.0072.desc.expansion: "$tgp_dynastic_cycle.0051.desc.advancement$"
 tgp_dynastic_cycle.0072.desc.conquest: "$tgp_dynastic_cycle.0051.desc.advancement$"
 tgp_dynastic_cycle.0072.desc.involved: "Para alguns, isso sinaliza a morte de suas ambições, mas para muitos traz um suspiro de doce alívio."
 tgp_dynastic_cycle.0072.desc.interloper: "Os tempos de paz oferecem aos heróis valentes poucas chances de se destacar, mas agora outras vias para progredir podem se apresentar."
 tgp_dynastic_cycle.0072.desc.uninvolved: "Parece que a dinastia [GetTitleByKey('h_china').GetHolder.GetDynastyName] ainda lhe restam algumas forças."
 tgp_dynastic_cycle.0072.a: "Uma brisa primaveril sopra, e a grama cresce novamente."
 tgp_dynastic_cycle.0072.b: "O único caminho é seguir a vontade do Céu."
 tgp_china_consolidation.remain_independent: "Permanecer como um [independent_ruler|El]"
 ### ENTER CONSOLIDATION ###
 tgp_dynastic_cycle.0081.t: "O Império, há muito unido, deve se dividir"
 tgp_dynastic_cycle.0081.desc: "Num instante, o Céu troveja e o mundo vira de cabeça para baixo.\n\nOs ministros leais fogem em busca de novos senhores, os soldados negligenciam seus deveres e, agora, até mesmo os camponeses abandonam minhas terras por medo da turbulência que se aproxima.\n\nTodos os males são atribuídos ao meu reinado #EMP inicuo#!, e proclama-se por toda parte que perdi o Mandato do Céu!"
 tgp_dynastic_cycle.0081.a: "Quando a árvore cai, os macacos se dispersam."
 # Notification for relevant people
 tgp_dynastic_cycle.0082.desc.involved: "A vontade do povo e a do Céu são uma só e, nesta ocasião, o dito se confirma: #EMP se ha perdido el Mandato del Cielo#!.\n\nA nação se despedaçou; dragões e tigres disputam, avidamente, o trono.\n\nTempos turbulentos nos aguardam."
 tgp_dynastic_cycle.0082.desc.interloper: "Onde antes havia um só, agora há muitos.\n\nCom a perda do Mandato do Céu, não há governante legítimo a quem obedecer, e todas as aparências foram abandonadas, todas as ambições ocultas foram reveladas.\n\nO ousado deve aproveitar as oportunidades assim que elas surgem."
 tgp_dynastic_cycle.0082.desc.uninvolved: "Uma poderosa nação arde, e seus súditos se armam para lutar por suas cinzas.\n\n[GetTitleByKey('h_china').GetNameNoTierNoTooltip] se fragmentou, e a convulsão é a única certeza em seu futuro previsível; e aqueles que se envolverem na turbulência que está por vir entrarão voluntariamente na toca do tigre."
 tgp_dynastic_cycle.0082.a: "A crise é uma oportunidade."
 ### ENTER CORRUPTION ###
 tgp_dynastic_cycle.0091.t: "O presságio do sofrimento"
 tgp_dynastic_cycle.0091.desc: "Apesar de meus diligentes esforços para governar com retidão, cada vez ouço mais sussurros de descontentamento.\n\nDevo encarar a incômoda possibilidade de que a fé em que meu reinado tem o favor do Céu comece a vacilar, pois tais sentimentos podem abalar até os alicerces mais sólidos de um trono."
 tgp_dynastic_cycle.0091.a: "A água que mantém um navio flutuando também pode virá-lo."
 # Notification for relevant people
 tgp_dynastic_cycle.0092.desc.involved: "O mundo sofre de uma doença. Um mal do espírito.\n\nA malevolência e a má conduta se espalham sem controle onde antes se erguiam sólidos pilares da virtude. Funcionários imorais se enriquecem às custas das massas que governam, e os soldados se perguntam se é melhor saquear do que proteger."
 tgp_dynastic_cycle.0092.desc.interloper: "Parece que nem tudo vai bem em [GetTitleByKey('h_china').GetNameNoTierNoTooltip].\n\nA cada dia que passa, outra caravana ou comboio foge de suas terras em busca dos proverbiais pastos mais verdes. Até os mais gananciosos de nossos mercadores preferem cada vez mais nossas terras às deles, tecendo tristes histórias de extorsão à ponta da espada e da pena."
 tgp_dynastic_cycle.0092.desc.uninvolved: "$tgp_dynastic_cycle.0092.desc.interloper$"
 tgp_dynastic_cycle.0092.a: "A perversidade é uma doença que nenhum remédio pode curar."
 tgp_dynastic_cycle.9001.t: "A fundação de um Estado"
 tgp_dynastic_cycle.9001.desc: "Assim como todos os rios correm para leste em direção ao mar, assim também as massas que habitam sob o Céu agora se voltam para mim como seu soberan[ROOT.Char.Custom('ES_OA')].\n\nO primeiro passo para inaugurar meu reinado deve ser pronunciar o nome do nosso reino, para que todos possam saber como chamar aquilo a que pertencem.\n\nSob que nome nossos feitos ecoarão pela história?"
 tgp_dynastic_cycle.9001.a: "Que se ouça e se saiba!" # 咸使聞知
 tgp_dynastic_cycle.9002.t: "Os elementos da virtude"
 tgp_dynastic_cycle.9002.desc: "O Céu tem cinco elementos que devem ser devidamente regulados e harmoniosamente observados.\n\nMadeira, fogo, terra, metal e água.\n\nDesde os tempos dos antigos, cada nova dinastia ascendente adotou para si um desses agentes elementais da mudança e tingiu seus estandartes de acordo, e agora eu também devo tomar essa decisão."
 tgp_dynastic_cycle.9002.yellow: "Escolho o #color:{0.82,0.77,0.5};bold amarillo#!; símbolo da terra, inalterável como nossos alicerces."
 tgp_dynastic_cycle.9002.red: "Que seja o #color:{0.80,0.3,0.3};bold rojo#!, como o fogo que arde ferozmente em meu coração."
 tgp_dynastic_cycle.9002.white: "Um #color:{1.0,1.0,1.0};bold blanco#! puro e imaculado, para o metal firme e inabalável."
 tgp_dynastic_cycle.9002.black: "Nossos estandartes devem ser #color:{0.4,0.39,0.37};bold negros#! , como águas ilimitadas e insondáveis."
 tgp_dynastic_cycle.9002.green: "Deve ser o #color:{0.4,0.61,0.3};bold verde#!, como as folhas da primavera e o crescimento viçoso."
 tgp_dynastic_cycle_decision_event.0101.t: "$renounce_noble_family_title_decision$"
 tgp_dynastic_cycle_decision_event.0101.desc: "Esforço-me para enxergar por cima da pilha de documentos que não para de crescer. Quando fecho os olhos, tudo o que consigo ouvir são as crianças brincando, os anciãos conversando e os adultos se deliciando em um banquete. Ah, o aroma de uma porção de [ROOT.Char.Custom('RegionalEdibleMeat')] assando!\n\nTrabalhei tanto para chegar até aqui e desfrutei muito disso, mas agora sinto o cansaço. Tenho certeza de que meu [new_player.Custom2('MyCharacterIntroduction', ROOT.Char)] anseia por ocupar meu lugar.\n\nMereço aproveitar o tempo que me resta."
 tgp_dynastic_cycle_decision_event.0101.a: "Confio que [new_player.GetFirstNameNoTooltip] cuide de tudo."
 dynastic_cycle_entered_conquest_tt: "[GetSituation('dynastic_cycle').GetName] entrou em [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_instability_conquest').GetName]"
 dynastic_cycle_entered_chaos_tt: "[GetSituation('dynastic_cycle').GetName] entrou em [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_chaos').GetName]"
 dynastic_cycle_entered_chaos_changed_top_liege_tt: "[new_top_liege.GetShortUIName] tornou-se seu novo [top_liege|El]"
 dynastic_cycle_entered_chaos_became_independent_tt: "[relevant_character.GetShortUIName|U] se torna [independent|El]"
 chaos_new_vassals_tt: "Tornaram-se seus [vassals|El] #weak ([chaos_new_vassals_count])#!"
 custom.chaos_new_vassals: "$BULLET$ Todos os membros [Concept('independent', 'independentes')|E] do [movement|lE] e [disciples|El] de um [title_tier|El] inferior a #V você#! adjacentes ao seu [realm|El]"
 custom.chaos_new_vassals_disciples: "$BULLET$ Todos os [disciples|lE] [Concept('independent', 'independentes')|E] de um [title_tier|El] inferior a #V você#! adjacentes ao seu [realm|El]"
