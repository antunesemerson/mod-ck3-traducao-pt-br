 favor_dynastic_cycle_era_hegemon_desc: "As cargas do Estado pesam enormemente sobre mim. Cabe-me cumprir e sustentar o [mandate_of_heaven|E], e as rodas de tal [GetSituation('dynastic_cycle').GetName|l] giram inexoravelmente com cada decisão que tomo. O futuro de todos os que habitam sob o Céu repousa em minhas mãos; será nosso futuro de paz e prosperidade, ou de vitórias conquistadas e soberanos estrangeiros levados à submissão?"
 favor_dynastic_cycle_era_chaos_desc: "Se algum dia eu houver de aceitar a sagrada responsabilidade do [mandate_of_heaven|E], então devo me conduzir como um soberano o faria e pensar nas multidões que me contemplarão como governante de toda a terra sob o Céu. #EMP Cuando#! o momento chegar, que chegará, será um futuro de paz e prosperidade, ou de vitórias conquistadas e soberanos estrangeiros submetidos?"
