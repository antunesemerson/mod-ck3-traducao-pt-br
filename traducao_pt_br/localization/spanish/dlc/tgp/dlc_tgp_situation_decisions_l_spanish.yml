 claim_mandate_turn_vassal_celestial_desc: "Todo [vassal|lE] [de_jure|lE] de [GetTitleByKey('h_china').GetDefinitiveName|U] em teu [realm|lE] que não seja uma [GetGovernment( 'republic_government' ).GetNameWithIcon|l] ou uma [GetGovernment( 'theocracy_government' ).GetNameWithIcon|l] adotará o [government|lE] [GetGovernment( 'celestial_government' ).GetNameWithIcon|l]"
