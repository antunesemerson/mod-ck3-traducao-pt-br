 claim_mandate_decision_county_percentage_tt: "#V Debes#! controlar ao menos [SCOPE.ScriptValue('claim_mandate_china_county_percentage_value')|V%0] dos [counties|lE] [de_jure|lE] de [GetTitleByKey('h_china').GetDefinitiveName] #weak (atualmente: [SCOPE.ScriptValue('claim_mandate_china_control_percent_value')|0] %)#!"
