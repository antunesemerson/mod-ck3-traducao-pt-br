l_spanish:
 # Celestial
 game_concept_celestial_government: "Governo celestial"
 game_concept_celestial: "Celestial"
 game_concept_celestials: "Celestiais"
 game_concept_celestial_i: "@government_type_celestial!"
 game_concept_celestial_government_desc: "$game_concept_celestial$ é o nome de uma [government_form|lE] [Concept('government_bureaucratic_type', 'burocrática')|E] onde o [liege|lE] nomeia personagens como [governors|lE] de dois tipos: [civilian_governor_short|lE] e [military_governor_short|lE].\n\nOs personagens têm acesso a [influence|lE], [noble_families|lE], [family_estates|lE] e [treasury|lE].\n\nOs [rulers|lE] independentes têm [legitimacy|lE], enquanto os [vassals|lE] se concentram em obter [merit|lE]."
 # Merit
 game_concept_merit: "Mérito"
 game_concept_meritorious: "Meritório"
 game_concept_merit_desc: "O $game_concept_merit$ de um [character|lE] indica seu progresso rumo ao próximo [merit_level|lE]. Todos os personagens com um [elder|lE] ou [disciples|lE] geram um ganho passivo de mérito.\n\nOs [governors|lE] podem aumentar o $game_concept_merit$ por meio da construção de [buildings|lE] em suas [holdings|lE] designadas, realizando a [activity|lE] de [inspection|lE], participando de um [GetActivityType('activity_debate').GetName|l] e prestando [examinations|lE].\n\nOs governadores do tipo [GetSubjectContractType( 'celestial_provinces' ).GetObligationNameShort( 'celestial_province_standard' )|l] aumentam o ganho mensal de mérito ao pagar mais [taxes|lE] ao seu [liege|lE], enquanto os governadores do tipo [GetSubjectContractType( 'celestial_provinces' ).GetObligationNameShort( 'celestial_province_military' )|l] o aumentam ao criar [men_at_arms|lE].\n\nQuem não for $game_concept_governors$ pode tentar aumentá-lo prestando [examinations|lE]."
 game_concept_merit_i: "@merit_icon!"
 game_concept_merit_level: "Grau de mérito"
 game_concept_merit_level_desc: "O $game_concept_merit_level$ de um [character|lE] indica o quão adequado é como [governor|lE] em [administrative_governments|lE] da Ásia Oriental.\n\nRepresenta suas realizações documentadas e sua conduta moral, de acordo com os ideais confucianos, por meio da quantidade de [merit|lE] que tenha acumulado.\n\nUm funcionário com um $game_concept_merit_level$ elevado tem uma [candidate_score|lE] e um [governor_salary|lE] maiores.\n\nOs níveis são:\n $EFFECT_LIST_BULLET$[GetModifier( 'merit_level_0' ).GetNameWithTooltip|L]\n $EFFECT_LIST_BULLET$[GetModifier( 'merit_level_1' ).GetNameWithTooltip|L]\n $EFFECT_LIST_BULLET$[GetModifier( 'merit_level_2' ).GetNameWithTooltip|L]\n $EFFECT_LIST_BULLET$[GetModifier( 'merit_level_3' ).GetNameWithTooltip|L]\n $EFFECT_LIST_BULLET$[GetModifier( 'merit_level_4' ).GetNameWithTooltip|L]\n $EFFECT_LIST_BULLET$[GetModifier( 'merit_level_5' ).GetNameWithTooltip|L]\n $EFFECT_LIST_BULLET$[GetModifier( 'merit_level_6' ).GetNameWithTooltip|L]\n $EFFECT_LIST_BULLET$[GetModifier( 'merit_level_7' ).GetNameWithTooltip|L]\n $EFFECT_LIST_BULLET$[GetModifier( 'merit_level_8' ).GetNameWithTooltip|L]\n $EFFECT_LIST_BULLET$[GetModifier( 'merit_level_9' ).GetNameWithTooltip|L]"
 game_concept_merit_levels: "Graus de mérito"
 game_concept_merit_level_impact: "Impacto por grau de mérito"
 game_concept_merit_level_impact_desc: "O impacto por grau de mérito aumenta ou diminui os [modifiers|El] obtidos da sua [merit_level|El] atual."
 # Imperial Examinations
 game_concept_imperial_examination: "Exame para o serviço público"
 game_concept_imperial_examinations: "Exames para a administração pública"
 game_concept_examination: "Exame"
 game_concept_examinations: "Exames"
 game_concept_imperial_examination_desc: "Os $game_concept_imperial_examinations$ têm um papel fundamental nas funções [Concept('administrative', 'administrativas')|E] de [governments|lE] [GetGovernment('celestial_government').GetName|lE] e [GetGovernment('meritocratic_government').GetName|lE]. \n\nPor meio do sistema de exames, os burocratas são nomeados por [merit|lE] em vez de por linhagem, garantindo que os eruditos mais brilhantes, independentemente de sua origem, possam obter nomeações de [governorship|lE]. \n\nOs níveis dos exames são: \n#indent_newline:2 $EFFECT_LIST_BULLET$#bold Infantil#!: os pais podem fazer com que seus filhos façam o exame a partir dos [EmptyScope.ScriptValue('child_exam_min_age')] anos por meio da [interaction|lE] $send_child_to_examination_interaction$.#! \n#indent_newline:2 $EFFECT_LIST_BULLET$#bold Provincial#!: personagens que não possuem [Concept('landed', 'terras')|E] podem tentar o segundo nível de Exames por meio da [activity|lE] [GetActivityType('activity_local_examination').GetName].#! \n#indent_newline:2 $EFFECT_LIST_BULLET$#bold Metropolitano#!: realizado pelo [government|lE] [GetGovernment('celestial_government').GetName|lE] por meio da [activity|lE] [GetActivityType('activity_imperial_examination').GetName].#! \n#indent_newline:2 $EFFECT_LIST_BULLET$#bold Palaciego#!: os candidatos finais [EmptyScope.ScriptValue('metropolitan_exam_final_entrants_loc')|l] do $activity_imperial_examination$ são convidados para um banquete no palácio real, para conhecer e demonstrar seu valor ao [son_of_heaven|E] e mostrar a ele seu valor.#!"
 game_concept_exam_cheat: "Cola na prova"
 game_concept_exam_cheat_desc: "Uma $game_concept_exam_cheat$ desbloqueia opções que podem ser usadas para burlar o próximo exame. Mas cuidado, ser pego sai caro."
 game_concept_childrens_examination_i: "@child_exam_icon"
 game_concept_childrens_examination: "Exame infantil"
 game_concept_childrens_examination_desc: "Os [imperial_examinations|El] de primeiro nível, realizados a partir dos [EmptyScope.ScriptValue('child_exam_min_age')] anos de idade. Os pais podem enviar seus filhos para o exame por meio da [interaction|El] $send_child_to_examination_interaction$."
 game_concept_provincial_examination_i: "@provincial_exam_icon"
 game_concept_provincial_examination: "Exame provincial"
 game_concept_provincial_examination_desc: "Os [imperial_examinations|El] de segundo nível, realizados por meio da [activity|El] [GetActivityType('activity_local_examination').GetName].\n\n#S Al aprobarse:#!\n[GetModifier( 'tgp_passed_provincial_exam_modifier' ).GetDescWithEffects]."
 game_concept_metropolitan_examination_i: "@metropolitan_exam_icon"
 game_concept_metropolitan_examination: "Exame metropolitano"
 game_concept_metropolitan_examination_desc: "Os [imperial_examinations|El] de terceiro nível. Realizados pelo [government|El] [GetGovernment('celestial_government').GetName|E] mediante a [activity|El] [GetActivityType('activity_imperial_examination').GetName].\n\n#S Ao passar:#!\n[GetModifier( 'tgp_passed_metropolitan_exam_modifier' ).GetDescWithEffects]."
 game_concept_palace_examination_i: "@palace_exam_icon"
 game_concept_palace_examination: "Exame palaciano"
 game_concept_palace_examination_desc: "Os quartos e últimos [imperial_examinations|El]. Os examinados finais [EmptyScope.ScriptValue('metropolitan_exam_final_entrants_loc')] do [GetActivityType('activity_imperial_examination').GetName] são convidados para um banquete no palácio real, para se prostrarem diante do [son_of_heaven|El] e demonstrarem seu valor.\n\n#S Al aprobarse:#!\n[GetModifier( 'tgp_passed_palace_exam_modifier' ).GetDescWithEffects]."
 game_concept_exam_advantage: "Vantagem em exame"
 game_concept_exam_advantage_desc: "A $game_concept_exam_advantage$ melhora as chances de várias ações durante uma [imperial_examination|El], como ao responder perguntas e demonstrar habilidades."
 game_concept_exam_score: "Nota de prova"
 game_concept_exam_score_desc: "A $game_concept_exam_score$ determina a probabilidade de um candidato ser aprovado em um [imperial_examination|El].\n\nA pontuação inicial se baseia no [trait|El] [GetTrait('confucian_education').GetName( GetNullCharacter )] do candidato, assim como em sua [learning|El], [stewardship|El] e [skills|El] [Concept('martial', 'marciales' )|E] dependendo do foco da $game_concept_examination$.\n\nSomente os dez primeiros candidatos da [activity|El] [GetActivityType('activity_imperial_examination').GetName] poderão tentar o #V examen palaciego#! @palace_exam_icon!."
 game_concept_merit_pool: "Lista de candidatos"
 game_concept_merit_pools: "Listas de candidatos"
 game_concept_merit_pool_possessive: "Da lista de candidatos"
 game_concept_merit_pool_desc: "A $game_concept_merit_pool$ contém todos os [characters|El] que são candidatos em potencial para obter [titles|El] com certos tipos de [appointment|El].\n\nOs candidatos são ordenados com base em sua [candidate_score|El]. Algumas [appointment_succession_laws|El] usam [merit|El], que ordena os candidatos primeiro pelo seu [merit_level|El] e depois pela $game_concept_candidate_score$.\n\nQuando o [holder|El] de um título com $game_concept_appointment$ morre, o título passará para o personagem de maior posição na lista. Se o personagem já possuir um título, o título deverá ter uma maior [appointment_prominence|El], caso contrário, ele passará para o próximo personagem."
 game_concept_appointment_prominence: "Prominência"
 game_concept_appointment_prominence_desc: "A $game_concept_appointment_prominence$ reflete o quão desejável é um [title|lE] para os candidatos elegíveis.\n\nA um candidato que já possua um título só será concedido um novo do mesmo [title_tier|lE] se tiver uma $game_concept_appointment_prominence$ maior.\n\nA proeminência geralmente se baseia na riqueza local e na proximidade da [realm_capital|lE], mas outros fatores podem se aplicar dependendo das circunstâncias, como o tamanho dos [title_men_at_arms|El] para os [military_governors|El]"
 game_concept_entrant: "Examinando"
 game_concept_entrants: "Ingressantes"
 game_concept_entrant_desc: "Um $game_concept_entrant$ é um personagem que testa sua têmpera na [activity|lE] da [imperial_examination|lE]."
 game_concept_subject_standing: "Posição de súdito"
 game_concept_subject_standing_desc: "$game_concept_subject_standing$ indica o status que um [suzerain|lE] ou [liege|lE] concede a um [tributary|lE] ou [vassal|lE]."
 game_concept_imperial_grace: "Graça imperial"
 game_concept_imperial_grace_desc: "A $game_concept_imperial_grace$ indica o status concedido a um [son_of_heaven|E] pelo [tributary|lE].\n\nUma [Concept( 'imperial_grace', '$game_concept_imperial_grace|q$' )|l] elevada pode fazer com que privilégios especiais sejam concedidos ao $game_concept_tributary$ durante as [tribute_missions|lE]. Em níveis baixos de $game_concept_imperial_grace$ , o $game_concept_son_of_heaven$ pode #EMP exigirte#! tributo de você e, se chegar a zero, pode significar o fim da relação."
 game_concept_seal_of_investiture: "Selo de Investidura"
 game_concept_seal_of_investiture_desc: "O $game_concept_seal_of_investiture$, documento legal e, ao mesmo tempo, um símbolo venerado da graça do Filho do Céu, representa a condição especial de seu portador como [tributary|lE] leal e favorecido de [SelectLocalization( GetPlayer.IsValid, 'game_concept_seal_of_investiture_desc_ingame', 'h_china' )].\n\nPode-se conceder um $game_concept_seal_of_investiture$ a $game_concept_tributaries$ com uma [imperial_grace|lE] alta ao final de uma #bold missão tributária#! bem-sucedida."
 game_concept_seal_of_investiture_desc_ingame: "[GetTitleByKey('h_china').GetDefinitiveName]"
 HAS_SEAL_OF_INVESTITURE: "Você possui um [seal_of_investiture|El]"
 NO_SEAL_OF_INVESTITURE: "Você não possui um [seal_of_investiture|lE]"
 SUBJECT_STANDING_CONCEPT: "[subject_standing|E]"
 SUBJECT_STANDING_IMPERIAL_GRACE_CONCEPT: "[imperial_grace|E]"
 IMPERIAL_GRACE_ICON: "@imperial_grace!"
 IMPERIAL_GRACE_LOSS_STABILITY: "Como o [dynastic_cycle|lE] está atualmente na fase de $situation_dynastic_cycle_phase_stability$, todos os #EMP $tributaries_celestial$#! perdem [EmptyScope.ScriptValue('imperial_grace_loss_situation_dynastic_cycle_phase_stability')|V1] de [imperial_grace|lE] @imperial_grace! por ano."
 IMPERIAL_GRACE_LOSS_STABILITY_EXPANSION: "Como o [dynastic_cycle|lE] está atualmente na fase de $situation_dynastic_cycle_phase_stability_expansion$, todos os #EMP $tributaries_celestial$#! perdem [EmptyScope.ScriptValue('imperial_grace_loss_situation_dynastic_cycle_phase_stability_expansion')|V1] de [imperial_grace|lE] @imperial_grace! por ano."
 IMPERIAL_GRACE_LOSS_STABILITY_ADVANCEMENT: "Como o [dynastic_cycle|lE] está atualmente na fase de $situation_dynastic_cycle_phase_stability_advancement$, todos os #EMP $tributaries_celestial$#! perdem [EmptyScope.ScriptValue('imperial_grace_loss_situation_dynastic_cycle_phase_stability_advancement')|V1] de [imperial_grace|lE] @imperial_grace! por ano."
 IMPERIAL_GRACE_LOSS_INSTABILITY: "Como o [dynastic_cycle|lE] está atualmente na fase de $situation_dynastic_cycle_phase_stability_advancement$, todos os #EMP $tributaries_celestial$#! perdem [EmptyScope.ScriptValue('imperial_grace_loss_situation_dynastic_cycle_phase_instability')|V1] de [imperial_grace|lE] @imperial_grace! por ano."
 IMPERIAL_GRACE_LOSS_INSTABILITY_CONQUEST: "Como o [dynastic_cycle|lE] está atualmente na fase de $situation_dynastic_cycle_phase_instability_conquest$, todos os #EMP $tributaries_celestial$#! perdem [EmptyScope.ScriptValue('imperial_grace_loss_situation_dynastic_cycle_phase_instability_conquest')|V1] de [imperial_grace|lE] @imperial_grace! ao ano."
 IMPERIAL_GRACE_LOSS_CHAOS: "Como o [dynastic_cycle|lE] está atualmente na fase de $situation_dynastic_cycle_phase_chaos$, todos os #EMP $tributaries_celestial$#! perdem [EmptyScope.ScriptValue('imperial_grace_loss_situation_dynastic_cycle_phase_chaos')|V1] de [imperial_grace|lE] @imperial_grace! por ano."
 # Mandate
 game_concept_mandate_of_heaven: "Mandato do Céu"
 game_concept_mandate_of_heaven_mandate: "Mandato"
 game_concept_mandate_of_heaven_desc: "O $game_concept_mandate_of_heaven$ é uma classe de [legitimacy|lE] especial, disponível apenas para o [son_of_heaven|E]. Representa o direito do monarca de governar e indica quem é considerado o governante supremo sob o Céu.\n\nO mandato está intimamente ligado ao [dynastic_cycle|lE]. O ciclo afeta como o monarca reinante ganha legitimidade e também pode mudar de [situation_dynastic_cycle_phase|lE] de acordo com o nível de mandato do monarca."
 game_concept_son_of_heaven: "Filho do Céu"
 game_concept_son_of_heaven_possessive: "do Filho do Céu"
 game_concept_son_of_heaven_desc: "O $game_concept_son_of_heaven$ é o [hegemon|El] da China e [top_liege|El] do [celestial_government|El].\n\nO $game_concept_son_of_heaven$ tem uma forma especial de [legitimacy|El], o [mandate_of_heaven|E], e um [situation_participant_group|El] único que simplesmente é chamado de \"$game_concept_son_of_heaven$\"."
 # Treasury
 game_concept_treasury_i: "@treasury_icon!"
 game_concept_treasury: "Tesouro"
 game_concept_treasury_desc: "Em certos [administrative_governments|lE], o tesouro representa os recursos que só podem ser usados para fins governamentais, em contraste com seu [gold|lE] pessoal.\n\n$BULLET$#indent_newline:2 Como [vassal|lE], você receberá tesouro de seu [liege|lE], com base em suas contribuições de [Concept('tax', 'impostos')|E] e outras obrigações#!\n$BULLET$#indent_newline:2 O tesouro é criado pelo [top_liege|lE], que converte uma porcentagem da renda de [taxation|lE] em tesouro#!\n$BULLET$#indent_newline:2 Você pode transferir [gold|lE] para o tesouro à vontade#!\n$BULLET$#indent_newline:2 O tesouro permanece com o [title|lE] se ele receber um novo [holder|lE]#!"
 game_concept_imperial_treasury_i: "$game_concept_treasury_i$"
 game_concept_imperial_treasury: "Tesouro imperial"
 game_concept_imperial_treasury_desc: "$game_concept_treasury_desc$"
 game_concept_treasury_vassal_development: "Desenvolvimento dos vassalos"
 game_concept_treasury_vassal_development_desc: "Tesouro enviado aos [vassals|lE] diretos por meio de seu [liege|lE] , com base em suas contribuições fiscais e outras [obligations|lE]."
 game_concept_treasury_ministry_budget: "Orçamento do ministério"
 game_concept_treasury_ministry_budget_short: "Ministério"
 game_concept_treasury_ministry_budget_desc: "Tesouro enviado aos [vassals|lE] desde o governo central com o objetivo de financiar os [ministries|lE]. Baseia-se na alocação calculada periodicamente das receitas do [treasury|El] do [top_liege|lE]."
 game_concept_treasury_salary_budget: "Orçamento de salários"
 game_concept_treasury_salary_budget_short: "Salário"
 game_concept_treasury_salary_budget_desc: "Tesouro enviado aos [vassals|lE] desde o governo central, que é recebido na forma de [gold|lE] para ser usado como salário pessoal. Baseia-se na alocação calculada periodicamente da renda do [treasury|El] do [top_liege|lE]."
 game_concept_treasury_military_budget: "Orçamento militar"
 game_concept_treasury_military_budget_short: "Militar"
 game_concept_treasury_military_budget_desc: "Tesouro enviado aos [vassals|lE] da [province|El] militar desde o governo central com o objetivo de financiar atividades militares adicionais. Baseia-se na alocação calculada periodicamente das receitas do [treasury|El] do [top_liege|lE]."
 game_concept_governor_salary: "Salário do governador"
 game_concept_governor_salary_desc: "Em [administrative_governments|E] que diferenciam entre [gold|lE] e [treasury|lE], os [governors|lE] recebem um salário em $game_concept_gold$."
 game_concept_treasury_budgeting: "Orçamentação do Tesouro"
 game_concept_treasury_budget: "Orçamento do Tesouro"
 game_concept_treasury_budgeting_desc: "Um sistema responsável por distribuir fundos centrais a [vassals|El] e subvassalos específicos, em taxas de alocação determinadas.\n\nQuando um orçamento é promulgado, uma [treasury_budget_base_rate|El] por vassalo é calculada para cada [treasury_budget_category|El] com base na [treasury_budget_capacity|lE] disponível.\n\n@alert_icon! A taxa base calculada #bold não será alterada#! até que um novo orçamento seja promulgado no futuro! Portanto, se você receber mais destinatários, os custos do seu orçamento aumentarão."
 game_concept_treasury_budget_capacity: "Capacidade orçamentária"
 game_concept_treasury_budget_capacity_desc: "A quantia mensal de [treasury|El] disponível para [treasury_budgeting|El]. É composta pela renda do tesouro menos as despesas regulares não gerenciadas pelo orçamento, como o [treasury_vassal_development|El] e as [court_amenities|El]."
 game_concept_treasury_budget_category: "Categoria orçamentária"
 game_concept_treasury_budget_category_desc: "Uma parte distinta da [treasury_budgeting|El] à qual se pode alocar orçamento. Cada categoria orçamentária pode ter diferentes destinatários, e pode ser paga em [gold|El] em vez de [treasury|El]."
 game_concept_treasury_budget_base_rate: "Taxa base orçamentária"
 game_concept_treasury_budget_base_rate_short: "Taxa base"
 game_concept_treasury_budget_base_rate_desc: "A quantidade que recebe um destinatário padrão de uma [treasury_budget_category|El]. Os destinatários podem receber uma quantidade maior ou menor que a taxa base dependendo de seu [title_rank|El], seu [merit_level|El] ou outros modificadores."
 game_concept_treasury_budget_category_trend: "Tendência da categoria orçamentária"
 game_concept_treasury_budget_category_trend_short: "Tendência"
 game_concept_treasury_budget_category_trend_desc: "A diferença em [treasury|lE] que uma [treasury_budget_category|lE] receberá em comparação com o orçamento promulgado anteriormente."
 game_concept_treasury_budget_unallocated: "Orçamento do Tesouro não alocado"
 game_concept_treasury_budget_unallocated_short: "Não alocado"
 game_concept_treasury_budget_unallocated_desc: "Todo orçamento da Tesouraria não alocado contribuirá para a renda geral de [treasury|l]."
 game_concept_treasury_budget_deficit: "Déficit do orçamento do Tesouro"
 game_concept_treasury_budget_deficit_short: "Déficit"
 game_concept_treasury_budget_deficit_desc: "Ao gastar mais do que a [treasury_budget_capacity|El], a quantia será subtraída da renda mensal do [treasury|El]."
 # Celestial Bureaucracy
 game_concept_celestial_bureaucracy: "Burocracia celestial"
 game_concept_celestial_bureaucracy_desc: "$game_concept_celestial_bureaucracy$ indica o nível de centralização dos [realms|lE] [Concept( 'celestial', 'celestiales' )|E] e o poder geral que o [ruler|lE] exerce sobre seus [vassals|lE].\n\nSomente o [top_liege|lE] pode mudar a $game_concept_celestial_bureaucracy$. Os $game_concept_vassals$ celestiais usam o mesmo nível que seu $game_concept_liege$.\n\nExistem quatro níveis de $game_concept_celestial_bureaucracy$:\n $EFFECT_LIST_BULLET$$celestial_bureaucracy_0$\n $EFFECT_LIST_BULLET$$celestial_bureaucracy_1$\n $EFFECT_LIST_BULLET$$celestial_bureaucracy_2$\n $EFFECT_LIST_BULLET$$celestial_bureaucracy_3$\n\nAumentar a burocracia celestial custa uma quantidade de [prestige|lE] que depende do [realm_size|lE] e da [learning_skill|lE] do governante."
 game_concept_minister: "Ministro"
 game_concept_ministers: "Ministros"
 game_concept_minister_possessive: "do ministro"
 game_concept_ministers_possessive: "dos ministros"
 game_concept_minister_desc: "Os $game_concept_ministers$ são um tipo de [councillors|El] a serviço do [council|El], do [ministry|El] ou do [son_of_heaven|E].\n\nCada ministro tem certo número de responsabilidades, como financiar [great_projects|El] e ajudar os [governors|El] de várias maneiras."
 game_concept_ministry: "Ministério"
 game_concept_ministries: "Ministérios"
 game_concept_ministry_possessive: "do ministério"
 game_concept_ministries_possessive: "dos ministérios"
 game_concept_ministry_desc: "O $game_concept_ministry$ é um tipo de [council|El] que está disponível apenas para o [son_of_heaven|E].\n\nHá nove [ministers|El]. Cada um deles representa o mais alto nível de governo e está à frente de seu próprio departamento. Eles são organizados em uma hierarquia, permitindo que um Ministro de patente inferior seja promovido a um cargo de patente superior, com base na [appointment_prominence|El] do [title|El].\n\nOs $game_concept_ministers$ são:\n $EFFECT_LIST_BULLET$[minister_grand_chancellor|E]\n $EFFECT_LIST_BULLET$[minister_censor|E]\n $EFFECT_LIST_BULLET$[minister_grand_marshal|E]\n $EFFECT_LIST_BULLET$[minister_of_personnel|E]\n $EFFECT_LIST_BULLET$[minister_of_war|E]\n $EFFECT_LIST_BULLET$[minister_of_revenue|E]\n $EFFECT_LIST_BULLET$[minister_of_justice|E]\n $EFFECT_LIST_BULLET$[minister_of_rites|E]\n $EFFECT_LIST_BULLET$[minister_of_works|E]"
 game_concept_minister_grand_chancellor: "$councillor_chancellor_celestial_government_imperial$"
 game_concept_minister_grand_chancellor_desc: "O $game_concept_minister_grand_chancellor$ é o [minister|El] de mais alta patente e está encarregado dos assuntos diplomáticos. Normalmente, recebe o cargo de [grand_secretariat_director|El].\n\nO chanceler pode ser o [grand_secretariat_director|El] designado, dependendo da [law|El] #V [GetLawGroup('grand_secretariat_laws').GetName]#!.\n\n$minister_grand_chancellor_action_breakdown$"
 game_concept_minister_grand_chancellor_possessive: "$councillor_chancellor_celestial_government_imperial_possessive$"
 minister_grand_chancellor_action_breakdown: "#indent_newline:4 #weak O ministro pode, por exemplo:\n$BULLET$ Usar a [decision|El] [GetDecision('favored_movement_consults_heaven_decision').GetName|V]\n$BULLET$ Convidar [Concept('courtier', 'cortesões')|E] de qualquer tipo com a [decision|El] [GetDecision('tgp_minister_recruit_courtiers_decision').GetName|V]\n$BULLET$ Acessar as opções especiais da [interaction|El] #V $influence_meritorious_career_interaction$#! e a um custo reduzido\n$BULLET$ Começar o [great_project|El] [GetGreatProjectType('minister_compel_religious_uniformity').GetName|V]#!#!"
 game_concept_minister_censor: "$councillor_spymaster_celestial_government_imperial$"
 game_concept_minister_censor_desc: "O $game_concept_minister_censor$ é o [minister|El] responsável pelos assuntos de intriga e inteligência.\n\nCuidado para não ter um Censor desleal! Ele pode facilmente ocultar ou participar de [schemes|El] contra você e sua [close_family|El].\n\nO Censor pode ser o [grand_secretariat_director|El] designado, dependendo da [law|El] [GetLawGroup('grand_secretariat_laws').GetName|V].\n\n $minister_censor_action_breakdown$"
 game_concept_minister_censor_possessive: "$councillor_spymaster_celestial_government_imperial_possessive$"
 minister_censor_action_breakdown: "#indent_newline:4 #weak O ministro pode, por exemplo:\n$BULLET$ Usar a [interaction|El] #V $censor_find_secrets_interaction$#! para encontrar [secrets|El] nas [courts|El] dos [Concept('vassal', 'vassalos')|E], que você pode usar para obter uma recompensa em [goldE] [gold_i] do seu [liege|El] ou conseguir [hooks|El]\n$BULLET$[Concept('blackmail', 'Chantagear')|E] acionará o [dynastic_cycle_catalyst|El] #V $catalyst_minister_blackmailed$#!\n$BULLET$ Acessar as opções especiais da [interaction|El] #V $influence_meritorious_career_interaction$#!#!#!"
 game_concept_minister_grand_marshal: "$minister_grand_marshal$"
 game_concept_minister_grand_marshal_desc: "O $game_concept_minister_grand_marshal$ é o comandante de mais alto escalão no [realm|El] e comanda um [army|El] de [title_men_at_arms|El].\n\nO marechal pode ser o [grand_secretariat_director|lE] designado, dependendo da [law|El] #V [GetLawGroup('grand_secretariat_laws').GetName]#!.\n\n $minister_grand_marshal_action_breakdown$"
 game_concept_minister_grand_marshal_possessive: "$minister_grand_marshal_possessive$"
 minister_grand_marshal_action_breakdown: "#indent_newline:4 #weak O ministro pode, por exemplo:\n$BULLET$Começar o [great_project|El] #V Grande Campanha#!\n$BULLET$Começar o [great_project|El] [GetGreatProjectType('construct_great_barracks').GetName|V]\n$BULLET$Usar os [casus_bellis|El] #V $CHINA_SEIZE_COUNTY_CB_NAME$#! e #V $CHINA_SEIZE_DUCHY_CB_NAME$#! em [dynastic_cycle_eras_short|El] de [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_stability_expansion').GetName|l] e [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_instability_conquest').GetName|l]\n$BULLET$Acessar as opções especiais da [interaction|El] #V $influence_meritorious_career_interaction$#!#!#!"
 game_concept_minister_of_personnel: "$minister_personnel$"
 game_concept_minister_of_personnel_desc: "O $game_concept_minister_of_personnel$ é o [minister|El] responsável por todos os assuntos relacionados aos [appointments|El] e pode afetar enormemente o [candidate_score|El] de outros [characters|El].\n\n $minister_of_personnel_action_breakdown$"
 game_concept_minister_of_personnel_possessive: "$minister_personnel_possessive$"
 minister_of_personnel_action_breakdown: "#indent_newline:4 #weak O ministro pode, por exemplo:\n$BULLET$ Usar a [interaction|El] #V $force_governor_removal_interaction$#! para demitir os [governors|El] independentemente da [law|El] [GetLawGroup('celestial_retirement_law').GetName]\n$BULLET$ Convidar qualquer tipo de [courtier|El] com a [decision|El] [GetDecision('tgp_minister_recruit_courtiers_decision').GetName|V]\n$BULLET$ Obrigar a aceitação das [interactions|El] #V $offer_courtier_interaction$#! e #V $demand_courtier_interaction$#!\n$BULLET$ Acessar as opções especiais da [interaction|El]#V $influence_meritorious_career_interaction$#! e a um custo reduzido#!#!"
 game_concept_minister_of_revenue: "$councillor_steward_celestial_government_imperial$"
 game_concept_minister_of_revenue_desc: "O $game_concept_minister_of_revenue$ é o [minister|El] responsável pela [taxation|El] e ajuda o [son_of_heaven|E] com o [treasury|El].\n $minister_of_revenue_action_breakdown$\n"
 game_concept_minister_of_revenue_possessive: "$councillor_steward_celestial_government_imperial_possessive$"
 minister_of_revenue_action_breakdown: "#indent_newline:4 #weak O ministro pode, por exemplo:\n$BULLET$ Ajudar a [vassals|El] que possam #V $celestial_request_treasury_interaction$#!\n$BULLET$ Usar a [decision|El] [GetDecision('tgp_suggest_budget_change_decision').GetName|V]\n$BULLET$ Começar o [great_project|El] [GetGreatProjectType('minister_project_conduct_census').GetName|V]\n$BULLET$ Usar a [interaction|El] #V $pay_treasury_debt_interaction$#! para pagar a [treasury_debt|El] de [civilian_governors|E], o que ativa o [dynastic_cycle_catalyst|El] #V $catalyst_cleared_treasury_debt$#!\n$BULLET$ Acessar as opções especiais da [interaction|El] #V $influence_meritorious_career_interaction$#!#!#!"
 game_concept_minister_of_rites: "$councillor_court_chaplain_celestial_government_imperial$"
 game_concept_minister_of_rites_desc: "O $game_concept_minister_of_rites$ é o [minister|El] responsável pelos assuntos religiosos e espirituais, e ajuda os [governors|El] a realizar [examinations|El].\n\n $minister_of_rites_action_breakdown$"
 game_concept_minister_of_rites_possessive: "$councillor_court_chaplain_celestial_government_imperial_possessive$"
 minister_of_rites_action_breakdown: "#indent_newline:4 #weak O ministro pode, por exemplo:\n$BULLET$ Iniciar o [great_project|El] [GetGreatProjectType('minister_project_culture').GetName|V]\n$BULLET$ Iniciar o [great_project|El] [GetGreatProjectType('minister_compel_religious_uniformity').GetName|V]\n$BULLET$ Ajudar os [vassals|El] a realizar [examinations|El]\n$BULLET$ Acessar opções especiais de [interaction|El] #V $influence_meritorious_career_interaction$#!\n$BULLET$#V $demand_conversion_minister_rites_interaction$#! com [characters|El] de [faiths|El] [Concept('faith_hostile', 'hostiles')|E] ou [Concept('faith_evil', 'malignas')|E]#!#!"
 game_concept_minister_of_war: "$minister_war$"
 game_concept_minister_of_war_desc: "O $game_concept_minister_of_war$ é o [minister|El] responsável pela administração e pela gestão das tropas. Quando os súditos [governors|El] precisam de ajuda militar, o $game_concept_minister_of_war$ é o responsável por enviar governadores militares para ajudar.\n\nO ministro não é um [commander|El] ativo e não comanda tropas; o [minister_grand_marshal|El] é o responsável por isso.\n\n $minister_of_war_action_breakdown$"
 game_concept_minister_of_war_possessive: "$minister_war_possessive$"
 minister_of_war_action_breakdown: "#indent_newline:4 #weak O ministro pode, por exemplo:\n$BULLET$ Enviar ajuda aos [vassals|El] em [war|El] que possam #V $celestial_request_military_aid_interaction$#!\n$BULLET$ Ordenar aos [military_governors|El] que se juntem às [wars|El] de outros [governors|El]\n$BULLET$ Iniciar o [great_project|El] [GetGreatProjectType('minister_project_train_troops').GetName|V]\n$BULLET$ Usar a [interaction|El] #V $pay_treasury_debt_interaction$#! para pagar a [treasury_debt|El] de [military_governors|El], o que ativa o [dynastic_cycle_catalyst|El] #V $catalyst_cleared_treasury_debt$#!\n$BULLET$ Acessar opções especiais da [interaction|El] #V $influence_meritorious_career_interaction$#!#!#!"
 game_concept_minister_of_justice: "$minister_justice$"
 game_concept_minister_of_justice_desc: "O $game_concept_minister_of_justice$ é o [minister|El] responsável pelos assuntos legais e por ajudar o [son_of_heaven|E] a manter um governo justo.\n\n $minister_of_justice_action_breakdown$"
 game_concept_minister_of_justice_possessive: "$minister_justice_possessive$"
 minister_of_justice_action_breakdown: "#indent_newline:4 #weak O ministro pode, por exemplo:\n$BULLET$ Iniciar o [great_project|El] [GetGreatProjectType('minister_project_establish_control').GetName|V]\n$BULLET$ Usar a [interaction|El] #V $imprison_interaction$#! contra [vassals|El] e [courtiers|El], os quais não poderão recusar\n$BULLET$ Usar a [interaction|El] #V $pardon_interaction$#! com [characters|El] que tenham cometido [crimes|El]\n$BULLET$ Usar a [interaction|El] $censor_find_secrets_interaction$ para encontrar [secrets|El] nas [courts|El] de [Concept('vassals', 'vassalos')|E] com as quais [imprison|El] ou perdoar [criminals|El] conhecidos\n$BULLET$ Expor [secrets|El] acionará o [dynastic_cycle_catalyst|El] $catalyst_minister_exposed_secret$ \n$BULLET$ Acessar as opções especiais da [interaction|El]#V $influence_meritorious_career_interaction$#!#!#!"
 game_concept_minister_of_works: "$minister_works$"
 game_concept_minister_of_works_desc: "O $game_concept_minister_of_works$ é [Concept('minister', 'aquele')|E] responsável pela construção e pelo desenvolvimento em todo o [realm|El] e pode iniciar [great_projects|El].\n\n$minister_of_works_action_breakdown$"
 game_concept_minister_of_works_possessive: "$minister_works_possessive$"
 minister_of_works_action_breakdown: "#indent_newline:4 #weak O ministro pode, por exemplo:\n$BULLET$ Iniciar o [great_project|El] [GetGreatProjectType('minister_project_development').GetName|V]\n$BULLET$ Iniciar o [great_project|El] [GetGreatProjectType('grand_canals').GetName|V]\n$BULLET$ Iniciar o [great_project|El] [GetGreatProjectType('great_wall').GetName|V]\n$BULLET$ Construir [buildings|El] e [holdings|El] no [realm|El]\n$BULLET$ Construir [buildings|El] e [holdings|El] em [tributaries|El] de [son_of_heaven|E] em [dynastic_cycle_era_short|El] de [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_stability_advancement').GetName|l]\n$BULLET$ Acessar as opções especiais da [interaction|El] #V $influence_meritorious_career_interaction$#!#!#!"
 game_concept_grand_secretariat_director: "Secretário diretor"
 game_concept_grand_secretariat: "Grande Secretaria"
 game_concept_grand_secretariat_possessive: "do Grande Secretariado"
 game_concept_grand_secretariat_director_desc: "O secretário-diretor é um tipo de [diarch|lE] para o [son_of_heaven|E], que ajuda o governante divino a administrar o [realm|lE].\n\nQuem for o secretário-diretor depende da [law|lE] [GetLawGroup('grand_secretariat_laws').GetName|V] ativa. Esse cargo pode ser ocupado pelo [minister_grand_chancellor|lE], pelo [minister_grand_marshal|lE] ou pelo [minister_censor|lE].\n\nO secretário-diretor pode iniciar a maioria dos [great_projects|lE] disponíveis para certos [ministers|lE] e o Filho do Céu."
 game_concept_ministry_obligation: "Obrigação ministerial"
 game_concept_ministry_obligations: "Obrigações ministeriais"
 game_concept_ministry_obligations_desc: "As $game_concept_ministry_obligations$ são um conjunto de [vassal_obligations|E] especiais que estão disponíveis apenas para os [ministers|El].\n\nTodos os ministros civis têm uma opção específica definida como padrão, enquanto o [minister_grand_marshal|El] tem uma opção única que fornece [title_men_at_arms|El] ao marechal.\n\nEstas obrigações não podem ser alteradas."
 game_concept_civilian_career_path: "Trajetória profissional civil"
 game_concept_civilian_career_path_i: "@celestial_standard_administration!"
 game_concept_civilian_career_path_desc: "Os [rulers|lE] que seguem uma carreira civil focam em habilidades administrativas em vez de astúcia marcial. Eles são designados para Circuitos Civis e seu [merit|lE] aumentará conforme tenham sucesso em desenvolver a terra com [buildings|lE] e aumentar os [taxes|lE] pagos a seu [liege|lE]."
 game_concept_civilian_career: "Carreira civil"
 game_concept_civilian_career_short: "Civil"
 game_concept_military_career_path: "Carreira militar"
 game_concept_military_career_path_i: "@celestial_military_administration!"
 game_concept_military_career_path_desc: "Os [rulers|lE] que seguem uma carreira militar se concentram em habilidades marciais em vez de tarefas administrativas. São designados para Circuitos Militares e sua [merit|lE] aumentará de acordo com sua capacidade de recrutar e manter [title_men_at_arms|lE]."
 game_concept_military_career: "Carreira militar"
 game_concept_military_career_short: "Militar"
 game_concept_civilian_governor: "Governador civil"
 game_concept_civilian_governors: "Governadores civis"
 game_concept_civilian_governor_short: "Civil"
 game_concept_civilian_governor_desc: "Governador civil é [Concept('governor', 'aquele')|E] com [vassal_obligations|lE] civis. Ao contrário dos [military_governors|lE], eles não podem mobilizar [title_men_at_arms|El] e se concentram exclusivamente em tarefas administrativas e em desenvolver o território que governam.\n\nOs [characters|lE] que seguem uma [civilian_career_path|lE] podem se tornar governadores civis."
 game_concept_military_governor: "Governador militar"
 game_concept_military_governors: "Governadores militares"
 game_concept_military_governor_short: "Militar"
 game_concept_military_governor_desc: "Governador militar é [Concept('governor', 'aquele')|E] com [vassal_obligations|lE] obrigações militares. Ao contrário dos [civilian_governors|lE], eles podem recrutar [title_men_at_arms|El] e os utilizarão para defender o [realm|El] de incursões estrangeiras e apoiar outros governadores que precisem de ajuda militar.\n\nOs [characters|lE] que seguem uma [military_career_path|lE] podem se tornar governadores militares."
 # Great Projects
 game_concept_great_project: "Grande projeto"
 game_concept_great_projects: "Grandes projetos"
 game_concept_great_project_i: "@great_project_icon!"
 game_concept_great_project_possessive: "do Grande Projeto"
 game_concept_great_project_desc: "Grandes projetos são empreendimentos imensos que exigem todos os recursos do [realm|lE].\n\nAlguns Grandes Projetos envolvem construir um [great_building|lE], enquanto outros implicam se recuperar de uma [natural_disaster|lE].\n\nEmbora o [ruler|lE] do senhorio supervisione o desenvolvimento do Grande Projeto, os [subjects|lE] podem oferecer [great_project_contributions|lE] para ajudar em seu progresso."
 game_concept_great_project_contribution: "Contribuição"
 game_concept_great_project_contributions: "Contribuições"
 game_concept_great_project_contribute: "Contribuir"
 game_concept_great_project_contributed: "Contribuído"
 game_concept_great_project_contribution_desc: "As contribuições permitem que muitos [rulers|lE] ajudem no desenvolvimento de um [great_project|lE] e assim obtenham diversos benefícios em troca.\n\nAlgumas contribuições são obrigatórias para que o Grande Projeto comece, enquanto outras são opcionais. As contribuições opcionais restantes ainda podem ser feitas depois que o progresso tiver começado, até certo ponto no tempo."
 game_concept_great_project_contributor: "Contribuidor"
 game_concept_great_project_contributors: "Contribuintes"
 game_concept_great_project_contributor_possessive: "do contribuidor"
 game_concept_great_project_contributors_possessive: "dos contribuidores"
 game_concept_great_project_contributor_desc: "Os [rulers|El] pagadores que se dispuseram a cobrir pelo menos a [great_project_contribution|El] de um [great_project|El] para ganhar vários benefícios em troca.\n\nPara a maioria das [great_project_contributions|El], qualquer [subject|El] do [realm|El] pode ser um [great_project_contributor|El]."
 # Situation
 game_concept_dynastic_cycle: "Ciclo dinástico"
 game_concept_dynastic_cycle_possessive: "do ciclo dinástico"
 game_concept_dynastic_cycle_desc: "O $game_concept_dynastic_cycle$ mostra a situação sociopolítica do Grande Império da China, que passa por [situation_dynastic_cycle_phases|lE] de estabilidade, instabilidade e caos.\n\nNo $game_concept_dynastic_cycle$ é fundamental o [mandate_of_heaven|E], uma forma de [legitimacy|lE] detida pelo imperador. Se algum dia for perdido, o Grande Império da China se #N desmoronará#!… até que volte a ser unificado por alguém digno de ser o Filho do Céu.#!"
 game_concept_situation_dynastic_cycle_phase: "Era do ciclo dinástico"
 game_concept_situation_dynastic_cycle_phases: "Épocas do ciclo dinástico"
 game_concept_dynastic_cycle_era_short: "Época"
 game_concept_dynastic_cycle_eras_short: "Épocas"
 game_concept_situation_dynastic_cycle_phase_desc: "O estado sociopolítico de [dynastic_cycle|lE].\n\nÉpocas:\n $BULLET$[dynastic_cycle_era_type_stable|E]: [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_stability_advancement').GetName|l], [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_stability_expansion').GetName|l]\n $BULLET$[dynastic_cycle_era_type_unstable|E]: [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_instability').GetName|l]\n $BULLET$[dynastic_cycle_era_type_chaotic|E]: [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_chaos').GetName|l]"
 game_concept_dynastic_cycle_era_type_stable: "Era Estável"
 game_concept_dynastic_cycle_era_type_stable_desc: "[dynastic_cycle_era_types|E] estável presente, quando o império é em grande parte próspero e bem-sucedido, e o [mandate_of_heaven|E] é forte.\n\nÉpocas: [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_stability_expansion').GetName|l], [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_stability_advancement').GetName|l]"
 game_concept_dynastic_cycle_era_type_unstable: "Época instável"
 game_concept_dynastic_cycle_era_type_unstable_desc: "[dynastic_cycle_era_types|E] instáveis atuais, quando o império está em turbulência devido a forças internas ou externas, e o [mandate_of_heaven|E] vacila.\n\nÉpocas: [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_instability').GetName|l], [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_instability_conquest').GetName|l]"
 game_concept_dynastic_cycle_era_type_chaotic: "Era caótica"
 game_concept_dynastic_cycle_era_type_chaotic_desc: "[dynastic_cycle_era_types|E] caóticas atuais, quando o Império está em ruínas e o [mandate_of_heaven|E]; uma situação potencial para que alguém digno o recupere.\n\nSó há uma era caótica: [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_chaos').GetName|l]"
 game_concept_dynastic_cycle_era_type: "Tipo de era do ciclo dinástico"
 game_concept_dynastic_cycle_era_types: "Tipos de era"
 game_concept_dynastic_cycle_era_type_desc: "Há três tipos de eras em [dynastic_cycle|lE] que classificam as [situation_dynastic_cycle_phases|E] e situam cada uma na natureza repetitiva de três partes do Ciclo Dinástico.\n\nTipos de era: [dynastic_cycle_era_type_stable|lE], [dynastic_cycle_era_type_unstable|lE], [dynastic_cycle_era_type_chaotic|lE]"
 game_concept_dynastic_cycle_catalyst: "Catalisador do ciclo dinástico"
 game_concept_dynastic_cycle_catalysts: "Catalisadores do ciclo dinástico"
 game_concept_dynastic_cycle_catalyst_possessive: "do catalisador do ciclo dinástico"
 game_concept_dynastic_cycle_catalysts_possessive: "dos catalisadores do ciclo dinástico"
 game_concept_dynastic_cycle_catalyst_desc: "$game_concept_situation_catalyst_desc$"
 game_concept_movement: "Movimento"
 game_concept_movements: "Movimentos"
 game_concept_movement_possessive: "do movimento"
 game_concept_movements_possessive: "dos movimentos"
 game_concept_movement_desc: "Um grupo de [characters|lE] com interesses e uma visão compartilhados do [dynastic_cycle|lE]. Cada membro pode ter acesso a diferentes [interactions|lE] e [decisions|lE] para impulsionar o ciclo. O [movement_leader|lE] é o porta-voz que representa os interesses do [movement|lE] perante o [son_of_heaven|E]."
 game_concept_movement_power: "Poder do movimento"
 game_concept_movement_power_i: "@movement_power_icon!"
 game_concept_movement_power_desc: "O Poder de Movimento representa a influência política de um grupo envolvido no [dynastic_cycle|El]. É a soma do [personal_movement_power|El] de todos os membros do grupo.\n\n#V [EmptyScope.ScriptValue('extremely_high_movement_power_value')] [movement_power_i|E]#! desbloqueia as [Concept('interaction', 'interações')|E] $dismiss_strong_hook_interaction$ e $request_raid_remit_interaction$ e a [scheme|lE] [GetScheme('raid_estate').GetTypeName]\n\n#help O poder é derivado de:\n$BULLET_WITH_TAB$[merit_level|E] [merit_i]\n$BULLET_WITH_TAB$[influence_level|E] [influence_i]\n$BULLET_WITH_TAB$Idade\n$BULLET_WITH_TAB$[movement_power|E] dos [disciples|lE]\n$BULLET_WITH_TAB$Força militar atual #weak (menos importante na fase de [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_stability_advancement').GetName|l])#!\n$BULLET_WITH_TAB$[trait_level_track_xp|E] dos [GetTrait('confucian_education').GetName( GetNullCharacter )|l] #weak (menos importante na fase de [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_stability_expansion').GetName|l])#!\n$BULLET_WITH_TAB$[trait_level_track_xp|E] de [GetTrait('governor').GetName( GetNullCharacter )|l] #weak (menos importante na fase de [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_stability_expansion').GetName|l])#!#!"
 game_concept_movement_power_short: "Poder"
 game_concept_personal_movement_power: "Poder de movimento pessoal"
 game_concept_personal_movement_power_desc: "$game_concept_personal_movement_power$ indica quanto aumenta o [movement_power_short|lE] geral do [movement|lE] graças a cada membro do mesmo"
 game_concept_personal_movement_power_short: "Poder"
 game_concept_movement_leader: "Líder do movimento"
 game_concept_movement_leader_possessive: "do líder do movimento"
 game_concept_movement_leaders: "Líderes do movimento"
 game_concept_movement_leaders_possessive: "dos líderes do movimento"
 game_concept_movement_leader_short: "Líder"
 game_concept_movement_leader_desc: "Um personagem que lidera o [movement|lE], delegado como o único membro autorizado a falar diretamente com o [son_of_heaven|E] para impulsionar a agenda do [movement|lE] com a [decision|lE] [GetDecision('movement_petition_decision').GetName].\n\n#help Para se tornar um líder, você precisa ter a maior quantidade de [movement_power|lE] [movement_power_i] quando o líder anterior morrer ou derrotar o líder atual na [activity|lE] de [GetActivityType('activity_debate').GetName|l].#!"
 game_concept_favored_era: "Época favorecida"
 game_concept_favored_era_possessive: "da era favorecida"
 game_concept_favored_era_desc: "A $game_concept_favored_era$ é a vontade do Céu manifestada pelo [son_of_heaven|E] sobre o curso do [dynastic_cycle|El]. Determina qual [dynastic_cycle_era_type_stable|El] será decretada depois que a [dynastic_cycle_era_type_unstable|El] terminar."
 game_concept_favored_movement: "Movimento favorecido"
 game_concept_favored_movement_desc: "$game_concept_favored_movement$ é [Concept('movement', 'aquele')|E] que ganhou o apoio do [son_of_heaven|E].\n$BULLET_WITH_TAB$ Seus integrantes têm [candidate_scores|lE] para qualquer [title|lE] de [SelectLocalization( GetPlayer.IsValid, 'game_concept_favored_movement_desc_ingame', 'h_china' )]\n$BULLET_WITH_TAB$ Será mais provável que as petições da [decision|lE] [GetDecision('movement_petition_decision').GetName] sejam aceitas\n$BULLET_WITH_TAB$ Os [situation_catalyst_catalysts|lE] do [dynastic_cycle|lE] são ativados de acordo com qual [movement|lE] favorecido\n$BULLET_WITH_TAB$ Obtém acesso à [decision|El] [GetDecision('favored_movement_consults_heaven_decision').GetName]\n\n#help Para se tornar um movimento favorecido, você precisa derrotar o líder do movimento favorecido atual na [activity|lE] de [GetActivityType('activity_debate').GetName|l]#!"
 game_concept_favored_movement_desc_ingame: "[GetTitleByKey('h_china').GetDefinitiveName]"
 game_concept_favored_movement_possessive: "do Movimento Favorecido"
 game_concept_favored_movement_short: "Favorecido"
 game_concept_disciple: "Discípulo"
 game_concept_disciples: "Discípulos"
 game_concept_disciple_possessive: "do discípulo"
 game_concept_disciples_possessive: "dos discípulos"
 game_concept_disciple_desc: "Os $game_concept_disciples$ são [characters|El] que respeitam o alto status de um [elder|El] e seguem seus ensinamentos, até um [disciple_limit_short|El].\n\nPodem acessar a [character_interaction|El] #high $request_mentoring_interaction$#! #weak (conjura)#! para aumentar suas [skills|El] e à [character_interaction|El] #high $celestial_request_elders_support_interaction$#! para obter [gold|El], [courtiers|El] e mais.\n\n $disciple_elder_benefits_tt$"
 disciple_elder_benefits_tt: "Um $game_concept_disciple$ e um [elder|El]:\n$BULLET_WITH_TAB$Obtêm mais [merit|El]\n$BULLET_WITH_TAB$É menos provável que usem [hostile_schemes|El] um contra o outro\n$BULLET_WITH_TAB$É mais provável que aceitem [interactions|El] enviadas entre si\n$BULLET_WITH_TAB$É mais provável que usem [interactions|El] amistosas com o outro #weak (por exemplo: $gift_interaction$, $invite_to_council_position_interaction$, etc.)#!\n$BULLET_WITH_TAB$Ambos pertencerão à [movement|El] do $game_concept_elder$"
 game_concept_disciple_limit: "Limite de discípulos"
 game_concept_disciple_limit_short: "Limite"
 game_concept_disciple_limit_desc: "O $game_concept_disciple_limit$ indica quantos [disciples|lE] pode ter um [elder|lE] em um dado momento.\n\nO limite padrão é [EmptyScope.ScriptValue('disciples_limit_base_value')|V0]. Ele pode ser aumentado, por exemplo, ao melhorar um [domicile|lE] com certos [domicile_buildings|lE]."
 game_concept_elder: "Ancião"
 game_concept_elders: "Anciãos"
 game_concept_elder_possessive: "do ancião"
 game_concept_elders_possessive: "dos anciãos"
 game_concept_elder_desc: "$game_concept_elder$ é aquele [character|lE] com um ou mais [disciples|lE] que seguem os ensinamentos $game_concept_elders_possessive$.\n\n $disciple_elder_benefits_tt$"
 game_concept_disaster: "Catástrofe"
 game_concept_disasters: "Catástrofes"
 game_concept_natural_disaster: "Catástrofe natural"
 game_concept_natural_disasters: "Catástrofes naturais"
 game_concept_disaster_desc: "Os $game_concept_natural_disasters$ abrangem [floods|lE] e [earthquakes|lE].\n\nUma catástrofe resultará na [character_death_death|lE] de muitos [characters|lE] nos [counties|lE] afetados e terá um impacto significativamente negativo no [development|lE], na [county_opinion|lE] e no [control|lE] de acordo com a gravidade do desastre.\n\nA devastação causada por uma $game_concept_natural_disaster$ pode ser desfeita e a terra revitalizada com a conclusão de um [great_project|lE] de auxílio."
 game_concept_earthquake: "Terremoto"
 game_concept_earthquakes: "Terremotos"
 game_concept_earthquake_desc: "Um $game_concept_earthquake$ é aquele tipo de [natural_disaster|lE] que provoca uma destruição repentina e grave em uma pequena quantidade de [counties|lE].\nOs $game_concept_earthquakes$ só podem ocorrer em regiões mais propensas à atividade sísmica."
 game_concept_flood: "Inundação"
 game_concept_floods: "Inundações"
 game_concept_flooded: "Inundado"
 game_concept_flood_desc: "Uma $game_concept_flood$ é um [natural_disaster|lE] que causa danos crescentes em um grande número de [counties|lE].\nAs $game_concept_floods$ só podem ocorrer ao longo das margens dos grandes rios."
 game_concept_government_bureaucratic_type: "Burocrático"
 game_concept_government_bureaucratic_type_desc: "Alguns [governments|El] são do tipo $game_concept_government_bureaucratic_type$, o que significa que são governos altamente centralizados que geralmente dependem de [governors|El] no [appointment|El] e das [noble_families|El] sem terras para administrar as [provinces|lE] do [realm|El].\n\nOutros elementos comuns incluem [domiciles|lE], [influence|lE] e [title_men_at_arms|lE].\n\nHá vários governos que são considerados do tipo $game_concept_government_bureaucratic_type$:\n $BULLET_WITH_TAB$[GetGovernment('administrative_government').GetNameWithIcon]\n $BULLET_WITH_TAB$[GetGovernment('celestial_government').GetNameWithIcon]\n $BULLET_WITH_TAB$[GetGovernment('meritocratic_government').GetNameWithIcon]\n $BULLET_WITH_TAB$[GetGovernment('japan_administrative_government').GetNameWithIcon]\n $BULLET_WITH_TAB$[GetGovernment('steppe_admin_government').GetNameWithIcon]"
 game_concept_government_bureaucratic_gov: "Governo burocrático"
