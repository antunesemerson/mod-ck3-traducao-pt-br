 scheme_critical_moments.1232.t: "[scheme.GetNameNoTooltip]: Sucesso"
 scheme_critical_moments.1232.desc: "A aptidão de [target.GetName] agora é bem conhecida entre os cortesãos imperiais. Sua carreira chegará a novos patamares, tudo graças à minha influência."
 scheme_critical_moments.1232.desc.myself: "Os cortesãos imperiais agora conhecem bem minha aptidão. Tenho utilizado minha influência como convém e, em breve, minha carreira alcançará novos patamares."
 scheme_critical_moments.1232.a: "As conquistas de um falam por todo o grupo!"
 scheme_critical_moments.1232.b: "Agora haverá mais respeito por [target.GetFirstNameNoTooltip]."
 scheme_critical_moments.1232.b.myself: "Agora serei mais respeitado."
 scheme_critical_moments.1233.t: "[scheme.GetNameNoTooltip]: fracasso"
 scheme_critical_moments.1233.desc: "Os elogios dos meus agentes à governança de [target.GetName] caem em ouvidos surdos na corte imperial. Ninguém está disposto a reconhecer o conhecimento de [target.Custom('education_focus')|l]."
 scheme_critical_moments.1233.desc.myself: "Os elogios dos agentes à minha governança caem em ouvidos moucos na corte imperial. Ninguém está disposto a reconhecer meu conhecimento em [target.Custom('education_focus')|l]."
 scheme_critical_moments.1233.a: "Ao menos eu sei o quanto isso vale!"
 scheme_critical_moments.1235.t: "[scheme.GetNameNoTooltip]: Sucesso"
 scheme_critical_moments.1235.desc: "Meus agentes tiveram sucesso. Toda a corte imperial está falando dos contratempos e da incompetência de [target.GetName]. A carreira dessa espécie de [target.Custom2('InsultNoun', ROOT.Char)] vai ladeira abaixo, tudo graças às minhas maquinações!"
 scheme_critical_moments.1235.a: "As falhas de um falam pelo grupo inteiro!"
 scheme_critical_moments.1235.b: "Agora o verdadeiro rosto de [target.GetFirstNameNoTooltip]."
 scheme_critical_moments.1236.t: "[scheme.GetNameNoTooltip]: Fracasso"
 scheme_critical_moments.1236.desc: "Meus agentes não relatam nada. A corte imperial não está disposta a morder nenhuma das fofocas que espalhamos. Ao que parece, a reputação de [target.GetName] é impecável e está bem estabelecid[target.Custom('ES_OA')] nos círculos imperiais. Esse [target.Custom2('InsultAdjective', ROOT.Char)] está um passo à minha frente."
 scheme_critical_moments.1236.a: "[target.GetFirstNameNoTooltip] me escapa desta vez."
