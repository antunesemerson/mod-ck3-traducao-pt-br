 tgp_china_study_confucian_classics_decision_desc: "Os Analectos do Mestre Kong, os escritos sutis de Mêncio, os grandes ritos e crônicas… Por meio do estudo e da disciplina, posso vislumbrar a ordem do Céu e da Terra.\n\n #weak Estudar os Clássicos Confucionistas é uma excelente maneira de se preparar para os [examinations|lE] ou aumentar suas chances de se tornar [governor|lE]."
