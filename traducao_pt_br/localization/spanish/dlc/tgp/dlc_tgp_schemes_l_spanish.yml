 scheme_critical_moments.1202.t: "$scheme_critical_moments.1132.t$"
 scheme_critical_moments.1202.desc: "O tesouro de [target.GetName] parece acessível. É fácil subornar os guardas, os contadores ficarão felizes em alterar os livros-razão por uma porcentagem para si próprios. Enquanto isso, meus agentes conseguem retirar montes de ouro todos os dias."
 scheme_critical_moments.1202.desc_discovered: "\n\nPode ser que [target.GetHolder.GetName] saiba o que está acontecendo, mas já é tarde demais para voltar atrás."
 scheme_critical_moments.1202.a: "Uma última assinatura."
 scheme_critical_moments.1202.b: "Já tenho o bastante."
 scheme_critical_moments.1203.t: "$scheme_critical_moments.1133.t$"
 scheme_critical_moments.1203.desc: "O tesouro de [target.GetName] parece inexpugnável. Os guardas são incorruptíveis; infalíveis os contadores… Enquanto meus agentes"
 scheme_critical_moments.1203.desc_secret: "$scheme_critical_moments.1203.desc$ são inúteis, no melhor dos casos, e pontas soltas, no pior."
 scheme_critical_moments.1203.desc_discovered: "$scheme_critical_moments.1203.desc$ vazam e revelam meus planos por onde passam."
 scheme_critical_moments.1203.a: "Mais sorte da próxima vez."
