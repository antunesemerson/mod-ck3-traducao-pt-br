 scheme_critical_moments.2922.t: "$coup_ceremonial_liege$: [ROOT.Char.Custom('ES_ElLa')] nov[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]"
 scheme_critical_moments.2922.desc: "Os planos foram verificados e reexaminados, toda eventualidade foi prevista e cada conspirador, preparado. Invadir tal [target.Custom('ResidenceBuilding')|l] foi fácil o bastante sob o pretexto de buscar emprego…\n\nReinou o caos quando o alarme foi acionado, mas, no tumulto e no vai e vem, por fim emergimos, exaustos, mas vitoriosos!\n\nNão sei como conseguiu escapar esse [target.Custom2('InsultAdjective', ROOT.Char)] e fals[target.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l], [target.GetFirstName], mas é uma ameaça à minha posição enquanto estiver livre."
 scheme_critical_moments.2922.a: "[ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] #EMP pertence a mim#!!"
 scheme_critical_moments.2923.t: "$coup_ceremonial_liege$: esperanças frustradas"
 scheme_critical_moments.2924.t: "$coup_ceremonial_liege$: coroa roubada"
 scheme_critical_moments.2924.desc: "O que começou como um dia normal em [target.GetCapitalLocation.GetBaronyNameExplicitly] tomou um rumo repentino e sinistro. Minha [target.Custom('ResidenceBuilding')|l] se enche com os gritos estridentes de guardas e servos correndo pelos corredores.\n\nPor fim, um sargento ofegante explica que um grupo de rufiões entrou sob falso pretexto e agora está lutando para abrir caminho até o salão do trono!\n\n"
 scheme_critical_moments.2924.imprison: "Alguns soldados arrombam a porta e logo sou arrastado[ROOT.Char.Custom('ES_OA')] diante de seu líder, [owner.GetFirstName], que ergue minha coroa em tom de zombaria."
 scheme_critical_moments.2924.death: "Ao tentar fugir, vejo-me preso[ROOT.Char.Custom('ES_OA')] em um combate caótico, e uma espada se lança contra mim!"
 scheme_critical_moments.2924.outro: "Sinto-me pelos aposentos dos servos, disfarçando-me de um[ROOT.Char.Custom('ES_XA')] plebeu[ROOT.Char.Custom('ES_OA')] e me junto à multidão em fuga para fora da [target.Custom('ResidenceBuilding')|l]…"
 scheme_critical_moments.2924.a: "Voltarei!"
 scheme_critical_moments.2924.b: "Você, sapo nojento!"
 scheme_critical_moments.2924.c: "Maldição!"
 scheme_critical_moments.2925.t: "$coup_ceremonial_liege$: coroa cobiçada"
 scheme_critical_moments.2925.desc: "O que começou como um dia normal em [target.GetCapitalLocation.GetBaronyNameExplicitly] deu uma guinada repentina e sinistra. Minha [target.Custom('ResidenceBuilding')|l] se enche com os gritos estridentes de guardas e servos correndo pelos corredores.\n\nPor fim, um sargento ofegante explica que um grupo de malfeitores entrou sob falso pretexto e está lutando para abrir caminho até a sala do trono!\n\nMeus soldados logo colocam a situação sob controle, e os sons da luta vão se extinguindo aos poucos."
 scheme_critical_moments.2925.imprison: "Arrastam até mim [owner.GetFirstName] um[owner.Custom('ES_XA')] ninguém sem terras, cujo plano de usurpar minha coroa pela força foi revelado."
 scheme_critical_moments.2925.death: "Arrastram o cadáver de [owner.GetFirstName], um[owner.Custom('ES_XA')] nada sem terras, cujo plano de usurpar à força minha coroa foi um fracasso total."
 scheme_critical_moments.2925.outro: "Dizem-me que [owner.GetFirstName], um[owner.Custom('ES_XA')] ninguém sem terras, liderou o ataque, tentando usurpar minha coroa à força. [owner.Custom('ES_ElLa')|U] muito covarde já sumiu há muito tempo."
 scheme_critical_moments.2925.a: "#EMP Pagareis#! por isso."
 scheme_critical_moments.2925.b: "![owner.GetFirstNameNoTooltip] descobriu o que acontece com [Select_CString(owner.IsFemale, 'las usurpadoras', 'los usurpadores' )]!"
 scheme_critical_moments.2925.c: "Maldito [owner.Custom2('InsultNoun', ROOT.Char)]!"
 OWNER_IS_MY_MOVEMENT_MEMBER: "Está no mesmo [movement|El] que [owner.GetShortUIName]: $VALUE|+0=$"
