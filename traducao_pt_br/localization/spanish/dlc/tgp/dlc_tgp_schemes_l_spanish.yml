 tgp_interaction_event.0020.t: "[scheme.GetNameNoTooltip]: Objetivo"
 tgp_interaction_event.0020.desc: "O tesouro de [target.GetName] está lá para ser tomado. Vou deixar meus agentes mexerem nos livros, ajustarem os registros e trocarem os recibos.\n\nDepois, usarei a sua riqueza para melhorar minha governança de [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip], para glorificar minha própria [ROOT.Char.Custom('GetCourt')|l]... talvez até apenas enriquecer?"
 tgp_interaction_event.0020.a: "Suas moedas vão tilintar nos meus bolsos!"
 tgp_interaction_event.0020.b: "Sua fortuna estará a salvo na minha tesouraria."
