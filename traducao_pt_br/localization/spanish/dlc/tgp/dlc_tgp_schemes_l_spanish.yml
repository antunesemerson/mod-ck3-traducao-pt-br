 tgp_china_study_confucian_classics_decision_tt: "Você inicia uma [scheme|lE] de [GetScheme('study_confucian_classics').GetTypeName] com alvo em você\n\nRecompensas previstas:\n $EFFECT_LIST_BULLET$ O [trait|lE]/[trait_level_track_xp|lE] [GetTrait('confucian_education').GetName( GetNullCharacter )]\n $EFFECT_LIST_BULLET$ O [trait|lE] [GetTrait('lifestyle_poet').GetName( GetNullCharacter )]\n $EFFECT_LIST_BULLET$ [merit|E] [merit_i]\n $EFFECT_LIST_BULLET$ [skill|E] [learning_i][stewardship_i][diplomacy_i] #weak (hasta 8)#!\n $EFFECT_LIST_BULLET$ Uma [Concept('exam_advantage', 'ventaja')|E] no próximo [examination|lE]\n\nDesvantagens:\n $EFFECT_LIST_BULLET$ Pode ganhar [stress|lE] [stress_i]"
