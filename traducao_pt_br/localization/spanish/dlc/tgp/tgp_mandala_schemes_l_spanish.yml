l_spanish:
 #Disbelieve Mandala Scheme
 disbelieve_mandala: "Desacreditar o mandala"
 disbelieve_mandala_desc: "Está na hora de colocar [SCHEME.GetTargetCharacter.GetShortUINameNoTooltip] um pouco no lugar na corrida ao [mandala|lE]; ou dois."
 disbelieve_mandala_desc_general: "O [scheme|lE] $disbelieve_mandala$ é [Concept('hostile_scheme', 'aquella')|E] que busca prejudicar a reputação do [scheme_target|lE] como mandala divino.\n\nPermite recrutar [agents|lE], é uma [secret_scheme|lE] baseada em [intrigue|lE] e, se for descoberto, aumentará a rivalidade entre o instigador e o alvo."
 DISBELIEVE_MANDALA_SUCCESS_DESC: "[TARGET_CHARACTER.GetShortUIName] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'pode', 'pode')] se tornar [GetModifier( 'disbelieved_mandala_modifier' ).GetNameWithTooltip|Ll]"
 disbelieve_mandala_invalidated_title: "@scheme_icon! Termina a conspiração de desacreditar o mandala"
 scheme_target_not_mandala: "[SCHEME.GetTargetCharacter.GetShortUIName|U] não tem um [government|lE] [mandala|lE]"
 scheme_owner_not_mandala: "Você não tem um [government|lE] [mandala|lE]"
 scheme_owner_not_house_head: "Você não é mais o [house_head|lE]"
 scheme_target_not_independent: "[SCHEME.GetTargetCharacter.GetShortUIName|U] não é [independent|lE]"
 scheme_target_tributary_of_owner: "[SCHEME.GetTargetCharacter.GetShortUIName|U] é seu [subject|lE]"
 #Disbelieve Mandala Interaction
 start_disbelieve_mandala_interaction: "$disbelieve_mandala$ #weak (conjura)#!"
 disbelieve_mandala_action: "Desacreditar"
 scheme_interaction_tt_disbelieve_mandala: "Tentar desacreditar [recipient.GetShortUINameNoTooltip] para, possivelmente, prejudicar sua [legitimacy|lE], [piety|lE] e semear o caos entre seus [subjects|lE]"
 disbelieve_mandala_interaction_notification: "Desacreditar o mandala"
 unlock_disbelieve_mandala_scheme_tt: "Requer nível #V 3#! do [aspect_of_trickery|lE]"
 #Coerce Tributary Scheme
 coerce_tributary: "Coagir tributário"
 coerce_tributary_desc: "[SCHEME.GetTargetCharacter.GetShortUINameNoTooltip] saberá em breve quem é seu #EMP auténtic[ROOT.Char.Custom('ES_OA')]#! líder…"
 coerce_tributary_desc_general: "O [scheme|lE] $coerce_tributary$ é [Concept('political_scheme', 'um esquema político')|E] que busca convencer o [scheme_target|lE] de que se torne [tributary|lE] do [scheme_owner|lE].\n\nSe o alvo já tiver um [suzerain|lE], este terá uma escolha sobre como responder à questão, e semeará [rivalry|lE] entre o líder e o suserano."
 COERCE_TRIBUTARY_SUCCESS_DESC: "[TARGET_CHARACTER.GetShortUIName|U] pode se tornar seu [tributary|lE]"
 coerce_tributary_invalidated_title: "@scheme_icon! Termina a trama de coagir o tributário"
 #Coerce Tributary Interaction
 start_coerce_tributary_interaction: "$coerce_tributary$ #weak (conjura)#!"
 coerce_tributary_action: "Coagir"
 scheme_interaction_tt_coerce_tributary: "Tentar coagir [recipient.GetShortUINameNoTooltip] para se tornar seu [tributary|lE] tributário"
 coerce_tributary_interaction_notification: "Coagir tributário"
 target_is_your_subject.tt: "[target.GetShortUIName] é [Concept('subject',Select_CString(target.IsFemale,'súbdita', 'súbdito'))|E] de [Select_CString(owner.IsLocalPlayer,'seu personagem', owner.GetShortUIName)]"
 recipient_is_your_suzerain.tt: "[recipient.GetShortUIName] é [Concept('suzerain',Select_CString(recipient.IsFemale,'soberana', 'soberano'))|E] de [Select_CString(actor.IsLocalPlayer,'seu personagem', actor.GetShortUIName)]"
 you_share_suzerain.tt: "Você compartilha [suzerain|lE]"
 was_betrayed_after_being_coerced.tt: "Você já havia traído anteriormente [recipient.GetShortUIName] após coagi-lo[recipient.GetHerHim]"
 #Coerce Contribution Scheme
 coerce_contribution: "Coagir a contribuição"
 coerce_contribution_desc: "Certamente os habitantes de [SCHEME.GetTargetTitle.GetBaseNameNoTier] para que contribuam para um projeto tão grandioso…"
 coerce_contribution_desc_general: "A [scheme|lE] $coerce_contribution$ é [Concept('political_scheme', 'aquella')|E] que busca convencer os habitantes da baronia [scheme_target|lE] para que abram seus corações e bolsos para [great_project_contribute|lE] ao [great_project|lE] do [scheme_owner|lE]."
 COERCE_CONTRIBUTION_SUCCESS_DESC: "Os habitantes de [TARGET_TITLE.GetBaseName|U] contribuem com uma de suas [great_project_contributions|lE]"
 coerce_contribution_invalidated_title: "@scheme_icon! Termina a conspiração de coagir a contribuição"
 #Coerce Contribution Interaction
 start_coerce_contribution_interaction: "$coerce_contribution$ #weak (conjura)#!"
 coerce_contribution_action: "Coagir a contribuição nas terras de"
 scheme_interaction_tt_coerce_contribution: "Tente coagir os habitantes do seu domínio a [great_project_contribute|lE] ao seu [great_project|lE]"
 coerce_contribution_interaction_notification: "Coagir a contribuição"
 coerce_contribution_scheme_success_outcome_tt: "Se for bem-sucedido, uma das [great_project_contributions|lE] de sua #high [GetBuilding('mandala_capital_01').GetTypeName|l]#! será financiada pelos habitantes de [target.GetBaseName]"
 start_coerce_contribution_interaction.tt.agent_focus_success: "$schemes.tt.agent_packages.list_boilerplate$\n $EFFECT_LIST_BULLET$[GetAgentSlotType( 'agent_thug' ).GetName] [success_chance_max_i]\n $EFFECT_LIST_BULLET$[GetAgentSlotType( 'agent_devotee' ).GetName] [success_chance_max_i]\n $EFFECT_LIST_BULLET$[GetAgentSlotType( 'agent_devotee' ).GetName] [success_chance_max_i]\n $EFFECT_LIST_BULLET$[GetAgentSlotType( 'agent_cleiric' ).GetName] [scheme_speed_i]\n $EFFECT_LIST_BULLET$[GetAgentSlotType( 'agent_herald' ).GetName] [scheme_speed_i]"
 start_coerce_contribution_interaction.tt.agent_focus_speed: "$schemes.tt.agent_packages.list_boilerplate$\n $EFFECT_LIST_BULLET$[GetAgentSlotType( 'agent_thug' ).GetName] [success_chance_max_i]\n $EFFECT_LIST_BULLET$[GetAgentSlotType( 'agent_devotee' ).GetName] [success_chance_max_i]\n $EFFECT_LIST_BULLET$[GetAgentSlotType( 'agent_cleric' ).GetName] [scheme_speed_i]\n $EFFECT_LIST_BULLET$[GetAgentSlotType( 'agent_cleric' ).GetName] [scheme_speed_i]\n $EFFECT_LIST_BULLET$[GetAgentSlotType( 'agent_herald' ).GetName] [scheme_speed_i]"
 no_available_target_titles.tt: "Não há condados inexplorados em seu [realm|lE]"
 no_contributions_to_fund.tt: "Você não tem nenhum [great_project|lE] para financiar [great_project_contributions|lE]"
 scheme_title_changed_holder: "O [target.GetBaseName] mudou de titular"
 scheme_great_project_is_funded: "Seu [great_project|lE] não restam [great_project_contributions|lE] para financiar"
 attempted_to_coerce_contribution_from_my_realm_opinion: "Tentou coagir a contribuição do meu domínio"
