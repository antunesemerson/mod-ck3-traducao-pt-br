l_spanish:
 ##################################################
 # KOREA DECISION EVENTS
 ##################################################
 # unify_goryeo_decision
 tgp_korea_decision.9101.t: "Um reino unificado"
 tgp_korea_decision.9101.intro: "Os numerosos reinos e povos desta península têm lutado sem necessidade por séculos, atacados por invasores e cegos à grandeza e à força que poderíamos ter se nos uníssemos."
 tgp_korea_decision.9101.desc: "\n\nHoje, esse sonho se tornou realidade, e meu legado como [ROOT.Char.GetMotherFather] de [GetTitleByKey('e_goryeo').GetDefinitiveName] e da casa real de [ROOT.Char.GetHouse.GetBaseName] está assegurado!"
 tgp_korea_decision.9101.a: "Que [GetTitleByKey('e_goryeo').GetTierAsNameNoTooltip] perdure por mil anos!"
 tgp_korea_decision.9101.b: "E a chamaremos de \"Goryeo\", em reconhecimento ao nosso orgulhoso legado."
 tgp_korea_decision.9101.b.reason: "Esta opção está disponível por sua [culture|lE] [ROOT.Char.GetCulture.GetName]"
 tgp_korea_decision.9101.b.tt: "[GetTitleByKey('e_goryeo').GetDefinitiveName] será renomeado como #V Goryeo#!"
 tgp_korea_decision.9102.t: "$tgp_korea_decision.9101.t$"
 tgp_korea_decision.9102.desc: "\n\nHoje, esse sonho se tornou realidade e o legado [king_of_goryeo.GetTitledFirstNamePossessive] como [ROOT.Char.GetMotherFather] de [GetTitleByKey('e_goryeo').GetDefinitiveName] e da casa real de [ROOT.Char.GetHouse.GetBaseName] está assegurado!"
 cultural_acceptance_gain_unify_goryeo: "Unificou os Husamguk"
 unify_goryeo_decision_requirement_tt: "Os [realms|lE] [Concept( 'administrative', 'administrativos' )|E] de [heritage|lE] $heritage_korean_name$ devem formar [GetTitleByKey('e_goryeo').GetNameNoTier|V] por meio da [decision|lE] [GetDecision('tgp_korea_unify_goryeo_decision').GetName]"
 unify_goryeo_decision_blocker_tt: "Os [realms|lE] [Concept( 'administrative', 'administrativos' )|E] de [heritage|lE] $heritage_korean_name$ não podem criar [GetTitleByKey('k_goguryeo').GetNameNoTier|V], [GetTitleByKey('k_silla').GetNameNoTier|V] nem [GetTitleByKey('k_baekje').GetNameNoTier|V] depois que a [decision|lE] [GetDecision('tgp_korea_unify_goryeo_decision').GetName] for tomada"
 tgp_korea_decision.9201.t: "Um leme em mãos de muitos"
 tgp_korea_decision.9201.desc: "Agora que a glória do meu reinado brilha mais intensamente, muitos buscam conforto à minha sombra. Não há [ROOT.Char.GetTitleAsNameNoTooltip|l] que possa reinar so[ROOT.Char.Custom('ES_OA')], e a linhagem onde reside o verdadeiro poder está sempre mudando.\n\nDevo tomar cuidado para que meus descendentes continuem governando [ROOT.Char.GetPrimaryTitle.GetDefinitiveNameNoTooltip] em mais do que apenas o nome..."
 tgp_korea_decision.9201.a: "Preciso estar sempre um passo à frente."
 MERITOCRATIC_CEREMONIAL_LIEGE_TITLE: "O trono [founder.GetPrimaryTitle.GetAdjectiveNoTooltip]"
 tgp_korea_decision.9202.desc: "Agora que a glória do reinado [founder.Custom('ES_DelDela')] [founder.GetTitledFirstName|l] brilha com força, muitos buscam consolo sob sua sombra. Não há [founder.GetTitleAsNameNoTooltip|l] que possa reinar so[founder.Custom('ES_OA')], e a linhagem onde reside o verdadeiro poder está sempre mudando.\n\n[founder.GetSheHe|U] deve ser cautelos[founder.Custom('ES_OA')] se seus descendentes quiserem continuar governando [founder.GetPrimaryTitle.GetDefinitiveNameNoTooltip] em mais do que apenas nome..."
 tgp_korea_decision.9202.a: "O poder assume muitas formas."
 tgp_create_meritocratic_ruling_regent_title_effect: "Por ser o [ruler|El] de um [empire|El] [GetGovernment('meritocratic_government').GetName|l]:"
 tgp_create_meritocratic_ruling_regent_title_effect_title_tt: "Você ganha um [title|lE] titular de [kingdom|El] com a [law|El] [GetLaw('single_heir_succession_law').GetName]"
 tgp_create_meritocratic_ruling_regent_title_effect_faction_tt: "Os [vassals|El] podem criar [factions|El] de #V $replace_ceremonial_regent_faction$#!"
 tgp_create_meritocratic_ruling_regent_title_message_title: "Monarquia de [founder.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] desafiada"
