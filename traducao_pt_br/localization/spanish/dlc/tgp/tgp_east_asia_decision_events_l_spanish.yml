l_spanish:
 tgp_east_asia_decision_events.0010.t: "Novos horizontes"
 tgp_east_asia_decision_events.0010.desc: "Às vezes, a iluminação vem das fontes mais inesperadas.\n\nO estilo mandala de governar um domínio ressoa em mim em um… plano superior. Sem dúvida, minha existência serve a um propósito maior: unir o domínio sob meu governo divino e benevolente.\n\n #EMP "Salve, devaraja [ROOT.Char.GetFirstNameNoTooltip]"#! soa bonito…"
 tgp_east_asia_decision_events.0010.a: "Que #EMP ese#! seja meu primeiro decreto."
 tgp_east_asia_decision_events.0010.b: "A propriedade de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] #EMP todavía#! não é digna de um templo…"
 tgp_east_asia_decision_events.0010.b_temple_citadel: "Meu templo já se ergue imponente em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]!"
 all_tribal_holdings_will_change_to_citadels: "Todas as [tribal_holdings|lE] do domínio se tornarão em [temple_citadel_holdings|lE]"
 realm_capital_will_change_to_citadel: "A [holding|lE] de [realm_capital|lE] se tornará uma [temple_citadel_holding|lE]"
 tgp_east_asia_decision_events.0015.opening: "[overlord.Custom2('AppropriateGreeting', ROOT.Char)]"
 tgp_east_asia_decision_events.0015.desc: "Descobri que minha existência serve a um propósito maior.\n\nJuntai-vos a mim e saudai vosso[ROOT.Char.Custom('ES_OA')] novo[ROOT.Char.Custom('ES_OA')] devaraja!"
 tgp_east_asia_decision_events.0015.a: "O que isso poderia trazer…"
 tgp_east_asia_decision_events.0020.t: "Meu Devaraja"
 tgp_east_asia_decision_events.0020.desc: "Vi os sinais. Sei o que é certo. Não há realidade em que eu não possa apoiar [overlord.Custom('ES_AlAla')] [overlord.GetTitledFirstName|l] e seu governo benevolente sobre este plano de existência.\n\nNos adaptaremos e seguiremos a [Select_CString(overlord.IsFemale, 'nossa pastora divina', 'nosso pastor divino' )] rumo a um futuro brilhante.\n\n#EMP Salve, devaraja [overlord.GetFirstNameNoTooltip].#!"
 tgp_east_asia_decision_events.0020.close_family_pre_tt: "A [close_family|lE] se converterá à #V [GetPlayer.GetOverlord.GetFaith.GetName|l] [GetPlayer.GetOverlord.GetFaith.GetTextIcon]#!"
 tgp_east_asia_decision_events.0020.close_family_post_tt: "[close_family|lE] convertida para #V [GetPlayer.GetOverlord.GetFaith.GetName|l] [GetPlayer.GetOverlord.GetFaith.GetTextIcon]#!"
 tgp_east_asia_decision_events.0020.a: "Salve!"
 tgp_east_asia_decision_events.0020.b: "$tgp_east_asia_decision_events.0010.b$"
 tgp_east_asia_decision_events.0025.opening: "[liege.Custom2('AppropriateGreeting', ROOT.Char)]"
 tgp_east_asia_decision_events.0025.desc: "Não há realidade em que eu não possa apoiar [overlord.Custom('ES_AlAla')] [overlord.GetTitledFirstName|l] e seu governo benevolente sobre este plano de existência.\n\nSalve, [overlord.GetTitledFirstName|l]!"
 tgp_east_asia_decision_events.0025.a: "$tgp_east_asia_decision_events.0015.a$"
 tgp_east_asia_decision_events.0030.t: "Adotadas tradições do clã"
 tgp_east_asia_decision_events.0030.desc: "Chegou uma missiva da mesa do meu [ROOT.Char.Custom2('RelationToMe', ROOT.Char.GetLiege)] , [liege.Custom('ES_ElLa')] [liege.GetTitledFirstName|l]. Ela indica uma mudança recente na governança e nos exorta a nos assimilar e apoiar nuestr[liege.Custom('ES_OA')] governante.\n\nComo fiel vassal[ROOT.Char.Custom('ES_OA')] de nuestr[liege.Custom('ES_OA')] [liege.GetTitleAsNameNoTooltip|l] , meu dever é obedecer."
 tgp_east_asia_decision_events.0030.a: "Vamos transformar isso em nosso benefício."
 realm_capital_will_change_to_castle: "A [holding|lE] da [realm_capital|lE] se tornará um [castle_holding|lE]"
 tgp_east_asia_decision_events.0100.t: "Dividendos devotos"
 tgp_east_asia_decision_events.0100.desc: "Nosso amor por [overlord.Custom('ES_ElLa')] divin[overlord.Custom('ES_OA')] devaraja [overlord.GetFirstNameNoTooltip] não tem limites.\n\nNoss[overlord.Custom('ES_OA')] [overlord.GetLadyLord] é #EMP transcendente#! e onisciente, seja na sala do tribunal ou no campo de batalha.\n\nNossas dúvidas, nossas hesitações… Todas perdoadas, todas resolvidas — um verdadeiro ser celestial entre nós.\n\nSempre soube disso."
 tgp_east_asia_decision_events.0100.a: "Que nossas pétalas jamais murchem e caiam."
 failed_assimilation_payout_msg: "Divindade mandala fracassada"
 failed_assimilation_payout_msg_desc: "Seu devaraja prometid[saved_devaraja.Custom('ES_OA')] [saved_devaraja.GetShortUIName] ou você não correspondeu à divindade mandala"
 invite_a_court_brahmin_decision: "Procurar $court_brahmin_court_position$"
 invite_a_court_brahmin_decision_desc: "Um brâmane da corte é um aliado poderoso. Ele cuidará das relações tributárias e será uma bússola moral em tempos difíceis."
 invite_a_court_brahmin_decision_tooltip: "Seus servos lhe sugerirão uma série de candidatos adequados para o cargo de [GetCourtPositionType('court_brahmin_court_position').GetName()|l]"
 tgp_east_asia_decision_events.0200.t: "Um brâmane na corte"
 tgp_east_asia_decision_events.0200.desc: "Minha palavra se espalhou por toda parte e, finalmente, dois líderes espirituais chegam à minha corte.\n\n[great_brahmin_option.Custom('ES_ElLa')|U] [great_brahmin_option.GetTitledFirstName|l] irradia uma calma serena e dedica um momento a uma contemplação silenciosa, enquanto [good_brahmin_option.Custom('ES_ElLa')] [good_brahmin_option.GetTitledFirstName|l], com menos experiência, olha ao redor com entusiasmo, claramente ansioso para assumir o comando."
 tgp_east_asia_decision_events.0200.a: "[great_brahmin_option.Custom('ES_ElLa')|U] [great_brahmin_option.GetTitledFirstNameNoTooltip|l] será uma grande adição."
 tgp_east_asia_decision_events.0200.a.aptitude: "A [aptitude|El] de [great_brahmin_option.GetFirstNameNoTooltip] é [great_brahmin_option.GetCourtPositionAptitude( GetCourtPositionType( 'court_brahmin_court_position' ) )]"
 tgp_east_asia_decision_events.0200.b: "Acredito que [good_brahmin_option.Custom('ES_ElLa')|U] [good_brahmin_option.GetTitledFirstNameNoTooltip|l] tem potencial."
 tgp_east_asia_decision_events.0200.b.aptitude: "A [aptitude|El] de [good_brahmin_option.GetFirstNameNoTooltip] é [good_brahmin_option.GetCourtPositionAptitude( GetCourtPositionType( 'court_brahmin_court_position' ) )]"
 tgp_east_asia_decision_events.0200.c: "Nenhum dos dois me atrai muito."
 invite_a_khlon_glan_decision: "Buscar um $khlon_glan_court_position$"
 invite_a_khlon_glan_decision_desc: "Está na hora de encontrar um khlon glan adequado para ajudar no desenvolvimento da capital, controlar nossos territórios e organizar minha corte."
 invite_a_khlon_glan_decision_tooltip: "Seus servos lhe sugerirão uma série de candidatos adequados para o cargo de [GetCourtPositionType('khlon_glan_court_position').GetName()|l]"
 tgp_east_asia_decision_events.0210.t: "O khlon glan"
 tgp_east_asia_decision_events.0210.desc: "Minha busca por um khlon glan leal fez com que [great_khlon_glan_option.Custom('ES_ElLa')] [great_khlon_glan_option.GetTitledFirstName|l] e [good_khlon_glan_option.Custom('ES_ElLa')] [good_khlon_glan_option.GetTitledFirstName|l] aparecessem à minha porta.\n\nNos reunimos na arsenal, onde a maior parte de seus assuntos será tratada.\n\n[great_khlon_glan_option.Custom('ES_ElLa')|U] [great_khlon_glan_option.GetTitledFirstNameNoTooltip|l] avalia habilmente o inventário com apenas um ou dois olhares, enquanto [good_khlon_glan_option.Custom('ES_ElLa')] [good_khlon_glan_option.GetTitledFirstNameNoTooltip|l] passa vários segundos olhando ao redor para se situar."
 tgp_east_asia_decision_events.0210.a: "[great_khlon_glan_option.Custom('ES_ElLa')|U] [great_khlon_glan_option.GetTitledFirstNameNoTooltip|l] parece ser a opção mais inteligente."
 tgp_east_asia_decision_events.0210.a.aptitude: "A [aptitude|El] [great_khlon_glan_option.Custom('ES_DelDela')] [great_khlon_glan_option.GetFirstNameNoTooltip|l] é [great_khlon_glan_option.GetCourtPositionAptitude( GetCourtPositionType( 'khlon_glan_court_position' ) )]"
 tgp_east_asia_decision_events.0210.b: "[good_khlon_glan_option.Custom('ES_ElLa')|U] [good_khlon_glan_option.GetTitledFirstNameNoTooltip|l] pode ser útil."
 tgp_east_asia_decision_events.0210.b.aptitude: "A [aptitude|El] [good_khlon_glan_option.Custom('ES_DelDela')] [good_khlon_glan_option.GetFirstNameNoTooltip|l] é [good_khlon_glan_option.GetCourtPositionAptitude( GetCourtPositionType( 'khlon_glan_court_position' ) )]"
 tgp_east_asia_decision_events.0210.c: "$tgp_east_asia_decision_events.0200.c$"
 tgp_east_asia_decision_events.0300.t: "Flores de [ROOT.Char.GetCapitalLocation.GetBaronyNameExplicitlyNoTooltip]"
 tgp_east_asia_decision_events.0300.desc: "[Select_CString( local_artisan.IsFemale, 'A artesã', 'O artesão' )], [local_artisan.Custom('ES_ElLa')] [local_artisan.GetTitledFirstName|l], se aproxima de mim com passos entusiasmados: "[ROOT.Char.Custom('FormOfAddressForLiege')|U]! O bunga mas está pronto!" Faz gestos ansiosos para que [local_artisan.Custom('ES_LoLa')] acompanhe até sua oficina.\n\nSobre o balcão, uma criação impressionante de duas árvores em plena floração. O metal dourado e prateado reluz, polido à perfeição, e há um nível impressionante de detalhes em suas delicadas folhas e raminhos."
 tgp_east_asia_decision_events.0300.outro: "\n\nPermito-me acenar com a cabeça de forma contida: "Muito bem, [local_artisan.GetTitledFirstNameNoTooltip|l]"."
 tgp_east_asia_decision_events.0300.outro.masterwork: "\n\nInclino-me para apreciar todos os minuciosos detalhes do trabalho na casca e aceno com admiração: “Impressionante, [local_artisan.GetTitledFirstNameNoTooltip|l]”."
 tgp_east_asia_decision_events.0300.outro.famed: "\n\nTomo um momento para contemplar as preciosas esculturas e flores delicadas: "Maravilhoso, [local_artisan.GetTitledFirstNameNoTooltip|l]!"."
 tgp_east_asia_decision_events.0300.outro.illustrious: "\n\nFico sem fôlego por um instante, maravilhad[ROOT.Char.Custom('ES_OA')] momentaneamente pela magnificência da criação diante de mim: "Incrível, [local_artisan.GetTitledFirstNameNoTooltip|l]!"."
 tgp_east_asia_decision_events.0300.a: "Isso deverá ser perfeito."
 common_bunga_mas_desc.tt: "Ao ser entregue ao suserano:\n$BULLET_WITH_TAB$ Ganha (#V 1#!) pilha de [GetModifier('bunga_mas_tribute_modifier').GetNameWithTooltip]"
 masterwork_bunga_mas_desc.tt: "Ao ser entregue ao suserano:\n$BULLET_WITH_TAB$ Ganha até (#V 2#!) pilhas de [GetModifier('bunga_mas_tribute_modifier').GetNameWithTooltip]"
 famed_bunga_mas_desc.tt: "Ao ser entregue ao suserano:\n$BULLET_WITH_TAB$ Ganha-se (#V 2#!) pilhas de [GetModifier('bunga_mas_tribute_modifier').GetNameWithTooltip]"
 illustrious_bunga_mas_desc.tt: "Ao ser entregue ao suserano:\n$BULLET_WITH_TAB$ Ganha (#V 3#!) pilhas de [GetModifier('bunga_mas_tribute_modifier').GetNameWithTooltip]"
 bunga_mas: "As flores douradas de [ROOT.Char.GetLiege.GetCapitalLocation.GetBaronyNameExplicitlyNoTooltip]"
 common_bunga_mas_desc: "Um [Glossary( 'bunga mas', 'BUNGA_MAS_GLOSS' )] comum, feito de ouro e prata. As flores, capturadas em uma floração perpétua, refletem a luz de maneira esplêndida."
 masterwork_bunga_mas_desc: "Um excelente [Glossary( 'bunga mas', 'BUNGA_MAS_GLOSS' )] de ouro e prata. Detalhes e complexidades minuciosas estão entrelaçados nas frágeis folhas, quase translúcidas em sua delicadeza."
 famed_bunga_mas_desc: "Flores magistralmente trabalhadas e entalhes sutis nos galhos. Um árvore [Glossary( 'bunga mas', 'BUNGA_MAS_GLOSS' )] de ouro e prata que não deixará ninguém indiferente."
 illustrious_bunga_mas_desc: "Estas requintadas árvores [Glossary( 'bunga mas', 'BUNGA_MAS_GLOSS' )] de ouro e prata são uma delícia para a vista. Os detalhes refinados dos entalhes; o toque delicado nas folhas. É como se uma árvore viva tivesse sido submersa em metal precioso."
