l_spanish:
 tgp_ceremonial_liege_events.0001.t: "Selo de confusão"
 tgp_ceremonial_liege_events.0001.desc: "[councillor.GetName] enviou por engano instruções que trazem tanto meu selo quanto o de [opposing_power.GetName]. \"Foi um erro sem má intenção\", suplica. \"Mas, vocês sabem o quão rápido mentiras e boatos se espalham pela corte...\".\n\nRecuperá-las seria bastante caro, mas renunciar a elas publicamente como sendo um erro seria bastante vergonhoso."
 tgp_ceremonial_liege_events.0001.a_liege: "É preciso lembrá-los de quem realmente governa."
 tgp_ceremonial_liege_events.0001.a_regent: "Isso precisa ser resolvido antes que [opposing_power.GetFirstNameNoTooltip] veja."
 tgp_ceremonial_liege_events.0001.b: "Que fique assim. Que mal há nas aparências?"
 tgp_ceremonial_liege_events.0001.b_a: "As instruções reafirmam sua autoridade"
 tgp_ceremonial_liege_events.0001.b_b: "O suplício é esquecido"
 tgp_ceremonial_liege_events.0001.b_c: "[opposing_power.GetNameNoTooltip] ganha mais poder"
 tgp_ceremonial_liege_events.0010.t: "O verdadeiro peso"
 tgp_ceremonial_liege_events.0010.desc: "«Meu amor!», exclama [spouse.GetName] ao entrar em nossa câmara nupcial. «Sua pele ficou bastante pálida[ROOT.Char.Custom('ES_OA')] , estou preocupado(a) com você».\n\nA preocupação de [spouse.GetFirstNameNoTooltip] é justificável. As horas de cada dia se alongam, e o peso da coroa pesa cada vez mais sobre mim.\n\n«Se isso o(a) sobrecarrega tanto, talvez [opposing_power.GetName] pudesse governar em seu lugar, temporariamente», sugere [spouse.GetFirstNameNoTooltip]."
 tgp_ceremonial_liege_events.0010.a: "Você está certo, não posso fazer isso sozinho[ROOT.Char.Custom('ES_OA')]."
 tgp_ceremonial_liege_events.0010.b: "Não, não. Vou aparecer menos na corte."
 tgp_ceremonial_liege_events.0010.b_a: "O isolamento ajuda muito"
 tgp_ceremonial_liege_events.0010.b_b: "O isolamento não faz muita coisa"
 tgp_ceremonial_liege_events.0010.c: "Com certeza não! Eu sou [ROOT.Char.Custom('ES_ElLa')] soberan[ROOT.Char.Custom('ES_OA')] deste domínio."
 tgp_ceremonial_liege_events.0010.d: "[opposing_power.GetFirstNameNoTooltip] te disse para dizer isso, não disse?"
 tgp_ceremonial_liege_events.0010.d_desc: "Você acusa [spouse.GetFirstNameNoTooltip] de conspirar com [opposing_power.GetFirstNameNoTooltip]"
 tgp_ceremonial_liege_events.0010.tt.success: "Encuentras pruebas de su traición"
 tgp_ceremonial_liege_events.0010.tt.failure: "Sua acusação se mostra falsa"
 tgp_ceremonial_liege_events.0020.t: "[opposing_power.GetInvolvedActivity.GetShortNameNoTooltip] cerimonial"
 tgp_ceremonial_liege_events.0020.desc: "[opposing_power.GetName] está ocupad[opposing_power.Custom('ES_OA')] com um/a [opposing_power.GetInvolvedActivity.GetShortNameNoTooltip|l], um evento para o qual não fui convidado! Enquanto [opposing_power.GetSheHe]"
 tgp_ceremonial_liege_events.0020.desc_feast: "passa a noite bebendo e compartilhando histórias com a família e os amigos,"
 tgp_ceremonial_liege_events.0020.desc_hunt: "aproveita a emoção de uma caçada,"
 tgp_ceremonial_liege_events.0020.desc_pilgrimage: "aproxima-se de [opposing_power.GetFaith.HighGodName] em suas viagens,"
 tgp_ceremonial_liege_events.0020.desc_festival: "demonstra sua autoridade em um festival,"
 tgp_ceremonial_liege_events.0020.desc_end: "eu ainda estou preso[ROOT.Char.Custom('ES_OA')] ao dever.\n\nEmbora a situação possa ser mais grave, surge uma oportunidade…"
 tgp_ceremonial_liege_events.0020.a: "Talvez seja hora de organizar um/uma [opposing_power.GetInvolvedActivity.GetShortNameNoTooltip|l] por minha conta."
 tgp_ceremonial_liege_events.0020.a_desc: "Você tenta ofuscar a [opposing_power.GetFirstNameNoTooltip] com uma [activity|lE] própria:\n$BULLET$ Você ganhará um desconto de #P 15 %#! ao organizar seu próprio [opposing_power.GetInvolvedActivity.GetShortNameNoTooltip|l]\n$BULLET$ Se sua próxima [opposing_power.GetInvolvedActivity.GetShortNameNoTooltip|l] tiver sucesso, você ganhará [prestige|lE] e [opposing_power.GetFirstNameNoTooltip] perderá um pouco"
 tgp_ceremonial_liege_events_0020_discount_desc: "Celebração em represália"
 tgp_ceremonial_liege_events.0020.b: "Tenho certeza de que [opposing_power.GetFirstNameNoTooltip] não vai se importar se eu fizer algumas mudanças…"
 tgp_ceremonial_liege_events.0020.b.tt.desc: "Você tenta minar a autoridade de [opposing_power.GetFirstNameNoTooltip]"
 tgp_ceremonial_liege_events.0020.b.tt.success: "Você consegue ganhar poder sobre [opposing_power.GetFirstNameNoTooltip]"
 tgp_ceremonial_liege_events.0020.b.tt.failure: "Suas interferências só causam mais conflito"
 tgp_power_undermined_modifier_tt: "[GetModifier('tgp_power_undermined_modifier').GetNameWithTooltip]: #P +25#!"
 tgp_ceremonial_liege_events.0020.c: "Mande-lhe meus melhores cumprimentos."
 tgp_ceremonial_liege_events.0030.t: "O memorial de um erudito"
 tgp_ceremonial_liege_events.0030.desc: "[scholar.GetName] apresenta um memorial bem redigido sobre a história de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetDefinitiveName].\n\nNeste,"
 tgp_ceremonial_liege_events.0030.regent: "é mencionado com frequência e em detalhes [opposing_power.GetFirstName], e [scholar.GetFirstNameNoTooltip] se encarrega de incluir detalhes sobre a casa de [opposing_power.GetFirstNameNoTooltip], os [opposing_power.GetHouse.GetName].\n\nO problema fica evidente quando sou descrito como [ROOT.Char.Custom('InsultAdjective')] e [opposing_power.GetFirstNameNoTooltip] como bastante [ROOT.Char.Custom('ComplimentAdjective')]…"
 tgp_ceremonial_liege_events.0030.liege: "sou mencionado com frequência e em detalhes, e [scholar.GetFirstNameNoTooltip] se encarrega de incluir detalhes sobre minha casa, os [ROOT.Char.GetHouse.GetName].\n\nO que realmente chama minha atenção é que sou descrito como [ROOT.Char.Custom('ComplimentAdjective')] e [opposing_power.GetFirstNameNoTooltip] como bastante [ROOT.Char.Custom('InsultAdjective')]…"
 tgp_ceremonial_liege_events.0030.a: "Um trabalho excelente!"
 tgp_ceremonial_liege_events.0030.b: "Mude suas palavras, [scholar.GetFirstNameNoTooltip]."
 tgp_ceremonial_liege_events.0030.b_desc: "Você tenta orientar [scholar.GetFirstNameNoTooltip] sobre como escrever um memorial melhor"
 tgp_ceremonial_liege_events.0030.tt.success: "[scholar.GetFirstNameNoTooltip] corrige seus erros"
 tgp_ceremonial_liege_events.0030.tt.failure: "Você piora as coisas"
 tgp_ceremonial_liege_events.0030.c_regent: "Não me difames, seu idiota!"
 tgp_ceremonial_liege_events.0030.c_liege: "Cuidado com o que diz…"
 tgp_ceremonial_liege_events.0030.c_tt: "Você repreende o trabalho de [scholar.GetFirstNameNoTooltip]"
 tgp_ceremonial_liege_events.0040.t: "Uma farsa… por enquanto"
 tgp_ceremonial_liege_events.0040.desc: "“Perdoe-me, [inquirer.Custom2('RelationToMeShort', ROOT.Char)]meu[ROOT.Char.Custom(ES_OA)]”, sussurra [inquirer.GetName] em voz baixa enquanto se aproxima de mim.\n\n“Tenho refletido sobre isso há algum tempo e, perdoe-me se for inadequado”, diz. “Mas por que vocês não se livram de [opposing_power.GetFirstName]? Não parece digno de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] ser marionetista[ROOT.Char.Custom('ES_OA')] de um[opposing_power.Custom('ES_XA')] vulgar [opposing_power.GetTitleAsNameNoTooltip|l]!”"
 tgp_ceremonial_liege_events.0040.a: "É tudo pelas aparências, [ROOT.Char.Custom2('RelationToMeShort', inquirer)] meu[inquirer.Custom('ES_OA')]…"
 tgp_ceremonial_liege_events.0040.a_desc: "Le cuentas que es una farsa"
 tgp_ceremonial_liege_events.0040.tt.success: "[inquirer.GetHerHim|U] convence"
 tgp_ceremonial_liege_events.0040.tt.failure: "Sabe que você está mentindo"
 tgp_ceremonial_liege_events.0040.b: "Tudo tem uma razão."
 tgp_ceremonial_liege_events.0040.b_desc: "Você explica a [inquirer.GetFirstNameNoTooltip] o objetivo do papel de [opposing_power.GetFirstNameNoTooltip]."
