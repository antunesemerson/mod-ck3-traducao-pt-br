l_spanish:
 # Japanese Manors
 game_concept_japanese_manor: "Mansão japonesa"
 game_concept_japanese_manors: "Mansões japonesas"
 game_concept_manor: "Solar"
 game_concept_manors: "Solares"
 game_concept_shoen: "Shōen" # 荘園/庄園
 game_concept_family_manor: "Mansão da família"
 game_concept_family_manors: "Mansões da família"
 game_concept_japanese_manor_desc: "$game_concept_manor$ (ou [Glossary( 'shōen', 'SHOEN_GLOSS')]) é um tipo de [domicile|lE] mantido pelo [house_head|lE] de [noble_families|lE] notáveis em [realms|lE] dos tipos de [GetGovernment('japan_administrative_government').GetName|l] e [GetGovernment('japan_feudal_government').GetName|l]. Representam propriedades privadas de terra não vinculadas a nenhum [title|lE] [landed|lE] particular.\n\nAqui podem ser construídos [japanese_manor_buildings|lE] para expandir a riqueza e [influence|lE] da família. As gerações futuras herdarão a $game_concept_manor$."
 game_concept_japanese_manor_building: "Edifício de mansão japonesa"
 game_concept_japanese_manor_buildings: "Edifícios de mansão japonesa"
 game_concept_manor_building: "Edifício de mansão"
 game_concept_manor_buildings: "Edifícios da mansão"
 game_concept_japanese_manor_building_desc: "Os $game_concept_japanese_manor_buildings$ são melhorias únicas e persistentes de [japanese_manor|lE].\n\nHá uma grande variedade de estruturas disponíveis para construção, e o proprietário da mansão pode erguê-las para gerar renda privada, aumentar a [influence|lE] da família e obter acesso a uma série de [decisions|lE], [interactions|lE] e mais."
 # Government
 game_concept_ritsuryo: "$japan_administrative_government$"
 game_concept_ritsuryo_government: "Governo $japan_administrative_government$"
 game_concept_ritsuryo_i: "@government_type_ritsuryo!"
 game_concept_japan_administrative: "$japan_administrative_government$"
 game_concept_ritsuryo_government_desc: "$japan_administrative_government_desc$"
 game_concept_soryo: "$japan_feudal_government$"
 game_concept_soryo_government: "Governo $japan_feudal_government$"
 game_concept_soryo_i: "@government_type_soryo!"
 game_concept_japan_feudal: "$japan_feudal_government$"
 game_concept_soryo_government_desc: "$japan_feudal_government_desc$"
 # Japanese Bureaucracy
 game_concept_japanese_bureaucracy: "Burocracia japonesa"
 game_concept_japanese_bureaucracy_desc: "$game_concept_japanese_bureaucracy$ representa o nível de centralização de um [realms|lE] [ritsuryo_government|lE] e o poder geral que o [ruler|lE] exerce sobre seus [vassals|lE].\n\nSomente o [top_liege|lE] pode mudar a $game_concept_japanese_bureaucracy$. Os $game_concept_vassals$ japoneses usam o mesmo nível que seu $game_concept_liege$.\n\nHá quatro níveis de $game_concept_japanese_bureaucracy$:\n$EFFECT_LIST_BULLET$$japanese_bureaucracy_0$\n$EFFECT_LIST_BULLET$$japanese_bureaucracy_1$\n$EFFECT_LIST_BULLET$$japanese_bureaucracy_2$\n$EFFECT_LIST_BULLET$$japanese_bureaucracy_3$\n\nAumentar a burocracia japonesa custa uma quantidade de [prestige|lE] que depende da [realm_size|lE] e da [learning_skill|lE] do governante."
 game_concept_ceremonial_liege: "Monarca cerimonial"
 game_concept_ceremonial_liege_possessive: "do monarca cerimonial"
 game_concept_ceremonial_liege_desc: "Em certos [realms|lE] (como no Japão), um poderoso burocrata ou comandante pode ter assumido o verdadeiro poder como [ceremonial_regent|lE], deixando um $game_concept_ceremonial_liege$ como figura meramente simbólica e, na prática, um [vassal|lE]. Todos os membros da [house|El] $game_concept_ceremonial_liege_possessive$ são considerados parte da [ceremonial_house|El].\n\nApesar de não governar diretamente, a $game_concept_ceremonial_house$ é a linhagem mais prestigiada de um domínio, e as outras [houses|lE] ganharão mais [prestige|lE] ao se casar com seus membros, pois tais conexões influenciam fortemente a sucessão do $game_concept_ceremonial_regent$.\n\nO $game_concept_ceremonial_liege$ pode retomar o verdadeiro poder se, de alguma forma, recuperar o [primary_title|lE] principal do domínio, como por exigência de [faction|El] ou competindo pelo [title|El] de $game_concept_ceremonial_regent$ por meio da [influence|El]."
 ceremonial_liege_concept: "[ceremonial_liege|E]"
 game_concept_ceremonial_house: "Casa cerimonial"
 game_concept_ceremonial_house_desc: "A $game_concept_ceremonial_house$ se refere à [house|lE] da [ceremonial_liege|lE] de um [realm|lE]."
 # Regent
 game_concept_ceremonial_regent: "Regente governante"
 game_concept_ceremonial_regency: "Regência governante"
 game_concept_ceremonial_regents: "Regentes governantes"
 game_concept_ceremonial_regent_possessive: "do regente governante"
 game_concept_ceremonial_regent_desc: "$game_concept_ceremonial_regent$ é o termo geral para qualquer [top_liege|lE] que governa de fato em nome do [ceremonial_liege|lE] como o #italic $game_concept_tenno$#! do Japão.\n\nO nome do cargo $game_concept_ceremonial_regent_possessive$ pode mudar dependendo das circunstâncias políticas atuais; no Japão pode ser chamado de [kampaku|lE] ou [shogun|lE]."
 ceremonial_regent_concept: "[ceremonial_regent|E]"
 game_concept_kampaku: "Kampaku"
 game_concept_kampaku_possessive: "do kampaku"
 game_concept_kampaku_desc: "O [Glossary( 'Kampaku', 'KAMPAKU_GLOSS' )] é, de fato, o cargo mais alto da burocracia [ritsuryo|lE], exercendo controle significativo sobre os órgãos de Estado em lugar do [tenno|lE].\n\nEmbora normalmente seja dominado pela família [Glossary( 'Fujiwara', 'FUJIWARA_GLOSS' )], qualquer família poderia se destacar se tiver bastante [influence|lE] e [prestige|lE]."
 game_concept_shogun: "Xógum"
 game_concept_shogun_possessive: "do xogum"
 game_concept_shogun_desc: "$game_concept_shogun$, ou ditador, é o governante [soryo_government|lE] de facto de todo o Japão, que consolidou sua posição ao ponto de sua sucessão ser hereditária e reina no lugar do [tenno|lE]."
 game_concept_cloistered_emperor: "Imperador enclausurado"
 game_concept_cloistered_emperor_possessive: "do imperador enclausurado"
 game_concept_joko: "Jōkō" # 上皇
 game_concept_joko_possessive: "do jōkō" # 上皇
 game_concept_cloistered_emperor_desc: "$game_concept_cloistered_emperor$ é um [tenno|lE] retirado que governa como [ceremonial_regent|lE] de fato para o imperador reinante.\n\nPara que um imperador se torne $game_concept_cloistered_emperor$, deve abdicar do #V Trono do Crisântemo#! e tornar-se monge."
 game_concept_restored_emperor: "Imperador restaurado"
 game_concept_restored_emperor_possessive: "do imperador restaurado"
 game_concept_restored_emperor_desc: "$game_concept_restored_emperor$ é aquele [tenno|lE] que governa de forma independente de um [ceremonial_regent|lE].\n\nPara que um [tenno|lE] seja um $game_concept_restored_emperor$, primeiro deve ter sido colocado no trono por uma [faction|lE] para $restore_ceremonial_liege_faction_name$ ou usar a [decision|lE] [GetDecisionWithKey('tgp_japan_emperor_restoration_decision').GetName] após tornar-se [ceremonial_regent|lE]."
 # EMPEROR
 game_concept_japanese_emperor: "Imperador japonês"
 game_concept_japanese_emperor_possessive: "do imperador japonês"
 game_concept_tenno: "Ten'nō"
 game_concept_tenno_possessive: "do Ten'nō"
 game_concept_japanese_emperor_desc: "$game_concept_tenno$ é o imperador oficial de todo $e_japan$, embora geralmente o poder esteja nas mãos do [ceremonial_regent|lE], que administra o Estado em seu nome."
 # House Aspirations
 game_concept_house_aspiration: "Aspiração da Casa"
 game_concept_house_aspirations: "Aspirações da Casa"
 game_concept_aspiration: "Aspiração"
 game_concept_aspirations: "Aspirações"
 game_concept_house_aspiration_desc: "A $game_concept_house_aspiration$ representa as metas e métodos de uma [house|lE] japonesa e cada uma delas proporciona bônus e oportunidades diferentes.\n\nO [house_head|lE] pode escolher qual Aspiração seguir e gastar [prestige|lE] para reforçar seu compromisso com ela, obtendo acesso a benefícios mais poderosos."
 # Imperial Policies
 game_concept_imperial_policy: "Política imperial"
 game_concept_imperial_policies: "Políticas imperiais"
 game_concept_imperial_policy_desc: "A $game_concept_imperial_policy$ é uma [law|lE] imposta pelo [top_liege|lE] do Japão que se aplica a todos os [vassals|lE]. Políticas diferentes podem restringir ou permitir certas ações ou causar efeitos em todo o [realm|lE]."
 # House Relations
 game_concept_house_relation: "Relação da Casa"
 game_concept_house_relations: "Relações da Casa"
 game_concept_house_relation_desc: "Quando duas [houses|El] interagem, elas podem desenvolver uma $game_concept_house_relation$ positiva ou negativa, que perdura por gerações.\n\nAlém de afetar a [opinion|El] de todos os membros da $game_concept_house$, cada nível de relação pode ter efeitos extras, como facilitar ou dificultar o estabelecimento de [alliances|El] e o início de [wars|El].\n\nA $game_concept_house_relation$ permanece no mesmo nível até que a soma de todas as ações chegue a #P +100 %#! ou #N -100 %#!. Então, a relação passará para o próximo nível, seja positivo ou negativo."
