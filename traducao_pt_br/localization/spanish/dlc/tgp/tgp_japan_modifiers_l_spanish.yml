l_spanish:
 #County Modifiers
 tgp_japan_fresh_fish_county_modifier: "Peixe fresco"
 tgp_japan_fresh_fish_county_modifier_desc: "O povo deste condado é abastecido com peixe recém-pescado."
 tgp_japan_pearl_county_modifier: "Pérolas preciosas"
 tgp_japan_pearl_county_modifier_desc: "Os mergulhadores deste condado às vezes encontram pérolas para vender."
 tgp_japan_abalone_temple_offerings_county_modifier: "Oferendas aos templos"
 tgp_japan_abalone_temple_offerings_county_modifier_desc: "Os mergulhadores deste condado vendem abalones, que se acredita trazerem uma vida longa."
 tgp_japan_taxed_entertainment_county_modifier: "Entretenimento tributado"
 tgp_japan_taxed_entertainment_county_modifier_desc: "Neste condado, nenhuma oportunidade de engrossar os cofres do Estado é ignorada, muito menos o entretenimento do povo."
 tgp_japan_prized_generosity_county_modifier: "Generosidade premiada"
 tgp_japan_prized_generosity_county_modifier_desc: "Poucas coisas incentivam mais uma rivalidade saudável entre vilarejos do que a promessa de um prêmio em uma competição, e o povo deste condado está, de fato, muito motivado."
 tgp_japan_fire_drilled_county_modifier: "Casas e simulações de incêndio"
 tgp_japan_fire_drilled_county_modifier_desc: "As casas deste condado têm muito interiorizado o perigo do fogo e a todas foi encarregado manter um balde em caso de incêndio."
 tgp_japan_instructive_plays_county_modifier: "Peças moralizantes instrutivas"
 tgp_japan_instructive_plays_county_modifier_desc: "As pessoas deste condado são lembradas do seu lugar mesmo quando tentam esquecê-lo durante algumas horas assistindo a uma peça."
 #Character Modifiers
 tpg_japan_hot_spring_relaxation_modifier: "Relaxando no onsen"
 tpg_japan_hot_spring_relaxation_modifier_desc: "Este personagem tomou um banho revigorante em um [Glossary( 'onsen', 'ONSEN_GLOSS' )]."
 tgp_japan_hot_spring_mystic_positive_modifier: "Espírito rejuvenescedor"
 tgp_japan_hot_spring_mystic_positive_modifier_desc: "Este personagem compreendeu como se alinhar com seu eu espiritual."
 tgp_japan_hot_spring_mystic_neutral_modifier: "Espírito cético"
 tgp_japan_hot_spring_mystic_neutral_modifier_desc: "Este personagem sentiu #EMP algo#!, mas não conseguiu entender o quê."
 tgp_japan_hot_spring_mystic_negative_modifier: "Espírito disperso"
 tgp_japan_hot_spring_mystic_negative_modifier_desc: "Este personagem não conseguiu se conectar com seu eu espiritual."
 tgp_japan_sake_offering_county_modifier: "Oferenda de saquê"
 tgp_japan_sake_offering_county_modifier_desc: "O governante deste condado mostrou respeito às divindades durante a celebração da floração das cerejeiras."
 #Character Modifiers
 tgp_japan_sake_offering_character_modifier: "Oferta de saquê"
 tgp_japan_sake_offering_character_modifier_desc: "Este personagem demonstrou respeito às divindades durante a celebração das flores de cerejeira."
 tgp_japan_tengu_rumors_character_modifier: "Rumores de tengus"
 tgp_japan_tengu_rumors_character_modifier_desc: "Este personagem ainda está procurando um [Glossary( 'tengu', 'TENGU_GLOSS' )] após ouvir um rumor.\n\nDiz-se que quem encontrar um e o impressionar será generosamente recompensado."
 tgp_japan_cautious_curiosity_character_modifier: "Curiosidade cautelosa"
 tgp_japan_cautious_curiosity_character_modifier_desc: "Este personagem foi enganado recentemente por um mero boato."
 tpg_japan_add_fish_to_pond_modifier: "Lago repleto de peixes"
 tpg_japan_add_fish_to_pond_modifier_desc: "O jardineiro deste personagem adicionou alguns peixes extras ao seu lago, tornando-o um lugar popular para os cortesãos visitarem."
 tgp_japan_train_with_troops_modifier: "Tropas inspiradas"
 tgp_japan_train_with_troops_modifier_desc: "Este personagem fez um discurso, inspirando suas tropas antes de qualquer batalha que venha a ocorrer."
 tgp_learned_from_onibi_modifier: "Aprendido com os onibi"
 tgp_learned_from_onibi_modifier_desc: "Este personagem obteve discernimento de sua discussão sobre os [Glossary( 'onibi', 'ONIBI_GLOSS' )]"
 tgp_buddhist_fighting_modifier: "Disputas internas religiosas"
 tgp_buddhist_fighting_modifier_desc: "Este personagem ficou de braços cruzados enquanto várias seitas budistas lutavam pelo controle em seu domínio."
 tgp_siren_yokai_love_modifier: "Em busca do amor"
 tgp_siren_yokai_love_modifier_desc: "Um [Glossary( 'yōkai', 'YOKAI_GLOSS' )] inspirou este personagem a encontrar o amor."
 tgp_siren_yokai_prose_modifier: "Contador de histórias aspirante"
 tgp_siren_yokai_prose_modifier_desc: "Este personagem foi inspirado pelas canções que um [Glossary( 'yōkai', 'YOKAI_GLOSS' )] lhe cantou em sonhos. Agora ele escreverá suas próprias histórias."
 tgp_garden_yokai_bloom_modifier: "Jardim em flor"
 tgp_garden_yokai_bloom_modifier_desc: "Este personagem acredita que um [Glossary( 'yōkai', 'YOKAI_GLOSS' )] o inspirou a investir em seu jardim."
 tgp_garden_yokai_building_modifier: "Arquiteto aspirante"
 tgp_garden_yokai_building_modifier_desc: "Este personagem acredita que um [Glossary( 'yōkai', 'YOKAI_GLOSS' )] o inspirou a construir estruturas em seu domínio."
 tgp_shadow_yokai_imitation_modifier: "Presença intimidadora"
 tgp_shadow_yokai_imitation_modifier_desc: "Este personagem transmite uma presença intimidadora ao pensar que tem um [Glossary( 'yōkai', 'YOKAI_GLOSS' )] como aliado."
 tgp_shadow_yokai_torch_modifier: "Patrulhas extras"
 tgp_shadow_yokai_torch_modifier_desc: "Este personagem acredita que um [Glossary( 'yōkai', 'YOKAI_GLOSS' )] possuiu sua sombra e está aumentando as defesas de seu domínio."
 tgp_shrine_heir_modifier: "Favor dinástico"
 tgp_shrine_heir_modifier_desc: "Este personagem rezou em um santuário e refletiu que deveria investir para assegurar o futuro de sua família."
 tgp_shrine_piety_modifier: "Servo fiel"
 tgp_shrine_piety_modifier_desc: "Este personagem fortaleceu sua fé ao rezar em um santuário."
 tgp_shrine_wealth_modifier: "Prosperidade econômica"
 tgp_shrine_wealth_modifier_desc: "Este personagem rezou em um santuário e refletiu que deveria investir em aumentar sua riqueza."
 tgp_shrine_health_modifier: "Corpo reforçado"
 tgp_shrine_health_modifier_desc: "Este personagem rezou em um santuário e refletiu que deveria investir em sua saúde."
 tgp_traveling_safe_modifier: "Viajante cauteloso"
 tgp_traveling_safe_modifier_desc: "Este personagem está sendo cauteloso enquanto viaja, evitando quaisquer perigos potenciais sem sacrificar a velocidade."
 tgp_rule_follower_modifier: "Súdito obediente"
 tgp_rule_follower_modifier_desc: "Este governante segue as leis de seu suserano e, em troca, seus súditos obedecerão."
 tgp_attentive_care_modifier: "Cuidado atencioso"
 tgp_attentive_care_modifier_desc: "As necessidades deste personagem estão sendo atendidas."
 tgp_neglected_modifier: "Desatenção"
 tgp_neglected_modifier_desc: "A saúde deste personagem é de importância secundária."
 tgp_law_defender: "Aplicação da lei"
 tgp_law_defender_desc: "Este personagem garante que todos os criminosos cumpram suas penas."
 tgp_temple_builder_modifier: "Construtor de santuários"
 tgp_temple_builder_modifier_desc: "Este personagem reconstruiu há pouco um santuário que havia sido incendiado."
 tgp_rebuilder_modifier: "Arquiteto Aspirante"
 tgp_rebuilder_modifier_desc: "Este personagem se esforça por construir edifícios não religiosos.\n\n#warning Não é possível construir [temples|lE]!#!"
 tgp_burned_yokai_modifier: "Caçador de yōkai"
 tgp_burned_yokai_modifier_desc: "Este personagem tem estado cada vez mais desconfiado dos [Glossary( 'yōkai', 'YOKAI_GLOSS' )]."
 tgp_burned_weather_modifier: "Edifícios reforçados"
 tgp_burned_weather_modifier_desc: "Este personagem fortaleceu seus edifícios contra calamidades naturais.\nPerda de [development|lE] por [natural_disasters|lE] de: #P -20 %#!"
 tgp_faith_defender_modifier: "Espancador de hereges"
 tgp_faith_defender_modifier_desc: "Este personagem não lida bem com os não crentes."
 tgp_people_mingler_modifier: "Governo magnânimo"
 tgp_people_mingler_modifier_desc: "Este personagem demonstrou magnanimidade em sua corte."
 tgp_scheme_wary_modifier: "Investigador particular"
 tgp_scheme_wary_modifier_desc: "Este personagem tem conhecimento pessoal dos segredos em sua corte."
 tgp_fertility_boost_modifier: "Entranhas poderosas"
 tgp_fertility_boost_modifier_desc: "Este personagem fez um esforço extra para gerar um herdeiro."
 tgp_longer_life_modifier: "Governante duradouro"
 tgp_longer_life_modifier_desc: "Apesar de sua idade avançada, este governante se esforça para viver uma vida longa."
 tgp_guilt_fever_modifier: "Febre de culpa"
 tgp_guilt_fever_modifier_desc: "Este personagem carrega o peso das consequências de suas ações."
 tgp_reflection_modifier: "Senda do destino"
 tgp_reflection_modifier_desc: "Este personagem tem refletido bastante ultimamente e está mais aberto a explorar sua fé.\nCusto de [pilgrimage|lE] #P -20 %#!"
 tgp_japan_drafted_villagers_modifier: "Aldeões recrutados"
 tgp_japan_drafted_villagers_modifier_desc: "Este personagem tem faro para o talento, e sempre há utilidade para os aldeões parrudos."
 tgp_japan_precise_insight_modifer: "Compreensão precisa"
 tgp_japan_precise_insight_modifer_desc: "Este personagem pode obter percepções estratégicas até dos lugares mais comuns e então aplicar esse conhecimento em circunstâncias mais militares."
 tgp_japan_banisher_of_demons_modifer: "Desterro de demônios"
 tgp_japan_banisher_of_demons_modifer_desc: "Mascarada ou não, expulsar os \"demônios\" com tochas da noite fortaleceu a reputação deste personagem."
 tgp_japan_lucky_fan_fragments_modifier: "Fragmentos de leque afortunados"
 tgp_japan_lucky_fan_fragments_modifier_desc: "Pode ser que este personagem não tenha ganho o prêmio no tiro com arco, mas levou para casa um dos pedaços do alvo, dizem que trazem boa sorte para quem os guarda."
 tgp_japan_a_poetic_life_modifier: "Uma vida poética"
 tgp_japan_a_poetic_life_modifier_desc: "Este personagem priorizou viver uma vida poética. Está aberto a novas experiências, e outros buscam vivê-las com ele."
 tgp_japan_made_high_liege_cuckold_modifier: "Uma vida poética: imortalidade imperial"
 tgp_japan_made_high_liege_cuckold_modifier_desc: "Este personagem se imortalizou ao deitar-se com o cônjuge de seu suserano. Essa experiência inspirará ainda mais sua produção poética."
 tgp_japan_exchanged_verses_modifier: "Uma vida poética: versos trocados"
 tgp_japan_exchanged_verses_modifier_desc: "Este personagem ampliou seu repertório por meio de uma união poética."
 tgp_japan_poetic_to_the_powerful_modifier: "Poeta dos poderosos"
 tgp_japan_poetic_to_the_powerful_modifier_desc: "Este personagem melhorou seu relacionamento com uma figura importante ao empregar um verso inteligente."
 tgp_japan_poet_poisonous_flowers_modifier: "Flores venenosas"
 tgp_japan_poet_poisonous_flowers_modifier_desc: "Este personagem coletou algumas flores tóxicas; com que propósito, quem pode adivinhar..."
 tgp_japan_poet_medicinal_flowers_modifier: "Flores medicinais"
 tgp_japan_poet_medicinal_flowers_modifier_desc: "Este personagem reuniu algumas flores medicinais para melhorar sua saúde."
 tgp_japan_made_poetic_life_artifact_modifier: "Uma vida poética: mil folhas imortais"
 tgp_japan_made_poetic_life_artifact_modifier_desc: "Este personagem criou um pilar de [culture|El] por meio de sua produção poética."
 tgp_sharing_power_modifier: "Compartilhar poder"
 tgp_sharing_power_modifier_desc: "Este personagem compartilha o poder para aliviar o estresse."
 tgp_power_undermined_modifier: "Poder minado"
 tgp_power_undermined_modifier_desc: "Este personagem teve seu poder minado por uma força externa.\n@declare_regent_icon! Aceitação de “Declarai-me regente”: #P +25#!"
 tgp_spreading_scholarly_work_modifier: "Difusão da obra acadêmica"
 tgp_spreading_scholarly_work_modifier_desc: "Este personagem incentiva os eruditos a escrever ensaios e memoriais por todo o seu reino."
 tgp_regent_minted_coin_modifier: "Moeda cunhada"
 tgp_regent_minted_coin_modifier_desc: "Este personagem cunhou uma moeda com sua aparência."
 tgp_regent_history_modifier: "Eruditos incentivados"
 tgp_regent_history_modifier_desc: "Este personagem incentivou eruditos e poetas a escrever sobre sua grandeza."
 tgp_regent_guarded_modifier: "Impulso de Moral"
 tgp_regent_guarded_modifier_desc: "Este personagem sabe como influenciar comandantes militares e cavaleiros."
 tgp_stability_tree_modifier: "Raízes fortes"
 tgp_stability_tree_modifier_desc: "O reino e a corte deste personagem são estáveis como as raízes de um [Glossary( 'bonsái', 'BONSAI_GLOSS' )]."
 tgp_health_resistance_modifier: "Saúde reforçada"
 tgp_health_resistance_modifier_desc: "Este personagem comeu comida do templo enquanto rezava com um monge, e essa melhoria em sua dieta reforçou sua saúde."
 tgp_cultural_appreciation_modifier: "Apreciação linguística"
 tgp_cultural_appreciation_modifier_desc: "Este personagem reconhece as diferenças entre diferentes línguas."
 tgp_japan_ushiwakamaru: "Ushiwakamaru"
 tgp_japan_ushiwakamaru_desc: "Forte como um touro, este personagem continuará procurando oponentes mais fortes para duelar.\n$stay_duelist_adventurer$"
 tgp_japan_ushiwakamaru_2: "$tgp_japan_ushiwakamaru$"
 tgp_japan_ushiwakamaru_2_desc: "Forte como um touro, este personagem continuará buscando oponentes mais fortes para duelar.\n$stay_duelist_adventurer$"
 tgp_japan_ushiwakamaru_3: "$tgp_japan_ushiwakamaru$"
 tgp_japan_ushiwakamaru_3_desc: "Forte como um touro, este personagem continuará buscando oponentes mais fortes para duelar.\n$stay_duelist_adventurer$"
 tgp_japan_ushiwakamaru_4: "$tgp_japan_ushiwakamaru$"
 tgp_japan_ushiwakamaru_4_desc: "Forte como um touro, este personagem continuará procurando oponentes mais fortes para duelar.\n#help Se ha alcanzado el máximo potencial de este personaje#!"
 tgp_japan_control_over_emperor: "Manipulador do Imperador"
 tgp_japan_control_over_emperor_desc: "Este personagem colocou um Imperador submisso no trono."
 tgp_japan_fujiwara_hidehira_back_in_town: "Pela espada"
 tgp_japan_fujiwara_hidehira_back_in_town_desc: "Este personagem deseja restaurar os Fujiwara ao poder pela força."
 tgp_moved_shogun_court_modifier: "Capital do xogunato"
 tgp_moved_shogun_court_modifier_desc: "Este condado está sendo estabelecido como uma nova capital para o xogunato, longe da capital imperial."
 tgp_festival_prosperity: "Prosperidade do festival"
 tgp_festival_prosperity_desc: "Este condado sediou um festival próspero"
 ceremonial_liege_appointment_support_desc: "Apoio ao suserano cerimonial"
