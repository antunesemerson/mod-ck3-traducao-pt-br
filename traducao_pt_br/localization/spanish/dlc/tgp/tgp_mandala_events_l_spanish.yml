l_spanish:
 aspect_upgrade_event_header: "Aspecto de [ROOT.Char.Custom('GetAspectNoun')]:"
 tgp_east_asia_mandala_events.1000.t: "$aspect_upgrade_event_header$ ascensão"
 tgp_east_asia_mandala_events.1000.t.final: "$aspect_upgrade_event_header$ transcendência"
 tgp_east_asia_mandala_events.1000.desc.02: "Com muita alegria, danças e ritos de [ROOT.Char.Custom('GetAspectNoun')], trouxe honra à casa [ROOT.Char.GetHouse.GetBaseName] ao ascender ao próximo passo do aspecto de [ROOT.Char.Custom('GetAspectNoun')].\n\nOs rumores de nossos #EMP poderes#! e atos quase divinos atraem mais seguidores a cada dia que passa.\n\nPermito-me saborear isso por um momento, observando o espetáculo dos celebrantes à minha frente."
 tgp_east_asia_mandala_events.1000.desc.03.outro: "Inclino-me para trás e observo os sacrifícios simbólicos e os artistas dançarem em minha honra. #EMP Nuestro poder crece.#!"
 tgp_east_asia_mandala_events.1000.desc.creation_03: "Um banquete em honra do aspecto da criação —um delicioso espetáculo de cores, dança e música— é realizado para celebrar a ascensão da casa [ROOT.Char.GetHouse.GetBaseName] ao degrau intermediário da criação.\n\nAo demonstrarmos nossa divindade, um ato após o outro, estamos reunindo uma grande quantidade de seguidores.\n\nCorreção: #EMP yo#! reúno uma grande quantidade de seguidores. Que acreditam em #EMP mí#!."
 tgp_east_asia_mandala_events.1000.desc.creation_04: "Um banquete notavelmente barulhento; que outra forma haveria de celebrar um aspecto da criação quase perfeito? Os dançarinos, os ritos, os vislumbres de pele nua, tudo celebrando a criação e a ascensão ainda maior da casa [ROOT.Char.GetHouse.GetBaseName].\n\nNossa enorme quantidade de crentes nos consolida como uma força imparável, reivindicando nosso lugar no mundo.\n\nPego uma delícia de [ROOT.Char.Custom('GetAspectNoun')] de uma mesa próxima e a saboreio enquanto desfruto do espetáculo."
 tgp_east_asia_mandala_events.1000.desc.05.intro: "Por fim, a longa jornada da casa [ROOT.Char.GetHouse.GetBaseName] e de seus descendentes divinos é concluída."
 tgp_east_asia_mandala_events.1000.desc.creation_05: "$tgp_east_asia_mandala_events.1000.desc.05.intro$\n\nNão resta a menor dúvida para ninguém de que os irmãos e irmãs de [ROOT.Char.GetHouse.GetBaseNameNoTooltip] carregam os traços e a essência do aspecto da criação, trazendo as obras do criador à Terra.\n\n #EMP Conmigo#! como Seu avatar, é claro.\n\nBebo outra taça de [ROOT.Char.Custom('RegionalDrink')] marcando o início de semanas de celebração."
 tgp_east_asia_mandala_events.1000.desc.serenity_03: "Uma celebração organizada com o máximo cuidado; não se pouparam gastos com a ascensão da casa [ROOT.Char.GetHouse.GetBaseName] a um degrau intermediário do aspecto de serenidade.\n\nOs seguidores do nosso caminho pacífico crescem de forma constante à medida que as pessoas passam a ver os benefícios de agir como nós.\n\nValorizo a oportunidade de fazer deste mundo um lugar melhor. Um mais tranquilo."
 tgp_east_asia_mandala_events.1000.desc.serenity_04: "Uma celebração magnífica que começa com uma meditação comunal; a enorme quantidade de cabeças baixadas em serenidade enche meu coração de alegria. Que melhor maneira de honrar a casa [ROOT.Char.GetHouse.GetBaseName] , que atualmente está à beira de um aspecto perfeito de serenidade?\n\nEssa enorme quantidade de crentes sinaliza nosso lugar neste mundo. Uma sede de paz e quietude. De aceitação e acordo.\n\nInclino novamente a cabeça em oração e meditação silenciosa, ponderando sobre isso."
 tgp_east_asia_mandala_events.1000.desc.serenity_05: "$tgp_east_asia_mandala_events.1000.desc.05.intro$\n\nInimigos transformados em amigos. A paz e a prosperidade se infiltram no domínio. A sabedoria e a serenidade incutidas pelos irmãos e irmãs da casa [ROOT.Char.GetHouse.GetBaseNameNoTooltip] deixaram uma marca permanente em [ROOT.Char.GetPrimaryTitle.GetBaseName].\n\nUma celebração verdadeiramente serena para o genuíno avatar do aspecto da serenidade.\n\nInclino benevolentemente a cabeça em resposta às suas graciosas preces e votos de bem."
 tgp_east_asia_mandala_events.1000.desc.destruction_03: "Há um barulho ensurdecedor quando as tropas golpeiam suas armas contra os escudos, chamando a atenção para a ascensão da casa [ROOT.Char.GetHouse.GetBaseName] ao degrau intermediário do aspecto da destruição.\n\nAs notícias de nosso legado se espalham rapidamente e o número de nossos seguidores é ainda maior do que antes.\n\n$tgp_east_asia_mandala_events.1000.desc.03.outro$"
 tgp_east_asia_mandala_events.1000.desc.destruction_04: "#EMP PLOM, PLOM.#! Não se ouve nenhum som além do estrondoso pisotear dos soldados de [ROOT.Char.GetPrimaryTitle.GetBaseName] ao realizarem seus ritos de celebração, imitando a dança da destruição agora que a casa [ROOT.Char.GetHouse.GetBaseName] está tão perto de completar a transcendência.\n\nNossos seguidores estão ansiosos para se unir à nossa causa e servir sob um verdadeiro aspecto de destruição.\n\nSorrio de leve e acaricio cuidadosamente minha lâmina com a pedra de amolar enquanto observo a cerimônia.\n\n#EMP PLOM, PLOM.#!"
 tgp_east_asia_mandala_events.1000.desc.destruction_05: "$tgp_east_asia_mandala_events.1000.desc.05.intro$\n\nA própria terra parece tremer e estremecer quando as tropas juramentadas de [ROOT.Char.GetPrimaryTitle.GetBaseName] realizam suas temíveis pisadas, cantos e rituais a serviço dos irmãos e irmãs de [ROOT.Char.GetHouse.GetBaseNameNoTooltip].\n\nEles se ajoelham brevemente diante de mim, seu deus, antes de continuar a cerimônia.\n\nPasso distraidamente a mão por um crânio, presenteado a mim em um dos rituais, enquanto me reclino em meu trono."
 tgp_east_asia_mandala_events.1000.desc.trickery_03: "Com sucesso, fortaleci o legado de divindades maliciosas da casa [ROOT.Char.GetHouse.GetBaseName] e as celebrações rituais são proporcionalmente alegres.\n\nUm a um, os inimigos da casa [ROOT.Char.GetHouse.GetBaseName] caem misteriosamente para o lado ou se tornam nossos seguidores.\n\n$tgp_east_asia_mandala_events.1000.desc.03.outro$"
 tgp_east_asia_mandala_events.1000.desc.trickery_04: "Oferendas, tantas oferendas para apaziguar a casa [ROOT.Char.GetHouse.GetBaseName], agora à beira de alcançar um aspecto impecável de trapaça.\n\nOuro, peles, especiarias. Conchas, animais exóticos. Nossos seguidores sabem como nos apaziguar. Ou será que sabem?\n\nIsso cabe a #EMP yo#!, lançando minha teia de sombras sobre qualquer um que se oponha a mim.\n\nDou uma risadinha baixinho."
 tgp_east_asia_mandala_events.1000.desc.trickery_05: "$tgp_east_asia_mandala_events.1000.desc.05.intro$\n\nNa superfície, tudo parece festivo e normal, mas todos sabem que o menor passo em falso ou deslize moral pode resultar na visita de uma das divindades imprevisíveis dos [ROOT.Char.GetHouse.GetBaseNameNoTooltip].\n\nTodos estão desesperados para manter nosso favor divino e permanecer na linha. #EMP Mi#! lugar.\n\nObservo a multidão, ponderando astutamente quem considerar digno da minha atenção."
 tgp_east_asia_mandala_events.1000.a: "Tudo está como deveria ser."
 mandala_descendant_from_aspect_of_creation.tt: "Todos os seus [children|El]"
 mandala_descendant_from_aspect_of_creation_modifier: "Descendente da criação"
 mandala_descendant_from_aspect_of_creation_modifier_desc: "Este personagem é filho de um Aspecto da Criação ascendido."
 mandala_aspect_of_serenity_devotion.tt: "Ganha-se #P [EmptyScope.ScriptValue('num_years_of_peace_devotion')]#! de [piety_experience|El] por ano de [war|El] não ofensiva #WEAK (atualmente #P [THIS.Char.MakeScope.ScriptValue('num_years_of_peace_devotion_payout')]#! de [piety_experience|El])#!"
 mandala_forged_from_aspect_of_destruction.tt: "Todos os seus [THIS.Char.Custom('KnightCulturePlural')|l]"
 mandala_forged_from_aspect_of_destruction_modifier: "Forjado na destruição"
 mandala_forged_from_aspect_of_destruction_modifier_desc: "Este personagem serviu como cavaleiro sob um Aspecto da Destruição ascendido."
 mandala_aspect_of_trickery_devotion.tt: "Ganha-se #P [EmptyScope.ScriptValue('num_years_of_peace_devotion')]#! de [piety_experience|El] por [scheme|El] bem-sucedida até este ponto #WEAK (atualmente #P [THIS.Char.MakeScope.ScriptValue('num_successful_schemes_devotion_payout')]#! de [piety_experience|El])#!"
 mandala_ascended_in_aspect_of_trickery_modifier: "Trapaceiro ascendido"
 mandala_ascended_in_aspect_of_trickery_modifier_desc: "Este personagem ascendeu como um aspecto de trapaça."
 busy_in_mandala_succession: "Você está atualmente ocupado em uma sucessão [mandala|lE]"
 mandala_succession_header: "Sucessão mandala:"
 tgp_east_asia_mandala_events.8497.t.lose_by_default: "Fracasso ao realizar os testes de sucessão mandala para continuar"
 tgp_east_asia_mandala_events.8497.tt.lose_by_default: "$tgp_east_asia_mandala_events.8499.a.tt.imprisoned$"
 tgp_east_asia_mandala_events.8499.t: "$mandala_succession_header$ os julgamentos"
 tgp_east_asia_mandala_events.8499.intro.imprisoned: "Fico sabendo que, no fundo das masmorras [ROOT.Char.GetImprisonedBy.Custom('ES_DelDela')] [ROOT.Char.GetImprisonedBy.GetTitledFirstName|l], meu [ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )] , [deceased_mandala_ruler.GetFirstName] , deixou este mundo e me deixou a tarefa de governar o domínio."
 tgp_east_asia_mandala_events.8499.intro.recent_adult.imprisoned: "Por fim estou prestes a atingir a idade adulta; o momento em que posso participar dos desafios e mostrar ao reino quão digno[ROOT.Char.Custom('ES_OA')]sou de suceder meu [ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )] [deceased_mandala_ruler.GetFirstName]."
 tgp_east_asia_mandala_events.8499.desc.imprisoned: "\n\nMas como fazer algo assim quando estou aqui, aprisionad[ROOT.Char.Custom('ES_OA')], sendo #EMP de todo menos divin[ROOT.Char.Custom('ES_OA')]#!? Cobert[ROOT.Char.Custom('ES_OA')] de imundície, tratad[ROOT.Char.Custom('ES_OA')] como um animal.\n\nJuro que me vingarei quando sair daqui. Minha vingança #EMP caerá sobre mis enemigos#!."
 tgp_east_asia_mandala_events.8499.desc.recent_adult: "Chegou a hora! Finalmente é o meu momento de suceder meu [ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )] [deceased_mandala_ruler.GetFirstName] comparecendo aos desafios.\n\nSe eu demonstrar minha excelência em cada área, meu desempenho e a recepção decidirão quanta fé meus seguidores terão em mim como aspecto de [ROOT.Char.Custom('GetAspectNoun')|l] daqui em diante.\n\nEu #EMP sucederé#! meu [ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )]!"
 tgp_east_asia_mandala_events.8499.desc.was_traveling: "O pó mal havia baixado quando me conduzem aos aposentos, os banhos já preparados, e minhas roupas foram trocadas pelas de um verdadeiro[ROOT.Char.Custom('ES_XA')] autêntic[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip].\n\nCom a pele arrepiada pelo tratamento brusco e pelo frio repentino no ar, preparo-me mentalmente para os provações que me aguardam.\n\nA oportunidade de mostrar-me como um[ROOT.Char.Custom('ES_XA')] sucessor[ROOT.Char.Custom('ES_XA')] dign[ROOT.Char.Custom('ES_OA')] de meu [ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )] e encarnar o aspecto de [ROOT.Char.Custom('GetAspectNoun')|l]. É a hora."
 tgp_east_asia_mandala_events.8499.desc: "Meu [ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )] , [deceased_mandala_ruler.GetFirstName] já não existe. Ascendeu deste plano da existência e me deixou para dar um passo à frente e canalizar o aspecto de [ROOT.Char.Custom('GetAspectNoun')|l] com o objetivo de conduzir nosso domínio e dar-lhe um lugar nos anais da história.\n\nRealizarei os desafios e mostrarei o quanto sou divino e onipresente ao me destacar em uma multiplicidade de aspectos.\n\n… Um arrepio percorre minha espinha quando considero momentaneamente a alternativa."
 tgp_east_asia_mandala_events.8499.a: "Estou o mais pront[ROOT.Char.Custom('ES_OA')] possível."
 tgp_east_asia_mandala_events.8499.a.imprisoned: "Isto eu juro."
 tgp_east_asia_mandala_events.8499.a.flavor.imprisoned: "Não era para ter terminado assim…"
 tgp_east_asia_mandala_events.8499.a.tt.imprisoned: "Você falha nos Testes de Sucessão da [mandala_succession_succession|lE] por não comparecer"
 tgp_east_asia_mandala_events.8499.a.tt.trials: "Começa a primeira Prova da [mandala_succession_succession|lE]!"
 mandala_divine_retribution_modifier: "Retribuição divina"
 mandala_divine_retribution_modifier_desc: "Este personagem dedica a vida a derrotar seus inimigos."
 tgp_east_asia_mandala_events.8500.t: "$mandala_succession_header$ Perdendo a cabeça"
 tgp_east_asia_mandala_events.8500.desc: "Estamos no meio dos rituais de criação, celebrando minha ascensão ao trono. Misturo-me à multidão, sorrindo benevolentemente para meus seguidores enquanto eles se aproximam com suas oferendas.\n\n[Select_CString( dummy_gender.IsFemale, 'Uma menina pequena', 'Um menino pequeno' )] sai do meio da multidão e envolve minha cintura com seus bracinhos em um abraço inocente. Então, [dummy_gender.Custom('ES_ElLa')] [dummy_gender.Custom('GirlBoy')] ergue o olhar para mim e pergunta: [ROOT.Char.GetTitleAsNameNoTooltip|U]... o que #EMP aconteceu#! com sua quinta cabeça?\n\nSeu cuidador parece petrificado pela insolência, mas percebo que todos na sala se animam, aguardando ansiosamente minha resposta."
 tgp_east_asia_mandala_events.8500.dynasty.override: ""Seus professores devem conseguir lhe dizer"."
 tgp_east_asia_mandala_events.8500.a: ""Meus pecados e os ciúmes dos outros, [Select_CString( dummy_gender.IsFemale, 'minha filha', 'meu filho' )]"."
 tgp_east_asia_mandala_events.8500.a.final_aspect: "Você não está no nível final do [aspect_of_creation|lE]"
 tgp_east_asia_mandala_events.8500.success.tt: "Você tem êxito na prova de [mandala_succession_succession|E] de [stewardship|lE]"
 tgp_east_asia_mandala_events.8500.b: ""Ah, deixe-me contar…""
 tgp_east_asia_mandala_events.8500.b.flavor: "Estou #EMP bastante#! certo[ROOT.Char.Custom('ES_OA')] de que aconteceu assim…"
 tgp_east_asia_mandala_events.8500.b.t.success: "Muito convincente"
 tgp_east_asia_mandala_events.8500.b.tt.success: "Você consegue convencê-los"
 tgp_east_asia_mandala_events.8500.b.t.failure: "Nada impressionados"
 tgp_east_asia_mandala_events.8500.b.tt.failure: "Um murmúrio de incredulidade escapa da multidão."
 tgp_east_asia_mandala_events.8510.t: "$mandala_succession_header$ em paz como um lago"
 tgp_east_asia_mandala_events.8510.desc: "Os assistentes se ajoelham em fileiras compactas, e um cântico baixo ecoa por toda a câmara durante meu ritual de ascensão. Dou uma volta com gentileza, tocando levemente um punhado de testas, tentando inspirar paz e serenidade.\n\nNo meio de tudo isso, dois [dummy_gender.GetWomenMen] mantêm lá fora uma discussão acalorada sobre um pedaço de terra.\n\nSeu alvoroço fez com que a sala voltasse pouco a pouco sua atenção para mim, observando ansiosamente como lido com essa interrupção da paz."
 tgp_east_asia_mandala_events.8510.dynasty.override: ""Este é um lugar sagrado. Controlem-se"."
 tgp_east_asia_mandala_events.8510.a: ""Vocês compartilham a terra #EMP e#! compartilham a colheita"."
 tgp_east_asia_mandala_events.8510.a.final_aspect: "Você não está no nível final do [aspect_of_serenity|lE]"
 tgp_east_asia_mandala_events.8510.success.tt: "Você é bem-sucedido no julgamento de [mandala_succession_succession|lE] de [diplomacy|lE]"
 tgp_east_asia_mandala_events.8510.b: ""E se resolvermos #EMP así#!…?""
 tgp_east_asia_mandala_events.8510.b.flavor: "Por que as pessoas são tão mesquinhas…"
 tgp_east_asia_mandala_events.8510.b.t.success: "$tgp_east_asia_mandala_events.8500.b.t.success$"
 tgp_east_asia_mandala_events.8510.b.tt.success: "$tgp_east_asia_mandala_events.8500.b.tt.success$"
 tgp_east_asia_mandala_events.8510.b.t.failure: "$tgp_east_asia_mandala_events.8500.b.t.failure$"
 tgp_east_asia_mandala_events.8510.b.tt.failure: "$tgp_east_asia_mandala_events.8500.b.tt.failure$"
 tgp_east_asia_mandala_events.8520.t: "$mandala_succession_header$ a dança da destruição"
 tgp_east_asia_mandala_events.8520.desc: "Minha lança capta a luz trêmula das tochas, e a multidão silenciosa observa com avidez meu rosto besuntado de cinzas. Um mar de flores me cerca enquanto as conchas emitem um som baixo e vibrante.\n\nEspera-se que eu realize a dança cósmica; a dança da destruição, simbolizando a dualidade divina. A destruição do antigo, abrindo espaço para que o novo brote e cresça.\n\nA pedra cilíndrica no centro da clareira emana uma calma frescura à medida que me aproximo."
 tgp_east_asia_mandala_events.8520.dynasty.override: ""Nasci para isso. É meu direito"."
 tgp_east_asia_mandala_events.8520.a: "Eu poderia fazer isso #EMP dormid[ROOT.Char.Custom('ES_OA')]#!!"
 tgp_east_asia_mandala_events.8520.a.final_aspect: "Você não está no nível final de [aspect_of_destruction|lE]"
 tgp_east_asia_mandala_events.8520.success.tt: "Você tem sucesso no julgamento de [mandala_succession_succession|lE] [martial|lE]"
 tgp_east_asia_mandala_events.8520.b: "Certo, vamos tentar isso..."
 tgp_east_asia_mandala_events.8520.b.flavor: "Um, dois, ah… de lado?"
 tgp_east_asia_mandala_events.8520.b.t.success: "$tgp_east_asia_mandala_events.8500.b.t.success$"
 tgp_east_asia_mandala_events.8520.b.tt.success: "$tgp_east_asia_mandala_events.8500.b.tt.success$"
 tgp_east_asia_mandala_events.8520.b.t.failure: "$tgp_east_asia_mandala_events.8500.b.t.failure$"
 tgp_east_asia_mandala_events.8520.b.tt.failure: "$tgp_east_asia_mandala_events.8500.b.tt.failure$"
 tgp_east_asia_mandala_events.8530.t: "$mandala_succession_header$ ilusões reais"
 tgp_east_asia_mandala_events.8530.desc: "A multidão se reuniu aqui para me ver. Para ser encantada por #EMP la#!. Os grupos conversam em voz baixa, e um sino toca em algum lugar, indicando que chegou a hora.\n\nEntro no círculo, ao lado da pedra cilíndrica, e descanso a palma da mão sobre sua superfície lisa e fria.\n\nUma miríade de rostos, jovens e idosos, silencia e se vira para mim enquanto eu limpo a garganta, preparando meu discurso:"
 tgp_east_asia_mandala_events.8530.dynasty.override: ""Permita-me falar daqueles que vieram antes de mim"."
 tgp_east_asia_mandala_events.8530.a.final_aspect: "Você não está no nível final do [aspect_of_trickery|E]"
 tgp_east_asia_mandala_events.8530.success.tt: "Você é bem-sucedido na Prova de [mandala_succession_succession|lE] de [intrigue|lE]"
 tgp_east_asia_mandala_events.8530.a: ""Deixe-me falar sobre a ilusão da dualidade"."
 tgp_east_asia_mandala_events.8530.b: ""… e se eu lhe dissesse que o engano não é #EMP real?#!""
 tgp_east_asia_mandala_events.8530.b.flavor: "Pelo menos é isso que eu quero #EMP quiero#! que pensem."
 tgp_east_asia_mandala_events.8530.b.t.success: "$tgp_east_asia_mandala_events.8500.b.t.success$"
 tgp_east_asia_mandala_events.8530.b.tt.success: "$tgp_east_asia_mandala_events.8500.b.tt.success$"
 tgp_east_asia_mandala_events.8530.b.t.failure: "$tgp_east_asia_mandala_events.8500.b.t.failure$"
 tgp_east_asia_mandala_events.8530.b.tt.failure: "$tgp_east_asia_mandala_events.8500.b.tt.failure$"
 tgp_east_asia_mandala_events.8550.t: "$mandala_succession_header$ o caminho à frente"
 tgp_east_asia_mandala_events.8550.t.failed: "$mandala_succession_header$ sem futuro"
 tgp_east_asia_mandala_events.8550.desc.critical_success: "Vivas, vivas, vivas por toda parte. A multidão está extasiada, e o alívio por sua nova divindade estar à altura da divindade de [deceased_mandala_ruler.GetFirstName] , seu predecessor[deceased_mandala_ruler.Custom('ES_XA')] é palpável.\n\nFlores são lançadas em minha direção, pessoas cantam, outras batem palmas ou pisam no chão em exaltação. Um pequeno banquete é organizado espontaneamente, e os seguidores continuam a entoar meu nome e brindar, até tarde da noite.\n\nFiz um bom trabalho, e o caminho à frente é promissor. Permito-me um sorriso discreto."
 tgp_east_asia_mandala_events.8550.desc.success: "Um sussurro silencioso percorre a sala antes de surgir um murmúrio intermediário e, depois, um estourar ocasional que se transforma em um aplauso entusiasmado quando demonstro ser uma divindade nascente.\n\nEmbora eu não tenha estado totalmente à altura do nível de divindade de [deceased_mandala_ruler.GetFirstName], minha [ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )], eu mostrei aos meus seguidores que tenho o conhecimento para nos salvar de situações complicadas que estão, em maior ou menor grau, fora do meu controle.\n\nSem dúvida, há potencial de crescimento aqui, e aguardo ansiosamente a chance de provar meu valor."
 tgp_east_asia_mandala_events.8550.desc: "A sala explode em murmúrios entre grupos de servos; cortesãos que eu sempre considerei meus amigos e súditos leais. Seus olhos me encaram, com desconfiança, pois foi provado que não sou tão divino quanto meu #EMP no#![ROOT.Char.Custom2('RelationToMe', deceased_mandala_ruler )][deceased_mandala_ruler.GetFirstName], \n\nBaixo levemente a cabeça, preocupad[ROOT.Char.Custom('ES_OA')] por um momento com o que virá. Então percebo como isso pode ser interpretado e endireito as costas, encarando desafiadoramente os olhos de cada grupo murmurante na sala.\n\nHá muita confiança a ser recuperada aqui, e o caminho à frente não será #EMP fácil#!."
 tgp_east_asia_mandala_events.8550.desc.failed: "Me tremem os joelhos e minha cabeça gira ligeiramente quando percebo o que está prestes a acontecer. Falhei a [deceased_mandala_ruler.GetFirstName] e ao reino.\n\nNão sou um[ROOT.Char.Custom('ES_XA')] sucessor[ROOT.Char.Custom('ES_XA')] digno[ROOT.Char.Custom('ES_OA')] de [ROOT.Char.GetPrimaryTitle.GetName]. Não há nada sobre o que construir.\n\nEm um momento de lucidez, olho ao redor e noto que todos já foram embora ou estão indo embora — de costas para mim, com apenas murmúrios e resmungos de decepção. Caio de joelhos, permitindo que o peso do mundo me derrube por um momento."
 tgp_east_asia_mandala_events.8550.a: "Estou pront[ROOT.Char.Custom('ES_OA')]."
 tgp_east_asia_mandala_events.8550.a.failed: "Não era para ter sido assim!"
