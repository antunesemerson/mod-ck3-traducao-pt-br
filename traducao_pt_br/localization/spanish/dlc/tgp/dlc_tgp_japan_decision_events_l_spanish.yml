l_spanish:
 ##################################################
 # JAPAN DECISION EVENTS
 ##################################################
 # tgp_japan_establish_house_fief_decision
 tgp_japan_decision.9001.t.fief: "O feudo de [ROOT.Char.GetHouse.GetBaseNameNoTooltip]"
 tgp_japan_decision.9001.t.cadet: "$create_cadet_branch_decision$"
 tgp_japan_decision.9001.desc.fief_split_house: "Tenho orgulho de pertencer à casa [old_house.GetBaseNameNoTooltip] mas é hora de abrir um novo caminho e estabelecer minhas próprias terras em [ROOT.Char.GetCapitalLocation.GetTitle.GetDeJureLiege.GetNameNoTier], aconteça o que acontecer com o chefe da minha casa, [old_head.Custom('ES_ElLa')][old_head.GetTitledFirstName|l]."
 tgp_japan_decision.9001.desc.fief_name: "\n\nSó me resta decidir o nome da minha nova casa…"
 tgp_japan_decision.9001.desc.cadet: "Tenho orgulho de pertencer à casa [old_house.GetBaseNameNoTooltip], mas é hora de abrir um novo caminho e estabelecer minha própria casa, pense o que pensar o chefe da minha casa, [old_head.Custom('ES_ElLa')] [old_head.GetTitledFirstName|l]."
 tgp_japan_decision.9001.desc.permission: "\n\nCom a bênção [regent.Custom('ES_DelDela')] [regent.GetTitledFirstName|l] pouco há de temer censura da capital!"
 tgp_japan_decision.9001.desc.crime: "\n\nCertamente [regent.Custom('ES_ElLa')] [regent.GetTitledFirstName|l] ficará furioso quando souber disso, mas isso não é motivo de grande preocupação!"
 tgp_japan_decision.9001.desc.feudal: "\n\nPor fim a casa [ROOT.Char.GetHouse.GetBaseNameNoTooltip] se une às fileiras da nova nobreza, liderada por [regent.Custom('ES_ElLa')] [regent.GetTitledFirstName|l]."
 tgp_japan_decision.9001.a.fief: "Um novo sol se ergue."
 tgp_japan_decision.9001.a.cadet: "$tgp_japan_decision.9001.a.fief$"
 tgp_japan_decision.9002.t: "$tgp_japan_decision.9001.t.fief$"
 tgp_japan_decision.9002.t.landless: "$tgp_japan_decision.9001.t.fief$"
 tgp_japan_decision.9002.desc: "Temos lutado da melhor forma possível dentro dos limites da burocracia, mas não mais."
 tgp_japan_decision.9002.desc.landed: "É hora de forjar um novo caminho e estabelecer [ROOT.Char.GetCapitalLocation.GetTitle.GetDeJureLiege.GetNameNoTier] como feudo permanente dos [ROOT.Char.GetHouse.GetBaseName]."
 tgp_japan_decision.9002.desc.landless: "É hora de forjar um novo caminho e abandonar as amarras dos burocratas."
 tgp_japan_decision.9002.a: "Um novo sol nasce na Casa [ROOT.Char.GetHouse.GetBaseNameNoTooltip]."
 japanese_noble_family_name: "$c_nf_japan_suffix$ [new_house.GetNameNoTooltip]"
 japanese_house_first_name: "[new_head.GetUIFirstNameOnlyNotMeNoTooltipNoFormat]-ryū"
 japanese_house_random_barony: "[random_barony.GetNameNoTierNoTooltip]"
 japanese_house_domicile_barony: "[domicile_barony.GetNameNoTierNoTooltip]"
 japanese_house_primary_county: "[primary_county.GetNameNoTierNoTooltip]"
 japanese_house_domicile_county: "[domicile_county.GetNameNoTierNoTooltip]"
 japanese_house_name_custom: "[new_head.GetLocalizedText( 'new_japanese_house_name' )]"
 japanese_house_name_flag: "[new_head.MakeScope.Var( 'new_japanese_house_name' ).GetFlagName]"
 japanese_house_name_fallback: "[old_head.GetHouse.GetName]"
 japanese_house_name: "[new_head.GetHouse.GetNameNoTooltip]"
 japanese_dynasty_name: "[new_head.GetDynasty.GetNameNoTooltip]"
 tgp_japan_decision.9005.t: "$tgp_japan_establish_house_fief_decision$: a família se divide"
 tgp_japan_decision.9005.t.landless: "$tgp_japan_establish_soryo_manor_decision$: a família se divide"
 tgp_japan_decision.9005.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', new_head)] , [new_head.GetTitledFirstName] , ousou proclamar o nascimento de uma nova casa, a [new_head.GetHouse.GetBaseName] , com [new_head.GetSheHe] à frente.\n\nNão posso fingir celebrar este rejeição flagrante à minha autoridade sobre a casa [ROOT.Char.GetHouse.GetBaseName]; vamos ver como [new_head.GetFirstNameNoTooltip] se vira sem a minha proteção…"
 tgp_japan_decision.9005.a: "O sol brilha intensamente, sem a sombra da [ROOT.Char.GetHouse.GetBaseNameNoTooltip]."
 # tgp_japan_become_shogun_decision
 tgp_japan_decision.9101.t: "O xogunato [shogun.GetHouse.GetBaseNameNoTooltip]"
 tgp_japan_decision.9101.desc: "Uma nova era desponta em [GetTitleByKey('e_japan').GetBaseNameNoTierNoTooltip] quando o poder passa do pincel para a espada. Sob a liderança de [ROOT.Char.GetHouse.GetBaseNameNoTooltip], por fim a ordem será restaurada, e os últimos vestígios da velha burocracia serão relegados à história.\n\nMas que ninguém se engane; minha autoridade deriva de noss[ceremonial_liege.Custom('ES_OA')] divin[ceremonial_liege.Custom('ES_OA')] [ceremonial_liege.GetTitleAsNameNoTooltip]…"
 tgp_japan_decision.9101.a: "Uma medida necessária para garantir a paz…"
 tgp_japan_decision.9102.t: "$tgp_japan_decision.9101.t$"
 tgp_japan_decision.9102.desc: "O xogunato se ergueu sob o comando de [shogun.GetName] e pôs fim a incontáveis debates da corte. Em seu lugar, a espada e o guerreiro agora detêm o verdadeiro poder, trazendo segurança e ordem diretamente às mãos do povo.\n\n"
 tgp_japan_decision.9102.admin: "Minha autoridade foi arrancada de mim, minhas terras foram entregues ao Xogum. Em meu lugar, chegam belicistas que governam pela força, e não pelas palavras..."
 tgp_japan_decision.9102.feudal: "Nossas terras permanecerão seguras, e a autoridade voltará para nossas mãos. Nesta nova era, a força determina tudo."
 tgp_japan_decision.9102.fallback: "Com sorte, desta vez será uma decisão frutífera."
 tgp_japan_decision.9102.a.admin: "É uma nova ordem severa."
 become_shogun_ritsuryo_vassals_tooltip: "#N [ritsuryo_count|0V] [vassals|lE] [governor|lE] lutarão contra você#!"
 become_shogun_soryo_vassals_tooltip: "#P [soryo_count|0V] [vassals|lE] [Concept('feudal', 'feudales')|E] se unirán a ti#!"
 become_shogun_allied_vassals_tooltip: "#P [allied_count|0V] [vassals|lE] [Concept( 'allied', 'aliados' )|E] o de la misma [house|E] se unirán a ti#!"
 # tgp_japan_imperial_branch_decision
 tgp_japan_decision.9201.t: "$tgp_japan_imperial_branch_decision$"
 tgp_japan_decision.9201.desc: "Embora eu seja de sangue real, um[ROOT.Char.Custom('ES_XA')] verdadeir[ROOT.Char.Custom('ES_OA')] descendente do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('nearest_emperor'))], [nearest_emperor.Custom('ES_ElLa')] [nearest_emperor.GetTitledFirstName|l], minha vocação — e o destino dos meus descendentes — está além das muralhas do palácio imperial.\n\nRenunciarei a qualquer direito sobre [ROOT.Char.GetTopLiege.GetPrimaryTitle.MakeScope.Var('administrative_ui_special_title').Title.GetDefinitiveName|l] e assumirei um dos [Glossary( 'honsei', 'HONSEI_GLOSS' )] que tradicionalmente são concedidos à descendência imperial deserdada: [Glossary( 'Minamoto', 'MINAMOTO_GLOSS' )] ou [Glossary( 'Taira', 'TAIRA_GLOSS' )].\n\n"
 tgp_japan_decision.9201.both: "Ambos nomes já foram concedidos anteriormente à prole [nearest_emperor.Custom('ES_DelDela')] [nearest_emperor.GetTitledFirstNameNoTooltip|l], as famílias lideradas pelo meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('minamoto_head'))], [minamoto_head.Custom('ES_ElLa')] [minamoto_head.GetTitledFirstName|l], e pelo meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('taira_head'))], [taira_head.Custom('ES_ElLa')] [taira_head.GetTitledFirstName|l]."
 tgp_japan_decision.9201.minamoto: "Já surgiu [nearest_emperor.GetFirstNameNoTooltip] $dynn_Minamoto$, sob a liderança do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('minamoto_head'))], [minamoto_head.Custom('ES_ElLa')] [minamoto_head.GetTitledFirstName|l]."
 tgp_japan_decision.9201.taira: "Já surgiu [nearest_emperor.GetFirstNameNoTooltip] $dynn_Minamoto$, sob a liderança do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('taira_head'))], [taira_head.Custom('ES_ElLa')] [taira_head.GetTitledFirstName|l]."
 tgp_japan_decision.9201.a: "Assumirei um lugar entre os [minamoto_house.GetNameNoTooltip] $dynn_Minamoto$"
 tgp_japan_decision.9201.b: "Meu lugar é com os [taira_house.GetNameNoTooltip] $dynn_Taira$."
 tgp_japan_decision.9201.c: "Desejo adotar o nome de $dynn_Minamoto$."
 tgp_japan_decision.9201.c.tt: "Você fundou a [dynasty|lE] #V [nearest_emperor.GetFirstNameNoTooltip] Minamoto#!"
 tgp_japan_decision.9201.d: "\"$dynn_Taira$ [ROOT.Char.GetFirstNameNoTooltip]\" tem uma certa dignidade."
 tgp_japan_decision.9201.d.tt: "Você fundou a [dynasty|lE] #V [nearest_emperor.GetFirstNameNoTooltip] Taira#!"
 tgp_japan_decision.9201.message_title: "Ramos da família imperial"
 new_honsei_house_name: "[nearest_emperor.GetFirstNameNoTooltip]"
 may_found_noble_family_tt: "Você pode se tornar chefe de uma [noble_family|lE] nova"
 will_found_noble_family_tt: "Você se tornará chefe de uma [noble_family|lE] nova"
 # tgp_japan_emperor_restoration_decision
 tgp_japan_decision.9301.t: "A gaiola aberta"
 tgp_japan_decision.9301.desc: "Como imperador, recuperei meu lugar de direito como o verdadeiro líder deste domínio.\n\nMeu poder já não está nas mãos daqueles que desejam alimentar suas próprias ambições, e tudo foi restaurado ao Trono do Crisântemo"
 tgp_japan_decision.9301.a: "Um sol que guie a terra."
 tgp_japan_decision.9302.t: "[tenno.Custom('ES_ElLa')|U] [tenno.GetTitleAsNameNoTooltip] vitorioso[tenno.Custom('ES_OA')]"
 tgp_japan_decision.9302.desc: "As palavras sobre o retorno $game_concept_tenno_possessive$ se espalham como fogo em palha seca. [tenno.GetName] restaurou sua presença imperial na esperança de arrancar o poder das mãos ociosas e mal-intencionadas.\n\nAgora pretende governar de forma mais direta o povo destas terras a partir do Trono do Crisântemo, e seu reinado já não será visto como meramente cerimonial."
 tgp_japan_decision.9302.a: "Que isto signifique um retorno à ordem."
 # tgp_japan_become_a_poet_decision
 tgp_japan_decision.9401.t: "Metáforas e sílabas"
 tgp_japan_decision.9401.desc: "Tenho dedicado dias intermináveis e noites em claro para compreender a poesia. Folhas de papel voam pelo ar de um lado para o outro, deixando apenas rabiscos com um rastro de tinta em minha busca pelo conhecimento.\n\nChegou a hora de escolher um caminho a seguir. Isso vale a pena ser perseguido, ou devo desistir da busca?"
 tgp_japan_decision.9401.a: "Não pouparei esforços, eu #EMP comprenderé#!."
 tgp_japan_decision.9401.a.toast.success: "Você consegue adquirir algum domínio de poesia"
 tgp_japan_decision.9401.a.toast.failure: "Você não entende completamente todo esse tormento"
 tgp_japan_decision.9401.b: "Mudei de ideia."
 # tgp_japan_become_a_monk_decision
 tgp_japan_decision.9500.t: "Uma nova vocação"
 tgp_japan_decision.9500.desc: "Com um abraço caloroso, dou as boas-vindas ao meu recém-encontrado esclarecimento rumo ao renascimento — pois renasci de novo.\n\nDedicarei minha vida a [ROOT.Char.GetFaith.GetName] e passarei meus últimos dias praticando e pregando as descobertas que encontrar ao longo do caminho.\n\nServirei ao meu [ROOT.Char.GetLiege.GetTitleAsName|l] buscando a harmonia entre nossa herança cultural e deixando-me guiar pela natureza quando ela decidir que uma nova lição pode ser aprendida."
 tgp_japan_decision.9500.a: "Dou-lhe as boas-vindas, Terra Pura celestial."
 # tgp_japan_establish_soryo_administration_decision
 tgp_japan_decision.9603.t: "Estabelecer a Administração Sōryō: Chamada à ação"
 tgp_japan_decision.9603.desc: "A ambição gananciosa [daijo_daijin.Custom('ES_DelDela')] [daijo_daijin.GetTitledFirstName|l] não conhece limites: agora pressiona abertamente por uma reforma que consolidaria o poder de sua casa e de seus aliados.\n\nSejam quais forem os acordos ou desacordos que tenhamos sobre o governo do Japão, que os [daijo_daijin.GetHouse.GetBaseNameNoTooltip] avancem para uma posição tão dominante deveria fazer todos nós pensar."
 tgp_japan_decision.9603.leader: "\n\n[leader.Custom('ES_ElLa')|U] [leader.GetTitledFirstName|l] emergiu como figura de proa da resistência e ainda agora reúne seus exércitos."
 tgp_japan_decision.9603.a: "Os [ROOT.Char.GetHouse.GetBaseNameNoTooltip] não tolerarão isto."
 tgp_japan_decision.9603.a.bloc: "A [ROOT.Char.GetConfederation.GetName] não tolerará isto."
 tgp_japan_decision.9603.b: "Não é nossa luta."
 tgp_japan_decision.9603.a.tt: "Todos os integrantes da [THIS.Char.GetConfederation.GetName|V] se juntarão à [war|lE]"
 tgp_japan_decision.9605.t: "Estabelecer a Administração Sōryō: Às armas"
 tgp_japan_decision.9605.desc: "À medida que pressiono por reformas e minhas intenções se tornam claras, os traidores se reúnem. [leader.Custom('ES_ElLa')|U] [leader.GetTitledFirstName|l] de [leader.GetHouse.GetBaseNameNoTooltip] emergiu como a figura de proa dessa traição e até agora já está reunindo uma hoste.\n\nMas isso não importa, pois nós, os [ROOT.Char.GetHouse.GetBaseNameNoTooltip] enfrentaremos [leader.GetSheHe] no campo de batalha e venceremos."
 tgp_japan_decision.9605.peace: "À medida que pressiono por reformas e minhas intenções se tornam claras, a única resposta é o silêncio; a esperada reação nunca se materializa. Talvez eu tenha subestimado a fé do reino nos [ROOT.Char.GetHouse.GetBaseNameNoTooltip].\n\nSem traidores com quem lidar, o Japão pode enfim florescer sob uma nova era de governo benevolente sob os [daijo_daijin.GetHouse.GetBaseNameNoTooltip]…"
 tgp_japan_decision.9605.a: "Esses rebeldes serão esmagados."
 tgp_japan_decision.9605.b: "O reino viu a sabedoria."
 tgp_japan_decision.9606.t: "Estabelecer a Administração Sōryō: Domínio [daijo_daijin.GetHouse.GetBaseNameNoTooltip]"
 tgp_japan_decision.9606.desc: "Por fim, as forças rebeldes equivocadas foram derrotadas. Com seu líder, [leader.Custom('ES_ElLa')] [leader.GetTitledFirstName|l], apresentado[leader.Custom('ES_OA')] diante de mim acorrentado[leader.Custom('ES_OA')], poucos podem duvidar que a paz prometida agora está ao nosso alcance.\n\nCom todos os detratores silenciados, o Japão pode enfim florescer sob uma nova era de governo benevolente sob os [daijo_daijin.GetHouse.GetBaseNameNoTooltip]…"
 tgp_japan_decision.9606.a: "Inevitável e necessário."
 tgp_japan_decision.9607.desc: "Para horror da capital, [daijo_daijin.Custom('ES_ElLa')] [daijo_daijin.GetTitledFirstName|l] saiu vitorioso sobre aqueles que se opunham às suas reformas, agora chamados de rebeldes, levando o reino a uma nova era de domínio [daijo_daijin.GetHouse.GetBaseNameNoTooltip].\n\n"
 tgp_japan_decision.9607.desc.other: "Esperemos que os [ROOT.Char.GetHouse.GetBaseNameNoTooltip] encontrem um lugar digno nesta nova ordem."
 tgp_japan_decision.9607.desc.winner: "Nosso serviço leal aos [daijo_daijin.GetHouse.GetBaseNameNoTooltip] nesta causa justa será recompensado, sem dúvida."
 tgp_japan_decision.9607.desc.loser: "Este é um dia sombrio para [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetBaseNameNoTooltip] e os [ROOT.Char.GetHouse.GetBaseNameNoTooltip]…"
 tgp_japan_decision.9607.a: "Há muito sobre o que refletir."
 # tgp_japan_restore_japanese_monarchy_decision
 tgp_japan_decision.9901.t: "Imperador Ten'nō de Yamato restaurado"
 tgp_japan_decision.9901.desc: "O Ten'nō permanece forte, e o Trono do Crisântemo retorna ao seu herdeiro legítimo. Este governo não é meramente um título ou status nobre, mas reflete a antiga ligação dos Yamato com estas terras."
 tgp_japan_decision.9901.a: "Será uma honra aconselhar."
 tgp_japan_decision.9901.a.scion: "Por fim."
 tgp_japan_decision.9902.desc: "A sagrada linhagem Yamato exala mais uma vez sua presença no Palácio Imperial. [scion.Custom('GetDaughterSon')|U] de Amaterasu, [scion.GetName] se apresenta como seu herdeir[scion.Custom('ES_OA')], como nos velhos tempos.\n\nCom este retorno à tradição, o reino pode voltar a florescer sob a luz cintilante do Trono do Crisântemo."
 tgp_japan_decision.9902.a: "Viva o Ten'no!"
 # tgp_restore_japanese_government_decision
 tgp_japan_decision.9911.t: "Burocracia ritsuryō restaurada"
 tgp_japan_decision.9911.desc: "Chegou a hora de um novo governo, não pela força bruta, mas pela pena.\n\nApenas um governo organizado pode fazer justiça, enquanto os guerreiros deturpam a lei para servir aos próprios interesses. Sob meu governo, a lei será clara, justa e firme — como pretendiam nossos nobres antepassados."
 tgp_japan_decision.9911.rebel: "\n\nAo se opor ao caminho de nossos predecessores, [rebel.GetName] se mantém firme contra minha decisão. Agora que reuniu seus exércitos, meu desejo por burocracia é desafiado."
 tgp_japan_decision.9911.a: "Os métodos antigos são sempre os melhores."
 tgp_japan_decision.9912.desc: "[kampaku.GetName] retornou aos costumes de nossos antepassados, propondo uma burocracia acima de nossa classe guerreira. Busca restaurar a ordem dentro do reino, trazendo autoridade ao trono e à corte sobre os clãs locais."
 tgp_japan_decision.9912.rebel: "\n\nMas mudanças tão importantes não vêm sem conflito. [rebel.GetName] se levantou em protesto contra [kampaku.GetFirstNameNoTooltip] e alguns compartilham seus sentimentos…"
 tgp_japan_decision.9912.b: "Não desistirei do meu poder!"
 tgp_japan_decision.9913.desc: "[actor.Custom('ES_ElLa')|U] [actor.GetTitledFirstName|l] é um[actor.Custom('ES_XA')] idiota que coloca seu próprio engrandecimento acima do bem do império. Não ficarei de braços cruzados enquanto noss[actor.Custom('ES_OA')] senhor[actor.Custom('ES_XA')] abusa de seus vassalos leais. Eu o insto a se juntar a mim na luta para destronar semelhante tiran[actor.Custom('ES_OA')]."
 tgp_japan_decision.9913.a: "Você não ficará só[ROOT.Char.Custom('ES_OA')]!"
 tgp_japan_decision.9913.b: "¡Tu és [ROOT.Char.Custom('ES_ElLa')] traidor[ROOT.Char.Custom('ES_XA')]!"
 #tgp_japan_assert_regional_dominion_government_decision
 tgp_japan_decision.9960.t: "Reivindicar o domínio regional"
 tgp_japan_decision.9960.intro: "Unificarei [title_scope.GetNameNoTier] sob meu estandarte. Este canto de terra será um bastião de estabilidade e servirá de exemplo para nosso império assolado pelo caos."
 tgp_japan_decision.9960.agree: "\n\nOs senhores locais demonstram grande sabedoria…"
 tgp_japan_decision.9960.partial_war: "\n\nEnquanto os sábios senhores locais estão de acordo, alguns poucos insensatos se reúnem sob o estandarte de [main_defender.GetName] em vez de admitir meu domínio."
 tgp_japan_decision.9960.full_war: "\n\nOs senhores locais anseiam pela divisão! Por mais imprudente que seja, eles se reúnem sob o estandarte de [main_defender.GetName] em vez de se submeter ao meu domínio."
 tgp_japan_decision.9960.a: "… Talvez encontrem a sabedoria na próxima vida."
 tgp_japan_decision.9960.b: "… e todos admitirão meu domínio."
 tgp_bloc_members_join_war_effect_tt: "Se você lidera um [bloc|lE], seus membros se unirão à sua [war|lE]"
 tgp_japan_assert_regional_dominion_kampaku_crime_effect: "@warning_icon! #X El [ceremonial_regent|lE] es [ritsuryo|lE] y considerará esto un [crime|lE] [crime_i|E]#!"
 tgp_japan_decision.9961.t: "[title_scope.GetNameNoTierNoTooltip] sob uma única bandeira"
 tgp_japan_decision.9961.desc: "Um dia brilhante para [title_scope.GetNameNoTooltip]! Alguns demoraram a perceber a sabedoria do meu governo, mas um mar de flechas e fogo pode ser um mestre muito diligente.\n\nMuito em breve esta briga será esquecida. O sangue dos caídos fará crescer o arroz para os filhos de amanhã. Que nossa demonstração de unidade abra o caminho para o império como um todo."
 tgp_japan_decision.9961.a: "E agora, para onde meu estandarte poderá voar?"
 tgp_japan_decision.9962.t: "Meu estandarte jaz quebrado"
 tgp_japan_decision.9962.desc: "Minha causa era justa. Não deveria ter havido batalha alguma, mas houve. Com a derrota, minha sabedoria é ignorada. O caos impera. [title_scope.GetName] , um espelho para o império.\n\nNós que desejamos a harmonia sofremos e aqueles com carências espirituais obtêm sucesso."
 tgp_japan_decision.9962.a: "E agora?"
 tgp_japan_decision.9963.opening: "[ROOT.Char.GetName], meu estandarte chama,"
 tgp_japan_decision.9963.desc: "Vós contemplastes a discórdia que assola nosso império. Eu, [super_soryo.GetName], unirei [title_scope.GetName] e erigirei um bastião de paz e estabilidade. Submetei-vos ao meu estandarte ou uni-vos àqueles de mente estreita em sua tola desafio."
 tgp_japan_decision.9963.a: "Eu me rendo"
 tgp_japan_decision.9963.b: "À guerra!"
 tgp_japan_decision.9963.a.tt: "Se [super_soryo.GetShortUIName] vencer na [super_soryo_war.GetName], ele(a) ficará com [title_scope.GetName] e você passará a ser seu/sua [Concept('vassal',Select_CString(ROOT.Char.IsFemale,'vasalla', 'vasallo'))|E]"
 super_soryo_war_no_holder_custom_tooltip: "Inicie uma [domination_war|lE]contra [main_defender.GetShortUIName]por [title_scope.GetName]\n\t$BULLET$Todo [holder|lE]de um [county|lE] [de_jure|lE]se unirá a [main_defender.GetShortUIName]como defensor #weak ([super_soryo_war_current_enemy_strength|N0] @soldier_icon!)#!"
