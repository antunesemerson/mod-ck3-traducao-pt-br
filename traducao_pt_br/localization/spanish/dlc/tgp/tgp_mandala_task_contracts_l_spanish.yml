 mandala_realm_contract_0001_desc: "[TaskContract.MakeScope.Var('loc_desc').GetFlagName|U]"
 mandala_realm_contract_0001_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0001_request: "Compareça em [TaskContract.GetLocation.GetName] e ganhe recompensas com base na sua [skill|E] do [mandala_aspect|lE]"
 mandala_provincial_ritual_desc_01: "Depositamos nossa fé nas mãos de [GetPlayer.Custom('ES_DelDela')] [GetPlayer.Custom('MistressMaster')|U]; aguardamos com entusiasmo sua presença para receber suas bênçãos."
 mandala_provincial_ritual_desc_02: "As pétalas estão murchando e nossa paz de espírito com elas; aguardamos ansiosamente que nossas almas e mentes sejam rejuvenescidas com sua presença"
 mandala_followers_doubting: "Os súditos exigem [mandala_rituals|lE]"
 tgp_east_asia_mandala_task_contract_events.0990.t: "$mandala_ritual_prefix$ pensando melhor"
 tgp_east_asia_mandala_task_contract_events.0990.desc: "Com hesitação, reconsidero meus planos de partir para [ongoing_destination.GetName] para realizar os rituais.\n\nSerá que este é realmente o momento de viajar? Meu tempo não seria melhor aproveitado em outro lugar? Reflexões importantes para um ícone religioso."
 tgp_east_asia_mandala_task_contract_events.0990.a: "O povo de [ongoing_destination.GetNameNoTooltip] me aguarda!"
 tgp_east_asia_mandala_task_contract_events.0990.a_tt: "$governor_contract_event.1012.a_tt$"
 tgp_east_asia_mandala_task_contract_events.0990.b: "$governor_contract_event.1012.b$"
 tgp_east_asia_mandala_task_contract_events.0990.b_tt: "Foi abandonado [ongoing_contract.GetType.GetName] em [ongoing_destination.GetName]"
 tgp_east_asia_mandala_task_contract_events.1000.t.creation: "$mandala_ritual_prefix$ abraçando o Criador"
 tgp_east_asia_mandala_task_contract_events.1000.t.serenity: "$mandala_ritual_prefix$ abraçando o sereno"
 tgp_east_asia_mandala_task_contract_events.1000.t.destruction: "$mandala_ritual_prefix$ abraçando o Destruidor"
 tgp_east_asia_mandala_task_contract_events.1000.t.trickery: "$mandala_ritual_prefix$ adotar o trapaceiro"
 tgp_east_asia_mandala_task_contract_events.1000.desc.creation: "#EMP Creación.#! A vida é frágil, e é nosso dever cuidar dela da melhor forma possível. Se cuidarmos da vida, dos animais e da natureza, ela nos fortalecerá e nos dará em dobro o que oferecermos. Olho ao redor enquanto cuidamos da flora local.\n\nCrianças, adultos, idosos — todos se reúnem para celebrar a vida. As crianças cavam alegremente na terra com suas ferramentas improvisadas, plantando sementes.\n\nUm[local_character.Custom('ES_OA')] de [local_character.GetHerHim] dos assistentes mais fervorosos, [local_character.Custom('ES_ElLa')] [local_character.GetTitledFirstName|l], sorri para mim e me olha com expectativa enquanto o suor escorre por sua testa, como se aguardasse minhas instruções."
 tgp_east_asia_mandala_task_contract_events.1000.desc.serenity: "Há um suave farfalhar na copa das árvores. Olho por cima do ombro e vejo mulheres, homens, anciãos, jovens e até um punhado de crianças pequenas participando da cerimônia, seguindo meus movimentos em silêncio.\n\n#EMP Incline-se. Alongue-se. Respire. Estenda-se. Respire.#!\n\nUm[local_character.Custom('ES_XA')] residente especialmente prestativ[local_character.Custom('ES_OA')], [local_character.Custom('ES_ElLa')] [local_character.GetTitledFirstName|l], se aproxima apressad[local_character.Custom('ES_OA')], perguntando qual deve ser o próximo passo."
 tgp_east_asia_mandala_task_contract_events.1000.desc.destruction: "As fogueiras estão queimando. Os sacrifícios foram feitos. Contemplo a cena, uma poderosa demonstração de força apresentada por [local_character.Custom('ES_ElLa')] líder local, [local_character.Custom('ES_ElLa')] [local_character.GetTitledFirstName|l], e seus mais firmes seguidores, orquestrada por mim.\n\nTodos, ansiosos para servir, ansiosos para repelir o mal antes que ele consuma a Criação. Nossa Criação.\n\nEm conjunto, voltam-se para mim, com uma pergunta unânime escrita em seus rostos: o que desejo que façam em seguida?"
 tgp_east_asia_mandala_task_contract_events.1000.desc.trickery: "Ilusões, travessuras e jogos mentais uns com os outros. Tudo de boa fé. Tudo #EMP benignas#!. Até que deixa de ser.\n\nOs cidadãos de [ritual_location.GetName], sem saber, revelam seus segredos mais profundos ao participar dos meus rituais, e aqueles que percebem isso são os que devem liderar o rebanho e servir em meu nome, exclusivamente…\n\nUm[local_character.Custom('ES_OA')] de [local_character.GetHerHim] inteligentes, [local_character.Custom('ES_ElLa')] [local_character.GetTitledFirstName|l], me lança um olhar enganoso, aguardando minha próxima ordem para as massas."
 tgp_east_asia_mandala_task_contract_events.1000.a: "Deveriam se concentrar em me reverenciar."
 tgp_east_asia_mandala_task_contract_events.1000.b: "Que se deleitem em minha glória!"
