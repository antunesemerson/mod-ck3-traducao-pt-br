 mandala_realm_contract_0002_contract: "Gado estéril"
 mandala_realm_contract_0002_desc: "O gado de [TaskContract.GetLocation.GetNameNoTooltip] é estéril; poucos bezerros nascem. Os habitantes locais pedem um ritual de fertilidade, para que seu sustento não desapareça."
 mandala_realm_contract_0002_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0002_request: "Faça uma aparição em [TaskContract.GetLocation.GetName] e tome uma decisão com base na sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.1100.t: "$mandala_ritual_prefix$ gado estéril"
 tgp_east_asia_mandala_task_contract_events.1100.desc: "\"Oh, muito grande e divin[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], ouvi a súplica da minha aldeia\", diz [local_character.Custom('ES_ElLa')] aldeirinh[local_character.Custom('ES_OA')], colocando a mão sobre uma novilha esquelética ao seu lado. \"Fazei com que nossas vacas voltem a ter bezerros!\".\n\n Ele/ela aponta para os aldeões, que trazem grandes guirlandas coloridas de [ROOT.Char.GetCurrentLocation.Custom('get_region_flower_type_plural')] para o ritual."
 tgp_east_asia_mandala_task_contract_events.1100.a: "O ritual durará um mês!"
 tgp_east_asia_mandala_task_contract_events.1100.b: "Bastará um ritual de uma semana."
 tgp_east_asia_mandala_task_contract_events.1100.c: "Ficarei por um dia."
 mandala_realm_contract_0003_contract: "A primeira semente"
 mandala_realm_contract_0003_desc: "As gentes de [TaskContract.GetLocation.GetNameNoTooltip] planejam erguer uma [GetBuilding('temple_citadel_01').GetName|l] em seu nome. Recusam-se a começar a menos que você \"plante a primeira semente\" no local."
 mandala_realm_contract_0003_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0003_request: "Apresente-se em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.1200.t: "$mandala_ritual_prefix$ a primeira semente"
 tgp_east_asia_mandala_task_contract_events.1200.desc: "\"Grande [ROOT.Char.GetTitleAsNameNoTooltip], nós, vossos humildes servos, desejamos erguer uma [GetBuilding('temple_citadel_01').GetName|l] em vosso glorioso nome\", diz [local_character.Custom('ES_ElLa')] morador[local_character.Custom('ES_OA')] ao comando, olhando para o/a [ritual_location.Custom('TerrainTypeProvince')] diante de nós. \"Mas o terreno ainda não está consagrado. Precisais plantar a primeira semente, enchendo a terra com vossa criação.\"\n\nUm[local_character_2.Custom('ES_XA')] [local_character_2.GetWomanMan] dá um passo à frente, abanando-se timidamente. \"Oh, divin[ROOT.Char.Custom('ES_OA')], ofereço-me voluntari[local_character_2.Custom('ES_OA')] para ajudar-vos a concluir o ritual, para que todos de [ritual_location.GetName] vejam!\""
 tgp_east_asia_mandala_task_contract_events.1200.a: "O/A [ritual_location.Custom('TerrainTypeProvince')] terá um mês da nossa união!"
 tgp_east_asia_mandala_task_contract_events.1200.b: "Vamos definir onde será colocada a primeira pedra."
 tgp_east_asia_mandala_task_contract_events.1200.c: "Posso... me virar sozinho[ROOT.Char.Custom('ES_OA')]."
 mandala_realm_contract_0004_contract: "Novilha sagrada"
 mandala_realm_contract_0004_desc: "Uma novilha sagrada se recusa a se ajoelhar em [TaskContract.GetLocation.GetName], um presságio de esterilidade. Chamam você para restaurar o equilíbrio."
 mandala_realm_contract_0004_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0004_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base na sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.1300.t: "$mandala_ritual_prefix$ novilha sagrada"
 tgp_east_asia_mandala_task_contract_events.1300.desc: "\"É um desastre\", lamenta o ancião da aldeia. \"Nossa novilha sagrada se recusa a se deitar; um presságio certo de esterilidade e decadência!\"\n\n\"Por favor, precisamos que #EMP vós#! nos abençoeis em seu lugar. Subi neste pedestal de pedra e revelai vosso brilho divino para que todos vejam, para que os campos de [ritual_location.GetName] sejam férteis!\" O ancião me encara.\n\nSupõe-se que eu deva ficar em um pedestal, nu[ROOT.Char.Custom('ES_OA')], por uma semana, sem comer..."
 tgp_east_asia_mandala_task_contract_events.1300.a: "Minha divindade não conhece limites — contemplem meu corpo!"
 tgp_east_asia_mandala_task_contract_events.1300.b: "A comida e as roupas fazem parte do ritual."
 tgp_east_asia_mandala_task_contract_events.1300.c: "Bastará uma efígie minha…"
 mandala_realm_contract_0005_contract: "Testemunha divina"
 mandala_realm_contract_0005_desc: "Um casal nobre de [TaskContract.GetLocation.GetName] não tem filhos. Eles pedem que você abençoe a união deles."
 mandala_realm_contract_0005_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0005_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.1400.t: "$mandala_ritual_prefix$ testemunha divina"
 tgp_east_asia_mandala_task_contract_events.1400.desc: "\"Ó radiante [ROOT.Char.GetTitleAsNameNoTooltip], minha [local_character_2.GetWifeHusband] e eu ainda não fomos abençoados com um filho\", diz [local_character.Custom('ES_ElLa')] nobre [local_character.GetTitledFirstName|l] com a voz tingida de tristeza. \"Mandei construir um pavilhão em [ritual_location.Custom('TerrainTypeProvince')] para o ritual\".\n\nSeu [local_character_2.GetWifeHusband] continua: \"Precisamos que durmais entre nós como testemunh[ROOT.Char.Custom('ES_OA')] divin[ROOT.Char.Custom('ES_OA')]. Só então seremos abençoados com um filho! Claro… isso pode levar algumas noites…\"."
 tgp_east_asia_mandala_task_contract_events.1400.a: "Ah, serei algo mais do que \"testemunh[ROOT.Char.Custom('ES_OA')]\"…"
 tgp_east_asia_mandala_task_contract_events.1400.b: "Observarei a sua união."
 tgp_east_asia_mandala_task_contract_events.1400.c: "Colocar minhas roupas entre vocês deve bastar."
 mandala_realm_contract_0006_contract: "O sonho das parteiras"
 mandala_realm_contract_0006_desc: "Todas as parteiras de [TaskContract.GetLocation.GetNameNoTooltip] sonham a mesma coisa: sua divindade, unida em união sagrada com uma mulher marcada por presságios."
 mandala_realm_contract_0006_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0006_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.1500.t: "$mandala_ritual_prefix$ o sonho das parteiras"
 tgp_east_asia_mandala_task_contract_events.1500.desc: "Ao me aproximar da aldeia nos arredores de [ritual_location.GetName], um grupo de parteiras me recebe. \"Todas nós tivemos o mesmo sonho, grande [ROOT.Char.GetTitleAsNameNoTooltip]\", dizem em uníssono. \"Este é [local_character_2.GetFirstName] — nascido em uma noite de presságios.\"\n\n\"Uma criança para salvar [ritual_location.GetName] nascerá se você se deitar com [local_character_2.GetSheHe].\" As parteiras se calam enquanto [local_character_2.Custom('ES_ElLa')] peculiar [local_character_2.GetWomanMan] dá um passo à frente e sorri timidamente."
 tgp_east_asia_mandala_task_contract_events.1500.desc.stand_in: "\n\nLanço um olhar para meu [ROOT.Char.Custom2('RelationToMe', 1500_stand_in_character)] , [1500_stand_in_character.GetFirstName]. Tenho certeza de que poderia #EMP asumir#! a responsabilidade…"
 tgp_east_asia_mandala_task_contract_events.1500.desc.stand_in.acolyte: "\n\nLanço um olhar para [Select_CString( 1500_stand_in_character.IsFemale, 'uma de minhas devotas', 'um de meus devotos' )], [1500_stand_in_character.GetFirstName]. Eu #EMP vinha#! pensando em experimentar algo novo..."
 tgp_east_asia_mandala_task_contract_events.1500.a: "Venha a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], [local_character_2.GetFirstNameNoTooltip]."
 tgp_east_asia_mandala_task_contract_events.1500.a.stand_in: "Meu [ROOT.Char.Custom2('RelationToMe', 1500_stand_in_character )] cuidará de [local_character_2.GetFirstNameNoTooltip], lá em [ROOT.Char.GetCapitalLocation.GetNameNoTooltip]."
 tgp_east_asia_mandala_task_contract_events.1500.a.stand_in.no_relation: "Meu [ROOT.Char.Custom2('RelationToMe', 1500_stand_in_character )] e eu cuidaremos de [local_character_2.GetFirstNameNoTooltip]."
 tgp_east_asia_mandala_task_contract_events.1500.a.stand_in.acolyte: "Meu servo e eu cuidaremos de [local_character_2.GetFirstNameNoTooltip]."
 tgp_east_asia_mandala_task_contract_events.1500.b: "Vamos deitar juntos esta mesma noite."
 tgp_east_asia_mandala_task_contract_events.1500.b.stand_in: "[1500_stand_in_character.GetTitledFirstNameNoTooltip], distribua as sementes do meu reinado."
 tgp_east_asia_mandala_task_contract_events.1500.b.stand_in.acolyte: "Acólit[1500_stand_in_character. Custom('ES_OA')] [1500_stand_in_character.GetTitledFirstNameNoTooltip|l], distribua as sementes do meu reinado."
 tgp_east_asia_mandala_task_contract_events.1500.c: "Esta noite meu #EMP espíritu#! estará com você…"
 mandala_realm_contract_0007_contract: "Estátua chorosa"
 mandala_realm_contract_0007_desc: "Diz-se que uma estátua negligenciada em [TaskContract.GetLocation.GetNameNoTooltip] verte leite. Os aldeões lhe pedem que unja um recém-nascido sobre ela."
 mandala_realm_contract_0007_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0007_request: "Faça uma aparição em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.1600.t: "$mandala_ritual_prefix$ a estátua chorosa"
 tgp_east_asia_mandala_task_contract_events.1600.desc: "\"[ROOT.Char.GetTitleAsNameNoTooltip|U], ó divin[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip]\", chora [local_character.Custom('ES_ElLa')] fazendeir[local_character.Custom('ES_OA')], prostrando-se. \"Uma antiga estátua em meu campo começou a chorar leite!\" Lanço um olhar: há uma grande cabeça de pedra coberta por panos e flores, com o rosto marcado por rastros brancos.\n\n\"Os espíritos passam por ela! Rogamos que unjais este recém-nascido sobre ela para conquistar seu favor!\", suplica."
 tgp_east_asia_mandala_task_contract_events.1600.a: "Este lugar não é um campo qualquer... é um santuário!"
 tgp_east_asia_mandala_task_contract_events.1600.b: "Deixe-me acrescentar mais oferendas aos espíritos."
 tgp_east_asia_mandala_task_contract_events.1600.c: "Ungirei a criança, como esperado."
 stone_head_shrine_modifier: "Santuário da cabeça de pedra gigante"
 stone_head_shrine_modifier_desc: "A antiga estátua de um rei esquecido deste lugar foi convertida em um santuário por um devaraja local."
 mandala_realm_contract_0008_contract: "Flores brotando"
 mandala_realm_contract_0008_desc: "Uma estranha floração sufocou as mudas em [TaskContract.GetLocation.GetNameNoTooltip]. Os aldeões acreditam que isso foi obra sua e exigem que você restaure o equilíbrio legítimo."
 mandala_realm_contract_0008_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0008_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base no seu [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.1700.t: "$mandala_ritual_prefix$ flores brotando"
 tgp_east_asia_mandala_task_contract_events.1700.desc: "\"Oh, por que nos abandonastes, [ROOT.Char.GetTitleAsNameNoTooltip]?\" diz [local_character.Custom('ES_ElLa')] morador[local_character.Custom('ES_OA')] à frente, com a voz carregada de desespero. \"Nossas sementes estão sendo sufocadas por brotos de [ROOT.Char.GetCurrentLocation.Custom('get_region_flower_type_plural')], nem um único campo foi poupado!\".\n\n\"Sem grãos, vamos morrer de fome… Deveis caminhar descalç[ROOT.Char.Custom('ES_OA')] pelos campos para dizer à terra o que deve crescer nela\"."
 tgp_east_asia_mandala_task_contract_events.1700.a: "Precisareis mais do que isso… Peçam arroz da capital."
 tgp_east_asia_mandala_task_contract_events.1700.b: "Andarei descalç[ROOT.Char.Custom('ES_OA')] sobre a terra, faça chuva ou faça tempestade."
 tgp_east_asia_mandala_task_contract_events.1700.c: "Beijarei a terra, mas nada mais."
 fertile_ground_modifier: "Campos férteis"
 fertile_ground_modifier_desc: "A chegada de sementes e ferramentas da capital tornou estes terrenos propícios para o desenvolvimento."
 mandala_realm_contract_0009_contract: "Ritual fluvial"
 mandala_realm_contract_0009_desc: "Um rio de [TaskContract.GetLocation.GetNameNoTooltip] é o meio de vida dos moradores locais. Os pescadores lhe pedem que realize um ritual de fertilidade para que continue repleto de peixes."
 mandala_realm_contract_0009_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0009_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.1800.t: "$mandala_ritual_prefix$ ritual fluvial"
 tgp_east_asia_mandala_task_contract_events.1800.desc: "Um grupo de pescador[local_character.Custom('ES_EA')]s se encontra à beira do rio com as cestas cheias da pesca do dia. \"Ó grande [ROOT.Char.GetTitleAsNameNoTooltip]! O rio transborda de [ROOT.Char.Custom('GetRegionalFish')], mas os anciãos nos dizem que no ano que vem estará árido!\", diz [Select_CString(local_character.IsFemale, 'uma delas', 'um deles')].\n\n\"Esta noite teremos uma lua cheia rara. Precisamos que abençoeis as águas com fertilidade divina; [local_character_2.GetFirstName] se ofereceu para juntar-se a vós no ritual.\""
 tgp_east_asia_mandala_task_contract_events.1800.a: "Junte-se a mim no rio, [local_character_2.GetFirstNameNoTooltip]."
 tgp_east_asia_mandala_task_contract_events.1800.b: "Só preciso jogar arroz na água."
 tgp_east_asia_mandala_task_contract_events.1800.c: "Tanto peixe… você não está pagando tributo suficiente."
 upset_peasants_modifier: "Camponeses revoltados"
 upset_peasants_modifier_desc: "Por uma razão ou outra, os camponeses deste condado estão indisciplinados."
 mandala_realm_contract_0010_contract: "Campos malditos"
 mandala_realm_contract_0010_desc: "Os arados continuam quebrando nos campos de [TaskContract.GetLocation.GetNameNoTooltip]. Os aldeões suspeitam de um espírito malévolo e pedem sua ajuda para quebrar a maldição."
 mandala_realm_contract_0010_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0010_request: "Faça uma aparição em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.1900.t: "$mandala_ritual_prefix$ campos amaldiçoados"
 tgp_east_asia_mandala_task_contract_events.1900.desc: "\"Este é o sétimo arado que quebra esta semana, [ROOT.Char.GetTitleAsNameNoTooltip]\", diz [Select_CString(local_character.IsFemale, 'a chefe', 'o chefe' )], gesticulando furiosamente para os campos. \"Sem dúvida, é um espírito da terra ciumento que os quebra!\"\n\n\"Para quebrar a maldição, vós, em vossa divindade radiante, deveis arrastar o arado por cada campo e abrir o primeiro sulco!\""
 tgp_east_asia_mandala_task_contract_events.1900.a: "Eu farei isso — me prendam!"
 tgp_east_asia_mandala_task_contract_events.1900.b: "Eu semeio, [entourage_character.GetFirstNameNoTooltip] puxa o arado…"
 tgp_east_asia_mandala_task_contract_events.1900.c: "Plantarei apenas uma semente."
 mandala_realm_contract_0011_contract: "Bosque Murcho"
 mandala_realm_contract_0011_desc: "Um raio atingiu uma árvore sagrada, queimando o bosque ao redor dela em [TaskContract.GetLocation.GetNameNoToooltip]. Os camponeses estão assustados e pedem que você realize um ritual de fertilidade sob a árvore."
 mandala_realm_contract_0011_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0011_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.2000.t: "$mandala_ritual_prefix$ bosquejo marchito"
 tgp_east_asia_mandala_task_contract_events.2000.desc: "\"Divin[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], um raio atingiu nossa árvore sagrada e queimou o bosque…\", diz est[local_character.Custom('ES_EA')] [local_character.GetWomanMan] do lugar enquanto aponta os restos carbonizados. \"Tememos que não volte a crescer. Já não ouvimos o canto de [ROOT.Char.Custom('GetRandomRegionalWildDaytimeBird')] e os bandos de [ROOT.Char.Custom('GetRandomRegionalSmallGamePlural')] se foram\".\n\n\"Sob a árvore carbonizada é onde devemos deitar. Se nossa união der frutos, o bosque também dará. Vamos nos cobrir de carvão até que não se possa mais nos distinguir do céu noturno!\"."
 tgp_east_asia_mandala_task_contract_events.2000.a: "Terás sementes da capital — e minhas!"
 tgp_east_asia_mandala_task_contract_events.2000.a.female: "Vou ajudá-los a plantar sementes da capital…"
 tgp_east_asia_mandala_task_contract_events.2000.b: "Então, deitemos juntos."
 tgp_east_asia_mandala_task_contract_events.2000.c: "Bastará untar você com carvão."
 lush_grove_modifier: "Arvoredo exuberante"
 lush_grove_modifier_desc: "Graças à doação de sementes da capital do devaraja, os bosques deste condado estão florescendo."
 mandala_realm_contract_0012_contract: "Juramento da matança do porco"
 mandala_realm_contract_0012_desc: "Os aldeões de [TaskContract.GetLocation.GetNameNoTooltip] pedem que você selle um pacto de vingança sacrificando um porco preto."
 mandala_realm_contract_0012_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0012_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.2100.t: "$mandala_ritual_prefix$ juramento do sacrifício do porco"
 tgp_east_asia_mandala_task_contract_events.2100.desc: "\"Grande e poderos[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], buscamos vossa bênção.\" [local_character.Custom('ES_ElLa')|U] [local_character.GetWomanMan] aponta para um chiqueiro. \"Atacaremos nossos inimigos em [vengeance_target.GetNameNoTier], mas não antes que façais um sacrifício.\"\n\n\"Levai este porco preto ao/à [ritual_location.Custom('TerrainTypeProvince')] e derramai seu sangue sobre a pedra do juramento. Só então nosso voto de vingança será selado!\""
 tgp_east_asia_mandala_task_contract_events.2100.a: "Um porco? Não, eu providenciarei cinquenta!"
 tgp_east_asia_mandala_task_contract_events.2100.b: "O porco será sacrificado e o juramento será selado."
 tgp_east_asia_mandala_task_contract_events.2100.c: "Em vez disso, você fará um juramento de misericórdia."
 mandala_realm_contract_0013_contract: "Ira ritual"
 mandala_realm_contract_0013_desc: "Um ano de más colheitas fez com que uma aldeia de [TaskContract.GetLocation.GetNameNoTooltip] suplique por castigo; alguns voluntários imploram para serem atingidos a fim de apaziguar os espíritos."
 mandala_realm_contract_0013_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0013_request: "Apresente-se em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.2200.t: "$mandala_ritual_prefix$ ira ritual"
 tgp_east_asia_mandala_task_contract_events.2200.desc: "Ao nos aproximarmos de [ritual_location.GetName], cerca de dez camponeses se aproximam de nós. \"Poderos[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip]\", diz seu líder, com a voz firme de determinação. \"Nossos campos estão estéreis — amaldiçoados por espíritos da terra que exigem um sacrifício\".\n\nEle se ajoelha na terra e aponta para minha espada. \"Puni-nos. Derramai nosso sangue sobre o chão. Os espíritos serão alimentados — e nossas famílias também\"."
 tgp_east_asia_mandala_task_contract_events.2200.a: "Meu próprio sangue agradará aos espíritos."
 tgp_east_asia_mandala_task_contract_events.2200.b: "Vosso sacrifício curará a terra."
 tgp_east_asia_mandala_task_contract_events.2200.c: "Bastará com um porco."
 mandala_realm_contract_0014_contract: "Punição coletiva"
 mandala_realm_contract_0014_desc: "Um ladrão de [TaskContract.GetLocation.GetNameNoTooltip] roubou arroz sagrado e fugiu. Os aldeões querem que sua família seja punida em seu lugar."
 mandala_realm_contract_0014_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0014_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base na sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.2300.t: "$mandala_ritual_prefix$ punição coletiva"
 tgp_east_asia_mandala_task_contract_events.2300.desc: "Uma multidão de aldeões cerca um[local_character_2.Custom('ES_XA')] [local_character_2.GetWomanMan] e seu filho quando chegamos a [ritual_location.GetName]. Grande [ROOT.Char.GetTitleAsNameNoTooltip], grita [Select_CString(local_character.IsFemale, 'a moradora', 'o morador' )] à frente. [local_character_3.GetFirstName] —[Select_CString(local_character_3.IsFemale, 'a ladra', 'o ladrão' )] desta aldeia — roubou nosso arroz sagrado e fugiu para a [ritual_location.Custom('TerrainTypeProvince')]!\n\nE então aponta o dedo para [local_character_2.Custom('ES_AlAla')] [local_character_2.GetWomanMan]. Se [local_character_3.GetSheHe] não receber punição, então sua família deverá pagar. Atingi-os com a justiça divina!"
 tgp_east_asia_mandala_task_contract_events.2300.a: "Melhor vamos atrás de [local_character_3.GetFirstNameNoTooltip]."
 tgp_east_asia_mandala_task_contract_events.2300.b: "[local_character_3.GetSheHe|U] cometeu o delito, sua família sofre o castigo. Assim seja."
 tgp_east_asia_mandala_task_contract_events.2300.c: "Deixe-me abençoar o arroz novamente."
 tgp_east_asia_mandala_task_contract_events.2300.a.success: "É capturado e morto [local_character_3.GetFirstName]"
 tgp_east_asia_mandala_task_contract_events.2300.a.failure: "[local_character_3.GetFirstName] se te escapa"
 collective_punishments_modifier: "Punições coletivas"
 collective_punishments_modifier_desc: "Neste condado, as famílias dos ladrões são punidas por crimes que não cometeram."
 mandala_realm_contract_0015_contract: "Espíritos infectados"
 mandala_realm_contract_0015_desc: "Um xamã em [TaskContract.GetLocation.GetNameNoTooltip] é acusado de abrigar espíritos que trazem doenças. Os aldeões querem incendiar sua cabana — com ele dentro, se necessário."
 mandala_realm_contract_0015_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0015_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.2400.t: "$mandala_ritual_prefix$ espíritos infectados"
 tgp_east_asia_mandala_task_contract_events.2400.desc: "\"Perdoai nosso estado, poderos[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip]\", diz um[local_character.Custom('ES_XA')] [local_character.GetWomanMan] de aparência adoentada, que tosse na mão. \"Estamos todos doentes..., todos menos [local_character_2.Custom('ES_ElLa')] [local_character_2.GetWomanMan] que supostamente se #EMP supone#! que nos tratava\".\n\n\"Certamente ela abriga espíritos malignos!\", resmunga. \"Queimai a cabana [local_character_2.Custom('ES_DelDela')] portaespíritos; isso os expulsará!\"."
 tgp_east_asia_mandala_task_contract_events.2400.a: "Caçaremos todos os falsos curandeiros de [ritual_location.GetNameNoTooltip]."
 tgp_east_asia_mandala_task_contract_events.2400.b: "Queimaremos a cabana, com [local_character_2.Custom('ES_ElLa')] portador(a) do espírito lá dentro."
 tgp_east_asia_mandala_task_contract_events.2400.c: "[local_character_2.Custom('ES_ElLa')|U] o portador de espírito vem comigo."
 no_healers_modifier: "Sem curandeiros"
 no_healers_modifier_desc: "O devaraja mandou matar todos os curandeiros e feiticeiros desta província."
 mandala_realm_contract_0016_contract: "Lanças rombas"
 mandala_realm_contract_0016_desc: "Os homens de armas de [TaskContract.GetLocation.GetNameNoTooltip] são preguiçosos e estão desmoralizados. O ancião da aldeia lhe implora que os discipline."
 mandala_realm_contract_0016_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0016_request: "Faça uma aparição em [TaskContract.GetLocation.GetName] e tome uma decisão com base no seu [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.2500.t: "$mandala_ritual_prefix$ lanças rombas"
 tgp_east_asia_mandala_task_contract_events.2500.desc: "\"Duvidam da vossa divindade, [ROOT.Char.GetTitleAsNameNoTooltip]\", diz o ancião com voz grave. \"Os guerreiros passam o dia bebendo; as estradas são inseguras e o banditismo campeia por toda parte...\" Ele faz um gesto em direção à taverna próxima.\n\n\"Deveis discipliná-los. Usai vossa presença divina, e vossa espada celestial, para colocá-los na linha!\""
 tgp_east_asia_mandala_task_contract_events.2500.a: "Aprenderão a servir… com sangue."
 tgp_east_asia_mandala_task_contract_events.2500.b: "Cada um deles terá minha palavra — ou meu chicote."
 tgp_east_asia_mandala_task_contract_events.2500.c: "Um discurso simples será suficiente."
 motivated_men_at_arms_modifier: "Homens de armas motivados"
 motivated_men_at_arms_modifier_desc: "Os homens de armas que guardam esta província estão muito motivados após uma demonstração de seu devaraja. Ou o que restou deles."
 safer_roads_modifier: "Estradas mais seguras"
 safer_roads_modifier_desc: "As estradas estão um pouco mais seguras após uma visita do Devaraja."
 mandala_realm_contract_0017_contract: "Vila desafiadora"
 mandala_realm_contract_0017_desc: "Uma aldeia de [TaskContract.GetLocation.GetNameNoTooltip] se recusa a pagar tributo, zombando da sua divindade. O sacerdote local implora que você marche até lá pessoalmente."
 mandala_realm_contract_0017_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0017_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base na sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.2600.t: "$mandala_ritual_prefix$ vila desafiadora"
 tgp_east_asia_mandala_task_contract_events.2600.desc: "Quando nos aproximamos a [ritual_location.GetName], as zombarias nos recebem: há uma efígie de mim, pendurada de cabeça para baixo, besuntada de cinzas e esterco. Os aldeões dançam ao seu redor, cantam canções sobre a minha fraqueza e uivam como cães selvagens.\n\nEles não me temem.\nEstão implorando pela minha ira."
 tgp_east_asia_mandala_task_contract_events.2600.a: "Não deixarei ninguém vivo. O sangue encharcará o chão."
 tgp_east_asia_mandala_task_contract_events.2600.b: "Queimarei seus estoques de grãos."
 tgp_east_asia_mandala_task_contract_events.2600.c: "Eles só precisam de tranquilização."
 slaughtered_village_modifier: "Aldeia massacrada"
 slaughtered_village_modifier_desc: "Um devaraja massacrou a população de uma aldeia rebelde neste condado."
 mandala_realm_contract_0018_contract: "Imposto de sangue"
 mandala_realm_contract_0018_desc: "O chamamento para a convocação militar em [TaskContract.GetLocation.GetNameNoTooltip] não foi atendido. Os oficiais locais pedem que você exija #EMP pagamento de sangue#!; quem não puder servir deve oferecer um substituto."
 mandala_realm_contract_0018_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0018_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.2700.t: "$mandala_ritual_prefix$ imposto de sangue"
 tgp_east_asia_mandala_task_contract_events.2700.desc: "Ao nos aproximarmos de [ritual_location.GetName], um[local_character.Custom('ES_XA')] funcionári[local_character.Custom('ES_OA')] nos recebe. \"[ROOT.Char.GetTitleAsNameNoTooltip|U], esta aldeia recusou-se a atender ao recrutamento\", diz, lançando um olhar para um pergaminho. \"A punição deles é pagar com sangue, e vós deveis exigi-lo.\"\n\n\"A mim não ouvirão, mas atenderão à vossa palavra divina. Fazei-os pagar o que lhes é devido\", inclina-se."
 tgp_east_asia_mandala_task_contract_events.2700.a: "Vou cobrar sangue, não moedas. O levante será atendido."
 tgp_east_asia_mandala_task_contract_events.2700.b: "O tributo em sangue será arrecadado."
 tgp_east_asia_mandala_task_contract_events.2700.c: "Bastará apenas minha presença."
 enforced_levy_modifier: "Leva Imposta"
 enforced_levy_modifier_desc: "Um devaraja, por meio de uma demonstração de violência, garantiu que este condado obedeça ao alistamento."
 mandala_realm_contract_0019_contract: "Rebeldes de bambu"
 mandala_realm_contract_0019_desc: "Os camponeses de [TaskContract.GetLocation.GetNameNoTooltip] afiam estacas de bambu, afirmando que agora podem #EMP \"defenderse a sí mismos\".#! Sua presença marcial é requisitada — antes que a rebelião comece."
 mandala_realm_contract_0019_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0019_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base na sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.2800.t: "$mandala_ritual_prefix$ rebeldes de bambu"
 tgp_east_asia_mandala_task_contract_events.2800.desc: "Ao entrarmos em [ritual_location.GetName] a cavalo, lanças de bambu afiadas se alinham nas aldeias como arsenais improvisados. \"Oh, [ROOT.Char.GetTitleAsNameNoTooltip], só estamos afiando estes bastões para nos defendermos contra... [ROOT.Char.Custom('RegionalOnlyFerociousAnimalPlural')], isso mesmo\", diz [Select_CString(local_character.IsFemale, 'uma das', 'um dos')] [local_character.GetWomenMen] locais, com um tom nada convincente.\n\n\"Nunca, em hipótese alguma, os usaríamos para outra coisa. Não é como se duvidássemos de vossa #EMP divindade#! ou algo assim...\""
 tgp_east_asia_mandala_task_contract_events.2800.a: "Farei um exemplo sangrento de sua aldeia."
 tgp_east_asia_mandala_task_contract_events.2800.b: "Entreguem as lanças a vosso[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip]."
 tgp_east_asia_mandala_task_contract_events.2800.c: "Um empreendimento admirável."
 well_armed_peasants_modifier: "Camponeses bem armados"
 well_armed_peasants_modifier_desc: "Os camponeses deste condado têm permissão para manter grandes quantidades de lanças."
 mandala_realm_contract_0020_contract: "Sacrifício na estrada"
 mandala_realm_contract_0020_desc: "Uma estrada em [TaskContract.GetLocation.GetNameNoTooltip] sofreu ataques repetidos de bandidos. Os moradores acreditam que ela deve ser #EMP \"alimentar\"#! para reprimir a violência."
 mandala_realm_contract_0020_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0020_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.2900.t: "$mandala_ritual_prefix$ sacrifício na estrada"
 tgp_east_asia_mandala_task_contract_events.2900.desc: "\"Grande [ROOT.Char.GetTitleAsNameNoTooltip], as estradas não são seguras em [ritual_location.GetName]\", diz [Select_CString(local_character.IsFemale, 'a chefe', 'o chefe' )]. \"Os viajantes são atacados, as caravanas são capturadas... Isso nunca acaba.\"\n\n\"Os espíritos da estrada devem estar furiosos.\" [local_character.GetSheHe|U] segura uma adaga. \"É preciso alimentá-los, com sangue, até que a violência cesse.\""
 tgp_east_asia_mandala_task_contract_events.2900.a: "Meu sangue divino a saciará."
 tgp_east_asia_mandala_task_contract_events.2900.b: "Bastarão cinco dos meus cavalos."
 tgp_east_asia_mandala_task_contract_events.2900.c: "Tragam-me um porco da aldeia."
 mandala_realm_contract_0021_contract: "Festival do deus da guerra"
 mandala_realm_contract_0021_desc: "Um santuário de [TaskContract.GetLocation.GetNameNoTooltip] celebra a divindade da guerra [TaskContract.GetLocation.GetCounty.GetFaith.WarGodName]…, mas sem lhe prestar homenagens. Espera-se que você interrompa o rito e reafirme sua divindade."
 mandala_realm_contract_0021_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0021_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base no seu [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.3000.t: "$mandala_ritual_prefix$ festival do Deus da Guerra"
 tgp_east_asia_mandala_task_contract_events.3000.desc: "Em [ritual_location.GetName], os aldeões dançam ao redor de uma grande efígie — uma que não é a minha. #EMP [ritual_location.GetCounty.GetFaith.WarGodName]! [ritual_location.GetCounty.GetFaith.WarGodName]! [ritual_location.GetCounty.GetFaith.WarGodName]! #! gritam. Meu nome jamais é pronunciado.\n\nUm[local_character.Custom('ES_XA')] camponês[local_character.Custom('ES_OA')] dá um passo à frente, sorrindo. \"Venham celebrar [ritual_location.GetCounty.GetFaith.WarGodName]!\", diz.\n\n #bold Mas eu sou [ritual_location.GetCounty.GetFaith.WarGodName].\nE esperam que eu os castigue.#!"
 tgp_east_asia_mandala_task_contract_events.3000.a: "Por sangue e fogo, eles me adorarão a #EMP mí.#!"
 tgp_east_asia_mandala_task_contract_events.3000.b: "Estes camponeses servirão de exemplo."
 tgp_east_asia_mandala_task_contract_events.3000.c: "Muito bem. Vamos nos juntar aos festejos."
 fearful_population_modifier: "População temerosa"
 fearful_population_modifier_desc: "O Devaraja deixou mais do que claro que aqui só ele pode ser venerado."
 mandala_realm_contract_0022_contract: "Monges briguentos"
 mandala_realm_contract_0022_desc: "Eclodiu uma disputa por terras em [TaskContract.GetLocation.GetNameNoTooltip] entre dois mosteiros locais. Você foi chamado para restaurar a paz."
 mandala_realm_contract_0022_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0022_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base na sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.3100.t: "$mandala_ritual_prefix$ monges briguentos"
 tgp_east_asia_mandala_task_contract_events.3100.desc: "\"[ritual_location.GetName] nos pertence legitimamente, [local_character_2.Custom2('InsultNoun', local_character)] sem fé!\", grita um [GetTrait('devoted').GetName( local_character )|l] com uma voz aguda como um sino. \"Que [local_character_2.GetFaith.WarGodName] varra você e seu mosteiro da face da terra!\", responde o outro, impassível.\n\nO ar crepita de fúria, mas minha presença a acalma. Agora, aguardam meu veredicto."
 tgp_east_asia_mandala_task_contract_events.3100.a: "Agora apresento meu julgamento divino."
 tgp_east_asia_mandala_task_contract_events.3100.b: "Novos santuários serão erguidos para ambos os lados."
 tgp_east_asia_mandala_task_contract_events.3100.c: "Você terá que compartilhar a terra."
 new_shrines_modifier: "Novos santuários"
 new_shrines_modifier_desc: "O devaraja ergueu novos santuários para silenciar as disputas monásticas nesta província."
 upset_monks_modifier: "Monges descontentes"
 upset_monks_modifier_desc: "Os mosteiros deste condado estão brigando e discutindo."
 tgp_east_asia_mandala_task_contract_events.3100.a.success: "Você consegue chegar a um compromisso"
 tgp_east_asia_mandala_task_contract_events.3100.a.failure: "A situação se agrava"
 mandala_realm_contract_0023_contract: "Purificar o campo de batalha"
 mandala_realm_contract_0023_desc: "Um campo de [TaskContract.GetLocation.GetNameNoTooltip] que, outrora manchado pela batalha, agora assombra os aldeões com pesadelos — eles pedem que você o purifique."
 mandala_realm_contract_0023_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0023_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base no seu [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.3200.t: "$mandala_ritual_prefix$ purificar o campo de batalha"
 tgp_east_asia_mandala_task_contract_events.3200.desc: "\"Muito pacífic[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], um de nossos campos já foi um campo de batalha\", diz [Select_CString(local_character.IsFemale, 'a anciã', 'o ancião' )], com a expressão nublada de preocupação. \"Os espíritos foram perturbados pelo derramamento de sangue; agora eles nos assombram em sonhos.\"\n\n\"Deveis purificar o campo com uma procissão descalça e depor vossas armas, ainda que por um tempo. Que a terra esqueça o peso do aço, e os espíritos voltem a dormir.\""
 tgp_east_asia_mandala_task_contract_events.3200.a: "Juro que haverá paz."
 tgp_east_asia_mandala_task_contract_events.3200.b: "A procissão será liderada."
 tgp_east_asia_mandala_task_contract_events.3200.c: "Bastará cantar para os espíritos."
 plagued_by_nightmares_modifier: "Campos de batalha impuros"
 plagued_by_nightmares_modifier_desc: "Depois que o devaraja decidiu não purificar os campos de batalha, os camponeses foram \"afligidos por pesadelos\", o que os tornou menos produtivos."
 mandala_realm_contract_0024_contract: "Abençoados sejam os tecelões"
 mandala_realm_contract_0024_desc: "Os trabalhadores têxteis de [TaskContract.GetLocation.GetNameNoTooltip] te pedem que abençoe seus teares para que prosperem."
 mandala_realm_contract_0024_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0024_request: "Faça uma aparição em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.3300.t: "$mandala_ritual_prefix$ Abençoe os Tecelões"
 tgp_east_asia_mandala_task_contract_events.3300.desc: "Quando chegamos a [ritual_location.GetName], um[local_character.Custom('ES_XA')] de [Select_CString(local_character.IsFemale, 'muitas tecelãs', 'muitos tecelões' )] se curva diante de mim. \"Nossos teares retratam o divino: [ROOT.Char.GetFaith.WealthGodName], [ROOT.Char.GetFaith.HealthGodName] e agora vós, meu [ROOT.Char.GetTitleAsNameNoTooltip]\", diz, desdobrando um conjunto de tapeçarias vibrantes.\n\n\"Abençoai nosso ofício com prosperidade e nossa aldeia com paz. Tecei algo com vossas próprias mãos, um símbolo para venerarmos.\""
 tgp_east_asia_mandala_task_contract_events.3300.a: "Tecerei uma imagem em ouro e seda de [ROOT.Char.GetFaith.WealthGodName]."
 tgp_east_asia_mandala_task_contract_events.3300.b: "Uma imagem revestida de prata de [ROOT.Char.GetFaith.HealthGodName] é apropriada."
 tgp_east_asia_mandala_task_contract_events.3300.c: "Uma trama simples que retrate [ROOT.Char.GetFaith.DivineRealm]."
 healthgod_symbol_modifier: "Gremios de Tecelões Serenos"
 healthgod_symbol_modifier_desc: "Os tecelões desta província criam belas imagens de deuses que representam a saúde e a longevidade."
 wealthgod_symbol_modifier: "Gremios de tecelões prósperos"
 wealthgod_symbol_modifier_desc: "Os tecelões desta província criam belas imagens de deuses que representam a prosperidade e a riqueza."
 mandala_realm_contract_0025_contract: "Quebra de lanças"
 mandala_realm_contract_0025_desc: "Os anciãos de [TaskContract.GetLocation.GetNameNoTooltip] pedem que você parta lanças cerimoniais, simbolizando o fim das sangrentas rixas locais."
 mandala_realm_contract_0025_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0025_request: "Faça uma aparição em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.3400.t: "$mandala_ritual_prefix$ ruptura de lanças"
 tgp_east_asia_mandala_task_contract_events.3400.desc: "\"Clemente [ROOT.Char.GetTitleAsNameNoTooltip], hoje é um dia alegre!\", diz radiante [Select_CString(local_character.IsFemale, 'a líder local', 'o líder local' )]. \"Uma antiga rixa chegou ao fim; nossos filhos não morrerão mais em vão!\"\n\n\"Agora só pedimos paz. Tomai nossas lanças e quebrai-as sobre o fogo, para que os espíritos confiem em nossas intenções.\""
 tgp_east_asia_mandala_task_contract_events.3400.a: "Quebrarei até minha própria lança; a paz reinará."
 tgp_east_asia_mandala_task_contract_events.3400.b: "As lanças serão quebradas."
 tgp_east_asia_mandala_task_contract_events.3400.c: "Quebrar uma lança basta."
 sworn_peace_tt: "Você jurou não declarar guerras!"
 unable_to_declare_war_tt: "@alert_icon! #alert_trial Você jura não declarar guerras durante 5 anos!#!"
 feudless_village_modifier: "Vila sem rivalidades"
 feudless_village_modifier_desc: "Uma aldeia desta província quebrou todas as suas lanças em uma celebração da paz."
 mandala_realm_contract_0026_contract: "A paz do guru"
 mandala_realm_contract_0026_desc: "Um guru local prega a paz, para que as crianças de [TaskContract.GetLocation.GetNameNoTooltip] possam crescer arando os campos em vez de morrer em disputas."
 mandala_realm_contract_0026_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0026_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.3500.t: "$mandala_ritual_prefix$ a Paz do Guru"
 tgp_east_asia_mandala_task_contract_events.3500.desc: "Exaltado [ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], sou [local_character.Custom('ES_ElLa')] guru [local_character.GetFirstName]; guio o povo de [ritual_location.GetName], diz este personagem [GetTrait('devoted').GetName( local_character )|l] com a voz firme de convicção. Chamei-vos até aqui porque estas terras precisam de mãos para trabalhar a terra, não para empunhar lanças.\n\nQue os filhos dos lavradores lavrem os campos de seus pais — que uma geração cresça conhecendo a verdadeira serenidade."
 tgp_east_asia_mandala_task_contract_events.3500.a: "Eles conhecerão a serenidade — e você caminhará ao meu lado."
 tgp_east_asia_mandala_task_contract_events.3500.b: "Tenho muito a aprender, você se juntará a mim?"
 tgp_east_asia_mandala_task_contract_events.3500.c: "Suas lanças servem à minha divindade."
 generation_of_peace_modifier: "Geração de paz"
 generation_of_peace_modifier_desc: "Permite-se que uma geração de camponeses cresça em paz; não lhes serão impostas levas."
 mandala_realm_contract_0027_contract: "Edito de Reconciliação"
 mandala_realm_contract_0027_desc: "O ancião de [TaskContract.GetLocation.GetNameNoTooltip] lhe pede que proíba as patrulhas armadas e inscreva um decreto de que todas as disputas sejam resolvidas por arbitragem."
 mandala_realm_contract_0027_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0027_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base no seu [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.3600.t: "$mandala_ritual_prefix$ edito de reconciliação"
 tgp_east_asia_mandala_task_contract_events.3600.desc: "\"Grande [ROOT.Char.GetTitleAsNameNoTooltip], em [ritual_location.GetName], as disputas são resolvidas com lanças e fogo — não com palavras\", diz o ancião, colocando uma grande tabuleta de pedra, junto com ferramentas para entalhe. \"Sua palavra é lei divina. Talhe a paz na pedra e ponha fim à violência\".\n\nEu vou pegar as ferramentas. Vou inscrever…"
 tgp_east_asia_mandala_task_contract_events.3600.a: "… que as armas são proibidas."
 tgp_east_asia_mandala_task_contract_events.3600.b: "… que as disputas devem ser resolvidas com palavras."
 tgp_east_asia_mandala_task_contract_events.3600.c: "… que sou bom[ROOT.Char.Custom('ES_OA')] e excelente."
 weapon_ban_modifier: "Inscrição sobre proibição de armas"
 weapon_ban_modifier_desc: "Por decreto do devaraja, não são permitidas armas."
 arbitration_edict_modifier: "Inscrição sobre arbitragem"
 arbitration_edict_modifier_desc: "Por decreto do devaraja, as disputas só poderão ser resolvidas com palavras."
 mandala_realm_contract_0028_contract: "Caminho Óctuplo"
 mandala_realm_contract_0028_desc: "Um líder local solicita que passem em silêncio por oito aldeias: uma para cada canto de [TaskContract.GetLocation.GetNameNoTooltip]."
 mandala_realm_contract_0028_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0028_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.3700.t: "$mandala_ritual_prefix$ Caminho Óctuplo"
 tgp_east_asia_mandala_task_contract_events.3700.desc: "\"[ritual_location.GetName] está cheio de aldeias, e também de cansaço, rivalidade e vício\", diz [Select_CString(local_character.IsFemale, 'a anciã', 'o ancião' )], girando lentamente enquanto faz um gesto em um amplo círculo. \"Oito delas cercam este [ritual_location.Custom('GetRandomRegionalDangerSingular')], cada uma em uma direção diferente.\"\n\n\"Para ensinar-lhes o [Glossary('Caminho Óctuplo', 'EIGHTFOLD_PATH_GLOSS')], deveis percorrê-lo vós mesm[ROOT.Char.Custom('ES_OA')]: oito aldeias, oito fardos, sem descanso nem conforto. Só então verão o que realmente significa o esforço correto.\""
 tgp_east_asia_mandala_task_contract_events.3700.a: "Eu o suportarei como um bodhisattva."
 tgp_east_asia_mandala_task_contract_events.3700.b: "Seguirei o caminho, embora até eu precise descansar."
 tgp_east_asia_mandala_task_contract_events.3700.c: "Irá mais rápido a cavalo…"
 EIGHTFOLD_PATH_GLOSS: "Uma doutrina central do budismo, que apresenta oito princípios para uma vida reta: Visão Correta, Intenção Correta, Fala Correta, Ação Correta, Meio de Vida Correto, Esforço Correto, Atenção Correta e Concentração Correta.\n\nIdeais semelhantes eram respeitados nas tradições hindu, animista e sincrética do sul e sudeste da Ásia como um guia para a harmonia pessoal e social."
 eightfold_path_modifier: "Caminho Óctuplo"
 eightfold_path_modifier_desc: "Um devaraja demonstrou aqui as virtudes do [Glossary('sendero óctuple', 'EIGHTFOLD_PATH_GLOSS')]."
 walked_the_eightfold_path_modifier: "Percorreu o caminho óctuplo"
 walked_the_eightfold_path_modifier_desc: "Este devaraja demonstrou aqui as virtudes do [Glossary('sendero óctuple', 'EIGHTFOLD_PATH_GLOSS')] ao percorrer oito aldeias sem descansar."
 mandala_realm_contract_0029_contract: "Bosque sagrado ameaçado"
 mandala_realm_contract_0029_desc: "Um bosque sagrado de [TaskContract.GetLocation.GetNameNoTooltip] está ameaçado por caçadores furtivos e lenhadores. Os habitantes locais imploram que você deixe guerreiros para guardá-lo."
 mandala_realm_contract_0029_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0029_request: "Faça uma aparição em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.3800.t: "$mandala_ritual_prefix$ bosque sagrado ameaçado"
 tgp_east_asia_mandala_task_contract_events.3800.desc: "\"Nossos bosques sagrados de [ritual_location.Custom('GetRandomRegionalWood')] foram maculados, [ROOT.Char.GetTitleAsNameNoTooltip]\", diz [Select_CString(local_character.IsFemale, 'a lenhadora', 'o lenhador' )], apontando para uma clareira. \"Eles se tornaram um refúgio para lenhadores ilegais, caçadores furtivos e ladrões. Por favor, enviai vossos soldados para corrigir esse erro, e que a terra volte a prosperar.\""
 tgp_east_asia_mandala_task_contract_events.3800.a: "Meus homens de armas protegerão as alamedas."
 tgp_east_asia_mandala_task_contract_events.3800.b: "A guarnição de [county_scope.GetNameNoTooltip] protegerá as terras."
 tgp_east_asia_mandala_task_contract_events.3800.c: "Uma bênção removerá a mácula."
 well_protected_groves_modifier: "Bosques bem protegidos"
 well_protected_groves_modifier_desc: "Os bosques desta condado estão bem protegidos."
 garrisoned_groves_modifier: "Bosques com guarnição"
 garrisoned_groves_modifier_desc: "Os bosques deste condado estão protegidos pela guarnição principal, o que a espalha demais."
 mandala_realm_contract_0030_contract: "Voto de silêncio"
 mandala_realm_contract_0030_desc: "[TaskContract.GetLocation.GetNameNoTooltip] te pede que assuma um voto público de não violência: você terá que ficar sentado em silêncio durante dias para ensiná-los serenidade."
 mandala_realm_contract_0030_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0030_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.3900.t: "$mandala_ritual_prefix$ voto de quietude"
 tgp_east_asia_mandala_task_contract_events.3900.desc: "Antes mesmo de avistarmos [ritual_location.GetName], ouvimos: gritos, discussões, barulho constante. Não é um lugar sereno.\n\n\"Grande [ROOT.Char.GetTitleAsNameNoTooltip], se vós estiverdes em silêncio, eles também estarão; se vós estiverdes em paz, eles também estarão\", suplica [Select_CString(local_character.IsFemale, 'a chefe', 'o chefe' )] do local. \"Demonstrai vossa divindade e livrai-nos desta discórdia.\""
 tgp_east_asia_mandala_task_contract_events.3900.a: "Que três luas passem em silêncio, e a serenidade virá em seguida."
 tgp_east_asia_mandala_task_contract_events.3900.b: "Uma semana de silêncio acalmará os inquietos."
 tgp_east_asia_mandala_task_contract_events.3900.c: "Um passeio pela cidade deveria acalmar todo mundo."
 discordant_town_modifier: "Cidade de discordância"
 discordant_town_modifier_desc: "Esta província está assolada por discórdia e brigas."
 mandala_realm_contract_0031_contract: "Assentamento de pedras"
 mandala_realm_contract_0031_desc: "Os aldeões de [TaskContract.GetLocation.GetNameNoTooltip] desejam erguer um edifício em sua honra. Eles precisam de uma cerimônia de rendição das armas antes de começar a construção."
 mandala_realm_contract_0031_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0031_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.4000.t: "$mandala_ritual_prefix$ assentamento de pedras"
 tgp_east_asia_mandala_task_contract_events.4000.desc: "\"Seren[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], somos os [Glossary('Śilpakāras', 'SILPAKARAS_GLOSS')] de [ritual_location.GetName]\", dizem [Select_CString(local_character.IsFemale, 'as mulheres', 'os homens' )], inclinando-se enquanto erguem seus martelos de construção. \"Desejamos levantar uma estrutura em nome da paz e da prosperidade.\"\n\n\"Mas antes de começarmos, pedimos que enterreis vossos [Glossary('pedangs', 'PEDANG_GLOSS')] sob as fundações, para expulsar os espíritos violentos e consagrar o terreno.\""
 tgp_east_asia_mandala_task_contract_events.4000.a: "Ordenarei que meu exército depor as armas."
 tgp_east_asia_mandala_task_contract_events.4000.b: "Meu [sacrificial_regiment.GetNameNoTooltip] entregará suas armas."
 tgp_east_asia_mandala_task_contract_events.4000.c: "Enterrarei uma de minhas espadas sob a terra."
 SILPAKARAS_GLOSS: "Em sânscrito, śilpakāra refere-se a um artesão especializado em arquitetura ou escultura. Nas cortes hindu-budistas do sul e do sudeste da Ásia, formaram guildas organizadas. Nos estados mandala khmer, javaneses e indianos, os śilpakāras frequentemente trabalhavam sob o patrocínio divino ou real."
 pious_silpakaras_modifier: "Śilpakāras piedosos"
 pious_silpakaras_modifier_desc: "Um grupo de [Glossary('śilpakāras', 'SILPAKARAS_GLOSS')] piedosos trabalha nesta província."
 ritually_disarmed_modifier: "Desarmado ritualmente"
 ritually_disarmed_modifier_desc: "Este personagem enterrou suas armas como parte de uma cerimônia ritual."
 mandala_realm_contract_0032_contract: "O asceta que ri"
 mandala_realm_contract_0032_desc: "Um asceta brincalhão está semeando o caos em [TaskContract.GetLocation.GetNameNoTooltip]. Os aldeões recorrem a você para enganar esse agente das traquinagens."
 mandala_realm_contract_0032_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0032_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em seu [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.4100.t: "$mandala_ritual_prefix$ o asceta que ri"
 tgp_east_asia_mandala_task_contract_events.4100.desc: "Somos recebidos com grandes risadas ao chegarmos a [ritual_location.GetName]. Uma multidão se reúne em torno de um [GetTrait('devoted').GetName( local_character )|l] de aspecto rechoncho; seus rostos estão iluminados pela expectativa. \"… e agora, contemplem est[local_character_2.Custom('ES_EA')] [local_character_2.Custom('dummy_peasant_profession')] de coração [GetTrait('arrogant').GetName( local_character_2 )|l] saindo de sua casa\", diz [local_character.Custom('ES_ElLa')] asceta em voz baixa e brincalhona.\n\nNesse momento, um barril cai da porta e encharca [local_character_2.Custom('ES_AlAla')] [local_character_2.GetWomanMan] com um estrondo ensurdecedor. \"Seu ego foi completamente enxaguado!\", brada [local_character.Custom('ES_ElLa')] [GetTrait('devoted').GetName( local_character )|l], agarrando a barriga de tanto rir. Os aldeões irrompem em júbilo — até mesmo a vítima encharcada ri junto."
 tgp_east_asia_mandala_task_contract_events.4100.a: "Achar que podem ser mais espertos que [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetTitleAsNameNoTooltip]? Nunca!"
 tgp_east_asia_mandala_task_contract_events.4100.b: "Deve me ensinar!"
 tgp_east_asia_mandala_task_contract_events.4100.c: "É uma encarnação da minha vontade."
 mandala_realm_contract_0033_contract: "Isca para os espíritos"
 mandala_realm_contract_0033_desc: "Os aldeões de [TaskContract.GetLocation.GetNameNoTooltip] pedem que você erga um ídolo isca espiritual, para enganar os espíritos malévolos que assombram suas terras."
 mandala_realm_contract_0033_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0033_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base na sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.4200.t: "$mandala_ritual_prefix$ disfarce para os espíritos"
 tgp_east_asia_mandala_task_contract_events.4200.desc: "\"[ROOT.Char.GetTitleAsNameNoTooltip|U], os espíritos amaldiçoam nossas colheitas de [local_character.Custom('RegionalRootVegetablePlural')] para que apodreçam\", diz [Select_CString(local_character.IsFemale, 'a chefe', 'o chefe' )] do lugar, apontando para um monte de madeira e [ritual_location.Custom('GetRandomImprovisedBridgeMaterial')]. \"Deveis erguer um ídolo para enganar os espíritos, acalmá-los ou afastá-los.\""
 tgp_east_asia_mandala_task_contract_events.4200.a: "Construirei um grande ídolo de [local_character.Custom('RegionalRootVegetable')] para intimidá-los."
 tgp_east_asia_mandala_task_contract_events.4200.b: "Um ídolo multifacetado de mim mesmo os banirá."
 tgp_east_asia_mandala_task_contract_events.4200.c: "Uma efígie de [ROOT.Char.GetFaith.HealthGodName] os acalmará."
 mocked_idol_modifier: "Ídolo ridicularizado"
 mocked_idol_modifier_desc: "Um ídolo construído por um Devaraja é amplamente ridicularizado neste condado."
 vegetable_idol_modifier: "Ídolo espiritual vegetal"
 vegetable_idol_modifier_desc: "Acredita-se amplamente que um ídolo construído por um Devaraja proporciona uma colheita próspera."
 ruler_idol_modifier: "Ídolo espiritual do devaraja"
 ruler_idol_modifier_desc: "Acredita-se amplamente que um ídolo construído por um Devaraja afasta espíritos malignos."
 mandala_realm_contract_0034_contract: "Jogo de inteligência"
 mandala_realm_contract_0034_desc: "Um nobre de [TaskContract.GetLocation.GetNameNoTooltip] desafiou você para um jogo de inteligência — para provar sua divindade perante a corte."
 mandala_realm_contract_0034_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0034_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base na sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.4300.t: "$mandala_ritual_prefix$ jogo de inteligência"
 tgp_east_asia_mandala_task_contract_events.4300.desc: "Ao nos aproximarmos de [ritual_location.GetHolding.GetType.GetName] em [ritual_location.GetName], sou recebido no interior por [local_character.Custom('ES_ElLa')] [local_character.GetTitledFirstNameNicknamed|l]. \"Grande e astut[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], desafio-vos para uma partida de [local_character.Custom('BG_GameType_Generic')]\", diz [local_character.GetSheHe], erguendo uma peça entalhada. \"Vencei, e ganhareis meu respeito. Vencei por meio de #EMP enganos#!, e tereis minha lealdade eterna.\"\n\nOs servos entram com [local_character.Custom('GetExpensiveMeal')] e [local_character.Custom('GetExpensiveDrink_Singular')]. \"Mas se perderdes... bem, então veremos.\""
 tgp_east_asia_mandala_task_contract_events.4300.a: "Colocarei as peças nas mãos de [ROOT.Char.GetFaith.TricksterGodNamePossessive]."
 tgp_east_asia_mandala_task_contract_events.4300.b: "Minha habilidade me permitirá superar isso."
 tgp_east_asia_mandala_task_contract_events.4300.c: "Uma partida amistosa, nada mais."
 mandala_realm_contract_0035_contract: "Ladrão divino"
 mandala_realm_contract_0035_desc: "Um criminoso de [TaskContract.GetLocation.GetNameNoTooltip] tem certa semelhança com você e cometeu atos de furto afirmando ser você."
 mandala_realm_contract_0035_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0035_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.4400.t: "$mandala_ritual_prefix$ ladrão divino"
 tgp_east_asia_mandala_task_contract_events.4400.desc: "\"Exijo seu colar… é vital para o meu ritual\", diz um[local_character.Custom('ES_XA')] [local_character.GetWomanMan] que tem uma semelhança #EMP inquietante#! comigo, pairando sobre um aldeão assustado. \"Rápido, não faça sua [ROOT.Char.GetTitleAsNameNoTooltip] esperar!\".\n\nEle se vira e fica gelad[local_character.Custom('ES_OA')] ao me ver. \"Oh, muito venerável [ROOT.Char.GetTitleAsNameNoTooltip]! Eu só estava… arrecadando tributo em seu nome!\", gagueja."
 tgp_east_asia_mandala_task_contract_events.4400.a: "Chega de roubar — você falará com a minha voz em [ritual_location.GetNameNoTooltip]."
 tgp_east_asia_mandala_task_contract_events.4400.b: "Você será útil. Você voltará comigo."
 tgp_east_asia_mandala_task_contract_events.4400.c: "Devolva tudo o que você roubou."
 omnipresent_authority_modifier: "Autoridade onipresente"
 omnipresent_authority_modifier_desc: "É quase como se o Devaraja vivesse neste condado, de tão visto que ele é... mas ele não vive na capital?"
 mandala_realm_contract_0036_contract: "Julgamento espiritual"
 mandala_realm_contract_0036_desc: "As pessoas de [TaskContract.GetLocation.GetNameNoTooltip] creem que estão sendo enganadas por um [TaskContract.GetLocation.Custom('GetProvinceTricksterSpirit')] zomba delas."
 mandala_realm_contract_0036_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0036_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.4500.t: "$mandala_ritual_prefix$ julgamento espiritual"
 tgp_east_asia_mandala_task_contract_events.4500.desc: "\"Grande [ROOT.Char.GetTitleAsNameNoTooltip], um [ritual_location.Custom('GetProvinceTricksterSpirit')] está zombando de nós\", rosna [Select_CString(local_character.IsFemale, 'a anciã', 'o ancião' )], esfregando a testa. \"O poço está cheio de sapos, os bolos de arroz azedam de uma noite para outra, um bando de [ROOT.Char.Custom('GetRandomRegionalWildDaytimeBird')]s assusta as crianças, e acordei com um exemplar de #EMP [local_character.Custom('RegionalPoxAnimal')]#! dormindo ao meu lado!\"\n\n[local_character.GetSheHe|U] se aproxima com olhar nervoso. \"Deveis ser mais espert[ROOT.Char.Custom('ES_OA')] que esse espírito trapaceiro... realizai um falso sacrifício para confundi-lo!\""
 tgp_east_asia_mandala_task_contract_events.4500.a: "Reúnam a aldeia, vou \"sacrificar\" uma criança!"
 tgp_east_asia_mandala_task_contract_events.4500.b: "Usarei uma cabra treinada para desmaiar."
 tgp_east_asia_mandala_task_contract_events.4500.c: "Oferecerei fruta… depois a comerei no jantar."
 mandala_realm_contract_0037_contract: "Festival da Reversão"
 mandala_realm_contract_0037_desc: "Uma aldeia em [TaskContract.GetLocation.GetNameNoTooltip] realiza um festival em que todas as regras são invertidas."
 mandala_realm_contract_0037_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0037_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.4600.t: "$mandala_ritual_prefix$ festival da inversão"
 tgp_east_asia_mandala_task_contract_events.4600.desc: "Quando chegamos a [ritual_location.GetName], [Select_CString(local_character_2.IsFemale, 'uma menina', 'um menino' )] passa correndo ao meu lado com uma coroa improvisada. \"Eu sou [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip]! Contemplai a minha divindade!\", grita. A aldeia ganha vida com um festival em que os papéis se invertem: os pobres se vestem de nobres, os servos agem como senhores e os senhores carregam bandejas.\n\nSe eu me juntasse a eles disfarçado, sem ser notado, testemunhariam a verdadeira divindade."
 tgp_east_asia_mandala_task_contract_events.4600.a: "Irei como mendig[ROOT.Char.Custom('ES_OA')]."
 tgp_east_asia_mandala_task_contract_events.4600.b: "Irei como soldado."
 tgp_east_asia_mandala_task_contract_events.4600.c: "Irei como… eu mesmo[ROOT.Char.Custom('ES_OA')]."
 mandala_realm_contract_0038_contract: "Oráculo caprino"
 mandala_realm_contract_0038_desc: "Uma cabra falante é aclamada como sua mensageira divina em [TaskContract.GetLocation.GetNameNoTooltip]."
 mandala_realm_contract_0038_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0038_request: "Faça uma aparição em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.4700.t: "$mandala_ritual_prefix$ oráculo caprino"
 tgp_east_asia_mandala_task_contract_events.4700.desc: "\"Venham, venham, e sejam testemunhas da cabra divina pela qual [ROOT.Char.GetTitledFirstNameNoTooltip] fala!\", [local_character.Custom('ES_ElLa')] [local_character.GetWomanMan] se inclina teatralmente e a cabra arranha o chão com o casco. \"...seis, sete, oito! Oito arranhões! É um sinal: todos devemos comprar [local_character_2.Custom('GetExpensiveDrink_Singular')] de [local_character_2.GetFirstName]!\"\n\nDe repente, [local_character.GetSheHe] ergue o olhar e fica imóvel. \"Oh... divin[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip]! Eu... eu não tinha visto você aí...\"\n\n[Select_CString(local_character.IsFemale, 'Uma charlatã', 'Um charlatão' )] com recursos. E uma cabra treinada. Pode ser útil."
 tgp_east_asia_mandala_task_contract_events.4700.a: "Enquanto meu mensageir[local_character.Custom('ES_OA')] pagar um dízimo…"
 tgp_east_asia_mandala_task_contract_events.4700.b: "A cabra e você se juntarão a mim."
 tgp_east_asia_mandala_task_contract_events.4700.c: "… quatro, cinco! Cinco marcas… É penitência pública!"
 punished_charlatan_modifier: "Charlatão punido"
 punished_charlatan_modifier_desc: "Aqui foi descoberto e punido recentemente um charlatão."
 goat_oracle_modifier: "Oráculo caprino"
 goat_oracle_modifier_desc: "Neste condado, uma cabra oráculo é exibida em procissão, presumindo-se que fale em nome do Devaraja."
 mandala_realm_contract_0039_contract: "Bestas na escuridão"
 mandala_realm_contract_0039_desc: "A população de [TaskContract.GetLocation.GetNameNoTooltip] é atormentada por feras que rondam o/a [TaskContract.GetLocation.Custom('TerrainTypeProvince')]. Pedem que você as capture — ou as engane."
 mandala_realm_contract_0039_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0039_request: "Faça uma aparição em [TaskContract.GetLocation.GetName] e tome uma decisão com base na sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.4800.t: "$mandala_ritual_prefix$ bestas em [ritual_location.Custom('TerrainTypeProvince')]"
 tgp_east_asia_mandala_task_contract_events.4800.desc: "À medida que passamos por [ritual_location.GetName], sinto que olhos invisíveis me observam de dentro da [ritual_location.Custom('TerrainTypeProvince')]. \"Sábio [ROOT.Char.GetTitleAsNameNoTooltip], fique quieto\", sussurra um camponês. \"[ROOT.Char.Custom('RegionalOnlyFerociousAnimalPlural')|U] — e outras feras — estão por toda parte. Atraia-as para longe, prenda-as; nós imploramos, faça alguma coisa.\""
 tgp_east_asia_mandala_task_contract_events.4800.a: "Vamos caçá-los; suas peles adornarão meu trono."
 tgp_east_asia_mandala_task_contract_events.4800.b: "Expulsemos-nos; o/a [ritual_location.Custom('TerrainTypeProvince')] nos servirá de escudo."
 tgp_east_asia_mandala_task_contract_events.4800.c: "Não, elas são minhas mensageiras."
 beast_free_modifier: "Livre de feras"
 beast_free_modifier_desc: "Esta província foi limpa de bestas perigosas por um poderoso Devaraja."
 brimming_with_beasts_modifier: "Transbordante de feras"
 brimming_with_beasts_modifier_desc: "Esta província está repleta de bestas ferozes que gostam de devorar viajantes."
 gain_hunt_artifact_tt: "Você recebe um [artifact|lE] relacionado à caça"
 mandala_realm_contract_0040_contract: "Nāga fluvial"
 mandala_realm_contract_0040_desc: "Os camponeses estão convencidos de que uma [Glossary('nāga', 'NAGA_GLOSS')] habita nos rios de [TaskContract.GetLocation.GetNameNoTooltip]. Exigem que você o(a) atraia para longe."
 mandala_realm_contract_0040_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0040_request: "Apresente-se em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.4900.t: "$mandala_ritual_prefix$ nāga fluvial"
 tgp_east_asia_mandala_task_contract_events.4900.desc: "\"Sábi[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], uma [Glossary('nāga', 'NAGA_GLOSS')] vingativa espreita nos rios de [ritual_location.GetName]\", suplica [Select_CString(local_character.IsFemale, 'uma mulher trêmula', 'um homem trêmulo' )]. \"Dez aldeões desapareceram, arrastados para baixo das águas. Vós deveis atraí-la para longe antes que ela leve mais vidas!\"\n\nViajamos pela margem do rio, o ar está denso de neblina e medo. Então, há movimento nos juncos. Não é nenhuma nāga, mas um crocodilo monstruoso, vasto e ancestral, um deus do rio em seu templo."
 tgp_east_asia_mandala_task_contract_events.4900.a: "[entourage_character.GetFirstNameNoTooltip], pegue esta carne — precisamos capturá-lo!"
 tgp_east_asia_mandala_task_contract_events.4900.b: "Transpassai-o com flechas, não podemos deixá-lo viver."
 tgp_east_asia_mandala_task_contract_events.4900.c: "Me serve a mim, mantenham-se longe dos rios."
 river_crocodile_god_modifier: "Deus Crocodilo"
 river_crocodile_god_modifier_desc: "Um crocodilo enorme, muitas vezes confundido com uma [Glossary('nāga', 'NAGA_GLOSS')], espreita nas águas desta província — devorando exércitos sitiantes e amedrontando camponeses."
 mandala_realm_contract_0041_contract: "Terra prometida"
 mandala_realm_contract_0041_desc: "Um grande grupo de peregrinos está procurando sua \"terra prometida\" em algum lugar de [TaskContract.GetLocation.GetNameNoTooltip]."
 mandala_realm_contract_0041_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0041_request: "Faça uma aparição em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.5000.t: "$mandala_ritual_prefix$ terra prometida"
 tgp_east_asia_mandala_task_contract_events.5000.desc: "Depois de cavalgar pela [ritual_location.Custom('TerrainTypeProvince')] de [ritual_location.GetName], por fim avistamos os peregrinos: estão fracos, exaustos e somam centenas.\n\nSeu líder se ergue, com a voz trêmula de cansaço: \"Somos peregrinos [local_character.GetFaith.GetAdjective] em busca de nossa terra prometida. Viestes nos conduzir? Sois um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip], ou talvez um[ROOT.Char.Custom('ES_XA')] deus[ROOT.Char.Custom('ES_XA')]?\""
 tgp_east_asia_mandala_task_contract_events.5000.a: "Sou [local_character.GetFaith.TricksterGodName], seu lar está em [ruler_capital_county.GetNameNoTooltip]."
 tgp_east_asia_mandala_task_contract_events.5000.b: "Sou um devaraja e [ritual_location.GetNameNoTooltip] é a sua terra prometida."
 tgp_east_asia_mandala_task_contract_events.5000.c: "Sou um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] e lhe desejo boa sorte em sua busca."
