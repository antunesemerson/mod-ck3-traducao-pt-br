l_spanish:
 unsanctioned_deity: "Divindade não autorizada"
 unsanctioned_deity_contract: "$unsanctioned_deity$"
 unsanctioned_deity_desc: "Os súditos deste condado adoram uma deidade ilícita, e os rumores das bênçãos afortunadas dela se espalham por todo o reino."
 unsanctioned_deity_desc_title: "$task_contract_governance_desc_title$"
 governor_contract_events_tova.0050.t: "$unsanctioned_deity$"
 governor_contract_events_tova.0050.desc: "Uma quantidade incomum de pessoas faz fila nas ruas de [deity_destination.GetName] para se prostrar e queimar incenso diante do santuário de uma divindade ilícita. Camponeses e citadinos, por igual, afluem de todos os cantos do domínio para fazer quaisquer oferendas modestas que possam. \n\nSe eu não lidar com a situação, essas superstições desvairadas continuarão a se espalhar sem controle pelo distrito."
 governor_contract_events_tova.0050.a: "Este assunto requer toda a minha atenção."
 governor_contract_events_tova.0050.a.tt: "Viajar a [deity_destination.GetName] e investigar o assunto"
 governor_contract_events_tova.0050.b: "Tenho assuntos mais urgentes…"
 governor_contract_events_tova.0051.desc: "Sigo o forte cheiro de incenso em [deity_destination.GetName] abrindo caminho pelas ruas cheias de gente, e chego ao santuário ofensivo. \n\n[ROOT.Char.Custom('RandomPeasantGrievance')] Pelo barro respingado nas barras da calça, ela percorreu uma boa distância para chegar até aqui. \n\nQuando pergunto sobre a divindade, ela me diz que parece [ROOT.Char.Custom('RandomVerySmallCreature')] e vive em [ROOT.Char.Custom('RandomVerySmallCreatureDwelling')] à beira da estrada."
 governor_contract_events_tova.0051.a: "Aprovemos publicamente a divindade."
 governor_contract_events_tova.0051.b: "Dispersai os devotos e queimai o santuário."
 governor_contract_events_tova.0051.c: "Tomai as oferendas piedosas."
 governor_contract_events_tova.0051.d: "Raciocinemos com os devotos."
 governor_contract_events_tova.0051.e: "Deixarei que os monges cuidem disso."
 governor_contract_events_tova.0052.desc_burn: "Meus guardas abrem caminho rapidamente pela multidão, desferindo golpes nos calcanhares daqueles que demoram em seu caminho. Uma tocha cai sobre o santuário, e logo as chamas sobem ao céu; seu calor afasta os poucos devotos que restam. \n\nPosso dizer com segurança que a ordem foi restabelecida no condado de [deity_destination.GetName], livre da superstição para que a razão possa florescer."
 governor_contract_events_tova.0052.desc_debunk: "\"… E é por isso que esta criatura #EMP no#! é, de fato, um deus. Cada um de nós forja sua própria fortuna por meio da humanidade e de uma boa conduta moral\". \n\nA multidão se cala, pasmada pela minha habilidade retórica superior. Vejo claramente o momento em que כולם percebem o erro de seus caminhos e começam a se dispersar."
 governor_contract_events_tova.0052.a: "Como deve ser."
 governor_contract_events_tova.0053.desc_burn: "Meus guardas tentam abrir caminho pela multidão, e me surpreende ver os devotos exaltados revidando! A tocha que era destinada ao santuário cai no chão, e o caos se instala. \n\nEu e minha comitiva mal conseguimos sair a tempo antes que as chamas nos alcancem."
 governor_contract_events_tova.0053.desc_debunk: "\"… O que significa que a única forma verdadeira de garantir nossa própria fortuna é fazendo o bem por nós mesmos. Mas, é claro, não devemos agir em excesso apenas para satisfazer nossos próprios interesses. Então, o que eu estava dizendo?\". \n\nUm murmúrio de desaprovação percorre a multidão. Alguns escondem sob as mangas o que certamente são sorrisos zombeteiros. \n\nMeu rosto se ruboriza, viro-me e vou embora antes de me passar ainda mais por tolo."
 governor_contract_events_tova.0053.a: "Isso não saiu conforme o planejado!"
 task_contract_reward_effect_sanction_deity_desc: "A divindade passa a ser aprovada pelo governo."
 task_contract_reward_effect_claim_offerings_desc: "Você confisca os objetos valiosos dos santuários."
 task_contract_reward_effect_deity_monks_desc: "Você delega o problema, como um verdadeiro governante."
 escaped_justice: "Fuga da justiça"
 escaped_justice_contract: "$escaped_justice$"
 escaped_justice_desc: "Um criminoso escapou da justiça e fugiu para este condado em vez de responder à intimação do tribunal."
 escaped_justice_desc_title: "$task_contract_governance_desc_title$"
 governor_contract_events_tova.0055.t: "$escaped_justice$"
 governor_contract_events_tova.0055.desc: "Fui informado de que [escapee.Custom('ES_ElLa')] [escapee.GetTitledFirstName|l] descuida seus deveres a ponto de desviar fundos do tesouro real. \n\nQuando foi convocado para responder à justiça em minha corte, reuniu seus homens e fugiu para o ermo, onde agora ocupa o abrigo de algum pobre fazendeiro! \n\nOs guardas estão armados e prontos para defender a posição de seu [escapee.Custom('MistressMaster')|l]. Está claro que [escapee.Custom('ES_ElLa')] [escapee.GetTitledFirstName|l] não se renderá sem minha intervenção."
 governor_contract_events_tova.0055.a: "Preciso ir até lá imediatamente!"
 governor_contract_events_tova.0055.a.tt: "Viajar para [escapee_destination.GetName] e investigar o assunto"
 governor_contract_events_tova.0055.b: "Essa rata vil acabará aparecendo mais cedo ou mais tarde…"
 governor_contract_events_tova.0056.desc: "\"Não dê mais um passo!\", grita um arqueiro para mim, nos apontando de trás de uns [ROOT.Char.Custom('OutdoorsHidingPlace')]. Além de sua postura ameaçadora, vislumbro o prédio que abriga [escapee.Custom('ES_AlAla')] criminoso [escapee.Custom('ES_AlAla')] que estou perseguindo. \n\nA julgar pelo estalar de gravetos nos arbustos altos, há um punhado de guardas preparados para a minha chegada."
 governor_contract_events_tova.0056.a: "É preciso convencer [Select_CString(escapee.IsFemale, 'a la fugada', 'al fugado' )] para que enfrente a justiça."
 governor_contract_events_tova.0056.b: "Passem ess[escapee.Custom('ES_EA')] covarde e seus homens pela espada."
 governor_contract_events_tova.0056.c: "Posso oferecer certa clemência."
 governor_contract_events_tova.0056.d: "Desterrai[escapee.GetHerHim]."
 governor_contract_events_tova.0057.desc_persuade: "\"Olhem bem para vocês! Este é o ato de um[escapee.Custom('ES_XA')] louc[escapee.Custom('ES_OA')]. É assim que vocês querem que a dinastia [escapee.GetDynastyName] seja lembrada? Poupem a vergonha de sua família e venham comigo\". \n\nTalvez sejam minhas palavras, ou o tom da minha voz, mas [escapee.Custom('ES_ElLa')] [escapee.GetTitledFirstName|l] sai de seu esconderijo. Ele ergue as mãos em um gesto apaziguador e se rende."
 governor_contract_events_tova.0057.desc_slay: "A paz frágil se transforma em um clamor ensurdecedor de gritos de guerra e o choque de aços quando meus homens avançam sobre os guardas. \n\nToda resistência se desfaz com suas armaduras quebradas e suas vidas se esvaindo no chão. Em seguida, arrastam até mim [escapee.Custom('ES_AlAla')] [escapee.GetTitledFirstName|l] para que eu possa tomar sua cabeça, o que faço com um golpe certeiro."
 governor_contract_events_tova.0057.a: "Meu trabalho aqui terminou!"
 governor_contract_events_tova.0058.desc_persuade: "Abro a boca para falar, mas tenho dificuldade em encontrar qualquer motivação para ser encarcerado. Ouço a mim mesmo dizer: \"A cativeiro forçado é ótimo para formar o caráter!\". E sei que perdi qualquer chance de convencer [escapee.Custom('ES_AlAla')] [escapee.GetTitledFirstName|l] para que venha em paz. \n\nEm vez disso, verá como é agradável apodrecer escondido."
 governor_contract_events_tova.0058.desc_slay: "A paz frágil se transforma em um clamor estrondoso de gritos de guerra e o tinir de aço se chocando. \n\nMeus homens se lançam valentes contra seus oponentes, com as espadas em punho, mas seus golpes só atingem o ar e não conseguem deter os ataques de resposta. \n\nVejo os meus sendo repelidos e percebo que a retirada é a única opção."
 governor_contract_events_tova.0058.a: "Que vergonha…"
 forced_conscription: "Recrutamento obrigatório"
 forced_conscription_contract: "$forced_conscription$"
 forced_conscription_desc: "Mobilize as levies para preparar seu exército para a guerra."
 forced_conscription_desc_title: "$task_contract_governance_desc_title$"
 governor_contract_events_tova.0060.t: "$forced_conscription$"
 governor_contract_events_tova.0060.desc: "\"Em tempos de expansão, é nosso dever reunir forças para as guerras em potencial\", diz o início da missiva enviada por meu senhor[ROOT.Char.GetLiege.Custom('ES_XA')]. \n\n\"Não precisam ser treinadas. Não precisam ser equipadas. Uma vanguarda de proporções avassaladoras servirá para esmagar qualquer oposição\". \n\nAs famílias camponesas sob meu controle já entregaram os homens responsáveis por suas casas, restando apenas seus filhos para o recrutamento."
 governor_contract_events_tova.0060.a: "Sobrepujaremos nossos inimigos com força bruta!"
 governor_contract_events_tova.0060.a.tt: "Você investiga a questão mais a fundo."
 governor_contract_events_tova.0060.b: "Não sacrificarei meu povo para tais fins."
 governor_contract_events_tova.0061.desc: "Ao olhar para a cidade abaixo de mim, vejo luzes distantes tremeluzindo nas janelas e nas portas dos edifícios mais adiante. \n\nAs famílias compartilham refeições juntas, na segurança de seus lares. Seus destinos, como os de todos os meus súditos, cabem a mim decidir."
 governor_contract_events_tova.0061.a: "Pagar as famílias uma compensação."
 governor_contract_events_tova.0061.b: "Arranque seus filhos de suas casas à força!"
 governor_contract_events_tova.0061.c: "Use a piedade filial para convencer os filhos a se alistarem."
 governor_contract_events_tova.0061.d: "Talvez eu possa poupá-los se aceitarem uma troca."
 combat_train_monks: "Transformar os monges em armas"
 combat_train_monks_contract: "$combat_train_monks$"
 combat_train_monks_desc: "Um mosteiro neste condado abriga diversos monges que poderiam ser usados para fortalecer as defesas do reino, se forem bem treinados."
 combat_train_monks_desc_title: "$task_contract_governance_desc_title$"
 governor_contract_events_tova.0065.t: "$combat_train_monks$"
 governor_contract_events_tova.0065.desc: "Sou informado de que há monges no mosteiro de [monks_destination.GetName], que se destacam no combate corpo a corpo. Pelo que parece, praticam as artes marciais como uma forma de meditação, mas talvez essas habilidades pudessem ser melhor empregadas para servir ao reino e proteger suas fronteiras. \n\nMas antes preciso avaliar a têmpera dos monges."
 governor_contract_events_tova.0065.a: "Vou ver do que esses monges são feitos."
 governor_contract_events_tova.0065.a.tt: "Viajar a [monks_destination.GetName] e supervisionar seus treinamentos"
 governor_contract_events_tova.0065.b: "Não, vou deixá-los ser monges."
 governor_contract_events_tova.0066.desc: "Entro no mosteiro durante uma sessão de treino em andamento. \n\nUm grito forte, um golpe retumbante, e um monge cai ao chão, levantando uma nuvem de poeira. Todos aplaudem, eu também. \n\nO vencedor se destaca como um dos melhores guerreiros do templo. De fato, quando falo com ele, ele se gaba de ser o responsável por ensinar o resto."
 governor_contract_events_tova.0066.a: "Demonstre seu valor em combate corpo a corpo."
 governor_contract_events_tova.0066.b: "Alardeie de seus feitos militares."
 governor_contract_events_tova.0066.c: "Explica #EMP detalladamente#! o quão efetivas as armas podem ser."
 governor_contract_events_tova.0066.d: "Meu Marechal pode cuidar disso."
 governor_contract_events_tova.0066.tt_success_desc: "Os monges ficam impressionados"
 governor_contract_events_tova.0066.tt_success: "Isto desbloqueia resultados positivos"
 governor_contract_events_tova.0066.tt_failure_desc: "Os monges #bold no#! ficam impressionados"
 governor_contract_events_tova.0067.desc: ""
 governor_contract_events_tova.0067.desc_martial: "A multidão rapidamente forma um círculo ao redor de mim e do meu adversário. \n\nNo momento em que nos curvamos, já estou pronto[ROOT.Char.Custom('ES_OA')] para golpear e não penso duas vezes antes de avançar e derrubar o monge. Essa é a diferença entre aluno e mestre[ROOT.Char.Custom('ES_OA')]! \n\nCom isso, o combate termina assim que começa. Os espectadores aguardam ansiosos para saber o que direi a seguir."
 governor_contract_events_tova.0067.desc_diplomacy: "\"… E, sem minha espada, tive de lutar contra a besta fedorenta que puseram contra mim, e apresentei sua cabeça aos meus punhos de maneira bastante vigorosa!\". \n\nA julgar pelas expressões extasiadas nos rostos do meu público, posso dizer que os monges estão convencidos de minhas habilidades e autoridade."
 governor_contract_events_tova.0067.desc_learning: "\"A força basta para quebrar ossos, mesmo que a arma não perfure a armadura! É aí que entram a largura e o material da lâmina…\" \n\nEspalho meu discurso com conceitos bastante comuns para que até o leigo mais simples me entenda. Quando termino, não resta dúvida de que os monges estão totalmente convencidos do meu argumento. \n\nEscutam atentamente o que tenho a dizer."
 governor_contract_events_tova.0067.a: "Todos deveriam servir no meu exército!"
 governor_contract_events_tova.0067.b: "Este monge poderia ser um cavaleiro útil."
 governor_contract_events_tova.0067.c: "Vou transformar estes monges em guerreiros."
 governor_contract_events_tova.0067.d: "Estacionarei tropas aqui para ajudar a fortificar a região."
 governor_contract_events_tova.0068.desc: ""
 governor_contract_events_tova.0068.desc_martial: "Dou um passo à frente, cabeça erguida, peito estufado, pronto para dar um espetáculo a esses monges. \n\nFazemos uma reverência e, antes mesmo de eu ter tempo de me endireitar, meu oponente vem voando na minha direção com um grito alto! Tudo o que vejo é a palma da sua mão quando ela se lança e me acerta em cheio no peito, arrancando o ar dos meus pulmões e me jogando de costas no chão. \n\nFico ali, tentando recuperar o fôlego, me perguntando que tipo de água de nascente da montanha esses monges têm acesso para ficarem tão fortes."
 governor_contract_events_tova.0068.desc_diplomacy: "\"Então tudo começou quando eu era jovem…\" \n\nNão vou longe na minha história antes de perceber que perdi a atenção da maioria das pessoas que me ouviam. A plateia parece pequena. \n\nTentar salvar a situação só piora as coisas, e até um dos monges mais velhos acabou pegando no sono!"
 governor_contract_events_tova.0068.desc_learning: "«… Mas, para entender de verdade como as armas funcionam, primeiro é preciso conhecer a história da ferraria». \n\nAssim começo, mas logo descubro que ninguém parece entender do que estou falando, ou por que isso importa!"
 governor_contract_events_tova.0068.a: "Que decepção…"
