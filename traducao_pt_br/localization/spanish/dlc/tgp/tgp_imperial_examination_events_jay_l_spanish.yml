 tgp_slapback_modifier: "Honra protegida"
 tgp_slapback_modifier_desc: "Este personagem está mais do que disposto a brigar pela honra de sua família."
 tgp_studious_house_modifier: "Casa estudiosa"
 tgp_studious_house_modifier_desc: "Os membros desta Casa são respeitados por sua reputação erudita.\nOs [characters|lE] receberão uma [exam_advantage|lE] grátis ao iniciar o [imperial_examination|lE]."
