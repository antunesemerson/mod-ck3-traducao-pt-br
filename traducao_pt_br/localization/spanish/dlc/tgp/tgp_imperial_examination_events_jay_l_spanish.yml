l_spanish:
 imperial_examination_jay.0010.t: "Mentes similares"
 imperial_examination_jay.0010.desc: "\"Você devia ter visto [friends_child.GetTitledFirstName]!\", ri [friend.GetTitledFirstName] — outr[friend.Custom('ES_OA')] [Select_CString(friend.IsFemale, 'mãe', 'pai' )] que nos últimos dias me fez a companhia mais agradável. \"Meu [friends_child.Custom('GetDaughterSon')] passou dias pedindo um(a) [ROOT.Char.Custom('SmallAnimal')] de estimação. Então, claro, o que eu encontro fazendo barulhinhos debaixo do travesseiro [friends_child.GetHerHis]?\"\n\nIsso nos faz cair na risada. Que pena que logo teremos de nos separar!"
 imperial_examination_jay.0010.a: "Mas nossa amizade continuará!"
 imperial_examination_jay.0010.b: "Devemos apresentar as crianças!"
 imperial_examination_jay.0010.c: "Infelizmente, não estamos aqui por prazer."
 imperial_examination_jay.0040.t: "Raposas no jardim"
 imperial_examination_jay.0040.desc: "Os pardais cantam ao sol e as carpas koi se agitam no lago, até que duas figuras caminham desajeitadamente pelo caminho do jardim, espantando todos os pássaros e peixes. A primeira [parent.GetWomanMan] que reconheço é um[parent.Custom('ES_XA')] dos examinadores. A outra é [parent.GetTitledFirstName], [cheater_child.Custom2('RelationToMe', parent )] de [cheater_child.GetTitledFirstName].\n\n[parent.GetFirstNameNoTooltip] desliza uma bolsinha tilintante nas vestes do examinador [examiner.GetFirstNamePossessive], que em troca revela uma folha de respostas e fala sobre o quão #EMP \"bem estudado\"#! [cheater_child.GetTitledFirstNameNoTooltip] certamente é."
 imperial_examination_jay.0040.a: "Vou me fazer conhecido por esta conspiração."
 imperial_examination_jay.0040.b: "Esta informação pode ser útil."
 imperial_examination_jay.0040.c: "Só quero um pouco de paz."
 imperial_examination_jay.0080.t: "A Queda"
 imperial_examination_jay.0080.desc: "[examiner.Custom('ES_ElLa')|U] examinador[examiner.Custom('ES_XA')] [examiner.GetTitledFirstName|l] deveria saber que não devia correr com tanta carga! Um momento atrás, [examiner.GetSheHe] corria pelos corredores com uma pilha instável de papéis e pincéis, e então, com um guincho agudo, [examiner.GetSheHe] vai ao chão em meio a uma tempestade de detritos eruditos.\n\nUma página caída chama minha atenção: um teste com o nome de [child.Custom2('MyCharacterIntroduction', ROOT.Char)], com erros óbvios até mesmo à primeira vista..."
 imperial_examination_jay.0080.a: "\"Ah, não! Você derramou tinta nesses papéis!\""
 imperial_examination_jay.0080.a.success: "[examiner.GetSheHe|U] assume a culpa"
 imperial_examination_jay.0080.a.failure: "[examiner.GetSheHe|U] viu o que você fez"
 imperial_examination_jay.0080.b: "\"[examiner.GetFirstNameNoTooltip]! Você está bem?!\""
 imperial_examination_jay.0080.c: "\"Ha, ha, ha! Seu idiota desajeitado!\""
 imperial_examination_jay.0110.t: "Um Examinador Adornado de Joias"
 imperial_examination_jay.0110.desc: "O examinador [examiner.GetFirstName] fala comigo enquanto bebe uma taça de [ROOT.Char.Custom('RegionalDrink')]; o aroma persistente de seu perfume domina o da bebida. Uma joia envolve seu pescoço e tilinta toda vez que [examiner.GetSheHe] toma um gole.\n\n\"Esta peça\", [examiner.GetSheHe] sorri, \"foi um #EMP 'presente'#! de um antigo estudante.\""
 imperial_examination_jay.0110.a: "Bem, #EMP eu#! tenho um presente do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))], [child.Custom('ES_ElLa')] [child.GetTitledFirstNameNoTooltip|l]."
 imperial_examination_jay.0110.b: "Este artefato é inútil. Deixe-me #EMP descartá-lo#!."
 imperial_examination_jay.0110.b.tt: "Você se torna o dono de um colar [artifact|El] de [prestige|El]"
 imperial_examination_jay.0110.b.equipped_tt: "Obteve [bribed_necklace.GetName] de [examiner.GetTitledFirstName|l]."
 imperial_examination_jay.0110.c: "Não convivo com [examiner.GetWomenMen|l] desse tipo."
 bribed_necklace_name: "Colar fino"
 bribed_necklace_desc: "Este colar é uma joia simples, porém elegante."
 imperial_examination_jay.0120.t: "O prodígio"
 imperial_examination_jay.0120.desc: "[examiner.Custom('ES_ElLa')|U] [examiner.GetTitledFirstName|l], um[examiner.Custom('ES_XA')] examinador[examiner.Custom('ES_XA')] e meu [ROOT.Char.Custom2('RelationToMe', examiner )], inclina-se profundamente ao se aproximar. \"[child.GetTitledFirstName] é seu [child.Custom('GetDaughterSon')], sim?\"\n\nSua reverência se aprofunda com minha resposta. \"O desempenho de [child.GetFirstNameNoTooltip] me impressionou enormemente até agora. [child.GetSheHe|U] é motivo de honra para a família [ROOT.Char.GetHouse.GetName]. Você claramente treinou [child.GetHerHim] bem!\""
 imperial_examination_jay.0120.a: "Todos conhecem a erudição dos [ROOT.Char.GetHouse.GetNameNoTooltip]!"
 imperial_examination_jay.0120.b: "Por que não ajudar a aprimorar seus talentos?"
 imperial_examination_jay.0120.c: "\"Diga-lhe o quão orgulhoso estou de [ROOT.Char.Custom('ES_OA')] [child.GetSheHe] , examinador\"."
 imperial_examination_jay.0120.d: "Todos conhecerão a destreza [child.Custom('ES_DelDela')] [child.GetTitledFirstName|l]!"
 imperial_examination_jay.0170.t: "Elogio adoçado"
 imperial_examination_jay.0170.desc: "\"A família [ROOT.Char.GetHouse.GetName] é verdadeiramente um lar de crença virtuosa\", diz [examiner.Custom('ES_ElLa')] examinador[examiner.Custom('ES_XA')] [examiner.GetFirstName], aproximando-se de mim de mansinho, com as mãos agitadas e o olhar correndo ao nosso redor. \"Estou certo de que seu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('child'))] passaria no exame com alguma orientação. Eu poderia ser esse[examiner.Custom('ES_EA')] guia, se você fizer algo por mim em troca?\"\n\nApesar da cautela de [examiner.GetFirstNameNoTooltip], os outros pais e anciãos começaram a lançar olhares curiosos em nossa direção."
 imperial_examination_jay.0170.a: "Uma admoestação pública é necessária."
 imperial_examination_jay.0170.b: "[child.GetFirstNameNoTooltip] não precisa de ajuda para passar!"
 imperial_examination_jay.0170.b.tt: "[child.GetShortUIName] ganhará ou perderá mais [prestige|lE] e [merit|lE] dependendo dos resultados do exame."
 imperial_examination_jay.0170.c: "[child.GetFirstNameNoTooltip] se beneficiará; deixem que falem."
 imperial_examination.advantage.child.tt: "[child.GetShortUIName] ganha [exam_advantage|lE]"
 imperial_examination.advantage.no_character.tt: "Ganha [exam_advantage|lE]"
