 situation_parameter_dynastic_cycle_hegemon_legitimacy_from_external_conquest: "Os [duchies|lE] e [kingdoms|lE] conquistados concedem mais [legitimacy|lE] @legitimacy_icon! ao [son_of_heaven|E]"
