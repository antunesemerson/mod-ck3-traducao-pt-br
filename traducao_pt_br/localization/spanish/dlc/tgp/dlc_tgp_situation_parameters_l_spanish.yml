l_spanish:
 dynastic_cycle: "$game_concept_dynastic_cycle$"
 dynastic_cycle_desc: "$game_concept_dynastic_cycle_desc$"
 situation_dynastic_cycle: "O $game_concept_dynastic_cycle$"
 situation_dynastic_cycle_desc: "$game_concept_dynastic_cycle_desc$"
 situation_dynastic_cycle_phase_stability_expansion: "Expansão"
 situation_dynastic_cycle_phase_stability_expansion_icon: "@tgp_dynastic_cycle_expansion_icon! $situation_dynastic_cycle_phase_stability_expansion$"
 situation_dynastic_cycle_phase_stability_expansion_desc_short: "Nesta [dynastic_cycle_era_short|lE], o império se concentra em se fortalecer olhando para fora: pacificar fronteiras, expandir seu alcance por meio da força militar, [tributaries|lE] e a [silk_road|E]."
 situation_dynastic_cycle_phase_stability_expansion_desc: "$situation_dynastic_cycle_phase_stability_expansion_desc_short$\n\n$SITUATION_DYNASTIC_CYCLE_FROM_UNSTABLE_ERA$ Portanto, para reformar a China para esta $game_concept_dynastic_cycle_era_short$ a partir da $game_concept_dynastic_cycle_era_short$ de [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_stability_advancement').GetName|l], primeiro ela deve entrar na $game_concept_dynastic_cycle_era_short$ de [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_instability').GetName|l]."
 situation_dynastic_cycle_phase_stability_advancement: "Avanço"
 situation_dynastic_cycle_phase_stability_advancement_icon: "@tgp_dynastic_cycle_advancement_icon! $situation_dynastic_cycle_phase_stability_advancement$"
 situation_dynastic_cycle_phase_stability_advancement_desc_short: "Nesta [dynastic_cycle_era_short|lE] , o Império foca em melhorar a si mesmo olhando para dentro: por meio das [innovations|lE] , a excelência cultural, a prosperidade do povo e a boa governança [GetReligionByKey('confucianism_religion').GetAdjective] [Concept('meritorious', 'meritoria')|lE]."
 situation_dynastic_cycle_phase_stability_advancement_desc: "$situation_dynastic_cycle_phase_stability_advancement_desc_short$\n\n$SITUATION_DYNASTIC_CYCLE_FROM_UNSTABLE_ERA$ Portanto, para reformar a China para esta $game_concept_dynastic_cycle_era_short$ a partir da [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_stability_expansion').GetName|l], primeiro ela deve entrar na $game_concept_dynastic_cycle_era_short$ de [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_instability').GetName|l]."
 SITUATION_DYNASTIC_CYCLE_FROM_UNSTABLE_ERA: "A China entra nesta $game_concept_dynastic_cycle_era_short$ a partir de qualquer [dynastic_cycle_era_type_unstable|llE] se catalisadores suficientes forem acionados[situation_catalyst_catalysts|lE]."
 situation_dynastic_cycle_phase_instability_conquest: "Conquista"
 situation_dynastic_cycle_phase_instability_conquest_icon: "@tgp_dynastic_cycle_conquest_icon! $situation_dynastic_cycle_phase_instability_conquest$"
 situation_dynastic_cycle_phase_instability_conquest_desc_short: "Uma [dynastic_cycle_era_short|lE] de consolidação depois que uma potência estrangeira conquistou a China."
 situation_dynastic_cycle_phase_instability_conquest_desc: "$situation_dynastic_cycle_phase_instability_conquest_desc_short$\n\nPara entrar nesta $game_concept_dynastic_cycle_era_short$ , a [hegemony|lE] de China deve cair nas mãos de um [ruler|lE] que #bold no#! tenha um [government|lE] [GetGovernment('celestial_government').GetName|lE] ou tenha uma [heritage|lE] [Concept('culture', 'cultural' )|E] que #bold no#! seja $heritage_chinese_name$."
 situation_dynastic_cycle_phase_instability: "Tensão"
 situation_dynastic_cycle_phase_instability_icon: "@tgp_dynastic_cycle_instability_icon! $situation_dynastic_cycle_phase_instability$"
 situation_dynastic_cycle_phase_instability_desc: "$situation_dynastic_cycle_phase_instability_desc_short$ Se evitar a [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_chaos').GetName|l] pode ser que a China chegue ou à $game_concept_dynastic_cycle_era_short$ de [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_stability_advancement').GetName|l] ou à de [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_stability_expansion').GetName|l].\n\nA China entra nesta $game_concept_dynastic_cycle_era_short$ a partir de qualquer [dynastic_cycle_era_type_stable|lE] se forem acionados catalisadores suficientes [situation_catalyst_catalysts|lE]."
 situation_dynastic_cycle_phase_instability_desc_short: "Esta é uma [dynastic_cycle_era_short|lE] de inquietação, mas também de oportunidade. Embora a corrupção, a agitação popular e as invasões sejam uma ameaça, um governo sábio pode reformar a China."
 situation_dynastic_cycle_phase_chaos: "Divisão"
 situation_dynastic_cycle_phase_chaos_icon: "@tgp_dynastic_cycle_chaos_icon! $situation_dynastic_cycle_phase_chaos$"
 situation_dynastic_cycle_phase_chaos_desc_short: "Uma [dynastic_cycle_era_short|lE] de senhores da guerra, onde apenas um [ruler|lE] poderoso pode unir a China."
 situation_dynastic_cycle_phase_chaos_desc: "$situation_dynastic_cycle_phase_chaos_desc_short$\n\nEsta $game_concept_dynastic_cycle_era_short$ começa se:\n$EFFECT_LIST_BULLET$Em alguma [dynastic_cycle_era_type_unstable|lE], catalisadores suficientes de [situation_catalyst_catalysts|lE] forem acionados\n$EFFECT_LIST_BULLET$O [son_of_heaven|E] atual perde o [mandate_of_heaven|E]\n\n#S Quando esta $game_concept_dynastic_cycle_era_short$ começar#!\n$BULLET$#indent_newline:2 A [hegemony|lE] da China é destruída e o anterior [son_of_heaven|E] é [deposed|lE]#!\n$BULLET$#indent_newline:2 Os [titles|lE] de [title_tier|lE] [empire|lE] e [kingdom|lE] da hierarquia [de_jure|lE] também são destruídos se seus [holders|lE] tiverem um [movement_power_short|El] [movement_power_i] inferior a [EmptyScope.ScriptValue('high_movement_power_value')] e [EmptyScope.ScriptValue('medium_movement_power_value')] respectivamente#!\n$BULLET$#indent_newline:2 Os [rulers|lE] independentes jurarão lealdade ou prestarão tributo a seus [elders|lE] ou [movement_leaders|lE]\n$BULLET$Todo [ruler|lE] independente se juntará ao [situation_participant_group|lE] #V $dynastic_cycle_participant_group_other_rulers$#!#!\n$BULLET$O restante de [situation_participant_groups|El] será dissolvido"
 situation_dynastic_cycle_phase_stability: "Estabilidade"
 situation_dynastic_cycle_phase_stability_desc: "#D This Phase should not be shown#!"
 dynastic_cycle_sub_region_core: "China"
 dynastic_cycle_sub_region_core_desc: "Todos os [counties|lE] integrados na hierarquia [de_jure|lE] de [GetTitleByKey('h_china').GetDefinitiveName]"
 dynastic_cycle_sub_region_peripheries: "Periferias da China"
 dynastic_cycle_sub_region_peripheries_desc: "Todos os [counties|lE] que não façam parte do [GetSituation('dynastic_cycle').GetSubRegionByKey( 'core' ).GetName|l], mas ainda estejam em poder do [son_of_heaven|E]"
 custom_dynastic_cycle: "Terra sob o Céu"
 dynastic_cycle_participant_group_hegemon_ruler: "Filho do Céu"
 dynastic_cycle_participant_group_hegemon_ruler_desc: "O [son_of_heaven|E], [holder|lE] de [GetTitleByKey('h_china').GetDefinitiveName]"
 dynastic_cycle_participant_group_other_rulers: "Outros governantes"
 dynastic_cycle_participant_group_other_rulers_desc: "Todos os [rulers|lE] em [GetSituation('dynastic_cycle').GetTopSubRegion.GetName] que não sejam [vassals|lE] de [GetTitleByKey('h_china').GetDefinitiveName]"
 dynastic_cycle_participant_group_advancement_movement: "$game_concept_movement$ de avanço"
 dynastic_cycle_participant_group_advancement_movement_desc: "Todos os [vassals|lE] de [GetTitleByKey('h_china').GetDefinitiveName] que desejam impulsionar o [dynastic_cycle|lE] em direção à [situation_dynastic_cycle_phase|lE] de [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_stability_advancement').GetName|l].\n\nEles se dedicam a enriquecer as províncias centrais da China ao aumentar o [development|lE], concluir [great_projects|lE], descobrir [innovations|lE] e obter [merit|lE] por meio dos [examinations|lE].\n $unlockables_advancement$"
 dynastic_cycle_participant_group_expansion_movement: "$game_concept_movement$ de expansão"
 dynastic_cycle_participant_group_expansion_movement_desc: "Todos os [vassals|lE] de [GetTitleByKey('h_china').GetDefinitiveName] que aspiram a impulsionar o [dynastic_cycle|lE] em direção à [situation_dynastic_cycle_phase|lE] de [GetSituationType('dynastic_cycle').GetPhaseType('situation_dynastic_cycle_phase_stability_expansion').GetName|l].\n\nPara facilitar a conquista de territórios fora da China, eles se concentram em fortalecer os [governors|lE] do tipo [GetSubjectContractType( 'celestial_provinces' ).GetObligationNameShort( 'celestial_province_military' )|l], aumentar a [prowess|lE], educar no [martial_lifestyle|lE] e aprender [commander_traits|lE].\n $unlockables_expansion$"
 dynastic_cycle_participant_group_pro_hegemon_movement: "$game_concept_movement$ pró[SelectLocalization( GetPlayer.IsValid, 'pro_hegemon_movement_in_game_name', 'dinastía' ) ]"
 pro_hegemon_movement_in_game_name: "[GetTitleByKey('h_china').GetBaseNameNoTierNoTooltip]"
 dynastic_cycle_participant_group_pro_hegemon_movement_desc: "Todos os [vassals|lE] de [GetTitleByKey('h_china').GetDefinitiveName] que cumprem rigorosamente a vontade do [son_of_heaven|E].\n\nAlmejam se tornar [governors|lE] e [ministers|lE] influentes que apoiem com fervor o [GetSituation('dynastic_cycle').GetTopParticipantGroupByKey('hegemon_ruler').GetNameNoTooltip|l]. Têm $situation_parameter_pro_hegemon_interaction_boost$."
 dynastic_cycle_participant_group_conservative_movement: "$game_concept_movement$ conservador"
 dynastic_cycle_participant_group_conservative_movement_desc: "Todos os [vassals|lE] de [GetTitleByKey('h_china').GetDefinitiveName] que buscam fortalecer a nobreza.\n\nConcentram-se nas reformas e mudanças que beneficiem as [powerful_families|lE] e [dynasties|lE] reconhecidas, ao mesmo tempo que cultivam a tradição em vez do [merit|lE].\n $unlockables_conservative$"
 unlockables_advancement: "$BULLET_WITH_TAB$ Concede acesso à [interaction|lE] #V $boost_efficiency_interaction$#!\n$BULLET_WITH_TAB$$scholarly_inspiration_frequency_desc$\n$BULLET_WITH_TAB$ Aumento da [aptitude|lE] do [court_position|lE] [GetCourtPositionType('court_poet_court_position').GetName]\n$BULLET_WITH_TAB$ Concede acesso à [decision|lE] [GetDecisionWithKey('tgp_japan_become_a_poet_decision').GetName]\n$BULLET_WITH_TAB$ Concede acesso à [decision|lE] [GetDecisionWithKey('diligent_development_focus_decision').GetName]"
 unlockables_expansion: "$BULLET_WITH_TAB$ Torna-se acessível a [interaction|lE] #V $damage_efficiency_interaction$#!\n$BULLET_WITH_TAB$ Torna-se acessível a [interaction|lE] #V $fp3_request_turkic_invasion_interaction$#!\n$BULLET_WITH_TAB$ Torna-se acessível a [interaction|lE] #V $spar_with_knight_interaction$#!"
 unlockables_conservative: "$BULLET_WITH_TAB$ Ganha acesso à [interaction|lE] #V $damage_efficiency_interaction$#!\n$BULLET_WITH_TAB$ Pode pedir para mudar a [law|lE] [GetLawGroup('candidate_score_laws').GetName] por meio da [decision|lE] [GetDecisionWithKey('movement_petition_decision').GetName]\n$BULLET_WITH_TAB$ Pode construir a [domicile_building_upgrade|lE] [GetDomicileBuilding('east_asian_estate_reception_hall_01').GetName]"
 dynastic_cycle_participant_group_undecided_movement: "Não alinhado"
 dynastic_cycle_participant_group_undecided_movement_desc: "Todos os [vassals|lE] de [GetTitleByKey('h_china').GetDefinitiveName] que ainda não tomaram nenhuma posição em relação ao estado do [dynastic_cycle|lE] atual.\n\nEles podem ser persuadidos a se juntar a qualquer [movement|lE]."
