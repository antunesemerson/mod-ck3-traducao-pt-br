 tgp_japan_emperor_war_decision: "Iniciar a Guerra da Restauração"
 tgp_japan_emperor_war_decision_desc: "O império me pertence por direito, e em breve será meu não só no nome. Pela força, se preciso for. Não verei mais em silêncio como [ROOT.Char.GetTopLiege.GetShortUIName] arruina minhas terras."
 tgp_japan_emperor_war_decision_tooltip: "Seu [faction|lE] começará uma [war|lE] para colocá-lo no trono de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetName]."
