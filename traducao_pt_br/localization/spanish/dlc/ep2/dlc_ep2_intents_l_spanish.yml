l_spanish:
 #Intents
 reduce_stress_intent: "Recreação"
 reduce_stress_intent_desc: "Você deseja focar em reduzir o estresse, procurando oportunidades que aliviem o [stress|lE]."
 murder_attendee_intent: "Assassinato"
 murder_attendee_intent_desc: "Você está focado em tirar a vida do seu alvo. Isso frequentemente resulta em ocasiões de assassinato e opções especiais."
 woo_attendee_intent: "Sedução"
 woo_attendee_intent_desc: "Você tem apenas uma coisa em mente: seduzir seu alvo. Isso frequentemente leva a eventos especiais e opções para realizar esse desejo."
 impose_obedience_intent: "Impor Obediência"
 impose_obedience_intent_desc: "Uma demonstração de força é a única coisa em sua mente. Isso frequentemente leva a oportunidades de conquistar a [obedience|El] de seu alvo."
 befriend_attendee_intent: "Amizade"
 befriend_attendee_intent_desc: "Você está determinado a conquistar a simpatia do seu alvo. Isso frequentemente leva a eventos amigáveis e opções."
 lechery_intent: "Lascívia"
 lechery_intent_desc: "Você pretende abraçar seus desejos carnais e buscar encontros sexuais com uma plêiade de parceiros. Isso costuma resultar em redução de [stress|lE] nos personagens de traço [GetTrait('lustful').GetName( GetNullCharacter )|l]."
 legitimacy_intent: "Promover Legitimidade"
 legitimacy_intent_desc: "Pretendes usar este encontro como um meio para promover sua [legitimacy|lE]."
 altruism_intent_header: "Altruísmo:"
 altruism_intent: "Altruísmo"
 altruism_intent_desc: "Você busca melhorar a vida dos outros procurando oportunidades para realizar ações altruístas. Isso muitas vezes leva a um aumento da [county_opinion|lE] e [piety|lE]. Personagens com os traços [GetTrait('zealous').GetName( GetNullCharacter )|l], [GetTrait('generous').GetName( GetNullCharacter )|l] e [GetTrait('improvident').GetName( GetNullCharacter )|l] podem perder [stress|lE]."
 justice_intent: "Justiça"
 justice_intent_desc: "Você busca distribuir justiça até mesmo aos menores criminosos do seu domínio. Isso muitas vezes leva a um aumento de [control|lE], e personagens com o traço [GetTrait('just').GetName( GetNullCharacter )|l] podem perder [stress|lE]."
 recruit_knights_intent: "Recrutar"
 recruit_knights_intent_desc: "Você busca melhorar sua corte com [knights|lE] novos e poderosos. Isso muitas vezes leva a oportunidades de recrutamento."
 #TOOLTIPS
 intent_obedience_success_tt: "[THIS.Char.GetIntentTarget.GetShortUIName] tornou-se [obedient|El] a você, completando sua [intent|El]"
 intent_obedience_fail_tt: "Você falhou em tornar [THIS.Char.GetIntentTarget.GetShortUIName] [obedient|El], alvo do seu [intent|El]"
 intent_murder_success_tt: "Você matou [THIS.Char.GetIntentTarget.GetShortUIName], alvo do seu [intent|lE] de Assassinato"
 intent_murder_dead_tt: "[THIS.Char.GetIntentTarget.GetShortUIName], alvo do seu [intent|lE] de Assassinato, morreu"
 intent_murder_fail_tt: "Você falhou em matar [THIS.Char.GetIntentTarget.GetShortUIName], alvo do seu [intent|lE] de Assassinato"
 intent_woo_success_tt: "Você seduziu [THIS.Char.GetIntentTarget.GetShortUIName], alvo do seu [intent|lE] de Sedução"
 intent_woo_potential_tt: "Você despertou o interesse de [THIS.Char.GetIntentTarget.GetShortUIName], alvo do seu [intent|lE] de Sedução"
 intent_woo_fail_tt: "Você falhou em seduzir [THIS.Char.GetIntentTarget.GetShortUIName], alvo do seu [intent|lE] de Sedução"
 intent_befriend_success_tt: "Você estabeleceu um vínculo com [THIS.Char.GetIntentTarget.GetShortUIName], alvo do seu [intent|lE] de Amizade"
 intent_befriend_potential_tt: "Você passou um tempo com [THIS.Char.GetIntentTarget.GetShortUIName], alvo do seu [intent|lE] de Amizade"
 intent_befriend_fail_tt: "Você falhou em estabelecer um vínculo com [THIS.Char.GetIntentTarget.GetShortUIName], alvo do seu [intent|lE] de Amizade"
 activity_intent_complete_toast: "Intenção alcançada"
