l_spanish:
 #What You Don't See...
 tour_grounds_events.7000.t: "O Que Você Não Vê..."
 tour_grounds_events.7000.desc: "[stop_host_scope.Custom('ES_ElLa')|U] [stop_host_scope.GetTitledFirstName] havia sido até agora um[stop_host_scope.Custom('ES_XA')] anfitri[stop_host_scope.Custom('ES_OnOna')] extremamente gentil que me havia mostrado suas terras e posses com orgulho, então fico imediatamente surpreso quando começa a gaguejar e claramente tenta desviar minha atenção de uma porta aparentemente sem importância pela qual estamos passando.\n\n\"Estais me #EMP ocultando#! algo, [stop_host_scope.GetFirstNameNoTooltip]?\".\n\nAproveito seu momento de silêncio e aturdimento — envergonhado? — #EMP culpable#!? para empurrar a porta e me surpreendo com o que encontro:"
 tour_grounds_events.7000.desc_artifacts: "tesouros, joias e até [this_artifact.GetName] de [stop_host_scope.GetFirstNameNoTooltip]!"
 tour_grounds_events.7000.desc_pantry: "uma despensa escondida, empilhada até o teto com especiarias estrangeiras, carne temperada, mel e barris de sal!"
 tour_grounds_events.7000.desc_cellar: "uma adega completa, empilhada até o teto com vinhos caros e licores de terras distantes!"
 tour_grounds_events.7000.desc_gold: "várias pilhas de ouro e baús transbordando de moedas!"
 tour_grounds_events.7000.desc_falcons: "um viveiro com uma grande quantidade de falcões orgulhosos em abrigos bem cuidados!"
 tour_grounds_events.7000.desc_dogs: "a porta leva a um pátio cheio de cães saudáveis e com aparência forte que não vejo há um tempo!"
 tour_grounds_events.7000.desc_horses: "a porta leva a um pátio cheio de cavalos saudáveis e com aparência forte que não vejo há um tempo!"
 tour_grounds_events.7000.desc_fallback: "um depósito de comida, peças de ouro e bens em geral!"
 tour_grounds_events.7000.a: "É justo compartilhar isto com seu[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip]!"
 tour_grounds_events.7000.a.tt: "Esconderijo secreto taxado"
 tour_grounds_events.7000.b: "Guardas! Tome #EMP tudo#!."
 tour_grounds_events.7000.b.tt: "Esconderijo secreto confiscado"
 tour_grounds_events.7000.b.tt.2: "Seu suserano leva o melhor do seu esconderijo!"
 tour_grounds_events.7000.c: "Outr[stop_host_scope.Custom('ES_OA')] entendid[stop_host_scope.Custom('ES_OA')]!"
 tour_grounds_events.7000.c.tt: "Esconderijo secreto apreciado"
 tour_grounds_events.7000.c.tt.2: "Você se aproxima do seu suserano compartilhando seus interesses!"
 tour_grounds_events.7000.d: "Vou fingir que não vi isso."
 tour_grounds_events.7000.d.tt: "Esconderijo secreto ignorado"
 tour_grounds_events.7001.desc: "Creio que até agora tenho sido um[ROOT.Char.Custom('ES_XA')] anfitri[ROOT.Char.Custom('ES_OnOna')] extremamente gentil com meu senhor[visiting_liege.Custom('ES_XA')] visitante, [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitledFirstName].\n\nA visita à minha [ROOT.Char.Custom('ResidenceBuilding')|l], em particular, estava indo muito bem… até que tomo a direção errada e deixo meu ansios[visiting_liege.Custom('ES_OA')] [visiting_liege.GetLadyLord] bem na frente da única porta da qual eu tentava afastar[visiting_liege.GetHerHim]:"
 tour_grounds_events.7001.desc_artifacts: "o cômodo secreto onde guardo os tesouros de minha família!"
 tour_grounds_events.7001.desc_pantry: "a despensa escondida onde guardo minhas especiarias estrangeiras, carne temperada, mel e barris de sal!"
 tour_grounds_events.7001.desc_cellar: "a adega escondida onde guardo meus vinhos caros e licores de terras distantes!"
 tour_grounds_events.7001.desc_gold: "o tesouro escondido onde guardo minhas pilhas de ouro e baús transbordando de moedas!"
 tour_grounds_events.7001.desc_falcons: "o viveiro escondido onde mantenho meus falcões mais preciosos!"
 tour_grounds_events.7001.desc_dogs: "o pátio secreto onde crio meus cães mais preciosos!"
 tour_grounds_events.7001.desc_horses: "o pátio secreto onde crio meus cavalos mais preciosos!"
 tour_grounds_events.7001.desc_fallback: "meu esconderijo secreto de comida, peças de ouro e bens geralmente caros!"
 tour_grounds_events.7001.desc_conclusion: "\n\nQuando começo a gaguejar, [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitledFirstNameNoTooltip] fica cada vez mais curios[visiting_liege.Custom('ES_OA')]."
 tour_grounds_events.7001.a: "Meu [visiting_liege.GetLadyLord]! Vamos por #EMP aquí#!!"
 tour_grounds_events.7001.a.success: "Você redireciona seu suserano para outro lugar"
 tour_grounds_events.7001.a.success.tt: "Suas riquezas estão seguras"
 tour_grounds_events.7001.a.failure: "Seu suserano invade o cômodo"
 tour_grounds_events.7001.a.failure.tt: "Seu esconderijo secreto é descoberto"
 tour_grounds_events.7001.b: "E não seria possível persuadi-lo a olhar para o outro lado…?"
 tour_grounds_events.7001.b.success: "Seu suserano aceita o suborno"
 tour_grounds_events.7001.b.success.tt: "Suborno aceito"
 tour_grounds_events.7001.b.tt.2: "Seu anfitri[ROOT.Char.Custom('ES_OnOna')] [ROOT.Char.GetTitledFirstNameNoTooltip] lhe pagou para que você não olhe para um certo cômodo."
 tour_grounds_events.7001.b.tt: "Subornado para desviar o olhar"
 tour_grounds_events.7001.c: "Eu estava PRESTES a te levar até lá!"
 tour_grounds_events.7001_followup: "Seu suserano decidirá o que fazer com suas posses ocultas — você pode acabar pagando impostos extras!"
