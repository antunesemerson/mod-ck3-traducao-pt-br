l_spanish:
 #Tour General Events
 ##Bilateral Vassal Events
 #Vassal: Your liege just suggested to purge all local cats/dogs
 tour_general.1003.t: "$activity_tour$: Uma Proposta Bestial"
 tour_general.1003.desc_purge_cats: "Percorrendo as terras, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('visiting_liege'))], [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitledFirstName|l], acabou de declarar seu ódio ardente por gatos e similares."
 tour_general.1003.desc_purge_dogs: "Ao percorrer as terras, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('visiting_liege'))], [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitledFirstName|l], acabou de declarar sua ardente aversão a vira-latas e cães de baixa estirpe."
 tour_general.1003.desc_pet_cat_outro: "Quando voltamos aos meus aposentos, meu [ROOT.Char.Custom('CatStoryName')] se aproxima de mim com um ronronar generoso, como costuma fazer quando volto para casa.\n\nEnquanto acaricio suavemente suas orelhas e bigodes macios, sinto o olhar [visiting_liege.Custom('ES_DelDela')] [visiting_liege.GetTitledFirstNameNoTooltip|l] queimar nas minhas costas. De repente, percebo o que significaria erradicar #EMP todos#! todos os gatos, e o vazio se me abre no estômago.\n\n\"Eu #EMP conformaría#! me contentaria com aquele espécime horrível ali\", diz [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitleAsNameNoTooltip], com um tom doentio e adocicado."
 tour_general.1003.desc_pet_dog_outro: "Ao voltarmos para minha morada, meu [ROOT.Char.Custom('DogStoryName')] corre até mim com olhos gentis e me saúda com um esbarrão cerimonial de focinho.\n\nO olhar penetrante [visiting_liege.Custom('ES_DelDela')] [visiting_liege.GetTitledFirstNameNoTooltip|l] vai do cachorro para mim enquanto faço carinho em [ROOT.Char.Custom('DogStoryName')] atrás das orelhas. Eu fico paralisad[ROOT.Char.Custom('ES_OA')] ao perceber o que significaria se livrar de #EMP todos#! cães.\n\n“Eu #EMP conformaría#! com aquele espécime horrível ali”, diz [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitleAsNameNoTooltip], com um tom doentia e excessivamente doce."
 tour_general.1003.desc_default_outro: "\n\nDe volta aos meus aposentos, tomamos algo e reflito sobre a situação. Posso sentir [visiting_liege.Custom('ES_AlAla')] [visiting_liege.GetTitledFirstNameNoTooltip|l] me encarando fixamente, esperando minha resposta sobre a questão do genocídio da besta."
 tour_general.1003.a_cat: "Oh, [ROOT.Char.Custom('CatStoryName')]..."
 tour_general.1003.a_dog: "Você foi um/uma [ROOT.Char.Custom('DogStoryGirlBoy')] bom/boa, [ROOT.Char.Custom('DogStoryName')]…"
 tour_general.1003.a_cat.flavor: "O sacrifício de [ROOT.Char.Custom('CatStoryName')] salvará o resto dos gatos."
 tour_general.1003.a_dog.flavor: "O sacrifício de [ROOT.Char.Custom('DogStoryName')] salvará o resto dos cães."
 tour_general.1003.b: "Vamos purgar os [visiting_liege.Custom('HateCatsDogs')] vadios."
 tour_general.1003.c: "Eu não quero ter qualquer participação nisso."
 ##Vassal Events
 #Find secret/hook on your liege/key member of liege's court
 tour_general.2000.t: "$activity_tour$: Revelando Segredos"
 tour_general.2000.desc_intro: "A fogueira crepita e estala enquanto nossa celebração em honra de [visiting_liege.Custom('ES_DelDela')] [visiting_liege.GetTitledFirstName|l] continua até altas horas da madrugada. Fico por aí, puxando conversa e compartilhando bebidas com as pessoas de seu séquito.\n\nEm um canto mais afastado da área da fogueira, noto [2000_secret_holder.GetTitledFirstName|l], [visiting_liege.Custom2('RelationToMeShort', SCOPE.sC('2000_secret_holder'))] [visiting_liege.Custom('ES_DelDela')] [visiting_liege.GetTitledFirstNameNoTooltip|l], claramente embriagad[2000_secret_holder.Custom('ES_OA')] e agarrad[2000_secret_holder.Custom('ES_OA')] a outra bebida.\n\nÀ medida que me aproximo, [2000_secret_holder.GetHerHim] oiço murmurar:"
 tour_general.2000.desc_liege: "\"Ah, [visiting_liege.GetTitledFirstNameNoTooltip|l], não sei por que você tem tanto apreço por…\""
 tour_general.2000.desc_self: "\"[2000_secret_holder.GetFirstNameNoTooltip], se recomponha! Pare de suspirar por...\""
 tour_general.2000.desc_outro: "[2000_secret_holder.GetSheHe] para rapidamente quando percebe minha presença."
 tour_general.2000.a: "Oh, eu também tenho meus próprios problemas, sabe..."
 tour_general.2000.a_liege: "Oh, #EMP eu#! não contaria a ninguém..."
 tour_general.2000.a_spill_beans.t: "Segredo Descoberto"
 tour_general.2000.a_spill_beans.desc: "Consegui arrancar o segredo de [2000_secret_holder.GetShortUIName]"
 tour_general.2000.a_liege_beans.tt: "Você descobre um segredo sobre [visiting_liege.GetShortUIName]"
 tour_general.2000.a_self_beans.tt: "Você descobre um segredo sobre [2000_secret_holder.GetShortUIName]"
 tour_general.2000.a_unsuccessful.t: "Ofensa Suspeita"
 tour_general.2000.a_unsuccessful.desc: "[2000_secret_holder.GetShortUIName] fica desconfiado(a) de você"
 tour_general.2000.b: "Vou me afastar agora."
 #Help liege entourage member, gain scheme progress
 tour_general.2001.t: "$activity_tour$: Uma Situação Inconveniente"
 tour_general.2001.desc_hashish: "Encontro-me com [2001_precarious_entourage_character.Custom('ES_ElLa')] [2001_precarious_entourage_character.GetTitledFirstName|l] enquanto inspecionava as carruagens do séquito do meu suserano. Ele [2001_precarious_entourage_character.GetHerHim] parece especialmente exigente[2001_precarious_entourage_character.Custom('ES_OA')]; os olhos vão de um lado a outro, enquanto continua mexendo em algo na bolsa.\n\nInclino-me e noto o vermelho em seus olhos quando ele olha para mim e sorri sem jeito: «[ROOT.Char.GetTitledFirstNameNoTooltip|l], peço desculpas pelo meu estado lamentável. Parece que perdi certa… medicina. O senhor não saberia de algo sobre #EMP las hierbas#!?»."
 tour_general.2001.desc_privy: "No meu caminho por [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] para me reunir com noss[visiting_liege.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('visiting_liege'))], [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitledFirstName|l], que está de visita, de repente ouço um grito abafado. Paro, escuto e então começo a me dirigir na direção dos gritos.\n\nEles me levam até uma privada em um dos becos estreitos, onde distinguo uma voz pedindo ajuda: “Meu nome é [2001_precarious_entourage_character.GetTitledFirstName|l] e parece que estou… preso[2001_precarious_entourage_character.Custom('ES_OA')]”, confessa a voz."
 tour_general.2001.desc_outro: "\n\n\"Se fosse tão gentil de me ajudar, eu poderia compartilhar informações valiosas sobre a nossa corte…\", implora."
 tour_general.2001.a: "Espere aí, vou te tirar daí."
 tour_general.2001.a_hashish: "Deixe-me ver o que posso fazer."
 tour_general.4004.a_discreet.t: "Êxito no Privado"
 tour_general.4004.a_discreet.desc: "Você ajuda [2001_precarious_entourage_character.GetShortUIName] a sair do privado com elegância"
 tour_general.4004.a_stained.t: "Manchado"
 tour_general.4004.a_stained.desc: "Seu vestido favorito fica sujo na tentativa"
 tour_general.2001.a_success.t: "Aumento de Êxito no Esquema"
 tour_general.2001.a_success.desc: "[2001_precarious_entourage_character.GetShortUIName] compartilha informações interessantes sobre [2001_scheme_target.GetShortUIName]"
 tour_general.2001.a_secrecy.t: "Aumento de Sigilo no Esquema"
 tour_general.2001.a_secrecy.desc: "[2001_precarious_entourage_character.GetShortUIName] compartilha informações sobre rotas secretas"
 tour_general.2001.b: "Algum haxixe cairia bem agora."
 tour_general.2001.b_super_success.t: "Aumento Significativo de Êxito no Esquema"
 tour_general.2001.b_super_success.desc: "[2001_precarious_entourage_character.GetShortUIName] compartilha informações muito valiosas sobre [2001_scheme_target.GetShortUIName]"
 tour_general.2001.b_super_secrecy.t: "Aumento Significativo de Sigilo no Esquema"
 tour_general.2001.b_super_secrecy.desc: "[2001_precarious_entourage_character.GetShortUIName] compartilha informações sobre túneis secretos"
 tour_general.2001.b_spaceout.t: "Distantes"
 tour_general.2001.b_spaceout.desc: "Você e [2001_precarious_entourage_character.GetShortUIName] ficam completamente distantes"
 tour_general.2001.c: "Eu... não. Isso não é digno."
 ##Bilateral Liege Events
 #Liege: You are a fanatical cat/dog person
 tour_general.3003.t_cat: "[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]: É um Mundo Felino"
 tour_general.3003.t_dog: "[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]: É um Mundo Canino"
 tour_general.3003.desc_love_cats: "Enquanto perambulo pelas ruas de [ROOT.Char.GetCurrentLocation.GetName], com [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitledFirstName|l] ao meu lado, sou abordado por um vira-lata de rua. Ao olhar mais adiante pela rua, há uma ninhada inteira de canídeos raivosos correndo soltos e causando alvoroço.\n\nFaço uma careta de nojo. Essas #EMP criaturas#!. Carecem da graça natural de um felino, farejando o próprio traseiro e o dos outros, lambendo… #EMP Puag#!… São claramente seres inferiores. E, neste lugar, são sem dúvida um incômodo.\n\nNão, este lugar ficaria melhor sem essa praga."
 tour_general.3003.desc_love_dogs: "Enquanto explorava as ruas de [ROOT.Char.GetCurrentLocation.GetName], com [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitledFirstName|l], list[stop_host_scope.Custom('ES_OA')] ao meu lado, de repente, algo cai na minha cabeça. #EMP Algo puntiagudo.#!\n\nImediatamente agarro o que acaba por ser um gato muito furioso e vil que sibila enquanto arranha meu rosto. Instintivamente dou alguns passos para trás e solto a fera de maneira nada delicada.\n\nEssas criaturas enganosas, pouco confiáveis..., malignas. Ergo os olhos e vejo uma matilha inteira reunida no fim da rua, todas me olhando com olhos malignos. Isso não vai dar certo."
 tour_general.3003.a: "Precisamos purgar esta cidade desses vilões [ROOT.Char.Custom('HateCatsDogs')]."
 tour_general.3003.a_host_decides.tt: "[stop_host_scope.GetShortUIName] decide o que acontece em seguida"
 tour_general.3003.a_potential_outcome_agree: "[stop_host_scope.GetShortUIName] ajuda você a matar os [ROOT.Char.Custom('HateCatsDogs')]"
 tour_general.3003.a_potential_outcome_offer_up_pet: "[stop_host_scope.GetShortUIName] oferece o seu próprio [ROOT.Char.Custom('HateCatDog')]"
 tour_general.3003.a_potential_outcome_disagree: "[stop_host_scope.GetShortUIName] #EMP não#! irá ajudar você a matar os [ROOT.Char.Custom('HateCatsDogs')]"
 tour_general.3003.b: "Pensando melhor, vamos fazer algo diferente."
 tour_general.3003.b_cynical: "Nah, isso ia causar muita bagunça."
 tour_general.3003.fanatic_subjects_approve.tt: "Seus súditos amantes de [visiting_liege.Custom('GetCatDog')] aprovam essa ação"
 tour_general.3003.compassionate_subjects_disapprove.tt: "Seus súditos compassivos desaprovam essa ação"
 #Liege: Did you vassal decide to help you kill cats/dogs?
 tour_general.3004.t: "[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]: Um Mal Necessário"
 tour_general.3004.desc_intro_sacrifice: "O feito está consumado; a besta que habitava as moradas [stop_host_scope.Custom('ES_DelDela')] [stop_host_scope.GetTitledFirstName|l] e agora é exibida como advertência no cadafalso de [stop_host_scope.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 tour_general.3004.desc_intro: "Agora a ação foi concluída; os cadáveres dos animais foram empilhados perto das forcas de [stop_host_scope.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] e pequenas fogueiras estão queimando para se livrar das criaturas repugnantes de uma vez por todas."
 tour_general.3004.desc_vassal_sacrifice: "\n\nAgradeço que [stop_host_scope.GetSheHe] tenha caído em si e tenha se livrado da criatura imunda. Eu provavelmente deveria ir me lavar; quem sabe que doenças ela poderia estar carregando."
 tour_general.3004.desc_vassal_help: "\n\nAgradeço que [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitledFirstName|l] tenha vindo rapidamente em meu auxílio e começado a encurralar os miseráveis animais. Agora posso dormir tranquil[GetPlayer.Custom('ES_OA')] , sabendo que o reino está um pouco mais seguro."
 tour_general.3004.desc_no_help: "\n\nNão é que [stop_host_scope.Custom('ES_ElLa')] covarde [stop_host_scope.GetTitledFirstName|l] ajudara. Resmungo ao pensar na desobediência do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('stop_host_scope'))]. Ao menos agora sei com o que estou lidando em relação a [stop_host_scope.GetSheHe]."
 tour_general.3004.desc_outro: "\n\nQuando caminho em direção ao banho designado em meus aposentos, vejo um [ROOT.Char.Custom('GetCatDog')] de rua olhando curiosamente para o cadafalso. Sorrio para o [ROOT.Char.Custom('GetFelineCanine')] e aceno com a cabeça: “Está tudo bem agora, precioso.”"
 tour_general.3004.a: "Está feito."
 ##Liege Events
 #Parade your entourage prisoners down the holding main street
 tour_general.4000.t: "[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]: O Desfile Miserável"
 tour_general.4000.desc: "A rua principal de [ROOT.Char.GetCurrentLocation.GetName] está lotada de pessoas [stop_host_scope.GetCulture.GetNameNoTooltip], ansiosas para vislumbrar seu [ROOT.Char.GetTitleAsNameNoTooltip].\n\nSabendo o propósito da minha [ROOT.Char.GetInvolvedActivity.GetNameNoTooltip], lanço um olhar aos prisioneiros do meu séquito, enfileirados e acorrentados em uma comitiva que começa bem atrás de mim. Esses moradores precisam me respeitar e saber o que acontece com quem sai da linha.\n\nMeu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('parade_master'))], [parade_master.Custom('ES_ElLa')] [parade_master.GetTitledFirstName|l], me olha com expectativa, espada em mãos, à espera do sinal para começar a desfilar os prisioneiros pela rua."
 tour_general.4000.a: "Desfile-os pela rua!"
 tour_general.4000.a_parade.t: "Desfile Miserável"
 tour_general.4000.a_parade.desc: "Você desfila os prisioneiros pela rua"
 tour_general.4000.a_egged.t: "Alvejado"
 tour_general.4000.a_egged.desc: "Você é alvejado com ovos"
 tour_general.4000.b: "#EMP Arraste#!-os pela rua."
 tour_general.4000.b.flavor: "Essa escória vil!"
 tour_general.4000.c: "Talvez possamos fazer algo diferente..."
 #Search a room and find vassal secrets
 tour_general.4001.t: "[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]: Segredos Guardados"
 tour_general.4001.desc: "Ao visitar meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('stop_host_scope'))], [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitledFirstName|l], em sua posse em [ROOT.Char.GetCurrentLocation.GetName], parece que consegui perder meu grupo de viagem, me deixando sozinho nos aposentos de est[stop_host_scope.Custom('ES_EA')].\n\nIsso talvez seja a oportunidade perfeita para #EMP conocer[stop_host_scope.GetHerHim]#! um pouco melhor. Talvez eu deva olhar ao redor e ver se consigo encontrar algum... item incomum de interesse ou algo que [stop_host_scope.GetSheHe] não queira que eu encontre?"
 tour_general.4001.a: "Certamente, os aposentos devem ser suspeitos."
 tour_general.4001.a.tt: "Você vasculha os aposentos"
 tour_general.4001.b: "Uma câmara do conselho, adequada para negociações obscuras."
 tour_general.4001.b.tt: "Você vasculha a câmara do conselho"
 tour_general.4001.c: "Seu local de culto pode guardar indecências."
 tour_general.4001.c.tt: "Você busca no [stop_host_scope.GetFaith.HouseOfWorship]"
 tour_general.4001.d: "Quem sabe quais itens desviantes uma cozinha pode esconder."
 tour_general.4001.d.tt: "Você busca na cozinha"
 tour_general.4001.e: "Tenho coisas melhores para fazer."
 tour_general.4001.outcome_a_desc: "Você encontra algo suspeito"
 tour_general.4001.outcome_a: "Você descobre um segredo sobre [stop_host_scope.GetShortUIName]"
 tour_general.4001.outcome_b_desc: "Você não encontra nada"
 tour_general.4001.outcome_c_desc: "Você é pego em flagrante"
 #You find a secret!
 tour_general.4002.t: "[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]: Segredo Revelado"
 tour_general.4002.desc_bedchamber: "O quarto de [stop_host_scope.GetTitledFirstName|l] está surpreendentemente limpo e arrumado. Até demais. Olho ao redor do aposento por um instante, tentando ver se há algo fora do lugar.\n\n"
 tour_general.4002.desc_council_chamber: "Entro sorrateiramente na câmara do conselho de [stop_host_scope.GetTitledFirstName|l], com olhos e ouvidos atentos a qualquer som ou movimento que indique que fui pego. A sala parece uma sala de conselho bastante simples, enquanto vou vasculhando, examinando as prateleiras e levantando documentos espalhados por aí.\n\n"
 tour_general.4002.desc_shrine: "O [stop_host_scope.GetFaith.HouseOfWorship] está estranhamente silencioso enquanto eu percorro os corredores em busca de qualquer informação. As câmaras parecem bastante mundanas e comuns, enquanto dou outra volta, sempre atento aos sons de companhia.\n\n"
 tour_general.4002.desc_kitchen: "Ao me aproximar da cozinha, certifico-me de que o local está vazio antes de entrar. Olho rapidamente ao redor, me orientando. A adega parece ser um lugar promissor para abrigar segredos, talvez.\n\n"
 tour_general.4002.desc_deviant: "De repente, percebo uma rachadura na parede e puxo cuidadosamente o que se revela ser várias ilustrações de... #EMP meu Deus#!... desviantes se envolvendo em um tipo específico de devassidão.\n\nHá também alguns objetos anexados, que prefiro não tocar."
 tour_general.4002.desc_homosexual: "Aproximo-me mais da cama, passo a mão sob a borda do colchão estofado e encontro… correspondência [stop_host_scope.Custom('ES_DelDela')] [stop_host_scope.GetTitledFirstNameNoTooltip|l]. Nas cartas, parece professar amor por outr[stop_host_scope.Custom('ES_OA')] [stop_host_scope.GetWomanMan]?!\n\nCaramba, quem diria."
 tour_general.4002.desc_murder_attempt: "Concentro minha atenção na penteadeira e observo o espelho precioso preso na madeira impecável. Me inclino para olhar atrás dele e encontro um saco de... algo.\n\nAbro o saco e descubro informações detalhadas sobre uma tentativa de assassinato recente! Rapidamente, coloco o saco de volta."
 tour_general.4002.desc_cannibal: "Empurro a porta com um rangido baixo e olho para o quarto fracamente iluminado. Ao entrar, noto... um crânio humano? Apoiado no balcão da parede oposta? Aquilo é... Súbito, sinto náuseas com o cheiro intrusivo e percebo uma mão.\n\nA mão está separada do corpo. #EMP Carne humana#!?"
 tour_general.4002.desc_lover: "Tropeço um pouco, passo a mão pela parede e me agarro a uma lâmpada para não cair. Para minha surpresa, ela se move para baixo suavemente, revelando uma abertura na parede.\n\nO vão está cheio até a borda de… cartas de amor [stop_host_scope.Custom('ES_DelDela')] [stop_host_scope.GetTitledFirstName|l]? Para um #EMP amante secreto#!?"
 tour_general.4002.desc_murder: "Meus olhos percorrem o peitoril da janela quando noto uma parte da parede, levemente fora do lugar. Aproximo-me e tiro o que parece ser uma adaga ensanguentada, junto com correspondência [stop_host_scope.Custom('ES_DelDela')] [stop_host_scope.GetTitledFirstNameNoTooltip|l] a possíveis agentes em um plano de #EMP asesinato!#!\n\nApresso-me a colocar os itens de volta no esconderijo."
 tour_general.4002.desc_non_believer: "Dou uma olhada no santuário no fundo da sala. A cortina sob a mesa mostra algo saindo por baixo… Puxo e descubro… um conjunto de rabiscos que detalham o ceticismo de [stop_host_scope.GetTitledFirstName|l] em relação a [stop_host_scope.GetFaith.HighGodName].\n\nDou alguns passos para trás. [stop_host_scope.GetTitledFirstNameNoTooltip], #EMP [Select_CString( stop_host_scope.IsFemale, 'una atea', 'un ateo' )]#!?"
 tour_general.4002.desc_incest: "Avanço lentamente em direção à porta da adega, que está ligeiramente entreaberta, e me inclino para vislumbrar o que há lá dentro. Meus olhos se arregalam e salto alguns passos para trás, tentando manter o silêncio e assimilar o que acabei de ver.\n\n¿[stop_host_scope.GetTitledFirstNameNoTooltip]? Ingressando em relações carnais com… com… #EMP un pariente cercano#!?"
 tour_general.4002.desc_witch: "Um dos estandartes que pendem da parede parece um pouco torto… Eu o toco e ele solta um pequeno, mas adornado, grimório negro que cai no chão com um baque surdo.\n\n[stop_host_scope.Custom('MagicPracticeTerm')|U]?"
 tour_general.4002.desc_embezzler: "Quando passo a mão pela lateral de uma mesa, percebo algo no fundo do balcão. Puxo aquilo e ele se solta… documentos de impostos?\n\nNão, estes documentos detalham o desvio de ouro dos cofres de #EMP otra persona#! para os [stop_host_scope.Custom('ES_DelDela')] [stop_host_scope.GetTitledFirstName|l]. Desfalque!"
 tour_general.4002.a: "Isso servirá..."
 tour_general.4002.a_deviant: "Um colega desafiador das normas!"
 tour_general.4002.a_homosexual_female: "Uma colega das damas!"
 tour_general.4002.a_homosexual_male: "Um colega dos cavalheiros!"
 tour_general.4002.a_homosexual: "Um colega alegre!"
 tour_general.4002.a_cannibal: "Outr[stop_host_scope.Custom('ES_OA')] gourmet!"
 tour_general.4002.a_non_believer: "Outro[stop_host_scope.Custom('ES_OA')] buscador[stop_host_scope.Custom('ES_XA')] da verdade!"
 tour_general.4002.a_incest: "Um colega amante sem limites!"
 tour_general.4002.a_witch: "Outra[stop_host_scope.Custom('ES_OA')] [stop_host_scope.Custom('SisterBrother')]!"
 #You find ... bupkis
 tour_general.4003.t: "[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]: Nada para Ver Aqui"
 tour_general.4003.desc_faux_bedchamber: "Cuando me asomaba dentro de la alcoba, se me acerca un[servant_gender.Custom('ES_OA')] de [servant_gender.GetHerHim]s sirvient[servant_gender.Custom('ES_EA')]s que generalmente se encargan de limpiar las habitaciones. Me hace un gesto llamativo para que me acerque.\n\n«¿Sabe mi [ROOT.Char.GetLadyLord] el secreto para doblar las sábanas #EMP a la perfección#!?» dice, y me mira expectante.\n\nSuspiro en silencio mientras me excuso y salgo de la habitación."
 tour_general.4003.desc_faux_council_chamber: "A câmara do conselho carece de quase tudo. Sobretudo de qualquer informação ou segredo remotamente interessante para eu descobrir.\n\nQuando me viro para ir embora, sou surpreendido por uma voz às minhas costas. \"Deixem-me contar a meu [ROOT.Char.GetLadyLord], o segredo para manter uma mesa livre de poeira…\"\n\nFinjo não ouvir enquanto saio apressadamente da câmara."
 tour_general.4003.desc_faux_shrine: "Percorro os salões do da [stop_host_scope.GetFaith.HouseOfWorship], procurando atentamente algo suspeito, mas não encontro absolutamente nada.\n\nEnquanto vasculho o local, dou de cara com um servo que insiste em querer me contar os segredos de... polir estanho.\n\nRecuso educadamente."
 tour_general.4003.desc_faux_kitchen: "A cozinha está bagunçada, como se a equipe estivesse ali trabalhando na próxima refeição. Faço um desvio em direção à adega, espiando para dentro.\n\nVejo um[servant_gender.Custom('ES_XA')] serviçal lá dentro, ocupad[servant_gender.Custom('ES_OA')] empilhando [stop_host_scope.Custom('get_region_root_vegetable_plural')]. Ele me lança um olhar curioso e então abre a boca:\n\n\"Alguém já lhe contou o segredo de como preparar [stop_host_scope.Custom('get_region_root_vegetable_plural')], meu [ROOT.Char.GetLadyLord]?\".\n\nLanço um olhar cético ao serviçal, me viro e saio da cozinha."
 tour_general.4003.a: "Que decepção."
 #You got caught!
 tour_general.4004.t: "[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]: Pego(a)!"
 tour_general.4004.desc_bedchamber_caught: "Acabei de entrar na alcova e começo a olhar ao redor quando uma porta do lado oposto da sala se abre de repente, revelando [stop_host_scope.Custom('ES_AlAla')] [stop_host_scope.GetTitledFirstName|l] em pessoa. Ele olha para mim, com os olhos ligeiramente arregalados de surpresa.\n\nEntão ele estreita os olhos. Sinto uma leve onda de pânico enquanto tento manter a calma."
 tour_general.4004.desc_council_chamber_caught: "Mal entro na câmara do conselho, ouço o som de passos que se aproximam rapidamente. Um suor frio me toma ao tentar às pressas chegar ao outro lado da sala para me esconder, mas fracasso miseravelmente.\n\nO olhar [stop_host_scope.Custom('ES_DelDela')] [stop_host_scope.GetTitledFirstName|l] recai sobre mim enquanto grita: «Aí estás, meu [ROOT.Char.GetTitleAsNameNoTooltip]!». Ele estreita os olhos enquanto me observa, a mim e ao meu esforço para manter a neutralidade."
 tour_general.4004.desc_shrine_caught: "Entro na [stop_host_scope.GetFaith.HouseOfWorship], caminhando um pouco pelos corredores e, quando viro uma esquina, quase #EMP choco#!, literalmente, com [stop_host_scope.Custom('ES_ElLa')] lñi[stop_host_scope.GetTitledFirstName|l]. Meu coração quase para.\n\n[stop_host_scope.Custom('ES_ElLa')|U] [stop_host_scope.GetTitledFirstNameNoTooltip|l] se vira, surpreso de ter sido abordad[stop_host_scope.Custom('ES_OA')] assim. Quando percebe quem quase esbarrou com [stop_host_scope.GetSheHe], estreita os olhos. \"Estava procurando por você, meu [ROOT.Char.GetTitleAsNameNoTooltip]\"."
 tour_general.4004.desc_kitchen_caught: "A cozinha está pouco iluminada e sombria, enquanto percorro com cuidado o cômodo de tamanho razoável. Inclino-me para olhar alguns rabiscos de receitas, quando ouço um rangido atrás de mim — e imediatamente me viro, apenas para ver [stop_host_scope.Custom('ES_AlAla')] [stop_host_scope.GetTitledFirstName|l] saindo da adega.\n\nOlha para mim, claramente tão surpres[stop_host_scope.Custom('ES_OA')] quanto eu. Então, seus olhos se estreitam: \"[ROOT.Char.Custom('FormOfAddressForLiege')|U]…?\"."
 tour_general.4004.desc_outro: "\n\n \"O que você está aprontando...?”, pergunta [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitledFirstNameNoTooltip|l] em tom inquisitivo."
 tour_general.4004.a: "Eh. Uh. Eu estava procurando por você!"
 tour_general.4004.a_diplomacy: "Ah. #EMP Aí#! você está."
 tour_general.4004.a_diplomacy_convinced.t: "Demonstração Convincente"
 tour_general.4004.a_diplomacy_convinced.desc: "Você conseguiu convencer [stop_host_scope.GetShortUIName]"
 tour_general.4004.a_diplomacy_nonconvinced.t: "Não Convencido"
 tour_general.4004.a_diplomacy_nonconvinced.desc: "Você não consegue convencer [stop_host_scope.GetShortUIName]"
 tour_general.4004.a_diplomacy_snooping.t: "Liege Espionando"
 tour_general.4004.a_diplomacy_snooping.desc: "Você pegou seu suserano bisbilhotando suas terras"
 tour_general.4004.b: "Eu estava esperando por #EMP você#!..."
 #Come across a drunk vassal servant, gain scheme buff/s
 tour_general.4006.t: "[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]: Trama Embriagada"
 tour_general.4006.desc: "Depois de um dia por [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] em que [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitledFirstName|l] não me deu trégua, decidi que mereço uma noite sem [stop_host_scope.GetSheHe]. Então meu séquito relaxa em uma taverna local.\n\nEnquanto observo um grupo de bêbados, um rosto corado se destaca entre os demais. Pertence a um dos servos [stop_host_scope.Custom('ES_DelDela')] [stop_host_scope.GetTitledFirstNameNoTooltip].\n\nMe inclino mais para perto enquanto o bêbado divaga: \"Ah, eu poderia contar algumas coisas sobre [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitleTierName|l]! Muito mais que algumas…\"."
 tour_general.4006.a: "Continue falando..."
 tour_general.4006.a_success.t: "Sucesso na Trama Aumentado"
 tour_general.4006.a_success.desc: "[servant_character.GetShortUIName] compartilha informações interessantes sobre [4006_scheme_target.GetShortUIName]"
 tour_general.4006.a_secrecy.t: "Sigilo da Trama Aumentado"
 tour_general.4006.a_secrecy.desc: "[servant_character.GetShortUIName] compartilha informações sobre rotas secretas"
 tour_general.4006.b: "Que alguém lhe traga mais bebida."
 tour_general.4006.b_super_success.t: "Sucesso na Trama Vastamente Aumentado"
 tour_general.4006.b_super_success.desc: "[servant_character.GetShortUIName] compartilha informações muito valiosas sobre [4006_scheme_target.GetShortUIName]"
 tour_general.4006.b_super_secrecy.t: "Sigilo da Trama Vastamente Aumentado"
 tour_general.4006.b_super_secrecy.desc: "[servant_character.GetShortUIName] compartilha informações sobre túneis secretos"
 tour_general.4006.b_passout.t: "Desmaio"
 tour_general.4006.b_passout.desc: "[servant_character.GetShortUIName] bebe demais e desmaia"
 tour_general.4006.b_passout_tt: "Você não obtém nenhuma informação"
 ##Gain a hook on one of the vassal's close characters
 tour_general.4007.t: "[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]: Atividade Suspeita"
 tour_general.4007.desc: "Acabei de sair[ROOT.Char.Custom('ES_OA')] da taverna recomendada por [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitledFirstName|l], me encontro em um beco escuro. Das sombras, surge um som estranho.\n\nAo me aproximar dele, curioso[ROOT.Char.Custom('ES_OA')] por sua origem, vislumbro... ¿[4007_secret_holder.GetTitledFirstName]? O que está fazendo aqui, em um beco imundo, a esta hora?\n\nTento em vão enxergar melhor o que ele está fazendo sem revelar minha presença, mas uma coisa é certa: o que quer que esteja fazendo [4007_secret_holder.Custom('ES_ElLa')] [4007_secret_holder.GetTitledFirstNameNoTooltip|l] não é nada bom."
 tour_general.4007.a: "Se eu pudesse me aproximar um pouco mais..."
 tour_general.4007.a_secret.t: "Segredo Descoberto"
 tour_general.4007.a_secret.desc: "Você se aproxima um pouco mais e descobre o que [4007_secret_holder.GetShortUIName] está fazendo"
 tour_general.4007.a_secret.tt: "Você descobre um segredo sobre [4007_secret_holder.GetShortUIName]"
 tour_general.4007.a_detected.t: "Descoberto"
 tour_general.4007.a_detected.desc: "[4007_secret_holder.GetShortUIName] te pegou espionando[4007_secret_holder.GetHerHim]"
 tour_general.4007.b: "Melhor não."
