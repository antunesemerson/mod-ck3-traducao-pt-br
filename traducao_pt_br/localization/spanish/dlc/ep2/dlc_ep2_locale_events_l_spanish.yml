 #MODIFIERS
 tournament_wicked_hangover_modifier: "Ressaca Perversa"
 tournament_wicked_hangover_modifier_desc: "Este personagem exagerou na bebida na véspera de competir em um torneio."
 tournament_tailor_fancy_crest_modifier: "Brasão Exquisito"
 tournament_tailor_fancy_crest_modifier_desc: "Este personagem possui um brasão de família requintado e nunca é visto(a) sem ele."
 tournament_tailor_mixup_scheme_modifier: "Identificação Errônea"
 tournament_tailor_mixup_scheme_modifier_desc: "Este personagem possui o brasão de outra casa, o que lhe dá uma grande oportunidade de enganar os outros."
 tournament_armorer_shield_modifier: "Escudo Fino"
 tournament_armorer_shield_modifier_desc: "Este personagem recebeu de presente um escudo de exibição de alta qualidade, comprado em uma armaria de torneio."
 tournament_armorer_tournament_modifier: "Elmo de Torneio"
 tournament_armorer_tournament_modifier_desc: "Este personagem recebeu de presente um elmo de torneio de alta qualidade, comprado em uma armaria de torneio."
 tournament_tailor_banner_modifier: "Bandeira Fina"
 tournament_tailor_banner_modifier_desc: "Este personagem recebeu de presente uma bela bandeira, comprada em uma alfaiataria de torneio."
 tournament_tailor_gambeson_modifier: "Gambesão Fino"
 tournament_tailor_gambeson_modifier_desc: "Este personagem recebeu de presente um gambesão resistente, comprado em uma alfaiataria de torneio."
 tournament_tailor_glove_modifier: "Luvas Finas"
 tournament_tailor_glove_modifier_desc: "Este personagem recebeu de presente um par de luvas delicadas, compradas em uma alfaiataria de torneio."
 tournament_weaponsmith_ornament_modifier: "Lâmina Ornamental"
 tournament_weaponsmith_ornament_modifier_desc: "Este personagem recebeu de presente uma arma ornamental de alta qualidade, comprada em uma ferraria de torneio."
 tournament_bowyer_quiver_modifier: "Aljava Fina"
 tournament_bowyer_quiver_modifier_desc: "Este personagem recebeu de presente uma aljava de alta qualidade, comprada em uma arquearia de torneio."
 tournament_bowyer_hunt_modifier: "Setas de Caça Finas"
 tournament_bowyer_hunt_modifier_desc: "Este personagem recebeu de presente algumas flechas de caça de alta qualidade, compradas em uma arquearia de torneio."
 tournament_kept_the_peace_modifier: "Manteve a Paz"
 tournament_kept_the_peace_modifier_desc: "A língua afiada deste personagem acalmou uma confrontação de alto risco."
 tournament_man_of_the_people_modifier: "Amigo do Povo"
 tournament_man_of_the_people_modifier_desc: "Este personagem está feliz em confraternizar com os plebeus em seu nível."
 tournament_snob_modifier: "Esnobe"
 tournament_snob_modifier_desc: "Este personagem se recusa a passar tempo com aqueles considerados abaixo de sua posição."
 tournament_dice_player_modifier: "Jogador de Dados"
 tournament_dice_player_modifier_desc: "Este personagem participou de um jogo de dados com altas apostas em uma taverna."
 tournament_lecherous_knight_modifier: "Guerreiros Libertinos"
 tournament_lecherous_knight_modifier_desc: "Este personagem encontrou seus cavaleiros envolvidos em atividades amorosas com profissionais discretos e decidiu participar."
 tournament_lecherous_knight_positive_modifier: "Guerreiros Libertinos"
 tournament_lecherous_knight_positive_modifier_desc: "Este personagem encontrou seus cavaleiros envolvidos em atividades amorosas com profissionais discretos e decidiu participar, com a aprovação de seus [ROOT.Char.GetFaith.PriestNeuterPlural]."
 tournament_locale_tourney_grounds: "Terrenos do Torneio"
