l_spanish:
 #TAVERN
 ep2_locale_events.1000.t: "$tournament_locale_tavern$: Mais uma rodada"
 ep2_locale_events.1000.independent: "Um grande rugido de risadas irrompe na mesa [drinking_leader.Custom('ES_DelDela')] [drinking_leader.GetTitledFirstName|l], situada em um canto da taverna."
 ep2_locale_events.1000.liege: "Um grande rugido de risadas ecoa do canto onde se senta [drinking_leader.Custom('ES_ElLa')] [drinking_leader.GetTitledFirstName|l], [drinking_leader.GetLiege.Custom2('RelationToMeShort', drinking_leader)] [drinking_leader.GetLiege.Custom('ES_DelDela')] [drinking_leader.GetLiege.GetTitledFirstName|l]."
 ep2_locale_events.1000.alcohol: "\n\nAo redor de [drinking_leader.GetSheHe] há um grupo de amigos e novos conhecidos, outros participantes na próxima competição de [activity.GetCurrentPhase.GetPhase.GetName|l] todos se servindo de copos de [host.Custom('RegionalAlcoholicDrink')] enquanto trocam histórias.\n\nAo passar, você não consegue evitar pensar em incentivar esta pequena sessão…"
 ep2_locale_events.1000.a: "Taberneiro, mais uma aqui!"
 ep2_locale_events.1000.b: "A conta da mesa é por minha conta!"
 ep2_locale_events.1000.c: "Acho que esse bando já teve o suficiente."
 ep2_locale_events.1000.d: "Aproveite sua noite, [drinking_leader.GetFirstNameNoTooltip]!"
 drinks_round_tt: "Cada bebedor"
 ep2_locale_events.1000.hangover_tt: "Nunca mais..."
 ep2_locale_events.1002.t: "$tournament_locale_tavern$: Desafie para Beber?"
 ep2_locale_events.1002.desc: "A taverna local está abarrotada de gente, como é de se esperar quando um torneio chega à cidade. Entre todos os recém-chegados, no entanto, está sentado um[local_drunk.Custom('ES_XA')] [local_drunk.GetWomanMan] que claramente é um[local_drunk.Custom('ES_XA')] frequentador[local_drunk.Custom('ES_OA')] do estabelecimento. Ele me olha com desconfiança quando me sento.\n\n\"O que #EMP você#! está fazendo aqui?\", ele finalmente dispara quando minha bebida chega. Eu me viro para [local_drunk.GetHerHim] e ele se põe de pé, cambaleando.\n\n\"Perdoe minha presunção, #EMP meu [ROOT.Char.GetLadyLord]#!\", uma reverência elegante e cheia de desprezo enfatiza a afirmação, \"mas acho que você não daria conta nem da metade disso, quanto mais de tudo!\""
 ep2_locale_events.1002.a: "Vamos lá, não há necessidade de hostilidade. Posso te pagar uma bebida?"
 ep2_locale_events.1002.b: "Ah, é? #EMP Traga os canecos!#!"
 ep2_locale_events.1002.b.success: "Você vence [local_drunk.GetFirstNameNoTooltip] na competição de bebida"
 ep2_locale_events.1002.b.failure: "Você acorda algumas horas depois, atordoado[ROOT.Char.Custom('ES_OA')] e com uma dor de cabeça aguda"
 ep2_locale_events.1002.c: "Sente-se e cale-se, seu bêbado irrecuperável.[local_drunk.Custom('ES_OA')] incurável."
 ep2_locale_events.1010.t: "$tournament_locale_tavern$: Que tal um jogo?"
 ep2_locale_events.1010.desc: "A penumbra da taverna é compensada pelo estalar do fogo e pela algazarra contínua dos festeiros. Eu me esgueiro por dois bêbados especialmente barulhentos e me sento em uma mesa próxima, vazia, exceto por uma figura.\n\n\"Uma boa noite, não é?\", [gambler.GetFirstName] aponta para a multidão esfarrapada. Assinto educadamente com a cabeça. Mal termino de voltar a cabeça à posição quando [gambler.GetFirstNameNoTooltip] desliza um conjunto de dados e copos sobre a mesa.\n\n\"Que tal um joguinho simples? Até um tolo conseguiria jogá-lo! Nós dois rolamos os dados sob os copos, e você adivinha se sua jogada é maior ou menor que a minha.\" Sorri, com um brilho de jogador[gambler.Custom('ES_XA')] nos olhos. \"Melhor de três\"."
 #ep2_locale_events.1010.a: "But how can I trust your dice?"
 #ep2_locale_events.1010.a.tt: "Let's use my set. My very fair and non-weighted set."
 ep2_locale_events.1010.b: "Passe esses dados aqui!"
 ep2_locale_events.1010.c: "Não sou jogador."
 ep2_locale_events.1011.t: "$tournament_locale_tavern$: Primeiro Lance"
 ep2_locale_events.1011.opening: "Os dados sacodem e pulam dentro dos copos antes de ambos os colocarmos violentamente na mesa. Eu levanto a lateral do copo mais próxima de mim, cobrindo cuidadosamente o conteúdo.\n\n#BOL [ROOT.Var('root_dice_1').GetValue|0]#!. Eu observo [gambler.GetFirstName] atentamente, procurando por pistas."
 ep2_locale_events.1011.tell.good: "\n\nÉ uma leve curvatura para cima no lábio de [gambler.GetFirstNameNoTooltip] o que vejo? Ela some quase tão rápido quanto apareceu, mas a menor oscilação pode trair as verdades mais profundas…"
 ep2_locale_events.1011.tell.bad: "\n\nHá um brilho descendente nos olhos de [gambler.GetFirstNameNoTooltip], uma, duas vezes. Ele se vai quase tão rápido quanto apareceu, mas a menor hesitação pode trair as verdades mais profundas…"
 ep2_locale_events.1011.average: "\n\nAs mãos de [gambler.GetFirstNameNoTooltip] tremem levemente e eu abro a boca triunfante, mas seus olhos têm algo de brilho neles. O tremor foi uma pista? Foram os olhos? Alguma coisa disso é útil?"
 ep2_locale_events.1011.deceitful: "\n\nOs olhos de [gambler.GetFirstNameNoTooltip] se cravaram nos meus, sem um pingo de emoção no rosto. Eu desvio o olhar e observo sua linguagem corporal, mas é como se fosse uma estátua."
 ep2_locale_events.1011.a: "Meu lançamento é... maior!"
 ep2_locale_events.1011.b: "Meus dados são menores."
 ep2_locale_events.1012.t: "$tournament_locale_tavern$: Segunda Rodada"
 ep2_locale_events.1012.opening.win: "Revelamos nossos dados. Levamos um instante para perceber que eu havia vencido!\n\n\"Ah! Muito bem adivinhado! A primeira rodada é sua!\" Os lábios de [gambler.GetFirstName] sorriem, mas não chega aos olhos. \"Próxima rodada!\" Os dados voltam a tilintar nos copos."
 ep2_locale_events.1012.opening.lose: "Revelamos nossos dados. Leva um instante para ambos percebermos que eu perdi. [gambler.GetFirstName] sorri orgulhosamente.\n\n\"Infelizmente! Parece que você errou. Próxima rodada!\" Os dados chacoalham nos copos mais uma vez."
 ep2_locale_events.1012.opening.draw: "Revelamos nossos dados. Quando os copos desaparecem, levamos um momento para calcular que os números eram iguais.\n\n\"Bom, então. Vamos chamar isso de empate\". A decepção de [gambler.GetFirstName] é evidente. \"Próxima rodada!\" Os dados voltam a sacudir nos copos."
 ep2_locale_events.1012.dice_reveal: "\n\nEu levanto a lateral do meu copo mais próxima de mim. As pequenas marcações nos dados revelam o número: #BOL [ROOT.Var('root_dice_2').GetValue|0]#!. Eu coloco o copo de volta na mesa e olho para cima."
 ep2_locale_events.1012.tell.good: "\n\n[gambler.GetFirstName] dá batidinhas com os dedos na mesa. Essa inclinação da cabeça para o teto é uma pista sutil? Certamente parece estar sentado mais erguid[gambler.Custom('ES_OA')] que antes…"
 ep2_locale_events.1012.tell.bad: "\n\nUm ligeiro estreitamento dos olhos, uma pequena mudança de peso. [gambler.GetFirstName] está escondendo algo. Talvez esse lançamento não seja muito alto..."
 ep2_locale_events.1012.average: "\n\nOs olhos de [gambler.GetFirstName] percorrem a sala, olhando para qualquer lugar menos para mim. Seu braço treme um pouco ao erguer o copo. Não sei se isso é pertinente ou não…"
 ep2_locale_events.1012.deceitful: "\n\nA postura de [gambler.GetFirstName] é confiante, quase arrogante, mas nem sequer ergueu o copo! Seus olhos se desviam para baixo enquanto ele inclina o copo bruscamente, antes de colocá-lo novamente alinhado com a mesa. Sua postura não muda em nada."
 ep2_locale_events.1012.a: "Acredito que seja maior."
 ep2_locale_events.1012.b: "Com certeza é menor."
 ep2_locale_events.1013.t: "$tournament_locale_tavern$: Decisão"
 ep2_locale_events.1013.opening: "Revelamos nossos dados simultaneamente, mas imediatamente fica claro que será necessário uma terceira rodada. Pegamos nossos copos e nossos dados para a rodada final, em que o vencedor leva tudo."
 ep2_locale_events.1013.dice_reveal: "\n\nEu levanto a lateral do meu copo mais próxima de mim. As pequenas marcações nos dados revelam o número: #BOL [ROOT.Var('root_dice_3').GetValue|0]#!. Eu coloco o copo de volta na mesa e olho para cima."
 ep2_locale_events.1013.tell.good: "\n\nSe passaram três rodadas, e as pistas de [gambler.GetFirstName] começam a ficar praticamente óbvias. Seu nariz se alarga imperceptivelmente quando a jogada é alta, estou segur[ROOT.Char.Custom('ES_OA')] disso. Mas será que isso é só blefe?"
 ep2_locale_events.1013.tell.bad: "\n\n[gambler.GetFirstName] passa a mão pela cabeça distraíd[gambler.Custom('ES_OA')]? Desesperad[gambler.Custom('ES_OA')]? Isso é uma jogada especialmente baixa? Ele/ela me vê e faz algo parecido com uma cara corajosa. #EMP Poderia#! ser uma farsa dupla..."
 ep2_locale_events.1013.average: "\n\n[gambler.GetFirstNameNoTooltip] tenta olhar diretamente para mim, mas seu olhar vacila. Um lábio trêmulo denuncia #EMP algo#!, mas o que poderia será"
 ep2_locale_events.1013.deceitful: "\n\nA impassibilidade de [gambler.GetFirstName] ao longo deste duelo de astúcia tem sido realmente assombrosa, e aqui não é diferente. A completa falta de emoção em seu rosto é quase chocante. Terá de se reduzir ao puro acaso."
 ep2_locale_events.1013.a: "Eu acredito nos meus dados. Maior!"
 ep2_locale_events.1013.b: "Meu lançamento é menor."
 ep2_locale_events.1014.t: "$tournament_locale_tavern$: Bem Apostado"
 ep2_locale_events.1014.opening: "Os copos são levantados pela última vez. A pequena multidão que se reuniu ao nosso redor se inclina para ver que...\n\n"
 ep2_locale_events.1014.win: "Eu venci! [gambler.GetFirstName] assume a expressão mais corajosa que consegue, mas sua irritação é evidente. Ele empurra as bolsas que havíamos apostado para o meu lado da mesa e se afasta resmungando[gambler.Custom('ES_OA')] , o limite exato da cortesia.\n\nMe inclino na cadeira, tão alegre quanto mentalmente exausto."
 ep2_locale_events.1014.lose: "Perdi! [gambler.GetFirstName] se vangloria, encantad[gambler.Custom('ES_OA')] enquanto pega as bolsas que apostamos.\n\n\"Mais sorte da próxima vez!\", ele/ela gargalha, fugindo com os braços cheios de dinheiro.\n\nRecosto-me na cadeira, desinflad[ROOT.Char.Custom('ES_OA')]."
 ep2_locale_events.1014.draw: "Nós... empatamos? [gambler.GetFirstName] esfrega a cabeça com pesar, enquanto recuperamos as pequenas bolsas de ouro que tínhamos empilhado na mesa para o vencedor.\n\n“Bem, às vezes os dados agem de maneiras misteriosas”, diz [gambler.GetFirstNameNoTooltip], dando de ombros. “Bem jogado, no entanto.” Se levanta e se afasta."
 ep2_locale_events.1014.a: "Taberneiro! As bebidas são por minha conta!"
 ep2_locale_events.1014.b: "Ah, o sabor da vitória!"
 ep2_locale_events.1014.c: "Uma bebida para afogar minhas mágoas, acho."
 ep2_locale_events.1014.d: "Caramba!"
 ep2_locale_events.1014.e: "Bem, é isso então, suponho."
 ep2_locale_events.1014.f: "Depois disso, eu poderia beber algo!"
 ep2_locale_events.1050.t: "$tournament_locale_tavern$: Um [ROOT.Char.GetWomanMan] de Apostas?"
 ep2_locale_events.1050.desc: "Mal entro na taverna, sou abordado por uma figura. [wealthy_gambler.GetFirstName] me dá um tapa no ombro e me leva para um canto reservado, baixando a voz para um tom conspiratório.\n\n\"Você vai participar dos hastilúdios, não é?\" Continua sem nem notar minha confirmação. \"Bem, tenho uma aposta um tanto inusitada. Um dos meus... sócios de negócios acha que você é uma espécie de #EMP covarde#!, por assim dizer.\" [wealthy_gambler.GetFirstName] ignora meus protestos imediatos.\n\n\"Claro que defendi sua honra, [ROOT.Char.Custom('FormOfAddressForLiege')]! Eu disse que você seria corajoso o bastante para ir sem elmo no torneio! Claro, se você pudesse #EMP garantir#! esta ocorrência então, bem, eu imagino que poderia me esforçar para fazer com que valesse a pena...\""
 ep2_locale_events.1050.a: "Não suponho que aqueles ali sejam seus colegas jogadores?"
 ep2_locale_events.1050.a.tt: "Talvez eles gostariam de saber sobre esse pequeno arranjo. A menos, é claro, que a moeda seja boa o suficiente para calar uma língua..."
 ep2_locale_events.1050.b: "#EMP Covarde?!#! Eu vou competir sem malditas #EMP manoplas!#!"
 ep2_locale_events.1050.c: "Eu poderia usar a moeda..."
 ep2_locale_events.1050.d: "Que proposição vergonhosa!"
 #TEMPLE
 ep2_locale_events.1500.t: "$tournament_locale_religious_building$: Favores do [ROOT.Char.GetFaith.HighGodNamePossessive]"
 ep2_locale_events.1500.host_faith: "Conforme [tournament_priest.GetFirstName] se afasta para me deixar se aproximar, eu aproveito um momento solene, sozinho no [ROOT.Char.GetFaith.HouseOfWorship] próximo às instalações do torneio."
 ep2_locale_events.1500.other_faith: "Eu aproveito um momento para mim mesmo no pequeno santuário temporário [ROOT.Char.GetFaith.GetAdjectiveNoTooltip] próximo à [activity.GetCurrentPhase.GetCurrentLocation.GetFaith.HouseOfWorship] de [activity.GetCurrentPhase.GetLocation.GetNameNoTooltip], [tournament_priest.GetFirstName] mantendo uma distância respeitosa."
 ep2_locale_events.1500.desc: "\n\nRefletindo na presença do [ROOT.Char.GetFaith.PantheonTerm], me pego pensando no que eu desejo, no fundo do meu coração, ver surgir desses dias de festividade."
 ep2_locale_events.1500.a: "Traga-me glória, [ROOT.Char.GetFaith.WarGodName|U]."
 ep2_locale_events.1500.b: "Que piore a vida do meu [ROOT.Char.Custom2('RelationToMeShort', bad_prayer_target)] , [bad_prayer_target.GetFirstNameNoTooltip]."
 ep2_locale_events.1500.c: "Sorria para o meu [ROOT.Char.Custom2('RelationToMeShort', good_prayer_target)], [good_prayer_target.GetFirstNameNoTooltip]."
 ep2_locale_events.1500.d: "Punição para o meu [ROOT.Char.Custom2('RelationToMeShort', backup_prayer_target)], [backup_prayer_target.GetFirstNameNoTooltip]!"
 ep2_locale_events.1500.e: "Guiar a mão do meu [ROOT.Char.Custom2('RelationToMeShort', backup_prayer_target)][backup_prayer_target.GetFirstNameNoTooltip]."
 ep2_locale_events.1500.f: "Vitória para [wager_prayer_target.GetFirstNameNoTooltip] e para minha bolsa!"
 ep2_locale_events.1500.g: "Deixe-me encontrar a paz interior."
 ep2_locale_events.1501.t: "$tournament_locale_religious_building$: Adoração Performática"
 ep2_locale_events.1501.desc: "Em busca de algum tipo de orientação, encontro-me vagando pela [ROOT.Char.GetFaith.HouseOfWorship] para me concentrar. Por pura sorte, encontro algo muito mais interessante para me concentrar: [seduce_target.GetFirstName] está parado junto à porta, um tanto melancólic[seduce_target.Custom('ES_OA')].\n\nMe lança um meio sorriso, com a atenção claramente em outra coisa. Agora é a oportunidade perfeita para conquistá[gambler.GetHerHim] com uma demonstração de súplica religiosa!\n\nOu... talvez não? O que prefere? Talvez seja do tipo discreto?"
 ep2_locale_events.1501.a: "Vou provar minha devoção sem deixar dúvidas!"
 ep2_locale_events.1501.a.tt: "Meu fervor religioso não conhece limites, querid[seduce_target.Custom('ES_OA')] [seduce_target.GetFirstNameNoTooltip]!"
 ep2_locale_events.1501.a.success: "Sua performance toca uma corda"
 ep2_locale_events.1501.a.failure: "[seduce_target.GetFirstNameNoTooltip|U] fica desanimada com a sua demonstração"
 ep2_locale_events.1501.b: "Acho que [seduce_target.GetFirstNameNoTooltip] é um pouco mais relaxad[seduce_target.Custom('ES_OA')]."
 ep2_locale_events.1501.b.tt: "Um sutil revirar de olhos e um sorriso cúmplice enquanto eu realizo meus rituais devem transmitir a mensagem para [seduce_target.GetFirstNameNoTooltip] de forma bastante clara."
 ep2_locale_events.1501.b.success: "[seduce_target.GetFirstName|U] se deleita com seu cinismo"
 ep2_locale_events.1501.b.failure: "[seduce_target.GetFirstNameNoTooltip|U] fica horrorizado(a) com a sua apostasia"
 ep2_locale_events.1501.c: "Talvez eu deva apenas sair."
 ep2_locale_events.1510.t: "$tournament_locale_religious_building$: Orgia Sacrílega"
 ep2_locale_events.1510.desc: "À medida que o silêncio cai sobre os fiéis reunidos para a cerimônia diária, a calma é repentinamente interrompida por uma abordagem rápida de gritos e alvoroço.\n\nA porta se abre violentamente, e uma dúzia de festeiros rindo caem dentro do [ROOT.Char.GetFaith.HouseOfWorship],"
 ep2_locale_events.1510.alcohol: "canecas e barris nas mãos."
 ep2_locale_events.1510.hashish: "fedendo a haxixe."
 ep2_locale_events.1510.closing: "\n\n[instigator_scope.GetTitledFirstName], que claramente foi o instigador, sorri estupidamente, \"O que é tudo isso?! Onde está a música?\".\n\n[tournament_priest.GetFirstName] observa tudo, congelad[tournament_priest.Custom('ES_OA')] de incredulidade e horror."
 ep2_locale_events.1510.a: "Isso é sacrilégio! Guardas, prendam-nos!"
 ep2_locale_events.1510.b: "Festa? Alguém disse festa?"
 ep2_locale_events.1510.c: "Removam esse [instigator_scope.GetFaith.GetAdjectiveNoTooltip] [instigator_scope.Custom('GetUnbelieverName')] imundo!"
 ep2_locale_events.1510.d: "Saiam, seus foliões adoráveis."
 #ARMORER
 ep2_locale_events.2001.t: "$tournament_locale_armorer$: Fama ou Efetividade?"
 ep2_locale_events.2001.desc: "Eu coloco minha [improve_armour.GetName] sobre o balcão e [tournament_armorer.GetFirstName] passa a mão por cima.\n\n\"Está em mau estado. Faz tempo que você não manda dar uma olhada na sua armadura, não é?\". Ele suspira e olha para os projetos inacabados que o aguardam.\n\n\"Não tenho muito tempo. Talvez o suficiente para poli-la, ou talvez passar óleo nela para uma pequena manutenção. O que quer que eu faça?\""
 ep2_locale_events.2001.a: "Deixe-a brilhando como um espelho!"
 ep2_locale_events.2001.a.tt: "[improve_armour.GetName] recebe um modificador [prestige|El]"
 ep2_locale_events.2001.b: "Prefiro que ela seja lubrificada e mantida."
 ep2_locale_events.2001.b.tt: "[improve_armour.GetName] recebe um modificador [prowess|El]"
 ep2_locale_events.2001.c: "Ela está em bom estado como está."
 ep2_locale_events.2002.t: "$tournament_locale_armorer$: Alças Rasgadas"
 ep2_locale_events.2002.desc: "[tournament_armorer.GetFirstName] apresenta alegremente minha [armour.GetName]. Reluz quando a ergo até a luz.\n\nSó quando entrego as moedas [tournament_armorer.Custom('ES_AlAla')] satisfeit[tournament_armorer.Custom('ES_OA')] artesã[tournament_armorer.Custom('ES_OA')], percebo que há um[apprentice.Custom('ES_XA')] jovem aprendiz ao seu lado. Ela se aproxima da mesa enquanto sua mestr[tournament_armorer.Custom('ES_OA')] conta as moedas.\n\n\"Perdoe-me, meu [ROOT.Char.GetLadyLord], mas...\". Ela indica as tiras de couro da armadura. \"Minha mestr[tournament_armorer.Custom('ES_OA')] não pagou a um curtidor para tratar o couro\".\n\nOlho mais de perto. Não há como se enganar. O couro está esgarçado e gasto. Claramente não é novo. Ao fundo, a bolsa [tournament_armorer.Custom('ES_DelDela')] armadur[tournament_armorer.Custom('ES_OA')] tilinta quando ele deposita o ouro nela."
 ep2_locale_events.2002.a: "Não sou um(a) [ROOT.Char.GetWomanMan] para enganar, [tournament_armorer.GetFirstNameNoTooltip]."
 ep2_locale_events.2002.b: "[tournament_armorer.GetFirstNameNoTooltip]! Qual é o significado disso?"
 ep2_locale_events.2002.b.success: "[tournament_armorer.GetFirstNameNoTooltip] faz os reparos a contragosto"
 ep2_locale_events.2002.b.failure: "[tournament_armorer.GetFirstNameNoTooltip] se esquiva"
 ep2_locale_events.2002.c: "Pagarei por alças de qualidade."
 ep2_locale_events.2002.d: "Não tenho tempo para isso."
 ep2_locale_events.2010.t: "$tournament_locale_armorer$: Presentes Defensivos"
 ep2_locale_events.2010.desc: "A loja do armeiro transborda de peças de proteção, por cima, por baixo, baratas, caras e tudo o que há no meio.\n\nNão consigo deixar de pensar em [befriend_target.GetFirstName] enquanto examino os equipamentos de proteção.\n\n[befriend_target.GetFirstNameNoTooltip] poderia apreciar #EMP algo#! daqui, mas o quê?"
 ep2_locale_events.2010.a: "Uma armadura de utilidade."
 ep2_locale_events.2010.a.tt: "#F Apelo ao lado cauteloso de [befriend_actor.GetFirstNameNoTooltip].#!"
 ep2_locale_events.2010.b: "Talvez ela goste deste escudo de exibição."
 ep2_locale_events.2010.b.tt: "#F Apelo ao lado orgulhoso de [befriend_actor.GetFirstNameNoTooltip].#!"
 ep2_locale_events.2010.c: "Um capacete especialmente feito para torneios."
 ep2_locale_events.2010.c.tt: "#F Apelo ao lado competitivo de [befriend_actor.GetFirstNameNoTooltip].#!"
 ep2_locale_events.2010.d: "Encontrarei outra maneira de impressionar[befriend_target.GetHerHim]."
 ep2_locale_events.2011.reply_armor: "No interior há um exemplar de [newly_created_artifact.GetType], bem-feito, embora um pouco simples.\n\n"
 ep2_locale_events.2011.reply_shield: "Em seu interior há um escudo recém-pintado, adornado com o brasão da minha família.\n\n"
 ep2_locale_events.2011.reply_tournament: "No interior há um elmo feito especialmente para torneios, oferecendo mais proteção do que é prático no campo de batalha.\n\n"
 ep2_locale_events.2011.opening: "[befriend_actor.GetTitledFirstName] aparece de repente em frente à minha tenda, segurando um grande embrulho. \"Isto é para você, [ROOT.Char.GetFirstNameNoTooltip|l]\", diz sorrindo calorosamente. Um presente?\n\n"
 ep2_locale_events.2011.success_armor: "$ep2_locale_events.2011.reply_armor$Trata-se de uma boa coleção, claramente elaborada com solidez e já bastante bem ajustada."
 ep2_locale_events.2011.armor: "$ep2_locale_events.2011.reply_armor$Que montagem tão feia, será que algumas incrustações realmente teriam sido tão caras?"
 ep2_locale_events.2011.success_shield: "$ep2_locale_events.2011.reply_shield$É um objeto de estudo, mesmo feito para pendurar, com um brasão delicadamente desenhado."
 ep2_locale_events.2011.shield: "$ep2_locale_events.2011.reply_shield$Um escudo. Para que eu precisaria de #EMP um#! escudo?"
 ep2_locale_events.2011.success_tournament: "$ep2_locale_events.2011.reply_tournament$É um equipamento engenhoso, adaptado às necessidades da competição mais do que da guerra."
 ep2_locale_events.2011.tournament: "$ep2_locale_events.2011.reply_tournament$Sejamos sinceros, quem leva essas competições pequenas tão a sério a ponto de precisar trapacear assim?"
 ep2_locale_events.2011.a: "Não posso negar que o presente foi bem escolhido."
 ep2_locale_events.2011.b: "\"Oh... um objeto muito... interessante.\""
 ep2_locale_events.2012.opening: "[befriend_target.GetTitledFirstName] pega o pesado embrulho com um sorriso, claramente animado com o presente inesperado.\n\n"
 ep2_locale_events.2012.success_reply: "[befriend_target.GetSheHe|U] não consegue esconder sua apreciação ao examinar o presente de todos os ângulos."
 ep2_locale_events.2012.reply: "[befriend_target.GetSheHe|U] não parece tão feliz enquanto examina o presente."
 ep2_locale_events.2012.success_armor: "\n\n\"São peças excelentes; eu não teria medo de entrar em batalha usando isto!\""
 ep2_locale_events.2012.armor: "\"Oh... uma armadura... pelo menos é útil.\""
 ep2_locale_events.2012.success_shield: "\n\n«Olhem isso! Vou exibi-lo na minha tenda imediatamente!»."
 ep2_locale_events.2012.shield: "\"Um escudo... muito bom... obrigado.\""
 ep2_locale_events.2012.success_tournament: "\"Que design inteligente! Com certeza vou usar isso nas competições!\""
 ep2_locale_events.2012.tournament: "\"Ah, para competições, você diz? Certo...\""
 ep2_locale_events.2012.success: "\n\n[befriend_target.GetSheHe|U] me agradece de coração. Acho que tomei a decisão certa!"
 ep2_locale_events.2012.failure: "\n\n[befriend_target.GetSheHe|U] me agradece com frieza. Talvez eu tenha feito a escolha errada…"
 ep2_locale_events.2012.a: "Eu sabia!"
 ep2_locale_events.2012.b: "Pelo menos o armeiro ficou feliz..."
 ep2_locale_events.2050.t: "$tournament_locale_armorer$: Armadura Reluzente"
 ep2_locale_events.2050.desc: "Ao ver minha armadura, [tournament_armorer.GetFirstName] põe as mãos nos quadris e expira ruidosamente.\n\n\"Bem, é um trabalho grande. Claro que não deve levar tanto tempo para alguém com meus talentos #EMP prodigiosos#!!\" [tournament_armorer.GetSheHe|U] sorri para mim, mostrando os dentes. Olho para a armadura. Para mim, ela parece boa. [tournament_armorer.GetFirstNameNoTooltip] percebe meu ceticismo e balança a cabeça.\n\n\"Não, sem dúvida ela precisa de uma revisão. Eu não sugeriria isso se não precisasse!\""
 ep2_locale_events.2050.a: "Tudo bem, faça sua mágica."
 ep2_locale_events.2050.a.success: "Sua armadura é melhorada"
 ep2_locale_events.2050.a.critsuccess: "Sua armadura é significativamente melhorada"
 ep2_locale_events.2050.a.armour1: "[prowess|E] aumenta em #color_green +1#!"
 ep2_locale_events.2050.a.durability1: "[durability|E] aumenta em #color_green +5#!"
 ep2_locale_events.2050.a.armour1.tt: "[prowess|E] aumenta em #color_dark_green +1#!"
 ep2_locale_events.2050.a.durability1.tt: "[durability|E] aumenta em #color_dark_green +5#!"
 ep2_locale_events.2050.a.criticalsuccess: "Sua armadura é consideravelmente melhorada"
 ep2_locale_events.2050.a.armour2: "[prowess|E] aumenta em #color_green +2#!"
 ep2_locale_events.2050.a.durability2: "[durability|E] aumenta em #color_green +10#!"
 ep2_locale_events.2050.a.prestige2: "[prestige|E] mensual aumenta en #color_green +0,04 %#!"
 ep2_locale_events.2050.a.armour2.tt: "[prowess|E] aumenta em #color_dark_green +2#!"
 ep2_locale_events.2050.a.durability2.tt: "[durability|E] aumenta em #color_dark_green +10#!"
 ep2_locale_events.2050.a.prestige2.tt: "[prestige|E] mensual aumenta en #color_dark_green +0,04 %#!"
 ep2_locale_events.2050.a.failure: "O conserto da sua armadura foi malfeito"
 ep2_locale_events.2050.a.durability3: "[durability|E] diminui em #color_red -5#!"
 ep2_locale_events.2050.b: "Acho que vai ficar bem."
 #TAILOR
 ep2_locale_events.2500.t: "$tournament_locale_tailor$: Escudo Errôneo"
 ep2_locale_events.2500.desc: "Examinando os artigos expostos na alfaiataria, vejo um pacote cuidadosamente embrulhado entre as pilhas de roupas e bugigangas.\n\nO alfaiate o abre alegremente para mim, desatando com cuidado as tiras de couro para revelar um brasão primorosamente bordado: o brasão de #EMP [tailor_mixup.GetHouse.GetBaseName|l]#!."
 ep2_locale_events.2500.a.rival: "Cães de [tailor_mixup.GetHouse.GetBaseNameNoTooltip]! Queimem isso, eu #EMP pagarei#! você!"
 ep2_locale_events.2500.a: "Faça um favor para mim, queime isso, você pode?"
 ep2_locale_events.2500.b: "Escute, vou levar essas coisas, mas sem falar nada disso."
 ep2_locale_events.2500.b.tt: "Este modificador aumentará a [success_chance|lE] do seu [hostile_scheme|lE] contra a Casa [tailor_mixup.GetHouse.GetName]"
 ep2_locale_events.2500.c: "Bonito... Eu quero o brasão da [ROOT.Char.GetHouse.GetNameNoTooltip]!"
 ep2_locale_events.2500.d: "Trabalho muito bom..."
 ep2_locale_events.2501.t: "$tournament_locale_tailor$: Uma Vestimenta Papal"
 ep2_locale_events.2501.desc: "Os tecidos e panos oferecidos pelo alfaiate vão do cânhamo bruto até os mais finos damascos, veludos e sedas. Enquanto os examino ao lado do meu [ROOT.Char.Custom2('RelationToMeShort', random_knight)] [random_knight.GetFirstName], um padrão estranhamente familiar me faz parar.\n\nAo erguer a veste completa contra a luz, arregalo os olhos. É uma reconstrução completa das vestes de um papa!\n\n\"Temos também para cardeais, [ROOT.Char.Custom('FormOfAddressForLiege')]!\", [tournament_tailor.GetFirstName], o alfaiate, espreita atrás de nós dois. Os olhos de [random_knight.GetFirstNameNoTooltip] brilham de alegria enquanto me cutuca furiosamente nas costelas. O alfaiate fala de novo.\n\n\"E aquele vem com um chapéu combinando.\""
 ep2_locale_events.2501.a: "#EMP VENDIDO!#!"
 ep2_locale_events.2501.a.tt: "Você e seus [knights|lE] vestem suas roupas..."
 ep2_locale_events.2501.b: "Isso é uma blasfêmia!"
 ep2_locale_events.2502.t: "$tournament_locale_tailor$: Vestes de Combate"
 ep2_locale_events.2502.desc: "Olho para [tournament_tailor.GetFirstName] impassível, implorando em silêncio que repita o que parecia a afirmação mais ridícula que eu havia ouvido o dia todo.\n\n\"É uma capa de duelo. Nunca ouviu falar de uma?\", [tournament_tailor.GetFirstName] balança a cabeça como se #EMP eu#! fosse [Select_CString( ROOT.Char.IsFemale, 'a tola', 'o tolo' )] da sala. \"Ajuda na movimentação, ajuda a absorver toda a umidade do combate, mas também mantém você aquecido e pronto para seguir entre os assaltos. Todos os grandes têm uma!\".\n\nTerminada a insistente tentativa de venda d[tournament_tailor.Custom('ES_DelDela')] alfaiat[tournament_tailor.Custom('ES_OA')], volto minha atenção para o manto que seguro. O tecido é claramente resistente e de alta qualidade, mas... #EMP uma capa de duelo? Sério?#!"
 ep2_locale_events.2502.a: "Contra o meu bom senso... negócio feito."
 ep2_locale_events.2502.b: "Você me acha um tolo, claramente!"
 ep2_locale_events.2502.b.tt: "Ela só iria ficar presa em tudo!"
 ep2_locale_events.2510.t: "$tournament_locale_tailor$: Presentes com Fios"
 ep2_locale_events.2510.desc: "Examino os rolos de tecidos raros e as amostras de pano que pendem na barraca do alfaiate; há algo para todos os gostos, do mais alto ao mais baixo.\n\nNão consigo evitar pensar no que [befriend_target.GetFirstName] apreciaria enquanto observo os trajes elegantes.\n\nNão tenho dúvida de que #EMP algo#! de algo assim lhe agradaria…"
 ep2_locale_events.2510.a: "Uma bela bandeira."
 ep2_locale_events.2510.a.tt: "#F Apelo ao lado orgulhoso de [befriend_target.GetFirstNameNoTooltip].#!"
 ep2_locale_events.2510.b: "Nada é mais útil do que uma gambesão."
 ep2_locale_events.2510.b.tt: "#F Apelo ao lado belicoso de [befriend_target.GetFirstNameNoTooltip].#!"
 ep2_locale_events.2510.c: "Estas luvas de pele de cervo são muito finas."
 ep2_locale_events.2510.c.tt: "#F Apelo ao lado gentil de [befriend_target.GetFirstNameNoTooltip].#!"
 ep2_locale_events.2510.d: "Talvez outra hora."
 ep2_locale_events.2511.reply_banner: "Dentro há uma bandeira finamente tecida dobrada, exibindo o seu brasão.\n\n"
 ep2_locale_events.2511.reply_gambeson: "Dentro há um gambesão acolchoado, uma camisa resistente usada sob a cota de malha.\n\n"
 ep2_locale_events.2511.reply_glove: "Dentro há um par de luvas de pele de cervo macias e delicadamente confeccionadas..\n\n"
 ep2_locale_events.2511.opening: "[befriend_actor.Custom('ES_ElLa')|U] [befriend_actor.GetTitledFirstName|l] aparece do nada e me entrega, com gentileza e um sorriso, um pacote dobrado. Um presente?\n\n"
 ep2_locale_events.2511.success_banner: "$ep2_locale_events.2511.reply_banner$Não encontro nenhum defeito nisso, meu emblema foi capturado com precisão e bom gosto."
 ep2_locale_events.2511.banner: "$ep2_locale_events.2511.reply_banner$Minha falta de entusiasmo é evidente, para que preciso disso?"
 ep2_locale_events.2511.success_gambeson: "$ep2_locale_events.2511.reply_gambeson$Examinando-a de perto, é uma peça fina; com várias camadas e claramente robusta."
 ep2_locale_events.2511.gambeson: "$ep2_locale_events.2511.reply_gambeson$Poderia conseguir um item desses em qualquer tecelãozinho, e daí?"
 ep2_locale_events.2511.success_glove: "$ep2_locale_events.2511.reply_glove$São macias como veludo e, de alguma forma, se ajustam quase perfeitamente."
 ep2_locale_events.2511.glove: "$ep2_locale_events.2511.reply_glove$Que… delicadeza…"
 ep2_locale_events.2511.a: "Não consigo evitar sorrir, isso é perfeito!"
 ep2_locale_events.2511.b: "\"Eu... agradeço...\""
 ep2_locale_events.2512.opening: "[befriend_target.GetTitledFirstName] aceita graciosamente meu pacote, abrindo-o com cuidado, conforme a suasa excitação permite.\n\n"
 ep2_locale_events.2512.success_reply: "Seus olhos se aquecem imediatamente ao vê-lo. Um bom sinal."
 ep2_locale_events.2512.reply: "Não consigo medir a reação dela/dele, como se nada tivesse mudado."
 ep2_locale_events.2512.success_banner: "\n\n\"Isto é esplêndido! Uma bordagem tão habilidosa realça o design!\""
 ep2_locale_events.2512.banner: "\"Ah, uma bandeira. Vou... pendurá-la imediatamente.\""
 ep2_locale_events.2512.success_gambeson: "\n\n\"Que trabalho excelente, isso resistiria a todos os golpes, exceto os mais pesados.\""
 ep2_locale_events.2512.gambeson: "\"Vou... colocá-lo junto com os outros...\""
 ep2_locale_events.2512.success_glove: "\"Meu Deus, eles são perfeitos! Como você fez isso?!\""
 ep2_locale_events.2512.glove: "\"Ah, luvas... muito boas...\""
 ep2_locale_events.2512.success: "\n\n[befriend_target.GetSheHe|U] me agradece efusivamente antes de seguirmos caminhos separados."
 ep2_locale_events.2512.failure: "\n\n[befriend_target.GetSheHe|U] me agradece de forma breve antes de ir embora…"
 ep2_locale_events.2512.a: "Isso correu bem."
 ep2_locale_events.2512.b: "Bem, paciência..."
 ep2_locale_events.2560.t: "$tournament_locale_tailor$: Uma Nova Compra"
 ep2_locale_events.2560.desc.intro: "Encontro [tailor.Custom('ES_AlAla')] [tailor.GetTitledFirstName|l] cortando um pedaço de tecido. Um par de mesas foi disposto para exibir seu trabalho: meias e coberturas de cabeça, capuzes e mangas. Em frente, uma lareira arde levemente.\n\n"
 ep2_locale_events.2560.desc.previous_artifact: "\"Está procurando algo para adornar seu traje, [ROOT.Char.Custom('FormOfAddressForLiege')]? Vejo que também trouxe certos artefatos da capital… Se me permite, sempre quis examinar o trabalho dos mestres de [capital_barony.GetNameNoTooltip]\"."
 ep2_locale_events.2560.desc.new_artifact: "\"Cuidado!\", ele/ela me adverte, quase deixando cair a ferramenta. \"Estavam prestes a tropeçar na roupa branca, [ROOT.Char.Custom('FormOfAddressForLiege')]\", pede desculpas entre os dentes, recolhendo rapidamente as roupas. \"Tenho certeza de que consigo adivinhar o motivo de sua visita\",[tailor.Custom('ES_OA')] sua cara mal aparece entre a bagunça."
 ep2_locale_events.2560.desc.new_artifact_2: "\"Procura algo em particular [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetLadyLord]?\", [tailor.Custom('quirk_pos_standalone')|l]. A coleção ao lado de [tailor.GetSheHe] é realmente mais impressionante do que eu esperava."
 ep2_locale_events.2560.a: "\"Na verdade, meu [previous_artifact.GetNameNoTooltip|l] poderia receber alguma decoração...\""
 ep2_locale_events.2560.b: "Posso comprar tal [purchasable_trinket.GetNameNoTooltip|l]?"
 ep2_locale_events.2560.c: "\"Você está me pedindo para #EMP pagar#! por isso?\""
 ep2_locale_events.2560.c.success: "Você intimida [tailor.GetShortUIName]"
 ep2_locale_events.2560.c.failure: "[tailor.GetShortUIName] não se intimida"
 ep2_locale_events.2560.d: "\"Algumas bandeiras vão encorajar a plateia a torcer por mim!\""
 ep2_locale_events.2560.e: "\"Aqui, continue com o bom trabalho.\""
 feather_trinket: "Pena Brilhante"
 feather_trinket.desc: "Uma pena ricamente colorida, dizem que pertencia a um pavão. Uma aquisição exótica."
 chess_trinket: "Peça de Xadrez"
 chess_trinket.desc: "Uma bela figura esculpida em cristal de rocha. Sua forma abstrata torna difícil dizer o que representa."
 ribbon_trinket: "Fita Ornamentada"
 ribbon_trinket.desc: "Uma tira de seda bordada com padrões florais. Um belo presente."
 glass_orb_trinket: "Orbe de Vidro"
 glass_orb_trinket.desc: "Uma esfera cristalina. Nunca será completamente transparente."
 tapestry_trinket: "Tapeçaria de Ovelhas"
 tapestry_trinket.desc: "Uma tapeçaria que retrata uma cena pastoral. Os animais bebem de um riacho calmo."
 tournament_banners_modifier: "Bandeiras do Torneio"
 tournament_banners_modifier_desc: "Este personagem encomendou bandeiras para a plateia."
 ep2_locale_events_artifact_decoration_desc: "[previous_artifact.GetDesc]\n\nFoi decorado com uma fita floral."
 artifact_monthly_prestige_3_modifier: "Fita Decorativa"
 #VISITOR CAMP
 ep2_locale_events.3001.t: "$tournament_locale_visitor_camp$: Roubando um Momento"
 ep2_locale_events.3001.desc: "Quando enfim consigo ficar a sós com [lover.GetFirstName] em uma tenda, longe de toda a agitação do torneio, sou tomado por um profundo cansaço. Desabo sobre um leito de palha coberto, com a mente tão dolorida quanto o corpo.\n\nOuço [lover.GetFirstNameNoTooltip] sussurrar para um guarda — algo sobre não nos perturbarem — e, alguns instantes depois, sinto seu calor ao meu lado.\n\n\"Você parece tão cansad[GetPlayer.Custom('ES_OA')], meu amor.\" Consigo ouvir a preocupação em sua voz. \"Você precisa descansar antes que as disputas comecem. Fique aqui comigo um pouco, por favor.\""
 ep2_locale_events.3001.a: "Não estou #EMP tão#! cansad[GetPlayer.Custom('ES_OA')]…"
 ep2_locale_events.3001.b: "Eu gostaria disso."
 ep2_locale_events.3001.c: "Preciso me preparar!"
 ep2_locale_events.3002.t: "$tournament_locale_visitor_camp$: Guerreiros Libertinos"
 ep2_locale_events.3002.desc: "Estou observando como [tournament_weaponsmith.GetFirstName] forja uma nova arma quando ouço um pequeno, mas perceptível #EMP golpe metálico#! seguido de uma maldição abafada, porém curiosamente ofegante. Espiando pela penumbra, finalmente vejo meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spying_spouse'))] [spying_spouse.GetFirstName] agachad[spying_spouse.Custom('ES_OA')] atrás de uma mesinha!\n\nSeu propósito logo fica claro. Seus olhos percorrem os braços vigorosos de [tournament_weaponsmith.GetFirstNameNoTooltip] enquanto o suor escorre em filetes pelos músculos retesados. Está claro que a vermelhidão de [spying_spouse.GetFirstNameNoTooltip] não é só por causa do calor...\n\nDou um passo em direção a [spying_spouse.GetHerHim]. Isso basta: [spying_spouse.GetFirstNameNoTooltip] mal consegue conter um suspiro ao nos encararmos, pego[spying_spouse.Custom('ES_OA')] em flagrante."
 ep2_locale_events.3002.a: "Tem espaço para mais um?"
 ep2_locale_events.3002.b: "Tolos! Vocês precisam gastar seu tempo #EMP se preparando#!"
 ep2_locale_events.3002.c: "Não me deixem interromper vocês!"
 ep2_locale_events.3002.c.tt: "Melhor deixá-los em paz, né?"
 #FARRIER
 ep2_locale_events.3500.t: "$tournament_locale_farrier$: Uma Picadinha"
 ep2_locale_events.3500.desc: "Levo meu cavalo para ser ferrado antes da abertura da competição de [activity.GetCurrentPhase.GetPhase.GetName|l], observando atentamente como o aprendiz de [tournament_farrier.GetFirstName] aparelha os cascos da minha cara besta.\n\nTenho um mau pressentimento sobre o rapaz, e, de fato, o primeiro prego é comprido demais. A besta chuta com selvageria, por pouco não atingindo [tournament_farrier.GetFirstNameNoTooltip] e manca aflita pela oficina.\n\n"
 ep2_locale_events.3500.war: "O aprendiz corre atrás de #EMP [ROOT.Char.Custom('ContestHorseRaceName')]#! — o [ROOT.Char.Custom('HorseStoryMareStallion')] precisará de uma ferradura de reposição imediatamente."
 ep2_locale_events.3500.race: "O aprendiz corre atrás de #EMP [ROOT.Char.Custom('ContestHorseRaceName')]#! — o [ROOT.Char.Custom('ContestHorseRaceGender')] precisará de uma ferradura de reposição imediatamente."
 ep2_locale_events.3500.other: "O aprendiz corre atrás de [ROOT.Char.Custom('ContestHorseRaceSheHe')]; esse(a) [ROOT.Char.Custom('ContestHorseRaceGender')] vai precisar de uma ferradura de reposição imediatamente."
 ep2_locale_events.3500.a: "![ROOT.Char.Custom('ContestHorseRaceName')] custa mais que cinco anos do seu salário, tolo!"
 ep2_locale_events.3500.a.war_horse: "[ROOT.Char.Custom('ContestHorseRaceName')] custa mais do que cinco anos do seu salário, tolo!"
 ep2_locale_events.3500.b: "Esse aprendiz nunca mais trabalhará em meu reino!"
 ep2_locale_events.3500.c: "Espero que isso seja de graça!"
 ep2_locale_events.3500.d: "Seja um pouco mais cuidadoso no futuro."
 every_attending_contestant_tt: "Todo Competidor"
 #BOWYER
 ep2_locale_events.4000.t: "$tournament_locale_bowyer$: Evento do Armeiro"
 ep2_locale_events.4000.desc: "Eu adoro uma flecha bonita!"
 ep2_locale_events.4000.a: "Empenar"
 ep2_locale_events.4000.b: "Não empenar"
 ep2_locale_events.4001.t: "$tournament_locale_bowyer$: Curvado Mas Não Quebrado..."
 ep2_locale_events.4001.desc: "\"Parece estar bem para mim!\", [tournament_bowyer.GetFirstName] está testando o arco que eu trouxe para que ele verifique. Vasculho os feixes empilhados sobre a mesa ao meu lado enquanto [tournament_bowyer.GetSheHe] continua verificando-o.\n\n\"A borda de ataque parece um pouco torta\". Os olhos do [tournament_bowyer.Custom('ES_DelDela')] fabricante de arcos se estreitam enquanto ele segura com força os galhos do arco, curvando-os cada vez mais. \"Aí, vejam, há alguma deformação no…\".\n\n#EMP Crrrac!#! [tournament_bowyer.GetFirstNameNoTooltip] fica de boca abert[tournament_bowyer.Custom('ES_OA')] quando o arco se parte. Suas protestações de que a verificação era necessária e de que o arco teria quebrado de qualquer forma ecoam pela sala, mas quem ficou sem arco fui eu."
 ep2_locale_events.4001.a: "É melhor você me dar uma substituição, de graça!"
 ep2_locale_events.4001.a.success: "[tournament_bowyer.GetFirstNameNoTooltip] substitui o arco gratuitamente"
 ep2_locale_events.4001.a.failure: "[tournament_bowyer.GetFirstNameNoTooltip] se recusa a pagar"
 ep2_locale_events.4001.b: "Droga. Bem, você tem algum para vender?"
 ep2_locale_events.4001.c: "Vocês são [tournament_bowyer.Custom2('InsultNoun', ROOT.Char)]! Vocês, vocês… #EMP [tournament_bowyer.Custom2('InsultNoun', ROOT.Char)|U]#!!"
 ep2_locale_events.4010.t: "$tournament_locale_bowyer$: Presentes Balísticos"
 ep2_locale_events.4010.desc: "Dou uma olhada nos artigos expostos na banca do fabricante de arcos, admirando os diversos arcos, flechas e acessórios.\n\nImediatamente penso em [befriend_target.GetFirstName] ao ver a grande quantidade de objetos úteis à venda.\n\nTalvez algo daqui desperte o interesse de"
 ep2_locale_events.4010.a: "Um novo arco."
 ep2_locale_events.4010.a.tt: "#F Apelo ao lado prático de [befriend_actor.GetFirstNameNoTooltip].#!"
 ep2_locale_events.4010.b: "Aljavas boas são uma necessidade negligenciada."
 ep2_locale_events.4010.b.tt: "#F Apelo ao lado organizado de [befriend_actor.GetFirstNameNoTooltip].#!"
 ep2_locale_events.4010.c: "Essas flechas de caça são únicas."
 ep2_locale_events.4010.c.tt: "#F Apelo ao lado enérgico de [befriend_actor.GetFirstNameNoTooltip].#!"
 ep2_locale_events.4010.d: "Acho que não."
 ep2_locale_events.4011.reply_bow: "No interior há um arco impecável, com um conjunto de flechas.\n\n"
 ep2_locale_events.4011.reply_quiver: "No interior há uma aljava de desenho curioso, maior do que o normal.\n\n"
 ep2_locale_events.4011.reply_hunt: "No interior há um conjunto de flechas de caça meticulosamente elaboradas.\n\n"
 ep2_locale_events.4011.opening: "[befriend_actor.GetTitledFirstName] aparece de repente diante de mim, com um pacote de formato estranho em seus braços estendidos. Um presente?\n\n"
 ep2_locale_events.4011.success_bow: "$ep2_locale_events.4011.reply_bow$É uma obra muito refinada, um arco digno de um nobre."
 ep2_locale_events.4011.bow: "$ep2_locale_events.4011.reply_bow$Me custa esconder minha decepção. Quer dizer, um arco…"
 ep2_locale_events.4011.success_quiver: "$ep2_locale_events.4011.reply_quiver$Passo um tempo examinando-o, este é o aljava mais ergonômico que já vi!"
 ep2_locale_events.4011.quiver: "$ep2_locale_events.4011.reply_quiver$Para que eu preciso disto? Quer dizer, de verdade…"
 ep2_locale_events.4011.success_hunt: "$ep2_locale_events.4011.reply_hunt$São de uma construção excepcionalmente robusta e claramente perfeitas para caçar animais pequenos."
 ep2_locale_events.4011.hunt: "$ep2_locale_events.4011.reply_hunt$Flechas de caça? Vocês realmente não deveriam ter feito isso, #EMP de verdade#!…"
 ep2_locale_events.4011.a: "Não consigo esconder meu sorriso, como ele(a) escolheu bem!"
 ep2_locale_events.4011.b: "\"Que presente... atencioso...\""
 ep2_locale_events.4012.opening: "[befriend_target.GetTitledFirstName] a recebe alegremente, abrindo as amarras do embrulho com uma alegria infantil.\n\n"
 ep2_locale_events.4012.success_reply: "Seus olhos se arregalam quando o vê… Tenho um bom pressentimento."
 ep2_locale_events.4012.reply: "Parece que o coração afunda quando o vê."
 ep2_locale_events.4012.success_bow: "\n\n\"Que [newly_created_artifact.GetType] habilmente esculpido! Eu vou estimá-lo!\""
 ep2_locale_events.4012.bow: "Meu [newly_created_artifact.GetType|l]! Bem. Bem."
 ep2_locale_events.4012.success_quiver: "\n\n\"Isto é algo para se admirar! Onde você encontrou isso?\""
 ep2_locale_events.4012.quiver: "\"Um suporte para flechas? Entendi.\""
 ep2_locale_events.4012.success_hunt: "\"Oh, eu estava procurando por algo assim há séculos!\""
 ep2_locale_events.4012.hunt: "\"Para caçar, você diz? Certo. Certo.\""
 ep2_locale_events.4012.success: "\n\n[befriend_target.GetSheHe|U] me agradece, colocando a mão no meu ombro. Acho que acertei em cheio!"
 ep2_locale_events.4012.failure: "\n\n[befriend_target.GetSheHe|U] agradece-me de forma superficial antes de ir embora, no que eu estava pensando..."
 ep2_locale_events.4012.a: "Um tiro bem direcionado."
 ep2_locale_events.4012.b: "Qual é o uso..."
 ep2_locale_events.4050.t: "$tournament_locale_bowyer$: Prepare-se"
 ep2_locale_events.4050.desc: "Revirando entre as pilhas de feixes de flechas e cordas de arco, encontro um monte arrumado de braçadeiras de couro especialmente boas. Ao colocar uma no antebraço, o couro endurecido protege a parte interna do meu braço.\n\n\"São nossas melhores braçadeiras, [ROOT.Char.Custom('FormOfAddressForLiege')]. Nem dez mil chibatadas da corda do arco as desgastariam!\" [tournament_bowyer.GetFirstName] percebe uma possível venda e desliza rapidamente para o meu lado.\n\nExamino o couro com curiosidade, pesando-o na mão."
 ep2_locale_events.4050.a: "Talvez possamos fazer um acordo?"
 ep2_locale_events.4050.a.success: "Você consegue barganhar com sucesso"
 ep2_locale_events.4050.a.failure: "Sua negociação falha"
 ep2_locale_events.4050.a.critfailure: "Irritad[tournament_bowyer.Custom('ES_OA')], [tournament_bowyer.GetFirstNameNoTooltip] se recusa a vender"
 ep2_locale_events.4050.b: "Vou levar duas!"
 ep2_locale_events.4050.c: "Quanto custa?"
 ep2_locale_events.4050.d: "Posso passar sem isso."
 #WEAPONSMITH
 ep2_locale_events.4500.t: "$tournament_locale_weaponsmith$: Lasca da Velha Espada"
 ep2_locale_events.4500.start: "Entrego"
 ep2_locale_events.4500.artifact: "[chipped_sword.GetName]"
 ep2_locale_events.4500.noartifact: "minha arma"
 ep2_locale_events.4500.end: "[tournament_weaponsmith.GetFirstName] resmunga com irritação, segurando um martelo em uma das mãos enquanto agarra [apprentice.Custom('ES_AlAla')] [apprentice.Custom('GirlBoy')] pela orelha com a outra."
 ep2_locale_events.4500.a: "Conserte! Conserte agora!"
 ep2_locale_events.4500.a.tt: "Vai custar, e vai exigir um trabalho bruto para consertar, mas eu preciso que seja feito!"
 ep2_locale_events.4500.b: "Oh, pelo amor de... você tem alguma para vender?"
 ep2_locale_events.4500.c: "Só me dê aqui!"
 tournament_sword_name: "Espada de Torneio"
 tournament_sword_description: "$artifact_sword_description$\n\nEssa arma foi adquirida em um torneio."
 tournament_sword.martiallifestyle: "$tournament_sword_description$ A construção durável mostra um compromisso de ser uma lâmina letal em primeiro lugar."
 tournament_sword.controlledadv: "$tournament_sword_description$ A inscrição na lâmina faz referência à defesa do reino."
 tournament_sword.foreignfaith: "$tournament_sword_description$ O texto estranho e estrangeiro em sua lâmina parece fazer referência a uma religião desconhecida."
 ep2_locale_events.4501.t: "$tournament_locale_weaponsmith$: Armado e Pronto"
 ep2_locale_events.4501.desc: "Estou observando como [tournament_weaponsmith.GetFirstName] forja uma nova arma quando ouço um pequeno, mas perceptível #EMP golpe metálico#! seguido de uma maldição abafada, porém curiosamente ofegante. Espiando pela penumbra, finalmente vejo meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spying_spouse'))] [spying_spouse.GetFirstName] agachad[spying_spouse.Custom('ES_OA')] atrás de uma mesinha!\n\nSeu propósito logo fica claro. Seus olhos percorrem os braços vigorosos de [tournament_weaponsmith.GetFirstNameNoTooltip] enquanto o suor escorre em filetes pelos músculos retesados. Está claro que a vermelhidão de [spying_spouse.GetFirstNameNoTooltip] não é só por causa do calor...\n\nDou um passo em direção a [spying_spouse.GetHerHim]. Isso basta: [spying_spouse.GetFirstNameNoTooltip] mal consegue conter um suspiro ao nos encararmos, pego[spying_spouse.Custom('ES_OA')] em flagrante."
 ep2_locale_events.4501.a: "Talvez devêssemos ver se esse interesse é compartilhado por todos?"
 ep2_locale_events.4501.a.tt: "O sorriso que se desenha no canto da boca [tournament_weaponsmith.Custom('ES_DelDela')] ferrei[tournament_weaponsmith.Custom('ES_OA')] já diz bastante, eu diria..."
 #ep2_locale_events.4501.a.custom.tt: "#high [spying_spouse.GetFirstName]#! lays with #high [tournament_weaponsmith.GetFirstName]#!"
 ep2_locale_events.4501.b: "Bem, eles têm #EMP braços muito#! fortes..."
 ep2_locale_events.4501.b.tt: "Claramente, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spying_spouse'))] tem um ótimo gosto!"
 ep2_locale_events.4501.c: "Oi! Nós estamos indo embora!"
 ep2_locale_events.4501.d: "Só está olhando. Não há problema."
 ep2_locale_events.4505.t: "$tournament_locale_weaponsmith$: Lâmina Famosa"
 ep2_locale_events.4505.desc: "No momento em que entro na ferraria, os olhos de [tournament_weaponsmith.GetFirstName] se arregalam. Em seus braços, com reverência, está um manto de seda.\n\n«[ROOT.Char.Custom('FormOfAddressForLiege')|U]», a voz lhe treme um pouco. «Vossa habilidade e destreza com a espada são lendárias. Eu... eu fiz isto para vós».\n\n[tournament_weaponsmith.GetSheHe|U] desfaz o manto para revelar uma espada de maravilhosa opulência. Ao tomá-la em minha mão, fica claro que é da mais alta qualidade, e a arma parece uma extensão do meu braço.\n\n«Forjei-a à vossa própria imagem, [ROOT.Char.Custom('FormOfAddressForLiege')]. Seria uma honra da mais alta magnitude se a aceitásseis como presente»."
 ep2_locale_events.4505.a: "A honra é toda minha, [tournament_weaponsmith.GetFirstNameNoTooltip]."
 ep2_locale_events.4505.a.tt: "Um presente?! Isso vale mil espadas. Não vou recusar!"
 ep2_locale_events.4505.b: "Uma arma tão fina merece um pagamento adequado."
 ep2_locale_events.4505.c: "Não quero suas lâminas de má qualidade!"
 ep2_locale_events.4506.t: "$tournament_locale_weaponsmith$: O que há em um nome?"
 ep2_locale_events.4506.desc: "\"Precisa de um nome.\"\n\nA interrupção de [tournament_weaponsmith.GetFirstName] enquanto dou alguns golpes de teste com minha nova espada me faz erguer uma sobrancelha para o armeiro.[tournament_weaponsmith.Custom('ES_LoLa')] com uma sobrancelha arqueada.\n\n\"Todas as armas portadas por aqueles das lendas têm um nome. É assim que se faz! A lâmina de um[ROOT.Char.Custom('ES_XA')] guerreiro[ROOT.Char.Custom('ES_OA')] poderoso[ROOT.Char.Custom('ES_OA')] precisa de um nome imponente para que os inimigos tremam!\" insiste [tournament_weaponsmith.GetFirstNameNoTooltip]."
 ep2_locale_events.4506.a: "Eu tenho exatamente o nome certo em mente."
 ep2_locale_events.4506.a.tt: "[rename_artifact.GetName] recebe um novo nome"
 ep2_locale_events.4506.b: "Uma espada é uma ferramenta, nada mais."
 ep2_locale_events.4510.t: "$tournament_locale_weaponsmith$: Presentes Ofensivos"
 ep2_locale_events.4510.desc: "Ao olhar ao redor da forja do armeiro, toda sorte de instrumentos mortíferos e itens finamente trabalhados chamam a atenção.\n\nMeus pensamentos vagam até [befriend_target.GetFirstName] enquanto meus olhos percorrem as prateleiras reluzentes.\n\nSe eu quiser conquistá-lo, precisarei encontrar algo que #EMP [befriend_target.GetSheHe]#! aprecie..."
 ep2_locale_events.4510.a: "Uma arma de defesa bem-feita."
 ep2_locale_events.4510.a.tt: "#F Apelo ao lado belicoso de [befriend_actor.GetFirstNameNoTooltip].#!"
 ep2_locale_events.4510.b: "Algo bonito para exibir."
 ep2_locale_events.4510.b.tt: "#F Apelo ao lado materialista de [befriend_actor.GetFirstNameNoTooltip].#!"
 ep2_locale_events.4510.c: "Eu acho que [befriend_target.GetFirstNameNoTooltip] é um #EMP punhal#! [befriend_target.GetWomanMan]."
 ep2_locale_events.4510.c.tt: "#F Apelo ao lado dissimulado de [befriend_actor.GetFirstNameNoTooltip].#!"
 ep2_locale_events.4510.d: "Encontrarei outra maneira de impressionar[befriend_target.GetHerHim]."
 ep2_locale_events.4511.reply_weapon: "No interior, há um(a) exemplar de [newly_created_artifact.GetType|l] de fino trabalho, que brilha de forma opaca sob a luz suave.\n\n"
 ep2_locale_events.4511.reply_ornament: "Em seu interior, há uma arma de exibição delicada, mais adequada para uma parede do que para o campo de batalha.\n\n"
 ep2_locale_events.4511.reply_dagger: "Dentro há uma adaga pequena, porém elegante, com uma lâmina que brilha intensamente.\n\n"
 ep2_locale_events.4511.opening: "Uma manhã, sou interrompido de repente por [befriend_actor.GetTitledFirstName|l], que me entrega um embrulho, sorrindo com expectativa. Um presente?\n\n"
 ep2_locale_events.4511.success_weapon: "$ep2_locale_events.4511.reply_weapon$Não se pode negar a habilidade artesanal e a utilidade clara da arma."
 ep2_locale_events.4511.weapon: "$ep2_locale_events.4511.reply_weapon$Meu coração afunda, para que eu precisaria dessa coisa horrível?"
 ep2_locale_events.4511.success_ornament: "$ep2_locale_events.4511.reply_ornament$É uma coisa maravilhosamente trabalhada, com tanta atenção aos detalhes que é difícil desviar o olhar."
 ep2_locale_events.4511.ornament: "$ep2_locale_events.4511.reply_ornament$Ah, um objeto totalmente inútil... Acho que posso pelo menos vendê-lo."
 ep2_locale_events.4511.success_dagger: "$ep2_locale_events.4511.reply_dagger$Sua forma sutil clama por ser empunhada e desferida em meu punho."
 ep2_locale_events.4511.dagger: "$ep2_locale_events.4511.reply_dagger$Para que serve isso, afinal? Isso é a ferramenta dos trapaceiros."
 ep2_locale_events.4511.a: "A meu pesar, [befriend_actor.GetFirstName] me impressionou…"
 ep2_locale_events.4511.b: "\"O-obrigada. Muito bonito.\""
 ep2_locale_events.4512.opening: "[befriend_target.GetTitledFirstName] recebe calorosamente meu presente cuidadosamente embrulhado e o segura na mão com um largo sorriso.\n\n"
 ep2_locale_events.4512.success_reply: "Seu sorriso se alarga ainda mais quando as embalagens são descartadas."
 ep2_locale_events.4512.reply: "Seu humor muda um pouco quando o embrulho é retirado: é curiosidade ou desdém?"
 ep2_locale_events.4512.success_weapon: "\n\nAh, um exemplar de [newly_created_artifact.GetType|l] magistralmente forjado. Algo... em que confiar."
 ep2_locale_events.4512.weapon: "\"Oh... uma [newly_created_artifact.GetType]. Exatamente o que eu preciso.\""
 ep2_locale_events.4512.success_ornament: "\n\n\"Que bela peça de exposição. Digna da coleção de qualquer nobre!\""
 ep2_locale_events.4512.ornament: "\"Oh, uma peça de exposição? Muito... bonito.\""
 ep2_locale_events.4512.success_dagger: "\"Oh, isso é bom, muito bom... Um equilíbrio assim.\""
 ep2_locale_events.4512.dagger: "\"Bom para picar... vegetais, suponho?\""
 ep2_locale_events.4512.success: "\n\n[befriend_target.GetSheHe|U] me agradece sinceramente. Acho que não poderia ter saído melhor!"
 ep2_locale_events.4512.failure: "\n\n[befriend_target.GetSheHe|U] me agradece educadamente. Acho que não teve o efeito desejado…"
 ep2_locale_events.4512.a: "Eu tenho um olhar para isso."
 ep2_locale_events.4512.b: "Que desperdício..."
 ep2_locale_events.4520.t: "$tournament_locale_weaponsmith$: Icor Digno"
 ep2_locale_events.4520.desc: "\"Sangue nobre!\", ressoa a voz de [tournament_weaponsmith.GetFirstName], assustando-me. Pisqueio através da penumbra até onde está [tournament_weaponsmith.GetSheHe], famint[tournament_weaponsmith.Custom('ES_OA')], brandindo uma adaga reluzente.\n\n\"Tudo o que eu preciso é da menor #EMP gota#! de sangue nobre para temperar uma lâmina! A espada será a melhor arma já feita! Serão cantadas canções sobre mim!\". Ele se aproxima, com um brilho insano nos olhos.\n\n\"Ela será toda sua, [ROOT.Char.GetLadyLord], toda sua. Só preciso ser eu a forjá-la. Permita-me isso, para que nossos nomes sejam lembrados para sempre!\".\n\nOlho para o meu braço."
 ep2_locale_events.4520.a: "Pela glória. Pela fama eterna!"
 ep2_locale_events.4520.a.success: "A forja ocorre bem"
 ep2_locale_events.4520.a.failure: "A forja ocorre mal"
 ep2_locale_events.4520.b: "Podemos tentar, mas deixe-me primeiro pegar minhas pomadas..."
 ep2_locale_events.4520.c: "Si tenéis la #EMP seguridad#! de que esto funcionará…"
 ep2_locale_events.4520.d: "Que absurdo."
 ep2_locale_events.4521.t: "$tournament_locale_weaponsmith$: Aço Sanguíneo"
 ep2_locale_events.4521.start: "Aperto um pano limpo contra o antebraço para conter o sangramento enquanto [tournament_weaponsmith.GetFirstName] atiça o fogo e martela emocionad[tournament_weaponsmith.Custom('ES_OA')]. Quando alcançamos o objetivo da sangria, o pano está quase encharcado, mas o sangramento diminuiu e a ferida coagula.\n\nA espada é depositada reverentemente sobre uma mesa."
 ep2_locale_events.4521.success: "É uma coisa curiosa de se ver: o sangue seco continua a se desprender da lâmina, revelando padrões vivos no aço. Eu testo a flexibilidade e a lâmina range de forma preocupante.\n\n"
 ep2_locale_events.4521.failure: "É, em uma palavra, feia. O sangue seco cobre toda a extensão da lâmina, e o peso da arma parece mudar a cada momento. O aço quebradiço está coberto por redemoinhos irregulares.\n\n"
 ep2_locale_events.4521.ending: "\"É #EMP perfecta#!!\" [tournament_weaponsmith.GetFirstNameNoTooltip] não parece se abalar com meu ceticismo. Suas mãos tremem enquanto segura a lâmina com admiração."
 ep2_locale_events.4521.a: "Eu a levarei!"
 ep2_locale_events.4521.b: "Você pode ficar com ela."
 ep2_locale_events.5020.t: "$tournament_locale_tourney_grounds$: Impressionado(a)?"
 ep2_locale_events.5020.desc: "O recinto do torneio fervilha de preparativos. Os pajens correm de um lado para o outro carregando peças de armadura que os fazem parecer pequenos espantalhos. \"Espere!\", grita um deles, pegando um capacete.\n\nOuço uma risadinha familiar vinda das tribunas, e vejo [impressed_lover.Custom('ES_AlAla')] [impressed_lover.GetTitledFirstName|l], cercad[impressed_lover.Custom('ES_OA')] de mais [impressed_lover.GetWomenMen] que cobrem a boca com lenços. [impressed_lover.GetSheHe|U] não me acena. Não precisa.\n\n\"Vindo para se exercitar?\", [impressed_rival.Custom('ES_ElLa')] [impressed_rival.GetTitledFirstName|l] passa por mim, erguendo o queixo. \"Vai precisar\"."
 ep2_locale_events.5020.a: "Vou garantir que [impressed_lover.GetFirstNameNoTooltip] esteja olhando."
 ep2_locale_events.5020.a.success: "Você impressiona [impressed_lover.GetShortUIName]"
 ep2_locale_events.5020.a.failure: "[impressed_lover.GetShortUIName] não ficou impressionado(a)"
 ep2_locale_events.5020.b: "A oportunidade perfeita para intimidar esse[impressed_rival.Custom('ES_EA')] importun[impressed_rival.Custom('ES_OA')] [impressed_rival.GetFirstNameNoTooltip]."
 ep2_locale_events.5020.b.success: "[impressed_rival.GetShortUIName] está intimidado[impressed_rival.Custom('ES_OA')]"
 ep2_locale_events.5020.b.failure: "[impressed_rival.GetShortUIName] não ficou impressionado(a)"
 ep2_locale_events.5020.c: "Só há uma pessoa a quem preciso impressionar. A mim mesm[ROOT.Char.Custom('ES_OA')]."
 tournament_ground_flexing: "Treinamento Impressionante"
 ep2_locale_events.5020.a.success.tt: "Seu relacionamento com [impressed_lover.GetShortUIName] aumentou [fertility|lE]"
 ep2_locale_events.1520.t: "Duas Luas"
 ep2_locale_events.1520.desc: "“Um presságio! Um sinal!”. Ouço gritos vindos da [ROOT.Char.GetFaith.HouseOfWorship] quando me aproximo da porta. [tournament_priest.Custom('ES_ElLa')|U] [tournament_priest.GetTitledFirstName|l] tromba em mim, apontando para o céu. Seguindo seus olhos frenéticos, vejo: a lua. Outra lua.\n\n“Li sobre isso em arquivos antigos”, continua [tournament_priest.GetSheHe]; “anuncia algo — mas o quê?”."
 ep2_locale_events.1520.a: "Um presságio! Isso anuncia minha vitória!"
 ep2_locale_events.1520.b: "As luas são redondas como moedas. É riqueza, obviamente."
 ep2_locale_events.1520.c: "Duas silhuetas perfeitamente decapitadas..."
 ep2_locale_events.1520.d: "Eu já vi isso antes... em um livro sobre as estrelas."
 ep2_locale_events.1520.e: "Isso não significa nada."
 tournament_astronomy_modifier: "Astrônomo(a)"
 tournament_astronomy_modifier_desc: "Este(a) personagem estudou as estrelas e seus movimentos"
 ep2_locale_events.1520.superstitious: "Você se torna supersticioso[ROOT.Char.Custom('ES_OA')]"
 ep2_locale_events.3010.t: "Ar Ruim"
 ep2_locale_events.3010.desc: "Assim que entro no acampamento, sou recebido por um cheiro penetrante. Cubrindo o nariz com toda a graça que consigo enquanto tento não passar mal, sou abordado por [alerted_physician.GetFirstName], tapando o próprio nariz com um lenço.\n\n“Deveríeis ir embora, [ROOT.Char.Custom('FormOfAddressForLiege')], os contendentes estão adoecendo, prejudicados pelo ar viciado”, me alerta [alerted_physician.GetSheHe]."
 ep2_locale_events.3010.a: "Deve haver uma explicação para isso. Encontre-a."
 ep2_locale_events.3010.a.success: "[alerted_physician.GetShortUIName] investiga o acampamento"
 ep2_locale_events.3010.b: "O torneio deve ter sido amaldiçoado!"
 ep2_locale_events.3010.b.flavor: "Vou me manter afastado do acampamento..."
 ep2_locale_events.3010.c: "Eu não vou cair nessas tentativas tolas!"
 ep2_locale_events.3010.d: "Por que eu deveria me importar?"
 tournament_not_cursed_modifier: "Ar Fresco"
 tournament_not_cursed_modifier_desc: "Este(a) personagem evitou o ar ruim que envenenou um torneio"
 ep2_locale_events.3010.a.success.tt: "[alerted_physician.GetShortUIName] encontra a causa"
 ep2_locale_events.3010.a.failure: "[alerted_physician.GetShortUIName] não tem sucesso"
 ep2_locale_events.3011.t: "$ep2_locale_events.3010.t$: Miasma"
 ep2_locale_events.3011.desc: "[alerted_physician.GetFirstName] volta para mim com um sorriso satisfeito no rosto. «Encontrei a origem, [ROOT.Char.Custom('FormOfAddressForLiege')]», anuncia, tentando conter a risada.\n\n«Os convidados não conseguiram encontrar um lugar para descartar seus… dejetos, então recorreram a jogá-los no rio. O ar viciado carrega doenças, como Hipócrates assim proclamou»."
 ep2_locale_events.3011.a: "Eu devo avisá-los!"
 ep2_locale_events.3011.b.contestant: "Vou guardar isso para mim."
 ep2_locale_events.3011.b.champion: "Só advertirei meu campeão[contest_champion.Custom('ES_OnOna')]; [contest_champion.GetFirstNameNoTooltip]."
 ep2_locale_events.3011.b: "Por que eu deveria contar a eles?"
 ep2_locale_events.3510.t: "Bem Equipado"
 ep2_locale_events.3510.desc: "O calor da forja é suficiente para manter a maioria dos convidados afastados. Quando abro a porta, encontro [farrier.Custom('ES_AlAla')] ferrador[farrier.Custom('ES_XA')] bocejando sobre sua mesa de trabalho. Parece que poucos se aproximaram dele. Ele se endireita rapidamente, pigarreando com uma tosse audível.\n\n\"Posso ajudá-lo? Posso lhe oferecer as melhores ferraduras, prontas para o torneio\", sugere, exibindo uma coleção mais do que impressionante."
 ep2_locale_events.3510.a: "\"Me dê apenas as melhores!\""
 ep2_locale_events.3510.b: "\"Eu realmente deveria comprar algumas para meus cavaleiros...\""
 ep2_locale_events.3510.c: "\"Um amuleto de boa sorte!\""
 ep2_locale_events.3510.d: "\"Estou bem, obrigado.\""
 ep2_locale_events.3510.a.prowess: "Sua [prowess|lE] aumenta"
 ep2_locale_events.3510.a.martial: "Seu [martial|lE] aumenta"
 ep2_locale_events.3510.a.prestige: "Seu novo equipamento é impressionante"
 tournament_new_horseshoes_modifier: "Novas Ferraduras"
 good_luck_horseshoe_artifact: "Ferradura"
 good_luck_horseshoe_artifact_desc: "Uma ferradura de ferro, dizem que afasta espíritos malignos."
 ep2_locale_events.1530.t: "Pó Você É"
 ep2_locale_events.1530.desc.intro: "O pátio ao redor da [ROOT.Char.GetFaith.HouseOfWorship] está deserto perto do pôr do sol. Ouço um ruído entre as folhas e vejo a silhueta de um pequeno animal correndo entre as lápides. As esculturas quase desapareceram em algumas delas. Claramente visíveis em outras.\n\nDou um passo em direção a elas"
 ep2_locale_events.1530.desc.young: "e elas parecem tão distantes. Quase impossíveis."
 ep2_locale_events.1530.desc.middle: ". Quando chegar a minha hora, vou garantir que terei um lugar de descanso melhor do que este."
 ep2_locale_events.1530.desc.old: "porque está tarde. Porque vai continuar ficando mais tarde. Porque nunca esteve tão tarde na minha vida."
 ep2_locale_events.1530.a: "Gostaria de encontrar um dos meus antepassados...."
 ep2_locale_events.1530.b.christian: "E ao pó eu retornarei."
 ep2_locale_events.1530.b.fallback: "Em breve serei eu."
 ep2_locale_events.1530.c: "Pó ao pó! Que visão inspiradora!"
 ep2_locale_events.1530.d: "Hm... e se...?"
 ep2_locale_events.1530.a.success: "Você encontra um antepassado nas criptas"
 ep2_locale_events.1530.a.failure: "Não há ninguém que você conheça aqui"
 ep2_locale_events.4540.t: "Na Lâmina"
 ep2_locale_events.4540.desc.intro: "«Que obra magnífica ele fez!», ouço um cavaleiro dizer com orgulho ao sair da oficina. A lâmina reluzente reflete o sol como um lago cristalino.\n\nEmpurro a porta para abri-la e sou recebido por uma labareda."
 ep2_locale_events.4540.desc.contestant: "\"Vai competir desse jeito?\", pergunta [weaponsmith.Custom('ES_ElLa')] armad[weaponsmith.Custom('ES_OA')], apontando [my_weapon.GetNameNoTooltip|l] que fica pendurado no meu cinto."
 ep2_locale_events.4540.desc.fallback: "Embora desta vez eu não esteja competindo, não deveria ignorar o talento de est[weaponsmith.Custom('ES_EA')] artesã[weaponsmith.Custom('ES_OA')]."
 ep2_locale_events.4540.desc.outro: "\n\n\"Se você tiver ouro, eu tenho o aço.\""
 ep2_locale_events.4540.a: "\"Torne-o mais mortal.\""
 ep2_locale_events.4540.a.tt: "A borda afiada durará apenas durante o Torneio"
 ep2_locale_events.4540.b.christian: "\"Entalhe #EMP In Nomine Domini#! ao longo da lâmina.\""
 ep2_locale_events.4540.b.fallback: "\"Inscrição de uma oração.\""
 ep2_locale_events.4540.c: "\"Quero que diga [my_weapon.GetOwner.GetHouse.GetMotto].\""
 ep2_locale_events.4540.d: "\"Vou ficar com o meu ouro.\""
 ep2_locale_events_artifact_sharp_desc: "[my_weapon.GetDesc]\n\nA lâmina foi afiada para o torneio."
 ep2_locale_events_artifact_prayer_desc: "[my_weapon.GetDesc]\n\nUma oração foi entalhada na lâmina."
 ep2_locale_events_artifact_motto_desc: "[my_weapon.GetDesc] Ao longo da lâmina está escrito [my_weapon.GetOwner.GetHouse.GetMotto]."
 artifact_tournament_sharpened_blade_modifier: "Lâmina Afiada"
 artifact_monthly_piety_7_modifier: "Inscrição de Oração"
 artifact_monthly_prestige_7_modifier: "Inscrição de Lema"
 ep2_locale_events.1060.t: "Patifes e Tolos"
 ep2_locale_events.1060.desc: "\"Hah! Canalha!\", ouço alguém gritar enquanto abro a porta. Um[tournament_gambler.Custom('ES_XA')] [tournament_gambler.GetWomanMan] sorri, satisfeit[tournament_gambler.Custom('ES_OA')] enquanto pega o ouro colocado sobre a mesa. \"Bah!\", queixa-se seu oponente, batendo na madeira enquanto [tournament_gambler.GetSheHe] se levanta.\n\nA pessoa desconhecida me olha nos olhos, fazendo uma leve reverência. \"Gostaria [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip|l] de participar de um jogo de cartas? Eu ponho a minha, e você aposta se a sua será maior ou menor. O vencedor leva tudo. Simples assim\".\n\n\"Cinco\", diz, colocando sua carta."
 ep2_locale_events.1060.a: "\"Minha carta é maior!\""
 ep2_locale_events.1060.b: "\"Minha carta é menor!\""
 ep2_locale_events.1060.c: "\"Não desejo participar de jogos de azar.\""
 ep2_locale_events.1060.a.success: "Você ganha o dobro"
 ep2_locale_events.1060.a.failure: "Você perde seu ouro"
 ep2_locale_events.4530.t: "$tournament_locale_weaponsmith$: A Sabedoria do Martelo"
 ep2_locale_events.4530.desc: "Posso ver o suave tremular das chamas do outro lado da estrada. Seu calor envolve meu corpo em um abraço familiar antes mesmo de eu abrir a porta. Lá dentro, [tournament_weaponsmith.Custom('ES_ElLa')] ferreir[tournament_weaponsmith.Custom('ES_OA')] alinha um lote de pregos.\n\n“Posso ajudar, [ROOT.Char.Custom('FormOfAddressForLiege')]?” pergunta com a testa manchada de carvão. O ar aqui é mais denso."
 ep2_locale_events.4530.a: "\"Ouvi dizer que os ferreiros podem quebrar feitiços. Por favor, acalme minha alma.\""
 ep2_locale_events.4530.a.tt: "Você ficou supersticioso[GetPlayer.Custom('ES_OA')]"
 ep2_locale_events.4530.b: "\"Você pode me mostrar uma técnica especial?"
 ep2_locale_events.4530.b.success: "Suas habilidades melhoram"
 ep2_locale_events.4530.b.crit_success: "Suas habilidades melhoram significativamente"
 ep2_locale_events.4530.b.failure: "Você fica ferido"
 ep2_locale_events.4530.c: "\"Você pode melhorar minha [improved_weapon.GetNameNoTooltip]?\""
 ep2_locale_events.4530.c.tt: "Ganha #positive_value +2#! [prowess|lE]"
 ep2_locale_events.4530.d.success: "O tratamento funciona!"
 ep2_locale_events.4530.d.nothing: "O tratamento é ineficaz"
 ep2_locale_events.4530.d: "\"Meu corpo! Isso dói! Me ajude!\""
 improved_artifact_desc: "[improved_weapon.GetDesc]\n\nRecebeu um aprimoramento de um habilidoso armeiro pouco antes de um torneio importante."
 ep2_locale_events.4530.e: "\"Eu estava apenas olhando.\""
 #TRAINING GROUNDS
 ep2_locale_events.5000.t: "O Chamado do Aço"
 ep2_locale_events.5000.desc.intro: "Enquanto visito o recinto do torneio junto com meu [my_child.Custom('GetDaughterSon')] [my_child.GetFirstName], encontramos um grupo de [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')], treinando ferozmente para a próxima disputa. Aceno para [my_knight.Custom('ES_AlAla')] [my_knight.GetTitledFirstName|l], quase irreconhecível sob aquele elmo.\n\n\"Ah, seria uma grande honra para nossa casa se…\", mas logo paro ao notar que os olhos de [my_child.GetFirstNameNoTooltip] estão fixos nas espadas."
 ep2_locale_events.5000.desc.martial: "Não é surpresa, dados os interesses marciais."
 ep2_locale_events.5000.desc.non_martial: "Não tinha percebido que ele(a) tivesse interesse por essas coisas."
 ep2_locale_events.5000.a: "\"Que ideia maravilhosa!\""
 ep2_locale_events.5000.b: "\"Ótimo. [my_knight.GetFirstNameNoTooltip] irá treiná-lo(a), então.\""
 ep2_locale_events.5000.c: "\"Você acha que pode negligenciar suas obrigações assim?\""
 ep2_locale_events.5010.t: "$tournament_locale_tournament_grounds$: Quase Lá"
 ep2_locale_events.5010.desc.intro: "Marchando para os campos do torneio, junto-me a um grupo de"
 ep2_locale_events.5010.desc.prowess: "resolutos [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')], trocando provocações enquanto seus assistentes os revestem com armaduras."
 ep2_locale_events.5010.desc.mind: "competidores trocando estratégias comuns, insinuando dramaticamente floreios que ainda estão por vir."
 ep2_locale_events.5010.desc.fallback: "competidores praticando sua performance com entusiasmo medido."
 ep2_locale_events.5010.desc.outro: "\n\nAlguns espectadores já nos observam. Mastigando carne assada e cuspindo ossos, os plebeus pedem um espetáculo.\n\nAlguns de nós reclamam dessa distração do treinamento. Outros, em meio aos gritos, insistem que este se tornou um momento para se provar."
 ep2_locale_events.5010.a: "Eu mostrarei a todos como é feito."
 ep2_locale_events.5010.a.success: "Seu treinamento é bem-sucedido"
 ep2_locale_events.5010.a.failure: "Seu treinamento é constrangedor"
 ep2_locale_events.5010.b.good: "Lembro-me da última vez, tão boas lembranças."
 ep2_locale_events.5010.b.bad: "Dessa vez. Dessa vez farei melhor."
 ep2_locale_events.5010.b.flavor: "Uma memória persiste em sua mente..."
 ep2_locale_events.5010.c: "\"No que você está olhando!?\""
 ep2_locale_events.5010.c.success: "A multidão fica intimidada"
 ep2_locale_events.5010.c.failure: "A multidão ri de você"
 ep2_locale_events.5010.d: "Devo me retirar agora."
 ep2_locale_events.5030.t: "Uma Nova Contratação"
 ep2_locale_events.5030.desc.intro: "Os pajens riem e brincam enquanto lustram elmos e cotas de malha. Um deles esgoela tão alto que parece um porco, e o resto logo o imita. Seus [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] vadiam nas proximidades.\n\nEntre eles, avisto [poached_councillor.Custom('ES_AlAla')] [poached_councillor.GetTitledFirstName|l], conselheir[poached_councillor.Custom('ES_OA')] [councillor_employer.Custom('ES_DelDela')] [councillor_employer.GetTitledFirstName|l]."
 ep2_locale_events.5030.desc.contestant: "Suas habilidades têm sido muito elogiadas e seu nome ressoa como um dos possíveis vencedores."
 ep2_locale_events.5030.desc.fallback: "Suas ações não passaram despercebidas e o trabalho que [poached_councillor.GetSheHe] fez pela casa de seu senhor é mais do que impressionante."
 ep2_locale_events.5030.desc.outro: "\n\nEu poderia convencer[poached_councillor.GetHerHim] a se juntar ao meu próprio conselho."
 ep2_locale_events.5030.a: "O ouro é a maior tentação."
 ep2_locale_events.5030.b: "\"Um[poached_councillor.Custom('ES_XA')] [poached_councillor.GetWomanMan] habilidos[poached_councillor.Custom('ES_OA')] merece um senhor habilidoso. Ou nenhum senhor, então\"."
 ep2_locale_events.5030.b.success: "Você intimida [poached_councillor.GetShortUIName]"
 ep2_locale_events.5030.b.failure: "[poached_councillor.GetShortUIName] se ofende com sua falta de cortesia"
 ep2_locale_events.5030.c: "\"Uma vida mais prestigiosa aguarda você em minha corte.\""
 ep2_locale_events.5030.d: "\"Não há amizade entre nós, meu querid[poached_councillor.Custom('ES_OA')] [poached_councillor.GetFirstNameNoTooltip]? Junte-se a mim\"."
 ep2_locale_events.5030.e: "Não desejo ofender [councillor_employer.Custom('ES_AlAla')] [councillor_employer.GetTitledFirstNameNoTooltip|l]."
 #VILLAGE
 ep2_locale_events.5500.t: "Antigo como Pedra"
 ep2_locale_events.5500.desc: "Uma visita a [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] foi exatamente o que eu precisava para relaxar antes do torneio! Enquanto passeio pelas ruas, vejo crianças locais simulando uma batalha, usando gravetos como armas e gritando coisas como 'pela honra da minha casa!' e várias vezes '#EMP arghhhh#!'.\n\nParo para admirar um dos edifícios mais proeminentes, erguido orgulhosamente no meio da praça. Ao inspecioná-lo mais de perto, porém, percebo rapidamente algumas inscrições antigas..."
 ep2_locale_events.5500.a.rome: "Espera... isso é latim?"
 ep2_locale_events.5500.a.fallback: "Hah! Estudei essa língua antiga!"
 ep2_locale_events.5500.b: "Essa pedra serviria como ótimas paredes em casa!"
 ep2_locale_events.5500.c: "Devemos continuar aprendendo com eles."
 ancient_stone_artifact: "Placa Antiga"
 ancient_stone_artifact_desc: "Uma placa com uma inscrição antiga. Parece ter sido reutilizada como parede em uma vila."
 ep2_locale_events.5510.t: "$tournament_locale_settlement$: Beco"
 ep2_locale_events.5510.desc: "Os moradores locais de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] parecem tão interessados no torneio quanto os nobres que comparecem a ele. Alguns improvisaram barracas temporárias no térreo de suas casas, e suas [ROOT.Char.Custom('GetLocalStreetFoodPlural')] cheiram deliciosamente.\n\nAcima de toda a algazarra e a tagarelice, ouço alguns ruídos mais… violentos vindos de um dos becos; ao me aproximar, observo o que parece ser uma briga de camponeses, mas um deles é mais habilidoso que o resto."
 ep2_locale_events.5510.a: "\"Ei você! Você! Agora você é meu cavaleiro.\""
 ep2_locale_events.5510.a.success: "Você convence [village_thug.GetShortUIName]"
 ep2_locale_events.5510.a.failure: "[village_thug.GetShortUIName] parece não estar impressionado"
 ep2_locale_events.5510.b: "\"Esses são movimentos impressionantes, deixe-me estudá-los...\""
 ep2_locale_events.5510.c: "\"Parem agora mesmo, seus bárbaros!\""
 tournament_stopped_peasant_fight: "Ruas Calmas"
 ep2_locale_events.5520.t: "$tournament_locale_settlement$: Puxando os Fios"
 ep2_locale_events.5520.desc: "Um grupo de [village_woman.GetWomenMen] ocupou uma casa como seu principal ateliê de tecelagem, e consigo perceber claramente que estão tendo uma conversa animada sobre o torneio em andamento.\n\nInclino-me sobre a janela, com grande cuidado para permanecer despercebid[ROOT.Char.Custom('ES_OA')].\n\n\"... e quanto a es[gossip_knight.Custom('ES_EA')], [gossip_knight.GetFirstName]? Não acredito que o tenham flagrado ontem em flagrante!\", diz [Select_CString( village_woman.IsFemale, 'uma delas', 'um deles' )], enquanto tece alguns fios com habilidade."
 ep2_locale_events.5520.a: "Eu ouvi direito?"
 ep2_locale_events.5520.a.success: "Elas não parecem ter percebido você"
 ep2_locale_events.5520.a.success.tt: "Você descobre o segredo de [gossip_knight.Custom('ES_DelDela')] [gossip_knight.GetTitledFirstName|l]"
 ep2_locale_events.5520.a.failure: "Elas te pegam ouvindo atrás das cortinas"
 ep2_locale_events.5520.b: "Posso aprender algo com o conhecimento técnico delas..."
 ep2_locale_events.5520.c: "Imagine a quantidade de ouro que elas devem ganhar com isso..."
 ep2_locale_events.5520.d: "Não ouvi nada."
 tournament_supported_weavers: "Interesse pela Tecelagem"
 tournament_supported_weavers_desc: "Esse personagem passou um bom tempo aprendendo com as tecelãs da vila"
 tournament_weaving_taxes_modifier: "Impostos sobre Tecelagem"
 ep2_locale_events.5530.t: "Festividades"
 ep2_locale_events.5530.desc: "A música pode ser ouvida desde os campos que cercam a aldeia. Seguindo-a, chego à sua origem: a praça ricamente enfeitada. Flautas e pandeiros e todo tipo de instrumentos e cantigas!\n\nHomens e mulheres dançam em círculos por todos os cantos da praça, ora de mãos dadas, ora começam a cantar, ora giram e giram e giram."
 ep2_locale_events.5530.a: "Meus súditos ficarão encantados em me ver participando!"
 ep2_locale_events.5530.b: "A ocasião perfeita para impressionar os presentes."
 ep2_locale_events.5530.b.success: "Sua dança é impressionante"
 ep2_locale_events.5530.b.failure: "Você parece desajeitado(a)"
 ep2_locale_events.5530.c.flavor: "A batalha é como uma dança de espadas!"
 ep2_locale_events.5530.c: "Esses movimentos... eles podem ser úteis no próximo torneio!"
 ep2_locale_events.5530.d: "Essa música é tão inspiradora!"
 ep2_locale_events.5530.e: "Não devo me desviar do treinamento."
 tournament_village_dance_modifier: "Dança da Vila"
 ep2_locale_events.1070.t: "Tempos Passados"
 ep2_locale_events.1070.desc.intro: "Estou sentado(a) na taverna com um pequeno grupo de cortesãos, 'Vi aquele nobre cavaleiro segurando o cartaz de alguém', sussurra um deles e eu rapidamente me perco em meus próprios pensamentos, observando o tremeluzir das velas.\n\nEnquanto dou um gole de"
 ep2_locale_events.1070.desc.alcohol: "[ROOT.Char.Custom('RegionalAlcoholicDrink')]"
 ep2_locale_events.1070.desc.no_alcohol: "[ROOT.Char.Custom('RegionalDrink')]"
 ep2_locale_events.1070.desc.outro: "Relembro daquele momento em que [my_memory.GetDescription], com um largo sorriso.\n\n\"Você quer ouvir uma história de verdade?\" pergunto, virando-me para meus companheiros."
 ep2_locale_events.1070.a: "É o momento perfeito para uma conversa animada."
 ep2_locale_events.1070.b: "Tenho que garantir que #EMP eu#! fique bem."
 ep2_locale_events.1070.c: "Só quero continuar bebendo."
 ep2_locale_events.3020.t: "Palavras Doces"
 ep2_locale_events.3020.desc: "\"Ficarei surpreso se [enemy_knight.GetFirstName] não varrer o chão com os outros competidores!\", ouço enquanto caminho pelo acampamento. Um grupo de visitantes está comendo ao redor de um caldeirão, e vejo exatamente [enemy_knight.Custom('ES_AlAla')] [enemy_knight.GetTitledFirstNameNoTooltip|l] sentad[enemy_knight.Custom('ES_OA')] com eles.\n\n\"Você exagera, meu amigo\", diz [enemy_knight.GetSheHe] enquanto [enemy_knight.Custom('quirk_pos_standalone')|l]. Encaro [enemy_knight.GetHerHim] e lhe faço um discreto aceno com a cabeça.\n\n\"Se me derem licença\", murmura [enemy_knight.GetSheHe], levantando-se. \"Há algo que o [ROOT.Char.GetLadyLord] queira discutir?\""
 ep2_locale_events.3020.a: "\"Vencer não vai te render amigos.\""
 ep2_locale_events.3020.a.success: "[enemy_knight.GetShortUIName] escuta você"
 ep2_locale_events.3020.a.failure: "[enemy_knight.GetShortUIName] se sente insultado(a) pela sua proposta"
 ep2_locale_events.3020.b: "\"Sou voss[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetLadyLord]. Ordeno-vos que o largueis\"."
 ep2_locale_events.3020.c: "Eu quero uma luta justa."
