l_spanish:
 speeches_and_games_modifier: "Discursos e Jogos"
 speeches_and_games_modifier_desc: "O suserano deste condado, com esplendor e carisma, dominou as massas indomáveis."
 feeble_presence_modifier: "Presença Frágil"
 feeble_presence_modifier_desc: "O suserano deste condado não demonstrou habilidade para controlar a multidão."
 deft_cavalrymen_modifier: "Cavaleiros Audazes"
 deft_cavalrymen_modifier_desc: "Os cavaleiros deste personagem galopam pelo campo de batalha em alta velocidade, com destreza praticada."
 daring_scout_modifier: "Escoteiro Audaz"
 daring_scout_modifier_desc: "Este personagem viaja com um corredor intrépido explorando o caminho à frente."
 unwilling_tourneyer_modifier: "Torneio Relutante"
 unwilling_tourneyer_modifier_desc: "[contest_aptitude|E]: -10"
 generous_to_knights_modifier: "Generoso com Cavaleiros"
 generous_to_knights_modifier_desc: "[contest_aptitude|E]: +5"
 safeguards_knightly_honor_modifier: "Protege a Honra dos Cavaleiros"
 safeguards_knightly_honor_modifier_desc: "O respeito deste personagem pelos códigos que unem os nobres guerreiros parece inabalável."
 tournament_bracer_modifier: "Braçadeira Fina"
 tournament_bracer_modifier_desc: "Este personagem comprou uma braçadeira de arqueiro em um Torneio para ajudar suas habilidades."
 tournament_two_bracers_modifier: "Braçadeiras Duplas"
 tournament_two_bracers_modifier_desc: "Este personagem estranhamente comprou uma braçadeira de arqueiro para cada braço, algo que defende veementemente, mas que fez mais de um espectador rir discretamente."
 tournament_poorly_announced_modifier: "Anunciado de Forma Inadequada"
 tournament_poorly_announced_modifier_desc: "Este personagem investiu em arautos bastante deficientes."
 tournament_well_proclaimed_modifier: "Bem-Anunciado"
 tournament_well_proclaimed_modifier_desc: "Este personagem se beneficia de um arauto bem treinado e experiente."
 tournament_star_struck_modifier: "Deslumbrado"
 tournament_star_struck_modifier_desc: "Este personagem fica encantado com todo o brilho e glamour de ver uma figura famosa."
 tournament_grounded_modifier: "Com os Pés no Chão"
 tournament_grounded_modifier_desc: "Este personagem não tem interesse pela fama e não se interessa por quem busca as aparências dela."
 tournament_foreign_knight_modifier: "Cavaleiro Estrangeiro Apoiado"
 tournament_foreign_knight_modifier_desc: "Este personagem apoiou um impressionante cavaleiro estrangeiro, ganhando respeito aos olhos dos estrangeiros, mas causando consternação em outros."
 tournament_farrier_mistake_modifier: "Cavalo Ferido por Ferrador"
 tournament_farrier_mistake_modifier_desc: "A trapalhada de um aprendiz temporariamente deixou o cavalo favorito deste personagem manco.\n\n#weak A aptidão no Concurso de Cavalo Pessoal foi levemente diminuída.#!"
 tournament_performative_sensuousness_modifier: "Sensualidade Performática"
 tournament_performative_sensuousness_modifier_desc: "Quando diante de uma plateia, este personagem tende a mover seu corpo de uma maneira... arrebatadora."
 tournament_ambidextrous_modifier: "Ambidestro"
 tournament_ambidextrous_modifier_desc: "A habilidade deste personagem com uma lâmina em ambas as mãos lhe dá uma vantagem surpreendente ao cruzar espadas."
 tournament_ambisinister_modifier: "Ambisinistro"
 tournament_ambisinister_modifier_desc: "A falta de jeito deste personagem se mostrou notável."
 tournament_fashionable_duelist_modifier: "Duelista Fashion"
 tournament_fashionable_duelist_modifier_desc: "As escolhas de vestuário deste personagem em um duelo podem não ser particularmente propícias à vitória, mas certamente ficam bem."
 tournament_charm_resistant_modifier: "Resistente ao Encanto"
 tournament_charm_resistant_modifier_desc: "Este personagem parece ser um tanto resistente aos encantos amorosos."
 tournament_child_friendly_modifier: "Amigo das Crianças"
 tournament_child_friendly_modifier_desc: "Este personagem tem um verdadeiro talento para se conectar com as crianças."
 tournament_soaked_modifier: "Encharcado"
 tournament_soaked_modifier_desc: "Este personagem ficou completamente encharcado depois que alguém derramou uma bebida sobre ele, deixando-o com um cheiro estranho."
 tournament_public_proselytiser_modifier: "Evangelizador Público"
 tournament_public_proselytiser_modifier_desc: "Este personagem provou sua piedade ao pregar para a multidão em um Torneio."
 tournament_sports_enthusiast_modifier: "Entusiasta de Esportes"
 tournament_sports_enthusiast_modifier_desc: "O entusiasmo deste personagem pelos eventos esportivos transparece o tempo todo."
 tournament_low_blower_modifier: "Jogador Desleal"
 tournament_low_blower_modifier_desc: "Este personagem desenvolveu certa reputação por lutar de forma desleal no ringue de duelos."
 tournament_roguish_duelist_modifier: "Duelista Trapaceiro"
 tournament_roguish_duelist_modifier_desc: "O charme e a malícia deste personagem com uma espada na mão enfurecem competidores e fascinam espectadores."
 tournament_ended_rightly_modifier: "Finalizado Corretamente"
 tournament_ended_rightly_modifier_desc: "Este personagem foi constrangido em um duelo, pois seu oponente o humilhou jogando nele o pomo solto de uma espada!"
 tournament_melee_protector_modifier: "Protetor do Combate Corpo a Corpo"
 tournament_melee_protector_modifier_desc: "As costas deste personagem estão sendo protegidas por uma pessoa surpreendente.\n\n#weak Este modificador durará até o final do Concurso de Combate Corpo a Corpo.#!"
 tournament_house_unity_modifier: "Unidade da Casa"
 tournament_house_unity_modifier_desc: "Esta Casa provou sua coragem no combate corpo a corpo, recebendo reconhecimento de outros como um exemplo primordial de uma frente unida."
 tournament_reckoning_modifier: "Um Acerto de Contas"
 tournament_reckoning_modifier_desc: "Este personagem pagará por sua ganância em algum momento no futuro. Não sabe quando, apenas que irá pagar."
 tournament_loving_parent_modifier: "Pai/Mãe Amoroso(a)"
 tournament_loving_parent_modifier_desc: "Este personagem provou ser uma figura parental amorosa, pelo menos para seu herdeiro."
 tournament_annoyed_locals_modifier: "Locais Aborrecidos"
 tournament_annoyed_locals_modifier_desc: "A multidão deste condado teve que passar seu tempo ouvindo pregações quando estava tentando assistir a um torneio."
