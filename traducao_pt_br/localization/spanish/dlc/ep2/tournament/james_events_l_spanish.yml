l_spanish:
 tournament_events.8000.t: "Um Belo Favor"
 tournament_events.8000.desc.intro: "Enquanto me preparo para minha próxima partida, avisto [favor_giver_1.GetName] me saudando ao acenar com um [favor_giver_1.Custom('GetRandomFavor')], oferecendo-me seu favor."
 tournament_events.8000.desc.mid.two: "\n\nAntes que eu possa responder, [favor_giver_2.GetName] aparece, segurando um [favor_giver_2.Custom('GetRandomFavor')] para mim e insistindo que eu aceite seu favor!"
 tournament_events.8000.desc.mid: "Sinto-me afortunad[ROOT.Char.Custom('ES_OA')] de ter conquistado o apoio e o afeto de [favor_giver_1.GetSheHe] no âmbito do cortejo e da cavalaria."
 tournament_events.8000.desc.outro.homo: "\n\nMal sabe [favor_giver_1.GetSheHe] que [favor_giver_1.GetWomenMen] pouco me atraem..."
 tournament_events.8000.desc.outro: "\n\nSeu interesse em mim parece genuíno, e nada poderia ser mais galante do que vencer um confronto por um[favor_giver_1.Custom('ES_XA')] nobre [favor_giver_1.GetLadyLord]."
 tournament_events.8000.a: "Eu aceito, [favor_giver_1.GetTitledFirstNameNoTooltip|l]."
 tournament_events.8000.b: "[favor_giver_2.GetTitledFirstNameNoTooltip], quanta generosidade!"
 tournament_events.8000.c: "Tenho uma partida na qual me concentrar."
 handkerchief: "lenço"
 flower: "flor"
 wreath: "coroa"
 ring: "anel"
 soulmate_tournament: "[CHARACTER.GetShortUIName|U] conquistou o cortejo de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetShortUINameNoTooltip )] durante um torneio"
 soulmate_tournament_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] conquistou o cortejo de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltip )] durante um torneio"
