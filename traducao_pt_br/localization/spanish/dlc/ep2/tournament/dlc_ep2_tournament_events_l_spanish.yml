l_spanish:
 ##### TOURNAMENT #####
 tournament_events.0050.t: "Chegada ao Torneio"
 tournament_events.0050.desc: "Cheguei ao local do torneio, aqui em [activity.GetCurrentPhase.GetLocation.GetName].\n\nEmbora nem todos os festeiros tenham chegado ainda, multidões de pessoas vagam pelos arredores coloridos, todos ansiosos pelas próximas demonstrações de habilidade e destreza.\n\n"
 tournament_events.0050.murder: "Eu, por outro lado, tenho ambições um pouco maiores do que apenas me divertir. Se eu jogar minhas cartas direito, [starting_intent.GetFirstName] não verá o fim da cerimônia..."
 tournament_events.0050.seduce: "A primeira coisa que devo fazer, é claro, é conquistar o coração de [starting_intent.GetFirstName]!"
 tournament_events.0050.befriend: "Que lugar melhor do que este para eu fazer uma amizade sólida com [starting_intent.GetFirstName]!"
 tournament_events.0050.win: "Não há tempo a perder: preciso começar a me preparar! Eu devo ser um vencedor, a qualquer custo!"
 tournament_events.0050.recruit: "Já vi muitos candidatos prontos para serem recrutados para as fileiras dos meus [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]!"
 tournament_events.0050.relax: "Existem poucos lugares tão excelentes para aliviar o estresse e se divertir como um Torneio, e pretendo aproveitar ao máximo!"
 tournament_events.0050.a: "Mal posso esperar para começar!"
 #START
 tournament_events.0100.t: "Abertura de $tournament_header$"
 tournament_events.0100.desc: "O torneio está finalmente acontecendo!\n\n"
 tournament_events.0100.host: "Muitos vieram para os meus terrenos em [activity.GetCurrentPhase.GetLocation.GetName], ansiosos para provar seu valor ou simplesmente aproveitar o espetáculo."
 tournament_events.0100.contestant: "Assim como muitos outros que vieram para [activity.GetCurrentPhase.GetLocation.GetName], aguardando ansiosamente as competições, ocupo meu tempo socializando e preparando meu equipamento."
 tournament_events.0100.spectator: "Muitos vieram aos meus terrenos de [activity.GetCurrentPhase.GetLocation.GetName], tanto para competir quanto, como eu, para se entreter."
 tournament_events.0100.closing: "\n\nO sol sobe mais alto no céu, e as sombras se encurtam. Se eu for competir na competição de [activity.GetCurrentPhase.GetPhase.GetName|l] , preciso me certificar de que vou me classificar. Ela começará em breve."
 tournament_events.0100.a: "Não há tempo a perder!"
 #END
 tournament_events.0150.t: "Conclusão de $tournament_header$"
 tournament_events.0150.desc: "O sol se põe no último dia do Torneio, e as multidões começam a se dispersar. Eu me pego pensando nos resultados:\n\n"
 tournament_events.0150.melee: "A equipe [melee_winner.Custom('ES_DelDela')] [melee_winner.GetTitledFirstName|l] saiu vitoriosa na contenda.\n"
 tournament_events.0150.melee_self: "Meu time se destacou no Combate Corpo a Corpo.\n"
 tournament_events.0150.archery: "[archery_winner.GetTitledFirstName|U] teve a melhor mira de todos no Tiro com Arco.\n"
 tournament_events.0150.archery_self: "Eu tive a melhor mira de todos no Tiro com Arco.\n"
 tournament_events.0150.recital: "A maestria dos versos [recital_winner.Custom('ES_DelDela')] [recital_winner.GetTitledFirstName|l] lhe garantiu a vitória no recital com toda justiça.\n"
 tournament_events.0150.recital_self: "Minha maestria em versos me tornou o vencedor no Recital.\n"
 tournament_events.0150.joust: "[joust_winner.GetTitledFirstName|U] quebrou inúmeras lanças para provar sua qualidade na Justa.\n"
 tournament_events.0150.joust_self: "Eu quebrei inúmeras lanças para provar minha qualidade na Justa.\n"
 tournament_events.0150.wrestling: "[wrestling_winner.GetTitledFirstName|U] foi um[wrestling_winner.Custom('ES_XA')] oponente indomável que conquistou o primeiro lugar na luta.\n"
 tournament_events.0150.wrestling_self: "Fui um[ROOT.Char.Custom('ES_XA')] oponente indomável e conquistei o primeiro lugar na luta livre.\n"
 tournament_events.0150.duel: "A superioridade [duel_winner.Custom('ES_DelDela')] [duel_winner.GetTitledFirstName|l] com a espada fez com que ele/ela levasse para casa o prêmio do duelo.\n"
 tournament_events.0150.duel_self: "Minha superioridade com a espada me levou a levar o prêmio no Duelo.\n"
 tournament_events.0150.board_game: "A mente afiada de [board_game_winner.Custom('ES_DelDela')] [board_game_winner.GetTitledFirstName|l] superou todos os adversários para vencer no jogo de tabuleiro.\n"
 tournament_events.0150.board_game_self: "Minha mente afiada superou todos os adversários para vencer os Jogos de Tabuleiro.\n"
 tournament_events.0150.horse_race: "O cavalo [horse_race_winner.Custom('ES_DelDela')] [horse_race_winner.GetTitledFirstName|l] terminou em primeiro na corrida de cavalos.\n"
 tournament_events.0150.horse_race_self: "Meu cavalo terminou em primeiro lugar na Corrida de Cavalos.\n"
 tournament_events.0150.murdersuccess: "\n[finishing_intent.GetFirstName] teve o fim que tão bem merecia.\n"
 tournament_events.0150.murderfailure: "\n[finishing_intent.GetFirstName] escapou das minhas garras desta vez.\n"
 tournament_events.0150.seducesuccess: "\nMinhas persuasões carnais em [finishing_intent.GetFirstName] tiveram sucesso.\n"
 tournament_events.0150.seducefailure: "\n[finishing_intent.GetFirstName] resistiu minhas persuasões carnais.\n"
 tournament_events.0150.befriendsuccess: "\n![finishing_intent.GetFirstName] e eu me tornei grandes amigos!\n"
 tournament_events.0150.befriendfailure: "\n[finishing_intent.GetFirstName] e eu ainda não conseguimos estabelecer uma amizade sólida.\n"
 tournament_events.0150.winsuccess: "\nConsegui alcançar meu objetivo de vencer uma competição!\n"
 tournament_events.0150.winfailure: "\nNão consegui vencer nenhuma competição.\n"
 tournament_events.0150.knightsuccess: "\nReforcei as fileiras dos meus [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')].\n"
 tournament_events.0150.knightfailure: "\nNão consegui encontrar bons candidatos para se juntarem às fileiras dos meus [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')].\n"
 tournament_events.0150.end: "\nEstou ansioso(a) pela próxima!"
 tournament_events.0150.a: "Que grande ocasião!"
 tournament_events.0150.b: "Talvez umas palavras, já que sou [ROOT.Char.Custom('ES_ElLa')] anfitri[ROOT.Char.Custom('ES_OnOna')]…"
 tournament_events.0150.c: "[tournament_champion.GetFirstNameNoTooltip] merece um bônus pela sua vitória!"
 tournament_events.0150.b.success: "Suas palavras lhe trazem algum reconhecimento."
 tournament_events.0150.b.failure: "Ninguém presta muita atenção."
 tournament_events.0150.legendseeddrop: "\nPela terceira vez eu venci um Torneio. Contos sobre minhas realizações já estão se espalhando por toda parte.\n"
 tournament_events.0160.t: "$tournament_header$ Os Despojos"
 tournament_events.0160.desc: "As competições finalmente terminaram, e meu prêmio anunciado da mão [marriage_prize.Custom('ES_DelDela')] [marriage_prize.GetTitledFirstName|l] em casamento a um vencedor digno não foi esquecido pelos competidores; nem pelo meu [ROOT.Char.Custom2('RelationToMeShort', marriage_prize)]…\n\n"
 tournament_events.0160.a: "Parece que eu mesmo(a) ganhei você, [ROOT.Char.Custom2('RelationToMeShort', marriage_prize)]!"
 tournament_events.0160.b: "Parabéns, [bachelor_1.GetFirstNameNoTooltip]!"
 tournament_events.0160.c: "[bachelor_2.GetFirstNameNoTooltip] será um[bachelor_2.Custom('ES_XA')] grande [marriage_prize.Custom('GetBrideGroom')], [bachelor_2.GetFirstNameNoTooltip]!"
 tournament_events.0160.d: "Cuidai de [marriage_prize.GetSheHe] , [bachelor_3.GetFirstNameNoTooltip]!"
 tournament_events.0160.e: "Eu... mudei de ideia."
 tournament_events.0160.f: "Eu não me referia a mim mesmo(a)..."
 tournament_events.0160.g: "Bem..."
 tournament_events.0161.desc: "As competições finalmente terminaram e o prêmio anunciado [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l] de mão [marriage_prize.Custom('ES_DelDela')] [marriage_prize.GetTitledFirstName|l] em casamento a um vencedor digno não foi esquecido pelos competidores — nem por seu [ROOT.Char.Custom2('RelationToMeShort', marriage_prize)]…\n\n"
 tournament_events.0161.a: "Venha, meu amor!"
 tournament_events.0161.b: "Absurdo."
 tournament_events.0161.c: "Bem..."
 #ACCIDENT PING
 tournament_events.0701.t: "$tournament_contest_header$ Acidente"
 tournament_events.0701.desc: "Seu [ROOT.Char.Custom2('RelationToMeShort', accident_victim)], [accident_victim.GetName], foi morto em um acidente bizarro com uma maça durante a competição de [activity.GetCurrentPhase.GetPhase.GetName|l]!"
 tournament_events.0701.a: "Trágico..."
 tournament_accident_death_msg_title: "Morte Acidental"
 #CONTESTANT INVALIDATION
 tournament_events.0800.t: "$tournament_contest_header$ Desistência"
 tournament_events.0800.wounded: "Receio que meus ferimentos sejam graves demais para continuar neste torneio. Não farei uma boa apresentação neste estado e não devo tentar mais ferimentos..."
 tournament_events.0800.disease: "Receio que minha doença seja muito grave para eu continuar neste torneio. Não farei uma boa apresentação neste estado e não devo tentar a ira do médico..."
 tournament_events.0800.health: "Receio que meus humores me restrinjam de continuar neste torneio. Não farei uma boa apresentação neste estado e não devo tentar a ira do médico..."
 tournament_events.0800.a: "Não consigo continuar."
 tournament_events.0800.b: "Jamais, eu posso fazer isso!"
 tournament_events.0801.t: "$tournament_events.0800.t$"
 tournament_events.0801.desc: "[contest_withdrawal.GetTitledFirstName] formalmente desistiu das competições."
 tournament_events.0801.wounded: "Parece que seus ferimentos são graves demais para arriscar continuar."
 tournament_events.0801.disease: "Parece que sua doença piorou demais para continuar."
 tournament_events.0801.health: "Parece que os humores estão desequilibrados demais para continuar."
 tournament_events.0801.a: "Uma pena."
 #WAGERING
 tournament_events.1000.t: "$tournament_contest_header$ Faça suas apostas"
 tournament_events.1000.desc: "Olhando para o apostador à luz fraca da taverna, pondero sobre as probabilidades que ele grita por cima das cabeças dos apostadores aglomerados.\n\n"
 tournament_events.1000.horse_race: ""O/A [wager_top_contestant.Custom('ContestHorseRaceGender')] [wager_top_contestant.Custom('ES_DelDela')] [wager_top_contestant.GetTitledFirstName|l], #EMP [wager_top_contestant.Custom('GetContestHorseRaceName')]#!, é o favorito! Quatro para um por #EMP [wager_top_contestant.Custom('GetContestHorseRaceName')]#!!"."
 tournament_events.1000.fallback: ""[wager_top_contestant.GetTitledFirstName|l] é [wager_top_contestant.Custom('ES_ElLa')] favorit[wager_top_contestant.Custom('ES_OA')] na fase [activity.GetCurrentPhase.GetPhase.GetName|l]. Quatro para um em [wager_top_contestant.GetNameNoTooltip]!"."
 tournament_events.1000.a: "Ah, eu vou apostar em mim mesmo(a)!"
 tournament_events.1000.a.horse: "Meu melhor cavalo, #EMP [ROOT.Char.Custom('GetContestHorseRaceName')]#!, pode vencer."
 tournament_events.1000.a.best_horse: "Sim, #EMP [ROOT.Char.Custom('GetContestHorseRaceName')]#! vai vencer!"
 tournament_events.1000.b: "[wager_top_contestant.GetFirstNameNoTooltip] é uma aposta segura."
 tournament_events.1000.b.horse: "#EMP [wager_top_contestant.Custom('GetContestHorseRaceName')]#! é realmente uma aposta segura."
 tournament_events.1000.c: "Por outro lado, [wager_second_contestant.GetFirstNameNoTooltip] está bem próximo."
 tournament_events.1000.c.horse: "Por outro lado, [wager_second_contestant.Custom('GetContestHorseRaceName')] de [wager_second_contestant.GetFirstNameNoTooltip] está em segundo lugar, bem perto."
 tournament_events.1000.d: "Meu campeão[wager_champion_contestant.Custom('ES_OnOna')], [wager_champion_contestant.GetFirstNameNoTooltip], triunfará!"
 tournament_events.1000.e: "Hm, [wager_underdog_contestant.GetFirstNameNoTooltip] é um azarão improvável."
 tournament_events.1000.e.horse: "Ninguém espera uma vitória de #EMP [wager_underdog_contestant.Custom('GetContestHorseRaceName')]#! de [wager_underdog_contestant.GetFirstNameNoTooltip]."
 tournament_events.1000.f: "O que posso conseguir com o meu [ROOT.Char.Custom2('RelationToMeShort', wager_flavor_contestant)], [wager_flavor_contestant.GetFirstNameNoTooltip]?"
 tournament_events.1000.f.horse: "O que eu consigo pelo cavalo de meu [ROOT.Char.Custom2('RelationToMe', wager_flavor_contestant)] , #EMP [wager_flavor_contestant.Custom('GetContestHorseRaceName')]#!?"
 tournament_events.1000.g: "Tenho um bom pressentimento sobre est[mysterious_stranger.Custom('ES_EA')] [mysterious_stranger.GetFirstNameNoTooltip] de [attending_barony.GetNameNoTierNoTooltip]."
 tournament_events.1000.g.horse: "Tenho um bom pressentimento sobre #EMP [mysterious_stranger.Custom('GetContestHorseRaceName')]#! de [mysterious_stranger.GetFirstNameNoTooltip] ."
 tournament_events.1000.h: "Não, isso é uma má ideia..."
 tournament_events.1000.bet_debug_tt: "#D tournament_wager_target_score_value#!: [SCOPE.ScriptValue('tournament_wager_target_score_value')|V]\n#D tournament_wager_top_score_value#!: [SCOPE.ScriptValue('tournament_wager_top_score_value')|V]\n#D tournament_wager_bottom_score_value#!: [SCOPE.ScriptValue('tournament_wager_bottom_score_value')|V]\n#D tournament_wager_top_minus_bottom_score_value:#! [SCOPE.ScriptValue('tournament_wager_top_minus_bottom_score_value')|V]\n#D tournament_wager_target_minus_bottom_value#!: [SCOPE.ScriptValue('tournament_wager_target_minus_bottom_value')|V]\n#D tournament_wager_odds_percent_value#!: [SCOPE.ScriptValue('tournament_wager_odds_percent_value')|V]\n#D tournament_wager_payout_value#!: [SCOPE.ScriptValue('tournament_wager_payout_value')|V]"
 tournament_events.1000.winnings_tt: "Se [wager_target.GetShortUIName] [wager_target.LocalPlayerString( 'vences', 'vence' )]:\nGanho de #positive_value [SCOPE.ScriptValue('tournament_wager_payout_value')|0]#! @gold_icon!"
 tournament_events.1000.horse_winnings_tt: "Se o cavalo de [wager_target.LocalPlayerString( 'tus cuadras', wager_target.GetShortUIName )] vencer a corrida:\nGanho de #positive_value [SCOPE.ScriptValue('tournament_wager_payout_value')|0]#! @gold_icon!"
 #PASSAGE OF ARMS
 tournament_events.1100.t: "Passagem de Armas"
 tournament_events.1100.desc: "Inquiet[pas_darmes_instigator.Custom('ES_OA')] à espera de que comecem as competições, ou simplesmente desejoso[pas_darmes_instigator.Custom('ES_OA')] de exibir sua habilidade, meu [ROOT.Char.Custom2('RelationToMeShort', pas_darmes_instigator)], [pas_darmes_instigator.GetFullName] , proclamou um “passo de armas” nos arredores de [activity.GetCurrentPhase.GetLocation.GetName].\n\n“#EMP Si algún [pas_darmes_instigator.Custom('MountedWarriorTerm')] diestro desea pasar, ¡que se enfrente a mí o caiga en desgracia!#!”.\n\nDizem que ele fica com as esporas de todos que derrota e que qualquer dama que deseje passar sem escolta deve deixar uma peça como garantia para ser resgatada mais tarde em seu nome."
 tournament_events.1100.a: "#EMP Eso#! isso sim é ser um [ROOT.Char.Custom('MountedWarriorTerm')|l]!"
 tournament_events.1100.b: "Que divertido!"
 tournament_events.1100.c: "Preciso ver esse [pas_darmes_instigator.GetWomanMan]!"
 tournament_events.1100.d: "Essa tolice é proibida."
 pas_darmes_token_claim_tt: "Cada [spouse|lE], progenitor e [Concept( 'child', 'vástago' )|E] de [pas_darmes_victim.GetName]"
 tournament_events.1101.t: "$tournament_events.1100.t$"
 tournament_events.1101.desc: "Sem dúvida atraíd[pas_darmes_instigator.Custom('ES_OA')] ao meu torneio pela promessa de glória e pela abundância de adversários, um[pas_darmes_instigator.Custom('ES_XA')] [pas_darmes_instigator.Custom('MountedWarriorTerm')] estrangeir[pas_darmes_instigator.Custom('ES_OA')] proclamou um "passo de armas" perto de [activity.GetCurrentPhase.GetLocation.GetName].\n\nEle se faz chamar "[pas_darmes_instigator.GetFullName]", e afirma vir das distantes terras de [exotic_origin.GetDeJureLiege.GetNameNoTooltip]. Todo [ROOT.Char.Custom('MountedWarriorTerm')] que deseje passar por seu acampamento deverá quebrar lanças com [pas_darmes_instigator.GetSheHe], ou então perderá seu orgulho.\n\nSer tratada assim por um[pas_darmes_instigator.Custom('ES_XA')] aventur[pas_darmes_instigator.Custom('ES_OA')] estrangeir[pas_darmes_instigator.Custom('ES_OA')] sem dúvida enfurece a nobreza de [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip]."
 tournament_events.1101.a: "Ótimo, nossos lutadores devem estar preparados."
 tournament_events.1101.b: "Acho que não. Ponham esse vagabundo para fora[pas_darmes_instigator.Custom('ES_OA')]."
 tournament_events.1101.c: "Isso é um verdadeiro $knight_culture_player_no_tooltip_lowercase$! Uma verdadeira inspiração!"
 tournament_events.1102.t: "$tournament_events.1100.t$"
 tournament_events.1102.desc: "Desejos[pas_darmes_instigator.Custom('ES_OA')] de demonstrar seu valor, meu [ROOT.Char.Custom2('RelationToMeShort', pas_darmes_instigator)] [pas_darmes_instigator.GetFullName], declarou um "paso de armas", bloqueando a rota principal para [activity.GetCurrentPhase.GetLocation.GetName].\n\nCom [pas_darmes_instigator.GetSheHe] vai meu [ROOT.Char.Custom2('RelationToMeShort', pas_darmes_2)] [pas_darmes_2.GetFullName], e um grupo de nobres menores de [pas_darmes_instigator.GetLiege.GetPrimaryTitle.GetNameNoTooltip] com algo a provar.\n\nMe disseram que juraram quebrar trezentas lanças antes de considerar sua missão concluída."
 tournament_events.1102.a: "Boa sorte para eles."
 tournament_events.1102.a.tt: "A passagem de armas em [activity.GetCurrentPhase.GetLocation.GetName] continuará"
 tournament_events.1102.b: "Não na #EMP minha#! [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip|l]."
 tournament_pas_darmes_forbidden_tt: "A passagem de armas em [activity.GetCurrentPhase.GetLocation.GetName] terminará"
 tournament_events.1120.t: "Difícil Conquistar"
 tournament_events.1120.desc: "[pas_darmes_instigator.GetTitledFirstName|U], [Select_CString( pas_darmes_instigator.IsFemale, 'a ostentosa', 'o ostentoso' )] [pas_darmes_instigator.Custom('MountedWarriorTerm')] que guardava sua passagem desafiando todos os que se aproximavam, já teve uma luta a mais.\n\nDiz-se que [pas_darmes_victim.Custom('ES_ElLa')] [pas_darmes_victim.GetTitledFirstName|l] lhe infligiu um ferimento terrível, abrindo o caminho para que os nobres voltem a passar livremente."
 tournament_events.1120.a: "Esses são os riscos de uma vida galante."
 tournament_events.1120.a.dead: "Uma maneira honrosa de partir."
 tournament_events.1130.opening: "[pas_darmes_victim.Custom2('AppropriateGreeting', ROOT.Char)]"
 tournament_events.1130.desc: "Quando viajava a [activity.GetCurrentPhase.GetLocation.GetName] com meus servos, [pas_darmes_instigator.GetFullName] deteve nossa comitiva e teve a ousadia de exigir uma lembrança pessoal…\n\nNão tive escolha a não ser lhe entregar aquela maldita lembrança… Disse que, se eu quisesse recuperá-la, deveria enviar um desafiante na direção de [pas_darmes_instigator.GetSheHe]."
 tournament_events.1130.a: "Algo deve ser feito."
 tournament_events.1140.t: "O orgulho de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip]"
 tournament_events.1140.desc: "Enquanto respiro montado em meu cavalo, admirando o burburinho de [activity.GetCurrentPhase.GetLocation.GetName], diviso esse tão aclamad[pas_darmes_instigator.Custom('ES_OA')] lutador[pas_darmes_instigator.Custom('ES_OA')] [pas_darmes_instigator.GetFullName], que defende o acampamento de sua passagem de armas.\n\n"
 tournament_events.1140.skilled: "Algum desafiante menor se afasta mancando pela estrada enquanto [pas_darmes_instigator.Custom('ES_ElLa')] [pas_darmes_instigator.Custom('MountedWarriorTerm')] retorna satisfeit[pas_darmes_instigator.Custom('ES_OA')] ao seu assento, admirando as esporas que acabou de ganhar.\n\n"
 tournament_events.1140.unskilled: "Um[pas_darmes_instigator.Custom('ES_XA')] [pas_darmes_instigator.Custom('MountedWarriorTerm')] muito satisfeit[pas_darmes_instigator.Custom('ES_OA')] passa por mim e se inclina em respeito enquanto [pas_darmes_instigator.GetFirstNameNoTooltip] observa de seu assento, claramente machucad[pas_darmes_instigator.Custom('ES_OA')] por uma derrota.\n\n"
 tournament_events.1140.wounded: "[Select_CString( pas_darmes_instigator.IsFemale, 'Machucada e cheia de hematomas', 'Machucado e cheio de hematomas' )], [pas_darmes_instigator.GetFirstNameNoTooltip] faz uma careta de dor quando me aproximo. "Não se pode ganhar sempre", ri, semicerrando os olhos para mim."
 tournament_events.1140.fallback: "Ele se levanta de um salto quando me vê, ansios[pas_darmes_instigator.Custom('ES_OA')] por mais uma luta, mas logo percebe quem eu sou. Semicerrando os olhos com um sorriso, [pas_darmes_instigator.GetFirstNameNoTooltip] faz uma reverência: Bem-vind[ROOT.Char.Custom('ES_OA')], [ROOT.Char.Custom('FormOfAddressForLiege')] de [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]."
 tournament_events.1140.a: "Vou lhes mostrar como luta um[ROOT.Char.Custom('ES_XA')]#EMP [ROOT.Char.GetTitleAsNameNoTooltip|l]#!."
 tournament_events.1140.a.wounded: "Nem você vencerá este."
 tournament_events.1140.a.success: "Você derrota [pas_darmes_instigator.GetNameNoTooltip]"
 tournament_events.1140.a.failure: "[pas_darmes_instigator.GetNameNoTooltip] supera você"
 tournament_events.1140.b: "Você é um[pas_darmes_instigator.Custom('ES_XA')] guerreiro[pas_darmes_instigator.Custom('ES_OA')] poderoso[pas_darmes_instigator.Custom('ES_OA')]. Eu poderia contar com você."
 tournament_events.1140.b.success: "Você convence [pas_darmes_instigator.GetNameNoTooltip]"
 tournament_events.1140.b.failure: "[pas_darmes_instigator.GetNameNoTooltip] recusa sua oferta"
 tournament_events.1140.c: "Acho que já chega."
 tournament_events.1140.d: "Continue assim!"
 tournament_events.1141.t: "$tournament_events.1140.t$"
 tournament_events.1141.desc: "Um grupo de curiosos se reúne enquanto [pas_darmes_instigator.GetFirstName] e eu montamos a cavalo e tomamos posição. [pas_darmes_instigator.GetSheHe|U] , sem hesitar, investe de repente, lança em riste, em uma rajada de poeira e cascos trovejantes!\n\nCorro para a frente, concentrando toda a minha atenção na ponta da lança que balança e avança ao encontro de [pas_darmes_instigator.GetSheHe]."
 tournament_events.1141.win: "\n\nMinha lança se despedaça contra seu escudo com um estrondo retumbante, fazendo com que [pas_darmes_instigator.GetHerHim] o faça recuar na sela enquanto passo voando por ele."
 tournament_events.1141.lose: "\n\nSinto seu cabo se quebrar contra meu escudo com um estrondo poderoso, me jogando para trás na sela enquanto [pas_darmes_instigator.GetSheHe] passa voando ao meu lado."
 tournament_events.1141.kill_me: "\n\nDe repente, meu rosto está muito quente e úmido. Tento falar, mas mal consigo manter os olhos abertos. O semblante preocupado de [pas_darmes_instigator.GetFirstNameNoTooltip] aparece quando o mundo escurece..."
 tournament_events.1141.beat_me: "\n\n me ergue, removendo lascas de minha armadura. 'Você lutou bem, mas perdeu.' [pas_darmes_instigator.GetSheHe|U] sorri, estendendo a mão."
 tournament_events.1141.kill_them: "\n\nAo chegar ao fim da corrida, viro meu cavalo sorrindo, procurando [pas_darmes_sinstigator.GetFirstNameNoTooltip]. Vejo sua forma amassada de bruços na poeira, com o cavalo cutucando seu pé com o focinho."
 tournament_events.1141.beat_them: "\n\nDou meia-volta rapidamente, [pas_darmes_instigator.GetHerHim] o ergo de pé e verifico se tem ferimentos. “Vou ficar bem”, rosna. “Aqui, minhas esporas.”"
 tournament_events.1141.a: "'É apenas um arranhão..."
 tournament_events.1141.a.death: "#weak gorgolejo#!"
 tournament_events.1141.b: "Eu disse que mostraria para você!"
 tournament_events.1141.b.death: "[pas_darmes_instigator.GetFirstNameNoTooltip]? #EMP [pas_darmes_instigator.GetFirstNameNoTooltip]?!#!"
 tournament_events.1150.t: "$tournament_header$ Restaurando a Honra"
 tournament_events.1150.desc: "[pas_darmes_instigator.Custom('ES_ElLa')|U] [pas_darmes_instigator.GetTitledFirstName|l] senta-se à beira da estrada afiando sua espada enquanto me aproximo de seu acampamento precário.\n\n"Ah, eu já me perguntava quando vocês mostrariam a cara, bom[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip]", sorri com deboche, tirando uma peça de roupa de seu cinto. "Suponho que vieram recuperar isto?".\n\n"
 tournament_events.1150.skilled: "Estou bem ciente da reputação marcial desta [pas_darmes_instigator.GetWomanMan], mas o ego dela será sua queda."
 tournament_events.1150.unskilled: "Sabe-se que est[pas_darmes_instigator.Custom('ES_EA')] [pas_darmes_instigator.GetWomanMan] é mais de bravatas do que de habilidade, mas não devo subestimar[pas_darmes_instigator.GetHerHim]."
 tournament_events.1150.wounded: "De qualquer forma, as feridas certamente me dariam uma vantagem..."
 tournament_events.1150.fallback: "Minha honra foi posta em xeque por um[ROOT.Char.Custom('ES_XA')] mero [ROOT.Char.Custom('MountedWarriorTerm')]..."
 tournament_events.1150.a: "Venha, vamos lutar."
 tournament_events.1150.a.wounded: "Vou te dar mais uma ferida: uma para lembrar #EMP de mim#!."
 tournament_events.1150.a.success: "Você derrota [pas_darmes_instigator.Custom('ES_AlAla')] [pas_darmes_instigator.GetTitledFirstNameNoTooltip|l]"
 tournament_events.1150.a.failure: "[pas_darmes_instigator.GetTitledFirstNameNoTooltip|l] supera você"
 tournament_events.1150.b: "Fique com seu trapo, bom[pas_darmes_instigator.Custom('ES_XA')] [pas_darmes_instigator.Custom('MountedWarriorTerm')]."
 #FLAVOR
 tournament_events.1200.t: "Repreensão Religiosa"
 tournament_events.1200.desc: "Enquanto nobres e plebeus se preparam com entusiasmo para as competições e entretenimentos que se aproximam, [angry_clergy.Custom('ES_ElLa')] [angry_clergy.GetTitledFirstName|l] deixa clara sua desaprovação pelos [angry_clergy.GetFaith.AltPriestTermPlural].\n\n“Este torneio é um veículo de pecado; bons [angry_clergy.GetFaith.GetAdherentNamePluralNoTooltip] morrerão em busca do orgulho; derramar o sangue uns dos outros por bugigangas; e renunciarão à [angry_clergy.GetFaith.PositiveAfterLife] por fama.”\n\n“Essas inclinações devem ser canalizadas, voltadas contra os inimigos [angry_clergy.GetFaith.HighGodNamePossessive], não atiçadas nem mergulhadas em vaidade.”"
 tournament_events.1200.a: "Eles não podem defender [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip] sem um pouco de prática!"
 tournament_events.1200.a.success: "Convence [angry_clergy.Custom('ES_AlAla')] [angry_clergy.GetTitledFirstNameNoTooltip|l]"
 tournament_events.1200.a.failure: "Você não consegue mudar a opinião [angry_clergy.Custom('ES_DelDela')] [angry_clergy.GetTitledFirstNameNoTooltip|l]"
 tournament_events.1200.b: "Do meu ponto de vista, você verá as virtudes da competição."
 tournament_events.1200.b.success: "Você conquistou [angry_clergy.Custom('ES_AlAla')] [angry_clergy.GetTitledFirstNameNoTooltip|l]"
 tournament_events.1200.b.failure: "[angry_clergy.GetTitledFirstNameNoTooltip] está desdenhoso"
 tournament_events.1200.c: "Um bom ponto, eu não vou competir."
 tournament_events.1200.d: "Oh, pare com isso, [angry_clergy.GetFaith.PriestNeuter], deixe-os se divertirem."
 tournament_events.1230.t: "Da Pobreza ao Nobreza"
 tournament_events.1230.desc: "Enquanto percorro os terrenos do torneio, observando o ambiente e debatendo as técnicas dos competidores em treino, [Select_CString( battle_peasant.IsFemale, 'uma mulher', 'um homem' )] em particular chama minha atenção.\n\nCada um de seus movimentos está impregnado de graça, eficiência e compostura, e não demora a dar conta tanto da palha de enchimento quanto do parceiro de treino.\n\nQuando peço que revele de qual casa nobre descende, seus olhos se arregalam antes de baixarem para o chão. "Meu [ROOT.Char.GetLadyLord]! Sou apenas [Select_CString( battle_peasant.IsFemale, 'uma camponesa', 'um camponês' )], nada mais", gagueja, fazendo uma profunda reverência."
 tournament_events.1230.a: "Não, você será meu [Select_CString( battle_peasant.IsFemale, 'campeona', 'campeón' )]!"
 tournament_events.1230.b: "Seu destino mudou, [battle_peasant.Custom('MountedWarriorTerm')]."
 tournament_events.1230.b.tt: "Torna-se um [battle_peasant.Custom('KnightCulture')]"
 tournament_events.1230.c: "Eu preciso ver você competir! Serei seu(a) patrocinador(a)."
 tournament_events.1230.c.tt: "Se junta à sua [activity.GetName|l]"
 tournament_events.1230.d: "Argh, uma[battle_peasant.Custom('ES_XA')] #EMP [Select_CString( battle_peasant.IsFemale, 'camponesa', 'camponês' )]?!#! Que vergonha…"
 tournament_events.1230.d.tt: "[battle_peasant.GetName] desaparece"
 tournament_events.1240.t: "$tournament_header$ Ao Vencedor"
 tournament_events.1240.desc: "Refletindo sobre os possíveis prêmios que posso oferecer ao vencedor da competição de [activity.GetCurrentPhase.GetPhase.GetName|l], a mão de [prize_child_1.GetFirstName], meu(a) [ROOT.Char.Custom2('RelationToMe', prize_child_1)] solteiro(a), vem à mente.\n\nMas... se um(a) plebeu(a) ganhasse..."
 tournament_events.1240.a: "Decidi que [prize_child_1.GetFirstNameNoTooltip] se casará com o(a) vencedor(a)."
 tournament_events.1240.b: "[prize_child_2.GetFirstNameNoTooltip] é mais adequado[prize_child_2.Custom('ES_OA')]."
 tournament_events.1240.c: "Deveria ser [prize_child_3.GetFirstNameNoTooltip]."
 tournament_events.1240.d: "Não é assim que fazemos as coisas."
 tournament_events.1240.betrothal_tt: "Se válido, o vencedor ficará prometido a [marriage_prize.Custom('ES_ElLa')] [marriage_prize.GetTitledFirstName|l]"
 tournament_events.1240.marry_tt: "Se válido, o vencedor se casará com [marriage_prize.Custom('ES_ElLa')] [marriage_prize.GetTitledFirstName|l]"
 tournament_events.1250.t: "$tournament_header$ Símbolo de Favor"
 tournament_events.1250.desc: "É costume elevar os ânimos do seu amado(a) com um símbolo de favor, uma pequena lembrança que eles usarão durante o torneio para todos verem.\n\nA única questão é qual concorrente mais merece o meu afeto..."
 tournament_events.1250.a: "Eu darei a [favor_recipient_1.GetFirstNameNoTooltip]."
 tournament_events.1250.b: "[favor_recipient_2.GetFirstNameNoTooltip] é digno(a)."
 tournament_events.1250.c: "Será entregue a [favor_recipient_3.GetFirstNameNoTooltip]."
 tournament_events.1250.d: "Não há nenhum digno do meu favor..."
 tournament_events.1250.favor_tt: "[favor_recipient.GetUIName] recebe o seu favor"
 tournament_favor_accepted_title: "Favor Aceito"
 tournament_favor_rejected_title: "Favor Rejeitado"
 tournament_favor_accepted_desc: "[THIS.Char.GetSheHe|U] aceita o seu favor"
 tournament_favor_rejected_desc: "[THIS.Char.GetSheHe|U] rejeita o seu favor"
 tournament_events.1251.t: "$tournament_events.1250.t$"
 tournament_events.1251.discrete: "Em um momento de relativa calma, longe do recinto principal do torneio, me encontro a sós com meu [favor_recipient.Custom2('RelationToMe', favor_giver)] , [favor_giver.GetTitledFirstName|l] cuja expressão travessa é difícil de resistir.\n\n"
 tournament_events.1251.open: "Em pé no recinto, observando as práticas e os preparativos, ouço uma voz doce atrás de mim. "[ROOT.Char.GetTitledFirstName|l]!". Minha [favor_recipient.Custom2('RelationToMe', favor_giver)], [favor_giver.Custom('ES_ElLa')] [favor_giver.GetTitledFirstName|l], corre em minha direção agarrando uma peça de roupa.\n\n"
 tournament_events.1251.many: "Por [favor_recipient.GetFaith.HouseholdGodName], estou perdendo a conta do número de favores que recebi - se eles apenas soubessem uns dos outros..."
 tournament_events.1251.two: "Este é o segundo favor que me foi oferecido! O que farei com todos esses pedaços de tecido."
 tournament_events.1251.one: "[favor_giver.GetSheHe|U] amarra um símbolo no meu braço, sorrindo, \"Use isso quando competir, trará boa sorte!\""
 tournament_events.1251.favor_tt: "Todo favor equipado #positive_value aumenta#! ligeramente la probabilidad de ganar [contests|lE]"
 tournament_events.1251.a.spouse: "Obrigado, meu querido."
 tournament_events.1251.a.consort: "Oh, que emocionante."
 tournament_events.1251.a.lover: "Você é demais, meu amor."
 tournament_events.1251.a: "Eu o usarei com orgulho, meu [favor_giver.GetLadyLord]."
 tournament_events.1251.b: "Tire essa coisa de mim."
 tournament_events_equip_favor_tt: "Equipar o seu favor"
 tournament_events_destroy_favor_tt: "[THIS.Char.GetShortUIName|U] descarta o seu favor"
 tournament_events.1252.t: "Um Favor Familiar"
 tournament_events.1252.desc: "Desde que ontem vi o favor de um admirador amarrado ao braço [favor_recipient.Custom('ES_DelDela')] [favor_recipient.GetTitledFirstName|l], fiquei quebrando a cabeça tentando descobrir por que ele me parece tão familiar…\n\nQuando meu [ROOT.Char.Custom2('RelationToMe', favor_giver)] , [favor_giver.GetTitledFirstName|l] me cumprimentou esta manhã, de repente percebi - acho que pertence a [favor_giver.GetSheHe]!"
 tournament_events.1252.a: "Eu preciso saber!"
 tournament_events.1252.a.tt: "Você confronta [favor_giver.GetFirstNameNoTooltip] sobre o favor"
 tournament_events.1252.b: "Não... absurdo..."
 tournament_events.1253.t: "$tournament_events.1252.t$"
 tournament_events.1253.desc: "[favor_investigator.GetTitledFirstName] entra em meus aposentos de repente. Varrendo a sala com o olhar, seu olhar inquieto acaba por se fixar em mim.\n\n"Dizei-me a verdade, será que a lembrança que pende do braço de [favor_recipient.Custom('ES_DelDela')] [favor_recipient.GetTitledFirstName|l] vos pertence?""
 tournament_events.1253.a: "#weak Sí…#!"
 tournament_events.1253.b: "O quê? Não seja ridículo!"
 tournament_events.1254.t: "$tournament_events.1252.t$"
 tournament_events.1254.desc: "[favor_giver.GetFirstName] se afastou durante meu turbilhão de perguntas, apoiando-se fracamente na mesa.\n\nPor fim, ele se vira lentamente e quebra o silêncio com delicadeza: "É verdade… [favor_recipient.Custom('ES_ElLa')] [favor_recipient.GetTitledFirstName|l] usa um favor meu…"."
 tournament_events.1254.a: "I-isto é verdade?"
 tournament_events.1254.b: "#EMP É VERDADE?!#!"
 tournament_events.1255.t: "$tournament_events.1252.t$"
 tournament_events.1255.desc: "[favor_giver.GetTitledFirstName] nega qualquer envolvimento com [favor_recipient.Custom('ES_ElLa')] [favor_recipient.GetTitledFirstName|l] e, claramente, a acusação [favor_giver.GetHerHim] exaspera. "Mal conheço tal [favor_recipient.GetWomanMan]!".\n\nDiga o que disser [favor_giver.GetSheHe], as sementes da dúvida já foram lançadas…"
 tournament_events.1255.a: "O que mais posso fazer?"
 tournament_events.1255.a.tt: "\"Somente o tempo dirá...\""
 tournament_events.1260.t: "Mantendo a Paz"
 tournament_events.1260.desc: "Com inúmeros lordes e [ROOT.Char.Custom('MountedWarriorTermPlural')] reunidos em um só lugar, brigas constantes não são surpresa, já que disputas antigas reacendem e a vaidade alimenta o atrito.\n\n"
 tournament_events.1260.rival: ""Escute aqui, seu escorregadio [duelist_2.Custom2('InsultNoun', SCOPE.sC('duelist_1'))] fugitivo!", rosna [duelist_1.GetFirstName], enquanto [duelist_2.GetFirstNameNoTooltip] agarra ameaçadoramente [duelist_2.Custom('SignatureWeaponNameOrType')]. Ninguém sabe o que começou tudo isso.\n\nNormalmente, essas pequenas demonstrações de valentia acabam, no pior dos casos, com um olho roxo, mas esta briga aterradora [duelist_1.Custom('ES_DelDela')] [duelist_1.GetTitledFirstName|l] com [duelist_2.Custom('ES_ElLa')] [duelist_2.GetTitledFirstName|l] ameaça manchar todo o evento."
 tournament_events.1260.fallback: ""Escuta aqui, seu tipo de [duelist_2.Custom2('InsultNoun', SCOPE.sC('duelist_1'))] escorregadio!", rosna [duelist_1.GetFirstName], enquanto [duelist_2.GetFirstNameNoTooltip] empunha a espada de forma ameaçadora.\n\nNormalmente, essas pequenas fanfarronices acabam no pior dos casos com um olho roxo, mas essa rixa aterradora ameaça manchar todo o evento. Ninguém sabe o que a começou."
 tournament_events.1260.a: "Isso basta! Isso não é algum acampamento de bandidos!"
 tournament_events.1260.b: "Vamos, não envergonhem o seu anfitrião."
 tournament_events.1260.c: "Fora! Removam esses encrenqueiros!"
 tournament_events.1260.d: "Derrube [second_duelist.GetHerHim], [preferred_duelist.GetFirstNameNoTooltip]!"
 tournament_events.1260.duel_toast: "[duel_winner.GetTitledFirstName] venceu o duelo"
 tournament_events.1260.peace_toast: "Os duelistas recuam"
 tournament_events.1260.duel_tt: "O duelo prossegue, ferindo [duelist_1.GetFirstName] ou [duelist_2.GetFirstName]"
 tournament_events.1270.t: "$tournament_header$ Bom Esportista"
 tournament_events.1270.winner: "Diviso [congratulate_winner.Custom('ES_AlAla')] [congratulate_winner.GetTitledFirstName|l] cercado[congratulate_winner.Custom('ES_OA')] de admiradores no grande pavilhão, sem dúvida se gabando de sua vitória na competição de [congratulate_winner.Custom('GetRandomWonContest')|l] e do prêmio que reivindicou."
 tournament_events.1270.matcher: "Diviso [congratulate_winner.Custom('ES_AlAla')] [congratulate_winner.GetTitledFirstName|l], sem dúvida se gabando de ter me derrotado em nosso combate."
 tournament_events.1270.desc: "\n\nA cortesia exige que eu reconheça [congratulate_winner.GetHerHim] quando passo - uma chance de fazer uma declaração pública diante dos convidados reunidos..."
 tournament_events.1270.a: "Três vivas para o Campeão!"
 tournament_events.1270.b: "Parabéns [congratulate_winner.GetFirstNameNoTooltip], muito merecido!"
 tournament_events.1270.c: "Ah [congratulate_winner.GetFirstNameNoTooltip], a fortuna certamente age de maneira misteriosa..."
 tournament_events.1270.d: "Acabei de me lembrar que preciso estar em outro lugar."
 tournament_events.1270.nickname_toast: "O nome permanece"
 tournament_events.1280.t: "$tournament_header$ Padrões Descuidados"
 tournament_events.1280.desc: "Ondas de plebeus e nobres acorrem em massa para conseguir uma boa visão da competição de [activity.GetCurrentPhase.GetPhase.GetName|l].\n\nA algazarra animada é subitamente interrompida por um terrível gemido. Uma arquibancada abarrotada de espectadores cede com #EMP estrépito#!, e uma massa de vítimas que gritam desaparece de vista com um grito horrível!\n\nQuando as acusações começam a voar, meu [ROOT.Char.Custom2('RelationToMeShort', intercessor)], [intercessor.GetName], desaconselha firmemente punir os construtores da arquibancada: "Foi um ato de [intercessor.GetFaith.HighGodName], meu [ROOT.Char.GetTitleAsNameNoTooltip]"."
 tournament_events.1280.a: "Execute esses chamados 'construtores #EMP#!'!"
 tournament_events.1280.b: "Devemos olhar para os enlutados."
 tournament_events.1280.c: "Às vezes, a calamidade não pode ser evitada..."
 tournament_events.1290.t: "Vândalos Incontroláveis"
 tournament_events.1290.desc: "Acordad[ROOT.Char.Custom('ES_OA')] pelos gritos de alarme, observo os habitantes desesperados da cidade lançando baldes de água aos edifícios em chamas de [fire_holding.GetBaronyNameExplicitly], enquanto [fire_holder.Custom('ES_ElLa')] [fire_holder.GetTitledFirstName|l] explica furiosamente.\n\n"Um grupo de escudeiros embriagados com [ROOT.Char.Custom('RegionalAlcoholicDrink')] e incitados pelas competições ateou fogo à banca de um mercador após uma desavença...". [fire_holder.GetFirstNameNoTooltip] ferve de raiva. "Isso vai levar meses para ser reconstruído!"\n\nNão é assim que quero que meu torneio seja lembrado..."
 tournament_events.1290.a: "Os escudeiros devem pagar por sua diversão."
 tournament_events.1290.b: "Eu vou cobrir os reparos."
 tournament_events.1290.c: "Receio que seja apenas uma dessas coisas..."
 tournament_events.1300.t: "$tournament_header$ Sob sua proteção"
 tournament_events.1300.desc: ""Não, não exatamente. Mexa o pé um pouco para trás para se equilibrar e #EMP atravessar#! o alvo e… sim! Perfeito! Muito bem, [young_knight.Custom('GetLassLad')]!".\n\nÀ minha frente, [old_knight.Custom('ES_ElLa')] velh[old_knight.Custom('ES_OA')] e grisalh[old_knight.Custom('ES_OA')] [old_knight.GetFirstName] está treinando a [young_knight.GetFirstName], claramente transmitindo o conhecimento adquirido de um[old_knight.Custom('ES_XA')] [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')] para outr[young_knight.Custom('ES_OA')]. [old_knight.GetFirstNameNoTooltip] me vê quando me aproximo.\n\n"Bom dia, meu [ROOT.Char.GetTitleAsNameNoTooltip]! Estou ajudando a [young_knight.GetFirstNameNoTooltip] a aperfeiçoar sua postura. Vocês já têm um[young_knight.Custom('ES_XA')] jovem guerreir[young_knight.Custom('ES_OA')] talentoso em suas mãos!" [young_knight.GetFirstNameNoTooltip] tenta, sem sucesso, esconder um sorriso envergonhado, mas satisfeito, com os elogios de seu mentor."
 tournament_events.1300.a: "Esplêndido! Continuem assim!"
 tournament_events.1300.b: "En realidad, tal vez #EMP yo#! debiera afrontarlo."
 tournament_events.1300.b.success: "[young_knight.GetFirstNameNoTooltip] ganha #color_white 10#! de $game_concept_trait_level_track_xp$ [GetTrait('tourney_participant').GetName( GetNullCharacter )] em uma $game_concept_trait_level_track$ aleatória"
 tournament_events.1300.b.failure: "[young_knight.GetFirstNameNoTooltip] perde #color_white 5#! de $game_concept_trait_level_track_xp$ [GetTrait('tourney_participant').GetName( GetNullCharacter )] em uma $game_concept_trait_level_track$ aleatória"
 tournament_events.1300.c: "Você se importaria de me ensinar também?"
 tournament_events.1310.t: "Um Hóspede Glorioso"
 tournament_events.1310.desc: "Uma gloriosa fanfarra rasga o ar. Trotando ao meu lado, um arauto a cavalo desenrola um pergaminho.\n\nOuvi, ouvi! Neste mais magnífico de todos os dias, fomos agraciados com a presença de [Select_CString( famous_knight.IsFemale, 'uma verdadeira mestra', 'um verdadeiro mestre' )]. Ele/ela derrotou todos os contendentes da Irlanda à Catai! É para mim uma honra e um privilégio apresentar [famous_knight.Custom('ES_AlAla')] mais hábil, mais esplendoros[famous_knight.Custom('ES_OA')], [famous_knight.Custom('ES_ElLa')] melhor do mundo… [famous_knight.Custom('ES_ElLa')|U] [famous_knight.GetTitledFirstName|l]!\n\nUma figura irrompe diante do arauto, fazendo o cavalo derrapar até parar, um raio de sol ilumina [famous_knight.GetHerHim] como uma auréola, enquanto o rugido da multidão quase faz o chão tremer."
 tournament_events.1310.a: "Que prazer tê-lo(a) aqui, [famous_knight.GetFirstNameNoTooltip]!"
 tournament_events.1310.b: "Talvez eles possam me ensinar uma coisa ou duas?"
 tournament_events.1310.b.critsuccess: "[famous_knight.GetFirstNameNoTooltip] ensina algumas técnicas a você"
 tournament_events.1310.b.success: "Você obtém algumas dicas"
 tournament_events.1310.b.failure: "Você não entende os ensinamentos de [famous_knight.GetFirstNameNoTooltip]"
 tournament_events.1310.c: "Desculpe, quem?"
 tournament_events.1311.t: "Confusão"
 tournament_events.1311.desc: "Atenção, todos vocês que perambulam por aqui! A voz de um arauto corta a multidão que se aglomera no torneio, e mais de alguns se viram para ver o tumulto.\n\nSaibam que quem entra agora mesmo no campo é… é… O arauto arqueja um pouco, examinando a multidão em busca de um nome que claramente havia esquecido.\n\nÉ… minha boa dama… digo, meu bom #EMP senhor#!, digo… O arauto abre e fecha as mãos espasmódicamente, e o pânico por ter esquecido o nome [forgotten_knight.Custom('ES_DelDela')] [forgotten_knight.Custom('KnightCultureNoTooltipLowercase')] de quem estava sendo apresentado é evidente. Aquele[forgotten_knight.Custom('ES_OA')] [forgotten_knight.Custom('KnightCultureNoTooltipLowercase')], [forgotten_knight.GetTitledFirstName|l], se aproxima do arauto com expressão tempestuosa."
 tournament_events.1311.a: "[forgotten_knight.GetFirstNameNoTooltip]! Posso arranjar outro arauto para você?"
 tournament_events.1311.b: "Esse mensageiro provavelmente precisará de um novo emprego..."
 tournament_events.1311.b.tt: "Todos os participantes [GetTrait('compassionate').GetName( GetNullCharacter )|l] ganham #color_green +25#! de opinião sobre você"
 tournament_events.1311.c: "¡Ha! Eles esqueceram como se #EMP llama#!!"
 tournament_events.1312.t: "Toque Estrangeiro"
 tournament_events.1312.desc: ""Ooohs" e "Aaahs", seguidos de aplausos, chamam minha atenção quando passo por uma pequena multidão. Interessad[GetPlayer.Custom('ES_OA')], abro caminho entre eles.\n\nNo centro, [Select_CString( foreign_knight.IsFemale, 'uma mulher', 'um homem' )] com a espada meio desembainhada, mostra a empunhadura incomum da arma aos plebeus maravilhados. Está claro que não é daqui: seu sotaque é suave e estrangeiro. Ao me ver, inclina a cabeça respeitosamente, antes de se voltar para a multidão.\n\n"Agora, que tal eu mostrar a vocês um truque de espada das minhas terras?" A multidão aplaude novamente, ruidosamente."
 tournament_events.1312.a: "Gostaria de ter [Select_CString( ROOT.Char.IsFemale, 'uma nova senhora', 'um novo senhor' )]?"
 tournament_events.1312.a.success: "[foreign_knight.GetFirstNameNoTooltip] concorda em se juntar a você"
 tournament_events.1312.a.failure: "[foreign_knight.GetFirstNameNoTooltip] recusa a oferta"
 tournament_events.1312.b: "Que personagem fascinante!"
 tournament_events.1312.c: "[foreign_knight.GetSheHe|U] é só um estrangeir[foreign_knight.Custom('ES_OA')] e daí?"
 tournament_events.1320.t: "A Moeda Vermelha"
 tournament_events.1320.desc: "Estou voltando da latrina, serpenteando entre duas tendas, quando uma mão me tampa a boca com firmeza por trás.\n\n"Fique em silêncio quando eu lhe deixar falar. Você consegue fazer isso?" Minha aquiescência abafada satisfaz a voz, e giro sobre os calcanhares para me deparar com um[unusual_stranger.Custom('ES_XA')] estranh[unusual_stranger.Custom('ES_OA')] vestid[unusual_stranger.Custom('ES_OA')] de forma incomum. Ele instantaneamente coloca um pequeno objeto em minha mão.\n\n"Preciso que cuidem disto. É muito importante para mim. Voltarei para buscá-lo. Se não..." Um sorriso estranhamente cansado passa pelos lábios [unusual_stranger.Custom('ES_DelDela')] estranh[unusual_stranger.Custom('ES_OA')]. "... então considere isto meu presente para você."\n\nOlho para baixo. Na palma da minha mão há uma moeda de ouro, mas curiosamente #EMP vermelha#!. Ela repousa ali opaca, um tanto quente ao toque."
 tournament_events.1320.a: "Vou cuidar disso para você."
 tournament_events.1320.b: "Eu não quero nada disso!"
 tournament_events.1321.t: "Moeda Emprestada"
 tournament_events.1321.desc: "Enquanto observo por cima da taça, refrescando-me entre as competições, vejo uma figura encapuzada, mas estranhamente familiar, aproximar-se de mim.\n\n«Acredito que tendes algo que me pertence». A pessoa entra na luz como se não estivesse acostumada ao seu brilho. «A moeda, [ROOT.Char.Custom('FormOfAddressForLiege')]. Ainda a tendes, não tendes?».\n\nAo tirá-la do meu bolso, o metal cintila à luz do sol. Parece quase mais vermelha do que antes, de um rico tom granada. A figura sorri por baixo do capuz.\n\n«Meus mais profundos agradecimentos, do fundo do meu coração. Por favor, por todo o incômodo». Estendem a mão para recebê-la, mas na outra apresentam um saco pesado de ouro."
 tournament_events.1321.a: "Venha à minha corte. Eu poderia usar seus talentos."
 tournament_events.1321.b: "Um prazer fazer negócios, amig[unusual_stranger.Custom('ES_OA')] me[unusual_stranger.Custom('ES_OA')]."
 tournament_events.1321.c: "Hmm. Acho que não."
 tournament_events.1321.c.tt: "Isso parece arriscado..."
 tournament_events.1322.t: "Vale o Risco?"
 tournament_events.1322.desc: "A fúria que relampeja no rosto [unusual_stranger.Custom('ES_DelDela')] desconhecid[unusual_stranger.Custom('ES_OA')] me desconcerta e faz com que meus guardas deem um passo à frente, desembainhando as armas. Os lábios da figura se curvam enquanto abaixam o capuz, enojados e zombeteiros.\n\n\"Você pode ver meu rosto\", diz. \"Também lhe direi meu nome. Meu maior desejo agora é que você passe as noites em claro pensando em como [unusual_stranger.GetFirstName] se vingará de você. Pode levar anos, mas eu nunca esqueço, e só espero que agora você também nunca esqueça\".\n\n\"Lembre-se disto: #EMP ajustaremos cuentas#!\". Ela puxa o capuz de volta para cima e aperta a capa ao redor do corpo antes de se desvanecer de volta na multidão."
 tournament_events.1322.a: "Eu... tenho certeza de que ficará tudo bem."
 tournament_events.1330.t: "A Próxima Geração"
 tournament_events.1330.desc: "«Boa sorte, [ROOT.Char.Custom('FormOfAddressForLiege')]». Reconheço o grito de um membro da multidão com um aceno de gratidão. «E boa sorte para você também, [heir.GetFirstName]!».\n\n«O que eles quiseram dizer com isso?», pergunto a [heir.GetFirstNameNoTooltip], caminhando ao meu lado. «Por que precisariam te desejar sorte?». Seu olhar nervoso logo dá a resposta para essa pergunta.\n\n«Eu... quero competir!», insiste. «Você está participando, por que eu não poderia?» Eu paro abruptamente, [heir.GetFirstNameNoTooltip] tropeça para parar ao meu lado, insegur[heir.Custom('ES_OA')], sua bravata desmorona um pouco diante da minha reação."
 tournament_events.1330.a: "Você precisa entender. Você é preciosíssim demais para correr riscos."
 tournament_events.1330.b: "Que privilégio é ter um [heir.Custom('ES_XA')] [heir.Custom('GetDaughterSon')] assim!"
 tournament_events.1330.c: "Eu proíbo isso! Vá e renuncie agora mesmo!"
 tournament_events.1330.d: "… não conte ao seu [spouse.GetMotherFather]."
 tournament_events.1331.t: "Pela Família?"
 tournament_events.1331.desc: "«¡[ROOT.Char.GetFirstName]! ¡Justamente a quien quería encontrar!», [dynast.GetFirstName] se apressa até mim. «Precisamos conversar. Veja, eu tinha ouvido que você se inscreveu para a próxima competição e, bem…».\n\nMeu olhar impassível endurece claramente a postura de [dynast.GetFirstNameNoTooltip] diante da situação. [dynast.GetSheHe|U] se endireita até sua plena altura.\n\n«Vocês precisam se retirar. Eu sou [dynast.Custom('ES_ElLa')] chefe[dynast.Custom('ES_EA')] de [dynast.GetDynastyName] e exijo isso! Pelo bem da nossa linhagem!». Enquanto [dynast.GetSheHe] me repreende, olho para o outro lado, onde se erguem os estandartes dos competidores participantes. Incluindo, como era de se esperar, o de [dynast.GetFirstNameNoTooltip]."
 tournament_events.1331.a: "Intimidação não vai funcionar comigo, [dynast.GetFirstNameNoTooltip]."
 tournament_events.1331.b: "Claro. Tudo pela #EMP 'família'#!."
 tournament_events.1331.c: "Você quer reconsiderar suas palavras, [dynast.GetFirstNameNoTooltip]?"
 tournament_events.1331.d: "Eu não serei coagido(a) para o seu benefício!"
 tournament_events.1331.e: "Eu irei desistir, se for preciso."
 tournament_events.1332.t: "Dar e Receber"
 tournament_events.1332.desc: "Vejo [powerful_vassal.GetFirstName] se aproximar a grandes passadas e fecho brevemente os olhos, consternad[ROOT.Char.Custom('ES_OA')]. Quando os abro novamente, está bem diante de mim, cravando em mim um sorriso forçado que mal disfarça um olhar fulminante.\n\n[ROOT.Char.GetFirstName], [ROOT.Char.Custom('FormOfAddressForLiege')], que #EMP maravilhoso#! ver vocês aqui competindo! Ele me agarra pelo braço e nos afasta um pouco da multidão para conspirar. Veja, preciso de um favor, sua fachada quase se parte quando reviro os olhos.\n\nQuero me sair bem nesta competição, e como um[powerful_vassal.Custom('ES_OA')] de [Select_CString( powerful_vassal.IsFemale, 'suas vassalas', 'seus vassalos' )] mais poderos[powerful_vassal.Custom('ES_OA')]s e #EMP leais#!, me perguntava se poderia contar com a sua ajuda."
 tournament_events.1332.a: "Certamente você é leal, não é?"
 tournament_events.1332.b: "Muito leal, você diz?"
 tournament_events.1332.c: "Meus bolsos estão um pouco vazios ultimamente..."
 tournament_events.1332.d: "Por você, [powerful_vassal.GetFirstNameNoTooltip]? Qualquer coisa."
 tournament_events.1332.e: "Você terá que se virar sozinho[powerful_vassal.Custom('ES_OA')]."
 #SPECTATOR EVENTS
 tournament_events.1400.t: "$tournament_header$ Pequenas Histórias"
 tournament_events.1400.desc: "Fazer parte da plateia em um evento esportivo pode ser uma verdadeira delícia. O ambiente, o som e as vistas. O único problema é que, às vezes, isso pode trazer tantas desvantagens quanto benefícios.\n\nUma dessas desvantagens acabou de se materializar, pois me vejo preso[ROOT.Char.Custom('ES_OA')] atrás da corpulenta figura de [tall_person.GetFirstName]. Primeiro me inclino para um lado e depois para o outro, mas o tamanho dele bloqueia a ação quase perfeitamente.\n\nSuspiro com força e bato o pé. [tall_person.GetFirstNameNoTooltip] não se move. Vivas irrompem quando algo enorme e empolgante acontece. Minha irritação começa a subir."
 tournament_events.1400.a: "Eu farei você #EMP se ajoelhar#! para assistir!"
 tournament_events.1400.a.fight: "Uma briga pelo menos resolverá o problema de uma maneira ou de outra..."
 tournament_events.1400.b: "Com licença. Você poderia, por favor, #EMP se mover#!?"
 tournament_events.1400.b.success: "[tall_person.GetFirstNameNoTooltip] cede a contragosto"
 tournament_events.1400.b.failure: "[tall_person.GetFirstNameNoTooltip] recusa"
 tournament_events.1400.c: "Como você gostaria de lutar por mim?"
 tournament_events.1400.c.success: "[tall_person.GetFirstNameNoTooltip] se junta a você"
 tournament_events.1400.c.failure: "[tall_person.GetFirstNameNoTooltip] recusa"
 tournament_events.1400.d: "Deixa pra lá."
 tournament_events.1401.t: "$tournament_header$ Contos Altos"
 tournament_events.1401.desc: "Que dia! Meu lugar bem na frente do público me oferece uma vista incomparável da ação. Tudo vai bem até que sinto um leve puxão nas minhas roupas. Olho para baixo e vejo uma figura, muito menor do que eu, tentando passar.\n\nAo notar meu olhar sobre [smol_person.GetSheHe], [smol_person.GetFirstName] se endireita e começa a defender seu caso.\n\n"Você é... tão #EMP grande#!!" tenta dizer [smol_person.GetSheHe], apontando nossa diferença de estatura. "Não consigo ver nada! Por favor, posso ficar na sua frente?""
 tournament_events.1401.a: "Hah hah! Não."
 tournament_events.1401.a.success: "[smol_person.GetHerHim|U] bloqueia com sucesso"
 tournament_events.1401.a.failure: "[smol_person.GetFirstNameNoTooltip] passa despercebido(a)"
 tournament_events.1401.b: "Tudo bem, pode passar."
 tournament_events.1402.t: "$tournament_header$ Concessões Desperdiçadas"
 tournament_events.1402.desc: "A competição à minha frente está chegando ao clímax, com os participantes muito equilibrados. Agarro a grade de madeira à minha frente e grito minha apreciação junto com o resto da multidão. No entanto, esse grito rapidamente se transforma em um gemido sufocado quando sinto algo escorrendo pela minha coluna. Algum tipo de líquido... algo ao mesmo tempo quente #EMP y#! frio?\n\nGiro sobre os calcanhares e me vejo diante de [drinking_spectator.GetFirstName], com sua taça chacoalhando com os restos da bebida não identificada que agora está deslizando pelas minhas costas.\n\n“Agora, então, veja por onde anda!”, ele borbulha, gesticulando acusadoramente para mim com a taça. “Você deveria ter mais cuidado!"
 tournament_events.1402.a: "Que tal eu comprar mais um para nós dois?"
 tournament_events.1402.b: "Guardas, tirem este[drinking_spectator.Custom('ES_EA')] [drinking_spectator.Custom2('InsultNoun', ROOT.Char)] tão [drinking_spectator.Custom2('InsultAdjective', ROOT.Char)] da minha vista!"
 tournament_events.1402.c: "Você está certo(a). Foi meu erro!"
 tournament_events.1403.t: "$tournament_header$ Multidão Dominada"
 tournament_events.1403.desc: "A multidão se inclina enquanto um competidor se prepara, mas a atmosfera é abruptamente cortada por uma voz estridente. [realm_priest.GetFirstName] invadiu o campo.\n\n"Como vocês #EMP podem#! estar vendo esta #EMP imundície#! banal que só faz perder tempo!", brada [realm_priest.GetSheHe], indo de pessoa em pessoa, com saliva voando de seus lábios enquanto os repreende. "Deveriam passar menos tempo aqui e mais tempo adorando!"\n\nO mar de gente vacila um pouco, percebendo um lampejo de verdade nas palavras, antes de algumas vozes corajosas e furiosas responderem. A maré da opinião pública se abate ferozmente sobre [realm_priest.GetFirstNameNoTooltip], mas [realm_priest.GetSheHe] permanece firme, fazendo ecoar seu sermão."
 tournament_events.1403.a: "[realm_priest.GetFirstNameNoTooltip] está certo(a), seus reprovados!"
 tournament_events.1403.b: "Buuu! #EMP Buuuuuu!#!"
 tournament_events.1403.c: "Talvez eu deva deixar isso se resolver sozinho."
 tournament_events.1404.t: "$tournament_header$ Pretendentes em Potencial"
 tournament_events.1404.desc: "Enquanto me acomodo perto da frente da multidão com [ROOT.Char.Custom2('RelationToMeShort', gossip_friend)] [gossip_friend.GetFirstName], os participantes trotam pelo campo à nossa frente.[ROOT.Char.Custom('ES_OA')]s. [gossip_friend.GetFirstNameNoTooltip] me cutuca algumas vezes, apontando para dois dos [ROOT.Char.Custom('ES_LoLaOpp')]s competidores[ROOT.Char.Custom('ES_EAOpp')]s com um gesto de cabeça nada sutil.\n\n“O que você acha desse par?”, diz [gossip_friend.GetSheHe] , contendo uma risadinha encantada. “Com qual #EMP te#! você fica?”. Fica claro pelas sobrancelhas hiperativas de que [gossip_friend.GetSheHe] não está perguntando em quem acho que vai ganhar.\n\n“Olha, olha, eles estão se aproximando! Fala alguma coisa! Alto o bastante para eles ouvirem!”"
 tournament_events.1404.a: "\"Nenhum deles se compara à #EMP sua#! beleza.\""
 tournament_events.1404.b: "\"Hah! Você se sairia melhor do que qualquer um deles no campo de batalha do amor!\""
 tournament_events.1404.c: "\"#BOL Oh meu Deus, é aquele belo espécime [knight_1.GetFirstNameNoTooltip]?!#!\""
 tournament_events.1404.d: "\"#BOL Uau, só #EMP olhe#! para [knight_2.GetFirstNameNoTooltip]!#!\""
 tournament_events.1404.e: "#EMP Xiu, xiu!#! #DIE1 Já #EMP basta #!; [gossip_friend.GetFirstNameNoTooltip]!#!."
 tournament_events.1405.t: "$tournament_header$ Um[flirty_onlooker.Custom('ES_XA')] [flirty_onlooker.Custom('GetLassLad')] sortudo"
 tournament_events.1405.desc: "Meu olhar se perde entre a multidão. O burburinho geral flui ao meu redor, todos os espectadores conversam ou incentivam os competidores. Todos menos um[flirty_onlooker.Custom('ES_OA')]do qual percebo.\n\n[flirty_onlooker.GetFirstName] me encara diretamente. Nossos olhares se encontram antes de que [flirty_onlooker.GetSheHe] quebre imediatamente o contato visual e desvie os olhos para qualquer lugar que não seja eu. Normalmente eu desconfiaria, mas o fato de morder o lábio e lançar constantes olhares furtivos para verificar se [flirty_onlooker.Custom('ES_LeLa')] continuo olhando indica algo diferente neste caso."
 tournament_events.1405.a: "Informação útil para o futuro!"
 tournament_events.1405.b: "Bem, bem, bem..."
 tournament_events.1405.b.tt: "Dê um sorriso e um piscar de olhos para [flirty_onlooker.GetFirstNameNoTooltip] em resposta."
 tournament_events.1405.c: "Estou aqui para assistir, não para flertar!"
 tournament_events.1406.t: "$tournament_header$ Novas Experiências"
 tournament_events.1406.desc: "Enquanto abrimos caminho pela multidão, a cabeça [Select_CString( root_child.IsFemale, 'da pequena', 'do pequeno' )] [root_child.GetFirstName] não para de se virar, absorvendo todas as imagens e sons. [root_child.GetSheHe|U] vibra de emoção, puxa minha mão e aponta para os participantes que passam apressados.\n\nEu [root_child.GetHerHim] o contenho com suavidade, mas [root_child.GetSheHe] continua se debatendo, incapaz de conter seu entusiasmo diante de uma situação tão nova."
 tournament_events.1406.a: ""Concentre-se nos seus estudos, [root_child.Custom('GirlBoy')]"."
 tournament_events.1406.b: "\"Vamos lá, suba nos meus ombros!\""
 tournament_events.1406.c: "Eu também estou animad[ROOT.Char.Custom('ES_OA')], [root_child.GetFirstNameNoTooltip]!"
 tournament_events.1407.t: "$tournament_header$ Honra Defendida"
 tournament_events.1407.desc: "Lá está [competing_family.GetSheHe] meu [ROOT.Char.Custom2('RelationToMeShort', competing_family)] [competing_family.GetFirstName] está competindo neste torneio, e finalmente consegui ver[competing_family.GetHerHim] no meio da multidão de competidores. Mal abro a boca para dar meu apoio, ouço outra voz.\n\n\"Ei, [competing_family.GetFirstNameNoTooltip]! Vai embora agora e nos poupe do trabalho!\".\n\nOlho ao redor, entre os espectadores risonhos, e vejo [shouting_fan.GetFirstName] se preparando para mais uma salva de insultos."
 tournament_events.1407.a: "O que você acabou de dizer?!"
 tournament_events.1407.a.success: "Você vence a briga"
 tournament_events.1407.a.failure: "Você perde a briga"
 tournament_events.1407.b: "Vamos lá, [competing_family.GetFirstNameNoTooltip]! A vitória é sua!"
 tournament_events.1407.b.success: "Você consegue abafar [shouting_fan.GetFirstNameNoTooltip]"
 tournament_events.1407.b.failure: "Você não consegue abafar [shouting_fan.GetFirstNameNoTooltip]"
 tournament_events.1407.c: "Bem, espero que [competing_family.GetFirstNameNoTooltip] não leve isso para o coração..."
 tournament_events.1408.t: "$tournament_header$ Saciado(a)"
 tournament_events.1408.desc: "O sol castiga enquanto observo a competição de um lugar privilegiado, à frente da multidão. Está calor demais hoje. Ou talvez eu é que esteja vestido demais[ROOT.Char.Custom('ES_OA')]…\n\nEstou matutando sobre isso quando vejo um jovem comerciante empreendedor carregando no ombro um barrilzinho de alguma bebida indefinida, claramente oferecendo-a aos passantes em troca de moedas. Minha boca fica instantaneamente seca. Se ao menos eu pudesse ir até lá sem perder meu lugar…\n\nOlho ao redor desesperadamente em busca de respostas, mas só vejo [drinking_fan.GetFirstName] andando de volta para seu lugar na multidão, com a bebida firmemente na mão."
 tournament_events.1408.a: "\"Posso comprar isso de você?\""
 tournament_events.1408.a.tt: "Isso pode exigir um pouco de persuasão..."
 tournament_events.1408.b: "Talvez se eu for rápido(a)..."
 tournament_events.1408.b.success: "Você se afasta rapidamente para beber e volta facilmente"
 tournament_events.1408.b.failure: "Você compra uma bebida, mas perde seu lugar"
 tournament_events.1408.b.criticalfailure: "Você perde seu lugar e o vendedor vai embora"
 tournament_events.1408.c: "Vou ter que aguentar."
 tournament_events.1409.t: "$tournament_header$ Um para torcer"
 tournament_events.1409.desc: "Eu me afasto para deixar alguém passar, mas, assim que o faço, a pessoa começa a falar comigo.\n\n"Ah, [ROOT.Char.GetTitledFirstName|l]. Que bom ver-vos por aqui". Abro a boca para responder, mas [friendly_fan.GetFirstName] é rápido demais[friendly_fan.Custom('ES_OA')]. "Não tendes nenhum favorito, não? Alguém que acheis que vai levar a vitória? Eu estou com uma boa sensação sobre [fan_favourite.GetFirstName]".\n\nPor um momento, considero as minhas opções. Talvez seja melhor apenas concordar?"
 tournament_events.1409.a: "\"Claro! Tem que ser [fan_favourite.GetFirstNameNoTooltip]!\""
 tournament_events.1409.b: ""Está claro que vai ganhar [other_favourite.GetFirstNameNoTooltip], não seja um/a [friendly_fan.Custom2('InsultNoun', ROOT.Char)]!"."
 tournament_events.1409.c: "Talvez se eu apenas sorrir e acenar..."
 tournament_events.1410.t: "$tournament_header$ Fãs Insatisfeitos"
 tournament_events.1410.desc: "Por cima dos uivos da multidão, consigo ouvir claramente o começo de uma briga. Esticando o pescoço para olhar para trás, consigo distinguir duas figuras, cada uma agarrando um punhado das roupas da outra. Exatamente sobre o que é essa disputa é incerto, mas um pequeno círculo de espectadores barulhentos já se formou.\n\n"[fan_2.Custom2('InsultNoun', SCOPE.sC('fan_1'))|U] [fan_2.Custom2('InsultAdjective', SCOPE.sC('fan_1'))]!", cospe [fan_1.GetFirstName], praguejando enquanto se ergue até sua plena altur[fan_1.Custom('ES_OA')] é. [fan_2.GetFirstName] responde na mesma moeda.\n\n"Você é um lixo e um[fan_1.Custom('ES_XA')] [fan_1.Custom2('InsultNoun', SCOPE.sC('fan_2'))]! Vou arrancar suas tripas!". Está claro que os dois vão partir para a briga."
 tournament_events.1410.a: "\"Já chega!\""
 tournament_events.1410.a.tt: "Intentar ponerme en medio puede ser arriesgado, pero debo hacer #EMP algo#!…"
 tournament_events.1410.a.success: "Você consegue separá-los com sucesso"
 tournament_events.1410.a.failure: "Você se machuca[GetPlayer.Custom('ES_OA')] na briga resultante"
 tournament_events.1410.b: "\"Vamos lá! Esse não é o momento nem o lugar para uma briga!\""
 tournament_events.1410.b.success: "Suas palavras tranquilizadoras funcionam"
 tournament_events.1410.b.failure: "O par continua a briga"
 tournament_events.1410.c: "Isso! Acerte!"
 tournament_events.1410.c.fan1: "[fan_1.GetFirstNameNoTooltip] vence a briga"
 tournament_events.1410.c.fan2: "[fan_2.GetFirstNameNoTooltip] vence a briga"
 #INTENT EVENTS
 tournament_events.6000.t: "$tournament_header$ A Todo Custo"
 tournament_events.6000.desc: "Um torneio é o lugar perfeito para livrar a mim e ao mundo desse [murder_target.Custom2('InsultNoun', ROOT.Char)], [murder_target.GetTitledFirstName|l]. Perigos ocultos espreitam em cada esquina, e as suspeitas se dissipam pela frequência dos acidentes.\n\n"
 tournament_events.6000.again: "[murder_target.GetTitledFirstName] ainda está vivo(a)...\n\n"
 tournament_events.6000.deferred: "Tenho aguardado meu momento com uma paciência louvável… à espera do momento perfeito para atacar [murder_target.Custom('ES_AlAla')] [murder_target.GetTitledFirstName|l]…"
 tournament_events.6000.foot: "A [activity.GetCurrentPhase.GetPhase.GetName|l] se aproxima, e uma lâmina envenenada nas mãos certas poderia acabar com [murder_target.GetSheHe] num instante...\n\n"
 tournament_events.6000.joust: "As lanças da [activity.GetCurrentPhase.GetPhase.GetName|l] são protegidas com pontas cegas, mas uma substituição cuidadosamente preparada com suas primas mais letais pode passar despercebida...\n\n"
 tournament_events.6000.self_match: "Seria fácil adulterar meu equipamento, anulando as medidas de segurança impostas pelo torneio, e acabar com [murder_target.GetFirstNameNoTooltip] diante da multidão..."
 tournament_events.6000.patsy_match: "Só preciso mexer no equipamento de [murder_match.GetFirstName] antes que se enfrente a [murder_target.GetFirstNameNoTooltip] e rezar para que os astros se alinhem…"
 tournament_events.6000.injuries: "Possíveis Lesões"
 tournament_events.6000.a: "Uma oportunidade interessante."
 tournament_events.6000.b: "Sim, a culpa recairá sobre [murder_match.GetFirstNameNoTooltip]."
 tournament_events.6000.c: "Eu acabarei com o tolo!"
 tournament_events.6000.d: "Ainda não..."
 tournament_events.6000.e: "É muito arriscado..."
 tournament_events.6000.success: "Seu sabotagem é bem-sucedida"
 tournament_events.6000.failure: "Sua sabotagem não surte efeito"
 tournament_events.6000.success_tt: "[murder_target.GetFirstNameNoTooltip] é morto(a) por [murder_match.GetFirstNameNoTooltip]"
 tournament_events.6000.blame: "Todas as acusações recairão sobre [murder_match.LocalPlayerString( 'você', murder_match.GetShortUIName )]"
 tournament_events.6000.imprisonment_tt: "Como [murder_target.GetFirstNameNoTooltip] é [murder_target.Custom('ES_ElLa')] anfitri[murder_target.Custom('ES_OnOna')], [murder_match.GetFirstNameNoTooltip] pode ser aprisionad[murder_match.Custom('ES_OA')]"
 tournament_events.6001.t: "$tournament_events.6050.t$"
 tournament_events.6001.foot: "Esfrego a lâmina com um veneno nocivo, ponderando as promessas do alquimista que me vendeu a poção fétida, antes de cuidadosamente embainhá-la em sua bainha."
 tournament_events.6001.horse: "Substituo as lanças na armaria ao anoitecer, elas repousam lá no escuro, aguardando o toque das trombetas da aurora."
 tournament_events.6001.success_patsy: "\n\nApós um momento de tensão palpitante, estou fora! Com sorte, [murder_match.GetFirstName] não perceberá até que seja tarde demais..."
 tournament_events.6001.success: "\n\nMeu equipamento diabolicamente modificado está pronto para a [activity.GetCurrentPhase.GetPhase.GetName|l], só preciso garantir que o utilize corretamente..."
 tournament_events.6001.failure: "\n\nInfelizmente, quando volto na manhã seguinte, fica claro que um atendente perspicaz notou meu trabalho - essas tentativas não fizeram nada além de levantar suspeitas de jogo sujo, e os escudeiros estão mais atentos do que nunca."
 tournament_events.6001.closing: "\n\nSeu dia chegará mais cedo do que você pensa, [murder_target.GetFirstName]..."
 tournament_events.6001.a: "E eu não posso esperar..."
 tournament_events.6001.b: "Maldição..."
 tournament_events.6010.t: "$tournament_header$ Rival de Assassinato"
 tournament_events.6010.desc: "Ao final do dia, espio meu rival, [murder_target.GetName], que está em paz, relaxando na companhia de outros. Esta competição oferece a oportunidade perfeita para que lhe aconteça um #EMP accidente#!…\n\nNeste ambiente relaxado, não deveria ser difícil colocar algo em sua taça."
 tournament_events.6010.a: "Conheço um boticário nas proximidades."
 tournament_events.6010.a.flavor: "[murder_target.GetFirstNameNoTooltip] vai experimentar outro tipo de veneno!"
 tournament_events.6010.a.success: "Seu rival bebe o último gole"
 tournament_events.6010.a.ill: "Os humores do seu rival são perturbados"
 tournament_events.6010.a.failure: "Seu rival aparenta não ser afetado"
 tournament_events.6010.b: "Onde estão aqueles desafortunados que vi antes?"
 tournament_events.6010.b.flavor: "Nada é mais útil do que um homem desesperado..."
 tournament_events.6010.b.success: "Seu rival é morto"
 tournament_events.6010.b.caught: "Seu rival domina o bandido"
 tournament_events.6010.b.failure: "Seu rival escapa do bandido"
 tournament_events.6010.c: "Isso não vai funcionar..."
 tournament_events.6011.t: "$tournament_events.6010.t$"
 tournament_events.6011.poison: "Apresso-me para voltar do vendedor de poções, que acreditou rápido demais na história de ratos nos estábulos.\n\nEnquanto o atarefado taberneiro enche as taças, é assustadoramente fácil introduzir discretamente a mistura na taça de [murder_target.GetFirstName].\n\n"
 tournament_events.6011.thug: "O rufião pega minha moeda, aceita minhas condições com resignada sisudez e confirma meu sutil aceno na direção de [murder_target.Custom('ES_AlAla')] [murder_target.GetTitledFirstName|l].\n\n"
 tournament_events.6011.death: "Talvez o mais inquietante seja o quão rapidamente se desmorona após ingerir a poção, contorcendo-se de dor, sufocando em busca de ajuda."
 tournament_events.6011.ill: "Prendo a respiração enquanto ele leva a taça aos lábios e me deleito brevemente com o sucesso, mas não é para ser. Tal [murder_target.Custom2('InsultNoun', ROOT.Char)] está apenas febril, e provavelmente viverá."
 tournament_events.6011.second_chance: "Infelizmente, o veneno parece apenas confundir[murder_target.GetHerHim] mas, ao seguir [murder_target.GetHerHim] para fora, descubro que agora estamos a sós em um lugar isolado dentro do recinto do torneio.\n\nTalvez esta seja minha última chance de alcançar meu objetivo..."
 tournament_events.6011.ache: "Faz efeito rapidamente: vejo os frequentadores cercarem [murder_target.Custom('ES_AlAla')] gemendo [murder_target.Custom2('InsultNoun', ROOT.Char)], mas logo fica claro que o frasco não tinha a potência prometida.\n\nNo melhor dos casos, ele terá uma noite ruim na privada…"
 tournament_events.6011.slain: "Mal consigo dormir à espera de notícias, mas em meu coração já me sinto aliviad[GetPlayer.Custom('ES_OA')] de me ver livre do meu rival.\n\nAo amanhecer, toda a [activity.GetCurrentPhase.GetLocation.GetNameNoTooltip] fala do horripilante ataque contra [murder_target.GetFirstNameNoTooltip], que foi encontrado destripad[murder_target.Custom('ES_OA')] na rua por um vigia, com uma adaga ensanguentada ao lado."
 tournament_events.6011.caught: "Mal consigo dormir esperando pelas notícias, um medo indeterminado me perturba até a manhã.\n\nMeus assistentes batem à porta ao amanhecer, informando que [murder_target.GetFirstNameNoTooltip] afirma ter derrotado um bandido que tentou assassiná-[murder_target.GetHerHim] durante a noite, e que disse que eu estava por trás disso."
 tournament_events.6011.escape: "Mal consigo dormir, à espera de notícias,[GetPlayer.Custom('ES_OA')] de que algo deu errado.\n\nMeu coração estava certo, [murder_target.GetFirstNameNoTooltip] ainda vive e as notícias da tentativa de assassinato por um estranho encapuzado se espalharam por todo [activity.GetCurrentPhase.GetLocation.GetNameNoTooltip]."
 tournament_events.6011.a.death: "Casi fue #EMP demasiado#! fácil…"
 tournament_events.6011.a.ill: "Ainda há esperança..."
 tournament_events.6011.a.slain: "Um negócio desagradável, isso."
 tournament_events.6011.a.caught: "Malditos vagabundos."
 tournament_events.6011.a: "Que sorte maldita."
 tournament_events.6011.b: "Devo agir agora."
 tournament_events.6011.b.success: "Você mata seu rival"
 tournament_events.6011.b.failure: "Seu rival escapa"
 tournament_events.6011.c: "Acabou..."
 tournament_events.6012.t: "$tournament_events.6010.t$"
 tournament_events.6012.poison: "Estou conversando animadamente sobre as próximas competições com alguns participantes quando de repente sinto meu interior revirar e minha respiração se contrair.\n\n"
 tournament_events.6012.thug: "Deixo a tenda depois de passar a noite conversando sobre os favoritos com outros participantes, quando sinto uma figura atrás de mim.\n\n"
 tournament_events.6012.death: "Deuses, o que é esse fogo dentro de mim! \"A-ajuda!\"\", gaguejo, enquanto os rostos estúpidos dos meus conhecidos me encaram."
 tournament_events.6012.ill: "Desabo, segurando minhas entranhas, enquanto sou cercado por espectadores preocupados. \"Ajuda, chamem um médico!\", consigo gaguejar."
 tournament_events.6012.slain: "Antes mesmo de me virar, é como se um cavalo me chutasse ao chão. Uma figura encapuzada me imobiliza, empunhando uma adaga em direção ao meu coração!"
 tournament_events.6012.caught: "Eu me desvio no exato momento em que o homem avança em minha direção, pegando-o desprevenido antes de imobilizá-lo no chão. Uma adaga cintilante se destaca na lama."
 tournament_events.6012.escape: "Os passos pesados de uma figura encapuzada se aproximam de mim. Giro rapidamente enquanto eles se aproximam, derrubando-os no chão e fazendo uma corrida em direção à massa de tendas."
 tournament_events.6012.a.death: "#EMP *ahogo*#! S–#weak socorro…!"
 tournament_events.6012.a.ill: "Só p-preciso m-deitar um pouco."
 tournament_events.6012.a.poison: "Essas b-bebidas são p-peçonhentas!"
 tournament_events.6012.a.slain: "#weak Quem...?!#!"
 tournament_events.6012.a.caught: "#EMP Quem te enviou?!"
 tournament_events.6012.a: "Eu estarei bem..."
 tournament_events.6013.t: "$tournament_events.6010.t$"
 tournament_events.6013.death: "Me lanço por trás de [murder_target.GetSheHe] o mais silenciosamente que posso, puxando sua cabeça para trás e passando minha lâmina por seu pescoço.\n\n[murder_target.GetSheHe|U] gagueja e se debate enquanto fujo correndo para o labirinto de tendas."
 tournament_events.6013.fallback: "Corro por trás de [murder_target.GetSheHe] o mais silenciosamente que consigo, mas [murder_target.GetFirstName] me ouve chegando e se vira, encarando com os olhos arregalados[murder_target.Custom('ES_OA')] minha adaga reluzente.\n\n[murder_target.GetSheHe|U] dispara com energia renovada, tirando meu fôlego e desaparecendo no labirinto de tendas."
 tournament_events.6013.a.death: "Isso deve resolver!"
 tournament_events.6013.a: "Nããão!"
 tournament_events.6014.t: "$tournament_events.6010.t$"
 tournament_events.6014.desc: "Enquanto volto para minha tenda, segurando fracamente meu lado, [murder_target.GetSheHe] se aproxima rapidamente por trás de mim!"
 tournament_events.6014.death: "Antes de eu poder reagir, [murder_target.GetFirstNameNoTooltip] me puxa a cabeça para trás e encosta uma adaga no meu pescoço!"
 tournament_events.6014.fallback: "Giro rapidamente, derrubando [murder_target.GetHerHim] no chão com um gemido e corro diretamente para o labirinto de tendas."
 tournament_events.6014.a.death: "O quê- #EMP N-!#! gargarejo"
 tournament_events.6014.a: "Isso foi... não... #EMP [murder_actor.GetFirstNameNoTooltip]#!!"
 tournament_events.6050.t: "$tournament_contest_header$ Sabotagem"
 tournament_events.6050.desc: "Jurei a mim mesmo que venceria uma competição neste torneio, e não consigo deixar de considerar uma abordagem menos... #EMP "limpa"#! para garantir o prêmio da competição de [activity.GetCurrentPhase.GetPhase.GetName|l].\n\nTenho certeza[GetPlayer.Custom('ES_OA')] de que meus oponentes fariam o mesmo, se tivessem tido essa ideia. Quem sabe, talvez já tenham tido?"
 tournament_events.6050.a: "[sabotage_target_1.GetFirstNameNoTooltip] é a ameaça."
 tournament_events.6050.a.horse_race: "[sabotage_target_1.GetFirstNameNoTooltip] é a ameaça no #EMP [sabotage_target_1.Custom('GetContestHorseRaceName')]#!."
 tournament_events.6050.b: "Não suporto a ideia de [sabotage_target_2.GetFirstNameNoTooltip] vencendo."
 tournament_events.6050.b.horse_race: "Não suporto a ideia de [sabotage_target_2.GetFirstNameNoTooltip] vencendo com o #EMP [sabotage_target_2.Custom('GetContestHorseRaceName')]#!."
 tournament_events.6050.c: "[sabotage_target_3.GetFirstNameNoTooltip] precisa ser neutralizado."
 tournament_events.6050.c.horse_race: "É preciso apaziguar a #EMP [sabotage_target_3.Custom('GetContestHorseRaceName')]#! de [sabotage_target_3.GetFirstNameNoTooltip]."
 tournament_events.6050.d: "Não é assim que se vence..."
 tournament_events.6050.success: "Sua sabotagem foi bem-sucedida"
 tournament_events.6050.detected: "Sua sabotagem foi detectada"
 tournament_events.6050.failure: "Sua sabotagem foi malsucedida"
 tournament_host_disqualification_tt: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] pode desqualificar você por tentar sabotar[host.GetHerHim]"
 tournament_contestant_disqualification_tt: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] pode te desclassificar por tentar sabotar outro competidor"
 contest_sabotage_score_diff_far_behind_horse_race_tt: "#EMP [sabotage_target.Custom('GetContestHorseRaceName')]#! de [sabotage_target.GetFirstNameNoTooltip] é #negative_value mucho mejor#! que #EMP [sabotage_actor.Custom('GetContestHorseRaceName')]#!"
 contest_sabotage_score_diff_behind_horse_race_tt: "#EMP [sabotage_target.Custom('GetContestHorseRaceName')]#! de [sabotage_target.GetFirstNameNoTooltip] é #negative_value mucho mejor#! que o seu #EMP [sabotage_actor.Custom('GetContestHorseRaceName')]#!"
 contest_sabotage_score_diff_close_horse_race_tt: "#EMP [sabotage_target.Custom('GetContestHorseRaceName')]#! de [sabotage_target.GetFirstNameNoTooltip] tem um nível semelhante ao seu #EMP [sabotage_actor.Custom('GetContestHorseRaceName')]#!"
 contest_sabotage_score_diff_ahead_horse_race_tt: "#EMP [sabotage_target.Custom('GetContestHorseRaceName')]#! de [sabotage_target.GetFirstNameNoTooltip] é #positive_value peor#! que #EMP [sabotage_actor.Custom('GetContestHorseRaceName')]#!"
 contest_sabotage_score_diff_far_ahead_horse_race_tt: "#EMP [sabotage_target.Custom('GetContestHorseRaceName')]#! de [sabotage_target.GetFirstNameNoTooltip] está #positive_value mucho peor#! do que #EMP [sabotage_actor.Custom('GetContestHorseRaceName')]#!"
 contest_sabotage_score_diff_far_behind_tt: "[sabotage_target.GetShortUIName] está #negative_value muito melhor#! do que você"
 contest_sabotage_score_diff_behind_tt: "[sabotage_target.GetShortUIName] está #negative_value melhor#! do que você"
 contest_sabotage_score_diff_close_tt: "[sabotage_target.GetShortUIName] está próximo do seu nível de habilidade"
 contest_sabotage_score_diff_ahead_tt: "[sabotage_target.GetShortUIName] está #positive_value pior#! do que você"
 contest_sabotage_score_diff_far_ahead_tt: "[sabotage_target.GetShortUIName] está #positive_value muito pior#! do que você"
 tournament_events.6051.t: "$tournament_events.6050.t$"
 tournament_events.6051.foot: "Tentei sabotar a armadura [sabotage_target.Custom('ES_DelDela')] [sabotage_target.GetTitledFirstName|l] antes que a fase de [activity.GetCurrentPhase.GetPhase.GetName|l] , enfraquecendo os pontos de couro que prendem os componentes na esperança de que se desgastem."
 tournament_events.6051.archery: "Tentei sabotar o arco [sabotage_target.Custom('ES_DelDela')] [sabotage_target.GetTitledFirstName|l] antes que a competição de [activity.GetCurrentPhase.GetPhase.GetName|l] continue, alterando sutilmente a tensão da corda para desestabilizar[sabotage_target.GetHerHim]."
 tournament_events.6051.pugilism: "Tentei sabotar as bandagens [sabotage_target.Custom('ES_DelDela')] [sabotage_target.GetTitledFirstName|l] antes que continue a competição de [activity.GetCurrentPhase.GetPhase.GetName|l], cobrindo-as com uma pomada irritante para desestabilizar[sabotage_target.GetHerHim]."
 tournament_events.6051.horse: "Tentei envenenar o cavalo de [sabotage_target.GetShortUINameNoTooltipNoFormat] antes que a competição de [activity.GetCurrentPhase.GetPhase.GetName|l] continue, trocando a ração do estábulo por lotes contaminados enquanto os escudeiros dormiam."
 tournament_events.6051.horse_race: "Tentei envenenar o cavalo de corrida [sabotage_target.Custom('ES_DelDela')] [sabotage_target.GetTitledFirstName|l], #EMP [sabotage_target.Custom('GetContestHorseRaceName')]#!, antes que começasse a [activity.GetCurrentPhase.GetPhase.GetName|l] , trocando sua ração por lotes contaminados enquanto os escudeiros dormiam."
 tournament_events.6051.falconry: "Tentei envenenar a ave [sabotage_target.Custom('ES_DelDela')] [sabotage_target.GetTitledFirstName|l] antes que começasse a [activity.GetCurrentPhase.GetPhase.GetName|l], envenenando sua ração enquanto os escudeiros dormiam."
 tournament_events.6051.success: "\n\nMinha paciência finalmente valeu a pena; eu fiz a troca sem despertar suspeitas e escapei na noite. Ao amanhecer, fiquei aliviado ao descobrir que não havia nem sussurro sobre minhas maquinações."
 tournament_events.6051.detected: "\n\nQuando estava prestes a partir, com meu meticuloso trabalho a instantes de ser concluído, encontrei o assistente de [sabotage_target.GetFirstNameNoTooltip], boquiaberto. Antes que eu pudesse reagir, ele saiu correndo para avisar seu [sabotage_target.GetLadyLord]!"
 tournament_events.6051.failure: "\n\nInfelizmente, entre sua astúcia e minha má sorte, estas tentativas só fizeram levantar suspeitas de jogo sujo entre os competidores, que agora estão mais atentos do que nunca."
 tournament_events.6051.disqualified: "\n\nNão demora muito antes de eu ser desclassificado..."
 tournament_events.6051.forgiven: "\n\nFelizmente, me permitem continuar participando..."
 tournament_events.6051.a: "Tudo é justo."
 tournament_events.6051.a.disqualified: "Pelo amor de Deus..."
 tournament_events.6051.a.detected: "Que má sorte..."
 tournament_events.6051.a.failure: "Bobagens..."
 tournament_events.6052.t: "$tournament_events.6050.t$"
 tournament_events.6052.host: "Meus assistentes afirmam ter pego [sabotage_actor.Custom('ES_AlAla')] [sabotage_actor.GetTitledFirstName|l], competidor da próxima competição de [activity.GetCurrentPhase.GetPhase.GetName|l], em uma tentativa de me sabotar!\n\n"
 tournament_events.6052.guest: "[sabotage_target.GetTitledFirstName], um[sabotage_target.Custom('ES_XA')] competidor na futura competição de [activity.GetCurrentPhase.GetPhase.GetName|l], acusou [sabotage_actor.Custom('ES_AlAla')] [sabotage_actor.GetTitledFirstName|l] de jogo sujo, antes mesmo do dia do evento!\n\n"
 tournament_events.6052.foot: ""[sabotage_actor.GetSheHe|U] estava mexendo na armadura de [sabotage_target.LocalPlayerString( 'mi arsenal', sabotage_target.GetShortUINameNoTooltipNoFormat )], enfraquecendo os pontos de couro que prendem as peças, na esperança de que se desgastassem no meio da luta!"."
 tournament_events.6052.archery: "[sabotage_actor.GetSheHe|U] estava mexendo no arco de [sabotage_target.LocalPlayerString( 'minha equipe', sabotage_target.GetShortUINameNoTooltipNoFormat )], alterando sutilmente a tensão da corda."
 tournament_events.6052.pugilism: "[sabotage_actor.GetSheHe|U] estava mexendo nas bandagens de [sabotage_target.LocalPlayerString( 'minha equipe', sabotage_target.GetShortUINameNoTooltipNoFormat )] cobrindo-as com uma pomada irritante."
 tournament_events.6052.horse: ""[sabotage_actor.Custom('ES_ElLa')|U] [sabotage_actor.GetTitledFirstName|l] tentou envenenar o cavalo de [sabotage_target.LocalPlayerString( 'mis cuadras', sabotage_target.GetShortUINameNoTooltipNoFormat )] trocando a ração do estábulo por lotes envenenados enquanto os pajens dormiam"."
 tournament_events.6052.horse_race: ""[sabotage_actor.Custom('ES_ElLa')|U] [sabotage_actor.GetTitledFirstName|l] tentou envenenar o cavalo de corrida de [sabotage_target.LocalPlayerString( 'mis cuadras', sabotage_target.GetShortUINameNoTooltipNoFormat )], #EMP [sabotage_target.Custom('GetContestHorseRaceName')]#!, trocando sua ração por lotes contaminados enquanto os escudeiros dormiam"."
 tournament_events.6052.a: "Não toleraremos trapaças."
 tournament_events.6052.a.host: "Trapaças exigem desqualificação!"
 tournament_events.6052.b: "Venham, foi inofensivo."
 tournament_events.6053.t: "$tournament_events.6050.t$"
 tournament_events.6053.desc: "Antes mesmo do início do concurso [activity.GetCurrentPhase.GetPhase.GetName|l], alguém foi pego em flagrante sabotagem!"
 tournament_events.6053.foot: "[sabotage_actor.Custom('ES_ElLa')|U] [sabotage_actor.GetTitledFirstName|l] estava mexendo na armadura [sabotage_target.Custom('ES_DelDela')] [sabotage_target.GetTitledFirstName|l], enfraquecendo os pontos de couro que prendem os componentes, na esperança de que se desgastassem no meio do combate!"
 tournament_events.6053.archery: "[sabotage_actor.Custom('ES_ElLa')|U] [sabotage_actor.GetTitledFirstName|l] estava mexendo no arco [sabotage_target.Custom('ES_DelDela')] [sabotage_target.GetTitledFirstName|l], alterando sutilmente a tensão da corda para me desestabilizar."
 tournament_events.6053.pugilism: ""[sabotage_actor.Custom('ES_ElLa')|U] [sabotage_actor.GetTitledFirstName|l] estava mexendo nas bandagens de [sabotage_target.Custom('ES_DelDela')] [sabotage_target.GetTitledFirstName|l], cobrindo-as com uma pomada irritante para me desestabilizar"."
 tournament_events.6053.horse: ""[sabotage_actor.Custom('ES_ElLa')|U] [sabotage_actor.GetTitledFirstName|l] tentou envenenar o cavalo de [sabotage_target.LocalPlayerString( 'mis cuadras', sabotage_target.GetShortUINameNoTooltipNoFormat )] trocando a ração do estábulo por lotes contaminados enquanto os escudeiros dormiam"."
 tournament_events.6053.horse_race: ""[sabotage_actor.Custom('ES_ElLa')|U] [sabotage_actor.GetTitledFirstName|l] tentou envenenar #EMP [sabotage_target.Custom('GetContestHorseRaceName')]#!, o cavalo de corrida [sabotage_target.Custom('ES_DelDela')] [sabotage_target.GetTitledFirstName|l], trocando a ração por outra envenenada enquanto os escudeiros dormiam"."
 tournament_events.6053.disqualified_target: "\n\n[host.GetTitledFirstName] acaba de desclassificar da competição esse patife miserável. Que ousadia!"
 tournament_events.6053.disqualified: "\n\nLogicamente, [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] [sabotage_actor.GetHerHim] foi desclassificad[sabotage_actor.Custom('ES_OA')] da competição, para deleite da vítima pretendida."
 tournament_events.6053.forgiven_target: "\n\n[host.GetTitledFirstName], de forma ultrajante, perdoou esse miserável canalha[sabotage_actor.Custom('ES_OA')], e ainda será permitido que ele compita! Que descaramento!"
 tournament_events.6053.forgiven: "\n\nSurpreendentemente, [host.GetTitledFirstName|l] não tomou nenhuma ação contra [sabotage_actor.GetSheHe] e descartou o caso."
 tournament_events.6053.a: "Sem vergonha!"
 tournament_events.6500.t: "$tournament_header$ As Coisas que Fazemos por Amor"
 tournament_events.6500.desc: "Minhas tentativas de atrair a atenção [woo_target.Custom('ES_DelDela')] [woo_target.GetTitledFirstName|l] não passaram despercebidas, mas seu coração ainda não se abriu para mim.\n\n"Não sou um[woo_target.Custom('ES_XA')] [woo_target.Custom('GirlBoy')], um ser ingênuo que um nobre possa perseguir e descartar. Mostre-me — prove-me — seu afeto, e então conversaremos…".\n\n"Mostrar?", pergunto, "como quer que eu faça isso?".\n\nA resposta de [woo_target.GetFirstNameNoTooltip] chega rapidamente: "Perca a competição"."
 tournament_events.6500.a: "Como dizeis, amado[woo_target.Custom('ES_OA')] [woo_target.GetFirstNameNoTooltip]."
 tournament_events.6500.b: "Não há honra na derrota!"
 tournament_events.6510.t: "O Fascínio da Vitória"
 tournament_events.6510.opening: "As pausas nas festividades do torneio me dão bastante tempo para planejar um encontro com [woo_target.GetFirstName]."
 tournament_events.6510.married: "Foi fácil garantir que seu [woo_target.GetPrimarySpouse.GetWifeHusband] de [woo_target.GetPrimarySpouse.Custom('ES_ElLa')] [woo_target.GetPrimarySpouse.GetTitledFirstName|l] estivesse em outro lugar."
 tournament_events.6510.currentspouse: "Uma oportunidade de provar minha devoção a meu [woo_target.GetWomanMan]!"
 tournament_events.6510.desc: "\n\n"Parabéns por vencer a competição de [ROOT.Char.Custom('GetRandomWonContest')|l], [ROOT.Char.GetTitledFirstName|l]", oferece educadamente [woo_target.GetSheHe]. "Foi um verdadeiro espetáculo".\n\nHá um brilho genuíno nos olhos de [ROOT.Char.Custom('ES_OA')], tenho certeza disso."
 tournament_events.6510.a: "Fiz tudo por #EMP vos#! meu/minha [woo_target.GetLadyLord].[woo_target.Custom('ES_OA')]"
 tournament_events.6510.a.tt: "#F Apelo ao lado emocional de [woo_target.GetFirstNameNoTooltip].#!"
 tournament_events.6510.b: "Ah, isso? Não foi nada, na verdade."
 tournament_events.6510.b.tt: "#F Apelo ao lado arrogante de [woo_target.GetFirstNameNoTooltip].#!"
 tournament_events.6510.c: "Eu tive sorte: meus oponentes lutaram bem."
 tournament_events.6510.c.tt: "#F Apelo ao lado humilde de [woo_target.GetFirstNameNoTooltip].#!"
 tournament_events.6510.d: "[ROOT.Char.GetFaith.HighGodName] atendeu às minhas preces com o seu favor."
 tournament_events.6510.d.tt: "#F Apelo ao lado religioso de [woo_target.GetFirstNameNoTooltip].#!"
 tournament_events.6511.reply_dedicate: "[woo_actor.GetSheHe|U] tem a insolência de dizer que fez tudo isso por mim!\n\n"
 tournament_events.6511.reply_dismiss: "[woo_actor.GetSheHe|U] responde despreocupadamente que nem deveria mencionar algo tão trivial.\n\n"
 tournament_events.6511.reply_praise: "[woo_actor.GetSheHe|U] responde rapidamente que teve apenas sorte; seus oponentes não são menos poderosos do que [woo_actor.GetSheHe].\n\n"
 tournament_events.6511.reply_god: "[woo_actor.GetSheHe|U] responde com seriedade que agradece contar com o favor de [woo_actor.GetFaith.HighGodName].\n\n"
 tournament_events.6511.opening: "Encontro [woo_actor.Custom('ES_ElLa')] [woo_actor.GetTitledFirstName|l] no pavilhão e lhe ofereço meus parabéns pela sua vitória na competição de [ROOT.Char.Custom('GetRandomWonContest')|l].\n\n"
 tournament_events.6511.dedicate: "$tournament_events.6511.reply_dedicate$Não consigo evitar corar com essa descarada paquera..."
 tournament_events.6511.dismiss: "$tournament_events.6511.reply_dismiss$Que [woo_actor.GetWomanMan] audacioso..."
 tournament_events.6511.praise: "$tournament_events.6511.reply_praise$Tamanha humildade..."
 tournament_events.6511.god: "$tournament_events.6511.reply_god$Uma pessoa de fé, de fato."
 tournament_events.6511.fallback: "[woo_actor.GetSheHe|U] simplesmente sorri para mim com conhecimento, e fica difícil desviar o olhar."
 tournament_events.6511.a: "Não posso negar que tem certo charme…"
 tournament_events.6512.dedicate: "$tournament_events.6511.reply_dedicate$Não consigo deixar de me encolher internamente..."
 tournament_events.6512.dismiss: "$tournament_events.6511.reply_dismiss$Tamanha arrogância..."
 tournament_events.6512.praise: "$tournament_events.6511.praise$Aprenda a aceitar um elogio, de fato!"
 tournament_events.6512.god: "$tournament_events.6511.god$Que chato..."
 tournament_events.6512.fallback: "[woo_actor.GetSheHe|U] me sorri com cumplicidade, o que me deixa #EMP muito#! desconfortá[GetPlayer.Custom('ES_OA')]."
 tournament_events.6512.a: "Que [woo_actor.GetWomanMan] mais ridícul[woo_target.Custom('ES_OA')]."
 tournament_events.6513.reply: "[woo_target.Custom('ES_ElLa')|U] [woo_target.GetTitledFirstName|l] parece ter reagido calorosamente à minha resposta"
 tournament_events.6513.dedicate: "$tournament_events.6513.reply$, corando enquanto ri timidamente."
 tournament_events.6513.dismiss: "$tournament_events.6513.reply$, quase parecendo me observar com um novo olhar."
 tournament_events.6513.praise: "$tournament_events.6513.reply$, respondendo que [woo_target.GetSheHe] tem certeza de que foi mais do que sorte."
 tournament_events.6513.god: "$tournament_events.6513.reply$, respondendo que [woo_target.GetFaith.HighGodName] deve ter realmente desejado isso."
 tournament_events.6513.fallback: "$tournament_events.6513.reply$, olhando longa e profundamente nos meus olhos."
 tournament_events.6513.desc: "\n\nQuando ela vai embora, a tensão é palpável em cada cortesia: eu sabia que encontraria as palavras certas para conquistar[woo_target.GetHerHim]!"
 tournament_events.6513.a: "Acho que já mordeu a isca…"
 tournament_events.6514.reply: "Parece que minha resposta não impressionou [woo_target.Custom('ES_AlAla')] [woo_target.GetTitledFirstName|l]"
 tournament_events.6514.dedicate: "$tournament_events.6514.reply$, pois [woo_target.GetSheHe] desvia meu olhar quando me agradece e se retira rapidamente."
 tournament_events.6514.dismiss: "$tournament_events.6514.reply$, pois [woo_target.GetSheHe] revira os olhos com desdém."
 tournament_events.6514.praise: "$tournament_events.6514.reply$, pois rapidamente perde o interesse, desanimad[woo_target.Custom('ES_OA')] pelas minhas palavras."
 tournament_events.6514.god: "$tournament_events.6514.reply$, pois olha por cima e parece escutar apenas pela metade."
 tournament_events.6514.fallback: "$tournament_events.6513.reply$, pois ele não pode deixar minha companhia tão cedo."
 tournament_events.6514.desc: "\n\nAo me ver sozinho depois de que [woo_target.GetSheHe] se despediu, não consigo evitar sentir-me um tolo por esse erro tão grave…"
 tournament_events.6514.a: "O que eu estava pensando...?"
 tournament_events.6900.t: "$tournament_header$ Lanceiro[local_lancer.Custom('ES_OA')] local"
 tournament_events.6900.desc: "Ao examinar a pequena nobreza reunida em [activity.GetCurrentPhase.GetLocation.GetNameNoTooltip], vejo justamente o tipo de pessoa de que preciso.\n\n"
 tournament_events.6900.new: "[local_lancer.GetFullName] é um[local_lancer.Custom('ES_XA')] cavaleiro local com certa experiência, conhecid[local_lancer.Custom('ES_OA')] por seu valor apesar de sua baixa posição, um[local_lancer.Custom('ES_XA')] [ROOT.Char.Custom('MountedWarriorTerm')] de uma linhagem provincial esquecida."
 tournament_events.6900.pool: "[local_lancer.GetFullName] é um[local_lancer.Custom('ES_XA')] cavaleiro errante de certa experiência, viajando de corte em corte em busca de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetLadyLord] a quem servir. Normalmente não se deve confiar em [local_lancer.GetWomenMen] assim, mas seus talentos são imediatamente evidentes ao vê[local_lancer.GetHerHim]."
 tournament_events.6900.closing: "\n\nConforme me aproximo para me apresentar, [bidder.GetTitledFirstName|l] aparece ao lado de [local_lancer.GetSheHe]. Está claro que compartilha minha ideia…"
 tournament_events.6900.a: "Fique tranquilo(a), eu pagarei melhor."
 tournament_events.6900.a.success: "[local_lancer.GetFirstNameNoTooltip] é motivado(a) pelo dinheiro"
 tournament_events.6900.a.failure: "[local_lancer.GetFirstNameNoTooltip] prefere [bidder.GetFirstNameNoTooltip]"
 tournament_events.6900.b: "[local_lancer.GetFirstNameNoTooltip], você vai ficar no meu grandioso pavilhão!"
 tournament_events.6900.b.success: "[local_lancer.GetFirstNameNoTooltip] busca gratificação mundana"
 tournament_events.6900.c: "Vamos, vocês realmente prefeririam servir a um[bidder.Custom('ES_XA')] mer[bidder.Custom('ES_OA')] #EMP [bidder.GetTitleAsNameNoTooltip|l]#!?"
 tournament_events.6900.c.success: "[local_lancer.GetFirstNameNoTooltip] é um(a) tipo(a) ambicioso(a)"
 tournament_events.6900.d: "Saia da frente, [bidder.GetFirstNameNoTooltip] seu[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip] está em primeiro lugar."
 tournament_events.6900.e: "Não vou pechinchar por um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom('MountedWarriorTerm')]."
 tournament_events.7000.t: "$tournament_header$ Seja um(a) corajoso(a)!"
 tournament_events.7000.desc: "Saúdo um grupo de [ROOT.GetCharacter.Custom('KnightCulturePluralNoTooltipLowercase')] que passa ao meu lado. Um[mulan.Custom('ES_OA')], que fica para trás em relação ao restante, faz com que eu pare. Girando sobre os calcanhares, chamo aquela figura.\n\nTraja uma armadura sem forma e mal ajustada, com os olhos muito abertos e claramente apavorados sob o capacete. Aqui #EMP algo#! não está certo. Dou um passo à frente e arranco-lhe o capacete antes que tenha chance de reagir.\n\nDe pé diante de mim, olhando furtivamente ao redor para ver se mais alguém havia notado, não é outro senão um[mulan.Custom('ES_XA')] [mulan.GetWomanMan]! Vestid[mulan.Custom('ES_OA')] de [ROOT.GetCharacter.Custom('KnightCultureNoTooltipLowercase')], nada menos. Planejando até #EMP competir#! como [ROOT.GetCharacter.Custom('KnightCultureNoTooltipLowercase')]!"
 tournament_events.7000.a: "Guardarei seu segredo."
 tournament_events.7000.a.tt: "Junta-se à [activity.GetShortName|l]"
 tournament_events.7000.b: "Eu poderia contar com os serviços de alguém como você."
 tournament_events.7000.b.tt: "Torna-se seu(a) [mulan.Custom('KnightCulture')]"
 tournament_events.7000.c: "Guardas! #EMP Guardias!#! Há um[ROOT.Char.Custom('ES_XA')] #EMP [mulan.GetWomanMan]#! em nosso torneio!"
