 #MODIFIERS
 tournament_allow_foreign_pas_darmes_modifier: "Intrometido Tolerado"
 tournament_allow_foreign_pas_darmes_modifier_desc: "A sanção deste personagem a um cavaleiro estrangeiro, desafiando a nobreza com desafios marciais, tem levantado sobrancelhas."
 tournament_butt_tragedy_modifier: "Desgosto Popular"
 tournament_butt_tragedy_modifier_desc: "A maneira como a vida de um camponês local foi tratada de forma leviana quando acidentalmente ferido tem chocado os plebeus."
 tournament_battle_peasant_modifier: "Camponês Ambicioso"
 tournament_battle_peasant_modifier_desc: "A ascensão deste personagem de humilde camponês às fileiras da cavalaria tem irritado a nobreza existente."
 tournament_battle_peasant_county_modifier: "Mobilidade Social"
 tournament_battle_peasant_county_modifier_desc: "A promoção de um humilde camponês da região inspirou os plebeus com esperança e aspiração."
 tournament_favor_scheme_modifier: "Favor Concedido"
 tournament_favor_rejected_scheme_modifier: "Favor Rejeitado"
 tournament_thug_escape_modifier: "Despertou Desconfiança"
 tournament_thug_escape_modifier_desc: "Este personagem escapou recentemente de uma tentativa nefasta contra sua vida."
 tournament_poison_tummy_ache_modifier: "Dor de Barriga"
 tournament_poison_tummy_ache_modifier_desc: "Este personagem bebeu algo ruim e ainda está um pouco indisposto."
 tournament_attempted_sabotage_modifier: "Sabotador Conhecido"
 tournament_attempted_sabotage_modifier_desc: "Este personagem foi pego tentando sabotar outros concorrentes em um torneio."
 tournament_stands_collapsed_modifier: "Arquibancadas Desabaram"
 tournament_stands_collapsed_modifier_desc: "Este condado está sofrendo com a perda de vidas e confiança na coroa após o repentino desabamento de uma arquibancada do torneio."
 tournament_stands_compensated_modifier: "Indenização pelo Desabamento"
 tournament_stands_compensated_modifier_desc: "Este condado suportou um desastre trágico, mas a indenização das vítimas do desabamento das arquibancadas foi uma misericórdia inesperada."
 tournament_executed_builders_modifier: "Execução dos Construtores"
 tournament_executed_builders_modifier_desc: "A punição rápida deste personagem aos construtores acalmou parte da raiva dos plebeus, mas a que custo?"
 tournament_compensated_stands_modifier: "Vítimas Indenizadas"
 tournament_compensated_stands_modifier_desc: "A indenização deste personagem às vítimas do desabamento das arquibancadas restaurou a confiança dos plebeus no governo benevolente."
 tournament_punished_arsonists_modifier: "Incendiários Punidos"
 tournament_punished_arsonists_modifier_desc: "A punição severa deste personagem aos escudeiros indisciplinados tem semeado ressentimento entre seus próprios cavaleiros, mas conquistou o respeito de muitos outros."
 tournament_coddled_arsonists_modifier: "Incendiários Mimados"
 tournament_coddled_arsonists_modifier_desc: "O trato indulgente deste personagem com os pajens rebeldes lhe conquistou a simpatia de seus [ROOT.Char.Custom('KnightCulture')], mas deixou muitos outros estarrecidos."
 tournament_squire_riot_modifier: "Fogo dos Escudeiros"
 tournament_squire_riot_modifier_desc: "Este condado foi atingido por um incêndio causado por escudeiros indisciplinados que se divertiam em um torneio."
 tournament_tyrannical_disqualification_modifier: "Desqualificação Tirânica"
 tournament_tyrannical_disqualification_modifier_desc: "Este personagem ganhou a reputação de não jogar exatamente de acordo com as regras."
 tournament_melee_winner_modifier: "Vencedor do Combate"
 tournament_melee_winner_modifier_desc: "A equipe deste personagem prevaleceu em um Combate, trazendo-lhe grande fama e aclamação."
 tournament_joust_winner_modifier: "Cavaleiro Campeão"
 tournament_joust_winner_modifier_desc: "Este personagem conquistou fama e fortuna ao vencer um Torneio de Justa."
 tournament_wrestling_winner_modifier: "Lutador Experiente"
 tournament_wrestling_winner_modifier_desc: "Este personagem provou sua habilidade e força ao vencer uma Competição de Luta em um Torneio."
 tournament_duel_winner_modifier: "Duelista Talentoso"
