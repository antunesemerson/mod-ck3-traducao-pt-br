 special_guest_champion_desc: "Pode-se nomear um $special_guest_champion$ em um [GetActivityType( 'activity_tournament' ).GetName|l] para que o represente, esteja você participando ou não, embora os gêneros não marciais geralmente tirem mais proveito dele. Qualquer recompensa que um campeão receba em uma [contest|El] será compartilhada com a pessoa que o nomeou."
