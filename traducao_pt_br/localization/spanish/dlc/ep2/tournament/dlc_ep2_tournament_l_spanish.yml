 train_tournament_decision.tt: "Você e seus $knight_culture_player_plural$ aperfeiçoarão suas habilidades. Se tiverem sucesso, isso aumentará sua [prowess|E] para os eventos marciais de um próximo [GetActivityType('activity_tournament').GetName|l]."
