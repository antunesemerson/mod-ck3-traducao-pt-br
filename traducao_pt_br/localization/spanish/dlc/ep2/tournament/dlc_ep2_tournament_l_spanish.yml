 ### ACTIVITY
 activity_tournament: "Grande Torneio"
 activity_tournament_plural: "Grandes torneios"
 activity_tournament_desc: "Realize um magnífico conjunto de [contests|lE] marciais ou culturais que atrairá competidores de perto e de longe para disputar em torneios de lanças por [prizes|lE] e [prestige|lE]."
 activity_tournament_host_desc: "$BULLET_WITH_TAB$[prestige|E] [prestige_i|E]\n$BULLET_WITH_TAB$[legitimacy|E] [legitimacy_i|E]\n$BULLET_WITH_TAB$[stress_loss|E] [stress_loss_i|E]\n$BULLET_WITH_TAB$[trait_level_track_xp|EU] de [GetTrait('tourney_participant').GetName( GetNullCharacter )|l]\n$BULLET_WITH_TAB$ Os [acclaimed_knights|lE] ganham [glory|lE]"
 activity_tournament_selection_tooltip: "Convida teus $knight_culture_player_plural$, súditos e vizinhos para um grande espetáculo de competições\n\nRecompensas previstas:\n$BULLET_WITH_TAB$[prestige|E] [prestige_i]\n$BULLET_WITH_TAB$ Ganho de [legitimacy|lE] [legitimacy_i]\n$BULLET_WITH_TAB$ Perda de [stress|lE] [stress_loss_i]"
 tournament_contest: "Concurso"
 progress_to_victory: "$game_concept_progress_to_victory$"
 progress_to_victory_desc: "$game_concept_progress_to_victory_desc$"
 activity_tournament_destination_selection: ""
 activity_tournament_guest_help_text: "Qualquer [guests|El] terá a oportunidade de tentar se qualificar para um [contest|El] - desde que seja elegível - e, em seguida, competir no [GetActivityType('activity_tournament').GetName|l].\n\nConvidados inelegíveis podem percorrer os [locales|El] para obter recompensas únicas e assistir aos concursos enquanto ocorrem."
 tournament_province_jousting_lists_desc: "#color_green + Listas de Justa#!"
 tournament_province_gathering_halls_desc: "#color_green + Salões de Encontro#!"
 tournament_province_war_camps_desc: "#color_green + Campos de Guerra#!"
 tournament_province_military_camps_desc: "#color_green + Acampamentos Militares#!"
 tournament_province_archery_grounds_desc: "#color_green + Campos de Arquearia#!"
 tournament_province_smithies_desc: "#color_green + Herrero"
 tournament_province_royal_armories_desc: "#color_green + Arsenais Reais#!"
 tournament_hall_of_heroes_desc: "#color_green + Salão dos Heróis#!"
 tournament_barracks_desc: "#color_green + Quartéis#!"
 tournament_regimental_grounds_desc: "#color_green + Campos Regimentais#!"
 ### PHASES
 #TEAM
 tournament_phase_melee: "Combate Corpo a Corpo"
 tournament_phase_melee_desc: "Uma batalha simulada, a cavalo e a pé, entre duas equipes que lutam para controlar um campo contestado e capturar combatentes inimigos para resgate.\n\n $tournament_contest_format_team$"
 #TURN
 tournament_phase_archery: "Arquearia"
 tournament_phase_archery_desc: "Uma competição de arco em que cada concorrente atira em um alvo com um número definido de flechas, visando marcar o maior número possível de pontos.\n\n $tournament_contest_formaty_turn$"
 tournament_phase_recital: "Recital"
 tournament_phase_recital_desc: "Uma competição de poesia em que cada participante recita publicamente um poema escrito para a ocasião e é julgado em relação a todos os demais participantes.\n\n$tournament_contest_formaty_turn$"
 #VERSUS
 tournament_phase_joust: "Justa"
 tournament_phase_joust_desc: "Uma competição equestre em que os concorrentes se enfrentam com lanças, tentando derrubar o oponente ou marcar mais pontos para ser o último em pé.\n\n $tournament_contest_format_versus$\nNúmero de [contest_rounds|El]: 3"
 tournament_phase_duel: "Duelo"
 tournament_phase_duel_desc: "Uma série de duelos armados lutados a pé, em que os concorrentes tentam desarmar ou marcar mais pontos que seus oponentes para ser o último em pé.\n\n $tournament_contest_format_versus$\nNúmero de [contest_rounds|El]: 3"
 tournament_phase_wrestling: "Luta Livre"
 tournament_phase_wrestling_desc: "Uma competição de força e astúcia, na qual os concorrentes tentam derrubar ou arremessar seus oponentes do ringue para ser o último em pé.\n\n $tournament_contest_format_versus$\nNúmero de [contest_rounds|El]: 3"
 tournament_phase_board_game: "Jogo de Tabuleiro"
 tournament_phase_board_game_desc: "Uma competição de inteligência em que os concorrentes jogam uma série de partidas de jogos de tabuleiro, sendo o vencedor final o último jogador restante.\n\n $tournament_contest_format_versus$\nNúmero de [contest_rounds|El]: 3"
 #RACE
 tournament_phase_horse_race: "Corrida de Cavalos"
 tournament_phase_horse_race_desc: "Um esporte de espectadores em que senhores e damas inscrevem cavalos para competir uns contra os outros, sendo o vencedor o primeiro a cruzar a linha de chegada.\n\n $tournament_contest_format_race$"
 #CEREMONY
 tournament_phase_ceremony: "Cerimônia"
 tournament_phase_ceremony_desc: "A cerimônia de encerramento e as celebrações!"
 ### OPTIONS
 #ACCOMMODATIONS
 tournament_option_accommodations: "Acomodações"
 tournament_accommodations_bad: "Tendas Precárias"
 tournament_accommodations_bad_desc: "$EFFECT_LIST_BULLET$ Certos eventos negativos têm maior probabilidade de ocorrer\n\n #weak O que importa mais, as habilidades em exibição ou o lugar onde são exibidas?#!"
 tournament_accommodations_normal: "Pavilhões Simples"
 tournament_accommodations_normal_desc: "$EFFECT_LIST_BULLET$ Os pesos dos eventos não são afetados\n\n #weak A chave para uma boa luta é ter uma boa noite de descanso.#!"
 tournament_accommodations_good: "Acampamentos Luxuosos"
 tournament_accommodations_good_desc: "$EFFECT_LIST_BULLET$ Certos eventos negativos têm probabilidade #EMP menor#! de ocorrer\n\n #weak Torneios devem ser mais do que simples eventos esportivos, devem ser experiências esportivas completas #underline#!.#!"
 #PRIZES
 tournament_option_prizes: "Prêmios"
 tournament_prizes_bad: "Prêmios Simples"
 tournament_prizes_bad_desc: "$EFFECT_LIST_BULLET$ Os [artifacts|lE] de prêmio serão de uma [rarity|lE] comum\n\n#weak Estamos aqui pelo amor ao esporte; as bugigangas oferecidas são apenas uma desculpa.#!"
 tournament_prizes_normal: "Prêmios Decentes"
 tournament_prizes_normal_desc: "$EFFECT_LIST_BULLET$ Os [artifacts|lE] de prêmio serão de uma [rarity|lE] comum ou de obra-prima\n\n#weak Embora não estejamos aqui pelos prêmios, poder bancar a viagem de volta para casa é uma meta bastante prática.#!"
 tournament_prizes_good: "Prêmios Bons"
 tournament_prizes_good_desc: "$EFFECT_LIST_BULLET$ Os [artifacts|lE] de prêmio serão de uma [rarity|lE] de obra-prima ou célebre\n\n#weak Sem nada em jogo, qual é o sentido de uma competição?#!"
 tournament_prizes_very_good: "Prêmios Excelentes"
 tournament_prizes_very_good_desc: "$EFFECT_LIST_BULLET$ Os [artifacts|lE] de prêmio serão de uma [rarity|lE] de obra-prima, célebre ou ilustre\n\n#weak Um prêmio não é apenas uma bugiganga entregue ao vencedor; é um farol para atrair os bravos e audazes.#!"
 tournament_prizes_splendid: "Prêmios Esplêndidos"
 tournament_prizes_splendid_desc: "$EFFECT_LIST_BULLET$ Os [artifacts|lE] de prêmio serão de uma [rarity|lE] célebre ou ilustre\n\n#weak Os melhores prêmios são aqueles tão glamorosos que eclipsam seus vencedores.#!"
 ### INTENTS
 win_contest_intent: "Triunfo"
 win_contest_intent_desc: "Vença as competições deste(a) [GetActivityType( 'activity_tournament' ).GetName|l], ao custo de todo o resto. Isso muitas vezes leva a recompensas maiores de [progress_to_victory|lE] e opções e eventos especiais."
