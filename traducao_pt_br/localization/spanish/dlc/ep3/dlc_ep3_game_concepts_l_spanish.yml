l_spanish:
 game_concept_administrative_government: "Governo Administrativo"
 game_concept_administrative_governments: "Governos Administrativos"
 game_concept_administrative: "Administrativo"
 game_concept_administrative_i: "@government_type_administrative!"
 game_concept_administrative_desc: "$game_concept_administrative$ é um[government_form|lE] [Concept('government_bureaucratic_type', 'burocrática')|E] em que se nomeiam [characters|lE] como [governors|lE] para que administrem e presidam as terras, chamadas [provinces|lE], em nome de seu [liege|lE].\n\nOs personagens de $game_concept_administrative$ têm acesso a [influence|lE] e alguns também possuem uma [family_estate|lE] pessoal.\n\nSomente os [rulers|lE] [Concept( 'independent', 'independientes' )|E] de um [realm|lE] [Concept( 'administrative', 'administrado' )|E] têm [legitimacy|lE]; os [vassals|lE], não.\n\n $admin_cannot_declare_internal_wars$"
 game_concept_imperial_bureaucracy: "Burocracia Imperial"
 game_concept_imperial_bureaucracy_desc: "$game_concept_imperial_bureaucracy$ indica o nível de centralização dos [realms|lE] [Concept( 'administrative', 'administrados' )|E] e o poder geral que o [ruler|lE] exerce sobre seus [vassals|E].\n\nSomente o [top_liege|lE] pode mudar a $game_concept_imperial_bureaucracy$. Os $game_concept_vassals$ administrados usam o mesmo nível que seu $game_concept_liege$.\n\nExistem quatro níveis de $game_concept_imperial_bureaucracy$:\n $EFFECT_LIST_BULLET$$imperial_bureaucracy_0$\n $EFFECT_LIST_BULLET$$imperial_bureaucracy_1$\n $EFFECT_LIST_BULLET$$imperial_bureaucracy_2$\n $EFFECT_LIST_BULLET$$imperial_bureaucracy_3$\n\nAumentar a burocracia imperial custa uma quantidade de [prestige|lE] que depende do [realm_size|lE] e da [learning_skill|lE] do governante."
 game_concept_governor: "Governador"
 game_concept_governor_possessive: "do governador"
 game_concept_governors: "Governadores"
 game_concept_governors_possessive: "dos governadores"
 game_concept_governed: "Governado"
 game_concept_strategos: "Estratégos"
 game_concept_strategos_possessive: "do estratego"
 game_concept_strategoi: "Estratégos"
 game_concept_strategoi_possessive: "dos estrategos"
 game_concept_governorship: "Governadoria"
 game_concept_governorships: "Governadorias"
 game_concept_governor_desc: "$game_concept_governor$ é o vassalo principal de um [liege|lE] em um [government_bureaucratic_gov|El]. Ele é nomeado por seu suserano para governar terras dentro do [realm|lE] utilizando sua [governor_efficiency|lE].\n\nO [title|lE] de um $game_concept_governor$, assim como os [counties|lE] que ele inclui, é chamado de [province|lE]. Dentro de uma Província, podem surgir [governance_issues|lE] que o $game_concept_governor$ terá de resolver.\n\nOs governadores podem acumular [influence|lE] e manipular a [succession|lE] de outros $game_concept_governorships$."
 game_concept_candidate_score: "Pontuação de Candidato"
 game_concept_candidate_scores: "Pontuações de candidatura"
 game_concept_candidate_score_desc: "[characters|lE] na [line_of_succession|lE] para um [title|lE] com [administrative_government|lE] têm uma $game_concept_candidate_score$.\n\nEssa pontuação dita quem receberá o(s) título(s) na [succession|lE] e pode ser alterada por vários meios, desde [scheming|lE] até gastar [influence|lE]."
 game_concept_influence: "Influência"
 game_concept_influence_desc: "A $game_concept_influence$ representa o alcance político e a autoridade de um [character|lE] em um [realm|lE] com [administrative_government|lE].\n\nA influência é uma ferramenta essencial e pode ser obtida de várias maneiras. Por exemplo, ao se tornar [governor|lE], ao aprimorar uma [estate|lE] ou ao se aliar ao [house_head|lE] de uma [noble_family|lE].\n\nA principal forma de gastar e usar a influência é obter uma [governorship|lE], mas também é um recurso valioso para influenciar outros personagens a fazerem o que você quer.\n\nToda vez que um personagem ganha $game_concept_influence$, ele também progride em direção ao próximo [influence_level|lE]."
 game_concept_influence_i: "@influence_icon!"
 game_concept_influential: "Influente"
 game_concept_influence_level: "Nível de Influência"
 game_concept_influence_level_desc: "O nível de influência de um [character|lE] mede seu poder político geral e seu alcance.\n\nToda vez que um personagem ganha [influence|lE], também ganha progresso em direção ao próximo $game_concept_influence_level$.\n\nOs níveis são:\n $EFFECT_LIST_BULLET$[GetModifier( 'influence_level_0' ).GetNameWithTooltip|L]\n $EFFECT_LIST_BULLET$[GetModifier( 'influence_level_1' ).GetNameWithTooltip|L]\n $EFFECT_LIST_BULLET$[GetModifier( 'influence_level_2' ).GetNameWithTooltip|L]\n $EFFECT_LIST_BULLET$[GetModifier( 'influence_level_3' ).GetNameWithTooltip|L]\n $EFFECT_LIST_BULLET$[GetModifier( 'influence_level_4' ).GetNameWithTooltip|L]\n $EFFECT_LIST_BULLET$[GetModifier( 'influence_level_5' ).GetNameWithTooltip|L]"
 game_concept_influence_levels: "Níveis de Influência"
 game_concept_influence_level_impact: "Impacto do nível de influência"
 game_concept_influence_level_impact_desc: "O impacto do nível de influência aumenta ou diminui os [modifiers|El] obtidos do seu [prestige_level|El] atual."
 game_concept_title_men_at_arms: "Título de Homens de Armas"
 game_concept_title_men_at_arms_desc: "Os $game_concept_title_men_at_arms$ são [men_at_arms|lE] que existem para um [title|lE] em particular. Em vez de pertencerem pessoalmente ao [ruler|lE], essas tropas sempre seguem o $game_concept_title$ ao qual pertencem. Isso significa que quem quer que possua o título também possuirá e controlará esses guerreiros.\n\nOs $game_concept_title_men_at_arms$ são empregados por certas [government_forms|lE], como os [Concept('administrative', 'administrativos' )|E]."
 game_concept_domicile: "Domicílio"
 game_concept_domiciles: "Domicílios"
 game_concept_domicile_desc: "$game_concept_domicile$ é a propriedade privada de certos [characters|lE] que possuem uma [government_form|lE] específica, como [administrative|lE] e [adventurer|lE].\n\nO $game_concept_domicile$ serve como base principal de poder do seu proprietário, em vez de [holdings|lE] e pode ser aprimorado com [domicile_buildings|lE].\n\nTodo $game_concept_domicile$ está localizado dentro de uma [barony|lE] designada e pode ser movido para um novo local. Podem se aplicar restrições dependendo do tipo de $game_concept_domicile$.\n\nTodo $game_concept_domicile$ tem um [title|lE] especial sem terras e segue sua [succession|lE]."
 game_concept_domicile_building: "Edifício Domiciliar"
 game_concept_domicile_buildings: "Edifícios Domiciliares"
 game_concept_domicile_building_desc: "Todos os [domiciles|lE] podem ser aprimorados com certos $game_concept_domicile_buildings$, que concedem renda, recursos como o [prestige|lE], e muitos outros benefícios ao proprietário.\n\nA disponibilidade dos edifícios depende do tipo de $game_concept_domicile$, pois cada tipo possui um conjunto de edifícios bastante diferente.\n\nAlguns $game_concept_domicile_buildings$ podem ter [internal_upgrades|lE]."
 game_concept_domicile_build_speed: "Tempo de Construção do [domicile_building|lE]"
 game_concept_domicile_travel_speed: "Velocidade de Viagem do [domicile|lE]"
 game_concept_domicile_building_upgrade: "Melhoria Interna"
 game_concept_domicile_building_upgrade_desc: "Alguns $game_concept_domicile_buildings$ podem ser melhorados com $game_concept_internal_upgrades$.\n\nUma Melhoria, embora semelhante a outros $game_concept_domicile_buildings$, só pode ser construída dentro de um edifício específico. Cada edifício com acesso a Melhorias tem seu próprio conjunto único de Melhorias disponíveis."
 game_concept_domicile_building_slot: "Espaço de $game_concept_domicile_building$"
 game_concept_domicile_building_slots: "Espaços de $game_concept_domicile_building$"
 game_concept_domicile_building_slot_slot: "Espaço"
 game_concept_domicile_building_slot_slots: "Espaços"
 game_concept_domicile_building_slot_desc: "Cada [domicile|lE] só possui um número limitado de $game_concept_domicile_building_slot_slots$ potenciais para novos edifícios.\n\nPodem ser desbloqueados $game_concept_domicile_building_slot_slots$ novos ao aprimorar o $game_concept_domicile_building$ central, como o [GetDomicileBuilding('estate_main_01').GetName|l] de uma [estate|lE] ou o [GetDomicileBuilding('camp_main_01').GetName|l] de um [camp|lE].\n\n#WEAK Os $game_concept_domicile_building_slot_slots$ bloqueados são exibidos na tela de $game_concept_domicile$; não é possível obter $game_concept_domicile_building_slot_slots$ extras além desses.#!"
 game_concept_internal_upgrades: "Melhorias Internas"
 game_concept_estate: "Propriedade"
 game_concept_estates: "Propriedades"
 game_concept_family_estate: "Propriedade Familiar"
 game_concept_family_estates: "Propriedades Familiares"
 game_concept_estate_desc: "$game_concept_estate$ é um tipo de [domicile|lE] que é mantido pelo [house_head|lE] de [noble_families|lE] notáveis em [realms|lE] [Concept( 'administrative', 'administrados' )|E]. Representam propriedades de terras privadas não vinculadas a nenhum [title|lE] particular [landed|lE].\n\nAqui podem ser construídos [estate_buildings|lE] para ampliar a riqueza e [influence|lE] da família. As gerações futuras herdarão o $game_concept_estate$."
 game_concept_estate_building: "Edifício de Propriedade"
 game_concept_estate_buildings: "Edifícios de Propriedade"
 game_concept_estate_building_desc: "Os $game_concept_estate_buildings$ são melhorias únicas e persistentes da [estate|lE] de uma [noble_family|lE].\n\nHá uma grande variedade de estruturas disponíveis para construção, e o proprietário da propriedade pode construí-las para gerar renda privada, aumentar a [influence|lE] da família e obter acesso a uma série de [decisions|lE], [interactions|lE] e mais."
 game_concept_camp: "Acampamento"
 game_concept_camps: "Acampamentos"
 game_concept_adventurer_camp: "Acampamento de Aventureiro"
 game_concept_adventurer_camps: "Acampamentos de Aventureiros"
 game_concept_camp_desc: "Os $game_concept_camps$ são um conjunto portátil de tendas, animais de carga e pessoas. Variam de tamanho, indo de um pequeno círculo a grandes exércitos em marcha.\n\nTodo [GetGovernment( 'landless_adventurer_government' ).GetName] tem [domicile|lE] em um $game_concept_camp$ que se desloca pelo mapa com eles.\n\nAqui podem ser construídos [camp_buildings|lE], que fornecem grandes bônus ao $game_concept_adventurer$ em vez de [counties|lE] próprios. Os [followers|lE], assim como a [family|lE] e os [knights|lE], viajam com o $game_concept_camp$ e podem ser nomeados [officers|lE].\n\n#WEAK Assim como as [courts|lE], os acampamentos podem incluir [characters|lE] anônimos sem a importância suficiente como para terem retrato — ainda que em menor número.\n\nMesmo quando não [Concept('traveling', 'viajam' )|E] entre $game_concept_counties$, os $game_concept_camps$ geralmente não permanecem estáticos na [location|lE] onde se encontram e mudarão de lugar a cada poucas noites.#!"
 game_concept_camp_building: "Melhoria de Acampamento"
 game_concept_camp_buildings: "Melhorias de Acampamento"
 game_concept_camp_building_desc: "Os $game_concept_camp_buildings$ são melhorias únicas de um [camp|lE].\n\nMecanicamente, são [domicile_buildings|lE], embora muitos representem costumes sociais ou simplesmente áreas de foco para os $game_concept_camp$, em vez de estruturas literais.\n\nAs bonificações que podem conceder incluem:\n$EFFECT_LIST_BULLET$ Desbloqueio de [officers|lE] novos\n$EFFECT_LIST_BULLET$ Fortes bônus de [skill|lE] para os [followers|lE]\n$EFFECT_LIST_BULLET$ Aumentar a ძალ forca dos [men_at_arms|lE]\n$EFFECT_LIST_BULLET$ Desbloquear ações que [rulers|lE] [landed|lE]s tomam como certas.\n\n#WEAK Quando um [adventurer|lE] se torna [landed|lE], seus $game_concept_camp_buildings$ são liquidados e uma parte é recuperada em [gold|lE].#!"
 game_concept_follower: "Seguidor"
 game_concept_followers: "Seguidores"
 game_concept_following: "Seguindo"
 game_concept_follower_desc: "$game_concept_follower$ é um personagem [unlanded|lE] que acompanha um [adventurer|lE].\n\nPor mecânica, equivalem aos [courtiers|lE], embora tenham menos obrigação de demonstrar respeito ao líder ou de ficar por perto se não gostarem dele.\n\nA [opinion|lE] coletiva dos $game_concept_followers$ de um personagem determina o [Concept('camp_temperament', 'ambiente do acampamento' )|E].\n\nOs seguidores podem:\n$BULLET_WITH_TAB$Servir como [officers|lE]\n$BULLET_WITH_TAB$Servir em [armies|lE] como [commanders|lE] ou [knights|lE]\n$BULLET_WITH_TAB$Deixar que seu [adventurer|lE] reivindique [claims|lE] em uma [war|lE]"
 game_concept_camp_temperament: "Temperamento do Acampamento"
 game_concept_camp_temperament_desc: "Ao contrário da rígida hierarquia de uma [court|lE], os $game_concept_camps$ são, em sua maior parte, lugares informais onde as reclamações de [characters|lE] importantes, #EMP além#! do líder [adventurer|lE] podem ter grande importância.\n\n#P $DOMICILE_WINDOW_BOOKMARK_FOLLOWERS_TEMPERAMENT_POSITIVE$#! Os $game_concept_camps$ concedem [character_modifiers|lE] positivos ao seu $game_concept_adventurer$. Eles podem exigir que a [opinion|lE] majoritária de todos os [characters|lE] nomeados seja [GetDefine('NDomicile', 'TEMPERAMENT_THRESHOLD_HIGH')|=P0] ou mais.\n\n#N $DOMICILE_WINDOW_BOOKMARK_FOLLOWERS_TEMPERAMENT_NEGATIVE$#! Os $game_concept_camps$ impõem $game_concept_character_modifiers$ negativos ao seu $game_concept_adventurer$. Exigem que a $game_concept_opinion$ majoritária de todos os $game_concept_characters$ nomeados seja [GetDefine('NDomicile', 'TEMPERAMENT_THRESHOLD_LOW')|=N0] ou menos.\n\n#V $DOMICILE_WINDOW_BOOKMARK_FOLLOWERS_TEMPERAMENT_NEUTRAL$#! Os $game_concept_camps$ cujas $game_concept_opinions$ ficam em algum ponto entre esses dois extremos, não concedem $game_concept_modifiers$.\n\n#WEAK Los efectos del $game_concept_camp_temperament$ aumentan con el [prestige_level|lE] del $game_concept_adventurer$. Cuanto más fama tenga, más drásticos serán los posibles beneficios —e inconvenientes— del ambiente en su $game_concept_camp$.#!"
 game_concept_adventurer: "Aventureiro"
 game_concept_adventurers: "Aventureiros"
 game_concept_adventurer_possessive: "do Aventureiro"
 game_concept_adventurers_possessive: "dos Aventureiros"
 game_concept_adventurer_i: "@government_type_adventurer!"
 game_concept_adventurer_desc: "$game_concept_adventurer$ é um [character|lE] [unlanded|lE] que lidera um [camp|lE].\n\nNão têm [vassals|lE] nem ganham renda passivamente do modo habitual; em vez disso, devem aceitar [task_contracts|lE] para ganhar dinheiro ou cobrar favores de sua [contact_list|lE].\n\nOs $game_concept_adventurers$ podem vagar livremente pelo mapa. Sua principal preocupação é garantir que tenham [provisions|lE] suficientes para sobreviver em movimento.\n\nEm vez de [crown_authority|lE], a maioria dos aventureiros escolherá um [camp_purpose|lE]. Isso indica que tipo de grupo eles têm e por que permanecem juntos.\n\n#WEAK Sétimos filhos motivados sem herança, nômades ambiciosos, fugitivos petulantes, eruditos curiosos, mercenários ferozes e nobres depostos compõem igualmente as fileiras desses andarilhos incansáveis.\n\nO único fator que os une é a fome por algo além de uma vida tranquila no anonimato e a vontade de fazer algo a respeito.#!"
 game_concept_officer: "Oficial"
 game_concept_officers: "Oficiais"
 game_concept_officer_desc: "Os $game_concept_officers$ são cargos especializados que podem ser concedidos a [followers|lE] para que ajudem no [camp|lE].\n\nEm termos mecânicos, eles funcionam de maneira muito semelhante aos [court_positions|lE]. Assim como com eles, os benefícios que você obtém com os $game_concept_officers$ dependem da [aptitude|lE] do titular do cargo.\n\nAo contrário dos $game_concept_court_positions$, nomear oficiais é grátis e eles não recebem salário mensal, embora revogá-los ainda custe [prestige|lE].#!\n\n#WEAK Os oficiais são desbloqueados por muitos [camp_buildings|lE] diferentes.#!"
 game_concept_imperial_family: "Família Imperial"
 game_concept_imperial_families: "Famílias imperiais"
 game_concept_imperial: "Imperial"
 game_concept_imperial_family_desc: "A $game_concept_imperial_family$ é a [house|lE] principal de um [realm|lE] [Concept( 'administrative', 'administrado' )|E]"
 game_concept_noble_family: "Família Nobre"
 game_concept_noble_families: "Famílias Nobres"
 game_concept_noble_family_possessive: "da Família Nobre"
 game_concept_noble_family_desc: "As $game_concept_noble_families$ são [houses|lE] poderosas em um [realm|lE] [administrative|lE]. Possuem uma [estate|lE], controlada e administrada pelo [house_head|lE] e, em todos os momentos, continuam sendo parte integral do reino; enquanto tentarão acumular [influence|lE] e se apoderar de [provinces|lE]\n\nUma família nobre influente pode se tornar uma [powerful_family|lE] ou [Concept('dominant_family', 'dominante' )|E]"
 game_concept_powerful_family: "Família Poderosa"
 game_concept_powerful_families: "Famílias Poderosas"
 game_concept_powerful: "Poderoso"
 game_concept_powerful_family_desc: "$game_concept_powerful_family$ faz referência a uma das [houses|lE] mais influentes e [noble_families|lE] de um [realm|lE] [Concept( 'administrative', 'administrativo' )|E].\n\nO integrante de uma $game_concept_powerful_family$ é melhor em [political_schemes|lE] e é mais provável que consiga o que quer ao [Concept('interacting', 'tratar')|lE] com outros [characters|lE].\n\nSó pode haver um número limitado de [Concept( 'powerful_families', 'famílias poderosas' )|E] em qualquer momento e apenas as $game_concept_noble_families$ melhor avaliadas são consideradas poderosas com base em sua [powerful_family_rating_short|lE]. A casa do [top_liege|lE] é uma exceção, pois sempre é considerada Poderosa.\n\nUma família que controla uma parte significativa das terras de um reino pode se tornar uma [dominant_family|lE]."
 game_concept_dominant_family: "Família Dominante"
 game_concept_dominant_families: "Famílias Dominantes"
 game_concept_dominant: "Dominante"
 game_concept_dominant_family_desc: "$game_concept_dominant_family$ é uma [powerful_family|lE] que expandiu seu controle por toda parte. É considerada a [house|lE] mais influente de um [realm|lE].\n\nO membro de uma $game_concept_powerful_family$ é ainda melhor em [political_schemes|lE] e é ainda mais provável que consiga o que quer ao [Concept('interacting', 'tratar')|lE] com outros [characters|lE].\n\nUma $game_concept_house$ deve controlar pelo menos um [EmptyScope.ScriptValue('dominant_family_threshold_value')|V0%] do domínio para se tornar dominante."
 game_concept_house_attribute: "Atributo da casa"
 game_concept_house_attribute_desc: "Em certos [governments|lE], as [houses|lE] podem ter um [Concept('house_attribute', 'atributo')|E] que afete os membros da casa.\n\nOs diferentes atributos da casa são:\n $EFFECT_LIST_BULLET$[powerful_family_attribute|E]\n $EFFECT_LIST_BULLET$[house_aspiration|E]\n $EFFECT_LIST_BULLET$[mandala_aspect|E]"
 game_concept_powerful_family_attribute: "Atributo de família poderosa"
 game_concept_family_attribute: "Atributo familiar"
 game_concept_powerful_family_attribute_desc: "O $game_concept_powerful_family_attribute$ é um conjunto de bônus associado a uma [house|lE] de um [realm|lE] [Concept( 'administrative', 'administrado' )|E]. Este atributo beneficia os membros da $game_concept_house$, assim como o seu [liege|lE].\n\nOs atributos só ficam ativos enquanto a $game_concept_house$ for considerada uma [powerful_family|lE] e o $game_concept_family_attribute$ de uma [dominant_family|lE] não beneficiar o seu [liege|lE].\n\nO [house_head|lE] pode substituir livremente o atributo a qualquer momento."
 game_concept_powerful_family_rating: "Classificação de Família Poderosa"
 game_concept_powerful_family_rating_short: "Classificação"
 game_concept_powerful_family_rating_mid: "Classificação da Família"
 game_concept_powerful_family_rating_desc: "A $game_concept_powerful_family_rating$ mede quão influente é uma [powerful_family|lE].\n\nEmbora existam várias maneiras de aumentar a $game_concept_powerful_family_rating_short$ de uma família, o principal fator é o número de [governorships|lE] que ela detém.\n\nUma [house|lE] deve ter uma [Concept( 'powerful_family_rating_short', 'posición' )|E] mínima de [GetDefine('NHouse', 'POWERFUL_HOUSE_MINIMUM_POWER')|V0] para ser considerada poderosa."
 game_concept_admin_confirmation: "$admin_confirmation_decision$"
 game_concept_admin_confirmation_desc: "Os [governors|lE] podem ter seus nomeamentos confirmados de forma pública e formal por seu [liege|lE]."
 game_concept_ep3_become_landless_adventurer_decision: "$become_landless_adventurer_decision$ Decisão"
 game_concept_ep3_become_landless_adventurer_decision_desc: "Uma [decision|lE] desbloqueada por certas [traditions|lE] que permite a um [ruler|lE] de um pequeno [realm|lE] deixar voluntariamente e se tornar um [adventurer|lE]."
 game_concept_ep3_purchase_land_interaction: "$purchase_land_interaction$"
 game_concept_ep3_purchase_land_interaction_desc: "Uma [interaction|lE] que permite a um [adventurer|lE] comprar terras de um [ruler|lE] e se estabelecer em seu [realm|lE]."
 game_concept_ep3_negotiate_settlement_interaction: "$negotiate_settlement_interaction$"
 game_concept_ep3_negotiate_settlement_interaction_desc: "Uma [interaction|lE] que permite a um [ruler|lE] conceder a um [adventurer|lE] desordeiro um assentamento em seu [realm|lE]."
 game_concept_ep3_laamp_adventurer_invasion_war: "$EP3_LAAMP_INVASION_CB_NAME$"
 game_concept_ep3_laamp_adventurer_invasion_war_desc: "Um [casus_belli|lE] que permite a um [adventurer|lE] declarar [war|lE] para tentar criar um novo [realm|lE]."
 game_concept_contractor: "Contratante"
 game_concept_contractors: "Contratantes"
 game_concept_contractor_possessive: "do Contratante"
 game_concept_contractors_possessive: "dos Contratantes"
 game_concept_contractor_desc: "$game_concept_contractor$ é o [character|lE] que emite um $game_concept_task_contract$.\n\nO contrato, em geral, o afetará e costuma ser quem paga o salário do [adventurer|lE].\n\n#N Os [criminal_task_contracts|lE], em geral, #BOL não#! são emitidos por seu $game_concept_contractor$, mas sim se concentram em se aproveitar dele — por exemplo, enganando alguém para que nos dê [gold|lE] porque tenha deixado evidente sua credulidade.#!"
 game_concept_contract_scheme: "Esquema de Contrato"
 game_concept_contract_schemes: "Esquemas de Contrato"
 game_concept_contract_scheme_possessive: "do Esquema de Contrato"
 game_concept_contract_schemes_possessive: "dos Esquemas de Contrato"
 game_concept_contract_scheme_contract: "Contrato"
 game_concept_contract_scheme_desc: "Muitos $game_concept_task_contracts$ precisam que os [adventurers|lE] realizem com sucesso uma [scheme|lE].\n\nPodem ser prejudiciais (como assassinar o [rival|lE] rival do [contractor|lE]), agradáveis (como simplesmente contar histórias por alguns meses para entreter sua [court|lE]) ou inocuas (como transcrever textos para eles).\n\nSe a $game_concept_scheme$ falhar ou for abandonada por qualquer motivo, o $game_concept_task_contract$ também falha."
 game_concept_contact_list: "Lista de Patronos"
 game_concept_contact_list_contacts: "Patronos"
 game_concept_contact_list_contact: "Patrono"
 game_concept_contact_list_desc: "Os [adventurers|lE] carecem de [land|lE], mas não de #EMP contatos#!.\n\nA $game_concept_contact_list$ é uma lista de todos os [characters|lE] para os quais um [task_contract|lE] tenha sido concluído com sucesso, assim como de outros que têm algum motivo para apoiá-los: [family|lE] com uma [opinion|lE] alta, [friends|lE], [lovers|lE] e assim por diante.\n\nPodem ser aproveitados os $game_concept_contact_list_contacts$ para conseguir apoio extra por meio de $contact_list_request_interaction|V$ de [character_interaction|lE]."
 game_concept_camp_purpose: "Propósito do Acampamento"
 game_concept_camp_purposes: "Propósitos do Acampamento"
 game_concept_camp_purpose_purpose: "Propósito"
 game_concept_camp_purpose_purposes: "Propósitos"
 game_concept_camp_purpose_desc: "Os $game_concept_camp_purposes$ são o mais próximo da lei na anarquia de espírito livre dos [camps|lE].\n\nRepresentam a força que une e impulsiona o $game_concept_camp$ a permanecer unido, seja uma inclinação erudita, habilidades mercenárias ou um desejo ardente de devolver um governante legítimo ao trono.\n\nOs $game_concept_camp_purpose_purposes$ desbloqueiam [camp_buildings|lE] diferentes (e, por sua vez, [officers|lE] únicos), que levam a eventos ou opções de evento diferentes, e afetam os [task_contracts|lE] que surgirem.\n\n#WEAK O $game_concept_camp_purpose$ também afeta o título do $game_concept_adventurer$ e as roupas de seus [followers|lE].#!"
 game_concept_mercenary_task_contract: "Contrato de Mercenário"
 game_concept_mercenary_task_contracts: "Contratos de Mercenário"
 game_concept_mercenary_task_contract_possessive: "do Contrato de Mercenário"
 game_concept_mercenary_task_contracts_possessive: "dos Contratos de Mercenário"
 game_concept_mercenary_task_contract_desc: "Um $game_concept_mercenary_task_contract$ implica ajudar um [character|lE] seja em uma [war|lE] em andamento, ou em uma que pretendem iniciar com sua ajuda. O pagamento será determinado pela [war_contribution|lE] assim como pelo resultado."
 game_concept_transport_task_contract: "Contrato de Transporte"
 game_concept_transport_task_contracts: "Contratos de Transporte"
 game_concept_transport_task_contract_possessive: "do Contrato de Transporte"
 game_concept_transport_task_contracts_possessive: "dos Contratos de Transporte"
 game_concept_transport_task_contract_desc: "Um $game_concept_transport_task_contract$ geralmente envolve o transporte de objetos como [artifacts|lE] ou escoltar personagens importantes, como [wards|lE], a distâncias intermediárias."
 game_concept_treasure_map_task_contract: "Contrato de Mapa do Tesouro"
 game_concept_treasure_map_task_contracts: "Contratos de Mapa do Tesouro"
 game_concept_treasure_map_task_contract_possessive: "do Contrato de Mapa do Tesouro"
 game_concept_treasure_map_task_contracts_possessive: "dos Contratos de Mapa do Tesouro"
 game_concept_treasure_map_task_contract_desc: "Leve um velho e desgastado aventureiro para encontrar seu tesouro final."
 game_concept_task_contracts_i: "@task_contract_icon!"
 game_concept_task_contract: "Contrato"
 game_concept_task_contracts: "Contratos"
 game_concept_task_contract_possessive: "do Contrato"
 game_concept_task_contracts_possessive: "dos Contratos"
 game_concept_task_contract_desc: "Os $game_concept_task_contracts$ são a principal maneira pela qual os [adventurers|lE] ganham [gold|lE] ou [prestige|lE]. Também podem conceder [provisions|lE], [piety|lE] e até [artifacts|lE].\n\nCada um é uma tarefa proposta por um [ruler|lE] local — geralmente exigindo que o aventureiro realize uma [scheme|lE], complete uma [travel|lE] ou o ajude em uma [war|lE] — e pode ser assumida em troca de uma recompensa e para colocar o [contractor|lE] na [contact_list|lE].\n\nMais contratos são gerados ao viajar longas distâncias ou para novos [kingdoms|lE].\n\nQuanto maior for o [title_tier|lE] ou o governante que oferece um contrato, maior será o [task_contract_tier_tier|lE] desse contrato. Níveis mais altos pagam #EMP consideravelmente#! melhor.\n\n#alert_trial Cuidado com os [criminal_task_contracts|lE]: suas recompensas costumam ser excelentes, mas o mundo é muito menos compreensivo com os pequenos crimes de um andarilho sem lar do que com os de um [liege|lE] [landed|lE].#!"
 game_concept_task_contract_tier_i: "@task_contract_tier_icon!"
 game_concept_task_contract_tier: "$TASK_CONTRACT_CONTRACT$ Tier"
 game_concept_task_contract_tier_tier: "Tier"
 game_concept_task_contract_tier_desc: "O $game_concept_task_contract_tier$ reflete o [title_tier|lE] do [contractor|lE].\n\n[barons|E] e [counts|lE] têm uma estrela, os [dukes|lE] têm duas estrelas e os [kings|lE] e [emperors|lE] têm três estrelas.\n\nOs $game_concept_contractors$ não oferecerão trabalho a [adventurers|lE] que tenham um [prestige_level|lE] indigno de seu [rank|lE]. Se você for #EMP apenas#! [GetModifier( 'prestige_level_1' ).GetNameWithTooltip|L], então [kings|lE] e [emperors|lE] nem sequer levarão você em consideração.\n\nQuanto maior o $game_concept_task_contract_tier$, maior será a escala da remuneração, embora geralmente a dificuldade da tarefa também seja maior.\n\n#WEAK A [personality|lE] também afeta o pagamento: [characters|lE] com o traço [GetTrait('greedy').GetName( GetNullCharacter )|l] pagarão abaixo da tarifa normal, enquanto personagens com [GetTrait('generous').GetName( GetNullCharacter )|l] ou [GetTrait('profligate').GetName( GetNullCharacter )|l] pagarão muito acima dela.#!"
 game_concept_governance_issue_i: "@task_contract_icon!"
 game_concept_governance_issue: "$TASK_CONTRACT_ISSUE$"
 game_concept_governance_issues: "$TASK_CONTRACT_ISSUE_PLURAL$"
 game_concept_governance_issue_possessive: "$TASK_CONTRACT_ISSUE_POSSESSIVE$"
 game_concept_governance_issues_possessive: "$TASK_CONTRACT_ISSUE_POSSESSIVE_PLURAL$"
 game_concept_governance_issue_desc: "Um $game_concept_governance_issue$ é uma tarefa que deve ser realizada por um [governor|lE].\n\nUm problema aparece em uma [province|lE] a cada poucos anos e geralmente gira em torno de um problema que o $game_concept_governor$ deve resolver. No entanto, os problemas também podem apresentar oportunidades.\n\nResolver os problemas com sucesso costuma recompensar com [gold|lE], [influence|lE] e experiência no [trait|lE] de [GetTrait('governor').GetName(GetNullCharacter)|l]. Dependendo do problema em questão, outras recompensas também podem estar disponíveis.\n\nTodo $game_concept_governance_issue$ tem um [governance_issue_tier_tier|lE] que afeta as recompensas que ele fornece."
 game_concept_governance_issue_tier_i: "@task_contract_tier_icon!"
 game_concept_governance_issue_tier: "$TASK_CONTRACT_ISSUE$ Tier"
 game_concept_governance_issue_tier_tier: "Tier"
 game_concept_governance_issue_tier_desc: "Todo [governance_issue|lE] tem um $game_concept_governance_issue_tier$, que reflete a recompensa geral de um assunto quando resolvido. Resolver um assunto de nível mais alto normalmente resultará em maiores quantidades de [gold|lE] ou [influence|lE], assim como uma maior quantidade de experiência ganha para o [trait|lE] [GetTrait('governor').GetName(GetNullCharacter)|l]"
 game_concept_criminal_task_contract: "Contrato Criminal"
 game_concept_criminal_task_contracts: "Contratos Criminais"
 game_concept_criminal_task_contract_possessive: "do Contrato Criminal"
 game_concept_criminal_task_contracts_possessive: "dos Contratos Criminais"
 game_concept_criminal_task_contract_desc: "Um $game_concept_criminal_task_contract$ geralmente envolve contratos sórdidos que podem ser lucrativos, mas lhe concederão a [trait_level_track_xp|lE] de @gallowsbait_icon![GetTrait('gallowsbait').GetName(GetNullCharacter)|l].\n\nApresentar o [trait|lE] $trait_gallowsbait$ fará com que a maioria do mundo o odeie mais e o respeite menos, e pode até levar aqueles [followers|lE] seus que desaprovam seu banditismo a abandonarem seu serviço de forma dramática.\n\n#WEAK O $trait_gallowsbait$ é um traço muito negativo que indica que um personagem é um criminoso menor da mais baixa estirpe — ao menos um assassinato na corte tem certa #EMP classe#!.\n\nPode ser apagado com a [decision|lE] [GetDecisionWithKey('wipe_slate_decision').GetName|l].#!"
 game_concept_justicar_task_contract: "Contrato Justicar"
 game_concept_justicar_task_contracts: "Contratos Justicar"
 game_concept_justicar_task_contract_possessive: "do Contrato Justicar"
 game_concept_justicar_task_contracts_possessive: "dos Contratos Justicar"
 game_concept_justicar_task_contract_desc: "Um $game_concept_justicar_task_contract$ normalmente envolve eliminar criminosos enquanto traz justiça e adere à lei local."
 game_concept_hireling_task_contract: "Contrato de Mercenário"
 game_concept_hireling_task_contracts: "Contratos de Mercenário"
 game_concept_hireling_task_contract_possessive: "do Contrato de Mercenário"
 game_concept_hireling_task_contracts_possessive: "dos Contratos de Mercenário"
 game_concept_hireling_task_contract_desc: "Um $game_concept_hireling_task_contract$ geralmente envolve trabalhos de força contratada, como proteger governantes, mercadores e reforçar guarnições."
 game_concept_diplomacy_task_contract: "Contrato de Diplomacia"
 game_concept_diplomacy_task_contracts: "Contratos de Diplomacia"
 game_concept_diplomacy_task_contract_possessive: "do Contrato de Diplomacia"
 game_concept_diplomacy_task_contracts_possessive: "dos Contratos de Diplomacia"
 game_concept_diplomacy_task_contract_desc: "Um $game_concept_diplomacy_task_contract$ normalmente envolve resolver disputas locais ou negociar acordos vantajosos usando sua sagacidade."
 game_concept_hunting_task_contract: "Contrato de Caça"
 game_concept_hunting_task_contracts: "Contratos de Caça"
 game_concept_hunting_task_contract_possessive: "do Contrato de Caça"
 game_concept_hunting_task_contracts_possessive: "dos Contratos de Caça"
 game_concept_hunting_task_contract_desc: "Um $game_concept_hunting_task_contract$ normalmente envolve ajudar o governante local a eliminar a vida selvagem e ajudar a reforçar os suprimentos."
 game_concept_stewardship_task_contract: "Contrato de Administração"
 game_concept_stewardship_task_contracts: "Contratos de Administração"
 game_concept_stewardship_task_contract_possessive: "do Contrato de Administração"
 game_concept_stewardship_task_contracts_possessive: "dos Contratos de Administração"
 game_concept_stewardship_task_contract_desc: "Um $game_concept_stewardship_task_contract$ normalmente envolve realizar um censo ou até mesmo construir edifícios."
 game_concept_learning_task_contract: "Contrato de Aprendizado"
 game_concept_learning_task_contracts: "Contratos de Aprendizado"
 game_concept_learning_task_contract_possessive: "do Contrato de Aprendizado"
 game_concept_learning_task_contracts_possessive: "dos Contratos de Aprendizado"
 game_concept_learning_task_contract_desc: "Um $game_concept_learning_task_contract$ normalmente envolve copiar textos ou facilitar ações de solidariedade."
 game_concept_intrigue_task_contract: "Contrato de Intriga"
 game_concept_intrigue_task_contracts: "Contratos de Intriga"
 game_concept_intrigue_task_contract_possessive: "do Contrato de Intriga"
 game_concept_intrigue_task_contracts_possessive: "dos Contratos de Intriga"
 game_concept_intrigue_task_contract_desc: "Um $game_concept_intrigue_task_contract$ normalmente envolve assistência em questões que vão de reconhecimento a fugas."
 game_concept_governor_efficiency: "Eficiência do Governador"
 game_concept_governor_efficiency_i: "@governor_efficiency!"
 game_concept_governor_efficiency_desc: "A $game_concept_governor_efficiency$ mede quão bom é um [governor|lE] no trabalho e quão bem gerencia as [holdings|lE] que lhe são atribuídas.\n\nA eficiência afeta quanto [taxes|lE] e [levies|lE] uma $game_concept_holding$ fornece, e a eficácia dos [title_men_at_arms|lE].\n\nA $game_concept_governor_efficiency$ é determinada principalmente por suas [skills|lE] e pela [trait|lE] de [GetTrait('governor').GetName( GetNullCharacter )|l]."
 game_concept_province_administration: "Administração da Província"
 game_concept_province_administration_desc: "Toda [province|lE] de um [realm|lE] [administrative|lE] tem uma $game_concept_province_administration$, que pode ser definida pelo [liege|lE] e pelo [governor|lE] para especializar a província.\n\nApenas uma $game_concept_province_administration$ pode estar ativa por província."
 game_concept_province_administrations: "Administrações de Província"
 game_concept_theme_administration: "Administração de Tema"
 game_concept_theme_administrations: "Administrações de Tema"
 game_concept_province_administration_short: "Administração"
 game_concept_province: "Província"
 game_concept_province_desc: "$game_concept_province$ é um [title|lE] em posse de um [governor|lE] dentro de um [realm|lE] com o [administrative_government|lE].\n\nUma província tem uma [province_administration|lE] associada que afeta enormemente os benefícios fornecidos pela província."
 game_concept_provinces: "Províncias"
 game_concept_provincial: "Provincial"
 game_concept_theme: "Tema"
 game_concept_themes: "Temas"
 game_concept_thematic: "Temático"
