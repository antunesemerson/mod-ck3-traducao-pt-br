 game_concept_provincial_army: "Exército Provincial"
 game_concept_provincial_army_desc: "Um exército provincial é um exército recrutado e mantido por um [governor|lE] de um [realm|lE] com [government|lE] [Concept('administrative', 'administrativo')|E].\n\nÉ composto exclusivamente por [title_men_at_arms|lE]. A eficácia dos [men_at_arms|lE] é afetada pela [governor_efficiency|lE] de seu [governor|l].\n\nO [liege|lE] pode gastar [influence|lE] para obter o controle desses exércitos.\n\nOs [governors|l] também podem tomar tropas emprestadas de outros governadores sob certas circunstâncias, como ser [Concept('allied', 'aliados')|E] ou usando um [hook|lE].\n\nO exército emprestado é devolvido se o [character|lE] que o pegou emprestado morrer ou quando todas as suas [wars|lE] em curso terminarem. Os exércitos também podem ser devolvidos manualmente."
 game_concept_provincial_armies: "Exércitos Provinciais"
 game_concept_thematic_army: "Exército Temático"
 game_concept_thematic_armies: "Exércitos Temáticos"
 THEMATIC_ARMY_CONCEPT: "[thematic_army|E]"
 THEMATIC_ARMY_CONCEPT_NO_TOOLTIP: "$game_concept_thematic_army$"
 PROVINCIAL_ARMY_CONCEPT: "[provincial_army|E]"
 PROVINCIAL_ARMY_CONCEPT_NO_TOOLTIP: "$game_concept_provincial_army$"
 THEMATIC_ARMIES_CONCEPT: "[thematic_armies|E]"
 THEMATIC_ARMIES_CONCEPT_NO_TOOLTIP: "$game_concept_thematic_armies$"
 PROVINCIAL_ARMIES_CONCEPT: "[provincial_armies|E]"
 PROVINCIAL_ARMIES_CONCEPT_NO_TOOLTIP: "$game_concept_provincial_armies$"
 game_concept_reinforce_soldiers: "Reforçar Manualmente"
 game_concept_reinforcements: "Reforços"
 game_concept_reinforce_soldiers_desc: "Os [adventurers|lE] e os [nomads|lE] podem recrutar [men_at_arms|lE], mas não os reforçam automaticamente como faz um [ruler|lE] [landed|lE]. Em vez disso, os recrutas devem ser atraídos por meio de interações."
 game_concept_adventurer_siege_replenishment: "Reabastecimento de Cerco"
 game_concept_adventurer_siege_replenishment_desc: "Quando um [adventurer|lE] [Concept('sieges', 'assedia' )|E] com sucesso uma [holding|lE], uma parte de seus [men_at_arms|lE] será reposta.\n\nTodos os [regiments|lE] regimentos de homens de armas do [army|lE] serão repostos em #V dobro#! do valor do [loot|lE] da posse.\n\n#weak O aumento é composto por novos recrutas, recrutamento forçado de moradores locais ou, simplesmente, pagamentos aos que desapareceram durante o cerco.#!"
 game_concept_investment_cap: "Capacidade de Investimento"
 game_concept_investment_cap_desc: "É o máximo que um personagem pode investir em uma [candidate_score|lE], seja própria ou alheia, para uma [governorship|lE].\n\nIdade, [powerful_family_rating_mid|lE], [influence_level|lE] e [estate_buildings|lE] são os principais fatores que determinam esse limite. Crianças têm uma pequena penalidade de escala em relação a esse limite, enquanto os limites dos adultos aumentam com a idade."
 game_concept_appointment_succession_law: "Lei de sucessão por nomeação"
 game_concept_appointment_succession_laws: "Leis de sucessão por nomeação"
 game_concept_appointment: "Nomeação"
 game_concept_appointments: "Nomeações"
 game_concept_appointment_succession: "Sucessão por nomeação"
 game_concept_appointment_succession_law_desc: "Segundo a $game_concept_appointment_succession_law$ a candidatura com a maior [Concept( 'candidate_score', 'puntuación' )|E] herdará o [title|lE] e suas [holdings|lE] associadas.\n\nOs tipos são:\n $EFFECT_LIST_BULLET$[GetLaw('appointment_succession_law').GetName]\n $EFFECT_LIST_BULLET$[GetLaw('acclamation_succession_law').GetName]\n $EFFECT_LIST_BULLET$[GetLaw('celestial_appointment_succession_law').GetName]\n $EFFECT_LIST_BULLET$[GetLaw('celestial_military_appointment_succession_law').GetName]\n $EFFECT_LIST_BULLET$[GetLaw('celestial_ministry_appointment_succession_law').GetName]\n $EFFECT_LIST_BULLET$[GetLaw('celestial_grand_marshal_appointment_succession_law').GetName]\n $EFFECT_LIST_BULLET$[GetLaw('meritocratic_appointment_succession_law').GetName]\n $EFFECT_LIST_BULLET$[GetLaw('meritocratic_military_appointment_succession_law').GetName]\n $EFFECT_LIST_BULLET$[GetLaw('japanese_appointment_succession_law').GetName]"
 game_concept_appointment_level: "Nível de nomeação"
 game_concept_appointment_levels: "Níveis de nomeação"
 game_concept_appointment_level_desc: "Algumas [appointment_succession_laws|lE] empregam como requisito um $game_concept_appointment_level$ para que os [characters|lE] sejam candidatos elegíveis.\n\nOs níveis são baseados no nível de uma moeda específica e cada lei pode usar uma moeda diferente como requisito. Um [title|lE] de grau mais alto normalmente exigirá um nível mais alto.\n\n#weak Por exemplo: [GetLaw('celestial_appointment_succession_law').GetName|l] exige [merit|lE]; um [duchy|lE] precisa de um [merit_level|lE] de [GetModifier( 'merit_level_3' ).GetNameWithTooltip|L] ou superior, enquanto um [kingdom|lE] exige [GetModifier( 'merit_level_5' ).GetNameWithTooltip|L] ou superior.#!"
 game_concept_seize_peripheral_duchy: "Tomar ducado periférico"
 game_concept_seize_peripheral_duchy_desc: "Uma [casus_belli|El] disponível para [rulers|El] com fronteira com um [realm|El] governado por uma [government_form|El] [Concept('government_bureaucratic_type', 'burocrática')|E].\n\nPermite ao atacante se apoderar de um [duchy|El] vizinho que esteja fora da hierarquia [de_jure|El] da capital do defensor."
