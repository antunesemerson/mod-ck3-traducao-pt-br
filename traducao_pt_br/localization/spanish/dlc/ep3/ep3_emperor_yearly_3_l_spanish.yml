l_spanish:
 ep3_emperor_yearly.3000.t: "O Direito de Pilhagem do Palácio"
 ep3_emperor_yearly.3000.desc: "Varingos corpulentos e peludos cambaleiam pelos meus novos salões imperiais, com os braços carregados de ouro e joias.\n\nCom a morte [dead_emperor.Custom('ES_DelDela')] [dead_emperor.GetTitledFirstName|l], aqueles que o teriam defendido até o fim foram às câmaras do tesouro. É seu direito tradicional, e ninguém ousa impedir que esses estrangeiros de elite reivindiquem bônus reluzentes.\n\nEste é o preço que se paga para manter meus [GetMaA('varangian_guards').GetName], meus sabujos juramentados, contentes em suas coleiras.\n\n"
 ep3_emperor_yearly.3000.desc_leader: "E assim, sob [varangian_leader.GetFullName] metem a mão na bolsa de [ROOT.Char.Custom('ES_DelDela')] monarca eleito[ROOT.Char.Custom('ES_OA')] por [ROOT.Char.GetFaith.HighGodName]."
 ep3_emperor_yearly.3000.desc_no_leader: "E assim, os nórdicos metem a mão na bolsa de [ROOT.Char.Custom('ES_DelDela')] monarca escolhid[ROOT.Char.Custom('ES_OA')] por [ROOT.Char.GetFaith.HighGodName]."
 ep3_emperor_yearly.3000.a: "\"Pare-os, Akolouthos! Recupere meu ouro!\""
 ep3_emperor_yearly.3000.a.flavor: "\"[varangian_leader.GetFirstNameNoTooltip]! Você foi nomeado líder da Guarda para controlar a Guarda. #EMP Faça isso!#!\""
 ep3_emperor_yearly.3000.b: "Costume ou não, eu repreenderei esses brutos!"
 ep3_emperor_yearly.3000.b.flavor: "Deixem que recebam seu pagamento — mas o palácio imperial deve manter sua dignidade. Exemplos devem ser feitos!"
 ep3_emperor_yearly.3000.c: "A lealdade tem seu preço."
 ep3_emperor_yearly.3000.c.flavor: "Os Varangianos renunciam a salários regulares ricos e viajam de longe em busca deste grande prêmio."
 akolouthos_aptitude_option_unlock: "Esta opção está disponível devido à alta [aptitude|lE] do seu [GetCourtPositionType('akolouthos_court_position').GetName()|l]"
 disrespected_varangians_modifier: "Desrespeitou os Varangianos"
 disrespected_varangians_modifier_desc: "Desafiar o direito da Guarda Varangiana a um bônus prejudicou seriamente sua lealdade, e a de tropas contratadas semelhantes."
 major_gold_to_varangians_tooltip: "Você paga #negative_value 75#! [gold_i] por #high 3#! detentores de [court_positions|lE] varangianos"
 medium_gold_to_varangians_tooltip: "Você paga #negative_value 50#! [gold_i] por #high 2#! portadores de [court_positions|lE] varegos"
 minor_gold_to_varangians_tooltip: "Você paga [gold_i]#negative_value 25#! a um detentor da posição de [court_position|lE] Varangiana"
 loyal_varangians_modifier: "Varangianos Valentes"
 loyal_varangians_modifier_desc: "Fortalecidos por Varangianos inabaláveis, as formações de infantaria pesada deste personagem permanecem firmes e atacam com força."
 attentive_varangians_modifier: "Varangianos Diligentes"
 attentive_varangians_modifier_desc: "Bem recompensados por seus serviços, a Guarda Varangiana evita brigas e desordens em favor de uma proteção diligente."
 eager_varangian_army: "Multidão Varangiana"
 ep3_emperor_yearly.3011.t: "Nosso Fogo Secreto"
 ep3_emperor_yearly.3011.intro: "[invader.Custom('ES_ElLa')|U] [invader.GetTitleAsName|l] de [invader.GetPrimaryTitle.GetNameNoTier] deveria ter pensado melhor antes de"
 ep3_emperor_yearly.3011.liege_attacking: "navegar"
 ep3_emperor_yearly.3011.commander_attacking: "enviar a flotilha [invading_commander.Custom('ES_DelDela')] [invading_commander.GetTitledFirstName|l]"
 ep3_emperor_yearly.3011.desc: "na calma de [army.GetLocation.GetNameNoTooltip] e de desafiar a cidade [ROOT.Char.GetFaith.HighGodNamePossessive]\n\nOs [Glossary( 'dromones', 'DROMONS_GLOSS' )] de minha frota, com seus sifões de bronze com boca de dragão a bordo, zarparam de seus cais. Se as águas estiverem calmas, se os capitães coordenarem bem o ataque... meus inimigos queimarão.\n\nMas se [ROOT.Char.GetFaith.HighGodName] exigir um preço por nossos pecados, muitos dos defensores de [ROOT.Char.GetCapitalLocation.GetCounty.GetCulture.GetName] também serão imolados. O fogo líquido é o caos encarnado!"
 ep3_emperor_yearly.3011.kyrie_eleison: "[Glossary( 'Kýrie, eléison', 'KYRIE_ELEISON_GLOSS' )]!"
 KYRIE_ELEISON_GLOSS: "#bold Kýrie, eléison#! — \"Senhor, tem piedade de mim!\" — é uma oração cristã invocada por forças bizantinas como grito de guerra."
 ep3_emperor_yearly.3011.a: "Incendeie a própria #EMP água#!"
 ep3_emperor_yearly.3011.a.success: "O ataque incinera o inimigo"
 ep3_emperor_yearly.3011.a.fail: "Um dano considerável foi causado"
 ep3_emperor_yearly.3011.a.critical_fail: "Seus navios se arruinam"
 ep3_emperor_yearly.3011.b: "Não posso arriscar a frota."
 unable_to_use_fire_ships_tooltip: "@alert_icon! #alert_trial Seus navios com Fogo Grego estarão indisponíveis por #high 30 dias#!"
 ravaged_by_greek_fire_modifier: "Devastados pelo Fogo Grego"
 ravaged_by_greek_fire_modifier_desc: "As tropas sobreviventes deste exército estão terrivelmente queimadas e completamente desmoralizadas."
 defenders_immolated_modifier: "Defensores Imolados"
 defenders_immolated_modifier_desc: "O porto aqui está sem frota, e as muralhas são guarnecidas por sobreviventes queimados e enfaixados."
 assaulted_by_greek_fire_modifier: "Assolados pelo Fogo Grego"
 assaulted_by_greek_fire_modifier_desc: "A força deste personagem foi desmoralizada, dispersa, e muitos foram queimados vivos em um ataque naval com fogo grego."
 ep3_emperor_yearly.3012.t: "Dragões no Bósforo"
 ep3_emperor_yearly.3012.intro: "Meus [Glossary( 'dromones', 'DROMONS_GLOSS' )] seguem pressionando, remando perto para que suas armas aterrorizantes possam alcançar a frota de [invader.GetPrimaryTitle.GetName].\n\nEstrondosos estampidos ecoam sobre [army.GetLocation.GetNameNoTooltip]! Grandes caudas de fogo iluminam um campo de batalha sufocado pela fumaça e ensurdecido por gritos infernais.\n\n"
 ep3_emperor_yearly.3012.attack_success: "As naves [invader.Custom('ES_DelDela')] [invader.GetTitledFirstName|l] ardem como imponentes piras funerárias. Uivando, corpos carbonizados saltam delas, gritando em busca da salvação [invader.GetFaith.HighGodNamePossessive], mas até na água meus inimigos só encontram fogo!\n\nEnquanto o mar brilha, meus dromons retornam vitoriosos."
 ep3_emperor_yearly.3012.attack_fail: "Alguns navios [invader.GetPrimaryTitle.GetAdjectiveNoTooltip] são incendiados, suas tripulações desesperadas gritam de agonia, mas outros navios se dispersam e escapam do ataque. Logo, meus dromons retornam aos seus portos, exalando o cheiro de piche e nafta.\n\nA força inimiga, embora carbonizada e enfraquecida, ainda tem alguma força."
 ep3_emperor_yearly.3012.attack_crit_fail: "Mas, ai, #EMP ¡mi flota arde!#!Pois, enquanto as ondas indomáveis lançam as chamas dos meus sifões sobre os conveses dos seus #EMP mismos#! dromons, as embarcações de [invader.GetPrimaryTitle.GetNameNoTooltip] permanecem bem fora do nosso alcance.\n\nApenas alguns navios aliados sobrevivem para voltar mancando ao grande porto de Constantinopla."
 ep3_emperor_yearly.3012.a_success: "Antes, invasores — agora, #EMP cinzas!#!"
 ep3_emperor_yearly.3012.a_fail: "Até o fogo de [ROOT.Char.GetFaith.PositiveAfterLife] tem suas limitações."
 ep3_emperor_yearly.3012.a_crit_fail: "Uma catástrofe!"
 two_knights_killed_tooltip: "@death_icon!#high 2#! [knights|lE] foram mortos"
 three_knights_killed_tooltip: "#high 3#! [knights|lE] foram feridos"
 two_knights_wounded_tooltip: "#high 2#! [knights|lE] foram feridos"
