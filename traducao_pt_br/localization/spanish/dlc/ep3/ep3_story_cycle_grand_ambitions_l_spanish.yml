 ### SCHEME MODIFIERS
 scheme_grand_ambitions_modifier: "Ambições Formidáveis"
 scheme_grand_ambitions_modifier_desc: "Este personagem tem seus olhos voltados para um prêmio muito grande."
 scheme_grand_ambitions_bribed_functionaries_modifier: "Funcionários Corrompidos"
 scheme_grand_ambitions_bribed_functionaries_modifier_desc: "Funcionários dentro do palácio imperial, desiludidos com o reinado atual, forjam discretamente alianças, preparando o terreno para uma transição de poder suave."
 scheme_grand_ambitions_bribed_merchants_modifier: "Mercadores Corrompidos"
 scheme_grand_ambitions_bribed_merchants_modifier_desc: "Mercadores e marinheiros, leais à causa, levam a palavra por todo o império, garantindo uma comunicação rápida e segura."
 scheme_grand_ambitions_bribed_scribes_modifier: "Escribas Corrompidos"
 scheme_grand_ambitions_bribed_scribes_modifier_desc: "Os escribas imperiais, a quem são confiados os segredos [ROOT.Char.GetTopLiege.Custom('ES_DelDela')] [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip|l], alteram sutilmente as comunicações e ocultam o progresso da intriga de olhos vigilantes."
 scheme_grand_ambitions_embezzling_modifier: "Desvio de Fundos"
 scheme_grand_ambitions_powerful_family_modifier: "Aliança de Famílias Poderosas"
 scheme_grand_ambitions_powerful_family_modifier_desc: "Uma aliança com outra casa poderosa do reino impulsionou este esquema na rota rápida para o sucesso."
