l_spanish:
 grand_ambitions_header: "Grandes Ambições"
 #Starting Event: Powerful Family Coup (grand_ambitions.0001)
 grand_ambitions.0001.t: "$grand_ambitions_header$"
 grand_ambitions.0001.desc: "Como chefe[ROOT.Char.Custom('ES_EA')] de uma das famílias mais poderosas de [ROOT.Char.GetLiege.GetPrimaryTitle.GetNameNoTier|l], minha influência se estende a todos os cantos, meus cofres são vastos e minha ambição é ilimitada.\n\n[target_char.Custom('ES_ElLa')|U] [target_char.GetTitledFirstName|l] é indign[target_char.Custom('ES_OA')] do trono, um mero fio na grande tapeçaria de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip|l]. Com o apoio da eminência da Casa [ROOT.Char.GetHouse.GetName], estou bem preparad[ROOT.Char.Custom('ES_OA')] para devolver a glória ao nosso grande império.\n\nMinhas ações não apenas moldarão o futuro da minha casa, mas também ecoarão nos anais da história."
 grand_ambitions.0001.a: "Que o destino de [target_char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] seja refeito em aço!"
 grand_ambitions.0001.a.flavor: "Reunirei todo o império à minha causa, pois [target_char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] exige um[ROOT.Char.Custom('ES_XA')] governante de virtude e força!"
 grand_ambitions.0001.b: "Subterfúgios silenciosos, e não a guerra, será o que destronará [target_char.Custom('ES_AlAla')] [target_char.GetTitleAsNameNoTooltip|l]."
 grand_ambitions.0001.b.flavor: "[target_char.Custom('ES_ElLa')|U] [target_char.GetTitleAsNameNoTooltip|l] não cairá pela espada, mas por mil sussurros de traição."
 grand_ambitions.0001.b.toast: "Esquema de Deposição Iniciado"
 grand_ambitions.0001.c: "O momento não é adequado..."
 grand_ambitions_start_depose_scheme_tt: "Inicia um [scheme|lE] [GetScheme('depose').GetTypeName|l] contra [THIS.Char.GetTopLiege.GetShortUIName] com [GetModifier('scheme_grand_ambitions_modifier').GetNameWithTooltip|l]"
 grand_ambitions.0100.powerful_family_joins_faction: "[powerful_family_head.Custom('ES_ElLa')|U] [powerful_family_head.GetTitledFirstName|l] jura se juntar à sua [claimant_faction|lE]"
 grand_ambitions.0100.t: "$grand_ambitions_header$: Uma Proposta Ousada"
 grand_ambitions.0100.intro: "O silêncio do meu gabinete é interrompido quando meu [ROOT.Char.Custom2( 'RelationToMe', interlocutor )] [interlocutor.GetFirstName] me apresenta uma missiva recente. \"Uma proposta de além das fronteiras de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip|l]\", anuncia.\n\n"
 grand_ambitions.0100.claim: "A carta está selada com o emblema da casa [foreign_ruler.GetDynastyHouseName]. As palavras em seu interior apresentam uma proposta ousada: uma aliança contra [target_char.Custom('ES_ElLa')] [target_char.GetTitleAsName|l], condicionada à cessão de [foreign_claim.GetName]. A ousadia do pedido só é comparável ao seu potencial.\n\n"
 grand_ambitions.0100.conclusion: "Esta oferta é uma lâmina de dois gumes: uma para cortar meu caminho para a vitória, a outra para ferir o [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip|l] tão profundamente quanto."
 grand_ambitions.0100.a: "Um[ROOT.Char.GetTopLiege.Custom('ES_XA')] [ROOT.Char.GetTopLiege.GetTitleAsNameNoTooltip|l] deve fazer sacrifícios."
 grand_ambitions.0100.a.claim: "Você concorda em conceder [foreign_claim.GetName] [foreign_ruler.Custom('ES_AlAla')] [foreign_ruler.GetTitledFirstName|l] após sua ascensão ao trono"
 grand_ambitions.0100.a.faction_tooltip: "Você poder? chamar [foreign_ruler.Custom('ES_AlAla')] [foreign_ruler.GetTitledFirstName|l] como aliad[foreign_ruler.Custom('ES_OA')] em uma [civil_war|lE] futura contra [THIS.Char.GetTopLiege.Custom('ES_ElLa')] [THIS.Char.GetTopLiege.GetTitledFirstName|l]"
 grand_ambitions.0100.b: "Um compromisso, talvez o [compromise_county.GetNameNoTooltip] seja de interesse?"
 grand_ambitions.0100.b.success: "[foreign_ruler.Custom('ES_ElLa')|U] [foreign_ruler.GetTitledFirstName|l] aceita sua contraproposta"
 grand_ambitions.0100.b.success.tt: "Você promete conceder o [compromise_county.GetName] para [foreign_ruler.GetName] após sua ascensão ao trono"
 grand_ambitions.0100.b.failure: "[foreign_ruler.Custom('ES_ElLa')|U] [foreign_ruler.GetTitledFirstName|l] rejeita sua contraproposta"
 grand_ambitions.0100.c: "Não venderei os próprios ossos do meu [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip|l]!"
 grand_ambitions.0110.t: "$grand_ambitions_header$: Chamado às Armas"
 grand_ambitions.0110.desc: "Meu [ROOT.Char.Custom2( 'RelationToMe', interlocutor )] [interlocutor.GetFirstName] me informa: Patronos ricos estão se unindo à nossa causa, e soldados, cansados do reinado de [target_char.Custom('ES_DelDela')] [target_char.GetTitleAsNameNoTooltip|l], estão prontos para se juntar a nós.\n\nEssa onda de apoio, desde os cofres dos aliados até os corações dos [ROOT.Char.Custom('ES_LoLa')] s [ROOT.Char.Custom('GetMartialMenWomen')] mais valentes de [target_char.GetTitleAsNameNoTooltip], marca um ponto de virada. Nossas fileiras estão prontas para crescer e nossos recursos para se expandir. Este momento não é apenas um testemunho da retidão da minha causa, mas uma indicação clara: a hora da guerra se aproxima cada vez mais."
 grand_ambitions.0110.a: "Vamos colocar esses soldados para trabalhar."
 grand_ambitions.0110.b: "Com esse influxo de ouro, podemos subsidiar os custos de recrutamento."
 grand_ambitions.0110.c: "Não permitirei que qualquer um se junte à minha causa!"
 grand_ambitions.0120.t: "$grand_ambitions_header$: Fundamentos Fortificados"
 grand_ambitions.0120.desc: "Enquanto os sussurros de rebelião ecoam pelos terrenos da minha propriedade, a dura realidade do confronto iminente com o imperador lança uma sombra sobre nossos preparativos. A força tangível das defesas e recursos de [estate.GetName] é de importância vital.\n\nMeu [ROOT.Char.Custom2( 'RelationToMe', interlocutor )] [interlocutor.GetFirstName] me apresenta planos para fortalecer a base do meu poder. “Agora é o momento de fortificar a propriedade”, ele/ela me exorta, apontando os locais propostos para a construção."
 grand_ambitions.0120.a: "Meus [maa_flavor.GetNameNoTooltip|l] precisam de um lugar adequado para se reunir."
 grand_ambitions.0120.b: "Pastagens fornecem cavalos bem alimentados para os [maa_flavor.GetNameNoTooltip|l]."
 grand_ambitions.0120.c: "Uma torre de vigia certamente melhorará meus [maa_flavor.GetNameNoTooltip|l]."
 grand_ambitions.0120.d: "Contrate todos os trabalhadores que puder encontrar — há muito a ser feito!"
 grand_ambitions.0130.t: "$grand_ambitions_header$: Sussurros no Vento"
 grand_ambitions.0130.desc.intro: "Meu [ROOT.Char.Custom2( 'RelationToMe', interlocutor )], [interlocutor.GetFirstName] se aproxima com uma proposta para ampliar minha conspiração contra [target_char.Custom('ES_ElLa')] [target_char.GetFirstName|l].\n\n"
 grand_ambitions.0130.desc.legitimacy.6: "\"O povo ama seu [target_char.GetTitleAsNameNoTooltip|l]\", começa, \"mas o amor é algo frágil e paranoico. Com trabalho suficiente, pode ser transmutado em medo da traição e, daí, em ódio\"."
 grand_ambitions.0130.desc.legitimacy.5: "“O povo aclama seu [target_char.GetTitleAsNameNoTooltip|l]”, começa, “mas quantos deles levariam uma facada por [target_char.GetSheHe]? As palavras certas nos ouvidos certos e algumas moedas a mais no preço do pão sempre levam a multidão à loucura.”"
 grand_ambitions.0130.desc.legitimacy.4: "\"A fé do povo em seu [target_char.GetTitleAsNameNoTooltip|l] é firme\", começa, \"ou assim pensam… As massas são sempre volúveis. Com esforço suficiente, sua lealdade pode ser comprada, ainda que apenas por uma noite\"."
 grand_ambitions.0130.desc.legitimacy.3: "\"A fé do povo em [target_char.Custom('ES_ElLa')] [target_char.GetTitleAsNameNoTooltip|l] não é inabalável\", começa. \"Não seria preciso #EMP demasiado#! minar[target_char.GetHerHim] para que a turba [target_char.GetHerHim] o arraste para um mar de ódio\"."
 grand_ambitions.0130.desc.legitimacy.2: "\"A fé do povo em [target_char.Custom('ES_ElLa')] [target_char.GetTitleAsNameNoTooltip|l] enfraquece\", começa. \"Com apenas um sopro, poderíamos transformar as faíscas de seu descontentamento em um incêndio furioso\"."
 grand_ambitions.0130.desc.legitimacy.1: "\"O povo não tem sequer uma migalha de fé em [target_char.Custom('ES_ElLa')] fals[target_char.Custom('ES_OA')] [target_char.GetTitleAsNameNoTooltip|l]\", começa. \"Sua fúria é poderosa, mas não está canalizada; só precisamos dar a eles a mais leve pista da direção a seguir…\"."
 grand_ambitions.0130.desc.outro: "\n\n\"A opinião de [target_char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] pode destronar um[target_char.Custom('ES_XA')] [target_char.GetTitleAsNameNoTooltip|l] tão facilmente quanto o coloca. E já foi influenciada antes…\"."
 grand_ambitions.0130.a: "Vamos chamar alguns favores."
 grand_ambitions.0130.b: "Que nossos sussurros tenham asas!"
 grand_ambitions.0130.b.success: "Seus sussurros têm asas"
 grand_ambitions.0130.b.failure: "Seus sussurros não conseguem manchar a reputação [target_char.Custom('ES_DelDela')] [target_char.GetTitleAsNameNoTooltip|l]"
 grand_ambitions.0130.b.crit_failure: "Seus sussurros revelam sua intenção [target_char.Custom('ES_AlAla')] [target_char.GetTitleAsNameNoTooltip|l]"
 grand_ambitions.0130.c: "O ouro costuma soltar as línguas dos plebeus..."
 grand_ambitions.0130.d: "Não recorrerei a #EMP boatos#!. Não somos crianças."
 grand_ambitions.0131.opening: "[interlocutor.Custom2( 'AppropriateGreeting', ROOT.Char )]"
 grand_ambitions.0131.desc: "Parece que rumores escandalosos sobre você têm se espalhado em [target_char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 grand_ambitions.0131.desc_secret: "\n\nDescobrimos que é [schemer.Custom('ES_ElLa')] [schemer.GetTitledFirstName|l] quem perpetua esses rumores, [Select_CString( schemer.IsFemale, 'la misma', 'el mismo' )] que busca tomar vosso trono."
 grand_ambitions.0131.conclusion: "\n\nSe não for contido, isso pode significar desastre..."
 grand_ambitions.0131.a: "Não estou sem meus próprios intrigas."
 grand_ambitions.0131.b: "Os criadores de rumores não estão além do meu alcance."
 grand_ambitions.0131.c: "Não me preocuparei com algo tão mesquinho."
 grand_ambitions.0131.d: "Maldito seja esse tipo de [schemer.Custom2('InsultNoun', ROOT.Char)] [schemer.Custom2('InsultAdjective', ROOT.Char)]…"
 grand_ambitions.0140.t: "$grand_ambitions_header$: um(a) colega[target_gov.Custom('ES_OA')] [target_gov.GetTitleAsNameNoTooltip|l]"
 grand_ambitions.0140.desc: "«Eu disse para não me incomodarem!», grito quando a porta do meu gabinete se abre. Mas, sob o batente, está um(a) convidado(a) inesperado(a) [Select_CString( target_gov.IsFemale, 'una huésped inesperada', 'un huésped inesperado' )]; [target_gov.GetFirstName], [target_gov.Custom('ES_ElLa')] [target_gov.GetTitleAsNameNoTooltip|l] de [target_gov.GetPrimaryTitle.GetNameNoTier].\n\n«Perdoai-me por incomodar-vos, [ROOT.Char.GetFirstNameNoTooltip], mas vim oferecer-vos o meu apoio."
 grand_ambitions.0140.faction: "Desejo me unir ao seu esforço para depor [target_char.Custom('ES_AlAla')] [target_char.GetTitleAsName|l]\"."
 grand_ambitions.0140.no_faction: "Sei que vocês estão reunindo forças aqui em [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], preparando-se para depor [target_char.Custom('ES_AlAla')] [target_char.GetTitleAsName|l]\"."
 grand_ambitions.0140.a: "Quanto mais, melhor."
 grand_ambitions.0140.b: "Não preciso de sua ajuda."
 grand_ambitions.0150.t: "$grand_ambitions_header$: Um Agente Adicional"
 grand_ambitions.0150.desc: "Meu [ROOT.Char.Custom2( 'RelationToMe', interlocutor )] [interlocutor.GetFirstName] avança; a gravidade de nosso empreendimento se reflete em suas feições. \"Nossos planos para depor [target_char.Custom('ES_AlAla')] [target_char.GetTitledFirstName|l] continuam a todo vapor\", diz solenemente. Cada uma de suas palavras carrega o peso de nossa conspiração.\n\n\"No entanto, nosso plano ainda pode fracassar sem aliados suficientes nos postos adequados. Um agente adicional nos ajudaria a garantir o sucesso."
 grand_ambitions.0150.a: "Um infiltrador habilidoso certamente acelerará nosso plano."
 grand_ambitions.0150.b: "Vamos empregar um engodo para garantir nossa discrição."
 grand_ambitions.0150.c: "Alguém para exaltar minhas virtudes na corte seria prudente."
 grand_ambitions.0151.t: "$grand_ambitions_header$: Um Mestre dos Sussurros"
 grand_ambitions.0151.desc: "Na luz tênue do entardecer, meu [ROOT.Char.Custom2( 'RelationToMe', interlocutor )] [interlocutor.GetFirstName] se aproxima com um brilho astuto no olhar.\n\n \"Uma oportunidade única se apresenta\", murmura, garantindo que até as paredes não possam ouvir[interlocutor.GetHerHim]. \"O [GetCourtPositionType( 'chief_eunuch_court_position' ).GetNameNoTooltip|l] da corte [target.Custom('ES_DelDela')] [target.GetTitleAsNameNoTooltip|l], uma sombra que se move em silêncio pelos corredores do poder, pode ser persuadido a se juntar à nossa causa. Sua influência é incomparável, seus segredos são vastos\".\n\n\"Poderia ser a peça-chave do nosso grande plano para remodelar o/a [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip|l]\"."
 grand_ambitions.0151.a: "Que seus sussurros guiem nossa causa."
 grand_ambitions.0151.b: "Seus talentos são valiosos demais para apenas serem emprestados."
 ga_0151_b_eunuch_aptitude: "A [aptitude|lE] de [eunuch.GetShortUIName] como [GetCourtPositionType( 'chief_eunuch_court_position' ).GetName|l] é [eunuch.GetCourtPositionAptitude( GetCourtPositionType( 'chief_eunuch_court_position' ) )]"
 grand_ambitions.0151.c: "Há outras maneiras de tecer nosso plano."
 grand_ambitions.0155.t: "$grand_ambitions_header$: Chamando Favores"
 grand_ambitions.0155.desc: "Meu [ROOT.Char.Custom2( 'RelationToMe', interlocutor )] [interlocutor.GetFirstName] se aproxima; seu rosto está sombreado pela contemplação.\n\n\"Nosso complô para depor [target_char.Custom('ES_AlAla')] [target_char.GetTitleAsNameNoTooltip|l] exige um novo infiltrado; alguém para ocupar o papel de [agent_slot.GetName|l]. Identifiquei três possíveis ativos que poderiam inclinar a balança a nosso favor\", diz.\n\nEle recua para as sombras do corredor, deixando diante de você os nomes, cada um uma silenciosa promessa de poder ou perigo."
 grand_ambitions.0155.a: "[agent_choice_1.GetFirstNameNoTooltip] certamente ajudaria nossos esforços."
 grand_ambitions.0155.b: "Talvez [agent_choice_2.GetFirstNameNoTooltip] seja o melhor."
 grand_ambitions.0155.c: "[agent_choice_3.GetFirstNameNoTooltip], por outro lado..."
 grand_ambitions.0155.d: "Nenhum destes é adequado."
 grand_ambitions.0160.t: "$grand_ambitions_header$: Fios de Subterfúgio"
 grand_ambitions.0160.desc: "Meu [ROOT.Char.Custom2( 'RelationToMe', interlocutor )] [interlocutor.GetFirstName] se aproxima com notícias sobre nosso plano para depor [target_char.Custom('ES_AlAla')] [target_char.GetTitledFirstName|l]. \"A base da nossa grande ambição já está lançada\", começa, com a voz firme e segura.\n\n\"Temos aliados nos altos e nos baixos escalões, todos prontos para cumprir seu papel em nosso grande projeto. Em quem devemos depositar nossa confiança?"
 grand_ambitions.0160.a: "Os funcionários do palácio serão aliados fundamentais."
 grand_ambitions.0160.b: "Os mercadores levarão nossas palavras, rápidas e seguras."
 grand_ambitions.0160.c: "Os escribas imperiais garantirão que não sejamos expostos."
 grand_ambitions.0170.t: "$grand_ambitions_header$: Uma Aliança Poderosa"
 grand_ambitions.0170.desc: "Meu [ROOT.Char.Custom2( 'RelationToMe', interlocutor )] [interlocutor.GetFirstName] se aproxima de mim com uma urgência contida.\n\n“Uma proposta”, começa, “do líder de uma das famílias mais ilustres de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip|l]. Eles descobriram nossas aspirações e veem uma oportunidade de benefício mútuo.” Desenrola um pergaminho; o selo da Casa [powerful_house.GetName] parece ameaçador sob a luz tênue.\n\n“Seu apoio poderia inclinar a balança a nosso favor. No entanto, tal aliança tem seu preço — uma compensação que eles consideram condizente com o risco.”"
 grand_ambitions.0170.a: "Pagaremos o preço deles — o que for preciso."
 grand_ambitions.0170.b: "Eles serão vinculados a nós com a promessa de uma futura recompensa."
 grand_ambitions.0170.c: "Unamos nossas casas em uma união sagrada."
 grand_ambitions.0170.d: "Minha ambição não será acorrentada por dívidas."
 grand_ambitions.0180.t: "$grand_ambitions_header$: Uma Coroação Adequada"
 grand_ambitions.0180.intro_hagia_sofia: "Aqui, sob a vasta e intimidante cúpula dourada da Hagia Sophia,"
 grand_ambitions.0180.desc: "Estou diante de [hof.Custom('ES_ElLa')] [hof.GetTitleAsName|l], [hof.Custom('ES_ElLa')] líder espiritual do meu povo. O ar está carregado de incenso e do peso dos séculos.\n\nConquistar seu favor não apenas daria legitimidade às minhas pretensões sobre [target_title.GetName], mas também poderia comover os fiéis de todo o império. Ele deve me coroar.\n\n[hof.Custom('ES_ElLa')|U] [hof.GetTitleAsNameNoTooltip|l] não é uma mera figura espiritual; ele está profundamente ciente das maquinações temporais de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip|l]."
 grand_ambitions.0180.a: "\"Foi divinamente ordenado.\""
 grand_ambitions.0180.a.flavor: "[ROOT.Char.GetFaith.HighGodName] deseja isso, e assim será."
 grand_ambitions.0180.b: "Vossa Santidade, permita-me ser um[ROOT.Char.Custom('ES_XA')] servo[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetFaith.HighGodNamePossessive]."
 grand_ambitions.0180.d.flavor: "#EMP Curve-se à minha vontade, [hof.GetFirstName]!#!"
 grand_ambitions.0180.b.success: "[hof.Custom('ES_ElLa')|U] [hof.GetTitledFirstNameNoTooltip|l] aceita coroá-lo"
 grand_ambitions.0180.b.success.tt: "Se você tiver sucesso em sua tentativa de depor [target_char.Custom('ES_AlAla')] [target_char.GetTitledFirstName|l], você ganhará #P [EmptyScope.ScriptValue('major_legitimacy_gain')]#! de [legitimacy|lE]"
 grand_ambitions.0180.b.failure: "[hof.Custom('ES_ElLa')|U] [hof.GetTitledFirstNameNoTooltip|l] se recusa a coroar você"
 grand_ambitions.0180.c: "Até [hof.Custom('ES_AlAla')] [hof.GetTitleAsNameNoTooltip|l] se [hof.Custom('ES_LeLa')] pode ser persuadido por meios materiais…"
 grand_ambitions.0180.d: "Nem sequer [hof.Custom('ES_ElLa')] [hof.GetPrimaryTitle.GetNameNoTierNoTooltip|l] está imune à minha influência."
 grand_ambitions.0180.e: "\"Ó #EMP coronaréis#! me coroarão como [target.GetTitleAsNameNoTooltip|l], [hof.GetFirstNameNoTooltip]!\"."
 grand_ambitions.0180.f: "Talvez eu volte mais tarde."
 grand_ambitions.0190.t: "Mantenha seus amigos por perto..."
 grand_ambitions.0190.desc: "«… mas os inimigos mais perto ainda», termina meu [ROOT.Char.Custom2('RelationToMeShort', interlocutor)] para descrever a conspiração [secret_owner.Custom('ES_DelDela')] [secret_owner.GetTitledFirstName|l] descoberta recentemente para reivindicar [ROOT.Char.GetPrimaryTitle.GetName|l] para si.\n\nQue #EMP osadía#! audácia [secret_owner.Custom('ES_EA')] [secret_owner.GetWomanMan]! Não posso deixar que isso fique sem resposta!"
 grand_ambitions.0190.a: "Talvez [secret_owner.GetSheHe] se contente com um lugar à mesa..."
 grand_ambitions.0190.a.tt: "Você oferece o cargo de [Concept('co_emperor', Select_CString(secret_owner.IsFemale, 'coemperatriz', 'coemperador' ) )|E] a [secret_owner.GetShortUIName]"
 co_emperor_accepts: "#HIGH [secret_owner.GetSheHe] aceita#!"
 co_emperor_rejects: "#HIGH [secret_owner.GetSheHe] recusa#!"
 grand_ambitions.0190.a.tt.1: "[emperor.GetShortUIName|U] [Select_CString( emperor.IsLocalPlayer, 'forma', 'forma' )] um [duumvirate|lE] com [secret_owner.GetShortUIName] como [Select_CString( emperor.IsLocalPlayer, 'seu', 'seu' )] [Concept('co_emperor',Select_CString(secret_owner.IsFemale,'coimperatriz','coimperador'))|E]"
 grand_ambitions.0190.a.tt.2: "Cessa suas tramas"
 grand_ambitions.0190.b: "Que apodreça nas masmorras!"
 every_family_member_of_secret_owner: "Todo membro da família de [secret_owner.GetFirstName]"
 grand_ambitions.0190.c: "Todas as coisas seguem seu curso com o tempo."
 grand_ambitions.0191.t: "$grand_ambitions_header$: Uma Oferta Decisiva"
 grand_ambitions.0191.desc: "«#EMP ¡Mi [ROOT.Char.GetTitleAsNameNoTooltip|l]!#!».\n\n[interlocutor.Custom('ES_ElLa')|U] [interlocutor.GetTitledFirstName|l], meu [ROOT.Char.Custom2( 'RelationToMeShort', interlocutor )], irrompe no meu gabinete e respira com dificuldade. «Acaba de surgir uma oportunidade decisiva!», ofega. «[emperor.Custom('ES_ElLa')|U] [emperor.GetTitledFirstNameRegnal|l] descobriu os vossos planos para tomar o trono!».\n\n«Mas faz-vos uma oferta: #EMP cogobernar.#! Deseja que abandoneis as conspirações e assumais um lugar ao seu lado para governar o nosso grande [emperor.GetPrimaryTitle.GetTierAsNameNoTooltip|l] desde a gloriosa cidade de [emperor.GetCapitalLocation.GetBaronyNameExplicitly]»."
 grand_ambitions.0191.a: "#EMP Tentador...#!"
 grand_ambitions.0191.a.tt.1: "Você se torna [Concept('co_emperor',Select_CString(ROOT.Char.IsFemale,'coemperatriz', 'coemperador'))|E] de [emperor.GetShortUIName]."
 grand_ambitions.0191.a.tt.2: "Você cessa suas tramas"
 grand_ambitions.0191.b: "Nunca compartilharei o poder com essa espécie de [emperor.Custom( 'InsultNoun' )|l]!"
 grand_ambitions.0200.t: "$grand_ambitions_header$: A Noite Decisiva"
 grand_ambitions.0200.opening: "Hoje, os próprios alicerces de [target.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] tremem sob o peso da Casa [ROOT.Char.GetHouse.GetName]. Uma revolução silenciosa depôs um[target.Custom('ES_XA')] [target.GetTitleAsNameNoTooltip|l], marcando o amanhecer de uma nova era.\n\n"
 grand_ambitions.0200.eunuch: "O [GetAgentSlotType( 'agent_eunuch' ).GetName|l], senhor dos segredos do palácio, desempenhou seu papel com perfeição. Seus sussurros semearam as sementes da discórdia, e seus acenos silenciosos em corredores escurecidos prepararam o cenário para o nosso triunfo.\n\n"
 grand_ambitions.0200.powerful_family: "Claro, minha ascensão seria impossível sem o apoio da família [story.MakeScope.Var('powerful_family').House.GetName] ,"
 grand_ambitions.0200.powerful_family.currency: "claramente valendo seu peso em ouro."
 grand_ambitions.0200.powerful_family.hook: "embora eu relute em lembrar do favor que lhes devo."
 grand_ambitions.0200.powerful_family.marriage: "à qual agora estou unido em matrimônio."
 grand_ambitions.0200.powerful_family.fallback: "embora eu relute em admitir."
 grand_ambitions.0200.desc: "Pequenos atos de rebelião — cada porta deixada entreaberta, cada mensagem desviada — teceram o tecido de nossa vitória, provando que a força de um império pode ser influenciada pelas mãos mais humildes."
 grand_ambitions.0200.conclusion: "\n\nEstamos à beira de uma nova era. Amanhã, o império despertará não com um legado cansado e antigo, mas com a promessa do meu reinado.\n\n\"Você, [target.GetFirstName], não é senão o eco esmaecido de #EMP mi#! império!\"."
 grand_ambitions.0200.a: "[target.GetPrimaryTitle.GetNameNoTooltip] voará nas asas da Casa [ROOT.Char.GetHouse.GetNameNoTooltip]!"
 grand_ambitions.0201.t: "$grand_ambitions_header$: O Caminho para o Poder"
 grand_ambitions.0201.desc: "«A divina providência que guia o destino dos impérios escolheu [Select_CString( ROOT.Char.IsFemale, 'uma nova soberana', 'um novo soberano' )]». A voz [ROOT.Char.GetFaith.GetReligiousHead.Custom('ES_DelDela')] [ROOT.Char.GetFaith.GetReligiousHead.GetTitledFirstName|l] ressoa por todo o salão do trono, imbuída de uma gravidade condizente com a ocasião.\n\nSeu olhar encontra o meu, um reconhecimento silencioso do pacto que nos trouxe até este momento. «Pela graça [ROOT.Char.GetFaith.HighGodNamePossessive], eu te coro [ROOT.Char.GetName]».\n\nQuando o peso da coroa se assenta sobre minha fronte, sinto o fardo dos séculos repousar sobre meus ombros. Meu caminho até o poder pode ter sido pouco convencional, mas me trouxe até aqui, a este glorioso momento.\n\n"
 grand_ambitions.0201.conc_greek: "\"[Glossary( 'Kýrie, eléison', 'KYRIE_ELEISON_GLOSS' )]!\", grito com confiança."
 grand_ambitions.0201.a: "[ROOT.Char.GetCapitalLocation.GetBaronyNameExplicitly] aguarda."
 grand_ambitions.0202.t: "$grand_ambitions_header$: O Destino dos Caídos"
 grand_ambitions.0202.desc: "Diante de mim, [Select_CString( old_emp.IsFemale, 'la depuesta', 'el depuesto' )] [ROOT.Char.GetTitleAsNameNoTooltip|l] aguarda seu destino sob a sombra do coração em brasa de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip|l].\n\nComo eu decidir lidar com a pessoa diante de mim não é apenas uma questão de retaliação pessoal ou magnanimidade; é a primeira pedra lançada na base do meu legado.\n\nSerá de vingança e conflito interminável, ou de misericórdia e esperança? Os olhos da corte, do povo e da própria história estão voltados para mim."
 grand_ambitions.0202.a: "Vá em paz, [old_emp.GetFirstNameNoTooltip]."
 grand_ambitions.0202.a.flavor: "Que[old_emp.GetHerHim] desapareça na noite, longe das cinzas de seu reinado."
 grand_ambitions.0202.b: "Que carregue as cicatrizes de sua queda."
 grand_ambitions.0202.b.flavor: "No entanto, [old_emp.GetSheHe] viverá. Nisso, encontramos um equilíbrio entre justiça e misericórdia, um sinal para todos do alto custo da arrogância."
 grand_ambitions.0202.c: "Marque[old_emp.GetHerHim] e expulse[old_emp.GetHerHim] para além dos muros!"
 grand_ambitions.0202.c.flavor: "Enquanto [old_emp.GetSheHe] vague pela terra, também [ROOT.Char.GetCapitalLocation.GetBaronyNameExplicitly] se afastará de seu passado em busca de um novo caminho à frente."
 grand_ambitions.0202.d: "Ainda não terminei com você."
 grand_ambitions.0202.d.tt: "[old_emp.GetFirstName] permanecerá [Concept( 'imprisoned', Select_CString(old_emp.IsFemale, 'encarcelada', 'encarcelado' ) )|E] em suas masmorras"
 grand_ambitions.0250.t: "$grand_ambitions_header$: Fim da Estrada"
 grand_ambitions.0250.desc: "Longe da recepção que esperávamos; meu [ROOT.Char.Custom2( 'RelationToMe', interlocutor )] [interlocutor.GetFirstName] se aproxima de mim fora dos portões da cidade.\n\n\"Caminhamos na corda bamba e parece que caímos para o lado errado\", diz solenemente.\n\nA capital, com seus edifícios imponentes e sombras profundas, parece não ter mudado com nossos esforços. [target.Custom('ES_ElLa')|U] [target.GetTitleAsNameNoTooltip|l] permanece em seu trono, talvez sem perceber o quão perto os ventos da mudança estiveram de varrer [target.GetCapitalLocation.GetBaronyNameExplicitly]."
 grand_ambitions.0250.a: "A estrada para o poder se escurece..."
 grand_ambitions.0300.t: "$grand_ambitions_header$: Colha o que Você Semear"
 grand_ambitions.0300.desc: "[foreign_ruler.Custom('ES_ElLa')|U] [foreign_ruler.GetTitledFirstName|l] está diante de mim, [ROOT.Char.Custom('ES_ElLa')] recém-nomead[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] de [ROOT.Char.GetPrimaryTitle.GetNameNoTier]. E isso é, em parte, graças ao apoio dele…\n\nEm consequência, veio cobrar o que foi prometido: [demand.GetName]."
 grand_ambitions.0300.a: "Sou um [ROOT.Char.GetWomanMan] da minha palavra. [demand.GetNameNoTierNoTooltip] é seu."
 grand_ambitions.0300.b: "Tenho algo muito mais grandioso para oferecer..."
 grand_ambitions.0300.b.success: "[foreign_ruler.Custom('ES_ElLa')|U] [foreign_ruler.GetTitledFirstName|l] é persuadido"
 grand_ambitions.0300.b.failure: "[foreign_ruler.Custom('ES_ElLa')|U] [foreign_ruler.GetTitledFirstName|l] não está persuadido"
 grand_ambitions.0300.c: "Sua ingenuidade é encantadora."
 grand_ambitions_ally_joins_war: "Aliado se Junta à Guerra: [joiner.GetTitledFirstName|l]"
 grand_ambitions.0500.opening: "[interlocutor.Custom2('AppropriateGreeting', ROOT.Char)]"
 grand_ambitions.0500.dead: "Tenho o prazer de informar que [target_char.Custom('ES_ElLa')] [story.MakeScope.Var('target_char').Char.GetTitledFirstName|l] morreu. Devem nossos planos seguir adiante para depor [ROOT.Char.GetTopLiege.Custom('ES_AlAla')] [ROOT.Char.GetTopLiege.GetTitledFirstName|l]?"
 grand_ambitions.0500.wrong_title: "Tenho o prazer de informar que [previous_story_target.Custom('ES_ElLa')] [previous_story_target.GetTitledFirstName|l] já não possui [story.Var('target_title').GetName]. Devem nossos planos seguir adiante para depor [ROOT.Char.GetTopLiege.Custom('ES_AlAla')] [ROOT.Char.GetTopLiege.GetTitledFirstName|l]?"
 grand_ambitions.0500.a: "Não descansarei até #EMP ser [ROOT.Char.GetTopLiege.Custom('ES_ElLa')] [ROOT.Char.GetTopLiege.GetTitleAsNameNoTooltip|l]!#!"
 grand_ambitions.0500.b: "Cesse suas preparações. Vamos nos alegrar!"
 grand_ambitions.0500.b.tt: "Você cessa seus esforços para [depose|lE] [THIS.Char.GetTopLiege.Custom('ES_AlAla')] [THIS.Char.GetTopLiege.GetTitleAsName|l]"
