 become_daddy_2_vassal_tt: "Você se tornará [Concept('vassal',Select_CString(ROOT.Char.IsFemale,'vasalla', 'vasallo'))|E] de #high [daddy_2.GetName]#!"
 byz_become_feudal_or_clan_tt: "Você adotará [government|lE] [feudal|lE] ou [clan|lE]"
 frankokratia_lose_domicile_tt: "@warning_icon! #X Seu [domicile|lE] será perdido#!"
 remain_daddys_vassal_tt: "Você continuará sendo [Concept('vassal',Select_CString(ROOT.Char.IsFemale,'vasalla', 'vasallo'))|E] de [daddy.GetShortUIName]"
 remain_daddy_2_vassal_tt: "Você continuará sendo [Concept('vassal',Select_CString(ROOT.Char.IsFemale,'vasalla', 'vasallo'))|E] de [daddy_2.GetShortUIName]"
 greeks_more_likely_to_vassalize_tt: "Gregos e suas [cultures|lE] descendentes estarão mais propensos a aceitar [vassalization|lE]"
 latin_emp_simp_modifier: "Imitador dos Gregos"
 latin_emp_simp_modifier_desc: "Os cavaleiros latinos deste soberano oferecem desprezo; seus vassalos lamentam os direitos e liberdades perdidos para uma imitação do governo centralizado grego."
 ep3_frankokratia_events.0120.t: "O Caminho dos Imperadores"
 ep3_frankokratia_events.0120.hippodrome: "Sou [Select_CString( ROOT.Char.IsFemale, 'la señora', 'el señor' )] de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTier], um lugar belo e devastado. O [Glossary( 'palacio de Blanquerna', 'BLACHERNAE_PALACE_GLOSS')], Santa Sofia, o antigo hipódromo…"
 ep3_frankokratia_events.0120.estate: "Sou [Select_CString( ROOT.Char.IsFemale, 'la señora', 'el señor' )] de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTier] e posso escolher entre seus palácios. Antecâmaras de mármore, mosaicos de ouro, muralhas guardadas pela divina providência…"
 ep3_frankokratia_events.0120.desc: "Enquanto observo, uma criatura da burocracia grega me explica. Mas [eunuch.Custom('ES_ElLa')] [eunuch.GetTitledFirstName|l], tão sabi[eunuch.Custom('ES_OA')] eunuc[eunuch.Custom('ES_OA')], se torna ousado.\n\n\"Nossos gloriosos basileis exerceram tamanho poder por séculos! Conseguiriam imaginar, [ROOT.Char.GetLadyLord], que todo o reino aguardasse seus éditos? Mesmo sem o direito de sangue ou os despojos de guerra para lhes oferecer?\"\n\nTanto poder, de fato! Meus vassalos latinos, meus cães soltos, seriam capazes de aceitar parar de saquear os cargos gregos? Usariam colarinhos gregos apertados…?"
 ep3_frankokratia_events.0120.a: "Há #EMP um#! ou #EMP dois#! hábitos gregos que admiro..."
 ep3_frankokratia_events.0120.a.flavor: "#EMP … sus espeluznantes castigos!#! O medo que têm do poder imperial! Que as práticas dos gregos encham meus cofres!"
 ep3_frankokratia_events.0120.b: "Eu me dignarei a confiar nos gregos e seus modos..."
 ep3_frankokratia_events.0120.b.flavor: "Que isso me cubra com glórias antigas!"
 ep3_frankokratia_events.0120.c: "Nós latinos viemos. Tudo que está aqui — é nosso!"
 ep3_frankokratia_events.0120.c.flavor: "Nós governaremos, adoraremos e despojaremos como nos agradar!"
 emulating_byz_punishment_tt: "Imperadores [GetTitleByKey('e_latin_empire').GetAdjective] e seus [vassals|lE] podem Castrar ou Cegar [prisoners|lE]"
 latin_emp_enables_byz_punishment_t: "[latin_emp.GetTitleAsNameNoTooltip] Endossa Torturas Gregas"
 latin_emp_enables_byz_punishment_desc: "Para dominar os gregos traiçoeiros, devemos ser mais cruéis do que eles."
 ep3_frankokratia_events.0121.opening: "[ROOT.Char.GetTitledFirstNameRegnal], [Select_CString(ROOT.Char.IsFemale, 'minha nova vassala', 'meu novo vassalo' )]"
 ep3_frankokratia_events.0121.intro: "Nós que outrora fomos peregrinos armados nos vemos, em nossos novos feudos, amplamente superados em número.\n\n"
 ep3_frankokratia_events.0121.desc_torture: "Mas esses gregos traiçoeiros têm coragem à altura da nossa? Têm determinação suficiente para nos impedir de reivindicar nosso [latin_emp.GetPrimaryTitle.GetTierAsName]?\n\nTemos de subjugá-los. Devemos ser tão cruéis quanto eles."
 ep3_frankokratia_events.0121.desc: "Mas aqui — tais riquezas vastas a serem apreendidas! Não temperes seu coração ardente: faça tudo o que precisar para prosperar nesta terra. Que nem o burocrata grego choramingador, nem o sodomita abastado, fique em seu caminho!"
 ep3_frankokratia_events.0121.a: "Vim em busca de recompensa! Não serei facilmente movido!"
 ep3_frankokratia_events.0121.a.flavor: "Meus [ROOT.Char.GetLiege.Custom('KnightCulturePluralNoTooltip')|l] cairão sobre todos [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]!"
 ep3_frankokratia_events.0130.t: "A [GetTitleByKey('e_byzantium').GetAdjectiveNoTooltip] Restauração"
 ep3_frankokratia_events.0130.desc: "Um domínio consagrado! Uma estrela polar guiando todas as almas cristãs! Um marco dourado erguido no próprio centro do mundo. Às vezes uma coisa, às vezes outra, e muitas vezes um ninho de víboras perniciosas; fosse o que fosse — e agora volta a ser — [GetTitleByKey('e_byzantium').GetName] retornou.\n\nTem sido uma era sombria e humilhante para a população fragmentada [GetTitleByKey('e_byzantium').GetAdjectiveNoTooltip]. Mas, com as cinzas da conquista latina já frias, agora a luz e a esperança se erguem. Talvez em breve todos estejam unidos sob o reinado [byz_emperor.Custom('ES_DelDela')] [byz_emperor.GetTitledFirstNameRegnal|l]!\n\n"
 ep3_frankokratia_events.0130.latin_emp: "E, no entanto…, um[latin_emperor.Custom('ES_XA')] pretendente, que afirma ter direito ao título [latin_emperor.Custom('ES_DelDela')] [latin_emperor.GetTitleAsName|l] [latin_emperor.GetPrimaryTitle.GetAdjective], insiste em se opor. Da sua corte em [latin_emperor.GetCapitalLocation.GetName] lança maldições sobre esta coroação histórica…"
 ep3_frankokratia_events.0130.unopposed: "Rivais latinos e suas aspirações foram lançados na lixeira da história. Assim começa uma nova era [GetTitleByKey('e_byzantium').GetAdjectiveNoTooltip]."
 ep3_frankokratia_events.0130.a: "Uma despedida à #EMP Latinocracia#!"
 msg_greek_anarchy_cb_loss.t: "A Anarquia Grega Termina"
 msg_greek_anarchy_cb_loss.desc: "A violenta incerteza que começou com o colapso de [GetTitleByKey('e_byzantium').GetName] perde relevância."
 lose_greek_anarchy_cb_tt: "O [casus_belli|lE] #high Tomar o Ducado Imperial#! não está mais disponível"
