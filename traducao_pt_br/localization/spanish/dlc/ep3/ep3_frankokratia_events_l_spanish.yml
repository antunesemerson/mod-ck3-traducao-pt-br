l_spanish:
 ep3_frankokratia_events.0001.t: "A Desapropriação Injusta"
 ep3_frankokratia_events.0001.crusader_intro: "Nós, peregrinos armados para a terra além-mar, contratamos [financier.GetPrimaryTitle.GetNameNoTier] para construir nossos navios... uma empreitada caríssima, e devotada a uma empresa incerta."
 ep3_frankokratia_events.0001.non_crusader_intro: "Chegaram notícias da Cruzada. Aqueles comprometidos contrataram [financier.GetPrimaryTitle.GetNameNoTier] para construir seus navios... uma empreitada caríssima, e devotada a uma empresa incerta."
 ep3_frankokratia_events.0001.desc: "\n\n\"Que desperdício terrível!\", lamenta [byz_claimant.GetFirstName], meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('byz_claimant'))]. \"Os mais valentes cavaleiros latinos, arruinados, obrigados a sofrer diante dos pagãos! Como os [Glossary( 'romaioi', 'ROMAIOS_GLOSS' )]…\".\n\nComo pretendente ao trono [byz_emperor.GetPrimaryTitle.GetAdjective], [byz_claimant.GetFirstNameNoTooltip] fala expressamente dos #EMP romaioi#!. E se… nossos cruzados marchassem em seu nome, sua causa poderia ser fortalecida com soldados gregos e suntuosos presentes imperiais? Poderia uma Cruzada tão pouco ortodoxa servir melhor à missão de Cristo… e aos Seus guerreiros cristãos?"
 ep3_frankokratia_events.0001.a: "Uma empreitada inteligente! Que o Papa certamente abençoará."
 ep3_frankokratia_events.0001.a.flavor: "Esses cristãos desafiando a autoridade do Santo Padre! Seria tão errado usar nossos peregrinos contra eles...?"
 ep3_frankokratia_events.0001.b: "Farei os cruzados jurarem pessoalmente por esta causa."
 ep3_frankokratia_events.0001.b.flavor: "Os líderes dos exércitos de Deus podem tomar suas próprias decisões. Pois eles, e não o Papa, serão os primeiros a desembarcar em Bizâncio."
 ep3_frankokratia_events.0001.c: "Uma noção desastrosamente tola."
 ep3_frankokratia_events.0001.c.flavor: "E uma traição mais ímpia mal pode ser imaginada!"
 abandon_crusade_tooltip: "@alert_icon! #alert_trial Quando a [great_holy_war|lE] começar, você e outros Atacantes voluntários serão removidos dela#!"
 byz_claimant_crusade_tooltip: "@warning_icon! #X Você liderará um #high $CRUSADING_CLAIM_CB_NAME$#! contra [byz_emperor.GetShortUIName], em nome de [byz_claimant.GetShortUIName]#!"
 may_form_latin_empire_tooltip: "Você pode ser capaz de criar #high [GetTitleByKey('e_latin_empire').GetName|U]#!"
 crusaders_may_be_paid_tooltip: "Você pode ser recompensado com @gold_icon![gold|lE], @piety_icon![piety|lE] e [special_troops|lE]"
 more_crusaders_will_join_tooltip: "#P Mais Atacantes [great_holy_war|lE] se juntarão à sua [war|lE] em vez#!"
 fewer_crusaders_will_join_tooltip: "@warning_icon! #X Menos Atacantes [great_holy_war|lE] se juntarão à sua [war|lE] em vez#!"
 ep3_frankokratia_events.0001.a.crit_success: "[ghw_sponsor.Custom('ES_ElLa')|U] [ghw_sponsor.GetTitledFirstNameNoTooltip|l] concede sua bênção ao seu plano astuto"
 ep3_frankokratia_events.0001.a.success: "[ghw_sponsor.Custom('ES_ElLa')|U] [ghw_sponsor.GetTitledFirstName|l] aceita, para reparar o cisma"
 ep3_frankokratia_events.0001.a.failure: "[ghw_sponsor.Custom('ES_ElLa')|U] [ghw_sponsor.GetTitledFirstName|l] condena seu plano perigoso"
 set_byz_state_faith_to_catholic_tooltip: "[byz_claimant.GetShortUIName] mudará a [faith|lE] de Estado [byz_emperor.GetPrimaryTitle.GetAdjective] para [byz_claimant_champion.GetFaith.GetName|l]"
 eager_for_empire_modifier: "Ansioso pelo Império"
 eager_for_empire_modifier_desc: "Est[byz_claimant.Custom('ES_EA')] o pretendente está encorajad[byz_claimant.Custom('ES_OA')] por sonhos de majestade imperial bizantina; fortalecid[byz_claimant.Custom('ES_OA')] por pura convicção e guardad[byz_claimant.Custom('ES_OA')] de perto por seus benfeitores."
 prepared_for_daring_deeds_modifier: "Preparado para Campanhas Distantes"
 prepared_for_daring_deeds_modifier_desc: "Este personagem está liderando uma grandiosa e arriscada empreitada: uma que promete grandes recompensas, mas só terá sucesso com um planejamento cuidadoso."
 ep3_frankokratia_events.0002.opening: "Ousadíssim [ROOT.Char.Custom('GetDaughterSon')] de Cristo,"
 ep3_frankokratia_events.0002.desc_condemns: "Você realmente — da proteção do descendente de São Pedro — arrancaria a espada de Gabriel? Você, desprovido de amor filial e piedade cristã, cravaria essa lâmina santíssima nos peitos de seus irmãos gregos?\n\nIsso é uma abominação que você considera. Nenhum cristão deveria ser ferido pelas mãos de peregrinos."
 ep3_frankokratia_events.0002.desc_endorses: "Com orgulho pecaminoso, os prelados dos gregos desprezam o representante escolhido do Senhor na Terra. Portanto, em Seu nome divino, ordeno que você reúna os soldados Dele atrás de si, para conquistar a vitória, e nomear um novo e justo soberano no leste.\n\nSe Deus quiser, por seus esforços, os fiéis poderão um dia reivindicar todas as terras além-mar."
 ep3_frankokratia_events.0002.desc_wasnt_asked: "Deus pune aqueles que, como Lúcifer, presumem sobre os reinos e impérios de Sua luz — mas Ele recompensa os constantes. O que começou entre Seus Cruzados, não desfarei.\n\nMas você dependerá da absolvição santa para o derramamento de sangue cristão. Proceda sabiamente e nobremente ao serviço de Cristo, e poderá recebê-la; ore enquanto estiver diante dos gregos."
 ep3_frankokratia_events.0002.a: "Bem... para Bizâncio, eu vou!"
 ep3_frankokratia_events.0002.b: "Eu me arrependo, Santo Padre! #EMP Eu me arrependo da minha tolice!#!"
 continue_frankokratia_crusade_tooltip: "Você continua redirecionando os cruzados para [byz_emperor.GetPrimaryTitle.GetName]"
 end_frankokratia_crusade_war_tooltip: "@alert_icon! #alert_trial Você não atacará [byz_emperor.GetPrimaryTitle.GetNameNoTier] ou redirecionará qualquer Cruzado#!"
 ep3_frankokratia_events.0003.opening: "Inimigo [byz_emperor.Custom('ES_DelDela')] [byz_emperor.GetTitleAsNameNoTooltip|l],"
 ep3_frankokratia_events.0003.desc: "Os que levam a cruz têm muitas embarcações novas feitas em [financier.GetPrimaryTitle.GetName] à sua disposição — mas não podem arcar com seu custo com justiça. Persuadi nosso Conselho a buscar pagamento por outros meios.\n\nPrometai-nos compensação do tesouro imperial ou com terras imperiais. Se o fizerdes, nossos navios levarão vossos $knight_culture_player_plural_no_tooltip_lowercase$ através do mar. Nossos bravos fuzileiros navais escalarão as muralhas do inimigo. Logo os gregos lamentarão ter-nos desprezado!"
 ep3_frankokratia_events.0003.a: "Nossa promessa pela sua, que assim seja."
 will_give_byz_lands_tooltip: "Se [byz_emperor.GetShortUIName] não tiver ouro suficiente @gold_icon![gold|E], [financier.GetShortUIName] ganhará um [title|lE] de [byz_emperor.GetPrimaryTitle.GetNameNoTier]"
 financier_will_join_claim_war_tooltip: "[financier.GetShortUIName] se juntará ao seu #high $CRUSADING_CLAIM_CB_NAME$#! contra [byz_emperor.GetShortUIName]"
 every_ally_will_gain_modifier_tooltip: "Você e outros Atacantes da [war|lE] ganharão [GetModifier( 'grand_crusader_fleet_modifier' ).GetNameWithTooltip|L]"
 grand_crusader_fleet_modifier: "Grande Frota de Cruzados"
 grand_crusader_fleet_modifier_desc: "Uma vasta frota de navios de transporte e galeras de guerra recém-construídos navega com os exércitos deste personagem para terras distantes."
 ep3_frankokratia_events.0004.t: "Hubris no Oeste"
 ep3_frankokratia_events.0004.desc: "Nossos espiões entre os latinos trazem notícias estranhas… Se eu não dominasse tão bem as formas que a avareza assume entre os [financier.GetPrimaryTitle.GetAdjective], acharia que estão me enganando!\n\nEmbora os [byz_claimant_champion.GetFaith.GetAdherentNamePlural] já tenham atacado os infiéis, uma grande massa de seus peregrinos armados jurou seguir para #EMP aquí#!. Liderados por [byz_claimant_champion.GetName] e [financier.Custom('ES_ElLa')] [financier.GetTitledFirstName|l], proclamam que [byz_claimant.GetName] é[byz_claimant.Custom('ES_EA')] um miserável, é [byz_claimant.Custom('ES_ElLa')] governante dos [Glossary( 'romaioi', 'ROMAIOS_GLOSS' )]!\n\nLogo, esses fanáticos estarão morrendo diante das minhas muralhas por sua causa fraca! Como podem sequer cogitar um ataque כזה contra outros cristãos?"
 ep3_frankokratia_events.0004.a: "Suponho... [byz_claimant.GetFirstNameNoTooltip] precisa morrer."
 ep3_frankokratia_events.0004.a.flavor: "Talvez um assassinato brutal desanuvie seus olhos? Certamente, isso deixará os latinos sem motivo para nos atacar."
 ep3_frankokratia_events.0004.b: "[ROOT.Char.GetFaith.HighGodName] me designou. [ROOT.Char.GetFaith.HighGodName] me defenderá."
 ep3_frankokratia_events.0004.b.flavor: "Enquanto isso, os Bispos de Roma ficam cada vez mais intoxicados por suas próprias falsidades... enganando gravemente seu rebanho selvagem."
 abandon_crusade_emp_tooltip: "@alert_icon! #alert_trial Cuando se inicie la [great_holy_war|lE] [GetFaithByKey('catholic').GetAdjective], los atacantes involucrados serán eliminados de ella#!"
 franko_emp_crusade_tooltip: "@warning_icon! #X [byz_claimant_champion.GetShortUIName] liderará uma #high $CRUSADING_CLAIM_CB_NAME$#! contra [Select_CString(byz_emperor.IsLocalPlayer,'você', byz_emperor.GetShortUIName)] em nome de [byz_claimant.GetShortUIName]#!"
 byz_empire__destroyed_tooltip: "@warning_icon! #X [GetTitleByKey('e_byzantium').GetName|U] pode até ser destruído#!"
 ep3_frankokratia_events.0005.opening: "[Select_CString(ROOT.Char.IsFemale, 'Hija mía', 'Hijo mío' )] desobediente,"
 ep3_frankokratia_events.0005.desc: "Você já não pode esperar vestir [claimant.Custom('ES_AlAla')] pretendente [claimant.GetName] com a púrpura imperial.\n\nNão sonhe mais com luxos gregos. Deixe de desafiar e faça penitência. A causa que outrora o afastou da sagrada missão de Deus teve um fim justamente abrupto."
 ep3_frankokratia_events.0005.a: "[ROOT.Char.GetFaith.HighGodName] deve amar o tirano dos gregos..."
 frankokratia_story_ends_tooltip: "O ataque dos Cruzados [GetFaithByKey('catholic').GetAdjective] a [GetTitleByKey('e_byzantium').GetName|U] foi abortado."
 ep3_frankokratia_events.0020.t: "Contra o Desviado"
 ep3_frankokratia_events.0020.desc: "A discórdia cresce entre os guerreiros de Cristo… pois o pagão é poderoso, atravessar o Mediterrâneo nos custará caro e o armador [financier.GetName] é um credor duro e astuto.\n\n[redirecter.GetName] expõe uma empreitada bastante diferente: por que não usar nosso fervor combinado para colocar [byz_claimant.Custom('ES_AlAla')] pretendente [byz_claimant.GetName] no trono de [byz_emperor.GetPrimaryTitle.GetName]? Acaso a generosa recompensa que ganharíamos não fortaleceria os fiéis?"
 ep3_frankokratia_events.0020.pope_condemns: "\n\n[pope.Custom('ES_ElLa')|U] [pope.GetTitledFirstName|l] não concorda com esta empreitada, proibindo-a e ameaçando com a danação. Os dispostos não se deixam deter."
 ep3_frankokratia_events.0020.pope_endorses: "\n\nMas embora ainda esteja tentando liderar uma Cruzada, [pope.Custom('ES_ElLa')] [pope.GetTitledFirstName|l] concedeu a esta empreitada a bênção de São Pedro!"
 ep3_frankokratia_events.0020.pope_resents: "\n\n[pope.Custom('ES_ElLa')|U] [pope.GetTitledFirstName|l] não condenou diretamente esta empreitada, mas seus prelados não apoiam semelhante cisão da Cruzada…"
 ep3_frankokratia_events.0020.a: "Eu me juntarei apenas como #EMP líder#! desse ousado empreendimento."
 ep3_frankokratia_events.0020.b: "Conte comigo entre os dispostos!"
 ep3_frankokratia_events.0020.c: "Esse plano... não faz sentido."
 ep3_frankokratia_events.0020.c.flavor: "É uma blasfêmia total! #EMP E enfraquece nossa santa Cruzada!#!"
 join_byz_claimant_crusade_tooltip: "@warning_icon! #X Você se juntará a uma #high $CRUSADING_CLAIM_CB_NAME$#! contra [byz_emperor.GetShortUIName], em nome de [byz_claimant.GetShortUIName]#!"
 may_gain_land_latin_empire_tooltip: "Podem ser distribuídos [titles|lE] em o #high [GetTitleByKey('e_latin_empire').GetName]#!"
 ep3_frankokratia_events.0030.t: "Herdeiros de Constantino"
 ep3_frankokratia_events.0030.desc: "[ghw_sponsor.Custom('ES_ElLa')|U] [ghw_sponsor.GetTitledFirstName|l] chama, mas não responderemos. Ainda não. Em vez disso, sob a direção de [byz_claimant_champion.Custom('ES_DelDela')] [byz_claimant_champion.GetTitledFirstName|l], marchamos contra [byz_emperor.GetPrimaryTitle.GetNameNoTier].\n\nOnde nossos peregrinos embarcam nos navios de [financier.GetPrimaryTitle.GetName], incontáveis escudos heráldicos são pendurados nas castelos de proa e de popa, revestidos de couro para resistirem ao mar. Poderosos cavalos de guerra são levados para o porão. Como se fossem flores, grandes velas se abrem para captar o sol! Em outros lugares, colunas de cruzados partem a pé atrás da cruz, por antigas estradas que os conduzem para o leste.\n\nVinguemos os [Glossary( 'troyanos', 'TROJANS_FRANKOKRATIA_GLOSS')]! Que os gregos tremam em seus palácios! Que se inclinem diante de [byz_claimant.GetFullName], sua [Select_CString(byz_claimant.IsFemale, 'legítima soberana', 'legítimo soberano' )] e de nós, os cruzados, como seus libertadores!"
 TROJANS_FRANKOKRATIA_GLOSS: "Através da lenda da fuga de Eneias de Tróia, os latinos medievais traçaram sua linhagem até aquela cidade lendária; a vingança por esses supostos ancestrais foi uma motivação reivindicada para o ataque a Bizâncio grego."
 ep3_frankokratia_events.0030.a: "#EMP Glória a Deus nas alturas!#!"
 frankokratia_war_begins_tooltip: "[byz_claimant_champion.GetShortUIName|U] declarou uma #high [frankokratia_war.GetName|l]#!"
 frankokratia_war_join_tooltip: "Você se juntou como um Atacante"
 abandoned_crusade_general_tooltip: "@alert_icon! #alert_trial [byz_claimant_champion.GetShortUIName] e outros Atacantes deixaram a [great_holy_war|lE] [GetFaithByKey('catholic').GetAdjective]#!"
 ep3_frankokratia_events.0031.t: "A Cruzada Fragmentada"
 ep3_frankokratia_events.0031.desc_byz: "A despecho del amor que compartimos por Cristo —y desdeñando la causa [pope.Custom('ES_DelDela')] [pope.GetTitledFirstName|l], el obispo de Roma al que tanto quieren— ¡una legión de cruzados latinos desafía a nuestro imperio!\n\n¿Acaso #EMP no#! saben cuánto tiempo llevan nuestros ejércitos imperiales sirviendo como baluarte de la cristiandad? Que la fuerza de [Glossary( 'Heraclio', 'HERAKLEIOS_GLOSS')] nos proteja; que las cabezas cortadas [byz_claimant_champion.Custom('ES_DelDela')] [byz_claimant_champion.GetTitledFirstName|l], [financier.Custom('ES_ElLa')] [financier.GetTitledFirstName|l] y [byz_claimant.Custom('ES_ElLa')] pretendiente [byz_claimant.GetName] descansen pronto frente al [Glossary( 'trono de Salomón', 'THRONE_OF_SOLOMON_GLOSS')]!\n\n[ROOT.Char.GetFaith.WarGodName] nos guarde frente a la codicia latina…, esta locura que amenaza nuestra mera existencia."
 HERAKLEIOS_GLOSS: "O #bold imperador Herakleios do século VII#! enfrentou crises militares durante grande parte de seu reinado, lutando contra os persas sasânidas e o califado rashidun. Ele implementou reformas cruciais que permitiram à ênfase do Império Bizantino sobreviver."
 THRONE_OF_SOLOMON_GLOSS: "O suposto trono do Rei Salomão, o rei mais sábio do antigo Israel, é um dos objetos salomônicos mantidos pela corte imperial de Bizâncio."
 ep3_frankokratia_events.0031.desc_catholic: "#EMP ¡La cruzada católica ha sido traicionada!#!\n\nPeregrinos enganados e sem fé fizeram causa comum com [byz_claimant.Custom('ES_ElLa')] pretendente [byz_claimant.GetName] e, no cúmulo das farsas, planejam atacar [byz_emperor.GetPrimaryTitle.GetNameNoTier], um domínio cristão! Recusam-se a viajar para [target_kingdom.GetNameNoTier]!\n\nOs apologistas [Select_CString(byz_claimant_champion.IsFemale, 'de la altiva', 'del altivo' )] [byz_claimant_champion.GetTitledFirstName|l], [Select_CString(financier.IsFemale, 'de la codiciosa', 'del codicioso' )] [financier.GetTitledFirstName|l] e os demais afirmam que reunirão a Igreja e acrescentarão a força grega à causa…\n\nMas só Deus sabe o que sairá disso."
 ep3_frankokratia_events.0031.desc_target: "Privados da luz de [ROOT.Char.GetFaith.HighGodName] que os guie, a escória [pope.GetFaith.GetAdjective] marcha nas trevas.\n\nUm grande contingente de nossos inimigos fanáticos, em vez de marchar contra [defender.GetName] jurou reivindicar [byz_emperor.GetPrimaryTitle.GetName]! Sua discórdia é um alívio intrigante para os que defendem [target_kingdom.GetNameNoTier].\n\nSuas pequenas mentes demoníacas parecem acreditar que seremos batizados pela espada quando [byz_claimant.GetName] se sentar no trono imperial..., mas as forças de [pope.Custom('ES_DelDela')] [pope.GetTitledFirstName|l] já terão sido repelidas até lá."
 ep3_frankokratia_events.0031.a: "Isso está... realmente acontecendo?"
 ep3_frankokratia_events.0041.t: "Todas as Riquezas do Império"
 ep3_frankokratia_events.0041.intro_constantinople: "Com júbilo estrondoso, noss[claimant.Custom('ES_OA')] protegido[claimant.Custom('ES_OA')] [claimant.GetFirstName], atravessa os poderosos portões de [claimant.GetCapitalLocation.GetTitle.GetNameNoTier]. Sob as grandes cúpulas e os [Glossary( 'serafines', 'SERAPHIM_GLOSS')] celestiais de Santa Sofia, por fim se [claimant.Custom('ES_LeLa')] coroa como [claimant.GetTitleAsNameNoTooltip|l]. Quão grande é nossa alegria, que absoluta é nossa admiração!\n\nEnquanto sou conduzido friamente ao [Glossary( 'palacio de Blanquerna', 'BLACHERNAE_PALACE_GLOSS')]"
 ep3_frankokratia_events.0041.intro_generic: "Com júbilo estrondoso, nosso[claimant.Custom('ES_OA')] protegido[claimant.Custom('ES_OA')], [claimant.GetFirstName]; atravessa os poderosos portões de[claimant.GetCapitalLocation.GetTitle.GetNameNoTier]. Sob as grandes cúpulas e os[Glossary( 'serafines', 'SERAPHIM_GLOSS')] celestiais da igreja imperial, por fim é[claimant.Custom('ES_LeLa')] coroado como[claimant.GetTitleAsNameNoTooltip|l]. Quão grande é nossa alegria, quão absoluta é nossa admiração!\n\nEnquanto sou conduzido friamente ao palácio imperial"
 ep3_frankokratia_events.0041.desc: "e me fazem suportar cerimônias intermináveis, uma sensação bem diferente toma conta de mim…\n\n\"Meu predecessor[defender.Custom('ES_XA')]\", explica [claimant.Custom('ES_ElLa')] [claimant.GetTitledFirstNameNoTooltip|l], \"levou grande parte do tesouro quando fugiu."
 ep3_frankokratia_events.0041.trying_to_pay: "Esforçando-nos ao máximo, o Império pode oferecer a vocês, Cruzados, apenas #EMP parcial#! recompensa."
 ep3_frankokratia_events.0041.not_trying_to_pay: "Vocês, Cruzados, não podem ser pagos pelo que foi prometido, mas, em vez disso... podemos pagar #EMP vocês#! muito, #EMP muito#! menos."
 SERAPHIM_GLOSS: "Uma ordem de seres celestiais presentes em todas as tradições abraâmicas; no cristianismo, os #bold serafins#! têm seis asas e pertencem à mais alta ordem de anjos."
 BLACHERNAE_PALACE_GLOSS: "Construído perto das Muralhas Teodosianas c. 500 d.C., este complexo palaciano em terraços foi cada vez mais utilizado durante a Alta Idade Média como a principal residência imperial."
 ep3_frankokratia_events.0041.a: "Então devemos #EMP tomar#! o que nos é devido."
 ep3_frankokratia_events.0041.a.flavor: "O saque de tal cidade imperial... será incomparável."
 ep3_frankokratia_events.0041.b: "Dissolver nossos cavaleiros, sem pagamento, não será fácil..."
 ep3_frankokratia_events.0041.b.flavor: "… mas com a #EMP motivación#! adequada, posso tentar mandar os outros embora sem derramamento de sangue."
 ep3_frankokratia_events.0041.b_success: "Você convence os latinos a partir"
 ep3_frankokratia_events.0041.b_failure: "Os Cruzados saqueiam [claimant.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]"
 ep3_frankokratia.0041_effects_from_a_tooltip: "@warning_icon! #X Os efeitos da primeira opção se desenrolam"
 ep3_frankokratia_events.0041.c: "Esperávamos mais. Mas podemos aceitar isso."
 ep3_frankokratia_events.0041.c.flavor: "A cristandade ainda foi fortalecida por esta empreitada. Um pouco."
 byzantine_empire_destroyed_tooltip: "@warning_icon! #X [claimant.GetPrimaryTitle.GetNameNoTier] será destruído#!"
 byz_capital_building_destroyed_tooltip: "@warning_icon! #X #high 3#! [buildings|lE] serão rebaixados ou destruídos#!"
 frankokratia_leaders_gain_despoiler_trait: "Todos os cruzados envolvidos e todo [ruler|lE] [GetTitleByKey('e_latin_empire').GetAdjective] ganharão o modificador #high [GetTrait('despoiler_of_byzantium').GetName( GetNullCharacter )]#!"
 bent_before_crusaders_modifier: "Curvado Diante dos Cruzados"
 bent_before_crusaders_modifier_desc: "Em vez de deixar de cumprir promessas impossíveis, este personagem pagou dívidas saqueando seu próprio reino."
 crippled_by_imperial_debt_modifier: "Dificultado por Medidas Imperiais"
 crippled_by_imperial_debt_modifier_desc: "Tropas locais foram enviadas embora e o serviço civil esvaziado. As praças do mercado estão silenciosas."
 greek_opinion: "[opinion|E] Grega"
 ep3_frankokratia_events.0042.t: "Batizado pelo Fogo"
 ep3_frankokratia_events.0042.desc: "Assaltamos [claimant.GetCapitalLocation.GetTitle.GetNameNoTier]! Os fuzileiros navais de [financier.GetPrimaryTitle.GetName] são os primeiros a hastear seu santo estandarte sobre as muralhas, enquanto nossos $knight_culture_player_plural_no_tooltip_lowercase$ uivam ao atravessar os portões da cidade e massacram até o último defensor. Os gregos põem fogo em seus próprios lares — mas nem mesmo este grande muro de fogo pode deter a ira de Deus!\n\nDurante três dias, a cidade é saqueada e seus cidadãos são passados pela espada."
 ep3_frankokratia_events.0042.constantinople: "Os devotos clamam por moderação, mas ainda assim a Hagia Sophia e os antigos santuários sagrados são vandalizados e saqueados."
 ep3_frankokratia_events.0042.desc_outro: "\n\nNossos líderes agora não confiarão em nenhum grego para governar justo este lugar e apoiar a causa de Cristo: devemos nomear nosso próprio Imperador. Meu voto, minha escolha, transformará a cristandade."
 ep3_frankokratia_events.0042.a: "Eu governarei latinos e gregos igualmente!"
 ep3_frankokratia_events.0042.b: "[player_1.Custom('ES_ElLa')|U] [player_1.GetTitledFirstNameNoTooltip|l] é respeitado entre os cruzados."
 ep3_frankokratia_events.0042.c: "Que [player_2.Custom('ES_ElLa')] [player_2.GetTitledFirstNameNoTooltip|l] reclame esta honra."
 ep3_frankokratia_events.0042.d: "[financier.Custom('ES_AlAla')|U] [financier.GetTitledFirstNameNoTooltip|l], tanta coisa lhe é devida."
 ep3_frankokratia_events.0042.e: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('emp_beneficiary_3'))] [emp_beneficiary_3.GetNameNoTooltip] tem graça imperial!"
 ep3_frankokratia_events.0042.f: "[emp_beneficiary_2.GetNameNoTooltip]. Reine sabiamente, [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('emp_beneficiary_2'))]."
 ep3_frankokratia_events.0042.g: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('emp_beneficiary'))] [emp_beneficiary.GetNameNoTooltip] merece o trono."
 old_titles_vassals_emp_beneficiary_tooltip: "@warning_icon! #X [emp_beneficiary.GetShortUIName] receberá todos os seus [titles|lE] e [vassals|lE] que estão fora dos Reinos [GetTitleByKey('e_latin_empire').GetName]#!"
 old_titles_vassals_emp_beneficiary_2_kings_tooltip: "@warning_icon! #X [emp_beneficiary.GetShortUIName] receberá todos os seus [titles|lE] e [vassals|lE] que estão fora de [latin_kingdom_1.GetNameNoTier] e [latin_kingdom_2.GetNameNoTier]#!"
 old_titles_vassals_emp_beneficiary_1_king_tooltip: "@warning_icon! #X [emp_beneficiary.GetShortUIName] receberá todos os seus [titles|lE] e [vassals|lE] que estão fora de [latin_kingdom_1.GetNameNoTier]#!"
 old_titles_vassals_emp_beneficiary_no_king_tooltip: "@warning_icon! #X [emp_beneficiary.GetShortUIName] receberá todos os seus atuais [titles|lE] e [vassals|lE]#!"
 old_titles_vassals_lord_beneficiary_tooltip: "@warning_icon! #X [beneficiary.GetShortUIName] receberá todos os seus [titles|lE] e [vassals|lE] que estão fora do [realm|lE] [de_jure|lE] de [latin_emperor.GetShortUIName]#!"
 ep3_frankokratia_events.0044.t: "Nosso é o Púrpura"
 ep3_frankokratia_events.0044.desc: "Depois de guerrear em nome dele, [claimant.GetName] renega agora o que nos deve a nós #EMP e ao Senhor!#! Nós, cruzados, não podemos tolerar algo assim!\n\nCom justa fúria, atacamos [latin_byz_capital_barony.GetNameNoTier]. Inundamos suas ruas com sangue grego, enquanto saqueamos igrejas e palácios. Que outro recurso nos resta além desta ruína?\n\nOs gregos ardilosos não reinarão mais aqui, talvez nunca mais."
 ep3_frankokratia_events.0044.desc_past_tense: "Depois de guerrearmos em seu nome, quão furiosa foi nossa ira como cruzados quando [claimant.GetName] renega o que nos é devido, #EMP e ao Senhor!#!\n\nSerá preciso tomar de assalto [latin_byz_capital_barony.GetNameNoTier]. Suas ruas precisam ser encharcadas com sangue grego; suas igrejas e palácios merecem ser saqueados. Que outro recurso nos resta, senão esta ruína?\n\nOs gregos ardilosos não reinam mais aqui, talvez nunca mais."
 ep3_frankokratia_events.0044.outro_emperor: "Um latino usará a coroa sagrada, e a honra de nomear este imperador será minha."
 ep3_frankokratia_events.0044.outro_lord: "A [latin_emperor.GetName] foi coroado mestre dos latinos e dos gregos, e nós, outros peregrinos, devemos dividir entre nós as terras de [latin_emperor.Custom('ES_XA')]."
 ep3_frankokratia_events.0044.a: "Eu ficarei aqui e saborearei os confortos gregos!"
 ep3_frankokratia_events.0044.b: "[beneficiary_3.GetFirstNameNoTooltip], meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('beneficiary_3'))]: proteja este reino."
 ep3_frankokratia_events.0044.c: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('beneficiary_2'))] [beneficiary_2.GetFirstNameNoTooltip] está encantad[beneficiary_2.Custom('ES_OA')] com estas terras."
 ep3_frankokratia_events.0044.d: "[beneficiary.GetFirstNameNoTooltip]. Governe bem estes estrangeiros, [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('beneficiary'))]."
 ep3_frankokratia_events.0045.t: "Glórias Não Vistas"
 ep3_frankokratia_events.0045.intro: "Com a vitória alcançada e os termos de separação negociados, nós, Cruzados, olhamos silenciosamente para [claimant.GetCapitalLocation.GetTitle.GetNameNoTier],"
 ep3_frankokratia_events.0045.intro_constantinople: "a joia do Bósforo. Sob monumentos de eras passadas, entre relíquias sagradas, encontram-se ruas sujas e fóruns que cheiram a gado."
 ep3_frankokratia_events.0045.intro_generic: "um substituto patético para a rainha das cidades. Uma sombra da antiga capital, [GetTitleByKey('b_constantinople').GetNameNoTier], com suas catedrais veneradas e palácios luxuosos."
 ep3_frankokratia_events.0045.desc: "\n\nTalvez, os romanos de outrora poderiam ter nos presenteado ricamente. Com certeza, eles conheciam a força para smite os pagãos. Estes gregos são menos impressionantes. [claimant.GetName] envia seus libertadores embora"
 ep3_frankokratia_events.0045.unpaid: "de mãos vazias e sem ajuda.\n\nEmbora resmungemos, embora nossos olhos cobicem tesouros e trinkets, nossa estranha peregrinação chegou ao fim."
 ep3_frankokratia_events.0045.paid_off: "meia-paga, liderando pequenas companhias arrastadas para longe de suas muralhas.\n\nE, assim, os fiéis de nossa estranha peregrinação foram de certa forma recompensados. Pelo menos, mais do que os gregos consternados e desordenados…"
 ep3_frankokratia_events.0045.a: "Ainda não é tarde para ajudar a causa dos Cruzados!"
 ep3_frankokratia_events.0045.b: "Lugares familiares chamam."
 ep3_frankokratia_crusader_joining: "Cruzado Pede ao Reivindicador"
