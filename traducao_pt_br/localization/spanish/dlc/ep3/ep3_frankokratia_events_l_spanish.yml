 expunge_latins_decision_warning_tt: "#weak Se puede usar para reclamar todo [kingdom|lE] [GetTitleByKey('e_latin_empire').GetAdjective] [de_jure|lE]#!"
 ep3_frankokratia_events.0110.t: "[GetTitleByKey('e_byzantium').GetName] , capturado!"
 ep3_frankokratia_events.0110.desc: "A guerra contra os francos está perdida.\n\nDa capital chegam notícias de uma paz negociada; fala-se de um[emperor.Custom('ES_XA')] [emperor.GetTitledFirstNameRegnal|l] recém-empossad[emperor.Custom('ES_OA')] —uma loucura na púrpura sagrada— desfilad[emperor.Custom('ES_OA')] em procissão por latinos fedorentos, vestidos com cota de malha. Ouço também sobre [financier.Custom('ES_ElLa')] [financier.GetTitleAsName|l] de [financier.GetPrimaryTitle.GetNameNoTier]; um[financier.Custom('ES_XA')] [Glossary( 'august', 'AUGOUSTOS_GLOSS')][financier.Custom('ES_OA')] de serpentes, que sibila insultos aos nossos ministros imperiais e impõe novos tributos.\n\nO exército cruzado ainda está acampado fora das muralhas da capital. O que fará com que partam? Algo que não seja a nossa completa destruição…?"
 ep3_frankokratia_events.0110.a: "Vou proteger nossos modos imperiais, aconteça o que acontecer."
 ep3_frankokratia_events.0110.b: "Deveria buscar a proteção [daddy.Custom('ES_DelDela')] [daddy.GetTitledFirstNameNoTooltip|l]."
 ep3_frankokratia_events.0110.c: "[daddy_2.Custom('ES_ElLa')|U] [daddy_2.GetTitledFirstNameNoTooltip|l] tem forças para enfrentar isso…"
 ep3_frankokratia_events.0110.d: "Em breve, talvez... eu possa ficar sozinho, sem amarras."
 previous_emp_will_join_court_tt: "[previous_holder.GetShortUIName] unirá pronto a tu [court|lE] (#high tú#! eras su [Concept('vassal',Select_CString(ROOT.Char.IsFemale,'vasalla', 'vasallo'))|E] predilect[ROOT.Char.Custom('ES_OA')])"
 frankokratia_former_emp_courtier.t: "Suserano Deposto Se Junta à Sua Corte"
 byz_become_independent_tt: "Você se tornará um[ROOT.Char.Custom('ES_XA')] [ruler|lE] governante independente"
 gain_byz_kingdom_tt: "Você ganhará [byz_kingdom.GetName]"
 byz_remain_admin_tt: "Você reterá [government|lE] [administrative|lE]"
 byz_vassals_may_join_tt: "Outros [vassals|lE] podem aceitá-lo como seu [liege|lE]"
 if_byz_dissolves_tt: "@warning_icon! #X Se [GetTitleByKey('e_byzantium').GetName] se dissolver:#!"
