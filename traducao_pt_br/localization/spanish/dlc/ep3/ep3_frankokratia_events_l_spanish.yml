 latin_empire_claim_distribution_tooltip: "Serão distribuídas [claims|lE] sobre os reinos de [Concept( 'kingdoms', 'reino' )|E] [claimant.GetPrimaryTitle.GetAdjective] entre os recebedores de títulos"
 imperial_capital_sacked_fervor_gain: "Uma grandiosa capital cristã foi brutalmente saqueada por católicos"
 ep3_frankokratia_events.0060.t_latin_empire: "Frankokratia"
 ep3_frankokratia_events.0060.t: "A Águia Ainda Voa"
 ep3_frankokratia_events.0060.desc_latin_empire: "O [GetTitleByKey('e_byzantium').GetName|U] já não existe. Seu poderoso soberano, que outrora reivindicou o legado de Roma, foi deposto. Palácios e catedrais magníficos ardem. Os cadáveres apodrecem em grandes montes. O caos desce sobre um reino em ruínas.\n\nEntre essas cinzas, proclama-se o [latin_emperor.GetPrimaryTitle.GetNameNoTier] em nome de Cristo e [pope.Custom('ES_ElLa')] [pope.GetTitledFirstName|l].\n\nUma era de perigos e discórdia começa nas terras dos gregos."
 ep3_frankokratia_events.0060.desc_paid: "[Select_CString(claimant.IsFemale, 'Uma nova soberana', 'Um novo soberano' )] se senta entre os luxos incomparáveis de [claimant.GetCapitalLocation.GetTitle.GetNameNoTier]: [claimant.GetName], impost[claimant.Custom('ES_OA')] por armas latinas e a quem seus súbditos obedecem a contragosto — por enquanto —.\n\nEmpanturrados com todas as riquezas que [Select_CString(claimant.IsFemale, 'esta nova', 'este novo' )] [claimant.GetTitleAsNameNoTooltip|l] pôde reunir, liderando as tropas de [claimant.GetPrimaryTitle.GetName], os cruzados finalmente voltam seus olhos para outro lugar."
 ep3_frankokratia_events.0060.desc_leave_unpaid: "[Select_CString(claimant.IsFemale, 'Uma nova soberana', 'Um novo soberano' )] se senta entre os luxos inigualáveis de [claimant.GetCapitalLocation.GetTitle.GetNameNoTier]: [claimant.GetName], impost[claimant.Custom('ES_OA')] por armas latinas e a quem seus súditos obedecem a contragosto —por enquanto—.\n\nCom uma convicção digna de seus antepassados, [Select_CString(claimant.IsFemale, 'esta nova', 'este novo' )] [claimant.GetTitleAsNameNoTooltip|l] teve #EMP rejeitado#! as exigências dos cruzados. Os cães que lutaram e rosnaram por [claimant.GetSheHe] foram enviados de volta famintos.\n\n[Select_CString(claimant.IsFemale, 'Uma nova', 'Um novo' )] monarca reina, sim… mas ainda nos perguntamos por que os cruzados errantes escolheram tal caminho se buscavam a salvação…"
 ep3_frankokratia_events.0060.desc_loss: "#EMP \"Alabemos [defender.Custom('ES_AlAla')] [defender.GetTitledFirstName|l], portador[defender.Custom('ES_XA')] de victorias! [defender.GetTitleAsNameNoTooltip]! [defender.GetTitleAsNameNoTooltip]!\".#!\n\nO canto ecoa por [defender.GetPrimaryTitle.GetNameNoTier] por inteiro: seu soberan[defender.Custom('ES_OA')] expulsou os cruzados latinos de volta ao mar. E quanto à reivindicação de [claimant.GetName] sobre o poderoso Bizâncio, parece que o favor de Deus foi bastante limitado.\n\nUma grande vergonha para uns aventureiros que ousaram presumir a vontade do Todo-Poderoso…"
 ep3_frankokratia_events.0060.a: "Uma verdadeira reunião de cristãos orientais e ocidentais."
