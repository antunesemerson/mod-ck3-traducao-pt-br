 ep3_latin_emp_army_name: "Buscadores de Glória Latinos"
 frankokratia_latin_emp_army_tooltip: "O [holder|lE] de [GetTitleByKey('e_latin_empire').GetName] ganha um [army|lE] pequeno de tropas especiais"
 frankokratia_byz_slaughter.t: "Massacre em [latin_capital_barony.GetNameNoTierNoTooltip]"
 frankokratia_byz_slaughter_tooltip: "Em meio ao carnificina provocada pelos latinos enfurecidos, #N [slaughtered_byzantines]#! nobres foram massacrados."
 frankokratia_byz_slaughter_varangian_tooltip: "Entre a carnificina provocada pelos latinos enfurecidos, foram massacrados #N [slaughtered_byzantines]#! nobres.\n\nOs varangianos comandados por [varangian_victim.GetShortUIName] defenderam a família imperial até o amargo fim."
 frankokratia_byz_slaughter_house_head_tooltip: "Em meio à carnificina causada pelos latinos enfurecidos, foram massacrados #N [slaughtered_byzantines]#! nobres.\n\nPessoas ilustres, —como [house_head_victim.GetShortUIName], chefe[house_head_victim.Custom('ES_EA')] dos seus— foram queimadas vivas em suas casas."
 frankokratia_byz_slaughter_child_tooltip: "Entre a carnificina provocada pelos latinos enfurecidos, foram massacrados #N [slaughtered_byzantines]#! nobres.\n\nCrianças como [child_victim.GetShortUIName] foram espancadas até a morte."
 frankokratia_byz_slaughter_emp_tooltip: "Em meio à carnificina provocada pelos latinos furiosos, foram massacrados #N [slaughtered_byzantines]#! nobres.\n\nEntre os mortos estava [defender.GetName], antig[defender.Custom('ES_OA')] governante de [GetTitleByKey('e_byzantium').GetNameNoTier]."
 frankokratia_byz_slaughter_victim.t: "Mortos pelos latinos"
 frankokratia_byz_slaughter_victim_tooltip: "Seu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('victim'))] [victim.GetShortUIName] foi morto[victim.Custom('ES_OA')] durante o saqueio de [latin_capital_barony.GetNameNoTier]."
 ep3_frankokratia_events.0070.t: "A Espada Sheathed em Ouro"
 ep3_frankokratia_events.0070.intro: "[financier.GetName] permaneceu em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTier], para cuidar dos assuntos renovados dos muitos mercadores locais do povo [financier.GetPrimaryTitle.GetAdjective]. Agora, sua nau capitânia carregada de saques se despede.\n\n"
 ep3_frankokratia_events.0070.rando_emp: "\"Que aventura!\" [financier.GetFirstNameNoTooltip] exulta. \"Quem poderia reclamar coragem para igualar a nós que tomamos este grande império?\""
 ep3_frankokratia_events.0070.leader_emp: "\"Mobilizamos tantos sob a cruz,\" [financier.GetFirstNameNoTooltip] exulta. \"E veja o que isso lhe deu! Um grande império!\""
 ep3_frankokratia_events.0070.desc: "Mas... #EMP manter#! ela — pode a força de um braço de espada ser suficiente? Não deveríamos nós, latinos, atados por nosso fervor, aliar estes novos reinos gregos nossos...?\n\n\"Eu pediria apenas que... meus [financier.GetPrimaryTitle.GetAdjectiveNoTooltip] comerciantes, com seus muitos, #EMP profundos#! interesses locais, tivessem direitos especiais garantidos...\""
 negotiate_financier_alliance_effect_tooltip: "#high Você#! e [financier.GetShortUIName] entram em uma [alliance|lE] mútua"
 custom.every_realm_county: "Cada [county|lE] em seu [realm|lE]"
 ep3_frankokratia_events.0070.a: "Somente juntos podemos controlar esses malditos gregos."
 ep3_frankokratia_events.0070.a.flavor: "A espada sobre os pescoços gregos ainda é minha, mesmo que o [financier.GetPrimaryTitle.GetAdjectiveNoTooltip] dinheiro seja o que governa seus mercados."
 ep3_frankokratia_events.0070.b: "#EMP Canalha avaricios[financier.Custom('ES_OA')]!#! Não me admira que os gregos te detestem!"
 ep3_frankokratia_events.0070.b.flavor: "Pode-se recusar [financier.Custom('ES_AlAla')] [financier.GetTitleAsNameNoTooltip|l], mas sua cobiça pelos lucros do meu novo reino dificilmente diminuirá..."
 egregious_trading_rights_modifier: "Direitos Comerciais Egregios"
 egregious_trading_rights_modifier_desc: "Como parasitas famintos, comerciantes empoderados por direitos usurários sufocam os mercados locais em benefício próprio."
 greek_spoils_imports_modifier: "Espólios Gregos Importados"
 greek_spoils_imports_modifier_desc: "Esta terra está repleta de tesouros estrangeiros. O comércio mercantil raramente esteve tão bem."
 ep3_harassed_at_sea_modifier: "Afligido no Mar"
 ep3_harassed_at_sea_modifier_desc: "Marinheiros habilidosos de reinos hostis negam seus serviços às tropas deste personagem; além disso, eles iniciam brigas entre os marinheiros e danificam navios no porto."
 custom.every_county_latin_kingdom: "Cada [county|lE] deste [kingdom|lE]"
 ep3_frankokratia_events.0080.t: "Um Reino para os Latinos"
 ep3_frankokratia_events.0080_non_greek: "César, Constantino, uma sucessão de gregos com nomes vagos e trabalhosos... e agora [ROOT.Char.GetFirstName]."
 ep3_frankokratia_events.0080_greek: "As terras dos gregos, uma vez totalmente subjugadas sob [GetTitleByKey('e_byzantium').GetName], permanecem em fluxo. Quem, entre todos os governantes sob [ROOT.Char.GetFaith.PositiveAfterLife], tem direito a elas?"
 ep3_frankokratia_events.0080.desc: "\n\nA soberania dos romanos é uma das maiores honras na Terra. Com ela, recebe-se o respeito das multidões. Conquistá-la estava além dos sonhos dos nossos cruzados latinos; um golpe de sorte tornado realidade em meio a um derramamento de sangue horrível. Mas agora, meu império é muito real. A gloriosa imagem [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip] está quase impecável.\n\nNo passado, fomos invasores; os habitantes locais choravam, fugiam ao nos ver. Agora em [kingdom_1.GetNameNoTier], nos aclamam pelas ruas."
 ep3_frankokratia_events.0080.a: "Que todo [kingdom_1.GetNameNoTierNoTooltip] conheça meu direito!"
 ep3_frankokratia_events.0080.b: "Que [kingdom_2.GetNameNoTierNoTooltip] se curve!"
 ep3_frankokratia_events.0080.c: "Que [kingdom_3.GetNameNoTierNoTooltip] seja para sempre[ROOT.Char.GetTitleAsNameNoTooltip]!"
 ep3_frankokratia_events.0080.d: "Que o povo de [kingdom_4.GetNameNoTierNoTooltip] se curve."
 ep3_frankokratia_events.0080.e: "Que [kingdom_5.GetNameNoTierNoTooltip] seja nosso."
 cultural_acceptance_latins_legitimized: "[GetTitleByKey('e_latin_empire').GetName] estabeleceu domínio legítimo"
 greek_anarchy_war_generic_army_name: "Desertores [defender.GetPrimaryTitle.GetNameNoTooltip]"
 greek_anarchy_war_generic_army_name_2: "Hoste de Mercenários"
 greek_anarchy_war_crusaders_army_name: "[army_culture.GetNameNoTooltip] Saqueadores"
 greek_anarchy_war_greek_army_name: "[army_culture.GetNameNoTooltip] Dregs Tagmáticos"
 greek_anarchy_war_neighbor_army_name: "[army_culture.GetNameNoTooltip] Livreiros"
 greek_anarchy_war_nomad_army_name: "[army_culture.GetNameNoTooltip] Horda de Guerra"
 greek_anarchy_troops_tt: "Uma [army|lE] de [special_troops|lE] se junta à causa vitoriosa!"
 greek_anarchy_development_loss_cb: "Cada [county|lE] tomado perde #N [EmptyScope.ScriptValue('greek_anarchy_development_value')]#! [development_growth|lE]"
 ep3_frankokratia_events.0090.t: "Lembre-se, Você É [GetTitleByKey('e_byzantium').GetAdjectiveNoTooltip]!"
 ep3_frankokratia_events.0090.desc: "Províncias como [kingdom_1.GetNameNoTier] suportaram uma era duvidosa — e foram privadas do reinado gentil de um soberano [GetTitleByKey('e_byzantium').GetAdjective] — por tempo demais.\n\nMas agora — o povo [kingdom_1.GetAdjectiveNoTooltip] pode se regozijar! Eles não se curvam a brutamontes francos! Os campos [kingdom_1.GetAdjectiveNoTooltip], há muito cultivados, não murcharão sob os cascos dos cavalos de guerra."
 ep3_frankokratia_events.0090_emp: "Vinde, [Glossary( 'hoi polloi', 'HOI_POLLOI_GLOSS')]; erguei bem alto e com orgulho os vossos ícones e alegrai-vos com o retorno da ordem divina [ROOT.Char.GetFaith.HighGodNamePossessive]!\n\nEstas gentes se reuniram sob seu [ROOT.Char.GetTitleAsName|l]; agora que as riquezas de sua terra fluem para o palácio, também lhes serão oferecidas todas as honras e o esplendor que seus antepassados chegaram a conhecer."
 ep3_frankokratia_events.0090_non_emp: "E os simples, como os do [kingdom_1.GetTierAsNameNoTooltip], podem sonhar livremente... com o retorno de seu verdadeiro suserano.\n\nÉ hora de que o domínio latino chegue ao fim."
 ep3_frankokratia_events.0090.a: "Em [kingdom_1.GetNameNoTierNoTooltip], que tempos sombrios sejam esquecidos!"
 ep3_frankokratia_events.0090.b: "Olhem para o #EMP Autocrator#!, [kingdom_2.GetNameNoTierNoTooltip]!"
 ep3_frankokratia_events.0090.c: "[kingdom_3.GetNameNoTierNoTooltip] conhece o púrpura!"
 ep3_frankokratia_events.0090.d: "Ao redil imperial: retornem, [kingdom_4.GetNameNoTierNoTooltip]."
 ep3_frankokratia_events.0090.e: "[GetTitleByKey('e_byzantium').GetAdjectiveNoTooltip] [kingdom_5.GetNameNoTierNoTooltip], mais uma vez!"
 msg_latin_de_jure_gain.t: "Os Latinos Reivindicam Direitos De Jure"
 msg_latin_de_jure_gain.desc: "[title_gainer.GetName] arrancou o [swapped_kingdom.GetName] de [GetTitleByKey('e_byzantium').GetName], estabelecendo a sua soberania [de_jure|lE]"
 msg_byz_de_jure_gain.t: "Direitos sobre [GetTitleByKey('e_byzantium').GetNameNoTooltip] recuperados"
 msg_byz_de_jure_gain.desc: "[title_gainer.GetName] recuperou o [swapped_kingdom.GetName] da posse [de_jure|lE] [GetTitleByKey('e_latin_empire').GetAdjective]"
 swap_latin_for_byz_titles_tt: "Todos os [title|lE] [GetTitleByKey('e_latin_empire').GetAdjective] [de_jure|lE] títulos serão devolvidos a [GetTitleByKey('e_byzantium').GetName]"
 ep3_frankokratia_events.0100.t: "Latinocracia, Quebrada"
 ep3_frankokratia_events.0100.desc: "Pelo rebento de São Pedro, por São Marcos, pelo florim e pelo ducado — foi [GetTitleByKey('e_byzantium').GetName] devastada.\n\nDesde então, os senhores de coração [GetTitleByKey('e_latin_empire').GetAdjective] cavalgam com seus cavaleiros repetidas vezes. No início, todos trajados de ouro e ardendo de propósito, mas ultimamente... as esperanças de seu soberan[latin_emp.Custom('ES_OA')|l], [latin_emp.Custom('ES_ElLa')] [latin_emp.GetTitledFirstNameRegnal|l], eram tênues, míseras. Sua causa conhecia apenas uma resignação sombria.\n\n[GetTitleByKey('e_latin_empire').GetName], uma abominação nascida dentro da cristandade, que jamais deveria ter existido."
 ep3_frankokratia_events.0100.byz_no_emp: "Diante desta destruição… como pode ficar ocioso qualquer grande [Glossary( 'romaios', 'ROMAIOS_GLOSS' )]? Um basileus, #EMP nuestro#! basileus, há de atravessar triunfalmente e em breve a [Glossary( 'Puerta dorada', 'GOLDEN_GATE_GLOSS' )].\n\nPois o senhorio [GetTitleByKey('e_latin_empire').GetAdjective] já não existe!"
 ep3_frankokratia_events.0100.cath: "Nossos Cruzados foram enganados por uma traiçoeira arrogância? A luz da majestade grega #EMP nos deixou cegos?#! Até o Papa exaltou nosso estado latino entre os gregos..."
 ep3_frankokratia_events.0100.emp: "[byz_emp.Custom('ES_ElLa')|U] [Select_CString( byz_emp.IsFemale, 'auténtica heredera', 'auténtico heredero' )] de Constantino, é mais uma vez [byz_emp.Custom('ES_ElLa')] [byz_emp.GetTitledFirstNameRegnal|l]… que poderá reparar esta era de grave sofrimento e, mais uma vez, erguer o poderoso baluarte do Bósforo."
 ep3_frankokratia_events.0100.a_non_catholic: "Veio de [ROOT.Char.GetFaith.NegativeAfterLife] e para aquele lugar terrível retorna."
 ep3_frankokratia_events.0100.a_catholic: "Vanamente, sonhamos em dar glória a [ROOT.Char.GetFaith.HighGodName] na Terra..."
