l_spanish:
 #X Reconquered
 ep3_emperor_yearly.2000.t: "[county.GetNameNoTierNoTooltip] Reconquistado"
 ep3_emperor_yearly.2000.desc_intro: "Os exércitos brilhantes dos romanos marcham novamente para as terras que nossos ancestrais um dia ocuparam, e a glória por fazer isso acontecer pertence exclusivamente a mim."
 ep3_emperor_yearly.2000.desc_antioch: "\n\n[county.GetNameNoTier]: sede do pentarca, evangelizada pelo próprio São Pedro, onde o cristianismo deu seus primeiros passos oficiais. Outrora uma próspera cidade de fé e comércio, foi duramente atingida por séculos de desgaste fronteiriço, de modo que agora não passa de uma sombra de sua antiga glória.\n\nNo entanto, uma sombra gloriosa pode voltar à grandeza se tiver uma mão forte para guiá-la, como a minha!"
 ep3_emperor_yearly.2000.desc_antioch_not_christ: "\n\n[county.GetNameNoTier]: outrora uma próspera cidade de fé e comércio e uma orgulhosa capital do cristianismo, perdida e reconquistada pelos fiéis muitas vezes, sofreu duramente com séculos de desgaste nas fronteiras, de modo que agora é apenas uma sombra de sua antiga glória.\n\nNo entanto, uma sombra gloriosa pode voltar à grandeza com uma mão forte que a guie, como a minha!"
 ep3_emperor_yearly.2000.desc_jerusalem: "\n\n[county.GetNameNoTier], a Cidade Santa, finalmente retornou às mãos cuidadosas do verdadeiro Imperador, o legítimo representante de nosso Senhor na Terra.\n\nEm breve, a Sé do Pentarca será restaurada, e multidões de peregrinos poderão visitar novamente, em segurança, o berço do cristianismo sob a proteção das armas romanas."
 ep3_emperor_yearly.2000.desc_jerusalem_not_christ: "\n\n[county.GetNameNoTier], a Cidade Santa das três religiões. Muitos a cobiçavam, mas, desde os primeiros dias do império, ela só teve um governante legítimo: o imperador.\n\nÀ medida que garantirmos sua segurança e paz, poderemos receber multidões de peregrinos de todos os cantos do império e além!"
 ep3_emperor_yearly.2000.desc_alexandria: "\n\n[county.GetNameNoTier], a joia do Egito, volta a estar nas mãos romanas! Sede do pentarca, capital milenar da cultura, outrora entre os centros mais ativos do debate filosófico e teológico cristão, arruinada e abandonada pelas garras gananciosas dos infiéis.\n\nMais uma vez, a cidade de Alexandre se ergue de novo com o verdadeiro Império!"
 ep3_emperor_yearly.2000.desc_alexandria_not_christ: "\n\n[county.GetNameNoTier], a joia do Egito, está de volta às mãos romanas!\n\nAntigamente sede de todo o conhecimento e sabedoria do mundo, foi duramente atingida pelas perseguições cristãs, a ponto de pouco restar de sua antiga glória. Pouco, mas não nada, e com esse entendimento reconstruiremos uma cidade digna de seu passado!"
 ep3_emperor_yearly.2000.desc_frontier: "\n\nOs habitantes locais agora chamam esta região de [county.GetNameNoTier]. Os romanos pisaram estas terras quando o imperador [GetScriptedCharacterByHistoryID( '145279' ).GetFirstName] conduziu suas valerosas legiões até o interior da Mesopotâmia, ainda que por pouco tempo.\n\nEsta foi, em seu tempo, a fronteira final do nosso império no Oriente, e hoje volta a sê-lo."
 ep3_emperor_yearly.2000.desc_edessa: "\n\nA famosa cidade de [county.GetNameNoTier] —um dos primeiros centros de evangelização cristã, sede de um concílio ecumênico, palco do martírio de muitos gloriosos santos— tem sido disputada entre o império e seus vizinhos invasores por muitos séculos.\n\nAgora volta novamente aos cuidados do legítimo imperador, e desta vez será para sempre, assim o queira [ROOT.Char.GetFaith.HighGodName]."
 ep3_emperor_yearly.2000.desc_edessa_not_christ: "\n\n[county.GetNameNoTier]: antigamente capital da província de Osroene, esta cidade ergueu-se orgulhosamente como a barreira que separava romanos e sassânidas por 400 anos, antes de cair diante do avanço do islã.\n\nSéculos se passaram desde então, e o império e nossos vizinhos nunca deixaram de disputar [county.GetNameNoTierNoTooltip]. Que este glorioso dia de conquista seja o último que a cidade verá!"
 ep3_emperor_yearly.2000.desc_bari: "\n\n[county.GetNameNoTier]sempre foi um importante porto no Mediterrâneo, mas dificilmente uma fortaleza estratégica — até a chegada dos árabes.\n\nA invasão deles deixou dolorosamente claro que, para garantir a segurança tanto da Itália Meridional quanto dos Bálcãs contra a conquista, precisamos de um ponto de apoio forte e defensável na Itália. Agora que [county.GetNameNoTierNoTooltip]voltou a estar em nossas mãos, nos esforçaremos para usá-lo como a pedra angular de nossa defesa ocidental."
 ep3_emperor_yearly.2000.desc_syracuse: "\n\n[county.GetNameNoTier]: porto comercial, centro da evangelização cristã no Ocidente e capital ocidental do imperador Constante II.\n\nAquele que fora o último bastião romano contra a conquista muçulmana da Sicília também caiu, mas agora foi reconquistado! Glória e riquezas aguardam o conquistador, e foi dado um novo passo rumo à restauração do legítimo Império."
 ep3_emperor_yearly.2000.desc_rome: "\n\n[county.GetNameNoTier].A Cidade Imortal. Primeira capital e berço do nosso império.\n\nEmbora a autoridade imperial tenha abandonado esta terra há muito tempo em favor de Constantinopla — a Nova Roma — e o pentarca local, extraviado, tenha ocupado ilicitamente o vácuo de poder subsequente, o retorno da cidade ao único e legítimo imperador é motivo de júbilo. Uma nova grandeza aguarda o império agora que demos um passo tão monumental rumo ao Ocidente."
 ep3_emperor_yearly.2000.desc_ravenna: "\n\n[county.GetNameNoTier] foi a sede dos últimos imperadores quando ainda havia um imperador legítimo sentado no trono no caótico Ocidente devastado pelos bárbaros. Portanto, foi natural que o imperador Justiniano I colocasse ali o centro da administração romana restabelecida.\n\nPassaram-se séculos desde que os lombardos expulsaram os últimos romanos do norte da Itália; no entanto, acaba de começar uma nova era de paz, prosperidade e unidade."
 ep3_emperor_yearly.2000.desc_carthago: "\n\nHoje em dia, o principal assentamento da região é [county.GetNameNoTier], mas não esquecemos a época em que os romanos controlavam estas costas a partir de Cartago — antes um inimigo letal, depois uma próspera cidade de fé e cultura, agora uma casca vazia de sua antiga grandeza.\n\nEmbora talvez já seja tarde demais para devolver à cidade sua antiga glória, a posição conveniente desta área certamente será vital para restaurar a presença romana na África."
 ep3_emperor_yearly.2000.desc_tingis: "\n\nHoje em dia, os locais chamam esta cidade [county.GetNameNoTier], mas nós a conhecíamos como Tingis, capital da província da Mauritânia Tingitana.\n\nAntes um próspero centro do poder romano, a cidade tem estado perdida para nós e para a luz da verdadeira fé במשך séculos, depois que primeiro as hordas vândalas, enviadas para punir nossa corrupção, a varreram, seguidas pelo califado muçulmano. Felizmente para ela, a longa era de dominação bárbara chegou ao fim, e a Paz Imperial foi restabelecida."
 ep3_emperor_yearly.2000.desc_carthago_spartaria: "\n\nHoje em dia, os habitantes locais chamam esta região de [county.GetNameNoTier]. No entanto, Justiniano I a chamou de Carthago Spartaria e a transformou em um dos principais centros da presença romana restabelecida no Ocidente.\n\nJá se passaram séculos מאז que a cidade caiu nas mãos bárbaras pela última vez; no entanto, à medida que nosso controle é restabelecido na Ibéria, a glória de Justiniano parece estar novamente ao alcance das mãos."
 ep3_emperor_yearly.2000.desc_milan: "\n\nNossos antepassados chamaram esta região [county.GetNameNoTier] pelos longobardos, os bárbaros que a subtraíram do Império pela primeira vez. Um de seus principais centros, Mediolanum, foi a capital da parte ocidental do Império sob os Tetrarcas e, nessa mesma cidade, Constantino, o Grande, promulgou o édito que concedia liberdade religiosa a todo o Império.\n\nEmbora os longobardos tenham transferido a capital, a região continua próspera e constituirá um excelente bastião no norte da Itália."
 ep3_emperor_yearly.2000.desc_trier: "\n\nHoje em dia, os habitantes locais chamam esta cidade [county.GetNameNoTier], mas nós ainda lembramos como nossos a chamavam: Augusta Treverorum, sede do tetrarca Constâncio Cloro, pai do fundador de nossa Nova Roma, Constantino, o Grande.\n\nOs invasores germânicos a tomaram há muito tempo e, mais recentemente, chegaram até a se autodenominar \"imperadores\", abusando de um título que não pertence a bárbaro algum. Isso já não importa. Quando minhas tropas leais reconquistarem o que antes nos pertencia por direito, aniquilaremos todos os pretendentes e apenas um Império legítimo باقی?"
 ep3_emperor_yearly.2000.desc_hadrians_wall: "\n\nOs bárbaros que ocuparam esta área após a partida da última águia romana a chamaram de [county.GetNameNoTier]. No passado, o poderoso Muro do imperador Adriano bastava para manter os bárbaros fora do império, e estas mesmas terras foram a última fronteira da civilização ao norte.\n\nAgora o Muro jaz em ruínas, e os bárbaros se espalharam por estas terras durante séculos. Mas isso acabou. Hoje, a fronteira de Adriano está de volta!"
 ep3_emperor_yearly.2000.desc_chandax: "\n\nOs árabes que conquistaram Creta pela primeira vez transferiram sua capital para a antiga Heraclião e a chamaram de [county.GetNameNoTier], enquanto a capital original, Gortina, declinava.\n\nRecuperar o controle do novo coração da ilha é um passo fundamental para garantir a segurança no Mediterrâneo e a prosperidade de todo o Império, já que agora é possível deter e redirecionar tanto comerciantes quanto piratas, além de interceptar as frotas invasoras."
 ep3_emperor_yearly.2000.desc_tours: "\n\nHoje em dia, os habitantes locais chamam esta região de [county.GetNameNoTier], a partir do nome latino, já esquecido, de seu principal assentamento, Civitas Turonum. Nos últimos dias da parte ocidental do império, esta cidade foi uma verdadeira metrópole, dominando toda a província de Lugdunum.\n\nDesde então, sua importância só diminuiu parcialmente, pois multidões de peregrinos cristãos ainda passam por ela a caminho de Santiago, e ela serviu como baluarte contra duas invasões: a dos árabes e a dos vikings. Um verdadeiro espírito romano ainda persiste nestas terras, e eles o redescobrirão, queiram ou não!"
 ep3_emperor_yearly.2000.a: "Um dia glorioso para todos os romanos!"
 #The Fate of a PrincessPrince
 ep3_emperor_yearly.2010.t: "O destino de um[sent_off.Custom('ES_XA')] [sent_off.Custom('GetPrincessPrince')]"
 ep3_emperor_yearly.2010.desc: "Hoje há um burburinho claro na corte. #EMP Qué vergüenza#!. A fofoca não convém a este salão majestoso.\n\n«Pobre [sent_off.GetFirstName]…».\n«… So[sent_off.Custom('ES_OA')] entre esses #EMP bárbara#! [spouse.GetCulture.GetNameNoTooltip]…».\n«… Um destino pior que a morte…».\n«… Ouvi dizer que eles nem sequer sabem usar o #EMP tenedor#!!».\n\nNo entanto, reconheço claramente [gossip_1.Custom2('MyCharacterIntroduction', ROOT.Char)] e [gossip_2.Custom2('MyCharacterIntroduction', ROOT.Char)] cochichando em um canto. Assim que fixo neles meu olhar severo, eles se calam imediatamente, mas ouvi o suficiente para saber exatamente sobre o que estavam falando."
 ep3_emperor_yearly.2010.a: "As necessidades políticas do Império superam o indivíduo."
 ep3_emperor_yearly.2010.b: "Seu exemplo brilhante de sacrifício cristão está sempre em minhas orações."
 ep3_emperor_yearly.2010.b2: "Um exemplo brilhante de devoção ao bem do povo."
 ep3_emperor_yearly.2010.c: "Não cabe a você julgar um Imperador."
 #A Head Unworthy of the Crown
 ep3_emperor_yearly.2020.t: "Uma Cabeça Indigna da Coroa"
 ep3_emperor_yearly.2020.desc: "Os primeiros dias do meu reinado como [ROOT.Char.GetTitleAsNameNoTooltip|l] foram frenéticos, mas finalmente é hora de receber formalmente a coroa e a bênção [patriarch.Custom('ES_DelDela')] [patriarch.GetTitleAsNameNoTooltip|l] nos salões santificados de [ROOT.Char.Custom('TriumphReligiousLocation')].\n\n[patriarch.Custom('ES_ElLa')|U] [patriarch.GetTitledFirstName|l] me espera na entrada com uma expressão severa no rosto; as portas estão firmemente fechadas atrás de \n\n"Por que viestes, [ROOT.Char.GetFirstNameNoTooltip]? Não sois dign[ROOT.Char.Custom('ES_OA')]! Aqui não há lugar para gente como vós!"."
 ep3_emperor_yearly.2020.a: "Eu me arrependo e renuncio aos meus pecados!"
 ep3_emperor_yearly.2020.a.tt: "Você começa publicamente e oficialmente um caminho de arrependimento para ter seus pecados perdoados!"
 ep3_emperor_yearly.2020.a.tt2: "No final do período de arrependimento, você perderá [target_criminal_trait.GetName(GetPlayer)|l]"
 ep3_emperor_yearly.2020.b: "É [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip|l] quem escolhe [patriarch.Custom('ES_AlAla')] [patriarch.GetTitleAsNameNoTooltip|l], não o contrário."
 ep3_emperor_yearly.2021.t: "Arrependimento"
 ep3_emperor_yearly.2021.desc: "Já se passou um ano inteiro desde que [patriarch.Custom('ES_ElLa')] [patriarch.GetTitledFirstName|l] me repreendeu severamente por meus pecados, e humildemente comecei a expiá-los para ser dign[ROOT.Char.Custom('ES_OA')] da coroa que carrego para a glória de [ROOT.Char.GetFaith.HighGodName]."
 ep3_emperor_yearly.2021.desc_patriarch: "\n\nHoje nos encontramos novamente, mas um sorriso benevolente adorna seu rosto."
 ep3_emperor_yearly.2021.desc_patriarch_new: "\n\n[patriarch.Custom('ES_ElLa')|U] [patriarch.GetTitledFirstNameNoTooltip] faleceu desde então, mas seu sucessor[patriarch_portrait.Custom('ES_XA')] está agora à minha frente para me conceder sua bênção."
 ep3_emperor_yearly.2021.desc_end: "\n\n\"A paz esteja com você, [ROOT.Char.GetTitledFirstNameNoTooltip|l]! Seu crescimento espiritual foi grande, seu arrependimento genuíno, e seus pecados, portanto, estão perdoados. Seu reinado é abençoado por [ROOT.Char.GetFaith.HighGodNameAlternate]!\""
 ep3_emperor_yearly.2021.a: "Sou [ROOT.Char.GetTitleAsNameNoTooltip|l] por direito humano e divino."
 #Usurper
 ep3_emperor_yearly.2030.t: "Usurpador"
 ep3_emperor_yearly.2030.desc: "O poder pertence a quem é ousado o suficiente para tomá-lo, e [ROOT.Char.GetFaith.HighGodName] favorece os corajosos. É claro que [ROOT.Char.GetFaith.HighGodNameSheHe|U] #EMP me#! me favoreceu, pois finalmente posso me chamar [ROOT.Char.GetTitleAsNameNoTooltip|l]. No entanto, [patriarch.Custom('ES_ElLa')] [patriarch.GetTitledFirstName|l] parece discordar dos meus métodos.\n\n«Subiste ao topo por um caminho de sangue, [ROOT.Char.GetFirstNameNoTooltip], e te rebelaste contra teu[predecessor.Custom('ES_OA')] legítim[predecessor.Custom('ES_OA')] governante legítimo, [predecessor.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip|l] [predecessor.GetFirstName]! Achaste mesmo que [ROOT.Char.GetFaith.HighGodNameAlternate] abençoaria um[ROOT.Char.Custom('ES_XA')] #EMP usurpador[ROOT.Char.Custom('ES_XA')]#! usurpador?».\n\nNão preciso que [patriarch.Custom('ES_AlAla')] [patriarch.GetTitleAsNameNoTooltip|l] goste de mim, mas é inegável que isso vai complicar as coisas…"
 ep3_emperor_yearly.2030.a: "Então é hora de uma mudança!"
 ep3_emperor_yearly.2030.a.tt: "Substituir [patriarch.Custom('ES_AlAla')] [patriarch.GetTitleAsNameNoTooltip|l] atual por um[patriarch.Custom('ES_OA')] que o apoie"
 ep3_emperor_yearly.2030.b: "Vou provar meu valor."
 patriarch_support_2030_desc: "Apoio do Chefe da Fé"
 patriarch_support_2030_desc_tt: "[patriarch.Custom('ES_ElLa')|U] [patriarch.GetTitleAsNameNoTooltip|l] apoiará seu predecessor até que você prove seu valor"
 #Married Again
 ep3_emperor_yearly.2040.t: "Casado Novamente"
 ep3_emperor_yearly.2040.desc: "É de conhecimento público que [new_wife.Custom('ES_ElLa')] [new_wife.GetTitledFirstName|l] não é minha primeira[new_wife.Custom('ES_XA')] [new_wife.GetWifeHusband]. Nem [Select_CString( new_wife.IsFemale, 'la segunda', 'el segundo' )]. Meu casamento mais recente, após a infeliz partida de meus cônjuges anteriores, causou grande escândalo nos círculos religiosos liderados por [patriarch.Custom('ES_ElLa')] [patriarch.GetTitledFirstName|l].\n\n«CASTIDADE! Castidade e fidelidade à memória do cônjuge com quem [ROOT.Char.GetFaith.HighGodName] nos uniu! Esta é a lei que [ROOT.Char.GetFaith.HighGodNameAlternate] deu à humanidade! Como eu poderia aprovar tal abominação aos olhos de [ROOT.Char.GetFaith.HighGodNamePossessive]?!»."
 ep3_emperor_yearly.2040.a: "Então outra pessoa irá."
 ep3_emperor_yearly.2040.b: "Uma doação generosa poderia ajudar?"
 ep3_emperor_yearly.2040.c: "Tenho certeza de que é um mal-entendido."
 ep3_emperor_yearly.2040.c.success: "[patriarch.Custom('ES_AlAla')|U] [patriarch.GetTitledFirstNameNoTooltip|l] fica impressionado com seu conhecimento da lei religiosa"
 ep3_emperor_yearly.2040.c.success.tt: "[patriarch.Custom('ES_ElLa')|U] [patriarch.GetTitledFirstNameNoTooltip|l] abençoou seu casamento"
 ep3_emperor_yearly.2040.c.failure: "[patriarch.Custom('ES_ElLa')|U] [patriarch.GetTitledFirstNameNoTooltip|l] não está convencid[patriarch.Custom('ES_OA')]"
 ep3_emperor_yearly.2040.c.failure.tt: "[patriarch.Custom('ES_ElLa')|U] [patriarch.GetTitledFirstNameNoTooltip|l] não abençoou seu casamento"
 #A <Komnenos> on the Throne
 ep3_emperor_yearly.2050.t: "[ROOT.Char.GetHouse.GetBaseNameNoTooltip] Toma o Trono"
 ep3_emperor_yearly.2050.t2: "Um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetHouse.GetBaseNameNoTooltip] de volta ao trono"
 ep3_emperor_yearly.2050.desc: "Este dia será lembrado como um grande dia para a casa [ROOT.Char.GetHouse.GetBaseName]. Desde a época [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip|l] [last_emperor.GetFirstName] não havia havido um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetHouse.GetBaseNameNoTooltip] no trono de [title.GetName]!"
 ep3_emperor_yearly.2050.desc_first: "Hoje marca um marco histórico para a Casa [ROOT.Char.GetHouse.GetBaseName]. Nunca antes um membro orgulhoso de nossa família se sentou no trono de [title.GetName]! Nunca isso aconteceu — e raramente sonhamos com isso — antes de #EMP eu#!."
 ep3_emperor_yearly.2050.desc_diplo: "\n\nRenomado[last_emperor.Custom('ES_OA')] amplamente como diplomata[last_emperor.Custom('ES_OA')],"
 ep3_emperor_yearly.2050.desc_martial: "\n\nRespeitado[last_emperor.Custom('ES_OA')] como um[last_emperor.Custom('ES_XA')] general sagaz,"
 ep3_emperor_yearly.2050.desc_stewardship: "\n\nReconhecid[last_emperor.Custom('ES_OA')] universalmente como um[last_emperor.Custom('ES_XA')] administrador[last_emperor.Custom('ES_XA')] competente de suas terras,"
 ep3_emperor_yearly.2050.desc_intrigue: "\n\nTemido[last_emperor.Custom('ES_OA')] por sua astúcia e táticas desleais,"
 ep3_emperor_yearly.2050.desc_learning: "\n\nAmplamente admirad[last_emperor.Custom('ES_OA')] por seu conhecimento e sabedoria,"
 ep3_emperor_yearly.2050.desc_prowess: "\n\nLembrado[last_emperor.Custom('ES_OA')] principalmente por sua força sobre-humana e feitos no campo de batalha,"
 ep3_emperor_yearly.2050.desc_fallback: "\n\nEmbora não seja a marca mais impressionante,"
 ep3_emperor_yearly.2050.desc_first_accomplish: "\n\nMeus parentes me instam a estabelecer um legado para a posteridade. Em séculos, o mundo ainda reverenciará todos os nomes da Casa [ROOT.Char.GetHouse.GetBaseNameNoTooltip] e, acima de tudo, o [ROOT.Char.Custom('ES_DelDela')] grande [ROOT.Char.GetTitledFirstNameNoTooltipRegnal|l], que os levou à glória!"
 ep3_emperor_yearly.2050.desc_body: "[last_emperor.GetFirstNameNoTooltip] deixou uma marca na história. Agora, dou meus primeiros passos para deixar a minha!"
 ep3_emperor_yearly.2050.a: "Avante, para a glória eterna!"
 #The Queen of Cities
 ep3_emperor_yearly.2060.t: "A Rainha das Cidades"
 ep3_emperor_yearly.2060.desc: "Eis que vem [2060_councillor.Custom2('MyCharacterIntroduction', ROOT.Char)] com uma expressão esperançosa no rosto.\n\n\"Meu [ROOT.Char.GetTitleAsNameNoTooltip|l], como certamente já deveis saber, o aniversário da fundação da nossa gloriosa Rainha das Cidades, [queen_city.GetNameNoTier], cai em 11 de maio, muito antes do que se poderia imaginar! O povo tem falado e reclamado, pois faz anos que nenhuma celebração é realizada.\"\n\n\"Deveríamos organizar festividades dignas da grande cidade de Constantino?\"."
 ep3_emperor_yearly.2060.desc_century: "E eis que surge [2060_councillor.Custom2('MyCharacterIntroduction', ROOT.Char)] caminhando com entusiasmo.\n\n«Meu [ROOT.Char.GetTitleAsNameNoTooltip|l], como certamente já sabeis, o próximo aniversário da fundação da nossa gloriosa Rainha das Cidades, [queen_city.GetNameNoTier], marcará #EMP un centenario#! desde o distante ano de 324, quando Constantino, o Grande, a escolheu como sua Nova Roma».\n\n«É a ocasião perfeita para uma grande celebração sem igual! O povo vos amará e a história lembrará a vossa contribuição»."
 ep3_emperor_yearly.2060.a: "Somente as maiores celebrações serão suficientes!"
 ep3_emperor_yearly.2060.b: "Então, uma grande celebração está em ordem!"
 ep3_emperor_yearly.2060.c: "Qualquer celebração terá que esperar."
 constantinople_birthday_flag_desc: "Celebração do Aniversário da Fundação de Constantinopla"
 constantinople_birthday_flag_tt: "Organizar uma Atividade [GetActivityType('activity_chariot_race').GetName|l] nos próximos 5 anos é 50% mais barato"
 #Exotic Gifts
 ep3_emperor_yearly.2070.t: "Presentes Exóticos"
 ep3_emperor_yearly.2070.desc: "A pessoa diante de mim parece ter vindo de muito longe, a julgar pela roupa exótica e pela natureza dos presentes que traz: ouro, marfim, sal…\n\nQuando o último dos presentes entra pela porta, todos os meus pensamentos racionais param. #EMP En el nombre de [ROOT.Char.GetFaith.HealthGodName], ¿qué animal es ese?#! Só consigo descrevê-lo como um #EMP caballo#! gigante malhado com um pescoço compridíssimo…\n\n«Grande [ROOT.Char.GetTitleAsNameNoTooltip|l], trago presentes das terras de [ambassador_liege.GetPrimaryTitle.GetBaseNameNoTier], incluindo este majestoso animal que nós chamamos de #EMP jirafa#!. Por favor, aceite o humilde tributo do meu [ambassador_liege.GetLadyLord|l].»"
 ep3_emperor_yearly.2070.a: "Todos os presentes são bem-vindos."
 ep3_emperor_yearly.2070.b: "Por que #EMP você#! não fica em vez disso?"
 ep3_emperor_yearly.2070.b.tt: "[ambassador.GetFirstNameNoTooltip|U] é [Select_CString( ambassador.IsFemale, 'uma diplomata', 'um diplomata' )] excelente que me serviria bem!"
 ep3_emperor_yearly.2070.b.success: "[ambassador.GetFirstNameNoTooltip|U] fica impressionado com seu reino e aceita sua oferta para ficar"
 ep3_emperor_yearly.2070.b.success.tt: "[ambassador.GetFirstNameNoTooltip|U] recrutado[ambassador.Custom('ES_OA')]"
 ep3_emperor_yearly.2070.b.failure: "[ambassador.GetFirstNameNoTooltip|U] precisa de algum #EMP convencimento do tipo dourado#! para ficar"
 ep3_emperor_yearly.2070.b.failure.tt: "$ep3_emperor_yearly.2070.b.success.tt$"
 ep3_emperor_yearly.2070.c: "Certo, legal... Dispensa-se."
 ep3_emperor_yearly.2070.c.tt: "Jogue os presentes sobre a pilha com todos os outros e mande as bestas para a cozinha, ou algo assim."
 #A School for the People
 ep3_emperor_yearly.2080.t: "Uma Escola para o Povo"
 ep3_emperor_yearly.2080.desc: "[school_proposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] fala, ponderando cuidadosamente cada palavra:\n\n\"O povo de [school_county.GetNameNoTier] notou os investimentos feitos em seu recente programa de construção. Embora todos estejam obviamente orgulhosos do crescimento de nossa amada cidade, algumas melhorias devem tocar mais perto do coração do seu povo.\""
 ep3_emperor_yearly.2080.desc_byz: "\n\nRecomendaria que você construísse uma escola financiada pelo império com alguns [Glossary( 'grammatikoi', 'GRAMMATIKOS_GLOSS' )] altamente respeitados; quanto mais plebeus puderem buscar uma boa educação, mais se juntarão às fileiras da administração imperial — uma bênção para nós e uma melhoria nas condições sociais para eles!"
 ep3_emperor_yearly.2080.desc_gen: "\n\nPor exemplo, financiar uma escola onde pessoas de todas as origens sociais possam estudar para entrar na administração imperial!"
 ep3_emperor_yearly.2080.a: "Uma burocracia bem afinada sempre precisa de novos funcionários."
 ep3_emperor_yearly.2080.a.tt: "Você colherá os benefícios quando a construção da escola estiver concluída, em 5 anos."
 ep3_emperor_yearly.2080.b: "Temos outras prioridades agora."
 GRAMMATIKOS_GLOSS: "O sistema educacional bizantino foi em grande parte herdado da Roma clássica e era dividido em 3 níveis: os #EMP grammatistes#! ensinavam as crianças pequenas o básico da leitura, escrita e contagem; os #EMP grammatikos#! ensinavam crianças mais velhas a literatura e a língua grega clássica; finalmente, os #EMP rhetor#! ensinavam adolescentes retórica — a arte de falar claramente e com persuasão."
 #A Popular Mime
 ep3_emperor_yearly.2090.t: "Um Mímico Popular"
 ep3_emperor_yearly.2090.desc: "Diante de mim está um rosto de certa forma familiar; é [mime.GetFirstName], o [Glossary( 'mimos', 'MIMOS_GLOSS' )] mais popular entre o povo.\n\nGrande [ROOT.Char.GetTitleAsNameNoTooltip|l], não preciso de apresentações — meu nome é conhecido e amado por todos. O Hipódromo silencia quando me apresento e vibra quando eu mando. Você conhece meu domínio sobre as multidões; ambos temos muito a ganhar com uma colaboração mais próxima."
 ep3_emperor_yearly.2090.a: "Você pode ajudar a conquistar [control_target.GetNameNoTooltip]."
 ep3_emperor_yearly.2090.b: "Somente minha corte é digna desse nível de entretenimento."
 ep3_emperor_yearly.2090.c: "Não tenho tempo para #EMP mímicos#!."
 ep3_emperor_yearly.2090.a.tt: "A ajuda de [mime.GetFirstNameNoTooltip] aumenta a eficácia da tarefa de conselho $councillor_marshal$ de $task_increase_control$."
 ep3_emperor_yearly.2090.b.tt: "O talento e a reputação de [mime.GetFirstNameNoTooltip] aumentam sua aptidão como $court_jester_court_position$."
 court_position_famous_mime: "Mímico Popular"
 MARSHAL_INCREASE_CONTROL_MIME_MODIFIER: "Apoiado por um Mímico Popular"
 MIMOS_GLOSS: "A exata natureza de um mimos bizantino, geralmente traduzida como #EMP mímico#! por simplicidade, é difícil de definir. O nome abrange uma ampla gama de entretenedores cômicos: atores de pantomimas mitológicas, malabaristas, acrobatas, dançarinos, bufões e até mesmo praticantes de uma forma primitiva de burlesco."
 #A Border Treaty
 ep3_emperor_yearly.2100.t: "Um Tratado de Fronteira"
 ep3_emperor_yearly.2100.desc: "[chancellor.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima ao trono com uma pilha de documentos nos braços.\n\n"Meu [ROOT.Char.Custom('FormOfAddressForLiege')], estive analisando alguns tratados com nosso vizinh[neighbor.Custom('ES_OA')], [neighbor.Custom('ES_ElLa')] [neighbor.GetTitledFirstName|l]. Ao que parece, existem várias cópias não coincidentes do tratado de fronteira referente a [contested_county.GetName], algumas das quais nos são muito mais favoráveis do que a que estamos seguindo no momento!".\n\n"Com sua permissão, gostaria de fazer valer a versão mais favorável como o tratado oficial adotado por todas as partes envolvidas!"."
 ep3_emperor_yearly.2100.a: "Faça isso."
 ep3_emperor_yearly.2100.a.success: "Nossa versão do tratado é aceita"
 ep3_emperor_yearly.2100.a.success.tt: "Versão Aceita"
 ep3_emperor_yearly.2100.a.failure: "Nossa versão do tratado é rejeitada"
 ep3_emperor_yearly.2100.a.failure.tt: "Versão Rejeitada"
 ep3_emperor_yearly.2100.a.crit_fail: "Eles usam uma versão ainda mais antiga contra nós"
 ep3_emperor_yearly.2100.a.crit_fail.tt: "Versão Hostil Encontrada"
 ep3_emperor_yearly.2100.b: "Informe [neighbor.GetFirstNameNoTooltip]: vamos encontrar um acordo."
 ep3_emperor_yearly.2100.c: "Enterre todas as evidências."
 TRUCE_COLLABORATION: "Acordos de Paz"
 ep3_emperor_yearly.2100.angry_error_log: ""
 #Mediators of X
 ep3_emperor_yearly.2110.t: "Mediadores de [provincial_county.GetNameNoTierNoTooltip]"
 ep3_emperor_yearly.2110.desc_same: "Reconheço imediatamente a procedência [Select_CString( merchant.IsFemale, 'da peticionária', 'do peticionário' )] que tenho diante de mim: é outr[merchant.Custom('ES_OA')] membro da nação [merchant.GetCulture.GetNameNoTooltip], como eu. No instante em que começa a falar, sou atingido por um sotaque familiar."
 ep3_emperor_yearly.2110.desc_other: "Não me parece que [Select_CString( merchant.IsFemale, 'la peticionaria', 'el peticionario' )] que está diante de mim seja da cultura [ROOT.Char.GetCulture.GetNameNoTooltip]. Algum [merchant.Custom('ES_OA')] #EMP provincian[merchant.Custom('ES_OA')]#!, suponho. No momento em que começa a falar, sou atingido por um sotaque bárbaro, mas vagamente familiar."
 ep3_emperor_yearly.2110.desc: "\n\n"[ROOT.Char.GetTitleAsNameNoTooltip|U], represento um grupo de comerciantes de [provincial_county.GetNameNoTier]. Por termos vivido durante muito tempo nesta terra, comerciado com os moradores locais e com funcionários da Capital, conhecemos bem as dificuldades de lidar com populações não integradas e estamos excepcionalmente preparados para ajudar.\n\nPortanto, gostaríamos de oferecer nossos serviços como tradutores e intérpretes oficiais"."
 ep3_emperor_yearly.2110.a: "Seus serviços são muito necessários na administração local."
 ep3_emperor_yearly.2110.b: "Precisamos de você aqui na capital."
 ep3_emperor_yearly.2110.c: "São os [merchant.GetCulture.GetCollectiveNounNoTooltip] que deveriam aprender os costumes da Capital."
 #Foreign Pretentiousness
 ep3_emperor_yearly.2120.t: "Pretensão Estrangeira"
 ep3_emperor_yearly.2120.desc: "[complainer.Custom('ES_ElLa')|U] [complainer.GetTitledFirstName|l] parece bastante irritad[complainer.Custom('ES_OA')] com alguma coisa.\n\n"Meu [ROOT.Char.GetTitleAsNameNoTooltip|l], a corte está agitada com [the_byz.Custom2('YourCharacterIntroduction', ROOT.Char)]! Seu comportamento arrogante e pretensioso é evidente e, desde sua chegada, vem introduzindo costumes #EMP extravagantes#! na corte: janta com garfos de ouro, recusa-se a se lavar em comum como nós, perfuma seu aposento com ervas suspeitas e usa roupas de seda macia e pecaminosa!".\n\n"Deveis pôr fim a esta loucura, antes que sua corrupção moral se espalhe!"."
 ep3_emperor_yearly.2120.a: "Todos devemos aprender com [the_byz.GetFirstNameNoTooltip]!"
 ep3_emperor_yearly.2120.b: "Não toleraremos essa bobagem estrangeira."
 ep3_emperor_yearly.2120.c: "Honestamente? Ninguém se importa."
 #A Plea for Freedom
 ep3_emperor_yearly.2130.t: "Um Apelo pela Liberdade"
 ep3_emperor_yearly.2130.desc: ""Generos[ROOT.Char.Custom('ES_OA')] e nobre [ROOT.Char.GetTitleAsNameNoTooltip|l], ouvi minha súplica". Est[prisoner.Custom('ES_EA')] peticionário está ladead[prisoner.Custom('ES_OA')] por dois guardas e tem as mãos bem amarradas. Reconheço meu prisioneir[prisoner.Custom('ES_OA')], [prisoner.Custom('ES_ElLa')] [prisoner.GetTitledFirstName|l].\n\n"Tempo demais tenho languidecido em cativeiro. Por favor, tende piedade de mim e libertai-me! Nada é mais precioso para meu coração do que a liberdade, então nenhum preço será alto demais por ela. Exigi o que quiserdes de mim, e obedecerei!"."
 ep3_emperor_yearly.2130.a: "Por meio desta, vós estais totalmente perdoad[prisoner.Custom('ES_OA')]."
 ep3_emperor_yearly.2130.b: "Você me apoiará."
 ep3_emperor_yearly.2130.c: "Sua vida pertence a mim agora."
 ep3_emperor_yearly.2130.c.tt: "[prisoner.GetFirstNameNoTooltip] será obrigado[prisoner.Custom('ES_OA')] a ser um agente em todas as suas conspirações."
 ep3_emperor_yearly.2130.d: "Você me enviará tropas."
 ep3_emperor_yearly.2130.e: "Negado. Fora da minha vista agora."
 SCHEME_OWE_FREEDOM: "Devo a você minha liberdade: $VALUE|+0=$"
 #Empty Coffers, Empty Mausoleums
 ep3_emperor_yearly.2140.t: "Cofres Vazios, Mausoléus Vazios"
 ep3_emperor_yearly.2140.desc: "Administrar [ROOT.Char.GetPrimaryTitle.GetDefinitiveName|l] é um negócio caro e talvez eu não tenha tido cuidado o bastante com nossas finanças. As dívidas foram se acumulando e os cofres estão vazios.\n\nOnde posso encontrar ouro #EMP ahora mismo#!?\n\nUma ideia vergonhosa, blasfema e #EMP brillante#! me ocorre de repente: os grandes imperadores de antigamente sempre eram enterrados com ricos e luxuosos bens funerários! Eu só precisaria me apropriar de alguns desses bens para pagar as dívidas. No fim das contas, essas riquezas pertencem ao Império, não pertencem?"
 ep3_emperor_yearly.2140.a: "Tenho certeza de que os mortos não se importarão."
 ep3_emperor_yearly.2140.b: "Não me rebaixarei tanto!"
 #The Saint of X
 ep3_emperor_yearly.2150.t: "O Santo de [capital.GetNameNoTooltip]"
 ep3_emperor_yearly.2150.desc: "As pessoas de [capital.GetName] estão agitadas falando sobre [Select_CString( saint.IsFemale, 'uma santa mulher', 'um santo homem' )], cert[saint.Custom('ES_OA')] [saint.GetFirstName], que tem vivido a vida dos antigos santos."
 ep3_emperor_yearly.2150.desc.stylite: "\n\nAssim como aqueles a quem costumamos chamar de "estilitas", [saint.GetSheHe] escolheu uma coluna velha da cidade como lar; passa a vida no alto dela, atad[saint.Custom('ES_OA')] firmemente para não cair, está coberto de trapos e só come os alimentos que discípulos bem-intencionados lhe erguem com uma corda e uma roldana."
 ep3_emperor_yearly.2150.desc.grazer: "\n\nAssim como aqueles a quem costumamos chamar de "pastores", [saint.GetSheHe] vive na natureza, uma besta entre bestas: nu[saint.Custom('ES_OA')] e em solidão, sobrevive com o que a terra lhe oferece gratuitamente e com as doações do viajante ocasional."
 ep3_emperor_yearly.2150.desc.iron: "\n\nAssim como aqueles que costumamos chamar de "portadores de ferro", [saint.GetSheHe] passa os dias imóvel, cobert[saint.Custom('ES_OA')] por pesadas correntes que mortificam sua carne; o ferro se enterra em seus pulsos gretados, mas nem um suspiro escapa de seus lábios. Só a misericórdia do passante alimenta e cobre seu corpo ensanguentado."
 ep3_emperor_yearly.2150.desc.end: "\n\nNão é incomum que alguns vigaristas lucrem com a caridade equivocada de nossos cidadãos, fingindo feridas e exibindo um ar de santidade bem ensaiado, mas e se [saint.GetFirstNameNoTooltip] for [Select_CString( saint.IsFemale, 'una santa', 'un santo' )] de verdade?"
 ep3_emperor_yearly.2150.a: "[Select_CString( saint.IsFemale, 'Esta santa mujer', 'Este santo hombre' )] foi abençoado por [ROOT.Char.GetFaith.HighGodName]!"
 ep3_emperor_yearly.2150.a.tt: "Eu apoiarei seu santo chamado!"
 ep3_emperor_yearly.2150.b: "Eu mesmo vou testar [saint.GetHerHim]!"
 ep3_emperor_yearly.2150.c: "Faz muito tempo que [Select_CString( saint.IsFemale, 'as santas', 'os santos' )] deixaram de caminhar entre nós."
 ep3_emperor_yearly.2150.c.tt: "Seu [governor_efficiency|lE] aumenta em #P 3%#!"
 ep3_emperor_yearly.2150.b.tt.success: "Você descobre a verdade"
 ep3_emperor_yearly.2150.b.tt.holy: "[saint.GetFirstNameNoTooltip] é verdadeiramente [Select_CString( saint.IsFemale, 'uma mulher santa', 'um homem santo' )]"
 ep3_emperor_yearly.2150.b.tt.crook: "[saint.GetFirstNameNoTooltip] é um[saint.Custom('ES_XA')] vigarista vulgar"
 ep3_emperor_yearly.2150.b.tt.failure: "Você não fica mais sábio"
 ep3_emperor_yearly.2150.b.tt.continue: "Você deve deixar [saint.GetFirstNameNoTooltip] continuar sua busca santa"
 ep3_emperor_yearly.2150.b.tt: "Seu [governor_efficiency|lE] aumenta em #P 10%#!"
 ep3_emperor_yearly.2151.desc: "Faz anos que não ouço falar de [saint.GetFirstNameNicknamed], [Select_CString( saint.IsFemale, 'la santa', 'el santo' )] do povo de [capital.GetName]. Por que me lembrei disso agora, justo agora?…\n\n«[chaplain.GetTitledFirstName], vocês se lembram de [Select_CString( saint.IsFemale, 'esa peculiar ermitaña', 'ese peculiar ermitaño' )], [saint.GetFirstNameNoTooltip]? O que aconteceu com [saint.GetSheHe]?»."
 ep3_emperor_yearly.2151.desc_saint: "\n\n«[Select_CString( saint.IsFemale, 'Una verdadera santa', 'Un verdadero santo' )], grande [ROOT.Char.GetTitleAsNameNoTooltip|l]! Os efeitos de seus atos piedosos ainda são sentidos por toda a terra!»."
 ep3_emperor_yearly.2151.desc_crook: "\n\n"Um[saint.Custom('ES_XA')] vulgar safado, meu [ROOT.Char.GetTitleAsNameNoTooltip|l]. Alguns meses depois de o assunto ter sido apresentado a vocês, descobriu-se que falsificava suas feridas com sangue de cordeiro e comia muito numa taverna próxima"."
 ep3_emperor_yearly.2151.a: "Quem poderia ter previsto isso!"
 #People of the Frontier
 ep3_emperor_yearly.2160.t: "Pessoas da Fronteira"
 ep3_emperor_yearly.2160.desc: "Nossos vizinhos, o povo [nomad_neighbor.GetCulture.GetNameNoTooltip], estão se tornando um incômodo cada vez maior. Seus modos nômades e #EMP desorganizados#! fazem das fronteiras um conceito muito relativo e permeável, de modo que cada vez mais deles têm começado a se deslocar de [nomad_county.GetNameNoTier] para [our_county.GetNameNoTier] de maneira cada vez mais frequente.\n\nNo começo, era aqui e ali um cavalo errante pastando em nossas terras; depois vieram rebanhos inteiros, e agora verdadeiras aldeias com famílias completas e todos os seus bens encontraram caminho até [our_county.GetNameNoTooltip].\n\nA pressão da população bárbara sobre as fronteiras do Império não é um problema novo, mas os tempos mudaram."
 ep3_emperor_yearly.2160.a: "Eles são bem-vindos para se estabelecer aqui."
 ep3_emperor_yearly.2160.a.tt: "O Império tem uma antiga tradição de aceitar e integrar todos os bárbaros que desejam se estabelecer em nossas terras."
 ep3_emperor_yearly.2160.b: "Isto é inaceitável!"
 ep3_emperor_yearly.2160.b.flavor: "Você apresenta essa questão ao líder deles, [nomad_neighbor.Custom('ES_ElLa')] [nomad_neighbor.GetTitledFirstNameNoTooltip|l]."
 ep3_emperor_yearly.2160.b.tt.success: "Você emerge vitorioso da escalada diplomática"
 ep3_emperor_yearly.2160.b.tt.failure: "As marés da diplomacia se voltam contra você"
 ep3_emperor_yearly.2160.b.success: "Intercâmbio diplomático positivo"
 ep3_emperor_yearly.2160.b.failure: "Intercâmbio diplomático negativo"
 ep3_emperor_yearly.2160.b.tt: "Seu [governor_efficiency|lE] aumenta em #P 5%#!"
 ep3_emperor_yearly.2160.b.tt2: "Seu [governor_efficiency|lE] diminui em #N 5%#!"
 #Secret Tunnels
 ep3_emperor_yearly.2170.t: "Túneis Secretos"
 ep3_emperor_yearly.2170.desc: "[our_county.GetNameNoTier] é uma região difícil, e nosso controle sobre ela costuma ser frágil no melhor dos casos. Seus habitantes são sobreviventes calejados, cujo conhecimento e domínio da disposição de sua terra dura e selvagem não têm rival.\n\nIsso é auxiliado pela própria criação deles: uma extensa rede de túneis, esconderijos e assentamentos subterrâneos nos quais podem desaparecer facilmente sempre que o clima se torna hostil, um inimigo ataca ou nossos cobradores de impostos se aproximam exigindo o que é [ROOT.Char.GetTopLiege.Custom('ES_DelDela')] [ROOT.Char.GetTopLiege.GetTitleAsNameNoTooltip|l]."
 ep3_emperor_yearly.2170.a: "Isso pode ser útil..."
 ep3_emperor_yearly.2170.b: "Essa prática ilegal deve chegar ao fim."
 #A Warm Meal?
 ep3_emperor_yearly.2180.t: "Uma Refeição Quente?"
 ep3_emperor_yearly.2180.desc: "A noite nos surpreende enquanto fazemos nosso caminho através dos [location.Custom('GetTerrainTypePlural')] ao redor de [location.GetName], ainda a uma boa distância do assentamento mais próximo.\n\nO único sinal de presença humana que vemos por milhas é a intimidante parede externa do que parece ser algum tipo de propriedade privada."
 ep3_emperor_yearly.2180.desc_capital: "A noite nos surpreende ainda a uma boa distância das seguras paredes de [location.GetName].\n\nOs anexos de uma luxuosa propriedade aparecem à vista. Que relaxante seria passar a noite aqui, longe da estrada empoeirada e antes de mergulharmos no alvoroço de uma grande capital!"
 ep3_emperor_yearly.2180.desc_fellow: "\n\nSe a memória não me falha, estas terras deveriam pertencer a [event_host.Custom('ES_AlAla')] [event_host.GetTitledFirstName|l]. Com certeza ele/ela nos mostrará alguma cortesia!"
 ep3_emperor_yearly.2180.desc_foreigner: "\n\nInfelizmente, não estou familiarizado com o senhor ou senhora desta terra. Espero que eles não neguem a alguns pobres peregrinos uma refeição quente e uma humilde cama!"
 ep3_emperor_yearly.2180.a: "Devemos pedir hospitalidade."
 ep3_emperor_yearly.2180.a.tt: "Veremos que tipo de reação receberemos."
 ep3_emperor_yearly.2180.b: "Sem tempo a perder aqui."
 ep3_emperor_yearly.2181.desc: "O sol acaba de se pôr sobre minhas possessões em [location.GetName], quando um grupo descuidado de viajantes aparece à minha porta."
 ep3_emperor_yearly.2181.desc_fellow: "\n\n"[ROOT.Char.GetFirstNameNoTooltip], [Select_CString( ROOT.Char.IsFemale, 'amiga mía', 'amigo mío' )], em nome de [Select_CString( ROOT.Char.GetLiege.IsFemale, 'nuestra amada', 'nuestro amado' )] [ROOT.Char.GetLiege.GetTitleAsNameNoTooltip|l], a quem todos servimos fielmente, abram vossos portões para alguns humildes peregrinos que atravessam vossas terras!"."
 ep3_emperor_yearly.2181.desc_foreigner: "\n\n"Senhor ou senhora desta magnífica morada, sou [pilgrim.Custom('ES_ElLa')] [pilgrim.GetTitledFirstNameNoTooltip|l], mas hoje não sou senão um[pilgrim.Custom('ES_XA')] humilde peregrino[pilgrim.Custom('ES_OA')] de passagem por suas terras! Tendes a bondade de nos oferecer uma refeição quente e um leito para a noite?"."
 ep3_emperor_yearly.2181.a: "Claro, [ROOT.Char.GetFaith.HighGodName] o abençoe!"
 ep3_emperor_yearly.2181.a_flavor: "Sente-se à minha mesa! E após o jantar, eu também lhe mostrarei um atalho, para que você possa contar a todos ao longo do caminho como sou gentil!"
 ep3_emperor_yearly.2181.b: "Você é bem-vindo em minha casa, e deixe-me ajudá-lo também."
 ep3_emperor_yearly.2181.b_flavor: "Meus servos o guiarão, e meus guardas o acompanharão a partir de amanhã."
 ep3_emperor_yearly.2181.c: "Hospitalidade não vem de graça."
 ep3_emperor_yearly.2181.a.tt: "Hospitalidade Amigável"
 ep3_emperor_yearly.2181.b.tt: "Hospitalidade Excelente"
 ep3_emperor_yearly.2181.c.tt: "Hospitalidade Negada"
 #The Granaries of the Powerful
 ep3_emperor_yearly.2190.t: "Os Armazéns dos Poderosos"
 ep3_emperor_yearly.2190.desc: "Os celeiros dos [Glossary( 'dynatoi', 'DYNATOI_GLOSS')] estão sempre cheios, diz o camponês saudoso.\n\nEm alguns casos, isso é mais verdadeiro do que nunca; neste dia, convoquei oficialmente [landowner.Custom('ES_AlAla')] [landowner.GetTitledFirstName|l], proprietário de [capital.GetName], a respeito da administração de suas propriedades. Segundo minhas fontes, [landowner.GetFirstNameNoTooltip] tem comprado quantidades enormes de grãos baratos e os estocado em seus celeiros para revendê-los por um preço mais alto em tempos de escassez.\n\nEssa prática é proibida pelo Império, pois reduz os rendimentos dos pequenos proprietários."
 ep3_emperor_yearly.2190.a: "Você receberá uma punição exemplar!"
 ep3_emperor_yearly.2190.b: "Eu #EMP poderia#! ignorar isso..."
 ep3_emperor_yearly.2190.c: "Você realmente não deveria fazer isso."
 DYNATOI_GLOSS: "Os Poderosos, em particular a nobreza provincial que monopoliza a terra e os cargos públicos."
 #The Emperor's Gold
 ep3_emperor_yearly.2200.t: "O Ouro do Imperador"
 ep3_emperor_yearly.2200.desc: "Se existe alguém totalmente indigno de se sentar no trono imperial, esse alguém é [liege.GetFirstName].\n\n[governorship.GetName] sofre e padece, e todos os nossos impostos vão [Select_CString( liege.IsFemale, 'a la haragana', 'al haragán' )] de [capital.GetNameNoTier]. A menos que…\n\nNossos impostos não #EMP tengan#! por que ir para lá; eu poderia fazer muito melhor uso deles…"
 ep3_emperor_yearly.2200.desc.c_monarch: "[liege.Custom('ES_ElLa')|U] [liege.GetTitledFirstName|l] é totalmente e absolutamente indign[liege.Custom('ES_OA')|l]o de guiar [ceremonial_monarch.Custom('ES_AlAla')] [ceremonial_monarch.GetTitleAsName|l].\n\n[governorship.GetName] sofre e padece, e todos os nossos impostos vão [Select_CString( liege.IsFemale, 'à preguiçosa', 'ao preguiçoso' )] de [capital.GetNameNoTier]. A não ser que...\n\nNossos impostos não #EMP têm#! que ir para lá; eu poderia usá-los muito melhor..."
 ep3_emperor_yearly.2200.a: "[liege.GetFirstNameNoTooltip] não merece nosso ouro."
 ep3_emperor_yearly.2200.b: "Minha lealdade é para com [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip], não com [ROOT.Char.GetTopLiege.Custom('ES_ElLa')] [ROOT.Char.GetTopLiege.GetTitleAsNameNoTooltip|l]."
 ep3_emperor_yearly.2200.a.tt: "Lealdade Indigna"
 ep3_emperor_yearly.2200.b.tt: "Leal ao Império"
 #A Prophecy of Power
 ep3_emperor_yearly.2210.t: "Uma Profecia de Poder"
 ep3_emperor_yearly.2210.desc: "Na noite passada, tive um sonho: uma mão etérea desceu do céu e colocou uma coroa sobre minha cabeça, enquanto uma voz imperiosa me dizia "Vá! Eu lhe concedo [potential_title.GetName]!".\n\nÉ provável que seja apenas um produto das minhas ambições… E, ainda assim, e se eu conseguisse convencer [liege.Custom('ES_AlAla')] [liege.GetTitledFirstName|l] de que se trata de um verdadeiro sinal do Alto, uma espécie de profecia?"
 ep3_emperor_yearly.2210.desc_believe: "Ess[liege.Custom('ES_EA')] imbecil acreditaria #EMP em qualquer coisa#!, não é?"
 ep3_emperor_yearly.2210.desc_jacob: "\n\nAfinal, Deus não apareceu a Jacó em um sonho para conceder-lhe a Terra Prometida?"
 ep3_emperor_yearly.2210.a: "Vale a pena tentar!"
 ep3_emperor_yearly.2210.a.tt: "Cabe ao seu Suserano decidir[liege.Custom('ES_XA')]."
 ep3_emperor_yearly.2210.a.success: "Você convence seu Suserano[liege.Custom('ES_XA')]"
 ep3_emperor_yearly.2210.a.success.tt: "Profecia Acreditada"
 ep3_emperor_yearly.2210.a.failure: "Sua 'profecia' não é acreditada"
 ep3_emperor_yearly.2210.a.failure.tt: "Profecia Não Acreditada"
 ep3_emperor_yearly.2210.b: "Eu não preciso dessa tolice."
 ep3_emperor_yearly.2211.desc: "Fico bastante surpreso quando [vassal.Custom('ES_ElLa')] [vassal.GetTitledFirstName|l] aparece diante de mim, forçando-me a conceder-lhe uma audiência privada.\n\n\"Grande [ROOT.Char.GetTitleAsNameNoTooltip|l], tive um sonho de [vassal.GetFaith.HighGodName], —mas não #EMP solo#! um sonho —, e sim uma verdadeira #EMP profecía#!!!\".\n\n\"Fui escolhido para ser [Select_CString( vassal.IsFemale, 'la próxima', 'el próximo' )] [potential_title.GetHolder.GetTitleAsNameNoTooltip|l] de [potential_title.GetName]! Os mais sábios entre os [vassal.GetFaith.PriestNeuterPlural] o confirmaram\"."
 ep3_emperor_yearly.2211.a: "#EMP Um verdadeiro sinal de cima!#!"
 ep3_emperor_yearly.2211.b: "Acho que não posso desconsiderar esse sinal."
 ep3_emperor_yearly.2211.c: "Seu valor deve ser provado com atos, não com sonhos!"
 ep3_emperor_yearly.2211.d: "[vassal.GetFirstNameNoTooltip] quer nos entreter com alguma bobagem!"
 #Crowded Lands
 ep3_emperor_yearly.2220.t: "Terras Atingidas"
 ep3_emperor_yearly.2220.desc: "«Meu [ROOT.Char.GetTitleAsNameNoTooltip|l], acaba de chegar uma carta de reclamação da comunidade monástica de [monastery.GetName]», diz [chaplain.Custom2('MyCharacterIntroduction', ROOT.Char)|U] ao se aproximar de mim.\n\n«Ao que parece, alguns pastores do território vizinho de [shepherd_province.GetName] têm invadido as terras do mosteiro, trazendo não só seus rebanhos, mas também suas famílias!».\n\n«Os monges estão escandalizados com a sujeira, o barulho e a #EMP lascivia#! de seus novos vizinhos, e solicitam sua intervenção»."
 ep3_emperor_yearly.2220.a: "Os pastores têm o direito de vagar."
 ep3_emperor_yearly.2220.b: "Os monges precisam de seu isolamento!"
 ep3_emperor_yearly.2220.c: "É problema deles."
 #The Value of Coin
 ep3_emperor_yearly.2230.t: "O Valor da Moeda"
 ep3_emperor_yearly.2230.desc: "Como toda cidade de certa relevância, [city.GetNameNoTier] atraiu uma variada multidão de mercadores de todos os cantos de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip] e além de suas fronteiras.\n\nOnde quer que haja oportunidade de lucro, os mercadores vêm, trazendo seus produtos e moedas estrangeiras, mas também seus estranhos costumes, crenças e línguas. Por outro lado, a população local é volúvel; adora quem lhes traz os exóticos [ROOT.Char.Custom('GetExpensiveDessert')] mas, no fundo, os despreza.\n\nNão está claro qual foi o evento que desencadeou os acontecimentos de hoje — provavelmente um pequeno mal-entendido —, mas os cidadãos pegaram armas improvisadas e estão saqueando os bairros dos mercadores."
 ep3_emperor_yearly.2230.a: "Vou enviar as tropas."
 ep3_emperor_yearly.2230.b: "O caos só gera oportunidades!"
 ep3_emperor_yearly.2230.c: "Os cidadãos vão me ouvir."
 ep3_emperor_yearly.2230.c_success: "Você acalma a multidão"
 ep3_emperor_yearly.2230.c_success.tt: "Cidade Pacificada"
 ep3_emperor_yearly.2230.c_failure: "As pessoas não o ouvem"
 ep3_emperor_yearly.2230.c_failure.tt: "Distúrbios Contínuos"
 #As The Philosopher Said...
 ep3_emperor_yearly.2240.t: "Como Disse o Filósofo..."
 ep3_emperor_yearly.2240.desc_quote_a: ""[Glossary( 'Panta rhei', 'PANTA_RHEI_GLOSS')]", exclama [the_scholar.Custom2('MyCharacterIntroduction', ROOT.Char )] com tristeza quando um servo tropeça e o conteúdo da jarra de água que levava nas mãos acaba no chão. Isso #EMP não#! é o que a frase quer dizer!"
 ep3_emperor_yearly.2240.desc_quote_b: ""[Glossary( 'Ho bíos brakhús, he dè tékhne makré', 'ARS_LONGA_GLOSS')]", suspira [the_scholar.Custom2('MyCharacterIntroduction', ROOT.Char )] quando [the_scholar.GetSheHe] risca uma linha de uns apontamentos bagunçados. Quando foi que se juntou a mim?!"
 ep3_emperor_yearly.2240.desc_quote_c: ""[Glossary( 'Sophòn to saphés', 'SOPHON_GLOSS')]", resmunga [the_scholar.Custom2('MyCharacterIntroduction', ROOT.Char )] enquanto demonstra sua incapacidade —mais uma vez— de seguir as instruções mais básicas."
 ep3_emperor_yearly.2240.desc_quote_latin: ""[Glossary( 'Omnia vincit amor', 'AMOR_GLOSS')]", pontifica [the_scholar.Custom2('MyCharacterIntroduction', ROOT.Char )] com expressão solene. O que isso tem a ver com o que estávamos falando?!"
 ep3_emperor_yearly.2240.desc_quote_confucius: "«[Glossary( 'El hombre superior es modesto en sus palabras, pero soberbio en sus acciones', 'CONFUCIUS_GLOSS')]», pontifica [the_scholar.Custom2('MyCharacterIntroduction', ROOT.Char )] com expressão solene. O que isso tem a ver com o que estávamos falando?!"
 ep3_emperor_yearly.2240.desc_outro: "\n\n[the_scholar.GetFirstNameNoTooltip] #EMP siempre#! recorre a cita dos antigos e as joga na cara dos outros sem serem solicitadas; e muitas vezes no contexto errado ou com as palavras erradas também…\n\nMuitos à nossa volta gemem e reviram os olhos. Uma educação clássica sólida é indispensável para uma figura pública, mas, sem a sabedoria para usá-la corretamente, ela é desperdiçada."
 ep3_emperor_yearly.2240.a: "#EMP Na verdade#!, a citação vai..."
 ep3_emperor_yearly.2240.a.flavor: "Você tenta colocar [the_scholar.GetFirstNameNoTooltip] em seu lugar mostrando o quanto está errado."
 ep3_emperor_yearly.2240.a_success: "Seu conhecimento ofusca o dele"
 ep3_emperor_yearly.2240.a_success.tt: "[the_scholar.GetFirstNameNoTooltip] humilhado[the_scholar.Custom('ES_OA')]!"
 ep3_emperor_yearly.2240.a_failure: "Você parece mais tolo do que [the_scholar.GetSheHe]"
 ep3_emperor_yearly.2240.a_failure.tt: "Humilhação Pública"
 ep3_emperor_yearly.2240.b: "#EMP CALA A BOCA!#!"
 ep3_emperor_yearly.2240.c: "Eu não tenho tempo para isso."
 PANTA_RHEI_GLOSS: "\"Tudo flui\" é uma famosa síntese da filosofia de Heráclito sobre o universo."
 ARS_LONGA_GLOSS: "\"A vida é curta, a arte é longa para se aprender\" é um aforismo atribuído a Hipócrates."
 SOPHON_GLOSS: "\"A sabedoria reside na clareza,\" de Eurípides."
 AMOR_GLOSS: "\"O amor conquista tudo\" é uma famosa e frequentemente mal citada linha de Virgílio."
 #The Times Are Changing
 ep3_emperor_yearly.2300.t: "Os Tempos Estão Mudando"
 ep3_emperor_yearly.2300.desc: "Com uma cerimônia solene em [capital.GetBaronyNameExplicitly], [liege_loc.Custom('ES_ElLa')] [liege_loc.GetTitledFirstName|l] proclamou oficialmente o [liege_loc.GetFaith.GetName|l] como a fé oficial de [liege_loc.GetPrimaryTitle.GetName].\n\nImediatamente, os mensageiros mais velozes viajaram a todos os cantos do império para espalhar a notícia e exigir a conversão de todos os súditos."
 ep3_emperor_yearly.2300.a: "Ultrajante! Blasfêmia!"
 ep3_emperor_yearly.2300.b: "[liege_loc.Custom('ES_ElLa')|U] [liege_loc.GetTitleAsNameNoTooltip|l] estará certo."
 ep3_emperor_yearly.2300.c: "Finalmente!"
 #Unfaithful People
 ep3_emperor_yearly.2310.t: "[liege_loc.Custom2('AppropriateGreeting', ROOT.Char)]"
 ep3_emperor_yearly.2310.desc: "Chegou ao meu conhecimento que cidadãos demais na governadoria que vos foi atribuída ainda não professam o [liege_loc.GetFaith.GetName|l], a verdadeira fé. Vosso dever é corrigir tal situação."
 ep3_emperor_yearly.2310.desc_you_too: "E corrigir suas próprias crenças também!"
 ep3_emperor_yearly.2310.a: "Eles abraçarão a fé certa em breve."
 ep3_emperor_yearly.2310.b: "Não, obrigado."
 ep3_emperor_yearly.2310.c: "Começarei comigo mesmo."
 ep3_emperor_yearly.2310.d: "Vou pensar sobre isso."
 #A Matter of Faith
 ep3_emperor_yearly.2320.t: "Uma Questão de Fé"
 ep3_emperor_yearly.2320.desc: ""É uma honra receber sua visita", começo com rigidez ao receber [hof.Custom('ES_AlAla')] [hof.GetTitledFirstName|l]. "Mas a que devo essa honra?".\n\n"Chegou ao meu conhecimento que, apesar da sua liderança, [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip] continua tateando no escuro, seguindo a fé oficial errada", [hof.Custom('ES_ElLa')] [hof.GetTitleAsNameNoTooltip|l] faz uma pausa significativa.\n\n"Portanto, decidi unir-me a você neste empreendimento e oferecer toda a minha ajuda para conduzir o navio do Estado na direção certa"."
 ep3_emperor_yearly.2320.a: "Obrigado, Sua Santidade."
 ep3_emperor_yearly.2320.b: "Mas e se a fé oficial estiver certa?"
 hof_state_faith_discount: "Apoio do Chefe da Fé"
 ep3_emperor_yearly.2320.a.tt: "Obtenha um desconto de #P 30%#! na decisão de mudar a fé do estado por 10 anos"
 every_vassal_state_faith: "Todo vassalo que segue a fé do estado"
 #Heresy Brewing
 ep3_emperor_yearly.2330.t: "Heresia à Vista"
 ep3_emperor_yearly.2330.desc: "É inegável. A fé oficial de [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip] está enfrentando uma crise.\n\n"
 ep3_emperor_yearly.2330.desc_hof: "[hof.GetTitledFirstName|U] se juntou a mim hoje para discutir uma questão muito séria: a crise da fé oficial do [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip].\n\n\"Você não pode negar, [ROOT.Char.GetFirstNameNoTooltip]! Você deve ver isso também!\""
 ep3_emperor_yearly.2330.desc_end: "Os sinais estão por toda parte: pessoas vivendo em pecado, o [ROOT.Char.GetFaith.ReligiousText] esquecido e desconsiderado, e heresias brotando em cada canto escuro!"
 ep3_emperor_yearly.2330.desc_end_hof: "Os poderes leigos e religiosos devem se unir para salvar o bom povo de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]."
 ep3_emperor_yearly.2330.a: "Precisamos fazer algo!"
 ep3_emperor_yearly.2330.a.tt: "Vou investir em promover a verdadeira fé entre o povo!"
 ep3_emperor_yearly.2330.b: "Provavelmente está tudo bem..."
 state_faith_fervor_campaign: "Apoio à Fé do Estado"
 #Heresy Among Us?
 ep3_emperor_yearly.2340.t: "Heresia Entre Nós?"
 ep3_emperor_yearly.2340.desc: ""É fato bem conhecido que vós não seguis a fé que nos foi prescrita pelo Império e pelos Antepassados que o engrandeceram", [complainer.Custom('ES_ElLa')] [complainer.GetTitledFirstName|l] me repreende com desdém.\n\n"Muitos se perguntam se vós sois sequer dign[CHARACTER.Custom('ES_OA')] do título que portais. Afinal, como podereis conduzir nossos cidadãos à luz se vós mesm[CHARACTER.Custom('ES_OA')] caminhais nas trevas?".\n\n"Eu vos imploro, adotai a verdadeira fé, a [complainer.GetFaith.GetName|l]!"."
 ep3_emperor_yearly.2340.a: "Talvez eu devesse me alinhar..."
 ep3_emperor_yearly.2340.b: "Seu blá-blá-blá herético não vai me convencer."
 every_fellow_vassal_state_faith: "Todo vassalo que segue a fé do estado"
 #In the Bud - You are not a Powerful family version
 ep3_emperor_yearly.2400.t: "$ep3_powerful_families.8020.t$"
 ep3_emperor_yearly.2400.desc: "Em todo o reino, o poder de uma nova família parece estar tomando raiz. Como uma erva daninha, eles espalharam sua influência por todos os cantos da nossa sociedade, e raramente passa um dia sem ouvir o nome \"[new_family.GetHouse.GetBaseName]\".\n\nFamílias poderosas sobem e descem o tempo todo em grandes impérios; não há necessidade de nos preocuparmos ou tomarmos qualquer iniciativa. E ainda assim, uma voz incômoda na minha cabeça sussurra: \"E se fôssemos nós?\""
 ep3_emperor_yearly.2400.a: "Nosso dia vai chegar."
 8020_powerful_family_tt: "Nova Família Poderosa"
 8020_powerful_family_desc: "[house|lE] [new_family.GetHouse.GetBaseName] agora é considerada uma [powerful_family|lE] [new_family.GetTopLiege.GetPrimaryTitle.GetAdjective]"
 #In the Bud - Your family version
 ep3_emperor_yearly.2401.t: "$ep3_powerful_families.8020.t$"
 ep3_emperor_yearly.2401.desc: "Muitas são as famílias de nobre linhagem e dignidade entre os cidadãos de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetDefinitiveName|l]. Porém, muito poucas se sentam à mesa [ROOT.Char.GetTopLiege.Custom('ES_DelDela')] [ROOT.Char.GetTopLiege.GetTitleAsNameNoTooltip|l] e compartilham as responsabilidades e as honras de conduzir o navio do Estado.\n\nPoucas têm #EMP poder#! poder real, mas hoje a Casa [ROOT.Char.GetHouse.GetBaseName] está entre elas!"
 ep3_emperor_yearly.2401.a: "A hora da [ROOT.Char.GetHouse.GetBaseNameNoTooltip] chegou!"
 #New Nobility
 ep3_emperor_yearly.2410.t: "Nova Nobreza"
 ep3_emperor_yearly.2410.desc: "Temos um novo nome entre os potentados de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetDefinitiveName|l]: a família [new_title.GetHolder.GetHouse.GetBaseName] conquistou o direito de ser considerada parte da nobreza; seja por corrupção, intriga ou verdadeiro valor, não saberia dizer.\n\nNão importa. Tenho a certeza de que não serão mais do que um grão de areia, pronto para ser varrido pelos ventos turbulentos da história — e pelo avanço inexorável da Casa [ROOT.Char.GetHouse.GetBaseName]!"
 ep3_emperor_yearly.2410.a: "Tsk. #EMP Provincianos.#!"
 2410_noble_family_tt: "Nova Família Nobre"
 2410_noble_family_tt_desc: "[new_title.GetHolder.GetShortUIName|U] estabeleceu a [noble_family|lE] [new_title.GetHolder.GetTopLiege.GetPrimaryTitle.GetAdjective] de [new_title.GetHolder.GetHouse.GetBaseName|V]."
 #The Shadow Behind The Throne
 ep3_emperor_yearly.2420.t: "A Sombra Atrás do Trono"
 ep3_emperor_yearly.2420.desc: "Gulosos e poderosos, os tentáculos da Casa [noble_family_head.GetHouse.GetBaseName] se estendem sobre cada canto de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetName].\n\nAgora está claro que nem mesmo aquele que se senta no trono imperial é mais alto do que eles; são os verdadeiros mestres de nossa terra, que dominam a vida política e econômica do [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip]."
 2420_noble_family_tt: "Nova Família Dominante"
 2420_noble_family_tt_desc: "A família [noble_family_head.GetHouse.GetBaseName] agora é considerada a [dominant_family|lE] em [noble_family_head.GetTopLiege.GetPrimaryTitle.GetName|l]."
 ep3_emperor_yearly.2420.a: "Notícias preocupantes."
