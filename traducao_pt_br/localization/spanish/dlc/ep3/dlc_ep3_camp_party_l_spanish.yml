 phase_camp_party: "Revelry do Acampamento"
 phase_camp_party_desc: "Histórias e festas ao redor da fogueira, o que poderia ser melhor?"
 fireside_chat_intent: "Conversa ao Redor da Fogueira"
 fireside_chat_intent_desc: "Reúna-se ao redor da fogueira. Compartilhe histórias. Compartilhe bebidas. Atraia estranhos úteis."
 ep3_fireside_chat_modifier_1: "Conversa ao Redor da Fogueira: A Fonte de Sabedoria"
 ep3_fireside_chat_modifier_1_desc: "Este personagem aprendeu muito com várias histórias compartilhadas ao redor da fogueira crepitante"
 ep3_fireside_chat_modifier_2: "Conversa ao Redor da Fogueira: O Tesouro de Sabedoria"
 ep3_fireside_chat_modifier_2_desc: "$ep3_fireside_chat_modifier_1_desc$"
 ep3_fireside_chat_modifier_3: "Conversa ao Redor da Fogueira: A Cornucópia de Sabedoria"
