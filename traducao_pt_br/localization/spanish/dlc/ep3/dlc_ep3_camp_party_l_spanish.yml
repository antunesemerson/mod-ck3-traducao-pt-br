 #Maintenance etc
 activity_camp_party: "Folia do Acampamento"
 activity_camp_party_desc: "Realize uma pequena celebração em seu acampamento, financiada por [gold_i][gold|lE], mas modificada por seus estoques de [provisions_i][provisions|lE]. Os convidados incluirão todos do acampamento, além de governantes locais, opcionalmente.\n\nFestas no acampamento oferecem uma oportunidade de fazer amizade com seus seguidores, ganhar [task_contracts|lE] especiais e gerenciar o [stress|lE]."
 activity_camp_party_province_desc: "Selecione Baronato"
 activity_camp_party_host_desc: "$BULLET_WITH_TAB$ Você pode perder [stress|lE] [stress_i]\n$BULLET_WITH_TAB$ Você pode ganhar [provisions|lE] [provisions_i]\n$BULLET_WITH_TAB$ Você pode ganhar pontos de [skill|lE]\n$BULLET_WITH_TAB$ Você pode ganhar [task_contracts|lE]\n$BULLET_WITH_TAB$ Você pode ganhar [artifacts|lE]\n$BULLET_WITH_TAB$ Você pode recrutar novos [followers|lE]"
 activity_camp_party_success: "Festejando"
 activity_camp_party_success_desc: "\n\nQuanta diversão houve no seu [GetActivityType( 'activity_camp_party' ).GetName|l] até agora.\n\nQuanto mais farra houver, melhores recompensas de [activity|lE] você poderá receber."
 activity_camp_party_cooldown: "Você precisa esperar pelo menos 3 meses antes de realizar outra festa!"
 activity_camp_party_selection_tooltip: "Participe de uma [GetActivityType('activity_camp_party').GetName|l] com seus [followers|lE]\n\nRecompensas previstas:\n$BULLET_WITH_TAB$ Perda de [stress|lE] [stress_i]\n$BULLET_WITH_TAB$[provisions|E] [provisions_i]\n$BULLET_WITH_TAB$ Novos [task_contracts|lE]"
 activity_camp_party_destination_selection: "A [GetActivityType('activity_camp_party').GetName|l] só pode ser realizada dentro de seu Acampamento"
 activity_camp_party_guest_desc: "$BULLET_WITH_TAB$ Os participantes podem perder [stress|lE]"
 activity_camp_party_conclusion_desc: "A [GetActivityType( 'activity_camp_party' ).GetName|l] foi concluída"
 camp_party_completed_log_entry_effect_title: "$activity_camp_party$ Concluída"
 camp_party_100_contracts_get: "Você ganhou #value 2#! novos [task_contracts|lE]"
 camp_party_75_contracts_get: "Você ganhou um novo [task_contract|lE]"
 activity_camp_party_guest_help_text: "É razoável esperar que todo o acampamento compareça a um evento tão libertino e festivo.\n\nO governante local pode ser convidado como Convidado de Honra, mas cuidado: os de certos [ranks|lE] podem considerar que comparecer está abaixo de suas sensibilidades."
 activity_invite_rule_followers: "Seguidores"
 activity_invite_rule_local_lord: "Governante Local"
 camp_party_honorary_guest_for_host: "Convidado de Honra"
 camp_party_honorary_guest_desc_for_host: "Traga o governante local como um convidado ilustre de seu acampamento."
 camp_party_option_food: "Comida"
 camp_party_food_none: "Comida Escassa"
