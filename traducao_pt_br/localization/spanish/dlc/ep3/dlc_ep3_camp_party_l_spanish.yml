 camp_party_food_simple: "Refeições Simples"
 camp_party_food_simple_desc: "#indent_newline:4 $EFFECT_LIST_BULLET$ Progresso de festejos aumentado#!\n#indent_newline:4 $EFFECT_LIST_BULLET$ Ativa eventos que:\n#indent_newline:10 $EFFECT_LIST_BULLET$ Trocam [provisions|lE] [provisions_i] por bônus#!\n\n#weak Na hora dos refrescos durante uma festa, um pouco já ajuda muito.#!"
 camp_party_food_lavish: "Banquete Farto"
 camp_party_food_lavish_desc: "#indent_newline:4 $EFFECT_LIST_BULLET$ Progresso de festejos aumentado#!\n#indent_newline:4 $EFFECT_LIST_BULLET$ Ativa eventos que:\n#indent_newline:10 $EFFECT_LIST_BULLET$ Trocam [provisions|lE] [provisions_i] por bônus#!\n#indent_newline:10 $EFFECT_LIST_BULLET$ Podem atrair [wanderers|lE] para sua festa#!\n\n#weak A mesa de cavaletes praticamente geme sob o peso de tamanho luxo!#!"
 camp_party_food_options_invalid: "Você precisa de [GetDomicileBuilding('supply_tent_01').GetName] [domicile_building|lE]"
 camp_party_option_drinks: "Bebidas"
 camp_party_drinks_none: "Bebidas Escassas"
 camp_party_drinks_none_desc: "$EFFECT_LIST_BULLET$ Sem bônus extras\n\n #weak Beber em excesso só atrapalha uma boa conversa!#!"
 camp_party_drinks_adequate: "Bebidas Adequadas"
 camp_party_drinks_adequate_desc: "#indent_newline:4 $EFFECT_LIST_BULLET$ Todos os participantes ganham [opinion|lE] sobre você#!\n#indent_newline:4 $EFFECT_LIST_BULLET$ EXP de [trait|E] [GetTrait('lifestyle_reveler').GetName( GetNullCharacter )|l]#!\n\n#weak Na hora dos refrescos durante uma festa, um pouco já ajuda muito.#!"
