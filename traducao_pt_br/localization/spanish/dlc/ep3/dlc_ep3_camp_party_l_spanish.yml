 activity_camp_party_special_type_bar_segment_tt_0: "#t Animada#!\n#ts Nota: [ActivityWindow.GetSpecialProgressValue|0V]/#V 25#!#!\n$EFFECT_LIST_BULLET$ Todos os participantes perdem [stress|lE]\n$EFFECT_LIST_BULLET$ Redução dos custos de [provisions|lE] [provisions_i] por [GetDecisionWithKey('visit_local_settlement_decision').GetName|l] durante #value 1#! ano"
 activity_camp_party_special_type_bar_segment_tt_1: "#t Alegre#!\n#ts Nota: [ActivityWindow.GetSpecialProgressValue|0V]/#V 50#!#!\n$EFFECT_LIST_BULLET$ Todos os participantes perdem [stress|lE]\n$EFFECT_LIST_BULLET$ Você ganha uma #positive_value pequeña#! quantidade de [provisions|lE] [provisions_i]\n$EFFECT_LIST_BULLET$ Recrutas melhores a partir de [GetDecisionWithKey('visit_local_settlement_decision').GetName|l] durante #value 1 #! ano\n$EFFECT_LIST_BULLET$ Você ganha [lifestyle_experience|lE]"
 activity_camp_party_special_type_bar_segment_tt_2: "#t Dichosa#!\n#ts Nota: [ActivityWindow.GetSpecialProgressValue|0V]/#V 75#!#!\n$EFFECT_LIST_BULLET$ Todos os participantes perdem [stress|lE]\n$EFFECT_LIST_BULLET$ Você ganha uma quantidade #positive_value mediana#! de [provisions|lE] [provisions_i]\n$EFFECT_LIST_BULLET$ Recrutas melhores de [GetDecisionWithKey('visit_local_settlement_decision').GetName|l] durante #value 1 #! ano\n$EFFECT_LIST_BULLET$ Você ganha [lifestyle_experience|lE]\n$EFFECT_LIST_BULLET$ Você ganha um [task_contract|lE] novo"
 activity_camp_party_special_type_bar_segment_tt_3: "#t Jubilosa#!\n#ts Nota: [ActivityWindow.GetSpecialProgressValue|0V]/#V 100#!#!\n$EFFECT_LIST_BULLET$Todos os participantes perdem [stress|lE]\n$EFFECT_LIST_BULLET$Você ganha uma #positive_value grande#! quantidade de [provisions|lE] [provisions_i]\n$EFFECT_LIST_BULLET$Recrutas melhores a partir de [GetDecisionWithKey('visit_local_settlement_decision').GetName|l] durante #value 1 #! ano\n$EFFECT_LIST_BULLET$Você ganha [lifestyle_experience|lE]\n$EFFECT_LIST_BULLET$Você ganha #value 2#! novos [task_contracts|lE]\n$EFFECT_LIST_BULLET$$activity_camp_party_reward_upgrade_building$"
 activity_camp_party_reward_upgrade_building: "Pode melhorar um [building|lE] aleatório @landless_rulers_icon![camp|lE] gratuitamente"
