 cultural_acceptance_gain_apa: "Uma experiência compartilhada durante a Revelry do Acampamento aumentou a aceitação cultural."
 #Start
 ep3_camp_party.0001.t: "Pronto para Começar"
 ep3_camp_party.0001.desc: "Finalmente estamos todos reunidos, com todos os suprimentos preparados, e a fogueira crepita alegremente no meio de nós.\n\nA vida na estrada pode ser dura. As festividades serão uma oportunidade para todos nós relaxarmos e tirarmos da cabeça a exaustiva busca pela sobrevivência.\n\nQue comece a farra!"
 ep3_camp_party.0001.a: "Mal posso esperar!"
 #Conclusion
 ep3_camp_party.0009.t: "O Tempo Voa"
 ep3_camp_party.0009.desc: "O fogo diminui, suas brasas agora apenas brilhando onde antes rugiam. Os festeiros, da mesma forma, começam a se dispersar em direção aos seus locais de descanso.\n\nTodos se divertiram, mas a hora chegou para encerrar a diversão por agora."
 ep3_camp_party.0009.a: "Foi uma revelry maravilhosa."
 #Events
 ep3_camp_party.1000.t: "Histórias Contadas"
 ep3_camp_party.1000.desc: ""E então! E então!" [storyteller.GetFirstName] gesticula animadamente enquanto tece uma história que, a esta altura, já vinha sendo elaborada há bastante tempo. "Ele caiu como um saco de tijolos! Acertou-o bem na cabeça, isso acertou."\n\n[storyteller.GetFirstNameNoTooltip] aproveita os aplausos da reunião com um sorriso satisfeito. Foi, de fato, uma história e tanto de bravura.\n\nO grupo reunido ainda parece estar boquiaberto, tentando persuadir [storyteller.GetFirstNameNoTooltip] a contar outra história de seus lábios."
 ep3_camp_party.1000.a: "Com o que você acertou ele mesmo?"
 ep3_camp_party.1000.a.tt: "Talvez possamos recriá-lo, com madeira e metal suficientes..."
 ep3_camp_party.1000.b: "Eu também tenho uma história!"
 ep3_camp_party.1000.b.success: "Sua história prova ser ainda melhor"
 ep3_camp_party.1000.b.failure: "Sua história não é muito cativante"
 ep3_camp_party.1000.b.tt: "[storyteller.GetFirstNameNoTooltip] se ofende com sua tentativa de superá-lo"
 ep3_camp_party.1000.c: "Sim! Mais uma!"
 ep3_camp_party.1000.c.success: "A próxima história é ainda melhor"
 ep3_camp_party.1000.c.failure: "A próxima história não tem o mesmo impacto"
 ep3_camp_party.1000.d: "Uma ótima história."
 ep3_makeshift_mace: "Maça Improvisada"
 ep3_makeshift_mace_description: "Uma maça pesada improvisada, feita conforme a especificação de uma história. Sua eficácia é tão inegável quanto sua rusticidade, e as lições aprendidas ao fazê-la certamente levarão a maiores economias no futuro."
 ep3_camp_party.1005.t: "Vagando"
 ep3_camp_party.1005.desc: ""Ah... minha [ROOT.Char.GetLadyLord]?" [attendee.GetFirstName] se aproxima, torcendo as mãos de preocupação. "Não sei onde está [wanderer.GetFirstName]. Já faz um tempo..."\n\n#EMP Realmente#! faz muito tempo desde que vi [wanderer.GetFirstNameNoTooltip] pela última vez. Enquanto isso, os céus escurecem de modo ameaçador à medida que o anoitecer se aproxima.\n\nPara onde terá ido?"
 ep3_camp_party.1005.a: "Coloque mais lenha no fogo para guiar[wanderer.GetHerHim] de volta."
 ep3_camp_party.1005.a.tt.positive: "#weak El rastro extra de humo atrae más atención que la [wanderer.Custom('ES_ElLa')] errante [wanderer.GetFirstNameNoTooltip]…#!"
 ep3_camp_party.1005.b: "Pegue uma tocha e comece a procurar. Não vá muito longe."
 ep3_camp_party.1005.b.success: "Suas habilidades de rastreamento se mostram imediatamente eficazes"
 ep3_camp_party.1005.b.neutral: "[wanderer.GetFirstNameNoTooltip] voltou com algumas frutas silvestres que encontrou"
 ep3_camp_party.1005.b.failure: "Você se depara com um animal selvagem ao encontrar [wanderer.GetFirstNameNoTooltip]"
 ep3_camp_party.1005.c: "Vamos sentar e esperar."
 ep3_camp_party.1005.c.success: "[wanderer.GetFirstNameNoTooltip] encontra o caminho de volta"
 ep3_camp_party.1005.c.failure: "[wanderer.GetFirstNameNoTooltip] reaparece, ferido(a)"
 ep3_camp_party.1005.c.critfailure: "[wanderer.GetFirstNameNoTooltip] realmente se perdeu"
 ep3_camp_party.1006.t: "Visitantes Inesperados"
 ep3_camp_party.1006.desc: "Mal havíamos sentado [wanderer.GetFirstName] quando um farfalhar nos arbustos denuncia a presença de outra pessoa. Salto de pé, mas, à medida que a luz revela melhor a figura que vem em nossa direção, fica claro que [newcomer.GetSheHe] não pretende nos fazer mal.\n\n"Por favor", começa, "não estou aqui para causar problemas. Sou apenas [Select_CString( newcomer.IsFemale, 'uma curandeira', 'um curandeiro' )] errante, e me sustento viajando de medicina em medicina."\n\n"Vi as trilhas de fumaça. Ficaria em dívida se pudesse ficar um pouco e me juntar às suas festividades; aqui, aceitem comida como compensação pelo incômodo.""
 ep3_camp_party.1006.a: "\"Talvez você gostaria de ficar #EMP permanentemente#!?\""
 ep3_camp_party.1006.b: "\"Venha, sente-se! Me ensine seus métodos medicinais!\""
 ep3_camp_party.1010.t: "Teste sua Mente"
 ep3_camp_party.1010.desc: "A sorriso malicioso de [riddler.GetFirstName] não combina bem com a estrutura do seu corpo, suspeito.\n\n"Vamos, [ROOT.Char.GetFirstNameNoTooltip]. Vamos ver se sua mente ainda está afiada depois de tantos dias na estrada!" [riddler.GetSheHe|U] faz uma floritura com a taça. "Talvez uma adivinha?". Sem esperar meu consentimento, começa."
 ep3_camp_party.1010.desc_riddle_01: "\n\n #EMP "Arrancado do ventre de minha mãe,\nespancado e queimado,\nme tornei um assassino sedento de sangue."
 ep3_camp_party.1010.desc_riddle_02: "\n\n #EMP \"Às vezes sou amarelo e às vezes branco,\nMetade de mim é escura e a outra metade é clara.\"#!"
 ep3_camp_party.1010.desc_riddle_03: "\n\n #EMP \"Tenho quatro pernas,\nmas não consigo andar.\"#!"
 ep3_camp_party.1010.desc_riddle_04: "\n\n #EMP \"Tenho um olho,\nmas não consigo ver.\"#!"
 ep3_camp_party.1010.desc_riddle_05: "\n\n #EMP \"Sou uma sala,\nmas não tenho portas nem janelas.\"#!"
 ep3_camp_party.1010.desc_riddle_06: "\n\n #EMP \"Posso ser capturado,\nmas não posso ser lançado.\"#!"
 ep3_camp_party.1010.desc_riddle_07: "\n\n #EMP Os pobres não me têm,\nos ricos não precisam de mim,\nquem não me come, morre.#!"
 ep3_camp_party.1010.desc_riddle_08: "\n\n #EMP \"Sou fácil de entrar,\nmas difícil de sair.\"#!"
 ep3_camp_party.1010.desc_outro: "\nO que eu sou?\"#!"
 ep3_camp_party.1010.a: "\"Fácil. A resposta é '[ROOT.Char.Custom('GetCampPartyRiddleAnswer')]'.\""
 ep3_camp_party.1010.b: "Talvez a resposta seja..."
 ep3_camp_party.1010.b.success: "Você adivinha corretamente"
 ep3_camp_party.1010.b.success.title: "A resposta correta era '[ROOT.Char.Custom('GetCampPartyRiddleAnswer')]'"
 ep3_camp_party.1010.b.failure: "Sua adivinhação está errada"
 ep3_camp_party.1010.c: "\"Oh [riddler.GetFirstNameNoTooltip], suas charadas são difíceis demais para mim!\""
 ep3_camp_party.1010.c.tt: "Não importa a verdade, é provavelmente melhor para a harmonia fingir que são..."
 ep3_camp_party.1010.answer_riddle_01: "ferro"
 ep3_camp_party.1010.answer_riddle_02: "a lua"
 ep3_camp_party.1010.answer_riddle_03: "uma mesa"
 ep3_camp_party.1010.answer_riddle_04: "uma agulha"
 ep3_camp_party.1010.answer_riddle_05: "um cogumelo"
 ep3_camp_party.1010.answer_riddle_06: "uma doença"
 ep3_camp_party.1010.answer_riddle_07: "nada"
 ep3_camp_party.1010.answer_riddle_08: "problema"
 ep3_camp_party.1015.t: "Prepare suas Cordas de Arco"
 ep3_camp_party.1015.desc: "Mal eu me levanto para pegar mais um drinque, [archer.GetFirstName].\n\n"Acho que a todos nós cairia bem uma pequena #EMP competición amistosa#!", começa, com o arco na mão. "Talvez um leve concurso de tiro com arco? Tenho um arco para você aqui mesmo, [ROOT.Char.GetFirstNameNoTooltip]…"\n\nMinha bebida pode esperar."
 ep3_camp_party.1015.a: "\"Vamos tornar isso interessante, certo? Traga duas maçãs.\""
 ep3_camp_party.1015.a.tt: "[apple_holder.GetFirstNameNoTooltip] será perfeito como suporte para elas."
 ep3_camp_party.1015.a.success: "Seu tiro acerta a maçã"
 ep3_camp_party.1015.a.failure: "Seu tiro erra, e [archer.GetFirstNameNoTooltip] acerta"
 ep3_camp_party.1015.a.critfailure: "[archer.GetFirstNameNoTooltip] erra, mas seu erro é bem pior..."
 ep3_camp_party.1015.b: "\"Por que não caçamos? Quem fizer a primeira morte vence.\""
 ep3_camp_party.1015.b.success: "Você faz a primeira morte"
 ep3_camp_party.1015.b.failure: "[archer.GetFirstNameNoTooltip] reivindica a primeira morte"
 ep3_camp_party.1015.b.critfailure: "[archer.GetFirstNameNoTooltip] te acerta acidentalmente com a flecha"
 ep3_camp_party.1015.c: "\"Então venha, você escolhe o alvo!\""
 ep3_camp_party.1015.c.success: "Você vence"
 ep3_camp_party.1015.c.failure: "Você perde"
 ep3_camp_party.1015.d: "\"Eu jamais presumiria competir com alguém do seu calibre!\""
 ep3_camp_party.1020.t: "Quem Vai Lá?"
 ep3_camp_party.1020.opening: "Nossos festejos são interrompidos de repente; uma figura cambaleante se dirige até nós desde os arredores do acampamento. Claramente [Select_CString( local.IsFemale, 'hambrienta y cansada', 'hambriento y cansado' )], nos diz que seu nome é [local.GetFirstName].\n\n"
 ep3_camp_party.1020.witch: "[local.GetFirstNameNoTooltip] é [Select_CString( local.IsFemale, 'asustadiza', 'asustadizo' )] e fraca, mas ainda há uma clareza vigorosa em seus olhos. Suas roupas surradas estão adornadas com amuletos e ícones desconhecidos.\n\n"
 ep3_camp_party.1020.cannibal: "[local.GetSheHe|U] usa um colar estranho de ossos. Está claro que tem fome, mas os olhos só se arregalaram de expectativa ao perguntar sobre o que… #EMP carne#! tínhamos disponível.\n\n"
 ep3_camp_party.1020.mangled: "Essa alma desafortunada está fisicamente mutilada quase além do reconhecimento. Uma perna ausente, um braço perdido e cicatrizes por todo o rosto e o que lhe resta do corpo. Eu me encolho ao ver a enorme quantidade de dano.\n\n"
 ep3_camp_party.1020.mystic: "Os olhos de [local.GetFirstNameNoTooltip] contêm uma profunda sabedoria. Varetas de fragrância tilintam juntas em seu cinto enquanto junta as palmas das mãos em prece.\n\n"
 ep3_camp_party.1020.siblings: "Mal tinha aberto a boca para responder quando uma segunda figura, esta curvada e claramente com dor, se junta a nós. [local.GetFirstNameNoTooltip] vai imediatamente para o lado de [local_sibling.GetHerHim] e o puxa para perto, com ternura e possessividade.\n\n\"Por favor.\" [local.GetFirstNameNoTooltip] me olha suplicante. \"[local_sibling.GetFirstName|U] é meu [local_sibling.Custom('SisterBrother')]; precisa de descanso e água.\"\n\nÉ evidente que o vínculo entre eles é estreito. #EMP Muy#! estreitos. Mas o que são essas manchas rubras escuras nas roupas deles…?"
 ep3_camp_party.1020.ending: ""Tudo o que peço é uma noite de descanso em segurança e algo para comer, [ROOT.Char.Custom('FormOfAddressForLiege')]", diz, "e ficarei em grande dívida com você por isso"."
 ep3_camp_party.1020.a: "\"Por que não ficará\""
 ep3_camp_party.1020.b: "Podemos poupar um pouco de comida."
 ep3_camp_party.1020.c: "As poucas rações que temos devem permanecer nossas."
 ep3_camp_party.1021.t: "Rejeitado"
 ep3_camp_party.1021.witch: "Os olhos de [local.GetFirstNameNoTooltip] se endurecem impiedosamente, de raiva e humilhação.\n\n“Vocês vão se arrepender disso.” Ele nos olha, com uma expressão de desprezo nos lábios. “Já há um dos nossos entre vocês. Eles farão com que vocês sofram.”\n\nCom essas últimas palavras, [local.GetSheHe] se vai, desaparecendo na escuridão que se aproxima."
 ep3_camp_party.1021.cannibal: "[local.GetFirstNameNoTooltip] responde com sarcasmo à minha resposta.\n\n“Vocês nem vão ajudar alguém em apuros, hein? Imagino que já haja alguém como eu entre suas fileiras. Sim, eu vejo; vejo que vocês sabem o que estes ossos significam.”\n\nCom uma última sacudida de cabeça de desprezo, ele manca em direção à escuridão, sem dar mais explicações."
 ep3_camp_party.1021.mangled: "[local.GetFirstNameNoTooltip] não parece irritad[local.Custom('ES_OA')], mas apenas triste.\n\n"Outra marca na coluna da vida, nesta longa luta contra a minha existência." Sorri com tristeza e se afasta sem dizer mais uma palavra.\n\nSinto que os olhares dos meus companheiros se cravam na minha nuca enquanto contemplo como se afasta mancando. Não foi uma decisão popular."
 ep3_camp_party.1021.mystic: "A retribuição de [local.GetFirstNameNoTooltip] foi rápida e sem muito aviso. Um esgar, um insulto cuspido, e de repente minha visão fica turva. [local.GetFirstName] se afasta tão rápido quanto lançou essa mistura granulosa em meu rosto, fugindo do acampamento enquanto meus seguidores vêm ao meu lado.\n\nParece que não há efeitos negativos imediatos, mas… estou com o estômago um pouco embrulhado…"
 ep3_camp_party.1021.siblings: "O rosto de [local.GetFirstName] se contorce, uma repentina máscara de ódio se grava nele. É a última coisa que vejo antes de que a pedra que guardava em sua mão se estilhace contra a órbita do meu olho.\n\nDesabo no chão, vagamente consciente da fuga apressada de [Select_CString(And(local.IsFemale, local_sibling.IsFemale), 'duas irmãs', 'dois irmãos')] enquanto meus seguidores se reúnem ao meu redor para me ajudar."
 ep3_camp_party.1021.callous: "Quando digo o que penso, o rosto de [local.GetFirstName] se escurece, mas já estou me afastando. Ao fazer isso, faço um gesto para que os outros removam os intrusos do acampamento.\n\nQuando eles são arrastados para fora, meu humor melhora."
 ep3_camp_party.1021.normal: "Uma mistura de tristeza, raiva e desesperança cruza o rosto de [local.GetFirstName]. Não demonstra hostilidade ao se afastar.\n\nReprimo um sentimento crescente de culpa enquanto voltamos aos nossos festejos."
 ep3_camp_party.1021.a.face: "#EMP ARGHHHH!#!"
 ep3_camp_party.1021.a.ill: "Eu realmente não #DIE1 estou me sentindo muito bem...#!"
 ep3_camp_party.1021.a.sad: "Bem, tinha que ser feito."
 ep3_camp_party.1021.b: "Excelente. De volta à festa!"
 ep3_camp_party.1025.t: "Trocando Histórias"
 ep3_camp_party.1025.desc: "A farra continua, mas está claro que [friend.GetFirstName] está sentindo um pouco de introspecção.\n\n\"Isso realmente me lembra da minha infância.\" Olha ao redor com nostalgia. \"Tantas travessuras e folia. Consigo me lembrar de cem noites de tanta canalhice assim agora mesmo!\" Olha para mim.\n\n\"E você? Tem alguma história de quando era um jovem moz[ROOT.Char.Custom('ES_OA')]?\"."
 ep3_camp_party.1025.a: "Eu prefiro ouvir mais das suas!"
 ep3_camp_party.1025.b: "Claro!"
 ep3_camp_party.1025.b.success: "Suas histórias são bem recebidas"
 ep3_camp_party.1025.b.failure: "Você não consegue escolher uma boa história"
 ep3_camp_party.1025.c: "Oh sim. Diga, você ouviu que..."
 ep3_camp_party.1025.c.tt: "Talvez, se eu for sutil, [friend.GetSheHe] não perceba a mudança de assunto..."
 ep3_camp_party.1030.t: "Abrir um Barril"
 ep3_camp_party.1030.desc: "A bebida em meu copo escorre até desaparecer, as últimas gotas drenadas. Viro-me para procurar outra, mas só encontro um pequeno grupo de pessoas na mesma situação que eu.\n\n"Acabou." [reveler.GetFirstName] vasculha as rações reunidas, com uma lanterna para iluminá-las. "Nós #EMP poderíamos#! abrir outro barril, mas se não terminarmos pode estragar...""
 ep3_camp_party.1030.a: "Um? Abra #EMP dois!#!"
 ep3_camp_party.1030.b: "Vamos viver um pouco, não vamos?"
 ep3_camp_party.1030.b.success: "Sua festa é reconhecida"
 ep3_camp_party.1030.c: "Não podemos perder o controle só por uma noite de festa."
 ep3_camp_party.1035.t: "Escassez de Lenha"
 ep3_camp_party.1035.desc: "Estou tão absorto na conversa que mal percebo a falta de luz. Só quando tenho dificuldade para identificar um recém-chegado à conversa é que lanço um olhar para a fogueira.\n\nSuas brasas brilham de forma opaca, quase extintas. [treefeller.GetFirstName] balança a cabeça ao eu fazer uma rápida varredura pelo acampamento.\n"Usamos o último pedaço de lenha. Precisamos conseguir mais." Levanta-se de um salto, pega um machado ali perto e ergue uma sobrancelha para mim.\n"
 ep3_camp_party.1035.a: "\"Espere. Temos aqueles barris e caixas velhas...\""
 ep3_camp_party.1035.a.success: "Sua ideia se mostra válida"
 ep3_camp_party.1035.b: "\"Tudo bem, me dê isso aqui.\""
 ep3_camp_party.1035.b.success: "A derrubada vai conforme o planejado"
 ep3_camp_party.1035.b.failure: "Você não consegue encontrar uma árvore adequada para derrubar"
 ep3_camp_party.1035.b.critfailure: "A árvore cai em um ângulo estranho..."
 ep3_camp_party.1035.c: "\"Não há tempo para derrubar uma árvore. Vamos retirar aqueles arbustos para conseguir gravetos.\""
 ep3_camp_party.1040.t: "Um Comerciante Errante"
 ep3_camp_party.1040.desc: "Que alvoroço! Aguzo o ouvido e me viro para ver um par de meus seguidores envolvidos em uma discussão com um[merchant.Custom('ES_XA')] [merchant.GetWomanMan] de pé junto a uma carroça puxada por um cavalo.\n\n"Só as melhores mercadorias!", proclama com um sorriso astuto. "Vi e ouvi suas festas de longe e, #EMP é claro#!, tive de me desviar para oferecer a vocês, boa gente, a chance de adquiri-las!"\n\nAproximo-me, tentando focar através da névoa leve do álcool. Com certeza reluzem..."
 ep3_camp_party.1040.a: "Eu quero a grande!"
 ep3_camp_party.1040.b: "Um daqueles trinkets seria legal."
 ep3_camp_party.1040.c: "Afaste-se, oportunista!"
 resplendent_armour_name: "Armadura Resplandecente"
 resplendent_armour_desc: "Este impressionante conjunto de armadura brilha onde a luz o atinge, refletindo os finos filigranas incrustados em padrões intrincados por todo ele. Os materiais endurecidos oferecem excelente resistência a qualquer agressor em potencial."
 ep3_camp_party.2000.t: "Uma Conversa na Mão..."
 ep3_camp_party.2000.desc: ""... e por #EMP eso#! [ROOT.Char.Custom('GetFirstFollowerTraitMonologue')]", termina meu [ROOT.Char.Custom2('RelationToMe', first_follower )], [first_follower.GetFirstName] quando dá outro gole em sua caneca de [ROOT.Char.Custom('RegionalDrink')].\n\n #EMP Sí#! que me intriga o tema de [first_follower.GetFirstNameNoTooltip], mas hesito quando ouço por acaso o monólogo de [second_follower.GetFirstName] sobre "... como [ROOT.Char.Custom('GetSecondFollowerTraitMonologue')]".\n\nCom um pouco de estresse, tento decidir qual conversa seguir:"
 ep3_camp_party.2000.a: "\"[first_follower.GetFirstNameNoTooltip], o que você acha sobre...\""
 ep3_camp_party.2000.b: "\"Que ponto de vista interessante, [second_follower.GetFirstNameNoTooltip]!\""
 ep3_camp_party.2000.c: "\"A noite é jovem! Vamos debater #EMP ambos#! os tópicos mais a fundo!\""
 ep3_camp_party.2000.d: "\"Venham! Vamos desfrutar de uma refeição juntos em vez disso!\""
 ep3_camp_party.2000.d.tt: "[THIS.Char.GetDomicile.GetName] não #bold tem#! um edifício de nível [GetDomicileBuilding('mess_tent_03').GetName|l] #V 3#! ou superior"
 ep3_camp_party.2000.callous: "as pessoas estão tão #EMP sensíveis#! hoje em dia"
 ep3_camp_party.2000.sadistic: "a dor física #EMP pode#! moldar um sujeito para ser mais útil"
 ep3_camp_party.2000.zealous: "o plano divino #EMP guiará#! nosso caminho, se apenas nos submetermos"
 ep3_camp_party.2000.craven: "o mundo se tornou tão #EMP perigoso#! nos últimos tempos"
 ep3_camp_party.2000.forgiving: "o conceito de dar a outra face está presente em #EMP mais#! de uma religião"
 ep3_camp_party.2000.compassionate: "ajudar aqueles em necessidade #EMP é#! a recompensa, por si só"
 ep3_camp_party.2000.gregarious: "as festividades são #EMP tão#! relaxantes, e é #EMP benéfico#! simplesmente aproveitar a companhia dos outros"
 ep3_camp_party.2000.paranoid: "tudo está #EMP conectado#!; como a seca do ano passado em relação a como tão escassamente qualquer galinha fornece um ovo todos os dias!"
 ep3_camp_party.2000.eccentric: "a lua tem uma meleca no seu nariz esta noite"
 ep3_camp_party.2000.brave: "conquistar seus medos é a #EMP coisa mais importante#! na vida"
 ep3_camp_party.2000.just: "nós #EMP precisamos#! seguir as leis e regras locais, ao contrário dos #EMP selvagens#!"
 ep3_camp_party.2000.lazy: "uma pessoa está #EMP muito#! mais preparada para dificuldades se descansar profusamente"
 ep3_camp_party.2000.arrogant: "as pessoas se tornaram muito mais #EMP obtusas#! hoje em dia"
 ep3_camp_party.2000.fickle: "é tão difícil #EMP talvez às vezes talvez#! tomar uma decisão"
 ep3_camp_party.2000.diligent: "é #EMP satisfatório#! ter todas as tarefas de trabalho concluídas e entregues"
 ep3_camp_party.2000.lustful: "é simplesmente saudável engajar-se em #EMP tentações#! de tempos em tempos"
 ep3_camp_party.2000.chaste: "nós somos #EMP melhores#! do que os animais imundos, capazes de controlar nossa luxúria a qualquer momento"
 ep3_camp_party.2000.greedy: "o preço de [ROOT.Char.Custom('RegionalRootVegetablePlural')] se tornou tão #EMP caro#! recentemente"
 ep3_camp_party.2000.generous: "é bom #EMP compartilhar#! qualquer pequena posse que alguém possa ter com os outros"
 ep3_camp_party.2000.humble: "uma pessoa #EMP não deveria#! se fazer passar por algo que não é"
 ep3_camp_party.2000.temperate: "é recompensador #EMP não#! dormir com a barriga cheia"
 ep3_camp_party.2000.gluttonous: "devemos #EMP aproveitar#! comida deliciosa e boa sempre que tivermos a oportunidade"
 ep3_camp_party.2000.wrathful: "pessoas que #EMP simplesmente não veem razão#! são #EMP tolos#!"
 ep3_camp_party.2000.patient: "é bom simplesmente #EMP sentar#! por um momento, ponderando sobre o ambiente"
 ep3_camp_party.2000.impatient: "está #EMP demorando tanto tempo#! para conseguir uma bebida por aqui"
 ep3_camp_party.2000.calm: "os problemas #EMP são#! mais fáceis de resolver sob uma atitude calma"
 ep3_camp_party.2000.deceitful: "#EMP alguna#! gente acha que [other_follower.GetFirstName] é bastante [other_follower.Custom('quirk_neg_adjective')] mas #EMP I#! eu sempre considerei que é [other_follower.Custom('quirk_pos_adjective')]"
 ep3_camp_party.2000.honest: "o #EMP esforço#! que foi colocado no primeiro prato foi admirável, mas não era #EMP particularmente#! bom"
 ep3_camp_party.2000.shy: "a timidez é simplesmente um sinal de #EMP inteligência#!; #EMP não#! inferioridade"
 ep3_camp_party.2000.ambitious: "somente o trabalho duro levará você #EMP a algum lugar#! na vida"
 ep3_camp_party.2000.content: "a festividade está boa até agora, sem nada realmente para reclamar"
 ep3_camp_party.2000.arbitrary: "#EMP espontaneidade e intuições#! é o segredo para uma vida pacífica"
 ep3_camp_party.2000.trusting: "precisamos ter fé em nossos semelhantes para #EMP cuidar#! de seu próximo"
 ep3_camp_party.2000.stubborn: "você #EMP deve#! perseguir ferozmente qualquer coisa que valha a pena ter"
 ep3_camp_party.2000.vengeful: "#EMP vingança#! é um prato que deve ser servido frio"
