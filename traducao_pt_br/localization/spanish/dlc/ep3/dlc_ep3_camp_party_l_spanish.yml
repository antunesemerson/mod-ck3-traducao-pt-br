 camp_party_drinks_abundant: "Bebidas Abundantes"
 camp_party_drinks_abundant_desc: "#indent_newline:4 $EFFECT_LIST_BULLET$ Todos os participantes ganham [opinion|lE] sobre você#!\n#indent_newline:4 $EFFECT_LIST_BULLET$ EXP de [trait|lE] [GetTrait('lifestyle_reveler').GetName( GetNullCharacter )|l]#!\n#indent_newline:4 $EFFECT_LIST_BULLET$ Ganha [GetModifier( 'ep3_master_of_ceremonies' ).GetNameWithTooltip|L] ao final da $activity_camp_party$#!\n\n#weak Nenhum homem, mulher ou criança passará sede nesta festa!#!"
