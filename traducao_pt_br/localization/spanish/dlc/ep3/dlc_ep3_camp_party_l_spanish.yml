 #APAs modifiers
 ep3_fireside_chat_stewardship: "Conversa ao Redor da Fogueira: Governança"
 ep3_fireside_chat_stewardship_desc: "Este personagem aprendeu bastante sobre a governança de pessoas e bestas em uma conversa agradável ao redor da fogueira crepitante"
 ep3_fireside_chat_martial: "Conversa ao Redor da Fogueira: Marcial"
 ep3_fireside_chat_martial_desc: "Este personagem aprendeu bastante sobre investidas de cavalaria, táticas de batalha e logística de campanhas em uma conversa intensa ao redor da fogueira crepitante"
 ep3_fireside_chat_diplomacy: "Conversa ao Redor da Fogueira: Diplomacia"
 ep3_fireside_chat_diplomacy_desc: "Este personagem aprendeu várias frases eloquentes, bem como como se prostrar diante da realeza, em uma conversa encantadora ao redor da fogueira crepitante"
 ep3_fireside_chat_intrigue: "Conversa ao Redor da Fogueira: Intriga"
 ep3_fireside_chat_intrigue_desc: "Este personagem aprendeu vários truques sobre como tirar o dinheiro e a vida dos outros em uma demonstração grotescamente cativante ao redor da fogueira crepitante"
 ep3_fireside_chat_learning: "Conversa ao Redor da Fogueira: Aprendizado"
 ep3_fireside_chat_learning_desc: "Este personagem aprendeu bastante sobre os mistérios dos céus e da terra em uma conversa envolvente ao redor da fogueira crepitante"
 ep3_camp_party_sad_lonesome: "Festa Solitária no Acampamento"
 ep3_camp_party_sad_lonesome_desc: "Este personagem celebrou uma [GetActivityType('activity_camp_party').GetName] só para si e é assombrado pela memória do silêncio perturbador da solidão"
 ep3_camp_party_shadows_in_the_dark: "Sombras Assustadoras no Escuro"
 ep3_camp_party_shadows_in_the_dark_desc: "Este personagem decidiu passar sentado sozinho toda a [GetActivityType('activity_camp_party').GetName] e muito, muito quieto"
 camp_party_fortress_of_solitude: "Fortaleza da Solidão"
 camp_party_fortress_of_solitude_desc: "Este personagem celebrou uma [GetActivityType('activity_camp_party').GetName] só para si e é reconfortado pelas lembranças do pacífico silêncio da solidão"
