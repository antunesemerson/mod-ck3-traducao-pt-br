 pandidakterion_university_modifier: "Pandidakterion"
 pandidakterion_university_modifier_desc: "A Universidade de Constantinopla, fundada em 425 por Teodósio II e recentemente refundada, é renomada por produzir burocratas qualificados que sustentam o funcionamento da corte imperial.\nEstas [councillor_tasks|lE] são mais eficazes:\n $BULLET_WITH_TAB$[domestic_affairs|E]\n $BULLET_WITH_TAB$[promote_culture|E]\n $BULLET_WITH_TAB$[organize_levies|E]\n $BULLET_WITH_TAB$[espionage|E]\n $BULLET_WITH_TAB$[fabricate_claim|E][AddLocalizationIf( HasDlcFeature( 'wards_and_wardens' ), 'pandidakterion_adult_education_bonus')]"
 ep3_sent_help_to_east_modifier: "Enviou Exército para Ajudar"
