 ep3_life_threatened_modifier_desc: "Este personagem não acredita, #EMP sabe#! que há outros atrás dele. Seus vassalos ficam devidamente pouco impressionados com tamanha preocupação.\n\n#weak Este [modifier|lE] aumenta la probabilidad de que los vasallos se unan a [claimant_factions|lE].\n#!"
 ep3_impassioned_populace_modifier: "População Apaixonada"
 ep3_impassioned_populace_modifier_desc: "O povo deste condado ouviu falar de resistência contra a ocupação estrangeira de além de suas fronteiras, e alguns estão inspirados a se juntar à causa."
