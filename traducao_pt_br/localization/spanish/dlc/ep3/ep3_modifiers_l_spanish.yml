 ep3_disgruntled_vassals_modifier: "Vassalos Descontentes"
 ep3_disgruntled_vassals_modifier_desc: "Os vassalos deste personagem resmungam e conspiram constantemente, incentivando-se mutuamente com seu descontentamento.\n\n#weak Este [modifier|lE] aumenta la probabilidad de que los vasallos se unan a [claimant_factions|lE].\n#!"
