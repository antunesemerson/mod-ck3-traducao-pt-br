l_spanish:
 ep3_travel_events.3000.t: "Águas do Jordão"
 ep3_travel_events.3000.desc: "Os homens falam apenas sobre a maravilha de"
 ep3_travel_events.3000.israel: "a [Glossary( ''Ereṣ Yisrā'ēl', 'ERES_YISRAEL_GLOSS' )] irrigada pelo nobre rio Jordão, como o jardim de [ROOT.Char.GetFaith.HighGodName].\n\nNeste lugar de milagres, entro nas águas, banhando-me onde Eliseu curou um leproso, onde os israelitas de Josué deram os últimos passos para voltar para casa…"
 ep3_travel_events.3000.greek_christian: "Palestina, onde cada deserto é um [Glossary( 'eremos', 'EREMOS_GLOSS' )] santíssimo, toda pedra é sagrada, todo riacho deságua no rio Jordão.\n\nAo entrar nas águas desse rio, banho-me onde João Batista celebrou seus ritos no passado, onde o próprio Cristo foi batizado…"
 ep3_travel_events.3000.christian: "A Palestina, uma terra onde o solo conhece o pisar de Deus, onde o grande Rio Jordão conhece seu corpo.\n\nAo entrar nas águas daquele rio, eu me banho onde João Batista uma vez realizou seus rituais, onde o próprio Cristo foi batizado..."
 ep3_travel_events.3000.muslim: "Palestina, uma terra de grandes triunfos islâmicos, irrigada pelo nobre rio Jordão.\n\nAgora atravesso a corrente, para iniciar minhas abluções. Quase à vista do local de descanso dos companheiros do Profeta — que a paz esteja com eles —, este lugar é ideal para a observância dos [Glossary( 'hadices', 'HADITHS_GLOSS' )]…"
 ep3_travel_events.3000.outro_rapture: "\n\nE, embora haja plantas escorregadias sob os pés, espumas leitosas carregadas por correntes lamacentas — isso é digno de ser um dos quatro rios do Paraíso! Nunca me senti tão limpo."
 ep3_travel_events.3000.outro: "\n\nE — parece imundo! Minha pele é vagarosamente acariciada por uma lama morna e leitosa; lodo vegetal borbulha entre meus dedos dos pés. Sem cerimônia, eu subo de volta para a margem lamacenta."
 ERES_YISRAEL_GLOSS: "#bold 'Ereṣ Yisrā'ēl#! é a versão hebraica tiberiana de \"Terra de Israel\""
 EREMOS_GLOSS: "#bold Eremos#! é um termo grego usado em referência a lugares desolados adequados à solidão contemplativa."
 HADITHS_GLOSS: "#bold Hadiths#! são coleções de ditos e ações atribuídas ao profeta Maomé; uma fonte importante de orientação para a maioria das seitas muçulmanas."
 ep3_travel_events.3000.a_christian: "Água mais sagrada — para batismos abençoados!"
 ep3_travel_events.3000.a_jewish: "Água de milagres, a ser valorizada!"
 ep3_travel_events.3000.a_muslim: "Inshallah, algumas gotas para cada ablução!"
 ep3_travel_events.3000.b: "Ainda... Fui limpo pelas águas."
 ep3_travel_events.3000.b_zealot: "Fui limpo pelas águas!"
 ep3_travel_events.3000.b.flavor: "Sim, é isso que contarei!"
 ep3_travel_events.3000.c: "Alguma água entrou na minha boca! Eu devo — #EMP *hurk!*#!"
 ep3_travel_events.3000.c_zealot: "Mas — #EMP *hurk!*#! — realmente tem um gosto #EMP estranho#!..."
 ep3_travel_events.3000.c_flavor: "Você se 'alivia' discretamente."
 holy_water_mortal_stomach_modifier: "Água Sagrada, Estômago Mortal"
 holy_water_mortal_stomach_modifier_desc: "Desde que me tornei um pouco #EMP demais#! imerso no êxtase do Rio Jordão, este personagem sofreu uma enfermidade."
 artifact_water_of_the_jordan: "Água do Jordão"
 artifact_water_of_the_jordan_desc: "Gotas sagradas da fonte abençoada que irriga a Terra Santa, o Rio Jordão. Levemente marrons."
 ep3_travel_events.3001.t: "As Portas Cilicianas"
 ep3_travel_events.3001.intro: "Lutamos através dos passes guardiães, os desfiladeiros acidentados entre a Ásia e a Europa. Acima, nas alturas atormentadas pelo vento, olhos de [current_location.GetCulture.GetName] nos observam."
 ep3_travel_events.3001.greek: "\n\nEsses [Glossary( 'akritai', 'AKRITAI_GLOSS' )], guardiões das Portas Cilicianas em suas altas fortalezas, não defendem mais contra a investida devastadora dos tempos heraclianos — ainda assim, eles mantêm uma vigilância contra os inimigos que se aproximam, nômades saqueadores e os pequenos ladrões que assombram esses passes estreitos."
 AKRITAI_GLOSS: "O termo grego #EMP boldakritai#!, derivado da palavra #EMP akron#! —fronteira—, refere-se aos soldados de fronteira; às vezes glorificados como defensores contra incursões de #EMP ghazis#!, e ocasionalmente condenados como foras-da-lei."
 ep3_travel_events.3001.friend: "\n\nDiz-se que esses guardiões das Portas Cilicianas, em suas altas fortalezas, uma vez defenderam contra uma inundação de pagãos devastadores. Agora, eles mantêm uma vigilância contra nômades saqueadores e pequenos ladrões, embora alguns digam que não são melhores do que bandidos eles mesmos. Ainda assim..."
 ep3_travel_events.3001.islamic_arabic: "\n\nHomens astutos e grosseiros infestam as Portas Cilícias, estes [Glossary( 'al-thughūr', 'AL_THUGHUR_GLOSS')] históricos, que vigiam para [lords_liege.Custom('ES_ElLa')] [lords_liege.GetTitleAsName|l] de [lords_liege.GetPrimaryTitle.GetNameNoTooltip]. Durante o grande califado Rashidun, as tropas de fronteira caçaram aqui os portadores do Islã — por este caminho traiçoeiro de matança."
 AL_THUGHUR_GLOSS: "#bold Al-thughūr#! é um descritivo árabe usado para as marchas Cilicianas, comparando fortificações e estreitos passes montanhosos às lacunas entre os dentes."
 ep3_travel_events.3001.foe: "\n\nHomens astutos e rudes infestam as Portas Cilícias, que vigiam para [lords_liege.Custom('ES_ElLa')] [lords_liege.GetTitleAsName|l] [lords_liege.GetPrimaryTitle.GetAdjectiveNoTooltip]. De suas altas fortalezas, emboscam bandidos e pobres inocentes por igual — tudo supostamente em defesa do interior."
 ep3_travel_events.3001.praise_outro: "\n\nAqui, alguns recrutas comuns em pequenas fortalezas desprotegidas salvaguardaram um império."
 ep3_travel_events.3001.distrust_outro: "\n\nEnquanto seguimos em frente, formas furtivas imitam nosso progresso nas encostas..."
 ep3_travel_events.3001.a_greek: "Os #EMP akritai#! sejam louvados!"
 ep3_travel_events.3001.a_non_greek: "Um lugar fatídico."
 ep3_travel_events.3001.b: "Sombrio."
 haunted_by_hostile_troops_modifier: "Assombrado por Tropas Hostis"
 haunted_by_hostile_troops_modifier_desc: "Este personagem está inquieto com memórias de olhares vigilantes nos passes montanhosos Cilicianos."
 ep3_travel_events.3002.t: "Onde [local_lord.GetCulture.GetCollectiveNounNoTooltip] Governam"
 ep3_travel_events.3002.intro: "Há uma sede de poder perto: a [local_lord_capital.GetProvince.GetHolding.GetType.GetName|l] de [local_lord_capital.GetName], de onde [local_lord.Custom('ES_ElLa')] [local_lord.GetTitledFirstName|l] vigia os [local_lord.GetCulture.GetCollectiveNoun] locais.\n\n"
 ep3_travel_events.3002.admin: "Felizmente, o[local_lord.Custom('ES_EA')] [local_lord.GetTitleAsNameNoTooltip|l] da comunidade [local_lord.GetCulture.GetNameNoTooltip] adota uma administração ao estilo da [ROOT.Char.GetCulture.GetName]. Viajar por seu [local_lord.GetPrimaryTitle.GetTierAsNameNoTooltip|l] é familiar e seguro.\n\n"
 ep3_travel_events.3002.non_admin: "Recorrendo a vínculos pessoais histriônicos e força bruta para manter seu pedaço de terra unido, est[local_lord.Custom('ES_EA')] [local_lord.GetTitleAsNameNoTooltip|l] da comunidade [local_lord.GetCulture.GetNameNoTooltip] não passa de [Select_CString( local_lord.IsFemale, 'una señora', 'un señor' )] de [local_lord.GetGovernment.GetNameNoTooltip|l] de quinta.\n\n"
 ep3_travel_events.3002.armenian: "À medida que os cavaleiros se aproximam, eu penso nos valorosos armênios que defenderam o império em anos sombrios, tão relutantes em entregar suas espadas quanto foram em abraçar a doutrina. Estranhos companheiros... mas amigos e admiradores dos romanos."
 ep3_travel_events.3002.georgian: "É estranho visitar [local_lord.GetCulture.GetCollectiveNounNoTooltip]. Assim como nós, eles há muito cantam a verdadeira crença, construíram grandes banhos, lidaram com armênios... mas olham sobre estepes sem fim e confiam em suas altas montanhas."
 ep3_travel_events.3002.bulgarian: "Enquanto os [Glossary( 'escitas', 'SCYTHIAN_GLOSS' )]semidomesticados conduzem cabras pela estrada, penso em [Glossary( 'San Cirilo y San Metodio', 'CYRIL_AND_METHODIUS_GLOSS' )]… e na sorte que tiveram por levar a glória do império atrás de si: uma glória que agora carrego."
 SCYTHIAN_GLOSS: "#bold Scythian#!: um membro de uma cultura steppe iraniana agora extinta. O termo continua a servir aos gregos como um descriptor indiscriminado para nômades do norte e eslavos."
 CYRIL_AND_METHODIUS_GLOSS: "#bold Cyril e Methodius#!, conhecidos como os \"Apóstolos dos Eslavos\": dois irmãos venerados como santos por cristianizar os eslavos do sul e criar o alfabeto glagolítico."
 ep3_travel_events.3002.serbian: "Uma tropa de cavaleiros nos recebe aqui. Esses ferozes cavaleiros, cobertos de malha, seriam excelentes [Glossary( 'chonsarioi', 'CHONSARIOI_GLOSS' )]... mas não levo nenhum bastão de comando. Sou apenas [Select_CString( ROOT.Char.IsFemale, 'uma romana', 'um romano' )] de passagem."
 CHONSARIOI_GLOSS: "#bold Chonsarioi#! são formações bizantinas de cavaleiros recrutados dos Bálcãs, valorizados por suas habilidades como batedores e saqueadores."
 ep3_travel_events.3002.latin: "Seus escrivães se aproximam de nós. Outrora, esses latinos teriam tido dignidade romana, falado e se comportado com elegância. Agora, tagarelam como bárbaros e berram por riquezas, por [Glossary( 'derechos especiales', 'SPECIAL_RIGHTS_GLOSS' )] em nossas grandes cidades…"
 SPECIAL_RIGHTS_GLOSS: "#bold Direitos especiais#! para comerciar sem tarifas e estabelecer mais instalações em Constantinopla eram uma causa inveterada dos mercadores venezianos."
 ep3_travel_events.3002.vlach: "Estou pensando nas carnes e nos queijos de ovelha valacos, na sua hospitalidade efusiva. Os nômades [local_lord.Custom('ES_DelDela')] [local_lord.GetTitleAsNameNoTooltip|l] foram outrora ferozes [Glossary( 'dacios', 'DACIANS_GLOSS' )], dizem, até que um romano chegou à sua porta."
 DACIANS_GLOSS: "#bold Dacianos#!: habitantes antigos das terras próximas às montanhas da Cárpatos, a oeste do Mar Negro. Após a conquista de Trajano, foram por um curto período integrados ao império como Dácia Romana."
 ep3_travel_events.3002.generic: "Dada a ligação entre nossos povos, é esperado que eu apareça diante de magnatas como esses, impressionando-os com a virtude [ROOT.Char.GetCulture.GetNameNoTooltip]..."
 insulted_by_visiting_emperor: "Os insultos de um Basileus visitante"
 honored_by_visiting_emperor: "Ligações históricas honradas por um Basileus viajante"
 ep3_travel_events.3002.a: "Que contemplem uma[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom('GetDaughterSon')] do império!"
 ep3_travel_events.3002.a_byzantine: "Venho como um filho de Roma poderosa."
 ep3_travel_events.3002.a.flavor: "Uma visita impressionante pode consolidar minha reputação entre esse povo... e em casa."
 ep3_travel_events.3002.b: "Visitarei sua [local_lord.GetFaith.HouseOfWorshipPlural] local."
 ep3_travel_events.3002.b.flavor: "Um bom meio de evitar formalidades... só preciso ignorar quaisquer diferenças religiosas."
 ep3_travel_events.3002.c: "Esses provincianos apreciam calor e humildade."
 ep3_travel_events.3002.c_foreign: "Esses estrangeiros apreciam calor e humildade."
 cultural_acceptance_loss_insulted_by_visiting_emperor: "Os insultos de um Imperador visitante"
 cultural_acceptance_gain_honored_by_visiting_emperor: "O respeito de um Imperador visitante"
 impressive_visit_vassalization_acceptance_bonus: "[local_lord.GetShortUIName] aumentou #V $offer_vassalization_interaction$#! Aceitação por #V 5 anos#!"
 ep3_travel_events.3002.a_success: "[local_lord.Custom('ES_ElLa')|U] [local_lord.GetTitleAsNameNoTooltip|l] fica pasmado[local_lord.Custom('ES_OA')]"
 ep3_travel_events.3002.a_failure: "[local_lord.Custom('ES_ElLa')|U] [local_lord.GetTitleAsNameNoTooltip|l] zomba da minha pompa"
 ep3_travel_events.3010.t: "Silêncio Anatoliano"
 ep3_travel_events.3010: "Nossos chamados ecoam em becos de vilarejos desertos, buscando, lamentosamente, até mesmo um murmúrio, até mesmo um balido de boas-vindas. Somente o vento responde.\n\n"
 ep3_travel_events.3010.fairy_towers: "\"Aqueles monólitos malucos, as antigas torres-fada de [current_location.GetName]: seus buracos abrigam portas trancadas,\" murmuram meus companheiros."
 ep3_travel_events.3010.normal_holes: "\"Encolhidos em algum buraco, algum túnel, algum esconderijo no topo da colina,\" murmuram meus companheiros."
 ep3_travel_events.3010.native_knowledge: "\"Essas pessoas aprenderam há muito tempo a se esconder em tempos difíceis, dos [Glossary( 'ghazis', 'GHAZIS_GLOSS' )], nômades... e provavelmente nos confundiram com algo ainda pior: os odiados coletores de impostos.\""
 ep3_travel_events.3010.foreigners: "\"Esses povos aprenderam há muito tempo a enfrentar tempos difíceis fazendo-se escassos. E parece que nos confundiram com um grupo de saqueadores.\""
 GHAZIS_GLOSS: "#bold Ghazis#! são guerreiros muçulmanos que participam de expedições militares contra não-muçulmanos. Durante o Califado Rashidun, os saques #EMP ghazi#! na Anatólia ocorreram com uma devastadora frequência e escopo."
 ep3_travel_events.3010.a: "Vamos saquear suas casas, sem oposição!"
 ep3_travel_events.3010.a.flavor: "Talvez alguns trinkets esquecidos; talvez algumas cabras perdidas para levar! Não parece que haja alguém aqui para ver."
 ep3_travel_events.3010.b: "Farei com que eles saiam: precisamos de alguma experiência local."
 ep3_travel_events.3010.b.flavor: "Alguma hospitalidade seria boa; um guia local para nos levar por essas terras áridas, ainda melhor."
 ep3_travel_events.3010.c: "O silêncio... é bem agradável."
 ep3_travel_events.3010.c_fairy_towers: "Estranho, vasto, silencioso... mas bonito."
 ep3_travel_events.3010.c.flavor: "Sem plebeus barulhentos, sem gado ruidoso... se ao menos todo o mundo fosse assim."
 ep3_travel_events.3010.a_success: "Você consegue alguns bens esquecidos"
 ep3_travel_events.3010.a_failure: "Você não encontra nada que valha a pena pegar"
 ep3_travel_events.3010.b_success: "Você encontra e garante ajuda local"
 ep3_travel_events.3010.b_failure: "Você grita no silêncio"
 ep3_guide_from_the_borderlands_modifier: "Guia da Selva Anatoliana"
 ep3_guide_from_the_borderlands_modifier_desc: "A cautela sábia de um ranger do difícil interior anatoliano guia este personagem em suas viagens."
