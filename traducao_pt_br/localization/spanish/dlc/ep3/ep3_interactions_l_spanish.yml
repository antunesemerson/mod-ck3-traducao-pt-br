 ep3_interactions_events.0102.desc: "Meu mandato como voss[ROOT.Char.Custom('ES_OA')] [ROOT.Char.Custom('KnightCultureNoTooltip')|l] terminou. Espero que nos encontremos novamente, do mesmo lado do campo de batalha."
