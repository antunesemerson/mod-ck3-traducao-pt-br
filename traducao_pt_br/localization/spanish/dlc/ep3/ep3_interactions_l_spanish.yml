 ep3_interactions_events.0620.opening: "Fervente [actor.GetFirstName],"
 ep3_interactions_events.0620.desc_byz: "Em Sua igreja, nosso Senhor colocou apóstolos, professores, trabalhadores de milagres, aqueles dotados para o governo... e com uma diversidade de línguas.\n\nEstas, nossas vozes sagradas, falarão em favor da [actor.GetHouse.GetName]."
 ep3_interactions_events.0620.desc: "Há maneiras de mover montanhas além do poder secular, e meios de exercer poder além da vulgaridade secular.\n\nPara a salvação eterna, voltemos-nos para [recipient.GetFaith.HighGodName]. Para a libertação terrena, sua família pode confiar no apoio de nossos ministros [recipient.GetFaith.GetAdherentNamePlural]."
 ep3_hof_ask_for_influence_interaction_desc: "Peça a [recipient.GetShortUIName] para conceder ajuda política, gastando [piety|lE] para ganhar [influence|lE] para você e sua [house|lE]"
 ep3_interactions_events.0620.a: "Juntos, por uma causa justa!"
 ep3_interactions_events.0620.b: "#EMP [recipient.GetFaith.PriestNeuterPlural|U]!#! Não há melhores políticos."
 ep3_interactions_events.0620.c: "Parece que minhas orações serão atendidas."
 ep3_interactions_events.0621.opening: "Ó criança perniciosa,"
 ep3_interactions_events.0621.desc: "Você pediria àqueles cujas mentes devem estar na salvação, cujo trabalho é pastorear e ensinar, que se intrometam nos assuntos mundanos em seu nome?\n\nImpertinência vergonhosa!"
 ep3_interactions_events.0621.a: "Bah! Como se suas mãos piedosas estivessem limpas!"
 depose_governor_lose_titles_tt: "@warning_icon! #X Você perde o [recipient.GetPrimaryTitle.GetName] e todos os outros [titles|lE] concedidos#!"
 ep3_interactions_events.0630.opening: "M [recipient.GetTitleAsName|l] do [recipient.GetPrimaryTitle.GetNameNoTier],"
 ep3_interactions_events.0630.desc_family: "Eu ordenei sua remoção do cargo. Para nós, escionistas de [actor.GetHouse.GetName], não é mais vantajoso que você governe o [recipient.GetPrimaryTitle.GetNameNoTooltip].\n\nPor favor, pense em seu dever para com seu clã e entregue seu bastão de ofício sem ressentimentos. Sua família espera por você em [actor.GetCapitalLocation.GetTitle.GetNameNoTier]."
 ep3_interactions_events.0630.desc_spite: "Pelas leis do nosso grande [actor.GetPrimaryTitle.GetTierAsName], o governo é concedido apenas pela minha vontade e retirado ao meu bel-prazer.\n\nDe imediato, vocês se retirarão dos cargos de [recipient.GetPrimaryTitle.GetNameNoTooltip]. Renunciem a todo poder. Esqueçam o que eram.\n\nVos[actor.Custom('ES_OA')] sabi[actor.Custom('ES_OA')] e misericordios[actor.Custom('ES_OA')] [actor.GetTitleAsName|l] vos ordena."
 ep3_interactions_events.0630.desc_guilt: "Com pesar e lágrimas, ordeno que renuncie ao seu cargo. Você serviu bem e com diligência ao [actor.GetPrimaryTitle.GetTierAsName], mas já não será mais possível continuar a partir da sede do [recipient.GetPrimaryTitle.GetTierAsNameNoTooltip] que esteve sob sua responsabilidade.\n\nPor favor, confie que esta é a vontade de [recipient.GetFaith.HighGodName], assim como a ordem de voss[actor.Custom('ES_OA')] [actor.GetTitleAsName|l]."
 ep3_interactions_events.0630.desc: "Com o apoio de todo o palácio, por meio desta encerro vosso período como [recipient.GetTitleAsNameNoTooltip|l]. Devereis renunciar a todos os títulos que possuís, juntamente com as rendas e as honrarias do cargo.\n\nPor todo o vosso labor em serviço de [recipient.GetPrimaryTitle.GetTierAsNameNoTooltip] e [actor.GetPrimaryTitle.GetTierAsName], vosso povo e vosso soberano agradecem-vos."
 ep3_interactions_events.0630.a: "#EMP Fui roubado! Fui humilhado!#!"
 ep3_interactions_events.0630.b: "Uma vez nomeado, e agora demitido."
 ep3_interactions_events.0630.c: "No [actor.GetPrimaryTitle.GetTierAsNameNoTooltip], a roda do destino gira sempre..."
