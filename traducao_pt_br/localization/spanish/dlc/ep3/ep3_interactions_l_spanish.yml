 scheme_critical_moments.1162.t: "$scheme_critical_moments.1132.t$"
 scheme_critical_moments.1162.desc: "A culminação de meses de intrigas meticulosas finalmente se desenrolou quando [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l] renunciou ao cargo de governador[target.Custom('ES_XA')] de [highest_title.GetName].\n\nRumores espalhados habilmente e provas convenientemente plantadas mancharam sua reputação de forma irreparável e [target.GetSheHe] não teve outra escolha senão se afastar espontaneamente."
 scheme_critical_moments.1162.desc_discovered: "\n\nÉ claro para todos que só eu tive o poder e a influência para fazer isso acontecer, mas [target.GetSheHe] dificilmente está em posição de fazer algo sobre esse conhecimento."
 scheme_critical_moments.1162.desc_secret: "\n\nClaro, um impulso tão poderoso não poderia ter vindo de ninguém além de mim e, no entanto, [target.Custom('ES_ElLa')] [target.GetTitledFirstNameNoTooltip|l] não tem nada com que comprovar suas suspeitas."
 scheme_critical_moments.1162.a: "Está feito."
 scheme_critical_moments.1162.tt: "[target.GetShortUIName] [Select_CString( target.IsLocalPlayer, 'renunciou', 'renunciou' )] e deixou o cargo de governador[target.Custom('ES_XA')] em favor de [Select_CString( new_governor.IsLocalPlayer, 'você', new_governor.GetShortUIName )]"
 scheme_critical_moments.1163.t: "$scheme_critical_moments.1133.t$"
 scheme_critical_moments.1163.desc: "Apesar dos meus esforços para semear dúvidas por meio de rumores cuidadosamente plantados e provas forjadas, o carisma [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] e seus leais apoiadores [target.Custom('ES_LeLa')] os protegeu de qualquer tempestade iminente."
 scheme_critical_moments.1163.desc_discovered: "\n\nAlém disso, [target.GetSheHe] foi tornado plenamente ciente de que todo o complô veio de mim."
 scheme_critical_moments.1163.desc_secret: "\n\n[target.GetSheHe|U] segue em pé, com sua reputação intacta, aparentemente alhei[target.Custom('ES_OA')] à intriga que buscou miná[Custom('ES_LoLa')]."
 scheme_critical_moments.1163.tt: "Descoberta de [scheme.GetName|l]"
 scheme_critical_moments.1163.tt.desc: "[scheme.GetOwner.GetShortUIName] tentou forçá-lo a renunciar, mas falhou!"
 scheme_critical_moments.1163.a: "Deve haver outra maneira."
 scheme_critical_moments.1164.t: "Forçado a Renunciar"
 scheme_critical_moments.1164.desc: "Sussurros de suspeita, insinuações de todo tipo de malfeitos, corrupção e até traição da minha parte vêm se arrastando pela corte há meses, lançando sombras sobre minha reputação como Governador[ROOT.Char.Custom('ES_XA')].\n\nDói-me admitir, mas eles conseguiram. À luz das provas contundentes e comprometedoras que surgiram contra mim — apesar de sua falsidade mal disfarçada —, vejo-me forçado a deixar meu papel público."
 scheme_critical_moments.1164.desc_discovered: "\n\nSei que por trás da minha queda está nada mais nada menos que [owner.Custom('ES_ElLa')] [owner.GetTitledFirstName|l]. Pode ser que não seja hoje, mas juro que um dia vou me vingar."
 scheme_critical_moments.1164.desc_secret: "\n\nPoucos poderiam exercer tal influência sobre a opinião pública, então tenho minhas suspeitas sobre o cérebro por trás da minha queda, mas não tenho provas para apoiar minhas alegações."
 scheme_critical_moments.1164.a: "Eu voltarei."
