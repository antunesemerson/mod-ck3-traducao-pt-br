 ep3_interactions_events.0121.opening: "[laamp.Custom2('AppropriateGreetingPositive', employer)]"
 ep3_interactions_events.0121.desc: "A luta finalmente acabou, e nosso contrato foi cumprido.\n\nAgora é hora de saldar sua dívida com [laamp_temp.GetPrimaryTitle.GetNameNoTooltip]!"
 ep3_interactions_events.0121.a: "Eu não poderia ter feito isso sem você."
 ep3_interactions_events.0121.b: "É um pouco demais, não é?"
 ep3_interactions_events.0121.c: "Não posso pagar isso agora."
 ep3_interactions_events.0122.opening: "[employer.Custom2('AppropriateGreeting', laamp)]"
 ep3_interactions_events.0122.desc: "Você lutou bem em minhas guerras."
 ep3_interactions_events.0122.desc_accept: "Você ganhou cada moeda que concordamos."
 ep3_interactions_events.0122.desc_pay_less: "No entanto, neste momento, só posso lhe dar tanto quanto eu tenho."
 ep3_interactions_events.0122.desc_not_pay: "No entanto, não posso lhe pagar nada mais do que já lhe dei."
 ep3_interactions_events.0122.a: "Recomendo meus serviços no futuro."
 ep3_interactions_events.0122.b: "Um pouco mesquinho, mas eu aceito."
 ep3_interactions_events.0122.c: "Isso é um escândalo! Que [employer.Custom2('InsultNoun', ROOT.Char)]!"
