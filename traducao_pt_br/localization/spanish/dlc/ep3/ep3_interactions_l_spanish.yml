 ep3_interactions_events.0611.opening: "Nobre vagabundo,"
 ep3_interactions_events.0611.desc: "Devo recusar seu pedido. Temo que a vida em [recipient.GetCapitalLocation.GetTitle.GetNameNoTier] não lhe conviesse... e as sutilezas do meu clima político ainda menos.\n\nDespreze a ideia de um escritório empoeirado em uma propriedade tranquila, eu o exorto — valorize a poeira da estrada em suas botas."
 ep3_interactions_events.0611.a: "Valorize seu conforto, você cobra."
