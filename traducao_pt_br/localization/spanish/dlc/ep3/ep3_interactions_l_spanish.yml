 force_step_down_interaction: "Forçar Aposentadoria"
 force_step_down_desc: "Utiliza [influence|lE], um [hook|lE] ou um [secret|lE] para obrigar [TARGET_CHARACTER.GetShortUIName] a renunciar à sua [governorship|lE]."
 FORCE_STEP_DOWN_SUCCESS_DESC: "[TARGET_CHARACTER.GetShortUIName] renunciará ao seu [governorship|lE] e será [TARGET_CHARACTER.Custom('ES_LeLa')] substituído."
 FORCE_STEP_DOWN_PROPOSAL: "Está na hora de você renunciar ao cargo de [target.GetBaseName]. Você está completamente incapaz para o trabalho e vou garantir que você não governe mais lá."
