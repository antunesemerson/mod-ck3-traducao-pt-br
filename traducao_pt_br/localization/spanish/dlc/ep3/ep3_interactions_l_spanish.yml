 ep3_interactions_events.0610.t: "Uma Casa para [ROOT.Char.GetHouse.GetNameNoTooltip]"
 ep3_interactions_events.0610.desc: "[emperor.GetPrimaryTitle.GetName|U]. Onde burocratas riscam leis entediantes, onde bocas pintadas sussurram entre maravilhas palacianas... e onde comprei uma bela propriedade.\n\n"
 ep3_interactions_events.0610.desc_emperor: "Pela benevolência de [emperor.Custom('ES_DelDela')] [emperor.GetTitledFirstNameRegnal|l] em pessoa, me foi concedido um lugar aqui, aninhado no alvoroço da grande [emperor.GetCapitalLocation.GetTitle.GetNameNoTier]."
 ep3_interactions_events.0610.desc_governor: "O apoio de [recipient.GetName] me permite acessar seu mundo político, me faz sentir bem-vind[ROOT.Char.Custom('ES_OA')] em sua [recipient.GetCapitalLocation.GetTitle.GetNameNoTier] provincial."
 ep3_interactions_events.0610.desc_conversion: "E, para grande prazer dele/dela, fui recém-ungid[ROOT.Char.Custom('ES_OA')] como novo membro do mundo [ROOT.Char.GetFaith.GetAdherentName]."
 ep3_interactions_events.0610.desc_emperor_outro: "\n\nÉ pouco provável que a minha nov[emperor.Custom('ES_OA')] soberan[emperor.Custom('ES_OA')], que detém poder sobre todas as honras e todos os cargos de seu [emperor.GetPrimaryTitle.GetTierAsNameNoTooltip], se esqueça de que eu, [Select_CString( ROOT.Char.IsFemale, 'a mais nova', 'o mais novo' )] residente da capital, sou agora sua criatura."
 ep3_interactions_events.0610.desc_non_governor_outro: "\n\nEntão estou em dívida com [recipient.Custom('ES_ElLa')] [recipient.GetTitledFirstNameNoTooltip|l], sim… mas é [emperor.GetFirstNameRegnal] perante quem me rebaixarei, pois a administração [emperor.Custom('ES_DelDela')] [emperor.GetTitleAsNameNoTooltip] controla tudo."
 ep3_interactions_events.0610.a: "Não serei um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetLadyLord] com terras… mas tenho novas perspectivas."
