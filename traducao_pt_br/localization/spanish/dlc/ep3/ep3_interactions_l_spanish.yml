 ep3_interactions_events.0101.t: "Pedido de Patrono: Alugar um [recipient.Custom('KnightCultureNoTooltip')|l]"
 ep3_interactions_events.0101.desc: "\"Pensando em quem posso dispensar…\", diz [recipient.GetName]. \"Escolhi cuidadosamente alguns dos meus [recipient.Custom('KnightCulturePluralNoTooltip')|l] mais inquietos. Apresentem-se!\".\n\n"
 ep3_interactions_events.0101.desc_knight_1_trait: "“Sou um[knight_to_rent_1.Custom('ES_XA')] [cool_trait_1.GetName(knight_to_rent_1)|l] de renome!”, gaba-se [knight_to_rent_1.GetName].\n\n"
 ep3_interactions_events.0101.desc_knight_1: "“Isso fala por si só!”, e [knight_to_rent_1.GetName] flexiona os músculos.\n\n"
 ep3_interactions_events.0101.desc_knight_2_trait: "\"Escolhei-me, e serei [cool_trait_2.GetName(knight_to_rent_2)] de vossa confiança!\", grita [knight_to_rent_2.GetName].\n\n"
 ep3_interactions_events.0101.desc_knight_2: "\"Serei seu melhor [ROOT.Char.Custom('KnightCultureNoTooltip')|l]!\", afirma [knight_to_rent_2.GetName] com entusiasmo.\n\n"
 ep3_interactions_events.0101.desc_knight_3_trait: "\"Sabe-se que sou um[knight_to_rent_3.Custom('ES_XA')] grande [cool_trait_3.GetName(knight_to_rent_3)|l]!\", declara [knight_to_rent_3.GetName] com confiança."
 ep3_interactions_events.0101.desc_knight_3: "\"Sou um lutador excepcional.\" se gaba confiantemente [knight_to_rent_3.GetName]."
 ep3_interactions_events.0101.a: "Gosto da confiança de [knight_to_rent_1.GetNameNoTooltip]!"
 ep3_interactions_events.0101.b: "Vou compartilhar grandes vitórias com [knight_to_rent_2.GetNameNoTooltip]!"
 ep3_interactions_events.0101.c: "[knight_to_rent_3.GetNameNoTooltip] parece promissor!"
 ep3_interactions_events.0101.d: "Não estou impressionado."
