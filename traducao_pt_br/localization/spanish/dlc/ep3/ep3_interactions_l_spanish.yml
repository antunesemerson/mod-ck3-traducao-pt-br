 ep3_interactions_events.0111.t: "Negociar Entrada nas Guerras"
 ep3_interactions_events.0111.desc: "Tenho curiosidade pela oferta de [actor.GetName] e seria uma honra ficar ao lado de seus porta-estandartes.\n\nNo entanto, algumas moedas de ouro não são suficientes para arriscar a vida dos meus bravos seguidores. Eu deveria pedir mais!"
 ep3_interactions_events.0111.a: "Talvez seja hora de me estabelecer em... [new_primary_title.GetNameNoTierNoTooltip]?"
 ep3_interactions_events.0111.b: "Eu quero [actor_artifact.GetNameNoTooltip]."
 ep3_interactions_events.0111.c: "Vamos fazer disso uma aliança oficial."
 ep3_interactions_events.0111.d: "Forçar[actor.GetHerHim] a ser meu $game_concept_contact_list_contact$!"
 ep3_interactions_events.0111.e: "Precisamos de provisões!"
 ep3_interactions_events.0111.f: "Na verdade, eu não quero me juntar de jeito nenhum."
 ep3_interactions_events.0111.refuse_5_years: "Trabalho mercenário não me interessa."
