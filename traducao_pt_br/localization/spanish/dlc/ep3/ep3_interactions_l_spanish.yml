 ep3_interactions_events.0030.t: "Fruto da Árvore [actor.GetHouse.GetNameNoTooltip]"
 ep3_interactions_events.0030.desc.intro: "Enquanto abraço a minha [actor.Custom2('RelationToMe', SCOPE.sC('recipient'))] [recipient.GetFirstName], se estremece.\n\n\"Pense no seu futuro\","
 ep3_interactions_events.0030.desc.child_address: "diz meu regente"
 ep3_interactions_events.0030.desc.normal_address: "Eu sussurro,"
 ep3_interactions_events.0030.desc.greek: "\"como um [Glossary( 'vestes', 'VESTES_GLOSS')], um [Glossary( 'patrikios', 'PATRIKIOS_GLOSS')] — talvez até mesmo o [Glossary( 'parakoimomenos', 'PARAKOIMOMENOS_GLOSS')] imperial! Uma vez que você esteja livre dos desejos e aspirações da masculinidade, como será confiável! [recipient.GetFirstNameNoTooltip], você deixará sua família tão orgulhosa.\"\n\n"
 ep3_interactions_events.0030.desc.non_greek: "\"como um camareiro, um senescal — talvez até um poderoso regente! Uma vez que você esteja livre dos desejos e aspirações da masculinidade, como será confiável! [recipient.GetFirstNameNoTooltip], você deixará sua família tão orgulhosa.\"\n\n"
 ep3_interactions_events.0030.desc.accepted_child: "O garotinho me observa nos olhos de forma fraca, chorosa, amorosa.\n\n"
 ep3_interactions_events.0030.desc.accepted_youth: "Mordendo os dentes, apertando os olhos cheios de lágrimas, o jovem acena uma vez.\n\n"
 ep3_interactions_events.0030.desc.child_resents_castration: "Essas palavras não fazem nada. O garotinho grita em pânico, tenta desesperadamente se afastar.\n\n"
 ep3_interactions_events.0030.desc.resents_castration: "Minhas palavras não fazem nada. O garotinho grita em pânico, tenta desesperadamente se afastar.\n\n"
 ep3_interactions_events.0030.desc: "Atrás de nós, meu médico afia uma lâmina."
 VESTES_GLOSS: "Um prestigioso título da corte bizantina relacionado ao vestuário imperial, disponível tanto para portadores com barba quanto para eunucos."
 PATRIKIOS_GLOSS: "O título de #bold patrikios#! — patrício — ainda era usado nos tempos bizantinos para conferir honra ao seu portador."
 PARAKOIMOMENOS_GLOSS: "\"Aquele que dorme ao lado da câmara do Imperador,\" o #bold parakoimomenos#! é um ministro imperial altamente influente e invariavelmente um eunuco."
 ep3_interactions_events.0030_callous: "Alguma semente se perde, mas ramos frutíferos permanecem..."
 ep3_interactions_events.0030_kind: "Uma vida de serviço começa com isso."
 family_castration_memory: "Eunuco por Vínculo Familiar"
 family_castration_memory_desc: "Fui castrado por ordem do meu [owner.Custom2('RelationToMe', SCOPE.sC('castrator'))] do meu [castrator.Custom('ES_ElLa')] [castrator.GetTitledFirstName|l]"
 family_castration_memory_desc_second_perspective: "você foi castrado por ordem de seu [owner.Custom2('RelationToMe', SCOPE.sC('castrator'))][castrator.Custom('ES_ElLa')] [castrator.GetTitledFirstName|l]"
 family_castration_memory_desc_third_perspective: "foi castrado [owner.Custom('ES_AlAla')] [owner.GetTitledFirstName|l] por ordem de seu [owner.Custom2('RelationToMe', SCOPE.sC('castrator'))], [castrator.Custom('ES_ElLa')] [castrator.GetTitledFirstName|l]"
 ep3_interactions_events.0030.bad_castration.t: "Castracão Desajeitada"
 ep3_interactions_events.0030.bad_castration: "[recipient.GetFirstNameNoTooltip] ficou gravemente ferid[recipient.Custom('ES_OA')] e mal tratad[recipient.Custom('ES_OA')]."
 ep3_interactions_events.0030.good_castration.t: "Castracão Elegante"
 ep3_interactions_events.0030.good_castration: "A ferida de [recipient.GetFirstNameNoTooltip] deve cicatrizar bem"
 castrate_child_interaction_extra_icon: "@weak_hook_icon! [hook|E] disponível"
 family_castration_fled_memory: "Fugiu da Castração"
 family_castration_fled_memory_desc: "fugi de casa quando meu [owner.Custom2('RelationToMe', SCOPE.sC('castrator'))], [castrator.Custom('ES_ElLa')] [castrator.GetTitledFirstName|l], ordenou que eu fosse castrado"
 family_castration_fled_memory_desc_second_perspective: "você fugiu de sua casa quando seu [owner.Custom2('RelationToMe', SCOPE.sC('castrator'))], [castrator.Custom('ES_ElLa')] [castrator.GetTitledFirstName|l], tentou te castrar"
 family_castration_fled_memory_desc_third_perspective: "[owner.Custom('ES_ElLa')] [owner.GetTitledFirstName|l] fugiu de casa quando seu [owner.Custom2('RelationToMe', SCOPE.sC('castrator'))], [castrator.Custom('ES_ElLa')] [castrator.GetTitledFirstName|l], tentou fazer com que [owner.GetHerHim] fosse castrado"
 ep3_interactions_events.0031.t: "Fugiu Antes da Lâmina"
 ep3_interactions_events.0031.desc: "Nos aposentos de [recipient.GetFirstName], há roupas e pertences espalhados pelo chão, mas o garoto não está. Meus funcionários vasculham as ruas, mas meu [actor.Custom2('RelationToMe', SCOPE.sC('recipient'))] não está em lugar nenhum!\n\nO jovem tolo, sem respeito pela minha autoridade, por nossos #EMP costumes#!, fugiu ao primeiro sussurro da minha intenção.\n\nOnde, em todo [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTier], poderia estar se escondendo [recipient.GetFirstName]? Talvez em algum beco escuro, agarrando com força sua preciosa virilidade..., o prêmio protegido que lhe rendeu o exílio."
 ep3_interactions_events.0031.a: "Vou cortar os testículos daquele garoto! #EMP ENCONTRE-O!#!"
 ep3_interactions_events.0031.a_success: "[recipient.GetFirstNameNoTooltip] é encontrad e castrad"
 ep3_interactions_events.0031.a_failure: "[recipient.GetFirstNameNoTooltip] escapa dos seus buscadores"
 ep3_interactions_events.0031_callous: "Um filhote que não se importa com sacrifícios. Boa viagem!"
 ep3_interactions_events.0031_kind: "Talvez eu o tenha julgado mal..."
