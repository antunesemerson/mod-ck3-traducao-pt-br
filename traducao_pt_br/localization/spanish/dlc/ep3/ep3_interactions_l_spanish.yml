 ep3_laamps.0401.t: "$seize_realm$: [Select_CString(ROOT.Char.GetLiege.IsFemale, 'a nova', 'o novo' )] [ROOT.Char.GetTitleAsNameNoTooltip|l]"
 ep3_laamps.0401.desc: "Os planos foram revisados e reexaminados, toda eventualidade foi prevista e cada conspirador preparado. Invadir tal [target.Custom('ResidenceBuilding')|l] foi fácil o suficiente sob o pretexto de emprego…\n\nReinou o caos quando o alarme foi dado, mas na confusão e no corpo a corpo, por fim emergimos, exaustos, porém vitoriosos!\n\n"
 ep3_laamps.0401.imprison: "Trago diante de mim aquele/aquela [target.Custom2('InsultAdjective', ROOT.Char)] e fals[target.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], [target.GetFirstName], no próprio salão do trono, meu prisioneir[target.Custom('ES_OA')] para fazer o que me der na telha!"
 ep3_laamps.0401.death: "Essa espécie de [target.Custom2('InsultAdjective', ROOT.Char)] e fals[target.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], [target.GetFirstName] — fraco demais para a própria coroa — jaz mort[target.Custom('ES_OA')]."
 ep3_laamps.0401.outro: "Não sei como conseguiu escapar essa espécie de [target.Custom2('InsultAdjective', ROOT.Char)] e fals[target.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], [target.GetFirstName], mas é uma ameaça à minha posição enquanto permanecer livre."
 ep3_laamps.0401.a: "[ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] é #EMP meu#!!"
 ep3_laamps.0402.t: "$seize_realm$: Esperanças Desfeitas"
 ep3_laamps.0402.desc: "Meus planos meticulosamente traçados deram terrivelmente errado quase desde o começo. Tomar uma coroa é mais difícil do que eu imaginava…\n\nApenas conseguimos chegar ao/à [target.Custom('ResidenceBuilding')|l] [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] antes que guardas surgissem do nada e nos cercassem, pois nossos intentos hostis haviam sido revelados."
 ep3_laamps.0402.imprison: "Lutamos com ferocidade, mas fomos rapidamente cercados.\n\nAlgemad[ROOT.Char.Custom('ES_OA')], sou arrastado perante [target.Custom('ES_ElLa')] [target.GetTitleAsNameNoTooltip|l], que deixa clara sua fúria…"
 ep3_laamps.0402.death: "Lutamos com afinco, mas logo fomos cercados.\n\nAo me virar para correr, vejo que não há escape, e soldados correm em minha direção, espadas erguidas!"
 ep3_laamps.0402.outro: "Lutamos com ferocidade e tivemos sorte de sair vivos.\n\n[target.GetFirstNameRegnal] continua sendo [target.GetTitleAsNameNoTooltip|l] de [target.GetPrimaryTitle.GetNameNoTier], muito confort[target.Custom('ES_OA')] e em segurança em sua [target.Custom('ResidenceBuilding')|l], e não tenho dúvida de que deseja que me capturem rapidamente…"
 ep3_laamps.0402.a: "Damn you, eu estava #EMP tão perto#!"
 ep3_laamps.0402.b: "Maldita fortuna..."
 ep3_laamps.0402.c: "Ora essa!"
 ep3_laamps.0410.t: "$seize_realm$: Coroa Roubada"
 ep3_laamps.0410.desc: "O que começou como um dia normal em [target.GetCapitalLocation.GetBaronyNameExplicitly] deu uma guinada repentina e sinistra. Meu [target.Custom('ResidenceBuilding')|l] se enche dos gritos desesperados de guardas e servos correndo pelos corredores.\n\nPor fim, um sargento ofegante explica que um grupo de rufiões entrou sob falsos pretextos e está lutando para abrir caminho até a sala do trono!\n\n"
 ep3_laamps.0410.imprison: "Uns soldados arrombam a porta e logo sou arrastad[ROOT.Char.Custom('ES_OA')] perante seu líder, [owner.GetFirstName], que ergue minha coroa em deleite."
 ep3_laamps.0410.death: "Ao tentar fugir, me vejo enredad[ROOT.Char.Custom('ES_OA')] em um combate caótico, e uma lâmina se dirige a mim!"
 ep3_laamps.0410.outro: "Escapo pelos aposentos dos servos, disfarçando-me de um[ROOT.Char.Custom('ES_XA')] plebeu[ROOT.Char.Custom('ES_OA')] e me junto à multidão em fuga de tal [target.Custom('ResidenceBuilding')|l]…"
 ep3_laamps.0410.a: "Eu voltarei!"
 ep3_laamps.0410.b: "Você, sapo nojento!"
 ep3_laamps.0410.c: "Maldição!"
 ep3_laamps.0411.t: "$seize_realm$: Coroa Cobiçada"
 ep3_laamps.0411.desc: "O que começou como um dia normal em [target.GetCapitalLocation.GetBaronyNameExplicitly] tomou um rumo repentino e sinistro. Minha [target.Custom('ResidenceBuilding')|l] se enche com os gritos estridentes de guardas e servos correndo pelos corredores.\n\nPor fim, um sargento ofegante explica que um grupo de malfeitores entrou sob falso pretexto e agora luta para abrir caminho até a sala do trono!\n\nMeus soldados logo põem a situação sob controle, e os ruídos da luta vão se extinguindo aos poucos."
 ep3_laamps.0411.imprison: "Arrastam até mim [owner.GetFirstName] um[owner.Custom('ES_XA')] ninguém sem terras, cujo plano de usurpar minha coroa pela força foi revelado."
 ep3_laamps.0411.death: "Arrastam diante de mim o cadáver de [owner.GetFirstName], um[owner.Custom('ES_XA')] ninguém sem terras, cujo plano de usurpar minha coroa à força foi um fracasso total."
 ep3_laamps.0411.outro: "Me dizem que [owner.GetFirstName] um[owner.Custom('ES_XA')] ninguém sem terras, liderou o ataque, buscando usurpar minha coroa à força. [owner.Custom('ES_ElLa')|U] o covarde já se foi há muito tempo."
 ep3_laamps.0411.a: "Você vai #EMP pagar#! por isso."
 ep3_laamps.0411.b: "[owner.GetFirstNameNoTooltip] descobriu o que acontece com [Select_CString(owner.IsFemale, 'as usurpadoras', 'os usurpadores' )]!"
 ep3_laamps.0411.c: "Desgraçado(a)[owner.Custom2('InsultNoun', ROOT.Char)]!"
