 seize_realm_desc: "Tentar tomar o [domain|lE] de [SCHEME.GetTargetCharacter.GetShortUINameNoTooltip] e muitos dos seus [vassals|lE]\n$seize_realm_warning$\n@warning_icon! #X Falhar nesta [scheme|lE] terá #bold consequências graves#!!"
