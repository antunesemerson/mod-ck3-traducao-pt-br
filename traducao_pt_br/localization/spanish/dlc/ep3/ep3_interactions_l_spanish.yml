 ep3_interactions_events.0112.desc_land: "[new_primary_title.GetName] e tornar-me vosso vassalo!"
 ep3_interactions_events.0112.desc_artifact: "[actor_artifact.GetName] do seu tesouro!"
 ep3_interactions_events.0112.desc_alliance: "uma aliança oficial!"
 ep3_interactions_events.0112.desc_provisions: "provisões para meu povo!"
