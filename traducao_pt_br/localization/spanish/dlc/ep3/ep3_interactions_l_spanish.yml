 SWITCH_FACTION_WAR_SIDES_NOTIFICATION_TEXT: "Vocês cometeram um erro ao tomar o partido de [secondary_recipient.GetShortUIName]… ainda não é tarde para se juntarem a mim e acabar com a sua ignomínia!"
 ep3_interactions_events.0810.desc: "Agora vejo que escolhi o lado errado nesta luta. Só espero não ter mudado de rumo tarde demais.\n\nQue nossos exércitos triunfem juntos contra [secondary_recipient.Custom('ES_ElLa')] [secondary_recipient.GetTitledFirstName|l]!"
 ep3_interactions_events.0810.a: "Excelente."
 ep3_interactions_events.0811.desc: "Não sou um traidor vira-casaca! Fizemos nossas escolhas e devemos viver com elas.\n\nSubmeta-se [secondary_recipient.Custom('ES_AlAla')] [secondary_recipient.GetTitledFirstName|l], antes que seja tarde demais…"
 ep3_interactions_events.0811.a: "Droga."
