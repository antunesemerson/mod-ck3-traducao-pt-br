 ep3_interactions_events.0800.desc: "Sua causa é justa! Juntos colocaremos [secondary_recipient.Custom('ES_AlAla')] [secondary_recipient.GetTitledFirstName|l] em seu devido lugar!\n\nMinhas forças estão se reunindo e em breve estarão prontas para marchar ao seu lado."
 ep3_interactions_events.0800.a: "Excelente."
