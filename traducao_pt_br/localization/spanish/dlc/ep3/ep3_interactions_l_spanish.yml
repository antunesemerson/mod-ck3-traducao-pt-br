 ep3_interactions_events.0600.c: "Meu grande defensor[supporter.Custom('ES_XA')] merece lealdade imperecível!"
 ep3_interactions_events.0600.c.flavor: "Comprometo-me com prazer a servi-lo diligentemente, da maneira que eu puder."
 ep3_interactions_events.0600.d: "Um presente com valor que só cresce: minha amizade."
 ep3_interactions_events.0600.e: "Envie-lhe algo reluzente."
 ep3_interactions_events.0600.f: "Quem?"
 ep3_interactions_events.0601.opening: "Meu [new_landed_admin.Custom2('RelationToMeShort', SCOPE.sC('supporter'))] e defensor[supporter.Custom('ES_XA')],"
 ep3_interactions_events.0601.desc: "Alguns dizem que, se não fosse por seu apoio ardente, a governança do [new_landed_admin.GetPrimaryTitle.GetNameNoTier] nunca teria se tornado minha.\n\n"
 ep3_interactions_events.0601.desc_repay: "Eles falam a verdade."
 ep3_interactions_events.0601.desc_scorn: "Estou incerto."
 ep3_interactions_events.0601.desc_ally: "Então, que sua defesa seja o primeiro ato de nossa longa e frutífera parceria! Você deseja apoio mútuo, não deseja?"
 ep3_interactions_events.0601.desc_insult: "Será que meu avanço foi organizado por algum homem da montanha inculto ou por uma criança idiota? Creio ter ouvido tais vozes [supporter.Custom2('InsultAdjective', ROOT.Char)] tagarelando meu nome."
 ep3_interactions_events.0601.desc_hook: "Tenho uma grande dívida com vós e, portanto, servirei diligentemente como [Select_CString( ROOT.Char.IsFemale, 'vossa amiga jurada', 'vosso amigo jurado' )]"
 ep3_interactions_events.0601.desc_friendship: "Enquanto me estabeleço neste [new_landed_admin.GetPrimaryTitle.GetTierAsNameNoTooltip], eu gostaria de lhe oferecer um presente de valor crescente: minha amizade."
 ep3_interactions_events.0601.desc_gift: "Que este presente, de alguma forma, retribua minha dívida para com você. E que [new_landed_admin.GetFaith.WealthGodName] cuide de você."
 ep3_interactions_events.0601.desc_ignore: "Esforcei-me #EMP muito#! para alcançar minha posição, conquistei-a com meu suor e minhas virtudes, e estou... bastante ofendid[ROOT.Char.Custom('ES_OA')] pelas insinuações em contrário."
 ep3_interactions_events.0601.a_repaid: "Uma nomeação muito digna para [new_landed_admin.Custom('ES_ElLa')] mais dign[new_landed_admin.Custom('ES_OA')]!"
 ep3_interactions_events.0601.a_scorned: "O jogo da política não é jogado assim, #EMP ingrato!#!"
 ep3_interactions_events.0601.b: "Sou [Select_CString( ROOT.Char.IsFemale, 'uma benfeitora', 'um benfeitor' )]! Um[ROOT.Char.Custom('ES_XA')] patron[ROOT.Char.Custom('ES_OA')]! Não sou parceir[ROOT.Char.Custom('ES_OA')] em igualdade!"
