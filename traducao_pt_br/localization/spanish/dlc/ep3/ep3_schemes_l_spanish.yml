 scheme_critical_moments.8002.t: "[scheme.GetNameNoTooltip]: Sucesso"
 scheme_critical_moments.8002.desc: "Após muita disputa, debate e pressão, as sementes que plantei cuidadosamente finalmente deram frutos. A dança languorosa entre a burocracia [owner.GetTopLiege.GetPrimaryTitle.GetAdjectiveNoTooltip] de [owner.Custom('ES_ElLa')] volúvel [owner.GetTopLiege.GetTitleAsNameNoTooltip|l] e os representantes de [target_title.GetNameNoTier] finalmente decidiu que, doravante, [target_title.GetTierAsNameNoTooltip] está sob a autoridade [ROOT.Char.GetPrimaryTitle.GetAdjective].\n\nAs patéticas tentativas [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] de se agarrar às minhas terras e resistir à minha ampla influência na corte foram totalmente inúteis."
 scheme_critical_moments.8002.a: "[target_title.GetNameNoTierNoTooltip] é #EMP meu#!."
 scheme_critical_moments.8003.t: "[scheme.GetNameNoTooltip]: Falha"
 scheme_critical_moments.8003.desc: "Apesar de minhas súplicas, favores e lisonjas cuidadosamente oferecidos, meus protestos acabaram caindo em ouvidos surdos…\n\nOs burocratas [owner.GetTopLiege.GetPrimaryTitle.GetAdjectiveNoTooltip], [owner.Custom('ES_ElLa')] volúvel [owner.GetTopLiege.GetTitleAsNameNoTooltip|l] só confirmaram as fronteiras atuais do [target.GetPrimaryTitle.GetTierAsNameNoTooltip] [owner.GetPrimaryTitle.GetAdjective] e o [target.GetPrimaryTitle.GetAdjective]…"
 scheme_critical_moments.8003.a: "Pah, não importa."
 scheme_critical_moments.8003.tt.failed: "[scheme.GetOwner.GetShortUIName] tentou disputar suas fronteiras, mas falhou!"
 scheme_critical_moments.8004.t: "Fronteira Disputada: [target_title.GetNameNoTierNoTooltip]"
 scheme_critical_moments.8004.desc: "Tenho acompanhado as notícias das intrigas sem vergonha [owner.Custom('ES_DelDela')] [owner.GetTitledFirstName|l] na corte imperial e observado com desgosto como sua influência e contatos davam crédito indevido à sua gananciosa jogada de poder.\n\nA decisão de hoje confirma o pior: doravante considera-se que [target_title.GetNameNoTier] é parte de [owner.GetPrimaryTitle.GetTierAsNameNoTooltip] de [owner.GetPrimaryTitle.GetNameNoTier]."
 scheme_critical_moments.8004.a: "E o [target.GetPrimaryTitle.GetNameNoTierNoTooltip], diminuído..."
