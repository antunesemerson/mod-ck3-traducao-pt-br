 scheme_critical_moments.1152.t: "$scheme_critical_moments.1132.t$"
 scheme_critical_moments.1152.desc: "Após analisar inúmeros tomos antigos, bajular, subornar e mentir para incontáveis burocratas, e forjar documentos, finalmente posso apresentar uma reivindicação convincente para [target.GetName]."
 scheme_critical_moments.1152.desc_discovered: "\n\nQue pena que não foi possível manter meu #EMP envolvimento#! em segredo, mas as evidências — falsas ou não — agora são abundantes demais para serem ignoradas."
 scheme_critical_moments.1152.desc_secret: "\n\nNinguém pareceu achar suspeito o surgimento repentino da minha #EMP reivindicação perfeitamente documentada#!."
 scheme_critical_moments.1152.a: "Excelente."
 scheme_critical_moments.1153.t: "$scheme_critical_moments.1133.t$"
 scheme_critical_moments.1153.desc: "Não importa quantas pessoas eu suborne ou documentos que eu forge, parece que minha reivindicação a [target.GetName] continua soando inverossímil para a maioria."
 scheme_critical_moments.1153.desc_discovered: "\n\nTambém se tornou de conhecimento comum que eu estava me esforçando um pouco demais."
 scheme_critical_moments.1153.desc_secret: "\n\nPelo menos, ninguém saberá do meu fracasso."
 scheme_critical_moments.1153.a: "Decepcionante."
