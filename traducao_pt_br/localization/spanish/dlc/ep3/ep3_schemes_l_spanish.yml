 scheme_critical_moments.8032.t: "[scheme.GetNameNoTooltip]: Sucesso"
 scheme_critical_moments.8032.desc: "Ao amanhecer, finalmente chegam notícias da propriedade de [target.GetHouse.GetBaseName] em [target_domicile.GetLocation.GetBaronyNameExplicitlyNoTooltip], e a confirmação do nosso sucesso!\n\nPegamos completamente de surpresa esses [target.Custom2('InsultNounPlural', ROOT.Char)]"
 scheme_critical_moments.8032.kill: "e [flavor_victim.Custom('ES_ElLa')] [target.Custom2('RelationToMeShort', flavor_victim)] de [target.GetFirstNameNoTooltip], [flavor_victim.Custom('ES_ElLa')] [flavor_victim.GetTitledFirstName|l], jaz mort[flavor_victim.Custom('ES_OA')]; os sobreviventes terão de conviver com este fracasso…"
 scheme_critical_moments.8032.maim: "e [flavor_victim.Custom('ES_ElLa')] [target.Custom2('RelationToMeShort', flavor_victim)] de [target.GetFirstNameNoTooltip], [flavor_victim.Custom('ES_ElLa')] [flavor_victim.GetTitledFirstName|l], carregará as marcas desse fracasso pelo resto de seus dias…"
 scheme_critical_moments.8032.imprison: "e sem dúvida estarão procurando [flavor_victim.Custom('ES_AlAla')] [target.Custom2('RelationToMeShort', flavor_victim)|l] de [target.GetFirstNameNoTooltip], [flavor_victim.Custom('ES_ElLa')] [flavor_victim.GetTitledFirstName|l], às quais agora definha em grilhões!"
 scheme_critical_moments.8032.fallback: "e foram derrubados, para que todos [owner.GetTopLiege.GetPrimaryTitle.GetDefinitiveNameNoTooltip|l] testemunhem!"
 scheme_critical_moments.8032.permission: "\n\nTemos o apoio de [owner.GetTopLiege.Custom('ES_DelDela')] [owner.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip|l] e esses tolos não terão a quem recorrer…"
 scheme_critical_moments.8032.emperor: "\n\nSou [owner.GetTopLiege.Custom('ES_ElLa')] [owner.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip], e não podem fazer nada para me deter…"
 scheme_critical_moments.8032.crime: "\n\nPor desgracia, está claro que nossa implicação neste assunto não passou despercebida e [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l] se encarregará de que [owner.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip] como um todo conheça esta "traição de [owner.GetHouse.GetBaseName]"."
 scheme_critical_moments.8032.secret: "\n\nE, como benefício extra, parece que eles não sabem que estivemos por trás do ataque e, infelizmente, não podemos esfregar publicamente [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] esta vitória de [owner.GetHouse.GetBaseName]... ainda."
 scheme_critical_moments.8032.a: "Bah, que continue gritando."
 scheme_critical_moments.8032.a.secret: "Uma celebração é o que se pede!"
 scheme_critical_moments.8033.t: "[scheme.GetNameNoTooltip]: Falha"
 scheme_critical_moments.8033.desc: "O amanhecer finalmente traz notícias da propriedade de [target.GetHouse.GetBaseName] em [target_domicile.GetLocation.GetBaronyNameExplicitlyNoTooltip], embora não seja o que gostaríamos de ouvir…\n\nEsses [target.Custom2('InsultNounPlural', ROOT.Char)], não se sabe como, estavam preparados e frustraram o ataque de nossos infiltrados antes que pudessem causar qualquer dano."
 scheme_critical_moments.8033.captured: "\n\nParece que minha [owner.Custom2('RelationToMeShort', SCOPE.sC('captured'))] [captured.Custom('ES_ElLa')] [captured.GetTitledFirstName|l], foi capturad[captured.Custom('ES_OA')] na fuga e qualquer esperança de ocultar o envolvimento de [owner.GetHouse.GetBaseName] foi por água abaixo…"
 scheme_critical_moments.8033.discovered: "\n\nNo obstante, parece que, de algum modo, perceberam que [owner.GetHouse.GetBaseName] está por trás do ataque e clamarão por reparação…"
 scheme_critical_moments.8033.fallback: "\n\nAo menos podemos ficar tranquilos, pois parece que eles não estão cientes de nosso envolvimento nesta artimanha…"
 scheme_critical_moments.8033.secret: "\n\nApesar deste contratempo, parece que podemos ficar tranquilos sabendo que, até o momento, não suspeitam da Casa [owner.GetHouse.GetBaseName]."
 scheme_critical_moments.8033.a: "Toda aquela preparação... para #EMP nada#!!"
 scheme_critical_moments.8034.t.known: "Propriedade Raided: [owner.GetHouse.GetBaseNameNoTooltip] Ataque"
 scheme_critical_moments.8034.t: "Propriedade Raided: Assailantes Desconhecidos"
 scheme_critical_moments.8034.desc: "Ao amanhecer, rumores apressados de um ataque à propriedade familiar em [target_domicile.GetLocation.GetBaronyNameExplicitlyNoTooltip] chegam rapidamente até mim,"
 scheme_critical_moments.8034.success: "e meu coração para ao ouvir os relatos da destruição e dos ultrajes."
 scheme_critical_moments.8034.failure: "e suspiro aliviado ao confirmar que o ataque foi frustrado."
 scheme_critical_moments.8034.kill: "\n\nMe contam que meu [target.Custom2('RelationToMeShort', SCOPE.sC('flavor_victim'))|l]; [flavor_victim.Custom('ES_ElLa')] [flavor_victim.GetTitledFirstName|l], jaze mort[flavor_victim.Custom('ES_OA')] estraçalhad[flavor_victim.Custom('ES_OA')] como um animal por algum demônio…"
 scheme_critical_moments.8034.maim: "\n\nMe dizem que meu [target.Custom2('RelationToMeShort', SCOPE.sC('flavor_victim'))|l][flavor_victim.Custom('ES_ElLa')] [flavor_victim.GetTitledFirstName|l], sobreviveu por pouco a uma experiência tão horrível, mas ficou horrivelmente mutilad[flavor_victim.Custom('ES_OA')]…"
 scheme_critical_moments.8034.imprison: "Me dizem que meu [target.Custom2('RelationToMeShort', SCOPE.sC('flavor_victim'))|l]. [flavor_victim.Custom('ES_ElLa')] [flavor_victim.GetTitledFirstName|l], foi encarcerad[flavor_victim.Custom('ES_OA')] e acorrentad[flavor_victim.Custom('ES_OA')] como um cachorro…"
 scheme_critical_moments.8034.captured: "\n\nNossos guardas conseguiram capturar um dos infiltradores, e a presença [captured.Custom('ES_DelDela')] [captured.GetTitledFirstName|l], [owner.Custom2('RelationToMeShort', captured)] de [owner.GetTitledFirstName], confirma que a casa [owner.GetHouse.GetBaseName] esteve por trás disso."
 scheme_critical_moments.8034.discovered: "\n\nNa sequência, todos concordam que este foi claramente um trabalho da Casa [owner.GetHouse.GetBaseName]..."
 scheme_critical_moments.8034.fallback: "\n\nAnalisando a cena, os guardas não encontram pistas sobre quem estava por trás disso..."
 scheme_critical_moments.8034.permission: "\n\nA reação [owner.Custom('ES_DelDela')] [owner.GetTopLiege.GetTitleAsNameNoTooltip|l] deixa muito a desejar; e se [owner.GetTopLiege.GetSheHe] tivesse alguma coisa a ver com isso...?"
 scheme_critical_moments.8034.emperor: "\n\nEste ultraje e pela mão de [owner.Custom('ES_DelDela')] própri[owner.Custom('ES_OA')] [owner.GetTopLiege.GetTitleAsNameNoTooltip|l]… o que vamos fazer?"
 scheme_critical_moments.8034.crime: "\n\nEste ultraje descarado apenas serve para ressaltar a depravação desse clã vil, e a necessidade de libertar [owner.Custom('ES_AlAla')] [owner.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip|l] de suas garras!"
 scheme_critical_moments.8034.a.discovered: "Aqueles cães da [owner.GetHouse.GetBaseNameNoTooltip] pagarão por isso!"
 scheme_critical_moments.8034.a: "Como isso pôde acontecer...?"
 scheme_critical_moments.8035.t: "[scheme.GetNameNoTooltip]: Preparativos Finais"
 scheme_critical_moments.8035.desc: "Após semanas de planos meticulosos, a casa [owner.GetHouse.GetBaseName] está pronta para lançar nosso assalto. Nossa gente já está em posição, reconhecemos a propriedade [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] em [target_domicile.GetLocation.GetBaronyNameExplicitlyNoTooltip] e acertamos os detalhes do ataque.\n\nSó resta uma questão: como lidaremos com os [target.GetHouse.GetBaseName] após nosso inevitável triunfo?"
 scheme_critical_moments.8035.permission: "\n\nCom o apoio [owner.Custom('ES_DelDela')] [owner.GetTopLiege.GetTitleAsName|l], não há necessidade de uma contenção excessiva."
 scheme_critical_moments.8035.crime: "\n\nSe minha participação for descoberta, está claro que [owner.Custom('ES_ElLa')] [owner.GetTopLiege.GetTitleAsName|l] saberá disso…"
 scheme_critical_moments.8035.emperor: "\n\nÉ hora de mostrar [owner.Custom('ES_AlAla')] [owner.GetPrimaryTitle.GetTierAsNameNoTooltip|l] o que acontece com aqueles que me desafiam…"
 scheme_critical_moments.8035.a: "Mate qualquer cachorro da [target.GetHouse.GetBaseNameNoTooltip] que você encontrar."
 scheme_critical_moments.8035.a.tt: "Se o [scheme|lE] for bem-sucedido, membros da Casa [target.GetHouse.GetBaseName] encontrados serão mortos"
 scheme_critical_moments.8035.tt: "O [scheme|lE] irá concluir"
 scheme_critical_moments.8035.b: "Deixe-os viver — com algo para se lembrarem de nós."
 scheme_critical_moments.8035.b.tt: "Se [scheme|lE] tiver sucesso, os membros da casa [target.GetHouse.GetBaseName] encontrados receberão o [trait|lE] [target.GetHouse.GetBaseName|l], [GetTrait('blind').GetName( GetNullCharacter )|l] ou [GetTrait('eunuch_1').GetName( GetNullCharacter )|l]"
 scheme_critical_moments.8035.c: "Que qualquer cativo seja devolvido a mim."
 scheme_critical_moments.8035.c.tt: "Se a [scheme|lE] tiver êxito, [Concept('imprisoned', 'encarcelarás' )|E] encarcerarás os membros da Casa [target.GetHouse.GetBaseName] que forem encontrados"
 scheme_critical_moments.8035.c.warning: "@warning_icon! #X Não há chance de que seu envolvimento permaneça em [secret|lE]#!"
 scheme_critical_moments.8035.d: "Poupem-nos, não queremos o sangue deles."
