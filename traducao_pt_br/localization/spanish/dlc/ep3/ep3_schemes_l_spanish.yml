 scheme_critical_moments.1142.t: "$scheme_critical_moments.1132.t$"
 scheme_critical_moments.1142.desc_self: "Todo o esforço investido em minha campanha de autopromoção valeu a pena.\n\nMinha posição entre meus pares melhorou, novos apoiadores estão aderindo às minhas candidaturas, e meu objetivo está mais próximo do que nunca!"
 scheme_critical_moments.1142.desc_other: "Todo o tempo e os recursos investidos em promover a candidatura [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] renderam alguns frutos.\n\nSua posição entre seus pares melhorou, novos apoiadores agora estão convencidos de seu valor, e sua nomeação está agora um passo mais perto!"
 scheme_critical_moments.1142.a: "Excelentes resultados."
 scheme_critical_moments.1142.tt: "Candidatura Promovida!"
 promote_toast_scheme_desc: "Seu [target.Custom2('RelationToMeShort', SCOPE.sC('owner'))] , [owner.GetShortUINameNoTooltip|l] , promoveu sua candidatura"
 scheme_critical_moments.1143.t: "$scheme_critical_moments.1133.t$"
 scheme_critical_moments.1143.desc_self: "Todas as energias e recursos investidos em minha campanha de autopromoção simplesmente não foram suficientes. Ninguém foi convencido do meu valor ou persuadido por minhas promessas — e subornos — então minha posição permanece inalterada.\n\nTerei que pensar em algo diferente para promover minha candidatura."
 scheme_critical_moments.1143.desc_other: "Apesar dos meus esforços, não houve jeito de tornar [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] [Select_CString( target.IsFemale, 'una candidata', 'un candidato' )] mais aceitável…\n\nSuponho que terei de pensar em outra coisa para conseguir um bom cargo para [target.GetSheHe]."
 scheme_critical_moments.1143.a: "Uma oportunidade desperdiçada."
