 #Challenge Status
 challenge_status: "Desafiar Status"
 challenge_status_action: "Desafiar"
 challenge_status_desc: "Tentarei desafiar a posição e influência de [SCHEME.GetTargetCharacter.GetShortUIName] na corte, revelando seus defeitos e destacando minhas #EMP mejores#! qualidades em comparação."
 challenge_status_desc_general: "Em uma [scheme|lE] de desafio de posição, você busca roubar a [influence|lE] de um personagem, humilhando-o publicamente e destacando sua própria superioridade. Além disso, ele também perderá [powerful_family_rating|lE]."
 CHALLENGE_STATUS_SUCCESS_DESC: "Você ganhará toda a [influence|lE] que [SCHEME.GetTargetCharacter.GetShortUIName] perder"
 scheme_critical_moments.1172.t: "$scheme_critical_moments.1132.t$"
 scheme_critical_moments.1172.desc: "Nos últimos meses, não perdi uma única oportunidade de fazer [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l]. [target.GetHerHim|U] enganar para que cometesse gafes na corte, ofuscá-lo no conhecimento dos clássicos e [target.GetHerHim] levá-lo a apoiar medidas financeiras insustentáveis só para então entrar em cena e corrigi-lo[target.GetHerHim].\n\nApós um debate religioso muito bem-sucedido no qual consegui habilmente fazer parecer que [target.GetFirstNameNoTooltip] promovia crenças heréticas, posso me considerar satisfazid[ROOT.Char.Custom('ES_OA')] com os resultados obtidos."
 scheme_critical_moments.1172.a: "[target.GetFirstNameNoTooltip] aprendeu seu lugar."
 scheme_critical_moments.1173.t: "$scheme_critical_moments.1133.t$"
 scheme_critical_moments.1173.desc: "Fracasso. Não importa quantas vezes eu tente, [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l] parece estar sempre um passo à minha frente.\n\nSeu conhecimento de literatura é soberbo; sua compreensão de questões políticas, profunda; e seu entendimento dos aspectos mais intrincados da nossa fé, inabalável. Ou, pelo menos, eles são muito mais sólidos que os meus."
 scheme_critical_moments.1173.a: "[target.GetFirstNameNoTooltip] é um osso duro de roer."
 challenge_status_invalidated_title: "@scheme_icon! Fim do Esquema de Desafio de Status"
 scheme_critical_moments.1174.t: "Status Desafiado"
 scheme_critical_moments.1174.desc: "Tenho vergonha de admitir que, em minhas aparições públicas mais recentes, em todo confronto com [owner.Custom('ES_ElLa')] [owner.GetTitledFirstName|l] fui enganad[ROOT.Char.Custom('ES_OA')] e humilhad[ROOT.Char.Custom('ES_OA')].\n\nNão sei como isso continua acontecendo, mas toda vez que me envolvo em um debate com [owner.GetSheHe], parece que me esqueço de toda a etiqueta da corte, misturo as referências e, no melhor dos casos, acabo parecendo um[ROOT.Char.Custom('ES_XA')] idiota e, no pior, um[ROOT.Char.Custom('ES_XA')] imbecil que simpatiza com a heresia.\n\nPreciso dar um passo atrás e, por um tempo, reavaliar tudo o que digo."
 scheme_critical_moments.1174.a: "Não consigo acreditar nisso..."
