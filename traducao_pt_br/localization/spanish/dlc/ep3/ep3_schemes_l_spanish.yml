 scheme_critical_moments.1182.t: "$scheme_critical_moments.1132.t$"
 scheme_critical_moments.1182.desc: "Sucesso! O nome da Família [ROOT.Char.GetHouse.GetName] agora carrega mais peso em [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetBaseName] — pelo menos para mim.\n\nSubornos, favores, doações, colocando a pessoa certa no lugar certo: nenhuma ferramenta foi deixada de lado. Minhas reservas de influência se aprofundam junto com minhas capacidades políticas."
 scheme_critical_moments.1182.a: "Isso é apenas o começo."
 scheme_critical_moments.1183.t: "$scheme_critical_moments.1133.t$"
 scheme_critical_moments.1183.desc: "As pessoas simplesmente não me dão valor.\n\nSubornos, favores, doações, intimidação… #EMP nada#! não funcionou para aumentar minha influência!\n\nSuponho que terei de voltar minha atenção para outro lugar…"
 scheme_critical_moments.1183.a: "Uma porta se fecha..."
