 foster_legitimacy_scheme_desc_general: "O [scheme|lE] $foster_legitimacy_scheme$ é um [personal_scheme|lE] onde você tenta aumentar a [legitimacy|lE] do seu [liege|lE] e a [opinion|lE] dele sobre você, com a possibilidade de ganhar um [hook|lE] sobre ele com uma [success_chance|lE] acima de #high 75%#!.\nEste Esquema depende principalmente da sua própria [diplomacy|lE].\n\nA [success_chance|lE] é afetada por muitos fatores, mas principalmente pela sua [diplomacy_skill|lE], pela própria [diplomacy_skill|lE] do seu [liege|lE] e pela [county_opinion|lE] do [capital|lE] do seu [liege|lE]."
