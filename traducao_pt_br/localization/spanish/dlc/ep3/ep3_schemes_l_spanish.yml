 scheme_critical_moments.8061.t: "[scheme.GetNameNoTooltip]: Sucesso"
 scheme_critical_moments.8061.desc: "Nas profundezas de abóbadas empoeiradas, meus engenheiros armazenam os últimos barris de fogo líquido. Enquanto isso, no [Glossary( 'palacio de Bucoleón', 'BOUKOLEON_PALACE_GLOSS')] ocorre um exercício aterrador: sob a colossal estátua de um leão e um touro em combate, uma orgulhosa nave de guerra jorra fogo líquido.\n\nE como as chamas assassinas dançam por tanto tempo! Meus inimigos fariam bem em evitar as águas calmas entre a Europa e a Anatólia…"
 scheme_critical_moments.8061.a: "Dragões guardam o Mar de Mármara."
 BOUKOLEON_PALACE_GLOSS: "Às margens do #EMP Propontis#! (o Mar de Mármara), esta residência constantinopolitana do século V é notável por seu porto privado e masmorras sombrias."
 #fail event
 scheme_critical_moments.8062.t: "[scheme.GetNameNoTooltip]: Falha"
 scheme_critical_moments.8062.desc: "Fogo! Fogo do inferno!\n\nUm inferno incontrolável engole mais uma embarcação armada com sifões. Enquanto sua tripulação grita sendo queimada viva, sou forçado a pensar em todas as tinturas caóticas, os sifões vazando, os marinheiros mortos envolvidos nesta empreitada…\n\nComo conseguiram controlar #EMP jamás#! uma substância tão maligna? Como?!"
 scheme_critical_moments.8062.a: "Suponho que nunca saberei..."
 #TGP
 TARGET_DOMICILE_MAIN_JAPAN_DESC: "Nível de [GetDomicileBuilding('japanese_manor_main_01').GetName|l] de [target.GetDomicile.GetName|l]: $VALUE|+=0$"
 TARGET_DOMICILE_JAPANESE_WATCH_HOUSE_DESC: "Nível de [GetDomicileBuilding('japanese_watch_house_01').GetName|l] de [target.GetDomicile.GetName|l]: $VALUE|+=0$"
 TARGET_DOMICILE_JAPAN_BARRACKS_DESC: "Nível de [GetDomicileBuilding('japanese_barracks_01').GetName|l] de [target.GetDomicile.GetName|l]: $VALUE|+=0$"
 scheme_critical_moments.8066.t: "[scheme.GetNameNoTooltip]: Sucesso"
 scheme_critical_moments.8066.desc: "Estou satisfeito com os conhecimentos que vocês trouxeram à luz. Quantos encontraram…? [secrets_found_value]? Não é pouca coisa... [hegemon.GetName] se inclina em seu trono.\n\nNão esperava menos do meu [ROOT.Char.Custom('CouncilPosition')|l]. Confio que #EMP continuarão#! com este bom trabalho! [hegemon.GetSheHe|U] faz um gesto com a cabeça na direção de seus servidores, que trazem um pagamento considerável."
 scheme_critical_moments.8066.a: ""Estou aqui para servir [hegemon.Custom('ES_AlAla')] [hegemon.GetTitleAsNameNoTooltip|l]"."
 scheme_critical_moments.8066.b: ""Transmitirei sua gentileza aos meus empregados"."
 scheme_critical_moments.8067.t: "[scheme.GetNameNoTooltip]: Fracasso"
 scheme_critical_moments.8067.desc: ""Tenho aguardado seu relatório, mas nada chegou até mim. Eu já estava preocupad[hegemon.Custom('ES_OA')]… Talvez você tivesse esquecido seu dever?", [hegemon.GetName] me menospreza.\n\n"Coloquei agentes em todos os cantos de [target.GetCapitalLocation.GetName], sem sucesso", explico. "Ou os cortesãos [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] são leais ou, simplesmente, não há nada que valha a pena virar rumor".\n\n"Uma desculpa petulante..., achei que você pudesse fazer melhor. Ao menos oferecer uma mentira bonita. Considere seu cargo em jogo!". Sacudindo a cabeça, ele me sinaliza para me retirar."
 scheme_critical_moments.8067.a: "Não me saiu tão ruim, desta vez."
