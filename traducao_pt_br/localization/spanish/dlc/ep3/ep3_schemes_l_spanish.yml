 scheme_critical_moments.8012.t: "[scheme.GetNameNoTooltip]: Sucesso"
 scheme_critical_moments.8012.desc: "Levou algum tempo, mas minha influência na corte esteve à altura da tarefa.\n\nMeus argumentos, e os subornos e favores implícitos, foram demais para os burocratas e [owner.GetTopLiege.Custom('ES_ElLa')] [owner.GetTopLiege.GetTitleAsNameNoTooltip|l]. [target.Custom('ES_AlAla')|U] [target.GetTitledFirstName|l] não ficará satisfeito(a), mas isso importa agora?\n\nEstá feito; governarei [target_title.GetNameNoTier] junto ao [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] [ROOT.Char.GetPrimaryTitle.GetAdjective] e seus territórios serão imediatamente subordinados à minha autoridade."
 scheme_critical_moments.8012.a: "[target_title.GetNameNoTierNoTooltip] é #EMP meu#!."
 scheme_critical_moments.8013.t: "[scheme.GetNameNoTooltip]: Falha"
 scheme_critical_moments.8013.desc: "Apesar de minhas súplicas, favores e bajulação cuidadosamente dispensados, meus protestos acabaram caindo em ouvidos moucos…\n\nO aparato burocrático [owner.GetTopLiege.GetPrimaryTitle.GetAdjectiveNoTooltip], [owner.Custom('ES_ElLa')] volúvel [owner.GetTopLiege.GetTitleAsNameNoTooltip|l] só confirmou a separação dos territórios [owner.GetPrimaryTitle.GetAdjective] e [target.GetPrimaryTitle.GetAdjective]…"
 scheme_critical_moments.8013.a: "Malditos eunucos."
 scheme_critical_moments.8013.tt.failed: "[scheme.GetOwner.GetShortUIName] tentou subsumir sua Governança, mas falhou!"
 scheme_critical_moments.8014.t: "Governança Subsumida: [target_title.GetNameNoTierNoTooltip]"
 scheme_critical_moments.8014.desc: "Por trás dos altos portões dos palácios imperiais, a teia [owner.Custom('ES_DelDela')] [owner.GetTitledFirstName|l] continuou a se estender. Hoje, uma mensagem seca com o selo escarlate [owner.GetTopLiege.Custom('ES_DelDela')] [owner.GetTopLiege.GetTitleAsName|l] confirmou o pior.\n\nOs territórios de [target_title.GetNameNoTier] serão imediatamente subordinados [owner.Custom('ES_AlAla')] [owner.GetTitledFirstName|l], essencialmente como extensões do [owner.GetPrimaryTitle.GetTierAsNameNoTooltip] [owner.GetPrimaryTitle.GetAdjective]…"
 scheme_critical_moments.8014.a: "Esta ferida não será esquecida tão cedo."
 scheme_critical_moments.8015.t: "Governança Subsumida: [target_title.GetNameNoTierNoTooltip]"
 scheme_critical_moments.8015.desc: "Depois de semanas de pressão política e manobras na corte, [owner.Custom('ES_ElLa')] [owner.GetTitledFirstName|l] conseguiu que lhe fosse dada a responsabilidade sobre os territórios de [target_title.GetNameNoTier], agora, na prática, extensões de sua [owner.GetPrimaryTitle.GetTierAsNameNoTooltip] [owner.GetPrimaryTitle.GetAdjective]."
 scheme_critical_moments.8015.liege: "\n\nAs rodas do aparato burocrático [owner.GetTopLiege.GetPrimaryTitle.GetAdjectiveNoTooltip] não param de girar e seu ímpeto é quase imparável, até mesmo para um[owner.GetTopLiege.Custom('ES_XA')] [owner.GetTopLiege.GetTitleAsNameNoTooltip|l].\n\nSó posso esperar que [owner.Custom('ES_ElLa')] [owner.GetTitledFirstName|l] gaste suas energias a serviço de [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] e não em benefício próprio…"
 scheme_critical_moments.8015.vassal: "\n\nAs engrenagens do aparato burocrático [owner.GetTopLiege.GetPrimaryTitle.GetAdjectiveNoTooltip] não param de girar e seu impulso é quase imparável, até mesmo para [owner.GetTopLiege.Custom('ES_ElLa')] [owner.GetTopLiege.GetTitleAsNameNoTooltip|l]."
 scheme_critical_moments.8015.same_house: "\n\nSó podemos esperar que esta mudança acabe beneficiando toda a Casa [ROOT.Char.GetHouse.GetName]…"
 scheme_critical_moments.8015.target_house: "\n\nEste ultraje é um golpe grave para a posição da Casa [ROOT.Char.GetHouse.GetBaseName]…"
