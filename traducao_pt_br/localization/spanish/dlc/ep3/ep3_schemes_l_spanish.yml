 #Teach Governor
 teach_governor: "Mentor em Governança"
 teach_governor_action: "Mentorar"
 teach_governor_desc: "Tentar melhorar as habilidades de outro personagem como um [governor|lE]"
 teach_governor_desc_general: "$teach_governor$ é uma [political_scheme|lE] para melhorar a [governor_efficiency|lE] de outro [governor|lE]. Baseia-se em [stewardship|lE] e pode recrutar [agents|lE].\n\nUma conjura bem-sucedida de $teach_governor$ fará com que o [scheme_target|lE] ganhe [trait_level_track_xp|lE] [GetTrait('governor').GetName( GetNullCharacter )|l] e [opinion|lE]."
 TEACH_GOVERNOR_SUCCESS_DESC: "[TARGET_CHARACTER.GetShortUIName] ganha [trait_level_track_xp|lE] de [GetTrait('governor').GetName( GetNullCharacter )|l] e [opinion|lE] e você ganha um [hook|lE] se não fizer parte da sua [house|lE]"
