 scheme_critical_moments.8042.t: "[scheme.GetNameNoTooltip]: Sucesso"
 scheme_critical_moments.8042.desc: "Meu [owner.Custom2('RelationToMeShort', target)], [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l], parece apreciar de fato meus conselhos sobre assuntos administrativos.\n\nDe fato, quase foi uma alegria passar as horas discutindo livros-caixa e as minúcias da burocracia [target.GetPrimaryTitle.GetAdjective] com [target.GetSheHe].\n\nAtrevo-me a dizer que até eu aprendi alguma coisa no processo!"
 scheme_critical_moments.8042.a: "Isso acabou sendo bom!"
 scheme_critical_moments.8043.t: "[scheme.GetNameNoTooltip]: Falha"
 scheme_critical_moments.8043.desc: "Embora meu [owner.Custom2('RelationToMeShort', target)], [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l], no início tenha recebido bem minha oferta de conselho, não tem sido nada compreensiv[target.Custom('ES_OA')].\n\nSemanas de intensas discussões, de exame minucioso dos registros administrativos [target.GetPrimaryTitle.GetAdjective] e de oferecer conselhos deixaram pouca marca em [target.GetSheHe].\n\nPois [target.GetFirstNameNoTooltip] tem ignorado, entendido mal ou contradito quase toda porção de sabedoria oferecida a ele…"
 scheme_critical_moments.8043.a: "Que desperdício de tempo..."
 scheme_critical_moments.8043.tt.failed: "[scheme.GetOwner.GetShortUIName] tentou contestar suas fronteiras, mas falhou!"
 scheme_critical_moments.8044.t: "Governança Mentorada"
 scheme_critical_moments.8044.desc: "Há semanas, venho recebendo visitas inesperadas e cartas constantes de meu [target.Custom2('RelationToMeShort', owner)][owner.Custom('ES_ElLa')] [owner.GetTitledFirstName|l]. Tem me despejado um alude de conselhos não solicitados, todos relacionados à correta administração de um [target.GetPrimaryTitle.GetTierAsNameNoTooltip]…\n\n"
 scheme_critical_moments.8044.success: "Meu ceticismo inicial logo deu lugar à surpresa e ao respeito. Suas palavras têm sido uma fonte de sabedoria na qual eu nunca havia reparado, e muito do que disse foi confirmado agora em minha gestão de [target.GetPrimaryTitle.GetNameNoTier]!"
 scheme_critical_moments.8044.failure: "Meu ceticismo logo se confirmou, pois, lamentavelmente, havia pouca sabedoria a ser extraída entre as anedotas divagantes e os mantras confusos, por mais concisos que possam parecer…"
 scheme_critical_moments.8044.a.success: "Um bom conselho é uma rara bênção!"
 scheme_critical_moments.8044.a: "Um agradecimento final, com tato, deve acalmá-lo."
 scheme_critical_moments.8045.opening: "[recipient.Custom2('AppropriateGreetingPositive', actor)]"
 scheme_critical_moments.8045.desc: "Sou muito grato pela sua oferta de aconselhar sobre a governança do [recipient.GetPrimaryTitle.GetNameNoTier]!"
 scheme_critical_moments.8045.fallback: "Sou muito grato pela sua oferta de aconselhar sobre as vagalidades da governança!"
 scheme_critical_moments.8045.rump: "\n\nAguardo ansiosamente para ouvir seus pensamentos."
 scheme_critical_moments.8045.a: "Será um prazer."
 scheme_critical_moments.8046.opening: "[recipient.Custom2('AppropriateGreeting', actor)]"
 scheme_critical_moments.8046.desc: "Embora eu me sinta lisonjeado pela sua oferta de me aconselhar sobre a governança de [recipient.GetPrimaryTitle.GetNameNoTier],"
 scheme_critical_moments.8046.fallback: "Embora eu tenha me sentido lisonjeado pela sua oferta de me aconselhar sobre as vagalidades da governança,"
 scheme_critical_moments.8046.rump: "Acho que tenho uma boa compreensão disso por conta própria."
 scheme_critical_moments.8046.a: "Hmph."
