 #Ingratiate Family
 ingratiate_family: "Agradar a Família"
 ingratiate_family_action: "Agradar"
 ingratiate_family_desc: "Até a Casa mais poderosa não pode ficar sozinha - a Família [SCHEME.GetTargetTitle.GetHolder.GetHouse.GetBaseName] pode se tornar aliados úteis ou peões..."
 ingratiate_family_desc_general: "$ingratiate_family$ é um [personal_scheme|lE] que visa ganhar o favor de uma [house|lE]. Baseia-se em [diplomacy|lE] e em prestígio da [house|lE].\n\nUm $ingratiate_family$ bem-sucedido concederá [opinion|lE], [friendship|lE] e [influence|lE]."
 ingratiate_family_invalidated_title: "@scheme_icon! O $ingratiate_family$ termina"
 ingratiate_family_invalidated_dead: "[target.GetShortUIName|U] faleceu."
 ingratiate_family_invalidated_war: "Você está em guerra com [target.GetShortUIName]"
 scheme_critical_moments.8052.t: "[scheme.GetNameNoTooltip]: Sucesso"
 scheme_critical_moments.8052.desc: "Meus mensageiros há semanas assediam a propriedade de [target.GetHouse.GetBaseName] com cartas lisonjeiras que exaltam suas grandes virtudes e linhagem.\n\nHoje abri a resposta há muito aguardada, que transborda adulação e deferência, confirmando que, por fim, [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l] entendeu a indireta.\n\n#EMP «Siempre he considerado a [owner.GetHouse.GetBaseName] una de las grandes casas de [owner.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip], y me enorgullece consideraros amigos».#!"
 scheme_critical_moments.8052.a: "Exatamente."
 scheme_critical_moments.8053.t: "[scheme.GetNameNoTooltip]: Falha"
 scheme_critical_moments.8053.desc: "Meus mensageiros vêm entregando devidamente minhas palavras adocicadas na propriedade de [target.GetHouse.GetBaseName], mas a resposta esperada não se materializou.\n\nPor fim, colocam diante de mim uma missiva com o selo [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l], mas sem as palavras que eu esperava, reconhecendo minha vitória.\n\n#EMP «Buen [owner.GetFirstNameNoTooltip], nadie negará el poder y la gloria de la casa [owner.GetHouse.GetBaseName], pero no somos vuestros perritos falderos».#!"
 scheme_critical_moments.8053.a: "Uma resposta ousada."
 scheme_critical_moments.8054.t: "Família Agradada"
 scheme_critical_moments.8054.desc: "Há semanas, missivas de [owner.Custom('ES_DelDela')] [owner.GetTitledFirstName|l], cada uma elogiando a Casa [target.GetHouse.GetBaseName] e, de forma sutil, buscando a amizade de nossa família com a dele.\n\n"
 scheme_critical_moments.8054.success: "Está claro que deseja ganhar nosso apoio, e é difícil negar as vantagens de uma aliança com uma família tão poderosa quanto a casa [owner.GetHouse.GetBaseName]."
 scheme_critical_moments.8054.failure: "Essas cartas curiosas e insultantes só nos levam a questionar suas motivações e a reafirmar a orgulhosa independência de nossa família."
 scheme_critical_moments.8054.a.success: "Estamos abertos a discussões..."
 scheme_critical_moments.8054.a: "Não somos cães de lapso da [owner.GetHouse.GetBaseNameNoTooltip]!"
