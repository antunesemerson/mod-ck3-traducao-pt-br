 ingratiate_family_success_recipient_tt: "Se for bem-sucedido:\n $EFFECT_LIST_BULLET$ A [house|lE] [recipient.GetShortUIName|U] recebe [EmptyScope.ScriptValue('medium_influence_gain')] [influence|lE] [influence_i]\n $EFFECT_LIST_BULLET$ Receberá [opinion|lE] sobre [actor.GetShortUIName]"
