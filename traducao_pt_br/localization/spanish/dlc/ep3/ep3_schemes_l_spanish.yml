 scheme_critical_moments.8022.t: "[scheme.GetNameNoTooltip]: Sucesso"
 scheme_critical_moments.8022.desc: "Os debates em [owner.GetTopLiege.GetCapitalLocation.GetName] foram longos e cansativos, mas os burocratas acabaram se curvando à sabedoria das minhas propostas. [destroyed_title.GetNameNoTier] foi extinto; seus antigos territórios, uma mera parte do novo [target_title.GetTierAsNameNoTooltip] de [target_title.GetNameNoTier], e #EMP yo#!, seu [owner.GetTitleAsNameNoTooltip|l].\n\nGrandes mudanças estão por vir — para a minha administração; para [owner.GetTopLiege.GetPrimaryTitle.GetNameNoTooltip]; para a posição da Casa [owner.GetHouse.GetBaseName]!"
 scheme_critical_moments.8022.a: "[owner.GetTitleAsNameNoTooltip]... eu gosto do som disso."
 scheme_critical_moments.8023.t: "[scheme.GetNameNoTooltip]: Falha"
 scheme_critical_moments.8023.desc: "As investidas cuidadosamente organizadas em [owner.GetTopLiege.GetCapitalLocation.GetNameNoTooltip] —meses de planejamento meticuloso e diplomacia gentil— foram em vão.\n\nOs burocratas se recusaram a reconhecer a sabedoria das minhas propostas. A simplificação da administração da região sob um cargo [target_title.GetAdjective] de ampla abrangência foi descartada como "desnecessária" e "impraticável"…"
 scheme_critical_moments.8023.a: "Malditos burocratas."
 scheme_critical_moments.8023.tt.failed: "[scheme.GetOwner.GetShortUIName] tentou fundar um despotado, mas falhou!"
 scheme_critical_moments.8024.t: "Despotado Fundado: [target_title.GetNameNoTierNoTooltip]"
 scheme_critical_moments.8024.desc: "Durante semanas, houve rumores de debates acalorados nos bastidores de [owner.GetTopLiege.GetCapitalLocation.GetBaronyNameExplicitlyNoTooltip] e, por fim, foi anunciado: [owner.GetFirstName] se tornará [owner.GetTitleAsNameNoTooltip|l] e governará o vasto território de [target_title.GetNameNoTier]."
 scheme_critical_moments.8024.liege: "\n\nSe os burocratas concordaram por motivos legítimos e administrativos ou simplesmente cederam sob pressão, eu nunca saberei; isso permaneceu fora do meu alcance.\n\nSó podemos esperar que esta mudança seja para o benefício de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] por inteiro, e não apenas de [owner.Custom('ES_DelDela')] [owner.GetTitledFirstName|l]"
 scheme_critical_moments.8024.vassalised: "\n\nSeja porque os burocratas aprovaram por motivos legítimos e administrativos, seja porque recuaram sob pressão, agora sou seu subordinad[ROOT.Char.Custom('ES_OA')]!"
 scheme_critical_moments.8024.other: "\n\nSe os burocratas concordaram por motivos legítimos e administrativos, ou simplesmente cederam sob pressão, nunca saberemos…"
 scheme_critical_moments.8024.fallback: "\n\nEste movimento da Casa [ROOT.Char.GetHouse.GetBaseName] mudará consideravelmente o equilíbrio de poder no [owner.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip]…"
 scheme_critical_moments.8024.a: "Intrigante..."
