 start_slander_notification: "Calúnia"
 scheme_critical_moments.1132.t: "[scheme.GetNameNoTooltip]: Sucesso"
 scheme_critical_moments.1132.desc: "As conversas públicas estão repletas dos frutos dos meus planos sutis. Minha campanha escandalosa de rumores, acusações veladas e fofocas tolas provocou uma grande mudança nos sentimentos em relação a [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l]. Sua reputação está em frangalhos!\n\nUma figura elegante é tão facilmente despojada de todo o seu brilho, tão avidamente manchada, pelas palavras e nas mentes dos outros…"
 scheme_critical_moments.1132.desc_discovered: "\n\n[target.GetFirstNameNoTooltip] sabe que estou envolvido, mas pouco importa! Agora é tarde demais: o dano à reputação dele/dela já está feito!"
 scheme_critical_moments.1132.desc_secret: "\n\n[target.GetFirstNameNoTooltip] continua perplexo[target.Custom('ES_OA')] por sua degradação, completamente sem saber da minha implicação!"
 scheme_critical_moments.1132.a: "Que sujeira deliciosa que amontoei!"
 slander_nickname_given_tt: "Apelido Calunioso Atribuído"
 receive_slanderous_nickname_tt: "Um [nickname|lE] negativo para [target.GetShortUINameNoTooltip] surge"
 scheme_critical_moments.1133.t: "[scheme.GetNameNoTooltip]: Falha"
 scheme_critical_moments.1133.desc: "Nada. Meses de planos e intrigas, de espalhar rumores e pagar subornos… e ainda assim a reputação [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] continua tão inexpugnável quanto sempre!"
 scheme_critical_moments.1133.desc_discovered: "\n\nPara piorar a situação, não apenas desperdicei tempo e recursos, mas [target.GetFirstNameNoTooltip] também foi informado das minhas más intenções mal executadas!"
 scheme_critical_moments.1133.desc_secret: "\n\nPelo menos, [target.GetFirstNameNoTooltip] permanece completamente alheio de que algo estava acontecendo..."
 scheme_critical_moments.1133.a: "Apenas um pequeno revés..."
 scheme_critical_moments.1134.t: "Caluniado"
 scheme_critical_moments.1134.desc: "Quando falo com os outros, vejo dúvida, preocupação, até mesmo divertimento em seus olhos; risinhos e sussurros me seguem onde quer que eu vá.\n\nMinhas palavras não têm mais o peso de antes, e minha posição entre meus pares parece suspeitosamente frágil. Os rumores mais absurdos e comprometedores circulam sobre #EMP mim#!... e parece que todos acreditam neles."
 scheme_critical_moments.1134.desc_given_nickname: "\n\nAlém disso, sou informado de que vozes maldosas se referem a mim por um novo apelido. Eles ousam me chamar de [ROOT.Char.GetNickname]!"
 scheme_critical_moments.1134.desc_discovered: "\n\nMeus agentes têm certeza de que foi [owner.Custom('ES_ElLa')] [owner.GetTitledFirstName|l] quem orquestrou essa difamação do meu nome…"
 scheme_critical_moments.1134.a: "Que astuto[owner.Custom('ES_OA')]…"
 scheme_critical_moments.1133.tt: "Descoberta de [scheme.GetName|l]"
 scheme_critical_moments.1133.tt.failed: "[scheme.GetOwner.GetShortUIName] tentou [scheme.GetSchemeType.GetTypeName|l] contra você, mas falhou!"
 slander_modifier_tt: "Pode ganhar [GetModifier('scheme_slandered_modifier').GetNameWithTooltip|l] por #HIGH 10 anos#!"
 scheme_slandered_candidacy_appointment_tt: "[candidate_score|E] de [GetLaw('appointment_succession_law').GetName|l]: [EmptyScope.ScriptValue('slander_appointment_score_value')|+=0]"
 scheme_slandered_candidacy_acclamation_tt: "[candidate_score|E] de [GetLaw('acclamation_succession_law').GetName|l]: [EmptyScope.ScriptValue('slander_acclamation_score_value')|+=0]"
 scheme_slandered_candidacy_desc: ""
