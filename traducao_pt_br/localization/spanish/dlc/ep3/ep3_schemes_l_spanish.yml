 scheme_critical_moments.4011.t: "$damage_legitimacy_scheme$: Sucesso!"
 scheme_critical_moments.4011.desc: "Dou uma olhada na carta que um dos servos acabou de deixar. O pergaminho é de boa qualidade, até perfumado. Uma carta da capital, sem dúvida.\n\n"[target.Custom('ES_ElLa')|U] [target.GetTitleAsNameNoTooltip|l], seu senhor[target.Custom('ES_XA')], está passando por uma situação das mais desagradáveis…".\n\nUm sorriso se abre em meu rosto. Não preciso ler mais. Sua legitimidade foi prejudicada: uma oportunidade perfeita para atacar."
 scheme_critical_moments.4011.a: "Traga-me a tinta."
 scheme_critical_moments.4011.tt: "Legitimidade Prejudicada!"
 damage_legitimacy_scheme_toast_desc: "Seu [target.Custom2('RelationToMeShort', SCOPE.sC('owner'))]; [owner.GetShortUINameNoTooltip|l] danificou sua [legitimacy|lE]"
 scheme_critical_moments.4012.t: "$damage_legitimacy_scheme$: Falha"
 scheme_critical_moments.4012.desc.intro: "Houve algumas vezes — não muitas — em que fiquei feliz por algo ter dado errado. Esta não é uma delas.\n\nProvavelmente, neste exato momento [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l] está sentado de forma arrogante[target.Custom('ES_OA')] em seu trono,"
 scheme_critical_moments.4012.desc.byzantium: "talvez pedindo a algum cortesão que [target.Custom('ES_LoLa')] o entretenha."
 scheme_critical_moments.4012.desc.other: "provavelmente malabaristas saltando ao redor, talvez algum músico estrangeiro trazido especialmente para a ocasião."
 scheme_critical_moments.4012.desc.outro: ""Vida longa a [target.Custom('ES_AlAla')] [target.GetTitleAsNameNoTooltip|l]!", ouve-se nas ruas.\n\n"Paciência, [ROOT.Char.GetTitleAsNameNoTooltip|l], paciência", digo a mim mesmo.\n\nA caça favorece aqueles que sabem esperar."
 scheme_critical_moments.4012.a: "Paciência."
