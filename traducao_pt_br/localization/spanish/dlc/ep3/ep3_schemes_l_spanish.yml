 scheme_critical_moments.4001.t: "$foster_legitimacy_scheme$: Sucesso!"
 scheme_critical_moments.4001.desc.intro: "Levo a taça de [ROOT.Char.Custom('RegionalAlcoholicDrink')] aos lábios com uma expressão de satisfação. Protegi a legitimidade do meu [target.GetTitleAsNameNoTooltip|l]… e a opinião dele(a) sobre mim.\n\n"
 scheme_critical_moments.4001.desc.byzantium: "Os mosaicos brilham com a primeira luz da manhã, e eu me levanto do meu assento:"
 scheme_critical_moments.4001.desc.other: "Ao notar [ROOT.Char.Custom('GetRandomInteriorDetail')] eu me levanto do meu assento:"
 scheme_critical_moments.4001.desc.outro: "\n\n"Por [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l]! E por sua legítima reivindicação ao trono!"."
 scheme_critical_moments.4001.a: "Sempre é um prazer, meu [target.GetLadyLord]."
 scheme_critical_moments.4001.tt: "Legitimidade Promovida!"
 foster_legitimacy_scheme_toast_desc: "Seu [target.Custom2('RelationToMeShort', SCOPE.sC('owner'))] , [owner.GetShortUINameNoTooltip|l] , reforçou sua [legitimacy|lE]"
 scheme_critical_moments.4002.t: "$foster_legitimacy_scheme$: Falha"
 scheme_critical_moments.4002.desc: "Uma decepção. Suspiro ao jogar fora a carta que acabou de chegar da capital: "[target.Custom('ES_ElLa')|U] [target.GetTitleAsNameNoTooltip|l] agradece calorosamente seus esforços".\n\nTer um agradecimento é o mesmo que não ter nada. E um agradecimento [target.Custom('ES_DelDela')|l] [target.GetTitleAsNameNoTooltip|l] é como um chute na canela.\n\nPoderia ter dito apenas "Vocês me decepcionaram"."
 scheme_critical_moments.4002.a: "Bem, eu tinha que tentar."
