l_spanish:
 ep3_eparch_event.0001.t: "$eparch_court_position$: Fortificando a Capital"
 ep3_eparch_event.0001.desc_intro: "[emperor.Custom('ES_ElLa')|U] [emperor.GetPrimaryTitle.GetTierAsNameNoTooltip|l] está em guerra. Cercad[emperor.Custom('ES_OA')] pelos [attacker.GetCulture.GetCollectiveNounNoTooltip] e semelhante [attacker.Custom2('InsultAdjective', ROOT.Char)] que é [attacker.Custom('ES_ElLa')] [attacker.GetTitledFirstName|l].\n\n"
 ep3_eparch_event.0001.desc_winning_war: "[emperor.Custom('ES_ElLa')|U] [emperor.GetTitledFirstName|l] parece ter levado vantagem, mas é preciso ter cuidado para não declarar vitória antes de a guerra estar realmente vencida."
 ep3_eparch_event.0001.desc_losing_war: "[emperor.Custom('ES_ElLa')|U] [emperor.GetTitledFirstName|l] Tem uma batalha difícil pela frente. Provavelmente é só uma questão de tempo até a guerra se espalhar ainda mais."
 ep3_eparch_event.0001.desc_undecided_war: "É cedo para dizer qual será o resultado, pois nenhum dos lados ainda obteve uma vantagem considerável."
 ep3_eparch_event.0001.desc_outro: "\n\n[capital.GetTitle.GetNameNoTier] permanece em segurança. #EMP Por ahora#!. No entanto, convém estarmos bem preparados, caso a guerra chegue à nossa porta…"
 ep3_eparch_event.0001.a: "A capital #EMP deve#! ser protegida!"
 ep3_eparch_event.0001.b: "Algumas melhorias moderadas devem ser suficientes."
 ep3_eparch_event.0001.c: "Certamente [capital.GetTitle.GetNameNoTierNoTooltip] não está em nenhum #EMP real#! perigo?"
 ep3_eparch_event.0002.desc: "Meu [emperor.Custom2('RelationToMeShort',eparch)], [eparch.Custom('ES_ElLa')] [eparch.GetTitledFirstName|l], tomou precauções consideráveis para manter a capital segura nestes tempos de guerra.\n\n"
 ep3_eparch_event.0002.desc_at_home: "\"Olhai!\", diz [eparch.GetFirstNameNoTooltip] abrindo caminho com passos ansiosos. \"Estas muralhas foram fortalecidas e muito melhoradas. Ali também podeis ver os novos quartéis, abrindo caminho para uma guarnição muito maior\".\n\n\"Atrevo-me a dizer que [capital.GetTitle.GetNameNoTier] está pronto para resistir a um cerco prolongado, meu [emperor.GetLadyLord], se a guerra chegasse à nossa amada cidade\"."
 ep3_eparch_event.0002.desc_away: "A carta em minhas mãos descreve uma série de seções das muralhas que foram fortificadas e melhoradas. Além de detalhar os soldados adicionais designados à guarnição. Parece que [capital.GetTitle.GetNameNoTier] está em boas mãos e bastante preparada para um cerco potencial."
 ep3_eparch_event.0002.a: "Tal diligência deve ser recompensada!"
 ep3_eparch_event.0002.b: "Ele(a) está apenas fazendo seu trabalho."
 ep3_eparch_event.0005.t: "$eparch_court_position$: Perdendo o Controle"
 ep3_eparch_event.0005.desc: "Estamos perdendo o controle de [capital.GetTitle.GetNameNoTier]…\n\nOs criminosos se apressam em aproveitar a situação e estão circulando livremente pelas ruas neste exato momento. É responsabilidade #EMP mía#! garantir a segurança da cidade e de todos os cidadãos que residem dentro destas muralhas."
 ep3_eparch_event.0005.a: "Vamos pagar por algumas mãos extras para patrulhar as ruas."
 ep3_eparch_event.0005.b: "Talvez possamos virar os criminosos uns contra os outros?"
 ep3_eparch_event.0005.b_success_tt: "Você consegue manipular os criminosos"
 ep3_eparch_event.0005.b_success: "Tentativa de Manipulação Bem-Sucedida"
 ep3_eparch_event.0005.b_failure_tt: "Você falha em virar os criminosos uns contra os outros"
 ep3_eparch_event.0005.b_failure: "Tentativa de Manipulação Falhou"
 ep3_eparch_event.0005.success_liege: "$eparch_court_position$ Aumenta com Sucesso o [control|lE]"
 ep3_eparch_event.0005.failure_liege: "$eparch_court_position$ Falha em Aumentar o [control|lE]"
 ep3_eparch_event.0005.c: "Poderia ajudar [marshal.Custom('ES_ElLa')] [marshal.GetCouncilTitleFirstNameNoTooltip|l]?"
 ep3_eparch_event.0005.d: "Não há necessidade de exagerar. A situação não está #EMP tão#! desesperadora."
 ep3_eparch_event.0010.t: "$eparch_court_position$: Doença Ataca"
 ep3_eparch_event.0010.desc: "A doença atinge [capital.GetTitle.GetNameNoTier]!\n\nUma epidemia de [capital_plague.GetName|l] se espalha pela capital. Ela infecta os cidadãos por toda a cidade, independentemente de classe, fama ou posição na corte. Como sempre, os pobres coitados que não tiverem meios nem ouro para consultar um médico levarão a pior parte deste surto.\n\n[ROOT.Char.GetTopLiege.Custom('ES_ElLa')|U] [ROOT.Char.GetTopLiege.GetTitledFirstName|l] espera que eu tome medidas e faça o que puder para evitar um possível desastre."
 ep3_eparch_event.0010.a: "Medidas drásticas são necessárias. Coloque a cidade em quarentena!"
 ep3_eparch_event.0010.b: "Vasculhe a cidade em busca de médicos e coloque-os para trabalhar."
 ep3_eparch_event.0010.c: "Meu médico[physician.Custom('ES_OA')] [physician.GetFirstNameNoTooltip] pode ajudar!"
 ep3_eparch_event.0010.d: "Temo que não haja nada que possamos fazer..."
 ep3_eparch_event.0010.c_success_tt: "[physician.Custom('ES_ElLa')|U] [physician.GetTitledFirstName|l] consegue aliviar a peste"
 ep3_eparch_event.0010.c_success: "[physician.Custom('ES_ElLa')|U] [physician.GetTitledFirstName|l] tem sucesso"
 ep3_eparch_event.0010.c_failure_tt: "[physician.Custom('ES_ElLa')|U] [physician.GetTitledFirstName|l] fracassa em aliviar a peste"
 ep3_eparch_event.0010.c_failure: "[physician.Custom('ES_ElLa')|U] [physician.GetTitledFirstName|l] falha"
 ep3_eparch_event.0015.t: "$eparch_court_position$: A Universidade Precisa de Professores"
 ep3_eparch_event.0015.desc: "A universidade de [capital.GetTitle.GetNameNoTier] enviou uma missiva explicando sua necessidade de mais professores.\n\nExplica com muitos detalhes que oferecer uma educação de alta qualidade é de extrema importância e que, sem pessoal adicional, não será possível cumprir as expectativas [emperor.Custom('ES_DelDela')] [emperor.GetTitledFirstName|l]. A universidade me instiga a contratar um candidato adequado com a devida urgência."
 ep3_eparch_event.0015.a: "Acontece que eu conheço o candidato perfeito!"
 ep3_eparch_event.0015.b: "A família [powerful_house_head.GetHouse.GetBaseNameNoTooltip] é digna da posição."
 ep3_eparch_event.0015.c: "Com certeza há um acadêmico que eu possa contratar na cidade."
 ep3_eparch_event.0015.d: "Na verdade, que tal você vir trabalhar para mim, [teacher_local_scholar.GetFirstNameNoTooltip]?"
 ep3_eparch_event.0015.e: "Eles terão que se contentar com o que têm por enquanto."
 ep3_eparch_event.0015.b.msg.t: "Professor Nomeado"
 ep3_eparch_event.0015.b.msg.desc: "O $eparch_court_position$ nomeou [teacher_powerful_family.GetShortUIName] como professor[teacher_powerful_family.Custom('ES_XA')] da universidade de [capital.GetTitle.GetNameNoTier]"
 teacher_moves_to_capital_tt: "[teacher_tt.GetShortUIName|U] se muda para [capital.GetTitle.GetNameNoTier] como professor[teacher_tt.Custom('ES_XA')]"
 ep3_eparch_event.0020.t: "$eparch_court_position$: Pelos Serviços Prestados"
 ep3_eparch_event.0020.desc_intro: "Quando caminho por um corredor fracamente iluminado, meus pensamentos são interrompidos quando ouço alguém chamar meu nome. Me viro e vejo [emperor.GetShortUIName] se aproximando, com um servo atrás.\n\n¡[eparch.GetFirstNameNoTooltip]! Você se saiu admiravelmente em suas funções supervisionando [capital.GetTitle.GetNameNoTier]. Tal diligência deve ser recompensada, e será mais do que um prazer fazê-lo».\n\n"
 ep3_eparch_event.0020.desc_gold: "[emperor.GetFirstNameNoTooltip] faz um gesto para que o servo se aproxime. O servo levanta a tampa de um pequeno baú para revelar seu conteúdo. Está cheio de moedas, joias preciosas e outros objetos de valor!"
 ep3_eparch_event.0020.desc_artifact: "O servo dá um passo à frente. Com um movimento rápido, o servo puxa um pedaço de pano, revelando o artefato embaixo."
 ep3_eparch_event.0020.desc_hook_removal: "[emperor.Custom('ES_ElLa')|U] [emperor.GetTitledFirstName|l] continua: \"Falei com [peer_with_hook.GetShortUIName] e [peer_with_hook.GetHerHim] o(a) convenci a abrir mão de qualquer favor que vocês pudessem dever. A partir de agora, não vai causar mais problemas para vocês…\"."
 ep3_eparch_event.0020.desc_emperor_hook: "\"Se você precisar de algo, e eu quero dizer #EMP qualquer coisa#!, não hesite em me avisar. Farei o que for possível para ajudá-lo.\""
 ep3_eparch_event.0020.a: "Obrigado, m [emperor.GetLadyLord]!"
 ep3_eparch_event.9000.t: "$eparch_court_position$: Negligência no Dever"
 ep3_eparch_event.9000.desc: "Como $eparch_court_position$ é dever de [eparch.Custom('ES_DelDela')] [eparch.GetTitledFirstName|l] gerenciar e zelar por todas as necessidades de [capital.GetTitle.GetNameNoTier] como se a cidade fosse sua própria casa.\n\nNo entanto, [eparch.GetFirstNameNoTooltip] negligenciou seriamente esse importante cargo, traindo minha confiança no processo e desperdiçando o #EMP privilegio#! que lhe conferi. E para quê? Uma tentativa de servir aos seus próprios interesses.\n\n[eparch.GetFirstNameNoTooltip] aguarda meu julgamento…"
 ep3_eparch_event.9000.a: "É absolutamente inaceitável! Vocês estão demitid[eparch.Custom('ES_OA')]! #EMP Marchaos#!!"
 ep3_eparch_event.9000.b: "Considere isso um aviso. Mas você me #EMP deverá#! algo!"
 ep3_eparch_event.9000.c: "Farei vista grossa para isso. Por enquanto."
 ep3_eparch_event.9001.intro: "Chego ao salão do trono após ter sido convocado por [emperor.Custom('ES_ElLa')] [emperor.GetTitledFirstName|l] e me aproximo rapidamente do estrado.\n\n"
 ep3_eparch_event.9001.desc_fired: "\"Vocês me decepcionaram, [eparch.GetFirstNameNoTooltip]. Confiei [capital.GetTitle.GetNameNoTier] aos seus cuidados e vocês me agradecem ignorando totalmente #EMP completamente#! as necessidades da cidade! Seu comportamento é inaceitável\".\n\n[emperor.Custom('ES_ElLa')|U] [emperor.GetTitleAsName|l] se levanta: \"Vocês estão destituídos do cargo de [GetCourtPositionType('eparch_court_position').GetNameNoTooltip()|l]. Considerem-se afortunados por eu não tomar outras medidas\"."
 ep3_eparch_event.9001.desc_warned: "\"Fui informado de que você tem negligenciado seus deveres, [eparch.GetFirstNameNoTooltip]\", diz [emperor.GetFirstNameNoTooltip] balançando a cabeça. \"Considere isto um aviso. Decidi ser misericordioso com você. #EMP Por ahora#!. Espero que seja desnecessário dizer que você me deve isso\".\n\n[emperor.Custom('ES_ElLa')|U] [emperor.GetTitleAsNameNoTooltip|l] me despacha com um gesto da mão."
 ep3_eparch_event.9001.desc_nothing: "Rapidamente fica claro que algo não vai bem. O silêncio e a tensão que pairam no ar falam por si.\n\n[emperor.GetFirstNameNoTooltip] #EMP sabe#! que tenho negligenciado meus deveres como administrador de [capital.GetTitle.GetNameNoTier], não é? Aguardo minha vez.\n\nOs minutos passam, mas nada acontece. [emperor.GetFirstNameNoTooltip] lança um breve olhar para mim e então vai embora. Parece que [emperor.Custom('ES_ElLa')] [emperor.GetTitleAsName|l] optou por ignorar minha transgressão. Por enquanto."
 ep3_eparch_event.9001.a: "O quê? #EMP Demitido?!#!"
 ep3_eparch_event.9001.b: "Isso poderia ter terminado muito pior..."
 ep3_eparch_event.9001.c: "Talvez eu devesse me considerar sortudo."
 eparch_hook_warning: "@alert_icon! #alert_trial [eparch.Custom('ES_ElLa')|U] [eparch.GetTitledFirstName|l] tiene un anzuelo sobre ti; esta acción tiene consecuencias adicionales#!"
 eparch_neglecting_duty_warning_tt: "@alert_icon! #alert_trial A contínua negligência no dever pode fazer com que seu [liege|lE] perceba e tome uma atitude#!"
 eparch_reward_msg_title: "Recompensado pelos Deveres"
 duel_aptitude_challenge: "Desafio de [aptitude|lE]"
 duel_aptitude_challenge_first: "$duel_aptitude_challenge$"
 duel_aptitude_challenge_first_past: "$duel_aptitude_challenge$"
 duel_aptitude_challenge_third: "[CHARACTER.GetShortUIName|U]:\n $duel_aptitude_challenge$"
 duel_aptitude_challenge_third_past: "[CHARACTER.GetShortUIName|U]:\n $duel_aptitude_challenge$"
 duel_aptitude_challenge_global: "[CHARACTER.GetShortUIName|U]:\n $duel_aptitude_challenge$"
 duel_aptitude_challenge_global_past: "[CHARACTER.GetShortUIName|U]:\n $duel_aptitude_challenge$"
 friend_rewarding_duties: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'recompensaste', 'recompensó' )] generosamente [TARGET_CHARACTER.LocalPlayerString( 'tu persona', TARGET_CHARACTER.GetShortUIName )] por tarefas bem executadas"
 friend_rewarding_duties_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'recompensaste', 'recompensó' )] generosamente a [Select_CString( CHARACTER.IsLocalPlayer, 'tu persona', CHARACTER.GetShortUIName )] por tarefas bem executadas"
