 ep3_story_cycle_violet_poet.0001.t: "Adequado para Altas Posições"
 ep3_story_cycle_violet_poet.0001.desc: "Durante décadas, he seguido las huellas de los intelectuales y me he enfrentado a la ira de los hombres. Mi poesía ha crecido inexorablemente en fama y, sin embargo…\n\nAlgo me falta. Ahora que mis años crepusculares se ciernen sobre mí, ¿tal vez sea hora de salir de [cordoba.GetName] y obtener una visión aún más amplia del mundo?\n\nOtra parte inseparable de mí tira de mi corazón para que me quede. Aquí he construido una vida no solo para mí, sino también para los muchos aprendices que se han formado aquí a lo largo de los años.\n\nYa sean los eruditos que recorren sus calles o la pátina familiar de sus muros, #EMP algo#! me ata a esta ciudad, mi hogar."
 ep3_story_cycle_violet_poet.0001.a: "Eu ficarei em [cordoba.GetNameNoTooltip] por agora."
 ep3_story_cycle_violet_poet.0001.a.tt: "Esta é minha casa. Talvez em outra vida eu caminhe por outro caminho."
 ep3_story_cycle_violet_poet.0001.b: "É hora de ir embora."
 ep3_story_cycle_violet_poet.0001.b.tt: "Pense em todas as oportunidades que ainda estão por florescer!"
 ep3_story_cycle_violet_poet.0001.b.travel: "Iniciar sua viagem para [toledo.GetName]"
 artifact_double_moon_book: "O Tomo da Dupla Lua"
 artifact_double_moon_book_description: "Um livro pesado, ricamente ornamentado, cheio de poesia."
 artifact_double_moon_book_description_append: "$artifact_double_moon_book_description$ As páginas contêm:\n"
 ep3_story_cycle_violet_poet.0002.t: "Construindo um Legado"
 ep3_story_cycle_violet_poet.0002.desc: "Hay algo que lleva semanas dándome vueltas a la cabeza: ¿quién continuará mi legado? ¿Quién seguirá patrocinando las artes y formará a los jóvenes en su oficio?\n\nTengo mucho que transmitir: [double_moon_book.GetName] resulta fácil, por supuesto, pero hay mucho más aparte de ello. El legado final de la dinastía [ROOT.Char.GetHouse.GetName] es una propuesta mucho más importante que incluso ese pesado volumen.\n\nPero, en realidad, no es más que una reliquia que se desvanece. Lo más importante es el cómo vivir, la fuerza vital de todo poeta como yo. Poesía, amor, ¡un aprecio por el mundo que [ROOT.Char.GetFaith.HighGodName] creó a nuestro alrededor!\n\n#EMP Eso#! es lo que debo encontrar. Alguien que entienda esa corriente intangible hacia el mundo."
 ep3_story_cycle_violet_poet.0002.a: "Infelizmente, tais indivíduos são escassos."
 ep3_story_cycle_violet_poet.0002.a.tt: "Você pondera a situação..."
 ep3_story_cycle_violet_poet.0002.b: "Não há necessidade de se preocupar com isso ainda."
 ep3_story_cycle_violet_poet.0002.b.flavor: "... embora eu deva me pôr a isso #EMP pronto#!."
 ep3_story_cycle_violet_poet.0002.b.tt: "@alert_icon! #alert_trial Se você morrer antes que um herdeiro seja designado, sua dinastia pode acabar!#!"
 ep3_story_cycle_violet_poet.0003.t: "Excesso de Opções"
 ep3_story_cycle_violet_poet.0003.opening: "Escuto com um ouvido o acalorado debate poético vindo de fora. A quem posso escolher?\n\n"
 ep3_story_cycle_violet_poet.0003.poet: "A [heir1.GetFirstName] por exemplo. Seu domínio da métrica é tão instintivo e impressionante…"
 ep3_story_cycle_violet_poet.0003.diplomat: "A [heir1.GetFirstName], por exemplo. Seu amor pela poesia é tão evidente e apaixonado…"
 ep3_story_cycle_violet_poet.0003.woman: "Ou talvez [heir2.GetFirstName]? Como um [heir2.GetWomanMan]; ao menos entenderia minhas palavras com mais profundidade quando eu partir."
 ep3_story_cycle_violet_poet.0003.young: "Ou talvez [heir2.GetFirstName]? Uma alma jovem tem muito a recomendar pela sua maleabilidade."
 ep3_story_cycle_violet_poet.0003.heir3: "\n\nUma saraivada de palavras ecoa, agudas e entrecortadas. Percebo que [heir3.GetFirstName], recém-chegado[heir3.Custom('ES_OA')] ao salão, termina um verso elegante. Ele é jovem,"
 ep3_story_cycle_violet_poet.0003.intelligent: "extremamente inteligente e"
 ep3_story_cycle_violet_poet.0003.beautiful: "notavelmente bel[heir3.Custom('ES_OA')] e"
 ep3_story_cycle_violet_poet.0003.ending: "com tanto talento para a prosa!\n\nPelo grupo de [Select_CString(heir3.IsFemale, 'admiradores', 'admiradoras' )] que reúne, talvez também possa ser outra #EMP violeta#!…"
 ep3_story_cycle_violet_poet.0003.a: "[heir1.GetFirstNameNoTooltip] deve ser minha escolha."
 ep3_story_cycle_violet_poet.0003.b: "[heir2.GetFirstNameNoTooltip] será meu herdeir[heir2.Custom('ES_OA')]."
 ep3_story_cycle_violet_poet.0003.c: "Sabe, há algo sobre [heir3.GetFirstNameNoTooltip]..."
 ep3_story_cycle_violet_poet.0004.t: "Lembrado com Carinho"
 ep3_story_cycle_violet_poet.0004.desc: "Oh, [wallada.GetFirstName]! Mentor[wallada.Custom('ES_XA')], amig[wallada.Custom('ES_OA')], minha inspiração. Você viveu cem vidas em uma só e, ainda assim, parece que não foi o suficiente.\n\nAbro o pacote que me deixou, o último presente de uma longa série. O embrulho se solta de [double_moon_book.GetName], o livro de poesia que levou tanto tempo para elaborar.\n\n[wallada.GetFirstNameNoTooltip|U] falou por muito tempo sobre dar continuidade a um legado, e agora entendo que esse legado cabe a mim continuar. Preciso viver a vida ao máximo, assim como [wallada.GetSheHe] fez, e aproveitar cada alegria que ela tem a oferecer. Preciso também registrá-la, em verso, nestas mesmas páginas."
 ep3_story_cycle_violet_poet.0004.a: "Farei o meu melhor."
 ep3_story_cycle_violet_poet.0010.title: "Poema Muwashshah Vendido"
 ep3_story_cycle_violet_poet.0011.title: "Poema Muwashshah Mantido"
 ep3_story_cycle_violet_poet.0011.message: "[double_moon_book.GetName] recebe um Modificador aleatório"
 ep3_story_cycle_violet_poet.0012.title: "Poema Muwashshah Distribuído"
 #Story cycle events
 ep3_story_cycle_violet_poet.1000.t: "A Generosidade da Natureza"
 ep3_story_cycle_violet_poet.1000.desc: "Parece que tirar um tempo ao ar livre foi a coisa certa a fazer. A paisagem, os sons e o cheiro do ar fresco estão fazendo maravilhas pelo meu bem-estar.\n\nÉ durante esta caminhada, longe do meu acampamento, que me deparo com uma bela fonte na floresta. O murmúrio calmante do regato e das árvores cheias de folhas me acalma tanto que percebo que horas se passaram.\n\nMeu estômago reclama, e minha fome aumenta. Pelo caminho, deixei para trás algumas plantas comestíveis, mas há certo cunho poético em estar sozinho e com fome…"
 ep3_story_cycle_violet_poet.1000.a: "A adversidade gera grande inspiração!"
 ep3_story_cycle_violet_poet.1000.a.book: "[double_moon_book.GetDesc]\n$EFFECT_LIST_BULLET$\"Um passeio entre as árvores\""
 ep3_story_cycle_violet_poet.1000.b: "Devo buscar suprimentos."
 ep3_story_cycle_violet_poet.1005.t: "Um Bom Aprendiz"
 ep3_story_cycle_violet_poet.1005.desc: "Ao explorar as ruas de [location.GetName], paro no limiar de um dos orfanatos da cidade. Meus ouvidos se aguçam curiosos com o som familiar de versos recitados, que vem da porta aberta.\n\nLentamente, me encosto na parede, ouvindo. Um dos jovens órfãos trava uma batalha verbal com outro, com devoção e habilidade verdadeiramente impressionantes para alguém tão jovem.\n\nEsta criança empunha as palavras como se fossem uma lâmina afiada, cortando a tagarelice infantil de seu oponente.\n\nBravo, eu digo, excelente trabalho!"
 ep3_story_cycle_violet_poet.1005.a: "Você, garota! Como você gostaria de um lugar para aprender?"
 ep3_story_cycle_violet_poet.1005.a.tt: "Eu simplesmente #EMP devo#! levar tal talento sob minha asa."
 ep3_story_cycle_violet_poet.1005.b: "Que história é essa!"
 ep3_story_cycle_violet_poet.1005.b.book: "[double_moon_book.GetDesc]\n$EFFECT_LIST_BULLET$\"O poeta órfão\""
 ep3_story_cycle_violet_poet.1005.c: "Talvez meu acampamento não seja lugar para crianças."
 ep3_story_cycle_violet_poet.1005.c.tt: "Mas seu talento é tão precoce que devo pelo menos financiá-lo!"
 ep3_story_cycle_violet_poet.1010.t: "O Romance da Poesia"
 ep3_story_cycle_violet_poet.1010.desc: "Ser recebid[ROOT.Char.Custom('ES_OA')] na corte [ruler.Custom('ES_DelDela')] [ruler.GetTitledFirstName|l] é uma grande honra. E recitar diante de sua pessoa alguns dos meus antigos poemas, uma honra ainda maior.\n\nNo entanto, é difícil me concentrar quando tenho diante de mim tamanha beleza deslumbrante. [ruler_spouse.GetFirstName], [ruler_spouse.Custom('ES_ElLa')] [ruler_spouse.GetWifeHusband] de [ruler.GetFirstNameNoTooltip], conquistou meu coração. Que elegância excepcional, que graça maravilhosa! Me apaixonei por est[ruler_spouse.Custom('ES_EA')] [ruler_spouse.GetWomanMan].\n\nMinhas paixões estão à solta. Quero amar! Quero escrever!"
 ep3_story_cycle_violet_poet.1010.a: "Talvez eu possa oferecer a ela/ele uma \"aula particular de poesia\"…"
 ep3_story_cycle_violet_poet.1010.a.success: "A [ruler_spouse.GetSheHe] se encanta com sua declamação rítmica"
 ep3_story_cycle_violet_poet.1010.a.failure: "[ruler_spouse.GetSheHe|U] recusa educadamente"
 ep3_story_cycle_violet_poet.1010.b: "Por que o destino deve me tentar tanto?"
 ep3_story_cycle_violet_poet.1010.b.book: "[double_moon_book.GetDesc]\n$EFFECT_LIST_BULLET$ O fruto proibido"
 ep3_story_cycle_violet_poet.1010.c: "Deve ser meu[ruler_spouse.Custom('ES_OA')]!"
 ep3_story_cycle_violet_poet.1010.c.tt: "Aumenta a [success_chance|lE] do seu [GetScheme('courting').GetTypeName|l] [scheme|lE]"
 ep3_story_cycle_violet_poet.1015.t: "Um Seguidor, Enamorado"
 ep3_story_cycle_violet_poet.1015.desc: "Um arrastar de pés trôpego anuncia a presença de [Select_CString(stranger.IsFemale, 'uma estranha', 'um estranho' )], [Select_CString(stranger.IsFemale, 'cansada e exausta', 'cansado e exausto' )], entre nós. Quando se toma um momento para beber a água que lhe oferecemos e se sentar junto ao nosso fogo, olha para mim com um sorriso deslumbrante.\n\n \"Você é [ROOT.Char.GetFirstNameNoTooltip], certo? Tenho estado atrás de você há dias. Seus poemas mudaram minha vida de maneiras que nem consigo descrever em palavras simples! Palavras que imagino que você #EMP no#! não teria dificuldade em formar!\"\n\nPensar que essa pessoa me perseguiu por dias só para me fazer um elogio? Há algo romanticamente belo na dedicação exibida."
 ep3_story_cycle_violet_poet.1015.a: "'Eu deveria te agradecer #EMP devidamente#!.'"
 ep3_story_cycle_violet_poet.1015.a.success: "[stranger.GetSheHe|U] concorda entusiasticamente"
 ep3_story_cycle_violet_poet.1015.a.failure: "[stranger.GetSheHe|U] sai em disgust"
 ep3_story_cycle_violet_poet.1015.b: "Nos seria útil uma[Select_CString(stranger.IsFemale, 'viajera experimentada', 'viajero experimentado' )] para nos ajudar."
 ep3_story_cycle_violet_poet.1015.c: "Que palavras gentis!"
 ep3_story_cycle_violet_poet.1020.t: "Uma Névoa que Ofusca Tudo"
 ep3_story_cycle_violet_poet.1020.desc: "Estou amaldiçoado! Apesar de todos os meus esforços, estes últimos dias têm sido tomados por uma névoa interminável que turva minha mente.\n\nNenhuma palavra foi parar na página, nenhuma devoção romântica, nem palavras mordazes. Pareceria que minha maré de inspiração finalmente chegou ao fim.\n\nO que devo fazer? Como me livro dessa tortura intelectual?!"
 ep3_story_cycle_violet_poet.1020.a: "Preciso de alguém para me inundar de ideias."
 ep3_story_cycle_violet_poet.1020.a.tt: "Você não tem [followers|lE] com mais de #high 20#! [diplomacy|lE]"
 ep3_story_cycle_violet_poet.1020.a.book: "[double_moon_book.GetDesc]\n $EFFECT_LIST_BULLET$'Mãos Ajudadoras'"
 ep3_story_cycle_violet_poet.1020.b: "Posso suportar!"
 ep3_story_cycle_violet_poet.1020.b.success: "Funciona"
 ep3_story_cycle_violet_poet.1020.b.failure: "Não funciona"
 ep3_story_cycle_violet_poet.1020.c: "Talvez seja hora de fazer uma pausa?"
 ep3_story_cycle_violet_poet.1020.c.success: "Você encontra um lugar de calma"
 ep3_story_cycle_violet_poet.1020.c.failure: "Sua mente ainda está ofuscada"
 ep3_story_cycle_violet_poet.1025.t: "A Próxima Geração"
 ep3_story_cycle_violet_poet.1025.desc: "Passo muito tempo em meu salão, mas uma boa parte do restante eu passo vagando pelas ruas de [location.GetName]. E isso invariavelmente me leva aos orfanatos, onde são cuidados os pobres meninos e meninas deslocados pela guerra, pela fome ou até mesmo pelo simples abandono.\n\nHoje, vários rostos novos estão visíveis no pátio. Meu coração, como sempre, chora por essas pobres almas. Tantos deles…\n\nUma pequena voz abafada rompe o silêncio. Um[orphan.Custom('ES_XA')] [orphan.Custom('GirlBoy')] pequen[orphan.Custom('ES_OA')] se senta em um canto, murmurando as palavras de um poema de um pedaço de pergaminho em farrapos. Tão jovem, e claramente sem instrução, mas pode haver um verdadeiro potencial nessas crianças…"
 ep3_story_cycle_violet_poet.1025.a: "Não posso deixar esse potencial passar despercebido."
 ep3_story_cycle_violet_poet.1025.a.tt: "Eu devo adotá-los todos!"
 1025_every_orphan: "Todo Órfão"
 ep3_story_cycle_violet_poet.1025.b: "Só posso arcar com um..."
 ep3_story_cycle_violet_poet.1025.b.tt: "Então, devo fazer este contar."
 ep3_story_cycle_violet_poet.1025.b.success: "Seu cuidado dá frutos"
 ep3_story_cycle_violet_poet.1025.c: "O governante local deve acomodá-los."
 ep3_story_cycle_violet_poet.1025.c.tt: "Talvez envergonhar [holder.GetHerHim] funcione..."
 ep3_story_cycle_violet_poet.1025.c.success: "[holder.GetTitledFirstNameNoTooltip] aceita o fardo"
 ep3_story_cycle_violet_poet.1025.c.failure: "[holder.GetTitledFirstNameNoTooltip] se recusa a pagar"
 ep3_story_cycle_violet_poet.1030.t: "Os Grandes e os Bons"
 ep3_story_cycle_violet_poet.1030.desc: "O chamado de uma corte nobre deve ser atendido, então me encontro em um dos palácios mais bonitos de [location.GetName]. Quem me recebe é [noblewoman.GetFirstName] muito excitada.\n\n\"É uma honra conhecê-lo!\" ela dispara. \"Veja bem, acho que preciso de alguma orientação...\".\n\nPelo que parece, [noblewoman.GetFirstNameNoTooltip] tem tentado estudar poesia, com um sucesso limitado. Tão limitado, na verdade, que isso pode me dar certa #EMP ventaja#!…"
 ep3_story_cycle_violet_poet.1030.a: "Eu serei seu tutor."
 ep3_story_cycle_violet_poet.1030.b: "Infelizmente, não posso dispensar o tempo."
 ep3_story_cycle_violet_poet.1030.c: "Talvez eu possa oferecer um tutor alternativo?"
 ep3_story_cycle_violet_poet.1030.c.tt: "Um pouco para mim e um pouco para [courtier_poet.GetFirstNameNoTooltip] pelos seus problemas…"
 ep3_story_cycle_violet_poet.2000.t: "Quando a Escuridão Cai"
 ep3_story_cycle_violet_poet.2000.desc: "À medida que os dias passam, percebo-me recordando dos relacionamentos da minha juventude. Um nome em particular me vem à cabeça: [zaydun.GetFirstName]. Ibn Zaydun, [zaydun.GetHerHim] o chamavam, por sua sagacidade rápida e sua língua de prata.\n\nAh, aqueles dias em que trocávamos poemas, viajando por terras inteiras só para passar uma noite juntos. Isso me deixa nostálgico. Nosso relacionamento talvez não tenha sido perfeito, mas essas lembranças permanecem com carinho em meu coração.\n\nJá faz muitos, muitos anos que não [zaydun.GetHerHim] o vejo. Fui tão duro[ROOT.Char.Custom('ES_OA')] em nossa separação, tão mordaz. Os remorsos pesam muito sobre mim."
 ep3_story_cycle_violet_poet.2000.a: "Talvez eu devesse escrever uma carta para ele..."
 ep3_story_cycle_violet_poet.2000.a.tt: "Redija uma missiva para seu antigo amor"
 ep3_story_cycle_violet_poet.2000.a.book: "[double_moon_book.GetDesc]\n $EFFECT_LIST_BULLET$'As Algemas do Desejo'"
 ep3_story_cycle_violet_poet.2000.b: "Um poema em memória de um amor perdido. Isso aliviará minha alma."
 ep3_story_cycle_violet_poet.2000.c: "Esses dias passaram. Eu devo seguir em frente."
 ep3_story_cycle_violet_poet.2001.t: "Para a lua no meu céu noturno,"
 ep3_story_cycle_violet_poet.2001.desc: "Longo esperei até mesmo a menção mais fugaz do meu nome em seus lábios.\n\nMeu corpo envelheceu, mas meu coração está tão parado quanto estava no momento em que você me deixou; congelado, quebrado, aguarda seu toque para bater mais uma vez."
 ep3_story_cycle_violet_poet.2001.a: "Oh, meu prezad[zaydun.Custom('ES_OA')] [zaydun.GetFirstNameNoTooltip]…"
 ep3_story_cycle_violet_poet.2001.a.flavor: "Eu preciso ver [zaydun.GetHerHim] novamente."
 ep3_story_cycle_violet_poet.2001.a.tt: "Convide [zaydun.GetFirstNameNoTooltip] para visitar."
 ep3_story_cycle_violet_poet.2001.b: "Isso é... um pouco demais."
 ep3_story_cycle_violet_poet.2005.t: "Reencontrados"
 ep3_story_cycle_violet_poet.2005.desc: "E aí está, de repente, na porta. A idade [zaydun.Custom('ES_LeLa')] mudou tanto e, no entanto… nada em absoluto. Há mais rugas em seu rosto, mas continua sendo o mesmo. Sua postura está um pouco mais curvada, mas continua sendo o corpo que segurou o meu com tanta força naquela época. Até mesmo o jeito como se move…\n\nE realmente se move, atravessando o espaço entre nós em meros instantes, e então estou de novo em seus braços. Um sentimento tão distante, tão encharcado pelo pó dos anos e esmaecido pela luz da memória, e ainda assim tão intimamente familiar.\n\nQuando nos separamos a contragosto, sinto como se uma parte de mim que eu nem sabia que faltava tivesse sido de repente devolvida, feridas antigas costuradas e fechadas."
 ep3_story_cycle_violet_poet.2005.a: "\"Não consigo acreditar que é realmente você.\""
 ep3_story_cycle_violet_poet.2005.a.tt: "Não devo me deixar apaixonar novamente..."
 ep3_story_cycle_violet_poet.2005.b: "Bem, a presença dele sozinha eleva o perfil do meu salão..."
 ep3_story_cycle_violet_poet.2010.t: "Trabalho Colaborativo"
 ep3_story_cycle_violet_poet.2010.desc: "Nos sentamos e rimos como nos velhos tempos, bebendo chá à sombra. O engenho e o intelecto de [zaydun.GetFirstName] continuam afiados e a idade não diminuiu o charme com que me conquistou no passado.\n\n\"O que temos aqui?\", pergunta, apontando para meu [double_moon_book.GetName] sobre a mesa, ao meu lado. Eu lho entrego.\n\n\"É uma obra belíssima. Seu trabalho continua tão elegante quanto sempre\". O sorriso dele me abala um pouco. \"Suponho que você não gostaria de escrever uma colaboração nos próximos dias, não é? Desde que [Select_CString(zaydun.IsFemale, 'esta vieja', 'este viejo' )] consiga acompanhar seu ritmo, claro\"."
 ep3_story_cycle_violet_poet.2010.a: "\"Nós dois somos velhos, [zaydun.GetFirstNameNoTooltip]. Mas com a idade vem a sabedoria.\""
 ep3_story_cycle_violet_poet.2010.b: "\"Eu trabalho sozinha.\""
 ep3_story_cycle_violet_poet.2015.t: "Despedida, Novamente"
 ep3_story_cycle_violet_poet.2015.desc: "Os últimos dias foram alguns dos mais felizes da minha vida, mas tudo chega ao fim. Um servo passa ao nosso lado carregando mais pertences de [zaydun.GetFirstName] enquanto nos despedimos. [zaydun.GetSheHe|U] toma minhas mãos nas dele.\n\n“Ver você de novo trouxe a luz de volta à minha vida.” e se cala. [Select_CString(zaydun.IsFemale, 'La oradora', 'El orador' )] mais célebre de Al-Andalus ficou sem palavras. Em vez disso, ele leva a mão ao bolso e coloca algo na palma da minha mão.\n\n“Por favor, pegue isto. Não é nada, uma simples bugiganga, mas… se a usar de vez em quando, meu coração se encherá de alegria. Ao preenchê-la com seu dedo, você também preencherá o vazio do meu coração onde vive sua lembrança.”"
 ep3_story_cycle_violet_poet.2015.a: "\"...fique comigo. Aqui, em [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]. Você #EMP deve.#!\""
 ep3_story_cycle_violet_poet.2015.artifact: "[newly_created_artifact.GetDesc]\n\nÉ um design simples, exceto por um detalhe: uma pequena inscrição em seu interior lê \"Para meu amor, o último sonho da minha alma.\""
 ep3_story_cycle_violet_poet.2015.a.success: "[zaydun.GetFirstName] concorda em ficar"
 ep3_story_cycle_violet_poet.2015.a.failure: "[zaydun.GetFirstName] recusa e vai embora"
 ep3_story_cycle_violet_poet.2015.b: "Até nos encontrarmos novamente, meu amor perdido."
 ep3_story_cycle_violet_poet.2015.b.tt: "… se voltarmos a nos ver."
 ep3_story_cycle_violet_poet.2015.c: "Não posso perdoar os erros do passado."
 ep3_story_cycle_violet_poet.2015.c.tt: "A culpa consome você."
 story_cycle_violet_poet: "A poetisa violeta"
 story_cycle_violet_poet_desc: "Você é a filha do califa de Córdova e uma das últimas omíadas. Caminha sem véu por um mundo austero, aguçando as mentes de mulheres de todas as classes."
