 united_political_agents_modifier: "Agentes Unidos na Capital"
 united_political_agents_modifier_desc: "As criaturas políticas deste personagem dentro do alto tribunal do país trabalham em conjunto com as de outro."
 united_political_agents_modifier_tt: "#weak [political_schemes|E] contra [liege|lE]: #P +15%#! [success_chance|lE]#!"
 chariot_race.4000.c: "Eu me pergunto se [target_governor.GetFirstNameNoTooltip] ouviu as histórias que contam sobre mim?"
 chariot_race.4000.c.success: "[target_governor.GetFirstNameNoTooltip] começa a promover sua lenda"
 chariot_race.4000.c.failure: "[target_governor.GetFirstNameNoTooltip] não está interessado em sua lenda"
 chariot_race.4000.d: "Ah, uma oportunidade de expandir meu alcance político!"
 chariot_race.4000.d.success: "Você consegue manipular [target_governor.Custom('ES_AlAla')] [target_governor.GetTitledFirstName|l]"
 chariot_race.4000.d.failure: "Você não consegue manipular [target_governor.Custom('ES_AlAla')] [target_governor.GetTitledFirstName|l]"
 chariot_race.4000.f: "Nunca subestime o valor de amigos em altos postos."
 chariot_race.4000.g: "Talvez seja hora de colocar [target_governor.GetFirstNameNoTooltip] em seu lugar..."
 chariot_race.4000.g.flavor: "Você solta um insulto que quebra a ambição de [target_governor.GetFirstNameNoTooltip]"
 target_governor_change_appointment_investment_medium_loss: "A [candidate_score|lE] [target_governor.Custom('ES_DelDela')] [target_governor.GetTitledFirstName|l] para [target_title.GetName|l] diminui em [EmptyScope.ScriptValue('appointment_score_medium_value')|N0]"
 chariot_race.4010.t: "Abaixo [unpopular_official.Custom('ES_ElLa')] [unpopular_official.GetTitledFirstNameNoTooltip|l]!"
 chariot_race.4010.desc: "Um clamor se ergue da multidão, se espalha, se repete e se torna um canto. Inclino-me para a frente, esforçando-me para captar as palavras. Os [Glossary( 'hoi polloi', 'HOI_POLLOI_GLOSS')] batem os pés, apontam, gritam um nome: #EMP \"Abajo [unpopular_official.Custom('ES_ElLa')] [unpopular_official.GetTitledFirstNameNoTooltip|l]! Abajo [unpopular_official.Custom('ES_ElLa')] [unpopular_official.GetTitledFirstNameNoTooltip|l]!\".#!\n\nMe haviam dito que [unpopular_official.Custom('ES_ElLa')] [unpopular_official.GetTitledFirstNameNoTooltip|l] estava ganhando certa reputação, mas eu não fazia ideia de que o povo estivesse tão furioso!"
 chariot_race.4010.a: "[unpopular_official.Custom('ES_ElLa')|U] [unpopular_official.GetTitledFirstNameNoTooltip|l] será destituíd[unpopular_official.Custom('ES_OA')] de seu cargo."
 chariot_race.4010.b: "Acalme a multidão. Envie servos para lhes lançar prêmios!"
 chariot_race.4010.b.tt.success: "A multidão está encantada"
 chariot_race.4010.b.tt.failure: "Os gritos apenas aumentam"
 chariot_race.4010.c: "Inaceitável. Eu preciso das habilidades de [unpopular_official.GetFirstNameNoTooltip]."
 chariot_race.4010.d: "Vamos todos ao coro! Abaixo [unpopular_official.Custom('ES_ElLa')] [unpopular_official.GetTitledFirstNameNoTooltip|l]!"
 chariot_race.4010.e: "Vamos começar um novo cântico! #EMP \"[ROOT.Char.GetFaith.HighGodName] salve [emperor_scope.Custom('ES_AlAla')] [emperor_scope.GetTitledFirstNameNoTooltip|l]!\"#!."
 chariot_race.4010.f: "Sente-se em um silêncio desconfortável."
 chariot_race.4020.t: "Os Encantos de [ROOT.Char.GetCapitalLocation.GetNameNoTooltip]"
 chariot_race.4020.desc: "\"Vocês disseram [Glossary( 'termas', 'THERMAE_GLOSS')] suntuosas?\", murmura [notable.GetName], suas palavras quase se perdem no alvoroço da multidão. \"Jamais teria considerado [ROOT.Char.GetCapitalLocation.GetName] um lugar de tamanha sofisticação…\".\n\nAo falar de meus planos para [ROOT.Char.GetPrimaryTitle.GetNameNoTier], um ar sonhador toma conta do olhar distante de [notable.Custom('ES_DelDela')] [notable.GetTitledFirstNameNoTooltip|l].\n\n"
 THERMAE_GLOSS: "Um complexo de banhos de origem romana, que servia não apenas para limpar o corpo, mas para facilitar uma variedade de interações sociais."
 chariot_race.4020.desc_capital_estate: "\"Na verdade,\" [notable.GetSheHe] diz, \"As vozes dos meus parentes estão perdidas no alvoroço, nas disputas, da capital, e nossos filhos expostos a todos os vícios... talvez uma casa [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip] se encaixasse bem na Casa [notable.GetHouse.GetName]."
 chariot_race.4020.desc_provincial_estate: "\"In truth,\" [notable.GetSheHe] says, \"My family dines too often with bumpkins and no-names in [current_estate.GetName]... and it seems your ministry could make fine use of officials with the [notable.GetHouse.GetName] name.\""
 chariot_race.4020.a: "Você sempre será bem-vindo em meu palácio!"
 chariot_race.4020.a.flavor: "E em [ROOT.Char.GetCapitalLocation.GetNameNoTooltip], que todos os nossos parentes estejam unidos!"
 chariot_race.4020.a.success: "[notable.GetFirstNameNoTooltip] se torna um[notable.Custom('ES_XA')] confidente valios[notable.Custom('ES_OA')]"
 chariot_race.4020.a.failure: "[notable.GetFirstNameNoTooltip] aprecia que [notable.Custom('ES_LoLa')] tenha em tão alta consideração"
 chariot_race.4020.b: "Venha, venha! Um emprego digno aguarda!"
 noble_administrators_modifier: "Administradores de Nobreza"
 noble_administrators_modifier_desc: "Nobres influentes vieram para a capital deste personagem, agora ocupando papéis vitais em sua burocracia."
 5_percent_governor_efficiency_tooltip: "[governor_efficiency|E]: @governor_efficiency!#positive_value +5%#!"
 chariot_race.4020.c: "Vou equipar uma bela casa de campo para você."
 chariot_race.4020.c.flavor: "[notable.Custom('ES_ElLa')|U] [notable.GetTitledFirstNameNoTooltip|l] não precisa morar lá em tempo integral…, mas #EMP deve#! honrar tal ato de generosidade."
 chariot_race.4020.d: "Mas são os #EMP comerciantes#! de [current_estate.GetNameNoTooltip] que realmente precisamos."
 chariot_race.4020.d.flavor: "E a propriedade [notable.Custom('ES_DelDela')] [notable.GetTitledFirstNameNoTooltip|l] lida com eles de forma prodigiosa…"
 mercantile_contacts_modifier: "Contatos Mercantis"
 mercantile_contacts_modifier_desc: "Uma poderosa família distante direciona seus comerciantes locais para as amplas oportunidades de negócios a serem encontradas aqui."
 chariot_race.4030.t: "As Bebidas do Hipódromo"
 chariot_race.4030.desc: "Por fim consegui me aproximar de [seduce_interest.GetName]. [seduce_interest.GetSheHe|U] parece estar curios[seduce_interest.Custom('ES_OA')].\n\n\"Vocês conseguem acreditar, bo[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetFirstName]?\", sussurra [seduce_interest.GetFirstNameNoTooltip] de modo encantador, \"[Select_CString( prostitute.IsFemale, 'As prostitutas', 'Os prostitutos' )] da capital — como [Select_CString( prostitute.IsFemale, 'ela', 'ele' )] — conhecem prazeres que poucos ousam nomear.\""
 chariot_race.4030.desc_no_seduction: "O espetáculo das bigas não é o único entretenimento do dia, nem é tudo o que há aqui para acender as paixões de L[ROOT.Char.Custom('ES_OsAs')] [ROOT.Char.GetWomenMen]. À medida que os espíritos se exaltam, aquelas que vendem seus corpos se esgueiram pela multidão em busca de clientes.\n\nUm rosto pintado — um especialmente bonito — sorri para mim de forma convidativa. Que ousadia a sua, aproximando-se destes lugares de honra! Mas mesmo aqui..., eu poderia facilmente tomar sua mão na minha e seguir seu corpo de aroma suave até um lugar isolado..."
 chariot_race.4030.a: "#EMP Ou#! eu poderia atrair uma parte interessada..."
 chariot_race.4030.a.flavor: "… e quando [john.Custom('ES_ElLa')] [john.GetTitledFirstNameNoTooltip|l] tiver aproveitado sua diversão repugnante, eu acabarei sabendo um segredo sujo!"
 chariot_race.4030.a.success: "Você leva [john.GetFirstNameNoTooltip] para as sombras"
 chariot_race.4030.a.failure: "[john.GetFirstNameNoTooltip] te repreende publicamente"
 chariot_race.4030.b: "Há algo que devamos ver pessoalmente, [seduce_interest.GetLadyLord] meu[seduce_interest.Custom('ES_OA')]…?"
 chariot_race.4030.b.flavor: "Estaria #EMP muito#! dispost[ROOT.Char.Custom('ES_OA')] a levar est[seduce_interest.Custom('ES_EA')] [seduce_interest.GetWomanMan] sugestiv[seduce_interest.Custom('ES_OA')] a um lugar ilícito e anônimo!"
 chariot_race.4030.b.success: "[seduce_interest.GetFirstNameNoTooltip] se entrega a você"
 chariot_race.4030.b.failure: "[seduce_interest.GetFirstNameNoTooltip] está completamente escandalizada"
 chariot_race.4030.c: "Isso realmente soa... atraente..."
 chariot_race.4030.c.flavor: "Dizem que [Select_CString( prostitute.IsFemale, 'as prostitutas', 'os prostitutos' )] de [host.GetCapitalLocation.GetNameNoTooltip] são habilidos[prostitute.Custom('ES_OA')] s como [Select_CString( prostitute.IsFemale, 'nenhuma outra', 'nenhum outro' )]..."
 chariot_race.4030.d: "Agora vou apenas assistir à corrida."
 chariot_race.4031.t: "O Primeiro a Terminar"
 chariot_race.4031.desc: "Voltas e reviravoltas intermináveis, cada vez mais abaixo, nos levam a um pombal vazio. Enquanto as pombas arrulham pela chegada da paz, [besexed.Custom('ES_ElLa')|U] [besexed.GetTitledFirstName|l] e eu copulamos.\n\nCom todos os músculos em tensão e lançando furtivas olhadas para a entrada, [besexed.GetHerHim|U] o abraço com força até que, por fim, alcance a satisfação. Ao longe, a multidão ruge.\n\n"
 chariot_race.4031.desc_seduced: "\"Que escandaloso\", ronrona [besexed.GetFirstNameNoTooltip], saboreando nossa fantasia sórdida. \"Ouso sonhar que agora estou a seu serviço, [ROOT.Char.Custom('FormOfAddressForLiege')]?\"."
 chariot_race.4031.desc_prostitute: "Você não é como [ROOT.Char.GetHerHim] os demais, [ROOT.Char.Custom('FormOfAddressForLiege')], ronrona [besexed.GetFirstNameNoTooltip], traçando desenhos como fitas pela minha pele nua. Será que ouso sonhar que irá me procurar outra vez?"
 chariot_race.4031.a: "Certamente não estou deixando você escapar."
 chariot_race.4031.a.flavor: "Na próxima vez, porém, vamos estar sob os lençóis!"
 chariot_race.4031.b: "Que ocasião são as corridas!"
 chariot_race.4031.b.flavor: "… uma ocasião única sem importância duradoura, sim."
 chariot_race.4040.t: "Os [ROOT.Char.Custom('GetChariotTeamColorPlural')], Unidos!"
 chariot_race.4040.desc: "#EMP [ROOT.Char.Custom('GetChariotTeamColorPluralGlossed')]! [ROOT.Char.Custom('GetChariotTeamColorPluralGlossed')]! [ROOT.Char.Custom('GetChariotTeamColorPluralGlossed')]!,#! o cântico vem de baixo, ficando cada vez mais alto, quando [Select_CString( common_fan.IsFemale, 'a plebeia suada', 'o plebeu suado' )] [common_fan.GetName] se ajoelha diante de [noble_fan.Custom('ES_ElLa')] [noble_fan.GetTitledFirstName|l] e de minha pessoa.\n\nNobres prelados[ROOT.Char.Custom('ES_OA')] s, declara, sois [ROOT.Char.GetHerHim] s dos mais nobres e dos mais autêntic[ROOT.Char.Custom('ES_OA')] s seguidores[ROOT.Char.Custom('ES_EA')] s de nossos amados [ROOT.Char.Custom('GetChariotTeamColorPluralGlossed')]! Seríeis tão gentis a ponto de vir conosco e erguer uma taça com outros compatriotas fortes e leais? Vou impedir as brigas e o arremesso de pedras entre os rapazes, eu juro!\n\n[noble_fan.GetFirstNameNoTooltip] e os outros nobres parecem estar de ótimo humor, mas, ainda assim... todos se encolhem só de pensar na turba."
 chariot_race.4040.a: "Hmm... esses leais vagabundos parecem úteis..."
 chariot_race.4040.a.flavor: "Consiga em segredo a ajuda dest[common_fan.Custom('ES_EA')] a puxa-saco e sua turba violenta."
 chariot_race.4040.discord_tt: "#high $sow_discord_intent$#! Os efeitos [intent|lE] são aprimorados"
 chariot_race.4040.thugs_tt: "Seu #high $murder_attendee_intent$#! [intent|lE] tem mais chances de sucesso"
 chariot_race.4040.b: "[ROOT.Char.GetCapitalLocation.GetNameNoTooltip] é onde os verdadeiros [ROOT.Char.Custom('GetChariotTeamColorPluralGlossed')] pertencem!"
 chariot_race.4040.b.flavor: "Incentive os membros da deme a emigrar para um futuro bastião dos [ROOT.Char.Custom('GetChariotTeamColorPluralGlossed')]."
 chariot_race.4040.b.success: "A deme ruge seu nome"
 chariot_race.4040.b.failure: "Você falha em incitar alguém"
 chariot_race.4040.c: "Eu liderarei um poderoso comício de #EMP todos#! [ROOT.Char.Custom('GetChariotTeamColorPluralGlossed')]!"
 chariot_race.4040.c.flavor: "E assim me tornar o foco de toda a camaradagem deles."
 chariot_race.4040.d: "Melhor celebrar apenas com os nobres [ROOT.Char.Custom('GetChariotTeamColorPluralGlossed')]..."
 chariot_race.4040.team_popularity_tt: "Esse @influence_icon![influence|lE] é baseado na popularidade da sua equipe"
 chariot_race.4040.team_popularity_rally_tt: "Este resultado é afetado pela popularidade da sua equipe"
 powerful_loyal_deme_modifier: "Deme Leal Poderoso"
 powerful_loyal_deme_modifier_desc: "A facção de corrida local dominante é devotada ao seu governante, um fã proclamado publicamente."
 sizable_loyal_deme_modifier: "Deme Leal de Grande Tamanho"
 sizable_loyal_deme_modifier_desc: "Uma facção de corrida importante é devotada ao seu governante, um fã proclamado publicamente."
 flourishing_local_deme_modifier: "Deme Florescendo Localmente"
 flourishing_local_deme_modifier_desc: "Apoios ardentes de uma facção de corrida estão se unindo neste condado e revivendo antigas tradições de engajamento cívico."
 chariot_race.4050.t: "Para baixo..."
 chariot_race.4050.desc.non_abrahamic: "Essa espécie de [victim.Custom2('InsultNoun', ROOT.Char)] [victim.Custom2('InsultAdjective', ROOT.Char)] que é meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('victim'))] merece cair… lá embaixo…"
 chariot_race.4050.desc: "Como um anjo rebelde, como meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('victim'))] merece cair... para baixo,"
 chariot_race.4050.desc.kathisma: "do alto da tribuna imperial, todo o orgulho do lugar se apaga diante de seu corpo quebrado, estendido entre os plebeus aos gritos.\n\nO clima do Hipódromo se torna cada vez mais festivo, cada vez mais apaixonado pela disputa. Com guardas imperiais por perto, não há um momento perfeito para pôr as mãos em [victim.GetName] mas #EMP este#! parece tão bom quanto qualquer outro."
 chariot_race.4050.desc.track: "até as areias ardentes, onde as rodas das bigas quebrarão seus ossos e os cascos ferrados destruirão esse rosto deplorável.\n\nCom a corrida se intensificando, [victim.Custom('ES_ElLa')] [victim.GetTitledFirstName|l] ocupa um lugar na parte da frente das arquibancadas, praticamente se inclinando sobre a balaustrada enquanto se delicia com a ação lá embaixo."
 chariot_race.4050.desc.outro: "\n\nQuão perto está o[victim.Custom('ES_EA')] idiota de sua horrível ruína…"
 chariot_race.4050.desc.lackey: "Sólo preciso avisar meu faz-tudo[lackey.Custom('ES_XA')] de confiança, [lackey.GetFirstName]."
 chariot_race.4050.a: "É hora de que meus agentes [victim.GetHerHim] o derrubem…"
 chariot_race.4050.a.flavor: "[victim.GetFirstNameNoTooltip] emprestará o glamour da morte ao espetáculo do dia."
 chariot_race.4050.a.success: "[victim.GetFirstNameNoTooltip] sofre uma queda misteriosa"
 chariot_race.4050.a.failure: "Seu assassino é interceptado"
 chariot_race.4050.b: "#EMP Eu#! lançarei esse porco para SUA DESGRAÇA!"
 chariot_race.4050.b.flavor: "Você agarra [victim.GetFirstNameNoTooltip] e com #EMP muy#! pouca sutileza tenta jogar o corpo repugnante sobre a balaustrada."
 chariot_race.4050.b.success: "Você envia [victim.GetFirstNameNoTooltip] despencando"
 chariot_race.4050.b.failure: "[victim.GetFirstNameNoTooltip] resiste a você"
 chariot_race.4050.might_die: "@death_icon! Você pode ser morto"
 chariot_race.4050.might_be_imprisoned: "[host.GetShortUIName] pode [imprison|lE] você"
 chariot_race.4050.c: "Muito, muito público."
 chariot_race.4051.t: "Para o Abismo Infinito"
 chariot_race.4051.kathisma_attempt: "Um servo atende ao meu comando, impelido à sua certa ruína com promessas de rica recompensa. O assassino entra no [Glossary( 'kathisma', 'KATHISMA_GLOSS')]#!, carregado de refrescos, e se aproxima [victim.Custom('ES_AlAla')] [victim.GetTitledFirstName|l].\n\n"
 chariot_race.4051.stands_attempt: "À distância, só consigo distinguir a cabeça grosseira do meu assassino corpulento, enquanto ele se esgueira pelas arquibancadas lotadas em direção a [victim.Custom('ES_ElLa')] [victim.GetTitledFirstName|l].\n\n"
 chariot_race.4051.self_attempt: "Um ódio implacável me domina. Com o ímpeto do ataque, agarro as roupas [victim.Custom('ES_DelDela')] [victim.GetTitledFirstName|l], afasto de um golpe sua resistência atônita e [victim.GetHerHim] lanço-o ao abismo ensolarado.\n\n"
 chariot_race.4051.agents_success: "Forma-se um grande alvoroço, ergue-se [victim.GetFirstNameNoTooltip] acima da balaustrada e, com suas vestes e sedas girando, despenca de cabeça! Seu corpo cai ao chão como algum pássaro vistoso abatido."
 chariot_race.4051.agents_fail_secret: "Mas, ah, quando meu agente se lançou contra seu alvo, os companheiros de [victim.GetFirstName] saltaram para a briga! Durante o tumulto que se seguiu, felizmente para mim, o assassino foi apunhalado até a morte.\n\n[victim.GetNameNoTooltip] aprendeu que não está segur[victim.Custom('ES_OA')] nessas corridas..., mas não sabe de quem suspeitar por isso."
 chariot_race.4051.agents_fail_snitch: "Mas, ai, quando meu agente se lançou contra seu alvo, os companheiros de [victim.GetFirstName] saltaram para a briga! Meu assassino foi rapidamente dominado. Então, após aguentar alguns patéticos chutes, pisões e golpes nos genitais, esse incompetente #EMP revela mi nombre#!!\n\nEstou começando a me sentir bem pouco à vontade neste Hipódromo…"
 chariot_race.4051.self_failed_survive_kathisma: "Mas minha vítima não cai de bom grado. [victim.GetFirstNameNoTooltip] se agarra ao meu manto com força, me puxa pelo cabelo e me arrasta para uma briga feia. Os guardas imperiais me seguram rapidamente.\n\nBem acima da imensa multidão, sou algemado."
 chariot_race.4051.self_failed_survive: "Mas minha vítima não cai de bom grado. [victim.GetFirstNameNoTooltip] se agarra ao meu manto com força; me puxa pelo cabelo e me arrasta para uma luta feia. Os espectadores rapidamente me agarram e me mandam de volta na companhia dos meus guardas.\n\nHá um momento desconfortável de impasse antes de eu sair furioso."
 chariot_race.4051.self_failed_death: "Mas minha vítima não cai de bom grado. E, por [ROOT.Char.GetFaith.HighGodName], minhas pernas estão sem forças! Despenco no assento de [victim.GetFirstNameNoTooltip]. O sangue jorra de uma ferida de faca em meu peito.\n\n[victim.GetNameNoTooltip] se ergue sobre mim, adaga em mãos, gritando furiosamente, mas [ROOT.Char.GetFaith.DeathDeityName] me chama..."
 chariot_race.4051.success_death_stands: "\n\nOs espectadores lotam as arquibancadas no local do impacto, suas revelações se espalham: [victim.GetNameNoTooltip] está morto[victim.Custom('ES_OA')]!"
 chariot_race.4051.success_death_track: "\n\nA ocasião não poderia ser melhor. As carruagens desviam selvagemente para evitar o novo obstáculo, mas uma [Glossary( 'cuadriga', 'QUADRIGA_GLOSS')] atropela brutalmente a forma encolhida de [victim.GetFirstNameNoTooltip]. De imediato fica claro: [victim.GetNameNoTooltip] está mor[victim.Custom('ES_OA')]!"
 chariot_race.4051.success_infirm_stands: "\n\nEspectadores se aglomeram nas arquibancadas no local do impacto, suas revelações se espalhando: [victim.GetNameNoTooltip] vive, embora apenas por um triz!"
 chariot_race.4051.success_infirm_track: "\n\nOs assistentes correm até a forma amassada de [victim.GetFirstNameNoTooltip] que jaz sobre a areia. A notícia se espalha: [victim.GetNameNoTooltip] segue vivo, mas por pouco!"
 chariot_race.4051.a_triumph: "Um triunfo digno para o Hipódromo!"
 chariot_race.4051.a: "Uma aposta pobre..."
 ######
 chariot_race.0400.t: "Um Prêmio para o Vencedor"
 chariot_race.0400.desc_emperor: "Como [Select_CString( ROOT.Char.IsFemale, 'emperatriz', 'emperador' )], é uma grande honra conceder a tradicional folha de palmeira a [activity.MakeScope.Var('first_place').Char.GetName] para marcar sua vitória. [activity.MakeScope.Var('second_place').Char.GetName] e [activity.MakeScope.Var('third_place').Char.GetName] receberão seus elogios por sua vez, cada prêmio é um testemunho de sua destreza excepcional na arena."
 chariot_race.0400.desc_spectators: "Quando [activity.MakeScope.Var('first_place').Char.GetName] recebe uma folha de palmeira para celebrar sua vitória, o público irrompe em aplausos. [activity.MakeScope.Var('second_place').Char.GetName] e [activity.MakeScope.Var('third_place').Char.GetName] recebem seus elogios, cada prêmio é um testemunho de uma destreza excepcional na pista."
 chariot_race.0400.a: "Uma vitória bem merecida."
 chariot_race.0500.t: "O Fim dos Jogos"
 chariot_race.0500.desc: "Enquanto o Hipódromo ecoa com os aplausos que vão se apagando dos [Glossary( 'hoi polloi', 'HOI_POLLOI_GLOSS')], eu tiro um momento para refletir sobre as exibições deslumbrantes de habilidade e competição que compõem nossa cultura.\n\nPara os vitoriosos, triunfo e glória; para a multidão, paixão ardente. O coração do império pulsa com fervor inigualável."
 chariot_race.0500.a: "Até a próxima."
 chariot_race.0600.t: "Vitória para os [activity.MakeScope.Var('first_place').Char.Custom('GetChariotTeamColorPlural')]!"
 chariot_race.0600.intro: "Os três primeiros aurigas cruzam a linha de chegada! Aplausos irrompem para [activity.MakeScope.Var('first_place').Char.GetName], [activity.MakeScope.Var('second_place').Char.GetName] e [activity.MakeScope.Var('third_place').Char.GetName]. Uma exibição de velocidade e habilidade de tirar o fôlego marca o encerramento da corrida. A multidão rugindo, tomada de admiração, acrescenta aclamações estrondosas ao espetáculo.\n\n"
 chariot_race.0600.desc.won_team: "Minha aposta nos [ROOT.Char.Custom('GetChariotTeamColorPluralGlossed')] foi bem colocada!"
 chariot_race.0600.desc.won_individual: "Minha aposta em [ROOT.Var('wager_target').Char.GetFirstNameNoTooltip] foi bem colocada!"
 chariot_race.0600.desc.lost_team: "Minha aposta nos [ROOT.Char.Custom('GetChariotTeamColorPluralGlossed')] foi mal concebida..."
 chariot_race.0600.desc.lost_individual: "Minha aposta em [ROOT.Var('wager_target').Char.GetFirstNameNoTooltip] foi mal concebida..."
 chariot_race.0600.desc.dead: "Infelizmente, [ROOT.Var('wager_target').Char.GetFirst] não viveu para cruzar a linha de chegada."
 chariot_race.0600.desc.bookmaker: "\n\nMeu [GetCourtPositionType('bookmaker_court_position').GetName()|l], [bookmaker.GetFirstName], trouxe uma boa quantia das apostas. O império está [ROOT.Var('gold_gained_emperor').GetValue|V0] mais rico. É claro que [bookmaker.GetFirstNameNoTooltip] ficou com sua comissão habitual de dez por cento."
 chariot_race.0600.desc.bookmaker.no_money: "\n\nMeu [GetCourtPositionType('bookmaker_court_position').GetName()|l], [bookmaker.GetFirstName], me informa que houve um número sem precedentes de apostas vencedoras… e, consequentemente, lucros ínfimos para o império."
 chariot_race.0600.a.individual: "\"Excelente direção, [ROOT.Var('wager_target').Char.GetFirstNameNoTooltip]!\""
 chariot_race.0600.a.team: "\"Muito bem, [ROOT.Char.Custom('GetChariotTeamColorPluralGlossed')]#EMP !#!\""
 chariot_race.0600.a.lost: "Melhor sorte na próxima vez..."
 chariot_race.0600.a.dead: "Uma tragédia terrível..."
 chariot_race_betting_char_outcome_key_title: "Aposta Bem-Sucedida"
