 ## ACTIVITY LOG
 discredit_claimant_speech_success_log_title: "Discurso Imperial Condenando Aspirante"
 discredit_claimant_speech_success_log: "Invocando uivos de escárnio, [CHARACTER.GetShortUIName] abriu as corridas dizimando as perspectivas de governar de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetShortUIName )]."
 discredit_claimant_speech_fail_log_title: "Discurso Imperial Barrado por Aspirante"
 discredit_claimant_speech_fail_log: "Em uma tentativa fraca de deslegitimar [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetShortUIName )], [CHARACTER.GetShortUIName|U] inaugurou as corridas com um desastre embaraçoso."
 sway_speech_log_title: "Discurso Imperial Honrando Convidado"
 sway_speech_log: "[CHARACTER.GetShortUIName|U] deu início à corrida acumulando honrarias e elogios sobre [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetShortUIName )]."
 seduce_speech_log_title: "Discurso Poético Imperial"
 seduce_speech_log: "[CHARACTER.GetShortUIName|U] abriu as corridas com um discurso mais rebuscado e repleto de metáforas clássicas do que o habitual."
 present_heir_speech_log_title: "Discurso Imperial ao Lado do Herdeiro"
 present_heir_speech_log: "[CHARACTER.GetShortUIName|U] inaugurou as corridas com [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'sua pessoa', TARGET_CHARACTER.GetShortUIName )] ao seu lado, falando com gravidade do lugar de est[TARGET_CHARACTER.Custom('ES_EA')] como seu sucessor[TARGET_CHARACTER.Custom('ES_XA')] favorit[TARGET_CHARACTER.Custom('ES_OA')]."
 appease_populace_speech_log_title: "Discurso Imperial Carregado de Promessas"
 appease_populace_speech_log: "[CHARACTER.GetShortUIName|U] abriu as corridas com declarações para agradar à multidão, oferecendo uma série de concessões políticas aos plebeus."
 legitimacy_speech_success_log_title: "Discurso Imperial Impressiona as Massas"
 legitimacy_speech_success_log: "[CHARACTER.GetShortUIName|U] abriu as corridas com uma demonstração avassaladora de autoridade e grandeza para [Select_CString( CHARACTER.IsLocalPlayer, 'se apresentar', 'se apresentar' )] como uma encarnação perfeita do cargo imperial."
 legitimacy_speech_fail_log_title: "Discurso Imperial Humilhante"
 legitimacy_speech_fail_log: "[CHARACTER.GetShortUIName|U] abriu as corridas invocando desesperadamente todos os símbolos e cerimônias concebíveis de seu cargo, mas todo o autoelogio foi interrompido pelo desprezo ensurdecedor da multidão."
 legend_speech_log_title: "Discurso Imperial Referencia Lenda"
 legend_speech_log: "[CHARACTER.GetShortUIName|U] abriu as corridas recordando os feitos lendários que conferiram majestade à sua família."
 war_speech_log_title: "Discurso Imperial Campeão da Guerra"
 war_speech_log: "[CHARACTER.GetShortUIName|U] abriu as corridas zombando de um governante inimigo, [TARGET_CHARACTER.GetShortUIName], e animando o público com promessas de vitória."
 influence_speech_log_title: "Discurso Imperial Convoca ao Serviço"
 influence_speech_log: "[CHARACTER.GetShortUIName|U] abriu as corridas falando da sua dedicação ao povo e da lealdade inabalável que este deve oferecer em resposta."
 emperor_calms_mourning_crowd_log_title: "[CHARACTER.GetTitleAsNameNoTooltip] Acalma a Multidão de Luto"
 emperor_calms_mourning_crowd_log: "Após a morte chocante [TARGET_CHARACTER.Custom('ES_DelDela')] do auriga líder, [TARGET_CHARACTER.GetShortUIName], [CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'honraste', 'honró' )] [TARGET_CHARACTER.Custom('ES_AlAla')] do auriga caíd[TARGET_CHARACTER.Custom('ES_OA')] e aliviou a dor da multidão."
 noble_calms_mourning_crowd_log_title: "Notável Acalma a Multidão de Luto"
 noble_calms_mourning_crowd_log: "Após a morte chocante do auriga líder [TARGET_CHARACTER.Custom('ES_DelDela')], [TARGET_CHARACTER.GetShortUIName], [CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'captaste', 'captó' )] a atenção do público e aliviou sua dor."
 emperor_calms_mourning_crowd_fail_log_title: "[CHARACTER.GetTitleAsNameNoTooltip] Falha Contra a Tragédia"
 emperor_calms_mourning_crowd_fail_log: "A morte angustiante [TARGET_CHARACTER.Custom('ES_DelDela')] do auriga principal, [TARGET_CHARACTER.GetShortUIName] horrorizou o público e o deixou surdo aos apelos infelizes por calma de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUIName )]."
 noble_calms_mourning_crowd_fail_log_title: "Notável Falha Contra a Tragédia"
 noble_calms_mourning_crowd_fail_log: "A morte angustiante do [TARGET_CHARACTER.Custom('ES_DelDela')] auriga principal, [TARGET_CHARACTER.GetShortUIName] horrorizou e consternou o público, apesar da tentativa tola de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUIName )] de intervir."
 moved_estate_log_title: "Chefe de Casa Reloca a Propriedade Familiar"
 moved_estate_log: "Após longas e efusivas conversas com [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUIName )] nas arquibancadas, [TARGET_CHARACTER.GetShortUIName] decidiu mover a família [TARGET_CHARACTER.GetHouse.GetName] para [CHARACTER.GetCapitalLocation.GetName]"
 faction_rally_log_title: "Demagogo Reúne sua Multidão"
 faction_rally_log: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'reuniste', 'reunió' )] reuniu os torcedores de sua equipe de corrida favorita em uma massa fervilhante de cantores, arruaceiros e bajuladores, intimidando assim os torcedores dos outros #EMP demos#!."
 attendee_falls_off_stands_log_title: "Espectador Sofre Queda"
 attendee_falls_off_stands_log: "Alguém, não se sabe como, jogou [Select_CString( CHARACTER.IsLocalPlayer, 'sua pessoa', CHARACTER.GetShortUIName )] por sobre a balaustrada do Hipódromo, sem que houvesse ninguém além de guardas incompetentes e figurantes trapalhões para culpar."
 attendee_hurled_attendee_off_stands_log_title: "Nobre Lança Vítima do Alto dos Assentos"
 attendee_hurled_attendee_off_stands_log: "Em uma impactante demonstração de violência em público, [CHARACTER.GetShortUIName] dominou [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetShortUIName )] e [Select_CString( CHARACTER.IsLocalPlayer, 'o lançou', 'o lançou' )] pelos ares."
 attendee_hurled_attendee_off_stands_fail_log_title: "Luta Entre Notáveis"
 attendee_hurled_attendee_off_stands_fail_log: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'os peleasteis', 'se pelearon' )] violentamente depois que [TARGET_CHARACTER.GetShortUINameNoTooltip] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'emprendieras', 'emprendiera' )] um ataque violento e homicida."
 attendee_hurled_off_stands_fail_secret_log_title: "Espectador Assaltado"
 attendee_hurled_off_stands_fail_secret_log: "[CHARACTER.GetShortUIName|U] foi cercado, quase morto, por um grupo de atacantes sem nome, nenhum dos quais revelou quem era seu empregador."
 attendee_hurled_off_stands_fail_log_title: "Tentativa de Assassinado Falha"
 attendee_hurled_off_stands_fail_log: "[TARGET_CHARACTER.GetShortUIName|U] escapou por pouco de uma morte violenta. Os aspirantes a assassinos revelaram o nome de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUIName )] como seu empregador."
