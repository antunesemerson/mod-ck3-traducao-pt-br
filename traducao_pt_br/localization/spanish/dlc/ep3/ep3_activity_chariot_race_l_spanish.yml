 chariot_race.0110.number_betting_red: "[activity.MakeScope.Var('characters_betting_red').GetValue] apostam nos [Glossary( 'Rhousioi', 'RED_RHOUSIOI_GLOSS' )]"
 chariot_race.0120.t: "$chariot_race.0100.t$"
 chariot_race.0120.desc: "\"Uma proposta certamente intrigante…\", murmura o [GetCourtPositionType('bookmaker_court_position').GetName()|l]“, e que tipo de aposta desejais fazer por [wager_target.Custom('ES_ElLa')] veloz [ROOT.Var('wager_target').GetCharacter.GetFirstName]?\"."
 chariot_race.0120.desc.team: "\"Muito sábio, muito sábio…\", murmura o [GetCourtPositionType('bookmaker_court_position').GetName()|l]“, e que tipo de aposta quereis fixar nas bigas dos [ROOT.Char.Custom('GetChariotTeamColor')]?\"."
 chariot_race.0120.a: "Eu espero uma vitória, é claro!"
 chariot_race.0120.a.info: "#V [root_scope.MakeScope.Var('wager_target').Var('percent_chance_to_win').GetValue|1]%#! $chariot_chance_to_win$ #weak (probabilidades de [root_scope.MakeScope.Var('wager_target').Var('odds_win_a').GetValue]:[root_scope.MakeScope.Var('wager_target').Var('odds_win_b').GetValue])#!\n$chariot_win_desc$\n$chariot_payout$ #P [root_scope.MakeScope.Var('wager_target').Var('win_payout').GetValue|1] x#!"
 chariot_race.0120.b: "Primeiro ou segundo: colocar é suficiente."
 chariot_race.0120.b.tt: "O alvo da sua aposta deve terminar em primeiro ou segundo lugar."
 chariot_race.0120.b.info: "#V [root_scope.MakeScope.Var('wager_target').Var('percent_chance_to_place').GetValue|1]%#! $chariot_chance_to_place$ #weak (probabilidades de [root_scope.MakeScope.Var('wager_target').Var('odds_place_a').GetValue]:[root_scope.MakeScope.Var('wager_target').Var('odds_place_b').GetValue])#!\n$chariot_place_desc$\n$chariot_payout$ #P [root_scope.MakeScope.Var('wager_target').Var('place_payout').GetValue|1] x#!"
 chariot_race.0120.c: "Apenas mostrar é bom o suficiente."
 chariot_race.0120.c.tt: "O alvo da sua aposta deve terminar em primeiro, segundo ou terceiro lugar."
 chariot_race.0120.c.info: "#V [root_scope.MakeScope.Var('wager_target').Var('percent_chance_to_show').GetValue|1]%#! $chariot_chance_to_show$ #weak (probabilidades de [root_scope.MakeScope.Var('wager_target').Var('odds_show_a').GetValue]:[root_scope.MakeScope.Var('wager_target').Var('odds_show_b').GetValue])#!\n$chariot_show_desc$\n$chariot_payout$ #P [root_scope.MakeScope.Var('wager_target').Var('show_payout').GetValue|1] x#!"
 chariot_race.0130.t: "$chariot_race.0100.t$"
 chariot_race.0130.desc: "Minhas previsões ficam registradas, um testemunho da qualidade do meu julgamento… e, espero, também da minha perspicácia e conhecimento do esporte. Talvez tantas conversas sobre o assunto ultimamente tenham me deixado em boa posição.\n\n\"E, por fim, nobre [ROOT.Char.GetTitleAsNameNoTooltip|l], que quantia deseja apostar?\"."
 chariot_race.0130.a: "@gold_icon!200"
 chariot_race.0130.b: "@gold_icon!150"
 chariot_race.0130.c: "@gold_icon!100"
 chariot_race.0130.d: "@gold_icon!50"
 ### RACE STARTS ###
 chariot_race.0200.t: "O Doador dos Jogos"
 chariot_race.0200.intro_guest: "Chegou a hora. Liderando minha casa e incentivando meu acompanhante convidad[honorary_guest.Custom('ES_OA')], [honorary_guest.Custom('ES_ElLa')] [honorary_guest.GetTitledFirstName|l], com um gesto do braço, subo ao mármore [Glossary( 'kathisma', 'KATHISMA_GLOSS')], nosso lugar de honra acima da algazarra do hipódromo.\n\n"
 chariot_race.0200.intro_no_guest: "Chegou a hora. Liderando meu lar, subo ao mármore [Glossary( 'kathisma', 'KATHISMA_GLOSS')], nosso lugar de honra acima do pandemônio do Hipódromo.\n\n"
 chariot_race.0200.desc: "Enquanto o mar de espectadores aguarda, considero a substância do meu discurso de abertura. É claro que irei entoar as formalidades antigas e impressionantes, mas também..."
 #Sway Intent
 chariot_race.0200.a: "Elogiarei muito o meu convidado[honorary_guest.Custom('ES_OA')] de honra."
 chariot_race.0200.a.flavor: "Um panegírico deslumbrante sobre o lugar de [honorary_guest.GetFirstNameNoTooltip] em minha estima imperial: que o povo aclamem o nome!"
 #Seduce Intent
 chariot_race.0200.b: "Uma alegoria clássica, repleta de romance e vivacidade..."
 chariot_race.0200.b.flavor: "Uma alegoria sedutora para [honorary_guest.GetFirstNameNoTooltip]; que todos saibam do meu afeto por [honorary_guest.GetSheHe]!"
 #Present Heir
 chariot_race.0200.c: "Eu apresentarei o herdeiro ao meu lado."
 chariot_race.0200.c.flavor: "As massas contemplarão [honorary_guest.Custom('ES_AlAla')] [honorary_guest.GetTitledFirstNameNoTooltip|l] acima deles, ouvirão como seu caminho para a púrpura é proclamado e passarão a amar[honorary_guest.GetHerHim]."
 #Appease Populace
 chariot_race.0200.d: "Prometo abordar os problemas do povo."
 chariot_race.0200.d.flavor: "Devo soltar os transgressores? Cortar impostos odiados? Renovar a cidade? Perseguir os desprezados? A multidão deve ser saciada..."
 combats_sow_discord_responses_tooltip: "@alert_icon! #alert_trial Impede que os participantes hostis danifiquem seu [county_control|lE]#!"
 #Increase Legitimacy (Intent)
 chariot_race.0200.e: "Farei menção às minhas conquistas imperiais."
 chariot_race.0200.e.flavor: "Que a multidão cante louvores ao seu [ROOT.Char.GetTitleAsNameNoTooltip|l]! Que #EMP conozcan#! minha aptidão para as insígnias soberanas[ROOT.Char.Custom('ES_OA')]!"
 chariot_race.0200.e.success: "Um discurso poderoso e digno"
 chariot_race.0200.e.failure: "A multidão assobia e vaias"
 #Spread Legend (Intent)
 chariot_race.0200.f: "Expanda a história de [promoted_legend.GetName]."
 chariot_race.0200.f.flavor: "Quem melhor para fornecer veracidade — às mentes de milhares — do que [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.Custom('ES_OA')] governante escolhido por [ROOT.Char.GetFaith.HighGodName]?"
 #Discredit Claimant (Situational)
 chariot_race.0200.g: "Denigre publicamente um aspirante ao trono."
 chariot_race.0200.g.flavor: "Quão facilmente o entusiasmo do dia pode se transformar em desprezo, com até o mais baixo dos pobres escarnecendo [claimant.GetNameNoTooltip] como um sucessor imperial!"
 chariot_race.0200.g.success: "Você humilha completamente [claimant.Custom('ES_AlAla')] [claimant.GetTitledFirstNameNoTooltip|l]"
 chariot_race.0200.g.failure: "A multidão brada o nome [claimant.Custom('ES_DelDela')] [claimant.GetTitledFirstNameNoTooltip|l]"
 #Drum up War Support (Situational)
 chariot_race.0200.h: "Gabar-me da minha guerra justa!"
 chariot_race.0200.h.flavor: "Não está garantida a vitória contra [foe.GetPrimaryTitle.GetNameNoTooltip], se posso estar aqui desfrutando de festividades ociosas? Vamos nos empolgar com o prestígio iminente da vitória!"
 chariot_race_war_support_attendees_tt: "Os assistentes [Concept( 'governor', 'gobernadores' )|E] e [Concept( 'house_head', 'jefes de casa' )|E] lhe doarão [gold|lE] [gold_i]"
 #Influence/Legitimacy Fallback
 chariot_race.0200.i: "Falar sobre minha benevolência... e a lealdade que espero em troca"
 chariot_race.0200.i.flavor: "Não sangrou o tesouro para os prazeres dos comuns? Para que os detentores de cargos prosperem? Aqueles que buscam mais bondades devem procurar agradar seu [ROOT.Char.GetTitleAsNameNoTooltip|l]..."
 imperial_candidate_support_tooltip: "Em vez disso, os presentes apoiarão a [candidate_score|lE] de [Select_CString( imperial_house_candidate.IsLocalPlayer, 'seu personagem', imperial_house_candidate.GetShortUIName)] para [root_scope.GetPrimaryTitle.GetName]"
 honorary_guest_support_tooltip: "Os participantes apoiarão a [candidate_score|lE] de [Select_CString( imperial_house_candidate.IsLocalPlayer, 'seu personagem', imperial_house_candidate.GetShortUIName)] para [root_scope.GetPrimaryTitle.GetName]"
 discredited_claimant_support_tooltip: "Os participantes aumentarão ainda mais a [candidate_score|lE] de [Select_CString( claimant.IsLocalPlayer, 'seu personagem', claimant.GetShortUIName)]"
 chariot_race.0201.t: "O discurso [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip|l]"
 chariot_race.0201.kathisma: "Os aplausos de milhares ficam cada vez mais altos. Sou levado junto com meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('host'))] , [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] , enquanto sua comitiva sobe a escadaria em espiral até o elevado [Glossary( 'kathisma', 'KATHISMA_GLOSS')] e começam as cerimônias de abertura das corridas.\n\n"
 chariot_race.0201.intro: "Dispostos ao redor do monumental Hipódromo em fileiras intermináveis, os espectadores inquietos aguardam seus aurigas e seu [host.GetTitleAsName|l]. Por fim, na imponente tribuna imperial, surge uma pequena figura coroada de ouro. As cerimônias de abertura começam.\n\n"
 chariot_race.0201.emperor_unfazed: "[host.Custom('ES_ElLa')|U] [host.GetTitleAsNameNoTooltip|l] se deleita com a expectativa da multidão e começa a bradar um discurso."
 chariot_race.0201.emperor_nervous: "[host.Custom('ES_ElLa')|U] [host.GetTitleAsNameNoTooltip|l], atrás de uma ameia que esconde uma de suas mãos trêmulas, fala ao povo."
 chariot_race.0201.emperor_distant: "Com sussurros acompanhando sua mensagem distante, [host.Custom('ES_ElLa')] [host.GetTitledFirstNameNoTooltip|l] faz um discurso."
 chariot_race.0201.gain_influence: "[host.GetSheHe|U] descreve atos de caridade imperial e o esplendor das corridas que virão. Quão grande é sua beneficência! Com quanta generosidade são recompensados aqueles que têm fé em [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip|l], aqueles que lhe servem bem!"
 chariot_race.0201.sway: "Um panegírico para [honorary_guest.GetName] toma forma. Além de um lugar de honra na tribuna imperial, esses elogios introduzem [honorary_guest.Custom('ES_AlAla')] [host.Custom2('RelationToMeShort', SCOPE.sC('honorary_guest'))] [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip|l] no aura da grandeza palaciana."
 chariot_race.0201.sway_self: "[host.GetSheHe|U] apresenta elogios às minhas virtudes e ao presente da minha companhia. Aqui, no camarote imperial, vejo-me atraíd[ROOT.Char.Custom('ES_OA')] ao aura da grandeza palaciana."
 chariot_race.0201.seduce: "Com metáforas floridas e tumulantes e alusões clássicas, [host.GetSheHe] parece estar elogiando algum querido amado... ou uma personificação encantadora do [host.GetPrimaryTitle.GetTierAsNameNoTooltip|l]?"
 chariot_race.0201.seduce_self: "Com metáforas românticas floridas e tumulantes e alusões clássicas, [host.GetSheHe] parece estar elogiando uma personificação encantadora do [host.GetPrimaryTitle.GetTierAsNameNoTooltip|l]... ou #EMP eu?#!"
 chariot_race.0201.present_heir: "Parece que [host.GetSheHe] aproveita a ocasião para apresentar um herdeiro ao povo. Convidando aos aplausos, [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip|l] proclama [honorary_guest.GetName] como alguém digno das vestes púrpuras."
 chariot_race.0201.present_heir_self: "Parece que [host.GetSheHe] aproveita a ocasião para apresentar um herdeiro ao povo. Convidando aos aplausos, [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip|l] proclama que #EMP eu#! sou [Select_CString( ROOT.Char.IsFemale, 'uma candidata', 'um candidato' )] muito dign[ROOT.Char.Custom('ES_OA')] das vestes púrpuras!"
 chariot_race.0201.appease_populace: "As promessas jorram em cascata: revogar impostos, libertar agitadores e atirar ouro para onde as massas quiserem. [host.Custom('ES_ElLa')|U] [host.GetTitleAsNameNoTooltip|l] está se curvando — totalmente — à vontade da multidão que se aglomera."
 chariot_race.0201.increase_legitimacy_success: "O seu é um relato poderoso e digno: de uma vida nobre, de tribulações superadas. [host.Custom('ES_ElLa')|U] [host.GetTitleAsNameNoTooltip|l] pede o julgamento do público: será que as vestes da soberania não estavam destinadas à sua pessoa desde o início?"
 chariot_race.0201.increase_legitimacy_fail: "O seu é um relato mesquinho e vazio: os arroubos [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip|l] soam falsos. [host.GetSheHe|U] clama pelo julgamento do público… enquanto praticamente parece um[host.Custom('ES_XA')] bebê petulante adornad[host.Custom('ES_OA')] com as vestes da soberania."
 chariot_race.0201.spread_legend: "Habilidosamente entrelaçadas nas frases usuais estão alucinações sobre [promote_legend.GetName]. A antiga cerimônia se torna indistinguível da narrativa imperial."
 chariot_race.0201.discredit_claimant_self: "E muito em breve meu nome está na boca de todos! Pois [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip|l], idiota como é, difama publicamente minhas chances e jura que eu jamais terei seu apoio para o trono!"
 chariot_race.0201.discredit_claimant_success: "Diante de todos os presentes, [host.GetSheHe] condena o nome de [claimant.GetName], eviscera sua perspectivas e jura que [claimant.GetSheHe] nunca sentará no trono!"
 chariot_race.0201.discredit_claimant_fail: "Diante de todos os presentes, [host.GetSheHe] difama o nome de [claimant.GetName], reclama sobre suas perspectivas e fica corado ao pensar na ideia de que [claimant.GetSheHe] se sente no trono."
 chariot_race.0201.war_support: "Suas exortações a uma guerra justa contra [foe.GetName] empolgam o público com promessas de vitória. Esses jogos quase bélicos em si, proclama [host.GetSheHe], são a prova de que não tememos inimigo algum!"
 chariot_race.0201.angry_crowd: "\n\nA multidão está longe de ficar satisfeita. Seus aplausos massivos se misturam com gritos de exigências, insultos e cânticos vulgares."
 chariot_race.0201.happy_crowd: "\n\nAs massas rugem sua aclamação, embriagadas pelo ar do Hipódromo, uma cidade unida em louvor."
 chariot_race.0201.aa.discredit: "O trono pertence a [host.GetHouse.GetNameNoTooltip]!"
 chariot_race.0201.aa.honorary_guest: "[honorary_guest.Custom('ES_ElLa')|U] [honorary_guest.GetTitledFirstNameNoTooltip|l] está em ascensão!"
 chariot_race.0201.ab: "![claimant.Custom('ES_ElLa')|U] [claimant.GetTitledFirstNameNoTooltip|l] reinará!"
 chariot_race.0201.a: "Com os discursos encerrados — um brinde à Fortuna!"
 chariot_race.0201.a.flavor: "Qual é a utilidade dessas diversões sem libações?"
 chariot_race.0201.b: "Que discurso indigno..."
 chariot_race.0201.b.flavor: "Plante uma ideia na mente dos notáveis próximos: um verdadeiro orador ou mestre da política poderia ter realmente impressionado!"
 chariot_race.0201.c: "Tenha agentes para instigar um contra-cântico!"
 chariot_race.0201.c.flavor: "#EMP Calai [host.Custom('ES_AlAla')] [host.GetTitleAsNameNoTooltip|l]! Que as massas intimidem ess[host.Custom('ES_EA')] idiota pompos[host.Custom('ES_OA')] e clamem por sua substituição!#!"
 chariot_race.0201.d: "Eu irei contribuir para a causa!"
 chariot_race.0201.d.flavor: "E assim, ganhar minha parte do crédito pela nossa vitória atual."
 chariot_race.0201.e: "Devo agradecer efusivamente [host.Custom('ES_AlAla')] [host.GetTitleAsNameNoTooltip|l]."
 chariot_race.0201.e.flavor: "Meu nobre [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('host'))], quem mais poderia oferecer as mesmas gentilezas?"
 chariot_race.0201.f: "Louvado seja noss[host.Custom('ES_OA')] [host.GetTitleAsNameNoTooltip|l]!"
 counter_chanters_log_title: "Contra-Cânticos Contra o Discurso de Abertura"
 counter_chanters_log: "O discurso de [Select_CString( host.IsLocalPlayer, 'você', host.GetShortUIName)] foi recebido com um protesto político organizado e os berros das massas."
 chariot_race.0202.title: "Contra-Cânticos Contra o Discurso"
 chariot_race.0202.desc: "As multidões indisciplinadas que assistem à sua Corrida de Carros estão incitadas contra você."
 counter_chants_strong_modifier_tooltip: "[imperial_capital.GetName] ganhou [activity.MakeScope.Var( 'counter_chant_count' ).GetValue|N0] instâncias de [GetModifier( 'strong_sow_discord_modifier' ).GetNameWithTooltip|l]"
 counter_chants_normal_modifier_tooltip: "[imperial_capital.GetName] ganhou [activity.MakeScope.Var( 'counter_chant_count' ).GetValue|N0] instâncias de [GetModifier( 'normal_sow_discord_modifier' ).GetNameWithTooltip|l]"
 counter_chants_weak_modifier_tooltip: "[imperial_capital.GetName] ganhou [activity.MakeScope.Var( 'counter_chant_count' ).GetValue|N0] instâncias de [GetModifier( 'weak_sow_discord_modifier' ).GetNameWithTooltip|l]"
 #Notification that the race has begun
 chariot_race.0250.t: "Que a Corrida Comece"
 chariot_race.0250.desc: "Banho nas tonalidades douradas do sol do meio-dia, os gritos estrondosos da multidão saudam os carros. [activity.MakeScope.Var('first_place').Char.GetFirstName|U], [activity.MakeScope.Var('second_place').Char.GetFirstName], e [activity.MakeScope.Var('third_place').Char.GetFirstName], são os favoritos para vencer hoje. Eles estão prontos na linha de partida com as rédeas esticadas e os olhos em chamas de determinação.\n\nQuando as trompetas imperiais soam, os carros avançam, as rodas levantando poeira em um redemoinho de velocidade e habilidade. O chão sob meus pés treme com o trovão dos cascos e a corrida se desenrola com uma energia palpável."
 chariot_race.0250.a: "Que os jogos comecem!"
 ### ONGOING EVENTS
 chariot_race.3000.t: "Escudo dos [ROOT.Char.Custom('GetChariotTeamColorPlural')]"
 chariot_race.3000.intro: "O grupo de carros está agrupado perto — tão perto que apenas um poderia desestabilizar todos os outros. Minha equipe é a primeira a aproveitar isso.\n\n"
 chariot_race.3000.backing_sacrifice: "[charioteer_sacrifice.GetName], [charioteer_sacrifice.Custom('ES_ElLa')] auriga que corre pensando em minhas moedas, começa a ziguezaguear descontroladamente — primeiro à esquerda, depois à direita, depois à esquerda de novo. Por [ROOT.Char.GetFaith.HighGodName], é torturantemente lento! Mas o grupo principal ficou preso atrás da sua barreira serpenteante!\n\nEnquanto isso, [charioteer_leading.GetName], outro[charioteer_leading.Custom('ES_OA')] dos [ROOT.Char.Custom('GetChariotTeamColorPlural')], dispara à frente sem impedimentos."
 chariot_race.3000.not_backing_but_employs_sacrifice: "Meu cocheiro, [charioteer_sacrifice.GetName], começa a ziguezaguear descontroladamente — primeiro à esquerda, depois à direita, depois à esquerda de novo. Que astúcia, que ousadia! Ele está prendendo o grupo principal atrás de sua barreira serpenteante.\n\nEnquanto isso, [charioteer_leading.GetName], outr[charioteer_leading.Custom('ES_OA')] dos [charioteer_leading.Custom('GetChariotTeamColorPluralGlossed')] dispara à frente, afortunadamente, sem ser incomodado."
 chariot_race.3000.not_backing_sacrifice: "Um[charioteer_sacrifice.Custom('ES_OA')] de nossos aurigas, [charioteer_sacrifice.GetName], começa a serpentar descontroladamente — primeiro à esquerda, depois à direita, depois à esquerda de novo. Que astúcia, que ousadia! Ele está prendendo o pelotão principal atrás de sua barreira sinuosa.\n\nEnquanto isso, meu auriga favorit[charioteer_leading.Custom('ES_OA')], [charioteer_leading.GetName], corre como um raio, felizmente sem obstáculos!"
 chariot_race.3000.a: "Tenha os agentes se juntando à briga iminente."
 chariot_race.3000.a.flavor: "As outras facções estão tumultuadas, armadas sobre essa jogada atrevida: é hora de deixar os [ROOT.Char.Custom('GetChariotTeamColorPluralGlossed')] também agitados!"
 chariot_race.3000.b: "Um tremendo sacrifício para os [ROOT.Char.Custom('GetChariotTeamColorPluralGlossed')]#EMP !#!"
 chariot_race.3000.b.flavor: "Todos nós [ROOT.Char.Custom('GetChariotTeamColorPluralGlossed')] devemos nos sentir empolgados por uma vitória iminente!"
 chariot_race.3000.c: "Parece que alguns prosperam... mas outros não."
 chariot_race.3000.c.flavor: "Os pobres apoiadores enganados de [charioteer_sacrifice.GetFirstNameNoTooltip] merecem alguma consideração!"
 chariot_race.3000.d: "\"Não! #EMP [charioteer_about_to_be_passed.GetFirstNameNoTooltip]!#!"
 chariot_race.3010.t: "Descanse, [first_place_charioteer.GetFirstNameNoTooltip]"
 chariot_race.3010.desc: "Por um breve instante, [first_place_charioteer.GetFirstName] tinha asas. Voou à frente do pelotão, conquistando o primeiro lugar e abrindo léguas de distância entre os demais aurigas e [first_place_charioteer.GetSheHe].\n\nPor um breve instante, sua gloriosa quadriga iluminou o hipódromo..., mas [first_place_charioteer.GetFirstNameNoTooltip] não era Hélio. Ao voar perto demais da grandeza, nuestr[first_place_charioteer.Custom('ES_OA')] [Glossary( 'Faetón', 'PHAETHON_GLOSS' )] caiu. Seu cadáver retorcido e um longo rastro de sangue agora repousam no pó da pista — o último testemunho de sua ambição."
 PHAETHON_GLOSS: "Na mitologia grega antiga, Phaethon foi atingido pelo raio de Zeus depois de tentar conduzir a carruagem de seu pai Helios pelo céu."
 chariot_race.3010.a: "Faça um discurso para acalmar a multidão."
 chariot_race.3010.a.success: "A multidão se acalma"
 chariot_race.3010.a.failure: "A multidão continua a entrar em pânico"
 chariot_race.3010.b: "Encomende uma estátua em sua homenagem."
 chariot_race.3010.c: "\"[first_place_charioteer.GetFirstNameNoTooltip] terá um funeral digno de suas conquistas.\""
 chariot_race.3010.a.success_title: "$chariot_race.3010.a.success$"
 chariot_race.3010.a.failure_title: "$chariot_race.3010.a.failure$"
 chariot_race.3020.t: "As Perspectivas da Minha Aposta"
 chariot_race.3020.intro: "Tendo apostado [ROOT.Var('wager_value').GetValue] moedas de ouro em [wager_target.GetFirstName] como [ROOT.Char.Custom('GetWinPlaceShow')], me empenho em acompanhar sua atuação. E [wager_target.GetFirstNameNoTooltip] agora mesmo está... #EMP;HIGH em [wager_target.Custom('GetChariotRacePlacement')] lugar!#!\n\n"
 chariot_race.3020.placement_first: "Estou ansioso para exultar no iminente triunfo de [wager_target.GetFirstNameNoTooltip]! Aqui vem o pagamento!"
 chariot_race.3020.placement_good: "Antecipando uma possível reviravolta, observo atentamente enquanto [wager_target.GetFirstNameNoTooltip] navega pela competição de sua posição vantajosa."
 chariot_race.3020.placement_bad: "As probabilidades não estão a nosso favor..."
 chariot_race.3020.placement_last: "#EMP ÚLTIMO LUGAR?!#! Meu coração afunda enquanto [wager_target.GetFirstNameNoTooltip] enfrenta desafios na pista, atualmente ficando em último lugar, e eu rezo por alguma reviravolta inesperada."
 chariot_race.3020.a: "Incite os fãs de [wager_target.GetFirstNameNoTooltip] à violência!"
 chariot_race.3020.a.flavor: "Violência - #EMP em meu nome!#!"
 chariot_race.3020.b: "Um momento para distribuir libações..."
 ep3_chariot_race_strong_appeasement_modifier: "Generosidade Luxuosa"
 ep3_chariot_race_strong_appeasement_modifier_desc: "Durante uma grande corrida de carruagens, libações e gestos requintados foram amplamente distribuídos entre o povo."
 ep3_chariot_race_weak_appeasement_modifier: "Esforços de Apaziguamento"
 ep3_chariot_race_weak_appeasement_modifier_desc: "Foram feitas tentativas para conquistar a multidão nas corridas de carruagens."
 chariot_race.3020.c: "Em quem você aposta para ganhar, [special_guest.GetFirstNameNoTooltip]?"
 chariot_race.3020.d.placement_first: "Vamos... só mais um pouco!"
 chariot_race.3020.d.placement_good: "Continue assim, [wager_target.GetFirstNameNoTooltip]!"
 chariot_race.3020.d.placement_bad: "Ainda há tempo. Ainda tem uma chance."
 chariot_race.3020.d.placement_last: "Esta é a última vez que aposto nos [wager_target.Custom('GetChariotTeamColorPluralGlossed')]..."
 chariot_race.3030.t: "[trailing_charioteer.GetShortUINameNoTooltip] Passa [leading_charioteer.GetShortUINameNoTooltip]!"
 chariot_race.3030.desc: "Em uma surpreendente virada, [trailing_charioteer.GetFirstName] [trailing_charioteer.Custom('GetVictoriousChariotMovement')] e ultrapassa [leading_charioteer.GetFirstName] para a [trailing_charioteer.Custom('GetChariotRacePlacement')] posição!\n\nA multidão vai à loucura!"
 chariot_race.3030.desc_teams: "Aqueles que apoiam os [trailing_charioteer.Custom('GetChariotTeamColorPluralGlossed')] exibem suas cores e levantam um grande brado... enquanto os que apoiam os [leading_charioteer.Custom('GetChariotTeamColorPluralGlossed')] resmungam de descontentamento."
 chariot_race.3030.a: "Levantem um brinde ao sucesso de [trailing_charioteer.GetFirstNameNoTooltip]."
 chariot_race.3030.b: "Se você não pode vencê-los... faça-os seus."
 chariot_race.3030.c: "Mau sorte, [leading_charioteer.GetFirstNameNoTooltip]."
 chariot_race.3040.t: "Um Emaranhado Traiçoeiro"
 chariot_race.3040.desc: "[charioteer_1.GetName|U] e [charioteer_2.GetName] lutam pela posição, suas bigas se raspam e chocam uma contra a outra. Agarram as rédeas ao se aproximarem da curva, mas as bigas não conseguem se soltar!\n\nA roda de [charioteer_1.GetFirstName] se despedaça. Sua biga sai descontrolada da trajetória e então colide com a de [charioteer_2.GetFirstName]. Os relinchos dos cavalos e o cheiro de sangue se elevam dos destroços do acidente. Parece que nenhum dos aurigas se move."
 chariot_race.3040.a: "Essas almas corajosas terão um funeral luxuoso."
 chariot_race.3040.b: "Aguarde a próxima volta! Eles ainda podem estar vivos!"
 chariot_race.3040.b.tt: "Sobreviventes serão puxados dos destroços"
 chariot_race.3040.b.both_survive: "Ambos os aurigas sobrevivem"
 chariot_race.3040.b.chariot_two_survives: "[charioteer_2.GetFirstNameNoTooltip|U] sobrevive"
 chariot_race.3040.b.chariot_one_survives: "[charioteer_1.GetFirstNameNoTooltip|U] sobrevive"
 chariot_race.3040.b.no_survivors: "Nenhum dos aurigas sobrevive"
 chariot_race.3040.c: "Que espetáculo! ISSO é uma corrida de bigas!"
 chariot_race.3040.d: "Que horror... Eu vou rezar por eles."
 chariot_race.3050.t: "Um Triunfo Improvável"
 chariot_race.3050.desc: "O ar crepita de tensão.\n\n[last_place_charioteer.GetFirstName], um[last_place_charioteer.Custom('ES_XA')] cocheiro subestimad[last_place_charioteer.Custom('ES_OA')] no passado, desafia todas as probabilidades, [last_place_charioteer.Custom('GetChariotComebackMovement')] em uma verdadeira [Glossary( 'aristeía', 'GLOSS_ARISTEIA')].\n\nSuspiros ecoam pelas arquibancadas quando as vibrantes cores dos [last_place_charioteer.Custom('GetChariotTeamColorPluralGlossed')] avançam. A multidão, inicialmente em silêncio, incrédula, irrompe em um rugido estrondoso!"
 chariot_race.3050.a: "#EMP [ROOT.Char.Custom('GetChariotTeamColorPluralGlossed')] reina supremo!#!"
 chariot_race.3050.b: "[last_place_charioteer.GetSheHe|U] será meu."
 chariot_race.2050.c: "Muito bem, [last_place_charioteer.GetFirstNameNoTooltip]!"
 GLOSS_ARISTEIA: "Uma #EMP aristeia#! descreve um momento inspirado divinamente em que um herói consegue realizar feitos extraordinários e impressionantes."
 chariot_race.2050.d: "[ROOT.Char.GetFaith.HighGodName|U] ama alguns dos seus filhos mais do que outros..."
 ### Events only for spectators
 chariot_race.4000.t: "Raspando Cotovelos"
 chariot_race.4000.desc: "\"Olhem só isso! \"[activity.MakeScope.Var('first_place').Char.GetName] está na frente!\", [target_governor.Custom('ES_ElLa')|l] [target_governor.GetTitledFirstName|l] se aproxima de mim. Seu sorriso é tão largo quanto as voltas de [last_place.GetFirstName].\n\n\"[target_governor.Custom('GetGovernorChitChat')] Como vai vossa mercê, prezad[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetFirstNameNoTooltip]?\".\n\nUma conversa tão educada entre governadores poderia ser levada a assuntos mais produtivos..."
 chariot_race.4000.a: "Devo exaltar taticamente minhas virtudes como governante."
 chariot_race.4000.a.critical_success: "[target_governor.GetFirstNameNoTooltip] se torna seu fã fervoroso[target_governor.Custom('ES_XA')]"
 chariot_race.4000.a.critical_success_title: "$chariot_race.4000.a.critical_success$"
 chariot_race.4000.a.success: "Você convence [target_governor.GetFirstNameNoTooltip] de seu valor"
 chariot_race.4000.a.success_title: "$chariot_race.4000.a.success$"
 chariot_race.4000.a.failure: "Você falha em convencer [target_governor.GetFirstNameNoTooltip] de seu valor"
 chariot_race.4000.a.failure_title: "$chariot_race.4000.a.failure$"
 chariot_race.4000.a.critical_failure: "[target_governor.GetFirstNameNoTooltip] se torna seu rival"
