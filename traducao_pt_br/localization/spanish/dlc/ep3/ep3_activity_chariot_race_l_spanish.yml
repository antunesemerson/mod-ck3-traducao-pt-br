l_spanish:
 activity_chariot_race: "Corrida de Carroças"
 activity_chariot_race_desc: "Como [GetPlayer.Custom('ES_ElLa')] [GetPlayer.GetTitleAsNameNoTooltip|l], somente eu posso realizar corridas de bigas espetaculares para entusiasmar o [Glossary( 'hoi polloi', 'HOI_POLLOI_GLOSS')] e trazer os notáveis de [GetPlayer.GetPrimaryTitle.GetTierAsNameNoTooltip|l] à capital.\n\nPor meio dessas ocasiões públicas, o povo passa a me reconhecer como seu senhor[GetPlayer.Custom('ES_XA')]; no rugido da multidão, espero ouvir aclamações."
 activity_chariot_race_destination_selection: "Você só pode organizar corridas de bigas em sua [capital|lE]."
 activity_chariot_race_host_desc: "$BULLET_WITH_TAB$ Pode ganhar [influence|lE] @influence_icon!\n$BULLET_WITH_TAB$ Pode ganhar [legitimacy|lE] [GetLocalPlayerLegitimacyTextIcon]\n$BULLET_WITH_TAB$ Pode ganhar [gold|lE] @gold_icon!\n$BULLET_WITH_TAB$ Pode ganhar #N #EMP o perder#!#! [county_opinion|lE]"
 activity_chariot_race_guest_desc: "\n#weak Embora seja esperado de todos no domínio, assistir às corridas de bigas no Hipódromo oferece uma oportunidade de conviver com a elite imperial e aumentar a [influence|lE].\n\nÉ cobrada uma pequena taxa de entrada de [EmptyScope.ScriptValue('chariot_race_entrance_fee')|0] [gold_i] de todos os convidados."
 activity_chariot_race_conclusion_desc: "A [GetActivityType( 'activity_chariot_race' ).GetName|l] foi concluída."
 activity_chariot_race_selection_tooltip: "Realize grandes corridas de bigas para agradar às massas e consolidar sua posição como [GetPlayer.GetTitleAsNameNoTooltip|l]\n\nRecompensas esperadas:\n$BULLET_WITH_TAB$[influence|lE] @influence_icon!\n$BULLET_WITH_TAB$[gold|lE] @gold_icon!"
 HOI_POLLOI_GLOSS: "Literalmente significando 'os muitos', este termo grego antigo refere-se às classes mais baixas dentro da sociedade bizantina."
 chariot_race_honorary_guest: "Convidado Honorário"
 chariot_race_honorary_guest_traveling: "$chariot_race_honorary_guest$"
 activity_window_character_chariot_race_honorary_guest: "[honorary_guest|E]\n[Character.GetShortUINameNoTooltip|U]"
 activity_window_character_chariot_race_honorary_guest_traveling: "$activity_window_character_chariot_race_honorary_guest$"
 chariot_race_honorary_guest_concept: "[honorary_guest|E]"
 chariot_race_honorary_guest_for_host: "$chariot_race_honorary_guest$"
 chariot_race_honorary_guest_regular: "$honorary_guest$"
 chariot_race_honorary_guest_regular_for_host: "$honorary_guest$"
 chariot_race_honorary_guest_desc: "$chariot_race_honorary_guest_desc_for_host$"
 chariot_race_honorary_guest_desc_for_host: "O anfitrião pode convidar um personagem para se juntar a eles no [Glossary( 'kathisma', 'KATHISMA_GLOSS')|l] se assim desejar. Isso apresenta uma abundância de oportunidades para interagir com esse personagem — para melhor ou para pior."
 chariot_race_honorary_guest_regular_desc: "$honorary_guest_desc$"
 chariot_race_honorary_guest_regular_desc_for_host: "$honorary_guest_desc$"
 activity_invite_rule_charioteers: "Condutores de Carroças"
 activity_chariot_race_guest_help_text: "Embora seja esperado de todos no domínio, assistir às corridas de bigas no Hipódromo oferece uma oportunidade de conviver com a elite imperial e aumentar a [influence|lE].\n\nÉ cobrada de todos os convidados uma pequena taxa de entrada de [EmptyScope.ScriptValue('chariot_race_entrance_fee')|0] [gold_i] para todos os convidados."
 activity_chariot_race_predicted_cost: "O custo de [GetActivityType( 'activity_chariot_race' ).GetNameNoTooltip|l] é principalmente afetado pelas [activity_options|lE] que você selecionar."
 chariot_race_base_cost_desc: "Custo Base de [GetActivityType( 'activity_chariot_race' ).GetName|l]"
 chariot_race_gambling: "Fazendo Apostas"
 chariot_race_gambling_desc: "Colocando em risco suas bolsas, os participantes confiam em suas esperanças, suas orações, por sua equipe favorita."
 chariot_race_phase: "Corrida"
 chariot_race_phase_desc: "A areia voa, as chicotadas estalam e o Hipódromo ruge!"
 chariot_race_phase_ceremony: "Cerimônia"
 chariot_race_phase_ceremony_desc: "Nosso glorioso soberano aclama o vencedor das corridas."
 chariot_option_entertainment: "Espectáculos"
 chariot_entertainment_bad: "Diversões Insignificantes"
 chariot_entertainment_bad_desc: "$EFFECT_LIST_BULLET$ Pequeno ganho de [legitimacy|lE]\n$EFFECT_LIST_BULLET$@alert_icon! #alert_trial Ajustado por [county_opinion|lE] em [capital|lE]#!\n\n#weak Durante centenas de anos, as corridas cimentaram o vínculo entre governante e povo, atestando grandeza e generosidade. Se as cerimônias forem bem executadas, nada mais deve ser necessário.#!"
 chariot_entertainment_normal: "Cerimônias Tradicionais"
 chariot_entertainment_normal_desc: "$EFFECT_LIST_BULLET$ Ganho moderado de [legitimacy|lE] e [county_opinion|lE]\n$EFFECT_LIST_BULLET$@alert_icon! #alert_trial Ajustado por [county_opinion|lE] em [capital|lE]#!\n\n#weak Entre as corridas, o povo se divertirá com mímicos, acrobatas e prisioneiros em cadeias. Os notáveis visitantes serão tratados com recepções imperiais formais.#!"
 chariot_entertainment_good: "Delícias para as Massas"
 chariot_entertainment_good_desc: "$EFFECT_LIST_BULLET$ Grande ganho de [legitimacy|lE] e [county_opinion|lE]\n$EFFECT_LIST_BULLET$@alert_icon! #alert_trial Ajustado por [county_opinion|lE] em [capital|lE]#!\n\n#weak Nossos visitantes mais estimados serão agraciados com pavões, sables, perfumes: finos presentes imperiais! E artistas de toda sorte lotarão o Hipódromo, com pão e moedas sendo lançados para as arquibancadas.#!"
 chariot_race_host_rewards_title: "Recompensas do Anfitrião"
 chariot_race_reward_high_county_opinion_tt: "#weak Recompensas melhoradas por alta [county_opinion|lE] em [capital|lE]"
 chariot_race_reward_low_county_opinion_tt: "#weak Recompensas prejudicadas por baixa [county_opinion|lE] em [capital|lE]"
 CHARIOTEER_APTITUDE_GUI_TOOLTIP: "[aptitude|lE] de [Character.GetFirstNameNoTooltip] para condução de carroças é [Character.GetCourtPositionAptitude( GetCourtPositionType( 'charioteer_court_position' ) )|l]"
 YOUR_CHARIOTEER_TOOLTIP: "Você emprega [Character.GetShortUIName] como seu [GetCourtPositionType( 'charioteer_court_position' ).GetName|l]."
 YOUR_WAGER_TOOLTIP: "[GetPlayer.Custom('BuildChariotRaceWagerTooltip')]"
 every_losing_charioteer_xp_gain: "Todos os outros Condutores de Carroças ganham #high 3#! [trait_level_track_xp|E]"
 ### INTENTS ###
 increase_influence_intent: "Aumentar Influência"
 increase_influence_intent_desc: "Com todos os [strategoi|lE] e [noble_families|lE] reunidos no Hipódromo, você se concentrará em se enturmar com eles e ganhar [influence|lE]."
 sow_discord_intent: "Semear Discórdia"
 sow_discord_intent_desc: "Não há melhor oportunidade para sabotar o [county_control|lE] e a [county_opinion|lE] da capital e macular o poder [GetPlayer.GetTopLiege.Custom('ES_DelDela')] [GetPlayer.GetTopLiege.GetTitleAsNameNoTooltip|l] em benefício de quem pretende suceder[GetPlayer.GetTopLiege.GetHerHim]… Uma estratégia muito eficaz contra soberanos impopulares."
 appease_populace_intent: "Apaziguar a População"
 appease_populace_intent_desc: "Seu objetivo é aumentar sua [legitimacy|lE] e a [county_opinion|lE] em sua [Concept('realm_capital', 'capital do seu senhorio')|lE], [GetPlayer.GetCapitalLocation.GetNameNoTooltip]. Isso neutralizará os participantes que usam a [intent|lE] $sow_discord_intent$ por hostilidade contra você."
 ### INTRO ###
 chariot_race.0001.t: "Uma Cidade à Espera"
 chariot_race.0001.desc: "Abaixo do meu alto [Glossary( 'kathisma', 'KATHISMA_GLOSS')], as grandes estátuas do Hipódromo estão polidas, a areia cuidadosamente varrida, e os lugares para milhares de espectadores limpos.\n\nAs ruas de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTier] estão, por sua vez, enlouquecidas de expectativa. Atores políticos de todos os tipos gritam suas mensagens enquanto viajantes começam a se acomodar... e, mesmo no palácio, todas as conversas giram em torno dos Prasinoi e Venetoi."
 chariot_race.0001.desc_spectator: "[host.GetCapitalLocation.GetTitle.GetNameNoTier] está tomada por ruído e expectativa: as corridas logo começarão! Das tavernas à beira da rua, as especulações se espalham sobre a aparição pública [host.Custom('ES_DelDela')] [host.GetTitleAsName|l]. Serão exigidos juramentos? As preocupações do [Glossary( 'hoi polloi', 'HOI_POLLOI_GLOSS')]? Que respostas serão uivadas, entoadas?\n\nOs sentimentos das ruas oscilam entre os despertados por agentes imperiais e os de outras paixões. Mas, acima de tudo, há uma grande e acalorada disputa: qual corredor conquistará a vitória no Hipódromo?!"
 chariot_race.0001.a: "Que as demes sejam despertadas!"
 KATHISMA_GLOSS: "A caixa imperial do Hipódromo. Uma escada em espiral ligava esta área de observação ao palácio, proporcionando ao Basileus facilidade de entrada... e uma saída segura."
 DEMES_GLOSS: "Organizações esportivas e políticas centradas nas corridas de carroças. Uma vez, os #EMP demes#! eram de grande importância na vida cívica, mas desde então diminuíram e foram trazidos sob o controle imperial."
 QUADRIGA_GLOSS: "Uma carroça puxada por quatro cavalos. Rápida, perigosa e cara, a #EMP téthrippa#!, ou #EMP quadrigae#!, tem sido o veículo favorito de reis, imperadores e deuses desde os tempos antigos."
 ### BETTING ###
 chariot_race.0100.t: "Apostas Abertas"
 chariot_race.0100.desc: "#EMP Ding! Ding! Ding!#!\n\nA campainha do [GetCourtPositionType('bookmaker_court_position').GetName()|l] indica que agora já podem ser feitas apostas nos tradicionais times tradicionais das corridas.\n\n"
 chariot_race.0100.desc.emperor: "De acordo com meu cargo, o mais alto de todos, apresenta-se a mim o [GetCourtPositionType('bookmaker_court_position').GetNameNoTooltip|l] e se prostra enquanto considero minha aposta. Esta decisão não é pouca coisa: as consequências de apoiar um condutor de biga ou uma equipe são tanto financeiras quanto bastante políticas."
 chariot_race.0100.desc.others: "As apostas dos espectadores mais ilustres são feitas por algum funcionário apressado. Uma boa quantidade de moeda pode ser ganha ou perdida... e o status também, entre fãs e rivais."
 chariot_race.0100.a: "Eu apoio os #charioteer_blue Venetoi#!#!."
 chariot_race.0100.b: "Eu apoio os #difficulty_easy Prasinoi#!."
 chariot_race.0100.c: "Eu apoio os #bold Leukoi#!."
 chariot_race.0100.d: "Eu apoio os #difficulty_hard Rhousioi#!."
 chariot_race.0100.e: "Não fazer aposta."
 chariot_race.0110.t: "Heróis do Circuito"
 chariot_race.0110.desc: "Os [root_scope.Custom('GetChariotTeamColorPluralGlossed')] estão apresentando um excelente grupo de motoristas habilidosos, cujos nomes certamente estão entre os elogiados nos mercados, falados reverentemente por crianças. Até mesmo a corte imperial se derrete e se deslumbra por eles!\n\nEu #EMP poderia#! colocar minha aposta em qualquer um desses corredores celebridades, mas talvez nenhum competidor único seja de longe a melhor perspectiva..."
