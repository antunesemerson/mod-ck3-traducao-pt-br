l_spanish:
 ep3_governor_yearly.8010.opening: "[governor.Custom2('AppropriateGreeting', ROOT.Char)]"
 ep3_governor_yearly.8010.desc: "Muito [ROOT.Char.Custom('ComplimentAdjective')] [ROOT.Char.GetTitledFirstNameNoTooltip|l], vejo uma oportunidade para expandir os interesses da casa [ROOT.Char.GetHouse.GetBaseName] , assim como os de minha casa [governor.GetHouse.GetBaseName].\n\nEm troca de"
 ep3_governor_yearly.8010.hook: "uma promessa que poderei invocar no futuro,"
 ep3_governor_yearly.8010.candidacy: "apoiar minha nomeação sobre [their_title.GetNameNoTier],"
 ep3_governor_yearly.8010.candidacy_heir: "apoiar a nomeação do meu [governor.Custom2('RelationToMeShort', SCOPE.sC('their_title_receiver'))] [their_title_receiver.GetFirstName] para [their_title.GetNameNoTier],"
 ep3_governor_yearly.8010.influence: "sua boa palavra na corte imperial"
 ep3_governor_yearly.8010.gold: "um token material de boa vontade"
 ep3_governor_yearly.8010.end: "estaria disposto a fazer meu próprio sacrifício."
 ep3_governor_yearly.8010.a: "Favores por favores."
 ep3_governor_yearly.8010.b: "Uma ótima oferta, se revertida."
 ep3_governor_yearly.8010.b.success: "[governor.GetFirstNameNoTooltip] aceita sua proposta"
 ep3_governor_yearly.8010.b.failure: "A [governor.GetFirstNameNoTooltip] não está interessado"
 ep3_governor_yearly.8010.c: "Não preciso disso."
 ep3_governor_yearly.8020.t: "Influência Provincial"
 ep3_governor_yearly.8020.desc: "Entre os muitos pequenos domínios, aldeias e cidades do meu [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip], a propriedade familiar de [estate_owner.GetHouse.GetBaseName] destaca como algo fora do comum.\n\nA propriedade privada nominal [estate_owner.Custom('ES_DelDela')] [estate_owner.GetTitledFirstName|l] desfruta da minha proteção como [ROOT.Char.GetTitleAsNameNoTooltip|l] de [ROOT.Char.GetPrimaryTitle.GetNameNoTier], e a indiferença de est[estate_owner.Custom('ES_EA')] em relação à minha generosidade pode rapidamente se transformar em gratidão se a perspectiva de sua retirada for habilmente insinuada…"
 ep3_governor_yearly.8020.a: "Manter as estradas seguras é #EMP tão#! caro hoje em dia."
 ep3_governor_yearly.8020.success: "[estate_owner.GetFirstNameNoTooltip] entende a indireta"
 ep3_governor_yearly.8020.b: "Os grandes esforços que faço devem ser recompensados."
 ep3_governor_yearly.8020.c: "Minha graça neste assunto poderia ser mais divulgada."
 ep3_governor_yearly.8020.d: "Não poderia danificar uma propriedade tão bonita."
 ep3_governor_yearly_8020_failure_tt: "Se eles recusarem:"
 ep3_governor_yearly.8020.failure: "[estate_owner.GetFirstNameNoTooltip] recusou sua exigência"
 ep3_governor_yearly.8020.reason: "Aceitação parcialmente baseada na personalidade de [estate_owner.GetFirstName]"
 ep3_governor_yearly.8030.t: "Graça Não Intencionada"
 ep3_governor_yearly.8030.desc: "Minha família e eu temos discutido, de forma um tanto espúria, com quaisquer locais e oficiais reclamando, que o desenvolvimento da propriedade [ROOT.Char.GetHouse.GetBaseName] em [estate.GetLocation.GetBaronyNameExplicitlyNoTooltip] é para o benefício de todos [estate.GetLocation.GetTitle.GetDeJureLiege.GetNameNoTier], se não de todo o [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip]!\n\nPor qual estranha sorte não posso dizer — é realmente verdade!"
 ep3_governor_yearly.8030.martial: "A presença dos meus guardas afastou a bandidagem usual, cuja ausência tem sido uma grande benção para a localidade em geral."
 ep3_governor_yearly.8030.agriculture: "A melhoria agrícola da minha terra inspirou os pequenos proprietários, cujos esforços têm sido uma grande benção para a localidade em geral."
 ep3_governor_yearly.8030.commerce: "As oportunidades comerciais trouxeram muitos mercadores, cuja presença tem sido uma grande benção para a localidade em geral."
 ep3_governor_yearly.8030.fallback: "A expansão da propriedade atraiu todo tipo de artesãos, cuja presença tem sido uma grande benção para a localidade em geral."
 ep3_governor_yearly.8030.a: "Parece que #EMP lucro#! a ser coletado."
 ep3_governor_yearly.8030.b: "O desenvolvimento local deve ser incentivado."
 ep3_governor_yearly.8030.c: "Uma feliz casualidade, pela primeira vez."
 ep3_governor_yearly.8040.t: "Distrações Dinásticas"
 ep3_governor_yearly.8040.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', complainant)], [complainant.GetFirstName], [complainant.GetTitleAsNameNoTooltip|l] de [complainant.GetPrimaryTitle.GetTierAsNameNoTooltip|l] de [complainant.GetPrimaryTitle.GetNameNoTier], chegou a [ROOT.Char.GetCapitalLocation.GetBaronyNameExplicitlyNoTooltip] com um assunto "urgente".\n\n"Meu [complainant.Custom2('RelationToMeShort', ROOT.Char)], sei que deveis cuidar dos vossos próprios assuntos assim como dos de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], mas temo que a propriedade familiar de [ROOT.Char.GetHouse.GetBaseNameNoTooltip] exige demais da vossa atenção — e fundos — que deveriam ser destinados a [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip]…".\n\n"Já basta ter que administrar os assuntos da vossa província sem a distração adicional da vossa propriedade"."
 ep3_governor_yearly.8040.a: "Suponho que meu [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] possa precisar de mais atenção."
 ep3_governor_yearly.8040.b: "Oh, por favor, [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] praticamente se administra sozinho!"
 ep3_governor_yearly.8040.c: "Talvez #EMP você#! deva assumir as responsabilidades, [complainant.GetTitleAsNameNoTooltip|l]."
 ep3_governor_yearly.8040.d: "Você está #EMP sugerindo#! que sou incompetente demais para administrar os dois?"
 ep3_governor_yearly.8040.d.success: "Você consegue acompanhar tudo"
 ep3_governor_yearly.8040.d.failure: "Você é incompetente demais para administrar os dois"
 ep3_governor_yearly.8050.t: "Inimigo à Porta"
 ep3_governor_yearly.8050.desc: "Do funcionário mais humilde [war_liege.Custom('ES_AlAla')] [war_liege.GetTopLiege.GetTitleAsNameNoTooltip|l] em pessoa, o conjunto de [war_liege.GetPrimaryTitle.GetTierAsNameNoTooltip|l] se volta para defender [target_title.GetBaseNameNoTier] contra [war_attacker.GetPrimaryTitle.GetDefinitiveName]. Como [ROOT.Char.GetTitleAsNameNoTooltip|l] de [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] de [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip], a ameaça é real demais…"
 ep3_governor_yearly.8050.kingdom: "uma grande parte da defesa da região recai sobre mim."
 ep3_governor_yearly.8050.neighbour: "se não contido, os invasores podem avançar para [ROOT.Char.GetCapitalLocation.GetTitle.GetDeJureLiege.GetDeJureLiege.GetDeJureLiege.GetNameNoTier] a seguir."
 ep3_governor_yearly.8050.end: "\n\nCumpro com minha obrigação, guarnecendo fortalezas, reparando fortificações e recrutando soldados, mas pouco mais posso fazer so[ROOT.Char.Custom('ES_OA')]. Qualquer ajuda seria muito bem-vinda em [war_liege.GetCapitalLocation.GetBaronyNameExplicitlyNoTooltip]…"
 ep3_governor_yearly.8050.a: "Os exércitos do império precisam de todos os homens que pudermos reunir!"
 ep3_governor_yearly.8050.b: "A defesa de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] está deficiente..."
 ep3_governor_yearly.8050.c: "… e o lugar está #EMP perdido#! sem mais recursos."
 ep3_governor_yearly.8050.d: "Está tudo sob controle."
 ep3_governor_yearly.8060.t: "Cofres Tentadores"
 ep3_governor_yearly.8060.desc: "Como [ROOT.Char.GetTitleAsNameNoTooltip|l] de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], o aparato burocrático de [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] está inteiramente à minha disposição — até mesmo a modesta tesouraria no coração de [ROOT.Char.GetCapitalLocation.GetBaronyNameExplicitlyNoTooltip].\n\nFuncionários de segunda categoria frequentam o lugar a toda hora, trocando ouro imperial por recibos e levando-o para pagar guarnições, consertar edifícios, alimentar os pobres… E [ROOT.Char.GetFaith.HighGodName] sabe-se lá o quê.\n\nComo #EMP [ROOT.Char.GetTitleAsNameNoTooltip|l]#!, #EMP mis#! necessidades e as de [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] na verdade são a mesma coisa…, não são?"
 ep3_governor_yearly.8060.a: "Ninguém notará algumas requisições extras."
 ep3_governor_yearly.8060.b: "Números ruins, erros de arredondamento, essas coisas acontecem..."
 ep3_governor_yearly.8060.c: "E assim as necessidades de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] são #EMP minhas#! para compartilhar."
 ep3_governor_yearly.8060.d: "Os burocratas sabem o que estão fazendo."
 ep3_governor_yearly.8060.a.success: "A desaparecimento passa despercebido"
 ep3_governor_yearly.8060.a.failure: "Alguém sente falta da moeda"
 ep3_governor_yearly.8060.a.failure_tt: "@warning_icon! #N O paradeiro do [gold|lE] será contestado#!"
 ep3_governor_yearly.8060.embezzle_tt: "Tesouraria Invadida"
 ep3_governor_yearly.8060.efficiency_tt: "Por 10 anos: [governor|lE] Eficiência: #N -5%#!"
 ep3_otherwise_tt: "Caso contrário:"
 ep3_governor_yearly.8062.desc: "Quando meu [ROOT.Char.Custom2('RelationToMeShort', complainant)], [complainant.GetFirstName], me pediu pela primeira vez que nos reuníssemos para falar sobre #EMP las cuentas#!; soube que estava enrascado. Tentei adiá-lo, mas no fim concordei em me encontrar com [complainant.GetSheHe].\n\nE então me conta tudo: o ouro desaparecido, os lançamentos incorretos, os recibos extraviados… Por fim, conclui: «Não entendo, a única explicação é que há um burocrata ladrão!».\n\nEle pensa por um momento enquanto observa meus salões, então me lança um olhar estranho e, escondendo seu choque, murmura: «A menos que…»."
 ep3_governor_yearly.8062.a: "Isso pode ser explicado."
 ep3_governor_yearly.8062.a.success: "[complainant.GetFirstNameNoTooltip] aceita as desculpas"
 ep3_governor_yearly.8062.a.failure: "[complainant.GetFirstNameNoTooltip] descobre sua corrupção"
 ep3_governor_yearly.8062.b: "Não há necessidade de mencionar isso."
 ep3_governor_yearly.8062.b.success: "[complainant.GetFirstNameNoTooltip] capta a indireta"
 ep3_governor_yearly.8062.b.failure: "$ep3_governor_yearly.8062.a.failure$"
 ep3_governor_yearly.8062.c: "Veja, leve sua parte e fique em silêncio."
 ep3_governor_yearly.8062.c.success: "[complainant.GetFirstNameNoTooltip] aceita o suborno"
 ep3_governor_yearly.8062.c.failure: "$ep3_governor_yearly.8062.a.failure$"
 ep3_governor_yearly.8062.d: "Um simples engano, o ouro será devolvido..."
 ep3_governor_yearly.8070.t: "O Trabalho de um Governador"
 ep3_governor_yearly.8070.desc: "Honra, prestígio, poder. Ser [ROOT.Char.GetTitleAsNameNoTooltip|l]pode conceder todas essas coisas, mas #EMP tiene#!tem seu preço…\n\nMontanhas de [ROOT.Char.Custom('GetWritingMaterial')]permanecem imóveis, à espera do meu selo ou de uma revisão, enquanto incontáveis burocratas disputam uma vez para encher meus ouvidos com detalhes entediantes.\n\nNinguém me disse que haveria #EMP tanto#!trabalho… e um que, no fim das contas, parece se fazer sozinho."
 ep3_governor_yearly.8070.a: "Posso limpar tudo isso, só preciso me concentrar."
 ep3_governor_yearly.8070.b: "Alguma ajuda contratada aliviaria o fardo."
 ep3_governor_yearly.8070.c: "Isto é trabalho para burocratas inferiores, não para [ROOT.Char.Custom('ES_ElLa')] #EMP [ROOT.Char.GetTitleAsNameNoTooltip|l]#!!"
 ep3_governor_yearly.8080.t: "Magistrado Malévolo"
 ep3_governor_yearly.8080.desc: "Nos últimos tempos, as acusações de corrupção aumentaram em [ROOT.Char.GetCapitalLocation.GetBaronyNameExplicitly], onde muitas pessoas apresentaram queixas específicas contra um[magistrate.Custom('ES_OA')] de [magistrate.Custom('ES_LoLa')]s principais magistrad[magistrate.Custom('ES_OA')]s, um[magistrate.Custom('ES_XA')] [magistrate.GetWomanMan] de nome [magistrate.GetFirstName].\n\nFoi trazido perante mim para responder a essas acusações, que incluem exigir subornos absurdos em troca até mesmo das funções mais básicas.\n\n“Na verdade, meu [ROOT.Char.GetTitleAsNameNoTooltip|l]…”, rosnha, “Tudo isso não passa de um simples mal-entendido!”."
 ep3_governor_yearly.8080.a: "Você deve devolver esses subornos e ser destituído do seu cargo."
 ep3_governor_yearly.8080.b: "Bestas como você precisam de um #EMP verdadeiro#! deterrente."
 ep3_governor_yearly.8080.c: "Pode ser ignorado se os pagamentos forem... redistribuídos."
 ep3_governor_yearly.8080.d: "Você pagará sua dívida em meu serviço... #EMP [magistrate.GetFirstNameNoTooltip]#!"
 ep3_governor_yearly.8090.t: "Política Maliciosa"
 ep3_governor_yearly.8090.desc: "A roda implacável dos nomeamentos e substituições imperiais pode ter me colocado no comando de [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] de [ROOT.Char.GetPrimaryTitle.GetName], mas não é segredo que [old_holder.Custom('ES_ElLa')] [old_holder.GetTitledFirstName|l] anseia por seu retorno às mãos da casa [old_holder.GetHouse.GetBaseName].\n\nÉ claro que os governadores não têm nenhum direito sobre seus antigos cargos — ao menos na lei —, mas a rede de [old_holder.GetFirstNameNoTooltip] em [ROOT.Char.GetTopLiege.GetCapitalLocation.GetBaronyNameExplicitlyNoTooltip] ainda representa uma dor de cabeça…"
 ep3_governor_yearly.8090.a: "Fabricar problemas deixados pela Casa [old_holder.GetHouse.GetBaseNameNoTooltip]."
 ep3_governor_yearly.8090.a.success: "A Casa [old_holder.GetHouse.GetBaseNameNoTooltip] perde prestígio"
 ep3_governor_yearly.8090.a.failure: "Suas mentiras são descartadas"
 ep3_governor_yearly.8090.b: "Talvez [old_holder.GetSheHe] possa ser convencido."
 ep3_governor_yearly.8090.c: "Talvez alguma compensação [old_holder.GetHerHim] silencie."
 ep3_governor_yearly.8090.d: "Bah, que [Select_CString( old_holder.IsFemale, 'esa vieja', 'ese viejo' )] faça o que bem entender!"
 ep3_governor_yearly.8100.t: "O [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] do Seu Vizinho"
 ep3_governor_yearly.8100.desc: "Entre as mensagens que me chegam hoje de [ROOT.Char.GetTopLiege.GetCapitalLocation.GetBaronyNameExplicitlyNoTooltip], fiquei indignado ao saber que [governor.GetFirstName], [governor.GetTitleAsNameNoTooltip] de [governor.GetPrimaryTitle.GetTierAsNameNoTooltip|l] vizinho de [governor.GetPrimaryTitle.GetNameNoTier], está afirmando abertamente a adequação de sua [governor.Custom2('RelationToMe',SCOPE.sC('neighboring_promoted_char'))] para #EMP mi#! cargo!\n\nParece que essa espécie de [governor.Custom2('InsultNoun', ROOT.Char)] cobiça minha província e passa os dias em [governor.GetCapitalLocation.GetBaronyNameExplicitlyNoTooltip] tramando como me expulsar de minha [ROOT.Char.Custom('FortifiedBuilding')]…"
 ep3_governor_yearly.8100.a: "#EMP Oh!#! Dois podem jogar esse jogo!"
 ep3_governor_yearly.8100.b: "Essa conspiração ousada deve ser denunciada."
 ep3_governor_yearly.8100.c: "Hah? Aquele tolo não conseguiria governar um mosteiro."
 ep3_governor_yearly.8100.d: "Essas tramas mesquinhas são indignas da dignidade de [governor.GetTitleAsNameNoTooltip]."
 ep3_governor_yearly.8110.t: "Colegas Pugilistas"
 ep3_governor_yearly.8110.desc: "Ultimamente há muitos rumores de descontentamento entre meus [Select_CString(And(governor_1.IsFemale, governor_2.IsFemale), 'gobernadoras vecinas', 'gobernadores vecinos')], [governor_1.Custom('ES_ElLa')] [governor_1.GetTitledFirstName|l] e [governor_2.Custom('ES_ElLa')] [governor_2.GetTitledFirstName|l], que agora criticam abertamente as habilidades e a conduta [Select_CString(And(governor_1.IsFemale, governor_2.IsFemale), 'de la otra', 'del otro')].\n\nIsso pode ser uma oportunidade para defender meus próprios interesses enquanto as casas de [governor_1.GetHouse.GetBaseName] e [governor_2.GetHouse.GetBaseName] estão distraídas…"
 ep3_governor_yearly.8110.a: "Alguns rumores falsos podem facilmente escalar isso."
 ep3_governor_yearly.8110.a.success: "Os rumores se espalham"
 ep3_governor_yearly.8110.a.failure: "Suas mentiras são rastreadas"
 ep3_governor_yearly.8110.a.failure_tt: "[governor_1.GetFirstName] e [governor_2.GetFirstName] perdem #N 25#! [opinion|lE] sobre você"
 ep3_governor_yearly.8110.b: "[governor_1.GetFirstNameNoTooltip] está claramente certo."
 ep3_governor_yearly.8110.c: "Recuso-me a acreditar em uma palavra contra [governor_2.GetFirstNameNoTooltip]."
 ep3_governor_yearly.8110.d: "Um chamado à unidade destacará sua tolice."
 ep3_governor_yearly.8110.d.tt: "[governor_1.GetFirstName] e [governor_2.GetFirstName] perdem #N 15#! [opinion|lE] sobre você"
 ep3_governor_yearly.8120.t: "Um Ato de [ROOT.Char.GetFaith.HighGodName]"
 ep3_governor_yearly.8120.desc: "Hoje recebi notícias sombrias de uma terrível calamidade em meu [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip]:"
 ep3_governor_yearly.8120.earthquake: "um terremoto pequeno, mas forte, arrasou uma série de povoados remotos de [disaster_county.GetNameNoTier],"
 ep3_governor_yearly.8120.storm: "uma tempestade feroz devastou uma série de povoados remotos de [disaster_county.GetNameNoTier],"
 ep3_governor_yearly.8120.ending: "destruindo lares, edifícios públicos e vidas...\n\nSou rapidamente lembrado de que, como o [ROOT.Char.GetTitleAsNameNoTooltip|l] de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], sou, em última instância, responsável por essas pessoas e lugares."
 ep3_governor_yearly.8120.a: "Eu pessoalmente supervisionarei a ajuda para o povo."
 ep3_governor_yearly.8120.a.success: "Seus esforços valem a pena"
 ep3_governor_yearly.8120.a.failure: "Os esforços são um desastre"
 ep3_governor_yearly.8120.b: "As vítimas serão apoiadas."
 ep3_governor_yearly.8120.c: "Por mais doloroso que seja, devemos aceitar a vontade [ROOT.Char.GetFaith.HighGodNamePossessive]."
 ep3_governor_yearly.8130.t: "Avareza e Oportunidade"
 ep3_governor_yearly.8130.desc: "Como [ROOT.Char.GetTitleAsNameNoTooltip|l] designad[ROOT.Char.Custom('ES_OA')] de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], sou o instrumento [ROOT.Char.GetTopLiege.Custom('ES_DelDela')] [ROOT.Char.GetTopLiege.GetTitleAsNameNoTooltip|l], com autoridade total sobre a burocracia, súditos e, naturalmente, #EMP impuestos#! de meu [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip|l].\n\nAo refletir sobre as finanças provinciais, ocorre-me que estaria dentro de minhas competências instituir uma pequena taxa sobre o povo; apenas pelo bem de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip], é claro…"
 ep3_governor_yearly.8130.a: "Infelizmente, #EMP algumas#! contribuições extras #EMP são#! justificadas..."
 ep3_governor_yearly.8130.b: "Uma pequena coleta é tudo o que é necessário."
 ep3_governor_yearly.8130.c: "Necessitados de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] poderiam usar alguma ajuda."
 ep3_governor_yearly.8130.d: "O [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] não é meu bolso particular!"
 ep3_governor_yearly.8140.t: "Verificando a Casa [estate_owner.GetHouse.GetBaseNameNoTooltip]"
 ep3_governor_yearly.8140.desc: "Trouxeram até mim um camponês de [estate_county.GetNameNoTier] para apresentar uma ladainha de queixas de sua comunidade contra a próxima propriedade de [estate_owner.GetHouse.GetBaseName] em [estate.GetLocation.GetBaronyNameExplicitly].\n\nAs bênçãos de [peasant.GetFaith.HighGodNamePossessive] estejam convosco, [ROOT.Char.GetTitleAsNameNoTooltip|l]. Os nobres da propriedade local têm nos despojado de nossas terras, negam-nos acesso às terras comunais e exigem impostos — tudo sob ameaça de violência!"
 ep3_governor_yearly.8140.a: "Ultrajante, isso será corrigido!"
 ep3_governor_yearly.8140.b: "Eu vou mediar um acordo para ambas as partes."
 ep3_governor_yearly.8140.c: "[estate_owner.Custom('ES_ElLa')|U] [estate_owner.GetTitledFirstNameNoTooltip|l] pode fazer o que lhe aprouver, camponês[peasant.Custom('ES_OA')]."
 ep3_governor_yearly.8140.d: "Uma pena, mas não há nada que eu possa fazer."
 ep3_governor_yearly.8150.t: "Borbulhando"
 ep3_governor_yearly.8150.desc: "O descontentamento domina [rebel_county.GetNameNoTier] e o povo fica cada vez mais inquieto. Perderia muito prestígio se meu [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip|l] fosse ameaçado por uma insurreição…\n\nMeu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('marshal'))], [marshal.GetFirstName], lê em voz alta, cansadamente, os relatórios sobre armas roubadas dos arsenais municipais, impostos retidos e ataques a patrulhas desprevenidas.\n\nAlgo #EMP precisa#! ser feito com"
 ep3_governor_yearly.8150.culture: "[targeting_faction.MakeScope.Var('faction_culture').Culture.GetName] desordeiros!\""
 ep3_governor_yearly.8150.faith: "[targeting_faction.MakeScope.Var('faction_faith').Faith.GetName|l] zelotes!\""
 ep3_governor_yearly.8150.peasant: "esses malditos camponeses, [ROOT.Char.GetTitleAsNameNoTooltip|l]!","
 ep3_governor_yearly_8150.end: "[marshal.GetSheHe] rosna."
 ep3_governor_yearly.8150.a: "Apenas a cabeça de uma cobra precisa ser neutralizada, [marshal.GetFirstNameNoTooltip]."
 ep3_governor_yearly.8150.a.success: "Eles rapidamente se acalmam"
 ep3_governor_yearly.8150.a.failure: "Seus subornos só os enfurecem"
 ep3_governor_yearly.8150.b: "Uma concessão ou duas, e eles irão para casa."
 ep3_governor_yearly.8150.c: "Sim, um exemplo deve ser feito."
 ep3_governor_yearly.8150.d: "Esses encrenqueiros vão ficar entediados logo."
 ep3_governor_yearly.8150.d.tt: "Receberá #V 2#! [regiments|lE] de [Concept( 'skirmisher', 'escaramuzadores' )|E] ao declarar a [war|lE]"
