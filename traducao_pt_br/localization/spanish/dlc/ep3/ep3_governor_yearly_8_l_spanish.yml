 ep3_governor_yearly.8170.opinion_tt: "Todo [vassal|lE] ameaçado por [raider.Custom('ES_ElLa')] [raider.GetTitledFirstName|l] ([THIS.Char.MakeScope.Var('threatened_counties_count').GetValue|V0])"
