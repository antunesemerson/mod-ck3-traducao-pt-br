 ep3_governor_yearly.8160.t: "Acesso Equitativo"
 ep3_governor_yearly.8160.desc: "[ROOT.Char.GetTopLiege.GetPrimaryTitle.GetDefinitiveNameNoTooltip|U] é uma terra de muitos povos e confissões. Como [ROOT.Char.GetTitleAsNameNoTooltip|l] de um [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] do povo [ROOT.Char.GetPrimaryTitle.GetAdjective], sou responsável por estrangeiros e hereges, assim como pelos [ROOT.Char.GetTopLiege.GetCulture.GetCollectiveNounNoTooltip].\n\nMeu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('councillor'))|l], [councillor.GetFirstName], não hesita em opinar que "a burocracia pertence a"
 ep3_governor_yearly.8160.culture_end: "e qualquer chamado por maior participação dos [minority_county.GetCountyData.GetCulture.GetCollectiveNounNoTooltip] deve ser extinto!\""
 ep3_governor_yearly.8160.faith_end: "e qualquer chamado por maior participação dos [minority_county.GetCountyData.GetFaith.GetAdherentNamePluralNoTooltip] [councillor.Custom2('GetUnbelieverTerm', administrator)] deve ser extinto!\""
 ep3_governor_yearly.8160.a: "Uma rede maior pega mais peixes."
 ep3_governor_yearly.8160.b: "Você está certo, eles devem conhecer seu lugar."
 ep3_governor_yearly.8160.culture_county_tt: "Cada [minority_county.GetCountyData.GetCulture.GetName] [county|lE]"
 ep3_governor_yearly.8160.faith_county_tt: "Cada [minority_county.GetCountyData.GetFaith.GetAdjective] [county|lE]"
 ep3_governor_yearly.8160.culture_councillor: "[ROOT.Char.GetTopLiege.GetCulture.GetCollectiveNounNoTooltip] — e [councillor.GetCulture.GetCollectiveNounNoTooltip] naturalmente —"
 ep3_governor_yearly.8160.culture_self: "[ROOT.Char.GetTopLiege.GetCulture.GetCollectiveNounNoTooltip] — oh e [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip] é claro —"
 ep3_governor_yearly.8160.culture: "[ROOT.Char.GetTopLiege.GetCulture.GetCollectiveNounNoTooltip],"
 ep3_governor_yearly.8160.faith: "bons [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip],"
 ep3_governor_yearly.8160.d: "Não vejo necessidade de mudar nada."
 ep3_governor_yearly.8160.courtier_tt: "Você recrutará um [minority_county.GetCountyData.GetCulture.GetName] [minority_county.GetCountyData.GetFaith.GetAdjective] administrador"
 cultural_acceptance_promoted_bureaucrats: "Um [governor|lE] promoveu burocratas estrangeiros"
 ep3_governor_yearly.8170.t.sea: "[raider.GetPrimaryTitle.GetAdjectiveNoTooltip] Razzias"
 ep3_governor_yearly.8170.t.land: "[raider.GetPrimaryTitle.GetAdjectiveNoTooltip] Incursões"
 ep3_governor_yearly.8170.desc: "Defendendo contra ataques de"
 ep3_governor_yearly.8170.sea: "do outro lado do mar — em especial, o temido saqueador de [raider.GetPrimaryTitle.GetNameNoTooltip]—"
 ep3_governor_yearly.8170.land: "além das fronteiras — especialmente a do [raider.GetPrimaryTitle.GetTierAsNameNoTooltip] de [raider.GetPrimaryTitle.GetNameNoTooltip]—"
 ep3_governor_yearly.8170.ending: "é vital para a segurança mais ampla [ROOT.Char.GetTopLiege.Custom('ES_DelDela')] [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip|l].\n\n[marshal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] revisou recentemente nossas medidas defensivas e passou a tarde inteira propondo melhorias a partir de uma lista de tirar o fôlego. Entre as principais está um sistema de alerta, para dar tempo às aldeias de evacuar."
 ep3_governor_yearly.8170.a: "Implemente esse 'sistema de alerta' imediatamente!"
 ep3_governor_yearly.8170.b: "Tenho uma ideia melhor."
 ep3_governor_yearly.8170.b.success: "Suas ideias são super eficazes"
 ep3_governor_yearly.8170.b.failure: "Você entende fundamentalmente mal"
 ep3_governor_yearly.8170.c: "Talvez esse bandido possa ser convencido."
 ep3_governor_yearly.8170.c.success: "Você encanta [raider.Custom('ES_AlAla')] [raider.GetTitledFirstNameNoTooltip|l]"
 ep3_governor_yearly.8170.c.failure: "Sua mensagem é ignorada"
 ep3_governor_yearly.8170.d: "Os ataques são simplesmente parte da vida na fronteira."
