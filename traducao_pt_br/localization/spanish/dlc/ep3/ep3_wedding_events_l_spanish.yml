l_spanish:
 ep3_wedding.0001.t: "Não é exatamente [other_family_spouse.Custom('ES_ElLa')] [other_family_spouse.Custom('GetBrideGroom')]"
 ep3_wedding.0001.desc: "O baile começou! A música corre como um rio caudaloso, como um vento que agita até mesmo as árvores mais poderosas. [flirting_in_law.GetName], [other_family_spouse.Custom2('RelationToMeShort', SCOPE.sC('flirting_in_law'))] [other_family_spouse.Custom('ES_DelDela')] [other_family_spouse.Custom('GetBrideGroom')], dança entre os demais; seu corpo é como uma folha ao vento. Seu olhar não está nos outros dançarinos, não... Seus olhos estão fixos nos meus. #EMP Convidativos.#!\n\nA noite vai ficando cada vez mais tarde. Aos olhares ardentes de [flirting_in_law.GetFirstNameNoTooltip] se somam momentos fugazes de toques delicados, e o movimento de seus quadris começa a despertar algo em mim."
 ep3_wedding.0001.desc_own_wedding: "Já que minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('other_family_spouse'))] [other_family_spouse.GetFirstName] não está por aí, será que #EMP isto#! é o que devo fazer para provar os encantos da família dele...?\n\nMas na minha própria boda? #EMP Com [flirting_in_law.Custom('ES_ElLa')] [other_family_spouse.Custom2('RelationToMeShort', SCOPE.sC('flirting_in_law'))] de meu [other_family_spouse.Custom('WifeHusband')]?!"
 ep3_wedding.0001.desc_guest: "E não é como se fôssemos #EMP [Select_CString(And(ROOT.Char.IsFemale, flirting_in_law.IsFemale),'nosotras','nosotros')]#! quem está selando uma união sagrada hoje!\n\nTalvez haja espaço em algum canto escuro para uma escapadinha profanamente desajeitada…"
 ep3_wedding.0001.a_non_spouse: "Este dia é para [same_family_spouse.GetFirstNameNoTooltip] e somente [same_family_spouse.GetSheHe]!"
 ep3_wedding.0001.a_spouse: "Este dia é para [other_family_spouse.GetFirstNameNoTooltip] e somente [other_family_spouse.GetSheHe]!"
 ep3_wedding.0001.a.flavor_non_spouse: "Jamais me ocorreria trair a confiança, nem mesmo com a menor indiscrição!"
 ep3_wedding.0001.a.flavor_spouse: "Jamais me ocorreria trair a confiança dela/dele, nem mesmo com a menor indiscrição!"
 ep3_wedding.0001.b: "Vamos #EMP celebrar#!."
 ep3_wedding.0001.b.flavor: "Abordar [flirting_in_law.GetNameNoTooltip] pode ser um erro, talvez... mas um interessante."
 ep3_wedding.0001.c: "Não há mal algum em uma simples dança amigável."
 ep3_wedding.0001.c.flavor: "Somos todos uma família agora, afinal! O que há de estranho ou suspeito em compartilhar pequenos confortos com a família...?"
 ep3_wedding.001.b.got_caught: "@warning_icon!#X  Sua aventura foi descoberta! Você provavelmente enfrentará consequências#!"
 ep3_wedding.0001.b.success.desc.tt: "Ébrio[ROOT.Char.Custom('ES_OA')] de desejo, vocês escapam juntos"
 ep3_wedding.0001.b.caught.desc.tt: "Você é peg — no meio do ato!"
 ep3_wedding.0001.b.fail.desc.tt: "Repugnad[flirting_in_law.Custom('ES_OA')], [flirting_in_law.GetFirstNameNoTooltip] rejeita você"
 own_wedding_difficulty_tooltip: "@warning_icon! #X Chance de sucesso reduzida — porque #EMP este é o seu próprio casamento#!"
 ep3_wedding.0002.t: "Ritmos da Escuridão"
 ep3_wedding.0002.intro: "[flirting_in_law.GetName], [flirting_in_law.Custom('ES_ElLa')] deslumbrante[flirting_in_law.Custom('ES_XA')] [other_family_spouse.Custom2('RelationToMeShort', SCOPE.sC('flirting_in_law'))] [other_family_spouse.Custom('ES_DelDela')] [other_family_spouse.Custom('GetBrideGroom')], nunca deixou de dançar. À medida que suas luxuosas vestes de casamento caíam na escuridão, peça por peça, [flirting_in_law.GetFirstNameNoTooltip] pressiona sua carne quente contra a minha… Seu balançar só se torna mais intenso, mais urgente.\n\nCom o ato agora consumado, desabo em uma crise de riso aturdido;"
 ep3_wedding.0002.own_wedding: "[flirting_in_law.Custom('ES_ElLa')] [other_family_spouse.Custom2('RelationToMeShort', SCOPE.sC('flirting_in_law'))] do meu [other_family_spouse.Custom('WifeHusband')] dá um último giro sem roupas.\n\nMinha nov[other_family_spouse.Custom('ES_OA')] [other_family_spouse.Custom('WifeHusband')] me aguarda, sim…"
 ep3_wedding.0002.others_wedding: " na indiscrição me dá uma última dança nua.\n\nA festa de casamento nos espera, sim..."
 ep3_wedding.0002.lowborn: "mas eu gostei de brincar entre os galhos da árvore genealógica de sua família."
 ep3_wedding.0002.highborn: "mas eu gostei de brincar entre os galhos da árvore genealógica da família [other_family_spouse.GetHouse.GetName]."
 ep3_wedding.0002.a: "\"Eu... eu acho que te amo, [flirting_in_law.GetFirstNameNoTooltip].\""
 ep3_wedding.0002.a.flavor: "Cometi um grande crime contra meu nov[other_family_spouse.Custom('ES_OA')] [other_family_spouse.Custom('WifeHusband')], mas pela maior das causas: o coração!"
 ep3_wedding.0002.a.flavor_non_spouse: "De fato, tal coisa foi ordenada, neste tempo de amor santificado!"
 ep3_wedding.0002.a.success.desc.tt: "[flirting_in_law.GetSheHe|U] também está se apaixonando por você."
 ep3_wedding.0002.a.fail.desc.tt: "A [flirting_in_law.GetFirstNameNoTooltip] fica lisonjeado(a), mas nada mais"
 ep3_wedding.0002.b: "\"Você vai dançar para mim novamente, não vai...?\""
 ep3_wedding.0002.c: "\"Vamos voltar para a festa!\""
 lust_demon_success_chance: "#weak [success_chance|E] de [scheme|lE] de [GetScheme('seduce').GetTypeName|l] contra personagens piedosos grandemente melhorada"
 lust_demon_success_chance_tt: "Você ganha uma melhoria significativa de [success_chance|lE] no [scheme|lE] [GetScheme('seduce').GetTypeName|l] contra personagens [GetTrait('zealous').GetName( GetNullCharacter )|l] por #high 10 anos#!"
 ep3_wedding.0003.t: "Que [other_family_spouse.Custom2('RelationToMeShort', SCOPE.sC('flirting_in_law'))] tenho!"
 ep3_wedding.0003.desc_intro: "[flirting_in_law.Custom('ES_ElLa')|U] [flirting_in_law.GetTitledFirstName|l] grita; chegamos aos momentos finais e espasmódicos do acasalamento…\n\n"
 ep3_wedding.0003.desc_own_wedding: "#EMP Que [other_family_spouse.GetFaith.DevilName] me arranque os olhos!#!, grita meu nov[other_family_spouse.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('other_family_spouse'))] com sua voz inconfundível. #EMP Com que imundície me deparei?#!.\n\nSua [other_family_spouse.Custom2('RelationToMeShort', SCOPE.sC('flirting_in_law'))] salta da minha carne úmida, ainda ofegante…, mas [other_family_spouse.GetFirstName] já viu tudo e emudece diante do mais vil dos insultos aos nossos votos matrimoniais."
 ep3_wedding.0003.desc_guest: "#EMP Que [other_family_spouse.GetFaith.DevilName] me arranque os olhos!#!, grita [other_family_spouse.Custom('ES_ElLa')] [other_family_spouse.GetTitledFirstName|l] com sua voz inconfundível. #EMP Em que me meti?!?#!.\n\nSeu [other_family_spouse.Custom2('RelationToMeShort', SCOPE.sC('flirting_in_law'))] salta da minha carne úmida, ainda ofegante…, mas [other_family_spouse.GetFirstName] já viu tudo e parece não gostar nem um pouco."
 ep3_wedding.0003.a: "Você fica #EMP tão#! lind quando está brav..."
 ep3_wedding.0003.a.flavor: "Não têm vontade de celebrar nosso casamento, [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('other_family_spouse'))] meu[other_family_spouse.Custom('ES_OA')]… só nós três?"
 ep3_wedding.0003.b: "Fale sobre isso e você morre, [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('other_family_spouse'))]."
 ep3_wedding.0003.c: "Fui tomad pela loucura, #EMP LOUCURA#!, por um demônio do desejo!"
 ep3_wedding.0003.c.flavor: "Sim, há um espírito maligno me possuindo — e se ele não for satisfeito pela carne, ele... uh... #EMP vai me destruir#! Eu realmente não tenho outra escolha!"
 ep3_wedding.0003.c.success.desc: "[other_family_spouse.GetFirstNameNoTooltip] chora pela sua aflição."
 ep3_wedding.0003.c.fail.desc: "[other_family_spouse.GetFirstNameNoTooltip] denuncia suas mentiras."
 ep3_wedding.0003.d: "Você acha que eu #EMP me importo#! que essa diversão toda está 'errada'...?"
 ep3_wedding.0003.d.flavor: "Vá tagarelar sobre isso em outro lugar, seu tolo chorão."
 ep3_wedding.0003.e: "Por favor, não conte a ninguém! Estou muito arrependid."
 ep3_wedding.0003.e.flavor: "Uma vez consumid pelo fogo proibido... meu coração agora está partido em pedaços."
 possessed_by_lust_demon_modifier: "Possuíd pelos Demônios do Desejo"
 possessed_by_lust_demon_modifier_desc: "Este personagem afirma que vive sob a ameaça de um mal faminto, que trará destruição se não for saciado pela carne carnal."
 unflappable_boudoir_confidence_modifier: "Confiança Imperturbável no Boudoir"
 unflappable_boudoir_confidence_modifier_desc: "Este conquistador não tem vergonha alguma de seus desejos… de uma forma que muitos consideram escandalosa, e muitos outros, encantadora."
