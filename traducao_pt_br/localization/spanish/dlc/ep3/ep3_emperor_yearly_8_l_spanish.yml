l_spanish:
 ep3_emperor_yearly.8000.t: "Compartilhando a Carga"
 ep3_emperor_yearly.8000.intro_byz: "[ROOT.Char.GetCapitalLocation.GetBaronyNameExplicitlyNoTooltip], a luz imperecível do império, sofre nestes tempos difíceis."
 ep3_emperor_yearly.8000.intro: "[ROOT.Char.GetCapitalLocation.GetBaronyNameExplicitlyNoTooltip], nossa grande capital, geme sob o peso das muitas demandas de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] sobre seu povo."
 ep3_emperor_yearly.8000.desc: "\n\nOs conflitos recentes cobraram seu preço: os recrutadores cada vez têm mais dificuldade para cumprir suas cotas, e a falta de mão de obra de todos os tipos se faz notar por toda a cidade.\n\nMeu [ROOT.Char.Custom2('RelationToMeShort', suggestor)] , [suggestor.Custom('ES_ElLa')] [suggestor.GetTitledFirstName|l] , compilou uma lista de províncias prósperas, cuja fortuna pode socorrer a capital em tempos de necessidade."
 ep3_emperor_yearly.8000.a: "Sim, traga homens de [county_1.GetCountyData.GetCapital.GetBaronyNameExplicitlyNoTooltip]."
 ep3_emperor_yearly.8000.b: "A capital vem antes de [county_2.GetCountyData.GetCapital.GetBaronyNameExplicitlyNoTooltip]."
 ep3_emperor_yearly.8000.c: "[county_3.GetCountyData.GetCapital.GetBaronyNameExplicitlyNoTooltip] deve fazer sacrifícios."
 ep3_emperor_yearly.8000.d: "É simplesmente um tempo de escassez."
 ep3_emperor_yearly.8010.opening_byz: "Saudações, [ROOT.Char.GetTitleAsNameNoTooltip|l]"
 ep3_emperor_yearly.8010.opening: "Saudações, [ROOT.Char.GetTitledFirstNameNoTooltip|l],"
 ep3_emperor_yearly.8010.desc: "Um[liar.Custom('ES_XA')] [liar.GetWomanMan] chamado [liar.GetFirstName] veio até mim buscando emprego, alegando ter uma carta de recomendação [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip|l] em pessoa.\n\nO selo acabou sendo uma falsificação, e agora mantenho esse [Select_CString( liar.IsFemale, 'impostora descarada', 'impostor descarado' )] em minhas masmorras."
 ep3_emperor_yearly.8010.a: "Sua diligência será recompensada, [governor.GetFirstNameNoTooltip]."
 ep3_emperor_yearly.8010.b: "Ora, era #EMP era#! meu selo! Soltem[liar.GetHerHim] imediatamente!"
 ep3_emperor_yearly.8010.c: "Muito bem, envie o desgraçado para mim."
 ep3_emperor_yearly.8010.c.tt: "Prisioneiro transferido"
 ep3_emperor_yearly.8010.d: "Forjar selos imperiais deve ser punido de forma decisiva."
 ep3_emperor_yearly.8020.t: "Patrocínio Porfírio"
 ep3_emperor_yearly.8020.intro.really_bankrupt: "As salas do tesouro vazias não contêm sequer um grão de ouro, e [ROOT.Char.GetPrimaryTitle.GetDefinitiveName|l] geme sob o peso de tal iliquidez."
 ep3_emperor_yearly.8020.intro.bankrupt: "Os cofres imperiais estão vazios, e as notas promissórias do contador são tudo o que mantém o exército e a burocracia de [ROOT.Char.GetPrimaryTitle.GetDefinitiveName|l] em movimento dia após dia."
 ep3_emperor_yearly.8020.intro: "O fluxo de moedas está em baixa, e é cada vez mais difícil encontrar os fundos necessários para meus planos, sem falar no funcionamento regular de [ROOT.Char.GetPrimaryTitle.GetDefinitiveName|l]."
 ep3_emperor_yearly.8020.desc: "\n\nApós muitas insinuações nada sutis sobre os benefícios de um patrocínio bem colocado e de necessidades desconfortáveis, meu [ROOT.Char.Custom2('RelationToMeShort', suggestor)]\", [suggestor.Custom('ES_ElLa')] [suggestor.GetTitledFirstName|l]\", por fim fala claramente.\n\n\"Grande [ROOT.Char.GetTitleAsNameNoTooltip|l]… embora usar [Glossary( 'púrpura', 'PORPHURA_GLOSS' )] seja uma prerrogativa imperial, não é desconhecido que tais direitos sejam arrendados a… súditos #EMP comprometidos#!\"."
 ep3_emperor_yearly.8020.a.friend: "Meu amig[purpler_1.Custom('ES_OA')], [purpler_1.GetFirstNameNoTooltip] é uma exceção."
 ep3_emperor_yearly.8020.a.claimant: "Reivindicações como a de [purpler_1.GetFirstNameNoTooltip] devem ser reconhecidas."
 ep3_emperor_yearly.8020.a.vassal: "Acho que [purpler_1.GetFirstNameNoTooltip] vestiria bem."
 ep3_emperor_yearly.8020.b.friend: "[purpler_2.GetFirstNameNoTooltip] é meu amig[purpler_2.Custom('ES_OA')] dign[purpler_2.Custom('ES_OA')]."
 ep3_emperor_yearly.8020.b.claimant: "[purpler_2.GetFirstNameNoTooltip] tem uma reivindicação digna."
 ep3_emperor_yearly.8020.b.vassal: "[purpler_2.GetFirstNameNoTooltip] parece digno[purpler_2.Custom('ES_OA')]."
 ep3_emperor_yearly.8020.c.friend: "A amizade vem primeiro: [purpler_3.GetFirstNameNoTooltip]."
 ep3_emperor_yearly.8020.c.claimant: "Os reclamantes têm direitos especiais: [purpler_3.GetFirstNameNoTooltip]."
 ep3_emperor_yearly.8020.c.vassal: "Pode muito bem ser [purpler_3.GetFirstNameNoTooltip]..."
 ep3_emperor_yearly.8020.d: "A púrpura não pode ser #EMP comprada#!!"
 PORPHURA_GLOSS: "Desde os tempos do final do Império Romano, era proibido para qualquer um, exceto o imperador, usar roupas tingidas com o inestimável púrpura de Tiro, feito das secreções do molusco marinho murex do Mediterrâneo."
 ep3_emperor_yearly.8030.t: "Flagelo do Bósforo"
 ep3_emperor_yearly.8030.desc: "Uma temível baleia ataca as embarcações que navegam pelos estreitos, queixa-se meu [ROOT.Char.Custom2('RelationToMeShort', complainer)] , [complainer.Custom('ES_ElLa')] [complainer.GetTitledFirstName|l]: «Pescadores, comerciantes — até mesmo capitães navais! Todos temem deixar seus portos».\n\nSão trazidos informes empoeirados das dificuldades de [justinian.GetFirstNameRegnal] com \"Porfirios\", flagelo por décadas até encalhar numa praia e ser despedaçado. Alguns até sugerem que a nova ameaça seja um descendente vingador…\n\nSão oferecidas estratagemas duvidosas para lidar com esse terror das profundezas, à medida que os relatos de seus feitos começam a se acumular."
 every_bosporos_sea_province_tt: "$sea_bosporus$, $sea_marmara$, e $sea_dardanelles$"
 every_bosporos_coast_county_tt: "[THIS.Char.GetCapitalLocation.GetName], e outras [counties|lE] costeiras dos estreitos"
 ep3_emperor_yearly.8030.a: "Deve ser parado, a qualquer custo!"
 ep3_emperor_yearly.8030.a.success: "A besta é parada"
 ep3_emperor_yearly.8030.a.failure: "A besta é imparável"
 ep3_emperor_yearly.8030.a.flavor: "Armem as galés, tragam-me sua carne!"
 ep3_emperor_yearly.8030.c: "Decrete armamentos, comboios e rotas seguras."
 ep3_emperor_yearly.8030.d: "Os marinheiros devem buscar [ROOT.Char.GetFaith.WaterGodName]."
 ep3_emperor_yearly.8030.d.flavor: "Só podemos rezar por salvação..."
 ep3_emperor_yearly.8040.t: "A ira [ROOT.Char.GetFaith.HighGodNameAlternatePossessive]"
 ep3_emperor_yearly.8040.intro: "Meu governo tem sido assolado por reveses e infortúnios"
 ep3_emperor_yearly.8040.truce_target: "—o mais mortificante de tudo, nossa grande derrota pelas mãos de [truce_target.Custom('ES_DelDela')] [truce_target.GetTitledFirstName|l]—"
 ep3_emperor_yearly.8040.truce_holder: "— até mesmo a grande vitória sobre [truce_holder.Custom('ES_ElLa')] [truce_holder.GetTitledFirstName|l] teve seu preço—"
 ep3_emperor_yearly.8040.plague: "— a maldita [epidemic.GetName|l] devasta até mesmo [constantinople.GetNameNoTooltip], sobrecarregando os hospitais —"
 ep3_emperor_yearly.8040.past_plague: "— a doença assolou o império, não poupando nem mesmo [constantinople.GetNameNoTooltip] de seu infortúnio —"
 ep3_emperor_yearly.8040.debt: "— o tesouro está vazio, os órgãos do estado dependentes apenas de crédito e boa vontade —"
 ep3_emperor_yearly.8040.desc: "e o povo fica inquieto…\n\nNão posso deixar de me perguntar: será que os iconoclastas têm razão? Seriam os problemas do império apenas o castigo [ROOT.Char.GetFaith.HighGodNamePossessive] por ter ignorado Seus mandamentos?\n\n"
 ep3_emperor_yearly.8040.family: "Meu própri[family.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', family)], [family.GetFirstName], estava convencid[family.Custom('ES_OA')] de tais ideias. Talvez eu tenha estado cego[ROOT.Char.Custom('ES_OA')]…"
 ep3_emperor_yearly.8040.predecessor: "Volto-me para o reinado [predecessor.Custom('ES_DelDela')] [predecessor.GetTitledFirstNameRegnal|l] e questiono os alicerces das minhas próprias crenças…"
 ep3_emperor_yearly.8040.leo: "A doutrina [leo.Custom('ES_DelDela')] [leo.GetTitledFirstNameRegnal|l] e os isauros trouxeram grande discórdia ao império e à cristandade — mas apenas por um tempo..."
 ep3_emperor_yearly.8040.a: "É hora de verdadeiramente acabar com toda idolatria!"
 ep3_emperor_yearly.8040.b: "Não cederei à heresia."
 ep3_emperor_yearly.8050.t: "Visitantes Não Convidados"
 ep3_emperor_yearly.8050.desc: "Embarcações de todos os cantos do mundo ancoram nos portos de [ROOT.Char.GetPrimaryTitle.GetDefinitiveNameNoTooltip|l] e [marshal.Custom('ES_ElLa')] [marshal.GetTitledFirstName|l] informa sobre uma pequena frota de embarcações que acabou de ancorar nas costas de [raid_target.GetProvince.GetBaronyNameExplicitlyNoTooltip].\n\nSeu capit[raider.Custom('ES_AnAna')], [Select_CString( raider.IsFemale, 'una bárbara', 'un bárbaro' )] de nome [raider.GetFirstName], exige um pagamento e ameaça com pirataria se seu pedido não for atendido.\n\nOs saqueadores marítimos do distante norte são muito temidos e parece que este grupo espera lucrar apenas com sua reputação."
 ep3_emperor_yearly.8050.a: "Pague o preço irrisório."
 ep3_emperor_yearly.8050.b: "Eu poderia usar [Select_CString( raider.IsFemale, 'uma forasteira', 'um forasteiro' )] tão audacios[raider.Custom('ES_OA')]."
 ep3_emperor_yearly.8050.b.byz: "Me cairia bem [Select_CString( raider.IsFemale, 'uma varega', 'um varego' )] tão ousad[raider.Custom('ES_OA')]."
 ep3_emperor_yearly.8050.c: "Envie as galés atrás desses cães!"
 ep3_emperor_yearly.8050.c.success: "Os longships são dispersos"
 ep3_emperor_yearly.8050.c.failure: "Os invasores são evasivos"
 ep3_emperor_yearly.8060.t: "Fronteira Agitada"
 ep3_emperor_yearly.8060.intro: "Más notícias chegam de [defector.GetPrimaryTitle.GetNameNoTier]; sussurra-se que meu [ROOT.Char.Custom2('RelationToMeShort', defector)], [defector.Custom('ES_ElLa')] [defector.GetTitledFirstName|l], conspira com [sponsor.GetName] e talvez até planeje desertar!\n\nNão há desculpa, nem clemência, para tamanha traição ardilosa contra seu própri[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]…"
 ep3_emperor_yearly.8060.spouse: "o dever imperial deve vir antes da devoção a seu [defector.Custom2('RelationToMeShort', sponsor)]!"
 ep3_emperor_yearly.8060.family: "a lealdade ao império vem antes do dever a seu [defector.Custom2('RelationToMeShort', sponsor)]!"
 ep3_emperor_yearly.8060.house: "seus laços de parentesco com [defector.GetDynastyHouseName]"
 ep3_emperor_yearly.8060.dynasty: "que se danem os antigos laços familiares entre os [defector.GetDynastyHouseName] e os [sponsor.GetDynastyHouseName]."
 ep3_emperor_yearly.8060.faith_and_culture: "quaisquer que sejam nossas diferenças de tradição e culto!"
 ep3_emperor_yearly.8060.culture: "o império vem antes das meras tradições e línguas locais!"
 ep3_emperor_yearly.8060.faith: "o império vem antes da religião, por mais equivocadas que sejam as crenças!"
 ep3_emperor_yearly.8060.fallback: "o império vem antes de quaisquer relacionamentos pessoais mesquinhos!"
 ep3_emperor_yearly.8060.a: "\"Prendam a fera, eu comando!\""
 ep3_emperor_yearly.8060.b: "Lembre [defector.GetFirstNameNoTooltip] das virtudes da lealdade."
 ep3_emperor_yearly.8060.c: "Que [defector.Custom('ES_EA')] cã[defector.Custom('ES_OA')] faça o que quiser."
 ep3_emperor_yearly.8060.every_title: "Você ganha [claims|lE] sobre todos os [titles|lE] de [defector.GetTitledFirstName|l]"
 ep3_emperor_yearly.8060.defect: "[defector.Custom('ES_ElLa')|U] [defector.GetTitledFirstNameNoTooltip|l] deserta"
 ep3_emperor_yearly.8060.no_defect: "[defector.Custom('ES_ElLa')|U] [defector.GetTitledFirstName|l] permanece leal"
 ep3_emperor_yearly.8060.success: "Você ataca antes que [defector.GetSheHe] esteja pronto[defector.Custom('ES_OA')]"
 ep3_emperor_yearly.8060.failure: "[defector.Custom('ES_ElLa')|U] [defector.GetTitledFirstNameNoTooltip|l] escapa"
