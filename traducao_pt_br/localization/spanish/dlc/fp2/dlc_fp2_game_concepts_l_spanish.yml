l_spanish:
 game_concept_struggle: "Conflito"
 game_concept_struggle_struggles: "Conflitos"
 game_concept_struggle_struggles_possessive: "da contenda"
 game_concept_struggle_desc: "As $game_concept_struggle_struggles$ são conflitos de longo prazo que envolvem grandes [struggle_region_regions|lE] com muitas [faiths|lE] e [cultures|lE]. Dentro dos limites de uma $game_concept_struggle$, podem entrar em vigor regras e [modifiers|lE] especiais e peculiares que mudam com o tempo. Como duram de décadas a séculos, nem todos os [characters|lE] de uma $game_concept_struggle$ estão em [war|lE] uns com os outros o tempo todo.\n\nCada $game_concept_struggle$ consiste em várias [struggle_phase_phases|lE]. À medida que os $game_concept_characters$ agem dentro da [struggle_region|lE] (por exemplo, declarando uma $game_concept_war$ ou [Concept( 'marrying', 'casando-se' )|E]), podem ativar [struggle_catalyst_catalysts|lE] que os fazem avançar entre as diferentes $game_concept_struggle_phase_phases$.\n\nDependendo do grau em que sejam vistos como parte da $game_concept_struggle$ por outros participantes, os $game_concept_characters$ com [land|lE] na área podem ser vistos como [Concept( 'struggle_involved', 'envolvidos' )|E], [Concept( 'struggle_interloper_interlopers', 'intrusos' )|E] ou [Concept( 'struggle_uninvolved', 'não envolvidos' )|E]."
 game_concept_iberian_struggle: "Conflito Ibérico"
 game_concept_iberian_struggle_desc: "O $game_concept_iberian_struggle$ retrata os séculos de relacionamentos conturbados na Península Ibérica. Embora nascido da Conquista Omíada da Península Ibérica no século VIII, o [struggle|lE] muda entre [struggle_phase_phases|lE] de violência movida a ódio, tréguas cautelosas e cooperação pragmática. Há poucos aliados permanentes em tal situação, e os [rulers|lE] devem ter cuidado ao confiar puramente em uma [faith|lE] ou [culture|lE] compartilhada."
 game_concept_struggle_phase: "Fase do Conflito"
 game_concept_struggle_phase_phase: "Fase"
 game_concept_struggle_phase_phases: "Fases"
 game_concept_struggle_phase_desc: "Uma $game_concept_struggle_phase_phase$ é um estado de espírito geral comum aos [characters|lE] [Concept( 'struggle_involved', 'envolvidos' )|E] e aos [counties|lE] de uma [struggle_region|E]. Representa as tendências e costumes sociais de curto prazo que dominam temporariamente o diálogo da [struggle|E].\n\n#weak Exemplo: em uma $game_concept_struggle_phase_phase$, os habitantes de uma $game_concept_struggle_region_region$ podem pensar que a tolerância religiosa é vital, embora o restante de sua fé não concorde.#!"
 game_concept_struggle_catalyst: "Catalisador do Conflito"
 game_concept_struggle_catalyst_catalyst: "Catalisador"
 game_concept_struggle_catalyst_catalysts: "Catalisadores"
 game_concept_struggle_catalyst_desc: "Las [struggle_struggles|lE] pasan de una [struggle_phase_phase|lE] a otra cuando se llevan a cabo ciertas acciones notables, que crean un consenso de su [struggle_region|lE] hacia un determinado estado de ánimo. Se puede encontrar una lista de qué acciones son importantes en cada $game_concept_struggle_phase_phase$ en la ventana $game_concept_struggle$.\n\n#weak Ejemplo: en la [iberian_struggle|lE], la [struggle_phase_iberia_opportunity|lE] puede pasar a [struggle_phase_iberia_hostility|lE] o [struggle_phase_iberia_conciliation|lE]. Asesinar a un [character|lE] importante podría llevar a lo primero, mientras que formar una [alliance|lE] [Concept( 'marriage', 'matrimonial' )|E] con alguien de una [faith|lE] diferente llevaría hacia lo segundo."
 game_concept_struggle_involved: "Envolvido"
 game_concept_struggle_involved_desc: "Quando um [character|lE] ou um [county|lE] estiver $game_concept_struggle_involved$, isso significa que os habitantes de uma determinada [struggle_region|lE] o consideram parte natural e integral da [struggle|lE]. Eles se beneficiam plenamente das vantagens fluidas das [struggle_phase_phases|lE] e são os principais ativadores das [struggle_catalyst_catalysts|lE].\n\nSão consideradas $game_concept_struggle_involved$ as [cultures|El] e [faiths|lE] que têm ou tiveram presença significativa na $game_concept_struggle_region_region$.\n\n#weak Para ser $game_concept_struggle_involved$, um $game_concept_character$ deve ter $game_concept_struggle_involved$ tanto sua $game_concept_culture$ quanto sua $game_concept_faith$ #EMP e#! ter sua [capital|lE] dentro da $game_concept_struggle_region$.#!"
 game_concept_struggle_interloper: "Intruso"
 game_concept_struggle_interloper_interlopers: "Intrusos"
 game_concept_struggle_interloper_desc: "Quando um [character|lE] está envolvido em uma [struggle|lE] específica, mas ainda não é considerado totalmente [struggle_involved|lE], ele é um $game_concept_struggle_interloper$.\n\nOs $game_concept_struggle_interloper_interlopers$ têm suas [Concept( 'capital', 'capitais' )|E] dentro da [struggle_region|lE], mas não possuem uma [faith|lE] e uma [culture|lE] envolvidas.\n\nOs $game_concept_characters$ plenamente envolvidos os consideram forasteiros intrometidos e incômodos que não entendem onde não são bem-vindos. Portanto, os [rulers|lE] forasteiros costumam sofrer algumas penalidades nos condados que possuam dentro de uma $game_concept_struggle_region$."
 game_concept_struggle_uninvolved: "Não Envolvido"
 game_concept_struggle_uninvolved_desc: "Para que um [character|lE] seja considerado $game_concept_struggle_uninvolved$ em uma [struggle|lE] em particular, basta que tenha sua [capital|lE] fora da [struggle_region|lE].\n\nIsso significa que ele é considerado um forasteiro, alguém que não tem participação séria nas [struggle_phase_phases|lE] atuais e que #EMP não deveria#! se envolver, porque está claro que não compreenderia as nuances locais.\n\nUma das poucas coisas em que todos os que estão em uma $game_concept_struggle$ concordam é que os $game_concept_characters$ $game_concept_struggle_uninvolved$ não têm o que fazer em #EMP suas#! terras. Os [rulers|lE] $game_concept_struggle_uninvolved$ geralmente sofrem penalidades severas em todos os [counties|lE] que possuam dentro de uma $game_concept_struggle_region$."
 game_concept_struggle_large_conquest: "Grande Conquista do Conflito"
 game_concept_struggle_large_conquest_desc: "Alguns $game_concept_struggle_catalyst_catalysts$ envolvem a conclusão bem-sucedida de uma grande [war|lE] por parte do atacante.\n\nPara isso, são contabilizados os seguintes [casus_bellis|lE]:\n$EFFECT_LIST_BULLET$ $duchy_conquest_cb$ \n$EFFECT_LIST_BULLET$ $individual_duchy_de_jure_cb$ \n$EFFECT_LIST_BULLET$ $imperial_reconquest_cb$ \n$EFFECT_LIST_BULLET$ $invasion_war$ \n$EFFECT_LIST_BULLET$ $clan_invasion_war$ \n$EFFECT_LIST_BULLET$ $mongol_invasion_war$ \n$EFFECT_LIST_BULLET$ $game_concept_war$ $major_religious_war$ \n$EFFECT_LIST_BULLET$ As [Concept( 'great_holy_wars', 'Grandes Guerras Santas' )|E] [great_holy_war_directed|lE]s e [great_holy_war_undirected|lE]s \n$EFFECT_LIST_BULLET$ $tribal_subjugation_cb$"
 game_concept_struggle_region: "Região de Conflito"
 game_concept_struggle_region_region: "Região"
 game_concept_struggle_region_regions: "Regiões"
 game_concept_struggle_region_desc: "Cada [struggle|lE] está vinculada a uma [region|lE] do mapa. A localização de um [character|lE] nesta $game_concept_region$ (assim como sua [culture|lE] e [faith|lE]) determinará se é classificado como [struggle_involved|lE], [struggle_interloper|lE] ou [struggle_uninvolved|lE].\n\nOs [counties|lE] de uma $game_concept_struggle_region$ costumam estar sujeitos a diferentes [county_modifiers|lE], dependendo da fase atual da [struggle_phase_phase|lE]."
 game_concept_struggle_conquest: "Conflito Armado"
 game_concept_struggle_conquest_conquest: "Conflito"
 game_concept_struggle_conquest_conquests: "Conflitos"
 game_concept_struggle_conquest_desc: "Não é incomum que os [rulers|lE] envolvidos em uma [struggle|lE] se envolvam em disputas de fronteira e pequenas querelas, que mudam conforme a natureza da [struggle_phase|lE] em curso. A disponibilidade imediata de disputas locais específicas permite aos $game_concept_rulers$ realizar pequenas tomadas de terra, conquistando ou vassalizando seus alvos.\n\nComo a $game_concept_struggle_conquest_conquests$ depende do ambiente de sua $game_concept_struggle$, seu custo em [prestige|lE] escala com a $game_concept_struggle_phase$ em curso."
 game_concept_struggle_phase_iberia_opportunity: "Fase de Oportunidade"
 game_concept_struggle_phase_iberia_opportunity_desc: "Após um longo período de coexistência relativamente pacífica durante a [struggle_phase_iberia_conciliation|lE], a complacência começa a se instalar. Tanto o campesinato quanto a nobreza se sentem à vontade com o fato de que as coisas simplesmente #EMP funcionam#!, o que permite aos [characters|lE] mais astutos se aproveitarem da ingenuidade geral.\n\nPor fim, os novos abusos provocarão uma escalada para a [struggle_phase_iberia_hostility|lE] ou então uma política astuta chegará a um equilíbrio incômodo durante a [struggle_phase_iberia_conciliation|lE]."
 game_concept_struggle_phase_iberia_hostility: "Fase de Hostilidade"
 game_concept_struggle_phase_iberia_hostility_desc: "As tensões disparam e os ânimos se exaltam nesta $game_concept_struggle_phase_phase$. Os repetidos atos de malícia e os crescentes mal-entendidos durante a [struggle_phase_iberia_opportunity|lE] fizeram aumentar o ódio contra [characters|lE] com diferentes [cultures|lE], [faiths|lE] ou, #EMP pior ainda#!, ambas as coisas.\n\nNo entanto, esse derramamento de sangue não pode durar para sempre. Ao final, cabeças mais frias ou o simples esgotamento levarão a Península ao [struggle_phase_iberia_compromise|lE]."
 game_concept_struggle_phase_iberia_compromise: "Fase de Compromisso"
 game_concept_struggle_phase_iberia_compromise_desc: "Seja por meio do cansaço com a luta da [struggle_phase_iberia_hostility|lE] ou da escalada habilidosa durante a [struggle_phase_iberia_conciliation|lE], a $game_concept_struggle_phase_iberia_compromise$ representa uma crescente acomodação entre os povos da Península Ibérica. Diferenças são deixadas de lado e a história e o patrimônio compartilhados unem antigos inimigos.\n\nA península está em uma encruzilhada: se os conflitos reaparecerem, então a [struggle_phase_iberia_opportunity|lE] aguarda."
 game_concept_struggle_phase_iberia_conciliation: "Fase de Conciliação"
 game_concept_struggle_phase_iberia_conciliation_desc: "Produto de um [struggle_phase_iberia_compromise|lE] notável. Durante esta $game_concept_struggle_phase_phase$, as relações entre os povos da Península se tornam tão cordiais que os de fora têm dificuldade em entender sua permissividade. Os [marriages|lE] [Concept( 'faith', 'inter-religiosos' )|E] são especialmente comuns.\n\nMas isso não pode durar para sempre, e os abusos de confiança acabarão trazendo a [iberian_struggle|lE] de volta ao [struggle_phase_iberia_compromise|lE]."
 game_concept_struggle_involved_faith: "Fé Envolvida"
 game_concept_struggle_involved_faiths: "Fés Envolvidas"
 game_concept_struggle_involved_faith_desc: "Algumas [faiths|lE] começam [Concept( 'struggle_involved', 'envolvidas' )|E] na [struggle|lE]. Outras podem se envolver devido a mudanças nas circunstâncias."
 game_concept_struggle_involved_culture: "Cultura Envolvida"
 game_concept_struggle_involved_cultures: "Culturas Envolvidas"
 game_concept_struggle_involved_culture_desc: "Algumas [cultures|lE] começam [Concept( 'struggle_involved', 'envolvidas' )|E] na [struggle|lE]. Outras podem se envolver devido a mudanças nas circunstâncias."
 game_concept_dissolution_faction: "Facção da Dissolução"
 game_concept_dissolution_factions: "Facções da Dissolução"
 game_concept_faction_dissolution: "Dissolução"
 game_concept_dissolution_faction_dissolved: "Dissolvida"
 game_concept_dissolution_faction_desc: "Uma [dissolution_faction|lE] busca destruir o [realm|lE] de seu [liege|lE]. Se for bem-sucedida, todos os vassalos do reino se tornarão [Concept( 'independent', 'independentes' )|E] e seu senhor perderá seu [primary_title|lE]."
 game_concept_improve_city_province_decision: "Decisão de $improve_city_province_decision_name$"
 game_concept_improve_city_province_decision_desc: "Uma [decision|lE] que permite aumentar o número de [buildings|lE] disponíveis em uma [city_holding|lE]."
 game_concept_border_raid: "Invasão de Fronteira"
 game_concept_border_raids: "Invasões de Fronteira"
 game_concept_border_raiding: "Invasão de Fronteira"
 game_concept_border_raid_desc: "É um tipo especial de [war|lE] disponível entre [rulers|lE] [Concept( 'struggle_involved', 'envolvidos' )|E] na [struggle|lE] ibérica, em que o atacante busca [Concept( 'siege', 'sitiar' )|E] um [county|lE] fronteiriço do seu [realm|lE].\n\nO [war_leader|lE] ganha ouro por capturar o [war_target|lE], que perderá [development|lE] e [control|lE]. Também poderão ser destruídos [buildings|lE], gerando mais [gold|lE], com a chance aumentando conforme o [development|lE] e o tamanho do [army|lE] [Concept( 'siege', 'sitiador' )|E].\n\nO atacante ganhará rapidamente [war_score|lE] ao [Concept( 'occupying', 'ocupar' )|lE] o [war_target|lE]."
 game_concept_bargain_fealty: "Negociação de Vassalagem"
 game_concept_bargained_fealty: "Vassalagem Negociada"
 game_concept_bargain_fealty_desc: "Esta [interaction|lE] especial está disponível para [rulers|lE] [Concept( 'struggle_involved', 'envolvidos' )|E] que se encontram em uma [war|lE] defensiva.\n\nO [war_leader|lE] pede a um [ruler|lE] vizinho de maior [rank|lE] que se junte à sua guerra em troca de se tornar seu [vassal|lE]."
 game_concept_contract_assistance: "Assistência Militar"
 game_concept_contract_assisting: "Prestando Assistência Militar"
 game_concept_contract_assistance_desc: "É um tipo especial de [interaction|lE] disponível para [rulers|lE] [Concept( 'struggle_involved', 'envolvidos' )|E] na [struggle|lE] ibérica, que lhes permite unir-se às [wars|lE] de outros [rulers|lE] [Concept( 'struggle_involved', 'envolvidos' )|E] em troca de [gold|lE].\n\nO pagamento será feito ao final da [war|lE], seja qual for o resultado, desde que o contratado faça uma [war_contribution|lE] de pelo menos 100."
 game_concept_iberian_reclamation: "Recuperação Ibérica"
 game_concept_iberian_reclaiming: "Recuperação Ibérica"
 game_concept_iberian_reclamations: "Recuperações Ibéricas"
 game_concept_iberian_reclamation_desc: "É um tipo especial de [war|lE] disponível entre [rulers|lE] [Concept( 'struggle_involved', 'envolvidos' )|E] na [iberian_struggle|lE].\n\nO atacante pretende conquistar um [duchy|lE] que contenha [counties|lE] [Concept( 'struggle_involved', 'envolvidos' )|E] em mãos de um [ruler|lE] [struggle_interloper|lE] ou [struggle_uninvolved|lE], ou [Concept( 'vassalize', 'vassalizá-los' )|E] se não possuírem terras fora desse ducado."
 game_concept_enforce_truce: "Forçar Trégua"
 game_concept_enforced_truce: "Trégua Forçada"
 game_concept_enforce_truce_desc: "É um tipo especial de [interaction|lE] disponível para [rulers|lE] [Concept( 'struggle_involved', 'envolvidos' )|E] que põe fim a uma [war|lE] com uma [white_peace|lE] e estabelece [truces|lE].\n\nSó pode ser usado para pôr fim a guerras entre outros [rulers|lE] [Concept( 'struggle_involved', 'envolvidos' )|E] de [rank|lE] menor, em que ao menos um lado seja [independent|lE] ou parte do mesmo [realm|lE]."
 game_concept_incite_revolts_interaction: "Instigar Revolta"
 game_concept_incite_revolts_interaction_desc: "Permite investir [gold_i][gold|lE] para motivar a [peasant_faction|lE] em outro [realm|lE], se ela tiver [counties|lE] com [county_opinion|lE] negativa."
 game_concept_secure_iberian_foothold_decision: "$secure_iberian_foothold_decision_title$"
 game_concept_secure_iberian_foothold_decision_desc: "Uma [decision|lE] que permite a um [ruler|lE] não [struggle_involved|lE] pôr fim à [iberian_struggle|lE]."
 game_concept_golden_age_jewish_science_in_iberia_decision: "$golden_age_jewish_science_in_iberia_decision$"
 game_concept_golden_age_jewish_science_in_iberia_decision_desc: "Uma [decision|lE] em que você patrocina estudiosos judeus locais e colhe os benefícios."
 game_concept_build_holy_pilgrim_roads_decision: "$build_holy_pilgrim_roads_decision$"
 game_concept_build_holy_pilgrim_roads_decision_desc: "Uma [decision|lE] em que você constrói estradas para facilitar a vida dos peregrinos."
 game_concept_purchase_truce_interaction: "$purchase_truce_interaction$"
 game_concept_purchase_truce_interaction_desc: "Uma [interaction|lE] que permite comprar [truces|lE] preventivamente em troca de [gold_i][gold|lE]."
