 fp2_other_decisions.1100.t: "O Reino de Toledo"
 fp2_other_decisions.1100.desc: "Com a força da minha posição além de qualquer dúvida, por fim aconteceu a coroação em [GetTitleByKey('c_toledo').GetNameNoTier] , conforme havia sido planejada.\n\nJá é hora de que nós, os [ROOT.Char.GetFaith.GetAdherentNamePlural] forjemos nosso próprio domínio, distinto das insignificantes taifas e dos domínios do norte. Um reino que rivalize com o antigo reino visigodo!"
 fp2_other_decisions.1100.a: "Que nosso reino prospere por muito tempo."
 fp2_other_decisions.1101.desc: "Em seu afã de superação, [toledo_former.GetTitledFirstName|l] foi formalmente coroado em [GetTitleByKey('c_toledo').GetNameNoTier].\n\nA força deste novo reino [toledo_former.GetFaith.GetAdherentName], que incorpora as terras dos antigos domínios ibéricos, já está fora de dúvida.\n\n"
 fp2_other_decisions.1101.stolen: "Esses intrusos vexatórios terão que ser lidados mais cedo ou mais tarde!"
 fp2_other_decisions.1101.mozarab: "Embora isso seja promissor para nossa fé, pode ser uma espada de dois gumes..."
 fp2_other_decisions.1101.a: "Eles não durarão muito!"
 fp2_other_decisions.1101.b: "Algo para ficar de olho."
 fp2_other_decisions.1101.c: "Interessante."
 fp2_form_kingdom_toledo_modifier: "$fp2_other_decisions.1100.t$"
 fp2_form_kingdom_toledo_modifier_desc: "Este personagem estabeleceu um novo reino centrado na antiga capital visigoda."
