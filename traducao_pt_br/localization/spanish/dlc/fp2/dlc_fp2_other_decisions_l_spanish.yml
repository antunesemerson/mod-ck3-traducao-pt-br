 found_kingdom_toledo_decision_title: "Estabelecer Reino de Toledo"
 found_kingdom_toledo_decision_desc: "Desde a queda do reino visigodo nas mãos dos mouros, [GetTitleByKey('c_toledo').GetNameNoTier] foi relegada. Como capital de um novo senhorio [ROOT.Char.GetFaith.GetAdherentName] , voltará a ser sede de reis."
