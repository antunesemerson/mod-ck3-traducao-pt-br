l_spanish:
 improve_city_province_decision: "$improve_city_province_decision_name$"
 improve_city_province_decision_name: "Expandir Cidades"
 improve_city_province_decision_desc: "Pague para construir novas áreas extravagantes em sua cidade"
 improve_city_province_decision_confirm: "Iniciar a expansão"
 improve_city_province_decision_tooltip: "Investir dinheiro para obter novos espaços de [building|lE] em suas [cities|lE]"
 improve_city_province_decision_decision_no_effect: "Nenhuma [city|lE] é elegível"
 improve_city_province_decision_at_least_one_city_tt: "Pelo menos uma cidade tem menos de 5 espaços de construção"
 fp2_secure_mediterranean.t: "Segurar o Mediterrâneo"
 fp2_secure_mediterranean.desc: "Com ilhas-chave em todo o Mediterrâneo seguras e atuando como torres de vigia do mar, é hora de reivindicar a propriedade das ondas."
 fp2_secure_mediterranean.tip: "Reivindique a propriedade do Mediterrâneo"
 secure_iberian_foothold_decision_title: "Base Ibérica"
 secure_iberian_foothold_decision_desc: "Os estados em guerra enfraquecidos da Ibéria abriram as portas da península para estrangeiros. Se alguém pudesse se declarar o novo líder [ROOT.Char.GetFaith.GetReligion.GetAdjectiveNoTooltip] da região, ou simplesmente um invasor glorioso, muito poderia ser ganho."
 secure_iberian_foothold_decision_tooltip: "Integrar parte da Ibéria"
 secure_iberian_foothold_decision_confirm: "Ao mais forte."
 fp2_struggle_uninvolved_or_external_tt: "Seu [capital|lE] está fora da [region|lE] de [GetGeographicalRegion('world_europe_west_iberia').GetName]."
 fp2_struggle_secure_iberian_foothold_empire_tt: "[Concept( 'hold', 'Poseer' )|E] um [title|lE] de [empire|lE] diferente de [GetTitleByKey('e_spain').GetNameNoTier]"
 fp2_struggle_phase_hostility_or_opportunity_tt: "A [struggle_phase|lE] Ibérica é [struggle_phase_iberia_hostility|lE] ou [struggle_phase_iberia_opportunity|lE] (Atual: [GetStruggle('iberian_struggle').GetCurrentPhase.GetName])"
 fp2_struggle_secure_iberian_foothold_kingdom_iberian_tt: "[Concept( 'hold', 'Posees' )|E] e [Concept( 'completely_control', 'controlas totalmente' )|E] um [kingdom|lE] [de_jure|lE] em [GetTitleByKey('e_spain').GetNameNoTier]"
 fp2_struggle_secure_iberian_foothold_kingdom_faith_tt: "Pelo menos #Z [SCOPE.ScriptValue('fp2_struggle_secure_iberian_foothold_faith_target_percent_value')|0] %#! dos [counties|lE] [de_jure|lE] deste [title|lE] são [THIS.Char.GetFaith.GetAdherentNamePlural]"
 fp2_struggle_secure_iberian_foothold_kingdom_border_tt: "Este [title|lE] faz fronteira com um [kingdom|lE] [de_jure|lE] reino de jure de um [empire|lE] que você possui[Concept( 'hold', 'posees' )|E], que não faz parte de [GetTitleByKey('e_spain').GetNameNoTier]"
 fp2_struggle_secure_iberian_foothold_kingdom_held_tt: "Você segura este [title|lE] há pelo menos [SCOPE.ScriptValue('fp2_struggle_secure_iberian_foothold_years_value')|0Z] anos"
 fp2_struggle_secure_iberian_foothold_religion_tt: "[Concept( 'hold', 'Poseer' )|E] como mínimo um #Z [SCOPE.ScriptValue('fp2_struggle_secure_iberian_foothold_religion_target_percent_value')|0] %#! dos [counties|lE] de [faith|lE] [THIS.Char.GetFaith.GetReligion.GetAdjective] na [region|lE] de [GetGeographicalRegion('world_europe_west_iberia').GetName] (Atual: [SCOPE.ScriptValue('fp2_struggle_secure_iberian_foothold_religion_percent_value')|1] %)\n"
 fp2_struggle_secure_iberian_foothold_outsider_tt: "[Concept( 'hold', 'Poseer' )|E] pelo menos #Z [SCOPE.ScriptValue('fp2_struggle_secure_iberian_foothold_outsider_target_percent_value')|0] %#! dos [counties|lE] na [region|lE] de [GetGeographicalRegion('world_europe_west_iberia').GetName] (Atualmente: [SCOPE.ScriptValue('fp2_struggle_secure_iberian_foothold_outsider_percent_value')|0] %)\n"
 fp2_struggle_secure_iberian_foothold_empire_held_effect_tt: "Cada [kingdom|lE] [de_jure|lE] de [GetTitleByKey('e_spain').GetNameNoTier] que satisfaça as condições abaixo se tornará parte [de_jure|lE] de [THIS.Char.GetPrimaryTitle.GetNameNoTier]"
 fp2_struggle_secure_iberian_foothold_empire_dejure_effect_tt: "Cada [kingdom|lE] [de_jure|lE] de [GetTitleByKey('e_spain').GetNameNoTier] que atenda às condições abaixo se tornará uma parte [de_jure|lE] do [empire|lE] de [THIS.Char.GetPrimaryTitle.GetDeJureLiege.GetNameNoTier]"
 fp2_struggle_secure_iberian_foothold_ends_the_struggle_tt: "O [iberian_struggle|lE] termina"
 iberian_footholder_transfer_tt: "[THIS] transfere [THIS.Title.GetName] para [THIS.GetName]"
 fp2_other_decisions.1000.t: "$secure_iberian_foothold_decision_title$: Consolidação [iberian_footholder.GetPrimaryTitle.GetAdjectiveNoTooltip]"
 fp2_other_decisions.1000.involved_religion: "As guerras dos principados conturbados da Ibéria quase puseram de joelhos os reinos de fé [ROOT.Char.GetFaith.GetReligion.GetAdjective] da região.\n\nSem a nossa intervenção, os fiéis de [ROOT.Char.GetFaith.HighGodName] teriam acabado expulsos da península pelos ímpios imperiosos.\n\n"
 fp2_other_decisions.1000.desc: "As fé e os povos divididos da Península Ibérica nos deram uma grande oportunidade, ocupados demais lutando uns contra os outros para se opor à invasão [ROOT.Char.GetFaith.GetReligion.GetAdjective] na península."
 fp2_other_decisions.1000.involved_faith: "Somos os defensores legítimos dos [ROOT.Char.GetFaith.GetAdherentNamePlural] do oeste, agora seguros sob a proteção de [ROOT.Char.GetPrimaryTitle.GetDefinitiveName]."
 fp2_other_decisions.1000.uninvolved_faith: "Cabe a nós trazer a luz de [ROOT.Char.GetFaith.GetName|l]; como parte de [ROOT.Char.GetPrimaryTitle.GetDefinitiveName], essas terras serão prósperas e pacíficas mais uma vez."
 fp2_other_decisions.1000.closing: "\n\nCom o tempo, verão que a era de seus falsos deuses havia terminado e se alegrarão de que [ROOT.Char.GetFaith.HighGodName] tivesse conduzido [ROOT.Char.GetPrimaryTitle.GetDefinitiveName] à salvação da região."
 fp2_other_decisions.1000.a: "Era necessário sangue novo na Península Ibérica."
 fp2_other_decisions.1001.involved_religion: "Após séculos de guerra na Ibéria entre cristãos e mouros, nossa luta foi agora explorada pelos intrusos imponentes [iberian_footholder.GetPrimaryTitle.GetAdjective].\n\n"
 fp2_other_decisions.1001.desc: "Através da distração, inveja e negligência, permitimos que os intrometidos imperiosos [iberian_footholder.GetPrimaryTitle.GetAdjective] explorassem a divisão de nossa terra natal e invadissem os reinos históricos da península."
 fp2_other_decisions.1001.involved_faith: "[iberian_footholder.GetTitledFirstName] se declarou líder legítim[iberian_footholder.Custom('ES_OA')] do povo [iberian_footholder.GetFaith.GetAdherentNameNoTooltip] na Península, usando suas vitórias como prova de sua legitimidade sobre os enfraquecidos reinos da fé [iberian_footholder.GetFaith.GetReligion.GetAdjective] de Iberia."
 fp2_other_decisions.1001.same_uninvolved_faith: "Afirma que nossos fracassos foram o castigo [ROOT.Char.GetFaith.HighGodNamePossessive] por nos desviarmos do justo caminho de [iberian_footholder.GetFaith.GetName|l] e que [iberian_footholder.GetTitledFirstName|l] é líder legítim[iberian_footholder.Custom('ES_OA')] da Ibéria [ROOT.Char.GetFaith.GetReligion.GetAdjective]…"
 fp2_other_decisions.1001.uninvolved_faith: "Com suas vitórias como prova, [iberian_footholder.GetTitledFirstName|l] declarou que sua fé é o verdadeiro caminho [iberian_footholder.GetFaith.GetAdherentName], aquele que unirá toda a Península sob [iberian_footholder.GetFaith.HighGodName]."
 fp2_other_decisions.1001.closing: "\n\nEnquanto [iberian_footholder.GetTitledFirstName|l] consolida suas posses, as antigas diferenças entre muçulmanos e cristãos parecem empalidecer em comparação com esta ocupação [iberian_footholder.GetFaith.GetAdjective]…"
 fp2_other_decisions.1001.a: "Malditos intrometidos."
 ### Council of Toledo Decision
 council_of_toledo_decision_title: "Convocar o Conselho de Toledo"
 council_of_toledo_decision_desc_count: "Chegou a hora de convocar o [SCOPE.ScriptValue('council_of_toledo_counter_value')][ROOT.Char.Custom('get_council_of_toledo_count_suffix')] Conselho de [GetTitleByKey('c_toledo').GetNameNoTier], e resolver as questões religiosas dos [ROOT.Char.GetFaith.GetAdherentNamePlural] mais uma vez."
 council_of_toledo_decision_desc: "Por séculos, conselhos religiosos foram realizados em [GetTitleByKey('c_toledo').GetNameNoTier], onde o clero de toda a cristandade resolveu as disputas do dia. Ao realizar um 19º conselho, essa tradição visigótica pode ser restaurada."
 council_of_toledo_decision_tooltip: "Realizar um encontro de clérigos [ROOT.Char.GetFaith.GetReligion.GetAdherentNamePlural] em Toledo"
 council_of_toledo_decision_confirm: "Chegou a hora."
 council_of_toledo_decision_toledo_holder_trigger: "[Concept( 'hold', 'Poseer' )|E] ou governa sobre [GetTitleByKey('c_toledo').GetName] e seu [ruler|lE] pratica a [THIS.Char.GetFaith.GetName|l]."
 council_of_toledo_decision_toledo_faith_trigger: "A [faith|lE] é a [THIS.Char.GetLiege.GetFaith.GetName|l]"
 council_of_toledo_decision_catalyst_tt: "Um [struggle_catalyst|lE] pode ocorrer"
 council_of_toledo_decision_tt: "As recompensas dependem do resultado do Conselho"
 #Event - Organization
 fp2_other_decisions.0700.council: "[SCOPE.ScriptValue('council_of_toledo_counter_value')][ROOT.Char.Custom('get_council_of_toledo_count_suffix')] Conselho de Toledo"
 fp2_other_decisions.0700.t: "$fp2_other_decisions.0700.council$: Organização"
 fp2_other_decisions.0700.19: "[council_priest.GetTitledFirstName] iniciou os preparativos para o décimo nono concílio religioso em [GetTitleByKey('c_toledo').GetNameNoTier], em imitação aos antigos sínodos visigodos.\n\nEmbora o alcance do [GetTitleByKey('k_papal_state').GetDefinitiveName] tenha crescido desde a invasão moura, nosso clero ainda mantém sua própria tradição e autonomia. É hora de reafirmar a importância da Ibéria como local de diálogo religioso.\n\nAs reuniões anteriores incluíram [ROOT.Char.GetFaith.BishopNeuterPlural] de toda a cristandade, mas isso já não precisa mais ser assim…"
 fp2_other_decisions.0700.desc: "Os [ROOT.Char.GetFaith.BishopNeuterPlural] da Ibéria têm aguardado ansiosamente o próximo concílio desde que a tradição de Toledo foi revivida.\n\nMeu [council_priest.GetCouncilTitleFirstName] iniciou os preparativos, embora ainda reste decidir se sacerdotes de outras tradições serão convidados a comparecer."
 fp2_other_decisions.0700.a: "Será um sínodo moçárabe."
 fp2_other_decisions.0700.b: "Todos os ministros de [ROOT.Char.GetFaith.HighGodNamePossessive] são bem-vindos em Toledo."
 fp2_other_decisions.0700.b.success: "Bispos ecumênicos comparecem"
 fp2_other_decisions.0700.b.failure: "O chamado para Toledo é ignorado"
 fp2_other_decisions.0700.tt: "O [SCOPE.ScriptValue('council_of_toledo_counter_value')][THIS.Char.Custom('get_council_of_toledo_count_suffix')] Concílio de Toledo começará em algumas semanas."
 #Event - Arrival
 fp2_other_decisions.0701.t: "$fp2_other_decisions.0700.council$: Participantes"
 fp2_other_decisions.0701.opening.success: "Parece que o convite mais amplo aos [ROOT.Char.GetFaith.AltPriestTermPlural] [ROOT.Char.GetFaith.GetAdherentNamePlural] foi recebido positivamente; muitos [ROOT.Char.GetFaith.BishopNeuterPlural] estimados de terras estrangeiras afluíram ansiosamente a [GetTitleByKey('c_toledo').GetNameNoTier]."
 fp2_other_decisions.0701.opening.failure: "A resposta ao nosso convite para a comunidade ecumênica foi fria; inúmeros [ROOT.Char.GetFaith.BishopNeuterPlural] citaram más condições climáticas que os impediram de chegar a [GetTitleByKey('c_toledo').GetNameNoTier], deixando apenas prelados locais presentes."
 fp2_other_decisions.0701.opening.catastrophe: "Não vimos um único bispo, diácono ou abade de qualquer outra denominação [ROOT.Char.GetFaith.GetReligion.GetAdjective] em [GetTitleByKey('c_toledo').GetNameNoTier]; parece que nosso concílio é visto com desprezo ou raiva por nossa fraternidade ecumênica, e apenas prelados locais estão presentes."
 fp2_other_decisions.0701.opening: "Os grandes e os nobres se reuniram em [GetTitleByKey('c_toledo').GetNameNoTier] representando todas as sedes e abadias dos [ROOT.Char.GetFaith.GetAdherentName]."
 fp2_other_decisions.0701.religious_head_bishop: "\n\nEntre os prelados menores está [portrait_bishop.GetTitledFirstName|l] , [portrait_bishop.Custom('get_council_of_toledo_attendee_description')] , chefe da igreja [portrait_bishop.GetFaith.GetAdjective]."
 fp2_other_decisions.0701.powerful_bishop: "\n\nTalvez o mais notável entre eles seja [portrait_bishop.GetTitledFirstName|l] , [portrait_bishop.Custom('get_council_of_toledo_attendee_description')] , um[portrait_bishop.Custom('ES_XA')] prelad[portrait_bishop.Custom('ES_OA')] de grande influência na fé [portrait_bishop.GetFaith.GetAdjective] ."
 fp2_other_decisions.0701.saint_bishop: "\n\nOs presentes têm a bênção de contar entre eles com [portrait_bishop.GetFirstName] , [portrait_bishop.Custom('get_council_of_toledo_attendee_description')] , um[portrait_bishop.Custom('ES_XA')] santo[portrait_bishop.Custom('ES_OA')] para os [portrait_bishop.GetFaith.GetAdherentNamePlural]"
 fp2_other_decisions.0701.theologian_bishop: "\n\nÉ notável entre eles [portrait_bishop.GetFirstName]; [portrait_bishop.Custom('get_council_of_toledo_attendee_description')]; um[portrait_bishop.Custom('ES_XA')] teólog[portrait_bishop.Custom('ES_OA')] respeitad[portrait_bishop.Custom('ES_OA')] entre os [portrait_bishop.GetFaith.GetAdherentName]."
 fp2_other_decisions.0701.bad_bishop: "\n\nUm[portrait_bishop.Custom('ES_XA')] d[portrait_bishop.Custom('ES_LoLa')]s mais conhecid[portrait_bishop.Custom('ES_OA')]s é [portrait_bishop.Custom('get_council_of_toledo_attendee_description')], cuja impiedade é alvo de piadas por toda a Cristandade."
 fp2_other_decisions.0701.senior_bishop: "\n\nO mais importante entre todos os clérigos é [portrait_bishop.GetFirstName]. [portrait_bishop.Custom('get_council_of_toledo_attendee_description')]; venerável [portrait_bishop.Custom('ES_XA')] [portrait_bishop.GetWomanMan] de fé."
 fp2_other_decisions.0701.failure: "\n\nOs mercadores da cidade murada estão decepcionados com a baixa presença, pois haviam se preparado para a visita de um grande número de clérigos. Uma pena."
 fp2_other_decisions.0701.desc: "\n\nA cidade murada já está colhendo os benefícios dos clérigos visitantes, cujo comércio e hospitalidade são procurados pelos mercadores."
 fp2_other_decisions.0701.a: "Excelente."
 fp2_other_decisions.0701.b: "A arrogância vem antes da queda..."
 fp2_other_decisions.0701.c: "Bom."
 fp2_other_decisions.0701.tt: "O [SCOPE.ScriptValue('council_of_toledo_counter_value')][THIS.Char.Custom('get_council_of_toledo_count_suffix')] Concílio de Toledo começa"
 #Event - Debate
 fp2_other_decisions.0702.t: "$fp2_other_decisions.0700.council$: Debate"
 fp2_other_decisions.0702.19: "Séculos após o último concílio do arcebispo Gunderico sob o rei Witiza, tal [council_priest.GetCouncilTitleFirstName] restaurou nossa tradição ao abrir o 19º encontro no histórico [GetTitleByKey('c_toledo').GetNameNoTier].\n\n"
 fp2_other_decisions.0702.opening: "Outro concílio começou em [GetTitleByKey('c_toledo').GetNameNoTier], desta vez inaugurado por [council_priest.GetCouncilTitleFirstName].\n\n"
 fp2_other_decisions.0702.present: "\n\nAo final da semana, ficou rapidamente claro que [debate_bishop.GetTitledFirstName|l] de [debate_bishop.GetTopLiege.GetPrimaryTitle.GetNameNoTierNoTooltip] contava com a atenção do concílio sobre este assunto, $fp2_other_decisions.0702.closing$"
 fp2_other_decisions.0702.second_hand: "\n\nÀ medida que as conversas se aproximam do fim, fica claro que se vê [debate_bishop.Custom('ES_AlAla')] [debate_bishop.GetTitledFirstName|l] de [debate_bishop.GetTopLiege.GetPrimaryTitle.GetNameNoTierNoTooltip] como líder dessa opinião, $fp2_other_decisions.0702.closing$"
 fp2_other_decisions.0702.conversion: "Um tema dominante que surgiu foi que a conversão de hereges e infiéis é a única maneira de garantir a paz e proteger os [ROOT.Char.GetFaith.GetAdherentNamePlural] rapidamente."
 fp2_other_decisions.0702.reform: "O tema principal foi que os [ROOT.Char.GetFaith.GetAdherentNamePlural] não devem ter medo de grandes reformas, agora que a posição da igreja ibérica está segura."
 fp2_other_decisions.0702.tolerance: "O tema dominante foi que os [ROOT.Char.GetFaith.GetAdherentNamePlural] devem ser mais tolerantes com infiéis pacíficos, uma ideia que rapidamente se tornou o foco das discussões."
 fp2_other_decisions.0702.rights: "O tema principal foi a preocupação em salvaguardar os antigos direitos do clero [ROOT.Char.GetFaith.GetAdherentName] e a reparação das igrejas."
 fp2_other_decisions.0702.hof: "Surpreendentemente, a sensação de que os [ROOT.Char.GetFaith.GetAdherentNamePlural] precisavam de seu próprio líder espiritual foi a maior preocupação de muitos de nossos bispos."
 fp2_other_decisions.0702.pope: "Um clima de colaboração surgiu, com muitos bispos argumentando por mais cooperação entre os [ROOT.Char.GetFaith.GetAdherentNamePlural] e seus irmãos ecumênicos."
 fp2_other_decisions.0702.heresy: "Uma energia urgente tomou conta das discussões, à medida que a ameaça representada pelos [heretic_faith.GetAdherentNamePlural], hereges como os Priscilianos e Arianos do passado, foi abordada."
 fp2_other_decisions.0702.closing: "embora [counter_bishop.GetTitledFirstName|U] de [counter_bishop.GetTopLiege.GetPrimaryTitle.GetNameNoTierNoTooltip] tenha refutado com ainda mais vigor seus argumentos."
 fp2_other_decisions.0702.a: "Eu não poderia concordar mais."
 fp2_other_decisions.0702.b.hof: "Não é a vontade de [ROOT.Char.GetFaith.HighGodNamePossessive]."
 fp2_other_decisions.0702.b: "Será silenciado[debate_bishop.Custom('ES_OA')] aos gritos."
 council_of_toledo_ruler_effect_tt: "Todo [ruler|lE] [council_toledo_faith.GetAdherentName]"
 #Event - Invalidated
 fp2_other_decisions.0703.t: "$fp2_other_decisions.0700.council$: Adiado"
 fp2_other_decisions.0703.war: "Com o início da guerra, [council_priest.GetCouncilTitleFirstName|l] adiou o próximo Conselho de Toledo por enquanto."
 fp2_other_decisions.0703.control: "Com a perda de [GetTitleByKey('c_toledo').GetNameNoTier], não será mais possível sediar o próximo Conselho de Toledo..."
 fp2_other_decisions.0703.desc: "\n\nSem dúvida os [ROOT.Char.GetFaith.GetAdherentNamePlural] logo se recuperarão deste revés…"
 fp2_other_decisions.0703.a: "Decepcionante."
 #Event - Ping
 fp2_other_decisions.0704.t: "$fp2_other_decisions.0700.council$"
 fp2_other_decisions.0704.success: "\n\nCom o apoio [council_toledo_host.Custom('ES_DelDela')] [council_toledo_host.GetTitledFirstName|l], o clero [ROOT.Char.GetFaith.GetAdherentName] fez sua voz ser ouvida."
 fp2_other_decisions.0704.failure: "No entanto, parece que [council_toledo_host.GetTitledFirstName|l] tinha outras ideias e lutou vigorosamente contra essas aberturas."
 fp2_other_decisions.0704.a: "Interessante."
 #Custom Loc
 council_toledo_landed_desc: "[ROOT.Char.GetTitleAsNameNoTooltip] de [ROOT.Char.GetPrimaryTitle.GetNameNoTier]"
 council_toledo_unlanded_desc: "Arcebispo de [ROOT.Char.GetLiege.GetPrimaryTitle.GetNameNoTier]"
 #Tooltips
 fp2_council_culture_tt: "As [cultures|lE] ibéricas ganham #positive_value [SCOPE.ScriptValue('council_toledo_culture_acceptance_value')|0]#! [cultural_acceptance|lE] da [THIS.Char.GetCulture.GetName]"
 fp2_council_opinion_mozarabic_effect_tt: "Cada participante moçárabe"
 fp2_council_opinion_other_effect_tt: "Cada participante não moçárabe"
 fp2_council_conversion_modifier_tt: "A conversão da fé no condado progredirá mais rapidamente contra outras [religions|lE] enquanto este modificador estiver presente"
 fp2_council_heresies_modifier_tt: "Converter a Fé no Condado avançará mais rápido contra [faiths|lE] de mesma [religion|lE] com um [head_of_faith|lE] enquanto este modificador estiver presente"
 excluded_from_council_toledo_tt: "Todos os outros [head_of_faith|lE] [THIS.Char.GetFaith.GetReligion.GetAdjective] em [diplomatic_range|lE]"
 fp2_council_end_tt: "O [SCOPE.ScriptValue('council_of_toledo_counter_value')][THIS.Char.Custom('get_council_of_toledo_count_suffix')] Conselho de Toledo termina"
 #Modifiers
 fp2_small_council_modifier: "Conselho de Toledo"
 fp2_small_council_modifier_desc: "Um conselho local de prelados foi realizado em Toledo, trazendo prosperidade para a cidade."
 fp2_big_council_modifier: "$fp2_small_council_modifier$"
 fp2_big_council_modifier_desc: "Um grande conselho de prelados foi realizado em Toledo, trazendo grande prosperidade para a cidade."
 fp2_disappointing_council_modifier: "$fp2_small_council_modifier$"
 fp2_disappointing_council_modifier_desc: "Um conselho de prelados com pouca participação foi realizado em Toledo, custando aos comerciantes da cidade."
 fp2_stifled_council_modifier: "Conselho Abafado"
 fp2_stifled_council_modifier_desc: "Contradizer um conselho religioso tornou esse personagem impopular entre o clero."
 fp2_council_conversion_modifier: "Conselho de Conversão"
 fp2_council_conversion_modifier_desc: "O último Conselho de Toledo encorajou a conversão de infiéis em reinos moçárabes."
 fp2_council_tolerance_modifier: "Conselho de Tolerância"
 fp2_council_tolerance_modifier_desc: "O último Conselho de Toledo encorajou a tolerância entre as religiões da Ibéria."
 fp2_council_reform_modifier: "Conselho de Reforma"
 fp2_council_reform_modifier_desc: "O último Conselho de Toledo encorajou a reforma da igreja moçárabe diante de seu novo poder."
 fp2_council_rights_modifier: "Conselho dos Direitos"
 fp2_council_rights_modifier_desc: "O último Conselho de Toledo encorajou a proteção dos direitos clericais e a reparação das igrejas."
 fp2_council_hof_modifier: "Conselho de Liderança"
 fp2_council_hof_modifier_desc: "O último Conselho de Toledo encorajou os moçárabes a nomearem seu próprio líder da fé."
 fp2_council_pope_modifier: "Conselho de Cooperação"
