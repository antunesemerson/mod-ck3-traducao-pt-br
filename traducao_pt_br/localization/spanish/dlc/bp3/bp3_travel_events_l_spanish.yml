l_spanish:
 travel_events_bp3.1.t: "As Estações da Mudança"
 travel_events_bp3.1.desc: "Enquanto nos preparamos para partir pela manhã, vejo meu [ROOT.Char.Custom2('RelationToMeShort', friendly_character)] [friendly_character.GetFirstName] de pé fora do acampamento, sozinho. Quando vou falar com [friendly_character.GetSheHe], noto uma mudança no vento.\n\n"
 travel_events_bp3.1.desc.spring: "Uma brisa surpreendentemente quente acaricia meu rosto por um momento, uma mudança notável em relação ao clima frio que tivemos recentemente. Finalmente é primavera."
 travel_events_bp3.1.desc.summer: "Um vento quente balança minhas roupas por um segundo, e noto a luz do sol agradável brilhando sobre o acampamento. Sinais de dias mais quentes por vir."
 travel_events_bp3.1.desc.autumn: "Um refrescante vento de outono atravessa o acampamento, levantando folhas e poeira do chão. O verão ficou para trás, é hora de nos prepararmos para o frio do outono e do inverno."
 travel_events_bp3.1.desc.autumn_desert: "Um refrescante vento de outono atravessa o acampamento, levantando areia e poeira do chão. O verão ficou para trás, é hora de nos prepararmos para o frio do outono e do inverno."
 travel_events_bp3.1.desc.winter: "Aperto minhas roupas em volta de mim enquanto uma rajada de vento frio atinge minhas costas. O frio sussurra que é hora do inverno, mais uma vez."
 travel_events_bp3.1.desc.winter_snow: "Aperto minhas roupas em volta de mim enquanto uma rajada de vento frio atinge minhas costas, e vejo os primeiros sinais de neve. O frio sussurra que é hora do inverno, mais uma vez."
 travel_events_bp3.1.desc.dry_season: "Um vento seco atravessa o acampamento, deixando uma nuvem de poeira para trás. A estação seca chegou; esperamos que isso não afete muito nossa jornada."
 travel_events_bp3.1.desc.rainy_season: "Uma rajada de vento agarra minhas roupas por um segundo e começa a chover suavemente, mas as nuvens cinzentas escuras no céu gritam que uma tempestade está se formando."
 travel_events_bp3.1.a: "\"Já é hora de [ROOT.Char.Custom('GetSeason')|l] novamente, hein?\""
 travel_events_bp3.1.b: "\"Volte para o seu cavalo, [friendly_character.GetFirstNameNoTooltip].\""
 travel_events_bp3.1.b.flavor: "\"Teremos mais do que tempo suficiente para observar a paisagem enquanto viajamos para [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetName].\""
 travel_events_bp3.5.t: "Pego do Lado de Fora"
 travel_events_bp3.5.desc.snow: "Justo quando estamos prestes a partir, começa a nevar. Não consigo evitar amaldiçoar minha má sorte, mas já havia notado as nuvens se aproximando há algum tempo. E não parece que a neve vá parar tão cedo.\n\nSe quisermos chegar no prazo, precisamos partir, mas atravessar uma nevasca é, no mínimo, arriscado."
 travel_events_bp3.5.desc.rain: "Justo quando estamos prestes a partir, começa a chover intensamente. Chuva, até onde a vista alcança. Não consigo evitar amaldiçoar minha má sorte, mas já havia notado as nuvens escuras se aproximando há algum tempo.\n\nSe quisermos chegar no prazo, precisamos partir, mas será uma jornada arriscada com o tempo do jeito que está."
 travel_events_bp3.5.a: "Uma oportunidade para descansar, eu diria."
 travel_events_bp3.5.b.snow: "Um pouco de neve não fará mal a ninguém."
 travel_events_bp3.5.b.rain: "Um pouco de chuva não fará mal a ninguém."
 travel_events_bp3.5.b.tt: "Os membros do [entourage|lE] podem ganhar o [trait|lE] #color_white [GetTrait('ill').GetName(GetNullCharacter)|l]#!"
 travel_events_bp3.10.t: "Os Peregrinos para [holy_location.GetNameNoTooltip]"
 travel_events_bp3.10.desc: "Quando estávamos sentados junto à fogueira após um longo dia, um grupo de viajantes se aproxima de nós na escuridão."
 travel_events_bp3.10.desc.holy_order: "Uma comitiva de cavaleiros, liderados por [Select_CString( holy_order_character.IsFemale, 'uma mulher', 'um homem' )] de expressão orgulhosa. Cada cavaleiro parece mais rico que o anterior.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], é um prazer conhecê-lo. Sou [holy_order_character.GetName] de [grandmaster.GetPrimaryTitle.GetName]. Fizemos uma longa viagem para chegar a [holy_location.GetName] e precisamos descansar antes do último trecho. Podemos compartilhar a sua fogueira?""
 travel_events_bp3.10.desc.pilgrims: "Parece uma turma de peregrinos perdidos, liderados por [Select_CString( pilgrim_character.IsFemale, 'uma mulher maltrapilha', 'um homem maltrapilho' )]. Apesar da minha primeira impressão, percebo que todos carregam objetos valiosos de algum tipo.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], por favor, podemos descansar junto à sua fogueira? Passamos por uma longa jornada...""
 travel_events_bp3.10.a: "\"Venham, venham! Aproveitem nossa fogueira e nos contem sobre suas viagens!\""
 travel_events_bp3.10.b: "\"Podemos viajar para [holy_location.GetNameNoTooltip] juntos.\""
 travel_events_bp3.10.c.holy_order: "\"#emp Emboscada! Defendam o acampamento!#!\""
 travel_events_bp3.10.c.pilgrims: "\"Ah, eu aliviarei seus problemas...\""
 travel_events_bp3.10.c.flavor: "Ninguém notará se alguns peregrinos se perderem em sua jornada, certo?"
 travel_events_bp3.10.d: "\"Não, não há espaço para vocês aqui.\""
 holy_pilgrims_travel_modifier: "Guiando Peregrinos"
 holy_pilgrims_travel_modifier_desc: "Este séquito está protegendo um grupo de peregrinos em direção a um local sagrado."
 holy_knights_travel_modifier: "Viajando com Cavaleiros"
 holy_knights_travel_modifier_desc: "Este séquito está protegido por um grupo de valentes cavaleiros."
 travel_events_bp3.15.t: "As canções [liege.Custom('ES_DelDela')] [liege.GetTitledFirstNameNoTooltip|l]"
 travel_events_bp3.15.desc: "Enquanto percorremos as redondezas de [location.GetName], vemos de repente [Select_CString( bard_character.IsFemale, 'uma mulher', 'um homem' )] jovial ao longe. Pulando, dançando e cantando para si mesm[bard_character.Custom('ES_OA')], parece um verdadeiro personagem.\n\n"Gostariam de ouvir algumas das minhas canções sobre"
 travel_events_bp3.15.desc.murderer: "#emp \"[liege.GetFirstName], la rana tirana [liege.GetCulture.GetName]\"#!"
 travel_events_bp3.15.desc.lustful.man: "#emp \"[liege.GetFirstName], el putañero de [liege.GetPrimaryTitle.GetName]\"#!"
 travel_events_bp3.15.desc.lustful.woman: "#emp \"[liege.GetFirstName], la pelandrusca de [liege.GetPrimaryTitle.GetName]\"#!"
 travel_events_bp3.15.desc.gluttonous: "#emp \"[liege.GetFirstName], [Select_CString( liege.IsFemale, 'la cochina', 'el cerdo' )] de la corte [liege.GetCulture.GetName]\"#!"
 travel_events_bp3.15.desc.fool: "#emp "[liege.GetFirstName] [Select_CString( liege.IsFemale, 'a simplória', 'o simplório' )] do senhorio [liege.GetPrimaryTitle.GetAdjective]"#!"
 travel_events_bp3.15.desc.craven: "#emp \"[liege.GetFirstName], [liege.Custom('ES_ElLa')] [liege.GetTitleAsNameNoTooltip|l] pusilánime\"#!"
 travel_events_bp3.15.desc.outro: "?!", ele grita para nós assim que chegamos perto o bastante. Antes que tenhamos tempo de responder, ele começa a cantar uma alegre melodia sobre as devassidões de [liege.Custom('ES_DelDela')] [liege.GetTitledFirstNameNoTooltip|l]."
 travel_events_bp3.15.a: "Conte-me mais sobre [liege.Custom('ES_ElLa')] [liege.GetTitleAsNameNoTooltip|l]."
 travel_events_bp3.15.a.tt: "Você pode descobrir um dos [secrets|lE] de [liege.GetFirstName]."
 travel_events_bp3.15.b: "\"Você parece uma pessoa interessante, gostaria de se juntar a mim?\"."
 travel_events_bp3.15.c: "Cale a boca, vil camponês[bard_character.Custom('ES_OA')]!"
 travel_events_bp3.20.t: "O [SCOPE.Custom('LocalGuildsLoc')]"
 travel_events_bp3.20.desc: "Enquanto meu séquito percorre [ROOT.Char.GetCurrentLocation.GetName], acabamos conversando com um[merchant_character.Custom('ES_XA')] representante da [SCOPE.Custom('LocalGuildsLoc')] local, [Select_CString( merchant_character.IsFemale, 'uma mulher', 'um homem' )] entusiasta e carismátic[merchant_character.Custom('ES_OA')] de nome [merchant_character.GetFirstName].\n\n"De [ROOT.Char.GetPrimaryTitle.GetNameNoTier], vocês dizem? Há algum tempo estamos interessados em abrir uma oficina em [new_home_province.GetName]. Vocês não poderiam nos fazer um favor ali, poderiam?", diz enquanto pisca um olho e coloca uma moeda sobre a mesa."
 travel_events_bp3.20.a: "\"Em [new_home_province.GetNameNoTooltip]? Claro, por que não!\""
 travel_events_bp3.20.b: "\"Me entregue o dinheiro diretamente, e eu posso fazer algo funcionar...\""
 travel_events_bp3.20.b.tt: "Tenho certeza de que ninguém se importará se contornarmos algumas leis e regulamentações para fazer este acordo funcionar."
 travel_events_bp3.20.c: "\"Em vez disso, conte-me mais sobre seu negócio e sua bela cidade.\""
 travel_events_bp3.25.t: "As Duras Realidades da Guerra"
 travel_events_bp3.25.desc: "Enquanto caminhamos pelas ruas de [ROOT.Char.GetCurrentLocation.GetName], uma procissão de soldados emerge de uma rua lateral. A maioria está ferida e é ajudada por civis abatidos.\n\nUm arauto se ergue orgulhosamente diante da multidão que se reúne ao redor do mercado e proclama em voz alta: "Já esmagamos mais uma vez esses cães [opponent.GetPrimaryTitle.GetAdjective]! Só é questão de tempo até a vitória ser nossa!".\n\n"
 travel_events_bp3.25.desc.outro: "E ainda assim as palavras celebratórias empalidecem quando olho para os soldados feridos e seus familiares enlutados."
 travel_events_bp3.25.desc.outro.sadistic: "E, no entanto, não consigo deixar de dar uma risada, ao ver esses tolos que arruinaram suas vidas."
 travel_events_bp3.25.a: "Vou doar algumas moedas para esses pobres coitados."
 travel_events_bp3.25.b: "Talvez tenham alguma sabedoria para compartilhar sobre suas batalhas?"
 travel_events_bp3.25.b.insulted: "Você insulta os sobreviventes"
 travel_events_bp3.25.b.stories: "Você ouve algumas histórias sobre as batalhas"
 travel_events_bp3.25.b.martial: "Você ouve sobre os erros estratégicos [liege.GetPrimaryTitle.GetAdjectiveNoTooltip]"
 travel_events_bp3.25.b.prowess: "Você fica sabendo de como lutou [liege.Custom('ES_ElLa')] [liege.GetPrimaryTitle.GetAdjectiveNoTooltip|l]"
 travel_events_bp3.25.c: "Bem... Chega de desgraça e tristeza, temos lugares para ir."
 travel_events_bp3.30.t: "Os Mercenários de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]"
 travel_events_bp3.30.desc: "Sentamo-nos numa taverna silenciosa em [ROOT.Char.GetCurrentLocation.GetName] quando um bando barulhento de mercenários esfarrapados entra aos empurrões. Seu líder brutamontes afasta um dos meus guardas e, com ousadia, senta-se à minha mesa.\n\n[Select_CString( ROOT.Char.IsFemale, 'Uma dama', 'Um cavalheiro' )] nobre, hein? Meu \"[ROOT.Char.GetLadyLord]\"? Tendes interesse nos serviços da melhor banda de mercenários de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]? Nunca encontrareis homens mais leais! Pelo menos se nos pagardes devidamente…"
 travel_events_bp3.30.a: "\"O #emp melhor#!? Você chamou minha atenção...\""
 travel_events_bp3.30.b: "\"Estaria interessado em juntar-se ao meu bando?\""
 travel_events_bp3.30.c: "\"Tenho o trabalho #emp perfeito#! para vocês.\""
 travel_events_bp3.30.d: "\"Não, estou aqui apenas para aproveitar uma pequena pausa.\""
 travel_events_bp3.30.e: "\"#bold #emp Com licença? #!#!\""
 mercenary_army_default: "Mercenários"
 travel_events_bp3.35.t: "Mestre[soldier_character.Custom('ES_OA')] de cavaleiros"
 travel_events_bp3.35.desc.traveling: "Enquanto caminhamos pelas ruas de [ROOT.Char.GetCurrentLocation.GetName], [kid_character.GetFirstName] sai correndo de repente em direção a uma rua lateral. Toda a comitiva é pega de surpresa, e todos corremos atrás de [kid_character.GetSheHe] só para encontrar[kid_character.GetHerHim] brandindo uma espada de madeira torta contra um[soldier_character.Custom('ES_XA')] anciã[soldier_character.Custom('ES_OA')].\n\n\"É o melhor que vocês conseguem fazer, [Select_CString( kid_character.IsFemale, 'princesita', 'principito' )]?\". Ele se vira para nós, depois de provocar um[kid_character.Custom('ES_XA')] furios[kid_character.Custom('ES_OA')] [kid_character.GetFirstNameNoTooltip],"
 travel_events_bp3.35.desc.home: "Enquanto caminhamos pelas ruas de [ROOT.Char.GetCurrentLocation.GetName], vemos um bando de crianças camponesas reunidas em torno de um[soldier_character.Custom('ES_XA')] idos[soldier_character.Custom('ES_OA')] em uma ruazinha lateral. Várias delas brandem pequenas espadas de madeira tortas e gritam animadas enquanto tentam acertá-lo.\n\n"Quem ficaria impressionado com um jogo de pés desses, hein?". Vira-se para nós depois de provocar um dos pequenos,"
 travel_events_bp3.35.outro.non_martial_gender: "fazendo uma breve reverência com a cabeça. “Posso ser útil em algo, [ROOT.Char.Custom('FormOfAddressForLiege')]? Espero não ter ofendido, estou apenas ensinando aos garotos a se virar com uma lâmina.”"
 travel_events_bp3.35.outro.martial_gender: "comentando com um sorriso seco: "Quer se juntar também, [ROOT.Char.Custom('FormOfAddressForLiege')]? Acho que você é um pouco mais velho do que meu grupo habitual"."
 travel_events_bp3.35.a.travel: ""Quero que você continue ensinando a [kid_character.GetFirstNameNoTooltip]"."
 travel_events_bp3.35.a.home: "\"Você estaria disposto a vir para [ROOT.Char.GetCapitalLocation.GetNameNoTooltip] para ensinar?\""
 travel_events_bp3.35.a.tt: "Melhora o resultado da [education|lE] de [ward|lE] para [kid_character.GetFirstName]"
 travel_events_bp3.35.b.martial: "\"Claro, posso tentar.\""
 travel_events_bp3.35.b.non_martial: "\"Estou interessad em tentar também...\""
 travel_events_bp3.35.b.win: "Eu venço o duelo"
 travel_events_bp3.35.b.lose: "Você perde o duelo, mas [soldier_character.GetFirstNameNoTooltip] te ajuda a aprimorar suas habilidades"
 travel_events_bp3.35.c.travel: "\"Obrigad por encontrar m [kid_character.Custom('GetDaughterSon')].\""
 travel_events_bp3.35.c.home: "\"Não, estou apenas observando.\""
 knight_teacher_modifier: "Mestre dos Cavaleiros"
 knight_teacher_modifier_desc: "[Select_CString( soldier_character.IsFemale, 'Uma cavaleira idosa', 'Um cavaleiro idoso' )] que passou a vida lutando e ensinando outros.\n\nMelhora a [education|lE] da [ward|lE]"
 travel_events_bp3.40.t: "O Torneio Marcial"
 travel_events_bp3.40.desc: "Ao passarmos pelo mercado de [ROOT.Char.GetCurrentLocation.GetName], ouvimos um grito alto e tropeçamos em uma briga em andamento entre dois [soldier_character.GetWomenMen], observada atentamente por um grupo de pessoas.\n\nA multidão aplaude efusivamente quando [Select_CString(soldier_character.IsFemale, 'uma delas', 'um deles' )] é derrubado ao chão, com o rosto enterrado solenemente na terra, encerrando assim a disputa.\n\n"Quem é o próximo?!", grita [soldier_character.Custom('ES_ElLa')] [soldier_character.GetWomanMan] vencedor[soldier_character.Custom('ES_XA')] para a multidão, e seus olhos se voltam para o nosso grupo."
 travel_events_bp3.40.outro.challenger: "Ao meu lado, [challenger_character.Custom('ES_ElLa')] [challenger_character.GetTitledFirstName|l] bufa em resposta ao desafio."
 travel_events_bp3.40.fallback: "Seu rosto se contorce em um sorriso malicioso enquanto nos olha."
 travel_events_bp3.40.a: "\"Eu farei isso.\""
 travel_events_bp3.40.b: "\"Vamos lá, você consegue [challenger_character.GetFirstNameNoTooltip]!\""
 travel_events_bp3.40.c: "Parece que é hora de partir..."
 travel_events_bp3.40.win: "Vença o duelo"
 travel_events_bp3.40.lose: "Perca o duelo"
 travel_events_bp3.45.t: "O Cavaleiro Errante"
 travel_events_bp3.45.desc: "Enquanto caminhamos pelas ruas de [ROOT.Char.GetCurrentLocation.GetName], há um grande alvoroço em uma das barracas do mercado, com dois [knight_character.GetWomenMen] gritando um com o outro. Antes que possamos chegar lá, [Select_CString( knight_character.IsFemale, 'uma mulher', 'um homem' )] já se colocou entre [Select_CString( knight_character.IsFemale, 'ambas', 'ambos' )] e [Select_CString( knight_character.IsFemale, 'as', 'os' )] acalmou.\n\n"Viu, vai ficar tudo bem?", diz [Select_CString( knight_character.IsFemale, 'à dona', 'ao dono' )] da barraca com um sorriso e lhe entrega uma [ROOT.Char.GetCurrentLocation.Custom('GetByzantineCoinWithGloss')]. E com esse simples ato de generosidade, tudo volta ao normal.\n\nVira-se para nós quando nos aproximamos, sem bandeira nem insígnia que me diga que seja [Select_CString( knight_character.IsFemale, 'uma senhora nobre', 'um senhor nobre' )]. Talvez seja [Select_CString( knight_character.IsFemale, 'uma cavaleira', 'um cavaleiro' )] errante?"
 travel_events_bp3.45.a: "[Select_CString( knight_character.IsFemale, 'Uma cavaleira', 'Um cavaleiro' )] honorável como você deveria servir a um [ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetLadyLord] como eu."
 travel_events_bp3.45.b: "\"Posso te oferecer uma bebida?\""
 travel_events_bp3.45.diplomacy: "Histórias de cavalheirismo"
 travel_events_bp3.45.prowess: "Histórias de valor"
 travel_events_bp3.45.piety: "Histórias de piedade"
 travel_events_bp3.45.prestige: "Histórias de bravura"
 travel_events_bp3.45.b.flavor: "Talvez tenha algumas histórias para contar?"
 travel_events_bp3.45.c: "Não tenho tempo para esse vagabund[knight_character.Custom('ES_OA')]."
 travel_events_bp3.50.t: "Uma Dupla Unida"
 travel_events_bp3.50.desc: "Ao passar por um beco em [ROOT.Char.GetCurrentLocation.GetName], vejo [Select_CString( child_character.IsFemale, 'uma menina solitária', 'um menino solitário' )] e seu cachorro sentados em um canto atrás de um pequeno muro. "Aqui, Valor", diz, enquanto lhe dá um pedaço de pão e não guarda nada para si.\n\nAo olhar para os dois, está claro que o cachorro recebeu muito mais cuidados do que [Select_CString( child_character.IsFemale, 'sua dona', 'seu dono' )], que deve ter lhe dado tudo o que conseguiu encontrar."
 travel_events_bp3.50.a: "Tome um pouco de comida, [Select_CString( child_character.IsFemale, 'menina', 'menino' )]."
 travel_events_bp3.50.b: "\"Venha, cuidarei de você.\""
 travel_events_bp3.50.c: "\"Seu cachorro? #bold Meu#! cachorro.\""
 travel_events_bp3.50.d: "Não tenho tempo para [Select_CString( child_character.IsFemale, 'huérfanas andrajosas', 'huérfanos andrajosos' )]."
 heartless_modifier: "Sem Coração"
 heartless_modifier_desc: "Um governante sem coração que rouba de crianças órfãs."
 kind_ruler_modifier: "Governante Bondoso"
 kind_ruler_modifier_desc: "Conhecido por tratar até os mais humildes órfãos com bondade."
 travel_events_bp3.55.t: "Comerciantes Itinerantes"
 travel_events_bp3.55.desc: "Enquanto caminho pelo mercado de [ROOT.Char.GetCurrentLocation.GetName], um grande alvoroço vem de apenas algumas barracas adiante de mim. Há [Select_CString( merchant_character.IsFemale, 'uma mulher furiosa', 'um homem furioso' )] que gesticula violentamente com as mãos. "[republic_ruler.Custom('ES_ElLa')|U] [republic_ruler.GetTitledFirstName|l] vai querer a sua cabeça por isso!", grita a outro comerciante, que parece ainda mais furioso se isso é possível.\n\n"Eu adoraria ver essa tentativa!", desdenha o dono da barraca com um aceno de mão. Virando-se com raiva para seus guarda-costas, está claro que [Select_CString( merchant_character.IsFemale, 'a comerciante', 'o comerciante' )] pretende fechar negócio de um jeito ou de outro."
 travel_events_bp3.55.a: "Vamos ajudar[merchant_character.Custom('ES_LeLa')] antes que isso saia do controle."
 travel_events_bp3.55.a.flavor: "Uma oportunidade perfeita para estreitar vínculos com [republic_ruler.Custom('ES_ElLa')] [republic_ruler.GetTitledFirstName|l], se conseguirmos ajudar seu servidor[merchant_character.Custom('ES_XA')]."
 travel_events_bp3.55.a.tt: "Cria uma [alliance|lE] com [republic_ruler.GetName]"
 travel_events_bp3.55.b: "Parece o momento perfeito para ganhar algumas moedas..."
 travel_events_bp3.55.b.flavor: "Vamos ver se conseguimos arrancar algumas mercadorias de [merchant_character.Custom('ES_LeLa')] por um preço barato."
 travel_events_bp3.55.b.win: "Aproveitar-se da situação"
 travel_events_bp3.55.b.lose: "Ser aproveitado"
 travel_events_bp3.55.c: "Vou assistir ao espetáculo."
 travel_events_bp3.60.t: "Um Pequeno Negócio"
 travel_events_bp3.60.desc: "Ao caminharmos por [ROOT.Char.GetCurrentLocation.GetName], somos pegos por uma multidão que espera que um grande carro repleto de materiais de construção saia do caminho.\n\n"Não preciso das suas coisas, já consegui mais barato em outro lugar!", grita [Select_CString( merchant_character.IsFemale, 'uma mulher', 'um homem' )] para outra pessoa, que parece desanimad[merchant_character.Custom('ES_OA')] e confundid[merchant_character.Custom('ES_OA')].\n\n"M-mas... o que eu faço com isso agora?", pergunta, mais para si mesm[merchant_character.Custom('ES_OA')] do que para qualquer outra pessoa."
 travel_events_bp3.60.a: "\"Vou comprar todos os seus materiais.\""
 travel_events_bp3.60.b: "\"Traga suas mercadorias para [ROOT.Char.GetCapitalLocation.GetNameNoTooltip]!\""
 travel_events_bp3.60.c: "\"Saia do caminho já!\""
 travel_extra_building_resources_modifier: "Materiais de Construção Extra"
 travel_extra_building_resources_modifier_desc: "Esta província tem um grande estoque de recursos prontos para serem utilizados em novos projetos de construção.\n\n"
 MODIFIER_DEFINITION_EXTRA_BUILDING_RESOURCES: "#emp Usado ao construir um novo edifício#!\nRecursos de [building|lE] Restantes: #bold $MULTIPLIER|0$/3#!"
 modifier_extra_building_resources_desc: "\t #weak Diminuído para cada uso restante#!"
 travel_extra_building_resources_character_modifier: "Recursos Comerciais"
 travel_extra_building_resources_character_modifier_desc: "Uma valiosa rota comercial que proporciona fácil acesso a materiais de construção."
 travel_events_bp3.65.t: "Perseguição pela Bolsa"
 travel_events_bp3.65.desc: "Enquanto eu olhava as bancas do mercado de [ROOT.Char.GetCurrentLocation.GetName], sinto que cortaram o cordão da minha bolsa. Apesar da minha reação imediata, [Select_CString( thief_character.IsFemale, 'a ladra', 'o ladrão' )] desaparece no meio da multidão.\n\nSó por pura coincidência, um dos meus guardas [merchant_character.GetHerHim] vê quando segue para um beco. "Pare, ou eu arranco sua cabeça!", grita o guarda, e [Select_CString( thief_character.IsFemale, 'a ladra', 'o ladrão' )] se vira, lançando um olhar furioso e dissimulado."
 travel_events_bp3.65.a: "\"Tenho uma oferta de trabalho para você, considere o dinheiro como seu primeiro pagamento.\""
 travel_events_bp3.65.b: ""[Select_CString( thief_character.IsFemale, 'Ladrona asquerosa', 'Ladrón asqueroso' )], você acha que podia #bold #emp robarme#!#!?""
 travel_events_bp3.65.c: "\"Devolva o dinheiro, e podemos deixar isso por isso mesmo.\""
 travel_events_bp3.70.t: "Festival de [ROOT.Char.GetCurrentLocation.GetCulture.GetNameNoTooltip]"
 travel_events_bp3.70.desc: "Ao entrarmos em [ROOT.Char.GetCurrentLocation.GetName], noto a atitude alegre e as decorações festivas pela cidade. Antes que percebamos, todo o meu séquito se envolve nas festividades também.\n\n"
 travel_events_bp3.70.desc.entourage: "\"Este é um lugar tão amigável, não acha?\" [dancing_partner.GetFirstName] me pergunta, enquanto nós dois dançamos entre a multidão."
 travel_events_bp3.70.desc.local: ""Bem-vind[ROOT.Char.Custom('ES_OA')]s a [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]!", me diz entusiasmad[local_character.Custom('ES_OA')] [Select_CString( local_character.IsFemale, 'uma mulher', 'um homem' )] com quem acabei dançando, enquanto coloca a mão sobre a minha."
 travel_events_bp3.70.desc.outro: "Ouço uma forte aclamação de todos ao nosso redor quando os músicos terminam uma música e começam outra."
 travel_events_bp3.70.a: "Gostaria que [ROOT.Char.GetCapitalLocation.GetNameNoTooltip] fosse mais assim..."
 travel_events_bp3.70.a.cultural_acceptance: "[cultural_acceptance|E] necessário para [hybridize|lE] com [root_scope.MakeScope.Var('special_culture_tooltip').Culture.GetName] reduzido em #color_white 25%#!"
 travel_events_bp3.70.a.counties: "Pode [hybridize|lE] com a [culture|lE] [root_scope.MakeScope.Var('special_culture_tooltip').Culture.GetName] embora nenhum [county|lE] do seu [realm|lE] a possua"
 travel_events_bp3.70.b: "Isso parece exatamente como em casa!"
 travel_events_bp3.75.t: "Sonhos Fermentando"
 travel_events_bp3.75.desc: "Ao passar por uma pequena praça de mercado em [ROOT.Char.GetCurrentLocation.GetName], vejo [Select_CString( brewmaster_character.IsFemale, 'uma mulher', 'um homem' )] que entrega bebidas a todos que passam. "[ROOT.Char.Custom('FormOfAddressForLiege')|U]", diz enquanto me entrega uma taça. O aroma de [ROOT.Char.Custom('RegionalDrink')] chega imediatamente ao meu nariz e vejo a bebida girar levemente ao aceitar o copo. Como todo mundo, eu a bebo de uma vez, e é #emp assombrosamente#! boa.\n\n"Está aceitável, [ROOT.Char.Custom('FormOfAddressForLiege')]?", pergunta [brewmaster_character.GetSheHe] com um brilho curioso nos olhos, e me lança um olhar enfático enquanto continua: "Se ao menos eu tivesse algum lugar onde pudesse fazer mais...""
 travel_events_bp3.75.a: "\"[target_barony.GetNameNoTierNoTooltip] está precisando de alguém como você.\""
 travel_events_bp3.75.b: "\"Mude seu negócio para minhas terras e junte-se à minha corte.\""
 travel_events_bp3.75.c: "\"Obrigado, estava excelente!\""
 travel_events_bp3.80.t: "Uma Vida de Serviço"
 travel_events_bp3.80.desc.holy_order: "Enquanto visitamos um/uma [ROOT.Char.Custom('GetFaithTemple')] em [ROOT.Char.GetCurrentLocation], percebo que [monk_character.GetFirstName] está envolvid[monk_character.Custom('ES_OA')] em uma conversa com um [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')] itinerante. Parece absorver cada palavra, com os olhos brilhando de interesse.\n\n"[monk_character.Custom2('RelationToMeShort', ROOT.Char)|U], decidi o que quero fazer da minha vida", me diz cerimonios[monk_character.Custom('ES_OA')] quando me aproximo do casal. O [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')] concorda com a cabeça e lhe dá um leve tapinha nas costas, claramente tentando dar apoio à minha [ROOT.Char.Custom2('RelationToMeShort', monk_character)] em sua decisão. "Quero dedicar minha vida ao serviço de [ROOT.Char.GetFaith.HighGodName] e [grandmaster.GetPrimaryTitle.GetName]"."
 travel_events_bp3.80.desc.monk: "Enquanto visitamos um [ROOT.Char.Custom('GetFaithTemple')] em [ROOT.Char.GetCurrentLocation], noto que [monk_character.GetFirstName] está envolvid[monk_character.Custom('ES_OA')] em uma conversa com um membro do clero local. Parece atento a cada palavra, com os olhos brilhando de interesse.\n\n"[monk_character.Custom2('RelationToMeShort', ROOT.Char)|U], decidi o que quero fazer da minha vida", me diz cerimonios[monk_character.Custom('ES_OA')] quando me aproximo dos dois. O clérigo me sorri, claramente tentando apoiar meu [ROOT.Char.Custom2('RelationToMeShort', monk_character)] em sua decisão."
 travel_events_bp3.80.desc.adult: "$travel_events_bp3.80.desc.monk$ \"Quero dedicá-la ao serviço de [ROOT.Char.GetFaith.HighGodName] aqui em [ROOT.Char.GetCurrentLocation.GetName].\""
 travel_events_bp3.80.desc.child: "$travel_events_bp3.80.desc.monk$ \"Quero dedicá-la ao serviço de [ROOT.Char.GetFaith.HighGodName].\""
 travel_events_bp3.80.a: "\"Se isso te fará feliz...\""
 travel_events_bp3.80.b: "\"Pense no seu futuro, [monk_character.GetFirstNameNoTooltip]!\""
 travel_events_bp3.85.t: "Cervejeiros de Fama"
 travel_events_bp3.85.desc.monk: "Ao passar por [ROOT.Char.GetCurrentLocation.GetName], soubemos que precisávamos ver sua famosa cervejaria da abadia. Assim que entramos no prédio, vemos um grupo de pessoas sendo atendidas em uma pequena mesa perto da porta, enquanto monges realizam seu trabalho nos fundos."
 travel_events_bp3.85.desc: "Ao passar por [ROOT.Char.GetCurrentLocation.GetName], soubemos que precisávamos ver sua famosa cervejaria local. Assim que entramos no prédio, vemos um grupo de pessoas sendo atendidas em uma pequena mesa perto da porta, enquanto cervejeiros realizam seu trabalho nos fundos."
 travel_events_bp3.85.desc.outro: "\n\nDepois de esperar o grupo anterior sair, finalmente recebemos algumas bebidas. Dou uma leve girada no copo e sinto o aroma distinto da cerveja subindo. Vendo todos experimentando, finalmente dou um gole também."
 travel_events_bp3.85.a: "Não tem nada a ver com a cerveja tradicional de [brewery_county.GetNameNoTooltip]."
 travel_events_bp3.85.a.tt: "Devido a uma tradição cervejeira em [brewery_county.GetName] com mais de #color_white [brewery_county.MakeScope.ScriptValue('brewery_counter_25')|0]#! anos de idade:"
 travel_events_bp3.85.b: "Vou comprar um pouco para levar para casa."
 travel_events_bp3.85.c: "Não é à toa que é tão bem conhecida."
 popular_beer_character_modifier: "Cerveja Popular"
 popular_beer_character_modifier_desc: "Uma cerveja famosa de longe que se tornou incrivelmente popular na corte."
 travel_events_bp3.90.t: "Patron do [ROOT.Char.Custom('GetFaithTemple')]"
 travel_events_bp3.90.desc: "No centro de [ROOT.Char.GetCurrentLocation.GetName], há um grande [ROOT.Char.Custom('GetFaithTemple')], e o restante da cidade foi construído ao seu redor. Assim que entramos no edifício sagrado, chega correndo um[priest_character.Custom('ES_XA')] [priest_character.GetWomanMan].\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], vós pareceis uma pessoa de posses. Gostaria de fazer uma doação ao nosso [ROOT.Char.Custom('GetFaithTemple')]?", pergunta, curvando-se e estendendo a mão sem pudor algum. Vejo que há pequenas obras sendo feitas no edifício, mas isso está longe de ser suficiente para compensar todas as falhas do [ROOT.Char.Custom('GetFaithTemple')]."
 travel_events_bp3.90.a: "\"Considere-me um patrono de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]!\""
 travel_events_bp3.90.a.flavor: "Com meu apoio, isso pode se tornar novamente um verdadeiro lugar de culto."
 travel_events_bp3.90.b: "\"Claro, uma pequena doação é o mínimo.\""
 travel_events_bp3.90.c: "Parece que é hora de seguir em frente..."
 church_investment_modifier: "Patrono Piedoso"
 church_investment_modifier_desc: "Este personagem reservou riqueza e recursos pessoais para apoiar os clérigos locais.\n\n"
 church_investment_cost_modifier: "Investimentos Piedosos"
 church_investment_cost_modifier_desc: "$church_investment_modifier_desc$#emp Pode ser removido com a [decision|lE] #color_white Fim dos Investimentos Piedosos#!#!"
 MODIFIER_DEFINITION_CHURCH_INVESTMENTS: "Este modificador é aumentado a cada dois anos, atualmente multiplicado por #bold $MULTIPLIER|0$#!"
 modifier_church_investments_desc: "\t #weak Aumentado a cada dois anos passados#!"
 end_investments_minor_decision: "Encerrar os Investimentos Piedosos"
 end_investments_minor_decision_desc: "Esses parasitas já não tiveram o suficiente da minha riqueza? Tenho outras coisas para gastar!"
 end_investments_minor_decision_tooltip: "Encerre seus investimentos no [ROOT.Char.Custom('GetFaithTemple')]"
 end_investments_minor_decision_confirm: "Encerrar Investimentos"
 travel_events_bp3.95.t: "O Conto de um Peregrino"
 travel_events_bp3.95.desc: "Ao caminharmos pelo [ROOT.Char.Custom('GetFaithTemple')] de [ROOT.Char.GetCurrentLocation.GetName], ouço um grupo de viajantes conversando em voz baixa entre si. Um[pilgrim_character.Custom('ES_OA')] deles, [Select_CString( pilgrim_character.IsFemale, 'uma mulher', 'um homem' )], começa a descrever e comparar este lugar com sua viagem a [unvisited_holy_site.GetNameNoTier].\n\nNão consigo evitar escutar a conversa enquanto continua detalhando as maravilhas que viu em [unvisited_holy_site.GetProvince.GetCounty.GetName]. Ao olhar ao redor, só consigo imaginar o quanto deve ser melhor em comparação com a vista delicada que vejo aqui..."
 travel_events_bp3.95.a: "\"Conte-me mais sobre [unvisited_holy_site.GetNameNoTierNoTooltip]!\""
 travel_events_bp3.95.a.tt: "Viajar para o [unvisited_holy_site.GetName] em uma [pilgrimage|lE] lhe dará [piety|lE] e [stress_loss|lE]"
 travel_events_bp3.95.a.tt.wanderer: "Viajar até [unvisited_holy_site.GetName] em [pilgrimage|lE] lhe dará [piety|lE], [stress_loss|lE] e experiência de [wanderer_lifestyle|lE]"
 travel_events_bp3.95.a.flavor: "Talvez eu consiga convencer[pilgrim_character.GetHerHim] a me contar mais sobre [unvisited_holy_site.GetProvince.GetCounty.GetName]?"
 travel_events_bp3.95.b: "Que conto interessante."
 travel_events_bp3.100.t: "Terra de Leite e... Peixe?"
 travel_events_bp3.100.desc: "Ao me levantar cedo, não consigo evitar soltar um bocejo alto. Alongando-me, saio da minha tenda para ver que as pessoas já estão se movimentando.\n\nPercebo que [friend_character.GetFirstName] sai com o que parece ser uma vara de pescar improvisada, em meio a todo o barulho e a agitação do acampamento. \"Para onde você vai?\", pergunto a \n\n Responde com um dar de ombros despreocupado: \"É um ótimo dia para pescar\"."
 travel_events_bp3.100.a: "\"Isso parece uma boa ideia, na verdade.\""
 travel_events_bp3.100.a.flavor: "Está #emp mesmo#! um bom dia para pescar."
 travel_events_bp3.100.b: "Vamos descansar aqui por alguns dias."
 travel_events_bp3.100.b.flavor: "Parece um bom lugar para descansar antes da próxima parte da nossa jornada."
 travel_events_bp3.100.c: "\"Volte para o seu cavalo, [friend_character.GetFirstNameNoTooltip], temos lugares para ir!\""
 travel_events_bp3.105.t: "Um [lifestyle_character.GetWomanMan|U] de Habilidades Incomuns"
 travel_events_bp3.105.desc: "Depois de termos viajado juntos por um tempo, percebi que há algo em [lifestyle_character.GetFirstName]."
 travel_events_bp3.105.desc.reveler: "Sempre que paramos, é [lifestyle_character.Custom('ES_ElLa')] primeiro[lifestyle_character.Custom('ES_OA')] a explorar a nova cidade ou aldeia.\n\nMesmo esta noite, continua puxando conversa com todos, falando de assuntos triviais. De algum modo, faz com que todos se sintam em casa, até aqui. Será que há algo que eu possa aprender com [lifestyle_character.GetSheHe]?"
 travel_events_bp3.105.desc.blademaster: "Todas as manhãs ele se levanta para treinar, brandindo sua espada de um lado para o outro.\n\nAté esta mesma noite, quando os outros estão ocupados apreciando a comida, [lifestyle_character.GetSheHe] ele saiu por conta própria para fazer exercícios que inspiram admiração. Não consigo evitar querer emular partes de seu estilo de vida."
 travel_events_bp3.105.desc.hunter: "Uma vez, vi-o derrubar um pássaro do céu enquanto viajávamos, como se fosse a coisa mais fácil do mundo.\n\nHoje, [lifestyle_character.GetSheHe] e mais algumas pessoas saíram para caçar comida para o resto de nós e voltaram com sucesso. Essa popularidade, a quantidade de pessoas que se aglomeram ao redor dele… Não consigo evitar querer tentar também."
 travel_events_bp3.105.desc.mystic: "Parece conhecer as coisas mais estranhas, muitas vezes acaba em conversas curiosas com quem [lifestyle_character.Custom('ES_LoLa')] rodeia.\n\nChega bem perto da heresia com alguns de seus pensamentos, muitas vezes questionando o que o resto de nós toma como certo... E, ainda assim, não consigo evitar sentir que está certo em muitas de suas opiniões."
 travel_events_bp3.105.desc.physician: "Costuma ajudar os outros com feridas pequenas e arranhões, preparando pequenos emplastros como se não fosse nada.\n\nQuando passamos por [ROOT.Char.GetCurrentLocation.GetName], de repente [lifestyle_character.Custom('ES_LoLa')] vejo correr até uma criança camponesa que mal consegue respirar e está com uma cor pouco natural no rosto em um beco. Antes que eu perceba, o rosto da criança volta ao normal. Como fez isso?"
 travel_events_bp3.105.desc.herbalist: "Sempre colhe ervas ou flores durante nossa viagem e as guarda cuidadosamente para usar mais tarde.\n\nHoje, [lifestyle_character.Custom('ES_LeLa')] ouvi falar longamente sobre as propriedades de certa erva que tinha colhido, sobre como ela podia ser usada tanto para o bem quanto para o mal. Talvez haja algo nesse hobby afinal?"
 travel_events_bp3.105.desc.gardener: "Tenho notado que costuma ser [Select_CString( lifestyle_character.IsFemale, 'a primeira', 'o primeiro' )] a sair correndo quando chegamos a uma cidade ou aldeia nova.\n\nHoje, [lifestyle_character.GetHerHim] encontrei estudando um pequeno jardim quando visitávamos [ROOT.Char.GetCurrentLocation.GetName]. Levei algumas tentativas até que percebesse que eu estava ali, ou tentando falar com [lifestyle_character.GetSheHe]."
 travel_events_bp3.105.a.reveler: "Como posso ser mais extrovertid[lifestyle_character.Custom('ES_OA')] como você?"
 travel_events_bp3.105.a.blademaster: "\"Você pode me ensinar mais sobre a espada?\""
 travel_events_bp3.105.a.hunter: "\"Você pode me ensinar a usar um arco?\""
 travel_events_bp3.105.a.mystic: "\"Eu gostaria de ouvir mais sobre o que você sabe.\""
 travel_events_bp3.105.a.physician: "\"Como você sabe tanto sobre doenças e enfermidades?\""
 travel_events_bp3.105.a.herbalist: "\"Você pode me contar mais sobre as ervas que encontrou?\""
 travel_events_bp3.105.a.gardener: "\"O que é que você encontra de tão interessante nelas?\""
 travel_events_bp3.105.b: "\"Você é o orgulho dessa comitiva, [lifestyle_character.GetFirstNameNoTooltip].\""
 bp3_skill_travel_skill_learn_win: "Adote seus modos"
 bp3_skill_travel_skill_learn_fail: "Simplesmente não consigo fazer isso"
 travel_events_bp3.110.t: "Conversa Sincera"
 travel_events_bp3.110.desc.intro: "Muito depois que a maioria já foi dormir, continuo sentad[ROOT.Char.Custom('ES_OA')] junto à fogueira. \"O que houve?\" pergunta [friend_character.GetFirstName] sentando-se ao meu lado, com expressão preocupada no rosto.\n\nNo início, não sei o que dizer, mas, ao começar a falar, tudo sai naturalmente: todo o meu estresse, minhas preocupações, meus problemas do dia a dia. \"Eu só não consigo parar de pensar em"
 travel_events_bp3.110.desc.negative_memory: "aquela vez quando [negative_memory.GetDescription]."
 travel_events_bp3.110.desc.fallback: "todas as minhas últimas decisões."
 travel_events_bp3.110.desc.outro: "Não posso deixar de me perguntar se deveria ter feito as coisas de maneira diferente."
 travel_events_bp3.110.a: "\"E você?\""
 travel_events_bp3.110.a.flavor: "E se ouvir os problemas dela aliviar meu fardo?"
 travel_events_bp3.110.b: "\"Você não vai acreditar no que eu tenho que passar...\""
 travel_events_bp3.110.b.flavor: "Trata-se de mim e dos meus problemas, não de [friend_character.GetFirstName]."
 travel_events_bp3.115.t: "Noite ao Redor da Fogueira"
 travel_events_bp3.115.desc.intro: "Muito depois de a noite ter caído, me encontro rindo, contando histórias e bebendo com"
 travel_events_bp3.115.desc.3_characters: "meu [ROOT.Char.Custom2('RelationToMeShort', character_number_1)] [character_number_1.GetFirstName], meu [ROOT.Char.Custom2('RelationToMeShort', character_number_2)] [character_number_2.GetFirstName] e meu [ROOT.Char.Custom2('RelationToMeShort', character_number_3)][character_number_3.GetFirstName]."
 travel_events_bp3.115.desc.2_characters: "meu [ROOT.Char.Custom2('RelationToMeShort', character_number_1)] [character_number_1.GetFirstName] e meu [ROOT.Char.Custom2('RelationToMeShort', character_number_2)] [character_number_2.GetFirstName]."
 travel_events_bp3.115.desc.1_character: "meu [ROOT.Char.Custom2('RelationToMeShort', character_number_1)][character_number_1.GetFirstName]."
 travel_events_bp3.115.desc.outro: "Não sabia que [character_number_1.GetFirstNameNoTooltip] fosse capaz, mas acaba contando uma história especialmente obscena sobre quatro camponeses que viu em [ROOT.Char.GetCapitalLocation.GetName].\n\nDepois de enxugar as lágrimas de tanto rir dos olhos e beber um pouco para limpar a garganta, eu..."
 travel_events_bp3.115.a: "Contar uma história minha..."
 travel_events_bp3.115.b: "… com alguns enfeites extras!"
 travel_events_bp3.115.b.impressed: "Você os impressiona"
 travel_events_bp3.115.b.unimpressed: "Eles ficam desinteressados"
 travel_events_bp3.115.c: "Peça a [character_number_1.GetFirstNameNoTooltip] para me contar outra história!"
 travel_events_bp3.120.t: "O Barco Naufragado"
 travel_events_bp3.120.desc.intro.coast: "Enquanto viajamos pela costa de [ROOT.Char.GetCurrentLocation.GetName],"
 travel_events_bp3.120.desc.intro.river: "Enquanto viajamos pelo [river_province.Custom('RiverNameLoc')],"
 travel_events_bp3.120.desc: "avistamos [Select_CString( merchant_character.IsFemale, 'uma mulher', 'um homem' )] que amaldiçoa a vida aos berros e reclama da sua tripulação traidora. À medida que nos aproximamos, [merchant_character.Custom('ES_LoLa')] o vemos junto aos destroços de uma pequena embarcação comercial naufragada.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], posso tomar um momento do vosso tempo? Pagarei com prazer por comida e ajuda para reparar meu barco", ele diz com um sorriso de dor no rosto. Percebo que a maioria de suas mercadorias parece estar bem conservada, apesar da sua má sorte."
 travel_events_bp3.120.a: "Claro, podemos ajudar."
 travel_events_bp3.120.b: "Por um preço, talvez..."
 travel_events_bp3.120.c: "\"Quanto foi mesmo que você disse que tem?\""
 travel_events_bp3.120.d: "\"Peço desculpas, mas estamos com pressa.\""
 RiverNameTheNile: "[ROOT.Province.GetName]"
 RiverNameNotTheNile: "a [ROOT.Province.GetName]"
