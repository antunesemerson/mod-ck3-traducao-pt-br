l_spanish:
 enact_legacy_of_adventurer_decision: "Legado de [GetPlayer.GetHouse.GetBaseNameNoTooltip]"
 enact_legacy_of_adventurer_decision_desc: "Ao longo dos anos, meu humilde acampamento cresceu em tamanho e espírito.\n\nA cada tarefa que completamos, nosso vínculo com esta terra e seu povo se fortalece. Nossas façanhas são cantadas nas tabernas e nossos nomes são sussurrados na escuridão, e assim será por gerações."
 enact_legacy_of_adventurer_decision_confirm: "Pelo [GetPlayer.GetPrimaryTitle.GetNameNoTooltip]!"
 enact_legacy_of_adventurer_decision_tooltip: "Solidifique o lugar da [house|lE] [GetPlayer.GetHouse.GetBaseNameNoTooltip] no mundo dos [adventurers|lE]"
 have_enough_followers_tt: "Você tem pelo menos #V 15#! [followers|lE] #weak (#color_white [GetPlayer.MakeScope.ScriptValue('tally_current_followers')]#!)#!"
 have_enough_patrons_tt: "Você tem pelo menos #V 5#! pessoas em sua [contact_list|lE] #weak (#color_white [GetPlayer.MakeScope.ScriptValue('tally_roll_of_patrons')]#!)#!"
 has_max_level_pavilion_tt: "Seu [GetDomicileBuilding('camp_main_01').GetName] [building|lE] está no Nível #V 4#! #weak (#color_white [GetPlayer.MakeScope.ScriptValue('camp_pavillion_level')]#!)#!"
 has_enough_contracts_tt: "Você completou #V [contract_tally]/50#! [task_contracts|lE] não [Concept('criminal', 'criminosos')|E]"
 legacy_adventurer_legitimacy_on_landing: "Se qualquer [adventurer|lE] da [house|lE] [GetPlayer.GetHouse.GetBaseName] se tornar um [ruler|lE]:\n$BULLET$ Receberá [legitimacy_i][GetPlayer.MakeScope.ScriptValue('massive_legitimacy_gain')|+0] [legitimacy|lE]\n$BULLET$ Para cada [follower|lE] que teve, receberá [soldier_i] #P 25#! [levies|lE]"
 criminal_contracts_blocked_tt: "@warning_icon! #warning Você não poderá mais aceitar [task_contracts|lE] [Concept('criminal', 'criminosos')|E]#!"
 task_successful_noncrim_contract_count_effect_tt: "Você faz progressos na [decision|lE] $enact_legacy_of_adventurer_decision$"
 remnants_adventurer_army: "Remanescentes de [prev_title.GetNameNoTooltip]"
 legacy_adventurer_house_modifier: "Linhagem de Aventureiro"
 legacy_adventurer_house_modifier_desc: "Esta casa valoriza o estilo de vida de um aventureiro, sem precisar se preocupar com questões da corte.\nRecompensas de [prestige|lE] para [adventurer_i] [task_contract|lE]: [prestige_i]#P +15%#!"
 bp3_decisions.0100.t: "$enact_legacy_of_adventurer_decision$"
 bp3_decisions.0100.desc: "Para todos aqueles que me seguem, ofereço um lugar seguro para descansar e uma chance de deixar sua marca no mundo.\n\nNo meu mundo, não há lugar para a corrupção desenfreada nem para trapaças, e tudo o que fizermos será para melhorar os reinos pelos quais passarmos, isso é o que significa ser um [GetPlayer.GetHouse.GetBaseName].\n\nPois, enquanto eu liderar [GetPlayer.GetPrimaryTitle.GetName], os malvados receberão seu castigo!"
 bp3_decisions.0100.a: "Avante, meus seguidores!"
 bp3_decisions.0100.a_tt: "Cria até #V 3#! [justicar_task_contracts|lE] no mapa"
 bp3_decisions.0100.b: "Apesar disso, anseio por terras..."
