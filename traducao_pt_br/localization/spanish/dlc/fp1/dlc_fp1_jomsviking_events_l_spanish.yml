l_spanish:
 #Jomsvikings offer a Retainer
 fp1_jomsvikings.0001.t: "Uma mão amiga de [leader.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]"
 fp1_jomsvikings.0001.desc.intro: "Acuartelados em sua fortaleza de [leader.GetCapitalLocation.GetTitle.GetNameNoTier], os [leader.GetPrimaryTitle.GetNameNoTier] são uma ordem guerreira dedicada à proteção dos Antigos Costumes da fé [leader.GetFaith.GetAdjective] contra mudanças, desonra e religiões estrangeiras.\n\nPor minha piedade e virtude, [leader.GetTitledFirstName|l] me enviou uma escolha de dois servos: [retainer_a.GetFirstName],"
 fp1_jomsvikings.0001.desc.zealous: "que saqueou cem igrejas,"
 fp1_jomsvikings.0001.desc.wrathful: "que uma vez rasgou um urso em dois,"
 fp1_jomsvikings.0001.desc.impatient: "que é mais rápido que um raio,"
 fp1_jomsvikings.0001.desc.arrogant: "que teria sido o próximo [leader.GetTitleAsNameNoTooltip],"
 fp1_jomsvikings.0001.desc.brave: "que venceu um troll em uma luta de punhos,"
 fp1_jomsvikings.0001.desc.ambitious: "que deseja morrer com a morte mais gloriosa já vista,"
 fp1_jomsvikings.0001.desc.diligent: "que nunca para de treinar,"
 fp1_jomsvikings.0001.desc.gregarious: "que se tornou amigo dos próprios deuses,"
 fp1_jomsvikings.0001.desc.stubborn: "que derrubou uma montanha pedra por pedra,"
 fp1_jomsvikings.0001.desc.fickle: "cujo espírito caprichoso enganou até mesmo a [leader.GetFaith.DevilName]."
 fp1_jomsvikings.0001.desc.vengeful: "que nunca deixou uma vingança passar em branco,"
 fp1_jomsvikings.0001.desc.viking: "que mata dez camponeses por dia no exterior,"
 fp1_jomsvikings.0001.desc.connector: "ou [retainer_b.GetFirstName],"
 fp1_jomsvikings.0001.desc.outro: "assim como seus elogios pela minha devoção.\n\nUm ficará, e o outro retornará para o [leader.GetPrimaryTitle.GetNameNoTierNoTooltip]."
 fp1_jomsvikings.0001.a: "[retainer_a.GetFirstNameNoTooltip] parece um[retainer_a.Custom('ES_XA')] estratega formidável!"
 fp1_jomsvikings.0001.b: "Que guerreir[retainer_b.Custom('ES_OA')] imponente ? [retainer_b.GetFirstNameNoTooltip]..."
 fp1_jomsvikings.0001.c: "Já tenho guerreiros em abundância, obrigado."
 #Jomsvikings terrorise their neighbours
 fp1_jomsvikings.0011.t.reformed_norse: "Ira dos Velhos Caminhos"
 fp1_jomsvikings.0011.t.reformed_other: "Ira dos Deuses Antigos"
 fp1_jomsvikings.0011.t.fallback: "[leader.GetPrimaryTitle.GetNameNoTierNoTooltip] Piratas"
 fp1_jomsvikings.0011.desc.intro: "Que desastre! Um ataque surpresa [leader.Custom('ES_DelDela')] [leader.GetTitledFirstName|l] de [leader.GetPrimaryTitle.GetNameNoTier] contra [target_county.GetNameNoTier] ameaça incendiar metade do condado!\n\n"
 fp1_jomsvikings.0011.desc.ideological_reformist: "Rotulando [ROOT.Char.GetFaith.GetName] uma perversão repugnante da fé de nossos antepassados, esses malditos piratas estão massacrando nossos [ROOT.Char.GetFaith.PriestNeuterPlural] em massa, incendiando nossas [ROOT.Char.GetFaith.HouseOfWorshipPlural], e afirmam estar fazendo tudo em nome de [leader.GetFaith.HighGodName]!"
 fp1_jomsvikings.0011.desc.ideological_other: "Fundamentalistas [leader.GetFaith.GetAdherentNamePlural], esses piratas consideram [ROOT.Char.GetFaith.GetReligion.GetName] uma ameaça ao seu modo de vida. Mais do que simplesmente saquear, os reavers estão massacrando [ROOT.Char.GetFaith.PriestNeuterPlural], queimando [ROOT.Char.GetFaith.HouseOfWorshipPlural], e gritando imprecações sangrentas sobre seus falsos deuses."
 fp1_jomsvikings.0011.desc.economic: "Embora [leader.GetPrimaryTitle.GetNameNoTierNoTooltip] não nutra nenhum rancor particular contra um[ROOT.Char.Custom('ES_XA')] membro do povo [ROOT.Char.GetFaith.GetAdherentName] como eu, continua dependendo do saqueio e do butim para sobreviver, e minhas terras são um alvo tentador. Talvez... talvez, se eu lhes pagar um grande gafol, eles ainda possam poupar meus súditos?"
 fp1_jomsvikings.0011.desc.outro: "\n\nNão há tempo para levantar um exército. Posso atacar com quaisquer forças que tenha à mão, ou posso suportar a situação até que eles partam."
 fp1_jomsvikings.0011.a: "Agarre quem pudermos, às armas!"
 fp1_jomsvikings.0011.a.tt_success: "Os piratas são cercados e destruídos"
 fp1_jomsvikings.0011.a.tt_failure: "[leader.GetTitledFirstNameNoTooltip|l] semeia o caos em sua fuga"
 fp1_jomsvikings.0011.b.benefactor: "Talvez [benefactor.GetTitledFirstNameNoTooltip|l] possa simplesmente nos enviar novos [ROOT.Char.GetFaith.PriestNeuterPlural]?"
 fp1_jomsvikings.0011.b.fallback: "Lamentável, mas podemos importar [ROOT.Char.GetFaith.PriestNeuterPlural] de reposição..."
 fp1_jomsvikings.0011.c: "`Recolha o gafol; é mais barato a longo prazo."
 fp1_jomsvikings.0011.c.tt: "[leader.GetTitledFirstName] recua sem incidentes"
 fp1_jomsvikings.0011.d: "Como isso pode ser algo além de um problema local?"
 fp1_jomsvikings.0011.d.tt: "Você deixa [target_county.GetNameNoTier] queimar"
 #Jomsvikings send Event Troops
 fp1_jomsvikings.0021.t: "Negociando com Piratas"
 fp1_jomsvikings.0021.desc: "Com certo receio, recebo uma delegação de valentões desordeiros do [leader.GetPrimaryTitle.GetNameNoTier], que me trazem uma carta de [leader.GetTitledFirstName|l].\n\nEstes fundamentalistas religiosos, ferozes saqueadores e pilhadores tanto no mar quanto em terra, são alguns dos piratas mais notórios e mortais do mundo.\n\nComo bom[ROOT.Char.Custom('ES_XA')] membro do povo [ROOT.Char.GetFaith.GetAdherentName], tenho ouvido histórias de sua devoção e destreza com uma mistura de admiração e temor. Agora parece que seu [leader.GetTitleAsNameNoTooltip] me oferece o comando desse bando de voluntários, contanto que eu os use para atacar e saquear em nome de [ROOT.Char.GetFaith.PantheonTerm]."
 fp1_jomsvikings.0021.a: "Piratas que recebem ordens? Intrigante..."
 fp1_jomsvikings.0021.a.tt: "O [army|lE] incluirá $jomsviking_pirates$ [men_at_arms|lE] especiais e difíceis de matar"
 fp1_jomsvikings.0021.b: "Apenas os marinheiros respeitáveis, acho."
 fp1_jomsvikings.0021.b.tt: "O [army|lE] incluirá $bondi$ [men_at_arms|lE] recrutáveis"
 fp1_jomsvikings.0021.c: "Prefiro meus soldados um pouco mais... disciplinados."
 #Jomsvikings challenge a Dishonorable Norse Pagan Ruler to Holmgang
 fp1_jomsvikings.0041.t: "Uma Desgraça para os Deuses"
 fp1_jomsvikings.0041.desc: "«¡#EMP [ROOT.Char.GetFirstNameNoTooltip]#!!» Grita [leader.GetTitledFirstName|l] ao entrar em minha sala do trono semidespido.\n\n«Seus atos pecaminosos e sua desonra flagrante são uma vergonha para os [leader.GetFaith.GetAdherentNamePlural] de todo o mundo e [leader.GetPrimaryTitle.GetNameNoTier] não tolerará mais isso. Sem desculpas, sem truques, faremos um holmgang, #EMP aquí#! e #EMP ahora!»#!\n\nDesconcertados, meus guardas agarram suas armas, prontos para agir contra o intruso a qualquer momento.\n\nFaça o que fizer, sem dúvida a notícia de minhas ações correrá pelo mundo inteiro."
 fp1_jomsvikings.0041.a: "Eu te enviarei para Valhalla com um sorriso!"
 fp1_jomsvikings.0041.a.tt: "Você entra imediatamente em uma [single_combat_fight|lE]"
 fp1_jomsvikings.0041.a.tt_success: "Você vence a luta"
 fp1_jomsvikings.0041.a.tt_failure: "[leader.GetTitledFirstName] vence a luta"
 fp1_jomsvikings.0041.b: "Você foi um[leader.Custom('ES_XA')] idiota por vir sozinho[leader.Custom('ES_OA')]. Guardas!"
 fp1_jomsvikings.0041.b.tt_success: "[leader.GetTitledFirstName] é acorrentad[leader.Custom('ES_OA')] e arrastad[leader.Custom('ES_OA')] para a masmorra"
 fp1_jomsvikings.0041.b.tt_failure: "[leader.GetTitledFirstName] escapa audaciosamente"
 fp1_jomsvikings.0041.c: "Você sabe que não passa de um[leader.Custom('ES_XA')] pirata pretensioso, não é? Agora pode ir andando."
 fp1_jomsvikings.0042.trigger_failure: "Sua luta contra [leader.GetTitledFirstNameNoTooltip|l] foi invalidada"
 fp1_jomsvikings.0044.t: "$fp1_jomsvikings.0041.t$: Vindicação"
 fp1_jomsvikings.0044.desc: "Com [leader.GetTitledFirstName|l] desabado[leader.Custom('ES_OA')] aos meus pés, sem vida, a sala do trono fica em um silêncio sepulcral. Não se ouve nem um sussurro, nem uma respiração além dos meus próprios arquejos ofegantes.\n\nCalmamente, visto minhas roupas novamente.\n\nOlho nos olhos de todas as pessoas que ainda estão aqui, uma por uma."
 fp1_jomsvikings.0044.a: "Alguém #EMP más#! quiere probar?"
 fp1_jomsvikings.0044.b: "A justiça do meu governo é mais uma vez comprovada!"
 fp1_jomsvikings.0044.c: "Isso simplesmente mostra quão indigna é a fé [leader.GetFaith.GetNameNoTooltip]..."
 #Jomsvikings Destroyed
 fp1_jomsvikings.1001.t: "Declínio dos Velhos Caminhos"
 fp1_jomsvikings.1001.desc.intro: "Com a queda de sua última fortaleza, o [title.GetNameNoTier] foi totalmente extinto.\n\n"
 fp1_jomsvikings.1001.desc.reformed_asatru_exists: "Apesar de todos os seus esforços para conter a maré da mudança, o cisma chegou à sua fé, como já havia acontecido antes com o cristianismo e o islamismo.\n\nSe os reformistas prevalecerem ou os fiéis sucumbirem a crenças estrangeiras,"
 fp1_jomsvikings.1001.desc.fallback: "No final, eles simplesmente não foram suficientes para resistir à maré de religiões estrangeiras e"
 fp1_jomsvikings.1001.desc.outro: "agora parece inevitável que a fé de [leader.GetFaith.GetName] esteja fadada ao lixo da história."
 fp1_jomsvikings.1001.holy_order_destroyed: "Os [title.GetNameNoTier] foram destruídos."
 fp1_jomsvikings.1001.a: "Os deuses nos abandonaram!"
 fp1_jomsvikings.1001.a.tt: "Os Jomsvikings não concederão mais bênçãos aos piedosos"
 fp1_jomsvikings.1001.b: "Boa riddance para o lixo ruim!"
 fp1_jomsvikings.1001.b.tt: "Os Jomsvikings não mais saquearão os incrédulos"
 fp1_jomsvikings.1001.c: "Yhomz-quem?"
 fp1_jomsvikings.1001.c.tt: "$fp1_jomsvikings.1001.b.tt$"
