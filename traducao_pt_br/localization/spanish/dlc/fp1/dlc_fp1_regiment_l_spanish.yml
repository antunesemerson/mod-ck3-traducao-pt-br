l_spanish:
 #Cultural MaA
 bondi: "Bondí"
 vigmen: "Vigmen"
 varangian_veterans: "Veteranos Varangianos"
 jomsviking_pirates: "Piratas Jomsviking"
 #MaA Flavour
 bondi_flavor: "#F Os Bondí fazem parte de uma classe de proprietários de terra livres, frequentemente marinheiros competentes, que usam navios longos para negociar ou sair em incursões vikings. Eles lutam usando lanças e escudos.#!"
 vigmen_flavor: "#F Guerreiros na frente apresentam uma parede impenetrável de escudos para proteger arqueiros na retaguarda. Essa tática detém escaramuçadores enquanto permite um avanço constante.#!"
 varangian_veterans_flavor: "#F Exploradores, aventureiros, guerreiros e mercenários de todas as colônias nórdicas distantes. Alguns até serviram na Guarda Varangiana.#!"
 jomsviking_pirates_flavor: "#F Alguns dos saqueadores mais notórios a navegar pelo Báltico, os Jomsvikings se destacam por semear o caos na batalha, prolongando-a antes de triunfar em suas consequências.#!"
