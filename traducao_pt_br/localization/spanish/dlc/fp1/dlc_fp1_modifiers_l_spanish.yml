l_spanish:
 ##################################################
 ##General Character Modifiers
 high_king_of_the_seas_fp1_modifier: "Alto-Rei dos Mares"
 high_king_of_the_seas_fp1_modifier_desc: "Este personagem é o governante incontestável do Mar do Norte, um supremo talassocrata."
 high_queen_of_the_seas_fp1_modifier: "Alta-Rainha dos Mares"
 high_queen_of_the_seas_fp1_modifier_desc: "$high_king_of_the_seas_fp1_modifier_desc$"
 defiant_high_king_conversion_boost_modifier: "Alto-Rei Desafiante"
 defiant_high_king_conversion_boost_modifier_desc: "Este personagem adora os Antigos Deuses e não se deterá diante de nada para demonstrar que os demais também deveriam.\n\nAcelera consideravelmente a velocidade de [convert_county|lE] contra as [faiths|lE] [Concept( 'organized', 'organizadas' )|E]"
 defiant_high_queen_conversion_boost_modifier: "Alta-Rainha Desafiante"
 defiant_high_queen_conversion_boost_modifier_desc: "$defiant_high_king_conversion_boost_modifier_desc$"
 scandinavian_adventurer_fp1_modifier: "Exilado Viking"
 scandinavian_adventurer_fp1_modifier_desc: "Este personagem fugiu da Escandinávia com um exército de bandidos e aventureiros, buscando conquistar um reino em outro lugar."
 nithing_fp1_modifier: "Nithing"
 nithing_fp1_modifier_desc: "Este personagem não é nada para os $north_germanic_group_collective_noun$, considerado morto, abaixo até de um escravo."
 stingy_host_fp1_modifier: "Anfitrião Mão-de-Vaca"
 stingy_host_fp1_modifier_desc: "Este personagem é conhecido por recusar até mesmo uma refeição quente para pessoas sem importância em sua corte."
 generous_host_fp1_modifier: "Anfitrião Generoso"
 generous_host_fp1_modifier_desc: "Este personagem é conhecido por tratar os viajantes com respeito, cortesia e uma refeição quente."
 phantom_island_trivia_fp1_modifier: "Mistérios do Atlântico"
 phantom_island_trivia_fp1_modifier_desc: "Este personagem lembra muitas histórias interessantes das ilhas misteriosas do Atlântico."
 phantom_island_critique_fp1_modifier: "Pensador Crítico"
 phantom_island_critique_fp1_modifier_desc: "Este personagem é notado por seu ceticismo em relação às histórias mirabolantes que alguns marinheiros contam."
 exotic_foreign_lord_fp1_modifier: "Senhor Estrangeiro Exótico"
 exotic_foreign_lord_fp1_modifier_desc: "Este personagem é conhecido no mundo islâmico como o suserano de um reino pagão estranho e intrigante."
 horrifying_foreign_lord_fp1_modifier: "Senhor Estrangeiro Horrível"
 horrifying_foreign_lord_fp1_modifier_desc: "Histórias abundam no mundo islâmico sobre os sacrifícios pagãos horripilantes que infestam o reino deste personagem."
 draugr_healthy_hiking_fp1_modifier: "Caminhadas Saudáveis"
 draugr_healthy_hiking_fp1_modifier_desc: "Este personagem passou uma quantidade imensa de tempo caminhando sem sucesso pelos terrenos selvagens de seu reino, caçando monstros."
 ultimate_blasphemer_modifier: "Blasfemador Supremo"
 ultimate_blasphemer_modifier_desc: "Este personagem sacrificou seu próprio [head_of_faith|lE] às divindades de outra [faith|lE]. Ninguém o considera um verdadeiro membro dos fiéis."
 embraced_local_traditions_modifier: "Abraçou as Tradições Locais"
 embraced_local_traditions_modifier_desc: "Este personagem anteriormente escandinavo abraçou a cultura e a fé de sua nova terra natal, embora ainda possa erguer #V Pedras Rúnicas#!."
 settled_norse_dynasty_modifier: "Dinastia Estabelecida"
 settled_norse_dynasty_modifier_desc: "Esta dinastia escandinava se estabeleceu em terras estrangeiras.\n#weak Enquanto este modificador durar, os governantes desta dinastia não serão alvos de aventureiros escandinavos.#!"
 fp1_focusing_on_rule_modifier: "Focando na Governança"
 fp1_focusing_on_rule_modifier_desc: "Este personagem está focado em governar, e apenas governar, à custa de outras demandas da vida."
 fp1_ignoring_annoyances_modifier: "Ignorando Irritações"
 fp1_ignoring_annoyances_modifier_desc: "Este personagem não tem tempo para irritações e caprichos infantis."
 fp1_avoiding_the_snow_modifier: "Evitando a Neve"
 fp1_avoiding_the_snow_modifier_desc: "Este personagem foi repreendido por passar muito tempo ao frio."
 fp1_daydreaming_about_diplomacy_modifier: "Sonhando com Diplomacia"
 fp1_daydreaming_about_diplomacy_modifier_desc: "Este personagem passou muito tempo mentalmente planejando políticas diplomáticas."
 fp1_daydreaming_about_martial_modifier: "Sonhando com Estratégia"
 fp1_daydreaming_about_martial_modifier_desc: "Este personagem passou muito tempo mentalmente planejando guerras futuras."
 fp1_daydreaming_about_stewardship_modifier: "Sonhando com Ouro"
 fp1_daydreaming_about_stewardship_modifier_desc: "Este personagem passou muito tempo mentalmente planejando como aumentar os impostos futuros."
 fp1_daydreaming_about_intrigue_modifier: "Sonhando com Conspirações"
 fp1_daydreaming_about_intrigue_modifier_desc: "Este personagem passou muito tempo mentalmente avaliando quem está próximo na lista."
 fp1_daydreaming_about_learning_modifier: "Sonhando com Livros"
 fp1_daydreaming_about_learning_modifier_desc: "Este personagem passou muito tempo pensando em seus livros preferidos."
 fp1_excellent_longships_modifier: "Excelentes Navios Longos"
 fp1_excellent_longships_modifier_desc: "A frota deste personagem corta as ondas como uma lâmina através de um monge."
 fp1_rotting_longships_modifier: "Longships Apodrecendo"
 fp1_rotting_longships_modifier_desc: "A frota deste personagem mal consegue navegar."
 fp1_flagship_leviathan_modifier: "Flagship Leviathan"
 fp1_flagship_leviathan_modifier_desc: "El barco personal de este personaje es #EMP enorme#!, capaz de contener una absurda cantidad de botines."
 fp1_flagship_monster_modifier: "Flagship Monstruoso"
 fp1_flagship_monster_modifier_desc: "O navio pessoal deste personagem é adornado com esculturas de animais, monstros, mitos e sofrimento. Muitas das figuras se assemelham aos seus vassalos e inimigos."
 fp1_flagship_dragon_modifier: "Flagship de Dragão"
 fp1_flagship_dragon_modifier_desc: "O navio pessoal deste personagem é lendário, sua aparência distinta é conhecida em todo o mundo."
 fp1_cursed_by_nithing_pole_modifier: "Amaldiçoado pelo Poste Nithing"
 fp1_cursed_by_nithing_pole_modifier_desc: "Este personagem foi amaldiçoado fatalmente por um poste de infâmia. #EMP Sabe#! que seu fim se aproxima, mas não quando, e o medo o está comendo #EMP vivo#!."
 fp1_bathing_health_modifier: "Banho Rigoroso"
 fp1_bathing_health_modifier_desc: "Este personagem mantém uma agenda de banho impecável, lava as mãos antes das refeições e sempre tem uma toalha quente para os convidados."
 fp1_bathing_attraction_modifier: "Apresentação Impecável"
 fp1_bathing_attraction_modifier_desc: "Este personagem está sempre impecavelmente arrumado: dentes raspados, cabelos penteados, orelhas limpas, pele lavada e sem sequer um sussurro de piolho."
 fp1_yearly_0071_troll_victory_bear_modifier: "Matador de Ursos"
 fp1_yearly_0071_troll_victory_bear_modifier_desc: "Este personagem é reputado por ter matado um troll ou o maior urso do mundo."
 fp1_yearly_0071_troll_victory_wolf_modifier: "Matador de Lobos"
 fp1_yearly_0071_troll_victory_wolf_modifier_desc: "Este personagem matou um lobo tão rápido que o povo comum acreditou que era um troll."
 fp1_yearly_0071_troll_victory_wolverine_modifier: "Matador de Wolverines"
 fp1_yearly_0071_troll_victory_wolverine_modifier_desc: "Este personagem matou um wolverine tão feroz que o povo comum acreditou que era um troll, mantendo as terras selvagens seguras."
 fp1_yearly_0071_troll_victory_lynx_modifier: "Matador de Lince"
 fp1_yearly_0071_troll_victory_lynx_modifier_desc: "Este personagem matou uma lince tão silenciosa que os plebeus acreditaram ser um troll."
 fp1_yearly_0071_troll_victory_moose_modifier: "Matador de Alces"
 fp1_yearly_0071_troll_victory_moose_modifier_desc: "Este personagem matou um alce tão raivoso que os plebeus acreditaram ser um troll."
 fp1_yearly_0551_absent_lord_modifier: "Governante Ausente"
 fp1_yearly_0551_absent_lord_modifier_desc: "Este personagem, por alguma razão, parece nunca estar presente na própria corte. Especialmente durante a hora do jantar."
 fp1_abased_before_highgod_modifier: "Onde o verdadeiro poder reside"
 fp1_abased_before_highgod_modifier_desc: "Este personaje se niega a ponerse la corona, e insiste en que el #EMP verdadero#! poder solo reside en la divinidad."
 harald_tanglehairs_vow_modifier: "Voto dos Cabelos Emaranhados"
 harald_tanglehairs_vow_modifier_desc: "Este personagem fez um voto vitalício: ele nunca irá cortar ou pentear seus cabelos até se tornar o primeiro rei da Noruega."
 harald_tanglehairs_reminder_modifier: "Voto dos Cabelos Emaranhados Cumprido"
 harald_tanglehairs_reminder_modifier_desc: "Este personagem cumpriu com sucesso um voto vitalício: não cortar ou pentear seus cabelos até se tornar o Rei da Noruega. Ele continua a mantê-lo agora como uma lembrança de sua jornada."
 harald_tanglehairs_vow_broken_modifier: "Voto dos Cabelos Emaranhados Quebrado"
 harald_tanglehairs_vow_broken_modifier_desc: "Este personagem falhou em cumprir um voto vitalício: como ele não se tornou o primeiro rei da Noruega, ele nunca poderá cortar ou pentear seus cabelos."
 fp1_0511_carries_stinking_trophy_modifier: "Troféu Fedorento"
 fp1_0511_carries_stinking_trophy_modifier_desc: "Este personagem é acompanhado por um troféu apodrecido e cheio de larvas literalmente em todos os lugares que ele vai. Alguns dizem que o mau cheiro se estende por quilômetros."
 fp1_reprieve_from_sa_modifier: "Alívio dos Aventureiros Escandinavos"
 fp1_reprieve_from_sa_modifier_desc: "De alguma forma, este personagem conseguiu obter um alívio das implacáveis hordas vikings.\n$EFFECT_LIST_BULLET$ Não será atacado por Aventureiros Escandinavos sem terras."
 ##################################################
 ##Shieldmaiden Character Modifiers
 shieldmaiden_level_martial_1_fp1_modifier: "Comandante Experiente"
 shieldmaiden_level_martial_1_fp1_modifier_desc: "Este personagem trabalhou mais do que muitos para melhorar o seu comando de soldados."
 shieldmaiden_level_martial_2_fp1_modifier: "Comandante Veterano"
 shieldmaiden_level_martial_2_fp1_modifier_desc: "$shieldmaiden_level_martial_1_fp1_modifier_desc$"
 shieldmaiden_level_martial_3_fp1_modifier: "Comandante Incansável"
 shieldmaiden_level_martial_3_fp1_modifier_desc: "$shieldmaiden_level_martial_1_fp1_modifier_desc$"
 shieldmaiden_level_prowess_1_fp1_modifier: "Lutadora Experiente"
 shieldmaiden_level_prowess_1_fp1_modifier_desc: "Este personagem parece nunca parar de praticar com uma espada."
 shieldmaiden_level_prowess_2_fp1_modifier: "Lutadora Famosa"
 shieldmaiden_level_prowess_2_fp1_modifier_desc: "$shieldmaiden_level_prowess_1_fp1_modifier_desc$"
 shieldmaiden_level_prowess_3_fp1_modifier: "Lutadora Lendária"
 shieldmaiden_level_prowess_3_fp1_modifier_desc: "$shieldmaiden_level_prowess_1_fp1_modifier_desc$"
 shieldmaiden_level_intrigue_1_fp1_modifier: "Traiçoeira Astuta"
 shieldmaiden_level_intrigue_1_fp1_modifier_desc: "Este personagem está sempre procurando oportunidades para tirar vantagem de seus inimigos."
 shieldmaiden_level_intrigue_2_fp1_modifier: "Traidora Notória"
 shieldmaiden_level_intrigue_2_fp1_modifier_desc: "$shieldmaiden_level_intrigue_1_fp1_modifier_desc$"
 shieldmaiden_level_intrigue_3_fp1_modifier: "Traidora Infame"
 shieldmaiden_level_intrigue_3_fp1_modifier_desc: "$shieldmaiden_level_intrigue_1_fp1_modifier_desc$"
 ##################################################
 ##County Modifiers
 nithing_exiled_fp1_modifier: "Nithing Local Exilado"
 nithing_exiled_fp1_modifier_desc: "As comunidades locais podem ficar tranquilas sabendo que um canalha foi punido devidamente."
 nithing_harboured_fp1_modifier: "Nithing Local Abrigado"
 nithing_harboured_fp1_modifier_desc: "As comunidades locais detestam o apoio do senhorio a um canalha conhecido."
 nithing_in_limbo_fp1_modifier: "Tensões de Classe"
 nithing_in_limbo_fp1_modifier_desc: "Certos elementos da corte entram em conflito regularmente com as comunidades locais."
 draugr_remedies_succeeded_fp1_modifier: "Draugr Expulso"
 draugr_remedies_succeeded_fp1_modifier_desc: "De uma forma ou de outra, o cadáver ressuscitado que certamente assombrou este condado foi eliminado."
 draugr_remedies_failed_fp1_modifier: "Draugr Assombra os Locais"
 draugr_remedies_failed_fp1_modifier_desc: "Apesar dos melhores esforços dos vivos, este condado está infestado de pragas, maldições e infortúnios."
 draugr_monstrous_wolfpack_fp1_modifier: "Uivos na Noite"
 draugr_monstrous_wolfpack_fp1_modifier_desc: "Uma alcateia anormalmente faminta e agressiva de lobos ronda as terras selvagens deste condado, rasgando o gado e os viajantes solitários em pedaços."
 draugr_monstrous_bear_fp1_modifier: "Terras Selvagens Inseguras"
 draugr_monstrous_bear_fp1_modifier_desc: "Um urso colossal ataca aleatoriamente neste condado, às vezes levando apenas uma vaca, outras vezes assassinando famílias inteiras."
 draugr_nithing_fp1_modifier: "Fora-da-lei Fantasmagórico"
 draugr_nithing_fp1_modifier_desc: "Alguns os chamam de um cadáver ambulante, outros apenas de um ladrão silencioso, mas todos concordam que um fantasma cleptomaníaco assedia os moradores locais."
 draugr_nothing_found_fp1_modifier: "Camponeses Supersticiosos"
 draugr_nothing_found_fp1_modifier_desc: "Apesar dos melhores esforços de seu senhorio para provar o contrário, a população local insiste que são perseguidos pelos mortos-vivos ressuscitados."
 capital_of_rus_opinion_modifier: "Uma Capital em Crescimento"
 capital_of_rus_opinion_modifier_desc: "A constante entrada de bens, comerciantes e escravos para este condado deixou seu povo totalmente satisfeito."
 capital_of_rus_misc_benefits_modifier: "Capital Varangiana"
 capital_of_rus_misc_benefits_modifier_desc: "Este asentamiento es #EMP el#! emporio regional para eslavos y nórdicos por igual, que disfruta de amplios beneficios por ser el hogar de innumerables bandas de aventureros, conquistadores y piratas."
 held_grand_sacrifice_fp1_modifier: "Participou do Grande Sacrifício"
 held_grand_sacrifice_fp1_modifier_desc: "Os camponeses deste condado descansam tranquilos, sabendo que os deuses sorriem para aqueles que pagam tributo."
 commoners_grand_sacrifice_fp1_modifier: "Foi ao Grande Sacrifício do Povo"
 commoners_grand_sacrifice_fp1_modifier_desc: "Os camponeses deste condado ainda falam sobre como se misturaram livremente com a nobreza no último grande banquete realizado em honra de seus deuses."
 held_human_sacrifice_fp1_modifier: "Horrorizado com o Sacrifício Humano"
 held_human_sacrifice_fp1_modifier_desc: "A população camponesa está em armas por ser governada por um personagem que pratica o assassinato ritual de outros seres humanos."
 trade_instead_of_raid_fp1_modifier: "Ligações Comerciais de Saqueadores"
 trade_instead_of_raid_fp1_modifier_desc: "Este condado se beneficiou amplamente do comércio com possíveis saqueadores em vez de lutar contra eles, os habitantes mais ricos usando trajes e bugigangas exóticas arrancadas de terras estrangeiras."
 fp1_stele_ancestors_strong: "Pedra Rúnica Ancestral"
 fp1_stele_ancestors_strong_custom_desc: "[ROOT.Char.Custom2_Title('SteleCommemoratesAncestors', SCOPE.sTitle('stele_location'))]"
 fp1_stele_ancestors_weak: "$fp1_stele_ancestors_strong$"
 fp1_stele_conquest_strong: "Pedra Rúnica de Conquista"
 fp1_stele_conquest_strong_custom_desc: "[ROOT.Char.Custom2_Title('SteleCommemoratesConquest', SCOPE.sTitle('stele_location'))]"
 fp1_stele_conquest_weak: "$fp1_stele_conquest_strong$"
 fp1_stele_promotion_strong: "Pedra Rúnica de Prestígio"
 fp1_stele_promotion_strong_custom_desc: "[ROOT.Char.Custom2_Title('SteleCommemoratesPromotion', SCOPE.sTitle('stele_location'))]"
 fp1_stele_promotion_weak: "$fp1_stele_promotion_strong$"
 fp1_yearly_0591_levy_modifier: "Apoiado em Ting"
 fp1_yearly_0591_levy_modifier_desc: "Pequenos dramas no Ting local recentemente concederam a este condado terras fronteiriças, fazendo surgir novas vilas."
 fp1_yearly_0591_building_modifier: "Vindicado em Ting"
 fp1_yearly_0591_building_modifier_desc: "Capital político no Ting local permitiu a este condado reivindicar vários territórios fronteiriços menores, dando espaço suficiente para expandir assentamentos existentes."
 fp1_yearly_0591_spurned_modifier: "Se Sente Rejeitado"
 fp1_yearly_0591_spurned_modifier_desc: "Os moradores deste condado sabem com #EMP certeza#! que seu senhor prefere um condado rival ao deles."
 fp1_yearly_0591_otherwise_occupied_modifier: "Ocupado de outra forma"
 fp1_yearly_0591_otherwise_occupied_modifier_desc: "Este condado está ocupado lutando contra seus rivais próximos para incitar a agitação contra seu senhor."
 fp1_yearly_0071_troll_attacks_modifier: "Ataques de trolls"
 fp1_yearly_0071_troll_attacks_modifier_desc: "Há algo #EMP assustador#! nas selvas deste condado, aterrorizando e até matando os moradores locais."
 fp1_mann_pirate_capital_modifier: "A cidade roubada"
 fp1_mann_pirate_capital_modifier_desc: "A capital local ganhou seu apelido através de sangue, medo e trabalho árduo. O trabalho árduo é de origem local, mas o sangue e o medo vêm do exterior. Regularmente."
 fp1_trade_events_foreign_architects_modifier: "Arquitetos estrangeiros"
 fp1_trade_events_foreign_architects_modifier_desc: "Arquitetos estrangeiros trazem as últimas tendências e técnicas de construção do exterior."
 fp1_trade_events_foreign_architects_no_growth_modifier: "Assistência estrangeira"
 fp1_trade_events_foreign_architects_no_growth_modifier_desc: "Arquitetos estrangeiros trazem as últimas tendências do exterior, embora não possam fazer muito para melhorar as sofisticadas construções locais."
 fp1_trade_events_raid_consultants_modifier: "Veteranos dos saques residem aqui"
 fp1_trade_events_raid_consultants_modifier_desc: "Grupos de veteranos saqueadores foram pagos com um prêmio para proteger este condado contra outros de sua laia."
 ##################################################
 ##Dynasty Modifiers
 fp1_legacy_of_piracy_modifier: "Legado da Pirataria"
 fp1_legacy_of_piracy_modifier_desc: "Esta dinastia remonta sua origem ao maior pirata e saqueador da época; mar, sal e fumaça estão sempre em seu sangue e em seus lábios.\n\nPode [Concept( 'raid', 'asaltar' )|E], independentemente do tipo de [government|lE].\nPode saquear no exterior e navegar pelos Grandes Rios"
 ##################################################
 ##Religion Modifiers
 gruesome_festivals_designated_sacrifice_fp1_modifier: "Em breve será sacrificado"
 gruesome_festivals_designated_sacrifice_fp1_modifier_desc: "Este personagem é um [designate_chief_sacrifice_chief_sacrifice|lE] designado."
 fp1_jomsvikings_caused_faith_crisis_modifier: "Crise de Fé"
 fp1_jomsvikings_caused_faith_crisis_modifier_desc: "Uma altercação com o líder de uma ordem sagrada fez com que este personagem duvidasse de suas crenças."
