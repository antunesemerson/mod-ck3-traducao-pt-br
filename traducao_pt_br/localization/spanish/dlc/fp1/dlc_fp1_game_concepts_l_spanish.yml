 game_concept_varangian_adventure_desc: "û um tipo especial de [war|lE] em que o atacante busca mover todo o seu [realm|lE] para o [war_target|lE].\n\nSe vencer, anexarûÀ imediatamente os [counties|lE] apropriados e moverûÀ sua [capital|lE] para lûÀ. Seus antigos vassalos se tornarûÈo independentes, e seus antigos condados serûÈo entregues a novos senhores locais ambiciosos. As $game_concept_varangian_adventures$ estûÈo disponûÙveis #EMP APENAS#! para [rulers|lE] de [title_tier|lE] de $game_concept_count$ e [duke|lE], tornando-se progressivamente mais caras a cada $game_concept_varangian_adventure_adventure$ bem-sucedida.\n\nEste [casus_belli|lE] #EMP NUNCA#! estarûÀ disponûÙvel depois da [era|lE] $culture_era_tribal$ e nûÈo pode ser usado contra outras [cultures|lE] que possam realizar uma $game_concept_varangian_adventure_adventure$ ou contra $game_concept_rulers$ vizinhos.\n\nOs $north_germanic_group_collective_noun$ que iniciarem sua primeira $game_concept_varangian_adventure$ recebem atûˋ [EmptyScope.ScriptValue('varangian_adventurers_standard_levy_cap_value')|0] de bûÇnus em [special_troops|lE]. A quantidade aumenta a cada condado da mesma [faith|lE] e da mesma [culture|lE] que controlarem totalmente dentro de [GetGeographicalRegion('dlc_fp1_region_core_mainland_scandinavia').GetName]."
