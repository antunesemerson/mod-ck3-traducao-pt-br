l_spanish:
 action_can_challenge_to_single_combat: "Criminosos Distantes Podem Ser Desafiados"
 action_can_challenge_to_single_combat_label: "Você pode desafiar [recipient.GetShortUINameNoTooltip] a um julgamento por combate"
 action_can_challenge_to_single_combat_combined_label: "[recipient.GetShortUINameNoTooltip]"
 action_can_challenge_to_single_combat_desc: "[recipient.GetUIName] cometeu [crimes|lE] contra você ([recipient.GetImprisonmentReasons( actor.Self )]), mas não pode ser [Concept( 'imprisoned', 'preso' )|E], o que permite que você desafie [recipient.GetHerHim] para um [trial_by_combat|lE].$action_can_challenge_to_single_combat_HELP$"
 action_can_challenge_to_single_combat_click: "#I Clique para desafiar [recipient.GetHerHim]#!"
 action_can_challenge_to_single_combat_combined_group_label: "Pode desafiar criminosos a um julgamento por combate"
 action_can_challenge_to_single_combat_combined_group_name: "Pode desafiar criminosos para um $game_concept_trial_by_combat$"
 action_can_challenge_to_single_combat_combined_group_description: "Outros [characters|lE] cometeram [crimes|lE] contra você ([recipient.GetImprisonmentReasons( actor.Self )]), mas não podem ser [Concept( 'imprisoned', 'presos' )|E], permitindo que você os desafie para [trials_by_combat|lE].$action_can_challenge_to_single_combat_HELP$"
 action_can_challenge_to_single_combat_combined_unimportant: "@warning_icon! #X Nenhum dos criminosos é importante para você#!"
 action_can_challenge_to_single_combat_unimportant: "@warning_icon! #X [recipient.GetSheHe|U] não é importante para você#!"
 action_can_challenge_to_single_combat_HELP: "\n\n#help Como [ruler|lE], você não precisa desafiar todo [criminal|lE]. Às vezes é melhor esperar até conseguir uma oportunidade para [imprison|lE]. Cuidado ao desafiar personagens com [prowess|lE] alta, pois todos os [trials_by_combat|lE] são travados como [single_combat_fight_plural|lE].#!"
 action_can_make_shieldmaiden: "Pode Tornar Escudeira"
 action_can_make_shieldmaiden_label: "Você pode transformar [recipient.GetShortUINameNoTooltip] em [recipient.Custom('ShieldPersonFemaleMale')]"
 action_can_make_shieldmaiden_combined_label: "[recipient.GetShortUINameNoTooltip]"
 action_can_make_shieldmaiden_desc: "[recipient.GetUIName] tem uma [skill|lE] de [prowess|lE] alta e aceitaria se tornar uma [recipient.Custom('ShieldPersonFemaleMale')].$action_can_make_shieldmaiden_HELP$"
 action_can_make_shieldmaiden_click: "#I Clique para tornar [recipient.Custom('ShieldPersonFemaleMale')]#!"
 action_can_make_shieldmaiden_combined_group_label: "Pode tornar [recipient.Custom('ShieldPersonsFemaleMale')]"
 action_can_make_shieldmaiden_combined_group_name: "Pode tornar [recipient.Custom('ShieldPersonsFemaleMale')]"
 action_can_make_shieldmaiden_combined_group_description: "Vários membros da [close_family|lE] têm uma [skill|lE] de [prowess|lE] alta e aceitariam se tornar [recipient.Custom('ShieldPersonsFemaleMale')].$action_can_make_shieldmaiden_HELP$"
 action_can_make_shieldmaiden_HELP: "\n\n#help Ter pelo menos um[recipient.Custom('ES_XA')] [recipient.Custom('ShieldPersonFemaleMale')] pode ser muito benéfico. El[recipient.Custom('ES_EA')] melhorará suas habilidades continuamente e pode até salvar você de uma [Concept( 'scheme', 'conspiração' )|E] de [GetScheme('murder').GetTypeName|l].\n\nNo entanto, você não deve transformar todo membro da [close_family|lE] em [recipient.Custom('ShieldPersonFemaleMale')], a menos que tenha [prestige|lE] sobrando.#!"
