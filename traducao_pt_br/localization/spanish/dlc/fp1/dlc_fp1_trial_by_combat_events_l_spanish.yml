l_spanish:
 #TbC Misc Loc Keys
 fp1_tbc.0000.t: "Duelo a Golpes"
 #TbC about to begin.
 fp1_tbc.0001.t: "$fp1_tbc.0000.t$: [duel_location.GetBaseNameNoTierNoTooltip]"
 fp1_tbc.0001.desc.intro: "Chego no local designado perto de [duel_location.GetBaseNameNoTier] a tempo e encontro [champion.GetTitledFirstName|l] já me esperando, junto com um pequeno grupo de testemunhas."
 fp1_tbc.0001.desc.recipient_fighting: "\n\nSeja como for, [champion.GetFirstNameNoTooltip] está em condições de lutar e dispost[champion.Custom('ES_OA')] enfrentar-me de [champion.GetWomanMan] a [actor.GetWomanMan]."
 fp1_tbc.0001.desc.recipient_has_champion: "Como [recipient.GetTitledFirstName|l] não está em condições de lutar, [champion.GetFirstNameNoTooltip] aceitou servir como seu campeão."
 fp1_tbc.0001.desc.outro: "\n\nAs formalidades são breves. Todos sabemos por que estamos aqui e estamos muito além do ponto de falar. As armas são distribuídas e nossos grupos de segurança recuam para observar de uma distância segura."
 fp1_tbc.0001.trigger_failure.actor: "Meu [trial_by_combat_trial|lE] contra [recipient.GetFirstNameNoTooltip] foi invalidado."
 fp1_tbc.0001.trigger_failure.recipient: "Meu [trial_by_combat_trial|lE] contra [actor.GetFirstNameNoTooltip] foi invalidado."
 fp1_tbc.0001.a: "Que vença o melhor."
 fp1_tbc.0001.a.tt: "O [trial_by_combat|lE] começa!"
 #TbC has invalidated.
 fp1_tbc.0021.trigger_failure.actor: "$fp1_tbc.0001.trigger_failure.actor$"
 fp1_tbc.0021.trigger_failure.recipient: "$fp1_tbc.0001.trigger_failure.recipient$"
 fp1_tbc.0031.opening: "[recipient.Custom2('AppropriateGreeting',actor)]"
 fp1_tbc.0031.desc: "Lutar contra #EMP vos#!? Talvez vocês devessem considerar se aposentar e assumir o manto de bobo da corte, pois não há nenhuma chance de isso acontecer.\n\nFiquem à vontade para continuar mandando pilhérias para [recipient.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 fp1_tbc.0031.a: "Essa espécie de [recipient.Custom2('InsultNoun', SCOPE.sC('actor'))] [recipient.Custom2('InsultAdjective', SCOPE.sC('actor'))]!"
 #Scope:actor won a TbC.
 fp1_tbc.0041.t: "$fp1_tbc.0000.t$: Vitória!"
 fp1_tbc.0041.desc.intro: "Descansando tranquilamente de volta em [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], exulto em meu sucesso, minha [actor.Custom('signature_weapon')] repousando em meu colo.\n\n"
 fp1_tbc.0041.desc.opponent_died: "O sangue de [champion.GetTitledFirstName|l] ainda está seco em sulcos e entalhes frescos ao longo da [recipient.Custom('ES_EA')] [recipient.GetWomanMan], lembrando-me dos últimos momentos de"
 fp1_tbc.0041.desc.opponent_lives.recipient_fighting: "As satisfatórias pontadas e dores que se propagam pelo meu corpo me lembram de pequenos momentos no combate, pequenas vitórias e derrotas travadas com ferocidade, cada uma conduzindo à derrota de [recipient.GetTitledFirstName|l]."
 fp1_tbc.0041.desc.opponent_lives.recipient_has_champion: "Em um mundo ideal, eu teria conseguido desferir o golpe final decisivo em [recipient.GetTitledFirstName|l]. Infelizmente, não foi possível; acabar com [champion.GetTitledFirstName|l]."
 fp1_tbc.0041.desc.reward.gold: "\n\nUm saco de prata descansa contra minha canela, o peso satisfatório é um testemunho da justiça bem feita. Eu contei cada moeda, uma por uma, na frente de #EMP todos#! antes de voltarmos para casa."
 fp1_tbc.0041.desc.reward.weak_hook: "\n\nLevou uma hora ou mais para que o último dos juramentos fosse prestado diante de nossas testemunhas reunidas. Um dia, eu vou invocar esses juramentos e receber meu pagamento integral."
 fp1_tbc.0041.desc.reward.humiliation: "\n\nA longa e arrastada desculpa, a humilhação, tudo testemunhado por um bando de poetas contratados... simplesmente #EMP glorioso#!. Pode levar anos até que [recipient.GetFirstNameNoTooltip] se recupere dessa humilhação."
 fp1_tbc.0041.desc.outro: "\n\nOntem, levamos nossa disputa até [actor.GetFaith.PantheonTerm], e este respondeu com sabedoria."
 fp1_tbc.0041.a: "A justiça foi feita."
 #Scope:actor lost a TbC.
 fp1_tbc.0051.t: "$fp1_tbc.0000.t$: Derrota!"
 fp1_tbc.0051.desc.intro: "Como isso chegou a esse ponto? Eu fui diante de [actor.GetFaith.PantheonTerm] para buscar #EMP justiça#!, e sou recompensado com sofrimento e humilhação. Não disse uma palavra durante toda a viagem de volta para [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\n"
 fp1_tbc.0051.desc.opponent_lives.recipient_fighting: "Não entendo como me venceu [recipient.GetTitledFirstName|l]. Eu estava com a #EMP razón#!. Se #EMP suponía#! que eu ia vencer, esse é o objetivo de um duelo judicial."
 fp1_tbc.0051.desc.opponent_lives.recipient_has_champion: "É #EMP obvio#! que numa luta justa eu teria vencido [recipient.GetFirstName]! Malditas sejam mil vezes estas tradições incômodas e [champion.GetTitledFirstName|l]!"
 fp1_tbc.0051.desc.outro: "\n\nAgora o mundo todo considera nossos problemas resolvidos e a justiça ter sido aplicada."
 fp1_tbc.0051.a: "Pah, não houve justiça aqui."
 #Scope:recipient must designate a champion to fight for them.
 fp1_tbc.0101.t: "$fp1_tbc.0000.t$: Selecionando um Campeão"
 fp1_tbc.0101.desc: "Aceitei o pedido de [actor.GetTitledFirstName|l] de um julgamento por combate, mas não seria apropriado para mim lutar contra [actor.GetSheHe] pessoalmente.\n\nA tradição exige que eu escolha um campeão para lutar em meu nome, mas quem devo escolher?"
 fp1_tbc.0101.bout_moves_forward: "A luta segue em frente..."
 fp1_tbc.0101.a: "[knight_best.GetTitledFirstNameNoTooltip|l] é um[knight_best.Custom('ES_XA')] dos meus melhores $knight_culture_player_plural_no_tooltip_lowercase$!"
 fp1_tbc.0101.a.tt: "[knight_best.GetTitledFirstName] lutará por você"
 fp1_tbc.0101.b: "[knight_alternative.GetTitledFirstNameNoTooltip|l] é uma boa alternativa…"
 fp1_tbc.0101.b.tt: "[knight_alternative.GetTitledFirstName] lutará por você"
 fp1_tbc.0101.c: "Dizem que [knight_exotic.GetTitledFirstNameNoTooltip|l] é habilidos[knight_exotic.Custom('ES_OA')] na luta?"
 fp1_tbc.0101.c.tt: "[knight_exotic.GetTitledFirstName] lutará por você"
 fp1_tbc.0101.d: "O amor de [knight_opinion.GetTitledFirstNameNoTooltip|l] me protegerá."
 fp1_tbc.0101.d.tt: "[knight_opinion.GetTitledFirstName] lutará por você"
 fp1_ep1_tbc.0101.e: "Meu $champion_court_position$ já designado, [knight_alternative.GetTitledFirstNameNoTooltip|l], me representará."
 fp1_ep1_tbc.0101.e.tt: "[knight_alternative.GetTitledFirstName] lutará por você"
 #Scope:recipient won a TbC.
 fp1_tbc.0111.t: "$fp1_tbc.0000.t$: Vitória!"
 fp1_tbc.0111.desc.intro: "[recipient.GetFaith.PantheonTerm|U] sorriu calorosamente para mim ontem!"
 fp1_tbc.0111.desc.opponent_died.recipient_fighting: "\n\nFecho os olhos. Ainda consigo sentir a adrenalina correndo pelas minhas veias, os músculos tremendo com o fantasma da luta, congelados no instante em que a vida de [actor.GetTitledFirstName|l] foi ceifada e minha vitória estava assegurada."
 fp1_tbc.0111.desc.opponent_lives.recipient_fighting: "\n\nNão só pude bater em [actor.GetFirstName] até deixá-lo ensanguentado por sua temeridade, mas também provei conclusivamente que suas acusações caluniosas eram completamente infundadas."
 fp1_tbc.0111.desc.opponent_lives.recipient_has_champion: "\n\nAssistir a [champion.GetFirstName] espancar [actor.GetFirstName] até que ele ficasse quase morto foi ainda mais doce sabendo que a sua vitória me absolve de toda culpa."
 fp1_tbc.0111.desc.outro: "\n\nTalvez o próximo tolo pense duas vezes antes de desafiar [recipient.GetTitledFirstNameNicknamedNoTooltip] para uma luta!"
 fp1_tbc.0111.a: "$fp1_tbc.0041.a$"
 #Scope:recipient lost a TbC.
 fp1_tbc.0121.t: "$fp1_tbc.0000.t$: Derrota!"
 fp1_tbc.0121.desc.intro: "[recipient.GetFaith.PantheonTerm|U] não sorriu para mim ontem."
 fp1_tbc.0121.desc.champion_lives.recipient_fighting: "As dores e cortes que cobrem meu corpo dão testemunho disso, cada um um presente da arma de [actor.GetFirstName]. Tenho sorte de estar vivo."
 fp1_tbc.0121.desc.champion_lives.recipient_has_champion: "Quando escolhi a [champion.GetTitledFirstName|l] estava segur[ROOT.Char.Custom('ES_OA')] de que esmagaria [actor.GetTitledFirstName|l], mas [champion.GetFirstName] tem sorte de estar viva."
 fp1_tbc.0121.desc.reward.gold: "\n\nQuando [actor.GetFirstNameNoTooltip] pegou sua prata, insistiu em contá-la moeda por moeda, obrigando-nos a assistir enquanto se deleitava com o desgosto de minha comitiva."
 fp1_tbc.0121.desc.reward.weak_hook: "\n\nPareceu uma hora até que o último dos juramentos de dívida fosse feito e selado na frente de nossas testemunhas. Algum dia, [actor.GetFirstNameNoTooltip] voltará para cobrar a dívida."
 fp1_tbc.0121.desc.reward.humiliation: "\n\nLer a incoerente \"desculpa\" de [actor.GetFirstNameNoTooltip] levou uma eternidade, e eu passei o tempo todo rangendo os dentes enquanto engasgava com as palavras. Os poetas a seu soldo ficaram rindo ao fundo, memorizando cada uma das minhas expressões."
 fp1_tbc.0121.desc.outro: "\n\nA vitória foi para um[actor.Custom('ES_XA')] tolo vulgar[actor.Custom('ES_OA')]."
 fp1_tbc.0121.a: "$fp1_tbc.0051.a$"
