l_spanish:
 HISTORICAL_CHARACTER_TOOLTIP: "#T Personaje histórico#!\n\n#high [Character.Custom('HistoricalCharacterDesc')]#!\n\n#weak Este personaje es histórico, pero puede desviarse de su equivalente de la vida real en función de la [culture|lE] y [faith|lE] de su lugar de origen. También puede aparecer ligeramente fuera de su fecha histórica de relevancia de 1 a 5 años.#!"
 danger_dynasty_abandon_tt: "#X @warning_icon! Você abandonará sua [dynasty|lE] e não poderá voltar a jogar com ela!#!"
 will_wander_tt: "[historical_character.GetFullName] se tornará um [wanderer|lE]"
 historical_char_creation_events.t: "Ecos da História: [historical_character.GetFullNameNicknamedNoTooltip]"
 historical_char_creation_events.desc: "Diz-se que [historical_character.Custom('HistoricalCharacterJobDesc')], mais conhecid[historical_character.Custom('ES_OA')] como [historical_character.GetFullNameNicknamed], vaga pelo meu domínio em busca de emprego. Vem de [birth_location.GetName] e tem um certo ar em torno de si… [historical_character.Custom('DescriptorPositiveStandalone')], mas um tanto [historical_character.Custom('DescriptorNegativeStandalone')].\n\n\n@historical_character_icon! #weak Este personaje es histórico:#!\n#help_light_background [historical_character.Custom('HistoricalCharacterDesc')]#!"
 historical_char_creation_events_alternative.desc: "[historical_character.Custom('HistoricalCharacterJobDesc')], mais conhecid[historical_character.Custom('ES_OA')]o como [historical_character.GetFullNameNicknamed], ganhou fama na corte. É [historical_character.Custom('DescriptorPositiveStandalone')] e, embora eu não saiba dizer o quê, há algo extraordinário em [historical_character.GetSheHe]…\n\n\n@historical_character_icon! #weak Este personaje es histórico:#!\n#help_light_background [historical_character.Custom('HistoricalCharacterDesc')]#!"
 historical_char_creation_events.1.a: "Pergunto-me que destino lhe aguarda…"
 historical_char_creation_events.1.b: "Tal [historical_character.GetWomanMan] poderia me servir muito bem!"
 historical_char_creation_events.1.c: "[historical_character.GetFullNameNoTooltip]? Quem se importa!"
 historical_char_creation_events.2.t: "Reforma Religiosa: Sucesso"
 historical_char_creation_events.2.desc: "[inspiration_owner.GetFullName] passou incontáveis dias lendo atentamente livros e escrituras, e compôs incontáveis documentos e teses. Enquanto leio o que escreveu, seu gênio é inquestionável…\n\nIncrível. Isto poderia mudar tudo.#EMP todo.#!"
 historical_char_creation_events.2.a: "Estas palavras sagradas precisam ser compartilhadas!"
 religious_reformer_modifier: "Reformador Religioso"
 religious_reformer_modifier_desc: "Ajudado por uma grande mente, este personagem está em posição de criar uma nova fé.\n\nEste modificador será removido se uma nova [faith|lE]"
 mass_conversion_tt: "Concede um uso da [decision|lE] #V $legendary_conversion$#!"
 religious_inspiration: "Inspiração Religiosa"
 religious_inspiration_desc: "Um personagem que tem uma Inspiração Religiosa está [inspired|lE] para dedicar coração e alma à pesquisa das complexidades e mistérios da [faith|lE]. Frequentemente, eles são grandes reformadores ou líderes de movimentos religiosos. Esta Inspiração é #EMP muy infrecuente#!."
 historical_character.karunakara: "Karunakara foi um famoso general do rei chola Kulottunga e esmagou tanto inimigos quanto traidores da causa chola. A vida de Karunakara é descrita no poema Kalinkkattuparani, em que sua dominação de Kalinga e sua posterior homenagem a Kulottunga são idolatradas."
 historical_character.sekkilhar: "Ainda criança prodígio, Sekkilhar foi recrutado cedo por Raja Kulothunga como ministro e estadista valorizado. Sekkilhar é mais conhecido por ter escrito Periya Puranam, a história de vida dos 63 Shaiva Nayanars em 4253 versos. Por fim, o próprio Sekkilhar foi canonizado e permanece como divindade processional na região."
 historical_character.omar_khayyam: "Omar Khayyam foi um polímata persa do século XI, poeta, matemático e astrônomo. Mais conhecido hoje por sua poesia, reunida em The Rubaiyat, ele fez contribuições significativas à álgebra e à astronomia na Pérsia. Seu trabalho erudito sobre a classificação e a resolução de equações cúbicas permanece como uma realização monumental da matemática."
 historical_character.bhaskaracharya: "Bhaskaracharya foi um matemático e astrônomo indiano do século XII que escreveu a obra seminal Siddhanta Shiromani. Esse tratado abrangente cobre temas como aritmética, álgebra, matemática dos planetas e trigonometria esférica. Seu trabalho sobre cálculo antecede Newton e Leibniz em mais de cinco séculos."
 historical_character.joseph_rabban: "Joseph Rabban foi uma figura proeminente da comunidade judaica de Malabar no século IX. O rei Chera lhe concedeu direitos e privilégios para a comunidade judaica de Cochim, e a liderança de Rabban ajudou a consolidar a presença e a influência judaicas no sul da Índia. Suas ações garantiram autonomia e respeito por suas contribuições comerciais e culturais."
 historical_character.atisha: "Um dos maiores nomes do budismo medieval, Atisha foi um líder religioso originário de Bengala, mas fortemente associado ao mosteiro Vikramashila, em Bihar. Por meio de suas obras, foi responsável pela difusão do budismo Mahayana e Vajrayana por todo o Sudeste Asiático e o Tibete."
 historical_character.hemachandra: "Hemachandra foi um erudito indiano do século XII, polímata e monge jainista. Fez contribuições significativas à matemática, gramática, prosódia e filosofia. O Siddhahem de Hemachandra é uma obra-chave da literatura jainista, e seus ensinamentos influenciaram profundamente a educação e as práticas jainistas."
 historical_character.kshemendra: "Kshemendra foi um poeta e erudito da Caxemira do século XI, versátil em suas criações literárias, que abrangeram obras satíricas, paródias e textos religiosos. Entre suas obras notáveis estão Samaya Matrika e Darpadalana, que criticam com humor os costumes de seu tempo, fazendo dele uma figura singular da literatura clássica em sânscrito."
 historical_character.akka_mahadevi: "Akka Mahadevi foi uma poetisa kannada do século XII e uma figura proeminente do movimento Lingayat Bhakti. Conhecida por seus vachanas, ou composições poéticas, ela seguiu um caminho de devoção e libertação espiritual, desafiando normas sociais ao renunciar à vida mundana e defender a igualdade e o empoderamento das mulheres nas práticas espirituais."
 historical_character.namdev: "Namdev foi um santo e poeta marata do século XIII, conhecido por seus cânticos devocionais dedicados a Vithoba e como figura proeminente do movimento Bhakti em Maharashtra. Popular entre o povo comum, suas obras também ampliaram grandemente a difusão e o prestígio da língua marata como idioma de poesia e religião."
 historical_character.madhvacharya: "Madhvacharya foi um filósofo indiano do século XIII e o principal proponente da escola Dvaita de Vedanta. Ensinou que a alma (Atman) e a realidade última (Brahman) são distintas, em forte contraste com as filosofias não dualistas predominantes à época. Seus escritos e debates moldaram significativamente a teologia hindu."
 historical_character.vidyapati: "Vidyapati foi um poeta e erudito do século XIV de Bihar, na Índia. É célebre por suas canções de amor e hinos devocionais dedicados a Shiva, que influenciaram profundamente o movimento Bhakti. Suas obras são celebradas por sua beleza lírica e profunda expressão emocional."
 historical_character.abhinavagupta: "Abhinavagupta foi um filósofo e místico indiano da Caxemira dos séculos X e XI. É considerado um dos maiores estudiosos do Shivaismo Não Dual. As obras de Abhinavagupta influenciaram a filosofia hindu, especialmente suas teorias sobre estética e espiritualidade em seu comentário Abhinavabharati."
 historical_character.basava: "Basava foi um filósofo indiano e reformador social do século XII que fundou o movimento do Lingayatismo. Seus ensinamentos desafiaram o sistema tradicional de castas e enfatizaram a devoção ao Senhor Shiva. Os vachanas de Basava, ou composições poéticas, defendiam a igualdade espiritual e moldaram o movimento Bhakti. Suas ideias impactaram profundamente a sociedade e a religião indianas medievais."
 historical_character.hildegard: "Hildegard von Bingen foi uma abadessa visionária, mística, escritora e compositora, célebre por suas visões religiosas e obras eruditas. Ela escreveu textos sobre teologia, medicina e música, contribuindo para o pensamento cristão medieval. Hildegard também era conhecida por suas composições litúrgicas e peças, enfatizando a cura espiritual e holística."
 historical_character.thomas_aquinas: "Tomás de Aquino foi um teólogo e filósofo dominicano, famoso por unir a filosofia aristotélica à teologia cristã em sua Summa Theologica. Defendeu a compatibilidade entre razão e fé, impactando profundamente a doutrina cristã, a lei natural e a ética. O legado de Aquino perdura como santo canonizado e Doutor da Igreja."
 historical_character.dante_alighieri: "Dante Alighieri foi um poeta italiano célebre por The Divine Comedy, uma jornada épica pelo Inferno, Purgatório e Paraíso. Sua obra teve impacto duradouro sobre a literatura ocidental e a teologia cristã. A exploração de Dante sobre moralidade e natureza humana lhe rendeu o título de Pai da língua italiana."
 historical_character.thomas_becket: "Thomas Becket foi um arcebispo inglês e mártir, mais conhecido por seu conflito com o rei Henrique II sobre os direitos da Igreja. Sua firme defesa da autoridade eclesiástica levou a seu assassinato na Catedral de Canterbury em 1170. O martírio de Becket consolidou seu status de santo, e seu santuário em Canterbury tornou-se importante centro de peregrinação."
 historical_character.maimonides: "Maimônides foi um filósofo e erudito judeu do século XII. É mais conhecido por Mishneh Torah, uma codificação da lei judaica, e Guide for the Perplexed, que trata da relação entre religião e filosofia. É considerado um dos pensadores judeus mais influentes da história."
 historical_character.chretien_de_troyes: "As histórias de Chrétien, escritas em francês antigo, tiveram papel fundamental no desenvolvimento da lenda arturiana. Sua introdução do amor cortês e do Santo Graal em obras como Lancelot, the Knight of the Cart e Perceval, the Story of the Grail influenciou a literatura cavalheiresca. Seus escritos enfatizam temas de cavalaria, heroísmo e amor cortês."
 historical_character.egil_skallagrimrsson: "Famoso guerreiro-poeta islandês, Egil Skallagrímsson é a figura central de Egil's Saga. Conhecido por seu temperamento feroz e talento poético, ele é lembrado por seus atos violentos, versos poderosos e papel significativo na ocupação inicial da Islândia e nas incursões viquingues na Inglaterra."
 historical_character.gunnlaug_ormstunga: "Gunnlaug Ormstunga, protagonista de Gunnlaugs saga ormstungu, foi um guerreiro-poeta viquingue conhecido por suas viagens e rivalidades poéticas. A saga narra sua trágica história de amor e sua luta com um rival poético, capturando a dinâmica de honra e fama na sociedade viquingue."
 historical_character.torbjorg_the_seeress: "Þorbjörg, a Vidente, é uma figura profética apresentada em Eirik the Red's Saga. Conhecida por sua prática de spá (profecia) e seiðr (magia nórdica), teve papel crucial na previsão de eventos futuros, e sua aparição cerimonial na saga reflete a crença nórdica no poder da profecia."
 historical_character.erik_rode: "Erik Röde, também conhecido como Erik, o Vermelho, foi um explorador viquingue e fundador dos primeiros assentamentos nórdicos na Groenlândia. É lembrado por seu espírito aventureiro e por liderar os esforços de colonização, estabelecendo uma comunidade que perduraria por vários séculos."
 historical_character.alhazen: "Hasan al-Haytham foi um matemático e físico árabe do século XI, célebre por seu trabalho em óptica. Seu livro Kitab al-Manazir (The Book of Optics) estabeleceu os princípios da óptica moderna e influenciou a ciência ocidental durante a Idade Média. É lembrado por sua abordagem experimental rigorosa e por contribuições significativas à Era de Ouro Islâmica."
 historical_character.ibn_battuta: "Ibn Battuta foi um explorador marroquino do século XIV conhecido por suas extensas viagens, cobrindo mais de 120.000 quilômetros pelo mundo islâmico e além. Seu relato de viagens, Rihla, oferece percepções detalhadas sobre culturas e sociedades medievais, tornando-o um dos viajantes mais célebres da história."
 historical_character.william_of_ockham: "William of Ockham foi um filósofo e teólogo inglês do século XIV, célebre por Ockham's Razor, o princípio de preferir explicações mais simples. Figura-chave da tradição escolástica, desafiou a autoridade da Igreja e defendeu a separação entre poder secular e religioso. Suas ideias influenciaram o desenvolvimento da lógica, da ciência e do pensamento político."
 historical_character.geoffrey_chaucer: "Geoffrey Chaucer foi um poeta e autor inglês do século XIV, mais conhecido por The Canterbury Tales, uma coleção de histórias que retratam uma peregrinação a Canterbury. Sua obra é celebrada por seus personagens vívidos, humor e exploração da sociedade medieval. As contribuições de Chaucer à literatura inglesa lhe renderam o título de Pai da poesia inglesa."
 historical_character.aaron_of_lincoln: "Aaron de Lincoln foi um financista e agiota inglês do século XII, conhecido por ser um dos judeus mais ricos da Inglaterra medieval. Forneceu empréstimos significativos à nobreza e à Igreja para projetos de construção, incluindo catedrais. Após sua morte, o rei Henrique II confiscou seus vastos bens."
 historical_character.john_wycliffe: "John Wycliffe foi um teólogo e reformador inglês do século XIV, conhecido por suas primeiras críticas às práticas da Igreja Católica. Defendeu a tradução da Bíblia para o inglês, lançando bases para a Reforma Protestante. Seus ensinamentos, que questionavam a autoridade da Igreja, influenciaram o movimento lolardo e reformadores posteriores como Martinho Lutero."
 historical_character.roger_bacon: "Roger Bacon foi um filósofo inglês e frade franciscano do século XIII, reconhecido por sua defesa inicial do método científico. Enfatizou observação e experimentação em seus estudos, contribuindo para o desenvolvimento da ciência empírica. Seu trabalho em óptica e alquimia influenciou estudiosos posteriores no período medieval."
 historical_character.heloise_dargenteuil: "Héloïse d'Argenteuil foi uma abadessa e erudita francesa do século XII, mais conhecida por sua correspondência com Pedro Abelardo. Suas cartas são célebres por seu conteúdo apaixonado e intelectual, ilustrando sua profunda inteligência e sensibilidade. Héloïse mais tarde tornou-se abadessa da Abadia do Paracleto, onde demonstrou forte liderança."
 historical_character.peter_abelard: "Pedro Abelardo foi um filósofo e teólogo francês do século XII, famoso por sua abordagem escolástica e seu relacionamento controverso com Héloïse. Seu livro Sic et Non utilizou raciocínio dialético para explorar questões teológicas. A vida e a obra de Abelardo tiveram grande impacto na filosofia medieval, enquanto sua história de amor com Héloïse permanece como uma narrativa clássica medieval."
 historical_character.petrarch: "Petrarca foi um erudito e poeta italiano do século XIV, amplamente considerado o Pai do Humanismo. É mais conhecido por seus sonetos e poemas, especialmente o Canzoniere, centrado em seu amor não correspondido por Laura. Suas obras foram fundamentais para o desenvolvimento do humanismo renascentista, enfatizando o aprendizado clássico e o indivíduo."
 historical_character.christine_pizan: "Christine de Pizan foi uma escritora e poetisa francesa do século XIV, célebre por obras em defesa dos direitos e da educação das mulheres. Escreveu The Book of the City of Ladies, que desafiava a misoginia de seu tempo e celebrava as realizações femininas. Seus escritos estiveram entre os primeiros a tratar da igualdade de gênero, tornando-a uma pioneira do feminismo na Europa medieval."
 historical_character.giotto_di_bondone: "Giotto di Bondone foi um pintor e arquiteto italiano dos séculos XIII e XIV, celebrado por seu uso inovador de perspectiva e realismo na arte. Sua obra marcou um afastamento da tradição bizantina estilizada, lançando as bases para o Renascimento. Seus afrescos na Capela Scrovegni, em Pádua, são considerados obras-primas que influenciaram gerações de artistas."
 historical_character.fibonacci: "Leonardo Fibonacci foi um matemático italiano dos séculos XII e XIII, mais conhecido por introduzir o sistema numérico indo-arábico à Europa. Seu livro Liber Abaci popularizou o uso de numerais arábicos e da aritmética no Ocidente. Fibonacci também é reconhecido pela sequência de Fibonacci, conceito matemático que descreve um padrão encontrado na natureza e em vários campos de estudo."
 historical_character.giovanni_boccaccio: "Giovanni Boccaccio foi um escritor e poeta italiano do século XIV, mais conhecido por The Decameron, uma coletânea de histórias contadas por dez pessoas que escapam da Peste Negra. Sua narrativa vívida e a exploração do comportamento humano fizeram dele uma figura central da literatura do primeiro Renascimento. Suas obras influenciaram escritores posteriores como Chaucer e ajudaram a moldar a tradição literária italiana."
 historical_character.snorri_sturluson: "Snorri Sturluson foi um historiador, poeta e político islandês do século XIII, célebre por ter escrito a Prose Edda, obra fundamental da mitologia nórdica. Seus escritos são fontes cruciais para a compreensão moderna da herança nórdica. Suas obras também incluem Heimskringla, uma crônica dos reis noruegueses que mistura história e folclore."
 historical_character.hrotsvitha: "Hrotsvitha foi uma cônega, poetisa e dramaturga alemã do século X, conhecida como a primeira dramaturga mulher da era cristã. Escrevendo a partir da Abadia de Gandersheim, compôs peças, poemas e lendas que incorporavam temas cristãos com influências clássicas, muitas vezes celebrando a força e o intelecto das mulheres."
 historical_character.ramanuja: "Ramanuja foi um teólogo indiano do século XI, conhecido por seu papel fundamental no estabelecimento da tradição Sri Vaishnavism. Defendeu a devoção a Vishnu, promovendo uma abordagem pessoal e compassiva da espiritualidade. Suas interpretações do Vedanta enfatizavam o não dualismo qualificado, um afastamento significativo de outras escolas de pensamento."
 historical_character.arnaldus_de_villa_nova: "Arnaldus de Villa Nova foi um médico, alquimista e erudito catalão do século XIII, célebre por suas contribuições à medicina e à química. Foi um dos primeiros defensores do método científico na prática médica e recebeu crédito por numerosos textos médicos e escritos alquímicos. Sua obra influenciou significativamente o pensamento médico europeu e o campo emergente da química."
 historical_character.ibn_khaldun: "Ibn Khaldun foi um erudito árabe do século XIV, de Túnis, considerado um dos pais da sociologia, da historiografia e da economia modernas. Sua obra mais famosa, a \"Muqaddimah\" (Introdução), ? uma tentativa precoce de retirar os mitos dos fenômenos históricos e sociais e fundament?-los na análise de causa e efeito, conflito social e fatores econômicos."
 historical_character.rumi: "Rumi foi um poeta persa, teólogo e místico sufi do século XIII. Seu profundo legado espiritual está encapsulado em suas obras poéticas, notadamente o Masnavi, frequentemente referido como o Corão em persa. Seus ensinamentos enfatizam o amor incondicional, a tolerância e a busca da verdade divina por meio de experiências espirituais pessoais."
 historical_character.avicenna: "Avicena, também conhecido como Ibn Sina, foi um polímata persa considerado um dos mais importantes médicos, astrônomos, pensadores e escritores da Era de Ouro Islâmica. É mais conhecido por suas obras monumentais The Book of Healing e The Canon of Medicine, usadas como textos médicos de referência tanto no mundo islâmico quanto na Europa por séculos."
 historical_character.averroes: "Averróis (Ibn Rushd) foi um polímata andalusino do século XII, renomado por seus escritos sobre a filosofia aristotélica. Sua obra se concentrou em integrar tradições islâmicas à filosofia grega clássica. Seu esforço de racionalizar a filosofia fez dele figura central tanto na história intelectual islâmica quanto na europeia, contribuindo significativamente para o Renascimento."
 historical_character.al_biruni: "Al-Biruni foi um erudito persa e polímata do século XI que fez contribuições significativas em várias disciplinas científicas, incluindo astronomia, matemática e geografia. Escreveu extensamente sobre o raio da Terra e compilou um estudo abrangente das religiões e filosofias da Índia após acompanhar a invasão gaznévida."
 historical_character.rashi: "Rashi (Shlomo Yitzchaki) foi um rabino francês do século XI e venerado erudito judeu, célebre por seus comentários abrangentes sobre o Talmude e a Bíblia Hebraica. Suas obras tiveram profundo e duradouro impacto no estudo e na lei judaica, sendo parte integrante da educação judaica tradicional."
 historical_character.yehuda_halevi: "Yehuda Halevi foi um poeta e filósofo judeu espanhol do século XII, celebrado por sua poesia tocante e por seu diálogo filosófico. Em The Kuzari, Halevi defende as verdades filosóficas do judaísmo e expressa seu profundo anseio por Sião. Seus escritos combinam devoção religiosa com rica tradição lírica, tornando-o figura central da literatura hebraica medieval."
 historical_character.shaprut: "Hasdai ibn Shaprut foi um médico, diplomata e erudito judeu do século X na Espanha muçulmana. Como confidente do califa Abd ar-Rahman III, desempenhou papel crucial nas cortes intelectuais e diplomáticas de Córdoba, promovendo intercâmbios culturais entre estudiosos judeus e islâmicos."
 historical_character.gersonides: "Levi ben Gershon (Gersonides) foi um filósofo, astrônomo e matemático judeu francês do século XIV. Renomado por sua abordagem científica, escreveu vários tratados influentes sobre matemática e astronomia. Também é conhecido por melhorar o projeto de instrumentos astronômicos e por sua exploração filosófica do livre-arbítrio e da presciência divina."
 historical_character.ezra: "Abraham ibn Ezra foi um erudito, poeta e polímata judeu espanhol do século XII. Conhecido por suas profundas contribuições ao comentário bíblico, à astrologia e à matemática, viajou extensamente pelo Mediterrâneo, influenciando círculos intelectuais com seus escritos."
 historical_character.gabriol: "Solomon ibn Gabirol foi um filósofo e poeta judeu do século XI da Espanha muçulmana. Conhecido por suas obras neoplatônicas, sobretudo Fons Vitae (The Fountain of Life), explorou a natureza de Deus e do universo, influenciando profundamente o pensamento judaico e cristão. Ibn Gabirol também foi um prolífico autor de poesia hebraica."
 historical_character.nachmanides: "Nachmanides, também conhecido como Moses ben Nahman ou Ramban, foi um erudito e teólogo judeu do século XIII. Célebre por seu profundo comentário sobre a Torá e por sua liderança na comunidade judaica de Girona, defendeu notavelmente as crenças judaicas na Disputa de Barcelona em 1263. Seus escritos e ensinamentos combinam lei judaica, misticismo e ética."
 historical_character.crescas: "Hasdai Crescas foi um filósofo judeu do século XIV, notável por desafiar a filosofia aristotélica predominante em seu tempo. É mais conhecido por sua obra filosófica Or Adonai (A Luz do Senhor), que argumentava contra visões aristotélicas e lançou bases para a filosofia judaica moderna, influenciando pensadores como Espinosa."
 historical_character.saadia: "Saadia Gaon foi um filósofo, teólogo e erudito judeu do século X. Serviu como chefe da célebre Academia de Sura e é renomado por suas obras sobre a lei judaica e por seu tratado filosófico Emunoth ve-Deoth (The Book of Beliefs and Opinions). Esse tratado foi a primeira tentativa sistemática de integrar a teologia judaica com elementos da filosofia grega."
 historical_character.awkal: "Yusuf ibn 'Awkal foi um comerciante e viajante judeu do século X do mundo islâmico, conhecido por seus relatos detalhados de jornadas comerciais pelo Mediterrâneo, Próximo Oriente e partes da África. Seus escritos oferecem valiosos insights sobre práticas comerciais, interações culturais e a vibrante vida das comunidades judaicas ao longo de suas rotas."
 historical_character.benjamin_of_tudela: "Benjamin de Tudela foi um viajante e explorador judeu do século XII. É mais conhecido por seu diário de viagem, The Travels of Benjamin, que documenta suas jornadas pela Europa, Ásia e África. Benjamin forneceu relatos detalhados das comunidades judaicas do mundo medieval."
 historical_character.marco_polo: "Marco Polo foi um mercador, explorador e escritor veneziano que viajou pela Ásia ao longo da Rota da Seda entre 1271 e 1295. Seus extensos relatos de viagem à China sob o governo de Kublai Khan foram publicados como The Travels of Marco Polo, oferecendo aos europeus uma visão abrangente das terras e culturas asiáticas."
 historical_character.bridget_of_sweden: "Brígida da Suécia foi uma mística e santa do século XIV, conhecida por suas profundas visões religiosas e pela fundação da Ordem Brigitina. Após a morte de seu marido, dedicou sua vida ao serviço religioso e realizou várias peregrinações a locais sagrados."
 historical_character.meister_eckhart: "Meister Eckhart foi um teólogo, filósofo e místico do século XIII, conhecido por seus influentes ensinamentos sobre a natureza de Deus e a relação da alma humana com o divino. Seus sermões e escritos exploram temas de desapego, nascimento divino na alma e identidade do ser."
 historical_character.jangar: "Jangar é o herói lendário do épico oirate The Epic of Jangar. É célebre por construir a fantástica cidade de Shambhala e liderar seu povo com sabedoria e coragem. Suas batalhas contra inimigos e sua busca por restaurar paz e prosperidade à sua terra encapsulam as lutas e ideais do povo oirate."
 historical_character.zawisza: "Zawisza, o Negro, foi um cavaleiro e comandante militar polonês do século XV, renomado por seu valor e cavalheirismo. Destacou-se na Batalha de Grunwald em 1410 e mais tarde serviu em várias cortes reais. Morreu heroicamente durante o cerco à fortaleza de Golubac em 1428, servindo em uma cruzada contra o Império Otomano."
 historical_character.theophanes_the_greek: "Theophanes, o Grego, foi um pintor bizantino de destaque. Trouxe profundidade expressiva e emocional ao desenvolvimento da iconografia russa, afastando-se do estilo bizantino mais formal. Suas contribuições mais notáveis incluem afrescos na Igreja da Transfiguração em Novgorod e na Catedral da Anunciação em Moscou."
 historical_character.nicetas_choniates: "Nicetas Choniates foi um oficial do governo bizantino e historiador do fim do século XII e início do XIII. Renomado por sua obra Chronicle, oferece um relato detalhado da vida e da política bizantinas de 1118 a 1207, cobrindo o declínio do Império Bizantino e os eventos da Quarta Cruzada."
 historical_character.michael_psellos: "Michael Psellos foi um filósofo, político e historiador bizantino do século XI. Servindo como cortesão sob vários imperadores, Psellos foi decisivo para o renascimento da filosofia e das ciências gregas na corte bizantina. Sua obra mais notável, Chronographia, oferece um relato perspicaz e detalhado da política bizantina e da vida cortesã."
 historical_character.john_tzetzes: "John Tzetzes foi um erudito bizantino do século XII conhecido por sua vasta produção literária e erudição em literatura clássica. Escreveu extensamente sobre temas gramaticais, históricos e mitológicos, sendo sua obra mais famosa Chiliades, ou Book of Histories, uma coleção em verso de anedotas históricas e mitológicas."
 historical_character.theophylact_of_ohrid: "Theophylact foi um arcebispo e erudito bizantino do século XI. Durante sua atuação como arcebispo de Ohrid, desempenhou papel crucial na vida religiosa e cultural da região, exercendo significativa influência sobre a teologia ortodoxa oriental."
 historical_character.eustathius_of_thessalonica: "Eustathius de Tessalônica foi um erudito, teólogo e arcebispo bizantino do século XII. Renomado por sua escrita prolífica, produziu comentários detalhados sobre as obras de Homero. Seu tempo como arcebispo foi marcado por esforços para reconstruir e reformar o papel da Igreja na sociedade após a invasão siciliana de Tessalônica."
 historical_character.nicephorus_blemmydes: "Nicephorus Blemmydes foi um erudito e teólogo bizantino do século XIII. Fundou uma escola e um mosteiro onde ensinou e viveu grande parte de sua vida. Blemmydes escreveu extensamente sobre filosofia, teologia e ciência, buscando reconciliar ideias filosóficas clássicas com a doutrina cristã."
 historical_character.georgius_pachymeres: "Georgius Pachymeres foi um historiador e erudito bizantino do século XIII conhecido por sua obra abrangente Historia Byzantina, que narra a história do Império Bizantino de 1255 a 1308. Seus escritos oferecem relato detalhado do reinado da dinastia Paleólogo e do impacto da ocupação latina."
 historical_character.manuel_moschopoulos: "Manuel Moschopoulos foi um erudito e gramático bizantino do fim do século XIII e início do XIV, mais conhecido por seu trabalho no renascimento do aprendizado e da literatura clássica grega. Escreveu extensamente sobre temas gramaticais e produziu comentários sobre autores clássicos, buscando preservar e esclarecer textos antigos."
 historical_character.theodore_metochites: "Um homem renascentista antes do Renascimento, Metochites foi um polímata que se destacou em filosofia, astronomia, matemática e arte, servindo como principal ministro sob o imperador Andrônico II Paleólogo. É mais conhecido por seu patronato à Igreja de Chora em Constantinopla, onde encomendou extensos mosaicos e afrescos."
 historical_character.michael_choniates: "Michael Choniates foi um erudito, poeta e figura eclesiástica bizantina do século XII, renomado por seu tempo como arcebispo de Atenas entre 1182 e 1204. Em um período de declínio do controle bizantino, esforçou-se para manter as tradições culturais e intelectuais de Atenas."
 historical_character.joseph_tarchaneiotes: "Joseph Tarchaneiotes foi um general bizantino ativo no fim do século XI, conhecido sobretudo por seu papel nas campanhas militares bizantinas contra os turcos seljúcidas. Servindo sob o imperador Aleixo I Comneno, teve papel importante em várias batalhas críticas, incluindo a bem-sucedida defesa de Niceia."
 historical_character.gemistus_pletho: "Gemistus Pletho foi um filósofo do século XV. Firme defensor do neoplatonismo, desempenhou papel crucial no renascimento intelectual que precedeu a queda de Constantinopla. Foi instrumental durante o Concílio de Florença, onde defendeu a reunificação das Igrejas Ortodoxa e Católica."
 historical_character.arethas_of_caesarea: "Arethas de Cesareia foi um arcebispo, erudito e prolífico colecionador de manuscritos gregos antigos do século X. Servindo como arcebispo de Cesareia, na Capadócia, fez importantes contribuições à vida intelectual e cultural de Bizâncio, garantindo a sobrevivência de conhecimentos clássicos que mais tarde influenciariam o Renascimento."
 historical_character.basil_lekapenos: "Basílio Lekapenos foi um poderoso eunuco e administrador que serviu como principal ministro durante o reinado de vários imperadores bizantinos no fim do século X e início do XI. Filho ilegítimo do imperador Romano I, Basílio exerceu grande influência na corte bizantina por meio de seu papel como parakoimomenos, ou camareiro."
 historical_character.john_the_orphanotrophos: "João, o Orphanotrophos, foi um notável eunuco e influente oficial da corte no início do século XI, durante o reinado do imperador Miguel IV. Como chefe do orphanotrophos, o oficial público responsável pelo bem-estar de órfãos e pobres, João acumulou considerável poder e influência."
 historical_character.samonas: "Samonas foi um notável eunuco e influente oficial da corte durante o fim do século IX e início do X, sob o imperador Leão VI, o Sábio. Originalmente de Samosata, ascendeu à proeminência por sua posição como parakoimomenos, ou camareiro do imperador, de onde exercia considerável poder na corte bizantina."
 historical_character.peter_the_eunuch: "Pedro, o Eunuco, foi um proeminente oficial da corte bizantina e conselheiro de confiança durante o reinado do imperador Miguel IV no século XI. Servindo como parakoimomenos, Pedro desempenhou papel crucial no apoio à ascensão de Miguel IV ao trono e promoveu os interesses do mosteiro de Stoudios."
 historical_character.constantine_the_paphlagonian: "Constantino, o Paflagônio, foi um eunuco bizantino e influente oficial da corte no século IX. Serviu como parakoimomenos, ou camareiro, do imperador Leão VI, o Sábio. É célebre por seus esforços em manter a estabilidade da corte durante um período de intriga política e faccionalismo."
 historical_character.peter_the_stratopedarches: "Pedro, o Stratopedarches, foi um notável comandante militar e eunuco do século X que abundava em força corporal. Desempenhou papel crucial durante o reinado do imperador Basílio II, particularmente durante a revolta liderada pelo general Bardas Skleros."
 historical_character.basilios_bessarion: "Basilios Bessarion foi um erudito, filósofo e cardeal do século XV. Bessarion converteu-se ao catolicismo e defendeu a união das Igrejas Ortodoxa e Católica durante o Concílio de Florença, argumentando que tal movimento fortaleceria a unidade cristã diante da crescente ameaça otomana."
 historical_character.demetrios_kydones: "Demetrios Kydones foi um importante erudito, tradutor e diplomata do século XIV, conhecido por sua defesa das tradições latina e católico-romana dentro do Império Bizantino ortodoxo. Traduziu para o grego muitas obras de Tomás de Aquino e de outros filósofos escolásticos latinos."
 historical_character.manuel_holobolos: "Manuel Holobolos foi um erudito e oficial do século XIII, conhecido por suas habilidades literárias e retóricas. Serviu em vários cargos administrativos sob diversos imperadores bizantinos e é lembrado sobretudo por suas eloquentes cartas e discursos."
 historical_character.john_axuch: "John Axuch foi um comandante militar bizantino do século XII e principal ministro sob o imperador João II Comneno. Originalmente um turco seljúcida capturado ainda criança e criado dentro da casa imperial, Axuch ascendeu e tornou-se o conselheiro e amigo mais confiável do imperador."
 historical_character.mkhitar_gosh: "Mkhitar Gosh foi um erudito, clérigo e jurista armênio do século XII, renomado por suas contribuições ao direito e à literatura armênios. Escreveu uma das primeiras codificações da lei armênia, o Datastanagirk (Book of Law)."
 historical_character.shota_rustaveli: "Shota Rustaveli foi um poeta georgiano do século XII e um dos maiores nomes da literatura georgiana. É mais conhecido por seu poema épico The Knight in the Panther's Skin, considerado uma obra-prima da literatura nacional georgiana."
 historical_character.grigor_tatevatsi: "Grigor Tatevatsi foi um filósofo, teólogo e erudito armênio do século XIV, renomado por seu papel como professor e chefe da escola do Mosteiro de Tatev, na Armênia medieval."
 historical_character.sargis_pitsak: "Sargis Pitsak foi um iluminador de manuscritos e escriba armênio do século XIV, renomado por suas contribuições à arte medieval armênia da confecção de livros."
 historical_character.medici: "Averardo de' Medici, também conhecido como Bicci, foi um ancestral inicial da ilustre família Medici, que ascendeu à proeminência em Florença durante o Renascimento. Averardo foi fundamental para estabelecer a riqueza e o status da família nos círculos políticos e sociais florentinos."
 historical_character.borgia: "Alfonso de Borgia foi um cardeal e diplomata espanhol que mais tarde se tornou o papa Calisto III em 1455. Antes de seu papado, serviu como respeitado jurista e administrador, desempenhando papel importante na reconciliação das partes conflitantes do Compromisso de Caspe."
 historical_character.william_wallace: "William Wallace foi um cavaleiro escocês e destacado líder durante as Guerras de Independência da Escócia contra a Inglaterra no fim do século XIII. Conhecido por suas táticas ousadas e feroz patriotismo, derrotou o exército inglês na Batalha da Ponte de Stirling em 1297 e foi nomeado Guardião da Escócia."
 historical_character.la_hire: "Étienne de Vignolles, célebre como La Hire, foi um importante comandante militar durante as fases finais da Guerra dos Cem Anos. Renomado por sua bravura e destreza em batalha, La Hire foi um dos principais comandantes sob Joana d'Arc."
 historical_character.bar_sauma: "Rabban Bar Sauma foi um monge nestoriano que se tornou diplomata, originário da China da dinastia Yuan. Inicialmente partiu em uma peregrinação fracassada a Jerusalém, mas passou anos em Bagdá. Mais tarde, serviu como embaixador mongol na Europa, encontrando-se com monarcas europeus, o imperador bizantino e o papa para discutir uma potencial aliança franco-mongol."
 historical_character.hodja: "Nasreddin, o Hodja, é um herói popular e figura literária icônica nas culturas turcas, frequentemente retratado como um velho sábio e espirituoso que dá conselhos enigmáticos ou sofre infortúnios, resolvendo tudo com seu humor afiado e sagacidade."
 historical_character.widukind_of_corvey: "Widukind de Corvey foi um monge saxão e historiador do século X, célebre por sua obra Res gestae Saxonicae, uma crônica que detalha os feitos dos saxões, com foco especial no reinado do imperador Otto I."
 historical_character.roger_de_flor: "Roger de Flor foi um proeminente capitão mercenário e aventureiro do fim do século XIII e início do XIV. Originalmente cavaleiro templário, mais tarde tornou-se líder dos Almogàvers, formando a Companhia Catalã. Lutou por Andrônico II e Miguel IX, sendo assassinado por este último devido à sua crescente influência no Império Bizantino."
 historical_character.regino_of_prum: "Regino de Prüm foi um notável monge beneditino, historiador e teórico musical do século IX. Serviu como abade da Abadia de Prüm até sua expulsão em 899, após o que se tornou abade da Abadia de São Martinho em Trier. É mais conhecido por sua crônica Chronicon."
 historical_character.geoffrey_of_monmouth: "Geoffrey de Monmouth foi um clérigo galês do século XII e uma das figuras mais significativas no desenvolvimento da historiografia britânica e da literatura arturiana. Sua obra seminal Historia Regum Britanniae (The History of the Kings of Britain) é um relato pseudo-histórico que narra a vida dos reis da Bretanha."
 historical_character.raiktor: "Em 1081, em meio ao tumulto após a ascensão de Aleixo I Comneno ao poder, Raiktor, um monge, alegou falsamente ser o deposto imperador Miguel VII. Aproveitando essa oportunidade, o duque normando Roberto Guiscard usou a pretensão de Raiktor para justificar sua invasão dos Bálcãs. Mesmo após a fraude ser descoberta, Guiscard continuou sua campanha, exibindo Raiktor diante de Dirráquio para obter apoio. No fim, abandonou Raiktor quando o ardil fracassou, o que provavelmente levou ao descarte silencioso de Raiktor quando deixou de ser útil."
 historical_character.nichiren: "Um reformador radical e inflexível do budismo japonês, $Nichiren$ declarou a devoção ao Sutra do Lótus como o único caminho para a salvação. Fieramente crítico das seitas rivais e da complacência política, suportou exílio e tentativas de assassinato por seus ensinamentos. Seu legado deu origem a uma escola singular e nacionalista do budismo que perdura até hoje."
 historical_character.dogen: "Fundador da escola Sōtō do budismo Zen no Japão, reverenciado por seus ensinamentos sobre meditação e por sua grande obra Shōbōgenzō, que moldou a filosofia zen japonesa."
 historical_character.kokan_shiren: "Monge Rinzai Zen, poeta e historiador do período Kamakura; compilou Zenrin Kokuhōki, um notável texto de história budista, e antologias poéticas que combinam percepção zen com elegância literária."
 historical_character.jeong_mong_ju: "Estadista, erudito e poeta do fim de Goryeo, Chŏng Mong-ju foi reverenciado por sua lealdade inabalável à dinastia em seus últimos dias. Mestre do pensamento neo-confucionista e da diplomacia, opôs-se à ascensão do regime Joseon e foi assassinado por seus princípios. Seu poema final, expressando fidelidade inabalável, permanece um dos versos mais famosos da Coreia."
 historical_character.yi_saek: "Erudito confucionista fundamental do fim de Goryeo, Yi Saek introduziu o neo-confucionismo de Zhu Xi na Coreia e formou uma geração de futuros reformadores Joseon. Embora apoiasse a reforma educacional, permaneceu leal à dinastia Goryeo e recusou cargo sob seus sucessores. Sua influência ligou duas dinastias e moldou o pensamento coreano por séculos."
 historical_character.jinul: "Um monge Seon visionário do período Goryeo, $Ji_nul$ buscou reformar o budismo coreano unificando prática meditativa e estudo doutrinal. Fundando a Ordem Jogye em Songgwangsa, enfatizou a iluminação pessoal dentro da disciplina monástica. Seus ensinamentos lançaram as bases do Seon coreano como é praticado hoje, fundindo percepção zen e profundidade escolástica."
 historical_character.prapanca: "Poeta da corte e historiógrafo em Java Majapahit, autor do poema épico Nagarakretagama (1365), que detalhou a glória e a geografia de Majapahit; sua obra é fonte crucial para a história e a arte de governar javanesas."
 historical_character.tantular: "Renomado poeta javanês, Mpu Tantular escreveu o Kakawin Sutasoma, introduzindo a frase Bhinneka Tunggal Ika (Unidade na Diversidade), depois adotada como lema nacional da Indonésia."
 historical_character.kanwa: "Poeta da corte durante o reinado do rei Airlangga, Mpu Kanwa compôs o Kakawin Arjunawiwaha, um poema épico que mistura mitologia hindu com ideais javaneses."
 historical_character.sedah: "Encomendado pelo rei Jayabhaya, Mpu Sedah começou a compor o Kakawin Bhāratayuddha, uma adaptação do Mahabharata, que mais tarde foi concluída por Mpu Panuluh."
 historical_character.panuluh: "Mpu Panuluh completou o Kakawin Bhāratayuddha e escreveu o Kakawin Hariwangsa, contribuindo de modo significativo para a tradição literária javanesa."
 historical_character.dharmaja: "Poeta durante o reinado do rei Airlangga, Mpu Dharmaja é conhecido por compor o Kakawin Smaradahana, poema que influenciou a literatura javanesa posterior."
 historical_character.monaguna: "Mpu Monaguna é creditado como autor do Kakawin Sumanasantaka, obra poética que reflete a fusão entre narrativas hindus e cultura javanesa."
 historical_character.kuturan: "Figura religiosa reverenciada na história balinesa, Mpu Kuturan é creditado por unificar várias seitas do hinduísmo em Bali e estabelecer o sistema Desa Adat, que integra leis religiosas e consuetudinárias."
 historical_character.dwijendra: "Líder espiritual que desempenhou papel significativo na difusão do hinduísmo em Lombok e Bali, Mpu Dwijendra é conhecido por seus ensinamentos e pela fundação de templos pelas ilhas."
 historical_character.kavindrarimathana: "Kavindrarimathana foi um destacado arquiteto e engenheiro durante o reinado do rei Rajendravarman II. Recebe crédito pelo projeto de templos importantes, incluindo Pre Rup e East Mebon, evidenciando a excelência arquitetônica do Império Khmer."
 historical_character.daun_penh: "Venerada viúva do século XIV, Daun Penh teria descoberto estátuas sagradas de Buda dentro de uma árvore koki flutuante durante uma enchente no Tonlé Sap. Interpretando isso como sinal divino, ergueu um santuário no topo de uma colina, Wat Phnom, onde entronizou as relíquias. Seu ato de devoção deu origem à cidade de Phnom Penh, que leva seu nome."
 historical_character.yue_fei: "Um dos generais mais celebrados da China, Yue Fei ascendeu de origens humildes para tornar-se o firme defensor da Song do Sul contra os invasores jurchen Jin. Inabalável em sua lealdade ao imperador e ao ideal de unidade nacional, foi traído por oficiais corruptos e executado injustamente. Seu legado permanece como símbolo de patriotismo e integridade."
 historical_character.wen_tianxiang: "Reverenciado erudito-general do fim da Song do Sul, Wen Tianxiang tornou-se um farol de resistência contra a conquista mongol. Capturado após uma defesa fracassada da dinastia, recusou-se a servir aos Yuan e morreu mártir. Sua poesia composta na prisão, especialmente Song of Righteousness, eternizou seu legado como paradigma de virtude e lealdade."
 historical_character.fan_zhongyan: "Estadista, chanceler e erudito neo-confucionista da Song do Norte, conhecido por sua famosa máxima Seja o primeiro a preocupar-se e o último a desfrutar; implementou reformas marcantes para melhorar a governança e o bem-estar social."
 historical_character.li_qingzhao: "Uma das maiores poetisas da China, celebrada por sua poesia Ci (lírica) da dinastia Song, que expressa com pungência a perda pessoal e a elegância de uma era passada."
 historical_character.qiu_chuji: "Venerado mestre taoista, um dos Sete Verdadeiros Taoistas do Norte, e conselheiro de Gêngis Khan; viajou do norte da China até a Ásia Central para aconselhar o Khan sobre governança e longevidade, ajudando a estabelecer a política religiosa inicial dos Yuan."
 historical_character.chu_van_an: "Estimado mestre confucionista da dinastia Tran, chefe da Academia Imperial em Thăng Long; conhecido por sua integridade, reformas educacionais e a famosa petição das \"Sete Decapitações\", que instava o rei a eliminar oficiais corruptos."
 historical_character.nguyen_thuyen: "Poeta-oficial do século XIII creditado por pioneirizar o uso do alfabeto Nôm na literatura. Lembrado por compor versos que, segundo a lenda, afugentaram crocodilos, simbolizando a força da língua e do saber vietnamitas."
 historical_character.pham_ngu_lao: "General célebre da dinastia Tran que ajudou a repelir múltiplas invasões mongóis no século XIII. Camponês de nascimento, ascendeu por bravura e tornou-se símbolo de patriotismo, além de tema de um famoso poema que destaca sua dedicação."
 historical_character.sakata_kintoki: "Poderoso guerreiro das montanhas de Sagami, $dynn_Satake$ $Kin_toki$ teria servido $dynn_Minamoto$ $Yorimitsu$ com grande força e lealdade. Seus feitos lendários como Kintarō incluem lutar com ursos, arrancar árvores e lançar-se à batalha."
 historical_character.takezaki_suenaga: "Samurai ferozmente leal do xogunato Kamakura, $dynn_Takezaki$ $Suenaga$ ganhou fama por sua bravura durante as invasões mongóis ao Japão. Determinado a receber o devido reconhecimento por seus serviços, encomendou rolos ilustrados que registravam seus feitos."
 historical_character.eisai: "Nascido em uma família ligada a santuários, $Eisai$ tornou-se monge, mas ficou insatisfeito com as escolas dominantes Pundarika, ou Tendai, do budismo e viajou à China para estudar os ensinamentos de Dhyana, ou Chan. Ao regressar, introduziu essas ideias no Japão, fundando a escola Zen Rinzai, estabelecendo seu primeiro templo e popularizando novamente o chá verde."
 historical_character.ippen: "$Ippen$ estudou escrituras desde jovem antes de retornar à vida secular. Durante peregrinação em Kumano, os kami lhe revelaram o caminho para a iluminação: a recitação extática do [Glossary( 'nembutsu', 'GLOSS_NEMBUTSU')]. Divinamente inspirado, $Ippen$ voltou ao hábito como devoto monge e mestre da Terra Pura, viajando pelo Japão com um grupo de seguidores ardorosos e fundando a escola Ji-shū."
 historical_character.myoe: "Órfão ainda menino, $MyO_e$ estudou uma grande variedade de escolas, tendo $Mongaku$ e $Eisai$ entre seus mestres, mas permaneceu insatisfeito. Buscando solidão longe dos debates dos mosteiros, retornou aos outrora populares ensinamentos Kegon, revitalizando-os com influências do pensamento Shingon e Tendai, e rejeitando o fascínio pelo [Glossary( 'nembutsu', 'GLOSS_NEMBUTSU')]."
 historical_character.honen: "$HO_nen$ foi ordenado ainda criança após o assassinato de seu pai, ascendendo com sucesso no sacerdócio Tendai. Insatisfeito com o grande conforto dos monges em contraste com a miséria do povo comum, $HO_nen$ reconheceu o [Glossary( 'nembutsu', 'GLOSS_NEMBUTSU')] como doutrina inclusiva, tornando-se um importante mestre da Terra Pura. Suas ideias radicais atraíram a ira de outras seitas, levando a seu exílio na perseguição Jogen."
 historical_character.shinran: "Órfão ainda criança, $Shinran$ foi ordenado em pouca idade, mas teve dificuldades no sacerdócio. Guiado em visão a procurar o monge $HO_nen$, tornou-se um discípulo de destaque e sofreu exílio na perseguição Jogen. Continuando ardorosamente a pregar a Terra Pura [Glossary( 'nembutsu', 'GLOSS_NEMBUTSU')] ao povo, acabaria por fundar sua própria escola, a Jōdo Shinshū, ou Seita da Verdadeira Terra Pura, hoje a mais amplamente praticada no Japão."
 historical_character.mibu_tadamine: "Apesar de suas origens humildes, $Tadamine$ alcançou grande renome por sua poesia waka após aparecer em uma competição, recebendo comissão imperial e patronato da família Fujiwara. Juntamente com seu filho, $Tadami$, é contado entre os Trinta e Seis Poetas Imortais do Japão, com mais de oitenta e um poemas considerados presentes em antologias imperiais."
 historical_character.murasaki: "Bisneta do famoso poeta Fujiwara Kanesuke, Lady Murasaki nasceu na erudita família Yoshikado e serviu como dama de companhia da imperatriz Fujiwara Shōshi, consorte do imperador Ichijo. Seu talento poético foi logo reconhecido, e ela passou a ser contada entre as Trinta e Seis Poetisas Imortais. Hoje é mais conhecida por seu diário, por sua rivalidade com a poetisa #EMP Sei Shōnagon#! e pelo #EMP Conto de Genji#!, talvez o romance mais antigo."
 generic_importance: "Este personagem tem importância histórica na vida real."
