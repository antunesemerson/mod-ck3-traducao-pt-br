 nick_la_hire_desc: "Há muitas explicações sobre a origem do apelido \"La Hire\". Alguns dizem que foram os ingleses que o apelidaram de \"the Hire-God\" (a ira de Deus); outros, que vem do termo em francês antigo \"hīra\", significando \"a ira\" ou \"o colérico\". Alternativamente, pode vir da palavra francesa para \"ouriço\" (\"hérisson\"), por causa de seu temperamento espinhoso."
