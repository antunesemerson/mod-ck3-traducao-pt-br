l_spanish:
 tax_rivalry.t: "Sangue e Ouro"
 tax_rivalry.0011.t: "$tax_rivalry.t$: Fazendo as Pazes"
 tax_rivalry.0011.desc_intro: "[forgiven_rival.Custom('ES_ElLa')|U] [forgiven_rival.GetTitledFirstName|l] tem sido, por muito tempo, um espinho de prata no meu lado, mas talvez não precise ser sempre assim."
 tax_rivalry.0011.desc_opinion: "Mal estamos em termos ruins, e com um pouco de diligência, poderíamos até nos tornar valiosos aliados se acabarmos com essa rivalidade."
 tax_rivalry.0011.desc_compassion: "Certamente, não sou de brigar por muito tempo, mas posso confiar em [forgiven_rival.GetSheHe] ter a mente tão aberta quanto eu?"
 tax_rivalry.0011.desc_unity: "Pelo bem do clã, eu poderia fazer as pazes com [forgiven_rival.GetSheHe], mesmo que fosse apenas em nossas vidas públicas. Mas será que [forgiven_rival.Custom('ES_ElLa')] [forgiven_rival.GetTitledFirstNameNoTooltip|l] pensará o mesmo?"
 tax_rivalry.0011.desc_fallback: "Posso estender a mão para fazer as pazes, mas quem sabe se aceitará meu ramo de oliveira?"
 tax_rivalry.0011.a: "Vamos ver o que [forgiven_rival.GetSheHe] acha da minha ideia."
 tax_rivalry.0011.a.tt_ai: "Pedirei [forgiven_rival.Custom('ES_AlAla')] [forgiven_rival.GetTitledFirstNameNoTooltip|l] que ele deixe de lado nosso ressentimento."
 tax_rivalry.0011.a.tt_player: "No final será [forgiven_rival.Custom('ES_ElLa')] [forgiven_rival.GetTitledFirstNameNoTooltip|l] quem decidirá como responder."
 tax_rivalry.0011.a.failure: "[forgiven_rival.Custom('ES_ElLa')|U] [forgiven_rival.GetTitledFirstNameNoTooltip|l] despreza minha oferta"
 tax_rivalry.0011.b: "![forgiven_rival.Custom('ES_ElLa')|U] [forgiven_rival.GetTitledFirstNameNoTooltip|l] ainda provará minha vingança!"
 tax_rivalry.0011.b.tt: "Nossa amarga rivalidade será retomada."
 tax_rivalry.0012.desc_intro_unfriendly: "Embora eu normalmente despreze qualquer menção a [forgiven_rival.Custom('ES_DelDela')] [forgiving_rival.GetTitledFirstName|l], um certo humor me levou a aceitar sua visita repentina ao meu pátio."
 tax_rivalry.0012.desc_intro_friendly: "Embora [forgiven_rival.Custom('ES_ElLa')] [forgiving_rival.GetTitledFirstName|l] e eu não tenhamos estado muito unidos[ROOT.Char.Custom('ES_OA')] desde que começaram nossas disputas, ainda assim apreciei a visita repentina a meu pátio."
 tax_rivalry.0012.desc_outro: "Ali jantamos em um clima excepcionalmente agradável até [forgiving_rival.GetSheHe] limpar a garganta:\n\n\"Se não estivéssemos envolvidos nessa disputa, poderíamos desfrutar de muitas tardes como esta. Então, você perdoaria minha tolice passada, [ROOT.Char.GetTitledFirstNameNoTooltip|l]?\""
 tax_rivalry.0012.a: "Se você perdoar a minha também."
 tax_rivalry.0012.b: "Criados, acompanhem [forgiven_rival.Custom('ES_AlAla')] [forgiving_rival.GetTitledFirstNameNoTooltip|l] até a porta."
 tax_rivalry.0013.desc_intro: "[forgiven_rival.Custom('ES_ElLa')|U] [forgiven_rival.GetTitledFirstName|l] aceitou minha proposta e, a partir de hoje, nossas disputas pecuniárias ficaram no passado."
 tax_rivalry.0013.desc_outro_neutral: "Vamos torcer para que nossa amargura passada não afete nossas relações daqui para frente..."
 tax_rivalry.0013.desc_outro_vengeful: "Después de todo, habrá muchas oportunidades para silenciar[forgiven_rival.GetHerHim] sin que se entere…"
 tax_rivalry.0013.a: "Só podemos esperar."
 tax_rivalry.0014.desc: "Parece que, pelo bem do reino, [forgiven_rival.Custom2('MyCharacterIntroduction', ROOT.Char)] e [forgiving_rival.Custom2('MyCharacterIntroduction', ROOT.Char)] deixaram de lado suas disputas mesquinhas. Só o tempo dirá se brasas perdidas poderão reacender esse fogo mais uma vez."
 tax_rivalry.0014.a: "Veremos."
 tax_rivalry.1000.t: "$tax_rivalry.t$: Ponto Cego"
 tax_rivalry.1000.desc: "As disputas entre [steward.Custom('ES_ElLa')] [steward.GetTitledFirstName|l] e [tax_collector.Custom('ES_ElLa')] [tax_collector.GetTitledFirstName|l] têm se mostrado prejudiciais às finanças do domínio. Nenhum dos dois deseja manter correspondência com o outro e, como resultado, os pagamentos muitas vezes são anulados, extraviados e até perdidos.\n\nEnquanto resmungo sobre isso, avisto as próprias contribuições do casal ao domínio. Seria tão fácil \"perder\" essa soma e fazer com que cada um culpasse o outro pelo seu desaparecimento..."
 tax_rivalry.1000.b: "Deveria repreendê-los por essa negligência."
 tax_rivalry.1000.b.tt: "Ordeno [steward.Custom('ES_AlAla')] [steward.GetTitledFirstNameNoTooltip|l] e [tax_collector.Custom('ES_AlAla')] [tax_collector.GetTitledFirstNameNoTooltip|l] que ponham fim à sua rivalidade."
 tax_rivalry.1001.desc: "Os impostos devidos a [liege.Custom2('MyCharacterIntroduction', ROOT.Char)] desapareceram exatamente no mesmo momento em que [other_rival.Custom2('MyCharacterIntroduction', ROOT.Char)] pagou os dele!\n\nSem nenhuma prova que indique o contrário, só posso assumir que isto é uma conspiração de [other_rival.Custom('ES_DelDela')] [other_rival.GetTitledFirstNameNoTooltip|l] para difamar meu bom nome e tesouraria."
 tax_rivalry.1001.a: "Aquele[other_rival.Custom('ES_OA')] [other_rival.Custom2('InsultNoun', ROOT.Char)]!"
 tax_rivalry.1002.desc: "\"Vocês estão ficando descuidados\", [liege.Custom2('MyCharacterIntroduction', ROOT.Char)] empurra uma bolsa de ouro na direção da nossa extremidade da mesa. \"Vocês mal se comunicam, então teria sido fácil demais para mim tomar suas contribuições e culpar o outro pelo desaparecimento delas. Tratem de pôr fim a essas rixas mesquinhas\".\n\n[liege.GetFirstNameNoTooltip] pega o saco e o guarda, lançando-nos um olhar furioso."
 tax_rivalry.1002.a: "Não acontecerá de novo."
 tax_rivalry.3001.t: "$tax_rivalry.t$: a chusma"
 tax_rivalry.3001.desc_intro: "Enquanto matuto sobre minhas queixas com [sabotaged_rival.Custom('ES_ElLa')] [sabotaged_rival.GetTitledFirstNameNoTooltip|l], ocorre-me um plano bastante vil. Com um pequeno suborno, posso convencer o campesinato de [sabotaged_county.GetNameNoTierNoTooltip] de que [sabotaged_rival.Custom('ES_ElLa')] [sabotaged_rival.GetTitledFirstNameNoTooltip|l] pretende quintuplicar os impostos que eles devem pagar para incitar uma rebelião contra nosso suserano[liege.Custom('ES_XA')], [liege.Custom('ES_ElLa')] [liege.GetTitledFirstName|l]."
 tax_rivalry.3001.desc_outro_assigned: "Naturalmente, a culpa recairá sobre esse [sabotaged_rival.Custom2('InsultNoun', ROOT.Char)] por administrar mal o condado."
 tax_rivalry.3001.desc_outro_fallback: "Não importa que, na verdade, [sabotaged_rival.Custom('ES_ElLa')] [sabotaged_rival.GetTitledFirstNameNoTooltip|l] não esteja no comando do condado, o dano já estará feito."
 tax_rivalry.3001.a: "Chamar os arautos."
 tax_rivalry.3001.a.tt: "Uma [peasant_faction|lE] se levantará contra seu senhor em [sabotaged_county.GetNameNoTierNoTooltip]"
 tax_rivalry.3001.b: "Defender minha própria posição é mais importante."
 tax_rivalry.3002.desc: "Vil [saboteur.Custom2('InsultNoun', ROOT.Char)]! [saboteur.Custom2('MyCharacterIntroduction', ROOT.Char)|U] espalhou a falsa informação de que estou aumentando os impostos em [sabotaged_county.GetName]. Agora se formou uma turba contra meu senhor[liege.Custom('ES_XA')] e nenhuma palavra pode aplacar sua ira."
 tax_rivalry.3002.a: "Foi tudo obra [saboteur.Custom('ES_DelDela')] [saboteur.GetTitledFirstNameNoTooltip|l]!"
 tax_rivalry.3003.desc: "Que bufonaria... Agora [sabotaged_county.GetName] reuniu uma turba contra meu nome, tudo porque acreditaram que [sabotaged_rival.Custom('ES_ElLa')] [sabotaged_rival.GetTitledFirstName|l] aumentaria seus impostos!\n\n[sabotaged_rival.Custom('ES_ElLa')|U] [sabotaged_rival.GetTitledFirstNameNoTooltip|l] afirma que foi obra de [saboteur.Custom('ES_DelDela')] [saboteur.GetTitledFirstName|l], mas uma coisa está clara: a rivalidade desse par está saindo do controle."
 tax_rivalry.3003.a: "Às armas!"
 tax_rivalry.3003.a.tt: "Uma [peasant_faction|lE] se levantará contra você em [sabotaged_county.GetNameNoTierNoTooltip]"
 tax_rivalry.4000.t: "$tax_rivalry.t$: Clã Despedaçado"
 tax_rivalry_liege_notification_desc: "Isso aconteceu por causa da rivalidade entre [steward.GetShortUIName] e [tax_collector.GetShortUIName]."
 tax_rivalry_steward_notification_desc: "Isso aconteceu por causa da sua rivalidade com [tax_collector.GetShortUIName]."
 tax_rivalry_tax_collector_notification_desc: "Isso aconteceu por causa da sua rivalidade com [steward.GetShortUIName]."
 tax_rivalry.4010.t: "$tax_rivalry.t$: Rixa Amarga"
 tax_rivalry.4010.desc_liege_friendly: "Isso aconteceu apesar das boas relações entre os dois."
 tax_rivalry.4010.desc_liege_unfriendly: "Isso aconteceu por causa das más relações entre os dois."
 tax_rivalry.4010.desc_steward_friendly: "Isso aconteceu apesar das minhas boas relações com [tax_collector.GetSheHe]."
 tax_rivalry.4010.desc_steward_unfriendly: "Isso aconteceu por causa das minhas más relações com [tax_collector.GetSheHe]."
 tax_rivalry.4010.desc_tax_collector_friendly: "Isso aconteceu apesar das minhas boas relações com [steward.GetSheHe]."
 tax_rivalry.4010.desc_tax_collector_unfriendly: "Isso aconteceu por causa das minhas más relações com [steward.GetSheHe]."
 tax_rivalry.4011.t: "$tax_rivalry.t$: Relações Descongelando"
 tax_rivalry.4011.desc_liege_friendly: "Isso aconteceu por causa das boas relações entre os dois."
 tax_rivalry.4011.desc_liege_unfriendly: "Isso aconteceu apesar das más relações entre os dois."
 tax_rivalry.4011.desc_steward_friendly: "Isso aconteceu por causa das minhas boas relações com [tax_collector.GetSheHe]."
 tax_rivalry.4011.desc_steward_unfriendly: "Isso aconteceu apesar das minhas más relações com [tax_collector.GetSheHe]."
 tax_rivalry.4011.desc_tax_collector_friendly: "Isso aconteceu por causa das minhas boas relações com [steward.GetSheHe]."
 tax_rivalry.4011.desc_tax_collector_unfriendly: "Isso aconteceu apesar das minhas más relações com [steward.GetSheHe]."
 tax_rivalry.9000.t: "$tax_rivalry.t$: Vitória"
 tax_rivalry.9000.desc: "Não preciso mais suportar [less_fortunate_rival.Custom('ES_AlAla')] [less_fortunate_rival.GetTitledFirstName|l] e sua [less_fortunate_rival.Custom('quirk_neg_noun')]. Pois agora sou [ROOT.Char.Custom('MistressMaster')] do meu próprio domínio e [less_fortunate_rival.Custom('ES_ElLa')] [less_fortunate_rival.GetTitledFirstNameNoTooltip|l] será o alvo de uma ira muito mais poderosa se ousar perturbar novamente meu reinado."
 tax_rivalry.9000.a: "É bom ser [ROOT.Char.GetTitleAsNameNoTooltip|l]."
 tax_rivalry.9000.a.tt: "Termina sua rivalidade com [less_fortunate_rival.Custom('ES_ElLa')] [less_fortunate_rival.GetTitledFirstNameNoTooltip|l], por enquanto."
 tax_rivalry.9001.t: "$tax_rivalry.t$: Derrota"
 tax_rivalry.9001.desc: "Como eu poderia antecipar que [fortunate_rival.GetFullName] se tornaria [fortunate_rival.GetTitleAsNameNoTooltip|l] de [fortunate_rival.GetPrimaryTitle.GetNameNoTierNoTooltip]? Se ao menos eu tivesse agido mais cedo, então meu destino não estaria selado agora!"
 tax_rivalry.9001.a_spurned: "Isso não acabou ainda!"
 tax_rivalry.9001.a_neutral: "Assim começa um novo capítulo..."
 tax_rivalry.9001.a.tt: "Termina sua inimizade com [fortunate_rival.Custom('ES_ElLa')] [fortunate_rival.GetTitledFirstNameNoTooltip|l], por enquanto."
