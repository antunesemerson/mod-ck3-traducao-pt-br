l_spanish:
 #Secret has been exposed/discovered — lover/spouse decides how to react, by Mathilda Bjarnehed
 infidelity_confrontation.1000.t: "Infidelidade"
 #Special confession desc
 infidelity_confrontation.1000.confession.apologetic_start.desc: "[infidelity_partner.GetFirstName] guarda silêncio como se estivesse congelad[infidelity_partner.Custom('ES_OA')] , mas vejo isso em seu olhar. Meus medos se tornaram realidade. Eu também pareço congelad[ROOT.Char.Custom('ES_OA')] , exceto pelo meu coração, que bate forte.\n\nQuando as palavras finalmente começam a sair dos lábios de [infidelity_partner.GetFirstName] , as lágrimas também começam a cair dos olhos.\n\n«Oh, [infidelity_partner.Custom2('RelationToMeShort', ROOT.Char)] , juro que nunca quis te machucar! Eu... eu vou te contar tudo. Compartilhei minha cama com"
 infidelity_confrontation.1000.confession.your_lovername.desc: "[infidelity_partners_lover.Custom2('YourCharacterIntroductionNoComma', ROOT.Char)]."
 infidelity_confrontation.1000.confession.my_lovername.desc: "[infidelity_partners_lover.Custom2('MyCharacterIntroductionNoComma', infidelity_partner)]."
 infidelity_confrontation.1000.confession.apologetic_end.desc: "\""
 infidelity_confrontation.1000.confession.unapologetic_start.desc: "[infidelity_partner.GetFirstNameNoTooltip] não esperava minha acusação, isso está claro. Mas não fica abalada[infidelity_partner.Custom('ES_OA')] por muito tempo.\n\n“Demorou para perceber, #EMP [infidelity_partner.Custom2('RelationToMeShort', ROOT.Char)]#!”. Suas palavras destilam veneno. “Sim, eu me deitei com outra pessoa."
 infidelity_confrontation.1000.confession.unapologetic_end_opposite_sex.desc: "Eu preferiria dormir com cem [infidelity_partners_lover.GetWomenMen] do que passar uma noite com você.\""
 infidelity_confrontation.1000.confession.unapologetic_end_same_sex.desc: "[infidelity_partners_lover.GetSheHe|U] é o dobro de [infidelity_partners_lover.GetWomanMan] que você jamais será."
 #Regular desc
 infidelity_controntation.1000.partner_exposed_intro.desc: "[infidelity_partner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] confessou ter tido um caso com [infidelity_partners_lover.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]!\n\n"
 infidelity_controntation.1000.partners_lover_exposed_intro.desc: "[infidelity_partners_lover.Custom2('MyCharacterIntroduction', ROOT.Char)|U] confessou ter tido um caso com [infidelity_partner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]!\n\n"
 infidelity_controntation.1000.exposed_intro.desc: "[exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] expôs o caso da minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('infidelity_partner'))] [infidelity_partner.GetFirstName] com [infidelity_partners_lover.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]!\n\n"
 infidelity_controntation.1000.investigation_intro.desc: "Minha investigação foi bem-sucedida, e meus temores se confirmaram. [infidelity_partner.GetFirstNameNoTooltip] está tendo um caso com [infidelity_partners_lover.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]!\n\n"
 infidelity_controntation.1000.exposed_knew.desc: "Agora que toda a história veio à tona, meu [ROOT.Char.Custom2('RelationToMeShort', infidelity_partner )] e seu [infidelity_partners_lover.Custom2('InsultNounSexual', ROOT.Char)] estão prestes a enfrentar as consequências de suas ações."
 infidelity_controntation.1000.start_lover.desc: "Como se ter outro amante não fosse o suficiente,"
 infidelity_controntation.1000.start_spouse.desc: "Como se violar a santidade de nosso casamento não fosse o suficiente,"
 infidelity_controntation.1000.incest.desc: "É[infidelity_partner.Custom('ES_EA')] [infidelity_partner.Custom2('InsultNoun', ROOT.Char)] de [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('infidelity_partner'))] teve de dividir a cama precisamente com [infidelity_partners_lover.Custom('ES_ElElla')]! Sua própri[infidelity_partners_lover.Custom('ES_OA')] #EMP [infidelity_partner.Custom2('RelationToMeShort', SCOPE.sC('infidelity_partners_lover'))]#!!\n\nEu devia ter imaginado. Eles sempre foram tão… unidos[infidelity_partner.Custom('ES_OsAs')]. Oh, [ROOT.Char.GetFaith.HighGodName]. Imaginar[infidelity_partner.Custom('ES_OsAs')] junt[infidelity_partner.Custom('ES_OsAs')]… me dá nojo."
 infidelity_controntation.1000.sodomy.desc: "¡[infidelity_partner.Custom('ES_EA')] [infidelity_partner.Custom2('InsultNoun', ROOT.Char)] de [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('infidelity_partner'))]teve de dividir a cama com [infidelity_partners_lover.Custom('ES_ElElla')]! Outro[infidelity_partners_lover.Custom('ES_OA')] #EMP [infidelity_partner.GetWomanMan]#!!\n\nOh, [ROOT.Char.GetFaith.HighGodName]. Só de imaginá-l[infidelity_partner.Custom('ES_OsAs')] junt[infidelity_partner.Custom('ES_OsAs')]… isso me dá nojo."
 infidelity_controntation.1000.regular.desc: "Como pôde [infidelity_partner.GetTitledFirstName|l] compartilhar sua cama com outro? Como pôde me trair desse jeito? Talvez eu nunca saiba suas razões, mas não parece haver dúvida de sua culpa."
 #Options
 infidelity_confrontation.1000.demand_break_up.lover: "Tome sua decisão. É [infidelity_partners_lover.Custom('ES_ElElla')] ou eu!"
 infidelity_confrontation.1000.demand_break_up.spouse: "Acabe com isso, ou #EMP haver?#! consequências!"
 infidelity_confrontation.1000.demand_break_up.success: "[infidelity_partner.GetFirstNameNoTooltip] cede à sua demanda"
 infidelity_confrontation.1000.break_up.failure: "[infidelity_partner.GetFirstNameNoTooltip] se recusa a terminar o caso"
 infidelity_confrontation.1000.demand_break_up.flavor: "É mais provável que [infidelity_partner.GetFirstNameNoTooltip] aceite se temer as consequências"
 infidelity_confrontation.1000.plead_break_up: "Meu amor, eu te suplico! Que essa loucura termine!"
 infidelity_confrontation.1000.plead_break_up.flavor: "É mais provável que [infidelity_partner.GetFirstNameNoTooltip] aceite se se preocupa com você ou sente pena de você"
 infidelity_confrontation.1000.plead_break_up.success: "[infidelity_partner.GetFirstNameNoTooltip] termina o caso e implora por perdão"
 infidelity_confrontation.1000.break_up: "Eu #EMP sabia#! que [infidelity_partner.GetSheHe] não era digno de minha atenção."
 infidelity_confrontation.1000.expose: "O mundo conhecerá seu caso sórdido!"
 infidelity_confrontation.1000.blackmail: "Certamente, você quer que isso permaneça em segredo..."
 infidelity_confrontation.1000.imprison: "O amor o manterá aquecido nas masmorras."
 infidelity_confrontation.1000.opt_out: "Eu preciso de tempo para pensar..."
 infidelity_confrontation.1000.opt_out.knew: "Eu me canso dessa farsa."
 infidelity_confrontation.1000.opt_out.blackmail.tt: "Poderia considerar [Concept( 'blackmailing', 'chantajear' )|E] a [infidelity_partner.GetShortUIName] , fazê-lo provar do próprio veneno, ou perdoar[infidelity_partner.GetHerHim]"
 infidelity_confrontation.1000.opt_out.divorce.tt: "Poderia considerar [Concept( 'divorcing', 'divorciarme' )|E] de [infidelity_partner.GetShortUIName], fazê-lo provar do próprio remédio, ou perdoá-lo[infidelity_partner.GetHerHim]"
 infidelity_confrontation.1000.opt_out.fallback.tt: "Poderia considerar fazer com que [infidelity_partner.GetShortUIName] prove do próprio veneno, ou perdoar[infidelity_partner.GetHerHim]"
 #Demand break up branch: Demand is presented to infidelity partner, by Mathilda Bjarnehed
 infidelity_confrontation.1010.start.desc: "\"Eu sei de tudo sobre o seu caso sórdido com [infidelity_partners_lover.GetTitledFirstName|l]! Não desperdice seu fôlego negando!\""
 infidelity_confrontation.1010.sad.desc: "A voz do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('confronting_partner'))] [confronting_partner.GetFirstName] treme, lágrimas escorrem pelo seu rosto.\n\n"
 infidelity_confrontation.1010.angry.desc: "O grito de meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('confronting_partner'))] [confronting_partner.GetFirstName] reverbera nos meus ossos. Preciso de todas as minhas forças para não me encolher.\n\n"
 infidelity_confrontation.1010.break_up.desc: "\"Eu não aguento mais isso, [ROOT.Char.GetFirstNameNoTooltip]. Você tem que fazer uma escolha. É [infidelity_partners_lover.GetSheHe] ou eu!\""
 infidelity_confrontation.1010.celibacy.desc: "\"Se não deixar [infidelity_partners_lover.GetHerHim], jamais voltarei a compartilhar sua cama!\""
 infidelity_confrontation.1010.imprisonment.desc: "\"Se você se recusar a deixar [infidelity_partners_lover.GetHerHim], eu os separarei com barras de ferro!\""
 infidelity_confrontation.1010.a: "Eu vou terminar, eu juro!"
 infidelity_confrontation.1010.c: "Faça o que quiser — [infidelity_partners_lover.GetSheHe] e eu estamos destinados a ficar juntos!"
 #Demand break up branch: Demand is accepted, by Mathilda Bjarnehed
 infidelity_confrontation.1011.unapologetic_start.desc: "Os olhos de [infidelity_partner.GetFirstName] ardem, mas sua voz é fria como o gelo.\n\n\"Você acha que ameaças vão consertar nosso"
 infidelity_confrontation.1011.unapologetic_marriage.desc: "casamento,"
 infidelity_confrontation.1011.unapologetic_love.desc: "amor,"
 infidelity_confrontation.1011.unapologetic_end.desc: "[ROOT.Char.GetFirstNameNoTooltip]? Tudo bem. Faça como quiser. Mas não se iluda — eu não me arrependo do que fiz. Nem por um segundo sequer.\""
 infidelity_confrontation.1011.a: "As coisas nunca mais serão as mesmas entre nós?"
 infidelity_confrontation.1011.apologetic_start.desc: "Lágrimas escorrem pelas bochechas de [infidelity_partner.GetFirstName]. Serão lágrimas de arrependimento ou medo, eu me pergunto?\n\n\"Por favor, você deve me perdoar. Eu imploro! Eu vou terminar, é claro que vou. Foi um erro estúpido — nada mais! Eu juro!"
 #Demand break up branch: Demand is rejected, by Mathilda Bjarnehed
 infidelity_confrontation.1012.apologetic_start.desc: "[infidelity_partner.GetFirstName] permanece imóvel[infidelity_partner.Custom('ES_OA')] e em silêncio enquanto faço minha exigência, com lágrimas escorrendo por suas bochechas. Mas quando [infidelity_partner.GetSheHe] finalmente fala, suas palavras não são o que eu esperava.\n\n"
 infidelity_confrontation.1012.apologetic_imprisonment.desc: "Lamento, mas não posso fazer isso. Eu preferiria passar o resto dos meus dias nas masmorras a negar meus sentimentos por [infidelity_partners_lover.GetFirstName]. Se você me odeia tanto — se você quer me ver sofrer — que seja assim."
 infidelity_confrontation.1012.apologetic_break_up.desc: "Nunca quis te machucar, e por isso lamento. Mas não posso negar meus sentimentos por [infidelity_partners_lover.GetFirstName]. O que temos — nada mais se compara a isso. Nem mesmo você."
 infidelity_confrontation.1012.unapologetic_imprisonment.desc: "[ROOT.Char.GetFirstNameNoTooltip]? Prefiro passar o resto da minha vida nas masmorras do que mais um segundo com você!"
 infidelity_confrontation.1012.unapologetic_break_up.desc: "[ROOT.Char.GetFirstNameNoTooltip]? Você sempre foi um[ROOT.Char.Custom('ES_XA')] idiota. Obrigado por abrir meus olhos. Jamais te vi com tanta clareza!\""
 infidelity_confrontation.1012.a: "Tudo bem! Será como você quiser, [infidelity_partner.Custom2('InsultNounSexual', ROOT.Char)] [infidelity_partner.Custom2('InsultAdjective', ROOT.Char)]!"
 #Demand break up branch: break up notification for the infidelity partner's lover, by Mathilda Bjarnehed
 infidelity_confrontation.1013.t: "[infidelity_partners_lover.Custom2('AppropriateGreeting', infidelity_partner)]"
 infidelity_confrontation.1013.love.desc: "[ROOT.Char.Custom('LoverPetName')|U], pensei que estaríamos juntos para sempre, que nada poderia nos separar. Mas não importa o quanto eu me importe com você, não posso mais ignorar a dura realidade de nossa situação. Nossos sonhos, tão doces e perfeitos como possam ser, nunca foram mais do que isso. E agora eles nunca serão.\n\nApesar de tudo, devemos seguir em frente, meu amor. Se não podemos estar juntos nesta vida, devemos esperar pacientemente pela próxima."
 infidelity_confrontation.1013.like.desc: "Querid[ROOT.Char.Custom('ES_OA')] [ROOT.Char.Custom('LoverPetName')]. Com o coração pesado, escrevo esta carta. Tivemos um sonho, um sonho maravilhoso e alegre, mas nunca passou disso, e por mais que doa, a resposta é óbvia. Não podemos continuar juntos.\n\nQuero agradecer-te pelos bons momentos, nunca os esquecerei. Que tua vida seja longa e feliz."
 infidelity_confrontation.1013.neutral.desc: "Nosso caso, por mais agradável que tenha sido, não é mais uma questão privada. Foi bom enquanto durou, mas agora deve terminar.\n\nCuide-se, [ROOT.Char.GetTitledFirstNameNoTooltip|l]. Esta despedida pode doer hoje, mas eu garanto — logo será esquecida."
 infidelity_confrontation.1013.a: "E nem mesmo uma chance de se despedir com um beijo..."
 #Plead for break up branch: infidelity partner is presented with request, by Mathilda Bjarnehed
 infidelity_confrontation.1001.kind_start.desc: "As lágrimas do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('confronting_partner'))] [confronting_partner.GetFirstName] me doem muito mais do que palavras duras jamais poderiam. Fico arrasad[ROOT.Char.Custom('ES_OA')] quando"
 infidelity_confrontation.1001.unkind_start.desc: "As lágrimas da minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('confronting_partner'))] [confronting_partner.GetFirstName] são sinceras? Talvez isso não seja nada além de uma encenação, feita para despertar minha piedade? Soltei um suspiro exasperado enquanto"
 infidelity_confrontation.1001.love_end.desc: "[confronting_partner.GetSheHe|U] enterra o rosto no meu [ROOT.Char.Custom('GetClothingArticle')].\n\n«Como você pôde fazer isso, [ROOT.Char.GetFirstNameNoTooltip]? Eu te amo, estupid[ROOT.Char.Custom('ES_OA')]!». [confronting_partner.GetFirstName] respira longa e trêmulamente. «Volte para mim, meu [ROOT.Char.Custom('LoverPetName')]. Abandone ess[infidelity_partners_lover.Custom('ES_EA')] [infidelity_partners_lover.Custom2('InsultNoun', SCOPE.sC('confronting_partner'))] e eu te perdoarei tudo»."
 infidelity_confrontation.1001.regular_end.desc: "[confronting_partner.GetSheHe|U] enxuga as bochechas com um lenço.\n\n«Sei que não sou [confronting_partner.Custom('ES_ElLa')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('confronting_partner'))] perfeit[confronting_partner.Custom('ES_OA')], mas mereço algo melhor do que isso. Nós dois merecemos. Imploro que caia em si e abandone es[infidelity_partners_lover.Custom('ES_EA')] [infidelity_partners_lover.Custom2('InsultNoun', SCOPE.sC('confronting_partner'))]. Ainda não é tarde para consertar as coisas»."
 infidelity_confrontation.1020.a: "Farei qualquer coisa para merecer seu perdão!"
 infidelity_confrontation.1020.b: "Não posso negar meus sentimentos por [infidelity_partners_lover.GetFirstNameNoTooltip]!"
 #Plead for breakup branch: request is accepted, by Mathilda Bjarnehed
 infidelity_confrontation.1021.love.desc: "O alívio no rosto de [infidelity_partner.GetFirstName] é inconfundível. Com isso vêm lágrimas e, quando se lança em meus braços, posso sentir a umidade contra meu pescoço.\n\n\"Não mereço o seu perdão\", sussurra entre soluços. \"Mas farei tudo o que estiver ao meu alcance para mudar isso. Eu juro, meu amor. Juro pela minha vida\"."
 infidelity_confrontation.1021.regular.desc: "A vergonha no rosto de [infidelity_partner.GetFirstName] é inconfundível. \"Eu tinha me convencido de que não havia feito nada de errado, mas agora que tudo veio à tona…\"\n\n[infidelity_partner.GetSheHe|U] balança a cabeça com um suspiro. \"Agora consigo finalmente ver o erro dos meus caminhos. Perdoe-me, [ROOT.Char.GetFirstNameNoTooltip]. Vamos tentar de novo\"."
 infidelity_confrontation.1021.a: "Vai levar tempo, mas vamos reconstruir."
 #Plead for breakup branch: request is rejected, by Mathilda Bjarnehed
 infidelity_confrontation.1021.unapologetic_start.desc: "\"Deixe de fingir,\" diz [infidelity_partner.GetFirstName], [infidelity_partner.Custom('quirk_neg_pp')]. \"Nenhuma quantidade de lágrimas me fará mudar de ideia. Pare de desperdiçar seu tempo — e o meu.\"\n\nComo el pode ser tão fri?"
 infidelity_confrontation.1022.apologetic_start.desc: "[infidelity_partner.GetFirstName] permanece em silêncio[infidelity_partner.Custom('ES_OA')] e em silêncio enquanto imploro por seu amor, com lágrimas correndo por suas bochechas. Mas quando [infidelity_partner.GetSheHe] fala finalmente, suas palavras não são o que eu esperava.\n\n"
 infidelity_confrontation.1022.a: "Ofereço a você meu coração, e você o joga fora?"
 #Break up branch: infidelity partner is informed about confronting partner's decision to end it, by Mathilda Bjarnehed
 infidelity_confrontation.1030.t: "[confronting_partner.Custom2('AppropriateGreetingNegative', infidelity_partner)]"
 infidelity_confrontation.1030.desc: "Ouvi falar de suas sórdidas escapadas com [infidelity_partners_lover.Custom('ES_ElLa')] [infidelity_partners_lover.GetTitledFirstName|l]. Obrigado por revelar tão claramente sua verdadeira natureza!\n\nNão tenho nenhuma dúvida; desperdicei meu tempo e atenção em um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom2('InsultNounSexual', SCOPE.sC('confronting_partner'))] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('confronting_partner'))]. Assim que esta carta for enviada, não lhe dedicarei mais nenhum pensamento."
 infidelity_confrontation.1030.a: "Se você apenas me deixasse explicar!"
