l_spanish:
 bell_special_yearly.1000.t: "O Sino de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]"
 bell_special_yearly.1000.desc: "Mi [steward.GetCouncilTitle] [steward.GetFirstName] me ha sugerido inspeccionar una iglesia abandonada cercana de la época de los visigodos.\n\nEntre la bóveda de cañón y los arcos de herradura, hay un campanario que en su día fue hermoso, con varias campanas desvencijadas a las que les faltan los badajos.\n\nMientras deambulo por las ruinas, oigo resonar unos cascos. Al mirar por un agujero, veo que se acerca [faction_member_1.GetTitledFirstName|l]. ¿Creerá que este lugar puede servir de guarida a su facción traicionera?"
 #[faction_member_1_faction.GetName]
 bell_special_yearly.1000.a: "Eu poderia matar [faction_member_1.GetHerHim] agora que ninguém está me vendo!"
 bell_special_yearly.1000.a.tt: "Você se aproxima furtivamente de [faction_member_1.GetTitledFirstName|l] e tenta assassinar [faction_member_1.GetHerHim]"
 bell_special_yearly.1000.b: "Devo me afastar silenciosamente."
 bell_special_yearly.1500.desc: "Me escondo en la antecámara de la iglesia, y solo puedo oír los latidos sordos de mi corazón asesino y los pasos de [faction_member_1.GetTitledFirstName|l].\n\nCuando entra en la habitación, le golpeo la cabeza con un escombro, y [faction_member_1.GetSheHe] cae al suelo.\n\nMientras golpeo una y otra vez, una fantasía fugaz nubla mis visiones teñidas de sangre. El sueño de este viejo campanario haciendo música de nuevo, con las cabezas de mis enemigos como badajos."
 bell_special_yearly.1500.a: "Outro tolo briguento se juntará ao meu conjunto!"
 bell_special_yearly.1500.a.tt: "Você procura por outra vítima."
 bell_special_yearly.1500.discovery.tt: "Suas chances de descoberta aumentam"
 bell_special_yearly.1500.b: "Devo voltar para casa e descansar."
 bell_special_yearly.1500.b.tt: "Você para de coletar cabeças para o sino."
 bell_special_yearly.2000.desc: "Exijo [faction_member_2.Custom('ES_AlAla')] repelente [faction_member_2.GetTitledFirstName|l] que visite mi [ROOT.Char.Custom('FortifiedBuilding')] y me disfrazo de trovador. Con el disfraz, proclamo que «¡[ROOT.Char.GetTitledFirstName|l] os exige escuchar esta nueva y maravillosa composición inventada aquí en la capital!».\n\nUna vez que está dentro, [faction_member_2.GetHerHim] obligo a entrar en una cámara sol[faction_member_2.Custom('ES_OA')]. Allí toco las #italic canços#! más insulsas que puedo durante horas hasta que semejante imbécil se duerme.\n\nTrabajo con rapidez: estrangulo a mi enemig[faction_member_2.Custom('ES_OA')] con una de las cuerdas del laúd, meto la cabeza en la funda del laúd y salgo corriendo por los pasillos antes de que nadie pueda parpadear."
 bell_special_yearly.2000.a: "O Sino ainda não tem cabeças suficientes!"
 bell_special_yearly.2000.b: "Este é um crime belo — eu não deveria arriscar estragá-lo."
 #Dropping an organ out of a window
 bell_special_yearly.3000.desc: "He forzado una visita real al/a la [ROOT.Char.Custom('FortifiedBuilding')] [faction_member_3.Custom('ES_DelDela')] [faction_member_3.GetTitledFirstName|l] bajo el pretexto de intentar disipar las tensiones con su facción rebelde. Durante una pausa en las negociaciones, examino sus salas de música y pido que me dejen tocar a solas.\n\nLa sala de música tiene un gran ventanal sobre el jardín del [ROOT.Char.Custom('FortifiedBuilding')] y un órgano bastante grande al lado. El momento es demasiado perfecto.\n\nCuando [faction_member_3.GetFirstNameNoTooltip] pasa por debajo de la ventana para tomarse un momento de solaz, empujo el órgano. Se acelera en el aire y [faction_member_3.GetHerHim] aplasta. Riendo tontamente me apresuro a recoger la cabeza antes de que se descubra la muerte."
 bell_special_yearly.3000.a: "O Sino será requintado!"
 bell_special_yearly.3000.b: "Acidentes com órgãos estranhos acontecem todos os dias."
 #[faction_member_3_faction.GetName]
 bell_special_yearly.4000.desc: "Me entretengo en mi jardín, jugando ensimismad[ROOT.Char.Custom('ES_OA')] con las rosas, arrancándoles las flores una a una.\n\nMe pregunto qué hacer con mi campanario. ¿Estará destinado a resonar?"
 bell_special_yearly.4000.desc_discoverer: "\n\nMientras reflexiono sobre ello, noto que [bell_discoverer.GetTitledFirstName|l], un[bell_discoverer.Custom('ES_OA')] de [bell_discoverer.GetHerHim]s que aún lloran a una víctima de las desapariciones, me mira fijamente en el jardín. Contengo la risa, y casi quiero decírselo en el acto."
 bell_special_yearly.4000.a: "Devo dar um grande concerto na igreja!"
 bell_special_yearly.4000.a.tt: "Todos ficam cientes de seus assassinatos."
 bell_special_yearly.4000.b: "Ninguém precisa saber das minhas diversões particulares."
 bell_discovery_success_effect: "O Sino é mantido em segredo"
 bell_discovery_failure_effect: "O Sino é descoberto"
 bell_special_yearly.5000.desc: "Salgo una noche a visitar mi campana y a deleitarme con su resplandeciente villanía. Para sorpresa mía, ya hay antorchas titilando al entrar en las ruinas.\n\nAl principio imagino que los fantasmas de los visigodos están disgustados por haber profanado su iglesia, pero entonces [bell_discoverer.GetTitledFirstName|l] se quita la capucha. «Siento que he viajado al [bell_discoverer.GetFaith.NegativeAfterLife] y que estaré allí toda mi vida, después de descubrir la abominación que habéis causado. ¡Os uniréis a vuestras víctimas, criatura!»\n\nApenas acierto a sentir un tajo de acero que me atraviesa el cuello y luego ya no siento nada en absoluto."
 bell_special_yearly.5000.a: "Toque-me uma despedida, [bell_discoverer.GetTitledFirstNameNoTooltip|l]."
 bell_special_yearly.6000.desc: "Realiza-se um concerto nas ruínas visigóticas para toda a minha corte, prometendo uma noite de música numa antiga igreja à luz de velas.\n\nO repertório habitual dos menestréis prossegue enquanto alguns convidados reclamam do cheiro peculiar. Desfrutamos de algumas melodias leves com flautas e instrumentos de corda dedilhados, e as peças se tornam mais melancólicas à medida que a noite avança.\n\nAo final, os servos obedecem à minha ordem de correr e fazer soar os sinos ao ritmo da última canção. Os gritos dos meus cortesãos se juntam à voz do coro enquanto todos contemplam minhas cabeças chocalhantes e tinindo."
 bell_special_yearly.6000.a: "Que bela música!"
 bell_special_yearly.6000.b: "O resto de vocês se juntará a eles, se me desafiarem!"
