 #Maintenance
 ep3_story_cycle_harrying.0001.t: "O Martelo Cai"
 ep3_story_cycle_harrying.0001.desc: "Com o último governante Ætheling removido do poder, o Massacre do Norte pode realmente ser considerado terminado.\n\n"
 ep3_story_cycle_harrying.0001.desc.hereward: "Não surgirão desafios ao trono de [england.GetName]. Os nobres anglo-saxões jazem dispersos, mansos e passivos, despojados de sua posição e poder. Todos se arrastam aos pés de [ruler_england.Custom('ES_DelDela')] [ruler_england.GetTitledFirstName|l].\n\nPerdi meu propósito. Agora que os normandos estão aqui para ficar, não há esperança de que exista um futuro anglo-saxão. No melhor dos casos, nos fundiremos e faremos parte da tessitura da terra; no pior, desapareceremos por completo da história."
 ep3_story_cycle_harrying.0001.desc.william: "Estou em ascensão: ninguém se atreve a desafiar meu poder em [england.GetName]. Os nobres anglo-saxões estão espalhados, submissos e passivos, prestando homenagem a mim por medo de represálias. Cada um beijará meu anel e se submeterá a mim antes do final do ano.\n\nMeu governo é incontestado, e agora posso partir para novas ambições."
 ep3_story_cycle_harrying.0001.desc.therest: "A feroz resistência que enfrentou [ruler_england.Custom('ES_ElLa')] [ruler_england.GetTitledFirstName|l] se dissolveu diante do medo de represálias severas. O domínio normando sobre [england.GetName] não é contestado."
 ep3_story_cycle_harrying.0001.a: "Minha causa falhou."
 ep3_story_cycle_harrying.0001.b: "Minha terra não está mais dividida."
 ep3_story_cycle_harrying.0001.c: "Interessante."
 ep3_story_cycle_harrying.0002.t: "O Retorno"
 ep3_story_cycle_harrying.0002.desc: "Com um anglo-saxão novamente no trono do [england.GetName], o Massacre do Norte pode realmente ser considerado terminado.\n\n"
 ep3_story_cycle_harrying.0002.desc.hereward: "Nossa causa foi justa, os desafios foram grandiosos, a represália amarga. No entanto, o espírito anglo-saxão prevaleceu, e agora retornamos ao nosso lugar de direito nos assentos do poder nessas terras.\n\nDevo agora colocar minha espada para baixo. Talvez não a transforme em arado ainda, pois os inimigos do reino continuam numerosos, mas a lenda de Wake deve agora lentamente desaparecer da memória."
 ep3_story_cycle_harrying.0002.desc.ruler: "Os intrusos normandos derretem-se diante de nós. Alguns permanecem agarrados ao seu poder, outros retornam à sua terra natal, e muitos mais jazem sob as justas gramas da Inglaterra.\n\nNenhum deles se atreve a desafiar minha posição."
 ep3_story_cycle_harrying.0002.desc.therest: "A invasão, inicialmente bem-sucedida, rapidamente se transformou em um pesadelo para os intrometidos normandos, e a ascensão ao trono [ruler_england.Custom('ES_DelDela')] [ruler_england.GetTitledFirstName|l] pôs fim às ambições estrangeiras pelo trono. Por ora."
 ep3_story_cycle_harrying.0002.a: "Que desapareça rapidamente e felizmente."
 ep3_story_cycle_harrying.0002.b: "Minha terra não está mais dividida."
 ep3_story_cycle_harrying.0002.c: "Interessante."
 ep3_story_cycle_harrying.0003.t: "Tempos Incertos"
 ep3_story_cycle_harrying.0003.desc: "O amargo conflito que irrompeu entre os governantes normandos e os nobres anglo-saxões devastou ambos os lados, com resultados verdadeiramente inesperados.\n\nOs [ruler_england.GetCulture.GetCollectiveNounNoTooltip] agora controlam o trono de [england.GetName], [ruler_england.Custom('ES_ElLa')] [ruler_england.GetTitledFirstName|l] governa as terras arrasadas e destruídas de sua sede de poder. Como resultado, a Devastação do Norte se extinguiu; as duas facções em guerra já não são capazes de prosseguir sua disputa.\n\nO futuro do reino é incerto, e muito ainda permanece incerto nestes tempos de transição."
 ep3_story_cycle_harrying.0003.a: "Resta saber se isso é uma melhoria..."
 ep3_story_cycle_harrying.0003.b: "Eu unirei essas terras díspares."
 ep3_story_cycle_harrying.0003.c: "Interessante."
 ep3_story_cycle_harrying.0004.t: "Erros do Passado"
 ep3_story_cycle_harrying.0004.desc: "Muitos anos se passaram desde a invasão normanda da Inglaterra.\n\n"
 ep3_story_cycle_harrying.0004.desc.ruler: "Na verdade, muitos, que os locais agora mal se lembram do porquê de sua raiva tão profunda contra meu governo. Cada vez mais eles abandonam suas espadas, não dispostos a continuar a luta de seus avós.\n\nMeu governo agora é quase incontestado, e não preciso mais continuar esta campanha de pacificação. O Massacre do Norte acabou."
 ep3_story_cycle_harrying.0004.desc.anglo_saxon: "Aqueles que estavam por aqui há tantas décadas se foram, seus corpos fertilizantes para os campos. Até seus filhos agora são grisalhos e trôpegos. Seus filhos, por sua vez, cada vez mais colocam de lado a luta de seus antepassados em favor de uma coexistência pacífica. Por sua vez, os [ruler_england.GetCulture.GetCollectiveNounNoTooltip] no trono recuam a mão da opressão, não vendo mais o benefício de tal conflito.\n\nO Massacre do Norte acabou."
 ep3_story_cycle_harrying.0004.desc.therest: "Tempo suficiente se passou para que a geração atual de anglo-saxões na Inglaterra mal se lembre do que está lutando. Os governantes [ruler_england.GetCulture.GetCollectiveNounNoTooltip] fazem parte do tecido da terra, e poucos de ambos os lados têm muitos motivos para continuar o conflito.\n\nO Massacre do Norte acabou."
 ep3_story_cycle_harrying.0004.a: "Eles fazem parte deste reino, assim como nós."
 ep3_story_cycle_harrying.0004.b: "Vamos seguir em frente, em amizade."
 ep3_story_cycle_harrying.0004.c: "Interessante."
 ### WILLIAM EVENTS
 ep3_story_cycle_harrying.1000.t: "Em Chamas"
 ep3_story_cycle_harrying.1000.desc: "Com os nobres anglo-saxões descontentes perseguindo sua causa condenada ao fracasso, passo muitas noites refletindo sobre maneiras de lhes tirar o poder.\n\nApressar-me para tomar seus títulos causaria um alvoroço, mas a vida [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetLadyLord|l] depende do trabalho dos camponeses. Nós estamos acima deles, colocados nesse lugar por [ROOT.Char.GetFaith.HighGodName], mas é graças ao seu trabalho extenuante que nosso poder prospera.\n\nO grão, por sua vez, é o sustento do campesinato. Menos grão significa menos camponeses, e quanto menos camponeses, mais fraca é [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetLadyLord]. E quanto mais fraca for [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetLadyLord]…"
 ep3_story_cycle_harrying.1000.a: "Cada grão de comida no [crop_duchy.GetNameNoTooltip] deve ser destruído."
 ep3_story_cycle_harrying.1000.b: "Deixe apenas o mínimo necessário. Incendeie o resto."
 ep3_story_cycle_harrying.1000.c: "Se eles querem seu grão, devem pagar por isso."
 every_county_in_duchy_aetheling: "Cada [county|lE] em [crop_duchy.GetName]"
 ep3_story_cycle_harrying.1005.t: "A Grande Estrada do Norte"
 ep3_story_cycle_harrying.1005.desc: ""O norte?". Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('marshal'))] [marshal.GetFirstName] reflete por um momento. "Anos de incursões vindas do outro lado do mar lhes deram uma cultura diferente daquela que você encontraria por aqui".\n\n"Vê esta linha? Chamam-na de Grande Estrada do Norte". [marshal.GetFirstNameNoTooltip] acaricia o queixo pensativamente. "Tradicionalmente, é a única rota terrestre confiável para o norte, mas está muito deteriorada".\n\nVejo o dilema. Uma rota assim é uma bênção e uma maldição. Garantir uma passagem segura é vital para nós, mas qualquer estrada pode ser usada por ambos os lados…"
 ep3_story_cycle_harrying.1005.a: "Renove a estrada e adicione guardas armados."
 ep3_story_cycle_harrying.1005.b: "Precisamos que a estrada esteja em boas condições."
 ep3_story_cycle_harrying.1005.c: "Destrua qualquer metro que esteja sob controle anglo-saxão."
 ep3_story_cycle_harrying.1005.a.tt: "Todo condado em [counties|lE] na [Glossary( 'Gran carretera del norte ', 'GNR_GLOSS' )]"
 ep3_story_cycle_harrying.1005.c.tt1: "Todos os [counties|lE] controlados por anglo-saxões ao longo da [Glossary( 'Gran carretera del norte ', 'GNR_GLOSS' )]:"
 ep3_story_cycle_harrying.1005.c.tt2: "Todos os [counties|lE] controlados por normandos ao longo da [Glossary( 'Gran carretera del norte ', 'GNR_GLOSS' )]:"
 GNR_GLOSS: "Uma estrada construída pelos romanos que se estende por grande parte da espinha dorsal da Inglaterra. A Grande Estrada do Norte percorre estes [counties|lE]:\n\n$EFFECT_LIST_BULLET$[GetTitleByKey('c_middlesex').GetBaseName]\n$EFFECT_LIST_BULLET$[GetTitleByKey('c_hertfordshire').GetBaseName]\n$EFFECT_LIST_BULLET$[GetTitleByKey('c_bedford').GetBaseName]\n$EFFECT_LIST_BULLET$[GetTitleByKey('c_northamptonshire').GetBaseName]\n$EFFECT_LIST_BULLET$[GetTitleByKey('c_leicestershire').GetBaseName]\n$EFFECT_LIST_BULLET$[GetTitleByKey('c_nottinghamshire').GetBaseName]\n$EFFECT_LIST_BULLET$[GetTitleByKey('c_west_riding').GetBaseName]"
 ep3_story_cycle_harrying.1010.t: "Decidindo um Destino"
 ep3_story_cycle_harrying.1010.desc: "É realmente lamentável ser um prisioneiro de guerra. Uma dessas criaturas me olha carrancuda através das grades de sua cela.\n\n\"Tenho valor, sabe?\" Sua voz é fina e rouca, quebrada pelos dias na masmorra. \"Eu sou [captured.GetFirstName], da Casa [captured.GetHouse.GetBaseName]. Se avisarem minha família, conseguirão um bom preço de resgate.\"\n\nUm resgate? Isso seria ótimo, mas nestes tempos de tribulação, um[captured.Custom('ES_XA')] [captured.GetWomanMan] de tal estatura pode ser mais útil como mensagem do que como moeda de troca por simples ouro…"
 ep3_story_cycle_harrying.1010.a: ""Você escolheu se opor à pessoa errada, [captured.Custom('GirlBoy')]"."
 ep3_story_cycle_harrying.1010.b: "\"Vou deixar você ir. Mas deixarei um lembrete da minha #EMP hospitalidade#!.\""
 ep3_story_cycle_harrying.1010.c: "\"Você tem uma boa postura. Uma postura #EMP [ROOT.Char.GetCulture.GetNameNoTooltip], até...\""
 ep3_story_cycle_harrying.1010.c.success: "[captured.GetSheHe|U] aceita sua proposta"
 ep3_story_cycle_harrying.1010.c.failure: "[captured.GetSheHe|U] ridiculariza sua proposta"
 ep3_story_cycle_harrying.1010.d: "\"Você pode apodrecer aqui até que seu resgate seja pago.\""
 ep3_story_cycle_harrying.1011.t: "Um Verdadeiro [ROOT.Char.GetCulture.GetNameNoTooltip]"
 ep3_story_cycle_harrying.1011.desc: "Para minha surpresa, essa pessoa considera minha proposta.\n\n"Vou me tornar… um(a) [ROOT.Char.GetCulture.GetName]?", diz em voz alta, ponderando as implicações. "E serei aceito(a) como um(a) de vocês?".\n\nTambém reservo um momento para explorar plenamente as ramificações da minha proposta apressada. Se devo governar estas terras, precisarei de tantos [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip] ao meu redor quanto puder reunir. Trazer os antigos governantes para o nosso seio pode acelerar a aceitação dos camponeses, apesar do nosso aspecto estrangeiro."
 ep3_story_cycle_harrying.1011.desc.spouse: "\n\nDe repente, uma ideia se materializa; [spouse_courtier.GetFirstName]! Talvez [spouse_courtier.GetSheHe] seja um[spouse_courtier.Custom('ES_XA')] cônjuge adequad[spouse_courtier.Custom('ES_OA')]…"
 ep3_story_cycle_harrying.1011.a.spouselanguage: ""[Select_CString( spouse_courtier.IsFemale, 'Sua nova', 'Seu novo' )] [spouse_courtier.GetWifeHusband] também o ajudará a aprender o idioma rapidamente"."
 ep3_story_cycle_harrying.1011.a.language: "“E você também será um, assim que aprender [ROOT.Char.GetCulture.GetLanguage.GetName]”."
 ep3_story_cycle_harrying.1011.b: "\"Vá agora, e seja livre.\""
 ep3_story_cycle_harrying.1015.t: "Chamas Flickerantes"
 ep3_story_cycle_harrying.1015.desc: "#EMP Eso#!, penso quando as chamas sobem cada vez mais, é o que se colhe por sedição.\n\n[offending_village.GetName] havia sido um foco de agitação contra meu governo. O edifício em chamas que até há pouco era um refúgio seguro para esses dissidentes agora expele uma fina coluna de fumaça. Eu o observo, sentindo minha própria raiva crescer com ela.\n\nComo #EMP osan#! desafiam-me? O resto desta aldeia também é cúmplice: todos eles sabiam exatamente o que aquele grupo estava tramando. Ninguém está livre de culpa."
 ep3_story_cycle_harrying.1015.a: "Queime outro prédio."
 ep3_story_cycle_harrying.1015.b: "Eles devem aprender obediência. Reassente metade da população."
 ep3_story_cycle_harrying.1015.c: "Eu devo me controlar."
 ep3_story_cycle_harrying.1015.c.tt: "Afinal, que reino restaria para governar, caso contrário?"
 all_neighbouring_villages: "Todos os [holdings|lE] vizinhos a [offending_village.GetName]"
 ###AETHELING EVENTS
 ep3_story_cycle_harrying.2000.t: "Almas Desmoronadas"
 ep3_story_cycle_harrying.2000.desc: "Os habitantes de [location.GetName] sofrem: as restrições ao cereal impostas por [william.Custom('ES_ElLa')] [william.GetTitledFirstNameRegnal|l] já estão começando a surtir efeito, e a gordura está sumindo de seus ossos. Uma dessas criaturas infelizes reconhece meu porte e se atira à minha frente para implorar.\n\n\"Por favor!\", grita enquanto dedos ossudos se agarram às minhas pernas. \"Não comi nada há dois dias. Nos dois dias anteriores a esse, tive apenas uma refeição. Por favor, por favor..., #DIE1 vocês têm que fazer #EMP algo…#!#!\"."
 ep3_story_cycle_harrying.2000.notcallous: "\n\nEst pobre [starving_man.GetWomanMan]."
 ep3_story_cycle_harrying.2000.a: "Pagar por importações, com meu próprio dinheiro."
 ep3_story_cycle_harrying.2000.b: "\"Venha comigo. Eu irei alimentá-lo.\""
 ep3_story_cycle_harrying.2000.c: "Talvez eu consiga descobrir uma maneira de consertar isso?"
 ep3_story_cycle_harrying.2000.c.success: "Seus métodos para aumentar a produção agrícola funcionam"
 ep3_story_cycle_harrying.2000.c.failure: "Seus métodos não funcionam"
 ep3_story_cycle_harrying.2001.opening: "[marshal.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 ep3_story_cycle_harrying.2001.desc: "Com a produção de alimentos na área se estabilizando, muitos dos habitantes que estavam muito fracos para trabalhar agora oferecem seus serviços.\n\nOs mais capazes entre eles se oferecem como guerreiros para sua causa!"
 ep3_story_cycle_harrying.2001.a: "Aceite-os!"
 ep3_story_cycle_harrying.2001.b: "Não preciso de guerreiros agora."
 ep3_story_cycle_harrying.2001.b.tt: "Mas talvez no futuro..."
 ep3_story_cycle_harrying.2005.t: "Suspensão da Execução"
 ep3_story_cycle_harrying.2005.desc: "Quando se é um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetLadyLord] de minha estatura, às vezes é preciso tomar decisões difíceis. Tendo isso em mente, quando me trazem algemad[murderer.Custom('ES_OA')] a um[murderer.Custom('ES_XA')] célebre assassino[murderer.Custom('ES_OA')] local, ordeno a [spymaster.GetFirstName] que [murderer.GetHerHim] o leve ao arsenal, onde poderemos conversar em particular.\n\n[murderer.Custom('ES_ElLa')|U] [murderer.GetWomanMan] me olha com curiosidade. Pouco há dúvidas de que, sem minha intervenção, ele estará pendurado no pelourinho antes do fim da semana. Olho para [spymaster.GetFirstNameNoTooltip] em busca de confirmação e recebo um aceno em resposta.\n\nPreciso de uma pessoa com talentos como os seus..."
 ep3_story_cycle_harrying.2005.a: "Devemos mirar no alvo mais alto possível."
 ep3_story_cycle_harrying.2005.b: "Leve este ouro, contrate alguns matadores..."
 ep3_story_cycle_harrying.2005.b.tt: "E mate todos os normandos que encontrar no [willy_vassal.GetName]."
 ep3_story_cycle_harrying.2005.c: "Parece que você é alguém útil para se ter por perto."
 ep3_story_cycle_harrying.2010.t: "Esforço de Guerra"
 ep3_story_cycle_harrying.2010.desc: "Como um dos Æthelings mais poderosos, cabe a mim reunir os nobres menores em apoio à nossa causa justa. Com tais grandes apostas, todos eles estão nervosos em se comprometer plenamente, mas precisamos deles para ter sucesso em nossa missão.\n\nA única questão é, exatamente que tipo de apoio precisamos? Ouro é sempre bem-vindo, é claro, mas talvez eu pudesse fomentar uma agitação mais ativa? Talvez, até mesmo, precisemos de alguma resistência devidamente organizada?"
 ep3_story_cycle_harrying.2010.a: "Resistência organizada é o caminho a seguir."
 ep3_story_cycle_harrying.2010.a.critsuccess: "A resistência escala rapidamente"
 ep3_story_cycle_harrying.2010.a.success: "A resistência aumenta"
 ep3_story_cycle_harrying.2010.a.failure: "Seus apelos são ignorados"
 ep3_story_cycle_harrying.2010.a.critfailure: "Suas mensagens são interceptadas pelos normandos"
 ep3_story_cycle_harrying.2010.b: "Farei um apelo por alguns presentes de ouro."
 ep3_story_cycle_harrying.2010.b.success: "O ouro chega rapidamente"
 ep3_story_cycle_harrying.2010.b.failure: "Os nobres ignoram seus apelos"
 ep3_story_cycle_harrying.2010.c: "Eles devem encorajar os pequenos a se levantarem."
 county_list_tt: "Todo [county|lE] pertencente a normandos no [realm|lE] [william.Custom('ES_DelDela')] [william.GetTitledFirstName|l]"
 ep3_story_cycle_harrying.2015.t: "Forjando uma Posição"
 ep3_story_cycle_harrying.2015.desc: "Quando os documentos que solicitei me são entregues, quase sinto minhas mãos tremerem. São falsificações magníficas; ninguém poderia duvidar delas. Com isso, minha reivindicação sobre estas terras é incontestável, e temos mais a caminho para outros æthelings.\n\nMas a questão principal ainda permanece. O que exatamente quero explorar com essa vantagem? Há inúmeras maneiras de atacar a posição [william.Custom('ES_DelDela')] [william.GetTitledFirstName|l] e fortalecer a nossa."
 ep3_story_cycle_harrying.2015.a: "Vamos ver como ele nos elimina depois disso…"
 ep3_story_cycle_harrying.2015.a.success: "[william.GetFirstName] aceita a contragosto"
 ep3_story_cycle_harrying.2015.a.failure: "[william.GetFirstName] se recusa firmemente"
 ep3_story_cycle_harrying.2015.b: "Um pouco de liberdade extra pode ajudar nossa causa."
 ep3_story_cycle_harrying.2015.c: "Um acordo especial, talvez..."
 ###HEREWARD EVENTS
 ep3_story_cycle_harrying.3000.t: "O Bem Maior"
 ep3_story_cycle_harrying.3000.desc: "Que igrejinha linda! Fico feliz que meu passeio por [neighboring_church.GetName] tenha me trazido até aqui. Também não é uma capela humilde, a julgar pelas belas filigranas da decoração. Um[bishop.Custom('ES_XA')] [bishop.GetFaith.PriestNeuter] me tira do meu devaneio.\n\n\"Sei quem sois\", e ergue a mão para impedir qualquer اعتراض. \"Também sei por que estais aqui, jovem [ROOT.Char.GetFirstNameNoTooltip]; havia pouca chance de que não encontrásseis este lugar em breve.\"\n\n\"Tudo o que peço — e suplico a vós, como [bishop.GetWomanMan] de [bishop.GetFaith.HighGodName] — é que deixem as relíquias onde estão. Levai a moeda, se for preciso.\""
 ep3_story_cycle_harrying.3000.a: "Você disse uma relíquia?"
 ep3_story_cycle_harrying.3000.b: "Não me rebaixarei a roubar uma relíquia de uma igreja."
 ep3_story_cycle_harrying.3000.b.tt: "… mas uma bolsa de moedas…"
 ep3_story_cycle_harrying.3000.c: "\"[bishop.GetMotherFather]! Fique calm. Eu não sonharia em roubar de você.\""
 artifact_church_saint_brooch_name: "Broche Santificado"
 artifact_church_saint_brooch_description: "Broche antigo de peltre com incrustações de prata que, dizem, chegou a ser usado por São [ROOT.Char.Custom('GetCatholicSaint')]. Foi roubado da capela de [neighboring_church.GetName] por [ROOT.Char.GetFirstName]."
 ep3_story_cycle_harrying.3005.t: "Lâminas na Névoa"
 ep3_story_cycle_harrying.3005.desc: "Agacho-me, com a espada em punho, enquanto a neblina nos envolve, a mim e ao meu pequeno, porém bem armado, contingente de [ROOT.Char.GetWomenMen] e a mim. Estamos a poucos metros da estrada, da qual um mercenário normando encara a penumbra com os olhos semicerrados.[Select_CString( norman_soldier.IsFemale, 'una mercenaria normanda', 'un mercenario normando' )].\n\nEstá à frente do que os rumores locais dizem ser uma caravana cheia de armas e armaduras, rumo ao [vassal_county.GetName]. Interceptá-la poderia significar um duro golpe para o inimigo, e o saque até poderia ser redistribuído entre nossos aliados.\n\nA impressionante espada [norman_soldier.Custom('ES_DelDela')] mercenári[norman_soldier.Custom('ES_OA')] brilha opaca enquanto examino a minha. Seja qual for a luta que nos espera, será de fato um trabalho terrível."
 ep3_story_cycle_harrying.3005.a: "Atacar com força e rapidez; essas armas são nossas!"
 ep3_story_cycle_harrying.3005.a.success: "A emboscada funciona perfeitamente"
 ep3_story_cycle_harrying.3005.a.failure: "A emboscada falha"
 ep3_story_cycle_harrying.3005.b: "Nossos aliados precisam desse equipamento."
 ep3_story_cycle_harrying.3005.b.tt: "Cada lâmina irá para eles."
 ep3_story_cycle_harrying.3005.c: "Devemos usar esse clima a nosso favor."
 ep3_story_cycle_harrying.3005.c.tt: "Se conseguirmos nos esgueirar e sabotar a estrada à frente, podemos atrasar significativamente sua chegada sem uma luta."
 every_knight: "Cada [knight|lE]"
 every_anglo_vassal: "Todo [vassal|lE] anglo-saxão [william.Custom('ES_DelDela')] [william.GetTitledFirstName|l]"
 norman_sword_name: "Lâmina Normanda"
 stolen_norman_sword_name: "Lâmina Normanda Roubada"
 stolen_norman_sword_description: "Esta espada apresenta as marcas de um trabalho normando, com um pleno pronunciado correndo ao longo do comprimento afilado desta bela lâmina."
 ep3_story_cycle_harrying.3010.t: "Seu Dinheiro ou Sua Vida"
 ep3_story_cycle_harrying.3010.desc: "O vento faz as árvores sussurrarem quando [norman_noble.Custom('ES_ElLa')] [norman_noble.GetTitledFirstName|l] sai da ponte por onde ele está passando. O leve ruído não abafa meu assobio estridente e, de repente, toda a via fica banhada em sangue.\n\n[norman_noble.GetFirstNameNoTooltip|U] cai da sela quando uma flecha atravessa o flanco de seu cavalo, uma de uma chuva de disparos que cintilam da linha das árvores quando a emboscada é acionada.\n\nMeus cavaleiros avançam para lutar e capturar seus equivalentes. Aproximo-me [norman_noble.Custom('ES_AlAla')] [norman_noble.GetTitleAsNameNoTooltip|l] enquanto se ergue, sacando a espada."
 ep3_story_cycle_harrying.3010.a: "\"Prepare sua arma, normando imundo.\""
 ep3_story_cycle_harrying.3010.a.tt: "#V Duelo#! até a morte contra [norman_noble.GetFirstName].\nSua [prowess|lE]: #V [root_for_loc.GetProwess]#! [prowess_i]\n[prowess|E] de [norman_noble.GetFirstName]: #V [norman_noble.GetProwess]#! [prowess_i]"
 ep3_story_cycle_harrying.3010.b: "\"Desista de suas riquezas e eu chamarei meus cavaleiros de volta.\""
 ep3_story_cycle_harrying.3011.t: "Uma Saída"
 ep3_story_cycle_harrying.3011.desc: "O sangue escorre da minha espada enquanto a limpo. O dia já está calmo: a emboscada se mostrou rápida e brutal. Assim que [norman_noble.GetFirstName] caiu, muitos de seus homens levantaram as mãos em rendição. Afinal, proteger a nobreza local é um trabalho, não algo pelo qual se deva dar a vida. Um[saxon_soldier_1.Custom('ES_OA')] deles me chama quando passo.\n\n“O que vai ser de nós?”, pergunta, um pouco nervoso. Outro, logo à direita dele, concorda com um aceno vigoroso.\n\nObservo os dois. São homens robustos, claramente habilidosos numa luta, mas a ferocidade do nosso ataque os pegou de surpresa. Pelo sotaque, eles também não são normandos."
 ep3_story_cycle_harrying.3011.a: "Como vocês dois gostariam de um emprego?"
 ep3_story_cycle_harrying.3011.b: "\"Retornem para suas casas. Vivam bem.\""
 ep3_story_cycle_harrying.3015.t: "Do Mar"
 ep3_story_cycle_harrying.3015.desc: "Não nos são estranhas as incursões estrangeiras nestas terras. Ainda assim, os últimos estrangeiros que governaram tornaram-se parte da própria trama dessas terras. Os dinamarqueses se tornaram nós e nós nos tornamos eles, e de tal entrelaçamento surgiu minha família.\n\nSento-me e reflito. A Inglaterra é um grande prêmio, um que [danish_king.Custom('ES_AlAla')] [danish_king.GetTitledFirstName|l] gostaria de possuir, sem dúvida. Um dinamarquês governando a Inglaterra não seria novidade; eles agora fazem parte de nós.\n\nMinha mão se move em direção a um pergaminho e uma pena…"
 ep3_story_cycle_harrying.3015.a: "Um dinamarquês deve governar, se um anglo-saxão não puder."
 ep3_story_cycle_harrying.3015.a.success: "[danish_king.GetFirstNameNoTooltip] usa seu pedido para garantir uma reivindicação"
 ep3_story_cycle_harrying.3015.a.failure: "[danish_king.GetFirstNameNoTooltip] se recusa a se envolver"
 ep3_story_cycle_harrying.3015.b: "Pedir soldados é um bom começo."
 ep3_story_cycle_harrying.3015.b.success: "[danish_king.GetFirstNameNoTooltip] lhe envia soldados"
 ep3_story_cycle_harrying.3015.b.failure: "[danish_king.GetFirstNameNoTooltip] não pode dispensar ninguém"
 ep3_story_cycle_harrying.3015.c: "Sem cartas. Esta é nossa luta sozinha."
 ep3_story_cycle_harrying.3020.t: "O Conforto de um Traidor"
 ep3_story_cycle_harrying.3020.desc: "Os sussurros que me chegam a [location.GetName] já são fortes demais para eu ignorar. Ao que parece, o rato [willy_vassal.Custom('ES_DelDela')] [willy_vassal.GetTitledFirstName|l] está se acomodando demais à vida sob domínio estrangeiro; acomodando-se demais.\n\nO único que é pior do que um normando é um colaborador anglo-saxão. Talvez eu devesse fazer uma visita a ele para que entenda o quanto está enganado…"
 ep3_story_cycle_harrying.3020.a: "Partirei imediatamente."
 ep3_story_cycle_harrying.3020.a.tt: "Comece a viajar para [willy_vassal_capital.GetName]"
 ep3_story_cycle_harrying.3020.b: "Deveria deixá-lo apodrecer."
 ep3_story_cycle_harrying.3021.t: "Enfrentando uma Víbora"
 ep3_story_cycle_harrying.3021.desc: "Os rumores eram verdadeiros. [willy_vassal.GetFirstName] está em conluio[willy_vassal.Custom('ES_OA')] com seus senhores normandos. Tão confiant[willy_vassal.Custom('ES_OA')] quando volta de sabe-se lá que conclave com eles; com apenas alguns guardas armados consigo.\n\nDou o sinal. Saltamos das sombras; meus companheiros pegam os guardas de est[willy_vassal.Custom('ES_EA')], afastando-os sob a mira da espada. Aproximo-me de [willy_vassal.GetFirstNameNoTooltip].\n\n\"Você... você é [ROOT.Char.GetSheHe], não é?\", gagueja [willy_vassal.GetFirstNameNoTooltip|U]. \"[Select_CString( ROOT.Char.IsFemale, 'Aquella de la', 'Aquel del' )] que falam. [ROOT.Char.Custom('ES_ElLa')|U] dos Pântanos...\"."
 ep3_story_cycle_harrying.3021.a: "\"Desenhe sua espada, verme.\""
 ep3_story_cycle_harrying.3021.a.tt: "#V Duelo#! até a morte com [willy_vassal.GetFirstName].\nSeu [prowess|lE]:: #V [root_for_loc.GetProwess]#! [prowess_i]\n[prowess|E] de [willy_vassal.GetFirstName]:: #V [willy_vassal.GetProwess]#! [prowess_i]"
 ep3_story_cycle_harrying.3021.b: "\"Só quero conversar, [willy_vassal.GetFirstNameNoTooltip].\""
 ep3_story_cycle_harrying.3021.b.success: "[willy_vassal.GetSheHe|U] se junta ao seu lado"
 ep3_story_cycle_harrying.3021.b.failure: "[willy_vassal.GetSheHe|U] se recusa a reconhecer seus argumentos"
 ep3_story_cycle_harrying.3021.c: ""Você está com medo de #EMP [willy.GetSheHe]?#! Espere até ver do que eu sou capaz…""
 ep3_story_cycle_harrying.3021.c.success: "[willy_vassal.GetSheHe|U] se junta ao seu lado"
 ep3_story_cycle_harrying.3021.c.failure: "[willy_vassal.GetFirstNameNoTooltip] não será ameaçad[willy_vassal.Custom('ES_OA')]"
 ep3_story_cycle_harrying.3021.d: "\"Qualquer anglo-saxão leal aqui, você tem um lugar ao meu lado.\""
 ep3_story_cycle_harrying.3021.d.flavour: "Eu trocaria a vida dele pela deles mil vezes."
 ep3_story_cycle_harrying.3022.t: "Sem Mais"
 ep3_story_cycle_harrying.3022.desc: "Passo por cima do corpo inerte de [willy_vassal.GetFirstName]. Seus guarda-costas se espalharam, não há mais nenhum motivo para estar aqui.\n\n[willy_vassal.GetFirstNameNoTooltip] não era uma pessoa de pouca riqueza, e seria uma pena deixar isso se perder. Meus dedos vasculham bolsos e bolsas, pegando algumas moedas aqui, sua [newly_created_artifact.GetName] ali.\n\nErgo-me novamente e olho para o cadáver no chão.\n\nÉ hora de enviar uma mensagem."
 ep3_story_cycle_harrying.3022.a: "Conheço alguém que pode gostar de um presente..."
 ep3_story_cycle_harrying.3022.b: "O povo deve saber da justiça que entregamos."
 ep3_story_cycle_harrying.3050.opening: "Para Hereward, o infame rato dos Pântanos,"
 ep3_story_cycle_harrying.3050.desc: "Tenho uma proposta para vocês.\n\nDirijam-se a [london.GetNameNoTier] assim que puderem; vocês vão querer saber o que tenho a oferecer.\n\nNão me façam esperar."
 ep3_story_cycle_harrying.3050.a: "[william.GetHerHim|U] ouvirei."
 ep3_story_cycle_harrying.3050.a.tt: "Rumo a $cn_lunden$.\n#Weak Antes morrer[ROOT.Char.Custom('ES_OA')] de chamar isso de "#EMP $cn_londres$"…#!#!"
 ep3_story_cycle_harrying.3050.b: "Isso é claramente uma armadilha."
 ep3_story_cycle_harrying.3051.t: "[william.Custom('ES_ElLa')|U] bastard[william.Custom('ES_OA')] no trono"
 ep3_story_cycle_harrying.3051.desc: "Grandes, de fato, são os salões do poder. [william.Custom('ES_ElLa')|U] [william.GetTitledFirstNameRegnal|l] se senta rigidamente no trono enquanto sou conduzido até para ver[william.GetHerHim], mas a opulência de seu entorno faz algo para atenuar a inquietação de sua postura.\n\n«[ROOT.Char.GetFirstNameNoTooltip]. [ROOT.Char.Custom('ES_ElLa')|U] [ROOT.Char.GetWomanMan] que transformou as terras ao sul do Wash em uma verdadeira casa de carnificina». Seu lábio se curva de fúria quando não consigo esconder totalmente meu prazer com a descrição.\n\n«Não pensei que viríeis. Achei que ficarias escondido em tua ilha. Está claro que és [ROOT.Char.GetWomanMan] de muitas surpresas».\n\nVolto a olhar para [william.GetFirstName], [william.Custom('ES_ElLa')] estrangeir[william.Custom('ES_OA')] bastardo[william.Custom('ES_OA')], nesse assento tão célebre."
 ep3_story_cycle_harrying.3051.a: "\"Esse trono parece um pouco grande demais para você, não parece?\""
 ep3_story_cycle_harrying.3051.a.success: "[william.GetFirstNameNoTooltip] o deixa passar"
 ep3_story_cycle_harrying.3051.a.failure: "[william.GetFirstNameNoTooltip] exige que fique em silêncio"
 ep3_story_cycle_harrying.3051.b: "\"Qual é sua proposta?\""
 ep3_story_cycle_harrying.3051.b.tt: "Não há ponto em trocar farpas."
 ep3_story_cycle_harrying.3052.t: "O Acordo do Diabo"
 ep3_story_cycle_harrying.3052.desc: "«Eu vos conheço, [ROOT.Char.GetFirstNameNoTooltip] , [ROOT.Char.Custom('GetDaughterSon')] de [father.GetFirstName], sei por que fazeis o que fazeis e até por que estais aqui». [william.GetFirstName] se inclina para a frente e, enquanto fala, me trespassa com o olhar.\n\n«Sei o que vos move e sei o que quereis». Enquanto continua, pega um pergaminho ao lado e o entrega a um guarda. Prossegue enquanto o guarda se aproxima de mim, pergaminho em mãos.\n\n«Esta escritura é para a totalidade de [cambridgeshire.GetName]. Não apenas para Ely. Tudo». [william.GetFirstNameNoTooltip], nov[william.Custom('ES_OA')] governante destas terras, recosta-se triunfante.\n\n«Pode ser vosso, contanto que depostes as armas e nunca mais desembainheis uma lâmina contra mim»."
 ep3_story_cycle_harrying.3052.a: "Minha casa! Minha casa ancestral..."
 ep3_story_cycle_harrying.3052.a.flavor: "Esta é simplesmente uma oferta boa demais para recusar."
 ep3_story_cycle_harrying.3052.a.tt: "[william.GetFirstNameNoTooltip] convoca um escriba..."
 ep3_story_cycle_harrying.3052.b: "\"...me devolva meu irmão, verme normando.\""
 ep3_story_cycle_harrying.3053.t: "Trinta Peças de Prata"
 ep3_story_cycle_harrying.3053.desc: "A ampla e maligna sorriso que se espalha pelo rosto [william.Custom('ES_DelDela')] [william.GetTitledFirstName|l] me enoja profundamente. [william.GetFirstNameNoTooltip] manda chamar um escrivão.\n\n“Uma escolha excelente. O conforto e a prosperidade de você e de sua família estarão assegurados por gerações!” Levanta-se de seu trono, olhando-me firmemente nos olhos.\n\n“Lembrem-se. Tudo isso em troca de não erguer um dedo contra mim pelo resto de seus dias. Se eu ouvir até o mais leve rumor de que estão afiando algo maior do que a faca do açougueiro em Cambridgeshire…”\n\nAssinto como se estivesse atordoad[ROOT.Char.Custom('ES_OA')]. Olho para minha mão, que alcança os documentos, e então volto a encarar o sorriso astuto de [william.GetFirstNameNoTooltip]."
 ep3_story_cycle_harrying.3053.a: "… não posso fazer isso."
 ep3_story_cycle_harrying.3053.b: "\"Onde eu assino?\""
 ep3_story_cycle_harrying.3053.b.tt: "@warning_icon! #X Isto encerrará sua oposição aos normandos e sua participação no [harrying_widget_i]Massacre do Norte!#!"
 ep3_story_cycle_harrying.3054.t: "O Que É Devido ao Diabo"
 ep3_story_cycle_harrying.3054.desc: "O rosto [william.Custom('ES_DelDela')] [william.GetTitledFirstName|l] se contorce repentinamente, desfigurado pela ira.\n\n"Imbécil!", cospe com malevolência, "#EMP Idiota#! míope e simplório!" [william.GetFirstNameNoTooltip] gesticula para que seus guardas se aproximem.\n\n"Vocês não veem? Vocês se apegam à história! Vocês insistem em uma existência que [ROOT.Char.GetFaith.HighGodName] já lhes negou! Vocês se prendem a princípios nos quais não acreditam!"\n\nOlho ao redor desesperadamente. A porta por onde entrei ainda tem poucos guardas. Talvez, se eu conseguir abrir caminho por eles...\n\n"#EMP Prendam-no!#!"."
 ep3_story_cycle_harrying.3054.a: "Não vou desistir sem lutar!"
 ep3_story_cycle_harrying.3054.a.success: "Você consegue escapar!"
 ep3_story_cycle_harrying.3054.a.failure: "Você é capturado e espancado por isso."
 ep3_story_cycle_harrying.3054.b: "Não adianta."
 ep3_story_cycle_harrying.3054.b.tt: "É melhor guardar minhas forças. Vou precisar delas."
 ep3_story_cycle_harrying.3055.t: "Um Preço de Ferro"
 ep3_story_cycle_harrying.3055.desc: "Uma pancada no estômago me dobra quando sou capturado, e meus braços são rapidamente torcidos para trás. Rostos, severos, furiosos — até mesmo um de [sympathetic_courtier.GetWomanMan] ao fundo, com o que parece ser compaixão — passam diante dos meus olhos enquanto sou levado.\n\nO caminho é curto, mas traiçoeiro. A luz natural se esvai à medida que descemos as escadas. Muito em breve, me vejo algemado, acorrentad[ROOT.Char.Custom('ES_OA')] à parede da minha cela.\n\n"Considere-se com sorte de ainda estar vivo, bandit[ROOT.Char.Custom('ES_OA')]", a voz de [william.Custom('ES_DelDela')] [william.GetTitledFirstName|l] ecoa pelas úmidas paredes de pedra. [william.GetFirstNameNoTooltip] examina brevemente os arredores. "Ou... talvez não com tanta sorte".\n\nEle se vira sobre os calcanhares e sai da sala acompanhado de seu séquito, e eu fico sozinh[ROOT.Char.Custom('ES_OA')]."
 ep3_story_cycle_harrying.3055.a: "Bem... droga."
 ep3_story_cycle_harrying.3056.opening: "[ROOT.Char.Custom('ES_AlAla')|U] bravo Lord Hereward,"
 ep3_story_cycle_harrying.3056.desc: "Vocês precisam confiar em nós.\n\nDentro de três noites, vossa cela ficará aberta depois da refeição. Permanecei ali até o anoitecer.\n\nSubam as escadas e peguem a segunda à esquerda, depois a primeira à direita.\n\n#BOL NO ESTÁIS SOL[ROOT.Char.Custom('ES_OA')].#!"
 ep3_story_cycle_harrying.3056.a: "O quê?"
 ep3_story_cycle_harrying.3057.t: "Liberdade"
 ep3_story_cycle_harrying.3057.desc: "Como me instruíram, espero até a noite cair antes de tentar a fechadura protegida da minha cela. Ela se abre com um leve rangido, e eu imediatamente subo a escada. Segunda à esquerda, primeira à direita, outra escada e…\n\nSaio para o ar fresco da noite. A pouca distância, uma figura encapuzada se agacha, observando-me. Reconheço-a como o rosto simpático que vi quando me arrastavam para a cela.\n\n\"Você conseguiu!\" me cumprimenta alegremente e me indica um caminho que serpenteia pela cidade. \"Esse é o caminho para o norte. Se vocês saírem agora, já estarão longe quando eles perceberem.\""
 ep3_story_cycle_harrying.3057.a: "Venha comigo!"
 ep3_story_cycle_harrying.3057.a.success: "[sympathetic_courtier.GetFirstNameNoTooltip] concorda felizmente."
 ep3_story_cycle_harrying.3057.a.failure: "[sympathetic_courtier.GetSheHe|U] recusa você relutantemente."
 ep3_story_cycle_harrying.3057.b: "Nunca vou me esquecer de você. Vá, rapidamente, antes que descubram você."
