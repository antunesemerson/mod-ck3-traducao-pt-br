l_spanish:
 travel_danger_events.7000.t: "$travel_danger_prefix$ Serpente!"
 travel_danger_events.7000.desc_intro: "Enquanto seguimos em direção a [destination.GetName], paramos por um instante para descansar."
 travel_danger_events.7000.desc_desert: "Algunos caminan por las dunas, mientras que otros reposan a la sombra de la caravana. El sol está en su cénit y el calor es abrasador. Observo cómo [snake_victim.Custom('ES_ElLa')] [snake_victim.GetTitledFirstName|l] camina lentamente por la arena, pero, de improviso, cae de rodillas, agarrándose la pierna."
 travel_danger_events.7000.desc_oasis: "A maioria se junta em torno do oásis, bebe de suas águas frescas e se limpa do pó do rosto. [snake_victim.GetName] mete a mão na água e, de repente, a puxa de volta com um grito agudo."
 travel_danger_events.7000.desc_mountains: "Muitos se aventuram a buscar uma fonte de água ou comida, enquanto outros descansam à sombra das árvores. Observo como [snake_victim.GetName] vasculha o mato, mas, de repente, salta para trás com um grito."
 travel_danger_events.7000.desc_hills: "Muitos se reúnem em torno de uma fogueira de acampamento para se manterem aquecidos e compartilhar histórias. [snake_victim.GetName] está a certa distância, talvez procurando alguma presa. Estende a mão para a grama, mas logo em seguida solta um grito."
 travel_danger_events.7000.desc_floodplains: "Alguns saem para buscar água próxima, enquanto outros ficam de guarda observando a caravana e procurando terrenos secos. [snake_victim.GetName] mergulha seu cantil na água, mas logo o puxa de volta com um grito."
 travel_danger_events.7000.desc: "\n\n¡Le ha mordido un ejemplar de [current_location.Custom('GetRandomRegionalPoisonousSnake')]! La serpiente acaba sacando los colmillos de su carne, pero está claro que el veneno empieza a afectarle."
 travel_danger_events.7000.desc_recent: "Aunque la situación es grave, esta clase de peligros no le son extraños a [snake_victim.GetFirstNameNoTooltip]…" #Haha get it? Stranger danger? No? Okay.
 travel_danger_events.7000.a_1: "Esperaremos a que sua condição melhore."
 travel_danger_events.7000.a_2: "Com sorte, com o tempo, ela se recuperará."
 travel_danger_events.7000.a_3: "Mejor que [snake_victim.Custom('ES_LoLa')] dejemos descansar"
 every_victim_relation_tt: "Todo familiar de [snake_victim.GetName]:"
 travel_danger_events.7000.a_recover: "[snake_victim.GetFirstNameNoTooltip] se recupera do veneno"
 travel_danger_events.7000.a_dont_recover: "[snake_victim.GetFirstNameNoTooltip] continua igual"
 travel_danger_events.7000.a_dont_recover_die: "[snake_victim.GetFirstNameNoTooltip] sucumbe ao veneno"
 travel_danger_events.7000.b: "Talvez o veneno possa ser tratado..."
 travel_danger_events.7000.b_flavor: "Você tenta tratar o veneno por conta própria"
 travel_danger_events.7000.treatment_good: "O remédio é eficaz"
 travel_danger_events.7000.treatment_bad: "O veneno não reage ao tratamento"
 travel_danger_events.7000.c: "Ah, talvez alguém em [current_location.GetNameNoTooltip] possa ajudar."
 travel_danger_events.7000.c_tt: "Você paga alguém do local para tentar tratar o veneno"
 travel_danger_events.7000.d_physician: "[treatment_giver.GetNameNoTooltip] é um[treatment_giver.Custom('ES_XA')] curandeiro[treatment_giver.Custom('ES_XA')] habilidos[treatment_giver.Custom('ES_OA')]."
 travel_danger_events.7000.c_known: "[current_location.GetTitle.GetHolder.GetNameNoTooltip] reside aqui, pode nos ajudar."
 travel_danger_events.7000.c_known_tt: "Você usa sua relação com [current_location.GetTitle.GetHolder.GetName] para encontrar um bom curandeiro local."
 travel_danger_events.7000.d: "[treatment_giver.GetNameNoTooltip] é bem inteligente, talvez possa ajudar."
 travel_danger_events.7000.e_flavor: "Oferecer comida a [snake_victim.GetFirstNameNoTooltip] para que tenha uma chance maior de se recuperar."
 travel_danger_events.7000.d_tt: "[treatment_giver.GetName] tenta tratar o veneno"
 travel_danger_events.7000.d_tt_phys: "[treatment_giver.GetName] cura [snake_victim.GetFirstName]"
 travel_danger_events.7000.e: "Deixe [snake_victim.GetFirstNameNoTooltip] comer uma porção extra no jantar de hoje."
 travel_danger_events.7000.f_sea: "¡Que a maré leve [snake_victim.GetHerHim]!"
 travel_danger_events.7000.f: "Não me importo em ver[snake_victim.Custom('ES_LoLa')] sofrer."
 travel_danger_events.7000.g: "Já chega, vamos seguir em frente."
