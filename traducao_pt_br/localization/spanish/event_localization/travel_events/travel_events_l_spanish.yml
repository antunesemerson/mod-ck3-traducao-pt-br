 travel_events.5001.t: "Histórias Sussurradas"
 travel_events.5001.desc: "Esta é a terceira vez hoje que ouço um morador tagarelar sobre certa história enquanto passamos por ele. [travelling_character.GetFirstName] vê minha confusão.\n\n“É uma história regional, [ROOT.Char.Custom('FormOfAddressForLiege')]. Eles a chamam de [potential_legend.GetName]”, confidencia.\n\nBem. Sem dúvida, parece bastante interessante…"
 travel_events.5001.a: "Vou adotar esse conto!"
 travel_events.5001.b: "Com certeza, eu mesmo[ROOT.Char.Custom('ES_OA')] acabarei contando isso."
 travel_events.5001.b.flavor: "Pelo menos será uma história divertida para qualquer pessoa que eu possa encontrar em minhas viagens!"
 travel_events.5001.c: "Isso é um absurdo."
