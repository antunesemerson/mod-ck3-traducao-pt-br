l_spanish:
 #Travel Flavor Events
 #Travel event prefix
 travel_event_prefix: "Viagem:"
 #Travel Death Events
 travel_events.0010.t: "Fim da Estrada"
 travel_events.0010.intro: "Estou sentad[ROOT.Char.Custom('ES_OA')] à minha mesa, prestes a tomar meu desjejum, mas a fome me abandonou. Algo não está certo e eu sei que isso é verdade quando vejo meu [ROOT.Char.Custom2('RelationToMe',messenger)], [messenger.GetFirstNameNoTooltip], aproximando-se sombriamente.\n\n\"Meu [ROOT.Char.GetTitleAsNameNoTooltip|l], na noite passada chegou um mensageiro trazendo más notícias\", diz [messenger.GetSheHe] em voz baixa.\n\n\"Temo… Temo que vos[predecessor.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe',predecessor)], [predecessor.Custom('ES_ElLa')] [predecessor.GetTitledFirstNameNoTooltip|l], [predecessor.GetDeathReason]."
 travel_events.0010.to_activity: "[predecessor.GetSheHe|U] estava em [predecessor_location.GetName] a caminho de [travel_destination.GetNameNoTooltip]"
 travel_events.0010.at_destination: "[predecessor.GetSheHe|U] estava em [predecessor_location.GetName]"
 travel_events.0010.from_activity: "[predecessor.GetSheHe|U] voltava para casa pela província de [predecessor_location.GetName] após visitar [travel_destination.GetNameNoTooltip]"
 travel_events.0010.desc: "$travel_events.0011.desc$\""
 travel_events.0010.a: "[predecessor.GetSheHe|U] não merecia morrer tão longe de casa..."
 travel_events.0011.desc_opening: "[messenger.Custom2('AppropriateGreeting', ROOT.Char)]"
 travel_events.0011.intro: "Lamento escrever com notícias tão graves, mas acabamos de receber a notícia de que voss[predecessor.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe',predecessor)], [predecessor.Custom('ES_ElLa')] [predecessor.GetTitledFirstNameNoTooltip|l], [predecessor.GetDeathReason].\n\n"
 travel_events.0011.desc: "quando [predecessor.GetSheHe] faleceu. Minhas sinceras condolências, [ROOT.Char.Custom('FormOfAddressForLiege')]."
 #Travel lifestyle trait adoption
 travel_events.0050.t: "Chamado da Estrada"
 travel_events.0050.landed: "Desde que deixei minha casa [ROOT.Char.Custom('GetPeriodOfTimeWord')] atrás"
 travel_events.0050.adventurer: "Desde que parti de [ROOT.Char.GetTravelPlan.GetData.GetDepartureLocation.GetName] [ROOT.Char.Custom('GetPeriodOfTimeWord')] atrás"
 travel_events.0050.desc: "Tenho vivido altos e baixos — me deleitei com o vento que bagunçava meu cabelo e lamentei as pedras nas botas.\n\nHá tantos lugares, tantas coisas que ainda não vi. Lá fora, na estrada aberta, sinto-me livre do confinamento da [ROOT.Char.Custom('GetCourt')], ainda que só por um pouco.\n\nAs estradas estão cheias de peregrinos e andarilhos; talvez seja entre #EMP ellos#! que eu encontre paz de espírito.\n\n"
 travel_events.0050.a: "Aqui fora, eu sou verdadeiramente livre."
 #Peasant with no shoes
 travel_events.1000.t: "Alma Desafortunada"
 travel_events.1000.desc: "Enquanto a procissão atravessa o/a [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip|l] de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], vejo um[shoeless_peasant.Custom('ES_XA')] camponês[shoeless_peasant.Custom('ES_OA')] que anda pela estrada sem sapatos. Seus pés estão ensanguentados e inchados: está claro que ele deve estar caminhando há muito tempo.\n\nAo passar por [shoeless_peasant.GetSheHe], observo de perto seu rosto, os olhos tristes, a careta de dor. Talvez eu possa ajudar de alguma forma?"
 travel_events.1000.a: "Dê uns sapatos para ela!"
 travel_events.1000.b: "Talvez gostaria de se juntar a nós?"
 travel_events.1000.c: "Não é realmente um problema meu, não é mesmo?"
 travel_events.1001.title: "Um Nobre Disfarçado!"
 travel_events.1001.desc: "Com sapatos agora cobrindo seus pés calejados, [Select_CString( shoeless_peasant.IsFemale, 'a camponesa', 'o camponês' )] me sorri com cumplicidade e caminha acompanhando meu ritmo.\n\n\"Sois um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] bom[ROOT.Char.Custom('ES_OA')] e gentil. E tamanha bondade será recompensada! Sou [shoeless_peasant.GetName] da casa [shoeless_peasant.GetDynastyName] e sempre recompenso aqueles de coração gentil.\""
 travel_events.1001.desc.outro.poet: "\n\nParece que [Select_CString( shoeless_peasant.IsFemale, 'esta mulher', 'este homem' )] não é [Select_CString( shoeless_peasant.IsFemale, 'nenhuma camponesa', 'nenhum camponês' )] mas sim [Select_CString( shoeless_peasant.IsFemale, 'uma poetisa', 'um poeta' )] de grande renome!"
 travel_events.1001.desc.outro: "\n\nParece que [Select_CString( shoeless_peasant.IsFemale, 'esta mulher', 'este homem' )] não é [Select_CString( shoeless_peasant.IsFemale, 'nenhuma camponesa', 'nenhum camponês' )], mas sim um[shoeless_peasant.Custom('ES_XA')] nobre de grande fortuna!"
 travel_events.1001.a: "Eu aceito com gratidão."
 travel_events.1001.c: "Vamos seguir adiante como amigos!"
 travel_events.1002.title: "$travel_events.1001.title$"
 travel_events.1002.desc: "Ao passarmos, [Select_CString( shoeless_peasant.IsFemale, 'a camponesa', 'o camponês' )] agarra minha roupa com suas mãos imundas e me encara profundamente nos olhos.\n\n\"Isso não é um comportamento digno de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l], não é? Se soubesse quem eu era, você não me teria deixado seguir assim!\"\n\n[shoeless_peasant.GetSheHe|U] revela ser um[shoeless_peasant.Custom('ES_XA')] nobre da casa [shoeless_peasant.GetDynastyName], e agora parece nutrir por mim o mais profundo desprezo."
 travel_events.1002.a: "Como eu poderia saber?"
 friend_showed_charity: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'colmaste', 'colmó' )] de grandes mercês a [TARGET_CHARACTER.GetShortUIName]"
 friend_showed_charity_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'colmaste', 'colmó' )] de grandes mercês a [CHARACTER.GetShortUIName]"
 rival_ungenerous: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'te negaste', 'se negó' )] a ajudar em caridade a [TARGET_CHARACTER.GetShortUIName] quando mais precisava"
 rival_ungenerous_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'te negaste', 'se negó' )] a ajudar em caridade a [CHARACTER.GetShortUIName] quando mais precisava"
 #Bandit attack
 travel_events.1003.t: "$travel_danger_prefix$ Cobradores de Pedágio"
 travel_events.1003.desc: "Estamos na estrada há tempo demais e o sol começa a se pôr no horizonte. Do terreno ao redor, formas começam a surgir, se misturando e tomando a aparência de figuras armadas e raivosas. \n\n \"Esta estrada tem pedágio, paguem\", diz o maior — e, sinceramente, o mais feio — do grupo.\n\nMeu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('travel_leader'))] [travel_leader.GetFirstName] dá um passo à frente, com a arma em punho, e me olha em busca de orientação."
 travel_events.1003.a: "Ah, claro, o pedágio."
 travel_events.1003.b: "Talvez vocês aceitem pagamento em sangue?"
 travel_events.1003.c: "Pedágios são para camponeses e eu sou um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip]."
 travel_events.1003.a.success: "Intimidados, eles permitem que você passe."
 travel_events.1003.a.failure: "Você ainda terá que lutar para seguir em frente."
 travel_events.1005.t: "$travel_danger_prefix$ Pedágio do [ROOT.Char.GetFaith.WaterGodNamePossessive]"
 travel_events.1005.desc: "Rajadas cortantes e chuvas persistentes têm feito o navio se inclinar e balançar por horas e, enquanto estou de pé no convés, agarrado firmemente ao mastro, vejo que o baú que contém meu [overboard_artifact.GetName] se soltou!\n\nEstou longe demais para salvá-lo pessoalmente, mas [travel_leader.GetFirstName] o tem ao alcance da mão. No entanto, [travel_leader.GetSheHe] correria o risco de cair pela borda."
 travel_events.1005.a: "Salve-o!"
 travel_events.1005.b: "Não vale o risco."
 travel_events.4000.t: "Das Viagens que Virão"
 travel_events.4000.desc.intro: "Ao viajar por [ROOT.Char.GetCurrentLocation.GetName], passo perto de uma tenda aberta de aparência peculiar, com um ocupante ainda mais peculiar lá dentro.\n\nVinde, ó poderos[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]."
 travel_events.4000.desc.mid.long_to_go: "Posso ver que você tem muitas milhas a percorrer,"
 travel_events.4000.desc.mid.travelled_far: "Posso ver que você veio de muito longe,"
 travel_events.4000.desc.outro: "e posso oferecer uma leitura de suas futuras viagens, por um preço modesto.\"\n\n[Select_CString( mystic_scope.IsFemale, 'A estranha', 'O estranho' )] [mystic_scope.GetWomanMan] despertou a curiosidade da minha comitiva, mas será que estou disposto a pagar por uma \"leitura\"?"
 travel_events.4000.a: "Conte-me meu futuro, ó sábi[mystic_scope.Custom('ES_OA')]."
 travel_events.4000.b: "Venha experimentar o futuro #EMP comigo#!."
 travel_events.4000.c: "Não estou interessado."
 travel_events.4000.d: "Fechem a tenda e queimem esta bruxa[Select_CString( mystic_scope.IsFemale, 'esta bruja', 'este brujo' )]!"
 travel.good_reading: "Suas Viagens Prometem Bem"
 travel.bad_reading: "Suas Viagens Prometem Mal"
 travel_events.4001.t: "O Fanático"
 travel_events.4001.desc: "Meu séquito passa por [ROOT.Char.GetCurrentLocation.GetName] sem problemas até que ouço certa agitação vinda de onde estão meus guardas. Por fim, [Select_CString( loyal_fan_scope.IsFemale, 'uma desconhecida', 'um desconhecido' )] consegue abrir caminho e se coloca ao meu lado, radiante como se [ROOT.Char.GetFaith.HighGodName] [loyal_fan_scope.GetHerHim] tivesse abençoado pessoalmente.\n\n\"Por [loyal_fan_scope.GetFaith.random_GoodGodNames]! Por [loyal_fan_scope.GetFaith.random_GoodGodNames]! Por [loyal_fan_scope.GetFaith.random_GoodGodNames]! É [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip] de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]! Não desejo nada além de servi-lo incondicionalmente pelo resto da minha vida!\"\n\nMeus guardas estão prontos para jogar [loyal_fan_scope.GetHerHim] de volta na lama, mas [loyal_fan_scope.GetSheHe] certamente daria um cortesão leal."
 travel_events.4001.a: "Junte-se a mim."
 travel_events.4001.b: "Aqui, um pouco de moedas por sua lealdade."
 travel_events.4001.c: "Volte para a sarjeta de onde você veio."
 travel_events.4002.t: "[local_beauty_scope.GetWomenMen|U] [local_beauty_scope.GetCulture.GetNameNoTooltip]"
 travel_events.4002.desc: "Já vi o mundo e contemplei suas muitas maravilhas em minhas viagens, mas nunca vi tantas belezas quanto as que vi em [ROOT.Char.GetCurrentLocation.GetName]. Verdadeiramente, [Select_CString( local_beauty_scope.IsFemale, 'as mulheres', 'os homens' )] do povo [local_beauty_scope.GetCulture.GetName] estão acima de todos os demais.\n\nUltimamente, um espécime especialmente fascinante chamou minha atenção, [Select_CString( local_beauty_scope.IsFemale, 'uma mulher', 'um homem' )] de nome [local_beauty_scope.GetName].\n\nUm[local_beauty_scope.Custom('ES_XA')] bel[local_beauty_scope.Custom('ES_OA')] [local_beauty_scope.Custom('LoverPetName')], agradável demais aos meus olhos para passar seus dias escravizad[local_beauty_scope.Custom('ES_OA')] em [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]."
 travel_events.4002.a: "Minha nova paixão."
 travel_events.4002.b: "[local_beauty_scope.GetSheHe|U] deve estar ao meu lado para sempre."
 travel_events.4002.c: "Nós devemos nos casar imediatamente!"
 travel_events.4002.d: "Infelizmente, não posso dar meu amor tão facilmente."
 travel_events.4003.t: "Um Monstro no Horizonte"
 travel_events.4003.desc.intro: "Os mares estão envoltos em neblina, rochas e ondas materializando e desaparecendo em um piscar de olhos. Uma silhueta monstruosa aparece no horizonte, e tudo parece calmo até que a grande besta emerge da névoa para a visão clara.\n\n"
 travel_events.4003.desc.viking: "A cabeça de um dragão se aproxima de nosso navio, com uma tripulação feroz de nortenhos torcendo em suas costas!"
 travel_events.4003.desc.berber_pirate: "Um grande navio carregado de espólios emerge no horizonte, com uma tripulação de piratas berberes brandindo suas lâminas, pronta para atacar!"
 travel_events.4003.desc.regular_pirate: "Um navio cheio até a borda de bandidos e ladrões esfarrapados se aproxima de nós, seus sorrisos desdentados ansiosos para pegar nossas riquezas."
 travel_events.4003.a: "Nós os enfrentaremos!"
 travel_events.4003.b: "Deixe-os levar o que quiserem."
 travel_events.4003.c: "Tente perdê-los na neblina!"
 travel_events.4003.d: "Minha lábia fará deles meus aliados!"
 travel_events.4003.offer_accepted: "[viking_scope.GetShortUIName] aceita sua oferta"
 travel_events.4003.offer_refused: "[viking_scope.GetShortUIName] recusa sua oferta"
 travel_events.4004.t: "Peixes no Mar"
 travel_events.4004.desc: "Ouvi dizer que os pescadores da comunidade [fishermen_county_scope.GetCountyData.GetCulture.GetName] são famosos no mundo todo por sua habilidade de despojar o oceano de seu butim mais abundante e delicioso. Hoje, às margens de [fishermen_county_scope.GetNameNoTierNoTooltip], tenho a sorte de me deparar com uma frota pesqueira [fishermen_county_scope.GetCountyData.GetCulture.GetNameNoTooltip].\n\nNossa comitiva navega perto de uma embarcação desgarrada da frota, e sou imediatamente saudado pelo odor acre de seu capitão.\n\n\"Que honra, meu [ROOT.Char.GetLadyLord]. Vós vos interessaríeis por nossas melhores capturas do dia?\"."
 travel_events.4004.a: "Nós comeremos bem esta noite!"
 travel_events.4004.b: "Seus peixes ou sua vida, marinheiro!"
 travel_events.4004.c: "Não hoje."
 travel_events.4005.t: "Bugigangas Raras"
 travel_events.4005.desc: "Os mares ao redor estão cheios de comerciantes [merchant_character_scope.GetCulture.GetName] fazendo seu comércio usual, transportando bens raros e exóticos de um porto para outro.\n\nUm desses navios mercantes guarda um item que imediatamente chama minha atenção. No momento em que coloco os olhos no [merchant_artifact_scope.GetName], sei que nunca encontrarei algo parecido no [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] e ele simplesmente deve ser meu."
 travel_events.4005.a: "E será meu!"
 travel_events.4005.b: "Vou roubar isso!"
 travel_events.4005.c: "Infelizmente, não posso justificar tal gasto imprudente."
 travel_events.4006.t: "Um Ladrão Alado"
 travel_events.4006.desc: "Um grito repentino me desperta da minha relaxante viagem pelo grande mar azul. Corro para os depósitos sob o convés e me horrorizo ao encontrar um exemplar de [ROOT.Char.Custom('GetRandomMigratoryBird')] ao lado dos restos dilacerados de nossos suprimentos, com suas penas esticadas contra sua barriga inchada.\n\nNa minha fúria, eu poderia ter matado a repugnante ameaça alada ali mesmo, mas [superstituous_caravan_member.Custom2('MyCharacterIntroduction', ROOT.Char)] me detém.\n\n\"Ei! Contenham a mão, seu [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('superstitious_caravan_member'))] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('superstitious_caravan_member'))]! Não sabem que matar um pássaro no mar dá azar?\"."
 travel_events.4006.a: "Mostrarei misericórdia."
 travel_events.4006.b: "Nada me impedirá de matar este maldito pássaro!"
 travel_events.4007.t: "$travel_danger_prefix$ Tempo Tempestuoso"
 travel_events.4007.desc: "Está claro que [ROOT.Char.GetFaith.WaterGodName] não favorece nossa viagem, pois ondas do tamanho de castelos se chocam contra nossa humilde embarcação. O navio se sacode de um lado para o outro, homens e mulheres se agarram ao que podem para não cair ao mar enquanto a embarcação se aproxima cada vez mais de virar.\n\nPor supuesto, estoy refugiad[ROOT.Char.Custom('ES_OA')] com os demais nobres na parte mais segura do navio, mas enquanto o céu arde com trovões e o mar se choca contra nós com toda a sua força, temo que não viverei para ver outro dia se tentar sobreviver apenas com fé."
 travel_events.4007.a: "Confio em nosso capitão."
 travel_events.4007.b: "Por [ROOT.Char.GetFaith.WaterGodName], assumirei o leme!"
 travel_events.4007.c: "Siga alguns navios locais pela tempestade."
 travel_events.4008.t: "Navio Abandonado"
 travel_events.4008.desc: "O mar está calmo e indulgente hoje, parado como uma rocha e com um vento poderoso às nossas costas. Parece que será um dia fácil para os remadores abaixo, mas então avisto os destroços mutilados de um navio enterrado de proa em algumas rochas pontiagudas logo à frente.\n\nNão parece haver sobreviventes, e navegar por essas rochas não seria nada trivial; ainda assim, sinto-me compelid[ROOT.Char.Custom('ES_OA')] a investigar este misterioso naufrágio."
 travel_events.4008.a: "Vamos investigar."
 travel_events.4008.b: "Só há morte por aquele caminho."
 travel_events.4009.t: "Navio Abandonado:Uum Adorno"
 travel_events.4009.desc: "Como suspeitava, os destroços não contêm vida, exceto por algumas aves bicando os cadáveres meio comidos dos viajantes que vieram antes de nós.\n\nAo olhar mais de perto, vejo algo brilhando no bico ensanguentado de um pássaro. Com um guincho agudo, ele solta o objeto nos destroços e voa para longe, deixando-me pegar este objeto intrigante."
 travel_events.4009.a: "Uma coisa esplêndida!"
 travel_events.4010.t: "Navio Abandonado: Riquezas"
 travel_events.4010.desc: "Assim como todos haviam suposto, não houve sobreviventes do naufrágio, no entanto, as roupas e bens deixados nos cadáveres indicam que este já foi um navio comercial de riqueza!\n\nEntre os destroços, vejo bens exóticos e roupas luxuosas ainda intactas, exceto por estarem um pouco molhadas. Sem dúvida, esses itens renderão um bom preço assim que chegarmos à costa."
 travel_events.4010.a: "Uma boa descoberta!"
 travel_events.4011.t: "Navio Abandonado: Um Sobrevivente"
 travel_events.4011.desc: "Para minha surpresa, começo a ouvir uma voz chamando nosso navio enquanto nos aproximamos dos destroços. Parece ser um[castaway_scope.Custom('ES_XA')] [castaway_scope.GetWomanMan] abastado que flutua sobre os restos de uma porta.\n\nSalve! Pensei que jamais voltaria a ver outra alma antes que o mar me reclamasse, como fez com meus companheiros.\n\nApresenta-se como [castaway_scope.GetName], diz ser um[castaway_scope.Custom('ES_XA')] nobre do/do [nearby_coast_scope.GetName] e oferece pagar por uma passagem segura e companhia."
 travel_events.4011.a: "Nós o ajudaremos a chegar à costa."
 travel_events.4011.b: "Junte-se a nós em nossas viagens!"
 travel_events.4011.c: "Tem receio, não posso ouvi-lo..."
 travel_events.4012.t: "[feral_child_scope.GetFirstNameNoTooltip], [feral_child_scope.Custom('ES_ElLa')] [feral_child_scope.Custom('GirlBoy')] [feral_child_scope.Custom('GetAnimalType')]"
 travel_events.4012.desc: "Ao viajarmos pelas terras selvagens de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], sinto claramente que estamos sendo observados. Escondid[feral_child_scope.Custom('ES_OA')], embora de forma bem ruim, vejo um[feral_child_scope.Custom('ES_XA')] [feral_child_scope.Custom('GirlBoy')] frágil e suj[feral_child_scope.Custom('ES_OA')] observando nosso séquito.\n\nUm membro da nossa caravana me informa que os locais dizem que estas terras são assombradas por alguém a quem chamam [feral_child_scope.GetFirstNameNoTooltip], de quem se diz que foi criad[feral_child_scope.Custom('ES_OA')] longe da sociedade humana por um [feral_child_scope.Custom('GetAnimalType')].\n\nAo que parece, a pobre criatura ficou fascinada por nós e até começou a falar um pouco de [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip], embora sem muita proficiência."
 travel_events.4012.a: "Eu vou ensinar essa[feral_child_scope.Custom('ES_EA')] [feral_child_scope.Custom('GirlBoy')]!"
 travel_events.4012.b: "Simplesmente ignore."
 travel_events.4012.c: "Expulsem[feral_child_scope.GetHerHim] de volta com seus amigos [feral_child_scope.Custom('GetAnimalType')]!"
 travel_events.4013.t: "[feral_child_scope.GetFirstNameNoTooltip], um Avanço"
 travel_events.4013.desc: "Embora ninguém tenha ousado sonhar com isso, parece que houve um grande avanço no desenvolvimento de [feral_child_scope.GetFirstName]!\n\nAntes uma simples criança criada por nada menos que feras selvagens, agora finalmente [feral_child_scope.Custom('ES_ElLa')] [feral_child_scope.Custom('GirlBoy')] mostra progresso. [feral_child_scope.GetFirstNameNoTooltip] diz frases completas e brinca com outras crianças da sua idade como se sempre tivesse sido um[feral_child_scope.Custom('ES_XA')] deles.\n\nHoje, após nossas lições habituais, até me pediu para ser seu [ROOT.Char.GetMotherFather]."
 travel_events.4013.a: "[feral_child_scope.GetSheHe|U] é um[feral_child_scope.Custom('ES_XA')] [feral_child_scope.Custom('GetDaughterSon')] para mim, seja de meu sangue ou não."
 travel_events.4013.b: "Que triunfo!"
 travel_events.4014.t: "[feral_child_scope.GetFirstNameNoTooltip], Anseio pela Natureza"
 travel_events.4014.desc: "Treinar [feral_child_scope.GetFirstName] tem sido um verdadeiro desafio, disso não há dúvida. Mal consegue formar uma frase e ainda ronda por aí como uma fera. A vida em ambiente fechado parece causar-lhe muito estresse e, quando decide falar, fala quase exclusivamente sobre voltar à natureza.\n\nObservo como se ergue desconfort[feral_child_scope.Custom('ES_OA')] sobre duas pernas, faz menção de partir e, de algum modo, sei que desta vez ele vai embora para sempre."
 travel_events.4014.a: "Espere! Dê-me mais uma chance!"
 travel_events.4014.b: "Nunca vou esquecer você, [feral_child_scope.GetFirstNameNoTooltip]."
 travel_events.4015.t: "a Barreira da Linguagem"
 travel_events.4015.desc: "Parece que nossa caravana acabou se perdendo um pouco nestas terras estrangeiras.\n\n[travel_leader_scope.GetName] vem nos conduzindo por [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] e, embora finalmente tenha engolido o orgulho e pedido indicações, não parece ser muito bom em falar [ROOT.Char.GetCurrentLocation.GetCulture.GetLanguage.GetNameNoTooltip]."
 travel_events.4015.a: "Deixe-me tentar."
 travel_events.4015.b: "Felizmente, sou fluente em [ROOT.Char.GetCurrentLocation.GetCulture.GetLanguage.GetNameNoTooltip]!"
 travel_events.4016.t: "$travel_danger_prefix$ Calor Excessivo"
 travel_events.4016.desc.intro: "Estou longe de casa, e os ventos gelados foram deixados para trás. Embora a mudança de clima tenha sido agradável e maravilhosa para minha pele no início,"
 travel_events.4016.desc.mid.dry_heat: "minha pele começou a ficar vermelha e a água passa por mim como areia por um peneira."
 travel_events.4016.desc.mid.humid_heat: "o ar espesso de umidade faz-me sentir como se estivesse respirando através de um pano úmido."
 travel_events.4016.desc.outro: "\n\nA água está refrescante e revigorante, e ajuda muito a aliviar essa exaustão pelo calor, mas simplesmente não é suficiente."
 travel_events.4016.a: "Sol, faça o seu pior!"
 travel.got_heatstroke: "Você superaqueceu"
 travel.found_a_place_to_cool: "Você encontrou um rio refrescante"
 travel_events.4016.b: "Preciso de água!"
 every_entourage_tt: "Cada membro do séquito"
 travel.stole_water: "Você roubou um gole refrescante de água"
 travel.caught_stealing_water: "Você foi pego!"
 travel_events.4017.t: "Espadas à Venda"
 travel_events.4017.desc.intro: "Ouvi falar das façanhas militares dos lendários mercenários da nação [ROOT.Char.GetCurrentLocation.GetCulture.GetName], e ao atravessar [ROOT.Char.GetCurrentLocation.GetName], tenho a sorte de me deparar com um[warrior_scope.Custom('ES_XA')] comandante mercenári[warrior_scope.Custom('ES_OA')] muito habilidos[warrior_scope.Custom('ES_OA')]!\n\n"
 travel_events.4017.desc.mid.nomad: "[warrior_scope.GetName] se vangloria de ser [warrior_scope.Custom('ES_ElLa')] guerreir[warrior_scope.Custom('ES_OA')] mais temível de toda a estepe"
 travel_events.4017.desc.mid.swordsman: "[warrior_scope.GetName] afirma que é o melhor [warrior_scope.Custom('ES_ElLa')] espadachim de toda a esfera [ROOT.Char.GetCurrentLocation.GetCulture.GetNameNoTooltip]"
 travel_events.4017.desc.outro: "e estaria honrado em servir, pelo preço certo."
 travel_events.4017.a: "E o preço justo terá!"
 travel_events.4017.b: "Tenho certeza de que podemos negociar isso."
 travel.haggle_succesful: "Você negociou com sucesso!"
 travel.haggle_failed: "[warrior_scope.GetName] está ofendid[warrior_scope.Custom('ES_OA')]"
 travel_events.4017.c: "Talvez possamos usar essa conexão para um acordo futuro..."
 travel_events.4017.d: "Acho que não."
 travel_events.4018.t: "Um Mendicante [ROOT.Char.GetCurrentLocation.GetCulture.GetNameNoTooltip]"
 travel_events.4018.desc.intro: "Soubemos que [ROOT.Char.GetCurrentLocation.GetCounty.GetTitle.GetHolder.GetPrimaryTitle.GetNameNoTierNoTooltip] é uma terra repleta de homens santos que viajam em condições miseráveis e que muitas vezes vivem apenas da fé.\n\nUm[mystic_scope.Custom('ES_OA')] desses mendicantes se aproximou de nossa caravana,"
 travel_events.4018.desc.mid.mystic: "pregando sua própria filosofia mística esotérica a quem quiser ouvir."
 travel_events.4018.desc.mid.preacher: "falando de sua interpretação da vontade [mystic_scope.GetFaith.HighGodNamePossessive] e como levar uma existência piedosa."
 travel_events.4018.desc.outro: "\n\nA criatura empobrecida parece relutante em se separar do nosso grupo, mas talvez eu consiga me livrar de [mystic_scope.GetSheHe]…"
 travel_events.4018.a: "Sou um mestre debatedor."
 travel.debate_won: "Você venceu o debate!"
 travel.debate_lost: "Você perdeu o debate."
 travel_events.4018.b: "[mystic_scope.GetSheHe|U] até faz alguns bons pontos..."
 travel_events.4018.c: "Tenho certeza de que eles partirão eventualmente."
 travel_events.4018.d: "Uma boa queima de hereges está em ordem!"
 travel_events.4019.t: "Uma Delícia Humilde"
 travel_events.4019.desc: "Passando por [ROOT.Char.GetCurrentLocation.GetName], parece que topamos com um mercado de comida local! Por toda parte, camponeses e nobres de toda cultura e idioma se acotovelam em torno de barracas de comida exótica; o ar está carregado de fragrâncias que jamais imaginei.\n\nO cheiro me leva a uma humilde barraca abarrotada de um prato com o qual eu só podia sonhar. Sou arrancado do meu torpor pelo agarrão vacilante de [pompous_courtier.GetName] me para.\n\n\"Não desperdice seu paladar com essa papinha, [ROOT.Char.Custom('FormOfAddressForLiege')]. Esses [ROOT.Char.Custom('GetLocalStreetFoodPlural')] são para camponeses; temos comidas muito melhores em casa\"."
 travel_events.4019.a: "Sou [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip] e quero meu [ROOT.Char.Custom('GetLocalStreetFood')]!"
 travel.good_food: "A comida estava incrível"
 travel.bad_food: "A comida estava nojenta"
 travel.food_poisoning: "Você contraiu intoxicação alimentar"
 travel_events.4019.b: "Eu não acredito que quase comi essa porcaria!"
 travel_events.4019.c: "Talvez eu possa conseguir a receita!"
 travel_events.4020.t: "$travel_danger_prefix$ [ROOT.Char.GetFirstNameNoTooltip], [ROOT.Char.Custom('ES_ElLa')] Forasteir[ROOT.Char.Custom('ES_OA')]"
 travel_events.4020.desc: "É sabido que o povo [ROOT.Char.GetCurrentLocation.GetCounty.GetCulture.GetName] é ardente em sua fé [ROOT.Char.GetCurrentLocation.GetCounty.GetFaith.GetAdjective] e não tem simpatia por não crentes. No entanto, [ROOT.Char.GetCurrentLocation.GetName] está em nossa rota, então devemos passar por aqui.\n\nRapidamente, os olhares vingativos dos aldeões se fixam sobre nós como [ROOT.Char.Custom('GetAnimalType')] rondando sua refeição. Antes de termos a chance de reagir, o [ROOT.Char.GetCurrentLocation.GetCounty.GetFaith.PriestNeuter] local avança sobre nós com uma multidão de fanáticos furiosos, gritando sobre nossas supostas \"crenças heréticas\" e exigindo que paguemos expiação por passar por estas \"terras sagradas\"."
 travel_events.4020.a: "Imbecil, [strong_believer_scope.Custom('ES_ElLa')] herege é #EMP vos#!!"
 travel_events.4020.b: "É mais fácil se apenas pagarmos."
 travel_events.4020.c: "Queimem esses lunáticos."
 travel_events.4021.t: "O Altar de [ROOT.Char.GetCurrentLocation.GetCounty.GetFaith.HighGodName]"
 travel_events.4021.desc.intro: "Fui avisad[GetPlayer.Custom('ES_OA')] de que os [ROOT.Char.GetCurrentLocation.GetCounty.GetFaith.GetAdherentNamePlural] praticavam sacrifícios humanos, mas nunca imaginei que testemunharia tal ato. Sobre um altar de pedra vejo um[sacrificed_person_scope.Custom('ES_XA')] [sacrificed_person_scope.GetWomanMan], despidos[sacrificed_person_scope.Custom('ES_OA')], estendid[sacrificed_person_scope.Custom('ES_OA')] sobre a superfície com cordas bem apertadas.\n\n"
 travel_events.4021.desc.mid.sadist: "Tenho muita sorte de ser testemunh[ROOT.Char.Custom('ES_OA')] desse barbarismo sagrado com meus próprios olhos. [sacrificed_person_scope.GetSheHe|U] se contorce e luta de forma tão agradável; lamento não ser eu quem atravesse seu coração com a faca e [sacrificed_person_scope.GetHerHim] o entregue a [ROOT.Char.GetCurrentLocation.GetCounty.GetFaith.HighGodName]!\n\n"
 travel_events.4021.desc.mid: "Simplesmente não consigo acreditar no que estou testemunhando. Ele pulsa rapidamente a cada respiração rápida, seus olhos ensanguentados imploram que eu interfira.\n\n"
 travel_events.4021.desc.outro.cannibal: "Só posso esperar ter a oportunidade de me banquetear com a carne dele(a) quando tudo isso acabar."
 travel_events.4021.desc.outro.sadist: "Observo com deleite, com os olhos fixos na faca enquanto ela [sacrificed_person_scope.GetHerHim] a envia ao esquecimento."
 travel_events.4021.desc.outro: "Observo impotente, desejando deter a faca e adiar sua jornada para o esquecimento."
 travel_events.4021.a: "Devo simplesmente desviar o olhar."
 travel_events.4021.a.sadist: "Vou tentar não perder um momento disso!"
 travel_events.4021.b: "Talvez eu possa comprar a liberdade desse[sacrificed_person_scope.Custom('ES_EA')] infeliz!"
 travel_events.4021.c: "Alto! Mejor llevaos a [rival_to_sacrifice.GetNameNoTooltip]!"
 travel_events.4022.t: "A Árvore Sagrada"
 travel_events.4022.desc: "Dizem-me que aqui em [ROOT.Char.GetCurrentLocation.GetName] a natureza é venerada como uma extensão da vontade de [ROOT.Char.GetCurrentLocation.GetCounty.GetFaith.PantheonTerm].\n\nObservamos os locais enfeitarem uma árvore antiga com materiais finos e joias, como se a estivessem cortejando. Muitos ao meu redor se contentam em assistir de longe, mas sinto-me compelid[ROOT.Char.Custom('ES_OA')] a fazer algo a mais…"
 travel_events.4022.a: "Fascinante."
 travel_events.4022.a.not_so_different: "Não somos tão diferentes."
 travel_events.4022.a.ignore_heretics: "Não devo me envolver nos negócios dos hereges."
 travel_events.4022.b: "Queimem a árvore!"
 travel.burn_the_tree: "A árvore é incendiada"
 travel.beaten_by_peasants: "Você é repelido pelos fiéis"
 travel_events.4022.c: "Devo participar da celebração!"
 cultural_acceptance_participated_in_festival: "Participou de um festival"
 travel_events.4023.t: "O [prester_john_scope.GetFaith.GetReligion.GetAdherentNamePluralNoTooltip] Perdido"
 travel_events.4023.desc.intro: "Existem lendas sobre um[prester_john_scope.Custom('ES_XA')] [prester_john_scope.GetPrimaryTitle.GetTierAsNameNoTooltip] de fé [ROOT.Char.GetFaith.GetReligion.GetAdjective] cercad[prester_john_scope.Custom('ES_OA')] de hereges e infiéis. Um dia, tal [prester_john_scope.GetTitleAsNameNoTooltip] lendári[prester_john_scope.Custom('ES_OA')] de [prester_john_scope.GetPrimaryTitle.GetTierAsNameNoTooltip] pegará em armas contra os perversos e os abaterá com fúria santa!\n\n"
 travel_events.4023.desc.mid.john: "As lendas o nomeiam de 'Prester João', e"
 travel_events.4023.desc.mid.joan: "As lendas o nomeiam de 'Prester João', mas talvez quisessem dizer 'Prester Joan'! De qualquer forma,"
 travel_events.4023.desc.mid: "Esse figura lendária permanece sem nome, mas"
 travel_events.4023.desc.outro: "à medida que passo mais tempo em [prester_john_scope.GetPrimaryTitle.GetNameNoTierNoTooltip], fico cada vez mais convencido de que [prester_john_scope.GetName] é o lendário [prester_john_scope.GetTitleAsNameNoTooltip]!"
 travel_events.4023.a: "Devo ver[prester_john_scope.GetHerHim] imediatamente!"
 travel_events.4023.b: "Deve ser lembrado de seu dever de combater a heresia!"
 travel_events.4023.c: "Seu [prester_john_scope.GetFaith.GetNameNoTooltip] é uma mera perversão do [ROOT.Char.GetFaith.GetNameNoTooltip]!"
 travel_events.4023.d: "Fascinante. Seguindo em frente."
 travel_events.4024.t: "Um[ROOT.Char.Custom('ES_XA')] estrangeir[ROOT.Char.Custom('ES_OA')] de credo [ROOT.Char.GetFaith.GetReligion.GetAdherentNameNoTooltip]"
 travel_events.4024.desc.intro: "Recebi uma carta escrita em uma língua exótica de alguém que dizem ser um[foreign_visitor.Custom('ES_XA')] lejan[foreign_visitor.Custom('ES_OA')] [foreign_visitor.GetTitleAsNameNoTooltip], do país dos \"[foreign_visitor.GetFaith.GetAdherentNamePluralNoTooltip]\", um grupo distante de [ROOT.Char.GetFaith.GetReligion.GetAdherentNameNoTooltip]."
 travel_events.4024.desc.mid: "\n\n[foreign_visitor.GetSheHe|U] afirma que afirma que sou uma figura lendária para estes [foreign_visitor.GetFaith.GetAdherentNamePluralNoTooltip], um [ROOT.Char.GetTitleAsNameNoTooltip|U] de fé [ROOT.Char.GetFaith.GetReligion.GetAdjective] sitiad[ROOT.Char.Custom('ES_OA')] por [ROOT.Char.Custom('GetDerogatoryNonbelieverPlural')]."
 travel_events.4024.a: "[foreign_visitor.GetSheHe|U] será uma lenda para nós também!"
 travel_events.4024.b: "[foreign_visitor.GetFaith.GetNameNoTooltip]? Parece heresia!"
 travel_events.4024.c: "Talvez [chaplain_scope.GetNameNoTooltip] possa ensinar a todos sobre o [ROOT.Char.GetFaith.GetName|l]!"
 travel.gift_from_john: "Um presente de [prester_john_scope.GetName]"
 travel_events.4024.d: "Que legal..."
 travel.turned_away_from_john: "Você foi rejeitado"
 travel_events.4025.t: "Pegue a Espada Sagrada"
 travel_events.4025.desc.mid: "[foreign_visitor.GetSheHe|U] afirma que sou uma figura lendária, destinada a empunhar a espada contra os infiéis em nome [ROOT.Char.GetFaith.HighGodNamePossessive] e enviar os miseráveis para [ROOT.Char.GetFaith.NegativeAfterLife], onde é seu lugar.\n\nTenho muitos vizinhos de todas as religiões; será que [ROOT.Char.GetFaith.HighGodName] realmente deseja que eu cometa violência em Seu nome?"
 travel_events.4025.a: "Claro que [ROOT.Char.GetFaith.HighGodNameSheHe|U] iria!"
 travel_events.4025.b: "Existem muitos caminhos para [ROOT.Char.GetFaith.PositiveAfterLife]"
 travel.visitor_rejected_me: "[prester_john_scope.GetName] se recusa a combater a heresia"
 travel_events.4025.different_religion_neighbors_and_vassals: "Cada [vassal|lE] e [ruler|lE] vizinho de uma [religion|lE] diferente"
 travel_events.4026.t: "Amigos de Longe"
 travel_events.4026.desc: "[prester_john_scope.GetName] devolveu minha carta e expressou sua admiração mútua por mim e pela fé [ROOT.Char.GetFaith.GetAdjective].\n\n prossegue dizendo que, se [ROOT.Char.GetFaith.HighGodName] desejar, poderemos nos encontrar novamente, e enquanto isso, devemos permanecer admiradores mútuos de longe."
 travel_events.4026.a: "Isso parece maravilhoso!"
 travel.became_friends_with_visitor: "[foreign_visitor.GetName] se tornou seu amig[foreign_visitor.Custom('ES_OA')]!"
 travel.visitor_rejected_friendship: "[foreign_visitor.GetName] se recusa a ser seu amig[foreign_visitor.Custom('ES_OA')]"
 travel_events.4026.b: "Relacionamentos de longa distância realmente não funcionam para mim."
 travel_events.4027.t: "Visitando Hereges"
 travel_events.4027.desc: "Uma banda de [foreign_visitor.GetFaith.GetAdherentNamePlural] errantes passa por [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] e hoje, um[foreign_visitor.Custom('ES_XA')] importante [foreign_visitor.GetTitleAsNameNoTooltip] [foreign_visitor.GetFaith.GetAdherentNameNoTooltip] entre suas fileiras me acusou de heresia!\n\nNão só afirma que estou pervertendo a vontade [ROOT.Char.GetFaith.HighGodNamePossessive], mas também que a fé [ROOT.Char.GetFaith.GetAdjective] não é nada além de uma repulsiva zombaria do [ROOT.Char.GetFaith.GetReligion.GetNameNoTooltip|l]!"
 travel_events.4027.a: "Que fundamentalista mais pompos[foreign_visitor.Custom('ES_OA')]! Vamos ver quem ri de quem!"
 travel_events.4028.t: "Uma Pedra Rúnica"
 travel_events.4028.desc: "A zona rural de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] é conhecida por estar repleta de pedras rúnicas: imponentes monólitos gravados com registros escritos de eventos, tanto lendários quanto históricos.\n\nEm nossas viagens, encontramos uma pedra rúnica particularmente grandiosa, adornada com padrões complexos e o que sem dúvida é uma lenda escrita em uma língua que não consigo entender.\n\nTalvez com tempo e paciência, eu consiga decifrar o significado..."
 travel_events.4028.a: "Vou tentar!"
 travel.read_runestone: "Você leu a Pedra Rúnica!"
 travel.failed_to_read_runestone: "Você não conseguiu ler a Pedra Rúnica"
 travel_events.4028.b: "Esse símbolo profano deve ser destruído!"
 travel_events.4028.c: "Não tenho tempo para isso."
 travel_events.4029.t: "O Espantalho Macabro de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]"
 travel_events.4029.desc.intro: "Passear pela zona rural de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] não é exatamente a algazarra pacífica que eu havia imaginado. O céu está negro de nuvens e os campos de cultivo estão em um silêncio sepulcral.\n\nAté que ouvimos os gritos lancinantes de agonia vindos do fundo dos campos. Ao nos aproximarmos, encontramos um[brainless_character.Custom('ES_XA')] [brainless_character.GetWomanMan] pendurad[brainless_character.Custom('ES_OA')] em um poste como se fosse um espantalho.\n\n"
 travel_events.4029.desc.mid.christian: "É a viva imagem do sofrimento cristão, amarrad[brainless_character.Custom('ES_OA')] a um crucifixo de fazenda."
 travel_events.4029.desc.mid: "A julgar por seus lábios secos e pele pálida, é evidente que está aqui há algum tempo."
 travel_events.4029.desc.outro: "Alguns membros da minha comitiva imploram que eu derrube [brainless_character.GetHerHim], mas isso realmente é da minha conta?"
 travel_events.4029.a: "Tenha piedade dessa criatura!"
 travel_events.4029.b: "Está claro que é um[brainless_character.Custom('ES_XA')] criminoso."
 travel_events.4029.c: "Deixe[brainless_character.GetHerHim]."
 travel_events.4030.t: "$travel_events.4029.t$"
 travel_events.4030.desc.intro: "[brainless_character.Custom('ES_ElLa')|U] [brainless_character.GetWomanMan] se prostra aos meus pés, manchando o chão com o sangue de suas mãos. Nunca havia visto uma criatura tão estranha e patética. Logo, membros de minha comitiva [brainless_character.GetHerHim] cercam e [brainless_character.Custom('ES_LoLa')] o põem de pé, para lhe pedir que explique como chegou até ali.\n\n"
 travel_events.4030.desc.mid.lowborn: "\"Ah, sabe, foi minha mãe. Ela me diz que eu sou tão lento e inútil que eu seria melhor espantalho do que trabalhador rural, então ela me amarrou. Eu achei que ficaria bem, mas foi uma tortura\".[brainless_character.Custom('ES_OA')][brainless_character.Custom('ES_OnOna')][brainless_character.Custom('ES_OA')]"
 travel_events.4030.desc.mid.noble: "\"Ah, eu estava apenas aqui para cobrar impostos. Os camponeses me disseram que o ouro estava enterrado aqui fora, e antes que eu percebesse, eles caíram sobre mim e me penduraram como um espantalho!\""
 travel_events.4030.desc.outro: "\n\nÉ evidente que o intelecto não é o seu forte, no entanto, [brainless_character.GetSheHe] me oferece uma pequena quantia de dinheiro por minha ajuda."
 travel_events.4030.a: "[brainless_character.GetSheHe|U] está claramente em perigo aqui, venha comigo!"
 travel_events.4030.b: "Uma boa recompensa por uma boa ação."
 travel_events.4030.c: "Não preciso de recompensa."
 travel_events.4031.t: "[heartless_knight_scope.Custom('ES_ElLa')|U] [heartless_knight_scope.GetWomanMan] de metal"
 travel_events.4031.desc.intro: "De fato, um passeio por [ROOT.Char.GetCurrentLocation.GetName] é um presente de [ROOT.Char.GetFaith.CreatorName]. A tranquilidade deste lugar é rompida de repente e abruptamente por grunhidos furiosos e o tilintar de uma armadura!\n\n\"Escutai! Tirem-me desta prisão de metal! Meu escudeiro se ofendeu com meu jeito de agir, chegando a me chamar de 'sem coração' e me abandonou!\".\n\n"
 travel_events.4031.desc.mid.callous: "Tento sufocar minha risada, mas a imagem desse tolo tilintando pelos campos é simplesmente demais."
 travel_events.4031.desc.mid: "Seja lá o que ess[heartless_knight_scope.Custom('ES_EA')] estranh[heartless_knight_scope.Custom('ES_OA')] [heartless_knight_scope.GetWomanMan] tenha feito, não poderia justificar ficar pres[heartless_knight_scope.Custom('ES_OA')] para sempre em sua armadura."
 travel_events.4031.desc.outro: "É claro que eu poderia fazer alguém ajudar [heartless_knight_scope.GetHerHim], mas será que realmente vale a pena?"
 travel_events.4031.a: "Considere a armadura fora, por um preço."
 travel_events.4031.b: "Você oferece escudeiros leais em troca de sua lealdade."
 travel_events.4031.c: "[heartless_knight_scope.GetHerHim|U] abandono ao seu destino."
 travel_events.4032.t: "Luta com [ROOT.Char.Custom('GetAnimalType')]"
 travel_events.4032.desc: "Nossa jornada é violentamente interrompida pelo som de carne sendo rasgada, pelo ranger de mandíbulas e pelos gritos desesperados de alguém prestes a encontrar seu fim! O barulho é tão horrível que deve ter vindo das profundezas de [ROOT.Char.GetFaith.NegativeAfterLife].\n\nTentando rastrear a origem, encontramos um[cowardly_knight_scope.Custom('ES_XA')] $knight_culture_player_no_tooltip_lowercase$ que luta contra um exemplar de [ROOT.Char.Custom('GetAnimalType')]! A espada dele está cravada entre as mandíbulas da fera, mas seu aperto começa a fraquejar."
 travel_events.4032.a: "[cowardly_knight_scope.Custom('ES_EA')] [cowardly_knight_scope.GetWomanMan] merece minha ajuda!"
 travel.beat_back_lion: "Você derrotou [ROOT.Char.Custom('GetAnimalType')]"
 travel.mauled_by_animal: "O/A [ROOT.Char.Custom('GetAnimalType')] te estraçalhou"
 travel_events.4032.b: "Ajudem[cowardly_knight_scope.GetHerHim], [entourage_helper.GetFirstNameNoTooltip]!"
 travel_events.4032.c: "Eu não vou arriscar minha vida por isso."
 travel_events.4033.t: "[witch_scope.Custom('ES_ElLa')|U] [witch_scope.Custom('MagicUserTerm')] de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]"
 travel_events.4033.desc.intro: "[ROOT.Char.GetCurrentLocation.GetNameNoTooltip] é uma terra de costumes estranhos e obscuros. As práticas da fé [ROOT.Char.GetCurrentLocation.GetCounty.GetFaith.GetAdjective] são estranhas e inimaginavelmente diferentes da [ROOT.Char.GetFaith.GetName|l], e em nenhum lugar isso fica mais evidente do que em sua atitude em relação à prática de magia.\n\nBem no meio da cidade há um[witch_scope.Custom('ES_XA')] [witch_scope.GetWomanMan] recitando encantamentos e oferecendo bênçãos como se fosse um[witch_scope.Custom('ES_XA')] [ROOT.Char.GetFaith.PriestNeuter]!"
 travel_events.4033.desc.mid.zealous: "A mera visão dessa heresia degenerada já é suficiente para me deixar enjoad[ROOT.Char.Custom('ES_OA')] e sinto minha mão de caçador de bruxas começar a tremer de raiva."
 travel_events.4033.desc.mid: "É estranho para mim, mas as pessoas parecem estar extremamente jubilosas por estar na presença dele/dela."
 travel_events.4033.a: "Eles precisam entender que [witch_scope.Custom('MagicPracticeTerm')] é um pecado."
 travel_events.4033.b: "Tenho muito a aprender, me ensine!"
 travel_events.4033.c: "Isso realmente não é da minha preocupação."
 travel_events.4033.d: "[witch_scope.Custom('MagicPracticeTerm')|U]! Ele se arrependerá ou arderá!"
 travel.burned_witch: "Você capturou e queimou [witch_scope.Custom('ES_AlAla')] [witch_scope.Custom('MagicUserTerm')]"
 travel.beaten_by_locals: "Você foi impedido pelos locais"
 travel_events.4034.t: "Cinzas para Tesouros"
 travel_events.4034.desc.intro: "[witch_scope.Custom('ES_ElLa')|U] malvad[witch_scope.Custom('ES_OA')] [witch_scope.Custom('MagicUserTerm')] de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] foi legitimamente queimad[witch_scope.Custom('ES_OA')] por seus crimes contra [ROOT.Char.GetFaith.HighGodName] e, conforme a fumaça se dissipa, vejo que tal [witch_scope.Custom2('InsultAdjective', ROOT.Char)] deixou algo para trás.\n\n"
 travel_events.4034.desc.mid.bones: "Enterrados entre as cinzas estão seus ossos, imaculadamente preservados apesar da intensidade das chamas. Não há dúvida de que este foi um ato final de magia vil."
 travel_events.4034.desc.mid: "Entre as cinzas reluz um objeto maravilhoso, milagrosamente salvo das intensas chamas. Talvez seja um presente de [ROOT.Char.GetFaith.HighGodName] por meus serviços, ou um último ato de magia d[witch_scope.Custom('ES_DelDela')] vil brux[witch_scope.Custom('ES_OA')]."
 travel_events.4034.desc.outro: "O artefato é recuperado das cinzas e limpo por um membro da minha comitiva, para ser meu para sempre."
 travel_events.4034.a: "Uma ótima adição à minha coleção."
 travel_events.4035.t: "Não mais no [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]"
 travel_events.4035.desc.intro: "Como leal servo[ROOT.Char.Custom('ES_XA')] de [ROOT.Char.GetFaith.WitchGodName], viajar significa realizar rituais e encantamentos para proteger meu séquito dos maus espíritos.\n\nAqui em [ROOT.Char.GetCurrentLocation.GetNameNoTooltip],"
 travel_events.4035.desc.mid.zealous: "os hereges vis"
 travel_events.4035.desc.mid: "as pessoas"
 travel_events.4035.desc.outro: "acreditam que toda magia e milagres feitos por qualquer um além de seus clérigos sejam bruxaria.\n\nConsequentemente, o [zealous_priest_scope.GetFaith.PriestNeuter] local agora se aproxima da minha procissão como uma fera, apagando meus símbolos protetores e delirando sobre o suposto mal dos meus caminhos."
 travel_events.4035.a: "Talvez [zealous_priest_scope.GetSheHe] ouça a razão?"
 travel_events.4035.b: "Eu me arrependo dos meus caminhos malignos!"
 travel_events.4035.c: "Fuja!"
 travel_events.4035.d: "Vou lutar para sair dessa!"
 travel.beat_zealot: "Você derrotou a multidão enfurecida"
 travel_events.4036.t: "Caravaneiros [ROOT.Char.GetCurrentLocation.GetCounty.GetCulture.GetNameNoTooltip]"
 travel_events.4036.desc: "Enquanto seguimos pelas redondezas de [ROOT.Char.GetCurrentLocation.GetCounty.GetName], avisto uma fila de camelos de caravana à distância e logo nos encontramos com seu estranho líder.\n\n\"Boa noite, prezad[ROOT.Char.Custom('ES_OA')] amig[ROOT.Char.Custom('ES_OA')]. Entrem! Entrem! Eu lhes garanto que o que tenho em minha barraca, assim como a própria [kingdom_scope.GetBaseNameNoTierNoTooltip], é mais do que parece\", diz, exibindo incontáveis bugigangas reluzentes diante dos meus olhos."
 travel_events.4036.a: "Vou pagar o que você quiser!"
 travel_events.4036.b: "Vou roubar isso!"
 travel_events.4036.d: "Talvez possamos fazer um acordo."
 travel_events.4036.c: "Não tenho interesse em bugigangas [ROOT.Char.GetCurrentLocation.GetCounty.GetCulture.GetNameNoTooltip]."
 travel_events.4037.t: "[ROOT.Char.GetFaith.GetReligion.GetNameNoTooltip] e [ROOT.Char.GetCurrentLocation.GetCounty.GetFaith.GetNameNoTooltip|l]"
 travel_events.4037.desc: "Ouvi dizer que os habitantes de [ROOT.Char.GetCurrentLocation.GetCounty.GetName] praticam o [ROOT.Char.GetFaith.GetReligion.GetName|l] em conjunto com suas próprias crenças [ROOT.Char.GetCurrentLocation.GetCounty.GetFaith.GetAdjective]s, e agora que estou aqui, posso ver essa interligação religiosa por toda parte.\n\nUm[fanboy_character_scope.Custom('ES_XA')] camponês[fanboy_character_scope.Custom('ES_OA')] peculiar e entusiasmado que se chama [fanboy_character_scope.GetFirstName] se aproxima entusiasmad[fanboy_character_scope.Custom('ES_OA')] do meu séquito e começa a estudar nossa iconografia religiosa com vigor.\n\n\"Por [fanboy_character_scope.GetFaith.HighGodName], um grupo de [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip] justamente aqui! Por favor, [ROOT.Char.Custom('FormOfAddressForLiege')], vocês nos ensinariam os modos de culto [ROOT.Char.GetFaith.GetAdjectiveNoTooltip]?\""
 travel_events.4037.a: "Eu os ensinarei!"
 travel.good_cermon: "Você fez um bom sermão"
 travel.bad_cermon: "Você fez um sermão ruim"
 travel_events.4037.b: "Estou mais interessado em ouvir sobre [ROOT.Char.GetCurrentLocation.GetCounty.GetFaith.GetNameNoTooltip]."
 travel_events.4037.c: "Fora, [ROOT.Char.Custom('GetDerogatoryNonbelieverPlural')]!"
 travel_events.4038.t: "[ROOT.Char.GetCurrentLocation.GetCounty.GetFaith.GetAdherentNamePluralNoTooltip|U] entre nós"
 travel_events.4038.desc: "Na fé [ROOT.Char.GetFaith.GetAdjective], seguimos nossos próprios rituais e crenças, mas continuamos colocando o [ROOT.Char.GetCurrentLocation.GetCounty.GetFaith.GetReligion.GetName|l] acima de todas as outras religiões e expressando afinidade com suas crenças.\n\nÉ bastante comum que os [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip] pratiquem o [ROOT.Char.GetCurrentLocation.GetCounty.GetFaith.GetReligion.GetNameNoTooltip|l] em conjunto com o culto tradicional [ROOT.Char.GetFaith.GetAdherentNameNoTooltip]. E agora que estou em [ROOT.Char.GetCurrentLocation.GetCounty.GetName], tenho a oportunidade de assistir a um sermão e aprender tudo sobre a fé [ROOT.Char.GetCurrentLocation.GetCounty.GetFaith.GetAdjective]."
 travel_events.4038.a: "Eu simplesmente devo assistir!"
 travel_events.4038.b: "Talvez eu possa interessá-los em nossos caminhos!"
 travel_events.4038.c: "Não estou interessado."
 travel_events.4039.t: "Hospitalidade por um Dia"
 travel_events.4039.desc: "A jornada foi longa e cansativa, e meus pés doem tanto que meus antepassados devem sentir. Quando acho que estou prestes a desabar de exaustão, sinto algo pesado sobre o pescoço!\n\nEm pouco tempo, vejo-me trajad[ROOT.Char.Custom('ES_OA')] da cabeça aos pés com as vestes tradicionais [ROOT.Char.GetCurrentLocation.GetCounty.GetCulture.GetName], e as ruas transbordam de júbilo! O chefe de cada casa me convida a entrar e descansar minhas cansadas honrarias. Levaria apenas um momento para recuperar minha energia, e eu seria recebid[ROOT.Char.Custom('ES_OA')] como [Select_CString( ROOT.Char.IsFemale, 'convidada', 'convidado' )] de honra.\n\nA hospitalidade [ROOT.Char.GetCurrentLocation.GetCounty.GetCulture.GetNameNoTooltip] é lendária; será que posso mesmo me dar ao luxo de #EMP não#! conferir isso pessoalmente?"
 travel_events.4039.a: "Talvez apenas um curto descanso..."
 travel_events.4039.b: "Eu devo continuar!"
 travel_events.4040.t: "Uma Fascinação Cultural"
 travel_events.4040.desc: "Desde que entrei em [ROOT.Char.GetCurrentLocation.GetCounty.GetName], têm me tratado como um animal em um jardim espetacular. As pessoas olham admiradas para a minha maneira de falar e de me portar.\n\nEnquanto avançamos, de repente se aproxima de mim um[fanboy_character_scope.Custom('ES_XA')] [fanboy_character_scope.GetWomanMan] peculiar e entusiast[fanboy_character_scope.Custom('ES_OA')] que, ao contrário do resto da multidão, parece falar [ROOT.Char.GetCulture.GetLanguage.GetName].\n\n\"Meu Deus, então é verdade! Um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] da cultura [ROOT.Char.GetCulture.GetName] aqui, justamente aqui! Há muito tempo admiro os costumes [ROOT.Char.GetCulture.GetNameNoTooltip]s, e até aprendi [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip] no meu tempo livre! Que grande honra!\""
 travel_events.4040.a: "A honra é toda sua."
 travel_events.4040.b: "Me ensine sobre #EMP seu#! povo."
