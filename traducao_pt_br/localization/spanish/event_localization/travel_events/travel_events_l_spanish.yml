 travel_events.1010.t: "[GetCourtPositionType('travel_leader_court_position').GetNameNoTooltip()]"
 travel_events.1010.desc: "A meu pedido, meus servos reuniram duas opções para eu considerar para o papel de mestre da caravana. Diz-se que [great_travel_leader_option.GetName] é o mais experiente dos dois, mas, é claro, [good_travel_leader_option.GetName] sai mais barato."
 travel_events.1010.a: "[great_travel_leader_option.GetNameNoTooltip] é uma ótima escolha."
 travel_events.1010.b: "[good_travel_leader_option.GetNameNoTooltip] servirá."
 travel_events.1010.c: "Nenhuma dessas escolhas é adequada."
 travel_events.1010.a.aptitude: "A [aptitude|lE] de [great_travel_leader_option.GetFirstNameNoTooltip] [great_travel_leader_option.GetCourtPositionAptitude( GetCourtPositionType( 'travel_leader_court_position' ) )]"
 travel_events.1010.b.aptitude: "A [aptitude|lE] de [good_travel_leader_option.GetFirstNameNoTooltip] [good_travel_leader_option.GetCourtPositionAptitude( GetCourtPositionType( 'travel_leader_court_position' ) )]"
 travel_events.1020.t: "Um[old_travel_leader.Custom('ES_XA')] nov[old_travel_leader.Custom('ES_OA')] [GetCourtPositionType('travel_leader_court_position').GetNameNoTooltip()|l]"
 travel_events.1020.intro.prev_leader_dead: "Meu antig[old_travel_leader.Custom('ES_OA')] [GetCourtPositionType('travel_leader_court_position').GetName()|l] [old_travel_leader.GetFirstName] deixou seu invólucro mortal quando [old_travel_leader.GetDeathReason]. Cabe a mim escolher outra pessoa para liderar meu séquito.\n\n"
 travel_events.1020.intro.fallback: "Com o cargo de [GetCourtPositionType('travel_leader_court_position').GetName()|l] agora vago, olho para minha comitiva. Há alguém que possa servir bem, ao menos até eu voltar para casa e poder procurar um substituto adequado?\n\n"
 travel_events.1020.desc.two_entourage_members: "De fato, há dois que poderiam facilmente preencher o lugar de [old_travel_leader.GetFirstNameNoTooltip]: ou [temp_caravan_master_option_1.GetName], m [ROOT.Char.Custom2('RelationToMeShort',temp_caravan_master_option_1)], ou [temp_caravan_master_option_2.GetName], m [ROOT.Char.Custom2('RelationToMeShort',temp_caravan_master_option_2)], ambos me serviriam bem em caso de necessidade."
 travel_events.1020.desc.one_entourage_member: "Só há uma pessoa da minha comitiva que poderia assumir esse papel: meu [ROOT.Char.Custom2('RelationToMeShort',temp_caravan_master_option_1)] [temp_caravan_master_option_1.GetFirstName]. No entanto, um[temp_caravan_master_option_2.Custom('ES_XA')] morador[temp_caravan_master_option_2.Custom('ES_OA')] chamado [temp_caravan_master_option_2.GetName] também ofereceu seus serviços."
 travel_events.1020.desc.fallback: "Infelizmente, não confiaria a nenhum desses incompetentes para encontrarem o caminho de casa do mercado, quanto mais para liderar uma jornada até [next_destination.GetName]. Felizmente, dois moradores locais ofereceram seus serviços."
 travel_events.1020.a: "Vou escolher [temp_caravan_master_option_1.GetFirstNameNoTooltip]."
 travel_events.1020.b: "[temp_caravan_master_option_2.GetFirstNameNoTooltip|U] servirá perfeitamente."
 travel_events.1020.a.aptitude: "A [aptitude|lE] de [temp_caravan_master_option_1.GetFirstNameNoTooltip] [temp_caravan_master_option_1.GetCourtPositionAptitude( GetCourtPositionType( 'travel_leader_court_position' ) )]"
 travel_events.1020.b.aptitude: "A [aptitude|lE] de [temp_caravan_master_option_2.GetFirstNameNoTooltip] [temp_caravan_master_option_2.GetCourtPositionAptitude( GetCourtPositionType( 'travel_leader_court_position' ) )]"
 travel_events.2200.t: "Um Duelo Exigido"
 travel_events.2200.desc: "Um[local_knight.Custom('ES_XA')] [local_knight.GetWomanMan] imponente está parado na estrada à nossa frente.\n\n\"Eu sou [local_knight.GetName] de [local_knight.GetCurrentLocation.GetNameNoTooltip]! Derrotei dezenas de [ROOT.Char.GetWomenMen] em combate! E, honestamente, todas essas lutas foram entediantes. Então aqui estou, nesta estrada, procurando alguém melhor do que eu, alguém com quem eu possa aprender.\n\nSe vocês conseguirem me vencer em combate, eu me tornarei um[local_knight.Custom('ES_XA')] servidor[local_knight.Custom('ES_XA')] valios[local_knight.Custom('ES_OA')] e leal. Portanto, neste dia, exijo enfrentar um de vocês em uma luta justa!\"."
 travel_events.2200.a: "Eu não tenho interesse em você nem em uma luta justa."
 travel_events.2200.a.desc: "Sua comitiva inteira atropela [local_knight.GetName]"
 travel_events.2200.a.success.tt: "[local_knight.GetName] foi rapidamente atropelad[local_knight.Custom('ES_OA')] por sua comitiva"
 travel_events.2200.a.success: "Carga bem-sucedida!"
 travel_events.2200.a.failure.tt: "[adult_victim.GetName] foi atropelad[adult_victim.Custom('ES_OA')] acidentalmente por seu séquito"
 travel_events.2200.a.failure: "Carga quase bem-sucedida!"
 travel_events.2200.b: "Você pode ser menos valioso depois que eu ganhar!"
 travel_events.2200.b.success: "Você vence a luta!"
 travel_events.2200.b.failure: "[local_knight.GetName] vence a luta!"
 travel_events.2200.c: "[travel_duel_champion.Custom('ES_ElLa')|U] [travel_duel_champion.GetTitledFirstNameNoTooltip|l] te mostrará como se faz."
 travel_events.2200.c.success: "[travel_duel_champion.GetName] vence a luta!"
 travel_events.2200.c.failure: "[local_knight.GetNameNoTooltip] vence a luta!"
 travel_events.4050.t: "Quase em Casa"
 travel_events.4050.interpreter: "Concedi uma audiência improvisada a um grupo de notáveis de origem [foreign_county.GetAdjective] durante a viagem, por alguns instantes para que prestem suas homenagens.\n\nVejo-me distraíd[ROOT.Char.Custom('ES_OA')] por [friendly_child.GetName]; meu jovem [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('friendly_child'))] está atuando como tradutor[friendly_child.Custom('ES_XA')] para alguns acompanhantes, alternando entre idiomas e maneiras com nuance e facilidade, fomentando um intercâmbio animado.\n\nPelo que percebo, est[friendly_child.Custom('ES_EA')] [friendly_child.Custom('GirlBoy')] está se tornando [Select_CString( friendly_child.IsFemale, 'uma emissária nata', 'um emissário nato' )]."
 travel_events.4050.religious: "Concedi a um bando de [friendly_child.GetFaith.AltPriestTermPlural] de origem [foreign_county.GetAdjective] uma audiência improvisada no caminho, alguns momentos para compartilhar bênçãos e sabedoria [friendly_child.GetFaith.GetAdjective].\n\nVejo-me distraíd[ROOT.Char.Custom('ES_OA')] por [friendly_child.GetName], pois meu jovem [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('friendly_child'))] reuniu uma multidão de pequenos devotos e, entre eles, expõe com sabedoria a natureza de sua fé comum.\n\nPelo que percebo, aprender tanto os costumes de meu credo quanto os de sua própria fé proporcionou a est[friendly_child.Custom('ES_EA')] [friendly_child.Custom('GirlBoy')] certa compreensão."
 travel_events.4050.singing: "Concedi a alguns poucos proprietários de terras de ascendência [foreign_county.GetAdjective] uma audiência improvisada durante o trajeto, alguns instantes para exercitarem suas maneiras enquanto me olhavam nervosamente.\n\nVejo-me distraíd[ROOT.Char.Custom('ES_OA')] por [friendly_child.GetName]: meu jovem [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('friendly_child'))] está se divertindo como nunca, cantando canções populares, dançando jigas e louvando os antigos heróis da tradição [friendly_child.GetCulture.GetHeritage.GetName] com alguns jovens [friendly_child.GetCulture.GetName].\n\nInstalar-se em minha corte parece ter apenas acentuado o interesse de est[friendly_child.Custom('ES_EA')] [friendly_child.Custom('GirlBoy')] por praticar sua própria cultura."
 travel_events.4050.a: "Um talento a ser cultivado."
 travel_events.4050.b: "Devo acabar com isso..."
 travel_events.4050.b.tt: "[Select_CString( friendly_child.IsFemale, 'Esta niña', 'Este niño' )] pertence à minha corte… ao meu povo."
 travel_events.4050.c.interpreter: "[friendly_child.Custom('GirlBoy')|U]! Venha nos encantar em [friendly_child.GetCulture.GetLanguage.GetNameNoTooltip]."
 travel_events.4050.c.religious: "[friendly_child.Custom('GirlBoy')|U]! Venha impressionar esses [friendly_child.GetFaith.GetAdherentNamePluralNoTooltip]."
 travel_events.4050.c.singing: "[friendly_child.Custom('GirlBoy')|U]! Venha divertir esses [friendly_child.GetCulture.GetCollectiveNounNoTooltip]."
 travel_events.4050.c.tt: "Me deixe orgulhos[GetPlayer.Custom('ES_OA')], [friendly_child.Custom('GetLassLad')]!"
 sponsored_emissaries_modifier: "Emissários Patrocinados"
 sponsored_emissaries_modifier_desc: "Este personagem incentiva o aprendizado de idiomas e a diplomacia intercultural."
 raised_other_faiths_mystic_modifier: "Místico de Outra Fé Criado"
 raised_other_faiths_mystic_modifier_desc: "Este personagem nutriu um jovem devoto notável de uma crença diferente."
 insisting_on_norms_modifier: "Insistindo nas Normas"
 insisting_on_norms_modifier_desc: "Os cortesãos são observados de perto, quaisquer maneiras estrangeiras ou não ortodoxas são restritas."
