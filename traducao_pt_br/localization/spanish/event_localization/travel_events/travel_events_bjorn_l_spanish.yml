l_spanish:
 #Travel Flavor Events
 #Troll bridge - you encounter a troll bridge.
 travel_events.5100.t: "El puente con [ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')]"
 travel_events.5100.desc: "«Mi señor[ROOT.Char.Custom('ES_XA')]! Este puente tiene muy mala reputación. ¡Bajo él vive un [ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')]!», chilla mi [ROOT.Char.Custom2('RelationToMe', superstitious_traveler)], [superstitious_traveler.Custom('ES_ElLa')] [superstitious_traveler.GetTitledFirstName|l]. «Seguro que salta sobre nosotros o nos maldice cuando lo crucemos».\n\nLos miembros de mi grupo empiezan a susurrar entre ellos. Algunos invocan el nombre de [ROOT.Char.GetFaith.HighGodName] como protección. Por desgracia, este puente es el único lugar seguro para cruzar en kilómetros a la redonda."
 travel_events.5100.a: ""Não temo nem [ROOT.Char.GetCurrentLocation.Custom('GetProvinceTricksterSpirit')] nem demônio algum!""
 travel_events.5100.b: ""[superstitious_traveler.GetTitledFirstNameNoTooltip], esses seres não existem.""
 travel_events.5100.c: ""Devemos rezar para afastar esse espírito"."
 travel_events.5100.d: ""Que medo! Vamos procurar outro caminho.""
 custom.every_brave_or_impatient_entourage_member: "Todo membro do séquito de caráter [GetTrait('brave').GetName( GetNullCharacter )|l] ou [GetTrait('impatient').GetName( GetNullCharacter )|l]"
