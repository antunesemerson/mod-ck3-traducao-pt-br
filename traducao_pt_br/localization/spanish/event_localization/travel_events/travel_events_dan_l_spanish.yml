l_spanish:
 travel_danger_events.2000.t: "$travel_danger_prefix$ Os Olhos da Selva"
 travel_danger_events.2000.desc: "Algo me observa desde que pusemos os pés na selva de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]. Já vi o brilho dos olhos, ouvi o farfalhar das folhas.\n\nEle me segue, me espreita, #EMP me caça#!.\n\nOs homens que enviei para investigar não voltaram. Que criatura é essa que ronda as profundezas esmeraldas da selva?"
 travel_danger_events.2000.a: "Corte e queime, #EMP encontre-o#!."
 travel_danger_events.2000.b: "Eu odeio isso. Tire-me daqui."
 travel_danger_events.2000.c: "A única coisa a temer nesta selva sou eu!"
 travel_danger_events.2001.t: "$travel_danger_prefix$ A Enchente"
 travel_danger_events.2001.desc: "A chuva não deu trégua enquanto viajávamos por [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]. Eu vinha observando nervosamente o rio enquanto suas águas turvas inchavam cada vez mais, como uma bolha cheia de pus. \n\nMeu [ROOT.Char.Custom2('RelationToMe', flood_victim)] [flood_victim.GetFirstNameNoTooltip] reclama, mais uma vez: \"Faz dias que estamos marchando por este esgoto maldito, encharcado e afundado. Quando é que...?\"\n\nAntes que possa terminar a frase, a margem finalmente cede. Uma enxurrada de água espessa e escura avança em direção aos nossos suprimentos, e a [flood_victim.GetFirstNameNoTooltip]!"
 travel_danger_events.2001.a: "Salvem os suprimentos!"
 travel_danger_events.2001.b: "Salvem [flood_victim.GetFirstNameNoTooltip]!"
 burned_my_jungle_opinion: "Queimou Minha Selva"
 travel_lost_supplies: "Suprimentos Perdidos"
 travel_lost_supplies_desc: "Este personagem está sentindo os efeitos de perder suprimentos durante a viagem."
