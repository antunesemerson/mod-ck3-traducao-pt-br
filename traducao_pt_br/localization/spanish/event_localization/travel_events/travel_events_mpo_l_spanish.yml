l_spanish:
 travel_events_mpo.0001.t: "$travel_event_prefix$ A Revoada Dourada"
 travel_events_mpo.0001.desc: "O ar ao nosso redor já não está em silêncio. Ao olhar para cima, vejo algumas aves grandes circulando acima de nós, seus gritos ecoando pela estepe. [eagle_noticer.GetName] aponta que são águias-reais, uma visão rara nestas paragens.\n\n[eagle_noticer.GetSheHe|U] fala com entusiasmo sobre sua habilidade de caça e que muitos as mantêm como companheiras por toda a vida. [eagle_noticer.GetSheHe|U] até sugere que deveríamos tentar capturar uma, pois ela poderia ser muito útil para nós no futuro."
 travel_events_mpo.0001.a: "Mãos ágeis são tudo de que preciso."
 travel_events_mpo.0001.a_tt: "Você monta uma armadilha e espera o momento certo para capturar uma águia"
 travel_events_mpo.0001.b: "Temos alguns suprimentos sobrando para uma armadilha e isca..."
 travel_events_mpo.0001.b_tt: "Você monta uma armadilha e usa seus recursos para aumentar sua eficácia"
 travel_events_mpo.0001.c_noticer: "Por que você mesmo não faz isso, [huntsmaster.GetFirstNameNoTooltip]?"
 travel_events_mpo.0001.c_huntsmaster: "Confio essa tarefa a [huntsmaster.GetFirstNameNoTooltip]."
 travel_events_mpo.0001.c: "Um caçador pode cuidar disso."
 travel_events_mpo.0001.c_tt: "[huntsmaster.GetName] constrói uma armadilha e esperará em seu lugar"
 travel_events_mpo.0001.c_not: "Você não emprega um [GetCourtPositionType('master_of_hunt_court_position').GetName()|l] ou ele não faz parte da sua [entourage|lE]"
 travel_events_mpo.0001.d: "Vou capturar uma, como [eagle_childhood_teacher.GetName] me ensinou."
 travel_events_mpo.0001.e: "Isso é interessante, mas não preciso de um pássaro."
 travel_events_mpo.0001_win: "Você captura com sucesso uma águia dourada"
 travel_events_mpo.0001_lose: "As águias são cautelosas demais para suas tentativas"
 travel_events_mpo.0010.t: "$travel_event_prefix$ Sobre um Camelo Branco"
 travel_events_mpo.0010.desc: "No horizonte, uma mancha branca se destaca contra o pano de fundo da estepe. À medida que me aproximo, discerno a figura de um camelo branco, com sua pelagem reluzindo ao sol. Dezenas de ovelhas surgem da superfície, seguindo de perto atrás do camelo. Um[camel_rider.Custom('ES_XA')] [camel_rider.GetWomanMan] sobe nele de repente, e [camel_rider.GetSheHe] me saúda com um sorriso caloroso.\n\n\"A paz esteja convosco\", diz [camel_rider.GetSheHe]. \"Como podeis ver, Alá me abençoou abundantemente, e posso conceder este presente a outros. Gostaríeis de algo?\""
 travel_events_mpo.0010.a: "Eu poderia aproveitar parte de seu rebanho."
 travel_events_mpo.0010.a_flavor: "Você compra ovelhas de [camel_rider.GetName]"
 travel_events_mpo.0010.b: "Sua fé já é um presente por si só."
 travel_events_mpo.0010.b_islamic: "Que as bênçãos estejam sobre você, [Select_CString( camel_rider.IsFemale, 'minha amiga', 'meu amigo' )]."
 travel_events_mpo.0010.b_flavor: "Com o que Allah poderia me abençoar?"
 travel_events_mpo.0010.c: "Tomarei o que preciso à força."
 travel_events_mpo.0010.c_tt: "Você tenta roubar os bens de [camel_rider.GetName]"
 travel_events_mpo.0010_win: "Você derrota [camel_rider.GetHerHim]"
 travel_events_mpo.0010_lose: "[camel_rider.GetSheHe|U] o vence"
 mpo_islam_conversion_modifier: "Inquérito Islâmico"
 mpo_islam_conversion_modifier_desc: "Este personagem foi exposto aos ensinamentos do Islã e está considerando uma conversão.\n\nCusto para se converter a uma [faith|lE] [GetReligionByKey('islam_religion').GetAdjective]: #p -25%#!"
 faith_conversion_cost_mpo_islam_event: "[GetModifier('mpo_islam_conversion_modifier').GetNameWithTooltip]"
