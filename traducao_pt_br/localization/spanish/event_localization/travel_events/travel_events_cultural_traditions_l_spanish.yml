l_spanish:
 travel_events.1200.t: "Locais Amigáveis"
 travel_events.1200.desc: "Quando acampamos nos arredores de uma pequena aldeia em [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], os moradores vêm dar uma olhada na nossa caravana.\n\nA princípio, acho que querem negociar conosco, mas logo fica claro que vieram nos trazer presentes e aprender o máximo possível sobre a nossa cultura!\n\nUm morador em particular, [local_peasant.GetNameNoTooltip], tem um milhão de perguntas sobre de onde somos."
 travel_events.1200.a: "Devo conversar com eles e aprender mais."
 travel_events.1200.b: "Vamos aproveitar todos os benefícios que pudermos."
 tradition_travel_discount_desc: "Você experimentou esta Tradição Cultural durante a viagem."
 travel_events.1200.a.tt: "Reduz o custo de estabelecer a tradição [GetCultureTradition('tradition_xenophilic').GetName|l] em [prestige_i]#P [EmptyScope.ScriptValue('tradition_travel_discount')|-0] [prestige|lE]"
 travel_events.1201.t: "A Cavalaria Está Viva"
 travel_events.1201.desc: "Enquanto viajamos por [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]nos deparamos com alguns [GetPlayer.Custom('KnightCulturePlural')] de cultura [ROOT.Char.GetCurrentLocation.GetCulture.GetName]. São profundamente respeitosos e, ao que parece, grandes amantes da poesia, pois insistem em declamá-la sempre que podem.\n\nO código de conduta que seguem tem muitos méritos e não consigo deixar de admirá-lo. Um[local_knight.Custom('ES_OA')] de tais [GetPlayer.Custom('KnightCulturePlural')], [local_knight.GetNameNoTooltip] é particularmente impressionante."
 travel_events.1201.a: "Eu adoraria trazer essa tradição para casa."
 travel_events.1201.b: "Devo tentar ser mais pessoalmente cavalheiresco."
 travel_events.1201.a.tt: "Reduz o custo de estabelecer a tradição [GetCultureTradition('tradition_chivalry').GetName|l] em [prestige_i]#P [EmptyScope.ScriptValue('tradition_travel_discount')|-0] [prestige|lE]"
 travel_events.1202.t: "Trabalhadores Dedicados"
 travel_events.1202.desc: "Enquanto viajamos por [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] não consigo deixar de notar que toda a gente que vejo trabalha com uma intensidade silenciosa que não costumo perceber em minha própria terra.\n\nDetenho um [random_peasant.Custom('ES_OA')] dos trabalhadores e ele compartilha comigo esta sucinta pérola de sabedoria:\n\nO truque é arregaçar as mangas e não parar até o trabalho ficar bem feito."
 travel_events.1202.a: "Devo conversar com eles e aprender mais."
 travel_events.1202.b: "Talvez eu possa aplicar alguns desses princípios em casa."
 travel_events.1202.a.tt: "Reduz o custo de estabelecer a tradição [GetCultureTradition('tradition_hard_working').GetName|l] em [prestige_i]#P [EmptyScope.ScriptValue('tradition_travel_discount')|-0] [prestige|lE]"
 travel_events.1203.t: "Laços Fortes"
 travel_events.1203.desc: "Ao passar pelas aldeias de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], passo um tempo conversando com os habitantes locais. Uma coisa que se destaca é a intensa lealdade deles ao seu senhor.\n\nUm morador fala com tanta paixão que eu pensaria que ele estava descrevendo um amante em vez de seu governante."
 travel_events.1203.a: "Devo conversar com eles e aprender mais."
 travel_events.1203.b: "Farei meus súditos serem igualmente leais."
 travel_events.1203.a.tt: "Reduz o custo de estabelecer a tradição [GetCultureTradition('tradition_loyal_soldiers').GetName|l] de Soldados Leais em [prestige_i]#P [EmptyScope.ScriptValue('tradition_travel_discount')|-0] [prestige|lE]"
 travel_events.1204.t: "Discussão Civilizada"
 travel_events.1204.desc: "Enquanto viajo por [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], tenho a chance de observar alguns habitantes locais discutindo sobre quem é o dono de um determinado gado. Apesar do tópico da disputa parecer bastante sério, ambas as partes permanecem calmas e tranquilas, e ninguém recorre a agressões.\n\nImagine o que poderíamos realizar se tivéssemos esse nível de paz e razão em casa."
 travel_events.1204.a: "Devo conversar com eles e aprender mais."
 travel_events.1204.b: "Vou tentar esse pacifismo."
 travel_events.1204.a.tt: "Reduz o custo de estabelecer a tradição [GetCultureTradition('tradition_pacifism').GetName|l] em [prestige_i]#P [EmptyScope.ScriptValue('tradition_travel_discount')|-0] [prestige|lE]"
 travel_events.1205.t: "Vidas Simples"
 travel_events.1205.desc: "Ao viajar pelo [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip|l] de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], não posso deixar de notar o quão simples são as vestimentas, as moradias e até mesmo as expressões dos rostos dos habitantes locais [ROOT.Char.GetCurrentLocation.GetCulture.GetNameNoTooltip].\n\nNo entanto, ao perguntar sobre a pobreza desta área em particular, fui informado de que tudo isso é uma escolha e eles estão mais focados em questões práticas do que em aparências."
 travel_events.1205.a: "Poderíamos aprender algo com isso em casa."
 travel_events.1205.b: "Devo tentar viver de forma simples."
 travel_events.1205.a.tt: "Reduz o custo de estabelecer a tradição [GetCultureTradition('tradition_spartan').GetName|l] em [prestige_i]#P [EmptyScope.ScriptValue('tradition_travel_discount')|-0] [prestige|lE]"
 travel_events.1206.t: "Alegria da Caçada"
 travel_events.1206.desc: "Ao viajar pelo [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip|l] de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], deparo-me com um grupo de caçadores. Eles me permitem acompanhar a caçada por um tempo, apontando algumas técnicas específicas e algumas pistas de rastreamento únicas desta área."
 travel_events.1206.a: "Por que meu povo não pode ser mais assim?"
 travel_events.1206.b: "Talvez eles possam me treinar?"
 travel_events.1206.c: "![GetPlayer.Custom('ES_ElLa')|U] caçador[GetPlayer.Custom('ES_XA')] sou eu!"
 travel_events.1206.a.tt: "Reduz o custo de estabelecer a tradição [GetCultureTradition('tradition_hunters').GetName|l] em [prestige_i]#P [EmptyScope.ScriptValue('tradition_travel_discount')|-0] [prestige|lE]"
 travel_events.1207.t: "Carne da Terra"
 travel_events.1207.desc: "Enquanto viajo por [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], um dos anciãos da vila nos para e insiste que nos juntemos para uma refeição. Enquanto como, percebo que nem um pedaço é feito de carne. O ancião fica feliz em entrar em detalhes sobre como é feito, os ingredientes usados e como eles realmente não comem carne."
 travel_events.1207.a: "Eu quero algumas receitas!"
 travel_events.1207.b: "Talvez uma segunda porção?"
 travel_events.1207.a.tt: "Reduz o custo de estabelecer a tradição [GetCultureTradition('tradition_vegetarianism').GetName|l] em [prestige_i]#P [EmptyScope.ScriptValue('tradition_travel_discount')|-0] [prestige|lE]"
 travel_events.1208.t: "Navegação Marítima"
 travel_events.1208.desc: "Enquanto navego por [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], ancoramos para conversar com um barco cheio de habitantes locais. O que deveria ser uma parada rápida acaba sendo uma longa discussão sobre nós, correntes locais e navegação geral.\n\n\"Bem, você vê, o albatroz é o rei de todas as aves, e matá-lo bem. Isso é o maior de todos os crimes.\""
 travel_events.1208.a: "Deveríamos conversar com eles e aprender mais."
 travel_events.1208.b: "Chega de ouvir, hora de aplicar esse conhecimento."
 travel_events.1208.a.tt: "Reduz o custo de estabelecer a tradição [GetCultureTradition('tradition_seafaring').GetName|l] em [prestige_i]#P [EmptyScope.ScriptValue('tradition_travel_discount')|-0] [prestige|lE]"
 travel_events.1209.t: "A História Está na Narrativa"
 travel_events.1209.desc: "Os contadores de histórias [ROOT.Char.GetCurrentLocation.GetCulture.GetNameNoTooltip] de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] são muito renomados e, quando finalmente os conheço, eles não decepcionam!\n\nPassamos muitas horas sentados ao redor do fogo ouvindo suas histórias e é uma verdadeira alegria ouvi-los falar."
 travel_events.1209.a: "Devo incentivar mais narrativas em casa."
 travel_events.1209.b: "Se você gosta de histórias, vai adorar esta."
 travel_events.1209.a.tt: "Reduz o custo de estabelecer a tradição [GetCultureTradition('tradition_storytellers').GetName|l] em [prestige_i]#P [EmptyScope.ScriptValue('tradition_travel_discount')|-0] [prestige|lE]"
 travel_events.1210.t: "Música [ROOT.Char.GetCurrentLocation.GetCulture.GetNameNoTooltip]"
 travel_events.1210.desc: "Enquanto viajo pelo [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip|l] de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], ouço uma melodia flutuando suavemente pela paisagem.\n\nUma rápida diversão fora do caminho me leva a um grupo de músicos tocando com todo o coração o que deve ser alguma música local [ROOT.Char.GetCurrentLocation.GetCulture.GetNameNoTooltip]. Parando para ouvir a bela música, sinto meu coração se enchendo de alegria."
 travel_events.1210.a: "Deveríamos levar essa tradição para casa."
 travel_events.1210.b: "Eu quero aprender a tocar!"
 travel_events.1210.a.tt: "Reduz o custo de estabelecer a tradição [GetCultureTradition('tradition_music_theory').GetName|l] em [prestige_i]#P [EmptyScope.ScriptValue('tradition_travel_discount')|-0] [prestige|lE]"
 travel_events.1211.t: "Povo da Poesia"
 travel_events.1211.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], [ROOT.Char.Custom('FormOfAddressForLiege')], por favor, um momento do seu tempo para ouvir meu mais recente poema!".\n\nEsta não é a primeira pessoa [ROOT.Char.GetCurrentLocation.GetCulture.GetNameNoTooltip] que tentou me apresentar sua poesia e, considerando o caminho que tenho pela frente, certamente não será a última. Deve haver uma verdadeira obsessão por poesia aqui, já que todo sonhador tem um poema no coração."
 travel_events.1211.a: "Deveríamos conversar com eles e aprender mais."
 travel_events.1211.b: "Eu gostaria de fazer uma tentativa."
 travel_events.1211.c: "Você chama isso de poesia?"
 travel_events.1211.a.tt: "Reduz o custo de estabelecer a tradição [GetCultureTradition('tradition_poetry').GetName|l] em [prestige_i]#P [EmptyScope.ScriptValue('tradition_travel_discount')|-0] [prestige|lE]"
 travel_events.1212.t: "Amigos da Pesca"
 travel_events.1212.desc: "Não passa um dia em [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]sem que eu encontre um pescador com uma nova informação para me dar, seja sobre qual tipo de isca usar, onde pescar ou até mesmo como preparar o peixe depois de pescá-lo.\n\nAté tenho a chance de pescar eu mesm[ROOT.Char.Custom('ES_OA')]com os pescadores, que me mostram suas dicas e truques. Todos aplaudem quando finalmente pesco um."
 travel_events.1212.a: "Deveríamos conversar com eles e aprender mais."
 travel_events.1212.b: "E se aplicássemos essas táticas de pesca à navegação marítima?"
 travel_events.1212.a.tt: "Reduz o custo de estabelecer a tradição [GetCultureTradition('tradition_fishermen').GetName|l] em [prestige_i]#P [EmptyScope.ScriptValue('tradition_travel_discount')|-0] [prestige|lE]"
 travel_events.1213.t: "Viajantes Místicos"
 travel_events.1213.desc: "Os místicos estão por toda parte aqui em [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]: eles pregam e compartilham seu conhecimento.\n\nUm dia, entro em uma conversa bastante profunda sobre o significado da vida com um deles enquanto espero que uma pedra seja removida do caminho."
 travel_events.1213.a: "Estou mais interessado em conhecer seu povo."
 travel_events.1213.b: "Que sabedoria você pode compartilhar comigo?"
 travel_events.1213.a.tt: "Reduz o custo de estabelecer a tradição [GetCultureTradition('tradition_mendicant_mystics').GetName|l] em [prestige_i]#P [EmptyScope.ScriptValue('tradition_travel_discount')|-0] [prestige|lE]"
 travel_events.1214.t: "Guerreiros Respeitados"
 travel_events.1214.desc: "Durante minhas viagens, percebi que os locais da cultura [ROOT.Char.GetCurrentLocation.GetCulture.GetNameNoTooltip] aqui em [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] valorizam os guerreiros acima de tudo.\n\nAs disputas são resolvidas com violência e aqueles que colocam a vida em risco pelo seu reino são considerados os mais corajosos. Passei grande parte de uma tarde discutindo com eles alguns pontos finos de sua cultura guerreira."
 travel_events.1214.a: "Deveríamos conversar com eles e aprender mais."
 travel_events.1214.b: "Você pode me mostrar alguns movimentos?"
 travel_events.1214.a.tt: "Reduz o custo de estabelecer a tradição [GetCultureTradition('tradition_warrior_culture').GetName|l] em [prestige_i]#P [EmptyScope.ScriptValue('tradition_travel_discount')|-0] [prestige|lE]"
 travel_events.1215.t: "O Admirável [GetPlayer.Custom('KnightCultureNoTooltip')|U]"
 travel_events.1215.desc: "Paramos para descansar uma noite em uma taverna e, enquanto me sento num canto apreciando tranquilamente a música [ROOT.Char.GetCurrentLocation.GetCulture.GetNameNoTooltip] , a porta se escancara e surge uma silhueta enorme.\n\nEntra um[GetPlayer.Custom('ES_XA')] [GetPlayer.Custom('KnightCultureNoTooltipLowercase')] e o ambiente muda imediatamente. As pessoas baixam a cabeça em reverência, algumas desmaiam e o taverneiro imediatamente serve bebidas grátis aparentemente famos[GetPlayer.Custom('ES_AlAla')] [GetPlayer.Custom('KnightCultureNoTooltipLowercase')] [GetPlayer.Custom('ES_OA')].\n\nSerá que ser [GetPlayer.Custom('KnightCultureNoTooltipLowercase')] é mesmo tão especial aqui?"
 travel_events.1215.a: "Devo descobrir por que eles os consideram tão altamente."
 travel_events.1215.b: "Eu posso ser assim se treinar!"
 travel_events.1215.a.tt: "Reduz o custo de estabelecer a tradição [GetCultureTradition('tradition_martial_admiration').GetName|l] em [prestige_i]#P [EmptyScope.ScriptValue('tradition_travel_discount')|-0] [prestige|lE]"
 travel_events.1216.t: "Pensadores Viajantes"
 travel_events.1216.desc: "Uma coisa de que percebo ao passar por [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] é que todos os outros viajantes de língua [ROOT.Char.GetCurrentLocation.GetCulture.GetNameNoTooltip] dizem ser filósofos.\n\nNo começo, fico um tanto cético, mas depois de ter sido superad[GetPlayer.Custom('ES_OA')] em minha terceira conversa consecutiva, começo a pensar que talvez haja algo de certo em suas afirmações.\n\n[local_philosopher.Custom('ES_ElLa')|U] últim[local_philosopher.Custom('ES_OA')] filósof[local_philosopher.Custom('ES_OA')], [local_philosopher.GetNameNoTooltip], praticamente ri das minhas tentativas mais recentes de argumentação lógica."
 travel_events.1216.a: "Devo aprender mais sobre como funciona sua cultura."
 travel_events.1216.b: "O que posso aprender pessoalmente?"
 travel_events.1216.a.tt: "Reduz o custo de estabelecer a tradição [GetCultureTradition('tradition_philosopher_culture').GetName] em [prestige_i]#P [EmptyScope.ScriptValue('tradition_travel_discount')|-0] [prestige|lE]"
