l_spanish:
 #Travel Danger Events
 #Land: Beast of the wild
 travel_danger_events.6000.t: "$travel_danger_prefix$ Uma Fera Temível!"
 travel_danger_events.6000.desc: "Caminhamos pela [ROOT.Char.GetCurrentLocation.Custom('GetTerrainType')] em um bom ritmo, desfrutando de um ambiente tranquilo. Tenho certeza[ROOT.Char.Custom('ES_OA')] de vislumbrar pelo canto do olho o/a [ROOT.Char.Custom('GetAnimalFeature')] de…! Seu alto [ROOT.Char.Custom('GetAnimalSound')] o confirma, é um/a [ROOT.Char.Custom('GetAnimalType')]!"
 travel_danger_events.6000.desc.again: "Piso na trilha [ROOT.Char.GetCurrentLocation.Custom('GetTerrainType')] lentamente, cauteloso após meu encontro recente com uma fera selvagem. Meu coração afunda quando ouço um [ROOT.Char.Custom('GetAnimalSound')] no [ROOT.Char.GetCurrentLocation.Custom('GetProvinceFoliageDesc')] — [ROOT.Char.GetFaith.FateGodName] zomba de mim! [ROOT.Char.Custom('GetAnimalType')]!"
 travel_danger_events.6000.desc.seriously: "Marcados por nossa recente desgraça, percorremos os caminhos dos/as [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] com extrema cautela. Justo quando começo a relaxar, uma espécie de [ROOT.Char.Custom('GetAnimalSound')] surge de entre [ROOT.Char.GetCurrentLocation.Custom('GetProvinceFoliageDesc')]! Um maldito exemplar de [ROOT.Char.Custom('GetAnimalType')]!"
 travel_danger_events.6000.body: "\n\nA fera [ROOT.Char.Custom('GetAnimalColor')] [ROOT.Char.Custom('GetAnimalChargePresent')] sobre a trilha, suas grandes [ROOT.Char.Custom('GetAnimalTrackPlural')] levantando [ROOT.Char.GetCurrentLocation.Custom('GetProvinceGroundDesc')]. Ladeada por árvores [ROOT.Char.GetCurrentLocation.Custom('GetRandomAppropriateTree')] aleatórias, ela bloqueia completamente nosso caminho para [destination.GetBaronyNameExplicitlyNoTooltip]."
 travel_danger_events.6000.victim: "\n\n[beast_victim.GetFirstName] sussurra: \"Olhem só para esses #EMP [ROOT.Char.Custom('GetAnimalDanger')]#!…"
 travel_danger_events.6000.a: "Dêem licença, vou cuidar disso!"
 travel_danger_events.6000.a_again: "Vou te enviar para se juntar ao outro!"
 travel_danger_events.6000.a_seriously: "Deixem-me #EMP PASSAR#!!"
 travel_danger_events.6000.a.wounded.t: "Salvo, mas ferido"
 travel_danger_events.6000.a.wounded.desc: "A tripulação salva [overboard_character.GetShortUIName] , porém ficou ferid[overboard_character.Custom('ES_OA')] na queda."
 travel_danger_events.6000.b: "Mate isso, [beast_victim.GetFirstNameNoTooltip]! Agora!"
 travel_danger_events.6000.b_again: "É sua vez, [beast_victim.GetFirstNameNoTooltip]!"
 travel_danger_events.6000.b_seriously: "Essa é #EMP sua#!, [beast_victim.GetFirstNameNoTooltip]!"
 travel_danger_events.6000.b_travel_leader: "[travel_leader.GetFirstNameNoTooltip], faça alguma coisa!"
 travel_danger_events.6000.c: "#EMP FUJAM#!! FUJAM PELAS SUAS #EMP VIDAS#!!"
 travel_danger_events.6000.success: "O exemplar de [ROOT.Char.Custom('GetAnimalType')] morre pelas mãos de [Select_CString(beast_victim.IsLocalPlayer, 'você', beast_victim.GetShortUINameNoTooltipNoFormat)]"
 travel_danger_events.6000.wound: "O exemplar de [ROOT.Char.Custom('GetAnimalType')] [Select_CString( beast_victim.IsLocalPlayer, 'te destroza', 'destroza a ' )][Select_CString( beast_victim.IsLocalPlayer, '', beast_victim.GetShortUINameNoTooltipNoFormat )]"
 travel_danger_events.6000.failure: "O exemplar de [ROOT.Char.Custom('GetAnimalType')] mata [Select_CString( beast_victim.IsLocalPlayer, 'seu personagem', beast_victim.GetShortUINameNoTooltipNoFormat )]"
 travel_danger_events.6000.success_root: "O exemplar de [ROOT.Char.Custom('GetAnimalType')] morre pelas mãos de [Select_CString(root_scope.IsLocalPlayer, 'você', root_scope.GetShortUINameNoTooltipNoFormat)]"
 travel_danger_events.6000.wound_root: "O espécime de [ROOT.Char.Custom('GetAnimalType')] [Select_CString( root_scope.IsLocalPlayer, 'te destroza', 'destroza a ' )][Select_CString( root_scope.IsLocalPlayer, '', root_scope.GetShortUINameNoTooltipNoFormat )]"
 travel_danger_events.6000.failure_root: "O espécime de [ROOT.Char.Custom('GetAnimalType')] mata [Select_CString( root_scope.IsLocalPlayer, 'seu personagem', root_scope.GetShortUINameNoTooltipNoFormat )]"
 travel_danger_events.6010.t: "$travel_danger_prefix$ Fumaça à Frente"
 travel_danger_events.6010.raid: "Ao nos aproximarmos de [ROOT.Char.GetCurrentLocation.GetBaronyNameExplicitlyNoTooltip], colunas de fumaça e grupos de camponeses passando deixam claro que o lugar está sendo saqueado. Os fortes podem pegar o que quiserem...\n\n"
 travel_danger_events.6010.siege: "Um acampamento de cerco domina as redondezas de [ROOT.Char.GetCurrentLocation.GetBaronyNameExplicitlyNoTooltip], as cores [siege_owner.GetPrimaryTitle.GetAdjectiveNoTooltip] tremulando languidamente, prenúncios de uma [siege_war.Custom('WarCasusBelliShort')|l].\n\n"
 travel_danger_events.6010.victim: "Dói-me ver minhas terras devastadas assim, mas esta não é uma luta que posso vencer."
 travel_danger_events.6010.owner: "Minhas forças devem dar conta facilmente do patético exemplo de [siege_victim.Custom('FortifiedBuilding')] [siege_victim.Custom('ES_DelDela')] [siege_victim.GetTitledFirstName|l]."
 travel_danger_events.6010.war_owner: "Com um pouco de sorte, os atacantes triunfarão e arrastarão [siege_victim.Custom('ES_AlAla')] [siege_victim.GetTitledFirstName|l] para fora aos gritos e esperneando."
 travel_danger_events.6010.war_victim: "Se eu ao menos pudesse fazer algo para ajudar [siege_victim.Custom('ES_AlAla')] [siege_victim.GetTitledFirstName|l] e nos livrarmos desse[siege_owner.Custom('ES_EA')] maldito[siege_owner.Custom('ES_OA')] [siege_owner.GetTitledFirstName|l]."
 travel_danger_events.6010.ally_owner: "Tenho certeza de que meu aliado será vindicado[siege_owner.Custom('ES_OA')] e colocará em seu devido lugar [siege_victim.Custom('ES_OA')] [siege_victim.Custom('ES_AlAla')][siege_victim.GetTitledFirstName|l]."
 travel_danger_events.6010.ally_victim: "Só posso assistir enquanto as possessões do meu aliado[siege_victim.Custom('ES_OA')]; [siege_victim.Custom('ES_ElLa')] [siege_victim.GetTitledFirstName|l], são lentamente, mas com certeza, devastadas."
 travel_danger_events.6010.relation_owner: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('siege_owner'))|l], [siege_owner.Custom('ES_ElLa')] [siege_owner.GetTitledFirstName|l], está claramente decidido[siege_owner.Custom('ES_OA')] a derrubar [siege_victim.Custom('ES_ElLa')] [siege_victim.GetTitledFirstName|l] a qualquer custo."
 travel_danger_events.6010.relation_victim: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('siege_victim'))|l], [siege_victim.Custom('ES_ElLa')] [siege_victim.GetTitledFirstName|l], está claramente com dificuldades para defender este lugar contra as forças de [siege_owner.Custom('ES_DelDela')] [siege_owner.GetTitledFirstName|l]."
 travel_danger_events.6010.sieger_liege: "Meu vassalo[siege_owner.Custom('ES_OA')], [siege_owner.Custom('ES_ElLa')] [siege_owner.GetTitledFirstName|l], está claramente decidido[siege_owner.Custom('ES_OA')] a acabar com [siege_victim.Custom('ES_ElLa')] [siege_victim.GetTitledFirstName|l] custe o que custar."
 travel_danger_events.6010.peace: "Esta pequena altercação entre [siege_owner.Custom('ES_ElLa')] [siege_owner.GetTitledFirstName|l] e [siege_victim.Custom('ES_ElLa')] [siege_victim.GetTitledFirstName|l] é certamente um transtorno."
 travel_danger_events.6010.raid_end: "Entre as cabanas em chamas, figuras vasculham as ruínas, comparando o saque e trocando histórias de coragem.\n\nUm grupo de saqueadores mal-humorados e esfarrapados está vindo pela trilha - eles não parecem ser o tipo mais brilhante, ou honesto..."
 travel_danger_events.6010.siege_end: "No meio dos [siege_owner.Custom('RegionalArtilleryPlural')|l], soldados distantes se aquecem em fogueiras modestas de acampamento.\n\n$travel_danger_events.6010.closing$"
 travel_danger_events.6010.closing: "Um grupo de soldados mal-humorados e esfarrapados está vindo pela trilha - eles não parecem ser o tipo mais brilhante, ou honesto..."
 travel_danger_events.6010.a: "Vamos nos misturar com os camponeses..."
 travel_danger_events.6010.a.success: "Você passa despercebid[ROOT.Char.Custom('ES_OA')]"
 travel_danger_events.6010.a.failure: "Eles percebem sua elegância"
 travel_danger_events.6010.capture_toast: "Viajante Capturado"
 travel_danger_events.6010.b: "Sou [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitledFirstNameNoTooltip|l]! Eles nos deixarão passar."
 travel_danger_events.6010.b.friend: "Levem-me até [siege_commander.Custom('ES_ElLa')] [siege_commander.GetTitledFirstNameNoTooltip|l]. Somos bons amigos."
 travel_danger_events.6010.b.flavor: "#EMP Você tem#! alguma #EMP ideia de quem eu sou?!#!"
 travel_danger_events.6010.b.success: "Sua posição os confunde"
 travel_danger_events.6010.b.failure: "Eles não se impressionam"
 travel_danger_events.6010.c: "Uma demonstração de força os deterá."
 travel_danger_events.6010.c.success: "Você fica sozinh[ROOT.Char.Custom('ES_OA')]"
 travel_danger_events.6010.c.failure: "Eles desafiam você"
 travel_danger_events.6010.c.wound: "Um membro aleatório do séquito está ferido"
 travel_danger_events.6010.d: "Eles só precisam ser comprados."
 travel_danger_events.6011.t: "$travel_danger_prefix$ Batalha à Frente"
 travel_danger_events.6011.intro: "Os avisos dos moradores assustados mal são necessários, está claro que uma batalha está acontecendo à frente; destroços da guerra, vítimas e acampamentos improvisados estão por toda parte.\n\n"
 travel_danger_events.6011.battle_both: "Exércitos que carregam as cores dos meus inimigos, [battle_owner_1.Custom('ES_ElLa')] [battle_owner_1.GetTitledFirstName|l] e [battle_owner_2.Custom('ES_ElLa')] [battle_owner_2.GetTitledFirstName|l], $travel_danger_events.6011.clash$"
 travel_danger_events.6011.war_battle_1: "Exércitos que carregam os estandartes do meu inimig[battle_owner_1.Custom('ES_OA')], [battle_owner_1.Custom('ES_ElLa')] [battle_owner_1.GetTitledFirstName|l], e [battle_owner_2.Custom('ES_ElLa')] [battle_owner_2.GetTitledFirstName|l] $travel_danger_events.6011.clash$"
 travel_danger_events.6011.war_battle_2: "Exércitos que portam os estandartes do meu inimig[battle_owner_2.Custom('ES_OA')], [battle_owner_2.Custom('ES_ElLa')] [battle_owner_2.GetTitledFirstName|l], e [battle_owner_1.Custom('ES_ElLa')] [battle_owner_1.GetTitledFirstName|l] $travel_danger_events.6011.clash$"
 travel_danger_events.6011.ally_battle_1: "Exércitos que carregam os estandartes do meu aliad[battle_owner_1.Custom('ES_OA')], [battle_owner_1.Custom('ES_ElLa')] [battle_owner_1.GetTitledFirstName|l], e [battle_owner_2.Custom('ES_ElLa')] [battle_owner_2.GetTitledFirstName|l] $travel_danger_events.6011.clash$"
 travel_danger_events.6011.ally_battle_2: "Exércitos que portam os estandartes do meu aliad[battle_owner_2.Custom('ES_OA')], [battle_owner_2.Custom('ES_ElLa')] [battle_owner_2.GetTitledFirstName|l], e [battle_owner_1.Custom('ES_ElLa')] [battle_owner_1.GetTitledFirstName|l] $travel_danger_events.6011.clash$"
 travel_danger_events.6011.relation_battle_1: "Exércitos que carregam os estandartes do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('battle_owner_1'))] , [battle_owner_1.Custom('ES_ElLa')] [battle_owner_1.GetTitledFirstName|l] e [battle_owner_2.Custom('ES_ElLa')] [battle_owner_2.GetTitledFirstName|l] $travel_danger_events.6011.clash$"
 travel_danger_events.6011.relation_battle_2: "Exércitos que portam os estandartes do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('battle_owner_2'))], [battle_owner_1.Custom('ES_ElLa')] [battle_owner_1.GetTitledFirstName|l], e [battle_owner_2.Custom('ES_ElLa')] [battle_owner_2.GetTitledFirstName|l] $travel_danger_events.6011.clash$"
 travel_danger_events.6011.peace: "Exércitos carregando as cores [battle_owner_1.GetPrimaryTitle.GetAdjectiveNoTooltip] e [battle_owner_2.GetPrimaryTitle.GetAdjectiveNoTooltip] $travel_danger_events.6011.clash$"
 travel_danger_events.6011.clash: "colidem nos distantes [ROOT.Char.GetCurrentLocation.Custom('GetTerrainLandPlural')],"
 travel_danger_events.6011.war: "acertando suas [battle_war.Custom('WarCasusBelliShort')]."
 travel_danger_events.6011.raid_both: "lutando por pedaços de saque."
 travel_danger_events.6011.raid: "um para saquear, e outro para guardar."
 travel_danger_events.6011.hostile: "resolvendo alguma disputa trivial."
 travel_danger_events.6011.end: "\n\nUm grupo desanimado - desertores talvez, ou mercenários - estão saindo sorrateiramente e vindo diretamente na nossa direção."
 travel_danger_events.6011.b: "Não mexerão com um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]!"
 travel_danger_events.6011.d: "O ouro é sua única linguagem."
 travel_danger_events.6012.t: "$travel_danger_prefix$ Passagem da Guerra"
 travel_danger_events.6012.intro: "As estradas estão movimentadas com as carroças e reforços de um exército que passa. Ao longe, bandeiras coloridas de [army_owner.GetPrimaryTitle.GetAdjectiveNoTooltip] brilham ao sol, fazendo um progresso lento através dos [ROOT.Char.GetCurrentLocation.Custom('GetTerrainLandPlural')].\n\n"
 travel_danger_events.6012.war: "A visão da hoste do meu inimig[army_owner.Custom('ES_OA')], [army_owner.Custom('ES_ElLa')] [army_owner.GetTitledFirstName|l], me enche de medo,"
 travel_danger_events.6012.ally: "A visão da hoste do meu aliad[army_owner.Custom('ES_OA')], [army_owner.Custom('ES_ElLa')] [army_owner.GetTitledFirstName|l], é muito bem-vinda,"
 travel_danger_events.6012.relation: "A visão da hoste do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('army_owner'))] [army_owner.Custom('ES_ElLa')] [army_owner.GetTitledFirstName|l], me faz hesitar,"
 travel_danger_events.6012.peace: "A visão deste exército preocupa o grupo,"
 travel_danger_events.6012.clash: "colidindo nos distantes [ROOT.Char.GetCurrentLocation.Custom('GetTerrainLandPlural')],"
 travel_danger_events.6012.raid: "a caminho de saquear alguma vila infeliz."
 travel_danger_events.6012.other: "conforme ele segue em direção a algum objetivo distante."
 travel_danger_events.6012.end: "\n\nUm grupo de soldados desgrenhados está vindo na direção oposta. Eles têm a aparência de desertores."
 travel_danger_events.6013.t: "$travel_danger_prefix$ Terreno Contestado"
 travel_danger_events.6013.intro: "As cicatrizes da guerra estão por toda parte ao passarmos por [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], onde as bandeiras foram substituídas apressadamente pelas cores [occupy_owner.GetPrimaryTitle.GetAdjectiveNoTooltip].\n\n"
 travel_danger_events.6013.war_owner: "É evidente que meu inimig[occupy_owner.Custom('ES_OA')], [occupy_owner.Custom('ES_ElLa')] [occupy_owner.GetTitledFirstName|l], tem ganhado terreno contra [occupy_victim.Custom('ES_AlAla')] [occupy_victim.GetTitledFirstName|l],"
 travel_danger_events.6013.war_victim: "Está evidente que meu inimig[occupy_victim.Custom('ES_OA')], [occupy_victim.Custom('ES_ElLa')] [occupy_victim.GetTitledFirstName|l], sofreu alguns reveses diante de [occupy_owner.Custom('ES_AlAla')] [occupy_owner.GetTitledFirstName|l],"
 travel_danger_events.6013.ally_owner: "É evidente que meu aliad[occupy_owner.Custom('ES_OA')], [occupy_owner.Custom('ES_ElLa')] [occupy_owner.GetTitledFirstName|l], tem estado avançando contra [occupy_victim.Custom('ES_AlAla')] [occupy_victim.GetTitledFirstName|l],"
 travel_danger_events.6013.ally_victim: "É evidente que minha aliad[occupy_victim.Custom('ES_OA')], [occupy_victim.Custom('ES_ElLa')] [occupy_victim.GetTitledFirstName|l], sofreu alguns reveses contra [occupy_owner.Custom('ES_AlAla')] [occupy_owner.GetTitledFirstName|l],"
 travel_danger_events.6013.relation_owner: "É evidente que meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('occupy_owner'))] , [occupy_owner.Custom('ES_ElLa')] [occupy_owner.GetTitledFirstName|l], tem claramente obtido vantagens contra [occupy_victim.Custom('ES_AlAla')] [occupy_victim.GetTitledFirstName|l],"
 travel_danger_events.6013.relation_victim: "É evidente que meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('occupy_victim'))] [occupy_victim.GetTitledFirstName|l], sofreu alguns reveses diante de [occupy_owner.Custom('ES_AlAla')] [occupy_owner.GetTitledFirstName|l],"
 travel_danger_events.6013.peace: "Tivemos a sorte de não presenciar o conflito em si, pelo menos"
 travel_danger_events.6013.war: "embora a [occupy_war.Custom('WarCasusBelliShort')|l] continue em outro lugar."
 travel_danger_events.6013.hostile: "embora, quem sabe o resultado final."
 travel_danger_events.6013.end: "\n\nÀ medida que continuamos em direção a [destination.GetNameNoTooltip], um grupo temível de veteranos se aproxima na direção oposta."
 regional_artillery_bombard: "bombardeio"
 regional_artillery_bombard_plural: "bombardeios"
 regional_artillery_trebuchet: "trabuco"
 regional_artillery_trebuchet_plural: "trabucos"
 regional_artillery_mangonel: "manganel"
 regional_artillery_mangonel_plural: "manganeis"
 regional_artillery_onager: "ônagro"
 regional_artillery_onager_plural: "ônagros"
 regional_ship_knarr: "knarr"
 regional_ship_knarr_plural: "knarrs"
 regional_ship_longship: "navio longo"
 regional_ship_longship_plural: "navios longos"
 regional_ship_galley: "galé"
 regional_ship_galley_plural: "galés"
 regional_ship_dromon: "dromon"
 regional_ship_dromon_plural: "dromons"
 regional_ship_cog: "coca"
 regional_ship_cog_plural: "cocas"
 regional_ship_fallback: "navio"
 regional_ship_fallback_plural: "navios"
 travel_danger_events.6020.t: "$travel_danger_prefix$ Perigos do Profundo"
 travel_danger_events.6020.desc: "Nuvens carregadas se erguem sobre nós e sinto medo por trás das palavras tranquilizadoras do capitão. Uma terrível borrasca logo nos envolve, açoitando os conveses com uma chuva violenta enquanto [ROOT.Char.Custom('RegionalShipType')] se balança como um brinquedo.\n\nUm estalo terrível, mais alto que o trovão, como se o próprio mundo fosse rasgado em duas por algum gigante horrível, perfura nossos ouvidos enquanto a embarcação se verga sob nossos pés.\n\n"
 travel_danger_events.6020.hugger: "[hugger.Custom('ES_ElLa')|U] [hugger.GetTitledFirstName|l] e eu nos agarramos em terror, olhando de olhos arregalados enquanto uma enorme onda se lança contra o navio!"
 travel_danger_events.6020.prayer: "Vejo [prayer.Custom('ES_AlAla')] [prayer.GetTitledFirstName|l] ajoelhar-se com os braços estendidos para o céu rasgado por relâmpagos, gritando \"[prayer.GetFaith.HighGodName]! [prayer.GetFaith.WaterGodName]! Salvem-nos!\" enquanto uma enorme vaga varre o convés!"
 travel_danger_events.6020.diver: "[diver.Custom('ES_ElLa')|U] [diver.GetTitledFirstName|l] agarra as têmporas, gritando \"O horror [diver.GetFaith.DevilNamePossessive] vem nos buscar! Não há escapatória!\" antes de se lançar na enorme onda que se abate sobre o navio."
 travel_danger_events.6020.director: "Observo com espanto como [director.Custom('ES_ElLa')] [director.GetTitledFirstName|l] se ergue firme, gritando ordens que ninguém pode ouvir, alhe[director.Custom('ES_OA')] à grande onda que estava prestes a engolir[director.GetHerHim]!"
 travel_danger_events.6020.fallback: "Me espremo em um canto, observando horrorizado enquanto marinheiros são lançados nas profundezas escuras e uma enorme onda engole o navio."
 travel_danger_events.6020.a: "ArghghghGHHghghh!"
 travel_danger_events.6030.t: "$travel_danger_prefix$ Provisões Problemáticas"
 travel_danger_events.6030.leader: "[travel_leader.GetFirstName] está encarregado de nossos suprimentos de comida e revelou timidamente que nossas provisões agora estão quase todas inutilizáveis, devido ao armazenamento inadequado..."
 travel_danger_events.6030.fallback: "Mal posso acreditar, mas nossos suprimentos de comida para a viagem estão praticamente inúteis, pois foram mal armazenados..."
 travel_danger_events.6030.desc: "\n\nPedaços de mofo cobrem o pão e os vegetais, e rapidamente consumimos os alimentos secos restantes. O grupo começa a sentir fome enquanto o crepúsculo começa a cair."
 travel_danger_events.6030.a: "É apenas um pouco de mofo!"
 travel_danger_events.6030.b: "A natureza nos proverá!"
 travel_danger_events.6030.b.success: "Você encontra algum alimento"
 travel_danger_events.6030.b.failure: "Você não encontra nada"
 travel_danger_events.6030.b.critical: "Você come a planta errada"
 travel_danger_events.6030.b.death: "Você come a pior planta"
 travel_danger_events.6030.c: "La gente de aquí debe de tener #EMP algo#!."
 travel_danger_events.6030.d: "Teremos que substituir tudo."
 travel_danger_events.6040.t: "$travel_danger_prefix$ Debaixo do Tempo"
 travel_danger_events.6040.wet: "Nossa passagem por este maldito [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] tem sido tensa, fraturando os nervos e a energia enquanto avançamos pelo úmido pegajoso, espantando insetos e tentando ficar secos."
 travel_danger_events.6040.war: "Os [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] estão marcados pela guerra, espalhados com suas vítimas e os acampamentos de seus agentes. As condições são terríveis, e nossos encontros com soldados são frequentes."
 travel_danger_events.6040.desc: "\n\nComeço a me sentir fraco. Vou ficando para trás em relação ao grupo quando normalmente é eu quem dita o ritmo… Algo está errado…"
 travel_danger_events.6040.a: "Preciso voltar."
 travel_danger_events.6040.b: "Agradeço a [ROOT.Char.GetFaith.HealthGodName] que o $court_physician_court_position$ está aqui."
 travel_danger_events.6040.c: "Devemos continuar pressionando..."
 travel_stealing_food_modifier: "Provisões Roubadas"
 travel_stealing_food_modifier_desc: "Nobres que viajaram por este condado se serviram dos produtos de seus súditos."
