l_spanish:
 ### Dying Embers
 travel_events_fp3.0010.t: "Brasas Moribundas"
 travel_events_fp3.0010.desc.intro: "Enquanto minha comitiva avança por uma tempestade repentina, vejo um grupo de magos armados caminhando na direção oposta. Eles carregam um palanquim com uma braseira de brasas moribundas entre eles. O vento e a chuva estão atingindo as chamas sagradas, arriscando apagá-las.\n\nEmbora suas mãos pairam cansadas sobre suas armas, os sacerdotes nos chamam, esperando que possamos ajudar a proteger suas brasas sagradas."
 travel_events_fp3.0010.a: "Agrupe-os e apague a heresia deles!"
 travel_events_fp3.0010.a.success: "Eu apago a chama deles"
 travel_events_fp3.0010.a.failure: "Os magos nos vencem"
 travel_events_fp3.0010.a.lightning.desc: "Lutar em uma tempestade pode ser perigoso e imprevisível"
 travel_events_fp3.0010.b: "Confisque a Braseira, o fogo estará mais seguro em minhas mãos!"
 travel_events_fp3.0010.b.success: "Você confisca a braseira"
 travel_events_fp3.0010.b.failure: "Os magos nos vencem"
 travel_events_fp3.0010.c: "Você pode se abrigar conosco!"
 travel_events_fp3.0010.c.success: "As brasas sobrevivem à tempestade"
 travel_events_fp3.0010.c.success.desc: "Você ganha a gratidão dos Magos"
 travel_events_fp3.0010.c.flavor: "Se conseguirmos proteger os peregrinos, eles mostrarão sua gratidão"
 travel_events_fp3.0010.c.failure: "O fogo se apaga"
 travel_events_fp3.0010.d: "Esta tempestade é o julgamento de [ROOT.Char.GetFaith.HighGodName]."
 travel_events_fp3.0010.d.flavor: "Você deixa os viajantes para a fé deles"
 travel_events_fp3.0011.t: "Brasas Moribundas"
 travel_events_fp3.0011.desc.intro: "Os magos travam uma luta corajosa, tentando proteger suas brasas sagradas enquanto nos afastamos. Mas, quando vejo uma chance, chuto o palanquim de suas mãos e a braseira rola para a lama, as brasas se apagando.\n\nZombamos e debochamos dos sacerdotes derrotados, mas nossa alegria é cortada abruptamente, enquanto o mundo se enche de luz e barulho furiosos. A imagem residual de um raio pisca diante de mim. Ao me levantar de um torpor atordoado, vejo que uma chama brilhante irrompe da braseira sagrada reacendida. Meus homens já estão fugindo em pânico extasiado."
 travel_events_fp3.0011.a: "Todos devem conhecer o poder inegável de [ROOT.Char.GetCurrentLocation.GetCounty.GetFaith.HighGodName]!"
 travel_events_fp3.0011.b: "Vou carregar esse milagre irrefutável secretamente em meu coração."
 travel_events_fp3.0011.c: "Isso é mera coincidência!"
 travel_events_fp3.0012.t: "Brasas Moribundas"
 travel_events_fp3.0012.desc.intro: "Você e os magos encontram abrigo adequado em uma estrutura em ruínas. Depois de torcer suas roupas molhadas e garantir que a braseira e suas brasas estejam vivas e bem, o grupo relaxa. Parece que vocês vão esperar a tempestade juntos.\n\nO líder dos sacerdotes, [fp3_zoroastrian_armed_pilgrim.GetName], é uma pessoa conhecedora e tem muitas histórias para compartilhar."
 travel_events_fp3.0012.a: "Vou pegar suas brasas preciosas enquanto eles descansam..."
 travel_events_fp3.0012.a.success: "Roubamos suas brasas enquanto eles dormiam"
 travel_events_fp3.0012.a.failure: "Os magos te pegam e te expõem como ladr[ROOT.Char.Custom('ES_OnOna')]"
 travel_events_fp3.0012.b: "Sua sabedoria pode me servir bem."
 travel_events_fp3.0012.c: "Boa viagem."
 zoroastrian_brazier_name: "Braseiro [ROOT.Char.GetCurrentLocation.GetCounty.GetFaith.GetAdherentName]"
 zoroastrian_brazier_desc: "Um $zoroastrian_brazier_name$ resgatado de magos incompetentes no meio de uma tempestade feroz, as brasas daquele dia ainda estão acesas"
 ### Qanat Diving
 travel_events_fp3.0020.t: "Um Encontro Incomum"
 travel_events_fp3.0020.desc.intro: "Montamos um acampamento temporário para evitar o sol impiedoso do meio-dia dentro de uma caverna peculiar e muito úmida.\n\n“Vocês ouviram isso, meu [ROOT.GetCharacter.GetTitleTierName|l]?” [travel_leader.GetName] não parece muito à vontade com nosso abrigo sombrio.\n\nAo me virar, dou de cara com um[fp3_young_rascal.Custom('ES_XA')] [fp3_young_rascal.Custom('GirlBoy')] jovem que de alguma forma deve ter passado bem ao lado de [travel_leader.GetNameNoTooltip]. [Select_CString( fp3_young_rascal.IsFemale, 'La niña', 'El niño' )], assustada[fp3_young_rascal.Custom('ES_OA')] desaparece imediatamente, adentrando-se mais fundo nas cavernas."
 travel_events_fp3.0020.a: "Sigam [Select_CString( fp3_young_rascal.IsFemale, 'esa niña', 'ese niño' )]!"
 travel_events.fp3.0020.a.flavor: "Investigar as cavernas pode trazer perigo ou revelar seus segredos"
 travel_events_fp3.0020.a.success: "Você encontra [Select_CString( fp3_young_rascal.IsFemale, 'à menina', 'ao menino' )]"
 travel_events_fp3.0020.a.success.tooltip: "Você segue [Select_CString( fp3_young_rascal.IsFemale, 'à menina', 'ao menino' )] e descobre segredos subterrâneos"
 travel_events_fp3.0020.b: "Devemos deixar este lugar."
 travel_events.fp3.0020.b.flavor: "[travel_leader.GetNameNoTooltip] nos insta a deixar essas cavernas para trás. Elas não são seguras"
 travel_events_fp3.0020.b.tt: "Sua jornada continua."
 travel_events_fp3.0020.a.failure.title: "Você cai e se machuca nos túneis escuros"
 travel_events_fp3.0020.a.failure: "Voc? perde o rastro [Select_CString( fp3_young_rascal.IsFemale, 'da menina', 'do menino' )] e acaba perdid[ROOT.Char.Custom('ES_OA')] nos t?neis por dias"
 travel_events_fp3.0021.t: "Qanats de [ROOT.Char.GetCurrentLocation.GetCounty.GetName]"
 travel_events_fp3.0021.desc: "Atravessamos cada vez mais fundo as entranhas da terra, deixando para trás a paisagem ensolarada e radiante por túneis cada vez mais úmidos e escuros.\n\nQuando finalmente alcanço [Select_CString( fp3_young_rascal.IsFemale, 'a garota', 'o garoto' )], sou distraído por uma visão esplêndida. Um antigo sistema de canais subterrâneos se estende até onde a vista alcança.\n\nBem-vind[ROOT.Char.Custom('ES_OA')], [ROOT.Char.GetTitleAsName|l], ao meu próprio palácio. É provável que ele até faça o seu parecer pequeno. [fp3_young_rascal.GetSheHe|U] me olha desafiadoramente, claramente consternad[fp3_young_rascal.Custom('ES_OA')] por eu ter conseguido seguir[fp3_young_rascal.GetHerHim] até aqui."
 travel_events_fp3.0021.a: "Vamos mergulhar em busca do tesouro escondido nessas águas."
 travel_events_fp3.0021.a.success.t: "Você trouxe à tona um [newly_created_artifact.GetName]"
 travel_events_fp3.0021.a.success.desc: "Você encontra um tesouro antigo"
 travel_events_fp3.0021.a.failure.t: "A única coisa que peguei foi um resfriado"
 travel_events_fp3.0021.a.failure.desc: "Você quase se afoga em água parada"
 travel_events_fp3.0021.a.artifact: "Encontro um artefato antigo"
 travel_events_fp3.0021.b: "Posso aprender algo estudando esta estrutura."
 travel_events_fp3.0021.b.success.t: "Você aprende alguns segredos de irrigação"
 travel_events_fp3.0021.b.success.desc: "Você estuda o Qanat"
 travel_events_fp3.0021.b.failure.t: "O problema escapa de você"
 travel_events_fp3.0021.b.failure.desc: "Isso está além de você"
 travel_events_fp3.0021.c: "[fp3_young_rascal.Custom('GirlBoy')], você deve aprender a respeitar seus superiores!"
 ### Tower of Silence
 travel_events_fp3.0030.t: "Um Banquete para Falcões"
 travel_events_fp3.0030.desc.intro: "Aves de rapina circulam sobre nós, lançando sombras sinistras sobre a paisagem castigada pelo sol. Ao subir a encosta de uma colina iminente, o fedor de carne em decomposição domina meus sentidos.\n\nVejo corpos dispostos ordenadamente sobre as rochas. Urubus e falcões puxam a carne; pedaços fibrosos e ensanguentados pendem de seus bicos. Um homem vestido com roupas simples, que supervisiona o sepultamento celeste, faz um gesto para mim.\n\n"Por favor, retire-se, [ROOT.Char.GetTitleAsNameNoTooltip|l], este lugar é apenas para nusessalars…"."
 travel_events_fp3.0030.a: "Isso é bárbaro, vamos enterrar esses corpos!"
 every_faith_vassal: "Todo vassalo [local_faith.GetAdherentName]"
 travel_events_fp3.0030.b: "Espero que eu vá assim, com o Nasu purificado de meu corpo..."
 travel_events_fp3.0030.c: "Imaginai ascender aos céus, levad[ROOT.Char.Custom('ES_OA')] por essas poderosas asas…"
 travel_events_fp3.0030.d: "A morte vem para todos nós."
 travel_events_fp3.0030.d_flavor: "Passe um tempo refletindo sobre a morte e depois saia do local"
 travel_events_fp3.0030.e: "Encontre-me o falcão mais jovem, eu o treinarei para usos melhores."
 travel_events_fp3.0030.e.tooltip: "Você terá a chance de treinar a ave."
 travel_events_fp3.0031.t: "Banquete para Falcões"
 travel_events_fp3.0031.desc.intro: "Decidi treinar o falcão que encontrei no local do enterro celeste. Para isso, nos reunimos no campo com uma pequena comitiva, incluindo [falcon_victim.GetName], meu [ROOT.Char.Custom2('RelationToMe', falcon_victim)], que está preparad[falcon_victim.Custom('ES_OA')] com uma lebre cativa. A jovem ave encapuzada aguarda expectante na minha mão enluvada.\n\n[falcon_victim.GetNameNoTooltip] solta a presa, que dispara pelo campo aberto. Eu tiro a capucha do falcão, e ele logo alça voo. Mas, em vez de mergulhar em direção à presa, ele se lança sobre a cabeça de [falcon_victim.GetNameNoTooltip]. Antes que possam afastá-lo, o falcão bica e arranha com as garras, deixando cortes ensanguentados."
 travel_events_fp3.0031.a: "Tenho certeza de que posso corrigir esse comportamento."
 travel_events_fp3.0031.a.success.desc: "O treinamento é bem-sucedido"
 travel_events_fp3.0031.a.success.t: "O pássaro da Torre do Silêncio se torna um falcão de caça"
 travel_events_fp3.0031.a.failure.desc: "O pássaro permanece feroz"
 travel_events_fp3.0031.a.failure.t: "O falcão mantém seu apetite por carne humana"
 travel_events_fp3.0031.b: "Posso nutrir essas tendências..."
 travel_events_fp3.0031.c: "É melhor eu me livrar dessa besta."
 travel_events_fp3.0031.d: "Qualquer[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] da nação [ROOT.Char.GetCulture.GetNameNoTooltip] sabe como domar até o pássaro mais feroz."
 travel_events_fp3.0031.d.tt: "Esta opção está disponível devido à sua cultura ter a [culture_tradition|lE] $tradition_ep2_avid_falconers_name$"
 ### Mare's Milk
 travel_events_fp3.0040.t: "Leite de Égua"
 travel_events_fp3.0040.desc.intro: "Nosso caminho nos leva até um acampamento considerável de viajantes túrquicos. O grupo nos faz gestos amistosos para que nos juntemos a eles. Um[fp3_turkic_traveler.Custom('ES_XA')] [fp3_turkic_traveler.GetWomanMan] de aspecto severo mexe um espesso líquido branco numa panela. Ele serve um pouco em uma tigela pequena e me entrega.\n\n#EMP Kumis!#! É ótimo para os intestinos!\n\nMais dois me observam e cochicham entre si em sua própria língua, alto o bastante para que eu os ouça."
 travel_events_fp3.0040.desc.intro.a: "\n"Por que estamos desperdiçando um bom #EMP kumis#! em [Select_CString( ROOT.Char.IsFemale, 'esta forastera', 'este forastero' )]?".\n\nEstá claro que acreditam que sou incapaz de entender o que dizem, mas pelo menos não estão me servindo veneno."
 travel_events_fp3.0040.desc.intro.b: "\n\"Eu vou pegar primeiro as coisas dele! Aqueles bons sapatos me servem muito bem.\"\n\nEles claramente acreditam que não consigo entender sua fala. Pena para eles: agora sei suas intenções malignas."
 travel_events_fp3.0040.desc.intro.c: "Mas eu não entendo a língua estranha deles. Espero que tenham boas intenções..."
 travel_events_fp3.0040.a: "Agradeço a eles em sua língua nativa, à nossa saúde!"
 travel_events_fp3.0040.ab.tt: "Esta opção está disponível porque você fala [fp3_turkic_traveler.GetCulture.GetLanguage.GetNameNoTooltip]"
 travel_events_fp3.0040.b: "Em sua língua nativa, ordeno que sejam aprisionados."
 travel_events_fp3.0040.c: "Não deveria ser tão desconfiado"
 travel_events_fp3.0040.c.success: "O kumis é delicioso"
 travel_events_fp3.0040.c.success.t: "O kumis estava delicioso!"
 travel_events_fp3.0040.c.failure: "Você é sedado e roubado"
 travel_events_fp3.0040.c.failure.t: "Eu fui sedado e roubado!"
 travel_events_fp3.0040.d: "Leite de égua? Isso é repulsivo."
 travel_events_fp3.0040.e: "Vamos pedir para que est [fp3_turkic_traveler.GetWomanMan] nos ensine suas maneiras."
 ### Tomb Raiders
 travel_events_fp3.0050.t: "Saqueadores de Túmulos"
 travel_events_fp3.0050.desc.intro: "Ao contornar uma curva no caminho, encontramos um grupo de pessoas cobertas de poeira, saindo do que antes deve ter sido uma tumba impressionante. Eles carregam sacos de estopa que tilintam e chacoalham, pesados pelas bugigangas que desenterraram do antigo edifício.\n\n"São tempos difíceis, poderos[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]! Precisamos alimentar nossas famílias e não estamos fazendo mal a ninguém entre os vivos"."
 travel_events_fp3.0050.a: "Não há futuro para aqueles que desconsideram o passado."
 travel_events_fp3.0050.b: "[ROOT.Char.Custom('ES_ElLa')|U] [ROOT.Char.GetTitleAsNameNoTooltip|l] merece seu corte!!"
 travel_events_fp3.0050.b.entourage: "Seu companheir[entourage_helper.Custom('ES_OA')] de viagem, [entourage_helper.GetName], ajuda voc? a examinar o saque."
 travel_events_fp3.0050.b.success.desc: "Você escolhe um tesouro precioso"
 travel_events_fp3.0050.b.success.tooltip: "Você adquire um tesouro antigo"
 travel_events_fp3.0050.b.failure.desc: "Nada especial chama sua atenção"
 travel_events_fp3.0050.b.failure.t: "Você conseguiu alguns bibelôs valiosos"
 travel_events_fp3.0050.c: "Não tenho tempo para camponeses."
