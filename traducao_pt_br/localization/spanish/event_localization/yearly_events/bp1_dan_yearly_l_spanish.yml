l_spanish:
 bp1_yearly.7000.t: "Quebrando o Jejum com um Amigo"
 bp1_yearly.7000.desc: "Estou a caminho da [ROOT.Char.GetFaith.HouseOfWorship] quando encontro meu [ROOT.Char.Custom2('RelationToMeShort', distraction_friend)] [distraction_friend.Custom('ES_ElLa')] [distraction_friend.GetTitledFirstName|l], que está carregando uma pequena bolsa. Olhando ao redor, ela a abre de forma conspiratória, revelando todo tipo de comida e bebida.\n\n“Está um dia tão bonito, venha me fazer companhia lá fora para um piquenique matinal.” diz.\n\nQuando começo a protestar que estou a caminho da [ROOT.Char.GetFaith.HouseOfWorship] [distraction_friend.GetFirstNameNoTooltip], me interrompe: \n\n“[ROOT.Char.GetFaith.HighGodName] ainda estará lá depois, mas esta [ROOT.Char.Custom('GetExpensiveDessert')], não”."
 bp1_yearly.7000.a: "[ROOT.Char.GetFaith.HighGodName] é mais importante do que o café da manhã."
 bp1_yearly.7000.b: "O verdadeiro pecado seria deixar essa oportunidade passar."
 lovely_picnic_modifier: "Piquenique Encantador"
 lovely_picnic_modifier_desc: "Participou de um piquenique encantador."
 bp1_yearly.7001.t: "Pescaria"
 bp1_yearly.7001.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', fishing_friend)] [fishing_friend.GetFirstName] me aborda com um sorriso de orelha a orelha. Em suas mãos estão duas varas de pescar. \n\n\"Venha hoje pescar comigo, [fishing_friend.Custom2('RelationToMeShort', ROOT.Char)], prometo que você vai adorar\", exclama.\n\nFaz muito tempo que não tiro um descanso e me escapo da agitação do meu [ROOT.Char.Custom('FortifiedBuilding')]…"
 bp1_yearly.7001.a: "Vou pegar o lendário carpa branco!"
 bp1_yearly.7001.b: "Um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] não #EMP pesca#!."
 bp1_yearly_7001.a.tt: "Você vai em uma pescaria"
 bp1_yearly.7001.a.toast.good_time: "Você teve uma ótima viagem"
 bp1_yearly.7001.a.toast.bad_time: "Você teve um momento ruim"
 bp1_yearly.7001.a.toast.caught_fish: "Você pega um peixe gigante"
 bp1_yearly.7001.a.toast.white_carp: "Você pega o lendário carpa branco"
 bp1_yearly.7002.t: "Brigas no Banheiro"
 bp1_yearly.7002.desc: "Depois de aliviar-me, vou até a janela e observo o pátio lá embaixo.\n\nMeu humor azeda quando vejo m rival, [chamberpot_rival.GetFirstName], andando pelo pátio com um olhar irritantemente alegre no rosto. Meus olhos se voltam para a câmara de vaso sanitário cheia ao lado da minha cama, talvez eu possa fazer algo sobre esse bom humor..."
 bp1_yearly.7002.a: "Cuidado lá embaixo!"
 bp1_yearly.7002.b: "Já sou adult[GetPlayer.Custom('ES_OA')] e isso está abaixo de mim."
 bp1_yearly.7002.a.tt: "Você tenta esvaziar o vaso sanitário sobre eles"
 drenched_in_excrement_opinion: "Encharcado de Excremento"
 threw_excrement_opinion: "Quase Encharcado de Excremento"
 bp1_yearly.7002.a.toast.perfect_hit: "Acerto Certeiro!"
 bp1_yearly.7002.a.toast.miss: "Completamente Errado!"
 bp1_yearly.7002.a.toast.chamberpot: "Você Derruba o Vaso Sanitário!"
 bp1_yearly.7002.a.toast.tripped: "Você escorrega e fica cobert[GetPlayer.Custom('ES_OA')] de excrementos!"
 bp1_yearly.7003.t: "A Tapeçaria"
 bp1_yearly.7003.desc: "Estou procurando por [orgy_tapestry_maker.Custom2('MyCharacterIntroduction', ROOT.Char)], mas não se encontra em lugar nenhum. Por fim, invado seus aposentos, onde não #EMP [orgy_tapestry_maker.GetHerHim]#! encontro..., mas encontro algo muito interessante.\n\nParece que ele/ela esteve trabalhando em uma tapeçaria que retrata uma orgia bastante explícita. Estou lá, espremid[ROOT.Char.Custom('ES_OA')] entre meu [ROOT.Char.Custom2('RelationToMeShort', orgy_participant_1)] [orgy_participant_1.GetFirstName] e meu [ROOT.Char.Custom2('RelationToMeShort', orgy_participant_2)] [orgy_participant_2.GetFirstName]. Enquanto isso, meu [ROOT.Char.Custom2('RelationToMeShort', orgy_tapestry_maker)] [orgy_tapestry_maker.GetFirstNameNoTooltip] parece estar se divertindo muito com [ROOT.Char.GetFaith.DevilName]. Em um canto da tapeçaria, meu [ROOT.Char.Custom2('RelationToMeShort', orgy_participant_3)] [orgy_participant_3.GetFirstName] se senta encantad[orgy_participant_3.Custom('ES_OA')] com um sorriso.\n\nEstou sem palavras."
 bp1_yearly.7003.a: "Nojento!"
 bp1_yearly.7003.b: "Eu #EMP preciso#! pendurar isso na minha parede."
 bp1_yearly.7003.c: "Acho que tomei um, uh, caminho errado."
 bp1_orgy_tapestry: "Tapeçaria de uma Orgia"
 bp1_orgy_tapestry_desc: "Esta tapeçaria representa [orgy_participant_1.GetFirstName], [ROOT.Char.GetName], [orgy_participant_2.GetName], [orgy_participant_3.GetName] e [orgy_tapestry_maker.GetName] envolvidos em uma orgia. [ROOT.Char.GetFaith.DevilName] também está participando."
 bp1_yearly.7004.t: "Conforto de um Amigo"
 bp1_yearly.7004.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', concerned_friend)] [concerned_friend.GetFirstName] se aproxima de mim enquanto estou sentado(a), olhando para fora: \"Você não tem sido a mesma pessoa desde... desde o que aconteceu.\"\n\nEle(a) não diz isso, mas sei que está se referindo a quando [bad_memory.GetDescription].\n\n\"Talvez você precise de alguém com quem falar? Eu poderia ser essa pessoa\", continua com delicadeza."
 bp1_yearly.7004.a: "Isso parece bom."
 bp1_yearly.7004.b: "Meus problemas são meus."
 bp1_yearly.7005.t: "Um Favor para um Amigo"
 bp1_yearly.7005.desc: "Meu amig[borrowing_friend.Custom('ES_OA')] [borrowing_friend.GetName] se aproxima de mim, obviamente querendo algo. No fim, canço de seus rodeios sobre o assunto e exijo que me diga.\n\n\"Quero que me empresteis vosso/a [borrowed_artifact.GetName] por uma noite, mas não podeis perguntar o porquê…\"\n\nEstá claro que o pedido o/a deixa envergonhado/a. Para que ele/ela poderia querer o objeto?"
 bp1_yearly.7005.a: "Eu suponho que sim."
 bp1_yearly.7005.b: "De jeito nenhum."
 bp1_yearly.7005.a.returned_artifact: "Artefato Emprestado Devolvido."
 bp1_yearly.7006.t: "$bp1_yearly.7005.t$"
 bp1_yearly.7006.desc: "[borrowing_friend.GetName] se aproxima a mim com o olhar baixo. \"Por favor, não fique chateado(a)\".\n\nEle(a) me leva até meu [borrowed_artifact.GetName] e vejo que está muito danificado. \n\n \"Sinto muito, foi um acidente...\", [borrowing_friend.GetFirstNameNoTooltip] parece realmente aflito(a)[borrowing_friend.Custom('ES_OA')]."
 bp1_yearly.7006.a: "Você é um(a) [borrowing_friend.Custom2('InsultNoun', ROOT.Char)]."
 bp1_yearly.7006.b: "Acidentes acontecem."
 bp1_yearly.7005.a.tt: "Seu artefato pode estar danificado."
 bp1_yearly.7007.t: "$bp1_yearly.7005.t$"
 bp1_yearly.7007.desc: "[borrowing_friend.GetName] me devolveu meu [borrowed_artifact.GetName]. Não sei se apenas o limpou ou fez algumas mudanças, mas ele está com uma aparência mais impressionante do que nunca.\n\n \"Espero que gostem, trabalhei nele a noite toda\", diz [borrowing_friend.GetSheHe] com nervosismo[borrowing_friend.Custom('ES_OA')] ."
 bp1_yearly.7007.a: "Isso é maravilhoso!"
 bp1_yearly.7007.b: "Você alterou O MEU [borrowed_artifact.GetNameNoTooltip]?"
 didnt_trust_friend_opinion: "Não confiou em mim."
 trusted_friend_opinion: "Confio em mim."
 forgave_me_opinion: "Me perdoou."
 improved_artifact_opinion: "Melhorou meu artefato."
 messed_with_artifact_opinion: "Mexeu com meu artefato."
 bp1_yearly.7010.t: "Um Teste de Lealdade"
 bp1_yearly.7010.desc: "Não consigo parar de pensar em quais são as lealdades de [tested_friend.GetFirstName]. Será que é mesmo um[tested_friend.Custom('ES_XA')] amig[tested_friend.Custom('ES_OA')] ou apenas um[tested_friend.Custom('ES_XA')] bajulador[tested_friend.Custom('ES_XA')] a mais?\n\nTalvez um pequeno teste me deixe tranquil[GetPlayer.Custom('ES_OA')]…\n\nUm dos meus agentes, um segredo falso e um presente anônimo. O que o fará trair minha confiança?"
 bp1_yearly.7010.a: "Trinta moedas de prata."
 bp1_yearly.7010.b: "Dois... não, #EMP três#! bel [tested_friend.Custom('AttractionWomanManMultiple')], prontos e dispostos."
 bp1_yearly.7010.c: "A promessa de riquezas para seu #EMP otro#! amig[friends_friend.Custom('ES_OA')], [friends_friend.GetFirstNameNoTooltip]."
 bp1_yearly.7010.d: "Isso está abaixo de mim."
 bp1_yearly.7010.toast.betrayed: "[tested_friend.GetSheHe|U] trai você"
 bp1_yearly.7010.toast.not_betrayed: "[tested_friend.GetSheHe|U] prova sua lealdade"
 bp1_yearly.7010.a.tt: "Você acredita que a lealdade de [tested_friend.GetFirstName] pode ser comprada com ouro"
 bp1_yearly.7010.b.tt: "Você acredita que [tested_friend.GetFirstName] escolheria prazeres carnais em vez de amizade"
 bp1_yearly.7010.c.tt: "Você acredita que [tested_friend.GetFirstName] se importa mais com a amizade de [friends_friend.GetFirstName] do que com a sua"
 bp1_yearly.7050.t: "Inimigos Antigos"
 bp1_yearly.7050.desc: "Estou de volta ao campo de batalha, a lama está grudando nas minhas botas, o fedor dos mortos está agredindo o meu nariz, mais uma vez estou revivendo o dia em que [war_memory.GetDescription].\n\nAcordo ofegante, gotas de suor frio grudadas no meu rosto."
 bp1_yearly.7050.desc.married: "[sleeping_spouse.GetFirstName] mexe ao meu lado, mas não acorda. Preciso lidar com meus problemas sozinho."
 bp1_yearly.7050.desc.not_married: "Sozinh[GetPlayer.Custom('ES_OA')] em meus aposentos, devo lidar com esses problemas sem ajuda."
 bp1_yearly.7050.a: "Devo tentar esquecer."
 bp1_yearly.7050.b: "NUNCA mais perderei!"
 vengeance_obsessed_modifier: "Obcecado por Vingança"
 bp1_yearly.7051.t: "A batalha de [battle_area.GetNameNoTooltip]"
 bp1_yearly.7051.desc: "Com vividez, lembro quando [battle_memory.GetDescription]. Foi uma batalha que ocorreu em [battle_area.GetTerrain.GetNameNoTooltip], um terreno para o qual eu não estava preparado[GetPlayer.Custom('ES_OA')].\n\nDesde então, tenho refletido sobre isso, tenho certeza[GetPlayer.Custom('ES_OA')] de que, se a batalha acontecesse hoje, eu seria um[GetPlayer.Custom('ES_XA')] líder muito mais competente."
 bp1_yearly.7051.a: "Nunca permitirei que isso aconteça novamente."
 bp1_yearly.7051.b: "Devo aprender a ser flexível."
 bp1_yearly.7052.t: "Uma História Sobre..."
 bp1_yearly.7052.desc: "O fogo ruge, as bebidas foram servidas e [story_friend.GetFirstName] me chama para contar uma história.\n\nMinha primeira ideia é a de uma famosa fábula [ROOT.Char.GetCulture.GetNameNoTooltip], um clássico que nunca decepciona.\n\nPor outro lado, e se eu contasse uma história da minha própria vida, talvez da vez em que [story_memory.GetDescription]?"
 bp1_yearly.7052.a: "Mantenha a tradição."
 bp1_yearly.7052.b: "Minha própria história!"
 bp1_yearly.7052.c: "Por que não os dois!"
 bp1_yearly.7053.t: "Memórias Vingativas"
 bp1_yearly.7053.desc: "Enquanto caminho pela cidade, a raiva me domina mais uma vez, a única coisa em minha mente ultimamente é quando [bad_memory.GetDescription].\n\nDevo me vingar de [bad_memory_participant.GetFirstNameNoTooltip] de alguma forma. Olho para a forca à minha frente. Talvez, se eu agir com cuidado, [bad_memory_participant.GetSheHe] em breve estará pendurado lá."
 bp1_yearly.7053.a: "Terei minha vingança."
 bp1_yearly.7053.b: "Devo tentar esquecer."
 murder_memory_modifier: "Memórias Vingativas"
 sex_memory_modifier: "Memórias Sensuais"
 bp1_yearly.7053.a.1: "Este esquema terá um bônus de chance de sucesso."
 bp1_yearly.7054.t: "Esquecendo"
 bp1_yearly.7054.desc: "«¿[forgotten_memory.GetDescription|U]?», pergunto confuso.\n\nMeu [memory_child.Custom('GetDaughterSon')] [memory_child.GetFirstName] me olha preocupado[memory_child.Custom('ES_OA')]. «Claro! Vocês me contaram essa história muitas vezes, não se lembram?»\n\nA verdade é que não me lembro. Os detalhes têm se tornado mais turvos ultimamente, mas confessá-lo talvez fosse uma fraqueza."
 bp1_yearly.7054.a: "Ah sim, meu erro."
 bp1_yearly.7054.b: "Eu esqueço tanto nos dias de hoje."
 bp1_yearly.7055.t: "Gravando uma Memória"
 bp1_yearly.7055.desc.positive: "Alguns momentos devem ser registrados para sempre. O momento em que [recorded_memory.GetDescription] é um deles. Uma memória tão incrível deve ser preservada para todo o sempre."
 bp1_yearly.7055.desc.negative: "Alguns momentos devem ser registrados para sempre. O momento em que [recorded_memory.GetDescription] é um deles. Pode ser uma memória dolorosa, mas alguém tem que passá-la para a próxima geração."
 bp1_yearly.7055.desc.neutral: "Alguns momentos devem ser registrados para sempre. O momento em que [recorded_memory.GetDescription] é um deles."
 bp1_yearly.7055.desc.alone_poor_skill: "Eu posso não ser um bom escritor, mas com tempo e esforço, com certeza poderia escrever algo por conta própria.\n\n"
 bp1_yearly.7055.desc.alone_good_skill: "Minha maestria na língua [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip] tornaria a escrita disso uma questão trivial.\n\n"
 bp1_yearly.7055.desc.blind: "Infelizmente, minha cegueira me impede de escrever qualquer coisa...\n\n"
 bp1_yearly.7055.desc.poet: "Meu poe[poet.Custom('ES_TaTisa')] da corte, [poet.GetFirstName], poderia ser de grande utilidade. Seu domínio da prosa transformaria minhas palavras mundanas em arte."
 bp1_yearly.7055.desc.friend: "E, além disso, meu/minha querid[friend.Custom('ES_OA')] amig[friend.Custom('ES_OA')] [friend.GetFirstName] escreve muito melhor do que eu. Com certeza me ajudaria se eu pedisse, não é?"
 bp1_yearly.7055.desc.ending: "Montar e ilustrar um livro rapidamente se torna um empreendimento custoso, no entanto..."
 bp1_yearly.7055.poet: "O poeta [poet.Custom('ES_ElLa')] poet[poet.Custom('ES_TaTisa')] [poet.GetFirstNameNoTooltip] vai escrevê-lo!"
 bp1_yearly.7055.friend: "[friend.GetFirstNameNoTooltip] é um[friend.Custom('ES_XA')] amig[friend.Custom('ES_OA')] de verdade."
 bp1_yearly.7055.high_skill: "Vou registrá-lo eu mesmo."
 bp1_yearly.7055.a: "Vou registrá-lo eu mesmo, com a bênção de [ROOT.Char.GetFaith.HighGodName]."
 bp1_yearly.7055.b: "Não há tempo para isso..."
 recorded_memory_character: "Uma lembrança [ROOT.Char.Custom('ES_DelDela')] [memory_participant.GetTitledFirstNameNoTooltip|l]"
 recorded_memory: "Memória de [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitledFirstNameNoTooltip|l]"
 recorded_memory_desc: "Este tomo narra a história de quando [recorded_memory.GetThirdPerspectiveDescription].\n\nComposto por [ROOT.Char.GetFirstName]."
 bp1_yearly.7056.t: "Táticas de Intimidação"
 bp1_yearly.7056.desc: "Levo [intimidation_target.GetFirstName] às [ROOT.Char.Custom('GetDungeonPlural')] para onde começo a presentá-lo[intimidation_target.GetHerHim] com histórias das coisas horríveis que fiz àqueles que me desafiaram.\n\n“Tenho certeza de que você já ouviu falar de quando [intimidation_memory.GetDescription]”, digo-lhe com deleite. “Isso foi só #EMP el principio#!.”\n\nAo rir, os olhos de [intimidation_target.GetNameNoTooltip] se arregalam de medo."
 bp1_yearly.7056.a: "Não se preocupe, apenas faça o que eu digo e você ficará bem..."
 bp1_yearly.7056.b: "Conte #EMP para todos#! sobre mim!"
 bp1_yearly.7057.t: "Êxtase Religioso"
 bp1_yearly.7057.desc: "Estou sentado no[ROOT.Char.GetFaith.HouseOfWorship] e meus pensamentos abandonam as palavras de [realm_priest.GetCouncilTitleFirstName] em favor de quando [sex_memory.GetDescription]. Desde então, tenho pensado em [sex_partner.GetSheHe] quase diariamente."
 bp1_yearly.7057.desc.male: "\n\nInfelizmente, isso está causando alguns efeitos colaterais bastante perceptíveis. Talvez, se eu posicionar o [ROOT.Char.GetFaith.ReligiousText] do jeito certo, eu possa esconder esse problema crescente sem que ninguém perceba..."
 bp1_yearly.7057.desc.female: "\n\nInfelizmente, isso está causando alguns efeitos colaterais um tanto problemáticos."
 bp1_yearly.7057.a: "[sex_partner.GetNameNoTooltip] #EMP deve#! ser meu..."
 bp1_yearly.7057.b: "Afaste esses pensamentos!"
 bp1_yearly.7057.c: "Onde melhor para aliviar o estresse do que na [ROOT.Char.GetFaith.HouseOfWorship]?"
 bp1_yearly.7057.a.tt: "Este esquema terá um bônus de chance de sucesso."
 bp1_yearly.7058.t: "Catástrofe Provisória"
 bp1_yearly.7058.desc: "O coro matinal do canto dos pássaros me acompanha até os armazéns, a fraca luz do amanhecer dando lugar à escuridão sombria da [ROOT.Char.Custom('GetRoom')]. Bocejo e me espreguiço enquanto sigo, meus pés arrastando no chão.\n\nQuando meus olhos se ajustam à falta de luz, uma tragédia culinária se revela: restos de maçã, migalhas espalhadas, ossos limpos de toda carne. Meus olhos atônitos vasculham a [ROOT.Char.Custom('GetRoom')], mas por toda parte encontram ainda mais provas.\n\nDe repente, num canto, um #EMP eructo#!, suave e satisfeito…"
 bp1_yearly.7058.glutton: "Eu tenho mais comida! Vamos abrir o #EMP esconderijo secreto!#!"
 bp1_yearly.7058.a: "Oh, você vai pagar por isso. E muito mais, se tiver."
 bp1_yearly.7058.b: "Se você gostou dos armazéns, vai #EMP adorar#! a [ROOT.Char.Custom('GetDungeon')]!"
 bp1_yearly.7058.c: "#EMP *Suspiro*#! Eu pago... Eu acho..."
 bp1_yearly.7030.t: "Conforto Carnal"
 bp1_yearly.7030.desc: "[dead_friend_spouse.GetFirstName] tem estado arrasad[dead_friend_spouse.Custom('ES_OA')] desde a morte de sua [dead_friend.Custom('WifeHusband')] [dead_friend.GetFirstName]. Certa noite ele vem me visitar.\n\n\"Estou tão sol[dead_friend.Custom('ES_OA')]\", diz, olhando para mim com desejo. Lembro-me de que [dead_friend.GetFirstNameNoTooltip] era um[dead_friend_spouse.Custom('ES_XA')] bom[dead_friend_spouse.Custom('ES_XA')] amig[dead_friend_spouse.Custom('ES_OA')]. \n\n\"Você tem me consolado tanto\", acrescenta, mordendo os lábios de forma sugestiva. [dead_friend.GetFirstNameNoTooltip] era meu amig[dead_friend_spouse.Custom('ES_OA')] mi[dead_friend_spouse.Custom('ES_OA')].\n\n\"Só quero sentir algo\", sussurra [dead_friend_spouse.GetSheHe], afrouxando os fechos da frente de sua [dead_friend_spouse.Custom('GetUpperClothingArticle')]. [dead_friend.GetFirstNameNoTooltip] #EMP era#! meu amig[dead_friend_spouse.Custom('ES_OA')]…"
 bp1_yearly.7030.a: "Tenho certeza de que [dead_friend.GetFirstNameNoTooltip] aprovaria..."
 bp1_yearly.7030.b: "Reaja, [dead_friend_spouse.GetFirstNameNoTooltip]!"
 bp1_yearly.7100.t: "Do Desagrado ao Ódio"
 bp1_yearly.7100.desc: "Há um momento eu estava desfrutando de um agradável passeio sob o sol por [owned_county.GetName] e no instante seguinte estou coberto de excremento e me rebolcando na lama. Depois de limpar furiosamente o excremento dos meus olhos, encontro o culpado com facilidade.\n\n\"[potential_nemesis.Custom('ES_ElLa')|U] [potential_nemesis.GetTitledFirstName|l] vos envia cumprimentos!\", grita o camponês que se pendura na janela antes de fugir da cena.\n\nPateticamente, tento lavar uma das minhas roupas favoritas em um riacho próximo, mas está claro que ela não tem salvação."
 bp1_yearly.7100.a: "Agora é #EMP pessoal...#!"
 bp1_yearly.7100.b: "Vou me banhar em sangue!"
 bp1_yearly.7100.c: "Marquem minhas palavras, [potential_nemesis.GetFirstNameNoTooltip]: essa pele será substituída."
 bp1_yearly.7100.d: "A vingança está abaixo de mim..."
 bp1_yearly.7100.c.tt: "O amado gato d [potential_nemesis.GetFirstNameNoTooltip] estava rondando aqui mais cedo..."
 bp1_yearly.7100.e: "Guardarei esta pele para... depois."
 focused_on_revenge_modifier: "Focado na Vingança"
 focused_on_revenge_modifier_desc: "Este personagem está exclusivamente focado na queda de seus rivais, ignorando muitas de suas responsabilidades."
 vengeful_opinion: "Vingativo"
