l_spanish:
 ## Desperate faction vassals attempt a coup by Isabella Welch
 yearly.7001.t: "O Último Dia"
 yearly.7001.desc: "Meu [marshal.GetCouncilTitle|l], [marshal.Custom('ES_ElLa')] [marshal.GetTitledFirstNameNoTooltip|l], me entrega [ROOT.Char.Custom('signature_weapon')] da melhor qualidade que tenho. Está tão afiada e polida que posso ver um reflexo do meu próprio rosto nela.\n\n"Deveríeis levar isto por seu próprio bem. Os dissidentes rondam nas sombras como ratos doentes, e cada vez que comparecemos a uma função pública, me pergunto se esta será a última".\n\nOlha para fora pela janela. "Talvez devêssemos aumentar as patrulhas da guarda... Há um gosto doentio no ar desta manhã, e estou com medo"."
 yearly.7001.a: "Isso vai perturbar os convidados! Isso é mera paranoia."
 yearly.7001.b: "Adicione mais algumas patrulhas para dar sorte."
 yearly.7001.c: "Você #EMP sabe#! de algo, [marshal.GetTitledFirstNameNoTooltip]?"
 yearly.7001.c.tt: "[marshal.GetTitledFirstNameNoTooltip|l] conta mais de suas suspeitas"
 yearly.7001.tt: "[marshal.GetTitledFirstNameNoTooltip|l] ignora suas perguntas"
 yearly.7001.d: "Encha o lugar de guardas. Não deixe nenhum cômodo sem vigiar!"
 yearly.7001.d.tt: "Você assusta todos que vêm à corte"
 yearly.7001.d.win.tt: "Você assusta facções que estão de olho em você"
 ## Letter of warning from your marshal who is a sympathizer
 yearly.7002: "Você está em perigo imediato, [ROOT.Char.Custom('FormOfAddressForLiege')]"
 yearly.7002.d: "Não sinto nada além de vergonha ao escrever estas palavras. [coup_leader.GetTitledFirstName|l] passou meses subornando seus guardas e planeja atentar contra sua vida diante da corte… Oxalá salvem sua vida, mas por mais que eu tente, não consigo deixar de sentir o coração sangrar pela causa da [coup_faction.GetName].\n\nFugi para o exílio. Não nos encontraremos novamente."
 yearly.7002.a: "Não posso confiar em ninguém!"
 yearly.7002.b: "Preciso confiar em alguns dos meus cavaleiros [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] mais próximos para me proteger!"
 yearly.7002.b.tt: "[knight_1.GetTitledFirstName] e [knight_2.GetTitledFirstName|l] são alguns dos meus melhores guerreiros. Espero que eles me protejam."
 yearly.7002.c: "Eu sei me defender sozinh[ROOT.Char.Custom('ES_OA')]!"
 yearly.7002.b.tt.2: "Você confia em dois de seus guardas"
 yearly.7002.c.tt: "Você mantém isso em segredo"
 #### Traitor knights carry you off in a sack
 yearly.7004.desc: ""Rápido, ele está acordando!"\n\nAo acordar, noto que meu travesseiro parece mais áspero do que o normal. Minha cabeça está girando, mas o resto do meu corpo vai junto e tudo permanece escuro. Não estou na minha cama, mas sendo arrastado pelo chão dentro de um saco.\n\n"Ele está se debatendo demais! Estou perdendo a minha firmeza o tempo todo."\n\nEnquanto as vozes discutem, eu me contorço o suficiente para eles largarem o saco. Quando me arrasto para fora, percebo que eles mal avançaram alguns passos além do jardim da minha residência."
 yearly.7004.tt: "As tramas da facção foram frustradas"
 yearly.7004.a: "Você chama isso de sequestro? Eu pelo menos esperaria que você chegasse em [neighbor_county.GetNameNoTier]."
 yearly.7004.b: "Traidores! Vocês ambos vão definhar em sacos na minha masmorra!"
 yearly.7004.c: "Me leve de volta para minha cama imediatamente!"
 yearly.7004.c.tt: "Você é devolvido ao saco e levado para sua câmara"
 #### Assassination attempt
 yearly.7005.preparation: "É quase emocionante, sentar e esperar o [coup_faction.GetName] atacar."
 yearly.7005.preparation_poor: "Decidi confiar em nenhum companheiro além da minha [ROOT.Char.Custom('SignatureWeaponNameOrType')], e iremos para [ROOT.Char.Custom('GetAfterLifeDestination')] juntos, se necessário."
 yearly.7005.preparation_good: "É ridículo que eles pensem que meros assassinos podem me matar."
 yearly.7005.knight_support: "[knight_1.GetTitledFirstName] e [knight_2.GetTitledFirstName|l] estão prontos para morrer por mim, mas eu tenho pena de quem pode enfrentar suas lâminas."
 yearly.7005.single_knight_support: "Confio nos meus [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] para me apoiar, afinal de contas."
 yearly.7005.decreased_security: "Todos os convidados no meu [ROOT.GetCharacter.Custom('FortifiedBuilding')] bebem [ROOT.Char.Custom('RegionalDrink')] e se fartam de fofocas sem se importar com nada."
 yearly.7005.increased_security: "O [ROOT.GetCharacter.Custom('FortifiedBuilding')] está silencioso, alguns grupos sussurram. Todos estão nervosos ao ver meu salão do trono cercado por guardas."
 yearly.7005.throne_approach: "[coup_leader.GetTitledFirstName] se aproxima do meu trono."
 yearly.7005.liberty_faction: "\"Parece que a única maneira de quebrar as correntes ao redor de nossos pescoços é cortar a minha e a sua.\""
 yearly.7005.independence_faction: "\n\n\"Se eu não posso ter meu próprio estado, pelo menos devo ser o herói da minha própria tragédia.\""
 yearly.7005.claimant_faction: "\"Você não tem o direito de languidecer em cima desse trono. Eu preferiria morrer a vê-lo fazer mais um decreto falso.\""
 yearly.7005.populist_faction: ""Lamento, eu juro, não poder senão conceder-lhe uma morte mais justa do que as agonias de todos os que foram esmagados sob o vosso pé. Ao menos meu fim será o de um[coup_leader.Custom('ES_XA')] [coup_leader.Custom('ES_HeroeHeroina')]"."
 yearly.7005.weapon: "\n\n puxa uma adaga escondida e avança rapidamente."
 yearly.7005.single_death: "Com uma investida assustadora, golpeia [first_character_kill.GetTitledFirstName|l]"
 yearly.7005.double_death: "Em uma erupção dupla, atinge [first_character_kill.GetTitledFirstName|l] e [second_character_kill.GetTitledFirstName|l]"
 yearly.7005.triple_death: "Para o horror de todos, ataca [first_character_kill.GetTitledFirstName|l], [second_character_kill.GetTitledFirstName|l] e [third_character_kill.GetTitledFirstName|l]."
 yearly.7005.coup_ruler_strike: "antes de correr para me atacar."
 yearly.7005.no_death: "Esta loucura ousada é rapidamente encerrada quando meus [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] [coup_leader.GetHerHim] cercam rapidamente."
 yearly.7005.failure: "Quando os guardas [coup_leader.GetHerHim] agarram, percebo que [coup_leader.GetSheHe] tenta furiosamente cravar a lâmina em seu próprio coração em vez de ser capturado."
 yearly.7005.ruler_death: "Seu sangue logo se mistura com o meu quando sinto a [coup_leader.Custom('SignatureWeaponNameOrType')] atingir meu peito."
 yearly.7005.success: "É tolice pensar que ele poderia tomar meu trono neste golpe minúsculo, mas quando ele vira a lâmina contra a própria garganta, percebo que isso nunca foi o que ele queria."
 yearly.7005.a: "Guardas, contenham[coup_leader.GetHerHim]; ela/ele não pode se tornar um mártir para os dissidentes."
 yearly.7005.b: "Deixe-o fazer isso."
 yearly.7005.c: "Você merece um destino muito pior do que morrer aqui!"
 yearly.7005.c.tt: "Você cega e aprisiona [coup_leader.GetTitledFirstName|l]"
 yearly.7005.d: "[coup_leader.GetHerHim|U] exiliar, para que conte como é difícil me matar."
 yearly.7005.d.tt: "Você receberá todos os títulos e vassalos de [coup_leader.GetTitledFirstName|l]"
 yearly.7005.devout.e: "Você nunca se juntará a mim em [ROOT.Char.GetFaith.PositiveAfterLife], miserável!"
 yearly.7005.e: "Eu vou te matar em [ROOT.Char.GetFaith.NegativeAfterLife], infame!"
 ##Participate in a football game,
 #Set up event
 yearly.7010.t: "O Jogo Bonito"
 yearly.7010.desc: "Uma viagem a uma das aldeias do meu domínio me levou a uma situação intrigante. O que parece ser a grande maioria da aldeia foi para a praça do mercado, e dois grupos heterogêneos de pessoas se formaram.\n\nEquidistante de ambos — visível da minha posição apenas graças ao aldeão de aspecto bastante apreensivo que a segura — parece haver uma bexiga de porco inflada.\n\nTalvez ao notar minha expressão de estranheza, um criado de câmara explica rapidamente a situação: acontece que se trata de um jogo popular!"
 yearly.7010.a: "Que fascinante! Quais são as regras?"
 yearly.7010.b: "Bem, é melhor deixá-los em paz."
 yearly.7010.tt.yes: "Investigue o que está acontecendo."
 yearly.7010.tt.win: "Isso pode ajudá-lo a vencer!"
 yearly.7010.tt.lose: "Escolher isso pode diminuir suas chances de vitória!"
 #Valet explains game
 yearly.7011.t: "O Jogo Bonito: Avaliando os Riscos"
 yearly.7011.desc: "Com certa ansiedade, meu fiel camareiro me informa das regras e normas do próximo evento. Acontece que esse jogo, chamado #EMP "fútbol"#!, é muito difundido e conta com todo tipo de pessoas.\n\nAparentemente, ambos os lados se esforçam para levar a \"bola\" — como é conhecida a bexiga do porco — para o lado da aldeia que seu grupo não está defendendo, por todos os meios necessários.\n\nEssa última parte foi enunciada com grande gravidade, e a explicação foi breve: embora as mortes sejam raras, os ferimentos não são."
 yearly.7011.a: "Você acha que tem um lugar para mim?"
 yearly.7011.b: "Passatempo típico de plebeus. Deixe-os com isso."
 yearly.7011.tt: "Traga-me as minhas botas!"
 #Pre-game: Literal Under Armour
 yearly.7012.t: "O Jogo Bonito: Todo o Equipamento..."
 yearly.7012.desc: "Enquanto estou entre os aldeões, vejo um[dummy_gender.Custom('ES_XA')] [dummy_gender.GetWomanMan] de meia-idade ajustando tiras de couro sob a túnica. Na verdade, agora que reparo, todo o seu abdômen parece volumoso demais para alguém de estatura tão esguia, com o peito e a barriga se comprimindo um tanto contra os limites das roupas. Ao notar meu interesse, sorri, faz um gesto para eu me aproximar e ergue o tecido.\n\nSob a túnica, envolvendo o corpo, há camadas de ripas rústicas de madeira na tentativa de formar uma armadura.\n\n"Eu chamo isso de #EMP 'armadura interna'#!!", diz orgulhos[dummy_gender.Custom('ES_OA')], com uma piscadela."
 yearly.7012.a: "Quanto você quer por isso?"
 yearly.7012.b: "Que premissa ridícula."
 #Pre-game: Wealthy merchant buys your best player
 yearly.7013.t: "O Jogo Bonito: Olhos nas Tortas"
 yearly.7013.desc: "Observando a multidão, vejo um[dummy_gender.Custom('ES_XA')] [dummy_gender.GetWomanMan] que parece curiosamente fora de lugar. Vestid[dummy_gender.Custom('ES_OA')] com ricas peles e com um pequeno séquito de pessoas, está engajad[dummy_gender.Custom('ES_OA')] [dummy_gender.GetWomanMan] em uma conversa animada com outr[dummy_gender.Custom('ES_DelDela')] [dummy_gender.Custom('ES_OA')]\n\n"foi um prazer fazer negócios com você. Agora garanta que minha aposta esteja segura!", sorri o comerciante de papada.\n\nAgora que semelhante grande [dummy_gender.GetWomanMan] começa a caminhar em direção ao grupo da outra equipe, parece que alguns não se importam com a santidade do jogo…"
 yearly.7013.a: "Espere! O que quer que [dummy_gender.GetSheHe] tenha pago a você, eu vou dobrar!"
 yearly.7013.b: "Nojento. Nunca teria acontecido em minha época!"
 yearly.7013.c: "Parece que teremos que ganhar sem [dummy_gender.GetSheHe]!"
 #Pre-game: Messing with pies
 yearly.7014.t: "O Jogo Bonito: Olhos nas Tortas"
 yearly.7014.desc: "Um[dummy_gender.Custom('ES_XA')] padeir[dummy_gender.Custom('ES_OA')] empreendedor[dummy_gender.Custom('ES_XA')] local claramente notou a movimentação do público, e suas duas carroças bambas cheias de tortas de carne recém-assadas estão em alta demanda.\n\nAo me aproximar da carroça em torno da qual a equipe adversária se aglomera, noto que os raios de uma das rodas estão praticamente se despedaçando. Mal me vem essa ideia à mente, surge uma oportunidade de colocá-la em prática, quando o sonoro estrondo de algo caindo do outro lado da praça faz com que todos se virem e fiquem boquiabertos.\n\nUm chute rápido naquele raio, e..."
 yearly.7014.desc.1: "Um[dummy_gender.Custom('ES_XA')] padeir[dummy_gender.Custom('ES_OA')] empreendedor[dummy_gender.Custom('ES_XA')] local claramente notou a movimentação do público, e suas duas carroças bambas cheias de tortas de carne recém-assadas estão em alta demanda.\n\nAo me aproximar da carroça em torno da qual a equipe adversária se aglomera, dou uma olhada nas prateleiras cheias de tortas fumegantes. Mal me vem essa ideia à mente, surge uma oportunidade de colocá-la em prática, quando o sonoro estrondo de algo caindo do outro lado da praça faz com que todos se virem e fiquem boquiabertos.\n\nMinha mão voa até a pequena bolsa de cicuta na minha cintura..."
 yearly.7014.a: "Vamos ver o quão bem você joga agora..."
 yearly.7014.b: "Oh não, todas as tortas caíram na sujeira!"
 yearly.7014.c: "Melhor não."
 yearly.7014.hemlock: "Vamos adicionar um ingrediente extra nas tortas..."
 #Pre-game: Performance-Enhancing Draughts
 yearly.7015.t: "O Belo Jogo: Poções de Melhoria de Desempenho"
 yearly.7015.desc: "Enquanto me preparo para o esforço que se aproxima, avisto um[dummy_gender.Custom('ES_XA')] [dummy_gender.GetWomanMan] à margem da multidão, tomando goles de uma garrafa de bolso, com os olhos atentos ao redor entre um gole e outro. Normalmente isso não seria muito suspeito, mas a furtividade dele é, e ainda mais quando se encolhe diante do meu toque inquisitivo no ombro.\n\nSeja lá o que for que ele esteja bebendo, não é água: o líquido é um tanto opaco, e fica claro pela careta sempre que seus lábios o tocam que certamente não tem um gosto agradável. Felizmente, ele está quase ansios[dummy_gender.Custom('ES_OA')] para revelar seus segredos quando é gentilmente pressionado.\n\n"Melhora de desempenho", você diz?"
 yearly.7015.a: "Quanto você quer por isso?..."
 yearly.7015.b: "Você deveria ter vergonha!"
 #Game starts!
 yearly.7020.t: "O Belo Jogo: Início"
 yearly.7020.desc: "Uma vez resolvidas todas as formalidades pré-jogo, só resta iniciar o evento. O arauto, inclinado perigosamente para fora da janela do primeiro andar de uma casa com vista para a praça, faz passar a bexiga de porco pela abertura.\n\nA multidão olha expectante e, após uma breve pausa, a "bola" levanta voo.\n\nComeça a debandada."
 yearly.7020.a: "Siga-me, equipe!"
 yearly.7020.b: "AAAAAAAAAAARGGGHHHH!"
 #First half: A villager comes at you with a rock!
 yearly.7021.t: "O Belo Jogo: Ataque de Pedras"
 yearly.7021.desc: "Esse suposto "jogo" é muito mais do que eu esperava. A reputação de violência também não é injustificada.\n\nÀ minha esquerda, um[dummy_gender.Custom('ES_XA')] [dummy_gender.GetWomanMan] submete outr[dummy_gender.Custom('ES_OA')] a uma chave de cabeça improvisada, e os dois passam cambaleando por uma briga de socos entre - ao que parece - quatro pessoas ao mesmo tempo.\n\nEnquanto me afasto dessa confusão específica, outro aldeão - com os olhos arregalados sob uma máscara de sangue que escorre de um corte na testa - se aproxima de mim com uma pedra na mão."
 yearly.7021.a: "Ei! Isso é ilegal!"
 yearly.7021.b: "EU VOU FAZER VOCÊ COMER ESSA PEDRA!"
 yearly.7021.c: "Hora de sair daqui!"
 yearly.7021.a.tt.win: "Você afasta a pedra!"
 yearly.7021.a.tt.lose: "Você não consegue se defender"
 yearly.7021.c.tt.escape: "Você escapa ileso"
 yearly.7021.c.tt.escapefail: "Você não consegue escapar"
 #First half: Player is getting seduced by a winsome lad/lass
 yearly.7022.t: "O Belo Jogo: Uma Bela Espectadora"
 yearly.7022.desc: "O time adversário está com a bola! Quem a carrega é um[dummy_gender.Custom('ES_XA')] jovem atraente[dummy_gender.Custom('ES_OA')] e também astuto[dummy_gender.Custom('ES_OA')]; depois de se apoderar da bola, ele está escalando uma casa para fugir da multidão aos berros lá embaixo.\n\nEmbora seu plano pareça à prova de falhas no começo, parece que ele não contou com seus desejos mais baixos; enquanto me viro para ficar à sua altura na fachada da casa, fica claro que ele está distraído[dummy_gender.Custom('ES_OA')] por um[same_gender.Custom('ES_XA')] [same_gender.GetWomanMan] particularmente atraente[same_gender.Custom('ES_OA')] na janela.\n\nParece que os dois ficaram completamente encantados um pelo outro. Estou a um braço de distância...[dummy_gender.Custom('ES_OA')]"
 yearly.7022.a: "Meu!"
 yearly.7022.b: "Ah, o amor jovem!"
 yearly.7022.c: "Ha! Vou lhes mostrar como é uma verdadeira[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] de verdade!"
 #First half: Punching a priest
 yearly.7023.t: "O Belo Jogo: A Mão de [ROOT.Char.GetFaith.HighGodName]"
 yearly.7023.desc: "A bexiga de porco está solta! Um par de mãos nervosas a deixa escapar, e ela quica uma vez antes de ser agarrada por… um membro dos [ROOT.Char.GetFaith.AltPriestTermPlural]?\n\nSorri e cambaleia para a frente, com a multidão se afastando de [dummy_clergy_gender.GetSheHe], com incerteza. Ninguém sabe muito bem o que pensar desta pessoa sagrada participando de um jogo tão violento e, além disso, aparentemente se safando!\n\nDou um passo à frente, com desconfiança…"
 yearly.7023.a: "...e dou um soco bem na cara."
 yearly.7023.b: "e me afasto. Que outra pessoa se ocupe de [dummy_clergy_gender.GetSheHe]."
 #First half: Damaging a local building
 yearly.7024.t: "O Belo Jogo: Palha do Feno"
 yearly.7024.desc: "A multidão avança e se choca contra as paredes de uma casa próxima como uma onda. À medida que o grupo recua das paredes, várias pessoas se agarram a qualquer saliência que conseguem enquanto outras tentam arrancá-las dali para chegar até quem carrega a bola.\n\nO som de madeira estilhaçando e taipa cedendo ecoa pela praça do mercado, e, quando a multidão recua, várias seções do telhado de palha da casa desabam no chão."
 yearly.7024.a: "Vou pagar pelas reformas!"
 yearly.7024.b: "Tudo é justo no amor e no futebol!"
 #Second half: Diving scum
 yearly.7030.t: "O Belo Jogo: Nunca Uma Penalidade"
 yearly.7030.desc: "À medida que o jogo avança, cada vez mais aldeões precisam abandonar a disputa. Alguém cambaleia ao meu lado, com hematomas já evidentes na cabeça.\n\nDe repente, mais um homem do grupo cai aos meus pés com um grito ensurdecedor. O barulho é suficiente para distrair até os participantes, e tanto a multidão quanto eu nos afastamos de suas contorções, embora eu pudesse #EMP jurar#! que vi um olho se abrir ali...\n\nAssim que a multidão deixa passar luz suficiente, o homem "ferido" salta de pé, apanha a bola e dispara pela praça em minha direção!"
 yearly.7030.a: "Eu-... o que-... #EMP juiz!#!"
 yearly.7030.b: "Trapaceiro! Eu vou pegá-lo!"
 yearly.7030.c: "Oh, bom ver que ele se recuperou rapidamente!"
 yearly.7030.b.win: "Você pega o trapaceiro"
 yearly.7030.b.lose: "Você perde o trambiqueiro"
 #Second half: Bladed boots
 yearly.7031.t: "O Belo Jogo: Mordida no Tornozelo"
 yearly.7031.desc: "O jogo continua, e percebo que as fileiras da minha equipe começam a diminuir. Vários participantes estão espalhados pela praça do mercado, todos cuidando de lesões no tornozelo. Lesões #EMP sérias#! no tornozelo, pelo que parece. Enquanto luto com aqueles ao meu redor, um brilho próximo ao chão chama minha atenção, e percebo com certo horror exatamente o destino que se abateu sobre meus camaradas.\n\nAlgum aldeão particularmente sanguinário costurou pequenas lâminas nos sapatos e, mesmo enquanto observo, as crava brutalmente nas canelas de outra pessoa. Considero avançar para confrontá-lo."
 yearly.7031.a: "Tire esses sapatos deles!"
 yearly.7031.b: "Eu gosto dos meus tornozelos do jeito que estão!"
 yearly.7031.c: "Que ideia inovadora..."
 yearly.7031.a.win: "Você arranca os sapatos deles"
 yearly.7031.a.lose: "Eles chutam suas canelas!"
 #Second half: Drinks break
 yearly.7032.t: "O Belo Jogo: Intervalo para Bebidas"
 yearly.7032.desc: "A multidão se inclina para o lado, me expulsando de suas profundezas com alguma força. Cambaleando até uma parede para recuperar minha orientação e meu fôlego, avisto um casal de comerciantes carregados com várias bebidas. Eles devem estar fazendo bons negócios, dado o quão árduo é esse trabalho!\n\nEu poderia fazer uso de algum sustento, acontece que estou com sede. Fico imaginando o que eles têm à venda?"
 yearly.7032.a: "Água refrescante! Perfeito!"
 yearly.7032.b: "Uma cerveja serviria bem!"
 yearly.7032.c: "Por acaso, vocês têm alguma [ROOT.Char.Custom('RegionalDrink')]?"
 yearly.7032.d: "Esses bolos de haxixe estão à venda?"
 #Second half: Bowyer and dyer fight
 yearly.7033.t: "O Belo Jogo: Para Morrer de Rir"
 yearly.7033.desc: "Lutar contra os adversários durante esses jogos é extremamente comum, mas vejo com certa confusão o que parecem ser dois dos meus companheiros de equipe lutando #EMP entre si#!. Reconheço os dois; um é o fabricante de arcos local, o outro é um tintureiro. Os dois estão presos em um combate feroz, tanto que seus companheiros de equipe começaram a perceber.\n\nEssa disputa mesquinha está começando a prender uma parte significativa da minha equipe, e a massa de pessoas começa a avançar para o lado da aldeia que estamos defendendo..."
 yearly.7033.a: "Tudo bem, acabem com isso!"
 yearly.7033.b: "Não estou a fim de interromper brigas triviais."
 yearly.7033.a.win: "Você separa com sucesso os brigões"
 yearly.7033.a.lose: "A briga se intensifica"
 #Match resolution holding event
 yearly.7040.t: "O Belo Jogo: Placar Final"
 yearly.7040.desc: "À medida que o dia avança, a movimentação do jogo atinge seu auge. Ambos os lados avançam atrás da bola, e eu me vejo no meio de um desses redemoinhos no fluxo de gente.\n\nEu tropeço e caio, protegendo a cabeça dos pés que pisoteiam, apenas para me erguer de joelhos e encontrar uma calma incomum tomando conta da praça do mercado.\n\nParece que o jogo acabou."
 yearly.7040.a: "Nós... nós ganhamos?"
 #Glorious victory
 yearly.7041.t: "O Belo Jogo: Vitória Gloriosa!"
 yearly.7041.desc: "Minha equipe me levanta e me põe de pé, e seus aplausos fazem meu coração inchar até quase explodir! Não foi apenas uma vitória; foi uma #EMP surra#!, e você teve uma participação nada pequena nisso!\n\nNossos oponentes começam a "
 yearly.7041.a: "Que jogo emocionante!"
 yearly.7041.b: "Vou encomendar uma lembrança!"
 yearly.7041.desc.ending: "afastar-se desanimado da área, mas a festa está apenas começando para os vencedores. Um grande barril de [ROOT.Char.Custom('RegionalDrink')] já tomou o centro da praça, e as bebidas correm livremente para as celebrações que sem dúvida vão se estender até a noite."
 #Victory
 yearly.7042.t: "O Belo Jogo: Vitória!"
 yearly.7042.desc: "Eu cambaleio até ficar em pé e tento focar a vista, atordoado, enquanto pessoas passam ao meu redor. No centro da praça, um grupo está comemorando; levo alguns segundos para perceber que, na verdade, são meu time!\n\nNossos oponentes começam a"
 yearly.7042.a: "Que jogo emocionante!"
 yearly.7042.b: "Vou encomendar uma lembrança!"
 #Draw
 yearly.7043.t: "O Belo Jogo: Empate"
 yearly.7043.desc: "Cambaleando até ficar de pé, ainda me vejo cercad[ROOT.Char.Custom('ES_OA')] por uma enorme multidão. A diferença parece estar na urgência dos movimentos de todos, já que os jogadores vão se afastando apaticamente da área.\n\nCom o sol baixo no céu, parece que o jogo terminou, sem que se tenha alcançado um resultado decisivo."
 yearly.7043.a: "Ah, tudo bem. Nós os pegaremos na próxima vez!"
 #Defeat
 yearly.7044.t: "O Belo Jogo: Derrota!"
 yearly.7044.desc: "Cambaleio até ficar de pé e tento focar a vista, meio zonzo, enquanto as pessoas passam ao meu redor. No centro da praça, um grupo está comemorando; levo alguns segundos para entender que... é o time adversário.\n\nMeu time começa a"
 yearly.7044.a: "Parabéns aos vencedores!"
 yearly.7044.b: "Bah! Deveríamos ter ganhado!"
 yearly.7044.c: "Eu mereço um troféu de qualquer forma!"
 #Heavy Defeat
 yearly.7045.t: "O Belo Jogo: Derrota Avassaladora!"
 yearly.7045.desc: "Passos estrondosos ecoam ao longe, e eu me esforço para me levantar e entender o motivo. Não muito longe dali, na praça, o time adversário ergue a bola no alto, triunfante, enquanto aplaude. Não é apenas uma derrota; é uma destruição total.\n\nMeu time começa a"
 yearly.7045.a: "Parabéns aos vencedores!"
 yearly.7045.b: "Bah! Deveríamos ter ganhado!"
 yearly.7045.c: "Eu mereço um troféu de qualquer forma!"
 ##Foggy Hill
 #There used to be a hole here
 yearly.7050.t: "Buraco Onde?"
 yearly.7050.desc: "Encontro [unfortunate_soul.Custom('ES_ElLa')] [unfortunate_soul.GetTitledFirstName|l] no corredor, olhando fixamente para a parede. Pergunto com curiosidade o que está fazendo.\n\nSeu olhar se volta para mim com um tique alarmante: "Antes havia um buraco aqui, sabia?", exclama [unfortunate_soul.Custom('ES_ElLa')] [unfortunate_soul.GetTitledFirstNameNoTooltip|l] com firmeza.\n\nOlho para a parede à sua frente e sou incapaz de encontrar o menor vestígio do buraco de que fala."
 yearly.7050.a: "Onde está o... buraco?"
 yearly.7050.a_paranoid: "Preciso saber mais."
 yearly.7050.a.flavor: "Que ideia intrigante."
 yearly.7050.b: "Isso é um absurdo."
 yearly.7050.b.flavor: "[unfortunate_soul.GetShortUIName] deve estar delirando."
 yearly.7050.c: "Pare de desperdiçar meu tempo!"
 #A bad dream?
 yearly.7051.t: "Colina Enevoada"
 yearly.7051.desc: "A neblina está tão espessa que dá para cortar com uma faca, e olho ao redor em uma fraca tentativa de me orientar. Já estive aqui antes? Isto é um... campo de batalha?\n\nMinhas mãos tremem enquanto tento entender a situação, e dou alguns passos à frente. Consigo ouvir um som à distância; uma voz chamando: "Vocês viram um menino pequeno?"\n\nDe repente, começo a distinguir rostos na neblina. São... as pessoas que eu matei? Elas aparecem congeladas em uma careta terrível."
 yearly.7051.a: "É tudo culpa minha..."
 yearly.7051.a.flavor: "Você aceita a responsabilidade."
 yearly.7051.b: "Eles mereceram. TODOS eles."
 yearly.7051.b_conviction.desc: "Você consegue se convencer disso."
 yearly.7051.b_unconvinced.desc: "Você tem um colapso."
 #Waking up
 yearly.7052.t: "Como um Sonho"
 yearly.7052.desc_unconvinced: "Acordo, ensopad[ROOT.Char.Custom('ES_OA')] em suor. Foi, se não o pior, certamente um dos sonhos mais terríveis de que me lembro.\n\nMinhas mãos ainda tremem com o estresse causado pelo sonho, enquanto rememoro seu conteúdo. "Certamente as coisas não podem piorar muito mais do que isso", murmuro, enquanto me viro, numa tentativa patética de voltar a dormir."
 yearly.7052.desc: "Acordo, surpreendentemente seren[ROOT.Char.Custom('ES_OA')]. Foi um sonho interessante — embora não tenha sido especialmente agradável, já tive sonhos piores na vida.\n\nPenso cuidadosamente no conteúdo dele e então me viro para o outro lado, logo voltando a cair em um sono relaxante."
 yearly.7052.a: "Foi apenas um sonho ruim."
 yearly.7052.a_positive: "Que sonho estranho."
 #Denial
 yearly.7053.t: "Que Buraco é Esse?"
 yearly.7053.desc: "O corredor está banhado pela luz do dia, enquanto sigo em direção à cozinha. De repente, pelo canto do olho, vejo um #EMP buraco#! na parede.\n\nFico paralizad[ROOT.Char.Custom('ES_OA')] enquanto olho para o buraco com um olhar curioso, porém perspicaz. Não é um buraco grande, talvez do tamanho de um braço. Mas é completamente escuro.\n\nAproximo-me cuidadosamente do buraco e tento espiar lá dentro, confus[ROOT.Char.Custom('ES_OA')] sobre sua origem e propósito."
 yearly.7053.a: "O zelador deve saber mais sobre isso."
 yearly.7053.b: "Acho que vejo algo..."
 yearly.7053.b_pouch.desc: "Você puxa um saco de moedas de ouro do buraco."
 yearly.7053.b_scratch.desc: "Algo arranha seu braço."
 #Coming to
 yearly.7054.t: "Um Despertar Brusco"
 yearly.7054.intro: "Um[7054_servant.Custom('ES_OA')] de minhas serviç[7054_servant.Custom('ES_EA')]as me sacode cuidadosamente para me despertar. [7054_servant.GetSheHe|U] me olha com angústia e exclama: "[ROOT.Char.Custom('FormOfAddressForLiege')|U]! Está tudo bem?", enquanto dou uma olhada pelo corredor, atordoad[ROOT.Char.Custom('ES_OA')].\n\nDesmaiei?"
 yearly.7054.desc_pouch: "Ainda em minha mão, aperto o saco com ouro que consegui puxar do... buraco?"
 yearly.7054.desc_scratch: "Há uma sensação de queimação no meu braço; o mesmo que coloquei no... buraco?"
 yearly.7054.desc: "Lembro vagamente de algo sobre uma conversa que deveria ter com o zelador... sobre um buraco?"
 yearly.7054.outro: "\n\nLevantando-me apressadamente, encaro a parede. \"Havia um buraco aqui\", murmuro enquanto meu olhar percorre as paredes brilhantes do corredor."
 yearly.7054.a: "… Eu devo ter imaginado coisas."
 yearly.7054.a.flavor_pouch: "Seguro o saco firmemente."
 yearly.7054.a.flavor_scratch: "A queimadura emanando do arranhão no meu braço intensifica-se."
 yearly.7054.a.flavor: "Percebo que [7054_servant.Custom('ES_ElLa')] sirvient[7054_servant.Custom('ES_EA')], agora cauteloso[7054_servant.Custom('ES_OA')], me observa."
 #It was the dog all along
 yearly.7055.t: "Um Abrigo para um Cão"
 yearly.7055.desc: "Ao atravessar o pátio, um cão vira-lata sai correndo do nada e para bem na minha frente. Há uns estranhos pedaços de metal presos à coleira.\n\nEle me olha com expectativa enquanto observo seus olhos castanhos, ligeiramente incomodad[ROOT.Char.Custom('ES_OA')] com a interrupção. No entanto, minha irritação desaparece rapidamente, e tenho a estranha sensação de que o cão está controlando... coisas?\n\nEstou perdendo a cabeça, penso, enquanto pego a coleira do cão e retiro os ridículos pedaços de metal. Quando me viro para ir embora, o animal me encara com severidade. Acho que... agora ele me pertence?"
 yearly.7055.a: "Aqui, cachorro."
 yearly.7055.b: "Vá #EMP embora#!, seu cachorro sarnento!"
 yearly.7055.b.flavor: "O cachorro olha para você com tristeza nos olhos."
