l_spanish:
 yearly_persian.1002.t: "Nowruz"
 yearly_persian.1002.desc: "Embora minha corte celebre o festival [iranian.GetName] de Nowruz todos os anos, meus deveres como [ROOT.Char.GetTitleAsNameNoTooltip] muitas vezes me impedem de participar dos festejos.\n\nO equinócio se aproxima e meu senhorio está próspero e estável. Pergunto-me se não deveria dedicar algum tempo extra este ano para sair de minha residência e entrar no espírito da festa."
 yearly_persian.1002.a: "Vou honrar Jamshid com generosos presentes de gemas e ouro!"
 yearly_persian.1002.b: "Esta é uma ocasião alegre, melhor aproveitada visitando outras pessoas!"
 yearly_persian.1002.c: "Concentrar-me no ritual tradicional Haft-sin com minha família."
 yearly_persian.1002.d: "Não posso descansar, há muito trabalho a fazer!"
 yearly_persian.1002.every_iranian_character: "Todo vassalo e cortesão de [heritage|lE] [iranian.GetName]"
 yearly_persian.1002.every_friend_and_neighboring_ruler: "Todo [friend|lE] e [ruler|lE] vizinho"
 yearly_persian.1002.every_spouse_and_close_family_member: "Todo [spouse|lE] e [close_family_member|lE]"
 yearly_persian.1101.t: "Shu'ubiyya"
 yearly_persian.1101.desc.arabic: "Junto com a disseminação do Islã, a cultura árabe também se espalhou a partir da Península Arábica."
 yearly_persian.1101.desc.seljuk: "Desde a grande conquista seljúcida, nossa história e cultura têm se espalhado entre nossos novos súditos."
 yearly_persian.1101.desc.ending: "\n\nMuitas tribos e culturas adotaram o idioma [ROOT.Char.GetCulture.GetName] e nossas tradições, mas os persas do Planalto Iraniano resistem ferozmente a essa propagação.\n\nSuas tradições, oriundas dos legados dos grandes Impérios Aquemênida e Sassânida, são motivo de imenso orgulho para eles e querem preservar sua história e sua ancestralidade, mesmo diante do domínio estrangeiro."
 yearly_persian.1101.every_county: "Cada Condado [persian.GetName]"
 yearly_persian.1101.every_family: "Cada [close_family_member|lE]"
 yearly_persian.1101.a: "Forçarei todos eles a se submeterem à supremacia de [ROOT.Char.GetCulture.GetNameNoTooltip]!"
 yearly_persian.1101.b.seljuk: "Se eu adotar #EMP seus#! costumes, eu poderia fundar o terceiro Império Persa!"
 yearly_persian.1101.c: "Somos abençoados por ter súditos de origens tão diversas!"
 yearly_persian.1101.c.warning: "$stewardship_domain.1073.c.warning$"
