l_spanish:
 yearly.3001.t: "Um Alerta Útil"
 yearly.3001.desc: "Recebi uma missiva de [neighbor.GetName]. Afirma que [vassal.GetTitledFirstName|l], meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('vassal'))], pediu apoio em uma conspiração contra mim!\n\n\"Não há nada que eu preze mais do que a lealdade\", diz a carta de [SCOPE.sC('neighbor').GetFirstName], \"por isso compartilho isto com você\"."
 yearly.3001.friend_backs_neighbor: "\n\nFelizmente, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('friend'))] [SCOPE.sC('friend').GetFirstName] está aqui para me aconselhar. "Eu já desconfiava de [vassal.GetFirstNameNoTooltip]. Isso praticamente confirma"."
 yearly.3001.friend_backs_vassal: "\n\nPor sorte, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('friend'))] [SCOPE.sC('friend').GetFirstName] está aqui para me aconselhar. "Me recuso a acreditar que [vassal.GetFirstNameNoTooltip] se rebaixe a isso"."
 yearly.3001.a: "Vou me confrontar com [vassal.GetFirstNameNoTooltip] pessoalmente."
 yearly.3001.confront: "[vassal.GetSheHe|U] fica sabendo da minha suspeita"
 yearly.3001.true_tt: "Minha acusação é verdadeira"
 yearly.3001.false_tt: "Minha suspeita é infundada"
 yearly.3001.false_use_tt: "[vassal.GetTitledFirstNameNoTooltip|l] usará o insulto a seu favor"
 yearly.3001.b: "¡[vassal.GetSheHe|U] é culpado e [vassal.Custom('ES_LoLa')] acusarei publicamente!"
 yearly.3001.c: "Não podemos confiar em [neighbor.GetTitledFirstNameNoTooltip|l]. Meus vassalos têm meu total apoio!"
 yearly.3001.c.if_wrong_tt: "Se [vassal.GetFirstNameNoTooltip] for desleal"
 yearly.3001.c.if_right: "Se [vassal.GetFirstNameNoTooltip] for leal"
 yearly.3001.vassal_gains_strength: "O complô de [vassal.GetTitledFirstNameNoTooltip|l] se torna mais forte"
 yearly.3001.d: "Eu #EMP sabia#!! [vassal.GetFirstNameNoTooltip] vai pagar!"
 yearly.3002.t: "Confissão"
 yearly.3002.desc: "[vassal.GetTitledFirstName] não pode fazer nada além de confessar quando é confrontado com a carta de [SCOPE.sC('neighbor').GetTitledFirstName|l].\n\n“Nunca foi… Não era… Como posso consertar isso de novo?” [vassal.GetFirstNameNoTooltip] [vassal.Custom('quirk_neg_present')], mas posso ver o medo estampado no rosto de"
 yearly.3002.a: "Faça tudo o que eu disser, e você será poupado."
 yearly.3002.b: "Eu perdoo, se você deixar as pessoas saberem da minha generosidade."
 yearly.3003.t: "Uma Acusação Insultante"
 yearly.3003.desc: "Quando apresento a carta [neighbor.Custom('ES_DelDela')] [neighbor.GetTitledFirstNameNoTooltip|l] a [vassal.GetTitledFirstName|l], a princípio a recebe com confusão, depois com ira. "Vocês acreditam nas palavras dele em vez das minhas? Eu não vos servi sempre fielmente?".\n\nSua indignação planta uma semente de dúvida em minha mente. Talvez eu tenha agido rápido demais. Preciso reparar o dano antes de arruinar ainda mais este relacionamento!"
 yearly.3003.friend: "\nPor sorte, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('friend'))] intervém. "Isto é só para avisar-vos das calúnias de [neighbor.GetTitledFirstName|l]", diz [friend.GetTitledFirstName|l]."
 yearly.3003.a: "Sim. Na verdade, quero recompensá-lo por sua lealdade!"
 yearly.3003.b: "Você sempre foi um bom servo."
 yearly.3003.public_expression_of_gratitude: "Expressão Pública de Gratidão"
 yearly.3003.vassal_loss_of_faith: "Desculpa Insincera"
 yearly.3003.c: "Sim, o que [SCOPE.sC('friend').GetFirstNameNoTooltip] disse!"
 yearly.3003.c.enable: "Esta opção está disponível devido à alta Diplomacia de [SCOPE.sC('friend').GetTitledFirstNameNoTooltip|l]"
 yearly.3004.t: "À Vista de Todos"
 yearly.3004.desc: "Em uma reunião com muitos dos meus vassalos, proclamo ter descoberto a traição de [vassal.GetTitledFirstName|l].\n\nMuitos dos meus outros vassalos se levantam em meu apoio. \"Todos sabemos que é verdade. O que será de [vassal.Custom('ES_ElElla')]?\"."
 yearly.3004.a: "[vassal.GetFirstNameNoTooltip] fará as pazes."
 yearly.3004.b: "Farei questão de que não possa me prejudicar."
 yearly.3004.c: "Vou me encarregar #EMP con creces#! de que não possa me prejudicar."
 yearly.3005.desc: "Em uma reunião com vários dos meus vassalos, declaro que descobri a traição de [vassal.GetTitledFirstName|l]. No entanto, os demais vassalos estão longe de ficar satisfeitos com a carta de um[neighbor.Custom('ES_XA')] [SCOPE.sC('neighbor').GetLadyLord] estrangeir[neighbor.Custom('ES_OA')].\n\n[vassal.GetFirstName] fala por eles. "Que provas há? Se uma carta bastasse, não seríamos #EMP todos#! culpados?". O grupo murmura em concordância. Isso está saindo do controle!"
 yearly.3005.a: "É melhor eu tomar a iniciativa!"
 yearly.3005.a.rousing_speech: "Um Discurso Empolgante Sobre Lealdade"
 yearly.3005.a.stumbling_apology: "Uma Desculpa Atabalhoada"
 yearly.3005.b: "Declarei que ele/ela é um[vassal.Custom('ES_XA')] traidor[vassal.Custom('ES_XA')] e será tratado(a) como tal!"
 yearly.3011.t: "Uma Impressão Feita Duas Vezes"
 yearly.3011.desc: "Antes de outro banquete em honra do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('liege'))], [liege.GetTitledFirstName|l], [vassal.GetTitledFirstName|l] me faz uma visita.\n\n"Nenhum de nós dois está nas melhores graças de [liege.GetTitleAsNameNoTooltip]", ele aponta, "mas se oferecermos um espetáculo espetacular no banquete, talvez possamos melhorar nossa posição com [liege.Custom('ES_ElElla')]"."
 yearly.3011.a: "Vou providenciar o ouro para essa empreitada!"
 yearly.3011.a.success: "Um Espetáculo Glorioso"
 yearly.3011.a.failure: "Suficientemente Entretido"
 yearly.3011.b: "Posso encontrar os artistas que precisamos."
 yearly.3011.c: "Acho melhor focar nas pequenas coisas."
 yearly.3011.d: "Eu sei exatamente como criar um espetáculo."
 yearly.3012.desc: "Corpos balançando e se contorcendo, os dançarinos que [vassal.GetTitledFirstName|l] e eu contratamos deixam todo mundo atônito. Depois da refeição, [liege.GetTitledFirstName|l] em pessoa se aproxima de mim. \"Foi realmente algo impressionante, [ROOT.Char.GetFirstNameNoTooltip]\".\n\n[vassal.GetFirstName] e eu não conseguimos evitar trocar sorrisos."
 yearly.3012.a: "Fico imaginando o que devemos fazer a seguir..."
 yearly.3012.b: "Esta foi uma ideia muito boa, [vassal.GetFirstNameNoTooltip]."
 yearly.3013.desc: "Apesar de todas as pernas se movendo em círculos e os braços girando, [liege.GetTitledFirstName|l] não parece estar muito impressionado com os dançarinos que [vassal.GetTitledFirstName|l] e eu contratamos para o banquete. O/A [liege.GetTitleAsNameNoTooltip] os observa com um sorriso por um momento, mas depois volta sua atenção para a comida.\n\n[vassal.GetFirstName] me olha com incerteza, mas [liege.GetFirstName] parece bastante content[liege.Custom('ES_OA')]."
 yearly.3013.a: "De qualquer forma, cuidaremos um do outro."
 yearly.3013.b: "Pelo menos tentamos o nosso melhor."
 yearly.3014.desc: "Os dançarinos que [vassal.GetTitledFirstName|l] e eu contratamos são um desastre. Agitando-se e saltando, eles parecem mais uma trupe de comédia do que o elegante espetáculo que nos prometeram. E a [liege.GetTitledFirstName|l] não parece contente por ser perturbado no meio do jantar.\n\nQuando fazem as dedicatórias para nós, percebo que não é o mesmo grupo com o qual negociamos! Quem poderia ter…?\n[nemesis.GetTitledFirstName|l]!"
 yearly.3014.a: "Deixe-me contar sobre o vilão que arruinou isso, [vassal.GetFirstNameNoTooltip]."
 yearly.3014.b: "Isso não é culpa nossa, [vassal.GetFirstNameNoTooltip]."
 yearly.3021.t: "Em Seu Leito de Morte"
 yearly.3021.desc: "Agora está claro que [deathbed_character.GetTitledFirstName|l] meu velh[deathbed_character.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('deathbed_character'))], não permanecerá por muito tempo neste mundo.\n\nAo me aproximar de seu leito de morte, sei que ele viveu uma longa vida. Ainda assim, nunca há tempo suficiente para se despedir, não é? Seguro sua mão até que ela esfrie e seu último suspiro se aquiete."
 yearly.3021.a: "Que você encontre paz na vida além desta, [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('deathbed_character'))]."
 yearly.3031.t: "Avançando"
 yearly.3031.desc: "Tanto [SCOPE.sC('fellow_vassal').Custom2('MyCharacterIntroduction', ROOT.Char)] como eu contamos com a estima de noss[liege.Custom('ES_OA')] senhor[liege.Custom('ES_XA')] [liege.GetTitledFirstName|l]. No entanto, quando chega a hora de distribuir títulos, honras e riquezas, um de nós sempre será o primeiro entre iguais.\n\nA próxima reunião na residência de [capital.GetNameNoTierNoTooltip] me dá a oportunidade de garantir que eu seja quem receba o favor de [liege.GetTitleAsNameNoTooltip]."
 yearly.3031.friend: "Ter m [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('best_friend'))] [best_friend.GetTitledFirstName|l] ao meu lado certamente ajudará também."
 yearly.3031.rival: "No entanto, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('nemesis'))] [nemesis.GetTitledFirstName|l] não fez segredo do fato de que planeja sabotar meus esforços!"
 yearly.3031.a: "Como um bom conversador, isso deve ser fácil."
 yearly.3031.a.best_friend_success: "[best_friend.GetFirstNameNoTooltip] Distrai [fellow_vassal.GetFirstNameNoTooltip]"
 yearly.3031.a.success: "Torno-me amigo do [liege.Custom('ES_DelDela')] [liege.GetTitleAsNameNoTooltip]"
 yearly.3031.a.failure: "[fellow_vassal.GetFirstNameNoTooltip] conquista a amizade de [liege.Custom('ES_DelDela')] [liege.GetTitleAsNameNoTooltip]"
 yearly.3031.a.nemesis_failure: "[nemesis.GetFirstNameNoTooltip] Difamação Contra Mim"
 yearly.3031.b: "Vou ilustrar que [ROOT.Char.GetFaith.HighGodName] já me favorece."
 yearly.3031.b.success: "Impressiono [liege.Custom('ES_AlAla')] [liege.GetTitleAsNameNoTooltip]"
 yearly.3031.b.failure: "O/A [liege.GetTitleAsNameNoTooltip] fica mais impressionad[liege.Custom('ES_OA')] com [fellow_vassal.GetFirstNameNoTooltip]"
 yearly.3031.c: "Eu sei como chamar a atenção de [liege.GetFirstNameNoTooltip]…"
 yearly.3031.c.unlock_tt: "Essa opção está disponível devido à minha atratividade para [liege.GetTitledFirstNameNoTooltip|l]"
 yearly.3031.c.consequence: "[liege.GetFirstNameNoTooltip] pode me perseguir ainda mais"
 yearly.3031.c.success: "Atraindo Atenção"
 yearly.3031.d: "Nós vassalos devemos trabalhar juntos, não uns contra os outros!"
 yearly.3040.t: "Um Bom [ROOT.Char.GetFaith.GetAdjectiveNoTooltip]"
 yearly.3040.desc: "Sou conhecido como um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] profundamente piedoso[ROOT.Char.Custom('ES_OA')]. Tenho certeza de que minha devoção a [ROOT.Char.GetFaith.HighGodName] também me ajudará nesta vida, e não apenas na próxima, não é?\n\nHá várias pessoas a quem faria bem lembrar que conto com o favor de [ROOT.Char.GetFaith.HighGodNameAlternatePossessive]."
 yearly.3040.a: "Minha dedicação deveria ser proclamada dos telhados!"
 yearly.3040.b: "Tenho sido muito indulgente com o [ROOT.Char.GetFaith.HouseOfWorship] este ano..."
 yearly.3040.c: "Certamente o/a [religious_head.GetTitleAsNameNoTooltip] apreciará um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetLadyLord] devot[ROOT.Char.Custom('ES_OA')]!"
 yearly.3040.d: "Os [ROOT.Char.Custom('DefaultPriestTitlePlural')] já estão em êxtase comigo."
 yearly.3041.opening: "[vassal.Custom2('AppropriateGreeting', ROOT.Char)]"
 yearly.3041.desc: "Sei que sois um[liege.Custom('ES_OA')] servidor devot[liege.Custom('ES_OA')] de [ROOT.Char.GetFaith.HighGodNameAlternate]. Portanto, espero que vejais com simpatia o fato de que nosso dever para convosco sobrecarrega nossa capacidade de fazer a obra [ROOT.Char.GetFaith.HighGodNamePossessive].\n\nPoderíamos ser dispensados de algumas de nossas obrigações mais pesadas?"
 yearly.3041.a: "Minhas arcas sempre estão abertas para [ROOT.Char.GetFaith.HighGodName]."
 yearly.3041.b: "Concentre seu pessoal em outro lugar."
 yearly.3041.c: "Sou #EMP yo#! quem faz a obra [ROOT.Char.GetFaith.HighGodNamePossessive]!"
 yearly.3051.t: "Por Direito"
 yearly.3051.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('councillor'))] me informou sobre uma lei obscura em [county.GetName], que afirma que somente [ROOT.Char.GetTitleAsNameNoTooltip] pode ser seu protetor.\n\nNormalmente, uma lei tão arcaica seria descartada, mas ela me oferece uma chance única de colocar [vassal.GetTitledFirstName|l] em seu lugar, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('vassal'))] e governante atual de [county.GetNameNoTooltip]."
 yearly.3051.a: "A lei é clara, [ROOT.Char.GetTitleAsNameNoTooltip] tem todos os direitos!"
 yearly.3051.b: "[vassal.GetFirstNameNoTooltip] pode manter o título, por minha graça."
 yearly.3061.t: "Lidando Com os Agotes"
 yearly.3061.desc: "Só de pensar nisso já me dá náuseas! Em [county.GetName], os cagots vivem livremente lado a lado com as pessoas normais, sendo mal rejeitados por suas más ações! E tudo isso acontece bem ali no Caminho de Santiago!\n\nÉ claro que não lhes é permitido andar descalços, tocar os parapeitos das pontes ou receber a comunhão diretamente das mãos do [ROOT.Char.GetFaith.PriestNeuter], mas, além disso, não fazemos #EMP nada#!!\n\nEssa situação intolerável não pode continuar. E se estiverem tramando algo?!"
 yearly.3061.a: "Imporei impostos pesados sobre os Agotes, mantendo-os sob controle!"
 yearly.3061.b: "Eles devem ser isolados da sociedade decente!"
 yearly.3061.b.flavor: "Separar agoterias, marcas com o pé com teia vermelha, construir portas menores nas igrejas separadas para eles... Sim, isso deve funcionar."
 yearly.3061.c: "Não poderíamos tentar conviver lado a lado com eles?"
 yearly.3061.d: "Malditos hereges! Expulsem-nos e apreendam suas posses!"
 yearly.3071.t: "Apenas um Pesadelo"
 yearly.3071.desc: "Acordo gritando, com o coração disparado.\n\nTinham me acorrentado nu — ou com coleira? — enquanto uma dúzia de homens e mulheres com cabeça de bode descia sobre mim, mordendo-me e rasgando minha pele…\n\nE então, de repente, eu era um deles, rasgando minha própria carne com dentes afiados, engolindo pedaços, bebendo sangue… #EMP sorbiendo…#! Nunca havia sentido nada tão horripilante quanto quando vi a vida deixar os olhos do meu corpo dilacerado.\n\nMas foi apenas um sonho. Foi apenas um sonho."
 yearly.3071.a: "Orações pela proteção de [ROOT.Char.GetFaith.HighGodNamePossessive] me acalmarão."
 yearly.3071.b: "Por que a memória do sabor não sai da minha mente?!"
