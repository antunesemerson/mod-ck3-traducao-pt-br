l_spanish:
 rivalry.0001.t: "Enterrando o Machado de Guerra"
 rivalry.0001.desc: "\"[ROOT.Char.GetTitledFirstNameNoTooltip|l], tivemos nossas diferenças no passado, mas não acha que já está na hora de deixar o passado para trás?\".\n\n[rival.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me faz um gesto: \"O que passou, passou… Vamos começar de novo!\"."
 rivalry.0001.a: "Sim, vamos."
 rivalry.0001.b: "Você está se humilhando diante de mim?! [ROOT.Char.GetFaith.HighGodName] é bom!"
 rivalry.0002.t: "Enterrando o Machado de Guerra"
 rivalry.0002.desc: "Agora, com a perspectiva que o tempo traz, tudo parece tão estranho. O ódio que eu carregava e a dor que eu queria causar tão desesperadamente... \nTudo isso para quê?\n\nChamar [rival_response.GetTitledFirstName|l] meu inimig[rival_response.Custom('ES_OA')] já não faz mais sentido para mim."
 rivalry.0002.a: "Vamos deixar o passado para trás."
 rivalry.0003.t: "Um Oponente Indigno"
 rivalry.0003.imprisoned.desc: "Quando soube da notícia do encarceramento de [nemesis.GetTitledFirstName|l],"
 rivalry.0003.incapable.desc: "Quando soube do acidente de [nemesis.GetTitledFirstName|l] e que havia ficado prostrad[nemesis.Custom('ES_OA')] na cama babando,"
 rivalry.0003.my_prisoner.desc: "Quando bati com força a porta da [SelectLocalization( IsLandlessAdventurer( ROOT.Char ), 'jaula', 'celda')] no rosto desprezível de [nemesis.Custom('ES_DelDela')] [nemesis.GetTitledFirstName|l],"
 rivalry.0003.middle.desc: "Fiquei tomado de alegria. Aquele[nemesis.Custom('ES_EA')] [nemesis.Custom2('InsultNoun', ROOT.Char)] [nemesis.Custom2('InsultAdjective', ROOT.Char)] finalmente estava recebendo o que merecia!\n\n"
 rivalry.0003.compassionate.desc: "Mas minha felicidade se esvaiu com o tempo. Foi um prazer derrotar [nemesis.Custom('ES_AlAla')] [nemesis.GetTitledFirstNameNoTooltip|l] do passado, mas essa criatura desgraçada? Quase me dá #EMP pena#!…"
 rivalry.0003.uncompassionate.desc: "Mas com o tempo, seu estado lamentável chegou a #EMP aburrirme#!. Não encontro prazer em atormentar um ratinho acuado."
 rivalry.0003.a: "É hora de encerrar este capítulo."
 rivalry.0003.b: "Jamais [nemesis.Custom('ES_LoLa')] perdoarei! Jamais!"
 rivalry.1001.t: "Sempre Presente"
 rivalry.1001.desc.opening: "[rival.GetTitledFirstName] tornou-se uma praga constante em minha vida.\n\n"
 rivalry.1001.malicious: "[rival.GetSheHe|U] parece estragar tudo o que faço e ainda por cima é[rival.Custom('ES_EA')] [rival.Custom2('InsultAdjective', ROOT.Char)] sorri!"
 rivalry.1001.benevolent: "Toda vez que nos encontramos, o(a)[rival.Custom('ES_EA')] [rival.Custom2('InsultAdjective', ROOT.Char)] se esforça para parecer decente e just[rival.Custom('ES_OA')]. Sempre tira sarro de mim e me dá sermões. O que mais me irrita de verdade é que parece ter enganado todo mundo!"
 rivalry.1001.dominant: "Não apenas exige constantemente atenção e espaço, como também tem a audácia de exigir meu tempo e atenção. Como se eu não tivesse nada melhor para fazer do que ouvi-lo se gabar!"
 rivalry.1001.submissive: "É[rival.Custom('ES_EA')] [rival.Custom2('InsultAdjective', ROOT.Char)] aparenta ser dócil, mas depois me apunhala pelas costas assim que pode!"
 rivalry.1001.extroverted: "[rival.GetSheHe|U] sempre exige toda a atenção em qualquer evento e faz com que todos tenham que ouvir sua tagarelice por horas a fio. Como se isso não bastasse, também aproveita qualquer oportunidade para me alfinetar enquanto faz isso!"
 rivalry.1001.introverted: "É[rival.Custom('ES_EA')] [rival.Custom2('InsultAdjective', ROOT.Char)] tem carisma de um tijolo, mas ainda assim parece encontrar tempo para espalhar rumores sobre mim!"
 rivalry.1001.emotional: "Aproveita toda oportunidade para fazer um escândalo e me pintar como o vilão![ROOT.Char.Custom('ES_OA')] Lambe-botas e reclama, jogando meu nome na lama e me culpando por tudo que dá errado na vida dele/dela."
 rivalry.1001.levelheaded: "Não importa se é para sabotar meu governo ou proferir um insulto mordaz, [rival.GetSheHe] sempre está lá, esperando."
 rivalry.1001.desc.fallback: "Sinto como se não importasse para onde vou ou o que faço, [rival.GetTitledFirstName|l] sempre faz questão de deixar sua presença conhecida. É uma sombra que constantemente escurece todos os meus dias."
 rivalry.1001.a: "Maldit[rival.Custom('ES_OA')] seja, [rival.GetFirstNameNoTooltip]!"
 rivalry.1010.t: "Atos Maldosos"
 rivalry.1010.desc: "Semejante [rival.Custom2('InsultBehavior', ROOT.Char)] [rival.Custom('ES_DelDela')] [rival.GetTitledFirstName|l] sempre me incomodou, mas"
 rivalry.1010.desc.patient: "Nem eu consigo suportar tanto [rival.Custom2('InsultBehavior', ROOT.Char)] [rival.Custom('ES_DelDela')] [rival.GetTitledFirstName|l], mas"
 rivalry.1010.desc.end: "recentemente isso tem me incomodado mais do que nunca. Quero me vingar por esse comportamento, mas que forma deve ter minha retaliação?"
 rivalry.1010.a: "Espalho rumores escandalosos que [rival.GetHerHim] perseguirão por anos!"
 rivalry.1010.a.success.tt: "#F Os rumores levam a muitos boatos e especulações #!"
 rivalry.1010.a.failure.tt: "#F Ninguém acredita nos rumores improváveis #!"
 rivalry.1010.a.badfailure.tt: "#F Fui exposto como a origem dos rumores #!"
 rivalry.1010.b: "Escrevo um poema espirituoso zombando de todas as falhas!"
 rivalry.1010.b.success.tt: "#F O poema se torna tão popular que é copiado repetidamente #!"
 rivalry.1010.b.failure.tt: "#F As pessoas acham o poema mal escrito e de mau gosto #!"
 rivalry.1010.b.badfailure.tt: "#F Fui exposto como o autor do poema #!"
 rivalry.1010.c: "Critico seu comportamento grosseiro diretamente na cara dele/dela!"
 rivlary.1010.c.tt: "#F [rival.GetTitledFirstName] reaccionará a tu desaire #!"
 rivalry.1011.t: "Provocações Maldosas"
 rivalry.1011.desc.poem: "Tem circulado um novo poema que zomba de mim por causa da minha [ROOT.GetCharacter.Custom('quirk_neg_noun')] e me retrata de forma negativa. Embora eu não possa provar que [from_rival.GetTitledFirstName|l] esteja por trás disso, a prosa cheira ao seu envolvimento."
 rivalry.1011.desc.rumors: "Tem circulado pela minha [ROOT.Char.Custom('GetCourt')|l] rumores ultrajantes sobre minha [ROOT.GetCharacter.Custom('quirk_neg_noun')]. Os sussurros e risadinhas cruéis me perseguem por onde quer que eu vá. Essa tática desleal é exatamente o tipo de comportamento rasteiro que eu esperaria ver [from_rival.Custom('ES_DelDela')] [from_rival.GetTitledFirstName|l]!"
 rivalry.1011.a: "![from_rival.Custom('ES_ElElla')|U] pagará por isso!"
 rivalry.1012.t: "Fantasias Tolas"
 rivalry.1012.desc.poem: "Acabei de saber que [from_rival.GetTitledFirstName|l] escreveu um poema calunioso para zombar de mim por causa da minha [ROOT.GetCharacter.Custom('quirk_neg_noun')]! No entanto, o poema está tão mal escrito que, em vez disso, todos estão zombando de [from_rival.GetFirstName] por desperdiçar papel bom com suas bobagens!"
 rivalry.1012.desc.rumors: "Acabei de saber que [from_rival.Custom('ES_ElLa')] [from_rival.GetTitledFirstName|l] tem tentado espalhar rumores difamatórios sobre as coisas que supostamente faço em privado. Ess[from_rival.Custom('ES_EA')] desgraçad[from_rival.Custom('ES_OA')] de espírito [from_rival.Custom('quirk_neg_adjective')] deve ter uma visão muito distorcida de mim, pois os rumores eram tão absurdos e inacreditáveis que todos os descartaram de imediato."
 rivalry.1012.a: "Serve bem para essa canalha!"
 rivalry.1013.t: "Rumores Plantados"
 rivalry.1013.desc: "Os escandalosos rumores sobre [rival.Custom('ES_ElLa')] [rival.GetTitledFirstName|l] que propaguei por sua [rival.Custom('GetCourt')|l] se tornaram o tema favorito de fofocas e especulações. Ouvi dizer que ele/ela tem ficado cada vez mais vexado(a) e frustrado(a) tentando acabar com eles!"
 rivalry.1013.a: "Pode ser que isso finalmente [rival.GetHerHim] coloque no lugar."
 rivalry.1014.t: "Rumores Rejeitados!"
 rivalry.1014.desc.start: "Ninguém está levando a sério os rumores que tentei espalhar sobre [rival.GetTitledFirstName|l]. Dizem que são malucos e absurdos. As pessoas riem mais de"
 rivalry.1014.desc.hidden: "quem os criou, dizendo que deve ser"
 rivalry.1014.desc.exposed: "eu por tê-los criado, dizendo que sou"
 rivalry.1014.desc.end: "imaturo e mesquinho por recorrer a táticas tão baixas para difamar o nome d [rival.GetFirstName]."
 rivalry.1014.a: "Pelo menos consegui encobrir minhas trilhas..."
 rivalry.1014.a.exposed: "Isso não saiu nada como o planejado."
 rivalry.1015.t: "Poema Popular"
 rivalry.1015.desc: "As rimas engenhosas e as insinuações astutas que inseri na minha crítica mordaz à personalidade [rival.Custom('ES_DelDela')] [rival.GetTitledFirstName|l] têm circulado pela sua [rival.Custom('GetCourt')|l] como um rastilho de pólvora! Por mais que tente, [rival.GetSheHe] não consegue impedir que se espalhem, o que só aumenta a sua humilhação!"
 rivalry.1015.a: "Talvez isso finalmente coloque [rival.GetHerHim] em seu lugar."
 rivalry.1016.t: "Poema Rejeitado"
 rivalry.1016.desc: "Depois de escrever vários poemas zombando da personalidade [rival.Custom('ES_DelDela')] [rival.GetTitledFirstName|l], espalhei-os por sua [rival.Custom('GetCourt')|l] e esperei que pegassem.\n\nInfelizmente, parece que meus escritos são pouco populares... na verdade, todos estão praticamente de acordo que os poemas são baboseira que não vale o papel em que foram escritos!"
 rivalry.1016.desc.exposed: "Pior ainda! Meu ódio por [rival.GetTitledFirstName|l] é tão evidente que todos sabem que fui eu quem os escreveu."
 rivalry.1016.a: "Pelo menos fico feliz por não ter colocado meu nome neles."
 rivalry.1016.a.exposed: "Por que achei que isso era uma boa ideia?"
 rivalry.1017.t: "Insulto Audacioso!"
 rivalry.1017.desc: "Estava [ROOT.GetCharacter.Custom('quirk_pos_adverb')] ocupando meus afazeres, quando se aproximou de mim [from_rival.Custom('ES_ElLa')] [from_rival.GetTitledFirstName|l] e me insultou na minha cara.\n\n\"[ROOT.GetCharacter.Custom2('InsultNoun', SCOPE.sC('from_rival'))|U] de caráter [ROOT.GetCharacter.Custom('quirk_neg_adjective')], vossa presença me dá vontade de chorar!\"."
 rivalry.1017.a: "Eu respondo a essa difamação com uma série de meus próprios insultos!"
 rivalry.1017.b: "Esse[from_rival.Custom('ES_EA')] canalha mentiros[from_rival.Custom('ES_OA')] responderá a mim em um duelo!"
 rivalry.1017.b.tt: "#F Le mostraré a esa sabandija que soy mejor que [from_rival.Custom('ES_ElElla')]#!"
 rivalry.1017.c: "Vou fazer a coisa certa e virar a outra face."
 rivalry.1018.t: "Retaliação"
 rivalry.1018.desc: "Quando fui até [rival.Custom('ES_AlAla')] [rival.GetTitledFirstName|l] para dizer o que pensava, ele me respondeu com uma torrente de insultos e ofensas!\n\nA troca foi vista como infantil, e nós dois perdemos prestígio como resultado.[rival.GetSheHe] como eu."
 rivalry.1018.a: "! Para começar, a culpa é toda dele por ser tão [rival.Custom('quirk_neg_adjective')]!"
 rivalry.1019.t: "Injúria Gratuita"
 rivalry.1019.desc: "Fui até [rival.GetTitledFirstName|l] para dizer o que pensava e enumerar todas as falhas dessa pessoa. Não teve nada a dizer em sua defesa, e fui embora sabendo que [rival.GetHerHim] foi firmemente colocado em seu lugar."
 rivalry.1019.a: "Eu sabia que era fraco!"
 rivalry.1020.t: "Desafio ao Desprezo!"
 rivalry.1020.desc: "Quando chamei [rival.GetTitledFirstName|l] por seu [rival.Custom('quirk_neg_noun')], ele considerou isso um grave insulto e me desafiou para um duelo para defender sua honra!"
 rivalry.1020.a: "Você está dentro, [rival.GetFirstNameNoTooltip]!"
 rivalry.1020.b: "Er... não precisa recorrer à violência, agora..."
 rivalry.1021.tt: "Vitória triunfante"
 rivalry.1022.tt: "Vitória apertada"
 rivalry.1023.tt: "Derrota apertada"
 rivalry.1024.tt: "Derrota humilhante"
 rivalry.1021.t: "Vitória Triunfante"
 rivalry.1021.desc: "Desde o começo do meu duelo com [duel_loser.GetTitledFirstName|l] fica claro que tenho a vantagem. Aproveito minha vantagem e procuro desequilibrar[duel_loser.GetHerHim|l]. Logo em seguida, ele comete um erro e me deixa uma brecha que aproveito, e minha arma [ROOT.GetCharacter.Custom('SignatureWeaponCritical')] seu braço e encerra a luta!\n\nO fato de minha vitória ter sido rápida e decisiva só a torna ainda melhor."
 rivalry.1021.a: "Eu provei ser melhor que [duel_loser.GetFirstNameNoTooltip]!"
 rivalry.1022.t: "Vitória Apertada"
 rivalry.1022.desc: "Começo meu duelo com [duel_loser.GetTitledFirstName|l] e percebo que estamos mais parelhos do que eu esperava. Trocamos golpes e bloqueios de um lado para o outro por algum tempo, sem que nenhum de nós ganhe vantagem por muito tempo.\n\nPor fim, ambos começamos a sentir o cansaço e ele se deixa exposto, permitindo-me [ROOT.GetCharacter.Custom('SignatureWeaponCritical')] a perna dele e encerrar a luta!"
 rivalry.1022.a: "Minha vitória prova que eu estava cert."
 rivalry.1023.t: "Derrota Apertada"
 rivalry.1023.desc: "Ao [duel_winner.GetTitledFirstName|l] e eu começamos nosso duelo, percebo que ele é um adversário mais poderoso do que eu antecipava. A batalha é acirrada, com cada um de nós trocando ataques e defesas enquanto buscamos uma abertura.\n\nPor fim, ao começar a ceder ao cansaço, minha guarda falha por um instante, e [duel_winner.GetFirstName] aproveita isso para me [duel_winner.Custom('SignatureWeaponCritical')] o braço com [duel_winner.Custom('signature_weapon')]"
 rivalry.1023.desc.end: "Sangrando muito, não tenho outra escolha senão conceder a partida."
 rivalry.1023.desc.death: "Meus ferimentos pesam sobre mim e caio no chão."
 rivalry.1023.a: "Na próxima vez, vou pegar você, [duel_winner.GetTitledFirstNameNoTooltip|l]!"
 rivalry.1023.a.death: "Está tudo tão escuro..."
 rivalry.1024.t: "Derrota Humilhante"
 rivalry.1024.desc: "Quando [duel_winner.GetTitledFirstName|l] e eu nos encontramos para começar nosso duelo,![duel_winner.GetSheHe] não perde tempo e salta para a ação! Sou pego de surpresa e me esforço para recuperar terreno, mas os ataques implacáveis de [duel_winner.GetFirstName] não me deixam tempo para me recuperar.\n\nLogo, [duel_winner.GetSheHe] passa pela minha guarda e me [duel_winner.Custom('SignatureWeaponCriticalPresent')] a perna com [duel_winner.Custom('signature_weapon')];"
 rivalry.1024.desc.end: "o que põe fim ao confronto. Minha derrota vergonhosa me deixou humilhad[ROOT.Char.Custom('ES_OA')] e envergonhad[ROOT.Char.Custom('ES_OA')]!"
 rivalry.1024.desc.death: "me fazendo cair e desabar no chão."
 rivalry.1024.a: "devo voltar para casa mancando e envergonhad[ROOT.Char.Custom('ES_OA')]."
 rivalry.1025.t: "Exibição Vergonhosa"
 rivalry.1025.desc: "A covarde [from_rival.Custom('ES_DelDela')] [from_rival.GetTitledFirstName|l] recusou-se a duelar comigo, apesar de ter me insultado na cara! Não consigo pensar em nada mais vergonhoso do que ser tão desrespeitoso sem ter a coragem de sustentar isso. Sempre soube que [rival.GetSheHe] era desonroso, e isso prova!"
 rivalry.1025.a: "Pelo menos eu mantive minha honra."
 rivalry.1030.t: "Intromissão no Casamento"
 rivalry.1030.desc.happy: "Me irrita que meu rival, [rival.GetTitledFirstName|l], desfrute de um casamento feliz com seu [rival_spouse.GetWifeHusband] [rival_spouse.GetTitledFirstName|l]. Eu poderia lhe causar bastante estresse e preocupação semeando suspeitas entre os dois, fazendo com que duvidem um do outro."
 rivalry.1030.desc.neutral: "O casamento sem amor entre [rival.GetTitledFirstName|l] e seu [rival_spouse.GetWifeHusband] [rival_spouse.GetTitledFirstName|l] me oferece uma oportunidade tentadora. Se eu semear a desconfiança entre os dois, [rival.GetFirstName] ficará tão distraído com o desmoronamento de seu casamento que [rival.Custom('ES_OA')] não conseguiria interferir nos meus planos!"
 rivalry.1030.desc.unhappy: "Não é incomum que [rival.GetTitledFirstName|l] e seu [rival_spouse.GetWifeHusband] [rival_spouse.GetTitledFirstName|l] estejam brigando feito cão e gato. Eu poderia provocar outra briga entre eles com um bilhete cuidadosamente plantado, distraindo[rival.GetHerHim]. Assim, ficará mais difícil para ele interferir em meus planos…"
 rivalry.1030.a: "Deixarei cartas para [rival_spouse.GetTitledFirstNameNoTooltip|l] da parte de um[rival_spouse.Custom('ES_XAOpp')] amante secret[rival_spouse.Custom('ES_XAOpp')]."
 rivalry.1030.a.tt: "[rival.GetTitledFirstName] descobrirá as provas incriminatórias… mas ele(a) acreditará nelas?"
 rivalry.1030.b: "Prefiro armar uma cilada para [rival.GetTitledFirstNameNoTooltip|l]."
 rivalry.1030.b.tt: "[rival_spouse.GetTitledFirstName] descobrirá algumas provas incriminatórias… mas acreditará nelas?"
 rivalry.1030.c: "Interferir na união de outra pessoa é ir longe demais!"
 rivalry.1030.c.tt: "Abandonarei esse caminho por enquanto."
 rivalry.1030.a_success: "Incriminação bem-sucedida"
 rivalry.1030.a_failure: "O plano falha"
 rivalry.1031.t: "Evidências de Infidelidade?"
 rivalry.1031.desc: "Hoje encontrei uma carta dirigida ao meu [my_spouse.GetWifeHusband] [my_spouse.GetFirstName], escrita por um[my_spouse.Custom('ES_XAOpp')] amante! Ela detalhava seu último encontro amoroso e implorava para que se vissem novamente."
 rivalry.1031.desc.fooled: "\n\nA carta não está assinada e não consigo parar de especular quem está tendo um caso com meu [my_spouse.GetWifeHusband]!"
 rivalry.1031.desc.suspicious: "\n\nA princípio, estou chateado, mas ao ler mais atentamente, percebo que a carta é muito genérica, sem detalhes pessoais e não identifica o autor. Qualquer um poderia tê-la escrito..."
 rivalry.1031.a.fooled: "Devo descobrir quem é o amante misterioso que ela/ele tem!"
 rivalry.1031.a.suspicious: "Investigarei discretamente para descobrir o que está acontecendo."
 rivalry.1031.b.fooled: "Vou falar diretamente com [my_spouse.GetFirstNameNoTooltip] sobre a carta!"
 rivalry.1031.b.suspicious: "Vou confrontar [my_spouse.GetFirstNameNoTooltip] diretamente e descobrir a verdade!"
 rivalry.1031.b.tt: "Perguntarei a [my_spouse.GetTitledFirstName|l] se me foi infiel"
 rivalry.1031.c: "Confio em [my_spouse.GetTitledFirstNameNoTooltip|l], esta carta deve ser uma falsificação!"
 rivalry.1031.c.tt: "Vou jogar a carta fora"
 rivalry.1032.t: "Acusações de Infidelidade"
 rivalry.1032.desc: "Meu [suspicious_spouse.GetWifeHusband] [suspicious_spouse.GetFirstName] veio até mim hoje com uma carta na mão. Diz que foi escrita pelo meu amante secreto[suspicious_spouse.Custom('ES_OA')]! Agora me acusa de ter um caso!"
 rivalry.1032.a: "Eu não fui infiel a você, eu juro!"
 rivalry.1032.a.tt: "Tento convencer [suspicious_spouse.GetFirstNameNoTooltip] de que fui fiel"
 rivalry.1032.b: "Devo confessar meu caso com [spouse_lover.GetTitledFirstNameNoTooltip|l]!"
 rivalry.1033.t: "Negação de Culpa"
 rivalry.1033.desc: "Confrontei [my_spouse.GetFirstName] pela carta sobre o amante secreto dele/dela, mas pareceu surpreendid[my_spouse.Custom('ES_OA')] e magoad[my_spouse.Custom('ES_OA')] com a acusação e protestou sua inocência."
 rivalry.1033.a: "Confio em [my_spouse.GetFirstNameNoTooltip] e acredito no que me diz!"
 rivalry.1033.a.tt: "Encerro essa linha de investigação"
 rivalry.1033.b: "Mentiras! Vou investigar mais e descobrir a verdade!"
 rivalry.1034.t: "Uma Confissão Chorosa"
 rivalry.1034.desc: "Quando confrontei [my_spouse.GetFirstName] sobre a carta sobre seu amante secreto, ele desabou e confessou chorando que tinha um caso com [spouse_lover.GetTitledFirstName|l]!"
 rivalry.1034.a: "Como ele/ela pôde fazer isso comigo?"
 rivalry.1035.t: "Falsificação Descoberta!"
 rivalry.1035.desc: "Após investigar a origem da carta do suposto amante de [my_spouse.GetFirstName], descobri que era falsa. Foi plantada nada menos que por [instigator.Custom('ES_EA')] [instigator.Custom2('InsultNoun', ROOT.Char)] [instigator.Custom2('InsultAdjective', ROOT.Char)] [instigator.Custom('ES_DelDela')] [instigator.GetTitledFirstName|l]!"
 rivalry.1035.a: "!Pagará por se intrometer em meu casamento!"
 rivalry.1036.t: "Caminhos Sem Saída"
 rivalry.1036.desc: "Segui todas as pistas possíveis para descobrir quem era o suposto amante secreto que escreveu a carta para [rival_spouse.GetFirstName], mas não consegui determinar a origem da carta."
 rivalry.1036.a: "De toda forma, ficarei de olho em [rival_spouse.GetFirstNameNoTooltip]…"
 rivalry.1036.b: "Devo concluir que a carta é uma farsa!"
 rivalry.1037.t: "Interferência no Casamento"
 rivalry.1037.desc: "Meus espiões me informaram que há de fato uma nova tensão entre [rival.GetTitledFirstName|l] e seu [rival_spouse.GetWifeHusband] [rival_spouse.GetFirstName]. Parece que minha manobra para semear desconfiança entre eles foi bem-sucedida!"
 rivalry.1037.a: "Seu conflito é música doce para meus ouvidos!"
 rivalry.1038.t: "Interferência no Casamento"
 rivalry.1038.desc: "Meus espiões me informam de que [rival.GetTitledFirstName|l] descobriu que a carta que plantei para semear desconfiança entre [rival.GetSheHe] e seu [rival_spouse.GetWifeHusband] [rival_spouse.GetFirstName] era falsa. Não caiu na minha trapaça!"
 rivalry.1038.a: "Terei que tentar algo diferente..."
 rivalry.1039.t: "$rivalry.1037.t$"
 rivalry.1039.desc: "Meus espiões me informam de que [my_spouse.GetTitledFirstName|l] tinha um caso de verdade e minha carta falsificada fez com que confessasse a [suspicious_spouse.GetTitledFirstName|l]!"
 rivalry.1039.a: "Anda… Eso es #EMP muy#! interesante."
 rivalry.2001.t: "Um Obstáculo para a Amizade"
 rivalry.2001.desc: "Recebi uma carta de [target_in_question.GetTitledFirstName|l] perguntando o que penso de [rival.GetTitledFirstName|l]. Parece que [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('rival') )] está fazendo acenos diplomáticos a [target_in_question.Custom('ES_ElElla')]."
 rivalry.2001.a: "Ora, [target_in_question.GetFirstNameNoTooltip] precisa mesmo perguntar?"
 rivalry.2001.b: "[target_in_question.GetFirstNameNoTooltip] deveria formar a própria opinião."
 rivalry.2002.t: "Um Obstáculo para a Amizade"
 rivalry.2002.desc: "Tenho trabalhado duro para causar uma boa impressão a [target_in_question.GetTitledFirstName|l] e o que descubro?\n\nQue precisamente [first_rival.GetTitledFirstName|l] tem espalhado rumores vis sobre mim para prejudicar meus esforços!"
 rivalry.2002.a: "Será que [target_in_question.GetFirstNameNoTooltip] acredita no que [first_rival.GetFirstNameNoTooltip] lhe diz?"
 rivalry.3001.t: "De Mal a Pior"
 rivalry.3001.desc.opening: "Como se não bastasse que [rival.GetSheHe] abrace os piores vícios da humanidade, [rival.GetTitledFirstName|l] agora me insultou diretamente!\n\n"
 rivalry.3001.malicious: "[rival.GetSheHe|U] enviou um mensageiro para garantir que toda a minha [ROOT.Char.Custom2('GetCourt')|l] ouvisse seus comentários vis. Começou com um \"[ROOT.Char.Custom('ES_AlAla')|U] [ROOT.Char.GetTitledFirstName|l] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('rival'))]\", e foi piorando à medida que continuava. Que descaramento da es[rival.Custom('ES_EA')] [rival.Custom2('InsultAdjective', ROOT.Char)]!"
 rivalry.3001.benevolent: "[rival.GetSheHe|U] enviou uma carta pedindo para melhorar as relações e, ao mesmo tempo, se dirigindo a mim como \"[ROOT.Char.GetTitledFirstName|l] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('rival'))]\". Agora sim ele mostrou suas verdadeiras cores!"
 rivalry.3001.dominant: "[rival.GetSheHe|U] enviou um mensageiro, dirigindo-se a mim como \"[ROOT.Char.GetTitledFirstName|l] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('rival'))]\". Praticamente implorando por uma briga!"
 rivalry.3001.submissive: "Encontrei um bilhete na minha [ROOT.Char.Custom('GetChamber')] pessoal. Alguém o deslizou sob o manto da noite. Começava com um \"[ROOT.Char.Custom('ES_AlAla')|U] [ROOT.Char.GetTitledFirstName|l] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('rival'))]\", e o que vinha depois era ainda pior. Ainda por cima, esse(a) [rival.Custom2('InsultAdjective', ROOT.Char)] teve a audácia de assiná-lo com o próprio nome!"
 rivalry.3001.extroverted: "Seu mensageiro apareceu enquanto eu me dirigia à minha [ROOT.Char.Custom2('GetCourt')|l], saudando-me como \"[ROOT.Char.GetTitledFirstName] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('rival'))]\", antes de continuar me difamando diante de todos!"
 rivalry.3001.emotional: "[rival.GetSheHe|U] enviou um mensageiro que me acusou de \"arruinar a vida inteira de [rival.GetFirstNameNoTooltip]\" e me chamou de \"[ROOT.Char.GetTitledFirstName|l] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('rival'))]\". E ainda fez uma cena!"
 rivalry.3001.levelheaded: "[rival.GetSheHe|U] enviou um mensageiro que esperou a oportunidade perfeita para se dirigir a mim como \"[ROOT.Char.GetTitledFirstName|l] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('rival'))]\" como por acaso, e então [rival.GetFirstName] agiu como se tivesse sido um erro."
 rivalry.3001.desc.fallback: "![rival.GetSheHe|U] enviou um mensageiro que me chamou de [ROOT.Char.GetTitledFirstName|l] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('rival'))] na frente de todo mundo!"
 rivalry.3001.desc.end: "\n\nIsso não pode ficar assim, vou garantir que pague por sua insolência."
 rivalry.3001.a: "Espere só, [rival.GetTitledFirstNameNoTooltip|l]!"
 rivalry.3002.t: "O Inimigo do Meu Amigo"
 rivalry.3002.desc: "Meu [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('friend') )] [friend.GetTitledFirstName|l] vem sofrendo com certo incômodo ultimamente. [rival.GetTitledFirstName|l] [friend.GetHerHim] escolheu como alvo de seus esquemas malignos.\n\nComo eu poderia permitir que tratem assim meu amig[friend.Custom('ES_OA')]?"
 rivalry.3002.a: "Eu denuncio você, [rival.GetTitledFirstNameNoTooltip|l]!"
 rivalry.3002.b: "[rival.Custom('ES_ElLa')] [rival.GetTitledFirstNameNoTooltip|l] não precisa saber como eu me sinto."
 rivalry.3003.t: "Ratos se Reunindo"
 rivalry.3003.desc: "Parece que [first_friend.Custom('ES_ElLa')] [first_friend.GetTitledFirstName|l] me denunciou e citou minha rivalidade com seu [first_friend.Custom2('RelationToMe', SCOPE.sC('friend') )], [friend.Custom('ES_ElLa')] [first_friend.Custom2('InsultAdjective', ROOT.Char)] [friend.GetTitledFirstName|l].\n\nMeus inimigos parecem estar se multiplicando…"
 rivalry.3003.a: "Bah! Um bando de ovelhas."
 rivalry.3004.t: "A Pior Pessoa Possível"
 rivalry.3004.opening: "Ainda que eu não odiasse intensamente [rival.GetTitledFirstName|l], sei que nunca conseguiríamos nos dar bem!"
 rivalry.3004.fallback: "\n\n[rival.GetSheHe|U] parece comportar-se de forma oposta a como eu faria em qualquer situação!"
 rivalry.3004.a: "Será que o faz apenas para me provocar?!"
