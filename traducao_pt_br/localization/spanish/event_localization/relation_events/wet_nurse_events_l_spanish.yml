 bp2_yearly.7021.t: "$bp2_decision.0002.t$: $rites_of_passage_duel$"
 bp2_yearly.7021.desc: "Um[teentribal.Custom('ES_XA')] [teentribal.GetWomanMan] do povo [ROOT.Char.GetCulture.GetName] deve detestar o medo, rejeitar a fraqueza e esperar conhecer a dor na vida.\n\n[teentribal.Custom('ES_ElLa')|U] jovem [teentribal.GetFirstName] travou golpes com outros jovens, mas nunca sofreu o ataque de um adulto do povo [ROOT.Char.GetCulture.GetNameNoTooltip].\n\nMuitos são os robustos guerreiros da nossa tribo, mas apenas um pode pôr à prova o valor de meu [ROOT.Char.Custom2('RelationToMe',teentribal)]."
 bp2_yearly.7021.desc_root: "Um guerreiro nasce da luta, e se ergue em sangue.\n\nTroquei golpes com outros jovens, mas nunca com um adversário digno: um adulto da nação [ROOT.Char.GetCulture.GetNameNoTooltip].\n\nMuitos são os robustos guerreiros de nossa tribo, mas só um pode testar se estou preparado."
 bp2_yearly.7021.a: "[teentribal.GetSheHe|U] enfrenta s [teentribal.Custom2('RelationToMeShort', family_duelist)|l]!"
 bp2_yearly.7021.a_root: "[teentribal.Custom2('RelationToMeShort', family_duelist)|U], provarei minha capacidade contra você!"
 bp2_yearly.7021.a.tt: "[teentribal.GetFirstName] desafia s [teentribal.Custom2('RelationToMeShort', family_duelist)|l] [family_duelist.GetFirstName] para um [single_combat_duel|lE]"
 bp2_yearly.7021.b_root: "Desafio m [ROOT.Char.Custom2('RelationToMeShort', duelist_1)], [duelist_1.GetFirstNameNoTooltip]!"
 bp2_yearly.7021.b: "[teentribal.GetSheHe|U] duelará com m [teentribal.Custom2('RelationToMeShort', duelist_1)|l], [duelist_1.GetFirstNameNoTooltip]!"
 bp2_yearly.7021.b.tt: "[teentribal.GetFirstName] desafia a [duelist_1.GetFirstName] a um [single_combat_duel|lE]"
 bp2_yearly.7021.c: "[duelist_2.Custom('ES_ElLa')|U] [duelist_2.Custom('ComplimentAdjective')] [duelist_2.GetFirstNameNoTooltip]… adiante!"
 bp2_yearly.7021.c_root: "Prefiro lutar com m [ROOT.Char.Custom2('RelationToMeShort', duelist_2)], [duelist_2.GetFirstNameNoTooltip]."
 bp2_yearly.7021.c.tt: "[teentribal.GetFirstName] desafia a [duelist_2.GetFirstName] a um [single_combat_duel|lE]"
 bp2_yearly.7021.d: "$bp2_decision.0002.f$"
 bp2_yearly.7021.d.tt: "$bp2_decision.0002.cooldown$"
 bp2_yearly.7022.t: "$bp2_decision.0002.t$: O $rites_of_passage_duel$ é Lutado"
 bp2_yearly.7022.desc_child_win: "Quando termina a bênção de [ROOT.Char.GetFaith.PriestNeuter], as armas dos desafiante se chocam. A experiência de [sc_loser.GetFirstName] lhe permite obter uma vantagem imediata, mas, ainda assim, não consegue desviar por muito tempo os golpes precisos de [sc_victor.GetFirstName].\n\nMeu [ROOT.Char.Custom2('RelationToMe',teentribal)] derruba [sc_loser.GetFirstNameNoTooltip].\n\n\"Eu me rendo!\", geme [sc_loser.Custom('ES_ElLa')] [sc_loser.GetWomanMan] mais velh[sc_loser.Custom('ES_OA')]. \"[sc_victor.GetFirstNameNoTooltip] me despedaçou os nós dos dedos e me cegou com o sangue: é um[sc_victor.Custom('ES_XA')] guerreir[sc_victor.Custom('ES_OA')] tão completo quanto qualquer um. [Select_CString( sc_victor.IsFemale, 'Uma digna', 'Um digno' )] [sc_victor.GetWomanMan] de uma nobre [ROOT.Char.GetCulture.GetName]\".\n\nO ritual é assim concluído."
 bp2_yearly.7022.desc_child_lost: "As libações mal tinham sido borrifadas quando [sc_loser.GetFirstName] lança um ataque feroz! Sob uma chuva de golpes, a experiência de [sc_victor.GetFirstName] lhe serve: ele resiste à tempestade. Meu jovem [ROOT.Char.Custom2('RelationToMe',teentribal)], logo cansad[sc_loser.Custom('ES_OA')], dá tudo de si na luta... mas este rito termina com uma lâmina em sua garganta.\n\nAo ver o fogo ainda nos olhos de seu oponente, [sc_victor.GetFirstNameNoTooltip] se mostra gentil.\n\n\"É um[sc_loser.Custom('ES_XA')] [sc_loser.GetWomanMan] o que vejo diante de mim! A luta, e não a vitória, lhe valeu um lugar entre nós. [sc_loser.GetFirstNameNoTooltip] demonstrou a coragem de [Select_CString( sc_loser.IsFemale, 'uma guerreira', 'um guerreiro' )] e o mérito da nação [ROOT.Char.GetCulture.GetName]\"."
 bp2_yearly.7022.desc_root_win: "\"Basta!\", ofega [sc_loser.GetFirstName], atirando [sc_loser.Custom('SignatureWeaponNameOrType')] ao chão. \"Dê o golpe mortal como um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] de honra! Eu me envergonharia de morrer diante de um[ROOT.Char.Custom('ES_XA')] [teentribal.Custom('GirlBoy')].\"\n\nMas… #EMP o que estou dizendo?#! Já lutas como [Select_CString( ROOT.Char.IsFemale, 'uma verdadeira', 'um verdadeiro' )] [ROOT.Char.GetWomanMan]. Como um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsName|l]: um[ROOT.Char.Custom('ES_OA')] que conhecerá o poder e saboreará a vitória! Eu falarei por ti e cuidarei para que teus privilégios cresçam.\n\nEstá feito. Pela virtude de [ROOT.Char.Custom('SignatureWeaponNameOrType')], provei meu valor."
 bp2_yearly.7022.desc_root_lost: "Embora eu não possa igualar a experiência de [sc_victor.GetFirstName]… o rito não pode acabar assim! Tento me erguer com dificuldade, me preparando, e sou desarmad[ROOT.Char.Custom('ES_OA')]. Corro atrás da minha arma, mas [sc_victor.Custom('ES_ElLa')] oponente bloqueia meu caminho. #EMP Isto não pode acabar assim!#! \n\n[sc_victor.GetFirstNameNoTooltip] me encara, divertid[sc_victor.Custom('ES_OA')].\n\n\"Parem, jovem [ROOT.Char.Custom('RegionalFerociousAnimal')]! Meu [ROOT.Char.GetTitleAsName|l], tens a ferocidade de um [ROOT.Char.Custom( 'KnightCultureNoTooltipLowercase' )] da nação [ROOT.Char.GetCulture.GetName]! Você lutou com bravura e —vencid[ROOT.Char.Custom('ES_OA')] ou não— eu o honro como membro da tribo\".\n\n\"Este resultado será aceito\"."
 bp2_yearly.7022.toast: "O duelo molda [teentribal.GetFirstNameNoTooltip]"
 bp2_yearly.7022.a: "Tal é a determinação do [teentribal.GetHouse.GetBaseNameNoTooltip]!"
 bp2_yearly.7022.a_victory: "Vencer é ganhar confiança na arte do guerreiro e em si mesmo."
 bp2_yearly.7022.a_loss: "[teentribal.GetFirstNameNoTooltip] nunca esquecerá essa derrota... e [teentribal.GetSheHe] aprenderá que sua tenacidade tem utilidade além do campo de batalha."
 bp2_yearly.7022.b: "A tribo ganhará um novo campeão."
 bp2_yearly.7022.b_victory: "Ainda há muitos truques a aprender, mas este é um bom começo!"
 bp2_yearly.7022.b_loss: "[teentribal.GetFirstNameNoTooltip] deve se dedicar ao treinamento, aos duelos melhor travados que virão!"
 bp2_yearly.7022.c: "Uma luta sangrenta! Uma luta #EMP muito#! sangrenta..."
 bp2_yearly.7022.c_victory: "Um tipo de alegria surgiu, um fervor maligno despertou... com o fluxo de sangue."
 bp2_yearly.7022.c_loss: "Vejo alguém que distribui suprimentos, não um[teentribal.Custom('ES_XA')] guerreir[teentribal.Custom('ES_OA')]… [teentribal.GetFirstNameNoTooltip] quer viver muito tempo."
 bp2_yearly.7023.t: "$bp2_decision.0002.t$: $rites_of_passage_scarification$"
 bp2_yearly.7023.desc: "Os [ROOT.Char.GetCulture.GetCollectiveNoun] da minha tribo se reúnem para assistir ao rito de escarificação. Com a fumaça das ervas sagradas adensada no ar, meu [ROOT.Char.GetCouncillorPosition( 'councillor_court_chaplain' ).GetPositionName] [priest.GetFirstName] começa a cerimônia. Os reunidos ficam em silêncio.\n\n[priest.GetSheHe|U] desembainha a lâmina ritual.\n\n\"Aqui, [teentribal.GetFirstName] dos [teentribal.GetHouse.GetName]\", entoa [priest.Custom('ES_ElLa')] [priest.GetWomanMan] sant[priest.Custom('ES_OA')], \"serás marcad[teentribal.Custom('ES_OA')] e talhad[teentribal.Custom('ES_OA')] pela dor. Quando te contemplarmos nos dias que virão, veremos convicção… veremos que és um[teentribal.Custom('ES_XA')] [teentribal.GetWomanMan]!\"."
 bp2_yearly.7023.a: "Usar a prova é conhecer o orgulho."
 bp2_yearly.7023.a.tt: "[priest.GetFirstNameNoTooltip] corta vigorosamente, uma e outra vez."
 bp2_yearly.7023.a_nothing: "Os cortes são limpos"
 bp2_yearly.7023.a_scarred: "Os cortes deixam marcas duradouras"
 bp2_yearly.7023.a_wounded: "Os cortes são brutalmente profundos"
 bp2_yearly.7023.b: "Talvez isso possa ser apenas... simbólico?"
 bp2_yearly.7023.b.tt: "[priest.GetFirstNameNoTooltip] é gentil com a lâmina, fazendo apenas uma impressão escassa."
 bp2_yearly.7023.c: "$bp2_decision.0002.f$"
 bp2_yearly.7023.c.tt: "$bp2_decision.0002.cooldown$"
 bp2_yearly.7024.t: "$bp2_decision.0002.t$: $rites_of_passage_seclusion$"
 bp2_yearly.7024.desc: "\"O isolamento enriquece o corpo e o espírito\", insiste meu [ROOT.Char.GetCouncillorPosition( 'councillor_court_chaplain' ).GetPositionName] [priest.GetFirstName]. \"Na tranquilidade, sagacidade! Na sobrevivência, astúcia. Escolha um lugar de harmonia... mas em algum lugar selvagem, áspero.\"\n\nE lança algumas provisões bem escassas.\n\n"
 bp2_yearly.7024.desc_capital: "\"Um[teentribal.Custom('ES_XA')] [teentribal.Custom('GirlBoy')] está a salvo em casa, no/a [rite_location.GetTerrain.GetNameNoTooltip|l] de [rite_location.GetName]."
 bp2_yearly.7024.desc_abroad: "Para um teste verdadeiro, considere o estranho e distante [abroad_location.GetTerrain.GetNameNoTooltip|l] de [abroad_location.GetName]!"
 bp2_yearly.7024.desc_realm: "Ou o que executa o rito pode viajar brevemente: para [realm_location.GetName], talvez?"
 bp2_yearly.7024.desc_end: "Agora, jovem — com a sabedoria de [priest.GetFaith.KnowledgeGodName]\"."
 bp2_yearly.7024.a: "Embarcar, para terras distantes!"
 bp2_yearly.7024.a.tt: "#N Maior#! chance de perigo"
 bp2_yearly.7024.a.abroad: "[teentribal.GetFirstName] viajará para [abroad_location.GetTerrain.GetNameNoTooltip|l] de [abroad_location.GetName], dentro do reino de [foreign_ruler.GetName]"
 bp2_yearly.7024.win: "Evitou todo o perigo"
 bp2_yearly.7024.lose: "Pego no perigo"
 bp2_yearly.7024.b: "A jornada não precisa ser muito longa."
 bp2_yearly.7024.b.tt: "#Z Média#! chance de perigo"
 bp2_yearly.7024.b.realm: "[teentribal.GetFirstName] viajará para [realm_location.GetTerrain.GetNameNoTooltip|l] de [realm_location.GetName]"
 bp2_yearly.7024.c: "A natureza local servirá."
 bp2_yearly.7024.c.tt: "#P Menor#! chance de perigo"
 bp2_yearly.7024.c.capital: "[teentribal.GetFirstName] se isolará em [rite_location.GetTerrain.GetNameNoTooltip|l] de [rite_location.GetName], a [realm_capital|lE]"
 bp2_yearly.7024.d: "$bp2_decision.0002.f$"
 bp2_yearly.7024.d.tt: "$bp2_decision.0002.cooldown$"
 bp2_yearly.7025.t: "$bp2_decision.0002.t$: $rites_of_passage_seclusion$"
 bp2_yearly.7025.desc: "— um [teentribal.MakeScope.Var('animal_type').GetFlagName] espumante se aproxima do meu pequeno acampamento!\n\nEu não posso escapar deste animal desesperado. A fera deve ser vencida ou ludibriada. Eu tenho uma lebre recém-morta bem à mão..."
 bp2_yearly.7025.desc_realm: "Chego rapidamente ao [realm_location.GetTerrain.GetNameNoTooltip|l] próximo de [realm_location.GetName] e imediatamente começo a me preparar para a noite. Enquanto estou montando uma fogueira para cozinhar meu jantar, $bp2_yearly.7025.desc$"
 bp2_yearly.7025.desc_abroad: "O amanhecer surge sobre [seclusion_location.GetName]. O desconhecido [realm_location.GetTerrain.GetNameNoTooltip|l], desprovido do [seclusion_location.GetCounty.GetCulture.GetCollectiveNoun] local, é assustador à noite e belo à luz da manhã.\n\nMinha fogueira meio acesa e eu não estamos sozinhos aqui $bp2_yearly.7025.desc$"
 bp2_yearly.7025.desc_capital: "Eu rapidamente encontro um bom local para meu acampamento, bem fora do [rite_location.GetName], então eu imediatamente monto uma fogueira para me preparar para a noite e comer algo quente. $bp2_yearly.7025.desc$"
 bp2_yearly.7025.desc_fight: "talvez, ao lançá-la, eu possa ganhar tempo para pegar meu arco?"
 bp2_yearly.7025.desc_outwit: "talvez eu possa me retirar sutilmente enquanto isso satisfaz o [teentribal.MakeScope.Var('animal_type').GetFlagName]?"
 bp2_yearly.7025.a: "Vou me esgueirar e me esconder."
 bp2_yearly.7025.a_win: "Você se afasta silenciosamente da fera distraída"
 bp2_yearly.7025.a_lose: "A [teentribal.MakeScope.Var('animal_type').GetFlagName], enfurecida, te ataca"
 bp2_yearly.7025.tt: "Um [teentribal.MakeScope.Var('animal_type').GetFlagName] atacou durante o Isolamento"
 bp2_yearly.7025.b: "Com flechas afiadas, afugentarei o [teentribal.MakeScope.Var('animal_type').GetFlagName]!"
 bp2_yearly.7025.b_win: "O [teentribal.MakeScope.Var('animal_type').GetFlagName] foge, picado pelas flechas"
 bp2_yearly.7025.b_lose: "O [teentribal.MakeScope.Var('animal_type').GetFlagName] ileso ataca"
 bp2_yearly.7026.t: "$bp2_decision.0002.t$: $rites_of_passage_shaving$"
 bp2_yearly.7026.desc: "Trançando finas tranças e sacudindo mechas belas em gratidão, o clã se reúne para o ritual de cortar o cabelo.\n\nMeu [ROOT.Char.GetCouncillorPosition( 'councillor_court_chaplain' ).GetPositionName] [priest.GetFirstName] segura o cabelo de [teentribal.GetFirstName] e empunha uma faca entalhada.\n\n\"Este[teentribal.Custom('ES_EA')] [teentribal.Custom('GirlBoy')] abandonará a infância pelo futuro do clã! Ele perderá tudo o que existe por frivolidade, deixando expostas sua verdadeira natureza, a força de seu espírito!\".\n\n[Select_CString( priest.IsFemale, 'A sábia', 'O sábio' )] olha com desconfiança em minha direção.\n\n\"… se noss[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsName|l] o desejar\"."
 bp2_yearly.7026.desc_child: "Trançando finas tranças e sacudindo mechas vistosas em gratidão, a tribo se reúne para o ritual de corte de cabelo.\n\nMeu [ROOT.Char.GetCouncillorPosition( 'councillor_court_chaplain' ).GetPositionName] [priest.GetFirstName] me segura pelo cabelo e pega uma faca gravada.\n\nNoss[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsName|l] abandonará a infância pelo futuro da tribo! Perderá tudo o que existe por frivolidade, deixando exposta sua verdadeira natureza, a força de seu espírito!\n\n[Select_CString( priest.IsFemale, 'A sábia', 'O sábio' )] olha com cautela na minha direção.\n\n... se noss[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] o desejar."
 bp2_yearly.7026.a: "Dedicação absoluta: um corte brutal e total."
 bp2_yearly.7026.a.tt: "Meu [ROOT.Char.Custom2('RelationToMeShort',priest)] passa sua lâmina por todo o couro cabeludo, com o vigor adequado."
 bp2_yearly.7026.a.toast: "O ritual de corte de cabelo foi concluído."
 bp2_yearly.7026.b: "Corte apenas uma mecha, para ser guardada para sempre!"
 bp2_yearly.7026.b.tt: "Um pedaço fino de cabelo é cortado e colocado em um medalhão cerimonial, um símbolo de dever."
 bp2_yearly.7026.b.toast: "O corte de cabelo está completo"
 bp2_yearly.7026.c: "$bp2_decision.0002.f$"
 bp2_yearly.7026.c.tt: "$bp2_decision.0002.cooldown$"
 bp2_yearly.7027.t: "$bp2_decision.0002.t$: A Purificação"
 bp2_yearly.7027.desc: "A tribo se reúne reverentemente à beira da água, enquanto [Select_CString( priest.IsFemale, 'a santa', 'o santo' )] [priest.GetFirstName] ergue a taça cerimonial.\n\n\"De algumas poucas gotas começou o mar! De um[teentribal.Custom('ES_XA')] [teentribal.Custom('GirlBoy')] vem [Select_CString( teentribal.IsFemale, 'uma mulher', 'um homem' )]! Assim começa\". Ele derrama a água sagrada sobre o cabelo e a pele.\n\n\"Em nome de [priest.GetFaith.WaterGodName]: que a água te purifique, que leve embora a infância e deixe a sabedoria da idade adulta\".\n\nA próxima parte da cerimônia recai sobre mim — e a piscina sagrada aguarda."
 bp2_yearly.7027.a: "Quase se afogar é conhecer a água!"
 bp2_yearly.7027.a.tt: "O mergulho na água sagrada é... quase mortal em duração."
 bp2_yearly.7027.b: "O rito requer... um banho leve."
 bp2_yearly.7027.b.tt: "Um mergulho rápido: o simbolismo é o mestre do mundo desperto."
 bp2_yearly.7027.c: "$bp2_decision.0002.f$"
 bp2_yearly.7027.c.tt: "$bp2_decision.0002.cooldown$"
 bp2_yearly.7027.tt: "A purificação $cleansing_type_element$ está completa"
 bp2_yearly.7028.t: "$bp2_decision.0002.t$: A Purificação"
 bp2_yearly.7028.desc: "Grandes chamas iluminam os rostos severos dos membros da minha tribo. Meu [ROOT.Char.GetCouncillorPosition( 'councillor_court_chaplain' ).GetPositionName] [priest.GetFirstName], armad[priest.Custom('ES_OA')] com a coronha de uma lança, derruba a fogueira e espalha brasas em um caminho reluzente.\n\nRespire… respire com firmeza, eu imploro.\n\n\"Será que est[teentribal.Custom('ES_EA')] jovem está pront[teentribal.Custom('ES_OA')] para se juntar às vossas fileiras?!\", grita [priest.GetFirstNameNoTooltip]. \"[priest.GetFaith.WarGodName] julgará [teentribal.GetFirstName] enquanto enfrenta a prova do fogo! Vá, criança: queime o que não é digno e você poderá pisar na terra fria como um[teentribal.Custom('ES_XA')] [teentribal.GetWomanMan] da cultura [ROOT.Char.GetCulture.GetName]!\"."
 bp2_yearly.7028.a: "[priest.GetFaith.WarGodName|U] conduz o crente através!"
 bp2_yearly.7028.a.tt: "Passos deliberados e cuidadosos são dados durante a caminhada pelo fogo."
 bp2_yearly.7028.b: "Pressa! Faça isso com uma corrida."
 bp2_yearly.7028.b.tt: "A caminhada pelo fogo é honrada, mas a pressa com que é feita é rápida como o vento."
 bp2_yearly.7028.c: "$bp2_decision.0002.f$"
 bp2_yearly.7028.c.tt: "$bp2_decision.0002.cooldown$"
 bp2_yearly.7028.tt: "$bp2_yearly.7027.tt$"
 bp2_yearly.7029.t: "Ritos de Passagem: Um Medo Familiar"
 bp2_yearly.7029.desc: "Como [ROOT.Char.GetTitleAsName|l], dou permissão aos jovens que em breve realizarão ritos de passagem. Alguns fazem promessas ousadas, juramentos que poucos [ROOT.Char.GetCulture.GetCollectiveNoun] poderiam cumprir. Outros, como meu [ROOT.Char.Custom2('RelationToMeShort', teentribal)] [teentribal.GetFirstName], tremem.\n\nHoje, a prova escolhida é a mesma que eu mesm[ROOT.Char.Custom('ES_OA')] empreendi uma vez:"
 bp2_yearly.7029.desc_duel: "A habilidade de [teentribal.GetFirstNameNoTooltip] com as armas é seu maior valor. Mas percebo… que não carrega espada.\n\n\"O oponente escolhido é como uma montanha!\", geme [teentribal.GetSheHe]. \"Como é que devo vencer, a não ser com algum truque sujo?\"."
 bp2_yearly.7029.desc_scarification: "O rosto de [teentribal.GetFirstNameNoTooltip] ficará marcado para sempre como um dos nossos, mas se arrepia só de pensar na lâmina.\n\n\"Temo perder um olho!\" geme [teentribal.GetSheHe]. \"Como vou me preparar para algo tão horrível?\""
 bp2_yearly.7029.desc_seclusion: "[teentribal.GetFirstNameNoTooltip] está preparad[teentribal.Custom('ES_OA')] para o caminho do recolhimento, mas não muito bem. [teentribal.GetSheHe|U] prolonga os abraços, com os olhos úmidos.\n\n\"É um mau presságio?\", pergunta. \"Não? Ainda assim… faz mau tempo. Será que alguém viaja com esse tempo?\"."
 bp2_yearly.7029.desc_hair_shaving: "O cabelo de [teentribal.GetFirstNameNoTooltip] será raspado. \n\n“Dizem que meu cabelo é o mais bonito da tribo!”, protesta [teentribal.GetSheHe]. “Não poderíamos simplesmente cortar a pelagem de um sacrifício?!”.”"
 bp2_yearly.7029.desc_fire_cleanse: "Os pés de [teentribal.GetFirstNameNoTooltip] estão descalços, então talvez conheçam o frio antes de andar sobre as brasas. [teentribal.GetSheHe|U] olha com desconfiança uma pequena lamparina.\n\n“Há mesmo alguma verdade no fogo?”, reclama. “Se vocês só querem me ver sofrer, suponho que vou lhes dar muito sofrimento…”."
 bp2_yearly.7029.desc_water_cleanse: "[teentribal.GetFirstNameNoTooltip] será entregue à água. Não parece muito ansios[teentribal.Custom('ES_OA')] por se submergir.\n\n“Talvez alguma criatura das profundezas venha me devorar”, resmunga. “O meu [ROOT.Char.GetFaith.PriestNeuter] está tão ávido para me matar…”."
 bp2_yearly.7029.a: "Meu relato do meu rito [teentribal.GetHerHim] inspirará!"
 bp2_yearly.7029.a.tt: "Com suas palavras ecoando em seus ouvidos, [teentribal.GetFirstNameNoTooltip] enfrenta o teste com grande convicção."
 bp2_yearly.7029.a.teaching: "[teentribal.GetFirstNameNoTooltip] aprende muito com você"
 bp2_yearly.7029.a.inspiration: "Sua história é maravilhosamente inspiradora"
 bp2_yearly.7029.b: "[teentribal.GetSheHe|U] deve sofrer seus próprios erros."
 bp2_yearly.7029.b.success: "[teentribal.GetFirstName] aprende autoconfiança"
 bp2_yearly.7029.b.fail: "[teentribal.GetFirstName] realiza o rito de forma inadequada"
 bp2_yearly.7029.b.tt: "[teentribal.GetFirstNameNoTooltip] lutará sozinho e ganhará a força de [Select_CString( teentribal.IsFemale, 'uma adulta', 'um adulto' )] como convém… ou a vergonha de um fracasso."
 rites_of_passage_trigger_chaplain: "Seu [GetPlayer.GetCouncillorPosition( 'councillor_court_chaplain' ).GetPositionName|l] está disponível"
 rites_of_passage_trigger_not_proven: "Não completou nenhum rito de passagem"
 rites_of_passage_trigger_delayed: "Atrasou a conclusão de qualquer rito de passagem por 1 ano"
 tribal_hair: "Mecha de cabelo de [teentribal.GetFirstName]"
 tribal_hair.desc: "Lembrete de [teentribal.GetFirstName] de seu bem-sucedido rito de passagem para a vida adulta."
 insecure_adult_modifier: "Adulto Tribal Inseguro"
 insecure_adult_modifier_desc: "Este personagem passou pelo $bp2_decision.0002.t$, mas ainda está inseguro sobre a vida que o espera."
 backdown_from_rite_modifier: "Jovem Tribal Inseguro"
 backdown_from_rite_modifier_desc: "Este personagem não se comprometeu adequadamente com seu rito de passagem; ele é atormentado pelo sentimento de inadequação."
 proven_adult_modifier: "Adulto Tribal Comprovado"
 proven_adult_modifier_desc: "Este personagem passou pelo $bp2_decision.0002.t$ e é considerado um membro adulto honrado da tribo."
 child_like_parent_modifier: "Não Muito Diferente dos Pais"
 child_like_parent_modifier_desc: "Você se parece mais com seu temido progenitor, focad[GetPlayer.Custom('ES_OA')] em você mesm[GetPlayer.Custom('ES_OA')]."
