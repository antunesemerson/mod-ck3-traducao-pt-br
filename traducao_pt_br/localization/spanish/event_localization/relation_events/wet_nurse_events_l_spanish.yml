l_spanish:
 bp2_decision.0001.t: "$find_wet_nurse_decision$"
 bp2_decision.0001.desc: "Com o objetivo de fornecer o melhor cuidado para nossas [ROOT.Char.Custom('GetChildChildren')]$bp2_decision.0001.desc_candidates$"
 bp2_decision.0001.desc_widower: "Dado que criar uma criança de status está longe de ser uma tarefa solitária$bp2_decision.0001.desc_candidates$"
 bp2_decision.0001.desc_candidates: ", mandei meus funcionários procurarem mulheres capazes para o cargo de [GetCourtPositionType('wet_nurse_court_position').GetName()|l].\n\nAgora, eles me apresentam algumas moradoras locais para meu julgamento."
 bp2_decision.0001.a: "Prefiro a experiente [wet_nurse_candidate_1.GetFirstNameNoTooltip]."
 bp2_decision.0001.a.aptitude: "A [aptitude|E] de [wet_nurse_candidate_1.GetUIName] é [wet_nurse_candidate_1.GetCourtPositionAptitude( GetCourtPositionType( 'wet_nurse_court_position' ) )|l]"
 bp2_decision.0001.b: "[wet_nurse_candidate_2.GetFirstNameNoTooltip] é boa o suficiente."
 bp2_decision.0001.b.aptitude: "A [aptitude|E] de [wet_nurse_candidate_2.GetUIName] é [wet_nurse_candidate_2.GetCourtPositionAptitude( GetCourtPositionType( 'wet_nurse_court_position' ) )|l]"
 bp2_decision.0001.c: "Nenhuma delas me agrada."
 bp2_yearly.7000.t: "Licença por Doença"
 bp2_yearly.7000.desc: "A ama de leite, [wet_nurse.GetFirstName], pediu-me uma audiência imediata.\n\n\"Querid[ROOT.Char.Custom('ES_OA')] [wet_nurse.Custom2('RelationToMe', ROOT.Char)], caí enferm[wet_nurse.Custom('ES_OA')]! Preciso implorar alguns dias de descanso… Meus maus humores poderiam afligir as crianças sob meus cuidados.\"\n\nDiz isso gemendo com uma urgência doentia."
 bp2_yearly.7000.desc_child_liege: "Minha ama de leite, [wet_nurse.GetFirstName], não está muito bem ultimamente, e percebeu minha preocupação.\n\n\"Meu pequen[ROOT.Char.Custom('ES_OA')] [wet_nurse.Custom2('RelationToMe', ROOT.Char)] [nursed_child.GetFirstName], embora isso me entristeça, tenho que te dizer… que uma doença ruim tomou conta de mim. Tenho que me ausentar por um tempo, mas não se preocupe tanto! Logo voltarei para você.\""
 bp2_yearly.7000.a: "Não se preocupe, vou cuidar de você."
 bp2_yearly.7000.a.tt: "Você financia uma visita a um médico"
 bp2_yearly.7000.b: "Vamos torná-lo um afastamento permanente."
 bp2_yearly.7000.b.tt: "Sente-se falta do cuidado de [wet_nurse.GetFirstNameNoTooltip]."
 bp2_yearly.7000.c: "Doença? Mantenha-se longe das minhas crianças!"
 bp2_yearly.7000.c_child_liege: "Doença? Melhor você ficar longe de mim!"
 bp2_yearly.7000.ill: "[nursed_child.GetFirstNameNoTooltip] contrai uma doença"
 bp2_yearly.7000.healthy: "[nursed_child.GetFirstNameNoTooltip] supera uma doença"
 bp2_yearly.7000.healthy.tt: "[nursed_child.GetShortUIName] permanece saudável[nursed_child.Custom('ES_OA')]"
 bp2_yearly.7001.t: "Desconfiança na Ama"
 bp2_yearly.7001.desc: "[wet_nurse.GetFirstName] é um[wet_nurse.Custom('ES_XA')] ama de leite excepcional para meus filhos, um[wet_nurse.Custom('ES_XA')] cuidador[wet_nurse.Custom('ES_XA')] que deve ser apreciad[wet_nurse.Custom('ES_OA')]. No entanto, ultimamente, minh[jealous_spouse.Custom('ES_XA')] [ROOT.Char.Custom2('RelationToMe', jealous_spouse)], [jealous_spouse.GetFirstName], desconfia bastante de [wet_nurse.GetHerHim].\n\n\"[jealous_spouse.Custom2('RelationToMe', ROOT.Char)|U] meu[ROOT.Char.Custom('ES_OA')], como cresceu seu interesse por nossos filhos desde que contratamos essa[wet_nurse.Custom('ES_EA')] moç[wet_nurse.Custom('ES_OA')], [wet_nurse.GetFirstNameNoTooltip]! Será que a #EMP abundância#! de seus dons inspira você?\"\n\n"
 bp2_yearly.7001.desc_lover: "Parece... que fui menos cuidadoso do que deveria."
 bp2_yearly.7001.desc_no_lover: "[jealous_spouse.GetFirstNameNoTooltip] está me atacando por nada! Certo...?"
 bp2_yearly.7001.a: "Quer que eu ignore nossos filhos?!"
 bp2_yearly.7001.a.tt: "Essa opção está disponível porque você tem um [lover|lE]"
 bp2_yearly.7001.b: "Absurdo, meu amor: você sabe que sou fiel!"
 bp2_yearly.7001.b.spouse_convinced: "Você convence a [jealous_spouse.GetFirstNameNoTooltip]"
 bp2_yearly.7001.b.spouse_not_convinced: "[jealous_spouse.GetFirstNameNoTooltip] não acredita em você"
 bp2_yearly.7001.c: "Vou acalmar seus medos."
 bp2_yearly.7001.tt: "Você é [Select_CString( ROOT.Char.IsFemale, 'uma mentirosa reconhecida', 'um mentiroso reconhecido' )]"
 bp2_yearly.7002.t: "Cônjuge Amamentador"
 bp2_yearly.7002.desc: "[court_chaplain.GetFirstName] invade meu [ROOT.Char.Custom('GetChamber')] com uma expressão preocupada no rosto.\n\n\"[ROOT.Char.Custom('FormOfAddressForLiege')|U], desculpe a intromissão, é algo urgente! Fiquei sabendo que [spouse.GetFirstName] e vós compartilhavam a mesma ama de leite na infância. Isso torna vosso casamento profundamente inadequado: sois irmãos de leite. Aos olhos de [ROOT.Char.GetFaith.HighGodNamePossessive] sois a família mais próxima possível!\".\n\nUma revelação chocante! [court_chaplain.GetFirstNameNoTooltip] continua antes que eu possa retrucar. \n\n\"Aconselho-vos a divorciar imediatamente. Caso contrário, serei forçado a declarar vosso casamento como incestuoso\"."
 bp2_yearly.7002.a: "Incestuoso, você diz? Eu chamo de amor!"
 bp2_yearly.7002.b: "Nós vamos nos divorciar imediatamente."
 bp2_yearly.7002.c: "Talvez possamos concordar em esquecer disso...?"
 bp2_yearly.parental_neglect_effect: "[nursed_child.GetFirstNameNoTooltip] está furios[nursed_child.Custom('ES_OA')]"
 bp2_yearly.7003.title: "A primeira vez de [nursed_child.GetFirstNameNoTooltip]:"
 bp2_yearly.7003.t: "Palavras de $bp2_yearly.7003.title$"
 bp2_yearly.7003.desc: "\"Corra, meu senhor[ROOT.Char.Custom('ES_XA')], tem que ouvir isso!\".\n\nA ama de leite, [wet_nurse.GetFirstName], me leva às pressas para a [ROOT.Char.Custom('GetChamber')] do meu [ROOT.Char.Custom2('RelationToMeShort', nursed_child)], [nursed_child.GetFirstName]. [nursed_child.Custom('ES_LoLa')|U] aponta com empolgação, então me inclino sobre [nursed_child.GetSheHe] e escuto.\n\n"
 bp2_yearly.7003.desc_gold: "[nursed_child.GetFirstNameNoTooltip] me oferece uma moeda cheia de saliva e diz:\n\n\"O-oh, o-o-ouro...\""
 bp2_yearly.7003.desc_secret: "Enquanto pressiona um dedo em seus lábios pequenos, [nursed_child.GetFirstNameNoTooltip] sussurra para mim:\n\n\"Segredo.\""
 bp2_yearly.7003.desc_motto: "\"[nursed_child.GetHouse.GetMotto]\".\n\nNão acredito, o lema da nossa casa! Ele/ela balbuciou sem engasgar nem gaguejar!"
 bp2_yearly.7003.desc_house: "\"[nursed_child.GetHouse.GetNameNoTooltip].\"\n\nIncrível! [nursed_child.GetFirstNameNoTooltip] aprendeu a dizer o nome de nossa Casa."
 bp2_yearly.7003.desc_military: "\"Guh-bah-nuh… [nursed_child.Custom( 'KnightCultureNoTooltipLowercase' )]!\".\n\nParece que [nursed_child.GetFirstNameNoTooltip] já tem espírito marcial!"
 bp2_yearly.7003.desc_faith: "[nursed_child.GetFaith.random_GoodGodNames].\n\nParece que [nursed_child.GetFirstNameNoTooltip] já é um[nursed_child.Custom('ES_XA')] devot[nursed_child.Custom('ES_OA')]!"
 bp2_yearly.7003.desc_father: "\"Pa-, pa-...\""
 bp2_yearly.7003.desc_mother: "\"Ma-, ma-...\""
 bp2_yearly.7003.a: "Que delícia!"
 bp2_yearly.7003.b: "O que mais ele/ela pode dizer?"
 bp2_yearly.7003.b.tt: "Você pressiona a [nursed_child.GetFirstNameNoTooltip] para que continue falando."
 bp2_yearly.7003.c: "Não tenho tempo para isso."
 bp2_yearly.7004.t: "Passos de $bp2_yearly.7003.title$"
 bp2_yearly.7004.desc: "Ouço um alvoroço vindo dos aposentos de meu [ROOT.Char.Custom2('RelationToMeShort', nursed_child)] [nursed_child.GetFirstName]. Corro para dentro e vejo a ama de leite, [wet_nurse.GetFirstName], brincando com [nursed_child.GetFirstName]. \n\n\"[ROOT.Char.Custom('FormOfAddressForLiege')|U], chegou na hora perfeita! [nursed_child.GetFirstNameNoTooltip] acabou de dar o primeiro passo!\", grita com entusiasmo.\n\nSegurando as mãos de [nursed_child.GetFirstNameNoTooltip], ela tenta fazer [nursed_child.GetHerHim] caminhar pelo aposento."
 bp2_yearly.7004.a: "\"Um grande passo para uma criança. Um pequeno passo para um[nursed_child.Custom('ES_XA')] governante\"."
 bp2_yearly.7004.b: "O que mais sabe fazer?"
 bp2_yearly.7004.b.tt: "Você pressiona [nursed_child.GetFirstNameNoTooltip] para continuar andando."
 bp2_yearly.7004.c: "$bp2_yearly.7003.c$"
 bp2_yearly.7005.t: "Primeiro Dente de $bp2_yearly.7003.title$"
 bp2_yearly.7005.desc: "Com minha permissão, meu [ROOT.Char.Custom2('RelationToMeShort', nursed_child)] [nursed_child.GetFirstName] e sua ama de leite entram em meu [ROOT.Char.Custom('GetChamber')] como se o lugar fosse deles. [wet_nurse.GetFirstNameNoTooltip] posa como um arauto e anuncia:\n\n\"[ROOT.Char.Custom('FormOfAddressForLiege')|U], testemunhais uma ocasião monumental. [nursed_child.GetFirstNameNoTooltip] tem um tremendo presente para vós\". [nursed_child.GetHerHim|U] o empurra levemente para que avance. \"Vamos lá, [nursed_child.GetFirstNameNoTooltip], digam-lhe!\".\n\n\"[nursed_child.Custom2('RelationToMeShort', ROOT.Char)|U], caí um dente!\". Meu [ROOT.Char.Custom2('RelationToMeShort', nursed_child)] exibe orgulhosamente um sorriso banguela e me entrega uma bolsinha com o dente caído dentro."
 bp2_yearly.7005.a: "Encantador! Mas guarde o dente como um bom amuleto."
 bp2_yearly.7005.b: "Aqui: um presente que combina com um presente!"
 bp2_yearly.7005.b.tt: "Você recebeu um dente"
 bp2_yearly.7005.c: "$bp2_yearly.7003.c$"
 child_teeth_memorabilia: "Dente de leite de [nursed_child.GetNameNoTooltip]"
 child_teeth_memorabilia_desc: "O primeiro dente de leite que caiu de [nursed_child.GetNameNoTooltip]."
 bp2_yearly.7006.t: "$bp2_yearly.7003.title$ Enfarpelamento"
 bp2_yearly.7006.desc: "Enquanto espero pacientemente que tragam minhas roupas, um servo gagueja: \"[ROOT.Char.Custom('FormOfAddressForLiege')|U], uh… ninguém consegue encontrar suas vestes!\".\n\n\"Estou cercado por incompetência!\", resmungo, saindo furioso do meu [ROOT.Char.Custom('GetChamber')].\n\nÉ no [ROOT.Char.Custom('GetRoom')] do meu [ROOT.Char.Custom2('RelationToMeShort', nursed_child)], [nursed_child.GetFirstName] que descubro não apenas minhas vestes, mas também a ama de leite [nursed_child.Custom('ES_DelDela')] [nursed_child.Custom('GirlBoy')].\n\n\"Não tive nada a ver com isso, meu senhor[ROOT.Char.Custom('ES_XA')] — [nursed_child.GetSheHe] se vestiu [nursed_child.Custom('ES_OA')]!\", responde [wet_nurse.GetFirstNameNoTooltip] com uma risadinha."
 bp2_yearly.7006.a: "O pequeno maroto!"
 bp2_yearly.7006.b: "Então, ele é uma[nursed_child.Custom('ES_XA')] [nursed_child.Custom('GetPrincessPrince')|l] da moda?"
 bp2_yearly.7006.c: "$bp2_yearly.7003.c$"
 bp2_yearly.7008.t: "$bp2_yearly.7003.title$ Ressentimento"
 bp2_yearly.7008.desc_start: "'Ah, quando você era apenas uma criança! Sempre vou guardar esses dias,' diz m [ROOT.Char.Custom2('RelationToMeShort', reflecting_parent)] [reflecting_parent.GetFirstName], completamente sem ser instigado.\n\nTudo volta em um turbilhão. Eu #EMP sei#! que"
 bp2_yearly.7008.desc: "$bp2_yearly.7008.desc_start$ [reflecting_parent.GetSheHe] nunca se importou comigo. #EMP Sé#! que seus momentos de diversão foram minhas piores adversidades."
 bp2_yearly.7008.desc_dead_parent: "$bp2_yearly.7008.desc_start$ meu [ROOT.Char.Custom2('RelationToMeShort', ROOT.Var('nursed_child_parent_var').Char)] [ROOT.Var('nursed_child_parent_var').Char.GetFirstName] foi um[ROOT.Var('nursed_child_parent_var').Char.Custom('ES_XA')] inimig[ROOT.Var('nursed_child_parent_var').Char.Custom('ES_OA')] para mim enquanto viveu."
 bp2_yearly.7008.desc_word: "Se até desprezou minhas primeiras palavras!"
 bp2_yearly.7008.desc_step: "Foi embora, entediad[ROOT.Var('nursed_child_parent_var').Char.Custom('ES_OA')], enquanto eu dava meus primeiros passos."
 bp2_yearly.7008.desc_tooth: "Recuou, enojad[ROOT.Var('nursed_child_parent_var').Char.Custom('ES_OA')], diante do meu primeiro dente de leite caído!"
 bp2_yearly.7008.desc_dress: "Ridicularizou minha paixão infantil por brincar de se vestir!"
 bp2_yearly.7008.desc_end: "\n\nEu deveria ter o que me é devido! Ou talvez... seja melhor parar de remoer o passado?"
 bp2_yearly.7008.a: "\"Dê-me as suas terras, [nursed_child.Custom2('RelationToMeShort', reflecting_parent)]!\""
 bp2_yearly.7008.a.tt_good: "[reflecting_parent.GetFirstNameNoTooltip] concorda com você"
 bp2_yearly.7008.a.tt_bad: "[reflecting_parent.GetFirstNameNoTooltip] oferece algo diferente em vez disso"
 bp2_yearly.7008.b: "\"Você me deve a sua riqueza!\""
 bp2_yearly.7008.c: "\"Eu te desprezo e espero nunca mais te ver!\""
 bp2_yearly.7008.c_dead_parent: "\"Por que você me negligenciou assim!?\""
 bp2_yearly.7008.d: "Prefiro focar nos meus próprios filhos."
 bp2_yearly.7008.e: "Tal tratamento é... justo."
 bp2_yearly.7008.tt: "[reflecting_parent.GetFirstNameNoTooltip] terá que responder"
 bp2_yearly.7009.t: "$bp2_yearly.7003.title$ Laços"
 bp2_yearly.7009.desc: "$bp2_yearly.7008.desc_start$ m [ROOT.Char.Custom2('RelationToMeShort', reflecting_parent)] viu o melhor em mim, sempre se esforçou para me defender. Os melhores momentos da minha infância foram aqueles com [reflecting_parent.GetSheHe]."
 bp2_yearly.7009.desc_dead_parent: "$bp2_yearly.7008.desc_start$ meu [ROOT.Char.Custom2('RelationToMeShort', reflecting_parent)] nutria uma profunda devoção por mim e, enquanto viveu meu [ROOT.Char.Custom2('RelationToMeShort', ROOT.Var('nursed_child_parent_var').Char)], [ROOT.Var('nursed_child_parent_var').Char.GetFirstName], também me amou ferozmente."
 bp2_yearly.7009.desc_word: "Foram [ROOT.Var('nursed_child_parent_var').Char.GetSheHe] que ouviu minhas primeiras palavras."
 bp2_yearly.7009.desc_step: "[ROOT.Var('nursed_child_parent_var').Char.GetSheHe|U] me ajudou a dar meus primeiros passos."
 bp2_yearly.7009.desc_tooth: "Até aceitou que eu colocasse meu dente de leite em sua mão."
 bp2_yearly.7009.desc_dress: "[ROOT.Var('nursed_child_parent_var').Char.GetSheHe|U] incentivou minha travessura, meu gosto por me vestir."
 bp2_yearly.7009.desc_end: "\n\nTalvez eu devesse retribuir seu afeto?"
 bp2_yearly.7009.desc_end_dead_parent: "\n\nMas já é tarde demais para agradecê-l[ROOT.Char.Custom2('RelationToMe', reflecting_parent)]."
 bp2_yearly.7009.a: "\"Eu te amo tanto, [nursed_child.Custom2('RelationToMeShort', reflecting_parent)].\""
 bp2_yearly.7009.a.tt_good: "$bp2_yearly.7008.a.tt_good$"
 bp2_yearly.7009.a.tt_bad: "[reflecting_parent.GetFirstNameNoTooltip] quer algo em troca"
 bp2_yearly.7009.b: "Vou passar o amor e o cuidado para os meus filhos!"
 bp2_yearly.7009.c: "Uh-huh. Família, gratidão... e assim por diante."
 bp2_yearly.7010.t: "$bp2_yearly.7008.t$"
 bp2_yearly.7010.desc_start: "Enquanto tratava de alguns assuntos da corte com meu [ROOT.Char.Custom2('RelationToMeShort', nursed_child)] , [nursed_child.GetFirstName] , de repente ele/ela muda o assunto para a infância.\n\n"
 bp2_yearly.7010.desc: "$bp2_yearly.7010.desc_start$\"Com todo meu carinho, [nursed_child.Custom2('RelationToMeShort', ROOT.Char)], deveis admitir isso: nunca se importou comigo, nem mesmo quando eu era pequen[nursed_child.Custom('ES_OA')]."
 bp2_yearly.7010.desc_dead_parent: "$bp2_yearly.7010.desc_start$\" [nursed_child.Custom2('RelationToMeShort', ROOT.Char)], é errado falar mal dos mortos, mas você deve admitir que meu [nursed_child.Custom2('RelationToMeShort', nursed_child.MakeScope.Var('nursed_child_parent_var').Char)] foi o pior pai que poderia existir!"
 bp2_yearly.7010.desc_word: "Minhas primeiras palavras foram ignoradas!"
 bp2_yearly.7010.desc_step: "Meus primeiros passos foram ignorados!"
 bp2_yearly.7010.desc_tooth: "Os primeiros dentes que perdi foram jogados fora!"
 bp2_yearly.7010.desc_dress: "Minhas brincadeiras de me vestir foram impiedosamente ridicularizadas."
 bp2_yearly.7010.desc_end: "É #EMP isso#! amor?\n\n[nursed_child.GetFirstNameNoTooltip] se esforça para dizer, tremendo de emoção, mas resolut[nursed_child.Custom('ES_OA')]."
 bp2_yearly.7010.desc_title: "$bp2_yearly.7008.a$"
 bp2_yearly.7010.desc_gold: "$bp2_yearly.7008.b$"
 bp2_yearly.7010.desc_hate: "$bp2_yearly.7008.c$"
 bp2_yearly.7010.desc_hate_dead_parent: "$bp2_yearly.7008.c_dead_parent$"
 bp2_yearly.7010.a: "Estou dispost[ROOT.Char.Custom('ES_OA')] a provar o arrependimento."
 bp2_yearly.7010.a.tt: "$bp2_yearly.7008.a.tt_good$"
 bp2_yearly.7010.b: "\"A partir de agora, você terá o que precisa de mim!\""
 bp2_yearly.7010.b.tt: "$bp2_yearly.7008.a.tt_bad$"
 bp2_yearly.7010.c: "\"Cresça.\""
 bp2_yearly.7010.c.tt: "[reflecting_parent.GetFirstNameNoTooltip] não se importa muito"
 bp2_yearly.7011.t: "$bp2_yearly.7009.t$"
 bp2_yearly.7011.desc: "$bp2_yearly.7010.desc_start$\"[nursed_child.Custom2('RelationToMeShort', ROOT.Char)|U], você cuidou de mim como a cadelinha cuida dos filhotes. Melhor ainda. Minhas primeiras e mais queridas memórias foram com você."
 bp2_yearly.7011.desc_dead_parent: "$bp2_yearly.7010.desc_start$\"Enquanto meu [nursed_child.Custom2('RelationToMeShort', nursed_child.MakeScope.Var('nursed_child_parent_var').Char)] esteve conosco, [nursed_child.MakeScope.Var('nursed_child_parent_var').Char.GetHerHim] eu realmente o/a amei. Você e [nursed_child.MakeScope.Var('nursed_child_parent_var').Char.GetSheHe] sempre dedicavam tempo para mim."
 bp2_yearly.7011.desc_word: "Quando eu disse minhas primeiras palavras!"
 bp2_yearly.7011.desc_step: "Quando dei meus primeiros passos!"
 bp2_yearly.7011.desc_tooth: "Quando coloquei meu primeiro dente caído em sua mão."
 bp2_yearly.7011.desc_dress: "Quando eu fazia travessuras e me divertia!"
 bp2_yearly.7011.desc_end: "Estiveste sempre tão perto\".\n\nCora, radiante.\n\n"
 bp2_yearly.7011.desc_receive_love: "$bp2_yearly.7011.desc_end$$bp2_yearly.7009.a$"
 bp2_yearly.7011.desc_forwarded_love: "\"$bp2_yearly.7011.desc_end$\"$bp2_yearly.7009.b$\""
 bp2_yearly.7011.a: "\"E eu te amo, [ROOT.Char.Custom2('RelationToMeShort', nursed_child)]!\""
 bp2_yearly.7011.a.tt: "$bp2_yearly.7009.a.tt_good$"
 bp2_yearly.7011.b: "\"Tamanha devoção!\""
 bp2_yearly.7011.b.tt: "$bp2_yearly.7009.a.tt_bad$"
 bp2_yearly.7011.c: "\"Não se detenha no passado.\""
 bp2_yearly.7011.c.tt: "$bp2_yearly.7010.c.tt$"
 bp2_yearly.7012.t: "O Leite do Amor de uma Amamentadora"
 bp2_yearly.7012.desc: "[nursed_child.Custom2('MyCharacterIntroduction', ROOT.Char)|U] entra aos tropeções, interrompendo minha reunião do conselho, e tenta me puxar para o lado.\n\n\"[nursed_child.GetFirstNameNoTooltip]! Você não deveria estar aqui\", protesto, mas [nursed_child.GetSheHe] cora e começa a gritar.\n\n\"Eu te #EMP odeio#! Por que fez isso?\". [nursed_child.GetSheHe|U] faz uma pausa fungando, com todos os olhos voltados para [nursed_child.GetHerHim]. \"Você mandou embora minha [former_wet_nurse.GetFirstName]! Ela não é só uma ama de leite — eu a amo como uma mãe! #EMP Mais#! do que minha mãe!\""
 bp2_yearly.7012.a: "Perdoe-me. Eu a contratarei de volta!"
 bp2_yearly.7012.b: "Você deve respeitar a decisão do seu [nursed_child.Custom2('RelationToMe', ROOT.Char)]."
 bp2_yearly.7012.b_win: "Você conforta e educa a [nursed_child.GetFirstNameNoTooltip]"
 bp2_yearly.7012.b_loss: "[nursed_child.GetFirstNameNoTooltip] ressente sua dominação"
 bp2_yearly.7012.c: "Criança, cale-se!"
 bp2_yearly.7013.t: "O Luto de uma Criança"
 bp2_yearly.7013.desc: "Ultimamente, [nursed_child.GetFirstName] tem vagado sem rumo, perdid[nursed_child.Custom('ES_OA')] em seus pensamentos. Em seu aposento, vejo [nursed_child.GetHerHim] chorando em seus travesseiros. \n\n\"O que houve, meu[nursed_child.Custom('ES_XA')] [ROOT.Char.Custom2('RelationToMeShort', nursed_child)]?\", pergunto, enquanto [nursed_child.GetSheHe] começa a se acalmar.\n\n\"O que acontece quando você morre? Eu só fico pensando... se minha ama de leite [former_wet_nurse.GetFirstName] estará bem.\" [nursed_child.GetSheHe|U] dá uma grande fungada, segurando as lágrimas. \"Talvez agora ela tenha de amamentar [ROOT.Char.GetFaith.DevilName]?\"\n\nQuando a voz de [nursed_child.GetFirstNameNoTooltip] falha, [nursed_child.GetSheHe] desaba nas maiores e mais úmidas lágrimas que já vi."
 bp2_yearly.7013.a: "\"Sua nova amamentadora vai fazer tudo ficar melhor!\""
 bp2_yearly.7013.a.tt: "Aciona $bp2_decision.0001.t$"
 bp2_yearly.7013.b: "\"Ela certamente está em [nursed_child.GetFaith.PositiveAfterLife] agora.\""
 bp2_yearly.7013.c: "Morto é morto."
 bp2_yearly.7014.t: "Uma Presença Familiar"
 bp2_yearly.7014.desc: "Minha ama de leite [wet_nurse.GetFirstName] me deita na cama e se prepara para apagar as velas da noite.\n\n\"Espere! Quero dizer uma coisa!\", imploro. \"Gosto de você estar aqui… Eu me sentiria tão sol[ROOT.Char.Custom('ES_OA')] em [ROOT.Char.GetCurrentLocation.GetName] sem você\".\n\nA [wet_nurse.GetFirstNameNoTooltip] parece que isso o deixa um pouco desconfortável, mas comovido.\n\n\"Sou um[wet_nurse.Custom('ES_XA')] fiel"
 bp2_yearly.7014.desc_faith: "serv[wet_nurse.Custom('ES_OA')] de [wet_nurse.GetFaith.HighGodName], como você será um dia. Quando estiver forte em sua fé, [wet_nurse.GetFaith.HighGodName] o guiará e confortará, e você não precisará mais de mim.\""
 bp2_yearly.7014.desc_culture: "membro da cultura [wet_nurse.GetCulture.GetName], como você. Compartilhamos um coração [wet_nurse.GetCulture.GetEthos.GetNameNoTooltip|l]. [tradition.GetNameNoTooltip], [tradition_2.GetNameNoTooltip|l]… estas são as nossas maneiras! Queremos sejam grandes ou pequenos, somos todos gente boa\"."
 bp2_yearly.7014.desc_culture_no_trad: "[wet_nurse.GetCulture.GetName], como você. Compartilhamos nossos corações [wet_nurse.GetCulture.GetEthos.GetNameNoTooltip|l] e nossos antigos costumes! Grandes ou pequenos, todos somos bons sujeitos.\""
 bp2_yearly.7014.a: "\"Eu gostaria que você fosse minha mãe!\""
 bp2_yearly.7014.b: "Eu não vou esquecer deste momento."
 parenting_by_example: "Paternidade pelo Exemplo"
 parenting_by_example_desc: "Os pais deste personagem ensinaram a eles a criar filhos com amor e cuidado."
 role_model_parent: "Pai/Mãe Modelo"
 role_model_parent_desc: "Este pai/mãe inspira seus filhos a amar e cuidar de sua própria prole."
 rites_of_passage_decision: "$bp2_decision.0002.t$"
 rites_of_passage_decision_desc: "Jovens de certa idade podem participar de um rito de passagem: um ritual que os marca como adultos de status na tribo."
 rites_of_passage_decision_effect_tooltip: "Um jovem se envolve em um de: $rites_of_passage_duel$, $rites_of_passage_scarification$, $rites_of_passage_seclusion$, $rites_of_passage_shaving$ ou Limpeza Elemental"
 rites_of_passage_decision_confirm: "É hora"
 rites_of_passage_duel: "Duelo"
 rites_of_passage_scarification: "Escarificação"
 rites_of_passage_seclusion: "Reclusão"
 rites_of_passage_shaving: "Corte de Cabelo"
 bp2_decision.0002.t: "Ritos de Passagem"
 bp2_decision.0002.desc: "O tempo traz novos adultos para uma tribo [ROOT.Char.GetCulture.GetName] mas são apenas as cerimônias de prova que estabelecem a maturidade, o status e o valor. [teentribal.GetFirstName], meu [ROOT.Char.Custom2('RelationToMeShort',teentribal)] tem a idade apropriada. Nosso povo [ROOT.Char.GetCulture.GetEthos.GetNameNoTooltip|l] tem três meios consagrados pelo tempo para testar[teentribal.GetHerHim] a \n\n"
 bp2_decision.0002.desc_root: "Até que eu atinja a idade adulta, os outros [ROOT.Char.GetCulture.GetCollectiveNoun] não me respeitarão como um membro pleno da minha tribo. Nosso povo de mentalidade [ROOT.Char.GetCulture.GetEthos.GetNameNoTooltip|l] tem três cerimônias consagradas pelo tempo para marcar a passagem à maturidade… e provar meu valor como [ROOT.Char.GetTitleAsName|l].\n\n"
 bp2_decision.0002.desc_duel: "Em um duelo contra outr[teentribal.Custom('ES_OA')] [teentribal.GetWomanMan] da cultura [ROOT.Char.GetCulture.GetName] , prevalecemos por habilidade e força."
 bp2_decision.0002.desc_scarification: "Na escarificação, a determinação é marcada na pele."
 bp2_decision.0002.desc_seclusion: "Na reclusão, testamos a adaptabilidade e a previsão."
 bp2_decision.0002.desc_hair_shaving: "Raspar a cabeça de cabelos cativantes prova força de vontade."
 bp2_decision.0002.desc_cleansing: "O poder purificador do $cleansing_type_element$ só pode ser alcançado com paciência e zelo."
 bp2_decision.0002.desc_end: "\n\nSe [teentribal.GetFirstNameNoTooltip] superar qualquer uma destas provas, receberá o favor de [ROOT.Char.GetFaith.HighGodName] e será [teentribal.GetHerHim] reconhecido como um[teentribal.Custom('ES_XA')] dign[teentribal.Custom('ES_OA')] [teentribal.GetWomanMan] da cultura [ROOT.Char.GetCulture.GetNameNoTooltip]."
 bp2_decision.0002.desc_end_root: "\n\nSe eu passar em qualquer uma dessas provas, serei dign[ROOT.Char.Custom('ES_OA')] aos olhos de [ROOT.Char.GetFaith.HighGodName] e serei um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] respeitad[ROOT.Char.Custom('ES_OA')] da cultura [ROOT.Char.GetCulture.GetNameNoTooltip]."
 bp2_decision.0002.effect_tt: "Ganha um [personality_trait|lE], [lifestyle_experience|lE] ou um ponto de [skill|El]"
 bp2_decision.0002.effect_modifier_tt: "Ganha [GetModifier('proven_adult_modifier').GetNameWithTooltip|l] ou [GetModifier('insecure_adult_modifier').GetNameWithTooltip|l] por #V 10 anos#!"
 bp2_decision.0002.a: "Um duelo."
 bp2_decision.0002.a.flavor: "Será [teentribal.Custom('GirlBoy')] contra [teentribal.GetWomanMan]!"
 bp2_decision.0002.a.tt: "Você escolherá um oponente para [single_combat_duel|lE]"
 bp2_decision.0002.a.win: "Se a luta for vencida"
 bp2_decision.0002.a.lose: "Se a luta for perdida"
 bp2_decision.0002.b: "Um ritual de escarificação."
 bp2_decision.0002.b.tt: "Exiba para todos a prova do domínio da mente sobre o corpo!"
 bp2_decision.0002.b_scarred: "Se as cicatrizes forem profundas"
 bp2_decision.0002.b_scarred.tt: "Ganha [GetTrait('scarred').GetName( GetNullCharacter )|LV] ou [GetTrait('wounded_1').GetName( GetNullCharacter )|LV]"
 bp2_decision.0002.b_modifier: "Se a lâmina tocar apenas levemente"
 bp2_decision.0002.c: "Reclusão."
 bp2_decision.0002.c.tt: "A natureza selvagem revela o verdadeiro eu."
 bp2_decision.0002.c.destination: "Você escolherá um [travel_destination|lE]"
 bp2_decision.0002.c_win: "Se a reclusão for mestra"
 bp2_decision.0002.c_lose: "Se a reclusão for angustiante"
 bp2_decision.0002.c_trait: "Ganha um [commander_trait|lE] com base no terreno de destino"
 bp2_decision.0002.d: "Corte de Cabelo"
 bp2_decision.0002.d.tt: "Que os privilégios da infância sejam cortados!"
 bp2_decision.0002.d_artifact: "Ganha um [artifact|lE]"
 bp2_decision.0002.d_bald: "Se tudo for raspado"
 bp2_decision.0002.d_shave: "Se apenas uma mecha de cabelo for cortada"
 fire_cleanse: "fogo"
 water_cleanse: "água"
 cleansing_type_element: "[SelectLocalization(ObjectsEqual(teentribal.MakeScope.Var('cleansing_type').GetFlagName, '$fire_cleanse|q$'),'fire_cleanse','water_cleanse')]"
 passage_rites_effect.trait: "Algo desperta interiormente"
 passage_rites_effect.xp: "Muita sabedoria e conhecimento do mundo são adquiridos"
 passage_rites_effect.skill: "Muito é aprendido com o rito"
 bp2_decision.0002.e: "Uma purificação de $cleansing_type_element$."
 bp2_decision.0002.e.tt: "A força primal do $cleansing_type_element$ purificará mente e corpo."
