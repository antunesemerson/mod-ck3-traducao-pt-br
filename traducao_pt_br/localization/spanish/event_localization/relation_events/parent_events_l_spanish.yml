l_spanish:
 parent_meddling_tt: "M [parent.Custom('MotherFather')] espera ter voz ativa nas minhas decisões"
 parent_meddling_decrease_tt: "M [parent.Custom('MotherFather')] está contente por eu seguir seu conselhos"
 parent.1001.t: "Conselho de [parent.Custom('MotherFather')]"
 parent.1001.desc: "Meu [parent.Custom('MotherFather')] tem muito a dizer sobre os $knight_culture_player_plural_no_tooltip_lowercase$ da minha [ROOT.Char.Custom('GetCourt')|l]. Comenta sobre tudo, desde seu treinamento até o que deveriam estar se preparando para o campo de batalha.\n\nAté os próprios $knight_culture_player_plural_no_tooltip$ admitem que o que ele diz faz muito sentido."
 parent.1001.a: "Como #EMP devo#! organizá-los, [parent.Custom('MotherFather')]?"
 parent.1001.b: "Somente eu decido como eles lutam!"
 parent.1002.desc: "Meu [parent.Custom('MotherFather')] é um[parent.Custom('ES_XA')] [parent.GetWomanMan] inteligente, que entende plenamente as necessidades e desejos do povo.\n\nCostuma me aconselhar sobre como lidar com os outros."
 parent.1002.a: "Eu preciso de todo o conselho que puder obter, para ser sincero."
 parent.1002.b: "\"É #EMP minha#! [ROOT.Char.Custom('GetCourt')|l], não sua, [parent.Custom('MotherFather')].\""
 parent.1003.desc: "Meu/minha [parent.Custom('MotherFather')] frequentemente passa horas apontando pequenos detalhes que eu deixo escapar em meu [ROOT.Char.Custom('GetCourt')|l].\n\nDois servos que costumavam brigar agora fofocam, os guardas parecem mais quietos que o normal, um braseiro foi movido para o outro lado do [ROOT.Char.Custom('ResidenceBuilding')]..."
 parent.1003.a: "Melhor saber do que se arrepender por não saber."
 parent.1003.b: "\"Eu não quero que você alimente minhas preocupações, [parent.Custom('MotherFather')].\""
 parent.1004.desc: "Às vezes acho que meu [parent.Custom('MotherFather')] conhece minha Tesouraria melhor do que meu Tesoureiro. Parece que uma moeda de ouro vale o dobro quando [parent.Custom('ES_ElElla')] me diz como gastá-la!"
 parent.1004.a: "\"Por favor, me guie para escolhas prudentes, [parent.Custom('MotherFather')].\""
 parent.1004.b: "Meu reino, meu tesouro!"
 parent.1005.desc: "Gente muito sábia honra minha [ROOT.Char.Custom('GetCourt')|l], mas duvido que qualquer pessoa entre eles pudesse derrotar meu/minha [parent.Custom('MotherFather')] em um debate. Sempre mostra uma perspectiva surpreendente ou uma camada a mais de conhecimento para revelar!"
 parent.1005.a: "\"Compartilhe sua sabedoria comigo, [parent.Custom('MotherFather')]!\""
 parent.1005.b: "As palavras deslumbram, mas será que são mesmo tão sábias?"
 parent.1006.t: "Uma Mão Orientadora"
 parent.1006.desc: "M [parent.Custom('MotherFather')] tem mostrado grande interesse nos acontecimentos em [county.GetNameNoTier] ultimamente.\n\n até mesmo começou a se corresponder com barões e prefeitos, instruindo-os sobre a administração adequada!"
 parent.1006.a: "Bom trabalho, [parent.Custom('MotherFather')]."
 parent.1007.t: "[parent.Custom('MotherFather')|U] Mediador [parent.Custom('ES_XA')]"
 parent.1007.desc_opening: "M [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('courtier'))], [courtier.GetTitledFirstName|l], deixou bem claro o desdém que sente por mim.\n\n"
 parent.1007.courtier_1: "[courtier.Custom('ES_LoLa')|U] peguei contando uma história sobre um grande erro que #EMP se supone#! que cometi em um evento. Um ao qual eu nem sequer fui!"
 parent.1007.courtier_2: "Encontrei [courtier.GetSheHe] e outro parasita andando pelo meu [ROOT.Char.Custom('ResidenceBuilding')]. Assim que [courtier.Custom('ES_ElLa')] [courtier.GetTitledFirstNameNoTooltip|l] me viu, parou de fofocar até eu ter passado. Nem é a primeira vez que sofro esse tipo de insulto!"
 parent.1007.desc_end: "\n\nMeu [parent.Custom('MotherFather')] sempre dispost[parent.Custom('ES_OA')] a mediar, ofereceu-se para esclarecer as coisas entre nós."
 parent.1007.a: "A ajuda é sempre bem-vinda."
 parent.1007.b: "Eu mesmo irei manter essas pessoas sob controle!"
 parent.1009.t: "Uma Nova Relação"
 parent.1009.desc: "Uma antiga amizade de meu [parent.Custom('MotherFather')] , [new_courtier.GetTitledFirstName|l] , chegou ao meu [ROOT.Char.Custom('GetCourt')|l] por convite dela.\n\nMeu [parent.Custom('MotherFather')] não para de insinuar a boa influência que essa pessoa poderia exercer se lhe fosse oferecido algum cargo…"
 parent.1009.a: "Tenho certeza de que podemos encontrar algo para fazer."
 parent.1009.b: "Não, [new_courtier.GetSheHe] não terá um lar aqui."
 parent.1010.t: "Relações Relaxantes"
 parent.1010.desc: "Ultimamente, meus encargos como [ROOT.Char.GetTitleAsNameNoTooltip|l] têm sido mais intensos do que o normal, e meu/minha [parent.Custom('MotherFather')] parece ter notado.\n\nInsiste que eu tire um dia de descanso, assegurando-me que [parent.GetSheHe] cuidará de minhas responsabilidades nesse meio-tempo."
 parent.1010.a: "Um descanso é exatamente o que eu preciso."
 parent.1010.b: "Este não é o momento de relaxar!"
 parent.2002.t: "Uma Educação Sólida"
 parent.2002.desc: "Depois de não ver [child.GetTitledFirstName|l] por dias, logo descobri que meu/minha excessiv[ROOT.Char.Custom('ES_OA')] [parent.Custom('MotherFather')] sabia exatamente onde estava:\n\"Eu só [child.Custom('ES_LoLa')] mandei embora. Estou preocupad[ROOT.Char.Custom('ES_OA')] com sua educação! As coisas vão correr muito melhor sob a tutela de [new_guardian.GetTitledFirstName|l]\"."
 parent.2002.a: "Você enviou m [child.Custom('DaughterSon')] para #EMP onde#!?!"
 child_sent_away_tt: "[child.Custom('ES_AlAla')|U] [child.GetTitledFirstName|l] será educado por [new_guardian.Custom('ES_ElLa')] [new_guardian.GetTitledFirstNameNoTooltip|l]"
 parent.2003.t: "A mesquinhez do meu [parent.Custom('MotherFather')]"
 parent.2003.desc: "Eu pensei que a rixa entre minha [parent.Custom('MotherFather')] e meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('hated_courtier'))], [hated_courtier.GetTitledFirstName|l], nunca teria fim.\n\nMas agora acabou. Meu [parent.Custom('MotherFather')] baniu [hated_courtier.GetFirstNameNoTooltip] do meu [ROOT.Char.Custom('GetRealmOrDomicile')]!"
 parent.2003.a: "Como se atreve?! Isto é #EMP mi#! [ROOT.Char.Custom('GetRealmOrDomicile')|l]!"
 parent.2003.b: "Boa riddance."
 parent.2004.t: "Um Incômodo Constante"
 parent.2004.opening: "M [parent.Custom('MotherFather')], [parent.GetFirstName], passou a me seguir por toda parte, expressando suas opiniões sobre tudo o que faço e tentando oferecer orientação."
 parent.2004.malicious: "\n\nMe incomoda sem piedade, afirmando que a severidade do tratamento é para o meu próprio bem, ao mesmo tempo em que nega o sorriso que às vezes vejo se esboçando em seus lábios."
 parent.2004.benevolent: "\n\n me dá palestras sobre as virtudes da retidão, insinuando que eu tenho muito a aprender sobre o assunto."
 parent.2004.dominant: "\n\n me dá lições constantemente, nunca cedendo e nunca me deixando relaxar."
 parent.2004.submissive: "\n\nSe tornou minha sombra constante e esconde todos os comentários por trás de sugestões e insinuações aparentes."
 parent.2004.extroverted: "\n\nAté age assim entre meus [ROOT.Char.Custom('GetCourtierPlural')|l] Me pressiona a falar com eles, criando situações constrangedoras para todos!"
 parent.2004.introverted: "\n\n prega sobre as virtudes da solidão e tenta me isolar de meus [ROOT.Char.Custom('GetCourtierPlural')|l]!"
 parent.2004.emotional: "\n\nÉ propens[parent.Custom('ES_OA')] a crises emocionais e se aproveita do fato de que [parent.Custom('ES_LoLa')] ouvirei para evitar um escândalo."
 parent.2004.levelheaded: "\n\n quer debater comigo sobre tudo, afirmando que se precipitar em qualquer situação é abrir mão de toda vantagem. As longas discussões estão consumindo tempo e energia demais."
 parent.2004.fallback: "\n\n me importuna incessantemente com sugestões, e o [ROOT.Char.Custom('GetCourt')|l] está começando a fofocar sobre quem realmente toma as decisões no [ROOT.Char.Custom('ResidenceBuilding')]!"
 parent.2004.end: "Sei que faz isso por amor, mas isso está ficando ridículo."
 parent.2004.a: "Eu ordenarei que pare!"
 parent.2004.b: "É irritante, mas inegavelmente útil…"
 parent.2004.b.message: "Estou bem com a situação como está"
 parent.3001.t: "Sob Minha Asa"
 parent.3001.desc: "Ultimamente tenho notado que meu querid[child.Custom('ES_OA')] [child.Custom('GetDaughterSon')], [child.Custom('ES_ElLa')] [child.GetTitledFirstName|l], passa muito tempo com meu[parent.Custom('MotherFather')].\n\nPelo visto, [parent.Custom('ES_ElLa')] [parent.GetTitledFirstName|l] tem um interesse pessoal na vida dele(a) e pretende fazer parte ativa dela."
 parent.3001.a: "M [parent.Custom('MotherFather')] realmente se importa com m [child.Custom('GetDaughterSon')]."
 parent.3001.b: "É preocupante o repentino interesse de meu [child.Custom('GetDaughterSon')]…"
 parent.3001.c: "Meu astuto[parent.Custom('ES_OA')] [parent.Custom('MotherFather')] não sairá impune com isso!"
