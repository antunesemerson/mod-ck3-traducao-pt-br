l_spanish:
 bishop.1001.opening: "[bishop.Custom2('AppropriateGreeting', ROOT.Char)]"
 bishop.1001.desc: "É meu dever informar-vos de que foram reveladas provas irrefutáveis que demonstram que vosso casamento com [spouse.Custom('ES_ElLa')] [spouse.GetTitledFirstName|l] é de natureza consanguínea.\n\n"
 bishop.1001.desc.actually_incestuous: "Esta informação ficará entre nós dois se você encerrar esta união profana imediatamente."
 bishop.1001.desc.made_up: "Esta… informação #EMP irrefutable#! ficará entre nós se você puser fim imediatamente a esta união #EMP obviamente#! ímpia."
 bishop.1001.a: "Claro, [bishop.GetTitledFirstNameNoTooltip|l]."
 bishop.1001.a.tt: "@warning_icon! #X Você se divorcia de [spouse.GetUIName]#!"
 bishop.1001.b: "Nosso casamento não será desfeito por uma mentira tão óbvia!"
 bishop.1001.b.success: "Eu provo que a afirmação é falsa"
 bishop.1001.b.failure: "A afirmação é realmente irrefutável"
 bishop.1001.c: "Mentir sobre algo assim… Vou deixá-lo ciente da verdade."
 bishop.1001.c.success: "Eu defendo com sucesso a santidade do nosso casamento"
 bishop.1001.c.failure: "[bishop.Custom('ES_ElLa')|U] [bishop.GetTitledFirstNameNoTooltip|l] não está convencid[bishop.Custom('ES_OA')]"
 bishop.1001.d: "Certamente tudo isso pode ser... esquecido?"
 bishop.1011.desc_opening: "Vossa participação na [faction.GetNameNoTooltip] contra [targeting.GetTitledFirstName|l] é imprópria para vós. Se não vos retirardes, serei forçado a tomar medidas drásticas."
 bishop.1011.desc_cannibal: "\n\nVeja, [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('cannibal_food'))] [cannibal_food.GetTitledFirstName|l] parece muito apetitos[cannibal_food.Custom('ES_OA')]. Seria uma #EMP pena#! se algo acontecesse com [cannibal_food.GetHerHim]..."
 bishop.1011.desc_beating: "\n\nAlguns fanáticos andam por perto, aplicando o castigo divino com pouca misericórdia. [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('to_beat_up'))] [to_beat_up.GetTitledFirstName|l] ainda anda pelas ruas sem companhia às vezes, não é...?"
 bishop.1011.a: "Não estou provocando a ira da [bishop.GetFaith.HouseOfWorship]."
 bishop.1011.b: "Suas palavras não podem me prejudicar!"
 bishop.1011.b.tt: "Você ignora as ameaças veladas"
 bishop.1011.b.outcome: "Encontrado Sangrando nas Ruas"
 all_my_theocratic_vassals: "Todos os meus vassalos teocráticos"
 bishop.1011.c: "Permita-me explicar minhas razões..."
 bishop.1011.c.success_vassal: "[bishop.Custom('ES_ElLa')|U] [bishop.GetTitledFirstNameNoTooltip|l] está tão convencid[bishop.Custom('ES_OA')] que recruta um colega para a causa"
 bishop.1011.c.success: "[bishop.Custom('ES_ElLa')|U] [bishop.GetTitledFirstNameNoTooltip|l] entende minhas motivações"
 bishop.1011.c.failure: "[bishop.Custom('ES_ElLa')|U] [bishop.GetTitledFirstNameNoTooltip|l] não fica impressionad[bishop.Custom('ES_OA')]"
 bishop.1011.c.failure.tt: "Toma medidas drásticas"
 bishop.1012.title: "Desaparecimento Misterioso"
 bishop.1012.desc: "[cannibal_food.GetTitledFirstName] desapareceu, deixando apenas uma poça de sangue para trás..."
