l_spanish:
 #Tourney Troubles
 #Initial Event:
 relation_upgrade.0001.t: "Problemas no Torneio"
 relation_upgrade.0001.desc.opening: "Como [ROOT.Char.GetTitleAsNameNoTooltip] meu dever é comparecer a um torneio local de [ROOT.Char.Custom('MartialTournamentAdjective')], mas os competidores se atrasaram e ainda falta pelo menos uma hora para que o torneio comece.\n\n"
 relation_upgrade.0001.desc.rival: "[rival.Custom2('MyCharacterIntroduction', ROOT.Char)|U] está aqui e, como de costume, está sendo um sujeito rude e insuportável. Suas constantes reclamações estão fazendo com que todos fiquem #EMP aún peor#! do que o normal."
 relation_upgrade.0001.desc.friend: "Olhando ao redor, percebo [friend.Custom2('MyCharacterIntroduction', ROOT.Char)|U] sentad sob uma tenda próxima, claramente entediad até a medula."
 relation_upgrade.0001.desc.lover: "Olhando ao redor, percebo [lover.Custom2('MyCharacterIntroduction', ROOT.Char)] sentad ao meu lado nas arquibancadas, aparentemente bastante solitári."
 relation_upgrade.0001.desc.second_friend: "\n\nEnquanto isso, [friend.Custom2('MyCharacterIntroduction', ROOT.Char)] está sentad sob a tenda, claramente entediad até a medula..."
 relation_upgrade.0001.desc.second_lover: "\n\nEnquanto isso, [lover.Custom2('MyCharacterIntroduction', ROOT.Char)] está sentad ao meu lado nas arquibancadas, aparentemente bastante solitári..."
 relation_upgrade.0001.desc.second_bridge: "\n\nPor outro lado,"
 relation_upgrade.0001.desc.drink: "Acabei de notar um comerciante descarregando um carrinho de [ROOT.Char.Custom('GetExpensiveDrink')]..."
 relation_upgrade.0001.desc.food: "Acabei de sentir o delicioso aroma de [ROOT.Char.Custom('GetExpensiveMeal')] vindo da cozinha..."
 relation_upgrade.0001.desc.prowess: "esta poderia ser uma boa oportunidade para mostrar minha habilidade e ao mesmo tempo entreter a multidão."
 relation_upgrade.0001.desc.gossip: "esta poderia ser uma boa oportunidade para ouvir conversas de outros presentes."
 relation_upgrade.0001.desc.book: "Eu poderia passar o tempo lendo [ROOT.Char.GetFaith.ReligiousText] enquanto espero."
 relation_upgrade.0001.rival: "Empurro [rival.GetFirstNameNoTooltip] no bebedouro dos cavalos para animar as coisas."
 relation_upgrade.0001.friend: "Passe um tempo com [friend.GetFirstNameNoTooltip] sob o pavilhão."
 relation_upgrade.0001.lover: "Peço a [lover.GetFirstNameNoTooltip] que me faça companhia para um pouco de \"[ROOT.Char.Custom('MartialTournamentAdjective')]\" por nossa conta."
 relation_upgrade.0001.drink: "Uma boa bebida sempre melhora meu humor!"
 relation_upgrade.0001.food: "Uma boa refeição sempre melhora meu humor!"
 relation_upgrade.0001.prowess: "Vou fazer a multidão me aplaudir!"
 relation_upgrade.0001.gossip: "Tenho certeza de que alguém aqui sabe de algo..."
 relation_upgrade.0001.gossip.tt: "Você descobre um segredo aleatório do reino"
 relation_upgrade.0001.book: "Folhear o [ROOT.Char.GetFaith.ReligiousText] é sempre uma boa forma de passar o tempo."
 relation_upgrade.0001.opt_out: "Já perdi tempo demais com esse desastre..."
 #Tourney Troubles
 #Follow-Up Event:
 relation_upgrade.0011.t: "$relation_upgrade.0001.t$"
 relation_upgrade.0011.desc.opening: "$relation_upgrade.0001.desc.opening$"
 relation_upgrade.0011.desc.rival: "Enquanto lamento o quão mal organizado é o torneio, [source.Custom2('MyCharacterIntroduction', ROOT.Char)] de repente se aproxima de mim e me empurra direto para dentro do cocho de água dos cavalos, fazendo com que todos ao redor caiam na risada!"
 relation_upgrade.0011.desc.friend: "Enquanto estou esperando sob a tenda por algo acontecer, [source.Custom2('MyCharacterIntroduction', ROOT.Char)] se aproxima de minha mesa e senta-se. 'Que torneio, não é? De qualquer forma, como você tem passado?'"
 relation_upgrade.0011.desc.lover: "Enquanto espero os competidores aparecerem, [source.Custom2('MyCharacterIntroduction', ROOT.Char)] se aproxima de mim e me convida a aproveitar \"[ROOT.Char.Custom('MartialTournamentAdjective')]\" a sós com [source.GetSheHe]."
 relation_upgrade.0011.rival.accept: "Como #EMP se atreve#!?"
 relation_upgrade.0011.rival.accept.toast: "[rival.GetFirstNameNoTooltip] se ofende"
 relation_upgrade.0011.rival.decline: "Acho que foi #EMP meio#! engraçado..."
 relation_upgrade.0011.rival.decline.toast: "[rival.GetFirstNameNoTooltip] acha graça e ri"
 relation_upgrade.0011.friend.accept: "Ah, é bom te ver, [source.GetFirstNameNoTooltip]!"
 relation_upgrade.0011.friend.accept.toast: "[friend.GetFirstNameNoTooltip] vocês começam a se conhecer melhor"
 relation_upgrade.0011.friend.decline: "Oh, me desculpe, estava de saída..."
 relation_upgrade.0011.friend.decline.toast: "[friend.GetFirstNameNoTooltip] não está interessad"
 relation_upgrade.0011.lover.accept: "Isso parece mais divertido do que isso..."
 relation_upgrade.0011.lover.accept.toast: "[lover.GetFirstNameNoTooltip] aceita minha proposta"
 relation_upgrade.0011.lover.decline: "Ha, boa piada... você #EMP estava#! brincando, certo?"
 relation_upgrade.0011.lover.decline.toast: "[lover.GetFirstNameNoTooltip] ri da minha proposta"
 #relation_upgrade.1001-1999
 #Attending a Terrible Party
 #Initial Event:
 relation_upgrade.1001.t: "Uma Noite para Esquecer"
 relation_upgrade.1001.desc.intro: "Por [ROOT.GetCharacter.GetFaith.HighGodName], essa festa está #EMP entediante#! [terrible_party_host.GetFirstName] deve ser  pior anfitri que o mundo já #EMP viu#!. Como pode ser esperado que um  mortal suporte essa celebração monótona da mediocridade?\n\nMeus olhos vasculham o ambiente, procurando por alguma distração, qualquer coisa."
 relation_upgrade.1001.desc.friend: "[potential_friend.GetFirstName] me acena amigavelmente de uma sacada próxima."
 relation_upgrade.1001.desc.lover: "[potential_lover.GetFirstName] suspira melancolicamente enquanto passa por mim."
 relation_upgrade.1001.desc.rival: "No canto, [potential_rival.GetFirstName] me olha fixamente com ódio."
 relation_upgrade.1001.desc.outro: "Eu preciso fazer #EMP alguma coisa#! para acabar com o tédio desta noite."
 relation_upgrade.1001.a: "Talvez eu possa conhecer melhor a [potential_friend.GetFirstNameNoTooltip]?"
 relation_upgrade.1001.a.tt: "Aguardando uma resposta..."
 relation_upgrade.1001.b: "[potential_lover.GetFirstNameNoTooltip], você gostaria de dar um passeio ao luar?"
 relation_upgrade.1001.b.tt: "$relation_upgrade.1001.a.tt$"
 relation_upgrade.1001.c: "Ei [potential_rival.GetFirstNameNoTooltip], quer ouvir o que eu #EMP realmente#! penso de você?"
 relation_upgrade.1001.c.tt: "[potential_rival.GetFirstNameNoTooltip] reage ao seu ataque..."
 relation_upgrade.1001.d: "Vamos dançar!"
 relation_upgrade.1001.d.tt_success: "Você anima a festa!"
 relation_upgrade.1001.d.tt_success.list: "Todos os [guests|lE] e [courtiers|lE] na festa"
 relation_upgrade.1001.d.tt_fail: "Claramente, si alguien ha arruinado la fiesta de [terrible_party_host.GetFirstNameNoTooltip], eres #EMP TÚ#!."
 relation_upgrade.1001.e: "Se alguém trancar as portas, este lugar queimaria facilmente..."
 relation_upgrade.1001.e.list: "$relation_upgrade.1001.d.tt_success.list$"
 relation_upgrade.1001.f: "Acho que vou apenas aproveitar da melhor forma possível."
 relation_upgrade.1001.g: "Talvez eu fale com alguém novo?"
 relation_upgrade.1001.h: "[terrible_party_host.GetFirstName], você é um péssim anfitrião!"
 relation_upgrade.1001.h.list: "$relation_upgrade.1001.d.tt_success.list$"
 relation_upgrade.1001.i: "Sair quietamente."
 #Follow-Up, Friend:
 relation_upgrade.1002.t: "$relation_upgrade.1001.t$: Em Qualquer Lugar, Menos Aqui"
 relation_upgrade.1002.desc: "Tenho sido obrigado a comparecer a esse suplício de festa, da qual [terrible_party_host.GetFirstName] é culpado, por #EMP horas#! (ou pelo menos é o que parece), acenando sem vontade para quem passava.\n\nComeço a achar que se jogar da varanda é uma boa ideia quando sinto alguém tocar no meu ombro.\n\n\"Com licença, sois [potential_friend.GetFirstNameNoTooltip]?\", pergunta [party_root.Custom('ES_ElLa')] [party_root.GetTitledFirstName|l]. \"Que tal dar uma caminhada longe daqui?\"."
 relation_upgrade.1002.a: "[ROOT.GetCharacter.GetFaith.HighGodName], sim, em qualquer lugar, menos aqui!"
 relation_upgrade.1002.a.tt: "[potential_friend.GetFirstNameNoTooltip] aceita sua oferta"
 relation_upgrade.1002.b: "Ehm, obrigad, mas não, obrigad."
 relation_upgrade.1002.b.tt: "[potential_friend.GetFirstNameNoTooltip] recusa educadamente sua oferta"
 relation_upgrade.1002.c: "Com #EMP você#!? Você é a pessoa mais entediante aqui!"
 relation_upgrade.1002.c.tt: "[potential_friend.GetFirstNameNoTooltip] faz fofoca sobre você"
 #Follow-Up, Lover:
 relation_upgrade.1003.t: "$relation_upgrade.1001.t$: Caminhando à Luz da Lua"
 relation_upgrade.1003.desc: "Não sei como [terrible_party_host.GetFirstName] conseguiu me convencer a comparecer a esse espantoso desastre de festa. Só consigo culpar um momento de loucura ou talvez a possibilidade de que também estivesse presente [party_root.GetTitledFirstName|l].\n\nPassei ao lado dela mais cedo, mas ela não pareceu notar meu suspiro deliberado de solidão. Ou pelo menos, ela não reagi…\n\n\"Meu caro(a) [potential_lover.GetFirstNameNoTooltip]! Que tal um passeio sob a luz do luar?\"."
 relation_upgrade.1003.a: "[party_root.GetFirstNameNoTooltip], eu pensei que você nunca fosse perguntar!"
 relation_upgrade.1003.a.tt: "[potential_lover.GetFirstNameNoTooltip] ficaria encantad"
 relation_upgrade.1003.b: "Na verdade, acho que prefiro você como amig..."
 relation_upgrade.1003.b.tt_custom_relation: "[party_root.GetFirstNameNoTooltip] não tentará mais se tornar seu [lover|lE]."
 relation_upgrade.1003.b.tt: "[potential_lover.GetFirstNameNoTooltip] só quer ser seu amigo"
 relation_upgrade.1003.c: "Não. Atualmente, não estou aceitando pretendentes."
 relation_upgrade.1003.c.tt: "[potential_lover.GetFirstNameNoTooltip] não te dá resposta"
 #Follow-Up, Rival:
 relation_upgrade.1004.t: "$relation_upgrade.1001.t$: Gritos Intermináveis"
 relation_upgrade.1004.desc: "Por [ROOT.GetCharacter.GetFaith.HighGodName], [terrible_party_host.GetFirstName] não sabe como organizar uma festa decente! Sem música, comida sem graça, sem dança, pouca luz, e  convidou aquele cão, [party_root.GetTitledFirstName|l]!\n\n\"$relation_upgrade.1001.c$\" Berra   irritante bem do outro lado da sala, chamando a atenção de todos os convidados sonolentos e marchando até mim, claramente determinado a me dar uma lição."
 relation_upgrade.1004.a: "Ah, você quer ouvir algumas verdades #EMP reais#!, patife?"
 relation_upgrade.1004.a.tt: "[potential_rival.GetFirstNameNoTooltip] reage com raiva"
 relation_upgrade.1004.b: "Isso está abaixo de mim."
 relation_upgrade.1004.b.tt: "[potential_rival.GetFirstNameNoTooltip] se recusa a se rebaixar ao seu nível"
 relation_upgrade.1004.c: "Talvez... Talvez pudéssemos ser amigos ao invés disso?"
 #Other:
 aloof_but_alluring_modifier: "Distante, mas Sedutor"
 aloof_but_alluring_modifier_desc: "Esse personagem parece impossível de se conversar, mas cultiva um fascínio inegável..."
 inured_to_boredom_modifier: "Acostumad ao Tédio"
 inured_to_boredom_modifier_desc: "Esse personagem está acostumad ao tédio social."
 #relation_upgrade.2001-2999
 relation_upgrade.2101.t: "Relações Doentias"
 relation_upgrade.2101.desc_opening: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], a enfermidade é contagiosa, tenha cuidado!\"\n\n"
 relation_upgrade.2101.desc_opening_physician: "M [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('physician'))] [physician.GetTitledFirstName|l] me segura; o corpo doente de um plebeu –"
 relation_upgrade.2101.desc_opening_other: "O corpo doente de um plebeu –"
 relation_upgrade.2101.desc_bubonic_plague: "coberto por grandes bubões exsudando pus e sangue –"
 relation_upgrade.2101.desc_smallpox: "a pele marcada por erupções e saliências –"
 relation_upgrade.2101.desc_ending: "descansa sobre a mesa. Qualquer um que entre em contato com o cadáver corre o risco de contrair a doença, e... e eu #EMP estava#! planejando um passeio que me levará próximo a [rival_capital.GetNameNoTierNoTooltip], o domínio de [rival.Custom2('MyCharacterIntroduction', ROOT.Char)]..."
 relation_upgrade.2101.a: "Lance-o em direção a [rival_capital.GetNameNoTierNoTooltip]!"
 relation_upgrade.2101.a_tt: "Alguém da corte pode contrair a doença!"
 relation_upgrade.2101.a_tt_rival: "[rival.GetTitledFirstName] provavelmente se tornará seu rival"
 relation_upgrade.2101.a_tt_nemesis: "[rival.GetTitledFirstName] provavelmente se tornará seu nêmesis"
 relation_upgrade.2101.b: "O corpo pode conter pistas sobre a origem da doença."
 relation_upgrade.2101.b_tt: "Um de seus cortesãos contrai a doença"
 relation_upgrade.2101.b_tt_2: "Surto de doença em [capital.GetNameNoTooltip]"
 relation_upgrade.2101.c: "[peasant.GetSheHe|U] terá um enterro digno."
 relation_upgrade.2102.desc_opening: "O séquito de [corpse_rival.Custom2('MyCharacterIntroduction', ROOT.Char)] para algum tempo longe de [rival_capital.GetNameNoTier]. Antes que eu tenha tempo de enviar um enviado, algo é lançado de seu acampamento em direção ao meu [rival.Custom('ResidenceBuilding')].\n\nUm corpo mutilado, devastado pela doença, cai do céu;"
 relation_upgrade.2102.desc_bubonic_plague: "coberto por grandes bubões exsudando pus e sangue que podem ser vistos mesmo de onde estou"
 relation_upgrade.2102.desc_smallpox: "a pele marcada por erupções e saliências que podem ser vistos mesmo de onde estou."
 relation_upgrade.2102.desc_ending: "\n\nEle aterrissa com um som squelch, espalhando sangue, intestinos e pânico."
 relation_upgrade.2102.a: "Pegue isso, vamos lançar o corpo de volta!"
 relation_upgrade.2102.b: "Esse corpo deve ser estudado."
 relation_upgrade.2102.tt: "Um dos cortesãos [rival.Custom('ES_DelDela')] [rival.GetTitledFirstName|l] contrai a doença"
 relation_upgrade.2102.b_tt_2: "Surto de doença em [rival_capital.GetNameNoTooltip]"
 #Character is very passionate about something
 relation_upgrade.2001.t: "Interesses Apaixonados"
 relation_upgrade.2001.lover_dinner.desc: "Durante o jantar,"
 relation_upgrade.2001.lover_party.desc: "Durante uma festa de jantar em [lover_1_location.GetNameNoTooltip],"
 relation_upgrade.2001.lover.desc: "Escolhi estrategicamente um assento perto de [lover_1.GetTitledFirstName|l], é tão [lover_1.Custom('ComplimentAdjective')]! Ela conseguiu me envolver em uma conversa sobre [lover_1.Custom('herhis_subject_of_interest')]."
 relation_upgrade.2001.soulmate.desc: "Meu [lover_1.Custom('LoverPetName')] [lover_1.GetTitledFirstName|l] está brincando distraidamente com meu cabelo enquanto me conta sobre [lover_1.Custom('herhis_subject_of_interest')]."
 relation_upgrade.2001.relates.desc: "\n\nSeu ponto de vista é intrigante, mas o que mais admiro é sua paixão pelo assunto. Quanto mais se aprofunda, mais animado fica, e aqueles olhos tão bonitos chegam a #EMP brillar#! com luz própria. Acho que não conseguiria me cansar de ouvi-lo falar sobre isso."
 relation_upgrade.2001.does_not_relate.desc: "\n\nEmbora eu entenda pouco sobre o assunto, a paixão que demonstra é cativante. Seus belos olhos #EMP brillan#! irradiam com luz própria, e a profundidade de seus conhecimentos é clara até para alguém que sabe tão pouco quanto eu. Acho que não conseguiria me cansar de ouvi-la falar sobre isso."
 relation_upgrade.2001.a: "Devemos continuar essa conversa em algum lugar mais reservado?"
 relation_upgrade.2001.a.success: "[lover_1.GetShortUIName] aceita sua oferta"
 relation_upgrade.2001.a.failure: "[lover_1.GetShortUIName] não entende a dica"
 relation_upgrade.2001.b: "[lover_1.GetFirstNameNoTooltip] — Eu acho que te amo."
 relation_upgrade.2001.b.success: "[lover_1.GetShortUIName] sente o mesmo"
 relation_upgrade.2001.b.failure: "[lover_1.GetShortUIName] não sente o mesmo"
 relation_upgrade.2001.c: "Que interessante! Você poderia explicar novamente?"
 relation_upgrade.2002.lover_dinner.desc: "Durante o jantar, me encontro sentad ao lado d [lover_2.Custom('ComplimentAdjective')] [lover_2.GetTitledFirstName|l]."
 relation_upgrade.2002.lover_party.desc: "  [lover_2.GetTitledFirstName|l] é um convidad inesperad, mas bem-vindo, na minha festa de jantar."
 relation_upgrade.2002.lover.desc: "Acabamos falando sobre [lover_1.Custom('my_subject_of_interest')], um assunto sobre o qual eu poderia passar horas falando. Para minha alegria, [lover_2.GetFirstNameNoTooltip] é um excelente ouvinte. O interesse que demonstra pelo que tenho a dizer parece genuíno, e as perguntas que faz são ponderadas e inteligentes.\n\nAntes que eu perceba, estamos a sós à mesa. [lover_2.GetFirstNameNoTooltip] se aproxima de mim para me ouvir melhor e sinto meu coração acelerar…"
 relation_upgrade.2002.c.lover: "Ah, sim, como eu estava dizendo..."
 relation_upgrade.2002.soulmate.desc: "Estou brincando distraidamente com minha [lover_2.Custom('LoverPetName')] [lover_2.GetTitledFirstName|l], com a cabeça encostada no meu peito, enquanto falo com ele/ela sobre [lover_1.Custom('my_subject_of_interest')]. Ele/Ela é um excelente ouvinte — me encorajando com suaves murmúrios e acenos, e fazendo perguntas atenciosas. A maneira como ele/ela realmente se importa com um assunto tão próximo do meu coração me deixa todo aquecido por dentro."
 relation_upgrade.2002.c.soulmate: "Você é um ótim ouvinte, sabia?"
 relation_upgrade.2003.lover.desc: "Quando me inclino para fazer minha sugestão, o brilho nos olhos de [lover_1.GetFirstName] revela outro tipo de paixão. Ele/Ela hesita por um momento, suas bochechas coram, mas seu conflito interno se resolve rapidamente.\n\n\"Espere aqui por um pouco, para que ninguém desconfie. Depois, venha aos meus aposentos.\" Enquanto [lover_1.GetFirstNameNoTooltip] se apressa para ir embora, não consigo tirar os olhos de [lover_1.Custom('ES_ElElla')]."
 relation_upgrade.2003.soulmate_start.desc: "Minha declaração de amor pega [lover_1.GetFirstName] desprevenido(a) de surpresa. A mão dele(a) em meu cabelo fica imóvel e posso sentir as batidas de seu coração em minha bochecha. Meu próprio coração bate com a mesma força.\n\n"
 relation_upgrade.2003.soulmate_end.desc: "\"É verdade, [lover_2.GetFirstNameNoTooltip]? Faz muito tempo que sinto o mesmo, mas nunca pensei que…\".\n\nO beijo que se segue é a coisa mais doce que já conheci."
 relation_upgrade.2003.a: "Que [lover_1.GetWomanMan] tol!"
 relation_upgrade.2003.b: "Em [realm.GetNameNoTierNoTooltip] não há [lover_2.GetWomanMan] mais feliz que eu!"
 relation_upgrade.2004.lover.desc: "[lover_1.GetFirstName] não capta a indireta — ou talvez esteja ignorando-a para me poupar da ignomínia da rejeição.\n\nNossa conversa sobre [lover_1.Custom('my_subject_of_interest')] continua. Felizmente, o interesse de [lover_1.GetFirstNameNoTooltip] pelo tema eclipsa meu constrangimento."
 relation_upgrade.2004.soulmate_end.desc: "\"Eu me importo com você, [lover_2.GetFirstNameNoTooltip], e gosto do nosso tempo juntos. Podemos deixar as coisas assim?\"\n\nApós um pedido de desculpas constrangedor, volto à conversa sobre [lover_1.Custom('my_subject_of_interest')], desesperad para dissipar a tensão entre nós."
 relation_upgrade.2004.a: "Foi tolice da minha parte fazer essas suposições..."
 relation_upgrade.3000.t: "Ódio Florescente"
 relation_upgrade.3000.desc: "Esse[rival_to_be.Custom('ES_EA')] [rival_to_be.Custom2('InsultAdjective', ROOT.Char)] [rival_to_be.Custom2('InsultNoun', ROOT.Char)] de [rival_to_be.GetFirstName] me dá náusea! Como pode [ROOT.GetCharacter.GetFaith.HighGodName] amaldiçoar a terra com tais [rival_to_be.Custom2('InsultNounPlural', ROOT.Char)] [rival_to_be.Custom2('InsultAdjective', ROOT.Char)] de [rival_to_be.GetFirstNameNoTooltip]?! Não, é óbvio… É parente de [ROOT.GetCharacter.GetFaith.DevilNamePossessive]. [rival_to_be.GetFirstName] é pior do que o furúnculo pútrido e o gafanhoto voraz.\n\nNão suporto #EMP la mera idea#! de respirar o mesmo ar [rival_to_be.Custom2('InsultAdjective', ROOT.Char)] que [rival_to_be.GetSheHe]! Preciso fazer algo. Preciso agir.\n\nMinha sanidade depende disso."
 relation_upgrade.3000.a: "Não descansarei até que [rival_to_be.GetFirstNameNoTooltip] esteja mort[rival_to_be.Custom('ES_OA')] e enterrad[rival_to_be.Custom('ES_OA')]..."
 relation_upgrade.3000.b: "Não! Não posso permitir que a vingança governe minha vida!"
 driven_by_vengeance_modifier: "Movid pela Vingança"
 driven_by_vengeance_modifier_desc: "Este personagem encontra motivação em buscar o fim de seus rivais."
