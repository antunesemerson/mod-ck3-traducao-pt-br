l_spanish:
 lover.0001.t: "O Fim da Paixão"
 lover.0001.desc_opening: "\"Meu [ROOT.Char.Custom('LoverPetName')], isso... isso simplesmente não está funcionando mais!\"\n\nMeu amor [lover.GetTitledFirstName|l] se afasta de mim,"
 lover.0001.desc_murder: "\"A chama diminuindo entre nós... E pensar que você cometeria um assassinato... É demais!\""
 lover.0001.desc: "\"A chama entre nós, está... parece que se apagou.\""
 lover.0001.a: "Eu concordo, é hora de seguirmos caminhos separados."
 lover.0001.b: "Mas... Lembre-se de todos os bons momentos!"
 lover.0001.b.tt: "[lover.GetSheHe|U] dará outra chance ao nosso relacionamento"
 lover.0002.t: "O Fim da Paixão"
 lover.0002.still_in_love: "As palavras [first_lover.Custom('ES_DelDela')] [first_lover.GetTitledFirstName|l] continuam ecoando em meus ouvidos. Pelo tom sombrio com que falou comigo, não consigo deixar de sentir que estava tentando me machucar.\n\n“Mas... eu te amo!”, consegui dizer com a garganta seca. Minhas súplicas não conseguiram mudar seu coração."
 lover.0002.still_likes: "As palavras [first_lover.Custom('ES_DelDela')] [first_lover.GetTitledFirstName|l] doeram, mas tentei engolir minha dor.\n\nSe [first_lover.GetSheHe] acha que é o melhor para nós, não vou dificultar a decisão de"
 lover.0002.neutral: "\"Todas as coisas têm um fim\", [first_lover.GetTitledFirstName|l] me disse. Isso me enche de tristeza ao pensar em tudo que compartilhamos e em tudo que perdemos, mas no final, parece ser o melhor."
 lover.0002.dislike: "[first_lover.GetTitledFirstName] se aproximou de mim, com insegurança. Quando percebi que havia vindo para me dizer que não nos veríamos mais, não fiquei chateado. Só alívio."
 lover.0002.hate: "[first_lover.GetTitledFirstName] veio me ver e disse que tinha algo sério para conversar. Mas, antes que falasse, eu lhe soltei uma longa diatribe sobre como ele tinha me decepcionado mais uma vez.\n\nQuase me alegrei quando me disse que não queria me ver novamente."
 lover.0002.like.vengeful: "À medida que [first_lover.GetTitledFirstName|l] ia me contando uma desculpa ruim atrás da outra, comecei a sentir o ódio ferver no fundo do estômago. Então eu não sou bom[ROOT.Char.Custom('ES_OA')] para [first_lover.GetSheHe]? Ele/ela vai se arrepender disso, gravem bem minhas palavras…"
 lover.0002.dislike.vengeful: "À medida que saíam patéticas desculpas dos lábios [first_lover.Custom('ES_DelDela')] [first_lover.GetTitledFirstName|l], um desdém gélido surgiu do fundo das minhas entranhas e despedaçou qualquer resquício de carinho que eu sentisse por [first_lover.GetSheHe]. Vai se arrepender de me desprezar assim, gravem minhas palavras…"
 lover.0002.like.humble: "Embora a dor causada pelas palavras [first_lover.Custom('ES_DelDela')] [first_lover.GetTitledFirstName|l] foi praticamente insuportável, não pude negar sua verdade. Nunca fui bom o bastante[ROOT.Char.Custom('ES_OA')] para [first_lover.GetSheHe]. Espero que seja mais feliz sem mim…"
 lover.0002.like.arrogant: "[first_lover.GetTitledFirstName]... já não me queria mais? O que disse não fazia sentido. Pensei que talvez estivesse doente ou que tivesse sido forçad[first_lover.Custom('ES_OA')] a dizer esses disparates. Mas eu sou... sou perfeit[ROOT.Char.Custom('ES_OA')] para [first_lover.GetSheHe]!"
 lover.0002.dislike.arrogant: "Apenas consegui conter o riso de tão absurdas que eram as palavras [first_lover.Custom('ES_DelDela')] [first_lover.GetTitledFirstName|l]. Claro que ainda me queria, sou tudo o que ele sempre desejou! No entanto, não discuti, [first_lover.GetSheHe] que se dane! Não poderia me importar menos."
 lover.0002.like.lustful: "Eu sentia falta do toque das mãos ansiosas [first_lover.Custom('ES_DelDela')] [first_lover.GetTitledFirstName|l], então sua chegada sem aviso foi uma surpresa deliciosa. Eu mal podia esperar para me perder em seu abraço, mas ele resistiu quando tentei aproximar[first_lover.GetHerHim] de mim.\n\nMal me lembro das palavras que se seguiram, mas a dor surda que ele deixou para trás não desapareceu nem um pouco."
 lover.0002.dislike.lustful: "Para minha surpresa, quando [first_lover.GetTitledFirstName|l] me disse que havíamos terminado, minha primeira sensação foi de alívio. Por fim pude admitir que [first_lover.GetSheHe] já não podia satisfazer meus desejos."
 lover.0002.like.understanding: "Embora [first_lover.GetTitledFirstName|l] se esforçasse para encontrar as palavras, [first_lover.GetHerHim] conhecia o suficiente para saber que seriam ruins. Reprimi minha dor para não tornar isso mais difícil para ele/ela, e apertei sua mão com delicadeza. Então, as palavras jorraram dele/dela como uma cachoeira, e meu medo mais profundo se confirmou."
 lover.0002.dislike.understanding: "Não importava o que [first_lover.GetTitledFirstName|l] tivesse vindo me dizer: era óbvio que isso o/a afligia. Embora meus sentimentos por [first_lover.GetSheHe] tivessem desaparecido, ainda me doía ver[first_lover.GetHerHim] nesse estado.\n\nQuando o/a tranquilizei de que tudo ficaria bem, [first_lover.GetSheHe] finalmente me disse que tínhamos terminado."
 lover.0002.like.angry: "Após ver [first_lover.Custom('ES_AlAla')] [first_lover.GetTitledFirstName|l] contorcer-se e suar durante quase uma hora, sua confissão não foi nenhuma surpresa. No entanto, eu não esperava minha própria reação: pela minha boca saíram palavras vis como lava, e eu não pude nem quis detê-las. Eu precisava ver minha própria dor refletida em seu rosto.\n\nA fúria me protegeu até que [first_lover.GetFirstName] saiu fur[first_lover.Custom('ES_OA')] uma fúria da [ROOT.Char.Custom('GetRoom')]. Então, fiquei a sós com a realidade agonizante da rejeição."
 lover.0002.dislike.angry: "Depois de ver [first_lover.GetTitledFirstName|l] contorcer-se e suar durante quase uma hora, não consegui mais conter minha raiva. Todo o rancor que sempre quis transmitir a es[first_lover.Custom('ES_EA')] miserável saiu da minha boca como lava.\n\nA dor em seus olhos me deu mais força e, quando [first_lover.GetSheHe] finalmente grasnou que tínhamos terminado, meu triunfo foi completo."
 lover.0002.like.paranoid: "Quando [first_lover.GetTitledFirstName|l] disse que [first_lover.GetSheHe] já não me queria mais, não foi nenhuma surpresa. Já havia percebido isso nos seus olhos há muito tempo. Senti isso na hesitação do seu toque. Toda vez que perguntava, negava, mas parece que já não conseguiu esconder mais. Ou talvez simplesmente gostasse de me ver sofrer…"
 lover.0002.dislike.paranoid: "Quando [first_lover.GetTitledFirstName|l] disse que não me queria mais, não foi nenhuma surpresa. Eu já via isso chegando há muito tempo, embora [first_lover.GetSheHe] negasse continuamente. Talvez tenha prolongado todo o caso só para me punir... Sim, tenho certeza de que esse(a) detestável [ROOT.Char.Custom('ES_OA')] [first_lover.Custom('ES_EA')] [first_lover.GetWomanMan] se deleitou com o meu sofrimento!"
 lover.0002.a: "Mas por quê, meu amor..."
 lover.0002.b: "Não, eu preciso fazer alguma coisa!"
 lover.0002.c: "Isso pode ser para o melhor."
 lover.0002.d: "Por fim! Louvemos a [ROOT.GetCharacter.GetFaith.HighGodName]!"
 lover.0002.e: "Nunca perdoarei sua traição."
 lover.0003.t: "Excesso de uma Coisa Boa"
 lover.0003.desc.intro: "Nunca pensei que alguém pudesse ter excesso de [ROOT.Char.Custom('lover_reason')], mas a vida me provou que eu estava errado. Alguns dias, sinto como se meu tempo livre não fosse nada além de"
 lover.0003.desc.twolovers: "[lover_1.Custom('lover_activity')] e [lover_2.Custom('lover_activity')]."
 lover.0003.desc.threelovers: "[lover_1.Custom('lover_activity')], [lover_2.Custom('lover_activity')] e [lover_3.Custom('lover_activity')]."
 lover.0003.desc.end1: "\n\nPor quanto tempo posso continuar assim?"
 lover.0003.desc.end2men: "homens"
 lover.0003.desc.end2women: "mulheres"
 lover.0003.desc.end2people: "indivíduos"
 lover.0003.desc.end3: "será meu fim!"
 lover_0003.a: "Devo deixar ir [lover_1.GetFirstNameNoTooltip]."
 lover_0003.b: "[lover_2.GetFirstNameNoTooltip] e eu chegamos ao fim da estrada."
 lover_0003.c: "Não posso continuar assim com [lover_3.GetFirstNameNoTooltip]."
 lover_0003.d: "O romance não é sobre quantidade, mas qualidade!"
 lover_0003.d.tt: "Você usa suas habilidades românticas para manter seus amantes satisfeitos sem se sobrecarregar."
 lover_0003.e: "Isso pode me quebrar, mas o que é a vida sem [ROOT.Char.Custom('lover_reason')]?"
 lover_0003.e.tt: "Você se esforça para manter os relacionamentos vivos."
 lover.0004.t: "A Dor da Rejeição"
 lover.0004.desc: "[first_lover.GetFirstName] e eu tivemos nossas disputas, não posso negar, mas a rejeição foi um golpe. Não me explico o porquê e nunca pensei que acabaríamos assim.\n\nIra, indignação, pesar... apatia. As emoções me atravessam e fico em estado de atordoamento, sem saber o que fazer ou sentir."
 lover_0004.a: "Como vou seguir sem o seu [ROOT.Char.Custom('lover_reason')]?"
 attempt_to_regain_affection_tt: "Preciso tomar medidas drásticas para reconquistar o afeto dela!"
 lover.0005.t: "Inferno não tem Fúria"
 lover.0005.desc: "Mentiria se dissesse que acreditava que [lover.GetFirstName] aceitaria bem minhas decisões. Mas sua reação me surpreendeu. Sem lágrimas, súplicas nem insultos. Mas seus olhos traíram seus verdadeiros sentimentos e o que vi neles me gelou o sangue."
 lover_0005.a: "Receio ter feito um inimigo hoje[first_lover.Custom('ES_XA')] inimig[first_lover.Custom('ES_OA')]."
 lover.0101.t: "Capturad[ROOT.Char.Custom('ES_OA')] por [lover.GetSheHe]"
 lover.0101.desc_dungeon: "Mal consigo ver as grades devido ao véu de lágrimas que cobre meus olhos; por que m [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('lover'))] está fazendo isso comigo? [lover.GetTitledFirstName|l], meu [lover.Custom('LoverPetName')], por favor, deixe-me sair..."
 lover.0101.desc_house_arrest: "Embora eu caminhe pelos mesmos corredores que m [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('lover'))] [lover.GetTitledFirstName|l], nossos corações nunca estiveram tão distantes. Meu [lover.Custom('LoverPetName')], por favor, deixe-me sair..."
 lover.0101.a: "A pessoa que amo não faria isso comigo!"
 lover.0101.b: "Isso é apenas mais um obstáculo para superarmos."
 lover.0102.t: "O Prisioneiro"
 lover.0102.desc: "Quem poderia imaginar que isso acabaria assim? Meu [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('imprisoned_lover'))] [imprisoned_lover.GetTitledFirstName|l] repudia minha mera presença e, embora ainda esteja em meu poder, seu afeto por mim desapareceu."
 lover.0102.a: "O amor que abrigava se escapou, mas [imprisoned_lover.GetSheHe] não pôde fazê-lo!"
 lover.0103.t: "Sentimentos em Guerra"
 lover.0103.desc: "Que [ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('lover'))] [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('lover'))] [lover.GetTitledFirstName|l] me declarasse a guerra… Tudo o que compartilhamos, todos os meus sentimentos por [lover.Custom('ES_ElElla')]… Tudo começa a se desvanecer entre o som dos chifres de guerra."
 lover.0103.a: "Nada vai me deter. Nem mesmo você, meu amor!"
 lover.0103.b: "Na guerra, a vida é o bem mais precioso, e o amor é ainda mais doce."
 lover.0103.b.tt: "#F Não tomarei decisões precipitadas em meio a uma luta!#!"
 lover.0104.desc: "Desde que escolhi minha conquista pelo título de [war_title.GetName] em vez de m amante [war_lover.GetTitledFirstName|l], [war_lover.GetSheHe] se recusa até mesmo a olhar para mim, e temo que o que tínhamos tenha se perdido para sempre."
 lover.0104.a: "Tudo é justo no amor e na guerra."
 lover.0201.t: "Fim de um Caso"
 lover.0201.desc: "\"Estou tão feliz que você entenda por que tem que ser assim\", me diz meu amante.\n\nAh, [breaker.GetFirstName], como eu queria entender! Primeiro você sussurra todas aquelas palavras doces, mas agora você vai embora?"
 lover.0201.other_lover: "\n\nÉ [other_lover.Custom('ES_EA')] [other_lover.Custom2('InsultNounSexual', ROOT.Char)], não é?!"
 lover.0201.a: "Não era assim que deveria ser."
 lover.0202.t: "Meu própri[breaker.Custom('ES_OA')] [breaker.Custom('WifeHusband')]"
 lover.0202.desc: "Estou… confus[ROOT.Char.Custom('ES_OA')]. Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('breaker'))], [breaker.GetFirstName], diz que já não deseja mais ser meu amante. Nossa paixão não é suficiente para manter viva a chama deste casamento?"
 lover.0202.a: "O que se acha que está fazendo?"
 lover.0203.t: "Um Alívio"
 lover.0203.desc: "\"Não é você, sou eu…\" Não estou prestando muita atenção a [breaker.GetFirstName]. Sem dúvida, veio pôr fim ao nosso caso, e tudo o que sinto é um alívio."
 lover.0203.a: "Sim, sim, é uma pena terrível. Vá embora agora."
 lover.0204.t: "Um desprezo de [lover.Custom('WomanManGirlBoy')]"
 lover.0204.desc: "\"Como você ousa? Como ousa terminar comigo, e ainda por cima por uma tal [other_lover.Custom2('InsultNounSexual', SCOPE.sC('lover'))]?\".\n\nOs rumores correm rápido, e a reação dramática de [lover.GetFirstName]. Está claro que [lover.Custom('ES_ElElla')] nutre sentimentos ruins por mim e pode buscar vingança, com ou sem justificativa."
 lover.0204.a: "[breaker.GetFirstNameNoTooltip] me escolheu. Supere isso."
 #Ask lover to be exclusive (lover -> soulmate)
 lover.3111.t: "Meu Único e Verdadeiro Amor"
 lover.3111.desc: "Meu [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('lover'))] [lover.GetTitledFirstName|l] me envolve em seus braços, e sinto uma felicidade raramente sentida. Tomara que isso pudesse durar para sempre… se ele pudesse ser meu para sempre, e só meu[lover.Custom('ES_OA')] e só meu[lover.Custom('ES_OA')] para sempre…"
 lover.3111.a: "Vamos prometer nunca amar outro!"
 lover.3111.a.success: "[lover.GetShortUIName|U] concorda em ser exclusiv"
 lover.3111.a.failure: "Minha sugestão deixa [lover.GetShortUIName] desconfortável"
 lover.3111.a.tt: "#F Vou propor que juremos devoção apenas um ao outro#!"
 lover.3111.b: "Ter[lover.GetHerHim] assim é tudo o que preciso. Seja meu[lover.Custom('ES_OA')] mais uma vez!"
 lover_0300_break_up_with_other_lovers_effect.tt: "Todos os seus outros amantes"
 #Send a love letter
 lover.3002.t: "Dizer com Palavras"
 lover.3002.desc: "Meus sentimentos por [lover.GetFirstName] estão prestes a saltar do meu peito! Preciso desesperadamente lhe dizer o que sinto!\n\nAmor, guie minha mão enquanto ponho a tinta no papel!"
 lover.3002.a: "A única verdade é a poesia!"
 lover.3002.b: "Isso está muito mais difícil do que eu esperava..."
 lover.3002.a_beautiful: "Uma bela carta de amor"
 lover.3002.a_good: "Uma boa carta de amor"
 lover.3002.a_competent: "Uma carta de amor competente"
 lover.3002.a_bad: "Uma carta de amor ruim"
 #Terrible love letter
 lover.3003.desc: "Recebi uma carta [first_lover.Custom('ES_DelDela')] [first_lover.GetTitledFirstName|l]!\n\n[first_lover.Custom2('love_letter', ROOT.Char )]"
 lover.3003.desc_conclusion: "\n\nO que... é isso?"
 lover.3003.a: "Essa pode ser a pior poesia que já ouvi!"
 lover.3004.desc: "Minha carta parece não ter sido bem recebida. Deixe-me dar outra olhada nela…\n\n[first_lover.Custom2('love_letter', SCOPE.sC('lover'))]"
 lover.3004.a: "Ela é realmente tão ruim assim?"
 lover.3005.desc_conclusion: "\n\nIsso é... agradável."
 lover.3005.a: "Pelo menos está pensando em mim."
 lover.3006.desc: "Minha carta parece ter sido bem recebida, embora a tenham descrito como \"uma simples tentativa de poesia\":\n\n[first_lover.Custom2('love_letter', SCOPE.sC('lover'))]"
 lover.3006.a: "Bem, é o pensamento que conta!"
 lover.3007.desc_conclusion: "\n\nUm poema, só para mim!"
 lover.3007.a: "Oh, que emocionante!"
 lover.3008.desc: "Minha carta foi bem recebida! Parece que [lover.GetTitledFirstName|l] a recitou para várias pessoas.\n\n[first_lover.Custom2('love_letter', SCOPE.sC('lover'))]"
 lover.3008.a: "Minha língua afiada resolve a situação!"
 lover.3009.desc_conclusion: "\n\nÉ verdadeiramente bela. E escrita inteiramente para mim!"
 lover.3009.a: "Vou guardar estas palavras em meu coração!"
 lover.3010.desc: "[lover.GetTitledFirstName] respondeu à minha carta e disse que foi uma das coisas mais bonitas que já ouviu! Olhando para ela de novo, não posso dizer que me surpreende:\n\n[first_lover.Custom2('love_letter', SCOPE.sC('lover'))]"
 lover.3010.a: "Talvez devesse ter sido poeta, em vez d [ROOT.Char.GetTitleAsNameNoTooltip]!"
 lover.3112.desc: "\"Não desejarei ninguém além de você, meu [ROOT.Char.Custom('LoverPetName')]\".\n\n[proposing_lover.GetFirstName] me puxa para perto, e sinto sua respiração em meu pescoço, enquanto pede uma promessa: não tomar outro amante além de [proposing_lover.GetSheHe]."
 lover.3112.a: "Eu não preciso de mais ninguém além de você!"
 lover.3112.b: "Claro, eu #EMP com certeza#! não terei outros."
 lover.3112.b.tt: "#F Que mal pode fazer uma mentira alimentada pelo amor?#!"
 lover.3112.c: "Você não pode estar falando sério?!"
 lover.3112.b.remain_together.tt: "[THIS.Char.GetShortUIName] continua sendo seu [lover|lE]"
 lover.3113.desc: "“Sim, é claro que eu quero ser só teu[ROOT.Char.Custom('ES_OA')] meu [ROOT.Char.Custom('LoverPetName')]!”.\n\nMeu coração se expande, atravessado pelo carinho e pelo desejo. Aproximo [lover.GetTitledFirstName|l] de mim e [lover.GetHerHim] beijo com intensidade."
 lover.3113.a: "Ninguém mais importa além de você!"
 lover.3113.a.tt: "#F Nunca amaré a nadie como a [lover.GetFirstNameNoTooltip]!#!"
 lover.3114.desc: "\"Tenho carinho por você, [ROOT.Char.GetFirstNameNoTooltip] mas não estou pront[lover.Custom('ES_OA')] para me unir a você\".\n\n[lover.GetTitledFirstName|l] [lover.Custom('quirk_neg_present')] enquanto surge um silêncio incômodo."
 lover.3114.a: "Como pude interpretar [lover.GetSheHe]?"
 lover.0304.opening: "M querid [ROOT.Char.GetFirstNameNoTooltip],"
 lover.0304.desc: "Nunca esperava que terminasse assim, mas aqui estamos. Sinto muito, mas amo outra pessoa. Não podemos mais ficar juntos.\n\nDesejo a você toda a felicidade do mundo. Que [ROOT.Char.GetFaith.HighGodName] cuide de você."
 lover.0304.a: "Então é isso, então?"
 lover.1001.t: "Rumor e Especulação"
 lover.1001.desc: "Meu [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('snoopy_lover') )], [snoopy_lover.Custom('ES_ElLa')] [snoopy_lover.GetTitledFirstName|l], consegue ouvir muitas coisas em suas idas e vindas à minha [friend_receiving_gift.Custom('GetCourt')|l].\n\nUltimamente ficou sabendo de algumas histórias muito interessantes sobre o que meu [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('secret_holder') )], [secret_holder.Custom('ES_ElLa')] [secret_holder.GetTitledFirstName|l], faz nas sombras…"
 lover.1001.a: "Isso é muito útil saber, [ROOT.GetCharacter.Custom('LoverPetName')]."
 lover.1002.t: "Manipule as Cordas"
 lover.1002.desc: "[ROOT.GetCharacter.Custom('LoverPetName_possessive')|U], [lover.Custom('ES_ElLa')] [lover.GetTitledFirstName|l], sabe muito sobre como lidar com as muitas relações da minha [friend_receiving_gift.Custom('GetCourt')|l]. Ele sugeriu que eu aproveite sua experiência para minhas investidas diplomáticas em direção a [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l]."
 lover.1002.a: "Uma ótima ideia!"
 lover.1002.b: "Não posso me dar ao luxo de envolver isto a [lover.GetFirstNameNoTooltip]."
 lover.1003.t: "Conforto de Amante"
 lover.1003.desc: "O peso de ser [ROOT.Char.GetTitleAsNameNoTooltip|l] tem me pesado ultimamente, e apenas o abraço caloroso de meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('lover') )], [lover.Custom('ES_ElLa')] [lover.GetTitledFirstName|l], parece me aliviar.\n\n\"Por favor, meu/minha [ROOT.Char.Custom('LoverPetName')], deixe-me ajudar você a relaxar.\""
 lover.1003.a: "O que faríamos um sem o outro, meu amor?"
 lover.1003.b: "É exatamente o que eu precisava!"
 lover.1004.t: "Vamos Embora"
 lover.1004.desc: "Meu [ROOT.Char.Custom2('RelationToMe' , SCOPE.sC('lover') )] [lover.GetTitledFirstName|l] sorri [lover.Custom('quirk_pos_adverb')] ao me abraçar e volto a lembrar por que [lover.GetHerHim] o/a aprecio tanto.\n\nComo seria fugirmos juntos por um tempo, só nós dois..."
 lover.1004.a: "Ouvi dizer que [county.GetNameNoTierNoTooltip] é lindo nesta época do ano."
 lover.1004.a.tt: "#F Uma jornada romântica... Quem sabe o que pode acontecer?#!"
 lover.1004.b: "O quarto é um destino emocionante o suficiente!"
 lover.1005.desc_opening_same_court: "\"Oh, [ROOT.Char.GetFirstNameNoTooltip]! Escapar da corte, mesmo que por um curto período de tempo... Isso é como um sonho.\"\n\n"
 lover.1005.desc_opening_other_court: "\"Oh, [ROOT.Char.GetFirstNameNoTooltip]! Nos encontrarmos assim, longe de ambas as nossas cortes... Isso é como um sonho.\"\n\n"
 lover.1005.desc_object_of_importance: "Ao ver o sorriso nos lábios de [lover.GetTitledFirstName|l] e a ânsia em seus olhos, aceito com alegria procurar alojamento em uma pousada em [county.GetNameNoTier], uma pousada adornada com [ROOT.Char.Custom2('LoverSeductionObjectIndefinite', SCOPE.sC('lover'))]."
 lover.1005.desc: "Ao ver o sorriso nos lábios de [lover.GetTitledFirstName|l] e a ansiedade em seus olhos, aceito com alegria procurar hospedagem em uma estalagem em [county.GetNameNoTier]."
 lover.1005.a: "Seu quarto mais privado por uma semana!"
 lover.1005.a.tt: "#F Minha ausência pode ser notada#!"
 lover.1005.b: "Vamos aproveitar ao máximo uma noite."
 lover.1005.c: "Hm, esta estalagem — esta vila inteira — poderia certamente usar uma melhoria..."
 lover.1006.opening: "[lover.Custom2('AppropriateGreeting', ROOT.Char)]"
 lover.1006.desc_opening: "Eu imploro para que você empreste seus talentos a mim!"
 lover.1006.desc_chancellor: "Suas habilidades em questões diplomáticas são amplamente conhecidas,"
 lover.1006.desc_steward: "Suas habilidades em questões administrativas são amplamente conhecidas,"
 lover.1006.desc_marshal: "Suas habilidades em questões militares são amplamente conhecidas,"
 lover.1006.desc_spymaster: "Suas habilidades em #EMP assuntos delicados#! são amplamente conhecidas,"
 lover.1006.desc_court_chaplain: "Suas habilidades em questões teológicas são amplamente conhecidas,"
 lover.1006.desc_kurultai: "Suas habilidades em questões de pastoreio são amplamente conhecidas,"
 lover.1006.desc_end: "e eu acho que você seria um[lover.Custom('ES_XA')] candidat[lover.Custom('ES_OA')] perfeit[lover.Custom('ES_OA')] para um cargo no meu conselho."
 lover.1006.a: "Claro que vou ajudar você, [lover.GetFirstNameNoTooltip]!"
 lover.1006.b: "Não tenho tempo para servir em um conselho."
 lover.1007.t: "O Vassalo e seu Suserano"
 lover.1007.desc: "\"[ROOT.Char.Custom('LoverPetName')|U] meu[lover.Custom('ES_OA')] você merece as estrelas\". Meu [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('lover'))] [lover.GetTitledFirstName|l] me percorre as costas com a mão enquanto deitamos lado a lado em sua cama. \"Infelizmente, só posso lhe dar coisas mundanas… A primeira coisa que farei amanhã será fazer alguns ajustes nos termos de seu vassalagem\"."
 lover.1007.a: "Você é bom demais[lover.Custom('ES_OA')] comigo, [lover.GetFirstNameNoTooltip]!"
 lover.1007.b: "Apenas #EMP algumas#! mudanças, m querid?"
 lover.1007.b_1: "Fico ainda melhor!"
 lover.1007.b_2: "[lover.GetFirstNameNoTooltip] não aprecia minha ganância"
 lover.1008.t: "A Chegada do [lover.GetTitleTierName]"
 lover.1008.desc: "Ao ir dar as boas-vindas a [capital.GetNameNoTier] ao meu [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('lover'))] [lover.GetTitledFirstName|l], já está cercad[lover.Custom('ES_OA')] por dignitários e funcionários que clamam por sua ajuda e contribuição."
 lover.1008.a: "Dispersai-vos! Ele/Ela está aqui para me ver!"
 lover.1008.b: "A opinião dela ou dele sobre esses assuntos seria útil…"
 lover.2001.t: "A Pressão do Segredo"
 lover.2001.desc: "Passo muito tempo pensando em quem poderia descobrir meu relacionamento com [lover.GetTitledFirstName|l].\n\nMeu coração dispara quando comentários inocentes de repente ganham significado. Tento dizer a mim mesmo que é tudo imaginação minha."
 lover.2001.a: "Ninguém sabe. Certamente, ninguém sabe."
 lover.2002.t: "O Fardo do Amor"
 lover.2002.desc: "Sinto uma grande paixão por [lover.Custom('ES_ElLa')] [lover.GetTitledFirstName|l], mas requer muita atenção e cuidados, o que é bastante complicado em momentos como este!\n[lover.GetSheHe|U] sabe o quão importante é meu dever como [ROOT.Char.GetTitleAsNameNoTooltip|l], então não posso passar o resto das horas do dia com [lover.GetSheHe]!"
 lover.2002.secret: "\n\nSimplesmente manter nosso caso em segredo é uma tarefa imensa!"
 lover.2002.a: "Não, [ROOT.GetCharacter.Custom('LoverPetName')], não é que eu não me importe!"
 lover.2003.t: "O \"Fardo\" do Amor"
 lover.2003.desc: "[first_lover.GetFirstName] culpa a suas obrigações como [first_lover.GetTitleAsNameNoTooltip|l], mas eu sinto que não me olha mais do mesmo jeito que antes.\n\nÉ realmente pedir demais que alguém que diz amar você se dê ao trabalho de passar ao menos um momento em sua companhia?"
 lover.2003.a: "Eu mereço algo melhor do que isso."
 lover.2004.t: "Promessa Quebrada"
 lover.2004.desc: "Meu [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('lover'))] [lover.GetTitledFirstName|l] insiste que seu casamento com [lovers_lover.GetTitledFirstName|l] é apenas uma necessidade política, mas alguns dos sorrisos que dirige a seu [lover.Custom2('RelationToMe',SCOPE.sC('lovers_lover'))] me fazem questionar..."
 lover.2004.a: "Não vou aceitar isso — prometemos nunca amar outro alguém!"
 lover.2004.a.tt: "Você confronta [lover.GetShortUIName]"
 lover.2004.b: "Confio em [lover.Custom('ES_ElElla')]."
 lover.2004.b.tt: "#F Meu amado não mentiria para mim!#!"
 lover.2005.desc: "\"Meu [ROOT.Char.Custom('LoverPetName')], os olhares ternos que vi entre [lovers_lover.GetTitledFirstName|l] e você são apenas um mal-entendido, não são?\".\n\nMeu [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('original_lover'))] [original_lover.GetFirstName] está preocupad[original_lover.Custom('ES_OA')] desde que me casei pela promessa de devoção pessoal que fizemos…"
 lover.2005.a: "Não se preocupe, meu amor. Você é o únic[original_lover.Custom('ES_OA')] para mim!"
 lover.2005.b: "Você não tem voz ativa em meu casamento."
 lover.3103.desc_married: "Embora [lover.GetFirstName] tenha se casado com ess[lover.Custom('ES_EA')] [ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('lovers_lover'))] [lovers_lover.GetTitledFirstName|l], me assegura que só ama a mim.\n\n\"[lover.Custom('LoverPetName')|U], não precisa se preocupar. Você é tudo para mim; eu jamais seria capaz de amar outra pessoa\"."
 lover.3103.a: "[lover.GetSheHe] me escolheu no final — isso é tudo o que importa."
 lover.3104.desc_married: "Não posso deixar [lovers_lover.GetHerHim]! É meu [lovers_lover.Custom('WifeHusband')]! E mesmo que pudesse… [lovers_lover.Custom('ES_ElElla')|U] significa tanto para mim quanto para você, meu [lover.Custom('LoverPetName')]."
 lover.3104.desc_ending: "\n\nAs palavras de [lover.GetTitledFirstName|l] me doem tanto quanto a revelação inicial. Como pôde me rejeitar [lover.Custom('ES_ElElla')] desse jeito?"
 lover.3104.a: "Ao menos [lovers_lover.Custom('ES_ElElla')] ainda me deseja…"
 lover.3104.a.tt: "#F Entre outros...#!"
 lover.3104.b: "Então eu vou acabar com isso!"
 lover.3105.t: "Uma Cama Tamanho [ROOT.Char.GetTitleTierName]"
 lover.3105.desc: "\"Que você me traia assim, [ROOT.Char.GetFirstNameNoTooltip]... Eu nunca deveria ter deixado alguém tão [ROOT.Char.Custom2('InsultNounSexual', SCOPE.sC('lover'))] em minha cama.\"\n\nPensar que m [discoverer.Custom('LoverPetName')], m [discoverer.GetFirstName], me deixaria por causa de um pequeno deslize!"
 lover.3105.a: "Pelo menos ainda tenho a [lovers_lover.GetFirstNameNoTooltip]!"
 lover.3201.t: "O Presente Perfeito"
 lover.3201.desc: "Mal consigo me conter enquanto admiro meu perfeito [ROOT.Char.Custom2('LoverSeductionObject', SCOPE.sC('lover'))] e imagino o sorriso [lover.Custom('ES_DelDela')] [lover.GetTitledFirstName|l].\n\n\"É uma obra-prima. Não concorda, [ROOT.Char.Custom('FormOfAddressForLiege')]?\". O velho mercador aponta para o [ROOT.Char.Custom2('LoverSeductionObject', SCOPE.sC('lover'))] com uma piscadela. \"O presente perfeito para um ente querido\"."
 lover.3201.a: "Realmente é. Por favor, embrulhe bem."
 lover.3201.b: "De fato, é. Vou levar dez!"
 lover.3201.c: "Isso é lixo? Me poupe."
 lover.3201.c.tt: "#F Tenho certeza de que encontrarei outro modo de demonstrar o quanto quero [lover.GetHerHim]!#!"
 lover.3202.desc_exquisite_gift: "Dez [ROOT.Char.Custom2('LoverSeductionObjectMultiple', SCOPE.sC('original_lover'))] arranjados na minha cama — um mistério que só pode ser resolvido pelo meu coração."
 lover.3202.desc_ordinary_gift: "[ROOT.Char.Custom2('LoverSeductionObjectIndefinite', SCOPE.sC('original_lover'))|U] descansando no meu travesseiro — um mistério que só pode ser resolvido pelo meu coração."
 lover.3202.desc_ending: "\n\nOh, [original_lover.GetTitledFirstName|l], meu [original_lover.Custom('LoverPetName')], ninguém poderia desejar um[original_lover.Custom('ES_XA')] [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('original_lover'))] melhor!"
 lover.3202.a: "Devo lembrar de agradecer a este presente!"
 lover.3202.a.tt: "#F E minha #EMP gratidão#! é algo que [original_lover.GetSheHe] com certeza apreciará#!"
 lover.3203.t: "Meu Amado"
 lover.3203.desc: "Um dia produtivo deve terminar com um bom revolcão. E tenho a bênção de ter abertos para mim tanto os aposentos da minha [lover.Custom('ComplimentAdjective')] [lover.GetTitledFirstName|l] como da minha [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('spouse'))] [spouse.GetTitledFirstName|l]!"
 lover.3203.a_not_beloved: "Vou me encontrar com m [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('spouse'))], como é adequado."
 lover.3203.a_beloved: "Vou me encontrar com m [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('spouse'))], pois meu coração assim me diz!"
 lover.3203.b: "Estou indo, [lover.GetFirstNameNoTooltip]!"
 lover.3203.b.success: "Me afasto sem ser notad"
 lover.3203.b.failure: "Fui descobert"
 lover.3203.b.tt_safe: "[spouse.GetFirstNameNoTooltip] não faz ideia."
 lover.3203.c: "Sou mais forte do que esses impulsos!"
 lover.3204.t: "Anseio Distante"
 lover.3204.desc: "Com o passar dos dias, sinto mais intensamente a distância até meu [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('lover'))] [lover.GetTitledFirstName|l]. Se eu pudesse ver seu sorriso e esse traço [lover.Custom('quirk_pos_adjective')] seu com mais frequência, sentir seu corpo quente contra o meu, provar o que [lover.Custom('ES_ElElla')] me oferece…\n\nMeu desejo arde tão forte quanto sempre e é exaustivo estarmos separados deste jeito."
 lover.3204.a: "Tudo acontece conforme a vontade do [ROOT.Char.GetFaith.HighGodName]."
 lover.3204.a.tt: "#F Não tomarei nenhuma ação, o que quer que aconteça estava destinado a acontecer#!"
 lover.3204.b: "De que adianta estarmos separados assim?"
 lover.3205.opening: "[original_lover.Custom2('AppropriateGreeting', ROOT.Char)]"
 lover.3205.desc: "Para meu [ROOT.Char.Custom('LoverPetName')]. [ROOT.Char.Custom('ComplimentAdjective')] [ROOT.Char.GetTitledFirstName|l]:\n\nTemo que essa distância que me mantém longe do seu abraço tenha vencido a mim. Perdoe-me, meu amor, e saiba que ainda anseio por sua doçura e seu calor, embora eu deva acabar com o que tivemos."
 lover.3205.a: "Então é assim que termina..."
 lover.3205.a.tt: "#F Me parte o coração com uma #EMP carta#!?!#!"
 lover.3206.t: "Através do Campo de Batalha"
 lover.3206.desc: "Oh, [lover.GetTitledFirstName|l] meu amor, sobreviveremos a esta guerra?\n\nUma coisa é que meu [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('attacker'))] [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('attacker'))] [attacker.GetTitledFirstName|l] me chame para a guerra, mas ter que pegar em armas contra meu amor é…"
 lover.3206.a: "Tudo é justo no amor e na guerra — não há nada que eu possa fazer."
 lover.3206.b: "Obstruirei os esforços de [attacker.GetFirstNameNoTooltip]!"
 lover.3206.b.tt: "#F Farei o que for preciso para manter m [lover.GetFirstNameNoTooltip] segur!#!"
 lover.3207.t: "Amor à Distância"
 lover.3207.desc: "Mesmo que esteja longe do meu [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('lover'))] [lover.GetTitledFirstName|l] nossos corações são um só. Se eu lhe recordar meus sentimentos, isso poderia trazer ao seu rosto aquele sorriso de ar [lover.Custom('quirk_pos_adjective')] que tanto adoro…"
 lover.3207.a: "Vou compor um poema que capture meus sentimentos por [lover.GetHerHim]!"
 lover.3207.a_object: "Um poema e [ROOT.Char.Custom2('LoverSeductionObjectIndefinite', SCOPE.sC('lover'))], para transmitir meus sentimentos!"
 lover.3207.a.tt: "Se [lover.GetFirstNameNoTooltip] aprecia o poema:"
 lover.3207.c: "[lover.Custom('ES_ElElla')|U] já sabe o que significa para mim!"
 lover.3207.c.tt: "#F Tenho certeza de que [lover.Custom('ES_ElElla')] sim...!#!"
 lover.3208.opening: "[writing_lover.Custom2('AppropriateGreeting', ROOT.Char)]"
 lover.3208.desc_object: "Este [ROOT.Char.Custom2('LoverSeductionObject', SCOPE.sC('writing_lover'))] é apenas um lembrete do meu desejo e devoção\n"
 lover.3208.a: "Isso é tão doce!"
 lover.3208.a_terrible: "#F Sei que ele/ela quer o melhor, mas aquele #EMP poema#!…#!"
 lover.3208.a_okay: "#F Aunque su poesía necesita algo de trabajo…#!"
 lover.3208.a_great: "#F Até sabe escrever poesia eloquente!#!"
 lover.3208.a_amazing: "#F Este poema hace que me vuelva a enamorar de [writing_lover.Custom('ES_ElElla')]!#!"
 lover.3208.b: "Isso é a coisa mais boba que já li!"
 lover.3209.opening: "[lover.Custom2('AppropriateGreeting', ROOT.Char)]"
 lover.3209.desc: "O poema que você me enviou iluminou meu dia e meu desejo por você; saber que você também está pensando em mim é a única coisa que torna tudo suportável."
 lover.3209.a: "Oh [lover.GetFirstNameNoTooltip], como sinto sua falta!"
 lover.3210.desc: "Por favor, não me envie tamanha baboseira novamente. Ainda penso com carinho em você apesar da distância que nos separa e gostaria de manter assim."
 lover.3210.a: "Talvez eu não seja tão bom poeta afinal..."
 lover.3211.t: "Representar o Amor"
 lover.3211.desc: "Um talentoso pintor chegou a [capital.GetNameNoTier], e meus pensamentos imediatamente foram para m [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('lover'))] [lover.GetTitledFirstName|l] quando vi as belas obras de arte.\n\nUm quadro seria um presente adorável, se eu pudesse decidir sobre o assunto perfeito para representar..."
 lover.3211.a: "A escuridão de uma ruela antes do amanhecer, cheia de simbolismo!"
 lover.3211.a.tt: "#F Tenho certeza de que [lover.Custom('ES_ElElla')] entenderá as sutis insinuações!#!"
 lover.3211.b: "Abraão e Sara, lado a lado."
 lover.3211.b.tt: "#F Com sorte, [lover.Custom('ES_ElElla')] gostará do simbolismo religioso!#!"
 lover.3211.c: "Para retratar meu ardente desejo — uma batalha dramática!"
 lover.3211.c.tt: "#F Nada fala de amor como lutar pelo que se tem caro!#!"
 lover.3211.d: "Um mercado movimentado é o tema perfeito!"
 lover.3211.d.tt: "#F Tenho certeza de que [lover.Custom('ES_ElElla')] gostará da imagem animada, cheia de detalhes.#!"
 lover.3211.e: "Um quadro retratando o diálogo entre Sócrates e Fedro!"
 lover.3211.e.tt: "#F Que melhor forma de honrar nosso amor do que retratar uma das primeiras discussões registradas sobre o assunto?#!"
 lover.3211.f: "Não tenho tempo para tais indulgências."
 lover.3211.appreciate: "Se [lover.GetFirstNameNoTooltip] aprecia o gesto:"
 lover.3212.desc_opening: "Um presente para m [ROOT.Char.Custom('LoverPetName')] [ROOT.Char.GetFirstNameNoTooltip],\n\n"
 lover.3212.desc_lifestyle_schemer: "O quadro retrata uma ruela sombria em [capital.GetNameNoTier] antes do amanhecer, mas deixarei o simbolismo e as insinuações ocultas na escuridão para que você possa descobrir por si mesmo."
 lover.3212.desc_lifestyle_scholar: "O quadro retrata Abraão e Sara lado a lado, unidos como estamos, prontos para enfrentar o futuro juntos. É minha esperança que você aprecie o significado simbólico do quadro."
 lover.3212.desc_lifestyle_general: "O quadro mostra uma batalha maravilhosa em que os heróis gloriosos triunfam sobre o mal. O quadro basta para inflamar meu sangue, mas mencionar seu nome também o faz, meu querid[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetFirstNameNoTooltip]!"
 lover.3212.desc_lifestyle_administrator: "A pintura mostra um mercado movimentado, repleto de pessoas e mercadorias, assim como eu transbordo de afeto por você. Por favor, permita que esta imagem lhe lembre das muitas oportunidades que enfrentamos todos os dias, assim como dos meus sentimentos."
 lover.3212.desc_lifestyle_diplomat: "O quadro é uma interpretação do diálogo entre Sócrates e Fedro, discutindo sobre o amor e a retórica, inspirado no amor que sinto por você."
 lover.3212.a.perfect: "#F Nunca antes vi um quadro que fala tão profundamente comigo!#!"
 lover.3212.a: "É adorável!"
 lover.3212.b: "Este quadro é horrível, jogue-o fora!"
 lover.3213.desc_perfect: "Nunca antes vi uma obra de arte como o quadro que você me enviou. Ele me comoveu profundamente,"
 lover.3213.desc: "O quadro que você me enviou é muito apreciado. O pensamento e talento que nele foram colocados são evidentes,"
 lover.3213.desc_lifestyle_schemer: "e os detalhes sutis e simbolismos ocultos nos cantos mais escuros da ruela realmente aludem a um significado mais profundo!"
 lover.3213.desc_lifestyle_scholar: "e a escolha de Abraão e Sara como motivo foi um golpe de gênio!"
 lover.3213.desc_lifestyle_general: "e a batalha retratada realmente me animou, mal posso esperar para te ver, meu amor!"
 lover.3213.desc_lifestyle_administrator: "e o movimentado mercado, cheio de pessoas e oportunidades, pareceu tão vivo!"
 lover.3213.desc_lifestyle_diplomat: "e ver o famoso diálogo retratado dessa forma é verdadeiramente inspirador!"
 lover.3213.a: "Fico feliz que ela/ele tenha apreciado o presente!"
 lover.3214.desc: "Agradeço o gesto, mas os quadros que você me enviou estão entre as peças de arte mais horríveis que já vi. Foi uma piada?"
 lover.3214.a: "Ahaha... sim. Uma piada."
 lover.3215.t: "Cante os Louvores"
 lover.3215.desc: "Como não posso estar ao lado do meu amor, [lover.Custom('ES_ElLa')] [lover.GetTitledFirstName|l], temo que ele/ela esqueça quão ardentes são meus sentimentos por [lover.GetSheHe].\n\nPara lembrar[lover.Custom('ES_LoLa')] disso, eu poderia enviar um[lover.Custom('ES_XA')] [lover.Custom('MusicalPerformer')] que exerça as artes do amor para cortejar[lover.GetHerHim] com poemas, canções e palavras doces escritas em meu nome."
 lover.3215.a: "Enviarei o melhor, imediatamente!"
 lover.3215.a.tt: "Um [lover.Custom('MusicalPerformer')] a meu serviço se juntará à [THIS.Char.Custom('GetCourt')|l] em [court_location.GetNameNoTier]"
 lover.3215.b: "Qualquer pessoa serve, certo?"
 lover.3215.c: "Não vou depender de um menestrel para cortejar por mim."
 lover.3215.c.tt: "#F Tenho certeza de que terei outras oportunidades, mais pessoais!#!"
 lover.3216.desc: "Um [lover.Custom('MusicalPerformer')] chegou à corte, oficialmente para entreter e divertir, mas logo se aproxima de mim para revelar o verdadeiro motivo de sua visita."
 lover.3216.desc_fancy_troubadour: "Um [lover.Custom('MusicalPerformer')] chegou à corte, cantando com uma voz digna dos deuses e declamando prosas fluidas como um rio. Logo se aproxima de mim para revelar o verdadeiro motivo de sua visita."
 lover.3216.desc_ending: "\n\n\"Me envia [original_lover.Custom('ES_ElLa')] [original_lover.GetTitledFirstName|l] para atestar seu amor e atuar para vós, [ROOT.Char.Custom('FormOfAddressForLiege')]\"."
 lover.3216.a: "Que delícia!"
 lover.3216.b: "Por que teria que enviar outra pessoa para me cortejar?!"
 lover.3217.desc: "O [lover.Custom('MusicalPerformer')] que você enviou tem sido uma verdadeira delícia! Ele canta como um pássaro e suas prosas fluem como se tivesse nascido com uma pena na mão. A cada dia sou lembrad de seu amor, e minha vida é mais rica por isso!"
 lover.3217.a: "Fico feliz!"
 lover.3218.desc: "Você está me zombando, m [ROOT.Char.Custom('LoverPetName')]? O [lover.Custom('MusicalPerformer')] que você enviou mal consegue manter uma nota, e tenho apreciado prosas destinadas a crianças com mais substância."
 lover.3218.a: "Eu #EMP sabia#! Não deveria ter escolhido o menestrel de rua!"
 lover.3219.t: "Lembrança Pessoal"
 lover.3219.desc: "Meu [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('lover'))] [lover.GetTitledFirstName|l] vive tão longe dos meus braços… Se pudesse ter algo para se lembrar de mim, algo pessoal, eu me sentiria mais tranquilo."
 lover.3219.a: "Receberá uma mecha do meu cabelo."
 lover.3219.a.tt: "#F [lover.Custom('ES_ElElla')|U] também deve sentir muito minha falta.#!"
 lover.3219.b: "Enviarei a ele/ela algumas de minhas roupas íntimas!"
 lover.3219.b.tt: "#F Tenho certeza de que [lover.Custom('ES_ElElla')] apreciará o gesto.#!"
 lover.3219.c: "Enviarei [lover.Custom2('LoverSeductionObjectIndefinite', ROOT.Char)], por causa dos velhos tempos."
 lover.3219.c.tt: "#F Sé lo romántic[lover.Custom('ES_OA')] que puede ser.#!"
 lover.3219.d: "Não tenho tempo para presentes sem sentido."
 lover.3219.d.tt: "#F Encontrarei uma oportunidade melhor para mostrar o quanto sinto falta de [lover.GetHerHim]!#!"
 lover.3220.desc_opening: "Cada dia sem você é vazio, e cada momento fora de seus braços é tormento."
 lover.3220.desc_hair: "Para lembrá-l do meu amor quando não posso estar presente, enviei-lhe um presente pessoal: um tufo de meus cabelos."
 lover.3220.desc_smallclothes: "Para lembrá-l do meu amor quando não posso estar presente, enviei-lhe um presente íntimo: algumas de minhas roupas íntimas."
 lover.3220.desc_object: "Para lembrá-l do meu amor quando não posso estar presente, enviei-lhe um presente que ecoa nosso passado: [ROOT.Char.Custom2('LoverSeductionObjectIndefinite', SCOPE.sC('original_lover'))]."
 lover.3220.a: "Este é um presente tão adorável!"
 lover.3220.b: "O que eu devo fazer com isso?"
 lover.3220.b.tt_smallclothes: "#F Eca. Só eca.#!"
 lover.3221.desc_opening: "O presente que você me enviou rapidamente se tornou muito querido para mim."
 lover.3221.desc_hair: "A frustração de raramente estar em sua companhia será mais fácil de suportar com uma parte de você tão próxima."
 lover.3221.desc_smallclothes: "A frustração de raramente estar em sua companhia será mais fácil de suportar com um item tão íntimo seu para me lembrar do que compartilhamos."
 lover.3221.desc_object: "A frustração de raramente estar em sua companhia será mais fácil de suportar com um lembrete do passado que compartilhamos juntos."
 lover.3221.a: "Estou aliviad que você tenha gostado do presente!"
 lover.3222.desc_opening: "O presente que você me enviou foi verdadeiramente... pessoal."
 lover.3222.desc_hair: "Preciso perguntar — o que eu devo fazer com esses cabelos? É para algum ritual arcano?"
 lover.3222.desc_smallclothes: "Preciso perguntar — o que possuía para enviar-me uma peça de roupa tão vulgar?"
 lover.3222.desc_object: "Preciso perguntar — por que você focaria tanto no passado entre nós? Não vê nenhum futuro?"
 lover.3222.a: "Não consigo acreditar que não tenha apreciado o presente!"
 lover.7001.t: "Meu [potential_lover.Custom2('ComplimentAdjective', ROOT.Char)] amig[potential_lover.Custom('ES_OA')]"
 lover.7001.desc: "Sentad[ROOT.Char.Custom('ES_OA')] ao lado de [potential_lover.GetTitledFirstName|l], falamos sobre [potential_lover.Custom('herhis_subject_of_interest')], [potential_lover.Custom('ES_LoLa')] vejo sorrir [potential_lover.Custom('quirk_pos_adverb')]… Quando nossos olhares se encontram, meu coração começa a bater mais forte e, a julgar pelo modo como ele cora, não sou o único a sentir a tensão repentina."
 lover.7001.a: "Farei este momento durar o máximo possível!"
 lover.7001.a.tt: "#F Talvez um dia possamos ser mais do que amigos?#!"
 lover.7001.b: "Então, sobre o que você estava dizendo..."
 lover.7001.b.tt: "#F Não quero que pense que o que temos pode se tornar algo além de amizade.#!"
 lover.7002.t: "Meu amig[proposing_friend.Custom('ES_OA')] [proposing_friend.Custom2('ComplimentAdjective', ROOT.Char)]"
 lover.7002.desc: "Sentad[ROOT.Char.Custom('ES_OA')] ao lado de [proposing_friend.GetTitledFirstName|l], falamos sobre [ROOT.Char.Custom('subject_of_interest')], vejo como ele/ela me observa quando sorrio… De repente, a tensão é palpável e, pelo rubor, percebo que essa sensação não é só minha."
 lover.7003.t: "Rival [potential_lover.Custom('ES_ElLa')|U] [potential_lover.Custom2('InsultAdjective', ROOT.Char)]"
 lover.7003.desc: "[potential_lover.GetTitledFirstName] volta a lançar outra diatribe sobre [potential_lover.Custom('herhis_subject_of_interest')] e eu, deixando a mente divagar, não consigo evitar notar que na verdade é bastante [potential_lover.Custom2('ComplimentAdjective', ROOT.Char)].\n\nA tensão que compartilhamos não é novidade, mas, quando nossos olhos se encontram, sinto meu coração palpitar com algo que não é ódio…"
 lover.7003.a: "Que feitiço me lançou es[potential_lover.Custom('ES_EA')] [potential_lover.Custom2('InsultNoun', ROOT.Char)]?"
 lover.7003.a.tt: "#F Preciso investigar esse sentimento estranho mais a fundo...#!"
 lover.7003.b: "Deve ser desprezo o que sinto."
 lover.7004.t: "Rival [proposing_rival.Custom('ES_ElLa')|U] [proposing_rival.Custom2('InsultAdjective', ROOT.Char)]"
 lover.7004.desc_opening: "No meio da nossa discussão empolgante sobre [ROOT.Char.Custom('subject_of_interest')], vejo [proposing_rival.Custom('ES_AlAla')] [proposing_rival.GetTitledFirstName|l] do outro lado do meu [ROOT.Char.Custom('GetRoom')] com a testa franzida.\n\n"
 lover.7004.desc_potential_lover_is_go: "Quando nossos olhos se encontram, para minha surpresa, [proposing_rival.Custom('ES_ElElla')] sorri [proposing_rival.Custom('quirk_pos_adverb')]. Será que sempre foi um[proposing_rival.Custom('ES_XA')] [proposing_rival.GetWomanMan] tão [proposing_rival.Custom2('ComplimentAdjective', ROOT.Char)]?"
 lover.7004.desc_not: "Quando nossos olhos se encontram, [proposing_rival.GetSheHe] franze a testa e desvia o olhar rapidamente — tão [proposing_rival.Custom2('InsultNoun', ROOT.Char)] como sempre!"
 lover.7004.a: "Eu sorrio de volta...?"
 lover.7004.a.tt: "#F O que é esse palpitar repentino em meu coração?#!"
 lover.7004.b: "Ew, deixe-me em paz, [proposing_rival.GetFirstNameNoTooltip]."
 lover.7005.t: "Meu querid[potential_lover.Custom('ES_OA')] [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('potential_lover') )]"
 lover.7005.desc: "Não me passou despercebido que meu [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('potential_lover') )] [potential_lover.GetTitledFirstName|l] é um[potential_lover.Custom('ES_XA')] [potential_lover.GetWomanMan] muito atraente[potential_lover.Custom('ES_OA')]. O jeito como sorri e [potential_lover.Custom('quirk_pos_present')] sempre faz meu coração disparar…"
 lover.7005.a: "São sentimentos normais por um[potential_lover.Custom('ES_XA')] [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('potential_lover') )]?"
 lover.7005.a.tt: "#F Seja o que for, quero mais disso!#!"
 lover.7005.b: "É minha [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('potential_lover') )]. Acalme-se, [ROOT.Char.GetFirstNameNoTooltip]!"
 lover.7006.t: "Meu querid[proposing_family.Custom('ES_OA')] [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('proposing_family') )]"
 lover.7006.desc: "Meu [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('proposing_family') )] [proposing_family.GetTitledFirstName|l] é um[proposing_family.Custom('ES_XA')] [proposing_family.GetWomanMan] muito [proposing_family.Custom2('ComplimentAdjective', ROOT.Char)], eu sei disso há muito tempo. Mas, recentemente, ele(a) tem começado a ficar rondando minha presença, sorrindo com mais doçura que o normal, olhando para mim quando pensa que eu não [proposing_family.Custom('ES_LoLa')] o(a) vejo..."
 lover.7006.a: "Também estou intrigado por [proposing_family.Custom('ES_ElElla')]!"
 lover.7006.a.tt: "#F Mas nada disso dará em nada... Imagine só o escândalo!#!"
 lover.7006.b: "Não é nada além de amor de [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('proposing_family') )], sem dúvida."
 lover.8102.t: "Consequências da $pilgrimage_header$"
 lover.8102.desc: "\"Com licença\", apresenta-se um[brothel_worker.Custom('ES_XA')] camponês[brothel_worker.Custom('ES_OA')] de aparência familiar. Enquanto me esforço para lembrar onde eu poderia ter[brothel_worker.GetHerHim] conhecido antes, me responde como se estivesse lendo a minha mente.\n\n\"Nos conhecemos em um bordel de [brothel_location.GetName]. Pagasteis por meus serviços\". Uma tonalidade rosada se espalha por suas bochechas.\n\"Que tenhamos nos reencontrado… Deve ser obra do destino que"
 lover.8102.desc.puppy_love: "Eu me apaixonei por você. Tudo parecia tão certo em seus braços... Há espaço em seu coração para alguém como eu?\""
 lover.8102.desc.they_pregnant: "estou grávid[brothel_worker.Custom('ES_OA')]. O chá não deve ter contido as ervas corretas. Não quero criar a criança sozinh[brothel_worker.Custom('ES_OA')]\"."
 lover.8102.desc.you_pregnant: "talvez você esteja grávid[ROOT.Char.Custom('ES_OA')]. O chá não continha as ervas e a dosagem adequadas. Não quero que você crie a criança sozinh[ROOT.Char.Custom('ES_OA')]."
 lover.8102.desc.ending: "\n\nA voz se desvanece e me oferece um sorriso tímido. Ou talvez seja um sorriso cúmplice?"
 lover.8102.a: "Assumirei total responsabilidade por minhas ações."
 lover.8102.b: "Você está apenas tentando me enredar, não é!?"
 lover.8102.c: "Esqueça essa noite, senão ninguém mais ouvirá falar de você."
 lover.8102.c.success: "[brothel_worker.GetTitledFirstNameNoTooltip|l] é ameaçad para manter silêncio"
 lover.8102.c.failure: "[brothel_worker.GetTitledFirstNameNoTooltip|l] concorda com o silêncio por um preço"
 lover.8102.c.crit_failure: "[brothel_worker.GetTitledFirstNameNoTooltip|l] conta ao mundo o que você fez"
 lover.8102.d: "Você pode vir comigo, desde que mantenha nosso passado em segredo."
