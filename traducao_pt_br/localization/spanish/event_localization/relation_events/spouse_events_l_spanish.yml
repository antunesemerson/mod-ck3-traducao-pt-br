l_spanish:
 spouse.0001.t: "As Coisas que Compartilhamos"
 spouse.0001.desc: "Quando falamos sobre a vida, minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))] e eu geralmente concordamos. Sei que [spouse.GetFirstName] entende minha forma de ver o mundo."
 spouse.0001.a: "Tenho sorte de estar com alguém que me entende."
 spouse.0002.t: "As Coisas que Compartilhamos"
 spouse.0002.desc: "Outro dia, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('first_spouse'))] [first_spouse.GetFirstName]disse que sou uma das poucas pessoas que [first_spouse.GetHerHim]entende de verdade.\n\nEntendo o que ele(a) quer dizer com essas palavras."
 spouse.0002.a: "Somos ligados por mais do que apenas o casamento."
 spouse.0003.t: "As Coisas que Fazemos"
 spouse.0003.desc: "Às vezes acho que não gostaria de passar meu tempo com ninguém além da minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))] [spouse.GetFirstName]. [spouse.GetSheHe|U] e eu gostamos das mesmas coisas nesta vida."
 spouse.0003.a: "A vida pode ser compartilhada de muitas formas."
 spouse.0004.t: "As Coisas que Compartilhamos"
 spouse.0004.desc: "Nossa, quanta gente há em minha [ROOT.Char.Custom('GetCourt')|l] com quem eu poderia passar o tempo! Mas meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))] [first_spouse.GetFirstName] passa comigo todo o tempo que pode.\n\n[first_spouse.GetSheHe|U] realmente gosta muito de tudo o que fazemos!"
 spouse.0004.a: "A vida pode ser compartilhada de muitas formas."
 spouse.0005.t: "Discórdia Conjugal"
 spouse.0005.desc: "Por mais que eu explique por que faço o que faço, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))] nunca me entende completamente.\n\n[spouse.GetFirstName] e eu parecemos pessoas totalmente diferentes."
 spouse.0005.a: "Estamos nisso querendo ou não."
 spouse.0006.t: "Discórdia Conjugal"
 spouse.0006.desc: "Não entendo meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('from_spouse'))] [from_spouse.GetFirstName]. [from_spouse.Custom('ES_ElElla')|U] tenta me explicar por que faz o que faz, mas isso não faz sentido para mim.\n\nSerá que somos pessoas diferentes demais?"
 spouse.0006.a: "Não está facilitando para mim."
 spouse.0007.t: "Um Amigo de um Amigo"
 spouse.0007.desc: "Meu [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('friend_in_common'))] [friend_in_common.GetTitledFirstName|l]tem me contando o quão bo[spouse.Custom('ES_OA')] amigo[spouse.Custom('ES_OA')] que tem sido meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))] [spouse.GetFirstName] com [friend_in_common.Custom('ES_ElElla')]. Ver como meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))] trata as pessoas me faz respeitar[spouse.Custom('ES_LoLa')] ainda mais."
 spouse.0007.a: "Isso me faz sorrir."
 spouse.0008.t: "Um Amigo de um Amigo"
 spouse.0008.desc: "Meu [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('first_spouse'))] [first_spouse.GetFirstName] tem me dado sorrisos mais calorosos do que o normal e diz que ver-me aquece seu coração.\n\nPelo visto, noss[friend_in_common.Custom('ES_OA')] amig[friend_in_common.Custom('ES_OA')] comum [friend_in_common.GetTitledFirstName|l] tem lhe contado como sou um bom amigo!"
 spouse.0008.a: "Obrigad, [friend_in_common.GetFirstNameNoTooltip]!"
 spouse.0008.b: "Quanto tempo meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('first_spouse'))] com [friend_in_common.GetFirstName]?"
 spouse.0009.t: "Amizade Enfrentando Suspeita"
 spouse.0009.desc: "Apesar das minhas demonstrações de afeto por [spouse.GetFirstName], recebi uma resposta fria e suspeita. Pelo visto, tenho passado tempo demais com noss[friend_in_common.Custom('ES_OA')] amig[friend_in_common.Custom('ES_OA')], [friend_in_common.GetTitledFirstName|l]."
 spouse.0009.a: "Como se atreve?"
 spouse.0009.has_lover_tooltip: "[spouse.GetFirstNameNoTooltip] não pode saber. Verdade que não?"
 spouse.1001.t: "O Tempo Que Passamos Juntos"
 spouse.1001.desc: "Talvez meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))] não seja a pessoa mais importante para mim, mas, quanto mais tempo passo com [spouse.GetFirstName] mais começo a entender[spouse.Custom('ES_LoLa')]."
 spouse.1001.a: "Talvez eu até consiga amar[spouse.Custom('ES_LoLa')] com o tempo."
 spouse.1002.t: "O Tempo Que Passamos Juntos"
 spouse.1002.desc: "À medida que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))] e eu passamos cada vez mais tempo juntos, percebo que está se aproximando de mim. E [first_spouse.GetFirstName] diz que continua vendo novos lados de mim."
 spouse.1002.a: "Talvez até chegue a me amar, com o tempo."
 spouse.1003.t: "O Tempo Que Passamos Juntos"
 spouse.1003.desc: "Eu não tenho meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))] nunca foi o mais importante para mim, mas é que, quanto mais tempo passo com [spouse.GetFirstName] mais entendo por quê. Tudo o que ele faz me irrita um pouco!"
 spouse.1003.a: "Eu tenho que viver uma vida inteira com essa pessoa."
 spouse.1004.t: "O Tempo Que Passamos Juntos"
 spouse.1004.desc: "Não acredito que seja imaginação minha. Meu/Minha [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('spouse') )] [first_spouse.GetFirstName] parece ficar cada vez mais irritad[spouse.Custom('ES_OA')] quanto mais tempo passamos na companhia um do outro. Se eu não soubesse de mais nada, diria que estou tirando do sério meu/minha própri[spouse.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe' , SCOPE.sC('spouse') )]!"
 spouse.1004.a: "Vamos passar um pouco menos de tempo juntos, por um tempo."
 spouse.2001.t: "Um Conforto"
 spouse.2001.opening: "Com tanta coisa por fazer e tão pouco tempo, não sei como eu daria conta se não fosse pelo meu amant[spouse.Custom('ES_OA')] [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('spouse'))] [spouse.GetFirstName]."
 spouse.2001.chaste: "\n\n[spouse.Custom('ES_ElElla')|U] me faz saber que está comigo em espírito em todas as minhas dificuldades."
 spouse.2001.lustful: "\n\n[spouse.Custom('ES_ElElla')|U] me revitaliza com noites ardentes e me lembra da paixão de que preciso para superar meus obstáculos."
 spouse.2001.temperate: "\n\n[spouse.Custom('ES_ElElla')|U] me lembra que tudo deve ser feito com moderação, para que eu não me acabe."
 spouse.2001.gluttonous: "\n\n[spouse.Custom('ES_ElElla')|U] sabe exatamente quando preciso me distrair com comida e bebida deliciosas."
 spouse.2001.generous: "\n\n[spouse.Custom('ES_ElElla')|U] dá tanto de si para me apoiar."
 spouse.2001.greedy: "\n\n[spouse.Custom('ES_ElElla')|U] sempre parece encontrar novas oportunidades para que eu alcance meus objetivos."
 spouse.2001.diligent: "\n\nQuando tudo fica demais, [spouse.GetSheHe] me ajuda, assumindo a pena ou o cetro, sem nunca reclamar."
 spouse.2001.lazy: "\n\n[spouse.Custom('ES_ElElla')|U] se certifica de que eu descanse adequadamente quando preciso."
 spouse.2001.wrathful: "\n\n[spouse.Custom('ES_ElElla')|U] descarta, em meu nome, os assuntos sem importância e amaldiçoa os mensageiros que chegam com cartas triviais."
 spouse.2001.calm: "\n\n[spouse.Custom('ES_ElElla')|U] o considera tudo com serenidade e me ajuda a administrar todos os assuntos que não são urgentes."
 spouse.2001.impatient: "\n\n[spouse.Custom('ES_ElElla')|U] sempre encontra maneiras de eu terminar meu trabalho mais rápido e chegar ao fim do meu dia."
 spouse.2001.patient: "\n\n[spouse.Custom('ES_ElElla')|U] se certifica de que eu dedique o tempo necessário a tudo o que precisa ser feito, lembrando-me de que, não importa quanto tempo leve, eu vou conseguir superar isso."
 spouse.2001.stubborn: "\n\n[spouse.Custom('ES_ElElla')|U] me encoraja a continuar e garante que eu não desista até que o trabalho esteja concluído."
 spouse.2001.fickle: "\n\n[spouse.Custom('ES_ElElla')|U] sempre me encontra distrações para eu esquecer o grande peso que carrego sobre os ombros."
 spouse.2001.humble: "\n\n[spouse.Custom('ES_ElElla')|U] me lembra que meu dever é cumprir meu trabalho, e o mais importante é terminá-lo com honra."
 spouse.2001.arrogant: "\n\n[spouse.Custom('ES_ElElla')|U] me lembra que estou fazendo o que escolhi, e que ninguém pode realmente me julgar além de [ROOT.Char.GetFaith.HighGodName]."
 spouse.2001.deceitful: "\n\n[spouse.Custom('ES_ElElla')|U] está sempre lá para me dizer que tudo vai ficar bem."
 spouse.2001.honest: "\n\nSempre me diz que, embora haja muito a fazer, [spouse.GetSheHe] acredita que eu posso conseguir."
 spouse.2001.craven: "\n\n[spouse.Custom('ES_ElElla')|U] sempre me ajuda a me livrar dessas tarefas que menos quero realizar."
 spouse.2001.brave: "\n\n[spouse.Custom('ES_ElElla')|U] me incentiva a encarar meus desafios de frente e a não deixar que a pressão me derrube."
 spouse.2001.shy: "\n\n[spouse.Custom('ES_ElElla')|U] me ajuda a me ocultar de funcionários e mensageiros que trazem cada vez mais assuntos para eu considerar."
 spouse.2001.gregarious: "\n\nQuando novos assuntos me são apresentados para análise, [spouse.GetSheHe] sabe como descartá-los como ninguém."
 spouse.2001.ambitious: "\n\n[spouse.Custom('ES_ElElla')|U] me lembra por que faço o que faço, e quais serão as recompensas do outro lado."
 spouse.2001.content: "\n\n[spouse.Custom('ES_ElElla')|U] me lembra que, no fundo, nada é tão importante. Tudo vai ficar bem, mesmo que eu deixe de cumprir alguns dos meus deveres."
 spouse.2001.arbitrary: "\n\n[spouse.Custom('ES_ElElla')|U] me ajuda a escolher quais tarefas devo concluir e quais posso deixar de lado."
 spouse.2001.just: "\n\n[spouse.Custom('ES_ElElla')|U] me ajuda a me concentrar, dando a cada assunto a importância e a atenção devidas."
 spouse.2001.cynical: "\n\n me dá sorrisos reconfortantes e me diz que, no final, não importa o que eu faça, o importante é que as pessoas me vejam fazendo as coisas."
 spouse.2001.zealous: "\n\nQuando tudo fica demais para mim, [spouse.GetSheHe] me ajuda a rezar para que [ROOT.Char.GetFaith.HighGodName] me dê as forças de que preciso."
 spouse.2001.paranoid: "\n\n[spouse.Custom('ES_ElElla')|U] me indicam quem está ativamente tentando me causar problemas e, por isso, quem eu deveria decepcionar de bom grado."
 spouse.2001.trusting: "\n\n[spouse.Custom('ES_ElElla')|U] me faz pensar em quem confia que eu cumpra meu dever como [ROOT.Char.Custom('ES_SennorSennora')] e me lembra que todos devem cumprir sua parte de boa-fé."
 spouse.2001.compassionate: "\n\n[spouse.Custom('ES_ElElla')|U] é tão gentil e atencios[spouse.Custom('ES_OA')]. Escuta minhas preocupações e me dá todos os conselhos e apoio que pode."
 spouse.2001.callous: "\n\n[spouse.Custom('ES_ElElla')|U] não tem paciência para os \"cretinos\" que desperdiçam meu tempo e não se importa que [spouse.Custom('ES_LoLa')] ouçam."
 spouse.2001.sadistic: "\n\nQuanto mais cresce minha tristeza, mais ele me apoia [spouse.GetSheHe] com seu sorriso e me anima a me esforçar para cumprir meus deveres."
 spouse.2001.vengeful: "\n\n[spouse.Custom('ES_ElElla')|U] tem palavras duras para aqueles que têm exigido demais de mim, e é um grande alívio ouvir outra pessoa amaldiçoar seus nomes."
 spouse.2001.forgiving: "\n\n[spouse.Custom('ES_ElElla')|U] compreende minha situação e me faz saber que, assim que passarem estes momentos tão estressantes, meu descuido com outros aspectos da vida será perdoado."
 spouse.2001.a: "Ninguém me faz sorrir como meu querid[spouse.Custom('ES_OA')] [spouse.GetFirstNameNoTooltip]."
 spouse.2002.t: "Boas palavras"
 spouse.2002.desc: "Durante uma visita, parece que chamei a atenção de [told_of_character.GetFirstName] , embora por pouco tempo. Pode ser o momento oportuno para dizer algo de bom sobre meu querid[spouse.Custom('ES_OA')] [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('spouse'))] [spouse.GetFirstName]."
 spouse.2002.a: "Deixe-me falar sobre meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))]…"
 spouse.2002.b: "Deixem-me falar sobre mim..."
 spouse.2003.t: "Um[spouse.Custom('ES_XA')] [spouse.GetWomanMan] dign[spouse.Custom('ES_OA')] digno de aplausos"
 spouse.2003.opening: "Durante uma visita recente, [initial_spouse.GetTitledFirstName|l] falou longamente sobre seu [initial_spouse.Custom2('RelationToMe' , SCOPE.sC('spouse') )], [spouse.GetTitledFirstName|l]."
 spouse.2003.exceptional: "\n\nSinceramente, eu não tinha percebido até agora o quão grande é [spouse.GetSheHe]!"
 spouse.2003.a: "Obrigado por me mostrar, [initial_spouse.GetFirstNameNoTooltip]!"
 spouse.2004.t: "O apoio do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('told_of_character'))]"
 spouse.2004.opening: "Durante uma visita recente, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('initial_spouse'))] [initial_spouse.GetFirstName] falou longamente com [told_of_character.GetTitledFirstName|l]."
 spouse.2004.exceptional: "\n\nNão sei o que [initial_spouse.GetSheHe], mas deve ter causado uma grande impressão! Quando estávamos de partida, [told_of_character.GetFirstName] se aproximou de mim e me deu um abraço amigável."
 spouse.2004.a: "Não sei o que faria sem meu querid[initial_spouse.Custom('ES_OA')] [initial_spouse.GetFirstNameNoTooltip]."
 spouse.2005.t: "Ouvindo atentamente"
 spouse.2005.desc: "Parece que [told_of_character.GetTitledFirstName|l] ficou muito impressionad[told_of_character.Custom('ES_OA')] com o que contei sobre [spouse.GetFirstName]! Quando estávamos indo embora, [told_of_character.GetTitledFirstName|l] se aproximou para lhe dar um abraço."
 spouse.2005.a: "Eu mal precisei enfeitar [spouse.GetSheHe]."
 spouse.2006.t: "Um[spouse.Custom('ES_XA')] [spouse.GetWomanMan] dign[spouse.Custom('ES_OA')] digno de elogio"
 spouse.2006.good: "\n\n[initial_spouse.GetSheHe|U] me deu uma nova perspectiva sobre os motivos para respeitar [spouse.GetFirstName]."
 spouse.2006.a: "Obrigado por me mostrar, [initial_spouse.GetFirstNameNoTooltip]."
 spouse.2007.t: "O apoio do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('initial_spouse'))]"
 spouse.2007.good: "\n\nSeja lá o que [initial_spouse.GetSheHe] disse, deve ter causado uma boa impressão. Quando estávamos indo embora, [told_of_character.GetFirstName] me agarrou pelo ombro com um sorriso!"
 spouse.2007.a: "Não sei o que faria sem meu/minha querid[initial_spouse.Custom('ES_OA')] [initial_spouse.GetFirstNameNoTooltip]."
 spouse.2008.t: "Ouvindo atentamente"
 spouse.2008.desc: "Parece que [told_of_character.GetTitledFirstName|l] ficou bastante impressionad[told_of_character.Custom('ES_OA')] com o que eu falei de [spouse.GetFirstName]! Eles se dão melhor do que nunca."
 spouse.2008.a: "Tudo o que fiz foi dizer a verdade."
 spouse.2009.t: "Um[spouse.Custom('ES_XA')] [spouse.GetWomanMan] merecedor[spouse.Custom('ES_XA')] de dúvida"
 spouse.2009.bad: "\n\nNão sei se foi sua intenção, mas ouvir o que disse [initial_spouse.GetFirstName] me fez pensar que tenho dado crédito demais a [spouse.GetFirstName]."
 spouse.2009.a: "Obrigado por me mostrar, [initial_spouse.GetFirstNameNoTooltip]…"
 spouse.2010.t: "O apoio de meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('told_of_character'))]"
 spouse.2010.desc: "\n\nNão sei o que teria dito, mas não pareceu ser do agrado de [told_of_character.GetFirstName]. Quando estávamos indo embora, [told_of_character.GetSheHe] só me olhou e balançou a cabeça."
 spouse.2010.a: "\"Não sei o que faria sem meu querid[initial_spouse.Custom('ES_OA')] [initial_spouse.GetFirstName]…\"."
 spouse.2011.t: "Ouvindo Atentamente"
 spouse.2011.desc: "Não importa o quanto eu tentei consertar isso, tudo o que eu dizia sobre meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))] parecia um insulto em vez de um elogio! Ao partirmos, [told_of_character.GetFirstName] apenas balançou a cabeça para [spouse.GetFirstName]."
 spouse.2011.a: "O que eu fiz?"
 spouse.2012.t: "Confidencialidade Conjugal"
 spouse.2012.secret_about_me: "Há coisas que não posso ocultar ao meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))]. Sei que [spouse.GetFirstName] o entenderá."
 spouse.2012.secret_about_spouse: "Sei algumas coisas sobre [spouse.GetFirstName] Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))] não pode continuar vivendo na ignorância."
 spouse.2012.secret_about_other: "Estou pensando se devo compartilhar algo com meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))] da próxima vez que estivermos a sós, longe de ouvidos curiosos.\n\nVai interessar muito a o que descobri sobre [owner_of_secret.GetTitledFirstName|l]."
 spouse.2012.a: "Vou compartilhar este segredo com [spouse.GetFirstNameNoTooltip]."
 spouse.2012.a.tt: "[spouse.GetTitledFirstName] toma conhecimento do segredo"
 spouse.2012.b: "Algumas coisas são melhor deixadas no escuro."
 spouse.2013.t: "Confidencialidade Conjugal"
 spouse.2013.opening: "M [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('first_spouse'))] [first_spouse.GetFirstName] me levou para o lado e olhou para mim com uma expressão séria."
 spouse.2013.secret_about_me: "\n\n\"Tenho um segredo para confessar\", disse. Quando ele se inclina e sussurra em meu ouvido, meus olhos se arregalam."
 spouse.2013.secret_about_spouse: "\n\n“Há algo que você precisa saber”, disse. Quando se inclina e sussurra em meu ouvido, meus olhos se arregalam."
 spouse.2013.secret_about_other: "\n\n«Tenho que te contar uma coisa», diz. «Algo sobre [owner_of_secret.GetTitledFirstName|l]». \nQuando se inclina e sussurra ao meu ouvido, meus olhos se arregalam."
 spouse.2013.a: "Verdade? Nunca teria imaginado!"
 spouse.2014.t: "Uma Ameaça?"
 spouse.2014.desc: "Há algo estranho no comportamento de [agent.GetTitledFirstName|l] com meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))] quando acha que ninguém [agent.GetHerHim] está olhando. Vejo como lança olhares de soslaio, perambula pelos corredores vazios e presta muita atenção a cada movimento de [spouse.GetFirstName].\n\nMe preocupa que esteja tramando algo."
 spouse.2014.a: "M [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('spouse'))] precisa ser alertado!"
 spouse.2014.reveal_tt: "Será avisado de que [spouse.GetTitledFirstName|l] de que [agent.GetTitledFirstName|l] está tramando algo."
 spouse.2014.b: "Provavelmente estou enganado."
 spouse.2015.t: "Uma Ameaça?"
 spouse.2015.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('first_spouse'))] veio até mim com um olhar preocupado. Baixando a voz, [first_spouse.GetFirstName] me falou do comportamento altamente suspeito que havia observado em [agent.GetTitledFirstName|l]. [first_spouse.GetFirstName] [agent.GetHerHim] o acusou diretamente de colaborar com forças conspiradoras!"
 spouse.2015.a: "Obrigado pelo aviso, meu/minha querid[first_spouse.Custom('ES_OA')] [first_spouse.Custom2('RelationToMe', SCOPE.sC('spouse'))]!"
 spouse.2015.b: "Será que posso realmente confiar em [first_spouse.GetFirstNameNoTooltip] neste assunto?"
 spouse.3001.t: "Miséria Conjugal"
 spouse.3001.desc.opening: "Como se eu já não tivesse problemas demais nas mãos, ainda tenho que lidar com meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))]!"
 spouse.3001.desc.fallback: "Sempre há coisas que não faço bem o suficiente, e uma nova reclamação todos os dias."
 spouse.3001.lazy: "Nunca está dispost[spouse.Custom('ES_OA')] a me dar uma mão. Quando estou mais ocupado, ela faz questão de cochilar e fofocar, e na maioria das vezes bem debaixo do meu nariz!"
 spouse.3001.wrathful: "Juro por [ROOT.Char.GetFaith.HighGodName] que seu mau gênio está me enlouquecendo. As birras, as brigas e o ressentimento constante… Minha paciência se esgota."
 spouse.3001.deceitful: "Ultimamente, descobri tantas mentiras. A maioria delas são coisas insignificantes, mas a dúvida me assalta. O que mais m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))] está escondendo...?"
 spouse.3001.paranoid: "[spouse.GetFirstName] continua me culpando por coisas que nunca fiz e isso põe à prova a minha paciência. Na verdade, estou tentado a ser culpado da próxima acusação…"
 spouse.3001.impatient: "\n\nSeu dever é me apoiar e me compreender, mas não tem paciência. Embora eu esteja sufocando sob o peso de minhas responsabilidades, [spouse.GetFirstName] só se preocupa com as promessas não cumpridas e a falta de atenção."
 spouse.3001.arrogant: "A [spouse.GetFirstName] me enfurecem minhas responsabilidades gravosas, mas não por preocupação com meu bem-estar. Não! Pretende que eu dê prioridade a [spouse.GetSheHe] antes que aos meus deveres para com meu [ROOT.Char.GetTitleAsNameNoTooltip|l]."
 spouse.3001.sadistic: "\n\nEstou lutando para dar às minhas numerosas responsabilidades a atenção que merecem e me sinto esgotad[ROOT.Char.Custom('ES_OA')]. No passado, pensei que encontraria apoio em [spouse.GetFirstName], mas já não sou tão tolp[ROOT.Char.Custom('ES_OA')]. Acho que, na verdade, [spouse.GetSheHe] desfruta do meu sofrimento!"
 spouse.3001.callous: "Depois de um dia longo e tedioso, anseio por compaixão e encorajamento. [spouse.GetFirstName] oferece apenas observações penetrantes e rejeição fria."
 spouse.3001.vengeful: "Admito que sou apenas uma[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] e tenho meus defeitos, mas [spouse.GetFirstName] é extremamente imperfeito! Ele/ela se lembra de cada erro que já cometi e, pior ainda, continua me punindo por eles!"
 spouse.3001.desc.end: "\n\nVocê pensaria que ela está fazendo o melhor para tornar minha vida um tormento sem fim!"
 spouse.3001.a: "Por que você me odeia tanto?!"
 spouse.3002.t: "Oportunidade para um Acerto de Contas"
 spouse.3002.desc: "Durante uma visita, parece que chamei a atenção de [told_of_character.GetTitledFirstName|l] mesmo que por pouco tempo. Este pode ser um momento oportuno para dizer a ele o que ele realmente deveria pensar sobre meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))], [spouse.GetFirstName]."
 spouse.3002.a: "Deixe-me contar algumas coisas, [told_of_character.GetFirstNameNoTooltip]."
 spouse.3002.a.great: "Histórias Convincentes"
 spouse.3002.a.great_tt: "#F [told_of_character.GetFirstNameNoTooltip] está espantad[told_of_character.Custom('ES_OA')]#!"
 spouse.3002.a.good: "Histórias Preocupantes"
 spouse.3002.a.good_tt: "#F [told_of_character.GetFirstNameNoTooltip] é influenciad por minhas palavras#!"
 spouse.3002.a.bad: "Palavras de Desonra"
 spouse.3002.a.bad_tt: "#F A [told_of_character.GetFirstNameNoTooltip] le parece insultante que hable así de mi [THIS.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))]#!"
 spouse.3002.b: "Não posso agir assim, pelas costas de meu [ROOT.Char.Custom2('RelationToMeShort' , SCOPE.sC('spouse') )]."
 spouse.3003.t: "Uma Conversa Preocupante"
 spouse.3003.opening: "Durante uma visita recente, passei um tempo conversando com [initial_spouse.GetTitledFirstName|l], [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('spouse'))] de [spouse.GetTitledFirstName|l]."
 spouse.3003.exceptional: "\n\nSempre tive [spouse.GetFirstName] em muito alta estima, mas o que [initial_spouse.Custom('ES_ElElla')] me contou me horrorizou profundamente!"
 spouse.3003.a: "Eu fui muito gentil, [spouse.GetFirstNameNoTooltip]!"
 spouse.3004.t: "Uma Conversa Preocupante"
 spouse.3004.opening: "Durante uma visita recente, [told_of_character.GetTitledFirstName|l] passou uma quantidade de tempo desconcertante ouvindo meu(a) não tão querido(a)[spouse.Custom('ES_OA')] [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('spouse'))] [initial_spouse.GetFirstName]."
 spouse.3004.exceptional: "\n\nMeus piores temores se confirmaram ao partirmos, quando [told_of_character.GetFirstName] se recusou até mesmo a olhar para mim antes de nos separarmos!"
 spouse.3004.a: "O que você contou?!"
 spouse.3005.t: "Um Bom Ouvinte"
 spouse.3005.exceptional: "O que eu disse sobre minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))] causou claramente uma impressão. Seus olhos se arregalaram e ele/ela murmurou incrédulo/incrédula. \"Não pode ser…\"."
 spouse.3005.a: "Oh, é verdade. Tudo isso."
 spouse.3006.t: "Uma Conversa Preocupante"
 spouse.3006.good: "\n\nEu tinha uma opinião bastante elevada de [spouse.GetFirstName] sobre ele/ela me contou pinta [initial_spouse.Custom('ES_ElElla')] como uma decepção."
 spouse.3006.a: "Tem sido gentil demais, [spouse.GetFirstName]."
 spouse.3007.t: "Uma Conversa Preocupante"
 spouse.3007.good: "\n\nEu tinha motivos para ficar preocupad, pois ao partir, [told_of_character.GetFirstName] apenas balançou a cabeça para mim."
 spouse.3007.a: "O que você disse?"
 spouse.3008.t: "Um Bom Ouvinte"
 spouse.3008.good: "Devo ter causado uma boa impressão em [told_of_character.GetFirstName] com o que contei sobre meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))] porque, quando foi hora de ir embora, ele/ela apenas balançou a cabeça para [spouse.GetFirstName]."
 spouse.3008.a: "Não deveria me surpreender o quanto isso me agrada."
 spouse.3009.t: "Uma Surpresa Positiva"
 spouse.3009.bad: "\n\nTenho mantido [spouse.GetFirstName] em muito alta estima, e o que [initial_spouse.Custom('ES_ElElla')] me contou deixa claro que eu estava certo em fazê-lo!"
 spouse.3009.a: "Um[spouse.Custom('ES_XA')] [spouse.GetWomanMan] dign[spouse.Custom('ES_OA')] do meu respeito."
 spouse.3010.t: "Uma Surpresa Positiva"
 spouse.3010.bad: "\n\nNão tinha de que me preocupar, pois [told_of_character.GetFirstName] me contou mais tarde que [initial_spouse.GetFirstName] lhe fez ver aspectos meus que antes não tinha apreciado."
 spouse.3010.a: "M [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('spouse'))] falou bem de mim? Sério?"
 spouse.3011.t: "Um Terrível Mal-entendido"
 spouse.3011.bad: "Por mais que eu tentasse falar mal de [spouse.GetFirstName] , [told_of_character.GetFirstName] achou que [spouse.Custom('ES_LoLa')] estava elogiando! Agora parece que estão se dando melhor do que nunca."
 spouse.3011.a: "O que eu fiz?"
 spouse.3012.t: "Uma Ameaça..."
 spouse.3012.opening: "Apesar de quão inútil é, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))] [spouse.GetFirstName] parece muito à vontade com a vida em minha [ROOT.Char.Custom('GetCourt')|l]."
 spouse.3012.agent_suspicious: "\n\nAo compartilhar com ele o comportamento suspeito que vi de [agent.GetTitledFirstName|l]isso deve deixá-lo um pouco menos confortável[spouse.Custom('ES_OA')]."
 spouse.3012.agent_probably_innocent: "\n\nSe eu afirmar que observei um comportamento muito suspeito em [agent.GetTitledFirstName|l], isso já basta para deixá-lo(a) um pouco menos à vontade[spouse.Custom('ES_OA')] ."
 spouse.3012.a: "[spouse.GetFirstNameNoTooltip] deve ser informado desta \"ameaça\"!"
 spouse.3012.false_reveal_tt: "\"Vou avisar\" [spouse.GetFirstNameNoTooltip] sobre [agent.GetFirstNameNoTooltip]."
 spouse.3012.b: "Eu nem vou fingir em ajudar m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))]."
 spouse.3013.t: "Uma Ameaça?"
 spouse.3013.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('initial_spouse'))] veio até mim com uma expressão preocupada. Diminuindo a voz, me falou do comportamento muito suspeito que havia observado em [agent.GetTitledFirstName|l]. [initial_spouse.GetFirstName] [agent.GetHerHim] acusou diretamente de estar em conluio com forças conspiradoras!"
 spouse.3013.a: "Posso realmente confiar em [initial_spouse.GetFirstNameNoTooltip] para isso?"
