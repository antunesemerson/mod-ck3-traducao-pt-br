l_spanish:
 # Decision Menu Localization
 pledge_loyalty_to_liege_decision: "Jurar lealdade a [GetPlayer.GetLiege.Custom('ES_AlAla')] [GetPlayer.GetLiege.GetTitleTierName|l]"
 pledge_loyalty_to_liege_decision_desc: "Devo jurar lealdade formal e publicamente [GetPlayer.GetLiege.Custom('ES_AlAla')] [GetPlayer.GetLiege.GetTitleTierName|l] à corte. Não fazê-lo seria considerado um insulto e um desafio à sua autoridade."
 pledge_loyalty_to_liege_decision_tooltip: "#V Jurar lealtad#! formalmente ao seu [liege|lE] em sua [court|lE]"
 pledge_loyalty_to_liege_decision_effects: "Você viaja para a corte de [THIS.Char.GetLiege.Custom('ES_DelDela')] [THIS.Char.GetLiege.GetTitledFirstName|l] para se prostrar formalmente perante [THIS.Char.GetLiege.GetSheHe]"
 pledge_loyalty_to_liege_decision_confirm: "$pledge_loyalty_to_liege_decision$"
 pledge_loyalty_to_liege_decision_second_tooltip: "$DESC$\n $pledge_loyalty_to_liege_grace_tt$"
 pledge_loyalty_to_liege_grace_tt: "#weak Você só pode #V jurar lealtad#! ao mesmo suserano uma vez#!"
 pledge_loyalty_to_liege_gift_warning_effect: "#weak Os presentes aumentam as recompensas por #V juramento de lealtad#!#!\n$pledge_loyalty_to_liege_grace_tt$"
 pledge_loyalty_to_liege_grace_valid_tt: "Não jurou lealdade [THIS.Char.GetLiege.Custom('ES_AlAla')] [THIS.Char.GetLiege.GetTitledFirstName|l] antes"
 pledge_loyalty_to_liege_DECISION_NEXT_STEP_BUTTON: "Escolher um presente"
 pledge_loyalty_to_liege_available_adult_tt: "É um adulto disponível"
 pledge_loyalty_to_liege_available_liege_tt: "[ROOT.Char.GetLiege.Custom('ES_ElLa')|U] [ROOT.Char.GetLiege.GetTitledFirstName|l] é um[ROOT.Char.GetLiege.Custom('ES_XA')] adulto[ROOT.Char.GetLiege.Custom('ES_OA')] disponível"
 # Submission
 pledge_loyalty_to_liege_decision_option_submission: "Demonstrar submissão\n#low No dar nada#!"
 pledge_loyalty_to_liege_submission_desc: "[ROOT.Char.GetLiege.Custom('ES_ElLa')|U] [ROOT.Char.GetLiege.GetTitledFirstName|l] receberá apenas uma demonstração da sua submissão"
 pledge_loyalty_to_liege_submission_tooltip: "$pledge_loyalty_to_liege_decision_second_tooltip$"
 # Gold
 pledge_loyalty_to_liege_decision_option_gold: "… e conceder presentes\n#low Dar [gold|lE]#!"
 pledge_loyalty_to_liege_gold_desc: "[ROOT.Char.GetLiege.Custom('ES_ElLa')|U] [ROOT.Char.GetLiege.GetTitledFirstName|l] receberá um presente de [gold|lE] da sua parte"
 pledge_loyalty_to_liege_gold_tooltip: "$pledge_loyalty_to_liege_decision_second_tooltip$"
 pledge_loyalty_to_liege_decision_effects_gold: "Seu [liege|lE] receberá seu presente de [gold|lE]"
 pledge_loyalty_to_liege_gold_tt: "#X Você não possui [gold|lE] suficiente#!"
 # Hook
 pledge_loyalty_to_liege_decision_option_hook: "… e prometer favores\n#low Dar un [hook|lE]#!"
 pledge_loyalty_to_liege_hook_desc: "[ROOT.Char.GetLiege.Custom('ES_ElLa')|U] [ROOT.Char.GetLiege.GetTitledFirstName|l] receberá uma [hook|lE] fraco sobre você"
 pledge_loyalty_to_liege_hook_tooltip: "$pledge_loyalty_to_liege_decision_second_tooltip$"
 pledge_loyalty_to_liege_decision_effects_hook: "Seu [liege|lE] receberá um [hook|lE] forte sobre você"
 pledge_loyalty_to_liege_hook_tt: "#X Seu [liege|lE] já possui um [hook|lE] sobre você#!"
 # Contract
 pledge_loyalty_to_liege_decision_option_contract: "…e aumentar as obrigações\n#low Dar obligaciones del [vassal_contract|lE]#!"
 pledge_loyalty_to_liege_contract_desc: "[ROOT.Char.GetLiege.Custom('ES_ElLa')|U] [ROOT.Char.GetLiege.GetTitledFirstName|l] receberá mais impostos ou levantes por [vassal_contract|lE]"
 pledge_loyalty_to_liege_contract_tooltip: "$pledge_loyalty_to_liege_decision_second_tooltip$"
 pledge_loyalty_to_liege_decision_effects_contract_gold: "Seu [liege|lE] receberá mais [taxes|lE] de sua parte"
 pledge_loyalty_to_liege_decision_effects_contract_levies: "Seu [liege|lE] receberá mais [levies|lE] de sua parte"
 pledge_loyalty_to_liege_contract_modifiable_tt: "#X Tu [vassal_contract|lE] ha cambiado hace muy poco#!"
 pledge_loyalty_to_liege_contract_increasable_tt: "#X Seus [taxes|lE] e [levies|lE] não podem ser aumentados#!"
 pledge_loyalty_to_liege_costs_refunded: "$pledge_loyalty_to_liege_decision$ custos reembolsados"
 pledge_loyalty_to_liege_header: "Jurar lealdade:"
 # Activity Start: Liege decides whether or not to hear petition
 pledge_loyalty_to_liege.0001.opening: "[pledge_loyalty_to_liege_vassal.Custom2('AppropriateGreetingPositive', ROOT.Char )]"
 pledge_loyalty_to_liege.0001.desc: "Cheguei a [pledge_loyalty_to_liege_scope.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] para prestar homenagem a vós, glorios[pledge_loyalty_to_liege_scope.Custom('ES_OA')] [pledge_loyalty_to_liege_scope.GetTitleAsNameNoTooltip|l], como prova de minha lealdade. \n\n"
 pledge_loyalty_to_liege.0001.desc.submission: "Espero que minha promessa de submissão por si só seja prova suficiente da minha honra."
 pledge_loyalty_to_liege.0001.desc.gold: "Trago-vos ricos presentes dignos de Vossa Majestade, como prova da minha boa vontade e servidão."
 pledge_loyalty_to_liege.0001.desc.hook: "Tendes a minha palavra de que farei tudo o que desejardes de mim, minha [pledge_loyalty_to_liege_scope.GetLadyLord]."
 pledge_loyalty_to_liege.0001.desc.contract: "Para marcar seu domínio e minha lealdade a você, comprometo-me com maiores obrigações como vassalo[GetPlayer.Custom('ES_OA')] seu[GetPlayer.Custom('ES_OA')]."
 pledge_loyalty_to_liege.0001.a: "Forneça os favores habituais em resposta."
 pledge_loyalty_to_liege.0001.b: "Não dê nada em troca."
 pledge_loyalty_to_liege.0001.c: "Superar seus artigos com presentes mais luxuosos em troca."
 pledge_loyalty_to_liege.0001.c.insulted: "#EMP ¡[pledge_loyalty_to_liege_vassal.GetShortUIName] lo [Select_CString(pledge_loyalty_to_liege_scope.IsLocalPlayer, 'considerarás', 'considerará')] un insulto!#!"
 pledge_loyalty_to_liege.0001.c.honored: "#EMP [pledge_loyalty_to_liege_vassal.GetShortUIName] lo [Select_CString(pledge_loyalty_to_liege_scope.IsLocalPlayer, 'considerarás', 'considerará')] un honor#!"
 # Liege Event: Liege receives homage from vassal
 pledge_loyalty_to_liege.0101.t: "$pledge_loyalty_to_liege_header$ ajoelhar-se"
 pledge_loyalty_to_liege.0101.desc: "Aguardo pacientemente em meu trono a chegada [pledge_loyalty_to_liege_vassal.Custom('ES_DelDela')] [pledge_loyalty_to_liege_vassal.GetTitledFirstName|l], que logo é anunciado e conduzido até mim. \n\n"
 pledge_loyalty_to_liege.0101.desc.submission: "Ajoelha-se em sinal de deferência, não oferecendo nada além de seu juramento de servir fielmente como vassal[pledge_loyalty_to_liege_vassal.Custom('ES_OA')] de meu [pledge_loyalty_to_liege_scope.GetPrimaryTitle.GetTierAsNameNoTooltip|l].\n\n"
 pledge_loyalty_to_liege.0101.desc.gold: "Se ajoelha em sinal de deferência, enquanto os atendentes trazem seus presentes em moedas e objetos preciosos. O juramento é feito, e os escribas registram suas promessas de servir a meu [pledge_loyalty_to_liege_scope.GetPrimaryTitle.GetNameNoTooltip|l].\n\n"
 pledge_loyalty_to_liege.0101.desc.hook: "Se ajoelha em sinal de deferência e, entre outros juramentos de servir ao meu [pledge_loyalty_to_liege_scope.GetPrimaryTitle.GetNameNoTooltip|l] , coloca-se à minha disposição e em minha dívida.\n\n"
 pledge_loyalty_to_liege.0101.desc.contract: "Ajoelha-se em sinal de deferência e, entre outros de seus juramentos de servir ao meu [pledge_loyalty_to_liege_scope.GetPrimaryTitle.GetNameNoTooltip|l] , oferece-me maiores contribuições como senhor[pledge_loyalty_to_liege_vassal.Custom('ES_XA')] vassal[pledge_loyalty_to_liege_vassal.Custom('ES_OA')] do meu [pledge_loyalty_to_liege_scope.GetPrimaryTitle.GetTierAsNameNoTooltip|l].\n\n"
 pledge_loyalty_to_liege.0101.desc.success: "Por fim, peço [pledge_loyalty_to_liege_vassal.Custom('ES_AlAla')] [pledge_loyalty_to_liege_vassal.GetTitledFirstNameNoTooltip|l] que se levante, confirmando minha satisfação e seus direitos às terras que governa em meu nome."
 pledge_loyalty_to_liege.0101.smooth.submission: ""Sirvam-me bem, [pledge_loyalty_to_liege_vassal.GetTitledFirstNameNoTooltip|l]"."
 pledge_loyalty_to_liege.0101.smooth.gold: ""Aceito seus generosos presentes, [pledge_loyalty_to_liege_vassal.GetTitledFirstNameNoTooltip|l]"."
 pledge_loyalty_to_liege.0101.smooth.hook: ""Fico feliz em saber que posso contar com você, [pledge_loyalty_to_liege_vassal.GetTitledFirstNameNoTooltip|l]"."
 pledge_loyalty_to_liege.0101.smooth.contract: ""Seus serviços são inestimáveis, [pledge_loyalty_to_liege_vassal.GetTitledFirstNameNoTooltip|l]"."
 # Activity End: Vassal learns that liege refuses to hear petition
 pledge_loyalty_to_liege.0009.opening: "[pledge_loyalty_to_liege_scope.Custom2('AppropriateGreeting', ROOT.Char )]"
 pledge_loyalty_to_liege.0009.desc: "Não me engana essa sua encenação [pledge_loyalty_to_liege_vassal.Custom2('InsultAdjective', SCOPE.sC('pledge_loyalty_to_liege_scope'))]; uma promessa de homenagem da sua parte não significaria nada para mim."
 pledge_loyalty_to_liege.0009.a: "É ultrajante!"
 # Vassal Event: Vassal hears how it went
 pledge_loyalty_to_liege.0201.t: "$pledge_loyalty_to_liege_header$ ajoelhar-se"
 pledge_loyalty_to_liege.0201.desc: "Alguns servos me conduzem ao grande salão [pledge_loyalty_to_liege_scope.Custom('ES_DelDela')] [pledge_loyalty_to_liege_scope.GetTitledFirstNameRegnal|l] de [pledge_loyalty_to_liege_scope.GetCapitalLocation.GetNameNoTooltip], onde [pledge_loyalty_to_liege_scope.GetSheHe] está sentado no trono, à espera de ouvir meu juramento.\n\n"
 pledge_loyalty_to_liege.0201.desc.success: "Ajoelho-me aos pés do meu [pledge_loyalty_to_liege_scope.GetLadyLord] e recito os muitos juramentos de homenagem, enquanto seus escribas registram o acontecimento.\n\n"
 pledge_loyalty_to_liege.0201.desc.submission: "Assim termina a cerimônia. Não tenho nada a oferecer ao meu [pledge_loyalty_to_liege_scope.GetTitleAsNameNoTooltip|l], exceto minha promessa de servir fielmente como vassalo[ROOT.Char.Custom('ES_OA')] de seu [pledge_loyalty_to_liege_scope.GetPrimaryTitle.GetTierAsNameNoTooltip|l].\n\n"
 pledge_loyalty_to_liege.0201.desc.gold: "Meus criados entram em seguida e apresentam meus ricos presentes [pledge_loyalty_to_liege_scope.Custom('ES_AlAla')] [pledge_loyalty_to_liege_scope.GetTitleAsNameNoTooltip|l] perante a corte reunida."
 pledge_loyalty_to_liege.0201.desc.gold.received_as_expected: "Como é costume, oferece alguns presentes em troca para consolidar nossa relação pelos tempos que virão.\n\n"
 pledge_loyalty_to_liege.0201.desc.gold.received_more: "\n\nComo eu havia previsto, [pledge_loyalty_to_liege_scope.Custom('ES_ElLa')] [pledge_loyalty_to_liege_scope.GetTitleAsNameNoTooltip|l] me oferece presentes em retribuição, mas eles não param de chegar! Depois de muito tempo, descubro-me cercado[ROOT.Char.Custom('ES_OA')] de ainda mais riquezas do que lhe ofereci. Os cortesãos ao nosso redor tentam conter seu choque diante dessa quebra do protocolo adequado; incertos se [pledge_loyalty_to_liege_scope.Custom('ES_ElLa')] [pledge_loyalty_to_liege_scope.GetTitleAsNameNoTooltip|l] nos recompensa, nos suborna ou apenas está exibindo seu poder e riqueza.\n\n"
 pledge_loyalty_to_liege.0201.desc.gold.received_nothing: "\n\nAjoelho-me pelo que parece muito tempo antes de ficar claro que [pledge_loyalty_to_liege_scope.Custom('ES_ElLa')] [pledge_loyalty_to_liege_scope.GetTitleAsNameNoTooltip|l] não me oferecerá nenhum dos presentes tradicionais em retribuição. Os cortesãos ao nosso redor olham desconfortáveis, sem saber se os cofres do palácio estão se esvaziando ou se [pledge_loyalty_to_liege_scope.Custom('ES_ElLa')] [pledge_loyalty_to_liege_scope.GetTitleAsNameNoTooltip|l] quer fazer de mim um exemplo.\n\n"
 pledge_loyalty_to_liege.0201.desc.hook: "Então vem minha promessa de que [pledge_loyalty_to_liege_scope.GetFirstNameNoTooltip] pode contar comigo para qualquer favor em todos os seus empreendimentos, como fiel seguidor[ROOT.Char.Custom('ES_XA')] [pledge_loyalty_to_liege_scope.Custom('ES_DelDela')] [pledge_loyalty_to_liege_scope.GetTitleAsNameNoTooltip|l].\n\n"
 pledge_loyalty_to_liege.0201.desc.contract: "Então vem meu presente; afirmo que aumentarei minhas contribuições para seu [pledge_loyalty_to_liege_scope.GetPrimaryTitle.GetTierAsNameNoTooltip|l] como sinal de minha lealdade e para o bem da coroa.\n\n"
 pledge_loyalty_to_liege.0201.desc.brush_off: "Para minha surpresa, [pledge_loyalty_to_liege_scope.GetFirstNameNoTooltip] age como se nada tivesse acontecido e aceita meu tributo com elegância.\n\n"
 pledge_loyalty_to_liege.0201.desc.outro: "[pledge_loyalty_to_liege_scope.GetFirstNameNoTooltip] pede que eu me levante e confirma sua satisfação, junto com meus direitos às terras que governo em seu nome."
 pledge_loyalty_to_liege.0201.smooth.submission: "Salve, [pledge_loyalty_to_liege_scope.GetTitleAsNameNoTooltip|l]!"
 pledge_loyalty_to_liege.0201.smooth.gold: "O preço da lealdade…"
 pledge_loyalty_to_liege.0201.smooth.hook: "Esperemos que seja um pequeno favor…"
 pledge_loyalty_to_liege.0201.smooth.contract: "O fardo do serviço…"
 pledge_loyalty_to_liege.0201.faux_pas: "Um suserano justo, afinal."
 pledge_loyalty_to_liege.0201.insult: "Não deveria ter vindo."
 # Invalidated event
 pledge_loyalty_to_liege.0601.t: "$pledge_loyalty_to_liege_header$ invalidado"
 pledge_loyalty_to_liege.0601.desc.court: "Uma vez concluída minha coroação como [ROOT.Char.GetTitleAsNameNoTooltip|l], já não preciso mais fazer preparativos para prestar homenagem…"
 pledge_loyalty_to_liege.0601.desc.imprisoned_me: "$pledge_loyalty_to_liege.0601_shared_intro$ [ROOT.Char.GetImprisonedBy.Custom('ES_ElLa')] [ROOT.Char.GetImprisonedBy.GetTitledFirstName|l] me jogou na prisão."
 pledge_loyalty_to_liege.0601.desc.imprisoned: "$pledge_loyalty_to_liege.0601_shared_intro$ [ROOT.Char.GetImprisonedBy.Custom('ES_ElLa')] [ROOT.Char.GetImprisonedBy.GetTitledFirstName|l] me capturou."
 pledge_loyalty_to_liege.0601.desc.liege_dead_me: "$pledge_loyalty_to_liege.0601_shared_intro$ acabei matando [pledge_loyalty_to_liege_scopeCustom('ES_AlAla')] [pledge_loyalty_to_liege_scopeGetTitledFirstName|l]… \n\n"
 pledge_loyalty_to_liege.0601.desc.liege_dead: "$pledge_loyalty_to_liege.0601_shared_intro$ [pledge_loyalty_to_liege_scope.Custom('ES_ElLa')] [pledge_loyalty_to_liege_scope.GetTitledFirstName|l] [pledge_loyalty_to_liege_scope.GetDeathReasonHideKiller]... \n\n"
 pledge_loyalty_to_liege.0601.desc.liege_imprisoned_me: "$pledge_loyalty_to_liege.0601_shared_intro$ Acabei capturando [pledge_loyalty_to_liege_scopeCustom('ES_AlAla')] [pledge_loyalty_to_liege_scopeGetTitledFirstName|l]!"
 pledge_loyalty_to_liege.0601.desc.liege_imprisoned: "$pledge_loyalty_to_liege.0601_shared_intro$ [pledge_loyalty_to_liege_scopeCustom('ES_ElLa')] [pledge_loyalty_to_liege_scope.GetTitledFirstName|l] foi capturad[pledge_loyalty_to_liege_scope.Custom('ES_OA')] por [pledge_loyalty_to_liege_scope.GetImprisonedBy.Custom('ES_ElLa')] [pledge_loyalty_to_liege_scope.GetImprisonedBy.GetTitledFirstName|l]."
 pledge_loyalty_to_liege.0601.desc.new_liege: "Se eu for jurar lealdade, terei de fazê-lo ao meu nov[ROOT.Char.GetLiege.Custom('ES_OA')] senhor[ROOT.Char.GetLiege.Custom('ES_XA')], [ROOT.Char.GetLiege.GetTitledFirstNameRegnal|l]."
 pledge_loyalty_to_liege.0601_shared_intro: "Assim que eu estava dando os toques finais ao meu juramento de vassalagem,"
 pledge_loyalty_to_liege.0601.desc: "\n\nDesde logo, isso muda a situação."
 pledge_loyalty_to_liege.0601.a_court: "Avante, para coisas maiores."
 pledge_loyalty_to_liege.0601.a_prison: "Droga."
 pledge_loyalty_to_liege.0601.a_liege: "Que irritante…"
 pledge_loyalty_to_liege.0601.a: "Hora de repensar as coisas…"
 pledge_loyalty_to_liege_overdue.1000.t: "Vassalo desonroso"
 pledge_loyalty_to_liege_overdue.1000.desc.1: "Ao examinar os registros de todos que vieram jurar lealdade a mim como seu [ROOT.Char.GetTitleAsName|l], um nome permanece notavelmente ausente: [SCOPE.sC('pledge_loyalty_to_liege_offender').Custom('ES_ElLa')] [SCOPE.sC('pledge_loyalty_to_liege_offender').GetTitledFirstName|l] da dinastia [SCOPE.sC('pledge_loyalty_to_liege_offender').GetDynasty.GetName]. Já se passaram mais de [SCOPE.sC('pledge_loyalty_to_liege_offender').MakeScope.Var('pledge_loyalty_to_liege_found_overdue_years').GetValue|0] anos"
 pledge_loyalty_to_liege_overdue.1000.desc.new_liege: "desde que subi ao trono,"
 pledge_loyalty_to_liege_overdue.1000.desc.new_title: "desde que se tornou minha [Select_CString(pledge_loyalty_to_liege_offender.IsFemale, 'vassala', 'vassalo' )],"
 pledge_loyalty_to_liege_overdue.1000.desc.2: "e nem uma palavra nem tributo chegaram de suas terras.\n\nMeus cortesãos trocam olhares inquietos. Murmúrios se espalham pelos salões — será apenas um descuido, ou uma afronta deliberada ao meu direito de governar? O peso de uma rebeldia não dita paira no ar."
 pledge_loyalty_to_liege_overdue.1000.a: "Envie um emissário para exigir sua presença imediata."
 pledge_loyalty_to_liege_overdue.1000.a.tt: "[SCOPE.sC('pledge_loyalty_to_liege_offender').Custom('ES_ElLa')|U] [SCOPE.sC('pledge_loyalty_to_liege_offender').GetTitledFirstName|l] receberá uma carta lembrando-a de suas obrigações. Dependendo da resposta dela, você poderá [usurp|lE] seus [titles|lE]."
 pledge_loyalty_to_liege_overdue.1000.b: "Provavelmente está apenas ocupad[SCOPE.sC('pledge_loyalty_to_liege_offender').Custom('ES_OA')]."
 pledge_loyalty_to_liege_overdue.1000.b.tt: "[SCOPE.sC('pledge_loyalty_to_liege_offender').Custom('ES_AlAla')|U] [SCOPE.sC('pledge_loyalty_to_liege_offender').GetTitledFirstName|l] terão suas obrigações perdoadas."
 pledge_loyalty_to_liege_overdue.1010.t: "A honra chama"
 pledge_loyalty_to_liege_overdue.1010.desc.new_liege: "Com a ascensão [ROOT.Char.GetLiege.Custom('ES_DelDela')] [ROOT.Char.GetLiege.GetTitledFirstName|l] ao estimado trono de [ROOT.Char.GetLiege.GetPrimaryTitle.GetName],"
 pledge_loyalty_to_liege_overdue.1010.desc.new_title: "Como [ROOT.Char.GetTitleTierName|l] de [ROOT.Char.GetPrimaryTitle.GetName] e vassal[ROOT.Char.Custom('ES_OA')] de [ROOT.Char.GetLiege.GetPrimaryTitle.GetName],"
 pledge_loyalty_to_liege_overdue.1010.desc: "chegou a hora de eu partir em jornada e prestar meus respeitos, reafirmando minha lealdade e fidelidade.\n\nDeixar de fazê-lo em devido tempo pode ser considerado desonroso — ou pior, interpretado como uma declaração de intenções rebeldes."
 pledge_loyalty_to_liege_overdue.1010.a: "Embarque imediatamente e apresse-se!"
 pledge_loyalty_to_liege_overdue.1010.a.tt: "Abre a tela de [decision|v] #V Jurar lealtad [GetPlayer.GetLiege.Custom('ES_AlAla')] [GetPlayer.GetLiege.GetTitleTierName|l]#!"
 pledge_loyalty_to_liege_overdue.1010.b: "[ROOT.Char.GetLiege.Custom('ES_ElLa')|U] [ROOT.Char.GetLiege.GetTitleAsName|l] vai ter que esperar."
 pledge_loyalty_to_liege_overdue.1010.b.tt: "Se você demorar demais, poderão ser [Concept('revoked', 'revocar')|E] seus [titles|lE]!"
 pledge_loyalty_to_liege_overdue.1020.t: "[spurned_liege.Custom2('AppropriateGreetingNegative', ROOT.Char)]"
 pledge_loyalty_to_liege_overdue.1020.desc: "Não me passou despercebida a sua negligência em se apresentar à minha corte. A honra o obriga a corrigir prontamente essa omissão.\n\nNegligenciar o seu dever pode me obrigar a agir para preservar a harmonia e a ordem em meu reino."
 pledge_loyalty_to_liege_overdue.1020.a: "Embarquem imediatamente e se apressem!"
 pledge_loyalty_to_liege_overdue.1020.a.tt: "Abre a tela da [decision|v] #V Jurar lealtad [GetPlayer.GetLiege.Custom('ES_AlAla')] [GetPlayer.GetLiege.GetTitleTierName|l]#!\n$pledge_loyalty_to_liege_overdue.1020.b.tt$"
 pledge_loyalty_to_liege_overdue.1020.b: "Ameaças tão efêmeras quanto as flores de cerejeira ao vento."
 pledge_loyalty_to_liege_overdue.1020.b.tt: "Se você protelar demais,[Concept('revoked', 'revocar')|E] seus [titles|lE]!"
 pledge_loyalty_to_liege_overdue.1020.c: "Danifique o selo e devolva a carta."
 pledge_loyalty_to_liege_overdue.1020.c.tt: "![SCOPE.sC('spurned_liege').GetName] pode tentar [Concept('revoke', 'revocar' )|E] seus [titles|lE]!"
 pledge_loyalty_to_liege_overdue.1030.t: "Perdoar e esquecer"
