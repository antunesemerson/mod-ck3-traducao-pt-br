l_spanish:
 #Forming Outremer, by Flavio Verna
 middle_east_decisions.0001.t: "O Império do Céu"
 middle_east_decisions.0001.desc: "Desde a ascensão de Maomé, a religião muçulmana havia sido uma força a ser considerada no Oriente e uma ameaça iminente para os fiéis de Cristo. Mas, graças aos meus esforços para proteger a Terra Santa, isso já não é mais o caso. \n\nExpulsei os infiéis das costas do Mediterrâneo e os persegui até os abrasadores desertos da Arábia. Plantei a Santa Cruz de Nosso Senhor de mar a mar e forjei um verdadeiro Império dos Céus sobre o crescente quebrado do falso profeta."
 middle_east_decisions.0001.a: "Que Deus tenha misericórdia deles, pois eu não tenho."
 middle_east_decisions.0002.desc.christians: "Desde o surgimento de Maomé, a religião muçulmana foi uma força a ser considerada em todo o Oriente e uma ameaça iminente para os seguidores de Cristo. Mas, graças aos esforços de [scoped_ruler.GetTitledFirstName|l] para proteger a Terra Santa, isso já não é mais assim. \n\n Com a bênção de [scoped_ruler.GetFaith.HighGodName], [scoped_ruler.GetFirstName] expulsou os infiéis das costas do Mediterrâneo e os perseguiu até os desertos escaldantes da Arábia. [scoped_ruler.Custom('ES_ElElla')] ergueu a Santa Cruz de Nosso Senhor de mar a mar e forjou um verdadeiro Império dos Céus sobre o crescente quebrado do falso profeta."
 middle_east_decisions.0002.desc.muslims: "As hordas bárbaras [scoped_ruler.Custom('ES_DelDela')] cruzad[scoped_ruler.Custom('ES_OA')] [scoped_ruler.GetTitledFirstName|l] trouxeram ruína inimaginável aos seguidores de [ROOT.Char.GetFaith.HighGodName]!\n\nEsses vis idólatras ocuparam todos os lugares sagrados de culto da nossa fé. Até mesmo a santa cidade de Meca está agora nas garras desses porcos blasfemos. Se os verdadeiros seguidores do Profeta não retomarem a Arábia logo, isto poderá ser o começo do fim para o islamismo."
 middle_east_decisions.0002.desc.others: "Desde a ascensão de Maomé, a religião muçulmana tem sido uma força a ser reconhecida no Oriente. Mas, graças aos esforços de [scoped_ruler.GetTitledFirstName|l] para proteger a Terra Santa, isso já não é mais o caso. \n\nEste [scoped_ruler.GetTitleTierName] [scoped_ruler.GetFaith.GetAdjective] expulsou os seguidores de Alá das costas do Mediterrâneo e os perseguiu até os abrasadores desertos da Arábia. [scoped_ruler.Custom('ES_ElElla')] plantou a Santa Cruz de mar a mar e forjou o que chama de um Império dos Céus sobre o crescente quebrado do Profeta."
 middle_east_decisions.0002.a: "Louvado seja Nosso Senhor!"
 middle_east_decisions.0002.b: "Mil maldições sobre a família!"
 middle_east_decisions.0002.c: "Entendi..."
 #Restoring the Sunni Caliphate, by Flavio Verna
 middle_east_decisions.0003.t: "Um Novo Califado"
 middle_east_decisions.0003.desc: "Desde a ocupação infiel da Terra Santa, os verdadeiros seguidores do Profeta foram dispersos aos quatro ventos, sem liderança nem vontade de retomar a luta sagrada.\n\nIsso acaba hoje. Pela misericórdia [reformer.GetFaith.HighGodNamePossessive], recuperei Meca e Medina e detive a onda de infiéis que assolava a Arábia. Com o apoio de vários eruditos respeitados do Livro, fui reconhecido como o nov[reformer.Custom('ES_OA')] califa de [reformer.GetFaith.GetName], e estou pront[ROOT.Char.Custom('ES_OA')] para liderar meus seguidores contra os ímpios idólatras que ainda profanam nossa pátria."
 middle_east_decisions.0003.a: "Allahu Akbar!"
 middle_east_decisions.0004.desc.ashari: "Desde a ocupação infiel da Terra Santa, os verdadeiros seguidores do Profeta foram dispersos aos quatro ventos, sem liderança ou vontade de retomar a guerra santa.\n\nIsso termina hoje. Pela misericórdia [reformer.GetFaith.HighGodNamePossessive], [reformer.GetFirstName] recuperou Meca e Medina e deteve a maré de infiéis que invadia a Arábia. Com o apoio de vários eruditos respeitados do Livro, [reformer.Custom('ES_LoLa')] o reconheceram como nov[reformer.Custom('ES_OA')] califa de [reformer.GetFaith.GetName] e está pront[reformer.Custom('ES_OA')] para liderar seus seguidores contra os ímpios idólatras que ainda profanam nossa pátria."
 middle_east_decisions.0004.desc.other: "Desde a ocupação infiel da Terra Santa, os seguidores do [reformer.GetFaith.GetName] haviam sido dispersados aos quatro ventos.\n\nNo entanto, parece que finalmente conseguiram se reunir novamente sob a sábia liderança de [reformer.GetFirstName]. Depois de reconquistar as cidades sagradas de Meca e Medina e legitimar sua reivindicação como nov[reformer.Custom('ES_OA')] califa, [reformer.GetFirstName] está preparad[reformer.Custom('ES_OA')] contra os infiéis."
 middle_east_decisions.0004.a: "Allahu Akbar!"
 middle_east_decisions.0004.b: "Melhor o diabo que você conhece, suponho..."
 #Creating Israel, by Flavio Verna
 middle_east_decisions.0005.t: "A Terra Prometida"
 middle_east_decisions.0005.desc: "Com Jerusalém e a Terra Prometida sob controle judaico, chegou a hora de criar um novo Reino Unido chamado Israel, como o grande reino dos tempos antigos sob David e Salomão.\n\nO povo judeu, que tanto sofreu, finalmente está no controle de seu próprio destino novamente. Não mais a Terra Santa será dilacerada pelos senhores cristãos e muçulmanos em guerra. Que este novo reino inaugure uma era de paz e prosperidade para a região!"
 middle_east_decisions.0005.a: "Viva Israel!"
 middle_east_decisions.0006.desc.others: "Após ter trazido Jerusalém de volta ao controle judaico, [scoped_ruler.GetTitledFirstName|l] decidiu se declarar [scoped_ruler.GetTitleTierName] de um Israel restaurado.\n\nO longo exílio do povo judeu pode finalmente ter chegado ao fim, já que muitas de suas comunidades decidem retornar à Terra Prometida."
 middle_east_decisions.0006.a: "Chegou a hora!"
 middle_east_decisions.0006.b: "Entendi..."
 #Restore Jewish High Priesthood, by Flavio Verna
 middle_east_decisions.0007.t: "O Novo Sacerdócio [scoped_ruler.GetFaith.GetAdjective]"
 middle_east_decisions.0007.desc.intro: "Não tem havido um Kohen - um Sumo Sacerdote do Judaísmo - desde que os romanos destruíram o Segundo Templo há cerca de mil anos. Finalmente, esta posição foi preenchida e o Sacerdócio reconstituído.\n\n"
 middle_east_decisions.0007.desc.me: "Como líder influente e piedoso do povo judeu, a classe sacerdotal decidiu, é claro, que sou [Select_CString( ROOT.Char.IsFemale, 'a melhor candidata', 'o melhor candidato' )] para guiar a religião judaica rumo a uma nova era. Embora eu careça do sangue tradicional de Aarão necessário para ser Kohen Gadol, sacerdotes e leigos igualmente celebram minha ordenação como chefe do Sumo Sacerdócio."
 middle_east_decisions.0007.desc.not_me: "Assim como os sacerdotes judeus dos tempos antigos, o Kohen Gadol tradicionalmente deveria ser descendente de Arão, o irmão mais velho de Moisés. Devido à falta de candidatos adequados, esse requisito foi dispensado, mas o novo Sumo Sacerdote ainda desfruta do respeito das comunidades religiosas [ROOT.Char.GetFaith.GetAdjective]."
 middle_east_decisions.0007.a: "Que a liderança nos inspire!"
 middle_east_decisions.0007.a.me: "Minha liderança vai nos inspirar a todos!"
 middle_east_decisions.0008.desc.others: "Após o restabelecimento de uma presença judaica significativa em Jerusalém, [scoped_ruler.GetTitledFirstName|l] promoveu a fundação de um novo Sumo Sacerdócio [new_priest.GetFaith.GetAdjective] para que guie os israelitas.\n\nLiderada por [new_priest.GetTitledFirstName|l], espera-se que esta congregação traga unidade e orientação para as comunidades em crescimento de Israel."
 middle_east_decisions.0008.a: "Que sua liderança nos inspire!"
 middle_east_decisions.0008.b: "Entendi..."
 #Restore Zoroastrian High Priesthood, by Flavio Verna
 middle_east_decisions.0009.t: "O Novo Sacerdócio [scoped_ruler.GetFaith.GetAdjective]"
 middle_east_decisions.0009.desc: "Após o interlúdio de exílio e perseguição após as conquistas árabes, o Zoroastrismo foi aceito pelo povo da Pérsia como o único caminho verdadeiro para a retidão. [scoped_ruler.GetTitledFirstName|l] ordenou a instituição do cargo do [new_priest.GetTitleTierName], um Sacerdote dos Sacerdotes para governar uma hierarquia clerical restaurada.\n\nO [new_priest.GetTitleTierName] servirá como a mais alta autoridade religiosa no mundo [scoped_ruler.GetFaith.GetAdjective], com poderes que vão desde a bênção de futuras expedições militares até a concessão de divórcios a casais casados."
 middle_east_decisions.0009.a: "A chama eterna queima novamente!"
 middle_east_decisions.0010.desc.muslims: "Os malditos seguidores de [scoped_ruler.GetFaith.HighGodName] reconquistaram terras e influência suficientes para restabelecer um sacerdócio blasfemo sob a proteção de [scoped_ruler.GetTitledFirstName|l].\n\nSe não forem parados em breve, esses pagãos adoradores de demônios podem mudar o rumo da expansão islâmica na Pérsia, poluindo a mente de seus súditos desprevenidos com mentiras e perversões."
 middle_east_decisions.0010.desc.others: "Os estranhos seguidores adoradores do fogo de [scoped_ruler.GetFaith.HighGodName] reconquistaram territórios ancestrais suficientes na Pérsia para restabelecer um Sacerdócio funcional.\n\nSe não forem parados em breve, eles podem mudar o rumo da expansão islâmica e restaurar a Ásia sob a proteção de seus antigos deuses."
 middle_east_decisions.0010.a: "Glória a [scoped_ruler.GetFaith.HighGodName]!"
 middle_east_decisions.0010.b: "Seus demônios não os protegerão do poder de [ROOT.Char.GetFaith.HighGodName]!"
 middle_east_decisions.0010.c: "Adoradores do fogo?"
 #The Saoyshant appears, by Flavio Verna
 middle_east_decisions.0011.t: "O Escolhido de Zoroastro"
 middle_east_decisions.0011.desc: "Desde que o Império sassânida sucumbiu às invasões árabes, a Pérsia tem sofrido sob o jugo dos governantes maometanos. Os últimos resquícios da antiga ordem zoroastriana recuaram para o norte, para as planícies da Ásia Central, mas agora, por fim, o domínio zoroastriano sobre a Pérsia foi restaurado.\n\nEsta recuperação milagrosa só pode ser atribuída à minha liderança brilhante, e muitos no clero proclamaram que sou o Saoshyant, salvador[ROOT.Char.Custom('ES_XA')] do mundo de que o próprio Zoroastro falou há milhares de anos. Depois de aceitar esse papel, agora sou reverenciado por zoroastristas de todo o mundo como um ícone sagrado."
 middle_east_decisions.0011.a: "Eu trarei benefícios a todos."
 all_held_counties: "Todos os Condados Infiéis"
 middle_east_decisions.0013.desc: "Desde que o Império sassânida sucumbiu às invasões árabes, a Pérsia tem sofrido sob o jugo dos governantes maometanos. Os últimos remanescentes da antiga ordem zoroastriana recuaram para o norte, para as planícies da Ásia Central, mas agora, enfim, o domínio zoroastriano sobre a Pérsia foi restaurado.\n\nEssa recuperação milagrosa só pode ser atribuída à brilhante liderança de [scoped_ruler.GetFirstName] e muitos no clero declararam que é o Saoshyant, salvador[ROOT.Char.Custom('ES_XA')] do mundo de quem o próprio Zoroastro falou há milhares de anos. Depois de assumir esse papel, agora os zoroastrianos de todo o mundo veneram [scoped_ruler.GetTitledFirstNameNoTooltip|l] como um ícone sagrado."
 middle_east_decisions.0013.desc.muslims: "Antes reduzidos a exilados habitantes do deserto, os sacerdotes do blasfemo Zoroastro, o maldito, ressurgiram de suas cinzas e reivindicaram o trono da Pérsia!\n\nAgora seu [scoped_ruler.GetTitleTierName], chei[scoped_ruler.Custom('ES_OA')] de orgulho enlouquecido, decidiu proclamar-se um[scoped_ruler.Custom('ES_XA')] deus[scoped_ruler.Custom('ES_XA')] vivente."
 middle_east_decisions.0013.desc.others: "Desde que o Império Sassânida sucumbiu às invasões árabes, os seguidores de Zoroastro têm fugido. Seu exílio chegou ao fim recentemente, pois os fiéis [scoped_ruler.GetFaith.GetAdjective] conseguiram restaurar seu antigo Império.\n\nSendo em grande parte responsável por essa reviravolta inesperada, seu [scoped_ruler.GetTitleTierName] decidiu proclamar-se Saoshyant, o salvador profetizado de sua fé."
 middle_east_decisions.0013.a: "Que nos beneficie a todos!"
 middle_east_decisions.0013.b: "Loucura e bruxaria!"
 middle_east_decisions.0013.c: "Entendi..."
 #Create Sultanate of Rum, by Flavio Verna
 middle_east_decisions.0014.t: "Uma Nova Roma"
 middle_east_decisions.0014.desc: "Com a conquista das ricas terras da Ásia Menor, acumulei poder suficiente para formar um novo Sultanato, um que certamente superará a grandeza de Roma em si.\n\nAinda há trabalho a ser feito, mas não tenho dúvidas de que os historiadores consagrarão este momento como um dos grandes passos na conquista da Europa pelos seguidores de [scoped_ruler.GetFaith.HighGodName]."
 middle_east_decisions.0014.a: "Que o Ocidente trema!"
 middle_east_decisions.0015.desc.liege: "Após uma série de vitórias na Anatólia, [scoped_ruler.GetTitledFirstName|l] decidiu se coroar [scoped_ruler.GetTitleTierName] de Rum, afirmando que já não me deve lealdade e que buscará lutar contra os infiéis como achar melhor."
 middle_east_decisions.0015.desc.romans: "[scoped_ruler.GetTitledFirstName], um[scoped_ruler.Custom('ES_XA')] líder[scoped_ruler.Custom('ES_OA')] selvagem, abriu caminho pela Anatólia e fundou um novo sultanato na região.\n\nComo se isso não fosse insulto suficiente, em uma desprezível demonstração de arrogância, decidiu reivindicar para si o título de [scoped_ruler.GetTitleTierName] de Roma."
 middle_east_decisions.0015.desc.others: "A rica província da Ásia Menor, antes um bastião do Cristianismo, agora está sob o domínio d [scoped_ruler.GetTitledFirstName|l], que formou um novo Sultanato na região."
 middle_east_decisions.0015.a: "Como se atreve!"
 middle_east_decisions.0015.b: "Entendi..."
 #Revive the Armenian Empire, by Ewan Cowhig Croft
 middle_east_decisions.1001.t: "Um Novo Águia Surge"
 middle_east_decisions.1001.desc: "Passaram-se séculos desde que a Armênia exerceu esse nível de domínio no Levante e no Cáucaso, com os impérios gêmeos do Oriente e do Ocidente nos batendo implacavelmente uma e outra vez. Às vezes, o Ocidente fala em Latim, às vezes em Grego, e às vezes o Oriente fala em Persa, às vezes em Árabe, mas sempre esses impérios lutam, e sempre nossas antigas terras parecem ser o campo de batalha.\n\nA partir de hoje, não mais. Eu recuperei os antigos territórios de Tigranes, o Grande, e a bandeira da Grande Armênia se ergue novamente!"
 middle_east_decisions.1001.a: "Eu irei para coisas ainda maiores!"
 middle_east_decisions.1001.b: "Não é menos uma conquista por ser repetitiva."
 middle_east_decisions.1002.desc: "Uma situação estranha vem se desenvolvendo nas montanhas do Cáucaso há algum tempo. Contra todas as probabilidades, [founder.GetFullNameNoTooltip] conseguiu esculpir um reino considerável, que se estende desde o Mar Cáspio no leste até as margens do Mediterrâneo no oeste. Embora imperfeito, isso recriou aproximadamente o antigo império de Tigranes, o Grande, uma circunstância que os arautos de [founder.GetFullNameNoTooltip] estão prontos para celebrar.\n\nA bandeira da Grande Armênia se ergue novamente, mas por quanto tempo?"
 middle_east_decisions.1002.a: "A dignidade imperial requer mais do que simples terras."
 middle_east_decisions.1002.b: "Desta vez, ninguém nos separará."
 middle_east_decisions.1002.c: "Tão insignificante quanto seu predecessor."
 #Found the Empire of Beth Nahrain, by Anna Johansson
 middle_east_major_decisions.1020.t: "Lar dos Rios"
 middle_east_major_decisions.1020.desc: "Seria possível unir os reinos ao redor dos rios Tigre e Eufrates sob um único estandarte? Um império tão vasto que os reis e rainhas do passado ficariam invejosos!"
 middle_east_major_decisions.1020.tt: "Espalhe e una a [culture|lE] $assyrian$"
 middle_east_major_decisions.1020.lack_nestorian: "Se você já é de [faith|lE] [GetFaithByKey('nestorian').GetAdjective], ganha a opção de [GetTrait('crusader_king').GetName( GetNullCharacter )|l]"
 middle_east_major_decisions.1020.promote_culture.tt: "A capacidade do meu [GetPlayer.GetCouncillorPosition( 'councillor_steward' ).GetPositionName|l] de [councillor_task|lE] $task_promote_culture|V$ se torna mais eficaz em [counties|lE] onde [GetModifier('promote_culture_beth_nahrain_modifier').GetNameWithTooltip|l] existe"
 promote_culture_beth_nahrain_modifier_custom_desc: "Cada condado dentro de Beth Nahrain sem a [culture|lE] $assyrian$"
 promote_culture_beth_nahrain_modifier: "Fluxo e Refluxo"
 promote_culture_beth_nahrain_modifier_desc: "A influência $assyrian$ agora é um aspecto aceito da vida nesta região, e seus habitantes estão mais propensos a adotar os costumes e valores $assyrian$."
 middle_east_major_decisions.1020.learning.desc: "Se você focar seu [empire|lE] em [learning|lE]"
 learning_beth_nahrain_house_modifier: "Conhecimento é Poder"
 learning_beth_nahrain_house_modifier_desc: "A conquista do Oriente Médio renovou a cultura siríaca, permitindo-lhes expandir sua sabedoria."
 middle_east_major_decisions.1020.martial.desc: "Se você focar seu [empire|lE] em [martial|lE]"
 martial_beth_nahrain_house_modifier: "Disciplina e Ordem"
 martial_beth_nahrain_house_modifier_desc: "A conquista do Oriente Médio renovou a cultura siríaca, devastando campos de batalha para expandir suas fronteiras."
 middle_east_major_decisions.1020.nestorian.desc: "Se você focar seu [empire|lE] na [faith|lE] [GetFaithByKey('nestorian').GetAdjective]"
 middle_east_major_decisions.1020.no_faith.desc: "Se você escolher se converter à [faith|lE] [GetFaithByKey('nestorian').GetAdjective]"
 completely_controls_jazira_mesopotamia_tt: "[completely_controls|lE] [GetTitleByKey('k_jazira').GetNameNoTier] e [GetTitleByKey('k_mesopotamia').GetNameNoTier]"
 has_titles_jazira_mesopotamia_tt: "Tem os [Concept('title', 'títulos')|E] de [GetTitleByKey('k_jazira').GetNameNoTier] e [GetTitleByKey('k_mesopotamia').GetNameNoTier]"
 has_title_and_completely_control_jerusalem_tt: "[Concept('completely_control', 'Controla')|E] e possui completamente [GetTitleByKey('k_jerusalem').GetName]"
 has_title_and_completely_control_syria_tt: "[Concept('completely_control', 'Controla')|E] e possui completamente [GetTitleByKey('k_syria').GetName]"
 found_empire_of_beth_nahrain_decision_confirm: "Que os rios fluam como um só!"
 middle_east_major_decisions.1020_fervor: "Fundação de Beth Nahrain"
 middle_east_decisions.1020.t: "O Império de Beth Nahrain"
 middle_east_decisions.1020.desc: "Assim como os rios correm sem cessar, também crescerá este império que agora se encontra diante de mim.\n\nA união destas terras resistirá ao teste do tempo; só preciso dar-lhes um pequeno empurrão na direção certa para que isso permaneça assim.\n\nPois agora devo escolher um caminho a seguir, para guiar meu povo através das ondas de incontáveis mudanças que virão."
 middle_east_decisions.1020.a: "A caneta é mais poderosa que a espada"
 middle_east_decisions.1020.b: "O campo de batalha chama"
 middle_east_decisions.1020.c: "Eu acredito na minha fé"
 middle_east_decisions.1020.d: "Vamos mostrar a eles a #EMP verdadeira#! fé!"
 beth_nahrain_crusader_desc: "Uma confluência, conectando um império como um só."
 #Dar al-Islam
 middle_east_decisions.1100.t: "Dar al-Islam"
 middle_east_decisions.1100.desc: "Desde o califado rashidun, o islã não esteve unido sob uma única bandeira. Guiado por um único propósito, uma visão. Um verdadeiro [Glossary( 'Dar al-Islam', 'DAR_AL_ISLAM_GLOSS' )].\n\nOs [GetReligionByKey('islam_religion').GetAdherentNamePluralNoTooltip] agora viajam das quatro regiões do mundo até [ROOT.Char.GetCapitalLocation.GetNameNoTooltip]. Peregrinos e príncipes, eruditos e soldados. De desertos distantes e portos lotados, de toda escola e seita, reúnem-se diante de mim... para baixar a cabeça, para prometer seus corações.\n\nSó o tempo dirá se esta unidade durará... ou se está condenada a se apagar na história mais uma vez. Por ora, as multidões conhecerão a paz do islã que tudo abrange."
 middle_east_decisions.1100.a: "Todo o mundo pertencerá à casa do Islã!"
 DAR_AL_ISLAM_GLOSS: "#bold Dar al-Islam#!, traduzido como a "casa do islã", é um termo que se refere às terras sob soberania muçulmana e que preside sobre súditos muçulmanos e não muçulmanos."
 middle_east_decisions.1101.intro: "O islam não tem sido uma força unificada desde o Califado Rashidun. Ainda assim, parece que [dar_al_islam_ruler.GetShortUIName] realizou o impossível e criou um verdadeiro [Glossary( 'Dar al-Islam', 'DAR_AL_ISLAM_GLOSS' )]."
 middle_east_decisions.1101.islam_desc: "[GetReligionByKey('islam_religion').GetAdherentNamePluralNoTooltip] de todo o mundo estão se reunindo sob seu estandarte. Trazendo a força, a segurança e a prosperidade que esse novo reinado está destinado a trazer."
 middle_east_decisions.1101.other_desc: "O tempo dirá como governará est[dar_al_islam_ruler.Custom('ES_EA')] nov[dar_al_islam_ruler.Custom('ES_OA')] [dar_al_islam_ruler.GetTitleAsNameNoTooltip|l]. É preciso parar e refletir; o que isso significará para o resto do mundo?"
 middle_east_decisions.1101.a: "Salve, [dar_al_islam_ruler.GetTitleAsNameNoTooltip|l]!"
 middle_east_decisions.1101.b: "Será que eu também deveria me unir a [dar_al_islam_ruler.GetSheHe]?"
 middle_east_decisions.1101.c: "Uma reviravolta extremamente alarmante nos acontecimentos."
 middle_east_decisions.1102.desc: "Isso significa que já não sou a autoridade religiosa do [ROOT.Char.GetFaith.GetName|l]. E, como qualquer outra alma [GetReligionByKey('islam_religion').GetAdjective], devo me submeter [dar_al_islam_ruler.Custom('ES_AlAla')] nov[dar_al_islam_ruler.Custom('ES_OA')] [dar_al_islam_ruler.GetTitleAsNameNoTooltip|l]."
 middle_east_decisions.1102.a: "O tempo dirá se é dign[dar_al_islam_ruler.Custom('ES_OA')]."
