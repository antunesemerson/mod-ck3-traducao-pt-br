l_spanish:
 #Commision Legend Book
 ce1_decision_events.0001.t: "Deixe por Escrito"
 ce1_decision_events.0001.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('chronicler'))] [chronicler.GetFirstName] me saúda com um sorriso satisfeito. Sua lâmpada de leitura quase ficou sem óleo.\n\n\"[ROOT.Char.Custom('FormOfAddressForLiege')|U]\", [chronicler.GetSheHe] diz, enquanto coloca um livro belamente ornamentado, \"garantimos o registro de cada pequena coisa, cada feito, cada batalha, cada aventura e cada romance.\"\n\n\"Tudo isso\", [chronicler.GetSheHe] continua, \"ficou registrado para os séculos vindouros.\""
 ce1_decision_events.0001.a: "Encantador!"
 legend_book: "[ROOT.Var('finished_legend_var').Legend.GetName]"
 legend_book_desc: "#EMP [ROOT.Var('finished_legend_var').Legend.GetChapterDescriptionByName('opening')]#!\n\n#EMP A lenda de [ROOT.Var('finished_legend_var').Legend.GetProtagonist.GetTitledFirstNameNoTooltip|l] culmina em uma aventura maravilhosa: seus grandes feitos de armas foram tais que maravilharam todos os reis, e muitos nobres e plebeus foram ao seu encontro, pois desejavam ver a lenda em carne e osso.#!\n\n#EMP [ROOT.Var('finished_legend_var').Legend.GetChapterDescriptionByName('conclusion')]#!"
