 hold_court_decision_confirm: "Ouvir Peticionários"
 hold_court_gain_grandeur_tooltip: "Você aumentará sua [court_grandeur|lE]"
 hold_court_gain_legitimacy_tooltip: "Você aumentará sua [legitimacy|lE]"
