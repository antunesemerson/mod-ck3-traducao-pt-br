 war_event.1901: "Seu [Concept( 'liege', Select_CString(attacker_winner.IsFemale, 'señora', 'señor'))|E] , [attacker_winner.GetUIName] , venceu a [war|lE] contra [defender_loser.GetUIName]!"
 war_event.1902: "Seu [Concept( 'liege', Select_CString(defender_loser.IsFemale, 'señora', 'señor'))|E] , [defender_loser.GetUIName] , perdeu a [war|lE] contra [attacker_winner.GetUIName]!"
 war_event.1903: "Seu [Concept( 'liege', Select_CString(attacker_white_peace.IsFemale, 'señora', 'señor'))|E] , [attacker_white_peace.GetUIName] assinou uma [white_peace|lE] com [defender_white_peace.GetUIName]."
 war_event.1904: "Seu [Concept( 'liege', Select_CString(defender_white_peace.IsFemale, 'señora', 'señor'))|E] , [defender_white_peace.GetUIName] assinou uma [white_peace|lE] com [attacker_white_peace.GetUIName]."
 war_event.1905: "Seu [Concept( 'liege', Select_CString(attacker_loser.IsFemale, 'señora', 'señor'))|E] , [attacker_loser.GetUIName] , perdeu a guerra contra [defender_winner.GetUIName]!"
 war_event.1906: "Seu [Concept( 'liege', Select_CString(defender_winner.IsFemale, 'señora', 'señor'))|E] , [defender_winner.GetUIName] , venceu a guerra contra [attacker_loser.GetUIName]!"
 war_event.notification_liege_win.t: "Suserano Venceu a Guerra"
 war_event.notification_liege_loss.t: "Suserano Perdeu a Guerra"
 war_event.1001.t: "Meu Suserano Declara Guerra"
 war_event.1001.desc: "É estranho como uma situação pode mudar tão rapidamente durante a guerra.\n\nEm meio ao confronto contra [recipient.Custom2('MyCharacterIntroduction', ROOT.Char)], chega uma missiva de [liege_invalidator.Custom2('MyCharacterIntroduction', ROOT.Char)] dizendo para eu abandonar minha própria causa e me juntar a #EMP sua#! guerra contra [recipient.GetTitledFirstName|l]."
 war_event.1001.a: "Mas e a minha guerra!? Maldito seja você!"
 war_event.2003.desc: "Uma vez que [liege_invalidator.Custom2('MyCharacterIntroduction', invalidator)] agora está em guerra contra você, minhas forças se juntarão à sua causa."
 war_event.2003.a: "Assim seja."
 war_event.2001.t: "Um Novo Oponente"
 war_event.2001.desc: "Nada neste mundo é certo, especialmente em tempos de guerra. A [war.GetName] não tem sido diferente.\n\nComo esse conflito não é mais contra [previous_defender.Custom2('MyCharacterIntroduction', ROOT.Char)], mas sim contra [defender.Custom2('MyCharacterIntroduction', ROOT.Char)], pode ser prudente reavaliar a situação."
 war_event.2001.a: "Meu objetivo continua o mesmo."
 war_event.2001.a.tt: "A guerra continua"
 war_event.2001.b: "Este não é mais o melhor curso de ação."
 war_event.2001.c: "Talvez possamos fazer um acordo?"
 war_event.2001.c.tt: "Solicitar uma grande quantia de ouro [defender.Custom('ES_AlAla')] [defender.GetTitledFirstName|l] em troca de encerrar a guerra."
 war_event.2002.t: "[invalidator.Custom2('AppropriateGreeting', ROOT.Char)]"
 war_event.2002.desc: "Infelizmente, nos encontramos em lados opostos neste conflito. Nunca foi minha intenção, e por isso retirarei minhas tropas."
 war_event.2002.a: "Uma escolha sábia."
 war_event.2004.t: "[harald.Custom2('AppropriateGreeting', ROOT.Char)]"
 war_event.2004.desc: "Dado que agora estamos em conflito, talvez possamos chegar a um acordo para resolver isso pacificamente?\n\nRetirarei minhas tropas, dado o valor correto em ouro..."
 war_event.2004.a: "Um bom acordo."
 war_event.2004.b: "Nunca!"
 war_event.2005.t: "[william.Custom2('AppropriateGreeting', ROOT.Char)]"
 war_event.2005.desc: "Sua sabedoria o precede. Temos um acordo."
 war_event.2005.a: "Excelente!"
 war_event.2006.t: "[william.Custom2('AppropriateGreeting', ROOT.Char)]"
 war_event.2006.desc: "Receio que devo rejeitar sua oferta. Nos encontraremos no campo de batalha."
 war_event.2006.a: "Então será guerra."
 war_event.3001.t: "[war_owner.Custom2('AppropriateGreeting', ROOT.Char)]"
 war_event.3001.desc: "Há dois anos, você prometeu me ajudar na [war.GetName], mas até agora não fez nada para me apoiar nesse empreendimento.\n\nQual é o sentido de nossa aliança se você nem ao menos levanta um dedo para me ajudar?"
 war_event.3001.a: "Enviarei imediatamente minhas tropas para ajudar você!"
 war_event.3001.a.tt: "Se eu não conseguir nenhuma [war_contribution|lE] em 12 meses, perderei um [prestige_level|lE] e colocarei em risco minha aliança com [war_owner.GetTitledFirstNameNoTooltip|l]!"
 war_event.3001.b: "Este baú de ouro deve compensar minha ausência..."
 war_event.3001.b.tt: "Não serei mais obrigado a enviar soldados para lutar na [war.GetName]."
 war_event.3001.c: "Peço desculpas, não deveria ter afirmado que ajudaria."
 war_event.3002.t: "[war_owner.Custom2('AppropriateGreeting', ROOT.Char)]"
 war_event.3002.desc.start: "Apesar de sua promessa de enviar tropas para me ajudar, ainda não vi um único soldado seu no campo de batalha."
 war_event.3002.desc.end.1: "Ao quebrar seu juramento dessa maneira, você trouxe desonra a si mesmo e a sua família."
 war_event.3003.desc.end.2: "Seu fracasso nesse aspecto prejudicou gravemente minha confiança em você, [ROOT.Char.GetTitledFirstName|l]."
 war_event.3002.1.a: "Muito bem."
 war_event.3003.2.a: "Vou fazer melhor da próxima vez."
 war_event.3003.2.b: "Talvez eu deva encerrar nossa aliança...?"
 war_event.neighbor_war.both_neighbors.t: "Guerra entre Vizinhos Resolvida"
 war_event.neighbor_war.both_neighbors.desc: "Seu vecin[winner.Custom('ES_OA')] [winner.GetTitledFirstName|l] venceu ao seu outr[loser.Custom('ES_OA')] vizin[loser.Custom('ES_OA')] [loser.GetTitledFirstName|l] na [war.GetName]!"
 war_event.neighbor_war.only_winner.t: "Governante Vizinho Venceu a Guerra"
 war_event.neighbor_war.only_winner.desc: "Seu vizinho[winner.Custom('ES_OA')] [winner.GetTitledFirstName|l] venceu [loser.Custom2('YourCharacterIntroductionNoComma', this_player)] na [war.GetName]!"
 war_event.neighbor_war.only_loser.t: "Governante Vizinho Perdeu a Guerra"
 war_event.neighbor_war.only_loser.desc: "Seu vizin[winner.Custom('ES_OA')] [winner.GetTitledFirstName|l] foi derrotado por [loser.Custom2('YourCharacterIntroductionNoComma', this_player)] na [war.GetName]!"
 #Holy wars "soft invalidated" by faith change
 war_event.3101.t: "Nova Fé Descoberta"
 war_event.3101.desc: "me chegou a notícia da conversão de [defender.Custom('ES_DelDela')] [defender.GetTitledFirstName|l] ao [defender.GetFaith.GetNameNoTooltip|l]. Já não tenho mais o direito concedido por [ROOT.Char.GetFaith.HighGodName] para declarar guerra contra [defender.GetPrimaryTitle.GetNameNoTierNoTooltip]."
 war_event.3101.a: "Chegou a hora de baixarmos nossas espadas."
 war_event.3101.b.tt: "[war.GetName] continua"
 war_event.3101.b: "Acha que isso vai me deter? Ha!"
 war_event.3102.t: "[attacker.Custom2('AppropriateGreetingNegative', ROOT.Char)]"
 war_event.3102.desc: "Sua recém-descoberta fé em [ROOT.Char.GetFaith.HighGodName] está longe de ser convincente. Minha causa ainda é justa - não haverá misericórdia."
 war_event.3102.a: "[ROOT.Char.Custom('CulturalCurse')|U]!"
