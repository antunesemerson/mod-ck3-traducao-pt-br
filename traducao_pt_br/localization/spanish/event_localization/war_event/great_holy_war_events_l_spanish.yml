l_spanish:
 great_holy_war.0011.christian.t: "Reis Cruzados"
 great_holy_war.0011.muslim.t: "Jihad Renovada"
 great_holy_war.0011.pagans.t: "A Ira dos Velhos Deuses"
 great_holy_war.0011.fallback.t: "[awakening_faith.GetAdherentNamePlural] Militantes"
 great_holy_war.0011.catholic.rome.desc: "Roma, a cidade de São Pedro e o próprio assento do Papado, caiu nas mãos dos infiéis. Em resposta, o Papa no exílio, Sua Santidade [ghw_first_sponsor.GetTitledFirstName|l], declarou sua intenção de forjar uma aliança de senhores cristãos para reconquistar a cidade eterna."
 great_holy_war.0011.christian.europe.desc: "As terras sagradas do cristianismo ocidental estão sob cerco dos infiéis! Senhores cristãos desesperados persuadiram Sua Santidade [ghw_first_sponsor.GetTitledFirstName|l] a declarar sua intenção de forjar uma aliança justa para expulsar os pagãos em nome de [awakening_faith.WarGodName]."
 great_holy_war.0011.christian.byzantion.desc: "O Império Romano do Oriente. Bizâncio - o bastião firme do cristianismo contra os infiéis muçulmanos do Oriente - está em declínio. A situação desesperadora convenceu Sua Santidade [ghw_first_sponsor.GetTitledFirstName|l] a considerar a possibilidade de uma invasão direta por forças cristãs conjuntas."
 great_holy_war.0011.catholic.jerusalem.desc: "Os peregrinos cristãos à Terra Santa sofrem todo tipo de abuso, e suas rotas estão repletas de perigos.\n\nPara proteger os peregrinos e garantir Jerusalém para Cristo e os fiéis, Sua Santidade [ghw_first_sponsor.GetTitledFirstName|l] aceitou a possibilidade de uma invasão direta por forças cristãs conjuntas."
 great_holy_war.0011.christian.fallback.desc: "Por tempo demais os fiéis [awakening_faith.GetAdjective]s têm sido brutalizados por hereges e infiéis. Não suportaremos mais que nossos locais sagrados sejam devastados por blasfemos, nem que nossas crenças sejam ridicularizadas por falsos profetas. É hora de os verdadeiros seguidores de [awakening_faith.WarGodName] se unirem e revidarem contra os infiéis!"
 great_holy_war.0011.muslim.mecca.desc: "O impensável aconteceu! A cidade sagrada de Meca caiu nas mãos dos infiéis, e a Caaba está sendo profanada por sua presença. Sua Magnificência, [ghw_first_sponsor.GetTitledFirstName|l], declarou que uma era de Jihad renovada está sobre o mundo. A cidade sagrada deve ser reconquistada a qualquer custo. Todos os fiéis muçulmanos justos devem se preparar para se juntar às fileiras dos mujahideen nas próximas batalhas."
 great_holy_war.0011.muslim.jerusalem.desc: "A Cidade Santa de Jerusalém, onde o Profeta foi levado aos céus, caiu nas mãos dos infiéis! Sua Magnificência, [ghw_first_sponsor.GetTitledFirstName|l], não permitirá isso e declarou que outra era de Grandes Conquistas está sobre nós, como foi o caso nos dias dos primeiros Califas. O Dar al-Islam deve ser defendido! Todos os fiéis muçulmanos justos devem se preparar para se juntar às fileiras dos mujahideen nas próximas batalhas."
 great_holy_war.0011.muslim.arabia.desc: "A Casa do Islã está gravemente ameaçada pela investida de [ghw_first_sponsor.Custom('GetDerogatoryNonbelieverPlural')] em suas próprias terras. Em resposta, Sua Magnificência, [ghw_first_sponsor.Custom('ES_ElLa')] [ghw_first_sponsor.GetTitledFirstName|l], declarou que uma era de jihad renovada chegou ao mundo. As regiões centrais do Dar al-Islam devem ser retomadas a qualquer custo. Todos os fiéis muçulmanos justos devem se preparar para se juntar às fileiras dos mujahideen nas próximas lutas."
 great_holy_war.0011.muslim.africa.desc: "A Casa do Islã está gravemente ameaçada pela investida de [ghw_first_sponsor.Custom('GetDerogatoryNonbelieverPlural')] na África. Em resposta, Sua Magnificência, [ghw_first_sponsor.Custom('ES_ElLa')] [ghw_first_sponsor.GetTitledFirstName|l], declarou que chegou ao mundo uma era de jihad renovada. As regiões ocidentais da Ummah devem ser retomadas a qualquer custo. Todos os fiéis muçulmanos devotos devem se preparar para se juntar às fileiras dos mujahideen nas próximas lutas."
 great_holy_war.0011.muslim.fallback.desc: "A Casa do Islã está gravemente ameaçada por infiéis e apóstatas. Todos os fiéis [awakening_faith.GetAdjective]s justos devem se preparar para se unir às fileiras dos mujahideen nas lutas que estão por vir. Isso sinaliza uma nova era de expansão islâmica."
 great_holy_war.0011.generic.fallback.head.desc: "Com os fiéis [awakening_faith.GetReligion.GetAdjective]s cercados por inimigos em todos os cantos, [ghw_first_sponsor.GetTitledFirstName|l] decidiu que é hora de que todos os verdadeiros seguidores de [awakening_faith.WarGodName] empunhem as armas e defendam seus lugares sagrados planejando uma magnífica campanha de conquista religiosa."
 great_holy_war.0011.generic.fallback.desc: "Não podemos mais nos dar ao luxo de ficar parados enquanto blasfemadores nos cercam por todos os lados, profanando nossos locais sagrados e brutalizando nossos irmãos. É hora dos guerreiros de [awakening_faith.WarGodName] pegarem em armas, unidos por um único propósito."
 great_holy_war.0011.generic.ending.positive: "\n\nIsso marca o início de uma nova era de grandes conflitos religiosos [awakening_faith.GetReligion.GetAdjective]s, as [awakening_faith.GHWNamePlural]."
 great_holy_war.0011.generic.ending.negative: "\n\nIsso poderia ser o início de uma agressão [awakening_faith.GetReligion.GetAdjective] sem precedentes."
 great_holy_war.0011.generic.ending.coreligionist.head: "\n\nAs ramificações teológicas desta notícia já estão sendo discutidas pelo [other_pope.GetTitleTierName] e outros membros proeminentes do clero, que estão ansiosos para seguir o exemplo dos [awakening_faith.GetAdherentNamePluralNoTooltip] e iniciar uma nova era de guerra religiosa em nome de [ROOT.Char.GetFaith.GetNameNoTooltip]."
 great_holy_war.0011.generic.ending.coreligionist.autonomous: "\n\nAs ramificações teológicas desta notícia já estão sendo discutidas por vários membros proeminentes do clero, que estão ansiosos para seguir o exemplo dos [awakening_faith.GetAdherentNamePluralNoTooltip] e iniciar uma nova era de guerra religiosa em nome de [ROOT.Char.GetFaith.GetNameNoTooltip]."
 great_holy_war.0011.directed.a: "Minhas tropas se juntarão à campanha imediatamente!"
 great_holy_war.0011.directed.b: "Eu defenderei meus companheiros [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip]!"
 great_holy_war.0011.a: "Deus Vult!"
 great_holy_war.0011.b: "Allahu Akbar!"
 great_holy_war.0011.c: "[ROOT.Char.GetFaith.WarGodName] está conosco!"
 great_holy_war.0011.d: "[ROOT.Char.GetFaith.WarGodName] nos proteja!"
 great_holy_war.0011.e: "Se eles dizem..."
 great_holy_war.0011.tooltip.effect: "[faiths|lE] [awakening_faith.GetReligion.GetAdjective] agora têm acesso a [awakening_faith.GHWNamePlural]"
 great_holy_war.0015.opening: "[scoped_pope.Custom2('AppropriateGreeting', ROOT.Char)]"
 great_holy_war.0016.custom: "Cada vassalo [theocratic|lE] [scoped_pope.GetFaith.GetAdjective]"
 great_holy_war.0015.desc: "Ao oferecer seu apoio à justa luta contra os infiéis, você se redimiu aos olhos de [scoped_pope.GetFaith.WarGodName]. Como tal, consideramos você digno de participar da Santa Comunhão mais uma vez."
 great_holy_war.0015.a: "Já era hora..."
 great_holy_war.0015.b: "Verdadeiramente, [scoped_pope.GetFaith.WarGodName] é misericordioso!"
 great_holy_war.0016.desc.a: "Estamos profundamente desapontados com sua decisão de abandonar a causa justa de Nosso [scoped_pope.GetFaith.GHWName]. Não esqueceremos sua afronta contra [scoped_pope.GetFaith.WarGodName], e nem [scoped_pope.GetFaith.WarGodSheHe|U]."
 great_holy_war.0016.desc.b: "Estamos profundamente desapontados e perturbados ao saber de sua decisão de abandonar a causa justa de Nosso [scoped_pope.GetFaith.GHWName]. Você se envergonhou diante dos olhos de [scoped_pope.GetFaith.WarGodName] com esta blasfêmia."
 great_holy_war.0016.desc.c: "Não toleraremos seu comportamento blasfemo. Ao se recusar a oferecer apoio ao Nosso [scoped_pope.GetFaith.GHWName] sagrado, não nos resta escolha senão expulsá-lo. A partir de agora, está proibido de participar da Santa Comunhão."
 great_holy_war.0016.a: "Tenho coisas melhores com que me preocupar."
 great_holy_war.0016.b: "O que eu fiz?!"
 great_holy_war.0017.title: "Abandonando o [scoped_pope.GetFaith.GHWName]"
 great_holy_war.0017.desc.a: "Abandonar meu compromisso com a [scoped_pope.GetFaith.GHWName] certamente prejudicará minha reputação aos olhos do clero e poderá atrair a ira da Santa Sé. \n\nDevo considerar seriamente as possíveis consequências desse ato antes de tomar minha decisão, pois corro o risco de ser proclamad[ROOT.Char.Custom('ES_OA')] herege aos olhos da Igreja."
 great_holy_war.0017.desc.b: "Abandonar minha promessa à [scoped_pope.GetFaith.GHWName] certamente reduzirá minha reputação aos olhos do clero, e pode atrair a ira de [scoped_pope.GetTitledFirstName|l]. Preciso considerar seriamente as possíveis consequências deste ato antes de tomar minha decisão, pois corro o risco de ser rotulado como um[ROOT.Char.Custom('ES_XA')] blasfem[ROOT.Char.Custom('ES_OA')]."
 great_holy_war.0017.a: "Não me importo."
 great_holy_war.0017.b: "Talvez eu esteja sendo precipitado demais..."
 great_holy_war.0018.desc: "Se eu me comprometer com a [scoped_pope.GetFaith.GHWName], serei obrigado a reunir um exército e marchar contra os inimigos da fé quando chegar a hora. \n\nComo voltar atrás na minha palavra poderia atrair a ira de [scoped_pope.GetTitledFirstName|l], devo considerar seriamente essa decisão antes de comprometer meu senhorio na luta."
 great_holy_war.0018.a: "Eu me juntarei ao exército de [scoped_pope.GetFaith.WarGodName]!"
 great_holy_war.0018.b: "Preciso pensar um pouco mais sobre isso..."
 great_holy_war.0003.title: "Os Fiéis se Preparam para a Guerra"
 great_holy_war.0003.catholic.desc: "Um enviado papal chegou à minha corte, trazendo notícias do Vaticano. [ghw_sponsor.GetTitledFirstName|l] convocou todos os governantes cristãos justos para pegarem em armas. Como [ROOT.Char.GetTitleAsNameNoTooltip|l] [ROOT.Char.GetFaith.GetAdherentNameNoTooltip], espera-se que eu prepare meus homens em apoio a essa causa santíssima, patrocinada pela própria Igreja Universal.\n\nA todos aqueles que assumirem a luta contra os vis [target_character.Custom('GetUnbelieverNamePlural')] que profanam os lugares sagrados de [target_kingdom.GetBaseNameNoTier], a Santa Sé promete plena absolvição de todos os pecados e um lugar garantido no Paraíso."
 great_holy_war.0003.fallback.desc: "Notícias gloriosas chegaram à minha corte. [ghw_sponsor.GetTitledFirstName|l] decidiu que é hora de todos os [ghw_sponsor.GetFaith.GetAdherentNamePluralNoTooltip] justos se unirem sob uma única bandeira e marcharem contra os inimigos da fé em uma [ghw_sponsor.GetFaith.GHWName] para a glória de [ghw_sponsor.GetFaith.WarGodName].\n\nA todos aqueles que se juntarem a essa busca sagrada, o [ghw_sponsor.GetTitleTierName] garante um lugar no [ghw_sponsor.GetFaith.DivineRealm]."
 great_holy_war.0003.a: "Meus guerreiros estarão prontos para lutar!"
 great_holy_war.0003.a.tt: "Comprometa-se a se juntar à [ghw_sponsor.GetFaith.GHWName] convocada por [ghw_sponsor.GetTitledFirstName|l] assim que ela começar"
 great_holy_war.0003.b: "Eu ajudarei com prazer a financiar essa causa sagrada."
 great_holy_war.0003.c: "Talvez eu deva considerar me juntar..."
 great_holy_war.0003.a.lifted_excommunication: "Minha [excommunication|lE] será levantada"
 great_holy_war.0023.desc: "Chegou ao nosso conhecimento que você ainda não se comprometeu a apoiar a iminente [scoped_pope.GetFaith.GHWName]. Devo lembrá-lo de que é seu dever sagrado como [scoped_pope.GetFaith.GetAdjectiveNoTooltip] [ROOT.GetCharacter.GetTitleTierName] travar guerra contra os incrédulos e [target_character.Custom('GetUnbelieverNamePlural')]."
 great_holy_war.0023.desc.hooked: "Chegou ao nosso conhecimento que você ainda não se comprometeu a apoiar a iminente [scoped_pope.GetFaith.GHWName]. Isso é inaceitável! Exijo que você imediatamente se junte à nossa grande guerra contra os incrédulos e [target_character.Custom('GetUnbelieverNamePlural')]."
 great_holy_war.0003.a.hooked: "Eu não tenho muita escolha, suponho?"
 great_holy_war.0023.c: "Eu já estou fazendo a minha parte lutando contra os [target_character.Custom('GetUnbelieverNamePlural')]!"
 great_holy_war.0023.d: "Essa não é a minha guerra."
 great_holy_war.0024.dead.recipient.title: "[ghw_claimant.GetFirstNameNoTooltip] Morreu"
 great_holy_war.0024.dead.recipient.replaced: "[ghw_claimant.GetTitledFirstName] agora é o/a novo[ghw_claimant.Custom('ES_OA')] Candidat[ghw_claimant.Custom('ES_OA')] Legítim[ghw_claimant.Custom('ES_OA')] desta [the_faith.GHWName]."
 great_holy_war.0024.dead.recipient.open: "[former_recipient.GetTitledFirstName] morreu, deixando [target_kingdom.GetBaseNameNoTier] para ser reivindicado pelo guerreiro mais sagrado."
 great_holy_war.0028.dead.beneficiary_title: "Beneficiário Falecido"
 great_holy_war.0028.dead.beneficiary: "Com o falecimento de meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('former_beneficiary'))] [former_beneficiary.GetFirstName], devo escolher um novo beneficiário para a [ROOT.Char.GetFaith.GHWName] em curso."
 great_holy_war.0029.invalid.beneficiary_title: "Beneficiário Inválido"
 great_holy_war.0029.converted.beneficiary: "A infeliz conversão do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('former_beneficiary'))] [former_beneficiary.GetFirstName] o tornou indign[former_beneficiary.Custom('ES_OA')] de receber quaisquer terras da [ROOT.Char.GetFaith.GHWName]."
 great_holy_war.0030.incapable.beneficiary: "Infelizmente, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('former_beneficiary'))] [former_beneficiary.GetFirstName] já não está em condições de ser meu beneficiári[former_beneficiary.Custom('ES_OA')]… nem de ser nada, na verdade."
 great_holy_war.0030.excommunicated.beneficiary: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('former_beneficiary'))] [former_beneficiary.GetFirstName] foi excomungad[former_beneficiary.Custom('ES_OA')], e, como tal, já não é dign[former_beneficiary.Custom('ES_OA')] de ser meu beneficiári[former_beneficiary.Custom('ES_OA')] na [ROOT.Char.GetFaith.GHWName] em curso."
 great_holy_war.0030.devoted.beneficiary: "Como meu/minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('former_beneficiary'))] [former_beneficiary.GetFirstName] decidiu fazer os votos, devo escolher outra pessoa para ser meu/minha beneficiári[former_beneficiary.Custom('ES_OA')] na [ROOT.Char.GetFaith.GHWName] em curso."
 great_holy_war.0030.sick.beneficiary: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('former_beneficiary'))] [former_beneficiary.GetFirstName] está fraco e doente demais para ser meu beneficiár[former_beneficiary.Custom('ES_OA')] para ser meu beneficiári[former_beneficiary.Custom('ES_OA')], então devo escolher outra pessoa."
 great_holy_war.0030.ruler.beneficiary: "Ao se tornar um governante com responsabilidades próprias, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('former_beneficiary'))] [former_beneficiary.GetFirstName] já não está adequad[former_beneficiary.Custom('ES_OA')] para ser meu beneficiári[former_beneficiary.Custom('ES_OA')]."
 great_holy_war.0030.heir.beneficiary: "Ao se tornar o próximo na linha de sucessão para herdar um título próprio, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('former_beneficiary'))] [former_beneficiary.GetFirstName] já não é mais adequad[former_beneficiary.Custom('ES_OA')] para ser beneficiári[former_beneficiary.Custom('ES_OA')]."
 great_holy_war.0040.desc: "O Cofre de Guerra representa a soma total de todas as doações feitas pelos partidários desta [ROOT.Char.GetFaith.GHWName]. \n\nUma parte desse ouro será compartilhada entre os participantes quando a fase de preparação terminar, enquanto o restante será dividido entre os vencedores de acordo com sua contribuição."
 great_holy_war.0040.a: "Vou esvaziar meus cofres pela causa!"
 great_holy_war.0040.b: "Farei uma generosa contribuição."
 great_holy_war.0040.c: "Posso abrir mão de algumas moedas para esta empreitada."
 great_holy_war.0040.d: "Vou considerar seriamente."
 great_holy_war.0050.title: "[the_faith.GHWName] para [target_kingdom.GetBaseNameNoTierNoTooltip]"
 great_holy_war.0050.base.desc: "Os governantes [the_faith.GetAdherentNameNoTooltip], fortalecidos por um chamado às armas de [ghw_sponsor.GetTitledFirstName|l], começaram a reunir uma grande hoste de fanáticos para travar uma [the_faith.GHWName] contra todos os inimigos de sua [the_faith.ReligiousSymbol] em [target_kingdom.GetBaseNameNoTierNoTooltip]. A cada dia, mais fanáticos são atraídos para o que em breve será um poderoso exército de sua [the_faith.ReligiousSymbol], reunido para levar a guerra às nossas terras."
 great_holy_war.0050.defender.desc: "\n\nCabe a mim organizar meus irmãos governantes [ROOT.Char.GetFaith.GetAdjectiveNoTooltip]s da região e nos prepararmos para a onda de [ghw_sponsor.Custom('GetUnbelieverNamePlural')] que está por vir antes que seja tarde demais."
 great_holy_war.0050.others.desc: "\n\nSó podemos rezar que [ROOT.Char.GetFaith.WarGodName] conceda a [target_character.GetTitledFirstName|l] coragem e fortaleza para resistir contra a maré de [ghw_sponsor.Custom('GetUnbelieverNamePlural')]."
 great_holy_war.0050.a: "[ROOT.Char.GetFaith.WarGodName] nos proteja desses [ghw_sponsor.Custom('GetUnbelieverNamePlural')]!"
 great_holy_war.0051.catholic.attackers.desc: "Chegou finalmente a hora de trazer a santa ira de [the_faith.WarGodNamePossessive] contra os vis [ghw_defender.Custom('GetUnbelieverNamePlural')] de [target_kingdom.GetBaseNameNoTier].\n\nInflamado por uma fúria justa e uma determinação inabalável, o grande exército de cruzados reunido por [ghw_sponsor.GetTitledFirstName|l] parte para levar a justiça divina aos ímpios e conquistar seu lugar em [the_faith.DivineRealm]."
 great_holy_war.0051.generic.attackers.desc: "Finalmente chegou a hora de consagrar as terras de [target_kingdom.GetBaseNameNoTier] com o sangue dos [ghw_defender.Custom('GetUnbelieverNamePlural')] e reivindicar esta terra para a glória de [the_faith.WarGodName].\n\nNossos guerreiros sagrados marcham com a certeza de que, estejam eles emergindo vitoriosos ou morrendo lutando contra os incrédulos, sua devoção lhes garantirá um lugar no [the_faith.PositiveAfterLife]."
 great_holy_war.0051.generic.defenders.desc: "As hordas de [ghw_sponsor.Custom('GetUnbelieverNamePlural')] reunidas por [ghw_sponsor.GetTitledFirstName|l] começaram sua marcha sobre [target_kingdom.GetBaseNameNoTier]. \n\n! Estes guerreiros selvagens, claramente inspirados por [ROOT.Char.GetFaith.DevilName], devastarão nossas terras e massacrarão nosso povo sem piedade se não os detivermos! Pelo bem de todos os fiéis [ghw_defender.GetFaith.GetAdherentName] de [target_kingdom.GetBaseNameNoTierNoTooltip], devemos prevalecer!"
 great_holy_war.0051.generic.start.tt: "Uma [the_faith.GHWName] é lançada para [target_kingdom.GetBaseNameNoTierNoTooltip] imediatamente!"
 great_holy_war.0052.title.winners: "[the_faith.GHWName|U] vitoriosa"
 great_holy_war.0052.title.losers: "Ira do [the_faith.ReligiousSymbol|U]"
 great_holy_war.0052.generic.attackers.desc: "[the_faith.WarGodName] concedeu a [Select_CString(title_recipient.IsLocalPlayer,'você', title_recipient.GetShortUIName)] a vitória na [the_faith.GHWName] por [target_kingdom.GetBaseNameNoTier]. Após derrotar [ghw_defender.Custom('ES_AlAla')] [ghw_defender.GetTitledFirstName|l] e seus [ghw_first_sponsor.Custom('GetDerogatoryNonbelieverPlural')] em várias ocasiões, nossos guerreiros forçaram os inimigos da fé a admitir sua derrota ignominiosa.\n\nCom as terras ocupadas firmemente sob a liderança de um governante piedoso de fé [the_faith.GetAdjectiveNoTooltip] , podemos ter certeza de que a vontade divina de [the_faith.WarGodName] foi cumprida. Este é um dia glorioso para todos os verdadeiros seguidores do nosso/a [the_faith.ReligiousSymbol|U]!"
 great_holy_war.0052.generic.defenders.desc: "[ghw_defender.GetFaith.WarGodName] deve ter abandonado[ghw_defender.Custom('ES_AlAla')] [ghw_defender.GetTitledFirstName|l] para permitir que seus exércitos fossem tão completamente derrotados pelos soldados do/a[the_faith.ReligiousSymbol|U].\n\nApós o sucesso de sua[the_faith.GHWName], os[ROOT.Char.Custom('GetUnbelieverNamePlural')] ocuparam[target_kingdom.GetBaseNameNoTier] e reivindicam os territórios vizinhos como terra legitimamente[the_faith.GetAdjectiveNoTooltip]."
 great_holy_war.0052.generic.outsiders.desc: "A [the_faith.GHWName] [the_faith.GetAdjectiveNoTooltip] contra o [target_kingdom.GetBaseName] foi um sucesso retumbante. Os guerreiros santos, inspirados pelo chamado às armas [ghw_sponsor.Custom('ES_DelDela')] [ghw_sponsor.GetTitledFirstName|l], derrotaram seus inimigos repetidas vezes, ocupando permanentemente suas terras.\n\nÉ difícil dizer quanto tempo seu domínio durará e se os seguidores de [ghw_defender.GetFaith.WarGodName] revidarão após esta humilhação, mas, ao menos por enquanto, o povo de [target_kingdom.GetBaseNameNoTierNoTooltip] terá que aprender a viver sob a sombra de seu [the_faith.ReligiousSymbol]."
 great_holy_war.0052.a: "![the_faith.WarGodName] está conosco!"
 great_holy_war.0052.b: "[ROOT.Char.GetFaith.WarGodName], por que nos castigas?!"
 great_holy_war.0052.c: "As disputas dos [ghw_sponsor.Custom('GetUnbelieverNamePlural')] não são da nossa conta."
 great_holy_war.0053.title: "[the_faith.ReligiousSymbol|U] quebrada"
 great_holy_war.0053.generic.attackers.desc: "Os guerreiros de [the_faith.WarGodName] só encontraram morte e humilhação às portas de [target_kingdom.GetBaseNameNoTier].\n\nA [the_faith.GHWName] convocada e apoiada com tanto ardor por [ghw_sponsor.Custom('ES_ElLa')] [ghw_sponsor.GetTitledFirstName|l] terminou em uma derrota desastrosa que só prejudicou a causa dos fiéis. Isso certamente encorajará mais blasfemos e infiéis a se afastarem ainda mais de [the_faith.GetName]."
 great_holy_war.0053.generic.defenders.desc: "Os patéticos soldados de [the_faith.WarGodName] não foram páreo para nossos guerreiros. \n\nSob a liderança sábia e piedosa [ghw_defender.Custom('ES_DelDela')] [ghw_defender.GetTitledFirstName|l], o povo [ghw_defender.GetFaith.GetAdherentName] repeliu os invasores e reafirmou seus direitos sobre [target_kingdom.GetBaseNameNoTier]. Talvez da próxima vez, est[ghw_sponsor.Custom('ES_EA')] [ghw_sponsor.GetTitleTierName] de fé [the_faith.GetAdjective] não tenha tanta pressa em desperdiçar a vida de seus seguidores em uma tentativa fútil de testar o poder de [ghw_defender.GetFaith.WarGodName]."
 great_holy_war.0053.generic.outsiders.desc: "Após vários reveses e derrotas humilhantes, a [the_faith.GHWName] convocada por [ghw_sponsor.Custom('ES_ElLa')] [ghw_sponsor.GetTitledFirstName|l] para conquistar [target_kingdom.GetBaseNameNoTier] terminou em um fracasso retumbante.\n\nO povo fiel [ghw_defender.GetFaith.GetAdherentName], unido sob o estandarte [ghw_defender.Custom('ES_DelDela')] [ghw_defender.GetTitledFirstName|l], expulsou todos os invasores e obrigou seus líderes a se renderem."
 great_holy_war.0053.a: "![the_faith.WarGodName] nos abandonou!"
 great_holy_war.0053.b: "Os [attacker.Custom('GetUnbelieverNamePlural')] provaram a ira de [ghw_defender.GetFaith.WarGodName]!"
 great_holy_war.0056.title: "A [the_faith.GHWName] fracassa"
 great_holy_war.0056.desc: "Parece que o apelo apaixonado de [ghw_sponsor.GetTitledFirstName|l] para se unir contra os inimigos da [the_faith.ReligiousSymbol] foi menos convincente do que esperava. Poucos foram os fiéis que decidiram atender ao seu chamado às armas, poucos demais para organizar um exército de verdade.\n\nSem lhe restar outra opção, [ghw_sponsor.GetTitleTierName] foi forçad[ghw_sponsor.Custom('ES_OA')] a cancelar a [the_faith.GHWName] e denunciar todos os governantes da fé [the_faith.GetAdjective] por sua maldade e covardia."
 great_holy_war.0056.a: "Como nos desviamos tanto da orientação de [the_faith.WarGodNamePossessive]?"
 great_holy_war.0056.b: "Lamentável."
 great_holy_war.0056.c: "Por que isso volta a me preocupar?"
 great_holy_war.0057.title: "Soldado do [the_faith.ReligiousSymbol|U]"
 great_holy_war.0057.crusader.desc: "Nossos exércitos estão prontos para participar da [the_faith.GHWName] por [target_kingdom.GetBaseNameNoTier]. Se [the_faith.WarGodName] quiser, em breve sairemos vitoriosos, e o sangue dos [ROOT.Char.Custom('GetDerogatoryNonbelieverPlural')] tingirá a terra de vermelho."
 great_holy_war.0057.mujahid.desc: "Nossa grande luta finalmente chegou. Nossos exércitos estão prontos para enfrentar os infiéis em batalha e, com a bênção de [the_faith.WarGodName], em breve estaremos vitoriosos nos muros de [target_kingdom.GetBaseNameNoTier]."
 great_holy_war.0057.generic.outsiders.desc: "Nossos exércitos estão prontos para participar da [the_faith.GHWName] por [target_kingdom.GetBaseNameNoTier]. Com [the_faith.WarGodName] ao nosso lado, certamente prevaleceremos!"
 great_holy_war.0057.a: "Que [the_faith.WarGodName] nos leve à vitória!"
 great_holy_war.0058.title: "Demonstração de covardia"
 great_holy_war.0058.base.desc: "Embora mais guerreiros virtuosos continuem marchando sobre [target_kingdom.GetBaseNameNoTier], abandonei meus exércitos em busca de um lugar seguro. Embora continuem travando uma guerra incessante contra os vis [ROOT.Char.Custom('GetDerogatoryNonbelieverPlural')], maculo meu nome e ponho em dúvida minha determinação de prosseguir esta [the_faith.GHWName]."
 great_holy_war.0058.a: "Não deveria ter abandonado o campo..."
 great_holy_war.0061.title: "Recompensado"
 great_holy_war.0061.notification: "[scoped_beneficiary.GetFirstName] foi recompensad[scoped_beneficiary.Custom('ES_OA')] pela contribuição de sua família na recente [scoped_beneficiary.GetFaith.GHWName]."
 great_holy_war.0070.title: "Um Novo Reino"
 great_holy_war.0070.base.desc: "Com a fundação de um verdadeiro [title_recipient.GetTitleTierName] de fé [the_faith.GetAdjective] em [target_kingdom.GetBaseNameNoTier], os fiéis podem finalmente descansar tranquilos, sabendo que [the_faith.WarGodName] sorri diante de nossas boas obras. O fato de que o novo governante de [target_kingdom.GetBaseNameNoTier] pertença à minha dinastia é apenas mais uma prova do nosso favor divino."
 great_holy_war.0070.a: "Que tipo de governante será…?"
 great_holy_war.0070.b: "É hora de voltar meu foco para o meu reino."
 great_holy_war.0071.generic.attackers.desc: "[attacker.GetTitledFirstName] convocou uma [attacker.GetFaith.GHWName] para unir todos os verdadeiros [attacker.GetFaith.GetAdherentNamePlural] sob um único estandarte e conduzi-los contra os inimigos da fé. \n\nChegou finalmente o momento de consagrar as terras de [target_kingdom.GetBaseNameNoTier] com o sangue dos [ghw_defender.Custom('GetUnbelieverNamePlural')] e reivindicar esta terra para a glória de [the_faith.WarGodName]."
 great_holy_war.0071.generic.defenders.desc: "[attacker.Custom('ES_ElLa')|U] vil [attacker.GetTitledFirstName|l] convocou uma [attacker.GetFaith.GHWName] contra o povo inocente de [defender.GetPrimaryTitle.GetBaseNameNoTier].\n\nSe quisermos sobreviver contra a horda implacável de fanáticos sob seu comando, devemos nos unir."
 great_holy_war.0081.title: "Uma nova [actor.GetFaith.GHWName]"
 great_holy_war.0081.desc: "Por algum motivo, a [actor.GetFaith.GHWName] se desviou de seu alvo original e se moveu para [secondary_recipient.GetPrimaryTitle.GetBaseNameNoTier].\n\nParece que nossas terras serão poupadas da selvageria dos militantes [actor.GetFaith.GetAdherentNamePlural]. Ao menos por enquanto."
 great_holy_war.0081.a: "Pelo menos estamos a salvo."
 great_holy_war.0082.desc: "Há algum tempo, a Fé [actor.GetFaith.GetAdjective] vem reunindo forças para uma [actor.GetFaith.GHWName].\n\nNo entanto, em uma reviravolta inesperada do destino, os fanáticos que lideram esse grande exército decidiram mudar seus planos originais e marchar em direção a [secondary_recipient.GetPrimaryTitle.GetBaseNameNoTier]!"
 great_holy_war.0082.a: "Temos apenas um pouco de tempo para nos preparar!"
 great_holy_war.0085.toast: "A conversão de [converter.GetTitledFirstName|l] me obrigou a renegar minha promessa"
