l_spanish:
 raiding.0002.t: "Fogo e Sangue"
 raiding.0002.desc: "O assentamento de [sacked_barony.GetNameNoTierNoTooltip], um bastião importante de [sacked_county.GetNameNoTierNoTooltip], caiu diante dos meus saqueadores. Temos vastas extensões de terra, além de muitos dos súditos trêmulos e tesouros reluzentes de [sacked_county_owner.GetTitledFirstName|l] para escolher.\n\nAs tropas estão prontas, aguardando minhas ordens."
 raiding.0002.a: "Capturem escravos habilidosos para [raider_capital.GetNameNoTooltip]!"
 raiding.0002.a_nomad: "Roubem todas as ovelhas e éguas!"
 stolen_ewes_and_mares_modifier: "Ovelhas e Éguas Roubadas"
 stolen_ewes_and_mares_modifier_desc: "Este condado está prosperando, impulsionado por um aumento de ovelhas e éguas reprodutoras de primeira, tomadas como espólio em incursões recentes."
 raiding.0002.b: "Tragam-me um saque abundante!"
 raiding.0002.c: "Já levamos o suficiente."
 raiding.0003.t_spared: "[sacked_county.GetNameNoTierNoTooltip] Poupada"
 raiding.0003.t_attacked: "O Saque de [sacked_county.GetNameNoTierNoTooltip]"
 raiding.0003.desc.admin_plundered_independent: "Após derrubar os portões do assentamento de [sacked_barony.GetNameNoTierNoTooltip], [raider.GetTitledFirstName|l] tem liberdade para percorrer grande parte de [sacked_county.GetNameNoTierNoTooltip] e aproveitou essa oportunidade para sequestrar e escravizar o maior número possível de funcionários cultos e trabalhadores habilidosos. Os camponeses arrancam os cabelos e choram por seus familiares perdidos."
 raiding.0003.desc.gold_plundered_independent: "Após um cerco tenso, [raider.GetTitledFirstName|l] conseguiu penetrar no assentamento fortificado de [sacked_barony.GetNameNoTierNoTooltip] e ordenou que seus soldados pilhassem tudo o que tivesse valor. Em pouco tempo, eles terão despojado metade de [sacked_county.GetNameNoTierNoTooltip] de sua riqueza!"
 raiding.0003.desc.spared_plundered_independent: "Apesar de o assentamento de [sacked_barony.GetNameNoTierNoTooltip] estar indefeso diante de seus exércitos, [raider.GetTitledFirstName|l] poupou os habitantes de [sacked_county.GetNameNoTierNoTooltip] de mais pilhagens. Em vez disso, parece que [raider.GetSheHe] quer obter seu saque de #EMP mim#!!"
 raiding.0003.desc.admin_plundered_vassal: "Meu suserano não conseguiu defender o assentamento de [sacked_barony.GetNameNoTierNoTooltip] da devastação de [raider.GetTitledFirstName|l] e sua queda leva consigo uma fortificação-chave para [sacked_county.GetNameNoTierNoTooltip]. Neste momento, as tropas de [raider.GetTitledFirstNameNoTooltip|l] se espalham pelo campo, capturando e escravizando todo trabalhador habilidoso ou aprendiz que encontram."
 raiding.0003.desc.gold_plundered_vassal: "Sem ajuda de meu suserano, [sacked_barony.GetNameNoTierNoTooltip] tinha poucas chances. Os saqueadores, seguindo [raider.GetTitledFirstName|l], saquearam o assentamento e esses desgraçados levaram tudo: desde os pertences dos camponeses até minha taça da sorte.\n\nMetade de [sacked_county.GetNameNoTierNoTooltip] arde após o saque [raider.GetPrimaryTitle.GetAdjectiveNoTooltip], e [raider.GetTitledFirstNameNoTooltip|l] continua por aí, em algum lugar, bebendo da minha taça pessoal."
 raiding.0003.desc.spared_plundered_vassal: "Embora meu suserano não tenha conseguido romper o cerco de [sacked_barony.GetNameNoTierNoTooltip], [raider.GetTitledFirstName|l] manteve suas tropas sob controle.\n\nA maior parte da zona rural foi poupada de mais saques do que o habitual, mas seus olhos famintos se voltam para outros alvos..."
 raiding.0003.a: "Que canalha!"
 raiding.0003.b: "Eu #EMP vingarei#! esta afronta."
 raiding.0003.c: "Vamos reconstruir [sacked_county.GetNameNoTierNoTooltip]."
 raiding.0004.desc.admin_plundered: "[sacked_county_owner.GetTitledFirstName] pagou o preço pela avareza de [raider.GetTitledFirstName|l]. Com a queda do assentamento de [sacked_barony.GetNameNoTierNoTooltip], vastas áreas do grande [sacked_county.GetNameNoTierNoTooltip] ficaram indefesas. \n\nSem oposição, os saqueadores [raider.GetPrimaryTitle.GetAdjectiveNoTooltip] agiram livremente, sequestrando e escravizando todo trabalhador qualificado que conseguiam encontrar."
 raiding.0004.desc.gold_plundered: "Com a queda do assentamento de [sacked_barony.GetNameNoTierNoTooltip] diante de [raider.GetTitledFirstNameNoTooltip|l], grande parte de [sacked_county.GetNameNoTierNoTooltip] ficou à mercê dos saqueadores [raider.GetPrimaryTitle.GetAdjectiveNoTooltip].\n\nComo restam poucas fortalezas locais de porte capazes de lhes fazer frente, os saqueadores levaram todos os itens preciosos e toda a prata que conseguiram encontrar."
 raiding.0004.desc.spared_plundered: "Apesar de ter sitiado com sucesso o assentamento de [sacked_barony.GetNameNoTierNoTooltip], uma fortificação que protegia vastas extensões de [sacked_county.GetNameNoTierNoTooltip], [raider.GetTitledFirstName|l] conteve suas tropas. Os saques resultantes foram isolados e esporádicos.\n\nEmbora seu vassalo tenha sido poupado, os olhos [raider.GetPrimaryTitle.GetAdjectiveNoTooltip] cobiçam seus domínios pessoais..."
 raiding.0004.a: "Amaldiçoo esses selvagens intrometidos!"
 raiding.0004.a.tribal: "Malditos sejam esses cães de [raider.GetPrimaryTitle.GetNameNoTierNoTooltip]!"
 raiding.0004.b: "Pague um weregeld pelos mortos."
 raiding.0004.c: "Ajude-os a reconstruir."
 raiding.0004.c.architect: "Você envia [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('architect'))] [architect.GetTitledFirstNameNoTooltip|l] para supervisionar as reparações."
 recently_sacked_modifier: "Saqueado Recentemente"
 recently_sacked_modifier_desc: "Os saqueadores não encontrarão mais nada para levar aqui, enquanto o medo de seu retorno mantém os camponeses sob controle."
 rebuilding_after_sacking_modifier: "Reconstrução após Saqueio"
 rebuilding_after_sacking_modifier_desc: "Um benfeitor rico está ajudando os moradores a reparar seus assentamentos danificados."
 raiding.0004.c.feed.t: "Suserano Paga pelos Reparos"
 raiding.0004.c.feed.desc: "Meu suserano pagou por equipes de arquitetos e administradores para ajudar a reparar [sacked_county.GetNameNoTierNoTooltip]."
 raiding.0004.c.feed.desc2: "Meu suserano enviou o Arquiteto Real para liderar equipes de arquitetos e administradores para ajudar a reparar [sacked_county.GetNameNoTierNoTooltip]."
 raiding.0011.t: "Saques Entregues"
 raiding.0011.desc: "Seus saqueadores retornam com [ROOT.Var('raid_loot').GetValue|V0] [gold_i] e [ROOT.Var('raid_loot').GetValue|V0] [prestige_i] em saque e aclamação."
 raiding.0011.desc_non_tribal: "Seus saqueadores retornam com [ROOT.Var('raid_loot').GetValue|V0] [gold_i] em saque, custando a você [SCOPE.ScriptValue('non_tribal_loot_value')|V0] [prestige_i] em prestígio."
 raiding.0012.a.t: "Saques Perdidos"
 raiding.0012.a.desc: "[recipient.Custom('ES_ElLa')|U] [recipient.GetTitledFirstName|l] tomou [ROOT.Var('raid_loot').GetValue|V0] [loot_i] de nós!\nEsta vitória concedeu a [recipient.GetHerHim] [ROOT.Var('raid_prestige').GetValue|V0] [prestige_i]."
 raiding.0012.b.t: "Saques Recuperados"
 raiding.0012.b.desc: "Você capturou [ROOT.Var('raid_loot').GetValue|V0] [loot_i] de [raider.GetTitledFirstName|l]!\nEsta vitória lhe concedeu [ROOT.Var('raid_prestige').GetValue|V0] [prestige_i]."
 raiding.0023.t: "O Terror de [capital_province.GetNameNoTooltip]"
 raiding.0023.desc: "Há anos parto em incursões devastadoras, levando toda a fúria de [raid_leader.GetFaith.HighGodName] a um mundo trêmulo. Afinal, se [raid_leader.GetFaith.HighGodNameSheHe|U] desaprovasse, [raid_leader.GetFaith.HighGodNameSheHe|U] já teria me derrubado, não?\n\nEm vez disso, minha casa repousa cercada pelos luxos roubados de governantes estrangeiros, e escravos exóticos aquecem meu leito.\n\nDe fato, nobres e camponeses tremem igualmente quando me aproximo, e os pais calam crianças chorosas com a ameaça de que eu irei visitá-los."
 raiding.0023.a: "Ha! Que chorem ao ouvir meu nome!"
