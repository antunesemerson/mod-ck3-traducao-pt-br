l_spanish:
 trait_specific_ongoing.1001.t: "Revelações Destruidoras"
 trait_specific_ongoing.1001.desc: "Bato as mãos contra a estrutura da cama para me certificar. Ao olhar para elas, vejo uma rachadura percorrendo uma delas — meus medos se tornaram realidade![ROOT.Char.Custom('ES_OA')] de cristal!\n\nTerei que me mover com suavidade e lentamente, sem movimentos bruscos, sem cantar agudo…"
 trait_specific_ongoing.1001.a: "Ninguém me toque!"
 trait_specific_ongoing.1003.t: "Tenha Paciência"
 trait_specific_ongoing.1003.desc: "Entro no meu [ROOT.Char.Custom('GetChamber')] e me deparo cara a cara com um urso gigante.\n\n\"Ora, docinho! Você abandonou seus amigos?\", eu lhe pergunto, tentando convencê-la a me seguir.\n\nAo sairmos, uma cacofonia de sons cresce — todos os animais em que consegui pôr as mãos me cumprimentam em uníssono!"
 trait_specific_ongoing.1003.a: "Meus queridos! Vou encontrar mais amigos para vocês!"
 trait_specific_ongoing.1003.a.flavor: "Ao sairmos, doce puff me segue"
 trait_specific_ongoing.1003.b: "Eu... eu deveria vendê-los, não deveria?"
 trait_specific_ongoing.1004.t: "Uma Pequena Alegria"
 trait_specific_ongoing.1004.desc: "Sob minha ordem, todos os animais que entram na [court_location.Custom('BaronyTownType')] de [court_location.GetNameNoTier] são trazidos até mim.\n\n"
 trait_specific_ongoing.1004.desc_cat: "Meus servos me trazem a captura mais recente em uma pequena cesta de palha. Os olhos [ROOT.Char.Custom('RandomCatEyeColor')] de um gatinho espiam por cima da borda e um pequeno miado pode ser ouvido de dentro."
 trait_specific_ongoing.1004.desc_dog: "Meus servos me trazem a captura mais recente em uma pequena cesta de palha. Ao olhar para dentro, encontro um filhote de cachorro que late ao me ver e começa a abanar o rabo!"
 trait_specific_ongoing.1004.a: "Este gato agora é meu!"
 trait_specific_ongoing.1004.b: "Este cachorro agora é meu!"
 trait_specific_ongoing.1004.c_cat: "Um gato! Venda-o para a cozinha."
 trait_specific_ongoing.1004.c_dog: "Um cachorro! Venda-o para um canil."
 trait_specific_ongoing.1005.t: "[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('dead_person'))|U] falecid[dead_person.Custom('ES_OA')] recentemente"
 trait_specific_ongoing.1005.desc: "Quando eu caminhava do lado de fora numa noite de neblina, uma aparição surge de repente e fala com uma voz retumbante.\n\n"[ROOT.Char.GetFirstNameNoTooltip]! Faz tanto tempo!".\n\nÉ meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('dead_person') )], [dead_person.GetTitledFirstName|l], de quem eu acreditava que [dead_person.GetDeathReason]!"
 trait_specific_ongoing.1005.a: "Alegro-me por não o ter feito!"
 trait_specific_ongoing.1006.desc: "Há um ano tenho recebido visitas frequentes do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('dead_person') )] [dead_person.GetTitledFirstName|l], dia sim, dia também. [dead_person.GetSheHe|U] insiste que mais ninguém pode ver[dead_person.GetHerHim], mas as pessoas começam a se preocupar...\n\nComo vou conseguir me concentrar no meu [ROOT.Char.Custom('child_object_of_interest')] quando [dead_person.GetSheHe] age assim?!"
 trait_specific_ongoing.1006.a: "Deixe-me em paz!"
 trait_specific_ongoing.1007.t: "Um Sonho de Vidro"
 trait_specific_ongoing.1007.desc: "Eu rastejo de volta à consciência após um sono tão profundo que quase me perdi.\n\nSonhei com grandes painéis de vidro me levando mais perto do sol em um vórtice de estrelas. Estendendo-me o máximo que pude, consegui pegar o corpo celestial e sua glória flamejante - puxando até que ele tombou e caiu na Terra. Abraçando-o, senti serenidade e calor que nunca antes experimentei!"
 trait_specific_ongoing.1007.a: "Tão esplêndido, tão grandioso!"
 trait_specific_ongoing.1007.a.tt: "Agora posso tomar uma decisão para construir um #bold Monumento de Vidro#!"
 trait_specific_ongoing.1008.t: "Perdendo a realidade"
 trait_specific_ongoing.1008.desc: "Passava o dia com meu amig[friend.Custom('ES_OA')] [friend.GetTitledFirstName|l] quando, de repente, tudo começa a girar...\n\nCinza aço, vermelho sangue, um rosto gritando, mares de vermelho escuro...\n\nMe descubro agachad[ROOT.Char.Custom('ES_OA')] sobre o corpo dele, com uma faca ensanguentada na mão."
 trait_specific_ongoing.1008.a: "[friend.GetFirstNameNoTooltip]! Oh não... Devo esconder o corpo."
 trait_specific_ongoing.1008.b: "Devo confessar!"
 trait_specific_ongoing.1009.t: "Impossível de Ferir"
 trait_specific_ongoing.1009.desc: "\"Não tenham medo!\" Grito do topo do prédio para acalmar as pessoas reunidas embaixo. \"Eu não posso ser ferido!\"\n\nSalto graciosamente da borda e rio enquanto meu estômago arde com a queda."
 trait_specific_ongoing.1009.a: "HAHAHA - AAAAH!"
 trait_specific_ongoing.1009.a.success: "Eu acerto a aterrissagem"
 trait_specific_ongoing.1009.a.failure: "Eu não sou tão invencível como pensei que fosse"
 trait_specific_ongoing.1010.t: "Meu Cavalo [ROOT.Char.Custom('WarhorseStoryName')]"
 trait_specific_ongoing.1010.desc: "Meu belo cavalo de guerra [ROOT.Char.Custom('WarhorseStoryName')] me transporta com facilidade até minha corte reunida [ROOT.Char.Custom('GetCourt')|l].\n\nEste cavalo é a perfeição! Vocês passarão pelo menos uma hora por dia cuidando dele, seja treinando-o ou escovando-o. [ROOT.Char.Custom('WarhorseStoryName')] significa mais para mim do que qualquer outro. Dispensados."
 trait_specific_ongoing.1010.a: "Todos se curvarão diante dele!"
 trait_specific_ongoing.1011.t: "Fabricação de Leis"
 trait_specific_ongoing.1011.desc: "Enquanto realizo a corte, fico distraído com as vestimentas deslumbrantes de todos. Tecidos luxuosos, joias... bah!\n\nPor que insistem nisso? Não sabem que posso enxergar até o âmago deles de qualquer forma? As coisas seriam mais fáceis se alguém pudesse... simplesmente proibir roupas.\n\n...Espere."
 trait_specific_ongoing.1011.a: "Roupas agora estão proibidas. Tirem-nas!"
 all_adult_courtiers: "Todos os cortesãos adultos"
 trait_specific_ongoing.1012.t: "Visões de Escuridão"
 trait_specific_ongoing.1012.desc: "Não consigo lembrar de ter acontecido, mas quando volto para o [ROOT.Char.Custom('ResidenceBuilding')], meus [ROOT.Char.Custom('GetCourtierPlural')] me contam tudo.\n\nEstive correndo por aí, avisando as pessoas de que os morcegos estão chegando. São tantos que conseguem bloquear o sol e levar [capital.GetNameNoTier] para algum lugar terrível onde [ROOT.Char.GetFaith.PositiveAfterLife] não pode ser alcançado."
 trait_specific_ongoing.1012.a: "O que está acontecendo comigo..."
 trait_specific_ongoing.1012.b: "Oh, estarei preparado quando eles vierem!"
 ### DIVINE OR WITCHY VISIONS? ###
 trait_specific_ongoing.2001.t: "Uma Mensagem do Além"
 trait_specific_ongoing.2001.start.desc: "Eu sei que eles estão vindo antes de vê-los. Um repentino fluxo de"
 trait_specific_ongoing.2001.dread.desc: "medo,"
 trait_specific_ongoing.2001.anxiety.desc: "ansiedade,"
 trait_specific_ongoing.2001.euphoria.desc: "euforia,"
 trait_specific_ongoing.2001.joy.desc: "alegria,"
 trait_specific_ongoing.2001.nausea.desc: "náusea,"
 trait_specific_ongoing.2001.walls.desc: "meu [ROOT.Char.Custom('GetChamber')] se fechando,"
 trait_specific_ongoing.2001.sulfur.desc: "o cheiro forte de enxofre"
 trait_specific_ongoing.2001.smoke.desc: "um cheiro acre de fumaça"
 trait_specific_ongoing.2001.citrus.desc: "o toque picante de citrinos na minha língua"
 trait_specific_ongoing.2001.lavender.desc: "um sopro fresco de lavanda"
 trait_specific_ongoing.2001.bile.desc: "o cheiro azedo da bile"
 trait_specific_ongoing.2001.incense.desc: "o odor doce do incenso"
 trait_specific_ongoing.2001.blood.desc: "o cheiro metálico de sangue"
 trait_specific_ongoing.2001.stand_before_me.desc: "… e então se apresentam diante de mim.\n\n[ROOT.Char.Custom('one_syllable_number')|U]"
 trait_specific_ongoing.2001.glowing.desc: "seres brilhantes,"
 trait_specific_ongoing.2001.hazy.desc: "silhuetas nebulosas,"
 trait_specific_ongoing.2001.dark.desc: "seres sombrios,"
 trait_specific_ongoing.2001.shaking.desc: "seres trêmulos,"
 trait_specific_ongoing.2001.shimmering.desc: "seres brilhantes,"
 trait_specific_ongoing.2001.speaking.desc: "falando em um coro de"
 trait_specific_ongoing.2001.whispers.desc: "sussurros."
 trait_specific_ongoing.2001.screeches.desc: "gritos estridentes."
 trait_specific_ongoing.2001.chimes.desc: "sinos."
 trait_specific_ongoing.2001.raindrops.desc: "gotas de chuva."
 trait_specific_ongoing.2001.thunder.desc: "trovão."
 trait_specific_ongoing.2001.end.desc: "Quem são essas criaturas e o que elas querem de mim?"
 trait_specific_ongoing.2001.a: "Devem ser mensageiros de [ROOT.Char.GetFaith.HighGodName]!"
 trait_specific_ongoing.2001.a.success: "Convences [clergy.Custom('ES_AlAla')] [clergy.GetCouncilTitle] [clergy.GetShortUIName] de que suas visões são sagradas"
 trait_specific_ongoing.2001.a.failure: "[clergy.GetCouncilTitle|U] [clergy.GetShortUIName] está perturbad[clergy.Custom('ES_OA')] por suas histórias"
 trait_specific_ongoing.2001.b: "Isso é algo mais, um poder mais profundo, e eu #EMP quero#! isso."
 trait_specific_ongoing.2001.c: "Eu… só estou cansad[ROOT.Char.Custom('ES_OA')] Preciso cuidar melhor de mim mesmo."
 trait_specific_ongoing.2001.b.success: "Você encontra conhecimento secreto."
 trait_specific_ongoing.2001.b.success.tt: "Você tem a escolha de abraçar novas verdades ou permanecer fiel a [clergy.GetFaith.HighGodName]."
 trait_specific_ongoing.2001.b.failure: "Você encontra alguns livros interessantes, mas regulares."
 trait_specific_ongoing.2002.desc: "Minha busca pelo conhecimento prometido pelos Mensageiros me levou a alguns lugares incomuns. Becos escuros, tavernas decadentes, livrarias empoeiradas… fui onde [ROOT.Char.GetTitleAsNameNoTooltip] algum[ROOT.Char.Custom('ES_OA')] jamais foi, e minha recompensa foi realmente grande.\n\nDescobri vários tomos sobre [ROOT.Char.GetFaith.WitchGodName] e os poderes que concede a seus seguidores. Estou tentad[ROOT.Char.Custom('ES_OA')], não posso negar."
 trait_specific_ongoing.2002.a: "[ROOT.Char.GetFaith.WitchGodMistressMaster] das trevas, sou seu humilde servo[ROOT.Char.Custom('ES_OA')] mais humilde servidor[ROOT.Char.Custom('ES_XA')]!"
 trait_specific_ongoing.2002.b: "Estou me envolvendo demais. Isso é muito perigoso."
 trait_specific_ongoing.2003.desc: "Encontrei muitos tomos interessantes em minha busca por conhecimento oculto, mas nada realmente especial.\n\nTemo que possa ter interpretado erroneamente a vontade daqueles seres estranhos - ou imaginado tudo isso!"
 trait_specific_ongoing.2003.a: "Será que minha mente está me enganando?"
 ### WHICH GOD/SAINT IS SPEAKING TO ME? ###
 trait_specific_ongoing.2010.t: "Foco Divino"
 trait_specific_ongoing.2010.possessed_start.desc: "Tenho recebido mensagens frequentes de três seres sagrados. Eles vêm até mim quase todas as noites, seus rostos envoltos em luz divina. Acho que devem ser os espíritos de"
 trait_specific_ongoing.2010.zeal_start.desc: "Desde cerca de um mês atrás, tenho tido um sonho recorrente, no qual discuto teologia com"
 trait_specific_ongoing.2010.health.desc: "[ROOT.Char.GetFaith.HealthGodName],"
 trait_specific_ongoing.2010.fertility.desc: "[ROOT.Char.GetFaith.FertilityGodName],"
 trait_specific_ongoing.2010.wealth.desc: "[ROOT.Char.GetFaith.WealthGodName],"
 trait_specific_ongoing.2010.household.desc: "[ROOT.Char.GetFaith.HouseholdGodName],"
 trait_specific_ongoing.2010.knowledge.desc: "[ROOT.Char.GetFaith.KnowledgeGodName],"
 trait_specific_ongoing.2010.war.desc: "[ROOT.Char.GetFaith.WarGodName],"
 trait_specific_ongoing.2010.trickster.desc: "[ROOT.Char.GetFaith.TricksterGodName],"
 trait_specific_ongoing.2010.and_health.desc: "e [ROOT.Char.GetFaith.HealthGodName]."
 trait_specific_ongoing.2010.and_fertility.desc: "e [ROOT.Char.GetFaith.FertilityGodName]."
 trait_specific_ongoing.2010.and_wealth.desc: "e [ROOT.Char.GetFaith.WealthGodName]."
 trait_specific_ongoing.2010.and_household.desc: "e [ROOT.Char.GetFaith.HouseholdGodName]."
 trait_specific_ongoing.2010.and_knowledge.desc: "e [ROOT.Char.GetFaith.KnowledgeGodName]."
 trait_specific_ongoing.2010.and_war.desc: "e [ROOT.Char.GetFaith.WarGodName]."
 trait_specific_ongoing.2010.and_trickster.desc: "e [ROOT.Char.GetFaith.TricksterGodName]."
 trait_specific_ongoing.2010.end.desc: "\n\nTalvez eles me tenham escolhido para espalhar sua palavra e me recompensar com suas bênçãos em troca? Vou rezar para..."
 trait_specific_ongoing.2010.health: "[ROOT.Char.GetFaith.HealthGodName] para saúde e longevidade."
 trait_specific_ongoing.2010.fertility: "[ROOT.Char.GetFaith.FertilityGodName] para nova vida e fertilidade."
 trait_specific_ongoing.2010.wealth: "[ROOT.Char.GetFaith.WealthGodName] para riqueza e abundância."
 trait_specific_ongoing.2010.household: "[ROOT.Char.GetFaith.HouseholdGodName] para uma família feliz."
 trait_specific_ongoing.2010.household.tt: "Todos os seus [close_family_members|lE] e [spouses|lE]"
 trait_specific_ongoing.2010.knowledge: "[ROOT.Char.GetFaith.KnowledgeGodName] para conhecimento e sabedoria."
 trait_specific_ongoing.2010.war: "[ROOT.Char.GetFaith.WarGodName] para força na batalha."
 trait_specific_ongoing.2010.trickster: "[ROOT.Char.GetFaith.TricksterGodName] para sagacidade e sorte."
 trait_specific_ongoing.2010.fallback: "Não posso presumir ser escolhid[ROOT.Char.Custom('ES_OA')]."
 ### COURT CHAPLAIN WANTS TO TREAT YOU ###
 trait_specific_ongoing.2015.t: "Por [ROOT.Char.GetFaith.HighGodName], seja curad[ROOT.Char.Custom('ES_OA')]"
 trait_specific_ongoing.2015.desc: "Os pilares do local de culto começam a se curvar quando outro episódio me acomete. Não faço nenhum som, mas sei que o [chaplain.Custom2('MyCharacterIntroduction', ROOT.Char)] sabe que algo está errado.\n\nDepois de [ROOT.Char.Custom('GetReligiousRite')], ele se aproxima com uma expressão preocupada. "Devem ser [ROOT.Char.GetFaith.DevilName] e seus lacaios os que tomam posse do vosso corpo, [ROOT.Char.Custom('FormOfAddressForLiege')]. "Deveis recorrer a [ROOT.Char.GetFaith.HighGodName] para vos salvar, antes que seja tarde demais!"."
 trait_specific_ongoing.2015.physician.desc: "\n\n[physician.Custom2('MyCharacterIntroduction', ROOT.Char)|U] deve ter[chaplain.GetHerHim] ouvido. "O que [ROOT.Char.GetTitleAsNameNoTooltip] precisa é paz e tranquilidade, não ameaças de condenação!""
 trait_specific_ongoing.2015.a: "Vou rezar para afastar a escuridão."
 trait_specific_ongoing.2015.a.success: "As orações são eficazes."
 trait_specific_ongoing.2015.a.failure: "Seus ataques continuam acontecendo."
 trait_specific_ongoing.2015.b: "O jejum purificará minha alma."
 trait_specific_ongoing.2015.b.success: "O jejum é eficaz."
 trait_specific_ongoing.2015.b.failure_health: "O jejum te deixa enfraquecid[ROOT.Char.Custom('ES_OA')]"
 trait_specific_ongoing.2015.b.failure_eating: "Você luta com as regras rigorosas."
 trait_specific_ongoing.2015.b.failure_eating.tt: "Sua atitude em relação à comida mudará."
 trait_specific_ongoing.2015.c: "O que você sugere, [physician.GetFirstNameNoTooltip]?"
 trait_specific_ongoing.2015.c.success: "O tratamento do médico é eficaz."
 trait_specific_ongoing.2015.e: "Deixe-me em paz!"
 trait_specific_ongoing.2016.physician1.desc: "[physician.GetTitledFirstName] me disse para descansar bastante e evitar objetos brilhantes, barulhos altos e condições climáticas extremas."
 trait_specific_ongoing.2016.physician2.desc: "\n\nOs conselhos devem ter funcionado, porque não tive nenhum episódio desde então!"
 trait_specific_ongoing.2016.fasting1.desc: "[chaplain.GetTitledFirstName] me instruiu a ter apenas uma refeição pequena à noite e me deu uma longa lista de alimentos para excluir. Laticínios, carne, ovos, doces, álcool, óleos, especiarias fortes, vegetais que crescem abaixo da terra..."
 trait_specific_ongoing.2016.fasting2.desc: "\n\nFoi um regime difícil de seguir, mas deve ter funcionado, pois não tive nenhum episódio desde então!"
 trait_specific_ongoing.2016.prayer1.desc: "[chaplain.GetTitledFirstName] me disse para passar pelo menos três horas por dia em oração focada e me orientou para dezenas de seções no [ROOT.Char.GetFaith.ReligiousText] para estudos mais aprofundados."
 trait_specific_ongoing.2016.prayer2.desc: "\n\nMinha dedicação foi recompensada, pois não tive nenhum episódio desde então!"
 trait_specific_ongoing.2016.a.physician: "Você tem minha gratidão, [physician.GetFirstNameNoTooltip]!"
 trait_specific_ongoing.2016.a.chaplain: "[ROOT.Char.GetFaith.HighGodName] é poderoso!"
 trait_specific_ongoing.2017.prayer2.desc: "\n\nFiz o meu melhor, mas parece que não sou dign[ROOT.Char.Custom('ES_OA')] da misericórdia de [ROOT.Char.GetFaith.HighGodNamePossessive]. Meus episódios são tão regulares quanto sempre."
 trait_specific_ongoing.2017.physician2.desc: "\n\nFiz todo o possível para seguir o conselho, mas meus episódios continuam tão regulares como sempre."
 trait_specific_ongoing.2017.a: "Talvez eu tenha feito algo errado?"
 trait_specific_ongoing.2018.fasting2.desc: "\n\nFiz o meu melhor para seguir o regime rigoroso, mas só me sinto mais fraco. Meus ataques são tão regulares quanto antes, e o cansaço que segue é ainda mais difícil de gerenciar."
 trait_specific_ongoing.2018.a: "Desisto. Preciso de minha força."
 trait_specific_ongoing.2019.fasting2.desc: "\n\nAs regras eram difíceis de seguir e acabei me obcecando[ROOT.Char.Custom('ES_OA')] com cada detalhe. A comida não sai da minha cabeça."
 trait_specific_ongoing.2019.a: "Ninguém saberá se eu quebrar as regras... Apenas um pouco!"
 trait_specific_ongoing.2019.b: "Não posso falhar, há muito em jogo!"
 ### POSSESSED REOCCURANCE EVENT ###
 trait_specific_ongoing.2020.t: "Uma Sensação Familiar"
 trait_specific_ongoing.2020.a: "Otra vez no! Me #EMP niego#!! Esto #EMP no#! está pasando…"
 trait_specific_ongoing.2020.start.desc: "Uma súbita onda de"
 trait_specific_ongoing.2020.dread.desc: "pavor"
 trait_specific_ongoing.2020.fear.desc: "medo"
 trait_specific_ongoing.2020.anxiety.desc: "ansiedade"
 trait_specific_ongoing.2020.nausea.desc: "náusea"
 trait_specific_ongoing.2020.anger.desc: "raiva"
 trait_specific_ongoing.2020.end.desc: "me domina à medida que o chão começa a torcer e entortar sob meus pés. Mesmo que eu tenha sido poupado por um tempo considerável, eu reconheço imediatamente os sinais.\n\nFujo para meus aposentos antes que comece a chorar — ou perca o controle do meu corpo completamente..."
 trait_specific_ongoing.2025.t: "Lugar Nenhum Para Se Esconder"
 trait_specific_ongoing.2025.start.desc: "A pessoa que tenho à frente parece estranha. O rosto está retorcido... se retorce? Será que é mesmo human[dummy_gender.Custom('ES_OA')]?\n\nA realidade se #EMP abala#!, e percebo que estou tendo outro surto de [ROOT.Char.Custom('PossessedEpisode')]... diante da minha [ROOT.Char.Custom('GetCourt')|l] reunida."
 trait_specific_ongoing.2025.end.desc: "invade minhas narinas, tento falar, mas meus lábios não se movem."
 trait_specific_ongoing.2025.a: "Preciso sair daqui, antes que piore!"
 trait_specific_ongoing.2025.b: "Sou [ROOT.Char.GetTitleAsNameNoTooltip]. Não me importa o que pensem."
 trait_specific_ongoing.2025.b.success: "Seus [ROOT.Char.Custom('GetCourtierPlural')] estão impressionados com sua coragem"
 trait_specific_ongoing.2025.b.failure: "Seus [ROOT.Char.Custom('GetCourtierPlural')] estão repulsos"
 trait_specific_ongoing.2025.c: "Onde está [helper.GetFirstNameNoTooltip]? Eu preciso da sua ajuda!"
 trait_specific_ongoing.2025.d: "É uma mensagem de [ROOT.Char.GetFaith.HighGodName]! Vou contar a eles!"
 trait_specific_ongoing.2025.d.success: "Seus [ROOT.Char.Custom('GetCourtierPlural')] acreditam em você"
 trait_specific_ongoing.2025.d.failure: "Seus [ROOT.Char.Custom('GetCourtierPlural')] acham que você está mentindo"
 trait_specific_ongoing.2025.e: "Eu poderia fingir que foi uma visão de [ROOT.Char.GetFaith.HighGodName]..."
 trait_specific_ongoing.2025.e.failure: "Seus [ROOT.Char.Custom('GetCourtierPlural')] veem através do seu plano"
 trait_specific_ongoing.2025.every_courtier: "Todo [actor.Custom('GetCourtier')]"
 trait_specific_ongoing.3001.t: "A Miséria Adora Companhia"
 trait_specific_ongoing.3001.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('sympathetic_character') )], [sympathetic_character.Custom('ES_ElLa')] [sympathetic_character.GetTitledFirstName|l], quando termino de me dirigir à minha [ROOT.Char.Custom('GetCourt')], com as pessoas ainda conversando ao redor.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], ouvi que vós também sofreis de períodos de… melancolia. Talvez pudéssemos falar sobre nossas experiências?"."
 trait_specific_ongoing.3001.a: "Venha, temos muito a conversar."
 trait_specific_ongoing.3001.b: "Eu não tenho tais problemas! Do que você está falando?!"
 trait_specific_ongoing.3001.b.tt: "Ahaha... ha."
 trait_specific_ongoing.3002.t: "Soluções de Longo Prazo"
 trait_specific_ongoing.3002.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U]", uma tarde, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('court_physician'))] [court_physician.Custom('ES_ElLa')], [court_physician.GetTitledFirstName|l]. "Tenho alguns remédios que poderíamos tentar para sua melancolia insistente. Poderia piorar um pouco antes de melhorar, mas vale a pena tentar!"."
 trait_specific_ongoing.3002.a: "Eu faria qualquer coisa para me livrar disso."
 trait_specific_ongoing.3002.b: "Tudo o que preciso é de uma longa soneca. Ou três."
 trait_specific_ongoing.3003.desc: "\"Para curar esse tipo de aflição, é muito importante arejar os pensamentos ruins,\" m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('court_physician'))] [court_physician.GetTitledFirstName|l] me assegura. \"Venha me ver algumas vezes a cada semana e conversaremos sobre o que está pesando em você.\""
 trait_specific_ongoing.3003.a: "Vou tirar um tempo."
 trait_specific_ongoing.3003.b: "Tudo isso é demais para mim – vou voltar para a cama."
 trait_specific_ongoing.3004.desc: ""Para você se sentir melhor, precisamos trabalhar tanto nos seus pensamentos quanto nas suas rotinas", meu/minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('court_physician'))] [court_physician.GetTitledFirstName|l] me informa. "Vou ajudá-lo a identificar seus pensamentos e hábitos negativos e trabalhar para mudá-los.""
 trait_specific_ongoing.3004.a: "Faz sentido!"
 trait_specific_ongoing.3005.desc: ""O exercício e a estimulação corporal são eficazes para equilibrar seus humores", me diz meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('court_physician'))] [court_physician.GetTitledFirstName|l]. "Você dará três voltas por sua residência todos os dias"."
 trait_specific_ongoing.3005.a: "Vou fazer o meu melhor."
 trait_specific_ongoing.3006.desc: "\"Esses maus pensamentos e essa melancolia são claramente resultado de espíritos malignos ou demônios,\" m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('court_physician'))] [court_physician.GetTitledFirstName|l] me diz. \"Vamos designar um [ROOT.Char.Custom('DefaultPriestTitle')] para orar por você e banir o mal de dentro de você.\""
 trait_specific_ongoing.3006.a: "O poder de [ROOT.Char.GetFaith.HighGodName] me curará!"
 trait_specific_ongoing.3007.desc: "Após todas as coisas que m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('court_physician'))] [court_physician.GetTitledFirstName|l] me fez passar, aos poucos chego à realização de que estou #EMP sentindo#! as coisas novamente."
 trait_specific_ongoing.3007.desc_ending: "\n\nComo o sol rompendo uma espessa camada de nuvens, sinto a felicidade retornando à minha alma."
 trait_specific_ongoing.3007.a: "Eu... Eu estou feliz!"
 trait_specific_ongoing.3008.desc_physician_died: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('court_physician'))] [court_physician.GetTitledFirstName|l] faleceu antes que pudesse terminar de me tratar da melancolia, mas as instruções que deixou me ajudaram a concluir o tratamento por mim mesm[ROOT.Char.Custom('ES_OA')]."
 trait_specific_ongoing.3008.desc_no_depression: "Não preciso continuar a rotina que m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('court_physician'))] [court_physician.GetTitledFirstName|l] estabeleceu para me livrar da melancolia, pois já estou livre da aflição!"
 trait_specific_ongoing.3008.desc_fallback: "M [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('court_physician'))] [court_physician.GetTitledFirstName|l] não terminou seu tratamento da minha melancolia, mas sinto a escuridão se dissipando de mim."
 trait_specific_ongoing.3009.t: "Dias Pesados"
 trait_specific_ongoing.3009.desc: "Um dia segue o outro, implacável, enquanto minha mente se afoga em exaustão e desespero.\n\nÀs vezes, até mesmo levantar da cama de manhã é demais para mim."
 trait_specific_ongoing.3009.a: "Só preciso deitar..."
 ### Someone thinks you're slothful ###
 trait_specific_ongoing.3015.t: "Comentários Maldosos"
 trait_specific_ongoing.3015.start.desc: "Seja um comentário sarcástico ou um olhar desaprovador, [unsympathetic.Custom2('MyCharacterIntroduction', ROOT.Char)] constantemente demonstra seu desdém pela minha condição. Enquanto eu"
 trait_specific_ongoing.3015.council.desc: "me apresso para a reunião do conselho, mais uma vez atrasado,"
 trait_specific_ongoing.3015.withdraw.desc: "me levanto para me retirar mais cedo do jantar,"
 trait_specific_ongoing.3015.book.desc: "percebo que esqueci o livro que me emprestou,"
 trait_specific_ongoing.3015.end.desc: "Sei exatamente como [unsympathetic.GetSheHe].\n\n\"Por que eu ainda me surpreendo?\", diz com um suspiro [unsympathetic.GetTitledFirstNameNoTooltip|l], e meu coração afunda."
 trait_specific_ongoing.3015.a: "Vou provar que ele/ela está errado(a)!"
 trait_specific_ongoing.3015.b: ""Cale a boca, seu [unsympathetic.Custom2('InsultNoun', ROOT.Char)] [unsympathetic.Custom2('InsultAdjective', ROOT.Char)]!"."
 trait_specific_ongoing.3015.c: "[unsympathetic.GetFirstNameNoTooltip] tem razão. Não valho nada…"
 trait_specific_ongoing.3015.a.success: "Eu supero minha letargia"
 trait_specific_ongoing.3015.a.neutral: "Ainda estou cansad[ROOT.Char.Custom('ES_OA')]"
 trait_specific_ongoing.3015.a.failure: "Forçar-me é exaustivo"
 trait_specific_ongoing.5001.t: "Encontro Privado"
 trait_specific_ongoing.5001.desc_opening: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('victim') )], [victim.Custom('ES_ElLa')] [victim.GetTitledFirstName|l], e eu nos encontramos sozinhos enquanto o restante da minha [ROOT.Char.Custom('GetCourt')|l] foi se deitar.\n\n"
 trait_specific_ongoing.5001.desc_small: "Enquanto falamos, não consigo deixar de notar os braços fibrosos, a carne esticada sob a pele…"
 trait_specific_ongoing.5001.desc_big: "Enquanto conversamos, não consigo deixar de notar os braços rechonchudos, carne e gordura repousando em montes suculentos…"
 trait_specific_ongoing.5001.desc: "Enquanto conversamos, não consigo deixar de notar sua pele e o movimento por baixo enquanto ela se move…"
 trait_specific_ongoing.5001.a: "Um lanche à meia-noite seria bem-vindo."
 trait_specific_ongoing.5001.b: "\"Por favor, [victim.GetFirstNameNoTooltip], continue."
 trait_specific_ongoing.5002.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('murderer') )] [murderer.GetTitledFirstName|l] e eu nos encontramos a sós enquanto o resto da corte foi dormir.\n\nÀ medida que a noite avança, [murderer.GetSheHe] cada vez fica mais intens[murderer.Custom('ES_OA')], seus olhos não se desviam de nenhuma parte exposta da minha pele. Quando estou prestes a questionar suas intenções, [murderer.GetSheHe] saca uma faca e sorri."
 trait_specific_ongoing.5002.a: "Não, não, por favor – NÃO! AAAH!"
 trait_specific_ongoing.5003.t: "Tentações da Carne"
 trait_specific_ongoing.5003.desc_opening: "Meu serviç[servant.Custom('ES_EA')][servant.Custom('ES_ElLa')] [servant.GetTitledFirstName|l], chamou minha atenção… A forma de seus braços, a curvatura de seu pescoço… Quando [servant.GetHerHim] o encurralo entre os depósitos de mantimentos, pergunta-me o que quero de [servant.GetSheHe] com um sorriso sedutor nos lábios.\n\n"Anseio pelo seu corpo", respondo enquanto me aproximo contra [servant.GetSheHe]."
 trait_specific_ongoing.5003.desc_big: ""Está tão roliç[servant.Custom('ES_OA')]… tão chei[servant.Custom('ES_OA')] de #EMP vida#!!""
 trait_specific_ongoing.5003.desc: ""Está tão chei[servant.Custom('ES_OA')] de #EMP vida#!!""
 trait_specific_ongoing.5003.a: "Em um movimento suave, corto a garganta."
 trait_specific_ongoing.5003.b: "Puxo a [servant.Custom('GetUpperClothingArticle')]."
 trait_specific_ongoing.5004.t: "Parada para Lanche"
 trait_specific_ongoing.5004.desc: "Enquanto viajo com minha comitiva em [county.GetNameNoTier], encontramos uma casa isolada com uma velha morando sozinha.\n\nPeço à minha comitiva que espere na estrada e entro sozinh[ROOT.Char.Custom('ES_OA')] na casa."
 trait_specific_ongoing.5004.a: "Por favor, senhora, me dê uma mão!"
 trait_specific_ongoing.5004.b: "Então, me diga, como estão as coisas por aqui?"
 trait_specific_ongoing.5005.t: "Lanche Tarde da Noite"
 trait_specific_ongoing.5005.desc: "Numa madrugada, dou de cara com meu[ROOT.Char.Custom2('RelationToMe', SCOPE.sC('courtier'))] [courtier.GetTitledFirstName|l] tirando uma soneca.\n\nNunca tinha reparado antes, mas a verdade é que tem um corpo delicioso…"
 trait_specific_ongoing.5005.a: "É #EMP quase#! mais do que posso suportar!"
 trait_specific_ongoing.5005.b: "[courtier.GetHerHim|U] vou acordar essa pessoa… ela não pode estar confortável aqui fora[courtier.Custom('ES_OA')] aqui."
 trait_specific_ongoing.6001.t: "Pego com as Calças Arriadas"
 trait_specific_ongoing.6001.desc: "Para me animar antes de encontrar meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('lover') )], [lover.Custom('ES_ElLa')] [lover.GetTitledFirstName|l], tiro [ROOT.Char.Custom('DeviantObjectArticle')]… #EMP Oh…!#!\n\nEstou tão concentrad[ROOT.Char.Custom('ES_OA')], explorando seus detalhes, que não ouço alguém entrar em meu [ROOT.Char.Custom('GetRoom')]. O que ouço é o suspiro forte de [lover.GetFirstNameNoTooltip] quando vê o que estou fazendo."
 trait_specific_ongoing.6001.a: "Eu tenho um extra... Se você quiser se juntar?"
 trait_specific_ongoing.6001.a.success: "[lover.GetSheHe] está interessad"
 trait_specific_ongoing.6001.a.failure: "[lover.GetSheHe|U] não compartilha do seu... gosto"
 trait_specific_ongoing.6001.b_woman: "Eu... Um – Um médico recomendou para a vitalidade!"
 trait_specific_ongoing.6001.b_man: "Eu... Um – Um médico recomendou para a virilidade!"
 trait_specific_ongoing.6002.t: "Senhor Devass"
 trait_specific_ongoing.6002.desc: "Vou fazer uma visita ao meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('liege') )], [liege.Custom('ES_ElLa')] [liege.GetTitledFirstName|l], e me apresento nos aposentos dela.\n\nAbro a porta e a [liege.GetHerHim] encontro na agonia do êxtase que lhe proporciona [ROOT.Char.Custom('DeviantObjectArticle')]... Eu nem sequer sabia que pudesse ser usado assim!"
 trait_specific_ongoing.6002.a: "Oh, oh, oh, agora #EMP isso#! é interessante!"
 trait_specific_ongoing.6002.b: "Oh, isso... isso parece #EMP interessante#!."
 trait_specific_ongoing.6002.c: "Qual o significado disso?!"
 trait_specific_ongoing.6002.d: "Eu vou apenas sair."
 trait_specific_ongoing.6003.t: "Depravação"
 trait_specific_ongoing.6003.desc_opening: "Estou em meio às dores do êxtase, com a ajuda da minha [ROOT.Char.Custom('DeviantObjectArticle')] quando meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('vassal') )] [vassal.GetTitledFirstName|l] entra na alcova.\n\n"
 trait_specific_ongoing.6003.desc_deviant: "Seus olhos se arregalam – não de nojo, mas de interesse. \"Oh, eu nunca pensei em usar assim #EMP isso#!. Você é uma inspiração!\""
 trait_specific_ongoing.6003.desc_joined: "Vejo como hesita, mas então fecha a porta e entra. "Oh, [liege.GetTitledFirstNameNoTooltip|l], isso parece… Parece #EMP interesante#!! Deixem-me ajudar vocês"."
 trait_specific_ongoing.6003.desc_exposed: "Com horror, [vassal.Custom('ES_OA')] abre a porta com força, [liege.GetTitledFirstNameNoTooltip|l], o que significa isso?!"
 trait_specific_ongoing.6003.desc_ew: "Horrorizad[vassal.Custom('ES_OA')] , sai do quarto caminhando para trás, "Vamos... Vamos fingir que não vi nada, certo?""
 trait_specific_ongoing.6003.a: "#EMP Ahhh...!#!"
