l_spanish:
 send_poem_interaction: "Enviar Poema"
 send_poem_interaction_desc: "Enviar uma obra pessoal tocante para [recipient.GetTitledFirstNameNoTooltip|l]"
 send_poem_interaction.positive_auto_accept.tt: "Como este poema é positivo, [recipient.GetFirstNameNoTooltip] pode aceitá-lo imediatamente se tiver uma [opinion|lE] boa o bastante sobre você"
 SEND_POEM_ROMANCE: "Uma Obra sobre Romance"
 SEND_POEM_MOURNING: "Uma Obra sobre Luto"
 SEND_POEM_LEGACY: "Uma Obra sobre Legado"
 SEND_POEM_STRIFE: "Uma Obra sobre Conflito"
 SEND_POEM_INCOMPETENCE: "Uma Obra detalhando a Incompetência deles"
 send_poem_interaction.success: "O Poema é Elogiado"
 send_poem_interaction.failure: "O Poema é Zombado"
 trait_specific_interactions.000.generate_poem: "#POE [actor.Custom('GeneratePoem_Title')]#!\n[actor.Custom('GeneratePoem_Intro_Rhyming')]\n[actor.Custom('GeneratePoem_Outro_Rhyming')]"
 trait_specific_interactions.000.intro.part1: "A mais recente obra do meu [recipient.Custom2('RelationToMe', SCOPE.sC('actor'))], [actor.GetTitledFirstName], tem feito muito sucesso na [actor.Custom('GetCourt')] ultimamente:"
 trait_specific_interactions.000.intro.part3: "e [actor.GetFirstNameNoTooltip] a dedicou publicamente a #EMP mim.#!"
 trait_specific_interactions.000.outro: "Até agora, mantive meus pensamentos para mim mesmo, mas o burburinho cresceu demais para ser ignorado por muito mais tempo."
 trait_specific_interactions.0001.t: "Um Toque de Romance"
 trait_specific_interactions.0001.desc.intro: "$trait_specific_interactions.000.intro.part1$ a obra lida com sentimentos de amor e romance, $trait_specific_interactions.000.intro.part3$"
 trait_specific_interactions.0001.desc.poem: "\n\n$trait_specific_interactions.000.generate_poem$\n\n"
 trait_specific_interactions.0001.desc.outro: "$trait_specific_interactions.000.outro$"
 trait_specific_interactions.0001.a: "Não sei bem como me sinto em relação a isso..."
 trait_specific_interactions.0001.b: "[actor.GetFirstNameNoTooltip], vejo que isso é #EMP verdadeiramente#! sincero!"
 trait_specific_interactions.0001.c: "Pfft, besteira!"
 trait_specific_interactions.0011.t: "Conforto em Palavras"
 trait_specific_interactions.0011.desc.intro: "$trait_specific_interactions.000.intro.part1$ a obra lida com sentimentos de tristeza e perda, $trait_specific_interactions.000.intro.part3$"
 trait_specific_interactions.0011.desc.poem: "\n\n$trait_specific_interactions.000.generate_poem$\n\n"
 trait_specific_interactions.0011.desc.outro: "$trait_specific_interactions.000.outro$"
 trait_specific_interactions.0011.a: "$trait_specific_interactions.0001.a$"
 trait_specific_interactions.0011.b: "$trait_specific_interactions.0001.b$"
 trait_specific_interactions.0011.c: "$trait_specific_interactions.0001.c$"
 trait_specific_interactions.0021.t: "Versos sobre Legado"
 trait_specific_interactions.0021.desc.intro: "$trait_specific_interactions.000.intro.part1$ a obra lida com memória e o que deixamos para trás, $trait_specific_interactions.000.intro.part3$"
 trait_specific_interactions.0021.desc.poem: "\n\n$trait_specific_interactions.000.generate_poem$\n\n"
 trait_specific_interactions.0021.desc.outro: "$trait_specific_interactions.000.outro$"
 trait_specific_interactions.0021.a: "$trait_specific_interactions.0001.a$"
 trait_specific_interactions.0021.b: "$trait_specific_interactions.0001.b$"
 trait_specific_interactions.0031.t: "Esforços no Meio do Conflito"
 trait_specific_interactions.0031.desc.intro: "$trait_specific_interactions.000.intro.part1$ a obra lida com o sucesso e a grandeza crescente, $trait_specific_interactions.000.intro.part3$"
 trait_specific_interactions.0031.desc.poem: "\n\n$trait_specific_interactions.000.generate_poem$\n\n"
 trait_specific_interactions.0031.desc.outro: "$trait_specific_interactions.000.outro$"
 trait_specific_interactions.0031.a: "$trait_specific_interactions.0001.a$"
 trait_specific_interactions.0031.b: "$trait_specific_interactions.0001.b$"
 trait_specific_interactions.0041.t: "Vil [recipient.GetTitleAsNameNoTooltip]"
 trait_specific_interactions.0041.desc.intro: "$trait_specific_interactions.000.intro.part1$ a obra é pejorativa, inflamatória e dedicada #EMP especificamente#! a mim e à minha \"mistura única de incompetência e incontinência\"."
 trait_specific_interactions.0041.desc.poem: "\n\n$trait_specific_interactions.000.generate_poem$\n\n"
 trait_specific_interactions.0041.desc.outro: "$trait_specific_interactions.000.outro$"
 trait_specific_interactions.0041.a: "$trait_specific_interactions.0001.a$"
 trait_specific_interactions.0041.b: "Hmm. Sim. #EMP Que. Divertido.#!"
