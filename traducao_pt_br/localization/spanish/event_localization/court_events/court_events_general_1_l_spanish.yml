l_spanish:
 court_events.1000.t: "O Mais Grandioso de Todos"
 court_events.1000.desc: "\"Ó grande [ROOT.Char.GetTitleAsNameNoTooltip|l]! [Select_CString(And(guest.IsFemale, guest_2.IsFemale), 'Juntas', 'Juntos')] temos vagado por todo o mundo conhecido\", bajula [guest.GetName], [Select_CString( guest.IsFemale, 'a primeira', 'o primeiro' )] de um par de [Select_CString(And(guest.IsFemale, guest_2.IsFemale), 'famosas viajantes', 'famosos viajantes')]. \"Contemplamos cúpulas de prazer ensolaradas! Cavernas de gelo! Bebemos o leite da Palestina e nos alimentamos de melão-da-China.\"\n\n\"Visitamos os acampamentos dos cãs, os palácios dos sultões, os antigos salões... mas nenhuma corte na Terra se compara à vossa: nenhuma se iguala em majestade e luxo!\"\n\nSeu/sua companheir[guest_2.Custom('ES_OA')] [guest_2.GetName] faz estranhas reverências estrangeiras, em súplica:\n\n\"Os confortos deste lugar estão além até mesmo das frivolidades [second_court.GetPrimaryTitle.GetAdjective]... sábi[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], permita-nos ficar mais um pouco.\""
 court_events.1000.a: "Somente a caridade compensa uma reputação de excesso..."
 court_events.1000.a.flavor: "E enriquece meu povo!"
 court_events.1000.b: "\"Permaneçam aqui, na mais grandiosa das cortes.\""
 court_events.1000.b.flavor: "E façam com que meus cortesões aprendam com vocês a me louvar como [ROOT.Char.Custom('ES_ElLa')] maior de [Select_CString( ROOT.Char.IsFemale, 'todas as soberanas', 'todos os soberanos' )]!"
 court_events.1000.c: "\"Contem a todos as maravilhas que viram aqui.\""
 traveling_friends_court_position_aptitude: "[Select_CString(And(guest.IsFemale, guest_2.IsFemale), 'Estas amigas viajantes', 'Estes amigos viajantes')] terão maior [aptitude|lE] quando ocuparem [court_positions|lE]"
 visiting_gives_opinion: "Todo [ruler|lE] que hospedar [guest.GetFirstName] ou [guest_2.GetFirstName] ganha #P 20#! de [opinion|lE] sobre #high você#! #EMP (reputação)#!"
 court_events.1010.t: "De Outro Formigueiro"
 court_events.1010.desc: "Entra [Select_CString( defector.IsFemale, 'uma cortesã', 'um cortesão' )] de [grander_ruler.GetPrimaryTitle.GetNameNoTooltip]. [defector.GetSheHe|U] se curva perante mim, observando meus guardas nervosamente pelo canto do olho.\n\n\"Venho de um lugar de esplendor\", diz [Select_CString( defector.IsFemale, 'a aduladora', 'o adulador' )], [defector.GetName], \"a corte de [grander_ruler.GetName].\"\n\n\"Se eu deixasse seu serviço, muitos funcionários viriam comigo. Meros insetos, mas a corte se tornou magnífica graças ao nosso diligente trabalho! E não desejamos permanecer ligados a esse [grander_ruler.Custom2('InsultAdjective', SCOPE.sC('defector'))] [grander_ruler.GetTitleAsNameNoTooltip]...\"\n\n\"Queremos oferecer nosso serviço a #EMP vós#!, ó [ROOT.Char.GetTitleAsName].\""
 court_events.1010.a: "\"Com sua astúcia... prove-me sua utilidade.\""
 court_events.1010.a.flavor: "Meu antiquário me fala dos grandes tesouros [grander_ruler.Custom('ES_DelDela')] [grander_ruler.GetTitleAsNameNoTooltip|l]... e um, em particular, que mãos ladras poderiam tornar meu."
 court_events.1010.a.success: "Os desertores roubam o artefato de seu suseran[grander_ruler.Custom('ES_OA')]"
 court_events.1010.a.failure: "Os traidores são capturados e executados"
 court_events.1010.b: "Esses desertores conhecem bem os caminhos do refinamento."
 court_events.1010.c: "Clérigos habilidosos seriam melhores para dirigir esta corte."
 court_events.1010.c.flavor: "Se mãos mais úteis são necessárias para dirigir esta corte, meu [court_chaplain.GetCouncilTitle|l] poderia encontrar e supervisionar algumas que estão livres de pecado..."
 court_events.1010.d: "#EMP \"Corram para casa, seus traidores rastejantes!\"#!"
 court_events.1011.opening: "[Select_CString( ROOT.Char.IsFemale, 'Minha antiga senhora', 'Meu antigo senhor' )],"
 court_events.1011.desc: "Eu, [defector.GetName], e muitos de vossos servos desprezados fugimos do vosso serviço. Sem nossa experiência, vossa corte logo se tornará a ruína que mereceis.\n\nSempre fostes mais [grander_ruler.Custom2('InsultNoun', SCOPE.sC('defector'))] do que [Select_CString( ROOT.Char.IsFemale, 'uma senhora digna', 'um senhor digno' )] de respeito. E assim [Select_CString( root_scope.IsFemale, 'vossa substituta', 'vosso substituto' )], [root_scope.GetName], saboreará os confortos e as glórias que vós outrora conhecestes."
 court_events.1011.a: "#EMP Traidor!#!"
