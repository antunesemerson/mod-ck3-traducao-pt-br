l_spanish:
 #Secret History
 court_6000_all_courtiers_and_guests: "Todos os seus [courtiers|lE] e [guests|lE]"
 court.6000.t: "História Secreta"
 court.6000.desc_opening: "Quando entro na sala, fico completamente perplexo com o grito de surpresa de [courtier.GetFirstName], que antes estava imers[courtier.Custom('ES_OA')] em um manuscrito intitulado "Hist?ria secreta de [ROOT.Char.GetPrimaryTitle.GetNameNoTier]"."
 court.6000.desc_liege: "\n\n"Meu [SCOPE.sC('courtier').Custom2('RelationToMe', ROOT.GetCharacter)]!"
 court.6000.desc_family: "\n\n"[SCOPE.sC('courtier').Custom2('RelationToMe', ROOT.GetCharacter)]!"
 court.6000.desc_ending: ""N?o h? nada de suspeito! Nada mesmo!", grita [courtier.GetSheHe] enquanto tenta, sem sucesso, esconder o objeto comprometedor dentro de suas vestes. \n\nQuando consigo arrancar o livro de suas m?os, fico chocado ao descobrir p?gina ap?s p?gina de perversidades detalhadas que, segundo dizem, ocorreram na corte de meu predecessor[predecessor.Custom('ES_XA')] com sua b?n??o!"
 court.6000.a: "#EMP ABSURDO!#! Quem poderia ter escrito mentiras tão descaradas?"
 court.6000.a.tt: "Você envia seu Mestre Espião para investigar"
 court.6000.b: "Ohhh, fofocas picantes!"
 court.6000.b.tt: "Você pode descobrir o passado #EMP colorido#! de alguém"
 court.6000.c: "Todos merecem saber a verdade sobre [predecessor.GetTitledFirstNameNoTooltip|l]!"
 court.6000.c.tt: "Foi um[predecessor.Custom('ES_XA')] tirano[predecessor.Custom('ES_OA')] repugnante, indign[predecessor.Custom('ES_OA')] de minha dinastia! Vou lhe contar #EMP exactamente#! o que penso desse[predecessor.Custom('ES_EA')] vil vira-l[predecessor.Custom('ES_OA')] covarde..."
 court.6000.d: "Que chato. Eu realmente não me importo."
 court.6000.e.tt: "Você inicia sua própria investigação"
 court.6000.f: "Tudo é verdade. Mas devemos perdoar e esquecer."
 court.6002.desc: "Estou com o nariz enterrado em correspond?ncia internacional quando [spymaster.Custom('ES_ElLa')] [spymaster.GetTitledFirstName|l] irrompe na sala, arrastando atr?s de si um[author.Custom('ES_XA')] assustad[author.Custom('ES_OA')] [author.GetTitledFirstName|l]. \n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], encontrei [author.GetHerHim]! A canalha que escreveu aquele ignominioso livro de mentiras sobre vosso[predecessor.Custom('ES_OA')] predecessor[predecessor.Custom('ES_XA')], [predecessor.Custom('ES_ElLa')] [predecessor.GetTitledFirstName|l]!""
 court.6002.b.desc_opening: "Nos últimos meses, dediquei cada momento do meu tempo livre à busca pela víbora escorregadia que estava divulgando um livro sobre as falhas do meu predecessor[predecessor.Custom('ES_XA')]."
 court.6002.b.desc_ending: "Após muitas noites em claro, finalmente encontro [author.Custom('ES_AlAla')] culpado: esse covarde é [author.Custom('ES_ElLa')] [author.GetTitledFirstName|l]! \n\nAgora que está tremendo diante de mim, à espera do julgamento, penso cuidadosamente no que direi a seguir."
 court.6002.a: "Você deveria ter vergonha de suas mentiras vergonhosas!"
 court.6002.a.tt: "É melhor que revogue suas declarações e se arrependa, ou…"
 COURT_OF_NO_SECRETS_VALUE: "Oposição Perseguida"
 court.6002.a.tt2: "Aumenta a eficácia do $task_find_secrets$ do seu Mestre dos Espiões por 15 anos."
 court.6002.b: "Guardas, prendam [author.Custom('ES_AlAla')] traidor[author.Custom('ES_XA')]!"
 court.6002.c: "Você realmente passou dos limites aqui, [author.GetFirstNameNoTooltip]..."
 court.6002.d: "Tenho certeza de que você não teve intenção de prejudicar com seu pequeno diário, não é?"
 court.6003.desc: "Faz meses que meu chefe[spymaster.Custom('ES_EA')] de espionagem, [spymaster.Custom('ES_ElLa')] [spymaster.GetTitledFirstName|l], ainda não informou qualquer progresso significativo em sua missão especial: encontrar o maldito autor de um manuscrito vergonhoso que detalha as perversidades secretas do meu predecessor[predecessor.Custom('ES_XA')]! \n\nNão é de admirar que, quando finalmente o chamo, [spymaster.Custom('ES_ElLa')] [spymaster.GetTitledFirstName|l] pareça nervos[spymaster.Custom('ES_OA')] e bastante culpado. "Meu [ROOT.GetLadyLord]! Procurei por toda parte, mas o autor desapareceu! Talvez tenha deixado a corte, ou alguém o esteja protegendo, ou…". \n\nFaço um gesto para que pare de tagarelar."
 court.6003.b.desc_ending: "\n\nInfelizmente, meus melhores esforços provaram ser infrutíferos, pois o culpado parece ter desaparecido e o rastro esfriou. Acho que nunca vou descobrir a verdade."
 court.6003.a: "Deixa pra lá. Não foi nada demais."
 court.6003.b: "Isso é muito decepcionante."
 court.6003.c: "Vocês inúteis #EMP parasitas#! estão encobrindo o autor, não é?"
 court.6003.c.tt: "Você se enfurece com seus cortesãos"
 court.6003.d: "Você fez o que pôde, [spymaster.GetTitledFirstNameNoTooltip|l]…"
 court.6003.e: "Já que você não conseguiu encontrar o autor, você vai levar a culpa por ele!"
 #Prophet in the Halls
 court.6010.t: "Profeta nos Salões"
 court.6010.desc: "#EMP ARREPENDAM-SE HOJE!#! DESCUBRAM A VERDADE MAIS VERDADEIRA! ENTREM NA LUZ! \n\nDesde que [preacher.GetTitledFirstName|l] se juntou ? minha corte, suas tentativas persistentes de converter todo mundo ao seu culto estrangeiro se tornaram o ru?do de fundo da minha vida cotidiana.\n\nDia e noite, persegue os p?tios, patrulha os corredores e se esconde em cantos escuros ? espera de transeuntes desavisados, pront[preacher.Custom('ES_OA')] para #EMP persuadi-los#! com seus gritos insistentes. \n\nMeus cortes?os est?o exaustos e eu, depois que [preacher.GetFirstNameNoTooltip] me emboscou a caminho do penico, tendo a concordar com seu descontentamento."
 court.6010.a: "Podemos tolerar isso e muito mais. [preacher.GetFirstNameNoTooltip] é inofensiv[preacher.Custom('ES_OA')]."
 court.6010.b: "Expulsem esse[preacher.Custom('ES_EA')] idiota da minha corte!"
 court.6010.c: "Pode pregar para os ratos, tanto faz…"
 court.6010.c.tt: "Seu [preacher_liege.Custom('ES_SennorSennora')] , [preacher_liege.Custom('ES_ElLa')] [preacher_liege.GetTitledFirstName|l], ficará descontente."
 court.6010.c.tt2: "A [councillor_task|lE] $task_conversion$ de seu [chaplain.GetCouncilTitle|l] é #P más#! eficaz por 20 anos em condados que tenham o [preacher.GetFaith.GetName|l] como fé"
 court.6010.c.tt3: "A [councillor_task|lE] $task_conversion$ da sua [chaplain.GetCouncilTitle|l] é #N menos#! eficaz por 20 anos em condados que tenham a [preacher.GetFaith.GetName|l] como fé"
 court.6010.a_every_county: "Todo [county|lE] de fé [preacher.GetFaith.GetName|l] em seu [realm|lE] ([preacher_faith_counties_size])"
 court_6010_harsh_conversions: "Conversões Rígidas"
 court_6010_tolerant_conversions: "Abordagem Tolerante"
 court.6010.d: "CHEGA dessa #EMP BLASFÊMIA#!"
 court_6010_all_courtiers_and_guests_faith: "Todos os seus [courtiers|lE] e [guests|lE] [preacher.GetFaith.GetAdherentNamePluralNoTooltip]"
 court.6011.desc_opening: "[preacher_liege.Custom2('AppropriateGreetingNegative', ROOT.Char)]"
 court.6011.desc_prisoner: "Chegou aos meus ouvidos que voc? recentemente encarcerou um[preacher.Custom('ES_XA')] s?dit[preacher.Custom('ES_OA')] meu[preacher.Custom('ES_OA')] sem outro motivo al?m de pregar sua f?, #EMP minha pr?pria f?#!, em sua corte. \n\nConfio que tudo isso n?o passe de um mal-entendido e que voc? corrija a situa??o imediatamente, para que eu n?o tenha uma impress?o errada de suas inten??es."
 court.6011.desc_executed: "Soube com grande consterna??o que recentemente voc? executou um[preacher.Custom('ES_XA')] s?dit[preacher.Custom('ES_OA')] meu[preacher.Custom('ES_OA')], convidad[preacher.Custom('ES_OA')] de sua corte, por ser um[preacher.Custom('ES_XA')] herege perigos[preacher.Custom('ES_OA')]. \n\nQuero supor que foi um mal-entendido e que #EMP de verdade#! n?o queria me ofender nem questionar minha f?."
 court.6011.a: "Não tive a intenção de ofendê-lo. Por favor, aceite essa compensação."
 court.6011.b: "Seus pregadores disfarçados não são bem-vindos em minha corte."
 #Possession at Court
 court.6020.t: "Possessão na Corte"
 court.6020.desc_opening: "A condição d [possessed_char.GetTitledFirstName|l] é igualmente misteriosa e assustadora."
 court.6020.desc_chaplain: "\n\nDe acordo com [court_chaplain.GetCouncilTitle] [court_chaplain.GetTitledFirstName|l],"
 court.6020.desc_no_chaplain: "\n\nÉ uma opinião comum que"
 court.6020.desc_middle: "um ser sombrio habita o corpo  e, ocasionalmente, se manifesta com um poder incontrolável; no entanto, a frequência e intensidade desses episódios estão causando cada vez mais alarme entre meus devotados cortesãos. [court_chaplain.GetSheHe|U] teme que a presença maligna assuma o controle e espalhe caos e morte entre nós."
 court.6020.desc_physician: "\n\n[court_physician.GetTitledFirstName] me assegura que"
 court.6020.desc_no_physician: "\n\n"
 court.6020.desc_ending: "[possessed_char.GetFirstNameNoTooltip] nunca foi perigos[possessed_char.Custom('ES_OA')] #EMP por si s?#!, mas meus cortes?os insistem que algo precisa ser feito."
 court.6020.a: "[court_chaplain.GetTitledFirstNameNoTooltip|l], exorcizai o demônio!"
 court.6020.a.success: "O exorcismo d [court_chaplain.GetFirstName] é bem-sucedido"
 court.6020.a.success.tt: "Com exorcismos regulares para manter o mal afastado, a condição d [possessed_char.GetTitledFirstName|l] parece melhorar, e seus cortesãos estão satisfeitos"
 court.6020.a.failure: "O exorcismo d [court_chaplain.GetFirstName] falha"
 court.6020.a.failure.tt: "A condição d [possessed_char.GetTitledFirstName|l] não é afetada"
 court.6020.b: "Não tenha medo! É um sinal do favor dos deuses!"
 court.6020.c: "O poder deste objeto sagrado [possessed_char.GetHerHim] salvará."
 court.6020.c.tt: "Dizem que a imposição de sua [6020_relic.GetNameNoTooltip] cura qualquer doença"
 court.6020.d: "[court_physician.GetTitledFirstNameNoTooltip|l], você conhece alguma erva que possa ajudar[possessed_char.GetHerHim]?"
 court.6020.d.tt: "A experiência em artes medicinais d [court_physician.GetFirstName] melhora a condição d [possessed_char.GetTitledFirstName|l]"
 court.6020.d.tt.2: "[court_physician.GetFirstNameNoTooltip] experimenta uma mistura de ervas"
 court.6020.e: "Isso não passa de uma doença cerebral. [court_physician.GetFirstNameNoTooltip]?"
 court.6020.f: "Deixe[possessed_char.GetHerHim] em paz."
 court.6020.b.tt: "Ter #EMP visiones proféticas#! é considerado uma grande ajuda para os cargos de $court_poet_court_position$, $court_musician_court_position$ ou $cave_hermit_court_position$"
 court_6020_all_courtiers_and_guests_christian: "Todos os seus [courtiers|lE] e [guests|lE] da mesma religião"
 court_6020_all_courtiers_or_guests_polith: "Todos os seus outros [courtiers|lE] e [guests|lE] (não cínicos)"
 #The Ballad of the Garlic King
 court.6030.t: "A balada [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.Custom('GetQueenKing')] de alho"
 court.6030.desc: "#EMP Vou contar uma hist?ria com grande desparpajo.\nHavia uma vez um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom('GetQueenKing')] com coroa de alho.\nPara lutar contra [ROOT.Char.Custom('GetUnbelieverName')], montou num burrinho,\nmas s? triunfou contra um macaquinho...#!\n\nPor onde quer que eu v?, ou?o os acordes dessa maldita balada, que se tornou muito popular entre menestr?is errantes e o povo em geral. #EMP Popular demais#! para o meu gosto, j? que descobri uma quantidade perturbadora de semelhan?as entre o protagonista dela e eu... Mas ouvir [6030_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)] cant?-la na minha cara, sem vergonha nenhuma, ? ir longe demais!"
 court.6030.a: "Mas #EMP ?#! uma hist?ria t?o divertida!"
 court.6030.b: "Qué #EMP vergüenza#!…"
 court.6030.c: "#EMP VOCÊ ACHA ISSO ENGRAÇADO?!#!"
 court.6030.d: "Isso é #EMP inaceitável#!."
 court.6030.d.tt: "Você proíbe a performance da balada, ameaçando os transgressores com prisão"
 court.6030.e: "Eu. Não. Suporto. MAIS!"
 court.6030.e.tt: "Você dá socos na próxima pessoa que te provoca cantando a estúpida balada - repetidamente"
 court.6030.f: "Bem, eles terão que parar em algum momento...?"
 #Scrounger Life
 court.6040.t: "Vida de Sanguessuga"
 court.6040.desc: "[scrounger.Custom('ES_ElLa')|U] [scrounger.GetTitledFirstName|l] j? ? um elemento permanente da minha corte e um #EMP caro#!. E tamb?m #EMP expansivo#!, na verdade.\n\nApresenta-se em todos os banquetes, devorando tudo o que h? ? vista enquanto reclama de como est? vazia a sua pr?pria despensa. "Voc? serve as melhores bebidas, [ROOT.Char.Custom('FormOfAddressForLiege')]!", diz, depois de acabar, num s? trago, outra jarra do meu [ROOT.Char.Custom('GetExpensiveDrink')] da mais alta qualidade. "Voc? ? o ser mais #EMP [SCOPE.Custom('PersonalityGetSharedTraitDescriptionFromFlag')|l]#!, o mais #EMP [ROOT.Char.Custom('ComplimentAdjective')]#!, [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetLadyLord] #EMP MAIS ADOR?VEL!#!", declara, estendendo a m?o para pedir outro empr?stimo que jamais pagar?.\n\n[scrounger.GetFirstNameNoTooltip] ? um desperd?cio irritante de dinheiro, mas suas palha?adas exageradas s?o bastante divertidas."
 court.6040.a: "Já que você está sempre aqui, é melhor se tornar útil!"
 court.6040.b: "Apesar de tudo, [scrounger.Custom('ES_LoLa')] encontro bastante engraçad[scrounger.Custom('ES_OA')]!"
 court.6040.c: "Tire essa sanguessuga da minha vista."
 court.6041.desc: "Já se passaram vários meses desde que decidi deixar que [scrounger.GetTitledFirstName|l] continuasse sua vida parasitária em minha corte.\n\nNão esperava nada além de seus habituais relatos exagerados de pobreza e elogios ridiculamente pomposos, mas, ultimamente, notei que suas histórias estão ficando mais engraçadas, suas rimas mais afiadas e seus elogios mais agradáveis.\n\nTanto meus cortesãos quanto meus convidados estrangeiros se divertem muito com suas palavras engenhosamente elaboradas. Será que [scrounger.GetFirstNameNoTooltip] teria encontrado uma vocação útil?"
 court.6041.a: "Eu sabia que você servia para alguma coisa!"
 court.6041.b: "... mas aposto que você consegue fazer ainda melhor!"
 court.6041.b.failure: "Apesar de seus melhores esforços, parece que [scrounger.GetFirstNameNoTooltip] já alcançou o auge de suas habilidades"
 court.6041.b.success: "[scrounger.GetFirstNameNoTooltip] recebe inspiração para uma grande obra"
 court.6041.b.failure.tt: "[scrounger.GetFirstNameNoTooltip] não consegue melhorar ainda mais"
 court.6041.b.success.tt: "[scrounger.GetFirstNameNoTooltip] se torna inspirad!"
 court.6041.c: "Já perdi tempo demais com você."
 #Saucy Readings
 court.6050.t: "Leituras Picantes"
 court.6050.desc_opening: "Ultimamente, não consigo deixar de notar os grupinhos de donzelas que riem feito bobas e os guerreiros, normalmente austeros, se reunindo em alcovas escuras para ouvir, embevecidos, um livro. \n\nHoje, por fim, consegui encurralar a [courtier.GetTitledFirstName|l] com o livro nas mãos."
 court.6050.desc_byz: "Apesar de sua capa sugerir um livro piedoso de orações, trata-se de um romance licencioso, escrito séculos atrás por nossos antepassados pagãos! Há uma bela donzela, piratas, tentações e páginas luxuriantes repletas de desejos profanos..."
 court.6050.desc_islam: "Ao folhear rapidamente o texto, encontro piratas, donzelas com roupas sum?rias, reis movidos pelo luxo, rainhas lascivas e ardilosas, e at? mesmo um malandro de rua enriquecido que se casa com uma princesa com a ajuda de um g?nio..."
 court.6050.desc_sonetti: "Há páginas e mais páginas de poesia, graciosa em sua forma, mas lasciva em sua natureza. A beleza angelical de todas as mulheres é exaltada por palavras suaves, que mal conseguem esconder o desejo terreno do poeta..."
 court.6050.desc_chaucer: "Todos são contos de peregrinos na estrada; no entanto, não tratam da salvação de suas almas, mas sim de assassinatos sangrentos e esposas infiéis..."
 court.6050.desc_generic: "É claramente um texto licencioso, repleto de tentações sensuais, seduções terrenas e seios macios..."
 court.6050.desc_ending: "\n\nFico em silêncio enquanto pondero a provável reação de [court_chaplain.GetCouncilTitle] [court_chaplain.GetTitledFirstName|l], e [courtier.GetFirstNameNoTooltip] me olha com apreensão."
 court.6050.a: "Meus pobres olhos!"
 court.6050.b: "Purifique-os com fogo!"
 court.6050.b.tt: "Você manda queimar todas as cópias do texto escandaloso e o proíbe em sua corte"
 court.6050.b.tt.2: "É mais provável que as crianças educadas em sua corte desenvolvam uma personalidade do tipo [GetTrait('pensive').GetName( GetNullCharacter )|l], [GetTrait('chaste').GetName( GetNullCharacter )|l] ou [GetTrait('zealous').GetName( GetNullCharacter )|l]"
 court.6050.c: "A cultura se manifesta de diversas formas. Deixe-os ler."
 court.6050.c.tt: "É mais provável que as crianças educadas em sua corte desenvolvam uma personalidade do tipo [GetTrait('curious').GetName( GetNullCharacter )|l], [GetTrait('lustful').GetName( GetNullCharacter )|l] ou [GetTrait('cynical').GetName( GetNullCharacter )|l]"
 court.6050.c.unlock_text: "Essa opção está disponível devido à sua alta habilidade em [learning|lE]"
 court.6050.d: "Uhhh, suculento!"
 court.6050.e: "Por que devemos nos limitar à leitura, [courtier.GetFirstNameNoTooltip]?"
 court.6050.e.tt: "Você se inspira nas leituras"
 court.6050.f: "Faça-o desaparecer e fingirei que não vi nada."
 court_6050_courtiers_or_guests: "Todos os seus [courtiers|lE] e [guests|lE] impuros"
 #The Joys of Wine
 court.6060.t: "As Alegrias do Vinho"
 court.6060.desc_opening: "De repente, [court_chaplain.GetCouncilTitle] [court_chaplain.GetTitledFirstName|l] e [court_physician.Custom2('MyCharacterIntroduction', ROOT.Char)] invadem o salão do trono, discutindo.\n\n“O vinho ofende a [ROOT.Char.GetFaith.HighGodName]! É preciso #EMP Debemos#! evitá-lo!”, grita [court_chaplain.GetFirstNameNoTooltip].\n\n“Um pouco de vinho faz bem ao corpo!”, responde [court_physician.GetFirstNameNoTooltip]."
 court.6060.desc_drunkard_courtier: "\n\nEm um canto do salão, [courtier_drunkard.GetTitledFirstName|l] interrompe a discussão: "A única quantidade de vinho boa para uma pessoa é #EMP TODO#!!"."
 court.6060.desc_ending: "\n\nQual é a minha posição sobre o vinho?"
 court.6060.a: "O vinho abre a porta para [ROOT.Char.GetFaith.DevilName]!"
 court.6060.b: "Um pouco de vinho mantém os humores equilibrados."
 court.6060.c: "[courtier_drunkard.GetFirstNameNoTooltip|U], brinde comigo!"
 court.6060.c.tt: "[courtier_drunkard.GetFirstNameNoTooltip|U] abre seu esconderijo secreto!"
 court.6060.c.tt.2: "Graças às contribuições d [courtier_drunkard.GetFirstNameNoTooltip] ao fornecimento de vinho, os Benefícios da Corte de Alimentos são 50% mais baratos pelos próximos 10 anos."
 court.6060.d: "A resposta está no fundo deste copo!"
 #The Value of Letters
 court.6070.t: "O Valor das Letras"
 court.6070.desc: "Consigo sentir os olhares julgadores de todos os meus cortes?os sobre mim enquanto, devagar e cuidadosamente, assino meu nome em um novo decreto com a pena tr?mula e a m?o insegura. \n\n? claro que #EMP assinar#! ? uma forma forte de dizer. Eu apenas estou tra?ando as letras gravadas numa t?bua de madeira, e mal consigo faz?-lo. Hoje, at? [tutor_6070.Custom2('MyCharacterIntroduction', ROOT.Char)] me olha com o que imagino ser uma mistura de pena e desgosto. \n\nAntes que eu possa repreender [tutor_6070.GetHerHim] por me desrespeitar, [tutor_6070.GetSheHe] interv?m com um tom esperan?oso: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], talvez seja hora de voc? aprender a ler e escrever direito?""
 court.6070.a: "Ensine-me #EMP agora mesmo#!"
 court.6070.a.success: "Eu aprendo a ler e escrever com sucesso"
 court.6070.a.failure: "Aprender a ler e escrever é uma causa perdida para mim"
 court.6070.a.tt.1: "Ninguém mais vai zombar de mim"
 court.6070.a.tt.2: "Terei que encontrar outra solução"
 court.6070.b: "Mexeção de pena é coisa de perdedores e fracos!"
 court.6070.c: "Vou continuar fingindo que não percebo eles."
 court.6070.d: "Eu #EMP sei#! escrever, muito obrigado!"
 court.6070.d.tt: "Se eu disser com convicção suficiente, eles podem até acreditar..."
 court.6070.d.tt.success: "Eles acreditam na minha mentira descarada!"
 court.6070.d.tt.failure: "Eles conseguem ver através de mim"
 every_courtier_or_guest_6070_learning: "Todos os seus [courtiers|lE] letrados e [guests|lE]"
 court.6071.desc: "#EMP Q-u-e-r-i-d-o a-m-i-g-o,#!\n\n"Sim, isso está ótimo!".\n\nPassei incontáveis horas praticando o alfabeto sob o olhar severo de [tutor_6070.Custom2('MyCharacterIntroduction', ROOT.Char)] e parece que meu esforço deu frutos! A correspondência internacional, os relatórios dos conselheiros e as promessas dos vassalos já não têm mais segredos para mim! \n\nTragam-me uma pena — quero assinar mais coisas!"
 court.6071.a: "Eu sou simplesmente muito inteligente."
 court.6071.b: "[tutor_6070.GetFirstNameNoTooltip] merece uma compensação."
 court.6071.b.tt: "A Aptidão d [tutor_6070.GetFirstNameNoTooltip] como $court_tutor_court_position$ aumenta."
 court_language_teacher_desc: "Ensinou o suserano a escrever"
 court.6072.desc: "#EMP Q-e-r-i-d-o a-m-i-g-o,#!\n\n"Vejam! Estou indo bem, n?o estou?"\n\n[tutor_6070.Custom2('MyCharacterIntroduction', ROOT.Char)|U] suspira, balan?ando a cabe?a com uma express?o desolada. "[ROOT.Char.Custom('FormOfAddressForLiege')|U], talvez preferisse usar este selo bonito e brilhante em vez de assinar?"\n\nAo que parece, [tutor_6070.GetSheHe] n?o est? satisfeit[tutor_6070.Custom('ES_OA')] com o progresso #EMP impressionante#! que tenho feito em meu esfor?o para aprender a ler e escrever."
 court.6072.a: "As cartas são inúteis mesmo! Agora, devolva meu [ROOT.Char.Custom('child_object_of_interest_random')]!"
 court.6072.a.tt: "Ninguém está impressionado"
 court.6072.b: "Muito bem, assinarei de maneira fantasiosa o que #EMP eu leio#! com o selo."
 court.6072.b.tt: "Certamente parece impressionante, mas não pode esconder o fato de que você não está lendo o que assina"
 court.6072.c: "É tudo culpa sua, [tutor_6070.GetFirstNameNoTooltip]!"
 #The Munificence of X
 court.6080.t: "A Munificência d [6080_visitor.GetFirstNameNoTooltip]"
 court.6080.desc: "Há alguns dias que [6080_visitor.Custom('ES_ElLa')] [6080_visitor.GetTitledFirstName|l] está hospedado em minha corte a caminho de algum compromisso, talvez um local sagrado ou algo assim."
 court.6080.desc_middle: "\n\nDesde que chegou, vem me ofuscando com sua generosidade para com meus próprios cortesãos, que se atiram ao seu ouro sem nenhum pudor! Não consigo evitar debochar quando [6080_visitor.GetHerHim] vejo cercad[6080_visitor.Custom('ES_OA')] pela enésima vez por cortesãos encantados. #EMP Mis#! cortesãos.\n\n"Uma bolsa para vós, bom[beneficiary_1.Custom('ES_XA')] [beneficiary_1.GetFirstName]!"
 court.6080.desc_liege: "Há alguns dias, meu suserano[6080_visitor.Custom('ES_XA')], [6080_visitor.Custom('ES_ElLa')] [6080_visitor.GetTitledFirstName|l], está hospedado em minha corte por ocasião de sua [GetActivityType('activity_tour').GetName|l]."
 court.6080.desc_2: "E algumas moedas também para você, gentil [beneficiary_2.GetFirstName]!"
 court.6080.desc_3: "E para você, querid [beneficiary_child.GetFirstName], bolinhos de mel doces!"
 court.6080.desc_end: "Lembre-se, as riquezas devem ser compartilhadas!"
 court.6080.a: "Posso ser ainda #EMP mais#! generoso!"
 court.6080.b: "Eu também deveria aproveitar a generosidade tola dele!"
 court.6080.b.success: "Convenço a [6080_visitor.GetFirstNameNoTooltip] para me desembolsar também."
 court.6080.b.success.tt: "[6080_visitor.GetFirstNameNoTooltip] está convencid[6080_visitor.Custom('ES_OA')]!"
 court.6080.b.failure: "[6080_visitor.GetFirstNameNoTooltip] não se impressiona com minhas tentativas"
 court.6080.b.failure.tt: "[6080_visitor.GetFirstNameNoTooltip] n?o est? convencid[6080_visitor.Custom('ES_OA')]"
 court.6080.c: "Acredito que [6080_visitor.GetFirstNameNoTooltip] já ficou tempo demais aqui…"
 court.6080.d: "É melhor [6080_visitor.GetSheHe] gastar do que eu."
 #The Art of Rhetoric
 court.6090.t: "A Arte da Retórica"
 court.6090.desc: "#EMP MAS EU ESTOU MORRENDO DE T?DIO!#! Reconhe?o imediatamente a voz chorosa de [6090_child_a.Custom2('MyCharacterIntroduction', ROOT.Char)] antes mesmo de ver esse[6090_child_a.Custom('ES_EA')] moleque travesso.\n\nA cena que vejo diante dos meus olhos ? bastante lament?vel:"
 court.6090.desc.cp: "[6090_poet.Custom2('MyCharacterIntroduction', ROOT.Char)] parece à beira das lágrimas"
 court.6090.desc.teacher: "[6090_poet.GetFirstName], [Select_CString(6090_poet.IsFemale, 'uma mestra', 'um mestre' )] renomado local em visita à nossa corte, parece desesperado[6090_poet.Custom('ES_OA')]"
 court.6090.desc.middle: "enquanto [6090_child_a.GetFirstNameNoTooltip] e [6090_child_b.GetFirstName] lhe lançam os olhares mais entediados que já vi em seus jovens rostos."
 court.6090.desc_other: "[6090_child_c.GetFirstName] foi até uma janela, claramente mais interessad[6090_child_c.Custom('ES_OA')] em #EMP lo que sea#! no que quer que haja lá fora."
 court.6090.desc_end: "\n\nQuando os olhos de [6090_poet.GetFirstNameNoTooltip] se encontram com os meus, ele me suplica: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], #EMP por favor#!. Só estou tentando explicar a seus filhos a bela arte da retórica, como exige seu nobre nascimento…"."
 court.6090.a: "Prestem atenção, crianças! Vocês precisarão disso."
 court.6090.b: "Deixem-me explicar de forma mais clara."
 court.6090.b.success: "As crianças estão impressionadas"
 court.6090.b.failure: "Sou mais sem graça[ROOT.Char.Custom('ES_OA')] que [6090_poet.GetFirstNameNoTooltip]"
 court.6090.b.failure.tt: "As crianças não aprendem nada"
 court.6090.c: "Você é simplesmente muito chato[6090_poet.Custom('ES_OA')], [6090_poet.GetFirstNameNoTooltip]!"
 court.6090.c.tt: "#EMP A GUERRA#! é uma busca muito mais digna para a jovem nobreza! Venha treinar comigo!"
