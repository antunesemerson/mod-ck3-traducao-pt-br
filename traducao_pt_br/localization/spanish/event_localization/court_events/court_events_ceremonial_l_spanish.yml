l_spanish:
 ceremonial_petition_prefix: "Petição cerimonial:"
 court_ceremonial.1000.t: "$ceremonial_petition_prefix$ apoio à regência"
 court_ceremonial.1000.opening: "[petition_vassal.Custom('ES_ElLa')|U] [petition_vassal.GetTitledFirstName|l] dá um passo à frente, inclinando-se profundamente diante da corte reunida, enquanto meus assistentes me trazem uma petição escrita de próprio punho.\n\nFala de modo claro e direto, \"Majestos[petition_liege.Custom('ES_OA')] [petition_liege.GetTitleAsName|l], hoje venho humildemente solicitar vossa intercessão em um assunto importante\".\n\n"
 court_ceremonial.1000.desc: "\"Como chefe[petition_vassal.Custom('ES_EA')] de uma família orgulhosa de servir de perto a [petition_vassal.GetTopLiege.GetPrimaryTitle.GetBaseNameNoTooltip], com humildade e lealdade eu, um[petition_vassal.Custom('ES_XA')] orgulhos[petition_vassal.Custom('ES_OA')] [petition_vassal.GetDynasty.GetName], solicito vosso apoio como regente do reino\"."
 court_ceremonial.1000.a: "Aceito gentilmente vosso pedido sincero."
 court_ceremonial.1000.b: "Talvez, se você apoiasse a [ROOT.Char.GetConfederation.GetName]…"
 court_ceremonial.1000.c: "Um favor real não deve ser esquecido."
 court_ceremonial.1000.d: "Tenho certeza de que vocês têm presentes generosos para oferecer em troca."
 court_ceremonial.1000.e: "Isso não será possível."
 court_ceremonial.1000.f: "Sim, em troca do serviço de [knight.GetFirstNameNoTooltip]."
 court_ceremonial.1000.g: "[monk.Custom('ES_ElLa')|U] [monk.GetTitledFirstNameNoTooltip|l] se encaixaria perfeitamente no papel de [GetTrait('devoted').GetName( monk )|l]."
 court_ceremonial.1000.h: "Vamos acertar nossos antigos acordos."
 court_ceremonial.1100.t: "$ceremonial_petition_prefix$ apoio à governança"
 court_ceremonial.1100.desc: "\"Como chefe[petition_vassal.Custom('ES_EA')] de uma família orgulhosa de servir atentamente a [petition_vassal.GetTopLiege.GetPrimaryTitle.GetBaseNameNoTooltip], com humildade e lealdade eu, um[petition_vassal.Custom('ES_XA')] orgulhos[petition_vassal.Custom('ES_OA')] [petition_vassal.GetDynasty.GetName], solicito o apoio real para que sirvamos como governadores\"."
 court_ceremonial.1200.t: "$ceremonial_petition_prefix$ casamento real"
 court_ceremonial.1200.desc: "\"Como chefe[petition_vassal.Custom('ES_EA')] de uma das famílias mais proeminentes do reino, um[petition_vassal.Custom('ES_XA')] orgulhos[petition_vassal.Custom('ES_OA')] [petition_vassal.GetDynasty.GetName], solicito vosso consentimento formal para um casamento com vossa casa muito ilustre e santificada\"."
 court_ceremonial.1300.t: "$ceremonial_petition_prefix$ dignidade de [petition_vassal.GetHouse.GetBaseNameNoTooltip]"
 court_ceremonial.1300.desc: "\"Como chefe[petition_vassal.Custom('ES_EA')] de uma das famílias mais importantes do reino, um[petition_vassal.Custom('ES_XA')] orgulhos[petition_vassal.Custom('ES_OA')] [petition_vassal.GetDynasty.GetName], solicito vosso reconhecimento formal da linhagem e da estirpe orgulhosa da minha casa entre a nobreza [petition_vassal.GetTopLiege.GetPrimaryTitle.GetAdjectiveNoTooltip]\"."
