l_spanish:
 ##### A diplomat bleeds to death in your throne room by Isabella Welch
 court.4001.t: "Um Ferimento Superficial"
 court.4001.desc: "Um lago de sangue está coagulado aos pés de [bleeding_diplomat.GetName], um[bleeding_diplomat.Custom('ES_XA')] diplomata[bleeding_diplomat.Custom('ES_OA')] enviado por meu aliado[bleeding_diplomat_liege.Custom('ES_OA')], [bleeding_diplomat_liege.GetName]. Pelo imenso volume absorvido pelo meu fino tapete, só posso supor que ele vem sangrando neste local há horas, se não mais.\n\nPeço desculpas por esta confusão. Fui atirado pela janela por um anão que tentava me roubar em uma estalagem em minha viagem para [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. No entanto, como esse salafrário amorteceu minha queda, a visita diplomática pode continuar — ainda faltarão #EMP dias#! para a perda de sangue ser fatal!"
 court.4001.a: "Guardas, levem est[bleeding_diplomat.Custom('ES_EA')] [bleeding_diplomat.GetWomanMan] a ver um médico."
 court.4001.b: "Minha agenda só tem espaço na próxima semana — você pode esperar?"
 court.4001.c: "Podemos conversar, mas seu[bleeding_diplomat_liege.Custom('ES_OA')] tesoureiro[bleeding_diplomat_liege.Custom('ES_XA')] vai pagar pelo meu tapete."
 court.4001.carpet: "Você precisa limpar o seu tapete."
 court.4001.new_carpet: "[bleeding_diplomat.GetSheHe|U] vai sangrar ainda mais — você terá que comprar um tapete novo."
 court.4001.toast: "[bleeding_diplomat.GetName] morre"
 court.4001.toast_desc: "[bleeding_diplomat.GetName] desangrou sobre o seu luxuoso tapete."
 court.4001.cure_toast: "Médico cura diplomata"
 ##### All-male-choirs by Isabella Welch
 court.4100.t: "Escudeiros dançando como [GetPlayer.Custom( 'KnightCulturePluralNoTooltip' )]"
 court.4100.desc: "Meu músic[court_musician.Custom('ES_OA')] o da corte se aproxima de mim, praticamente saltitando em um ritmo que só [court_musician.GetSheHe] ouve.\n\nUma migalha da sua atenção, [ROOT.Char.Custom('FormOfAddressForLiege')]. Preparei um coro masculino sem igual! Segundo meu novo método, eles não apenas cantam, mas vestem meias-calças, braguilhas ornamentadas sobre suas cinturas reluzentes, e dançam de forma sincronizada! Tudo enquanto louvam a [ROOT.GetCharacter.GetFaith.HighGodName], é claro. Tenho certeza de que, se financiareis uma grande apresentação, ela será do agrado das damas da corte."
 court.4100.a: "Meu sangue ferve! Joguem este[court_musician.Custom('ES_EA')] degenerad[court_musician.Custom('ES_OA')] nas masmorras!"
 court.4100.b: "Tenho certeza de que as meias-calças deles são demais para as damas suportarem."
 court.4100.c: "Você tem o meu dinheiro, mal posso esperar pela apresentação!"
 ##### My Spire is Bigger than Yours! by Isabella Welch #####
 court.4250.t: "Minha Torre é Maior que a Sua!"
 court.4250.desc: "\"Cortesãos choramingões de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]\", irrompe [tower_challenger_rival.Custom('ES_ElLa')] [tower_challenger_rival.GetTitledFirstName|l] para se apresentar no salão do trono.\n\n\"Enquanto [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitledFirstNameNoTooltip|l] se revira no chão como um[ROOT.Char.Custom('ES_XA')] porco[ROOT.Char.Custom('ES_OA')] na lama, eu ergui em [tower_challenger_rival.GetCapitalLocation.GetTitle.GetNameNoTier] a torre mais alta que esta terra devastada já viu. Do meu [tower_challenger_rival.Custom('FortifiedBuilding')], agora quase posso arrancar os planetas do céu. Onde estão suas estrelas, [ROOT.Char.GetTitledFirstNameNoTooltip]?\".\n\nMeu [concerned_steward.GetCouncilTitle|l], [concerned_steward.GetTitledFirstName|l], me põe uma mão cautelosa no ombro. \"[ROOT.Char.Custom('FormOfAddressForLiege')|U], a torre [tower_challenger_rival.Custom('ES_DelDela')] [tower_challenger_rival.GetTitledFirstNameNoTooltip|l] é feita de alguns centenas de metros de argila e massa, com estrutura pouco sólida. Ignorem suas provocações e aguardem até ela desmoronar\"."
 court.4250.a: "Enfie sua agulha celeste no seu traseiro elevado!"
 court.4250.b: "Vamos estender nossa torre para que ela seja um pé mais alta que a sua!"
 court.4250.c: "Exijo que construamos uma torre #EMP cem pés #! mais alta!"
 court.4250.b.tt: "Você vai colocar um mastro muito longo em cima do seu [THIS.GetCharacter.Custom('FortifiedBuilding')]"
 court.4250.c.success.tt: "Você constrói uma torre enorme"
 court.4250.c.failure.tt: "Sua torre desmorona durante a construção"
 court.4250.c.failure_toast_title: "Sua torre de [ROOT.Char.Custom('FortifiedBuilding')] desmorona!"
 court.4250.c.accident.tt: "Um terrível acidente ocorre"
 court.4250.c.accident.tt.flavour: "Quem pode dizer o que pode dar errado..."
 ### Spires part 2
 court.4251.desc: "Ao receber a notícia de que minha imponente torre finalmente está completa, convido toda a minha corte para fora para uma visualização. A torre rasga o céu, mas também balança ao vento."
 court.4251.desc_child_accident: "\n\nEntre a multidão de cortesãos atônitos, meu filh[crushed_child.Custom('ES_OA')] [crushed_child.GetName] engatinha com curiosidade até a base da poderosa estrutura, fitando-a com os olhos arregalados.\n\n[crushed_child.GetNameNoTooltip] não tem nem tempo de gritar quando a ponta da torre se quebra, despenca e [crushed_child.GetHerHim] o esmaga."
 court.4251.desc_rival_accident: "\n\nConvido [tower_challenger_rival.GetTitledFirstNameNoTooltip|l] a subir comigo. Fica sem fôlego com a vista — ou talvez com a escada. Quando chegamos ao topo e aceno para meus cortesãos lá embaixo, [tower_challenger_rival.GetFirstNameNoTooltip] se inclina sobre a grade, que cede imediatamente, fazendo com que caia em um mergulho direto para o céu."
 court.4251.desc_success: "\n\nMeus cortesãos, boquiabertos, recebem a torre com uma salva de aplausos estrondosos, mas, por algum motivo, כולם evitam ficar à sua sombra.\n\n[tower_challenger_rival.GetTitledFirstNameNoTooltip|l] sussurra para mim: \"Cachorro, juro que voltarei com uma torre o #EMP doble #! de altura\"."
 court.4251.a: "Oh [crushed_child.GetNameNoTooltip], você era doce como uma panqueca!"
 court.4251.b: "Você finalmente conseguiu voar, [tower_challenger_rival.GetTitledFirstNameNoTooltip|l]."
 court.4251.c: "Quem está se revolvendo na lama agora, [tower_challenger_rival.GetTitledFirstNameNoTooltip]?"
 ### Crusades Preaching Tours by Isabella Welch
 court.4300.t: "Quantum Praedecessores"
 court.4300.preaching_tour_bernard_of_clairvaux_intro: "Bernard de Clairvaux está aqui em uma parada durante sua turnê de pregação que atravessa o continente para acender o fogo da guerra santa em andamento. Meu [bishop.GetCouncilTitle] me informa que ele foi central na elaboração das doutrinas da primeira Ordem Sagrada dos Cavaleiros Templários.\n\n"
 court.4300.preaching_tour_bernard_of_clairvaux_theology: "\"É um prazer estar junto de outra pessoa reconhecida por sua compreensão teísta. Estou trabalhando em um novo tratado sobre nossas ordens militares: 'Elogio da Nova Cavalaria'. Se você der uma olhada, vou me certificar de enviar uma mensagem a [ghw_sponsor.GetTitledFirstName|l] para que emita uma bula em apoio à sua própria ordem\"."
 court.4300.preaching_tour_bernard_of_clairvaux_flea_excommunication: "Agradeço por sua hospitalidade. Como forma de retribuir sua gentileza, percebo que vários de seus cortesãos estão coçando várias picadas. Certa vez, excomunguei uma infestação de moscas com milhares de exemplares, causando sua morte instantânea. Parece que você tem algumas pulgas ruins que precisam de censura eclesiástica!"
 court.4300.preaching_tour_bernard_of_clairvaux_standard: "Tenho que pedir um importante favor. Embora [ROOT.GetCharacter.GetFaith.HighGodName] tenha abençoado minha mente, não tenha abençoado minhas entranhas. Tal como está minha continência, não posso pregar sem uma latrina cavada logo abaixo de mim. Há alguém que queira seguir meu percurso como um cristão cavador de fossas?"
 court.4300.preaching_tour_default: "Um padre está bloqueando a entrada da sua sala do trono, distribuindo distintivos vermelhos em forma de cruz para aqueles que entram para fixar em suas roupas.\n\n\"Graças a [ROOT.GetCharacter.GetFaith.HighGodName]! Estou em uma turnê de pregação pelos reinos dos nossos aliados comprometidos na guerra santa, entregando sermões para fortalecer o recrutamento e os fundos.\""
 court.4300.a: "\"Você tem minha caneta e minha espada!\""
 court.4300.b: "\"Vamos excomungar esses insetos renegados!\""
 court.4300.c: "\"Tenho certeza de que [possible_latrine_digger.GetTitledFirstNameNoTooltip|l] está desesperad[possible_latrine_digger.Custom('ES_OA')] para ajudar!\""
 court.4300.d: "\"Meus cofres estão tão abertos quanto o céu!\""
 court.4300.e: "\"Você terá uma escolta da minha guarda pessoal em sua missão.\""
 court.4300.e.tt: "[bernard_guard_1.GetTitledFirstName] e [bernard_guard_2.GetTitledFirstName|l] escoltarão [right_portrait_character.Custom('ES_AlAla')] [right_portrait_character.GetTitledFirstName|l] em seu reino."
 court.4300.f: "Indign[ROOT.Char.Custom('ES_OA')] de falar com um[right_portrait_character.Custom('ES_XA')] [right_portrait_character.GetWomanMan] tal, faço uma genuflexão em silêncio."
 court.4300.g: "Sua insígnia de cruz parece bem brega, não é?"
 court.4300.a.tt: "O custo em [piety|lE] e [gold|lE] para fundar uma Ordem Sagrada é significativamente reduzido"
 ## Our Caravans are being attacked by Christian Nobles by Isabella Welch
 court.4350.t: "Açafrão em Chamas"
 court.4350.desc: "Meu [concerned_marshal.GetCouncilTitle] acabou de falar com um par de mercadores chamuscados que mancando entraram em meu salão do trono. \"Uma de nossas caravanas comerciais que trazia açafrão de [caravan_attacker_liege.GetCapitalLocation.GetTitle.GetNameNoTier] a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTier] foi saqueada. Os vilões não eram bandidos, mas um grupo de nobres cristãos montados e com armadura completa\".\n\nEle suspira profundamente. \"Ignóbeis nostálgicos de massacrar nosso povo tentam nos provocar a entrar em guerra sob o nariz de seu suserano[caravan_attacker_liege.Custom('ES_XA')]. Se retaliarmos, corremos o risco de comprometer os acordos com [caravan_attacker_liege.GetName] sobre as importações de luxo tão apreciadas por nossos cortesãos\"."
 court.4350.a: "É difícil ignorar tal estupidez, mas o comércio vem em primeiro lugar."
 court.4350.b: "Vamos realizar alguns saques por conta própria!"
 court.4350.c: "Vamos ver como esses bebês choram quando paramos de negociar açúcar!"
 court.4350.c.tt: "#F Você interrompe o comércio com [caravan_attacker_liege.GetNameNoTooltip]#!"
 ## Our Nobles are attacking Islamic Caravans by Isabella Welch
 court.4355.t: "Quem Ousa Batalhar contra os Sarracenos?"
 court.4355.desc: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U]\", me chama meu [reporting_marshal.GetCouncilTitle|l], \"ouvi [caravan_attacker.Custom('ES_AlAla')] [caravan_attacker.GetTitledFirstName|l] se gabando de como [caravan_attacker.GetSheHe] e um bando de nobres agiam como bandidos comuns e atacavam caravanas que transportavam açúcar de [attacked_liege.GetCapitalLocation.GetTitle.GetNameNoTier]\". Esses canalhas babam por guerra santa e estão tentando provocar [attacked_liege.Custom('ES_AlAla')] [attacked_liege.GetTitledFirstName|l]. No entanto, sugiro que precisamos muito mais do comércio do que de qualquer batalha…\".\n\n\"Não precisamos de comida, apenas beber o sangue do infiel!\", ruge [caravan_attacker.Custom('ES_ElLa')] [caravan_attacker.GetTitledFirstNameNoTooltip|l] do outro lado da sala do trono."
 court.4355.a: "Bom trabalho! Pilhar incrédulos é um ato sagrado!"
 court.4355.a.tt: "Você organiza mais saques comerciais"
 court.4355.b: "Guardas! Bati[caravan_attacker.GetHerHim] com uma tigela de açúcar até que se arrependa."
 court.4355.c: "Parece-me que continuará saqueando apesar das minhas ordens."
 court.4355.c.tt: "#F Lo hará#!"
 #Monks/Holy men chasing the decapitated head of their target of worship by Isabella Welch
 #better title please
 court.4400.t: "Em Busca da Cabeça"
 court.4400.desc: "Um bando de [head_chasing_monk.GetWomenMen] vestid[head_chasing_monk.Custom('ES_OA')] de túnicas irrompe em minha sala do trono, vasculhando o chão e revirando tudo, de cadeiras a saias, em uma busca frenética.\n\n\"[ROOT.Char.GetTitledFirstNameNoTooltip]!\", grita um[head_chasing_monk.Custom('ES_OA')]. \"Somos os seguidores de [the_headless.GetTitledFirstName|l] e precisamos encontrar sua cabeça!\""
 court.4400.a: "Vocês têm minha permissão para vasculhar meu [ROOT.Char.Custom('FortifiedBuilding')]."
 court.4400.b: "Deixe-me participar da busca!"
 court.4400.c: "Não vou permitir que um culto revire minha corte!"
 court.4400.b.discovery: "Você encontra uma antiguidade esquecida há muito tempo em seu [THIS.GetCharacter.Custom('FortifiedBuilding')]"
 court.4400.b.failure: "[head_chasing_monk.Custom('ES_LoLa')|U] s membr[head_chasing_monk.Custom('ES_OA')] s da seita fazem uma bagunça"
 court.4400.b.severed_head: "A cabeça decapitada é encontrada!"
 court.4400.c.backdown: "O culto se intimida"
 court.4400.c.refusal: "O culto voltará"
 #Rummaging through the castle
 court.4401.desc: "Os porões do meu [ROOT.GetCharacter.Custom('FortifiedBuilding')] têm muito mais bugigangas inúteis do que eu gostaria de admitir."
 court.4401.desc_arbitrary: "Eu me vanglorio para [head_chasing_monk.GetName] do meu genial plano de segurança - se ninguém além de mim entender como as pilhas estão organizadas, eu nunca poderei ser roubado!"
 court.4401.desc_default: "Cada vez que [head_chasing_monk.GetName] abre uma nova porta, espero vê[head_chasing_monk.GetHerHim] esmagad[head_chasing_monk.Custom('ES_OA')] por uma pilha de quinquilharias. Até tinha me esquecido de que guardava meu [ROOT.Char.Custom('RandomPrivateObject')] aqui embaixo!"
 court.4401.desc_object: "\n\nApós vasculharmos tudo cordialmente, não encontramos a cabeça, mas [head_chasing_monk.GetName] parece fascinad[head_chasing_monk.Custom('ES_OA')] com tudo. Considerando a delicadeza com que examina um [ROOT.Char.Custom('RandomWeirdObject')] abandonado, acho que [head_chasing_monk.GetSheHe] poderia ser um[head_chasing_monk.Custom('ES_XA')] antiquári[head_chasing_monk.Custom('ES_OA')] valios[head_chasing_monk.Custom('ES_OA')]."
 court.4401.desc_head: "\n\nTalvez guiad[head_chasing_monk.Custom('ES_OA')] pelo cheiro pútrido, ele puxa dos escombros uma cabeça humana como um porco fuçando atrás de trufas.\n\nNo entanto, a proximidade do porão com a masmorra sugere que provavelmente seja alguma alma esquecida de minhas câmaras de tortura."
 court.4401.a: "Ah, sim! Ahem. É [the_headless.GetTitledFirstNameNoTooltip|l]! Louvado seja [ROOT.GetCharacter.GetFaith.HighGodName]... e tudo isso."
 court.4401.b: "Olhe como o corte está limpo! Claramente, esse é meu trabalho."
 court.4401.c: "\"Você gostaria de vasculhar meu lixo para viver?\""
 court.4401.d: "Está um pouco sujo aqui embaixo - eu deveria mandar limpar."
 ## Being threatened by the cultist
 court.4402.desc: "Uma noite, acordo e me encontro sendo montado.[ROOT.Char.Custom('ES_OA')] Isto não é um sonho hedônico: o/a monge[head_chasing_monk.Custom('ES_EA')] desvairad[head_chasing_monk.Custom('ES_OA')] que invadiu minha sala do trono está encostando um bisturi em minha garganta.\n\nSuponho que, se nos proibis de buscar a cabeça, poderíamos nos contentar com a sua. Tão redonda e brilhante, aposto que vai rolar muito bem!"
 court.4402.a: "Por que não vamos procurá-la agora mesmo?"
 court.4402.a.tt: "Você [head_chasing_monk.GetHerHim] leva aos porões"
 court.4402.b: "Nós não vimos a cabeça! Me deixe em paz!"
 court.4402.b.success: "Você se livra de [head_chasing_monk.Custom('ES_DelDela')] monj[head_chasing_monk.Custom('ES_EA')] e [head_chasing_monk.GetHerHim] manda para as masmorras"
 court.4202.b.success.tt: "Você envia [head_chasing_monk.GetName] para a masmorra"
 court.4402.b.failure: "Você fica ferid[ROOT.Char.Custom('ES_OA')] ou morre"
 court.4402.c: "Aposto que você não conseguiria me decapitar com essa coisa insignificante!"
 court.4402.c2.tt: "Você é parcialmente decapitado"
 court.4402.c3.tt: "Você é completamente decapitado"
 ## A series of questionable artifacts are up for sale by Isabella Welch
 court.4500.t: "Dedos de osso de um [ROOT.Char.GetTitleAsNameNoTooltip]"
 court.4500.desc: "Um[artifact_peddler.Custom('ES_XA')] vendedor[artifact_peddler.Custom('ES_XA')] ambulante com uma capa com dezenas de enfeites e bugigangas costuradas nela se aproxima de mim com um tilintar.\n\n"
 court.4500.bleeder: "\"Construo artefatos para arrancar dinheiro dos ricachões tolos. Chegou-me um sussurro de que vós tendes um excesso de sangue. Estou certo de que alguns de vossos admiradores adorariam comprar um broche com uma esfera de cristal contendo uma gota do vosso sangue\".\n\nEle fica olhando as veias do meu pescoço. \"Pagarei generosamente, e algum imbecil sentirá que tem um toque de majestade real\"."
 court.4500.psalter: "\"Tenho um saltério magnífico: um manuscrito iluminado com uma capa de marfim esculpida e adornada com contas de turquesa. Contém histórias de [ROOT.GetCharacter.GetWomenMen] e [cheating_character.GetWomenMen] enamorados. A escultura certamente impressionará [cheating_character.GetTitledFirstNameNoTooltip|l] para que nunca mais pense em se deitar com outra pessoa!\"."
 court.4500.chastity_belt: "\"Todos no reino sabem que você está consumido por desejos vorazes com a força de um catafrato lançado por uma trabuco. Tenho um artefato que aliviará seu fardo\".\n\nRevela um cinto de castidade adornado com espinhos enferrujados."
 court.4500.holy_needle: "\"Tenho comigo uma arma preciosa, digna apenas de suas mãos. A Santa Lança de Antioquia, a própria Lança do Destino! Com isto, vocês aniquilarão os infiéis no campo de batalha\".\n\nTira um pequeno fragmento de metal que parece mais uma agulha de costura."
 court.4500.finger_bones: "\"Vocês me parecem um[ROOT.Char.Custom('ES_XA')] colecionador experiente[ROOT.Char.Custom('ES_OA')]\". Ele/ela tira e abre um baú maltratado repleto de ossos de todas as extremidades imagináveis.\n\n\"Tenho alguns dos mais raros ossos de dedos de santos, até mesmo alguns folheados a ouro. São vendidos separadamente, mas farei um preço especial por um conjunto completo de dez\"."
 court.4500.dead_chicken: "\"Tenho aqui uma relíquia maravilhosa! Leve isto, e qualquer inimigo no campo pensará de imediato que você já está mort[ROOT.Char.Custom('ES_OA')]. Um só aroma, e sua segurança estará garantida!\".\n\nDas profundezas de sua capa, ele tira o cadáver inteiro de uma galinha morta."
 court.4500.worm: "Meu [ROOT.GetCharacter.GetLadyLord], tenho um artefato de grande ilusão, com o qual podereis convencer a todos de que possuís poder mágico.\n\n[artifact_peddler.GetSheHe|U] apresenta um colorido verme de tecido em um fio muito fino. A princípio parece inativo, mas, ao manipular o fio, pode-se criar a ilusão de que o verme ganhou vida! Pensai em como isso impressionará a [dummy_gender.Custom('ES_LoLa')] s [dummy_gender.Custom('LadiesLords')] da corte!."
 court.4500.a: "Meu sangue mal flui mais em meu corpo — vá embora!"
 court.4500.b: "Eu tentarei qualquer coisa neste ponto."
 court.4500.c: "$court.4500.b$"
 court.4500.d: "Isso apenas aumentaria a queimação em minhas entranhas..."
 court.4500.e: "O chamado do Destino está soando!"
 court.4500.f: "Venda suas mentiras em outro lugar!"
 court.4500.g: "Existe encanto em usar um relicário de Cristo para remendar minhas meias..."
 court.4500.h: "Así que por #EMP eso#! tantos campesinos tienen nueve dedos."
 court.4500.i: "Eu quero um antebraço inteiro!"
 court.4500.j: "Oh, vá em frente, então."
 court.4500.k: "Já sou bastante bom em me fingir de mort[ROOT.Char.Custom('ES_OA')]."
 court.4500.l: "Não vou ser um manipulador de marionetes!"
 court.4500.m: "Eu gosto de um pouco de agitação!"
 court.4500.n: "$court.4500.j$"
 ## Your cupbearer is drinking all your wine! By Isabella Welch
 court.4600.t: "A Melhor [ROOT.GetCharacter.Custom('RegionalAlcoholicDrink')|U] Disponível para a Humanidade"
 court.4600.desc: "Vejo meu/minha copeir[cupbearer.Custom('ES_OA')] [cupbearer.GetTitledFirstName|l] e [cupbearer_friend.GetTitledFirstName|l] cambaleando levemente enquanto est[cupbearer.Custom('ES_EA')] serve a [cupbearer_friend.GetTitledFirstNameNoTooltip|l] um gole de uma das minhas garrafas mais raras.\n\n\"É uma pena que [ROOT.GetCharacter.GetTitledFirstName|l] guarde como um dragão todo esse estoque de [ROOT.GetCharacter.Custom('RegionalAlcoholicDrink')].\""
 court.4600.desc_lover: "Você é um[cupbearer.Custom('ES_XA')] [cupbearer.Custom('LoverPetName')] delicios[cupbearer.Custom('ES_OA')], merece sabores tão bons quanto os seus."
 court.4600.desc_friend: "\"Qualquer amigo meu merece beber como um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip]!\"."
 court.4600.desc_ending: "\n\nNem piscam quando me veem.\n\n\"Ah, meu [ROOT.GetCharacter.GetLadyLord]! Estamos testando preventivamente todas as suas bebidas em busca de veneno. Depois de encher minhas tripas com cada gole, amanhã carregarei a dor de cabeça como nada mais que uma ferida de batalha adquirida lutando em sua honra!\"."
 court.4600.a: "Minha adega está fechada com muita frequência — uma garrafa para todos na corte!"
 court.4600.b: "Minha preciosa adega! Você é um servente[cupbearer.Custom('ES_EA')] #EMP indign[cupbearer.Custom('ES_OA')]#!."
 court.4600.b.tt: "Se você parar de beber suas reservas, seu próximo banquete será mais barato."
 court.4600.c: "\"As reservas estão fechadas porque mantenho [ROOT.GetCharacter.Custom('RegionalAlcoholicDrink')] envenenado!\""
 court.4600.c.tt: "Ambos devem aprender com sua falta de respeito, mas o mundo ficará cauteloso com seus venenos."
 court.4600.c.t: "Copeir[cupbearer.Custom('ES_OA')] envenenad[cupbearer.Custom('ES_OA')]!"
 court.4600.d: "Traga rapidamente a outra garrafa onde o antídoto está guardado."
 court.4600.d.tt: "Tente curar os tolos furtivamente e mantenha seus venenos em segredo."
 court.4600.d.cure.t: "Antídoto misturado em uma bebida"
 court.4600.d.cure.tt: "Seus venenos continuam em segredo"
 court.4600.e: "Acho que vou trancar essas malditas adegas por um tempo."
 ## A special procedure to cure your ailments is suggested... by Isabella Welch
 court.4700.t: "A Trepanação da Alma"
 court.4700.desc_native_trepanning: "Alguém vestido de médico chegou à minha corte, com um estojo de ferramentas, mas meu estômago se embrulha quando um martelo e uma picareta são revelados entre elas.\n\n\"Meu [ROOT.GetCharacter.GetLadyLord], Sou um trepanador[trepanner.Custom('ES_XA')] competente."
 court.4700.desc_foreign_medicine: "Uma figura vestida de preto, vinda de uma terra estrangeira, chegou com uma maleta cheia de martelos misteriosos que se assemelham a ferramentas de escultor.\n\n\"Em minha terra, existe um ritual conhecido como trepanação, do qual você parece precisar."
 court.4700.desc_possessed: "No meio de sua possessão, espíritos nadam ao redor de sua mente, mas eles não desejam verdadeiramente ficar. $court.4700.desc_passage$ $court.4700.growth$\""
 court.4700.desc_witch: "Como ocultista, seus próprios poderes podem ser formidáveis, mas ainda há uma barreira que os impede. Suas magias poderiam conquistar o mundo inteiro se os espíritos do ar pudessem entrar em seu crânio.\""
 court.4700.desc_melancholic: "Imagine se todas as suas misérias pudessem simplesmente sair de seu corpo e se libertar no ar. Seus tormentos não são seus, mas espíritos vivos que posso libertar. $court.4700.growth$\""
 court.4700.desc_heavy_mind: "Sua mente está pesada, mas isso é apenas porque está sobrecarregada. Sua cabeça está repleta de espíritos roendo seu intelecto, pensamento por pensamento. $court.4700.growth$ $court.4700.desc_passage$\""
 court.4700.desc_blind: "Sua visão não desapareceu, está apenas turva. Há espíritos nadando na polpa de seus olhos. Posso mergulhar nessas piscinas e trazê-los para fora."
 court.4700.desc_lunatic: "Suas decisões são tomadas por um grupo de companheiros espirituais relutantes, eles são a assembleia lunática. $court.4700.growth$ Podemos trazê-los à tona, com a ajuda de alguns pregos."
 court.4700.desc_headache: "Dizem que você sofre de dores de cabeça esmagadoras. À medida que sua vida é preenchida com pressões, cada vez mais espíritos se reúnem e se alimentam das preocupações em seu crânio. $court.4700.desc_passage$"
 court.4700.desc_trepanning_vices: "Os vícios criminais dos quais você é acusado não são seus, você está apenas sob o domínio transitório de alguns espíritos. $court.4700.desc_passage$"
 court.4700.growth: "Eles podem estar espreitando em um crescimento em seu cérebro."
 court.4700.desc_passage: "Posso criar uma passagem para libertá-los."
 court.4700.a: "Que zombaria! Minha aflição é muito mais do que superstição!"
 court.4700.b: "Não suporto mais isso, tragam os cinzéis!"
 court.4700.b.tt: "A operação será realizada..."
 court.4700.c: "Não sou um[ROOT.Char.Custom('ES_XA')] criminoso, meu povo tem mentes atrasadas!"
 court.4700.d: "Recuso, mas talvez meu médic[court_physician.Custom('ES_OA')] possa aprender com você."
 court.4700.success: "Você sobrevive à trepanação incólume"
 court.4700.no_success: "A trepanação não faz nada"
 court.4700.removal: "A trepanação remove sua aflição"
 court.4700.headache: "Todas as suas preocupações desaparecem"
 court.4700.witch_power: "A trepanação aumenta seu poder de bruxo"
 court.4700.mental_faculties: "A trepanação danifica suas faculdades mentais"
 court.4700.physical_faculties: "A trepanação danifica seu corpo"
 ## The Trepanning!
 court.4701.physician_study: "Levam-me ao consultório do meu médic[court_physician.Custom('ES_OA')] [court_physician.GetTitledFirstName|l], que [trepanner.GetTitledFirstName|l] sugere que tem talento para ajudar em nosso empreendimento. Enquanto [trepanner.GetSheHe] me amarra a uma cadeira, [court_physician.GetTitledFirstNameNoTooltip|l] se aproxima por trás."
 court.4701.no_physician: "Sou levado para uma sala nos fundos da minha [ROOT.Char.Custom('FortifiedBuilding')]. [trepanner.GetTitledFirstNameNoTooltip|l] me assegura, enquanto me amarra a uma cadeira, que isso só causaria aflição se minha corte ouvisse meus gritos.\n\n"
 court.4701.physician_excited: "\"Ah, como eu adoro uma boa trepanação!\"\n\n"
 court.4701.physician_excited_2: "\"Que empolgante! Um novo procedimento!\"\n\n"
 court.4701.physician_concerned: "\"Tenha cuidado com [ROOT.GetCharacter.GetSheHe]!\"\n\n"
 court.4701.physician_concerned_2: "\"Eu ajudarei se essa prática vulgar falhar.\"\n\n"
 court.4701.mental_health_cannot_be_trepanned_away: "$court.4701.trepanning_vices_operation$ \n\nEmbora eu desejasse que um tratamento tivesse tirado as dores, há certa segurança em saber que, ao menos, minha mente é minha, e não de um demônio."
 court.4701.trepanning_success: "O martelo faz o cinzel adentrar minha cabeça. Ao mesmo tempo, os portões do meu corpo se abrem. Eu palpito, tremo, arrepio e sinto minhas tormentas sendo aliviadas. Em meio a uma chuva de faíscas da dor, emergo em um mundo novo deliciosamente calmo."
 court.4701.trepanning_witch_power: "Não tenho medo enquanto o cinzel começa a se enterrar em meu crânio. Em meio ao esfregar de bálsamos em meu cérebro e à sensação de cegueira, posso ouvir [ROOT.Char.GetFaith.WitchGodName|U] rir deste ritual tolo.\n\n$court.4701.trepanning_no_result$"
 court.4701.trepanning_vices_operation: "O martelo se choca contra meu crânio, mas, agarrado à cadeira, $court.4701.trepanning_no_result$"
 court.4701.trepanning_headache_operation: "$court.4701.trepanning_no_result$ A dor em minha cabeça desaparece."
 court.4701.trepanning_mental_injury: "[trepanner.GetTitledFirstNameNoTooltip|l] me bate suavemente o crânio com um martelo, como se estivesse quebrando um ovo cozido mole."
 court.4701.trepanning_incapable_injury: "Uma luz me envolve. Sinto um fluxo e vejo imagens de dias e anos passados aparecendo de uma vez. Onde estou? Por que tenho dor de cabeça? Qual é o meu nome? Qual é o meu recheio de torta favorito?"
 court.4701.trepanning_possessed_injury: "Embora tenham me prometido que eu estava libertando espíritos da minha cabeça, de repente testemunho um espírito pela primeira vez. Uma sombra alada e bela dança de sombra em sombra na sala e sorri para mim."
 court.4701.trepanning_deviant_injury: "Conforme o buraco começa a ser cavado, começo a apreciar o som das minhas entranhas esmagadas. Após uma vertigem da minha mente, sou tomado por súbitos momentos de genialidade! Devo me tornar noturno e consumir apenas cascas de pão! Por que nunca fiz amor enquanto fingia ser um cavalo?"
 court.4701.trepanning_learning_penalty: "Conforme o bisturi gira e gira, percebo que estou lutando para sequer chorar #EMP pare! #! Quando o movimento finalmente cessa, minha mente nadante sente que precisa atravessar lama para formar uma frase."
 court.4701.trepanning_physical_injury: "A princípio, os cinzéis que cortam meu crânio causam tanta dor em meu corpo que minha própria coluna parece serrada ao meio. Conforme a escavação vai mais fundo,"
 court.4701.trepanning_no_result: "Recupero o controle. Quando o cinzel é finalmente removido e não sinto diferença alguma além de uma brisa leve soprar em meu cérebro exposto."
 court.4701.trepanning_coordination_penalty: "Começo a não sentir nada. Quando o cinzel é finalmente removido, não consigo senti-lo. Ao tentar levantar, meu corpo mal obedece."
 court.4701.trepanning_blind_injury: "minha visão de repente se torna um mar de neblina. No segundo seguinte, lamento até mesmo essa neblina ao entrar em um reino de crepúsculo eterno."
 court.4701.a: "Hee hee! Olá!"
 court.4701.b: "Desgraçad[trepanner.Custom('ES_OA')]! O que você fez?"
 court.4701.c: "Minha cabeça latejante!"
 court.4701.d: "Quem é um bom demônio? Sim, você é!"
 court.4701.e: "Deveria defenestrar todas as minhas roupas íntimas!"
 court.4701.f: "Fantástico! Gostaria de ser meu médico?"
 court.4701.g: "Prova de que minhas supostas 'vícios' dificilmente são obra de demônios"
 court.4701.h: "Devo-lhe uma dívida... depois de encontrar uma rolha para o buraco..."
 court.4701.i: "Meus pensamentos aflitos são um inimigo que só eu posso enfrentar."
 court.4750.t: "Eu Preciso de um Herói"
 court.4750.desc: "[Select_CString(poet.IsFemale, 'Uma nova convidada', 'Um novo convidado' )] acaba de chegar à minha corte, [Select_CString(poet.IsFemale, 'uma poetisa', 'um poeta' )] de muita lábia e certa fama local.\n\n\"Meu [ROOT.GetCharacter.GetLadyLord], assim como os narradores de antigamente se sentavam aos pés dos antigos senhores da guerra, eu também, [poet.GetFirstName], espero encontrar emprego sob a vossa proteção. Por favor, permiti-me demonstrar meu valor! Talvez eu pudesse dedicar-vos minha próxima obra!\"\n\n\"Minha especialidade são as grandes epopeias, grande [ROOT.Char.GetTitleAsName|l], de qual herói quereis que eu cante?\"."
 court.4750.a: "Invente uma história do reinado da Papa Joana!"
 court.4750.b: "Lady Godiva! Uma balada sobre sua cavalgada!"
 court.4750.c: "Sinbad é uma figura tão corajosa!"
 court.4750.d: "Calígula... pouco apreciado, mas uma figura intrigante."
 court.4750.e: "As histórias de Nasrudin sempre arrancam um sorriso dos meus lábios."
 court.4750.f: "Fale-me sobre Valmiki, o poeta arauto!"
 court.4750.g: "Bem, é claro que seria eu mesmo!"
 court.4750.h: "Eu não tenho tempo nem ouro a perder."
 court.4751.intro: "Segundo o que pedi, [Select_CString(poet.IsFemale, 'a nova poetisa', 'o novo poeta' )] [poet.GetFirstName] me traz uma obra inspirada em"
 court.4751.topic.pope_joan: "Papisa Joana,"
 court.4751.topic.lady_godiva: "Lady Godiva,"
 court.4751.topic.sinbad: "Sinbad,"
 court.4751.topic.caligula: "Calígula,"
 court.4751.topic.nasreddin: "Nasrudin,"
 court.4751.topic.valmiki: "Valmiki,"
 court.4751.topic.ruler_hero: "minha vida heróica,"
 court.4751.topic.unexpected: "mas não é como eu esperava."
 court.4751.ruler_character: "\n\nUma breve olhada no manuscrito iluminado mostra que eu apareço ao lado do herói como um personagem!\n\n"
 court.4701.pope_joan_desc: "\n\nAo olhar as ilustrações, percebo que as iluminuras de Joana usam meus traços em seu rosto, como se fosse o meu próprio!\n\n[poet.GetTitledFirstNameNoTooltip|U] se inclina para mim. \"Vossos encantos superam em muito os de nosso papa. Assim como o amante de Joana a convenceu a vestir-se de homem e empreender estudos em Atenas, concedo-vos este texto na esperança de que a figura que #EMP debo#! adorar sejais vós\"."
 court.4701.ruler_hero_desc: "\n\nO poema é sobre meus feitos gloriosos, alguns menos reais que outros, mas todos absolutamente impressionantes."
 court.4751.topic.lady_godiva_desc: "Vago ao lado de Lady Godiva neste poema. Tão bela[ROOT.Char.Custom('ES_OA')]... e tão nua[ROOT.Char.Custom('ES_OA')]!"
 court.4751.topic.sinbad_desc: "Sou um personagem misterioso com o qual Simbad se encontra vez após vez em suas aventuras. Sou a criatura que nasce do colossal ovo de roque. Sou o Velho do Mar que se agarra aos ombros de Simbad por anos. Sou um[ROOT.Char.Custom('ES_XA')] cativ[ROOT.Char.Custom('ES_OA')] do gigante devorador de homens."
 court.4751.topic.caligula_desc: "Sou um personagem no texto: [Select_CString(ROOT.Char.IsFemale, 'la agotada consejera', 'el agotado consejero' )] de Calígula, alguém cheio de sabedoria, mas a quem raramente se dá ouvidos."
 court.4751.topic.nasreddin_desc: "Os contos mostram Nasreddin cavalgando atrás de mim enquanto realizo minhas tarefas na corte, fazendo comentários sarcásticos a cada ação minha do alto de seu burro."
 court.4751.topic.valmiki_desc: "\n\nComo na lenda, um caçador atira em um belo pássaro e não consigo evitar recitar uma copla.\n\nAssim como o poeta arauto compôs o primeiro poema por acidente, eu também me pego compondo versos espontâneos sempre que sou pego desprevenido[ROOT.Char.Custom('ES_OA')]."
 court.4751.a: "De alguma forma, a impropriedade de sua admiração a torna mais sedutora..."
 court.4751.b: "Talvez eu deva mirar no Papado..."
 court.4751.c: "Ficarei irritado, mas isso certamente me conquistará admiradores..."
 court.4751.c.tt: "Aqueles atraídos por você certamente notarão..."
 court.4751.d: "Isso está plantando pensamentos impuros em minha mente."
 court.4751.e: "Sempre há algo a ser aprendido por trás de suas piadas."
 court.4751.f: "Isso é divertido, tenho certeza de que a corte irá gostar."
 court.4751.g: "Como deve ser!"
 court.4751.h: "Isso parece ser uma excelente faísca para o meu próximo incêndio."
 #By Isabella Welch
 court.4800.t: "Abra suas Asas"
 court.4800.desc: "\"Faça esse barulho mais uma vez, bufão/ona, e eu te derrubo!\" Ao me deparar com meu guarda-costas, [defenestrating_bodyguard.GetTitledFirstName|l], percebo que está acompanhad[defenestrating_bodyguard.Custom('ES_OA')|U] pelo traseiro de [defenestrated_character.GetTitledFirstName|l], a quem mantém suspenso pela janela."
 court.4800.a: "Vamos ver se os gansos sabem voar!"
 court.4800.maimed_toast: "[defenestrated_character.GetTitledFirstName] sem voo[defenestrated_character.Custom('ES_XA')]"
 court.4800.death_toast: "[defenestrated_character.GetTitledFirstName] pereceu no voo"
 court.4800.b: "Vamos não exagerar! Dê uma pequena surra de cortesia."
 court.4800.c: "[defenestrated_character.GetTitledFirstNameNoTooltip|l] tem razão. Um bom guarda nunca se deixa provocar."
 #By Isabella Welch
 court.4801.t: "Pronto para Explodir"
 court.4801.desc: "Ao longe, vejo [poopy_child.Custom('ES_AlAla')] pequen[poopy_child.Custom('ES_OA')] [poopy_child.GetTitledFirstName|l] brincar na minha sala do trono e percebo um cheirinho inconfundível.\n\n[ROOT.GetCharacter.Custom('GetMamaPapa')|U]! Que alegria vê-lo! Quando corre para abraçar minha perna, sinto a fralda pesada amassar-se contra a panturrilha.\n\nQuando começa a vazar pelo meu tornozelo, pergunto a mim mesmo: será que temos tão poucos servos que eu mesmo devo me ocupar[ROOT.Char.Custom('ES_OA')] da tarefa degradante de trocar uma fralda?"
 court.4801.a: "\"Venha para os meus braços, vamos te limpar.\""
 court.4801.b: "Eu prefiro perder uma guerra do que tocar nessa sujeira."
 #By Isabella Welch
 court.4802.t: "Educação Sob Coação"
 court.4802.desc: "Vejo [court_tutor.Custom('ES_AlAla')] tutor[court_tutor.Custom('ES_XA')] da corte, [court_tutor.GetTitledFirstName|l], com uma multidão de estudantes ao redor.\n\n\"Tutor[court_tutor.Custom('ES_XA')], o que é um paralelogramo?\"\n\n\"Tutor[court_tutor.Custom('ES_XA')], o que significa 'fazer amor'?\"\n\n\"Tutor[court_tutor.Custom('ES_XA')], devo soprar minha flauta mais alto, ou #EMP mais#! baixo?\""
 court.4802.a: "Oh, eles são adoráveis, não são?"
 court.4802.b: "Vou lhe comprar uma trombeta, [child_2.GetTitledFirstNameNoTooltip|l]. Isso vai soar muito #EMP más fuerte#!!"
 court.4802.c: "Eu entendo, vamos procurar um novo Tutor."
 #By Isabella Welch
 court.4803.t: "Uma Pena Fantasmagórica"
 court.4803.desc: "Meu po[court_poet.Custom('ES_TaTisa')], como sempre faz assim que estou ao seu alcance, começa a discursar contra mim. \"Oh, [ROOT.GetCharacter.Custom('PetName')] de minhas entranhas! Deve ser muito duro viver uma vida abandonad[ROOT.Char.Custom('ES_OA')] pelas musas\".\n\n\"Comandais exércitos, mas não podeis comandar a palavra escrita. A humanidade já presenciou alguma vez tragédia mais requintada?\".\n\n\"Permiti que eu vos auxilie. Poderia escrever alguns dos vossos discursos por vós. Dizei-me apenas o tema, e eu lhe darei um belo toque de fraseado\"."
 court.4803.a: "Minhas palavras poderiam usar um certo... floreado."
 court.4803.b: "Às vezes me sinto mais poeteira[ROOT.GetCharacter.Custom('ES_TaTisa')] que [ROOT.GetCharacter.GetTitleAsName]. Não preciso de ajuda."
 court.4803.c: "Eu preferiria que você escrevesse um poema de mim para o meu amado."
 court.4803.c.tt: "Você enviará o poema a [lover.GetTitledFirstName|l]"
 court.4803.c.intrigue.tt: "Com sua grande habilidade de [intrigue|lE] pode perceber que foi escrito por outra pessoa."
 court.4803.c.realize.tt: "[lover.GetFirstNameNoTooltip] percebe o verdadeiro autor"
 court.4803.c.fooled.tt: "[lover.GetFirstNameNoTooltip] se sente lisonjead[lover.Custom('ES_OA')] pelo poema \"teu\""
 court.4803.d: "Minhas palavras podem não ser refinadas, mas são do fundo do meu coração."
 #By Isabella Welch
 court.4804.t: "Companheiros de Cama Desagradáveis"
 court.4804.desc: "Observo que dois dos meus cortesãos que compartem alojamento estão discutindo, ambos com profundas olheiras.\n\n\"Meu [ROOT.GetCharacter.GetLadyLord], não posso compartilhar a cama com [roomate_2.GetTitledFirstName|l] por mais uma noite. [roomate_2.GetSheHe|U] é um[roomate_2.Custom('ES_XA')] porco[roomate_2.Custom('ES_OA')] ganancioso[roomate_2.Custom('ES_XA')], por como fica com o cobertor\".\n\n\"E não houve uma única noite nesta semana em que [roomate_1.GetTitledFirstName|l] não tivesse [ROOT.Char.Custom('RandomBadRoomate')]\", estremece [roomate_2.GetFirstName]. \"Eu vos imploro: concedei-nos uma acomodação melhor. Não sonho com nada além de uma cama fria e vazia\"."
 court.4804.a: "Vou pedir aos servos que encontrem novos colegas de quarto para você."
 court.4804.b: "Estas dependências #EMP no #! são dignas da corte de um[ROOT.GetCharacter.Custom('ES_XA')] [ROOT.GetCharacter.GetTitleAsNameNoTooltip]."
 court.4804.c: "Não temos espaço para conceder um quarto individual a todos."
 #By Isabella Welch
 court.4805.t: "Cortando Caminhos"
 court.4805.desc: "Meu arquitet[royal_architect.Custom('ES_OA')], [royal_architect.GetTitledFirstName|l] arrasta um enorme saco sem parar de sorrir. Faço uma careta de dor ao ver como ele arranha e risca o chão do salão do meu trono.\n\n\"Minha [ROOT.GetCharacter.GetLadyLord], fiz uma #EMP tremenda#! travessura, mas acho que vais adorar\".\n\nEspero ver uma obscenidade quando abre o saco, mas por dentro não vejo nada além de um grande bloco de pedra retangular. \"Esta é a pedra fundamental do(a) [rival.Custom('FortifiedBuilding')] de su[rival.Custom('ES_OA')] inimig[rival.Custom('ES_OA')] jurad[rival.Custom('ES_OA')], [rival.GetTitledFirstName|l]. Agora todo o simbolismo de sua colocação foi perdido!\""
 court.4805.a: "Vamos construir um chiqueiro com ela!"
 court.4805.b: "Quero que seja exibida com orgulho!"
 court.4805.c: "Lamento minha rivalidade com [rival.GetSheHe]. Recoloque-a."
 court.4805.d: "Por que você me trouxe esse entulho? Jogue fora!"
 #By Isabella Welch
 court.4806.t: "[ROOT.Char.GetTitleAsNameNoTooltip] ófilo"
 court.4806.intro: "Um novo rosto está circulando pela minha sala do trono, de vez em quando ri e pula no lugar quando encontra uma obra de arte que mostra as tradições da cultura [ROOT.Char.GetCulture.GetNameNoTooltip]."
 court.4806.hre_desc: "\n\n\"Meu coração! “[ROOT.GetCharacter.GetPrimaryTitle.GetNameNoTierNoTooltip] é o melhor! Embora eu more em [adoring_fan_liege.GetCapitalLocation.GetTitle.GetNameNoTier], eu realmente acho que nasci com a cultura [ROOT.Char.GetCulture.GetName] no coração! Posso listar todos os príncipes-bispos. Até tenho uma tatuagem do rosto de [ROOT.GetCharacter.GetTitledFirstNameNoTooltip|l] na panturrilha\".\n\nEle enfia a mão na mochila e puxa o que parece ser uma réplica barata de bronze da Reichskrone. \"Eu uso isso na maioria dos dias e digo às pessoas que me perguntam: \"Espero contar com seu voto, príncipe-eleitor!\"\"."
 court.4806.byzantine_desc: "Quando meu visitant[adoring_fan.Custom('ES_OA')] e se aproxima, os guardas têm que impedir que se aproxime demais.\n\n\"[ROOT.Char.GetTitleAsNameNoTooltip]! Embora eu seja de [adoring_fan_liege.GetCapitalLocation.GetTitle.GetNameNoTier], adoro tanto os [ROOT.Char.GetCulture.GetCollectiveNoun] que quase me dá algo.\"\n\n\"Dediquei minha vida a tentar viver como um[adoring_fan.Custom('ES_OA')] de vocês e me empenhei no estudo do [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip].\"\n\n\"Só uso roupa íntima roxa. Tenho certez[adoring_fan.Custom('ES_OA')] de que, se o Império caísse, eu sentiria isso mais intensamente do que a morte da minha própria mãe: o mundo nunca deixaria de ouvir meus lamentos!\""
 court.4806.general_desc: "Há algo estranho neste[adoring_fan.Custom('ES_EA')] visitante, e quando se apresenta, fica evidente que está carregando uma réplica de [ROOT.Char.Custom('signature_weapon')] que mais gosto.\n\n\"Não consigo evitar me ajoelhar diante de vossa graça: dediquei minha vida em [adoring_fan_liege.GetCapitalLocation.GetTitle.GetNameNoTier] a apreciar a cultura dos [ROOT.Char.GetCulture.GetCollectiveNoun]. Só falo em [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip], como [ROOT.GetCharacter.Custom('GetExpensiveMeal')]. Como [ROOT.Char.GetCulture.GetNameNoTooltip] e estudei a lâmina de forma [ROOT.Char.GetCulture.GetNameNoTooltip]\".\n\n\"Minha família me expulsou de casa. Diz que, se a única coisa que faço é me obcecar por tal [ROOT.GetCharacter.GetPrimaryTitle.GetNameNoTooltip], é melhor que eu vá morar lá\"."
 court.4806.a: "Isso é lisonjeiro, embora um pouco invasivo."
 court.4806.b: "Dê-me essa coisa vagabunda! Somente eu posso usar a coroa."
 court.4806.c: "Alguém tão entusiasmado deveria se juntar à nossa corte!"
 court.4806.c.byz: "Devido ao seu patriotismo, permitirei que você use roxo."
 court.4806.d: "Somente um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] pode usar púrpura! Prisão a este[adoring_fan.Custom('ES_EA')] canalha!"
 court.4806.e: "Como ousa copiar meu [ROOT.Char.Custom('signature_weapon')]! Tire isso!"
