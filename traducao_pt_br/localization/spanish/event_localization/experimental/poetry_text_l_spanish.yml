l_spanish:
 first_line_text_set_1_A: "Eu sou uma flor gentil e delicada"
 first_line_text_set_1_B: "Eu gostaria que você me convidasse para o seu bower"
 first_line_text_set_2_A: "Você é minha estrela guia neste"
 first_line_text_set_2_B: "Tenho quase certeza de que não sou suíço"
 second_line_text_set_1_A: "Você só me faz pensar em uma torre"
 second_line_text_set_1_B: "E eu tenho tanto poder feudal"
 second_line_text_set_2_A: "Na verdade, é a causa de toda a minha felicidade"
 second_line_text_set_2_B: "Tudo desmorona em um beijo suave"
 third_line_text_set_1_A: "Talvez eu devesse passar mais tempo pensando"
 third_line_text_set_1_B: "Talvez eu pudesse fazer algo sobre esse fedor"
 third_line_text_set_2_A: "Ao longo do caminho do voo de um passarinho"
 third_line_text_set_2_B: "Em algum lugar entre queijo de cabra e coalhada"
 fourth_line_text_set_1_A: "Mas estou apaixonado pela sensação de afundar"
 fourth_line_text_set_1_B: "Brincadeira, vamos beber mais"
 fourth_line_text_set_2_A: "É apenas uma única palavra"
 fourth_line_text_set_2_B: "Desculpe por ficar absurdo"
 poetry_line_break: "\n"
 #Lines from the Song of Roland
 poetry.0002.t: "Um Poema!"
 #First line
 0002.blank_verse_line_1_A: "O rei Marsílio jaz em Saragoça,"
 0002.blank_verse_line_1_B: "Entre os infiéis, Blancandrín é muito sábio"
 0002.blank_verse_line_1_C: "O rei Carlos, nosso Senhor e soberano,"
 0002.blank_verse_line_1_D: "Alegre e corajoso agora é aquele Imperador"
 #Second line
 0002.blank_verse_line_2_A: "Seguiu seu caminho para um pomar fresco;"
 0002.blank_verse_line_2_B: "Em vassalagem, ele era um cavaleiro galante,"
 0002.blank_verse_line_2_C: "Sete anos completos permaneceu na Espanha,"
 0002.blank_verse_line_2_D: "Já domina Cordres, cujos muros estão em ruínas,"
 #Third line
 0002.blank_verse_line_3_A: "Sentado em um trono de mármore azul"
 0002.blank_verse_line_3_B: "Primeiro em proeza, ele ficou ao lado de seu senhor."
 0002.blank_verse_line_3_C: "Conquistou a terra e conquistou o mar ocidental"
 0002.blank_verse_line_3_D: "Suas catapultas arrasaram cidade e torres."
 #Fourth line
 0002.blank_verse_line_4_A: "Seus homens, mais de vinte mil, estavam ao seu redor."
 0002.blank_verse_line_4_B: "E assim falou: \"Não tenhais medo!"
 0002.blank_verse_line_4_C: "Nenhuma fortaleza resiste diante dele,"
 0002.blank_verse_line_4_D: "Ouro e prata e muitos vestidos adornados com joias."
 #Lines from the Song of Roland for now
 poetry.0003.t: "Poema sobre [ROOT.GetCharacter.Custom('theme_announcement')|UD]"
 #First line
 0003.line_1_A: "Uma terra devastada por [ROOT.GetCharacter.Custom('noun_specific_singular_one')|D] malicioso"
 0003.line_1_B: "Em uma era duradoura de [ROOT.GetCharacter.Custom('noun_abstract_plural_one')|D]"
 0003.line_1_C: "[ROOT.GetCharacter.Custom('noun_specific_singular_two')|D] Carlos, o Rei, nosso Senhor e Soberano,"
 0003.line_1_D: "[ROOT.GetCharacter.Custom('noun_abstract_singular_two')|D] Alegre e destemido é agora esse Imperador,"
 #Second line
 0003.line_2_A: "Todos nos rendemos a [ROOT.GetCharacter.Custom('noun_abstract_singular_one')|D] tão cruel"
 0003.line_2_B: "Vendo agora com olhos de [ROOT.GetCharacter.Custom('noun_abstract_plural_two')|D]"
 0003.line_2_C: "[ROOT.GetCharacter.Custom('noun_abstract_singular_two')|D] Passou sete anos na Espanha,"
 0003.line_2_D: "[ROOT.GetCharacter.Custom('noun_abstract_singular_two')|D] Cordres ele detém, as muralhas estão desmoronadas,"
 #Third line
 0003.line_3_A: "Se o seu [ROOT.GetCharacter.Custom('noun_specific_singular_two')|D] eu não alcançar"
 0003.line_3_B: "Após [ROOT.GetCharacter.Custom('two_syllable_number')|D] anos de [ROOT.GetCharacter.Custom('noun_abstract_plural_two')|D]"
 0003.line_3_C: "[ROOT.GetCharacter.Custom('noun_specific_singular_two')|D] Conquistou a terra, e venceu o oceano ocidental,"
 0003.line_3_D: "[ROOT.GetCharacter.Custom('noun_abstract_singular_two')|D] Suas catapultas derrubaram cidade e torre."
 #Fourth line
 0003.line_4_A: "Eles podem nunca levar meu [ROOT.GetCharacter.Custom('noun_abstract_singular_two')|D]"
 0003.line_4_B: "Logo os [ROOT.GetCharacter.Custom('noun_specific_plural_two')|D] são todos esquecidos"
 0003.line_4_C: "[ROOT.GetCharacter.Custom('noun_specific_singular_two')|D] Agora nenhuma fortaleza permanece contra ele,"
 0003.line_4_D: "[ROOT.GetCharacter.Custom('noun_abstract_singular_two')|D] Prata e ouro e muitos vestidos adornados."
 0003.poetry_from: "[actor.GetTitledFirstName] escreveu um poema para você\n\n"
