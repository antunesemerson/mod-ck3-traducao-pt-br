l_spanish:
 sell_titles.0001.opening: "[vassal.Custom2('AppropriateGreetingPositive', ROOT.Char )]"
 sell_titles.0001.desc.dislike: "Não estou interessado nas promessas vazias que você está vendendo, mas se você está desesperado por ouro, acredito que podemos chegar a um acordo."
 sell_titles.0001.desc.normal: "Não busco maiores honrarias, meu [vassal.Custom2('RelationToMeShort', ROOT.Char)], mas se precisar de ouro, acredito que podemos chegar a um acordo."
 sell_titles.0001.a: "Preciso do ouro pelo bem do reino, entenda."
 sell_titles.0001.b: "Isso não é uma barganha em um mercado de camponeses!"
 sell_titles.0002.opening: "[friend.Custom2('AppropriateGreetingPositive', ROOT.Char )]"
 sell_titles.0002.desc: "Me han dicho que ofreces títulos a cambio de «obsequios».\n\nSi necesitabas oro, ¡habérmelo dicho! ¿Para qué están los amigos?"
 sell_titles.0002.a: "Você é um[friend.Custom('ES_XA')] amig[friend.Custom('ES_OA')] de verdade, [friend.GetFirstNameNoTooltip]!"
 sell_titles.0002.b: "Não posso aceitar isso."
 sell_titles.0003.desc: "Estou honrado pelos títulos que você me ofereceu, e é claro que vou subsidiá-los, como é correto e adequado!\n\nNão tenho palavras para agradecer por essa honra. Farei o máximo por você, seja o que for que você exija."
 sell_titles.0003.a: "Você é um vassalo verdadeiro e leal."
 sell_titles.0003.a.flavor: "Quem dera todos entendessem como estou sendo extremamente generoso."
 sell_titles.0004.opening: "[vassal.Custom2('AppropriateGreeting', ROOT.Char )]"
 sell_titles.0004.desc: "Chegou ao meu conhecimento que você está vendendo títulos, mesmo que eu mesmo não tenha sido adequadamente honrado por meu serviço.\n\nDe fato, considerando minhas conquistas em seu nome, alguns novos títulos não seriam de desprezar."
 sell_titles.0004.a: "Assim será, então."
 sell_titles.0004.b: "Não se engrandeça!"
 sell_titles.0005.desc: "Embora não venham com feudos, as obrigações associadas aos títulos que você está oferecendo são mais generosas do que eu poderia pedir.\n\nÉ claro que honrarei tamanha munificência com um presente adequado!"
 sell_titles.0005.a: "São? Ah."
 sell_titles.0005.b: "Não é isso que... Maldito seja você!"
 sell_titles.0006.desc: "Aunque sé que me arriesgo a vuestra ira, mi honor me exige hablar. ¡Es evidente que vuestra oferta de dar «títulos» a cambio de «obsequios» no está motivada por más que pura codicia!\n\nMi honor proviene de mi nobleza, no de mis riquezas, pero ¡para vos no parece ser así!"
 sell_titles.0006.a: "Como você ousa me envergonhar assim?!"
 sell_titles.1002.t: "Venda de Títulos: Uma Proposta Modesta"
 sell_titles.1002.desc: "Un[merchant.Custom('ES_XA')] tal [merchant.GetTitledFirstName|l], un[merchant.Custom('ES_XA')] ric[merchant.Custom('ES_OA')] mercader, se ha enterado de mis intentos de vender ciertos títulos superfluos, pero, no obstante, tiene una sugerencia mucho más audaz:\n\n«Si presentase pruebas de mi lejano parentesco con la dinastía [ROOT.Char.GetDynasty.GetBaseName], ¿apoyaríais mi reivindicación?».\n\nLa proposición es completamente absurda, pero el/la mercader posee una cantidad irrisoria de oro…"
 sell_titles.1002.a.muslim: "Até Maomé era um comerciante!"
 sell_titles.1002.a: "¡Celebremos el regreso de mi [merchant.Custom('SisterBrother')] perdid[merchant.Custom('ES_OA')]!"
 sell_titles.1002.b: "Meu nome não está à venda, sob nenhuma circunstância!"
 sell_titles.1004.t: "Venda de Títulos: Um Excelente Negócio"
 sell_titles.1004.desc: "¡En contra de lo esperado, [merchant.GetTitledFirstName|l], el/la mercader que resultó ser un[merchant.Custom('ES_XA')] pariente muy, muy lejano, ha demostrado ser un[merchant.Custom('ES_XA')] guerrer[merchant.Custom('ES_OA')] excelente!\n\n¿Quién habría pensado que un[merchant.Custom('ES_XA')] plebey[merchant.Custom('ES_OA')] podría llegar a tales cotas?"
 sell_titles.1004.a: "Talvez realmente seja de sangue nobre, afinal?"
 sell_titles.1005.desc: "No tempo desde que aceitei a [merchant.GetTitledFirstName|l]… quer dizer, desde que [merchant.GetTitledFirstName|l] retornou para a família, provou ser muito popular entre os [ROOT.Char.GetFaith.AltPriestTermPlural]. Ao que parece, é bastante sabi[merchant.Custom('ES_OA')]. Muito mais do que alguém esperaria de um[merchant.Custom('ES_XA')] simples plebeu[merchant.Custom('ES_OA')]."
 sell_titles.1005.a: "Até mesmo ouro é encontrado entre pedras comuns, suponho."
 sell_titles.1006.desc: "Supongo que unas nuevas perspectivas #EMP pueden#! venir bien de vez en cuando, ¿no? [merchant.GetTitledFirstName|l], que ya tuvo bastante talento para adquirir un lugar en mi casa, ha demostrado ser increíblemente hábil en el arte de navegar entre los peligros de mi corte. ¡A veces me pregunto si está más enterad[merchant.Custom('ES_OA')] de lo que pasa que yo!"
 sell_titles.1006.a: "Graças a [ROOT.Char.GetFaith.HighGodName] que está em dívida comigo."
 sell_titles.1007.t: "Venda de Títulos: Ovelha Negra"
 sell_titles.1007.desc: "Por algum motivo, não se deve promover plebeus à nobreza por puro capricho. Desde que [merchant.GetTitledFirstName|l] se juntou à minha corte, não tem sido nada além de um embaraço!\n\nEu apoiei a reivindicação de que pertence à minha Casa, então agora não há mais nada a fazer, mas é um erro que não pretendo cometer novamente!"
 sell_titles.1007.a: "Que pena..."
