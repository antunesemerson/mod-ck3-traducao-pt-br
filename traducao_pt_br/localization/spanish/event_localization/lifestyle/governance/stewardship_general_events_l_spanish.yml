 ###################
 #Standard Events #
 ###################
 #Peasant mob brings someone before you, accusing them of witchcraft. By Sean Hughes
 stewardship_general.1054.t: "Acusações de [witch.Custom('MagicPracticeTerm')]"
 stewardship_general.1054.desc: "Telas manchadas de sangue… penas de corvo… poções com cheiro estranho. Estes são os objetos que me apresentaram um grupo de aldeões de [target_county.GetNameNoTier] como prova de que [witch.GetFirstName] tem praticado [witch.Custom('MagicPracticeTerm')] em sua cabana, nos arredores de sua aldeia.\n\nOs aldeões afirmam que suas obras malignas causaram [witch.Custom('MagicSuperstitionTerm')] e exigem sua execução."
 stewardship_general.1054.a: "Essas provas são circunstanciais. Libertem [witch.Custom('ES_LoLa')]."
 stewardship_general.1054.b: "Deve queimar por seus crimes contra [ROOT.Char.GetFaith.HighGodName]!"
 stewardship_general.1054.c: "Um[witch.Custom('ES_XA')] [witch.Custom('MagicUserTerm')], você diz? Eu poderia usar um[witch.Custom('ES_XA')] conselheir[witch.Custom('ES_XA')] nov[witch.Custom('ES_OA')]."
 stewardship_general.1054.d: "Organize uma execução elaborada para [witch.Custom('ES_ElElla')]…"
 stewardship_general.1054.d.flavor: "mas, na verdade, façam[witch.Custom('ES_LoLa')] furtivamente voltar à minha corte!"
 #Visited by a Trinket Peddler, by Filippa Gannholm
 stewardship_general.2001.t: "Um Faro para o Lucro"
 stewardship_general.2001.desc_intro: "Enquanto faço um passeio tranquilo, o grito de um certo comerciante se destaca entre o vai e vem habitual da rua.\n\n\"Saudações, [ROOT.Char.Custom('FormOfAddressForLiege')]! Tenho um sortimento requintado de mercadorias, se vós tiverdes as moedas…\"."
 stewardship_general.2001.desc: "\n\nA barraca do comerciante está repleta de bugigangas e quinquilharias."
 stewardship_general.2001.desc_high_skill: "$stewardship_general.2001.desc$ Como especialista[ROOT.Char.Custom('ES_OA')] vendedor[ROOT.Char.Custom('ES_XA')] de artigos finos, um par de bugigangas me chamam a atenção entre o excesso de quinquilharias."
 stewardship_general.2001.desc_steward: "\n\nEnquanto observo a miríade de produtos na barraca, ouço murmurar [helpful_councillor.GetShortUIName]; As gravações daquela peça devem ser reais… e muito valiosas também. Ele/Ela me olha com um sorriso triunfante."
 stewardship_general.2001.desc_chaplain: "\n\nMeu acompanhante [helpful_councillor.GetShortUIName] para em seco, com a cabeça inclinada e fitando atentamente algo na barraca do mercador. Inclina-se e confidencia em voz baixa: Essa \"bugiganga\" ali é claramente uma relíquia sagrada de tempos passados. Seria prudente adquirir tal adereço."
 stewardship_general_2001_success_msg.t: "Negociação Bem-sucedida"
 stewardship_general_2001_failure_msg.t: "Negociação Mal-sucedida"
 stewardship_general_2001_free_msg.desc: "Suas habilidades de negociação se mostraram excelentes"
 stewardship_general_2001_tiny_msg.desc: "Suas habilidades de negociação foram adequadas"
 stewardship_general_2001_minor_msg.desc: "Suas habilidades de negociação foram ruins"
 stewardship_general_2001_expensive_msg.desc: "Você foi enganado pelo comerciante"
 stewardship_general.2001.free: "Você faz um ótimo negócio"
 stewardship_general.2001.tiny_cost: "Você é um negociador decente"
 stewardship_general.2001.minor_cost: "Aquilo não foi um bom negócio"
 stewardship_general.2001.expensive_cost: "O comerciante te enganou"
 stewardship_haggle_cheap_trinket_tt: "Você opta pelo trinket barato"
 stewardship_haggle_expensive_trinket_tt: "Você opta pelo trinket caro"
 stewardship_haggle_helpful_trinket_tt: "Você opta pelo trinket sugerido"
 stewardship_general.2001.a: "Sinto-me com sorte."
 stewardship_general.2001.a.ignore_help: "Este deve ser um roubo."
 stewardship_general.2001.b: "O detalhe desta bugiganga me intriga."
 stewardship_general.2001.b.ignore_help: "Acredito que essa peça será a escolha mais lucrativa."
 stewardship_general.2001.c.steward: "Confio em sua experiência nesta área, [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('helpful_councillor')) ]"
 stewardship_general.2001.c.chaplain: "Suas palavras soam sábias para mim, [helpful_councillor.GetFirstNameNoTooltip]."
 stewardship_general.2001.d: "Vamos seguir em frente."
 stewardship_general.2001.d.irritable: "Eu disse #EMP não#!. Agora vá embora antes que #EMP eu te faça ir embora!#!"
 stewardship_general.2001.tt: "Trinket Recebido"
 stewardship_general.2002.t: "Uma Exibição Impressionante"
 stewardship_general.2002.t_insulting: "Uma Exibição Insultante"
 stewardship_general.2002.desc.intro: "Assim que passarmos pelos próximos dois postos,"
 stewardship_general.2002.desc_impressed: "[helpful_councillor.GetTitledFirstNameNoTooltip|l] sorri para mim com entusiasmo.\n\n“Sim, bastante bom, de fato! Eu mesm[helpful_councillor.Custom('ES_OA')] não poderia ter feito melhor.”\n\n[helpful_councillor.GetSheHe|U] olha casualmente as bugigangas da barraca ao lado e me lança um olhar de soslaio, expectante."
 stewardship_general.2002.desc_very_impressed: "[helpful_councillor.GetTitledFirstNameNoTooltip|l] me puxa pela manga com empolgação.\n\n\"Por [ROOT.Char.GetFaith.HighGodName], que exibição deliciosa! Que eloquência! Mal se conseguia acompanhar o ritmo das frases sempre melosas naquele #EMP baile#! de barganha…\". \n\nMe olha com perplexidade e admiração."
 stewardship_general.2002.desc_insulted: "[helpful_councillor.Custom('ES_ElLa')|U] [helpful_councillor.GetTitledFirstNameNoTooltip|l] me olha com desaprovação.\n\n\"Foi uma… demonstração interessante, sem dúvida. Não estou totalmente certo de qual era nosso objetivo, [ROOT.Char.Custom('FormOfAddressForLiege')], mas estou segur[helpful_councillor.Custom('ES_OA')] de que o comerciante conseguiu o que queria…\".\n\nE começa a caminhar à frente, marcando o fim da nossa conversa."
 stewardship_general.2002.desc_very_insulted: "[helpful_councillor.GetTitledFirstNameNoTooltip|l] solta um bufar hostil.\n\n\"Qualquer um de intelecto inferior argumentaria que tal [bought_trinket.GetName] mal merece esse nome. Mas #EMP estoy segur[helpful_councillor.Custom('ES_OA')]#! de que tomamos a decisão correta…\"\n\nEstá claramente aborrecid[helpful_councillor.Custom('ES_OA')] com meu fraco desempenho anterior."
 stewardship_general.2002.a.high_stewardship: "Talvez eu possa te ensinar algumas estratégias."
 stewardship_general.2002.mentor_success: "Vocês relembram os detalhes minuciosos da barganha a noite toda"
 stewardship_general.2002.mentor_failure: "[helpful_councillor.GetTitledFirstNameNoTooltip|l] não ficou totalmente convencid[helpful_councillor.Custom('ES_OA')]"
 stewardship_general.2002.impressed: "Aquilo foi uma boa negociação, não foi?"
 stewardship_general.2002.b.high_stewardship: "Era apenas um teste. #EMP Eu#! consegui o que queria."
 stewardship_general.2002.convince_success: "Ah, sim, [bought_trinket.GetName] é um investimento muito melhor porque…"
 stewardship_general.2002.convince_failure: "$stewardship_general.2002.mentor_failure$"
 stewardship_general.2002.t_success: "Persuasão Bem-sucedida"
 stewardship_general.2002.t_failure: "Persuasão Mal-sucedida"
 stewardship_general.2002.insulted: "O que está feito, está feito."
 #Build a fish pond, by Linnéa Thimrén
 stewardship_general.5011.t: "Os Carpas"
 stewardship_general.5011.desc: "\"Se o que vos interessa é um tanque para carpas, posso construir um excelente para vós, [ROOT.Char.Custom('FormOfAddressForLiege')]\".\n\nO construtor à minha frente tem boas credenciais, e meus cortesãos parecem muito entusiasmados com a ideia…"
 stewardship_general.5011.a: "Você terá todos os recursos de que precisa!"
 stewardship_general.5011.b: "Essa ? #EMP mesmo#! a melhor oferta que você pode me fazer?"
 stewardship_general.5011.b.message_1: "Você faz um ótimo negócio"
 stewardship_general.5011.b.message_2: "O construtor te engana"
 stewardship_general.5011.c: "Pare de desperdiçar meu tempo!"
 stewardship_general.5011.every_courtier: "Cada [courtier|lE]"
 stewardship_general.5013.t: "Feras do Profundo"
 stewardship_general.5013.desc: "Enquanto caminho pelos jardins, vejo meu [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('carp_food'))] [carp_food.GetTitledFirstName|l] sentad[carp_food.Custom('ES_OA')] em uma rocha ao lado do lago de carpas. Ele/ela se inclina sobre a borda e passa os dedos pela água. Uma sombra se agita sob a superfície…"
 stewardship_general.5013.a: "[carp_food.GetFirstNameNoTooltip], afaste-se! Afaste-se de... NÃÃÃÃO!"
 #Catch a servant stealing from me, by Linnéa Thimrén
 stewardship_general.5041.t: "Servo Traidor"
 stewardship_general.5041.desc: "Um[servant_character.Custom('ES_XA')] [servant_character.Custom('lowly_servant_type')|l] servo de baixa categoria tem estado roubando na minha[ROOT.Char.Custom('GetCourt')]!"
 stewardship_general.5041.desc_highgod: "Esta pessoa se encolhe diante de mim, choramingando sobre crianças famintas e clemência em nome de [ROOT.Char.GetFaith.HighGodName]."
 stewardship_general.5041.desc_other: "Esta pessoa se encolhe diante de mim, choramingando sobre crianças famintas e implorando misericórdia."
 stewardship_general.5041.desc_ending: "\n\n\"Por favor, meu [ROOT.Char.GetLadyLord], farei qualquer coisa que você pedir!\""
 stewardship_general.5041.a: "[servant_character.GetHerHim|U] enseño qué es pasar hambre de verdad."
 stewardship_general.5041.b: "[servant_character.Custom('ES_LoLa')|U] faço prender."
 stewardship_general.5041.c: "Mostro misericórdia e conquisto a lealdade."
