l_spanish:
 #Pillow Talk, by Sean Hughes
 intrigue_temptation.2201.t: "Conversa na Cama"
 intrigue_temptation.2201.desc: "Após nossa mais recente relação, [my_lover.GetFirstName] e eu estamos deitados juntos, envolvidos em uma conversa casual.\n\n\"E você nunca acreditaria...\" [my_lover.GetSheHe] para de repente e fica corad. \"Desculpe, meu amor; isso deve ser terrivelmente entediante para você...\""
 intrigue_temptation.2201.a: "De jeito nenhum. Por favor, conte-me mais..."
 intrigue_temptation.2201.a.success: "[my_lover.GetFirstName] compartilha comigo as fofocas da corte [court_owner.Custom('ES_DelDela')] [court_owner.GetTitledFirstName|l]"
 intrigue_temptation.2201.a.success.tt: "Eu descubro um [secret|lE] de um personagem aleatório"
 intrigue_temptation.2201.a.failure: "[my_lover.GetFirstName] se recusa a dizer mais"
 intrigue_temptation.2201.b: "Ouvir sua voz nunca é entediante, meu querido."
 intrigue_temptation.2201.d.sadistic: "Você está escondendo algo... Conte-me, #EMP agora#!!"
 #Matchmaking, by Mathilda Bjarnehed
 intrigue_temptation_special.1001.t: "De Amor e Desejo"
 intrigue_temptation_special.1001.desc: "Essas expressões sonhadoras e suspiros saudosos só podem significar uma coisa… ![wants_love.Custom2('MyCharacterIntroduction', ROOT.Char)] deseja romance!\n\nDevo colocar minhas habilidades de casamenteir[ROOT.Char.Custom('ES_OA')] e aliviar seu sofrimento? Com certeza ele me agradeceria!"
 intrigue_temptation_special.1001.a: "[wants_love.GetFirstNameNoTooltip] não ficará sozinho por[wants_love.Custom('ES_OA')] muito tempo!"
 intrigue_temptation_special.1001.a.tt: "[wants_love.GetTitledFirstName] pode se tornar amante de uma pessoa escolhida por mim"
 intrigue_temptation_special.1001.b: "Devo focar no meu próprio casamento."
 intrigue_temptation_special.1001.c: "Devo focar na minha própria vida amorosa."
 intrigue_temptation_special.1002.t: "Questão de Gosto"
 intrigue_temptation_special.1002.desc: "Para descobrir a parceira ideal de [wants_love.GetTitledFirstName|l], devo conhecer melhor suas preferências. Observando discretamente suas interações na corte, poderia vislumbrar seus desejos mais íntimos…\n\nAntes de começar, devo elaborar uma teoria. O que acho que [wants_love.GetFirstNameNoTooltip] em uma parceira?"
 intrigue_temptation_special.1002.a: "Um coração afim, uma personalidade que combine com a sua própria."
 intrigue_temptation_special.1002.a.tt: "#F A maioria das pessoas, sobretudo as empáticas e amáveis, costuma preferir se relacionar com alguém de personalidade semelhante à sua.\n\nSe minhas suposições estiverem erradas, posso assumir que [wants_love.GetFirstName] prefere atratividade ou poder.#!"
 intrigue_temptation_special.1002.b: "Atração, seja física ou de temperamento."
 intrigue_temptation_special.1002.b.tt: "#F Pessoas luxuriosas, arrogantes ou atraentes costumam preferir parceiros atraentes, afáveis, audazes ou insinuantes.\n\nSe minhas suposições estiverem erradas, posso assumir que [wants_love.GetFirstName] prefere uma personalidade ou um poder compatível com o seu.#!"
 intrigue_temptation_special.1002.c: "Poder e influência."
 intrigue_temptation_special.1002.c.tt: "#F Pessoas que desejam riqueza e sucesso costumam preferir parceiros poderosos.\n\nSe minhas suposições estiverem erradas, posso assumir que [wants_love.GetFirstName] prefere uma personalidade ou uma atratividade compatível com a sua.#!"
 intrigue_temptation_special.1002.d: "Será melhor descobrir se [wants_love.GetSheHe] prefere homens ou mulheres."
 intrigue_temptation_special.1002.d.tt: "#F A maioria das pessoas prefere parceiros do sexo oposto, mas não é incomum preferir parceiros do mesmo sexo ou de ambos os sexos.#!"
 intrigue_temptation_special.1003.t: "Fazendo a Combinação"
 intrigue_temptation_special.1003.start.desc: "Tenho observado [wants_love.GetTitledFirstName|l] e estou convict[ROOT.Char.Custom('ES_OA')] de minha conclusão."
 intrigue_temptation_special.1003.personality_success.desc: "Como eu suspeitava, [wants_love.GetSheHe] prefere aqueles com um temperamento semelhante ao seu próprio."
 intrigue_temptation_special.1003.personality_failure.desc: "Eu estava enganado. A [wants_love.GetSheHe] se importa pouco com a personalidade. Deve preferir poder ou atração em um parceiro."
 intrigue_temptation_special.1003.sex_appeal_success.desc: "[wants_love.GetSheHe|U] é atraíd[wants_love.Custom('ES_OA')] como uma mariposa atraída pela chama, por aqueles de grande carisma e beleza."
 intrigue_temptation_special.1003.sex_appeal_failure.desc: "Eu me enganei… [wants_love.GetSheHe|U] não parece diferenciar entre pessoas bonitas e aquelas que são comuns. A [wants_love.GetSheHe] deve se importar mais com a personalidade… ou com o poder."
 intrigue_temptation_special.1003.power_success.desc: "Como eu suspeitava, [wants_love.GetSheHe] prefere a companhia dos lordes e das damas mais influentes da corte."
 intrigue_temptation_special.1003.power_failure.desc: "Eu estava errado. [wants_love.GetSheHe|U] interage com pessoas de alto e baixo status. Deve haver algum outro elemento além do poder que [wants_love.GetHerHim] intrigue — uma personalidade compatível ou uma aparência elegante, talvez?"
 intrigue_temptation_special.1003.end.desc: "\n\nAgora que já conheço um pouco melhor os desejos de [wants_love.GetFirstNameNoTooltip], fiz uma lista de possíveis pares. Quem combinaria melhor com meu [ROOT.GetCharacter.Custom2('RelationToMe' , wants_love )]?"
 intrigue_temptation_special.1003.a: "O/A [target_list_member_a.Custom('ComplimentAdjective')] [target_list_member_a.GetTitledFirstNameNoTooltip|l]."
 intrigue_temptation_special.1003.a.tt: "Tento juntar [wants_love.GetFirstName] com [target_list_member_a.GetTitledFirstName|l]"
 intrigue_temptation_special.1003.b: "[target_list_member_b.GetTitledFirstNameNoTooltip|l], um[target_list_member_b.Custom('ES_XA')] [target_list_member_b.GetWomanMan] [target_list_member_b.Custom('ComplimentAdjective')]."
 intrigue_temptation_special.1003.b.tt: "Tento emparelhar [wants_love.GetFirstName] com [target_list_member_b.GetTitledFirstName|l]"
 intrigue_temptation_special.1003.c: "Meu [target_list_member_c.Custom('ComplimentAdjective')] [ROOT.GetCharacter.Custom2('RelationToMe' , target_list_member_c )], [target_list_member_c.GetTitledFirstNameNoTooltip|l]."
 intrigue_temptation_special.1003.c.tt: "Tento unir [wants_love.GetFirstName] com [target_list_member_c.GetTitledFirstName|l]"
 intrigue_temptation_special.1003.tt: "Um bom par seria alguém que atenda às preferências d [wants_love.GetFirstName]"
 intrigue_temptation_special.1004.t: "Criando o Clima"
 intrigue_temptation_special.1004.start.desc: "Para ter uma primeira impressão da qualidade do meu par, organizei um pequeno jantar com [wants_love.GetTitledFirstName|l] e [chosen_match.GetTitledFirstName|l] na lista de convidados."
 intrigue_temptation_special.1004.great.desc: "Eles passaram a maior parte do jantar conversando e lançando olhares curiosos um para o outro quando não estavam."
 intrigue_temptation_special.1004.good.desc: "Não vi sinais definitivos, mas eles se deram muito bem."
 intrigue_temptation_special.1004.bad.desc: "Infelizmente, a química que eu antecipei não apareceu em lugar algum. Espero que tenha sido apenas nervosismo."
 intrigue_temptation_special.1004.end.desc: "\n\nDevo aproveitar o momento, dar a [wants_love.GetFirstNameNoTooltip] e a [chosen_match.GetFirstNameNoTooltip] outra chance de se verem. Desta vez, organizarei algo mais empolgante, uma oportunidade de compartilharem um interesse em comum!"
 intrigue_temptation_special.1004.a: "Uma dança alegre."
 intrigue_temptation_special.1004.b: "Uma caçada emocionante."
 intrigue_temptation_special.1004.c: "Uma viagem para inspecionar a infraestrutura local."
 intrigue_temptation_special.1004.d: "Um jantar privado para compartilhar algumas 'fofocas'."
 intrigue_temptation_special.1004.e: "Uma noite de poesia."
 intrigue_temptation_special.1004.tt: "Devo escolher uma atividade com a qual tanto [wants_love.GetFirstName] quanto [chosen_match.GetFirstName] estejam familiarizados e que seja agradável para ambos, com base em suas habilidades"
 intrigue_temptation_special.1005.t: "Testando os Sentimentos"
 intrigue_temptation_special.1005.great_diplomacy.desc: "Não sou muito dad[ROOT.Char.Custom('ES_OA')] a me gabar, mas devo dizer: vai levar muitos, muitos anos até que esta dança seja esquecida! De fato, suspeito que a noite passada se tornará uma lembrança preciosa para [wants_love.GetFirstName] e [chosen_match.GetFirstName]. Eles compartilharam praticamente todas as danças e não conseguiam tirar os olhos um do outro!"
 intrigue_temptation_special.1005.great_martial.desc: "Não costumo dizer isso, mas às vezes sou um[ROOT.Char.Custom('ES_XA')] gênio[ROOT.Char.Custom('ES_OA')]! [wants_love.GetFirstName] e [chosen_match.GetFirstName] aproveitaram muito a caçada. Trabalharam juntos como se se conhecessem de toda a vida e foram, de longe, o casal mais bem-sucedido."
 intrigue_temptation_special.1005.great_stewardship.desc: "Ver [wants_love.GetFirstName] e [chosen_match.GetFirstName] cavalgando juntos foi um deleite para os olhos! Eles conversaram durante horas sobre pontes, moinhos e sistemas de irrigação antes de ficarem para trás em relação ao restante do grupo. Quem sabe em quais territórios a conversa deles então se aventurou, mas [wants_love.GetFirstName] parecia bastante encantad[wants_love.Custom('ES_OA')]."
 intrigue_temptation_special.1005.great_intrigue.desc: "[wants_love.GetFirstName] e [chosen_match.GetFirstName] se encaixam perfeitamente com esses velhos raposos! Não demorou muito para que dominassem a conversa, trocando ideias entre si em uma velocidade impressionante. Raramente vi duas mentes tão sincronizadas!"
 intrigue_temptation_special.1005.great_learning.desc: "Raramente vi um[wants_love.Custom('ES_XA')] [wants_love.GetWomanMan] tão encantad[wants_love.Custom('ES_OA')] quanto [wants_love.GetFirstName] ouvindo [chosen_match.GetFirstName] recitar seu poema! Praticamente estava em lágrimas na última estrofe.\n\nDepois da apresentação, conversaram por horas — muito depois de todos os outros convidados terem ido embora."
 intrigue_temptation_special.1005.good_diplomacy.desc: "A dança pareceu elevar o ânimo de [wants_love.GetFirstName] assim como o de [chosen_match.GetFirstName]. Graças aos meus discretos empurrõezinhos, eles passaram muito tempo na companhia um do outro e, pelo olhar em seus rostos, tenho certeza de que gostaram disso."
 intrigue_temptation_special.1005.good_martial.desc: "Como suspeitava, [wants_love.GetFirstName] e [chosen_match.GetFirstName] eram caçadores experientes, tão à vontade a cavalo quanto no chão. Parecia que estavam se divertindo, e cheguei a ouvir [chosen_match.GetFirstNameNoTooltip] fazendo um grande elogio a [wants_love.GetFirstNameNoTooltip] por sua habilidade com o arco."
 intrigue_temptation_special.1005.good_stewardship.desc: "Embora uma viagem para inspecionar a infraestrutura talvez não seja o cenário mais romântico, tenho certeza[ROOT.Char.Custom('ES_OA')] de que [wants_love.GetFirstName] e [chosen_match.GetFirstName] acharam interessante. Conversaram longamente sobre moinhos e sistemas de irrigação, e pareciam bastante satisfeitos com a companhia um do outro."
 intrigue_temptation_special.1005.good_intrigue.desc: "[wants_love.GetFirstName] e [chosen_match.GetFirstName] foram bem-vindos em nossa reunião privada, trazendo-nos algumas fofocas tentadoras. Eles descobriram o mesmo segredo vergonhoso sobre certo senhor e discutiram os detalhes escabrosos com um regozijo sem pudor."
 intrigue_temptation_special.1005.good_learning.desc: "[wants_love.GetFirstName] e [chosen_match.GetFirstName] ficaram encantados enquanto minha convidada de honra recitava seu poema. Deve ter tocado profundamente neles, pois discutiram sobre ele por quase uma hora depois."
 intrigue_temptation_special.1005.bad_diplomacy.desc: "Para minha frustração, uma dança acabou sendo uma ideia terrível."
 intrigue_temptation_special.1005.bad_martial.desc: "Receio que eu estava enganado quando pensei que uma caçada seria uma atividade adequada."
 intrigue_temptation_special.1005.bad_stewardship.desc: "Com o benefício da retrospectiva, uma viagem para inspecionar a infraestrutura local foi uma má ideia."
 intrigue_temptation_special.1005.bad_intrigue.desc: "Pensei que um pequeno jantar privado com uma conversa intrigante aproximaria a [wants_love.GetFirstName] e [chosen_match.GetFirstName], mas o evento inteiro acabou resultando terrivelmente constrangedor."
 intrigue_temptation_special.1005.bad_learning.desc: "Como se constata, poesia não é para todos."
 intrigue_temptation_special.1005.wants_love_struggled.desc: "Foi quase doloroso ver [wants_love.GetFirstName] sofrer. Permaneceu retraíd[wants_love.Custom('ES_OA')] durante todo o triste evento, sem lançar um único olhar para [chosen_match.GetFirstName]."
 intrigue_temptation_special.1005.chosen_match_struggled.desc: "Foi quase doloroso ver [chosen_match.GetFirstName] sofrer. Permaneceu retraíd[chosen_match.Custom('ES_OA')] durante todo o triste evento, sem lançar um único olhar para [wants_love.GetFirstName]."
 intrigue_temptation_special.1005.great_status.desc: "\n\nEu esperava que meu pequeno empreendimento melhorasse o humor de [wants_love.GetFirstNameNoTooltip], mas não esperava ver os resultados tão rápido! A menos que eu seja péssimo em julgar o caráter das pessoas, certamente há algo acontecendo entre aqueles dois."
 intrigue_temptation_special.1005.good_status_despite_bad_activity.desc: "\n\nFelizmente, parece que aquele evento constrangedor não matou os sentimentos que estavam surgindo entre eles. Embora ainda seja cedo para dizer, acredito que tive sucesso."
 intrigue_temptation_special.1005.good_status.desc: "\n\nLlevo já uns dias observando os dois e estou bastante segur[ROOT.Char.Custom('ES_OA')]. Há algo ali que antes não havia."
 intrigue_temptation_special.1005.bad_status.desc: "\n\nÉ hora de aceitar a derrota. [wants_love.GetFirstNameNoTooltip] e [chosen_match.GetFirstNameNoTooltip] nunca serão um casal."
 intrigue_temptation_special.1005.a: "Realmente uma ótima combinação!"
 intrigue_temptation_special.1005.b: "Certamente sou um bom juiz de caráter."
 intrigue_temptation_special.1005.c: "O amor é o maior mistério."
 intrigue_temptation_special.1006.t: "Um Erro Presunçoso"
 intrigue_temptation_special.1006.desc: "Para avaliar a qualidade do meu par, organizei um pequeno jantar com [wants_love.GetTitledFirstName|l] e [chosen_match.GetTitledFirstName|l] na lista de convidados.\n\nTentei incentivá-los a conversar, mas [not_interested.GetFirstNameNoTooltip] foi fria e displicente com o pretendente. Em vez disso, [not_interested.GetSheHe] não parava de olhar para um[interesting_ladylord.Custom('ES_XA')] atraent[interesting_ladylord.Custom('ES_OA')] [interesting_ladylord.GetLadyLord] do outro lado da mesa. Talvez...?"
 intrigue_temptation_special.1006.a: "Vou estudar as pessoas com mais cuidado no futuro."
 intrigue_temptation_special.1007.t: "Uma Visão Gratificante"
 intrigue_temptation_special.1007.desc: "Tenho observado [wants_love.GetTitledFirstName|l] e [chosen_match.GetTitledFirstName|l] por muitas luas, em busca de sinais do meu sucesso. Hoje à noite, minha curiosidade foi saciada.\n\nEm um banco escondido no canto mais exuberante e sombrio dos meus jardins, avistei os dois pombinhos. Com um sorriso satisfeito nos lábios, recuei pelo caminho tomado pela vegetação. Eles estavam tão perdidos em seus beijos que não me viram."
 intrigue_temptation_special.1007.a: "Desejo a eles tudo de melhor."
 #Guest, by Alexander Oltner
 intrigue_temptation.3000.t: "Uma Despedida Doce"
 intrigue_temptation.3000.desc: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U], isto é... Foi... Quero dizer, foi um prazer ser vosso[guest_lover.Custom('ES_OA')] convidad[guest_lover.Custom('ES_OA')] aqui em [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]\", gagueja [guest_lover.GetFirstName], enquanto se prepara para partir.\n\n\"Tinha que #emphasis veros#!. Só isso já fez minha estadia valer a pena. Eu vos peço... passaria uma noite de paixão comigo antes de eu partir?\".\n\n[guest_lover.GetFirstName] caiu na minha sutil manipulação! E agora, como aproveito esta oportunidade?"
 intrigue_temptation.3000.a: "Sim, meu amor, eu faria #emphasis qualquer coisa#! por você!"
 intrigue_temptation.3000.b: "Então, querida, aquele rumor sobre meu vassalo?"
 intrigue_temptation.3000.c: "Meu bem, você falaria com [guest_lovers_friend.GetFirstNameNoTooltip]?"
 intrigue_temptation.3000.d: "Ah, não posso... agora vá embora!"
 intrigue_temptation.3000.c.tt: "Uso [guest_lover.GetFirstName] para me aproximar ao amig[guest_lovers_friend.Custom('ES_OA')], [guest_lovers_friend.GetFullName]"
 intrigue_temptation.3000.b.tt: "Tento fazer com que me revele o segredo do meu vassalo"
 intrigue_temptation.3000.b.success: "[guest_lover.GetFirstName] me revelou um segredo!"
 intrigue_temptation.3000.b.failure: "[guest_lover.GetFirstName] não revelou nada durante nosso encontro amoroso..."
 yearly.3000.b.success.desc: "Consigo convencer[guest_lover.Custom('ES_LoLa')]"
 yearly.3000.b.success.tt: "Descubro o [secret|lE] de um vassalo"
 yearly.3000.b.failure.desc: "Não consigo seduzir[guest_lover.Custom('ES_LoLa')]"
 #Wing(wo)man, by Mathilda Bjarnehed
 intrigue_temptation.3010.t: "Uma Flor Na Selva"
 intrigue_temptation.3010.start.desc: "Pela terceira noite seguida, estou sentado na mesma mesa, na mesma estalagem. Ela tem uma vista excelente do bar e da cativante[bar_servant.Custom('ES_XA')] [bar_servant.Custom('bar_servant')] atrás dele.\n\nMeu devaneio é interrompido quando [wingman.Custom2('MyCharacterIntroduction', ROOT.Char)] bate sua caneca na mesa. \"Tenho visto você encarando embasbacad[ROOT.Char.Custom('ES_OA')] [bar_servant.GetFirstName].\""
 intrigue_temptation.3010.end.desc: "[bar_servant.GetWomanMan] [bar_servant.Custom('RomanticComplimentAdjective')]. Quer que eu faça as apresentações?\""
 intrigue_temptation.3010.a: "[bar_servant.GetHerHim|U] conhece? Isso seria perfeito!"
 intrigue_temptation.3010.b: "Quero fazer isso sozinh[ROOT.Char.Custom('ES_OA')]."
 intrigue_temptation.3010.c: "Estou aqui apenas pelas bebidas..."
 intrigue_temptation.3010.success.tt: "Poderei decidir como proceder"
 intrigue_temptation.3010.a.success: "Com um pouco de ajuda, faço [bar_servant.GetFirstNameNoTooltip] comer na palma da minha mão"
 intrigue_temptation.3010.a.failure: "[bar_servant.GetFirstNameNoTooltip] não responde aos meus avanços"
 intrigue_temptation.3010.b.success: "Tenho a [bar_servant.GetFirstNameNoTooltip] comendo na palma da minha mão"
 intrigue_temptation.3011.help.desc: "Tenho visto [bar_servant.GetFirstName] recusar mais investidas do que consigo contar. Mas, graças à apresentação e ao jeito descontraído de [wingman.GetTitledFirstName|l], [bar_servant.GetSheHe] logo se abre.\n\nA conversa flui com naturalidade... eu não esperava ter tanto em comum com um[bar_servant.Custom('ES_XA')] [bar_servant.Custom('bar_servant')]! Só percebo que [wingman.GetFirstNameNoTooltip] foi embora quando [bar_servant.GetFirstNameNoTooltip] me põe a mão no braço e pergunta se quero um quarto para a noite. Um para dois, a julgar pelo olhar em seus olhos."
 intrigue_temptation.3011.alone.desc: "Tenho visto [bar_servant.GetFirstName] rejeitar mais investidas do que consigo contar. Um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] de baixa condição teria ficado intimid[ROOT.Char.Custom('ES_OA')], mas aproveitei com alegria a oportunidade de estudar seus erros. Estou pront[ROOT.Char.Custom('ES_OA')].\n\nA conversa flui com naturalidade… não esperava ter tanta coisa em comum com um[bar_servant.Custom('ES_XA')] [bar_servant.Custom('bar_servant')]! Quando eu estava prestes a ir embora, [bar_servant.GetFirstNameNoTooltip] me põe a mão no braço e me pergunta se quero um quarto para passar a noite. Um para dois, a julgar pelo olhar em seus olhos."
 intrigue_temptation.3011.a: "Só por uma noite? Que tal #EMP todas#! as noites?"
 intrigue_temptation.3011.b: "Mostre-me o caminho, [bar_servant.Custom('LoverPetName')]."
 intrigue_temptation.3011.c: "Estou lisonjead, mas só queria conversar."
 #Medieval tinder, by Mathilda Bjarnehed
 intrigue_temptation.3020.t: "Uma Nova Chama"
 intrigue_temptation.3020.start.desc: "Ao longo dos anos, recebi muitos retratos de vários"
 intrigue_temptation.3020.nobles.desc: "nobres,"
 intrigue_temptation.3020.noblemen.desc: "nobres,"
 intrigue_temptation.3020.noblewomen.desc: "nobres,"
 intrigue_temptation.3020.end.desc: "tanto estrangeiros quanto locais. Até agora, eles têm acumulado poeira em algum sótão.\n\nTalvez eu deva tirá-los e escolher minha próxima conquista romântica?"
 intrigue_temptation.3020.a: "Consigo me imaginar com alguém novo..."
 intrigue_temptation.3020.b: "Eles são muito pretensiosos para o meu gosto."
 intrigue_temptation.3020.a.tt: "Tiro os retratos"
 intrigue_temptation.3021.beauty.desc: "Muita gente me disse que posso deleitar a vista com [potential_date.Custom2('MyCharacterIntroduction', ROOT.Char)]! Será que o retrato faz justiça a"
 intrigue_temptation.3021.generic1.desc: "E quanto a [potential_date.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]? É bem conhecid[potential_date.Custom('ES_OA')] por ser um[potential_date.Custom('ES_XA')] [potential_date.GetWomanMan] [potential_date.Custom('ComplimentAdjective')]. No entanto, também ouvi dizer que pode ser bastante [potential_date.Custom2('InsultAdjective', ROOT.Char)]…"
 intrigue_temptation.3021.generic2.desc: "Ah, [potential_date.Custom('ComplimentAdjective')] [potential_date.GetFullName]! Será que faríamos um bom par?"
 intrigue_temptation.3021.ugly.desc: "Deve ser [potential_date.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]. Seu retrato certamente está bem feito, mas ouvi dizer que pode não ser uma semelhança verdadeira…"
 intrigue_temptation.3021.generic3.desc: "Este retrato é nada menos que de [potential_date.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]. Diz-se de [potential_date.GetSheHe] que é [potential_date.Custom('ComplimentAdjective')], mas também ouvi rumores sobre sua natureza [potential_date.Custom2('InsultAdjective', ROOT.Char)]…"
 intrigue_temptation.3021.generic4.desc: "Ah, [potential_date.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]. Poderá ser [potential_date.GetSheHe] minha cara-metade?"
 intrigue_temptation.3021.arrogant.desc: "[potential_date.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me enviou um pacote com #EMP [ROOT.Char.Custom('ThreeToTwelve')]#! retratos. Todos são iguais...?"
 intrigue_temptation.3021.impatient.desc: "[potential_date.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me enviou muitos retratos ao longo dos anos. O último veio com uma nota bastante impaciente anexada."
 intrigue_temptation.3021.tall.desc: "Este é o retrato de [potential_date.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]. O mensageiro que o entregou fez questão de descrever exatamente o quão alt [potential_date.GetTitledFirstNameNoTooltip|l] é. Várias vezes."
 intrigue_temptation.3021.adventurous.desc: "O retrato de [potential_date.Custom2('MyCharacterIntroduction', ROOT.Char)] tem uma nota presa no verso. Nela, se descreve como \"um espírito espontâneo em busca de aventuras\"."
 intrigue_temptation.3021.fish.desc: "[potential_date.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me enviou um retrato seu à beira de um lago, segurando um peixe grande."
 intrigue_temptation.3021.dog.desc: "Em seu retrato, [potential_date.Custom2('MyCharacterIntroduction', ROOT.Char)] posa com um cachorrinho adorável."
 intrigue_temptation.3021.do_not_believe.desc: "[potential_date.Custom2('MyCharacterIntroduction', ROOT.Char)|U] anexou uma nota bastante sarcástica. \"Não acredito muito em conhecer seu futuro cônjuge dessa maneira, mas posso muito bem tentar\"."
 intrigue_temptation.3021.lewd.desc: "[ROOT.Char.GetFaith.FertilityGodName|U], esqueci que isso estava aqui! O retrato que [potential_date.Custom2('MyCharacterIntroduction', ROOT.Char)] me enviou deixa muito pouco para a imaginação. Nada, para ser franco."
 intrigue_temptation.3021.must_be_tall.desc: "[potential_date.Custom2('MyCharacterIntroduction', ROOT.Char)|U] anexou uma carta muito longa e amigável ao retrato. No final, me alenta a responder-lhe logo, \"mas só se você tiver mais de um metro e oitenta\"."
 intrigue_temptation.3021.a: "Favorit[potential_date.Custom('ES_OA')]! Vá para a pilha de cima."
 intrigue_temptation.3021.a.tt: "Nomeio [potential_date.GetShortUIName] como meu favorit[potential_date.Custom('ES_OA')] atual, a quem darei atenção especial"
 intrigue_temptation.3021.a.favorite_exists.tt: "Minha favorit[favorite.Custom('ES_OA')] atual é [favorite.GetShortUIName]"
 intrigue_temptation.3021.b: "Me [potential_date.Custom('ES_LoLa')] fico! Na pilha da direita."
 intrigue_temptation.3021.b.tt: "Fico com [potential_date.GetShortUIName] para avaliar[potential_date.Custom('ES_LoLa')]"
 intrigue_temptation.3021.b.2_dates.tt: "Escolhi [date_1.GetShortUIName] e [date_2.GetShortUIName] e posso escolher mais #V 1#!"
 intrigue_temptation.3021.b.1_date.tt: "Escolhi [date_1.GetShortUIName] e posso escolher mais #V 2#!"
 intrigue_temptation.3021.c: "Não, obrigado! Coloque-o na pilha da esquerda."
 intrigue_temptation.3021.c.tt: "Descartar o retrato de [potential_date.GetShortUIName]"
 every_approved_date: "Todos cujos retratos eu guardei"
 intrigue_temptation.3021.d: "Isso é inútil! Que ideia terrível."
 intrigue_temptation.3021.d.tt: "Coloque os retratos de volta no sótão"
 intrigue_temptation.3022.desc: "Isso foi exaustivo, mas estranhamente viciante! Agora que fiz minha seleção, posso pegar minha pena e escrever alguns versos bonitos."
 intrigue_temptation.3022.a: "Só me importo com o/a [favorite.Custom('RomanticComplimentAdjective')] [favorite.GetFirstNameNoTooltip]."
 intrigue_temptation.3022.b: "Todos são dignos dos meus poemas!"
 intrigue_temptation.3022.b.success: "Todos estão emocionados"
 intrigue_temptation.3022.b.failure: "Meu plano falha"
 intrigue_temptation.3022.c: "Não estou desperdiçando meu tempo com nenhum deles."
 intrigue_temptation.3023.t: "[ROOT.Char.Custom('ES_AlAla')|U] [ROOT.Char.Custom('RomanticComplimentAdjective')] [ROOT.Char.GetTitledFirstNameNoTooltip|l],"
 intrigue_temptation.3023.desc: "[letter_writer.Custom2('love_letter', ROOT.Char)]"
 intrigue_temptation.3023.a: "Que lisonjeiro! Preciso responder!"
 intrigue_temptation.3023.b: "Com algumas mudanças, eu poderia entregar isto para [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip]."
 intrigue_temptation.3023.c: "Estou me sentindo enjoad..."
 intrigue_temptation.3024.desc: "[answering_date.Custom2('love_letter', ROOT.Char)]"
 intrigue_temptation.3024.a: "Excelente!"
 intrigue_temptation.3025.t: "[ROOT.Char.Custom('ES_AlAla')|U] falso[ROOT.Char.Custom('ES_OA')] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('favorite'))] [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitledFirstNameNoTooltip|l]:"
 intrigue_temptation.3025.desc: "Há quinze dias, recebi uma carta vossa. O nome no envelope era o meu, mas os versos dentro eram dedicados a [lower_left_portrait.GetTitledFirstName|l]. Escrevi a ele/ela, e ele/ela me disse que também recebeu um poema. Na verdade, o mesmo, mas destinado a outr[lower_right_portrait.Custom('ES_OA')] [lower_right_portrait.GetWomanMan]!\n\nEsta é a artimanha mais desprezível e sórdida que já ouvi. Nunca mais nos escrevais!"
 intrigue_temptation.3025.a: "Oh. Isso é... constrangedor."
