l_spanish:
 #Random Trait Acquisition Events
 #Choose whether to become aggressive_attacker, unyielding_defender or flexible_leader
 learn_commander_trait.0002.t: "Um Equilíbrio Fino"
 learn_commander_trait.0002.desc: "No calor do combate, a decisão é frequentemente o que separa a vitória da derrota.\n\nQuando chegar a hora, eu sei como agirei."
 learn_commander_trait.0002.a: "Eu atacarei e nunca desistirei!"
 learn_commander_trait.0002.b: "Eu defendo minha posição."
 learn_commander_trait.0002.c: "Eu permaneço alerta, agindo conforme a situação requer."
 #Choose whether to become a Logistician, a Military Engineer, or forder
 learn_commander_trait.0003.t: "Em Território Inimigo"
 learn_commander_trait.0003.desc: "Uma guerra é determinada por suas batalhas, mas as batalhas são determinadas por seus preparativos.\n\nSer pego sem plano ou direção é uma boa maneira de perder."
 learn_commander_trait.0003.a: "Meus exércitos devem estar sempre bem abastecidos."
 learn_commander_trait.0003.b: "Nenhum castelo impedirá meus esforços por muito tempo."
 learn_commander_trait.0003.c: "Atravesso rios com a certeza da maré alta."
 #Choose whether to become a Reaver or Reckless
 learn_commander_trait.0004.t: "A Maré da Batalha"
 learn_commander_trait.0004.desc: "Eu já vi isso acontecer, aquele pequeno momento de calma no meio do combate. O breve instante em que nenhum lado avança na refrega, e a luta se parte como ondas contornando uma rocha."
 learn_commander_trait.0004.b: "Eu estarei sempre pressionando o ataque!"
 learn_commander_trait.0004.c: "Hora de me rearmar com as armas que não estão cravadas em um corpo!"
 #Become a Sea Raider
 learn_commander_trait.0005.t: "Como a Tempestade"
 learn_commander_trait.0005.desc: "O estrondo de cem botas atingindo a água rasa, um ataque tão rápido quanto impiedoso, e os edifícios em chamas deixados para trás."
 learn_commander_trait.0005.a: "Minha fúria não será negada!"
 #Become a Holy Warrior
 learn_commander_trait.0006.t: "A Lâmina de [ROOT.Char.GetFaith.WarGodName]"
 learn_commander_trait.0006.desc: "Eu vi os [ROOT.Char.Custom('GetDerogatoryNonbelieverPlural')]. Sei que atacam os fiéis com grande selvageria.\n\nEm nome de [ROOT.Char.GetFaith.WarGodName], permanecerei firme contra eles com a coragem que [ROOT.Char.GetFaith.WarGodSheHe] me concede!"
 learn_commander_trait.0006.a: "Não descansarei até ter devastado os inimigos do [ROOT.Char.GetFaith.PantheonTerm]!"
 #Become a Desert Warrior
 learn_commander_trait.0007.t: "Sob o Sol Escaldante"
 learn_commander_trait.0007.desc: "Meus inimigos não veem o quão abençoado é, a aspereza da areia e a sede de água.\n\nEles não entendem como minhas tropas podem suportar o calor, esperando pacientemente pelo combate enquanto seus inimigos coçam gargantas secas."
 learn_commander_trait.0007.a: "O deserto é meu aliado."
 #Become a Jungle Stalker
 learn_commander_trait.0008.t: "Letal como a Mato"
 learn_commander_trait.0008.desc: "Não pode haver batalhas fáceis na selva, e eu sei como tirar vantagem disso. Minhas tropas forçam o inimigo a seguir trilhas cheias de vegetação, eu os prendo em lama e arbustos, e espinhos podem causar tanto dano quanto minhas espadas e lanças.\n\nQuando a noite cai, os corpos desaparecem entre as folhas caídas."
 learn_commander_trait.0008.a: "A floresta não é um lugar de perdão."
 #Become a Winter Soldier
 learn_commander_trait.0009.t: "Frio como a Noite"
 learn_commander_trait.0009.desc: "O frio implacável já reivindicou muitas vidas. Mas não a minha, nem a dos meus soldados.\n\nNós sabemos onde procurar sob a neve, somos como lobos quando rastreamos nossos inimigos, e mordemos como o frio do meio do inverno no seu pior..."
 learn_commander_trait.0009.a: "Atacamos como granizo."
 #Training offer
 learn_commander_trait.11.opening: "«Posso presumir que você está interessado em aprofundar seu domínio da arte da guerra?». [teacher.GetFirstName] [teacher.Custom('quirk_pos_present')] quando se aproxima de mim. «Talvez eu possa ajudá-lo a ver o campo de batalha de novas maneiras»."
 #Generic:
 #Offer:
 learn_commander_trait.11.desc: "\n\n[teacher.GetFirstName] é muito conhecid[teacher.Custom('ES_OA')] por seu domínio de [ROOT.Char.Custom('CommanderTraitSkillDescription')]. Se alguém poderia me ajudar a entendê-lo, seria [teacher.GetSheHe]."
 learn_commander_trait.11.a: "Eu quero aprender."
 learn_commander_trait.11.b: "Vou deixar para os meus generais."
 learn_commander_trait.11.martial_tt: "[teacher.GetFirstName] tentará ensinar a você a habilidade [THIS.Char.Custom('CommanderTraitBeingTaught')]\n$EFFECT_LIST_BULLET$ Uma alta [martial_skill|lE] será benéfica nesses esforços"
 learn_commander_trait.11.b.tt: "#F Talvez em outro momento.#!"
 #Final Test:
 learn_commander_trait.12.desc: "[teacher.GetTitledFirstName] me mostrou todos os detalhes de [ROOT.Char.Custom('CommanderTraitSkillDescription')]. Meu teste final é uma batalha simulada contra [teacher.GetSheHe], para mostrar o que aprendi."
 learn_commander_trait.12.a: "Prepare as fileiras!"
 learn_commander_trait.12.b: "Não, eu não entendi completamente o que [teacher.GetFirstNameNoTooltip] tem tentado me ensinar."
 learn_commander_trait.giving_up_tt: "#F Eu não preciso aprender isso!#!"
 learn_commander_trait_final_test_success: "Vitória!"
 learn_commander_trait_final_test_success_tt: "#F Eu provei que aprendi!#!"
 learn_commander_trait_final_test_failure: "Derrota!"
 learn_commander_trait_final_test_failure_tt: "#F Eu ainda não aprendi o suficiente!#!"
 #Success:
 learn_commander_trait.13.desc: "[teacher.GetTitledFirstName] cavalga até mim. "Impressionante!", ele grita. As levies “inimigas” ficam boquiabertas com a eficiência das minhas outras tropas.\n\nNão há dúvida de que aprendi o que significa ser [ROOT.Char.Custom('CommanderTraitBeingTaught')]."
 learn_commander_trait.13.a: "Aprendi muito."
 #Failure:
 learn_commander_trait.14.desc: "\"Talvez haja mais algumas coisas para você aprender...\" [teacher.GetTitledFirstName|l] estende a mão para me ajudar a levantar da lama.\n\nMinhas tropas não se saíram tão bem quanto o esperado. Devo admitir que [teacher.GetSheHe] pode estar certo."
 learn_commander_trait.14.a: "Mostre-me novamente como você faz."
 learn_commander_trait.14.a.tt: "\"Vou tentar mais uma vez...\""
 learn_commander_trait.14.b: "Isso é muito difícil!"
 learn_commander_trait.14.b.tt: "\"Eu desisto! Pelo menos por enquanto.\""
 #Logistics
 learn_commander_trait.01.t: "Um Suprimento de Conhecimento"
 #Offer:
 learn_commander_trait.1101.desc: "\n\n[teacher.GetFirstName] é bem conhecido[teacher.Custom('ES_OA')] por seu domínio da logística. Se alguém pode me ajudar a entendê-la, é [teacher.GetSheHe]."
 #Final test
 learn_commander_trait.1201.desc: "[teacher.GetTitledFirstName] me mostrou os meandros de garantir que as provisões cheguem às minhas tropas em campanha. Meu teste final é uma batalha simulada na qual devo proteger meu comboio de suprimentos de seu ataque."
 #Success
 learn_commander_trait.1301.desc: "[teacher.GetTitledFirstName] cavalgou até mim. "Impressionante!", grita. "Minhas tropas nem sequer conseguiram se aproximar do trem de suprimentos"."
 #Failure
 learn_commander_trait.1401.desc: "Tudo parecia estar indo tão bem, até que percebi que a cavalaria era um ardil!\n\n[teacher.GetTitledFirstName|l] traz uma maçã dos meus vagões montado a cavalo. "Acho que vi onde você errou", me diz [teacher.Custom('quirk_pos_pp')]."
 #Military Engineer
 learn_commander_trait.02.t: "Competência na Construção"
 #Offer:
 learn_commander_trait.1102.desc: "\n\n[teacher.GetFirstName] é bem conhecido[teacher.Custom('ES_OA')] por seu domínio da engenharia militar. Se há alguém que pode me ajudar a entender, é [teacher.GetSheHe]."
 #Final test
 learn_commander_trait.1202.desc: "[teacher.GetTitledFirstName] me mostrou todos os detalhes do cerco. Enquanto estamos em pé, observando uma miniatura de uma fortaleza, meu teste final é descrever como eu a capturaria da maneira mais eficiente."
 #Success
 learn_commander_trait.1302.desc: ""Vixe, eu não tinha pensado nisso", [teacher.GetFirstName] [teacher.Custom('quirk_pos_present')]. Não consegue encontrar uma única falha em meu plano!"
 #Failure
 learn_commander_trait.1402.desc: "\"Você se esqueceu daquela torre?\" [teacher.GetTitledFirstName|l] aponta dos bastiões para a área em frente à parede que eu estava descrevendo. Agora vejo a falha fatal no meu plano."
 #aggressive_attacker
 learn_commander_trait.03.t: "Visão Devastadora"
 #unyielding_defender
 learn_commander_trait.04.t: "Escudo do Conhecimento"
 #forder
 learn_commander_trait.05.t: "Fonte de Conhecimento"
 #flexible_leader
 learn_commander_trait.06.t: "Uma Resposta para Todas as Situações"
 #Desert Warrior
 learn_commander_trait.07.t: "Sabedoria do Deserto"
 #Jungle Stalker
 learn_commander_trait.08.t: "Mato do Conhecimento"
 #Winter Soldier
 learn_commander_trait.09.t: "Lições Gélidas"
 #Reaver
 learn_commander_trait.10.t: "A Arte do Saque"
 #Reckless
 learn_commander_trait.12.t: "A Mordida e o Rasgo"
 #Holy Warrior
 learn_commander_trait.13.t: "Lutar com Zelo"
 #Sea Raider
 learn_commander_trait.14.t: "Entendendo os Saques"
 #Fallbacks in case your teacher is no longer with you
 learn_commander_trait.91.t: "Por Conta Própria"
 learn_commander_trait.1291.desc: "Embora [teacher.GetTitledFirstName|l] já não esteja me observando, ainda posso provar para mim mesmo que dominei [ROOT.Char.Custom('CommanderTraitSkillDescription')]. Uma prova final, um simulacro de batalha para testar minhas habilidades."
 learn_commander_trait.1291.a: "É hora."
 learn_commander_trait.1291.b: "Sem [teacher.GetFirstNameNoTooltip], só posso dizer que me saí bem."
 learn_commander_trait.1391.desc: "Eu teria te deixado orgulhos[teacher.Custom('ES_OA')] de mim, [teacher.GetFirstName]!\n\nMeu exercício de batalha foi um grande sucesso, e provei minha maestria."
 learn_commander_trait.1391.a: "Agora é hora de levar isso para um campo de batalha real!"
 learn_commander_trait.1491.desc: "Talvez tenha sido melhor que [teacher.GetTitledFirstName|l] não estivesse aqui para ver isso…\n\nTudo deu errado na minha batalha simulada, e nenhuma das minhas táticas funcionou!"
 learn_commander_trait.1491.a: "Parece que ainda tenho algumas coisas para aprender..."
