l_spanish:
 warhorse.0001.t: "O Cavalo de Guerra"
 warhorse.0001.desc: "Admirando o [ROOT.Char.Custom('HorseStoryMareStallion')], que agora segue cada um dos meus comandos, reflito sobre que nome dar a ele..."
 warhorse.0001.a: "Um nome inspirado na história!"
 warhorse.0001.b: "A mitologia está repleta de nomes de cavalos inspiradores!"
 warhorse.0001.c: "É apenas um cavalo, e deve ser chamado como tal."
 warhorse.0002.desc: "Buscando inspiração nos famosos cavalos que outrora pertenceram a grandes líderes e heróis do passado, reflito sobre um nome para meu [ROOT.Char.Custom('HorseStoryMareStallion')]."
 warhorse.0002.a: "Tencendur — como o cavalo do Rei Carlos Magno!"
 warhorse.0002.b: "Bucéfalo — assim como o cavalo de Alexandre, o Grande!"
 warhorse.0002.c: "Seianiano — o destino de Gneu Ségio certamente é exagerado!"
 warhorse.0002.d: "Zuljanah — em homenagem ao cavalo de Husayn ibn Ali!"
 warhorse.0002.e: "Red Hare — em referência ao cavalo do senhor da guerra Lü Bu!"
 warhorse.0002.f: "Veillantif — como o cavalo de Roland!"
 warhorse.0002.g: "Incitatus — o favorito do Imperador Calígula!"
 warhorse.0002.go_back: "Hmm, outro tema para o nome ficaria melhor..."
 warhorse.0003.desc: "O mundo mitológico é rico em grandiosidade e nomes para cavalos."
 warhorse.0003.llamrei: "Llamrei — em referência ao cavalo do Rei Artur!"
 warhorse.0003.sleipnir: "Sleipnir — mesmo que o corcel que carregava Odin!"
 warhorse.0003.uchchaihshravas: "Uchchaihshravas — a montaria do Deus-Sol!"
 warhorse.0003.dadhi_kra: "Dadhi-krā — o sol matutino!"
 warhorse.0003.devadatta: "Devadatta — mesmo que o próprio cavalo de Kalki!"
 warhorse.0003.keshi: "Keshi — em referência ao cavalo-demônio!"
 warhorse.0003.kanthaka: "Kanthaka — o fiel corcel de Gautama Buda!"
 warhorse.0003.burko: "Burko — como um cavalo mágico das lendas!"
 warhorse.0003.aranjagaan: "Aranjagaan — montaria do grande guerreiro Jangar!"
 warhorse.0003.haizum: "Haizum — o cavalo do arcanjo Gabriel!"
 warhorse.0003.buraq: "Burāq — em referência à criatura que carregava os profetas!"
 warhorse.0003.balius: "Balius — um dos próprios cavalos de Aquiles!"
 warhorse.0003.xanthos: "Xanthos — o nome do outro cavalo de Aquiles ficaria melhor!"
 warhorse.0003.boreas: "Boreas — o antigo deus grego do vento norte!"
 warhorse.0003.khiimori: "Khiimori, o Cavalo do Vento, símbolo da alma!"
 warhorse.0003.rlung_rta: "Rlung Rta, portador de orações e boa sorte!"
 warhorse.0003.jonon_khar: "Jonon Khar, um cavalo voador que chora como o violino de cabeça de cavalo."
 warhorse.0003.tulpar: "Tulpar — uma besta divina, alada e de velocidade incomparável."
 warhorse.0003.aranzhale: "Aranzhale, em homenagem a outro dos corcéis de Jangar."
 warhorse.0003.oyomaa: "Oyomaa, em homenagem à bela e escura fera de Mengen Shigshirge."
 warhorse.0003.rakhsh: "Rakhsh, do #EMP Shahnameh#!, com corpo de leão e força de elefante."
 warhorse.0004.desc: "Um cavalo deve ser chamado como a criatura base que ele é."
 warhorse.0004.a: "Cavaleiro"
 warhorse.0004.b: "Abade"
 warhorse.0004.c: "Saltitante"
 warhorse.0004.d: "Casco Reluzente"
 warhorse.0004.courser: "Corço."
 warhorse.1001.t: "[ROOT.Char.Custom('WarhorseStoryName')|U]: Leal [ROOT.Char.Custom('HorseStoryMareStallion')|U]"
 warhorse.1001.desc: "Um treinador renomado se aproximou de mim após ouvir rumores sobre meu poderoso [ROOT.Char.Custom('HorseStoryMareStallion')] [ROOT.Char.Custom('WarhorseStoryName')], e oferece seus serviços.\n\n\"Tudo o que peço em troca é uma pequena compensação.\""
 warhorse.1001.a: "Precisa ser mais forte."
 warhorse.1001.b: "É preciso aprender a se mover mais rapidamente."
 warhorse.1001.c: "Precisa trabalhar em sua resistência."
 warhorse.1001.d: "Se há algo que falta a [ROOT.Char.Custom('WarhorseStoryName')] é ferocidade!"
 warhorse.1001.e: "Não estou interessado."
 warhorse.1001.e.tt: "#F \"[THIS.Char.Custom('WarhorseStoryName')] não precisa de outro treinador além de mim!\"#!"
 warhorse.1001.f: "É para isso que tenho um $master_of_horse_court_position$!"
 warhorse.1001.f.tt: "Seu $master_of_horse_court_position$ começa a treinar [THIS.Char.Custom('WarhorseStoryName')]"
 warhorse.1001.f.failure: "Você superestimou seu $master_of_horse_court_position$"
 warhorse.1001.f.failure.tt: "[m_horse.GetTitledFirstNameNoTooltip] falha ao treinar [ROOT.Char.Custom('WarhorseStoryName')]."
 warhorse.1002.desc: "[ROOT.Char.Custom('WarhorseStoryName')] se adaptou bem ao treinamento, e os resultados puderam ser vistos instantaneamente!"
 warhorse.1002.a: "Foi dinheiro bem gasto!"
 warhorse.1101.t: "[ROOT.Char.Custom('WarhorseStoryName')|U]: Dia Ensolarado"
 warhorse.1101.desc: "À medida que me aproximo dos postes de amarração, sou recebido pelo alegre relinchar de [ROOT.Char.Custom('WarhorseStoryName')]. Parece ansioso para esticar as pernas neste lindo clima, e não posso fazer nada além de concordar."
 warhorse.1101.a: "Devo aproveitar cada momento para praticar!"
 warhorse.1101.b: "O dia está bom demais para não ser apreciado devidamente!"
 warhorse.1201.t: "[ROOT.Char.Custom('WarhorseStoryName')|U]: o(a) doente [ROOT.Char.Custom('HorseStoryMareStallion')|U]"
 warhorse.1201.desc: "[ROOT.Char.Custom('WarhorseStoryName')] caminha com dificuldade em minha direção, arrastando as patas e com a cabeça pendendo. Não há dúvida de que meu [ROOT.Char.Custom('HorseStoryMareStallion')] tem alguma doença.\n\nO tratador me assegura que há uma cura para sua aflição, mas ela tem um preço considerável."
 warhorse.1201.a: "Nenhum preço é alto demais para o meu amado [ROOT.Char.Custom('WarhorseStoryName')]!"
 warhorse.1201.b: "O que acontecer é a vontade de [ROOT.Char.GetFaith.HighGodName]."
 warhorse.1201.b_good: "[ROOT.Char.Custom('WarhorseStoryName')] se recupera"
 warhorse.1201.b.tt: "Mas parece que confia menos em você"
 warhorse.1201.b_bad: "[ROOT.Char.Custom('WarhorseStoryName')] morre da doença"
 warhorse.1301.t: "[ROOT.Char.Custom('WarhorseStoryName')|U]: Entusiasta de Cavalos"
 warhorse.1301.desc: "[horse_vassal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] olha [ROOT.Char.Custom('WarhorseStoryName')] de cima a baixo, acenando com aprovação.\n\n«Que [ROOT.Char.Custom('HorseStoryMareStallion')] mais incrível, meu [ROOT.Char.GetTitleTierName]! Se me permitirdes montá-lo, eu ficaria muito grato.»"
 warhorse.1301.a: "Divirta-se!"
 warhorse.1301.a.tt: "[THIS.Char.Custom('WarhorseStoryName')] é uma montaria feroz e [horse_vassal.GetFirstNameNoTooltip] não é célebre por sua destreza… Será que vai ficar bem?"
 warhorse.1301.b: "Ninguém monta [ROOT.Char.Custom('WarhorseStoryName')] além de mim!"
 warhorse.1401.t: "[ROOT.Char.Custom('WarhorseStoryName')|U]: Horror Equino"
 warhorse.1401.desc: "Quando a noite cai, encontro-me quase só. O silêncio da noite só é rompido pelo pisoteio da minha [ROOT.Char.Custom('HorseStoryMareStallion')] [ROOT.Char.Custom('WarhorseStoryName')]. Há algo estranho em seus olhos, algo… #EMP amenazador#!.\n\nSeu olhar me segue quando me viro para ir embora, e o arrepio que percorre minha espinha perdura pela noite."
 warhorse.1401.a: "Isso é ridículo… ele é apenas um cavalo."
 warhorse.1401.a.tt: "#F ¿Y por qué sigues sintiendo su mirada sobre ti?#!"
 warhorse.1401.b: "Com certeza [ROOT.Char.Custom('WarhorseStoryName')] está amaldiçoado, livrem-se de [ROOT.Char.Custom('HorseStorySheHe')]!"
 warhorse.1402.desc: "Pés machucados pelos cascos, mãos sangrando por mordidas, o corpo machucado por ter sido lançado… [ROOT.Char.Custom('WarhorseStoryName')] relincha alegremente depois de quase me jogar sobre a lança de um soldado. Não sei por quanto mais tempo poderei aguentar isso."
 warhorse.1402.a: "Não serei vencid por um cavalo!"
 warhorse.1402.b: "A história de [ROOT.Char.Custom('WarhorseStoryName')] termina aqui."
 warhorse.1499.desc: "Aconteceu quando estávamos voltando de uma breve saída a cavalo… Eu já temia isso desde que vi pela primeira vez a malícia nos olhos da minha [ROOT.Char.Custom('HorseStoryMareStallion')] [ROOT.Char.Custom('WarhorseStoryName')]. [ROOT.Char.Custom('HorseStorySheHe')|U] me joga justamente quando passamos ao lado de um conjunto de pedras afiadas, e caio de cabeça direto na quina de uma delas. Aflit[ROOT.Char.Custom('ES_OA')] em uma dor ofuscante, só consigo ouvir seus relinchos estrondosos antes de tudo desaparecer…"
 warhorse.1499.a: "[ROOT.Char.Custom('WarhorseStoryName')]... por quê?"
 warhorse.8001.t: "[ROOT.Char.Custom('WarhorseStoryName')|U]: O Fim de uma Vida"
 warhorse.8001.desc: "Meu fiel [ROOT.Char.Custom('HorseStoryMareStallion')] [ROOT.Char.Custom('WarhorseStoryName')] está ficando velho. Seu passo já não é tão rápido quanto antes, e o fogo em seus olhos está se apagando.\n\nSe eu quiser manter sua linhagem viva, devo encontrar um bom par para [ROOT.Char.Custom('HorseStorySheHe')]."
 warhorse.8001.a: "Encontrarei uma [ROOT.Char.Custom('HorseStoryOppositeMareStallion')] forte."
 warhorse.8001.b: "Procure por uma [ROOT.Char.Custom('HorseStoryOppositeMareStallion')] ágil."
 warhorse.8001.c: "O aspecto mais importante em uma [ROOT.Char.Custom('HorseStoryOppositeMareStallion')] é a resistência."
 warhorse.8001.d: "Vasculhe as terras em busca da mais feroz [ROOT.Char.Custom('HorseStoryOppositeMareStallion')]!"
 warhorse.8001.e: "Deixarei que passe seus últimos dias em paz."
 warhorse.8002.t: "[ROOT.Char.Custom('WarhorseStoryName')|U]: O Ciclo da Vida"
 warhorse.8002.desc: "[ROOT.Char.Custom('WarhorseStoryName')] morreu, mas me deixa um potrinho forte! Já consigo ver a personalidade dele neste pequeno… Meu [ROOT.Char.Custom('HorseStoryMareStallion')] continua comigo, de certo modo."
 warhorse.8002.a: "Descanse em paz, [ROOT.Char.Custom('WarhorseStoryName')]."
 warhorse.8003.desc: "Ao sair para o ar fresco, recebo a triste notícia de que minha amada [ROOT.Char.Custom('HorseStoryMareStallion')] [ROOT.Char.Custom('WarhorseStoryName')] faleceu durante a noite, deixando para três apenas um vazio em meu coração."
 warhorse.8003.a: "Oh, [ROOT.Char.Custom('WarhorseStoryName')], sentirei sua falta!"
