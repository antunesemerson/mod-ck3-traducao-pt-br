 learning_cynical_path_tt: "#F Esta escolha pode levar a um caminho de cinismo#!"
 learning_scholarship_focus_point_clear_gain: "Minha compreensão de [learning_lifestyle|lE] aumenta"
 learning_lifestyle_rank_up_indication: "Eu posso obter um [perk|lE] de [learning_lifestyle|lE]"
 learning_lifestyle_experience_gain_indication: "Eu posso obter [lifestyle_experience|lE] de [learning_lifestyle|lE]"
 #Learn to read, by Linnéa Thimrén
 learning_scholarship.1101.t: "Falta de Alfabetização"
 learning_scholarship.1101.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], me disseram que talvez precise de alguma tutela na arte de... decifrar comunicações escritas", diz [bishop.Custom2('MyCharacterIntroduction', ROOT.Char)], apresentando-me um pergaminho.\n\n"Se for do agrado de meu [ROOT.Char.GetLadyLord], eu estaria encantad[bishop.Custom('ES_OA')] em instruí-lo. Tenho o texto perfeito aqui mesmo"."
 learning_scholarship.1101.a: "O... r-rei tin— tinha uma grande coroa..."
 learning_scholarship.1101.b: "Sou um[ROOT.Char.Custom('ES_XA')] bom[ROOT.Char.Custom('ES_XA')] leitor[ROOT.Char.Custom('ES_XA')]!"
 #Automaton, by Linnéa Thimrén & Mathilda Bjarnehed
 learning_scholarship.1201.t: "Pássaro Cantor"
 learning_scholarship.1201.desc: "Penas de metal reluzente, olhos de pedras preciosas, uma voz que canta com o toque dos sinos… O pássaro mecânico que me foi presenteado por [bird_sender.Custom2('MyCharacterIntroduction', ROOT.Char)] é uma verdadeira obra-prima!\n\n“Este pássaro foi fabricado pelos melhores artífices de todo [bird_sender.GetPrimaryTitle.GetNameNoTierNoTooltip]”, diz a carta [bird_sender.Custom('ES_DelDela')] [bird_sender.GetTitledFirstNameNoTooltip|l]. “Creio que o acharás bastante intrigante.”"
 learning_scholarship.1201.a: "Venda-o."
 learning_scholarship.1201.b: "Coloque-o em exposição."
 learning_scholarship.1201.c: "Desmonte-o e estude seus mecanismos."
 learning_scholarship.1201.c.success: "[bird_sender.Custom('ES_ElLa')|U] [bird_sender.GetTitledFirstNameNoTooltip|l] é um[bird_sender.Custom('ES_XA')] [bird_sender.GetWomanMan] instruíd[bird_sender.Custom('ES_OA')]"
 learning_scholarship.1201.c.failure: "[bird_sender.Custom('ES_ElLa')|U] [bird_sender.GetTitledFirstNameNoTooltip|l] está insultad[bird_sender.Custom('ES_OA')]"
 #Acquire a reading stone, by Linnéa Thimrén
 learning_scholarship.1401.t: "Pedra de Vidro"
 learning_scholarship.1401.desc: "Enquanto me esforçava para decifrar as letrinhas do pergaminho diante de mim, sentia que outra dor de cabeça estava começando. Por que os escribas insistem em escrever símbolos tão pequenos?\n\nFranzo os olhos e tento de novo.\n\n… nada menos que um milagre. Com a ajuda de uma pedra de vidro, até aqueles[ROOT.Char.Custom('ES_OA')]s ancião[ROOT.Char.Custom('ES_OA')]s com problemas de visão conseguem ler com facilidade."
 learning_scholarship.1401.a: "Eu preciso de uma dessas pedras!"
 learning_scholarship.1401.b: "Venda tudo que seja impossível de ler."
 learning_scholarship.1401.c: "[bishop.GetTitledFirstNameNoTooltip], preciso da sua ajuda!"
 #Scientific Experiments, by Petter Vilberg
 learning_scholarship.3001.t: "Visões do Divino"
 learning_scholarship.3001.desc: "Faço um gesto para meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('chaplain'))], [chaplain.GetTitledFirstName|l], para que se junte a mim no círculo de esferas de bronze e velas dispostas em bastões por toda a sala escura. O incenso que satura o ar para afastar os maus vapores faz nossos olhos lacrimejarem em pouco tempo. "É assim que, pelo canto dos nossos olhos, veremos a forma inescrutável dos anjos".\n\nNo entanto, [chaplain.GetFirstNameNoTooltip] para logo. "Isso me parece errado. São seres divinos. Não foram feitos para serem vistos por olhos mortais"."
 learning_scholarship.3001.a: "Você pode sair, mas de uma forma ou de outra, eu descobrirei."
 learning_scholarship.3001.b: "Sim, isso é uma tarefa de tolos, se não um pecado em si."
 learning_scholarship.3001.c: "Minhas intenções são puras, eu lhe asseguro!"
 learning_scholarship.3001.c.tt1: "Convenço a [chaplain.GetFirstName] para me ajudar"
 learning_scholarship.3001.c.toast.tt1: "[chaplain.GetFirstName] foi persuadid pelo meu apelo."
 learning_scholarship.3001.c.tt2: "Não consigo me ganhar a [chaplain.GetFirstName]"
 learning_scholarship.3001.c.toast.tt2: "[chaplain.GetFirstName] descartou minhas razões"
 #Translate a Great Work, by Petter Vilberg
 #story cycle loc
 book_translation_story: "Traduzir uma grande obra"
 book_translation_story_desc: "Traduzir uma grande obra capacitará outros a se beneficiarem de sua sabedoria. Realizar esse ambicioso feito intelectual será um reflexo do seu brilho resplandecente; fracassar o marcará como um[ROOT.Char.Custom('ES_XA')] tolo."
 TRANSLATION_STORY: "Você está traduzindo [Story.GetOwner.Custom('TranslationBookLong')]"
 TRANSLATION_QUALITY: "Qualidade da tradução"
 POOR_TRANSLATION: "Pobre"
 EXCELLENT_TRANSLATION: "Excelente"
 DURATION_LEFT: "Duração restante"
 PROGRESS_TOWARDS_CYNICISM: "Progresso em direção ao cinismo"
 CYNICISM: "Cinismo"
 ZEALOTRY: "Fanatismo"
 #event loc
 learning_scholarship_special.2001.t: "Uma Nova Tradução"
 learning_scholarship_special.2001.desc: "Antes de tudo, minha busca por ser um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] instruíd[ROOT.Char.Custom('ES_OA')] está me ensinando o quanto ainda desconheço. Além disso, deve haver tanto conhecimento que se perdeu com o passar dos anos, à medida que os livros se desfazem e as línguas são esquecidas...\n\nTalvez eu pudesse contribuir fazendo uma nova tradução de uma das obras clássicas.\n\nMas o que eu sequer poderia traduzir?..."
 learning_scholarship_special.2001.regula_pastoralis: "A Regula Pastoralis, sobre como levar uma vida boa."
 learning_scholarship_special.2001.physica_elementa: "Um clássico da ciência — a Physica de Aristóteles!"
 learning_scholarship_special.2001.almagest: "Estudando os céus através do Almagesto de Ptolomeu."
 learning_scholarship_special.2001.elements: "Elementos, tratado matemático de Euclides!"
 learning_scholarship_special.2001.corpus_hermeticus: "O conhecimento místico do Corpus Hermeticus!"
 learning_scholarship_special.2001.treatises_of_hippocrates: "As perspicácias médicas dos Tratados de Hipócrates."
 learning_scholarship_special.2001.peri_psyches: "O famoso Peri Psyches de Aristóteles!"
 learning_scholarship_special.2001.kategoriai: "As Categorias, definindo todos os sujeitos e predicados."
 learning_scholarship_special.2001.avesta: "Os antigos textos sagrados persas, o Avesta."
 learning_scholarship_special.2001.de_oratore: "As lições de retórica de Cícero em De Oratore!"
 learning_scholarship_special.2001.book_of_arda_viraf: "A jornada onírica do Livro de Arda Viraf."
 learning_scholarship_special.2001.upanishads: "Os mais famosos dos Vedas, os Upanishads!"
 learning_scholarship_special.2001.rigveda: "Os hinos religiosos do Rigveda."
 learning_scholarship_special.2001.book_of_balances: "O Livro Compendioso do Cálculo."
 learning_scholarship_special.2001.secret_of_secrets: "O Segredo dos Segredos concedido a Alexandre."
 learning_scholarship_special.2001.court_of_agriculture: "A Corte da Agricultura."
 learning_scholarship_special.2001.lanterns_of_wisdom: "Instruções sobre alquimia em As Lanternas da Sabedoria."
 learning_scholarship_special.2001.shahnameh: "O poema da história da Pérsia, o Shahnameh."
 learning_scholarship_special.2001.arithmetica: "A Arithmetica e os comentários de Diophantus."
 learning_scholarship_special.2001.pali_canon: "Um texto do Cânone Pali."
 learning_scholarship_special.2001.the_norse_sagas: "Uma das sagas nórdicas!"
 learning_scholarship_special.2001.family_history: "Algo pessoal — a história da minha família."
 learning_scholarship_special.2001.ancient_myths: "Algo grandioso — um dos mitos antigos!"
 learning_scholarship_special.2001.decline: "Isso parece muito difícil."
 book_translation_tooltip.unchanged: "A #V Qualidade da Tradução#! permanecerá inalterada"
 book_translation_tooltip.more_good: "A #V Qualidade da Tradução#! melhorará significativamente"
 book_translation_tooltip.less_good: "A #V Qualidade da Tradução#! melhorará ligeiramente"
 book_translation_tooltip.finish_faster: "A Tradução será concluída mais rapidamente"
 book_translation_toast.unchanged: "A #V Qualidade da Tradução#! permaneceu inalterada"
 book_translation_toast.more_good: "A #V Qualidade da Tradução#! melhorou significativamente"
 book_translation_toast.less_good: "A #V Qualidade da Tradução#! melhorou ligeiramente"
 book_translation_toast.finish_faster: "A Tradução será concluída mais rapidamente"
 learning_scholarship_special.2011.desc: "Minha tradução de [ROOT.Char.Custom('TranslationBook')] está avançando, mas uma seção da versão da qual estou copiando me faz hesitar.\n\nMeu escriba insiste que as palavras da página significam "como temos dois pés e as vantajosas elevações do caçador".\n\nIsso não pode estar certo, pode?"
 learning_scholarship_special.2011.a: "Posso pensar em algo mais adequado."
 learning_scholarship_special.2011.a.success: "Melhoro o texto"
 learning_scholarship_special.2011.a.failure: "Perco o significado"
 learning_scholarship_special.2011.b: "Vamos traduzir o texto exatamente como está escrito!"
 learning_scholarship_special.2011.c: "Ah, o significado é óbvio, deixe-me cuidar disso."
 learning_scholarship_special.2012.desc: "Uma frase específica de [ROOT.Char.Custom('TranslationBook')] tem frustrado meus esforços de tradução por dias. Até comecei a murmurá-la para mim mesmo às vezes.\n\n"Ainda está lutando com aquilo?" Meu/minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('realm_priest'))] segura um volumoso e antigo livro. "Basta saber onde procurar.""
 learning_scholarship_special.2012.a: "Ajude-me a descobrir isso, [realm_priest.GetFirstNameNoTooltip]!"
 learning_scholarship_special.2012.a.success: "[realm_priest.GetShortUINameNoTooltip] encontra a resposta"
 learning_scholarship_special.2012.a.failure: "[realm_priest.GetShortUINameNoTooltip] encontra uma espécie de resposta"
 learning_scholarship_special.2012.b: "Sem jogos. Apenas me diga o que estou procurando."
 learning_scholarship_special.2012.c: "Quer me mostrar, amig[realm_priest.Custom('ES_OA')] me[realm_priest.Custom('ES_OA')]?"
 learning_scholarship_special.2012.c.friendship_tooltip: "Esta opção está disponível graças à minha amizade com [realm_priest.GetFirstNameNoTooltip]"
 learning_scholarship_special.2013.desc: "Estou ouvindo as anotações para a minha tradução de [ROOT.Char.Custom('TranslationBook')], quando tenho uma compreensão repentina. 'Escreva, escrivão! Acrescente o seguinte comentário...'"
 learning_scholarship_special.2013.a: "'Ao contrário dos [ROOT.Char.GetFaith.ReligiousText], esta obra postula que...'"
 learning_scholarship_special.2013.b: "'Como evidenciado pela vontade de [ROOT.Char.GetFaith.HighGodName]...'"
 learning_scholarship_special.2014.desc: "Estava fazendo com que me lessem as notas da minha tradução de [ROOT.Char.Custom('TranslationBook')] quando...\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U]? Perdoe-me, por favor, mas... você pegou no sono[ROOT.Char.Custom('ES_OA')]?".\n\nPelo amor de Deus, este "clássico" é uma bobagem absoluta!"
 learning_scholarship_special.2014.a: "No entanto, vou me forçar a seguir em frente!"
 learning_scholarship_special.2014.b: "Meus escribas podem assumir mais responsabilidade."
 learning_scholarship_special.2014.c: "Preciso de uma pausa disso tudo."
 learning_scholarship_special.2015.desc: "Estou trabalhando na tradução de [ROOT.Char.Custom('TranslationBook')] durante horas sob a luz trêmula de uma vela. Muitas vezes, mal percebo o tempo passar. No entanto, meus escribas me lembram disso.\n\n[ROOT.Char.Custom('FormOfAddressForLiege')|U], já deve ser depois da meia-noite. Não está na hora de descansar?"
 learning_scholarship_special.2015.a: ""Não, temos que continuar até eu me sentir realizado[ROOT.Char.Custom('ES_OA')]!""
 learning_scholarship_special.2015.b: "'Sim, um pouco de sono fará bem a todos.'"
 learning_scholarship_special.2015.c: "'Vocês podem continuar trabalhando enquanto eu descanso.'"
 learning_scholarship_special.2016.desc: "Um dos meus escribas fez edições na minha tradução de [ROOT.Char.Custom('TranslationBook')] sem o meu conhecimento!\n\n\"Só queria deixar o texto o melhor possível! Você gostava quando achava que era seu próprio trabalho!\""
 learning_scholarship_special.2016.a: "Você nunca mais vai copiar textos para ninguém!"
 learning_scholarship_special.2016.b: "Vou fazer você pagar!"
 learning_scholarship_special.2016.b.flavor: "'O resto de vocês, escribas, deveriam aprender com isso!'"
 learning_scholarship_special.2016.c: "Isso... é muito bom, na verdade."
 learning_scholarship_special.2017.desc: "O esforço constante para traduzir [ROOT.Char.Custom('TranslationBook')] é cansativo. A concentração incessante, o entendimento e a criatividade necessários me esgotam, enquanto me aproximo cada vez mais da conclusão."
 learning_scholarship_special.2017.a: "Apenas algumas páginas a mais esta noite, e algumas a mais pela manhã..."
 learning_scholarship_special.2017.b: "Devo me isolar de todas as outras distrações até terminar isso."
 learning_scholarship_special.2017.c: "O livro pode esperar por um tempo."
 learning_scholarship_special.2097.t: "Uma Excelente Tradução"
 learning_scholarship_special.2097.opening: "Minha tradução de [ROOT.Char.Custom('TranslationBook')] finalmente está completa. Minhas palavras repousam em páginas lindamente iluminadas, protegidas por uma capa luxuosa, como convém à importância da obra."
 learning_scholarship_special.2097.conclusion: "\n\nO tomo ocupa um lugar de destaque em minha coleção, e todos os [ROOT.Char.GetFaith.PriestNeuter] que o leem ficam grandemente impressionados com meus esforços. Alguns já estão falando em fazer suas próprias cópias."
 learning_scholarship_special.2097.a: "Este esforço me ensinou muito."
 learning_scholarship_special.2098.t: "Minha Tradução Concluída"
 learning_scholarship_special.2098.opening: "Por fim, minha tradução de [ROOT.Char.Custom('TranslationBook')]. Suas palavras estão cercadas por belas iluminuras, e as mais luxuosas desviam a atenção das seções de que eu estava menos segur[ROOT.Char.Custom('ES_OA')] estava."
 learning_scholarship_special.2098.conclusion: "\n\nEmbora possa ser um pouco difícil de entender em alguns trechos, não há dúvida de que esta tradução é muito necessária. Enquanto repousa em minha coleção, onde [ROOT.Char.GetFaith.DevoteeNeuterPlural] frequentemente leem, aguardo ansiosamente os primeiros esforços para copiá-la."
 learning_scholarship_special.2098.a: "Aprendi muito com isso!"
 #Lead to Gold, by Sean Hughes
 learning_scholarship_special.3001.t: "Chumbo em Ouro"
 learning_scholarship_special.3001.desc_opening: "A transmutação de chumbo em ouro tem sido o sonho de alquimistas em todo o mundo. Embora muitos tenham tentado tal feito, ninguém conseguiu até agora.\n\n"
 learning_scholarship_special.3001.desc_alchemist: "No entanto, [alchemist.Custom2('MyCharacterIntroduction', ROOT.Char)] encontrou algumas anotações escritas nas margens de um livro sobre plantas. Eles afirmam que é possível criar 'chuva dourada' fervendo açúcar de chumbo em uma solução filtrada de cinzas de algas."
 learning_scholarship_special.3001.desc: "Apesar disso, encontrei algumas anotações escritas nas margens de um livro sobre plantas. Elas afirmam que é possível criar 'chuva dourada' fervendo açúcar de chumbo em uma solução filtrada de cinzas de algas."
 learning_scholarship_special.3001.desc_ending: "\n\nSerá que algo assim é possível?"
 learning_scholarship_special.3001.a: "Se nada mais, vale a pena investigar..."
 learning_scholarship_special.3001.b: "Esses rabiscos são claramente uma brincadeira sem sentido."
 learning_scholarship_special.3001.c: "Buscar riqueza desse modo é inerentemente ímpio!"
 learning_scholarship_special.3001.d: "Não serei tentado pelas promessas da bruxaria!"
 learning_scholarship_special.3002.desc_alchemist: "O primeiro reagente que precisamos obter é o açúcar de chumbo, um ingrediente usado para adoçar vinhos.\n\nPodemos encontrar um fornecedor para importar o que precisamos, embora seja caro. Alternativamente, podemos fabricar o nosso próprio de forma barata, queimando chumbo metálico e dissolvendo as cinzas em vinagre..."
 learning_scholarship_special.3002.desc: "O primeiro reagente que preciso obter é o açúcar de chumbo, um ingrediente usado para adoçar vinhos.\n\nPosso encontrar um fornecedor para importar o que preciso, embora seja caro. Alternativamente, posso fabricar o meu próprio, de forma barata, queimando chumbo metálico e dissolvendo as cinzas em vinagre..."
 learning_scholarship_special.3002.a: "É preciso gastar dinheiro para ganhar dinheiro!"
 learning_scholarship_special.3002.b: "Como posso aprender se outras pessoas fazem todo o trabalho!?"
 learning_scholarship_special.3002.b_alchemist: "Como podemos aprender se outras pessoas fazem todo o trabalho!?"
 learning_scholarship_special.3002.a.success: "Você cria o açúcar de chumbo sem incidentes"
 learning_scholarship_special.3002.a.failure: "Os vapores de chumbo lhe dão dor de cabeça"
 learning_scholarship_special.3002.tt: "Você obtém o açúcar de chumbo"
 learning_scholarship_special.3002.c: "Pensando melhor, isso é uma má ideia..."
 learning_scholarship_special.3003.desc_alchemist: "O segundo reagente que precisamos obter é a alga marinha... muita alga marinha. Cem dracmas, trituradas e depois secas. Onde podemos obter uma quantidade tão substancial?"
 learning_scholarship_special.3003.desc: "O segundo reagente que preciso obter é a alga marinha... muita alga marinha. Cem dracmas, trituradas e depois secas. Onde posso obter uma quantidade tão substancial?"
 learning_scholarship_special.3003.a: "Vou importá-la de várias cidades costeiras."
 learning_scholarship_special.3003.b: "Exigir um imposto sobre algas dos meus súditos!"
 learning_scholarship_special.3003.c: "Posso simplesmente usar meu chumbo para adoçar vinhos..."
 learning_scholarship_special.3003.tt: "Você obtém a alga marinha"
 learning_scholarship_special.3004.desc_alchemist: "Por fim, temos todos os reagentes necessários para produzir a chuva dourada!\n\nO acetato de chumbo está armazenado com segurança em barris impermeáveis. Os feixes de algas secas estão empilhados na fornalha, prontos para serem queimados.\n\nSerá esta nossa obra-prima?"
 learning_scholarship_special.3004.desc: "Finalmente, tenho todos os reagentes necessários para produzir a chuva dourada!\n\nO acetato de chumbo está armazenado em segurança em barris impermeáveis. Os feixes de algas secas estão empilhados no forno, prontos para serem queimados.\n\nSerá esta minha obra-prima?"
 learning_scholarship_special.3004.a: "Inicie o experimento!"
 learning_scholarship_special.3004.a.success: "Você consegue criar a chuva dourada"
 learning_scholarship_special.3004.a.success.tt: "Riqueza e glória são suas!"
 learning_scholarship_special.3004.a.failure: "A fórmula não funciona como esperado"
 learning_scholarship_special.3004.a.failure.tt: "Mas o que você criou em vez disso?"
 learning_scholarship_special.3004.b: "… O que estou fazendo? Isso é uma estupidez."
 learning_scholarship_special.3005.desc_alchemist: "Após misturar o açúcar de chumbo na solução, ela ficou repentinamente amarela vibrante! Tive um momento de preocupação quando a mistura ficou clara após ferver, mas assim que esfriou novamente, vimos pequenos cristais dourados se formarem no frasco.\n\nAo examinar, pudemos perceber que esses cristais não são ouro verdadeiro, pois são translúcidos. No entanto, é possível que essa reação seja um dos famosos '12 processos vitais' necessários para criar ouro!"
 learning_scholarship_special.3005.desc: "Após misturar o açúcar de chumbo na solução, ela ficou repentinamente amarela vibrante! Tive um momento de preocupação quando a mistura ficou clara após ferver, mas assim que esfriou novamente, vi pequenos cristais dourados se formarem no frasco.\n\nAo examinar, pude perceber que esses cristais não são ouro verdadeiro, pois são translúcidos. No entanto, é possível que essa reação seja um dos famosos '12 processos vitais' necessários para criar ouro!"
 learning_scholarship_special.3005.a: "Estou um passo mais perto da verdadeira transmutação?"
 learning_scholarship_special.3005.a_alchemist: "Estamos um passo mais perto da verdadeira transmutação?"
 learning_scholarship_special.3006.desc_alchemist: "Ao misturar o açúcar de chumbo nas cinzas de algas marinhas fervidas, a mistura repentinamente ficou amarela vibrante.\n\nEmbora não tenhamos conseguido produzir ouro de verdade, descobrimos que nossa solução pode ser usada como um corante que rivaliza com o açafrão em brilho. Vender esse corante me permitirá recuperar parte dos meus custos."
 learning_scholarship_special.3006.desc: "Ao misturar o açúcar de chumbo nas cinzas de algas marinhas fervidas, a mistura repentinamente ficou amarela vibrante.\n\nEmbora não tenha conseguido produzir ouro de verdade, descobri que minha solução pode ser usada como um corante que rivaliza com o açafrão em brilho. Vender esse corante me permitirá recuperar parte dos meus custos."
 learning_scholarship_special.3006.a: "Bonito, mesmo que seja caro de produzir."
 learning_scholarship_special.3007.desc_alchemist: "Após queimar as algas marinhas e misturá-las com água, ficamos com uma quantidade alarmante de lodo marrom repugnante. Incerto sobre o que fazer nesse ponto, misturamos o açúcar de chumbo na solução, mas nenhuma mudança observável ocorreu.\n\nInfelizmente, o único uso que consigo pensar para o experimento é usá-lo como fertilizante."
 learning_scholarship_special.3007.desc: "Depois de queimar as algas e misturá-las com água, fiquei com uma quantidade alarmante de nojento lodo marrom. Não estava segur[ROOT.Char.Custom('ES_OA')]de o que fazer nesse ponto, misturei o açúcar de chumbo na solução, mas nenhuma mudança perceptível ocorreu.\n\nInfelizmente, o único uso que consigo imaginar para meu experimento é usá-lo como fertilizante."
 learning_scholarship_special.3007.a: "Acho que as plantações vão crescer bem este ano?"
 learning_scholarship_special.3099.termination.toast: "Transmutação Fracassada"
 learning_scholarship_special.3099.termination.desc.prison: "Não posso continuar meus experimentos de transmutação estando na prisão."
 learning_scholarship_special.3099.termination.desc.incapable: "Não posso continuar meus experimentos de transmutação estando incapaz."
 #Dear god, go outside by Isabella Welch
 learning_scholarship.4000.t: "Saia!"
 learning_scholarship.4000.desc: "É tarde e estou mergulhado[ROOT.Char.Custom('ES_OA')] em um tratado fascinante de gramática clássica. Assim que começo a rir de algumas anotações à margem maravilhosamente sarcásticas deixadas por um leitor anterior, meu [spouse_uninterested_in_study.GetWifeHusband] entra em meu [ROOT.Char.Custom('GetRoom')].\n\n"Seu sem-vergonha[ROOT.Char.Custom('ES_OA')][ROOT.Char.GetWomanMan]! Você negligencia tudo, exceto seus estudos, lendo sozinho em casa do anoitecer ao amanhecer. Tire a cabeça desses pergaminhos empoeirados ou não venha para minha cama esta noite"."
 learning_scholarship.4000.a: "Conforme desejar."
 learning_scholarship.4000.b: "Talvez possamos ler trechos juntos a partir de agora."
 learning_scholarship.4000.c: "Tenho que trabalhar até tarde para preparar as lições do meu querido[child_educated.Custom('ES_OA')] [child_educated.GetFirstNameNoTooltip]."
 learning_scholarship.4000.c.tt: "[spouse_uninterested_in_study.GetFirstName] não é [spouse_uninterested_in_study.GetMotherFather] de [child_educated.GetFirstNameNoTooltip]."
 learning_scholarship.4000.d: "Não preciso me deitar com você — tenho o abraço caloroso do conhecimento!"
 #Bibliomancy by Chad Uhl
 bibliomancy_chain_header: "Um Texto Sagrado:"
 learning_scholarship.5000.t: "Um Texto Sagrado"
 learning_scholarship.5000.desc: "Enquanto fazia um passeio pelo mercado, um[merchant_mystic.Custom('ES_XA')] comerciante me chama, insistindo que tem algo que despertará meu interesse.\n\nO cheiro de ervas secas e tinturas estrangeiras me envolve os sentidos quando me aproximo da barraca. O/A comerciante remexe em sua coleção de tomos empoeirados e outros tesouros.\n\nDepois de procurar um pouco, ele/ela tira um livro antigo e insiste que eu preciso dele para "o que está por vir"."
 learning_scholarship.5000.a: "Está bem, vou aceitar."
 learning_scholarship.5000.b: "Talvez possamos chegar a um acordo."
 learning_scholarship.5000.c: "Eu pego o que preciso."
 learning_scholarship.5000.d: "Para que preciso dos seus livros?"
 learning_scholarship.5000.b.success: "Você negocia um preço melhor"
 learning_scholarship.5000.b.failure: "Você não consegue negociar um preço melhor"
 bibliomancy_book_purchased: "Você receberá um livro [artifact|lE]"
 learning_scholarship_sacred_artifact_obtained: "Você obtém o texto sagrado"
 learning_scholarship.5001.t: "$bibliomancy_chain_header$ Bibliomancia"
 learning_scholarship.5001.desc: "Enquanto guardo meu recém-adquirido [sacred_text.GetName], um pedaço de pergaminho cai. Nele estão instruções para uma prática chamada bibliomancia, em que alguém pode prever seu destino a partir de uma passagem de um livro.\n\nTudo que preciso fazer é abrir este texto em uma página aleatória e ler o primeiro verso do destino que meus olhos encontrarem."
 learning_scholarship.5001.a: "A tentação é irresistível."
 learning_scholarship.5001.b: "Não quero nada a ver com essa prática profana."
 learning_scholarship.5002.t: "$bibliomancy_chain_header$ Leitura Fatal"
 learning_scholarship.5002.desc: "Sigo as instruções à risca e seleciono um trecho ao acaso do texto diante de mim. Tremendo de expectativa, abro os olhos e leio:\n\n#EMP O medo mata a mente. O covarde morre mil pequenas mortes, mas o valente morre apenas uma vez.#!\n\nO que devo fazer com isso?"
 learning_scholarship.5002.a: "O medo é a pequena morte que traz a destruição total."
 learning_scholarship.5002.b: "Fascinante. Isso requer mais pesquisa."
 learning_scholarship.5002.b.success: "Descubro o verdadeiro significado desta passagem"
 learning_scholarship.5002.b.failure: "A passagem continua a me escapar"
 learning_scholarship.5002.c: "Que absurdo completo!"
 learning_scholarship.5002.c.tt: "Você ignora a passagem"
 learning_scholarship.5002.d: "Meu $antiquarian_court_position$, [antiquarian.GetTitledFirstNameNoTooltip|l], deve dar uma olhada nisso."
 learning_scholarship.5003.t: "$bibliomancy_chain_header$ Bibliomancia"
 learning_scholarship.5003.desc: "Meu vassal[bibliomancy_antagonist.Custom('ES_OA')], [bibliomancy_antagonist.GetName], tem estado silenciosamente cético[bibliomancy_antagonist.Custom('ES_OA')] quanto à minha capacidade durante anos. No entanto, meu administrador me informa que, desde recentemente, ele começou a criticar mais abertamente meu direito de governar. Sei que ele tem influência entre os outros vassalos e poderia facilmente dificultar minha vida.\n\nSerá que a passagem de [sacred_text.GetName]o teria predito? O medo é o destruidor da mente…"
 learning_scholarship.5003.a: "Eu enfrento meu medo."
 learning_scholarship.5003.a.tt: "Eu debato com [bibliomancy_antagonist.GetName] em um fórum público"
 learning_scholarship.5003.b: "Uma abordagem sutil é a melhor."
 learning_scholarship.5003.b.tt: "Faço abordagens formais a [bibliomancy_antagonist.GetName]"
 learning_scholarship.5003.c: "Vamos discutir isso mais tarde."
 learning_scholarship.5003.vassal.tt: "Todos os vassalos"
 learning_scholarship.5003.a.success: "Você vence o debate contra seu vassalo"
 learning_scholarship.5003.a.failure: "Você perde o debate contra seu vassalo"
 learning_scholarship.5003.b.success: "Você consegue aplacar seu vassalo"
 learning_scholarship.5003.b.failure: "Você não consegue aplacar seu vassalo"
 learning_scholarship.5004.t: "$bibliomancy_chain_header$ Passagem Inquietante"
 learning_scholarship.5004.desc: "Não consigo entender de jeito nenhum este trecho de [sacred_text.GetName] por mais que eu tente, e isso está me consumindo!\n\nO medo mata a mente… O que isso pode significar? Do que devo temer? #EMP Qué me estoy dejando#!?\n\nTalvez outra pessoa possa lançar alguma luz sobre isso."
 learning_scholarship.5004.a: "[court_chaplain.GetCouncilTitle] [court_chaplain.GetTitledFirstName|l] saberá a resposta."
 learning_scholarship.5004.b: "Meu [ROOT.Char.Custom('GetCourtier')|l], [target_courtier.Custom('ES_ElLa')] [target_courtier.GetTitledFirstNameNoTooltip|l], me ajudará."
 learning_scholarship.5004.c: "Eu desisto."
 learning_scholarship.5004.a.success: "[court_chaplain.GetCouncilTitle] [court_chaplain.GetFirstNameNoTooltip] esclarece a passagem"
 learning_scholarship.5004.a.failure: "[court_chaplain.GetCouncilTitle] [court_chaplain.GetFirstNameNoTooltip] não consegue entender a passagem"
 learning_scholarship.5004.b.success: "[target_courtier.GetFirstNameNoTooltip] esclarece a passagem"
 learning_scholarship.5004.b.failure: "[target_courtier.GetFirstNameNoTooltip] não consegue entender a passagem"
 learning_scholarship.5005.t: "$bibliomancy_chain_header$ Nada a temer"
 learning_scholarship.5005.desc: "Finalmente decifrei a misteriosa passagem de [sacred_text.GetName] e me sinto muito mais sábi[ROOT.Char.Custom('ES_OA')] por isso. Graças àquele mercador, os fios do destino agora me parecem muito mais claros de repente.\n\nO medo pode bem ser o assassino da mente, mas eu enfrentei o meu medo."
 learning_scholarship.5005.a: "Sem medo, morro apenas uma vez."
 learning_scholarship.5006.t: "$bibliomancy_chain_header$ Paranoia Crescente"
 learning_scholarship.5006.desc: "Depois de passar dias tentando decifrar essa passagem indecifrável e obtusa, finalmente desisti. Não faço ideia do que isso possa significar e todo esse assunto me deixa arrepiado até os ossos.\n\nO que vai acontecer? Devo agora viver com medo #EMP para sempre#!?"
 learning_scholarship.5006.a: "O medo é a pequena morte que traz a destruição total."
 learning_scholarship_paranoid_trait.tt: "Você adquiriu este traço por não conseguir entender a passagem em [sacred_text.GetName]"
 learning_scholarship_paranoid_trait_possible: "Você pode adquirir o [trait|lE] [GetTrait('paranoid').GetName( GetNullCharacter )]"
 #The Man of Few Letters by Jason Cantalini
 learning_scholarship.6000.t: "Pessoa de Poucas Letras"
 learning_scholarship.6000.desc: "Parece que, apesar dos melhores esforços de [teacher.Custom2('HerHisCharacterIntroduction',illiterate)] de [illiterate.GetName], continua tão iletrad[illiterate.Custom('ES_OA')] quanto o típico idiota da aldeia.\n\n"Sábi[ROOT.Char.Custom('ES_OA')] e iluminad[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleTierName]", bajula-me [teacher.GetFirstNameNoTooltip]. "Como posso inspirar meu [illiterate.GetLadyLord] a aprender?""
 learning_scholarship.6000.willing_pupil: "\n\n[teacher.GetSheHe|U] suspira, exasperad[teacher.Custom('ES_OA')].\n\nMeu [illiterate.GetTitleAsNameNoTooltip|l] não dedicará horas de estudo apenas para ler…"
 learning_scholarship.6000.holy_book_insult: "\n\n[teacher.GetSheHe|U] hesita, então resmunga:\n\n\"O que meu [illiterate.GetTitleAsNameNoTooltip|l] depois de lutar com as primeiras linhas sagradas do/a [illiterate.GetFaith.ReligiousText]... não foi nem santo #EMP ni#! esclarecido...\"."
 learning_scholarship.6000.poetry_insult: "\n\n[teacher.Custom('ES_ElLa')|U] o mestre[teacher.Custom('ES_OA')] faz uma careta.\n\n"O que meu [illiterate.GetTitleAsNameNoTooltip|l] depois de aguentar a poesia mais elegante de [illiterate.GetCulture.GetNameNoTooltip]… não foi nem elegante #EMP ni#! esclarecido…"."
 learning_scholarship.6000.very_willing_pupil: "\n\n[teacher.GetSheHe|U] aponta para o conhecimento que acumulei.\n\n"O [illiterate.GetTitleTierName|l] tem medo de ter que lutar com mil linhas e nunca alcançar uma sabedoria como a vossa.""
 learning_scholarship.6000.a: "Meu [illiterate.GetCouncilTitle] precisa de um relato sobre povos distantes."
 learning_scholarship.6000.b: "Meu [illiterate.GetCouncilTitle] precisa de uma crônica cheia de fofocas da corte."
 learning_scholarship.6000.c: "Meu [illiterate.GetCouncilTitle] precisa de contos de feitos guerreiros."
 learning_scholarship.6000.d: "Meu [illiterate.GetCouncilTitle] precisa de um tratado sobre justiça."
 learning_scholarship.6000.e: "Meu [illiterate.GetCouncilTitle] precisa de uma ode irresistível à espiritualidade."
 learning_scholarship.6000.f: "[illiterate.GetSheHe|U] lerá as palavras do seu [ROOT.Char.GetTitleTierName]."
 learning_scholarship.6000.f.tt: "Uma desculpa para escrever, em vez de governar!"
 learning_scholarship.6000.f.success: "Seu tratado é muito educativo"
 learning_scholarship.6000.f.failure: "Seu vassalo zomba do seu texto monótono e sem sentido"
 learning_scholarship.6000.g: "O tempo [illiterate.Custom('ES_DelDela')] [illiterate.GetTitleAsNameNoTooltip|l] é valioso demais para isso."
 learning_scholarship.6000.g.tt: "É uma pessoa de ação, outros podem ler para [illiterate.GetSheHe]!"
 learning_scholarship.6000.h: "Blasfêmia? Conte-me um pouco mais..."
 learning_scholarship.6000.h.tt: "Você pode fazer com que as palavras [illiterate.Custom('ES_DelDela')] [illiterate.GetTitleAsNameNoTooltip|l] soem #EMP muy#! verdadeiramente ímpias"
 learning_scholarship.6000.non_believer: "Você obtém provas de que [illiterate.GetTitledFirstName|l] não é crente"
 learning_scholarship.6000.i: "Honrarei a poesia [illiterate.GetCulture.GetNameNoTooltip] para inspirar[illiterate.GetHerHim]."
 learning_scholarship.6000.i.tt: "Em sua corte, a poesia [illiterate.GetCulture.GetNameNoTooltip] será recitada com frequência"
 learning_scholarship.6000.j: "A sabedoria está em ver o encanto em cada palavra..."
 learning_scholarship.6000.j.tt: "… mais do que ansiar por tê-las lido todas."
 learning_scholarship.6000.k: "A alfabetização está além desse bruto!"
 learning_scholarship.6000.k.tt: "É tão inútil quanto ensinar astronomia a uma cabra!"
 high_learning_custom: "Cada vassalo não-[GetTrait('compassionate').GetName( GetNullCharacter )|l] com alto [learning|lE]"
