l_spanish:
 marriage_interaction.0001.desc.start: "Para [ROOT.Char.GetFullName]:\n\nApós refletir cuidadosamente, decidi romper"
 marriage_interaction.0001.desc.liegetoliege: "o noivado entre meu [actor.Custom2('RelationToMe', SCOPE.sC('rejecting_betrothed'))], [rejecting_betrothed.GetTitledFirstName|l], e voss[rejected_betrothed.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('rejected_betrothed'))], [rejected_betrothed.GetTitledFirstName|l]."
 marriage_interaction.0001.desc.betrothedtobetrothed: "nosso noivado."
 marriage_interaction.0001.desc.betrothedtoliege: "meu noivado com voss[rejected_betrothed.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('rejected_betrothed'))], [rejected_betrothed.GetTitledFirstName|l]."
 marriage_interaction.0001.desc.liegetobetrothed: "seu noivado com [actor.Custom2('RelationToMe', SCOPE.sC('rejecting_betrothed'))], [rejecting_betrothed.GetTitledFirstName|l]."
 marriage_interaction.0001.desc.end: "Peço desculpas por qualquer inconveniente que minha decisão possa causar e espero sinceramente que não prejudique as relações entre nossas famílias."
 marriage_interaction.0001.a: "Um insulto terrível..."
 marriage_interaction.0002.desc: "Para meu [actor.Custom2('RelationToMe', SCOPE.sC('rejecting_betrothed'))] [rejecting_betrothed.GetFullName]:\n\nCheguei à conclusão de que seu casamento futuro com [rejected_betrothed.GetTitledFirstName|l] não é do seu interesse nem do interesse de nossa família. Portanto, decidi romper o noivado." #<TO_REMOVE>
 marriage_interaction.0002.a: "Infelizmente." #<TO_REMOVE>
 #Timeout notification when you are in charge of the betrothal of someone else
 marriage_interaction.0004.t: "Um Noivado Abandonado"
 marriage_interaction.0004.desc: "Os acordos foram feitos e tudo estava em ordem, até que chegou a hora de concluir o casamento. Com ambas as partes aparentemente dispostas a fingir que o acordo nunca foi feito, parece improvável que [betrothed_1.GetTitledFirstName|l] e [betrothed_2.GetTitledFirstName|l] se casem algum dia."
 marriage_interaction.0004.a: "É melhor assim."
 #Timeout notification for a betrothed when someone else is in charge of marrying them
 marriage_interaction.0005.t: "Um Noivado Abandonado"
 marriage_interaction.0005.desc: "Apesar de uma negociação cuidadosa e de um planejamento minucioso, parece que nunca me casarei com meu prometid[other_betrothed.Custom('ES_OA')], [other_betrothed.GetTitledFirstName|l]. Embora tenha chegado a hora de concretizar o casamento prometido, nenhuma das partes deu o passo para cumprir o acordo."
 marriage_interaction.0005.a: "Quem sabe com quem me casarei agora."
 #Timeout notification for someone in charge of their own betrothal
 marriage_interaction.0006.t: "Um Noivado Abandonado"
 marriage_interaction.0006.desc: "Apesar de uma cuidadosa negociação e planejamento, parece que nunca me casarei com meu prometid[other_betrothed.Custom('ES_OA')], [other_betrothed.GetTitledFirstName|l]. Embora tenha chegado o momento de selar o casamento ao qual se comprometeram, nenhuma das partes deu o passo para cumprir o acordo."
 marriage_interaction.0006.a: "Com quem me casarei, afinal?"
 marriage_interaction.0008.t: "Noivado Rompido por Motivos Religiosos"
 marriage_interaction.0008.desc: "[betrothed_clergy.GetTitledFirstName] dedicou sua vida a [betrothed_clergy.GetFaith.HighGodName]. Apesar das negociações e dos planos, parece que não se casará com [betrothed_2.Custom('ES_ElLa')] [betrothed_2.GetTitledFirstName|l]."
 marriage_interaction.0008.a: "Infelizmente."
 marriage_interaction.0009.desc_clergy: "Agora que dediquei minha vida a [betrothed_clergy.GetFaith.HighGodName], me é proibido me casar e devo deixar para trás a promessa que fiz a [betrothed_2.GetTitledFirstName|l]. Espero que saiba me perdoar."
 marriage_interaction.0009.desc: "[betrothed_clergy.GetTitledFirstName] dedicou sua vida a [betrothed_clergy.GetFaith.HighGodName]. Apesar das negociações e dos planos, parece que não chegaremos a nos casar."
 marriage_interaction.0009.a: "Infelizmente."
