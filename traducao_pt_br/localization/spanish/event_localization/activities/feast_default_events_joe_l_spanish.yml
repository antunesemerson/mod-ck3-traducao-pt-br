l_spanish:
 feast_default_joe.1010.t: "Tecendo teias"
 feast_default_joe.1010.desc: "Con tanta gente poderosa en un solo lugar, unas pocas palabras sueltas pueden tener consecuencias trascendentales…\n\nMe he fijado en que mi [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('agent'))], [agent.Custom('ES_ElLa')] [agent.GetTitledFirstName|l], parece especialmente comprensiv[agent.Custom('ES_OA')] con mi causa."
 feast_default_joe.1010.a: "Muitas sementes podem dar fruto, se forem cultivadas adequadamente..."
 feast_default_joe.1010.a.trigger: "Você tem o traço [GetTrait('schemer').GetName( GetNullCharacter )] ou pelo menos [SCOPE.ScriptValue('decent_skill_rating')|0V] de [intrigue|lE]"
 feast_default_joe.1010.b: "Será fácil trazer [agent.Custom('ES_AlAla')] [agent.GetTitledFirstNameNoTooltip|l] para o meu lado."
 feast_default_joe.1010.c: "Onde as pessoas se reúnem, as oportunidades abundam."
 feast_default_joe.1010.d: "Meus planos darão certo, só preciso ter paciência."
 agent_more_likely_join_scheme_tt: "Durante 6 meses, a disposição de [agent.GetShortUIName] para se juntar ao seu [scheme|lE] de [scheme.GetName|lV] contra [scheme.GetTargetCharacter.GetShortUIName]: #P +25#!"
 all_guests_agent_more_likely_join_scheme_tt: "Durante 6 meses, la disposición de todos los asistentes válidos de unirse a tu [scheme|lE] de [scheme.GetName|lV] contra [scheme.GetTargetCharacter.GetShortUIName]: #P +25#!"
 agent_more_likely_join_scheme_reason: "Eventos: $VALUE|=+0$"
