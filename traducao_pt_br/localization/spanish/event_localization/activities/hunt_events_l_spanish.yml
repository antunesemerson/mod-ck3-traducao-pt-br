 hunt_outlawed_falconry_log: "[CHARACTER.GetShortUIName|U] [CHARACTER.LocalPlayerString( 'prohibiste', 'prohibió' )] a cetraria de modo espontâneo"
 hunt_caught_a_duck_log_title: "$tgp_hunt.0002.t$"
 hunt_caught_a_duck_log: "O falcão de [Select_CString( CHARACTER.IsLocalPlayer, 'seu personagem', CHARACTER.GetShortUIName )] pegou um pato"
 hunt_showed_remorse_log_title: "$tgp_hunt.0002.t$"
 hunt_showed_remorse_log: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'sentiste', 'sintió' )] demonstrou remorso durante a caça"
 tgp_hunt.0003.t: "Um fim inesperado"
 tgp_hunt.0003.desc: "Quando voltei ao acampamento, fui informado de notícias muito surpreendentes: [host.GetName] cancelou a caçada, dizendo a todos para se dispersarem imediatamente!\n\nDiz-se que [host.GetName] sentiu um repentino impulso de compaixão [GetReligionByKey('buddhism_religion').GetAdjective] depois que seu falcão matou um pato."
 tgp_hunt.0003.a: "Mas eu estava só começando!"
 tgp_hunt.0003.a.flavor: "Mas… por quê?"
 tgp_hunt.0004.t: "Encontro com uma [activity.GetCurrentPhase.GetLocation.Custom('GetReligiousFigurineName')|l]"
 tgp_hunt.0004.desc_common: "Enquanto procurava um exemplar de [activity.Custom('GetAnimalType')], encontrei uma [activity.GetCurrentPhase.GetLocation.Custom('GetReligiousFigurineName')|l], situada sobre uma pedra perto da trilha.\n\n"
 tgp_hunt.0004.desc_true: "$tgp_hunt.0004.desc_common$Uma oportunidade excelente para venerar a [ROOT.Char.Custom('GetAppropriateGodname')]."
 tgp_hunt.0004.desc_astray: "$tgp_hunt.0004.desc_common$Imagino que os habitantes locais veneram [local_faith.HighGodName]!"
 tgp_hunt.0004.desc_evil_hostile: "$tgp_hunt.0004.desc_common$Este vil símbolo do [local_faith.GetName|l] local me desafia abertamente."
 tgp_hunt.0004.a: "Há coisas mais importantes a tratar."
 tgp_hunt.0004.a.flavor: "Talvez em outra ocasião."
 tgp_hunt.0004.b: "Rezar diante da estátua."
 tgp_hunt.0004.b.flavor: "Paz de espírito."
 tgp_hunt.0004.c: "As crenças dos [local_faith.GetAdherentNamePluralNoTooltip] concordam com as nossas, os [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip]."
 tgp_hunt.0004.c.flavor: "$tgp_hunt.0004.b.flavor$"
 tgp_hunt.0004.d: "A fé [local_faith.GetAdjectiveNoTooltip] ainda está perdida."
 tgp_hunt.0004.d.flavor: "Preciso acabar com esta coisa!"
 tgp_hunt.0004.e: "Eles devem venerar a [ROOT.Char.GetFaith.HighGodName]!"
 tgp_hunt.0004.e.flavor: "$tgp_hunt.0004.d.flavor$"
 hunt_went_past_a_religious_figure_log_title: "$tgp_hunt.0004.t$"
 hunt_went_past_a_religious_figure_log: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'pasaste', 'pasó' )] passou por uma estatueta religiosa"
 hunt_prayed_at_a_statue_log_title: "$tgp_hunt.0004.t$"
 hunt_prayed_at_a_statue_log: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'rezaste', 'rezó' )] a uma [activity.GetCurrentPhase.GetLocation.Custom('GetReligiousFigurineName')|l]"
 hunt_desecrated_a_statue_log_title: "$tgp_hunt.0004.t$"
 hunt_desecrated_a_statue_log: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'profanaste', 'profanó' )] uma [activity.GetCurrentPhase.GetLocation.Custom('GetReligiousFigurineName')|l]"
 tgp_hunt.0004.b.success: "Você profana a estátua sem ser notado"
 tgp_hunt.0004.b.failure: "Os moradores locais te flagraram profanando a estatueta"
 jizo_statue: "Estátua de Jizō"
 religious_statuette: "Estatueta religiosa"
 tgp_hunt.0005.t: "Entre os arrozais"
 tgp_hunt.0005.desc: "Enquanto perseguimos um esquivo exemplar de [activity.Custom('GetAnimalType')] nossa perseguição é abruptamente interrompida quando o animal se refugia em um denso arrozal. A comitiva de caça inteira nos alcança e vasculhamos o arrozal em busca de movimento, mas não há sinal algum do exemplar de [activity.Custom('GetAnimalType')]!\n\nNão podemos ser vencidos por um simples arrozal!"
 tgp_hunt.0005.success: "O exemplar de [activity.Custom('GetAnimalType')]"
 tgp_hunt.0005.failure: "Não há sinal do exemplar de [activity.Custom('GetAnimalType')]"
 tgp_hunt.0005.a: "Talvez eu tenha uma manobra em mente."
 tgp_hunt.0005.b: "Coloque fogo nisso para expulsar o animal!"
 tgp_hunt.0005.c: "Talvez [target_character.GetFirstNameNoTooltip] tenha uma ideia?"
 tgp_hunt.0005.d: "Todos aos seus postos! Vamos esperar para ver."
 tgp_hunt.0006.t: "O poema de um caçador"
 tgp_hunt.0006.desc: "Quando retorno ao acampamento, vejo [poet.GetName] olhando para a distância, absort[poet.Custom('ES_OA')] em seus pensamentos. Ao me aproximar, sai de seu devaneio.\n\n\"Fico contente em vê-lo(a), [poet.Custom2('RelationToMe', SCOPE.sC('host'))] min[host.Custom('ES_OA')]! Eu esperava escrever um poema sobre esta caça empolgante, mas simplesmente não consigo decidir um tema.\""
 tgp_hunt.0006.a: "\"Considere o encanto tranquilizador da natureza local\"."
 tgp_hunt.0006.b: "\"Ora, sobre minha bravura, é claro!\""
 tgp_hunt.0006.c: "\"Dedicai-o a [seduction_target.GetNameNoTooltip]\"."
 tgp_hunt.0006.d: "\"Escrevei sobre a destreza de caça de [befriend_target.GetShortUINameNoTooltip]!\"."
 tgp_hunt.0006.e: "\"Vou te emprestar meu [ROOT.Char.Custom('WritingInstrument')]!\""
