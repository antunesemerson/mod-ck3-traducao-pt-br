 hunt.1337.t: "O Direito de Caçar"
 hunt.1337.desc: "Não tenho permissão para caçar aqui, nas [host.GetCurrentLocation.Custom('GetTerrainTypePlural')] [barony_holder.Custom('ES_DelDela')] [barony_holder.GetTitledFirstName|l]. Preciso adquirir esse direito, a menos que queira ser considerado [Select_CString(ROOT.Char.IsFemale, 'fora da lei e furtiva', 'fora da lei e furtivo' )].\n\nE é claro que, mesmo que consiga a permissão, não terei direito de abater todos os animais que eu quiser..."
 hunt.1337.a: "Certamente [favor_to_call_in.Custom('ES_ElLa')] [favor_to_call_in.GetTitledFirstNameNoTooltip|l] me permitirá caçar!"
 hunt.1337.b: "Que se dane esses #EMP 'direitos'#!, eu caço onde eu quiser!"
 hunt.1337.c: "Vou comprar os direitos."
 hunt.1337.d: "Bah, vamos voltar para o acampamento..."
 hunt.1337.e: "Ainda bem que já paguei pelos direitos!"
 mpo_hunt.0001.t: "Desde o Berço"
 mpo_hunt.0001.desc: "Avançamos pelo/a [ROOT.Char.GetCurrentLocation.Custom('GetTerrainType')] em busca de nossa presa. Meu/minha [child.Custom('GetDaughterSon')], [child.GetFirstName], demonstrou ser mais resistente do que eu havia pensado, e segura firmemente o arco.\n\n\"Pare\", murmuro ao notar algum movimento na grama. Um pequeno exemplar de [ROOT.Char.Custom('SmallAnimal')] come algumas raízes sem perceber nossa presença."
 mpo_hunt.0001.a: "Essa é minha!"
 mpo_hunt.0001.b: "Você consegue, [child.GetFirstNameNoTooltip]!"
 mpo_hunt.0001.c: "Você pega assim, e então..."
 mpo_hunt.0001.c.tt.crit_success: "[child.GetFirstNameNoTooltip] impressiona a todos"
 mpo_hunt.0001.b.tt.success: "[child.GetFirstNameNoTooltip] consegue pegar o animal"
 mpo_hunt.0001.b.tt.failure: "[child.GetFirstNameNoTooltip] falha"
 mpo_hunt.0001.d: "Deixe-o viver."
 mpo_hunt.0010.t: "Lá do Alto"
 mpo_hunt.0010.desc: "\"… sempre gostei dessa parte da [ROOT.Char.GetCurrentLocation.Custom('GetTerrainType')|l]\", observa [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l] enquanto marchamos [Select_CString(And(ROOT.Char.IsFemale, target.IsFemale), 'juntas', 'juntos')]. \"Meu pai costumava nos trazer aqui para caçar\".\n\nAntes que eu tenha tempo sequer de responder, um exemplar de [ROOT.Char.Custom('GetRegionalEagleType')] mergulha em direção a [target.GetFirstNameNoTooltip], guinchando como um bebê recém-nascido.\n\n\"Socorro!\", grita."
 mpo_hunt.0010.a: "Eu sei como lidar com esses."
 mpo_hunt.0010.b: "Minha hora de brilhar!"
 mpo_hunt.0010.b.tt.success: "Você acerta a ave"
 mpo_hunt.0010.b.tt.failure: "Você se envergonha"
 mpo_hunt.0010.b.tt.crit_failure: "A ave fere você"
 mpo_hunt.0010.c: "\"Atrás de mim, [target.GetFirstNameNoTooltip]!\""
 mpo_hunt.0010.c.tt.success: "[target.GetFirstNameNoTooltip] fica impressionad[target.Custom('ES_OA')]"
 mpo_hunt.0010.d: "Não vale a pena."
 mpo_hunt.0020.t: "O Amor de Mãe"
 mpo_hunt.0020.desc.intro: "\"Está começando a escurecer\", [companion.Custom('ES_ElLa')] [companion.GetTitledFirstName|l] [companion.Custom('quirk_pos_present')]. \"Será melhor encontrar um lugar para…\".\n\nMas sua frase é abruptamente interrompida:"
 mpo_hunt.0020.desc.zud: "uma loba morta jaz sobre a neve, um filhote empurrando a cabeça contra sua barriga sem vida."
 mpo_hunt.0020.desc.normal: "uma loba rosna em nossa direção, seu corpo adulto protegendo um pequeno filhote."
 mpo_hunt.0020.a: "O frio deve ter matado a mãe..."
 mpo_hunt.0020.b: "Precisamos matar a mãe!"
 mpo_hunt.0020.b.tt.success: "Você mata a loba"
 mpo_hunt.0020.b.tt.failure: "A mãe ataca você"
 mpo_hunt.0020.c: "Podemos passar furtivamente por ela..."
 mpo_hunt.0020.c.tt.success: "Você passa furtivamente pela mãe"
 mpo_hunt.0020.d: "Não parem."
 artifact_wolf_pelt_name: "Pele de Loba"
 artifact_wolf_pelt_desc: "Retirada de uma mãe à beira da morte."
 mpo_hunt.0030.t: "Banido"
 mpo_hunt.0030.desc: "Um gemido chama nossa atenção enquanto seguimos adiante. [Select_CString( warrior.IsFemale, 'Uma guerreira ferida', 'Um guerreiro ferido' )] repousa sobre uma pedra, com as roupas rasgadas e a mandíbula inchada.\n\n\"Saudações, ó temível. Meu senhor[other_ruler.Custom('ES_XA')] [other_ruler.Custom('ES_ElLa')] [other_ruler.GetTitledFirstName|l] me baniu de seu domínio. Meus inimigos me armaram uma armadilha e agora devo vagar sem rumo.\""
 mpo_hunt.0030.a: "\"Deve ter havido um motivo para isso.\""
 mpo_hunt.0030.b: "[Select_CString( warrior.IsFemale, 'Uma guerreira', 'Um guerreiro' )] capaz sempre faz falta!"
 mpo_hunt.0030.c: "\"Minha generosidade é bem conhecida.\""
 mpo_hunt.0030.d: "\"Só os fortes sobrevivem.\""
 mpo_hunt.0040.t: "Cavalos Magros como Veados"
 mpo_hunt.0040.desc: "Na implacável [root_location.GetTerrain.GetNameNoTooltip|l] de [root_location.GetName], a perseguição foi longa. Cavalgamos adiante, deixando para trás os cavaleiros mais fracos, os cavalos menos vigorosos... mas agora, até os garanhões fortes estão magros.\n\nNossos nobres animais podem nos levar até o fim desta caçada. Mas, mantendo esse ritmo, voltarão para casa exaustos e despreparados para a batalha."
 mpo_hunt.0040.a: "A presa perseguida lentamente não foge com pressa."
 mpo_hunt.0040.b: "Por algumas bugigangas, os locais pouparão cavalos frescos."
 mpo_hunt.0040.c: "Que os cavalos passem fome! Não podemos falhar."
 mpo_hunt.0040.d: "Reduzam o ritmo."
 mpo_hunt.0050.t: "Caçadores de [root_location.GetNameNoTooltip]"
 mpo_hunt.0050.desc: "Enquanto cavalgamos em busca de nossos batedores, aproxima-se um bando de cavaleiros desconhecidos. São locais. Sobre os dorsos suados dos cavalos, peles brutas estão jogadas.\n\n[hunter.GetFaith.FertilityGodName] infunde vida ao/à [root_location.GetTerrain.GetNameNoTooltip|l]\", diz seu líder [hunter.GetName]. \"Temos nossa presa, mas se estiverem abertos a negociar... talvez possamos ajudar também na sua caçada\"."
 mpo_hunt.0050.a: "[Select_CString(hunter,IsFemale, 'Esta cazadora', 'Este cazador' )] pertence aos meus [ROOT.Char.GetDomicile.GetCulture.GetCollectiveNounNoTooltip]."
 mpo_hunt.0050.b: "Troco cavalos pelos rastros da minha presa."
 mpo_hunt.0050.c: "\"Estamos de caça, forasteiro[hunter.Custom('ES_OA')]. E você carrega peles muito boas!\""
 mpo_hunt.0050.c.flavor: "Suas flechas voam em direção aos caçadores locais, e o grupo deles responde com uma saraivada própria!"
 mpo_hunt.0050.c.tt.success: "Você consegue sua presa"
 mpo_hunt.0050.c.tt.failure: "A pontaria dos estranhos se prova mais precisa"
 mpo_hunt.0050.d: "\"Se quer viver, caçador[hunter.Custom('ES_XA')]…, vá embora\"."
 mpo_lean_horses_hunt_modifier: "Garanhões Magros"
 mpo_lean_horses_hunt_modifier_desc: "Caçadas longas e intensas deixaram muitos dos cavalos deste nômade magros e inapto para a batalha."
 mpo_hunt.0060.t: "Pelo na Grama"
 mpo_hunt.0060.desc: "Algo se move rápido entre os arbustos — depois outra coisa veloz — e mais uma! Corpinhos gordos e de pelo castanho, como pedras amolecidas, correm pela grama.\n\nMeus companheiros de caça estão a cavalo, flechas armadas, prontos a qualquer comando — mas devo dar o comando? As peles de marmota são bens valiosos no comércio, mas o tempo gasto em esfolá-las é tempo que perdemos da caçada..."
 mpo_hunt.0060.a: "Conheço #EMP exatamente#! o mercador para vender essas peles..."
 mpo_hunt.0060.b: "\"#EMP Atirem! Atirem!#! Por uma fortuna em peles!\""
 mpo_hunt.0060.c: "\"Ignorem! #EMP Sigam a presa!#!\""
 tgp_hunt.0002.t: "Não tão diferentes"
 tgp_hunt.0002.desc: "Enquanto perseguia um exemplar de [activity.Custom('GetAnimalType')], dou com um riacho. Ali, entre os juncos, não está minha presa, mas um elegante casal de patos, com seus pescoços entrelaçados em um abraço amoroso.\n\nFico olhando, encantad[ROOT.Char.Custom('ES_OA')] pelos pombinhos, quando de repente, meu falcão se lança sobre eles! Resta apenas um pato, sangue e penas no lugar de seu par. A ave sobrevivente grita com a angústia de um coração partido, batendo as asas desesperadamente, como se quisesse voltar no tempo."
 tgp_hunt.0002.a: "De fato, um espetáculo assombroso."
 tgp_hunt.0002.a.flavor: "Capture o outro também!"
 tgp_hunt.0002.b: "Talvez os animais não sejam tão diferentes de nós."
 tgp_hunt.0002.b.flavor: "Assim é a vida."
 tgp_hunt.0002.c: "Não posso suportar testemunhar cenas tão lamentáveis em meu reino."
 tgp_hunt.0002.c.flavor: "Se a mudança vai acontecer, minha ação será seu catalisador."
 hunt_invalidated_warning_ban_tt: "@warning_icon! #X Você não poderá organizar outra [activity|El] de [GetActivityType( 'activity_hunt' ).GetName|l] pelo restante da vida de [host.GetName]."
