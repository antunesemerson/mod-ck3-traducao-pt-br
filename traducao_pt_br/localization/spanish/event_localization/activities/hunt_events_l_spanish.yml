 tgp_hunt.0007.t: "Uma lebre ao alcance"
 tgp_hunt.0007.desc: "Quando retorno ao acampamento, ouço um grito vindo da vegetação.\n\nOs gritos angustiados revelam uma lebre presa na armadilha de um caçador furtivo. [target_character.GetFirstName] se aproxima e levanta a fera aprisionada, lambendo os lábios…"
 tgp_hunt.0007.a: "O que o caçador furtivo perde, nós ganhamos."
 tgp_hunt.0007.a.flavor: "A caçada está indo muito bem!"
 tgp_hunt.0007.b: "Não merecemos isso! Proponho uma liberação por misericórdia."
 tgp_hunt.0007.b.flavor: "É [target_character.GetFirstNameNoTooltip] um[target_character.Custom('ES_XA')] [target_character.GetWomanMan] de honra?"
 tgp_hunt.0007.b.success: "[target_character.GetFirstName] te dá razão"
 tgp_hunt.0007.b.failure: "[target_character.GetFirstName] demonstra decepção"
