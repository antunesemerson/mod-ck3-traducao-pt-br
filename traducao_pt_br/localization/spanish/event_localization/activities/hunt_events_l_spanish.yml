 tgp_hunt.0010.t: "Grou-coroado-vermelho"
 tgp_hunt.0010.desc_common: "\n\nQuando corríamos para onde o exemplar de [activity.Custom('GetAnimalType')] foi visto pela última vez, avistamos algo muito mais magnífico: uma revoada de grous-de-coroa-vermelha.\n\nEsses símbolos de longevidade e imortalidade me obrigam a refletir…"
 tgp_hunt.0010.desc_master_of_the_hunt: "Enquanto descansava no acampamento, meu mestre da caça vem correndo me contar que foi avistado um exemplar de [activity.Custom('GetAnimalType')] a leste. $tgp_hunt.0010.desc_common$"
 tgp_hunt.0010.desc_fallback: "Quando eu descansava no acampamento, [target_character.GetFirstName] , outr[target_character.Custom('ES_OA')] caçador[target_character.Custom('ES_XA')] vem correndo para me contar que foi avistado um exemplar de [activity.Custom('GetAnimalType')] a leste. $tgp_hunt.0010.desc_common$"
 tgp_hunt.0010.a: "Contemplarei isto."
 tgp_hunt.0010.b: "Bah! Tenho que continuar procurando por esse exemplar de [activity.Custom('GetAnimalType')]."
 tgp_hunt.0010.c: "Vamos ver o quão imortais eles realmente são."
 tgp_hunt.0010.c.success: "Sua flecha acerta a garça"
 tgp_hunt.0010.c.failure: "Seu tiro quase erra"
 tgp_hunt.0010.d: "Isso me dá um impulso de inspiração."
