 tgp_hunt.0009.a.success: "[buddhist_hermit.GetFirstName] fica convencido[buddhist_hermit.Custom('ES_OA')]"
 tgp_hunt.0009.a.failure: "[buddhist_hermit.GetFirstName] descobre seu blefe"
 tgp_hunt.0009.b.success: "O ouro basta para comprar os princípios de [buddhist_hermit.GetFirstName]"
 tgp_hunt.0009.b.failure: "[buddhist_hermit.GetFirstName] mantém suas crenças"
