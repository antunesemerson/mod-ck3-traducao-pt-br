 hunt_released_someones_catch: "Libertou uma presa"
 tgp_hunt.0008.t: "Mudança de estilo de vida"
 tgp_hunt.0008.desc: "Enquanto espreitávamos nossa presa, encontro um[target_character.Custom('ES_XA')] consternad[target_character.Custom('ES_OA')] [target_character.GetName]; seu arco de caça está partido ao meio.\n\nOfereço-me para emprestar-lhe um dos meus, mas ele declara:\n\n\"Renuncio ao sangrento esporte da caça, embora lhe seja grato por ter revelado minha vocação como [Select_CString( target_character.IsFemale, 'monja', 'monje' )]. De agora em diante, em vez de derramar sangue, venerarei a [target_character.GetFaith.HighGodName]."
 tgp_hunt.0008.a: "Tente convencer [target_character.GetFirstNameNoTooltip] a não fazer isso."
 tgp_hunt.0008.a.flavor: "Nada que algumas palavras não possam fazer."
 tgp_hunt.0008.a.success: "Você convence [target_character.GetFirstName] a retornar ao antigo estilo de vida"
 tgp_hunt.0008.a.failure: "[target_character.GetFirstName] continua teimoso"
 tgp_hunt.0008.b: "Essa é a escolha dela."
 tgp_hunt.0008.b.flavor: "Não adianta argumentar com alguém que já decidiu."
 hunt_character_became_a_buddhist_monk_log_title: "$tgp_hunt.0008.t$"
 hunt_character_became_a_buddhist_monk_log: "[target_character.GetShortUIName] se tornou um [Select_CString( target_character.IsFemale, 'monja', 'monje' )] da fé [GetReligionByKey('buddhism_religion').GetAdjective]"
 hunt_character_got_talked_out_of_becoming_monk_log_title: "$tgp_hunt.0008.t$"
 hunt_character_got_talked_out_of_becoming_monk_log: "[CHARACTER.GetShortUIName|U] [CHARACTER.LocalPlayerString( 'convenceu', 'convenceu' )] a [target_character.GetShortUIName] para que não se convertesse em [Select_CString( target_character.IsFemale, 'monja', 'monje' )] da fé [GetReligionByKey('buddhism_religion').GetAdjective]"
 tgp_hunt.0009.t: "[Select_CString( target_character.IsFemale, 'Uma ermitã', 'Um ermitão' )] da fé [GetReligionByKey('buddhism_religion').GetAdjective]"
 tgp_hunt.0009.desc: "Ao perseguir minha presa, me deparo com um[buddhist_hermit.Custom('ES_XA')] asceta que cria falcões.\n\n\"Maravilhem-se com a beleza das minhas aves!\"\n\n\"Deveis ser [Select_CString( buddhist_hermit.IsFemale, 'uma caçadora prodigiosa', 'um caçador prodigioso' )]\", respondo, ansioso para ouvir histórias de suas proezas.\n\n\"Não, de forma alguma. Nunca solto estas aves para matar. Isso vai contra os ensinamentos de [buddhist_hermit.GetFaith.HighGodName].\" É justo impedir o curso natural das coisas?"
 tgp_hunt.0009.a: "Engane [Select_CString( target_character.IsFemale, 'a la ermitaña', 'al ermitaño' )]."
 tgp_hunt.0009.a.flavor: "Não deixarei o falcão voar, confie em mim."
 tgp_hunt.0009.b: "Ofrécele un buen trato."
 tgp_hunt.0009.b.flavor: "Bastante ouro pode convencer qualquer um."
 tgp_hunt.0009.c: "Bah! Vou caçar com outros então."
 tgp_hunt.0009.c.flavor: "Por que perder tempo com [Select_CString( buddhist_hermit.IsFemale, 'uma marginalizada', 'um marginalizado' )]?"
 tgp_hunt.0009.d: "Admiro seus princípios."
 tgp_hunt.0009.d.flavor: "Tais crenças são dignas de admiração."
