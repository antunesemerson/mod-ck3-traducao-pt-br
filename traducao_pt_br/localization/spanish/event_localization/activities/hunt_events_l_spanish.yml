l_spanish:
 hunt.0050.t: "Chamado da Natureza"
 hunt.0050.desc: "Corças, cervos, tocas! A caçada oferece muito para aprender e desfrutar; domínio da natureza, camaradagem e rituais, e é claro, a emoção!\n\nMuitos já se dedicaram a essas nobres, embora sangrentas, atividades antes de mim. Estou começando a entender porquê..."
 hunt.0050.a: "Mal posso esperar pela próxima!"
 hunt.0050.b: "Apenas uma distração trivial..."
 #Maintenance Events
 hunt.0080.t: "Conclusão Prematura"
 hunt.0080.t.inheritor: "Vítima da Natureza"
 hunt.0080.imprisoned_self: "Bem trancad[ROOT.Char.Custom('ES_OA')] por [ROOT.Char.GetImprisonedBy.GetTitledFirstName|l], parece que minha caçada está praticamente encerrada…"
 hunt.0080.imprisoned: "Com [host.GetTitledFirstName|l] aprisionad[host.Custom('ES_OA')] a salvo por [ROOT.Char.GetImprisonedBy.GetTitledFirstName|l], parece que teremos de voltar para casa de mãos vazias…"
 hunt.0080.wounded_self: "Devido aos meus ferimentos, foi decidido encerrar a caçada e o grupo retornar para casa."
 hunt.0080.wounded: "Devido aos ferimentos sofridos por [invalidated_flavor.Custom('ES_ElLa')] [invalidated_flavor.GetTitledFirstName|l], decidiu-se cancelar a caçada e o grupo voltará para casa."
 hunt.0080.assassination: "O dia vai bem até que [invalidated_flavor.Custom('ES_ElLa')] [invalidated_flavor.GetTitledFirstName|l] insiste de repente em que suspendamos a caçada, alegando que teme por sua vida depois de ter escapado por pouco da morte. Abundam os rumores de uma tentativa de assassinato."
 hunt.0080.abduction_attempt: "À medida que o grupo se aproximava da caça, os gritos agudos de um[invalidated_flavor.Custom('ES_XA')] [invalidated_flavor.GetWomanMan] superaram até mesmo os latidos incessantes do cão.\n\nUm[invalidated_flavor.Custom('ES_XA')] desgrenhad[invalidated_flavor.Custom('ES_OA')] [invalidated_flavor.GetTitledFirstName|l] saiu correndo por [ROOT.Char.GetCurrentLocation.Custom('GetProvinceFoliageDesc')] pedindo ajuda, gritando que alguém tinha tentado sequestrar[invalidated_flavor.GetHerHim]!\n\n"
 hunt.0080.abduction: "A caça parecia estar indo bem, até que alguém percebeu que [invalidated_flavor.Custom('ES_ElLa')] [invalidated_flavor.GetTitledFirstName|l] já não estava com o grupo e não podia ser encontrado.\n\nEnquanto rastreávamos tais [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')], encontramos sinais de luta em [ROOT.Char.GetCurrentLocation.Custom('GetProvinceGroundDesc')]."
 hunt.0080.assassination_culprit: "Estamos quase sobre nossa presa quando um[invalidated_flavor.Custom('ES_XA')] [invalidated_flavor.GetTitledFirstName|l] de aspecto terrível irrompe em vista; sua ausência tinha passado despercebida até agora.\n\nEntre arfadas, [invalidated_flavor.GetSheHe] afirma ter escapado por um triz de uma tentativa contra sua vida! Ainda mais chocante é o alvo de sua acusação: [invalidated_culprit.Custom('ES_ElLa')] [invalidated_culprit.GetTitledFirstName|l]!\n\nE [invalidated_culprit.GetSheHe] não aparece em lugar nenhum; ao que parece, fugiu da cena…"
 hunt.0080.abduction_attempt_culprit: "\n\n[invalidated_flavor.GetSheHe|U] causou espanto ao apontar [invalidated_culprit.Custom('ES_AlAla')] [invalidated_culprit.GetTitledFirstName|l], mas o desaparecimento repentino de est[invalidated_culprit.Custom('ES_EA')] só reforça as acusações…"
 hunt.0080.abduction_culprit: "\n\nCom [invalidated_culprit.Custom('ES_ElLa')] [invalidated_culprit.GetTitledFirstName|l] também estranhamente ausente, certas conclusões naturalmente foram tiradas apressadamente..."
 hunt.0080.death_inheritor: "Acabei de ser informado de que [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] morreu! Parece que [host.GetSheHe] [host.GetDeathReason] enquanto caçava."
 hunt.0080.death_inheritor_killer: "Ao menos é[host.Custom('ES_EA')] [host.Custom2('InsultNoun', ROOT.Char)] esse(a) miserável [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l] já não está mais entre nós, e por minha própria mão."
 hunt.0080.death: "Com a trágica morte [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l], que [invalidated_flavor.GetDeathReasonHideKiller] , decidiu-se cancelar a caçada e que o grupo volte para casa."
 hunt.0080.desc_inheritor: "\n\nComo nov[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip] de [ROOT.Char.GetPrimaryTitle.GetNameNoTier], há muito o que organizar após esta reviravolta imprevista dos acontecimentos…"
 hunt.0080.desc: "\n\nTeremos apenas que esperar pela próxima..."
 hunt.0080.a: "É um passatempo perigoso."
 hunt.0080.b: "Eu quero a cabeça dessa besta para pendurar na minha parede!"
 hunt.0081.t: "Mudança de Planos"
 hunt.0081.sick: "Nas minhas condições atuais, talvez seja melhor eu voltar para casa, para minha lareira e minha cama quente."
 hunt.0081.wounded: "A dor torna difícil cavalgar, e me esforçar nessa condição certamente será sentido."
 hunt.0081.host: "\n\nNão quero decepcionar todos, mas é preciso pensar na saúde..."
 hunt.0081.guest: "\n\nSeria uma pena perder o resto da caçada [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l], mas vale o risco?"
 hunt.0081.a: "Creio que já fiz o suficiente."
 hunt.0081.b: "Estarei bem..."
 hunt.0082.t: "Interrompido"
 hunt.0082.a: "Terrível!"
 hunt_wounded_guest_leaves_toast: "Convidado Ferido"
 #Invitation Events
 hunt.0100.opening_desc: "Convido-vos por meio desta a uma grande caçada em [barony.GetNameNoTier]!"
 hunt.0101.desc: "Por meio desta, convido-o para uma caçada em [barony.GetNameNoTier]! Será um evento grandioso, digno de sua honrosa presença."
 hunt.0102.desc: "Por meio desta, convido-o para uma caçada em [barony.GetNameNoTier]! Será um evento grandioso, com ótimo esporte e companhia."
 hunt.0110.t: "Uma Participação Desanimadora"
 hunt.0110.desc: "Não posso acreditar. Apesar dos meus convites e preparativos, nem um único convidado apareceu para a minha caçada.\n\nNão importa! Vou aproveitar o evento por conta própria; ainda mais glória para mim!"
 hunt.0120.desc: "Não sei por que aceitou meu convite se no final você foi à caça [other_host.Custom('ES_DelDela')] [other_host.GetTitledFirstName|l], mas vou me lembrar disso."
 #Start Events
 hunt.0500.t.sighting: "Rastreando [activity.Custom('GetAnimalType')|l]"
 hunt.0500.t.boar: "Javali Poderoso"
 hunt.0500.t.hart: "Presas Nobres"
 hunt.0500.t.large: "Boas Perspectivas"
 hunt.0500.t.small: "Escolhas Limitadas"
 hunt_start_tt: "[host.GetShortUIName|U] vai buscar #V [activity.Custom('GetAnimalType')]#!"
 hunt_opening_master_of_hunt: "[hunt_participant.GetTitledFirstName|U], [ROOT.Char.Custom('GetHuntMasterDesc')] de [host.LocalPlayerString( 'sua corte', host.GetShortUINameNoFormat )], convoca o grupo assim que a luz alcança"
 hunt_opening_hunt_leader: "[hunt_participant.Custom('ES_ElLa')|U] [hunt_participant.GetTitledFirstName|l] reúne o grupo quando o sol nasce sobre"
 hunt_opening: "O grupo é convocado para se reunir ao amanhecer em"
 hunt_opening_rural: "o acampamento nas [host.GetCurrentLocation.Custom('GetTerrainTypePlural')] perto de [host.GetCurrentLocation.GetNameNoTooltip]."
 hunt_opening_hunting_grounds: "os terrenos de caça situados nas [host.GetCurrentLocation.Custom('GetTerrainTypePlural')] da [activity.GetCurrentPhase.GetLocation.GetTitle.GetBaseNameNoTierNoTooltip]."
 hunt_opening_royal_reserves: "as reservas reais entre as [host.GetCurrentLocation.Custom('GetTerrainTypePlural')] da [activity.GetCurrentPhase.GetLocation.GetTitle.GetBaseNameNoTierNoTooltip]."
 hunt_opening_entourage_few: "Após reunir informações com os poucos guardas de caça locais, há algumas informações sobre pegadas e indícios nas proximidades."
 hunt_opening_entourage_normal: "Os guardas de caça locais vasculharam a área em busca de pegadas e indícios recentes."
 hunt_opening_entourage_many: "Meus numerosos guardas de caça e batidores têm vasculhado a área em busca de pegadas e indícios."
 hunt.0500.boar: "Há claramente um javali robusto na região - um jogo perigoso, mas valioso."
 hunt.0500.hart: "Parece que há um cervo poderoso inquestionavelmente na região - uma presa digna de um rei!"
 hunt.0500.roe: "Há claramente um pequeno macho de [activity.Custom('GetAnimalType')] por perto, mas nenhum rastro recente de caça maior."
 hunt.0500.buck: "Há definitivamente um veado robusto na região, e as condições dificilmente poderiam ser melhores para caçá-lo!"
 hunt.0500.bison: "Há um rebanho de [activity.Custom('GetAnimalType')] s por perto, e entre eles há um poderoso macho!"
 hunt.0500.no_bison: "Me dizem que não há sinais de um veado ou de uma manada de bisões por perto, embora os terrenos #EMP son#! sejam adequados para uma caçada de [activity.Custom('GetAnimalType')] s."
 hunt.0500.no_deer: "Embora tristemente não haja sinal de um veado na região, evidentemente há muitos [activity.Custom('GetAnimalPlural')]."
 hunt.0500.desc_prestigious: "\n\n[hunt_participant.GetFirstNameNoTooltip] sorri. \"Temos uma grande caçada pela frente!\"."
 hunt.0500.desc_large: "\n\n[hunt_participant.GetFirstNameNoTooltip] sorri amplamente. \"Vai ser uma diversão e tanto!\"."
 hunt.0500.desc_small: "\n\n[hunt_participant.GetFirstNameNoTooltip] dá de ombros. \"Não importa, um/a [activity.Custom('GetAnimalType')] de aparência [activity.Custom('GetAnimalAdjective')] ainda pode ser uma presa muito divertida!\"."
 hunt_opening_sighting: "\n\nVamos ver se os rumores são verdadeiros..."
 hunt.0500.guest: "\n\nNo final, [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] hoje quis caçar um/a [activity.Custom('GetAnimalType')]."
 hunt.0500.a: "Vamos lá!"
 hunt.0500.b: "Prefiro espantar uma raposa."
 hunt.0500.c: "Vamos cercar uma lebre astuta."
 hunt.0500.d: "Vim caçar [host.Custom('GetRegionalDeerType')]!"
 hunt.0500.f: "Quero caçar algo com energia!"
 hunt.0510.t: "O/A [activity.Custom('GetAnimalType')] de pelo [activity.Custom('GetLegendaryColor')]"
 hunt.0510.desc: "\n\nNão encontraram nada, mas eu sinto: a criatura esquiva está lá fora, em algum lugar por perto…"
 hunt.0510.a: "A besta será minha!"
 hunt.0520.t.sighting: "[activity.Custom('GetAnimalType')] Problemático"
 hunt.0520.t.tiger: "Felis Horribilis"
 hunt.0520.t.lion: "Ouro de Cabelo"
 hunt.0520.t.leopard: "Presa Manchada"
 hunt.0520.t.lynx: "Presa Elegante"
 hunt.0520.t.bear: "Orientando-nos"
 hunt.0520.t.hyena: "Quem Está Rindo Agora?"
 hunt.0520.t.wolf: "Matilha de Pestes"
 hunt.0520.b: "Traga [ROOT.Char.Custom('GetAnimalTypeCaptive')]! Vamos caçar!"
 hunt.0520.c: "Certamente há alguns [ROOT.Char.Custom('GetRegionalWolfPlural')] por aqui."
 hunt.0530.t.sighting: "Perseguindo [activity.Custom('GetAnimalPlural')]"
 hunt.0530.t.rare: "Aves Exóticas"
 hunt.0530.t.common: "Pelos Ares"
 hunt.0530.b: "Acho que [activity.Custom('GetAnimalTypeWaterfowl')] será suficiente."
 hunt.0530.c: "Sempre há [activity.Custom('GetAnimalTypeGamebird')] para capturar."
 hunt.0530.d: "Gostaria de ver meu [activity.Custom('GetRaptorType')] pegar uma lebre."
 hunt_opening_falconry_sighting: "\n\nEsperemos que os relatos possam ser confiáveis."
 hunt_opening_falconry: "Com um pouco de sorte encontraremos um/a [activity.Custom('GetAnimalGroup')] de [activity.Custom('GetAnimalPlural')] para a diversão de nossos exemplares de [activity.Custom('GetRaptorPlural')]."
 hunt_opening_entourage_few_falconry: "\n\nOs poucos batidores que trouxemos estão prontos com seus cães e já encontraram uma rota adequada."
 hunt_opening_entourage_normal_falconry: "\n\nAs equipes de batidores estão prontas com seus cães, e um local bem escolhido foi selecionado."
 hunt_opening_entourage_many_falconry: "\n\nMeus batidores não terão problemas em fazer as aves saírem do esconderijo e já observaram alguns lugares propícios."
 hunt_opening_standard_sighting: "\n\nMeus homens têm reunido avistamentos de [activity.Custom('GetAnimalType')] que vagam pela região local."
 hunt_opening_dangerous_sighting: "\n\nMeus homens têm reunido avistamentos de um exemplar de [activity.Custom('GetAnimalType')] que aterroriza esta área."
 hunt_opening_dangerous: "\n\nAcontece que [activity.Custom('GetAnimalType')] desavergonhado tem aterrorizado a área local ultimamente."
 hunt.0520.cat: "Já causou a morte de várias pessoas da região e fica mais audacioso(a) a cada dia que é permitido vagar livremente."
 hunt.0520.bear: "Ele ronda as [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTreePlural')], roubando animais de fazendas próximas e aterrorizando os que colhem."
 hunt.0520.wolf: "Tal [activity.Custom('GetAnimalGroup')] é uma praga, vasculhando as fazendas e se retirando para o mais profundo dos/as [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTreePlural')]."
 hunt_opening_entourage_few_dangerous: "Pode ser complicado com tão poucos, mas com sorte encontraremos a fera e acabaremos com seu reinado de terror."
 hunt_opening_entourage_normal_dangerous: "#EMP Deveríamos#! ser suficientes para encontrar e encurralar a fera sem muitos problemas."
 hunt_opening_entourage_many_dangerous: "Temos muitos pares de olhos, sem mencionar lanças — o reinado de terror da fera acaba hoje!"
 hunt.0520.a: "Não há tempo a perder."
 hunt_header: "[ROOT.Char.Custom('HuntHeader')]:"
 hunt.1001.t: "Encurralando [activity.Custom('GetAnimalType')]"
 hunt.1001.desc_opening_courtier: "Meu [ROOT.Char.Custom2('RelationToMeShort', hunt_participant)], [hunt_participant.Custom('ES_ElLa')] [hunt_participant.GetTitledFirstName|l], é quem primeiro avista seu/s [activity.Custom('GetAnimalFeature')]."
 hunt.1001.desc_opening: "Olhando para a paisagem, faço uma pausa repentina. Lá está, [activity.Custom('GetAnimalFeature')] e tudo mais!"
 hunt.1001.desc_opening_courtier_plural: "Meu [ROOT.Char.Custom2('RelationToMeShort', hunt_participant)], [hunt_participant.Custom('ES_ElLa')] [hunt_participant.GetTitledFirstName|l], é quem primeiro avista o(a) [activity.Custom('GetAnimalGroup')]."
 hunt.1001.desc_opening_plural: "Olhando para a paisagem, faço uma pausa repentina. Lá está, [activity.Custom('GetAnimalGroup')]!"
 hunt.1001.bison: "\n\nColocando cuidadosamente o grupo em posição, descemos sobre as feras que não param de [activity.Custom('GetAnimalSoundParticiple')], separando um digno [activity.Custom('GetAnimalMale')] do grupo tomado pelo pânico.\n\n"
 hunt.1001.desc: "\n\nO [activity.Custom('GetAnimalMale')] [activity.Custom('GetAnimalAdjective')] é difícil de distinguir, mas não há dúvida de que está ali, nos observando através de [host.GetCurrentLocation.Custom('GetProvinceFoliageDesc')].\n\n"
 hunt.1001.closing_chase: "[host.GetTitledFirstName|U] parte atrás da fera, gritando: 'Vamos, ela está escapando!'"
 hunt.1001.closing_ambush: "[host.GetTitledFirstName|U] pensa por um momento, antes de fazer um gesto para a esquerda: 'Vamos, vamos cortar o caminho dela!'"
 hunt.1001.closing_herd: "Nos reunimos entre [activity.Custom('GetAnimalType')] solitário e [activity.Custom('GetAnimalGroup')] em fuga. Agora começa a verdadeira perseguição!"
 hunt.1001.closing: "Ele(a) trava os olhos comigo e — quase como se o animal sentisse minha intenção — de repente dispara em um flash de pelo [activity.Custom('GetAnimalColor')]."
 hunt.1001.desc_opening_courtier_dangerous: "Meu [ROOT.Char.Custom2('RelationToMeShort', hunt_participant)]. [hunt_participant.Custom('ES_ElLa')] [hunt_participant.GetTitledFirstName|l] enxerga o espécime de [activity.Custom('GetAnimalType')] observando-nos de longe, o corpo tenso, pronto para disparar."
 hunt.1001.desc_opening_dangerous: "Observando a [host.GetCurrentLocation.Custom('GetTerrainType')], de repente o vejo, como se estivesse lá o tempo todo: [activity.Custom('GetAnimalType')]!"
 hunt.1001.desc_opening_courtier_plural_dangerous: "Meu [ROOT.Char.Custom2('RelationToMeShort', hunt_participant)], [hunt_participant.Custom('ES_ElLa')] [hunt_participant.GetTitledFirstName|l], faz um sinal do outro lado de [host.GetCurrentLocation.Custom('GetTerrainType')] — o grupo [activity.Custom('GetAnimalGroup')] de [activity.Custom('GetAnimalType')] se agacha em uma depressão não muito longe."
 hunt.1001.desc_opening_plural_dangerous: "Observando a [host.GetCurrentLocation.Custom('GetTerrainType')], de repente os vejo, como se estivessem lá o tempo todo: [activity.Custom('GetAnimalGroup')]!"
 hunt.1001.wolf: "\n\nAs feras disparam ao nos aproximarmos, soando o alarme enquanto recuam para [host.GetCurrentLocation.Custom('GetProvinceFoliageDesc')], mostrando suas [activity.Custom('GetAnimalDanger')].\n\n"
 hunt.1001.desc_dangerous: "\n\nA besta de aparência [activity.Custom('GetAnimalAdjective')] é um espetáculo para se ver. Os cavalos ficam assustadiços quando avistam seu/s [activity.Custom('GetAnimalFeature')] entre [host.GetCurrentLocation.Custom('GetProvinceFoliageDesc')].\n\n"
 hunt.1001.closing_plural_dangerous: "Perseguimos os vermes [activity.Custom('GetAnimalColor')] em fuga, focando no maior do grupo. Agora começa a verdadeira perseguição!"
 hunt.1001.closing_dangerous: "Sem aviso, ele(a) se [activity.Custom('GetAnimalChargePresent')] em um flash de pelo [activity.Custom('GetAnimalColor')], desaparecendo atrás de uma elevação!"
 hunt.1001.a: "Após ele(a)! Vamos montar!"
 hunt.1001.a.flavor_1: "#EMP Tally-ho!#!"
 hunt.1001.a.flavor_2: "#EMP Hark away!#!"
 hunt.1001.a.flavor_3: "#EMP Halloo!#!"
 hunt.1001.a.flavor_4: "#EMP Avaunt!#!"
 hunt.1001.a.tt: "Um acidente será mais provável de ocorrer"
 hunt.1001.b: "Com calma! Cuidado com o(a) [host.GetCurrentLocation.Custom('GetRandomRegionalDanger')]!"
 hunt.1001.b.flavor: "#EMP Segurança em primeiro lugar!#!"
 hunt.1001.c: "Por aqui, vamos encurralá-lo(a)!"
 hunt.1001.c.flavor: "#EMP Caçadores, levem-no em direção à nossa linha de arco!#!"
 hunt.1001.d: "Vamos lá!"
 hunt.1002.desc: "Meu mundo se reduz à natureza ao nosso redor enquanto seguimos os cães por terreno acidentado no rastro do exemplar de [activity.Custom('GetAnimalType')] em fuga.\n\n"
 hunt.1002.courtier: "Ao cavalgar lado a lado com [hunt_participant.Custom('ES_AlAla')] [hunt_participant.GetTitledFirstName|l], só ouço o ribombar dos cascos, o latido dos cães, os gritos dos homens…\n\nA emoção corre por mim enquanto, aos poucos, vamos ganhando terreno para a nossa presa!"
 hunt.1002.alone: "Avançando em alta velocidade pela trilha, tudo o que ouço é o estrondo dos cascos, latidos dos cães, homens gritando...\n\nA excitação me percorre enquanto nos aproximamos lentamente da nossa presa!"
 hunt.1002.a: "Vamos, [hunt_participant.GetFirstNameNoTooltip], mais rápido!"
 hunt.1002.a.alone: "Tão perto, quase te alcanço!"
 hunt.1003.desc: "Após horas de cavalgada, finalmente estamos encurralando a astuta fera — nossa perseguição não foi em vão!\n\n"
 hunt.1003.bay: "O animal exausto e em pânico se encontra encurralado, lutando para ficar em pé e [activity.Custom('GetAnimalSoundParticiple')] em desespero."
 hunt.1003.dogs: "O cansado [activity.Custom('GetAnimalMale')] está esgotado: já foi mordido por um cão, agachando-se em terror enquanto os cães se aproximam, contidos pelos tratadores."
 hunt.1003.dangerous: "Seja por cansaço ou desafio, [activity.Custom('GetAnimalType')] finalmente para, vira-se para nós e solta um poderoso [activity.Custom('GetAnimalSound')]."
 hunt.1003.injured: "\n\n![wounded_courtier.GetTitledFirstName|U] ficará furioso[wounded_courtier.Custom('ES_OA')] por ter perdido isso!"
 hunt.1003.bison: "\n\nEnfrentar-se a um exemplar tão formidável de [activity.Custom('GetAnimalType')], especialmente um com tão violento [activity.Custom('GetAnimalStrikeParticiple')], é suficiente para evocar terror até mesmo em [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetWomanMan] mais valente, mas os cães e os caçadores o cercam como convém."
 hunt.1003.boar: "\n\nO imponente exemplar de [activity.Custom('GetAnimalType')] solta um grito terrível, com as presas afiadas prontas para despedaçar em dois qualquer um que se aproxime, enquanto é cercado por cães e caçadores indecisos."
 hunt.1003.hart: "\n\nO poderoso exemplar de [activity.Custom('GetAnimalType')] ao não parar de [activity.Custom('GetAnimalSoundParticiple')] enquanto cães e lanças o cercam."
 hunt.1003.deer: "\n\nO ar ressoa com o som dos chifres, latidos dos cães e os gritos da comitiva enquanto o círculo se fecha ao redor do [activity.Custom('GetAnimalMale')] desafiante."
 hunt.1003.fox: "\n\nO assustado exemplar de [activity.Custom('GetAnimalType')] se dá conta de que é impossível escapar, enquanto os cães de caça e caçadores se posicionam ao seu redor."
 hunt.1003.hare: "\n\nEle nos deu, especialmente aos cães, uma perseguição incrível, correndo, saltando e se escondendo entre cada buraco e arbusto do(a) [host.GetCurrentLocation.Custom('GetTerrainType')] — mas o pegamos no final!"
 hunt.1003.claws: "\n\nOs caçadores o cercam timidamente com suas lanças enquanto ele ataca com suas garras mortais."
 hunt.1003.fangs: "\n\nOs caçadores cercam rapidamente o animal rosnando, que me encara com presas à mostra, espumando e pingando saliva."
 hunt.1003.a: "Vou atirar nele."
 hunt.1003.a.small: "Aguarde! Quero praticar minha mira."
 hunt.1003.a.flavor: "$hunt.1012.a.tt$"
 hunt.1003.b: "Vou derrubá-lo eu mesmo!"
 hunt.1003.b.small: "Eu o finalizo."
 hunt.1003.b.flavor: "#EMP Tome isso, brutamontes!#!"
 hunt.1003.c: "[hunt_participant.GetFirstNameNoTooltip], o tiro é seu."
 hunt.1003.d: "[ROOT.Char.Custom2('RelationToMeShort', hunt_participant)|U], vamos ver você matá-lo!"
 hunt.1003.d.good: "Dou a [intentee.GetFirstNameNoTooltip] a honra."
 hunt.1003.d.bad: "[intentee.GetFirstNameNoTooltip]! Ele é todo seu!"
 hunt.1003.d.small: "Tenha cuidado com este, [ROOT.Char.Custom2('RelationToMe', hunt_participant)]!"
 hunt.1003.e: "Lanças prontas! Avançar!"
 hunt.1003.e.flavor: "#EMP Dois à esquerda, dois à direita!#!"
 hunt.1003.f: "Soltem os cães!"
 hunt.1003.f.flavor: "#EMP Eles mereceram!#!"
 hunt.1003.f.success: "Os cães o derrubam"
 hunt.1003.f.killed: "… mas são destroçados"
 hunt.1003.g: "Parem! Libertem o pobre animal."
 hunt.1003.g.flavor: "#EMP Nós o caçamos, não há necessidade de derramar seu sangue...#!"
 hunt.1003.h: "Avancem, caçadores, matem-no!"
 hunt.1003.h.flavor: "#EMP Eu... garantirei que ele não passe por vocês...#!"
 hunt.1003.i: "Rápido [murder_target.GetFirstNameNoTooltip], comigo, antes que ele escape!"
 hunt.1003.i.flavor: "#EMP Seria uma pena se minha lança escapasse...#!"
 hunt.1003.j: "Eu o quero #EMP vivo#!!"
 hunt.1004.desc: "Mal conseguimos acompanhar a maldita fera enquanto ela ziguezagueia pelo(a) [host.GetCurrentLocation.Custom('GetProvinceFoliageDesc')], [activity.Custom('GetAnimalSoundParticiple')] descontroladamente.\n\nEscalando um declive e desaparecendo em um denso arbusto, [activity.Custom('GetAnimalType')] some tão rapidamente quanto apareceu, deixando apenas cães ofegantes e cavalos suados."
 hunt.1004.wounded: "\n\n\"Talvez não tenha sido sábio esperar [hunt_participant.Custom('ES_AlAla')] [hunt_participant.GetTitledFirstName|l]…\"."
 hunt.1004.wounded_host: "\n\nQue maldita s- *argh* sorte... Talvez eu devesse ter voltado para o acampamento..."
 hunt.1004.a: "A maldita coisa sumiu!"
 hunt.1004.a.tt: "Aguarde só!"
 hunt.1004.b: "[wounded_guest.GetFirstNameNoTooltip] nos atrasou, o tolo!"
 hunt.1005.t: "Uma Lança para [murder_target.GetFirstNameNoTooltip]"
 hunt.1005.opening: "Cercamos o exemplar de [activity.Custom('GetAnimalType')] com seu [activity.Custom('GetAnimalSoundParticiple')] com as lanças em riste, mas continuo com a vista fixa em meu [ROOT.Char.Custom2('RelationToMe', murder_target)] [murder_target.GetFirstName], esperando uma oportunidade…\n\n"
 hunt.1005.opportunity: "Quando o(a) [activity.Custom('GetAnimalMale')] assustado de repente [activity.Custom('GetAnimalStrikePresent')],"
 hunt.1005.desc: "Caio habilmente sobre [ROOT.Char.GetCurrentLocation.Custom('GetProvinceGroundDesc')], minha lança \"fora de controle\" corta a garganta de [murder_target.GetFirstNameNoTooltip] rápido demais para desviar, quase até para ver.\n\nA comitiva para de repente enquanto [murder_target.GetFirstNameNoTooltip] aperta a ferida, em choque[murder_target.Custom('ES_OA')]. \"Socorro!\", grito. \"\"[murder_target.GetFirstNameNoTooltip] está ferid[murder_target.Custom('ES_OA')]!\", antes de me colocar entre [murder_target.GetSheHe] e o exemplar de [activity.Custom('GetAnimalType')].\n\nQuando a poeira baixa, todos estão convencidos de que não passou de um trágico acidente…"
 hunt.1005.a: "#EMP Como#! isso pôde acontecer...?"
 hunt.1006.desc: "Me livro convincentemente para o lado, saindo do caminho dele, e lanço a lança uivando bem no flanco de [murder_target.GetFirstName]!\n\nEmbora não seja tão mortal quanto eu esperava, com um pouco de sorte esse ferimento cobrará seu preço. Damos cabo do [activity.Custom('GetAnimalMale')] enquanto o [murder_target.GetHerHim] levam…"
 hunt.1006.a: "Cachorro[murder_target.Custom('ES_OA')] de sorte! Você deveria estar mort[murder_target.Custom('ES_OA')]!"
 hunt.1006.b: "Desculpe! [participant_to_blame.GetFirstNameNoTooltip] me empurrou!"
 hunt.1006.c: "Fique fora do meu caminho da próxima vez, tolo!"
 hunt.1007.desc: "Finjo perder o equilíbrio e faço minha lança deslizar ao longo de seu flanco enquanto [murder_target.GetSheHe] sente dor.\n\nFica imediatamente claro que eu só [murder_target.GetHerHim] arranhei, mas o olhar chocado e as sobrancelhas levantadas dos outros caçadores exigem uma resposta assim que tivermos abatido o [activity.Custom('GetAnimalMale')]…"
 hunt.1007.a: "Ops! #weak shrug#!"
 hunt.1007.a.success: "[murder_target.GetFirstNameNoTooltip] está desconfiado(a)"
 hunt.1007.a.failure: "[murder_target.GetFirstNameNoTooltip] confia em você"
 hunt.1007.b: "Considere-se sortudo(a) de não ter sido pior."
 hunt.1007.c: "Caramba, vamos ver se você consegue desviar #EMP disso#!, vira-lata!"
 hunt.1007.d: "Sinto muito, [murder_target.GetFirstNameNoTooltip]!"
 hunt.1007.e: "Acho que você não me deve mais nada."
 hunt.1008.desc: "Tento me posicionar de modo que possa desferir uma facada rápida de forma “acidental”, mas [murder_target.GetFirstNameNoTooltip] não fica parado[murder_target.Custom('ES_OA')]…\n\nAntes que eu perceba, a comitiva já feriu mortalmente o [activity.Custom('GetAnimalMale')], e um “acidente” seria ridículo demais para ser crível…"
 hunt.1008.a: "Droga..."
 hunt.1009.desc: "Conforme [activity.Custom('GetAnimalType')] desaparece no(a) [host.GetCurrentLocation.Custom('GetTerrainType')], sei que a caça está perdida."
 hunt.1009.desc_injured: "\n\nÉ lamentável que [hunt_participant.Custom('ES_ElLa')] [hunt_participant.GetTitledFirstName|l] tenha ficado ferid[hunt_participant.Custom('ES_OA')] por causa de tal [activity.Custom('GetAnimalType')] que escapou, mas esses riscos fazem parte da emoção."
 hunt.1009.desc_uninjured: "\n\nDesmontamos para deixar os cavalos descansarem e [hunt_participant.Custom('ES_ElLa')] [hunt_participant.GetTitledFirstName|l] assente com simpatia."
 hunt.1011.t: "Vassalo Rude"
 hunt.1011.desc_horse: "Quando meu [ROOT.Char.Custom2('RelationToMe', nice_courtier)], [nice_courtier.Custom('ES_ElLa')] [nice_courtier.GetTitledFirstName|l], começou a desmontar com as pernas ainda penduradas da sela, meu [ROOT.Char.Custom2('DescriptorNegative', murder_target)] [ROOT.Char.Custom2('RelationToMe', murder_target)], [murder_target.Custom('ES_ElLa')] [murder_target.GetTitledFirstName|l], se encarregou de esbarrar no cavalo de [nice_courtier.GetFirstName] e o(a) fez cair de cara no chão."
 hunt.1011.desc_talk: "Enquanto vagamos em grupo, ouço [murder_target.Custom('ES_AlAla')] [murder_target.GetTitledFirstName|l] atrás de mim, sibilando do alto de sua montaria de caça:\n\n\"Olhem para esse [nice_courtier.Custom2('InsultNoun', SCOPE.sC('murder_target'))] [nice_courtier.Custom2('InsultAdjective', SCOPE.sC('murder_target'))]!\".\n\nE aponta para meu [ROOT.Char.Custom2('RelationToMe', nice_courtier)], [nice_courtier.Custom('ES_ElLa')] [nice_courtier.GetTitledFirstName|l], que parece estar tendo dificuldade para suportar os insultos."
 hunt.1011.a: "Você está agindo como uma criança e será punido como tal."
 hunt.1011.b: "Assim não se comporta um[murder_target.Custom('ES_XA')] [murder_target.GetTitleTierName|l]."
 hunt.1011.c: "Hah, [nice_courtier.GetFirstNameNoTooltip] ficou vermelho(a) como um pimentão!"
 hunt.1012.t: "Uma Flecha para [murder_target.GetFirstNameNoTooltip]"
 hunt.1012.opening: "Arco em punho, passos silenciosos, olhos em [host.GetCurrentLocation.Custom('GetProvinceFoliageDesc')] enquanto espero o exemplar de [activity.Custom('GetAnimalType')]… Respiro fundo e… não é es[murder_target.Custom('ES_EA')] [murder_target.Custom('ES_ElLa')] [murder_target.GetTitledFirstName|l]?\n\n"
 hunt.1012.desc: "Meu [ROOT.Char.Custom2('DescriptorNegative', murder_target)] [ROOT.Char.Custom2('RelationToMe', murder_target)] se agacha entre [host.GetCurrentLocation.Custom('GetProvinceFoliageDesc')] à minha frente, com sua concentração totalmente focada no exemplar de [activity.Custom('GetAnimalMale')] que se aproxima.\n\n"
 hunt.1012.accomplice: "Dou uma olhada em [accomplice.GetFirstName], que assente quase imperceptivelmente, testa franzida de determinação, aguardando meu sinal."
 hunt.1012.alone: "Dou uma olhada ao redor sorrateiramente - essa pode ser a melhor oportunidade que terei..."
 hunt.1012.closing: "O(a) [activity.Custom('GetAnimalMale')] se aproxima, está quase sobre nós..."
 hunt.1012.a: "Que pena eu não ter[murder_target.GetHerHim] visto…"
 hunt.1012.a.accomplice: "Que pena que não [murder_target.GetHerHim] tenhamos visto…"
 hunt.1012.a.tt: "#EMP Pluft!#!"
 hunt.1012.b: "Não, esse não é o momento..."
 hunt.1012.b.flavor: "#EMP Ya le llegará su momento…#!"
 hunt.1013.desc: "\"#EMP Tentei#! intervir, mas quando percebi, o exemplar de [activity.Custom('GetAnimalType')] [murder_target.Custom('ES_LoLa')] havia atropelado. Ao menos [murder_target.Custom('ES_ElElla')] não morreu só.\"\n\nOs outros engolem minha história sobre seu trágico falecimento.\n\n\"Tomara que eu tivesse podido fazer mais...\""
 hunt.1013.a: "Inadmissível! Esta caçada acabou!"
 hunt.1013.b: "Uma tragédia. Agora, onde está [activity.Custom('GetAnimalType')]?"
 hunt.1014.desc: "Quando [murder_target.Custom('ES_ElLa')] [murder_target.GetTitledFirstName|l] sai de [host.GetCurrentLocation.Custom('GetProvinceFoliageDesc')], agarrando um braço ensanguentado, ergo a vista do cantil de água e solto um suspiro muito convincente.\n\n\"#EMP Quem#! ainda precisa aprender que é a #EMP fera que devemos abater#!?!\", grita com raiva enquanto se aproxima."
 hunt.1014.a: "Nesse caso, foi um acerto perfeito, não foi?"
 hunt.1014.all_honorable_hunt_participants: "Participantes honrados de [activity.GetName|l] :"
 hunt.1014.all_who_dislike_or_are_evil: "Todos os participantes de [activity.GetShortName|l] que não gostam de [murder_target.GetFirstNameNoTooltip] ou apreciam o sofrimento:"
 hunt.1014.b: "Não foi [participant_to_blame.GetFirstNameNoTooltip] que estava logo atrás de você...?"
 hunt.1014.c: "Você quer colocar sua própria falta de jeito na nossa conta?"
 hunt.1015.desc: "\"[ROOT.Char.GetTitledFirstNameNoTooltip]?! Argh! É você, [ROOT.Char.Custom('FormOfAddressForLiege')]?\".\n\nO olhar arregalado [hated_participant.Custom('ES_DelDela')] [hated_participant.GetTitledFirstName|l] vai do arco na minha mão até a flecha cravada em seu braço.\n\n\"No que vocês estavam pensando?!\"."
 hunt.1015.a: "Oh céus, vamos cuidar desse braço!"
 hunt.1015.b: "É melhor você #EMP esquecer#! tudo sobre isso."
 hunt.1015.c: "Eu nunca erro duas vezes."
 hunt.1015.d: "Foi um... acidente infeliz."
 hunt.1015.e: "Eu tenho maneiras de fazer [murder_target.GetSheHe] esquecer."
 hunt.1016.desc: "\"[ROOT.Char.GetTitledFirstNameNoTooltip], sois #EMP vós#!?\"\n\nO olhar de [murder_target.Custom('ES_DelDela')] [murder_target.GetTitledFirstName|l] vai do meu arco para a flecha cravada no chão aos pés dele e volta.\n\n\"Ha! Problemas de pontaria, como de costume, [ROOT.Char.Custom('FormOfAddressForLiege')]?\""
 hunt.1016.a: "Espere só um pouco, [murder_target.GetFirstNameNoTooltip]..."
 hunt.1021.t: "Longe das Pessoas"
 hunt.1021.desc: "Longe dos demais, encontrei uma casinha que abrigava uma das pessoas mais bonitas que já vi em minha vida.\n\n[beautiful_peasant.GetSheHe|U] me convidou a ficar e descansar, e me surpreende o quanto tenho em comum com um[beautiful_peasant.Custom('ES_XA')] simples camponês[beautiful_peasant.Custom('ES_OA')].\n\n\"Já tens de voltar para a caçada, [ROOT.Char.Custom('FormOfAddressForLiege')]? Nunca conheci alguém como vós…\"."
 hunt.1021.a: "Talvez eu possa ficar só um #EMP pouco#! mais..."
 hunt.1021.b.thrill: "Há presas mais emocionantes me esperando!"
 hunt.1021.b.purpose: "Estou aqui para caçar, nada mais."
 hunt.1021.b.appropriate: "Isso seria completamente inadequado!"
 hunt.1021.b.cruel: "Ficar com você, um[beautiful_peasant.Custom('ES_XA')] suj[beautiful_peasant.Custom('ES_OA')] camponês[beautiful_peasant.Custom('ES_OA')]?"
 hunt.1021.c: "Por favor, [beautiful_peasant.GetFirstNameNoTooltip], deixe-me te estabelecer na [ROOT.Char.Custom('GetCourt')]."
 hunt.1021.c.success: "Uma Vida na [ROOT.Char.Custom('GetCourt')]"
 hunt.1021.c.failure: "Uma Vida Simples"
 hunt.1021.c.failure_tt: "[beautiful_peasant.GetFirstNameNoTooltip] permanece na floresta"
 hunt.1021.d: "Por favor, [beautiful_peasant.GetFirstNameNoTooltip], deixe-me te estabelecer na [ROOT.Char.Custom('GetCourt')]."
 every_consort_tt: "Cada [spouse|lE] e [lover|lE]"
 hunt.1022.t: "Amanhecer na Solidão"
 hunt.1022.desc: "Enquanto me preparo para partir, a lembrança de seu belo rosto, contorcido de paixão, persiste em minha mente. [beautiful_peasant.GetSheHe|U] acaricia a pele sobre a qual nos deitamos enquanto me observa.\n\n\"Esta não precisa ser a única noite que pasemos juntos\", ronrona."
 hunt.1022.a: "Receio que sim..."
 hunt.1022.a.tt: "#EMP Seguramente no vuelva a ver[beautiful_peasant.GetHerHim]…#!"
 hunt.1022.b: "Venha e fique comigo, na [ROOT.Char.Custom('GetCourt')]."
 hunt.1023.t: "Cão de Caça"
 hunt.1023.desc: "[ROOT.Char.Custom('DogStoryName')] trota ao meu lado, claramente aproveitando seu tempo ao ar livre.\n\nDe repente, ele para e começa a latir, e, alguns segundos depois, pode-se ouvir algo se movendo pela vegetação rasteira. Algo grande.\n\nSeus latidos se transformam em rosnados quando um exemplar de [host.Custom('GetAnimalType')|l] surge de repente em nosso caminho!"
 hunt.1023.a: "Vamos lá, [ROOT.Char.Custom('DogStoryName')], pegue-o!"
 hunt.1023.a.good: "[ROOT.Char.Custom('DogStoryName')] derruba [host.Custom('GetAnimalType')|l]"
 hunt.1023.a.bad: "[ROOT.Char.Custom('DogStoryName')] morre na luta"
 hunt.1023.b: "Eu vou derrubá-lo, [ROOT.Char.GetWomanMan] para [host.Custom('GetAnimalType')|l]."
 hunt.1030.t: "À Espera"
 hunt.1030.desc: "Meus caçadores apontaram uma clareira isolada a favor do vento do esconderijo da fera, um lugar perfeito para formar nossa linha de arcos e esperar [activity.Custom('GetAnimalType')] ser levado até lá pelas equipes de cães de caça.\n\nSeria uma ótima oportunidade para praticar tiro com arco em um alvo real em movimento."
 hunt.1030.guest: "Os caçadores [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l] indicaram uma clareira isolada a sotavento do covil da besta, um lugar perfeito para formar nossa linha de tiro e aguardar o exemplar de [activity.Custom('GetAnimalType')], conduzido até lá pelas matilhas de cães de caça.\n\n"
 hunt.1030.ambush: "Nosso anfitrião pensa por um momento, antes de concordar, \"Sim, faremos uma pequena emboscada!"
 hunt.1030.a: "Uma ótima sugestão."
 hunt.1030.b: "Não, eu quero encurralá-lo!"
 hunt.1030.c: "Vamos!"
 hunt.1032.opening: "Observamos [activity.Custom('GetAnimalType')] de nossa linha de arcos escondida, tensos de antecipação à medida que os gritos dos condutores e os latidos dos cães ficam mais altos.\n\n"
 hunt.1032.desc: "O exemplar de [activity.Custom('GetAnimalType')], com sua [activity.Custom('GetAnimalSoundParticiple')], salta de repente para a clareira à sua frente, agitando suas [activity.Custom('GetAnimalDanger')], e faz o ato de [activity.Custom('GetAnimalChargeParticiple')] contra nós, tomado de puro terror."
 hunt.1032.a: "Aguarde! Ele é #EMP meu#!!"
 hunt.1032.b: "Pare, é [hunt_participant.GetFirstNameNoTooltip]!"
 hunt.1032.e: "Agora! Todos! #EMP SOLTEM!!#!"
 hunt.1032.e.tt: "[activity.Custom('GetAnimalType')] empalidece sob uma chuva de flechas"
 hunt.1032.f: "#EMP Fujam!!!!#!"
 hunt.1033.desc: "Nossos planos foram em vão, a fera sentiu nossa armadilha pelo vento ou conluio, e recusou-se a ser conduzida para nossa emboscada pelos condutores.\n\nPor fim, ela escapou completamente de suas garras, desaparecendo nas [host.GetCurrentLocation.Custom('GetTerrainTypePlural')]..."
 hunt.1033.a: "Coisa esperta..."
 hunt.1033.b: "A culpa é toda de [hunt_participant.GetFirstNameNoTooltip]!"
 hunt.1040.t: "Silenciosamente"
 hunt.1040.desc: "Meus caçadores dizem que conhecem o local do esconderijo da fera e os pontos de água e pastagens próximos que [activity.Custom('GetAnimalType')] frequenta.\n\nEmbora não seja uma tarefa fácil de realizar, se nos aproximarmos cuidadosamente do [activity.Custom('GetAnimalMale')], talvez possamos pegá-lo desprevenido com nossos arcos."
 hunt.1040.guest: "Os caçadores [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l] dizem saber onde fica a toca da besta e os aguadouros e pastos que frequenta tal [activity.Custom('GetAnimalType')].\n\n"
 hunt.1040.stealth: "Nosso anfitrião pensa por um momento, antes de concordar que devemos nos aproximar sorrateiramente das bestas inconscientes."
 hunt.1040.chase: "Nosso anfitrião pensa por um momento, antes de zombar, \"Eu vim para uma verdadeira caçada! Vamos caçar com força, não com furtividade!"
 hunt.1040.a: "Vamos prosseguir sorrateiramente!"
 hunt.1040.a.flavor: "#EMP Silenciem os cães! Silêncio!#!"
 hunt.1040.b: "Pah, verdadeiros caçadores encurralam sua presa!"
 hunt.1040.b.flavor: "#EMP O último a chegar limpa os canis!#!"
 hunt.1040.c: "Que seja."
 hunt.1043.desc: "Apesar dos nossos melhores esforços, fomos incapazes de nos aproximar do grupo [activity.Custom('GetAnimalGroup')] de [activity.Custom('GetAnimalType')] s: ele nos detectava cada vez que nos aproximávamos, fugia e se escondia.\n\nJá está escuro demais para continuar, teremos de admitir a derrota nas patas dos [activity.Custom('GetAnimalPlural')]…"
 hunt.1043.a: "Não se pode vencer todas..."
 hunt.1043.b: "Que desastre, [hunt_participant.GetFirstNameNoTooltip]!"
 hunt.1060.t: "Alçando Voo"
 hunt.1060.desc_opening_courtier: "Meu [ROOT.Char.Custom2('RelationToMeShort', hunt_participant)], [hunt_participant.Custom('ES_ElLa')] [hunt_participant.GetTitledFirstName|l], sinaliza para o grupo se calar: chegamos ao ponto de soltura definido pelos mestres de caça."
 hunt.1060.desc_opening: "Os mestres de caça fazem um sinal para que o grupo se cale: chegamos ao local de soltura."
 hunt.1060.desc_guest: "Os mestres de caça [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l] mandam silenciar o grupo; chegamos ao ponto de soltura."
 hunt.1060.exotic: "\n\nNão muito longe, um/uma [activity.Custom('GetAnimalGroup')] de [activity.Custom('GetAnimalPlural')] color [activity.Custom('GetAnimalColor')] voa pelo céu, seu [activity.Custom('GetAnimalSoundParticiple')] anuncia nosso deleite!"
 hunt.1060.water: "\n\nHá uma linha de visão clara até um/a [activity.Custom('GetAnimalGroup')] de [activity.Custom('GetAnimalPlural')] de cor [activity.Custom('GetAnimalColor')], que está se banhando em um lago ali adiante."
 hunt.1060.ground: "\n\nDo nosso mirante, podemos ver vários exemplares de [activity.Custom('GetAnimalPlural')] cor [activity.Custom('GetAnimalColor')] desfilando pela [host.GetCurrentLocation.Custom('GetProvinceFoliageDesc')] mais adiante."
 hunt.1060.hare: "\n\nDo nosso mirante, podemos ver vários exemplares de [activity.Custom('GetAnimalPlural')] de cor [activity.Custom('GetAnimalColor')] no [host.GetCurrentLocation.Custom('GetTerrainType')] que há mais adiante."
 hunt.1060.closing: "\n\nO grupo para enquanto nos preparamos para remover as capas das nossas aves e soltá-las, uma por uma, para o esporte!"
 hunt.1060.beaters: "Os espantadores logo estarão em posição, prontos para assustar o jogo e fazê-lo voar."
 hunt.1060.a: "Voem com precisão, meus pequenos."
 hunt.1060.b: "Eu só quero assistir."
 hunt.1060.b.flavor: "#EMP Segurança em primeiro lugar!#!"
 hunt.1060.d: "É hora!"
 hunt.1062.t.hare: "Uma Lebre na Mão"
 hunt.1062.t: "Um Pássaro na Mão"
 hunt.1062.desc: "Observo animado enquanto meu [activity.Custom('GetRaptorType')] identifica um alvo e alça voo de seu posto, subindo alto no ar."
 hunt.1062.guest: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] observa com entusiasmo enquanto sua ave de rapina identifica um alvo e alça voo de seu posto de vigia, elevando-se alto no ar."
 hunt.1062.exotic: "\n\nSubindo para sua posição em busca do/a [activity.Custom('GetAnimalGroup')] de [activity.Custom('GetAnimalPlural')] meu [activity.Custom('GetRaptorType')] está fazendo tudo certo! As presas, em pânico, se dispersam e com seu [activity.Custom('GetAnimalSoundParticiple')] dão o alarme, mas é tarde demais!"
 hunt.1062.water: "\n\nOs espantadores dispersaram os exemplares de [activity.Custom('GetAnimalPlural')] de pelagem [activity.Custom('GetAnimalColor')] que não param de [activity.Custom('GetAnimalSoundParticiple')] e agora enchem o ar com seu clamor agitado."
 hunt.1062.ground: "\n\nOs/As [activity.Custom('GetAnimalPlural')] não suspeitam de nada, enquanto meu [activity.Custom('GetRaptorType')] vasculha o chão do alto."
 hunt.1062.sky: "\n\nEle mergulha como um raio: o trovão audível do impacto chega a nós momentos depois, quando a presa cai dos céus!"
 hunt.1062.floor: "\n\nEle mergulha como um raio: a presa se apressa em buscar abrigo, mas já é tarde demais!!"
 hunt.1062.a: "#EMP SIM!!#!"
 hunt.1062.a.flavor: "Meu [activity.Custom('GetRaptorType')] se banqueteará hoje!"
 hunt.1062.b: "Muito bem feito!"
 hunt.1063.t: "Dois na Moita"
 hunt.1063.desc: "Vez após vez, meu [activity.Custom('GetRaptorType')] mergulha para atacar, mas erra, recua ou apenas roça seu alvo."
 hunt.1063.desc_guest: "Sem cessar, o exemplar de [activity.Custom('GetRaptorType')] [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l] investe contra sua presa, mas erra, recua ou apenas arranha seu alvo."
 hunt.1063.closing: "\n\nApós horas de tentativas, o jogo praticamente desapareceu, o [activity.Custom('GetRaptorType')] está quase exausto e a luz está se dissipando..."
 hunt.1063.a: "Sempre haverá uma próxima vez."
 hunt.1063.a.flavor: "Maldita ave..."
 hunt.1063.d: "Uma pena."
 hunt.1080.t.bodyguard: "Não Tão Sozinho"
 hunt.1080.t: "Completamente Sozinho"
 hunt.1080.opening_lone: "Meu [ROOT.Char.Custom2('RelationToMeShort', murderer)], [murderer.Custom('ES_ElLa')] [murderer.GetTitledFirstName|l], e eu estamos à frente dos outros,"
 hunt.1080.opening_accomplice: "Meu [ROOT.Char.Custom2('RelationToMeShort', murderer)], [murderer.Custom('ES_ElLa')] [murderer.GetTitledFirstName|l], [ROOT.Char.Custom2('RelationToMeShort', accomplice)], [accomplice.Custom('ES_ElLa')] [accomplice.GetTitledFirstName|l], e eu estamos bem à frente dos outros,"
 hunt.1080.chase: "impulsionados pelos constantes gritos e gestos de [murderer.GetFirstNameNoTooltip] para apressarmos o passo atrás do animal fugidio de [activity.Custom('GetAnimalType')].\n\nJusto então percebo o quão silenciosa e isolada a trilha ficou: o resto do grupo foi desaparecendo aos poucos e não se vê ninguém por perto.\n\n"
 hunt.1080.bow: "impulsionados por seus gritos e gestos constantes para nos apressarmos atrás do esquivo exemplar de [activity.Custom('GetAnimalType')].\n\nA trilha está silenciosa e isolada, e me ocorre uma coisa: o resto do grupo foi ficando cada vez mais distante — os outros não estão à vista em lugar nenhum.\n\n"
 hunt.1080.falconry: "fortemente incentivados a sair da trilha pelos avistamentos duvidosos, porém insistentes de [activity.Custom('GetAnimalPlural')] por parte de [murderer.GetFirstNameNoTooltip].\n\nEntão percebo que a trilha está silenciosa e isolada — o restante do grupo foi aos poucos desaparecendo, e os outros não estão em lugar nenhum à vista.\n\n"
 hunt.1080.closing_lone: "Ao olhar para trás, vejo [murderer.GetFirstNameNoTooltip] se aproximando rapidamente, com a faca em punho e um brilho aterrorizante em seus olhos."
 hunt.1080.closing_accomplice: "Ao me virar, vejo [murderer.GetFirstNameNoTooltip] e [accomplice.GetFirstNameNoTooltip] se aproximando rapidamente, facas em punho, olhos brilhando."
 hunt.1080.closing_bow: "Ao voltar para o caminho, vejo [murderer.GetFirstNameNoTooltip] se aproximando rapidamente, sua faca em punho, um brilho aterrorizante em seus olhos."
 hunt.1080.closing_bow_accomplice: "Ao voltar para o caminho, vejo [murderer.GetFirstNameNoTooltip] e [accomplice.GetFirstNameNoTooltip] se aproximando rapidamente, facas em punho, brilhos aterrorizantes em seus olhos."
 hunt.1080.desc: "Pelo menos, era o que eu pensava. Quando me viro, o resto do meu grupo não está em lugar algum."
 hunt.1080.bodyguard_betray: "\n\nO que vocês estão fazendo, [bodyguard_betray.GetFirstNameNoTooltip]?! Parem!\"."
 hunt.1080.bodyguard_appears: "\n\nOuço um grito atrás de mim: meu guarda-costas, [bodyguard.GetFirstName], está correndo pelo caminho, \"#EMP [ROOT.Char.GetTitleAsNameNoTooltip|l], cuidado!#!\""
 hunt.1080.bodyguard: "\n\nOnde está meu guarda-costas, [bodyguard.GetFirstName], quando eu preciso [bodyguard.GetHerHim]? O idiota!"
 hunt.1080.dog_appears: "\n\nOuço um latido alto: me viro e vejo meu querido cachorro, [ROOT.Char.Custom('DogStoryName')], saltando em minha direção de forma protetora, anunciando em alto e bom som a chegada de [ROOT.Char.Custom('DogStoryName')]."
 hunt.1080.a.bodyguard: "[bodyguard.GetFirstNameNoTooltip]! Rápido!"
 hunt.1080.a.dog: "[ROOT.Char.Custom('DogStoryName')], sim, [ROOT.Char.Custom('DogStoryGirlBoy')]!"
 hunt.1080.a.accomplice: "Uh, [murderer.GetFirstNameNoTooltip]? [accomplice.GetFirstNameNoTooltip]?!"
 hunt.1080.a: "Uh, [murderer.GetFirstNameNoTooltip]?"
 hunt.1080.a.duel_success_accomplice: "Você domina [murderer.GetFirstNameNoTooltip] e [accomplice.GetFirstNameNoTooltip]"
 hunt.1080.a.duel_failure_accomplice: "[murderer.GetFirstNameNoTooltip] e [accomplice.GetFirstNameNoTooltip] dominam você"
 hunt.1080.a.duel_success: "Você domina [murderer.GetFirstNameNoTooltip]"
 hunt.1080.a.duel_failure: "[murderer.GetFirstNameNoTooltip] domina você"
 hunt.1080.a.success_tt: "[murderer.GetShortUIName|U] morre ou é subjugado[murderer.Custom('ES_OA')]"
 hunt.1080.a.success_accomplice_tt: "[accomplice.GetShortUIName|U] morre ou é subjugado[accomplice.Custom('ES_OA')]"
 hunt.1081.desc: "Eu desembainho minha faca de caça, pedindo ajuda aos gritos enquanto [murderer.GetFirstName] acelera o passo, impulsad[murderer.Custom('ES_OA')] por uma intenção aterradoramente feroz. Os momentos seguintes são um borrão…\n\n"
 hunt.1081.desc_accomplice: "Retiro minha faca de caça, gritando por ajuda enquanto [murderer.GetFirstName] e [accomplice.GetFirstName] se aproximam de mim, fazendo caretas com uma intenção assustadora. Os próximos momentos são um borrão...\n\n"
 hunt.1081.killed: "De repente, estou caindo para trás nas garras da [host.GetCurrentLocation.Custom('GetProvinceGroundDesc')], segurando meu peito: a empunhadura de uma adaga aparecendo em uma mancha escura na minha camisa.\n\n"
 hunt.1081.failure_accomplice: "Quando volto a meus sentidos, meu coração batendo forte, meus agressores estão contorcendo-se no chão, suas adagas fora de alcance."
 hunt.1081.failure: "Quando volto a meus sentidos, meu coração batendo forte, meu agressor se contorce no chão, sua adaga fora de alcance"
 hunt.1081.wounded_accomplice: "$hunt.1081.failure_accomplice$, sangue rubi goteando de seu braço.\n\n"
 hunt.1081.wounded: "$hunt.1081.failure$, sangue rubi goteando de seu braço.\n\n"
 hunt.1081.escaped_accomplice: "$hunt.1081.failure_accomplice$.\n\n"
 hunt.1081.escaped: "$hunt.1081.failure$.\n\n"
 hunt.1081.murderer_killed: "[murderer.GetFirstNameNoTooltip] parece prestes a me amaldiçoar antes que a luz se apague de seus olhos."
 hunt.1081.murderer_wounded: "[murderer.GetFirstNameNoTooltip] faz uma careta, gemendo de dor e segurando uma ferida aberta."
 hunt.1081.murderer_arrested: "Sustento minha adaga contra a garganta de [murderer.Custom('ES_DelDela')] atordoad[murderer.Custom('ES_OA')] [murderer.GetFirstNameNoTooltip]."
 hunt.1081.murderer: "[murderer.GetFirstNameNoTooltip] parece triunfante enquanto foge para a [host.GetCurrentLocation.Custom('GetProvinceFoliageDesc')]."
 hunt.1081.accomplice_killed: "[accomplice.GetFirstNameNoTooltip] jaz completamente imóvel, com uma ferida horrível revelando seu destino.\n\n"
 hunt.1081.accomplice_wounded: "[accomplice.GetFirstNameNoTooltip] foi apenas ferido, mas uiva de dor, olhos arregalados de pânico.\n\n"
 hunt.1081.accomplice_arrested: "[accomplice.GetFirstNameNoTooltip] está bastante ileso[accomplice.Custom('ES_OA')] e me implora clemência com os olhos arregalados.\n\n"
 hunt.1081.accomplice: "[accomplice.GetFirstNameNoTooltip] já fugiu, seu riso alegre se dissipando ao longe.\n\n"
 hunt.1081.bodyguard_wounded: "[bodyguard.GetFirstName] ajoelha-se próximo, segurando firmemente uma ferida que sangra livremente."
 hunt.1081.bodyguard_killed: "[bodyguard.GetFirstName] jaz entre nós, aparentemente bem morto[bodyguard.Custom('ES_OA')]."
 hunt.1081.bodyguard_saved: "[bodyguard.GetFirstName] mantém sua lâmina apontada para cada um deles, vigiando as árvores em busca de quaisquer ameaças adicionais."
 hunt.1081.dog_killed: "\n\nMeu bravo cão, [ROOT.Char.Custom('DogStoryName')], está encolhido aos meus pés, completamente imóvel, como se estivesse dormindo..."
 hunt.1081.dog: "\n\nMeu bravo cão, [ROOT.Char.Custom('DogStoryName')], está ao meu lado..."
 hunt.1081.closing_massacre: "Que bagunça..."
 hunt.1081.closing_success_bodyguard_dead: "Você me serviu bem... [bodyguard.GetFirstNameNoTooltip]..."
 hunt.1081.closing_success_bodyguard_apology: "Ouço [bodyguard.GetFirstNameNoTooltip], “Desculpe, [ROOT.Char.Custom('FormOfAddressForLiege')]…"
 hunt.1081.closing_success: "\n\nFico sozinh[GetPlayer.Custom('ES_OA')], ouvindo os pássaros, pedindo ajuda fracamente…"
 hunt.1081.a: "Sem piedade para vermes!"
 hunt.1081.b: "Guardas! #EMP GUARDIAS!#! Capturem[murderer.GetHerHim]!"
 hunt.1081.b.pair: "Guardas! #EMP GUARDAS!#! Prendam eles!"
 hunt.1081.b.accomplice: "Guardas! #EMP GUARDIAS!#! Apreendam[accomplice.GetHerHim]!"
 hunt.1081.c.rival: "Maldit[inspiration_sponsor.Custom('ES_OA')] [murderer.Custom2('InsultNoun', ROOT.Char)]!"
 hunt.1081.c.family: "[ROOT.Char.Custom2('RelationToMeShort', murderer)]..."
 hunt.1081.c: "P-por que...?"
 hunt.1081.d: "O-que diabos..."
 hunt.1090.desc: "Após horas de cavalgada, vasculhando cada canto de [host.GetCurrentLocation.Custom('GetTerrainTypePlural')], me vejo obrigad[ROOT.Char.Custom('ES_OA')] a admitir a derrota sob a luz crepuscular.\n\nEsse exemplar de [activity.Custom('GetAnimalType')] na cor [activity.Custom('GetLegendaryColor')] desapareceu como um espírito no momento em que o vimos, sem deixar rastro de seu cheiro nem de seus rastros...\n\nAo me virar para voltar ao acampamento, os chamados distantes de [activity.Custom('GetAnimalType')] zombam de mim em uma paisagem cada vez mais escurecida."
 hunt.1090.guest: "Após horas de cavalgada, vasculhando cada canto dessas [host.GetCurrentLocation.Custom('GetTerrainTypePlural')] [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] se vê obrigad[host.Custom('ES_OA')] a admitir a derrota sob a luz que se apaga.\n\nEsse exemplar de [activity.Custom('GetAnimalType')] na cor [activity.Custom('GetLegendaryColor')] desapareceu como um espírito no instante em que o vimos, sem deixar rastro de seu cheiro nem de suas pegadas…\n\nQuando nos viramos para voltar ao acampamento, os longínquos chamados de [activity.Custom('GetAnimalType')] zombam de [host.GetFirstNameNoTooltip] em uma paisagem cada vez mais escura."
 hunt.1090.a: "Eu #EMP vou#! encontrá-lo, fera..."
 hunt.1090.a.tt: "Espere só!"
 hunt.1090.b: "Isso certamente foi algo."
 hunt.1200.t: "A Caçada"
 hunt.1200.chase_self: "Eu mirro enquanto o grupo mantém o animal exausto no lugar, solto a respiração e disparo!"
 hunt.1200.chase: "[animal_slayer.Custom('ES_ElLa')] [animal_slayer.GetTitledFirstName|l] mira enquanto o grupo mantém o exausto exemplar de [activity.Custom('GetAnimalType')] no lugar, expira e solta!"
 hunt.1200.ambush_self: "Aponto com cuidado enquanto o exemplar de [activity.Custom('GetAnimalType')] [activity.Custom('GetAnimalChargePresent')] em nossa direção, golpeando o [activity.Custom('GetAnimalTrackPlural')] [ROOT.Char.GetCurrentLocation.Custom('GetProvinceGroundDesc')]."
 hunt.1200.ambush: "[animal_slayer.Custom('ES_ElLa')|U] [animal_slayer.GetTitledFirstName|l] aponta com cuidado enquanto o exemplar de [activity.Custom('GetAnimalType')] [activity.Custom('GetAnimalChargePresent')] em nossa direção, golpeando com suas [activity.Custom('GetAnimalTrackPlural')] [ROOT.Char.GetCurrentLocation.Custom('GetProvinceGroundDesc')]"
 hunt.1200.stealth_self: "Eu miro lentamente, [activity.Custom('GetAnimalType')] virando a cabeça como se estivesse antecipando algo."
 hunt.1200.stealth: "[animal_slayer.Custom('ES_ElLa')|U] [animal_slayer.GetTitledFirstName|l] aponta lentamente, o exemplar de [activity.Custom('GetAnimalType')] inclina a cabeça como se estivesse à espera."
 hunt.1200.slayer_fled: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] grita de repente e sai correndo, afastando-se do animal."
 hunt.1200.slayer_group: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] grita #EMP DISPAREM!#! Derrubem-no!"
 hunt.1200.slayer_self_stealth: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] faz um gesto, indicando que devo atirar!"
 hunt.1200.slayer_self: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] faz um gesto, indicando que devo atirar!"
 hunt.1200.slayer_stealth: "Ouço gritar [host.Custom('ES_AlAla')] [host.GetTitledFirstName|l], \"Rápido, [ROOT.Char.GetFirstNameNoTooltip], atire!\"."
 hunt.1200.slayer: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] grita: \"Rápido, [animal_slayer.GetFirstNameNoTooltip|l], atire!\""
 hunt.1200.success: "\n\nA flecha acerta em cheio, diretamente no coração da fera!"
 hunt.1200.failure: "\n\nA flecha passa por ela e atinge a [ROOT.Char.GetCurrentLocation.Custom('GetProvinceFoliageDesc')], enquanto [activity.Custom('GetAnimalType')] desfere um [activity.Custom('GetAnimalStrike')] em [injury_target.GetFirstName]!"
 hunt.1200.critical: "\n\nA flecha passa por ela, [activity.Custom('GetAnimalType')] se vira rapidamente e desaparece na [ROOT.Char.GetCurrentLocation.Custom('GetProvinceFoliageDesc')]!"
 hunt.1200.fled: "\n\nO restante de nós fica se perguntando o que fazer em seguida, enquanto saímos do caminho da fera."
 hunt.1200.group: "\n\nAs cordas do arco estalam quando uma dúzia de flechas assobia em direção ao animal; ele desliza em nossa direção [activity.Custom('GetAnimalSoundPresent')], cravado de setas."
 hunt.1200.a.self: "É assim que se faz!"
 hunt.1200.a: "Bom tiro!"
 hunt.1200.b.self: "Ops, desculpe! Cuidado!"
 hunt.1200.b: "Ajudem[injury_target.GetHerHim]!"
 hunt.1200.c.self: "Maldita coisa se mexeu..."
 hunt.1200.c: "Azar."
 hunt.1200.d: "Não tinha a menor chance."
 hunt.1200.e: "Que caçador!"
 hunt.1201.self: "Empunho minha lança e me aproximo cautelosamente da fera exausta."
 hunt.1201: "[animal_slayer.Custom('ES_ElLa')|U] [animal_slayer.GetTitledFirstName|l] empunha sua lança e se move cautelosamente em direção ao animal exausto."
 hunt.1201.slayer_dogs: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] vira-se para os cuidadores e grita: \"Soltem os cães!\"."
 hunt.1201.slayer_self: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] se vira para mim, \"[ROOT.Char.GetTitledFirstName], a presa é sua!\"."
 hunt.1201.slayer: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] se vira para nós e grita \"[animal_slayer.GetTitledFirstName], a presa é sua!\"."
 hunt.1201.success_self: "\n\nEscolho cuidadosamente o momento, mergulhando minha lâmina profundamente em seu coração!"
 hunt.1201.success: "\n\n[animal_slayer.Custom('ES_ElLa')|U] [animal_slayer.GetTitledFirstNameNoTooltip|l] escolhe o momento com cuidado, cravando a espada profundamente em seu coração!"
 hunt.1201.failure_self: "\n\nEnquanto mergulho minha lâmina nele, a fera me atinge com um [activity.Custom('GetAnimalStrike')]. Sou afastado enquanto ela [activity.Custom('GetAnimalSoundPresent')] em seus estertores finais."
 hunt.1201.failure: "\n\nQuando [animal_slayer.Custom('ES_ElLa')] [animal_slayer.GetTitledFirstNameNoTooltip|l] lhe crava a espada, a besta [animal_slayer.Custom('ES_LoLa')] o(a) agarra com sua [activity.Custom('GetAnimalStrike')]. [animal_slayer.GetHerHim|U] o(a) afasta enquanto o animal [activity.Custom('GetAnimalSoundPresent')] de dor."
 hunt.1201.critical: "\n\nQuando [animal_slayer.Custom('ES_ElLa')] [animal_slayer.GetTitledFirstNameNoTooltip|l] enfia a lâmina na besta, ela desfere um/a [activity.Custom('GetAnimalStrike')] feroz, deixando [animal_slayer.Custom('ES_LoLa')] se contorcendo com um ferimento horrível!"
 hunt.1201.dogs_success: "\n\nOs cães entram em ação, latindo enquanto cercam a fera, aos poucos a desgastando com suas presas..."
 hunt.1201.dogs_failure: "\n\nOs cães entram em ação, latindo enquanto cercam a fera, mas são abatidos um a um com uivos e gritos..."
 hunt.1201.animal_spared_dharmic: "\n\n[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] dispensa os caçadores. \"A caça terminou, não é dharma infligir dor desnecessária."
 hunt.1201.animal_spared: "\n\n[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] afasta os caçadores. \"Isso basta. Venha, vamos deixar a pobre besta em paz."
 hunt.1201.a.self: "Toma essa!"
 hunt.1201.a: "Uma bela morte!"
 hunt.1201.b.self: "#EMP Argh!#! Maldita criatura..."
 hunt.1201.b: "Rápido, [injury_target.GetSheHe] precisa de ajuda!"
 hunt.1201.c: "Pelo [ROOT.Char.GetFaith.HighGodName]!"
 hunt.1201.d.self: "Hah! Os cães terão um banquete esta noite!"
 hunt.1201.d: "Feroz."
 hunt.1201.e.critical: "NÃO! Não meu filhote!"
 hunt.1201.e.self: "Não! Malditas criaturas tolas..."
 hunt.1201.e: "Difícil de assistir."
 hunt.1201.f.dharmic: "Azarado."
 hunt.1201.f.compassionate: "Muito piedoso."
 hunt.1201.f: "Que absolutamente sem sentido..."
 hunt.1202.self: "Empunho minha lança e me aproximo cautelosamente da fera exausta."
 hunt.1202: "[animal_slayer.Custom('ES_ElLa')|U] [animal_slayer.GetTitledFirstName|l] ergue a lança e se aproxima cautelosamente do animal exausto."
 hunt.1202.slayer: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] se vira para nós e grita: \"Grupo de vanguarda, acabem com isso!\"."
 hunt.1202.slayer_self: "O grupo avança, espalhando-se ao redor da fera aterrorizada."
 hunt.1202.capture: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] se vira para nós e grita: \"Vamos, peguem a corda, vamos capturá-lo vivo!\""
 hunt.1202.capture_self: "Os outros pegam a corda enquanto descobrimos como manobrar a fera."
 hunt.1202.craven: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] se vira para nós e grita: \"Vamos! O que estão esperando! Acabe com isso!\""
 hunt.1202.craven_self: "Os outros avançam enquanto eu fico para trás, segurando firmemente minha arma."
 hunt.1202.capture_success: "Depois de muita luta e [activity.Custom('GetAnimalSoundParticiple')], [activity.Custom('GetAnimalType')] finalmente é pacificado, amarrado indefeso."
 hunt.1202.capture_injury: "Depois de muita luta e [activity.Custom('GetAnimalSoundParticiple')], [activity.Custom('GetAnimalType')] é pacificado, mas eu sofro um ferimento poderoso no processo."
 hunt.1202.capture_failure: "Depois de muito lutar e [activity.Custom('GetAnimalSoundParticiple')] o exemplar de [activity.Custom('GetAnimalType')] fica pacificado, mas [injury_target.GetFirstName] sofre um grande golpe no processo."
 hunt.1202.capture_critical: "Depois de muita luta e [activity.Custom('GetAnimalSoundParticiple')], [activity.Custom('GetAnimalType')] é pacificado, mas não antes de derrubar [injury_target.GetFirstName]."
 hunt.1202.success_self: "\n\nNós o cercamos lentamente, lanças em riste, e pusemos fim ao sofrimento da fera [activity.Custom('GetAnimalSoundParticiple')]."
 hunt.1202.success: "\n\nOs caçadores o cercam lentamente, lanças em riste, e põem fim ao sofrimento da fera [activity.Custom('GetAnimalSoundParticiple')]."
 hunt.1202.failure_injury: "\n\nNós o cercamos lentamente, lanças em riste, mas sofro um [activity.Custom('GetAnimalStrike')] antes de pormos fim ao sofrimento da fera [activity.Custom('GetAnimalSoundParticiple')]."
 hunt.1202.failure_self: "\n\nNós o cercamos lentamente, lanças em riste, mas [injury_target.GetFirstName] sofre um [activity.Custom('GetAnimalStrike')] antes de pormos fim ao sofrimento da fera [activity.Custom('GetAnimalSoundParticiple')]."
 hunt.1202.failure: "\n\nOs caçadores o cercam lentamente, lanças em riste, mas [injury_target.GetFirstName] sofre um [activity.Custom('GetAnimalStrike')] antes de pormos fim ao sofrimento da fera [activity.Custom('GetAnimalSoundParticiple')]."
 hunt.1202.critical_self: "\n\nNós o cercamos lentamente, lanças em riste, mas [injury_target.GetFirstName] sofre um [activity.Custom('GetAnimalStrike')] horrendo antes de pormos fim ao sofrimento da fera [activity.Custom('GetAnimalSoundParticiple')]!"
 hunt.1202.critical: "\n\nOs caçadores cercam lentamente a fera, lanças eriçadas, mas [injury_target.GetFirstName] sofre um [activity.Custom('GetAnimalStrike')] horrendo antes de pormos fim ao sofrimento da fera [activity.Custom('GetAnimalSoundParticiple')]!"
 hunt.1202.a.self: "Toma essa!"
 hunt.1202.a: "Uma bela caçada!"
 hunt.1202.b.self: "#EMP Argh!#! Maldita criatura..."
 hunt.1202.b: "Rápido, [injury_target.GetSheHe] precisa de ajuda!"
 hunt.1202.c: "Uma tragédia..."
 hunt.2000.t: "Vendedor de Cães de Caça"
 hunt.2000.opening_master: "Meu [ROOT.Char.Custom('GetHuntMasterDesc')] , [m_hunt.Custom('ES_ElLa')] [m_hunt.GetTitledFirstName|l] me trouxe um[dog_salesman.Custom('ES_XA')] [dog_salesman.GetWomanMan] que afirma vender bons cães de caça.\n\n"
 hunt.2000.opening_hunter: "Meu [ROOT.Char.Custom2('RelationToMe', m_hunt)], [m_hunt.Custom('ES_ElLa')] [m_hunt.GetTitledFirstName|l], [Select_CString( m_hunt.IsFemale, 'ávida caçadora', 'ávido caçador' )], trouxe-me um[dog_salesman.Custom('ES_XA')] [dog_salesman.GetWomanMan] que vende ótimos cães de caça.\n\n"
 hunt.2000.opening: "Um[dog_salesman.Custom('ES_XA')] [dog_salesman.GetWomanMan] que vende bons cães de caça chegou a [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] , aparentemente na esperança de encontrar um novo cliente.\n\n"
 hunt.2000.desc: "\"Eu vendo apenas os melhores cães de caça, já treinados e prontos para se juntarem a qualquer equipe de caça sem problemas. Você não encontrará nada melhor em qualquer lugar de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetDefinitiveNameNoTooltip], [ROOT.Char.GetTitleAsNameNoTooltip|l]!\"\n\nDiante de mim está uma fila de cães com coleiras de tamanhos e estruturas diferentes, sentados calmamente enquanto os avalio."
 hunt.2000.a: "Um bom farejador vale o seu peso em ouro."
 hunt.2000.b: "Esse pode derrubar um javali sozinho!"
 hunt.2000.b.tt: "Você não receberá eventos de [hunt_sighting_no_prefix|lE] até realizar uma [GetActivityType('activity_hunt').GetName|l]"
 hunt.2000.c: "Impressionante, você cuidará dos meus canis, [dog_salesman.GetFirstNameNoTooltip]?"
 hunt.2000.d: "Não preciso de mais cães."
 hunt.2001.t: "Vendedor de Aves de Rapina"
 hunt.2001.opening_master: "Meu [ROOT.Char.Custom('GetHuntMasterDesc')] , [m_hunt.Custom('ES_ElLa')] [m_hunt.GetTitledFirstName|l] , me trouxe um[falcon_salesman.Custom('ES_XA')] [falcon_salesman.GetWomanMan] que afirma vender rapinantes de caça treinados.\n\n"
 hunt.2001.opening_hunter: "Meu [ROOT.Char.Custom2('RelationToMe', m_hunt)]; [m_hunt.Custom('ES_ElLa')] [m_hunt.GetTitledFirstName|l]; [Select_CString( m_hunt.IsFemale, 'ávida caçadora', 'ávido caçador' )], me trouxe um[falcon_salesman.Custom('ES_XA')] [falcon_salesman.GetWomanMan] que vende aves de rapina treinadas para caça.\n\n"
 hunt.2001.opening: "Uma[falcon_salesman.Custom('ES_XA')] [falcon_salesman.GetWomanMan] que vende aves de rapina de caça treinadas chegou a [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] , aparentemente na esperança de encontrar um novo cliente.\n\n"
 hunt.2001.desc: "\"Estas são as aves mais nobres; eu mesmo as criei desde filhotes; elas não irão decepcionar você, [ROOT.Char.GetTitleAsNameNoTooltip]!\"\n\nUma variedade de falcões e gaviões de diferentes tamanhos estão calmamente sentados em uma gaiola diante de mim."
 hunt.2001.a: "Este aqui é um belo espécime!"
 hunt.2001.a.flavor: "Eu vou levá-lo!"
 hunt.2001.c: "Finalmente, [falcon_salesman.GetFirstNameNoTooltip]! Alguém para cuidar dos meus viveiros!"
 hunt.2001.d: "Muito bom, mas não estou interessado..."
 hunt.2500.t: "[sighting_province.GetTitle.GetDeJureLiege.Custom('GetAnimalPlural')|U] de [sighting_province.GetNameNoTooltip]"
 hunt.2500.opening_master: "Meu [ROOT.Char.Custom('GetHuntMasterDesc')], [sighting_character.Custom('ES_ElLa')] [sighting_character.GetTitledFirstName|l], me traz notícias das feras avistadas em meu domínio.\n\n"
 hunt.2500.opening_hunter: "Meu [ROOT.Char.Custom2('RelationToMe', sighting_character)], [sighting_character.Custom('ES_ElLa')] [sighting_character.GetTitledFirstName|l], conhecido por seu interesse em caça maior, traz rumores de feras avistadas em meu domínio.\n\n"
 hunt.2500.opening_fallback: "A gente ouve todo tipo de rumor nas largas estradas de [ROOT.Char.GetCurrentLocation.GetCounty.GetTitle.GetDeJureLiege.GetNameNoTierNoTooltip], e hoje, um caçador particularmente tagarela tem falado sem parar no meu ouvido.\n\n"
 hunt.2500.opening: "Meu [ROOT.Char.Custom2('RelationToMe', sighting_character)], [sighting_character.Custom('ES_ElLa')] [sighting_character.GetTitledFirstName|l], tem andado tagarelando notícias de feras avistadas em meu domínio.\n\n"
 hunt.2500.desc: "\"Estou ouvindo falar muito de [sighting_county.GetNameNoTier]; dizem que há excelentes perspectivas para a caça nas redondezas, e foram vistos muitos [sighting_province.Custom('GetTerrainTypePlural')] dignos de caça rondando [sighting_province.Custom('GetTerrainTypePlural')]\"."
 hunt.2500.a: "Interessante..."
 hunt.2500.b: "Não me incomode com isso."
 hunt.2500.c: "Eu poderia usar um bom caçador."
 hunt.2510.t: "[sighting_county.Custom('GetAnimalType')] [sighting_county.Custom('GetLegendaryColor')]"
 hunt.2510.opening_master: "Meu [ROOT.Char.Custom('GetHuntMasterDesc')]. [sighting_character.Custom('ES_ElLa')] [sighting_character.GetTitledFirstName|l] entra em meus aposentos transbordando de entusiasmo.\n\n"
 hunt.2510.opening_hunter: "Meu [ROOT.Char.Custom2('RelationToMe', sighting_character)], [sighting_character.Custom('ES_ElLa')] [sighting_character.GetTitledFirstName|l], conhecido por seu interesse pela caça maior, entra em meus aposentos transbordando de entusiasmo.\n\n"
 hunt.2510.opening: "Meu [ROOT.Char.Custom2('RelationToMe', sighting_character)], [sighting_character.Custom('ES_ElLa')] [sighting_character.GetTitledFirstName|l], entra em meus aposentos transbordando de entusiasmo.\n\n"
 hunt.2510.desc: "\"Estou ouvindo coisas estranhas dos guardas de caça de [sighting_county.GetNameNoTier]: falam de avistamentos de um exemplar de [sighting_county.Custom('GetAnimalType')] com um"
 hunt.2510.desc.knight_errant: "“Estou ouvindo coisas estranhas dos guardas florestais de [sighting_county.GetName]: dizem ter avistado um exemplar de [sighting_county.Custom('GetAnimalType')] com um"
 hunt.2510.story: "\"Os guardas de caça de [sighting_county.GetNameNoTier] enviam relatos convincentes: parece que [sighting_county.Custom('GetAnimalType')] foi visto por lá, uma fera com"
 hunt.2510.black: "pelagem preta como carvão.\""
 hunt.2510.white: "pelagem branca como neve.\""
 hunt.2510.closing: "\n\n\"Dizem que ele vagueia pelos [sighting_province.Custom('GetTerrainTypePlural')], embora ninguém tenha chegado perto dele. Existem, de fato, lendas sobre tais criaturas...\""
 hunt.2510.knight_errant_closing: "\n\n\"Só um $knight_culture_player_no_tooltip$ tão famoso quanto você pode domá-lo, [ROOT.Char.Custom('FormOfAddressForLiege')].\""
 hunt.2510.a: "#EMP [sighting_county.Custom('GetLegendaryColor')]#!, você diz?"
 hunt.2510.a.existing: "Eu #EMP vou#! encontrá-lo, um dia!"
 hunt.2510.b: "Não me incomode com essas fantasias infantis."
 hunt.2510.c: "Desloquem o acampamento para [sighting_county.GetNameNoTierNoTooltip] imediatamente."
 hunt.2520.t: "[sighting_province.GetTitle.GetDeJureLiege.Custom('GetAnimalType')] [sighting_province.GetTitle.GetDeJureLiege.Custom('GetAnimalAdjective')] de [sighting_county.GetNameNoTierNoTooltip]"
 hunt.2520.desc: "\"Tenho ouvido muitos relatos de [sighting_county.GetNameNoTier]: dizem que [sighting_county.Custom('GetAnimalType')] terrível tem aterrorizado as vilas locais, roubando gado antes de desaparecer nas [sighting_province.Custom('GetTerrainTypePlural')]!\""
 hunt.2530.t: "[sighting_province.GetTitle.GetDeJureLiege.Custom('GetAnimalPlural')|U] de [sighting_county.GetNameNoTierNoTooltip]"
 hunt.2530.opening_master: "Meu falcoeiro-mor, [sighting_character.Custom('ES_ElLa')] [sighting_character.GetTitledFirstName|l], entra em meus aposentos transbordando de entusiasmo.\n\n"
 hunt.2530.opening_falconer: "Meu [ROOT.Char.Custom2('RelationToMe', sighting_character)], [sighting_character.Custom('ES_ElLa')] [sighting_character.GetTitledFirstName|l], conhecido por seu interesse em falcoaria, entra em meus aposentos transbordando de entusiasmo.\n\n"
 hunt.2530.desc: "\"Estou ouvindo falar muito de [sighting_county.GetNameNoTier]; diz-se que há excelentes perspectivas para a caça nos arredores, e muitos [sighting_county.Custom('GetAnimalType')] dignos de serem caçados foram vistos rondando [sighting_province.Custom('GetTerrainTypePlural')].\""
 hunt.2540.t: "De Aqui para Lá"
 hunt.2540.desc: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U], vossos mestres de caça informam que as abundantes manadas de [sighting_county.Custom('GetAnimalPlural')] de [old_sighting_county.GetBaseNameNoTier] parecem ter se deslocado dessas parcelas para [sighting_county.GetName]!\"."
 hunt.2540.legendary: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U], seus mestres de caça informam que o exemplar de [sighting_county.Custom('GetAnimalType')] de pelagem [sighting_county.Custom('GetLegendaryColor')] de [old_sighting_county.GetBaseNameNoTier] desapareceu por um tempo antes de ser avistado em [sighting_county.GetBaseNameNoTier], que fica tão perto!"
 hunt.2540.closing: "\n\n\"Talvez seja hora de organizar uma caçada antes que seja tarde demais.\""
 hunt.2540.white: "Dizem que ele brilha como uma luz divina nas névoas da manhã...\""
 hunt.2540.black: "Dizem que ele surge como um mensageiro da noite, um buraco negro na paisagem...\""
 hunt.2540.a: "Eles podem correr, mas não podem se esconder."
 hunt.2540.a.legendary: "Ele tenta me confundir!"
 hunt.2540.b: "Estou cansado(a) desses relatórios, [sighting_character.GetFirstNameNoTooltip]..."
 hunt.3020.t: "Caça Ardilosa"
 hunt.3020.t.deer: "Sem Ideia"
 hunt.3020.opening: "Como toda presa de caça, o ágil [activity.Custom('GetAnimalType')] tem muitos truques, esconderijos e artimanhas que podem enganar até mesmo os caçadores mais experientes.\n\n"
 hunt.3020.doubling: "o/a astuto/a [activity.Custom('GetAnimalType')] tem estado indo de um lado para outro, refazendo seus passos e correndo pelas trilhas para nos despistar."
 hunt.3020.beating: "[activity.Custom('GetAnimalMale')] tem batido e ludibriado pelos riachos do [host.GetCurrentLocation.Custom('GetTerrainType')], tentando nos despistar."
 hunt.3020.squatting: "[activity.Custom('GetAnimalMale')] tem permanecido imóvel nas [host.GetCurrentLocation.Custom('GetProvinceFoliageDesc')], inabalável em nos confundir, mesmo debaixo do nariz dos cães."
 hunt.3020.rusing: "[activity.Custom('GetAnimalMale')] tem utilizado artifícios, correndo para cá e para lá em padrões insanos para confundir seu rastro e frustrar as tentativas de segui-lo"
 hunt.3020.desc_courtier: "Meu [ROOT.Char.Custom2('RelationToMe', hunt_participant)], [hunt_participant.Custom('ES_ElLa')] [hunt_participant.GetTitledFirstName|l], interrompeu a expedição:"
 hunt.3020.desc_fallback: "Meus [ROOT.Char.Custom('GetGameKeepers')] interromperam à frente:"
 hunt.3020.desc: "O rastro ficou embaralhado: o/a astuto/a [activity.Custom('GetAnimalType')] tem andado de um lado para o outro, refazendo os próprios passos para nos despistar."
 hunt.3020.closing: "\n\nNão há acordo sobre qual caminho seguir, e a cada momento que hesitamos, estamos mais distantes do nosso prêmio."
 hunt.3020.a: "Tenha paciência, isso deve ser fácil de resolver."
 hunt.3020.a.perfect: "Você encontra rapidamente o rastro"
 hunt.3020.a.success: "Você logo encontra o rastro"
 hunt.3020.a.failure: "Você acha que encontrou o rastro"
 hunt.3020.b: "Ah sim, já ouvi falar desse truque."
 hunt.3020.b.success: "Seu conselho dá resultado"
 hunt.3020.b.failure: "Seu conselho é inútil"
 hunt.3020.c: "Confio em [hunt_participant.GetFirstNameNoTooltip] nisso."
 hunt.3020.c.perfect: "[hunt_participant.GetFirstNameNoTooltip] encontra rapidamente o rastro"
 hunt.3020.c.success: "[hunt_participant.GetFirstNameNoTooltip] logo encontra o rastro"
 hunt.3020.c.failure: "[hunt_participant.GetFirstNameNoTooltip] nos leva para o caminho errado"
 hunt.3020.d: "Se fosse eu, teria seguido por este caminho..."
 hunt.3020.e: "Por aqui. Não! Por ali!"
 hunt.3020.e.success: "Você vai pelo caminho certo"
 hunt.3020.e.failure: "Você vai pelo caminho errado"
 hunt.3020.f: "O que o guarda de caça local pensa?"
 hunt.3020.f.flavor: "#EMP Vamos consultar um especialista...#!"
 hunt.4001.t: "O Tiro"
 hunt.4001.opening: "Há algo majestoso na maneira como [activity.Custom('GetAnimalType')] observa a paisagem. Escondido(a) na [host.GetCurrentLocation.Custom('GetProvinceFoliageDesc')], eu ergo meu arco.\n\n"
 hunt.4001.desc_1: "Lanço um olhar silencioso para o meu [ROOT.Char.Custom2('RelationToMe', hunt_participant)], [hunt_participant.Custom('ES_ElLa')] [hunt_participant.GetTitledFirstName|l], agachad[hunt_participant.Custom('ES_OA')] em [host.GetCurrentLocation.Custom('GetProvinceGroundDesc')], que faz o mesmo."
 hunt.4001.desc_2: "Calculo cuidadosamente a distância até o exemplar de [activity.Custom('GetAnimalType')], com a azagaia perfeitamente equilibrada na minha mão…\n\nMeu [ROOT.Char.Custom2('RelationToMe', hunt_participant)], [hunt_participant.Custom('ES_ElLa')] [hunt_participant.GetTitledFirstName|l], se agacha ao meu lado, erguendo sua própria lança."
 hunt.4001.desc_3: "Respire... mire..."
 hunt.4001.a: "#EMP Não! É meu!#!"
 hunt.4001.a.kill: "Você abate [activity.Custom('GetAnimalType')]"
 hunt.4001.a.stolen: "[hunt_participant.GetFirstNameNoTooltip] abate [activity.Custom('GetAnimalType')]"
 hunt.4001.a.both: "Você espanta [activity.Custom('GetAnimalType')]"
 hunt.4001.b: "Acerte em cheio, [hunt_participant.GetFirstNameNoTooltip]."
 hunt.4001.c: "Agora, [hunt_participant.GetFirstNameNoTooltip], antes que [activity.Custom('GetAnimalType')] nos perceba!"
 hunt.4001.c.tt: "Se eu pisasse neste graveto, [activity.Custom('GetAnimalType')] certamente se assustaria..."
 hunt.4001.d: "Observe isso."
 hunt.4002.t: "Rumores"
 hunt.4002.desc: "O ruído dos outros já desapareceu quando meu [ROOT.Char.Custom2('RelationToMe', secret_sharer)], [secret_sharer.Custom('ES_ElLa')] [secret_sharer.GetTitledFirstName|l], e eu nos aproximamos sorrateiramente de [activity.Custom('GetAnimalType')].\n\nEstamos a distância de ataque quando [secret_sharer.GetFirstNameNoTooltip] me sussurra… \"Agora que finalmente estamos a sós, há algo que eu preciso lhe contar — sobre [secret_owner.Custom('ES_ElLa')] [secret_owner.GetTitledFirstName|l]…\"."
 hunt.4002.a: "Conversamos depois, [ROOT.Char.Custom2('RelationToMe', secret_sharer)]!"
 hunt.4002.a.flavor: "Esse exemplar de [activity.Custom('GetAnimalType')] é meu!"
 hunt.4002.b: "O quê? Me conte..."
 hunt.4002.b.tt: "[activity.Custom('GetAnimalType')] foge"
 hunt.4002.b.reveal: "Descubro o segredo de [secret_owner.GetFirstNameNoTooltip]"
 hunt.4003.t: "Presas Ilegais"
 hunt.4003.desc: "Caçadores furtivos aqui, na [host.GetCurrentLocation.Custom('GetTerrainType')] [land_owner.Custom('ES_DelDela')] [land_owner.GetTitleTierName|l]? Eles se apertam enquanto me aproximo cavalgando com meus guardas; fazem um péssimo trabalho ao esconder o cadáver de [host.Custom('GetRegionalDeerType')] atrás deles.\n\n\"Nós não fizemos isso! Por favor, tende piedade, glorioso [ROOT.Char.GetTitleAsNameNoTooltip|l]!\". Suas adagas e arcos desmentem suas palavras."
 hunt.4003.adventurer: "Junte-se ao meu acampamento. [land_owner.Custom('ES_ElLa')|U] [land_owner.GetTitleTierName] jamais encontrará você."
 hunt.4003.a: "Eles serão enforcados, e suas aldeias pagarão."
 hunt.4003.b: "\"Vocês todos parecem ser excelentes arqueiros...\""
 hunt.4003.c: "O animal é meu, juntamente com multas por suas vidas."
 hunt.4003.c.tt_success: "Magistrados locais concordam"
 hunt.4003.c.tt_failure: "Indignação popular"
 hunt.4003.d: "\"E o que me importa a caça [land_owner.Custom('ES_DelDela')] [land_owner.GetTitledFirstNameNoTooltip|l]?\"."
 hunt.4003.d.own: "Saia da minha [host.GetCurrentLocation.Custom('GetTerrainType')]!"
 hunt.4003.d.vassal: "Saia de [host.GetCurrentLocation.Custom('GetTerrainType')] [land_owner.Custom('ES_DelDela')] [land_owner.GetTitledFirstNameNoTooltip|l]!"
 hunt.4003.d.rival: "Pegue o quanto quiser de [land_owner.Custom('ES_DelDela')] [land_owner.GetTitledFirstNameNoTooltip|l]."
 hunt.4003.e: "Finalmente, um caçador decente!"
 hunt.4004.t: "Abatendo uma Besta"
 hunt.4004.desc: "Seria possível pensar que é uma criatura de lenda, talvez um deus disfarçado em forma de animal. Nunca tinha visto [activity.Custom('GetAnimalType')] desse tamanho.\n\nDepois de ferir a besta, a perseguição durou meio dia.\n\nAinda é uma visão impressionante contemplar este exemplar morto diante de mim."
 hunt.4004.credit_receiver: "[credit_taker.Custom('ES_ElLa')|U] [credit_taker.GetTitledFirstName|l] está igualmente impressionad[credit_taker.Custom('ES_OA')]. \"Nunca tinha visto nada parecido, [ROOT.Char.Custom('FormOfAddressForLiege')]\"."
 hunt.4004.a: "Sua cabeça ficará linda em meu grande salão!"
 hunt.4004.b: "Será um troféu para meu [ROOT.Char.Custom2('RelationToMeShort', trophy_recipient)]."
 hunt.4004.c: "Ele fará um casaco esplêndido!"
 hunt.4004.c.tt: "Não, é #EMP NÃO#! berrante!"
 hunt.4004.every_arrogant_vassal: "Todo vassalo arrogante"
 hunt.4004.every_restrained_vassal: "Todo vassalo extremamente contido"
 hunt.4004.every_other_vassal: "Vassalos não arrogantes, não contidos"
 hunt.4004.d: "Acredito que [credit_taker.Custom('ES_ElLa')] [credit_taker.GetTitledFirstNameNoTooltip|l] merece o crédito por isto."
 hunt.4004.e: "Nós o comemos aqui e agora!"
 hunt.4004.f: "Seu crânio fará uma bela coroa."
 hunt.4005.t: "Abatendo uma Besta"
 hunt.4005.a: "Este renderá um bom preço."
 hunt.4005.b: "Mandarei fazer um belo troféu para meu [ROOT.Char.Custom2('RelationToMeShort', trophy_recipient)]."
 hunt.4005.c: "Ele será empalhado e enviado para o [ROOT.Char.GetFaith.ReligiousHeadName]!"
 hunt.4006.t: "Os Forrageiros"
 hunt.4006.desc: "A [host.GetCurrentLocation.Custom('GetTerrainTree')] é realmente 'o manto dos pobres', mas à medida que [activity.Custom('GetAnimalType')] foge em pânico dos camponeses que procuram alimentos, sinto minha paciência se esgotando.\n\nCertamente deve haver coisas melhores para se fazer em [host.GetCurrentLocation.GetNameNoTooltip] hoje do que catar raízes e cogumelos!"
 hunt.4006.adventurer: "Colher raízes e cogumelos... isso sim é uma ideia."
 hunt.4006.a: "Expulse essa ralé das #EMP minhas#! terras de caça!"
 hunt.4006.b: "Viemos aqui para caçar, não foi?"
 hunt.4006.special_interest: "Devido aos seus interesses incomuns:"
 hunt.4006.c: "Ah, essa presa será perfeita..."
 hunt.4006.d: "Uma generosa doação deverá mantê-los afastados tempo suficiente."
 hunt.4006.e: "Esses #EMP são#! seus antigos direitos, suponho..."
 hunt.4007.t: "[host.Custom('GetAnimalType')|U] fora de controle"
 hunt.4007.desc_befriend: "Sopra uma brisa suave, e meu [ROOT.Char.Custom2('RelationToMeShort', similar_participant)], [similar_participant.Custom('ES_ElLa')] [similar_participant.GetTitledFirstName|l] e eu cochilamos em uma clareira silenciosa quando o ouvimos."
 hunt.4007.desc_lazy: "Sopra uma brisa suave, e meu [ROOT.Char.Custom2('RelationToMeShort', similar_participant)] , [similar_participant.Custom('ES_ElLa')] [similar_participant.GetTitledFirstName|l] e eu cochilamos em uma clareira silenciosa quando o ouvimos."
 hunt.4007.desc_lustful: "Meu [ROOT.Char.Custom2('RelationToMeShort', similar_participant)], [similar_participant.Custom('ES_ElLa')] [similar_participant.GetTitledFirstName|l], exibe uma figura marcante em seu traje de caça, e eu amaldiçoo a perturbação que desvia minha atenção de [similar_participant.GetSheHe]."
 hunt.4007.desc_fallback: "Quando meu [ROOT.Char.Custom2('RelationToMeShort', similar_participant)], [similar_participant.Custom('ES_ElLa')] [similar_participant.GetTitledFirstName|l] e eu coroamos uma colina, o ouvimos."
 hunt.4007.desc_ending: "\n\nRamos se partindo, galhos farfalhando e pássaros gritando de medo anunciam a chegada de um/a [host.Custom('GetAnimalType')|l] furioso/a, e ele/ela está vindo direto para nós!\n\n[similar_participant.GetSheHe|U] arqueja: \"Olhem o tamanho de seus #EMP [host.Custom('GetAnimalDanger')]#!!\"."
 hunt.4007.a: "O caminho dele acaba aqui, comigo."
 hunt.4007.a.non_martial: "Rápido! Fiquem atrás de mim, [similar_participant.GetFirstNameNoTooltip]!"
 hunt.4007.a.non_martial_self: "Me dê sua faca! Eu mesmo farei isso!"
 hunt.4007.a.success: "Eu mato a fera"
 hunt.4007.a.failure: "Eu estou ferido(a)"
 hunt.4007.a.critical_failure: "Eu sou morto(a)"
 hunt.4007.b: "[similar_participant.GetFirstNameNoTooltip], faça alguma coisa!"
 hunt.4007.b.non_martial: "Ajuda! Alguém!"
 hunt.4007.b.success: "[THIS.Char.GetTitledFirstNameNoTooltip|l] mata a fera"
 hunt.4007.b.failure: "[THIS.Char.GetTitledFirstNameNoTooltip|l] está ferid[THIS.Char.Custom('ES_OA')]"
 hunt.4007.b.critical_failure: "[THIS.Char.GetTitledFirstNameNoTooltip|l] é mort"
 hunt.4007.c: "Não é mais difícil de lidar do que um[similar_participant.Custom('ES_XA')] cortesão[similar_participant.Custom('ES_OA')] desprezado[similar_participant.Custom('ES_OA')]!"
 hunt.4007.d: "[bodyguard.GetFirstNameNoTooltip]! A mim!"
 hunt.4007.e: "#EMP PARA LONGE DE MIM, CRIATURA IMUNDA!#!"
 hunt.4007.f: "#EMP Fuja!#!"
 hunt.4900.t: "[activity.Custom('GetAnimalTypeKill')|U] fora de controle"
 hunt.4900.desc: "A grande fera para bem diante de nós, [activity.Custom('GetAnimalSoundParticipleKill')] e [activity.Custom('GetAnimalStrikeParticipleKill')] selvagemente."
 hunt.4900.hunter: "\n\nPuxo a faca do cinto e me interponho entre o exemplar de [activity.Custom('GetAnimalTypeKill')] e [similar_participant.GetFirstName] no exato momento em que o animal [activity.Custom('GetAnimalChargePresentKill')] para a frente.\n\nMinha lâmina encontra seu coração,"
 hunt.4900.hunter_wound: "mas não antes de ser jogado(a) para o lado, escapando por pouco de suas [activity.Custom('GetAnimalDangerKill')]..."
 hunt.4900.hunter_dead: "mas, olhando para baixo, suas [activity.Custom('GetAnimalDangerKill')] encontraram as minhas.\n\nA luz enfraquece enquanto eu estou caído(a) em um emaranhado de pelo, carne quente e sangue, com [similar_participant.GetFirstNameNoTooltip] chamando meu nome..."
 hunt.4900.hunter_kill: "suas [activity.Custom('GetAnimalDangerKill')] mal me atingem, e ele cai no chão em um monte..."
 hunt.4900.assist: "\n\n[similar_participant.GetFirstName] puxa sua faca do cinto e se interpõe entre mim e o exemplar de [activity.Custom('GetAnimalTypeKill')]. Ele grita \"Para trás, [ROOT.Char.GetTitleAsNameNoTooltip|l]!\", quando o animal [activity.Custom('GetAnimalChargePresentKill')] avança de repente.\n\nO tempo parece quase parar quando [similar_participant.GetFirstName] intercepta o borrão de [activity.Custom('GetAnimalFeatureKill')].\n\nQuando a poeira baixa, o exemplar de [activity.Custom('GetAnimalTypeKill')] jaz morto,"
 hunt.4900.assist_wound: "mas [similar_participant.GetFirstNameNoTooltip] está claramente ferid[similar_participant.Custom('ES_OA')]…"
 hunt.4900.assist_dead: "mas [similar_participant.GetFirstNameNoTooltip] também está..."
 hunt.4900.assist_kill: "e [similar_participant.GetFirstNameNoTooltip] fica em pé sobre ele, limpando sua lâmina com um sorriso..."
 hunt.4900.befriend: "\n\nEstendo a mão com calma. O [activity.Custom('GetAnimalChargeParticipleKill')] do animal se relaxa, confuso, antes de parar com hesitação bem fora de alcance, farejando meus dedos com desconfiança."
 hunt.4900.befriend_success: "\n\nAparentemente satisfeito(a), ele(a) boceja amplamente antes de se deitar a meus pés, como se fosse dormir."
 hunt.4900.befriend_wound: "\n\nSem aviso, ele avança novamente, me derrubando pesadamente antes de correr para longe e desaparecer de vista."
 hunt.4900.befriend_dead: "\n\nA fera se enrijece de repente, quase como se fizesse uma careta. Fico congelad[ROOT.Char.Custom('ES_OA')] , fechando os olhos enquanto a fera avança, com um [activity.Custom('GetAnimalSoundParticipleKill')] horrível."
 hunt.4900.bodyguard: "\n\nMeu guarda-costas, [bodyguard.GetFirstName], se lança à ação, espada em punho enquanto me faz sinal para que eu me coloque atrás de [bodyguard.GetSheHe] com o outro braço. \"Para trás, [ROOT.Char.Custom('FormOfAddressForLiege')]!\".\n\nO animal avança contra nós,"
 hunt.4900.bodyguard_wound: "e mal consigo ver como [bodyguard.GetSheHe] é dilacerad[bodyguard.Custom('ES_OA')] pela fera, embora [bodyguard.GetFirstNameNoTooltip] a derrube no processo…"
 hunt.4900.bodyguard_dead: "e mal consigo ver como [bodyguard.GetSheHe] é jogad[bodyguard.Custom('ES_OA')] para o lado como um boneco de trapo, apesar de ferir a fera. O animal ferido foge até desaparecer de vista enquanto [bodyguard.GetFirstNameNoTooltip] desaba sobre [host.GetCurrentLocation.Custom('GetProvinceGroundDesc')]."
 hunt.4900.bodyguard_saved: "e mal consigo ver como a lâmina habilmente empunhada de [bodyguard.GetFirstNameNoTooltip] atravessa seu corpo!"
 hunt.4900.scare: "\n\nEle rapidamente repensa sua atitude, recuando enquanto eu caminho lentamente em sua direção, agitando meus braços e gritando insultos. Por fim, ele vira e desaparece de vista."
 hunt.4900.flee: "\n\nViro-me e corro o mais rápido que posso, com o ofegante frenético e áspero de [similar_participant.GetFirstName] logo atrás de mim.\n\nLogo chegamos aos outros, onde as palavras nos escapam: \"#EMP [ROOT.Char.Custom('GetAnimalType')]#!\" e \"#EMP [ROOT.Char.Custom('GetAnimalDanger')]#!\" entre ofegos. Não se vê a fera em lugar algum."
 hunt.4900.a.hunter: "#EMP Así#! se mata a un/a [ROOT.Char.Custom('GetAnimalType')]."
 hunt.4900.a.dead: "#EMP [portrait.GetFirstNameNoTooltip]...#! você morreu bravamente..."
 hunt.4900.a.scare: "E não volte mais!"
 hunt.4900.a.flee: "Você não estava #EMP lá#!! Era #EMP ENORME#!!"
 hunt.4900.b: "Eu vou guardar algo para lembrar disso."
 hunt.4900.c: "#weak Astuto... mald...#!"
 hunt.4900.d: "Chega, vamos para casa!"
 hunt.4008.t: "Herdeiro Desgarrado"
 hunt.4008.t_2: "Um Erro Honesto"
 hunt.4008.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', hunt_participant)] , [hunt_participant.Custom('ES_ElLa')] [hunt_participant.GetTitledFirstName|l] , avançou à frente do grupo para perseguir sozinho um exemplar de [activity.Custom('GetAnimalType')] sozinho. Quando [hunt_participant.GetHerHim] o alcanço, [hunt_participant.GetHerHim] o vejo de pé sobre um[peasant.Custom('ES_XA')] plebeu[peasant.Custom('ES_OA')] , puxando para tirar uma flecha do peito de [peasant.Custom('ES_DelDela')] pobre [peasant.GetWomanMan].\n\nAo me ver, esconde a flecha atrás das costas. \"[ROOT.Char.GetTitleAsNameNoTooltip]! Eu… foi…"
 hunt.4008.animal: "o-o [activity.Custom('GetAnimalMale')] fez isso! Eu juro!\"\n\n"
 hunt.4008.fallback: "n-não foi minha culpa! Eu juro!\"\n\n"
 hunt.4008.closing: "Em breve, o resto do grupo alcançará e exigirá uma explicação."
 hunt.4008.a: "[hunt_participant.GetFirstNameNoTooltip] lutou bravamente para salvar[peasant.GetHerHim], eu vi!"
 hunt.4008.a.success: "Todos acreditam em mim"
 hunt.4008.a.failure: "As pessoas não acreditam na mentira"
 hunt.4008.b: "Rápido, me ajude a esconder o corpo!"
 hunt.4008.b.failure_tt: "O [secret|lE] de [secret.GetName] [hunt_participant.Custom('ES_DelDela')] [hunt_participant.GetTitledFirstName|l] é exposto"
 hunt.4008.b.success: "Conseguimos esconder o corpo"
 hunt.4008.b.failure: "O corpo é encontrado"
 hunt.4008.b.success_tt: "O corpo permanece escondido"
 hunt.4008.c: "Você #EMP deve#! responder por isso, [hunt_participant.GetFirstNameNoTooltip]!"
 hunt.4008.c.flavor: "Mesmo que fosse apenas um[peasant.Custom('ES_XA')] campones[peasant.Custom('ES_OA')]…"
 hunt.4008.d: "É uma pena que a besta também vos tenha apanhado, #EMP vos#!…"
 hunt.4009.t: "Caçado"
 hunt.4009.desc: "#EMP Crac!#!\nQuando o exemplar de [activity.Custom('GetAnimalType')] de aparência [activity.Custom('GetAnimalAdjective')] ao qual eu me aproximava desaparece no/a [host.GetCurrentLocation.Custom('GetTerrainType')], me viro em direção à origem do som.\n\n[schemer.Custom('ES_ElLa')|U] [schemer.GetTitledFirstName|l], meu [ROOT.Char.Custom2('RelationToMe', schemer)], está atrás de mim com a faca desembainhada e olhar assassino."
 hunt.4009.a: "Você não tem chance contra mim!"
 hunt.4009.a.success: "Eu escapo  [schemer.GetTitledFirstNameNoTooltip|l]"
 hunt.4009.a.failure: "Estou ferido, mas escapo de [schemer.GetTitledFirstNameNoTooltip|l]"
 hunt.4009.a.critical_failure: "[schemer.GetTitledFirstNameNoTooltip|l] me derrota"
 hunt.4009.b: "Socorro! Socorro! [saving_participant.GetFirstNameNoTooltip]!"
 hunt.4009.b.critical_success: "[saving_participant.GetTitledFirstNameNoTooltip|l] fere [schemer.GetTitledFirstNameNoTooltip|l] e escapamos"
 hunt.4009.b.failure: "[saving_participant.GetTitledFirstNameNoTooltip|l] está ferid[saving_participant.Custom('ES_OA')] mas escapamos de [schemer.GetTitledFirstNameNoTooltip|l]"
 hunt.4009.b.critial_failure: "[saving_participant.GetTitledFirstNameNoTooltip|l] não consegue me defender"
 hunt.4009.c: "Se eu conseguir voltar para o acampamento!"
 hunt.4009.c.failure: "[schemer.GetTitledFirstNameNoTooltip|l] me alcança"
 hunt.4010.desc: "#EMP Crac!#!\nQuando o exemplar de [activity.Custom('GetAnimalType')] de aparência [activity.Custom('GetAnimalAdjective')] a que eu e meu [ROOT.Char.Custom2('RelationToMeShort', targeted_participant)] nos aproximávamos desaparece no [host.GetCurrentLocation.Custom('GetTerrainType')], nos viramos na direção da origem do som.\n\n[schemer.Custom('ES_ElLa')|U] [schemer.GetTitledFirstName|l], meu [ROOT.Char.Custom2('RelationToMe', schemer)], está atrás de nós com a faca desembainhada, apontada para [targeted_participant.GetFirstName]."
 hunt.4010.a: "Não tema, meu [ROOT.Char.Custom2('RelationToMeShort', targeted_participant)] [targeted_participant.Custom('ES_OA')]!"
 hunt.4010.a.critical_success: "Ferindo [schemer.GetFirstNameNoTooltip] e afasto [schemer.Custom('ES_LoLa')]"
 hunt.4010.a.failure: "[schemer.GetFirstNameNoTooltip] me fere, mas ambos escapamos"
 hunt.4010.a.critical_failure: "Eu falho em defender [targeted_participant.GetFirstNameNoTooltip]"
 hunt.4010.b: "Boa sorte, [targeted_participant.GetFirstNameNoTooltip]."
 hunt.4010.b.critical_success: "[targeted_participant.GetFirstNameNoTooltip] fere [schemer.GetFirstNameNoTooltip] e [schemer.Custom('ES_LoLa')] afasta"
 hunt.4010.b.failure: "[targeted_participant.GetFirstNameNoTooltip] está ferid[targeted_participant.Custom('ES_OA')], mas escapa"
 hunt.4010.b.critical_failure: "[schemer.GetFirstNameNoTooltip] derrota [targeted_participant.GetFirstNameNoTooltip] e se livra de qualquer testemunha"
 hunt.4010.failure.murder_secret_tooltip: "Eu descubro o Segredo de Assassinato"
 hunt.4010.c: "Socorro! [schemer.GetFirstNameNoTooltip] está atacando minha [ROOT.Char.Custom2('RelationToMeShort', targeted_participant)]!"
 hunt.4010.d: "#EMP Nããã—!#!"
 hunt.4010.d.tt: "Essa opção está disponível porque você é Honrado(a)"
 hunt.4010.d.flavor: "#EMP Leve-me no lugar dele(a)!#!"
 hunt.4011.t: "Um Momento a Sós"
 hunt.4011.desc: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U], há um exemplar de [activity.Custom('GetAnimalType')]!\". Minha [ROOT.Char.Custom2('RelationToMe', lover_participant)], [lover_participant.Custom('ES_ElLa')] [lover_participant.GetTitledFirstName|l], faz um gesto para que [lover_participant.GetHerHim] o siga até [ROOT.Char.GetCurrentLocation.Custom('GetProvinceFoliageDesc')]. Uma vez escondidos na [host.GetCurrentLocation.Custom('GetTerrainType')] , ele/ela se vira e puxa minha [ROOT.Char.Custom('GetUpperClothingArticle')] por cima da cabeça.\n\n\"Finalmente um tempo a sós, [ROOT.Char.Custom('LoverPetName')] meu[ROOT.Char.Custom('ES_OA')]!\"."
 hunt.4011.a: "Oh [lover_participant.GetFirstNameNoTooltip]!"
 hunt.4011.a.tt: "Vamos fazer como fazem no Bestiarum Vocabulum!"
 hunt.4011.b: "Mas e [activity.Custom('GetAnimalType')]...?"
 hunt.4012.t: "[host.Custom('GetAnimalType')] [host.Custom('GetLegendaryColor')]"
 hunt.4012.desc: "Estou cavalgando à frente do grupo quando o/a [host.GetCurrentLocation.Custom('GetTerrainType')] fica subitamente em silêncio.\n\nO silêncio é quase palpável, e até o som dos cascos do meu cavalo parece se dissipar.\n\nQuando estou prestes a voltar para procurar os outros, o avisto um pouco adiante, embaçado como um sonho… um exemplar de [host.Custom('GetAnimalType')]"
 hunt.4012.black: "tão negro quanto o jet."
 hunt.4012.white: "tão branco quanto a neve."
 hunt.4012.a: "Como algo de um conto..."
 hunt.4012.a.tt: "#EMP Eu tenho que ter [host.Custom('GetAnimalType')]!#!"
 hunt.4012.a.sighting: "Os rumores #EMP eram#! verdadeiros...!"
 hunt.4012.b: "É apenas [host.Custom('GetAnimalType')]."
 hunt.4013.desc: "Sigo o rastro da besta até os/as [host.GetCurrentLocation.Custom('GetTerrainTypePlural')] como em transe, um silêncio antinatural paira pesado sobre o mundo.\n\n\"[ROOT.Char.GetTitleAsNameNoTooltip]! Estão aí!\" O grito repentino me assusta.\n\n"
 hunt.4013.guest: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] segue o rastro da besta até as [host.GetCurrentLocation.Custom('GetTerrainTypePlural')] como em um transe, um silêncio antinatural paira pesadamente sobre o mundo.\n\n\"[ROOT.Char.GetTitleAsNameNoTooltip]! Aí estáis!\". O grito repentino [host.GetHerHim] assusta.\n\n"
 hunt.4013.participant: "[hunt_participant.GetFirstName] e o resto do meu grupo me alcançaram."
 hunt.4013.closing: "Quando olho para trás, [activity.Custom('GetAnimalType')|l] desapareceu."
 hunt.4013.a: "Escapou, #EMP desta vez#!."
 hunt.4013.a.tt: "Você ganhará [stress|lE] a cada ano em que a fera escapa de você"
 hunt.4013.a_modifier: "Os moradores de [activity_place.GetNameNoTier] estão perturbados"
 hunt.4013.b: "Eu estava... fazendo reconhecimento à frente."
 hunt.4013.c: "Seus tolos! Eu quase a capturei!"
 hunt.4013.d: "Não vou perder tempo com essa loucura."
 hunt.4014.t: "Terreno Problemático"
 hunt.4014.desc: "Saltando através do [activity.GetCurrentPhase.GetLocation.Custom('GetProvinceFoliageDesc')], estamos quase alcançando nossa presa exausta; estamos perseguindo [activity.Custom('GetAnimalType')] há horas!\n\n"
 hunt.4014.fall: "Ao meu lado, o cavalo [hunt_participant.Custom('ES_DelDela')] [hunt_participant.GetTitledFirstName|l] perde de repente o equilíbrio e [hunt_participant.GetHerHim] o arremessa ao chão com um uivo.\n\n"
 hunt.4014.branch: "[hunt_participant.Custom('ES_ElLa')|U] [hunt_participant.GetTitledFirstName|l] se vira para gritar para mim, sem perceber que há um galho baixo de [ROOT.Char.GetCurrentLocation.Custom('GetRandomRegionalWood')] bem à frente!\n\n"
 hunt.4014.cry: "Não consigo evitar e grito involuntariamente: \"[hunt_participant.GetFirstNameNoTooltip]!\"\n\n"
 hunt.4014.dead_care: "Desmonto e corro até [hunt_participant.Custom('ES_ElLa')] [hunt_participant.GetWomanMan] encolhid[hunt_participant.Custom('ES_OA')], mas meus piores temores se confirmam rapidamente…"
 hunt.4014.dead: "Meu [ROOT.Char.Custom2('RelationToMe', hunt_participant)] jaz muito imóvel, contorcid[hunt_participant.Custom('ES_OA')] em uma postura antinatural, mas estranhamente sereno."
 hunt.4014.wounded: "Não é nada fatal, mas [hunt_participant.GetSheHe] se contorce de dor."
 hunt.4014.fall_host: "Uma leve tensão em meu cavalo é meu único aviso antes de eu ser arremessado pelo ar, a terra se aproximando rapidamente."
 hunt.4014.branch_host: "Me viro para gritar algo para [hunt_participant.GetFirstName], que olha à frente com o rosto contorcido de alarme. Tarde demais, eu vejo: bem diante dos meus olhos, um grande galho de [ROOT.Char.GetCurrentLocation.Custom('GetRandomRegionalWood')]."
 hunt.4014.dead_host: "Não sinto o chão me receber. O tempo parece desacelerar. O céu escurece acima de mim, onde figuras se movimentam, seus gritos abafados ecoando através de uma névoa confusa."
 hunt.4014.wounded_host: "\n\nVolto em mim na [activity.GetCurrentPhase.GetLocation.Custom('GetProvinceGroundDesc')], esparramad[GetPlayer.Custom('ES_OA')] no chão, a dor percorre meu corpo."
 hunt.4014.dead_host_courtier: "Vejo o rosto [hunt_participant.Custom('ES_DelDela')] [hunt_participant.GetTitledFirstName|l] movendo os lábios, com uma cara tão branca quanto a de um fantasma e me lembro dos cavalos…"
 hunt.4014.wounded_host_courtier: "\"Meu [host.GetTitleAsNameNoTooltip]! Você se machucou?!\", grita [hunt_participant.Custom('ES_ElLa')] [hunt_participant.GetTitledFirstName|l], desmontando do cavalo."
 hunt.4014.a: "Eu vou cuidar [hunt_participant.GetHerHim]."
 hunt.4014.a.physician: "Fique quieto, sou treinado em medicina!"
 hunt.4014.a.learning: "Aguente firme, eu sei o que fazer!"
 hunt.4014.a.success: "Você faz o curativo da ferida de [hunt_participant.GetFirstNameNoTooltip]"
 hunt.4014.a.failure: "Você estraga o curativo"
 hunt.4014.b: "Vamos dar um tempo para [hunt_participant.GetFirstNameNoTooltip]..."
 hunt.4014.b.physician: "Diga-me como tratar você, doutor."
 hunt.4014.c: "[physician.GetFirstNameNoTooltip]! #EMP Onde está [physician.GetFirstNameNoTooltip]?!#!"
 hunt.4014.c.host: "E então? Não fique apenas olhando [physician.GetFirstNameNoTooltip]!"
 hunt.4014.c.success: "[physician.GetFirstNameNoTooltip] cuida do ferimento"
 hunt.4014.c.failure: "[physician.GetFirstNameNoTooltip] estraga o curativo"
 hunt.4014.d: "Eu preciso continuar! [activity.Custom('GetAnimalType')] está escapando!"
 hunt.4014.e: "É hora de encerrar por hoje..."
 hunt.4014.f: "Estou bem! ah! #EMP Estou bem!#! Ela está fugindo!"
 hunt.4014.f.flavor: "#EMP Rápido! Meu cavalo!#!"
 hunt.4014.g: "L-levem-me de volta ao acampamento..."
 hunt.4014.g.flavor: "#EMP Preciso deitar...#!"
 hunt.4014.h.physician: "#weak [physician.GetFirstNameNoTooltip]... Tra-traga...!#!"
 hunt.4014.h: "#weak O... [activity.Custom('GetAnimalType')]...!#!"
 hunt.4015.t: "Os Amantes"
 hunt.4015.desc: "Seguimos nossa presa até a [host.GetCurrentLocation.Custom('GetTerrainType')], aproximando-me lenta mas seguramente desse exemplar de [activity.Custom('GetAnimalType')] de aparência [activity.Custom('GetAnimalAdjective')].\n\nDe repente, ele se assusta e sai [activity.Custom('GetAnimalChargeParticiple')] em outra direção. Quando me aproximo para ver o que o assustou, mal posso acreditar no que vejo: [lover_participant.Custom('ES_ElLa')] [lover_participant.GetTitledFirstNameNoTooltip|l] e [second_lover_participant.Custom('ES_ElLa')] [second_lover_participant.GetTitledFirstNameNoTooltip|l] enredados no chão em um abraço apaixonado."
 hunt.4015.a: "Recuar lentamente... Eu não vi nada."
 hunt.4015.b: "\"Isso é uma desgraça! Parem imediatamente!\""
 hunt.4015.c_4: "\"[lover_participant.GetFirstNameNoTooltip]! [second_lover_participant.GetFirstNameNoTooltip]! E quanto a #EMP mim#!?\""
 hunt.4015.c_1: "\"[lover_participant.GetFirstNameNoTooltip], você estava me escondendo algo!\""
 hunt.4015.c_2: "\"[second_lover_participant.GetFirstNameNoTooltip], você estava me escondendo algo!\""
 hunt.4015.c_3: "\"Ohoho, esta é uma festa da qual eu posso participar!\""
 hunt.4015.d: "\"[second_lover_participant.GetTitledFirstNameNoTooltip|l], como você pôde?!\""
 hunt.4015.d_2: "\"[lover_participant.GetTitledFirstNameNoTooltip|l], como você pôde?!\""
 hunt.4015.e: "\"Levante-se, sinto que a fera está por perto!\""
 hunt.4016.t: "O Troféu"
 hunt.4016.desc: "Nós devemos ter perseguido por todo o [ROOT.Char.Custom('TerrainType')] duas vezes, e ainda não estamos mais perto de encurralar [activity.Custom('GetAnimalType')]...\n\nTodos esperam que eu volte triunfante, com um troféu, mas como as coisas estão, eu voltarei para casa apenas com vergonha."
 hunt.4016.a: "No mercado mais próximo deve haver [activity.Custom('GetAnimalType')]..."
 hunt.4016.b.success: "As pessoas acreditam no meu plano"
 hunt.4016.b.failure: "Meu engano é descoberto"
 hunt.4016.b.tt: "O [activity.GetShortName] terá sucesso — de certa forma"
 hunt.4016.c: "Eu não vou me rebaixar tanto, prefiro voltar de mãos vazias!"
 hunt.4017.desc: "Deixo meu séquito para trás e vasculho os/as [host.GetCurrentLocation.Custom('GetTerrainTypePlural')] em busca do exemplar de [activity.Custom('GetAnimalType')] de cor [activity.Custom('GetLegendaryColor')] que tem me assombrado.\n\nDe repente, é como se eu estivesse debaixo d'água; o som fica abafado, e a luz, etérea. Ali!\n\nDiante de mim está o/a [host.GetCurrentLocation.Custom('GetTerrainType')], congelado/a ao redor dele/a — como se estivesse olhando diretamente para a minha #EMP alma#!."
 hunt.4017.a: "Este é o meu momento!"
 hunt.4017.a.tt: "#EMP Ele nem tenta fugir...#!"
 hunt.4018.desc: "Uma quietude repentina cai sobre o [host.GetCurrentLocation.Custom('GetTerrainType')]. Virando-me em minha sela, vejo isso claramente — [activity.Custom('GetAnimalType')] [activity.Custom('GetLegendaryColor')].\n\nAntes que eu tenha tempo de chamar os outros, ele desaparece na [host.GetCurrentLocation.Custom('GetProvinceFoliageDesc')] como uma aparição..."
 hunt.4018.a: "Vasculhe a área! #EMP Encontre aquele [activity.Custom('GetAnimalType')]!#!"
 hunt.4018.a.tt: "#EMP Deve estar por aqui! Em algum lugar...#!"
 hunt.4018.b: "Esqueça. Já se foi..."
 hunt.4018.a.success: "Você encontra [activity.Custom('GetAnimalType')] [activity.Custom('GetLegendaryColor')]"
 hunt.4018.a.animal: "Você encontra outro animal"
 hunt.4018.a.failure: "[activity.Custom('GetAnimalType')] [activity.Custom('GetLegendaryColor')] escapa"
 hunt.4019.courtier: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U]!\", sibila meu [ROOT.Char.Custom2('RelationToMe', hunt_participant)], [hunt_participant.GetFirstName], fazendo gestos para eu me aproximar e apontando para o outro lado de [host.GetCurrentLocation.Custom('GetTerrainTypePlural')]."
 hunt.4019.fallback: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U]!\", um mestre de caça sibila, fazendo gestos para mim e apontando para o outro lado de [host.GetCurrentLocation.Custom('GetTerrainType')]."
 hunt.4019.desc: "\n\n\"Ali! Vedes esse [activity.Custom('GetAnimalType')]? É o animal que procurais?\".\n\nÀ nossa frente há um exemplar perfeitamente comum de [activity.Custom('GetAnimalType')], sem sequer um único tufo de pelagem [activity.Custom('GetLegendaryColor')]."
 hunt.4019.a: "...sim, bem visto."
 hunt.4019.a.tt: "Terá que servir... #EMP por enquanto#!."
 hunt.4019.b: "Você acha que isso #EMP parece#! [activity.Custom('GetLegendaryColor')]?!"
 hunt.5001.t: "Flores Silvestres"
 hunt.5001.desc: "É um belo dia para caçar, o que significa que é um bom dia para estar ao ar livre. Enquanto encho os pulmões com o ar fresco da natureza,"
 hunt.5001.desc.witch: "Avisto um tesouro de presentes da mãe natureza."
 hunt.5001.desc.religious: "Vejo ao longe o que só pode ser um presente de, ou dedicação da natureza a, [ROOT.Char.GetFaith.HealthGodName]."
 hunt.5001.desc.ending: "\n\nTantas ervas úteis e flores bonitas! Tanto para cura quanto para intenções malignas — mas estou aqui para caçar! Colher [host.GetCurrentLocation.Custom('get_region_flower_type_plural')] pode causar algumas suspeitas..."
 hunt.5001.a: "Devo manter as aparências."
 hunt.5001.b: "Por que devo me importar com o que os outros pensam?"
 hunt.5001.c: "\"Ei, o que é aquilo ali!?\""
 hunt.5001.c.success: "[hunt_participant.GetTitledFirstNameNoTooltip|l] cai na mais antiga das artimanhas"
 hunt.5001.d: "Esqueça as flores: olhe para estas ervas!"
 hunt.5001.d.poisonous: "#EMP Presentes de [ROOT.Char.GetFaith.DeathDeityName]...#!"
 hunt.5001.d.medicinal: "#EMP Presentes de [ROOT.Char.GetFaith.HealthGodName]...#!"
 hunt.5002.opening_position: "Meu [hunt_participant.GetHeldCourtPositionsString] , [hunt_participant.GetFirstName] , desmontou e se agacha no [hunt_participant.GetCurrentLocation.Custom('GetProvinceGroundDesc')] , examinando cuidadosamente uma flor de [host.GetCurrentLocation.Custom('get_region_flower_type')]."
 hunt.5002.opening: "Meu [ROOT.Char.Custom2('RelationToMe', hunt_participant)], [hunt_participant.GetFirstName], está agachad[hunt_participant.Custom('ES_OA')] no chão, cantarolando alegremente, colhendo [host.GetCurrentLocation.Custom('get_region_flower_type_plural')]."
 hunt.5002.second_position: "Ao lado de [hunt_participant.GetSheHe], meu [hunt_participant_2.GetHeldCourtPositionsString], [hunt_participant_2.GetFirstName], fala animadamente, apontando para as pétalas."
 hunt.5002.second: "[hunt_participant_2.GetFirstName], meu [ROOT.Char.Custom2('RelationToMe', hunt_participant_2)], olha por cima do ombro, ouvindo atentamente.\n\n"
 hunt.5002.alone: "[hunt_participant.GetSheHe] parece ter perdido todo interesse na caçada.\n\n"
 hunt.5002.gardener: "\"Ah, [ROOT.Char.GetTitleAsNameNoTooltip], essas flores exquisitas me deram uma ideia para novos arranjos — #EMP essas#! ficariam perfeitas nas bordas dos caminhos do palácio...\""
 hunt.5002.physician: "\"[ROOT.Char.GetTitleAsNameNoTooltip], olhe todas as ervas e flores úteis aqui! Essa pode aliviar dores! Essa ajuda um osso [hunt_participant.Custom('RandomSaintBone')|l] quebrado! Essa afasta [hunt_participant.Custom('RandomDisease')|l]..\""
 hunt.5002.desc: "\"[ROOT.Char.GetTitleAsNameNoTooltip], que abundância da natureza! Olhe para essas plantas! Verdadeiramente, a riqueza da terra não tem limites — não apreciamos esses tesouros simples o suficiente.\""
 hunt.5002.a: "#EMP Volte#! ao seu cavalo!"
 hunt.5002.a.second: "#EMP Voltem#! aos seus cavalos!"
 hunt.5002.a.flavor: "#EMP Estamos aqui pel[activity.Custom('GetAnimalType')]!#!"
 hunt.5002.b: "Fascinante! Que flor é #EMP aquela#!?"
 hunt.5002.c: "V-você está praticando #EMP bruxaria#!...?"
 hunt.5002.c.known: "Pare com essa bruxaria agora mesmo, mag[hunt_participant.Custom('ES_OA')] repugnante!"
 hunt.5002.c.flavor: "#EMP Magia negra! Veneno!#!"
 hunt.5002.d: "… você está chamando atenção, [hunt_participant.Custom('SisterBrother')]."
 hunt.5002.d.flavor: "#EMP Devemos proteger o caminho de [ROOT.Char.GetFaith.WitchGodName]...#!"
 hunt.5002.e: "Você tem um bom olho, de fato!"
 hunt.5002.e.flavor: "#EMP Deixe-me contar tudo sobre elas...#!"
 hunt.5002.e.gardener: "Tenho #EMP procurado#! mais dessas!"
 hunt.5002.e.herbalist: "Sim, e #EMP esta#! talvez seja a erva mais útil!"
 hunt.5002.g: "Suponho que novas flores #EMP seriam#! agradáveis..."
 hunt.5002.g.present: "[gardener.GetFirstNameNoTooltip], aqui!"
 hunt.5002.g.elsewhere: "[gardener.GetFirstNameNoTooltip] #EMP apreciaria#! essas flores..."
 hunt.5002.h: "Meu médico[physician.Custom('ES_OA')] terá o que precisar."
 hunt.5002.h.present: "[physician.GetFirstNameNoTooltip], aqui!"
 hunt.5002.h.elsewhere: "[physician.GetFirstNameNoTooltip] poderia usar essas ervas..."
 hunt.5002.cp_flavor: "#EMP ...mas seguiremos em frente!#!"
 hunt.5002.cp_present_flavor: "#EMP [hunt_participant.GetFirstNameNoTooltip] tem trabalho para você, curandeir[physician.Custom('ES_OA')]!#!"
 hunt.5002.cp_elsewhere_flavor: "#EMP Você não se importa de ficar para colher, não é?#!"
 hunt.5003.opening: "Em um raro momento de tranquilidade, passo algum tempo em silêncio, apreciando a beleza da natureza."
 hunt.5003.desc_woo: "De repente me surpreende meu [ROOT.Char.Custom2('RelationToMeShort', hunt_participant)], [hunt_participant.GetFirstName], que ri: \"Um presente para meu [ROOT.Char.GetTitleAsNameNoTooltip]\".\n\n"
 hunt.5003.desc: "Enquanto meu estresse desaparece, ouço meu [ROOT.Char.Custom2('RelationToMeShort', hunt_participant)], [hunt_participant.GetFirstName]: \"#EMP Mi amor#!\".\n\n"
 hunt.5003.desc.flower: "[hunt_participant.GetFirstNameNoTooltip] coloca algo atrás da minha orelha. \"Embora não se iguale em nada à sua beleza, esta flor de [newly_created_artifact.Custom('ArtifactVariableFlowerSpecies')] me lembrou de você\"."
 hunt.5003.desc.animal: "[hunt_participant.GetSheHe|U] ergue os restos ensanguentados de uma lebre. \"Eu matei esse pequenino em sua honra, um símbolo do meu compromisso de lutar ao seu lado para sempre.\""
 hunt.5003.ending: "\n\n[hunt_participant.GetFirstNameNoTooltip] sorri, admirando seu trabalho."
 hunt.5003.ending_lover: "\"Você parece tão em paz. Fico feliz.\"  rapidamente me dá um beijo casto na bochecha, como se fôssemos os únicos no mundo."
 hunt.5003.ending_woo: "\"Fico feliz por ter encontrado você a sós\", [hunt_participant.GetFirstNameNoTooltip] cora levemente, e seu olhar comunica algo… não dito."
 hunt.5003.a: "Você está #EMP tentando#! ser pego(a)?!"
 hunt.5003.b: "Eu #EMP vou guardar#! isso, meu querido."
 hunt.5003.b.woo: "Obrigado, é muito bonito."
 hunt.5003.b.tt: "Alguém poderia descobrir seu relacionamento [Concept( 'secret', 'secreta' )|E]"
 hunt.5003.c: "Não tenho uso para isso."
 hunt.5003.d: "Venha aqui, meu amor."
 hunt.5003.d.woo: "Venha aqui, estamos bem sozinhos..."
 hunt.5010.t: "Uma Cervatilha Amedrontada [activity.Custom('GetAnimalFemale')]"
 hunt.5010.desc: "Enquanto nos embrenhamos em [ROOT.Char.GetCurrentLocation.Custom('GetProvinceFoliageDesc')] no encalço do meu [activity.Custom('GetAnimalType')], chegamos a uma clareira sem saída sob uma pequena escarpa.\n\nUm gemido audível de decepção e irritação surge do grupo: uma corça aterrorizada e seu filhote se escondem em [ROOT.Char.GetCurrentLocation.Custom('GetProvinceGroundDesc')]; devemos ter seguido seus rastros em nossa pressa...\n\nNão faz sentido caçá-los: teremos de voltar e farejar o [activity.Custom('GetAnimalMale')] de novo antes que seja tarde demais."
 hunt.5010.a: "Presas são presas, vamos acabar com isso."
 hunt.5010.b: "Pegue o [activity.Custom('GetAnimalChild')] para domesticar!"
 hunt.5010.c: "Encontre aquele [activity.Custom('GetAnimalMale')]!"
 hunt.5050.t: "Arrancado dos Céus"
 hunt.5050.desc: "Meu [activity.Custom('GetRaptorType')] decola de seu poleiro magnificamente, seguindo direto para um exemplar de [activity.Custom('GetAnimalType')] de cor [activity.Custom('GetAnimalColor')] escondido em [host.GetCurrentLocation.Custom('GetProvinceFoliageDesc')].\n\nQuando atinge o auge, ecoa sobre nossas cabeças um grito lancinante, alto e agudo demais para pertencer a qualquer uma de #EMP nuestras#! aves.\n\nAssim que meu [activity.Custom('GetRaptorType')] começa a mergulhar em picada, é ele próprio atacado por uma enorme [host.Custom('GetRegionalEagleType')] — arrancando-o do ar em uma violenta chuva de penas!"
 hunt.5050.a: "Maldito canalha! Vamos atrás dele!"
 hunt.5050.a.success: "Você vinga seu [activity.Custom('GetRaptorType')]"
 hunt.5050.a.failure: "O pássaro escapa"
 hunt.5050.b: "Parece que eu vou precisar do #EMP seu#! [activity.Custom('GetRaptorType')], [hunt_participant.GetFirstNameNoTooltip]."
 hunt.5050.c: "Ah, uma de suas penas."
 hunt.5050.c.tt: "Você receberá um trinket de pena [artifact|lE]"
 hunt.5050.d: "A natureza é cruel..."
 hunt.5060.t: "Debaixo das Minhas Asas"
 hunt.5060.desc: "Meu grupo e eu nos embrenhamos em um bosquezinho, atentos a qualquer sinal de um exemplar de [activity.Custom('GetAnimalType')]. Do alto da copa das árvores, ouve-se um suave gorjeio, que vai ficando mais forte à medida que avançamos.\n\nÉ um filhote piando por sua mãe!\n\nUm hábil caçador traz para baixo um filhote de ave de rapina ainda sem penas de [ROOT.Char.GetCurrentLocation.Custom('GetRandomRegionalWood')]. Que sorte! Só as aves jovens capturadas na natureza podem ser devidamente treinadas para caçar."
 hunt.5060.a: "Levem-no de volta ao meu alojamento."
 hunt.5060.b: "Aqui está, [hunt_participant.GetFirstNameNoTooltip], um presente!"
 hunt.5060.c: "Coloque-o de volta."
 hunt.7001.t: "Um Encontro Lamacento"
 hunt.7001.desc: "À medida que nos aprofundamos em [host.GetCurrentLocation.GetNameNoTooltip], o chão fica mais úmido e o ar mais pesado.\n\nDe repente, de entre a vegetação que nos cerca, surge um gigante, oculto sob camadas e camadas de roupa suja.\n\n\"Explique-se!\", grita ele, \"O que vocês estão fazendo em #EMP meu#! pântano?\""
 hunt.7001.adventurer: "Você não preferiria ver o mundo conosco?"
 hunt.7001.a: "#EMP No seu#! pântano, é? Então nos mostre ao redor."
 hunt.7001.b: "Vamos conversar sobre isso."
 hunt.7001.b_success: "O homem entende meus argumentos... acho."
 hunt.7001.b_failure: "O lunático é inalcançável pela lógica."
 hunt.7001.c: "Finalmente! Algo para caçar!"
 hunt.7001.d: "Saia do meu caminho, rústico maldito!"
 hunt.7011.t: "Preso em uma Armadilha"
 hunt.7011.desc: "Quando [hunt_participant.Custom('ES_ElLa')] [hunt_participant.GetTitledFirstName|l] e eu caminhávamos por um terreno complicado, quase levo um susto daqueles ao ouvir um ganido estrondoso.\n\n"
 hunt.7011.snare: "Viro-me e vejo meu [ROOT.Char.Custom2('RelationToMe', hunt_participant)] jogad[hunt_participant.Custom('ES_OA')] no chão, com uma armadilha apertando com força a panturrilha de"
 hunt.7011.bear: "Viro-me e vejo o pé de meu [ROOT.Char.Custom2('RelationToMe', hunt_participant)] preso na boca de uma armadilha para ursos que desponta ameaçadora entre os espinheiros."
 hunt.7011.pit: "Me viro e vejo que meu [ROOT.Char.Custom2('RelationToMe', hunt_participant)] caiu em uma armadilha de fosso oculta, que agora prende firmemente sua perna no lugar."
 hunt.7011.alive: "\n\n[hunt_participant.GetSheHe|U] aúlla de dor,"
 hunt.7011.noble: "\"Argh! Esses malditos plebeus! Por que não caçam como [hunt_participant.GetWomenMen]?!\"."
 hunt.7011.lowborn: "\"Minha perna! Argh! Eu não vi essa maldita coisa! #EMP Argh!#!\""
 hunt.7011.dead: "\n\nPrecisamos seguir em frente, senão perderemos [activity.Custom('GetAnimalType')]!"
 hunt.7011.a: "Preciso seguir em frente, senão perderemos [activity.Custom('GetAnimalType')]!"
 hunt.7011.b: "[physician.GetFirstNameNoTooltip]! Onde está [physician.GetFirstNameNoTooltip]?"
 hunt.7011.c: "Meus homens vão levá-lo de volta."
 hunt.7011.d: "Infelizmente, você caiu muito forte..."
 hunt.7011.d.success: "Ninguém percebe"
 hunt.7011.d.failure: "Alguém está desconfiado"
 hunt.7011.d.flavor: "#EMP … y te das con una roca en la cabeza…#!"
 hunt.7011.e: "Encontrem os caçadores e cortem suas mãos."
 hunt.7011.e.flavor: "#EMP Ninguém rouba [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetTitleAsNameNoTooltip]!#!"
 hunt.7011.e.hunting_grounds: "Esta opção está disponível por causa do [building|lE] $building_type_hunting_grounds_01$ de [host.GetCurrentLocation.GetTitle.GetBaseNameNoTierNoTooltip]"
 hunt.7011.e.royal_forests: "Esta opção está disponível por [building|lE] $building_type_royal_forest_01$ de [host.GetCurrentLocation.GetTitle.GetBaseNameNoTierNoTooltip]"
 hunt.7020.t: "Desafiando a Gravidade"
 hunt.7020.desc: "O grupo parou, distraído por um afloramento de pedras arredondadas no alto de uma encosta. [onlooker.Custom('ES_ElLa')|U] [onlooker.GetTitledFirstName|l] empurra uma delas.\n\nTodos observam, encantados, enquanto a pedra rola ladeira abaixo, ganha velocidade e chega ao pé da colina com um baque satisfatório.\n\n"
 hunt.7020.murder: "Eu me pergunto... [pertinent.GetFirstNameNoTooltip] é arrogante o suficiente para cair nisso..."
 hunt.7020.woo: "Como provar melhor meu valor para [pertinent.GetFirstNameNoTooltip] do que saltar sobre uma pedra?"
 hunt.7020.befriend: "Esta pode ser a oportunidade que eu estava esperando para criar laços com [pertinent.GetFirstNameNoTooltip]."
 hunt.7020.bravado: "Diga, essa pode ser uma chance de impressionar a todos..."
 hunt.7020.a.intent: "Observem isso, [pertinent.GetFirstNameNoTooltip]!"
 hunt.7020.a: "Todos, ajudem [onlooker.GetFirstNameNoTooltip] a empurrar a grande para mim!"
 hunt.7020.a.flavor: "#EMP É apenas um seixo!#!"
 hunt.7020.b: "Empurre outra, eu vou saltar por cima!"
 hunt.7020.b.flavor: "#EMP Eu vou superá-la com facilidade!#!"
 hunt.7020.c.rival: "Covarde demais[pertinent.Custom('ES_OA')] para pular isso, [pertinent.GetFirstNameNoTooltip]?"
 hunt.7020.c: "[pertinent.GetFirstNameNoTooltip], você consegue pular?"
 hunt.7020.c.flavor: "#EMP O que poderia dar errado?#!"
 hunt.7020.d: "Vamos lá, [pertinent.GetFirstNameNoTooltip], vamos ver quem consegue pular mais!"
 hunt.7020.d.flavor: "#EMP Com cuidado agora!#!"
 hunt_boulder_jump_success_both: "Ambos vocês conseguem pular as pedras"
 hunt_boulder_jump_success_self: "Você consegue pular a pedra"
 hunt_boulder_jump_success_pertinent: "[pertinent.GetFirstNameNoTooltip] consegue pular a pedra"
 hunt_boulder_jump_failure_self: "Você se machucou #negative_value herid[GetPlayer.Custom('ES_OA')]#!"
 hunt_boulder_jump_failure_pertinent: "[pertinent.GetFirstNameNoTooltip] sofre #negative_value herid[pertinent.Custom('ES_OA')]#!"
 hunt_boulder_jump_failure_both: "Vocês dois estão #negative_value feridos#!"
 hunt_boulder_jump_refusal: "[pertinent.GetFirstNameNoTooltip] recusa seu desafio"
 hunt_boulder_impressed_title: "Salto impressionante"
 hunt.7020.e: "Muito bem, vamos continuar."
 hunt.7020.e.flavor: "#EMP Seria bobagem fazer de outra forma...#!"
 hunt.7100.t: "Um Momento para Conversar"
 hunt.7100.opening: "Enquanto esperamos os cães encontrarem o cheiro, o grupo descansa à sombra. [woo_target.GetFirstName] descansa por perto: esse seria o momento perfeito para uma conversa inocente."
 hunt.7100.married: "Ajo enquanto o [woo_target.GetPrimarySpouse.GetWifeHusband] , [woo_target.GetPrimarySpouse.GetTitledFirstName|l] , está distraíd[woo_target.GetPrimarySpouse.Custom('ES_OA')]."
 hunt.7100.married_absent: "Seu [woo_target.GetPrimarySpouse.GetWifeHusband] , [woo_target.GetPrimarySpouse.GetTitledFirstName|l] está longe…"
 hunt.7100.currentspouse: "Talvez hoje eu conquiste meu [woo_target.GetWomanMan]!"
 hunt.7100.desc: "\n\n\"Ah, [woo_target.GetTitledFirstName|l], é um bom dia para isso, confio que você esteja se divertindo\", inicio com indiferença.\n\nEstou quase cer[GetPlayer.Custom('ES_OA')] de que o sorriso dele/dela é mais do que apenas educado."
 hunt.7100.a: "Não há nada melhor do que uma boa caçada!"
 hunt.7100.a.tt: "#F Apele para o lado ativo de [woo_target.GetFirstNameNoTooltip].#!"
 hunt.7100.b: "Domar e voar com um [activity.Custom('GetRaptorType')] é viver de verdade."
 hunt.7100.b.tt: "#F Apele para o lado social de [woo_target.GetFirstNameNoTooltip].#!"
 hunt.7100.c: "Às vezes, sinto pena dos pobres animais."
 hunt.7100.c.tt: "#F Apele para o lado compassivo de [woo_target.GetFirstNameNoTooltip].#!"
 hunt.7100.d: "Eu preferiria estar fazendo algo útil, é claro."
 hunt.7100.d.tt: "#F Apele para o lado diligente de [woo_target.GetFirstNameNoTooltip].#!"
 hunt.7100.e: "Uma floresta bem administrada transborda com os presentes de [ROOT.Char.GetFaith.HighGodNamePossessive]."
 hunt.7100.e.tt: "#F Apele para o lado administrativo de [woo_target.GetFirstNameNoTooltip].#!"
 hunt.7101.reply_hunter: "\"$hunt.7100.a$\"\n\n"
 hunt.7101.reply_falconer: "\"$hunt.7100.b$\"\n\n"
 hunt.7101.reply_pity: "\"$hunt.7100.c$\"\n\n"
 hunt.7101.reply_wastrel: "\"$hunt.7100.d$\"\n\n"
 hunt.7101.reply_steward: "\"$hunt.7100.e$\"\n\n"
 hunt.7101.opening: "[woo_actor.Custom('ES_ElLa')|U] [woo_actor.GetTitledFirstName|l] se aproxima a mim enquanto o grupo descansa à sombra, esperando os cães encontrarem o rastro.\n\n[woo_actor.GetFirstNameNoTooltip] pensa por um momento antes de oferecer:"
 hunt.7101.hunter: "$hunt.7101.reply_hunter$Não posso negar que a emoção, a ação, é uma alegria."
 hunt.7101.falconer: "$hunt.7101.reply_falconer$Eu entendo o simbolismo ao qual [woo_actor.GetSheHe] se refere."
 hunt.7101.pity: "$hunt.7101.reply_pity$Talvez [woo_actor.GetSheHe] seja diferente dos outros."
 hunt.7101.wastrel: "$hunt.7101.reply_wastrel$É uma[woo_actor.Custom('ES_XA')] [woo_actor.GetWomanMan] pessoa que vai longe."
 hunt.7101.steward: "$hunt.7101.reply_steward$Realmente há beleza na natureza organizada."
 hunt.7101.fallback: "É difícil para mim pensar em uma resposta."
 hunt.7101.a: "Não posso negar que [woo_actor.GetSheHe] tem um certo charme..."
 hunt.7102.hunter: "$hunt.7101.reply_hunter$\n\nNão consigo evitar uma sensação de repulsa interna..."
 hunt.7102.falconer: "$hunt.7101.reply_falconer$\n\nTamanho arrogância..."
 hunt.7102.pity: "$hunt.7101.reply_pity$\n\nAprenda a aceitar um elogio, pelo amor de Deus!"
 hunt.7102.wastrel: "$hunt.7101.reply_wastrel$\n\n"
 hunt.7102.steward: "$hunt.7101.reply_steward$\n\n"
 hunt.7102.fallback: "[woo_actor.GetSheHe|U] me sorri com cumplicidade, o que me deixa #EMP muito#! desconfortá[GetPlayer.Custom('ES_OA')]."
 hunt.7102.a: "Que [woo_actor.GetWomanMan] mais ridícul[woo_target.Custom('ES_OA')]."
 hunt.7103.reply: "[woo_target.Custom('ES_ElLa')|U] [woo_target.GetTitledFirstName|l] parece ter reagido calorosamente à minha manobra"
 hunt.7103.hunter: "$hunt.7103.reply$, com os olhos em chamas enquanto acena vigorosamente."
 hunt.7103.falconer: "$hunt.7103.reply$, quase parecendo me examinar com um novo olhar."
 hunt.7103.pity: "$hunt.7103.reply$, lamentando os esportes violentos de nosso tempo e classe."
 hunt.7103.wastrel: "$hunt.7103.reply$, claramente surpreso[woo_target.Custom('ES_OA')] por ter encontrado uma alma gêmea."
 hunt.7103.steward: "$hunt.7103.reply$, feliz por ter encontrado alguém que também encontra alegria em tais coisas."
 hunt.7103.fallback: "$hunt.7103.reply$, olhando profundamente em meus olhos."
 hunt.7103.desc: "\n\nQuando ela vai embora, a tensão é palpável em cada cortesia: eu sabia que encontraria as palavras certas para conquistar[woo_target.GetHerHim]!"
 hunt.7103.a: "Acho que já mordeu a isca…"
 hunt.7104.reply: "Parece que minha resposta não impressionou [woo_target.Custom('ES_AlAla')] [woo_target.GetTitledFirstName|l]"
 hunt.7104.hunter: "$hunt.7104.reply$, pois [woo_target.GetSheHe] desvia o olhar quando me agradece e se vai rapidamente."
 hunt.7104.falconer: "$hunt.7104.reply$, pois [woo_target.GetSheHe] revira os olhos com desdém."
 hunt.7104.pity: "$hunt.7104.reply$, pois rapidamente perde o interesse, desanimad[woo_target.Custom('ES_OA')] pelas minhas palavras."
 hunt.7104.wastrel: "$hunt.7104.reply$, pois olha para cima e parece que presta apenas metade da atenção."
 hunt.7104.steward: "$hunt.7104.reply$, pois olha por cima e parece que está apenas ouvindo pela metade."
 hunt.7104.fallback: "$hunt.7104.reply$, pois não consegue deixar minha companhia tão cedo."
 hunt.7104.desc: "\n\nAo me ver sozinho depois de que [woo_target.GetSheHe] se despediu, não consigo evitar sentir-me um tolo por esse erro tão grave…"
 hunt.7104.a: "O que eu estava pensando...?"
 hunt.7200.t: "O Jogo Real"
 hunt.7200.desc: "Enquanto deixamos nosso acampamento e avançamos mais fundo por [host.GetCurrentLocation.Custom('GetTerrainTypePlural')] não tiro os olhos de [ROOT.Char.Custom2('DescriptorNegative', murder_target)] [murder_target.Custom('ES_ElLa')] [murder_target.GetTitledFirstName|l], que segue em passo lento sem perceber minha observação.\n\n"
 hunt.7200.agent: "Pode ser que [murder_schemer.Custom('ES_ElLa')] [murder_schemer.GetTitledFirstName|l] não esteja aqui, mas esta pode ser a oportunidade que estávamos esperando.\n\n"
 hunt.7200.accomplice_2: "[accomplice.Custom('ES_ElLa')|U] [accomplice.GetTitledFirstName|l] e [accomplice_2.Custom('ES_ElLa')] [accomplice_2.GetTitledFirstName|l] continuam vigiando[murder_target.GetHerHim] de perto… Talvez nunca tenhamos uma chance melhor…"
 hunt.7200.accomplice: "Com a ajuda de [accomplice.Custom('ES_DelDela')] [accomplice.GetTitledFirstName|l], talvez eu finalmente me livre deste/a detestável [murder_target.GetWomanMan]."
 hunt.7200.alone: "Posso não ter nenhum apoiador entre o grupo, mas se encontrar o momento certo, não há melhor disfarce para o ato do que uma caçada."
 hunt.7200.a: "Hoje é o dia."
 hunt.7200.b: "[accomplice.GetFirstNameNoTooltip] irá cuidar disso."
 hunt.7200.c: "Confio em [accomplice_2.GetFirstNameNoTooltip] com esse assunto delicado."
 hunt.7200.d: "Preciso ser paciente."
 hunt_murder_accomplice_tt: "[THIS.Char.GetShortUIName|U] [Select_CString(THIS.Char.IsLocalPlayer, 'intentarás', 'intentará')] assassinato[Select_CString( murder_target.IsLocalPlayer, 'te', '' )] de [Select_CString( murder_target.IsLocalPlayer, 'ti', murder_target.GetShortUIName )]"
 hunt.7210.opening: "Galopando por [host.GetCurrentLocation.Custom('GetProvinceFoliageDesc')], seguindo os chamados das trompas e os uivos dos cães, [murder_target.Custom('ES_ElLa')] [murder_target.GetTitledFirstName|l] por fim se separa do resto do grupo.\n\n"
 hunt.7210.desc: "[murder_target.GetSheHe|U] para por um momento, ponderando qual caminho seguir."
 hunt.7210.accomplice: "Olho para [accomplice.GetFirstName], que acena sombriamente, com determinação, esperando meu movimento."
 hunt.7210.a: "E será um trágico acidente."
 hunt.7210.a.tt: "#EMP Hyah!#!"
 hunt.7210.b: "Não, devo aguardar o momento certo..."
 hunt.7211.desc: "Movo-me o mais rápido que posso e me lanço sobre [murder_target.Custom('ES_ElLa')] [murder_target.GetTitledFirstName|l] de lado para tentar derrubar[murder_target.GetHerHim]."
 hunt.7211.agent: "Não quero decepcionar [abduct_schemer.GetFirstName]..."
 hunt.7211.accomplice: "[accomplice_2.GetFirstName] e [accomplice.GetFirstName] se juntam rapidamente."
 hunt.7211.accomplice_2: "[accomplice.GetFirstName] se une rapidamente pelo outro lado."
 hunt.7211.success: "\n\n\"[ROOT.Char.GetTitledFirstNameNoTooltip]? Argh! O que estais…?\", [murder_target.GetFirstNameNoTooltip] cai do cavalo, despencando sobre [ROOT.Char.GetCurrentLocation.Custom('GetProvinceGroundDesc')], enquanto eu desmonto rapidamente.\n\nO feito está consumado antes que [murder_target.GetFirstNameNoTooltip] possa recobrar a compostura, e a qualquer observador seria difícil determinar qual foi a causa da confusão."
 hunt.7211.failure: "\n\n\"[ROOT.Char.GetTitledFirstNameNoTooltip]?! Que diabos…!\", [murder_target.GetFirstNameNoTooltip] cai pesadamente de seu corcel, mas se levanta. [murder_target.GetSheHe|U] sai correndo em direção ao restante do grupo enquanto tento recuperar o controle do meu cavalo, olhando por cima do ombro com medo, vendo-o gritar com todas as forças. Não [murder_target.GetHerHim] alcançarei a tempo…"
 hunt.7212.desc: "Pauso um momento para reorganizar meu equipamento. O repentino estalo de um galho quebra o silêncio, e vejo [abduct_actor.Custom('ES_AlAla')] [abduct_actor.GetTitledFirstName|l] se aproximar rapidamente."
 hunt.7212.accomplice_2: "[accomplice_2.GetFirstName] e [accomplice.GetFirstName] estão logo atrás."
 hunt.7212.accomplice: "[accomplice.GetFirstName] está no encalço."
 hunt.7212.success: "\n\nVejo tarde demais a determinação nos olhos de [murder_actor.GetFirstNameNoTooltip], não consigo desviar de seu avanço e sou jogado sobre [ROOT.Char.GetCurrentLocation.Custom('GetProvinceGroundDesc')] com um baque surdo.\n\nQuando recobro os sentidos e me viro, [murder_actor.GetSheHe] se ergue sobre mim, segurando um pedregulho enorme sobre a cabeça! Adeus, [ROOT.Char.GetFirstNameNoTooltip]."
 hunt.7212.failure: "\n\nEstá claro que algo está errado. [murder_actor.Custom('ES_ElLa')|U] [murder_actor.GetFirstNameNoTooltip|l] se abalança repentinamente sobre mim e eu caio desajeitadamente no chão, mas consigo me levantar quando [murder_actor.GetSheHe] perde o equilíbrio sobre [ROOT.Char.GetCurrentLocation.Custom('GetProvinceGroundDesc')], praguejando.\n\nCorro em direção a [ROOT.Char.GetCurrentLocation.Custom('GetProvinceFoliageDesc')], gritando por ajuda. A turma não pode estar longe!"
 hunt.7212.a: "\"O quê-! N-\""
 hunt.7212.b: "Apenas continue correndo!"
 hunt.7300.t: "Um Momento para Conversar"
 hunt.7300.desc: "Esperando notícias dos sabujos, o grupo descansa em um bosque sombreado. [befriend_target.GetFirstName] não está longe: esta é minha chance de impressionar[befriend_target.GetHerHim].\n\n\"[befriend_target.GetTitledFirstNameNoTooltip]! Como vocês estão? Não temos muitas oportunidades de conversar\", digo de forma informal.\n\nParece surpreendid[befriend_target.Custom('ES_OA')], mas não hostil, com minha conversa."
 hunt.7301.reply_hunter: "\"$hunt.7100.a$\"\n\n"
 hunt.7301.reply_falconer: "\"$hunt.7100.b$\"\n\n"
 hunt.7301.reply_pity: "\"$hunt.7100.c$\"\n\n"
 hunt.7301.reply_wastrel: "\"$hunt.7100.d$\"\n\n"
 hunt.7301.reply_steward: "\"$hunt.7100.e$\"\n\n"
 hunt.7301.opening: "[befriend_target.Custom('ES_ElLa')|U] [befriend_actor.GetTitledFirstName|l] se aproxima enquanto o grupo espera notícias dos cães farejadores.\n\n[befriend_actor.GetSheHe|U] sorri calorosamente, dizendo:"
 hunt.7301.hunter: "$hunt.7301.reply_hunter$Não é uma afirmação com a qual eu possa discordar."
 hunt.7301.falconer: "$hunt.7301.reply_falconer$Direto ao ponto, eu entendo exatamente o que [befriend_actor.GetSheHe] quer dizer."
 hunt.7301.pity: "$hunt.7301.reply_pity$Não posso negar a verdade das palavras; é um esporte cruel."
 hunt.7301.wastrel: "$hunt.7301.reply_wastrel$Certamente é verdade; todas as coisas úteis que eu poderia estar fazendo em vez disso..."
 hunt.7301.steward: "$hunt.7301.reply_steward$Comandar a natureza certamente é algo em que posso me relacionar e encontrar alegria."
 hunt.7301.fallback: "Não tenho certeza do que dizer."
 hunt.7301.a: "Talvez tenhamos mais em comum do que eu pensava."
 hunt.7302.hunter: "$hunt.7301.reply_hunter$\n\nEu discordo totalmente..."
 hunt.7302.falconer: "$hunt.7301.reply_falconer$\n\nUma distração trivial, nada mais..."
 hunt.7302.pity: "$hunt.7301.reply_pity$\n\nTal fraqueza, o mundo é cruel."
 hunt.7302.wastrel: "$hunt.7301.reply_wastrel$\n\nTodos nós precisamos arranjar tempo para distrações."
 hunt.7302.steward: "$hunt.7301.reply_steward$\n\nQue monótono..."
 hunt.7302.fallback: "[befriend_actor.GetSheHe|U] sorri esperançoso[befriend_target.Custom('ES_OA')] obviamente esperando alguma afinidade recíproca."
 hunt.7302.a: "Diga, o que é aquilo ali?"
 hunt.7303.reply: "[befriend_target.Custom('ES_ElLa')|U] [befriend_target.GetTitledFirstName|l] parece ter muito em comum comigo"
 hunt.7303.hunter: "$hunt.7303.reply$, mergulhando animadamente nos detalhes das cordas de arco e armadilhas."
 hunt.7303.falconer: "$hunt.7303.reply$, mal contendo sua paixão pela falcoaria."
 hunt.7303.pity: "$hunt.7303.reply$, ."
 hunt.7303.wastrel: "$hunt.7303.reply$, lamentando a necessidade de entreter a corte com trivialidades."
 hunt.7303.steward: "$hunt.7303.reply$, desejoso[befriend_target.Custom('ES_OA')] de compartilhar métodos de manejo da floresta e da caça."
 hunt.7303.fallback: "$hunt.7303.reply$, relaxando seu comportamento na minha companhia."
 hunt.7303.desc: "\n\nQuando seguimos em frente, quase não conseguimos nos separar — eu sabia que encontraria as palavras certas para conquistar[befriend_target.GetHerHim]!"
 hunt.7303.a: "Acho que conquistei [befriend_target.GetHerHim]…"
 hunt.7304.reply: "Minhas palavras não parecem ter tido muito impacto em [befriend_target.Custom('ES_ElLa')] [befriend_target.GetTitledFirstName|l]"
 hunt.7304.hunter: "$hunt.7304.reply$, pois apenas sorri educadamente, limpando sua garganta, ouvidos atentos à natureza selvagem."
 hunt.7304.falconer: "$hunt.7304.reply$, pois [befriend_target.GetSheHe] apenas acena com a cabeça obedientemente antes de seguir em frente."
 hunt.7304.pity: "$hunt.7304.reply$, pois me olha de maneira estranha[befriend_target.Custom('ES_OA')] e coça a cabeça."
 hunt.7304.wastrel: "$hunt.7304.reply$, pois [befriend_target.GetSheHe] parece completamente consternad[befriend_target.Custom('ES_OA')] por minhas palavras."
 hunt.7304.steward: "$hunt.7304.reply$, pois [befriend_target.GetSheHe] perde rapidamente o interesse, claramente não interessado em gerenciamento."
 hunt.7304.fallback: "$hunt.7304.reply$, pois não diz nada."
 hunt.7304.desc: "\n\nA sós depois que [befriend_target.GetSheHe] foi conversar com outros, me sinto meio bobo[ROOT.Char.Custom('ES_OA')]…"
 hunt.7304.a: "Bom trabalho, [ROOT.Char.GetFirstNameNoTooltip]."
 hunt.7400.t: "[ROOT.Char.GetCurrentLocation.Custom('GetTerrainLandPlural')|U] de Oportunidade"
 hunt.7400.desc: "Deixamos o acampamento e nos embrenhamos na [ROOT.Char.GetCurrentLocation.Custom('GetTerrainType')] em coluna. Observo de perto es[abduct_target.Custom('ES_EA')] [ROOT.Char.Custom2('DescriptorNegative', abduct_target)] [abduct_target.Custom('ES_DelDela')] [abduct_target.GetTitledFirstName|l]; ele não faz a menor ideia dos meus motivos, completamente distraíd[abduct_target.Custom('ES_OA')] com a caçada.\n\n"
 hunt.7400.agent: "[abduct_schemer.Custom('ES_ElLa')|U] [abduct_schemer.GetTitledFirstName|l] não está conosco, mas talvez eu deva aproveitar esta oportunidade se quisermos alcançar nossos objetivos.\n\n"
 hunt.7400.accomplice_2: "[accomplice.Custom('ES_ElLa')|U] [accomplice.GetTitledFirstName|l] e [accomplice_2.Custom('ES_ElLa')] [accomplice_2.GetTitledFirstName|l] nos seguem, nos observando com silenciosa compreensão…"
 hunt.7400.accomplice: "Tenho a ajuda [accomplice.Custom('ES_DelDela')] [accomplice.GetTitledFirstName|l]; se encontrássemos a oportunidade certa…"
 hunt.7400.alone: "Agiria sozinho, mas, com a preparação adequada e o elemento surpresa, um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] pode conquistar muito."
 hunt.7400.a: "O momento de agir é agora."
 hunt.7400.b: "Deixo a cargo de [accomplice.GetFirstNameNoTooltip]."
 hunt.7400.c: "[accomplice_2.GetFirstNameNoTooltip] pode ser confiável para isso."
 hunt.7400.d: "Este não é o momento."
 hunt_abduct_accomplice_tt: "[THIS.Char.GetShortUIName|U] [Select_CString(THIS.Char.IsLocalPlayer, 'intentarás', 'intentará')] sequestrar[Select_CString( abduct_target.IsLocalPlayer, 'te', '' )] a [Select_CString( abduct_target.IsLocalPlayer, 'ti', abduct_target.GetShortUIName )]"
 hunt.7410.desc: "Por fim encontro um momento em que [abduct_target.Custom('ES_ElLa')] [abduct_target.GetTitledFirstName|l] e eu estamos praticamente a sós! Tudo o que resta é executar o plano!\n\n"
 hunt.7410.accomplice_2: "[accomplice.Custom('ES_ElLa')|U] [accomplice.GetTitledFirstName|l] e [accomplice_2.Custom('ES_ElLa')] [accomplice_2.GetTitledFirstName|l] me observam, esperando que eu faça o primeiro movimento…"
 hunt.7410.accomplice: "[accomplice.Custom('ES_ElLa')|U] [accomplice.GetTitledFirstName|l] está pronta[accomplice.Custom('ES_OA')], observando-me ansiosamente[accomplice.Custom('ES_OA')]…"
 hunt.7410.alone: "Eu posso fazer isso..."
 hunt.7410.a: "É hora!"
 hunt.7410.a.success: "Você sequestra [abduct_target.GetFirstNameNoTooltip]"
 hunt.7410.a.failure: "[abduct_target.GetFirstNameNoTooltip] escapa"
 hunt.7410.b: "#EMP Ah...#! Eu não posso fazer isso..."
 hunt.7411.desc: "Aproximo-me lentamente [abduct_target.Custom('ES_AlAla')] [abduct_target.GetTitledFirstName|l] por trás, escolhendo com cuidado o momento de avançar."
 hunt.7411.agent: "$hunt.7211.agent$"
 hunt.7411.accomplice_2: "Ao mesmo tempo, [accomplice_2.GetFirstName] e [accomplice.GetFirstName] se aproximam de cada lado."
 hunt.7411.accomplice: "[accomplice.GetFirstName] tenta abordar [abduct_target.GetSheHe] por outro ângulo."
 hunt.7411.success: "\n\n[abduct_target.GetHerHim|U] pego de surpresa, derrubando-o com força contra [ROOT.Char.GetCurrentLocation.Custom('GetProvinceGroundDesc')]. Enquanto [abduct_target.GetSheHe] jaz atordoad[abduct_target.Custom('ES_OA')] amarr-o as mãos com uma corda.\n\n[abduct_target.GetFirstName] se vira, com os olhos cheios de medo e confusão."
 hunt.7411.failure: "\n\nQuase pegamos [abduct_target.GetHerHim] de surpresa, mas é mais resistente do que parece! [abduct_target.GetSheHe|U] percebe rapidamente o que está acontecendo, olha para a corda em minha mão e sai correndo em direção a [ROOT.Char.GetCurrentLocation.Custom('GetProvinceFoliageDesc')], chamando os outros aos gritos..."
 hunt.7411.a: "Eu te peguei, verme!"
 hunt.7411.b: "Maldito verme escorregadio!"
 hunt.7412.success: "\n\nAntes que eu tenha a chance de perguntar, [abduct_actor.GetFirstNameNoTooltip] me empurra com toda a força, me jogando sobre [ROOT.Char.GetCurrentLocation.Custom('GetProvinceGroundDesc')].\n\nEnquanto estou ali, atordoad[ROOT.Char.Custom('ES_OA')] sinto minhas mãos sendo amarradas com uma corda! Um sequestro?!"
 hunt.7412.failure: "\n\nPercebo que algo está errado; os olhos [abduct_actor.Custom('ES_DelDela')] [abduct_actor.GetFirstNameNoTooltip|l] brilham com uma determinação inquietante. Ele se move para me empurrar, mas só me roça, perde o equilíbrio e cai no chão, há um rolo de corda em [ROOT.Char.GetCurrentLocation.Custom('GetProvinceGroundDesc')] ao lado de [abduct_actor.GetSheHe]!\n\nEu me lanço para [ROOT.Char.GetCurrentLocation.Custom('GetProvinceFoliageDesc')] enquanto [abduct_actor.GetSheHe] jaz gemendo, gritando para que os outros venham…"
 hunt.7412.a: "\"[abduct_actor.GetFirstNameNoTooltip]! O qu-\""
 hunt.7800.t: "De Lugar Nenhum"
 hunt.7800.desc: "Faço uma pausa para beber da minha cantina, saboreando um pouco de alívio do suor e da agitação da perseguição. Ao prendê-la ao meu lado, ouço um som de assobio baixo.\n\n"
 hunt.7800.tree: "Uma flecha bate no [ROOT.Char.GetCurrentLocation.Custom('GetRandomRegionalWood')] ao meu lado com um estrondo! #EMP THWACK#!!"
 hunt.7800.ground: "Uma flecha bate no chão do [ROOT.Char.GetCurrentLocation.Custom('GetProvinceGroundDesc')] aos meus pés, enterrando-se profundamente no solo."
 hunt.7800.closing: "\n\nEu e aqueles mais próximos giramos em volta, mas não há ninguém ali, apenas o vento sussurrando através da [ROOT.Char.GetCurrentLocation.Custom('GetProvinceFoliageDesc')]..."
 hunt.7800.a: "#EMP Ei!#! Tenha mais cuidado!"
 hunt.7800.b: "Isso deve pertencer a #EMP alguém#!..."
 hunt.7800.b.success: "Você encontra o dono"
 hunt.7800.b.failure: "Não há pistas"
 hunt.7800.b.tt: "Você confronta o atirador"
 hunt.7800.c: "#EMP Assassinos!#! Rápido! Tirem-me daqui!"
 hunt.7801.t: "De Lugar Nenhum"
 hunt.7801.desc: "Ao examinar a flecha com atenção, descubro que as penas são de uma construção incomum, algo que sem dúvida a destaca das dos demais membros do grupo.\n\nObservando sorrateiramente as aljavas dos meus companheiros de caça, logo encontro [culprit.Custom('ES_AlAla')] culpado…\n\n\"Não, por favor! Meu [ROOT.Char.GetLadyLord]! Talvez eu tenha sido entusiasmado demais ao disparar entre o mato, mas foi sem maldade! Eu imploro!"
 hunt.7801.a: "Vou deixar passar, #EMP desta#! vez."
 hunt.7801.b: "Absurdo. Algemem-no, estamos partindo."
 hunt.8001.t: "Um Espécime Bonito"
 hunt.8001.desc: "Ao retornarmos de [host.GetCurrentLocation.GetName] com [activity.Custom('GetAnimalType')] abatido, não consigo deixar de admirá-lo mesmo na morte. Um espécime tão belo - consigo facilmente imaginar sua pele ou crânio decorando as paredes da minha corte! Oh, mas qual opção escolher?"
 hunt.8001.a: "Sua pelagem exuberante será um excelente objeto de conversa."
 hunt.8001.b: "Monte sua cabeça, meus convidados verão sua majestade!"
 hunt.8001.c: "Vamos nos concentrar no delicioso banquete em vez de uma carcaça como troféu!"
 hunt.8200.t: "Prática de falcoaria"
 hunt.8200.desc: "Olho o horizonte à minha frente, o sol do amanhecer anuncia um dia promissor. Meu [ROOT.Char.Custom('GetHuntMasterDesc')|l] [master_hunter.GetName] avança furtivamente com minha [ROOT.Char.Custom('GetRaptorType')] na mão e um brilho no olhar.\n\n“Sei que temos de ir caçar, mas que manhã clara! Com fome na barriga da sua ave e o orvalho gelando o chão, as presas estarão maduras para a captura. As garras [ROOT.Char.Custom('GetRaptorTypePossessive')] estarão muito mais afiadas para o esporte que virá...”"
 hunt.8200.a: "Não entraria em combate com uma lâmina cega."
 hunt.8200.a.flavor: "Aprecio praticar antes do grande dia."
 hunt.8200.b: "Mas quem está aqui para testemunhar meu triunfo?!"
 hunt.8200.b.flavor: "Insisto em nos apressarmos para a caça."
 hunt.8210.t: "Caçada enquanto praticava falcoaria"
 hunt.8210.desc: "Antecipando a caça que virá amanhã, tomo um banho à luz da lua, purificando a mim e a minha [hunted_hawker.Custom('GetRaptorType')].\n\nDe repente, ouço um ruído às minhas costas e, em seguida, sinto o hálito de alguém em minha nuca.\n\n\"Talvez você seja minha presa esta noite? Raramente me é oferecido um petisco, tão absorvid[ROOT.Char.Custom('ES_OA')] quanto estou por causa de meus deveres.\"\n\nO aroma embriagante do incenso de [local_temple.Custom('GetLocationFaithTemple')] de [local_temple.GetBaronyNameExplicitlyNoTooltip] sobrecarrega meus sentidos. Poderia ser es[shrine_maiden.Custom('ES_EA')] [shrine_maiden.Custom('ES_ElLa')] [shrine_maiden.Custom('PriestTitle')] local?"
 hunt.8210.a: "Quem sou eu para negar o apetite do divino?"
 hunt.8210.a.flavor: "Sua noite de paixão alimenta seu talento poético."
 hunt.8210.b: "Afasta-te de mim, preciso guardar minha virilidade para a caça!"
 hunt.8210.b.flavor: "Você rejeita a musa."
 hunt.8211.opening: "[shrine_maiden.Custom2('AppropriateGreeting', ROOT.Char)]"
 hunt.8211.desc: "$love_artifact_poetry_name$\n\n#EMP Você se aventurou a me ver na noite passada, ou fui eu quem o procurou?\n\nNão me lembro.\n\nTambém não sei se me deixei levar por um êxtase que só poderia existir no reino dos sonhos,\n\nou se tal prazer poderia ter sido real?#!"
 hunt.8211.a: "A [ROOT.Char.Custom('GetCourt')] ouvirá nosso êxtase compartilhado!"
 hunt.8211.b: "Aproveitarei esta imortalização da nossa paixão."
 love_artifact_poetry_name: "Cruzei uma ponte de prazer"
 love_artifact_poetry_description: "Uma obra poética dedicada [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetTitledFirstName|l] para celebrar quando [sex_memory.GetDescription], escrita por [shrine_maiden.Custom('ES_ElLa')] amante [shrine_maiden.Custom('ES_DelDela')] [shrine_maiden.GetTitledFirstName|l].\n\n #EMP $hunt.8211.desc$#!"
 love_poetry_artifact_appended_desc: "Uma obra poética dedicada [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetTitledFirstName|l] para celebrar quando [sex_memory.GetDescription], escrita por [shrine_maiden.Custom('ES_ElLa')] amante [shrine_maiden.GetTitledFirstName|l].\n\nDiz o seguinte:\n#EMP $hunt.8211.desc$#!"
 hunt.8211.a_effect: "[newly_created_artifact.GetName] se torna um [court_artifact|lE] e ganhará um modificador de [grandeur|lE]"
 hunt.8211.b_effect: "Você recebe o [artifact|lE] [newly_created_artifact.GetName]"
 hunt.9001.t: "Riqueza da Natureza"
 hunt.9001.opening_falconry_self: "Reúno o par de aves abatidas pelos nossos [activity.Custom('GetRaptorPlural')],"
 hunt.9001.opening_falconry_master_of_hunt: "[hunt_participant.Custom('ES_ElLa')|U] [hunt_participant.GetTitledFirstName|l], [ROOT.Char.Custom('GetHuntMasterDesc')] , reúne o par de aves abatidas por nossos exemplares de [activity.Custom('GetRaptorPlural')],"
 hunt.9001.opening_falconry_courtier: "[hunt_participant.Custom('ES_ElLa')|U] [hunt_participant.GetTitledFirstName|l] reúne o par de aves abatidas por nossos exemplares de [activity.Custom('GetRaptorPlural')],"
 hunt.9001.opening_captive_master_of_hunt: "[hunt_participant.GetShortUINameNoFormat], [ROOT.Char.Custom('GetHuntMasterDesc')], verifica as amarras do animal,"
 hunt.9001.opening_captive_courtier: "[hunt_participant.GetShortUINameNoFormat] verifica as amarras do animal,"
 hunt.9001.opening_captive_self: "Eu verifico as amarras do animal,"
 hunt.9001.opening_master_of_hunt: "[hunt_participant.Custom('ES_ElLa')|U] [hunt_participant.GetTitledFirstName|l], [ROOT.Char.Custom('GetHuntMasterDesc')], conduz o desmembramento,"
 hunt.9001.opening_courtier: "[hunt_participant.GetShortUINameNoFormat] dirige o desmembramento,"
 hunt.9001.opening_self: "Eu dirijo o desmembramento,"
 hunt.9001.opening_captive: "vigiando o exemplar amarrado de [host.Custom('GetAnimalTypeCaptive')], e indicando aos assistentes que o carreguem com cuidado."
 hunt.9001.opening_master: "esfolando magistralmente a carcaça sem se manchar com nem uma gota de sangue."
 hunt.9001.opening_skilled: "esfolando habilmente a carcaça com precisão e rapidez."
 hunt.9001.opening_beginner: "esfolando cuidadosamente a carcaça com orientação dos mestres de jogo."
 hunt.9001.opening_novice: "esfolando desajeitadamente a carcaça antes de deixar os mestres de jogo assumirem."
 hunt.9001.opening: "Eu dirijo o esquartejamento, recompensando os cães com sua parte dos despojos."
 hunt.9001.opening_falconry: "uma riqueza de caça e um teste da boa treinabilidade de nossas aves."
 hunt.9001.credit_self: "Não é uma fera tão grande, mas eu a matei sozinho.\n\n"
 hunt.9001.credit_self_big: "Ficar aqui agora, é difícil acreditar que eu mesmo abati a fera.\n\n"
 hunt.9001.credit_other: "[credit_taker.GetFirstName] está especialmente feliz com sua presa.\n\n"
 hunt.9001.credit_other_big: "[credit_taker.GetFirstName] fez um ótimo trabalho abatendo uma fera tão poderosa.\n\n"
 hunt.9001.credit_shared: "Embora a presa possa ter sido pequena, o grupo ainda está radiante com a satisfação de uma boa caçada.\n\n"
 hunt.9001.credit_shared_big: "Não há nada como a emoção de abater uma fera poderosa.\n\n"
 hunt.9001.opening_compassionate: "Não consigo deixar de admirar [activity.Custom('GetAnimalType')], mesmo na morte.\n\n"
 hunt.9001.opening_callous: "[activity.Custom('GetAnimalType')] inútil não teve chance contra nós...\n\n"
 hunt.9001.opening_ambitious: "Só consigo imaginar outras feras orgulhosas, apenas esperando para serem caçadas...\n\n"
 hunt.9001.opening_content: "Estes são os momentos para guardar na memória: boa companhia e um belo exemplar de [activity.Custom('GetAnimalType')].\n\n"
 hunt.9001.opening_martial: "Uma boa saída, [activity.Custom('GetAnimalType')] ofereceu um pequeno gostinho das variáveis do campo de batalha.\n\n"
 hunt.9001.opening_learning: "Contemplo a carcaça deste exemplar de [activity.Custom('GetAnimalType')], admirando sua anatomia e surpreendente inteligência…\n\n"
 hunt.9001.desc_court_artifact: "Eu imagino sua pele ou crânio decorando as paredes da minha corte.\n\n"
 hunt.9001.desc_trinket: "uma lembrança deste dia manteria a memória viva.\n\n"
 hunt.9001.desc_hunter_1: "Eu participei de várias caçadas, e as pessoas ao meu redor começaram a perceber - a notícia está se espalhando sobre minhas atividades!"
 hunt.9001.desc_hunter_2: "Meu [ROOT.Char.Custom('TerrainType')] é como um segundo lar… Sentir o vento nos cabelos, passar tempo com meus cortesãos, sentir a emoção ao me aproximar da presa… Rezo para que nunca termine!"
 hunt.9001.desc_hunter_3: "Não importa quão rápida, forte ou astuta seja a presa, ela não tem a menor chance contra mim! Minha destreza como caçador[ROOT.Char.Custom('ES_XA')] é tema de muitas conversas por todo o domínio. No entanto, a verdadeira recompensa é a liberdade que me concede semelhante [ROOT.Char.Custom('TerrainType')]."
 hunt.9001.falconry: "É uma pena ter que voltar tão cedo, eu poderia fazer isso o dia todo! Mas as aves precisam descansar."
 hunt.9001.desc_good_bad: "Apesar de algumas dificuldades ao longo do caminho, a caçada foi muito bem!"
 hunt.9001.desc_good: "Caçadas como essas são uma alegria pura, mal posso esperar pelo próximo ano!"
 hunt.9001.desc_bad_good: "Tudo que poderia dar errado parece ter acontecido, mas ainda houve aspectos positivos."
 hunt.9001.desc_bad: "Nossa comitiva parecia assolada por miserias aparentemente intermináveis, e eu quase fico aliviado em deixar para trás semelhante [ROOT.Char.Custom('TerrainType')]."
 hunt.9001.desc_same: "Atender ao chamado da natureza é uma aventura, e essa saída trouxe tanto o bom quanto o ruim em abundância!"
 hunt.9001.desc_fallback: "Atender ao chamado da natureza geralmente é uma aventura, mas devo admitir que achei essa saída bastante esquecível."
 hunt.9001.spoils_captive: "\n\nDerrubar uma fera selvagem é uma coisa, mas capturar uma viva e intacta é uma proeza completamente diferente!"
 hunt.9001.spoils: "Colocamos a parte dos animais de caça ansiosos na pele esticada, antes de partir para o acampamento e para casa."
 hunt.9001.spoils_falconry: "\n\nMeu [activity.Custom('GetRaptorType')] come alegremente pedaços de carne, recompensa por seu ótimo desempenho neste dia, antes de partirmos para o acampamento e para casa."
 hunt.9001.murder_secret: "[ROOT.Char.GetIntentTarget.GetFirstName] jaz morto[ROOT.Char.GetIntentTarget.Custom('ES_OA')] e ninguém sabe que eu estive por trás disso…\n\n"
 hunt.9001.murder_public: "[ROOT.Char.GetIntentTarget.GetFirstName] jaz morto[ROOT.Char.GetIntentTarget.Custom('ES_OA')] mas todos sabem que fui eu o[ROOT.Char.Custom('ES_ElLa')] responsável…\n\n"
 hunt.9001.murder_dead: "[ROOT.Char.GetIntentTarget.GetFirstName] jaz morto[ROOT.Char.GetIntentTarget.Custom('ES_OA')], embora não tenha sido por minha mão…\n\n"
 hunt.9001.murder_fail: "Certamente é uma pena que [ROOT.Char.GetIntentTarget.GetFirstName] ainda esteja vivo...\n\n"
 hunt.9001.woo_soulmate: "[ROOT.Char.GetIntentTarget.GetFirstName] e eu criamos um vínculo especial, sua força me surpreendendo...\n\n"
 hunt.9001.woo_lover: "[ROOT.Char.GetIntentTarget.GetFirstName] não teve chance contra meus avanços sedutores...\n\n"
 hunt.9001.woo_potential: "Captei a atenção de [ROOT.Char.GetIntentTarget.GetFirstName], mas se eu quiser conquistar o coração dele, preciso me esforçar mais…\n\n"
 hunt.9001.woo_fail: "[ROOT.Char.GetIntentTarget.GetFirstName] não ficou impressionado com meus avanços... Terei que tentar uma abordagem diferente...\n\n"
 hunt.9001.befriend_best: "[ROOT.Char.GetIntentTarget.GetFirstName] e eu rapidamente nos tornamos amigos íntimos, superando todas as minhas expectativas...\n\n"
 hunt.9001.befriend_friend: "[ROOT.Char.GetIntentTarget.GetFirstName] foi muito receptivo à minha companhia, acho que posso contar com [befriend_target.GetSheHe]...\n\n"
 hunt.9001.befriend_potential: "Embora ainda haja algumas formalidades entre [ROOT.Char.GetIntentTarget.GetFirstName] e eu, estamos um pouco mais próximos do que antes...\n\n"
 hunt.9001.befriend_fail: "Não estou mais perto de conquistar a confiança de [ROOT.Char.GetIntentTarget.GetFirstName]. Acho que devo estar fazendo algo errado…\n\n"
 hunt.9001.a: "Voltamos, revigorados!"
 hunt.9001.b: "Fizemos o nosso melhor..."
 hunt.9001.c: "Vamos deixar essa aventura para trás por enquanto."
 hunt.9001.d.choice: "Vou apenas guardar uma lembrança."
 hunt.9001.d: "Vou guardar uma lembrança."
 hunt.9001.e: "Vou guardar uma pena."
 hunt.9001.f: "Meu [ROOT.Char.Custom2('RelationToMeShort', trophy_recipient)], [trophy_recipient.Custom('ES_ElLa')] [trophy_recipient.GetTitledFirstNameNoTooltip|l], apreciará o troféu."
 hunt.9001.f.present: "[trophy_recipient.GetTitledFirstNameNoTooltip], meu bom[trophy_recipient.Custom('ES_XA')] [ROOT.Char.Custom2('RelationToMeShort', trophy_recipient)], é seu!"
 hunt.9001.g: "[animal_slayer.Custom('ES_ElLa')|U] [animal_slayer.GetTitledFirstName|l] o derrubou, pertence a [animal_slayer.GetSheHe]."
 hunt.9002.t: "De Mãos Vazias"
 hunt.9002.opening_master_of_hunt: "[hunt_participant.Custom('ES_ElLa')|U] [ROOT.Char.Custom('GetHuntMasterDesc')], [hunt_participant.Custom('ES_ElLa')] [hunt_participant.GetTitledFirstName|l], reúne a a comitiva decepcionada e os cães exaustos para a viagem de volta."
 hunt.9002.opening_courtier: "[hunt_participant.Custom('ES_ElLa')|U] [hunt_participant.GetTitledFirstName|l] reúne o grupo desapontado e os cães exaustos para a viagem de volta."
 hunt.9002.opening: "Eu reúno o grupo desapontado e os cães exaustos para a viagem de volta para casa."
 hunt.9002.opening_animal: "\n\nEsse exemplar de [activity.Custom('GetAnimalType')] de fato nos escapou, #EMP esta vez#!…"
 hunt.0540.t: "Um Mestre da Caçada"
 hunt.0540.desc.intro: "Minha caçada está prestes a começar, e ainda preciso nomear um [ROOT.Char.Custom('GetHuntMasterDesc')]. É claro que eu poderia assumir essas responsabilidades pessoalmente, mas tod[ROOT.Char.Custom('ES_OA')] bom [ROOT.Char.GetTitleAsNameNoTooltip|l] deve saber quando delegar."
 hunt.0540.desc.hates_candidate_a: "Por mais que eu deteste admitir, [moh_candidate_1.Custom('ES_ElLa')] [host.Custom2('InsultAdjective', ROOT.Char)] [moh_candidate_1.GetFirstName] é [moh_candidate_1.Custom('ES_ElLa')] mais qualificad[moh_candidate_1.Custom('ES_OA')] para o cargo.\n\n"
 hunt.0540.desc.candidate_a: "De longe, [moh_candidate_1.Custom('ES_ElLa')] [moh_candidate_1.GetWomanMan] mais qualificad[moh_candidate_1.Custom('ES_OA')] para o cargo é [moh_candidate_1.GetName], e parece ansios[moh_candidate_1.Custom('ES_OA')] para provar seu valor.\n\n"
 hunt.0540.desc.nepotism: "No entanto, [moh_candidate_2.Custom2('MyCharacterIntroduction', ROOT.Char)] seria [moh_candidate_2.Custom('ES_ElLa')] candidat[moh_candidate_2.Custom('ES_OA')] mais adequad[moh_candidate_2.Custom('ES_OA')] e confiável que eu poderia pedir.\n\n"
 hunt.0540.desc.enthusiasm: "[moh_candidate_3.Custom2('MyCharacterIntroduction', ROOT.Char)|U] parece estar muito interessad[moh_candidate_3.Custom('ES_OA')] no cargo, embora não seja tão apt[moh_candidate_3.Custom('ES_OA')] quanto [moh_candidate_1.GetFirstNameNoTooltip].\n\n"
 hunt.0540.desc.outro: "Mas não sou obrigado(a) a nomear ninguém, afinal."
 hunt.0540.a: "[moh_candidate_1.GetFirstNameNoTooltip|U] é [moh_candidate_1.Custom('ES_ElLa')] melhor candidat[moh_candidate_1.Custom('ES_OA')]."
 hunt.0540.b: "Posso confiar em [moh_candidate_2.GetFirstNameNoTooltip]."
 hunt.0540.c: "[moh_candidate_3.GetFirstNameNoTooltip|U] está entusiasmado(a)."
 hunt.0540.d: "Não preciso de ninguém."
 friend_made_me_moh: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'conquistou', 'conquistou' )] a gratidão eterna de [TARGET_CHARACTER.GetShortUIName] ao conceder o cargo de $master_of_hunt_court_position$"
 friend_made_me_moh_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'conquistou', 'conquistou' )] a gratidão eterna de [CHARACTER.GetShortUIName] ao conceder o cargo de $master_of_hunt_court_position$"
 hunt.0550.t: "Montando Acampamento"
 hunt.0550.host: "Enquanto esperamos a chegada dos demais convidados, meus [ROOT.Char.Custom('GetServants')] podem começar os preparativos. Os [ROOT.Char.Custom('GetGameKeepers')] verificam as [activity.GetCurrentPhase.GetLocation.Custom('GetTerrainLandPlural')] todos os dias em busca de sinais de presa, enquanto estabelecem um acampamento mais próximo dos locais de caça.\n\n"
 hunt.0550.guest: "Enquanto aguardamos a chegada do restante dos convidados, [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] começou a fazer os preparativos. Seus [host.Custom('GetGameKeepers')] verificam todos os dias os/as [activity.GetCurrentPhase.GetLocation.Custom('GetTerrainLandPlural')] em busca de sinais de presa, enquanto montam um acampamento mais perto das áreas de caça.\n\n"
 hunt.0550.nerge.host.desc: "Enquanto aguardamos a chegada do restante dos convidados, meus [ROOT.Char.Custom('GetServants')] já podem começar os preparativos. Os [ROOT.Char.Custom('GetGameKeepers')] estão definindo em qual área os participantes irão reunir todos os animais para o grande Nerge. Conhecer o território é o primeiro de muitos passos rumo ao sucesso.\n\n"
 hunt.0550.nerge.guest.desc: "Enquanto aguardamos a chegada do restante dos convidados, [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] começa com os preparativos. Seus [ROOT.Char.Custom('GetGameKeepers')] estão tentando descobrir em que área os participantes reunirão todos os animais para a grande Nerge. Conhecer a terra é o primeiro de muitos passos rumo ao sucesso.\n\n"
 hunt.0550.sighting: "[activity.Custom('GetAnimalPlural')] estão perto... Eu posso sentir..."
 hunt.0550.falconry: "Minha ave fica inquieta esperando, sabendo que em breve será liberada..."
 hunt.0550.legendary: "Lá fora, em algum lugar, [activity.Custom('GetAnimalType')] [activity.Custom('GetLegendaryColor')] espera e observa..."
 hunt.0550.nerge: "Meu cavalo está tão empolgado com as perspectivas da caçada quanto eu. Ele sabe que grandes desafios nos aguardam nos próximos dias."
 hunt.0550.standard: "Eu verifiquei meu equipamento e cavalo várias vezes, não vai demorar agora..."
 hunt.0550.intent_arrived: "\n\n[ROOT.Char.Custom('ES_ElLa')|U] [ROOT.Char.GetIntentTarget.GetTitledFirstName|l] continua completamente alheio ao meu plano de [ROOT.Char.GetInvolvedActivityIntent.GetName|l] que [ROOT.Char.GetIntentTarget.GetHerHim] é o alvo."
 hunt.0550.intent: "\n\n[ROOT.Char.Custom('ES_ElLa')|U] [ROOT.Char.GetIntentTarget.GetTitledFirstName|l] ainda não chegou, não demorará muito até que meu plano de tentar [ROOT.Char.GetInvolvedActivityIntent.GetName|l] com [ROOT.Char.GetIntentTarget.GetSheHe] como alvo siga adiante."
 hunt.0550.a: "Em breve."
