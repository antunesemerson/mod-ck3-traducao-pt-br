l_spanish:
 feast_default_jason.100.t: "Festas em Tempos de Guerra"
 feast_default_jason.100.desc: "\"Estamos preocupados\", pergunta meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('soldier'))], [soldier.GetFirstName], \"com a causa [ROOT.Char.GetPrimaryTitle.GetAdjective] na [war.GetName|l]...? Vejo rostos sombrios nesta mesa, como se os exércitos [foe.GetPrimaryTitle.GetAdjective] [foe.Custom('ES_DelDela')] [foe.GetTitledFirstName|l] estivessem às portas!\"\n\n\"Não pense demais em suas forças no [army_location.GetTerrain.GetNameNoTooltip|l] de [army_location.GetName], nobre [ROOT.Char.GetTitleAsName|l]\", sorri [other_ruler.GetFirstName], [other_ruler.GetTitleAsNameNoTooltip|l] de [other_ruler.GetPrimaryTitle.GetNameNoTier]. \"A boa sorte certamente estará do lado deles.\""
 feast_default_jason.100.a: "\"Que melhor fortuna... do que a sua ajuda?\""
 feast_default_jason.100.b: "\"Lembre-se destas palavras: minha vitória está assegurada!\""
 feast_default_jason.100.c: "Bebamos até que o mundo se afaste..."
 feast_default_jason.100.c_hungee: "Estas bocas inquietas deveriam ser cheias de comida."
 boasted_of_victories_modifier: "Alardeou Amplamente a Vitória"
 victories_reduce_stress_add_prestige_desc: "Vencer em [battles|lE] reduz @stress_icon![stress|E] e concede @prestige_icon![prestige|E], mas perder aumenta @stress_icon![stress|E] e custa @prestige_icon![prestige|E]"
 victories_reduce_stress_add_prestige_tt: "Enquanto este [modifier|lE] estiver ativo, você ganhará @prestige_icon![prestige|E] e perderá @stress_icon![stress|E] ao vencer [battles|lE], mas perder custará @prestige_icon![prestige|E] e aumentará @stress_icon![stress|E]"
 feast_default_jason.100.b_exalt_the_crown: "#low Duração do [modifier|lE] aumentada por seu [intent|lE] [THIS.Char.GetInvolvedActivityIntent.GetName]#!"
