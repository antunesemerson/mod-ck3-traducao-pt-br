 #Your capital is now Mecca and you don't have the Hajjaj trait
 hajj.0011.t: "Dentro das Muralhas Brilhantes"
 hajj.0011.desc: "Agora que minha nova capital é o glorioso domínio de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], aproveitei a oportunidade para realizar os ritos e receber as bênçãos da Hajj."
 hajj.0011.a: "Já me sinto mais próximo de [ROOT.Char.GetFaith.HighGodName]."
 hajj.0011.a_cynical: "Isso tinha que ser feito."
 #Promise your Hajjaj relative to go on the Hajj
 hajj.0500.t: "As Muralhas Brilhantes"
 hajj.0500.desc: "«#EMP Los muros relucientes, los muros relucientes…#!», murmura [hajj_dying_relative.Custom('ES_ElLa')] [hajj_dying_relative.GetTitledFirstName|l] ao entrar em seu [ROOT.Char.Custom('GetChamber')]. Sua respiração é ofegante, como se o próprio ar tentasse evitar descer até os pulmões doentes de um[hajj_dying_relative.Custom('ES_XA')] [hajj_dying_relative.GetWomanMan] outrora tão grande.\n\nLimpo a garganta e os olhos turvos de [hajj_dying_relative.GetFirstNameNoTooltip] se esforçam para se concentrar em mim: «[ROOT.Char.GetFirstNameNoTooltip]?… é você?», sussurra. Então, seu olhar se clareia por um instante. «Os muros reluzentes. Meca».\n\n«Você precisa realizar o Hajj, [hajj_dying_relative.Custom2('RelationToMe' , ROOT.Char)]. Você #EMP Debes#! ver os muros reluzentes!». [hajj_dying_relative.GetFirstNameNoTooltip] começa a tossir com o súbito esforço físico e solta um leve gemido. Que pena."
 hajj.0500.a: "Vou garantir que seja feito."
 hajj.0500.a.flavor: "Um desejo de morte é um desejo de morte."
 hajj.0500.a.tt_hajj: "Sua próxima [pilgrimage|lE] [hajj|lE] será mais barata."
 hajj.0500.b: "Eu... não posso prometer nada, [ROOT.Char.Custom2('RelationToMe' , SCOPE.sC('hajj_dying_relative'))]."
 hajj.0500.b.flavor: "Eu realmente preferiria não."
 ###Hajj Destination Events
 #Pray at the Place of Abraham
 hajj.3010.t: "Lugar de Abraão"
 hajj.3010.desc: "Tendo entrado em Meca, minha primeira tarefa é visitar o Lugar de Abraão. Esta pedra sagrada é considerada o marco que Abraão usou ao construir a Caaba, acompanhado por Ismael, todos aqueles séculos atrás.\n\nOs peregrinos ao meu redor se aproximam do santuário e inclinam suas cabeças em oração contemplativa. Eu deveria fazer o mesmo."
 hajj.3010.a: "Devo rezar por algo mais substancial..."
 hajj.3010.a.wealth.t: "Riqueza"
 hajj.3010.a.wealth.desc: "Você obtém ideias de como aumentar sua riqueza"
 hajj.3010.a.opinion.t: "Código Social"
 hajj.3010.a.opinion.desc: "Você percebe como se tornar mais agradável"
 hajj.3010.a.prestige.t: "Prestígio"
 hajj.3010.a.prestige.desc: "Você entende como pode se tornar mais prestigioso"
 hajj.3010.a.bad.t: "Superstição"
 hajj.3010.a.bad.desc: "Você alimenta sua superstição"
 hajj.3010.b: "Vamos nos concentrar e contemplar."
 hajj.3010.b.flavor_cynical: "Melhor acabar com isso logo."
 #Walk between Safa and Marwah
 hajj.3020.t: "Safa e Marwah"
 hajj.3020.desc: "Minha próxima tarefa é caminhar sete vezes entre os dois pontos sagrados de Safa e Marwah para comemorar o desespero e o esforço de Hajar para encontrar água para seu filho Ismail.\n\nIsmail, que mais tarde se tornaria o antepassado do abençoado Profeta.\n\nEnquanto me preparo para o rito, contemplo a vista de Safa e Marwah e observo a grande quantidade de peregrinos que já seguem entre as colinas, vindos de todas as classes sociais."
 hajj.3020.a: "Por que se contentar com sete?"
 hajj.3020.b: "Sete voltas meticulosas serão suficientes."
 hajj.3020.c: "Alguém vai perceber se eu fizer menos vezes?"
 hajj.3020.c.success.t: "Preguiça Bem-Sucedida"
 hajj.3020.c.success.desc: "Você consegue evitar fazer o número completo de voltas"
 hajj.3020.c.failure.desc: "Você é pego e penalizado"
 #Safa and Marwah penalization
 hajj.3021.t: "Pego!"
 hajj.3021.desc: "Quando começo a voltar das duas colinas, um dos clérigos locais me encara com expressão severa: \"Haji, #EMP creo#! que não completastes corretamente o rito de Safa e Marwah\",\n\ncontinua. \"A penalidade por tais ações é ou o Damm ou a Sadaqah al-Fitr. Ou, é claro, sempre podeis fazer as voltas corretamente\", sua expressão suaviza por uma fração de segundo.\n\n\"A Hajj ficará incompleta se vos abstiverdes, então o que será, Haji?\"."
 hajj.3021.a: "Vamos sacrificar um animal."
 hajj.3021.a.flavor: "Damm. $hajj.3040.c.flavor$"
 hajj.3021.b: "Vou fazer uma doação."
 hajj.3021.b.flavor: "Sadaqah al-Fitr. Sacrificar cereais e tâmaras aos pobres parece valer a pena."
 hajj.3021.c: "Vamos fazer as sete voltas corretamente desta vez."
 hajj.3021.c.flavor_zealous: "Eu #EMP sabia#! que deveria ter levado isso a sério..."
 hajj.3021.c.flavor: "Ah, que aborrecimento."
 #Drink water from the Zamzam well
 hajj.3030.t: "Poço de Zamzam"
 hajj.3030.desc: "Aqui estou eu, diante do místico poço de Zamzam, aquele descoberto através dos sonhos de uma fonte eterna no deserto. Beber sua água é um dos antigos ritos do Hajj, e, como tal, minha próxima empreitada.\n\nO poço, embora brotando de um intricado trabalho de pedra, está repleto de peregrinos do Hajj à minha esquerda, direita e centro, e devo me esforçar para atravessar a multidão e avançar em direção à água santificada compartilhada por muitos."
 hajj.3030.a: "Devo deixar os outros irem primeiro."
 hajj.3030.a.flavor: "Não tenho pressa."
 hajj.3030.b: "Saciar a sede da minha alma!"
 hajj.3030.b.flavor: "Delicioso. E dizem que também faz milagres!"
 hajj.3030.c: "Talvez eu apenas mergulhe levemente as mãos."
 hajj.3030.c.flavor: "Isso #EMP mal#! parece higiênico!"
 #Sacrifice to Allah
 hajj.3040.t: "Sacrifício para Allah"
 hajj.3040.desc: "Chegou a hora do próximo rito: o sacrifício a [ROOT.Char.GetFaith.HighGodName]. Uma área especial do recinto cerimonial foi preparada para esta ocasião, e o cheiro almiscarado se intensifica à medida que me aproximo das barracas que oferecem vários tipos de animais.\n\nPenso cuidadosamente nas minhas opções; sacrificar um animal grande, como um camelo, certamente seria mais piedoso — enquanto sacrificar um animal menor ou uma ovelha certamente seria suficiente para concluir o Hajj.\n\n Alguns peregrinos em um canto também parecem ter dividido entre si o custo de uma vaca grande."
 hajj.3040.a: "Sessenta e três camelos!"
 hajj.3040.a.flavor: "Não serei pior que o grande profeta!"
 hajj.3040.b: "Um camelo será suficiente."
 hajj.3040.b.flavor: "Os camelos conhecem o segredo..."
 hajj.3040.c: "Vamos com uma ovelha."
 hajj.3040.c.flavor: "Nunca gostei dos olhos vidrados delas mesmo."
 hajj.3040.d: "Vou participar do sacrifício daquela vaca ali."
 hajj.3040.d.flavor: "Por que extinguir mais vidas do que o necessário?"
 #Performing the Halq
 hajj.3001.t: "Halq"
 hajj.3001.desc: "Tendo rezado na Estação de Abraão, bebido água do poço de Zamzam, caminhado entre Safa e Marwah e feito um sacrifício em honra de [ROOT.Char.GetFaith.HighGodName][ROOT.Char.Custom('ES_OA')], agora estou pronta para concluir o hajj. O próximo rito que devo realizar é cortar o cabelo.\n\n"
 hajj.3001.desc.male_dominated: "Tradicionalmente, os homens raspam tudo, mas ocasionalmente é concedida uma dispensa para cortar apenas parte, e as mulheres são restritas a apenas uma mecha."
 hajj.3001.desc.female_dominated: "Tradicionalmente, as mulheres raspam tudo, mas ocasionalmente é concedida uma dispensa para cortar apenas parte, e os homens são restritos a apenas uma mecha."
 hajj.3001.desc.equal: "Tradicionalmente, tudo é raspado, mas ocasionalmente é concedida uma dispensa para cortar apenas parte."
 hajj.3001.a: "Raspar tudo!"
 hajj.3001.b: "Cortar apenas uma mecha de cabelo."
