l_spanish:
 ACTIVITY_LOG_ENTRY_EFFECT: "#S Efeitos#!\n $EFFECT$"
 activity_tournament_province_desc: "Você realiza um Torneio em [ROOT.Province.GetName]\nProvíncias com prédios adequados concedem um desconto de [gold_i][gold|El]"
 activity_feast_guest_desc: "$BULLET_WITH_TAB$ Os participantes podem ganhar [opinion|lE] dos personagens presentes\n$BULLET_WITH_TAB$ Os participantes podem perder [stress_loss_i][stress|lE]\n$BULLET_WITH_TAB$ Os participantes podem adquirir o [trait|lE] [GetTrait('lifestyle_reveler').GetName( GetNullCharacter )|l]"
 activity_tournament_guest_desc: "#weak Se você for elegível, participar de um Torneio oferecerá a chance de vencer competições e, portanto, prêmios, além de relaxar e apreciar as vistas e os sons. Também proporciona uma oportunidade para aprimorar suas habilidades marciais.#!"
 guest_friendship_title: "$activity_pulse_action_guest_friendship$"
 activity_pulse_action_guest_friendship: "[second.GetShortUINameNoTooltip|U] Elogia [first.GetShortUINameNoTooltip|U]"
 guest_insulted_title: "$activity_pulse_action_guest_insulted$"
 activity_pulse_action_guest_insulted: "[second.GetShortUINameNoTooltip|U] Insulta [first.GetShortUINameNoTooltip|U]"
 #Tournament - Activity Invalidated
 activity_system.0040.t: "Torneio Encerrado"
 activity_system.0040.desc: "Ai! Com as novas circunstâncias em torno do Torneio, uma rápida conversa com os organizadores confirma seus temores: o Torneio deve ser cancelado.\n\nArquivos de pessoas desanimadas passam, crianças desapontadas segurando as mãos de seus pais. Esperançosamente, em um futuro próximo, pode haver outra chance para essas festividades serem retomadas."
 activity_system.0040.a: "Uma verdadeira pena."
 #New Host after Character Death
 activity_system.0080.t: "Um Novo Anfitrião"
 activity_system.0080.desc: "Com a morte do anfitrião anterior, sussurros apressados entre os organizadores relevantes ganham ritmo. Todos presentes circulam felizes, alheios ao quase pânico que ocorre nos bastidores.\n\nFinalmente, um acordo é alcançado."
 activity_system.0080.desc_other: "As festividades continuarão, mas agora com [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] na liderança!"
 activity_system.0080.desc_me: "As festividades continuarão, e eu estarei à frente delas!"
 activity_system.0080.a: "Vamos continuar."
 #Pilgrimages: New Host after Character Death
 activity_system.0081.t: "O Destino Final"
 activity_system.0081.desc.relation_family_liked: "Infelizmente, meu querid[old_host.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('old_host'))], [old_host.Custom('ES_ElLa')] [old_host.GetTitledFirstName|l], deixou este mundo e,"
 activity_system.0081.desc.relation_liked: "Infelizmente, meu querido[old_host.Custom('ES_OA')] [old_host.GetTitledFirstName|l] partiu deste mundo e,"
 activity_system.0081.desc.relation_family: "Lamentavelmente, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('old_host'))], [old_host.Custom('ES_ElLa')] [old_host.GetTitledFirstName|l], deixou este mundo e,"
 activity_system.0081.desc.relation_neutral: "Infelizmente, [old_pilgrimage_host.Custom('ES_ElLa')] [old_pilgrimage_host.GetTitledFirstName|l] deixou este mundo e,"
 activity_system.0081.desc.outro: "assumi o cargo como seu herdeiro[ROOT.Char.Custom('ES_OA')].\n\nComo tal, independentemente dos meus próprios sentimentos, preciso decidir como devemos lidar com seus restos mortais e seus ritos fúnebres."
 activity_system.0081.a: "[ROOT.Char.GetTravelPlan.GetData.GetFinalDestination.GetProvince.GetNameNoTooltip] era seu lar."
 activity_system.0081.a.tt: "Será dado repouso a [old_host.GetShortUIName] em [THIS.Char.GetTravelPlan.GetData.GetFinalDestination.GetProvince.GetNameNoTooltip]"
 activity_system.0081.b: "[old_host.GetSheHe|U] merece descansar na santidade de [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetNameNoTooltip]."
 activity_system.0081.b.tt: "Será levado a [old_host.GetShortUIName] a repousar em [THIS.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetNameNoTooltip]"
 activity_system.0081.c: "[old_host.GetHerHim|U] levamos a [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetNameNoTooltip] e depois para casa."
 activity_system.0081.c.tt: "A [THIS.Char.GetInvolvedActivity.GetName|l] continuará e levará [old_host.GetShortUIName] a descansar em [THIS.Char.GetTravelPlan.GetData.GetFinalDestination.GetProvince.GetNameNoTooltip]"
 #Intent Invalidated
 activity_system.0090.t: "Intenção Invalidada"
 activity_system.0090.desc: "Com a mudança das circunstâncias atuais, fica claro que minha intenção anterior não pode ser seguida. Outros passam por mim felizes enquanto pondero minha situação, completamente alheio à minha leve consternação.\n\nO que mais meu coração deseja? Talvez eu deva apenas relaxar um pouco?"
 activity_system.0090.a: "Hora de direcionar meu foco para outro lugar."
 #Intent Target Invalidated
 activity_system.0091.t: "Alvo de Intenção Invalidado"
 activity_system.0091.desc: "Com a mudança das circunstâncias atuais, fica claro que meu alvo de intenção anterior não é mais relevante para meus objetivos. Outros passam por mim felizes enquanto pondero minha situação, completamente alheio à minha leve consternação.\n\nEm quem mais devo me concentrar? Talvez eu deva simplesmente me concentrar em mim mesmo?"
 activity_system.0091.a: "Bem, é hora de encontrar uma nova musa..."
 #Activity Conclusion
 activity_system.0100.t: "Uma Celebração Pobre"
 activity_system.0100.desc: "Não acredito no que estou vendo! Apesar dos meus muitos convites e preparativos, nem uma única pessoa apareceu na minha [activity_type.GetNameNoTooltip()|l]. Talvez o caminho até [location.GetName] esteja mais cheio de perigos do que eu imaginava.\n\n"
 activity_system.0100.outro_away: "Suponho que seja hora de iniciar minha jornada de volta para casa, em [ROOT.Char.GetCapitalLocation.GetName]."
 activity_system.0100.outro_home: "Pelo menos economizei o trabalho de viajar para longe de casa."
 activity_system.0100.a: "Mas por quê... por que ninguém apareceu?"
 activity_system.1010.t: "Uma Viagem Interrompida"
 activity_system.1010.desc: "Meu predecessor[host.Custom('ES_XA')], [host.GetNameRegnal], abandonou sua casca mortal enquanto percorria o reino. Tragicamente, [host.GetDeathReason].\n\n"
 activity_system.1010.desc.entourage: "Certamente a comitiva de [host.GetFirstNameNoTooltip] irá começar uma viagem lúgubre para casa, levando o corpo do meu [ROOT.Char.Custom2('RelationToMePossessive',SCOPE.sC('host'))]."
 activity_system.1010.desc.ruler: "[Select_CString( host.IsFemale, 'la caída', 'el caído' )|U] [host.GetTitleAsName|l] não merecia morrer tão longe de casa."
 activity_system.1010.a: "Descanse em paz, [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('host'))]."
 activity_system.1010.tt: "A [activity|lE] de [host.GetShortUINameNoTooltip] foi cancelada"
 activity_system.1011.desc: "Meu senhor[host.Custom('ES_XA')], [host.GetNameRegnal] deixou seu envoltório mortal enquanto percorria o domínio. Tragicamente, [host.GetDeathReason].\n\nO restante da viagem foi cancelado enquanto a comitiva de [host.GetFirstNameNoTooltip] inicia sua triste jornada de volta para casa, levando o corpo até seu descanso final."
 #Host has joined a war and has the opportunity to cancel the activity
 activity_system.0300.t: "A guerra não espera por ninguém"
 activity_system.0300.desc.intro.traveling: "O estrondo dos chifres de guerra chegou até mesmo a [target_activity_location.GetName] enquanto sigo a caminho para assistir ao meu [target_activity_type.GetNameNoTooltip|l] em [target_activity_location.GetName]."
 activity_system.0300.desc.intro.activity: "O estrondo dos chifres de guerra chegou até mesmo aqui em [target_activity_location.GetName], enquanto estou no meio de sediar um(a) [target_activity_type.GetNameNoTooltip|l]."
 activity_system.0300.desc.attacker: "Eu me juntei à luta contra [war_opponent.GetNameRegnal]."
 activity_system.0300.desc.defender: "Esse[war_opponent.Custom('ES_EA')] [war_opponent.Custom2('InsultNoun')|l] de [war_opponent.GetNameRegnal] declarou guerra contra mim!\n\n"
 activity_system.0300.desc.outro: "Muito planejamento foi feito para hospedar este [target_activity_type.GetNameNoTooltip|l] e não desejo mandar meus convidados para casa. No entanto, a importância deste conflito não deve ser subestimada.\n\nTalvez seja melhor concentrar todos os meus esforços em me preparar para a guerra..."
 activity_system.0300.a: "Eu posso lidar com as coisas daqui."
 activity_system.0300.a.tt: "O [target_activity_type.GetNameNoTooltip|l] continuará"
 activity_system.0300.b: "Esta guerra requer minha atenção total."
 activity_system.0300.b.tt: "O [target_activity_type.GetNameNoTooltip|l] será cancelado e todos os participantes começarão a retornar para casa"
 activity_system.0300.b.tt.cost: "Algumas despesas podem ser recuperadas"
 activity_system.0301.t: "[target_activity_type.GetNameNoTooltip|l] Cancelado"
 activity_system.0301.desc: "#EMP \"À guerra! À guerra!\"#! clamam os [knights|l] [target_activity_host.Custom('ES_DelDela')] [target_activity_host.GetTitledFirstName|l] enquanto trovejam em sua passagem, fazendo soar seus chifres e seus estandartes brilhando contra o céu.\n\nParece que [war_opponent.GetNameRegnal], esse/a semelhante [war_opponent.Custom2('InsultNoun', ROOT.Char)] não tem consideração por nosso/a [target_activity_type.GetNameNoTooltip|l]! O evento deve ser cancelado, pois [target_activity_host.Custom('ES_ElLa')] [target_activity_host.GetTitleAsNameNoTooltip] convoca levas e reza a [target_activity_host.GetFaith.WarGodName] pedindo a vitória.\n\nUm/uma [target_activity_type.GetNameNoTooltip|l] é uma diversão nobre e digna, mas o chamado às armas soa mais forte do que qualquer outro."
 activity_system.0301.a: "Que tragédia..."
 activity_system.0310.desc.intro: "O estrondo dos chifres de guerra chegou até aqui em [target_activity_location.GetName] enquanto participo do(a) [target_activity_type.GetNameNoTooltip|l] de [target_activity_host.GetName].\n\n"
 activity_system.0310.desc.primary_defender: "![attacker.Custom('ES_ElLa')|U] vil [attacker.GetTitledFirstName|l] declarou guerra contra mim!"
 activity_system.0310.desc.random_defender: "Fui convocado para ajudar na guerra entre [attacker.Custom('ES_ElLa')] [attacker.GetTitledFirstName|l] e [defender.Custom('ES_ElLa')] [defender.GetTitledFirstName|l]."
 activity_system.0310.a.tt: "Você continua participando do [target_activity_type.GetNameNoTooltip|l]"
 activity_system.0310.b.tt: "Você deixa o [target_activity_type.GetNameNoTooltip|l] e começa a retornar para casa"
 activity_system.0320.t: "Uma Conclusão Inesperada"
 activity_system.0320.desc: "Noss[host.Custom('ES_OA')] anfitri[host.Custom('ES_OnOna')], [host.GetName], perdeu suas posses territoriais e, assim, o/a [activity_type.GetNameNoTooltip()|l] chegou a um fim prematuro.\n\nCertamente, eu não esperava que este assunto terminasse assim depois de toda a pompa das convocações e preparativos. Suponho que tudo o que resta para meu séquito e para mim é voltar para casa em [ROOT.Char.GetCapitalLocation.GetNameNoTooltip]…"
 activity_system.0320.a: "O que está feito, está feito."
 #If you have gained the incapable trait
 activity_system.0330.t: "Incapaz"
 activity_system.0330.desc.intro: "Fui considerado incapaz e visto como totalmente inapto[GetPlayer.Custom('ES_OA')] para administrar meus próprios assuntos, incluindo minha [activity_type.GetNameNoTooltip()|l]!\n\n"
 activity_system.0330.desc.memory: "Infelizmente, [incapable_memory.GetDescription].\n\n"
 activity_system.0330.desc.outro: "Não há mais nada a fazer além de retornar para casa em [home.GetName]."
 activity_system.0330.a: "Que meus convidados cheguem em casa em segurança."
 activity_system.0331.t: "Incapaz"
 activity_system.0331.desc: "Nosso[host.Custom('ES_OA')] anfitri[host.Custom('ES_OnOna')] , [host.GetName] foi considerado[host.Custom('ES_OA')] incapaz por quem o [host.GetHerHim] rodeia e é julgado totalmente inapt[host.Custom('ES_OA')] para gerir seus próprios assuntos, incluindo seu [activity_type.GetNameNoTooltip()|l]!\n\nPor desgracia, todos nós devemos voltar para casa de mãos vazias."
 activity_system.0331.a: "Que pena."
 #Late to the activity
 activity_system.0400.t: "Atrasado no Cronograma"
 activity_system.0400.desc_leader: "Quando [travel_leader.Custom2('MyCharacterIntroduction', ROOT.Char)] se aproxima de mim com uma mistura de vergonha e preocupação estampada no rosto, sei que traz más notícias.\n\n\"Lamento informar que estamos com um atraso de cerca de [GetTimeBetweenDates(ROOT.Char.GetInvolvedActivity.GetActiveStartDate.Self, ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetEstimatedArrivalDate)], meu [ROOT.Char.GetTitleAsNameNoTooltip], e talvez não cheguemos ao destino a tempo.\""
 activity_system.0400.desc_no_leader: "Continuo avaliando o céu e todos os mapas que possuo, mas está claro que a matemática não fecha.\n\nEstamos atrasados em cerca de [GetTimeBetweenDates(ROOT.Char.GetInvolvedActivity.GetActiveStartDate.Self, ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetEstimatedArrivalDate)] e, se continuarmos no ritmo atual ao longo do itinerário atual, não chegaremos ao destino a tempo."
 activity_system.0400.a: "Vamos nos apressar."
 activity_system.0400.a.tt: "Você espera ganhar velocidade ao longo do caminho"
 activity_system.0400.b: "Não vale realmente a pena."
 activity_system.0401.t: "Muito Tarde"
 activity_system.0401.desc_leader: "[travel_leader.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima de mim com uma expressão severa no rosto.\n\n\"Lamento informar-vos de que não chegamos a tempo, meu [ROOT.Char.GetTitleAsNameNoTooltip]. A atividade começou hoje e, simplesmente, não estamos lá para participar\"."
 activity_system.0401.desc_no_leader: "Hoje é o dia. A atividade começou hoje, mas apesar dos meus melhores esforços, simplesmente não estamos lá para isso.\n\nNão há mais nada a fazer além de voltar para casa."
 activity_system.0401.a: "Decepcionante."
 SELECT_ACTIVITY_DECISION_TITLE: "#D Selecionar Tipo de Atividade#!"
 SELECT_ACTIVITY_DECISION_NEXT_STEP_BUTTON: "$SELECT_ACTIVITY_DECISION_TITLE$"
 hold_grand_activity_option_tournament: "$activity_tournament$"
 hold_grand_activity_option_tournament_desc: "$activity_tournament$"
 hold_grand_activity_option_wedding: "$activity_wedding$"
 hold_grand_activity_option_wedding_desc: "$activity_wedding$"
 hold_grand_activity_option_tour: "$activity_tour$"
 hold_grand_activity_option_tour_desc: "$activity_tour$"
 hold_standard_activity_option_feast: "$activity_feast$"
 hold_standard_activity_option_feast_desc: "$activity_feast$"
 hold_standard_activity_option_hunt: "$activity_hunt$"
 hold_standard_activity_option_hunt_desc: "$activity_hunt$"
 hold_standard_activity_option_pilgrimage: "$activity_pilgrimage$"
 hold_standard_activity_option_pilgrimage_desc: "$activity_pilgrimage$"
 hold_standard_activity_option_play_date: "$activity_playdate$"
 hold_standard_activity_option_play_date_desc: "$activity_playdate$"
 hold_standard_activity_option_witch_ritual: "$activity_witch_ritual$"
 hold_standard_activity_option_witch_ritual_desc: "$activity_witch_ritual$"
 activity_system.0500.t: "Um Fim Sombrio"
 activity_system.0500.desc: "Fui informado de que [Select_CString( host.IsFemale, 'nuestra anfitriona', 'nuestro anfitrión' )] , [host.GetNameNoTooltip] morreu. Devido a estas circunstâncias imprevistas, a atividade foi cancelada."
 activity_system.0500.a: "Uma tragédia, de fato."
 activity_system.0501.t: "A partida de uma alma"
 activity_system.0501.desc: "Um tumulto ressoa por toda a sala de exames. Eruditos e monges correm de um lado para o outro. Uma multidão se reúne no pátio, e dela vem o som de lamentos.\n\n[ROOT.Char.GetTopLiege.Custom('ES_ElLa')|U] [ROOT.Char.GetTopLiege.Custom('GetDaughterSon')] do Céu morreu."
 activity_system.0501.a: "Não acredito nisso…"
 activity_system.0550.t: "Planos Frustrados"
 activity_system.0550.desc: "Devido ao meu súbito e inesperado aprisionamento, me vejo incapaz de continuar participando da minha atividade, e ela precisa ser cancelada.\n\nTodo o tempo que passei planejando..."
 activity_system.0550.a: "Isso não fazia parte do meu plano..."
 activity_system.0551.t: "Encarceramento do Anfitrião"
 activity_system.0551.desc: "Devido ao encarceramento repentino e imprevisto de meu [Select_CString( host.IsFemale, 'anfitriona', 'anfitrión' )] , [host.GetNameNoTooltip] , a atividade da qual eu participava foi cancelada."
 activity_system.0551.a: "Hora de voltar para casa."
 activity_system.0552.t: "Desafio não atendido"
 activity_system.0552.desc: "O que significa isto? Parece que nenhum outro movimento está disposto a enfrentar o desafio do [GetPlayer.Custom('GetMyMovementNoTooltip')].\n\nSem ninguém com quem debater, o debate foi cancelado."
 activity_system.0552.a: "Até a próxima vez…"
 activity_system.0554.opening: "[host.Custom2('AppropriateGreeting', ROOT.Char)]"
 activity_system.0554.a: "Devo aceitar este desafio."
 activity_system.0554.b: "Pensarei numa desculpa conveniente."
