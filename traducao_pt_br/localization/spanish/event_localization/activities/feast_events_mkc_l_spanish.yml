l_spanish:
 feast_mkc.0001.t: "Sozinho com uma Lembrança"
 feast_mkc.0001.desc: "Apesar da algazarra e da alegria no salão, vejo um[guest_lost_loved_pet.Custom('ES_OA')] dos meus convidad[guest_lost_loved_pet.Custom('ES_OA')]os, [guest_lost_loved_pet.GetShortUIName], sozinho num canto com meu gato, [ROOT.Char.Custom('CatStoryName')]. [ROOT.Char.Custom('CatStorySheHe')|U] repousa serenamente no colo de [guest_lost_loved_pet.GetShortUINameNoTooltipNoFormat], ronronando, enquanto [guest_lost_loved_pet.GetFirstNameNoTooltip] acaricia com delicadeza seu pelo [ROOT.Char.Custom('CatFurColor')].\n\n\"[ROOT.Char.Custom('CatStorySheHe')|U] me lembra muito meu velho gato\", murmura [guest_lost_loved_pet.GetFirstNameNoTooltip]. Seus olhos se enchem de lágrimas."
 feast_mkc.0001.a: "Passar um tempo lamentando [Select_CString(And(ROOT.Char.IsFemale, guest_lost_loved_pet.IsFemale), 'juntas', 'juntos')] pelo gato de [guest_lost_loved_pet.GetFirstNameNoTooltip]"
 feast_mkc.0001.b: "Com ainda mais razão devo valorizar o tempo com [ROOT.Char.Custom('CatStoryName')]"
 feast_helped_overcome_loss_opinion: "Me ajudou a lamentar a perda do meu animal de estimação"
 feast_sympathy_over_loss_opinion: "Ajudou a superar a perda de um animal de estimação"
 bonus_to_petting_pet_tt: "Quando você acariciar seu gato, perderá mais [stress|lE]"
