 #Gruesome Festival (Blót)
 activity_gruesome_festival: "$tenet_gruesome_festivals_blot_name$"
 activity_gruesome_festival_selection_tooltip: "Você convida seus súditos para participar de um ritual sagrado e custoso"
 activity_gruesome_festival_desc: "Já está na hora de que todo o [GetPlayer.GetPrimaryTitle.GetNameNoTierNoTooltip|l] se reúna para fazer sacrifícios a [GetPlayer.GetFaith.PantheonTerm]. Esses rituais não apenas unem os fiéis, mas também confirmam meu lugar como [GetPlayer.GetTitleAsNameNoTooltip|l] de todas as terras."
 activity_gruesome_festival_owner: "Anfitrião"
 activity_gruesome_festival_host_desc: "\nVocê organiza um $gruesomefestivalname_blot$ o que envolve:\n#indent_newline:0 $EFFECT_LIST_BULLET$ Decidir a escala do festival\n#indent_newline:0 $EFFECT_LIST_BULLET$ Decidir o que sacrificar, inclusive escolhendo um dos seus [prisoners|lE] como [designate_chief_sacrifice_chief_sacrifice|lE]\n#indent_newline:0 $EFFECT_LIST_BULLET$ Ganhar ou perder [county_opinion|lE] e [opinion|lE] de [character|lE] dependerá dos [core_tenets|lE] da [faith|lE] de seus súditos"
 activity_gruesome_festival_guest_help_text: "Os [guests|lE] participarão do sacrifício e do banquete subsequente. Eles ganharão ou perderão [opinion|lE] de você, dependendo dos [core_tenets|lE] de sua [faith|lE]."
 activity_gruesome_festival_province_desc: "$gruesome_festival_size_small_desc$"
 activity_gruesome_festival_fallback_name: "Sacrifício Ritual"
 activity_gruesome_festival_desc.non_gf_practioner: "Há entre meus súditos aqueles que celebram grandes ritos de sacrifício com a bênção de seu [GetPlayer.GetTitleAsNameNoTooltip|l]. Não me cabe dúvida de que, se eu consentir que se realize, ainda que seja uma variante limitada, isso sem dúvida me conquistaria sua aprovação, embora adotar seus costumes mais… bárbaros possa me render o desprezo daqueles que desprezam seus costumes."
