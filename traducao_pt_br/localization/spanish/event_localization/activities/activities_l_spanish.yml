 #Hunt
 activity_hunt: "Caçada"
 hunt_phase_desc: "Persiga sua presa e decida como irá abatê-la"
 activity_hunt_name: "[ACTIVITY.GetOwner.LocalPlayerString( 'Sua caçada', 'A caçada' )][ACTIVITY.GetOwner.LocalPlayerString('', 'Loc_ES_de_GetName' )]"
 activity_hunt_desc: "[GetPlayer.Custom('GetHuntDesc')|U]"
 activity_hunt_desc_regular: "A caça oferece emoções e perigos em abundância e serve para fornecer uma base sólida para a equitação e o arco e flecha.\n\nAs caçadas são supervisionadas pelo [GetCourtPositionType('master_of_hunt_court_position').GetName()|l], que anunciará [hunt_sightings_no_prefix|lE] de bestas comuns, raras e ferozes."
 activity_hunt_desc_adventurer: "A caça oferece emoções e perigos em abundância e serve para fornecer uma base sólida para a equitação e o tiro com arco.\n\nSendo [GetGovernment('landless_adventurer_government').GetName|l] caçar rende menos [prestige|lE] [prestige_i], mas fornece [provisions|lE] [provisions_i]. As caçadas são supervisionadas pelo [GetCourtPositionType('huntperson_camp_officer').GetName()|l].\n\nNo início de uma caçada, você terá a oportunidade de comprar direitos de caça por [gold|lE] [gold_i] ou, caso contrário, você ganhará o [trait_level_track_xp|E] de [GetTrait('gallowsbait').GetName( GetNullCharacter )|l] [GetTrait( 'gallowsbait' ).GetTraitTrackByKey( 'poacher' ).GetName|l]."
 activity_hunt_owner: "Caçador"
