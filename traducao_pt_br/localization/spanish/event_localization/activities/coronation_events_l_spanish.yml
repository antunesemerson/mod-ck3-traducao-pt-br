 ach_coronation.0015.t: "A grande debandada de [GetCurrentDate.GetYear]"
 ach_coronation.0015.desc: "Que desastre! A multidão que observava a comitiva recentemente chegada [first.Custom('ES_DelDela')] [first.GetTitledFirstName|l], por motivos que desconheço, mergulhou no caos. Chego a tempo de ver uma turba de locais indo de um lado para o outro e os guardas [first.Custom('ES_DelDela')] [first.GetTitleAsNameNoTooltip|l] que espancam os plebeus caídos ou são derrubados e pisoteados junto com eles.\n\nOs guardas mal conseguem conter a multidão, e a violência só aumenta o pânico. Em breve haverá uma debandada!"
 ach_coronation.0015.has_happened: "Isso aconteceu por causa das ações de um [coronation_detractor|lE] traiçoeiro!"
 ach_coronation.0015.a: "Preciso acalmar a multidão!"
 ach_coronation.0015.a.august: "Compatriotas! Voss[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] vos pede calma!"
 ach_coronation.0015.a.august.tt: "Sua autoridade inegável subjuga a multidão."
 ach_coronation.0015.a.tt.success: "Sucesso!"
 ach_coronation.0015.a.tt.success.desc: "Você consegue impedir mais derramamento de sangue; é um grande sinal para o seu reinado!"
 ach_coronation.0015.a.tt.critical_success: "Uma oração lendária"
 ach_coronation.0015.a.tt.critical_success.desc: "A multidão fica em silêncio reverente. Muitos até choram com a beleza de suas palavras."
 ach_coronation.0015.a.tt.failure.title: "Fracasso"
 ach_coronation.0015.a.tt.failure: "Os gritos abafam sua voz"
 ach_coronation.0015.a.tt.initiator.critical_failure: "Desastre!"
 ach_coronation.0015.a.tt.initiator.critical_failure.desc: "[host.GetShortUIName] impede o caos — pior ainda, é celebrado por isso!"
 ach_coronation.0015.a.tt.initiator.failure: "Fracasso!"
 ach_coronation.0015.a.tt.initiator.failure.desc: "[host.GetShortUIName] impede um desastre; maldição!"
 ach_coronation.0015.a.tt.initiator.failure.crackdown.desc: "Os soldados de [host.GetShortUIName] conseguem acabar com o caos; agora ele é mais temido do que nunca"
 ach_coronation.0015.a.tt.initiator.failure.physician.desc: "[host.GetShortUIName] emprega seu talento como médic[host.Custom('ES_OA')] para ajudar os feridos e é aclamad[host.Custom('ES_OA')] como [Select_CString( host.IsFemale, 'uma heroína', 'um herói' )]!"
 ach_coronation.0015.a.tt.initiator.success: "Éxito!"
 ach_coronation.0015.a.tt.initiator.success.desc: "[host.GetShortUIName] fica humilhad[host.Custom('ES_OA')] e sua coroação arruinada!"
 ach_coronation.0015.a.tt.initiator.critical_success: "Massacre!"
 ach_coronation.0015.a.tt.initiator.critical_success.desc: "Os soldados de [host.GetShortUIName] reagiram de forma exagerada e mataram muitos — verdadeiro escândalo!"
 ach_coronation.0015.b: "Atendam aos feridos! Rápido!"
 ach_coronation.0015.b.flavor: "Agora precisamos nos concentrar apenas em salvar vidas!"
 ach_coronation.0015.c: "Idiotas exacerbados!"
 ach_coronation.0015.d: "Guardas! Restabeleçam a ordem!"
 ach_coronation.0015.d.byzantines: "Soltem os varegues!"
 ach_coronation.0015.e: "Ah, não, alguns camponeses podem morrer. Enfim…"
 ach_coronation.0015.e.tt: "Você terá que lutar para abrir caminho!"
 ach_coronation.0015.e.success: "Você se liberta da multidão!"
 ach_coronation.0015.e.failure: "Um plebeu ousa pisar na sua cabeça!"
