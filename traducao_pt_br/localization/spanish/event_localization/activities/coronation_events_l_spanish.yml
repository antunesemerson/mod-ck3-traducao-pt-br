l_spanish:
 # Events
 ach_coronation.0001.t: "Chegada"
 ach_coronation.0001.travel: "Finalmente cheguei a [ROOT.Char.GetCurrentLocation.GetBaronyNameExplicitly] para a coroação."
 ach_coronation.0001.notravel: "Mensagens e servos foram enviados de [ROOT.Char.GetCurrentLocation.GetBaronyNameExplicitly] para a coroação."
 ach_coronation.0001.intro.hre: "Coroar um[host.Custom('ES_XA')] [host.GetTitleAsName] não é pouca coisa. [host.GetPrimaryTitle.GetTierAsName|U] em sua totalidade parece estar acorrendo a [ROOT.Char.GetCurrentLocation.GetBaronyNameExplicitlyNoTooltip], e os estandartes dos eleitores e de uma centena de nobres locais já tremulam."
 ach_coronation.0001.intro.hre_host: "Em breve me sentarei no trono de Carlos Magno, usarei a coroa de Otão e falarei com a voz de Augusto. Os eleitores já escolheram seu [ROOT.Char.GetTitleAsNameNoTooltip|l]; agora é hora de todos os outros seguirem o exemplo."
 ach_coronation.0001.intro.byzantine: "Estes acontecimentos colocarão [host.Custom('ES_AlAla')] [host.GetTitledFirstName|l] entre figuras como Heráclio e Justiniano. Reinar sobre os [Glossary( 'romaioi', 'ROMAIOS_GLOSS' )] é reinar sobre o mundo, e só se pode esperar que [host.Custom('ES_ElLa')] [host.GetTitledFirstNameNoTooltip|l] esteja à altura."
 ach_coronation.0001.intro.byzantine_host: "Em breve ocuparei meu lugar legítimo ao lado de Constantino e Teodósio. Serei [Glossary( 'Autokrator', 'AUTOKRATOR_GLOSS')], senhor[ROOT.Char.Custom('ES_XA')] do universo, governante de toda Roma, um[ROOT.Char.Custom('ES_XA')] verdadeir[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsName|l]!"
 ach_coronation.0001.intro.host: "O ar vibra de antecipação, quando finalmente percebo que serei coroado [ROOT.Char.GetTitleAsNameNoTooltip|l] de [ROOT.Char.GetPrimaryTitle.GetNameNoTier]."
 ach_coronation.0001.intro.notravel_host: "Só quando a última convocação parte e a corte começa os preparativos, percebo que finalmente serei coroado [ROOT.Char.GetTitleAsName|l] de [ROOT.Char.GetPrimaryTitle.GetNameNoTier]."
 ach_coronation.0001.guest: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] será coroad[host.Custom('ES_OA')] aqui em [ROOT.Char.GetCurrentLocation.GetBaronyNameExplicitlyNoTooltip], e só posso esperar que se mostre dign[host.Custom('ES_OA')] de sua coroa."
 ach_coronation.0001.ending.host_arbitrary: "\n\nEm breve serei [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip], e ninguém poderá dizer o contrário! Por fim, estarei livre para governar como #emp yo#! desejar."
 ach_coronation.0001.ending.host_cynical: "\n\nAgora me preparo para me curvar diante de [priest.GetFirstName] perante o reino, como um[ROOT.Char.Custom('ES_XA')] idiota devot[ROOT.Char.Custom('ES_OA')], mas, assim que eu me levantar, nunca mais serei obrigad[ROOT.Char.Custom('ES_OA')] a ficar ouvindo suas baboseiras!"
 ach_coronation.0001.ending.host_cynical_hof: "\n\nMal posso esperar para ver [priest.Custom('ES_AlAla')] [priest.GetTitledFirstName|l] se exibir com a turma de gente mais chata que se possa imaginar…"
 ach_coronation.0001.ending.host_impatient: "\n\nEstou ansioso para que isso acabe logo! A espera é uma tortura. [ROOT.Char.Custom('GetBusynessOpinion')] estarei ocupado demais[ROOT.Char.Custom('ES_XA')] para pensar nisso…"
 ach_coronation.0001.ending.host_just: "\n\nAté agora, tenho sido ilegítim[ROOT.Char.Custom('ES_OA')], pouco mais que um[ROOT.Char.Custom('ES_XA')] pretendente. Mas, assim que esta cerimônia terminar, finalmente serei — de verdade — [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip]!"
 ach_coronation.0001.ending.host_ambitious: "\n\nSaber que em breve terei uma coroa sobre a cabeça me alegra; embora seja apenas o primeiro passo para a #EMP verdadera#! glória."
 ach_coronation.0001.ending.host_compassionate: "\n\nEmbora a glória que virá seja grande, devo lembrar que é ao povo do meu [ROOT.Char.GetPrimaryTitle.GetTierAsName|l] diante do qual devo provar meu valor."
 ach_coronation.0001.ending.host_trusting: "\n\nEm breve, todos os meus vassalos estarão aqui comigo, e certamente todos e cada um deles hão de aclamar meu nome!"
 ach_coronation.0001.ending.host_paranoid: "\n\nEm breve, todos os meus vassalos estarão aqui comigo e [ROOT.Char.GetCurrentLocation.GetBaronyNameExplicitlyNoTooltip] será um ninho de víboras. Vou ter que ficar de olho nas minhas costas…"
 ach_coronation.0001.ending.host_zealous: "\n\nDevo rezar, pois somente [ROOT.Char.GetFaith.HighGodName] pode decidir se sou dign[ROOT.Char.Custom('ES_OA')]."
 ach_coronation.0001.ending.host_content: "\n\nÉ verdade que eu poderia ter passado sem tudo isso, mas há certas coisas que um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] tem que fazer."
 ach_coronation.0001.ending.host_gregarious: "\n\nHaverá tanta, tanta gente com quem eu vou precisar falar... isso pode ser bem divertido!"
 ach_coronation.0001.ending.host_craven: "\n\nTudo correrá bem, espero, contanto que meus vassalos se alinhem... e-eles vão se alinhar, certo?"
 ach_coronation.0001.ending.host_shy: "\n\nTodo o reino logo estará em [ROOT.Char.GetCurrentLocation.GetBaronyNameExplicitlyNoTooltip]… quanto antes acabarmos com isto, melhor."
 ach_coronation.0001.ending.host_arrogant: "\n\nPronto todos — tanto plebeus quanto nobres — se curvarão diante de mim... ótimo."
 ach_coronation.0001.ending.host_calm: "\n\nEmbora a coroação deva ser um dia alegre para todos, preciso ter cuidado; os dias que virão podem ser perigosos…"
 ach_coronation.0001.ending.host_gluttonous: "\n\nMal posso esperar para ser coroad[ROOT.Char.Custom('ES_OA')]! Será glorioso banquetear com o reino, como um[ROOT.Char.Custom('ES_XA')] autêntic[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]!"
 ach_coronation.0001.ending.host_eccentric: "\n\nLogo me coroarão, e então reinarei #EMP para siempre#!."
 ach_coronation.0001.ending.host_neutral: "\n\nEmbora eu já reine, esta coroação é que me marcará como verdadeir[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], e estou pront[ROOT.Char.Custom('ES_OA')]."
 ach_coronation.0001.ending.hostile_host: "\n\n[host.Custom('ES_ElLa')|U] [host.GetTitledFirstNameNoTooltip|l] certamente não é meu amigo, mas eu — e o reino — haveremos de resistir."
 ach_coronation.0001.ending.friendly_host: "\n\nSabe-se que [ROOT.Char.Custom('ES_ElLa')] [host.GetTitledFirstNameNoTooltip|l] sente afeto por mim; que seu reinado seja proveitoso para [Select_CString(And(ROOT.Char.IsFemale, host.IsFemale),'nós duas','nós dois')]! Ou, pelo menos, para mim…"
 ach_coronation.0001.ending.neutral_host: "\n\nSe ame ou se odeie [ROOT.Char.Custom('ES_AlAla')] [host.GetTitledFirstNameNoTooltip|l], ninguém pode negar a importância compartilhada entre nós que seremos testemunhas."
 ach_coronation.0001.a: "Em breve, começará meu reinado!"
 ach_coronation.0001.a.eccentric: "Para sempre…"
 ach_coronation.0001.a.bad: "É hora de ver em que encrenca eu posso me meter…"
 ach_coronation.0001.a.good: "Hoje começa um novo capítulo."
 ach_coronation.0001.tt.hof_visit.title: "Visita sagrada"
 ach_coronation.0001.tt.hof_visit: "[hof.GetCurrentLocation.GetBaronyNameExplicitly] ganha [GetModifier('ach_hof_visit_modifier').GetNameWithTooltip] pela chegada [hof.Custom('ES_DelDela')] [hof.GetTitledFirstName|l]"
 ach_coronation.0010.t: "Chega [hof.Custom('ES_ElLa')] [hof.GetTitledFirstNameNoTooltip|l]"
 ach_coronation.0010.desc.desc_opening: "Tocam os sinos de cada [coronation_site.GetCounty.GetFaith.HouseOfWorship] e as pessoas aclamam nas ruas de [coronation_site.GetHolding.GetName] quando os estandartes [hof.Custom('ES_DelDela')] [hof.GetTitledFirstName|l] aparecem no horizonte."
 # Greeting
 ach_coronation.0010.desc.desc_greeting.first_person: "Meu [greeter.GetCouncillorPosition( 'councillor_court_chaplain' ).GetPositionName|l] [greeter_2.GetFirstName] e eu somos os [Select_CString(And(ROOT.Char.IsFemale, greeter_2.IsFemale), 'las primeras', 'los primeros')] a receber [hof.Custom('ES_AlAla')] [hof.GetTitleAsNameNoTooltip] e após [greeter.Custom2('GetHoFGreeterExchangeFirstPerson', SCOPE.sC('hof'))], entramos em [coronation_site.GetHolding.GetNameNoTooltip].\n\n"
 ach_coronation.0010.desc.desc_greeting.host: "[greeter.Custom('ES_ElLa')|U] [greeter.GetTitledFirstName|l] e seu [greeter.GetCouncillorPosition( 'councillor_court_chaplain' ).GetPositionName|l], [greeter_2.GetFirstName], são [Select_CString(And(ROOT.Char.IsFemale, greeter_2.IsFemale), 'las primeras', 'los primeros')] em receber a delegação [hof.GetPrimaryTitle.GetAdjective], e só entram em [coronation_site.GetHolding.GetNameNoTooltip] após [greeter.Custom2('GetHoFGreeterExchange', SCOPE.sC('hof'))].\n\n"
 ach_coronation.0010.desc.desc_greeting.baron: "[greeter.Custom('ES_ElLa')|U] [greeter.GetTitledFirstName|l] e [greeter_2.Custom('ES_ElLa')] [greeter.GetCouncillorPosition( 'councillor_court_chaplain' ).GetPositionName|l] local, [greeter_2.Custom('ES_ElLa')] [greeter_2.GetTitledFirstName|l], são [Select_CString(And(ROOT.Char.IsFemale, greeter_2.IsFemale), 'las primeras', 'los primeros')] os primeiros a receber a delegação [hof.GetPrimaryTitle.GetAdjective] e só entram em [coronation_site.GetHolding.GetNameNoTooltip] após [greeter.Custom2('GetHoFGreeterExchange', SCOPE.sC('hof'))].\n\n"
 # First description
 ach_coronation.0010.desc.desc_first.greedy: "Os pobres locais não deveriam esperar muitas esmolas… Diz-se que [hof.Custom('ES_ElLa')] [hof.GetTitledFirstNameNoTooltip|l] é bastante sovin[hof.Custom('ES_OA')]; embora, com certeza, sejam testemunhas de"
 ach_coronation.0010.desc.desc_first.generous: "Sabe-se que [hof.Custom('ES_ElLa')] [hof.GetTitledFirstName|l] é [hof.GetWomanMan] generos[hof.Custom('ES_OA')]; está claro que os habitantes locais desfrutarão de abundantes esmolas junto a"
 ach_coronation.0010.desc.desc_first.compassionate: "A compaixão [hof.Custom('ES_DelDela')] [hof.GetTitleAsNameNoTooltip|l] e as muitas preces ao seu coração bondoso enchem o ar junto com histórias de"
 ach_coronation.0010.desc.desc_first.cynical: "[hof.Custom('ES_ElLa')|U] [hof.GetTitledFirstName|l] é tristemente famos[hof.Custom('ES_OA')], não tanto por sua fé, mas mais por"
 ach_coronation.0010.desc.desc_first: "Os fiéis acorrem em massa para ver [hof.Custom('ES_AlAla')] [hof.GetTitledFirstNameNoTooltip|l], e todo mercador e mendigo da cidade os segue, assim como aqueles que só esperam testemunhar"
 # Second description
 ach_coronation.0010.desc.desc_second.zealous: "seus célebres sermões inflamados e fervor excepcional."
 ach_coronation.0010.desc.desc_second.wrathful: "seu lendário comportamento ardente e temperamento impulsivo."
 ach_coronation.0010.desc.desc_second.lustful: "suas infames… tendências."
 ach_coronation.0010.desc.desc_second.strong: "sua estatura lendária, um físico sem dúvida abençoado por [hof.GetFaith.HighGodName]."
 ach_coronation.0010.desc.desc_second.gluttonous: "seu apetite infame — supostamente, a ruína de toda ração de [hof.Custom('GetExpensiveDessert')] em [hof.GetCapitalLocation.GetBaronyNameExplicitlyNoTooltip]."
 ach_coronation.0010.desc.desc_second: "sua grande importância e prestígio."
 # Ending
 ach_coronation.0010.desc.desc_ending.excommunicated_first_person: "É de surpreender que [hof.Custom('ES_ElLa')] [hof.GetTitledFirstNameNoTooltip|l] tenha vindo sequer, dada minha excomunhão. Sem dúvida, o custo da sua bênção será grande…"
 ach_coronation.0010.desc.desc_ending.excommunicated: "Muitos se surpreendem que [hof.Custom('ES_ElLa')] [hof.GetTitledFirstName|l] tenha vindo até aqui, dada a excomunhão que recai sobre [host.GetFirstName]; não há dúvida de que [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip|l] pagará muito pela coroa…"
 ach_coronation.0010.desc.desc_ending.opinion_very_good_first_person: "[hof.GetFirstNameNoTooltip] e eu somos grandes [Select_CString(And(ROOT.Char.IsFemale, hof.IsFemale), 'amigas', 'amigos')] e não há dúvida de que esta coroação será um acontecimento feliz para [Select_CString(And(ROOT.Char.IsFemale, hof.IsFemale), 'ambas', 'ambos')]."
 ach_coronation.0010.desc.desc_ending.opinion_very_good: "Diz-se que [hof.Custom('ES_ElLa')] [hof.GetTitleAsNameNoTooltip] e [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip] são grandes [Select_CString(And(host.IsFemale, hof.IsFemale), 'amigas', 'amigos')] e que esta coroação será, sem dúvida, uma ocasião feliz para ambas as figuras."
 ach_coronation.0010.desc.desc_ending.opinion_bad: "No entanto, as tensões entre [hof.Custom('ES_ElLa')] [hof.GetTitleAsNameNoTooltip] e [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip|l] [host.Custom2('GetRandomConflictDescriptor', SCOPE.sC('hof'))] e é evidente que o ambiente na coroação será tenso."
 ach_coronation.0010.desc.desc_ending.opinion_bad_first_person: "No entanto, as tensões entre [hof.Custom('ES_ElLa')] [hof.GetTitleAsNameNoTooltip] e eu [host.Custom2('GetRandomConflictDescriptor', SCOPE.sC('hof'))] e, sem dúvida, o clima da coroação será tenso."
 ach_coronation.0010.desc.desc_ending.low_fervor: "A [hof.GetFaith.GetName|l] passou por tempos melhores; nunca antes as chamas da fé pareceram tão fracas e os verdadeiros crentes tão raros. [host.Custom('ES_ElLa')|U] venerável e [hof.Custom('ES_ElLa')] [hof.GetTitleAsNameNoTooltip] sem dúvida esperam que a coroação de [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('host'))] reforce a fé de seu [host.GetPrimaryTitle.GetTierAsName|l]."
 ach_coronation.0010.desc.desc_ending.opinion_good_first_person: "As relações entre [hof.Custom('ES_ElLa')] [hof.GetTitleAsNameNoTooltip|l] e eu são calorosas, e não tenho dúvida de que o povo de [coronation_site.GetHolding.GetNameNoTooltip] brindará por [Select_CString(And(ROOT.Char.IsFemale, hof.IsFemale), 'nosotras', 'nosotros')] durante várias semanas."
 ach_coronation.0010.desc.desc_ending.opinion_good: "As relações entre [hof.Custom('ES_ElLa')] [hof.GetTitleAsNameNoTooltip|l] e [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip|l] são calorosas, e não tenho dúvida de que o povo de [coronation_site.GetHolding.GetNameNoTooltip] brindará por [Select_CString(And(hof.IsFemale, host.IsFemale), 'ambas', 'ambos')] durante várias semanas."
 ach_coronation.0010.desc.desc_ending.neutral: "É impressionante que [host.Custom('ES_ElLa')] [hof.GetTitledFirstNameNoTooltip|l] seja coroad[host.Custom('ES_OA')] por [hof.Custom('ES_ElLa')] [host.GetTitledFirstNameNoTooltip|l] pessoalmente, mas não há dúvida de que o preço exigido será alto."
 ach_coronation.0010.desc.desc_ending.neutral_first_person: "Minha legitimidade será indiscutível se [hof.Custom('ES_ElLa')] [hof.GetTitledFirstName|l] me coroar."
 ach_coronation.0010.b: "!Uma visão impressionante!"
 ach_coronation.0010.b.rival: "Bah! Uma peste sobre esse \"[hof.GetTitleAsNameNoTooltip]\"."
 ach_coronation.0010.b.friend: "Está aqui [hof.GetFirstNameNoTooltip]? Viva!"
 ach_coronation.0010.b.lover: "Hum, espero que tenha tempo para [Select_CString(And(ROOT.Char.IsFemale, hof.IsFemale), 'nosotras', 'nosotros')]…"
 ach_coronation.0010.b.heretic: "Não é meu [hof.GetTitleAsNameNoTooltip]!"
 ach_coronation.0010.b.heathen: "Quem se importa?"
 ach_coronation.0010.b.witch: "Talvez agora seja a hora de ficar na moita…"
 ach_coronation.0010.b.cynical: "Bah! Muito alarde por nada."
 ach_coronation.0010.b.zealous: "Somos verdadeiramente abençoados!"
 ach_coronation.0010.a: "Espere! Preciso falar com [hof.GetSheHe]!"
 ach_coronation.0010.a.tt.success: "[hof.Custom('ES_ElLa')|U] [hof.GetTitledFirstNameNoTooltip|l] ouve tuas súplicas! Louvemos a [ROOT.Char.GetFaith.HighGodName]!"
 ach_coronation.0010.a.tt.failure: "[hof.Custom('ES_ElLa')|U] [hof.GetTitledFirstNameNoTooltip|l] se recusa a me ver"
 ach_coronation.0010.a.tt.anger: "[hof.Custom('ES_AlAla')|U] [hof.GetTitledFirstNameNoTooltip|l] se ofende que você tenha sequer perguntado"
 ach_coronation_0010_hof_desc_host.tt: "A aprovação [hof.Custom('ES_DelDela')] [hof.GetTitledFirstName|l] melhorará sua [legitimacy|lE] e o [fervor|lE] da [faith|lE] [hof.GetFaith.GetAdjective]"
 ach_coronation_0010_hof_desc_guest.tt: "A bênção [hof.Custom('ES_DelDela')] [hof.GetTitledFirstName|l] melhorará a [legitimacy|lE] [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l] e o [fervor|lE] da [faith|lE] [hof.GetFaith.GetAdjective]"
 activity_hof_arrival_log: "[TARGET_CHARACTER.GetUIName|U] e a delegação [TARGET_CHARACTER.GetPrimaryTitle.GetAdjective] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'llegasteis', 'llegaron' )] à coroação [CHARACTER.Custom('ES_DelDela')] [CHARACTER.GetTitledFirstName|l], provocando grande regozijo entre o povo."
 activity_hof_arrival_log_title: "$ep2_wedding.1170.t$"
 ach_coronation.0011.t: "Sombras diante do Trono"
 ach_coronation.0011.desc: "Nas sombras do edifício de [ROOT.Char.GetCurrentLocation.Custom('GetCoronationSite')], as víboras rastejam. Entre os servos e cortesãos que preparam [ROOT.Char.GetCurrentLocation.Custom('GetCoronationSiteShort')], [plotter.Custom('ES_ElLa')] [plotter.GetTitledFirstName|l] sussurra a um círculo de convidados recém-chegados.\n\nSilenciam de imediato quando me aproximo, Antes que [plotter.GetFirstNameNoTooltip] faça uma profunda reverência.\n\nMeu [plotter.Custom2('RelationToMeShort', SCOPE.sC('host') )]\", começa, \"peço desculpas; estávamos apenas falando de… assuntos de natureza pessoal\"."
 ach_coronation.0011.a: "Já lhe arrancarei a verdade…"
 ach_coronation.0011.a.success: "É pego em uma mentira[plotter.Custom('ES_AlAla')] [plotter.GetTitledFirstNameNoTooltip|l] mentindo"
 ach_coronation.0011.a.success.tt: "O esquema foi revelado! Assumindo que exista um, pelo menos"
 ach_coronation.0011.a.failure: "[plotter.Custom('ES_ElLa')|U] [plotter.GetTitledFirstName|l] é esquiv[plotter.Custom('ES_OA')] demais"
 ach_coronation.0011.b: "Que se expulse [coward.Custom('ES_AlAla')|U] [coward.GetTitledFirstNameNoTooltip|l]. #BER Ahora mismo.#!"
 ach_coronation.0011.b.flavor: "[coward.GetFirstNameNoTooltip] já está à beira das lágrimas — um empurrão sem dúvida o quebraria"
 ach_coronation.0011.b.tt: "[coward.Custom('ES_ElLa')|U] [coward.GetTitledFirstName|l] revelará a [scheme|lE] e, se não existir, um [secret|lE]"
 ach_coronation.0011.c: "Você acha que sou idiota?! #EMP Guardas!#!"
 ach_coronation.0011.c.paranoid: "#EMP EU SABIA#!! Prendam estes traidores!"
 ach_coronation.0011.c.wrathful: "Como ousa?! Vocês acham que sou idiota! Guardas!"
 ach_coronation.0011.d: "No le quitaré la vista de encima…"
 ach_coronation.0011.scheme.plotter.toast: "A participação [plotter.Custom('ES_DelDela')] [plotter.GetTitledFirstName|l] em uma [scheme|lE] de [hostile_scheme.GetSchemeType.GetTypeNameNoTooltip] contra [hostile_scheme.GetTargetCharacter.GetFirstName] é descoberta!"
 ach_coronation.0011.scheme.coward.toast: "A participação de [coward.Custom('ES_DelDela')] [coward.GetTitledFirstName|l] em uma [scheme|lE] de [coward_scheme.GetSchemeType.GetTypeNameNoTooltip] contra [coward_scheme.GetTargetCharacter.GetFirstName] é descoberta!"
 ach_coronation.0011.secret.coward.toast: "Você descobre o [secret|lE] [coward.Custom('ES_DelDela')] [coward.GetTitledFirstName|l]"
 ach_coronation.0011.coward.success: "[coward.GetFirstNameNoTooltip] se desfaz em questão de segundos"
 ach_coronation.0011.hook.toast: "[coward.Custom('ES_ElLa')|U] [coward.GetTitledFirstName|l] começa a chorar e gaguejar, assegurando a você que fará qualquer coisa para demonstrar sua lealdade"
 ach_coronation.0011.false.toast: "Planejava um presente agradável"
 ach_coronation.0012.t: "Questões de rito e direito"
 ach_coronation.0012.desc: "Enquanto se prepara a coroação, um servo com ar preocupado anuncia [first.Custom('ES_AlAla')] [first.GetTitledFirstName|l] e [second.Custom('ES_AlAla')] [second.GetTitledFirstName|l] segundos antes de invadirem a sala. Por algum erro, parece que [Select_CString(And(first.IsFemale, second.IsFemale), 'ambas', 'ambos')] receberam a promessa do ilustre papel de segurar meu [ROOT.Char.Custom('GetRandomCoronationObject')] durante a cerimônia.\n\nA rivalidade entre [Select_CString(And(first.IsFemale, second.IsFemale), 'ambas', 'ambos')] é bem conhecida, e quem cedesse o papel [Select_CString(And(first.IsFemale, second.IsFemale), 'à outra', 'ao outro')] sofreria uma humilhação para sua casa — por mais insignificante que o papel em si pareça."
 ach_coronation.0012.a: "[first.Custom('ES_ElLa')|U] [first.GetTitledFirstNameNoTooltip|l] terá a honra."
 ach_coronation.0012.b: "Será para [second.Custom('ES_ElLa')] [second.GetTitledFirstNameNoTooltip|l]."
 ach_coronation.0012.c: "Podemos fazer isso funcionar!"
 ach_coronation.0012.c.flavor: "Talvez [Select_CString(And(first.IsFemale, second.IsFemale), 'elas possam', 'eles possam')] percorrer o corredor [Select_CString(And(first.IsFemale, second.IsFemale), 'juntas', 'juntos')]?"
 ach_coronation.0012.c.tt.success: "Você tem um ótimo plano"
 ach_coronation.0012.c.tt.failure: "Eles já estão brigando de novo"
 ach_coronation.0012.d: "Ha! Veja como se faz."
 ach_coronation.0012.d.flavor: "Quem diria que [Select_CString(And(first.IsFemale, second.IsFemale), 'estas aficionadas', 'estos aficionados')] jamais tivessem participado de uma cerimônia da corte!"
