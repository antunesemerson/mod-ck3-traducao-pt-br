 ach_coronation.0013.t: "[ROOT.Char.GetTitleAsNameNoTooltip]s e Plebeus"
 ach_coronation.0013.intro: "Passo o dia realizando tarefas na paz relativa de [ROOT.Char.GetCurrentLocation.GetBaronyNameExplicitly]. É lá que,"
 ach_coronation.0013.desc_opening.rainy_day: "abrigando-me da chuva"
 ach_coronation.0013.desc_opening.dry_day: "desfrutando de um breve descanso"
 ach_coronation.0013.desc_opening: "perto de [ROOT.Char.Custom('GetMainsquareCommons')] ouço alguém gritar #EMP [host.GetTitleAsNameNoTooltip]!#!.\n\nA origem está logo ali na esquina: [ROOT.Char.Custom('GetTaverngoersTribespeople')] que estão aproveitando umas taças de [ROOT.Char.Custom('RegionalAlcoholicDrink')] e fofocando."
 ach_coronation.0013.desc_conversation.mean.1: "\"Nunca houve um[host.Custom('ES_XA')] [host.GetTitleAsNameNoTooltip] com aparência mais [host.Custom('InsultAdjectiveGeneric')]!\", cospe um[peasant.Custom('ES_XA')] [peasant.Custom2('dummy_peasant_profession', peasant)] com a aprovação da mesa."
 ach_coronation.0013.desc_conversation.mean.2: "\"Maldit[host.Custom('ES_OA')] seja ess[host.Custom('ES_EA')] supost[host.Custom('ES_OA')] '[host.GetTitleAsNameNoTooltip]'; [host.GetSheHe] acabará com o [host.GetPrimaryTitle.GetTierAsName] em pouco tempo!\", declara um[peasant.Custom('ES_XA')] [peasant.Custom2('dummy_peasant_profession', peasant)] aos seus camaradas."
 ach_coronation.0013.desc_conversation.mean.3: "\"Meu [dummy_gender.Custom('GetRandomRelation')] é [dummy_gender.Custom('lowly_servant_type')] em [ROOT.Char.GetCurrentLocation.Custom('GetCoronationSiteShort')] e diz que o hálito dele(a) sempre está fedendo a mort[host.Custom('ES_OA')]!\"."
 ach_coronation.0013.desc_conversation.mean.4: "\"Vocês não ouviram que [host.GetSheHe] anda dormindo com [dummy_gender.Custom('lowly_servant_type')]s?\", ri um[peasant.Custom('ES_XA')] [peasant.Custom2('dummy_peasant_profession', peasant)]. \"[host.GetSheHe|U] tem essa mania com [host.Custom('DeviantObjectArticle')] em que [host.GetSheHe]-\""
 ach_coronation.0013.desc_conversation.mean.4.chaste: "Nossa! Eu tapo os ouvidos antes de ouvir mais uma palavra."
 ach_coronation.0013.desc_conversation.mean.4.lustful.host: "Nossa! Devem pensar que sou tão dócil assim!"
 ach_coronation.0013.desc_conversation.mean.4.lustful.guest: "Nossa! Como eles acham que [host.GetSheHe] é comportad[host.Custom('ES_OA')]!"
 ach_coronation.0013.desc_conversation.mean.4.not_lustful: "Puxa vida! Por que alguém mentiria sobre isso?"
 ach_coronation.0013.desc_conversation.mean.5: "\"Me disseram que é um[host.Custom('ES_XA')] bastard[host.Custom('ES_OA')] [host.Custom('InsultAdjectiveGeneric')], e as coisas que [host.GetSheHe] fez? Um monstro da pior espécie.\""
 ach_coronation.0013.desc_conversation.nice.1: "Viva [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip|l]!\" grita um [peasant.Custom('ES_XA')] [peasant.Custom2('dummy_peasant_profession', peasant)] em meio a um coro de aclamações embriagadas."
 ach_coronation.0013.desc_conversation.nice.2: "\"Me disseram que [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip|l] é [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip|l] de aspecto mais [host.Custom('GetPrettyAdjective')] e coração mais [host.Custom('GetPiousAdj')] do mundão!\", diz um deles ao outro."
 ach_coronation.0013.desc_conversation.nice.3: "\"Meu [dummy_gender.Custom('GetRandomRelation')] tem um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom('GetRandomRelation')] e diz que [host.Custom('ES_ElLa')] [host.GetTitledFirstNameNoTooltip|l] dança [host.Custom('GetMedievalDance')] tão bem que dá vontade de chorar!\", afirma um[peasant.Custom('ES_XA')] [peasant.Custom2('dummy_peasant_profession', peasant)|l]."
 ach_coronation.0013.desc_conversation.nice.4: "\"Eu vi uma vez [host.Custom('ES_AlAla')] [host.GetTitledFirstNameNoTooltip|l]\", diz um[peasant.Custom('ES_XA')] [peasant.Custom2('dummy_peasant_profession', peasant)|l]. \"E vi o que ele tinha de especial assim que bati o olho nele!\"."
 ach_coronation.0013.desc_conversation.nice.5: "\"Morte a esse verme [claimant.Custom('InsultAdjectiveGeneric')] pretendente, [claim.Custom('ES_ElLa')] [claimant.GetTitledFirstName|l]!\", proclama um[peasant.Custom('ES_XA')] [peasant.Custom2('dummy_peasant_profession', peasant)|l] em meio a um coro de aplausos, \"Viva [Select_CString( host.IsFemale, 'a legítima', 'o legítimo' )] [host.GetTitleAsNameNoTooltip]!\""
 ach_coronation.0013.ending.agrees: "\n\nHa! Acho que estas boas pessoas estão certas!"
 ach_coronation.0013.ending.disagrees: "\n\nComo ousam esses #EMP camponeses#! simplórios insultar seu [Select_CString( host.IsFemale, 'senhora legítima', 'senhor legítimo' )]?!"
 ach_coronation.0013.ending.neutral: "\n\nParece que agora até os plebeus têm tempo para a política."
 ach_coronation.0013.a.weaken_detractors: "Camponeses! Tenho uma proposta."
 ach_coronation.0013.a.weaken_detractors.flavor: "Posso pensar em rumores muito melhores para eles espalharem!"
 ach_coronation.0013.a.weaken_detractors.tt: "A ralé ridiculariza seus inimigos"
 ach_coronation.0013.b: "Bem, não dá para agradar a todo mundo. #EMP GUARDIAS!#!"
 ach_coronation.0013.c: "Vou lhes ensinar a temer a coroa!"
 ach_coronation.0013.c.tt.success: "Os camponeses, com medo nos olhos, imploram por misericórdia"
 ach_coronation.0013.c.tt.failure: "Os rumores se espalham de qualquer forma…"
 ach_coronation.0013.flavor: "Uma boa reprimenda deve lembrar a esses tolos que mantenham a boca fechada."
 ach_coronation.0013.d: "Ei, você aí! Sirva-me uma bebida!"
 ach_coronation.0013.d.flavor: "Vou ser [host.GetTitleAsNameNoTooltip|l] e quero uma bebida, droga!"
 ach_coronation.0013.e: "Enfim, vamos ao trabalho."
 ach_coronation.0013.e.disagrees: "Minha existência está muito acima desses tolos."
 ach_coronation.0013.e.flavor.mean: "Vamos ver, por que eu deveria me importar com os papos furados dos plebeus?"
 ach_coronation.0013.e.flavor.nice: "E quem diz que os plebeus não têm educação?!"
 two_detractors_get_negative_rumors_tt: "Dois [coronation_detractors|lE] ganharão o [modifier|lE] #N [GetModifier('ach_negative_rumors_modifier').GetNameWithTooltip]#!"
 because_you_have_overseer_tt: "#P Tu experiencia como [GetTrait('overseer').GetName( GetNullCharacter )|l] te ayudará a evitar las ramificaciones negativas de tu [coronation_magnificence|lE]#!"
 violated_city_rights_opinion: "Direitos da cidade violados"
 ach_coronation.0014.t: "No precipício do caos"
 ach_coronation.0014.desc: "Do fundo da multidão, vejo a delegação [first.Custom('ES_DelDela')] [first.GetTitleAsName] de [first.GetPrimaryTitle.GetNameNoTier] chegar à coroação [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l]."
 ach_coronation.0014.desc.weather.rain: "Hoje a chuva tem caído forte, e"
 ach_coronation.0014.desc.weather.clear: "Embora tenha sido um dia bastante agradável,"
 ach_coronation.0014.desc.weather.indoors: "O edifício de [ROOT.Char.GetCurrentLocation.Custom('GetCoronationSite')|l] está lotado,"
 ach_coronation.0014.desc.reason.rain: "o povo comum ficou ainda mais sujo e irritado do que o normal. Um morador escorrega na lama e cai na estrada e, quase no mesmo instante, os soldados entusiasmados demais [first.Custom('ES_DelDela')] [first.GetTitleAsNameNoTooltip] se lançam sobre a multidão, golpeando e empurrando os plebeus para longe de seu senhor[host.Custom('ES_XA')]."
 ach_coronation.0014.desc.reason.local_discontent: "a tensão está altíssima em seu [coronation_site.GetHolding.GetHoldingType.GetName]; muitos dos plebeus reunidos vaiam e gritam [first.Custom('ES_AlAla')] [first.GetTitleAsNameNoTooltip|l] quando passa, e alguns até começam a amaldiçoar [host.Custom('ES_AlAla')] [host.GetPrimaryTitle.GetTitleAsNameNoTooltip|l]!"
 ach_coronation.0014.desc.reason.low_control: "[ROOT.Char.GetCurrentLocation.GetBaronyNameExplicitly] vem há algum tempo sofrendo com o controle [ROOT.Char.GetCurrentLocation.GetHolder.GetPrimaryTitle.GetAdjective], e a multidão que observa a delegação parece nada amigável."
 ach_coronation.0014.desc.reason.generic_indoors: "e a massa de cortesãos e convidados logo luta para encontrar espaço que permita a entrada dos recém-chegados. A multidão está cada vez mais nervosa, o salão está quente demais e cada vez mais gente começa a gritar e a dar cotoveladas."
 ach_coronation.0014.desc.reason.generic_outdoors: "a multidão parece inquieta. Há gente demais para ver a delegação. Está tudo apertado demais e os guardas [first.Custom('ES_DelDela')] [first.GetTitleAsNameNoTooltip] parecem estar à beira de explodir."
 ach_coronation.0014.desc.ending: "\n\nEntão percebo: a multidão poderia arruinar esta coroação; tudo o que eles precisariam seria uma"
 ach_coronation.0014.desc.ending.byzantine: "\n\nEntão percebo: o [Glossary( 'hoi polloi', 'HOI_POLLOI_GLOSS' )] poderia ser incitado a arruinar a coroação; só seria preciso uma"
 ach_coronation.0014.desc.ending.outdoors: "rocha…"
 ach_coronation.0014.desc.ending.indoors: "palavra…"
 ach_coronation.0014.a.outdoors: "#EMP Apuntar [first.Custom('ES_AlAla')] [first.GetTitleAsNameNoTooltip|l]#!"
 ach_coronation.0014.a.indoors: "#BER \"FUEGO!\",#!"
 ach_coronation.0014.a.tt.success: "Você provoca uma debandada humana"
 ach_coronation.0014.a.tt.failure: "Falha"
 ach_coronation.0014.a.tt.host.success: "Isso pode impulsionar sem querer a reputação [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l]; fracassar pode causar a você [stress|lE]"
 ach_coronation.0014.a.tt.host.failure.magnificence: "A [coronation_magnificence|lE] da coroação [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l] pode ser bastante reduzida"
 ach_coronation.0014.a.tt.host.failure.host: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] poderá perder [legitimacy|lE] ou [prestige|lE]"
 ach_coronation.0014.a.tt.host.failure.crackdown: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] pode reagir de forma exagerada, causando potencialmente a morte de muitos e aumentando sua [dread|lE] e [tyranny|lE]"
 ach_coronation.0014.a.tt.failure.indoors: "Você não é ouvido por causa do barulho"
 ach_coronation.0014.a.rock: "Uma pedra atinge [first.GetShortUIName] no rosto e recebe o [trait|lE] [GetTrait('wounded_1').GetName( GetNullCharacter )|LV]"
 ach_coronation.0014.b: "Talvez a multidão possa ser usada para outra coisa…"
 ach_coronation.0014.b.flavor: "Meus agentes se movem sem serem detectados por toda a [coronation_site.GetHolding.GetHoldingType.GetName|l] sem serem detectados."
 ach_coronation.0014.b.tt: "Você tem os traços [GetTrait('schemer').GetName( GetNullCharacter )] ou [GetTrait('deceitful').GetName( GetNullCharacter )], ou então tem pelo menos uma [intrigue|lE] [SCOPE.ScriptValue('very_high_skill_rating')|0V]"
 ach_coronation.0014.c: "Serei o primeiro a prestar homenagens."
 if_host_calms_crowd_desc: "Se [TARGET_CHARACTER.GetShortUIName] restaurar[Select_CString( TARGET_CHARACTER.IsLocalPlayer, 's', '' )] a ordem:"
