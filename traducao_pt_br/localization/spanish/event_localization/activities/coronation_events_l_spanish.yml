 ach_coronation.0016.t: "Um presente digno de um[host.Custom('ES_XA')] [host.GetTitleAsNameNoTooltip|l]"
 ach_coronation.0016.desc: "Os convidados para a coroação da minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('host') )] , [host.Custom('ES_ElLa')] [host.GetTitledFirstNameRegnal|l]?\n\nDevo me destacar entre a multidão e aproveitar a breve audiência para convencer [host.Custom('ES_AlAla')] [host.GetTitleAsNameNoTooltip] de minha valia?"
 ach_coronation.0016.a.martial: "Doarei uma força de soldados!"
 ach_coronation.0016.a.stewardship: "Organizarei um dízimo dos demais convidados!"
 ach_coronation.0016.a.stewardship.greedy.tt: "É claro que você não vai contribuir"
 ach_coronation.0016.a.diplomacy: "[detractor.Custom('ES_ElLa')|U] [detractor.GetTitledFirstNameNoTooltip|l] poderia se voltar para [host.Custom('ES_ElLa')] [host.GetTitledFirstNameNoTooltip|l]…"
 ach_coronation.0016.a.intrigue: "Mis espías estarán a su disposición."
 ach_coronation.0016.a.learning: "Falarei com o clero em seu favor."
 ach_coronation.0016.a.loyal: "Prometerei apoio eterno."
 ach_coronation.0016.b.impress_attendees: "Aproveitarei meu bom nome!"
 ach_coronation.0016.b.impress_attendees.writer: "Seu legado será imortalizado em #EMP verso!#!"
 coronation_extolled_legitimacy_log_title: "Legitimidade enaltecida"
 coronation_extolled_legitimacy_log: "[CHARACTER.Custom('ES_ElLa')|U] [CHARACTER.GetTitledFirstName|l] utilizou [Select_CString( CHARACTER.IsLocalPlayer, 'seu', 'seu' )] [Concept('prestige','bom nome')|E] para apoiar [TARGET_CHARACTER.Custom('ES_AlAla')] [TARGET_CHARACTER.GetTitledFirstName|l]."
 ach_coronation.0016.b.bonds: "Cantarei os seus louvores para todos!"
 ach_coronation.0016.c.artifact: "[gifted_artifact.GetNameNoTooltip] seria um ótimo presente."
 ach_coronation.0016.c.gold: "Quem diria não a ouro e bugigangas?"
 ach_coronation.0016.d: "As cortesias de sempre serão suficientes."
 ach_coronation.0016.d.hate: "Vou fingir que estou ignorando essa espécie de [host.Custom('InsultNoun')]!"
 ach_coronation.0016.reward.tt: "#low #EMP La recompensa depende de tu intención [THIS.Char.GetInvolvedActivityIntent.GetName]#!#!"
 ach_coronation.0016.praise: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstNameNoTooltip|l] lhe tece elogios em público"
 ach_coronation.0016.gold: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstNameNoTooltip|l] compensa você pelo seu trabalho"
 ach_coronation.0016.friendship: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstNameNoTooltip|l] lhe agradece pessoalmente"
 ach_coronation.0017.t: "Um direito divino não conquistado"
 ach_coronation.0017.desc: "Durante uma oração matinal em [ROOT.Char.GetCurrentLocation.Custom('GetCoronationSitePrefix')][ROOT.Char.GetCurrentLocation.Custom('GetCoronationSite')], [guest.Custom2('MyCharacterIntroduction', ROOT.Char)] me cutuca e aponta para onde [host.Custom2('MyCharacterIntroduction', ROOT.Char)] se ajoelha para a cerimônia.\n\n\"Não incomoda você que [host.GetSheHe] nunca tenha lutado pela fé"
 ach_coronation.0017.ending.crusader: "como fizemos você e eu, mas ainda assim proclame sua virtude?\""
 ach_coronation.0017.ending.civilian: "como fizestes vós, mas que ainda assim proclame sua virtude?\""
 ach_coronation.0017.a: "Em meu papel de [GetTrait('faith_warrior').GetName( GetNullCharacter )|l], [host.Custom('ES_ElLa')] [host.GetTitledFirstNameNoTooltip|l] conta com meu apoio!"
 ach_coronation.0017.a.christian: "Como um cruzado,[ROOT.Char.Custom('ES_OA')] [host.Custom('ES_ElLa')] [host.GetTitledFirstNameNoTooltip|l] conta com meu apoio!"
 ach_coronation.0017.b: "Vou envergonhar essa covarde em público!"
 ach_coronation.0017.c: "Bah! Concentre-se em suas orações."
 ach_coronation.0017.d: "A fé não é uma competição!"
 ach_coronation.0017.d.cynical: "O quê? Quem se importa com essas coisas?"
 crusader_endorsement_opinion: "Respaldo de guerreiro sagrado"
 crusader_sellout_opinion: "Serviço religioso desvalorizado"
 ach_coronation.0018.t: "Deveres dinásticos"
 ach_coronation.0018.desc: "Os preparativos para a coroação [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l] mergulharam no caos!"
 ach_coronation.0018.desc.seneschal: "Ao exercer como [GetCourtPositionType('seneschal_court_position').GetName|l], dirigir os servos #EMP debería#! ser o dever de [servant_boss.Custom2('MyCharacterIntroduction', ROOT.Char)]."
 ach_coronation.0018.desc.steward: "Na ausência de um [GetCourtPositionType('seneschal_court_position').GetName|l], dirigir os servos #EMP debería#! ser o dever de [servant_boss.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] como [servant_boss.GetCouncilTitle|l]"
 ach_coronation.0018.desc.fallback: "Ninguém parece preparado para dirigir os servos."
 ach_coronation.0018.desc.ending.servant_boss: "No entanto, [servant_boss.Custom('ES_ElLa')] [servant_boss.GetTitledFirstNameNoTooltip|l] parece totalmente sobrecarregad[servant_boss.Custom('ES_OA')]; enquanto isso, os servos ficam contentes em fofocar e ficar à toa sem a devida supervisão.\n\n[host.Custom('ES_ElLa')|U] [host.GetTitledFirstNameNoTooltip|l] deveria estar se concentrando na cerimônia que se aproxima, mas parece constantemente afligid[host.Custom('ES_OA')] constantemente por preocupações mesquinhas."
 ach_coronation.0018.desc.ending.no_servant_boss: "A falta de liderança é evidente, e aqueles que não entraram em pânico parecem satisfeitos em fofocar e ficar à toa.\n\nEmbora [host.Custom('ES_ElLa')] [host.GetTitledFirstNameNoTooltip|l] devesse se concentrar na cerimônia que está por vir, [host.GetSheHe] parece ser constantemente afligid[host.Custom('ES_OA')] por preocupações banais."
 ach_coronation.0018.a.intent: "Esta é a minha chance!"
 ach_coronation.0018.a: "Eu ajudarei [servant_boss.Custom('ES_AlAla')] [servant_boss.GetTitledFirstNameNoTooltip|l] com os preparativos."
 ach_coronation.0018.a.tt_success: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] percebe sua ajuda"
 ach_coronation.0018.a.tt_failure: "Seu esforço passa despercebido"
 ach_coronation.0018.b: "Por que liderar quando você pode se juntar?"
 ach_coronation.0018.b.tt.gossip_with_servants: "Você se diverte muito fofocando"
 ach_coronation.0018.b.tt.secret_unknown_desc: "Ora, #EMP isso#! isso é que é suculento"
 ach_coronation.0018.b.tt.secret_unknown: "Você descobre um [secret|lE]"
 ach_coronation.0018.b.tt.secret: "Você descobre o[secret|lE] [SECRET.GetName] de [secret_holder.GetFirstName]"
 ach_coronation.0018.c: "Parece uma boa oportunidade para aprender!"
 ach_coronation.0018.c.flavor: "Há muito a aprender com os fracassos do Tesoureiro."
 ach_coronation.0018.d: "Por sorte, isso é problema dele/dela, não meu."
 ach_coronation.0018.diplomacy_trait.tt: "Como você tem os [traits|lE] [GetTrait('diplomat').GetName( GetNullCharacter )] ou [GetTrait('gregarious').GetName( GetNullCharacter )], [servant_boss.Custom('ES_ElLa')] [servant_boss.GetTitledFirstNameNoTooltip|l] não ficará ofendido"
 ach_coronation.0018.servant_boss_opinion.tt: "[servant_boss.Custom('ES_ElLa')|U] [servant_boss.GetTitledFirstNameNoTooltip|l] pode considerar isso como uma tentativa de roubar seu cargo"
 ach_coronation.0018.d.pleased_servant_boss: "[servant_boss.GetFirstNameNoTooltip] te agradece pela ajuda"
 ach_coronation.0018.d.annoyed_servant_boss: "[servant_boss.GetFirstNameNoTooltip] pensa que você está tentando roubar o cargo dele"
 ach_coronation.0018.a.seneschal: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstNameNoTooltip|l] o nomeia para o cargo de [GetCourtPositionType('seneschal_court_position').GetName|l]"
 ach_coronation.0018.a.vassal: "![host.Custom('ES_ElLa')|U] [host.GetTitledFirstNameNoTooltip|l] lhe oferece um [title|lE]!"
 ach_coronation.0018.a.tt.vassal: "Será oferecido a você um título à escolha [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l]"
 ach_can_refuse_reward: "Você poderá recusar a seguinte recompensa de [host.MakeScope.ScriptValue('minor_gold_value')|0V] [gold|lE] [gold_i] ou melhores relações com [host.GetShortUIName]:"
 ach_coronation.0019.opening: "[host.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 ach_coronation.0019.desc: "Sua ajuda aqui em [host.GetCurrentLocation.Custom('GetCoronationSite')] não passou despercebida."
 ach_coronation.0019.desc.title: "Preciso de vassalos em quem eu possa confiar, e acredito que [grantable_title.GetName] precisa de um novo governante. O que você me diz?"
 ach_coronation.0019.desc.court_position: "Você provou ser mais do que capaz no cargo de [GetCourtPositionType('seneschal_court_position').GetName|l] com grande eficácia. O que dizeis?"
 ach_coronation.0019.desc.praise: "Decidi oficialmente louvar seu nome diante de toda a corte! Todos saberão de sua diligência!"
 ach_coronation.0019.a: "Aceito!"
 ach_coronation.0019.b: "Eu esperava algo mais… monetário."
 ach_coronation.0019.c: "A amizade [ROOT.Char.Custom2('RelationToMePossessive', SCOPE.sC('host'))] é suficiente!"
 your_title_cannot_be_revoked_10_tt: "Seu título não poderá ser revogado por 10 anos."
 ach_coronation.0020.t: "[helpful_family.Custom('ES_ElLa')|U] [host.Custom2('RelationToMeShort', SCOPE.sC('helpful_family'))] da coroa"
 ach_coronation.0020.desc: "Enquanto eu estava atarefado preparando minha coroação, [helpful_family.Custom2('MyCharacterIntroduction', ROOT.Char)] tem assumido as rédeas de tudo! Faz dias que nenhum servo me incomoda com bobagens e, finalmente, consigo me concentrar na cerimônia que se aproxima."
 ach_coronation.0020.a: "Sim, [helpful_family.GetFirstNameNoTooltip] poderia ser um[helpful_family.Custom('ES_XA')] vassal[helpful_family.Custom('ES_OA')] em quem eu pudesse confiar!"
 ach_coronation.0020.b: "#EMP Así#! funciona a dinastia [host.GetDynastyNameNoTooltip]!"
 ach_coronation.0020.c: "[helpful_family.GetFirstNameNoTooltip] é de verdade um[helpful_family.Custom('ES_XA')] grande [host.Custom2('RelationToMeShort', SCOPE.sC('helpful_family'))]."
 ach_coronation.0020.d: "[helpful_family.GetSheHe|U] é um exemplo para todos os meus súditos."
 ach_coronation.0022.t: "Uma coroa com tosse"
 ach_coronation.0022.desc: "De um tempo para cá, não se deixa de falar da temível epidemia de [epidemic_scope.GetName|l], e ninguém fala mais que os [zealot.GetFaith.AltPriestTermPlural] de [host.GetPrimaryTitle.GetTierAsName]. \"Por que [zealot.GetFaith.GoodGodNames] castiga assim [host.GetPrimaryTitle.GetTierAsNameNoTooltip]?\", lamentam alguns."
 ach_coronation.0022.desc.whisper.byzantine: "\"Como pode [host.Custom('ES_ElLa')] [host.GetTitledFirstNameNoTooltip|l] afirmar ser [Glossary( 'pistos en Christôi Basileus', 'PISTOS_EN_CHRISTOI_BASILEUS_GLOSS' )] se [host.GetFaith.HighGodName] [host.GetHerHim] pune assim?\","
 PISTOS_EN_CHRISTOI_BASILEUS_GLOSS: "\"Fiel em Cristo, soberano\", o substituto bizantino do termo latino \"augusto\"."
 ach_coronation.0022.desc.whisper.hre: "Como pode [host.Custom('ES_ElLa')] [host.GetTitledFirstNameNoTooltip|l] proclamar a [Glossary( 'sacra majestas', 'SACRA_MAJESTAS_GLOSS' )] em momentos assim?,"
 SACRA_MAJESTAS_GLOSS: "#BOL \"Majestad sacra\"#! em latim; o mandato divino reivindicado pelos imperadores do Sacro Império para governar justamente seus súditos não apenas como um governante secular, mas também como um espiritual."
 ach_coronation.0022.desc.whisper.divine_right: "\"Como pode [host.Custom('ES_ElLa')] [host.GetTitledFirstNameNoTooltip|l] proclamar seu direito divino diante de tais presságios?\","
 ach_coronation.0022.desc.whisper.sinner: "\"Isso é obra da natureza perversa de [host.Custom('ES_DelDela')] [host.GetTitledFirstNameNoTooltip|l]?\""
 ach_coronation.0022.desc.whisper.fallback: "\"Há uma maldição sobre [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip|l]?\","
 ach_coronation.0022.desc.ending: "outros se perguntam.\n\nTais preocupações parecem afetar sobretudo [zealot.Custom('ES_AlAla')] [zealot.GetTitledFirstName|l], que passou o dia em oração profundamente preocupado."
 ach_coronation.0022.a.coronation_disrupt_loyalists: "[zealot.GetShortUINameNoTooltip] certamente pode ver de quem é a culpa?"
 ach_coronation.0022.a.coronation_disrupt_loyalists.flavor: "[zealot.GetShortUIName] tem razão! A culpa #EMP é#! de [host.GetShortUIName]!"
 ach_coronation.0022.a.coronation_disrupt_loyalists.failure: "[zealot.GetShortUIName] considera que esta conversa beira a sacrílega"
 ach_coronation.0022.a.coronation_disrupt_loyalists.success: "[zealot.GetSheHe] se convence de que a culpa é de [host.GetShortUIName]"
 ach_coronation.0022.a.offer_support: "Falarei com [zealot.GetSheHe]."
 ach_coronation.0022.a.offer_support.flavor: "Certamente [host.Custom('ES_ElLa')] [host.GetTitleAsName|l] agradecereia um lembrete de seu mandato divino."
 ach_coronation.0022.a.offer_support.success: "[zealot.GetShortUIName] te agradece por lembrá-lo(a) de suas lealdades"
 ach_coronation.0022.a.offer_support.failure: "A fé de [zealot.GetShortUIName] parece mais abalada do que nunca"
 ach_coronation.0022.b: "Rezo com [zealot.GetSheHe] como [ROOT.Char.Custom('SisterBrother')] em [zealot.GetFaith.GoodGodNames]."
 ach_coronation.0022.c: "Há muitos que, com apenas um empurrãozinho, concordariam..."
 ach_coronation.0022.c.failure: "As pessoas podem ficar bem irritadas com suas cutucadas e insistência"
 ach_coronation.0022.c.success: "A facção [GetVassalStance( 'zealot' ).GetName|l] [GetVassalStance( 'zealot' ).GetTextIcon] se alinha contra [host.Custom('ES_ElLa')] [host.GetTitledFirstNameNoTooltip|l]"
 ach_coronation.0022.d: "Distanciar-se parece… prudente."
 ach_coronation.0022.d.flavor: "Em tempos de doença, vale a pena manter os inimigos longe e os amigos ainda mais longe"
 ach_coronation.0023.t: "[foreign_warrior.Custom('ES_ElLa')|U] [foreign_warrior.Custom('KnightCultureNoTooltip')] de [ROOT.Char.GetTitleAsNameNoTooltip]"
 ach_coronation.0023.desc: "Estou cumprimentando uma série de recém-chegados quando um[foreign_warrior.Custom('ES_XA')] forasteir[foreign_warrior.Custom('ES_OA')] aparece diante de mim; com uma espada exótica à sua cintura. Ele se ajoelha imediatamente e oferece sua lâmina com um floreio.\n\n\"Ó, grande [ROOT.Char.GetTitleAsNameNoTooltip|l]! Passei muito tempo na estrada, longe de [foreign_ruler.GetCapitalLocation.GetName] e ouvi dizer que buscais servos leais. Governan[ROOT.Char.Custom('ES_OA')] governante, permiti-me encontrar a glória enquanto sirvo a [foreign_warrior.GetFaith.HighGodName]!\"."
 ach_coronation.0023.desc.clergy.angry: "\n\n[clergy.Custom2('MyCharacterIntroduction', ROOT.Char)|U] lança um olhar de desprezo ao ouvir a menção ao deus [ROOT.Char.Custom2('GetUnbelieverTermAdjective', foreign_warrior)]."
 ach_coronation.0023.desc.clergy: "\n\nVejo a [clergy.Custom2('MyCharacterIntroduction', ROOT.Char)] lançar um olhar curioso ao ouvir menção ao deus [ROOT.Char.Custom2('GetUnbelieverTermAdjective', foreign_warrior)]."
 ach_coronation.0023.a: "Isto #EMP sí#! que é um [GetCourtPositionType('bodyguard_court_position').GetNameNoTooltip|l]!"
 ach_coronation.0023.b: "[foreign_warrior.GetSheHe|U] me servirá como [GetCourtPositionType('champion_court_position').GetNameNoTooltip|l]!"
 ach_coronation.0023.c: "Seja bem-vind[foreign_warrior.Custom('ES_OA')] bem-vindo à minha corte!"
 ach_coronation.0023.d: "Removam esta espécie de [ROOT.Char.Custom2('GetUnbelieverTermAdjective', foreign_warrior)] [foreign_warrior.Custom2('InsultAdjective', ROOT.Char)] já!"
 cultural_acceptance_gain_accepted_foreign_warrior: "Guerreiro estrangeiro aceito"
 ach_coronation.0025.t: "Beber e se divertir"
 ach_coronation.0025.desc: "Fora do banquete, aprecio uma lufada de ar fresco e a vista de [feast_location.GetBaronyNameExplicitly], junto com os sons de amantes escondidos em um arbusto próximo e de um [ROOT.Char.Custom('KnightCultureNoTooltip')|l] local que vomita perigosamente perto deles. Acima de tudo isso, os sons das celebrações de [feast_location.GetTitle.Custom('BaronyTownType')] pairam no ar.\n\nE então surge a ideia!"
 ach_coronation.0025.desc.host: "[feast_location.GetBaronyNameExplicitlyNoTooltip] em sua totalidade poderia brindar por meu nome com apenas algumas noites de bebida grátis. Eu só precisaria encontrar um mercador disposto a vender a esta hora..."
 ach_coronation.0025.desc.guest: "Sem dúvida [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] agradeceria que o povo cantasse seu nome… e o povo de [feast_location.GetTitle.Custom('BaronyTownType')] uma noite de bebidas grátis; eu só precisaria encontrar um mercador disposto a vender a esta hora…"
 ach_coronation.0025.a: "Pagarei pessoalmente pelos barris de [baron.Custom('RegionalAlcoholicDrink')]!"
 ach_coronation.0025.b: "E se [baron.Custom('ES_ElLa')] [baron.GetTitledFirstName|l] também contribuir?"
 ach_coronation.0025.b.flavor: "Com toda a bebida que pudéssemos providenciar, [feast_location.GetName] saberá o que é se divertir #EMP de verdade#!!"
 ach_coronation.0025.b.tt.success: "[baron.Custom('ES_ElLa')|U] [baron.GetTitledFirstName|l] está de acordo, que venham os bons momentos!"
 ach_coronation.0025.b.tt.failure: "[baron.Custom('ES_ElLa')|U] [baron.GetTitledFirstName|l] não vê como sua ideia é fantástica"
 ach_coronation.0025.b.tt: "Você tem as características [GetTrait('lifestyle_reveler').GetName( GetNullCharacter )] ou [GetTrait('drunkard').GetName( GetNullCharacter )] ou então tem pelo menos [GetPlayer.MakeScope.ScriptValue('minor_gold_value')|0V] de [gold|lE] [gold_i]"
 ach_coronation.0025.c: "Ou melhor não… mais para mim!"
 ach_coronation.0025.c.temperate: "Não é preciso beber para se divertir!"
 ach_coronation.0025.c.flavor: "Há muito mais diversão lá dentro"
 ach_coronation.0026.t: "Maus presságios"
 ach_coronation.0026.desc: "O banquete se prolonga. Cada batida dos tambores me causa arrepios e pensar em mais [ROOT.Char.Custom('GetExpensiveDrink')] quase me dá ânsia. Não tenho dúvida de que os demais caudilhos veriam isso como um mau presságio se eu adoecesse justamente agora!\n\nComo se tivesse recebido um sinal, [vassal.Custom2('MyCharacterIntroduction', ROOT.Char)] aproxima-se com um prato de comida e uma taça de algo repulsivo."
 ach_coronation.0026.a: "Devo ser forte!"
 ach_coronation.0026.a.tt: "Você rangerá os dentes e tentará sobreviver à noite"
 ach_coronation.0026.a.tt.sick: "Você sente que está com febre"
 ach_coronation.0026.a.tt.sick.failure: "Você não consegue escondê-lo"
 ach_coronation.0026.a.tt.sick.success: "Você se mantém firme"
 ach_coronation.0026.a.tt.critical_success: "Graças a [ROOT.Char.GetFaith.HighGodName]! A sensação passa"
 ach_coronation.0026.b: "[vassal.GetTitledFirstNameNoTooltip]! Socorro!"
 ach_coronation.0026.b.tt: "[vassal.Custom('ES_ElLa')|U] [vassal.GetTitledFirstName|l] passará o resto do banquete ajudando a ocultar sua doença"
 ach_coronation.0026.c: "Basta! Preciso ir embora e descansar."
 ach_coronation.0026.c.flavor: "Abandonar seu próprio banquete provavelmente será muito mal recebido"
 ach_coronation.0027.t: "Uma delícia deliciosa"
 ach_coronation.0027.desc: "\"[ROOT.Char.Custom2('RelationToMeAddress', partaker)|U]!\", começa [partaker.Custom2('MyCharacterIntroduction', ROOT.Char)] — um odor peculiar acompanha [partaker.GetHerHim] até a minha mesa — \"Você precisa conhecer est[stoner.Custom('ES_EA')] [stoner.GetWomanMan] tão interessante; [stoner.GetSheHe] trouxe"
 ach_coronation.0027.desc.char.crusader: "uns bolos sarracenos deliciosos e exóticos de suas aventuras na cruzada!\"."
 ach_coronation.0027.desc.char.varangian: "esses bolos estranhos de suas aventuras entre os [emperor_culture.GetCollectiveNoun]!\"."
 ach_coronation.0027.desc.char.other: "bolos de haxixe maravilhosamente florais!\""
 ach_coronation.0027.a: "Vou comprar todo o estoque dele!"
 ach_coronation.0027.b: "Enfim, que mal poderia fazer?"
 ach_coronation.0027.b.hashishiyah: "Parece que é uma pessoa culta!"
 ach_coronation.0027.c: "Na #EMP minha#! coroação!? Fora!"
 ach_coronation.0027.d: "\"Divirtam-se sem mim, [partaker.GetFirstNameNoTooltip]\"."
 ach_coronation.0027.d.host: "Um bom anfitrião deixa de sobra para seus convidados!"
 purchased_hashish_opinion: "Comprou haxixe"
 ach_coronation.0028.t: "Estupores legítimos"
 ach_coronation.0028.desc: "\"[ROOT.Char.GetFirstName]!\", grita [drinker.Custom2('MyCharacterIntroduction', ROOT.Char)] do outro lado do salão — alto o bastante para ser ouvido acima da algazarra das celebrações da coroação. \"Vocês acham que uma nova coroa os torna tão poderosos!? Então, por [drinker.GetFaith.HighGodName]! Bebam! Provem que são um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] dign[ROOT.Char.Custom('ES_OA')]!\".\n\nMuitos olhares ansiosos se voltam para mim, aguardando avidamente minha resposta."
 ach_coronation.0028.a: "![drinker.Custom('ES_ElLa')|U] [drinker.GetTitledFirstNameNoTooltip|l] encontrou seu par à altura!"
 ach_coronation.0028.a.win: "Você bebe [drinker.GetFirstNameNoTooltip]!"
 ach_coronation.0028.a.lose: "Você não consegue acompanhar o ritmo"
 ach_coronation.0028.b.win: "[drinker.GetFirstNameNoTooltip] nunca teve chance nenhuma"
 ach_coronation.0028.b.lose: "Sua cumplicidade foi descoberta!"
 ach_coronation.0028.b: "Si pudieras deslizar algo en su copa…"
 ach_coronation.0028.c: "Acho que não."
 ach_coronation.0029.t: "A caça [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip]"
 ach_coronation.0029.desc: "O [ROOT.Char.Custom('GetFoodBird')] assado com [ROOT.Char.Custom('FunFoodPrefix')] está delicioso, mas as histórias que contamos são ainda melhores! [first.Custom2('MyCharacterIntroduction', ROOT.Char)|U], meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('second') )] [second.GetFirstName] e eu passamos horas trocando relatos de nossas maiores caçadas.\n\n\"Chega!\", grita [first.GetTitledFirstNameNoTooltip]. \"Agora você já está coroad[ROOT.Char.Custom('ES_OA')], então pode convocar uma caçada após o banquete! Vamos torná-la especial para noss[ROOT.Char.Custom('ES_OA')] nov[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip]!\"\n\n\"Isso!\" [second.GetFirstNameNoTooltip] assente com entusiasmo. \"Uma caçada para um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip]… A Caçada [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip]!\""
 ach_coronation.0029.a: "Sim! A caça [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip]!"
 ach_coronation.0029.a.flavor.impress_attendees: "E vocês farão com que todos em [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] saibam disso!"
 ach_coronation.0029.a.flavor.embrace_supporters: "Vai nos unir, a mim e aos meus partidários!"
 ach_coronation.0029.a.flavor.exalt_crown: "E nossa captura será um símbolo do meu governo!"
 ach_coronation.0029.a.impressive_hunt: "Sua próxima [GetActivityType('activity_hunt').GetName|l] aumentará a [opinion|lE] de seus [vassals|lE] sobre você"
 ach_coronation.0029.a.personal_hunt: "Sua próxima [GetActivityType('activity_hunt').GetName|l] pode conceder o [trait|lE] [GetTrait('loyal').GetName( GetNullCharacter )] aos seus [guests|lE] [vassal|lE]s"
 ach_coronation.0029.a.glorious_hunt: "Sua próxima [GetActivityType('activity_hunt').GetName|l] aumentará sua [legitimacy|lE]"
 ach_coronation.0029.b: "E se nós fossemos caçar com falcões em vez disso?"
 ach_coronation.0029.b.free_falconry: "Sua próxima [GetActivityType('activity_hunt').GetName|l] de tipo $hunt_type_falconry$ não custará [gold|lE]"
 ach_coronation.0029.b.flavor: "E vocês [Select_CString(And(first.IsFemale, second.IsFemale), 'duas', 'dois')] fornecerão os pássaros, é claro!"
 ach_coronation.0029.c: "Ha! Estarei ocupado demais[ROOT.Char.Custom('ES_OA')]!"
 ach_coronation.0029.c.virtuous: "O que aconteceu com \"moderação em tudo\"?"
 ach_coronation.0029.c.virtuous.tt: "Esta opção está disponível porque sua [faith|lE] [THIS.Char.GetFaith.GetAdjective|l] considera [virtuous|lE] o [trait|lE] [GetTrait('temperate').GetName( GetNullCharacter )]"
 hunt_kings_hunt_header: "A caça de [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip]"
 hunt_default_header: "Caça"
 every_non_disloyal_vassal_attendee_tt: "[vassals|E] de caráter não [GetTrait('disloyal').GetName( GetNullCharacter )|l] [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l] na coroação"
 every_detractor_tt: "Todo [coronation_detractor|lE] na [coronation|lE]"
 every_non_detractor_tt: "Todo [guest|lE] da [coronation|lE] que não seja [coronation_detractor|lE]"
 every_zealot_vassal_guest_tt: "Todo [vassal|El] [GetVassalStance( 'zealot' ).GetName|l] [GetVassalStance( 'zealot' ).GetTextIcon] nesta [activity|lE]"
