l_spanish:
 feast_default_alex.100.t: "Memórias Compartilhadas"
 feast_default_alex.100.desc: "Meu [root_scope.Custom2('RelationToMeShort', SCOPE.sC('guest'))], [guest.Custom('ES_ElLa')] [guest.GetTitledFirstName|l], [guest.Custom('quirk_pos_present')] enquanto se aproxima de mim.\n\n\"Meu [root_scope.Custom('ComplimentAdjective')] [guest.Custom2('RelationToMeShort', SCOPE.sC('root_scope'))]! Que momentos compartilhamos! Que lembranças!\", ri [guest.GetSheHe]. \"Como sempre, é um dia alegre quando sou agraciado com a sua companhia.\"\n\n\"Ah, sim!\", intervém [other_guest.Custom('ES_ElLa')] [other_guest.GetTitledFirstName|l] com entusiasmo. \"As pessoas contam a história do seu passado: quando [guest_memory.GetThirdPerspectiveDescription]!\""
 feast_default_alex.100.aa: "\"Não me lembro de nada importante.\""
 feast_default_alex.100.a: "\"Que tenhamos boas lembranças no futuro, [guest.GetFirstNameNoTooltip].\""
 feast_default_alex.100.b: "\"Ah, um dia #EMP maravilhoso#!, sem dúvida!\""
 feast_default_alex.200.t: "Uma Praga de Rumores"
 feast_default_alex.200.desc: "\"[guest.Custom2('RelationToMeShort', SCOPE.sC('root_scope'))|U], ouvi rumores sobre uma praga chamada [epidemic.GetName|l]...\", comenta preocupad[guest.Custom('ES_OA')] [guest.Custom('ES_ElLa')] [guest.GetTitledFirstName|l].\n\n\"Diz-se que se espalha sem controle em [afflicted_top_liege.GetPrimaryTitle.GetBaseName], e que as vítimas acabam [sick_peasant.Custom('disease_desc_short')]... Nem mesmo uma porção de [root_scope.Custom('GetExpensiveMeal')] faz com que eu pare de pensar nisso.\""
 feast_default_alex.200.a: "Hum, deveríamos preparar [root_scope.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]..."
 feast_default_alex.200.b: "Vamos, acalme-se."
 feast_default_alex.200.c: "Rezemos por [afflicted_top_liege.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]."
 feast_default_alex.200.d: "Não se preocupem, nunca chegará aqui!"
 plague_preparations_modifier: "Preparativos para a peste"
 plague_preparations_modifier_desc: "Esta localidade está bem preparada para qualquer peste que possa surgir."
