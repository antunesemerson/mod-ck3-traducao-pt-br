l_spanish:
 #Missionary, console a local
 pilgrimage_intent.1000.t: "$zealotry_intent_header$ Uma Crise de Fé"
 pilgrimage_intent.1000.desc: "Enquanto continuo minha jornada sagrada, encontro um[sad_peasant.Custom('ES_XA')] [sad_peasant.GetWomanMan] à beira da estrada, cobert[sad_peasant.Custom('ES_XA')] de sujeira e molhad[sad_peasant.Custom('ES_OA')] com suas lágrimas.\n\n“Está feliz agora? Você tirou tudo de mim! Como vou seguir em frente em um mundo governado por uma criatura tão cruel quanto [sad_peasant.GetFaith.HighGodName|U]?”.\n\nClaramente, está desesperad[sad_peasant.Custom('ES_OA')] e está em crise de fé."
 pilgrimage_intent.1000.a: "\"Há uma resposta em [ROOT.Char.GetFaith.HealthGodName].\""
 pilgrimage_intent.1000.a.alternate: "\"Posso oferecer uma perspectiva alternativa?\""
 pilgrimage_intent.1000.a.conversion_succesful.t: "Conversão Bem-sucedida"
 pilgrimage_intent.1000.a.conversion_succesful.desc: "[sad_peasant.GetHerHim|U] converte"
 pilgrimage_intent.1000.a.conversion_failed.t: "Conversão Mal-sucedida"
 pilgrimage_intent.1000.a.conversion_failed.desc: "Você falha em converter[sad_peasant.GetHerHim]"
 pilgrimage_intent.1000.b: "\"Estamos em uma jornada sagrada. Junte-se a nós.\""
 pilgrimage_intent.1000.b.joined.t: "Junta-se à Peregrinação"
 pilgrimage_intent.1000.b.joined.desc: "[sad_peasant.GetSheHe|U] junta-se à sua peregrinação"
 pilgrimage_intent.1000.b.not_joined.t: "Convite Recusado"
 pilgrimage_intent.1000.b.not_joined.desc: "[sad_peasant.GetSheHe|U] não está convencid[sad_peasant.Custom('ES_OA')]"
 pilgrimage_intent.1000.c: "São lágrimas [ROOT.Char.GetFaith.TricksterGodNamePossessive]."
 #Missionary, convert a child
 pilgrimage_intent.1001.t: "$zealotry_intent_header$ Juventude Impressionável"
 pilgrimage_intent.1001.desc: "Já vimos muitas crenças estranhas em nossa jornada para a terra sagrada, e ao passar por [ROOT.Char.GetCurrentLocation.GetName], vejo um grupo de crianças aprontando à beira da estrada.\n\nTodos param imediatamente para nos encarar com admiração nos olhos, como se fôssemos meras curiosidades. Será que nunca viram peregrinos [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip]? Uma criança em particular parece ter um porte nobre! Talvez a criança goste de algumas histórias do meu [ROOT.Char.GetFaith.ReligiousText]."
 pilgrimage_intent.1001.a: "\"Eu irei te ensinar.\""
 pilgrimage_intent.1001.a.conversion_succesful.t: "$pilgrimage_intent.1000.b.joined.t$"
 pilgrimage_intent.1001.a.conversion_succesful.desc: "Você converte a criança"
 pilgrimage_intent.1001.a.conversion_failed.t: "$pilgrimage_intent.1000.a.conversion_failed.t$"
 pilgrimage_intent.1001.a.conversion_failed.desc: "Você falha em converter a criança"
 pilgrimage_intent.1001.b: "Vamos seguir em frente."
 #Local courtier is passing by, convert them and bring them on your pilgrimage!
 pilgrimage_intent.1010.t: "$zealotry_intent_header$ Viajantes de Passagem"
 pilgrimage_intent.1010.desc: "Seguimos com nossa jornada por [ROOT.Char.GetCurrentLocation.GetName]com os pés cada vez mais doloridos e cansados.\n\nVemos um nobre da corte local logo à frente e [convertable_courtier.GetSheHe] cavalga para se juntar ao nosso grupo.\n\n“Você está claramente perdido[ROOT.Char.Custom('ES_OA')]amig[ROOT.Char.Custom('ES_OA')]. O que traz um humilde [ROOT.Char.GetFaith.GetAdherentNameNoTooltip] a [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]?”."
 pilgrimage_intent.1010.a: "\"Estamos em uma jornada sagrada. Junte-se a nós.\""
 pilgrimage_intent.1010.a.conversion_succesful.t: "$pilgrimage_intent.1000.a.conversion_succesful.t$"
 pilgrimage_intent.1010.a.conversion_succesful.desc: "[convertable_courtier.GetHerHim|U] converte"
 pilgrimage_intent.1010.a.conversion_failed.t: "$pilgrimage_intent.1000.a.conversion_failed.t$"
 pilgrimage_intent.1010.a.conversion_failed.desc: "Você falha em converter[convertable_courtier.GetHerHim]"
 pilgrimage_intent.1010.b: "\"Não é da sua conta!\""
 #Fellow pilgrims of a different faith are on your path
 pilgrimage_intent.1020.t: "$zealotry_intent_header$ Peregrinos Desconhecidos"
 pilgrimage_intent.1020.desc: "Até agora, encontramos muitos peregrinos [ROOT.Char.GetFaith.GetAdherentNameNoTooltip] em nossa rota, e todos têm sido piedosos e devotos da vontade de [ROOT.Char.GetFaith.HighGodNamePossessive|U].\n\nNo entanto, em breve nos deparamos com um grupo de viajantes estranhos de terras distantes. Eles se apresentam como [pilgrim_character.GetFaith.GetAdherentNamePlural] e nos dizem que esta rota também é sagrada para o seu povo."
 pilgrimage_intent.1020.a: "\"Apenas [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip] podem fazer essa jornada.\""
 pilgrimage_intent.1020.a.conversion_succesful.t: "$pilgrimage_intent.1000.a.conversion_succesful.t$"
 pilgrimage_intent.1020.a.conversion_succesful.desc: "Você converte os peregrinos"
 pilgrimage_intent.1020.a.conversion_failed.t: "$pilgrimage_intent.1000.a.conversion_failed.t$"
 pilgrimage_intent.1020.a.conversion_failed.desc: "Você falha em converter os peregrinos"
 pilgrimage_intent.1020.b: "\"Me conte como vocês adoram [pilgrim_character.GetFaith.HighGodName|U].\""
 pilgrimage_intent.1020.c: "Somos tão parecidos, eles devem vir conosco!"
 cheaper_to_convert_to_pilgrim_faith_tt: "Você ganha um desconto de #P 50%#! ao converter para [THIS.Char.GetFaith.GetName|l]"
 #You see a particularly calming clearing along your way and stop to meditate
 pilgrimage_intent.1030.t: "$reflections_intent_header$ Uma Clareira Calma"
 pilgrimage_intent.1030.desc: "Aqui, na quietude da beira da estrada de [ROOT.Char.GetCurrentLocation.GetName], sinto-me invadido por uma sensação avassaladora de paz e tranquilidade, como nenhuma outra que tenha experimentado antes.\n\nUm pouco mais adiante, além de uma pequena elevação, vejo uma clareira ao lado do caminho onde parece que nem homem nem besta entraram em décadas. Aqui posso sentir a presença [ROOT.Char.GetFaith.HighGodNamePossessive|U], e talvez eu devesse permanecer aqui em silêncio, em contemplação, por um tempo."
 pilgrimage_intent.1030.desc_sea: "Aqui no mar, quando o tempo está calmo e nenhum navio é visto no horizonte, a paz e o silêncio são avassaladores. A presença de [ROOT.Char.GetFaith.HighGodName|U] é particularmente forte aqui, e isso me enche completamente.\n\nTalvez devêssemos aproveitar a oportunidade de contemplação silenciosa, permanecendo nesta baía por um pouco mais de tempo?"
 pilgrimage_intent.1030.a: "Esta é a vontade [ROOT.Char.GetFaith.HighGodNamePossessive|U]."
 pilgrimage_intent.1030.b: "Não devemos nos atrasar!"
 #You spot an animal, follow it for an omen?
 pilgrimage_intent.1040.t: "$reflections_intent_header$ Um Presságio Bestial"
 pilgrimage_intent.1040.desc.intro: "Enquanto percorremos esta estrada sagrada, somos repentinamente obrigados a parar quando um animal cruza nosso caminho.\n\n"
 pilgrimage_intent.1040.desc.mid.pred: "Um poderoso exemplar de [ROOT.Char.Custom('GetAnimalType')] se interpõe entre nós e a terra sagrada."
 pilgrimage_intent.1040.desc.mid.prey: "[ROOT.Char.Custom('GetAnimalType')] humilde encara nossa caravana sagrada."
 pilgrimage_intent.1040.desc.outro: "\n\nHá certo ar de cumplicidade no rosto da besta. Como se a mente de [Select_CString( ROOT.Char.IsFemale, 'una anciana sabia', 'un anciano sabio' )] residisse por trás desses olhos selvagens. O animal pisca e segue seu caminho."
 pilgrimage_intent.1040.a: "É [ROOT.Char.Custom('ES_EA')] [ROOT.Char.Custom('GetAnimalType')] é um [ROOT.Char.Custom('ES_XA')] mensageir[ROOT.Char.Custom('ES_OA')] de [ROOT.Char.GetFaith.HighGodName]! Sigam [ROOT.Char.GetHerHim]!"
 pilgrimage.you_lose_the_animal.t: "Animal Perdido"
 pilgrimage.you_lose_the_animal.desc: "Você perdeu [ROOT.Char.Custom('GetAnimalType')]"
 pilgrimage_intent.1040.b: "Não podemos nos distrair."
 #Good omen (predator)
 pilgrimage_intent.1041.t: "Presságio: Uma Caçada Bem-sucedida"
 pilgrimage_intent.1041.desc.intro: "Sigo diligentemente [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.Custom('GetAnimalType')], tomando cuidado para que não me perceba.\n\nFinalmente, est[ROOT.Char.Custom('ES_EA')] se encontra com sua presa: um passarinho."
 pilgrimage_intent.1041.desc.mid: "[ROOT.Char.Custom('ES_ElLa')|U] [ROOT.Char.Custom('GetAnimalType')] ataca, e enquanto o pássaro tenta escapar com poucas forças, rapidamente se transforma numa massa de penas e vísceras."
 pilgrimage_intent.1041.desc.outro: "\n\nO que [ROOT.Char.GetFaith.HighGodName|U] quis dizer com isso?"
 pilgrimage_intent.1041.a: "Minhas guerras serão bem-sucedidas!"
 pilgrimage_intent.1041.b: "Meus inimigos cairão quando eu atacar!"
 #Bad omen (predator)
 pilgrimage_intent.1042.t: "Presságio: Uma Caçada Fracassada"
 pilgrimage_intent.1042.desc.mid: "[ROOT.Char.Custom('GetAnimalType')] espera e espera por sua oportunidade, e eventualmente ataca o pássaro apenas para que ele escape e voe para longe no céu aberto."
 pilgrimage_intent.1042.a: "Eu sou [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.Custom('GetAnimalType')] e meus inimigos me superarão."
 pilgrimage_intent.1042.b: "Eu sou o pássaro, e escaparei de um destino cruel!"
 #Good omen (prey)
 pilgrimage_intent.1043.t: "Presságio: Uma Família Feliz"
 pilgrimage_intent.1043.desc.intro: "Sigo [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.Custom('GetAnimalType')], mantendo-me à distância para não assustar[ROOT.Char.GetHerHim]. Por fim, e[ROOT.Char.Custom('ES_EA')] encontra outro da mesma espécie em uma clareira, talvez seu par?\n\n"
 pilgrimage_intent.1043.desc.mid: "Os dois se chocam um pouco, mas logo se aninham e desaparecem juntos na selva."
 pilgrimage_intent.1043.a: "Em breve terei um filho!"
 pilgrimage_intent.1043.b: "Devo fazer amigos dos meus inimigos."
 pilgrimage_intent.1043.c: "Devo priorizar minha família."
 #Bad omen (prey)
 pilgrimage_intent.1044.t: "Presságio: Uma Visão Terrível"
 pilgrimage_intent.1044.desc.mid: "Os dois se aproximam, mas antes que possam se encontrar, uma figura indistinta e sombria salta do nada e reduz [ROOT.Char.Custom('ES_AlAla')] pobre a uma mancha ensanguentada bem diante dos olhos de seu companheiro."
 pilgrimage_intent.1044.a: "Algo está vindo atrás de mim!"
 pilgrimage_intent.1044.b: "Destruirei meus inimigos sem ser notado!"
 you_follow_the_animal_tt: "Você segue o animal mais profundamente..."
 #You stop to contemplate on your age
 pilgrimage_intent.1050.t: "$reflections_intent_header$ Uma Contemplação Terrena"
 pilgrimage_intent.1050.desc.intro: "Ao longo do caminho para a terra sagrada, encontrei todo tipo de peregrinos, jovens e idosos. É como se eu estivesse testemunhando uma tapeçaria da minha própria vida se desenrolar diante de mim.\n\n"
 pilgrimage_intent.1050.desc.mid.old: "Cabelos prateados e pele enrugada sempre pareceram tão distantes, até que chegaram a mim. Não consigo evitar a sensação de que esta peregrinação pode ser a minha última, antes de embarcar na jornada final para [ROOT.Char.GetFaith.PositiveAfterLife|U]."
 pilgrimage_intent.1050.desc.mid.young_and_dying: "Em minha saúde debilitada, minha vida provavelmente não será tão longa quanto a maioria. Ao ver os rostos sorridentes daqueles sortudos o suficiente para envelhecer pelo tempo, não posso deixar de sentir inveja de suas longas vidas."
 pilgrimage_intent.1050.desc.mid.young: "Ainda tenho muito tempo de vida pela frente, e no entanto, tudo parece tão curto quando confrontado com o conceito de eternidade."
 pilgrimage_intent.1050.desc.outro: "\n\nTalvez eu deva parar um pouco e contemplar a brevidade da vida."
 pilgrimage_intent.1050.a: "Vou aproveitar ao máximo o meu tempo."
 pilgrimage_intent.1050.b: "Ainda tenho tanta vida para viver!"
 pilgrimage_intent.1050.c: "Essas ideias fazem meu coração doer."
 #You stop to contemplate ancient civilizations
 pilgrimage_intent.1060.t: "$reflections_intent_header$ Os Impérios de Outrora"
 pilgrimage_intent.1060.desc.intro: "Caminhando por este caminho, encontrei muitos lembretes daqueles que vieram antes de mim.\n\nAqui em [ROOT.Char.GetCurrentLocation.GetNameNoTooltip],"
 pilgrimage_intent.1060.desc.mid.rome: "Encontrei os restos em ruínas de um santuário do antigo panteão romano. [GetFaithByKey('hellenic_pagan').FertilityGodName|U] em toda a sua beleza me sorri com a boca meio rachada, e o rosto [GetFaithByKey('hellenic_pagan').HighGodNamePossessive] foi erodido até ficar quase irreconhecível."
 pilgrimage_intent.1060.desc.mid.israel: "Vi inúmeros lembretes dos antigos hebreus que uma vez viajaram aqui como sua terra prometida. Os antigos templos que antes se erguiam como lugares de adoração a [GetFaithByKey('rabbinism').HighGodName|U] agora foram deixados para se decompor, assim como os hebreus foram impulsionados novamente ao êxodo."
 pilgrimage_intent.1060.desc.mid.egypt: "Vejo os monumentos imponentes dos antigos faraós. Eles passaram uma vida inteira construindo esses tributos gigantescos a seus deuses, feitos de alabastro e ouro, apenas para que agora fiquem empoeirados com areia e frágeis com a idade."
 pilgrimage_intent.1060.desc.mid.persia: "Continuo encontrando lembretes dos antigos Sassânidas, Partas e Seleucidas. Inúmeros impérios surgiram e desapareceram aqui na Pérsia, e mesmo assim a própria Pérsia permanece. Antigos templos zoroastristas estão em estado de abandono por toda a nação, e talvez um dia até mesmo nossas cidades sagradas desmoronem em pó."
 pilgrimage_intent.1060.desc.mid.ashokas_pillars: "Encontro mais um dos pilares de Ashoka, construídos há tanto tempo. Cada um deles está inscrito com éditos emitidos pelo Imperador Ashoka séculos atrás. Esses monumentos dhármicos estão espalhados por terras que antes compunham o Império Maurya, mas o próprio império é apenas poeira."
 pilgrimage_intent.1060.desc.mid.kush: "Vejo lembretes dos muitos impérios que surgiram e caíram aqui ao longo do Nilo. As pirâmides de Kush, templos axumitas, mal se pode viajar sem avistar um monumento em ruínas do passado."
 pilgrimage_intent.1060.desc.mid.fallback: "Vejo lembranças daqueles que habitaram esta terra muito antes de nós. Templos antigos, armas quebradas, fragmentos aleatórios de objetos irreconhecíveis. O tempo nos reivindica a todos, e as divindades que adoramos e a forma como as adoramos estão sempre em fluxo."
 pilgrimage_intent.1060.desc.outro: "\n\nTalvez um dia, outra pessoa caminhará por este caminho e contemplará a queda de [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip] e a fé [ROOT.Char.GetFaith.GetAdjectiveNoTooltip] praticada por seu [ROOT.Char.GetTitleAsNameNoTooltip]."
 pilgrimage_intent.1060.a: "Devo contemplar os antigos impérios."
 pilgrimage_intent.1060.b: "Devo contemplar as antigas religiões."
 pilgrimage_intent.1060.c: "Bobagem, [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] durará para sempre!"
 pilgrimage.drive_to_succeed.t: "Determinado a ter sucesso"
 pilgrimage.existential_dread.t: "Angústia Existencial"
 pilgrimage.existential_dread.desc: "Você está cheio de angústia existencial"
 pilgrimage.drive_to_survive.t: "Determinado a Sobreviver"
 pilgrimage.drive_to_survive.desc: "Você está determinado a sobreviver"
 pilgrimage.imperial_contemplation.t: "Contemplação Imperial"
 pilgrimage.imperial_contemplation.desc: "Você contempla a brevidade dos impérios"
 pilgrimage.godly_meditation.t: "Meditação Divina"
 pilgrimage.godly_meditation.desc: "Você contempla a natureza do divino"
 pilgrimage.failed_contemplation.t: "Contemplação Fracassada"
 pilgrimage.failed_contemplation.desc: "Você não faz progresso"
 #Personal reflections
 pilgrimage_intent.1100.t: "$reflections_intent_header$ Céus Estrelados"
 pilgrimage_intent.1100.desc: "Aqui fora, tarde da noite, às vezes olho para as estrelas e me pergunto. Qual é o nosso propósito na vida?\n\nSerá que [ROOT.Char.GetFaith.PantheonTerm] pode me ver, tão longe de casa? Para que estou fazendo tudo isso?"
 pilgrimage_intent.1100.a: "É meu dever sagrado, é claro!"
 pilgrimage_intent.1100.b: "O que eu realmente quero é desfrutar e vivenciar outras culturas."
 pilgrimage_intent.1100.c: "Faço apenas o necessário para minha posição."
 #Sea legs
 pilgrimage_intent.1110.t: "Pernas no Mar"
 pilgrimage_intent.1110.t_altruism: "$altruism_intent_header$ $pilgrimage_intent.1110.t$"
 pilgrimage_intent.1110.t_reflection: "$reflections_intent_header$ $pilgrimage_intent.1110.t$"
 pilgrimage_intent.1110.t_zealot: "$zealotry_intent_header$ $pilgrimage_intent.1110.t$"
 pilgrimage_intent.1110.desc: "Caminando pelo navio em nossa viagem a [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetNameNoTooltip], vejo outr[affected_pilgrim.Custom('ES_OA')] peregrin[affected_pilgrim.Custom('ES_OA')] que parece não estar se saindo muito bem. Está claro que nunca lhe incutiram as pernas de marinheiro.\n\nGeme baixinho, agachado junto à amurada, e se agarra a ela com unhas e dentes, com um rosto que muda em nuances pálidas."
 pilgrimage_intent.1110.desc.outro_altruism: "\n\nDeveria tentar consolar[affected_pilgrim.GetHerHim] de alguma forma. Talvez eu devesse oferecer um pouco da minha água?"
 pilgrimage_intent.1110.desc.outro_reflection: "\n\nSolo puedo simpatizar con [affected_pilgrim.GetSheHe]. ¿Por qué nos #EMP sometemos#! a estos peligros, a veces mortales?"
 pilgrimage_intent.1110.desc.outro_zealot: "\n\nEstou seguro[ROOT.Char.Custom('ES_OA')] de que [ROOT.Char.GetFaith.PantheonTerm] nos ajudará. Talvez devêssemos fazer algumas orações para acelerar o processo?"
 pilgrimage_intent.1110.a: "Tudo ficará bem, apenas segure firme."
 pilgrimage_intent.1110.b: "Provações e tribulações #EMP fazem#! parte do caminho..."
 pilgrimage_intent.1110.c: "Vamos orar pela sua recuperação."
 pilgrimage_intent.1110.d: "Devo ter algumas ervas para isso."
 pilgrimage_intent.1110.e: "Ainda bem que não sou eu."
 #A local heathen is smitten with one of your entourage members and asks to marry them
 pilgrimage_intent.9000.t: "$zealotry_intent_header$ um [ROOT.Char.Custom('GetDerogatoryNonbeliever')] apaixonado"
 pilgrimage_intent.9000.desc: "Nos mercados de [background_market_scope.GetName] faz sua aparição um[smitten_heathen.Custom('ES_XA')] [smitten_heathen.GetWomanMan] familiar. Nos seguiu por dias como um cachorrinho.\n\nCom olhos suplicantes, exclama: \"Meu [ROOT.Char.GetLadyLord|U]… voss[entourage_to_marry_2.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('entourage_to_marry_2'))], [entourage_to_marry_2.GetFirstName], ele(a) algum dia me amará? Pois [entourage_to_marry_2.GetSheHe] é de credo [entourage_to_marry_2.GetFaith.GetAdherentName], e eu sou da fé [smitten_heathen.GetFaith.GetAdjective]…, mas existe alguma chance?\".\n\n[smitten_heathen.GetSheHe|U] parece apaixonad[smitten_heathen.Custom('ES_OA')], mas [entourage_to_marry_2.GetFirstNameNoTooltip] parece menos segur[entourage_to_marry_2.Custom('ES_OA')]. Aprovaria [ROOT.Char.GetFaith.HighGodName] esta união?"
 pilgrimage_intent.9000.seducer: "Deixe-me te mostrar como se faz!"
 pilgrimage_intent.9000.seducer.flavor: "Ensina a es[smitten_heathen.Custom('ES_EA')] [smitten_heathen.GetWomanMan] um truque ou dois para colocar [entourage_to_marry_2.GetFirstName] na palma de sua mão."
 pilgrimage_intent.9000.a.flavor: "Em sua união, [ROOT.Char.GetFaith.HighGodName] encontrará um novo servo!"
 pilgrimage_intent.9000.b.flavor: "[smitten_heathen.GetFaith.GetAdherentNamePlural] certamente possuem rituais de conquista interessantes, devo observá-los."
 pilgrimage_intent.9000.a: "Aceitai [ROOT.Char.GetFaith.HighGodName] e [entourage_to_marry_2.GetSheHe] será vosso[entourage_to_marry_2.Custom('ES_OA')]."
 pilgrimage_intent.9000.b: "Oh, [Select_CString( smitten_heathen.IsFemale, 'querida niña', 'querido niño' )], você deveria falar com #EMP [entourage_to_marry_2.GetSheHe]#!, não comigo!"
 pilgrimage_intent.9000.c: "Não temos tempo para isso..."
 hit_it_off_tt: "Eles se dão bem"
 they_fight_publicly_tt: "Eles causam uma cena"
