l_spanish:
 #General Loc Strings
 petition_liege_header: "Petição:"
 #Activity Start: Liege decides whether or not to hear petition
 petition_liege.0001.opening: "[petition_vassal.Custom2('AppropriateGreetingPositive', ROOT.Char )]"
 petition_liege.0001.desc: "Minha comitiva e eu acabamos de chegar em [petition_liege.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] após uma cansativa viagem para encontrá-lo.\n\nSolicito uma audiência assim que possível."
 petition_liege.0001.a: "Tragam [petition_vassal.GetTitledFirstNameNoTooltip|l] e tragam[petition_vassal.GetHerHim]!"
 petition_liege.0001.a.tt: "Você recebe a [petition_vassal.GetTitledFirstName|l] em sua [royal_court|lE]"
 petition_liege.0001.b: "Estou muito ocupado para lidar com [petition_vassal.GetSheHe] agora."
 petition_liege.0001.b.arrogant: "Bah, não tenho tempo a perder para entreter um[petition_vassal.Custom('ES_XA')] simples #EMP [petition_vassal.GetTitleAsNameNoTooltip]#!"
 petition_liege.0001.b.humble: "Mandai a [petition_vassal.GetTitledFirstNameNoTooltip|l] minhas mais profundas desculpas por não poder ver[petition_vassal.GetHerHim]."
 petition_liege.0001.b.tt: "Você manda [petition_vassal.GetTitledFirstName|l]"
 #Activity End: Vassal learns that liege refuses to hear petition
 petition_liege.0009.opening: "[petition_liege.Custom2('AppropriateGreeting', ROOT.Char )]"
 petition_liege.0009.desc: "Infelizmente, você chegou em um momento difícil e devo informá-lo que não consigo recebê-lo e sua comitiva em meus salões."
 petition_liege.0009.a: "Recusando-se a #EMP escucharme#! sequer me ouvir? Que atrevimento desse[petition_liege.Custom('ES_EA')] [petition_liege.GetWomanMan]!"
 #Liege hears petition, makes a decision
 #Title
 petition_liege.0101.t.gold: "$petition_liege_header$ Ouro"
 petition_liege.0101.t.council_seat: "$petition_liege_header$ Nomeação para o Conselho"
 petition_liege.0101.t.pay_debt: "$petition_liege_header$ Liquidar Dívidas"
 petition_liege.0101.t.war_aid: "$petition_liege_header$ Assistência Militar"
 petition_liege.0101.t.end_war: "$petition_liege_header$ Encerrar Guerras de Vassalos"
 petition_liege.0101.t.faction_war: "$petition_liege_header$ Desmantelar Facção"
 petition_liege.0101.t.county_control: "$petition_liege_header$ Pedido de Administrador de Condado"
 petition_liege.0101.t.county_convert: "$petition_liege_header$ Patrocinar Sacerdotes"
 petition_liege.0101.t.county_opinion: "$petition_liege_header$ Visita Real"
 petition_liege.0101.t.fortify_border: "$petition_liege_header$ Fortalecer Fronteiras"
 petition_liege.0101.t.title_liege: "$petition_liege_header$ Reivindicação de Título"
 petition_liege.0101.t.title_vassal: "$petition_liege_header$ Reivindicação de Vassalo"
 petition_liege.0101.t.construct_city: "$petition_liege_header$ Desenvolvimento Urbano"
 petition_liege.0101.t.construct_temple: "$petition_liege_header$ Patrocinar [petition_vassal.GetFaith.HouseOfWorship]"
 petition_liege.0101.t.development: "$petition_liege_header$ Desenvolver Capital"
 petition_liege.0101.t.house_fief: "$petition_liege_header$ feudo $japan_feudal_government$"
 #Desc
 petition_liege.0101.desc: "[petition_vassal.GetTitledFirstName] aparece por fim em meu grande salão e não perde tempo em se aproximar do trono e fazer uma profunda reverência. \n\n\"Obrigado por me receber, meu senhor[ROOT.Char.Custom('ES_XA')]. Hoje venho até vós com um pedido urgente…"
 petition_liege.0101.desc.council_seat: "por favor, meu [petition_liege.GetLadyLord], deixai-me sentar em vosso conselho\".\n\n\"Meus talentos são ignorados enquanto pessoas inferiores são ouvidas nos mais altos níveis; compartilharei os fardos do reino como voss[petition_vassal.Custom('ES_OA')] [petition_vassal.Custom('GetCouncilPositionRequest')]\"."
 petition_liege.0101.desc.gold: "Eu me perguntava se poderíeis dispensar um pouco de ouro para [Select_CString( petition_vassal.IsFemale, 'una súbdita', 'un súbdito' )] fiel, dado meu serviço e lealdade aqui».\n\n«Asseguro-vos que seria gasto em benefício dos interesses do senhorio»."
 petition_liege.0101.desc.pay_debt: "Encontrei-me em algumas… dificuldades financeiras, devido a acontecimentos totalmente fora do meu controle\". \n\n\"Pelo bem do reino, vocês me ajudariam a acertar minhas contas?\""
 petition_liege.0101.desc.war_aid: "o [petition_war.GetName|l] não está indo bem; [second_party.GetTitledFirstNameNoTooltip|l] tem vantagem. \n\nMeu [petition_liege.GetLadyLord], minhas derrotas também são suas. Dê-me seu apoio, pelo bem do domínio."
 petition_liege.0101.desc.end_war: "[second_party.GetTitledFirstNameNoTooltip|l] está travando uma guerra contra mim e contra vossos bons e leais súditos de [petition_vassal.GetPrimaryTitle.GetName]! \n\nNão vos parece que essas lutas internas só nos enfraquecem a todos e deveriam ser interrompidas imediatamente?"
 petition_liege.0101.desc.faction_war: "[second_party.GetTitledFirstName] e seu [vassal_faction.GetNameNoTooltip|l] não me dão trégua \n\n\"Por favor, vós deveis colocar esses fedelhos insolentes em seu devido lugar, pelo bem do reino!\""
 petition_liege.0101.desc.county_control: "o [petition_county_example.GetNameNoTooltip] sofre o ataque de rebeldes que tornam impossível cobrar os impostos! \n\nPor favor, meu [petition_liege.GetLadyLord], ajudai-me a pôr essas víboras na linha, pelo bem do reino."
 petition_liege.0101.desc.county_convert: "O [petition_county_example.GetNameNoTooltip] está assolado pelos [petition_county_example.GetCountyData.GetFaith.GetAdherentNamePluralNoTooltip] agressivos e ímpios! \n\n\"Meus sacerdotes fazem o melhor que podem, mas temo que precisam de ajuda se o senhorio ficar livre do mal.\""
 petition_liege.0101.desc.county_opinion: "o descontentamento impera em minhas terras».\n\nMeu [petition_liege.GetLadyLord], estou convicto[petition_vassal.Custom('ES_OA')] de que uma visita [petition_liege.Custom('GetRoyalCourtRank')] mudaria o ânimo do povo e o devolveria ao seu devido curso."
 petition_liege.0101.desc.fortify_border: "minhas terras se interpõem entre o [petition_liege.GetPrimaryTitle.GetNameNoTierNoTooltip] e vossos inimigos!\" \n\n\"[petition_county_example.GetNameNoTooltip] é uma das marcas do reino, e sua defesa é tanto vossa responsabilidade quanto a minha\"."
 petition_liege.0101.desc.title_liege: "Com todo respeito, Vossa Majestade, o [petition_claim.GetName] me pertence legitimamente!\" \n\n\"Vós governais um poderoso [petition_liege.GetPrimaryTitle.GetTierAsNameNoTooltip], meu [petition_liege.GetLadyLord], não podeis conceder-me um simples [petition_claim.GetTierAsNameNoTooltip], tão fervorosamente reivindicado?\""
 petition_liege.0101.desc.title_vassal: "[petition_claim.GetName] de [second_party.GetTitledFirstName|l] me pertence legitimamente!\" \n\n\"Meu [petition_liege.GetLadyLord], deveríeis entender o quão vitais são os direitos sobre as terras que nos pertencem. Por favor, fazei com que [second_party.GetTitleAsNameNoTooltip] renuncie ao que não lhe pertence\"."
 petition_liege.0101.desc.construct_city: "o [petition_construct_county.GetName] tem grande potencial, mas carece da infraestrutura necessária\". \n\n\"Meu [petition_liege.GetLadyLord], patrocinar uma nova cidade em [petition_construct.GetName] beneficiaria todo o reino apenas pelos efeitos sobre o comércio\"."
 petition_liege.0101.desc.construct_temple: "os fiéis de [petition_construct_county.GetName] precisam de um lugar de culto. \n\nFicaria muito honrado se vocês me ajudassem a financiar um/uma [petition_liege.GetFaith.HouseOfWorship] novo/nova em [petition_construct.GetName] para a fé [petition_liege.GetFaith.GetAdjectiveNoTooltip]."
 petition_liege.0101.desc.development: "minhas terras empalidecem em comparação com vossa poderosa capital\". \n\n\"Por favor, concedei parte das riquezas de [petition_liege.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTier] ao humilde [petition_county_example.GetName] para o benefício de todo o reino\"."
 petition_liege.0101.desc.house_fief: "conceda-me direitos hereditários e a oportunidade de governar meu próprio feudo, para que o reino como um todo possa prosperar\"."
 petition_liege.0101.desc.council_first_councillor: "\n\nEntão, acha que pode fazer um trabalho melhor que [second_party.Custom('ES_ElLa')] [second_party.GetTitledFirstName|l]…"
 petition_liege.0101.desc.council_second_councillor: "Talvez fosse melhor substituir [second_councillor.GetTitledFirstName|l]."
 #Accept
 petition_liege.0101.accept.gold: "Posso dispensar algum dinheiro."
 petition_liege.0101.accept.council_seat: "Muito bem, você terá seu assento."
 petition_liege.0101.accept.council_seat_occupied: "Você substituirá [second_party.GetTitledFirstNameNoTooltip|l] como meu [second_party.GetCouncilTitle]."
 petition_liege.0101.accept.pay_debt: "Muito bem, suas dívidas estão pagas."
 petition_liege.0101.accept.war_aid: "Posso dispensar alguns soldados."
 petition_liege.0101.accept: "Entendo o seu ponto. Muito bem, vou forçar o fim de suas guerras."
 petition_liege.0101.accept.faction_war: "Esses traidores terão que responder a mim."
 petition_liege.0101.accept.county_control: "A ordem será restaurada."
 petition_liege.0101.accept.county_convert: "As crianças de [ROOT.Char.GetFaith.DevilNamePossessive] devem ser expulsas."
 petition_liege.0101.accept.county_opinion: "As massas verão seu [petition_liege.GetTitleAsNameNoTooltip]."
 petition_liege.0101.accept.fortify_border: "Suas fronteiras são minhas fronteiras."
 petition_liege.0101.accept.title_liege: "Muito bem, [petition_claim.GetTierAsNameNoTooltip|l] é seu."
 petition_liege.0101.accept.title_vassal: "Eu apoiarei sua reivindicação."
 petition_liege.0101.accept.construct_city: "Por que não? [petition_construct_county.GetDeJureLiege.GetNameNoTierNoTooltip] poderia ter uma nova cidade."
 petition_liege.0101.accept.construct_temple: "[petition_construct_county.GetNameNoTierNoTooltip] tem ficado sem um [petition_liege.GetFaith.BishopNeuter] por tempo demais."
 petition_liege.0101.accept.development: "Sim, [petition_liege.GetCapitalLocation.GetNameNoTooltip] está ocupado demais."
 petition_liege.0101.accept.house_fief: "Sua forma de governar não será mais considerada um crime."
 #Bribe gold
 petition_liege.0101.bribe_gold.council_seat: "Meu círculo íntimo precisa provar que tem uma situação financeira sólida..."
 petition_liege.0101.bribe_gold.war_aid: "Há treinamento, equipamento, e nada disso é barato."
 petition_liege.0101.bribe_gold: "Eu posso arranjar uma paz, mas você precisará pagar certas #EMP reparações#!..."
 petition_liege.0101.bribe_gold.faction_war: "A paz tem o seu preço."
 petition_liege.0101.bribe_gold.county_control: "Esse trabalho é difícil e caro."
 petition_liege.0101.bribe_gold.county_convert: "[ROOT.Char.GetFaith.WealthGodName] nos mostra que tal trabalho não é gratuito."
 petition_liege.0101.bribe_gold.county_opinion: "Essas visitas incorrem em muitos custos."
 petition_liege.0101.bribe_gold.fortify_border: "Venha, você sabe que tais medidas são caras."
 petition_liege.0101.bribe_gold.title_liege: "Quanto sua reivindicação vale para você?"
 petition_liege.0101.bribe_gold.title_vassal: "Quanto isso vale para você, [petition_vassal.GetFirstNameNoTooltip]?"
 petition_liege.0101.bribe_gold.construct_city: "Certamente você sabe o quão caras são essas coisas..."
 petition_liege.0101.bribe_gold.construct_temple: "Certamente você patrocinará um anexo?"
 petition_liege.0101.bribe_gold.development: "Claro, mas uma compensação menor será necessária."
 petition_liege.0101.bribe_gold.house_fief: "Só se você estiver disposto a pagar o preço."
 #Bribe favor
 petition_liege.0101.bribe_favor.council_seat: "Esses gestos de favor devem ser retribuídos."
 petition_liege.0101.bribe_favor.pay_debt: "Um dia eu chamarei você para me retribuir."
 petition_liege.0101.bribe_favor.war_aid: "Eu espero sua ajuda quando eu estiver em necessidade."
 petition_liege.0101.bribe_favor: "[second_party.GetFirstNameNoTooltip] não vai gostar disso. Você me deverá..."
 petition_liege.0101.bribe_favor.faction_war: "Meus favores não devem ser esquecidos."
 petition_liege.0101.bribe_favor.county_control: "Eu vou te ajudar, mas você deve me ajudar."
 petition_liege.0101.bribe_favor.county_convert: "Se você se lembrar deste dia e da ajuda que forneci."
 petition_liege.0101.bribe_favor.county_opinion: "Um favor por um favor."
 petition_liege.0101.bribe_favor.fortify_border: "Se eu fizer isso, você deve atender ao meu chamado."
 petition_liege.0101.bribe_favor.title_liege: "Eu não esquecerei facilmente da dívida que você me deve."
 petition_liege.0101.bribe_favor.title_vassal: "Este favor deve ser totalmente retribuído."
 petition_liege.0101.bribe_favor.construct_city: "Muito bem, mas você me deverá em troca."
 petition_liege.0101.bribe_favor.construct_temple: "[petition_liege.GetFaith.HighGodName] será testemunha de suas obrigações."
 petition_liege.0101.bribe_favor.development: "[petition_vassal.GetCapitalLocation.GetNameNoTooltip] crescerá, mas #EMP você#! me deverá."
 petition_liege.0101.bribe_favor.house_fief: "Em troca de um favor."
 #Repay favor
 petition_liege.0101.repay_favor: "Minha dívida com você terminará aqui."
 #Bribe factions
 petition_liege.0101.bribe_factions.council_seat: "Meus conselheiros devem ser irrepreensíveis."
 petition_liege.0101.bribe_factions.pay_debt: "Você está em dívida comigo e deve agir de acordo."
 petition_liege.0101.bribe_factions.war_aid: "Jure lealdade, e você terá meus homens."
 petition_liege.0101.bribe_factions: "Não posso tolerar #EMP nenhum#! discordância interna. #EMP Ponto#!."
 petition_liege.0101.bribe_factions.faction_war: "Observe agora, pois espero o mesmo de você."
 petition_liege.0101.bribe_factions.county_control: "Em troca, confio que poderei contar com você?"
 petition_liege.0101.bribe_factions.county_convert: "Prove sua lealdade e eu enviarei os [ROOT.Char.GetFaith.AltPriestTermPlural]."
 petition_liege.0101.bribe_factions.county_opinion: "Eu posso comparecer, mas você deve desistir da política."
 petition_liege.0101.bribe_factions.fortify_border: "Sua lealdade, para sua tranquilidade."
 petition_liege.0101.bribe_factions.title_liege: "Eu poderia abrir mão disso, mas espero sua lealdade."
 petition_liege.0101.bribe_factions.title_vassal: "Por este título, quero sua lealdade inabalável."
 petition_liege.0101.bribe_factions.construct_city: "Esta cidade marcará sua lealdade para comigo."
 petition_liege.0101.bribe_factions.construct_temple: "Desista da facção e você terá seu [petition_liege.GetFaith.HouseOfWorship]."
 petition_liege.0101.bribe_factions.development: "Sua lealdade é um preço justo por essa gentileza."
 petition_liege.0101.bribe_factions.house_fief: "Seja leal, e sua nova forma de governar será aceita."
 #Bribe contract
 petition_liege.0101.bribe_contract.council_seat: "Uma generosa contribuição garantirá a você um assento."
 petition_liege.0101.bribe_contract.pay_debt: "Aumentarei suas obrigações como forma de pagamento."
 petition_liege.0101.bribe_contract.war_aid: "Presentes devem ser recíprocos."
 petition_liege.0101.bribe_contract.vassal_war: "O que você está disposto a me dar em troca da paz?"
 petition_liege.0101.bribe_contract.faction_war: "Demonstre sua gratidão e eu ajudarei."
 petition_liege.0101.bribe_contract.county_control: "A ordem tem seu preço, e ele deve ser retribuído."
 petition_liege.0101.bribe_contract.county_convert: "Maior responsabilidade compensará essa ajuda."
 petition_liege.0101.bribe_contract.county_opinion: "Confio que os frutos do contentamento serão compartilhados?"
 petition_liege.0101.bribe_contract.fortify_border: "Suas obrigações aumentarão para cobrir minhas despesas."
 petition_liege.0101.bribe_contract.title_liege: "Essas terras vêm com obrigações maiores."
 petition_liege.0101.bribe_contract.title_vassal: "Se você contribuir mais do que [second_party.GetSheHe] tem."
 petition_liege.0101.bribe_contract.construct_city: "Contribuições maiores compensarão as despesas."
 petition_liege.0101.bribe_contract.construct_temple: "Compartilharei seus fardos se você compartilhar os meus."
 petition_liege.0101.bribe_contract.development: "Espero uma fração dos seus ganhos."
 petition_liege.0101.bribe_contract.house_fief: "Tal pedido exige alguns sacrifícios."
 #Refuse
 petition_liege.0101.refusal.council_seat: "Existem outras considerações em jogo."
 petition_liege.0101.refusal.pay_debt: "As contas do meu vassalo são apenas preocupação dele."
 petition_liege.0101.refusal.war_aid: "Você deve buscar sua própria vitória."
 petition_liege.0101.refusal: "Se você é fraco demais para governar, talvez não devesse."
 petition_liege.0101.refusal.faction_war: "Não lutarei suas batalhas por você."
 petition_liege.0101.refusal.county_control: "Suas terras vêm com responsabilidades, [petition_vassal.GetTitleAsNameNoTooltip]."
 petition_liege.0101.refusal.county_convert: "Essas almas são seus súditos e, portanto, #EMP seu#! problema."
 petition_liege.0101.refusal.county_opinion: "Ah, estou ocupado demais[ROOT.Char.Custom('ES_OA')] para tais frivolidades."
 petition_liege.0101.refusal.fortify_border: "Tenho meus próprios castelos para manter."
 petition_liege.0101.refusal.title_liege: "Eu também reivindico [petition_claim.GetNameNoTierNoTooltip]."
 petition_liege.0101.refusal.title_vassal: "Sua reivindicação é tão forte quanto seu braço armado."
 petition_liege.0101.refusal.construct_city: "Suas terras são sua própria responsabilidade."
 petition_liege.0101.refusal.construct_temple: "Os piedosos geralmente patrocinam igrejas por conta própria."
 petition_liege.0101.refusal.development: "Infelizmente, algumas terras são mais abençoadas que outras."
 petition_liege.0101.refusal.house_fief: "Pedeis demais, isto #EMP deve#! continuar sendo um crime."
 #Council
 petition_liege.0101.council_second_occupied: "[second_councillor.GetTitledFirstNameNoTooltip|l] vai abrir mão do cargo de [second_councillor.GetCouncilTitle]."
 petition_liege.0101.council_second: "Tenho algo em mente."
 #War Aid
 petition_liege.0101.war_aid_join: "Vamos derrubar [second_party.GetFirstNameNoTooltip]."
 #Tooltips
 petition_liege.0101.additional_effects: "Modifica a aceitação das seguintes maneiras:"
 petition_liege.0101.bribe_given: "Se [petition_vassal.GetSheHe] aceitar sua contraoferta"
 petition_liege.0101.bribe_refused: "Se [petition_vassal.GetSheHe] rejeitar sua contraoferta"
 #Liege grants petition
 petition_liege.0201.t: "$petition_liege_header$ Aceito"
 petition_liege.0201.desc.intro: "Sou escoltado até o salão do trono de [petition_liege.GetTitledFirstName|l], onde [petition_liege.GetSheHe] faz um gesto para que eu me aproxime e me dirija a"
 petition_liege.0201.desc.council_seat: "\n\nExpresso as habilidades, comprovadas e não comprovadas, que me tornam um[petition_vassal.Custom('ES_XA')] candidat[petition_vassal.Custom('ES_OA')] adequad[petition_vassal.Custom('ES_OA')] para ser [petition_vassal.Custom('GetCouncilPositionRequest')] de [petition_liege.GetTitleAsName] e solicito o posto como seu conselheir[petition_vassal.Custom('ES_OA')]."
 petition_liege.0201.desc.war_aid: "\n\nImploro ao meu [petition_liege.GetLadyLord] que empreste sua força à minha justa causa, como [petition_liege.GetSheHe] puder, para que um[petition_vassal.Custom('ES_XA')] vassalo[petition_vassal.Custom('ES_OA')] leal do reino não seja derrotad[petition_vassal.Custom('ES_OA')]."
 petition_liege.0201.desc.pay_debt: "\n\nImploro [petition_liege.Custom('ES_AlAla')] [petition_liege.GetTitleAsNameNoTooltip] que compreenda os grandes desafios que meu feudo enfrentou e que deixaram meus cofres vazios, suplicando[petition_liege.GetHerHim] que quite minhas dívidas…"
 petition_liege.0201.desc.vassal_war: "\n\nExponho as causas e os acontecimentos do meu conflito atual com [second_party.GetTitledFirstName|l] e solicito [petition_liege.Custom('ES_AlAla')] [petition_liege.GetTitleAsNameNoTooltip] que imponha a paz para pôr fim ao derramamento de sangue em seu domínio."
 petition_liege.0201.desc.faction_war: "\n\nResumo os acontecimentos que levaram à traição aberta de [second_party.GetTitledFirstName|l] e sua [vassal_faction.GetName|l] e solicito [petition_liege.Custom('ES_AlAla')] [petition_liege.GetTitleAsNameNoTooltip] que os obrigue a se render."
 petition_liege.0201.desc.county_control: "\n\nDescrevo cuidadosamente os problemas enfrentados em minha propriedade feudal, com resistência à minha autoridade e cercada de vagabundos, e solicito assistência para restaurar a ordem."
 petition_liege.0201.desc.county_convert: "\n\nExplico fervorosamente a situação em minha propriedade feudal e a necessidade de apoio para levar as multidões pecadoras à luz de [petition_liege.GetFaith.GetNameNoTooltip]."
 petition_liege.0201.desc.county_opinion: "\n\nExplico o descontentamento em meu reino, e o grande alento que uma simples visita [petition_liege.Custom('ES_DelDela')] [petition_liege.GetTitleAsNameNoTooltip] traria ao moral do povo comum."
 petition_liege.0201.desc.fortify_border: "\n\nDescrevo com calma a ameaça representada pelos vizinhos do reino, chamando a atenção para o [second_party.GetPrimaryTitle.GetName] e o risco que representa para minhas terras."
 petition_liege.0201.desc.title_liege: "\n\nReivindico respeitosamente meus legítimos direitos sobre seu [petition_claim.GetName], apresentando os extensos documentos que os comprovam, e aguardo a resposta de [petition_liege.GetTitleAsNameNoTooltip]."
 petition_liege.0201.desc.title_vassal: "\n\nApresento com destreza as provas dos meus direitos sobre o [petition_claim.GetName] e ressalto a força dos mesmos sobre os de [second_party.GetTitledFirstName|l]."
 petition_liege.0201.desc.construct_city: "\n\nApresento meus argumentos para o desenvolvimento do assentamento de [petition_construct.GetName] no condado de [petition_construct_county.GetName], listando os benefícios conforme ensaiado."
 petition_liege.0201.desc.construct_temple: "\n\nApresento humildemente o caso de um novo [petition_liege.GetFaith.HouseOfWorship] no condado de [petition_construct_county.GetName], a ser construído no assentamento de [petition_construct.GetName]."
 petition_liege.0201.desc.development: "\n\nExplico cuidadosamente as situações díspares do [petition_county_example.GetName] e [petition_liege.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTier], e o que poderia ser feito para reequilibrar a situação."
 petition_liege.0201.desc.house_fief: "\n\nArgumento que meu caso é que conceder-me direitos hereditários seria benéfico para a região."
 petition_liege.0201.desc.bridge: "\n\nApós ouvir meu discurso, [petition_liege.GetFirstNameNoTooltip] assente com um aceno seco e afirma: \"Enviarei meus agentes imediatamente para cuidar deste assunto\"."
 petition_liege.0201.desc.council_second_party: "Certamente não farei pior do que [second_party.GetFullName]..."
 petition_liege.0201.a: "Obrigado, meu suserano[petition_liege.Custom('ES_XA')]!"
 petition_liege_accept_tt: "Sua Petição foi aceita"
 #Liege asks for something in return
 petition_liege.0205.t: "$petition_liege_header$ Contraproposta"
 petition_liege.0205.desc.intro: "$petition_liege.0201.desc.intro$"
 petition_liege.0205.desc.bridge: "\n\n[petition_liege.GetFirstNameNoTooltip] permanece em silêncio por um momento enquanto medita sobre minha petição. \n\nPor fim, dirige-se a mim: \"Falastes bem, mas, se eu conceder o vosso pedido, precisarei de algo em troca. Certamente percebeis como seria benéfico para ambos chegarmos a um acordo\"."
 petition_liege.0205.counter: "Meu [petition_liege.GetTitleAsNameNoTooltip] , talvez eu tenha explicado mal…"
 petition_liege.0205.a: "Uma oferta justa - eu aceito."
 petition_liege.0205.b: "Você está brincando? Já estou no meu limite!"
 petition_liege_skillcheck_counter_tt: "Tenta convencer seu suserano[petition_liege.Custom('ES_XA')] por outros meios"
 #Liege refuses petition (end)
 petition_liege.0209.t: "$petition_liege_header$ Rejeitado"
 petition_liege.0209.desc.intro: "$petition_liege.0201.desc.intro$"
 petition_liege.0209.desc.bridge: "\n\nTras escuchar el discurso que había preparado, frunce el ceño y me reprende."
 petition_liege.0209.desc.bridge.apologetic: "$petition_liege.0209.desc.bridge$ 'Peço desculpas, mas, pelo bem do [petition_liege.GetPrimaryTitle.GetNameNoTierNoTooltip], devo recusar seu pedido.'"
 petition_liege.0209.desc.bridge.unapologetic: "$petition_liege.0209.desc.bridge$ '#EMP Isso#! é o assunto urgente que você precisava discutir comigo? Não. Absolutamente não. Agora, se me der licença, tenho assuntos realmente #EMP importantes#! para tratar.'"
 petition_liege.0209.desc.bridge.favor: "$petition_liege.0209.desc.bridge$ 'Sinto muito, mas não poderei atender a esse pedido. Se eu pudesse, lhe daria o que deseja, mas por favor, que essa promessa de um favor futuro seja suficiente.'"
 petition_liege.0209.counter: "Espere, meu [petition_liege.GetLadyLord]! Ouça-me!"
 petition_liege.0209.a: "Ai de mim."
 petition_liege.0209.favor: "Muito bem."
 #Vassal agrees to terms
 petition_liege.0301.t: "Contraproposta Aceita"
 #Vassal refuses counterproposal (end)
 petition_liege.0309.t: "Contraproposta Rejeitada"
 #Skill check counter event
 petition_liege.0401.t: "$petition_liege_header$ Segunda Opinião"
 petition_liege.0401.desc.intro: "[petition_liege.GetTitledFirstName] pensa por um momento e exclama: \"[first_portrait.GetFirstName]\", preciso do seu conselho sobre esse assunto!\". [first_portrait.Custom('GetNotableCharacteristic')] [first_portrait.Custom('GetPetitionLiegeTitle')] avança ansiosamente e agarra sua [first_portrait.Custom('councillor_flavor_prop')]. \"Sim, um assunto muito delicado, meu [petition_liege.GetLadyLord]…\".\n\n"
 petition_liege.0401.desc.second: "[second_portrait.GetTitledFirstName], o/a [second_portrait.Custom('GetPetitionLiegeTitle')] de [petition_liege.GetTitleAsNameNoTooltip], observa em silêncio à margem"
 petition_liege.0401.desc.second_diplomacy: "$petition_liege.0401.desc.second$— talvez eu possa apelar à sua natureza diplomática?\n\n"
 petition_liege.0401.desc.second_martial: "$petition_liege.0401.desc.second$— um argumento prático poderia garantir o apoio?\n\n"
 petition_liege.0401.desc.second_stewardship: "$petition_liege.0401.desc.second$— os números certos o persuadiriam da minha necessidade?[second_portrait.GetHerHim] persuadiriam de minha necessidade os números certos?\n\n"
 petition_liege.0401.desc.second_intrigue: "$petition_liege.0401.desc.second$— e se eu o superasse em público?[second_portrait.GetHerHim] superasse em público?\n\n"
 petition_liege.0401.desc.second_learning: "$petition_liege.0401.desc.second$—ninguém poderia questionar um argumento deixado sem refutação por #EMP [second_portrait.GetSheHe]#!.\n\n"
 petition_liege.0401.desc.third_soulmate: "Por outro lado, meu querid[third_portrait.Custom('ES_OA')] não está longe"
 petition_liege.0401.desc.third_lover: "[third_portrait.GetTitledFirstName] pisca discretamente para mim"
 petition_liege.0401.desc.third_best_friend: "Meu confidente mais íntim[third_portrait.Custom('ES_OA')], [third_portrait.GetTitledFirstName|l] está presente"
 petition_liege.0401.desc.third_friend: "Embora, meu bom[third_portrait.Custom('ES_XA')] amigo[third_portrait.Custom('ES_OA')] [third_portrait.GetTitledFirstName|l] pode ser persuasivo[third_portrait.Custom('ES_OA')]"
 petition_liege.0401.desc.third_fallback: "Dito isso, [third_portrait.GetTitledFirstName|l] sempre gostou de mim"
 petition_liege.0401.desc.third: "— talvez [third_portrait.GetSheHe] poderia apresentar meu caso? \n\n"
 petition_liege.0401.desc.outro: "O [petition_liege.GetTitleAsNameNoTooltip] volta-se para mim, sua atenção já se desviando para outro lugar. Eu preciso #EMP fazer#! algo!"
 petition_liege.0401.first: "Eu sei exatamente como pegar [first_portrait.GetFirstNameNoTooltip] desprevenido..."
 petition_liege.0401.second: "\"[second_portrait.GetFirstNameNoTooltip]!"
 petition_liege.0401.second_diplomacy: "$petition_liege.0401.second$ Certamente há espaço para compromisso aqui?\""
 petition_liege.0401.second_martial: "$petition_liege.0401.second$ Certamente #EMP você#! vê meu ponto?"
 petition_liege.0401.second_stewardship: "$petition_liege.0401.second$ A lógica aqui deve ser clara para #EMP você#!?"
 petition_liege.0401.second_intrigue: "$petition_liege.0401.second$ Certamente #EMP você#! pode ver a razão?"
 petition_liege.0401.second_learning: "$petition_liege.0401.second$ #EMP Você#! deve ver a sabedoria aqui?"
 petition_liege.0401.wildcard: "[third_portrait.GetTitledFirstNameNoTooltip|l] vai dizer a eles!"
 petition_liege.0401.success: "[petition_liege.GetTitledFirstNameNoTooltip|l] muda de ideia"
 petition_liege.0401.failure: "[petition_liege.GetTitledFirstNameNoTooltip|l] não está convencid"
 #Second party request event
 petition_liege.0501.opening: "[second_party.Custom2('AppropriateGreeting', ROOT.Char )]"
 petition_liege.0501.desc: "Leal [second_party.GetTitledFirstName|l], lamento imensamente ter de colocá-lo nessa situação. \n\nDevo pedir que renuncie a [petition_claim.GetName] em favor de [petition_vassal.GetTitledFirstName|l], que também reivindica o título. Confio que respeitará meus desejos neste assunto."
 petition_liege.0501.a: "Que escolha eu tenho...?"
 petition_liege.0501.b: "Eu não posso aceitar isso!"
 petition_liege.0501.refuse_tt: "[second_party.GetTitledFirstName] recusou abrir mão de [petition_claim.GetName]"
 #Invalidated event
 petition_liege.0601.t: "$petition_liege_header$ Invalidado"
 petition_liege.0601.desc.court: "Com minha coroação como [ROOT.Char.GetTitleAsNameNoTooltip] completa, minha petição não é mais necessária..."
 petition_liege.0601.desc.imprisoned_me: "$petition_liege.0601_shared_intro$ [ROOT.Char.GetImprisonedBy.GetTitledFirstName] me jogou na prisão."
 petition_liege.0601.desc.imprisoned: "$petition_liege.0601_shared_intro$ [ROOT.Char.GetImprisonedBy.GetTitledFirstName] fui capturado por"
 petition_liege.0601.desc.liege_dead_me: "$petition_liege.0601_shared_intro$ acabei matando [homage_liege.Custom('ES_AlAla')] [petition_liege.GetTitledFirstName|l]… \n\n"
 petition_liege.0601.desc.liege_dead: "$petition_liege.0601_shared_intro$ [petition_liege.GetTitledFirstName] [petition_liege.GetDeathReasonHideKiller]… \n\n"
 petition_liege.0601.desc.liege_imprisoned_me: "$petition_liege.0601_shared_intro$ Acabei capturando [homage_liege.Custom('ES_AlAla')] [petition_liege.GetTitledFirstName|l]!"
 petition_liege.0601.desc.liege_imprisoned: "$petition_liege.0601_shared_intro$ [petition_liege.GetTitledFirstName|l] foi capturad[petition_liege.Custom('ES_OA')] por [petition_liege.GetImprisonedBy.GetTitledFirstName|l]."
 petition_liege.0601.desc.new_liege: "Agora terei que dirigir a petição ao meu/minha nov[ROOT.Char.GetLiege.Custom('ES_OA')] senhor[ROOT.Char.GetLiege.Custom('ES_XA')], [ROOT.Char.GetLiege.GetTitledFirstNameRegnal]."
 petition_liege.0601_shared_intro: "Assim como minha petição estava em andamento e prestes a dar frutos,"
 petition_liege.0601.desc: "\n\nIsso certamente muda a situação."
 petition_liege.0601.a_court: "Em frente, para coisas maiores."
 petition_liege.0601.a_prison: "Maldição."
 petition_liege.0601.a_liege: "Por que eu não deveria..."
 petition_liege.0601.a: "Hora de repensar as coisas..."
 #Activity End
 petition_liege.9999.t: "$petition_liege_header$ Conclusão"
 petition_liege.9999.desc: "À medida que o último peticionário sai, vários cortesãos os seguem para fora da sala, com negócios para tratar em outros lugares. Outros permanecem, conversando entre si sobre os acontecimentos recentes.\n\nLogo, a formalidade cerimonial dos procedimentos desaparece por completo, dando lugar ao burburinho e movimento da vida cortesã normal."
 petition_liege.9999.a: "Meus assuntos aqui estão concluídos."
 petition_liege.9999.arrogant: "É bom deixar meus súditos se maravilharem com minha presença."
 petition_liege.9999.shy: "Mal posso esperar para voltar aos meus aposentos..."
 petition_liege.9999.gregarious: "Essa parece ser uma boa oportunidade para interagir com minha corte."
 petition_liege.9999.every_guest_and_courtier: "Todos os Convidados e Cortesãos:"
 petition_liege.9001.t: "$petition_liege_header$ Mudando de Tática"
 petition_liege.9001.desc: "Não posso mais pedir a [petition_liege.Custom('ES_AlAla')] [petition_liege.GetTitledFirstName|l] que [ROOT.Char.Custom( 'GetPetitionType' )|l]. No entanto, já vim até aqui, [petition_liege.GetCapitalLocation.GetName], para conquistar sua atenção, e não deixarei passar uma oportunidade dessas. Eu poderia pedir que…"
 petition_liege.9001.gold: "$petition_liege_gold$."
 petition_liege.9001.council_seat: "Me nomeie para o conselho deles."
 petition_liege.9001.council_seat_family: "$petition_liege_council_seat_family$."
 petition_liege.9001.court_position: "$petition_liege_court_position$."
 petition_liege.9001.court_position_family: "$petition_liege_court_position_family$."
 petition_liege.9001.governorship_family: "$petition_liege_governorship_family$."
 petition_liege.9001.house_governorship_rights: "$petition_liege_house_governorship_rights$."
 petition_liege.9001.pay_debt: "Resolva minhas dívidas."
 petition_liege.9001.war_aid: "Forneça ajuda na guerra."
 petition_liege.9001.vassal_war: "Imponha a paz com meus colegas vassalos."
 petition_liege.9001.faction_war: "Desmantele uma facção poderosa."
 petition_liege.9001.county_control: "Envie funcionários para ajudar a restaurar o controle sobre condados rebeldes."
 petition_liege.9001.county_convert: "Patrocine padres para ajudar a converter condados em meu reino."
 petition_liege.9001.county_opinion: "Faça uma visita real para aumentar a opinião popular em meu reino."
 petition_liege.9001.fortify_border: "Fortaleça minhas fronteiras."
 petition_liege.9001.title_liege: "Conceda uma das minhas reivindicações."
 petition_liege.9001.title_vassal: "Transfira uma reivindicação."
 petition_liege.9001.construct_city: "Financie uma nova cidade em meu reino."
 petition_liege.9001.construct_temple: "Financie um novo templo em meu reino."
 petition_liege.9001.development: "Realoque alguns dos seus súditos em meu reino."
 petition_liege.9001.house_fief: "Criar novas formas de governar já não é mais um crime."
 petition_liege.9001.fallback: "Apenas encha meus cofres."
 petition_liege.0101.accept.fallback: "Muito bem, seus cofres serão preenchidos."
 petition_liege_block_firing_councillor_effect_tt: "Não pode ser demitid[petition_vassal.Custom('ES_OA')] do [council|lE] por 5 anos"
 ### Modifiers ###
 #Control
 petition_liege_0101_county_control_effect_tt: "Todos os condados controlados com menos de 66 [control|lE]."
 petition_liege_county_control_modifier: "Bailiff Real"
 petition_liege_county_control_modifier_desc: "O detentor deste condado solicitou a ajuda dos bailiffs de seu suserano para restaurar a ordem."
 petition_liege_county_control_modifier_tt: "O [increase_control|E] progredirá mais rapidamente nos condados com este modificador."
 #Convert
 petition_liege_0101_county_convert_effect_tt: "Todas as [holdings|lE] de [petition_vassal.LocalPlayerString( 'você', petition_vassal.GetShortUIName )] de outra [faith|lE]"
 petition_liege_county_convert_modifier: "Proselytizers Patrocinados"
 petition_liege_county_convert_modifier_desc: "O detentor deste condado solicitou a seu suserano que patrocine a conversão do condado à verdadeira fé."
 petition_liege_county_convert_modifier_tt: "A [convert_county|E] progredirá mais rapidamente nos condados com este modificador."
 #Opinion
 petition_liege_0101_county_opinion_effect_tt: "Todas as [holdings|lE] de [petition_vassal.LocalPlayerString( 'você', petition_vassal.GetShortUIName )] com uma [county_opinion|lE] de [SCOPE.ScriptValue('petition_county_opinion_value')] #negative_value #! ou inferior"
 petition_liege_county_opinion_modifier: "Visita Real"
 petition_liege_county_opinion_modifier_desc: "O detentor deste condado solicitou a seu suserano que faça uma visita e faça uma demonstração para o povo."
 #Fortify
 petition_liege_0101_fortify_border_effect_tt: "Todas as [holdings|lE] de [petition_vassal.LocalPlayerString( 'você', petition_vassal.GetShortUIName )] fronteiriças com outros reinos"
 petition_liege_fortify_border_modifier: "Fortificações de Fronteira"
 petition_liege_fortify_border_modifier_desc: "O detentor deste condado solicitou a seu suserano que fortifique as fronteiras do reino."
 #Development
 petition_liege_development_modifier: "Influxo de Assentamentos"
 petition_liege_development_modifier_desc: "O detentor deste condado solicitou a transferência de pessoas dos domínios de seu suserano."
 petition_liege_title_councillor: "[ROOT.Char.GetCouncilTitle]"
 petition_liege_title_position: "[ROOT.Char.GetHeldCourtAndCouncilPositionsString]"
 petition_liege_title_landed: "[ROOT.Char.GetTitleAsNameNoTooltip]"
 petition_liege_title_courtier: "cortesão"
 petition_liege_second_if_tt: "#bold Si [TARGET_CHARACTER.Custom('ES_ElLa')] [TARGET_CHARACTER.GetTitledFirstNameRegnal|l] acepta:#!"
 petition_liege_costs_refunded: "Custos reembolsados de $petition_liege_decision$"
 petition_ceremonial_liege_costs_refunded: "Custos de $petition_ceremonial_liege_decision$ reembolsados"
 #Non Royal Liege
 ## Activity Start: Liege decides whether or not to hear petition
 petition_liege.0001.a.tt_non_royal: "Você recebe [petition_vassal.Custom('ES_AlAla')] [petition_vassal.GetTitledFirstName|l] na [royal_court|lE] de seu [liege|lE]"
 ## Desc
 petition_liege.0101.desc_non_royal: "[petition_vassal.Custom('ES_ElLa')|U] [petition_vassal.GetTitledFirstName|l] aparece por fim no grande salão do meu [liege|lE] e não demora a se aproximar do trono para se curvar profundamente. \n\n\"Obrigado por me receber, [petition_liege.GetTitledFirstName|l]. Hoje venho a vós com um pedido urgente…"
 petition_liege.0101.desc.title_liege_non_royal: "com respeito ao meu [petition_liege.GetTitleAsNameNoTooltip|l], [petition_claim.GetName] me pertence legitimamente!\" \n\n\"Vós governais um poderoso [petition_liege.GetPrimaryTitle.GetTierAsNameNoTooltip], meu [petition_liege.GetLadyLord], não podeis me conceder um simples [petition_claim.GetTierAsNameNoTooltip|l], que é tão fervorosamente reivindicado?\"."
 petition_liege.0201.a_non_royal: "Obrigado, meu [petition_liege.GetLadyLord]!"
 petition_liege.0221.a: "Minha eterna gratidão, grande [petition_liege.GetTitleAsNameNoTooltip|l]!"
 ## Liege asks for something in return
 petition_liege_skillcheck_counter_tt_non_royal: "Tenta convencer[petition_liege.GetHerHim] por outros meios"
 #Ceremonial Liege
 petition_liege.0021.opening: "Saudações, bom[petition_liege.Custom('ES_XA')] [petition_liege.GetTitleAsNameNoTooltip|l],"
 petition_liege.0021.desc.no_travel: "Seria uma grande honra ser recebido em audiência e que minha humilde e sincera apresentação de um assunto tão caro ao meu coração fosse ouvida.\n\nAguardo pacientemente um chamado ao palácio no momento mais conveniente para Vossa Majestade."
 petition_liege.0029.opening: "Meus mais humildes cumprimentos, grande [petition_liege.GetTitleAsNameNoTooltip|l],"
 petition_liege.0121.t.regent: "Aprovação para o cargo"
 petition_liege.0121.t.appointment: "Avanço da Casa"
 petition_liege.0121.t.wedding: "Casamento real"
 petition_liege.0121.t.privilege: "Dignidade Reconhecida"
 petition_liege.0121.desc: "[petition_vassal.Custom('ES_ElLa')|U] [petition_vassal.GetTitledFirstName|l] aparece por fim em meu grande salão e não perde tempo antes de se aproximar do trono e fazer uma reverência profunda. \n\nObrigado por me receber, grande [petition_liege.GetTitleAsNameNoTooltip|l]. Hoje venho até vós para discutir um assunto importante…"
 petition_liege.0121.desc.regent: "Ainda resta resolver a questão de quem sucederá [petition_vassal.GetTopLiege.Custom('ES_AlAla')] [petition_vassal.GetTopLiege.GetTitledFirstName|l] para administrar vosso senhorio\".\n\n\"Confio que concordais que, se eu me apresentasse humildemente para esta honra, serviria melhor ao trono\"."
 petition_liege.0121.desc.appointment: "Minha casa, como muitas das famílias mais nobres de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetBaseNameNoTooltip], busca as honras do serviço ao trono, servindo como governadores e burocratas\".\n\n\"Temos demonstrado ser servidores leais e hábeis, e nos agradaria ter vosso apoio na seleção de funcionários\"."
 petition_liege.0121.desc.wedding: "Apenas as famílias mais nobres poderiam sequer esperar igualar uma migalha da graça da sua linhagem real\".\n\n\"Com a máxima humildade, eu incluiria minha própria casa entre elas e solicitaria o vosso apoio para um casamento real\"."
 petition_liege.0121.desc.privilege: "As muitas famílias briguentas do reino esquecem a graça e a dignidade que outrora conheciam aqueles em sua posição. Poucas casas restam, embora eu coloque a minha entre elas, que mantenham verdadeira qualidade\" .\n\"Com a devida humildade, espero que Vossa Majestade reconheça nosso mérito, como uma das casas mais proeminentes do reino\"."
 petition_liege.0121.accept.regent: "Por muito tempo esperei que estivésseis à altura dessa responsabilidade."
 petition_liege.0121.accept.appointment: "Poucas casas servem com tanta diligência ou lealdade."
 petition_liege.0121.accept.wedding: "Você provou a estatura de sua casa."
 petition_liege.0121.accept.privilege: "A reputação de sua casa está além de qualquer dúvida."
 petition_liege.0121.bribe_gold: "O trono é generoso com aqueles que são generosos com o trono."
 petition_liege.0121.bribe_bloc: "O trono recompensa aqueles que provam seu apoio."
 petition_liege.0121.bribe_favor: "A graça do trono não deve ser esquecida tão cedo."
 petition_liege.0121.bribe_vows: "A graça do trono vai para aqueles que provam sua piedade."
 petition_liege.0121.bribe_knight: "A graça do trono recai sobre seus servos mais leais."
 petition_liege.0121.refusal: "Este pedido está abaixo da dignidade da coroa."
 petition_liege.0221.desc.regent: "\n\nSolicito humildemente seu apoio para minha candidatura ao mais alto cargo, listando minhas conquistas anteriores e cada exemplo de minha lealdade inabalável."
 petition_liege.0221.desc.appointment: "\n\nSuplico ao meu senhor[petition_liege.Custom('ES_XA')] que reconheça minhas qualidades como servo[ROOT.Char.Custom('ES_XA')] e que apoie meu avanço a seu serviço e ao do senhorio."
 petition_liege.0221.desc.wedding: "\n\nExpresso a honra que seria para minha família unir-se em matrimônio à casa imperial, ao esclarecer a dignidade da linhagem dos [ROOT.Char.GetHouse.GetNameNoTooltip] e a adequação de nossas moças e rapazes."
 petition_liege.0221.desc.privilege: "Insto a [petition_liege.Custom('ES_AlAla')] [petition_liege.GetTitleAsNameNoTooltip|l] a que concorde em reconhecer formalmente a nobre estirpe da minha casa entre a aristocracia de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]."
 petition_liege.0225.b: "Temo que isso não seja possível."
 petition_liege.0229.counter: "Vossa Majestade, por favor, só um momento!"
 petition_liege.0221.desc.bridge: "\n\nApós ouvir o discurso, [petition_liege.GetFirstNameNoTooltip] aguarda um momento antes de sorrir calorosamente e dizer: \"Vocês apresentaram argumentos muito bons! Muito bem, farei com que cuidem deste assunto imediatamente\"."
 petition_liege.9021.regent: "Apoie minha candidatura ao cargo mais alto."
 petition_liege.9021.appointment: "Apoiar as carreiras da minha casa."
 petition_liege.9021.wedding: "Aprovar um casamento real."
 petition_liege.9021.privilege: "Reconheça a dignidade da minha casa."
 petition_ceremonial_liege_skillcheck_counter_tt: "Você tenta convencer [petition_liege.Custom('ES_AlAla')] [petition_liege.GetTitleAsNameNoTooltip|l] por outros meios"
