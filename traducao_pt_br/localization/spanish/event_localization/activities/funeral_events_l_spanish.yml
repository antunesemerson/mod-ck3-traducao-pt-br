l_spanish:
 activity_funeral: "Funeral"
 activity_funeral_desc: "Reúna o reino em prantos para um $activity_funeral$, uma chance de prestar uma homenagem adequada a um membro venerado da nobreza."
 activity_funeral_province_desc: "Você realiza um Funeral em [ROOT.Province.GetName]\nProvíncias com uma alta pontuação fornecem [piety_i][piety|lE] aumentado, perda de [stress_loss_i][stress|lE], e ganho de [legitimacy|lE]\n"
 activity_funeral_guest_help_text: "Todo [activity_guest|lE] que tiver recebido um convite terá a oportunidade de aumentar sua [opinion|lE] sobre você.\nOs funerais também são uma oportunidade para se libertar de seus fardos emocionais, perder um pouco de [stress|lE] e ganhar [piety|lE]."
 activity_funeral_selection_tooltip: "Realizar um funeral para sepultar um familiar falecido\n\nRecompensas previstas:\n$BULLET_WITH_TAB$[opinion|E] [opinion_i]\n$BULLET_WITH_TAB$ Ganho de [legitimacy|lE] [legitimacy_i]\n$BULLET_WITH_TAB$[stress_loss|E] [stress_loss_i]\n$BULLET_WITH_TAB$ Ganho de [piety|lE] [piety_i]"
 activity_funeral_destination_selection: "O corpo deve ser enterrado em algum lugar dentro de seu próprio reino. Locais sagrados e edifícios religiosos melhorarão a qualidade do serviço."
 activity_funeral_major_religious_building: "#P +++ Edifício Religioso Principal#!\n"
 activity_funeral_tos: "#P ++ $building_type_tower_of_silence_01$#!\n"
 activity_funeral_wavel: "#P ++ $building_type_wawel_cathedral_01$#!\n"
 activity_funeral_holy_site: "#P ++ Local Sagrado#!\n"
 activity_funeral_mountain: "#P ++ Montanhoso#!\n"
 activity_funeral_temple: "#P ++ Templo#!\n"
 activity_window_character_body: "$body_to_bury_for_host$"
 deceased_selection_widget_header: "Selecione o corpo para enterrar"
 has_someone_to_bury_tt: "Você deve ter tido um luto recente"
 has_someone_selected_to_bury: "Você não selecionou um corpo para enterrar"
 body_to_bury_for_host: "Falecido"
 body_to_bury_desc_for_host: "O corpo que será entregue ao além"
 body_to_bury_desc_for_host_required_tt: "#T Convidado Especial Necessário\n#!@warning_icon! #X Esta atividade precisa de um $body_to_bury_for_host$ para enterrar#!"
 body_to_bury_selection_info: "Selecione um recém-falecido para ser entregue ao além"
 activity_funeral_host_desc: "$BULLET_WITH_TAB$[opinion|E] [opinion_i]\n $BULLET_WITH_TAB$[stress_loss|E] [stress_loss_i]\n $BULLET_WITH_TAB$ Ganho de [piety|lE] [piety_i]\n $BULLET_WITH_TAB$ Ganho de [legitimacy|lE] [legitimacy_i]"
 activity_funeral_guest_desc: "$BULLET_WITH_TAB$ Os participantes podem aumentar a [opinion|lE] dos personagens presentes\n$BULLET_WITH_TAB$ Os participantes podem perder [stress_loss_i][stress|lE]"
 activity_funeral_conclusion_desc: "O [GetActivityType( 'activity_funeral' ).GetName|l] foi concluído"
 funeral_phase_wake: "[GetPlayer.Custom('WakeName')]"
 funeral_phase_wake_desc: "[GetPlayer.Custom('WakeDesc')]"
 funeral_phase_ceremony: "[GetPlayer.Custom('CeremonyName')]"
 funeral_phase_ceremony_desc: "[GetPlayer.Custom('CeremonyDesc')]"
 funeral_option_ceremony: "Cerimônia"
 funeral_ceremony_bad: "Cerimônia Humilde"
 funeral_ceremony_bad_desc: "$EFFECT_LIST_BULLET$ Ganho menor de [piety|lE]\n$EFFECT_LIST_BULLET$ Ganho menor de [legitimacy|lE]\n$EFFECT_LIST_BULLET$ Perda menor de [stress|lE]\n\n#weak A morte não é momento de ostentação e pompa, é uma ocasião para nos reunirmos e prestar nossos humildes respeitos.#!"
 funeral_ceremony_normal: "Cerimônias Dignas"
 funeral_ceremony_normal_desc: "$EFFECT_LIST_BULLET$ ganho de [piety|lE]\n$EFFECT_LIST_BULLET$ ganho de [legitimacy|lE]\n$EFFECT_LIST_BULLET$ perda de [stress|lE]\n\n#weak A morte chegou a estes salões, e agora é hora de realizar uma cerimônia extravagante para a pessoa falecida.#!"
 funeral_ceremony_good: "Cerimônias Extravagantes"
 funeral_ceremony_good_desc: "$EFFECT_LIST_BULLET$ Grande ganho de [piety|lE]\n$EFFECT_LIST_BULLET$ Grande ganho de [legitimacy|lE]\n$EFFECT_LIST_BULLET$ Grande perda de [stress|lE]\n\n#weak A morte chegou a uma grande pessoa do senhorio. Ela não merece tudo que podemos oferecer? Não pouparemos gastos na cerimônia fúnebre, e todos saberão da grande tragédia que atingiu nosso senhorio.#!"
 mourn_intent: "Lamentar"
 mourn_intent_desc: "Este é um momento para lamentar os mortos, um momento crítico para demonstrar [piety|lE]."
 wakename_offering_of_libations: "Oferta de Libações"
 wakedesc_offering_of_libations: "Agora é a hora de oferecer nossa comida e água para os mortos. O corpo será lavado por pessoas sagradas e embalsamado para os enlutados nos próximos dias."
 wakename_sky_burial: "Honrar os Mortos"
 wakedesc_sky_burial: "Este não é o momento para explosões de emoção, mas um momento para um luto sombrio e suave. Esta é a oportunidade para os convidados oferecerem conforto à família enlutada."
 wakename_mummification: "Mumificação"
 wakedesc_mummification: "Os enlutados se reúnem com expectativa enquanto o corpo é embalsamado e mumificado, para ser preservado para a eternidade."
 wakename_wake: "Vigília"
 wakedesc_wake: "Este é o momento de vigiar o corpo do falecido, proporcionando uma oportunidade final de expressar pensamentos e sentimentos com o morto antes que seu corpo seja entregue ao além."
 wakename_bathing: "Banho do Corpo"
 wakedesc_bathing: "Os enlutados se reúnem para banhar o corpo do falecido e envolvê-lo completamente em linhos brancos."
 ceremonyname_public_bewailment: "Lamento Público"
 ceremonydesc_public_bewailment: "O lamento público é um momento para liberar emoções; chorar, lamentar, lamentar ao redor do corpo do falecido antes que seja entregue à terra."
 ceremonyname_sky_burial: "Enterro Celestial"
 ceremonydesc_sky_burial: "O corpo será entregue ao além nas barrigas das aves, para que o falecido possa alimentar o mundo como um dia os alimentou."
 ceremonyname_ground_burial: "Sepultamento"
 ceremonydesc_ground_burial: "O corpo é entregue à terra e orações são compartilhadas entre os enlutados. Embora a alma eterna viva, o corpo é colocado em seu lugar de descanso final."
 ceremonyname_cremation: "Cremação"
 ceremonydesc_cremation: "O corpo é queimado em uma grande pira funerária."
 ceremonyname_mummification: "Enterramento"
 ceremonydesc_mummification: "O corpo mumificado é colocado em uma tumba onde pode descansar."
 ceremonyname_ceremony: "Cerimônia"
 ceremonydesc_ceremony: "O corpo será entregue à vida após a morte em uma cerimônia tradicional e [Concept( 'pious', 'piadosa' )|E]."
 activity_funeral_predicted_cost: "O custo de um funeral é afetado pelas [activity_options|lE] que você escolhe e pelas práticas funerárias [doctrine|lE] de sua [faith|lE]."
 funeral_cost_increase_great_temple: "Um Grande Templo está presente aqui"
 funeral_cost_increase_mummification: "Mumificação"
 funeral_cost_discount_cremation: "Cremação"
 funeral_activity_cost_desc: "Custo Base"
 building_funeral_effect_desc: "$unlocks_building_desc$ Aumenta o ganho de [legitimacy|lE] e [piety|lE] para as atividades de [GetActivityType('activity_funeral').GetName|l] [GetActivityType('activity_funeral').GetTextIcon] realizadas nesta [holding|lE]"
 building_funeral_wavel_effect_desc: "$unlocks_building_desc$ Aumenta muito a obtenção de [legitimacy|lE] e [piety|lE] para as atividades de [GetActivityType('activity_funeral').GetName|l] [GetActivityType('activity_funeral').GetTextIcon] realizadas nesta [holding|lE]"
 #Events
 funeral.0001.t: "Morte em um Funeral"
 funeral.0001.desc: "Outra razão para estarmos enlutados caiu sobre nós neste dia, pois nosso anfitrião [host.GetName] ascendeu ao [host.GetFaith.PositiveAfterLife].\n\nEmbora isso encurte as cerimônias atuais, também indica que pode haver mais funerais a caminho mais cedo do que o esperado."
 funeral.0001.a: "Que infelicidade."
 funeral.0001.a.tt: "[host.GetName] faleceu."
 funeral.0002.t: "Morte em um Funeral"
 funeral.0002.desc: "Outro motivo para luto se abateu sobre nós neste dia, já que [host.GetName] ascendeu a [host.GetFaith.PositiveAfterLife]. Como herdeir[ROOT.Char.Custom('ES_OA')] de [host.GetHerHis], as tarefas de anfitri[ROOT.Char.Custom('ES_OnOna')] passaram para mim.\n\nEmbora isso não signifique o fim de nossa humilde cerimônia, indica que pode haver outro funeral muito antes do esperado."
 funeral.0002.a: "Farei o que for necessário."
 funeral.0002.a.tt: "Os deveres de hospedagem do funeral passaram para você."
 funeral.0010.t: "Chegada"
 funeral.0010.desc_intro: "[ROOT.Char.GetInvolvedActivity.GetCurrentPhase.GetLocation.GetBaronyNameExplicitly] será o local de descanso final de [deceased.GetFirstName], e eu"
 funeral.0010.self: "fico sozinho para reunir meus pensamentos e me preparar para a chegada dos honrados enlutados."
 funeral.0010.dislikes_host: "me recebe [host.Custom('ES_ElLa')] vil [host.Custom2('InsultNoun', ROOT.Char)|l] [host.Custom2('InsultAdjective', ROOT.Char)] de [host.GetName]. Embora eu deteste estar na companhia dele(a), na verdade vim aqui por [deceased.GetName]. Esta é minha oportunidade para"
 funeral.0010.likes_host: "me recebe [host.Custom('ES_ElLa')] magnânim[host.Custom('ES_OA')] [host.GetName]. Além de poder desfrutar da sua boa companhia, também estou aqui por [deceased.GetName]. Esta será a última oportunidade de"
 funeral.0010.neutral: "me recebe [host.GetName]. Embora sua companhia me importe bem pouco, o dia de hoje é realmente sobre [deceased.GetName] e esta é minha oportunidade de"
 funeral.0010.disrespect: "rir por último desse desprezível desgraçad[deceased.Custom('ES_OA')]."
 funeral.0010.respect: "dizer meu último adeus a [deceased.GetSheHe].\n\n"
 funeral.0010.intent_arrived: "\n\nAvisto [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetIntentTarget.GetTitledFirstName|l] entre os enlutados, totalmente alhe[ROOT.Char.GetIntentTarget.Custom('ES_OA')] ao meu plano para tentar [ROOT.Char.GetInvolvedActivityIntent.GetName|l] cujo alvo é [ROOT.Char.GetIntentTarget.GetSheHe]."
 funeral.0010.intent: "\n\nAinda não consigo encontrar [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetIntentTarget.GetTitledFirstName|l] em lugar nenhum. Estou ansioso para que ele chegue para que enfim meu plano de tentar [ROOT.Char.GetInvolvedActivityIntent.GetName|l] cujo objetivo é [ROOT.Char.GetIntentTarget.GetSheHe]."
 funeral.0010.a.bad: "Um momento de celebração por minha contagem."
 funeral.0010.a.good: "Nunca esquecerei [deceased.GetHerHim]."
 funeral.0100.t: "Pó ao Pó"
 funeral.0100.desc.intro: "Chegou a hora de realizar os últimos ritos de [deceased.GetName] antes de sua jornada final para o além.\n\n"
 funeral.0100.desc.intro2.burial: "O corpo amortalhado de [deceased.GetFirstName] é mantido suspenso sobre uma cova aberta, cercado por amigos íntimos e familiares. À cabeceira está [host.LocalPlayerString( 'mi persona', host.GetName)] um lugar privilegiado de luto concedido apenas a um anfitrião magnânimo."
 funeral.0100.desc.intro2.sky_burial: "O corpo de [deceased.GetFirstName] foi levado ao ponto mais alto de [ROOT.Char.GetInvolvedActivity.GetCurrentPhase.GetLocation.GetBaronyNameExplicitly] em um cortejo de enlutados. Pouco antes do topo, o corpo é deixado exclusivamente para que [host.LocalPlayerString( 'yo', host.GetName)] o leve na etapa final da jornada."
 funeral.0100.desc.intro2.mummification: "O corpo perfeitamente preservado de [deceased.GetFirstName] fica exposto para todos verem. O maravilhoso trabalho dos embalsamadores praticamente faz com que pareça que ele poderia se levantar e andar novamente, e antes que o corpo seja sepultado de uma vez por todas, ele é deixado sozinho por um momento com [host.LocalPlayerString( 'mi persona', host.GetName)]."
 funeral.0100.desc.intro2.cremation: "[deceased.GetFirstName] jaz envolt[deceased.Custom('ES_OA')] em elegantes tecidos sobre uma imponente pira funerária. O [host.GetFaith.PriestNeuter] ergue-se ao lado de [host.LocalPlayerString( 'mim', host.GetName)] com uma tocha; suas chamas dançam ao vento."
 funeral.0100.desc.mid.hate: "\n\nFrente a frente com o corpo, vazio de vida, dou uma pequena risada para mim mesmo. Serei eu quem se encarregará de uma vez por todas de seus restos miseráveis."
 funeral.0100.desc.mid.love: "\n\nMal consigo olhar para[deceased.GetHerHim] e, mesmo agora, ainda me custa acreditar que este seja realmente nosso último momento juntos."
 funeral.0100.desc.mid.spouse: "\n\nContemplo [deceased.Custom('WifeHusband')] falecid[deceased.Custom('ES_OA')] pela última vez, e não consigo evitar imaginar todo o tempo que nos foi negado. Todos os netos que nunca criamos, todas as noites de romance que jamais compartilhamos."
 funeral.0100.desc.mid.child: "\n\nContemplo o corpo sem vida do meu [deceased.Custom('GetDaughterSon')] e lamento. [Select_CString( ROOT.Char.IsFemale, 'Nenhuma', 'Nenhum' )] [ROOT.Char.GetMotherFather] deveria viver para ver seus próprios filhos serem cruelmente ceifados."
 funeral.0100.desc.mid.predecessor: "\n\nVer[deceased.GetHerHim] rodead[deceased.Custom('ES_OA')] de tanta gente compungida e recebendo um enterro [ROOT.Char.GetFaith.GetAdherentName] apropriado me dá esperanças de que talvez eu também seja lembrado com tanto carinho quanto [ROOT.Char.GetTitleAsNameNoTooltip|l]."
 funeral.0100.desc.mid.young: "\n\nQue tragédia que alguém tão jovem tenha sua vida tirada diante dos meus olhos."
 funeral.0100.desc.mid.old: "\n\nSó encontro consolo ao ver alguém tão idoso neste estado. Uma vida tão longa e brilhante é a inveja de muitos, e estar cercad[ROOT.Char.Custom('ES_OA')] de tantos rostos contritos é tudo a que qualquer [ROOT.Char.GetWomanMan] pode aspirar."
 funeral.0100.desc.mid.fallback: "\n\nO rito final de seu corpo recai sobre mim, e o peso de tamanha responsabilidade pesa muito em minha mente."
 funeral.0100.desc.outro.burial: "Por fim, seu corpo é baixado à terra, e o funeral é oficialmente concluído com uma oração."
 funeral.0100.desc.outro.sky_burial: "As incisões cerimoniais são feitas para auxiliar as aves necrófagas a acessarem a carne, e a cerimônia está completa por enquanto. Tudo o que resta é retornar em alguns dias para buscar os ossos."
 funeral.0100.desc.outro.mummification: "Os restos mumificados são deixados para mim junto com alguns jarros de órgãos. O túmulo pode ser o lar de qualquer um deles, mas minha corte é tão adequada quanto qualquer outra."
 funeral.0100.desc.outro.cremation: "Baixo a tocha à lenha e observo enquanto a torre de madeira é acesa. Tudo o que resta agora é esperar que [deceased.GetFirstNameNoTooltip] se torne cinzas."
 funeral.0100.a: "Belíssimo."
 funeral.0100.b: "Agora vive para sempre na corte."
 funeral.0100.c: "Sempre [deceased.GetHerHim] terei ao meu lado."
 funeral.0100.d: "Tudo isso pertence ao túmulo."
 funeral.0101.t: "$funeral.0100.t$"
 funeral.0101.desc.intro: "$funeral.0100.desc.intro$"
 funeral.0101.desc.intro2.burial: "$funeral.0100.desc.intro2.burial$"
 funeral.0101.desc.intro2.sky_burial: "$funeral.0100.desc.intro2.sky_burial$"
 funeral.0101.desc.intro2.mummification: "$funeral.0100.desc.intro2.mummification$"
 funeral.0101.desc.intro2.cremation: "$funeral.0100.desc.intro2.cremation$"
 funeral.0101.desc.outro.burial: "\n\nRecitamos algumas preces tradicionais por [Select_CString( deceased.IsFemale, 'a falecida', 'o falecido' )] e, em seguida, baixam lentamente o corpo para sua sepultura, onde poderá descansar no paraíso por toda a eternidade."
 funeral.0101.desc.outro.sky_burial: "\n\nSão feitos os cortes tradicionais ao longo do corpo, e aves famintas já sobrevoam o local, prontas para consumir a carne. Agora só resta deixá-las trabalhar, e os [host.GetFaith.PriestNeuterPlural] voltarão em alguns dias para recolher os ossos."
 funeral.0101.desc.outro.mummification: "\n\nAgora [host.GetName] leva os restos juntamente com os órgãos em jarros para serem preservados pela eternidade."
 funeral.0101.desc.outro.cremation: "A tocha é abaixada até a lenha e observo enquanto a torre de madeira é acesa. Tudo o que resta agora é esperar que [deceased.GetFirstNameNoTooltip] seja transformado em cinzas."
 funeral.0101.a: "$funeral.0100.a$"
 funeral.1000.t: "Eu me lembro de [deceased.GetSheHe]"
 funeral.1000.desc: "Em um canto silencioso da minha [host.GetFaith.HouseOfWorship] ouço por acaso [random_attendee.GetName] conversando com um grupo de enlutados. [random_attendee.GetSheHe|U] me faz um gesto sombrio para que eu me aproxime.\n\n\"Todos nós temos boas lembranças de [deceased.GetName], e eu estava falando sobre quando [attendee_memory.GetDescription]. Dizei-me, tendes alguma lembrança para compartilhar?\"."
 funeral.1000.a: "As lembranças são dolorosas demais."
 funeral.1000.b: "Ah, sim, claro, [deceased.GetHerHim] conhecia bem."
 funeral.1000.b.success: "Você se safar mentindo"
 funeral.1000.b.failure: "Ninguém acredita em você"
 funeral.1000.c: "Eu admito, não tenho nada."
 funeral.1000.d: "Como poderia esquecer?"
 funeral.1000.d.success: "Sua memória traz lágrimas"
 funeral.1000.d.failure: "Você não consegue explicar bem"
 funeral.1000.e: "Isso não é uma competição."
 funeral.1010.t: "Bens Funerários"
 funeral.1010.desc: "Diante do corpo envolto em mortalha de [deceased.GetName] passam um a um convidados ilustres, que mal lhe dedicam mais do que uma leve reverência ou um aceno de cabeça, como se um gesto tão meramente protocolar pudesse algum dia bastar para honrar uma vida. Meu coração pesa tanto quanto meus bolsos, tão cheios de bugigangas e lembranças de [deceased.GetNameNoTooltip].\n\nNão consigo deixar de me perguntar por que eu deveria acumular objetos que por direito pertencem a [deceased.GetSheHe]."
 funeral.1010.a: "[common_grave_good.GetNameNoTooltip] não é meu para guardar."
 funeral.1010.b: "[masterwork_grave_good.GetNameNoTooltip] pertence ao [ROOT.Char.GetFaith.PositiveAfterLife]."
 funeral.1010.c: "[famed_grave_good.GetNameNoTooltip] será enterrado."
 funeral.1010.d: "Somente [illustrious_grave_good.GetNameNoTooltip] é digno."
 funeral.1010.e: "[ROOT.Char.GetFaith.HighGodName] me livre."
 funeral.1020.t: "[Select_CString( host.IsFemale, 'A falsa', 'O falso' )] [host.GetTitleAsNameNoTooltip|l]"
 funeral.1020.desc: "O cortejo fúnebre cerca [host.GetName], oferecendo seus respeitos e votos de melhoras [host.Custom('ES_AlAla')] supost[host.Custom('ES_OA')] \"[host.GetTitleAsNameNoTooltip|l]\". Nenhum deles me presta a mesma cortesia, apesar do meu status evidente.\n\nSerá que [deceased.GetName] realmente teria desejado que [host.GetFirstNameNoTooltip] fosse seu sucessor[host.Custom('ES_XA')]?"
 funeral.1020.c: "[deceased.GetFirstNameNoTooltip] teria querido que [host.GetHerHim] eu apoiasse."
 funeral.1020.a: "Todos devem conhecer minha verdadeira reivindicação!"
 funeral.1020.b: "Agora não é o momento."
 funeral.1021.t: "$funeral.1020.t$"
 funeral.1021.desc: "Contemplo [deceased.GetName] em silenciosa reflexão, interrompida apenas pelos ocasionais benfeitores que oferecem suas condolências.\n\n\"[ROOT.Char.Custom2('InsultNoun', SCOPE.sC('claimant'))|U]! [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('claimant'))|U]! [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('claimant'))|U]! Você ousa se chamar [ROOT.Char.GetTitleAsNameNoTooltip]?\" [claimant.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me interpela, com o dedo enfurecido agitando-se a centímetros do meu rosto. \"[deceased.GetNameNoTooltip|U] havia planejado que #EMP eu#! governasse em seu lugar! Vilã[ROOT.Char.Custom('ES_OA')]!\""
 funeral.1021.a: "\"Saia daqui!\""
 funeral.1021.a.toast: "Você foi removido do funeral"
 funeral.1021.b: "\"Não me importa\"."
 funeral.1021.b.toast: "Seu acesso de raiva foi ignorado"
 funeral.1030.t: "Se Demorar Uma Eternidade"
 funeral.1030.desc: "Tenho observado muitos visitantes em seu monótono vai e vem, cumprindo sua vazia obrigação. Um visitante, no entanto, jaz igualmente imóvel ao lado [Select_CString( deceased.IsFemale, 'da falecida', 'do falecido' )] [deceased.GetFirstName].\n\nPermanece ali por horas, como se fosse ficar eternamente. É o fiel sabujo de minha [ROOT.Char.Custom2('RelationToMeShort', deceased)], que ganime e choraminga pel[Select_CString( deceased.IsFemale, 'a mulher', 'o homem' )] que [ROOT.Char.GetFaith.HighGodName] havia nomeado seu senhor. Jaz e espera; não faz nada além disso e, sem minha intervenção, pode seguir o corpo para o além."
 funeral.1030.a: "\"Venha então, esteja ao meu lado no luto.\""
 funeral_1030_adopt_tt: "Você adota o cachorro de [deceased.GetFirstNameNoTooltip]."
 funeral.1030.b: "\"Afaste-se de seu mestre imóvel!\""
 funeral.1030.c: "Lamente o seu nariz, pois ele encontrará minha bota!"
 funeral.1040.t: "Incorruptível"
 funeral.1040.desc: "O corpo do meu falecid[deceased.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', deceased)] está sem vida há dias, mas seus olhos ainda guardam vida, o olhar da divindade. [ROOT.Char.GetFaith.HighGodName] preserva o corpo dos estragos da podridão e da decomposição, como se [deceased.GetHerHim] estivesse em um sonho entre a vida e a morte.\n\nA multidão clamorosa declarou que este corpo é incorruptível, escolhido para ascender a um [GetTrait('saint').GetName( deceased )|l]."
 funeral.1040.a: "Um milagre diante dos meus olhos."
 funeral.1040.b: "Devo agir como advogad[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetFaith.DevilNamePossessive]."
 funeral.1040.b.success: "Sua defesa vai bem"
 funeral.1040.b.failure: "Sua defesa é ignorada"
 funeral.1040.c: "O mesmo acontecerá comigo, sem dúvida."
 funeral.1050.t: "Nosso Momento no Tempo"
 funeral.1050.desc: "De todas as figuras veneradas e perversas, nenhuma foi mais desejada do que noss[deceased.Custom('ES_OA')] falecid[deceased.Custom('ES_OA')] [deceased.GetName]. Com uma multidão de pranteadores e curiosos buscando outros temas para satisfazer sua fascinação, por fim me resta um momento de alívio entre meu [ROOT.Char.Custom2('RelationToMeShort', deceased)] e eu."
 funeral.1050.witch: "Vou pegar um pouco de cabelo."
 funeral.1050.a: "Um tempo para oração silenciosa."
 funeral.1050.b: "Permitir-me-ei um momento de luto."
 funeral.1050.c: "Deixar tudo sair."
 funeral.1050.d: "Prometo ser um [ROOT.Char.GetTitleAsNameNoTooltip|l] melhor."
 funeral.1060.t: "Estrela do Luto"
 funeral.1060.desc: "Todos os olhares se voltam para [other_mourner.GetName] quando cai ao chão em lamentação, com as mãos cobrindo os olhos avermelhados. Seus suspiros e soluços dolorosos deixaram os demais enlutados sem fôlego, e muitos lhe oferecem conforto e reverência como se fosse [other_mourner.GetSheHe] quem estivesse prestes a ser entregue ao além."
 funeral.1060.a: "Os olhos devem se voltar apenas para mim."
 funeral.1060.a.success: "Todos os olhos se voltam para você"
 funeral.1060.a.failure: "Você passa vergonha"
 funeral.1060.b: "Só posso lamentar à minha maneira."
 funeral.1060.c: "Ofereço conforto."
 funeral.1070.t: "O que é a Morte?"
 funeral.1070.desc: "Morte. Ao meu redor, fala-se de morte, [ROOT.Char.GetFaith.PositiveAfterLife] e [ROOT.Char.GetFaith.NegativeAfterLife]. Pensamentos sobre o rosto de [deceased.GetFirstName], sobre nunca mais vê-lo, perturbam minha mente; ainda assim, a morte e seu significado escapam ao meu entendimento como areia entre os dedos.\n\nEste destino, cruel ou gentil, deixa até o mais estoico dos adultos encharcado de lágrimas, seja em silêncio ou em lamentos abertos. O que é, então? Talvez [other_mourner.GetName] me dê respostas simples."
 funeral.1070.a: "Por que todos estão tão tristes?"
 funeral.1070.b: "Devo apenas seguir o que os outros fazem..."
 funeral.1071.t: "Juventude mortal"
 funeral.1071.desc: "Sinto uma calma tranquila me envolver ao observar a sala repleta de enlutados. Alguns têm os olhos vermelhos, outros veem isso como apenas mais um motivo para se reunir. Alguém, porém, me olha com insegurança enquanto puxa minha roupa.\n\n[confused_child.Custom2('MyCharacterIntroduction', ROOT.Char)|U] não chora abertamente, mas não parece impassível como muitas outras crianças presentes. \"O que aconteceu com [deceased.GetFirstName]? [ROOT.Char.GetNameNoTooltip]? Por que todo mundo está triste?\"."
 funeral.1071.a: "\"Não se preocupe, criança[confused_child.Custom('ES_OA')]\"."
 funeral.1071.a.tt: "[other_mourner.GetFirstName] oferece conforto a você."
 funeral.1071.b: "\"Agora está em [ROOT.Char.GetFaith.PositiveAfterLife]\"."
 funeral.1071.b.reincarnation: "\"[deceased.GetSheHe|U] continua em sua jornada de reencarnação.\""
 funeral.1071.b.taoism: "\"Agora retornou ao universo\"."
 funeral.1071.a.success: "[Select_CString( confused_child.IsFemale, 'A menina', 'O menino' )] se sente reconfortado[confused_child.Custom('ES_OA')]"
 funeral.1071.a.success.child: "Você é confortado pelos pensamentos do além"
 funeral.1071.a.failure: "[Select_CString( confused_child.IsFemale, 'La niña', 'El niño' )] fica traumatizad[confused_child.Custom('ES_OA')]"
 funeral.1071.a.failure.child: "Você percebe sua própria mortalidade"
 funeral.1080.t: "O Luto d [other_mourner.Custom2('RelationToMeShort', deceased)]"
 funeral.1080.desc: "Curvad[other_mourner.Custom('ES_OA')] ao meu lado, despojad[other_mourner.Custom('ES_OA')] de toda pretensão de decoro, [other_mourner.Custom('ES_ElLa')] inconsolável [other_mourner.GetFirstName] contempla o vazio diante de [other_mourner.GetHerHim]. Nem uma lágrima cai de seus olhos, nem uma palavra sai de sua boca, até que se volta para mim.\n\n\"[other_mourner.GetFaith.HighGodName|U] pode ser realmente cruel. Por que o vento ainda sopra? Por que o mar continua a avançar até a praia? Por que meu corpo dói pedindo comida e sente sede de água? [other_mourner.Custom('apocalypse_name')|U] está sobre nós; meu [other_mourner.Custom2('RelationToMeShort',deceased)] está morto.\""
 funeral.1080.a: "\"Meus sentimentos exatamente.\""
 funeral.1080.b: "\"Vamos, lembrem-se. Não devemos permitir que a tristeza nos domine\"."
 funeral.1080.c: "\"Enquanto há vida, sempre há esperança\"."
 funeral.1080.c.success: "[other_mourner.GetSheHe|U] se sente consolad[other_mourner.Custom('ES_OA')]"
 funeral.1080.c.failure: "[other_mourner.GetSheHe|U] está insultad[other_mourner.Custom('ES_OA')]"
 funeral.1080.d: "Acene silenciosamente."
 funeral.1090.t: "A última oportunidade"
 funeral.1090.desc: "A fila enlutada avança. A fila para ter um último momento com [deceased.GetName]. Um último sussurro, um último e longo adeus, um último nada no último lugar onde ninguém voltará a ver[deceased.GetHerHim]. Na verdade, é um privilégio estar aqui.\n\nA fila me aproxima cada vez mais até que, por fim, a figura à minha frente se afasta e não há nada além de um véu entre [deceased.GetSheHe] e eu."
 funeral.1090.a: "Todos ouvirão meu lamento."
 funeral.1090.b: "Uma reverência silenciosa, e eu me afasto."
 funeral.1090.c: "\"No fim, eu venci\"."
 funeral.1090.d: "Faça um discurso prometendo cumprir sua vontade."
 funeral.1090.d.success: "A multidão é comovida"
 funeral.1090.d.failure: "Você se fez de bobo"
 funeral.1090.e: "Falar de suas virtudes."
 funeral.1100.t: "Um[deceased.Custom('ES_OA')] de [deceased.Custom('ES_LoLa')] s grandes"
 funeral.1100.desc: "Diante de mim, uma mesa de banquete abarrotada de todo tipo de comida e bebida, como se [deceased.GetName] tentasse oferecer um último ato de magnanimidade antes de partir.\n\nNo entanto, até agora [other_mourner.GetName] se recusou a tocar sequer neste banquete, girando sua taça em busca de consolo ocioso. Seu olhar distante e cansado recai sobre mim, e com um aceno silencioso de cabeça, ergue sua bebida bem alto.\n\n\"Ao [deceased.GetNameNoTooltip], realmente um[deceased.Custom('ES_OA')] dos [deceased.Custom('ES_LoLa')] grandes.\""
 funeral.1100.a: "\"Foi certamente grandioso, e eu o serei ainda mais.\""
 funeral.1100.a.success: "A multidão é comovida"
 funeral.1100.a.failure: "Seu comentário causa grande ofensa"
 funeral.1100.b: "\"Para [deceased.GetNameNoTooltip]!\""
 funeral.1100.c: "\"Nos diga o que [deceased.GetSheHe] realmente significava para você.\""
 funeral.1100.d: "Faça uma oração silenciosa."
 funeral.1110.t: "Um momento para o luto."
 funeral.1110.desc: "As sombras dos enlutados não pairam mais sobre mim e, finalmente, me é concedido um momento sozinho. Que conforto silencioso eu poderia encontrar em tal momento, sem o tilintar e tagarelice dos outros convidados em meus ouvidos. Apenas eu e meus pensamentos sobre [deceased.GetName]."
 funeral.1110.a: "Isso parece... bom."
 funeral.1120.t: "A Oferta de Libações"
 funeral.1120.desc: "Eu e os outros enlutados fazemos uma pausa em nossa dor para desfrutar de uma grande fartura de comida. [other_mourner.GetName|U], que costuma ser a alma de qualquer banquete, agora se senta diante de mim, com os olhos marejados e uma taça intocada ao lado.\n\n\"Como podemos engordar e nos alegrar em tempos como estes? Devemos nos divertir enquanto [deceased.GetFirstName] não tem nada? Juntem-se a mim! Esvaziem suas taças em libação!\"\n\nOs convidados parecem concordar; há sabedoria no lamento rude de [other_mourner.GetFirstNameNoTooltip]."
 funeral.1120.aniconist: "\"Seu tolo idólatra!\""
 funeral.1120.a: "Junte-se à oferta."
 funeral.1120.b: "Uma rodada de bebidas para todos!"
 funeral.1120.c: "Vou lembrar [deceased.GetHerHim|U] do meu jeito."
 funeral.1130.t: "Um Momento para Lamentar"
 funeral.1130.desc.intro: "Os enlutados movem-se pelo salão chorando em uma espécie de dança macabra, tudo para [deceased.GetName]."
 funeral.1130.desc.bewailment: "O quarto está denso com os lamentos dos enlutados em uma cacofonia de miséria, e eu me sento no meio de tudo isso, meus ouvidos zunindo e minha alma doendo."
 funeral.1130.desc.stoic: "O silêncio inquietante de um povo contendo o que desesperadamente desejam fazer. Gritos silenciosos nunca a escapar de seus lábios, batalhas árduas contra lágrimas sendo perdidas, tão envergonhados de seu próprio luto."
 funeral.1130.desc.outro: "\n\nEu me levanto e permito-me perder-me na dança com meus colegas enlutados."
 funeral.1130.a: "Quero que o mundo saiba como é sentir isso."
 funeral.1130.b: "Devo permanecer forte."
 funeral.1140.t: "Juntos ou Não Mais"
 funeral.1140.desc: "Faço uma pausa no luto em meio a todas as almas que vêm prestar homenagens a [deceased.GetName]. Além do alvoroço fúnebre, ouço um lamento sobrenatural ecoando no vazio dos corredores.\n\nNa origem dele, encontro [soulmate.GetName] sozinho em uma sala escurecida; seu choro logo se cala enquanto ele me olha com olhos frios. Em sua mão há uma terrível garrafa sem marcas.\n\n\"Não tardará até o dia do nosso casamento.\""
 funeral.1140.a: "\"Isso é realmente o que [deceased.GetSheHe] teria querido?\""
 funeral.1140.a.success: "Salvaste a vida de [soulmate.GetNameNoTooltip]"
 funeral.1140.a.failure: "Você não conseguiu salvar a vida de [soulmate.GetNameNoTooltip]"
 funeral.1140.b: "Quebre a garrafa."
 funeral.1140.c: "Feche silenciosamente a porta."
 funeral_conclusion_log_title: "Cerimônia de Sepultamento"
 funeral_conclusion_log: "O falecido foi conduzido ao além e o funeral foi concluído."
