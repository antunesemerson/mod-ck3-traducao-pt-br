l_spanish:
 #General Loc Strings
 pay_homage_header: "Homenagem:"
 #Activity Start: Liege decides whether or not to hear petition
 pay_homage.0001.opening: "[homage_vassal.Custom2('AppropriateGreetingPositive', ROOT.Char )]"
 pay_homage.0001.desc: "Cheguei a [homage_liege.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] para prestar homenagem a vós, glorios[homage_liege.Custom('ES_OA')] [homage_liege.GetTitleAsNameNoTooltip], como prova da minha lealdade. \n\n"
 pay_homage.0001.desc.submission: "Espero que minha promessa de submissão seja suficiente como prova do meu honor."
 pay_homage.0001.desc.gold: "Trago ricos presentes dignos da sua majestade, como um símbolo da minha boa vontade e servidão."
 pay_homage.0001.desc.hook: "Tenhais minha palavra de que farei tudo o que desejardes de mim, meu [homage_liege.GetLadyLord]."
 pay_homage.0001.desc.contract: "Para marcar seu domínio e minha lealdade a você, comprometo-me a maiores obrigações como seu vassal[GetPlayer.Custom('ES_OA')]."
 pay_homage.0001.a: "Deixe entrar [homage_vassal.GetTitledFirstNameNoTooltip|l] imediatamente."
 pay_homage.0001.a.tt: "Você recebe [homage_vassal.Custom('ES_AlAla')] [homage_vassal.GetTitledFirstName|l]"
 pay_homage.0001.b: "Suas reverências não significam nada para mim."
 pay_homage.0001.b.tt: "Você manda [homage_vassal.GetTitledFirstName|l]"
 #Activity End: Vassal learns that liege refuses to hear petition
 pay_homage.0009.opening: "[homage_liege.Custom2('AppropriateGreeting', ROOT.Char )]"
 pay_homage.0009.desc: "Não sou enganado por sua encenação [homage_vassal.Custom2('InsultAdjective', SCOPE.sC('homage_liege'))]; uma promessa de homenagem de sua parte não significaria nada para mim."
 pay_homage.0009.a: "Uma afronta!"
 #Liege Event: Liege receives homage from vassal
 pay_homage.0101.t: "$pay_homage_header$ Ajoelhando-se"
 pay_homage.0101.t.language: "$pay_homage_header$ Duplo Sentido"
 pay_homage.0101.t.clumsy: "$pay_homage_header$ Constrangido"
 pay_homage.0101.t.infatuation: "$pay_homage_header$ Objetificado"
 pay_homage.0101.t.delivery: "$pay_homage_header$ Enrolado"
 pay_homage.0101.desc: "Espero pacientemente em meu trono a chegada de [homage_vassal.GetTitledFirstName|l], que logo é anunciado e conduzido até mim. \n\n"
 pay_homage.0101.desc.submission: "Ajoelha-se em sinal de deferência, sem oferecer nada além de seu juramento de servir fielmente como vassalo[homage_vassal.Custom('ES_OA')] [homage_liege.Custom('ES_DelDela')] [homage_liege.GetPrimaryTitle.GetTierAsNameNoTooltip].\n\n"
 pay_homage.0101.desc.gold: "Ajoelha-se em sinal de deferência, enquanto alguns cortesãos trazem seus presentes em moedas e objetos preciosos. Seu juramento é feito, e os escribas registram suas promessas de servir [homage_liege.Custom('ES_AlAla')] [homage_liege.GetPrimaryTitle.GetNameNoTooltip].\n\n"
 pay_homage.0101.desc.hook: "Ajoelha-se em sinal de deferência e, entre seus outros juramentos, coloca-se à minha disposição e em dívida comigo.\n\n"
 pay_homage.0101.desc.contract: "Ajoelha-se em sinal de deferência e, entre outros juramentos de servir [homage_liege.Custom('ES_AlAla')] [homage_liege.GetPrimaryTitle.GetNameNoTooltip], oferece-me maiores contribuições como senhor[homage_vassal.Custom('ES_XA')] vassal[homage_vassal.Custom('ES_OA')] do [homage_liege.GetPrimaryTitle.GetTierAsNameNoTooltip].\n\n"
 pay_homage.0101.desc.language: "Embora esteja claro que o/a [homage_vassal.GetTitleAsNameNoTooltip] tenha ensaiado os juramentos em [homage_liege.GetCourtLanguage.GetNameNoTooltip], pronuncia mal várias partes, o que muda de forma cômica o significado delas e meus cortesãos precisam abafar as risadas."
 pay_homage.0101.desc.clumsy: "Quando [homage_vassal.GetTitledFirstNameNoTooltip|l] se levanta, tropeça desajeitadamente. A corte solta um suspiro em uníssono quando cai e termina estatelad[homage_vassal.Custom('ES_OA')] aos meus pés, com as bochechas coradas de vergonha."
 pay_homage.0101.desc.infatuation: "[homage_vassal.GetTitledFirstNameNoTooltip|l] se ergue com um aspecto estranho. Pelo canto do olho, noto minha [SCOPE.sC('homage_liege').Custom2('RelationToMeShort', SCOPE.sC('homage_infatuation'))] [homage_infatuation.GetFullName] derreter, claramente apaixonad[homage_infatuation.Custom('ES_OA')] por [homage_vassal.GetTitledFirstNameNoTooltip|l]!"
 pay_homage.0101.desc.delivery: "As coisas não correm bem desde o início. [homage_vassal.Custom('GetHomageDeliveryDescLiege')]"
 pay_homage.0101.desc.success: "Por fim, digo [homage_vassal.Custom('ES_AlAla')] [homage_vassal.GetTitledFirstNameNoTooltip|l] para que se levante, confirmando minha satisfação e seus direitos às terras que governa em meu lugar."
 pay_homage.0101.smooth.submission: "\"Sirva-me bem, [homage_vassal.GetTitledFirstNameNoTooltip|l].\""
 pay_homage.0101.smooth.gold: "\"Aceito seus generosos presentes, [homage_vassal.GetTitledFirstNameNoTooltip|l].\""
 pay_homage.0101.smooth.hook: "\"Fico feliz em saber que posso contar com você, [homage_vassal.GetTitledFirstNameNoTooltip|l].\""
 pay_homage.0101.smooth.contract: "\"Seus serviços são inestimáveis, [homage_vassal.GetTitledFirstNameNoTooltip|l].\""
 pay_homage.0101.faux_pas.language: "\"Bom esforço, [homage_vassal.GetFirstNameNoTooltip]; não é uma língua fácil.\""
 pay_homage.0101.faux_pas.clumsy: "\"Seus juramentos são tudo o que importa para mim.\""
 pay_homage.0101.faux_pas.infatuation: "\"Ahem... Acho que terminamos por aqui.\""
 pay_homage.0101.faux_pas.delivery: "\"Sua lealdade, não sua língua, é o que importa.\""
 pay_homage.0101.insult.language: "Vocês têm #EMP a menor ideia#! do que acabaram de dizer?"
 pay_homage.0101.insult.clumsy: "\"Que desastre.\""
 pay_homage.0101.insult.infatuation: "Como #EMP ousam#!?! Fora!"
 pay_homage.0101.insult.delivery: "O que #EMP disse#!?"
 #Vassal Event: Vassal hears how it went
 pay_homage.0201.desc: "Alguns servos me conduzem ao grande salão [homage_liege.Custom('ES_DelDela')] [homage_liege.GetTitledFirstNameRegnal|l] de [homage_liege.GetCapitalLocation.GetBaronyNameExplicitlyNoTooltip], onde [homage_liege.GetSheHe] se senta no trono à espera de ouvir meu juramento.\n\n"
 pay_homage.0201.desc.language: "Eu me ajoelho diante de [homage_liege.GetSheHe] e recito os juramentos em [homage_liege.GetCourtLanguage.GetNameNoTooltip] que pratiquei, mas as risadinhas meio disfarçadas da corte deixam claro que preciso praticar mais o idioma da corte do meu suserano[homage_liege.Custom('ES_XA')]…\n\n"
 pay_homage.0201.desc.clumsy: "Vou me ajoelhar diante de [homage_liege.GetSheHe], mas, na minha pressa, tropeço desajeitadamente e vou ao chão aos pés de seu/sua soberano(a). Ergo-me e faço os juramentos mesmo assim, com as faces ardendo em vermelho diante da corte reunida…\n\n"
 pay_homage.0201.desc.infatuation: "Ajoelho-me diante de [homage_liege.GetSheHe]. Ao recitar os juramentos, chamo a atenção de [homage_infatuation.GetFullName], [SCOPE.sC('homage_liege').Custom2('RelationToMeShort', SCOPE.sC('homage_infatuation'))] de [homage_liege.GetFirstNameNoTooltip], que sorri de forma insinuante, com uma piscadela intencional. Volto a olhar para meu senhor[homage_liege.Custom('ES_XA')] e me deparo com seu olhar furioso! Concluo o discurso, desviando o olhar enquanto a corte cochicha…\n\n"
 pay_homage.0201.desc.delivery: "Ajoelho-me diante de [homage_liege.GetSheHe] e começo a murmurar os juramentos, mas as coisas rapidamente desandam. [homage_vassal.Custom('GetHomageDeliveryDescVassal')]\n\n"
 pay_homage.0201.desc.success: "Ajoelho-me aos pés de meu [homage_liege.GetLadyLord] e recito os muitos juramentos de homenagem, enquanto seus escribas registram o acontecimento.\n\n"
 pay_homage.0201.desc.submission: "Assim termina a cerimônia. Não tenho nada a oferecer ao meu [homage_liege.GetTitleAsNameNoTooltip], exceto minha promessa de servir fielmente como vassal[ROOT.Char.Custom('ES_OA')] do [homage_liege.GetPrimaryTitle.GetTierAsNameNoTooltip].\n\n"
 pay_homage.0201.desc.gold: "Meus acompanhantes então seguem, apresentando meus ricos presentes a [homage_liege.Custom('ES_AlAla')] [homage_liege.GetTitleAsNameNoTooltip] diante da corte reunida.\n\n"
 pay_homage.0201.desc.hook: "Depois vem minha promessa de que [homage_liege.GetFirstNameNoTooltip] pode me pedir qualquer favor em todas as suas empreitadas, como leal seguidor[ROOT.Char.Custom('ES_OA')] do [homage_liege.GetTitleAsNameNoTooltip].\n\n"
 pay_homage.0201.desc.contract: "Então vem meu presente; afirmo que aumentarei as contribuições ao [homage_liege.GetPrimaryTitle.GetTierAsNameNoTooltip] como sinal de minha lealdade e para o bem da coroa.\n\n"
 pay_homage.0201.desc.insult_language: "[homage_liege.GetFirstNameNoTooltip] me olha severamente e então irrompe em risadas, imitando meus juramentos pronunciados incorretamente com um sotaque ruim da língua [homage_vassal.GetCulture.GetLanguage.GetNameNoTooltip]..."
 pay_homage.0201.desc.insult_clumsy: "[homage_liege.GetFirstNameNoTooltip] sorri de orelha a orelha, tapando-se com a mão, enquanto a corte lentamente se enche de risadas. Assim serei lembrado..."
 pay_homage.0201.desc.insult_infatuation: "[homage_liege.GetFirstNameNoTooltip] olha para seu [SCOPE.sC('homage_liege').Custom2('RelationToMeShort', SCOPE.sC('homage_infatuation'))] com raiva, e me dispensa da câmara sem um reconhecimento."
 pay_homage.0201.desc.insult_delivery: "[homage_liege.GetFirstNameNoTooltip] se inclina, rindo com sarcasmo enquanto relata partes do meu discurso em detalhes…"
 pay_homage.0201.desc.brush_off: "Para minha surpresa, [homage_liege.GetFirstNameNoTooltip] age como se nada tivesse acontecido e aceita minha homenagem com graça.\n\n"
 pay_homage.0201.desc.outro: "[homage_liege.GetFirstNameNoTooltip] me ordena que me levante e confirma sua satisfação, juntamente com meus direitos sobre as terras que governo em seu lugar."
 pay_homage.0201.smooth.submission: "Salve [homage_liege.Custom('ES_AlAla')] [homage_liege.GetTitleAsNameNoTooltip]."
 pay_homage.0201.smooth.gold: "O preço da lealdade..."
 pay_homage.0201.smooth.hook: "Esperemos que seja um favor pequeno..."
 pay_homage.0201.smooth.contract: "Os fardos do serviço..."
 pay_homage.0201.faux_pas: "Afinal, um suserano justo."
 pay_homage.0201.insult: "Eu nunca deveria ter vindo."
 #Custom
 homage_delivery_stutter_liege: "[ROOT.Char.GetTitledFirstNameNoTooltip|l] mal consegue chegar à metade de uma frase antes que sua gagueira [ROOT.Char.Custom('ES_LoLa')] interrompa. Meus cortesãos, constrangidos, contemplam seus valentes esforços para dominar sua voz."
 homage_delivery_lisp_liege: "O discurso de [ROOT.Char.GetTitledFirstNameNoTooltip|l] é… memorável. Seu sigmatismo tira o peso de sua gravidade, enquanto ele navega por seus muitos sons sibilantes e tenta ignorar as risadinhas de meus cortesãos menos generosos."
 homage_delivery_wheeze_liege: "[ROOT.Char.Custom('ES_ElLa')|U] [ROOT.Char.GetTitledFirstNameNoTooltip|l] é uma pessoa interessante. Obviamente nervos[ROOT.Char.Custom('ES_OA')] com o espetáculo e agitad[ROOT.Char.Custom('ES_OA')] pela chegada apressada, parece ter dificuldade até para respirar e fala com a voz rouca durante seu discurso entre pausas para tomar fôlego."
 homage_delivery_slow_liege: "O discurso de [ROOT.Char.GetTitledFirstNameNoTooltip|l] é… deficiente. Perde o fio dos pensamentos em vários momentos, divaga por tangentes e malinterpreta ou pronuncia mal algumas das palavras mais importantes."
 homage_delivery_inconceivable_liege: "O discurso de [ROOT.Char.GetTitledFirstNameNoTooltip|l] resulta… interessante. Ele emprega uma linguagem arcaica e palavras de peso cujo verdadeiro significado claramente desconhece, o que duplica o comprimento do discurso e faz com que meus cortesãos mais eruditos caiam na risada."
 homage_delivery_stutter_vassal: "Mal começo o primeiro juramento quando minha gagueira me interrompe. Eventualmente, continuo enquanto a corte observa com risadas e constrangimento, mas o dia é marcado pela minha aflição."
 homage_delivery_lisp_vassal: "Meu discurso é pontuado por risos abafados enquanto tento ao máximo articular as palavras devido ao meu sigmatismo, o que diminui a solenidade da cerimônia e do meu compromisso."
 homage_delivery_wheeze_vassal: "Luto para encontrar o fôlego à medida que meu coração acelera, e a pressa para terminar o discurso só piora as coisas. Não é um discurso para ser lembrado."
 homage_delivery_slow_vassal: "Faço o que posso, mas as sobrancelhas levantadas e os olhares do meu suserano[homage_liege.Custom('ES_XA')] e da corte me dizem que meus esforços foram mais engraçados do que grandiosos."
 homage_delivery_inconceivable_vassal: "Dou o meu melhor, atendendo à ocasião e impressionando a corte com meu vasto vocabulário, mas... a reação não é exatamente o que eu esperava."
 #Invalidated event
 pay_homage.0601.t: "$pay_homage_header$ Invalidado"
 pay_homage.0601.desc.court: "Com a minha coroação como [ROOT.Char.GetTitleAsNameNoTooltip] concluída, meus preparativos para prestar homenagem não são mais necessários..."
 pay_homage.0601.desc.imprisoned_me: "$pay_homage.0601_shared_intro$ [ROOT.Char.GetImprisonedBy.GetTitledFirstName] me jogou na prisão."
 pay_homage.0601.desc.imprisoned: "$pay_homage.0601_shared_intro$ [ROOT.Char.GetImprisonedBy.GetTitledFirstName] me capturou."
 pay_homage.0601.desc.liege_dead_me: "$pay_homage.0601_shared_intro$ Acabei matando [homage_liege.Custom('ES_AlAla')] [homage_liege.GetTitledFirstName|l]… \n\n"
 pay_homage.0601.desc.liege_dead: "$pay_homage.0601_shared_intro$ [homage_liege.GetTitledFirstName] [homage_liege.GetDeathReasonHideKiller]… \n\n"
 pay_homage.0601.desc.liege_imprisoned_me: "$pay_homage.0601_shared_intro$ Acabei capturando [homage_liege.Custom('ES_AlAla')] [homage_liege.GetTitledFirstName|l]!"
 pay_homage.0601.desc.liege_imprisoned: "$pay_homage.0601_shared_intro$ [homage_liege.GetTitledFirstName] foi capturad[homage_liege.Custom('ES_OA')] por [homage_liege.GetImprisonedBy.GetTitledFirstName|l]."
 pay_homage.0601.desc.new_liege: "Se eu tiver de jurar lealdade, terei de faz?-lo ao meu/minha nov[ROOT.Char.GetLiege.Custom('ES_OA')] senhor[ROOT.Char.GetLiege.Custom('ES_XA')], [ROOT.Char.GetLiege.GetTitledFirstNameRegnal]."
 pay_homage.0601_shared_intro: "Assim que eu estava dando os toques finais no meu juramento de homenagem,"
 pay_homage.0601.desc: "\n\nIsso certamente muda a situação."
 pay_homage.0601.a_court: "Avante, para coisas maiores."
 pay_homage.0601.a_prison: "Droga."
 pay_homage.0601.a_liege: "Muito irritante..."
 pay_homage.0601.a: "Hora de repensar as coisas..."
 pay_homage_costs_refunded: "Custos de $pay_homage_decision$ reembolsados"
