 msg_grandchild_born_toast_title: "Nascimento de um neto"
 msg_grandchild_born_toast_desc_twins: "[mother.Custom('ES_ElLa')|U] [mother.GetTitledFirstName|l] deu à luz seus netos gêmeos"
 msg_grandchild_born_toast_desc: "[mother.Custom('ES_ElLa')|U] [mother.GetTitledFirstName|l] deu à luz seu/sua net[child.Custom('ES_OA')]"
 msg_royal_child_born_toast_title: "Descendência real"
 msg_royal_child_born_toast_desc_twins: "[non_royal_parent.Custom('ES_ElLa')|U] [non_royal_parent.GetTitledFirstName|l] deu à luz gêmeos da [ceremonial_house|lE] ([child.GetHouse.GetBaseName])"
 msg_royal_child_born_toast_desc: "[non_royal_parent.Custom('ES_ElLa')|U] [non_royal_parent.GetTitledFirstName|l] deu à luz [child.Custom('ES_AlAla')] [child.Custom('GetDaughterSon')] da [ceremonial_house|lE] ([child.GetHouse.GetBaseName])"
 msg_royal_child_born_toast_desc_twins_father: "[non_royal_parent.Custom('ES_ElLa')|U] [non_royal_parent.GetTitledFirstName|l] gerou gêmeos da [ceremonial_house|lE] ([child.GetHouse.GetBaseName])"
 msg_royal_child_born_toast_desc_father: "[non_royal_parent.Custom('ES_ElLa')|U] [non_royal_parent.GetTitledFirstName|l] gerou um[child.Custom('ES_XA')] [child.Custom('GetDaughterSon')] da [ceremonial_house|lE] ([child.GetHouse.GetBaseName])"
 birth.0002.t: "Todos os Meus Filhos"
 birth.0002.desc: "A cada nascimento, a cordialidade em minha direção cresce; quando seguro meu recém-nascido nos braços, sou recebido com mais calor e bondade do que nunca antes. Acho que tenho uma reunião bastante impressionante de filhos..."
 birth.0002.a: "Bondade gerada pelo nascimento!"
 birth.1001.t: "Meu [child.Custom('GetDaughterSon')]"
 birth.1001.heir.t: "Meu [child.Custom('GetDaughterSon')] e herdeir[child.Custom('ES_OA')]"
 birth.1001.daughters.t: "Minhas Filhas"
 birth.1001.sons.t: "Meus Filhos"
 birth.1001.children.t: "Meus Bebês"
 birth.1001.first_birth_good.desc: "Quando a primeira contração começou, uma grande calma tomou conta de mim. Não havia espaço para minhas antigas preocupações, eu estava prestes a realizar um dos grandes milagres da vida. Depois de um esforço longo, mas glorioso, eu trouxe a"
 birth.1001.first_birth_scary.desc: "Conversei com inúmeras mães e parteiras, levei seus conselhos a sério. No entanto, quando chegou a minha hora, percebi que nenhum preparo seria suficiente.\n\nAs dores eram avassaladoras e eu temia pela minha vida. Mas superei, e agora tenho"
 birth.1001.many_births.desc: "A cada nascimento, fica um pouco mais fácil — mas nunca deixo de me surpreender com a intensidade da experiência e com a minha própria força. Mais uma vez, trouxe nova vida a esta Terra, na forma de"
 birth.1001.not_first_birth.desc: "Meu alívio é imenso, e minha alegria ainda maior! Eu dei à luz"
 birth.1001.sondaughter.desc: "um[child.Custom('ES_XA')] [child.Custom('GetDaughterSon')] pequenininh[child.Custom('ES_OA')] e perfeit[child.Custom('ES_OA')]!\n\n"
 birth.1001.daughters.desc: "duas lindas meninas!\n\n"
 birth.1001.sons.desc: "dois lindos meninos!\n\n"
 birth.1001.children.desc: "dois lindos bebês!\n\n"
 birth.1001.same_gender_heir.desc: "Um dia, pequen[child.Custom('ES_InIna')], você dará continuidade ao meu legado. Como chamar um[child.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip]?"
 birth.1001.other_gender_heir.desc: "Um dia, pequen[child.Custom('ES_OA')], você dará continuidade ao meu legado. Que nome seria digno de um[child.Custom('ES_XA')] poderos[child.Custom('ES_OA')] [child.Custom('ES_SennorSennora')]?"
 birth.1001.end_fallback.desc: "Quem você se tornará, meu filho, e como devo chamá-lo?"
 birth.1001.twins_heir.desc: "Meus queridos filhos. Um de vocês crescerá para dar continuidade ao meu legado, e o outro sempre ficará em sua sombra. Espero que vocês se amem, aconteça o que acontecer."
 birth.1001.twins.desc: "Quem vocês se tornarão, meus queridos, e como devo chamá-los?"
 birth.1001.taltos.desc: "Meu/minha [child.Custom('GetDaughterSon')] nasceu com [child.Custom('GetBirthOmen')], o que [child.Custom('ES_LoLa')] marca claramente como [child.Custom('GetTaltosTerm')], escolhid[child.Custom('ES_OA')] por [child.GetFaith.PantheonTerm] para servir a um chamado específico. Embora eu ainda não saiba qual é esse chamado, devo dar a meu/minha filh[child.Custom('ES_OA')] o nome mais adequado."
 birth.1001.taltos_unfaithful.desc: "Meu/minha [child.Custom('GetDaughterSon')] tem [child.Custom('GetBirthOmen')], algo que os [child.Custom('DefaultPriestTitlePlural')] [child.GetFaith.GetAdjective]s afirmam que [child.Custom('ES_LoLa')] marca para algo especial. Não entendo, mas ainda preciso dar um nome a meu/minha [child.Custom('GetDaughterSon')]..."
 birth.1001.desc: "Dei à luz um[child.Custom('ES_XA')] [child.Custom('GetDaughterSon')] lind[child.Custom('ES_OA')]!"
 birth.1001.desc.twin: "Eu dei à luz a lindos gêmeos!"
 birth.1001.desc.twin_dead_father: "Dei à luz [child.Custom('TwinDaughtersSonsChildren')] lind[child.Custom('ES_OA')]s! [father.GetFirstName] [child.Custom('ES_LoLa')]s teria adorado..."
 birth.1001.desc_dead_father: "Dei à luz um[child.Custom('ES_XA')] [child.Custom('GetDaughterSon')] lind[child.Custom('ES_OA')]! [father.GetFirstName] [child.Custom('ES_LoLa')] teria adorado..."
 birth.1001.a: "Que você cresça forte e sábio[child.Custom('ES_OA')]; [child.Custom('GetDaughterSon')] meu[child.Custom('ES_OA')]."
 birth.1001.b: "Tomara que vocês cresçam fortes e sábios, meus gêmeos."
 birth.1002.opening: "Dei à luz a um[child.Custom('ES_XA')] [child.Custom('GetDaughterSon')] lind[child.Custom('ES_OA')]. Ele vem a este mundo felizmente alheio ao segredo que devo guardar."
 birth.1002.opening.twin: "Dei à luz a lindos gêmeos. Eles chegam a este mundo felizmente alheios ao segredo que devo guardar."
 birth.1002.true_father: "Temo o que aconteceria se alguém descobrisse que [real_father.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] é o verdadeiro pai."
 birth.1002.unmarried: "que o pai dela é, na verdade, [real_father.GetFullName]."
 birth.1002.unmarried.twin: "que o pai deles é, na verdade, [real_father.GetFullName]."
 birth.1002.girl_name.desc: "\n\nOh, minha pequena, qual será o seu nome?"
 birth.1002.boy_name.desc: "\n\nUma parte de mim quer nomear meu filho em homenagem a [real_father.GetFirstNameNoTooltip], mas receio que isso não seja prudente..."
 birth.1002.twin_name.desc: "\n\nOh, meus filhos, como devo nomeá-los?"
 birth.1002.a: "Ora, ora, [child.Custom('GetDaughterSon')] meu[child.Custom('ES_OA')]."
 birth.1002.b: "Calma, calma, [child.Custom('TwinDaughtersSonsChildren')] meu[child.Custom('ES_OsAs')]."
 birth.1002.a.tt: "O mundo em geral desconhece a verdadeira paternidade de"
 birth.1002.b.tt: "O mundo em geral não tem conhecimento da verdadeira paternidade deles."
 birth.1002.c: "Fico pensando onde [real_father.GetFirstNameNoTooltip] está neste momento..."
 birth.1003.loves_mother.desc: "Oh, [mother.GetFirstName], você foi tão corajosa! Tão forte! Palavras não podem descrever meu amor por você, e agora temos"
 birth.1003.likes_mother.desc: "Com um sorriso cansado, porém cheio de felicidade, [mother.GetFirstName] me apresenta"
 birth.1003.dislikes_mother.desc: "Louvado seja [ROOT.Char.GetFaith.FertilityGodName], [mother.GetFirstNameNoTooltip] deu à luz"
 birth.1003.sondaughter.desc: "noss[child.Custom('ES_OA')] [child.Custom('GetDaughterSon')] perfeit[child.Custom('ES_OA')]!\n\n"
 birth.1003.daughters.desc: "duas lindas meninas perfeitas!\n\n"
 birth.1003.sons.desc: "dois lindos meninos perfeitos!\n\n"
 birth.1003.children.desc: "dois lindos filhos perfeitos!\n\n"
 birth.1003.a: "Que você cresça forte e sábio[child.Custom('ES_OA')]; [child.Custom('GetDaughterSon')] meu[child.Custom('ES_OA')]."
 birth.1003.b: "Que você cresça forte e sábio!"
 birth.1005.t: "Sem pai"
 birth.1005.desc.twin: "Meus lindos filhos estão descansando, alheios à vida desafiadora em que nasceram. O mundo não sabe quem é o pai deles, e eles talvez nunca venham a saber."
 birth.1005.desc: "Minha lind[child.Custom('ES_OA')] [child.Custom('GetDaughterSon')] descansa, sem saber na vida tão desafiadora em que nasceu. O mundo não sabe quem é seu pai, e talvez [child.Custom('ES_ElElla')] nunca chegue a saber."
 birth.1005.a: "É o fardo que devemos carregar."
 birth.1006.t: "Nascido Bastardo"
 birth.1006.opening: "Não há mais nenhuma dúvida em minha mente. [mother.Custom2('MyCharacterIntroduction', ROOT.Char)|U] deu à luz"
 birth.1006.desc.twin: "gêmeos, e ambos sabemos que eu sou o pai deles."
 birth.1006.desc: "um[child.Custom('ES_XA')] [child.Custom('GetDaughterSon')], e nós dois sabemos que eu sou o pai dela."
 birth.1006.not_known: "\n\nFelizmente, [spouse_of_mother.Custom2('HerHisCharacterIntroduction', SCOPE.sC('mother'))] acredita ser o pai."
 birth.1006.unmarried: "\n\nFelizmente, [mother.GetFirstNameNoTooltip] manteve segredo sobre mim, e mais ninguém sabe a verdade, pelo menos por enquanto..."
 birth.1006.a: "Devo ter muito cuidado com isso."
 birth.1006.a.tt: "Mantenha o segredo para você"
 birth.1006.a.message_desc: "O Verdadeiro Pai Sabe"
 birth.1006.a.mother_message: "[real_father.GetTitledFirstName] descobriu que é o verdadeiro pai"
 birth.1006.b: "O mundo saberá disso!"
 birth.1006.bastard_explanation: "Você soube do nascimento de [child.GetFirstName], a mãe, [mother.GetShortUIName], ganha o Segredo [secret.GetName]"
 birth.1010.t: "Vástago do meu sangue"
 birth.1010.t_twins: "Vástagos do meu sangue"
 birth.1010.desc.twin: "[mother.Custom2('MyCharacterIntroduction', ROOT.Char)|U] deu à luz 2 [child.Custom('TwinDaughtersSonsChildren')]!\n\nComo os pequenos fazem parte da dinastia [ROOT.Char.GetDynasty.GetName], eles devem ser abençoados com bons nomes."
 birth.1010.desc: "[mother.Custom2('MyCharacterIntroduction', ROOT.Char)|U] deu à luz a um[child.Custom('ES_XA')] [child.Custom('GetDaughterSon')]!\n\nComo esta criaturinha é fruto da árvore [ROOT.Char.GetDynasty.GetName], deve receber um nome digno de seu legado."
 birth.1100.title: "Nascimento de [child.Custom('GetTaltosTerm')]"
 birth.1100.message: "Os [child.Custom('DefaultPriestTitlePlural')] identificaram [child.Custom2('MyCharacterIntroduction', ROOT.Char)] como [child.Custom('GetTaltosTerm')].\n\nEscolhid[child.Custom('ES_OA')] por [child.GetFaith.PantheonTerm] para um propósito misterioso, o que o futuro reservará para esta criança?"
 known_bastard_birth_event_tooltip: "[child.GetFirstNameNoTooltip] será [Concept( 'bastard', 'bastard' )|lE][child.Custom('ES_OA')] da Casa [child.GetHouse.GetBaseName]"
 legitimized_known_bastard_birth_event_tooltip: "[child.GetFirstNameNoTooltip] será um[child.Custom('ES_XA')] [Concept( 'legitimized_bastard', 'bastard' )|lE][child.Custom('ES_OA')] legitimad[child.Custom('ES_OA')] da Casa [child.GetHouse.GetBaseName]"
 birth.2001.t: "A Bênção da Ignorância"
 birth.2001.desc.mother.standard: "Meu [child.Custom('GetDaughterSon')] recém-nascid[child.Custom('ES_OA')] dorme tão docemente, abençoado por não conhecer a maldição que recairá sobre [child.Custom('ES_ElElla')] durante o resto de sua vida. Ser bastardo não é algo fácil neste mundo, nem é ser a mãe de um[child.Custom('ES_OA')] neste mundo, nem é ser a mãe de um[child.Custom('ES_OA')].\n\nEnquanto meu bebê dorme, continuo desperta pela decisão que devo tomar."
 birth.2001.desc.mother.twins: "Meus recém-nascidos dormem tranquilamente, abençoados por não conhecer a maldição que recairá sobre eles pelo resto de suas vidas. Não é fácil ser bastardo neste mundo, nem ser a mãe de um.\n\nMesmo enquanto meus bebês dormem, permaneço desperta por causa da decisão que devo tomar."
 birth.2001.desc.father.standard: "[mother.GetTitledFirstName] deu à luz a noss[child.Custom('ES_OA')] [child.Custom('GetDaughterSon')] fora do casamento, e embora eu saiba que deveria estar contente, meu coração está abatido por dúvidas e medo.\n\nSuspeito que será assim até que eu tome uma decisão."
 birth.2001.desc.father.twins: "[mother.GetTitledFirstName] deu à luz aos nossos[child.Custom('ES_OA')] bebês fora do casamento, e embora eu saiba que deveria estar contente, meu coração está tomado por dúvidas e medo.\n\nSuspeito que será assim até eu tomar minha decisão."
 birth.2001.a.standard: "![child.Custom('ES_LoLa')|U] legitimarei como meu[child.Custom('ES_OA')]!"
 birth.2001.a.twins: "Vou legitimá-los!"
 birth.2001.b.standard: "Não posso desonrar minha família legitimando um[child.Custom('ES_XA')] bastard[child.Custom('ES_OA')]..."
 birth.2001.b.no_legitimization_in_faith: "Condenado a uma vida de bastardia…"
 bastard_remains_bastard_tt: "[child.GetShortUIName] continuará sendo um[child.Custom('ES_XA')] [Concept( 'bastard', 'bastard' )|lE][child.Custom('ES_OA')] sem reconhecimento"
 birth.2002.t: "Duplamente Abençoado"
 birth.2002.start: "Este é verdadeiramente um dia digno de celebração!"
 birth.2002.desc.standard: "Não só fui abençoado com um[child.Custom('ES_OA')] [child.Custom('GetDaughterSon')] recém-nascid[child.Custom('ES_OA')], mas seu [legitimizer.GetMotherFather], [legitimizer.GetTitledFirstName|l], decidiu legitimar[child.Custom('ES_LoLa')]!"
 birth.2002.desc.twins: "Não apenas fui abençoado com gêmeos recém-nascidos — seu [legitimizer.GetMotherFather] , [legitimizer.GetTitledFirstName|l] decidiu legitimá-los!"
 birth.2002.end: "\n\nOs últimos meses têm sido repletos de dúvidas e medo, mas hoje meu coração está leve como uma pena."
 birth.2002.a: "O futuro ainda guarda esperança."
 birth.2003.t: "Um Começo Difícil"
 birth.2003.desc.standard_start: "Gostaria de poder celebrar o nascimento de noss[child.Custom('ES_OA')] [child.Custom('GetDaughterSon')], mas [legitimizer.GetTitledFirstName|l] deixou claro que esse bebê não será considerad[child.Custom('ES_OA')] verdadeir[child.Custom('ES_OA')] membro de sua casa."
 birth.2003.desc.twin_start: "Eu gostaria de poder celebrar o nascimento de nossos filhos, mas [legitimizer.GetTitledFirstName|l] deixou claro que os bebês não serão verdadeiros membros da sua casa."
 birth.2003.desc.landed_end: "\n\nA marca da bastardia nunca desaparece por completo, embora o reconhecimento de um[legitimizer.Custom('ES_XA')] [legitimizer.GetTitleTierName] teria ajudado…"
 birth.2003.desc.unlanded_end: "\n\nA marca da bastardia nunca sai completamente, embora o reconhecimento de um[legitimizer.Custom('ES_OA')] [legitimizer.Custom('ES_SennorSennora')] teria ajudado…"
 birth.2003.a: "Ah, se as coisas fossem diferentes, pequen[child.Custom('ES_OA')] [child.GetFirstNameNoTooltip]!"
 birth.2004.t: "Uma mercê de [secondary_legitimizer.GetMotherFather]"
 birth.2004.desc.standard: "Pelo visto, no fim das contas, meu [child.Custom('GetDaughterSon')] recém-nascid[child.Custom('ES_OA')] pode ter um grande futuro pela frente. Seu [secondary_legitimizer.GetMotherFather]. [secondary_legitimizer.GetTitledFirstName|l] foi acolhido na casa [secondary_legitimizer.GetDynastyName]."
 birth.2004.desc.twins: "Pelo que parece, afinal, meus recém-nascidos podem ter um bom futuro pela frente. Seu [secondary_legitimizer.GetMotherFather]. [secondary_legitimizer.GetTitledFirstName|l] os recebeu na casa [secondary_legitimizer.GetDynastyName]."
 birth.2004.a.standard: "Faça com que tenham orgulho de você, [child.Custom('GetDaughterSon')] meu[child.Custom('ES_OA')]."
 birth.2004.a.twins: "Orgulhem-se, meus filhos."
 birth.2011.t: "Meu [child.Custom('GetDaughterSon')]"
 birth.2011.desc: "Embora gerad[child.Custom('ES_OA')]fora dos laços do matrimônio, meu [child.Custom('GetDaughterSon')] recém-nascid[child.Custom('ES_OA')] conseguiu chegar san[child.Custom('ES_OA')] e salv[child.Custom('ES_OA')] a este mundo.\n\nNasceu na casa [legitimizer.GetHouse.GetBaseName], e é assim que será criad[child.Custom('ES_OA')]."
 birth.2102.t: "A semente de [real_father.GetTitledFirstNameNoTooltip|U]"
 birth.2102.desc: "Minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('mother'))], [mother.GetTitledFirstName|l], deu à luz a uma criança gerada por outro homem. Agora está amamentando [child.Custom('ES_AlAla')] [child.Custom('GetDaughterSon')] de [real_father.GetTitledFirstName|l]. Chamam [child.GetFirstName]."
 birth.2102.desc.twin: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('mother'))]. [mother.GetTitledFirstName|l], deu à luz a dois [child.Custom('TwinDaughtersSonsChildren')] de [real_father.GetTitledFirstName|l]. Eles se chamam [child.GetFirstName] e [child_2.GetFirstName]."
 birth.2102.a: "O que devo fazer com isso?"
 birth.2104.t: "Uma Criança Estranha"
 birth.2104.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('real_father'))], [real_father.GetTitledFirstName|l], gerou uma criança com a [mother.GetTitledFirstName|l]. Agora, [mother.GetFirstName] está amamentando a prole do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('real_father'))]."
 birth.2104.desc.twin: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('real_father'))], [real_father.GetTitledFirstName|l], gerou filhos com a [mother.GetTitledFirstName|l]. Agora, [mother.GetFirstName] está amamentando a prole do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('real_father'))]."
 birth.2104.a: "O que devo fazer com isso?"
 every_child_adult_non_bastard: "Todos os meus filhos adultos não bastardos"
 birth.3001.t: "Acolhido pela Morte"
 birth.3001.desc_other_child: "«Só mais um esforço, [ROOT.Char.Custom('FormOfAddressForLiege')]! O bebê já está quase chegando!». Um grito escapa dos meus lábios enquanto faço força pela última vez. A dor está por toda parte, é demais, me domina... e então, acaba. Eu... eu consegui.\n\n«Ele/ela está bem?». Mal reconheço a minha própria voz. «É... É um[dummy_gender.Custom('ES_XA')] [dummy_gender.Custom('GirlBoy')]?».\n\nA parteira não me responde, nem sequer olha para mim. Não, ela só tem olhos para o bebê imóvel em seus braços."
 birth.3001.a: "Não está… Por que não está respirando?! #EMP Haced algo!#!"
 birth.3001.a.tt: "@death_icon! Seu [dummy_gender.Custom('DaughterSon')] nasceu morto"
 birth.3002.desc: "Quando a [ROOT.Char.Custom('GetDoor')] da [ROOT.Char.Custom('GetChamber')] de partos se abre, não me recebem parteiras sorridentes e um bebê chorando, mas os lamentos dilacerantes [mother.Custom('ES_DelDela')] [mother.GetTitledFirstName|l].\n\n"Sinto muito, [ROOT.Char.Custom('FormOfAddressForLiege')]." A parteira não me olha nos olhos. Em seus braços há um pequeno embrulho coberto. "Voss[dummy_gender.Custom('ES_OA')] [dummy_gender.Custom('DaughterSon')]... agora está em [ROOT.Char.GetFaith.PositiveAfterLife].""
 birth.3002.a: "Meu [dummy_gender.Custom('DaughterSon')]? Em… em [ROOT.Char.GetFaith.PositiveAfterLife]?"
 birth.3011.desc_twin: "Os gêmeos são perfeitos. Seus rostinhos, seu cheiro... Quero que este momento dure para sempre, mas a parteira só me deixa segurá-los por alguns instantes. Tento protestar quando ela os tira de mim, mas meus braços estão fracos e eu me esforço para encontrar as palavras.\n\n"Não se assuste, meu [ROOT.Char.GetTitleAsNameNoTooltip|l]. Voss[child.Custom('ES_OA')]s [child.Custom('TwinDaughtersSonsChildren')] são fortes e san[child.Custom('ES_OA')]s. Agora a preocupação é com você."\n\n"
 birth.3011.desc: "Meu [child.Custom('DaughterSon')] está perfeito[child.Custom('ES_OA')]Meu rostinho, o jeito de ele cheirar… Quero ficar neste momento para sempre, mas a parteira só me deixa segurar[child.Custom('ES_OA')] por alguns instantes. Tento protestar quando ela o[child.Custom('ES_LoLa')] tira de mim, mas meus braços estão fracos e eu me esforço para encontrar as palavras.\n\n“Não se preocupem, meu [ROOT.Char.GetTitleAsNameNoTooltip|l]. Seu[child.Custom('ES_OA')] [child.Custom('DaughterSon')] é forte e saudáv[child.Custom('ES_OA')]. Agora a preocupação é com você”.\n\n"
 birth.3011.adventurer: "Enquanto caio de volta na minha cama, o mundo escurece..."
 birth.3011.landed: "Enquanto minhas criadas correm freneticamente para lá e para cá, o mundo escurece..."
 birth.3011.twin.a: "Por favor... Os nomes deles..."
 birth.3011.a: "Por favor… o nome…"
 birth.3012.start.desc: "Quando a parteira finalmente sai da [ROOT.Char.Custom('GetChamber')] de partos com um embrulho que chora baixinho nos braços, o alívio me invade.\n\nEntão vejo a expressão em seu rosto.\n\n\"Sinto muito, [ROOT.Char.Custom('FormOfAddressForLiege')]. [mother.GetLadyLord|U] [mother.GetFirstNameNoTooltip]...\". As palavras lhe faltam, mas o tom de sua voz diz tudo.\n\nUma vida foi extinguida, mas"
 birth.3012.desc_twin: "duas novas vidas acabaram de começar. Devo ser forte por meus [child.Custom('TwinDaughtersSonsChildren')]."
 birth.3012.desc: "uma nova vida acaba de começar. Preciso ser forte por meu [child.Custom('DaughterSon')]."
 birth.3012.a: "Inícios tão trágicos..."
 birth.3021.desc: "Minha respiração ofegante é o único som que corta o silêncio na [ROOT.Char.Custom('GetChamber')] de parto. Procuro na sala sorrisos encorajadores, qualquer coisa que me ajude a suportar a dor. Tudo o que vejo é o meu próprio medo refletido em mim.\n\nQuando enfim o bebê chega, o choro tão aguardado está ausente. "Por que ele(a) não está chorando?". As palavras pesam na minha boca. Tudo pesa.\n\nForço meus lábios a formarem as palavras de novo."
 birth.3021.a: "Por que… está…?"
 birth.3022.desc: "Enquanto espero do lado de fora da [ROOT.Char.Custom('GetChamber')] de parto, cada minuto parece uma eternidade. Os gritos de [mother.GetFirstName] cessaram, e nenhum choro de bebê os substitui. Algo está errado... sinto isso nos ossos.\n\nA [ROOT.Char.Custom('GetDoor')] se abre. A expressão desolada da parteira confirma todos os meus medos.\n\n"Sinto muito, [ROOT.Char.Custom('FormOfAddressForLiege')]. [mother.GetLadyLord|U] [mother.GetFirstNameNoTooltip]... Voss[dummy_gender.Custom('ES_OA')] [dummy_gender.Custom('DaughterSon')]... Agora ambos estão em [ROOT.Char.GetFaith.PositiveAfterLife].""
 birth.3022.a: "Por que? [ROOT.Char.GetFaith.HighGodName|U], o que fiz para merecer isto?"
 birth.3022.a.buddhism: "O que fizemos para merecer isso?!"
 birth.3031.t: "Aconchegado pela Doença"
 birth.3031.start.desc: "Todos os bebês choram, mas com meu pequen[child.Custom('ES_OA')] [child.GetFirstName] as lágrimas não param. Quero desesperadamente que a parteira alivie minhas preocupações, mas sua testa franzida piora tudo.\n\n"
 birth.3031.princessprince.desc: ""Pequen[child.Custom('ES_OA')] [child.GetLadyLord]"
 birth.3031.daughterson.desc: "\" [child.Custom('DaughterSon')]"
 birth.3031.end.desc: "não está ganhando o peso que deveria. Cuidaremos bem de [child.Custom('ES_ElElla')], [ROOT.Char.Custom('FormOfAddressForLiege')], mas, no final, sua vida está nas mãos de [ROOT.Char.GetFaith.FateGodNamePossessive]."
 birth.3031.a: "Cale-se agora, [child.GetFirstNameNoTooltip]! Por favor, não chore!"
 birth.3034.t: "Crescendo Forte"
 birth.3034.desc: "A maioria das outras crianças é mais forte do que eu. Quando brincamos, eu tenho que sentar e descansar muito. Mas hoje, quando estávamos correndo para os estábulos, eu ganhei!"
 birth.3034.a: "Onde está meu [ROOT.Char.Custom('child_favorite_toy')]? Vamos brincar!"
 birth.3035.desc: "A fraqueza que tem atormentado meu [child.Custom('GetDaughterSon')] desde que nasceu finalmente soltou suas garras sobre [child.Custom('ES_ElElla')]! Um alívio me invade ao ver [child.GetFirstName] correndo com as outras crianças."
 birth.3035.a: "Que você cresça forte, [child.GetFirstNameNoTooltip]."
 birth.3041.t: "Cansada"
 birth.3041.start.desc: "Já se passaram algumas semanas desde que dei à luz a"
 birth.3041.desc_twins: "[child.Custom('TwinDaughtersSonsChildren')],"
 birth.3041.one_child.desc: "meu pequen[child.Custom('ES_OA')] [child.GetFirstNameNoTooltip],"
 birth.3041.end: "mas ainda estou presa à cama. À medida que os dias passam sem muita melhora, minha alegria é consumida por um cansaço terrível."
 birth.3041.a: "Não deveria minha força estar retornando agora?"
 birth.9002.t: "O Que Há em Um Nome?"
 birth.9002.start.desc: "Com o bebê embalado em seus braços,"
 birth.9002.worrying.desc: "[suggester.GetTitledFirstName] olha para mim com um brilho preocupante nos olhos."
 birth.9002.tears.desc: "[suggester.GetTitledFirstName] enxuga as lágrimas das bochechas e me dirige a palavra, sem tirar os olhos de noss[child.Custom('ES_OA')] [child.Custom('GetDaughterSon')]."
 birth.9002.pride.desc: "[suggester.GetTitledFirstName] olha para mim, cabeça erguida e olhos brilhando de orgulho."
 birth.9002.conviction.desc: "[suggester.GetTitledFirstName] olha para mim, os olhos brilhando com uma convicção ardente."
 birth.9002.surprisingly_calm.desc: "[suggester.GetTitledFirstName] olha para mim, seu rosto surpreendentemente sereno."
 birth.9002.calm.desc: "[suggester.GetTitledFirstName] olha para mim, seu rosto sereno."
 birth.9002.devotion.desc: "a mirada de [suggester.GetTitledFirstName|l] encontra a minha. Seus olhos estão cheios de devoção amorosa."
 newline.desc: "\n\n"
 birth.9002.love.desc: "\"Meu amor,"
 birth.9002.dear_spouse.desc: "[ROOT.Char.GetWifeHusband|U] querid[ROOT.Char.Custom('ES_OA')],"
 birth.9002.spouse.desc: "\"[ROOT.Char.GetWifeHusband|U],"
 birth.9002.suggester_relative.desc: "Será que podemos chamar [child.Custom('ES_LoLa')] [namesake.GetFirstNameNoTooltip] em homenagem ao meu [namesake.Custom('ComplimentAdjective')] [suggester.Custom2('RelationToMeShort', SCOPE.sC('namesake'))]?"
 birth.9002.namer_relative.desc: "e se [child.Custom('ES_LoLa')] chamarmos [namesake.GetFirstNameNoTooltip]? Por seu [namesake.Custom('ComplimentAdjective')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('namesake'))]?\""
 birth.9002.suggesters_name.desc: "Acho que deveríamos chamar[child.Custom('ES_LoLa')] [suggester.GetFirstNameNoTooltip] em minha homenagem. O que você acha?""
 birth.9002.namers_name.desc: "vamos chamar[child.Custom('ES_LoLa')] [ROOT.Char.GetFirstNameNoTooltip], em sua homenagem."
 birth.9002.nice_name.desc: "Tenho pensado nisso. Quero que [child.Custom('ES_LoLa')] a chamemos [namesake.GetFirstNameNoTooltip]. Sempre gostei desse nome.""
 birth.9002.religious_god.desc: "deveríamos chamar[child.Custom('ES_LoLa')] [SCOPE.GetFlagName('name_suggestion')], em homenagem ao grande deus!""
 birth.9002.religious_godess.desc: "deveríamos chamar[child.Custom('ES_LoLa')] [SCOPE.GetFlagName('name_suggestion')], em honra à grande Deusa!"
 birth.9002.religious_apostle.desc: "deveríamos chamar[child.Custom('ES_LoLa')] [SCOPE.GetFlagName('name_suggestion')], em homenagem ao piedoso apóstolo"."
 birth.9002.religious_holy_virgin.desc: "deveríamos chamar[child.Custom('ES_LoLa')] [SCOPE.GetFlagName('name_suggestion')], em homenagem à Santa Virgem"."
 birth.9002.religious_fallback.desc: "deveríamos chamar[child.Custom('ES_LoLa')], tão glorios[child.Custom('ES_OA')] [SCOPE.GetFlagName('name_suggestion')]!\""
 birth.9002.lunatic.desc: "Tenho uma ideia genial! Deveríamos chamar[child.Custom('ES_LoLa')] [SCOPE.GetFlagName('name_suggestion')]! Acaso não parece um[child.Custom('ES_XA')] pequen[child.Custom('ES_OA')] [SCOPE.GetFlagName('name_suggestion')]?""
 birth.9002.creator.desc: "vamos nomear nosso bebê de [SCOPE.GetFlagName('name_suggestion')], em honra ao nosso Criador!"
 birth.9002.possessed.desc: "Senti a presença dela. Exige que chamemos nossa[child.Custom('ES_OA')] [child.Custom('DaughterSon')] [SCOPE.GetFlagName('name_suggestion')]"."
 birth.9002.a1: "Uma ideia encantadora. [namesake.GetFirstNameNoTooltip], será."
 birth.9002.a2: "Uma ideia encantadora. [SCOPE.GetFlagName('name_suggestion')], será."
 birth.9002.a.tt.1: "Chamamos noss[namesake.Custom('ES_OA')] filh[namesake.Custom('ES_OA')] [namesake.GetFirstNameNoTooltip]"
 birth.9002.a.tt.2: "Chamamos noss[namesake.Custom('ES_OA')] filh[namesake.Custom('ES_OA')] [SCOPE.GetFlagName('name_suggestion')]"
 birth.9002.a.rename: "[SCOPE.GetFlagName('name_suggestion')]"
 birth.9002.b1: "Na verdade, eu tinha outra coisa em mente..."
 birth.9002.b2: "O quê?! Isso é uma ideia terrível!"
 birth.9002.b.tt: "Você lhe dará um nome muito mais adequado"
 birth.9003.desc: "Tomo com cuidado o bebê dos braços de [suggester.GetTitledFirstName|l] e olho em seus olhinhos perfeitos. Quem você vai se tornar?"
 birth.9003.a: "Muito melhor."
 birth.9004.t: "O que há em um nome?"
 birth.9004.desc.me: "[ROOT.Char.GetFirstNameNoTooltip].\n\nUm nome tão sem graça que às vezes me pergunto o que os historiadores do futuro acharão dele.\n\nNo entanto, sou um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip], e se eu quiser ser chamado de outro jeito, só preciso deixar o mundo saber, não?"
 birth.9004.desc: "[child.GetFirstNameNoTooltip].\n\nNo início eu gostava do nome, mas agora ele me soa estranho. O que [child.GetSheHe] pensará de seu nome quando crescer?\n\nSerá que eu deveria mudá-lo por algo melhor?"
 birth.9004.a: "Ah, um nome #EMP muito#! melhor!"
 birth.9004.b: "Pensando bem, acho que [ROOT.Char.GetFirstNameNoTooltip] está bom..."
 birth.9004.b.other: "Na verdade, [child.GetFirstNameNoTooltip] é muito bom, afinal..."
 birth.9004.b.tt: "Você mantém seu antigo nome"
 birth.9004.b.tt.other: "[child.GetFirstNameNoTooltip] mantém seu antigo nome"
