l_spanish:
 faith_creation.1001.t.schism: "O cisma [reformed_faith.GetAdherentNameNoTooltip]"
 faith_creation.1001.t.reformation: "A Reforma do [reformed_faith.GetAdjectiveNoTooltip]"
 faith_creation.1001.desc.schism: "Um novo cisma dentro da [reformed_faith.GetReligion.GetName|l] ocorreu quando [reformer.GetTitledFirstName|l] e seus seguidores se separaram da antiga fé [old_faith.GetAdjective] para formar um novo movimento religioso."
 faith_creation.1001.desc.reformation: "[reformer.GetTitledFirstName], uma figura proeminente entre os [reformed_faith.GetAdherentNamePlural], reuniu todos os [reformer.Custom('DefaultPriestTitle')] da terra para discutir suas crenças e estabelecer uma doutrina oficial para a fé pagã."
 faith_creation.1001.desc.schism.personal: "Os [old_faith.AltPriestTermPlural] da [old_faith.GetAdjective] perderam o rumo e não podem mais ser confiáveis para nos guiar. Para remediar isso, reuni um grupo seleto de [reformer.Custom('DefaultPriestTitlePlural')] para discutir o futuro de nossa fé."
 faith_creation.1001.desc.reformation.personal: "Finalmente consegui reunir todos os [reformer.Custom('DefaultPriestTitlePlural')] mais importantes do mundo para que debatam nossas crenças e estabeleçam uma doutrina oficial que guie o futuro da nossa fé."
 #Pick one line from this set (Outlook):
 faith_creation.1001.desc.outlook.ghw: "\n\nOs [reformer.Custom('DefaultPriestTitlePlural')] fervorosos já estão falando em lançar [reformed_faith.GHWNamePlural] para espalhar sua nova fé pelo mundo inteiro e"
 faith_creation.1001.desc.outlook.pacifism: "\n\nEstes [reformer.Custom('DefaultPriestTitlePlural')] da fé [reformed_faith.GetAdjectiveNoTooltip] condenaram a violência e o derramamento de sangue, dizendo que a guerra só leva ao sofrimento e ao ódio, e"
 faith_creation.1001.desc.outlook.dogmatic: "\n\nEstes [reformer.Custom('DefaultPriestTitlePlural')] proclamaram que a fé [reformed_faith.GetAdjectiveNoTooltip] é a única verdadeira, e"
 faith_creation.1001.desc.outlook.accepting: "\n\nEstes [reformer.Custom('DefaultPriestTitlePlural')] da fé [reformed_faith.GetAdjectiveNoTooltip] têm incentivado a cooperação e a tolerância, até mesmo com os não crentes, e"
 faith_creation.1001.desc.outlook.fallback: "\n\nEstes [reformer.Custom('DefaultPriestTitlePlural')] da fé [reformed_faith.GetAdjectiveNoTooltip] adotaram uma visão pragmática e equilibrada de outras fés e"
 #And one line from this second set (Beliefs):
 faith_creation.1001.desc.belief.sacrifice: "afirmam que a única forma de demonstrar devoção adequada é honrar [reformed_faith.HighGodName] com sacrifícios humanos!"
 faith_creation.1001.desc.belief.indulgent: "estão incentivando os adeptos a se entregarem aos desejos da carne e viverem suas vidas ao máximo."
 faith_creation.1001.desc.belief.incest: "estão sancionando casamentos entre parentes próximos, afirmando que os laços familiares são sagrados e abençoados."
 faith_creation.1001.desc.belief.aniconism: "rejeitam o uso de qualquer simbolismo religioso, afirmando que meras efígies não podem capturar a grandeza de [reformed_faith.HighGodName]."
 faith_creation.1001.desc.belief.ascetic: "estão promovendo o ascetismo entre seus seguidores, afirmando que as buscas materialistas bloqueiam o caminho para a realização espiritual."
 faith_creation.1001.desc.belief.spirits: "solicitaram a ajuda dos espíritos para orientar os fiéis nestes tempos turbulentos."
 faith_creation.1001.desc.belief.superstition: "muitas superstições antigas e histórias míticas foram canonizadas na doutrina oficial."
 faith_creation.1001.desc.belief.nature: "têm grande respeito pela própria natureza, buscando preservá-la e protegê-la daqueles que a explorariam para seu próprio ganho."
 faith_creation.1001.desc.belief.community: "a nova fé fundiu-se com as tradições culturais de seus adeptos, formando comunidades próximas de [reformed_faith.GetAdherentNamePluralNoTooltip] que hesitam em aceitar estranhos."
 faith_creation.1001.desc.belief.fallback: "estão pedindo a todos os adeptos que deixem de lado antigas disputas e se unam em prol da nova fé."
 #End with a reference to
 faith_creation.1001.desc.temporal: "\n\n[reformer.GetFirstNameNoTooltip] escolheu liderar pessoalmente este movimento em crescimento da fé [reformed_faith.GetAdjectiveNoTooltip] e assumir o título de [reformed_faith.ReligiousHeadName], um cargo exaltado que, ao que parece, passará para seu herdeiro."
 faith_creation.1001.desc.temporal.personal: "\n\nEscolhi liderar pessoalmente este movimento florescente da fé [reformed_faith.GetAdjectiveNoTooltip] e assumir o título de [reformed_faith.ReligiousHeadName] uma posição exaltada que passarei aos meus descendentes."
 faith_creation.1001.desc.spiritual: "\n\nOs [reformer.Custom('DefaultPriestTitlePlural')] da fé [reformed_faith.GetAdjectiveNoTooltip] escolheram [reformed_hof.GetFirstNameNoTooltip] como seu novo [reformed_faith.ReligiousHeadName]. Será quem definirá a doutrina religiosa e arbitrará as disputas dentro da fé [reformed_faith.GetAdjectiveNoTooltip]."
 faith_creation.1001.desc.spiritual.sameold: "\n\nOs [reformer.Custom('DefaultPriestTitlePlural')] da fé [reformed_faith.GetAdjectiveNoTooltip] escolheram manter [reformed_hof.GetFirstNameNoTooltip] como [reformed_faith.ReligiousHeadName]. Ele continuará definindo a doutrina religiosa e arbitrando as disputas dentro da esfera [reformed_faith.GetAdjectiveNoTooltip]."
 faith_creation.1001.desc.no_head: "\n\nO movimento em crescimento decidiu não instituir uma liderança religiosa, preferindo, em vez disso, deixar que cada [reformer.Custom('DefaultPriestTitle')] decida quais ensinamentos são apropriados para sua [reformed_faith.HouseOfWorship]."
 faith_creation.1001.desc.no_holy_sites: "\n\nos [reformed_faith.GetAdherentNamePluralNoTooltip] aguardam ansiosamente a chegada profetizada de seu [reformed_faith.ReligiousHeadName], um grande líder que reunirá todos os fiéis em torno de si e conduzirá a fé [reformed_faith.GetAdjectiveNoTooltip] a uma nova era de ouro."
 faith_creation.1001.o.frightened: "[ROOT.Char.GetFaith.random_GoodGodNames] nos salve desses [second.Custom('GetUnbelieverNamePlural')] sedentos de sangue!"
 faith_creation.1001.o.heretical: "Esses hereges pagarão pelos crimes cometidos contra [ROOT.Char.GetFaith.HighGodName]!"
 faith_creation.1001.o.crusader: "Uma ou duas [ROOT.Char.GetFaith.GHWName] colocarão esses [second.Custom('GetUnbelieverNamePlural')] em seu lugar!"
 faith_creation.1001.o.interested: "Devemos ficar de olho nesse novo desenvolvimento..."
 faith_creation.1001.o.uninterested: "Não importa no que esses [second.Custom('GetUnbelieverNamePlural')] acreditam."
 faith_creation.1001.o.getreaction: "[ROOT.Char.Custom2('GetFaithCreationReaction', reformer)]"
 faith_creation.1001.o.personal: "O mundo verá que [ROOT.Char.GetFaith.HighGodName] nos favorece!"
 faith_creation.1010.t: "[HoF.GetFirstNameNoTooltip] proclamad[HoF.Custom('ES_OA')] [faith.ReligiousHeadName|U]"
 faith_creation.1010.desc.start: "Embora a retidão de nossa fé nunca estivesse em dúvida, o período em que fomos forçados a suportar a falta de um líder espiritual foi difícil. Finalmente, porém, esse sofrimento acabou, pois"
 faith_creation.1010.desc.temporal.personal: "Finalmente consegui convencer os [faith.AltPriestTermPlural] a me aceitarem como o único [faith.ReligiousHeadName|U]."
 faith_creation.1010.desc.temporal: "[HoF.GetTitledFirstName] conseguiu convencer os [faith.AltPriestTermPlural] de que [HoF.Custom('ES_LoLa')] o aceitem como o únic[HoF.Custom('ES_OA')] e verd[HoF.Custom('ES_OA')] [faith.ReligiousHeadName|U]."
 faith_creation.1010.desc.spiritual: "os [faith.AltPriestTermPlural] se reuniram para eleger [HoF.GetFirstName] como únic[HoF.Custom('ES_OA')] e verdadeir[HoF.Custom('ES_OA')] [faith.ReligiousHeadName|U]."
 faith_creation.1010.desc.end: "\n\nOs fiéis finalmente se uniram sob a liderança de um único líder, e parece que uma nova era de ouro para o [faith.GetNameNoTooltip]."
 faith_creation.1010.desc.end.personal: "\n\nOs fiéis finalmente se uniram em torno de mim, e eu guiarei o [faith.GetNameNoTooltip] para uma nova era de ouro!"
 faith_creation.1010.a: "Glória a [faith.HighGodName]!"
 faith_creation.1011.message.title: "Líder Religioso Estabelecido"
 faith_creation.1011.message.desc: "Os [faith.AltPriestTermPlural] da fé [faith.GetAdjective] proclamaram [HoF.Custom('ES_AlAla')] [faith.ReligiousHeadName] [HoF.GetFirstName] seu nov[HoF.Custom('ES_OA')] [head_of_faith|lE]"
