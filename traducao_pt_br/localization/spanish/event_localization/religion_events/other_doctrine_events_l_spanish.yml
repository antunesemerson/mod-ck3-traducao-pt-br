l_spanish:
 #False conversion events.
 false_conversion.0020.t: "Cripto-[old_faith.GetNameNoTooltip]"
 false_conversion.0020.desc: "Na minha vida pública, sigo [ROOT.Char.GetFaith.GetNameNoTooltip] à risca. Adiro a todos os valores [ROOT.Char.GetFaith.GetAdjectiveNoTooltip] , leio [ROOT.Char.GetFaith.ReligiousText] [ROOT.Char.GetFaith.GetAdjectiveNoTooltip] e vou às [ROOT.Char.GetFaith.HouseOfWorshipPlural] de [ROOT.Char.GetFaith.GetNameNoTooltip].\n\nPorém, a portas fechadas, tenho dificuldade em abandonar os ensinamentos de [old_faith.GetNameNoTooltip] e uma parte de mim anseia por praticar abertamente os antigos costumes.\n\nSerá que este é o momento de reafirmar minha identidade [old_faith.GetAdherentNameNoTooltip], trazendo comigo todos os demais adeptos secretos e recém-convertidos que eu puder?"
 false_conversion.0020.desc_landless: "Até agora, segui à risca o [ROOT.Char.GetFaith.GetNameNoTooltip|l] ao pé da letra. Aderi a todos os valores de [ROOT.Char.GetFaith.GetAdherentName], leio meu [ROOT.Char.GetFaith.ReligiousText] do povo [ROOT.Char.GetFaith.GetAdherentNameNoTooltip] e vou às [ROOT.Char.GetFaith.HouseOfWorshipPlural] de [ROOT.Char.GetFaith.GetNameNoTooltip|l].\n\nMas, a portas fechadas, tenho dificuldade em abandonar os ensinamentos de [old_faith.GetNameNoTooltip|l] e uma parte de mim anseia por voltar aos velhos costumes.\n\nTalvez agora seja o momento de reafirmar minha identidade [old_faith.GetAdjectiveNoTooltip] e consolidá-la em meu [ROOT.Char.Custom('GetCourt')|l]?"
 false_conversion.0020.a: "[old_faith.HighGodName] conhece meu coração!"
 false_conversion.0020.b: "Não, ainda não é o momento certo."
 false_conversion.0020.c: "$false_conversion.0020.a$"
 false_conversion.0030.t: "Anistia para Cripto-Religiosos"
 false_conversion.0030.desc_start: "Chegaram aos meus ouvidos histórias sobre alguns em meu reino que praticam secretamente religiões escondidas, em parte ou completamente.\n\n"
 false_conversion.0030.desc_no_secret_faith: "Embora eu professe o [ROOT.Char.GetFaith.GetName] de forma estrita, minha fé sempre defendeu um ideal de pluralismo, e é uma pena que alguns sintam que devam manter seu culto em segredo por medo de perseguição.\n\n"
 false_conversion.0030.desc_no_secret_faith_not_pluralist: "Alguns desses crentes secretos podem ser [ROOT.Char.GetFaith.GetAdherentNamePlural] e foram forçados a viver nas sombras há muito tempo por causa da perseguição religiosa.\n\n"
 false_conversion.0030.desc_has_secret_faith: "Eu mesmo[ROOT.Char.Custom('ES_OA')] tenho dificuldade em me desapegar de muitos dos rituais e crenças de [old_faith.GetNameNoTooltip]. Embora eu jamais admitisse em público que continuo os venerando, meu coração ainda se compadece da situação desses grupos secretos de cripto-religiosos.\n\n"
 false_conversion.0030.desc_end: "É claro que, como [ROOT.Char.GetTitleAsNameNoTooltip], eu poderia decretar uma anistia pública para todos os falsos convertidos..."
 false_conversion.0030.a: "Todos devem ser livres para adorar o divino!"
 false_conversion.0030.a.tt: "Serei informado quantos, se houver, cripto-religiosos aceitam minha oferta."
 false_conversion.0030.b_no_secret_faith: "Cripto-o quê? Isso é absurdo."
 false_conversion.0030.b_has_secret_faith: "Algumas coisas são melhores mantidas em segredo."
 false_conversion.0031.t: "$false_conversion.0030.t$"
 false_conversion.0031.desc: "Meu senhor, [ROOT.Char.GetLiege.GetTitledFirstName|l] em todo [ROOT.Char.GetLiege.GetPrimaryTitle.GetNameNoTier] para que todos possam adorar o divino abertamente, sem importar a natureza de sua fé. Está oferecendo anistia àqueles que praticam suas religiões em segredo."
 false_conversion.0031.a: "Finalmente, emergimos das sombras!"
 false_conversion.0031.b: "Já ouvimos mentiras de tolerância antes..."
 false_conversion.1000.t: "Um Fim para o [ROOT.Char.GetFaith.GetName|l]"
 false_conversion.1000.desc_intro: "[actor.Custom2('MyCharacterIntroduction', ROOT.Char)|U] finalmente exigiu que eu"
 false_conversion.1000.desc_has_family: "e o restante da minha família"
 false_conversion.1000.desc_convert: "a [actor.GetFaith.GetName|l].\n\n"
 false_conversion.1000.desc_forced: "Estou me vendo contra a parede ao me exigir isso, usando o gancho que tem contra mim. Ainda assim, se eu me arriscar às consequências, posso continuar praticando o [ROOT.Char.GetFaith.GetName|l]"
 false_conversion.1000.desc_voluntary: "Aceitei as exigências dele, mais ou menos. Mas talvez haja uma maneira de pregar o [actor.GetFaith.GetNameNoTooltip|l] abertamente, mas praticar o [ROOT.Char.GetFaith.GetName|l]"
 false_conversion.1000.desc_bold: "em desafio secreto."
 false_conversion.1000.desc_cowardly: "por trás do véu."
 false_conversion.1000.desc_outro: "\n\nEsta é uma decisão ponderada a ser tomada sozinho..."
 false_conversion.1000.a: "Os velhos costumes morrem hoje."
 false_conversion.1000.b_single: "Mantenho [actor.GetFaith.GetNameNoTooltip|l] em meus lábios, mas [ROOT.Char.GetFaith.GetNameNoTooltip|l] em meu coração."
 false_conversion.1000.b_sanctioned_single: "[ROOT.Char.GetFaith.HighGodName] me perdoará por praticar [ROOT.Char.GetFaith.GetName|l] em segredo."
 false_conversion.1000.b_plural: "Mantemos [actor.GetFaith.GetNameNoTooltip|l] em nossos lábios, mas [ROOT.Char.GetFaith.GetNameNoTooltip|l] em nossos corações."
 false_conversion.1000.b_sanctioned_plural: "[ROOT.Char.GetFaith.HighGodName] nos perdoará por praticar [ROOT.Char.GetFaith.GetName|l] em segredo."
 false_conversion.1010.desc_has_no_family: "e [spouse.Custom2('MyCharacterIntroduction', ROOT.Char)]"
 false_conversion.1010.desc_spouse_intro: "[spouse.GetFirstNameNoTooltip] e eu passamos longas noites tentando evitar as exigências [actor.Custom('ES_DelDela')] [actor.GetTitledFirstNameNoTooltip|l], sem sucesso. Por fim, [spouse.GetFirstNameNoTooltip] diz o que pensa:\n\n"
 false_conversion.1010.desc_spouse_advises_secrecy: ""Não podemos abandonar [spouse.GetFaith.HighGodName]. Não importa o que exija [actor.Custom('ES_ElLa')] [actor.GetTitledFirstNameNoTooltip|l]. Devemos continuar adorando [spouse.GetFaith.HighGodName], mesmo que seja em segredo"."
 false_conversion.1010.desc_spouse_advises_conversion_cynical: "«Que prestemos culto a [actor.GetFaith.GetNameNoTooltip|l] ou a [spouse.GetFaith.GetNameNoTooltip|l] me importa muito pouco. Mas se [actor.Custom('ES_ElLa')] [actor.GetTitledFirstNameNoTooltip|l] quer que sigamos o [actor.GetFaith.GetNameNoTooltip|l] , por que não haveríamos de fazê-lo?»."
 false_conversion.1010.desc_spouse_advises_conversion_neutral: ""Embora me doa dizer isso, não podemos nos permitir praticar o [actor.GetFaith.GetNameNoTooltip|l], nem em segredo. Devemos obedecer à vontade de [actor.Custom('ES_DelDela')] [actor.GetTitledFirstNameNoTooltip|l] e nos converter ao [actor.GetFaith.GetNameNoTooltip|l]"."
 false_conversion.1010.desc_outro_demure: "\n\nDevo seguir o conselho do meu"
 false_conversion.1010.desc_spouse_disliked: "[spouse.Custom2('InsultAdjective', ROOT.Char)]"
 false_conversion.1010.desc_spouse_liked: "[spouse.Custom('ComplimentAdjective')]"
 false_conversion.1010.desc_outro_wife_husband: "[spouse.GetWifeHusband]?"
 false_conversion.2000.t: "Um Momento de Fraqueza"
 false_conversion.2000.desc_intro: "Quanto mais tempo passo com [vulnerable_relation.Custom2('MyCharacterIntroduction', owner)], mais a sua avassaladora"
 false_conversion.2000.desc_descriptor_grief: "tristeza"
 false_conversion.2000.desc_descriptor_depression: "depressão"
 false_conversion.2000.desc_descriptor_stress: "estresse"
 false_conversion.2000.desc_bridge: "se torna aparente.\n\n"
 false_conversion.2000.desc_quote_grief: ""Até as coisas mais insignificantes me lembram de [deceased_character.GetFirstName]", lamenta [vulnerable_relation.Custom('ES_ElLa')] [vulnerable_relation.GetTitledFirstNameNoTooltip|l]. "Como posso viver agora neste mundo sem [deceased_character.GetSheHe]?"."
 false_conversion.2000.desc_quote_depression: "“Cada dia está mais difícil do que o anterior”, confidencia-me [vulnerable_relation.Custom('ES_ElLa')] [vulnerable_relation.GetTitledFirstNameNoTooltip|l]. “Como posso continuar assim, com minha vontade de viver se esvaindo lentamente diante dos meus olhos?”."
 false_conversion.2000.desc_quote_stress: ""Os infortúnios diários da vida se tornaram angustiantes para mim", lamenta [vulnerable_relation.Custom('ES_ElLa')] [vulnerable_relation.GetTitledFirstNameNoTooltip|l]. "Rezo diariamente para que eu seja libertado(a) do meu destino inescapável"."
 false_conversion.2000.desc_outro: "\n\nTalvez [owner.GetSecretFaith.HighGodName] possa dar nova vida a esta casca rasa..."
 false_conversion.2000.a: "\"[owner.GetSecretFaith.GetName|l] curará a sua tristeza.\""
 false_conversion.2000.a_flavor: "[vulnerable_relation.Custom('ES_ElLa')|U] [vulnerable_relation.GetTitledFirstNameNoTooltip|l] considerará converter-se secretamente para [owner.GetSecretFaith.GetNameNoTooltip|l]"
 false_conversion.2000.a_success: "[vulnerable_relation.Custom('ES_ElLa')|U] [vulnerable_relation.GetTitledFirstNameNoTooltip|l] encontra consolo no [owner.GetSecretFaith.GetNameNoTooltip|l]"
 false_conversion.2000.a_failure: "[vulnerable_relation.Custom('ES_AlAla')|U] [vulnerable_relation.GetTitledFirstNameNoTooltip|l] se sente insultado pela minha sugestão"
 false_conversion.2000.b: "É errado fazer mais do que consolar [vulnerable_relation.Custom('ES_AlAla')] [vulnerable_relation.GetTitledFirstNameNoTooltip|l]."
 false_conversion.2001.t: "Meu Momento de Necessidade"
 false_conversion.2001.desc_grief: "Não passa um dia sem que eu me lembre de [deceased_character.Custom('ES_AlAla')] [deceased_character.GetTitledFirstName|l]. Cada lembrança de sua vida neste mundo faz jorrar uma nova fonte de tristeza."
 false_conversion.2001.desc_depression: "Os dias se arrastam sem fim com novas alegrias e tristezas de todos ao meu redor. No entanto, aqui permaneço, perdido em um mar de cinzas, afogando-me pelos últimos [vulnerable_relation.GetAge] anos."
 false_conversion.2001.desc_stress: "Desenvolvi hábitos involuntários de tremores. Roí as unhas, rangei os dentes, andei exausto antes de deitar acordado na cama. E ainda assim, me vejo sobrecarregado com um estresse além da minha compreensão."
 false_conversion.2001.desc_outro: "\n\nJustamente quando me pergunto como poderei seguir em frente, [owner.Custom2('RelationToMeAddress', vulnerable_relation)] sussurra em meu ouvido. "Basta abraçar o poder curativo de [owner.GetSecretFaith.GetName|l], [vulnerable_relation.Custom2('RelationToMeAddress', owner)], e suas aflições serão esquecidas"."
 false_conversion.2001.a: "Então, abraçarei [owner.GetSecretFaith.GetNameNoTooltip|l] com todo o meu coração!"
 false_conversion.2001.b: "O que você está insinuando, [owner.GetTitledFirstNameNoTooltip|l]?"
 false_conversion.2001.b_flavor: "[owner.Custom('ES_ElLa')|U] [owner.GetTitledFirstNameNoTooltip|l] não diz mais nada… por enquanto"
 false_conversion.8000.t: "Minha Fé Exposta"
 false_conversion.8000.desc_intro: "[secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] revelou que pratico [ROOT.Char.GetSecretFaith.GetName|l] a portas fechadas!"
 false_conversion.8000.desc_disapproving_chaplain: "[disapproving_chaplain.Custom2('MyCharacterIntroduction', ROOT.Char)|U] está exigindo que eu me arrependa publicamente e me submeta diante de [disapproving_chaplain.GetFaith.HighGodName]."
 false_conversion.8000.desc_silent_chaplain: "[silent_chaplain.Custom2('MyCharacterIntroduction', ROOT.Char)|U] permanece em silêncio sobre o assunto, portanto devo lidar com isso por conta própria[ROOT.Char.Custom('ES_OA')] as exigências de arrependimento."
 false_conversion.8000.desc_outro: ""
 false_conversion.8000.a: "Nunca mais duvidarei de [ROOT.Char.GetFaith.GetNameNoTooltip|l]!"
 false_conversion.8000.b: "[ROOT.Char.GetSecretFaith.GetNameNoTooltip|l] é a única fé verdadeira!"
 event_false_convert_my_vassal.t: "Vassalo Revelou Cripto-Fé"
 event_false_convert_my_liege.t: "Suserano Revelou Cripto-Fé"
 event_false_convert_interface.desc: "[ROOT.Char.GetShortUIName] renunciou à sua fé pública por [ROOT.Char.GetFaith.GetName] e se declarou criptoconvers[ROOT.Char.Custom('ES_OA')]."
 event_false_converts.t: "Cripto-Religiosos Revelados"
 event_false_converts_plus_counties.desc: "[ROOT.Var('num_false_converts_vassal').GetValue|V0] dos meus vassalos titulados renegaram sua fé pública.\n\n[ROOT.Var('num_false_converts_landless').GetValue|V0] personagens sem terras em minha corte renegaram sua fé pública.\n\n[ROOT.Var('num_false_converts_counties').GetValue|V0] dos meus condados continham extensas comunidades criptorreligiosas que tornaram pública sua fé oculta."
 event_false_converts_without_counties.desc: "[ROOT.Var('num_false_converts_vassal').GetValue|V0] dos meus vassalos senhores de terras renegaram sua fé pública.\n\n[ROOT.Var('num_false_converts_landless').GetValue|V0] personagens sem terras na minha corte renegaram sua fé pública."
 event_false_converts_counties_only.desc: "[ROOT.Var('num_false_converts_counties').GetValue|V0] condados em meu domínio continham extensas comunidades de cripto[ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip] e muitos deles declararam sua fé junto com a minha."
 false_convert_modifier: "Suspeitos de Falsos Conversos"
 false_convert_modifier_desc: "Muitas comunidades neste condado são suspeitas de ainda praticarem sua antiga fé em segredo."
 relieved_cryptos_modifier: "Cripto-Religiosos Aliviados"
 relieved_cryptos_modifier_desc: "A população aqui está grata pela permissão para praticar sua fé abertamente mais uma vez."
 #Spreading the crypto-faith events
 convert_to_crypto_religion_key: "Converter para a Fé Secreta de [ROOT.Char.GetSecretFaith.GetNameNoTooltip|l]"
 convert_to_crypto_religion_interaction_key: "Converter para a Fé Secreta de [actor.GetSecretFaith.GetNameNoTooltip|l]"
 convert_to_crypto_religion_interaction: "$convert_to_crypto_religion_interaction_key$ #weak (Esquema)#!"
 convert_to_crypto_religion_interaction_desc: "Tente converter [recipient.GetShortUINameNoTooltip] em um[recipient.Custom('ES_XA')] crente secret[recipient.Custom('ES_OA')] de [actor.GetSecretFaith.GetName]"
 convert_to_crypto_religion: "Converter para a Fé Secreta-#D Religião#!"
 convert_to_crypto_religion_desc: "Farei com que a sabedoria de [SCHEME.GetTargetCharacter.GetShortUINameNoTooltip] seja difundida a [SCHEME.GetOwner.GetSecretFaith.KnowledgeGodName] e [SCHEME.GetTargetCharacter.GetHerHim] o transformarei em um[SCHEME.GetTargetCharacter.Custom('ES_XA')] crente secr[SCHEME.GetTargetCharacter.Custom('ES_OA')] da [SCHEME.GetOwner.GetSecretFaith.GetNameNoTooltip|l]."
 convert_to_crypto_religion_desc_general: "Ensina um alvo a se tornar um crente secreto de [CHARACTER.GetSecretFaith.GetName|l]."
 convert_to_crypto_religion_action: "Converter"
 convert_to_crypto_religion_interaction_notification: "$convert_to_crypto_religion_interaction_key$"
 convert_to_crypto_religion_scheme_invalidated_title: "@scheme_icon! \"O Esquema $convert_to_crypto_religion$ Termina"
 convert_to_crypto_religion_general_desc: "Um [scheme|lE] para introduzir uma fé secreta a um alvo na esperança de aumentar a congregação secreta do proprietário."
 convert_to_crypto_religion_no_more_secret: "Eu não pratico mais a Fé Secreta de [CHARACTER.GetSecretFaith.GetName|l]."
 convert_to_crypto_religion_invalid: "Não posso mais converter [target.GetShortUIName|U] para a Fé Secreta de [CHARACTER.GetSecretFaith.GetName|l] anymore."
