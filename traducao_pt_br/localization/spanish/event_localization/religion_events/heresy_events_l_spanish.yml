l_spanish:
 heresy.0010.t: "Heresia: [heretic_faith.GetAdherentNamePluralNoTooltip] em [heretic_title.GetNameNoTierNoTooltip]"
 heresy.0010.desc: "[heretic_ruler.GetTitledFirstName] de [heretic_title.GetNameNoTier] anunciou ao mundo que [heretic_ruler.GetSheHe] e seus vassalos se converteram a [heretic_faith.GetName]."
 heresy.0010.desc.nonexistant: "\n\nDesencantados com os ensinamentos dos [origin_faith.PriestMalePlural] [origin_faith.GetAdherentNamePluralNoTooltip], os nobres de [heretic_title.GetNameNoTierNoTooltip] já não os consideram nem justos nem corretos. Como [heretic_faith.GetAdherentNamePluralNoTooltip], acreditam que sua nova fé está em melhor conformidade com a vontade de [heretic_faith.HighGodName] e estão se distanciando de suas antigas instituições religiosas."
 heresy.0010.desc.exists: "\n\nDesiludidos com os ensinamentos dos [origin_faith.PriestMalePlural] [origin_faith.GetAdherentNamePluralNoTooltip], os nobres de [heretic_title.GetNameNoTierNoTooltip] já não os consideram nem justos nem corretos e estão se distanciando de suas antigas instituições religiosas. Agora se proclamam [heretic_faith.GetAdherentNamePluralNoTooltip] e acreditam que suas doutrinas se alinham melhor à vontade de [heretic_faith.HighGodName]."
 heresy.0010.desc.resurgent: "\n\nDesencantados com os ensinamentos dos [origin_faith.PriestMalePlural] [origin_faith.GetAdherentNamePluralNoTooltip], os nobres de [heretic_title.GetNameNoTierNoTooltip] já não os consideram nem justos nem corretos. Como resultado, esses nobres reavivaram os ensinamentos abandonados dos [heretic_faith.GetAdherentNamePluralNoTooltip], cujas doutrinas acreditam que se alinham melhor à vontade de [heretic_faith.HighGodName]."
 heresy.0010.tt.custom: "[heretic_faith.GetName|V] aparece em [heretic_title.GetName]"
 heresy.0010.a.new_heresy: "Que zombaria distorcida de nossa fé é essa!?"
 heresy.0010.a.existing_heresy: "Esses hereges vis os desviaram!"
 heresy.0010.a.astray_faith: "Não entendo, mas suponho que isso os faça felizes?"
 heresy.0010.a.same_faith: "Eu sabia que eles veriam a luz eventualmente!"
 heresy.0010.b: "Sabe, eles têm alguns bons argumentos..."
 heresy.0010.notification.title: "Novo Movimento Religioso"
 heresy.0010.notification: "[heretic_ruler.GetFullName] fundou um novo movimento [heretic_faith.GetAdjective]!"
 heresy.0011.notification.heresy: "[convert_ruler.Custom2('HierarchicalStatus', me)] Adota a Heresia: [convert_ruler.GetShortUINameNoTooltip]"
 heresy.0011.notification.same_faith: "[convert_ruler.Custom2('HierarchicalStatus', me)] Adota a Verdadeira Fé: [convert_ruler.GetShortUINameNoTooltip]"
 heresy.0011.notification.other: "[convert_ruler.Custom2('HierarchicalStatus', me)] Muda de fé: [convert_ruler.GetShortUINameNoTooltip]"
