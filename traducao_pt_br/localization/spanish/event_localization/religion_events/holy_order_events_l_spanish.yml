l_spanish:
 holy_order_hired_message: "Ordem Sagrada Contratada"
 holy_order.hired_message: "[holy_order.GetName] foi convocada por [actor.GetUIName]"
 holy_order_hired_by_enemy_message: "Ordem Sagrada Inimiga"
 holy_order.hired_by_enemy: "[holy_order.GetName] foi convocada por [actor.GetUIName] e agora está contra nós"
 holy_order.destroyed_message: "A [title.GetName] foi destruída"
 holy_order_expanded: "Ordem Sagrada Expandiu"
 holy_order.new_lease: "[holy_order.GetName] agora está alugando [barony.GetName] [former_holder.Custom('ES_AlAla')] [former_holder.GetTitledFirstName|l]"
 holy_order.0001.t: "Ordem Sagrada"
 holy_order.0001.desc_opening: "[recipient.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)|U] está esperando do lado de fora, com suas coisas e comitiva prontas para partir.\n\n"
 holy_order.0001.desc: ""Pois bem, meu [root.GetLadyLord|U], para onde esta jornada me levará?"."
 holy_order.0001.desc_relation: "\"Então, [recipient.Custom2('RelationToMeShort', ROOT.Char)], para onde essa jornada me levará?\""
 holy_order.0001.a: "Você irá para a [holy_order_1.GetName]."
 holy_order.0001.b: "O destino é a [holy_order_2.GetName]."
 holy_order.0001.c: "Longe. Com [recipient.Custom('ES_ElElla')]!"
 holy_order.0001.d: "Você é um problema para a [holy_order_4.GetName] agora."
 holy_order.0001.e: "Eu cometi um erro - você pertence aqui!"
 holy_order.0002.desc: "Eu responderei ao chamado para servir um poder maior, e agradeço por me colocar neste caminho de retidão."
 holy_order.0002.a: "Tenho certeza de que você servirá bem a [ROOT.Char.GetFaith.HighGodName]."
 char_interaction.0001.opening_low_piety: "Que um ser tão [ROOT.GetCharacter.Custom('GetSinfulShameful')|l] como vós se arraste a uma ordem sagrada de [ROOT.Char.GetFaith.HighGodName]… Concentrai-vos em redimir vossa alma antes de vos preocupardes com as riquezas materiais."
 holy_order.0200.desc_opening: "[recipient.Custom2('AppropriateGreetingPositive', ROOT.Char )]"
 holy_order.0200.desc: "Ouvi seu pedido por ouro, e a [order.GetName] atenderá seu chamado."
 holy_order.0200.a: "[ROOT.Char.GetFaith.HighGodName] sorri para mim!"
 holy_order.0200.b: "Mas... Mas eu preciso do dinheiro!"
 holy_order.0202.second_time: "Lembro-lhe novamente que você deve #bold [ROOT.Var('loan_amount_owed').GetValue|0]#! de ouro à minha ordem."
 holy_order.0202.opening: "Você deve #bold [ROOT.Var('loan_amount_owed').GetValue|0]#! de ouro à minha ordem."
 holy_order.0202.desc: "Se você não devolver o ouro, encontraremos maneiras alternativas para você nos pagar - maneiras agradáveis a [ROOT.Char.GetFaith.HighGodName], mas talvez menos agradáveis a você."
 holy_order.0202.a: "Claro que honrarei nosso acordo."
 holy_order.0202.a_no: "Pagarei! Só deixe-me encontrar o ouro..."
 holy_order.0202.a._not.tt: "@warning_icon! #X Não há ouro suficiente [gold_i][gold|lE]#!"
 holy_order.0202.b_christian: "A paciência não é uma virtude?"
 holy_order.0202.b: "Como companheiro devoto... Por favor, me dê mais tempo!"
 holy_order.0202.b.tt: "[recipient.GetTitledFirstNameNoTooltip|l] te dará mais cinco anos"
 holy_order.0202.c: "Talvez possamos encontrar uma forma alternativa de pagamento...?"
 holy_order.0202.c.tt: "@warning_icon! #X [recipient.GetTitleAsNameNoTooltip] pedirá algo de você#!"
 holy_order.0202.d: "O ouro é mais útil em minhas mãos!"
 holy_order.0203.desc: "Nem [ROOT.Char.GetFaith.HighGodNameAlternate] nem eu vejo com bons olhos aqueles que quebram a palavra. Para reparar esta afronta, vocês nos arrendarão [province.GetName] para que possamos continuar realizando a obra de [ROOT.Char.GetFaith.HighGodNamePossessive]."
 holy_order.0203.a: "Claro, [province.GetNameNoTierNoTooltip] será seu."
 holy_order.0203.b: "Essa é uma exigência ridícula!"
 holy_order.0204.desc: "Nem [ROOT.Char.GetFaith.HighGodNameAlternate] nem eu vejo com bons olhos aqueles que quebram sua palavra. Para corrigir esta ofensa, você nos enviará seu[child.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))] [child.GetTitledFirstName|l] para realizar a obra de [ROOT.Char.GetFaith.HighGodNamePossessive]."
 holy_order.0204.a: "Eu... Eu [child.GetHerHim] vou mandar embora."
 holy_order.0204.a.tt: "Você não deverá mais ouro à ordem"
 holy_order.0205.desc: "Todo esse problema com o empréstimo foi uma exibição vergonhosa de sua ganância. Vou garantir que o [ROOT.Char.GetFaith.ReligiousHeadName] fique sabendo disso!"
 holy_order.0205.a: "Maldição!"
 holy_order_letter.opening: "Irmão[ROOT.Char.Custom('ES_OA')] servidor[ROOT.Char.Custom('ES_XA')] de [ROOT.Char.GetFaith.HighGodNameAlternate]"
 holy_order.1001.intro: "Conforme nossa ordem da [holy_order.GetName] cresce, precisamos de mais terras para organizar nossa defesa da fé [ROOT.Char.GetFaith.GetAdjective]."
 holy_order.1001.end: "\n\nA [target_barony.GetName] é perfeitamente adequada para o nosso propósito, e desejamos alugá-la para o serviço da nossa causa."
 holy_order.1001.a: "Seu pedido foi concedido. Por [ROOT.Char.GetFaith.HighGodName]!"
 holy_order.1001.b: "Não serviria [alternative_barony.GetNameNoTierNoTooltip] tão bem?"
 holy_order.1001.c: "Não, não vou lhe conceder esta terra."
 holy_order.2001.t: "Um Propósito Divino"
 holy_order.2001.desc: "Quando meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))] [child.GetFirstName] vem até mim, eu entendo logo que precisa falar de algo muito sério.\n\n"[ROOT.Char.Custom('MotherFather')|U], minha vida aqui estará para sempre à sombra dos outros. Deixe-me juntar-me à ordem de [holy_order.GetName] e servir a [child.GetFaith.HighGodName]. Pensei muito sobre isso, e é o que desejo fazer"."
 holy_order.2001.a: "Que [child.GetFaith.HighGodNameAlternate] te guie, [child.Custom('DaughterSon')] minha[child.Custom('ES_OA')] ."
 holy_order.2001.b: "Eles podem não ser grandiosos, mas tenho planos para você aqui."
 holy_order.2002.desc: "Quando meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('sibling'))] [sibling.GetTitledFirstName|l] me conta seus planos, fica claro que ele vem refletindo sobre isso há muito tempo.\n\n\"Aqui tenho pouco a fazer, e, se eu tiver de servir a alguém, prefiro servir a [sibling.GetFaith.HighGodName] em pessoa. Vou me juntar à ordem de [holy_order.GetName]\"."
 holy_order.2002.a: "Eu entendo sua escolha, [sibling.Custom('SisterBrother')]."
 holy_order.2002.b: "Oh, você absolutamente #EMP não#! fará isso!"
 holy_order.2003.opening: "[grandmaster.Custom2('AppropriateGreetingPositive', ROOT.Char)|U]"
 holy_order.2003.desc: "Sempre haverá necessidade de verdadeiros guerreiros para deter qualquer ameaça à fé [grandmaster.GetFaith.GetAdjective].\nCom tantos talentos e tão poucas chances de herdar, acredito que voss[child.Custom('ES_OA')] [child.Custom('DaughterSon')] [child.GetTitledFirstName|l] teria uma vida melhor servindo à ordem de [holy_order_scope.GetName]. Conosco, ele se treinará, aprenderá e trará grande honra ao seu nome."
 holy_order.2003.a: "Sua vida seguirá os verdadeiros preceitos [child.GetFaith.GetAdherentNamePlural]."
 holy_order.2003.child_joins_order: "[child.GetFirstName] adquire [GetTrait('order_member').GetName( child.Self )] e junta-se à corte d [grandmaster.GetTitledFirstNameNoTooltip|l]"
 holy_order.2003.b: "Talvez você pudesse treinar [alternative_child.GetFirstNameNoTooltip]?"
 holy_order.2003.alternative_child_joins_order: "[alternative_child.GetFirstName] adquire [GetTrait('order_member').GetName( alternative_child.Self )] e junta-se à corte d [grandmaster.GetTitledFirstNameNoTooltip|l]"
 holy_order.2003.c: "Seu lugar está aqui comigo."
 holy_order.2004.opening: "[child.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 holy_order.2004.desc: "Dediquei minha vida a [child.GetFaith.HighGodNameAlternate], mas [child.GetFaith.HighGodNameSheHe] não desejaria que eu ignorasse minha própria família.\n\n[grandmaster.Custom('ES_ElLa')|U] [grandmaster.GetTitledFirstName|l] me deu permissão para voltar à minha antiga vida e fazer parte novamente de vossa [ROOT.Char.Custom('GetCourt')|l]."
 holy_order.2004.a: "Bem-vind[child.Custom('ES_OA')] para casa, [child.Custom('DaughterSon')] meu[child.Custom('ES_OA')]!"
 holy_order.2004.b: "Não. Não há mais lugar para você aqui."
 holy_order.2005.t: "Um Retorno ao Lar"
 holy_order.2005.desc: "A visita [child.Custom('ES_DelDela')] [child.GetTitledFirstName|l] se prolongou mais do que o normal. Quando meu [child.Custom('DaughterSon')] se instala em meu [ROOT.Char.Custom('GetCourt')|l], empanturrando-se da minha comida e importunando meus servos, abro o assunto de seu retorno à ordem de [holy_order.GetName]. Infelizmente, sua resposta foi entusiasmada.\n\n«Será que vocês não ouviram, [ROOT.Char.Custom('MotherFather')]? ![grandmaster.Custom('ES_ElLa')|U] [grandmaster.GetTitledFirstName|l] teve a generosidade de me livrar dos meus deveres para com o [child.GetFaith.GetName|l]! Finalmente voltei para casa, com minha família»."
 holy_order.2005.a: "Oh, você... veio para ficar?"
 holy_order.destroyed_title: "Ordem Sagrada Dissolvida"
