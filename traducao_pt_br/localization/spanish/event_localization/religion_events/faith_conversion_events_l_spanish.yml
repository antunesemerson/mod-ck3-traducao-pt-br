l_spanish:
 faith_conversion.1001.t: "Conversão"
 faith_conversion.1001.start: "Tendo tomado a decisão de me converter ao [new_faith.GetName|l], organizei para que um [new_faith.PriestNeuter] viesse à minha [ROOT.Char.Custom('GetCourt')|l] para conduzir os ritos.\n\n"
 faith_conversion.1001.desc: "Com o destino de minha alma imortal em jogo, só me resta rezar por ter tomado a decisão correta.\n\nMetafísica à parte,"
 faith_conversion.1001.desc.zealous: "Enquanto [template_priest.GetSheHe] recita versos de [new_faith.ReligiousText], #EMP sinto#! como minha convicção arde em meu interior. Em minha mente não há dúvida de que escolhi o caminho correto.\n\nPor mais forte que seja meu zelo,"
 faith_conversion.1001.desc.zealous.carnal_male: "Enquanto [template_priest.GetSheHe] recita versos de [new_faith.ReligiousText], #EMP sinto#! crescer minha convicção. Em minha mente não há dúvida de que escolhi o caminho correto.\n\nPor mais forte que seja meu zelo,"
 faith_conversion.1001.desc.zealous.carnal_female: "Enquanto [template_priest.GetSheHe] recita versos de [new_faith.ReligiousText], #EMP sinto#! como minha convicção palpita em meu interior. Em minha mente não há dúvida de que escolhi o caminho correto.\n\nPor mais forte que seja meu zelo,"
 faith_conversion.1001.desc.compassionate: "Com o destino de minha alma imortal em jogo, assim como as almas de meus súditos, rezo por ter tomado a decisão correta.\n\nMetafísica à parte,"
 faith_conversion.1001.desc.reincarnation: "Com a vida de minha próxima encarnação em jogo, rezo por ter tomado a decisão correta.\n\nMetafísica à parte,"
 faith_conversion.1001.desc.cynical: "Embora eu não acredite de verdade nas baboseiras que o [new_faith.PriestNeuter] profere, converter-me trazia tantas vantagens políticas que eu sabia que precisaria fazer isso mais cedo ou mais tarde.\n\nIndependentemente dos meus motivos,"
 faith_conversion.1001.end.is_vassal.convert_away: "minha preocupação mais urgente é temporal, como [my_liege.Custom2('MyCharacterIntroduction', ROOT.Char)] reagirá ao saber que rejeitei sua fé?"
 faith_conversion.1001.end.is_vassal.convert_to: "posso respirar aliviado sabendo que [my_liege.Custom2('MyCharacterIntroduction', ROOT.Char)] não poderá mais usar minha fé contra mim."
 faith_conversion.1001.end.is_top_liege.convert_away: "Minha preocupação mais urgente é temporal, agora que a maioria de meus vassalos segue uma fé diferente, serei capaz de manter meu senhorio unido contra rebeliões internas e oportunistas estrangeiros por igual?"
 faith_conversion.1001.end.is_top_liege.convert_to: "me conforta saber que a maioria do meu senhorio está unida sob o [new_faith.PantheonTerm], uma verdadeira nação [new_faith.GetAdjectiveNoTooltip]."
 faith_conversion.1001.end.is_landless_adventurer: "a ideia de [new_faith.GetNameNoTooltip|l] se espalhando — passo a passo — a partir do meu humilde acampamento faz meu coração cantar."
 faith_conversion.1001.a: "Glória a [ROOT.Char.GetFaith.HighGodName]!"
 faith_conversion.1001.b: "Ao menos tenho [template_priest.GetFirstNameNoTooltip] para me guiar…"
 faith_conversion.1101.toast: "Suserano mudou de fé"
