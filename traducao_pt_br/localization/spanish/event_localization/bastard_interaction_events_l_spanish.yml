l_spanish:
 legitimize_bastard_interaction: "Legitimar Bastardo #weak (Casa)#!"
 legitimize_bastard_interaction_extra_icon: "$hook_extra_icon$"
 legitimize_bastard_interaction_desc_house_head: "$house_head_interaction_header$ Proclamar que [secondary_recipient.GetShortUINameNoTooltip] é [Concept('legitimized_bastard',Select_CString(secondary_recipient.IsFemale,'uma bastarda legitimada', 'um bastardo legitimado'))|E]\n\n#weak Isso está disponível porque [secondary_recipient.Custom('ES_ElElla')] é [Concept('bastard',Select_CString(secondary_recipient.IsFemale,'uma bastarda', 'um bastardo'))|E] da minha [house|lE]#!"
 legitimize_bastard_interaction_desc_not_house_head: "Solicitar que [recipient.GetShortUINameNoTooltip] reconheça seu [bastard|lE] como [legitimate|lE]\n #weak ([recipient.GetShortUINameNoTooltip] é o [house_head_head|lE] da sua [house|lE])#!"
 legitimize_bastard_interaction_notification: "Bastardo Legitimado"
 legitimize_bastard_interaction_decline_notification: "Bastardo não Legitimado"
 I_AM_HOUSE_HEAD_MODIFIER: "Como Chefe da Casa, sou livre para decidir"
 PRESTIGOUS_IN_OUR_HOUSE: "Nível de Fama: $VALUE|+0$"
 house_bastard_was_legitimized: "Bastardo da Casa Legitimado"
 dynasty_bastard_was_legitimized: "Bastardo da Dinastia Legitimado"
 bastard_interaction.0001.t: "Casa [actor.GetHouse.GetName]"
 bastard_interaction.0001.desc.standard: "Depois de todo esse tempo, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('actor'))] finalmente decidiu me conceder a aceitação que tanto almejei. A partir de hoje, sou seu [secondary_recipient.Custom('DaughterSon')] legítim[ROOT.Char.Custom('ES_OA')]. Com apenas algumas palavras, [actor.GetSheHe] alterou radicalmente o rumo do meu futuro."
 bastard_interaction.0001.desc.child: "[ROOT.Char.Custom2('RelationToMe', SCOPE.sC('actor'))|U] me \"legitimou\". Agora sou sua [secondary_recipient.Custom('DaughterSon')] de verdade, diz. Não sei bem o que isso significa, mas notei que algumas pessoas me olham de outra forma. A maioria é mais simpática, outras, nem tanto…"
 bastard_interaction.0001.a.standard: "Todos os meus sonhos parecem estar mais próximos agora."
 bastard_interaction.0001.a.child: "[ROOT.Char.Custom2('RelationToMe', SCOPE.sC('actor'))|U] diz que isso é uma coisa boa."
 bastard_interaction.0002.t: "Bem-vindo à Família"
 bastard_interaction.0002.house_head: "Proclamei que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('legitimized_bastard'))] [legitimized_bastard.GetFirstName] seja meu filho legítimo e membro da Casa de [actor.GetHouse.GetName]. Isso me custou muita reflexão para chegar a essa conclusão e, embora alguns possam discordar, era o certo a fazer."
 bastard_interaction.0002.dynast: "Proclamei que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('legitimized_bastard'))] [legitimized_bastard.GetFirstName] seja um descendente legítimo da dinastia de [actor.GetDynasty.GetName]."
 bastard_interaction.0002.approved: "Declarei que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('legitimized_bastard'))] [legitimized_bastard.GetFirstName] seja meu filho legítimo e membro da Casa de [actor.GetHouse.GetName]. Foi preciso pensar muito para chegar a esta conclusão, e embora alguns possam discordar, era o certo a fazer."
 bastard_interaction.0002.a: "Seu futuro é brilhante, [legitimized_bastard.GetFullNameNoTooltip]."
 bastard_interaction.0003.t: "Tudo está bem quando termina bem"
 bastard_interaction.0003.desc: "Levou algum tempo para chegar a essa conclusão, mas enfim [actor.GetTitledFirstName|l] legitimou noss[secondary_recipient.Custom('ES_OA')] [secondary_recipient.Custom('DaughterSon')] [secondary_recipient.GetFirstName]. Como membro da casa de [actor.GetHouse.GetName], [secondary_recipient.GetFirstName] agora o aguarda um futuro mais brilhante do que eu jamais havia ousado sonhar."
 bastard_interaction.0003.a: "Nos encha de orgulho!"
 bastard_interaction.0004.t: "O Retorno de um Fantasma Antigo"
 bastard_interaction.0004.desc: "Absurdamente, cheguei a pensar que [secondary_recipient.Custom('ES_ElLa')] [secondary_recipient.GetTitledFirstName|l] era um problema do passado que jamais voltaria para me atormentar. Como pude não perceber que meu [actor.Custom2('InsultAdjective', ROOT.Char)] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('actor'))] [secondary_recipient.Custom('ES_LoLa')] legitimaria? Achei que já tinha sofrido o bastante…"
 bastard_interaction.0004.newborn_desc: "[actor.GetFirstName] não só teve um bastardo, como também decidiu legitimá-lo!\n\n[legitimized_bastard.Custom('ES_ElLa')|U] pequen[legitimized_bastard.Custom('ES_OA')] [legitimized_bastard.GetTitledFirstName|l] vai assombrar minha vida para sempre…"
 bastard_interaction.0004.a: "Não esquecerei essa traição."
 bastard_interaction.0005.t: "O grande dia de [secondary_recipient.GetFirstNameNoTooltip]"
 bastard_interaction.0005.desc.bastard: "[ROOT.Char.Custom2('RelationToMe', SCOPE.sC('actor'))|U] decidiu legitimar [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], m [secondary_recipient.GetTitledFirstName|l]. Não consigo deixar de sentir um pouco de amargura... Será que um dia conhecerei a mesma aceitação?"
 bastard_interaction.0005.desc.approve: "É um ótimo dia para [secondary_recipient.GetTitledFirstName|l]! Por fim noss[actor.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('actor'))] entrou em juízo e legitimou meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))]. Agora ele/ela é realmente parte da família."
 bastard_interaction.0005.desc.disapprove: "N?o acredito... [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('actor'))] decidiu legitimar [secondary_recipient.GetTitledFirstName|l]! Com o tempo, eu havia chegado a aceitar sua presen?a, mas isso ? demais. Ser? que [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('actor'))] realmente espera que eu d? as boas-vindas ? fam?lia ao meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))] bastard[secondary_recipient.Custom('ES_OA')]?"
 bastard_interaction.0005.a.approve: "Desejo-lhe boa sorte em sua nova vida."
 bastard_interaction.0005.a.disapprove: "Será que [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('actor'))] pensou em mim algum momento?"
 every_child_adult_non_bastard_dislike: "Todos os meus filhos adultos não bastardos que não gostam do bastardo"
 every_child_adult_non_bastard_dislike_me: "Todos os filhos adultos não bastardos de [THIS.Char.GetFirstName] de quem não gostam de mim"
 bastard_interaction.0006.t: "[legitimized_bastard.GetFirstNameNoTooltip] Legitimad"
 bastard_interaction.0006.desc: "[legitimized_bastard.GetTitledFirstName] foi legitimad[legitimized_bastard.Custom('ES_OA')] por chefe[actor.Custom('ES_EA')] da casa, [actor.GetTitledFirstName]!"
 bastard_interaction.0006.a: "Por fim, tem uma família."
 bastard_interaction.0007.desc: "[legitimized_bastard.Custom('GetDaughterSon')] bastard[legitimized_bastard.Custom('ES_OA')] de [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('parent'))], [legitimized_bastard.GetTitledFirstName|l], foi legitimad[legitimized_bastard.Custom('ES_OA')] por [actor.GetTitledFirstName|l], chef[actor.Custom('ES_EA')] de sua casa."
 bastard_interaction.0007.newborn_desc: "[parent.GetTitledFirstName] trouxe ao mundo uma criança bastarda e foi legitimada por [actor.GetTitledFirstName|l], sua [legitimized_bastard.Custom2('RelationToMe', SCOPE.sC('actor'))]."
 bastard_interaction.0007.a: "Que esteja fora da minha vida para sempre."
 bastard_interaction.0008.desc: "[legitimized_bastard.GetTitledFirstName], bastardo[legitimized_bastard.Custom('ES_OA')] [legitimized_bastard.Custom('GetDaughterSon')] de meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('parent'))], foi legitimad[legitimized_bastard.Custom('ES_OA')] por che[actor.Custom('ES_EA')] de sua nova Casa!"
 bastard_interaction.0008.a: "Como se algum dia fosse ser “legítim[legitimized_bastard.Custom('ES_OA')]”."
 bastard_interaction.0009.t: "Um Herdeiro para a Dinastia"
 bastard_interaction.0009.desc: "[actor.GetTitledFirstName][actor.Custom('ES_EA')], o chefe de nossa dinastia inteira, declarou-me herdeiro legítimo do nosso nome!\n\nSempre fui um[ROOT.Char.Custom('ES_XA')][ROOT.Char.GetDynasty.GetBaseName] de verdade, e agora o resto do mundo precisa reconhecê-lo."
 bastard_interaction.0009.a: "Finalmente!"
 bastard_interaction.0010.t: "Outro Herdeiro para a Dinastia"
 bastard_interaction.0010.desc: "[actor.GetTitledFirstName][actor.Custom('ES_EA')] da nossa dinastia, declarou meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('recipient'))] herdeir[recipient.Custom('ES_OA')] legítim[recipient.Custom('ES_OA')] como legítimo herdeiro do nosso sobrenome!\n\nAgora será um[recipient.Custom('ES_XA')] herdeir[recipient.Custom('ES_OA')] tão legítim[recipient.Custom('ES_OA')] para a dinastia de [ROOT.Char.GetDynasty.GetName] quanto qualquer outro filho nascido em berço legítimo."
 bastard_interaction.0010.a: "Mais um na linha de sucessão."
 bastard_interaction.0010.a.tt: "[recipient.GetShortUIName] agora está elegível para herdar"
 every_father_house_member: "Todo membro de [house|lE] de [father.GetFirstNameNoTooltip]"
 every_mother_house_member: "Todo membro da [house|lE] de [mother.GetFirstNameNoTooltip]"
 every_real_father_house_member: "Todo membro da [house|lE] de [real_father.GetFirstNameNoTooltip]"
 every_child_house_member: "Todo membro da [house|lE] de [child.GetFirstNameNoTooltip]"
