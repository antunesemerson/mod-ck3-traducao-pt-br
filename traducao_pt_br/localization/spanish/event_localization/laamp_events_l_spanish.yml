 ep3_laamp_flavour_ewan.4031.t: "Doença no Rebanho"
 ep3_laamp_flavour_ewan.4031.desc: "Não há dúvida: seja pelo clima, pelo terreno, pela sobrecarga ou por pura má sorte, alguma enfermidade se instalou nos animais de carga do acampamento.\n\nEles gemem, relincham, andam, mas tudo fica mais lento e pesado a cada hora, quanto mais a cada dia.\n\nAlguns cavalos estão claramente febris, e uma das mulas mais velhas parece prestes a morrer — uma ameaça terrível se isso se espalhar ainda mais."
