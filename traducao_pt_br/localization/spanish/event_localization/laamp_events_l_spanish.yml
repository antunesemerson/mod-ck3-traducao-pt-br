 ep3_laamp_flavour_ewan.4051.desc: "Com tantas tropas sob um estandarte itinerante e tanto território #EMP duvidoso#! a atravessar, seria de se esperar que vez ou outra faltassem algumas provisões\n\nMas não são apenas algumas provisões.\n\nTrata-se de uma quantidade enorme, #EMP imensa#!, de suprimentos que algum idiota egoísta entre meus soldados vendeu a moradores locais ou réprobos, perdeu por incompetência, simplesmente não comprou de início ou então desperdiçou sem mais nem menos, e isso representa uma infração imperdoável da disciplina."
