 ep3_laamp_flavour_ewan.4041.t: "[ROOT.Char.GetFaith.TricksterGodNamePossessive] Dízimo"
 ep3_laamp_flavour_ewan.4041.desc.weather_type.storm.thunder: "Trovões ecoam de forma sinistra sobre nossas cabeças, uma interrupção surda aos ventos cortantes e à chuva açoitando nossa caravana.\n\nGritos distantes ecoam de uma ponta a outra da linha enquanto carroças e animais afundam em [ROOT.Char.Custom('RainySoilType')], com a tempestade fazendo o possível para nos arrastar até [ROOT.Char.GetFaith.NegativeAfterLife]. Crianças e idosos tremem em silêncio miserável, encharcados até os ossos e se perguntando quando a hipotermia começará a se instalar.\n\nO ar crepita tanto de estática quanto de tensão,"
 ep3_laamp_flavour_ewan.4041.desc.weather_type.storm.wind: "O uivo do vento torna quase impossível ser ouvido a mais do que alguns passos de distância.\n\nA intensidade desta maldita tempestade só aumenta, a chuva fere nossos olhos e deixa carroças pesadas e animais carregados atolados em uma mistura de [ROOT.Char.Custom('RainySoilType')]. O mesmo quadro silencioso se repete de uma ponta a outra da linha, seguidores mais fortes ajudando a soltar os transportes enquanto jovens e idosos se encolhem sob qualquer abrigo que consigam encontrar ou improvisar.\n\nA própria natureza parece decidida a se voltar contra nós, deixando"
 ep3_laamp_flavour_ewan.4041.desc.weather_type.storm.snow: "Entorpecimento.\n\nMesmo estando o mais agasalhad[ROOT.Char.Custom('ES_OA')] que posso estar, o frio me consome; grandes rajadas de neve, lançadas pelo vento, encharcam toda a pele exposta, drenando o calor como a cera de uma vela já consumida. O restante da caravana está ainda pior — homens, animais e carroças ficando continuamente atolados neste inferno de branco desbotado, crianças e idosos tremendo sob tendas cobertas de neve acumulada, enquanto os adultos trabalham febrilmente para livrar nossos transportes presos.\n\nA tempestade de neve vai se intensificando, deixando"
 ep3_laamp_flavour_ewan.4041.desc.weather_type.storm.sand: "Há areia #EMP por toda parte#!; nos olhos, no nariz, na garganta. Nem mesmo cobrindo o rosto consigo detê-la; a areia infernal chicoteia furiosamente tudo e qualquer coisa que consegue.\n\nA tempestade de areia surgiu de repente, aparentemente do nada. Em questão de minutos, toda a caravana foi engolida, e agora tudo o que consigo distinguir dos demais são os gritos enquanto o vendaval arranca e leva embora nossos suprimentos, e tosses roucas onde os pulmões de jovens e idosos falham por igual.\n\nDe repente, todos os nossos cuidadosos preparativos mergulharam no caos, deixando"
 ep3_laamp_flavour_ewan.4041.desc.weather_type.wild_fires.intro: "Mesmo a esta distância, podemos sentir o intenso calor das chamas correndo em nossa direção.\n\n"
 ep3_laamp_flavour_ewan.4041.desc.weather_type.wild_fires.scrub: "O incêndio florestal está avançando mais rápido através do mato seco do que nós pelo terreno aberto, ventos traiçoeiros levando-o fortemente em nossa direção, ameaçando cozinhar qualquer um e qualquer coisa que seja muito lento para escapar — mula carregada e criança que demora para ir embora.\n\nGrandes plumas de fumaça se estendem à frente do corpo principal das chamas, sufocando nossos doentes e idosos, deixando"
 ep3_laamp_flavour_ewan.4041.desc.weather_type.wild_fires.slopes: "Embora continuemos a avançar firme pela ladeira, ventos constantes e solo seco significam que o incêndio florestal está nos alcançando, ameaçando cozinhar qualquer um e qualquer coisa que seja muito lento para escapar — mula carregada e criança que demora para ir embora.\n\nPlumas de fumaça se contorcem acima do corpo principal das chamas, infiltrando nossas fileiras para sufocar até os mais fortes e deixando"
 ep3_laamp_flavour_ewan.4041.desc.weather_type.wild_fires.treeline: "Com tanto folhagem para queimar, o incêndio florestal está alcançando em grandes saltos — a detonação ocasional de árvores especialmente secas e cheias de resina um lembrete sombrio e assustador do destino horrível que aguarda qualquer um e tudo que for lento demais para escapar.\n\nTendrilas oleosas de fumaça de cheiro perversamente agradável nos perseguem à frente das chamas, sufocando os fracos e deixando"
 ep3_laamp_flavour_ewan.4041.desc.weather_type.wild_fires.fallback: "O incêndio florestal está se movendo mais rápido do que nós, encontrando #EMP combustível suficiente#! para queimar vorazmente em direção ao nosso comboio. Qualquer um e qualquer coisa que seja muito lento para escapar será queimado vivo — mula carregada e criança que demora para ir embora.\n\nPior ainda, vastas nuvens de fumaça se expandem à frente das chamas, ocasionalmente nos cobrindo para sufocar a vida dos vulneráveis, deixando"
 ep3_laamp_flavour_ewan.4041.desc.weather_type.avalanche: "É um som surpreendentemente suave que anuncia um perigo iminente: um imenso e delicado #EMP golpe#! de cima.\n\nDezenas de olhos na caravana se voltam para os picos que se erguem sobre nós, antes que o estrondo de um raio maior do que o de qualquer tempestade ecoe por toda a cordilheira.\n\n\"#BER AVALANCHA!#!\", grita alguém. De repente, tudo é caos, homens e animais saem correndo, em busca do menor abrigo contra a cascata de morte branca que se precipita em nossa direção, deixando"
 ep3_laamp_flavour_ewan.4041.desc.weather_type.flood: "A névoa parece surgir do nada; há um momento o ar estava úmido e, então, ele se adensa até quase virar uma sopa.\n\nDe cima, algumas gotas de chuva caem, e um riacho próximo começa a aumentar rapidamente suas margens. A tensão toma conta da caravana, fazendo com que os homens e as carroças parem gradualmente até cessarem por completo. Ninguém consegue dizer ao certo qual é o problema, mas #EMP algo#! está errado.\n\nEm menos de um minuto, o solo antes firme se transformou em lama espessa, e a água começa a subir de baixo. \"Uma enchente, é uma #EMP riada#!!\", grita alguém, deixando"
 ep3_laamp_flavour_ewan.4041.desc.weather_type.frozen_water: "A neve aqui é persistente, mas não severa o bastante para representar um problema; apenas o suficiente para cobrir o mundo com um espesso tapete branco. Nossa caravana atravessa uma clareira na floresta, aproveitando o alívio da cobertura das árvores, uma pequena chance de apreciar a maravilha ao redor.\n\n#BER Crac.#!\n\nDezenas de olhos se voltam para baixo, vendo com horror crescente uma imensa fenda se abrir no chã- não, na superfície do #EMP lago congelado#!! Não há tempo a perder, nem tempo para pensar, e fugimos como um só — mesmo com"
 ep3_laamp_flavour_ewan.4041.desc.weather_type.earthquake: "O mundo se move sob nossos pés. Homens e mulas cambaleiam, bebês erguem um choro uníssono, e várias rodas de carroça se partem ao serem levantadas e arremessadas de volta ao chão ou jogadas para o lado.\n\nMeio segundo de pânico toma conta de toda a caravana após o solavanco: o que foi aquilo? Haverá mais, ou foi só is-\n\n#EMP A própria terra começa a tremer#!. À distância, uma fenda se abre e começa a serpentear, mais rápida do que qualquer homem poderia correr, diretamente em nossa direção. A visão imediatamente deixa"
 ep3_laamp_flavour_ewan.4041.desc.outro: "meus seguidores à beira do colapso."
