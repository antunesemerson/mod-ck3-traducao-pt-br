 ep3_laamp_flavour_ewan.4062.desc.intro: "Não podemos nos dar ao luxo de esperar outra noite para escapar da coisa. Reunindo meu grupo de caça, pretendo acabar com isso, e para fazer isso, esta mesma manhã.\n\nAs pegadas da besta"
 ep3_laamp_flavour_ewan.4062.desc.tracks.canine: "são suaves e difíceis de seguir, mas inconfundivelmente caninas."
 ep3_laamp_flavour_ewan.4062.desc.tracks.feline: "são mal perceptíveis, embora pareçam ser felinas."
 ep3_laamp_flavour_ewan.4062.desc.tracks.ursine: "são surpreendentemente leves, mas claramente ursinas."
 ep3_laamp_flavour_ewan.4062.desc.tracks.hippopotomine: "são pesadas e... estranhas. Não consigo identificá-las."
 ep3_laamp_flavour_ewan.4062.desc.tracks.crocodyline: "parecem mais com... mãos humanas, arrastando-se com dedos pontudos."
 ep3_laamp_flavour_ewan.4062.desc.tracks.human: "são leves como um sussurro e indetectáveis, como se estivessem deliberadamente disfarçadas."
 ep3_laamp_flavour_ewan.4062.desc.tracks.connector: "Depois de quase uma hora,"
 ep3_laamp_flavour_ewan.4062.desc.terrain.major_river: "chegamos a um trecho arenoso de praia ao longo do rio"
 ep3_laamp_flavour_ewan.4062.desc.terrain.farmlands: "chegamos a uma abertura em uma longa sebe"
 ep3_laamp_flavour_ewan.4062.desc.terrain.hills: "ultrapassamos a elevação de uma colina alta"
 ep3_laamp_flavour_ewan.4062.desc.terrain.mountains: "chegamos à borda de um penhasco íngreme"
 ep3_laamp_flavour_ewan.4062.desc.terrain.desert: "chegamos à base de uma duna alta"
 ep3_laamp_flavour_ewan.4062.desc.terrain.desert_mountains: "$ep3_laamp_flavour_ewan.4062.desc.terrain.mountains$"
 ep3_laamp_flavour_ewan.4062.desc.terrain.oasis: "$ep3_laamp_flavour_ewan.4062.desc.terrain.desert$"
 ep3_laamp_flavour_ewan.4062.desc.terrain.jungle: "chegamos a uma ampla clareira na selva"
 ep3_laamp_flavour_ewan.4062.desc.terrain.forest: "chegamos a um amplo bosque"
 ep3_laamp_flavour_ewan.4062.desc.terrain.taiga: "$ep3_laamp_flavour_ewan.4062.desc.terrain.forest$"
 ep3_laamp_flavour_ewan.4062.desc.terrain.wetlands: "chegamos a uma área de solo mais seco"
 ep3_laamp_flavour_ewan.4062.desc.terrain.steppe: "chegamos a um desfiladeiro rochoso"
 ep3_laamp_flavour_ewan.4062.desc.terrain.floodplains: "chegamos a uma estreita península"
 ep3_laamp_flavour_ewan.4062.desc.terrain.drylands: "chegamos a um vale empoeirado"
 ep3_laamp_flavour_ewan.4062.desc.terrain.plains: "atravessamos uma colina baixa"
 ep3_laamp_flavour_ewan.4062.desc.terrain.connector: "onde as pegadas simplesmente parecem desaparecer.\n\n"
 ep3_laamp_flavour_ewan.4062.desc.animal.dog: "Um rosnado baixo atrás de nós me faz girar sobre mim mesm[ROOT.Char.Custom('ES_OA')] para dar de cara com um mastim selvagem [ROOT.Char.Custom('4061_size_adjective')], cujo focinho ainda está encharcado do sangue das matanças da noite passada, e que está quase em cima de nós. $ep3_laamp_flavour_ewan.4062.desc.animal.boilerplate$"
 ep3_laamp_flavour_ewan.4062.desc.animal.wolf: "Um rosnado feroz às minhas costas me faz virar bruscamente sobre mim mesm[ROOT.Char.Custom('ES_OA')] para dar de cara com um lobo [ROOT.Char.Custom('4061_size_adjective')], com os olhos em chamas de uma fome selvagem, os dentes estalando e grossas golfadas de saliva voando de sua boca. $ep3_laamp_flavour_ewan.4062.desc.animal.boilerplate$"
 ep3_laamp_flavour_ewan.4062.desc.animal.hyena: "Uma risadinha maníaca atrás de mim me faz virar, e vejo uma hiena de tamanho [ROOT.Char.Custom('4061_size_adjective')] — com o focinho encharcado de sangue e salpicado de pedaços de carne humana — nos observando faminta. $ep3_laamp_flavour_ewan.4062.desc.animal.boilerplate$"
 ep3_laamp_flavour_ewan.4062.desc.animal.lion: "Um rugido estrondoso atrás de nós nos faz girar,; um leão [ROOT.Char.Custom('4061_size_adjective')], cujo focinho curto ainda está coberto pelas vísceras da noite, arfa com fome evidente. $ep3_laamp_flavour_ewan.4062.desc.animal.boilerplate$"
 ep3_laamp_flavour_ewan.4062.desc.animal.tiger: "Um rugido gelado vindo de trás nos faz todos nos virarmos; um tigre [ROOT.Char.Custom('4061_size_adjective')], que ainda fede às mortes da noite, nos encara com fome. $ep3_laamp_flavour_ewan.4062.desc.animal.boilerplate$"
 ep3_laamp_flavour_ewan.4062.desc.animal.leopard: "Um rugido alto às minhas costas me faz girar sobre os calcanhares; um leopardo [ROOT.Char.Custom('4061_size_adjective')] e raivoso, com o rosto e as patas ainda encharcados de sangue, aguarda. $ep3_laamp_flavour_ewan.4062.desc.animal.boilerplate$"
 ep3_laamp_flavour_ewan.4062.desc.animal.panther: "Um rosnado alto às minhas costas me faz girar nos calcanhares; quase fico atônit[ROOT.Char.Custom('ES_OA')] ao ver uma pantera de cor ônix e tamanho [ROOT.Char.Custom('4061_size_adjective')] à nossa frente, ainda cheia de adrenalina e sede de sangue por sua caçada vespertina. $ep3_laamp_flavour_ewan.4062.desc.animal.boilerplate$"
 ep3_laamp_flavour_ewan.4062.desc.animal.lynx: "Um baixo sibilar atrás de mim me faz girar sobre os calcanhares; um lince [ROOT.Char.Custom('4061_size_adjective')], com olhos brilhando com uma astúcia antinatural, surge à vista sem fazer barulho. $ep3_laamp_flavour_ewan.4062.desc.animal.boilerplate$"
 ep3_laamp_flavour_ewan.4062.desc.animal.caracal: "Um rosnado alto atrás de mim me faz girar; um caracal [ROOT.Char.Custom('4061_size_adjective')], com o rosto coberto de sangue, aguarda. Parece quase antinaturalmente grande para sua espécie, mais um pequeno leão do que um gato selvagem. $ep3_laamp_flavour_ewan.4062.desc.animal.boilerplate$"
 ep3_laamp_flavour_ewan.4062.desc.animal.bear: "Um bramido gutural às nossas costas nos faz virar para dar de cara com um urso [ROOT.Char.Custom('4061_size_adjective')] com o focinho lambuzado de sangue, que nos encara com olhos inteligentes demais. $ep3_laamp_flavour_ewan.4062.desc.animal.boilerplate$"
 ep3_laamp_flavour_ewan.4062.desc.animal.hippo.largest: "Às nossas costas ecoa o rugido mais alto e furioso que já ouvi jamais; ao nos virarmos, nos deparamos com um hipopótamo [ROOT.Char.Custom('4061_size_adjective')]. Com dentes que parecem galhos de árvore e a massa muscular de uma carroça carregada, talvez seja a maior fera com que já tenhamos cruzado até agora. $ep3_laamp_flavour_ewan.4062.desc.animal.boilerplate$"
 ep3_laamp_flavour_ewan.4062.desc.animal.hippo.fallback: "Um bramido gutural às nossas costas nos faz nos virar; as mandíbulas com dentes como clavas de um hipopótamo [ROOT.Char.Custom('4061_size_adjective')] nos aguardam. $ep3_laamp_flavour_ewan.4062.desc.animal.boilerplate$"
 ep3_laamp_flavour_ewan.4062.desc.animal.crocodile: "Um rugido grave e gutural atrás de nós nos faz nos virar; deparamos com o focinho de um crocodilo [ROOT.Char.Custom('4061_size_adjective')] —ainda coberto com as vísceras dos meus seguidores— apontado diretamente para nós. $ep3_laamp_flavour_ewan.4062.desc.animal.boilerplate$"
 ep3_laamp_flavour_ewan.4062.desc.animal.boilerplate: "A criatura, sua armadilha tecida, parte em uma corrida."
 ep3_laamp_flavour_ewan.4062.desc.animal.cannibal_generated: "\"Você foi [ROOT.Char.Custom('ES_ElLa')] primeir[ROOT.Char.Custom('ES_OA')], sabia?\", murmura uma voz desconhecida atrás de nós. Ao nos virarmos, vemos [Select_CString( cannibal.IsFemale, 'uma mulher', 'um homem' )] com o cabelo empastado de sangue e pedaços de carne crua entre os dentes. \"Meu primeiro sabor — e que sabor foi! Mas você... você será um #EMP banquete!#!\" Arma em mãos, [cannibal.Custom('ES_ElLa')] canibal se lança contra mim."
 ep3_laamp_flavour_ewan.4062.desc.animal.cannibal_existing.anna: "Um grito de pura raiva quebra nosso quase silêncio, antes que uma javelina lançada de uma altura que deve ter sido na altura da canela acerte um dos meus membros na base da coluna, derrubando-o instantaneamente. Girando, sou confrontado pelo rosto ensanguentado de um anão furioso, suas mãos cobertas de sangue segurando uma arma que segue diretamente para meu baixo ventre."
 ep3_laamp_flavour_ewan.4062.desc.animal.cannibal_existing.secret: "\"Eu tinha que fazer isso. Eu #EMP tinha#! que fazer\", grita uma voz desconhecida e angustiada atrás de nós. Ao nos virarmos, encontramos... um[cannibal.Custom('ES_XA')] [cannibal.GetWomanMan]? Apenas um[cannibal.Custom('ES_XA')] [cannibal.GetWomanMan] — rosto e dentes cobertos de sangue seco, vermelho-ferrugem. \"Você não conhece a #EMP fome#!, não conhece — você #EMP não#! entenderia!\", berra [cannibal.Custom('ES_ElLa')] canibal enquanto se lança contra mim."
 ep3_laamp_flavour_ewan.4062.desc.animal.cannibal_existing.fallback: "\"Ora, ora, ora\", ri uma voz desconhecida atrás de nós. Nós nos viramos como um só para encontrar um [cannibal.Custom('ES_XA')] [cannibal.GetWomanMan] que empunha uma arma e sorri com loucura. \"Parece que o almoço se serviu sozinho!\", provoca, lançando-se diretamente contra mim."
 ep3_laamp_flavour_ewan.4062.desc.animal.cannibal_chad: "\"Eu não queria machucar ninguém\", se queixa uma voz tremula e desconhecida atrás de nós. Girando, encontramos... um homem? Um acadêmico de aparência estudiosa, até. Um que está totalmente fora de lugar aqui e agora. \"Eu só... eu precisava de #EMP carne#!. Eu ainda preciso dela!\", ele grita, com a arma subitamente em mãos enquanto salta direto para mim."
 ep3_laamp_flavour_ewan.4061.size_adjective.titanic: "#BER titânico#!"
 ep3_laamp_flavour_ewan.4061.size_adjective.colossal: "#EMP colossal#!"
 ep3_laamp_flavour_ewan.4061.size_adjective.mammoth: "#EMP mamute#!"
 ep3_laamp_flavour_ewan.4061.size_adjective.huge: "#EMP enorme#!"
 ep3_laamp_flavour_ewan.4061.size_adjective.large: "#EMP grande#!"
 ep3_laamp_flavour_ewan.4061.size_adjective.sizeable: "#EMP considerável#!"
 ep3_laamp_flavour_ewan.4062.tt.success: "A besta cai para os seus números"
 ep3_laamp_flavour_ewan.4062.tt.failure: "A besta escapa"
 ep3_laamp_flavour_ewan.4062.a: "Cerquem, cerquem-no!"
 ep3_laamp_flavour_ewan.4062.b: "Atacá-lo, besta!"
 ep3_laamp_flavour_ewan.4062.c: "[huntsperson.GetFirstNameNoTooltip], soltem, SOLTEM!"
 ep3_laamp_flavour_ewan.4062.c.tt.success: "Direto pelo olho"
 ep3_laamp_flavour_ewan.4062.c.tt.failure: "Apenas o deixando mais furioso"
 ep3_laamp_flavour_ewan.4062.d: "[kenneler.GetFirstNameNoTooltip], traga-me aquele cão!"
 ep3_laamp_flavour_ewan.4062.d.tt.success: "O cachorro foi dominado"
 ep3_laamp_flavour_ewan.4062.d.tt.failure: "Um espetáculo macabro"
 ep3_laamp_flavour_ewan.4062.e: "Prepare-se para morrer, monstro!"
 ep3_laamp_flavour_ewan.4064.t: "$ep3_laamp_flavour_ewan.4061.t$: Duelo Vitorioso"
 ep3_laamp_flavour_ewan.4064.desc: "O corpo do canibal tomba para trás, o sangue primeiro jorra e depois goteja de suas feridas fatais.\n\nNão é o resultado que eu esperava, sem dúvida, mas o mundo não poderá dizer que eu não matei um devorador de homens de qualquer forma.\n\nÀ medida que a tensão da luta vai deixando meu corpo, o restante do grupo de caça irrompe em um coro de vivas. Lanço um último olhar [cannibal.Custom('ES_AlAla')] [cannibal.GetWomanMan] que jaz mort[cannibal.Custom('ES_OA')] no chão e sigo para casa."
 ep3_laamp_flavour_ewan.4064.a.is_cannibal: "Bem, agora #EMP estou#! com fome..."
 ep3_laamp_flavour_ewan.4064.a.not_cannibal: "Uma loucura perversa."
 ep3_laamp_flavour_ewan.4071.t: "Mercadores de Escravos"
 ep3_laamp_flavour_ewan.4071.desc: "A emboscada é desencadeada com maestria.\n\nUm gargalo vulnerável no terreno permite que uma horda de traficantes de escravos — correntes e espadas em mãos — se lance contra nós pelos dois lados, enquanto um terceiro grupo atrasa o corpo principal da caravana de vir em nosso auxílio. Um coro de gritos irrompe entre aqueles que me acompanham e estão sem armas quando percebem o que está acontecendo.\n\nSe esses monstros vencerem, um destino horrível aguarda muitos de nós."
 ep3_laamp_flavour_ewan.4071.a: "Reúnam-se! Reúnam-se e exterminem esses escórias!"
 ep3_laamp_flavour_ewan.4071.a.tt.success: "Seus defensores avançam"
 ep3_laamp_flavour_ewan.4071.a.tt.failure: "Uma luta brutal"
 ep3_laamp_flavour_ewan.4071.b: "Enfrente o mercador de escravos líder em um duelo."
 ep3_laamp_flavour_ewan.4071.c: "Negocie e venda alguns seguidores menos importantes."
 ep3_laamp_flavour_ewan.4071.c.sale_explanation.profit: "Você será paga [gold|lE] equivalente à soma [skills|lE] dos seus cinco piores [followers|lE]"
 ep3_laamp_flavour_ewan.4071.c.sale_explanation.limitations: "Qualquer um que seja importante para você, especialmente habilidoso, ou que esteja doente ou ferido está isento da venda"
 ep3_laamp_flavour_ewan.4071.c.sale_explanation.death: "Vender um [character|lE] para a escravidão o removerá do jogo, contando efetivamente como [character_death_death|lE]"
 ep3_laamp_flavour_ewan.4071.d: "Ignore os gritos e espere o melhor."
 ep3_laamp_flavour_ewan.4071.d.tt.success: "[ROOT.Char.GetFaith.FateGodName] sorri para você"
 ep3_laamp_flavour_ewan.4071.d.tt.failure: "Lamentos se afastando na noite"
 ep3_laamp_flavour_ewan.4073.t: "$ep3_laamp_flavour_ewan.4071.t$: Duelo Vitorioso"
 ep3_laamp_flavour_ewan.4073.desc: "A morte d[slaver.Custom('ES_EA')] [slaver.GetWomanMan] espalha uma onda de confusão apavorada pelas fileiras inimigas.\n\nA batalha ao meu redor muda de rumo, com um coro de gritos e gorgolejos úmidos subindo do inimigo enquanto os traficantes de escravos são passados a fio de espada às dezenas, morrendo em massa. Em poucos minutos, uma força de socorro vinda do corpo principal da coluna rompe a retaguarda dos escravistas, e tudo termina.\n\nCom um chute desdenhoso, jogo o que resta do líder deles de cara em um monte de [ROOT.Char.Custom('GritType')]."
 ep3_laamp_flavour_ewan.4073.a: "Isso é o que eu penso de você, escória."
 ep3_laamp_flavour_ewan.4081.t: "Nascidos da Desesperação"
 ep3_laamp_flavour_ewan.4081.desc.intro: "A princípio, vemos apenas alguns poucos camponeses esquálidos de etnia [current_county.GetCountyData.GetCulture.GetName]. Eles aparecem ao longe ou espiando por entre pequenos relevos do terreno, fugindo quando os notamos.\n\nAs horas passam, enquanto os moradores locais, assustadiços, continuam nos observando de longe.\n\nEntão, quando parece que finalmente tinham recuado, um grito se ergue, e uma horda frenética avança sobre nós sob a proteção de uma crista. De olhos arregalados e esqueléticos,"
 ep3_laamp_flavour_ewan.4081.desc.epidemic: "eles parecem doentes, infectados com alguma doença terrível, sem dúvida —"
 ep3_laamp_flavour_ewan.4081.desc.mundane: "eles parecem frágeis, nas primeiras etapas da fome, sem dúvida —"
 ep3_laamp_flavour_ewan.4081.desc.outro: "embora não tão fracos que não pudessem roubar muitas de nossas provisões antes de serem afastados."
 ep3_laamp_flavour_ewan.4081.a: "Tente acalmar a multidão."
 ep3_laamp_flavour_ewan.4081.a.tt.success: "Você consegue acalmar a multidão"
 ep3_laamp_flavour_ewan.4081.a.tt.failure: "Palavras significam pouco para eles"
 ep3_laamp_flavour_ewan.4081.b: "Se eles querem provisões, devem #EMP pagar!#!"
 ep3_laamp_flavour_ewan.4081.b.tt.success: "Um lucro saudável"
 ep3_laamp_flavour_ewan.4081.b.tt.success.every_compassionate_or_generous_follower: "Cada [follower|lE] [GetTrait('compassionate').GetName( GetNullCharacter )|l] ou [GetTrait('generous').GetName( GetNullCharacter )|l]"
 ep3_laamp_flavour_ewan.4081.b.tt.success.every_callous_greedy_or_sadistic_follower: "Cada [follower|lE] [GetTrait('greedy').GetName( GetNullCharacter )|l] ou [GetTrait('sadistic').GetName( GetNullCharacter )|l]"
 ep3_laamp_flavour_ewan.4081.b.tt.failure: "Frenesi de fome"
 ep3_laamp_flavour_ewan.4081.c: "Forçe essa turba para trás."
 ep3_laamp_flavour_ewan.4081.c.tt.success: "Seus retentores armados quebram ossos suficientes"
 ep3_laamp_flavour_ewan.4081.c.tt.failure: "Você não consegue deter todos"
 ep3_laamp_flavour_ewan.4081.d: "Simplesmente deixe-os levar algumas provisões"
 ep3_laamp_flavour_ewan.4091.t: "Ataque Noturno"
 ep3_laamp_flavour_ewan.4091.desc: "É noite quando os atacantes caem sobre nosso perímetro, um variado clarão de armaduras reluzentes e armas cintilantes, iluminado apenas pela luz distante de uma fogueira.\n\nSe estiverem usando alguma cor, não dá para vê-la, mas sua intenção é clara o bastante de todo modo: nos remover de [current_county.GetBaseNameNoTier], vivos ou mortos.\n\nO acampamento não está desprovido de defensores, porém, e, com um grito de indignação, nos preparamos para repelir essa ameaça local."
 ep3_laamp_flavour_ewan.4091.a: "Contra-ataquem, comigo!"
 ep3_laamp_flavour_ewan.4091.a.tt.success: "Uma vitória tática"
 ep3_laamp_flavour_ewan.4091.a.tt.failure: "Sangrentos e quebrados"
 ep3_laamp_flavour_ewan.4091.b: "Vou para o combate!"
 ep3_laamp_flavour_ewan.4091.b.tt.success: "Um ataque bem-sucedido"
 ep3_laamp_flavour_ewan.4091.b.tt.failure: "$ep3_laamp_flavour_ewan.4091.a.tt.failure$"
 ep3_laamp_flavour_ewan.4091.c: "Esconda-se do caos."
 ep3_laamp_flavour_ewan.4091.c.every_non_craven_follower: "Cada [follower|lE] não [GetTrait('craven').GetName( GetNullCharacter )|l]"
 ep3_laamps.5999.t: "Notícias da Ilha"
 ep3_laamps.5999.desc: "Meu pai era um homem severo. Com o benefício dos anos, agora vejo que minhas... indiscrições com ele foram tomadas com o humor que mereciam. Seu apelo a [edward.Custom('ES_AlAla')] [edward.GetTitledFirstName|l] foi atendido, e assim me encontrei aqui em [location.GetName], fazendo o trabalho sujo para [flanders.Custom('ES_ElLa')] [flanders.GetTitledFirstName|l].\n\nMas se passaram muitos anos, e a Inglaterra se encontra em fluxo. [edward.Custom('ES_ElLa')|U] [edward.GetTitledFirstNameNoTooltip|l] morreu, [harold.Custom('ES_ElLa')] [harold.GetTitledFirstName|l] tomou o trono, e seus inimigos, [william.Custom('ES_ElLa')] [william.GetTitledFirstName|l] e [harald.Custom('ES_ElLa')] [harald.GetTitledFirstName|l] tramam sua queda.\n\nSó espero que, seja qual for a turbulência trazida pelos próximos dias, ela mantenha-se longe da minha família e de nossas terras."
 ep3_laamps.5999.a: "Devo ficar de olho na situação."
 ep3_laamps.5999.b: "Meu destino não está na Inglaterra."
 ep3_laamps.5999.b.tt: "Adiciona uma nova [task_contract|lE]"
 ep3_laamps.6000.t: "Destino"
 ep3_laamps.6000.intro: "Viro a carta em minhas mãos, sentindo sua superfície áspera, o selo de cera e o emblema estampado nela. O emblema de [ROOT.Char.GetHouse.GetBaseName]. Corto o selo e começo a ler.\n\nAs notícias são realmente sombrias."
 ep3_laamps.6000.body.alive: "Meu irmão [brother.GetFirstName] está vivo — e de fato é a mão dele que escreveu esta missiva — mas os rumores vindos da Normandia se provaram verdadeiros."
 ep3_laamps.6000.body.dead: "Meu irmão, [brother.GetFirstName], jaz morto; diz-se que [brother.GetDeathReasonHideKiller] e os rumores vindos da Normandia provaram ser verdadeiros."
 ep3_laamps.6000.desc: "\n\n[harold.GetFirstName] de [harold.GetHouse.GetBaseName] foi deposto[harold.Custom('ES_OA')] à força e agora está morto ou se escondendo. [Select_CString( william.IsFemale, 'A duquesa', 'O duque' )] [william.GetFirstName], antes [william.Custom('ES_ElLa')] pretendente [Select_CString( william.IsFemale, 'bastarda', 'bastardo' )] ao trono inglês, agora é [william.Custom('ES_ElLa')] [william.GetTitledFirstNameNoTooltip|l] de [william.GetPrimaryTitle.GetNameNoTier] e já começou a repartir terras entre seus seguidores, arrancando-as dos derrotados [ROOT.Char.GetCulture.GetCollectiveNoun].\n\n"
 ep3_laamps.6000.closing.alive: "Meu irmão pede ajuda..."
 ep3_laamps.6000.closing.dead: "Minha família está em ruínas..."
 ep3_laamps.6000.a: "Não abandonarei minha família em sua hora de necessidade!"
 ep3_laamps.6000.a.dead: "Não abandonarei minha herança legítima!"
 ep3_laamps.6000.a.flavor: "Traçar um caminho para minha terra natal."
 ep3_laamps.6000.a.tt: "Começar a viajar para [ely.GetName]"
 ep3_laamps.6000.b: "Já faz muito tempo que não sou um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetHouse.GetBaseNameNoTooltip]."
 ep3_laamps.6000.b.tt: "@alert_icon!#alert_trial Não haverá como voltar atrás, uma vez que este caminho for escolhido...#!"
 ep3_laamps.6001.t: "Lar Doce Lar?"
 ep3_laamps.6001.desc: "No instante em que piso nas antigas terras da minha família, sei que algo está errado. Um volume disforme surge através da neblina, um poste fino se ergue acima dele. Mais um passo à frente, e...\n\nA cabeça de [brother.GetFirstName], meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('brother'))] [brother.GetFirstName] está empalada numa estaca, e o resto do corpo jaz embaixo, num amontoado amassado e salpicado de sangue.\n\n\"Quem é você?\" A voz, com um sotaque que não reconheço, me surpreende. Viro-me para ver um[frederick.Custom('ES_XA')] [frederick.GetWomanMan] que limpa os respingos de sangue da arma em suas mãos, com uma sobrancelha erguida diante da minha presença. \"Se veio pelo corpo, eu não vou pagar para levá-lo embora\".\n\nOlho de volta para o corpo quebrado e retorcido do meu irmão."
 ep3_laamps.6001.a: "\"Você vai morrer pelo que fez aqui.\""
 ep3_laamps.6001.b: "\"Você tem uma única chance de correr, seu miserável.\""
 ep3_laamps.6001.b.one: "[frederick.Custom('ES_ElLa')|U] [frederick.GetWomanMan] foge"
 ep3_laamps.6001.b.one.tt: "Você recupera o corpo de [brother.GetFirstNameNoTooltip] sem ser perturbado"
 ep3_laamps.6001.b.two: "[frederick.Custom('ES_ElLa')|U] [frederick.GetWomanMan] avança contra você, com a arma erguida"
 ep3_laamps.6001.b.two.tt: "Um [single_combat_duel|lE] começa"
 ep3_laamps.6003.t: "Um Prato Melhor Servido..."
 ep3_laamps.6003.desc: "Passo com desprezo sobre o cadáver retorcido de [frederick.GetFirstName] e volto ao corpo de [brother.GetFirstName]. Com o tempo, será cavada uma cova, realizado um ofício fúnebre e uma cerimônia para lembrar sua vida cruelmente curta. Por ora, a noite cai, e eu me sento para rememorar.\n\nEra um[brother.Custom('ES_XA')] [brother.GetWomanMan] pacífic[brother.Custom('ES_OA')]. Não foi justo que alguém que só queria viver a própria vida sem ser ferido sofresse tal destino. Sem que eu pedisse, uma constatação me vem à mente.\n\nOs [frederick.GetCulture.GetCollectiveNoun]. [brother.GetFirstNameNoTooltip] estaria vivo[brother.Custom('ES_OA')] se não fosse por eles. Haverá mil irmãos, mil irmãs, mil pais e mães, filhos e filhas por #EMP toda#! a terra por causa daqueles... \n\n#EMP Condenados [frederick.GetCulture.GetCollectiveNounNoTooltip].#!"
 ep3_laamps.6003.a: "\"Eu vou te vingar, irmão. Isto eu prometo.\""
 ep3_laamps.6003.b: "O primeiro de muitos reparos aguarda."
 ep3_laamps.6003.b.flavor: "Aquela imundície que matei parecia ter pelo menos alguma riqueza para seu nome..."
 ep3_laamps.6003.b.tt: "Adquirir um [artifact|lE] bugiganga"
 ep3_laamps.6005.t: "De Volta aos Pântanos"
 ep3_laamps.6005.desc: "Faz muitos anos desde a última vez que pisei estas terras. Um passo nada pesado, e por bons motivos. Até agora, o solo pantanoso ainda suga minhas botas.\n\nEstas terras — meu lar — são chamadas de \"[Glossary( 'los Fens', 'FENS_GLOSS' )]\" há muitas gerações. De fato, as águas sobem tanto em certas áreas que Ely chega a ser tecnicamente uma ilha.\n\nNão há tempo a perder. Especialmente agora que es[william.Custom('ES_EA')] canalha normanda[william.Custom('ES_OA')] aperta seu controle sobre a boa terra anglo-saxônica. Para oferecer qualquer resistência, precisaremos das duas forças vitais de qualquer guerra: dinheiro e homens."
 ep3_laamps.6005.a: "Devemos primeiro encher os cofres, por qualquer meio necessário."
 ep3_laamps.6005.a.tt: "Acho que avisto um nobre mal defendido trotando por ali mesmo agora..."
 ep3_laamps.6005.b: "Talvez um cavaleiro local possa ser persuadido a se juntar à minha causa?"
 ep3_laamps.6005.b.tt: "E, sendo local, talvez eles tenham um bom conhecimento de como navegar melhor por este terreno..."
 every_fenland_holding: "Cada [holding|lE] em Os Fens"
 FENS_GLOSS: "As férteis terras pantanosas ao redor de The Wash são conhecidas localmente como “os Fens”. Elas abrigam muitas das igrejas e catedrais mais notáveis da Inglaterra.\n\nÉ geralmente aceito que os Fens contêm os seguintes [baronies|lE]:\n\n$EFFECT_LIST_BULLET$[GetTitleByKey('b_lynn').GetBaseName]\n$EFFECT_LIST_BULLET$[GetTitleByKey('b_cambridge').GetBaseName]\n$EFFECT_LIST_BULLET$[GetTitleByKey('b_radfield').GetBaseName]\n$EFFECT_LIST_BULLET$[GetTitleByKey('b_papworth').GetBaseName]\n$EFFECT_LIST_BULLET$[GetTitleByKey('b_ely').GetBaseName]\n$EFFECT_LIST_BULLET$[GetTitleByKey('b_hurstingstone').GetBaseName]\n$EFFECT_LIST_BULLET$[GetTitleByKey('b_norman_cross').GetBaseName]\n$EFFECT_LIST_BULLET$[GetTitleByKey('b_stamford').GetBaseName]\n$EFFECT_LIST_BULLET$[GetTitleByKey('b_boston').GetBaseName]\n$EFFECT_LIST_BULLET$[GetTitleByKey('b_peterborough').GetBaseName]"
 ep3_laamps.6010.t: "[powerful_vassal.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 ep3_laamps.6010.desc: "Ouvi falar de suas proezas e do bom trabalho que você está fazendo em Os Fens.\n\nGostaria que você se juntasse a mim em [powerful_vassal_capital.GetName]: temos muito o que discutir."
 ep3_laamps.6010.a: "Você pode contar comigo nos próximos dias."
 ep3_laamps.6010.a.flavor: "[powerful_vassal_capital.GetNameNoTooltip], é? Melhor eu começar a me organizar."
 ep3_laamps.6010.a.tt: "Você parte para [powerful_vassal_capital.GetNameNoTooltip]."
 ep3_laamps.6010.b: "Sigo meu próprio caminho."
 ep3_laamps.6015.t: "Por Inglaterra"
 ep3_laamps.6015.desc: "[powerful_vassal.Custom('ES_ElLa')|U] [powerful_vassal.GetTitledFirstNameRegnal], [Select_CString( powerful_vassal.IsFemale, 'a mais poderosa', 'o mais poderoso' )] entre os demais nobres [powerful_vassal.GetCulture.GetName], me recebeu de braços abertos. Durante nossas conversas, o assunto raramente se desviou do óbvio.\n\n\"Aqui no alto, não é novidade sermos governados por estrangeiros\", comenta [powerful_vassal.GetFirstNameNoTooltip], com um sorriso irônico diante da própria leveza, com os dedos unidos em intenção. \"Afinal, nossos pais estiveram sujeitos a mais de um dinamarquês. Mas isso... isso é diferente\".\n\n\"Pretendo desafiar est[william.Custom('ES_EA')] #EMP [william.GetFirstNameNoTooltip]#!\". [powerful_vassal.GetFirstNameNoTooltip] pronuncia o nome com veneno, \"mas preciso de apoio. A lealdade de quase todos é frágil\". Eleva os olhos aos meus.\n\n\"Posso contar com sua ajuda?\"."
 ep3_laamps.6015.a: "Você tem meu apoio."
 every_direct_vassal_william: "Todo [direct_vassal|lE] normando [william.Custom('ES_DelDela')] [william.GetFirstNameRegnal|l]"
 every_anglo_noble: "Cada [noble|lE] anglo-saxão"
 ep3_laamps.6015.b: "Preciso de mais tempo."
 ep3_laamps.6016.t: "Um Fim Inauspicioso"
 ep3_laamps.6016.frustrated: "\"Não temos tempo!\", [powerful_vassal.GetFirstName|U] bate na mesa para reforçar suas palavras, um lampejo de raiva surge em seu rosto. \"Mesmo agora há rumores de represálias. Quanto mais demorarmos, mais tempo terá [william.GetFirstNameNoTooltip] para reunir apoios.\"\n\n#EMP Devemos#! nos mover com rapidez. Tomem o tempo que precisarem, mas só posso implorar que escolham o seu lado enquanto ainda puderem.\n\n"
 ep3_laamps.6016.happy: "\"Excelente! Maravilhoso!\" [powerful_vassal.GetFirstName] dá um tapa na mesa em alívio. \"Mal consigo imaginar alguém melhor para pegar em armas ao meu lado\". Estende as mãos e segura as minhas entre as suas.\n\n\"[Select_CString(And(ROOT.Char.IsFemale, powerful_vassal.IsFemale),'Juntas','Juntos')] podemos arrancar estas terras das mãos daquela serpente normanda. Agora, precisamos ser rápidos…\"\n\n"
 ep3_laamps.6016.ending: "[powerful_vassal.GetFirstNameNoTooltip] volta a abrir a boca, mas a porta se abrindo de repente interrompe sua intenção de imediato. Um mensageiro, encharcado e de olhos arregalados, corta a reação indignada de [powerful_vassal.GetFirstNameNoTooltip] erguendo uma carta.\n\nEspero que [powerful_vassal.GetFirstNameNoTooltip] rompa o selo e examine o pergaminho.\n\nO rosto dele empalidece aos poucos."
 ep3_laamps.6016.a: "\"O que é?\""
 ep3_laamps.6016.a.tt: "Você pega a missiva oferecida..."
 ep3_laamps.6020.t: "A Destruição do Norte"
 ep3_laamps.6020.desc: "A instauração de [Select_CString( william.IsFemale, 'uma nova rainha', 'um novo rei' )] estrangeir[william.Custom('ES_OA')], — e ainda por cima um[william.Custom('ES_XA')] bastardo[william.Custom('ES_OA')] de sangue [william.GetCulture.GetName], nada menos— provou ser suficiente para partir a corda desgastada que mantinha a Inglaterra unida. Os levantes locais, patrocinados e inflamados pelos derrotados e ressentidos [Glossary( 'Æthelings', 'AETHELINGS_GLOSS' )] anglo-saxões, espalharam-se pelo país como fogo em palha seca.\n\n[william.Custom('ES_ElLa')|U] [william.GetTitledFirstName|l], tendo garantido sua base de poder no sul, agora olha para o norte para pacificar aqueles tão corajosos quanto tolos a ponto de desafiá-[william.Custom('ES_LoLa')]. Para onde quer que seu olhar recaia, virão morte e destruição, e uma luta desesperada pela terra se desenvolveu.\n\n[william.GetFirstName] terá de trilhar uma linha tênue entre a luva de veludo e a mão de ferro. Um toque leve demais pode fazer com que perca o reino, mas uma retaliação brutal demais não deixará muito reino para governar.\n\nPara os Æthelings, só resta a morte ou a glória."
 ep3_laamps.6020.a: "A Inglaterra está em jogo."
 AETHELINGS_GLOSS: "\"Ætheling\" é um termo anglo-saxão usado para designar qualquer anglo-saxão de nascimento nobre, e o prefixo 'Æthel' era frequentemente anexado a seus nomes."
 every_aetheling: "Todo [vassal|lE] $anglo_saxon$ [william.Custom('ES_DelDela')] [william.GetTitledFirstName|l]"
 every_county: "Cada [county|lE]"
 ep3_laamps.6021.desc: "Minha legítima ascensão ao trono da Inglaterra provou ser suficiente para romper a corda desgastada que mantinha o reino unido. Os levantes locais, patrocinados e atiçados pelos derrotados e ressentidos [Glossary( 'Æthelings', 'AETHELINGS_GLOSS' )] anglo-saxões, se espalham pelo país como fogo selvagem.\n\nCom minha base de poder no sul assegurada, agora devo olhar para o norte para pacificar aqueles valentes e tolos o bastante para se opor a mim. Onde quer que meu olhar caia, morte e destruição virão em seguida, para que minha posição não seja usurpada pelos habitantes locais maquiavélicos.\n\nPreciso caminhar numa linha tênue entre a delicadeza e a mão de ferro. Um toque leve demais me fará perder meu reino, mas ser brutal demais na retaliação me deixará com pouco reino para governar. Quanto aos Æthelings...\n\nNão deve haver misericórdia para aqueles que não entregarem sua lealdade."
 ep3_laamps.7000.t: "Outro Caminho"
 ep3_laamps.7000.desc: "Com tanta turbulência tomando conta das terras de [england.GetName], às vezes me pergunto se meu destino não estará em outro lugar.\n\nA agitação já começou, com [william.Custom('ES_ElLa')] [william.GetTitledFirstName|l] lutando pelo controle do reino, e suspeito que ficará ainda pior do que já está, e uma vida na estrada, seguindo os passos de meu pai, tem um certo apelo.\n\nTalvez eu possa ir para o norte, para a Escócia? Ou talvez para o sul da Itália, nos contrafortes da Apúlia?"
 ep3_laamps.7000.a: "A Escócia parece um plano."
 ep3_laamps.7000.b: "Já posso sentir o gosto do azeite apuliano!"
 ep3_laamps.7000.c: "Não devo negligenciar meus deveres."
 ep3_laamps.7001.t: "Há Outro"
 ep3_laamps.7001.desc: "\"[ROOT.Char.GetFirstNameNoTooltip]? É aqui que [ROOT.Char.GetFirstNameNoTooltip] mora? Ah, soltem-me, seus...\" Uma voz estrondosa anuncia a chegada de uma visita, rapidamente cercada pelos meus guardas. Saio da tenda e vejo um[siward.Custom('ES_XA')] [siward.GetWomanMan] robust[siward.Custom('ES_OA')] com uma espada apoiada no ombro.\n\n\"Você! Você é [ROOT.Char.GetFirstNameNoTooltip], não é?\" Confirmo com um aceno enquanto [siward.GetSheHe] dá um passo à frente, oferecendo o braço livre.\n\n\"Sua fama o precede! Sou [siward.GetFirstName], da Casa [siward.GetHouse.GetBaseName]. Vim me juntar a você.\""
 ep3_laamps.7001.a: "\"[siward.GetFirstNameNoTooltip], é? Bem-vindo!\""
 ep3_laamps.7001.b: "\"Estamos cheios, receio.\""
 ep3_laamps.7002.t: "Uma Nova Inglaterra"
 ep3_laamps.7002.desc: "[siward.GetFirstName], meu leal [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('siward'))], se aproxima de mim com um certo brilho no olhar.\n\n\"Vim me despedir.\" Ele/Ela ergue a mão para cortar minhas protestas antes que eu possa dizer qualquer coisa. \"Já tomei minha decisão, não há como me dissuadir.\" Ele/Ela faz um gesto para que eu me sente.\n\n\"Há rumores vindos de Constantinopla. [emperor.Custom('ES_ElLa')|U] [emperor.GetTitledFirstName|l] oferece passagem segura a todos os refugiados da ira de [king_england.Custom('ES_DelDela')] [king_england.GetTitledFirstName|l], e uma chance de recomeçar\". [siward.GetFirstNameNoTooltip] dá tapinhas nas próprias coxas e olha ao redor.\n\n\"Vou sentir falta deste lugar. Adeus, meu/minha [ROOT.Char.Custom('SisterBrother')]\"."
 ep3_laamps.7002.a: "\"Boas viagens. Que você encontre sua paz.\""
 ep3_laamps.7002.b: "Agora isso soa #EMP muito#! interessante..."
 ep3_laamps.7002.c.success: "[siward.GetFirstNameNoTooltip] fica"
 ep3_laamps.7002.c.failure: "[siward.GetFirstNameNoTooltip] vai embora"
 ep3_laamps.7003.t: "Uma Audiência Regal"
 ep3_laamps.7003.desc: "Receber uma audiência com [emperor.Custom('ES_ElLa')] [emperor.GetTitleAsNameNoTooltip|l] não é pouca coisa, mas está claro que minha chegada com meu bando maltrapilho de estrangeiros despertou alguns cochichos.\n\n\"Dou as boas-vindas a você, [ROOT.Char.GetFirstName] de [ROOT.Char.GetHouse.GetBaseName]. Veio reivindicar refúgio diante das aflições de sua terra natal?\". Só consigo fazer um aceno atônito; [emperor.Custom('ES_ElLa')] [emperor.GetTitleAsNameNoTooltip|l] oferece um sorriso sombrio, sem humor. \"Você estará seguro aqui, mas coisas maiores estão ao seu alcance\".\n\n\"Ao nordeste há terras governadas por um meu vassalo de coração falso. Viajai para lá, tomem-nas para si e poderão mantê-las em troca de sua fidelidade\".\n\nAs palavras [emperor.Custom('ES_DelDela')] [emperor.GetTitleAsNameNoTooltip|l] ecoam entre exclamações abafadas. Um novo domínio? Para fugitivos como nós?"
 ep3_laamps.7003.a: "Aceito vossa proposta, poderos[emperor.Custom('ES_OA')] [emperor.GetTitleAsNameNoTooltip|l]."
 ep3_laamps.7003.a.tt: "Você parte para as novas terras..."
 ep3_laamps.7003.b: "\"Prefiro ficar aqui, em Constantinopla.\""
 ep3_laamps.7004.t: "Outra Audiência Regal"
 ep3_laamps.7004.desc: "\"Ele mandou vocês para cá, não é? E disse que estas terras eram dele, não foi?\". Os lábios de [title_holder.GetFirstName] se contraem em ira e desprezo. \"Vocês foram enganados, tolos\".\n\nAo que parece, o Império de [emperor.Custom('ES_DelDela')] [emperor.GetTitleAsNameNoTooltip|l] não se estende tanto quanto ele fez parecer. As terras que descobrimos ao chegar — densamente arborizadas, mas surpreendentemente férteis — não estavam de forma alguma em mãos gregas, mas sim nas de [title_holder.Custom('ES_DelDela')] [title_holder.GetTitleAsNameNoTooltip|l] [title_holder.GetFirstNameNoTooltip].\n\n\"Aquele[emperor.Custom('ES_EA')] canalha em seu trono luxuoso os desviou do caminho. Mas...\", pausa para olhar para mim e para meus seguidores, esfarrapados mas cheios de espírito. \"... talvez #EMP possa#! oferecer algo. Se tiverem o dinheiro para pagar, podem ficar com estas terras. Como [Select_CString( ROOT.Char.IsFemale, 'minha vassala', 'meu vassalo' )], é claro\"."
 ep3_laamps.7004.a: "\"Eu ficaria honrado.\""
 ep3_laamps.7004.b: "\"Essas terras me foram prometidas. Eu as tomarei pela força.\""
 ##################################################
 #LOANED COURTIER RETURNS
 ep3_laamp_flavour_ewan.9511.t: "Seguidor[visitor.Custom('ES_XA')] retornad[visitor.Custom('ES_OA')]: [visitor.GetTitledFirstNameNicknamedNoTooltip|l]"
 ep3_laamp_flavour_ewan.9511.desc.intro: "Após anos longe com [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l], meu leal seguidor[visitor.Custom('ES_XA')] [visitor.GetFirstNameNicknamed] finalmente conseguiu voltar para nós.\n\n"
 ep3_laamp_flavour_ewan.9511.desc.spouse.got_married: "Embora não tenha mudado muito desde que partiu de [ROOT.Char.GetPrimaryTitle.GetDefinitiveName], parece que #EMP ha#! arranjou um[visitor_spouse.Custom('ES_XA')] [visitor_spouse.Custom('WifeHusband')] de [capital.GetBaseNameNoTier]: [visitor_spouse.GetFirstName], que acompanha seu [visitor.Custom('WifeHusband')] de volta ao acampamento."
 ep3_laamp_flavour_ewan.9511.desc.spouse.nope: "[visitor.GetFirstNameNoTooltip] quase não mudou desde o dia em que deixou [ROOT.Char.GetPrimaryTitle.GetDefinitiveName], para o bem ou para o mal, e está simplesmente feliz por estar de volta entre companhia familiar."
 ep3_laamp_flavour_ewan.9511.desc.outro: "\n\nVelhos amigos e rostos novos se acotovelam para ver [visitor.Custom('ES_AlAla')] retornad[visitor.Custom('ES_OA')], todos igualmente felizes com uma boa notícia inesperada."
 ep3_laamp_flavour_ewan.9511.a: "Bem-vindo, bem-vindo!"
 ep3_laamp_flavour_ewan.9511.b: "#EMP Casad[visitor.Custom('ES_OA')]?#! Não mesmo!"
 ep3_laamp_flavour_ewan.9511.c: "Você não é mais necessário. Vá embora."
 ep3_laamp_flavour_ewan.9512.t: "Seguidor[visitor.Custom('ES_OA')] retorna aprimorad[visitor.Custom('ES_OA')]: [visitor.GetTitledFirstNameNicknamedNoTooltip|l]"
 ep3_laamp_flavour_ewan.9512.desc: "\"[ROOT.Char.GetTitledFirstNameNoTooltip]!\", grita a voz semifamiliar de [visitor.GetFirstName] ao entrar no acampamento depois de passar alguns anos em [ROOT.Char.GetPrimaryTitle.GetDefinitiveName]. \"Voltei, e não fiquei de braços cruzados durante meu exílio!\".\n\nDe fato; parece que seu tempo com [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] lhe deu muitas oportunidades para praticar suas habilidades, algo que [visitor.GetFirstNameNoTooltip] parece ansioso para colocar em prática agora que voltou para junto de nós."
 ep3_laamp_flavour_ewan.9512.a: "Como você cresceu, [visitor.GetFirstNameNoTooltip]!"
 ep3_laamp_flavour_ewan.9512.b: "Vá embora, vagabund[visitor.Custom('ES_OA')]."
 ep3_laamp_flavour_ewan.9521.t: "Não É Como Eu Me Lembro de Você: [visitor.GetTitledFirstNameNicknamedNoTooltip|l]"
 ep3_laamp_flavour_ewan.9521.desc.intro: "Depois de alguns anos longe de nós, meu seguidor[visitor.Custom('ES_XA')] [visitor.GetTitledFirstNameNicknamed|l] retornou finalmente.\n\nMas… não está exatamente como nos deixou."
 ep3_laamp_flavour_ewan.9521.desc.source.host: "Parece que o tempo que passou com [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] deixou uma marca indelével em seus modos e personalidade; agora parece ser muito mais da cultura [new_culture.GetName] do que da [old_culture.GetName].\n\n"
 ep3_laamp_flavour_ewan.9521.desc.source.capital: "Está claro que os dias em [capital.GetBaseNameNoTier] foram formativos, pois todo rastro de sua antiga maneira [old_culture.GetName] desapareceu, substituído pela fala e pelos modos dos [new_culture.GetCollectiveNoun].\n\n"
 ep3_laamp_flavour_ewan.9521.desc.reaction.changed_away: "Sendo [old_culture.GetNameNoTooltip] eu mesmo, essa mudança é... inquietante."
 ep3_laamp_flavour_ewan.9521.desc.reaction.changed_to: "É claro, sendo eu também da cultura [new_culture.GetNameNoTooltip] , eu poderia ter [visitor.GetHerHim] educado perfeitamente bem #EMP sin#! sem precisar passar anos longe de nós."
 ep3_laamp_flavour_ewan.9521.desc.reaction.uninvolved: "É estranho ver como [visitor.GetHerHim] mudou com o tempo, mas suponho que todos passamos por períodos de transição."
 ep3_laamp_flavour_ewan.9521.desc.outro: "\n\nA [visitor.GetFirstNameNoTooltip] não parece se perturbar com sua metamorfose, simplesmente contente por estar de volta ao acampamento."
 ep3_laamp_flavour_ewan.9521.tt.primary_skill.diplomacy: "Ganhou [skill_1.GetValue|V0] [skill|lE] de [diplomacy|lE] ao aprender a adotar a [ethos|lE] [new_culture.GetName]"
 ep3_laamp_flavour_ewan.9521.tt.primary_skill.martial: "Ganhou [skill_1.GetValue|V0] [skill|lE] de [martial|lE] ao aprender a adotar a [ethos|lE] [new_culture.GetName]"
 ep3_laamp_flavour_ewan.9521.tt.primary_skill.stewardship: "Ganhou [skill_1.GetValue|V0] [skill|lE] de [stewardship|lE] ao aprender a adotar a [ethos|lE] [new_culture.GetName]"
 ep3_laamp_flavour_ewan.9521.tt.primary_skill.learning: "Ganhou [skill_1.GetValue|V0] [skill|lE] de [learning|lE] ao aprender a adotar a [ethos|lE] [new_culture.GetName]"
 ep3_laamp_flavour_ewan.9521.tt.secondary_skill.diplomacy: "Ganhou [skill_2.GetValue|V0] [skill|lE] de [diplomacy|lE] ao aprender a adotar a [ethos|lE] [new_culture.GetName]"
 ep3_laamp_flavour_ewan.9521.tt.secondary_skill.stewardship: "Ganhou [skill_2.GetValue|V0] [skill|lE] de [stewardship|lE] ao aprender adotar a [ethos|lE] [new_culture.GetName]"
 ep3_laamp_flavour_ewan.9521.tt.secondary_skill.intrigue: "Ganhou [skill_2.GetValue|V0] [skill|lE] de [intrigue|lE] ao aprender a adotar a [ethos|lE] [new_culture.GetName]"
 ep3_laamp_flavour_ewan.9521.tt.secondary_skill.learning: "Ganhou [skill_2.GetValue|V0] [skill|lE] de [learning|lE] ao aprender a adotar a [ethos|lE] [new_culture.GetName]"
 ep3_laamp_flavour_ewan.9521.tt.secondary_skill.prowess: "Ganhou [skill_2.GetValue|V0] [skill|lE] de [prowess|lE] ao aprender a adotar a [ethos|lE] [new_culture.GetName]"
 ep3_laamp_flavour_ewan.9521.a.changed_away: "Peculiar, mas você ainda é um de nós!"
 ep3_laamp_flavour_ewan.9521.a.changed_to: "Uma decisão sensata!"
 ep3_laamp_flavour_ewan.9521.a.uninvolved: "Bem-vind[visitor.Custom('ES_OA')] de volta!"
 ep3_laamp_flavour_ewan.9521.b: "Não precisamos de algum/a #EMP [visitor.GetCulture.GetNameNoTooltip]#! estranho/a, saia fora."
 ep3_laamp_flavour_ewan.9522.t: "$ep3_laamp_flavour_ewan.9521.t$"
 ep3_laamp_flavour_ewan.9522.desc.intro: "Embora tenha levado vários longos anos, por fim meu antigo[visitor.Custom('ES_OA')] seguidor[visitor.Custom('ES_XA')] [visitor.GetTitledFirstNameNicknamed|l] conseguiu encontrar o caminho de volta para [ROOT.Char.GetPrimaryTitle.GetDefinitiveName].\n\nSó que... algo mudou —"
 ep3_laamp_flavour_ewan.9522.desc.source.host: "Fala da divindade [new_faith.GetAdjective] [new_faith.CreatorName] de seu [host.GetTitledFirstName|l] com reverência e afirma ter encontrado a verdadeira salvação nos ensinamentos de [new_faith.GetNameNoTooltip|l]"
 ep3_laamp_flavour_ewan.9522.desc.source.capital: "Fala da luz de [new_faith.GetName|l] e das crenças de [capital.GetBaseNameNoTier] com reverência, e afirma ter encontrado a verdadeira salvação nas ensinanças de [new_faith.HighGodNamePossessive]"
 ep3_laamp_flavour_ewan.9522.desc.source.bridge: "em vez do/a [old_faith.GetAdherentName] que deixamos para trás.\n\n"
 ep3_laamp_flavour_ewan.9522.desc.reaction.give_a_shit: "Não que isso importe tanto para mim quanto para alguns, mas ainda assim, é surpreendente."
 ep3_laamp_flavour_ewan.9522.desc.reaction.changed_away: "Abandonar o modo de vida [old_faith.GetAdherentNameNoTooltip] e descartar nossas tradições mais sagradas como uma capa jogada ao chão é quase impensável."
 ep3_laamp_flavour_ewan.9522.desc.reaction.changed_to_ours: "Naturalmente, estou exultante ao saber de sua escolha correta, abraçando a salvação e o verdadeiro sentido da existência com [new_faith.HighGodName]."
 ep3_laamp_flavour_ewan.9522.desc.reaction.changed_to_lovable: "Embora a escolha tenha me surpreendido, não posso dizer que [new_faith.GetNameNoTooltip|l] seja uma má maneira de viver. [ROOT.Char.GetFaith.GetName|l] pensa muito bem disso, afinal."
 ep3_laamp_flavour_ewan.9522.desc.reaction.changed_to_acceptable: "Não posso afirmar saber o que motivou sua escolha, mas pelo menos o [new_faith.GetNameNoTooltip|l] é uma fé mais aceitável do que muitas neste mundo sem Deus."
 ep3_laamp_flavour_ewan.9522.desc.reaction.uninvolved: "Sendo eu também de fé [ROOT.Char.GetFaith.GetAdjective], a conversão não significa #EMP demasiado#! para mim, mas certamente é inesperada."
 ep3_laamp_flavour_ewan.9522.desc.outro: "\n\n[visitor.GetFirstNameNoTooltip], sem se preocupar com o alvoroço que anuncia seu retorno e as mudanças repentinas, limita-se a seguir com seus afazeres, como se jamais tivesse partido."
 ep3_laamp_flavour_ewan.9522.a: "Bem-vind[visitor.Custom('ES_OA')]; [visitor.Custom('SisterBrother')]!"
 ep3_laamp_flavour_ewan.9522.b: "Mas por que se converter a [new_faith.GetNameNoTooltip|l]..."
 ep3_laamp_flavour_ewan.9522.c: "O que fizestes, insensat[visitor.Custom('ES_OA')]?!"
 ep3_laamp_flavour_ewan.9522.d: "[old_faith.GetAdherentNameNoTooltip], [new_faith.GetAdherentNameNoTooltip|l], você ainda é [visitor.GetFirstNameNoTooltip]."
 ep3_laamp_flavour_ewan.9522.e: "Bom ter você de volta, [visitor.GetFirstNameNoTooltip]."
 ep3_laamp_flavour_ewan.9522.f: "Já não sois bem-vind[visitor.Custom('ES_OA')] aqui."
 ep3_laamp_flavour_ewan.9523.t: "$ep3_laamp_flavour_ewan.9521.t$"
 ep3_laamp_flavour_ewan.9523.desc.intro: "$ep3_laamp_flavour_ewan.9522.desc.intro$ fala e se veste mais como os [new_culture.GetCollectiveNoun] com quem esteve, e afirma ter encontrado a luz da única fé verdadeira [new_faith.GetAdjective] de"
 ep3_laamp_flavour_ewan.9523.desc.source.host: "seu [Select_CString( host.IsFemale, 'anfitriona', 'anfitrión' )], [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l]"
 ep3_laamp_flavour_ewan.9523.desc.source.capital: "[capital.GetBaseNameNoTier]"
 ep3_laamp_flavour_ewan.9523.desc.source.bridge: "em vez de [old_faith.GetAdherentName|l] que deixamos para trás.\n\n"
 ep3_laamp_flavour_ewan.9523.desc.reaction.give_a_shit: "$ep3_laamp_flavour_ewan.9522.desc.reaction.give_a_shit$"
 ep3_laamp_flavour_ewan.9523.desc.reaction.changed_away: "$ep3_laamp_flavour_ewan.9522.desc.reaction.changed_away$"
 ep3_laamp_flavour_ewan.9523.desc.reaction.changed_to_ours: "$ep3_laamp_flavour_ewan.9522.desc.reaction.changed_to_ours$"
 ep3_laamp_flavour_ewan.9523.desc.reaction.changed_to_lovable: "$ep3_laamp_flavour_ewan.9522.desc.reaction.changed_to_lovable$"
 ep3_laamp_flavour_ewan.9523.desc.reaction.changed_to_acceptable: "$ep3_laamp_flavour_ewan.9522.desc.reaction.changed_to_acceptable$"
 ep3_laamp_flavour_ewan.9523.desc.reaction.uninvolved: "$ep3_laamp_flavour_ewan.9522.desc.reaction.uninvolved$"
 ep3_laamp_flavour_ewan.9523.desc.outro: "$ep3_laamp_flavour_ewan.9522.desc.outro$"
 ep3_laamp_flavour_ewan.9523.a: "$ep3_laamp_flavour_ewan.9522.a$"
 ep3_laamp_flavour_ewan.9523.b: "$ep3_laamp_flavour_ewan.9522.b$"
 ep3_laamp_flavour_ewan.9523.c: "$ep3_laamp_flavour_ewan.9522.c$"
 ep3_laamp_flavour_ewan.9523.d: "$ep3_laamp_flavour_ewan.9522.d$"
 ep3_laamp_flavour_ewan.9523.e: "$ep3_laamp_flavour_ewan.9522.e$"
 ep3_laamp_flavour_ewan.9523.f: "$ep3_laamp_flavour_ewan.9522.f$"
 ep3_laamp_flavour_ewan.9531.t: "Seguidor Ausente: [visitor.GetTitledFirstNameNicknamedNoTooltip|l]"
 ep3_laamp_flavour_ewan.9531.desc: "Já se passaram anos e está claro que meu seguidor[visitor.Custom('ES_XA')] ausente, [visitor.Custom('ES_ElLa')] [visitor.GetTitledFirstNameNicknamed|l] não voltará.\n\nAlgo na falta de notícias me diz que ele morreu durante sua estada, embora eu não saiba bem por quê.\n\nNão há que continuar esperando seu retorno."
 ep3_laamp_flavour_ewan.9531.tt.follower_is_dead: "[visitor.Custom('ES_ElLa')|U] [visitor.GetTitledFirstName|l] morreu enquanto estava longe do [camp|lE]"
 ep3_laamp_flavour_ewan.9531.a: "E pensar que jamais veremos[visitor.GetHerHim]…"
 ep3_laamp_flavour_ewan.9531.b: "#EMP Eh.#!"
 ep3_laamp_flavour_ewan.9532.t: "$ep3_laamp_flavour_ewan.9531.t$"
 ep3_laamp_flavour_ewan.9532.desc: "Embora meu seguidor[visitor.Custom('ES_XA')] [visitor.Custom('ES_ElLa')] [visitor.GetTitledFirstNameNicknamed|l] esteja longe de nós há anos, esperávamos que [visitor.GetSheHe] retornasse relativamente em breve.\n\nAi de nós, um mensageiro informa que isso é impossível: parece que [visitor.GetSheHe] está pres[visitor.Custom('ES_OA')] pel[imprisoner.Custom('ES_ElLa')] infame [imprisoner.GetTitledFirstName|l]! Se quisermos ver [visitor.GetHerHim] novamente, teremos de pagar um resgate."
 ep3_laamp_flavour_ewan.9532.a: "Devemos libertar [visitor.GetFirstNameNoTooltip]!"
 ep3_laamp_flavour_ewan.9532.b: "Por mim, que se [visitor.GetHerHim] fique."
 ep3_laamp_flavour_ewan.9533.t: "$ep3_laamp_flavour_ewan.9531.t$"
 ep3_laamp_flavour_ewan.9533.desc: "Depois de muitos anos longe, começamos a nos preocupar por [visitor.Custom('ES_ElLa')] [visitor.GetTitledFirstNameNicknamed|l]; a esta altura, já deveria ter voltado.\n\nMas, ah, parece que nossas preocupações eram bem fundamentadas, pois nesta tarde [visitor.GetFirstNameNoTooltip] chegou tropeçando ao acampamento e desabou, uma casca vazia na forma de [visitor.GetWomanMan]. Não sei explicar como isso pôde acontecer com ele e como conseguiu chegar até nós nessas condições.\n\nNo estado em que se encontra, [visitor.GetSheHe] também não pode."
 ep3_laamp_flavour_ewan.9533.tt.follower_is_incapable: "[visitor.GetTitledFirstName] foi deixad [GetTrait('incapable').GetName( GetNullCharacter )|l] enquanto estava longe de [camp|lE]"
 ep3_laamp_flavour_ewan.9533.a: "Mas o que diabos aconteceu com ele?"
 ep3_laamp_flavour_ewan.9533.b: "Não se preocupe, [visitor.GetFirstNameNoTooltip], cuidaremos de você."
 ep3_laamp_flavour_ewan.9533.c: "Expulse este[visitor.Custom('ES_EA')] imbecil antes que alguém [visitor.GetHerHim] veja."
 ep3_laamp_flavour_ewan.9534.t: "$ep3_laamp_flavour_ewan.9531.t$"
 ep3_laamp_flavour_ewan.9534.desc: "[visitor.Custom('ES_ElLa')|U] [visitor.GetTitledFirstNameNicknamed|l] já deveria ter voltado a esta altura.\n\n[visitor.GetSheHe|U] não deveria ter ficado fora por tanto tempo e, no entanto, [visitor.GetSheHe] não voltou nem enviou notícia por nenhum meio. Talvez [visitor.GetSheHe] tenha perdido nosso rastro e não consiga encontrá-lo novamente.\n\nSeja como for, parece claro que [visitor.GetFirstNameNoTooltip] jamais retornará para nós."
 ep3_laamp_flavour_ewan.9534.tt.follower_is_lost: "[visitor.Custom('ES_ElLa')|U] [visitor.GetTitledFirstName|l] se perdeu, não sabemos como nem onde, e não voltará ao [camp|lE]"
 ep3_laamp_flavour_ewan.9534.a: "Eu me pergunto o que terá acontecido com…"
 ep3_laamp_flavour_ewan.9541.t.nickname_gained: "Seguidor Ganha Apelido"
 ep3_laamp_flavour_ewan.9541.desc.nickname_gained: "As pessoas do acampamento deram a [eponymee.GetFirstName] um apelido baseado em sua [personality|lE] e [traits|lE].\n$EFFECT_LIST_BULLET$ Agora se [eponymee.Custom('ES_LeLa')] conhece como #V [eponymee.GetFirstNameNicknamed]#!"
 ep3_laamp_flavour_ewan.9541.t.dog_gained: "Seguidor Adota um Cão"
 ep3_laamp_flavour_ewan.9541.desc.dog_gained: "[pet_owner.GetFirstNameNicknamed] obteve um cão de estimação."
 ep3_laamp_flavour_ewan.9541.t.cat_gained: "Seguidor Adotado por um Gato"
 ep3_laamp_flavour_ewan.9541.desc.cat_gained: "[pet_owner.GetFirstNameNicknamed] agora é acompanhad por um pequeno felino."
 ep3_laamp_flavour_ewan.9541.t.opinion_gained: "Convívio Amigável"
 ep3_laamp_flavour_ewan.9541.desc.opinion_gained: "[follower_1.GetFirstNameNicknamed] e [follower_2.GetFirstNameNicknamed] estão se aproximando por terem pontos em comum."
 ep3_laamp_flavour_ewan.9541.t.opinion_lost: "Convívio Hostil"
 ep3_laamp_flavour_ewan.9541.desc.opinion_lost: "[follower_1.GetFirstNameNicknamed] e [follower_2.GetFirstNameNicknamed] estão brigando por suas diferenças."
 ep3_laamp_flavour_ewan.9541.t.stress_gained: "Uma Vida Difícil"
 ep3_laamp_flavour_ewan.9541.desc.stress_gained: "[stressee.GetFirstNameNicknamed] não está lidando bem com as dificuldades da vida agora."
 ep3_laamp_flavour_ewan.9541.t.stress_lost: "A Vida Tranquila"
 ep3_laamp_flavour_ewan.9541.desc.stress_lost: "[stressee.GetFirstNameNicknamed] aprecia a liberdade da vida na estrada."
