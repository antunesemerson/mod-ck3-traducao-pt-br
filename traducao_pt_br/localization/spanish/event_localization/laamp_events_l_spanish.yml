 ep3_laamp_flavour_ewan.4061.t: "Olhos na Noite"
 ep3_laamp_flavour_ewan.4061.desc.intro: "A manhã traz um relato de que uma besta devoradora de homens atacou novamente:"
 ep3_laamp_flavour_ewan.4061.desc.size.titanic: "três desaparecidos na noite passada, nada restou deles além de manchas vermelhas e as trilhas lamacentas de algo verdadeiramente titânico."
 ep3_laamp_flavour_ewan.4061.desc.size.colossal: "três desaparecidos na noite passada, nada sobrando além de fragmentos de osso e a maior parte de um braço, consumidos por algum monstro colossal."
 ep3_laamp_flavour_ewan.4061.desc.size.mammoth: "dois desaparecidos na noite passada, encontrados despedaçados e espalhados por meio milha por algum predador mamute."
 ep3_laamp_flavour_ewan.4061.desc.size.huge: "dois desaparecidos na noite passada, o que restou deles encontrado não muito longe do perímetro, apenas retalhos emaranhados de carne deixados por alguma besta enorme."
 ep3_laamp_flavour_ewan.4061.desc.size.large: "outro seguidor abatido, a maior parte do corpo do homem encontrada ao lado de [ROOT.Char.Custom('GetRandomCampBuilding')|l] onde o grande animal o deixou."
 ep3_laamp_flavour_ewan.4061.desc.size.nimble: "outra vida desapareceu sem deixar rastro, exceto pelas leves marcas de arrasto e algumas manchas de sangue onde a criatura ágil incapacitou sua presa."
 ep3_laamp_flavour_ewan.4061.desc.midtro: "\n\nOs sentinelas não conseguiram ver nada. Seja o que for, parece ter gostado de nós e é astuto o bastante para nos seguir durante o dia ou nas primeiras horas da noite.\n\n"
 ep3_laamp_flavour_ewan.4061.desc.sight.blind: "Eu concentro minha mente"
 ep3_laamp_flavour_ewan.4061.desc.sight.sighted: "Eu concentro meus olhos"
 ep3_laamp_flavour_ewan.4061.desc.terrain.major_river: "para o rio que nosso caminho acompanha. Um corpo de água tão vasto pode esconder todo tipo de terrores submersos."
 ep3_laamp_flavour_ewan.4061.desc.terrain.farmlands: "para as terras agrícolas ao redor, um denso mar de sebes e campos pontuados por pequenos bosques. A cada seis metros pode haver outro terror escondido."
 ep3_laamp_flavour_ewan.4061.desc.terrain.hills: "para o tapete de colinas por onde nos movemos. Cada uma quebrando a fácil visão do lado oposto, facilitando para um terror animal nos seguir."
 ep3_laamp_flavour_ewan.4061.desc.terrain.mountains: "para os picos e cristas escarpados que se erguem sobre nós na pálida luz da manhã. Um número incontável de lugares para algum terror que habita cavernas se esconder."
 ep3_laamp_flavour_ewan.4061.desc.terrain.desert: "no mar de dunas que nos cerca. Ele [ROOT.Char.Custom('SenseObserve_SeemLook')] aberto, mas um terror noturno astuto pode atravessá-lo com a mesma facilidade que um tubarão corta as ondas."
 ep3_laamp_flavour_ewan.4061.desc.terrain.desert_mountains: "para os picos empoeirados e as cristas arenosas que nos protegem da brilhante luz da manhã. Muitos lugares para um terror faminto esperar o calor do dia."
 ep3_laamp_flavour_ewan.4061.desc.terrain.oasis: "$ep3_laamp_flavour_ewan.4061.desc.terrain.desert$"
 ep3_laamp_flavour_ewan.4061.desc.terrain.jungle: "para o emaranhado de árvores e a densa copa coberta de vinhas acima. O terror animal pode estar a três metros de nós agora e nunca saberíamos."
 ep3_laamp_flavour_ewan.4061.desc.terrain.forest: "para a cobertura de árvores que se estende em todas as direções. Denso demais para ver mais de trinta metros além do perímetro do acampamento, oferecendo muito espaço para o terror se esconder."
 ep3_laamp_flavour_ewan.4061.desc.terrain.taiga: "$ep3_laamp_flavour_ewan.4061.desc.terrain.forest$"
 ep3_laamp_flavour_ewan.4061.desc.terrain.wetlands: "para o horizonte nebuloso e os morros arredondados que pontuam as terras úmidas. A maior parte do chão é plano, mas não o suficiente para fornecer #EMP nenhuma#! cobertura para algum estranho terror."
 ep3_laamp_flavour_ewan.4061.desc.terrain.steppe: "para o mar de grama ao nosso redor. Apenas um tolo pensaria que o terreno plano significa que não há onde se esconder, sem elevações ou vales, sem cavernas para conter estranhos terrores."
 ep3_laamp_flavour_ewan.4061.desc.terrain.floodplains: "para as planícies de inundação lamacentas, cercadas por árvores, por onde estamos nos movendo. Terreno perfeito para qualquer terror inclinado a emboscadas se esgueirar."
 ep3_laamp_flavour_ewan.4061.desc.terrain.drylands: "para o solo seco e empoeirado por onde estamos nos movendo. Quebrado por colinas e árvores ocasionais, qualquer terror salivante poderia facilmente nos seguir por este terreno."
 ep3_laamp_flavour_ewan.4061.desc.terrain.plains: "para as amplas e onduladas planícies por onde estamos nos movendo. Planas, mas não #EMP totalmente#! planas, com picos e vales suficientes para esconder todo tipo de terrores."
 ep3_laamp_flavour_ewan.4061.desc.outro: "Observando. Aguardando. A fome lentamente aumentando por sua refeição da noite."
 ep3_laamp_flavour_ewan.4061.a: "Apertem a vigilância."
 ep3_laamp_flavour_ewan.4061.a.tt.duel.safe: "Na pior das hipóteses, a besta comerá alguns de seus [followers|lE] nomeados."
 ep3_laamp_flavour_ewan.4061.a.tt.success: "Interceptado e eliminado"
 ep3_laamp_flavour_ewan.4061.a.tt.failure: "Mais algumas mortes"
 ep3_laamp_flavour_ewan.4061.b: "Eu irei pegar sua cabeça!"
 ep3_laamp_flavour_ewan.4061.a.tt.duel.risky: "Você persegue a besta pessoalmente, arriscando potencial [character_death_death|lE] em troca de [prestige|lE]"
 ep3_laamp_flavour_ewan.4061.a.tt.duel.risky.are_you_sure: "@alert_icon! #alert_trial Dependendo do que for — e do quão grande ele realmente é — isso pode ser bastante fácil ou muito, muito difícil, e você não pode recuar uma vez que parta#!"
 ep3_laamp_flavour_ewan.4061.c: "Contanto que não coma ninguém importante."
 ep3_laamp_flavour_ewan.4061.c.tt.success: "Ele não comeu"
 ep3_laamp_flavour_ewan.4061.c.tt.failure: "Ele comeu"
