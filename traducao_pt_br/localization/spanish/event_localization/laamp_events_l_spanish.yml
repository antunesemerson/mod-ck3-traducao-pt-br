l_spanish:
 ep3_laamps.0001.t.female: "Uma vez e Antiga [lost_primary_title.Custom('GetTierBaseTitleFemale')|l]"
 ep3_laamps.0001.t.male: "O [lost_primary_title.Custom('GetTierBaseTitleMale')|l]  que foi e houve"
 ep3_laamps.0001.intro: "Derrota vil e ignominiosa!"
 ep3_laamps.0001.memory: "Esta miserável [war_memory.MakeScope.Var('war_cb').GetFlagName|l] tirou tudo de mim!"
 ep3_laamps.0001.fallback: "Esta miserável guerra tirou tudo de mim!"
 ep3_laamps.0001.desc: "Fui lançado ao deserto enquanto [winner.Custom('ES_ElLa')] [winner.GetTitledFirstName|l] e seus soldados celebram a vitória!\n\nPerdi o trono [lost_primary_title.GetAdjectiveNoTooltip]… e talvez neste exato momento essa espécie de [winner.Custom2('InsultNoun', ROOT.Char)] [winner.Custom('PersonalityGetNegativeTraitDesc')] esteja tomando posse das insígnias de #EMP mi#! [lost_primary_title.GetTierAsNameNoTooltip]!"
 ep3_laamps.0001.a: "Um dia, eu #EMP vou#! recuperar minhas terras!"
 ep3_laamps.0001.b: "Tudo depende de [alt_1.GetFirstNameNoTooltipRegnal]."
 target_character_government: "[government|E]: [TARGET_CHARACTER.GetGovernment.GetName]"
 target_character_independent: "[independent_ruler|E]"
 target_character_liege: "[Select_CString(TARGET_CHARACTER.IsIndependentRuler, 'Independiente', 'Vasallaje hacia')][Select_CString(TARGET_CHARACTER.IsIndependentRuler, \"\", TARGET_CHARACTER.GetLiege.GetName)]"
 ep3_laamps.0001.c: "[alt_2.GetFirstNameNoTooltipRegnal] deve forjar o futuro da nossa casa."
 ep3_laamps.0001.d: "Agora vamos nos confiar a [alt_3.GetFirstNameNoTooltipRegnal|l]."
 ep3_laamps.0001.e: "O tempo passou..."
 ep3_laamps.0003.opening: "[adventurer.Custom2('AppropriateGreetingNegative', ROOT.Char)]"
 ep3_laamps.0003.desc: "Você e seus vis exércitos podem ter arrancado de mim meu [lost_primary_title.GetTierAsNameNoTooltip|l], mas marque minhas palavras: eu ainda não terminei, nem desistirei de [lost_primary_title.GetBaseNameNoTierNoTooltip] tão facilmente!"
 ep3_laamps.0003.a: "Haha! O tolo tem coragem!"
 ep3_laamps.0004.desc: "Esses traidores desprezíveis me arrancaram meu [conquered.GetTierAsNameNoTooltip|l] e me lançaram ao ermo, enquanto [winner.Custom('ES_ElLa')] [winner.GetTitledFirstName|l] e seus soldados aclamam [heir.Custom('ES_AlAla')] [heir.GetTitledFirstName|l] em meu lugar!\n\nPermiti que renegados e mentirosos me tirassem o trono [conquered.GetAdjectiveNoTooltip]… Nós realmente não somos nada além dos brinquedos de [ROOT.Char.GetFaith.FateGodName]…"
 lose_all_prestige_tt: "Você retém apenas até #V 100#! [prestige_i][prestige|lE]"
 lose_all_prestige_level_tt: "Você perde #value 3#! [prestige_levels|lE]"
 ep3_laamps.0010.t: "Um [potential_laamp.Custom('ES_XA')] [potential_laamp.Custom('GetDaughterSon')] menor de [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]"
 ep3_laamps.0010.single: "Como meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('potential_laamp'))]"
 ep3_laamps.0010.multi: "Como meus irmãos"
 ep3_laamps.0010.desc: "e eu lamento meu falecido[deceased.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('deceased'))], [deceased.Custom('ES_ElLa')] [deceased.GetTitledFirstNameRegnal|l], enquanto cuidamos da divisão de suas terras.\n\n[inherited.GetBaseNameNoTierNoTooltip] ficou comigo,"
 ep3_laamps.0010.inheritor_1: "[inherited_1.GetBaseNameNoTierNoTooltip] é para [inheritor_1.GetFirstName];"
 ep3_laamps.0010.inheritor_2: "[inherited_2.GetBaseNameNoTierNoTooltip] é para [inheritor_2.GetFirstName];"
 ep3_laamps.0010.inheritor_3: "[inherited_3.GetBaseNameNoTierNoTooltip] é para [inheritor_3.GetFirstName];"
 ep3_laamps.0010.connector: "e"
 ep3_laamps.0010.laamp: "mas o que dizer do meu [potential_laamp.Custom('PersonalityGetPositiveTraitDesc')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('potential_laamp'))], [potential_laamp.GetFirstName]?\n\nFicou de mãos vazias e observou a transição de poder de fora: não houve cerimônias para #EMP [potential_laamp.GetSheHe]#!, apenas juramentos a outros. Sangue nobre e a espada ao lado são sua única herança."
 ep3_laamps.0010.a: "Ai, alguns não estão destinados a governar..."
 ep3_laamps.0010.b: "... embora #EMP sí#! que invejo a liberdade de [potential_laamp.GetFirstNameNoTooltip]."
 ep3_laamps.0020.t: "O Exílio [revoked.GetAdjectiveNoTooltip]"
 ep3_laamps.0020.desc: "Perdi tudo em um piscar de olhos: meu [revoked.GetTierAsNameNoTooltip|l], meus títulos, minha dignidade…\n\nÉ[banisher.Custom('ES_EA')] [Select_CString( banisher.IsFemale, 'perra traicionera', 'perro traicionero' )], [banisher.Custom('ES_ElLa')] [banisher.GetTitledFirstName|l], espera que eu agradeça por terem poupado minha vida e por eu ter sido apenas banido de [banisher.GetTopLiege.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]! Até mesmo os tolos sabem que o exílio pode ser um destino #EMP peor#! pior que a morte…"
 ep3_laamps.0020.a: "Eu não desistirei de [revoked.GetBaseNameNoTierNoTooltip] tão facilmente!"
 ep3_laamps.0022.desc: "Você pode ter tomado meu [revoked.GetTierAsNameNoTooltip|l] em troca da minha liberdade, mas [revoked.GetBaseNameNoTier] não era seu para tomar, e eu não deixarei que minhas reivindicações sejam esquecidas.\n\nUm dia pode chegar em que nossos papéis serão invertidos, e sua vida estará nas #EMP minhas#! mãos."
 ep3_laamps.0022.a: "Um latido ousado, com pouca mordida."
 ep3_laamps.0030.t: "Além de [old_primary_title.GetBaseNameNoTierNoTooltip]"
 ep3_laamps.0030.desc: "Finalmente me livro dos adornos, das responsabilidades mesquinhas e do trabalho árduo do dia a dia da minha vida em [old_capital_province.GetNameNoTooltip] e monto acampamento ao ar livre nas/nos [old_capital_province.Custom('GetTerrainTypePlural')] sem limites!\n\nMe acompanham meus servos e seguidores de maior confiança, com diferentes graus de entusiasmo por suas novas vidas na natureza.\n\n"
 ep3_laamps.0030.heir: "Em meu lugar, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('laamp_inheritor'))] e herdeir[laamp_inheritor.Custom('ES_OA')], [laamp_inheritor.GetFirstName] assumiu meus títulos como [laamp_inheritor.Custom('ES_ElLa')] [laamp_inheritor.GetTitleAsNameNoTooltip|l] de [laamp_inheritor.GetPrimaryTitle.GetNameNoTierNoTooltip]."
 ep3_laamps.0030.liege: "Meu antigo reino passa para meu antigo[laamp_inheritor.Custom('ES_OA')] senhor[laamp_inheritor.Custom('ES_XA')], [laamp_inheritor.Custom('ES_ElLa')] [laamp_inheritor.GetTitledFirstName|l], que aceitou minha decisão de deixar seu serviço."
 ep3_laamps.0030.new: "A nobreza escolheu [laamp_inheritor.GetFirstName] um[laamp_inheritor.Custom('ES_XA')] potentad[laamp_inheritor.Custom('ES_OA')] local, para governar meu antigo senhorio em meu lugar."
 ep3_laamps.0030.a: "Bem, o que estamos esperando?"
 ep3_laamps.0032.opening: "[adventurer.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 ep3_laamps.0032.desc: "Uma vida mais empolgante, viajando pelo mundo, me chama. Depois de muita reflexão, decidi ceder minhas terras a vós, meu senhor[ROOT.Char.Custom('ES_XA')]. Em breve partirei [old_primary_title.GetBaseNameNoTierNoTooltip] e seguirei pelos caminhos abertos."
 ep3_laamps.0032.a: "Uma atitude ousada, alguns poderiam chamar de tola."
 ep3_laamps.0040.t: "Da Riqueza à Miséria"
 ep3_laamps.0040.family: "Onde #EMP ha#! encontrado meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('actor'))] [actor.Custom2('InsultAdjective', ROOT.Char)|l]"
 ep3_laamps.0040.other: "Onde #EMP foi#! que meu senhor[actor.Custom('ES_XA')] [actor.Custom2('InsultAdjective', ROOT.Char)|l]"
 ep3_laamps.0040.desc: "as #EMP coragem#!? Meus títulos, revogados! Minhas terras, perdidas! Minha posição, em frangalhos!\n\nSe vou defender e restaurar minha propriedade legítima, quanto mais minha honra, parece que terei de começar do zero!\n\nVingarei a ganância mesquinha [actor.Custom('ES_DelDela')] [actor.GetTitledFirstName|l], por mais longo que seja o caminho…"
 ep3_laamps.0040.a: "Isso não ficará assim."
 ep3_laamps.0042.desc: "A vossa confiscação de meu [landed_title.GetTierAsNameNoTooltip|l] não me deixa outra opção. Vós me obrigastes a levar a vida de aventureir[ROOT.Char.Custom('ES_OA')].\n\nMas não estou terminad[ROOT.Char.Custom('ES_OA')], nem esquecerei meus legítimos direitos sobre [landed_title.GetNameNoTierNoTooltip]!"
 ep3_laamps.0042.a: "Dou-lhe duas semanas, no máximo."
 ep3_laamps.0050.t: "Seguindo o Seu Próprio Caminho"
 ep3_laamps.0050.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('potential_laamp'))], [potential_laamp.GetFirstName] anda inquiet[potential_laamp.Custom('ES_OA')] e quase não me surpreende quando certa noite me encurrala enquanto contemplávamos a [ROOT.Char.GetCurrentLocation.Custom('GetTerrainType')] de [ROOT.Char.GetCurrentLocation.GetBaronyNameExplicitlyNoTooltip].\n\n\"[potential_laamp.Custom2('RelationToMeShort', ROOT.Char)|U]\", suspira melancolic[potential_laamp.Custom('ES_OA')], olhando para o horizonte, \"estou cansad[potential_laamp.Custom('ES_OA')] de [ROOT.Char.Custom('ResidenceBuildingPlural')]. Quero sair #EMP lá fora#!, ver o mundo e deixar minha #EMP própria#! marca nele!\".\n\n[potential_laamp.GetSheHe|U] parece decidid[potential_laamp.Custom('ES_OA')] de verdade, animad[potential_laamp.Custom('ES_OA')] com um entusiasmo que eu não via em [potential_laamp.GetSheHe], nem em ninguém, há algum tempo."
 ep3_laamps.0050.a: "Você enche a Casa [ROOT.Char.GetHouse.GetBaseNameNoTooltip] de orgulho!"
 ep3_laamps.0050.b: "Se você precisa ir, não vou te manter aqui."
 ep3_laamps.0050.c: "Não seja ridículo!"
 ep3_laamps.0051.desc: "Quando me levanto na manhã seguinte, a discussão com [potential_laamp.GetFirstName] continua pesando em minha cabeça, mas me informam de que essa espécie de [potential_laamp.Custom('PersonalityGetNegativeTraitDesc')|l] desapareceu durante a noite!\n\n![potential_laamp.Custom('ES_ElLa')|U] muito imbecil desobedeceu aos meus desejos explícitos de ir para a selva brincar com um bando de patifes!"
 ep3_laamps.0051.a: "Pirralh[potential_laamp.Custom('ES_OA')] insolente..."
 ep3_laamps.0051.b: "… certamente tem espírito!"
 allowed_runaway_laamp_opinion: "Permitido a Aventurar-se"
 forbidden_runaway_laamp_opinion: "Proibido de Aventurar-se"
 ep3_laamps.0100.t: "Um Preço para Tudo"
 ep3_laamps.0100.desc: "Mal pude acreditar quando recebi a aprovação [recipient.Custom('ES_DelDela')] [recipient.GetTitledFirstName|l] à minha oferta; por fim terei um/a [ROOT.Char.Custom('FortifiedBuilding')] para mim, com um telhado e quatro paredes sólidas!\n\nSerei [Select_CString( ROOT.Char.IsFemale, 'a nova', 'o novo' )] [ROOT.Char.GetTitleAsNameNoTooltip|l] de [ROOT.Char.GetPrimaryTitle.GetNameNoTier],"
 ep3_laamps.0100.desc_nomadic: "Mal podia acreditar quando recebi a aprovação [recipient.Custom('ES_DelDela')] [recipient.GetTitledFirstName|l] à minha oferta; enfim terei terras próprias, um lugar para pastar meu rebanho!\n\nVou ser [Select_CString( ROOT.Char.IsFemale, 'a nova', 'o novo' )] [ROOT.Char.GetTitleAsNameNoTooltip|l] de [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTier],"
 ep3_laamps.0100.fellow_vassal: "que governará a região como outro[ROOT.Char.Custom('ES_OA')] vassal[ROOT.Char.Custom('ES_OA')] de [new_liege.GetName], dependente e em dívida com [Select_CString( new_liege.IsFemale, 'minha nova senhora', 'meu novo senhor' )] em igual medida."
 ep3_laamps.0100.liege: "que governará a região como vassal[ROOT.Char.Custom('ES_OA')] do povo [recipient.GetPrimaryTitle.GetAdjectiveNoTooltip] dependente e em dívida com minha [Select_CString( recipient.IsFemale, 'nova senhora', 'novo señor' )] em igual medida."
 ep3_laamps.0100.independent: "governando esta outrora terra [recipient.GetPrimaryTitle.GetAdjectiveNoTooltip] como meu próprio feudo!"
 ep3_laamps.0100.unpopular: "\n\nEmbora, meu rápido avanço pela traiçoeira escada de [actor.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip] tenha certamente irritado meus colegas lordes e damas..."
 ep3_laamps.0100.fallback: "\n\nFoi um longo caminho, mas finalmente posso deixar meu catre de campista para trás..."
 ep3_laamps.0100.a: "Ha, e dizem que a nobreza não pode ser comprada!"
 ep3_laamps.0101.opening: "[recipient.Custom2('AppropriateGreetingPositive', actor)]"
 ep3_laamps.0101.desc: "Fiquei muito animado ao ouvir que você aceitou minha oferta!\n\nO ouro foi enviado, e me mudo para minha residência em [new_primary_title.GetPreferredCapital.GetName]"
 ep3_laamps.0101.fellow_vassal: "como um vassalo de [new_liege.GetName]."
 ep3_laamps.0101.liege: "como seu humilde vassal[ROOT.Char.Custom('ES_OA')][ROOT.Char.Custom('ES_OA')]."
 ep3_laamps.0101.independent: "e governá-la como meu próprio feudo."
 ep3_laamps.0101.a: "É melhor [actor.GetSheHe] saber seu lugar."
 ep3_laamps.0101.b: "Espero que isso não tenha sido um erro."
 ep3_laamps.0101.c: "Um acordo justo, espero."
 ep3_laamps.0101.liege_message.title: "Vassalo Vendeu Terra"
 ep3_laamps.0102.opening: "[recipient.Custom2('AppropriateGreetingNegative', actor)]"
 ep3_laamps.0102.desc: "Quão absurda é a oferta que fizestes. Vocês realmente acham que eu venderia meus títulos? E para alguém como #EMP você#!?!"
 ep3_laamps.0102.a: "Não precisa ser rude."
 ep3_laamps.0200.opening: "[recipient.Custom2('AppropriateGreeting', actor)]"
 ep3_laamps.0200.desc: "Muito bem, ajudarei em sua invasão de [secondary_recipient.GetPrimaryTitle.GetTierAsNameNoTooltip|l] [secondary_recipient.Custom('ES_DelDela')] [secondary_recipient.GetTitledFirstName|l], desde que você me jure fidelidade caso saia vitorioso."
 ep3_laamps.0200.a: "Excelente!"
 ep3_laamps.0201.opening: "[recipient.Custom2('AppropriateGreeting', actor)]"
 ep3_laamps.0201.desc: "Considerei sua proposta com muito cuidado e conclui que não posso oferecer minha ajuda à sua causa neste momento."
 ep3_laamps.0201.a: "Não preciso [recipient.GetHerHim] de qualquer forma..."
 ep3_laamps.0300.t: "… E Seus Inimigos Mais Próximos"
 ep3_laamps.0300.desc: "Após esperar ansiosamente pela resposta de [recipient.GetFirstName] à minha proposta, não posso negar o alívio que sinto quando vejo seu rabisco de aprovação na missiva.\n\nChega disso: [recipient.GetSheHe] será [Select_CString( recipient.IsFemale, 'a nova', 'o novo' )] [recipient.GetTitleAsNameNoTooltip|l] de [recipient.GetPrimaryTitle.GetNameNoTier],"
 ep3_laamps.0300.fellow_vassal: "governando a área como um vassalo de [new_liege.GetName]."
 ep3_laamps.0300.liege: "que governe sobre a região como [Select_CString( recipient.IsFemale, 'minha vassala', 'meu vassalo' )]… se se comportar."
 ep3_laamps.0300.independent: "governando as terras [recipient.GetPrimaryTitle.GetAdjectiveNoTooltip] que lhe pertencem como seu próprio feudo!"
 ep3_laamps.0300.unpopular: "\n\nSeu rápido ascenso às fileiras da nobreza [actor.GetTopLiege.GetPrimaryTitle.GetAdjectiveNoTooltip|l] certamente levantará muitas sobrancelhas em [actor.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip]…"
 ep3_laamps.0300.fallback: "\n\nTalvez eu possa finalmente mover minha atenção para assuntos mais urgentes..."
 ep3_laamps.0300.a: "Isso melhor ser o fim disso."
 ep3_laamps.0301.opening: "[actor.Custom2('AppropriateGreetingPositive', recipient)]"
 ep3_laamps.0301.desc: "Fico feliz que vocês tenham entrado em razão, e confio que isso ponha fim às nossas disputas.\n\nSe preparou [new_primary_title.GetPreferredCapital.GetNameNoTier] para sua chegada, para que governe"
 ep3_laamps.0301.fellow_vassal: "como um vassalo de [new_liege.GetName]."
 ep3_laamps.0301.liege: "como meu vassalo. [Select_CString( actor.IsFemale, 'minha vassala', 'meu vassalo' )]"
 ep3_laamps.0301.independent: "como seu próprio feudo."
 ep3_laamps.0301.a: "Estou ao seu serviço."
 ep3_laamps.0301.b: "Como os caídos se tornaram poderosos!"
 ep3_laamps.0301.c: "Finalmente um [ROOT.Char.GetTitleAsNameNoTooltip|l]."
 ep3_laamps.0301.liege_message.title: "Vassalo Acomodou Aventureiro"
 ep3_laamps.0302.opening: "[recipient.Custom2('AppropriateGreetingNegative', actor)]"
 ep3_laamps.0302.desc: "Você acha que eu posso ser subornado com esses títulos medíocres tão facilmente? Se eu for tê-los, eu os tomarei de você pela espada."
 ep3_laamps.0302.a: "Oh! Esse maldito ninguém!"
 ep3_laamps.0800.t: "Encruzilhada"
 ep3_laamps.0800.inherited: "Um arauto chegou trazendo a pesada revelação da minha herança de [new_title.GetBaseNameNoTier], e seus territórios associados, de [previous_holder.GetFullName]..."
 ep3_laamps.0800.abdication: "Chegou um arauto trazendo a importante revelação de que herdei [new_title.GetBaseNameNoTier] e seus territórios associados após a abdicação de [previous_holder.GetFullName]…"
 ep3_laamps.0800.granted: "Chegou um arauto trazendo a importante revelação de que [new_liege.Custom('ES_ElLa')] [new_liege.GetTitledFirstName|l] me concedeu [new_title.GetBaseNameNoTier] e seus territórios associados…"
 ep3_laamps.0800.election: "Um arauto chegou trazendo a pesada revelação da minha eleição como governante de [new_title.GetBaseNameNoTier], e seus territórios associados..."
 ep3_laamps.0800.faction: "Um arauto chegou trazendo a pesada revelação de que os nobres de [new_title.GetBaseNameNoTier] conferiram seu governo a mim, expulsando [previous_holder.GetFullName]..."
 ep3_laamps.0800.claim_war: "Por fim, derrotei [previous_holder.Custom('ES_AlAla')] [previous_holder.GetTitledFirstName|l] e tomei as terras que me pertenciam por direito. Tenho o futuro de [new_title.GetBaseNameNoTier] em minhas mãos…"
 ep3_laamps.0800.holy_war: "Por fim, derrotei [previous_holder.Custom('ES_AlAla')] [previous_holder.GetTitledFirstName|l] e tomei suas terras em nome de [ROOT.Char.GetFaith.HighGodName]. Tenho o futuro de [new_title.GetBaseNameNoTier] em minhas mãos…"
 ep3_laamps.0800.conquest: "Finalmente, derrotei [previous_holder.Custom('ES_AlAla')] [previous_holder.GetTitledFirstName|l] e conquistei suas terras. Agora tenho o futuro de [new_title.GetBaseNameNoTier] em minhas mãos…"
 ep3_laamps.0800.vassal: "\n\nSerá meu destino assumir o legado e me sentar em [new_capital.GetCountyData.GetCapital.GetBaronyNameExplicitlyNoTooltip] ao serviço [new_liege.Custom('ES_DelDela')] [new_liege.GetTitledFirstNameRegnal|l] como [ROOT.Char.GetLadyLord] vassal[ROOT.Char.Custom('ES_OA')] do trono [new_liege.GetPrimaryTitle.GetAdjectiveNoTooltip]?"
 ep3_laamps.0800.independent: "\n\nMeu destino é assumir o legado e me sentar em [new_capital.GetCountyData.GetCapital.GetBaronyNameExplicitlyNoTooltip] como [ROOT.Char.GetLadyLord] soberan[ROOT.Char.Custom('ES_OA')] por direito próprio?"
 ep3_laamps.0800.desc: "\n\nA vida na estrada está, sem dúvida, cheia de provações e perigos, mas que liberdade! Não posso negar seu encanto, livre das muitas responsabilidades do governo.\n\n"
 ep3_laamps.0800.a: "Sim, é hora de deixar meu acampamento para trás..."
 ep3_laamps.0800.a.tt: "#mixed_value #BER [THIS.Char.GetShortUIName|U] [Select_CString( THIS.Char.IsLocalPlayer, 'serás', 'será' )] um[THIS.Char.Custom('ES_XA')] [ruler|lE] [Concept('landed', 'com terras' )|E]#!#!"
 ep3_laamps.0800.b: "A estrada me chama: m [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('alt_1'))], [alt_1.GetFirstNameNoTooltip], pode tê-l!"
 ep3_laamps.0800.b.claimant: "O caminho me chama: que [alt_1.GetFirstNameNoTooltip] assuma seu direito!"
 ep3_laamps.0800.c: "Confiarei [new_title.GetBaseNameNoTierNoTooltip] ao meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('alt_2'))], [alt_2.GetFirstNameNoTooltip]."
 ep3_laamps.0800.c.claimant: "Eu o entregarei ao legítimo pretendente[alt_2.Custom('ES_OA')] a: [alt_2.GetFirstNameNoTooltip]!"
 ep3_laamps.0800.d: "M [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('alt_3'))], [alt_3.GetFirstNameNoTooltip], governará [new_title.Custom('GetTierBase')|l]!"
 ep3_laamps.0800.d.claimant: "Meu apoio vai para a reivindicação de [alt_3.GetFirstNameNoTooltip]!"
 ep3_laamps.0800.e: "Renuncio a essas terras, que algum outro as tenha!"
 ep3_laamps.0800.e.liege: "Renuncio a estas terras, que [new_liege.Custom('ES_ElLa')] [new_liege.GetTitleAsNameNoTooltip|l] as fique!"
 ep3_laamps.0800.claim.tt: "@warning_icon! #N Você perderá todas as [claims|lE] sobre os [titles|lE] renunciados#!"
 renounced_land_to_me_opinion: "Títulos Renunciados para Mim"
 renounced_land_to_weaker_claim_opinion: "Títulos Renunciados para Reclamante Mais Fraco"
 renounced_land_to_other_opinion: "Títulos Renunciados para Outros"
 renounced_land_outside_family_opinion: "Títulos Renunciados Fora da Família"
 adventurer_titles_renounced_title: "Títulos Renunciados"
 adventurer_titles_renounced_to_me_desc: "[adventurer.GetFirstName] renunciou a seus novos [titles|lE] para continuar sendo [Concept('adventurer',Select_CString(adventurer.IsFemale,'aventureira', 'aventureiro'))|E]"
 adventurer_titles_renounced_by_me_desc: "Renunciei aos meus novos [titles|lE] em favor de [beneficiary.Custom('ES_DelDela')] [beneficiary.GetTitledFirstName|l]"
 ep3_laamps.1001.t: "Os Caminhos que Percorremos"
 ep3_laamps.1001.desc.intro: "O caminho à frente se estende sem fim, um fio sinuoso e solitário seguindo em direção ao horizonte distante.\n\nMeu acampamento está... silencioso, com apenas algumas tendas espalhadas e animais de carga bocejando na brisa. Estranhos e agregados se levantam com o dia, preparando-se com relutância para suas tarefas da manhã.\n\nA maioria é a palha miúda e variada que entra e sai de um grupo na estrada a cada novo assentamento."
 ep3_laamps.1001.desc.blind: "Poucas vozes são aquelas que reconheço, pelo menos mais do que superficialmente."
 ep3_laamps.1001.desc.at_least_one_working_eye: "Poucas faces atraem meu olhar como aquelas que reconheço, pelo menos mais do que superficialmente."
 ep3_laamps.1001.a: "Felizmente, aqueles que conheço são conversadores eloquentes."
 ep3_laamps.1001.a.tt: "Você começa com dois [followers|lE] habilidosos em [diplomacy|lE]"
 ep3_laamps.1001.b: "Isso será um exército, algum dia."
 ep3_laamps.1001.b.tt: "Você começa com dois [followers|lE] hábeis em [Concept('martial', 'marcial' )|E]"
 ep3_laamps.1001.c: "Com essas pessoas eu construirei um império."
 ep3_laamps.1001.c.tt: "Você começa com dois [followers|lE] habilidosos em [stewardship|lE]"
 ep3_laamps.1001.d: "Hmm, e nenhuma ladroagem na noite, nem mesmo."
 ep3_laamps.1001.d.tt: "Você começa com dois [followers|lE] habilidosos em [intrigue|lE]"
 ep3_laamps.1001.e: "Graças a [ROOT.Char.GetFaith.KnowledgeGodName] temos pelo menos alguns intelectuais!"
 ep3_laamps.1001.e.tt: "Você começa com dois [followers|lE] habilidosos em [learning|lE]"
 ep3_laamps.1001.f: "Pelo menos conto com alguns bons lutadores."
 ep3_laamps.1001.f.tt: "Você começa com dois [followers|lE] habilidosos em [prowess|lE]"
 ep3_laamps.1001.g: "Não tomei seguidores dignos — ainda."
 ep3_laamps.1001.g.tt.followers: "Você começa com nenhum [followers|lE] gerado — apenas aqueles [family|lE] e [friends|lE] que já possui"
 ep3_laamps.1001.g.tt.difficulty: "@alert_icon! #alert_trial Você pode achar [task_contracts|lE] difíceis, ou impossíveis, até adquirir [followers|lE]#!"
 ep3_laamps.1011.t: "Juramentado pela Espada"
 ep3_laamps.1011.desc.four_plus_titles: "\"… e juro defender sempre os vossos direitos a [title_1.GetNameNoTier], [title_2.GetNameNoTier], [title_3.GetNameNoTier] e a qualquer outro domínio que, por justiça, deva ser vosso, meu suserano[ROOT.Char.Custom('ES_XA')]\","
 ep3_laamps.1011.desc.three_titles: "\"… e juro defender sempre os vossos direitos ao vosso domínio natural, de [title_1.GetNameNoTier] a [title_2.GetNameNoTier] passando por [title_3.GetNameNoTier], meu senhor[ROOT.Char.Custom('ES_XA')]\","
 ep3_laamps.1011.desc.two_titles: "\"… e juro defender sempre os vossos direitos aos domínios gêmeos de [title_1.GetNameNoTier] e [title_2.GetNameNoTier], meu senhor[ROOT.Char.Custom('ES_XA')]\","
 ep3_laamps.1011.desc.one_title: "\"… e juro defender sempre os vossos direitos ao vosso legítimo domínio de [title_1.GetNameNoTier], meu senhor[ROOT.Char.Custom('ES_XA')]\","
 ep3_laamps.1011.desc.midtro: "declara [recipient.Custom2('MyCharacterIntroduction', actor)].\n\nO[recipient.Custom('ES_EA')] mantém a cabeça inclinada em respeitosa submissão ao terminar seu longo e sinuoso juramento, aguardando minha resposta.\n\n"
 ep3_laamps.1011.desc.prior_swords: "Outro bom braço de espada jurado à minha causa"
 ep3_laamps.1011.desc.first_sword: "A primeira espada jurada tão carinhosamente a mim"
 ep3_laamps.1011.desc.outro: "—sua lealdade agora é irrepreensível— a única questão que resta é: quanta lealdade #EMP desejo#! devolver em troca?"
 ep3_laamps.1011.a: "[recipient.Custom('SisterBrother')|l] mí[recipient.Custom('ES_OA')], sempre tereis um lugar à minha mesa."
 ep3_laamps.1011.b: "Que meu triunfo ganhe sua lealdade, [recipient.GetFirstNameNoTooltip]."
 ep3_laamps.5000.t: "Caixas Vazias"
 ep3_laamps.5000.desc: "Eu olho tristemente para minha refeição. Uma maçã mal madura se destaca como a mais atraente da comida.\n\n"
 ep3_laamps.5000.provisionslow: "Nossas provisões continuam a se esgotar, e agora estamos realmente em apuros. Estômagos roncando pelo acampamento, e nossos cintos quase não têm mais fivelas para apertar."
 ep3_laamps.5000.provisionsok: "Não há falta de comida no acampamento, mas a variedade é escassa. Temos muitos vegetais murchos, mas eu realmente gostaria de um bom pedaço de carne."
 ep3_laamps.5000.ending: "\n\n[hunter.GetFirstName] levanta-se de um salto, com o arco na mão, procurando uma aljava.\n\nJá não aguento mais. Pode ser que sejam as terras [local_lord.Custom('ES_DelDela')] [local_lord.GetTitledFirstName|l], mas certamente pode prescindir de umas mínimas lascas de gordura."
 ep3_laamps.5000.a: "Nada de caça sem permissão."
 ep3_laamps.5000.a.tt: "Eu enviarei uma carta pedindo direitos de caça."
 ep3_laamps.5000.a.success: "[local_lord.GetFirstNameNoTooltip] aquiesce"
 ep3_laamps.5000.a.failure: "[local_lord.GetFirstNameNoTooltip] insiste que você pague pelo direito de caçar"
 ep3_laamps.5000.a.critfailure: "[local_lord.GetFirstNameNoTooltip] recusa"
 ep3_laamps.5000.b: "Vá rápid[hunter.Custom('ES_OA')] e em silêncio."
 ep3_laamps.5000.b.success: "[hunter.GetFirstNameNoTooltip] caça sem que [hunter.Custom('ES_LoLa')] descubram"
 ep3_laamps.5000.b.failure: "Pega e multa-se [hunter.GetFirstName] e confisca-se metade da captura"
 ep3_laamps.5000.b.critfailure: "[hunter.GetFirstNameNoTooltip] é peg e aprisionad"
 ep3_laamps.5000.c: "Não podemos arriscar. Em vez disso, procure por frutas."
 ep3_laamps.5000.c.success: "[hunter.GetFirstNameNoTooltip] traz algumas frutas vermelhas"
 ep3_laamps.5000.c.failure: "Os arbustos de frutas vermelhas estão vazios"
 ep3_laamps.5005.t: "Um Visitante Fiel"
 ep3_laamps.5005.desc: "A fogueira crepita, iluminando uma figura que entra em nosso círculo. Ele se move com vigor apesar do avançado da hora, a mão fechada em volta de um bastão. Os guardas [priest.GetHerHim] interceptam, mas faço um gesto para que se afastem.\n\n“Há lugar para um[priest.Custom('ES_XA')] [priest.GetWomanMan] de [priest.GetFaith.HighGodName]?”. Ele sorri para mim com esperança, com roupas sujas que sussurram na brisa forte. Um[ROOT.Char.GetFaith.PriestNeuter] errante!\n\n"
 ep3_laamps.5005.samefaith: "Tais figuras são bem conhecidas nos círculos [ROOT.Char.GetFaith.GetAdherentNamePlural]. Os pregadores itinerantes levam a palavra de [priest.GetFaith.HighGodName] a todos os cantos do mundo."
 ep3_laamps.5005.difffaith: "Um [ROOT.Char.GetFaith.PriestNeuter], talvez, mas não um de fé [ROOT.Char.GetFaith.GetAdjective], isso eu tenho certeza. Alguns dos meus correligionários se mexem inquietos quando chegam à mesma conclusão."
 ep3_laamps.5005.a: "Nos cairia bem um[priest.Custom('ES_XA')] [priest.GetWomanMan] de tanta vivência…"
 ep3_laamps.5005.a.success: "[priest.GetSheHe|U] concorda em ficar um tempo"
 ep3_laamps.5005.a.failure: "Tem planos muito além do acampamento"
 ep3_laamps.5005.b: "\"Sente-se, fique uma noite e conte-nos suas histórias!\""
 ep3_laamps.5005.c: "\"Eu devo pedir que você se retire.\""
 ep3_laamps.5005.c.tt: "Simplesmente não há espaço suficiente: eu nunca pediria a um de meus seguidores que desistisse de sua cama por um estranho!"
 ep3_laamps.5005.d: "\"Vá embora! Não queremos o seu tipo aqui!\""
 every_non_faith_follower: "Todo [follower|lE] não [priest.GetFaith.GetAdherentName]"
 ep3_laamps.5010.t: "Dores e Sofrimentos"
 ep3_laamps.5010.desc: "#EMP Puf!#!\n\nTenho me pego fazendo esses barulhinhos quando me sento na fogueira à noite. Os mais velhos sempre dizem que isso acontece quando você envelhece, mas eu só tenho [ROOT.Char.GetAge] anos…\n\nNão, é o desgaste de uma vida vivida na dureza. Também vejo isso nos outros. [follower.GetName] se encolhe um pouco quando se deixa cair ao meu lado."
 ep3_laamps.5010.a: "Aquela pousada que passamos tinha muitas camas sobrando..."
 ep3_laamps.5010.b: "Minhas costas pobres exigem móveis mais luxuosos."
 ep3_laamps.5010.b.tt: "Atualize sua [building|lE] $camp_main_01_domicile_building$ com desconto"
 ep3_laamps.5010.c: "Devemos prosseguir."
 ep3_laamps.5010.c.success: "Seu corpo se acostuma com isso"
 ep3_laamps.5010.c.failure: "Você continua a sofrer"
 ep3_laamps.5015.t: "Soldados Famintos"
 ep3_laamps.5015.desc: "Uma figura entra no acampamento cambaleando, suja, exausta, e claramente precisa de uma boa refeição. Chama-se [knight.GetFirstName]\n\n\"Há muitos mais como eu\", e faz um gesto em direção à distância, \"todos nós fomos deixados à própria sorte cada vez que um conflito termina. Nossos braços de espada funcionam tão bem quanto sempre, mas nosso destino é vagar e passar fome\".\n\n\"Somos os únicos que restaram que não roubam dos vulneráveis sua comida e seus objetos de valor\". Seus olhos brilham com determinação, apesar de sua aparência abatida. \"Prefiro morrer\"."
 ep3_laamps.5015.a: "\"Você é melhor do que eu. E mais tolo[knight.Custom('ES_OA')].\""
 ep3_laamps.5015.a.tt: "Aprecie-se de cada último centavo e bugiganga em sua posse."
 ep3_laamps.5015.b: "Há mais de vocês, você diz?"
 ep3_laamps.5015.c: "Podemos usar mais uma espada..."
 ep3_laamps.5015.c.success: "A palavra se espalha sobre sua generosidade"
 ep3_laamps.5015.d: "Venha, sente-se e recupere-se. Coma."
 ep3_laamps.5020.t: "Rações Não Familiar"
 ep3_laamps.5020.desc: "A cultura de [location.GetName] é nova para mim e alguns de seus costumes me são igualmente estranhos. Isso se revela especialmente verdadeiro quando [cook.GetFirstName], que cozinha esta noite, me faz sinais para que eu me aproxime da panela.\n\n\"É uma receita local\", começa, \"supostamente #EMP autêntica#! comida [local_culture.GetName]. Um mercador ambulante me garantiu.\"\n\nObservo a substância com desconfiança. É... ensopado de [cook.Custom('GetRandomRegionalSmallGame')]? Com #EMP [cook.Custom('RegionalRootVegetablePlural')]?!#!"
 ep3_laamps.5020.tt: "Requer um de: [GetTrait('lifestyle_traveler').GetName( GetNullCharacter )|l], [GetTrait('eccentric').GetName( GetNullCharacter )|l], ou [GetTrait('gluttonous').GetName( GetNullCharacter )|l]"
 ep3_laamps.5020.a: "… talvez precise de um #EMP toque#! extra especial."
 ep3_laamps.5020.a.tt: "E talvez [cook.GetFirstNameNoTooltip] também ache isso especial."
 ep3_laamps.5020.b: "Misture com ervas da culinária [culture.GetNameNoTooltip]."
 ep3_laamps.5020.c: "Bem, vou experimentar."
 ep3_laamps.5020.c.success: "Está delicioso"
 ep3_laamps.5020.c.failure: "É abominável"
 cultural_acceptance_gain_food_acceptance: "Duas culturas trocaram técnicas culinárias."
 ep3_laamps.5020.d: "O que é esse lodo?!"
 ep3_laamps.5020.d.tt: "Sua reticência se torna infame"
 ep3_laamps.5025.t: "Meios para um Fim?"
 ep3_laamps.5025.desc: "Sento-me ao lado de [ROOT.Char.Custom('GetRandomCampBuilding')|l], deixando que os sons e cheiros do acampamento me envolvam. É diferente da vida dentro dos muros seguros de um palácio, muito diferente.\n\nA liberdade é fácil de apreciar. Sem obrigações, sem conselheiros tagarelando, sem dignitários para entreter, sem nenhuma das desvantagens dos adornos do poder.\n\nAinda assim, essas liberdades custam caro. A luta constante pela sobrevivência desgasta. Cada vez mais, a cada noite, anseio por uma cama de verdade..."
 ep3_laamps.5025.a: "Eu #EMP devo#! reivindicar algumas terras no futuro."
 ep3_laamps.5025.b: "Gosto bastante desta vida."
 ep3_laamps.5025.b.flavor: "Hora de se acostumar com isso, então!"
 ep3_laamps.5025.b.tt: "Adiciona #value 2#! novas [task_contracts|lE]"
 ep3_laamps.5025.c: "É melhor manter minhas opções em aberto."
 ep3_laamps.5025.c.flavor: "… e também convém se abastecer para o que vier pela frente."
 ep3_laamps.5025.c.toast: "Você aprende o valor da flexibilidade"
 lust_for_land_modifier_tt: "[GetModifier( 'ep3_lust_for_land_modifier' ).GetNameWithTooltip|l] modificador"
 ep3_laamps.5030.t: "Pousadas e Saídas"
 ep3_laamps.5030.desc: "Conforme avançamos com dificuldade pela estrada, um edifício surge à vista. A placa desgastada do lado de fora diz \"[ROOT.Char.Custom('GetPubName')] — Estalagem\".\n\n\"Não têm sorte aqui esta noite. Mal temos espaço para os hóspedes atuais, quanto mais para novos\". Lá dentro, o estalajadeiro balança a cabeça com desdém. \"E #EMP muito menos#! para uns desarrumados como vocês!\".\n\n#EMP Maltrapilhos?!#!"
 ep3_laamps.5030.a: "Ah, não importa. Vamos apenas tomar algumas bebidas."
 ep3_laamps.5030.a.tt: "Esta opção está disponível para você devido ao seu alto [dynasty_prestige|lE]\n"
 ep3_laamps.5030.b: "Não sou um[ROOT.Char.Custom('ES_XA')] mendig[ROOT.Char.Custom('ES_OA')]. Sou [ROOT.Char.GetFirstNameNoTooltip], da Casa [ROOT.Char.GetHouse.GetNameNoTooltip]."
 ep3_laamps.5030.b.tt: "\"E eu #EMP exijo#! hospitalidade!\""
 ep3_laamps.5030.c: "Temo que eu absolutamente precise de um lugar para ficar."
 ep3_laamps.5030.c.success: "Seu aviso é compreendido, com um desconto adicional"
 ep3_laamps.5030.c.failure: "Sua ameaça se torna evidente"
 ep3_laamps.5030.c.critfailure: "As coisas saem do controle"
 ep3_laamps.5030.d: "Certamente podemos chegar a um acordo?"
 ep3_laamps.5030.d.success: "Sua barganha se mostra bem-sucedida"
 ep3_laamps.5030.d.failure: "[innkeeper.GetFirstNameNoTooltip] não cede"
 ep3_laamps.5035.t: "Terreno Conhecido"
 ep3_laamps.5035.desc: "Ninguém no meu acampamento conhece bem o terreno de [location.GetName] e estas terras não são para ser tratadas de forma leviana. Por esse motivo, encontro-me diante de um[guide.Custom('ES_XA')] guia local, negociando os serviços que ele prestará.\n\n\"Lá fora não é brincadeira!\", ele comenta, puxando o ar entre os dentes cerrados; um gesto teatral de preocupação. \"Vocês vão precisar destes mapas ou dos meus serviços, e isso eu digo de graça\".\n\nEle está certo, mas… há algo no seu comportamento que me faz hesitar."
 ep3_laamps.5035.tt: "Requer um de: [GetTrait('lifestyle_traveler').GetName( GetNullCharacter )|l], [GetTrait('eccentric').GetName( GetNullCharacter )|l], ou [GetTrait('gluttonous').GetName( GetNullCharacter )|l]"
 ep3_laamps.5035.a: "Eu poderia usar alguém como você no acampamento."
 ep3_laamps.5035.b: "Quanto você disse que esses mapas custam?"
 ep3_laamps.5035.c: "Precisamos da sua ajuda para passar por #EMP estas#! áreas..."
 ep3_laamps.5035.c.success: "O conselho se prova útil"
 ep3_laamps.5035.c.failure: "As informações do guia são falhas"
 ep3_laamps.5035.c.critfailure: "O caminho do guia leva você diretamente para uma armadilha"
 ep3_laamps.5035.d: "Não há necessidade de seus serviços."
 ep3_laamps.5035.d.tt: "Vamos apenas ter que esperar que não nos percamos..."
 ep3_laamps.5035.d.toast: "Você se perde"
 guide_map: "Mapas Detalhados"
 guide_map_desc: "Este conjunto de mapas mostra o relevo da terra em grande detalhe, em grande parte do mundo conhecido. É particularmente útil ao navegar por terrenos difíceis e traiçoeiros."
 ep3_laamps.5040.t: "Divagação sobre Ruínas"
 ep3_laamps.5040.desc: "Enquanto exploro o caminho à frente do acampamento, encontro um conjunto desleixado de comerciantes. Eles estão reunidos ao redor de alguns edifícios grandes, porém antigos e em ruínas; os que ainda permanecem em bom estado foram ocupados pelos mercadores.\n\nSuas mercadorias são bastante comuns. Principalmente comida, estando em uma estrada muito movimentada, que sem dúvida atrairá muitos compradores. Ainda assim, meu olhar é inexoravelmente atraído para as paredes cinzentas e marcadas das ruínas.\n\nSão magníficas! Os mercadores ocupam apenas a periferia, mas seu coração decadente permanece intocado."
 ep3_laamps.5040.a: "Bem, vamos tentar minha sorte nessas ruínas..."
 ep3_laamps.5040.a.bigsuccess: "Sua busca vai muito bem"
 ep3_laamps.5040.a.bigsuccess.tt: "Você descobre uma arma empoeirada"
 ep3_laamps.5040.a.success: "Sua busca vai bem"
 ep3_laamps.5040.a.success.tt: "Você descobre uma pequena bugiganga"
 ep3_laamps.5040.a.failure: "Sua busca é inútil"
 ep3_laamps.5040.a.failure.tt: "Você não descobre nada"
 ep3_laamps.5040.b: "É melhor ficar seguro e comprar provisões."
 ep3_laamps.5040.c: "Talvez alguns deles queiram se juntar a mim?"
 ep3_laamps.5040.c.critsuccess.tt: "Dois [followers|lE] se juntam"
 ep3_laamps.5040.c.success.tt: "Um [follower|lE] se junta"
 ep3_laamps.5040.c.failure.tt: "Ninguém se junta"
 ep3_laamps.5040.c.critsuccess: "Um casal aceita sua oferta"
 ep3_laamps.5040.c.success: "Alguém decide se juntar a você"
 ep3_laamps.5040.c.failure: "Ninguém se apresenta"
 ep3_laamps.5045.t: "Os Corredores do Poder"
 ep3_laamps.5045.desc: "A comida na residência de [local_lord.GetFullNamePossessive], em [location.GetName], é excelente, é claro. Muito diferente da comida rústica e improvisada a que estou tão acostumad[ROOT.Char.Custom('ES_OA')].\n\n\"Fico muito feliz que tenha atendido ao meu chamado\", diz [local_lord.GetFirstNameNoTooltip], gesticulando em minha direção. \"Gostaria de ver se há algo que possamos fazer para nos ajudarmos mutuamente.\"\n\n\"Afinal, há certas ocasiões em que um[local_lord.Custom('ES_XA')] [local_lord.GetWomanMan] da minha estatura não consegue se #EMP meter na lama#! como certos trabalhos exigem...\"."
 ep3_laamps.5045.a: "Você sabe, estou bastante cansado da vida errante..."
 ep3_laamps.5045.a.tt: "Isso está disponível para você porque você tem o [modifier|lE] [GetModifier( 'ep3_lust_for_land_modifier' ).GetNameWithTooltip]"
 ep3_laamps.5045.a.success: "Suas palavras se mostram persuasivas"
 ep3_laamps.5045.a.failure: "[local_lord.GetSheHe|U] ri disso"
 ep3_laamps.5045.b: "Bem, ouro nunca faz mal..."
 ep3_laamps.5045.c: "Mais um pouco dessa comida seria ótimo."
 ep3_laamps.5045.d: "Tudo o que preciso é trabalho para servir estas terras."
 world_africa_sahara_provisions_usage_multiplier_modifier: "Província Sahariana"
 world_africa_sahara_provisions_usage_multiplier_modifier_desc: "Esta província está sujeita à plena ira do poderoso Saara (ou uma de suas cadeias montanhosas adjacentes) — apenas um tolo ou um expert tentaria atravessá-la."
 duel_to_the_death.tt: "@death_icon! #X Você imediatamente entra em um [single_combat_duel|lE] até a [character_death_death|lE]#!"
 ##################################################
 #SIMPLE JOYS
 ep3_laamp_flavour_ewan.0001.t: "Tons Rosados"
 ep3_laamp_flavour_ewan.0001.desc.intro.preamble: "O início da noite é um momento de intensa atividade para o acampamento, pessoas e suprimentos sendo jogados para lá e para cá enquanto nossa casa portátil é instalada mais uma vez. Habitualmente, é também quando dou uma caminhada para clarear minha cabeça e"
 ep3_laamp_flavour_ewan.0001.desc.intro.lazy: "evitar todas as pequenas tarefas e perguntas que vêm de meus seguidores.\n\n"
 ep3_laamp_flavour_ewan.0001.desc.intro.diligent: "organizar mentalmente minhas tarefas para amanhã.\n\n"
 ep3_laamp_flavour_ewan.0001.desc.intro.fallback: "escapar do barulho por um tempo.\n\n"
 ep3_laamp_flavour_ewan.0001.desc.midtro.sunlight_boilerplate: "Vejo os últimos raios rosados do sol moribundo banhando o"
 ep3_laamp_flavour_ewan.0001.desc.midtro.small_hill: "Ao alcançar o topo de uma pequena colina, $ep3_laamp_flavour_ewan.0001.desc.midtro.sunlight_boilerplate$"
 ep3_laamp_flavour_ewan.0001.desc.midtro.tree_covered_hill: "Ao alcançar o topo de uma colina coberta de árvores, $ep3_laamp_flavour_ewan.0001.desc.midtro.sunlight_boilerplate$"
 ep3_laamp_flavour_ewan.0001.desc.midtro.small_ridge: "Ao alcançar o topo de uma pequena crista, $ep3_laamp_flavour_ewan.0001.desc.midtro.sunlight_boilerplate$"
 ep3_laamp_flavour_ewan.0001.desc.midtro.small_dune: "Ao alcançar o topo de uma pequena duna, $ep3_laamp_flavour_ewan.0001.desc.midtro.sunlight_boilerplate$"
 ep3_laamp_flavour_ewan.0001.desc.midtro.dusty_ridge: "Ao alcançar o topo de uma crista empoeirada, $ep3_laamp_flavour_ewan.0001.desc.midtro.sunlight_boilerplate$"
 ep3_laamp_flavour_ewan.0001.desc.midtro.stubby_hillock: "Ao alcançar o topo de um morrinho, $ep3_laamp_flavour_ewan.0001.desc.midtro.sunlight_boilerplate$"
 ep3_laamp_flavour_ewan.0001.desc.midtro.dusty_hill: "Ao alcançar o topo de uma colina empoeirada, $ep3_laamp_flavour_ewan.0001.desc.midtro.sunlight_boilerplate$"
 ep3_laamp_flavour_ewan.0001.desc.plains: "planícies abaixo, esculpindo bolsões de luz cintilante onde atingem poças e riachos, e banhando o restante em um brilho suave."
 ep3_laamp_flavour_ewan.0001.desc.farmlands: "terras agrícolas abaixo, capturando as cercas e as casas e suavizando suas bordas com a mais sutil sugestão de sombras profundas. Tantos pequenos mundos para pequenas pessoas sob o mesmo céu brilhante."
 ep3_laamp_flavour_ewan.0001.desc.hills: "colinas abaixo, criando dezenas de pequenos bolsões de sombra, um cobertor marcado por manchas de rosa e vales escuros."
 ep3_laamp_flavour_ewan.0001.desc.mountains: "picos menores abaixo, lançando vales inteiros em sombras rápidas enquanto banham as pontas das montanhas em luz rosada."
 ep3_laamp_flavour_ewan.0001.desc.desert: "deserto se estendendo diante de mim, um oceano de areia rosa se estendendo até o horizonte. Além disso, até mesmo. Árido, mas longe de ser sem características, o terreno se desloca com os ventos do final do dia."
 ep3_laamp_flavour_ewan.0001.desc.desert_mountains: "picos menores abaixo, as montanhas ressecadas bebendo profundamente e avidamente da luz rosada, lançando vales inteiros em sombra enquanto esgotam-na."
 ep3_laamp_flavour_ewan.0001.desc.oasis: "deserto se estendendo diante de mim, capturando as águas do oásis mais brilhante de todos. A preciosa poça brilha ainda mais, tornando-se mais do que apenas um farol metafórico por um tempo."
 ep3_laamp_flavour_ewan.0001.desc.jungle: "dossel da selva se estendendo abaixo, um patchwork de sombras já profundamente alongadas e árvores majestosas parecendo se esticar para cima por apenas uma última visão de luz difusa."
 ep3_laamp_flavour_ewan.0001.desc.forest: "floresta abaixo, uma confusão de esporas nodosas e pequenos caminhos com patches de sombra suficientes para esconder um exército, embora dois ou três soldados ao mesmo tempo."
 ep3_laamp_flavour_ewan.0001.desc.taiga: "floresta abaixo, pinheiros e abetos se estendendo através de colinas rochosas por léguas, mesclados com sombras e luz rosada."
 ep3_laamp_flavour_ewan.0001.desc.wetlands: "terras úmidas abaixo, as águas fétidas do pântano se transformando instantaneamente em um cobertor rosa de escalas prateadas, a luz transformando cada poça em uma joia cintilante."
 ep3_laamp_flavour_ewan.0001.desc.steppe: "estepes se estendendo diante de mim, um mar de grama amarela e marrom ondulante repentinamente iluminado por um suave rosa. A estranha planura da terra privando a sombra de apoio, criando um tableau confortavelmente uniforme."
 ep3_laamp_flavour_ewan.0001.desc.floodplains: "planícies alagadas se estendendo diante de mim, altas, gramas luxuriosas e fileiras de árvores florescentes lançando finas franjas de sombra para todos os lados. A terra toda parece brilhar, suavemente."
 ep3_laamp_flavour_ewan.0001.desc.drylands: "terras secas abaixo, banhando a paisagem em uma suave luz rosa, de colina a colina, de vila a vila, cobrindo as muitas pequenas aldeias da área em uma calma imobilidade."
 ep3_laamp_flavour_ewan.0001.desc.outro: "\n\nUma visão linda — talvez até uma que valha a pena compartilhar?"
 ep3_laamp_flavour_ewan.0001.a: "Demore-se e aprecie a solidão."
 ep3_laamp_flavour_ewan.0001.b: "[watch_partner_1.GetFirstNameNoTooltip], suba aqui!"
 ep3_laamp_flavour_ewan.0001.c: "Melhor chamar a [watch_partner_2.GetFirstNameNoTooltip]."
 ep3_laamp_flavour_ewan.0001.d: "Um momento agradável, mas o trabalho chama."
 ep3_laamp_flavour_ewan_0001_the_little_things_modifier: "As Pequenas Coisas"
 ep3_laamp_flavour_ewan_0001_the_little_things_modifier_desc: "Este personagem se certifica de reservar tempo para apreciar as pequenas alegrias da vida."
 ep3_laamp_flavour_ewan_0001_all_business_modifier: "Apenas Negócios"
 ep3_laamp_flavour_ewan_0001_all_business_modifier_desc: "Quando há trabalho a ser feito, tudo o mais pode esperar."
 ep3_laamp_flavour_ewan.0011.t: "Fogo & Amigos"
 ep3_laamp_flavour_ewan.0011.desc.intro: "Todas as noites, a fogueira se torna #EMP o#! centro da atividade social do acampamento, as pessoas se juntam a mim para bater papo e trocar farpas amistosas. Esta noite não é exceção.\n\n\"Olhem, eu só estou dizendo…\", ri [mocker.GetFirstName]\", \"que [mockee.Custom('ES_ElLa')] pobre [mockee.GetFirstName]"
 ep3_laamp_flavour_ewan.0011.desc.lustful: "contraiu mais doenças venéreas do que tem dedos — e não podemos saber mais do que isso, pois não consegue contar mais alto!"
 ep3_laamp_flavour_ewan.0011.desc.chaste: "aqui presente é um [mockee.Custom('ES_XA')] apóstolo da castidade. E que eu me dane se isso não faz sentido, porque, do contrário, seria uma desgraça para [mockee.GetSheHe] com essa cara que tem!"
 ep3_laamp_flavour_ewan.0011.desc.gluttonous: "é a #EMP verdadera#! razão de que tenhamos que nos mudar com tanta frequência. Toda vez que vai ao mercado, provoca uma fome!\"."
 ep3_laamp_flavour_ewan.0011.desc.temperate: "não pode ser culpado por acidentalmente beber xixi de cabra e não notar o gosto. Não é a primeira vez, isso é um acidente, mas a #EMP segunda#!? Agora isso é um padrão!\""
 ep3_laamp_flavour_ewan.0011.desc.greedy: "#EMP tecnicamente#! não fez nada de errado ao jogar aquela moeda para o mendigo; não é culpa de [mockee.GetHerHis] que [mockee.GetFirstNameNoTooltip] a tenha pegado antes dele!\""
 ep3_laamp_flavour_ewan.0011.desc.generous: "é uma alma bondosa que só não está nos dando a camisa que leva agora porque nenhum cretino a aceitaria!\"."
 ep3_laamp_flavour_ewan.0011.desc.lazy: "não pode ser culpado por desaparecer mais rápido do que uma lebre assustada sempre que alguém começa uma frase com 'pode' — em certo ponto, a preguiça se torna uma forma de arte!\""
 ep3_laamp_flavour_ewan.0011.desc.diligent: "não pode ser culpado por seu péssimo ritmo de marcha; deve ser difícil andar com esse pau enfiado no cu!\""
 ep3_laamp_flavour_ewan.0011.desc.wrathful: "não tem culpa do seu mau gênio, eu também ficaria de mau humor se tivesse que acordar sabendo que sou [mockee.GetSheHe]!\"."
 ep3_laamp_flavour_ewan.0011.desc.calm: "pode ser entediante[mockee.Custom('ES_OA')], seco, cronicamente impassível, a melhor arma do acampamento contra a insônia e... Ah, foi mal, [mockee.GetFirstNameNoTooltip], não tinha visto você aí!\""
 ep3_laamp_flavour_ewan.0011.desc.patient: "teria vencido aquela pedra no concurso de olhar se não tivéssemos que mover o acampamento após uma semana ou duas!\""
 ep3_laamp_flavour_ewan.0011.desc.impatient: "pode até ter a capacidade de atenção de um mosquito, mas compensa isso com seu… ehh… entusiasmo natural por coisas novas, né [mockee.GetFirstNameNoTooltip]?\"."
 ep3_laamp_flavour_ewan.0011.desc.arrogant: "não pode ser culpado pelo seu ego #EMP colosal#!; afinal, é a única coisa grande que ainda tem a seu nome hoje em dia!\""
 ep3_laamp_flavour_ewan.0011.desc.humble: "se menospreza o suficiente para que eu realmente não precise tentar — mas vou fazer isso mesmo assim!\""
 ep3_laamp_flavour_ewan.0011.desc.deceitful: "pode ser a pessoa #EMP menos#! honesta que já conheci, mas não dá para dizer que uma conversa com [mockee.GetHerHim] não seja uma aventura! Não é, [mockee.GetFirstNameNoTooltip]? Se esse for mesmo seu nome!\""
 ep3_laamp_flavour_ewan.0011.desc.honest: "não consegue contar nem uma mentira nem para salvar a vida; ou, nesse caso, nem uma piada!\""
 ep3_laamp_flavour_ewan.0011.desc.craven: "é uma alma gentil da qual todos nós devemos ter cuidado para não assustar, para que seu coração não falhe de medo!\""
 ep3_laamp_flavour_ewan.0011.desc.brave: "está sempre pront[mockee.Custom('ES_OA')] para uma luta, e isso é bom. Melhor que os mais feios briguem; são os que têm menos a perder!\""
 ep3_laamp_flavour_ewan.0011.desc.shy: "foi muito corajoso ao vir e se sentar ao lado da fogueira esta noite. Já estou ansioso pela visita no próximo ano!"
 ep3_laamp_flavour_ewan.0011.desc.gregarious: "tem ganhada a fama de ter dom de gente, de agradar a todos, o que é bom, porque jamais deixou satisfeita uma única pessoa!\"."
 ep3_laamp_flavour_ewan.0011.desc.ambitious: "pode ter ideias grandiosas sobre seu potencial na vida, mas é preciso admitir, não há muitas pessoas capazes de divagar por um minuto inteiro sem respirar!\"."
 ep3_laamp_flavour_ewan.0011.desc.content: "sabe manter suas ambições bem pequenas — combinando com seus talentos!\""
 ep3_laamp_flavour_ewan.0011.desc.arbitrary: "não pode ser responsabilizado por não entender todas essas #EMP normas#!— afinal, nem consegue ler!\""
 ep3_laamp_flavour_ewan.0011.desc.just: "pode ser muito rígid[mockee.Custom('ES_OA')] com as regras, é verdade, mas, dado o quanto elas parecem enfiadas no cu dela, isso é de se esperar!\""
 ep3_laamp_flavour_ewan.0011.desc.cynical: "não é famoso por ser uma pessoa piedosa, com certeza. Mas se formos #EMP estrictamente#! estritamente justos, eu também teria dificuldade se [mocker.GetFaith.CreatorName] me tivesse amaldiçoado com aquela cara!\"."
 ep3_laamp_flavour_ewan.0011.desc.zealous: "é conhecid[mockee.Custom('ES_OA')] como um[mockee.Custom('ES_XA')] dos seguidores mais just[mockee.Custom('ES_OA')]s e abnegad[mockee.Custom('ES_OA')]s de [mockee.GetFaith.HighGodName] na face da Terra — [mockee.GetSheHe] até abriu mão de todo o seu senso de humor!\""
 ep3_laamp_flavour_ewan.0011.desc.paranoid: "é conhecido por ter feito alguns inimigos em tempos — talvez alguns deles estejam aqui agora, talvez até... #EMP atrás de você#!, [mockee.GetFirstNameNoTooltip], CUIDADO!\""
 ep3_laamp_flavour_ewan.0011.desc.trusting: "pode ter perdido uma ou outra moeda para um trapaceiro ou dois, mas, em sua defesa, como [mockee.GetSheHe] poderia saber que aquele mendigo desdentado não era #EMP de verdade#! o rei de [current_county.GetBaseNameNoTier]?\""
 ep3_laamp_flavour_ewan.0011.desc.compassionate: "é um pouco maci[mockee.Custom('ES_OA')]... O muito maci[mockee.Custom('ES_OA')]... Totalmente maci[mockee.Custom('ES_OA')], na verdade. Como um edredom fino de penugem de ganso em forma humana\"."
 ep3_laamp_flavour_ewan.0011.desc.callous: "pode ter o mesmo nível de consciência social que uma cabra, mas, ao contrário de uma cabra, é… Vixe, [mockee.GetFirstNameNoTooltip], que constrangedor."
 ep3_laamp_flavour_ewan.0011.desc.sadistic: "#EMP de fato#! chutou aquele órfão morro abaixo e #EMP de fato#! riu na cara daquela mendiga, mas [mockee.GetSheHe] também tem qualidades redentoras... suponho. Em algum lugar. Provavelmente.\""
 ep3_laamp_flavour_ewan.0011.desc.stubborn: "pode ser a coisa mais teimosa que o acampamento tem a oferecer, mas isso é bem impressionante se você considerar todas as mulas!\""
 ep3_laamp_flavour_ewan.0011.desc.fickle: "pode mudar sua mente mais vezes do que o vento muda de direção, mas você tem que admitir, nunca há um momento monótono falando com [mockee.GetSheHe]!\""
 ep3_laamp_flavour_ewan.0011.desc.vengeful: "pode ter jurado uma vingança eterna de sangue contra toda a linhagem daquela família, mas o que mais ele poderia fazer? Eles furaram a fila do rancho!\""
 ep3_laamp_flavour_ewan.0011.desc.forgiving: "pode estar #EMP demasiado#! dispost[mockee.Custom('ES_OA')] a fazer as pazes, mas o que é um pequeno assassinato de cachorro entre amigos, não é? Isso acontece com os melhores de nós — e também com [mockee.GetSheHe]!\"."
 ep3_laamp_flavour_ewan.0011.desc.eccentric: "talvez seja esquisit[mockee.Custom('ES_OA')], que fale de forma estranha, que cheire inexplicavelmente a cozido na maior parte do tempo, mas pelo menos não se pode dizer que seja previsível!\"."
 ep3_laamp_flavour_ewan.0011.desc.outro: "\n\nUm coro de gargalhadas irrompe entre os espectadores embriagados, embora pareça que tudo isso esteja cansando [mockee.GetFirstNameNoTooltip]."
 ep3_laamp_flavour_ewan.0011.a: "Junte-se à gozação de [mockee.GetFirstNameNoTooltip]."
 ep3_laamp_flavour_ewan.0011.a.tt.success: "A Vida da Festa"
 ep3_laamp_flavour_ewan.0011.a.tt.failure: "Passou dos Limites"
 ep3_laamp_flavour_ewan.0011.b: "As tornas se voltam contra [mocker.GetFirstNameNoTooltip]."
 ep3_laamp_flavour_ewan.0011.b.tt.success: "$ep3_laamp_flavour_ewan.0011.a.tt.success$"
 ep3_laamp_flavour_ewan.0011.b.tt.failure: "$ep3_laamp_flavour_ewan.0011.a.tt.failure$"
 ep3_laamp_flavour_ewan.0011.c: "Conte uma piada sua."
 ep3_laamp_flavour_ewan.0011.c.tt.success: "$ep3_laamp_flavour_ewan.0011.a.tt.success$"
 ep3_laamp_flavour_ewan.0011.c.tt.failure: "O Que Isso Até #EMP Significa#!?"
 ep3_laamp_flavour_ewan.0011.d: "Absorva tudo isso."
 ep3_laamp_flavour_ewan.0021.t: "Um Pequeno Seguidor"
 ep3_laamp_flavour_ewan.0021.desc.intro.cat: "Há vários dias, vi um pequeno gato se esgueirando ao redor do meu pavilhão,"
 ep3_laamp_flavour_ewan.0021.desc.intro.dog: "Há vários dias, um cachorrinho esfarrapado passou suas noites sentado do lado de fora do meu pavilhão,"
 ep3_laamp_flavour_ewan.0021.desc.cat.1: "caçando os ratos locais e afastando vigorosamente seguidores inferiores com a indignação altiva da verdadeira realeza.\n\nPode haver uma maior síntese da vida de um nobre do que esses dois atos?"
 ep3_laamp_flavour_ewan.0021.desc.cat.2: "levantando-se com o acampamento ao amanhecer, cochilando durante a trilha diária no #EMP meu#! carro, antes de se levantar sonolento para buscar uma refeição noturna de restos de mesa e provisões roubadas.\n\nUm animal presunçoso, mas certamente determinado."
 ep3_laamp_flavour_ewan.0021.desc.cat.3: "desaparecendo sempre que alguém se aproxima, apenas para reaparecer silenciosamente minutos depois — observando à distância.\n\nTímido, mas eternamente curioso. Uma combinação pesada para qualquer um suportar, e menos ainda para um gato tão pequeno."
 ep3_laamp_flavour_ewan.0021.desc.cat.4: "enrolando-se ansiosamente ao redor dos pés de cada um dos meus visitantes — e até mesmo muitos transeuntes — conseguindo um petisco ou um carinho no queixo antes de abandonar os infelizes sem pensar duas vezes.\n\nImplacável, talvez, mas eficaz."
 #Bazcat.
 ep3_laamp_flavour_ewan.0021.desc.cat.5: "e nunca conheci um animal tão barulhento e furioso. Pouco mais do que uma bola de dentes, garras e raiva, sua pequena estatura desmente a aparente magnitude do #EMP ódio#! dentro dele.\n\nTalvez seja uma boa coisa que o animal tenha nascido gato e não pantera."
 ep3_laamp_flavour_ewan.0021.desc.dog.1: "uivando e choramingando sempre que saio de sua vista, lamentando como... bem, como um cachorro pelo seu mestre, embora eu só tenha conhecido o cão há pouco.\n\nTalvez o animal sinta algum tipo de afinidade comigo, embora durante o dia ele trote atrás de mim a uma distância razoável."
 ep3_laamp_flavour_ewan.0021.desc.dog.2: "rosnando e tentando morder qualquer um que se aproxime a um pé de distância, por ter a ousadia de se aproximar da minha moradia.\n\nImpraticável em muitos níveis, mas não há nada melhor para proteger você do que um hound leal."
 ep3_laamp_flavour_ewan.0021.desc.dog.3: "correndo círculos e círculos e círculos e #EMP círculos#! com a energia infinita de um hound que tem lugares para ir, mas nenhum para estar.\n\nSomos, talvez, um pouco semelhantes nesse aspecto. Ambos são estranhos à deriva no mundo."
 ep3_laamp_flavour_ewan.0021.desc.dog.4: "parecendo fazer o possível para ensinar truques #EMP a si mesmo#!, talvez esperando me impressionar. É um cão mais esperto do que a maioria, algo que percebi apenas quando a danada da criatura arrancou um nabo cozido da minha mão com um único salto.\n\nGritei com o animal, mas não posso dizer que não foi engraçado. Até impressionante, considerando que é um cachorro."
 ep3_laamp_flavour_ewan.0021.desc.dog.5: "que me segue com nada além de uma respiração quase silenciosa sempre que vou embora, antes de me acompanhar na viagem de volta. Não sei por que ele me protege, mas parece contente em fazê-lo, seja qual for o motivo.\n\nTalvez eu lembre ao animal um antigo [ROOT.Char.Custom('MistressMaster')]? É difícil dizer, embora a rotina certamente pareça vir com facilidade para ele."
 ep3_laamp_flavour_ewan.0021.desc.outro: "\n\nA besta parece amigável o suficiente para mim, felizmente esfregando e lambendo meus dedos por minutos a fio, mesmo que se recuse a aceitar qualquer outra pessoa."
 ep3_laamp_flavour_ewan.0021.a: "Venha aqui, pequeno amigo, você não é um belo companheiro?"
 ep3_laamp_flavour_ewan.0021.b: "Isso... é uma refeição..."
 ep3_laamp_flavour_ewan.0021.c: "Chute a criatura o mais forte possível."
 ep3_laamp_flavour_ewan.0021.d: "É apenas um companheiro de viagem, deixe-o em paz."
 ep3_laamp_flavour_ewan_0021_respected_cat_modifier: "Gato Respeitado"
 ep3_laamp_flavour_ewan_0021_respected_cat_modifier_desc: "Este personagem sabe quem é verdadeiramente o melhor amigo do homem."
 ep3_laamp_flavour_ewan_0021_respected_dog_modifier: "Cachorro Respeitado"
 ep3_laamp_flavour_ewan_0021_respected_dog_modifier_desc: "$ep3_laamp_flavour_ewan_0021_respected_cat_modifier_desc$"
 ep3_laamp_flavour_ewan.0031.t: "Rolando para Baixo"
 ep3_laamp_flavour_ewan.0031.desc.intro: "Enquanto cavalgamos por [current_county.GetBaseNameNoTier], meus pensamentos vagueiam ociosamente, entediados pela monotonia de um simples deslocamento, quando, de repente, ouço um #EMP grito#! de alarme.\n\nHá um ataque? Viro a cabeça e… não. É esse [stooge.Custom('ES_EA')] idiota [stooge.Custom('ES_DelDela')] [stooge.GetTitledFirstName|l], que conseguiu cair do cavalo e"
 ep3_laamp_flavour_ewan.0031.desc.plains: "rolar por uma pequena ladeira direto em um matagal de aparência maligna,"
 ep3_laamp_flavour_ewan.0031.desc.farmlands: "passar por uma cerca grossa e cair em uma vala cheia de espinhos,"
 ep3_laamp_flavour_ewan.0031.desc.hills: "rolar direto pela encosta de uma colina íngreme, de ponta-cabeça até cair em um desfiladeiro,"
 ep3_laamp_flavour_ewan.0031.desc.mountains: "deslizar pela encosta, levantando pedras e poeira até tombar sobre uma borda"
 ep3_laamp_flavour_ewan.0031.desc.desert: "descer girando por uma alta duna, se desajeitando com estalos para lá e para cá enquanto o impulso leva [stooge.Custom('ES_LoLa')] para a frente"
 ep3_laamp_flavour_ewan.0031.desc.desert_mountains: "$ep3_laamp_flavour_ewan.0031.desc.mountains$"
 ep3_laamp_flavour_ewan.0031.desc.oasis: "$ep3_laamp_flavour_ewan.0031.desc.desert$"
 ep3_laamp_flavour_ewan.0031.desc.jungle: "rolar pela encosta de uma colina coberta de árvores, pegando cipós e espinhos estranhos enquanto"
 ep3_laamp_flavour_ewan.0031.desc.forest: "rolar pela encosta de uma colina coberta de árvores, pegando galhos e espinhos enquanto"
 ep3_laamp_flavour_ewan.0031.desc.taiga: "rolar pela encosta de uma colina coberta de árvores, pegando galhos e pinhas velhas enquanto"
 ep3_laamp_flavour_ewan.0031.desc.wetlands: "deslizar por um morro atarracado, levantando lama e grama úmida,"
 ep3_laamp_flavour_ewan.0031.desc.steppe: "encontrar o #EMP um#! morro em léguas em todas as direções para rolar para baixo,"
 ep3_laamp_flavour_ewan.0031.desc.floodplains: "rolar em que parece ser algum tipo de vala de drenagem turva,"
 ep3_laamp_flavour_ewan.0031.desc.drylands: "rolar por uma colina empoeirada, levantando uma grossa nuvem de areia e"
 ep3_laamp_flavour_ewan.0031.desc.midtro: "solta gritos e choros durante o trajeto.\n\n"
 ep3_laamp_flavour_ewan.0031.desc.outro.dead: "Quando [stooge.GetFirstNameNoTooltip] não reaparece após vários minutos, um carregador desce para verificar. Momentos depois, um grito de choque ressoa.\n\nParece que morreu na queda."
 ep3_laamp_flavour_ewan.0031.desc.outro.fallback: "Alguns momentos depois, reaparece [stooge.GetFirstNameNoTooltip] xingando muito e viv[stooge.Custom('ES_OA')], mas não ileso."
 ep3_laamp_flavour_ewan.0031.a: "Rir em voz alta."
 ep3_laamp_flavour_ewan.0031.b: "Rir de forma contida, mas não mais."
 ep3_laamp_flavour_ewan.0031.c: "Tal malícia mesquinha está abaixo de mim."
 ep3_laamp_flavour_ewan_0031_grisly_modifier: "Sentido de Humor Macabro"
 ep3_laamp_flavour_ewan_0031_grisly_modifier_desc: "A vida está rindo de você, por que não rir junto?"
 ep3_laamp_flavour_ewan_0031_macabre_modifier: "Sentido de Humor Macabro"
 ep3_laamp_flavour_ewan_0031_macabre_modifier_desc: "Só porque é sombrio não significa que não seja engraçado."
 ep3_laamp_flavour_ewan.0041.t: "Dificuldades de um Cozinheiro"
 ep3_laamp_flavour_ewan.0041.desc.has_cook: "\"Não creio estar sendo irracional\", resmunga [camp_cook.GetFirstName] —meu [GetCourtPositionType( 'camp_cook_camp_officer' ).GetName()|l]— enquanto faz um gesto de desdém para o terreno ao redor.\n\n"
 ep3_laamp_flavour_ewan.0041.desc.nameless_cook: "\"Não acho que estamos sendo irrazonáveis\", provoca o cozinheiro que presumivelmente puxou a palha curta para vir falar comigo, acenando um braço de forma desdenhosa para o terreno ao redor o tempo todo.\n\n"
 ep3_laamp_flavour_ewan.0041.desc.plains: "\"Há muitas fazendas aqui, mesmo que não sejam boas, não pode ser tão difícil para nós parar brevemente e"
 ep3_laamp_flavour_ewan.0041.desc.farmlands: "\"Toda essa bela terra agrícola e não conseguimos encontrar um pouco de tempo para"
 ep3_laamp_flavour_ewan.0041.desc.hills: "\"Tantos pastos nas colinas por milhas ao redor, ainda assim não conseguimos nos dar ao luxo de"
 ep3_laamp_flavour_ewan.0041.desc.mountains: "\"Toda essa caça nas montanhas ao redor e nem mesmo podemos nos dar ao luxo de"
 ep3_laamp_flavour_ewan.0041.desc.desert: "\"Com os braços enfiados até o fundo deste deserto, sem um assentamento à vista, e nós tão desprovidos que não conseguimos nem"
 ep3_laamp_flavour_ewan.0041.desc.desert_mountains: "\"Erguendo-se metade do caminho até o céu e com as gargantas secas, e nem mesmo conseguimos tentar"
 ep3_laamp_flavour_ewan.0041.desc.oasis: "\"Mesmo em um verdadeiro oásis, parecemos tão ansiosos para voltar à dureza do deserto, que nem conseguimos"
 ep3_laamp_flavour_ewan.0041.desc.jungle: "\"Mesmo com as muitas iguarias exóticas da selva ao nosso alcance, não conseguimos nem encontrar a vontade de"
 ep3_laamp_flavour_ewan.0041.desc.forest: "\"Mesmo nesta rica floresta, não conseguimos nos dar ao luxo de"
 ep3_laamp_flavour_ewan.0041.desc.taiga: "\"Aqui fora, em algum remoto inferno de floresta abandonada, tão longe da vida que não conseguimos nem"
 ep3_laamp_flavour_ewan.0041.desc.wetlands: "\"Doomed to wander this stinking bog for all eternity, unable to even"
 ep3_laamp_flavour_ewan.0041.desc.steppe: "\"Perdidos aqui neste mar de grama sem características, muito longe de qualquer lugar para até mesmo"
 ep3_laamp_flavour_ewan.0041.desc.floodplains: "\"Descartados aqui nessas planícies alagadas apodrecidas, à mercê das marés e das margens, incapazes de até mesmo"
 ep3_laamp_flavour_ewan.0041.desc.drylands: "\"Banidos aqui para este inferno empoeirado, muito longe de qualquer lugar importante o suficiente para até mesmo"
 ep3_laamp_flavour_ewan.0041.desc.outro: "estocar alguns dos pequenos luxos que tornam nossa comida suportável?\".\n\nSuspiro, já exaust[ROOT.Char.Custom('ES_OA')] desta conversa. Me pergunto qual de nós vai ceder primeiro."
 ep3_laamp_flavour_ewan.0041.desc.provisions.high: "\n\nIsso parece as devaneios de um lunático. Verifiquei os estoques esta manhã e deveríamos estar bem supridos por meses ainda."
 ep3_laamp_flavour_ewan.0041.desc.provisions.medium: "\n\nSim, nossos suprimentos estão, talvez, um #EMP pouco#! abaixo do que eu gostaria, mas não há motivo para tal alarme."
 ep3_laamp_flavour_ewan.0041.desc.provisions.low: "\n\nNossas reservas estão como estão e est[camp_cook.Custom('ES_EA')] e idiota discutindo sobre se o último de nossos suprimentos vai caber direitinho."
 ep3_laamp_flavour_ewan.0041.desc.provisions.sahara: "\n\nEu olho ao redor para o quase infinito deserto se estendendo em todas as direções, para sempre."
 ep3_laamp_flavour_ewan.0041.a: "Sobre o que você está reclamando?"
 ep3_laamp_flavour_ewan.0041.b: "Tudo bem, podemos reabastecer."
 ep3_laamp_flavour_ewan.0041.b.tt.success: "Você faz bons negócios"
 ep3_laamp_flavour_ewan.0041.b.tt.failure: "Negociações fracas com os locais"
 ep3_laamp_flavour_ewan.0041.c: "De jeito nenhum, trabalhe com o que você tem."
 ep3_laamp_flavour_ewan.0041.d: "Tenho certeza de que você pode pensar em algo entre vocês."
 ep3_laamp_flavour_ewan.0041.e: "Provavelmente podemos encontrar algo..."
 ep3_laamp_flavour_ewan.0041.e.tt.success: "Seus esforços são bem-sucedidos"
 ep3_laamp_flavour_ewan.0041.e.tt.failure: "Quase de mãos vazias"
 ep3_laamp_flavour_ewan.0041.f: "Reabastecer seria uma boa ideia de qualquer maneira, eu suponho."
 ep3_laamp_flavour_ewan.0041.f.tt.success: "$ep3_laamp_flavour_ewan.0041.b.tt.success$"
 ep3_laamp_flavour_ewan.0041.f.tt.failure: "$ep3_laamp_flavour_ewan.0041.b.tt.failure$"
 ep3_laamp_flavour_ewan.0041.g: "Não está no orçamento."
 ep3_laamp_flavour_ewan.0041.h: "Apenas dobre as rações de cerveja e chame isso de dia."
 ep3_laamp_flavour_ewan.0041.i: "Podemos parar para forragear."
 ep3_laamp_flavour_ewan.0041.i.tt.success: "$ep3_laamp_flavour_ewan.0041.e.tt.success$"
 ep3_laamp_flavour_ewan.0041.i.tt.failure: "$ep3_laamp_flavour_ewan.0041.e.tt.failure$"
 ep3_laamp_flavour_ewan.0041.j: "Vamos comprar o que pudermos de suprimentos extras..."
 ep3_laamp_flavour_ewan.0041.j.tt.success: "$ep3_laamp_flavour_ewan.0041.b.tt.success$"
 ep3_laamp_flavour_ewan.0041.j.tt.failure: "$ep3_laamp_flavour_ewan.0041.b.tt.failure$"
 ep3_laamp_flavour_ewan.0041.k: "#EMP Tenemos#! que seguir adelante."
 ep3_laamp_flavour_ewan.0041.l: "Hum, puede que tengamos #EMP algo#! guardado."
 ep3_laamp_flavour_ewan.0041.m: "Você #EMP vê#! algum lugar onde comprar provisões, idiota?"
 ep3_laamp_flavour_ewan.0041.n: "Não me importo se estivermos comendo mingau até passar por isso."
 ep3_laamp_flavour_ewan_0041_well_provided_camp_modifier: "Acampamento Bem Suprido"
 ep3_laamp_flavour_ewan_0041_well_provided_camp_modifier_desc: "Lembranças de abundância podem durar muito tempo."
 ep3_laamp_flavour_ewan_0041_doubled_beer_rations_camp_modifier: "Rações de Cerveja Dobradas"
 ep3_laamp_flavour_ewan_0041_doubled_beer_rations_camp_modifier_desc: "En el campamento de este personaje, la gente está #EMP muy#! alegre; solo que no muy centrada."
 ep3_laamp_flavour_ewan_0041_stern_camp_modifier: "Sério em Suprimentos"
 ep3_laamp_flavour_ewan_0041_stern_camp_modifier_desc: "Os seguidores deste personagem aprendem a se virar com o que têm ou então a se virar sem."
 ep3_laamp_flavour_ewan_0041_quite_stern_camp_modifier: "Bastante Sério em Suprimentos"
 ep3_laamp_flavour_ewan_0041_quite_stern_camp_modifier_desc: "$ep3_laamp_flavour_ewan_0041_stern_camp_modifier_desc$"
 ep3_laamp_flavour_ewan_0041_very_stern_camp_modifier: "Muito Sério em Suprimentos"
 ep3_laamp_flavour_ewan_0041_very_stern_camp_modifier_desc: "$ep3_laamp_flavour_ewan_0041_stern_camp_modifier_desc$"
 ep3_laamp_flavour_ewan.0051.t: "Um Clamor Amigável"
 ep3_laamp_flavour_ewan.0051.desc.intro: "É difícil descrever o que há de tão intimamente atraente no baixo burburinho de um acampamento se ajeitando para a noite.\n\nTalvez seja"
 ep3_laamp_flavour_ewan.0051.desc.purpose.wanderers.1: "desfile de novos rostos ansiosos por escapar da vida estabelecida,"
 ep3_laamp_flavour_ewan.0051.desc.purpose.wanderers.2: "coro de discussões no início da noite sobre o planejamento de amanhã,"
 ep3_laamp_flavour_ewan.0051.desc.purpose.wanderers.3: "piadas levemente melancólicas sobre o que fazer a seguir,"
 ep3_laamp_flavour_ewan.0051.desc.purpose.mercenaries.1: "clangor de armas sendo jogadas para lá e para cá,"
 ep3_laamp_flavour_ewan.0051.desc.purpose.mercenaries.2: "gargalhadas de guerreiros contando piadas sujas,"
 ep3_laamp_flavour_ewan.0051.desc.purpose.mercenaries.3: "aplausos e vaias característicos de jogos distantes de dados,"
 ep3_laamp_flavour_ewan.0051.desc.purpose.scholars.1: "confortante arranhar de penas em diários noturnos,"
 ep3_laamp_flavour_ewan.0051.desc.purpose.scholars.2: "sons distantes dos mesmos argumentos da noite passada recomeçando sem mais delongas,"
 ep3_laamp_flavour_ewan.0051.desc.purpose.scholars.3: "gritos altivos de indignação de estudiosos vivendo na selva,"
 ep3_laamp_flavour_ewan.0051.desc.purpose.explorers.1: "discussões sobre lugares distantes como se todos já tivéssemos estado lá,"
 ep3_laamp_flavour_ewan.0051.desc.purpose.explorers.2: "ambições flagrantes de ver o mundo constantemente exibidas,"
 ep3_laamp_flavour_ewan.0051.desc.purpose.explorers.3: "um amor genuíno pelo que as maravilhas do mundo ainda podem conter,"
 ep3_laamp_flavour_ewan.0051.desc.purpose.brigands.1: "a fome por saques e pilhagens no rosto de cada seguidor,"
 ep3_laamp_flavour_ewan.0051.desc.purpose.brigands.2: "acusações de trapaça e ameaças de assassinato que surgem da jogatina,"
 ep3_laamp_flavour_ewan.0051.desc.purpose.brigands.3: "troca de contos macabros fora das tendas dos amigos,"
 ep3_laamp_flavour_ewan.0051.desc.purpose.legitimists.1: "o conhecimento de que essas pessoas me seguiriam até [ROOT.Char.random_NegativeAfter] se eu pedisse,"
 ep3_laamp_flavour_ewan.0051.desc.purpose.legitimists.2: "o murmúrio silencioso de votos diários sendo afirmados em cada outra tenda,"
 ep3_laamp_flavour_ewan.0051.desc.purpose.legitimists.3: "as histórias de triunfo e heroísmo que meus seguidores tecem sobre meu retorno."
 ep3_laamp_flavour_ewan.0051.desc.buildings.supply_tent_01: "o vasculhar de caixas e barris da tenda de suprimentos,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.supply_tent_sutler: "os gritos de venda dos sutlers,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.supply_tent_smithy: "os gritos ecoantes de metal contra metal da fundição,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.supply_tent_arsenal: "a contagem focada de cada estoque de cada arma e armamento no arsenal,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.barber_tent_01: "os gritos mistos e a polidez forçada da tenda do barbeiro,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.barber_tent_surgeons_tools: "os gritos mal contidos do que passa por cirurgia vindos da tenda do barbeiro,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.barber_tent_dentists_tools: "os gritos roucos dos seguidores tendo pinças e mãos firmes aplicadas em seus dentes ruins,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.barber_tent_torturers_tools: "os gritos roucos dos prisioneiros acampando muito perto da tenda do barbeiro,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.baggage_train_01: "o caos e a confusão do trem de bagagens se desenrolando após um dia em movimento,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.baggage_train_ample_steeds: "o relinchar de nossa legião de cavalos,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.baggage_train_porters: "as piadas e gemidos dos carregadores levando suas cargas de um lugar para outro,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.baggage_train_trackers: "os grupos silenciosos de caçadores se movendo como um só pelos caminhos e tendas,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.baggage_train_kennel: "os latidos e choros dos canis,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.baggage_train_siege_engineers: "o rangido incessante da carroça dos engenheiros enquanto se queixa sob o peso de seus próprios suprimentos,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.baggage_train_shrine: "a fila constante de fiéis se enrolando ao redor do santuário portátil,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.baggage_train_scribes: "a sagacidade seca e as observações irônicas dos muitos escribas vagando por aí sem serem úteis,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.baggage_train_bartering_grounds: "os gritos e clamores de comerciantes e seguidores no local de troca,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.baggage_train_ransom_cages: "os gritos e lamentos baixos dos prisioneiros em suas algemas e gaiolas,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.baggage_train_pleasure_tents: "o fluxo constante de pessoas vagando de volta da tenda de prazer com sorrisos sonolentos,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.mess_tent_01: "o barulho de seguidores famintos subindo da tenda de refeições,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.mess_tent_herbalists: "o cheiro de ervas secando das prateleiras do lado de fora da tenda de refeições,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.mess_tent_brewers: "o som de seguidores barulhentos se embriagando com a cerveja recém-preparada,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.mess_tent_bakers: "o cheiro de pão crescendo para a refeição da noite,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.mess_tent_cooks: "as habituais discussões entre os cozinheiros sobre essa ou aquela escolha mesquinha que um força sobre os outros,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.camp_fire_01: "o cheiro das fogueiras começando a ser acesas,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.camp_fire_trailing_musicians: "a deliciosa cacofonia dos nossos músicos acompanhantes começando,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.camp_fire_wandering_poets: "os suspiros chocados dos seguidores ouvindo poesia arriscada,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.camp_fire_capering_fools: "as traquinagens dos tolos saltando de fogueira em fogueira,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.camp_fire_local_hangers_on: "os curiosos locais aparecendo e observando tantos estranhos com medo e espanto,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.camp_fire_juicy_rumors: "o suspiro chocado de fofocas já começando a se espalhar ao redor das fogueiras,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.proving_grounds_01: "os gritos e berros distantes de frustração dos campos de provas,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.proving_grounds_horse_run: "o pisar de cascos enquanto nossa cavalaria leve pratica sua arte,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.proving_grounds_camel_run: "o trote estrondoso e os latidos distantes dos camelos,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.proving_grounds_elephantry_reserve: "o trombeteio descontente dos elefantes,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.proving_grounds_nightly_barding_drills: "os gemidos e clangores vindos dos pesados reparos de armaduras dos cavalos,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.proving_grounds_the_stump: "as barragens intermitentes de #EMP thwick#! enquanto mais um disparo é lançado em [ROOT.Char.Custom('GetStumpName')] de hoje,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.proving_grounds_personal_bouts: "os rugidos de sucesso e os aplausos de escárnio dos lutadores um contra um,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.proving_grounds_training_circle: "o clangor de escudo contra escudo nos círculos de treinamento,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.proving_grounds_mock_battle_drills: "o barulho menor de uma batalha simulada enquanto os lanceiros trabalham na disciplina conjunta,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.proving_grounds_the_stick_game: "a ocasional maldição realmente #EMP obscena#! quando alguém perde o jogo do bastão,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.proving_grounds_bodyguard_drills: "o berreiro gutural dos meus guardas pessoais treinando a plenos pulmões,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.camp_perimeter_01: "as ordens gritas e os pés arrastados que marcam o estabelecimento de nosso perímetro,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.camp_perimeter_fixed_layout: "as discussões silenciosas e suspiros resignados enquanto nosso layout definido se estabiliza, argumentando em meu favor,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.camp_perimeter_palisade: "o toque de madeira em madeira enquanto torres de vigia temporárias são levantadas para a noite,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.camp_perimeter_ditch: "o som das pás mordendo a terra enquanto a vigilância de hoje treina suas obras de terra simuladas,"
 ep3_laamp_flavour_ewan.0051.desc.buildings.fallback: "o entusiasmo que vem com acampar sob um céu aberto,"
 ep3_laamp_flavour_ewan.0051.desc.followers.connector: "ou até mesmo o"
 ep3_laamp_flavour_ewan.0051.desc.followers.courtier_relations.friends: "as brincadeiras bem-humoradas de [courtier_friend_1.GetFirstName] e [courtier_friend_2.GetFirstName] ao passar em frente ao meu pavilhão."
 ep3_laamp_flavour_ewan.0051.desc.followers.courtier_relations.best_friends: "as provocações afetuosas entre [courtier_best_friend_1.GetFirstName] e [courtier_best_friend_2.GetFirstName] quando tão grandes [Select_CString(And(courtier_best_friend_1.IsFemale, courtier_best_friend_2.IsFemale), 'amigas', 'amigos')] vão cuidar dos assuntos da noite."
 ep3_laamp_flavour_ewan.0051.desc.followers.courtier_relations.rivals: "as farpas amargas de [courtier_rival_1.GetFirstName] e [courtier_rival_2.GetFirstName] discutindo, como sempre."
 ep3_laamp_flavour_ewan.0051.desc.followers.courtier_relations.nemeses: "o rosnar quase contido de [courtier_nemesis_1.GetFirstName] e [courtier_nemesis_2.GetFirstName], que aproveitam qualquer oportunidade para se atacar mutuamente, como sempre."
 ep3_laamp_flavour_ewan.0051.desc.followers.courtier_relations.lovers: "as risadinhas e sussurros de [courtier_lover_1.GetFirstName] e [courtier_lover_2.GetFirstName], que caminham de braços dados em seus passeios habituais."
 ep3_laamp_flavour_ewan.0051.desc.followers.courtier_relations.soulmates: "os clichês excessivamente doces trocados entre [courtier_soulmate_1.GetFirstName] e [courtier_soulmate_2.GetFirstName] que, como sempre, passam como um casal de pombinhos."
 ep3_laamp_flavour_ewan.0051.desc.followers.courtier_count.many_children: "as risadas e gargalhadas de tantas crianças brincando, quando [leading_child.GetFirstName] grita ao passar por mim em uma partida de pega-pega."
 ep3_laamp_flavour_ewan.0051.desc.followers.courtier_count.many_knights: "os bramidos de [leading_knight.GetFirstName] enquanto dirige os $knight_culture_player_plural_no_tooltip$ em seus duelos diários."
 ep3_laamp_flavour_ewan.0051.desc.followers.courtier_count.many_languages: "muitas línguas sendo faladas por transeuntes, de [culture_1.GetLanguage.GetNameNoTooltip] a [culture_2.GetLanguage.GetNameNoTooltip] a [culture_3.GetLanguage.GetNameNoTooltip]."
 ep3_laamp_flavour_ewan.0051.desc.followers.courtier_count.many_faiths: "os sons das orações vespertinas dirigidas a [faith_1.HealthGodName] do [faith_1.GetName|l], [faith_2.HouseholdGodName] do [faith_2.GetName|l] e [faith_3.NightGodName] do [faith_3.GetName|l]."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.intro: "o som reconhecível d [notable_char.GetFirstName]"
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.lustful: "flertando com algum pobre seguidor."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.gluttonous: "devorando um prato local fresco."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.temperate: "exercendo uma palestra audível sobre os perigos de comer muito jantar."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.greedy: "contando suas moedas — o segundo de três, para ter certeza de que não perdeu nenhuma na marcha."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.generous: "rindo enquanto lança moedas para um seguidor sortudo."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.lazy: "ao se desculpar casualmente por não montar sua própria tenda… de novo."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.diligent: "organizando vários seguidores menores enquanto eles realizam suas tarefas noturnas."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.wrathful: "gritando com algum pobre seguidor desafortunado."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.calm: "acalmando uma briga entre dois seguidores menores."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.patient: "acertando a cabeça e fazendo sons afirmativos enquanto um local conta uma longa história prolixa."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.impatient: "interrompendo a história de alguém para dizer a eles que vão direto ao ponto."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.arrogant: "pegando casualmente vários seguidores menores para resolver algum trabalho insignificante para [notable_char.GetSheHe]."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.humble: "parando para ajudar alguém a montar sua tenda."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.deceitful: "no meio de contar uma longa e duvidosa história para um local creduloso."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.honest: "explicando algum problema constrangedor para um local irritado."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.gregarious: "rindo e brincando com alguns dos seguidores menores."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.arbitrary: "exigindo que alguém troque de tenda com [notable_char.GetSheHe] — de novo."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.just: "ao repreender alguém de forma sonora e confiante como um[notable_char.Custom('ES_XA')] [notable_char.GetLadyLord] na corte."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.cynical: "zombando das devoções noturnas de alguém."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.zealous: "liderando uma pequena congregação de fiéis em adoração."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.paranoid: "murmurando e resmungando para si."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.trusting: "ouvindo credulamente a longa e duvidosa história de algum tolo."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.compassionate: "em seu púlpito falando sobre alguém supostamente chutando um cachorro."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.callous: "ao ouvir, impassível, a história melodramática de algum morador local."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.sadistic: "ao rir maliciosamente da história comovente de algum morador."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.stubborn: "ao manter teimosamente sua posição diante de um bando de moradores locais furiosos."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.fickle: "ao se envolver em uma discussão confusa com alguém, mudando de posição de um lado para o outro a cada frase."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.vengeful: "jurando outra vingança intergeracional contra alguém por... algo ou outro."
 ep3_laamp_flavour_ewan.0051.desc.followers.notable_char.fallback: "a cantar baixinho para si enquanto passa."
 ep3_laamp_flavour_ewan.0051.desc.followers.fallback.1: "os zurros não muito distantes de mulas teimosas sendo recolhidas ao estábulo para a noite."
 ep3_laamp_flavour_ewan.0051.desc.followers.fallback.2: "os cantos estridentes dos pássaros locais quando a noite começa a cair"
 ep3_laamp_flavour_ewan.0051.desc.followers.fallback.3: "o som metálico rítmico de pregos sendo martelados no terreno macio ao meu redor."
 ep3_laamp_flavour_ewan.0051.desc.outro: "\n\nTodo isso forma uma espécie de manto tranquilo e reconfortante de familiaridade. Este é o meu domínio e este é o meu povo — um reino pequeno, mas no qual eu conheço cada visão, som e alma."
 ep3_laamp_flavour_ewan.0051.a: "Retirar-me para minha própria tenda e simplesmente ouvir."
 ep3_laamp_flavour_ewan.0051.b: "Verificar nossos suprimentos."
 ep3_laamp_flavour_ewan.0051.c.bald.female: "Talvez eu deva verificar meus humores?"
 ep3_laamp_flavour_ewan.0051.c.bald.male: "Talvez uma barba?"
 ep3_laamp_flavour_ewan.0051.c.hairy.male: "Talvez uma barba e um corte de cabelo?"
 ep3_laamp_flavour_ewan.0051.c.fallback: "Talvez um corte de cabelo?"
 ep3_laamp_flavour_ewan.0051.d: "Hora de controlar o caos do comboio de bagagens..."
 ep3_laamp_flavour_ewan.0051.e: "É melhor eu pegar minha refeição antes que a cozinha fique lotada."
 ep3_laamp_flavour_ewan.0051.f: "Acho que vou ocupar meu lugar habitual ao redor do fogo."
 ep3_laamp_flavour_ewan.0051.g: "Os treinamentos noturnos não esperam por ninguém."
 ep3_laamp_flavour_ewan.0051.h: "Um passeio pelo perímetro parece agradável."
 ep3_laamp_flavour_ewan_0051_check_building_supply_tent_modifier: "Suprimentos Todos em Ordem"
 ep3_laamp_flavour_ewan_0051_check_building_supply_tent_modifier_desc: "Um toque pessoal realmente ajuda a motivar a manutenção de registros precisos."
 ep3_laamp_flavour_ewan_0051_check_building_barber_tent_modifier: "Parecendo Impecável"
 ep3_laamp_flavour_ewan_0051_check_building_barber_tent_modifier_desc: "Uma vida em movimento não é desculpa para descuidar da higiene pessoal."
 ep3_laamp_flavour_ewan_0051_check_building_baggage_train_modifier: "Comboio Disciplinado"
 ep3_laamp_flavour_ewan_0051_check_building_baggage_train_modifier_desc: "Os comboios de bagagens são misturas caóticas de pessoas — a menos que você os mantenha firmemente sob controle."
 ep3_laamp_flavour_ewan_0051_check_building_mess_tent_modifier: "Come Com o Acampamento"
 ep3_laamp_flavour_ewan_0051_check_building_mess_tent_modifier_desc: "Um líder não precisa quebrar o pão com seus homens, mas ajuda."
 ep3_laamp_flavour_ewan_0051_check_building_camp_fire_modifier: "Líder do Círculo"
 ep3_laamp_flavour_ewan_0051_check_building_camp_fire_modifier_desc: "Uma posição de comando gera uma postura de comando."
 ep3_laamp_flavour_ewan_0051_check_building_proving_grounds_modifier: "Sempre em Treinamento"
 ep3_laamp_flavour_ewan_0051_check_building_proving_grounds_modifier_desc: "Um olhar firme de cima faz maravilhas pela disciplina."
 ep3_laamp_flavour_ewan_0051_check_building_camp_perimeter_modifier: "Observando os Vigias"
 ep3_laamp_flavour_ewan_0051_check_building_camp_perimeter_modifier_desc: "Uma caminhada noturna para patrulhar o perímetro mantém os sentinelas alertas."
 ep3_laamp_flavour_ewan.0061.t: "Uma Feira Inesperada"
 ep3_laamp_flavour_ewan.0061.desc: "Embora nem todo lugar receba bem um acampamento como o nosso, parece que [current_county.GetBaseNameNoTier] certamente recebe — ou ao menos [local_merchant.GetFirstName] fez #EMP parecer#! que sim, organizando uma feira improvisada para trocar mercadorias e esvaziar os bolsos dos meus seguidores.\n\nCínico? Talvez, mas é difícil negar o sorriso que isso coloca no rosto da maioria, e às vezes isso basta."
 ep3_laamp_flavour_ewan.0061.tt.everyone_loves_faires: "Todos amam feiras"
 ep3_laamp_flavour_ewan.0061.a: "Que surpresa bem-vinda!"
 ep3_laamp_flavour_ewan.0061.b: "Talvez [local_merchant.GetFirstNameNoTooltip] se interesse por um trabalho…"
 ep3_laamp_flavour_ewan.0061.c: "Pegar alguns suprimentos enquanto estamos aqui."
 ep3_laamp_flavour_ewan.0061.d: "Acho que vou ficar no acampamento, mesmo assim."
 ep3_laamp_flavour_ewan.0071.t: "Cavalos Batendo"
 ep3_laamp_flavour_ewan.0071.desc: "\"Ugh, minha #EMP cabeça#!\", geme [hanger.GetFirstName] ao cavalgar ao meu lado. Ergo uma sobrancelha em silenciosa indagação diante da exclamação d[hanger.Custom('ES_EA')] [hanger.GetWomanMan].\n\nComo resposta, [hanger.GetFirstNameNoTooltip] apenas desaba sobre seu cavalo, choramingando e apertando as têmporas.\n\nEstá claro que #EMP alguém#! se divertiu bastante ontem à noite."
 ep3_laamp_flavour_ewan.0071.a: "Desacelere para [hanger.GetSheHe]."
 ep3_laamp_flavour_ewan.0071.b: "Ria da situação dele."
 ep3_laamp_flavour_ewan.0071.c: "Acerra o passo do cavalo."
 ep3_laamp_flavour_ewan.0071.d: "Continue trotando, deixando-o à própria sorte para sofrer."
 ##################################################
 #CHILDREARING
 ep3_laamp_flavour_ewan.1001.t: "Amigos em Lugares Baixos"
 ep3_laamp_flavour_ewan.1001.desc: "\"[ROOT.Char.GetMotherFather|U], [ROOT.Char.GetMotherFather]!\", grita meu [own_child.Custom('GetDaughterSon')] enquanto corre até mim. \"Quero que conheça alguém!\".\n\nVira-se para apresentar a [Select_CString( other_child.IsFemale, 'outra menina', 'outro menino' )], abrindo os braços bem abertos como se estivesse apresentando o presente de [ROOT.Char.GetFaith.HighGodNamePossessive] aos fiéis em vez do que parece um [other_child.Custom('ES_XA')] [Select_CString( other_child.IsFemale, 'plebeia esfarrapada', 'plebeu esfarrapado' )].\n\n\"Se chama [other_child.GetFirstName] e é meu [Select_CString( other_child.IsFemale, 'nova companheira', 'novo companheiro' )] de brincadeiras. #EMP Algum dia#!, me ajudará a comandar este acampamento.\""
 ep3_laamp_flavour_ewan.1001.set_best_friendship: "Nós contra o mundo"
 ep3_laamp_flavour_ewan.1001.set_friendship: "Uma amizade nasce"
 ep3_laamp_flavour_ewan.1001.set_hidden_potential_friendship: "Companheiro de brincadeiras favorito"
 ep3_laamp_flavour_ewan.1001.friendship_fizzles: "A amizade se desfaz"
 ep3_laamp_flavour_ewan.1001.a: "Hah, corram então, vocês dois."
 ep3_laamp_flavour_ewan.1001.b: "Acho que você fez uma amizade para a vida toda, [own_child.Custom('GetDaughterSon')] meu[own_child.Custom('ES_OA')]."
 ep3_laamp_flavour_ewan.1001.c: "[own_child.GetFirstNameNoTooltip], não é dign[other_child.Custom('ES_OA')] de você."
 ep3_laamp_flavour_ewan.1011.t: "Aprendendo pelo Exemplo"
 ep3_laamp_flavour_ewan.1011.desc: "[child.GetFirstName|U] está nessa idade em que as crianças absorvem tudo e qualquer coisa ao redor como esponjas sugando água.\n\nEmbora as circunstâncias atuais me impeçam de lhe dar a melhor das educações, [child.Custom('ES_ElLa')] [child.Custom('GetLassLad')] não parece menos ansios[child.Custom('ES_OA')] por aprender. Em vez dos tutores e livros aos quais alguém de riqueza mais... concreta poderia se sentir no direito, [child.GetFirstNameNoTooltip] perambula pelo acampamento, acompanha meus oficiais de perto e os ajuda com entusiasmo em suas tarefas.\n\nUm pequeno empurrão em direção a alguém específico provavelmente faria maravilhas para focar seus esforços."
 ep3_laamp_flavour_ewan.1011.a: "Meu Segundo em Comando."
 ep3_laamp_flavour_ewan.1011.b: "Meu $quartermaster_camp_officer$."
 ep3_laamp_flavour_ewan.1011.c: "Meu $armorer_camp_officer$."
 ep3_laamp_flavour_ewan.1011.d: "Meu $chief_forager_camp_officer$."
 ep3_laamp_flavour_ewan.1011.e: "Meu $master_thief_camp_officer$."
 ep3_laamp_flavour_ewan.1011.f: "Meu $head_porter_camp_officer$."
 ep3_laamp_flavour_ewan.1011.g: "Meu $head_groom_camp_officer$."
 ep3_laamp_flavour_ewan.1011.h: "Meu $huntperson_camp_officer$."
 ep3_laamp_flavour_ewan.1011.i: "Meu $kennelperson_camp_officer$."
 ep3_laamp_flavour_ewan.1011.j: "Meu $chief_engineer_camp_officer$."
 ep3_laamp_flavour_ewan.1011.k: "Meu $witness_camp_officer$."
 ep3_laamp_flavour_ewan.1011.l: "Meu $person_haggler_camp_officer$."
 ep3_laamp_flavour_ewan.1011.m: "Meu $camp_cook_camp_officer$."
 ep3_laamp_flavour_ewan.1011.n: "Meu $master_bard_camp_officer$."
 ep3_laamp_flavour_ewan.1011.o: "Meu $master_of_arms_camp_officer$."
 ep3_laamp_flavour_ewan.1011.p: "Meu $master_of_spoils_camp_officer$."
 ep3_laamp_flavour_ewan.1021.t: "Amor à Primeira Vista no Acampamento"
 ep3_laamp_flavour_ewan.1021.desc: "\"[ROOT.Char.Custom('StammerLetterMotherFather')|U]-[ROOT.Char.GetMotherFather], eu te-te peço um favor\", gagueja meu [child.Custom('GetDaughterSon')] [child.GetFirstName]. Atrás de [child.GetSheHe], segurando timidamente a mão do meu [child.Custom('GirlBoy')], surge um[crush_child.Custom('ES_XA')] jovem [Select_CString( other_child.IsFemale, 'desengonçada', 'desengonçado' )] de origem [crush_child.GetCulture.GetName].\n\n\"Este é [crush_child.GetFirstName]. Eu g-gosto muito dele e fiquei me perguntando se ele poderia vir conosco? Os pais dele também, ele não pode deixá-los para trás!\"."
 ep3_laamp_flavour_ewan.1021.a: "Suponho que poderíamos acomodar outra família..."
 ep3_laamp_flavour_ewan.1021.b: "Parará de ver[crush_child.GetHerHim] imediatamente!"
 ep3_laamp_flavour_ewan.1021.c: "Certamente é apenas uma paixão sazonal, você vai superar isso."
 ep3_laamp_flavour_ewan.1021.c.crush_endures: "O flechazo de [child.GetFirstNameNoTooltip] continua forte"
 ep3_laamp_flavour_ewan.1021.c.crush_fades: "A paixão desvanece"
 ep3_laamp_flavour_ewan.1031.t: "Nutrindo"
 ep3_laamp_flavour_ewan.1031.desc.intro: "Dizem que as crianças reagem mais do que qualquer outra pessoa aos lugares em que se encontram.\n\nNesse caso, é uma sorte que meu [child.Custom('GetDaughterSon')] [child.GetFirstName] se encontre na companhia de"
 ep3_laamp_flavour_ewan.1031.desc.purpose.wanderers: "companheiros leais, conhecidos interessantes e criados prestativos"
 ep3_laamp_flavour_ewan.1031.desc.purpose.mercenaries: "resistentes $knight_culture_player_plural_no_tooltip$, ferozes mercenários e soldados obstinados"
 ep3_laamp_flavour_ewan.1031.desc.purpose.scholars: "eruditos sábios, diplomatas eloquentes e os melhores sábios"
 ep3_laamp_flavour_ewan.1031.desc.purpose.explorers: "aventureiros ambiciosos, locais exóticos e viajantes robustos"
 ep3_laamp_flavour_ewan.1031.desc.purpose.brigands: "ladrões astutos, bandidos impiedosos e escória viciosa"
 ep3_laamp_flavour_ewan.1031.desc.purpose.legitimists: "leais determinados, guardas de elite e contratados valiosos"
 ep3_laamp_flavour_ewan.1031.desc.outro: "que consegui reunir.\n\nUm excelente ambiente para um[child.Custom('ES_XA')] jovem crescer, e um em que [child.GetSheHe] parece decidid[child.Custom('ES_OA')] a levar suas muitas lições a sério."
 ep3_laamp_flavour_ewan.1031.tt.trait_adopted: "Traço Ganho"
 ep3_laamp_flavour_ewan.1031.tt.skill_gain: "Habilidade Ganha"
 ep3_laamp_flavour_ewan.1031.a: "Ahhh, a vontade de viajar pegou ''."
 ep3_laamp_flavour_ewan.1031.b: "Um dia será um[child.Custom('ES_XA')] guerreir[child.Custom('ES_OA')]."
 ep3_laamp_flavour_ewan.1031.c: "Tanta empolgação em um tão jovem!"
 ep3_laamp_flavour_ewan.1031.d: "Eu me pergunto o que ela verá…"
 ep3_laamp_flavour_ewan.1031.e: "Essa atitude lhe fará bem."
 ep3_laamp_flavour_ewan.1031.f: "Tal ambição é apenas natural."
 ep3_laamp_flavour_ewan.1031.g: "Talvez pudéssemos considerar outro caminho?"
 ep3_laamp_flavour_ewan.1031.g.tt.success: "Você incutiu um pouco de sabedoria"
 ep3_laamp_flavour_ewan.1031.g.tt.failure: "Suas lições foram ignoradas"
 ep3_laamp_flavour_ewan.1031.h: "*suspira* Pare com isso, [child.Custom('GirlBoy')]."
 geterim_er: "er"
 geterim_im: "im"
 ep3_laamp_flavour_ewan.1041.t: "A Velha Pátria"
 ep3_laamp_flavour_ewan.1041.desc: "\"[ROOT.Char.GetMotherFather|U], como era nossa casa?\", pergunta meu [child.Custom('GetDaughterSon')] [child.GetFirstName] no café da manhã.\n\nUm pouco desconcertad[ROOT.Char.Custom('ES_OA')] com uma pergunta tão repentina, examino por um momento minha tigela de mingau e volto a quando [memory.GetDescription].\n\nJá se passaram anos… Imagino que seja natural para alguém tão jovem quanto [child.GetFirstNameNoTooltip] querer saber como #EMP eram#! as coisas."
 ep3_laamp_flavour_ewan.1041.a: "Era lindo, pequen[child.Custom('ES_OA')] inho."
 ep3_laamp_flavour_ewan.1041.a.tt.diplomacy: "Histórias da Velha Pátria"
 ep3_laamp_flavour_ewan.1041.a.tt.stewardship: "$ep3_laamp_flavour_ewan.1041.a.tt.diplomacy$"
 ep3_laamp_flavour_ewan.1041.a.tt.learning: "$ep3_laamp_flavour_ewan.1041.a.tt.diplomacy$"
 ep3_laamp_flavour_ewan.1041.b: "Um lugar horrível que nos desprezou."
 ep3_laamp_flavour_ewan.1041.b.tt.martial: "$ep3_laamp_flavour_ewan.1041.a.tt.diplomacy$"
 ep3_laamp_flavour_ewan.1041.b.tt.intrigue: "$ep3_laamp_flavour_ewan.1041.a.tt.diplomacy$"
 ep3_laamp_flavour_ewan.1041.c: "Algum dia, você conhecerá por si mesma."
 ep3_laamp_flavour_ewan.1041.d: "Talvez voltemos algum dia; pergunte-me então."
 ep3_laamp_flavour_ewan.1041.e: "Não vou falar sobre isso."
 ep3_laamp_flavour_ewan_1041_beautiful_home_diplomacy_modifier.boilerplate: "Saudade de uma Terra Perdida"
 ep3_laamp_flavour_ewan_1041_horrible_home_martial_modifier.boilerplate: "Lições de Longo Atraso"
 ep3_laamp_flavour_ewan_1041_beautiful_home_diplomacy_modifier: "$ep3_laamp_flavour_ewan_1041_beautiful_home_diplomacy_modifier.boilerplate$: Diplomacia"
 ep3_laamp_flavour_ewan_1041_beautiful_home_diplomacy_modifier_desc: "Este personagem se delicia com histórias de uma terra natal que eles apenas lembram vagamente ou que nunca viram."
 ep3_laamp_flavour_ewan_1041_beautiful_home_stewardship_modifier: "$ep3_laamp_flavour_ewan_1041_beautiful_home_diplomacy_modifier.boilerplate$: Administração"
 ep3_laamp_flavour_ewan_1041_beautiful_home_stewardship_modifier_desc: "$ep3_laamp_flavour_ewan_1041_beautiful_home_diplomacy_modifier_desc$"
 ep3_laamp_flavour_ewan_1041_beautiful_home_learning_modifier: "$ep3_laamp_flavour_ewan_1041_beautiful_home_diplomacy_modifier.boilerplate$: Aprendizado"
 ep3_laamp_flavour_ewan_1041_beautiful_home_learning_modifier_desc: "$ep3_laamp_flavour_ewan_1041_beautiful_home_diplomacy_modifier_desc$"
 ep3_laamp_flavour_ewan_1041_horrible_home_martial_modifier: "$ep3_laamp_flavour_ewan_1041_horrible_home_martial_modifier.boilerplate$: Marcial"
 ep3_laamp_flavour_ewan_1041_horrible_home_martial_modifier_desc: "Este personagem pode não ter nenhum apego à sua terra natal perdida, mas ainda assim se lembra de suas lições."
 ep3_laamp_flavour_ewan_1041_horrible_home_intrigue_modifier: "$ep3_laamp_flavour_ewan_1041_horrible_home_martial_modifier.boilerplate$: Intriga"
 ep3_laamp_flavour_ewan_1041_horrible_home_intrigue_modifier_desc: "$ep3_laamp_flavour_ewan_1041_horrible_home_martial_modifier_desc$"
 ep3_laamp_flavour_ewan_1041_rightful_home_modifier: "$ep3_laamp_flavour_ewan_1041_beautiful_home_diplomacy_modifier.boilerplate$:"
 ep3_laamp_flavour_ewan_1041_rightful_home_modifier_desc: "$ep3_laamp_flavour_ewan_1041_beautiful_home_diplomacy_modifier_desc$"
 ep3_laamp_flavour_ewan.1051.t: "Não É Justo"
 ep3_laamp_flavour_ewan.1051.desc: "Os gritos petulantes de [child.GetFirstName] poderiam despertar os mortos.\n\n\"Eu disse que #EMP não é justo#!. De jeito nenhum! Por que #EMP nós#! temos que viver aqui fora, assim? Como se fôssemos apenas... animais, vagando de um lugar para outro, sem palácios, sem castelos, nem sequer camas de verdade. Eu não pedi esta #EMP pobreza#! e mereço coisa melhor!\"\n\nEntre os gritos e a indignação, posso [ROOT.Char.Custom('SenseObserve_SenseSee')|l] que a frustração do meu [child.Custom('GetDaughterSon')] é real. Lágrimas de raiva e tristeza escorrem por ambas as faces de [child.GetHerHis]."
 ep3_laamp_flavour_ewan.1051.tt.success: "[child.GetFirstNameNoTooltip] se acalma"
 ep3_laamp_flavour_ewan.1051.tt.failure: "[child.GetFirstNameNoTooltip] está inconsolável"
 ep3_laamp_flavour_ewan.1051.a: "Venha aqui, [child.Custom('GetDaughterSon')] meu[child.Custom('ES_OA')]; tudo vai ficar bem."
 ep3_laamp_flavour_ewan.1051.b: "Justo? Você é um[child.Custom('ES_XA')] [child.GetHouse.GetNameNoTooltip]! Fique em pé direito!"
 ep3_laamp_flavour_ewan.1051.c: "Eu sei, mas é o que é."
 ep3_laamp_flavour_ewan.1051.d: "Deixe[child.Custom('ES_OA')] em seu chilique."
 ep3_laamp_flavour_ewan.1051.d.tt.annoyance_fades: "Seu aborrecimento se desvanece com o tempo"
 ep3_laamp_flavour_ewan.1051.d.tt.grudge_held: "[child.GetFirstNameNoTooltip] guarda um rancor"
 ep3_laamp_flavour_ewan.1061.t: "Aprendizagem Rápida"
 ep3_laamp_flavour_ewan.1061.desc: "Parece que nosso tempo em [current_county.GetBaseNameNoTier] tem sido benéfico para meu [child.Custom('GetDaughterSon')] [child.GetFirstName].\n\nA cultura local tem algo que o/a #EMP fascina#!; tanto que, durante nossa breve estadia aqui, ele/ela conseguiu aprender um [current_county.GetProvince.GetCulture.GetLanguage.GetName] aceitável, uma conquista que meu [child.Custom('GetLassLad')] divulga aos quatro ventos porque o fala constantemente no acampamento e até solta palavrinhas e frases ao falar com seus inferiores.\n\nUm comportamento um tanto arrogante, sem dúvida, mas talvez por um bom motivo."
 ep3_laamp_flavour_ewan.1061.a: "Hum, [child.Custom('GirlBoy')] inteligente[child.Custom('ES_OA')]."
 ep3_laamp_flavour_ewan.1061.b: "Talvez pudesse me ensinar também a mim…"
 ep3_laamp_flavour_ewan.1061.b.tt.success: "Você aprende a língua juntos"
 ep3_laamp_flavour_ewan.1061.b.tt.failure: "Você tenta e falha"
 ep3_laamp_flavour_ewan.1061.c: "Tire essa sujeira estrangeira da boca!"
 ep3_laamp_flavour_ewan.1071.t: "À Beira do Acampamento"
 ep3_laamp_flavour_ewan.1071.desc.intro: "Meu caminho de volta de [ROOT.Char.Custom('GetRandomCampBuilding')|l] me leva perto da borda do acampamento, onde os gritos e clamores de crianças brincando chamam minha atenção.\n\nM [own_child.Custom('GetDaughterSon')] [own_child.GetFirstName] está liderando várias outras em"
 ep3_laamp_flavour_ewan.1071.desc.plains: "uma carga de cavalaria simulada por um terreno plano, batendo pequenos gravetos e galhos em inimigos imaginários enquanto enviam um inimigo ilusório a fugir em medo."
 ep3_laamp_flavour_ewan.1071.desc.farmlands: "escalando uma árvore solitária e retorcida que se ergue torta no meio do campo de um fazendeiro. As crianças mais velhas chegaram muito mais alto, enquanto as mais novas brincam ao redor da base."
 ep3_laamp_flavour_ewan.1071.desc.hills: "rolando ferozmente, de ponta-cabeça, por uma colina gramada. Não parece haver muita habilidade envolvida, mas as crianças competem para ver quem consegue ir mais rápido."
 ep3_laamp_flavour_ewan.1071.desc.mountains: "arremessando pequenas pedras e seixos de uma crista, vendo quão longe conseguem lançar seus pequenos projéteis nos vales abaixo. Elas gritam quando um deles vai mais longe do que os outros e riem daqueles que param onde ainda podem ser vistos."
 ep3_laamp_flavour_ewan.1071.desc.desert: "lançando-se de uma duna alta, espalhando jatos de areia por toda parte. Risadinhas e sons de #EMP ptth#!, #EMP ptth#! surgem sempre que uma criança acaba levando areia à boca. O que acontece com frequência."
 ep3_laamp_flavour_ewan.1071.desc.desert_mountains: "$ep3_laamp_flavour_ewan.1071.desc.mountains$"
 ep3_laamp_flavour_ewan.1071.desc.oasis: "construindo... pequenos pacotes de areia usando folhas e grama? Não está claro para que isso seria usado... outra criança se aproxima por trás de uma duna próxima, e de repente uma chuva de sacos de areia começa a voar como se fossem potes de fogo."
 ep3_laamp_flavour_ewan.1071.desc.jungle: "cutucando uma cobra morta com um graveto. O animal está claramente acabado, sua cabeça foi horrivelmente arrancada por algum outro predador, mas as crianças estão se divertindo sem fim tentando levantar seu corpo mole com seus gravetos, apenas para ele desabar novamente."
 ep3_laamp_flavour_ewan.1071.desc.forest: "defendendo os galhos superiores de uma árvore contra várias crianças tentando escalar de baixo. Quando os que estão no chão começam a conseguir um apoio, os jovens no ar os atingem com gravetos, folhas e bolotas de seiva."
 ep3_laamp_flavour_ewan.1071.desc.taiga: "$ep3_laamp_flavour_ewan.1071.desc.forest$"
 ep3_laamp_flavour_ewan.1071.desc.wetlands: "criando uma ilha improvisada. Encontraram uma estreita saliência lamacenta cercada por águas salobras e estão trabalhando aos poucos para separá-la do resto do pântano com mãos sujas e gravetos podres."
 ep3_laamp_flavour_ewan.1071.desc.steppe: "o que parece ser um jogo bastante tenso de ossos. A cada lançamento, alguém anuncia uma nova regra, e os outros torcem ou aplaudem se aprovam ou não."
 ep3_laamp_flavour_ewan.1071.desc.floodplains: "uma batalha de bolas de lama tão tensa quanto qualquer confronto entre adultos. Certamente, ambos os lados parecem dispostos a dar suas vidas por... qualquer que seja a causa pela qual estão lutando."
 ep3_laamp_flavour_ewan.1071.desc.drylands: "um animado jogo de pega-pega, levantando poeira e gritando de alegria ou indignação sempre que algum deles é pego."
 ep3_laamp_flavour_ewan.1071.desc.outro: "\n\nDepois de um momento, [own_child.GetFirstNameNoTooltip] repara em mim. Me olha e se debate entre levar seus companheiros de brincadeira de volta ao acampamento ou avançar um pouco mais para a natureza selvagem."
 ep3_laamp_flavour_ewan.1071.tt.every_playing_child: "Toda criança que está brincando"
 ep3_laamp_flavour_ewan.1071.a: "Fique à vista!"
 ep3_laamp_flavour_ewan.1071.b: "Vá em frente, explore."
 ep3_laamp_flavour_ewan.1071.c: "Crianças, animadas pelas coisas mais simples..."
 ep3_laamp_flavour_ewan.1081.t: "Crescendo"
 ep3_laamp_flavour_ewan.1081.desc: "\"[ROOT.Char.GetMotherFather|U]\", começa meu [child.Custom('GetDaughterSon')] [child.GetFirstName] ao se aproximar de mim. \"Decidi que, como agora sou um[child.Custom('ES_XA')] [child.GetWomanMan] e preciso ter minha própria tenda. Chega de dividir com qualquer um!\"\n\n[child.Custom('ES_ElLa')|U] o jovem permanece imóvel, depois de terminar seu discurso, com uma postura que exala rebeldia petulante. Quase involuntariamente, arqueio uma sobrancelha diante dessa demonstração não provocada.\n\n\"Não vou ceder! Sou [Select_CString( child.IsFemale, 'uma adulta', 'um adulto' )] e exijo ser tratado como tal!\""
 ep3_laamp_flavour_ewan.1081.a: "Bom, certo. Agora você é um[child.Custom('ES_XA')] [child.GetWomanMan]."
 ep3_laamp_flavour_ewan.1081.b: "Quer? Então conquiste."
 ep3_laamp_flavour_ewan.1081.b.f: "Você impõe um desafio a sua [child.Custom('GetDaughterSon')] baseado em sua [education_trait|lE]."
 ep3_laamp_flavour_ewan.1081.b.tt.success: "[child.GetFirstNameNoTooltip] triunfa"
 ep3_laamp_flavour_ewan.1081.b.tt.failure: "[child.GetSheHe|U] não consegue impressioná-lo"
 ep3_laamp_flavour_ewan.1081.c: "Bah, você é uma criança até eu dizer o contrário."
 ep3_laamp_flavour_ewan.1091.t: "Dever de Todo Pai"
 ep3_laamp_flavour_ewan.1091.desc: "\"E não vai me derrubar?\" pergunta meu [child.Custom('GetDaughterSon')] [child.GetFirstName], enquanto tenta — e falha— em controlar o tremor da voz.\n\nOlho para baixo para o pequeno pônei em que ele está montad[child.Custom('ES_OA')]; a montaria de aprendizado mais fácil e mais tranquila que consegui encontrar em todo o acampamento. Será que eu tinha tanto medo quando meu [ROOT.Char.GetMotherFather] me ensinou a montar?\n\n\"Certo, então eu só dou um chute nela para começar a trotar e...\"."
 ep3_laamp_flavour_ewan.1091.tt.success: "Estou fazendo isso, [ROOT.Char.Custom('GetMumDad')], estou fazendo isso!"
 ep3_laamp_flavour_ewan.1091.tt.failure: "Não-não-não-não-NÃO!"
 ep3_laamp_flavour_ewan.1091.a: "Lembre-se, seja firme, mas respeitoso."
 ep3_laamp_flavour_ewan.1091.b: "Não tenha medo de estalar o chicote!"
 ep3_laamp_flavour_ewan.1091.c: "Domine o cavalo ou ele vai te jogar."
 ep3_laamp_flavour_ewan.1091.d: "Não diga nada."
 ep3_laamp_flavour_ewan.1091.d.tt.success: "Sai bem o suficiente"
 ep3_laamp_flavour_ewan.1091.d.tt.failure: "Não consegue fazer isso sem ajuda"
 ep3_laamp_flavour_ewan_1091_confidence_gained_modifier: "Confiança Ganha"
 ep3_laamp_flavour_ewan_1091_confidence_gained_modifier_desc: "É incrível como o mundo se abre quando você consegue montar."
 ep3_laamp_flavour_ewan.1101.t: "Ajudando"
 ep3_laamp_flavour_ewan.1101.desc: "Mesmo que o acampamento precise mudar de lugar a cada poucas noites, há viagens que exigem trajetos mais longos — e, com eles, muito mais bagagem.\n\nCom a maior parte dos meus carregadores ocupada lidando com as consequências da festa da noite passada, desta vez sobra para mim embalar a maior parte das minhas coisas. Uma situação lamentável, e que já me arrancou mais de alguns suspiros.\n\nUm puxão repentino na minha manga me avisa da presença do meu [child.Custom('GetDaughterSon')] pequeno[child.Custom('ES_OA')] [child.GetFirstName], que levanta uma túnica amassada numa tentativa desajeitada de me ajudar."
 ep3_laamp_flavour_ewan.1101.a: "O que você está fazendo aí, jovenzin[child.Custom('ES_OA')]?"
 ep3_laamp_flavour_ewan.1101.b: "Saia, você ameaça!"
 ep3_laamp_flavour_ewan.1103.t: "$ep3_laamp_flavour_ewan.1101.t$: Rituais Pessoais"
 ep3_laamp_flavour_ewan.1103.desc.child_younger: "Com mais uma mudança pela manhã e meus carregadores ocupados novamente, entro em meus aposentos pessoais e encontro meu [child.Custom('GetDaughterSon')] [child.GetFirstName], cobert[child.Custom('ES_OA')] de [ROOT.Char.Custom('GritType')] por brincar lá fora, tentando arrumar minhas coisas para mim.\n\n\"[child.Custom('GetMaMaPaPa')|U]!\", sorri para mim com um sorriso banguela e corre para me dar um abraço. Uma mãozinha suja segura meu chapéu favorito, amassado e arruinado."
 ep3_laamp_flavour_ewan.1103.desc.child_older: "Ao entrar em minha tenda para me preparar para a mudança de amanhã, não me surpreende ver que meu [child.Custom('GetDaughterSon')] [child.GetFirstName] já está aqui.\n\nAo lado de [child.GetSheHe], sobre minha cama há uma pilha de roupas dobradas e pertences pessoais amontoados de forma descuidada, e ele/ela se vira orgulhosamente para me apresentar seu trabalho.\n\n\"Tudo organizado do jeito que você gosta, [child.Custom('GetMumDad')], já estou quase na metade!\""
 ep3_laamp_flavour_ewan.1103.desc.child_teen: "Embora [child.GetSheHe] já seja quase um[child.Custom('ES_XA')] [child.GetWomanMan], uma viagem longa geralmente significa receber a visita do meu [child.Custom('GetDaughterSon')] [child.GetFirstName] para ajudar com as malas.\n\nPelo menos desta vez, cheguei antes de [child.GetHerHim] e já tinha começado quando [child.Custom('ES_ElLa')] adolescente chegou.\n\n\"Você poderia ter esperado por mim!\", meio geme, meio brinca [child.GetFirstNameNoTooltip]. Minha risada debochada provoca um grito de indignação, e a próxima peça de roupa dobrada é arremessada direto na minha cabeça em vez de no cesto."
 ep3_laamp_flavour_ewan.1103.desc.child_adult: "Meu [child.Custom('GetDaughterSon')] [child.GetFirstName] entra na minha tenda esta noite e me encontra já arrumando as coisas para a viagem de amanhã, embora fique claro que estou um pouco lento para [child.GetSheHe].\n\nNão diz nada enquanto me ajuda a organizar meus pertences, apenas sorri suavemente e murmura uma melodia familiar enquanto trabalha.\n\n“Você não está um pouco velho para isso agora?”, pergunto.\n\n“Nunca se é velho demais para ajudar [Select_CString( ROOT.GetCharacter.IsFemale, 'uma velha', 'um velho' )] em apuros”, retruca [child.GetFirstNameNoTooltip] com uma risada."
 ep3_laamp_flavour_ewan.1103.a: "Uhh, obrigad [child.GetFirstNameNoTooltip], agora vá se limpar."
 ep3_laamp_flavour_ewan.1103.b: "Você bagunça o cabelo dele."
 ep3_laamp_flavour_ewan.1103.c: "Útil como sempre!"
 ep3_laamp_flavour_ewan.1103.d: "Ri e abrace a [child.GetFirstNameNoTooltip]."
 ep3_laamp_flavour_ewan.1103.e: "Você deveria parar de fazer isso, [child.GetFirstNameNoTooltip]."
 ep3_laamp_flavour_ewan.1104.t: "$ep3_laamp_flavour_ewan.1101.t$: As Pequenas Ausências"
 ep3_laamp_flavour_ewan.1104.desc.child_dead: "A mudança da manhã parece muito mais… sombria. Há um peso impossível de definir, uma ausência que não consigo localizar enquanto arrumo minhas coisas.\n\nMe cai como um balde de água gelada.\n\n[child.GetFirstName|U]. Não está aqui, me ajudando. Jamais o fará de novo."
 ep3_laamp_flavour_ewan.1104.desc.child_rival: "Ter que arrumar minhas coisas para a mudança de amanhã não é um trabalho árduo, mas ainda assim me escapa um suspiro de tristeza.\n\nArrumar minhas coisas me lembra meu [child.Custom('GetDaughterSon')] [child.GetFirstName], de tempos mais felizes, quando [child.GetSheHe] era pequen[child.Custom('ES_OA')] e o que mais queria era passar tempo com sua [child.Custom('GetMaPa')].\n\nNaquela época, ainda falava comigo, ainda sorria para mim.\n\nAquele sorrisinho banguela..."
 ep3_laamp_flavour_ewan.1104.a: "O que eu fiz..."
 ep3_laamp_flavour_ewan.1104.b: "Eu terei minha vingança!"
 ep3_laamp_flavour_ewan.1104.c: "#EMP Eh.#!"
 ep3_laamp_flavour_ewan.1104.d: "Tente seguir em frente."
 ep3_laamp_flavour_ewan.1111.t: "Um Nariz Para Problemas"
 ep3_laamp_flavour_ewan.1111.desc.intro: "\"[ROOT.Char.GetMotherFather|U]!\", grita meu [child.Custom('GetDaughterSon')] [child.GetFirstName] enquanto vem correndo na minha direção e quase me derruba: \"Olha o que eu encontrei! É um CACHORRINHO!\"\n\nE, de fato, parece que está embalando um filhote recém-nascido que colocou nos braços.\n\n"
 ep3_laamp_flavour_ewan.1111.desc.has_kennels: "Certamente não é um dos cães do canil, e,"
 ep3_laamp_flavour_ewan.1111.desc.no_kennels: "[ROOT.Char.GetFaith.KnowledgeGodName] saberá onde o encontrou, mas,"
 ep3_laamp_flavour_ewan.1111.desc.outro: "apesar do movimento desajeitado, o animal parece muito animado por estar aqui. [child.GetFirstNameNoTooltip] parece mais feliz do que eu a vi em semanas."
 ep3_laamp_flavour_ewan.1111.a: "Um[child.Custom('ES_XA')] [child.Custom('GirlBoy')] e seu cachorro."
 ep3_laamp_flavour_ewan.1111.b: "Afogue o filhote."
 ep3_laamp_flavour_ewan.1111.c: "#EMP Meu#!, que cão gordinho. Boa descoberta, [child.Custom('GetLassLad')]!"
 ep3_laamp_flavour_ewan.1111.d: "[child.GetFirstNameNoTooltip]! Pare de brincar com aquele vira-lata imundo!"
 ##################################################
 #PERSONAL TENSIONS
 ep3_laamp_flavour_ewan.2001.t: "Muito em Comum"
 ep3_laamp_flavour_ewan.2001.desc.intro: "A vida em espaços reduzidos tende a magnificar as relações, para o bem e para o mal.\n\nFelizmente para [follower_1.GetFirstName] e [follower_2.GetFirstName], seu interesse comum por"
 ep3_laamp_flavour_ewan.2001.desc.lustful: "piadas obscenas e comentários lascivos"
 ep3_laamp_flavour_ewan.2001.desc.chaste: "restrição física e castidade pública"
 ep3_laamp_flavour_ewan.2001.desc.gluttonous: "boa comida e bebida melhor"
 ep3_laamp_flavour_ewan.2001.desc.temperate: "uma dieta moderada e uma vida saudável"
 ep3_laamp_flavour_ewan.2001.desc.greedy: "ouro, prata e a aquisição de riqueza"
 ep3_laamp_flavour_ewan.2001.desc.generous: "os benefícios de um espírito generoso e uma vida altruísta"
 ep3_laamp_flavour_ewan.2001.desc.lazy: "Com tantas tropas sob um estandarte itinerante e tanto território #EMP duvidoso#! a atravessar, seria de se esperar que algumas provisões desaparecessem de vez em quando.\n\nMas isto não são algumas provisões.\n\nÉ uma quantidade imensa, #EMP imensa#!, de suprimentos que algum idiota egoísta vendeu a moradores locais ou a réprobos entre meus soldados, perdeu por incompetência, deixou de comprar para começo de conversa ou simplesmente desperdiçou, e isso representa uma quebra imperdoável de disciplina."
 ep3_laamp_flavour_ewan.2001.desc.diligent: "acordar cedo e trabalhar com dedicação"
 ep3_laamp_flavour_ewan.2001.desc.wrathful: "violência e a arte de gritar"
 ep3_laamp_flavour_ewan.2001.desc.calm: "manter-se ereto e calmo diante da adversidade"
 ep3_laamp_flavour_ewan.2001.desc.patient: "ouvir um ao outro e esperar pelo momento oportuno"
 ep3_laamp_flavour_ewan.2001.desc.impatient: "agir enquanto o ferro está quente, sempre,"
 ep3_laamp_flavour_ewan.2001.desc.arrogant: "sua própria alegada superioridade"
 ep3_laamp_flavour_ewan.2001.desc.humble: "os benefícios de uma atitude modesta e uma perspectiva humilde"
 ep3_laamp_flavour_ewan.2001.desc.deceitful: "contar mentiras cada vez mais grandiosas"
 ep3_laamp_flavour_ewan.2001.desc.honest: "evitar os perigos de mentir a todo custo"
 ep3_laamp_flavour_ewan.2001.desc.craven: "viver para lutar outro dia, não importa o que,"
 ep3_laamp_flavour_ewan.2001.desc.brave: "enfrentando desafios — e desafiadores — de frente, não importa os riscos"
 ep3_laamp_flavour_ewan.2001.desc.shy: "evitando situações sociais barulhentas e apreciando o silêncio"
 ep3_laamp_flavour_ewan.2001.desc.gregarious: "o clamor constante e as risadas dos eternamente sociáveis"
 ep3_laamp_flavour_ewan.2001.desc.ambitious: "ganhos futuros e planos elaborados"
 ep3_laamp_flavour_ewan.2001.desc.content: "mantendo-se feliz com sua modesta condição na vida"
 ep3_laamp_flavour_ewan.2001.desc.arbitrary: "desconsiderando regras e regulamentos que se tornam inconvenientes para eles"
 ep3_laamp_flavour_ewan.2001.desc.just: "obedecendo às leis devidamente estabelecidas do país, de fato, de qualquer país,"
 ep3_laamp_flavour_ewan.2001.desc.cynical: "uma perspectiva decididamente terrena sobre a vida"
 ep3_laamp_flavour_ewan.2001.desc.zealous: "devotando-se completamente a [follower_1.GetFaith.HighGodName]"
 ep3_laamp_flavour_ewan.2001.desc.paranoid: "impedindo que os muitos planos de seus inimigos se concretizem"
 ep3_laamp_flavour_ewan.2001.desc.trusting: "evitando todas as complexidades de intriga e suspeita"
 ep3_laamp_flavour_ewan.2001.desc.compassionate: "permanecendo cuidadoso e empático em quaisquer circunstâncias"
 ep3_laamp_flavour_ewan.2001.desc.callous: "ser tão [Select_CString(And(follower_1.IsFemale, follower_2.IsFemale), 'duras', 'duros')] com os outros quanto acreditam que a vida foi com [Select_CString(And(follower_1.IsFemale, follower_2.IsFemale), 'ellas', 'ellos')]"
 ep3_laamp_flavour_ewan.2001.desc.sadistic: "humor maligno e o lado mais sombrio da vida"
 ep3_laamp_flavour_ewan.2001.desc.stubborn: "mantendo-se firme em sua posição a qualquer custo"
 ep3_laamp_flavour_ewan.2001.desc.fickle: "tendo opiniões que mudam radicalmente de um dia para o outro"
 ep3_laamp_flavour_ewan.2001.desc.vengeful: "guardando cada e toda ofensa que os aflige"
 ep3_laamp_flavour_ewan.2001.desc.forgiving: "deixando de lado seus ódios e perdoando seus transgressores"
 ep3_laamp_flavour_ewan.2001.desc.eccentric: "o estranho, o bizarro e o downright-bizarre"
 ep3_laamp_flavour_ewan.2001.desc.outro: "tem se mostrado um agente de ligação muito forte.\n\nCada vez é mais comum ver[Select_CString(And(follower_1.IsFemale, follower_2.IsFemale), 'las', 'los')] rir e brincar no acampamento, assim como cavalgar [Select_CString(And(follower_1.IsFemale, follower_2.IsFemale), 'juntas', 'juntos')] durante as viagens."
 ep3_laamp_flavour_ewan.2001.a: "Incentive a amizade."
 ep3_laamp_flavour_ewan.2001.a.tt.success: "Uma amizade floresce"
 ep3_laamp_flavour_ewan.2001.a.tt.failure: "Líder opressivo"
 ep3_laamp_flavour_ewan.2001.b: "Tente separá-los[Select_CString(And(follower_1.IsFemale, follower_2.IsFemale), 'las', 'los')]."
 ep3_laamp_flavour_ewan.2001.b.tt.success: "Uma amizade arruinada"
 ep3_laamp_flavour_ewan.2001.b.tt.failure: "$ep3_laamp_flavour_ewan.2001.a.tt.failure$"
 ep3_laamp_flavour_ewan.2001.c: "Que bom para eles[Select_CString(And(follower_1.IsFemale, follower_2.IsFemale), 'ellas', 'ellos')]!"
 ep3_laamp_flavour_ewan.2011.t: "Fofocas do Acampamento"
 ep3_laamp_flavour_ewan.2011.desc.intro: "Não é incomum ouvir rumores circulando por este — ou de fato, qualquer — acampamento. Noções lascivos e sussurros de escândalos podem passar muitas longas noites, afinal. Às vezes, eles são até verdadeiros.\n\nAs fofocas desta semana"
 ep3_laamp_flavour_ewan.2011.desc.affair: "são sobre um suposto caso de algum tipo, embora #EMP quem#! os parceiros infiéis possam ser seja uma questão de debate pseudo-acadêmico e ocasionalmente de risadas ruidosas."
 ep3_laamp_flavour_ewan.2011.desc.petty_theft: "giram em torno de [victim.GetFirstName], que supostamente perdeu pequenas quantias de dinheiro várias vezes ultimamente. Ao menos algumas pessoas afirmam ter visto uma figura rondando perto da sua tenda, deliberadamente tendo a [victim.GetSheHe] como alvo."
 ep3_laamp_flavour_ewan.2011.desc.cruel_pranks: "dizem respeito a uma sequência particularmente cruel de má sorte para [victim.GetFirstName] Acidentes infelizes, desagradáveis ou embaraçosos continuam a acontecer a #EMP pasar#!, e corre o boato de que podem ser intencionados."
 ep3_laamp_flavour_ewan.2011.desc.nasty_rumours: "são um paradoxo: há muito papo sobre os hábitos pouco saudáveis d [victim.GetFirstName], mas várias pessoas afirmam sentir um cheiro de traição, argumentando que [victim.GetSheHe] é simplesmente a vítima de uma campanha difamatória."
 ep3_laamp_flavour_ewan.2011.desc.hidden_feud: "sugerem que duas pessoas entre nosso grupo estão travando uma guerra privada uma contra a outra, mas ambas mantêm isso em segredo para evitar que sua indisciplina seja descoberta e punida."
 ep3_laamp_flavour_ewan.2011.desc.outro: "\n\nNão é uma coisa gentil para as pessoas dizerem apenas para entretenimento, mas então, fofocas raramente são."
 ep3_laamp_flavour_ewan.2011.a: "Investigue a verdade do assunto."
 ep3_laamp_flavour_ewan.2011.a.tt.explanation: "Se os rumores forem falsos, então você não encontrará nada mesmo se tiver sucesso"
 ep3_laamp_flavour_ewan.2011.a.tt.success: "Você persegue o assunto com sucesso"
 ep3_laamp_flavour_ewan.2011.a.tt.failure: "Quem pode dizer o que é verdade?"
 ep3_laamp_flavour_ewan.2011.b: "Concorde com as acusações sem fundamento."
 ep3_laamp_flavour_ewan.2011.c: "Deixe como está."
 ep3_laamp_flavour_ewan_2011_source_of_truth_modifier: "Fonte da Verdade"
 ep3_laamp_flavour_ewan_2011_source_of_truth_modifier_desc: "Se o personagem encarregado diz isso, deve ser verdade."
 ep3_laamp_flavour_ewan_2011_truth_hound_modifier: "Cão da Verdade"
 ep3_laamp_flavour_ewan_2011_truth_hound_modifier_desc: "Esse personagem é conhecido por seguir rumores até suas conclusões naturais."
 ep3_laamp_flavour_ewan.2012.t: "$ep3_laamp_flavour_ewan.2011.t$: Amantes Secretos"
 ep3_laamp_flavour_ewan.2012.desc: "As investigações habilidosas de investigadores competentes sempre dão frutos.\n\nAo me deparar com [lover_1.GetFirstName] e [lover_2.GetFirstName] [Select_CString(And(lover_1.IsFemale, lover_2.IsFemale), 'entregadas', 'entregados')] em um abraço #EMP íntimo#! nas sombras atrás de minha [ROOT.Char.Custom('GetRandomCampBuilding')|l] fico por um instante antes que percebam minha presença e se recomponham para vestir as roupas.\n\n\"[ROOT.Char.GetTitledFirstNameNoTooltip], por favor, imploro\", sussurra entre lágrimas [lover_1.GetFirstNameNoTooltip]\", não nos revele ao acampamento. O restante não entenderia\"."
 ep3_laamp_flavour_ewan.2012.a: "Revele imediatamente."
 ep3_laamp_flavour_ewan.2012.b: "Mantenha o segredo — por enquanto."
 ep3_laamp_flavour_ewan.2013.t: "$ep3_laamp_flavour_ewan.2011.t$: Roubo Mesquinho"
 ep3_laamp_flavour_ewan.2013.desc: "Basta uma armadilha simples para pegar [thief.GetFirstName]em flagrante: fazer [victim.GetFirstName]sair de forma ostensiva de sua tenda, deixando a entrada aberta e algumas moedas cuidadosamente empilhadas sobre um banco lá dentro.\n\nDepois de um minuto para garantir que [victim.GetFirstNameNoTooltip]não voltaria imediatamente, [Select_CString( thief.IsFemale, 'la ladrona', 'el ladrón' )]saiu sorrateiramente de seu esconderijo próximo, apenas para se virar e me encontrar ali, [ROOT.Char.Custom('ArmArms')].\n\n“Eu- eu juro que não é o que parece! Eu só estava pregando uma peça em [victim.GetFirstNameNoTooltip]!”, grita [thief.GetSheHe]. Um bufido audível de [victim.GetFirstNameNoTooltip], já de volta, indica que não acha a menor graça."
 ep3_laamp_flavour_ewan.2013.a: "Puna a [thief.GetFirstNameNoTooltip]."
 ep3_laamp_flavour_ewan.2013.b: "Proteja a [thief.GetFirstNameNoTooltip]."
 ep3_laamp_flavour_ewan.2013.c: "Deixe a verdade ser conhecida, mas pare por aí."
 ep3_laamp_flavour_ewan.2014.t: "$ep3_laamp_flavour_ewan.2011.t$: Brincadeiras Cruéis"
 ep3_laamp_flavour_ewan.2014.desc: "Com apenas algumas perguntas, [prankster.GetFirstName] surge como [Select_CString( prankster.IsFemale, 'a perpetradora', 'o perpetrador' )] mais óbvi[prankster.Custom('ES_OA')] — [prankster.GetSheHe] foi vist[prankster.Custom('ES_OA')] por perto antes, depois ou durante quase todos os #EMP acidentes#! notáveis, geralmente sem muita razão.\n\n\"Sim, fiz algumas brincadeiras com [victim.GetFirstName]. O que há de errado nisso? [victim.GetSheHe|U] é [Select_CString( victim.IsFemale, 'uma amargurada', 'um amargurado' )] de se conviver, e da última vez que conferi, uma piada ocasional não era motivo para tornar alguém fora-da-lei.\""
 ep3_laamp_flavour_ewan.2014.a: "Punir [prankster.GetFirstNameNoTooltip]."
 ep3_laamp_flavour_ewan.2014.b: "Proteger a [prankster.GetFirstNameNoTooltip]."
 ep3_laamp_flavour_ewan.2014.c: "Deixe a verdade ser conhecida, mas pare por aí."
 ep3_laamp_flavour_ewan.2015.t: "$ep3_laamp_flavour_ewan.2011.t$: Fofqueiro"
 ep3_laamp_flavour_ewan.2015.desc: "Não demora muito até eu conseguir apontar o dedo para [rumourmonger.GetFirstName], e quando o confronto sobre o assunto, ele admite prontamente, sem arrependimento.\n\n\"E daí se eu exagerei uma ou duas coisinhas sobre aquele(a) pomposo(a) [victim.Custom2('InsultNoun', SCOPE.sC('rumourmonger'))]? [victim.GetFirstNameNoTooltip] é um(a)[victim.Custom('ES_XA')] idiota e um(a)[victim.Custom('ES_XA')] canalha, e não há mentira sobre [victim.GetSheHe] pior do que a verdade.\"\n\nUm[victim.Custom('ES_XA')] indignad[victim.Custom('ES_OA')] [victim.GetFirstName] cospe fogo atrás de mim, quase pronto(a) para estrangular o(a) difamador(a)[rumourmonger.Custom('ES_XA')]."
 ep3_laamp_flavour_ewan.2015.a: "Puna  [rumourmonger.GetFirstNameNoTooltip]."
 ep3_laamp_flavour_ewan.2015.b: "Proteger a [rumourmonger.GetFirstNameNoTooltip]."
 ep3_laamp_flavour_ewan.2015.c: "Deixe a verdade ser conhecida, mas pare por aí."
 ep3_laamp_flavour_ewan.2016.t: "$ep3_laamp_flavour_ewan.2011.t$: Conflito Oculto"
 ep3_laamp_flavour_ewan.2016.desc: "Em retrospecto, talvez devesse ter sido óbvio que [rival_1.GetFirstName] e [rival_2.GetFirstName] estavam se estranhando.\n\nQuando se procura por eles, os sinais de animosidade entre os dois ficam claros como o dia, embora, ao serem chamados para interrogatório, [Select_CString(And(rival_1.IsFemale, rival_2.IsFemale), 'ambas', 'ambos')] #EMP insistam#! que não deixaram o conflito afetar o acampamento como um todo.\n\nEm um espaço tão apertado quanto este, a história soa bastante #EMP improvável#!."
 ep3_laamp_flavour_ewan.2016.a: "Tente reconciliar[Select_CString(And(rival_1.IsFemale, rival_2.IsFemale), 'las', 'los')]."
 ep3_laamp_flavour_ewan.2016.a.tt.success: "As tensões diminuem"
 ep3_laamp_flavour_ewan.2016.a.tt.failure: "Apenas piorando a situação"
 ep3_laamp_flavour_ewan.2016.b: "Você não permitirá que isso se espalhe, entendido?"
 ep3_laamp_flavour_ewan.2017.t: "$ep3_laamp_flavour_ewan.2011.t$: Nada para Ver Aqui"
 ep3_laamp_flavour_ewan.2017.desc.affair: "Por todas as grandes histórias de casos, romances sob a luz da lua atrás de [ROOT.Char.Custom('GetRandomCampBuilding')|l] e olhares furtivos compartilhados durante o jantar, o amor em [ROOT.Char.GetPrimaryTitle.GetDefinitiveName] parece... decididamente ortodoxo."
 ep3_laamp_flavour_ewan.2017.desc.petty_theft: "Apesar dos protestos de [victim.GetFirstName] sobre o contrário, nenhuma testemunha confiável consegue descrever qualquer característica comum da misteriosa figura que supostamente o está roubando às cegas; e até mesmo suas perdas são difíceis de contabilizar."
 ep3_laamp_flavour_ewan.2017.desc.cruel_pranks: "Sou forçad[ROOT.Char.Custom('ES_OA')] a concluir que [victim.GetFirstName] é simplesmente desajeitad[victim.Custom('ES_OA')], azarad[victim.Custom('ES_OA')], ou ambos. Não há motivo ou causa comum para seus muitos pequenos problemas, nem um suspeito claro que pudesse ter causado todos eles."
 ep3_laamp_flavour_ewan.2017.desc.nasty_rumours: "No fim das contas, talvez [victim.GetFirstName] seja o elemento problemático. Todas as pistas sobre quem lhe desejaria mal se desfazem ao menor exame, enquanto as histórias de suas más ações só aumentam."
 ep3_laamp_flavour_ewan.2017.desc.hidden_feud: "Conflito secreto? A ideia de que duas pessoas aqui poderiam manter sua raiva durante o jantar, sem mencionar secretamente enquanto se incomodam uma à outra, é completamente risível. Não com o desfile de mímicos com quem viajo."
 ep3_laamp_flavour_ewan.2017.desc.duel.won: "\n\nMinha investigação minuciosa não encontrou nada, mas ainda assim estou satisfeit[ROOT.Char.Custom('ES_OA')]. Se houvesse algo a ser encontrado, eu já teria encontrado."
 ep3_laamp_flavour_ewan.2017.desc.duel.lost: "\n\nFiz o meu melhor, mas tudo o que desenterro são mais rumores e mexericos.\n\nSuponho que as pessoas percebem que [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip|l] está farejando por aí, e isso, por sua vez, desperta mais comentários sem fundamento."
 ep3_laamp_flavour_ewan.2017.a: "Pelo menos, estou satisfeit[ROOT.Char.Custom('ES_OA')]."
 ep3_laamp_flavour_ewan.2017.b: "Eu não estava interessado de qualquer forma..."
 ep3_laamp_flavour_ewan.2021.t: "Amarrados Juntos"
 ep3_laamp_flavour_ewan.2021.desc: "Como [ROOT.Char.GetTitleAsNameNoTooltip|l] deste acampamento, quando dois dos meus seguidores mais notáveis desejam se casar, tenho o direito de dar a palavra final. Afinal, eles vivem sob minha proteção, viajam em meus animais e comem meu pão.\n\nO casal de hoje, cheio de esperança, são [follower_1.GetFirstName] e [follower_2.GetFirstName] e, com tudo pronto, só aguardam que eu dê minha permissão — ou sinalize minha oposição."
 ep3_laamp_flavour_ewan.2021.a: "Permita a união."
 ep3_laamp_flavour_ewan.2021.b: "Permita, mas não autorize nenhuma cerimônia formal."
 ep3_laamp_flavour_ewan.2021.c: "Proíba-os."
 ep3_laamp_flavour_ewan.2021.c.tt: "Instruir amantes a simplesmente parar de se ver raramente é totalmente eficaz."
 ep3_laamp_flavour_ewan.2031.t: "Cansado de Você"
 ep3_laamp_flavour_ewan.2031.desc.intro: "... e de seus discursos choramingos e tímidos, suas marchas da morte para lugar nenhum, e sua completa incapacidade de prover como [ROOT.Char.GetTitleAsNameNoTooltip|l]! Você me ouviu? Estou #EMP hart[firebrand.Custom('ES_OA')]!#!\", grita [firebrand.GetFirstName], sacudindo [firebrand.Custom('ArmArms')] descontrolad[firebrand.Custom('ES_OA')] ao gesticular para uma multidão de curiosos.\n\n"
 ep3_laamp_flavour_ewan.2031.desc.waverers.some: "Muitos dos meus outros seguidores também exibem expressões de descontentamento semelhantes e, ao que parece, estão prontos para ir embora com [firebrand.GetFirstNameNoTooltip] — #EMP si#! se lhe fosse permitido."
 ep3_laamp_flavour_ewan.2031.desc.waverers.none: "O resto dos meus seguidores parece pouco solidário. Apesar de todos os delírios e vociferações de [firebrand.GetHerHis] sobre meus males, [firebrand.GetFirstNameNoTooltip] permanece so[firebrand.Custom('ES_OA')] nesse ódio tão intenso por mim."
 ep3_laamp_flavour_ewan.2031.tt.success.wavering_courtiers: "Todos os [followers|lE] hesitantes"
 ep3_laamp_flavour_ewan.2031.tt.failure.wavering_courtiers_move_to_pool: "$ep3_laamp_flavour_ewan.2031.tt.success.wavering_courtiers$"
 ep3_laamp_flavour_ewan.2031.a: "Talvez eu possa persuadi-los..."
 ep3_laamp_flavour_ewan.2031.a.tt.success: "Você acalma o descontentamento"
 ep3_laamp_flavour_ewan.2031.a.tt.failure: "Palavras sem valor de uma pessoa sem valor"
 ep3_laamp_flavour_ewan.2031.b: "Você não vai a lugar nenhum, ponha-o em grilhões!"
 ep3_laamp_flavour_ewan.2031.c: "Saia se quiser, mas levará nada e ninguém."
 ep3_laamp_flavour_ewan.2031.c.tt.success: "[firebrand.GetHerHim|U] encaras com firmeza"
 ep3_laamp_flavour_ewan.2031.c.tt.failure: "Sua arrogância forma muitas opiniões"
 ep3_laamp_flavour_ewan.2031.d.multi: "Vão então, todos vocês."
 ep3_laamp_flavour_ewan.2031.d.solo: "Saia então."
 ep3_laamp_flavour_ewan.2041.t: "Espaços Mais Próximos"
 ep3_laamp_flavour_ewan.2041.desc: "Entre o caos de mudar de local com frequência e a entrada e saída de rostos novos de uma cidade a outra, há bastante tempo no dia para que os seguidores descubram que têm uma conexão inesperada com alguém novo e surpreendente.\n\nPelas brincadeiras compartilhadas, pelos sussurros trocados e pelas escapadas pouco sutis, parece ser exatamente o caso de [follower_1.GetFirstName] e [follower_2.GetFirstName].\n\nEstá claro que [Select_CString(And(follower_1.IsFemale, follower_2.IsFemale), 'las tortolitas', 'los tortolitos')] acham que são [Select_CString(And(follower_1.IsFemale, follower_2.IsFemale), 'discretas', 'discretos')]. Mas não são."
 ep3_laamp_flavour_ewan.2041.a: "Separe-os."
 ep3_laamp_flavour_ewan.2041.a.tt.success: "Um amor murchou"
 ep3_laamp_flavour_ewan.2041.a.tt.failure: "O coração quer o que quer"
 ep3_laamp_flavour_ewan.2041.b: "Não é realmente da minha conta."
 ep3_laamp_flavour_ewan.2051.t: "Qual é o Objetivo?"
 ep3_laamp_flavour_ewan.2051.desc.intro: "[smelly.GetFirstName|U] parou de se banhar. Parou até mesmo de tentar se limpar — um fato que sou brutalmente confrontado quando vários dos meus seguidores imploram para eu lidar com [smelly.GetSheHe].\n\n\"Eu sei o que você está pensando, [ROOT.Char.GetTitleAsName|l], mas não é preguiça.\""
 ep3_laamp_flavour_ewan.2051.desc.diligent_and_humble: "Muito pelo contrário! Sou [Select_CString( smelly.IsFemale, 'uma mulher simples', 'um homem simples' )], dedicad[smelly.Custom('ES_OA')] às minhas tarefas, e o dia tem o tempo que tem. Para que me preocupar em me limpar se, de qualquer forma, amanhã de manhã já terei de novo a poeira da estrada sobre mim?\""
 ep3_laamp_flavour_ewan.2051.desc.athletic: "Passo meus dias caminhando, correndo ou montando, tudo pelo bem do acampamento, assim é apenas natural que eu exale um pouco de #EMP almíscar#!, dado tudo que faço por aqui. É realmente tão errado abandonar as pretensões de tudo isso?"
 ep3_laamp_flavour_ewan.2051.desc.gregarious: "Sou a vida de toda festa e popular entre todos, desde o círculo interno até o seguidor menos importante, pelo menos eu acho que sou, o que me torna crítico para a moral. Realmente importa se eu sujar e suar um pouco, dado a alegria que trago?"
 ep3_laamp_flavour_ewan.2051.desc.lazy: "É uhhh... uma busca por eficiência? Na verdade, posso fazer #EMP mais#! trabalho se gastar menos tempo limpando o suor da estrada. Isso é o que um foco implacável em valor parece."
 ep3_laamp_flavour_ewan.2051.desc.outro: "\n\nEstá louc[smelly.Custom('ES_OA')] ou é imbecil. Ou ambas as coisas."
 ep3_laamp_flavour_ewan.2051.a.diligent_and_humble: "Esta não é uma tarefa pequena a ser pulada."
 ep3_laamp_flavour_ewan.2051.a.athletic: "Suor regular requer banhos regulares, droga."
 ep3_laamp_flavour_ewan.2051.a.gregarious: "Droga, pense nos outros!"
 ep3_laamp_flavour_ewan.2051.a.lazy: "Sua preguiça vai longe demais!"
 ep3_laamp_flavour_ewan.2051.b: "Você faz um bom ponto."
 ep3_laamp_flavour_ewan.2051.c: "Simplesmente siga em frente — #EMP bem#! à frente."
 ep3_laamp_flavour_ewan_2051_is_stinker_modifier: "Fedendo"
 ep3_laamp_flavour_ewan_2051_is_stinker_modifier_desc: "Este personagem, apesar de muitas protestações, é altamente relutante em se banhar."
 ep3_laamp_flavour_ewan_2051_disciplined_stinker_modifier: "Disciplinador de Higiene"
 ep3_laamp_flavour_ewan_2051_disciplined_stinker_modifier_desc: "Este personagem não tem tempo para os que suam imprudentemente."
 ep3_laamp_flavour_ewan_2051_joined_stinker_modifier: "Também Fedendo"
 ep3_laamp_flavour_ewan_2051_joined_stinker_modifier_desc: "Este personagem escolheu se juntar a um/a de seus seguidores ao abandonar o banho."
 ep3_laamp_flavour_ewan.2061.t: "Meu Lugar"
 ep3_laamp_flavour_ewan.2061.desc: "\"Tirem a maldita da sua tenda, [thief.GetFirstName] maldita seja! Este é o meu lugar!\", grita [victim.GetFirstName] atrapalhando meu passeio vespertino. [thief.GetFirstNameNoTooltip] não parece se abalar, simplesmente cruzando [thief.Custom('ArmArms')] sobre o peito.\n\n\"Não pode ser seu lugar se #EMP minha#! tenda está em cima dele, pode?\", retruca sarcastic[thief.Custom('ES_OA')].\n\nDesesperad[victim.Custom('ES_OA')] por apelar para uma autoridade superior, [victim.GetFirstNameNoTooltip] se vira para mim: \"[ROOT.Char.GetTitledFirstName], por favor, imploro, disciplinem tal #EMP [Select_CString( thief.IsFemale, 'desgraçada', 'desgraçado' )]#!\"."
 ep3_laamp_flavour_ewan.2061.a: "Fique do lado d [victim.GetFirstNameNoTooltip]."
 ep3_laamp_flavour_ewan.2061.b: "Fique do lado d [thief.GetFirstNameNoTooltip]."
 ep3_laamp_flavour_ewan.2061.c: "Temos regras por uma razão, [thief.GetFirstNameNoTooltip]."
 ep3_laamp_flavour_ewan.2061.d: "Resolva isso entre vocês."
 ep3_laamp_flavour_ewan.2071.t: "Segundo em Comando"
 ep3_laamp_flavour_ewan.2071.desc.sic_exists: "Não é segredo que [current_sic.GetFirstName] talvez não seja [current_sic.Custom('ES_ElLa')] melhor segundo[current_sic.Custom('ES_OA')] que eu poderia ter."
 ep3_laamp_flavour_ewan.2071.desc.sic_vacant: "Há algum tempo, o cargo do meu segundo está vago."
 ep3_laamp_flavour_ewan.2071.desc.outro: "O descontentamento com essa situação finalmente chegou ao ponto em que três candidatos se apresentaram para oferecer seus serviços para o cargo.\n\n[candidate_1.GetFirstName], que se compromete a jurar lealdade a mim até seu último suspiro.\n\n[candidate_2.GetFirstName], que parece prestes[candidate_2.Custom('ES_OA')] para trabalhar para mim até cair em um estupor.[candidate_2.Custom('ES_OA')].\n\nE, claro, [candidate_3.GetFirstName], sem dúvida [candidate_3.Custom('ES_ElLa')] o mais bem qualificad[candidate_3.Custom('ES_OA')] no acampamento para o cargo."
 ep3_laamp_flavour_ewan.2071.a: "Aceitar a lealdade de [candidate_1.GetFirstNameNoTooltip]."
 ep3_laamp_flavour_ewan.2071.a.tt.candidate_aptitude: "A [aptitude|lE] de [candidate_1.GetFirstName] seria [candidate_1.GetCourtPositionAptitude( GetCourtPositionType( 'second_camp_officer') )]"
 ep3_laamp_flavour_ewan.2071.b: "Aproveitar a ética de trabalho de [candidate_2.GetFirstNameNoTooltip]."
 ep3_laamp_flavour_ewan.2071.b.tt.candidate_aptitude: "A [aptitude|lE] de [candidate_2.GetFirstName] seria [candidate_2.GetCourtPositionAptitude( GetCourtPositionType( 'second_camp_officer') )]"
 ep3_laamp_flavour_ewan.2071.c: "Empregar as habilidades evidentes de [candidate_3.GetFirstNameNoTooltip]."
 ep3_laamp_flavour_ewan.2071.c.tt.candidate_aptitude: "A [aptitude|lE] de [candidate_3.GetFirstName] seria [candidate_3.GetCourtPositionAptitude( GetCourtPositionType( 'second_camp_officer') )]"
 ep3_laamp_flavour_ewan.2071.d.post_filled: "[current_sic.GetFirstNameNoTooltip] deve manter seu cargo!"
 ep3_laamp_flavour_ewan.2071.d.post_empty: "Permanecerá vago."
 ep3_laamp_flavour_ewan_2071_b_work_self_to_death_modifier: "Trabalhando até a Morte"
 ep3_laamp_flavour_ewan_2071_b_work_self_to_death_modifier_desc: "'Descanso' é uma desculpa que os preguiçosos terminais se permitem como um luxo."
 ep3_laamp_flavour_ewan.2081.t: "Uma Máquina Bem Lubrificada"
 ep3_laamp_flavour_ewan.2081.desc.intro: "Nossa pequena floresta de tendas montando-se a cada poucas noites é algo em que nos tornamos muito, muito bons ultimamente. Primeiro uma, depois outra, depois outra, com pessoas e ferramentas se espalhando ao longo das linhas para ajudar seus vizinhos em um modelo de velocidade e eficiência.\n\n"
 ep3_laamp_flavour_ewan.2081.desc.dislike: "Até [follower_1.GetFirstName] e [follower_2.GetFirstName], que historicamente nunca se deram muito bem, estão ajudando um ao outro esta noite, rindo como [Select_CString(And(follower_1.IsFemale, follower_2.IsFemale), 'viejas amigas', 'viejos amigos')]."
 ep3_laamp_flavour_ewan.2081.desc.like: "[follower_1.GetFirstName] e [follower_2.GetFirstName], que geralmente se davam bem no passado, parecem estar se aproximando especialmente esta noite enquanto se ajudam."
 ep3_laamp_flavour_ewan.2081.desc.neutral: "Até [follower_1.GetFirstName] e [follower_2.GetFirstName], que normalmente não circulam nos mesmos meios, estão cantarolando [Select_CString(And(follower_1.IsFemale, follower_2.IsFemale), 'juntas', 'juntos')] enquanto se ajudam."
 ep3_laamp_flavour_ewan.2081.desc.outro: "\n\nUm lugar para tudo, e tudo em seu lugar."
 ep3_laamp_flavour_ewan.2081.a: "Você precisa de mais uma mão?"
 ep3_laamp_flavour_ewan.2081.b: "Depois de terminar aqui, vá ajudar a levantar meu pavilhão."
 ep3_laamp_flavour_ewan.2081.c: "Hmmm... não gosto disso, separe-os."
 ep3_laamp_flavour_ewan.2081.d: "Como deveria ser."
 ep3_laamp_flavour_ewan.2081.e: "Bom ver esses dois se dando bem!"
 ep3_laamp_flavour_ewan_2081_d_well_oiled_operation_modifier: "Operação Eficiente"
 ep3_laamp_flavour_ewan_2081_d_well_oiled_operation_modifier_desc: "O acampamento deste personagem se move como um bem lubrificado trilho de trebuchet."
 ep3_laamp_flavour_ewan.2091.t: "Crimes de Paixão"
 ep3_laamp_flavour_ewan.2091.desc: "Em volta da fogueira, alguns seguidores compartilham sua refeição da noite.\n\nCuriosamente, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('attacker'))] [attacker.GetFirstName] e meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('defender'))] [defender.GetFirstName] se sentam entre eles, apesar de sua antipatia mútua.\n\n[defender.GetFirstNameNoTooltip|U] murmura algo em voz baixa. Seja lá o que for, provoca a ira de [attacker.GetFirstNameNoTooltip]. Os aços cintilam. Está prestes a jorrar sangue."
 ep3_laamp_flavour_ewan.2091.tt.duel_commences: "[attacker.GetFirstName] e [defender.GetFirstName] duelarão imediatamente até a morte"
 ep3_laamp_flavour_ewan.2091.a: "Intervir."
 ep3_laamp_flavour_ewan.2091.a.tt.success: "Você interrompe isso"
 ep3_laamp_flavour_ewan.2091.a.tt.failure: "Alguns golpes são trocados de qualquer forma"
 ep3_laamp_flavour_ewan.2091.b: "Por que não resolver isso com um duelo apropriado?"
 ep3_laamp_flavour_ewan.2091.c: "Prendam a [attacker.GetFirstNameNoTooltip]! Ao tronco!"
 ep3_laamp_flavour_ewan.2091.d: "Deixe-os resolver isso."
 ep3_laamp_flavour_ewan.2092.tt.attacker_won: "[attacker.GetFirstNameNoTooltip] Vence"
 ep3_laamp_flavour_ewan.2092.tt.attacker_won.tt: "[attacker.GetSheHe|U] massacra a [defender.GetFirstName]"
 ep3_laamp_flavour_ewan.2092.tt.defender_won: "[defender.GetFirstNameNoTooltip] Vence"
 ep3_laamp_flavour_ewan.2092.tt.defender_won.tt: "[defender.GetSheHe|U] mata a [attacker.GetFirstName] em legítima defesa"
 ##################################################
 #CAMP PURPOSE
 ep3_laamp_flavour_ewan.3001.t: "Ouvi Falar de Você"
 ep3_laamp_flavour_ewan.3001.desc.intro: "Seguindo um sentinela, entro em uma tenda pouco iluminada ao lado de meu [ROOT.Char.Custom('GetRandomCampBuilding')|l], onde me aguarda um trio de locais desgrenhados. Eles começam a [ROOT.Char.Custom('SenseObserve_SeemLook')] nervosamente, como se estar aqui fosse um risco.\n\nUm deles se levanta antes de fazer uma reverência verdadeiramente #EMP horrible#!. \"Saudações, vossa Senhoria; meu nome é [brains.GetFirstName]. [brawn.Custom('ES_ElLa')|U] [brawn.Custom('GetLassLad')] grande é [brawn.GetFirstName], e é[fingers.Custom('ES_EA')] é [fingers.GetFirstName]. Viemos nos alistar\".\n\n"
 ep3_laamp_flavour_ewan.3001.desc.legendary: "Somos artistas no coração — seja com a faca, a corda ou a flecha entalhada — e não conseguimos pensar em um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom('MistressMaster')] mais dign[ROOT.Char.Custom('ES_OA')] de nossos talentos."
 ep3_laamp_flavour_ewan.3001.desc.exalted: "\"Levamos a sério o que fazemos, e isso significa não deixar que o orgulho nos impeça de aproveitar uma oportunidade única na vida. Leve-nos com você, e iremos roubar o mundo para você.\""
 ep3_laamp_flavour_ewan.3001.desc.illustrious: "\"Fomos os maiores peixes neste lago — até você aparecer. Não que nos importemos. Negócios são negócios, e não faz sentido competir quando podemos trabalhar juntos.\""
 ep3_laamp_flavour_ewan.3001.desc.distinguished: "\"Ouvimos falar de você, desde que você chegou aqui, e achamos que poderíamos realmente ser ativos em suas operações.\""
 ep3_laamp_flavour_ewan.3001.desc.established: "\"Somos trabalhadores esforçados — pelo menos dentro de nosso #EMP campo#! — e do jeito que vemos, você poderia usar uma ajuda para construir seu nome e encher seus bolsos.\""
 ep3_laamp_flavour_ewan.3001.desc.disgraced: "\"Nós uhh... cruzamos a linha da lei em [current_county.GetBaseNameNoTier] uma vez demais e estamos procurando qualquer bilhete para sair daqui. Sua gangue parecia tão boa quanto qualquer outra.\""
 ep3_laamp_flavour_ewan.3001.a: "Claro, nós os aceitaremos..."
 ep3_laamp_flavour_ewan.3001.b: "… mas primeiro vocês têm que contribuir para o #EMP bote#!."
 ep3_laamp_flavour_ewan.3001.b.tt.success: "Eles esvaziam seus estoques para você"
 ep3_laamp_flavour_ewan.3001.b.tt.failure: "Sem honra entre ladrões, então!"
 ep3_laamp_flavour_ewan.3001.c: "Heh, saiam daqui, vira-latas."
 ep3_laamp_flavour_ewan.3011.t: "Discutindo o Assunto"
 ep3_laamp_flavour_ewan.3011.desc: "Ter opiniões é discutir.\n\nUma verdade simples para qualquer reunião de mais de duas pessoas com inclinação acadêmica. E, decididamente, há mais de duas pessoas assim em [ROOT.Char.GetPrimaryTitle.GetDefinitiveName].\n\nNesta bela noite, há duas discussões sobrepostas — e bastante barulhentas — acontecendo, uma sobre retórica e política refinada com [eloquent_follower.GetFirstName] e outra sobre história e sabedoria filosófica com [wise_follower.GetFirstName]."
 ep3_laamp_flavour_ewan.3011.a: "[eloquent_follower.GetFirstNameNoTooltip] é interessante..."
 ep3_laamp_flavour_ewan.3011.a.tt.success: "Um debate para a eternidade"
 ep3_laamp_flavour_ewan.3011.a.tt.failure: "Palavras finas e conversas finas"
 ep3_laamp_flavour_ewan.3011.b: "A mente de [wise_follower.GetFirstNameNoTooltip] me estimulará!"
 ep3_laamp_flavour_ewan.3011.b.tt.success: "Uma discussão elucidativa"
 ep3_laamp_flavour_ewan.3011.b.tt.failure: "Divagações divertidas"
 ep3_laamp_flavour_ewan.3011.c: "Aproveitar o caos erudito."
 ep3_laamp_flavour_ewan.3011.d: "Acenar com a cabeça durante a conversa."
 ep3_laamp_flavour_ewan_3011_d_presiding_over_lively_debates_modifier: "Presidindo Debates Vivos"
 ep3_laamp_flavour_ewan_3011_d_presiding_over_lively_debates_modifier_desc: "É surpreendente o quão alto os acadêmicos podem ser quando colocam suas mentes nisso."
 ep3_laamp_flavour_ewan_3011_d_presiding_over_debates_modifier: "Presidindo Debates"
 ep3_laamp_flavour_ewan_3011_d_presiding_over_debates_modifier_desc: "Um pouco de conhecimento vai longe."
 ep3_laamp_flavour_ewan.3021.t: "Além do Horizonte"
 ep3_laamp_flavour_ewan.3021.desc: "Sentad[ROOT.Char.Custom('ES_OA')] em minha tenda, vejo-me mergulhad[ROOT.Char.Custom('ES_OA')] em registros, mapas e manuscritos que descrevem reinos exóticos e distantes. Que histórias tentadoras eles contam, que lugares tão #EMP estranhos#! este mundo tem a oferecer...\n\nPergunto-me: será que seus povos ouvem histórias assim sobre nós? Estou analisando meros rumores ou relatos verdadeiros — e fantásticos — de lugares aparentemente distantes do olhar [ROOT.Char.GetFaith.HighGodNamePossessive]?"
 ep3_laamp_flavour_ewan.3021.tt.kingdom_1.contracts_appear: "Vários contratos de alto valor aparecerão em [kingdom_1.GetDefinitiveName]"
 ep3_laamp_flavour_ewan.3021.tt.kingdom_2.contracts_appear: "Vários contratos de alto valor aparecerão em [kingdom_2.GetDefinitiveName]"
 ep3_laamp_flavour_ewan.3021.tt.kingdom_3.contracts_appear: "Vários contratos de alto valor aparecerão em [kingdom_3.GetDefinitiveName]"
 ep3_laamp_flavour_ewan.3021.tt.success: "Que sintaxe elegante"
 ep3_laamp_flavour_ewan.3021.tt.failure: "Essas palavras são difíceis"
 ep3_laamp_flavour_ewan.3021.a: "[kingdom_1.GetBaseNameNoTierNoTooltip] me interessa."
 ep3_laamp_flavour_ewan.3021.b: "Sempre quis ver [kingdom_2.GetBaseNameNoTierNoTooltip]!"
 ep3_laamp_flavour_ewan.3021.c: "Acho [kingdom_3.GetBaseNameNoTierNoTooltip] fascinante."
 ep3_laamp_flavour_ewan.3021.d: "Ainda tenho lugares para refletir..."
 ep3_laamp_flavour_ewan.3031.t: "Minas por Direito"
 ep3_laamp_flavour_ewan.3031.desc.intro: "Deveria ser meu.\n\nNão é certo que eu esteja aqui, sentad[ROOT.Char.Custom('ES_OA')] em uma tenda com corrente de ar, em vez de em uma cama quente no meu palácio da capital. Meu desejo de ver minha propriedade — meu #EMP direito de nascimento#! — restaurada arde um pouco mais forte a cada noite, uma motivação que me força a seguir em frente apesar dessas... indignidades.\n\nMas será que é só isso?"
 ep3_laamp_flavour_ewan.3031.desc.family_title: "Não tenho um bom direito a [family_title.GetBaseNameNoTier]?"
 ep3_laamp_flavour_ewan.3031.desc.adjacent_title: "Não é [adjacent_title.GetBaseNameNoTier] logicamente meu?"
 ep3_laamp_flavour_ewan.3031.desc.memory_title: "Não foi [memory_title.GetBaseNameNoTier] roubado de mim?"
 ep3_laamp_flavour_ewan.3031.desc.outro: "\n\nMeu humor escurece com o céu."
 ep3_laamp_flavour_ewan.3031.a: "[family_title.GetBaseNameNoTierNoTooltip] é meu por direito!"
 ep3_laamp_flavour_ewan.3031.b: "[adjacent_title.GetBaseNameNoTierNoTooltip] é certamente meu domínio natural..."
 ep3_laamp_flavour_ewan.3031.c: "Em meu coração, nunca desisti de [memory_title.GetBaseNameNoTierNoTooltip]."
 ep3_laamp_flavour_ewan.3031.d: "Algum dia, todos esses e mais..."
 ep3_laamp_flavour_ewan_3031_d_brooding_over_titles_modifier: "Refletindo sobre Títulos"
 ep3_laamp_flavour_ewan_3031_d_brooding_over_titles_modifier_desc: "Uma mente focada tem muitos benefícios."
 ep3_laamp_flavour_ewan.3041.t: "Pessoas de um Tempo Melhor"
 ep3_laamp_flavour_ewan.3041.desc.intro: "Um[commander.Custom('ES_XA')] [commander.GetWomanMan] da comunidade [commander.GetCulture.GetName] permanece rigid[commander.Custom('ES_OA')] na minha tenda, com a cabeça respeitosamente inclinada.\n\n\"[ROOT.Char.GetTitledFirstNameNoTooltip], sou [commander.GetFirstName], e trago comigo todos os vossos fiéis seguidores de [former_title.GetBaseNameNoTier] que consegui reunir. Os usurpadores governam as vossas terras, e nós, vossos servos, já não podíamos suportá-lo por mais tempo..."
 ep3_laamp_flavour_ewan.3041.desc.compassionate: "sua natureza compassiva e seu coração bondoso sempre o(a) distinguiram como noss[ROOT.Char.Custom('ES_OA')] soberan[ROOT.Char.Custom('ES_OA')] legítim[ROOT.Char.Custom('ES_OA')]\"."
 ep3_laamp_flavour_ewan.3041.desc.sadistic: "sem sua justiça implacável, os criminosos florescem e se reproduzem.\""
 ep3_laamp_flavour_ewan.3041.desc.callous: "sem sua firme disciplina orientadora, seu reino escorregou para a decadência.\""
 ep3_laamp_flavour_ewan.3041.desc.wrathful: "sem seu temperamento militar, nossos inimigos ameaçam nos apagar da Terra.\""
 ep3_laamp_flavour_ewan.3041.desc.calm: "sem sua mão firme e orientadora, seu reino está caindo em ruínas.\""
 ep3_laamp_flavour_ewan.3041.desc.arrogant: "sem sua autoridade natural, seu reino é deixado em caos perpétuo."
 ep3_laamp_flavour_ewan.3041.desc.humble: "sem sua humildade para nos guiar, a arrogância e a crueldade correm soltas."
 ep3_laamp_flavour_ewan.3041.desc.ambitious: "sem seu impulso e ambições, somos como cordeiros perdidos."
 ep3_laamp_flavour_ewan.3041.desc.content: "sem sua sabedoria e perspectiva, somos como cães selvagens."
 ep3_laamp_flavour_ewan.3041.desc.arbitrary: "sem seus caprichos orientadores, a lei se tornou tirânica."
 ep3_laamp_flavour_ewan.3041.desc.just: "sem sua justiça justa, o estado de direito está morto."
 ep3_laamp_flavour_ewan.3041.desc.fallback: "fizemos nossos votos, e pretendemos mantê-los até a morte nos levar."
 ep3_laamp_flavour_ewan.3041.desc.title_claimed: "\n\n\"Você ainda reivindica [former_title.GetBaseNameNoTierNoTooltip], leve #EMP nós#! como seu direito legítimo!\""
 ep3_laamp_flavour_ewan.3041.desc.title_forsaken: "\n\n\"Se você deseja retomar [former_title.GetBaseNameNoTierNoTooltip] ou não, preferimos servi-lo a permanecer lá.\""
 ep3_laamp_flavour_ewan.3041.tt.up_to_ten_usurper_held_counties: "Até dez [counties|lE] controladas por usurpadores"
 ep3_laamp_flavour_ewan.3041.a.imperial: "Mais tropas para o exército imperial em exílio!"
 ep3_laamp_flavour_ewan.3041.a.royal: "Mais tropas para o exército real em exílio!"
 ep3_laamp_flavour_ewan.3041.b: "Sua lealdade é notada, mas eu preciso de subversivos."
 ep3_laamp_flavour_ewan.3041.c: "Retorne para casa e atormente o usurpador onde quer que esteja."
 ep3_laamp_flavour_ewan.3041.d: "Agradeço, mas não #EMP preciso#! de vocês."
 legitimist_loyalists: "Leais Legitimistas"
 #Ngl I think this is probably the funniest title I've ever written.
 ep3_laamp_flavour_ewan.3051.t: "Pintura de Mapas"
 ep3_laamp_flavour_ewan.3051.desc: "Há algo de terapêutico na cartografia.\n\nLevar a pena e o pincel à tela, observar como as curvas e contornos de uma região ganham vida, ver o mundo de uma perspectiva totalmente nova. É simplesmente um exercício prazeroso, que, de algum tempo para cá, ocupa muitas das minhas tardes ociosas.\n\nTalvez a mais recente seja minha maior criação até agora: um mapa completo, ilustrado e anotado de [kingdom.GetBaseNameNoTier]."
 ep3_laamp_flavour_ewan.3051.tt.success: "Uma bela obra"
 ep3_laamp_flavour_ewan.3051.tt.failure: "Seus rabiscos não valem nada"
 ep3_laamp_flavour_ewan.3051.a: "Eu criarei uma obra ilustre!"
 ep3_laamp_flavour_ewan.3051.b: "Meu mapa será famoso em todo o mundo."
 ep3_laamp_flavour_ewan.3051.c: "Eu sempre busco criar obras-primas..."
 ep3_laamp_flavour_ewan.3051.d: "Apenas divirta-se com isso."
 handcrafted_map: "Mapa Iluminado de [kingdom.GetBaseNameNoTierNoTooltip]"
 handcrafted_map_desc.boilerplate: "Este mapa cuidadosamente elaborado cobre toda a extensão de [kingdom.GetBaseNameNoTier], seus territórios fronteiriços e seus vizinhos mais importantes.\n\nAtenção particular foi dada a"
 handcrafted_map_desc.mythic_beasts: "detalhar mitos e lendas locais, pintando monstros, bestas e coisas estranhas nos cantos e recantos onde se supõe que se escondem."
 handcrafted_map_desc.geography: "a geografia, anotando regiões, características principais dos vários terrenos locais e até mesmo contornos aproximados sempre que possível."
 handcrafted_map_desc.settlements: "os assentamentos que pontilham a terra, cobrindo cada cidade importante, cada vila, até algumas das maiores aldeias — a capital sozinha é muito ampliada e tem distritos individuais marcados."
 handcrafted_map_desc.people.urban: "anotando os hábitos e reputações das pessoas de seus principais centros urbanos: quem é bom para convidar para um jantar formal, quem cria os melhores cavalos, quem é mais fácil de depenar, e assim por diante."
 handcrafted_map_desc.fauna: "as criaturas da terra, desde o menor jogo e as menores aves até os reis e rainhas locais do reino animal — ilustrações de muitas delas enchem as margens e saltitam por qualquer espaço em branco disponível."
 handcrafted_map_desc.flora: "a vegetação da terra, desde a menor erva daninha até a maior e mais expansiva árvore — uma espessa borda de flores afunila suas bordas, cada uma meticulosamente detalhada."
 handcrafted_map_desc.government: "como os locais conduzem os negócios do governo, quem são seus líderes mais famosos e como se legitimam. Pequenos retratos de monarcas celebrados ocupam cada canto."
 handcrafted_map_desc.tourism_sites: "marcos interessantes que peregrinos, viajantes e aventureiros de todos os tipos podem desejar visitar — os locais maiores até apresentam pequenas ilustrações."
 handcrafted_map_desc.routes: "os caminhos mais curtos, as estradas mais bem conservadas e as rotas mais seguras para se mover — pequenas ilustrações de feras, bandidos e bárbaros marcam claramente as áreas mais perigosas."
 handcrafted_map_desc.people.rural: "anotando os hábitos e reputações das pessoas das muitas áreas rurais: onde a classe camponesa negocia com mais firmeza, quem cultiva as melhores uvas e onde é mais provável que se tornem um pouco... excessivamente íntimos entre familiares."
 ep3_laamp_flavour_ewan.3061.t: "Uma guia para…"
 ep3_laamp_flavour_ewan.3061.desc: "Só... mais... alguns... rabiscos... finais... e...\n\nPronto! Um panfleto completo sobre os habitantes de [current_county.GetBaseNameNoTier] e suas excentricidades. Tudo bem, talvez não seja exaustivo, mas as palavras não crescem em árvores — precisam ser copiadas com esforço, letra por letra.\n\nAgora, que título dou a esta pequena maravilha do conhecimento?"
 ep3_laamp_flavour_ewan.3061.a: "\"Povos & Lugares.\""
 ep3_laamp_flavour_ewan.3061.b: "\"Prosa & Poesia.\""
 ep3_laamp_flavour_ewan.3061.c: "\"Plantas & Animais.\""
 ep3_laamp_flavour_ewan.3061.d: "Apenas continue rabiscando pensamentos."
 ep3_laamp_flavour_ewan_3061_peoples_and_places_modifier: "Pessoas & Lugares"
 ep3_laamp_flavour_ewan_3061_peoples_and_places_modifier_desc: "Para manipular pessoas, você deve primeiro entendê-las."
 ep3_laamp_flavour_ewan_3061_prose_and_poetry_modifier: "Prosa & Poesia"
 ep3_laamp_flavour_ewan_3061_prose_and_poetry_modifier_desc: "Um verdadeiro erudito é tanto um dramaturgo quanto um retórico."
 ep3_laamp_flavour_ewan_3061_plants_and_animals_modifier: "Plantas & Animais"
 ep3_laamp_flavour_ewan_3061_plants_and_animals_modifier_desc: "O mundo natural é a fonte básica do conhecimento."
 ep3_laamp_flavour_ewan.3071.t: "A Lei em [current_county.GetBaseNameNoTierNoTooltip]"
 ep3_laamp_flavour_ewan.3071.desc: "A emboscada acontece quase assim que eu tenho motivo para entrar na selvagem, multidões de guerreiros [local_soldier.GetCulture.GetCollectiveNoun] surgem de esconderijos preparados, indo direto contra mim e meu pequeno grupo de servos.\n\nEstão bem armados e protegidos, bem demais para ser um ataque oportunista. Então, uma milícia, ou talvez tropas da casa, vindo para me matar por meus crimes.\n\nUm[local_soldier.Custom('ES_XA')] gigante lidera a carga, bradando seu desafio contra mim com toda a força de seus poderosos pulmões: \"#EMP Muerte!#! #BER MUERTE O GLORIA!#!\"."
 ep3_laamp_flavour_ewan.3071.a: "Duelo com o atacante principal."
 ep3_laamp_flavour_ewan.3071.b: "Desencadeie sua emboscada!"
 ep3_laamp_flavour_ewan.3071.c: "Toque a corneta!"
 ep3_laamp_flavour_ewan.3071.c.tt.success: "Suas tropas nas proximidades os atacam."
 ep3_laamp_flavour_ewan.3071.c.tt.failure: "Desastre!"
 ep3_laamp_flavour_ewan.3071.d: "Contra-ataque facilmente."
 ep3_laamp_flavour_ewan.3071.e: "Reúna seu grupo para um contra-ataque."
 ep3_laamp_flavour_ewan.3071.e.tt.success: "Você os afasta."
 ep3_laamp_flavour_ewan.3071.e.tt.failure: "Desastre!"
 ep3_laamp_flavour_ewan.3071.f: "Fuja."
 ep3_laamp_flavour_ewan.3071.f.success: "Você escapa."
 ep3_laamp_flavour_ewan.3071.f.failure: "O inimigo alcança você."
 ep3_laamp_flavour_ewan.3073.t: "$ep3_laamp_flavour_ewan.3071.t$: Duelo Vitorioso"
 ep3_laamp_flavour_ewan.3073.desc: "Quando o corpo maltratado de [local_soldier.GetFirstName] desaba no chão, um grito de consternação se ergue das tropas.\n\nAgora que seu comandante está morto, o moral dos locais se despedaça por completo, e eles entram em uma retirada desorganizada com meus soldados em seus calcanhares.\n\nOlho para o corpo. Hmph.\n\nDe fato, morte ou glória."
 ep3_laamp_flavour_ewan.3073.a: "Pobre tolo."
 ep3_laamp_flavour_ewan.3081.t: "Lute por Isso"
 ep3_laamp_flavour_ewan.3081.desc: "O oponente mais recente de [challenger.GetFirstName] desaba, ofegante e derrotado.\n\nA luta livre é um esporte bastante popular entre a maioria dos mercenários, por motivos óbvios, mas [challenger.GetFirstNameNoTooltip] a pratica como se fosse uma forma de arte. Às vezes me pergunto se ele não preferiria lutar com as mãos nuas, sem nenhuma outra arma.\n\n[challenger.GetFirstNameNoTooltip] percebe meu olhar pensativo e ergue os punhos em uma brincadeira educada — mas zombeteira. \"Bem, [ROOT.Char.GetFirstNameNoTooltip], e aí?\"."
 ep3_laamp_flavour_ewan.3081.a: "Palavras corajosas para um perdedor iminente."
 ep3_laamp_flavour_ewan.3081.a.tt.success: "Você luta com [challenger.GetFirstNameNoTooltip] até subjugar[challenger.GetHerHim]"
 ep3_laamp_flavour_ewan.3081.a.tt.failure: "Derrota."
 ep3_laamp_flavour_ewan.3081.b: "Dê uma surra nele por sequer perguntar."
 ep3_laamp_flavour_ewan.3081.c: "Hah, #EMP não#!."
 ##################################################
 #TRAVEL DANGER / SUPPLIES
 ep3_laamp_flavour_ewan.4001.t: "Bandidos!"
 ep3_laamp_flavour_ewan.4001.desc: "Os bandidos lançam seu ataque enquanto ainda estamos em movimento, com nossos defensores e membros vulneráveis igualmente espalhados em uma longa coluna sinuosa.\n\nCoordenam-se bem, fazendo soar um longo toque de chifre antes de saírem de seus esconderijos e atingirem vários pontos de nossa caravana ao mesmo tempo com uma fúria terrível.\n\nAinda assim, fica imediatamente óbvio qual é seu objetivo, já que seu líder, um[bandit_leader.Custom('ES_XA')] temível [bandit_leader.GetWomanMan] de aparência [bandit_leader.GetCulture.GetName], conduz sua gangue diretamente para as carroças mais pesadas, carregadas de provisões."
 ep3_laamp_flavour_ewan.4001.a: "Repele-os!"
 ep3_laamp_flavour_ewan.4001.a.tt.success: "Os bandidos são derrotados."
 ep3_laamp_flavour_ewan.4001.a.tt.failure: "Eles fogem com o saque, independentemente."
 ep3_laamp_flavour_ewan.4001.b: "Prepare-se para provar o aço, bandido!"
 ep3_laamp_flavour_ewan.4001.c: "Afaste-se, #EMP peixes pequenos#!."
 ep3_laamp_flavour_ewan.4001.c.tt.success: "Você intimida os criminosos locais."
 ep3_laamp_flavour_ewan.4001.c.tt.failure: "Sua reputação falha."
 ep3_laamp_flavour_ewan.4001.d: "Renda as provisões."
 ep3_laamp_flavour_ewan.4003.t: "$ep3_laamp_flavour_ewan.4001.t$: Duelo Vitorioso"
 ep3_laamp_flavour_ewan.4003.desc: "A morte de seu líder espalha uma onda de confusão apavorada pelas fileiras inimigas.\n\nA batalha ao meu redor muda de rumo, com um coro de gritos e gorgolejos úmidos subindo do inimigo enquanto os traficantes de escravos são passados a fio de espada às dezenas, morrendo em massa. Em poucos minutos, uma força de socorro vinda do corpo principal da coluna rompe a retaguarda dos escravistas, e tudo termina.\n\nCom um chute desdenhoso, jogo o que resta do líder deles de cara em um monte de [ROOT.Char.Custom('GritType')]."
 ep3_laamp_flavour_ewan.4003.a: "Ninguém rouba de mim."
 ep3_laamp_flavour_ewan.4011.t: "Uma Terra de Leite e Mel"
 ep3_laamp_flavour_ewan.4011.desc: "Neste mundo há muitos lugares duros e implacáveis.\n\n[current_county.GetBaseNameNoTier] não é um deles.\n\nNão, ao contrário, sua terra fértil gera pessoas generosas e forrageio fácil. As tensões diminuem e a comida para todo o bando parece, por enquanto, deixar de ser um problema: que #EMP dicha#! tão inesperada."
 ep3_laamp_flavour_ewan.4011.a: "Aproveite os frutos da abundância."
 ep3_laamp_flavour_ewan.4021.t: "Sedento"
 ep3_laamp_flavour_ewan.4021.desc: "Já faz dias desde a última vez que o acampamento encontrou água potável.\n\nA comida... todos podemos passar sem comer por um tempo. Os roncos do estômago levam semanas para nos matar.\n\nMas, sem água, sem nenhum lugar à vista para reabastecer e com os estoques cada vez mais escassos, a sede ameaça uma morte muito mais #EMP veloz#!."
