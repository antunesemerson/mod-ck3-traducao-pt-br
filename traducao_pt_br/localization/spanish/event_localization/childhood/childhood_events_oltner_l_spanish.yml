l_spanish:
 childhood.7000.t: "Prendendo [stolen_clothes.GetFirstNameNoTooltip] de surpresa"
 childhood.7000.desc: "Eu diria que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('stolen_clothes'))] [stolen_clothes.GetFirstName] está um pouco… #EMP constreñid[stolen_clothes.Custom('ES_OA')]#!! [stolen_clothes.GetSheHe|U] leva as coisas sério demais, cuidando dos assuntos da corte dia após dia. Talvez eu devesse #EMP animoo#! dar uma animada no ambiente?\n\n"
 childhood.7000.desc_child: "Eu sei que [child_helper.GetFirstName] estaria dispost a me ajudar a executar meu #EMP plano malicioso#! se eu chamá-l.\n\n"
 childhood.7000.desc_end: "Como reagiria [stolen_clothes.GetFirstNameNoTooltip] se suas roupas… “sumirem”? #EMP *jijiji*#!"
 childhood.7000.a: "Vou me esgueirar até os aposentos e roubar as roupas!"
 childhood.7000.b: "[child_helper.GetFirstNameNoTooltip], distraia[stolen_clothes.GetHerHim]. #EMP Vamos!#!"
 childhood.7000.c: "Não, devo ser legal. Tire um descanso, [stolen_clothes.GetFirstNameNoTooltip]."
 childhood.7000.d: "Hm, a hora não está certa..."
 childhood.7000.a.success: "Você rouba as roupas"
 childhood.7000.a.failure: "[stolen_clothes.GetSheHe|U] pega você no ato"
 childhood.7001.desc_helper: "Sucesso! [child_helper.GetFirstName] distraiu [stolen_clothes.GetFirstName] soltando [ROOT.Char.Custom('GetLivestockFowlIndef')] no quarto cedo esta manhã… e enquanto isso, eu roubei toda peça de roupa que pude encontrar!"
 childhood.7001.desc_nohelper: "Êxito! Consegui me esgueirar até a câmara de [stolen_clothes.GetFirstNameNoTooltip] e pegar todas as roupas dele(a) antes que acordasse!"
 childhood.7001.desc_angry: "[stolen_clothes.GetFirstNameNoTooltip] se levantou em[stolen_clothes.Custom('ES_OA')] uma fúria e me perseguiu pelo corredor sem uma peça de roupa no corpo!\n\n\"Seu pirralho irritante! Me devolva minhas roupas imediatamente, ou eu vou quebrar seu pescoço!\", grita, fumegando pelas narinas.\n\nPode ser que a [stolen_clothes.GetFirstNameNoTooltip] não tenha gostado da minha travessura esperta, mas para todo o resto pareceu #EMP graciosísima!#!"
 childhood.7001.desc_funny: "[stolen_clothes.GetFirstNameNoTooltip] se levantou rapidamente e saiu correndo[stolen_clothes.Custom('ES_OA')] e me perseguiu pelo corredor sem uma única peça de roupa no corpo!\n\n«Filho! Devolva minhas roupas, não tenho tempo para isso!», grita, correndo até o salão principal antes de parar e perceber o que fez.\n\nTodos, até [stolen_clothes.GetFirstNameNoTooltip] acharam a situação #EMP muy#! muito divertida e riram até ficarem vermelhos."
 childhood.7001.a: "E farei de novo! E de novo! E #EMP de novo!#!"
 childhood.7001.b: "Não teria conseguido sem você, [child_helper.GetFirstNameNoTooltip]!"
 childhood.7001.c: "Uma boa brincadeira faz toda a diferença!"
 childhood.7002.desc_helper: "Oh não! [child_helper.GetFirstName] soltou [ROOT.Char.Custom('GetLivestockFowlIndef')] no quarto de [stolen_clothes.GetFirstNameNoTooltip], mas ele nos traiu! Ele gritou alto quando entramos, e [stolen_clothes.GetFirstNameNoTooltip] pulou direto da cama, nos vendo.\n\n"
 childhood.7002.desc_nohelper: "Droga! Ao me esgueirar, [stolen_clothes.GetFirstName] abriu os olhos de súbito e saltou da cama!\n\n"
 childhood.7002.desc_angry: "[stolen_clothes.GetSheHe|U] se estica agilmente em direção ao seu penico cheio e o arremessa com uma precisão incrível. Com um alto #flatulence salpicadura#!. Estou coberto do que só posso supor serem os excrementos de #EMP varias noches#!!\n\n\"Isso vai te ensinar a me incomodar! Saia daqui, ou haverá mais de onde isso veio!\", grita."
 childhood.7002.desc_funny: "\"Agora, escute aqui!\" [stolen_clothes.GetFirstNameNoTooltip] diz, segurando firme a minha orelha. \"Você não pode sair por aí roubando roupas! Acho que você está atrasad para uma lição de etiqueta...\"\n\nOh não, não a #EMP etiqueta!#!"
 childhood.7002.a: "#EMP Não! Ewww!#!"
 childhood.7002.b: "Isso nunca mais vai acontecer, prometo!"
 childhood.7002.c: "Foi #EMP TUDO#! ideia de [child_helper.GetFirstNameNoTooltip]!"
 bully_stops: "[bully.GetFirstName] para de te intimidar"
 skill_increased: "Aumento de Habilidade"
 funny_opinion: "Engraçado"
 childhood.7100.t: "Uma Visão Traumatizante"
 childhood.7100.desc: "Enquanto estou brincando no pátio, vejo [child_to_annihilate.GetFirstName] brincando com outras crianças.\n\n"
 childhood.7100.killed_by_sow: "De repente, quando [child_to_annihilate.GetFirstNameNoTooltip] passa ao lado de um chiqueiro próximo, uma porca enorme agarra o braço. Não afrouxa o aperto. Eu me viro enquanto os gritos ficam cada vez mais altos, até que finalmente cessam.\n\n"
 childhood.7100.kicked_by_horse: "Sem aviso, quando [child_to_annihilate.GetSheHe] encosta em um cavalo, ele dá um coice. [child_to_annihilate.GetFirstNameNoTooltip] é lançado a vários metros, até ficar imóvel e ensanguentad[child_to_annihilate.Custom('ES_OA')] no chão.\n\n"
 childhood.7100.kicked_by_camel: "Sem aviso, quando [child_to_annihilate.GetSheHe] esbarra em um camelo, ele lhe dá uma patada. [child_to_annihilate.GetFirstNameNoTooltip] é arremessad[child_to_annihilate.Custom('ES_OA')] no chão.\n\n"
 childhood.7100.stomped_by_elephant: "Sem aviso, quando [child_to_annihilate.GetSheHe] esbarra em um elefante, ele se empina e troveja furiosamente. O elefante baixa uma de suas enormes patas sobre [child_to_annihilate.GetFirstNameNoTooltip] e [child_to_annihilate.GetHerHim] o esmaga contra o chão.\n\n"
 childhood.7100.smashed_by_roof_tile: "Quando [child_to_annihilate.GetSheHe] passava por debaixo de um prédio próximo, uma pesada telha do telhado se solta de repente. Com um #EMP ruido sordo#! enorme, atinge a cabeça de [child_to_annihilate.GetFirstNameNoTooltip] e [child_to_annihilate.GetHerHim] derruba instantaneamente.\n\n"
 childhood.7100.desc_end: "O silêncio repentino logo é substituído pelos gritos aterrorizados dos espectadores. Como [ROOT.Char.GetFaith.HighGodName] permitiria que isso acontecesse!?"
 death_sow: "uma porca [CHARACTER.GetHerHim] matou a mordidas"
 death_horse: "[CHARACTER.GetHerHim] foi morto por um cavalo empinado"
 death_camel: "[CHARACTER.GetHerHim] foi morto(a) por um camelo indomado"
 death_roof_tile: "teve sua cabeça esmagada por uma telha que caiu"
 childhood.7100.a: "O.. o quê!? N.. não!"
 childhood.7100.b: "…#DIE1 ja#! jaJA! Vocês viram isso?!"
 childhood.7100.c: "Meh."
 childhood.7100.d: "S.. você pode me abraçar por um tempo, [friend_to_comfort.GetFirstNameNoTooltip]?"
 childhood.7100.d.friend: "Seu amig[friend_to_comfort.Custom('ES_OA')] [friend_to_comfort.GetFirstNameNoTooltip] faz o possível para consolar você"
 childhood.7200.t: "Barreira Linguística"
 childhood.7200.desc: "Adoro brincar com [language_friend.GetFirstName], mas às vezes é difícil entender o que ele/ela está dizendo…\n\nEmbora seja perfeitamente possível se comunicar apenas com gestos e caretas, acho que seria muito divertido poder falar [language_friend.GetCulture.GetLanguage.GetNameNoTooltip] com [language_friend.GetSheHe]!\n\nTalvez eu deva estudar com afinco pelo bem de [language_friend.GetFirstNameNoTooltip]?"
 childhood.7200.a: "Vou estudar noite e dia!"
 childhood.7200.b: "Hm, vou pedir a um servo para ler algumas fábulas em [language_friend.GetCulture.GetLanguage.GetNameNoTooltip]."
 childhood.7200.c: "Não, é muito trabalho. E temos #EMP brincadeiras#! para fazer!"
 entertained_opinion: "Entretido"
 childhood.7300.t: "'Preparando' para o Futuro"
 childhood.7300.desc: "Em breve governarei de verdade — sem ser supervisionado por tutores volúveis e professores sabichões… e, quando isso acontecer, devo me certificar de manter meus súditos sob meu controle.\n\n[beating_target_1.GetTitledFirstName|l] é fraco e submisso, tenho certeza de que minha presença intimidadora o inspirará a ser… [beating_target_1.Custom('ES_OA')] tenho certeza[ROOT.Char.Custom('ES_OA')] de que minha presença intimidadora o inspirará a ser… #EMP leal#! no futuro.\n\n"
 childhood.7100.beating_target_2: "Ou talvez [beating_target_2.GetTitledFirstName|l] mereça mais a minha atenção? [beating_target_1.GetSheHe|U] também é fraco.\n\n"
 childhood.7100.beating_target_3: "E também tem [beating_target_3.Custom('ES_ElLa')] o/a frágil [beating_target_3.GetTitledFirstName|l] , posso fazê-lo/a se encolher só de #EMP mirar[beating_target_3.GetHerHim]#!!"
 childhood.7300.desc_end: "Escolhas, escolhas..."
 childhood.7300.a: "[beating_target_1.GetFirstNameNoTooltip], deixe-me apresentar meus punhos a você!"
 childhood.7300.b: "Venha aqui, [beating_target_2.GetFirstNameNoTooltip]..."
 childhood.7300.c: "Nada pessoal, [beating_target_3.GetFirstNameNoTooltip], é apenas negócios."
 childhood.7300.d: "Isso está abaixo de mim..."
 childhood.7300.a.success: "Você intimida [beating_target_1.GetFirstNameNoTooltip]"
 childhood.7300.a.failure: "Você não consegue intimidar [beating_target_1.GetFirstNameNoTooltip]"
 childhood.7300.b.success: "Você intimida [beating_target_2.GetFirstNameNoTooltip]"
 childhood.7300.b.failure: "Você não consegue intimidar [beating_target_2.GetFirstNameNoTooltip]"
 childhood.7300.c.success: "Você intimida [beating_target_3.GetFirstNameNoTooltip]"
 childhood.7300.c.failure: "Você não consegue intimidar [beating_target_3.GetFirstNameNoTooltip]"
 childhood.7400.t: "Guardião contra Bullying"
 childhood.7400.desc: "Ah, não... Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('bully'))] [bully.GetFirstName] está aqui de novo. Só quero brincar em paz, por que ele não me deixa em paz[ROOT.Char.Custom('ES_OA')]?\n\n\"O que você está fazendo, #EMP [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('bully'))]?!#!\", grita [bully.GetFirstNameNoTooltip] na minha cara."
 childhood.7400.desc_2: "\n\nDe repente, um toque no ombro. \"Ele está incomodando você?\", diz [bodyguard.GetFirstName] , meu guarda-costas, com voz calma. \"Quer que eu lhe ensine boas maneiras?\""
 childhood.7400_father_dead: "«Você é um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('bully'))] [ROOT.Char.Custom2('InsultAdjective'), bully]! E, além disso… seu pai morreu! Ha-ha!»."
 childhood.7400_mother_dead: "\"Você ? um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('bully'))] nojento! Ah, e além disso... sua mãe morreu! Ha-ha!\""
 childhood.7400_none_dead: "Você é um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('bully'))] podrido[bully.Custom('ES_OA')] e ninguém quer brincar com você!"
 childhood.7400.a: "Você vai fazer o que eu mandar a partir de agora, entendeu?"
 childhood.7400.b: "[bodyguard.GetFirstNameNoTooltip], dê uma lição n!"
 childhood.7400.c: "Você precisa aprender a ser legal."
 every_parent_of_bully: "Todos os Pais de [bully.GetFirstName]"
 childhood.7500.t: "Uma História do Passado"
 childhood.7500.desc: "\"Aproxime-se, tenho uma história que quero lhe contar\", diz meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guardian'))] [guardian.GetTitledFirstName|l], fazendo-me sinais para que eu me aproxime da fogueira.\n\n"
 childhood.7500.participant: "\"É uma história de quando [guardian_memory.GetDescription]. Sim, meu [guardian.Custom2('RelationToMe', SCOPE.sC('memory_participant'))]…\"."
 childhood.7500.participant_dead: "\"É uma história de quando [guardian_memory.GetDescription]. Era meu [guardian.Custom2('RelationToMe', SCOPE.sC('memory_participant'))], que [memory_participant.GetDeathReason]…\"."
 childhood.7500.no_participant: "\"É uma história de quando [guardian_memory.GetDescription]...\""
 childhood.7500.midpoint: "[guardian.GetFirstNameNoTooltip] [ROOT.Char.Custom2('QuirkPresentPosOrNeg', SCOPE.sC('guardian'))] e continua a contar a história enquanto as chamas da fogueira lambem o céu noturno."
 childhood.7500.family: "\n\n\"...lembre-se da importância da sua família, [ROOT.Char.GetFirstNameNoTooltip]. Carregue o nome da Casa [ROOT.Char.GetHouse.GetNameNoTooltip] com orgulho. #EMP [ROOT.Char.GetHouse.GetMotto].#!\""
 childhood.7500.martial: "\n\n\"...aperfeiçoe suas habilidades, sua destreza e sua sagacidade na batalha. [ROOT.Char.GetFirstNameNoTooltip], você terá inimigos sem limites, treine para poder derrotá-los.\""
 childhood.7500.death: "\n\n\"… querid[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetFirstNameNoTooltip], lembre-se da moral da minha história. A morte vem para todos nós — certifique-se de que ela venha para seus inimigos antes de vir para você\"."
 childhood.7500.war: "\n\n“… os estragos da guerra colocarão à prova o estofo de todas as pessoas. Lembre-se de que a verdadeira estratégia requer astúcia, [ROOT.Char.GetFirstNameNoTooltip]\"."
 childhood.7500.relationships: "\n\n\"...aqueles ao seu redor, seus amigos, seus conselheiros, até mesmo seus rivais — são eles que importam. Mantenha-os por perto, especialmente seus inimigos.\""
 childhood.7500.childhood: "\n\n\"… uma história da minha infância! Como me sinto velh[guardian.Custom('ES_OA')] me sinto…\""
 childhood.7500.a: "Que história maravilhosa, [guardian.GetFirstNameNoTooltip]."
 childhood.7500.b: "#DIE2 ...z#!#DIE1 z#! zZ"
 culture_tradition_events.2100.t: "Uma História ao Redor da Fogueira"
 culture_tradition_events.2100.b: "Suas histórias sempre me fazem sentir melhor, de verdade."
