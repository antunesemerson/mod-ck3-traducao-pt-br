l_spanish:
 child_personality.7000.t: "O Barril Roubado"
 child_personality.7000.desc: ""Olha o que eu encontrei, [child.GetFirstNameNoTooltip]: um barril inteiro de [ROOT.GetCharacter.Custom('RegionalAlcoholicDrink')]! Peguei-o quando os cozinheiros não estavam olhando", me diz [other_child.GetFirstName] com um olhar diabólico nos olhos.\n\n"O que você está esperando? Vamos beber tudo antes que alguém perceba que sumiu!", exclama.\n\nUma oferta tentadora… mas isso está certo?"
 child_personality.7000.a: "Me dê aqui – eu vou devolver tudo como estava, sozinh."
 child_personality.7000.b: "Você é de verdade um[other_child.Custom('ES_XA')] amig[other_child.Custom('ES_OA')], [other_child.GetFirstNameNoTooltip]! Saúde!"
 child_personality.7000.c: "Ah, isso não é para mim. Mas você pode beber."
 child_personality.7001.t: "$child_personality.7000.t$"
 child_personality.7001.desc: ""Peguei esses dois se escondendo na despensa!", grita para mim um[cook.Custom('ES_XA')] cozinheir[cook.Custom('ES_OA')] muito irritad[cook.Custom('ES_OA')] que traz arrastados meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))] [child.GetFirstName] e [other_child.GetFirstName].\n\n"
 child_personality.diligent.desc: "«[other_child.GetFirstNameNoTooltip] roubou um barril #EMP entero#! de [ROOT.GetCharacter.Custom('RegionalAlcoholicDrink')]! [child.GetFirstNameNoTooltip] tentou devolvê-lo antes que eu percebesse, mas sem sorte!», diz minha cozinheir[cook.Custom('ES_OA')] com raiva.\n\nParece que meu pupilo[child.Custom('ES_OA')] é um pouco encrenqueiro, mas mudou de ideia!"
 child_personality.gregarious.desc: ""Roubaram um barril #EMP inteiro#! de [ROOT.GetCharacter.Custom('RegionalAlcoholicDrink')] e beberam quase tudo. E agora olhem só para eles — bêbad[child.Custom('ES_OA')]s como lordes! Mal conseguem ficar de pé...", diz meu cozinheir[cook.Custom('ES_OA')] com raiva.\n\nParece que meu pupil[child.Custom('ES_OA')] sucumbiu à pressão dos colegas, mas pelo menos parece que [child.GetSheHe] e [other_child.GetFirstNameNoTooltip] são inseparáveis."
 child_personality.temperate.desc: ""Roubaram um barril #EMP inteiro#! de [ROOT.GetCharacter.Custom('RegionalAlcoholicDrink')] e [child.GetFirstNameNoTooltip] ficou sentado ali enquanto [other_child.GetFirstNameNoTooltip] bebia até quase perder os sentidos!", diz meu cozinheir[cook.Custom('ES_OA')] com raiva.\n\nParece que meu pupil[child.Custom('ES_OA')] protegeu seu comparsa, fazendo guarda enquanto se abstinha de beber."
 child_personality.7001.diligent: "Você sozinh[child.Custom('ES_OA')]? Muito diligente da sua parte, bom[child.Custom('ES_XA')] [child.Custom('GirlBoy')]!"
 child_personality.7001.gregarious: "Haha! Você se divertiu #EMP de verdade#!, não foi?!"
 child_personality.7001.temperate: "Foi muito bom da sua parte abster-se da bebida."
 child_personality.7001.change.diligent: "Eu acredito que alguém precisa aprender sobre responsabilidade pessoal."
 child_personality.7001.change.gregarious: "Agora escute: bebida é a chave da #EMP alegria#! e da #EMP diversão#!!"
 child_personality.7001.change.temperate: "Você vai ficar longe de bebidas alcoólicas a partir de agora, entendeu?"
 spoilsport_opinion: "Estraga-prazeres"
 child_personality.7010.t: "O Sermão"
 child_personality.7010.desc: ""Escutem minhas palavras, crianças. Hoje eu lhes falarei de [ROOT.Char.GetFaith.HighGodName], [ROOT.Char.GetFaith.PositiveAfterLife], [ROOT.Char.GetFaith.NegativeAfterLife], e até mesmo #EMP [ROOT.Char.GetFaith.DevilName]#! em pessoa!", exclama [sermon_priest.GetFirstName], com o fervor queimando em seus olhos.\n\nEu e as outras crianças estamos fascinados pelo sermão de [sermon_priest.GetFirstNameNoTooltip], quem diria que o/a [ROOT.Char.GetFaith.ReligiousText] podia ser tão #EMP fascinante?!#!\n\nQuando o sermão termina, preciso contar a [sermon_priest.GetFirstNameNoTooltip] o que penso."
 child_personality.7010.a: "\"Minha crença em [ROOT.Char.GetFaith.HighGodName] #EMP nunca#! vacilará, [sermon_priest.GetFirstNameNoTooltip]!\""
 child_personality.7010.b: ""O que foi aquilo sobre o #EMP \"Direito divino [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.Custom('GetQueenKing')]\"#!?""
 child_personality.7010.c: "\"Esse '[ROOT.Char.GetFaith.DevilName]' parece #EMP aspiracional!#!\""
 child_personality.7011.t: "$child_personality.7010.t$"
 child_personality.7011.desc: "Hoje [sermon_priest.GetFirstName] deu um sermão ardente para todas as crianças da corte e, aparentemente, elas ficaram encantadas enquanto ele lia com tanto fervor o/a [sermon_priest.GetFaith.ReligiousText].\n\nMeu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))] [child.GetFirstName]"
 child_personality.zealous.desc: "parece ter levado a sério, talvez um pouco #EMP demasiado#!. Desde então, tem perseguido os servos por horas, apontando como eles podem ser melhores [child.GetFaith.GetAdherentNamePlural]…"
 child_personality.ambitious.desc: "agora parece convencid[child.Custom('ES_OA')] de que está destinad[child.Custom('ES_OA')] à grandeza, afirmando que [child.GetFaith.HighGodName] [child.GetHerHim] apoia sem reservas."
 child_personality.sadistic.desc: "não para de me contar o quanto gostou dos trechos sobre #EMP [child.GetFaith.DevilName]#! e que é alguém cujos ideais aspira a emular…"
 child_personality.7011.zealous: "Uma forte crença será útil para você, [child.Custom('GirlBoy')]."
 child_personality.7011.ambitious: "Isso mesmo, nunca se esqueça que o divino está ao seu lado!"
 child_personality.7011.sadistic: "Que digam o que quiserem, mas a falta de escrúpulos lhe será útil."
 child_personality.7011.change.zealous: "Seu #EMP fe#! está acima de tudo, filh[child.Custom('ES_OA')] meu[child.Custom('ES_OA')]."
 child_personality.7011.change.ambitious: "A fé é #EMP apenas um meio para um fim!#!"
 child_personality.7011.change.sadistic: "Criança, este mundo é sombrio e cheio de horrores. É matar ou morrer."
 clever_child_opinion: "Criança Inteligente"
 delightfully_devilish_opinion: "Deliciosamente Diabólico"
 worried_opinion: "Preocupado"
 child_personality.7020.t: "A Surra"
 child_personality.7020.desc: "«¡[child.Custom2('InsultNoun', SCOPE.sC('evil_person'))|U] desmiolado! ¡¿Por que você tem que estar sempre no meu caminho?! Vou te dar uma lição…», exclama [evil_person.GetFirstName] estendendo a mão para um porrete próximo.\n\nO que fiz de errado? Eu só queria ver o que [evil_person.GetFirstNameNoTooltip] estava fazendo! ¡[evil_person.GetFirstNameNoTooltip] se aproxima rapidamente, erguendo o porrete no ar! Socorro!\n\n«Se contar a alguém quem fez isso com você, eu vou garantir que você morra…», diz com um sorriso."
 child_personality.7020.a: "O... como as pessoas podem ser tão cruéis..."
 child_personality.7020.b: "E se houver mais pessoas como [evil_person.GetSheHe]!? Eu devo #EMP sempre#! estar vigilante..!"
 child_personality.7020.c: "Por favor! Não me machuque, eu farei qualquer coisa!"
 child_personality.7021.t: "$child_personality.7020.t$"
 child_personality.7021.desc: "O que aconteceu com meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))] [child.GetFirstName]?! Ele/ela está todo machucado e cheio de hematomas — e se recusa a dizer quem fez isso com ele/ela! Foi uma criança mais velha? Ou [child.GetFirstName] importunou um nobre até o ponto de fúria?\n\n"
 child_personality.shy.desc: "Agora já quase parou de falar e fica se escondendo sempre que tem alguém por perto… pobre [child.Custom('GirlBoy')]…"
 child_personality.paranoid.desc: "Parece que até mesmo as sombras tremeluzentes o fazem pular de medo, talvez [child.Custom('ES_ElLa')] pobre [child.Custom('GirlBoy')] vê seu agressor nelas? Está sempre olhando por cima do ombro, sempre alerta…"
 child_personality.craven.desc: "Tanto que, se cair até mesmo um alfinete, [child.GetFirstNameNoTooltip] sairá correndo para a segurança de um armário vazio. [child.Custom('ES_ElLa')|U] pobre [child.Custom('GirlBoy')] parece viver em constante medo…"
 child_personality.7021.shy: "Querid[child.Custom('ES_OA')] [child.Custom('GirlBoy')], você não precisa falar com ninguém se não quiser..."
 child_personality.7021.paranoid: "Fique alerta, [child.Custom('GirlBoy')]. Não dê a eles outra oportunidade."
 child_personality.7021.craven: "Corra, se esconda e nunca dê aos seus inimigos a chance de te machucar."
 child_personality.7021.change.shy: "Evite as pessoas, e você estará seguro..."
 child_personality.7021.change.paranoid: "Há inimigos #EMP por toda parte#! Você precisa aprender isso."
 child_personality.7021.change.craven: "Você deveria ter fugido, [child.Custom('GirlBoy')]!"
 child_personality.7030.t: "Sozinh na Cozinha"
 child_personality.7030.desc: "Finalmente, tenho #EMP toda#! a cozinha toda para mim!\n\nConvenci [cook.Custom('ES_AlAla')] cozinheir[cook.Custom('ES_OA')], [cook.GetFirstName] de que vou limpar as panelas. Com essa promessa, foi buscar [ROOT.Char.Custom('GetLivestockFowlIndef')] para o jantar de hoje à noite, deixando a cozinha #EMP deliciosamente#! deliciosamente desprotegida.\n\nTem mel e [child.Custom('FavoriteTreatDemand')] e geleia e [child.Custom('GetExpensiveDessert')] e maçãs e… e… #EMP ¡Y YA NO PUEDO MÁS!#!\n\nÉ hora de…"
 child_personality.7030.a: "… comer um pouco de tudo e depois tirar uma soneca em um saco de farinha!"
 child_personality.7030.b: "… devorar o máximo que eu puder e não deixar nem uma migalha!"
 child_personality.7030.c: "… limpar as panelas, é claro!"
 child_personality.7031.t: "$child_personality.7030.t$"
 child_personality.7031.desc: "Saudações, meu [ROOT.Char.GetLadyLord], diz [cook.GetFirstName], um[cook.Custom('ES_XA')] de [cook.GetHerHim]s cozinheir[cook.Custom('ES_OA')]s. Estou com seu [child.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))] [child.GetFirstName] comigo. Veja bem, ele prometeu limpar as panelas na cozinha...\n\nPuxa ar de forma aguda.\n\n"
 child_personality.lazy.desc: ""… mas ele ficou beliscando toda a comida como um ratinho e depois adormeceu[child.Custom('ES_OA')] sobre um saco de farinha! Na minha opinião, ele merecia uma boa surra, mas deixo o[child.GetHerHim] para vocês fazerem o que acharem melhor!".\n\nEste[child.Custom('ES_OA')] [child.Custom('GirlBoy')] está tão desmotivad[child.Custom('ES_OA')] e letárgic[child.Custom('ES_OA')] que qualquer um diria que é um cadáver!"
 child_personality.gluttonous.desc: "\"...mas devorou todos os doces que conseguiu encontrar, como um[child.Custom('ES_XA')] porquinho[child.Custom('ES_OA')]! Agora está todo suado[child.Custom('ES_OA')] e vermelho[child.Custom('ES_OA')] de tanto se empanturrar...\".\n\nÉ verdade que [child.GetFirstNameNoTooltip] nunca consegue resistir a um doce, mas isso talvez tenha ido longe demais..."
 child_personality.compassionate.desc: ""… e ainda limpou #EMP todos#! as panelas todas! Até esfregou o caldeirão, sem eu nem pedir! É um[child.Custom('ES_XA')] [child.Custom('GirlBoy')] muito doce [child.Custom('ES_ElLa')] que vocês têm".\n\nÉ, de fato, muito abnegad[child.Custom('ES_OA')], mas será que esse ato combina com a importância de [child.GetFirstNameNoTooltip]?..."
 child_personality.7031.lazy: "Bom, nunca desperdice energia quando não for necessário!"
 child_personality.7031.gluttonous: "Lembre-se, ninguém pode dizer o que você pode ou não pode comer."
 child_personality.7031.compassionate: "Um gesto tão doce! Você irá longe na vida."
 child_personality.7031.change.lazy: "Não gaste sua energia com pessoas assim, [child.Custom('GirlBoy')]."
 child_personality.7031.change.gluttonous: "Você deveria ter comido todos os doces, é #EMP seu direito.#!"
 child_personality.7031.change.compassionate: "Você deveria tratar [cook.GetFirstNameNoTooltip] melhor!"
 lazy_child_opinion: "Criança preguiçosa"
 little_pig_opinion: "Cerdito"
 sweet_child_opinion: "Criança doce"
 thankful_opinion: "Agradecido"
 child_personality.7040.t: "Esconde-Esconde"
 child_personality.7040.desc: "O armário dos aposentos dos criados é #EMP o melhor#! esconderijo; sou um gênio em brincar de esconde-esconde! Quando espreito pela pequena fresta entre as portas, vejo [lover_1.GetFirstName] e [lover_2.GetFirstName] entrarem de repente pela porta.\n\n"Oh, meu [lover_2.Custom('RomanticComplimentAdjective')] [lover_2.Custom('RomanticComplimentNoun')], mal posso #EMP esperar#! para tirar suas roupas!" [lover_1.GetFirstNameNoTooltip] rosna, suas mãos agarrando todo o corpo de [lover_2.GetFirstNameNoTooltip].\n\n"Me possua, me possua agora, seu [lover_1.Custom('RaunchyComplimentNoun')]!" [lover_2.GetFirstNameNoTooltip] geme alto, atirando-se sobre a cama.\n\n"
 child_personality.7040.desc_motherfather: "Mãe? Pai? O que eles estão #EMP fazendo!?#!"
 child_personality.7040.desc_father: "P... pai? O que você está #EMP fazendo!?#!"
 child_personality.7040.desc_mother: "M... mãe? O que você está #EMP fazendo!?#!"
 child_personality.7040.desc_default: "O que eles estão fazendo... oh... eu não deveria ter #EMP visto isso!#!"
 child_personality.7040.a.crush_version: "[child_crush_target.GetFirstNameNoTooltip] é… #EMP bell[child_crush_target.Custom('ES_OA')]#!, como [child_crush_target.Custom('GetBeautifulMetaphor')]."
 child_personality.7040.a: "Agora isso parece #EMP MUITO#! mais divertido do que esconde-esconde!"
 child_personality.7040.b: "Meus pobres olhos inocentes, façam isso parar! #EMP Façam isso parar!#!"
 child_personality.7041.t: "$child_personality.7040.t$"
 child_personality.7041.desc: "O que diabos estava fazendo meu[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))] [child.GetFirstName] nesse guarda-roupa nos aposentos dos servos? Brincando de esconde-esconde, como ele/ela alega?\n\n"
 child_personality.lustful.desc: "[child.GetSheHe|U] está como tonta[child.Custom('ES_OA')]; sorrindo, bochechas coradas, babando, mal ouvindo o que digo…\n\nAh, não… Já sei o que aconteceu. Deve ter visto dois [ROOT.Char.Custom('lowly_servant_type')]s, hum, #EMP charlando#! juntos. Sem dúvida, o que se vê nos olhos de [child.GetFirstNameNoTooltip] é luxúria."
 child_personality.chaste.desc: "[child.GetSheHe|U] parece um fantasma; está tremendo, com os olhos arregalados, encarando as paredes…\n\nAh, não… Já sei o que aconteceu. Deve ter visto dois [ROOT.Char.Custom('lowly_servant_type')]s, hum, #EMP charlando#! juntos.\n\n[child.Custom('ES_ElLa')|U] pobre parece abatid[child.Custom('ES_OA')] e não me surpreenderia se, quando crescer, tiver dificuldade com intimidade…"
 child_personality.7041.lustful: "Pequen[child.Custom('ES_OA')] pestinh[child.Custom('ES_OA')] safad[child.Custom('ES_OA')]! Guarde isso para quando você crescer!"
 child_personality.7041.chaste: "Não lhe fará mal não ter mais intimidade do que o necessário."
 child_personality.7041.change.lustful: "Não tenha medo, [child.Custom('GirlBoy')]! Quando você for adulto, vai entender!"
 child_personality.7041.change.chaste: "Controle-se! Esse não é o jeito de um[child.Custom('ES_XA')] [child.GetLadyLord]!"
 child_personality.7050.t: "Uma Lição em Riqueza"
 child_personality.7050.desc: ""Sem impostos, o tesouro real logo se esgotaria. Vassalos leais estão mais do que dispostos a pagar", diz [teacher.GetFirstName], meu mestr[teacher.Custom('ES_OA')] e [ROOT.Char.Custom2('QuirkPresentPosOrNeg', SCOPE.sC('teacher'))].\n\n"Portanto, é de suma importância manter vossos súditos felizes e não cobrar impostos demais — nem de menos, para que não o considerem complacente". [teacher.GetFirstNameNoTooltip] continua, virando uma página.\n\n"[ROOT.Char.Custom('ES_DelDela')|U] [ROOT.Char.GetTitleTierName] mais elevad[ROOT.Char.Custom('ES_OA')] ao [ROOT.Char.Custom('lowly_servant_type')] mais humilde, cada um faz a sua parte", diz, fechando o volume. "A lição terminou, podem ir agora"."
 child_personality.7050.a: "Sem justiça, o reino irá falhar!"
 child_personality.7050.b: "Bah! Quando eu governar, os impostos serão #EMP altos#! e #EMP abundantes!#!"
 child_personality.7050.c: "Para fazer uma omelete dourada, é preciso quebrar alguns camponeses..."
 child_personality.7051.t: "$child_personality.7050.t$"
 child_personality.7051.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))] [child.GetFirstName]"
 child_personality.7051.desc_1: "acabou de terminar uma das minhas lições"
 child_personality.7051.desc_2: "acabou de terminar uma lição ministrada por [teacher.GetFirstName]"
 child_personality.7051.desc_fin: "sobre a gestão da Tesouraria e das moedas nela contidas.\n\n"
 child_personality.just.desc: "Parece que [child.GetFirstNameNoTooltip] levou a lição a sério, com um senso de justiça reforçado.\n\nAgora fala constantemente sobre como todos do mais alt[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleTierName|l] ao mais humilde [ROOT.Char.Custom('lowly_servant_type')] têm um papel na economia do domínio."
 child_personality.greedy.desc: "Mas parece que apenas as partes que falavam de #EMP oro#!…\n\nAgora está cobrando pequenos impostos de todos os servos que consegue alcançar, para grande desgosto de todos."
 child_personality.callous.desc: "Parece que [child.GetFirstNameNoTooltip] levou a lição… a sério… mais ou menos.\n\nEmbora entenda o papel das classes mais baixas, também insiste que "se um camponês deixa de pagar os impostos, já não serve para nada e deve ser descartado"… Uma visão muito insensível da vida humana…"
 child_personality.7051.just: "Um forte senso de justiça fará com que você seja querido pelo povo!"
 child_personality.7051.greedy: "Isso mesmo. Nada é mais importante do que #EMP ouro!#!"
 child_personality.7051.callous: "Ótimo. Não deixe que meros #EMP sentimentos#! o impeçam."
 child_personality.7051.change.just: "Você não aprendeu nada!? A lição era sobre #EMP justiça!#!"
 child_personality.7051.change.greedy: "…juajaja! Não, [child.Custom('GirlBoy')], o que você precisa fazer é #EMP dejarlos secos!#!"
 child_personality.7051.change.callous: "As emoções geram fraqueza, [child.Custom('GirlBoy')]. Suprima-as."
 child_personality.7060.t: "Mistérios dos [child.GetFaith.ReligiousText|U]"
 child_personality.7060.desc: "\"Olhe esta página, [child.GetFirstNameNoTooltip]! Acho que fala sobre [child.GetFaith.random_GoodGodNames], é realmente interessante.\" [other_child.GetFirstName] diz, com uma cópia aberta do [child.GetFaith.ReligiousText] em frente a [other_child.GetSheHe] no chão.\n\n\"Há tanto que não sabemos, tanto para aprender! Tantos mistérios, tanto conhecimento - vamos tentar descobrir mais verdades, imagine o que poderíamos nos tornar!\" [other_child.GetFirstNameNoTooltip] diz, com o olhar lentamente se voltando para cima."
 child_personality.7060.a: "Há tanta sabedoria nesse livro!"
 child_personality.7060.b: "Bleh, você não preferiria brincar com o meu #EMP [child.Custom('child_favorite_toy')]!?#!"
 child_personality.7060.c: "Ah, estou feliz com o que já sei."
 child_personality.7061.t: "$child_personality.7060.t$"
 child_personality.7061.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))] [child.GetFirstName] e sua amigu[other_child.Custom('ES_OA')] [other_child.GetFirstName] retiraram um exemplar do/de da [child.GetFaith.ReligiousText] da biblioteca e o levaram para a sala de brinquedos…\n\n"
 child_personality.humble.desc: "Passaram horas tentando entender o que estava escrito em suas páginas, falando de [child.GetFaith.random_GoodGodNames] e dos muitos mistérios do divino.\n\n[child.GetFirstNameNoTooltip] parece ter desenvolvido um profundo respeito pelas palavras da fé [child.GetFaith.GetAdjective]."
 child_personality.cynical.desc: "e o destroçaram completamente! Páginas arrancadas, pegadas na capa, que falta de respeito!\n\nParece que [child.GetFirstNameNoTooltip] não se importa com as palavras do divino…"
 child_personality.content.desc: "[child.GetFirstNameNoTooltip] tentou lê-lo, mas logo percebeu que era melhor deixar as palavras do seu interior para os [child.GetFaith.PriestNeuterPlural] as palavras de seu interior.\n\nParece estar satisfeit[child.Custom('ES_OA')] com sua incapacidade atual de entender o significado profundo do livro…"
 child_personality.7061.humble: "Você faz bem em tratar as palavras sagradas com reverência."
 child_personality.7061.cynical: "Hah! É tudo bobagem de qualquer maneira."
 child_personality.7061.content: "Esteja satisfeito em não saber, eu digo."
 child_personality.7061.change.humble: "Respeite essas palavras! Elas contêm #EMP sabedoria#! e #EMP significado!#!"
 child_personality.7061.change.cynical: "É tudo um absurdo, [child.Custom('GirlBoy')]. Ignore."
 child_personality.7061.change.content: "Esteja satisfeito com o que você já sabe, e você será feliz."
 child_personality.7070.t: "Sangue e Saliva"
 child_personality.7070.desc: "Ah, [child.Custom('GetExpensiveMeal')], minha comida #EMP favorita!#! Quando estou prestes a comer, minha alegria é abruptamente interrompida por [other_child.GetFirstName]. O que ele quer?\n\n\"Olá, seu #EMP [child.Custom2('InsultNoun', SCOPE.sC('other_child'))]!#! O que você está comendo? Parece nojento. Deixe-me #EMP aliñar un poco!#!\", exclama [other_child.GetFirstNameNoTooltip] aproximando-se do meu prato.\n\n#flatulence *¡Chuf!*#! Uma vile escarrada cai bem em cima da minha refeição.\n\n\"Pronto, agora está muito mais gostoso! Hahaha!\", ele ri e sorri."
 child_personality.7070.a: "Agora você se meteu nessa, [other_child.Custom2('InsultNoun', ROOT.Char)]!"
 child_personality.7070.b: "A partir de agora vou cuspir secretamente na comida dela... #EMP Que aproveche.#!"
 child_personality.7070.c: "Engula o sapo e aguente."
 child_personality.7070.c.flavor: "Leve na esportiva e aguente firme."
 child_personality.7071.t: "$child_personality.7070.t$"
 child_personality.7071.desc: "Segundo parece, há algumas noites [other_child.GetFirstName] cuspiu na comida da minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))] [child.GetFirstName] durante um jantar.\n\n"
 child_personality.vengeful.desc: ""Você é [other_child.Custom2('InsultNoun', SCOPE.sC('child'))]!", grita [child.GetFirstNameNoTooltip]. "Pois você é [child.Custom2('InsultNoun', SCOPE.sC('other_child'))]!", grita [other_child.GetFirstNameNoTooltip] de volta.\n\n[child.GetFirstNameNoTooltip] está brigando todos os dias com [other_child.GetFirstNameNoTooltip]! Não passa um minuto sem que [child.GetSheHe] planeje algum tipo de vingança mesquinha…"
 child_personality.deceitful.desc: "Um dos cozinheiros flagrou [child.GetFirstNameNoTooltip] enquanto se vingava de [other_child.GetFirstNameNoTooltip] cuspindo secretamente na comida de sua pessoa! Isso explica por que [other_child.GetFirstNameNoTooltip] tem estado tão #EMP verde#! durante o jantar nestes dias… [child.GetFirstNameNoTooltip] deve estar cuspindo na comida de [other_child.GetFirstNameNoTooltip], seu[child.Custom('ES_EA')] malandrinho…"
 child_personality.calm.desc: "Parece que [child.GetFirstNameNoTooltip] está tentando cansar a [other_child.GetFirstNameNoTooltip] sem reagir à provocação. Não importa quantas vezes [other_child.GetFirstNameNoTooltip] [child.GetHerHim] chame [child.Custom2('InsultNoun', SCOPE.sC('other_child'))] ou lhe dê um tapa na bochecha…"
 child_personality.7071.vengeful: "Você terá sua vingança, com o tempo."
 child_personality.7071.deceitful: "Exatamente o que [other_child.GetFirstNameNoTooltip] merece!"
 child_personality.7071.calm: "Apenas ignore [other_child.GetFirstNameNoTooltip] e logo ficará entediado."
 child_personality.7071.change.vengeful: "Não seja tão dócil! #EMP Véngate!#!"
 child_personality.7071.change.deceitful: "A vingança é um prato que se serve... #EMP indiretamente.#!"
 child_personality.7071.change.calm: "Vire a outra face, [child.Custom('GetDaughterSon')] meu[child.Custom('ES_OA')] ."
 child_personality.7080.t: "Uma Lição de Caridade"
 child_personality.7080.desc_1: ""Olhe para os pobres e os oprimidos, [child.GetFirstNameNoTooltip]. Há muitos deles, e alguns realmente precisam de ajuda; outros são meros charlatões em busca de esmola"."
 child_personality.7080.desc_name_1: "[teacher.GetTitledFirstName] $child_personality.7080.desc_2$"
 child_personality.7080.desc_name_2: "[teacher.GetCouncilTitle] [teacher.GetFirstName] $child_personality.7080.desc_2$"
 child_personality.7080.desc_2: "me explica, tirando uma pequena bolsa de ouro\n\n"Quem entre eles merece mais a nossa caridade hoje, minha querid[child.Custom('ES_OA')] [child.Custom('GirlBoy')]?", diz, entregando-me a bolsa.\n\nParece como se [teacher.GetFirstNameNoTooltip] quisesse que eu entregasse o ouro a quem mais precisa…"
 child_personality.7080.a: "Todos merecem! Devemos ter mais para dar?"
 child_personality.7080.b: "[ROOT.Char.Custom('ES_ElLa')|U] [ROOT.Char.Custom('lowly_servant_type')]! Não... Esse camponês ali! Espera, talvez..."
 child_personality.7080.c: "Nenhum deles. São todos escória!"
 child_personality.7081.t: "$child_personality.7080.t$"
 child_personality.7081.desc: "[teacher.GetTitledFirstName] levou hoje ao mercado meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))] [child.GetFirstName]. [child.GetFirstNameNoTooltip] tinha que distribuir esmolas aos pobres e necessitados, para aprender sobre a caridade e a aflição de um governante diante dos menos afortunados.\n\n"
 child_personality.generous.desc: ""[child.Custom('ES_ElLa')|U] [child.Custom('ComplimentAdjective')] [child.Custom('GirlBoy')] deu algo a todos", diz [teacher.GetFirstNameNoTooltip]. "E quando a bolsa se esgotou, insistiu que fôssemos buscar outra. É muito desinteressad[child.Custom('ES_OA')], talvez até em excesso".\n\nParece que [child.Custom('ES_ElLa')] pequen[child.Custom('ES_OA')] tem um coração muito grande."
 child_personality.fickle.desc: ""[child.Custom('ES_ElLa')|U] [child.Custom('GirlBoy')], em seu desatino, não conseguiu decidir a quem dar o ouro", diz [teacher.GetFirstNameNoTooltip], visivelmente irritad[teacher.Custom('ES_OA')]. "No final, deu uma moeda ao [ROOT.Char.Custom('lowly_servant_type')] com uma única perna, outra a um moleque cego, usou outra moeda para comprar [child.Custom('FavoriteTreatDemand')], deu uma exatamente a #EMP mim#! e perdeu a última em uma vala."\n\nParece que [child.Custom('ES_ElLa')] pequen[child.Custom('ES_OA')] [child.GetFirstNameNoTooltip] é incapaz de se decidir…"
 child_personality.arrogant.desc: "\"Ele/ela se recusou a dar uma única moeda a #EMP nadie!#!\", exclama [teacher.GetFirstNameNoTooltip]. \"Todos que encontramos eram ou \"indignos\" ou \"abaixo de ele/ela\"… no final, ficou com o ouro.\"\n\nParece que [child.GetFirstNameNoTooltip] desenvolveu uma veia egoísta…"
 child_personality.7081.generous: "É nossa responsabilidade dar o máximo que pudermos!"
 child_personality.7081.fickle: "Por que escolher um caminho, quando você pode escolher #EMP todos eles?#!"
 child_personality.7081.arrogant: "Isso mesmo, [child.Custom('GirlBoy')]. Você é #EMP melhor#! do que eles."
 child_personality.7081.change.generous: "Não, você #EMP deve#! cuidar dos pobres!"
 child_personality.7081.change.fickle: "Você sempre deve considerar suas escolhas. Cuidadosamente. Constantemente."
 child_personality.7081.change.arrogant: "Bah! Esses coitados são todos inferiores a você!"
 child_personality.7090.t: "Os Pontos Finos da Diplomacia"
 child_personality.7090.desc: "«Os vassalos às vezes ultrapassarão seus limites», diz minha mestra[teacher.Custom('ES_OA')] [teacher.GetFirstName]. «O perdão fortalecerá seus laços».\n\n«Às vezes, é preciso confiar em um súdito apesar de sua reputação, para que vocês não fiquem sobrecarregados», continua monotonamente.\n\n«É importante dar a eles o tempo de que precisam para corrigir seus erros», diz [teacher.GetFirstNameNoTooltip] , enrolando o pergaminho.\n\n«Pois bem, o que vocês aprenderam aqui hoje?», diz, olhando fixamente para mim."
 child_personality.7090.a: "Todos cometem erros, eu não devo julgar."
 child_personality.7090.b: "Que confiar em seus súditos é muito importante!"
 child_personality.7090.c: "Paciência. Deixe as coisas levarem o tempo necessário."
 child_personality.7091.t: "$child_personality.7090.t$"
 child_personality.7091.desc: "Hoje [teacher.GetFirstName] deu a meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))] [child.GetFirstName] uma lição sobre a administração dos vassalos. Foi um curso bastante complicado, necessário, mas talvez um pouco além da compreensão de [child.GetFirstNameNoTooltip]?\n\n"
 child_personality.forgiving.desc: ""Todo mundo comete erros!", exclama [child.GetFirstNameNoTooltip]. "Quando eu reinar, perdoarei e deixarei viver — assim meu domínio prosperará!"\n\nSerá que não acabará sendo um[child.Custom('ES_XA')] governante #EMP indulgente demais#!?…"
 child_personality.trusting.desc: "\"Meus súditos só desejam o melhor para mim!\", exclama [child.GetFirstNameNoTooltip]. \"Confiarei em meus súditos sem distinção — para que possamos construir o reino juntos!\".\n\nMeu doce e crédul[child.Custom('ES_XA')] [child.Custom('GirlBoy')]… Esse nível de confiança pode ser perigoso…"
 child_personality.patient.desc: "«Devo deixar que as coisas levem o tempo que precisarem», diz [child.GetFirstNameNoTooltip]. «Só com paciência e deixando que meus súditos trabalhem no seu próprio ritmo poderei governar com sabedoria».\n\nParece que [child.GetFirstNameNoTooltip] não compreende que alguns súditos desejarão fazê-lo perder tempo de propósito…"
 child_personality.7091.forgiving: "Apenas ao perdoar podemos avançar."
 child_personality.7091.trusting: "Bom, deixe a suspeita ser vencida em sua mente!"
 child_personality.7091.patient: "A paciência lhe fará bem, [child.Custom('GirlBoy')]."
 child_personality.7091.change.forgiving: "O perdão é uma virtude acima de todas as outras!"
 child_personality.7091.change.trusting: "Confie em seus súditos, eles nunca lhe fariam mal!"
 child_personality.7091.change.patient: "Seja paciente, deixe as coisas acontecerem e então faça seu julgamento."
 child_personality.7100.t: "Invasão à armaria"
 child_personality.7100.desc: "¡Por fim, conseguimos entrar! Todas as armas do arsenal ao nosso alcance, que diversão! Toma essa, seus adultos imundos e idiotas que queriam nos impedir de entrar!\n\n«Olha [other_child.Custom('signature_weapon')] que encontrei!», exclama meu compatriota[other_child.Custom('ES_OA')] [other_child.GetFirstName], [other_child.Custom('SignatureWeaponActionPresentParticiple')] a arma.\n\nQuando estendo a mão para [child.Custom('signature_weapon')], ouço um alto #EMP «¡Ay!»#! atrás de mim; ¡[other_child.GetFirstNameNoTooltip] se machucou, e há sangue!\n\n¡O que eu faço?!"
 child_personality.7100.a: "Devemos admitir o que fizemos #EMP agora mesmo!#!"
 child_personality.7100.b: "Deixa pra lá, não suje meu roupa. [child.Custom('SignatureWeaponFlourishThirdPersonPresentParticiple')] [child.Custom('signature_weapon')]"
 child_personality.7100.c: "EU PRECISO DE UM CURATIVO, AGOOOORA!"
 child_personality.7101.t: "$child_personality.7100.t$"
 child_personality.7101.desc: "![ROOT.Char.Custom('CulturalCurse')|U] Ah, esses moleques malditos, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))] [child.GetFirstName] e seu amiguinh[other_child.Custom('ES_OA')] [other_child.GetFirstName] foram pegos em flagrante ao se esgueirarem para dentro do arsenal, não sabem que armas são perigosas?!\n\n"
 child_personality.honest.desc: "[other_child.GetFirstNameNoTooltip] se machucou, mas, felizmente, [child.GetFirstNameNoTooltip] saiu correndo e chamou o adulto mais próximo, admitindo tudo o que haviam feito.\n\n[child.GetFirstNameNoTooltip] parece genuinamente consternad[child.Custom('ES_OA')] de verdade, e não acho que vá voltar a ser desonesto nunca mais."
 child_personality.arbitrary.desc: "Um dos servos os pegou no flagra. [other_child.GetFirstNameNoTooltip] chorava e sangrava no chão, enquanto [child.GetFirstNameNoTooltip] brincava com [child.Custom('signature_weapon')] que havia roubado…\n\nAo que parece, [child.GetFirstNameNoTooltip] não queria #EMP "parar de se divertir só porque [other_child.GetFirstNameNoTooltip] estragou tudo"#!; o que será dess[child.Custom('ES_EA')] [child.Custom('GirlBoy')]…"
 child_personality.impatient.desc: "[child.GetFirstNameNoTooltip] foi apreendid por um servo depois de derrubar uma armadura enquanto procurava um curativo para [other_child.GetFirstNameNoTooltip], que tinha se machucado.\n\nParece que [child.GetFirstNameNoTooltip] gosta de planos precipitados e desinformados..."
 child_personality.7101.honest: "Foi bom que você admitiu o que fez."
 child_personality.7101.arbitrary: "Compreeensível. Quem se importa com [other_child.GetFirstNameNoTooltip] mesmo?"
 child_personality.7101.impatient: "Agir rapidamente para salvar seu amigo? Admirável!"
 child_personality.7101.change.honest: "Você deveria ter admitido sua culpa, seu pirralh[child.Custom('ES_OA')]!"
 child_personality.7101.change.arbitrary: "Você deveria ter continuado brincando, [other_child.GetFirstNameNoTooltip] é dispensável."
 child_personality.7101.change.impatient: "Por que você não o ajudou #EMP inmediatamente?!#!"
 child_personality.7200.t: "A Caverna Escura"
 child_personality.7200.desc: "«Você quer seu [other_child.Custom('child_favorite_toy')]? Quer, é? #EMP ¡Pues a buscar!#!», grita [other_child.GetFirstName], jogando a [other_child.Custom('child_favorite_toy')] [other_child.Custom('ES_DelDela')] [other_child.Custom('GirlBoy')] pequen[other_child.Custom('ES_OA')] nas profundezas da caverna escura e sombria. [other_child.Custom('ES_ElLa')] pequen[other_child.Custom('ES_OA')] começa a chorar descontroladamente.\n\n«Agora ele fará companhia às #EMP arañas#! e #EMP serpientes#!! Está perdido para sempre!», exclama [other_child.GetFirstNameNoTooltip].\n\nComo pode [other_child.GetFirstNameNoTooltip] ser tão mal[other_child.Custom('ES_OA')] com es[other_child.Custom('ES_EA')] pobre?! A caverna está cheia de coisas nojentas que rastejam… mas #EMP tengo#! preciso fazer algo!"
 child_personality.7200.a: "Não tenha medo, vou recuperar seu [other_child.Custom('child_favorite_toy')]!"
 child_personality.7200.b: "Guardas! #EMP Façam#! [other_child.GetFirstNameNoTooltip] recuperá-lo."
 child_personality.7200.c: "Isso me deixa FURIOSO! Vou acabar com você!"
 child_personality.7201.t: "$child_personality.7200.t$"
 child_personality.7201.desc: "Um[other_child.Custom('ES_OA')] dos jovens da corte, [other_child.GetFirstName] pegou o/a [other_child.Custom('child_favorite_toy')] de outr[other_child.Custom('ES_OA')] [other_child.Custom('GirlBoy')] mais jovem[other_child.Custom('ES_OA')] e o jogou em uma caverna próxima. Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))] estava lá e viu tudo.\n\n"
 child_personality.brave.desc: "[child.GetSheHe|U] correu para a caverna e não saiu por quase meia hora! Mas quando saiu, havia recuperado o brinquedo, para o desgosto de [other_child.GetFirstNameNoTooltip].\n\nMuito valente, embora talvez um pouco imprudente."
 child_personality.stubborn.desc: "[child.GetFirstNameNoTooltip] foi atrás dos guardas da casa e obrigou [other_child.GetFirstNameNoTooltip] a ir para a caverna! Durante vários minutos, ouviram-se os gritos aterrorizados de [other_child.GetFirstNameNoTooltip] até que saiu com o brinquedo.\n\nParece que quando [child.GetFirstName] acha que fazer algo é o certo, não para até que aconteça…"
 child_personality.wrathful.desc: "[child.GetFirstNameNoTooltip]pulou cheio[child.Custom('ES_OA')] de raiva e espancou [other_child.GetFirstNameNoTooltip] até deixá-lo ensanguentado! Isso não ajudou o pequen[child.Custom('ES_OA')]o, que começou a chorar ainda mais…\n\nParece que [child.GetFirstNameNoTooltip] tem dificuldade para controlar sua raiva…"
 child_personality.7201.brave: "Tamanha coragem é louvável!"
 child_personality.7201.stubborn: "Sua vontade será feita, [child.Custom('GirlBoy')]."
 child_personality.7201.wrathful: "![other_child.GetFirstNameNoTooltip] tinha que pagar pelo que fez!"
 child_personality.7201.change.brave: "Você deveria ter entrado lá você mesmo, sem medo."
 child_personality.7201.change.stubborn: "Você deveria ter feito [other_child.GetFirstNameNoTooltip] recuperar o brinquedo."
 child_personality.7201.change.wrathful: "Como você não deu um soco em [other_child.GetFirstNameNoTooltip] naquele momento!?"
 #XXX: "XXX"
