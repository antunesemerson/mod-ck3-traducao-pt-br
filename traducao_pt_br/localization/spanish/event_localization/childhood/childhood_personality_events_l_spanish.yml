l_spanish:
 child_personality.0001.t: "Uma Figura Ameaçadora"
 child_personality.0001.opening: "Cada vez que vejo a minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('bully'))] [bully.GetTitledFirstName|l], ele ou ela inventou uma nova maneira de me atormentar."
 child_personality.0001.bullying_1: "\n\nDesta vez, [bully.GetSheHe] ameaçou enfiar minha cabeça na abertura do muro da privada!"
 child_personality.0001.bullying_2: "\n\nDesta vez, [bully.GetSheHe] me seguiu o dia inteiro, fazendo barulhos de latidos e me chamando de vira-lata!"
 child_personality.0001.bullying_3: "\n\nDesta vez, [bully.GetSheHe] derrubou um candelabro e colocou a culpa em mim!"
 child_personality.0001.end: "\n\n[bully.GetSheHe|U] me assusta, mas o que posso fazer?"
 child_personality.0001.no_bully_fallback: "A filha do [ROOT.GetCharacter.Custom('lowly_servant_type')] é uma terrível valentona. Sempre que a vejo, ela inventou uma nova maneira de me atormentar. Ela é tão grande e forte, o que posso fazer mesmo?"
 child_personality.0001.a: "Pelo menos estou ficando muito, muito b em me esconder."
 child_personality.0001.b: "Eu quero ficar no meu quarto o dia todo, de qualquer maneira."
 child_personality.0001.c: "Talvez eu pudesse fazer com que [bully.Custom('ES_LoLa')] fossem enforcados por isso?"
 child_personality.0002.t: "O Criminoso"
 child_personality.0002.guardian: "Enquanto passava pelas ruas com meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guardian'))] [guardian.GetTitledFirstName|l], passamos pela picota. Havia um homem ali, implorando por água ou qualquer tipo de alívio para o seu destino."
 child_personality.0002.no_guardian: "Enquanto passava pelas ruas, nos deparamos com a picota. Um homem estava preso ali, implorando por água ou qualquer tipo de alívio para o seu destino."
 child_personality.0002.a: "Esse criminoso nem deveria se atrever a olhar para mim!"
 child_personality.0002.b: "Vou buscar água para ele no poço."
 child_personality.0002.c: "Água? Espero que essa lama sirva!"
 child_personality.0003.t: "Pego em Flagrante!"
 child_personality.0003.guardian: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guardian'))] [guardian.GetTitledFirstName|l] me pegou roubando do baú de viagem de [robbed_guest.GetTitledFirstName|l] durante sua visita ao castelo. [guardian.GetFirstName] ameaçou me punir e exigiu uma explicação."
 child_personality.0003.no_guardian: "Fui pego roubando do baú de viagem de [robbed_guest.GetTitledFirstName|l] durante a visita ao castelo. [robbed_guest.GetFirstName] ameaçou me punir e exigiu uma explicação."
 child_personality.0003.a: "Fui desafiad para um jogo por uma das outras crianças."
 child_personality.0003.b: "Pensei que pudesse sair impune, mas nunca farei isso novamente."
 child_personality.0003.c: "Eu não tenho mais direito a nada do que os outros têm."
 child_personality.0004.t: "Inspiração Cortesã"
 child_personality.0004.desc: "Fiquei incrivelmente impressionad[ROOT.Char.Custom('ES_OA')] com um dos $knight_culture_player_plural_no_tooltip_lowercase$ da casa. Finalmente, fui apresentado a ele pessoalmente e agora não estou menos impressionad[ROOT.Char.Custom('ES_OA')] agora. Vou me lembrar de suas palavras pelo resto da minha vida"
 child_personality.0004.desc_knight: "Fiquei incrivelmente impressionad[ROOT.Char.Custom('ES_OA')] por um dos $knight_culture_player_plural_no_tooltip_lowercase$ da corte. Finalmente, fui [knight.GetHerHim] apresentado(a) pessoalmente, e agora estou não menos impressionad[ROOT.Char.Custom('ES_OA')]. Guardarei as palavras dele/dela pelo resto da minha vida."
 child_personality.0004.a: "\"Dê a cada um o que lhe é devido, e você receberá o seu em troca.\""
 child_personality.0004.b: "\"Trabalhe duro, e você pode dominar qualquer coisa.\""
 child_personality.0004.c: "\"A grandeza vem com o tempo. Esteja preparado para agarrá-la quando chegar.\""
 child_personality.0005.t: "Hora de Brincar"
 child_personality.0005.desc: "Eu estava brincando com outras crianças quando [doing_push.GetFirstName] tentou me derrubar!\n\nMe persegue constantemente, tenta me empurrar sempre que tem a chance… Está começando a me irritar, tenho que fazer algo a respeito."
 child_personality.0005.a: "Vou mostrar o que acontece com alguém que me empurra!"
 child_personality.0005.b: "Por que você está me empurrando? Eu só quero brincar com você."
 child_personality.0005.c: "Ah, espere, acabei de pensar em um jogo diferente!"
 child_personality.0006.t: "Rejeição Dilacerante"
 child_personality.0006.desc_crush: "Ai, passo o dia e a noite pensando em [crush.GetTitledFirstName|l] e meu coração dispara quando [crush.Custom('ES_LoLa')] o vejo nos salões do castelo! \n\nQuando me aproximei de [crush.Custom('ES_ElElla')] para dizer o que sentia, ele me rejeitou com uma gargalhada e estraçalhou meu coração sob seus pés ao se afastar."
 child_personality.0006.desc: "Sinto algo muito forte por essa pessoa! Toda vez que ela me olha, meu coração dispara.\n\nMas, quando contei o que sentia, ela me rejeitou com uma gargalhada!"
 child_personality.0006.a_crush: "Vou mostrar a ele/ela o que significa me desprezar assim!"
 child_personality.0006.a: "Vou mostrar para eles o que significa me desprezar assim!"
 child_personality.0006.b: "Se isso é amor, eu não quero nada com isso."
 child_personality.0006.c_crush: "Será que ele(a) realmente acha que eu desisto tão facilmente?"
 child_personality.0006.c: "Será que eles realmente pensam que eu desisto tão facilmente?"
 child_personality.0007.t: "Um Julgamento"
 child_personality.0007.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guardian'))] [guardian.GetTitledFirstName|l] me disse que há alguns dias sentenciaram à pena de morte um ladrãozinho.\n\n[guardian.GetSheHe|U] queria saber o que eu penso de uma punição tão severa por um crime tão pequeno."
 child_personality.0007.a: "Foi demais. A punição deve ser proporcional ao crime."
 child_personality.0007.b: "Essa não é a lei de um reino justo."
 child_personality.0007.c: "Devemos estar satisfeitos com o que já temos."
 child_personality.0008.t: "Um Banquete para os Sentidos"
 child_personality.0008.desc: "Estar em um banquete é uma enxurrada de impressões. As pessoas estão conversando, o cheiro de toda sorte de comida enche minha cabeça. Os convidados estão vestindo roupas lindas, os servos estão carregando pratos intermináveis e—\n"
 child_personality.0008.serving_wench: "\nQual era o significado do piscar de olho da criada agora mesmo?"
 child_personality.0008.servant_boy: "\nQual era o significado do piscar de olho do garoto de recados agora mesmo?"
 child_personality.0008.desc_not_server: "\nNão consigo superar o quão impressionante tudo isso é! Que maravilhoso espetáculo de poder."
 child_personality.0008.a: "Tudo é tão brilhante!"
 child_personality.0008.b: "Os adultos podem ser tão divertidos de conversar!"
 child_personality.0008.c: "Não consigo parar de me obcecar pelo brilho nos olhos daquele servo!"
 child_personality.0009.t: "El predicador infantil"
 child_personality.0009.desc: "Vi meu [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('child_preacher'))] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('child_preacher'))] [child_preacher.GetTitledFirstName|l] falando com outras crianças sobre [child_preacher.GetFaith.random_GoodGodNames]. Eles se riram e [child_preacher.GetHerHim] olharam com desprezo antes de começarem a empurrar. Apesar das zombarias, [child_preacher.GetSheHe] tentou continuar a lição, até que o primeiro golpe caiu."
 child_personality.0009.desc_fallback: "Vi meu amig[child_preacher.Custom('ES_OA')] falar com outras crianças sobre [ROOT.Char.GetFaith.random_GoodGodNames]. Eles riram e [child_preacher.GetHerHim] olharam com desprezo antes de começarem a empurrar. Apesar das provocações, meu amig[child_preacher.Custom('ES_OA')] tentou continuar com a lição, até que o primeiro golpe atingiu."
 child_personality.0009.a: "Eu vou te proteger!"
 child_personality.0009.a.tt: "Existe a chance de você ficar ferid."
 child_personality.0009.b: "Vamos parar agora e conversar sobre isso."
 child_personality.0009.c: "É assim que vocês tratam alguém que prega a palavra divina!?"
 child_personality.0009.d: "Isso vai ser divertido!"
 child_personality.0010.t: "Uma Vida em Minhas Mãos"
 child_personality.0010.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guardian'))] [guardian.GetTitledFirstName|l] me levou para a floresta para brincar com um arco. Corri sozinho por conta própria e, não demorou muito, encontrei uma corça ferida, tentando fugir de mim."
 child_personality.0010.a: "Essa será a maior presa que já abati!"
 child_personality.0010.b: "Ela está tão lenta, eu poderia esfaqueá-la e assistir ao sangramento até a morte."
 child_personality.0010.c: "Isso é um teste proposto por [guardian.GetFirstNameNoTooltip], não é?"
 child_personality.0011.t: "Objeto do Meu Desejo"
 child_personality.0011.desc: "Quero [ROOT.GetCharacter.Custom('child_object_of_interest_indefinite')] há muito tempo. Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guardian'))] [SCOPE.sCharacter('guardian').GetTitledFirstName|l] prometeu que vai me dar um em três meses se eu começar a levar os estudos mais a sério."
 child_personality.0011.a: "Eu gosto bastante do tipo de estudo que estou fazendo agora."
 child_personality.0011.b: "Ah, na verdade, não quero mais um."
 child_personality.0011.c: "Eu vou estudar muito!"
 child_personality.0012.t: "Uma Festa Bagunçada"
 child_personality.0012.desc: "Essa festa é barulhenta, os adultos são chatos e a comida não é muito boa.\n\n [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guardian'))] [guardian.GetFirstName] parece estar se divertindo, então não consigo chamar a atenção  para dizer que não quero estar aqui."
 child_personality.0012.a: "Vou sair furtivamente. Talvez haja outras crianças por perto."
 child_personality.0012.b: "Não consigo lidar com tanta gente! Hora de me esconder debaixo da mesa."
 child_personality.0012.c: "Pelo menos posso continuar comendo enquanto estiver aqui!"
 child_personality.0021.t: "Personalidade Emergente"
 child_personality.0021.desc: "Um dos poucos consolos em meu aprisionamento é observar as pessoas, mesmo que seja de trás das grades"
 child_personality.0021.serving_wench: "– todas as manhãs, espero conseguir apenas um olhar para aquela bela serviçal."
 child_personality.0021.servant_boy: "– todas as manhãs, espero conseguir apenas um olhar para aquele belo serviçal."
 child_personality.0021.desc_no_gender: "Cada manhã, espero poder ver um dos belos servos, ainda que seja só por um instante."
 child_personality.0021.a: "Então, minha imaginação pode fazer o resto..."
 child_personality.0022.desc: "Eu me acostumei a ficar sozinh. Sem ninguém para conversar, brincar ou aprender junto. A mera ideia de outra pessoa me tocando agora..."
 child_personality.0022.a: "Isso me dá arrepios!"
 child_personality.0023.desc: "Eu nunca sei quando vou receber minha próxima refeição, então quando um prato é dado a mim, devoro tudo sem hesitação, não importa a quantidade.\n\nSó quando estou chei é que me sinto um pouco mais tranquil."
 child_personality.0023.a: "É uma das poucas alegrias que tenho!"
 child_personality.0024.desc: "Eu nunca sei quando vou receber minha próxima refeição, então quando um prato é dado a mim, forço-me a racionar a comida e ficar satisfeit com o que recebo.\n\nNo começo foi difícil, mas agora é natural."
 child_personality.0024.a: "A moderação é essencial."
 child_personality.0025.desc: "Uma colher descartada, um seixo brilhante, um prato quebrado... Uma vez eu desprezaria essas bugigangas, mas agora percebi que nada é verdadeiramente sem valor!"
 child_personality.0025.a: "Eu coleciono todos os tesouros que encontro."
 child_personality.0026.desc: "Quando não se possui nada, um ato de bondade significa tudo - aprendi isso da maneira mais difícil. É incrível pensar no impacto que posso causar nas pessoas com um simples ato de generosidade!"
 child_personality.0026.a: "O que é meu é... de todos!"
 child_personality.0027.desc: "Meus dias passam vagamente envoltos nessas barras. Eu acordo, ando de um lado para o outro, eu – esperançosamente – como...\n\nNão faz diferença se eu tento preencher meus dias com atividades ou não. Não faz diferença se eu tento de qualquer forma."
 child_personality.0027.a: "Eu vou voltar a dormir."
 child_personality.0028.desc: "Meus dias passam vagamente atrás dessas grades. Eu acordo, ando de um lado para o outro e, com sorte, como...\n\nPara preencher meus dias com algo, aprendi a me dar tarefas e concluí-las bem."
 child_personality.0028.a: "A diligência é fundamental!"
 child_personality.0029.desc: "Esses guardas estúpidos que vigiam cada passo meu, [imprisoner.Custom('ES_ElLa')] [imprisoner.Custom2('InsultAdjective', ROOT.Char)] [imprisoner.Custom2('InsultNoun', ROOT.Char)] [imprisoner.Custom('ES_DelDela')] [imprisoner.GetTitledFirstName|l] que me mantém preso, as ratazanas que correm pelos cantos escuros... Em meu interior cresce a ira, e ela se fortalece a cada dia que passa!"
 child_personality.0029.a: "Eu... só... ARGH!"
 child_personality.0030.desc: "Há pouco que posso fazer para afetar minha situação, tanto no dia a dia quanto em sentido mais amplo. Há pouco a fazer e pouco a dizer."
 child_personality.0030.a: "Aprendi a levar tudo numa boa."
 child_personality.0031.desc: "Há pouco que posso fazer para afetar minha situação, tanto no dia a dia quanto em sentido mais amplo. Só tenho que esperar e ver o que acontece."
 child_personality.0031.a: "A paciência é fundamental."
 child_personality.0032.desc: "Se ficar pres atrás das barras me ensinou alguma coisa, é que as coisas não podem esperar; você nunca sabe o que vai acontecer em um dia, em uma hora, em um minuto! Será que estarei viv até lá?"
 child_personality.0032.a: "Não posso desperdiçar o tempo que tenho!"
 child_personality.0033.desc: "Quando me jogaram aqui dentro, questionei; por que eles me manteriam atrás das barras?\n\nÀ medida que os dias passam, percebo que é porque eles têm medo de mim; têm medo do que me tornarei e, por isso, me trancaram aqui."
 child_personality.0033.a: "Sou simplesmente muito b!"
 child_personality.0034.desc: "Quando me jogaram aqui dentro, questionei; por que eles me manteriam atrás das barras?\n\nÀ medida que os dias passam, percebo que devo ter feito algo para merecer isso e que devo ser grato por tudo o que a vida decide me dar apesar disso."
 child_personality.0034.a: "Não peço muito."
 child_personality.0035.desc: "Se ficar pres atrás das barras me ensinou alguma coisa, é que nada nesta vida é de graça; para conseguir o que você quer, você tem que trapacear e mentir. Tenho sorte de que meus guardas são facilmente enganados!"
 child_personality.0035.a: "Apenas tolos falam a verdade."
 child_personality.0036.desc: "Si he aprendido algo de mi encierro es que la gente no dudará en castigarte y es mejor no dar motivos para hacerlo. Eso, y que #EMP siempre#! hay alguien vigilándote."
 child_personality.0036.a: "Mentir só traz problemas de qualquer forma."
 child_personality.0037.desc: "Os guardas do lado de fora da minha prisão são tão musculosos quanto amargos, e eles observam todos os meus movimentos.\n\nMas quando tento me esconder, é apenas questão de tempo até que ratos, ou algo pior, se aproximem sorrateiramente de mim!"
 child_personality.0037.a: "Todo dia traz um novo medo..."
 child_personality.0038.desc: "Os guardas do lado de fora da minha prisão são tão fortes quanto rudes, e vigiam cada passo que dou. Há ratos em cada canto escuro, e cada dia descubro novos horrores.\n\n![imprisoner.GetTitledFirstName|l] terá que se esforçar muito mais se pretende me assustar agora!"
 child_personality.0038.a: "Não temo nada."
 child_personality.0039.desc: "Hace mucho que no veo a nadie y no sé si lo que siento es desesperación o alivio.\n\nPor una parte, #EMP cualquier#! contacto social sería agradable después de este encierro. Por la otra, no sé si sabría qué decir después de tanto tiempo sin nadie..."
 child_personality.0039.a: "As pessoas são assustadoras!"
 child_personality.0040.desc: "Passar todos os dias atrás das grades fica tão #EMP entediante#!! Um dos poucos prazeres que tenho é conversar com os guardas; eles podem ser brutos, mas alguns são surpreendentemente interessantes!"
 child_personality.0040.a: "Por favor, me conte mais!"
 child_personality.0041.desc: "Pensar em todas as coisas que passam por mim enquanto desperdiço minha vida atrás dessas barras me mantém acordad à noite; todas aquelas oportunidades, perdidas...\n\nQuando finalmente sair deste maldito buraco de prisão, vou compensar todo o tempo perdido!"
 child_personality.0041.a: "Nada me deterá!"
 child_personality.0042.desc: "Pres nesta prisão, aprendi que não preciso de muito para me sustentar; opulência e riqueza não possuem valor intrínseco.\n\nQuando finalmente sair daqui, vou apreciar todas as coisas que tenho!"
 child_personality.0042.a: "Independentemente de seu valor."
 child_personality.0043.desc: "Atrás dessas barras, aprendi uma lição valiosa: o único em quem você pode confiar verdadeiramente é você mesmo. O que a opinião das outras pessoas significa no final das contas? Aliás, o que as outras pessoas significam afinal?"
 child_personality.0043.a: "Elas não significam nada!"
 child_personality.0044.desc: "A injustiça que presenciei nesta prisão - tanto dos guardas quanto dos outros prisioneiros - é suficiente para me dar pesadelos.\n\nSe não podemos tratar uns aos outros com justiça, então qual é o sentido?!"
 child_personality.0044.a: "Sem leis, não somos melhores que animais."
 child_personality.0045.desc: "As pessoas são egoístas; se há algo que meu tempo atrás das barras me ensinou, é isso.\n\nUma refeição inesperadamente decente? Os prisioneiros farão de tudo para roubar uns dos outros. Um guarda provocando-os para renunciar a [ROOT.Char.GetFaith.HighGodName] por um agrado? Sem hesitação."
 child_personality.0045.a: "As pessoas só se importam consigo mesmas."
 child_personality.0046.desc: "A única constante durante meu tempo atrás das barras tem sido [ROOT.Char.GetFaith.HighGodNameAlternate]. Sempre que estive abatid, sempre que duvidei, [ROOT.Char.GetFaith.HighGodNameSheHe] esteve presente em minhas orações.\n\nÀ medida que os dias passam, tenho cada vez mais certeza de que nada importa verdadeiramente além da minha fé."
 child_personality.0046.a: "Louvado seja [ROOT.Char.GetFaith.HighGodName]!"
 child_personality.0047.desc: "Onde quer que eu vá, os guardas estão lá, observando. Mesmo quando acredito estar sozinh, eles soltam um comentário depois que me assegura que viram tudo; que sempre tenho olhos sobre mim."
 child_personality.0047.a: "Sempre tem alguém observando..."
 child_personality.0048.desc: "[imprisoner.GetTitledFirstName] disse que eu seria vestid e alimentad, e fui. Os guardas prometeram que não veria a luz do dia, e não vi.\n\nA única coisa da qual tenho certeza atrás dessas barras é que as pessoas geralmente falam a verdade."
 child_personality.0048.a: "Confio neles."
 child_personality.0049.desc: "Há pouca felicidade para encontrar atrás dessas barras, e o menor gesto de bondade faz uma grande diferença. Ver a alegria nos olhos das outras pessoas, ver seus espíritos se elevarem... Nada me traz tanta calma."
 child_personality.0049.a: "A bondade é tudo o que importa."
 child_personality.0050.desc: "A injustiça que presenciei nesta prisão - tanto dos guardas quanto dos outros prisioneiros - é suficiente para me dar pesadelos. Ou... era. Agora nada mais me surpreende."
 child_personality.0050.a: "Todos são capazes de crueldade."
 child_personality.0051.desc: "Alegria é escassa atrás dessas barras. Os guardas são tão antipáticos quanto são robustos, [imprisoner.GetTitledFirstName|l] é rude ou hostil, e meus colegas prisioneiros estão tão profundamente feridos para me entreter. Ou... pelo menos eu pensava. Quando um deles está sofrendo, sinto os resquícios de alegria se agitando em minha alma."
 child_personality.0051.a: "Essa sensação... Eu quero mais!"
 child_personality.0052.desc: "Outras pessoas decidem o que como, quando e onde durmo, para onde vou... A única coisa que tenho atrás dessas barras é a minha convicção, e não vou ceder."
 child_personality.0052.a: "Eu sou a única constante neste lugar."
 child_personality.0053.desc: "Faz tanto tempo desde que fui livre que não me lembro como era segurar minha vida em minhas próprias mãos; tomar minhas próprias decisões. Agora, até mesmo a pergunta mais simples pode me confundir.\n\nEmbora às vezes seja difícil saber minhas preferências, isso também abre tantas portas!"
 child_personality.0053.a: "Quem sabe o que eu quero fazer?"
 child_personality.0054.desc: "Se alguém te ofende e você prontamente perdoa e esquece, certamente voltará a te ofender. Os guardas e os outros prisioneiros me ensinaram isso.\n\nFelizmente, há pouco a fazer nesta prisão além de lembrar."
 child_personality.0054.a: "[imprisoner.GetTitledFirstNameNoTooltip|l], terei minha vingança."
 child_personality.0055.desc: "Quando você está preso com as mesmas pessoas dia após dia, percebe que nada é preto e branco; as pessoas sempre têm uma razão para agir da maneira como agem, e a maioria está dando o melhor de si.\n\nEu teria apenas inimigos ao meu redor nesta prisão se não perdoasse."
 child_personality.0055.a: "Guardar rancor só traz dor."
 child_personality.0061.t: "A Influência de um Guardião"
 child_personality.0061.desc_opening: "Não gosto de solidão, mas também tenho dificuldade em apreciar a companhia dos outros. Sempre sinto uma preocupação de estar me ridicularizando durante as interações sociais."
 child_personality.0061.desc_shy: "Por isso sinto um forte vínculo com [guardian.GetTitledFirstNameNoTooltip|l], [ROOT.GetCharacter.Custom2('RelationToMe' , guardian)], a quem parecem atormentar pensamentos semelhantes."
 child_personality.0061.desc_gregarious: "[guardian.GetTitledFirstNameNoTooltip|l], [ROOT.GetCharacter.Custom2('RelationToMe' , guardian)] é meu completo oposto nesse aspecto.[guardian.Custom('ES_OA')] total a esse respeito."
 child_personality.0061.desc_fallback: "Não sei se estou sozinh com esses pensamentos..."
 child_personality.0061.desc_ending: "Consigo ver a [guardian.GetTitledFirstNameNoTooltip|l] durante um evento social, onde todos os presentes seguram uma bebida na mão e exibem sorrisos largos. Talvez haja alguma verdade no ditado de que o vinho ajuda a relaxar."
 child_personality.0061.a: "Será que é a cura para minha timidez?"
 child_personality.0061.a.tt: "#EMP Existe a chance de que você melhore sua diplomacia e desenvolva uma propensão para a bebida.#!"
 child_personality.0061.b: "Não, minha timidez é uma provação de [ROOT.Char.GetFaith.HighGodName]! Isso deve ser [ROOT.Char.GetFaith.DevilName] me tentando!"
 my_ward_or_child: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))]"
 child_personality.101.desc: "[child.GetTitledFirstName] veio me procurar para reclamar que [bully.Custom('ES_ElLa')] [bully.GetTitledFirstName|l] [child.GetHerHim] estava importunando."
 child_personality.101.desc_no_bully: "[child.GetTitledFirstName] veio reclamar que o/a [child.Custom('GetDaughterSon')] de um/a [child.Custom('lowly_servant_type')] [child.GetHerHim] estava maltratando."
 child_personality.101.craven: "\n\n[child.GetSheHe|U] tem se escondido por todo o castelo para evitar enfrentar a outra criança."
 child_personality.101.lazy: "\n\n[child.GetSheHe|U] está ficando na cama há dias para evitar encarar a outra criança."
 child_personality.101.arbitrary: "\n\n[child.GetSheHe|U] começou a perguntar como fazer para enforcar alguém, caso achasse que essa pessoa merecesse."
 child_personality.1011.t: "[child.GetFirstNameNoTooltip] se Escondendo"
 child_personality.1012.t: "Trancado em seu Quarto"
 child_personality.1013.t: "Questões de Punição"
 child_personality.101.confirm_craven: "Bom. Não procure problemas quando não forem necessários."
 child_personality.101.confirm_lazy: "Você não precisa enfrentar o mundo se não quiser."
 child_personality.1013.confirm_arbitrary: "Sua vontade é a única lei que realmente importa."
 child_personality.101.lazy_change: "Por que não se esconder em seu quarto em vez disso?"
 child_personality.101.arbitrary_change: "Um valentão merece qualquer punição que você possa imaginar."
 child_personality.101.craven_change: "Antes de tudo, fique escondid[child.Custom('ES_OA')] onde quer que vá!"
 child_personality.1021.t: "Camponeses Indignos"
 child_personality.1022.t: "Aliviando a Dor"
 child_personality.1023.t: "Sal na Ferida"
 child_personality.102.desc_court_location: "Quando estava no/a [court_location.Custom('BaronyTownType')] com [child.GetTitledFirstName|l], chamou sua atenção um criminoso acorrentado na picota."
 child_personality.102.desc: "Quando estava no mercado com [child.GetTitledFirstName|l], sua atenção foi atraída por um criminoso acorrentado à prancha de castigo."
 child_personality.102.arrogant: "\n\n[child.GetFirstNameNoTooltip] ergueu a cabeça e fingiu ignorar os pedidos de água do criminoso."
 child_personality.102.compassionate: "\n\nQuando o homem implorou por água, [child.GetFirstNameNoTooltip] imediatamente prometeu trazer e logo voltou de um poço próximo, deixando o criminoso beber em suas mãos conchas."
 child_personality.102.callous: "\n\n[child.GetFirstNameNoTooltip] o observou por um momento. Quando ele não fazia nada além de tossir e implorar por água, [child.GetFirstNameNoTooltip] revirou os olhos e continuou andando."
 child_personality.102.confirm_arrogant: "Ótimo, deixe-o saber o seu lugar."
 child_personality.102.confirm_compassionate: "Sem bondade, o mundo se desmorona."
 child_personality.102.confirm_callous: "Um criminoso merece nada além de desprezo de você."
 child_personality.102.arrogant_change: "Esse criminoso nem vale a sua atenção."
 child_personality.102.compassionate_change: "Não, criança, traga água para o pobre homem que pede."
 child_personality.102.callous_change: "Cuspa nele. Bata nele. Ele merece nada menos."
 child_personality.103.desc: "Fiquei estupefat[ROOT.Char.Custom('ES_OA')] quando peguei meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))] [child.GetTitledFirstName|l] tentando roubar do baú de viagem de [robbed_guest.GetTitledFirstName|l], que estava de visita."
 child_personality.103.deceitful: "\n[child.GetSheHe|U] culpou um jogo que outra criança havia inventado, mas eu sabia que estava mentindo."
 child_personality.103.honest: "\n[child.GetFirstName] confessou que por um momento pensou que sairia impune, mas agora sabe que estava errado."
 child_personality.103.humble: "\n[child.GetFirstName] me deu um discurso impressionante sobre como entendia por que o que havia feito estava errado."
 child_personality.1031.t: "O Pagamento de um Mentiroso"
 child_personality.1032.t: "Servo da Honestidade"
 child_personality.1033.t: "Bem-aventurados os Mansos"
 child_personality.103.confirm_deceitful: "Você precisa aprender a se safar com suas mentiras."
 child_personality.103.confirm_honest: "A honestidade será mais útil a longo prazo, criança[child.Custom('ES_OA')]."
 child_personality.103.confirm_humble: "Somos todos pequenas peças do mundo."
 child_personality.103.deceitful_change: "Não, precisamos encobrir suas ações erradas!"
 child_personality.103.honest_change: "Seja honesto[child.Custom('ES_OA')] e você verá os outros se abrirem para você."
 child_personality.103.humble_change: "Todos nós seguimos regras mais importantes do que nosso próprio interesse, crianç[child.Custom('ES_OA')]."
 child_personality.1041.t: "O Dom da Generosidade"
 child_personality.1042.t: "Trabalho e Dedicação"
 child_personality.1043.t: "Tudo a seu Tempo"
 child_personality.104.desc: "[child.Custom2('MyCharacterIntroduction', ROOT.Char)|U] está impressionad[child.Custom('ES_OA')] com um dos $knight_culture_player_plural_no_tooltip$ da casa há muito tempo. Depois de conhecê-lo pessoalmente, [child.GetFirstName] vem repetindo as palavras dele para si mesmo."
 child_personality.104.generous: "\n\n\"Dê a cada um o que lhe é devido, e receberá o seu em troca.\""
 child_personality.104.diligent: "\n\n\"Trabalhe duro, e você poderá dominar qualquer coisa.\""
 child_personality.104.patient: "\n\n\"A grandeza chega com o tempo. Esteja lá para agarrá-la quando isso acontecer.\""
 child_personality.104.confirm_generous: "À medida que os outros crescerem ao redor dela/deles, ela/ele também crescerá[child.GetSheHe]."
 child_personality.104.confirm_diligent: "De fato. O trabalho árduo lhe dará o que desejar."
 child_personality.104.confirm_patient: "Sim, as oportunidades sempre chegam a seu tempo."
 child_personality.104.generous_change: "[child.GetFirstName] nunca deve esquecer o papel que os outros desempenham em sua grandeza."
 child_personality.104.diligent_change: "É preciso ensinar-lhe que o trabalho árduo sempre traz resultados."
 child_personality.104.patient_change: "Tudo precisa de tempo, querid[child.Custom('ES_OA')] [child.GetFirstNameNoTooltip]."
 child_personality.1051.t: "Pronto para a Ira"
 child_personality.1052.t: "Equilibrado"
 child_personality.1053.t: "Interesses Variáveis"
 child_personality.105.desc: "Estava observando [child.GetTitledFirstName|l] brincar com outras crianças quando [doing_push.GetTitledFirstName|l] tentou derrubá-lo."
 child_personality.105.wrathful: "Logo uma briga começou entre as crianças!"
 child_personality.105.forgiving: "\n[child.GetFirstName] se manteve sereno e sentou para conversar com [doing_push.GetFirstName]."
 child_personality.105.fickle: "O momento não durou muito, pois [child.GetFirstName] logo inventou um novo jogo completamente e esqueceu o jogo anterior por completo."
 child_personality.105.confirm_wrathful: "[child.GetFirstNameNoTooltip] respondeu à altura!"
 child_personality.105.confirm_forgiving: "[child.GetFirstNameNoTooltip] sabe virar a outra face quando necessário."
 child_personality.105.confirm_fickle: "Seguir em frente muitas vezes é a melhor abordagem."
 child_personality.105.wrathful_change: "[child.GetFirstName] não deve deixar que ninguém passe por cima dele!"
 child_personality.105.forgiving_change: "[child.GetFirstNameNoTooltip] deve ser ensinad a virar a outra face."
 child_personality.105.fickle_change: "[child.GetFirstNameNoTooltip] não deve se prender a assuntos como esse."
 child_personality.1061.t: "Ressentimento Duradouro"
 child_personality.1062.t: "Perda de Interesse"
 child_personality.1063.t: "Persistência"
 child_personality.106.desc: "[child.GetTitledFirstName] vinha escondendo seu amor secreto por [crush.GetTitledFirstName|l]. Quando finalmente confessou o que sentia, [crush.GetFirstName] respondeu de forma rude."
 child_personality.106.vengeful: "\n\nAgora [child.GetFirstName] resmunga sempre que [crush.GetSheHe] passa."
 child_personality.106.chaste: "\n\nParece que recela de qualquer tipo de afeto depois dessa rejeição."
 child_personality.106.stubborn: "\n\n[child.GetFirstName] continua obstinad[child.Custom('ES_OA')] em perseguir [crush.GetHerHim]."
 child_personality.106.confirm_vengeful: "Ah, vícios infantis."
 child_personality.106.confirm_chaste: "Não se deve se envolver em assuntos de luxúria de forma alguma."
 child_personality.106.confirm_stubborn: "Se falhar na primeira vez, tudo o que se pode fazer é tentar novamente."
 child_personality.106.vengeful_change: "![child.GetFirstNameNoTooltip] não deveria deixar que ninguém [child.Custom('ES_LoLa')] tratasse assim!"
 child_personality.106.chaste_change: "Talvez o amor não seja para [child.GetFirstNameNoTooltip]..."
 child_personality.106.stubborn_change: "[child.GetFirstNameNoTooltip] não deve desistir tão facilmente!"
 child_personality.1071.t: "Um Julgamento Severo"
 child_personality.1072.t: "Em Nome do Divino"
 child_personality.1073.t: "Moderação Inspirada"
 child_personality.107.desc: "Após a sentença de morte de um ladrãozinho, perguntei a [child.Custom2('MyCharacterIntroduction', ROOT.Char)] o que pensava."
 child_personality.107.just: "\n\n[child.GetFirstName] respondeu que a sentença era dura demais para um crime tão pequeno."
 child_personality.107.cynical: "\n\n[child.GetFirstName] expressou suas dúvidas: que deus poderia querer um reino governado por uma lei tão severa?"
 child_personality.107.temperate: "\n\n[child.GetFirstName] afirmou ter aprendido que não se deve abarcar mais do que se pode."
 child_personality.107.confirm_just: "A punição realmente não condizia com o crime."
 child_personality.107.confirm_cynical: "Não espere ver a justiça [child.GetFaith.HighGodNamePossessive]."
 child_personality.107.confirm_temperate: "Ultrapassar os limites pode ser terrivelmente perigoso."
 child_personality.107.just_change: "É preciso ensiná-lo a executar corretamente a lei."
 child_personality.107.cynical_change: "É hora de mostrar a ela o quanto [ROOT.Char.GetFaith.HighGodName]."
 child_personality.107.temperate_change: "Esta é uma lição sobre moderação em todas as coisas."
 child_personality.1081.t: "Um Olhar Atento"
 child_personality.1082.t: "Fazendo Amizades"
 child_personality.1083.t: "Uma Troca Inadequada"
 child_personality.108.desc: "[child.GetTitledFirstName] parecia ter desfrutado imensamente de nossa última festa!"
 child_personality.108.greedy: "\nDentre todas as coisas, não conseguia parar de falar sobre as roupas luxuosas e o ouro reluzente que viu lá."
 child_personality.108.gregarious: "\n se deu muito bem com todos com quem conversou, até mesmo com os convidados adultos."
 child_personality.108.lustful: "\nDepois, não conseguia parar de falar sobre o que sentiu ao cruzar o olhar com tal servent[child.Custom('ES_EAOpp')] jovem."
 child_personality.108.confirm_greedy: "Esses são os símbolos de poder pelos quais nosso mundo é governado."
 child_personality.108.confirm_gregarious: "Nunca é demais fazer amigos."
 child_personality.108.confirm_lustful: "Ah, então é[child.Custom('ES_EA')] um safado está virando gente grande, hein?"
 child_personality.108.greedy_change: "Note como o verdadeiro valor reside nos luxuosos símbolos de poder!"
 child_personality.108.gregarious_change: "Eu mostrarei a  como fazer amizades em uma festa!"
 child_personality.108.lustful_change: "Já vi como você olhava para ess[child.Custom('ES_EAOpp')] criad[child.Custom('ES_EAOpp')], [child.GetFirstNameNoTooltip]."
 child_personality.1091.t: "Participando Ativamente"
 child_personality.1092.t: "O Jovem Mediador"
 child_personality.1093.t: "Defensor da Fé"
 child_personality.109.desc: "Houve uma confusão entre as crianças hoje. [child_preacher.GetTitledFirstName|l] estava tentando pregar entre seus companheiros mais jovens e se tornou alvo de uma pequena briga."
 child_personality.109.desc_fallback: "Houve uma confusão entre as crianças hoje. Uma criança estava tentando pregar entre seus companheiros mais jovens e se tornou alvo de uma pequena briga."
 child_personality.109.brave: "\n\n[child.GetTitledFirstName] interveio e fez o que pôde para proteger[child_preacher.GetHerHim]."
 child_personality.109.brave_fallback: "\n\n[child.GetTitledFirstName] interveio e fez o que pôde para proteger o pequeno pregador."
 child_personality.109.calm: "\n\n[child.GetTitledFirstName] interveio e conseguiu parar a briga antes que alguém se machucasse."
 child_personality.109.zealous: "\n\nA [child.GetTitledFirstName|l] ficou furioso que alguém atacasse quem tentava falar em nome de [child.GetFaith.random_GoodGodNames], e expulsou as outras crianças."
 child_personality.109.confirm_brave: "Nunca recue diante de um desafio, [child.GetFirstNameNoTooltip]."
 child_personality.109.confirm_calm: "Manter a calma diante da pressão é extremamente importante."
 child_personality.109.confirm_zealous: "Você servirá bem ao divino, criança!"
 child_personality.109.brave_change: "Não tenha medo. Avance quando necessário."
 child_personality.109.calm_change: "Deixe-me lhe mostrar como você poderia ter mediado isso..."
 child_personality.109.zealous_change: "Nunca permita que alguém despreze o divino dessa maneira."
 child_personality.1101.t: "Com Certeza"
 child_personality.1102.t: "Com Alegria"
 child_personality.1103.t: "Com Suspeita"
 child_personality.110.desc: "Levei [child.GetFirstName] para brincar com o arco e, para minha surpresa, encontrou uma corça ferida."
 child_personality.110.ambitious: "\n\n[child.GetSheHe|U] não hesitou nem um pouco em derrubá-la."
 child_personality.110.sadistic: "\n\nQuando [child.GetFirstName] me mostrou o animal, as feridas indicavam uma morte lenta e torturante. [child.GetFirstNameNoTooltip] apenas sorriu."
 child_personality.110.paranoid: "\n\n[child.GetFirstName] explodiu contra mim. Pensou que eu tinha armado todo o encontro como uma espécie de teste para[child.Custom('ES_LoLa')] testar."
 child_personality.110.confirm_ambitious: "A grandeza te espera, [child.GetFirstNameNoTooltip]."
 child_personality.110.confirm_sadistic: "É apenas um animal."
 child_personality.110.confirm_paranoid: "Sim, foi definitivamente um teste. Muito bem, [child.GetFirstNameNoTooltip]."
 child_personality.110.ambitious_change: "Então me mostre que você poderia ter abatido um animal sozinh[child.Custom('ES_OA')]!"
 child_personality.110.sadistic_change: "Sempre alguém sofre. Certifique-se de que não seja você."
 child_personality.110.paranoid_change: "Isso foi um teste. Espero que você se saia melhor da próxima vez."
 child_personality.1111.t: "Bastante Satisfeito"
 child_personality.1112.t: "Mudando de Ideia"
 child_personality.1113.t: "Confiando em Mim"
 child_personality.111.desc: "[child.GetTitledFirstName] vem me pedindo isso há algum tempo, [child.Custom('child_object_of_interest_indefinite')] e eu disse que cumpriria o desejo dele em três meses se ele se concentrasse mais nos estudos."
 child_personality.111.content: "\n\nMe respondeu que estava contente[child.Custom('ES_OA')] com sua dedicação atual aos estudos, com recompensa ou sem ela."
 child_personality.111.fickle: "\n\n[child.GetSheHe|U] recusou simplesmente minha oferta; aparentemente já não se importa com isso."
 child_personality.111.trusting: "\n\nDesde que fiz a promessa, [child.GetFirstName] tem redobrado os esforços em seus estudos."
 child_personality.111.confirm_content: "Todos aprendemos a lidar com o que temos na vida."
 child_personality.111.confirm_fickle: "Mudar de ideia é sinal de uma mente saudável."
 child_personality.111.confirm_trusting: "Eu nunca enganaria você, [child.GetFirstNameNoTooltip]."
 child_personality.111.content_change: "Deve se concentrar no talento que já possui."
 child_personality.111.fickle_change: "Devo ensinar-lhe uma forma de pensar mais flexível."
 child_personality.111.trusting_change: "[child.GetFirstNameNoTooltip] precisa aprender a confiar em mim."
 child_personality.1121.t: "Escapando"
 child_personality.1122.t: "Solidão no Grande Salão"
 child_personality.1123.t: "Um pequeno gourmet"
 child_personality.112.desc: "[child.GetTitledFirstName] parece ter tido dificuldades em nosso último banquete."
 child_personality.112.impatient: "Saiu de fininho cedo e não se[child.Custom('ES_LoLa')] viu pelo resto da noite."
 child_personality.112.shy: "Entrou debaixo de uma das mesas e ali se escondeu das pessoas durante toda a refeição."
 child_personality.112.gluttonous: "Enterrou o rosto na comida e a única coisa que fez foi pedir uma porção após outra."
 child_personality.112.confirm_impatient: "Se você tem coisas melhores para fazer, faça essas coisas."
 child_personality.112.confirm_shy: "O importante é que os convidados saibam que você estava lá."
 child_personality.112.confirm_gluttonous: "Comida sempre traz alegria!"
 child_personality.112.impatient_change: "Se foi um incômodo, então você simplesmente deveria ter ido embora."
 child_personality.112.shy_change: "É um dever ser visto, quer você queira ou não!"
 child_personality.112.gluttonous_change: "Concentre-se na comida se a companhia te incomoda."
 child_personality.2001.t: "Perdido de Vista"
 child_personality.2001.desc: "Gosto de brincar com [child.GetTitledFirstName|l], avisar quando se comporta de um jeito estranho e implicar um pouco com [child.Custom('ES_ElElla')] de vez em quando."
 child_personality.2001.craven: "\n\nSe eu não a conhecesse melhor, diria que ela está se escondendo de mim."
 child_personality.2001.a: "O que deu nele,[child.Custom('ES_XA')] um covarde?"
 child_personality.2002.t: "Aprisionado"
 child_personality.2002.lazy: "\n\nAgora [child.GetFirstName] passa o dia todo trancado em seu quarto, sem fazer nada."
 child_personality.2002.a: "Não é divertido."
 child_personality.2003.t: "Exigência Irreversível"
 child_personality.2003.arbitrary: "\n\nAgora [child.GetSheHe] já se cansou e correu até os adultos para dizer que eu deveria ser enforcado por isso!"
 child_personality.2003.a: "Isso é severo!"
 child_personality.2004.t: "De Briga para Amizade"
 child_personality.2004.desc: "Achei que [child.GetTitledFirstName|l] ia brigar comigo quando eu o empurrei sem querer enquanto brincávamos, mas a raiva passou rápido.\n\nComeçamos a conversar e depois brincamos mais um pouco. Foi tão divertido que agora brincamos todos os dias!"
 child_personality.2004.a: "Fico feliz em ter por perto um[child.Custom('ES_XA')] amig[child.Custom('ES_XA')] como [child.GetFirstNameNoTooltip]."
 child_personality.2005.t: "Persistência"
 child_personality.2005.desc: "[child.GetTitledFirstName] me pediu tantas vezes que eu brincasse e saísse para passear com [child.GetSheHe] que precisei deixar claro que eu simplesmente não queria.\n\nA princípio, ficou desanimad[child.Custom('ES_OA')], mas logo ficou claro que não desistiria de tentar fazer com que eu gostasse dele."
 child_personality.2005.a: "Tem que parar com isso de uma vez!"
 child_personality.2005.b: "É fofo que não desista."
 child_personality.2005.c: "[child.GetFirstNameNoTooltip]? Quem é essa pessoa?"
 child_personality.2006.t: "M Salvador"
 child_personality.2006.opening: "Eu estava tentando ensinar às outras crianças o que eu sei sobre Deus quando começaram a zombar de mim e a erguer os punhos contra mim."
 child_personality.2006.bully: "Apesar de como me tratou no passado, somente [child.GetTitledFirstName|l] se atreveu a intervir e me defendeu."
 child_personality.2006.victim: "Apesar de como [child.GetHerHim] tratei no passado, só [child.GetTitledFirstName|l] teve coragem de intervir e me manteve em segurança."
 child_personality.2006.desc: "Só [child.GetTitledFirstName|l] se atreveu a intervir e me manteve seguro."
 child_personality.2006.a: "Nós temos sido próximos desde então."
 child_personality.2007.t: "Um Encontro"
 child_personality.2007.desc: "[child_preacher.GetTitledFirstName] falava com muitas das crianças sobre [child_preacher.GetFaith.HighGodName] e começou a me irritar.\n\nEu só o empurrei um pouco quando, do nada, [child.GetTitledFirstName|l] começou a me bater violentamente, dizendo para eu deixar [child_preacher.GetHerHim] em paz."
 child_personality.2007.a: "Eu estava apenas me divertindo um pouco, idiota!"
 #Curious
 child_personality.3001.t: "O quê? Por quê? Como?"
 child_personality.3001.desc: "Há tanto para ver, cheirar e tocar! De onde você vem? Por que o céu é azul? O que há além daquela colina? Por favor, por favor, eu quero ir descobrir!"
 child_personality.3001.a: "Há tantas perguntas!"
 child_personality.3001.message: "Meu [ROOT.Char.Custom2('RelationToMe', personality_child)] [personality_child.GetTitledFirstName|l] está sempre cheio de perguntas!"
 child_personality.3002.desc: "Não há um momento de silêncio! Meu [ROOT.GetCharacter.Custom2('RelationToMe' , personality_child) ] [personality_child.GetTitledFirstName|l] vive fazendo mil perguntas! Faço o possível para incentivar sua curiosidade, mas às vezes fico exausto com o fluxo constante de pensamentos e questionamentos."
 child_personality.3002.a: "Quando um pai e uma mãe se amam muito..."
 #Rowdy
 child_personality.3003.t: "A chama se acende"
 child_personality.3003.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('guardian'))] [guardian.GetFirstName] sempre me ordena que eu fique parado e em silêncio, mesmo que eu diga que é impossível! É como se meus braços e pernas se movessem sozinhos e, se eu não os seguir, eles vão cair e fugir sem mim!"
 child_personality.3003.a: "Eu faço o que quero!"
 child_personality.3003.message: "Meu [ROOT.Char.Custom2('RelationToMe',personality_child)] [personality_child.GetTitledFirstName|l] está sempre aprontando algo!"
 child_personality.3004.t: "Uma Criadora de Problemas"
 child_personality.3004.desc: "Embora eu já esperasse certas traquinagens do meu [ROOT.GetCharacter.Custom2('RelationToMe' , personality_child) ] [personality_child.GetTitledFirstName|l], sua criatividade me mantém sempre alerta. Quando não é uma brincadeira, é uma briga, um tutor contrariado ou joelhos ralados por uma aventura que deu errado."
 child_personality.3004.a: "Nunca há tédio!"
 #Bossy
 child_personality.3005.t: "Um Governante em Ascensão"
 child_personality.3005.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('guardian'))] [guardian.GetFirstName] continua me pedindo para deixar que as outras crianças escolham às vezes do que brincar, mas por que eu deveria, se sempre sei qual é o melhor? Estou tão cansado de [guardian.Custom('ES_ElElla')] e de todos os outros adultos me dizendo o que fazer!"
 child_personality.3005.a: "Eles não são meus chefes!"
 child_personality.3005.message: "Meu [ROOT.Char.Custom2('RelationToMe',personality_child)] [personality_child.GetTitledFirstName|l] sempre sabe exatamente o que quer!"
 child_personality.3006.desc: "Não há limite para as opiniões e vontades do meu [ROOT.GetCharacter.Custom2('RelationToMe' , personality_child) ], [personality_child.GetTitledFirstName|l]. Metade das vezes, [personality_child.Custom('ES_ElElla')] tenta me dizer o que fazer, e não o contrário!"
 child_personality.3006.a: "Formidável ou irritante - é uma linha tênue a percorrer."
 #Charming
 child_personality.3007.t: "Trabalhe de Forma Inteligente, Não Difícil"
 child_personality.3007.desc: ""Seja gentil e trabalhe duro", meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('guardian'))] [guardian.GetFirstName] vive me dizendo. Eu faço o meu melhor, mas às vezes é simplesmente exaustivo! Não seria mais inteligente trapacear e mentir um pouco para conseguir o que eu quero?"
 child_personality.3007.a: "E todo mundo é tão fácil de enganar!"
 child_personality.3007.message: "Meu [ROOT.Char.Custom2('RelationToMe',personality_child)] [personality_child.GetTitledFirstName|l] é trapaceir[personality_child.Custom('ES_OA')] e astut[personality_child.Custom('ES_OA')]!"
 child_personality.3008.t: "Sorrisos Doces e Pequenas Mentiras"
 child_personality.3008.desc: "Como outras crianças da sua idade, meu [ROOT.GetCharacter.Custom2('RelationToMe' , personality_child)]. [personality_child.GetTitledFirstName|l], às vezes mente e testa os limites. No entanto, muitas vezes evita suspeitas com seu jeito doce, e as pessoas sempre o perdoam quando [personality_child.Custom('ES_LoLa')] o pegam.\n\nFico me perguntando de quantas confusões ele consegue escapar…"
 child_personality.3008.a: "Vou ficar de olho ness aqui."
 #Pensive
 child_personality.3009.t: "Perdid em Pensamentos"
 child_personality.3009.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('guardian'))] [guardian.GetFirstName] me diz que eu deveria brincar com as outras crianças. Mas elas são tão barulhentas! Tem que haver silêncio para que eu possa ouvir meus pensamentos!"
 child_personality.3009.a: "Há tanto para pensar..."
 child_personality.3009.message: "Meu [ROOT.Char.Custom2('RelationToMe',personality_child)] [personality_child.GetTitledFirstName|l] costuma ficar perdido em pensamentos!"
 child_personality.3010.t: "Perdid em Pensamentos"
 child_personality.3010.desc: "Meu [ROOT.GetCharacter.Custom2('RelationToMe' , personality_child)] [personality_child.GetTitledFirstName|l] é uma[personality_child.Custom('ES_XA')] crianç[personality_child.Custom('ES_OA')] extraordinariamente calma[personality_child.Custom('ES_OA')]. Quando os outros brincam de forma selvagem, [personality_child.GetFirstNameNoTooltip] costuma se retirar para um canto silencioso. [personality_child.GetSheHe|U] não fala muito, mas sempre está pensando em alguma coisa."
 child_personality.3010.a: "Fico me perguntando no que ela/ele está pensando?"
