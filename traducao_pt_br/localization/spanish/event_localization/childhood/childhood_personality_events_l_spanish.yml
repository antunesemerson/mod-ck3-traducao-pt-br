 child_personality.4011.t: "Atração Iniciante"
 child_personality.4011.desc_opening: "Aconchegad[ROOT.Char.Custom('ES_OA')] na cama sob a pele de [ROOT.Char.Custom('GetAnimalType')], adormeço[ROOT.Char.Custom('ES_OA')] em uma cálida placidez.\n\n"
 child_personality.4011.desc_1: "Diante de mim há um exemplar magnífico de [ROOT.Char.Custom('GetAnimalType')] que me instiga a segui-lo até [ROOT.Char.Custom('TerrainType')]. Ao chegarmos a uma clareira, meu coração começa a palpitar. Sinto um formigamento no corpo e minha alma começa a #EMP ansiar#!. Quando me viro, o animal já desapareceu e, em seu lugar, vejo uma bela..."
 child_personality.4011.desc_2: "Diante de mim está uma pessoa envolta em névoa, fazendo um gesto de convite. Ao me juntar a ela, ao tocá-la, a névoa começa a se dissipar e, em seu lugar, um rubor quente se espalha pela nossa pele. Eu me inclino para beijá-la. Quando me afasto, sou recebido por um sorriso caloroso de uma pessoa bonita..."
 child_personality.4011.desc_3: "Eu acordo de sobressalto no meio da noite, com o peito arfante e a pele formigando. Nunca me senti assim antes… estou doente[ROOT.Char.Custom('ES_OA')]? Com o que sonhei? Tudo o que consigo lembrar é…"
 child_personality.4011.a: "… um menino."
 child_personality.4011.b: "… uma garota."
 child_personality.4011.c: "… uma menina. Ou será que era um menino? Não consigo lembrar claramente."
 child_personality.4011.d: "… uma pessoa. Sinceramente, estou apenas feliz por ter sido apenas um sonho."
 child_personality.4012.desc: "Me disseram que é natural sentir atração por certas pessoas - que com o tempo eu vou querer conhecê-las intimamente.\n\nTenho tentado entender o que isso significa, mas o único progresso que fiz foi perceber que é divertido explorar esse mistério quando há outr [ROOT.Char.Custom('GirlBoyPlural')] por perto."
 child_personality.4012.a: "As [ROOT.Char.Custom('ES_OA')]s [ROOT.Char.Custom('GirlBoyPlural')|U] são [ROOT.Char.Custom('ES_LoLa')]s realmente os melhores!"
 child_personality.4013.desc: "Enquanto brinco com outras crianças, descobri que não me importo se sou pareado com uma menina ou um menino em nossos jogos mais íntimos. Muitas das outras crianças parecem ter preferências e algumas até fazem um grande alvoroço, mas eu não entendo por quê."
 child_personality.4013.a: "Tanto meninas quanto meninos são tão interessantes!"
 child_personality.4014.desc: "Todo mundo parece ansioso para arrumar alguém… Não fazem mais do que sorrir e brincar de se beijar e se tocar com outras crianças. Se eu não demonstrar interesse, parecem confusos. [ROOT.Char.Custom('ES_LoLaOpp')]s [dummy_opposite_gender.Custom('GirlBoyPlural')] me dizem que deveriam me agradar mais."
 child_personality.4014.a: "Sinceramente, eu não entendo..."
 child_personality.4015.desc: "Quando vejo um[ROOT.Char.Custom('ES_XAOpp')] [ROOT.Char.Custom('OppositeGenderedLowlyServantType')] jovem passando ao meu lado, com o suor do trabalho mas com um rubor em suas bochechas, fico fascinad[ROOT.Char.Custom('ES_OA')]. Que sensação é esta, este anseio?"
 child_personality.4015.a: "[dummy_opposite_gender.Custom('GirlBoyPlural')] são tão fascinantes!"
 child_personality.4015.b: "Sei que ele/ela é apenas um[crush.Custom('ES_XA')] plebeu[crush.Custom('ES_OA')] mas... ai, meu coração!"
 #Reincarnation, by Mathilda Bjarnehed
 child_personality.9900.t: "A Viva Imagem"
 child_personality.9900.start.desc: "As pessoas ficam me dizendo que sou a cara de minha [ROOT.Char.Custom2('RelationToMe', ancestor)][ancestor.GetTitledFirstName|l] . Nunca [ancestor.GetHerHim] conheci, mas eles sorriem quando dizem isso, então deve ser uma coisa boa.\n\n"
 child_personality.9900.start.sinful.desc: "A pessoa toda me diz que sou a cara do meu [ROOT.Char.Custom2('RelationToMe', ancestor)] , [ancestor.GetTitledFirstName|l]. Nunca [ancestor.GetHerHim] conheci, mas parece que ele/ela era aparentemente um(a) pessoa maligna.\n\n"
 child_personality.9900.mother.desc: "Minha mãe diz que eu sou"
 child_personality.9900.father.desc: "Meu pai diz que eu sou"
 child_personality.9900.nurse.desc: "Minha ama diz que eu sou"
 child_personality.9900.temperate.desc: "moderado e sempre no controle de mim mesm,"
 child_personality.9900.greedy.desc: "sempre em busca de novas oportunidades,"
 child_personality.9900.generous.desc: "desprendid,"
 child_personality.9900.diligent.desc: "sou um[ROOT.Char.Custom('ES_XA')] estudante atento[ROOT.Char.Custom('ES_XA')] e entusiasta,"
 child_personality.9900.calm.desc: "sou pacífic[ROOT.Char.Custom('ES_OA')] e sensat[ROOT.Char.Custom('ES_OA')],"
 child_personality.9900.arrogant.desc: "um[child.Custom('ES_XA')] [child.Custom('GirlBoy')] orgulhos[child.Custom('ES_OA')] e nobre,"
 child_personality.9900.humble.desc: "uma alma humilde,"
 child_personality.9900.deceitful.desc: "um[child.Custom('ES_XA')] [child.Custom('GirlBoy')] astut[child.Custom('ES_OA')],"
 child_personality.9900.honest.desc: "sempre falando a verdade,"
 child_personality.9900.brave.desc: "sem medo de nada,"
 child_personality.9900.gregarious.desc: "muito bo em fazer novos amigos,"
 child_personality.9900.ambitious.desc: "estou destinad[ROOT.Char.Custom('ES_OA')] à grandeza,"
 child_personality.9900.just.desc: "just[ROOT.Char.Custom('ES_OA')] e imparcial,"
 child_personality.9900.zealous.desc: "um fiel praticante de [child.GetFaith.GetNameNoTooltip|l] ,"
 child_personality.9900.compassionate.desc: "uma alma bondosa e gentil,"
 child_personality.9900.stubborn.desc: "não desiste facilmente,"
 child_personality.9900.forgiving.desc: "nunca guarda rancor,"
 child_personality.9900.sinful.temperate.desc: "desinteressad em desfrutar dos prazeres da vida,"
 child_personality.9900.sinful.greedy.desc: "egoísta e relutante em compartilhar,"
 child_personality.9900.sinful.generous.desc: "frequentemente desperdiçando dinheiro,"
 child_personality.9900.sinful.diligent.desc: "irritantemente hiperativ,"
 child_personality.9900.sinful.calm.desc: "estranhamente desapaixonad,"
 child_personality.9900.sinful.arrogant.desc: "o orgulho e a soberba me dominam,"
 child_personality.9900.sinful.humble.desc: "completamente carente de autoconfiança,"
 child_personality.9900.sinful.deceitful.desc: "minto sorrateiramente,"
 child_personality.9900.sinful.honest.desc: "desagradavelmente honest,"
 child_personality.9900.sinful.brave.desc: "chei de bravata,"
 child_personality.9900.sinful.gregarious.desc: "muito amigável demais,"
 child_personality.9900.sinful.ambitious.desc: "sempre exigindo novos brinquedos para brincar,"
 child_personality.9900.sinful.just.desc: "sou um advenedizo[ROOT.Char.Custom('ES_OA')] com ares de superioridade,"
 child_personality.9900.sinful.zealous.desc: "um praticante descerebrado de [child.GetFaith.GetNameNoTooltip|l] ,"
 child_personality.9900.sinful.compassionate.desc: "ceg pela empatia,"
 child_personality.9900.sinful.stubborn.desc: "teimoso(a) de forma inabalável,[ROOT.Char.Custom('ES_OA')]"
 child_personality.9900.sinful.forgiving.desc: "demasiado dispost[ROOT.Char.Custom('ES_OA')] a perdoar uma ofensa,"
 child_personality.9900.lunatic.desc: "chei de ideias 'inusitadas',"
 child_personality.9900.dull.desc: "um[child.Custom('ES_XA')] [child.Custom('GirlBoy')] "prudente","
 child_personality.9900.shrewd.desc: "uma[child.Custom('ES_XA')] [child.Custom('GirlBoy')] inteligente,"
 child_personality.9900.strong.desc: "muito forte,"
 child_personality.9900.end.desc: "como meu [child.Custom2('RelationToMe', ancestor)] [ancestor.GetFirstNameNoTooltip]!"
 child_personality.9900.sinful.postscript.desc: "Quanto mais as pessoas falam sobre isso, pior sou tratad. Já até me culparam por coisas que não fiz!"
 child_personality.9900.a.dull: "Eu passo muito tempo pensando..."
 child_personality.9900.a: "Farei [ancestor.Custom('ES_ElElla')] orgulhos[ancestor.Custom('ES_OA')]!"
 child_personality.9900.a.sinful: "Isso não é justo! Por que devo ser julgado pelas ações dele/ dela?"
 child_personality.9901.t: "Renascid"
 child_personality.9901.start.desc: "[child.Custom2('MyCharacterIntroduction', ROOT.Char)|U] é a cara da sua [child.Custom2('RelationToMe', ancestor)][ancestor.GetTitledFirstName|l]! Mas a semelhança não é apenas física… vai muito mais fundo.\n\n[child.GetFirstNameNoTooltip] é"
 child_personality.9901.dull.desc: "um pouco lent[child.Custom('ES_OA')], por assim dizer,"
 child_personality.9901.end.desc: "assim como [child.Custom2('RelationToMe', ancestor)] de antes. Será que [ancestor.GetTitledFirstNameNoTooltip|l] voltou a este mundo?"
 child_personality.9901.a: "O universo está repleto de mistérios sagrados."
