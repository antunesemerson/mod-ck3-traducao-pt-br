l_spanish:
 childhood_education.0004.t: "A Volubilidade da Juventude"
 childhood_education.0004.opening: "Meu pupilo[ward.Custom('ES_OA')], [ward.GetTitledFirstName|l], mudou seu foco de estudo.\n\n"
 childhood_education.0004.desc1: "E pensar que agora aspira a se aprofundar na arte de [ward.Custom('education_focus_child')], um campo de estudo no qual eu me destaco… isso me comove!"
 childhood_education.0004.desc2: "Pensar que [ward.GetSheHe] abandonaria nosso interesse comum pela arte de [ROOT.Char.Custom('education_focus')]!"
 childhood_education.0004.desc_fallback: "[ward.GetSheHe|U] agora busca conhecimento na arte de [ward.Custom('education_focus_child')]."
 childhood_education.0004.a: "[ward.GetTitledFirstNameNoTooltip|l] está estudando [ward.Custom('education_focus_child')]!"
 childhood_education.1011.t: "É Quem Eu Sou"
 childhood_education.1011.desc: "[guardian.GetTitledFirstName] me ensinou muito sobre os costumes do seu povo— do #EMP nosso#! povo, pois não apenas professo a fé [guardian.GetFaith.GetAdjective], mas me considero totalmente [guardian.GetCulture.GetName]."
 childhood_education.1011.a: "É a única forma como desejo viver."
 childhood_education.1012.t: "Um Dia Abençoado"
 childhood_education.1012.desc: "Com sua educação atual em andamento na fé e nas tradições do meu povo, [ward.GetTitledFirstName|l] me disse que se sente como um[ward.Custom('ES_XA')] bom[ward.Custom('ES_XA')], de cultura [guardian.GetCulture.GetName] e parte do mundo [guardian.GetFaith.GetAdherentName]."
 childhood_education.1012.a: "Finalmente, [ward.GetSheHe] vê a luz!"
 child_culture_and_faith_converted.parent.title: "[ward.Custom('GetDaughterSon')|U] influenciad[ward.Custom('ES_OA')] pelo guardião"
 child_culture_and_faith_converted.parent.message: "As crenças e a cultura de seu [ward.Custom('GetDaughterSon')] [ward.GetTitledFirstName|l] mudaram sob a tutela de [guardian.GetTitledFirstName|l]"
 childhood_education.1021.t: "Na Fé, a Verdade"
 childhood_education.1021.desc: "A tutela de [guardian.GetTitledFirstName|l] me ensinou muito e acho que entendo a verdadeira natureza do mundo.\n\nComo pude duvidar de que [guardian.GetFaith.GetName] tinha todas as respostas?"
 childhood_education.1021.a: "Encontrei minha verdadeira fé."
 childhood_education.1022.t: "Na Fé, a Verdade"
 childhood_education.1022.desc: "Depois de todas as minhas lições e de toda a sabedoria que compartilhei, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('ward'))], [ward.GetTitledFirstName|l], finalmente abraçou a verdadeira fé.\n\nSempre soube que um dia seria um[ward.Custom('ES_XA')] bom[ward.Custom('ES_XA')] seguidor[ward.Custom('ES_XA')] da doutrina [ROOT.Char.GetFaith.GetAdherentName]."
 childhood_education.1022.a: "[ROOT.Char.GetFaith.KnowledgeGodName] guiou minha mão."
 child_faith_converted.parent.message: "As crenças do seu [ward.Custom('GetDaughterSon')], [ward.GetTitledFirstName|l], mudaram sob a tutela de [guardian.GetTitledFirstName|l]"
 childhood_education.1031.t: "Natureza e Criação"
 childhood_education.1031.desc: "Pode ser que eu tenha nascido sendo [ward.GetCulture.GetName], mas não posso negar que já nem sei o que isso significa. Após a tutela de [guardian.GetTitledFirstName|l], me sinto uma pessoa [guardian.GetCulture.GetName] da cabeça aos pés."
 childhood_education.1031.a: "É quem eu sou."
 childhood_education.1032.t: "Natureza e Criação"
 childhood_education.1032.desc: "Após minha longa tutela [ward.Custom('ES_DelDela')] jovem [ward.GetTitledFirstName|l], fiquei imensamente feliz quando [ward.GetSheHe] me disse que se considera uma pessoa [guardian.GetCulture.GetName]!"
 childhood_education.1032.a: "E, de fato, é!"
 child_culture_converted.parent.message: "A cultura do seu [ward.Custom('GetDaughterSon')], [ward.GetTitledFirstName|l], mudou sob a tutela de [guardian.GetTitledFirstName|l]"
 childhood_education.9004.child_message: "[GetPerk( 'pedagogy_perk' ).GetName( GetPlayer )] de [guardian.GetTitledFirstNameNoTooltip|l]"
 childhood_education.9004.guardian_message: "[GetPerk( 'pedagogy_perk' ).GetName( GetPlayer )]"
 childhood_education.9010.child_message: "[GetPerk( 'just_one_more_hill_perk' ).GetName( GetPlayer )] [parent.Custom('ES_DelDela')] [parent.GetTitledFirstNameNoTooltip|l]"
 childhood_education.9010.parent_message: "[GetPerk( 'just_one_more_hill_perk' ).GetName( GetPlayer )]"
