l_spanish:
 coming_of_age.0001.t: "Passagem para a Vida Adulta"
 coming_of_age.0001.educator_university: "Com a ajuda de [educator.GetTitledFirstName|l] e da Universidade"
 coming_of_age.0001.educator_confucian_education: "Com a ajuda dos ensinamentos confucianos de [educator.Custom('ES_DelDela')] [educator.GetTitledFirstName|l]"
 coming_of_age.0001.educator: "Com a ajuda de [educator.GetTitledFirstName|l]"
 coming_of_age.0001.desc1: "Concluí minha educação nas artes de [ROOT.Char.Custom('education_focus_child')]."
 coming_of_age.0001.desc1_good_trait: "Apesar das altas expectativas de todos, não alcancei muito e meus resultados deixaram muito a desejar."
 coming_of_age.0001.desc1_bad_trait: "Mesmo que os resultados que alcancei tenham deixado muito a desejar, isso não surpreendeu ninguém. Pelo menos o trabalho árduo finalmente acabou!"
 coming_of_age.0001.desc1_fallback_trait: "Mesmo que eu não tenha alcançado muito, é um alívio finalmente ver alguns resultados."
 coming_of_age.0001.desc2: "Finalmente concluí meus estudos na arte de [ROOT.Char.Custom('education_focus_child')]!"
 coming_of_age.0001.desc2_good_trait: "Estou decepcionad[ROOT.Char.Custom('ES_OA')] com os meus resultados, porque realmente acho que poderia ter me saído melhor."
 coming_of_age.0001.desc2_bad_trait: "Eu me saí razoavelmente bem, pelo menos considerando o fato de que o assunto não me é natural."
 coming_of_age.0001.desc2_fallback_trait: "Minhas conquistas não foram grandes, mas também poderia ter sido pior."
 coming_of_age.0001.desc3: "Completei meus estudos de [ROOT.Char.Custom('education_focus_child')]!"
 coming_of_age.0001.desc3_good_trait: "Mesmo que eu não compreenda completamente os aspectos mais avançados do assunto, correspondo às expectativas de todos e aprendi mais do que a maioria!"
 coming_of_age.0001.desc3_bad_trait: "Mesmo que eu não compreenda completamente os aspectos mais avançados do assunto, desafiei as baixas expectativas de todos e aprendi mais do que a maioria!"
 coming_of_age.0001.desc3_fallback_trait: "Mesmo que eu não compreenda completamente os aspectos mais avançados do assunto, me saí muito bem."
 coming_of_age.0001.desc4: "Alcancei um entendimento de [ROOT.Char.Custom('education_focus_child')] que supera em muito o de qualquer um dos meus colegas."
 coming_of_age.0001.desc4_good_trait: "Mesmo tendo uma inclinação natural para o assunto, minha maestria nele ainda é uma conquista!"
 coming_of_age.0001.desc4_bad_trait: "Desafiei as expectativas de todos e alcancei o que foi considerado impossível para mim; a maestria de [ROOT.Char.Custom('education_focus_child')]!"
 coming_of_age.0001.desc4_fallback_trait: "Chegar tão longe no assunto tem sido verdadeiramente gratificante."
 coming_of_age.0001.patronaged_spouse_plus_1.desc: "[patronage_spouse_tutor.GetTitledFirstName] supervisionou minha educação e contribuiu muito para meu conhecimento em [ROOT.Char.Custom('education_focus_child')]."
 coming_of_age.0001.patronaged_spouse_plus_2_or_more.desc: "[patronage_spouse_tutor.GetTitledFirstName] supervisionou minha educação e me ajudou a alcançar um nível de conhecimento que eu nem mesmo sonhava em possuir."
 coming_of_age.0001.relationships: "\n\nAgora que dou os primeiros passos na vida adulta, lembro-me das pessoas que influenciaram [ROOT.Char.GetWomanMan] que sou hoje…"
 coming_of_age.0001.friend: "\nA amizade que tive com [friend.GetFirstName] significou muito para mim quando éramos jovens, e ainda ter[friend.GetHerHim] ao meu lado significa muito."
 coming_of_age.0001.crush: "\nTive momentos memoráveis com [crush.GetFirstName], e me ajudou de verdade a entender melhor a mim mesmo e o amor[ROOT.Char.Custom('ES_OA')]."
 coming_of_age.0001.bully1: "\nTudo por que me fez passar [bully.GetTitledFirstName|l] quando era crianç[ROOT.Char.Custom('ES_OA')] ainda pesa sobre mim, e toda vez que [bully.GetHerHim] vejo, meu humor certamente azeda."
 coming_of_age.0001.bully2: "\nTudo pelo que me fez passar [bully.GetTitledFirstName|l] quando eu era pequen[ROOT.Char.Custom('ES_OA')] ainda pesa sobre mim. Às vezes ainda consigo ouvir sua risada enquanto ele esmagava meu [ROOT.Char.Custom('child_favorite_toy')]."
 coming_of_age.0001.victim1: "\nMe pergunto se [victim.GetTitledFirstName|l] lembra do que fiz passar por ele/ela quando éramos jovens…"
 coming_of_age.0001.victim2: "\nAinda consigo lembrar do rosto horrorizado d [victim.GetTitledFirstName|l] naquela vez em que destruí seu [victim.Custom('child_favorite_toy')]."
 coming_of_age.0001.relationships_end: "\n\nMas agora que sou adulto[ROOT.Char.Custom('ES_OA')] , preciso deixar para trás esses caprichos infantis e me concentrar nas coisas que ainda estão por vir."
 coming_of_age.0001.no_relationships: "\n\nPensando na minha infância, percebo que nunca cheguei a me conectar de verdade com ninguém… Mesmo vendo outros brincando com amigos ou suspirando de amor, nunca vivi essas coisas pessoalmente.\n\nTenho cer[ROOT.Char.Custom('ES_OA')] de que os anos que vêm me trarão novos amigos e oportunidades!"
 coming_of_age.0001.a: "[ROOT.Char.GetTitledFirstNameNoTooltip|l], você agora é um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan]!"
 coming_of_age.0001.tt.1: "Você ainda tem muito a aprender no campo de [THIS.Char.Custom('education_focus_child')]!\n"
 coming_of_age.0001.tt.2: "Você ainda tem algumas coisas para aprender no campo de [THIS.Char.Custom('education_focus_child')]\n"
 coming_of_age.0001.tt.3: "Você se saiu bem no campo de [THIS.Char.Custom('education_focus_child')]!\n"
 coming_of_age.0001.tt.4: "Você se saiu muito bem no campo de [THIS.Char.Custom('education_focus_child')]!\n"
 coming_of_age.0001.tt.5: "Você não vai esquecer sua afeição por [crush.GetFirstNameNoTooltip]: #P +20 opinião#!"
 coming_of_age.0001.tt.7: "Você não vai esquecer facilmente [victim.GetTitledFirstNameNoTooltip|l]; #N opinión -5#!"
 coming_of_age.0001.tt.9: "Você não vai esquecer facilmente [bully.GetTitledFirstNameNoTooltip|l] : #N opinión -10#!"
 coming_of_age.1001.t: "[educated_child.GetFirstNameNoTooltip] Torna-se Adult"
 coming_of_age.1001.desc_university: "Com sua maioridade, o tempo que [educated_child.GetFirstName] passou na universidade está chegando ao fim.\n\n[educated_child.Custom('GoodOrBadChildhoodTraitMatch')] [educated_child.Custom('DescribingEducationOutcome')]"
 coming_of_age.0001.desc_confucian_education: "Ao atingir a maioridade, [educated_child.GetFirstName] está preparad[educated_child.Custom('ES_OA')] para disseminar os ensinamentos confucionistas.\n\n[educated_child.Custom('GoodOrBadChildhoodTraitMatch')] [educated_child.Custom('DescribingEducationOutcome')]"
 coming_of_age.1001.desc: "Ao atingir a maioridade, terminam as aulas que eu dava a [educated_child.GetFirstName].\n\n[educated_child.Custom('GoodOrBadChildhoodTraitMatch')] [educated_child.Custom('DescribingEducationOutcome')]"
 coming_of_age.1001.patronaged_spouse_plus_1.desc: "\n\nNão se podem deixar de mencionar as contribuições de [patronage_spouse_tutor.GetTitledFirstName|l] para a educação de [educated_child.GetFirstName]. Sua orientação ajudou a que [educated_child.Custom('ES_ElElla')] chegasse mais longe do que eu teria conseguido so[ROOT.Char.Custom('ES_OA')]."
 coming_of_age.1001.patronaged_spouse_plus_2_or_more.desc: "\n\n[patronage_spouse_tutor.GetTitledFirstName] também deu ao(a) jovem uma orientação inestimável. [educated_child.GetFirstName] jamais teria chegado tão longe sem [patronage_spouse_tutor.GetSheHe]."
 coming_of_age.1001.a: "Eles crescem rápido."
 coming_of_age.1002.t: "[educated_child.GetFirstNameNoTooltip] Torna-se Adult"
 coming_of_age.1002.desc: "Sinto-me orgulhos[ROOT.Char.Custom('ES_OA')] de ver que meu [educated_child.Custom('GetDaughterSon')] já não é mais um[educated_child.Custom('ES_XA')] crianç[educated_child.Custom('ES_OA')], mas sim um adult[educated_child.Custom('ES_OA')].\n\n[educated_child.Custom('GoodOrBadChildhoodTraitMatch')] [educated_child.Custom('DescribingEducationOutcome')]"
 coming_of_age.1002.patronaged_spouse_plus_1.desc: "\n\nNão se podem deixar de mencionar as contribuições de [patronage_spouse_tutor.GetTitledFirstName|l] para a educação de [educated_child.GetFirstName]. Suas lições deram a [educated_child.GetFirstName] um conhecimento valioso para sua vida futura."
 coming_of_age.1002.patronaged_spouse_plus_2_or_more.desc: "\n\n[patronage_spouse_tutor.GetTitledFirstName] deu uma orientação inestimável. [educated_child.GetFirstName] nunca teria chegado tão longe sem [patronage_spouse_tutor.GetSheHe]."
 coming_of_age.1003.t: "Educação Concluída"
 coming_of_age.1003.standard: "Meu pupilo[educated_child.Custom('ES_OA')], [educated_child.GetTitledFirstName|l]atingiu a maioridade, e é hora de que deixe meus cuidados.\n\n[educated_child.Custom('GoodOrBadChildhoodTraitMatch')] [educated_child.Custom('DescribingEducationOutcome')]"
 coming_of_age.1003.rank_1: "\n\nTenho certeza de que os pais ficarão felizes que a educação dele/dela esteja concluída."
 coming_of_age.1003.rank_2: "\n\nEmbora os resultados não tenham sido excelentes, tenho certeza de que seus pais não terão reclamações."
 coming_of_age.1003.rank_3: "\n\nTenho certeza de que os pais ficarão satisfeitos com minha tutela."
 coming_of_age.1003.rank_4: "\n\nCertamente os pais dele(a) ficarão orgulhosos de chamá-lo(a) de seu [educated_child.Custom('GetDaughterSon')]!"
 coming_of_age.1003.a: "Até nos encontrarmos novamente, [educated_child.GetFirstNameNoTooltip]."
 coming_of_age.0003.desc_child_start: "Meu treinamento $knight_culture_player_adjective_no_tooltip_lowercase$ ao seu lado tem sido"
 coming_of_age.0003.desc_child_1: "ido mal, e aprendi pouco com meus instrutores de combate."
 coming_of_age.0003.desc_child_2: "procedido de forma aceitável, e lutei contra alguns camponeses atrevidos com certo sucesso."
 coming_of_age.0003.desc_child_3: "sido bem-sucedido, e matei inúmeros bandidos apesar da minha juventude."
 coming_of_age.0003.desc_child_4: "excelente, e isso me tornou um[ROOT.Char.Custom('ES_XA')] de [ROOT.Char.Custom('ES_LoLa')] principais $knight_culture_player_plural_no_tooltip_lowercase$ do reino."
 coming_of_age.1004.t: "Educação Concluída"
 coming_of_age.1004.desc: "Meu pupilo[educated_child.Custom('ES_OA')]; [educated_child.GetTitledFirstName|l], atingiu a maioridade e é hora de que deixe meus cuidados.\n\n[educated_child.Custom('GoodOrBadChildhoodTraitMatch')] [educated_child.Custom('DescribingEducationOutcome')]"
 coming_of_age.1004.a: "Até nos vermos de novo, [educated_child.GetFirstNameNoTooltip]."
 coming_of_age.1005.t: "Educação Concluída"
 coming_of_age.1005.desc: "Meu pupilo[educated_child.Custom('ES_OA')], [educated_child.GetTitledFirstName|l]atingiu a maioridade e é hora de que deixe meus cuidados.\n\n[educated_child.Custom('GoodOrBadChildhoodTraitMatch')] [educated_child.Custom('DescribingEducationOutcome')]"
 coming_of_age.1005.a: "Até nos encontrarmos novamente, [educated_child.GetFirstNameNoTooltip]."
 coming_of_age.3011.t: "Em Muito Mais do que Nome"
 coming_of_age.3011.desc: "Desde que [junior_emp.MakeScope.Var('co_emp_appointer').Char.Custom2('MyCharacterIntroduction', junior_emp)] me concedeu o título de [senior_emp.GetDiarchTitle|l], soube que este dia chegaria.\n\nAgora sou [Select_CString(junior_emp.IsFemale, 'toda una', 'todo un' )] [junior_emp.GetWomanMan], o que significa que o poder que detenho já não é apenas nominal. Quando falo, [senior_emp.GetPrimaryTitle.GetDefinitiveName] escuta, e quando ordeno, obedece.\n\nÉ meu primeiro passo de verdade no caminho até o trono."
 coming_of_age.3011.a: "Este é meu destino!"
 coming_of_age.3011.b: "Uma #EMP vida inteira#! pela frente..."
 coming_of_age.3011.c: "Espero estar pront[junior_emp.Custom('ES_OA')] para isso."
 coming_of_age.3011.tt.fake_diarchy_transition: "O [power_sharing|lE] de [Select_CString(senior_emp.IsLocalPlayer,'você', senior_emp.GetShortUIName)] foi transformado em um [duumvirate|lE]"
 coming_of_age.3011.tt.various_new_powers: "[Select_CString( junior_emp.IsLocalPlayer, 'Accediste', 'Accedió' )] a muitos [diarch_powers|lE] novos"
 coming_of_age.3011.tt.convert_sop_swing: "[Select_CString( junior_emp.IsLocalPlayer, 'Conservaste', 'Conservó' )] um ['50%'|P] do balanço da [scales_of_power|lE] que [Select_CString( junior_emp.IsLocalPlayer, 'ganaste', 'ganó' )] durante a infância"
 coming_of_age.3011.tt.not_enough_sop_swing_to_buffs: "Não [Select_CString( junior_emp.IsLocalPlayer, 'tuviste', 'tuvo' )] bastante impulso da [scales_of_power|lE] para ganhar pontos de [skill|lE] extras"
 coming_of_age.3012.t: "$coming_of_age.3011.t$"
 coming_of_age.3012.desc.intro: "O dia finalmente chegou: [junior_emp.Custom2('MyCharacterIntroduction', senior_emp)] é[junior_emp.Custom('ES_OA')] um[junior_emp.Custom('ES_XA')] [junior_emp.GetWomanMan]a, pront[junior_emp.Custom('ES_OA')]a para assumir seu lugar como a segunda pessoa mais poderosa de [senior_emp.GetPrimaryTitle.GetDefinitiveName].\n\nDepois de mim, é claro.\n\nEmbora um[junior_emp.Custom('ES_XA')] [senior_emp.GetDiarchTitle|l] jovem tenha pouco a dizer sobre o estado do reino, assim que tiver se adaptado[junior_emp.Custom('ES_OA')] à sua função, haverá pouco sobre o que #EMP no pueda#! falar.\n\n"
 coming_of_age.3012.desc.senior_emp_appointed_junior_emp: "Só posso esperar ter feito uma escolha sábia"
 coming_of_age.3012.desc.junior_emp_appointed_elsewhere: "Só posso esperar que [junior_emp.MakeScope.Var('co_emp_appointer').Char.GetFirstName] tenha escolhido bem"
 coming_of_age.3012.desc.outro: "ao elevar[junior_emp.GetHerHim] a este alto cargo."
 coming_of_age.3012.a: "O púrpura exige muito de nós..."
