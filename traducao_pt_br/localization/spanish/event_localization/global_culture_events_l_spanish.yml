 global_culture.custom.change_culture: "Todos os condados e personagens [old_culture.GetName] em seu reino se tornam [new_culture.GetName]"
 global_culture.custom.merge_culture: "Todos os condados e personagens [old_culture_1.GetName] e [old_culture_2.GetName] em seu reino se tornam [new_culture.GetName]"
 global_culture.custom.keep_culture: "Os condados e personagens [old_culture.GetName] em seu reino mantêm sua cultura."
 global_culture.custom.trigger: "Você não controla pelo menos 80% de todos os condados de [CHARACTER.GetCulture.GetName]"
 #Visigoth Split
 global_culture.0002.t: "Destino dos Visigodos"
 global_culture.0002.desc: "Há muito tempo, nossos ancestrais migraram para a península Ibérica e construíram seus primeiros assentamentos. Vivemos aqui por gerações desde então, a terra nos moldando tanto quanto moldamos a terra.\n\nÉ hora de nos perguntarmos, ainda somos visigodos? Ou somos algo completamente novo?"
 global_culture.0002.a: "Os tempos estão mudando, e devemos mudar com eles."
 global_culture.0002.b: "Não abandonaremos as tradições de nossos ancestrais!"
 global_culture.0005.t: "$global_culture.0002.t$"
 global_culture.0005.desc: "Cuando os visigodos chegaram à península ibérica, eram estrangeiros em uma terra nova e estranha.\n\nIsso mudou ao longo de muitas gerações, à medida que a terra os moldava tanto quanto eles moldavam a própria terra. Com o passar do tempo, as diferentes comunidades visigodas foram-se tornando distintas e separadas entre si.\n\nApesar de sua herança compartilhada, essas novas identidades —[castilian.GetName], [catalan.GetName], [occitan.GetName], [andalusian.GetName]— já não se reconhecem como parentes."
 global_culture.0005.a: "Apenas o tempo dirá como isso afetará a região."
 #Norse Split
 global_culture.0012.t: "Destino dos Nórdicos"
 global_culture.0012.desc: "Vivendo nas duras terras da Escandinávia, a história do nosso povo é marcada por saber garantir prosperidade e sobrevivência por meio do comércio, do saque e da guerra como mercenários.\n\nCom o tempo, isso resultou no acúmulo de grandes riquezas, fazendo com que nosso povo criasse raízes e se estabelecesse com mais frequência em propriedades permanentes.\n\nAgora, esses assentamentos começaram a divergir entre si culturalmente, à medida que suas tradições e até mesmo seus idiomas mudam para atender às demandas de seus novos estilos de vida."
 global_culture.0012.a: "Devemos garantir nossa própria prosperidade em primeiro lugar."
 global_culture.0012.b: "Inaceitável! Os Nórdicos #EMP permanecerão#! unidos."
 global_culture.0015.t: "$global_culture.0012.t$"
 global_culture.0015.desc: "Comerciantes, saqueadores e mercenários... os nórdicos têm viajado há muito tempo da Escandinávia por toda a Europa e até mesmo além, deixando sua marca por onde passam.\n\nAgora parece que essa era pode estar chegando ao fim, à medida que diferenças culturais e rivalidades entre clãs levaram ao surgimento de identidades [danish.GetName], [swedish.GetName] e [norwegian.GetName] díspares entre eles."
 global_culture.0015.desc_norse: "Comerciantes, saqueadores e mercenários... nossos ancestrais nórdicos têm viajado há muito tempo da Escandinávia por toda a Europa e até mesmo além, deixando sua marca por onde passam.\n\nAgora parece que essa era pode estar chegando ao fim, à medida que nossa terra natal está fragmentada por diferenças culturais e rivalidades entre clãs em identidades [danish.GetName], [swedish.GetName] e [norwegian.GetName]."
 global_culture.0015.a: "O que isso significa para o futuro da Europa?"
 global_culture.0015.b: "O que isso significa para o futuro do nosso povo?"
 #Scottish Split
 global_culture.0032.t: "Ascensão dos Escoceses"
 global_culture.0032.desc: "Embora compartilhemos origens comuns com os outros anglo-saxões, nossos clãs que vivem nas terras baixas do norte da Grã-Bretanha começaram a se divergir cultural e linguisticamente à medida que nos adaptamos à vida nas terras acidentadas.\n\nMuitos de nosso povo agora clamam por uma identidade cultural única que possamos chamar de nossa. Algo do qual podemos nos orgulhar..."
 global_culture.0032.a: "Somos escoceses, agora e para sempre!"
 global_culture.0032.b: "Não devemos virar as costas para nossos conterrâneos."
 global_culture.0035.t: "$global_culture.0032.t$"
 global_culture.0035.desc: "Embora compartilhem origens comuns com os outros anglo-saxões, os clãs das terras baixas da Grã-Bretanha se adaptaram à vida em seu terreno acidentado.\n\nAo divergirem cultural e linguisticamente de seus antigos compatriotas, estes [scottish.GetCollectiveNoun] abraçaram com entusiasmo sua nova identidade cultural."
 global_culture.0035.a: "Serão capazes de prosperar por conta própria?"
 #Norman Merge
 global_culture.3002.t: "Ascensão dos Normandos"
 global_culture.3002.desc: "As terras do norte da França proporcionaram ao nosso povo um solo fértil para se estabelecer e expandir.\n\nAo adotar algumas tradições dos locais, seremos capazes de nos adaptar melhor à região."
 global_culture.3002.a: "A novos amigos e novos começos!"
 global_culture.3003.t: "$global_culture.3002.t$"
 global_culture.3003.desc: "Estamos distantes das terras que nossos ancestrais nórdicos chamavam de lar, mas são essas terras do norte da França que consideramos nosso país. Como líder do meu povo, é minha responsabilidade garantir a prosperidade futura e, se quisermos florescer, devemos nos adaptar ao nosso novo ambiente. Devemos aprender com as pessoas cujos antepassados fizeram uso dessas terras férteis.\n\nPor meio deste decreto, mudaremos nossa forma de vida para beneficiar nossa família. Forjaremos um novo caminho como nosso próprio povo."
 global_culture.3003.a: "A partir deste dia em diante, nos chamamos Normandos!"
 global_culture.3005.t: "$global_culture.3002.t$"
 global_culture.3005.desc: "Um grupo de colonos nórdicos vindos da Escandinávia se estabeleceu na costa do norte da França, fazendo um novo lar para si lá.\n\nS líder, [norman_founder.GetTitledFirstName|l], decretou que seu povo adotará várias costumes e tradições locais para garantir que prosperem nesta nova terra."
 global_culture.3005.a: "O que isso significa para a região?"
 global_culture.3011.t: "Propagação da Cultura [sicilian.GetNameNoTooltip]"
 global_culture.3011.desc: "A mistura eclética de povos no sul da Itália e Sicília deu origem a uma cultura única, afetada pelas inúmeras influências.\n\nAgora está claro que as pessoas em [county_to_change.GetName] não se veem mais como [old_culture.GetName], mas como [sicilian.GetCollectiveNoun] nativos!"
 global_culture.3011.a: "Um desenvolvimento interessante..."
 global_culture.3012.a: "Maravilhoso!"
 global_culture.4011.t: "Propagação da cultura [goryeo.GetNameNoTooltip]"
 global_culture.4011.desc: "Os povos dos três reinos acabaram compartilhando uma identidade mais ampla em decorrência da unificação, dando origem a uma cultura única que reflete inúmeras influências.\n\nAgora fica claro que o povo de [county_to_change.GetName] não se vê como [old_culture.GetName], mas como [goryeo.GetCollectiveNoun] nativa!"
