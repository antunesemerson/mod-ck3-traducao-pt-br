 councillor_spouse_stewardship.2001.t: "[councillor.GetCouncilTitle]: Investigação de investimentos"
 councillor_spouse_stewardship.2001.desc: "Com a diligente administração por parte de [councillor.GetTitledFirstName|l] das finanças da minha casa, há mais ouro ao final deste período do que o esperado.\n\n"Qual seria a melhor forma de investi-lo, [ROOT.Char.GetWifeHusband]?""
 councillor_spouse_stewardship.2001.a: "Realize um magnífico jantar para deleite de todos!"
 councillor_spouse_stewardship_2001_every_powerful_vassal: "Cada Vassalo Poderoso"
 councillor_spouse_stewardship.2001.b: "Invista o dinheiro na área local."
 councillor_spouse_stewardship.2001.c: "Se há algo que o dinheiro pode comprar são olhos e ouvidos!"
 councillor_spouse_stewardship.2001.d: "Vamos guardar para o momento."
 councillor_spouse_stewardship.2002.t: "[councillor.GetCouncilTitle]: oportunidade deslumbrante"
 councillor_spouse_stewardship.2002.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U]". [courtier_lender.Custom('ES_ElLa')|U] [courtier_lender.GetTitledFirstName|l] caminha até mim e sorri [courtier_lender.Custom('quirk_pos_adverb')]. "Foi abordado por [councillor.Custom('ES_ElLa')] [councillor.GetTitledFirstName|l], que, em sua sabedoria, sugeriu um acordo entre nós dois. Você poderia usar alguma ajuda financeira, e eu poderia usar alguma assistência social…"."
 councillor_spouse_stewardship.2002.a: "Eu vou te pagar, eu prometo."
 councillor_spouse_stewardship.2002.money_loan_tooltip: "Eu vou pegar emprestado [gold_i] #bold [THIS.Var('amount_to_loan').GetValue]#! de ouro de [courtier_lender.GetFirstNameNoTooltip]."
 councillor_spouse_stewardship.2002.b: "Por que você não doa para [ROOT.Char.GetFaith.HouseOfWorship]?"
 councillor_spouse_stewardship.2002.c: "Você deveria doar para os pobres."
 councillor_spouse_stewardship.2002.d: "Eu aceitarei essa homenagem com prazer!"
 councillor_spouse_stewardship.2003.t: "[councillor.GetCouncilTitle]: oportunidade para o comércio"
 councillor_spouse_stewardship.2003.desc: "[councillor.Custom('ES_ElLa')|U] [councillor.GetTitledFirstName|l] se aproxima a mim com três pergaminhos nos braços.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], redigi propostas comerciais para os governantes vizinhos. Estou segur[councillor.Custom('ES_OA')] de que se pode fechar um acordo que beneficie a ambas as partes!"."
 councillor_spouse_stewardship.2003.a: "[ruler_1.GetTitledFirstNameNoTooltip|l] parece razoável."
 councillor_spouse_stewardship.2003.b: "Faça um acordo com [ruler_2.GetTitledFirstNameNoTooltip|l]."
 councillor_spouse_stewardship.2003.c: "Faça um acordo com [ruler_3.GetTitledFirstNameNoTooltip|l]."
 councillor_spouse_stewardship.2003.d_greedy: "Nenhum deles chegará perto do meu ouro!"
 councillor_spouse_stewardship.2003.d_arrogant: "Nenhum deles é digno de fazer um acordo com #EMP mim#!!"
 councillor_spouse_stewardship.2003.d: "Nenhum deles apresenta uma oportunidade suficientemente tentadora..."
 councillor_spouse_stewardship.2004.t: "[councillor.GetCouncilTitle]: uma mão amiga"
 councillor_spouse_stewardship.2004.desc: ""Seu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('on_my_hook'))], [on_my_hook.GetTitledFirstName|l], recentemente se meteu em alguns problemas."\n\n[councillor.GetTitledFirstName|l] sorri [councillor.Custom('quirk_pos_adverb')] enquanto continua: "Eu cuidei para que a situação se resolvesse sozinha e para mencionar você como benfeitor[ROOT.Char.Custom('ES_XA')].""
 councillor_spouse_stewardship.2004.a: "Excelente trabalho!"
 councillor_spouse_stewardship.2004.b: "Um bom ato não precisa de recompensa."
 councillor_spouse_stewardship.2005.t: "[councillor.GetCouncilTitle]: investimentos em [county_to_boost.GetNameNoTierNoTooltip]"
 councillor_spouse_stewardship.2005.desc: ""Meu [ROOT.Char.GetLadyLord]. Chegou ao meu conhecimento que existe uma rara oportunidade de investir em [county_to_boost.GetName]".\n\nMeu [councillor.Custom('WifeHusband')], [councillor.GetFirstName], me apresenta os detalhes do investimento e, de fato, parece que o acordo poderia beneficiar enormemente [county_to_boost.GetNameNoTierNoTooltip] caso seja bem-sucedido."
 councillor_spouse_stewardship.2005.a: "É um risco que vale a pena!"
 councillor_spouse_stewardship.2005.a_1: "O negócio resulta em um grande retorno para [county_to_boost.GetNameNoTierNoTooltip]."
 councillor_spouse_stewardship.2005.a_2: "O negócio fracassa."
 councillor_spouse_stewardship.2005.b: "Deixe a oportunidade para o povo de [county_to_boost.GetNameNoTierNoTooltip]."
 councillor_spouse_stewardship.2005.c: "Essa conversa sobre assuntos locais está abaixo de mim!"
