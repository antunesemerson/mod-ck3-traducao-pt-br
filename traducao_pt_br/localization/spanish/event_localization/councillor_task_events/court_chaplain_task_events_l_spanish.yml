l_spanish:
 court_chaplain_task.0201.opening: "[councillor.Custom2('AppropriateGreeting', ROOT.Char)]"
 court_chaplain_task.0301.desc: "Estuve rebuscando entre documentos antiguos y otros de… procedencia menos segura. ¡Al fin tengo bastante material para apoyar la idea de que sois [ROOT.Char.GetLadyLord] legitim[ROOT.Char.Custom('ES_OA')] del [county.GetName]!\n\nSolo se precisa un pequeño soborno…"
 court_chaplain_task.0301.a: "Faça isso acontecer!"
 court_chaplain_task.0301.b: "Não, não posso."
 court_chaplain_task.0301.b.tt: "Perder todo o progresso de fabricação de reivindicação"
 court_chaplain_task.0302.desc: "Estuve rebuscando entre documentos antiguos y otros de… procedencia menos segura. Al fin tengo bastante material para apoyar la idea de que sois [ROOT.Char.GetLadyLord] legitim[ROOT.Char.Custom('ES_OA')] del [county.GetName].\n\n¡De hecho, hasta podría argüir que sois [ROOT.Char.GetLadyLord] legitim[ROOT.Char.Custom('ES_OA')] del [duchy.GetName]!"
 court_chaplain_task.0302.desc_heretic_addition: "Estuve rebuscando entre documentos antiguos y otros de… procedencia menos segura. Al fin tengo bastante material para apoyar la idea de que sois [ROOT.Char.GetLadyLord|l] legitim[ROOT.Char.Custom('ES_OA')] del [county.GetName].\n\nViendo que, por desgracia, [duchy_holder.GetFirstName] insiste en ser #EMP [duchy_holder.GetFaith.GetAdherentName]#!, hasta podría argüir que tenéis derechos sobre el [duchy.GetName]… ¡por derecho divino!"
 court_chaplain_task.0302.a: "Apresente minha alegação sobre [county.GetNameNoTierNoTooltip]."
 court_chaplain_task.0302.b: "Sim! Todo o [duchy.GetNameNoTierNoTooltip] será meu!"
 court_chaplain_task.0311.t: "Uma Alegação sobre [county.GetNameNoTierNoTooltip]!"
 court_chaplain_task.0311.opening: "[councillor.GetTitledFirstName], [councillor.GetCouncilTitle] de [councillor_liege.GetTitledFirstName|l], esteve por meses desenterrando contratos falsos e histórias inventadas."
 court_chaplain_task.0311.end: "\n\nAgora [councillor_liege.GetTitleTierName] [councillor_liege.GetFirstName] ousa agir como se tudo isso constituísse uma reivindicação legítima sobre o [county.GetName]!"
 court_chaplain_task.0311.a: "Mentiras e mais mentiras!"
 court_chaplain_task.0312.a: "Será que [councillor_liege.GetFirstNameNoTooltip] não tem vergonha na cara?!"
 court_chaplain_task.0313.t: "Uma Alegação sobre [county.GetNameNoTierNoTooltip]!"
 court_chaplain_task.1001.notification: "Pregando Doutrina Não Ortodoxa"
 court_chaplain_task.1002.notification: "Retórica Pobre"
 court_chaplain_task.1101.notification: "Retórica Impressionante"
 court_chaplain_task.2001.notification: "Resistência à Conversão"
 court_chaplain_task.2002.notification: "Resistência Popular à Conversão"
 court_chaplain_task.2101.notification: "Conversões Entusiasmadas"
 court_chaplain_task.2102.notification: "Estabelecimento de Novas [councillor.GetFaith.HouseOfWorshipPlural|lU]"
 court_chaplain_task.2103.notification: "Novos Conversos Voluntários"
 court_chaplain_task.3001.t: "Minando a Ordem"
 court_chaplain_task.3001.desc: "Mi [councillor.GetCouncilTitle], [councillor.GetFirstName], parece muy preocupad[councillor.Custom('ES_OA')] cuando viene a verme.\n\n«Se ha hecho público que estoy… investigando la existencia de unos derechos justos y legítimos para vos sobre el [county.GetName]. Basta decir que a muchos de vuestros vasallos les molesta que su [ROOT.Char.GetTitleTierName] haga caso omiso de su lealtad y actúe contra ellos de esta manera»."
 court_chaplain_task.3001.a: "Como você deixou que pegassem você?!"
 court_chaplain_task.3002.notification: "Acusado de Fabricação de Reivindicação"
 court_chaplain_task.3003.opening: "[vassal.Custom2('AppropriateGreeting', ROOT.Char)]"
 court_chaplain_task.3003.desc: "Chegou ao meu conhecimento que voss[councillor.Custom('ES_OA')] [councillor.GetCouncilTitle], [councillor.GetFirstName], está tramando uma reivindicação fraudulenta sobre o [county.GetName]. Imploro que se lembre de que vós sois [ROOT.Char.GetTitleTierName] por direito, não por ganância."
 court_chaplain_task.3003.a: "Eu sei o que estou fazendo, [vassal.GetFirstNameNoTooltip]."
 court_chaplain_task.3003.b: "Comporte-se como convém, [vassal.GetTitledFirstNameNoTooltip|l]."
 court_chaplain_task.3004.opening: "[target.Custom2('AppropriateGreeting', ROOT.Char)]"
 court_chaplain_task.3004.desc: "Tornou-se claro que seu [councillor.GetCouncilTitle] está trabalhando para estabelecer uma reivindicação falsa e espúria sobre [county.GetName]. Não pense que esse tipo de ação desonrosa passará sem resposta."
 court_chaplain_task.3004.a: "Ah, mas #EMP há#! uma base para uma reivindicação aqui."
