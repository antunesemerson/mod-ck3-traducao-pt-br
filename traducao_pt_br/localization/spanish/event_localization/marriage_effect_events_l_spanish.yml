l_spanish:
 marriage_effect.0001.t: "Fazendo o Certo"
 marriage_effect.0001.desc.multiple: "Finalmente, as coisas estão como sempre deveriam ter sido. O segredo pairando sobre meus [illegitimate_child.Custom('TwinDaughtersSonsChildren')] não pode mais nos machucar, agora que seu pai, [new_spouse.GetTitledFirstName|l], e eu estamos legalmente casados."
 marriage_effect.0001.desc.child: "He pasado muchas noches en vela preocupad[ROOT.Char.Custom('ES_OA')] por mi [illegitimate_child.Custom('GetDaughterSon')] [illegitimate_child.GetTitledFirstName|l]. ¿Qué podría suceder si se conocía su verdadero origen?\n\nAhora que su padre [new_spouse.GetTitledFirstName|l] y yo estamos legítimamente casados, puedo enterrar mis viejos miedos."
 marriage_effect.0001.desc.pregnancy: "Desde o dia em que descobri que estava grávida, tenho me preocupado muito com o futuro do meu filho. Finalmente estou livre desses medos, agora que seu pai, [new_spouse.GetTitledFirstName|l], e eu estamos legalmente casados."
 marriage_effect.0001.a: "Esse segredo não vai mais me assombrar."
 marriage_effect.0002.desc.multiple: "Finalmente, as coisas estão como sempre deveriam ter sido. O segredo pairando sobre meus [illegitimate_child.Custom('TwinDaughtersSonsChildren')] não pode mais machucá-los nem machucar sua mãe, [real_mother.GetTitledFirstName|l], agora que estamos legalmente casados."
 marriage_effect.0002.desc.child: "He pasado muchas noches en vela preocupad[ROOT.Char.Custom('ES_OA')] por mi [illegitimate_child.Custom('GetDaughterSon')] [illegitimate_child.GetTitledFirstName|l]. ¿Qué sería de [illegitimate_child.GetSheHe] si se conocía su verdadero origen?\n\nAhora que su madre [real_mother.GetTitledFirstName|l] y yo estamos legítimamente casados, puedo enterrar mis viejos miedos."
 marriage_effect.0002.desc.pregnancy: "Desde o dia em que descobri que [real_mother.GetTitledFirstName|l] estava grávida de nosso filho, tenho me preocupado muito com o futuro de nossa criança. Agora que estamos legalmente casados, meus medos finalmente podem ser deixados de lado."
 marriage_effect.0002.desc.pregnancy_not_knowing: "[real_mother.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se me acerca con una mano sobre el vientre.\n\n«No te lo había dicho antes, pero… la criatura que llevo dentro es tuya. Ahora que estamos legítimamente casados, este secreto no puede hacernos daño»."
 marriage_effect.0001.a_not_knowing: "Oh, eu... fico feliz."
 marriage_effect.0003.desc.pregnancy: "Desde o dia em que descobri que minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('real_mother') )] [real_mother.GetTitledFirstName|l] estava grávida de [new_spouse.GetTitledFirstName|l], tenho guardado o segredo deles bem junto ao peito. Agora que estão legalmente casados, finalmente posso relaxar."
 marriage_effect.0003.desc.multiple: "Mi [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('real_mother') )] [real_mother.GetTitledFirstName|l] y sus [illegitimate_child.Custom('TwinDaughtersSonsChildren')] me han preocupado desde su nacimiento, pues son fruto de una unión ilícita con [new_spouse.GetTitledFirstName|l].\n\nAhora que [new_spouse.GetTitledFirstName|l] y [real_mother.GetFirstName] están legítimamente casados, puedo enterrar mis viejos miedos."
 marriage_effect.0003.desc: "He estado preocupad[ROOT.Char.Custom('ES_OA')] por mi [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('real_mother') )] [real_mother.GetTitledFirstName|l] y su [illegitimate_child.Custom('GetDaughterSon')] [illegitimate_child.GetTitledFirstName|l] desde su nacimiento, pues es fruto de una unión ilícita con [new_spouse.GetTitledFirstName|l].\n\nAhora que [new_spouse.GetTitledFirstName|l] y [real_mother.GetFirstName] están legítimamente casados, puedo enterrar mis viejos miedos."
 #For concubines - similar events and text to marriage
 marriage_effect.0011.desc.multiple: "Finalmente, as coisas estão como sempre deveriam ter sido. O segredo pairando sobre meus [illegitimate_child.Custom('TwinDaughtersSonsChildren')] não pode mais nos machucar, agora que seu pai, [new_spouse.GetTitledFirstName|l], e eu estamos legalmente unidos."
 marriage_effect.0011.desc.child: "He pasado muchas noches en vela preocupad[ROOT.Char.Custom('ES_OA')] por mi [illegitimate_child.Custom('GetDaughterSon')] [illegitimate_child.GetTitledFirstName|l] y qué sería de nosotros si se conocía su verdadero origen.\n\nAhora que su padre, [new_spouse.GetTitledFirstName|l], y yo estamos legítimamente unidos, mis miedos pueden descansar al fin."
 marriage_effect.0011.desc.pregnancy: "Desde o dia em que descobri que estava grávida, tenho me preocupado muito com o futuro do meu filho. Finalmente estou livre desses medos, agora que seu pai, [new_spouse.GetTitledFirstName|l], e eu estamos legalmente unidos."
 marriage_effect.0012.desc.multiple: "Finalmente, as coisas estão como sempre deveriam ter sido. O segredo pairando sobre meus [illegitimate_child.Custom('TwinDaughtersSonsChildren')] não pode mais machucá-los nem machucar sua mãe, [real_mother.GetTitledFirstName|l], agora que estamos legalmente unidos."
 marriage_effect.0012.desc.child: "He pasado muchas noches en vela preocupad[ROOT.Char.Custom('ES_OA')] por mi [illegitimate_child.Custom('GetDaughterSon')] [illegitimate_child.GetTitledFirstName|l] y qué sería de [illegitimate_child.Custom('ES_ElElla')] si se conocía la verdad sobre su parentesco.\n\nAhora que su padre, [real_mother.GetTitledFirstName|l], y yo estamos legítimamente unidos, mis miedos pueden descansar al fin."
 marriage_effect.0012.desc.pregnancy: "Desde o dia em que descobri que [real_mother.GetTitledFirstName|l] estava grávida do nosso filho, tenho me preocupado muito com o futuro da nossa criança. Agora que estamos legalmente unidos, meus medos finalmente podem ser deixados de lado."
 marriage_effect.0012.desc.pregnancy_not_knowing: "[real_mother.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se me acerca con una mano sobre el vientre.\n\n«No te lo había dicho antes, pero… la criatura que llevo dentro de mí es tuya. Ahora que estamos legítimamente unidos, este secreto no puede hacernos daño»."
 marriage_effect.0013.desc.pregnancy: "Desde o dia em que descobri que minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('real_mother') )] [real_mother.GetTitledFirstName|l] estava grávida de [new_spouse.GetTitledFirstName|l], tenho guardado o segredo bem perto do peito. Agora que estão legalmente unidos, posso finalmente relaxar."
 marriage_effect.0013.desc.multiple: "Mi [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('real_mother') )] [real_mother.GetTitledFirstName|l] y sus [illegitimate_child.Custom('TwinDaughtersSonsChildren')] me han preocupado desde que nacieron, sabiendo que fueron concebidos en una unión ilícita con [new_spouse.GetTitledFirstName|l].\n\nAhora que [new_spouse.GetTitledFirstName|l] y [real_mother.GetFirstName] están legítimamente unidos, mis miedos pueden descansar al fin."
 marriage_effect.0013.desc: "Mi [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('real_mother') )] [real_mother.GetTitledFirstName|l] y su [illegitimate_child.Custom('GetDaughterSon')] [illegitimate_child.GetTitledFirstName|l] me han preocupado desde su nacimiento, sabiendo que fue concebid[illegitimate_child.Custom('ES_OA')] en una unión ilícita con [new_spouse.GetTitledFirstName|l].\n\nAhora que [new_spouse.GetTitledFirstName|l] y [real_mother.GetFirstName] están legítimamente unidos, mis miedos pueden descansar al fin."
 marriage_effect.1001.t: "O Amor Prevalece"
 marriage_effect.1001.desc: "Oh, [spouse.GetTitledFirstName|l], meu [spouse.Custom('LoverPetName')]! Só de pensar que agora posso te abraçar abertamente, com as bênçãos de [ROOT.Char.GetFaith.FertilityGodName] e de quem nos rodeia... Sou [ROOT.Char.GetWomanMan] mais feliz do mundo!"
 marriage_effect.1001.a: "Venha aqui, [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse') )] meu[secondary_actor.Custom('ES_OA')]!"
 marriage_effect.1002.desc: "Oh, [spouse_2.GetTitledFirstName|l], meu [spouse_2.Custom('LoverPetName')]! Só de pensar que agora posso abraçar você abertamente, com as bênçãos de [ROOT.Char.GetFaith.FertilityGodName] e de quem nos rodeia... Sou [ROOT.Char.GetWomanMan] mais feliz do mundo!"
 marriage_effect.1002.a: "Venha aqui, [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse_2') )] meu[spouse_2.Custom('ES_OA')]!"
 marriage_effect.2001.t: "Celebração de Casamento"
 marriage_effect.2001.desc.start_normal: "Com meu casamento com [new_spouse.Custom('ES_ElLa')] [new_spouse.GetTitledFirstName|l], espera-se que ofereçamos uma celebração de casamento adequadamente extravagante."
 marriage_effect.2001.desc.start_divine_marriage: "Com meu casamento com [new_spouse.Custom2('MyCharacterIntroduction', ROOT.Char)], o reino está ansioso por uma grande recepção para celebrar a reunião de nosso sangue divino."
 marriage_effect.2001.desc.start_prison: "Meu nov[new_spouse.Custom('ES_OA')] cônjuge, [new_spouse.GetTitledFirstName|l], está encarcerad[new_spouse.Custom('ES_OA')]. Ainda assim, nosso casamento continua válido e o reino ainda espera que celebremos uma celebração de casamento extravagante."
 marriage_effect.2001.desc.end: "\n\nTengo derecho de recaudar una contribución de ayuda real, pero algunos considerarían de mal gusto ingresar un impuesto extra en un periodo de regocijo…"
 marriage_effect.2001.a: "Claro que vou cobrar! Quem paga pelo próprio casamento?"
 marriage_effect.2001.b: "Vou deixar meus súditos aproveitarem as festividades sem preocupações."
