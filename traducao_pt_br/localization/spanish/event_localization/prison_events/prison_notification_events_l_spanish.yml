l_spanish:
 prison_notification.0001.t: "Aprisionado!"
 prison_notification.0001.desc: "[imprisoner.Custom('ES_ElLa')|U] [imprisoner.GetTitledFirstName|l] me capturou e me manteve em cativeiro contra a minha vontade.\n\nJá não posso voltar para minha [ROOT.Char.Custom('GetCourt')|l] nem viajar livremente."
 prison_notification.0001.a: "Espero que isso não dure muito."
 prison_notification.0002.t: "Aprisionado!"
 prison_notification.0002.desc: "[imprisoner.GetTitledFirstName] tiene retenid[prisoner.Custom('ES_OA')] en contra de su voluntad a [prisoner.GetTitledFirstName|l], mi [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('prisoner'))] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('prisoner'))]."
 prison_notification.0002.a: "O que pode ser feito por [prisoner.Custom('ES_ElElla')]?"
 prison_notification.0003.message: "[ROOT.Char.Custom2('RelationToMe', SCOPE.sC('prisoner'))|U] encarcerad[prisoner.Custom('ES_OA')]!"
 prison_notification.1001.t: "Fora da Luz"
 prison_notification.1001.desc: "[actor.GetTitledFirstName] me jogou nas masmorras! Vou apodrecer aqui, nos túneis úmidos da sua [actor.Custom('FortifiedBuilding')]?"
 prison_notification.1001.a: "¡Es peor que las ratas que corren por aquí!"
 prison_notification.1001.a.tt: "Enquanto estiver nas masmorras, vou acumular [stress|lE] lentamente, até níveis perigosos!"
 prison_notification.1002.t: "Ar Mais Fresco"
 prison_notification.1002.desc: "[actor.GetTitledFirstName] achou por bem me libertar do cativeiro em sua masmorra, mas apenas o suficiente para me manter em prisão domiciliar."
 prison_notification.1002.a: "Agradeço pelas misericórdias que posso encontrar."
 prison_notification.1002.a.tt: "Prisão Domiciliar não aumenta o ganho de [stress|lE]."
 prison_notification.2001.t: "Livre Novamente"
 prison_notification.2001.desc: "Não estou mais sob o poder de [imprisoner.GetTitledFirstName] contra minha vontade e estou livre para voltar para casa ou para qualquer outro lugar que desejar."
 prison_notification.2001.a: "Pensei que nunca mais veria minhas terras novamente."
 prison_notification.2002.t: "Livre Novamente"
 prison_notification.2002.desc: "Meu/minha [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('prisoner'))] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('prisoner'))], [prisoner.GetTitledFirstName|l], foi libertad[prisoner.Custom('ES_OA')] de seu encarceramento às mãos de [imprisoner.GetTitledFirstName|l] e está livre novamente!"
 prison_notification.2002.a: "O aprisionamento é uma crueldade."
 prison_notification.2003.message: "[ROOT.Char.Custom2('RelationToMe', SCOPE.sC('prisoner'))|U] libertado[prisoner.Custom('ES_OA')]!"
