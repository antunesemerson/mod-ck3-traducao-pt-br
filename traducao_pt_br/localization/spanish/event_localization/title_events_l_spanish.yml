l_spanish:
 title_event_francia_name_change.title: "Fim de uma Era"
 title_event_francia_name_change.desc: "O reinado da dinastia carolíngia chegou ao fim!\n\n[francia_title.GetName] finalmente escapou de suas mãos. Com a remoção dos carolíngios, estas terras já não fazem parte do seu antigo império.\n\nComigo como futur[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], temos um novo e brilhante destino pela frente. Portanto, é adequado eliminar #EMP toda e qualquer#! lembrança de sua influência. Inclusive o próprio #EMP nome#!!"
 title_event_francia_name_change.a: "Uma nova era começa!"
 title_event_francia_name_change.a_tt_1: "[francia_title.GetName] muda de nome para #high $k_france$#!"
 title_event_francia_name_change.a_tt_2: "[francia_title.GetName] muda de nome para #high $k_germany$#!"
 title_event.0012.t: "Divisão da Coroa"
 title_event.0012.desc: "Com a criação de [castille.GetName], e o trono da antiga [asturias.GetBaseNameNoTier] vago, o Reino de Pelágio finalmente ficou pequeno demais. Seu remanescente será conhecido para sempre como [leon.GetBaseNameNoTier], pelo menos até que isso também seja ofuscado pela ascensão de [castille.GetBaseNameNoTierNoTooltip]."
 title_event.0012.a: "Como deve ser."
 title_event.0013.t: "$title_event.0012.t$"
 title_event.0013.desc: "Agora que possuo os tronos de [asturias.GetBaseNameNoTier] e de um [castille.GetBaseNameNoTier] distinto, a ideia de uma [asturias.GetNameNoTooltip] unificada é considerada confusa e redundante por muitos.\n\nEm vez disso, nobres e plebeus começaram a se referir à metade ocidental de minhas terras fazendo alusão à porção dominante do interior, [leon.GetBaseNameNoTier]."
 title_event.0013.a: "Duas coroas valem mais que uma!"
 title_event.0014.t: "$title_event.0012.t$"
 title_event.0014.desc: "A recente formação de um [castille.GetBaseName] independente, governado por [castille_char.Custom2('MyCharacterIntroduction' leon_char)], arruinou a reivindicação de meu reino ser [asturias.GetBaseName].\n\nCom nossas terras do leste perdidas para sempre, somos dominados pela área do interior de [leon.GetBaseNameNoTier], e pessoas de todas as classes e seitas estão deixando o antigo título de lado."
 title_event.0014.a: "Separatistas!"
 title_event.0014.b: "Recuperaremos essas terras um dia..."
 title_event.0014.c: "Viva! Um #EMP reino#! inteiro de camaradas!"
 title_event.0015.t: "$title_event.0012.t$"
 title_event.0015.desc: "Com a recente criação de [castille.GetBaseName], [leon_char.Custom2('MyCharacterIntroduction', castille_char)] não pode mais ser considerado como verdadeiramente governando um [asturias.GetBaseNameNoTier] unificado.\n\nSem a força equilibradora de minhas terras a leste, o antigo [asturias.GetBaseNameNoTierNoTooltip] é realmente pouco mais que um [leon.GetBaseName]. Camponeses, clero e até mesmo nobres começaram a se referir a ele assim, para minha decepção."
 title_event.0015.a: "O poder está de volta onde sempre deveria ter estado."
 title_event.0015.b: "Hoje, Castela. Amanhã, #EMP Leão#!."
 title_event.0015.c: "Podemos estar divididos no governo, mas estamos unidos pelo sangue!"
