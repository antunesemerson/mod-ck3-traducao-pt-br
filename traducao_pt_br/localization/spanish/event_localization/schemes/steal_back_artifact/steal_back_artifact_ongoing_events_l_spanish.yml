l_spanish:
 steal_back_artifact_event_title: "Roubar Artefato:"
 steal_back_artifact_ongoing.1001.t: "$steal_back_artifact_event_title$ O Antiquário"
 steal_back_artifact_ongoing.1001.desc: "Um dos maiores obstáculos para recuperar o artefato é [antiquarian.GetTitledFirstName], antiquári[antiquarian.Custom('ES_OA')] de [target.GetTitledFirstName|l].\n\nÉ claro que há muitas maneiras de... #EMP lidar#! com uma pessoa, mas me pergunto se [antiquarian.GetFirstNameNoTooltip] é do tipo de pessoa que eu poderia convencer a fingir que não viu nada em troca de um suborno adequado."
 steal_back_artifact_ongoing.1001.a: "Ouro é a linguagem universal do suborno."
 steal_back_artifact_ongoing.1001.a.tt: "Você acredita que a lealdade de [antiquarian.GetTitledFirstName|l] pode ser comprada com riquezas…"
 steal_back_artifact_ongoing.1001.b: "Talvez um artefato por outro?"
 steal_back_artifact_ongoing.1001.b.tt: "[antiquarian.GetTitledFirstName] concordará com uma \"troca\" justa."
 steal_back_artifact_ongoing.1001.c: "Uma apresentação a [random_beauty.GetTitledFirstNameNoTooltip|l] poderia ser... #EMP estimulante#!."
 steal_back_artifact_ongoing.1001.c.tt: "Você está apostando que [antiquarian.GetTitledFirstName|l] apreciará a beleza física acima das lealdades."
 steal_back_artifact_ongoing.1001.d: "Vou procurar outras possibilidades em vez disso."
 steal_back_artifact_ongoing_notification.1001.success: "[antiquarian.GetShortUINameNoTooltip] aceita o suborno"
 steal_back_artifact_ongoing_notification.1001.failure: "[antiquarian.GetTitledFirstName] Recusa o Suborno"
 steal_back_artifact_ongoing.1002.t: "$steal_back_artifact_event_title$: Microgerenciamento"
 steal_back_artifact_ongoing.1002.desc: "Eu disse a [agent.Custom2('MyCharacterIntroduction', ROOT.Char)] que vigiasse [target.GetTitledFirstName|l] para que encontrasse a oportunidade perfeita para roubar um artefato dele.\n\nNo entanto, o progresso tem sido muito mais lento do que eu gostaria. Talvez eu devesse dar a [agent.GetFirstName] algo específico para procurar?"
 steal_back_artifact_ongoing.1002.a: "Dê instruções específicas a [agent.GetFirstNameNoTooltip]."
 steal_back_artifact_ongoing.1002.b: "Confio que fará seu trabalho."
 steal_back_artifact_ongoing_notification.1002.success: "[agent.GetTitledFirstName] Retorna com Informações"
 steal_back_artifact_ongoing_notification.1002.failure: "[antiquarian.GetTitledFirstName] Não Consegue Encontrar Nenhuma Informação"
