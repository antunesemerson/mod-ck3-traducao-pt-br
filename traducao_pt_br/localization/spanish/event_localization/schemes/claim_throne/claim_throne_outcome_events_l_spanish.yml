l_spanish:
 do_not_execute_claim_throne_tooltip: "Eu não tento Reivindicar [target.GetPrimaryTitle.GetName]"
 #Distant Relation
 claim_throne_outcome.1001.t: "Reivindicar Trono"
 claim_throne_outcome.1001.desc: "Depois de todo o meu trabalho, finalmente é hora de apresentar as provas que “encontrei”: sou legítim[ROOT.Char.Custom('ES_OA')] herdeir[ROOT.Char.Custom('ES_OA')] de [target_title.GetName] por um antigo casamento dinástico.\n\n[target.GetTitledFirstName|l] não será mais que um[target.Custom('ES_XA')] simples pretendente enquanto estiver em meu caminho!"
 claim_throne_outcome.1001.a: "Em breve, eu governarei o [target.GetPrimaryTitle.GetNameNoTierNoTooltip]!"
 claim_throne_outcome.1001.b: "Talvez eu esteja sendo muito precipitado..."
 claim_throne_outcome.2001.opening: "Finalmente, ninguém pode duvidar do fato de que tenho uma reivindicação razoável sobre o [target_title.GetName]!"
 claim_throne_outcome.2001.discovered: "\n\nEmbora [target.GetTitledFirstName|l] acredita que eu inventei minha reivindicação de um antigo casamento dinástico, o importante é que não pode refutá-la."
 claim_throne_outcome.2001.no_awareness: "\n\nEmbora os detalhes exatos do antigo casamento dinástico estejam envoltos nas brumas do tempo, não há razão para duvidar de sua veracidade. Até [target.GetTitledFirstName|l] deve admitir que minha reivindicação é legítima."
 claim_throne_outcome.2001.a: "Nada pode me deter agora!"
 claim_throne_outcome.2001.b: "[target.GetFirstNameNoTooltip] pode reclamar o quanto quiser! Isso não muda nada."
 claim_throne_outcome.4001.opening: "Minha reivindicação sobre o [target_title.GetName] não convenceu ninguém!"
 claim_throne_outcome.4001.owner_discovered: "\n\nPior ainda, [target.GetTitledFirstName|l] descobriu meus esforços para fabricar registros de casamento entre a dinastia de [ROOT.Char.GetDynasty.GetBaseName] e a antiga dinastia governante de [target_title.GetNameNoTierNoTooltip]!"
 claim_throne_outcome.4001.owner_secret: "\n\nEmbora os registros de casamento entre a dinastia de [ROOT.Char.GetDynasty.GetBaseName] e a antiga dinastia governante de [target_title.GetNameNoTierNoTooltip] tenham sido descartados como imprecisos, pelo menos ninguém descobriu que fui eu quem os criou."
 claim_throne_outcome.4001.a: ""Eu só queria participar da glória da sua família, meu [target.GetLadyLord]!"."
 claim_throne_outcome.4001.b: "Darei o tempo que isso requer."
 claim_throne_outcome.4001.c: "Esse jogo que estou jogando é muito perigoso."
 #Relation to Mythical Founder
 claim_throne_outcome.1002.desc: "Agora tenho provas quase indiscutíveis de que pertenço à linhagem de ninguém menos que [ROOT.Char.Custom('ClaimThroneMythicalFounder')]!\n\nNem mesmo [target.GetTitledFirstName|l] pode mais recusar a legitimidade do meu direito de governar [target_title.GetName]."
 claim_throne_outcome.2002.discovered: "\n\nEmbora [target.GetTitledFirstName|l]creia que é falso que minha linhagem remonte a [ROOT.Char.Custom('ClaimThroneMythicalFounder')], tampouco foi capaz de refutá-lo, e isso é tudo o que importa."
 claim_throne_outcome.2002.no_awareness: "\n\nCom uma linhagem traçada até [ROOT.Char.Custom('ClaimThroneMythicalFounder')], quem poderia questionar a razoabilidade da minha reivindicação?"
 claim_throne_outcome.4002.owner_discovered: "\n\nFoi muito mais fácil do que eu esperava para [target.GetTitledFirstName|l] desmentir que tenho qualquer relação com [owner.Custom('ClaimThroneMythicalFounder')]. Ele até sabia que todas as minhas \"evidências\" eram totalmente fabricadas!"
 claim_throne_outcome.4002.owner_secret: "\n\nNinguém acredita que eu poderia ser descendente daquele antigo governante, [owner.Custom('ClaimThroneMythicalFounder')], mas pelo menos [target.GetTitledFirstName|l] parece não saber que todas as minhas \"evidências\" foram totalmente fabricadas desde o início."
 claim_throne_outcome.4002.a: ""Eu só queria participar da glória de sua família, meu [ROOT.Char.GetLadyLord]!"."
 #Chosen by previous ruler
 claim_throne_outcome.1003.desc: "Tenho muitas testemunhas que jurarão por [ROOT.Char.GetFaith.PantheonTerm] que [previous_title_holder.GetTitledFirstName|l], antig[previous_holder.Custom('ES_OA')] u[previous_title_holder.GetTitleAsNameNoTooltip] de [target_title.GetNameNoTier], disse em seu leito de morte que meu desejo final era que o [target.Custom('RealmType')].\n\nEmbora não seja provável que [target.GetTitledFirstName|l] reconheça meu direito, não é a [target.GetSheHe] que preciso convencer..."
 claim_throne_outcome.2003.discovered: "[target.GetTitledFirstName] denunciou publicamente como mentiras desesperadas a promessa que me fez antig[previous_holder.Custom('ES_OA')] [previous_holder.GetTitledFirstName|l], mas é a sua palavra contra os juramentos sagrados que falam a meu favor."
 claim_throne_outcome.2003.no_awareness: "Com a promessa que me fez antig[previous_holder.Custom('ES_OA')] [previous_holder.GetTitledFirstName|l] e a quantidade de pessoas dispostas a jurar que a presenciaram, [target.GetTitledFirstName|l] não pode fazer nada além de aceitá-la. Talvez [target.GetSheHe] não vá ceder o [target.GetTierAsNameNoTooltip] facilmente, mas eu também não posso ser recusado com facilidade."
 claim_throne_outcome.4003.owner_discovered: "\n\nPressionados por [target.GetTitledFirstName|l], todos os que juravam que o antigo[previous_holder.Custom('ES_OA')] [previous_holder.GetTitledFirstName|l] prometeu me transformar em seu herdeir[ROOT.Char.Custom('ES_OA')] mudaram repentinamente de ideia! Agora juram que eu os subornei para dizer isso! Embora seja verdade, isso é uma violação de lealdade absolutamente desprezível."
 claim_throne_outcome.4003.owner_secret: "\n\nPressionados por [target.GetTitledFirstName|l], todos os que juravam que antig[previous_holder.Custom('ES_OA')] [previous_holder.GetTitledFirstName|l] prometeu me transformar em seu herdeir[ROOT.Char.Custom('ES_OA')] recuaram em suas alegações. No entanto, se [target.GetFirstNameNoTooltip] não me acusou de nada, então ele deve estar preocupado que possa haver um fundo de verdade nisso."
 claim_throne_outcome.4003.a: "Será que não há ninguém em quem se possa confiar nos dias de hoje?"
 #Response events for target
 claim_throne_outcome.5001.opening: "M [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('owner'))], [owner.GetTitledFirstName|l], reivindicou o [target_title.GetName]!"
 claim_throne_outcome.5001.distant_relation: "\n\nAparentemente, houve um casamento estratégico entre nossas dinastias há algumas gerações, que [owner.GetSheHe] está usando agora em uma disputa de herança."
 claim_throne_outcome.5001.mythical_founder: "\n\n[owner.GetFirstNameNoTooltip] afirma descender nada menos que de[owner.Custom('ClaimThroneMythicalFounder')]! Acredita que isso é motivo suficiente para ser nomeado governante de[target_title.GetNameNoTooltip]."
 claim_throne_outcome.5001.previous_holder_promise: "\n\n[owner.GetFirstNameNoTooltip] afirma que [previous_holder.Custom2('RelationToMe', ROOT.Char)] jurou em seu leito de morte que [owner.GetFirstNameNoTooltip] deveria herdar o título de [target_title.GetTierAsNameNoTooltip]. Mais preocupante é o fato de que tenha encontrado várias pessoas que juram que isso é verdade."
 claim_throne_outcome.5001.fallback: "\n\n[owner.GetFirstNameNoTooltip] se recusa a dizer em que se baseiam suas reivindicações, mas não está disposto a recuar!"
 claim_throne_outcome.5001.discovered: "\n\nEssas reivindicações são completamente fabricadas, mas há incerteza suficiente para representarem uma ameaça real, caso outras pessoas as apoiem!"
 claim_throne_outcome.5001.a: "Como se eu fosse entregar meu reino sem lutar!"
 claim_throne_outcome.5002.a: "Será que realmente acredita que sairá impune com isso?!"
 claim_throne_outcome.5003.opening: "M [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('owner'))], [owner.GetTitledFirstName|l], tentou reivindicar o [target_title.GetName]!"
 claim_throne_outcome.5003.owner_known: "\n\nEsses direitos são risíveis, é claro. Se isso é tudo com o que [owner.GetFirstNameNoTooltip] pode me ameaçar, tenho pouco motivo para me preocupar."
 claim_throne_outcome.5003.a: "[owner.GetSheHe|U] pagará por essa insolência."
 #Other text
 claim_throne_invalidated: "Esquema de Reivindicar Trono encerrado"
 claim_throne_target_died_tt: "[target.GetTitledFirstName] morreu"
 claim_throne_target_lost_titles_tt: "[target.GetTitledFirstName] não possui mais títulos"
 claim_throne_target_no_longer_liege_tt: "[target.GetTitledFirstName] já não é meu [target.Custom('ES_SennorSennora')]"
 claim_throne_invalidate_fallback_tt: "Já não posso reivindicar o trono [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l]"
