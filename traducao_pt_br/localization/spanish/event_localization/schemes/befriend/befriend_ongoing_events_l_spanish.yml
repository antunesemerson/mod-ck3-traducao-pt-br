l_spanish:
 befriend_ongoing.0901.t: "Fazer Amizade: O Que Poderia Ter Sido"
 befriend_ongoing.0901.desc: "Recebi uma notícia chocante. [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)|U] faleceu.\n\nO destino quis que eu nunca pudesse desfrutar de sua amizade."
 befriend_ongoing.0901.a: "O mundo é cruel e repentino."
 befriend_ongoing.0902.t: "Fazer Amizade: Audiência Cativa"
 befriend_ongoing.0902.t.other: "Fazer Amizade: Trancado"
 befriend_ongoing.0902.desc: "Prendi [target.Custom2('MyCharacterIntroduction', ROOT.Char)].\n\nEmbora agora tenha todo o tempo do mundo para passar comigo, enquanto permanecer em cativeiro, é improvável que aceite bem minhas tentativas de conquistar sua amizade."
 befriend_ongoing.0902.desc.other: "! [target.Custom2('MyCharacterIntroduction', ROOT.Char)|U] foi aprisionado por [imprisoner.Custom2('MyCharacterIntroduction', ROOT.Char)]! Enquanto permanecer cativo, não poderei conquistar a amizade dele."
 befriend_ongoing.0902.a: "Como não!? Sou um ótimo captor!"
 befriend_ongoing.0902.a.other: "Infelizmente."
 befriend_ongoing.0903.t: "Fazer Amizade: Guerra e Amizade"
 befriend_ongoing.0903.desc: "Enquanto nossos reinos se enfrentam em batalha, meu sonho de magnanimidade e companheirismo com [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] parece impossível, pelo menos por enquanto."
 befriend_ongoing.0903.a: "Vamos esperar por tempos melhores."
 befriend_ongoing.0903.a.tt: "Encerrei meu Plano de Fazer Amizade com [target.GetTitledFirstNameNoTooltip|l]"
 befriend_ongoing.1001.t: "Fazer Amizade: Respeito em Admiração"
 befriend_ongoing.1001.desc.startnormal: "Considerando as façanhas da minha vida, é natural que os outros me respeitem."
 befriend_ongoing.1001.desc.starthumble: "Embora eu raramente mencione isso, tenho algumas realizações das quais me orgulho."
 befriend_ongoing.1001.desc.end: "Estou convencid[ROOT.Char.Custom('ES_OA')] de que [target.GetTitledFirstName|l] também realizou algumas coisas que [target.GetHerHim] enchem de orgulho.\n\nTalvez eu devesse encomendar um pequeno poema comparando nossos feitos, para ilustrar que ambos somos cortados do mesmo tecido."
 befriend_ongoing.1001.a: "[target.GetSheHe|U] ficará muito impressionad[target.Custom('ES_OA')] com meus feitos!"
 befriend_ongoing.1001.b: "Vou me concentrar nas conquistas de [target.GetFirstNameNoTooltip]."
 befriend_ongoing.1001.c: "Vou garantir que #EMP todos#! saibam da minha grandeza!"
 befriend_ongoing.1002.t: "Fazer Amizade: Um Gestor de Generosidade"
 befriend_ongoing.1002.desc.start: "Deveria ser capaz de ajudar minha tentativa de fazer amizade com [target.GetTitledFirstName|l] ao presenteá-l com um presente.\n\n"
 befriend_ongoing.1002.desc.greedy: "Todo mundo adora presentes!"
 befriend_ongoing.1002.desc.malicious: "As pessoas são facilmente manipuladas com bugigangas brilhantes..."
 befriend_ongoing.1002.desc.benevolent: "Encontrar o presente perfeito para alguém pode realmente mostrar o quanto você se importa com essa pessoa."
 befriend_ongoing.1002.desc.generic: "\n\nSe isso me aproximar do meu objetivo, será um dinheiro bem gasto."
 befriend_ongoing.1002.d: "Vou encontrar algo verdadeiramente extravagante!"
 befriend_ongoing.1002.a: "Não é hora de ser econômico."
 befriend_ongoing.1002.b: "É o pensamento que conta."
 befriend_ongoing.1002.c: "Não, não quero parecer muito intens."
 befriend_ongoing.1003.t: "Fazer Amizade: O Inimigo do Meu Inimigo"
 befriend_ongoing.1003.desc: "Algo que [target.GetTitledFirstName|l] e eu compartilhamos é o ódio por [rival.GetTitledFirstName|l].\n\nMandar fazer uma efígie do meu inimig[rival.Custom('ES_OA')] e pendurá-la nas muralhas na próxima vez que [target.GetFirstNameNoTooltip] voltar para [barony.GetTitledFirstNameNoTier] seria uma mensagem poderosa."
 befriend_ongoing.1003.a: "E ele estará pegando fogo!"
 befriend_ongoing.1003.b: "Não preciso antagonizar ainda mais [rival.GetFirstNameNoTooltip]."
 befriend_ongoing.1004.t: "O Inimigo do Meu Inimigo"
 befriend_ongoing.1004.desc: "Em minha última visita a [barony.GetNameNoTooltip] [owner.Custom('ES_DelDela')] [owner.GetTitledFirstName|l], tive uma visão e tanto ao me aproximar da [barony.Custom('BaronyTownType')|l]. Das suas muralhas pendia uma efígie que reconheci imediatamente como a de noss[rival.Custom('ES_OA')] antig[rival.Custom('ES_OA')] inimig[rival.Custom('ES_OA')] comum, [rival.GetTitledFirstName|l]!\n\n[owner.GetFirstNameNoTooltip] me saudou aos gritos enquanto derramava piche fervente sobre \"[rival.GetFirstNameNoTooltip]\"."
 befriend_ongoing.1004.a: "Me alegra ver que pensamos igual sobre [rival.Custom('ES_ElElla')]!"
 befriend_ongoing.1005.t: "O Amigo do Meu Inimigo"
 befriend_ongoing.1005.desc: "O arauto hesita em compartilhar os rumores.\n\n“Parece que seus inimigos, [owner.GetTitledFirstName|l] e [target.GetTitledFirstName|l], têm queimado uma efígie sua pendurada nas muralhas de [barony.GetNameNoTooltip], enquanto zombavam do seu nome.”\n\nJuntos são dez vezes piores do que eram separados."
 befriend_ongoing.1005.a: "Eu sabia que tinha boas razões para odiá-los."
 befriend_ongoing.2001.t: "O calor da amizade"
 befriend_ongoing.2001.desc: "Eu pensei que teria que me esforçar para agradar [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] mas acabou sendo a pessoa mais simpática que já conheci!\n\n[target.GetFirstNameNoTooltip] me disse que sempre há espaço em seu coração para novas amizades."
 befriend_ongoing.2001.a: "Excelente. Vou deixar que venha até mim."
 befriend_ongoing.2001.b: "Não vou recusar esse tipo de convite!"
 befriend_ongoing.3001.t: "Fazer Amizade: Um Elo na Cadeia"
 befriend_ongoing.3001.desc: "[befriend_envoy.GetTitledFirstName], que está me ajudando em minha tentativa de me aproximar [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l], se ofereceu para atuar como mensageiro entre nós. [befriend_envoy.Custom('ES_ElElla')|U] acredita que pode me apresentar sob uma luz muito favorável."
 befriend_ongoing.3001.a: "[befriend_envoy.Custom('ES_ElElla')|U] deve abordar [target.GetFirstNameNoTooltip] diretamente."
 befriend_ongoing.3001.b: "Há muito em jogo para depender de [befriend_envoy.GetFirstNameNoTooltip]."
 befriend_ongoing.3001.tt: "#F [befriend_envoy.GetFirstName] buscará uma audiência com [target.GetFirstName]#!"
 befriend_ongoing.3002.t: "Um Arranjo Incomum"
 befriend_ongoing.3002.desc: "Não é estranho que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('befriend_envoy') )] [befriend_envoy.GetTitledFirstName|l] solicite uma audiência comigo, mas o motivo desta vez é, sim, estranho. Ele se proclamou enviad[befriend_envoy.Custom('ES_OA')] em nome da amizade [owner.Custom('ES_DelDela')] [owner.GetTitledFirstName|l]!"
 befriend_ongoing.3002.a: "Estranho, mas agradeço que me fale sobre [owner.GetFirstNameNoTooltip]."
 befriend_ongoing.3002.b: "Nenhum súdito meu atuará como enviado para outra pessoa!"
 befriend_ongoing.3003.t: "Fazer Amizade: O Enviado Relata"
 befriend_ongoing.3003.accepted_envoy: "[befriend_envoy.GetTitledFirstName] me trouxe notícias promissoras. [target.GetTitledFirstName] [befriend_envoy.GetHerHim] recebeu calorosamente como \"enviad[befriend_envoy.Custom('ES_OA')]\" em nome da minha amizade."
 befriend_ongoing.3003.dismissed_envoy: "Eu sabia que estava ultrapassando alguns limites ao usar [befriend_envoy.Custom('ES_AlAla')] mism[befriend_envoy.Custom('ES_OA')] [scheme.GetTargetCharacter.Custom2('RelationToMe', SCOPE.sC('befriend_envoy') )] [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l], mas esperava que [target.GetSheHe] entendesse a boa-fé por trás do gesto. Como eu estava enganado. Nunca deveria ter aceitado o plano [befriend_envoy.Custom('ES_DelDela')] [befriend_envoy.GetTitledFirstName|l]…"
 befriend_ongoing.3003.a: "À nossa amizade florescente!"
 befriend_ongoing.3003.b: "Terei que ser mais cuidados."
 befriend_ongoing.3007.t: "Fazer Amizade: Um Veredicto de [agent_speaking_highly.GetFaith.DivineRealm|U]"
 befriend_ongoing.3007.desc.conviction: "É um milagre! [agent_speaking_highly.GetTitledFirstName|l] teve uma visão de [agent_speaking_highly.GetFaith.HighGodName]. [agent_speaking_highly.GetSheHe|U] me assegura que [target.GetTitledFirstName|l] e eu somos divinamente ordenados a ser amigos!"
 befriend_ongoing.3007.desc.doubt: "[agent_speaking_highly.GetTitledFirstName] me contou sobre uma visão de [agent_speaking_highly.GetFaith.HighGodName]. Aparentemente, [target.GetTitledFirstName|l] e eu somos divinamente ordenados a ser amigos. Que vantajoso."
 befriend_ongoing.3007.a: "Contaremos a [target.GetFirstNameNoTooltip] sobre essa visão."
 befriend_ongoing.3007.b: "[agent_speaking_highly.GetFirstNameNoTooltip], vamos orar juntos em gratidão."
 befriend_ongoing.3009.t: "Fazer Amizade: Uma Boa Palavra"
 befriend_ongoing.3009.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))] percebeu meu esforço para impressionar [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] e agora veio até mim com uma sugestão.\n\n\"Acredito que a minha [spouse.Custom2('RelationToMe', SCOPE.sC('target'))] dá muito valor à minha palavra. Eu poderia lhe dizer o quanto acho você maravilhoso.\""
 befriend_ongoing.3009.a: "Ah, não esconda nada, meu bem."
 befriend_ongoing.3009.a.success: "As palavras de [spouse.GetFirstNameNoTooltip] influenciam [target.GetFirstNameNoTooltip]"
 befriend_ongoing.3009.a.failure: "[target.GetFirstNameNoTooltip] continua sem se deixar convencer[target.Custom('ES_OA')]"
 befriend_ongoing.3009.b: "Não, eu vou resolver isso."
 befriend_ongoing.3009.b.tt: "Não posso depender de outros para fazer amigos por mim."
 befriend_ongoing.3010.t: "Uma Boa Palavra"
 befriend_ongoing.3010.desc: "Ultimamente, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))] tem me falado bastante sobre o [spouse.Custom2('RelationToMe', SCOPE.sC('owner'))].\n\nDevo admitir que faz [owner.GetTitledFirstName|l] parecer alguém merecedor[owner.Custom('ES_EA')] do meu respeito."
 befriend_ongoing.3010.a: "Talvez eu devesse conhecer[owner.GetHerHim] melhor."
 befriend_ongoing.3011.desc: "\"[target.GetTitledFirstName|l] parece mais interessad[target.Custom('ES_OA')] em conhecer você agora\", me diz meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))]. Parece que o plano dele/dele funcionou perfeitamente!"
 befriend_ongoing.3011.a: "Sempre posso contar com você, [spouse.GetFirstNameNoTooltip]."
 befriend_ongoing.3012.desc: "Sinto dizer que, apesar dos meus esforços, minha [spouse.Custom2('RelationToMe', SCOPE.sC('target'))] continua sem estar convencida[target.Custom('ES_XA')] com você, me conta [spouse.GetTitledFirstName|l]. Parece que o plano dela no fim das contas não era tão bom."
 befriend_ongoing.3012.a: "Por que eu sempre confio nos outros?"
 befriend_ongoing.3014.t: "Uma Reputação Desagradável"
 befriend_ongoing.3014.desc: "Tenho notado que [owner.GetTitledFirstName|l] tem se mostrado estranhamente amigável comigo ultimamente. No entanto, quando contei isso ao seu [owner.Custom2('RelationToMe', SCOPE.sC('spouse'))], meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))] [spouse.GetFirstName], ele/ela zombou.\n\n[owner.GetFirstNameNoTooltip] não merece a sua amizade. Deixe-me lhe contar como [owner.Custom('ES_ElElla')] é de verdade..."
 befriend_ongoing.3014.a: "Quem saberia melhor?"
 befriend_ongoing.3015.t: "Fazer Amizade: Calúnia!"
 befriend_ongoing.3015.desc: "[target.GetTitledFirstName] está um pouco mais frio comigo, apesar de todos os meus esforços. Parece que ele/ela ouviu alguns rumores desagradáveis sobre mim e, para minha surpresa, vindo de seu [target.Custom2('RelationToMe', SCOPE.sC('spouse'))], meu/minha própri[spouse.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))]!\n\n[spouse.GetFirstName] parece indiferente. \"Eu apenas lhe disse a verdade, #EMP amor#!\"."
 befriend_ongoing.3015.a: "Como você pôde fazer isso?"
 befriend_ongoing.4000.t: "Fazer Amizade: Nós que Conhecemos a Guerra"
 befriend_ongoing.4000.desc: "Estou tentando fazer amizade com [target.GetTitledFirstName|l]. Sei que é um[target.Custom('ES_XA')] estudante dedicad[target.Custom('ES_OA')] ao estudo de assuntos militares, assim como eu. Com certeza, teríamos muito o que conversar."
 befriend_ongoing.4000.a: "Vou me aproximar de [target.Custom('ES_ElElla')]."
 befriend_ongoing.4000.a.tt: "#F Nossos interesses compartilhados podem nos aproximar#!"
 befriend_ongoing.4000.b: "Encontrarei uma maneira de aproveitá-lo."
 befriend_ongoing.4002.t: "Nós que Conhecemos a Guerra"
 befriend_ongoing.4002.desc: "[owner.GetTitledFirstName] se dirige a mim e menciona que compartilhamos o interesse por assuntos militares e que poderíamos trocar ideias. Parece bastante instruíd[owner.Custom('ES_OA')] em todos os aspectos da estratégia e da tática."
 befriend_ongoing.4002.a: "Finalmente, uma conversa interessante!"
 befriend_ongoing.4002.b: "[owner.GetTitledFirstNameNoTooltip]? Eu não acho."
 befriend_ongoing.4004.a.desc: "[target.GetTitledFirstName] e eu passamos um bom tempo discutindo cercos, envolvimentos, ataques de forragem, uso de arqueiros e o correto emprego de armas de cerco. Nós rimos bastante ao ver os curiosos ignorantes balançando a cabeça ao nos ouvirem."
 befriend_ongoing.4004.b.desc: "[target.GetTitledFirstName] respondeu friamente que na verdade não está interessado em assuntos militares. Mas eu sei que isso é mentira."
 befriend_ongoing.4004.a: "A guerra é realmente a mais nobre das artes."
 befriend_ongoing.4004.b: "Decepcionante."
 befriend_ongoing.4010.t: "Fazer Amizade: Os Sóis Gêmeos"
 befriend_ongoing.4010.desc: "Quando pergunto sobre [target.GetTitledFirstName|l], falam do seu bom humor e charme e da facilidade natural com que domina qualquer reunião social. Parece que temos algo em comum."
 befriend_ongoing.4010.a: "Dois sóis juntos terão o triplo do brilho!"
 befriend_ongoing.4012.t: "Os Sóis Gêmeos"
 befriend_ongoing.4012.desc: "[owner.GetTitledFirstName] está dando sinais evidentes de que gostaria de ser meu amigo. [owner.Custom('ES_ElElla')|U] parece um[owner.Custom('ES_XA')] socializador[owner.Custom('ES_XA')] nat[owner.Custom('ES_OA')] e seria natural que nossos talentos em comum nessa área nos aproximassem."
 befriend_ongoing.4012.a: "E está certo!"
 befriend_ongoing.4012.b: "Na verdade [owner.Custom('ES_ElElla')] não é tão interessante quanto pensa."
 befriend_ongoing.4014.a.desc: "Convidei [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] para nos encontrarmos em uma reunião social. Nos divertimos muito, assim como todos os demais. Foi agradável ver como todo o evento começou a girar naturalmente em torno de nós dois depois de apenas alguns minutos."
 befriend_ongoing.4014.b.desc: "[target.GetTitledFirstName] usou suas consideráveis habilidades sociais com grande efeito, dando uma resposta cruel e desprezível ao meu convite, transmitida através de dicas e sussurros de conhecidos em comum."
 befriend_ongoing.4014.a: "Como moscas ao redor de duas panelas de mel!"
 befriend_ongoing.4014.b: "Estou tão impressionad[ROOT.Char.Custom('ES_OA')] quanto ofendid[ROOT.Char.Custom('ES_OA')]."
 befriend_ongoing.4020.t: "Fazer Amizade: Nada a Discutir"
 befriend_ongoing.4020.desc: "Percebi que [target.GetTitledFirstName|l] tem praticamente a mesma disposição que eu, pois entende e aprecia a importância de manter nossas contas em ordem."
 befriend_ongoing.4020.a: "Conhece o número zero? Preciso descobrir!"
 befriend_ongoing.4022.t: "Nada a Discutir"
 befriend_ongoing.4022.desc: "[owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)|U] se dirigiu a mim, querendo discutir nosso interesse mútuo em administração e números. Um dos temas específicos que deseja discutir é o número zero."
 befriend_ongoing.4022.a: "Claro! Será muito esclarecedor!"
 befriend_ongoing.4022.b: "Esse número descreve adequadamente meu nível de interesse."
 befriend_ongoing.4024.a.desc: "[target.GetTitledFirstName] e eu falamos extensivamente sobre o número zero e sua importância e possibilidades em matemática e administração. Fico feliz por ter encontrado alguém que tem uma visão inteiramente positiva sobre números e compreende seu verdadeiro valor."
 befriend_ongoing.4024.b.desc: "[target.GetTitledFirstName] apenas respondeu que o número zero corresponde mais de perto ao seu nível de interesse em discutir isso comigo."
 befriend_ongoing.4024.a: "Às vezes, é bom falar sobre nada."
 befriend_ongoing.4024.b: "Mas minha decepção é infinita."
 befriend_ongoing.4030.t: "Fazer Amizade: A Dança dos Intrigantes"
 befriend_ongoing.4030.desc: "Dizem que [target.GetTitledFirstName|l] é bastante hábil em trapaças e manipulações. Talvez eu deva me aproximar de [target.Custom('ES_OA')] para conversar e descobrir se é um ponto em comum que possa nos aproximar.[target.Custom('ES_ElElla')] para conversar e averiguar se é um ponto sobre o qual possamos criar um vínculo."
 befriend_ongoing.4030.a: "Vou fazer isso, indiretamente e com astúcia."
 befriend_ongoing.4032.t: "A Dança dos Intrigantes"
 befriend_ongoing.4032.desc: "[owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)|U] insinuou por meios indiretos que deseja que sejamos amigos. Está claro que está fazendo isso como se fosse um jogo ou uma dança de intriga à qual sou convidado a responder indiretamente."
 befriend_ongoing.4032.a: "Vou dar a [owner.GetFirstNameNoTooltip] uma resposta positiva."
 befriend_ongoing.4032.b: "[owner.Custom('ES_ElElla')|U] é um[owner.Custom('ES_XA')] tol[owner.Custom('ES_OA')] e ficará sabendo disso."
 befriend_ongoing.4034.a.desc: "[target.GetTitledFirstName] respondeu positivamente aos meus sinais sutis, e acredito que isso nos aproximou um pouco mais. Ficou provado que temos algo em comum."
 befriend_ongoing.4034.b.desc: "[target.GetTitledFirstName] respondeu aos meus sinais de amizade de maneira muito insultante, embora sutil e indireta. Nem posso responder sem parecer um[ROOT.Char.Custom('ES_XA')] idiota."
 befriend_ongoing.4034.a: "Empregar um plano para fazer amizade com um intrigante."
 befriend_ongoing.4034.b: "Isso não é o que eu esperava."
 befriend_ongoing.4040.t: "Fazer Amizade: Grandes Mentes"
 befriend_ongoing.4040.desc: "[target.GetTitledFirstName] parece ser um[target.Custom('ES_XA')] verdadeir[target.Custom('ES_OA')] erudit[target.Custom('ES_OA')] , como eu. Certamente há muitos temas acadêmicos sobre os quais poderíamos conversar. Deveria me aproximar de [target.Custom('ES_ElElla')]."
 befriend_ongoing.4040.a: "Vamos ver o que acontece com isso."
 befriend_ongoing.4042.t: "Grandes Mentes"
 befriend_ongoing.4042.desc: "[owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] se dirigiu a mim, insinuando que gostaria de participar de uma discussão erudita sobre um tema de minha escolha. É óbvio que está tentando conquistar minha amizade."
 befriend_ongoing.4042.a: "Sim, deixe duas grandes mentes se encontrarem!"
 befriend_ongoing.4042.b: "O que poderia ter a dizer que seria interessante?"
 befriend_ongoing.4044.a.desc: "[target.GetTitledFirstName] e eu tivemos uma longa conversa sobre a natureza do conhecimento e outros assuntos filosóficos. Sinto que nossas mentes se conectaram e estamos mais próximos de nos tornarmos amigos."
 befriend_ongoing.4044.b.desc: "[target.GetTitledFirstName] deixou claro que não está interessado em discutir assuntos eruditos comigo. Houve um tom inconfundivelmente desdenhoso em sua resposta."
 befriend_ongoing.4044.a: "Grandes mentes pensam da mesma forma, afinal."
 befriend_ongoing.4044.b: "Decepcionante."
 befriend_ongoing.4050.t: "Fazer Amizade: Caixas de Fósforo"
 befriend_ongoing.4050.desc: "Há rumores de que [target.GetTitledFirstName|l] é, como eu, um[target.Custom('ES_XA')] expert[target.Custom('ES_OA')] em despertar os fogos do êxtase amoroso nos outros. Parece-me que deveríamos nos encontrar e comparar notas."
 befriend_ongoing.4050.a: "Será que mantém uma lista de suas conquistas?"
 befriend_ongoing.4052.t: "Caixas de Fósforo"
 befriend_ongoing.4052.desc: "[owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)|U] se dirigiu a mim, fazendo referência ao nosso interesse mútuo por sedução e aventuras amorosas. A [owner.Custom('ES_ElElla')] gostaria de nos reunir para trocar notas e experiências."
 befriend_ongoing.4052.a.wine: "Sim, vamos compartilhar histórias picantes com um copo de vinho!"
 befriend_ongoing.4052.a.tee: "Sim, vamos compartilhar histórias picantes!"
 befriend_ongoing.4052.b: "Ele realmente acha que pode se comparar a mim? Ha!"
 befriend_ongoing.4054.a.desc: "[target.GetTitledFirstName] e eu passamos horas conversando e comparando nossas conquistas amorosas. As estranhas e complicadas renderam melhores histórias do que as triviais, embora as últimas fossem mais numerosas."
 befriend_ongoing.4054.b.desc: "[target.GetTitledFirstName] não quis que nos víssemos e trocássemos histórias de nossas conquistas amorosas. Disse que não havia como me comparar com [target.GetSheHe]."
 befriend_ongoing.4054.a: "Descobrimos que ambos perdemos a conta há muito tempo."
 befriend_ongoing.4054.b: "Hah! A inveja é uma fera vil!"
 befriend_ongoing.4060.t: "Fazer Amizade: Lâminas Similares"
 befriend_ongoing.4060.desc: "As pessoas falam da habilidade considerável que [target.GetTitledFirstName|l] demonstra com uma espada na mão. Dizem que poucas pessoas conseguem se manter firmes por mais de alguns segundos sob seu ataque."
 befriend_ongoing.4060.a: "Devemos nos encontrar e duelar!"
 befriend_ongoing.4062.t: "Lâminas Similares"
 befriend_ongoing.4062.desc: "[owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)|U], um[owner.Custom('ES_XA')] devot[owner.Custom('ES_OA')] da espada, assim como eu, veio até mim, desejando travar um combate amistoso e, possivelmente, conversar sobre nosso tema favorito."
 befriend_ongoing.4062.a: "Uma excelente proposta!"
 befriend_ongoing.4062.b: "Não, ele/ela não merece o meu tempo."
 befriend_ongoing.4064.a.desc: "[target.GetTitledFirstName] e eu nos encontramos para um duelo, espadas em mãos. Depois de passarmos duas boas horas em nossa ágil dança de investidas e paradas, passamos mais três discutindo técnica e tática."
 befriend_ongoing.4064.b.desc: "[target.GetTitledFirstName] deixou bem claro, e de forma muito grosseira, que não tem interesse em me enfrentar em um combate de treinamento."
 befriend_ongoing.4064.a: "Poucos entendem a beleza interior da espada."
 befriend_ongoing.4064.b: "Assim fala um[target.Custom('ES_XA')] covarde."
 befriend_ongoing.4070.t: "Fazer Amizade: Histórias Selvagens"
 befriend_ongoing.4070.desc: "[target.GetTitledFirstName] é um[target.Custom('ES_XA')] caçador[target.Custom('ES_XA')] dedicad[target.Custom('ES_OA')], assim como eu. Tenho certeza de que teríamos muito sobre o que conversar e muitas experiências para criar laços."
 befriend_ongoing.4070.a: "Devemos nos encontrar e comparar nossas caçadas!"
 befriend_ongoing.4072.t: "Histórias Selvagens"
 befriend_ongoing.4072.desc: "[owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)|U] se aproximou de mim, desejando nos encontrar e discutir nossas experiências como caçadores. É uma oportunidade para compartilhar histórias das aventuras selvagens."
 befriend_ongoing.4072.a: "Qual foi a caça mais difícil de sua vida, eu me pergunto?"
 befriend_ongoing.4072.b: "Não tenho interesse nesse[target.Custom('ES_EA')] caçador de coelhos."
 befriend_ongoing.4074.a.desc: "[target.GetTitledFirstName] e eu passamos uma noite inteira conversando, trocando histórias e comparando experiências de várias caçadas."
 befriend_ongoing.4074.b.desc: "[target.GetTitledFirstName] respondeu apenas com desprezo à minha abordagem, me chamando de caçador de coelhos."
 befriend_ongoing.4074.a: "Tenho certeza de que exagerou em algumas ocasiões."
 befriend_ongoing.4074.b: "[target.Custom('ES_ElElla')] pode ser o coelho, então."
 befriend_ongoing.4080.t: "Fazer Amizade: Noites Selvagens"
 befriend_ongoing.4080.desc: "[target.GetTitledFirstName] é um[target.Custom('ES_XA')] renomado festeiro, como eu. Acho que nos divertiríamos bastante se organizássemos uma pequena festa."
 befriend_ongoing.4080.a: "Isso deve ser feito!"
 befriend_ongoing.4082.t: "Noites Selvagens"
 befriend_ongoing.4082.desc: "[owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)|U] me perguntou se eu gostaria de nos reunirmos para sair para uma farra e nos divertir. Ao que parece, é um[owner.Custom('ES_XA')] festeiro de certa notoriedade."
 befriend_ongoing.4082.a: "Isso será divertido."
 befriend_ongoing.4082.b: "[owner.GetFirstNameNoTooltip]? Prefiro beber sozinh."
 befriend_ongoing.4084.a.desc: "[target.GetTitledFirstName] e eu passamos um dia e uma noite (ou foram dois?) de farra. Só consigo me lembrar claramente de onde começou e de onde terminou, mas por [ROOT.Char.GetFaith.HighGodName] que nós nos divertimos muito!"
 befriend_ongoing.4084.b.desc: "[target.GetTitledFirstName] declarou que prefere beber sozinh a passar tempo comigo."
 befriend_ongoing.4084.a: "Não é uma má maneira de passar... algum tempo."
 befriend_ongoing.4084.b: "Parece que tive uma estreita escapada, então."
 befriend_ongoing.4090.t: "Fazer Amizade: Uma Sinfonia de Dor"
 befriend_ongoing.4090.desc: "Tenho entendido que [target.GetTitledFirstName|l] é, como eu, um[target.Custom('ES_XA')] estudante dedicad[target.Custom('ES_OA')] às delicadas artes da dor e da coerção. Seria interessante reunir-me com [target.GetSheHe] e discutir métodos e aplicações."
 befriend_ongoing.4090.a: "Precisaremos de ferramentas e sujeitos, é claro."
 befriend_ongoing.4092.t: "Uma Sinfonia de Dor"
 befriend_ongoing.4092.desc: "[owner.GetTitledFirstName] declarou que deseja se encontrar comigo para discutirmos nosso interesse mútuo pelas delicadas artes da dor e coerção."
 befriend_ongoing.4092.a: "Uma excelente ideia. Eu levarei minhas ferramentas."
 befriend_ongoing.4092.b: "Não tenho nada a dizer a es[target.Custom('ES_EA')] tosc[target.Custom('ES_OA')] arranca-unhas."
 befriend_ongoing.4094.a.desc: "[target.GetTitledFirstName] e eu passamos um dia inteiro e uma noite na companhia de alguns criminosos pobres e apressadamente reunidos, discutindo e aplicando várias técnicas e fazendo planos para experimentos futuros."
 befriend_ongoing.4094.b.desc: "[target.GetTitledFirstName] respondeu ao meu convite apenas insinuando que meus métodos são toscos demais e que não tem qualquer desejo de se associar comigo."
 befriend_ongoing.4094.a: "Isso foi inspirador e esclarecedor."
 befriend_ongoing.4094.b: "Seria um prazer mostrar a ele/ela exatamente o quão grosseiros são…"
 befriend_ongoing.4100.t: "Fazer Amizade: O Inimigo do Meu Inimigo"
 befriend_ongoing.4100.desc: "A guerra traz terrores e também oportunidades de glória. Outra coisa que ela traz são os laços que se formam entre aqueles que lutam do mesmo lado. \n\nParece que [befriend_ongoing_4100_text_scope.GetTitledFirstName|l] e eu encontramos um interesse em comum em nossos esforços contra [befriend_ongoing_4100_enemy.GetTitledFirstName|l]."
 befriend_ongoing.4100.a: "A guerra forjará amizades."
 befriend_ongoing.4110.t: "Objetivos Comuns"
 befriend_ongoing.4110.desc: "Interagindo com [befriend_ongoing_4110_text_scope.GetTitledFirstName|l] como membro da mesma facção, descobri que laços são inevitavelmente formados entre pessoas que trabalham para um objetivo comum de longo prazo."
 befriend_ongoing.4110.a: "Que todos prosperemos."
 befriend_ongoing.4300.t: "Fazer Amizade: Espetáculo do Cadafalso"
 befriend_ongoing.4300.a: "A justiça será servida, justiça e medo."
 befriend_ongoing.4300.b: "Deve haver outra maneira."
 befriend_ongoing.4300.desc: "Entendo que [target.GetTitledFirstName|l] governa, assim como eu, com uma justiça temível. Deveria convidar[target.GetHerHim] a sentar-se ao meu lado na próxima execução pública."
 befriend_ongoing.4300.a.tt: "#F Enviar uma carta para #!"
 befriend_ongoing.4302.t: "Convite para uma Execução"
 befriend_ongoing.4302.desc: "[owner.GetTitledFirstName] me convidou para um assento de honra ao seu lado para a próxima execução pública."
 befriend_ongoing.4302.c: "Você me considera um tolo? Não cairei tão facilmente em suas garras!"
 befriend_ongoing.4302.a: "Uma excelente ideia. Ficarei honrad em observar como você administra a justiça."
 befriend_ongoing.4302.b: "Tenho coisas mais importantes para fazer do que assistir você lidar com criminosos insignificantes."
 befriend_ongoing.4304.t: "Fazer Amizade: Uma Exibição Temível"
 befriend_ongoing.4304.a.desc: "[target.Custom('ES_ElLa')|U] [target.GetTitledFirstName|l] veio à minha corte para assistir ao espetáculo de uma execução pública e ao meu senso de justiça. Esta é a minha chance de impressionar[target.GetHerHim] com minha severidade. Qual prisioneiro devo executar?"
 befriend_ongoing.4304.b.desc: "[target.GetTitledFirstName] respondeu ao meu convite, declarando que não tem desejo de se associar comigo e conceder legitimidade à minha temível reputação."
 befriend_ongoing.4304.a: "É hora de morrer, [prisoner_a.GetFirstNameNoTooltip]."
 befriend_ongoing.4304.b: "Chegou a sua hora, [prisoner_b.GetFirstNameNoTooltip]."
 befriend_ongoing.4304.c: "Fora com a cabeça de [prisoner_c.GetFirstNameNoTooltip]!"
 befriend_ongoing.4304.d: "Estou me sentindo generos[ROOT.Char.Custom('ES_OA')]; hoje ninguém vai morrer."
 befriend_ongoing.4304.d.tt: "#F [target.GetTitledFirstName] pode ver minha misericórdia como fraqueza#!"
 befriend_ongoing.4304.e: "Um dia seu pescoço pode sentir a mordida do meu aço."
 befriend_ongoing.4304.e.tt: "#F [owner.GetTitledFirstName] não deseja visitar minha corte#!"
 befriend_ongoing.4304.f: "Mate todos eles!"
 befriend_ongoing.5001.t: "Fazer Amizade: Um Cético e um Fanático"
 befriend_ongoing.5001.desc: "Meus esforços para diminuir a tensão entre [target.GetTitledFirstName|l] e eu são dificultados pelo fato de que [target.Custom('ES_ElElla')] continua condenando minha falta de piedade. As tentativas de me persuadir pouco fazem pela minha convicção…"
 befriend_ongoing.5001.a: "Visitarei algum local de culto se isso agradar a [target.GetFirstNameNoTooltip]."
 befriend_ongoing.5001.b: "Podemos encontrar outras coisas em comum."
 befriend_ongoing.5002.t: "Fazer Amizade: Uma Questão de Confiança"
 befriend_ongoing.5002.desc: "Seria muito mais fácil agradar mais [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] se acreditasse na honestidade da minha tentativa! Sei que [target.Custom('ES_ElElla')] duvida da minha sinceridade quando me dá respostas vagas e se afasta da conversa…"
 befriend_ongoing.5002.a: "Serei insistente, mas não mentirei sobre quem sou."
 befriend_ongoing.5002.b: "Infelizmente, as mentiras são mais convincentes que a verdade."
 befriend_ongoing.5003.t: "Fazer Amizade: Uma Nuvem Escura em um Dia Ensolarado"
 befriend_ongoing.5003.desc: "Tudo que eu quero é fazer [target.GetTitledFirstName|l] sentir a alegria de estar perto de outras pessoas! No entanto, quanto mais eu tento, mais se afasta de mim. Agora [target.Custom('ES_ElElla')] quase não sai de seus aposentos…"
 befriend_ongoing.5003.c: "Prestarei atenção e tentarei ser compreensiv[ROOT.Char.Custom('ES_OA')]."
 befriend_ongoing.5003.a: "[target.Custom('ES_ElElla')|U] tem que se recompor!"
 befriend_ongoing.5003.b: "Se espaço é o que precisa, eu o darei a ele."
 befriend_ongoing.5004.t: "Fazer Amizade: Não do Agrado de seu Gosto"
 befriend_ongoing.5004.desc: "Nada me anima mais do que um [ROOT.Char.Custom('FavoriteTreat')]. Como prova das minhas boas intenções, enviei [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] uma porção preparada pelo meu cozinheiro pessoal. \n\nNo entanto, o gesto acabou sendo um desastre, pois [target.Custom('ES_ElElla')] mandou um servo jogá-lo fora sem nem sequer prová-lo..."
 befriend_ongoing.5004.a: "Vou me desculpar por meus excessos."
 befriend_ongoing.5004.b: "Que [target.Custom2('InsultNoun', ROOT.Char)] ingrat[target.Custom('ES_OA')]!"
 befriend_ongoing.5005.t: "Fazer Amizade: Chamado à Ação"
 befriend_ongoing.5005.desc: "Estou tentando fazer com que [target.GetTitledFirstName|l] me entenda melhor, mas só consigo entender[target.Custom('ES_LoLa')] cada vez menos. Qual é sua motivação, onde está sua ambição? Parece que não se importa se nada nunca mudar."
 befriend_ongoing.5005.a: "Eu posso não concordar, mas posso aceitar."
 befriend_ongoing.5005.b: "Uma pessoa assim vale a pena conhecer?"
 befriend_ongoing.5006.t: "Fazer Amizade: Superar Diferenças"
 befriend_ongoing.5006.desc: "Tenho procurado e procurado, mas [target.GetTitledFirstName|l] e eu parecemos não ter absolutamente nada em comum.\n\nSem terreno comum, como posso sequer começar a construir uma amizade?"
 befriend_ongoing.5006.a: "Com esforço, vou chegar a entender[target.GetHerHim]."
 befriend_ongoing.5006.b: "Eventualmente algo surgirá, com certeza."
 befriend_ongoing.5007.t: "Fazer Amizade: Conhecimento ao Alcance"
 befriend_ongoing.5007.opening: "[target.GetTitledFirstName] e eu temos pouco em comum, o que tem dificultado minha comunicação com [target.Custom('ES_ElElla')].\n\nNo entanto, com algum esforço, eu poderia aprender o suficiente para manter uma conversa"
 befriend_ongoing.5007.martial: "sobre estratégia e linhas de suprimento."
 befriend_ongoing.5007.diplomacy: "com etiqueta e tradição de corte adequadas."
 befriend_ongoing.5007.intrigue: "sobre o poder inerente aos segredos. Todo tipo de segredos."
 befriend_ongoing.5007.stewardship: "sobre as complexidades dos vários contratos feudais do reino."
 befriend_ongoing.5007.learning: "sobre a natureza metafísica da alma."
 befriend_ongoing.5007.a: "O assunto merece tanto estudo quanto posso me permitir."
 befriend_ongoing.5007.a.success: "Você ganhou novos conhecimentos."
 befriend_ongoing.5007.a.failure: "Esse foi o curso de estudo errado."
 befriend_ongoing.5007.b: "Eu sempre posso relaxar em vez disso."
 befriend_ongoing.6001.t: "Liberdade e Amizade"
 befriend_ongoing.6002.t: "Liberdade e Amizade"
 befriend_ongoing.6002.desc: "[owner.GetTitledFirstName] tem sido estranhamente amigável comigo ultimamente.\n\nSe essa mudança de tom indicar uma mudança de caráter, talvez eu possa convencer[owner.Custom('ES_LoLa')] de que liberte meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('prisoner'))], [prisoner.GetTitledFirstName|l] do cativeiro, não?"
 befriend_ongoing.6002.a: "Se ele realmente quer ser meu amig[owner.Custom('ES_OA')] de verdade…"
 befriend_ongoing.6002.a.tt: "Se [owner.GetFirstNameNoTooltip] aceitar:"
 befriend_ongoing.6002.b: "[prisoner.GetFirstNameNoTooltip] pode esperar um pouco mais."
 befriend_ongoing.6002.b.tt: "#F [owner.GetFirstNameNoTooltip] se [prisoner.GetHerHim] puede quedar#!"
 befriend_ongoing.6004.desc: "Interpretando minha recente simpatia como um sinal, [target.GetTitledFirstName|l] veio até mim para se interessar por um de meus prisioneiros.\n\n\"Ficaria muito contente se vocês libertassem meu [target.Custom2('RelationToMe', SCOPE.sC('prisoner'))], [prisoner.GetTitledFirstName|l], de sua [prisoner.Custom('PrisonTypeCell')]\", diz, [ROOT.Char.Custom2('QuirkPPPosOrNeg', SCOPE.sC('target'))]."
 befriend_ongoing.6004.a: "Um jeito barato de ganhar as boas graças de [target.GetFirstNameNoTooltip]."
 befriend_ongoing.6004.b: "Não, mas posso deixá-lo um pouco mais confortável[prisoner.Custom('ES_OA')]."
 befriend_ongoing.6004.c: "Libertar [prisoner.GetFirstNameNoTooltip]? Jamais!"
 befriend_ongoing.6005.desc: "[owner.GetTitledFirstName] ofereceu misericórdia para m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('prisoner'))]! [prisoner.GetTitledFirstName|l] finalmente está seguro."
 befriend_ongoing.6005.a: "Bem-vind[prisoner.Custom('ES_OA')]."
 befriend_ongoing.6006.desc: "Apesar de suas pretensões de amizade, [owner.GetTitledFirstName|l] se recusou a libertar [prisoner.GetFirstNameNoTooltip]."
 befriend_ongoing.6006.a: "Há outros meios, [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('prisoner'))] meu[prisoner.Custom('ES_OA')]."
 befriend_ongoing.6007.desc: "Embora [owner.GetTitledFirstName|l] tenha passado muito tempo explicando, com pesar, por que não pode libertar meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('prisoner'))]. Pelo menos [prisoner.GetTitledFirstName|l] foi transferid[prisoner.Custom('ES_OA')] para aposentos muito mais confortáveis."
 befriend_ongoing.6007.a: "Um dia você será livre novamente, m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('prisoner'))]."
 befriend_ongoing.6008.desc: "Parece que minha libertação do cativeiro pelas mãos de [owner.GetTitledFirstName|l] foi orquestrada por m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target'))], [target.GetTitledFirstName|l]!"
 befriend_ongoing.6008.a: "Não posso agradecer o suficiente, [target.GetFirstNameNoTooltip]."
 befriend_ongoing.6009.t: "Fazer Amizade: Boa Vontade"
 befriend_ongoing.6009.desc: "Uma promessa de dedicação enviará uma mensagem forte sobre minhas boas intenções em relação a [target.GetTitledFirstName|l].\n\nQualquer pessoa aprecia um favor poderoso."
 befriend_ongoing.6009.a: "A promessa será oficial e cerimoniosa!"
 befriend_ongoing.6009.b: "Aseguremo-nos de que [target.Custom('ES_ElElla')] se lembre da promessa todos os dias."
 befriend_ongoing.6009.c: "É melhor evitar coisas assim."
 befriend_ongoing.6009.c.tt: "#F Eu não vou sofrer nenhum tipo de dívida#!"
 befriend_ongoing.6010.t: "Boa Vontade"
 befriend_ongoing.6010.desc: "Para minha surpresa,[ROOT.Char.Custom2('RelationToMe', SCOPE.sC('owner'))] [owner.GetTitledFirstName|l] com a promessa de que me fornecerá tudo o que eu precisar."
 befriend_ongoing.6010.a: "E o que [owner.Custom('ES_ElElla')] ganha com esta promessa?"
 befriend_ongoing.6011.desc: "Embora [target.GetTitledFirstName|l] me deva um favor importante, seria melhor dar ênfase a uma amizade equilibrada.\n\nE [target.Custom('ES_ElElla')] também — sem dúvida — ficaria imensamente agradecid[target.Custom('ES_OA')] se eu deixar claro que não espero que retribua o favor."
 befriend_ongoing.6011.a: "Amigos dão de bom grado, não por obrigação."
 befriend_ongoing.6011.b: "O favor que eles me devem não pode ser apenas amizade eterna?"
 befriend_ongoing.6011.b.tt: "#F Aparentemente, não é assim que a amizade funciona#!"
 befriend_ongoing.6012.desc: "Desde que a promessa foi feita, fiquei nervos[ROOT.Char.Custom('ES_OA')] com o que [owner.GetTitledFirstName|l] poderia exigir como pagamento pelo favor que devo a ele. No entanto, [owner.Custom('ES_ElElla')] me fez saber agora que considerará minha dívida quitada, contanto que eu pense em [owner.GetSheHe] de forma favorável."
 befriend_ongoing.6012.a: "O que espera tirar disso?"
 befriend_ongoing.6013.desc: "Parece haver uma certa desavença entre [target.GetTitledFirstName|l] e eu, causada pelo pequeno detalhe de que estou chantageando [target.GetHerHim].\n\nClaro, eu poderia abandonar meus esforços para que [target.GetSheHe] saiba que minhas intenções são — no fim das contas — apenas boas."
 befriend_ongoing.6013.a: "A amizade sempre será mais poderosa do que a coerção."
 befriend_ongoing.6013.b: "Eu não posso abrir mão da minha única vantagem!"
 befriend_ongoing.6014.desc: "Que alívio imenso! [owner.GetTitledFirstName|l] jurou solenemente, por tudo o que é sagrado, que deixará de me chantagear.\n\nNão sei a que isso se deve, mas sinto que finalmente posso voltar a respirar."
 befriend_ongoing.6014.a: "Agradeço a [ROOT.Char.GetFaith.HighGodNameAlternate]!"
 befriend_ongoing.6015.t: "Fazer Amizade: Oferecendo Alívio"
 befriend_ongoing.6015.opening: "Meus esforços para me aproximar de [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] têm sido difíceis, em grande parte por causa da pressão com a qual [target.Custom('ES_ElElla')].\n\nTalvez fosse útil em mais de uma maneira se eu me assegurasse de que [target.Custom('ES_ElElla')] tivesse um dia por conta própria, para que"
 befriend_ongoing.6015.malicious: "passar algum tempo nos campos, rindo da sujeira e da falta de jeito dos camponeses."
 befriend_ongoing.6015.benevolent: "distribuir doações para asilos — ou nobres menos afortunados."
 befriend_ongoing.6015.dominant: "fazer uma cavalgada com uma patrulha militar, garantindo que mantenham a ordem apropriadamente."
 befriend_ongoing.6015.submissive: "se dedicar à oração e contemplação, longe das demandas dos outros."
 befriend_ongoing.6015.extroverted: "passar um tempo com cortesãos despreocupados, longe de salas de conselho enfadonhas e registros administrativos empoeirados."
 befriend_ongoing.6015.introverted: "passar um tempo longe de cortesãos e conselheiros exigentes, permitindo um momento de paz raro."
 befriend_ongoing.6015.emotional: "tirar da cabeça os assuntos de governo assistindo a uma apresentação no/a [barony.Custom('BaronyTownType')|l] de [barony.GetNameNoTooltip]."
 befriend_ongoing.6015.levelheaded: "ganhar um pouco de distância e perspectiva para reavaliar as prioridades."
 befriend_ongoing.6015.a: "Isso exigirá muito, mas valerá a pena."
 befriend_ongoing.6015.b: "Já tenho problemas suficientes para lidar."
 befriend_ongoing.6016.t: "Oferecendo Alívio"
 befriend_ongoing.6016.opening: "Para minha surpresa, [owner.GetTitledFirstName|l] entrou em contato com meus conselheiros para arranjar um dia só para mim,[ROOT.Char.Custom('ES_OA')] para aliviar um pouco da pressão que tenho sentido.\n\nNo final, passei-o seguindo a sugestão de [owner.Custom('ES_DelDela')] [owner.GetFirstName] pessoalmente e"
 befriend_ongoing.6016.malicious: "cavalgando pelos campos, encontrando diversão na sujeira e na falta de jeito dos camponeses."
 befriend_ongoing.6016.benevolent: "distribuindo doações entre asilos e nobres menos afortunados."
 befriend_ongoing.6016.dominant: "cavalgando com uma patrulha militar, tomando o controle da ordem em meu reino diretamente."
 befriend_ongoing.6016.submissive: "ficando sozinho em oração e contemplação, longe das demandas dos outros, mas [ROOT.Char.GetFaith.HighGodName]."
 befriend_ongoing.6016.extroverted: "na companhia de cortesãos despreocupados, longe de salas de conselho entediantes e registros administrativos empoeirados."
 befriend_ongoing.6016.introverted: "bem longe de cortesãos e conselheiros exigentes, permitindo um momento raro de paz."
 befriend_ongoing.6016.emotional: "vou tirar a mente de outras coisas além da governança assistindo a uma peça no(a) [barony.Custom('BaronyTownType')|l] de [barony.GetNameNoTooltip]."
 befriend_ongoing.6016.levelheaded: "obtendo alguma distância e perspectiva para reavaliar minhas prioridades."
 befriend_ongoing.6016.a: "Eu precisava disso."
 befriend_ongoing.6017.t: "Fazer Amizade: Desenvolvimentos Amigáveis"
 befriend_ongoing.6017.desc: "Existem muitas diferenças entre [target.GetTitledFirstName|l] e eu. Uma delas é o estado um tanto lamentável de [county.GetNameNoTooltip].\n\nNo entanto, talvez alguns dos métodos que usamos em [owner_county.GetNameNoTooltip] também possam ser úteis em [county.GetNameNoTooltip]. [target.GetFirstNameNoTooltip] deixou claro que um projeto de desenvolvimento de terra bem financiado seria muito apreciado..."
 befriend_ongoing.6017.a: "Um plano brilhante!"
 befriend_ongoing.6017.b: "Embora a amizade de [target.GetFirstNameNoTooltip] valha seu peso em ouro…"
 befriend_ongoing.6017.b.tt: "#F … no pesa tanto.#!"
 befriend_ongoing.6018.t: "Desenvolvimentos Amigáveis"
 befriend_ongoing.6018.desc: "Levando minhas sugestões sutis como encorajamento ativo, [owner.GetTitledFirstName|l] financiou nada menos que um projeto de irrigação em larga escala em [county.GetNameNoTooltip]!\n\nPode ser uma ultrapassagem de limites de várias maneiras, mas com as técnicas empregadas em [owner_county.GetNameNoTooltip], [county.GetNameNoTooltip] poderia se tornar mais próspero do que nunca!"
 befriend_ongoing.6018.a: "Não convencional, mas com certeza eu acolho!"
 befriend_ongoing.6019.t: "Fazer Amizade: Dilema de Conversa"
 befriend_ongoing.6019.desc: "Estou falando de [ROOT.Char.Custom('education_conversation_subject')] com meu/minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target') )] [target.GetTitledFirstName|l] e meu/minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('opinion_target') )] [opinion_target.GetTitledFirstName|l] quando percebo que [target.GetFirstNameNoTooltip] está completamente perdido(a) [target.Custom('ES_OA')] em relação ao assunto...\n\nTento com todas as forças não fazer[target.GetHerHim] parecer um[target.Custom('ES_XA')] idiota, mas fico congelado(a)[ROOT.Char.Custom('ES_OA')] quando [opinion_target.GetTitledFirstNameNoTooltip|l] nos pede que expliquemos uma coisa."
 befriend_ongoing.6019.a: "Deveria explicá-lo [target.GetFirstNameNoTooltip], possui uma visão aguçada!"
 befriend_ongoing.6019.b: "Agora, me ouça..."
 befriend_ongoing.6019.c: "Eu acho que isso seria melhor resolvido por uma discussão em grupo!"
 befriend_ongoing.9001.t: "Fazer Amizade: Um Encontro Fortuito"
 befriend_ongoing.9001.desc: "[target.GetTitledFirstName] está viajando e passará algumas noites na mansão de um dos meus barões. Essa pode ser a oportunidade que eu estava esperando!"
 befriend_ongoing.9001.a: "Preparem meu séquito, partimos imediatamente!"
 befriend_ongoing.9001.b: "Eu temo que o momento não seja oportuno..."
 befriend_ongoing.9100.t: "Fazer Amizade: Prejudicando Relações"
 befriend_ongoing.9100.desc: "Acabo de receber as notícias mais inquietantes! Meu [scoped_rival.Custom2('InsultAdjective', ROOT.Char)] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('scoped_rival'))], [scoped_rival.Custom('ES_ElLa')] [scoped_rival.GetTitledFirstName|l], contou falsos rumores sobre mim para [target.GetFirstName], afirmando que meu desejo de conquistar a confiança dele não passa de uma tentativa cínica de me aproveitar de [target.GetSheHe]."
 befriend_ongoing.9100.a: "Absurdo! Ninguém acreditaria em tais mentiras."
 befriend_ongoing.9100.b: "Não permitirei que manche meu bom nome!"
 befriend_ongoing.9100.b.success.desc.tt: "Persuadi [target.GetFirstNameNoTooltip]"
 befriend_ongoing.9100.b.success.desc.toast: "[target.GetFirstName] foi persuadid pelo meu apelo"
 befriend_ongoing.9100.b.failure.desc.tt: "Os rumores de [scoped_rival.GetFirstNameNoTooltip] continuam se espalhando"
 befriend_ongoing.9100.c: "Melhor não lhe dar atenção nenhuma."
 befriend_ongoing.9101.t: "Fazer Amizade: Assistência Amigável"
 befriend_ongoing.9101.desc: "Meu prezad[scoped_friend.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('scoped_friend') )] [scoped_friend.GetFirstName] soube do meu desejo de melhorar minha posição com [target.GetTitledFirstName|l] e me ofereceu sua ajuda.\n\nEle me garante que [scoped_friend.Custom('ES_ElElla')] e [target.GetFirstNameNoTooltip] são pessoas semelhantes. [scoped_friend.GetFirstNameNoTooltip] sabe exatamente o que preciso fazer para conquistar sua confiança."
 befriend_ongoing.9101.a: "Por favor, me diga!"
 befriend_ongoing.9101.b: "Obrigado, mas eu não preciso de ajuda."
 befriend_ongoing.9102.desc: "Ultimamente, [owner.GetFirstName] só consegue pensar em uma coisa. Está totalmente dedicad[owner.Custom('ES_OA')] a conquistar a confiança de [target.GetFirstName], então decidi dar uma mão.\n\n[owner.GetFirstNameNoTooltip] ficou encantad[owner.Custom('ES_OA')] de receber minha opinião e afirmou que nunca esqueceria meu gesto gentil."
 befriend_ongoing.9102.a: "Não é para isso que os amigos servem?"
 befriend_ongoing.9103.t: "Fazer Amizade: Terríveis Mal-Entendidos"
 befriend_ongoing.9103.vassal.desc: "Eu esperava fazer uma grande surpresa [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] com uma grande festa em sua homenagem, mas [target.Custom('ES_ElElla')] decidiu se retirar da presença no último momento.\n\nParece que pensou que minha surpresa era, na verdade, parte de uma conspiração para assassinar[target.GetHerHim]!"
 befriend_ongoing.9103.ruler.desc: "Recentemente enviei um mensageiro à corte [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] para relatar as riquezas e o poderio de [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip] com a esperança de ganhar seu respeito.\n\nNo entanto, segundo o relatório deste mensageiro, parece que lhe dei uma impressão muito diferente. Ele acha que estou ameaçando invadir seu [target.GetPrimaryTitle.GetNameNoTierNoTooltip] a menos que se submeta a mim!"
 befriend_ongoing.9103.a: "Bem, se eu não posso ter amor…"
 befriend_ongoing.9103.b: "Talvez seja necessário pedir desculpas."
 befriend_ongoing.9104.t: "Fazer Amizade: Oferta Amigável"
 befriend_ongoing.9104.desc: "Qual melhor maneira de me tornar querido por um[target.Custom('ES_XA')] [target.GetWomanMan] sant[target.Custom('ES_OA')] do que fazer uma demonstração pública de devoção a [owner.GetFaith.HighGodName]?\n\nFico imaginando qual seria o gesto mais apropriado para a ocasião..."
 befriend_ongoing.9104.a: "Uma humilhação pública deve resolver."
 befriend_ongoing.9104.b: "Farei uma grande doação ao seu [target.GetFaith.HouseOfWorship]."
 befriend_ongoing.9104.c: "O sangue dos inocentes mostrará minha convicção!"
 befriend_ongoing.9104.d: "Meu sofrimento pelo amor de [owner.GetFaith.HighGodNamePossessive]!"
 befriend_ongoing.9104.e: "E se eu me situar em seu altar?"
 befriend_ongoing.9104.e.tt: "#F Me uniré [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] en santa comunión#!"
 befriend_ongoing.9104.f: "Que meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('scoped_mate') )] sacie sua sede!"
 befriend_ongoing.9104.f.tt: "#F [scoped_mate.GetFirstName] intercederá com [target.GetTitledFirstName|l] em meu nome#!"
 befriend_ongoing.9104.g: "Me dedicar ao [target.GetFaith.HouseOfWorship|U]."
 befriend_ongoing.9104.h: "Dedicarei meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('scoped_monk') )] a uma vida de oração."
 befriend_ongoing.9104.z: "Pensando bem..."
