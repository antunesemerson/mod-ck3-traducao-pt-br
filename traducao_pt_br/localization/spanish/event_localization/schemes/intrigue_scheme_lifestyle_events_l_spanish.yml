l_spanish:
 intrigue_scheme_lifestyle.1001.t: "Disciplina e Lealdade"
 intrigue_scheme_lifestyle.1001.desc: "Sabendo como os soldados agem entre si e com que liberdade informações e boatos circulam, me veio uma ideia.\n\nSe alguns dos meus soldados se infiltrassem no exército [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l], poderiam me dar uma perspectiva diferente sobre seus planos."
 intrigue_scheme_lifestyle.1001.a: "É hora de [target.GetFirstNameNoTooltip] conseguir alguns novos recrutas."
 intrigue_scheme_lifestyle.1001.a.tt: "#F Os soldados compartilham fofocas rapidamente... Eu poderia aprender muito, contanto que meus agentes evitem problemas.#!\n"
 intrigue_scheme_lifestyle.1001.b: "Não, é muito arriscado."
 intrigue_scheme_lifestyle.1001.b.tt: "#F Eu não vou arriscar onde realmente estão as lealdades de um soldado comum.#!\n"
 intrigue_scheme_lifestyle.1002.t: "Disciplina e Lealdade"
 intrigue_scheme_lifestyle.1002.desc: "Acabei de receber a notícia de que os soldados que enviei para se infiltrarem no exército [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] foram descobertos! Quem sabe que tipo de punição — ou pior, interrogatório! — eles estão sofrendo neste exato momento."
 intrigue_scheme_lifestyle.1002.a: "É melhor que eles não revelem nenhum dos meus planos!"
 intrigue_scheme_lifestyle.3001.t: "Hábitos Regulares"
 intrigue_scheme_lifestyle.3001.desc_agents: "Meus agentes perceberam que m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target'))], o [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('target'))] [target.GetTitledFirstName|l], parece ter alguns hábitos bastante regulares.\n\nSe esses hábitos forem observados, eles podem ser a chave para uma descoberta importante..."
 intrigue_scheme_lifestyle.3001.desc: "Percebi que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target'))] , [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('target'))] [target.GetTitledFirstName|l] mantém uma rotina bastante regular. Se pudéssemos observar esses hábitos, eles também poderiam ser a chave para um grande avanço…"
 intrigue_scheme_lifestyle.3001.a: "Vou estudar pessoalmente os hábitos dele."
 intrigue_scheme_lifestyle.3001.a_agent: "Quero que alguém [target.GetHerHim] vigie a todo momento!"
 intrigue_scheme_lifestyle.3001.a.tt: "#F Claro que é uma empreitada arriscada...#!"
 intrigue_scheme_lifestyle.3001.b: "É um risco muito grande."
 intrigue_scheme_lifestyle.3001.b.tt: "#F Podría darse cuenta de que [target.GetHerHim] observan!#!"
 intrigue_scheme_lifestyle.3101.t: "Totalmente Informado"
 intrigue_scheme_lifestyle.3101.desc: "É fácil ignorar o pessoal de serviço de uma corte, enquanto ouvem conversas, limpam e circulam pelos corredores sem serem notados...\n\nIsso também ocorre na corte do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target'))] [target.GetTitledFirstName|l], e isso pode ser uma oportunidade."
 intrigue_scheme_lifestyle.3101.a: "Alguns serão convencidos a deixar informações escaparem para meus agentes."
 intrigue_scheme_lifestyle.3101.a.tt: "#F Informantes podem me fornecer informações inestimáveis, mas também são amadores, com todos os riscos que isso implica...#!"
 intrigue_scheme_lifestyle.3101.b: "O risco é muito grande!"
 intrigue_scheme_lifestyle.3101.b.tt: "#F Não posso confiar em pessoas assim!#!"
 intrigue_scheme_lifestyle.3102.desc: "Os funcionários que alimentam meus agentes com informações sobre [target.GetTitledFirstName|l] foram descobertos!"
 intrigue_scheme_lifestyle.3102.a: "Eles que se mantenham calados!"
 intrigue_scheme_lifestyle.3201.t: "Comunicação"
 intrigue_scheme_lifestyle.3201.desc_animal: "Que sorte! As aves mensageiras [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] gostam especialmente de um tipo de sementes que podem ser encontradas no meu jardim, então elas ficarão por aqui tempo suficiente para eu ler as mensagens!"
 intrigue_scheme_lifestyle.3201.elope.desc: "Que sorte! Meus agentes descobriram um jeito de entrar no gabinete onde [target.GetLiege.Custom2('NamePossessiveCharacterIntroduction', target )] guarda os rascunhos de suas cartas. Agora todos os seus recados estão à minha disposição para ler!"
 intrigue_scheme_lifestyle.3201.desc: "Que sorte! Meus agentes descobriram uma maneira de entrar no gabinete onde[target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] guarda os rascunhos de suas cartas. Agora todas as suas mensagens são minhas para ler!"
 intrigue_scheme_lifestyle.3201.a: "Vamos tornar isso algo regular!"
 intrigue_scheme_lifestyle.3201.b: "Tenho os mensageiros comendo na palma da minha mão."
 intrigue_scheme_lifestyle.3201.b.tt: "Esta opção está disponível por causa do meu Modificador $modifier_hunt_friend_of_animal$"
 intrigue_scheme_lifestyle.3201.c: "Foi uma sorte, nada mais."
 intrigue_scheme_lifestyle.3301.t: "Outro Caminho"
 intrigue_scheme_lifestyle.3301.desc_murder: "Meus agentes notaram que [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('target'))] [target.GetTitledFirstName|l] reage de maneira estranha sempre que seu [target.Custom2('RelationToMe', SCOPE.sC('secret_to_reveal_target'))] [secret_to_reveal_target.GetTitledFirstName|l]…"
 intrigue_scheme_lifestyle.3301.desc_lover: "Meus agentes notaram que [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('target'))] [target.GetTitledFirstName|l] passa tempo demais a sós com seu [target.Custom2('RelationToMe', SCOPE.sC('secret_to_reveal_target'))] [secret_to_reveal_target.GetTitledFirstName|l]…"
 intrigue_scheme_lifestyle.3301.desc_pregnancy: "Meus agentes perceberam que [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('target'))] [target.GetTitledFirstName|l] parece muito preocupad[target.Custom('ES_OA')] com a saúde de seu [target.Custom2('RelationToMe', SCOPE.sC('secret_to_reveal_target'))] [secret_to_reveal_target.GetTitledFirstName|l]."
 intrigue_scheme_lifestyle.3301.desc_child: "Meus agentes notaram que [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('target'))] [target.GetTitledFirstName|l] está muito envolvido na vida de seu [target.Custom2('RelationToMe', SCOPE.sC('secret_to_reveal_target'))] [secret_to_reveal_target.GetTitledFirstName|l]."
 intrigue_scheme_lifestyle.3301.desc_fallback: "Meus agentes perceberam que [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('target'))] [target.GetTitledFirstName|l] age de forma estranha com seu [target.Custom2('RelationToMe', SCOPE.sC('secret_to_reveal_target'))] [secret_to_reveal_target.GetTitledFirstName|l]."
 intrigue_scheme_lifestyle.3301.desc_end: "\n\nInvestigar mais a fundo significaria deixar de lado meus planos sombrios para [target.GetTitleTierName], mas devo admitir que minha curiosidade foi despertada!"
 intrigue_scheme_lifestyle.3301.a: "Se está escondendo algo, eu preciso saber!"
 intrigue_scheme_lifestyle.3301.b: "Vou manter o foco em meu objetivo[ROOT.Char.Custom('ES_OA')]."
 intrigue_scheme_lifestyle.3301.b.tt: "#F Com precisão mortal!#!"
 intrigue_scheme_lifestyle.3302.t: "O segredo de [target.GetTitleAsNameNoTooltip]"
 intrigue_scheme_lifestyle.3302.desc_murder: "Meus agentes percebem diversas pistas curiosas que logo revelam o que está acontecendo. [ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('target'))] [target.GetTitledFirstName|l] assassinou seu [target.Custom2('RelationToMe', SCOPE.sC('secret_to_reveal_target'))] [secret_to_reveal_target.GetTitledFirstName|l]!"
 intrigue_scheme_lifestyle.3302.desc_lover: "Meus agentes percebem diversas pistas curiosas que logo desvendam o que está acontecendo. [secret_to_reveal_target.GetTitledFirstName|l] é amante de [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l]!"
 intrigue_scheme_lifestyle.3302.desc_pregnancy: "Meus agentes percebem diversas pistas curiosas que, muito em breve, revelam o que está acontecendo. [secret_to_reveal_target.GetTitledFirstName|l] está grávida [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l]!"
 intrigue_scheme_lifestyle.3302.desc_child: "Meus agentes percebem diversas pistas curiosas que, muito em breve, revelam o que está acontecendo. [secret_to_reveal_target.GetTitledFirstName|l] é filh[secret_to_reveal_target.Custom('ES_OA')] [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] e seu [target.Custom2('RelationToMe', SCOPE.sC('secret_to_reveal_owner'))] [secret_to_reveal_owner.GetTitledFirstName|l]!"
 intrigue_scheme_lifestyle.3302.desc_fallback: "Meus agentes notam uma curiosidade após outra, e não demora muito para que a imagem se revele: [target.GetTitledFirstName|l] realmente tinha algo a esconder!"
 intrigue_scheme_lifestyle.3302.a: "Ah, isso é bom!"
 intrigue_scheme_lifestyle.3302.a.tt: "#F Eu poderia chantagear[target.GetHerHim] , obrigar[target.GetHerHim] a cumprir minhas ordens, /ou #EMP lo que yo quiera#!!#!"
 intrigue_scheme_lifestyle.3401.t: "Um Caminho para Dentro"
 intrigue_scheme_lifestyle.3401.desc: "[courtier_to_fool.GetTitledFirstName], [target.Custom2('RelationToMe', SCOPE.sC('courtier_to_fool'))] [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] é um[courtier_to_fool.Custom('ES_XA')] [SCOPE.sC('courtier_to_fool').GetWomanMan] [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('courtier_to_fool'))]. Quando me encontro em sua companhia, no início ajo com cautela. Mas logo percebo que não me evita, como pensei no começo…"
 intrigue_scheme_lifestyle.3401.a: "Por favor, amig[courtier_to_fool.Custom('ES_OA')] me[courtier_to_fool.Custom('ES_OA')] fale de você!"
 intrigue_scheme_lifestyle.3401.a.tt: "#F Sou um lobo em pele de cordeiro, me aproximando da minha presa...!#!"
 intrigue_scheme_lifestyle.3401.b: "Esse assunto é entre [target.GetFirstNameNoTooltip] e eu."
