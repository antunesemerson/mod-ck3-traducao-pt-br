l_spanish:
 fabricate_hook_ongoing.0001.t: "$fabricate_hook_header$ Contato Familiar"
 fabricate_hook_ongoing.0001.desc: "[target.Custom2('RelationToMe', SCOPE.sC('family_member'))] [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l], el/la [family_member.GetTitledFirstName|l] ha estado inusitadamente comunicativ[family_member.Custom('ES_OA')]. Aunque sepa que no tengo las intenciones más puras hacia [target.GetFirstName], muestra disposición a responder a mis preguntas."
 fabricate_hook_ongoing.0001.a: ""Tem [target.Custom('ES_ElElla')] algum ponto fraco que eu deva conhecer?""
 fabricate_hook_ongoing.0001.b: "«¿Cómo puede acercarse un[ROOT.Char.Custom('ES_OA')] a [target.Custom('ES_ElElla')]?»."
 fabricate_hook_ongoing.0002.t: "$fabricate_hook_header$ Influência Indevida"
 fabricate_hook_ongoing.0002.desc: "[target.GetTitledFirstName] parece incomumente cuidados[target.Custom('ES_OA')] com seu [target.Custom2('RelationToMeShort', hooking_character )], [hooking_character.GetTitledFirstName|l]. Esse tipo de deferência só pode significar que [hooking_character.GetFirstNameNoTooltip] tem algum tipo de influência sobre [target.Custom('ES_ElElla')].\n\nSerá que há algo aí que eu possa aprender?"
 fabricate_hook_ongoing.0002.a: "Meus espiões devem investigar para explicar esse mistério."
 fabricate_hook_ongoing.0002.b: "¡Debo averiguar cómo logra que haga lo que [hooking_character.GetSheHe] quiere!"
 fabricate_hook_ongoing.0003.t: "$fabricate_hook_header$ Fofocas"
 fabricate_hook_ongoing.0003.desc_servant: "Meus agentes fizeram contato com [servant.GetTitledFirstName|l], um[servant.Custom('ES_XA')] servidor[servant.Custom('ES_XA')] na residência do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target'))] [target.GetTitledFirstName|l]."
 fabricate_hook_ongoing.0003.desc: "Meus agentes entraram em contato com um[dummy_servant_gender.Custom('ES_XA')] servo[dummy_servant_gender.Custom('ES_XA')] da residência da minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('target'))] [target.GetTitledFirstName|l]."
 fabricate_hook_ongoing.0003.desc_ending: "\n\nCon los incentivos adecuados, ¡está dispuest[dummy_servant_gender.Custom('ES_OA')] a #EMP susurrar#! cotilleos para divulgar que [target.GetTitledFirstNameNoTooltip|l] no es tan [target.Custom('FormalComplimentAdjective')] como parece!"
 fabricate_hook_ongoing.0003.a: "¡Destrozaremos su reputación!"
 fabricate_hook_ongoing.0003.a_gregarious: "Você #EMP sabe#! que é a coisa certa a fazer."
 fabricate_hook_ongoing.0003.b: "Basta ter por perto alguém compreensivo e atento."
 fabricate_hook_ongoing.0003.b_lustful: "Ou #EMP nós#! poderíamos começar algo aqui ao invés disso..."
 fabricate_hook_ongoing.0004.t: "$fabricate_hook_header$ Questão de Gosto"
 fabricate_hook_ongoing.0004.desc: "[target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)|U] es un[target.Custom('ES_XA')] [target.GetWomanMan] complicad[target.Custom('ES_OA')].\n\nNecesito entender[target.Custom('ES_LoLa')] lo mejor posible si quiero convencer a la gente para que se ponga de mi lado en caso de que… #EMP discutamos#!."
 fabricate_hook_ongoing.0004.a: "Em breve descobrirei a verdade sobre [target.Custom('ES_ElElla')]"
 fabricate_hook_ongoing.0004.b.success: "Você aprende coisas novas sobre [target.Custom('ES_ElElla')]"
 fabricate_hook_ongoing.0004.b.failure: "[target.Custom('ES_ElElla')|U] te descobre"
 fabricate_hook_ongoing.0004.b: "Vou tomar meu tempo com isso."
 fabricate_hook_ongoing.0005.desc: "As pessoas descrevem [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] como [target.Custom('ComplimentAdjective')] e [target.Custom2('InsultAdjective', ROOT.Char)], o que me diz mais sobre o relacionamento delas com [target.Custom('ES_ElElla')] do que qualquer outra coisa.\n\nAlém disso, um número curioso de pessoas menciona com que frequência [ROOT.Char.Custom2('QuirkPresentPosOrNeg', SCOPE.sC('target'))] e fala sobre [target.Custom('herhis_subject_of_interest')]."
 fabricate_hook_ongoing.0005.a: "Tenho certeza de que essas informações serão úteis."
