l_spanish:
 study_confucian_classics_outcome.10.t: "$study_confucian_classics_title$ Escolhendo uma abordagem"
 study_confucian_classics_outcome.10.desc: "Diante de mim estão as #EMP Analectas de [Glossary( 'Kǒngzǐ', 'CONFUCIUS_GLOSS' )]#!, o #EMP Clássico da Poesia#!, o #EMP Livro da História#!, o #EMP Livro dos Ritos#!, o #EMP I Ching#!, e os #EMP Anais da Primavera e do Outono#!. Já preparei os [Glossary( 'cuatro tesoros', 'FOUR_TREASURES')] e uma #EMP quantidade ingente#! de chá…\n\nPara demonstrar meu mérito e erudição, preciso estudar. Mas até onde estou disposto a ir?"
 study_confucian_classics_outcome.10.a: "Não descansarei na busca pelo conhecimento!"
 study_confucian_classics_outcome.10.b: "Tratarei meus estudos com dignidade."
 study_confucian_classics_outcome.10.c: "Vou levar o tempo que for preciso."
 no_change_study_tt: "Seu [scheme|El] [GetScheme('study_confucian_classics').GetTypeName] progride inalterado"
 tgp_focused_studies_modifier: "Estudos focados"
 tgp_focused_studies_personal_modifier: "Centrado nos estudos confucionistas"
 tgp_focused_studies_personal_modifier_desc: "Este personagem está plenamente dedicado aos estudos confucionistas."
 tgp_dignified_studies_modifier: "Estudos dignos"
 tgp_dignified_studies_personal_modifier: "Estudante confucionista digno"
 tgp_dignified_studies_personal_modifier_desc: "Este personagem está estudando os clássicos confucianos de maneira digna."
 study_confucian_classics_title: "$study_confucian_classics$:"
 study_confucian_classics_outcome.100.t: "$study_confucian_classics_title$ a noite toda"
 study_confucian_classics_outcome.100.desc: "Da próxima vez que o [GetActivityType('activity_imperial_examination').GetName|l], estarei preparad[ROOT.Char.Custom('ES_OA')]. A noite cai enquanto coloco os Anais de [ROOT.Char.Custom('GetRandomAnnalsPassage')] diante de mim, com suas páginas iluminadas por uma luz fraca.\n\nSe eu passar a noite estudando e memorizar os trechos mais importantes, certamente terei uma vantagem..., mas será que realmente aprenderei? Talvez eu devesse dedicar tempo a #EMP comprenderlos#! de verdade?"
 study_confucian_classics_outcome.100.a: "Tenho de passar no exame, custe o que custar."
 study_confucian_classics_outcome.100.b: "A sabedoria leva tempo."
 study_confucian_classics_outcome.100.c: "É melhor eu ir para a cama…"
 preparatory.imperial_examination.advantage.tt: "Você ganha uma [exam_advantage|El] para o próximo [GetActivityType('activity_imperial_examination').GetName|l]"
 study_confucian_classics_outcome.200.t: "$study_confucian_classics_title$ chamada poética"
 study_confucian_classics_outcome.200.desc: "A beleza e a caligrafia de [ROOT.Char.Custom('GetRandomPoetryPassage')] são #EMP sobrecogedoras!#! E as obras [poet.Custom('ES_DelDela')] [poet.GetTitledFirstName|l], admiráveis e duradouras, uma poesia digna de resistir ao passar do tempo. Vou de um texto a outro, sem conseguir parar de ler.\n\nSerá que eu também deveria molhar meu pincel… e acrescentar algo à grande biblioteca de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetNameNoTier]?"
 study_confucian_classics_outcome.200.a: ""[ROOT.Char.Custom('GeneratePoem_Title_Fragment_Season')] da [ROOT.Char.Custom('FormalComplimentAdjective')] virtude me pede que…"."
 study_confucian_classics_outcome.200.b: "Esperarei a que a inspiração me venha!"
 study_confucian_classics_outcome.200.c: "[poet.GetFirstNameNoTooltip] merece uma carta de admiração."
 study_confucian_classics_outcome.200.d: "Deveria reler [ROOT.Char.Custom('GetRandomPoetryPassage')]."
 friend_praised_privately: "[CHARACTER.GetShortUIName|U][TARGET_CHARACTER.LocalPlayerString( ' te', '' )] [Select_CString( CHARACTER.IsLocalPlayer, 'alabaste', 'alabó' )] a [TARGET_CHARACTER.LocalPlayerString( 'ti', TARGET_CHARACTER.GetShortUIName )]"
 friend_praised_privately_corresponding: "[TARGET_CHARACTER.GetShortUIName|U][CHARACTER.LocalPlayerString( ' te', '' )] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'alabaste', 'alabó' )] a [CHARACTER.LocalPlayerString( 'tu personaje', CHARACTER.GetShortUIName )]"
 study_confucian_classics_outcome.300.t: "$study_confucian_classics_title$ inspiração de [ROOT.Char.Custom('GetSeason')]"
 study_confucian_classics_outcome.300.desc: "Enquanto contemplo o [location_province.Custom('ProvinceCompliment')] jardim de [ROOT.Char.Custom('GetSeason')], reflito sobre os célebres versos de [ROOT.Char.Custom('GetRandomAncientChinesePoet')]. Uma brisa agita a manga da minha túnica, guiando minha mão até o pincel — como se o próprio Céu me convidasse a escrever.\n\nO papel está diante de mim, quieto e expectante, à espera de receber minhas palavras."
 study_confucian_classics_outcome.300.a: "Com esforço, eu também serei grande um dia!"
 study_confucian_classics_outcome.300.b: "Um poema simples para capturar o momento."
 study_confucian_classics_outcome.300.c: "Sua sabedoria é tinta suficiente para mim."
 wang_wei: "Wang Wei"
 tao_yuanming: "Tao Yuanming"
 li_bai: "Li Bai"
 du_fu: "Du Fu"
 meng_haoran: "Meng Haoran"
 liu_zongyuan: "Liu Zongyuan"
 bai_juyi: "Bai Juyi"
 study_confucian_classics_outcome.110.t: "$study_confucian_classics_title$ clássicos confucianos"
 study_confucian_classics_outcome.110.desc: "Os Anais de [ROOT.Char.Custom('GetRandomAnnalsPassage')], [ROOT.Char.Custom('GetRandomPoetryPassage')], [ROOT.Char.Custom('GetRandomRitesPassage')]: um a um, vou percorrendo os grandes clássicos confucianos, extraindo de suas páginas a sabedoria atemporal.\n\nSe quero servir como um governador justo, devo seguir o caminho traçado por [Glossary( 'Kǒngzǐ', 'CONFUCIUS_GLOSS' )]. Estas são as palavras que devo memorizar."
 study_confucian_classics_outcome.110.a: "Devo aprender, custe o que custar."
 study_confucian_classics_outcome.110.b: "Vou levar meu tempo."
 study_confucian_classics_outcome.120.t: "$study_confucian_classics_title$ Leitura dos Anais"
 study_confucian_classics_outcome.120.desc: "Antes de governar estas terras, primeiro devo governar minha mesa. Os Anais de [ROOT.Char.Custom('GetRandomAnnalsPassage')] se abrem diante de mim — uma obra sábia, fundamento do governo justo. Por meio de suas palavras, aprofundarei meu conhecimento e seguirei os passos de [Glossary( 'Kǒngzǐ', 'CONFUCIUS_GLOSS' )].\n\nSó por meio da disciplina eu prevalecerei."
 study_confucian_classics_outcome.120.a: "Eu vasculharei os textos em busca de verdades ocultas."
 study_confucian_classics_outcome.120.b: "Três xícaras de chá, sem dormir até virar a última página."
 study_confucian_classics_outcome.120.c: "A sabedoria chega para quem é paciente."
 confucian_xp_high_tt: "Você avançou significativamente em seus estudos confucionistas"
 confucian_xp_low_tt: "Você avançou um pouco mais em seus estudos confucionistas"
 study_confucian_classics_outcome.130.t: "$study_confucian_classics_title$ perspectiva sobre o aprendizado"
 study_confucian_classics_outcome.130.desc: "Por que não consigo entender os textos? Por que não consigo apreender seus significados sutis? Será que sou #EMP tan#! incompetente? Deixo o pincel de lado e descanso a testa suavemente sobre a escrivaninha.\n\n\"Trouxe-lhe chá\", diz meu [ROOT.Char.Custom2('RelationToMeShort', servant)], [servant.GetFirstName], entrando no gabinete. \"Esse é o #EMP [ROOT.Char.Custom('GetRandomRitesPassage')]?#! Tenho boas lembranças desse trecho... Posso lê-lo com você por um tempo?\".\n\nLevanto os olhos. Talvez uma mão amiga seja exatamente o que eu preciso."
 study_confucian_classics_outcome.130.a: "Por favor, ajude-me a entendê-los."
 study_confucian_classics_outcome.130.b: "Talvez devêssemos sair para tomar alguma coisa."
 study_confucian_classics_outcome.140.t: "$study_confucian_classics_title$ a arte da diplomacia"
 study_confucian_classics_outcome.140.desc: "Fecho os Analectos com um suspiro. O [Glossary( 'maestro Kong', 'CONFUCIUS_GLOSS' )] fala de harmonia, da expressão da virtude por meio da retidão, sem bajulação. E, ainda assim, meu [ROOT.Char.Custom2('RelationToMeShort', diplomatic_vassal)], [diplomatic_vassal.Custom('ES_ElLa')] [diplomatic_vassal.GetTitledFirstName|l], conquista a paz com um sorriso e um brinde.\n\nMe pergunto... isso também é o Caminho?"
 study_confucian_classics_outcome.140.a: "Talvez eu devesse aprender com [diplomatic_vassal.GetSheHe]."
 study_confucian_classics_outcome.140.b: "Não, encontrarei mérito de outra forma."
 relation_servant_of_china_female: "serva de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetNameNoTier]"
 relation_servant_of_china_male: "servo de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetNameNoTier]"
 study_confucian_classics_outcome.150.t: "$study_confucian_classics_title$ conhecer as terras"
 study_confucian_classics_outcome.150.desc: "«Caminai comigo», diz meu [ROOT.Char.Custom2('RelationToMeShort', servant)] , [servant.GetFirstName] , convidando-me a sair. «Vamos explorar [location_province.GetName] e suas [location_province.Custom('GetTerrainTypePlural')]».\n\n«Observai os montículos e elevações, as encostas e os desfiladeiros, as planícies e os pântanos. Todos eles determinam qual é o melhor uso para esta terra. Tal é a sabedoria do #EMP Libro de los ritos#!»."
 study_confucian_classics_outcome.150.a: "Muito perspicaz."
 study_confucian_classics_outcome.150.b: "Sim, um passeio vai clarear minha mente."
 study_confucian_classics_outcome.160.t: "$study_confucian_classics_title$ trabalho meritório"
 study_confucian_classics_outcome.160.desc: "Tenho me aprofundado em [ROOT.Char.Custom('GetRandomPoetryPassage')], [ROOT.Char.Custom('GetRandomRitesPassage')] e nos Anais de [ROOT.Char.Custom('GetRandomAnnalsPassage')]. Minha mente se tornou mais aguçada, minhas habilidades foram aprimoradas e sinto que já estou pronto para provar meu mérito.\n\nTalvez eu devesse ajudar os magistrados locais na revisão de antigos casos, verificar o estado das pontes locais"
 study_confucian_classics_outcome.160.desc_own_elder: "ou redigir um relatório formal para minha anciã[higher_merit_vassal.Custom('ES_OA')]; [higher_merit_vassal.Custom('ES_ElLa')] [higher_merit_vassal.GetTitledFirstName|l]."
 study_confucian_classics_outcome.160.desc_other_elder: "ou redigir um relat?rio formal para [higher_merit_vassal.Custom('ES_ElLa')] [higher_merit_vassal.GetTitledFirstName|l], um[higher_merit_vassal.Custom('ES_XA')] anci?[higher_merit_vassal.Custom('ES_OA')] de grande renome e posi??o."
 study_confucian_classics_outcome.160.a: "Se eu servir bem a [higher_merit_vassal.GetFirstNameNoTooltip] , a notícia do meu mérito se espalhará."
 study_confucian_classics_outcome.160.b: "Uma boa avaliação fala mais alto do que qualquer vanglória."
 study_confucian_classics_outcome.160.c: "Ajudarei os magistrados."
 merit_gain_high_tt: "Ganho significativo de mérito"
 merit_gain_low_tt: "Ganho leve de mérito"
 because_of_your_diplomacy: "Por causa da sua [diplomacy|El] [diplomacy_i]:"
 because_of_your_stewardship: "Por causa da sua [stewardship|El] [stewardship_i]:"
 because_of_your_learning: "Por causa da sua [learning|El] [learning_i]:"
 study_confucian_classics_outcome.170.t: "$study_confucian_classics_title$ influência do ancião"
 study_confucian_classics_outcome.170.desc: "«Acaba de chegar um pergaminho com o selo do vosso ancião, [elder.Custom('ES_ElLa')] [elder.GetTitledFirstName|l]», diz meu [ROOT.Char.Custom2('RelationToMeShort', letterman)], [letterman.GetFirstName], entregando-mo. «Acho que são boas notícias!».\n\nDesdobro cuidadosamente o pergaminho.\n\n«Ao meu mais [ROOT.Char.Custom('ComplimentAdjective')] discípul[ROOT.Char.Custom('ES_OA')]: o teu traço firme, o teu coração reto e a tua mente perseverante não passaram despercebidos. As notícias da tua conduta chegaram aos escrivães e magistrados. O teu mérito é conhecido»."
 study_confucian_classics_outcome.170.a: "Escreverei uma carta de agradecimento."
 study_confucian_classics_outcome.170.b: "Talvez consiga convencer[elder.GetHerHim] para que puxe alguns outros cordões?"
 study_confucian_classics_outcome.170.c: "Estou tão feliz que poderia servir dez xícaras de chá para você!"
 study_confucian_classics_outcome.180.t: "$study_confucian_classics_title$ desonerado"
 study_confucian_classics_outcome.180.desc: "Consegui. Terminei de ler o #EMP Libro de los ritos#!, e ainda consigo me lembrar da sua sabedoria! É como se tivessem tirado um véu dos meus olhos. Pela primeira vez, vejo o caminho à minha frente com clareza.\n\nE pensar... que ninguém acreditava em mim. Nem eu.\n\nTalvez eu tenha nascido para[ROOT.Char.Custom('ES_OA')] coisas maiores."
 study_confucian_classics_outcome.180.a: "E agora, para a próxima leitura…"
 study_confucian_classics_outcome.190.t: "$study_confucian_classics_title$ aproveitar a influência"
 study_confucian_classics_outcome.190.desc: "Uma palavra bem colocada, o dom da poesia, o favor de um mestre digno… Tudo isso são oportunidades para o [Glossary( 'guānxi', 'GUANXI_GLOSS' )]. Até mesmo participar de um encontro tranquilo de poesia pode traçar um caminho.\n\nTrabalho diligentemente, mas os sábios me ensinaram que a virtude deve brilhar para ser conhecida."
 GUANXI_GLOSS: "Guānxi é uma rede de laços pessoais, pessoas que confiam umas nas outras e trocam favores. É construído pessoalmente, tomando chá, jantares ou quando ajuda é oferecida, e muitas vezes importa mais do que regras formais."
 study_confucian_classics_outcome.190.a: "Farei com que os magistrados conheçam meu nome."
 study_confucian_classics_outcome.190.b: "Pedirei aos eruditos que compartilhem comigo suas anotações."
 study_confucian_classics_outcome.190.c: "O verso mais belo deve ser ouvido; vou estudar com os melhores."
 study_confucian_classics_outcome.190.d: "Meu mérito se sustenta por si só."
 tgp_known_by_magistrates_modifier: "Conhecido pelos magistrados"
 tgp_known_by_magistrates_modifier_desc: "Este personagem é bem conhecido pelos magistrados locais."
 tgp_assisted_by_scholars_modifier: "Ajudado por eruditos locais"
 tgp_assisted_by_scholars_modifier_desc: "Um grupo de eruditos locais está ajudando este personagem."
 tgp_known_by_poets_modifier: "Conhecido pelos poetas"
 tgp_known_by_poets_modifier_desc: "Este personagem é bem conhecido pelos poetas locais."
 study_confucian_classics_outcome.1000.t: "$study_confucian_classics_title$ pais rígidos"
 study_confucian_classics_outcome.1000.desc: ""Por que você não estuda mais? Você está envergonhando a casa [ROOT.Char.GetHouse.GetName]!" Meu [parent.GetMotherFather] levanta as mãos em fúria[parent.Custom('ES_OA')]. "Suas desculpas valem menos do que a poeira que se acumula sobre sua mesa".\n\n"Se você não pensar em estudar, acabará trabalhando no armazém para vergonha de todos"."
 study_confucian_classics_outcome.1000.a: "Não devo decepcionar [parent.GetMotherFather|l]."
 study_confucian_classics_outcome.1000.b: "Nunca chegarei a nada."
 study_confucian_classics_outcome.1000.c: "Perdoe-me, preciso de uma pausa."
 tgp_gave_up_modifier: "Desistiu"
 tgp_gave_up_modifier_desc: "Este personagem [GetTrait('burdened').GetName( GetNullCharacter )|l] desistiu completamente."
 tgp_study_harder_modifier: "Estudar mais"
 tgp_study_harder_modifier_desc: "Os pais deste personagem o motivaram a estudar com mais afinco.\n[success_chance|E] de [GetScheme('study_confucian_classics').GetTypeName]: #P +10 %#!"
 never_study_again_tt: "Você nunca mais poderá voltar a [GetScheme('study_confucian_classics').GetTypeName|l]"
 dishonor_opinion: "Desonra"
 honorable_opinion: "Honrado"
 satisfied_opinion: "Satisfeito"
 study_confucian_classics_outcome.1010.t: "$study_confucian_classics_title$ orientação do ancião"
 study_confucian_classics_outcome.1010.desc: "Meus estudos não vão bem… Os Anais de [ROOT.Char.Custom('GetRandomAnnalsPassage')], ainda pela metade, chamam minha atenção, mas minha mente só quer outra xícara de chá. Enquanto sirvo, noto um pergaminho do meu ancião[elder.Custom('ES_OA')], [elder.Custom('ES_ElLa')] [elder.GetTitledFirstName|l].\n\nDiz: «Querid[ROOT.Char.Custom('ES_OA')] discípul[ROOT.Char.Custom('ES_OA')]: Ouvi dizer que seus estudos estão fraquejando. Envio minhas reflexões sobre os Analectos, e algumas notas que talvez ajudem».\n\nMeu desejo de aprender se reacende mais uma vez!"
 study_confucian_classics_outcome.1010.a: "Com sua ajuda, estudarei como nunca antes!"
 study_confucian_classics_outcome.1010.b: "Este pergaminho será muito útil."
 artifact_elder_text_name: "As reflexões de [elder.GetFirstNameNoTooltip]"
 artifact_elder_text_description: "Uma coleção de pensamentos escritos com cuidado e de notas elaboradas por [elder.Custom('ES_ElLa')] [elder.GetTitledFirstName|l], reunidos com a intenção de ajudar seu discípul[owner.Custom('ES_OA')], [owner.GetFirstName]."
 tgp_motivated_elder_study_modifier: "Ajuda do ancião"
 study_confucian_classics_outcome.1020.t: "$study_confucian_classics_title$ dobrando a aposta"
 study_confucian_classics_outcome.1020.desc: "Isso não está funcionando. Não consigo fazer nada dar certo. Meu gabinete é um caos: livros não lidos se amontoam como acusações contra um bandido, e pergaminhos estão espalhados pelo chão como as folhas de uma árvore morta.\n\nMas #EMP sé#! que posso conseguir.\n\nSó… preciso… me concentrar."
 study_confucian_classics_outcome.1020.a: ""Acabaram-se as desculpas. Vou continuar!"."
 study_confucian_classics_outcome.1020.b: "Um gole de [ROOT.Char.Custom('RegionalAlcoholicDrink')] me ajudará a continuar…"
 study_confucian_classics_outcome.1020.c: "Respire e comece de novo."
 tgp_double_down_on_studies_modifier: "Dobrar a aposta"
 study_confucian_classics_outcome.1030.t: "$study_confucian_classics_title$ ajuda divina"
 study_confucian_classics_outcome.1030.desc: "Meus estudos não têm ido bem. Talvez o que eu precise não seja outro pergaminho... mas orientação de [ROOT.Char.GetFaith.KnowledgeGodName]. Vou até o santuário local, ajoelho-me diante do altar e junto as mãos em oração.\n\n“Buscais conhecimento, [priest.Custom2('RelationToMeShort', owner)]?” murmura meu [ROOT.Char.Custom2('RelationToMeShort', priest)], [priest.GetFirstName], saindo das sombras. “Se fizerdes uma pequena oferenda, ou derdes uma mão ao redor do santuário, eu poderia ajudar-vos.”"
 study_confucian_classics_outcome.1030.a: "Posso fazer uma oferenda."
 study_confucian_classics_outcome.1030.b: "Darei uma mão."
 study_confucian_classics_outcome.1030.c: "Eu só confio em [ROOT.Char.GetFaith.KnowledgeGodName]."
 tgp_divine_favor_modifier: "Favor sacerdotal"
 study_confucian_classics_outcome.1040.t: "$study_confucian_classics_title$ uma parceira compreensiva"
 study_confucian_classics_outcome.1040.desc: "É demais, não consigo entender nada deste fragmento de #EMP [ROOT.Char.Custom('GetRandomRitesPassage')]#!. Minhas anotações estão erradas! Inúteis!\n\n«[partner.Custom('LoverPetName')|U], seus estudos estão te preocupando?», pergunta minha [ROOT.Char.Custom2('RelationToMeShort', partner)], [partner.GetFirstName], enquanto traz uma bandeja de bolinhos de chá. «Por que você não me deixa me juntar a você? Não há nada que não possamos fazer se colocarmos nossas mentes juntas! Ah, e pegue um dos bolinhos, eu os fiz para você»."
 study_confucian_classics_outcome.1040.a: "Por favor, traga-me tinta e folhas em branco."
 study_confucian_classics_outcome.1040.b: "Seu apoio significa tudo para mim."
 study_confucian_classics_outcome.1040.c: "Neste momento, só preciso de você."
 tgp_servile_partner_modifier: "Parceiro servil"
 tgp_assistant_partner_modifier: "Parceiro colaborador"
 lover_helped_study: "[CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsLocalPlayer, 'te enamoraste', 'se enamoró' )] de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'ti', TARGET_CHARACTER.GetShortUIName )] durante uma sessão de estudos."
 lover_helped_study_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'te enamoraste', 'se enamoró' )] de [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetShortUIName )] durante uma sessão de estudo."
