l_spanish:
 hold_court.7000.t: "Justa Repartição"
 hold_court.7000.desc: "[local_leader.Custom2('MyCharacterIntroduction', ROOT.Char)|U] deambula por la corte, con una mirada de admiración por la riqueza que nos podemos permitir en la capital.\n\n«No es ningún secreto que [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip|U] es la envidia del mundo, [ROOT.Char.Custom('FormOfAddressForLiege')], pero no todo vuestro señorío tiene tal fortuna. Por ejemplo, en [low_dev_county.GetNameNoTier] los campos están yermos porque no hay nadie que se ocupe de ellos. ¿No sería maravilloso que el señorío entero fuera tan magnífico como [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]?»."
 hold_court.7000.a: ""Seria.""
 hold_court.7000.b: "«¿Y vuestros súbditos han intentado vivir en [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]»."
 hold_court.7000.c: ""Isso deveria me interessar? Pois não interessa.""
 hold_court.7010.t: "Duas Fés, Uma Família"
 hold_court.7010.desc: "[friendly_neighbour.Custom2('MyCharacterIntroduction', ROOT.Char)|U] entra a zancadas en mi salón con una confianza impropia de [friendly_neighbour.GetSheHe], como si fuera algo más que [Select_CString( friendly_neighbour.IsFemale, 'una intrusa', 'un intruso' )] en la corte benevolente de la población [ROOT.Char.GetFaith.GetAdjectiveNoTooltip].\n\n«Buen[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] [ROOT.Char.GetFirstName], no es ningún secreto que sois un[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] con muchos enemigos en vuestras fronteras, pero me agradaría no contarme entre ellos, si la fortuna me acompaña. Muchos quisieran ver a los [ROOT.Char.GetFaith.GetAdherentNamePlural] esfumados de la región, pero os propongo que vos y yo traigamos la paz. La cuestión es muy sencilla; vos tenéis un[potential_prince.Custom('ES_XA')] [potential_prince.Custom('GetDaughterSon')], yo tengo un[foreign_princess.Custom('ES_XA')] [foreign_princess.Custom('GetDaughterSon')]. Casemos a la pareja y acabemos con las peleas»."
 hold_court.7010.a.jewish: ""Mazel tov!""
 hold_court.7010.a: ""Então haverá um casamento!""
 hold_court.7010.b: ""Minha lâmina anseia por sangue [friendly_neighbour.GetFaith.GetAdjectiveNoTooltip]!""
 hold_court.7010.c: ""Tal casamento seria heresia.""
 every_county_10_dev_below_capital: "Cada [county|lE] com pelo menos 10 níveis de [development|lE] abaixo de sua [capital|lE]"
 hc_7000_dev_boost: "Desenvolvimento Próspero"
 hc_7000_dev_boost_desc: "Recursos foram recentemente redirecionados para ajudar no crescimento deste condado."
 hc_7000_dev_reduction: "Desenvolvimento Prejudicado"
 hc_7000_dev_reduction_desc: "Os recursos deste condado estão sendo desviados para partes distantes do reino, prejudicando a qualidade de vida aqui."
 hc_7010_holy_war: "Preparando-se para Guerra Santa"
 hc_7010_holy_war_desc: "Este personagem decretou recentemente que todos os descrentes devem ser erradicados de suas terras e arredores."
 hc_7010_tolerance: "Casamento Tolerante"
 hc_7010_tolerance_desc: "Este personagem recentemente casou um de seus parentes com um membro de uma fé diferente, espalhando sentimentos de tolerância por suas terras."
 hold_court.7020.t: "O Escudo de [ROOT.Char.GetFaith.GetNameNoTooltip|l]"
 hold_court.7020.desc.intro: "[same_faith_friend.Custom2('MyCharacterIntroduction', ROOT.Char)|U] entra hoy en mi corte con una sombría procesión de [ROOT.Char.GetFaith.PriestNeuterPlural] a sus espaldas que entonan rezos [ROOT.Char.GetFaith.GetAdherentNamePlural] tradicionales a su paso.\n\n«Buen[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l], vos y yo sabemos que nuestras antiguas tradiciones están amenazadas."
 hold_court.7020.desc.mid.oppression: "Incontáveis seguidores de [ROOT.Char.GetFaith.HighGodName|U] foram subjugados sob [threatening_ruler.GetName], e o risco de conversão forçada cresce a cada dia."
 hold_court.7020.desc.mid.recent_war: "Vuestras tierras han sido profanadas por la mano [threatening_ruler.GetPrimaryTitle.GetAdjectiveNoTooltip] y se han quemado los templos [ROOT.Char.GetFaith.HighGodNamePossessive]."
 hold_court.7020.desc.mid.holy_site: "Nuestros lugares sagrados están fuera de nuestro alcance y temo que los fieles jamás puedan visitar los sitios elegidos por [ROOT.Char.GetFaith.HighGodName] en esta tierra."
 hold_court.7020.desc.outro: "É óbvio para mim que precisamos organizar nossa fé para que os antigos costumes ainda possam sobreviver ao ataque de [threatening_ruler.GetFaith.GetReligion.GetName|l].""
 hold_court.7020.a: ""Para perseverar, devemos mudar.""
 hold_court.7020.b: ""Permaneçam fortes, não devemos sacrificar nossos costumes.""
 hold_court.7020.c: ""Juntos podemos preservar os antigos costumes para sempre.""
 rival_planning_holy_war: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'rejeitou', 'rejeitou' )] a súplica de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'seu personagem', TARGET_CHARACTER.GetShortUIName )] por paz religiosa"
 rival_planning_holy_war_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'rejeitou', 'rejeitou' )] a súplica de [Select_CString( CHARACTER.IsLocalPlayer, 'seu personagem', CHARACTER.GetShortUIName )] por paz religiosa"
 friend_beyond_faith: "[CHARACTER.GetShortUIName|U] y [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'dejaron', 'dejasteis')] aparte las diferencias religiosas por el bien de la familia y las alianzas"
 friend_united_by_faith: "[CHARACTER.GetShortUIName|U] y [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'os unisteis', 'se unieron')] en la fe"
 ignore_3_site_rule_tt: "Você pode reformar sua [faith|lE] sem a exigência habitual de possuir [holy_sites|lE]"
 friend_will_convert_tt: "[same_faith_friend.GetFirstName|U] se converterá à fé reformada com você."
 truce_religious_tolerance: "Tolerância Religiosa"
 hc_7020_guardian_of_the_old_ways: "Guardião dos Antigos Costumes"
 hc_7020_guardian_of_the_old_ways_desc: "Este personagem se dedicou à proteção e preservação de sua fé."
