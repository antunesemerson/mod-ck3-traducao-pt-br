l_spanish:
 hold_court.3000.t: "Um Banquete em Seu Nome"
 hold_court.3000.desc.opening: "[feast_vassal.GetTitledFirstName] se aproxima a mim com uma postura mais ereta do que o habitual e visivelmente ansios[feast_vassal.Custom('ES_OA')] pelo que tem a dizer.\n\n"
 hold_court.3000.desc.opening.blind: "Ouço os passos de [feast_vassal.GetTitledFirstName|l]. Depois que param, segue-se uma pigarreada obviamente ensaiada. Talvez seja uma forma de chamar minha atenção. Posso ouvir que [feast_vassal.GetFirstNameNoTooltip] parece encantad[feast_vassal.Custom('ES_OA')] com o que tem a dizer.\n\n"
 hold_court.3000.desc.likes: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U], há muito o que celebrar sob vosso reinado! Por favor, permiti que eu pague os gastos do vosso próximo banquete! Em troca, talvez me concedais um favor no futuro?\"."
 hold_court.3000.desc.dislikes: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U]. O povo do seu domínio precisa de um encontro alegre de vez em quando, para poder esquecer suas preocupações. Eu financiaria de bom grado um banquete, mesmo que fosse realizado em seu nome, pois isso é pelo bem de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]. Embora eu esperasse ser recompensado com um favor\"."
 hold_court.3000.a: "Muito bem, eu aceito."
 hold_court.3000.a.tt: "Realizar um banquete em um futuro próximo renderá uma recompensa de [court_grandeur_value|lE]."
 hold_court.3000.b: "Sem compromisso! Seu suserano exige isso[ROOT.Char.Custom('ES_OA')] senhor[ROOT.Char.Custom('ES_XA')]!"
 hold_court.3000.c: "Talvez possamos acertar algo mais agradável?"
 hold_court.3000.c.success: "[feast_vassal.GetTitledFirstNameNoTooltip|l] concorda em desistir do seu pedido de favor"
 hold_court.3000.c.failure: "[feast_vassal.GetTitledFirstNameNoTooltip|l] não concorda e retira a oferta de pagar"
 hold_court.3000.d: "Receio que não possa aceitar."
 hold_court.3001.desc: "Que banquete maravilhoso! Com o banquete prometido a [feast_vassal.GetTitledFirstName|l] ainda fresco na memória de quem compareceu naquele dia, os presentes no meu banquete cantam meus louvores extasiados. Eu me sentia embriagad[ROOT.Char.Custom('ES_OA')] de felicidade quando as pessoas me aclamavam e me veneravam aos meus pés! Uma vantagem adicional de cumprir minha promessa a [feast_vassal.GetFirstNameNoTooltip] ? que todos os que compareceram falam muito bem da minha corte!"
 hold_court.3001.desc.dead: "Ah, que banquete maravilhoso! Que pena que [feast_vassal.GetTitledFirstName|l] não chegou a v?-lo. Alguns dos presentes se lembraram de que eu prometi um banquete a [feast_vassal.GetHerHim] e falaram com carinho da minha dedicação ao entretenimento da minha corte. Alguns assumiram que esta celebração também foi dedicada em memória de [feast_vassal.GetFirstNameNoTooltip]. De qualquer forma, cumprir minha promessa fez com que todos os que compareceram falassem muito bem da minha corte."
 hold_court.3001.a: "Tenho certeza de que o próximo banquete será ainda melhor!"
 hold_court.3001.b: "Outro brinde em nome dele!"
 hold_court.3010.t: "Um Pregador Inconvencional"
 hold_court.3010.desc.opening: "\"[ROOT.Char.Custom2('RelationToMeAddress', religious_vassal)|U]\", a voz de [religious_vassal.GetTitledFirstName|l] é severa. \"Solicito que iniciemos uma investigação sobre um[unconventional_preacher.Custom('ES_XA')] pregador[unconventional_preacher.Custom('ES_XA')] de má reputação de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Veja, acontece que ele é… Bem…"
 hold_court.3010.desc.preacher_gender: "Que é um[unconventional_preacher.Custom('ES_XA')] #EMP [unconventional_preacher.GetWomanMan]!#!"
 #hold_court.3010.desc.preacher_marriage: "The problem with this preacher is that [unconventional_preacher.GetSheHe] married to someone else than [ROOT.Char.GetFaith.HighGodName]!"
 hold_court.3010.desc.closing: "Isso vai contra a nossa fé!\".\n\n[tolerant_vassal.GetTitledFirstName|l] interrompe as palavras de [religious_vassal.GetFirstNameNoTooltip] erguendo a mão e dando um passo à frente. \"[ROOT.Char.Custom2('RelationToMeAddress', tolerant_vassal)|U], embora o julgamento de [religious_vassal.GetFirstNameNoTooltip] esteja correto, é a única falha #EMP único#! do [unconventional_preacher.Custom('ES_DelDela')] pregador[unconventional_preacher.Custom('ES_XA')]. Tudo o que [unconventional_preacher.GetSheHe] ensina está de acordo com a nossa fé\"."
 hold_court.3010.a: "[Select_CString( excellent_skill_option.IsFemale, 'Esta predicadora', 'Este predicador' )] deve se unir à minha corte!"
 hold_court.3010.b: "Tirem este pregador da minha frente[Select_CString( excellent_skill_option.IsFemale, 'esta predicadora', 'este predicador' )]!"
 hold_court.3010.c: "Desejo contratar este[unconventional_preacher.Custom('ES_EA')] pregador[unconventional_preacher.Custom('ES_XA')] como meu $high_almoner_court_position$."
 hold_court.3010.d: "Se ele(a) puder ensinar os camponeses, então ele(a) seria um[unconventional_preacher.Custom('ES_XA')] bom[unconventional_preacher.Custom('ES_XA')] $court_tutor_court_position$…"
 hold_court.3020.t: "Um Monumento Ofensivo"
 hold_court.3020.desc: "Um[different_culture_peasant.Custom('ES_XA')] camponês[different_culture_peasant.Custom('ES_OA')] se adianta, e apresenta sua petição. «[ROOT.Char.Custom('FormOfAddressForLiege')|U], venho a vós como representante dos [village.GetCountyData.GetCulture.GetCollectiveNounNoTooltip] de [village.GetName]». [different_culture_peasant.Custom('ES_ElLa')|U] camponês[different_culture_peasant.Custom('ES_OA')] faz uma breve pausa em seu discurso ensaiado.\n\n«Nosso pedido para restaurar um importante monumento de nossa cultura foi ignorado por [holder_of_area.Custom('ES_ElLa')] [holder_of_area.GetTitleTierName] e está nos impedindo ativamente de reconstruí-lo!»\n\n«¡[ROOT.Char.Custom2('RelationToMeAddress', holder_of_area)|U], permiti-me explicar!». [holder_of_area.GetFirstNameNoTooltip] intervém apavorad[holder_of_area.Custom('ES_OA')]. «¡Esse monumento é uma zombaria à nossa cultura! ¡Retrata os [holder_of_area.GetCulture.GetCollectiveNounNoTooltip] como monstros! ¡Entendereis, portanto, por que me oponho à restauração de um monumento tão odioso!»."
 hold_court.3020.a: "\"Derrubem isso!\""
 hold_court.3020.b: "Dê sua aprovação formal para a restauração."
 hold_court.3020.c: "Construa um monumento diferente — um que represente ambas as culturas."
 every_county_of_culture: "Cada [county|lE] no [realm|lE] da cultura [village.GetCountyData.GetCulture.GetName]"
 3020_MONUMENT_VALUE: "Estátua Restaurada"
 3020_multicultural_monument: "Monumento Multicultural"
 3020_multicultural_monument_desc: "Um importante monumento cultural foi recentemente renovado para incluir elementos de outra cultura, desfocando as linhas que dividem as duas culturas.\n\n #P +10%#! Velocidade de Conversão Cultural"
 3020_own_culture_monument: "Monumento Dominante"
 3020_own_culture_monument_desc: "Um importante monumento cultural foi recentemente derrubado e substituído por um pertencente a outra cultura, irritando os locais e desafiando sua identidade cultural.\n\n #P +10%#! Velocidade de Conversão Cultural"
 hold_court.3030.t: "Restauração do Monumento"
 hold_court.3030.desc: "Um[different_culture_peasant.Custom('ES_XA')] camponês[different_culture_peasant.Custom('ES_OA')] apresenta-se diante de mim, informando a corte de seu pedido.\n\n“A guerra recente causou estragos no campo, e não temos certeza de quem foi o culpado, mas saquearam um local de grande importância cultural para nós, os [different_culture_peasant.GetCulture.GetCollectiveNounNoTooltip] de [province.GetName]. Por favor, suplicamos que nos cedam alguns de seus recursos para que possamos vê-lo restaurado!”\n\n. Esse camponês[different_culture_peasant.Custom('ES_OA')] encerra seu pedido com uma reverência desajeitada — um claro indicativo de sua baixa condição social."
 hold_court.3030.a: "\"Você receberá os fundos necessários para a restauração.\""
 hold_court.3030.b: "Use os materiais restantes para outras construções."
 hold_court.3030.c: "\"Não podemos nos dar ao luxo de gastar ouro com essa questão.\""
 hold_court.3040.t: "Pedindo Risadas"
 hold_court.3040.desc: "Em um breve momento de silêncio, vejo [jester_requester.GetTitledFirstName|l] [ROOT.Char.Custom2('QuirkPPPosOrNeg', SCOPE.sC('jester_requester'))] antes de perceber que é a vez dele falar. \"[ROOT.Char.Custom2('RelationToMeAddress', jester_requester)|U]!\", diz ele, dando-lhe um tempo precioso para finalizar seus pensamentos antes de continuar.\n\n\"Sorrisos e gargalhadas são um ótimo indicador de uma corte animada! Portanto, tenho uma sugestão de alguém que seria um ótimo bobo para nos entreter e que poderia vir nos visitar!\".\n\n\"[ROOT.Char.Custom2('RelationToMeAddress', kill_joy)|U], se me permitis\". [kill_joy.GetTitledFirstName|l] fala das laterais: \"Um bobo arruinará o ar sofisticado desta corte e substituirá seu requinte por um humor grosseiro e infantil\"."
 hold_court.3040.a: "Eu irei empregar esse bobo da corte seu!"
 hold_court.3040.b: "Um papel perfeito para [jester_requester.GetTitledFirstNameNoTooltip|l], mestre[jester_requester.Custom('ES_OA')] em parecer um bobo."
 hold_court.3040.c: "Se [kill_joy.GetTitledFirstNameNoTooltip|l] não gosta de rir, devemos tornar[kill_joy.GetHerHim] risível!"
 hold_court.3040.d: "Isto não é um mercado de camponeses! Um bobo da corte não tem lugar nesta corte!"
 hold_court.3040.e: "Talvez eu investigue isso em outro momento."
 generic_cp_discount_tt: "Esta [court_position|lE] será #P 50%#! mais barata para empregar"
 hold_court.3060.t: "Combatendo a Corrupção"
 hold_court.3060.desc.opening: "Meu [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('county_petitioner'))], [county_petitioner.GetTitledFirstName|l], [ROOT.Char.Custom2('QuirkPresentPosOrNeg', SCOPE.sC('county_petitioner'))] antes de dar um passo à frente para expressar sua petição. \"[ROOT.Char.Custom2('RelationToMeAddress', county_petitioner)|U],! busco sua ajuda para combater a questão de"
 hold_court.3060.desc.thieves: "ladrões roubando de [corrupt_county.GetNameNoTier] e seu povo!"
 hold_court.3060.desc.bandits: "bandidos assediando o povo modesto de [corrupt_county.GetNameNoTier]!"
 hold_court.3060.desc.tax: "a arrecadação de impostos não funcionando em [corrupt_county.GetNameNoTier]!"
 hold_court.3060.desc.sheriffs: "a falta de xerifes em [corrupt_county.GetNameNoTier]!"
 hold_court.3060.desc.guilds: "falta de cooperação das guildas em [corrupt_county.GetNameNoTier]!"
 hold_court.3060.desc.levies: "levies não sendo restauradas em um ritmo aceitável em [corrupt_county.GetNameNoTier]!"
 hold_court.3060.desc.courts: "a falta de tribunais judiciais em [corrupt_county.GetNameNoTier]!"
 hold_court.3060.desc.rulers: "a administração negligente de [corrupt_county.GetNameNoTier]!"
 hold_court.3060.desc.closing: "\n\n[county_petitioner.GetSheHe|U] faz uma pausa para suspirar. \"Minhas terras são apenas uma entre muitas do reino que sofrem com a falta de controle. Peço qualquer ajuda que puderem oferecer\"."
 hold_court.3060.a: "Devemos investir nessas regiões selvagens."
 hold_court.3060.b: "Meu Administrador pode lhe oferecer conselhos."
 hold_court.3060.c: "Infelizmente, o tesouro está vazio."
 hold_court.3060.d: "Meu [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('cp_steward_replacement'))], [cp_steward_replacement.GetFirstNameNoTooltip] seria um melhor administrador[cp_steward_replacement.Custom('ES_XA')]."
 every_low_county_control: "Todo [county|lE] no [realm|lE] com 33 [control|lE] ou menos"
 hold_court.3080.t: "Exibindo a Coleção d [ROOT.GetCharacter.GetTitledFirstName|l]"
 hold_court.3080.desc: "Meu [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('antiquarian'))], [antiquarian.Custom('ES_ElLa')] [antiquarian.GetTitledFirstName|l], aproxima-se de mim com certo ímpeto.\n\n«[ROOT.Char.Custom2('RelationToMeAddress', antiquarian)|U]!», diz, repleto[antiquarian.Custom('ES_OA')] de entusiasmo. «Tenho uma ótima ideia que pode trazer a vocês dinheiro ou fama! Vocês reuniram uma boa coleção de artefatos, [ROOT.Char.Custom('FormOfAddressForLiege')]. Então, por que não os exibir? Vocês poderiam cobrar para ver a coleção, ou deixá-la gratuita, para que mais pessoas a vejam».\n\nLimpa a garganta antes de continuar: «As pessoas tendem a querer as coisas que veem, então a desvantagem pode ser que mais gente tente reivindicar seus artefatos»."
 hold_court.3080.a: "Eu quero que as pessoas paguem para contemplar um vislumbre da minha glória!"
 hold_court.3080.a.tt: "Esquemas hostis de artefatos se tornarão mais comuns."
 hold_court.3080.b: "Algumas pessoas precisam ver para acreditar, e isso inclui os menos afortunados."
 hold_court.3080.c: "Não vale a pena correr os riscos."
 hold_court.3090.t: "Celebrando Outra Cultura"
 hold_court.3090.desc: "Meu [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('different_culture_vassal'))] , [different_culture_vassal.Custom('ES_ElLa')] [different_culture_vassal.GetTitledFirstName|l] , se aproxima de mim, [ROOT.Char.Custom2('QuirkPPPosOrNeg', SCOPE.sC('different_culture_vassal'))] \n\n como costuma fazer.[ROOT.Char.Custom('FormOfAddressForLiege')|U]«[ROOT.Char.Custom('RealmType')], tenho uma ideia brilhante! Que tal organizarmos uma feira, ou talvez até um festival para o povo, para expô-los a uma das diferentes culturas do nosso belo [different_culture_vassal.GetFirstNameNoTooltip]?». \n\n explica melhor sua ideia, até que percebe que está perigosamente perto de se alongar demais na explicação.[different_culture_vassal.Custom('ES_OA')]«Vai custar dinheiro, mas tenho certeza de que ajudará a cultivar uma relação mais positiva entre nossos povos!»."
 hold_court.3090.a: "Vamos realizar um grande festival, celebrando ambas as nossas culturas!"
 hold_court.3090.b: "Podemos organizar uma pequena feira [different_culture_vassal.GetCulture.GetNameNoTooltip] em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 hold_court.3090.c: "Realizar uma exposição nas terras [different_culture_vassal.GetCulture.GetCollectiveNounNoTooltip] para mostrar a grandeza da cultura [ROOT.GetCharacter.GetCulture.GetNameNoTooltip]!"
 hold_court.3090.d: "Eu não posso gastar recursos com isso."
 hold_court.3091.t: "Fusão de Identidades Culturais"
 hold_court.3091.desc: "O ar está carregado de expectativa quando meu [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('same_culture_vassal'))], [same_culture_vassal.Custom('ES_ElLa')] [same_culture_vassal.GetTitledFirstName|l], se aproxima de mim.\n\n\"[ROOT.Char.Custom('FormOfAddressForLiege')|U], venho com notícias graves, mas com uma solução para corrigir este problema. Cada vez fica mais claro que [different_culture_vassal.GetCulture.GetCollectiveNoun] e [same_culture_vassal.GetCulture.GetCollectiveNoun] estão ficando cada vez mais parecidos, talvez #EMP demasiado#!. É fundamental mostrar a eles que somos nós, os [same_culture_vassal.GetCulture.GetCollectiveNounNoTooltip], que estamos na vanguarda da inovação!\"."
 hold_court.3091.a: "Vamos realizar um festival para celebrar nossa rica cultura [same_culture_vassal.GetCulture.GetNameNoTooltip]!"
 hold_court.3091.b: "Organize uma exposição para mostrar nossas maiores realizações."
 hold_court.3091.c: "Não há necessidade de exercermos superioridade sobre outras culturas."
