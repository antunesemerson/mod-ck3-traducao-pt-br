l_spanish:
 realm_maintenance.1001.t: "Novo Suserano"
 realm_maintenance.1001.t.ceremonial_regent: "Novo $game_concept_ceremonial_regent$"
 realm_maintenance.1001.conquest: "[new_liege.Custom('ES_ElLa')|U] [new_liege.GetTitledFirstName|l] tornou-se seu nov[new_liege.Custom('ES_OA')] [Concept( 'liege', Select_CString(new_liege.IsFemale, 'senhora', 'senhor'))|E] por direito de conquista"
 realm_maintenance.1001.conquest_holy_war: "[new_liege.Custom('ES_ElLa')|U] [new_liege.GetTitledFirstName|l] se tornou seu nov[new_liege.Custom('ES_OA')] [Concept( 'liege', Select_CString(new_liege.IsFemale, 'senhora', 'senhor'))|E] após libertar suas terras do domínio [old_liege.Custom2('GetUnbelieverTermAdjective', ROOT.Char)] [old_liege.Custom('ES_DelDela')] [old_liege.GetTitledFirstName|l]!"
 realm_maintenance.1001.conquest_claim: "$realm_maintenance.1001.conquest$"
 realm_maintenance.1001.conquest_populist: "[new_liege.Custom('ES_ElLa')|U] [new_liege.GetTitledFirstName|l] se tornou seu nov[new_liege.Custom('ES_OA')] [Concept( 'liege', Select_CString(new_liege.IsFemale, 'senhora', 'senhor'))|E] após libertar suas terras [old_liege.Custom('ES_DelDela')] [old_liege.Custom2('GetUnbelieverAndForeignerTerm', ROOT.Char)] [old_liege.GetTitledFirstName|l]!"
 realm_maintenance.1001.inheritance: "[new_liege.Custom('ES_ElLa')|U] [new_liege.GetTitledFirstName|l] se tornou seu nov[new_liege.Custom('ES_OA')] [Concept( 'liege', Select_CString(new_liege.IsFemale, 'senhora', 'senhor'))|E] ao herdar os [titles|lE] [old_liege.Custom('ES_DelDela')] [old_liege.GetTitledFirstName|l]"
 realm_maintenance.1001.abdication: "[new_liege.Custom('ES_ElLa')|U] [new_liege.GetTitledFirstName|l] se tornou seu nov[new_liege.Custom('ES_OA')] [Concept( 'liege', Select_CString(new_liege.IsFemale, 'senhora', 'senhor'))|E] depois que [old_liege.Custom('ES_ElLa')] [old_liege.GetTitledFirstName|l] abdicou do trono"
 realm_maintenance.1001.destroyed: "[new_liege.Custom('ES_ElLa')|U] [new_liege.GetTitledFirstName|l] tornou-se seu nov[new_liege.Custom('ES_OA')] [Concept( 'liege', Select_CString(new_liege.IsFemale, 'senhora', 'senhor'))|E] devido à destruição de [title|lE]"
 realm_maintenance.1001.created: "[new_liege.Custom('ES_ElLa')|U] [new_liege.GetTitledFirstName|l] se tornou seu nov[new_liege.Custom('ES_OA')] [Concept( 'liege', Select_CString(new_liege.IsFemale, 'senhora', 'senhor'))|E] pela criação de [title|lE]"
 realm_maintenance.1001.usurped: "[new_liege.Custom('ES_ElLa')|U] [new_liege.GetTitledFirstName|l] se tornou seu nov[new_liege.Custom('ES_OA')] [Concept( 'liege', Select_CString(new_liege.IsFemale, 'senhora', 'senhor'))|E] após usurpar [titles|lE] [old_liege.Custom('ES_DelDela')] [old_liege.GetTitledFirstName|l]"
 realm_maintenance.1001.granted: "[new_liege.Custom('ES_ElLa')|U] [new_liege.GetTitledFirstName|l] se tornou seu nov[new_liege.Custom('ES_OA')] [Concept( 'liege', Select_CString(new_liege.IsFemale, 'senhora', 'senhor'))|E] ao receber novos [titles|lE]"
 realm_maintenance.1001.revoked: "[new_liege.Custom('ES_ElLa')|U] [new_liege.GetTitledFirstName|l] se tornou seu nov[new_liege.Custom('ES_OA')] [Concept( 'liege', Select_CString(new_liege.IsFemale, 'senhora', 'senhor' ) )|lE], pois os títulos foram revogados de [old_liege.Custom('ES_DelDela')] [old_liege.GetTitledFirstName|l]"
 realm_maintenance.1001.election: "[new_liege.Custom('ES_ElLa')|U] [new_liege.GetTitledFirstName|l] se tornou seu nov[new_liege.Custom('ES_OA')] [Concept( 'liege', Select_CString(new_liege.IsFemale, 'senhora', 'senhor'))|E] ao vencer a eleição para substituir [old_liege.Custom('ES_AlAla')] [old_liege.GetTitledFirstName|l]"
 realm_maintenance.1001.independency: "[new_liege.Custom('ES_ElLa')|U] [new_liege.GetTitledFirstName|l] se tornou seu nov[new_liege.Custom('ES_OA')] [Concept( 'liege', Select_CString(new_liege.IsFemale, 'senhora', 'senhor'))|E] ao conquistar a independência"
 realm_maintenance.1001.returned: "[new_liege.Custom('ES_ElLa')|U] [new_liege.GetTitledFirstName|l] se tornou seu nov[new_liege.Custom('ES_OA')] [Concept( 'liege', Select_CString(new_liege.IsFemale, 'senhora', 'senhor'))|E] depois de conseguir que [old_liege.Custom('ES_ElLa')] [old_liege.GetTitledFirstName|l] lhe devolvesse seus títulos"
 realm_maintenance.1001.leased_out: "[new_liege.Custom('ES_ElLa')|U] [new_liege.GetTitledFirstName|l] se tornou seu nov[new_liege.Custom('ES_OA')] [Concept( 'liege', Select_CString(new_liege.IsFemale, 'senhora', 'senhor'))|E] porque arrendou um [title|lE] [old_liege.Custom('ES_AlAla')] [old_liege.GetTitledFirstName|l]"
 realm_maintenance.1001.lease_revoked: "[new_liege.Custom('ES_ElLa')|U] [new_liege.GetTitledFirstName|l] tornou-se seu nov[new_liege.Custom('ES_OA')] [Concept( 'liege', Select_CString(new_liege.IsFemale, 'senhora', 'senhor'))|E] porque revogou o arrendamento dos títulos de [old_liege.Custom('ES_DelDela')] [old_liege.GetTitledFirstName|l]"
 realm_maintenance.1001.faction_demand: "[new_liege.Custom('ES_ElLa')|U] [new_liege.GetTitledFirstName|l] substituiu [old_liege.Custom('ES_AlAla')] [old_liege.GetTitledFirstName|l] como seu [Concept('liege',Select_CString(new_liege.IsFemale,'senhora', 'senhor'))|E] por imposição de uma [faction|lE]"
 realm_maintenance.1001.swear_fealty: "Has jurado lealtad a [new_liege.GetTitledFirstName|l] y te has convertido en su [Concept( 'vassal', 'vasall' )|E][ROOT.Char.Custom('ES_OA')]"
 realm_maintenance.1001.appointment: "[new_liege.Custom('ES_ElLa')|U] [new_liege.GetTitledFirstName] ha reemplazado [old_liege.Custom('ES_AlAla')] [old_liege.GetTitledFirstName|l] como tu [Concept('liege',Select_CString(new_liege.IsFemale,'señora', 'señor'))|E] al ser [new_liege.Custom('ES_ElLa')] siguiente candidat[new_liege.Custom('ES_OA')]."
 realm_maintenance.1001.appointment_succession: "$realm_maintenance.1001.appointment$"
 realm_maintenance.1001.stepped_down: "[new_liege.Custom('ES_ElLa')|U] [new_liege.GetTitledFirstName|l] se tornou seu nov[new_liege.Custom('ES_OA')] [Concept( 'liege', Select_CString(new_liege.IsFemale, 'senhora', 'senhor'))|E] devido à renúncia de [old_liege.Custom('ES_DelDela')] [old_liege.GetTitledFirstName|l]"
 realm_maintenance.1001.error: "[new_liege.Custom('ES_ElLa')|U] [new_liege.GetTitledFirstName|l] se tornou sua nov[new_liege.Custom('ES_OA')] [Concept( 'liege', Select_CString(new_liege.IsFemale, 'senhora', 'senhor'))|E], mas você não sabe por quê!"
 realm_maintenance.2001.t: "O nov[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip]"
 realm_maintenance.2001.t_ceremonial_regent: "Tesoureiro de [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip]"
 realm_maintenance.2001.desc_murdered: "Após a trágica e #EMP infeliz#! morte de [previous_holder.Custom2('MyCharacterIntroduction', ROOT.Char)], a responsabilidade de liderar o vasto [title.GetTierAsNameNoTooltip] agora recai sobre meus ombros."
 realm_maintenance.2001.desc_dead: "Com o falecimento de [previous_holder.Custom2('MyCharacterIntroduction', ROOT.Char)], a responsabilidade de liderar o vasto [title.GetTierAsNameNoTooltip|l] agora recai sobre meus ombros."
 realm_maintenance.2001.desc_alive: "Ahora depende de mí dirigir el aparato que dejó mi predecesor[previous_holder.Custom('ES_XA')], [previous_holder.Custom('ES_ElLa')] [previous_holder.GetTitledFirstName|l]."
 realm_maintenance.2001.desc: "\n\nEu me preparo para ter uma aparência digna de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l], me apresento diante dos vassalos e [ROOT.Char.Custom('quirk_pos_personal_present')]. Ah, as coisas que realizarei!"
 realm_maintenance.2001.desc_ceremonial_regent: "É meu solene dever conduzir [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] em nome de [ROOT.Char.GetPrimaryTitle.MakeScope.Var('administrative_ui_special_title').Title.GetHolder.Custom('ES_DelDela')] [ROOT.Char.GetPrimaryTitle.MakeScope.Var('administrative_ui_special_title').Title.GetHolder.GetTitledFirstName|l].\n\nSento-me com dignidade diante da corte reunida, absorvendo o momento, e [ROOT.Char.Custom('quirk_pos_personal_present')]. Ah, tantas coisas que realizarei!"
 realm_maintenance.2001.a: "Viva [ROOT.Char.GetTitleAsNameNoTooltip]!"
 realm_maintenance.2001.a.ceremonial_regent: "É uma grande honra para mim ajudar [ROOT.Char.GetPrimaryTitle.MakeScope.Var('administrative_ui_special_title').Title.GetHolder.Custom('ES_AlAla')] [ROOT.Char.GetPrimaryTitle.MakeScope.Var('administrative_ui_special_title').Title.GetHolder.GetTitleAsNameNoTooltip]!"
