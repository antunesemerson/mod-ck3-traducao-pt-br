l_spanish:
 vassal_interaction.0001.opening: "[actor.Custom2('GreetingToVassal', ROOT.Char)]"
 vassal_interaction.0001.desc: "Exijo que você cesse imediatamente sua guerra contra [defender.GetTitledFirstName|l] do [defender.GetPrimaryTitle.GetName]!\n\nO reino perdura quando estamos unidos, não divididos."
 vassal_interaction.0001.a: "Vosso desejo é uma ordem, meu [actor.Custom('ES_SennorSennora')]."
 vassal_interaction.0001.b: "Isso é uma questão de honra, não desistida facilmente."
 vassal_interaction.0001.request_favor_tt: "Eu solicito um [favor|lE] em troca"
 vassal_interaction.0001.request_gold_tt: "Eu solicito ouro em troca"
 vassal_interaction.0001.accept: "[actor.GetFirstNameNoTooltip] aceita minha solicitação"
 vassal_interaction.0001.decline: "[actor.GetFirstNameNoTooltip] recusa"
 vassal_interaction.0001.c: "Já investi tanto nessa guerra..."
 vassal_interaction.0001.d: "Não, levarei isso até o fim!"
 vassal_interaction.0001.e: "Não. E você não pode me impedir!"
 vassal_interaction.0002.opening: "[recipient.Custom2('GreetingToLiege', ROOT.Char)]"
 vassal_interaction.0002.desc: "É claro que obedecerei à sua sabedoria e desejo. Embora minha causa seja justa, eu a abandonarei por agora, pelo bem do reino."
 vassal_interaction.0002.a: "Um servo obediente é um bom servo."
 vassal_interaction.0003.desc: "Estou muito perto de alcançar meus objetivos para desistir sem receber nada em troca. Eu cederei se você me prometer uma restituição futura."
 vassal_interaction.0003.a: "Você tem a minha palavra."
 vassal_interaction.0003.b: "Você deveria estar fazendo o que eu digo, não importa o quê!"
 vassal_interaction.0003.b.tt: "A guerra continua"
 vassal_interaction.0004.desc: "Essa guerra custou caro demais para mim para abandoná-la agora. No entanto, uma pequena contribuição para restaurar meu tesouro pode me convencer do contrário."
 vassal_interaction.0004.a: "Compensação é apenas justa."
 vassal_interaction.0004.b: "Isso é um valor ultrajante!"
 vassal_interaction.0005.opening: "[recipient.Custom2('GreetingToLiege', ROOT.Char)]"
 vassal_interaction.0005.desc: "Tenho o maior respeito pelos seus desejos, mas o destino já está selado. Levarei essa guerra até o fim."
 vassal_interaction.0005.a: "Como você se atreve a me desafiar!"
 vassal_interaction.0005.b: "Terei que aceitar. Dessa vez."
 vassal_interaction.0006.desc: "Sua causa é justa, e seria injusto exigir isso de você sem qualquer recompensa."
 vassal_interaction.0006.favor: "Eu ficarei te devendo por essa."
 vassal_interaction.0006.gold: "Eu pagarei o ouro que você perdeu, contanto que a luta termine agora."
 vassal_interaction.0006.a: "Obrigado por sua generosidade."
 vassal_interaction.0006.b: "Obrigado por sua generosidade."
 vassal_interaction.0007.desc: "Estou indignado que você exija subornos para cumprir as ordens do seu suserano! Você me enviou nada menos que uma recusa desonrosa à minha demanda!"
 vassal_interaction.0007.a: "Muito bem. Tenho uma guerra para voltar."
 vassal_interaction.0011.desc: "A reivindicação de [attacker.GetTitledFirstName|l] é justa. Exijo que se rendam imediatamente a [attacker.Custom('ES_ElElla')] para que a ordem seja restaurada no domínio."
 vassal_interaction.0011.a: "Se assim deve ser, meu [actor.Custom('ES_SennorSennora')]."
 vassal_interaction.0011.b: "Por favor, não me peça para abandonar minha honra por nada."
 vassal_interaction.0011.c: "Esse é um sacrifício custoso que você me pede..."
 vassal_interaction.0011.d: "Não, lutarei contra [attacker.Custom('ES_ElElla')]!"
 vassal_interaction.0012.desc: "Peço-vos que reconsiderem o que me pediram, mas se esse é o vosso desejo, me renderei a [attacker.GetTitledFirstName|l]. Pelo bem de todo o reino."
 vassal_interaction.0012.a: "Recompensas pela lealdade sempre vêm com o tempo."
 vassal_interaction.0013.desc: "Eu perderia muito se desistisse da guerra contra [attacker.GetTitledFirstName|l]. Só posso ceder se você prometer restituição futura."
 vassal_interaction.0014.desc: "Render-se à guerra teria um custo muito alto. No entanto, se você me compensar pela perda, eu posso fazer o que você pede."
 vassal_interaction.0015.desc: "Eu perderia muito se me rendesse. Não desejo desobedecer, mas [attacker.GetTitledFirstName|l] me forçou."
 vassal_interaction.0016.gold: "Eu pagarei pelas suas perdas, contanto que a luta termine agora."
 vassal_interaction.0016.a: "Pelo menos ainda não perdi tudo."
 vassal_interaction.0016.b: "Usarei isso para me recuperar."
 vassal_interaction.you_owe_me: "Você fará o que eu digo!"
 vassal_interaction.war_ender_gives_up: "[recipient.GetShortUIName|U] abandonou sua guerra por ordem de [actor.GetFirstName]"
 vassal_interaction.0022.desc: "Escrevo para informar-vos de que concedi a independência a voss[recipient.Custom('ES_OA')] colega de vassalagem, [recipient.GetName]."
 vassal_interaction.0022.a: "Muito bem."
 vassal_interaction.0023.desc: "Escrevo para informar que concedi independência ao meu vassal[recipient.Custom('ES_OA')], [recipient.GetName]."
 vassal_interaction.0023.a: "Muito bem."
 vassal_interaction.0030.desc: "Seu apelo é justo, e me vejo convencido por seus argumentos.\n\nPor meio deste, eu o perdoo de todos e quaisquer crimes atuais aos olhos do [recipient.GetPrimaryTitle.GetNameNoTooltip], em perpetuidade. Você permanecerá [actor.GetWomanMan] livre!"
 vassal_interaction.0030.a: "Segurança, afinal!"
 vassal_interaction.0040.desc: "Embora você detenha o [target.GetBaseName], é claro para todos que sou #EMP eu#! quem o governa. Suas numerosas [county_in_title.Custom('TerrainTypeProvince')] e vilas estão sob a supervisão de #EMP meus#! meirinhos e #EMP meus#! magistrados.\n\nPortanto, estou reivindicando-o. Você está livre para me conceder o título quando quiser; caso contrário, tenho certeza de que ele acabará ficando comigo em devido tempo.\n\nDe um jeito ou de outro."
 vassal_interaction.0040.a: "Permiti que [actor.GetFirstNameNoTooltip] se tornasse muito forte..."
