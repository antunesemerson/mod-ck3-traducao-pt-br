l_spanish:
 conqueror.0001.t: "Governar o Mundo"
 conqueror.0001.desc: "Está cada vez mais claro. Do camponês mais humilde ao mais nobre dos meus vassalos — todos sussurram meu nome, sussurram sobre meu poder, sussurram sobre a #EMP guerra!#! Minha causa conta com apoio, pois meu povo me vê como um[ROOT.Char.Custom('ES_XA')] governante dign[ROOT.Char.Custom('ES_OA')] de reinar sobre o mundo inteiro.\n\nA força de [ROOT.Char.GetPrimaryTitle.GetBaseName] é minha para empunhar — e eu a empunharei. Avançar para fora é o que se espera de mim, reivindicar pela força aquilo que deveria me pertencer. Estou destinado a governar, subjugar os que me cercam e torná-los parte da minha [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip].\n\nCom o apoio do meu povo, não posso falhar."
 conqueror.0001.desc.temujin: "\n\nDe um lobo azul-acinzentado e uma corça fulva, só oferecerei ruína ou submissão."
 conqueror.0001.a: "Que a conquista comece!"
 conqueror_flavor: "Você começará a receber apoio de seus vassalos e do seu povo, mas cuidado: verá esse apoio enfraquecer se permanecer em paz por muito tempo, perder guerras demais, se tornar súdito de outro reino ou cair em desgraça...\n\nSe você morrer, espera-se que seus filhos assumam o manto da conquista."
 conqueror.0001.b: "Prefiro ficar aqui e sentir o cheiro das [ROOT.Char.GetCapitalLocation.Custom('get_region_flower_type_plural')]..."
 conqueror.0002.t: "Um Conquistador Fracassado"
 conqueror.0002.intro: "Acabou. Antigos amigos me viram as costas, o fluxo constante de apoio está se rompendo e meus soldados abandonam suas espadas em decepção.\n\n"
 conqueror.0002.peace: ""Um[ROOT.Char.Custom('ES_XA')] \"grande\" conquistador[ROOT.Char.Custom('ES_XA')] que não conquista, que piada!" As vozes dos meus súditos ecoam em meus salões. "Não queríamos paz, queríamos #EMP gloria!#!""
 conqueror.0002.prestige: ""Seu nome vale menos que o pó!", dizem meus súditos, zombeteiros. "Quem seguiria alguém tão desonrado?""
 conqueror.0002.debt_level: ""Arruinou [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]!", meus súditos exclamam, zombando. "O tesouro está completamente vazio; como pôde [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip|l] permitir que isso acontecesse?!"."
 conqueror.0002.lost_wars: ""[ROOT.Char.Custom('ES_ElLa')|U] [ROOT.Char.GetTitleAsNameNoTooltip|l] é fraco", ecoam as vozes dos meus súditos. "Perdeu uma guerra atrás da outra, quem seguiria um[ROOT.Char.Custom('ES_XA')] comandante tão incompetente?"."
 conqueror.0002.independence: "\"Nenhum conquistador #EMP verdadeiro#! se curvaria diante de outro.\" Meus súditos comentam entre si em voz baixa. \"É fraqueza, pura e simples. Nada além disso. Fraqueza.\""
 conqueror.0002.incapable: ""A cabeça dele/ dela se foi, não há ninguém ali para nos guiar", sussurram meus súditos. "Foi bom enquanto durou…""
 conqueror.0002.count: ""[root_scope.GetFirstName], um[ROOT.Char.Custom('ES_XA')] mer[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]... que patético!", sussurram meus súditos. "Esse título não vale #EMP nada#!, queremos seguir um rei, não um mendigo!"."
 conqueror.0002.outro: "As palavras ferem meus ouvidos.\n\nParece que minhas conquistas acabaram. Por enquanto."
 conqueror.0002.a: "Era bom demais para ser verdade..."
 conqueror_end_flavor: "Você não receberá mais apoio de seus vassalos e do povo."
 conqueror_title: "Você não receberá mais apoio de seus vassalos e do povo."
 conqueror_prefix: "Conquistador:"
 conqueror.1000.t: "$conqueror_prefix$ Para o Tesouro de Guerra"
 conqueror.1000.desc: ""Para o cofre de guerra", diz a missiva [generous_vassal.Custom('ES_DelDela')] [generous_vassal.GetTitledFirstName|l]. "Usai estes fundos sabiamente, ó, [ROOT.Char.GetTitleAsNameNoTooltip|l]: empregai-os para abastecer os arsenais, alimentar os soldados ou reforçar vossas fileiras com mercenários. Anseio ver a glória que trareis a [ROOT.Char.GetPrimaryTitle.GetBaseName]!".\n\nPosso dar um bom uso a isso."
 conqueror.1000.a: "Esse ouro é muito bem-vindo."
 conqueror.1000.b: "Use o ouro para atrair mercenários!"
 conqueror.1000.c: "Agradeça-lhe com toda a cortesia, mas não preciso de presentes!"
 mercenary_bolstering: "Fileiras Reforçadas por Mercenários"
 mercenary_bolstering_desc: "Este personagem atraiu a atenção de muitos mercenários, que acorrem a ele em busca de glória."
 conqueror.1100.t: "$conqueror_prefix$ Fileiras Reforçadas"
 conqueror.1100.desc: ""Saudações, [ROOT.Char.GetTitleAsNameNoTooltip|l] meu[ROOT.Char.Custom('ES_OA')]", diz o $knight_culture_player_no_tooltip$ ao se apresentar. "Sou [maa_leader.GetFirstName] e fui enviado por [generous_vassal.Custom('ES_ElLa')] [generous_vassal.GetTitledFirstName|l] para servi-lo. Comigo trago um séquito dos melhores soldados que [generous_vassal.GetCapitalLocation.GetTitle.GetName] conseguiu reunir!"\n\n"Tudo o que meu [generous_vassal.GetTitleAsNameNoTooltip|l] pede é que vocês nos deem uma boa utilidade e nos conduzam à glória!", diz, pondo-se em posição de sentido."
 conqueror.1100.a: "Vou providenciar alojamentos para vocês!"
 conqueror.1100.b: "Dividam os homens entre meus regimentos."
 conqueror.1100.c: "[generous_vassal.GetFirstNameNoTooltip] é generoso, mas não preciso de vocês."
 maa_recruitment_boon: "Recrutamento Eficaz de Homens de Armas"
 maa_recruitment_boon_desc: "Este personagem está recebendo ajuda de seus vassalos para recrutar soldados profissionais."
 war_war_war_opinion: "Guerra, Guerra, Guerra!"
 conqueror.1200.t: "$conqueror_prefix$ Soltem os Caçadores de Glória"
 conqueror.1200.desc: "O cântico ecoa por meus salões, minha capital, minhas terras — por todo o meu reino; \"Guerra! Guerra! Guerra!\", dizem.\n\nMeus vassalos ávidos por glória clamam para que o sangue de nossos inimigos seja derramado, para que eu traga sobre nós a fama que é meu destino.\n\nTenho o apoio inabalável deles."
 conqueror.1200.a: "Não vou decepcioná-los!"
 conqueror.1200.b: "Se querem guerra, então eu preciso de soldados."
 glory_hound_contribution: "Apoio dos Caçadores de Glória"
 glory_hound_contribution_desc: "Este personagem está obtendo apoio inabalável de seus vassalos [GetVassalStance( 'glory_hound' ).GetTextIcon][GetVassalStance( 'glory_hound' ).GetName|l]."
 conqueror.1300.t: "$conqueror_prefix$ Apoio Popular"
 conqueror.1300.desc: ""Meu [root_scope.GetLadyLord], meu [ROOT.Char.GetTitleAsNameNoTooltip|l], meu #EMP senhor[ROOT.Char.Custom('ES_XA')]#! indiscutível e muito [root_scope.Custom('ComplimentAdjective')]!" balbucia [Select_CString(portrait_peasant.IsFemale, 'a camponesa', 'o camponês' )] enquanto se prostra diante de mim.\n\n"Nós, das aldeias mais humildes de [peasant_barony.GetBaseName], viemos trazendo presentes: grãos, caça e ouro. Trabalhamos arduamente, mas sabemos que trará prosperidade!" continua.\n\nTalvez sejam os mais humildes dos meus súditos, mas fariam qualquer coisa que eu lhes pedisse."
 conqueror.1300.a: "Presentes maravilhosos, agradeço a todos!"
 conqueror.1300.b: "Quando virem meus soldados, alimentem-nos."
 conqueror.1300.c: "Deixem seus campos estéreis por mais algum tempo, preciso de vocês."
 peasant_supplies: "Amplo Apoio Camponês"
 peasant_supplies_desc: "Este personagem é amplamente popular entre os camponeses, que entregam mais suprimentos do que o normal de boa vontade."
 peasant_draft: "Conscrição Camponesa"
 peasant_draft_desc: "Camponeses correm para os estandartes deste personagem, mais do que dispostos a pegar em armas na leva."
 conqueror_feed_county_gift: "[county_target.GetNameNoTooltip] Envia Ouro"
 conqueror_feed_county_gift_desc: "Os camponeses de [county_target.GetName] estão entusiasmados com suas conquistas e enviam ouro para você."
 conqueror_feed_county_gift_herd: "[county_target.GetNameNoTooltip] Envia Rebanhos"
 conqueror_feed_county_gift_desc_herd: "Os pastores comuns de [county_target.GetName] estão admirados com o grande [ROOT.Char.GetTitleAsName|l] e lhe presenteiam com animais de qualidade."
 conqueror_feed_knight_joins: "$knight_culture_player_no_tooltip$ Junta-se à Sua Causa"
 conqueror_feed_knight_joins_desc: "O $knight_culture_player_no_tooltip$ [knight.GetFullName] lhe jura lealdade! ([knight.GetProwess] @skill_prowess_icon!)"
 conqueror_feed_angry_vassal: "Vassalo Furioso Impressionado"
 conqueror_feed_angry_vassal_desc: "A seu [Concept('vassal',Select_CString(angry_vassal.IsFemale,'vasalla','vasallo'))|E] [angry_vassal.GetFullName] se impressiona com suas conquistas."
 conqueror_feed_generous_courtier: "[generous_courtier.GetFirstName] Doa Ouro"
 conqueror_feed_generous_courtier_desc: "Seu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('generous_courtier'))] [generous_courtier.GetFullName] doa ouro para sua causa!"
 conqueror_feed_siege_engineer: "Engenheiro de Cerco se Junta"
 conqueror_feed_siege_engineer_desc: "O [GetTrait('military_engineer').GetName( GetNullCharacter )|l] [new_commander.GetFullName] junta-se às suas fileiras!"
