 travel_events_oltner_2.1180.t: "Confissões ao Luar"
 travel_events_oltner_2.1180.desc: "Sob a luz da lua em [location.GetName], escuto uma conversa íntima entre meu [ROOT.Char.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] e meu [ROOT.Char.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName].\n\n“Oh, [entourage_member_1.GetFirstNameNoTooltip], meu [entourage_member_1.Custom('RomanticComplimentNoun')|l] [entourage_member_1.Custom('RomanticComplimentAdjective')], você faz com que estas noites estreladas sejam inesquecíveis”, confessa, com a voz trêmula. [entourage_member_1.GetFirstNameNoTooltip] responde suavemente, “Jamais imaginei encontrar alguém que me entendesse tão bem.”\n\nParece que o amor está florescendo em minha comitiva…"
 travel_events_oltner_2.1180.a: "Adorável, mas [seduced_entourage.GetFirstNameNoTooltip] não se #EMP me#! pode resistir."
 travel_events_oltner_2.1180.b: "\"Oi! Sobre o que vocês estão falando? Posso me juntar a vocês!?\""
 travel_events_oltner_2.1180.c: "Drama... Seria #EMP uma verdadeira pena#! se isso vazasse..."
 travel_events_oltner_2.1180.d: "Que ternura, vou deix?-los em paz."
 lover_moonlit_evening_on_the_road: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUINameNoTooltip] [CHARACTER.LocalPlayerString( 'os enamorasteis', 'se enamoraron' )] após se sentarem [Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale),'juntas','juntos')] a olhar as estrelas como parte do séquito de [TARGET_CHARACTER_2.GetShortUIName]."
