 avoiding_traps_modifier_desc: "Esta comitiva está evitando armadilhas a todo custo."
 travel_events_oltner_2.1210.t: "Serenata Noturna"
 travel_events_oltner_2.1210.desc: "Sob o céu estrelado de [location.GetName], o acampamento é presenteado com uma apresentação inesperada. Meu [ROOT.Char.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName] surpreende a todos com uma melodia tocante; sua voz ecoa com elogios ao meu [ROOT.Char.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName].\n\n[entourage_member_1.GetFirstName] escuta atentamente, visivelmente aturdid[entourage_member_1.Custom('ES_OA')]. Quando a canção termina, um reconhecimento silencioso passa entre [Select_CString(And(entourage_member_1.IsFemale, entourage_member_2.IsFemale),'ellas','ellos')]."
 travel_events_oltner_2.1210.a: "Se algo estiver acontecendo entre [Select_CString(And(entourage_member_1.IsFemale, entourage_member_2.IsFemale),'essas duas','esses dois')], eu vou descobrir?"
 travel_events_oltner_2.1210.b: "\"[entourage_member_2.GetFirstNameNoTooltip], o mundo deveria ouvir você tocar e cantar!\""
 travel_events_oltner_2.1210.c: "\"Você... você pode me ensinar a tocar assim?\""
 travel_events_oltner_2.1210.d: "\"Ah, que melodia bonita.\""
 travel_events_oltner_2.1210.a.success: "Você descobre algo"
 travel_events_oltner_2.1210.a.failure: "Não há nada a descobrir"
