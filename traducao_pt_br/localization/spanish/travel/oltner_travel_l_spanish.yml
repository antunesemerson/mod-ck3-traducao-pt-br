l_spanish:
 travel_events_oltner_2.1000.t: "Areias Cultivadas"
 travel_events_oltner_2.1000.desc: "O sol queima as dunas de [location.GetName], fazendo de cada passo um testemunho de resistência. Ainda assim, em meio a essa extensão árida, floresce um oásis de vegetação, uma maravilha agrícola no coração do deserto.\n\nEnquanto admiramos essa anomalia, [local_character.Custom('ES_ElLa')] administrador[local_character.Custom('ES_XA')] destas terras se aproxima com um sorriso castigado pelo sol. \"Viajantes\", [local_character.GetSheHe] nos chama, \"venham, testemunhem os frutos do nosso trabalho. Talvez levem de volta aos seus lares histórias do nosso triunfo sobre as areias!\""
 travel_events_oltner_2.1000.option.a: "\"Mostre-nos como domaram o deserto.\""
 travel_events_oltner_2.1000.option.b: "\"Agradecemos, mas devemos recusar.\""
 travel_events_oltner_2.1000.option.c: "\"Talvez uma amostra da sua colheita para nos sustentar?\""
 travel_events_oltner_2.1000.option.d: "\"Gostaria de ouvir mais sobre suas vidas aqui.\""
 cultural_acceptance_gain_travel_stories: "Histórias compartilhadas durante [travel|lE]"
 travel_events_oltner_2.1010.t: "Hospícios Hospitaleiros"
 travel_events_oltner_2.1010.desc: "Enquanto viajamos pela [location.Custom('TerrainTypeProvince')] de [location.GetName], um hospício envolto em bela decoração [location.GetCulture.GetNameNoTooltip] aparece ao longo da estrada.\n\n\"Viajantes, parecem cansados. Nossas portas estão abertas para que descansem e recebam cuidados\", oferece um médico com um sorriso gentil. Dentro, o ar está calmo, cheio do aroma suave das ervas.\n\n\"Aqui, experimente minha famosa #EMP \"decocción de [location.Custom('get_region_flower_type')]\"#!. Ela revigorará suas almas!\"."
 travel_events_oltner_2.1010.b: "\"Ah, deixe-me participar da decocção!\""
 travel_events_oltner_2.1010.c: "\"Meu [ROOT.Char.Custom('GetCourtType')] poderia precisar de um médico, por que não se junta a nós?\""
 travel_events_oltner_2.1010.d: "\"Aqui está uma doação, use-a para ajudar os enfermos.\""
 well_funded_hospices_modifier: "Hospícios Bem-Financiados"
 well_funded_hospices_modifier_desc: "Hospícios nessas terras estão prosperando com generosas doações de viajantes."
 local_character_aptitude_physician: "A [aptitude|lE] de [local_character.GetUIName] como [GetCourtPositionType('court_physician_court_position').GetName()|l] ? [local_character.GetCourtPositionAptitude( GetCourtPositionType( 'court_physician_court_position' ) )|l]"
 travel_events_oltner_2.1020.t: "O Banquete do Pastor de Camelos"
 travel_events_oltner_2.1020.desc: "Quando meu séquito e eu percorremos a vastidão de [location.GetName], surge a silhueta inconfundível de uma fazenda de camelos. À medida que a noite cai, aproxima-se [Select_CString( local_character.IsFemale, 'uma cameleira', 'um cameleiro' )].\n\n\"Bem-vindos, estimados convidados\", [local_character.GetSheHe] diz sorrindo. \"Os camelos de [location.GetName] nos sustentam, e esta noite homenageamos essas nobres criaturas. Juntar-se-ão a nós sob as estrelas para um banquete e histórias do deserto?\""
 travel_events_oltner_2.1020.a: "\"Deixe as festividades desta noite revigorar nossas almas!\""
 travel_events_oltner_2.1020.b: "\"Estou intrigado pela resistência dos camelos.\""
 travel_events_oltner_2.1020.c: "\"Gostaria de comprar o seu melhor camelo para meu exército.\""
 travel_events_oltner_2.1020.d: "\"Infelizmente, devo atender ao chamado da jornada e recusar.\""
 travel_hardy_camels_modifier: "Camelos Resilientes"
 travel_hardy_camels_modifier_desc: "Essa viagem é facilitada por um grupo de camelos particularmente resistentes e confiáveis."
 war_camel_modifier: "Camelo de Guerra Poderoso"
 war_camel_modifier_desc: "Este personagem possui um camelo de guerra particularmente impressionante."
 travel_events_oltner_2.1030.t: "Uma Caravana Carregada"
 travel_events_oltner_2.1030.desc: "Viajando pelas areias de [location.GetName], uma caravana de camelos carregados cruza nosso caminho. O mestre da caravana nota nossa comitiva e interrompe a procissão.\n\n\"Nobres viajantes\", [local_character.GetSheHe] diz, com um brilho astuto no olhar, \"talvez queiram dar uma olhada nos tesouros que essas fortes bestas carregam? Pelo preço certo, as maravilhas do deserto podem acompanh?-los em suas jornadas.\""
 travel_events_oltner_2.1030.a: "\"Estou ansioso para ver suas mercadorias, vamos negociar.\""
 travel_events_oltner_2.1030.b: "\"Não é necessário, mas talvez possamos viajar juntos por um tempo?\""
 travel_events_oltner_2.1030.c: "\"Mostre-me algo único, um verdadeiro tesouro de [location.GetNameNoTooltip].\""
 travel_events_oltner_2.1030.d: "\"Já carregamos fardos suficientes...\""
 traveling_with_camel_merchants_modifier: "Viajando com Mercadores de Camelos"
 traveling_with_camel_merchants_modifier_desc: "Esta comitiva se juntou a um grupo de mercadores do deserto, tornando a jornada mais segura."
 artifact_purchased: "Artefato Comprado"
 purchase_artifact_trinket_tt: "Você ganha um [artifact|lE] aleatório."
 purchase_artifact_famed_tt: "Você ganha um [artifact|lE] famoso aleatório."
 travel_events_oltner_2.1040.t: "Oásis de Tranquilidade"
 travel_events_oltner_2.1040.desc: "Enquanto atravessamos as planícies áridas de [location.GetName], um oásis sereno surge ? vista, cercado por um grupo de camelos.\n\n[Select_CString( local_character.IsFemale, 'Uma anci? sábia', 'Um ancião sábio' )] reclinad[local_character.Custom('ES_OA')] junto ? água percebe nossa aproximação e nos convida com um gesto. \"Viajantes cansados\", começa, com a voz suave como a brisa da noite, \"o espírito do deserto pode ser duro. Descansem junto às nossas águas, deixem que a força silenciosa dos camelos os revigore.\""
 travel_events_oltner_2.1040.a: "\"Por [ROOT.Char.GetFaith.HighGodName], vamos ficar aqui por alguns dias!\""
 travel_events_oltner_2.1040.b: "\"Você parece sábio, por que não se junta a nós?\""
 travel_events_oltner_2.1040.c: "\"Talvez devêssemos negociar?\""
 travel_events_oltner_2.1040.d: "\"Seu oásis é um alívio para os olhos cansados, mas o tempo é precioso.\""
 travel_events_oltner_2.1050.t: "Emissários Equinos"
 travel_events_oltner_2.1050.desc: "Enquanto atravessamos os arredores de [location.GetName], o estrondo dos cascos quebra o silêncio. Uma equipe de cavalos de fineza e seus cavaleiros se aproxima, uma visão majestosa contra o pano de fundo de [location.Custom('TerrainTypeProvincePrefix')] [location.Custom('TerrainTypeProvince')].\n\n\"Salve, viajantes!\" chama o líder deles. \"Somos emissários do [location.GetTitle.GetName]. Gostariam de testemunhar a destreza de nossos corcéis?\""
 travel_events_oltner_2.1050.a: "\"Com prazer!\""
 travel_events_oltner_2.1050.b: "\"Quanto de ouro pelo mais forte?\""
 travel_events_oltner_2.1050.c: "\"Estou mais interessado na #EMP sua#! destreza como $knight_culture_player_plural_no_tooltip_lowercase$!\""
 travel_events_oltner_2.1050.d: "\"Belas criaturas, mas devo priorizar minha jornada.\""
 prefix_verdant: "verdejante"
 prefix_rolling: "ondulante"
 prefix_mighty: "poderoso"
 prefix_endless: "sem fim"
 prefix_lush: "luxuriante"
 prefix_rich: "rico"
 travel_events_oltner_2.1060.t: "Administrador dos Estábulos"
 travel_events_oltner_2.1060.desc: "O cheiro de feno e os relinchos nos guiam até os célebres estábulos de [location.GetName]. [Select_CString( local_character.IsFemale, 'A chefe', 'O chefe' )] de estábulos, uma figura muito respeitada nesta região, nos d? uma calorosa recepção.\n\n\"Sejam bem-vindos\", proclama. \"Meus cavalos estão entre os mais velozes que existem. Talvez vocês considerem comprar um companheiro tão nobre para suas viagens?\"."
 travel_events_oltner_2.1060.a: "\"Mostre-me o seu cavalo mais rápido.\""
 travel_events_oltner_2.1060.b: "\"Preciso de todos os seus melhores cavalos!\""
 travel_events_oltner_2.1060.c: "\"Você estaria interessado em comprar nossas éguas excedentes?\""
 travel_events_oltner_2.1060.d: "\"Lamentavelmente, devemos #EMp partir rapidamente#!...\""
 swift_horse_modifier: "Cavalo Ágil"
 swift_horse_modifier_desc: "O líder desta viagem possui um cavalo particularmente rápido."
 swift_horses_modifier: "Cavalos Ágeis"
 swift_horses_modifier_desc: "Este personagem equipa sua comitiva apenas com os cavalos mais rápidos."
 sold_horses_modifier: "Cavalos Vendidos"
 sold_horses_modifier_desc: "Esta comitiva vendeu seus cavalos excedentes."
 travel_events_oltner_2.1070.t: "O Curandeiro de Cavalos"
 travel_events_oltner_2.1070.desc: "Entre as pastagens tranquilas de [location.GetName], uma figura cuida de um cavalo com uma pata ferida. Ao nos aproximarmos, [Select_CString( local_character.IsFemale, 'a curandeira', 'o curandeiro' )] ergue o olhar, seus olhos refletem anos de conhecimento.\n\n\"Um simples tropeção\", explica, \"mas ela voltar? a correr\". Comovidos por seus cuidados, fazemos uma pausa em nossa jornada."
 travel_events_oltner_2.1070.a: "\"Podemos ajudar a curar essa nobre besta?\""
 travel_events_oltner_2.1070.b: "Você deveria ser [Select_CString( local_character.IsFemale, 'minha senhora', 'meu senhor' )] dos cavalos!"
 travel_events_oltner_2.1070.c: "\"Diga, você poderia me ensinar este ofício?\""
 travel_events_oltner_2.1070.d: "\"Espero que ela se recupere rapidamente, adeus.\""
 free_court_position: "Trabalha de Graça"
 master_of_the_horse_free: "[local_character.GetFirstName] ocupar? o cargo de [GetCourtPositionType('master_of_horse_court_position').GetName()|l] sem receber salário"
 excellent_horse_care_modifier: "Cuidado Excelente com Cavalos"
 excellent_horse_care_modifier_desc: "Este personagem é bem versado na arte de cuidar de cavalos."
 travel_events_oltner_2.1080.t: "Prodígio Pungente"
 travel_events_oltner_2.1080.desc: "Ao passarmos pelas fazendas de camelos de [location.GetName], um odor acre ataca nossos sentidos. Os camelos, por mais vitais que sejam, produzem um fedor que impregna cada canto.\n\nDe repente, um de nossos cavalos dispara para longe, aparentemente aterrorizado pelo cheiro.\n\n\"Perdão, [ROOT.Char.Custom('FormOfAddressForLiege')]!\", exclama o fazendeiro. \"Deixarei que escolha um dos meus melhores camelos para compensar sua perda.\""
 travel_events_oltner_2.1080.a: "\"Escolho o seu camelo mais majestoso.\""
 travel_events_oltner_2.1080.b: "\"Quero o espécime mais resistente.\""
 travel_events_oltner_2.1080.c: "\"O seu camelo mais rápido servirá.\""
 travel_events_oltner_2.1080.d: "\"Prefiro que me pague em ouro...\""
 exchange_camel_fast_modifier: "Camelo Rápido"
 exchange_camel_fast_modifier_desc: "Um dos cavalos desta comitiva fugiu e foi substituído por um camelo rápido."
 exchange_camel_sturdy_modifier: "Camelo Resistente"
 exchange_camel_sturdy_modifier_desc: "Um dos cavalos desta comitiva fugiu e foi substituído por um camelo resistente."
 travel_events_oltner_2.1090.t: "Sentinela das Dunas Silenciosas"
 travel_events_oltner_2.1090.desc: "No silêncio de [location.GetName], onde os ventos quentes esculpem as areias, uma torre de vigia solitária se ergue vigilante. Seu/sua [Select_CString( local_character.IsFemale, 'guardi?', 'guardião' )], um[local_character.Custom('ES_XA')] sentinela auster[local_character.Custom('ES_OA')], nos recebe calorosamente.\n\n\"Caros hóspedes!\", grita l? de cima. \"H? algo que eu possa fazer por vocês? Talvez queiram se juntar a mim para contemplar a tranquilidade da [location.Custom('TerrainTypeProvince')]?\"."
 travel_events_oltner_2.1090.a: "\"Deixai-nos descansar sob a vossa proteção, amig[local_character.Custom('ES_OA')]\"."
 travel_events_oltner_2.1090.b: "\"Diga-nos, estamos seguindo o caminho certo?\""
 travel_events_oltner_2.1090.c: "Talvez você pudesse ser nosso[local_character.Custom('ES_OA')] guia nestas terras?\""
 travel_events_oltner_2.1090.d: "\"Precisamos partir rapidamente.\""
 watchtower_guidance_modifier: "Orientação da Torre de Vigilância"
 watchtower_guidance_modifier_desc: "Este séquito recebeu orientação de um[local_character.Custom('ES_XA')] vigia de visão aguçada."
 watchman_guidance_modifier: "Vigia do Deserto"
 watchman_guidance_modifier_desc: "Esta comitiva está acompanhada por um vigia experiente, muito familiarizado com o terreno local."
 travel_events_oltner_2.1100.t: "Abundância Bovina"
 travel_events_oltner_2.1100.desc: "A jornada por [location.GetName] revela extensões de pastagens salpicadas de gado. Enquanto meu séquito para ? beira de um campo verdejante, aproxima-se [Select_CString( local_character.IsFemale, 'a vaqueira', 'o vaqueiro' )]. Dedilhando alegremente seu alaúde, [local_character.GetSheHe] nos oferece um largo sorriso ao nos cumprimentar.\n\n\"[ROOT.Char.Custom('FormOfAddressForLiege')|U]\", começa, \"estas feras são o orgulho de nossa província! Querem juntar-se a mim para testemunhar nosso trabalho, reabastecer seus suprimentos ou talvez provar nosso famoso queijo azul de [location.GetTitle.GetNameNoTierNoTooltip]?\""
 travel_events_oltner_2.1100.a: "\"Mostre-me como você cuida do seu rebanho.\""
 travel_events_oltner_2.1100.b: "\"Vamos encher nossos suprimentos, e nossas barrigas!\""
 travel_events_oltner_2.1100.c: "\"Queijo azul de [location.GetTitle.GetNameNoTierNoTooltip] soa #EMP delicioso!#!\""
 travel_events_oltner_2.1100.d: "\"Precisamos apressar nossa jornada.\""
 extra_supplies_modifier: "Suprimentos Extras"
 extra_supplies_modifier_desc: "Esta comitiva está carregando suprimentos em abundância."
 herding_insights_modifier: "Percepções de Pastoreio"
 herding_insights_modifier_desc: "O governante destas terras está aplicando técnicas avançadas de pastoreio que aprendeu durante suas viagens."
 travel_events_oltner_2.1110.t: "O Som do Ferreiro"
 travel_events_oltner_2.1110.desc: "Nossa jornada nos leva a [location.GetName], onde o martelar rítmico dos ferreiros forma o pulsar do comércio local. A fumaça se derrama das chaminós enquanto os ferreiros, banhados em suor e fuligem, transformam o bruto em algo notável.\n\nUm[local_character.Custom('ES_OA')] de [Select_CString( local_character.IsFemale, 'as ferreiras', 'os ferreiros' )] limpa a testa e me acena para que eu me aproxime. \"Dou-lhe as boas-vindas, [ROOT.Char.Custom('FormOfAddressForLiege')]\", declara. \"Somos os mestres ferreiros do povo [local_character.GetCulture.GetNameNoTooltip], os melhores que existem! Por favor, d? uma olhada em nossos produtos.\""
 travel_events_oltner_2.1110.a: "\"Um conjunto de armaduras não cairia mal.\""
 travel_events_oltner_2.1110.b: "\"Estou procurando uma arma.\""
 travel_events_oltner_2.1110.c: "\"Você faz escudos?\""
 travel_events_oltner_2.1110.d: "\"Prefiro meus próprios ferreiros, adeus.\""
 purchase_artifact_common_armor_tt: "Você compra um [artifact|lE] Armadura de [rarity|lE] desconhecida."
 purchase_artifact_common_weapon_tt: "Você compra um [artifact|lE] Arma de [rarity|lE] desconhecida."
 purchase_artifact_common_shield_tt: "Você compra um [artifact|lE] Escudo de Muralha de [rarity|lE] desconhecida."
 travel_events_oltner_2.1120.t: "Um Ferreiro Quebrado"
 travel_events_oltner_2.1120.desc: "Quando nosso séquito caminha sem pressa por [location.GetName], encontramos uma oficina de ferraria em completo caos. [Select_CString( local_character.IsFemale, 'A ferreira', 'O ferreiro' )|U], cobert[local_character.Custom('ES_OA')] de fuligem, parece afligid[local_character.Custom('ES_OA')] e lamenta um forno quebrado.\n\n\"Ah, [local_character.GetFaith.HighGodName] amaldiçoou [local_character.Custom('ES_AlAla')] pobre [local_character.GetTitledFirstName|l]! A desgraça atingiu minha bigorna!\", explica. \"Sem reparos, meu ofécio, e meu sustento, definham, ai de mim!\""
 travel_events_oltner_2.1120.a: "\"Aqui, tome este ouro para ajud?-lo a se reerguer.\""
 travel_events_oltner_2.1120.b: "\"Junte-se a nós, precisamos de um[local_character.Custom('ES_XA')] ferreir[local_character.Custom('ES_OA')]\"."
 travel_events_oltner_2.1120.c: "\"Que terrível. Bem, que seja!\""
 becomes_inspired: "Recebe uma [Concept('inspired', 'inspiración')|E]"
 travel_events_oltner_2.1130.t: "O Sentinela [location.Custom('TerrainTypeProvince')]"
 travel_events_oltner_2.1130.desc: "À medida que a silhueta de [location.GetName] se impõe à frente, os contornos acidentados de fortificações nas colinas dominam a paisagem.\n\nUm grupo de guerreiros de aspecto rude se aproxima; seu líder parece [local_character.Custom('ES_ElLa')] mais grosseir[local_character.Custom('ES_OA')] de todos. \"[ROOT.Char.Custom('FormOfAddressForLiege')|U]\", [local_character.GetSheHe] acena com a cabeça, \"somos [local_character.GetWomenMen] da guarnição de [location.GetTitle.GetHolder.GetTitledFirstName|l]. Por uma pequena taxa, podemos proteg?-lo em sua jornada. O que me diz?\""
 travel_events_oltner_2.1130.a: "\"Por favor, guiem-nos com segurança através do [location.Custom('TerrainTypeProvince')].\""
 travel_events_oltner_2.1130.b: "\"Você parece forte. Que tal se juntar a mim?\""
 travel_events_oltner_2.1130.c: "\"Vocês todos parecem formidáveis, vou dobrar o que [location.GetTitle.GetHolder.GetFirstNameNoTooltip] pagar! \""
 travel_events_oltner_2.1130.d: "\"Não é necessário, mas obrigado.\""
 hill_fort_guards_modifier: "Guardas da Guarnição do Forte da Colina"
 hill_fort_guards_modifier_desc: "Esta comitiva está empregando guardas endurecidos de forte de colina."
 toll_payed: "Taxa de Viagem Paga"
 travel_events_oltner_2.1140.t: "Defensores Diminutos"
 travel_events_oltner_2.1140.desc: "Ao pé de uma fortificação particularmente imponente em [location.GetName], um grupo de crianças brinca de guerreiros, e sua risada contrapõe-se à solenidade da pedra.\n\n[Select_CString( local_character.IsFemale, 'Uma menina', 'Um menino' )] valente e de olhos brilhantes, aproxima-se com uma espada de madeira. \"Alto! Ninguém pode passar pela fortaleza de [local_character.GetFirstName] e seu grupo [local_character.Custom('ComplimentAdjective')]!\", exclama alegremente. \"Ah, espere, um... vocês são um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]?!\"."
 travel_events_oltner_2.1140.a: "\"Isso mesmo! Agora vá contar para sua aldeia sobre mim!\""
 travel_events_oltner_2.1140.b: "\"Bravos defensores, digam-nos o caminho mais rápido por essas [location.Custom('TerrainTypeProvince')].\""
 travel_events_oltner_2.1140.c: "\"#EMP *Desenhe sua arma e assuste as crianças*#!\""
 travel_events_oltner_2.1140.d: "\"Aprecie seus jogos, criança[local_character.Custom('ES_OA')]\". Precisamos partir\"."
 travel_hastened: "Jornada Acelerada"
 travel_delayed: "Jornada Atrasada"
 famous_visit_modifier: "Visitante Famoso"
 famous_visit_modifier_desc: "As aldeias ao redor dessas terras estão cheias de rumores sobre nobres visitantes. Embora isso atraia pessoas de todos os lugares para visitar e negociar, também atrai bandidos em busca de royals carregados de ouro."
 child_scouts_modifier: "Exploradores Infantis"
 child_scouts_modifier_desc: "Esta comitiva está sendo guiada por uma equipe de crianças bem-intencionadas."
 extra_patrols_modifier: "Patrulhas Extras"
 extra_patrols_modifier_desc: "Esta baronia redobrou suas patrulhas depois que crianças locais foram ameaçadas por viajantes."
 travel_events_oltner_2.1150.t: "Chifres Ecoantes"
 travel_events_oltner_2.1150.desc: "O som ecoante de chifres preenche o ar enquanto atravessamos o [location.Custom('TerrainTypeProvince')] perto de [location.GetName]. Os fortes de colina reverberam com o som, um chamado à armas que ressoou por gerações.\n\nMere segundos após o primeiro som, uma multidão de guerreiros [local_character.GetCulture.GetName] da guarnição emerge da fortificação mais próxima, atacando um grupo de bandidos e foras-da-lei aterrorizados."
 travel_events_oltner_2.1150.a: "\"Devemos ajud?-los, atacar!\""
 travel_events_oltner_2.1150.b: "\"Esperamos, depois pegamos os corpos.\""
 travel_events_oltner_2.1150.c: "\"[retinue_member.GetFirstNameNoTooltip], ajude-os! Nós... ficaremos aqui.\""
 travel_events_oltner_2.1150.d: "\"Essa não é nossa batalha.\""
 cultural_acceptance_gain_assisted_battle: "Batalhas assistidas contra bandidos durante [travel|lE]"
 travel_events_oltner_2.1150.a.success: "Você mata todos os bandidos."
 travel_events_oltner_2.1150.a.failure: "Os bandidos matam o comandante e fogem."
 travel_events_oltner_2.1150.b.success: "A guarnição vence"
 travel_events_oltner_2.1150.b.failure: "Os bandidos vencem"
 travel_events_oltner_2.1150.c.success: "[retinue_member.GetFirstName] mata o líder dos bandidos"
 travel_events_oltner_2.1150.c.failure: "[retinue_member.GetFirstName] é 'tragicamente' morto"
 travel_events_oltner_2.1160.t: "Vínculo à Beira do Caminho"
 travel_events_oltner_2.1160.desc: "Enquanto percorremos um caminho desafiador em [location.GetName], ouço risadas à frente. Meu [ROOT.Char.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] e meu [ROOT.Char.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName] estão trabalhando [Select_CString(And(entourage_member_1.IsFemale, entourage_member_2.IsFemale),'juntas','juntos')] para atravessar [location.Custom('GetRandomCrossingToBridge')].\n\n\"[entourage_member_1.GetFirstNameNoTooltip], sua ideia de construir uma ponte improvisada foi genial!\", exclama [entourage_member_2.GetFirstNameNoTooltip]. [entourage_member_1.GetFirstNameNoTooltip] responde com um risinho: \"E o seu raciocínio rápido com aqueles [location.Custom('GetRandomImprovisedBridgeMaterial')] amarrou tudo!\"\n\nParece que esse obstáculo levou a uma nova amizade!"
 travel_events_oltner_2.1160.a: "\"Sua engenhosidade é louvável!\""
 travel_events_oltner_2.1160.b: "\"Não se associe com os inferiores!\""
 travel_events_oltner_2.1160.c: "\"Isso certamente apressará nossa jornada.\""
 bridge_crossing_river: "uma travessia de rio complicada"
 bridge_crossing_desert: "um desfiladeiro traiçoeiro cheio de areia"
