 i_saw_nothing: "Não vi nada. Nada #EMP mesmo#!. Melhor esquecer tudo sobre isso."
 travel_events_oltner_2.1190.t: "Uma Relíquia Roubada"
 travel_events_oltner_2.1190.desc: "No silêncio de nosso acampamento perto de [location.GetName], um grito estridente rompe a calma. Meu [ROOT.Char.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] confronta meu [ROOT.Char.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName] de forma acusadora, enquanto segura um [entourage_member_1.Custom('GetRandomSmallPreciousItem')] de grande valor.\n\n\"[Select_CString( entourage_member_2.IsFemale, 'Ladra', 'Ladrão' )]! Isso era da minha mãe!\", exclama [entourage_member_1.GetFirstNameNoTooltip] com os olhos em chamas de ira. [entourage_member_2.GetFirstNameNoTooltip] nega veementemente a acusação: \"Seu [entourage_member_1.Custom2('InsultNoun', SCOPE.sC('entourage_member_2'))] mentiroso, isso sempre me pertenceu!\""
 travel_events_oltner_2.1190.a: "\"Pertence a [entourage_member_1.GetFirstNameNoTooltip]\"."
 travel_events_oltner_2.1190.b: "\"[entourage_member_2.GetFirstNameNoTooltip] deve ficar com isso.\""
 travel_events_oltner_2.1190.c: "\"Vocês são como [Select_CString(And(entourage_member_1.IsFemale, entourage_member_2.IsFemale),'niñas','niños')]!\" Entreguem isso para mim!\""
 travel_events_oltner_2.1190.d: "\"Realmente #EMP não#! temos tempo para isso!\""
