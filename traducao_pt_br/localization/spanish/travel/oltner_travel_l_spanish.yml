 travel_events_oltner_2.1200.t: "Anjo da Guarda"
 travel_events_oltner_2.1200.desc: "Enquanto passamos pela [location.Custom('TerrainTypeProvince')] de [location.GetName], meu [ROOT.Char.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName] [location.Custom('GetRandomHazardAndRescue')] meu [ROOT.Char.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName].\n\n\"[entourage_member_2.GetFirstNameNoTooltip], você precisa ter mais cuidado\", [entourage_member_1.GetFirstNameNoTooltip] admoesta, com preocupação evidente na voz. [entourage_member_2.GetFirstNameNoTooltip] oferece um sorriso tímido e grato em resposta. \"Obrigado, te devo uma!\""
 travel_events_oltner_2.1200.a: "Ótima decisão, [entourage_member_1.GetFirstNameNoTooltip]!"
 travel_events_oltner_2.1200.b: "[entourage_member_2.GetFirstNameNoTooltip], você não deve nada."
 travel_events_oltner_2.1200.c: "Vamos seguir com o máximo de cuidado por um tempo."
 travel_events_oltner_2.1200.d: "Ai, precisamos nos apressar!"
