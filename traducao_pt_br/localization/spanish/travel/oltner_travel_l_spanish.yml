 travel_events_oltner_2.1170.t: "Caminho da Rivalidade"
 travel_events_oltner_2.1170.desc: "Ao viajar pelo terreno acidentado de [location.GetName], surge um desafio quando [location.Custom('GetPrecariousTerrainFeature')].\n\nMeu [ROOT.Char.Custom2('RelationToMeShort', entourage_member_1 )] [entourage_member_1.GetFirstName] e meu [ROOT.Char.Custom2('RelationToMeShort', entourage_member_2 )] [entourage_member_2.GetFirstName] começam a discutir sobre a melhor maneira de atravessar a trilha traiçoeira. \"[entourage_member_1.GetFirstNameNoTooltip], sua sugestão ? uma insensatez!\", exclama [entourage_member_2.GetFirstNameNoTooltip] com frustração visível. [entourage_member_1.GetFirstNameNoTooltip] responde: \"E a sua ? covarde!\"\n\nParece que meu séquito chegou a um impasse..."
 travel_events_oltner_2.1170.a: "\"Ouçam-me, vocês precisam #EMP trabajar [Select_CString(And(entourage_member_1.IsFemale, entourage_member_2.IsFemale),'juntas','juntos')]#!\""
 travel_events_oltner_2.1170.b: "\"[entourage_member_1.GetFirstNameNoTooltip] está cert, não podemos nos dar ao luxo de perder tempo.\""
 travel_events_oltner_2.1170.c: "\"Sigamos com cautela, como sugere [entourage_member_2.GetFirstNameNoTooltip]\"."
 travel_events_oltner_2.1170.d: "\"Valha-me [ROOT.Char.GetFaith.HighGodName], são como [Select_CString(And(entourage_member_1.IsFemale, entourage_member_2.IsFemale),'niñas','niños')]…\""
