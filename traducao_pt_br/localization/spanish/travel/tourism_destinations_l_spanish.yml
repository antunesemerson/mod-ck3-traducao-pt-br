l_spanish:
 building_holy_site_mahabodhi_temple_destination_desc: "Vagando pelos terrenos sagrados do [GetBuilding('holy_site_mahabodhi_temple_01').GetName|l], sou tocado por sua serenidade. O local onde o Buda atingiu a iluminação sob a Árvore Bodhi é um lugar de profunda paz. As intricadas esculturas que retratam sua jornada em direção à iluminação me lembram do caminho espiritual que todos devemos seguir."
 building_goguryeo_tomb_destination_desc: "Uma pirâmide enorme domina a paisagem ao longe; embora seja conhecida como a [GetBuilding('goguryeo_tomb_01').GetName|l] parece que ninguém consegue dizer exatamente qual rei está enterrado ali. Ainda assim, o tamanho imenso e a arquitetura única do túmulo, junto com os impressionantes murais de cavaleiros em seu interior, narram a história de um passado glorioso desta região."
 building_buddha_kamakura_destination_desc: "Nada mais entrar na grande sala que abriga o [GetBuilding('buddha_kamakura_01').GetName], sou imediatamente surpreendido por seu tamanho imenso. Embora esteja sentado na posição de lótus, o Buda ainda é mais alto que muitos homens juntos. A enorme estátua de bronze inspira reverência espiritual, assim como uma apreciação pelo grande trabalho artesanal que deve ter sido necessário para criar semelhante titã de bronze."
 building_pyramid_lingapura_destination_desc: "A [GetBuilding('pyramid_lingapura_01').GetName|l] é o principal destaque desta cidade e, ao entrar no recinto ao seu redor, não posso deixar de me maravilhar com a enorme pirâmide que se ergue diante de mim. Várias pequenas capelas e santuários ocupam partes dos degraus que levam ao topo, onde um grande templo abriga o lingam dourado sobre um grande pedestal."
 building_maijishan_grottoes_destination_desc: "Já de longe, a montanha de Maijishan se ergue acima da paisagem, mas, à medida que me aproximo, cada vez mais de as [GetBuilding('maijishan_grottoes_01').GetName|l] esculpidas na encosta da montanha vermelha podem ser vistas. Há mais grutas do que consigo contar, com uma grande quantidade de estátuas de argila ornamentando cada abertura."
 building_three_pagodas_dali_destination_desc: "Erguidas diante do complexo do templo de Congsheng, as [GetBuilding('three_pagodas_dali_01').GetName|l] são a característica definidora de Dali, bem como o maior monumento do reino. A pagoda principal, com seus 16 andares, nos lembra de quão pequeno um indivíduo é no grande esquema das coisas. A área ao redor está cheia de peregrinos e monges, alguns alheios aos grandes edifícios, e outros claramente maravilhados com eles pela primeira vez."
 building_iron_lion_cangzhou_destination_desc: "Fundido em ferro, o imenso [GetBuilding('iron_lion_cangzhou_01').GetName|l] sobreviveu a terremotos e inundações. Ao conversar com alguns comerciantes locais, eles me contam que se acredita que o grande gato seja uma proteção contra a elevação das águas do próprio mar."
 building_dengfeng_observatory_destination_desc: "Ao entrar na cidade, vê-se de longe o grande [GetBuilding('dengfeng_observatory_01').GetName|l]. Acredita-se que este local seja o centro da Terra e os astrônomos chineses observam os céus há séculos. O edifício funciona como um relógio de sol gigante durante o dia e como observatório para mapear as estrelas à noite."
 building_muara_takus_destination_desc: "O [GetBuilding('muara_takus_01').GetName|l] é uma lembrança do poder do Império Srivijaya, bem como um grande centro de culto. À medida que me aproximo, sou cercado por peregrinos de todas as ilhas vizinhas. במשך séculos, o complexo de templos aqui tem sido um centro de poder religioso e temporal."
 building_stone_pagoda_destination_desc: "Diz-se que a [GetBuilding('stone_pagoda_01').GetName|l] é a mais antiga da região, o que é difícil de acreditar ao ver essa alvenaria de um branco imaculado que reflete a luz intensa do sol. Contam-me que foi construída em um lago drenado por ordem de um antigo rei, e que artesãos de todos os reinos da Coreia contribuíram para sua criação."
 building_thuriang_kilns_destination_desc: "Não posso deixar de admirar a beleza dos templos e dos fossos cheios de água em Sukhotai. Mas é evidente que a cidade não é apenas um centro de fé; ao passar por uma área de intensa atividade, observo os famosos [GetBuilding('thuriang_kilns_01').GetName|l]. Aqui, mestres de seu ofício criam peças requintadas de cerâmica celadão para exportação a toda a região."
 building_yuelu_academy_destination_desc: "Ao passar pelo pátio principal da [GetBuilding('yuelu_academy_01').GetName|l], sou tomado por uma profunda reverência pelos eruditos e estudantes de Confúcio que vieram aqui para ensinar e debater. É fácil ver como inúmeros funcionários eruditos se beneficiam do que acontece nestes pátios."
 building_chocolate_hills_destination_desc: "As [GetBuilding('chocolate_hills_01').GetName|l] são uma visão pouco comum. Durante a maior parte do ano, são exuberantes em vegetação, tornando-se de um marrom vivo, ou quase laranja, durante a estação seca. Nunca vi nada parecido e estou cativado por esta paisagem maravilhosa."
 building_fanfang_guangzhou_destination_desc: "Os minaretes não são uma visão comum nesta parte do mundo e, no entanto, em o [GetBuilding('fanfang_guangzhou_01').GetName|l] , o minarete de uma mesquita local é imediatamente visível da rua. Ao caminhar pelo distrito, posso ouvir idiomas de toda a Ásia e do mundo islâmico; aqui, estrangeiros de todos os tipos vivem e trabalham dentro do império."
 building_wilwatikta_palace_destination_desc: "A zona urbana desta cidade do templo é tão impressionante quanto extensa. Ao percorrer as áreas residenciais e me aproximar do [GetBuilding('wilwatikta_palace_01').GetName|l], não posso evitar refletir sobre as grandes riquezas e o poder da ilha de Java e de seu povo."
 building_ha_long_bay_destination_desc: "A [GetBuilding('ha_long_bay_01').GetName|l] se contempla melhor do mar, então me encontro em um pequeno barco no Golfo de Tonquim. À medida que nos aproximamos da própria baía, toda conversa se cala, e em silêncio absoluto navegamos pelo cenário cárstico. As grandes montanhas que nos cercam por todos os lados talvez sejam a coisa mais bonita que já vi."
 building_my_son_sanctuary_destination_desc: "O [GetBuilding('my_son_sanctuary_01').GetName|l] tem sido um centro da civilização cham por séculos, com os reis subsequentes acrescentando novos templos e monumentos a uma área que agora é de serenidade suprema. Sou tomado por reverência ao observar os sacerdotes, peregrinos e oficiais cham, desempenhando seu chamado ao meu redor."
 building_gunung_api_destination_desc: "Diz-se que o [GetBuilding('gunung_api_01').GetName] é uma montanha sagrada, e sua aparência certamente é diferente de qualquer outra que eu tenha encontrado em minhas viagens. Rochas finas e pontiagudas se erguem imediatamente altas no ar, diminuindo as árvores ao seu redor."
 building_suwalesi_megaliths_destination_desc: "Um tipo singular de megalito pode ser visto por todo este vale. Grandes figuras de pedra, com rostos simples e estilizados, nos cercam. Um aldeão no caminho até aqui disse que eles realizam sacrifícios para alguns, enquanto o propósito de outros é desconhecido até mesmo para as pessoas que vivem aqui."
 building_izumo_taisha_destination_desc: "Cheguei a esta região a tempo para um festival; para onde quer que eu olhe, vejo pessoas celebrando a divindade do casamento, Kotoamatsuikami. Enquanto avanço pela multidão, finalmente chego ao [GetBuilding('izumo_taisha_01').GetName], um antigo santuário, do qual me dizem ser mais antigo do que qualquer outro nestas ilhas."
 building_confucius_temple_destination_desc: "É difícil não sentir uma grande reverência em [GetBuilding('confucius_temple_01').GetName|l]. Este é o santuário mais antigo do grande mestre e exemplo que tanto moldou o mundo. Logo me vejo entrando em silêncio na fila com os outros peregrinos para ver o túmulo dele e o de seus discípulos."
 building_citadel_linan_destination_desc: "Nas encostas da colina Fênix, a [GetBuilding('citadel_linan_01').GetName|l] é o centro do poder administrativo não apenas desta cidade, mas também da região ao redor. Ao atravessar seus portões, sou cercado por dignitários e funcionários eruditos, todos desempenhando os papéis cerimoniais que seus cargos exigem."
 building_sanchi_stupa_destination_desc: "A cúpula de [GetBuilding('sanchi_stupa_01').GetName|l] é o ponto focal principal em uma colina nos arredores do assentamento de Sanchi. Entre os muitos peregrinos e monges que encontro neste local, muitos afirmam que o complexo de templos está em uso há milhares de anos."
 building_boudhanath_destination_desc: "A enorme cúpula da estupa de [GetBuilding('boudhanath_01').GetName] abriga restos e relíquias relacionados a muitos budas históricos. Também é, de longe, o edifício mais alto de Catmandu. Elevando-se sobre o restante da cidade, é um claro indicativo da importância do budismo para a história desta cidade. À medida que me aproximo, percebo que estou cercado por viajantes, peregrinos e comerciantes, todos parando para descansar e rezar."
 building_mont_st_michel_destination_desc: "Ao me aproximar da ilha mareal de [GetBuilding('mont_st_michel_01').GetName] no refluxo, avisto sua magnífica igreja e suas muralhas elevando-se no horizonte, um lembrete do poder de Deus sobre o Céu e a Terra. O local é ao mesmo tempo um importante centro religioso e uma fortaleza fortificada para os monges e pescadores locais."
 building_holy_site_st_peters_basilica_destination_desc: "Elevada na colina do Vaticano, sobre a tumba de São Pedro, a [GetBuilding('holy_site_st_peters_basilica_01').GetName|l] nos lembra o poder da Igreja ocidental e de seus papas. Por todos os cantos da Cidade Eterna podem ser vistos padres e freiras, junto com mendigos que esperam uma doação dos muitos peregrinos."
 building_holy_site_imam_ali_mosque_destination_desc: "Ao entrar na cidade, a cúpula dourada da [GetBuilding('holy_site_imam_ali_mosque_01').GetName|l] brilha como um farol. Este local sagrado, onde repousa o imã [ali.GetFirstName], está cheio de peregrinos prestando suas homenagens. O ar está carregado de devoção, e a caligrafia intrincada nas paredes fala de uma profunda reverência pelo divino."
 building_yazd_mosque_destination_desc: "Ao contemplar os minaretes acima do grande portal da [GetBuilding('yazd_mosque_01').GetName|l], fico tomado de reverência. No caminho até aqui, um morador local me lembrou que esta cidade tem sido um centro religioso desde tempos que ninguém consegue lembrar. Hoje, as ruas ainda estão cheias de peregrinos e sacerdotes, fiéis que viajaram de longe para visitar este lugar requintado."
 building_holy_site_great_mosque_of_mecca_destination_desc: "Ao contemplar a [GetBuilding('holy_site_great_mosque_of_mecca_01').GetName|l], meu coração se enche de admiração. A visão da Kaaba, um santuário sagrado desde tempos imemoriais, é um testemunho da resistência de [GetReligionByKey('islam_religion').GetName|l]. As multidões de peregrinos, cada um buscando proximidade com o divino, se movem como um só ser em sua devoção."
 building_holy_site_great_mosque_of_cordoba_destination_desc: "Enquanto perambulo pelos amplos sal?es da [GetBuilding('holy_site_great_mosque_of_cordoba_01').GetName|l], o bosque de colunas e arcos vermelhos e brancos ? uma maravilha do engenho arquitet?nico. A mistura de designs [GetReligionByKey('islam_religion').GetAdherentNamePlural] e [visigothic_culture.GetName|l] fala de uma terra rica em hist?ria e cultura."
 building_holy_site_great_mosque_of_djenne_destination_desc: "A visão da [GetBuilding('holy_site_great_mosque_of_djenne_01').GetName|l], erguendo-se majestosamente do coração da cidade, é de tirar o fôlego. Sua arquitetura única em adobe, que reflete a paisagem saheliana, é um símbolo orgulhoso da fé e habilidade de seus construtores."
 building_holy_site_great_mosque_of_samarra_destination_desc: "Quando me encontro diante da [GetBuilding('holy_site_great_mosque_of_samarra_01').GetName|l], seu minarete único em espiral se ergue sobre a paisagem. Seu estilo arquitetônico distinto a destaca como uma joia do mundo [GetReligionByKey('islam_religion').GetAdherentName]."
 building_holy_site_cologne_cathedral_destination_desc: "Ao me aproximar da [GetBuilding('holy_site_cologne_cathedral_01').GetName|l], suas torres inacabadas e construção contínua são um testemunho da ambição de sua época. Entre os andaimes e pedras, vejo uma visão de grandeza tomando forma, um símbolo de fé que perdurará por séculos."
 building_holy_site_canterbury_cathedral_destination_desc: "Caminhando pelos corredores consagrados da [GetBuilding('holy_site_canterbury_cathedral_01').GetName|l], sinto o peso da história ao meu redor. Este marco da fé cristã está imbuído com histórias de mártires e santos. As intricadas esculturas e a atmosfera solene ecoam as orações de incontáveis peregrinos."
 building_holy_site_prophetic_mosque_destination_desc: "[GetBuilding('holy_site_prophetic_mosque_01').GetName|l], com seus pátios serenos e arcos elegantes, é um lugar de profunda significância espiritual. Aqui, onde o Profeta Muhammad caminhou e pregou, o ar parece preenchido com tranquilidade. Os fiéis se reúnem em reverência, suas orações murmuradas sob o vasto céu."
 building_doges_palace_destination_desc: "A grandeza do [GetBuilding('doges_palace_01').GetName|l] me deixa sem palavras. Sua fachada ornamentada e aposentos luxuosos são um símbolo do poder e prosperidade de Veneza. As obras de arte intrincadas e a decoração luxuosa falam do poder e riqueza de seus governantes."
 building_walls_of_genoa_destination_desc: "As imponentes [GetBuilding('walls_of_genoa_01').GetName|l], erguendo-se como barreiras formidáveis para proteger a cidade, exibem o poder militar e a astúcia estratégica de seus líderes."
 building_visby_ringmur_destination_desc: "A [GetBuilding('visby_ringmur_01').GetName] circunda a cidade, um testemunho de pedra de sua importância no comércio e na defesa. Caminhando por essas muralhas, admiro a habilidade dos construtores e a visão dos líderes, garantindo a segurança e a prosperidade de seu povo."
 building_walls_of_benin_destination_desc: "As grandes [GetBuilding('walls_of_benin_01').GetName|l] se estendem até onde a vista alcança, um esforço monumental do povo local. Esta enorme obra de terra, maior do que muitas que vi, é um símbolo orgulhoso da força e engenhosidade desta terra."
 building_theodosian_walls_destination_desc: "As imponentes [GetBuilding('theodosian_walls_01').GetName|l], protegendo Constantinopla, são uma maravilha da engenharia. Sua presença imponente e múltiplas camadas falam de uma cidade preparada para qualquer cerco. A visão em construir tais defesas é evidente."
 building_aurelian_walls_destination_desc: "Cercando a cidade eterna, as [GetBuilding('aurelian_walls_01').GetName|l] permanecem firmes contra o tempo e as turbulências. Essas antigas defesas, expandidas e fortificadas ao longo dos anos, cercam uma história rica e complexa, um bastião do legado duradouro de Roma."
 building_the_colosseum_destination_desc: "Diante de mim está [GetBuilding('the_colosseum_01').GetName|l], uma ruína colossal de uma era passada. Outrora um lugar de espetáculos e glória, hoje se encontra parcialmente em ruínas, um lembrete do poder e da extensão do [GetTitleByKey('h_roman_empire').GetNameNoTier], ecoando histórias de um passado impregnado tanto de grandeza quanto de conflitos."
 building_iron_pillar_of_delhi_destination_desc: "A [GetBuilding('iron_pillar_of_delhi_01').GetName|l] se ergue desafiadora contra os estragos do tempo, sua composição resistente à ferrugem sendo uma maravilha da metalurgia. Erguido em honra ao rei Chandragupta II, é um testemunho do conhecimento avançado e habilidade dos artesãos de sua época."
 building_iron_pillar_of_dhar_destination_desc: "A [GetBuilding('iron_pillar_of_dhar_01').GetName|l] se ergue como um irmão menos conhecido, mas igualmente fascinante, de seu equivalente em Delhi. Este testemunho da engenhosidade dos artesãos antigos continua sendo um curioso tema para muitos viajantes e estudiosos."
 building_the_pyramids_destination_desc: "[GetBuilding('the_pyramids_01').GetName], antigas e majestosas, se erguem das areias como fizeram por milênios. Esses túmulos dos faraós, agora despidos de seu calcário polido, ainda impõem admiração e respeito, uma memória duradoura de uma civilização outrora grandiosa."
 building_stonehenge_destination_desc: "O misterioso [GetBuilding('stonehenge_01').GetName] se ergue na Planície de Salisbury, seu propósito perdido no tempo. Essas grandes pedras, dispostas em uma formação complexa, falam de um conhecimento ancestral e uma conexão com o celestial, muito antes de nosso tempo."
 building_offas_dyke_destination_desc: "Ao percorrer a paisagem, a [GetBuilding('offas_dyke_01').GetName|l] se apresenta como uma notável obra de terra, um limite criado na época do rei [offa.GetFirstName]. Esta grande vala, agora parcialmente erodida, mas ainda perceptível, marca uma antiga linha de defesa e demarcação, sugerindo as disputas de poder daquela era."
 building_hadrians_wall_destination_desc: "Enquanto caminho pelos remanescentes da [GetBuilding('hadrians_wall_01').GetName|l], pondero sobre o poder dos antepassados [roman_culture.GetName]. Esta barreira antes formidável, agora uma série de ruínas, serviu como uma fronteira norte, um testemunho da extensão e dos limites de um império."
 building_petra_destination_desc: "A antiga cidade de [GetBuilding('petra_01').GetName], esculpida nas falésias de cor vermelho-rosa, é uma visão de tirar o fôlego. Seu famoso Al-Khazneh, embora desbotado de sua glória anterior, ainda ecoa a prosperidade de uma era passada, uma maravilha de engenharia e arte."
 building_buddhas_of_bamian_destination_desc: "Os colossais [GetBuilding('buddhas_of_bamian_01').GetName], esculpidos na face da falésia, permanecem como um silencioso testemunho da história religiosa e cultural desta terra. Apesar do desgaste do tempo, a arte e a devoção dos antigos artesãos ainda são evidentes nessas magníficas esculturas."
 building_alhambra_destination_desc: "A [GetBuilding('alhambra_01').GetName], com sua intrincada arquitetura mourisca e jardins luxuriantes, é uma joia de Granada. O complexo palaciano, uma fusão de forma e função, reflete o gosto sofisticado e o poder de seus governantes."
 building_citadel_of_aleppo_destination_desc: "A imponente [GetBuilding('citadel_of_aleppo_01').GetName], uma fortaleza no topo de uma colina, domina a paisagem da cidade. Suas enormes muralhas e robustas estruturas, evoluindo ao longo dos tempos, testemunham incontáveis cercos e a resiliência desta cidade antiga."
 building_house_of_wisdom_destination_desc: "A [GetBuilding('house_of_wisdom_01').GetName] em Bagdá é um farol de conhecimento e aprendizado. Esta grandiosa biblioteca e centro de estudos, estabelecido pelos califas abássidas, atrai estudiosos de todas as terras, ansiosos para explorar sua vasta coleção de textos e discursos."
 building_the_tower_of_london_destination_desc: "[GetBuilding('the_tower_of_london_01').GetName], com sua estrutura imponente, serve tanto como palácio real quanto como prisão. O ar dentro dessas muralhas é pesado com história, as histórias de reis, rainhas e prisioneiros gravadas em suas pedras."
 building_london_bridge_destination_desc: "A [GetBuilding('london_bridge_01').GetName|l], com seus arcos robustos e lojas movimentadas, atravessa o imenso Tâmisa como um cordão umbilical no coração de Londres. Ela serve não apenas como uma travessia, mas como um vibrante centro de comércio e atividade, onde mercadores, viajantes e habitantes se encontram."
 building_notre_dame_destination_desc: "A majestosa [GetBuilding('notre_dame_01').GetName], com suas torres imponentes e grande fachada, é uma obra-prima da arquitetura gótica. Dentro, o ar ressoa com os ecos de piedade, cada vitral e escultura conta uma história sagrada."
 building_brihadeeswarar_temple_destination_desc: "O [GetBuilding('brihadeeswarar_temple_01').GetName|l], uma monumental edificação de granito, se ergue majestoso sobre Thanjavur. Seu vimana imponente e os intrincados relevos falam da grandeza da Dinastia [chola_dynasty.GetName], uma época em que a arte e a devoção encontraram uma expressão sublime."
 building_shwedagon_pagoda_destination_desc: "A [GetBuilding('shwedagon_pagoda_01').GetName|l], com seu pináculo dourado alcançando os céus, é uma maravilha de se ver. Este local sagrado, acreditando-se conter relíquias do Buda, é um lugar de peregrinação e devoção, refletindo o coração espiritual da Birmânia."
 building_ananda_temple_destination_desc: "O [GetBuilding('ananda_temple_01').GetName|l], com seu sikhara brilhante e magníficas terraços, é um testemunho da habilidade arquitetônica da Dinastia [pagan_dynasty.GetName]. Este templo requintado, adornado com intrincadas esculturas e murais, é um farol do budismo Theravada."
 building_the_friday_mosque_destination_desc: "A [GetBuilding('the_friday_mosque_01').GetName|l], com sua estrutura imponente e minaretes elegantes, é um local central de culto. Todas as semanas, torna-se um ponto de atividade e oração, onde os fiéis se reúnem em grande número para reafirmar a força e a unidade da comunidade [GetReligionByKey('islam_religion').GetAdjective]."
 building_khajuraho_destination_desc: "Os [GetBuilding('khajuraho_01').GetName], com suas esculturas requintadas e ousadas, são uma celebração da vida, do amor e da adoração. Esses maravilhosos marcos arquitetônicos, construídos pelos governantes Chandela, são um testemunho da visão artística e espiritual da época."
 building_palace_of_aachen_destination_desc: "O [GetBuilding('palace_of_aachen_01').GetName|l] aparece como um legado de [charlemagne.GetFirstNameNicknamed]. Sua grande capela, com um design octogonal e um teto abobadado, reflete a ambição do imperador de reviver a glória do [GetTitleByKey('h_roman_empire').GetNameNoTier]."
 building_hagia_sophia_christian_destination_desc: "Enquanto caminho pela magnífica [GetBuilding('hagia_sophia_01').GetName], sua grandeza me deixa em admiração. A vasta cúpula parece tocar os céus, e os intrincados mosaicos brilham à luz. Posso sentir a profundidade espiritual deste lugar, ressoando com séculos de adoração cristã e majestade bizantina."
 building_hagia_sophia_islamic_destination_desc: "Ao entrar na [GetBuilding('hagia_sophia_02').GetName|l], agora uma grande mesquita, sou cativado pela sua transformação. Os imponentes minaretes alcançam os céus, complementando a majestosa cúpula. Dentro, a caligrafia e ornamentação islâmicas se misturam harmoniosamente com a arquitetura bizantina, criando uma atmosfera de profunda reverência e fusão cultural."
 building_dome_of_the_rock_destination_desc: "O [GetBuilding('dome_of_the_rock_01').GetName|l], com sua cúpula dourada brilhando ao sol, é um marco reverenciado em Jerusalém. Este santuário, que abriga a rocha sagrada, é um local de profunda importância espiritual, reverenciado tanto por muçulmanos quanto por judeus."
 building_temple_in_jerusalem_destination_desc: "Os remanescentes do [GetBuilding('temple_in_jerusalem_01').GetName|l], sagrados tanto para judeus quanto para cristãos, evocam um profundo senso de história e espiritualidade. O Muro das Lamentações, o que restou deste templo outrora magnífico, é um lembrete pungente do turbulento passado da cidade."
 building_rammelsberg_mines_destination_desc: "As [GetBuilding('rammelsberg_mines_01').GetName|l] são um centro de atividade, cavando profundamente na terra em busca de minérios preciosos. A engenhosidade e perseverança dos mineiros aqui são essenciais para a prosperidade e habilidade artesanal da região."
 building_guiyang_mines_destination_desc: "[GetBuilding('guiyang_mines_01').GetName] deixou uma marca clara neste assentamento ao longo dos séculos. As moedas cunhadas aqui circulam por toda a China desde os tempos da dinastia Han Ocidental."
 building_kaibao_mines_destination_desc: "[GetBuilding('kaibao_mines_01').GetName] tem sido uma fonte de prata para o tesouro imperial por mais de mil anos, e isso realmente fica evidente quando viajo pela região. A prata e as moedas atraem riqueza. Aqui, comerciantes e artesãos prosperam com o que os mineiros trazem aos fundidores."
 building_zijinshan_mines_destination_desc: "Não fosse por as [GetBuilding('zijinshan_mines_01').GetName|l] e seu ouro, esta região provavelmente não estaria tão desenvolvida quanto está agora. É claro que o assentamento foi moldado pelo negócio de mineração e pelos muitos engenheiros e artesãos que ele trouxe das regiões vizinhas."
 building_liangzhe_mines_destination_desc: "[GetBuilding('liangzhe_mines_01').GetName] e os negócios de prata é o que faz esta região prosperar. A prata é o que atraiu até aqui artesãos e mineiros, e as moedas cunhadas aqui é o que atrai todos os mercadores."
 building_hanxing_mines_destination_desc: "As [GetBuilding('hanxing_mines_01').GetName|l]."
 building_kutna_hora_mines_destination_desc: "As [GetBuilding('kutna_hora_mines_01').GetName|l] são uma fonte vital de prata, impulsionando tanto o comércio quanto a moeda. A rede de túneis e poços, escavados por mineiros determinados, exemplifica a engenhosidade e o trabalho árduo que impulsionam a economia da região."
 building_kremnica_mines_destination_desc: "As [GetBuilding('kremnica_mines_01').GetName|l] são renomadas por seus depósitos de ouro. A extração desse metal precioso, símbolo de riqueza e poder, sustenta a cunhagem de moedas e o esplendor das cortes dos governantes."
 building_baofeng_mines_destination_desc: "A mineração é a principal fonte de emprego nesta região e a maioria dos edifícios residenciais está situada perto de [GetBuilding('baofeng_mines_01').GetName|l]. À beira do rio, as oficinas de fundição de prata se alinham nas ruas."
 building_jiaodong_mines_destination_desc: "Frequentemente chamadas de "Cidade Dourada do Céu", as [GetBuilding('jiaodong_mines_01').GetName|l] são bem conhecidas pela grande quantidade de ouro que produzem. A própria cidade cresceu e se tornou um importante centro de comércio, centrado no trabalho do metal precioso e na sua revenda."
 building_chihu_mines_destination_desc: "Diz-se que as [GetBuilding('chihu_mines_01').GetName|l] v?m funcionando desde o per?odo dos Tr?s Reinos e, por mais de um mil?nio, t?m fornecido ferro e armas para as dinastias da China. Isso ? evidente em toda parte na pr?pria cidade; casas da moeda e ferrarias se alinham nas ruas, e encontrei carro?as carregadas de min?rio de ferro muito antes de ver o assentamento em si."
 building_zigong_mines_destination_desc: "As [GetBuilding('zigong_mines_01').GetName|l] têm abastecido o povo chinês com sal há milhares de anos; a paisagem urbana é dominada pelos característicos poços de perfuração, áreas de evaporação e outras infraestruturas especializadas na extração de sal."
 building_falun_mines_destination_desc: "As [GetBuilding('falun_mines_01').GetName|l] são um labirinto de túneis em busca de cobre. O vibrante pigmento vermelho, Falu red, derivado das minas, adorna muitos edifícios aqui, um vívido lembrete da importância da mina para a comunidade local."
 building_konasamudram_mines_destination_desc: "As [GetBuilding('konasamudram_mines_01').GetName|l] são conhecidas por sua terra rica em diamantes. O brilho dessas pedras preciosas reflete não apenas a riqueza que elas trazem, mas também a habilidade e o esforço daqueles que as extraem."
 building_dean_mines_destination_desc: "As [GetBuilding('dean_mines_01').GetName|l] são uma fonte significativa de ferro. O clangor dos martelos e o brilho das fornalhas são constantes aqui, enquanto os mineiros e ferreiros trabalham incansavelmente, forjando os materiais para empreendimentos militares e de construção."
 building_phnom_dek_mines_destination_desc: "As [GetBuilding('phnom_dek_mines_01').GetName] ou Montanha de Ferro é uma grande fonte de ferro nesta região. À medida que alguém se aproxima da cidade, não há como evitar as muitas carroças carregadas a caminho das terras baixas ao redor de Angkor."
 building_schwaz_mines_destination_desc: "As [GetBuilding('schwaz_mines_01').GetName|l] são um centro de produção de prata. A riqueza extraída dessas profundezas transformou a cidade em um próspero centro comercial, atraindo mercadores e artesãos de todas as partes."
 building_argentiera_mines_destination_desc: "As [GetBuilding('argentiera_mines_01').GetName|l] são famosas por suas ricas veios de chumbo e prata. As condições severas enfrentadas pelos mineiros aqui ressaltam a busca implacável por esses valiosos recursos."
 building_srebrenica_mines_destination_desc: "As [GetBuilding('srebrenica_mines_01').GetName|l] é uma fonte crucial de prata. O constante trabalho árduo dos mineiros, cavando na terra, impulsiona a prosperidade da região, tornando-a um centro vital para o comércio."
 building_kollur_mines_destination_desc: "As [GetBuilding('kollur_mines_01').GetName|l], localizadas nas densas florestas de Kollur, são renomadas por seus diamantes requintados. As gemas dessas minas não apenas adornam as coroas dos reis, mas também simbolizam a riqueza das terras e a habilidade de quem as extrai."
 building_siderokausia_mines_destination_desc: "As [GetBuilding('siderokausia_mines_01').GetName|l] estão em pleno movimento, extraindo ferro vital para as necessidades da região. Os esforços incansáveis dos mineiros aqui são voltados para aproveitar os recursos da terra."
 building_zawar_mines_destination_desc: "As [GetBuilding('zawar_mines_01').GetName|l] são uma fonte antiga de zinco e chumbo. A engenhosidade dos mineiros, que se aprofundam nas profundezas para extrair esses metais, tem sido crucial para o crescimento e desenvolvimento da região."
 building_pansjhir_mines_destination_desc: "As [GetBuilding('pansjhir_mines_01').GetName|l] são conhecidas por seu precioso lápis-lazúli. Esta pedra azul vibrante, procurada por sua beleza e raridade, é um tesouro dessas terras, cobiçado por artesãos e mercadores."
 building_nishapur_mines_destination_desc: "As [GetBuilding('nishapur_mines_01').GetName|l] são famosas por seu requintado turquesa. Esta vibrante gema, valorizada em joias e decoração, reflete a riqueza da cultura [persian_culture.GetName] e seu artesanato."
 building_ratnapura_mines_destination_desc: "As [GetBuilding('ratnapura_mines_01').GetName|l] brilham com a promessa de safiras e rubis. Essas gemas, enterradas profundamente na terra, são procuradas no mundo todo, um testemunho da riqueza dessas terras."
 building_mogok_mines_destination_desc: "Os [GetBuilding('mogok_mines_01').GetName|l] brilham com a promessa de rubis e safiras. Essas gemas, enterradas profundamente na terra, são cobiçadas em todo o mundo, e diz-se que seu brilho não tem igual."
 building_allaq_mines_destination_desc: "As [GetBuilding('allaq_mines_01').GetName|l], aninhadas nas montanhas de Allaq, são uma fonte crucial de cobre. O som dos picaretas contra as rochas ressoa pelo ar, enquanto os mineiros trabalham incansavelmente para fornecer esse metal essencial."
 building_takkeda_mines_destination_desc: "As movimentadas [GetBuilding('takkeda_mines_01').GetName|l] são renomadas por seus ricos veios de prata. O metal extraído aqui não apenas impulsiona a habilidade local, mas também contribui significativamente para o tesouro da região."
 building_turda_mines_destination_desc: "As [GetBuilding('turda_mines_01').GetName] são uma fonte vital de sal. Este 'ouro branco', essencial tanto para a preservação quanto para o comércio, tornou as minas um importante centro econômico."
 building_taghaza_mines_destination_desc: "No coração do deserto do Saara, as [GetBuilding('taghaza_mines_01').GetName|l] são uma fonte severa, mas crucial, de sal. Caravanas percorrem grandes distâncias até este lugar desolado, em busca do sal que é mais valioso que o ouro nessas terras."
 building_phocaea_mines_destination_desc: "As [GetBuilding('phocaea_mines_01').GetName|l] são conhecidas por seu alúmen. O processo de extração deste mineral vital, usado na tinturaria e curtume, envolve habilidade e conhecimento transmitidos de geração em geração."
 building_verespatak_mines_destination_desc: "As [GetBuilding('verespatak_mines_01').GetName|l] são uma rica fonte de ouro. Essa abundância transformou a área em um centro movimentado de atividade mineradora, atraindo aventureiros e mercadores seduzidos pela promessa de riqueza."
 building_suvarnadvipa_mines_destination_desc: "Nas encostas da cordilheira de Barisan, o [GetBuilding('suvarnadvipa_mines_01').GetName|l] oferece aos trabalhadores um trabalho exigente, porém gratificante, ao mesmo tempo que enriquece os artesãos e comerciantes locais."
 building_khetri_mines_destination_desc: "As [GetBuilding('khetri_mines_01').GetName|l] são conhecidas por seus substanciais depósitos de cobre. Os diligentes esforços dos mineiros e ferreiros locais, extraindo e refinando esse metal essencial, sustentam o meio de vida da região."
 building_trepca_mines_destination_desc: "As [GetBuilding('trepca_mines_01').GetName|l] é uma fonte significativa de chumbo e prata. A comunidade mineira local, hábil em navegar pelo terreno desafiador, desempenha um papel fundamental na prosperidade da área."
 building_rudnik_mines_destination_desc: "As [GetBuilding('rudnik_mines_01').GetName|l] estão movimentadas, extraindo preciosa prata. Os trabalhadores mineiros locais e a riqueza que geram fizeram desta região um centro de atividade econômica e crescimento."
 building_ijil_mines_destination_desc: "As vastas [GetBuilding('ijil_mines_01').GetName|l] abrigam ricos depósitos de sal. Os habilidosos mineiros tornaram esta área uma contribuição crucial para o comércio e o desenvolvimento da região."
 building_cevennes_mines_destination_desc: "As minas locais nas [GetBuilding('cevennes_mines_01').GetName|l] são uma fonte essencial de prata. O trabalho incansável dos mineiros e a abundância resultante desempenham um papel crucial em sustentar os meios de vida da região."
 building_hetian_mines_destination_desc: "As minas em [GetBuilding('hetian_mines_01').GetName|l] são a fonte do jade mais valioso que existe. A economia local depende em grande parte desse comércio, e mineradores e artesãos de jade podem ser vistos por toda a cidade."
 building_xiuyan_mines_destination_desc: "O tipo de jade extraído em [GetBuilding('xiuyan_mines_01').GetName|l] tem embelezado, por séculos, o artesanato comum com sua distinta tonalidade verde."
 building_itoigawa_mines_destination_desc: "Adornado por monges e místicos da região, o jade extraído do [GetBuilding('itoigawa_mines_01').GetName|l] tem uma longa história de aura de destaque. Sua beleza sempre atraiu caravanas de toda a ilha para abastecer seus artesãos."
 building_lantian_mines_destination_desc: "O [GetBuilding('lantian_mines_01').GetName|l] tem sido uma fonte importante de jade, fazendo com que as colinas ao redor sejam uma visão digna de contemplação, com pedreiras talhadas e pedras verdes cintilantes ao longe."
 building_fengtian_mines_destination_desc: "Desde os tempos antigos, os mineiros do [GetBuilding('fengtian_mines_01').GetName|l] têm brandido suas picaretas para ampliar as escavações e reunir jade para inspeção. Enquanto isso, os comerciantes da ilha encheram seus cofres."
 building_hpakant_mines_destination_desc: "Escondido entre florestas e rios largos, o [GetBuilding('hpakant_mines_01').GetName|l] é uma próspera fonte de jade entre os artesãos locais. Sua extração lhes permite expressar melhor suas culturas."
 building_dushan_mines_destination_desc: "O [GetBuilding('dushan_mines_01').GetName|l] domina a economia local aqui. O jade local é um dos mais valiosos e diz-se que sua cor é mais rica do que a de qualquer outro."
 building_mali_mines_destination_desc: "Nas vastas extensões do Mali, as [GetBuilding('mali_mines_01').GetName|l] são ricas em minério precioso, uma fonte de grande riqueza e orgulho. Os habilidosos mineiros e artesãos desta região há muito exploram essas reservas, impulsionando a economia local e o comércio."
 building_al_azhar_university_destination_desc: "A [GetBuilding('al_azhar_university').GetName|l] do Cairo se apresenta como um farol do conhecimento e do aprendizado no mundo [GetReligionByKey('islam_religion').GetAdherentName]. Os sagrados salões desta instituição nutriram gerações de eruditos, contribuindo enormemente para a riqueza intelectual e cultural da região."
 building_sankore_university_destination_desc: "Na lendária cidade de Timbuktu, a [GetBuilding('sankore_university').GetName|l] é um centro de aprendizado e erudição. Estudiosos e alunos se reúnem aqui, explorando uma vasta gama de estudos, desde teologia até astronomia."
 building_siena_university_destination_desc: "A Universidade de Siena, localizada no coração da Toscana e representada pela [GetBuilding('siena_university').GetName], é um centro de educação e pensamento. Seu corpo docente renomado e seus alunos dedicados contribuem para uma comunidade acadêmica vibrante, desempenhando um papel fundamental na vida intelectual da população local."
 building_nalanda_university_destination_desc: "A [GetBuilding('nalanda_university').GetName|l] é um grande centro de erudição védica. Esta antiga instituição atraiu estudiosos de toda a Ásia, e seu legado é estimado pelo povo local, que a reverencia como um símbolo de seu patrimônio histórico e cultural."
 building_hotin_fort_destination_desc: "O formidável [GetBuilding('hotin_fort_01').GetName|l] sobrevive observando o rio Dniéster. As espessas muralhas e a posição estratégica do forte atestam a determinação do povo local em proteger suas terras contra invasores."
 building_heddal_stave_church_destination_desc: "Na serena paisagem norueguesa, a [GetBuilding('heddal_stave_church_01').GetName|l] se ergue como um magnífico exemplo da habilidade medieval. Os intrincados entalhes em madeira e a estrutura imponente refletem a devoção e a habilidade dos artesãos locais."
 building_temple_of_uppsala_destination_desc: "O [GetBuilding('temple_of_uppsala_01').GetName|l], envolto na aura do sagrado, se ergue como um local reverenciado onde as antigas tradições nórdicas se fundem com o presente. Este venerado salão tem sido um centro de encontros, suas origens ecoando com as diversas vozes dos peregrinos."
 building_lund_cathedral_destination_desc: "A [GetBuilding('lund_cathedral_01').GetName|l], com sua impressionante arquitetura românica, domina o horizonte. Este centro espiritual, renomado por sua cripta e relógio astronômico, é um ponto focal da vida religiosa para a comunidade cristã local."
 building_danevirke_destination_desc: "O [GetBuilding('danevirke_01').GetName], uma massiva fortificação de terra, se estende pela Península da Jutlândia. Esta antiga defesa, construída e expandida pelo povo local, simboliza sua determinação em proteger suas terras e manter sua autonomia."
 building_roman_wall_of_lugo_destination_desc: "A [GetBuilding('roman_wall_of_lugo_01').GetName|l], que circunda a cidade velha, é um notável testemunho da engenharia [roman_culture.GetName]. A população local se orgulha deste monumento histórico, que continua a ser um robusto símbolo do passado antigo de sua cidade."
 building_rock_of_gibraltar_destination_desc: "A [GetBuilding('rock_of_gibraltar_01').GetName|l], erguendo-se majestosa acima do mar, é um marco estratégico e simbólico. O povo local, ciente de sua importância militar, a fortificou ao longo dos séculos, tornando-a uma bastião na porta de entrada entre dois mundos."
 building_aljaferia_palace_destination_desc: "O [GetBuilding('aljaferia_palace_01').GetName|l] em Zaragoza é uma joia da arquitetura [GetReligionByKey('islam_religion').GetAdjective] no coração de Aragão. Os arcos ornamentados e os pátios tranquilos refletem a rica fusão cultural de mouros e cristãos, um legado apreciado pela população local."
 building_tower_of_hercules_destination_desc: "Erguendo-se perto da costa, a [GetBuilding('tower_of_hercules_01').GetName|l] é um antigo farol que tem guiado marinheiros por séculos. Esta estrutura [roman_culture.GetName], imersa em mitos e história, é um símbolo de resistência e orientação para a comunidade local de marinheiros."
 building_city_wall_of_toledo_destination_desc: "Cercando a cidade histórica, as imponentes [GetBuilding('city_wall_of_toledo_01').GetName|l] são um testemunho de seu passado repleto de histórias. Essas muralhas, uma mistura de design [roman_culture.GetName], [visigothic_culture.GetName] e mourisco, são uma fonte de orgulho e segurança para os residentes dentro."
 building_alcazar_of_segovia_destination_desc: "O [GetBuilding('alcazar_of_segovia_01').GetName|l], empoleirado em uma rocha acima da cidade, é um castelo de contos de fadas tornado realidade. Esta fortaleza, com sua forma distintiva e história fascinante, captura a imaginação dos habitantes locais e visitantes."
 building_holy_site_basilica_santiago_destination_desc: "A [GetBuilding('holy_site_basilica_santiago_01').GetName|l] é um farol para os peregrinos de toda a Cristandade. Esta magnífica catedral, ponto final do Caminho de Santiago, é reverenciada por suas relíquias sagradas e deslumbrante arquitetura românica, profundamente venerada pelos fiéis."
 building_cilician_gates_destination_desc: "Os [GetBuilding('cilician_gates').GetName] têm sido um ponto estratégico de cruzamento por séculos. Este corredor natural, utilizado por comerciantes e exércitos, possui grande significado para as comunidades locais que há muito percorrem esses caminhos."
 building_fairy_chimneys_destination_desc: "As [GetBuilding('fairy_chimneys').GetName|l] em Capadócia são esculpidas pelo vento e pela água. Essas impressionantes formações rochosas, com suas formas únicas, não apenas atraem viajantes curiosos, mas também servem como moradias e locais de culto para o povo local."
 building_sofia_ohrid_destination_desc: "Quando o [GetBuilding('sofia_ohrid').GetName|l] aparece à vista, fico encantado com sua beleza serena. Cada afresco e mosaico conta uma história de fé e arte, um legado que resistiu ao teste do tempo e continua a inspirar tanto os fiéis quanto os visitantes."
 building_hosios_loukas_destination_desc: "O [GetBuilding('hosios_loukas').GetName], aninhado nas montanhas da Grécia Central, é uma joia da arte bizantina. A arquitetura impressionante do mosteiro e os belos afrescos são venerados pelos fiéis locais, servindo como um farol do cristianismo ortodoxo."
 building_cattolica_stilo_destination_desc: "A [GetBuilding('cattolica_stilo').GetName] é um notável exemplo de arquitetura bizantina na Itália. Esta pequena, mas fascinante igreja, com seu plano característico em forma de cruz, ocupa um lugar especial no coração da comunidade local."
 building_etchmiadzin_cathedral_destination_desc: "A [GetBuilding('etchmiadzin_cathedral').GetName|l], um santuário em Vagharshapat, considerada o centro espiritual dos armênios em todo o mundo. Esta antiga catedral, com sua rica história e significado religioso, é uma fonte de orgulho e consolo espiritual para a comunidade armênia local."
 building_jvari_monastery_destination_desc: "Empoleirado no topo de uma colina, o [GetBuilding('jvari_monastery').GetName|l] tem vista para a confluência dos rios abaixo. Este mosteiro ortodoxo georgiano, com sua arquitetura harmoniosa, é um retiro sereno e um símbolo da fé cristã duradoura na região."
 building_saint_catherine_destination_desc: "Aninhado aos pés do Monte Sinai, o [GetBuilding('saint_catherine').GetName|l] é uma fortaleza da fé. Este antigo mosteiro, com seus manuscritos inestimáveis e relíquias sagradas, é um lugar de reflexão para a comunidade ortodoxa local e para os visitantes."
 building_apollinare_nuovo_destination_desc: "Na histórica cidade de Ravena, a [GetBuilding('apollinare_nuovo').GetName|l] se ergue como um testemunho da arte e arquitetura cristã primitiva. Os magníficos mosaicos da igreja, que retratam cenas bíblicas, são uma fonte de assombro e inspiração tanto para os fiéis locais quanto para admiradores da história."
 building_mount_athos_destination_desc: "O [GetBuilding('mount_athos_01').GetName], uma península no norte da Grécia, é uma comunidade monástica única. Esta montanha sagrada, lar de vários mosteiros, é um refúgio espiritual, imerso na tradição cristã ortodoxa, reverenciado tanto por monges quanto por peregrinos."
 building_meteora_destination_desc: "Em Tessália, os mosteiros de [GetBuilding('meteora_01').GetName] são uma visão impressionante, empoleirados no topo de pilares rochosos. Estes santuários, aparentemente suspensos entre a terra e o céu, simbolizam a busca dos monges locais pela elevação espiritual."
 building_despot_palace_destination_desc: "O esplendor do [GetBuilding('despot_palace').GetName] é um espetáculo a ser visto. Seus grandiosos salões e pátios requintados estão vivos com a agitação dos cortesãos e as melodias dos trovadores. O palácio, um centro de atividade política e artística, se ergue como um símbolo orgulhoso de poder e sofisticação."
 building_maiden_tower_destination_desc: "A [GetBuilding('maiden_tower').GetName|l] vigia a boca do Bósforo. Suas paredes, imersas em lendas, têm observado a ascensão e queda de impérios. Agora, ela observa diligentemente, um ponto estratégico que comanda a passagem dos navios por estas águas históricas."
 building_patras_castle_destination_desc: "O [GetBuilding('patras_castle').GetName|l] tem sido um sentinela ao longo dos séculos. Suas robustas muralhas e torres, marcadas por várias épocas, são um testemunho da importância histórica e valor estratégico da cidade."
 building_sumela_monastery_destination_desc: "Esculpido nas falésias de Trabzon, o [GetBuilding('sumela_monastery_01').GetName|l] é uma maravilha da arquitetura monástica. Este retiro remoto, agarrado à encosta da montanha, oferece vistas deslumbrantes e um senso de paz profunda para aqueles que o visitam."
 building_saint_lazarus_destination_desc: "No coração de Larnaca, a [GetBuilding('saint_lazarus').GetName|l] se ergue como um venerável local de culto. Esta bela estrutura, com sua iconografia intrincada e relíquias sagradas, ocupa um lugar especial na vida espiritual da comunidade ortodoxa local."
 building_kassiopi_castle_destination_desc: "O [GetBuilding('kassiopi_castle').GetName|l], empoleirado majestosamente acima do Mar Jônico, se ergue como um farol de vigilância. O castelo, um ponto central de atividade naval e militar, desempenha um papel crucial na segurança e prosperidade das terras ao redor, com sua história entrelaçada com o fluxo e refluxo da própria Roma Oriental."
 building_hagios_demetrios_destination_desc: "A Igreja de [GetBuilding('hagios_demetrios').GetName] em Tessalônica é um santuário espiritual, dedicado ao santo padroeiro da cidade. Os corredores sagrados, adornados com magníficos mosaicos, ressoam com as orações e cânticos da devota congregação local."
 building_church_of_the_theotokos_destination_desc: "À sombra das muralhas de Constantinopla, a [GetBuilding('church_of_the_theotokos').GetName|l] é um farol de fé. Esta antiga igreja, com sua atmosfera serena e ícones sagrados, é uma pedra angular da vida religiosa e cultural da comunidade local."
 building_parthenon_destination_desc: "O [GetBuilding('parthenon').GetName] no topo da Acrópole em Atenas se ergue como um símbolo duradouro da civilização grega antiga. Este majestoso templo, embora parcialmente em ruínas, continua a impressionar os visitantes com sua genialidade arquitetônica e importância histórica."
 building_imam_reza_shrine_destination_desc: "O [GetBuilding('imam_reza_shrine_01').GetName|l] é um local de imenso significado espiritual. O magnífico complexo, com sua cúpula dourada e minaretes, atrai incontáveis peregrinos que buscam consolo e renovação espiritual neste espaço sagrado."
 building_soltaniyeh_destination_desc: "O [GetBuilding('soltaniyeh_01').GetName|l] é uma obra-prima arquitetônica da era Ilkhanate. Seu design inovador e azulejos azuis deslumbrantes fazem dele um marco que realmente se destaca."
 building_palace_of_ctesiphon_destination_desc: "O [GetBuilding('palace_of_ctesiphon_01').GetName|l] evoca a grandiosidade do Império Sassânida. O arco de Taq Kasra, ainda de pé apesar dos estragos do tempo, é um lembrete tocante da habilidade arquitetônica dessa antiga civilização."
 building_falak_ol_aflak_citadel_destination_desc: "Com vista para a cidade de Khorramabad, a [GetBuilding('falak_ol_aflak_citadel_01').GetName] é uma fortaleza de notável força e beleza. Esta cidadela histórica, com suas imponentes muralhas e posição estratégica, é um símbolo do rico patrimônio e do espírito duradouro da região."
 building_minarets_and_remains_of_jam_destination_desc: "Ao me aproximar das [GetBuilding('minarets_and_remains_of_jam_01').GetName|l], um sentimento de reverência me envolve. Essas estruturas imponentes, remanescentes da Dinastia Ghurid, se erguem como sentinelas solitárias na paisagem acidentada, com seu intricado trabalho em tijolos testemunhando uma era esquecida."
 building_great_wall_of_gorgan_destination_desc: "Ao percorrer a paisagem, me sinto humilde diante da magnitude do [GetBuilding('great_wall_of_gorgan_01').GetName|l]. Esta colossal fortificação, que se estende mais do que os olhos podem ver, é um poderoso lembrete da necessidade do antigo reino de proteger suas fronteiras contra invasores."
 building_maharloo_lake_destination_desc: "A visão do [GetBuilding('maharloo_lake_01').GetName|l] perto de Shiraz é hipnotizante. Suas águas cor-de-rosa criam uma paisagem quase surreal. O lago, um fenômeno natural único, me cativa com sua beleza e tranquilidade incomuns."
 building_rainbow_mountains_destination_desc: "Ao olhar para as [GetBuilding('rainbow_mountains_01').GetName|l], fico maravilhado com suas camadas vibrantes e multicoloridas. Estas impressionantes formações naturais, uma maravilha geológica, me deixam em êxtase diante da arte natural da Terra."
 building_mount_damavand_destination_desc: "O majestoso [GetBuilding('mount_damavand_01').GetName|l], erguendo-se sobre a paisagem ao redor, inspira tanto admiração quanto reverência. Como o pico mais alto da [GetGeographicalRegion('world_persian_empire').GetName|l], seu cume coberto de neve e suas associações míticas cativam minha imaginação."
 building_tomb_of_cyrus_destination_desc: "Diante do [GetBuilding('tomb_of_cyrus_01').GetName|l] em Pasárgada, sou preenchido com um profundo senso de história. Este monumento simples, mas elegante, dedicado à mãe do Rei Salomão, ressoa com um legado profundo."
 building_ark_of_bukhara_destination_desc: "Ao passar pelas imponentes portas do [GetBuilding('ark_of_bukhara_01').GetName], não posso deixar de sentir o peso dos séculos. Esta antiga fortaleza tem sido a sede de poder dos emirados locais desde sua fundação há séculos, e suas espessas muralhas acolheram incontáveis caravanas ao longo da Rota da Seda."
 building_shah_i_zinda_destination_desc: "Explorar a necrópole de [GetBuilding('shah_i_zinda_01').GetName] em Samarcanda é uma jornada através do tempo e da arte. Cada mausoléu, com seu requintado trabalho em azulejos, conta uma história, evocando um profundo respeito pela rica herança cultural e espiritual da região."
 building_alamut_castle_destination_desc: "O [GetBuilding('alamut_castle_01').GetName|l], situado no topo de uma montanha no Vale de Alamut, evoca um senso de mistério e intriga. Antiga fortaleza dos Assassinos, sua localização estratégica e o passado cheio de histórias continuam a fascinar a mim e aos visitantes locais."
 building_golden_gate_of_kiev_destination_desc: "Ao me aproximar do [GetBuilding('golden_gate_of_kiev_01').GetName], sou arrebatado por sua grandiosidade vibrante. O portão, que serve de entrada para a cidade, ressoa com os sons do comércio. Sua robusta arquitetura, símbolo do poder da cidade, continua a inspirar reverência e um senso de conexão com o glorioso passado de Kiev."
 building_sar_i_sang_mines_01_destination_desc: "Na [GetBuilding('sar_i_sang_mines_01').GetName|l], o ar está espesso com a poeira do lápis-lazúli. A pedra azul profunda, valorizada por sua cor intensa, está sendo extraída meticulosamente por mineradores habilidosos. As minas ressoam com uma história de comércio e luxo, o lápis-lazúli tendo adornado os mais finos tesouros dos impérios."
 building_drassanes_01_destination_desc: "O grande arsenal de [GetBuilding('drassanes_01').GetName|l] prepara uma frota de galeras de guerra, concedendo ao seu proprietário a capacidade de projetar sua vontade no Mediterrâneo. Sob abóbadas de pedra pontiagudas, os trabalhadores laboram incansavelmente."
 building_kyz_kala_01_destination_desc: "A [GetBuilding('kyz_kala_01').GetName|l] se eleva sobre o exuberante oásis de Merv, lançando sua longa sombra sobre a terra seca. Suas fundações repousam sobre um pedestal robusto, e suas paredes flutuadas engolfam oficinas, arsenais e grandes salões onde emissários e burocratas caminham apressadamente."
 building_cluny_abbey_01_destination_desc: "Um presente de terras e direitos, em troca da salvação eterna. Esse é o pacto formado entre a comunidade monástica de [GetBuilding('cluny_abbey_01').GetName|l] e o senhor local."
 building_cluny_abbey_02_destination_desc: "A [GetBuilding('cluny_abbey_02').GetName], a maior igreja jamais imaginada. Suas cinco naves, mais longas do que as do Vaticano, e os imensos arcos de pedra, uma conquista arquitetônica repleta de torres e telhados. Esta é verdadeiramente uma nova Roma."
 building_york_walls_01_destination_desc: "Com vários quilômetros de extensão, essas imponentes [GetBuilding('york_walls_01').GetName|l] protegem a cidade desde a época dos césares. O local foi escolhido não por sua elevação, mas para aproveitar os dois rios que serpenteiam pela campina ao redor."
 building_damascus_mosque_01_destination_desc: "A [GetBuilding('damascus_mosque_01').GetName|l] é um dos locais mais sagrados do Islã, com uma história venerável para contar, colocando suas fundações sobre um antigo templo romano e uma basílica cristã primitiva, muitas séculos de espiritualidade e engenhosidade maravilhosas empilhadas uma sobre a outra."
 building_jokhang_01_destination_desc: "O [GetBuilding('jokhang_01').GetName|l] é um complexo labiríntico de pátios e residências monásticas atravessados por corredores cavernosos e salões cobertos com manteiga de iaque. Hm, manteiga de iaque, talvez eu devesse experimentar um pouco..."
 building_wartburg_01_destination_desc: "Escondida na floresta da Turíngia e empoleirada no alto de um grande precipício rochoso, a poderosa fortaleza de [GetBuilding('wartburg_01').GetName] controla todo o movimento de mercadorias e pessoas pela região. Um enorme salão de pedra fria aquecido pelas várias lareiras no interior."
 building_beta_giyorgis_01_destination_desc: "A [GetBuilding('beta_giyorgis_01').GetName] foi esculpida inteiramente em uma rocha vulcânica vermelha e quente. Escavado profundamente na rocha, o salão principal da igreja é ricamente pintado com belos afrescos, enquanto ícones sagrados adornam as paredes."
 building_holy_wisdom_01_destination_desc: "A magnífica [GetBuilding('holy_wisdom_01').GetName] foi modelada após a Hagia Sophia, para representar a mesma luz, riqueza e poder na terra gelada do norte. Sua aparência austera de calcário branco trai as cores esmagadoras dos afrescos no interior."
 building_kano_walls_01_destination_desc: "As [GetBuilding('kano_walls_01').GetName|l], com vários metros de altura, cercam a antiga cidade de Kano, canalizando as importantes rotas comerciais da região por suas grandes portas."
 building_somapura_university_01_destination_desc: "[GetBuilding('somapura_university_01').GetName|l] tem servido por séculos como um dos centros de aprendizado mais importantes da Índia, atraindo estudiosos de regiões distantes graças à sua multiplicidade de conexões com mosteiros budistas, jainistas e hindus."
 building_duomo_florence_01_destination_desc: "Seguindo as antigas muralhas romanas perto de seu portão norte, a [GetBuilding('duomo_florence_01').GetName] tem sido o lar dos cristãos desde antes da época de Constantino. Ao longo do tempo, sofreu incêndios e saques, reconstrução e bênçãos."
 building_duomo_florence_02_destination_desc: "A [GetBuilding('duomo_florence_02').GetName|l] é um colossal batistério octagonal no centro da cidade, dedicado ao seu patrono São João.\nÉ revestido de mármores caros e decorado com esculturas primorosas e mosaicos dourados, um verdadeiro testemunho da riqueza da cidade."
 building_duomo_florence_03_destination_desc: "A [GetBuilding('duomo_florence_03').GetName] é uma catedral digna da rica Florença. A fachada é preenchida com estátuas humanas de profetas, deuses e patronos, e uma longa sombra é projetada por sua alta torre sineira, marcando as horas de trabalho e oração para os cidadãos e visitantes."
 building_duomo_florence_04_destination_desc: "[GetBuilding('duomo_florence_04').GetName] é a maior conquista dos construtores florentinos, erguendo-se esbelta e aérea contra o céu azul. É mais alta e mais larga do que jamais se concebeu, sem sistemas de apoio para impedir seu colapso, mas com o uso engenhoso de uma casca dupla de tijolos e alvenaria."
 building_konark_temple_01_destination_desc: "Trabalhado por milhares de artesãos, o imenso [GetBuilding('konark_temple_01').GetName|l] é dedicado ao deus do sol, Surya. Todo o complexo foi construído para se assemelhar ao poderoso carro do deus, carregando a luz do mar em direção ao leste."
 building_al_qarawiyyin_university_01_destination_desc: "Fundada por comerciantes e migrantes da cidade africana de Kairouan, a [GetBuilding('al_qarawiyyin_university_01').GetName|l] é um dos centros de aprendizado superior mais prestigiosos de todo o mundo islâmico ocidental, atraindo estudiosos de regiões distantes."
 building_kairouan_basins_01_destination_desc: "Os [GetBuilding('kairouan_basins_01').GetName|l] foram construídos para fornecer água potável à cidade em tempos de necessidade, esses enormes reservatórios purificam a água da chuva agindo como tanques de decantação e filtrando os sedimentos."
 building_ghana_palace_01_destination_desc: "Cercido por um bosque sagrado está o [GetBuilding('ghana_palace_01').GetName|l] - morada dos chefes reais da cidade.\nO complexo é composto por edifícios de arenito e tijolos de barro, protegido por uma cerca com portões. Uma estrutura imensa, este palácio domina a cidade ao redor."
 building_visegrad_castle_01_destination_desc: "O [GetBuilding('visegrad_castle_01').GetName|l] é um grandioso e impenetrável sistema de muralhas e torres, protegendo a curva do Danúbio e controlando seu rico comércio."
 building_wawel_cathedral_01_destination_desc: "Construída com a ajuda de artesãos de toda a Cristandade, esta grande catedral de pedra é a primeira de seu tipo nas terras polonesas. Do topo da colina de [GetBuilding('wawel_cathedral_01').GetName|l], os sinos de suas duas torres chamam os cidadãos para a missa em suas longas naves iluminadas por velas."
 building_vatapi_caves_01_destination_desc: "Construídas pela dinastia Chalukya, as [GetBuilding('building_vatapi_caves_01').GetName|l] foram escavadas profundamente em uma formação imponente de arenito. No interior, encontra-se um mundo interior mais sagrado e silencioso. Um portão triunfal conduz os peregrinos até a face monolítica da montanha."
 building_jaisalmer_fort_01_destination_desc: "À medida que o sol começa a se pôr no horizonte, as poderosas muralhas do [GetBuilding('jaisalmer_fort_01').GetName|l] ganham a cor quente do mel doce, brilhando intensamente no meio do deserto. A fortaleza foi construída para proteger a cidade interna de qualquer ameaça."
 building_pleasure_dome_01_destination_desc: "O [GetBuilding('pleasure_dome').GetName|l] ergue-se do chão como um sonho tornado real. Cercado por jardins e riachos, seus salões de mármore e pavilhões abertos convidam ao lazer e à reflexão, flutuando em uma névoa de música e ar perfumado."
 building_burkhan_khaldun_01_destination_desc: "Velado em névoa e reverência, o [GetBuilding('burkhan_khaldun_01').GetName] ergue-se sagrado entre os picos de Khentii. Um lugar de oração e peregrinação, suas encostas silenciosas são acreditadas para proteger a alma da terra e de seu povo."
 building_nanhua_temple_01_destination_desc: "O [GetBuilding('nanhua_temple_01').GetName|l] se ergue entre colinas exuberantes e rios tranquilos; seus telhados reluzem através da névoa da manhã. Ciprestes antigos ladeiam o caminho, e os peregrinos se curvam diante de salões que ecoam séculos de devoção e erudição silenciosa."
 building_jizu_shan_temples_01_destination_desc: "Construídos nas encostas da montanha, os [GetBuilding('jizu_shan_temples_01').GetName|l] contemplam as nuvens à deriva como se fossem levadas pela maré. Rodas de oração de bronze giram ao vento enquanto os monges cuidam do incenso entre as árvores antigas. Os peregrinos sobem pacientemente os degraus de pedra em busca dos ecos do antigo esclarecimento."
 building_tiantai_monasteries_01_destination_desc: "Os [GetBuilding('tiantai_monasteries_01').GetName|l] se agarram a penhascos envoltos em neblina acima de vales profundos. Riachos murmuram entre pedras cobertas de musgo, e monges que carregam pergaminhos debatem as escrituras onde, no passado, seus mestres ensinaram meditação, doutrina e o próprio mundo."
 building_maoshan_academy_01_destination_desc: "A [GetBuilding('maoshan_academy_01').GetName|l] se eleva entre picos esmeralda velados por uma névoa flutuante; seus pátios cheiram a pinho e tinta. Os eruditos copiam textos à luz das lamparinas, misturando medicina e misticismo enquanto as garças voam em círculos ao redor das cristas coroadas por santuários além."
 building_lize_academy_01_destination_desc: "Ao terminar a jornada, a [GetBuilding('maoshan_academy_01').GetName|l] se ergue diante de mim, ao lado de um lago tranquilo que reflete salgueiros e telhados de cerâmica. À medida que me aproximo, ouço os eruditos ao longe. Vestem roupas simples e recitam os clássicos confucionistas."
 building_culai_academy_01_destination_desc: "Quanto mais vejo a [GetBuilding('culai_academy_01').GetName|l], mais me cativa sua beleza purificadora da alma. Névoas que descem dos picos do Monte Culai se infiltram em seus pátios, onde os buscadores do conhecimento perseguem suas ambições acadêmicas."
 building_shigu_academy_01_destination_desc: "Minhas viagens finalmente me levam a [GetBuilding('shigu_academy_01').GetName|l], escondida no alto das colinas encobertas e cercada por bosques exuberantes. Ao subir os degraus, seu famoso portão é uma visão acolhedora com inscrições intricadas, sob a sombra de seu telhado recém-restaurado."
 building_white_deer_grotto_academy_01_destination_desc: "À medida que me aproximo à [GetBuilding('white_deer_grotto_academy_01').GetName|l], fico impressionado com a naturalidade com que ela se mistura às colinas ao redor. Seus edifícios de pedra estão aninhados entre bosques de bambu, lembrando um lugar onde, em tempos passados, os eruditos buscavam a verdade e a harmonia."
 building_gongsanseong_fortress_01_destination_desc: "Ao surgir diante de mim a [GetBuilding('gongsanseong_fortress_01').GetName|l] , fico impressionado com sua presença imponente sobre o vale do rio. As antigas muralhas ecoam histórias de batalhas há muito esquecidas, reis leais e o espírito resiliente de um reino orgulhoso.”"
 building_besakih_temple_01_destination_desc: "Ao contrário do que indica o humilde nome do [GetBuilding('besakih_temple_01').GetName|l], encontro não apenas um templo, mas todo um complexo extenso de santuários públicos e privados usados para fazer preces e cerimônias dentro de seus muros, o que lhe rendeu o apelido de \"O Templo Mãe\"."
 building_mount_apo_01_destination_desc: "À medida que o [GetBuilding('mount_apo_01').GetName|l], sua majestade grandiosa e serena me dá uma lição de humildade. As nuvens abraçam suas encostas ásperas, e o cheiro de chuva e cinzas perdura graciosamente; seu pico reverenciado protege os espíritos da terra e do fogo."
 building_dieng_plateau_01_destination_desc: "A serenidade sobrenatural da [GetBuilding('dieng_plateau_01').GetName|l] impressiona aos olhos humanos. O vapor se eleva de suas crateras esmeralda, e antigos santuários de pedra emergem da névoa. É um reino de tirar o fôlego, onde a natureza e a divindade parecem compartilhar o mesmo fôlego."
 building_plain_of_jars_01_destination_desc: "O [GetBuilding('plain_of_jars_01').GetName|l] se estende diante de mim, vasto e silencioso sob um céu pálido. Espalhados pelas colinas, enormes e misteriosos recipientes erguem-se semi-enterrados na grama e na sombra, seu propósito esquecido sussurrando sobre uma civilização há muito desaparecida, mas nunca totalmente ausente."
 building_pagoda_of_fogong_temple_01_destination_desc: "A [GetBuilding('pagoda_of_fogong_temple_01').GetName|l] se ergue diante de mim, seus andares de madeira se elevam como uma prece gravada no céu. Cada nível carrega o aroma de incenso antigo, representando um testemunho duradouro de devoção e artesanato por quase mil anos."
 building_hanging_temple_01_destination_desc: "O [GetBuilding('hanging_temple_01').GetName|l] está suspenso na encosta do penhasco como uma visão fugaz entre a terra e o céu. Salões de madeira se estendem a partir da face rochosa, com vigas que parecem desafiar a gravidade, onde monges rezam em meio ao vento, ao silêncio e à devoção inabalável."
 building_muaro_jambi_01_destination_desc: "O [GetBuilding('muaro_jambi_01').GetName|l] se estende ao longo da margem do rio; um labirinto de santuários de tijolo envoltos pela selva. As trepadeiras se enrolam em torno de estupas de construção elegante, e o ar vibra com a idade. Ecos de eruditos; peregrinos que permanecem por comércio e fé."
 building_liuhe_pagoda_01_destination_desc: "Na margem ao lado do rio, a [GetBuilding('liuhe_pagoda_01').GetName|l] me saúda com sua elegância majestosa em camadas, brilhante por fora e escura por baixo. Lá dentro, à medida que se sobe, cada degrau apresenta paredes externas, corredores em zigue-zague, paredes internas e pequenas câmaras cheias de estudiosos dedicados."
 building_dau_temple_01_destination_desc: "O [GetBuilding('dau_temple_01').GetName|l] se ergue onde as planícies do Rio Vermelho encontram o céu; seus pátios ganham vida com incenso e preces. Santuários antigos reluzem à luz do sol, marcando o berço do budismo na região e séculos de devoção espiritual duradoura."
 building_mount_baekdu_01_destination_desc: "Quando o [GetBuilding('mount_baekdu_01').GetName|l], sua cúpula coberta de neve reluz contra o horizonte. Diz-se que há um vasto lago em uma cratera no topo, repousando como um espelho para os céus, refletindo a bem-aventurança celestial."
 building_byeokran_port_01_destination_desc: "Dos penhascos acima, o [GetBuilding('byeokran_port_01').GetName|l] se estende ao longo da baía reluzente. Há armazéns por toda a costa, junto aos mastros de madeira, enquanto os gritos das gaivotas se misturam ao som das âncoras."
 building_hwangnyongsa_01_destination_desc: "Estou diante do [GetBuilding('hwangnyongsa_01').GetName|l], cuja pagoda de nove andares reluz à luz do sol. Os monges entoam cânticos nos grandes pátios, e sinto a fé e a resiliência refletidas em cada pedra e viga dourada."
 building_hakata_port_01_destination_desc: "O [GetBuilding('hakata_port_01').GetName|l] fervilha com comerciantes e marinheiros de regiões distantes, e seus cais estão repletos de seda, cerâmica e especiarias. O porto está tomado por barcos de madeira que rangem, cujas velas captam a brisa marítima, servindo como um animado centro de comércio, cultura e influência imperial."
 building_chinjufu_01_destination_desc: "O [GetBuilding('chinjufu_01').GetName|l] ganha vida com uma ordem disciplinada, com quartéis e estaleiros que ressoam com o tilintar das armaduras e os chamados dos marinheiros. Torres de vigia margeiam a baía, observando os mares do norte do reino, onde cada batida do coração é guiada pela defesa e pelo dever."
 building_dazaifu_01_destination_desc: "O [GetBuilding('dazaifu_01').GetName|l] está enclavado entre colinas onduladas e bosques de ameixeiras, e fervilha com escribas, enviados e oficiais. É um centro onde diretrizes administrativas são enviadas para províncias distantes, com decretos selados por tinta, incenso e autoridade sutil."
 building_enryaku_ji_01_destination_desc: "O [GetBuilding('enryaku_ji_01').GetName|l] coroa o monte Hiei; seus salões estão envoltos em névoa. Os peregrinos sobem pelos caminhos sinuosos, passando por monges que entoam cânticos e sinos que repicam; ali, os ensinamentos de $SaichO_$ ainda moldam a fé e a disciplina de uma nação."
 building_kofuku_ji_01_destination_desc: "O [GetBuilding('kofuku_ji_01').GetName|l] se ergue junto às águas de um lago barrento. Sua pagoda de cinco andares projeta longas sombras sobre as ruas antigas. Cortesãos e monges passam sob seus portões robustos, onde estudiosos meditam em serena devoção budista."
 building_ise_jingu_01_destination_desc: "Ergue-se [GetBuilding('ise_jingu_01').GetName|l] junto às águas de um lago turvo. Sua pagoda de cinco andares projeta longas sombras sobre as antigas ruas. Cortesãos e monges passam sob seus portões robustos, onde eruditos meditam em serena devoção budista."
 building_heian_palace_01_destination_desc: "O [GetBuilding('heian_palace_01').GetName|l] se ergue ao longo da avenida, com seus portões vermelhos abrindo-se para vastos pátios de cascalho branco rastelado. Cortesãos perfumados deslizam por salões laqueados, onde biombos dourados e cítaras distantes ecoam a elegância da vida imperial."
 building_itsukushima_jinja_01_destination_desc: "O [GetBuilding('itsukushima_jinja_01').GetName|l] se ergue sobre as águas da maré. Seu torii vermelho-escarlate parece flutuar entre o mar e o céu. Lanternas balançam sob os beirais de madeira enquanto os monges cuidam dos ritos sagrados, e seus cânticos se misturam ao ritmo das ondas."
 building_mount_fuji_01_destination_desc: "O [GetBuilding('mount_fuji_01').GetName|l] se ergue majestosamente sobre as planícies; seu pico coberto de neve reluz contra o céu limpo. Vilarejos e peregrinos, todos, erguem o olhar em reverência, pois ele está associado à sua deusa e também serve como espelho da beleza eterna."
 building_sunday_bazaar_01_destination_desc: "O [GetBuilding('sunday_bazaar_01').GetName|l] é vibrante, com ruas ensolaradas repletas de sedas, especiarias e gado. Comerciantes de regiões distantes negociam em अनेक語?"
 building_dunhuang_market_01_destination_desc: "O [GetBuilding('dunhuang_market_01').GetName|l] vibra sob o sol do deserto, com mercadores de todas as regiões negociando produtos exóticos e essenciais. Os camelos descansam junto aos portões enquanto peregrinos e moradores trocam pergaminhos e histórias destinadas aos distantes oásis adiante."
 building_hamadan_bazaar_01_destination_desc: "O [GetBuilding('hamadan_bazaar_01').GetName|l] serpenteia por vielas abobadadas, repletas dos aromas de açafrão e couro. Os comerciantes conclamam de suas barracas sombreadas, com suas mercadorias prontas para novos donos, enquanto viajantes e moradores circulam por este centro histórico de comércio."
 building_lahur_bazaar_01_destination_desc: "O [GetBuilding('lahur_bazaar_01').GetName|l] ressoa com sons e cores vibrantes enquanto os becos estreitos fervilham com vendedores de especiarias, tintureiros e joalheiros. Uma fumaça aromática sobe das barracas de comida, e cada canto vibra com a energia de grandeza e comércio animado."
 building_changan_market_01_destination_desc: "O [GetBuilding('changan_market_01').GetName|l] fervilha com comerciantes de todo o mundo sob estandartes vibrantes. Mercadorias estrangeiras acrescentam cor, e artistas de rua e estudiosos se misturam no animado centro comercial."
 building_khiva_bazaar_01_destination_desc: "O [GetBuilding('khiva_bazaar_01').GetName|l] serpenteia por vielas ensolaradas sob torres turquesas, preenchidas pelos aromas de cominho e lã. Os mercadores barganham por tapetes e marfim, suas vozes ecoando sob cúpulas que refletem o comércio histórico do deserto e do império."
 building_lhasa_market_01_destination_desc: "O [GetBuilding('lhasa_market_01').GetName|l] se estende sob bandeiras de oração que tremulam e apresenta barracas transbordando de lamparinas de manteiga, contas coloridas e lã de iaque. Monges, nômades e comerciantes interagem no ar da alta montanha, com suas barganhas suavizadas pelos repiques distantes dos sinos dos templos."
 building_dvin_shuka_01_destination_desc: "Enquanto caminho pelo [GetBuilding('dvin_shuka_01').GetName|l], o ar ressoa com vozes de terras distantes. O bronze reluz sob coberturas tecidas enquanto os mercadores me incentivam a provar seus doces e ver suas sedas vibrantes. Cada troca revela um vislumbre da energia vibrante da cidade."
 building_herat_bazaar_01_destination_desc: "Vago pelos salões abobadados do [GetBuilding('herat_bazaar_01').GetName|l], onde as telhas reluzem sobre as bancas sombreadas. A água corre por canais de pedra, e o cheiro de tintas e poeira permanece sob o murmúrio do comércio constante."
 building_hoshi_ryokan_01_destination_desc: "Chego ao [GetBuilding('hoshi_ryokan_01').GetName]; suas vigas de madeira estão polidas pelo passar de séculos de silenciosa hospitalidade. As lanternas brilham ao longo dos corredores de tatame, e o aroma de cedro e água de nascente se espalha dos banhos, onde o próprio tempo parece se mover com mais suavidade."
 building_borobudur_01_destination_desc: "Ao amanhecer, estou diante de [GetBuilding('borobudur_01').GetName]; suas terraços se erguem da névoa como um mandala de pedra. Budas esculpidos observam enquanto a luz do sol toca as estupas, representando um caminho da terra à iluminação talhado em pedra vulcânica."
 building_krakatoa_01_destination_desc: "Do meu barco no estreito, observo o [GetBuilding('krakatoa_01').GetName] erguer-se imponente no horizonte, com suas encostas envoltas em uma fumaça mutável. O mar murmura inquieto e o ar traz um aroma pungente de cinzas, um lembrete do núcleo agitado da montanha sob as ondas."
 building_po_klong_garai_01_destination_desc: "Chego a [GetBuilding('po_klong_garai_01').GetName|l] sob o sol escaldante; suas torres de tijolos vermelhos se erguem das colinas áridas como brasas de devoção. Entalhes gastos de divindades e serpentes guardam o santuário, onde o incenso e o silêncio honram um rei tornado lenda."
 building_citadel_thang_long_01_destination_desc: "Caminho pelos baluartes da [GetBuilding('citadel_thang_long_01').GetName|l], suas muralhas de terra alcançam o rio. As torres de vigia observam os lagos de lótus e os telhados de cerâmica, com soldados e cortesãos movendo-se através da névoa de incenso e da névoa da manhã, guardando a capital em crescimento."
 building_citadel_thang_long_02_destination_desc: "Cruzo os portões da [GetBuilding('citadel_thang_long_02').GetName|l], onde desenhos de dragões se enroscam pelas antigas muralhas de pedra. Os pátios ecoam com os passos dos guardas, enquanto o aroma da chuva sobre os tijolos se mistura ao peso da autoridade de longa data."
 building_angkor_wat_01_destination_desc: "Percorro a calçada de arenito que leva a [GetBuilding('angkor_wat_01').GetName], onde suas torres parecem brotos de lótus sobre fossos espelhados. Os pilares entalhados e as galerias são organizados simetricamente, com cada pedra exibindo representações de divindades, bailarinos e o ritmo atemporal."
 building_quanzhou_seaport_01_destination_desc: "O [GetBuilding('quanzhou_seaport_01').GetName|l] é um lugar animado com barcos descarregando mercadorias comerciais nos movimentados cais, enquanto os marinheiros gritam por cima dos sons das cordas e dos carros, ao passo que os funcionários registram meticulosamente cada carga. Um ritmo constante de comércio define este agitado centro costeiro."
 building_qianling_mausoleum_01_destination_desc: "Chego ao [GetBuilding('qianling_mausoleum_01').GetName|l], onde avenidas de pedra sobem uma colina de túmulos reais. Estátuas de cavalos e emissários permanecem alinhadas em silêncio, guardando o imperador Gaozong e a imperatriz Wu sob o solene abraço da terra."
 building_forbidden_city_01_destination_desc: "Entro em [GetBuilding('forbidden_city_01').GetName|l] por meio de imponentes portões vermelhos, onde telhados envidraçados brilham como a luz do sol sobre a água. Os pátios, ladeados por dragões entalhados, são dispostos simetricamente com salões alinhados ao trono do imperador."
 building_kaifeng_palace_01_destination_desc: "A névoa matinal do [GetBuilding('kaifeng_palace_01').GetName|l] revela um palácio imperial com vigas elegantemente pintadas. Caldeirões de bronze fumegam ao lado de pátios ladrilhados, enquanto calígrafos e oficiais passam sob treliças entalhadas, ecoando a autoridade Song."
 building_giant_wild_goose_pagoda_01_destination_desc: "Estou diante da [GetBuilding('giant_wild_goose_pagoda_01').GetName|l], um centro de conhecimento de sete andares construído com tijolos ocre rematados em bronze para proteger sutras budistas. Um símbolo de devoção, erudição e intercâmbio cultural."
 building_lingyin_temple_01_destination_desc: "À medida que me aproximo a [GetBuilding('lingyin_temple_01').GetName|l] através dos vales enevoados de Hangzhou, budas de pedra observam do Pico Feilai. No interior do salão principal, um grande Sakyamuni dourado resplandece em meio ao incenso e aos cânticos."
 building_shaolin_monastery_01_destination_desc: "Chego ao [GetBuilding('shaolin_monastery_01').GetName|l] perto do monte Song, onde os monges treinam entre aromas de pinho e incenso, misturando meditação e artes marciais em uma disciplina rítmica."
 building_wudang_mountain_temples_01_destination_desc: "Subo pelos sinuosos caminhos do [GetBuilding('wudang_mountain_temples_01').GetName|l], onde os templos se agarram aos penhascos enevoados. Os telhados de bronze brilham entre as nuvens enquanto os monges se movem em silêncio entre santuários e pinheiros. É um lugar sagrado onde arquitetura e natureza se fundem."
 building_yungang_grottoes_01_destination_desc: "As [GetBuilding('yungang_grottoes_01').GetName|l] são um complexo de cavernas onde foram esculpidos grandes santuários de pedra em penhascos cor de mel. Na sombra fresca, fileiras de enormes Budas olham para fora, com seus rostos serenos exibindo leves vestígios da antiga pintura."
 building_leshan_giant_buddha_01_destination_desc: "Estou diante do [GetBuilding('leshan_giant_buddha_01').GetName|l], esculpido nos penhascos vermelhos acima dos rios que se encontram. A neblina se acumula ao redor de seus joelhos imensos, e os monges próximos entoam cânticos suavemente, suas preces levadas pelo mesmo vento que moldou esta montanha sagrada."
 building_wulingyuan_01_destination_desc: "Minha jornada me leva pelos vales envoltos em neblina de [GetBuilding('wulingyuan_01').GetName], onde imponentes pilares de arenito se erguem como antigos sentinelas sobre exuberantes florestas verdes. Cachoeiras surreais despencam pelas falésias, e templos ocultos se agarram a saliências rochosas."
 building_swahili_port_lamu_destination_desc: "Chego ao [GetBuilding('swahili_port_lamu').GetName|l], onde casas de pedra de coral encaram o mar e os barcos deslizam com a maré. O ar vibra com línguas regionais, e o cheiro de cravo e sal preenche os becos estreitos e ensolarados."
 building_swahili_port_pate_destination_desc: "A costa de [GetBuilding('swahili_port_pate').GetName|l] reluz intensamente sob o sol do meio-dia, com cais de pedra movimentados, cheios de mercadores que anunciam aos gritos caixas de marfim e gr?os. Palmeiras-datilheiras balan?am atr?s das muralhas do porto, enquanto a ilha inteira pulsa com o som de mares distantes."
 building_swahili_port_mombasa_destination_desc: "O [GetBuilding('swahili_port_mombasa').GetName|l] se estende ao longo de uma baía em forma de crescente; suas águas ganham vida com velas e gritos. Fortificações de pedra vigiam o porto, enquanto os mercados se estendem em direção à costa, carregados com o aroma do óleo de palma, cobre e a promessa inquieta do vasto mar além."
 building_swahili_port_zanzibar_destination_desc: "Quando chego, o [GetBuilding('swahili_port_zanzibar').GetName|l] fervilha de atividade sob nuvens à deriva, com portas de madeira entalhadas levando a becos cheios de barracas de especiarias, e navios estrangeiros atracando no porto."
 building_swahili_port_pemba_destination_desc: "O [GetBuilding('swahili_port_pemba').GetName|l] vibra com um propósito sereno e o aroma de cravo paira pesado no ar. Comerciantes desconhecidos das costas do norte trocam moedas de prata, enquanto pequenos barcos descarregam sacos de especiarias com destino a mercados distantes."
 building_koganeyama_mines_destination_desc: "A ilha de Kinka está salpicada de escavadores diligentes de [GetBuilding('koganeyama_mines_01')], que buscam o célebre pó de ouro que Kanayama, kami da mineração, ocultou ali."
 building_tsushima_mines_destination_desc: "A fama de [GetBuilding('tsushima_mines_01').GetName|l] fornece um fluxo constante de mineiros espalhados pela ilha, processando o minério negro e buscando novas veias."
 building_sado_mines_destination_desc: "Um lugar modesto, desolado e isolado, mas, sob a terra, os mineradores de [GetBuilding('sado_mines_01').GetName|l] se esforçam muito para extrair as riquezas ocultas da ilha."
 building_tada_mines_destination_desc: "Entre as montanhas arborizadas de Settsu, os [GetBuilding('tada_mines_01').GetName|l] ressoam com a agitada atividade dos mineradores de cobre, que extraem as riquezas ocultas da terra."
 building_mozu_tombs_destination_desc: "As [GetBuilding('mozu_tombs').GetName|l] são uma maravilha curiosa. Diz-se que abrigam os imperadores de outrora; essas impressionantes tumbas em montículo, com seus fossos em forma de fechadura, moldam a paisagem física tanto quanto a espiritual."
 building_trosky_castle_01_destination_desc: "O imponente [GetBuilding('trosky_castle_01').GetName|l] está construído entre duas enormes formações de rocha basáltica, das quais os mais velhos dizem que são vulcões adormecidos. Ironicamente, o nome do castelo se traduz como "ruínas" por causa da aparência das pedras, mas ele está longe disso."
 legendary_watchtower_destination_desc: "A [GetBuilding('legendary_watchtower').GetName|l] se eleva alto, observando a terra com um olhar imperturbável. Sua estrutura formidável, um farol por milhas ao redor, é um testemunho da vigilância de seus criadores. Ela serve não apenas como um ponto de observação, mas também como um símbolo de proteção contra qualquer um que ouse ameaçar a paz do reino."
 legendary_hunting_ground_destination_desc: "O [GetBuilding('legendary_hunting_lodge').GetName|l] é um reino onde a selva reina suprema. Suas vastas terras, repletas de flora e fauna diversificadas, oferecem um santuário intocado para a nobre arte da caça. Aqui, tradição e natureza se entrelaçam, proporcionando uma experiência desafiadora, mas gratificante, para aqueles que buscam testar suas habilidades contra a selvageria."
 legendary_palace_destination_desc: "Envolto em grandeza, o [GetBuilding('legendary_palace').GetName|l] é uma obra-prima arquitetônica que cativa todos que entram em seu domínio. Seus luxuosos salões e jardins são um testemunho do auge da realização artística. Este palácio, um centro de poder e beleza, inspira admiração e maravilha nos corações dos visitantes."
 legendary_statue_destination_desc: "A [GetBuilding('legendary_statue').GetName|l] se ergue como uma homenagem imortal ao heroísmo e às virtudes que representa. Esculpida em pedra, mas imbuída com o espírito da lenda, ela captura o olhar de todos que passam. É um ponto de orgulho e inspiração, encarnando a memória coletiva e as aspirações do povo."
 legendary_shrine_destination_desc: "Aninhado na tranquilidade, o [GetBuilding('legendary_shrine').GetName|l] é um oásis sagrado que atrai tanto os fiéis quanto os curiosos. É um lugar de reflexão e devoção, onde rituais e orações ecoam contra o pano de fundo do tempo. Este santuário oferece consolo e conexão com o divino, servindo como uma ponte entre o terreno e o etéreo."
 building_generic_destination_desc: "Ao chegar ao local, seu caráter único e o senso de história que exala são imediatamente evidentes. Ele se ergue como um testemunho do legado duradouro desta terra, e cada aspecto deste lugar conta uma história esperando para ser descoberta."
 building_castle_arrival_01_desc: "Minha empolgação cresce à medida que me aproximo do [location.GetTitle.GetName]. A perspectiva de testemunhar sua grandiosidade me enche de antecipação."
 building_castle_arrival_02_desc: "Ao me aproximar do [location.GetTitle.GetName], meu coração acelera com a emoção de explorar as lendas consagradas dentro de suas paredes."
 building_castle_arrival_03_desc: "Quando o [location.GetTitle.GetName] aparece à vista, um sentimento de aventura desperta dentro de mim."
 building_castle_arrival_04_desc: "A visão do [location.GetTitle.GetName] me enche de reverência e uma curiosidade aguçada sobre as histórias que ele guarda."
 building_castle_arrival_05_desc: "Aproximando-me do [location.GetTitle.GetName], estou ansioso para descobrir as histórias que ele testemunhou ao longo dos tempos."
 building_city_arrival_01_desc: "Chegando ao [location.GetTitle.GetName], fico animado com a ideia de descobrir suas joias escondidas e sua cultura vibrante."
 building_city_arrival_02_desc: "O movimento e a agitação do [location.GetTitle.GetName] me revigoram, enquanto me preparo para me imergir em suas ruas animadas."
 building_city_arrival_03_desc: "Ao entrar no [location.GetTitle.GetName], um sentimento de maravilha me envolve, ansioso para explorar seus tesouros culturais e vielas históricas."
 building_city_arrival_04_desc: "Ao entrar em [location.GetTitle.GetName], estou ansios[ROOT.Char.Custom('ES_OA')] por experimentar seus mercados movimentados e monumentos históricos."
 building_city_arrival_05_desc: "A energia do [location.GetTitle.GetName] me envolve, despertando minha curiosidade para me aprofundar em sua vida vibrante e seu passado histórico."
 building_temple_arrival_01_desc: "Ao entrar no [location.GetTitle.GetName], estou ansioso para as maravilhas espirituais que se encontram dentro."
 building_temple_arrival_02_desc: "A aura serena do [location.GetTitle.GetName] me chama, prometendo uma jornada para um reino de paz e sabedoria antiga."
 building_temple_arrival_03_desc: "Ao me aproximar do [location.GetTitle.GetName], um profundo senso de reverência toma conta de mim, antecipando os insights sagrados que ele oferece."
 building_temple_arrival_04_desc: "Ao entrar em [location.GetTitle.GetName] me sinto pront[ROOT.Char.Custom('ES_OA')] para experimentar a profundidade espiritual e a beleza que abriga."
 building_temple_arrival_05_desc: "[location.GetTitle.GetName] se ergue diante de mim, um santuário da fé, e estou ansios[ROOT.Char.Custom('ES_OA')] por me imergir em sua atmosfera sagrada."
 building_tribal_holding_arrival_01_desc: "À medida que me aproximo do [location.GetTitle.GetName], um senso de espírito comunitário e unido me recebe."
 building_tribal_holding_arrival_02_desc: "A atmosfera vibrante do [location.GetTitle.GetName] me saúda com cores vivas e expressões culturais ricas."
 building_tribal_holding_arrival_03_desc: "Ao me aproximar do [location.GetTitle.GetName], a harmonia entre a natureza e a tradição é imediatamente evidente."
 building_tribal_holding_arrival_04_desc: "O charme rústico do [location.GetTitle.GetName] me enche de antecipação e desejo de aprender."
 building_tribal_holding_arrival_05_desc: "Ao entrar no [location.GetTitle.GetName], sou tocado pela simplicidade e calor da comunidade local."
 building_religious_learning_outro_01_desc: "Esta visita aprofundou minha compreensão das crenças espirituais e práticas que moldaram as civilizações."
 building_religious_learning_outro_02_desc: "Explorar este local sagrado enriqueceu minha visão sobre o impacto profundo da fé na história e cultura humanas."
 building_religious_learning_outro_03_desc: "Minha jornada aqui iluminou as diversas maneiras pelas quais a devoção religiosa foi expressa e reverenciada ao longo do tempo."
 building_diplomatic_learning_outro_01_desc: "Esta experiência ampliou minha perspectiva sobre as complexidades e sutilezas das relações diplomáticas e da arte de governar."
 building_diplomatic_learning_outro_02_desc: "Parto com uma maior apreciação pela arte intrincada da diplomacia e pelas sutilezas das alianças políticas."
 building_diplomatic_learning_outro_03_desc: "Meu tempo aqui aprimorou meu entendimento sobre o delicado equilíbrio de poder e o papel crucial da diplomacia na formação da história."
 building_martial_learning_outro_01_desc: "O poderio militar e os insights estratégicos adquiridos nesta visita ampliaram profundamente minha compreensão sobre a guerra."
 building_martial_learning_outro_02_desc: "Esta exploração me proporcionou valiosas lições sobre táticas militares e a arte da guerra, essenciais para qualquer líder."
 building_martial_learning_outro_03_desc: "Obtive conhecimentos significativos sobre estratégias de batalha e a importância da habilidade marcial na formação do curso da história."
 building_economic_learning_outro_01_desc: "Minha visita aprimorou minha compreensão dos princípios econômicos e do papel fundamental do comércio na prosperidade das nações."
 building_economic_learning_outro_02_desc: "Explorar este local aprofundou meu entendimento sobre as complexidades do desenvolvimento econômico."
 building_economic_learning_outro_03_desc: "Parto com uma perspectiva mais rica sobre a importância vital da sagacidade econômica para sustentar reinos poderosos."
 building_man_made_wonder_learning_outro_01_desc: "A engenhosidade e o talento artesanal testemunhados aqui deixaram uma impressão duradoura sobre a criatividade e a ambição humana."
 building_man_made_wonder_learning_outro_02_desc: "Esta maravilha da construção ampliou minha apreciação pelas alturas que podem ser alcançadas por meio do esforço humano."
 building_man_made_wonder_learning_outro_03_desc: "Estou partindo inspirado[ROOT.Char.Custom('ES_OA')] pelo notável legado de maestria arquitetônica que se ergue como testemunho de nosso potencial."
 building_natural_wonder_learning_outro_01_desc: "A beleza de tirar o fôlego e a majestade desta maravilha natural aprofundaram consideravelmente minha apreciação pelas esplêndidas maravilhas do mundo."
 building_natural_wonder_learning_outro_02_desc: "Esta visita instilou em mim um profundo senso de admiração pelo mundo natural e suas inúmeras maravilhas."
 building_natural_wonder_learning_outro_03_desc: "Estou partindo com uma reverência renovada pelo poder e beleza inspiradores da natureza, e sua capacidade de moldar nosso mundo e perspectivas."
 building_exploration_01_desc: "Com grande antecipação, começo minha exploração!"
 building_exploration_02_desc: "Olhos arregalados de curiosidade, me aventurei com entusiasmo!"
 building_exploration_03_desc: "Cheio de empolgação, parto para explorar as maravilhas deste local!"
 building_exploration_04_desc: "Com um senso de admiração, vou explorar cada canto e recanto!"
 building_exploration_05_desc: "Caminho com o entusiasmo da descoberta, ansioso para absorver o conhecimento que este lugar promete!"
 building_exploration_06_desc: "Com entusiasmo, inicio minha exploração!"
 building_exploration_07_desc: "Com o coração alegre, começo minha jornada por este local!"
 building_exploration_08_desc: "Chei[ROOT.Char.Custom('ES_OA')] de senso de aventura, parto para atravessar este lugar!"
 building_exploration_09_desc: "Começo ansios[ROOT.Char.Custom('ES_OA')] minha exploração, cada passo está cheio de expectativa!"
 building_exploration_10_desc: "Com um espírito de entusiasmo, percorro este local!"
 building_exploration_11_desc: "Dou um passo à frente com espírito aventureiro, ansios[ROOT.Char.Custom('ES_OA')] por explorar a rica história deste lugar!"
 building_exploration_12_desc: "Com um passo alegre, começo a explorar!"
 building_exploration_13_desc: "Parto com entusiasmo em minha jornada por este local, ansioso[ROOT.Char.Custom('ES_OA')] pelos descobrimentos que me aguardam!"
 building_exploration_14_desc: "Cheio de empolgação, me aventuro por este local, ansioso pelas vistas que ele promete!"
 building_exploration_15_desc: "Começo a exploração com um sentimento de admiração, ansios[ROOT.Char.Custom('ES_OA')] por aprender com a herança deste lugar!"
 building_exploration_16_desc: "Com uma sensação de expectativa ansiosa, eu me aventuro por aí, pronto para ser cativado pela beleza deste lugar![ROOT.Char.Custom('ES_OA')] para que eu seja cativado pela beleza deste lugar!"
 building_exploration_17_desc: "Começo minha exploração com um sentimento de entusiasmo!"
 building_exploration_18_desc: "Embarco em minha jornada por este local com uma grande curiosidade!"
 building_exploration_19_desc: "Com um coração entusiástico, parto para explorar!"
 building_exploration_20_desc: "Começo minha exploração ansioso[ROOT.Char.Custom('ES_OA')] por experimentar a magnificência que este lugar encarna!"
