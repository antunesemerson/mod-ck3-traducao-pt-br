 travel_start_event.1090.t_activity_journey: "Expedição: Rumo a [location.GetHolding.GetSpecialBuildingType.GetNameNoTooltip]!"
 travel_start_event.1090.t_activity_survey: "$activity_survey$: Supervisando as Terras"
 travel_start_event.1000.norwegian: "Ut på tur, aldri sur!"
 travel_start_event.1090.desc_activity_roaming: "Finalmente, a estrada aberta se estende diante de mim! Em breve, pisarei a [location.Custom('TerrainTypeProvincePrefix')] [location.Custom('TerrainTypeProvince')] de tão bela [location.GetName].\n\nAh, como anseio por suas [location.Custom('GetProvinceFoliageDesc')] e por suas doces [location.Custom('get_region_flower_type_plural')]. Ver seus [location.Custom('GetRandomRegionalWildDaytimeBirdProvince')] voando pelos céus abertos acima de mim!\n\nPreciso partir já!"
 travel_start_event.1090.desc_activity_journey: "O caminho para [location.GetName] é longo, mas mal posso esperar para desenterrar os segredos de [location.GetHolding.GetSpecialBuildingType.GetName] e dos [location.GetTitle.GetHolder.Custom('ComplimentAdjective')] [location.GetCounty.GetTitle.GetAdjective] [location.GetCulture.GetCollectiveNoun] que lá vivem! [ROOT.Char.Custom('IntentInitialEventDesc')]\n\nEu desejaria já estar lá, precisamos apressar!"
 knowledge_hoarding_1: "Farei anotações intermináveis e devorarei cada pedaço de conhecimento que eu encontrar."
 knowledge_hoarding_2: "Compilarei notas exaustivas e absorverei cada fragmento de sabedoria disponível."
 knowledge_hoarding_3: "Tenho a intenção de reunir registros completos e consumir cada pedaço de insight possível."
 curiosity_1: "Espero ansiosamente os encontros com os locais, desejando me imergir em suas histórias e tradições."
 curiosity_2: "A perspectiva de me conectar com a comunidade local, aprendendo com suas experiências, me enche de alegria."
 curiosity_3: "Minha empolgação cresce ao pensar em conhecer aqueles que chamam este lugar de lar, compartilhando contos e sabedoria."
 spread_legend_1: "Vou tecer a história de [ROOT.Char.GetPromotedLegend.GetName] no tecido deste lugar, deixando sua marca na história."
 spread_legend_2: "Minha jornada também é uma missão: espalhar a fama de [ROOT.Char.GetPromotedLegend.GetName], fazendo dela parte do folclore local."
 spread_legend_3: "É meu objetivo ver [ROOT.Char.GetPromotedLegend.GetName] celebrado pelos que encontro, sua lenda crescendo a cada narração."
 travel_start_event.1090.desc_activity_survey: "É hora de tomar as rédeas da situação. Eu pessoalmente supervisionarei o funcionamento de [location.GetName], contarei cada [root_scope.Custom('RegionalFarmAnimal')], cada fortificação, cada espada e cada saco de grãos!\n\nMeu reino será o mais bem administrado de todos – vamos cavalgar!"
