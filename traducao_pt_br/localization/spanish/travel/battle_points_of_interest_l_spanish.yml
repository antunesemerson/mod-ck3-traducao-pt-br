 #Historical Battles
 TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical: "#T $TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical_name$#!\n$TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical_desc$\n\n"
 TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical_name: "[Province.Custom('BattlePoiNameHistorical')]"
 TRAVEL_POINT_OF_INTEREST_TT_poi_battles_historical_desc: "[Province.Custom('BattlePoIDescriptionHistorical')]"
 travel_point_historical_name_visit_message: "[ROOT.Char.GetCurrentLocation.Custom('BattlePoiNameHistorical')]"
 BattlePoIHistoricalNameTours: "A Batalha de Tours"
 BattlePoIHistoricalDescTours: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '131721' ).GetFirstNameNicknamed]\nDerrotado: Abd al-Rahman al-Ghafiqi\nData: 10 de outubro de 732 d.C.#!\n#weak A batalha em que Carlos Martel repeliu a invasão omíada da França, junto aos rios Clain e Vienne. Diz-se que os homens de Carlos permaneceram imóveis como uma muralha, derrubando a cavalaria pesada omíada em sua investida. Depois de localizar e matar o comandante inimigo, seus adversários fugiram do campo de batalha.#!"
 BattlePoIHistoricalNameLechfeld: "A Batalha de Lechfeld"
 BattlePoIHistoricalDescLechfeld: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '1282' ).GetTitledFirstName]\nDerrotado: [GetScriptedCharacterByHistoryID( '460' ).GetFirstName] [GetScriptedCharacterByHistoryID( '460' ).GetDynastyName]\nData: 10 de agosto de 955 d.C.#!\n#weak Uma batalha brutal entre as forças do rei saxão Otto e as forças da Hungria. Após perdas devastadoras dos dois lados, os húngaros fugiram quando estavam prestes a ser cercados e viram o curso da batalha voltar-se contra eles.\n\nDepois que a batalha terminou, muitos comandantes húngaros foram capturados e executados, e a ameaça magiar ? Europa ocidental finalmente chegou ao fim.#!"
 BattlePoIHistoricalNameHastings: "A Batalha de Hastings"
 BattlePoIHistoricalDescHastings: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '140' ).GetFirstName] [GetScriptedCharacterByHistoryID( '140' ).GetDynastyName]\nDerrotado: [GetScriptedCharacterByHistoryID( '122' ).GetFullName]\nData: 14 de outubro de 1066 d.C.#!\n#weak A Batalha de Hastings foi uma das batalhas decisivas na ascensão de Guilherme ao poder na Inglaterra. Forçado a lutar morro acima, o exército normando tinha dificuldade para avançar e chegou a recuar em certo momento, mas Guilherme conseguiu reorganizar um contra-ataque contra as tropas inglesas.\n\nSobrepujado pelas forças inimigas, Harold morreu junto de seus dois irmãos, [GetScriptedCharacterByHistoryID( '132' ).GetFirstNameNoTooltip] e [GetScriptedCharacterByHistoryID( '130' ).GetFirstNameNoTooltip], deixando o trono inglês vazio.#!"
 BattlePoIHistoricalNameStamfordBridge: "A Batalha de Stamford Bridge"
 BattlePoIHistoricalDescStamfordBridge: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '122' ).GetFullName]\nDerrotado: [GetScriptedCharacterByHistoryID( '102531' ).GetNameNicknamed]\nData: 25 de setembro de 1066 d.C.#!\n#weak A Batalha de Stamford Bridge foi um dos combates decisivos entre os três pretendentes ao trono inglês: Guilherme da Normandia, Harald da Noruega e Harold da Inglaterra. Avançando rapidamente para o norte com seus homens, Harold conseguiu surpreender as tropas norueguesas e forçá-las a uma batalha para a qual não estavam preparadas.\n\nHarald foi morto por uma flecha que atravessou sua traqueia, e seu aliado inglês [GetScriptedCharacterByHistoryID( '124' ).GetFirstNameNoTooltip], irmão de Harold, também foi morto. O exército norueguês, sem seus comandantes, foi aniquilado após a batalha.#!"
 BattlePoIHistoricalNameManzikert: "A Batalha de Manzikert"
 BattlePoIHistoricalDescManzikert: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '3040' ).GetFirstName] [GetScriptedCharacterByHistoryID( '3040' ).GetDynastyName]\nDerrotado: [GetScriptedCharacterByHistoryID( '1734' ).GetFullName]\nData: 26 de agosto de 1071 d.C.#!\n#weak Coroado imperador do Império Bizantino em 1068, Romanos liderou uma campanha contra as incursões turcas na Anatélia. Após sucessos limitados, tentou obter uma vitória decisiva em batalha contra Alp Arslan, do Império Seljúcida, perto de Manzikert.\n\nTraído por um de seus comandantes, que recuou com uma grande parte de seu exército, Romanos acabou capturado pelas tropas muçulmanas. Mais tarde, embora libertado por seu inimigo, foi deposto, cegado, exilado e morreu de seus ferimentos.#!"
 BattlePoIHistoricalNameYarmuk: "A Batalha de Yarmuk"
 BattlePoIHistoricalDescYarmuk: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '163015' ).GetFullName]\nDerrotado: [GetScriptedCharacterByHistoryID( '145071' ).GetFullName]\nData: 20 de agosto de 636 d.C.#!\n#weak A Batalha de Yarmuk ? uma das mais importantes da história bizantina. A derrota decisiva levou ? perda da Síria e do Egito e ? grande expansão do império árabe.\n\nDurando 6 dias, a batalha inicialmente se voltou contra os invasores muçulmanos, mas, ao amanhecer do quinto dia sobre Yarmuk, eles mudaram de uma estratégia defensiva para uma ofensiva. No sexto dia, lançaram sua cavalaria em uma carga ousada que quebrou o exército bizantino.\n\nCom a moral despedaçada, os soldados bizantinos caíram em ravinas, afogaram-se ou foram esmagados pelos soldados inimigos enquanto fugiam do campo de batalha.#!"
 BattlePoIHistoricalNameDandanaqan: "A Batalha de Dandanaqan"
 BattlePoIHistoricalDescDandanaqan: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '3036' ).GetFullName]\nDerrotado: [GetScriptedCharacterByHistoryID( '144129' ).GetFullName]\nData: 23 de maio de 1040 d.C.#!\n#weak Uma batalha importante entre o crescente poder seljúcida do norte da Pérsia e o Império Gaznávida. Depois de repelir as forças seljúcidas nos primeiros combates, os gaznávidas começaram a disputar os espólios deixados para três.\n\nDesorganizadas e despreparadas para a batalha, foram surpreendidas pelo retorno das forças seljúcidas. Acossadas, famintas e desmoralizadas, as forças gaznávidas foram esmagadas por seus adversários.#!"
 BattlePoIHistoricalNameAror: "A Batalha de Aror"
 BattlePoIHistoricalDescAror: "#emp Vencedor: Muhammad ibn al-Qasim\nDerrotado: Raja Dahir\nData: 711 d.C.#!\n#weak Uma batalha da invasão omíada da Índia, entre o raj? de Sindh e o Império Omíada.\n\nEmbora seus oponentes fossem originalmente mais numerosos, o comandante omíada conseguiu obter a melhor posição para seu exército antes de iniciar a batalha. Ao longo do conflito, esse desequilíbrio permitiu que as forças muçulmanas assumissem lentamente o controle do curso da batalha e, com a morte do raj? Dahir, sua vitória foi assegurada.#!"
 BattlePoIHistoricalNameSvolder: "A Batalha de Svolder"
 BattlePoIHistoricalDescSvolder: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '101505' ).GetFullName]\nDerrotado: [GetScriptedCharacterByHistoryID( '144004' ).GetFullName]\nData: 9 de setembro de 999 d.C.#!\n#weak Uma batalha entre as forças norueguesas de Olafr Tryggvason de um lado e uma coalizão de forças dinamarquesas e suecas liderada pelo rei Sveinn da Dinamarca do outro.\n\nMesmo em enorme desvantagem numérica, o rei norueguês recusou-se a fugir da coalizão hostil e enfrentou suecos e dinamarqueses em batalha, chamando-os de 'comedores de cavalo' e 'cabras da floresta' enquanto lutava.\n\nNo fim, embora tenha causado um duro golpe ao inimigo, o exército norueguês foi esmagado. Olafr desapareceu na batalha e muito provavelmente morreu.#!"
 BattlePoIHistoricalNameCivitate: "A Batalha de Civitate"
 BattlePoIHistoricalDescCivitate: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '1126' ).GetFullName]\nDerrotado: [GetScriptedCharacterByHistoryID( '1338' ).GetFullName]\nData: 18 de junho de 1053 d.C.#!\n#weak Uma batalha entre os normandos de um lado e uma coalizão liderada pelo papa do outro, incluindo alemães e italianos locais.\n\nApesar de sua vantagem numérica, a coalizão papal não conseguiu romper a infantaria normanda no centro da batalha, e seus flancos de cavalaria perderam o combate contra a cavalaria normanda.\n\nPouco depois da batalha, o próprio papa foi capturado pelos normandos, levando ao fim do conflito.#!"
 BattlePoIHistoricalNameTalas: "A Batalha de Talas"
 BattlePoIHistoricalDescTalas: "#emp Vencedor: Califado Abássida\nDerrotado: Dinastia Tang\nData: 751 d.C.#!\n#weak Um conflito prolongado entre o Califado Abássida, que se expandia para a Transoxiana a partir do sudoeste, e a Dinastia Tang, que avançava para a região a partir do leste.\n\nNo início, a infantaria pesada da dinastia Tang e seus mercenários túrquicos tiveram papel importante ao repelir as forças abássidas, mas, com os mercenários mudando de lado e muitos aliados traindo-os, os Tang foram forçados a recuar.\n\nEsse conflito marcou o fim da expansão Tang para o oeste, deixando a Transoxiana em mãos muçulmanas pelo futuro previsível.#!"
 BattlePoIHistoricalNameSufuku: "A Batalha de Subushi"
 BattlePoIHistoricalDescSufuku: "#emp Vencedor: Os Emishi de Isawa\nDerrotado: [GetScriptedCharacterByHistoryID( 'japanese_iruma_1' ).GetFullName]\nData: 789 d.C.#!\n#weak Uma batalha importante durante a subjugação japonesa dos Emishi.\n\nAs forças japonesas inicialmente se dividiram em duas, avançando pelos dois lados do rio Kitakami atrás dos Emishi em retirada. Escaramuçadores Emishi impediram os japoneses de cruzar o rio, encurralando grande parte deles entre o rio e as montanhas.\n\nO colapso japonós que se seguiu foi uma grande humilhação, com muitos soldados nadando nus pelo rio para escapar da morte. O exército foi dissolvido e [GetScriptedCharacterByHistoryID( 'japanese_yamato_24' ).GetFullName] repreendeu duramente seus comandantes.#!"
 BattlePoIHistoricalNameBaekgang: "Batalha de Baekgang"
 BattlePoIHistoricalDescBaekgang: "#emp Vencedor: Reino de Silla e China Tang\nDerrotado: [GetScriptedCharacterByHistoryID( 'japanese_abe_36' ).GetFullName]\nData: 663 d.C.#!\n#weak Uma batalha naval decisiva em que Tang e Silla enfrentaram as forças do Movimento de Restauração de Baekje e seus aliados japoneses.\n\nA batalha foi travada em grande parte no rio Baengma. Embora as forças japonesas fossem superiores em número, a marinha Tang resistiu e acabou contra-atacando, envolvendo e derrotando a frota japonesa.\n\nA decisiva vitória Silla-Tang obrigou o Japão a se retirar completamente dos assuntos coreanos e esmagou o Movimento de Restauração de Baekje.#!"
 BattlePoIHistoricalNamePalembang: "A Batalha de Palembang"
 BattlePoIHistoricalDescPalembang: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '189038' ).GetFullName]\nDerrotado: [GetScriptedCharacterByHistoryID( 'javanese_sailendra_25' ).GetFullName]\nData: 1025 d.C.#!\n#weak Um ataque repentino das forças Chola contra a capital de Srivijaya em Palembang.\n\nAs forças Chola chegaram pelo mar e rapidamente subjugaram a capital de Srivijaya, saqueando-a e destruindo-a no processo.\n\nA queda de Palembang resultou no colapso total do Império Srivijaya, e a influência Chola sobre a região durou décadas depois disso.#!"
 BattlePoIHistoricalNameAngkor: "Cerco de Angkor"
 BattlePoIHistoricalDescAngkor: "#emp Vencedor: [GetScriptedCharacterByHistoryID( 'cham_panduranga_04' ).GetFullName]\nDerrotado: [GetScriptedCharacterByHistoryID( 'khmer_tribhuvanaditya_01' ).GetFullName]\nData: 1177 d.C.#!\n#weak Um período de conflitos civis e golpes no reino de Kambuja levou Tribhuvanaditya, que não era de sangue real, ao poder. Enquanto lidava com rebeldes reais que apoiavam outros pretendentes, o reino de Champa invadiu Kambuja.\n\nAs forças de Champa avançaram pelo Mekong e pelo Tonle Sap, saquearam a própria capital Angkor e mataram Tribhuvanaditya.\n\nApós o cerco, o reino de Kambuja entrou em colapso, com o saque disperso pela região ou levado para casa pelos Cham.#!"
 BattlePoIHistoricalNameSongping: "Cerco de Songping"
 BattlePoIHistoricalDescSongping: "#emp Vencedor: Yang Sijin\nDerrotado: Cai Xi\nData: 863 d.C.#!\n#weak A agitação no protetorado Tang de Annan levou o reino vizinho de Nanzhao a aliar-se com tribos locais e invadir a região com uma força esmagadora.\n\nO exército de Nanzhao e seus aliados cercaram a cidade por algum tempo antes de finalmente penetrar na cidade interior; os defensores fizeram uma última resistência no portão oriental, emboscando a cavalaria inimiga e matando muitos deles antes de serem derrotados.\n\nEmbora inicialmente recebidas com boas-vindas pela população viet, as forças de Nanzhao saquearam a região, e um contra-ataque Tang em 864 acabou recuperando toda a área.#!"
 BattlePoIHistoricalNameMuye: "Batalha de Muye"
 BattlePoIHistoricalDescMuye: "#emp Vencedor: Rei Wu\nDerrotado: Imperador Zhou da dinastia Shang\nData: 1046 a.C.#!\n#weak A batalha de Muye foi travada entre o rei rebelde Wu e o imperador Zhou da dinastia Shang.\n\nA princípio as forças de Wu estavam em desvantagem numérica, mas as forças de Shang, em sua maioria escravos militares, mostraram-se pouco confiáveis e fugiram do campo de batalha. O resultado final foi uma vitória muito sangrenta para as forças rebeldes sob o comando do rei Wu.\n\nA batalha resultou na queda da dinastia Shang e na reivindicação do Mandato do Céu por Wu, que fundou a nova dinastia Zhou.#!"
 BattlePoIHistoricalNameRedCliffs: "Batalha dos Penhascos Vermelhos"
 BattlePoIHistoricalDescRedCliffs: "#emp Vencedor: Sun Quan\nDerrotado: Cao Cao\nData: 208 d.C.#!\n#weak A Batalha dos Penhascos Vermelhos foi um combate fluvial entre uma coalizão de senhores da guerra e Cao Cao, senhor da guerra do norte, no período final da dinastia Han. Cao Cao tentava estabelecer uma cabeça de ponte pelo rio Yangtz? rumo ao sul da China.\n\nFingindo rendição, as forças aliadas conseguiram atrair os navios de Cao Cao para uma armadilha, incendiando-os e queimando vivos muitos soldados e cavalos. O exército do norte foi então lançado em confusão e derrotado.\n\nA derrota impediu Cao Cao de avançar além do Yangtz? e preparou o cenário para os anos futuros do período dos Três Reinos.#!"
 BattlePoIHistoricalNameGuandu: "Batalha de Guandu"
 BattlePoIHistoricalDescGuandu: "#emp Vencedor: Cao Cao\nDerrotado: Yuan Shao\nData: 200 d.C.#!\n#weak A batalha de Guandu foi travada entre os senhores da guerra Cao Cao e Yuan Shao durante o fim da dinastia Han Oriental; ambos haviam alcançado poder considerável e eram os principais obstáculos um do outro no controle da China.\n\nAs forças de Cao Cao estavam em desvantagem numérica na batalha, mas usaram táticas como uma incursão surpresa contra o depósito de suprimentos de Yuan Shao para enfraquecer o exército adversário.\n\nA batalha foi um ponto de virada do período, com Cao Cao emergindo vitorioso e abrindo caminho para o futuro estado de Cao Wei no período dos Três Reinos.#!"
 BattlePoIHistoricalNameYiling: "Batalha de Yiling"
 BattlePoIHistoricalDescYiling: "#emp Vencedor: Lu Xun - Wu Oriental\nDerrotado: Liu Bei - Shu Han\nData: 221 d.C.#!\n#weak Tentando retomar territórios perdidos na província de Jing, Liu Bei liderou pessoalmente seus exércitos para atacar Wu Oriental, obtendo sucessos iniciais.\n\nDurante a batalha, as forças de Liu Bei foram atraídas para uma armadilha pelo general Lu Xun, que incendiou o acampamento de Shu Han, forçando Liu Bei a recuar. Por fim, Liu Bei conseguiu deixar pessoalmente o campo de batalha ao ordenar que seus homens ateassem fogo às armaduras, criando uma barreira de chamas contra os atacantes.\n\nA batalha foi uma derrota decisiva para Liu Bei e resultou no fim de sua campanha, seguida por sua própria morte.#!"
 BattlePoIHistoricalNameFeiRiver: "Batalha do rio Fei"
 BattlePoIHistoricalDescFeiRiver: "#emp Vencedor: Xie An - Jin\nDerrotado: Fu Jian - Antigo Estado de Qin\nData: 383 d.C.#!\n#weak A batalha foi a culminação de uma campanha mais longa em que o antigo Estado de Qin, após unificar várias tribos estrangeiras, assumiu o controle de partes significativas das terras de Jin. Os exércitos Qin eram numericamente muito superiores aos Jin, que resistiram no rio Fei.\n\nDurante a batalha, as tropas disciplinadas e bem treinadas dos Jin derrotaram as tropas muito mais numerosas, porém desorganizadas e desmotivadas, do antigo Estado de Qin.\n\nA derrota das forças Qin pelos Jin, com baixas mínimas, alterou profundamente o equilíbrio de poder e garantiu que o sul da China permanecesse independente por mais de cem anos.#!"
 BattlePoIHistoricalNameCanheSlope: "Batalha da ladeira de Canhe"
 BattlePoIHistoricalDescCanheSlope: "#emp Vencedor: Touba Gui - Wei do Norte\nDerrotado: Murong Bao - Yan Posterior\nData: 395 d.C.#!\n#weak A batalha resultou de um conflito em que a dinastia Yan Posterior lanãou uma campanha punitiva contra a dinastia Wei do Norte.\n\nQuando as forças Yan chegaram ? encosta de Canhe, foram atingidas por uma tempestade durante a qual seus inimigos as atacaram. O exército Yan foi pego de surpresa e muitos fugiram para o próprio rio Amarelo.\n\nA batalha acabou invertendo a dinâmica de poder da região, com os Wei do Norte tomando a maior parte do território de Yan Posterior.#!"
 BattlePoIHistoricalNameXiangji: "Batalha do Templo de Xiangji"
 BattlePoIHistoricalDescXiangji: "#emp Vencedor: [GetScriptedCharacterByHistoryID( 'han_1528' ).GetFullName]\nDerrotado: [GetScriptedCharacterByHistoryID( 'an_qingxu' ).GetFullName]\nData: 757 d.C.#!\n#weak Esta batalha foi a culminação de um contra-ataque Tang contra as forças rebeldes que haviam tomado o controle da maior parte do norte da China, sendo uma das batalhas mais sangrentas da rebelião de An Lushan. Os dois enormes exércitos se chocaram ao norte de Chang'an, junto ao Templo de Xiangji.\n\nAo meio-dia, o exército Tang havia tomado o terreno elevado, enquanto o exército Yan estava posicionado diante da própria Chang'an. Após várias manobras, a batalha se transformou em um impasse prolongado, com tropas disciplinadas lutando entre si sem ceder, até que a frente Yan finalmente desmoronou devido às baixas extremas sofridas.\n\nA brutalidade da batalha deixou ambos os exércitos dizimados, mas quebrou a espinha dorsal da rebelião. As forças Tang conseguiram retomar Chang'an no dia seguinte.#!"
 BattlePoIHistoricalNameGaoliang: "Batalha do Rio Gaoliang"
 BattlePoIHistoricalDescGaoliang: "#emp Vencedor: [GetScriptedCharacterByHistoryID( '194330' ).GetFullName]\nDerrotado: [GetScriptedCharacterByHistoryID( 'han_4801' ).GetFullName]\nData: 979 d.C.#!\n#weak A batalha se seguiu a uma tentativa dos Song de recuperar as 16 prefeituras que a dinastia Liao havia conquistado em 960, e foi liderada pessoalmente pelo próprio irmão do imperador, o futuro imperador [GetScriptedCharacterByHistoryID( 'han_4801' ).GetFullNameNoTooltip].\n\nA cidade de Youzhou estava sitiada havia três meses quando reforços Liao chegaram para socorrer os defensores. Embora inicialmente vitorioso, o exército Song foi pego de surpresa ? noite por um ataque vindo de três direções.\n\nA batalha terminou com [GetScriptedCharacterByHistoryID( 'han_4801' ).GetFullNameNoTooltip] fugindo do campo em uma carroça puxada por um burro. Essa foi a primeira grande derrota dos Song após sua ascensão ao poder.#!"
