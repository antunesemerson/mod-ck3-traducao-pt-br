 #BOWS
 artifact_longbow: "Arco Longo"
 artifact_longbow_name: "Arco Longo $artifact_name_prefix_owner_culture$"
 artifact_longbow_description: "Um arco longo [SCOPE.Custom('ArtifactQuality')], esculpido em [newly_created_artifact.GetFeatureText( 'longbow_wood' )], utilizando a madeira elástica da madeira jovem e a madeira rígida do cerne, e encordado com [newly_created_artifact.GetFeatureText( 'bow_string' )]. Maior que um homem, poucos arcos podem igualar sua força de tração."
 artifact_composite: "Arco Composto"
 artifact_composite_name: "Arco Composto $artifact_name_prefix$"
 artifact_composite_description: "Um arco composto [SCOPE.Custom('ArtifactQuality')], feito de madeira [newly_created_artifact.GetFeatureText( 'composite_wood' )], reforçado com chifre de [newly_created_artifact.GetFeatureText( 'composite_horn' )] e tendão, e encordado com [newly_created_artifact.GetFeatureText( 'bow_string' )]. Seu tamanho reduzido o torna ideal para atirar a cavalo."
 artifact_bow: "Arco"
 artifact_bow_name: "Arco $artifact_name_prefix$"
 artifact_bow_description: "Um arco [SCOPE.Custom('ArtifactQuality')], feito de madeira [newly_created_artifact.GetFeatureText( 'bow_wood' )], encordado com [newly_created_artifact.GetFeatureText( 'bow_string' )], útil tanto para caça quanto para guerra."
 artifact_crossbow: "Besta"
 artifact_crossbow_name: "Besta $artifact_name_prefix$"
 artifact_crossbow_description: "Uma besta [SCOPE.Custom('ArtifactQuality')], com coronha de [newly_created_artifact.GetFeatureText( 'bow_wood' )] e corda de tendão. Extremamente poderosa e pode ser mantida pronta, mas lenta para recarregar."
 create_artifact_bow_tooltip: "[inspiration_owner.GetShortUIName] produziu [SCOPE.Custom('ArtifactBowType')] de [SCOPE.Custom('ArtifactQuality')] fabricação"
