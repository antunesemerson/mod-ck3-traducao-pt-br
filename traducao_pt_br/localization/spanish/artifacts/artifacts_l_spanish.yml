 ## fund_inspiration.6001-6006 trinkets from your adventurer
 morin_khuur_ornament_name: "Ornamento de Cavalo Morin Khuur"
 morin_khuur_ornament_description: "Uma cabeça de cavalo entalhada em osso de cavalo, normalmente uma decoração no topo de um violino morin juur. [inspiration_owner.GetTitledFirstNameNoTooltip|l] enviou-o para [owner.GetTitledFirstNameNoTooltip|l] durante suas aventuras."
 animal_ring_name: "Anel de Tigre Chamativo"
 animal_ring_description: "Com joias incrustadas e em cores demais, com ele você tem mais chance de cegar seus cortesãos do que impressioná-los com seu senso de moda. [inspiration_owner.GetTitledFirstNameNoTooltip|l] o enviou para [owner.GetTitledFirstNameNoTooltip|l] durante suas aventuras."
 ostrich_shell_necklace_name: "Colar de Miçangas de Casca de Avestruz"
 ostrich_shell_necklace_description: "Uma delicada joia de um branco brilhante. [inspiration_owner.GetTitledFirstNameNoTooltip|l] enviou-a a [owner.GetTitledFirstNameNoTooltip|l] durante suas aventuras."
 pilgrimage_figurine_name: "Figura de Vardan Mamikonian em Osso de Choco"
 pilgrimage_figurine_description: "Uma figura de Vardan Mamikonian, um general armênio que garantiu aos armênios o direito de praticar o cristianismo na Batalha de Avarayr em 451. Seu capacete é repleto de detalhes em bronze. [inspiration_owner.GetTitledFirstNameNoTooltip|l] enviou-o para [owner.GetTitledFirstNameNoTooltip|l] durante suas aventuras."
 saint_margaret_fingernails_name: "Unhas de Santa Margarida"
 saint_margaret_fingernails_description: "Santa Margarida de Antioquia ficou famosa por matar um dragão usando apenas os saltos de seus sapatos. [inspiration_owner.GetTitledFirstNameNoTooltip|l] enviou-as para [owner.GetTitledFirstNameNoTooltip|l] durante suas aventuras."
 seahorse_brooch_name: "Broche de Cavalo-Marinho Dourado"
 seahorse_brooch_description: "Um broche com um cavalo alado e com cauda de nadadeira, terminado em delicadas borlas encadeadas. [inspiration_owner.GetTitledFirstNameNoTooltip|l] enviou-o a [owner.GetTitledFirstNameNoTooltip|l] no transcurso de suas aventuras."
 #fund_inspiration.6500- trinkets from your adventurer
 leopard_hat_name: "Chapéu de Leopardo"
 leopard_hat_description: "Um chapéu feito a partir da cabeça de um leopardo, abatido por [inspiration_owner.GetTitledFirstName|l]."
 kurgan_ornament_name: "Figurinha de Pantera Escita"
 kurgan_ornament_description: "Uma figurinha de pedra saqueada por [inspiration_owner.GetTitledFirstName|l] de um antigo túmulo funerário de kurgan cita."
 kurgan_saddle_name: "Sela de Kurgan"
 kurgan_saddle_description: "Uma sela roubada por [inspiration_owner.GetTitledFirstName|l] de um túmulo funerário cita. Com mais de mil anos de antiguidade, foi preservada no ar aprisionado da tumba, entre os corpos embalsamados de dezenas de cavalos. Talvez, desta sela de montar, possamos aprender algo com os costumes dos antigos guerreiros."
 naked_tapestry_name: "Tapeçaria Nua"
 naked_tapestry_description: "Uma representação de [inspiration_owner.GetTitledFirstName|l] nu em um oásis de praia, abanando-se com uma folha e reluzindo com gotículas cristalinas."
 frogspawn_jar_name: "Jarra de Ovos de Sapo"
 frogspawn_jar_description: "Um frasco cheio de ovas chacoalhantes e alguns girinos já nascidos. Enviado a [ROOT.Char.GetTitledFirstNameNoTooltip|l] por [inspiration_owner.GetTitledFirstName|l] para mostrar os horrores da intempérie.\n\nRemexa-se!"
 beaver_book_name: "Palácios dos Castores"
 beaver_book_description: "Um livro sobre a arquitetura e técnicas de construção dos castores, escrito com esboços por [inspiration_owner.GetTitledFirstName|l] durante suas viagens."
 crocodile_tapestry_name: "Tapeçaria de Crocodilo"
 crocodile_tapestry_description: "Uma tapeçaria de um crocodilo feita por [inspiration_owner.GetTitledFirstName|l] o melhor que pôde. A criatura é de vermelho brilhante, tem várias fileiras de presas, pústulas venenosas e uma cauda com espinhos. Está cercada por um ninho de ovos em uma caverna atrás de uma cachoeira."
 mountain_rock_name: "Rocha de Montanha"
 mountain_rock_description: "Uma grande rocha, arrastada laboriosamente por [inspiration_owner.GetTitledFirstName|l] de volta desde [mountain_location.GetName]."
 #Game start additional unique artifacts
 reichskrone_name: "Reichskrone"
 reichskrone_description: "Este é o emblema do cargo do Imperador Sagrado Romano. Garantido para chamar a atenção de todos os duques que passam."
 nikephoros_crown_name: "Coroa de Nikephoros II Phokas"
 nikephoros_crown_description: "Esta é a coroa de um dos melhores estrategistas da linha imperial que já existiu. Falhou em guerras a oeste do Império, mas foi conquistador a leste."
 skull_cap_charlemagne_name: "Barrete de Charlemagne"
 skull_cap_charlemagne_description: "A própria cabeça de Charlemagne é mantida dentro desta caixa. Talvez sua sabedoria desça sobre o proprietário."
 papal_tiara_name: "Tiara Papal"
 papal_tiara_description: "Este é o mitra adornado com uma coroa de ouro que simboliza o cargo papal. Mas não ficaria mais resplandecente sobre a sua cabeça?"
 essen_crown_name: "Kinderkrone"
 essen_crown_description: "Alguns dizem que esta coroa foi criada para a coroação de Otão III em Essen, outros que se destinava a coroar uma estátua da Virgem. De qualquer forma, é muito pequena, mas talvez você consiga encaixá-la na cabeça se tentar."
 monomachus_crown_name: "Coroa de Monomachus"
 monomachus_crown_description: "Esta é uma coroa composta por retratos em painéis de ouro que retratam Constantino IX Monomachus, sua esposa Zoe, a irmã Teodora e algumas figuras alegóricas dançantes."
 edmund_head_name: "Cabeça de São Edmund"
 edmund_head_description: "Edmund exigiu que se tornasse um santo desde o momento de seu nascimento. As lendas contam que ele foi um rei de East Anglia que se ofereceu como sacrifício aos vikings em vez de deixar seu povo ser massacrado por eles."
 dhammapada_name: "Dhammapada"
 dhammapada_description: "Esta é uma coleção de ditos do Buda, encadernada em um fino manuscrito de folhas de palmeira."
 excalibur_name: "'Excalibur'"
 excalibur_description: "Não há governante na Grã-Bretanha que não reivindique a verdadeira Excalibur. Guerras são pagas vendendo Excaliburs, e você deve esperar que seus convidados não peguem outro exibindo a espada."
 vinaya_pitaka_name: "Vinaya Pitaka"
 vinaya_pitaka_description: "Um texto budista dos três trabalhos do Cânone Pali. Este texto é instrucional nas convenções de conduta monástica para monges e monjas."
 sutta_pitaka_name: "Sutta Pitaka"
 sutta_pitaka_description: "Um texto budista Theravada baseado no primeiro conselho budista realizado após a morte de Buda. Inclui muitos poemas e sermões atribuídos a Buda e seus discípulos. Parte do Cânone Pali."
 abhidhamma_pitaka_name: "Pitaka Abhidhamma"
 abhidhamma_pitaka_description: "Uma obra detalhada de estudos analisando os ensinamentos de Buda. Parte do Cânone Pali."
