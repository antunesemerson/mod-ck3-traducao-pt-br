 witchcraft_book_description: "Um livro que um dia pertenceu [witch_scope.Custom('ES_AlAla')] brux[witch_scope.Custom('ES_OA')] de [ROOT.Char.GetCurrentLocation.GetTitle.GetNameNoTier]. Suas páginas estão cheias de remédios simples de ervas para equilibrar os humores."
 witchy_holy_text_mid: "[witch_scope.GetFaith.ReligiousText|U] Embelezado"
 witchy_holy_text_mid_description: "[witch_scope.GetFaith.ReligiousText] decorado com pedras preciosas."
 immaculate_witchy_bones: "Ossos imaculados de brux[witch_scope.Custom('ES_OA')]"
 immaculate_witchy_bones_description: "Um monte de ossos que outrora pertenceram à [witch_scope.Custom('ES_DelDela')] brux[witch_scope.Custom('ES_OA')] de [ROOT.Char.GetCurrentLocation.GetTitle.GetNameNoTier]. Mesmo após sua queima, os ossos permanecem impecáveis."
 mysterious_lamp: "Lâmpada Misteriosa"
 mysterious_lamp_description: "Uma lâmpada dourada brilhante, encrustada com joias. Você sente uma sensação de poder cósmico fenomenal quando a segura."
 mysterious_puzzle: "Quebra-cabeça Misterioso"
 mysterious_puzzle_description: "Um extravagante quebra-cabeça dourado coberto de gravuras em uma língua estrangeira. Dizem que já pertenceu a um mestre do jogo poderoso."
 lunchbox: "Caixa Conservante"
 lunchbox_description: "Uma caixa hermeticamente fechada que parece prolongar o tempo de consumo dos alimentos colocados dentro dela."
