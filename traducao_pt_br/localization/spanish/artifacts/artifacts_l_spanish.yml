 #Additional Historical Artifacts
 artifact_pedestal_koh_i_noor_name: "Montanha de Luz"
 artifact_pedestal_koh_i_noor_description: "Este é um diamante de tamanho e claridade incomparáveis. Diz-se que foi escavado nas minas do sudeste da Índia, mas sua verdadeira origem é provavelmente desconhecida."
 artifact_jewelled_danda_name: "Cajado com Joias"
 artifact_jewelled_danda_description: "Este é um cajado adornado com jóias da Índia, o sinal supremo da autoridade real e da habilidade de um monarca em impor punições aos seus súditos."
 artifact_aruval_name: "Aruval Antigo"
 artifact_aruval_description: "Este longo Aruval é dito ser tão antigo que é possível que Karuppu Sami o tenha empunhado uma vez."
 artifact_khanda_name: "Khanda Cerimonial"
 artifact_khanda_description: "Este Khanda foi feito para cerimônia em vez de combate, e por gerações tem sido um lembrete da necessidade de cortar o véu da ignorância."
 artifact_makarakundala_name: "Makarakundala"
 artifact_makarakundala_description: "Estes são brincos como os usados pelos deuses, alguns até afirmam que este par em particular pertenceu a seres divinos."
 artifact_cintamani_name: "Pedra Cintamani"
 artifact_cintamani_hindu_description: "Esta é uma pedra que dizem ter caído do céu. Alguns afirmam que ela já pertenceu a Vishnu ou ao rei Naga, e que também traz prosperidade ao seu dono."
 artifact_cintamani_buddhist_description: "Esta é uma pedra que dizem ter caído do céu. Alguns afirmam que já foi segurada pelos Bodhisattvas Avalokiteshvara e Ksitigarbha, e que também realiza os desejos daqueles que a possuem."
 artifact_navaratna_name: "Navaratna"
 artifact_navaratna_description: "Uma cadeia de nove gemas, com um grande rubi no meio, simbolizando os nove deuses celestiais do hinduísmo."
 artifact_shankha_conch_name: "Concha Shankha"
 artifact_shankha_conch_description: "O emblema do Deus Vishnu, esta antiga Concha Shankha é usada como uma trombeta em cerimônias religiosas e diz-se que é um símbolo de prosperidade e virtude."
 artifact_pedestal_great_diamond_name: "Grande Diamante"
 artifact_pedestal_great_diamond_description: "Esta enorme gema diz-se que já adornou uma estátua do templo, antes de ser roubada por um intruso ganancioso."
 al_taj_crown_name: "al-Taj al-Sharif"
 al_taj_crown_description: "A 'Coroa Honrosa' ou 'Envoltório de Veneração' é a coroa processional tradicional dos califas fatímidas. É adornada pela enorme jóia 'al-Yatima'."
 qadib_al_mulk_name: "Qadib al-Mulk"
 qadib_al_mulk_description: "O bastão processional do Califado Fatímida, coberto de ouro e adornado com pérolas e joias."
 ryukyu_shaku_name: "Shaku das Três Montanhas"
 ryukyu_shaku_description: "Um bastão cerimonial laqueado esculpido em cedro da ilha sagrada, simbolizando a unificação dos clãs sob um único mandato divino."
 ryukyu_crown_name: "Coroa do Dragão"
 ryukyu_crown_description: "Uma joia incrustada de coral, coroada por um dragão marinho dourado que segura uma pérola de sabedoria. Seu brilho ecoa sobre as ondas, um farol de poder e prosperidade."
 al_sayf_al_khass_name: "al-Sayf al-Khass"
 al_sayf_al_khass_description: "Esta espada cravejada de joias diz-se ter sido feita de um raio. Ela é guardada em uma capa dourada inscrita, da qual raramente saiu devido ao seu significado cerimonial no califado."
 al_dawat_name: "al-Dawat"
 al_dawat_description: "Esta é uma tinteiro feito de ouro e coral. Por muito tempo, desempenhou um papel especial nas cerimônias do Califado."
 al_hafir_name: "al-Hafir"
 al_hafir_description: "Este rubi vermelho, conhecido como al-Hafir ou 'o casco', é de uma qualidade raramente vista neste mundo. Ele é costurado em um pedaço de seda com hastes de esmeralda formando um círculo ao seu redor. Tradicionalmente, ele adornava o rosto do cavalo do califa."
 artifact_wall_banner_thankfulness_name: "Bandeira da Gratidão"
 artifact_wall_banner_thankfulness_description: "Esta bandeira de seda branca é inscrita com letras douradas e envolta em uma lança dourada. Tradicionalmente, esta bandeira e sua irmã têm sido carregadas em procissões Caliphal."
 artifact_arms_of_alex_name: "Armadura de Alexandre"
 artifact_arms_of_alex_description: "Dizem que este antigo conjunto de armadura de linho laminado pertenceu a Alexandre, o Grande. Embora já não seja adequada para uso, a armadura em si carrega o legado do grande conquistador, conhecido do Mediterrâneo aos confins da Índia."
 artifact_pedestal_al_jabal_name: "al-Jabal"
 artifact_pedestal_al_jabal_description: "Este é um anel adornado com um grande rubi conhecido como al-Jabal, ou 'a Montanha'. A pedra é de tamanho incomparável e diz-se que o próprio anel já foi usado pelos imperadores sassânidas da Pérsia."
 artifact_pedestal_al_yatima_name: "al-Yatima"
 artifact_pedestal_al_yatima_description: "Conhecida como al-Yatima ('a Órfã'), esta enorme pérola é dita ser diferente de qualquer outra neste mundo. Órfã entre as famílias de pedras preciosas e pérolas."
 artifact_dagger_of_rostam_name: "Adaga de Rostam"
 artifact_dagger_of_rostam_description: "Esta adaga intricada é afirmada ser a que Rostam usou para matar o Daeva branco."
 artifact_spear_of_ascalon_name: "Ascalon"
 artifact_spear_of_ascalon_description: "Esta velha lança quebrada é dita ser um pedaço da lança com a qual São Jorge matou o dragão de Beirute."
 artifact_zomorrodnegar_name: "Shamshir-e Zomorrodnegar"
 artifact_zomorrodnegar_description: "Esta espada cravejada de esmeraldas é dita ser a lâmina mítica de Salomão, usada para matar o demônio Fulad-zereh."
 artifact_muhammads_epistles_name: "Carta de Muhammad"
 artifact_muhammads_epistles_description: "Esta carta faz parte da correspondência entre o profeta Maomé e os governantes de [newly_created_artifact.Custom('EpistleReciever')]."
 epistle_syria: "Síria"
 epistle_arabia: "as tribos árabes"
 epistle_persia: "a Pérsia"
 epistle_byzantium: "o Império Romano Oriental"
 epistle_bahrain: "Bahrain"
 artifact_kaves_apron_name: "Avental de Kave"
 artifact_kaves_apron_description: "Diz-se que esta bandeira rasgada é o lendário estandarte que o ferreiro persa Kave fez de seu avental para unir seu povo contra seu malvado senhor."
 artifact_joyeuse_name: "Joyeuse"
 artifact_joyeuse_description: "A Espada de Carlos Magno, forjada para conter a Lança de Longinus. Joyeuse é um símbolo tanto do valor cavaleiresco quanto do legado real do império de Carlos Magno."
 artifact_durendal_name: "Durendal"
 artifact_durendal_description: "Esta espada curta e pesada é dita ser a lendária Durendal, escondida por Roland como seu último ato, em uma tentativa de negá-la aos inimigos da coroa."
 artifact_curtana_name: "Curtana"
 artifact_curtana_description: "Diz-se que esta é a Curtana, a espada da Misericórdia. A lendária espada foi uma vez empunhada por Tristan contra Morholt. Isso também pode ser o motivo pelo qual a ponta da espada está faltando, um pedaço perdido no crânio espesso do gigante irlandês."
 artifact_ring_angelica_name: "Anel de Angelica"
 artifact_ring_angelica_description: "Diz-se que este é o próprio anel usado por Angelica, conhecida nas histórias de Roland e Carlos Magno. Seus poderes devem ter acabado, já que não parece mais conceder invisibilidade, mas ainda é um magnífico símbolo desta princesa há muito tempo desaparecida."
 artifact_olifant_name: "Olifant"
 artifact_olifant_description: "Um grande chifre de marfim, coberto por entalhes intrincados. Alguns afirmam que é o próprio chifre usado por Roland para convocar ajuda antes de morrer na batalha de Roncevaux."
 artifact_colada_name: "Colada"
 artifact_colada_description: "Rumor diz que uma das espadas de El Cid é esta lâmina, uma inspiração para qualquer pessoa que aspire às suas virtudes cavalheirescas."
 artifact_aram_name: "Aram"
 artifact_aram_description: "Esta antiga lança escurecida já viu gerações passarem. É tão antiga que muitos acreditam que seja a lendária lança Aram, conhecida pelas histórias de Jangar."
 artifact_ikenga_name: "Ikenga"
 artifact_ikenga_description: "Esta pequena estátua com chifres é alegadamente capaz de conceder sucesso e vitória ao seu dono."
 artifact_mmaagha_kamalu_name: "Mmaagha Kamalu"
 artifact_mmaagha_kamalu_description: "Esta é uma espada cerimonial muito antiga e ornamentada. Diz-se que já pertenceu a Kamalu, o deus igbo da guerra."
 artifact_bronze_head_name: "Cabeça de Bronze"
 artifact_bronze_head_description: "Esta cabeça de bronze naturalista captura com grande detalhe as características de um antigo governante já falecido, parecendo mais uma escultura do que algo fundido em metal. A cabeça é adornada com uma coroa que mostra o status do monarca retratado."
 artifact_crystal_carving_name: "Escultura de Cristal"
 artifact_crystal_carving_description: "Este pedaço retangular de cristal de rocha transparente é quase perfeitamente transparente, e a maior parte de sua superfície é coberta por esculturas intricadas. É um objeto de grande beleza, mas de utilidade pouco clara."
 artifact_ibeji_name: "Ibeji"
 artifact_ibeji_description: "Esta é uma pequena escultura de madeira que representa um gêmeo falecido, acreditando-se que traga riqueza e fortuna se cuidado pela sua família. É adornado com um elaborado e bastante alto penteado."
 artifact_kantele_name: "Kantele Antiga"
 artifact_kantele_description: "Este instrumento de cordas de madeira tem sido passado de geração em geração. Rumores afirmam que ele pode até datar dos dias de Väinämöinen."
 artifact_sledovik_name: "Sledovik"
 artifact_sledovik_description: "Esta grande pedra está coberta de pegadas que penetraram na própria rocha. Por muitos anos tem servido como um altar, e as pegadas são acreditadas terem sido deixadas por homens santos locais."
 artifact_nagelring_name: "Anel Nagel"
 artifact_nagelring_description: "De acordo com a tradição, esta espada envelhecida está ligada ao lendário e bastante popular Dietrich von Bern. Essa conexão elevou o item a uma fama de outra forma injustificada."
 artifact_kladenets_name: "Kladenets"
 artifact_kladenets_description: "Embora tenha visto dias melhores, dizem que esta antiga espada de aço é a mítica Kladenets, uma espada capaz de se mover sozinha. Em sua condição atual, está longe de ser fácil manuseá-la, mas sua mera presença impõe respeito aos que acreditam em sua origem sobrenatural."
 artifact_legbiter_name: "Mordedor de Pernas"
 artifact_legbiter_description: "Uma espada extremamente afiada com cabo de marfim. A arma dizem ter pertencido ao grande rei Magnus Olafsson da Noruega."
 artifact_quernbiter_name: "Quebrapedra"
 artifact_quernbiter_description: "Esta espada foi empunhada pelo próprio rei Haakon da Noruega, e naquela época diziam que era tão afiada que poderia cortar pedras de moinho."
 artifact_dragvandil_name: "Dragvandil"
 artifact_dragvandil_description: "Uma espada que dizem ter pertencido a Egill Skallagrimsson, fazendeiro, poeta e guerreiro, conhecido pela Saga de Egill."
 artifact_szczerbiec_name: "Szczerbiec"
 artifact_szczerbiec_description: "Dizem que foi entregue ao rei Boleslaw, o Bravo, por um anjo, esta espada é reivindicada como a que foi usada para golpear o Portão de Ouro de Kiev. Ela carrega um imenso significado simbólico."
 artifact_chinese_caligraphy_name: "Caligrafia Chinesa"
 artifact_chinese_caligraphy_description: "Este delicado pedaço de papel está coberto de símbolos estranhos, porém belos e muito precisos. Dizem que veio das terras da China, no extremo oriente."
 artifact_ruyi_name: "Ruyi"
 artifact_ruyi_description: "Este é um pequeno cetro de jade, coberto por símbolos e enfeites chineses."
 turquoise_throne_name: "Trono de Turquesa"
 turquoise_throne_description: "Este trono real cravejado de joias foi feito à imagem do lendário trono dos reis persas do Shahnama. Sua estrutura de ébano é adornada com uma quantidade incalculável de turquesas, bem como placas de ouro puro esmaltadas em um tom de turquesa. Sua beleza de tirar o fôlego só poderia ser obtida pelos maiores artesãos em seus campos."
 peacock_throne_name: "Trono de Pavão"
 peacock_throne_description: "Este trono extravagante tem como objetivo recriar o assento real de Jamsheed. Dizem que artesãos de todo o mundo se reuniram para montar ouro, prata e centenas de pedras preciosas no trono que agora está diante de você."
 artifact_banner_islam_name: "Bandeira Sagrada de Maomé"
 artifact_banner_islam_description: "Dizem que esta é a Bandeira Sagrada de Maomé, uma relíquia dos dias do profeta e um símbolo de toda a fé muçulmana."
 artifact_spear_of_the_prophet_name: "Lança do Profeta"
 artifact_spear_of_the_prophet_description: "Segundo relatos, a Lança de Maomé foi trazida como presente pelo governante da Abissínia a al-Zubayr bin al-Awwam."
 artifact_mantle_of_the_prophet_islam_name: "Manto do Profeta"
 artifact_mantle_of_the_prophet_description: "Herdado por séculos de um Califa para o próximo, este é o manto do Profeta. É tradicionalmente usado pelo Califa durante todos os feriados festivos, dando-lhe uma aura de tranquilidade e dignidade inabaláveis."
 afarganyu_name: "Afarganyu"
 artifact_afarganyu_description: "Este grande vaso é onde o fogo sagrado, central para muitas das cerimônias da fé zoroástrica, é aceso. Uma inscrição antiga fala sobre a pessoa que originalmente o doou para o sacerdócio."
 siddhachakra_name: "Siddhachakra"
 artifact_siddhachakra_description: "Este é um diagrama místico usado para adoração pelos jainistas. Em seu centro, um lótus florescido é cercado por deidades em pétalas, simbolizando a lenda do rei Shripala e sua esposa Mayanasundari."
 artifact_staff_kakusandha: "Bastão de Kakusandha"
 artifact_staff_kakusandha_desc: "Kakusandha, o primeiro Buda do atual Kalpa, possuía este bastão para afastar animais perigosos e assustar os menores, para que não fossem pisados por monges errantes."
 water_filter_konagamana: "Filtro de água de Koṇāgamana"
 water_filter_konagamana_desc: "Koṇāgamana, o segundo Buda do atual Kalpa, carregava este filtro de água em suas jornadas. Esta simples peça de pano servia a um duplo propósito, como meio de fornecer água potável e também para garantir que quaisquer insetos fossem filtrados com segurança e compaixão."
 robe_kassapa: "Parte do Manto de Kassapa"
 robe_kassapa_desc: "Kassapa, o terceiro Buda do presente Kalpa, usou esta roupa durante grande parte de sua vida cotidiana. Um tecido curiosamente grosseiro, que ocupa um lugar especial de reverência como um dos únicos itens conhecidos da vestimenta de um Buda que sobrevive."
 ##Trinket Generation
 #Bad/Trash
 gilded_rats_tail: "Rabo de Rato Dourado"
 gilded_rats_tail.desc: "A joia do pobre."
 quail_eggshell_gem: "Gema de Casca de Ovo de Codorna"
 quail_eggshell_gem.desc: "Um pedaço colorido de casca de ovo que passa por uma gema."
 stained_glass_shard: "Fragmento de Vidro Manchado 'Santificado'"
 stained_glass_shard.desc: "Parece manchado com uma curiosa cor sanguínea..."
 xylospongium: "Esponja em um Pau"
 xylospongium.desc: "A origem e o propósito são desconhecidos — mas emite um odor fraco e desagradável."
 #Common
 st_davids_morsel: "Pedaço de São Davi"
 st_davids_morsel.desc: "Parece ser um pedaço de carne seca. A idade e a origem são desconhecidas."
 platypus_figurine: "Figurinha de Animal"
 platypus_figurine.desc: "Este pequeno animal parece ter um bico largo, um casaco de pele brilhante e barbatanas. Que peculiar."
 terracotta_toy_fowl: "Galinha de Brinquedo de Terracota"
 terracotta_toy_fowl.desc: "A superfície desgastada conta a história de um brinquedo uma vez amado."
 #This one uses a scope local to the stewardship_general.2001-event
 stewardship_general.2001.artifact.potsherd_holy: "Fragmento de Cerâmica"
 stewardship_general.2001.artifact.potsherd_holy.desc: "Um fragmento de cerâmica antigo. Segundo relatos, ele tem origem no local sagrado de [trinket_holy_site.GetNameNoTierNoTooltip]."
 small_bell_beaker: "Pequeno Copo de Sino"
 small_bell_beaker.desc: "Um copo de sino com um padrão intricado."
 serpentine_budai: "Budai Serpente"
 serpentine_budai.desc: "A pequena gestalt de um homem careca, gordo e risonho."
 #Uncommon
 mythical_creature_horn: "Chifre de [ROOT.Char.Custom('HornedMythicalCreature')]"
 mythical_creature_horn.desc: "Um pedaço de chifre de formato questionável, supostamente proveniente do mitológico [ROOT.Char.Custom('HornedMythicalCreature')]."
 mythical_creature_figurine: "Figura [ROOT.Char.Custom('RegionalMythicalCreature')] [ROOT.Char.Custom('TrinketLookAdjective')]"
 mythical_creature_figurine.desc: "Esta estatueta representando o [new_trinket.Custom('ArtifactAnimalAdjective')] [SCOPE.Custom('RegionalMythicalCreatureLower')] parece ser [ROOT.Char.Custom('TrinketLookAdverbFollowup')] [ROOT.Char.Custom('TrinketLookAdjective')] com pequenas e brilhantes pedras preciosas nativas de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]."
 st_davids_taper: "Vela de St. David"
 st_davids_taper.desc: "Parece que alguém tentou queimar as duas extremidades."
 jira_stick: "Cetro de Mármore de J'Ira"
 jira_stick.desc: "Embora tenha sido muito usado, a extremidade pontiaguda ainda é poderosa."
 lucky_coin: "Moeda da Sorte [ROOT.Char.GetCurrentLocation.GetCulture.GetNameNoTooltip]"
 lucky_coin.desc: "Uma moeda [ROOT.Char.GetCurrentLocation.GetCulture.GetNameNoTooltip], nativa de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip].\n\nA superfície outrora gravada agora está lisa devido ao manuseio e rotação constantes."
 lavender_jade_pendant: "Pingente de Jade Lavanda"
 lavender_jade_pendant.desc: "As ricas estrias roxas são impressionantes."
 #Rare
 sekhmet_ring: "Anel de Selo Antigo"
 sekhmet_ring.desc: "O anel de ouro é gravado com a imagem de um ser humano posando com algum tipo de capacete peculiar."
 scarab_brooch: "Broche Antigo de Escaravelho"
 scarab_brooch.desc: "Um delicado broche em forma de escaravelho. Dizem que a incrustação de esmeralda tem efeitos benéficos para a saúde."
 #Easter eggs
 easteregg_artifact_elisabeth_plush: "Raposa de pelúcia de Elisabeth"
 easteregg_artifact_elisabeth_plush_description: "A raposa de pelúcia de Elisabeth é um brinquedo muito querido e esteve com ela por grande parte de sua vida. Elisabeth frequentemente falava com ele enquanto tecia intrincados cifras para quem pudesse empregar seus serviços. É reconfortante e inspira seu portador a imitar a astúcia da raposa."
 easteregg_artifact_nicks_redolence: "A Última Fragrância"
 easteregg_artifact_nicks_redolence_description: "Um pequeno frasco com uma medida de fragrância de cor — [ROOT.Char.Custom('GetComplexColor')] —, certamente capaz de fazer lordes e damas desmaiarem em sua presença. Uma pequena inscrição em sua rolha diz #EMP \"E agora, o fim está próximo...\"#!"
 easteregg_artifact_chad_book: "A Eneida Anotada"
 easteregg_artifact_chad_book_description: "Uma cópia bem amada e iluminada da Eneida de Virgílio, nublada por muitos rabiscos - alguns insanos, outros perspicazes."
 easteregg_artifact_chad_dagger: "A Adaga"
 easteregg_artifact_chad_dagger_description: "Seu brilho está opaco pelas manchas de sangue seco, mas ela ainda anseia por mais."
 easteregg_artifact_veronica_book: "Os Anéis do Senhor"
 easteregg_artifact_veronica_book_description: "Uma referência sutil, em forma de livro. Escrito no melhor português."
 easteregg_artifact_map_lohmander: "Antigo Itinerário"
 easteregg_artifact_map_lohmander_description: "Este pequeno livro encadernado em couro contém os contos de um escriba escandinavo e sua jornada do oeste até a Índia. Ele detalha perigos, rotas e o equipamento necessário, desde onde encontrar água até onde será preciso o tipo certo de botas, e assim por diante. Também possui uma grande quantidade de informações sobre tipos locais de comida e danças.\n\nDentro, há também diversos mapas dobrados, representando o subcontinente e muitos outros lugares, com anotações sobre locais distantes e seus nomes em épocas passadas."
 easteregg_artifact_jason_sword: "Espada de São Martinho"
 easteregg_artifact_jason_sword_description: "Ao longo da nervura da lâmina, alguém raspou desajeitadamente as palavras \"Eu sou o que é.\""
 child_toy_template_tt: "É necessário ser uma [child|lE] para equipar como um [inventory_artifact|lE]"
