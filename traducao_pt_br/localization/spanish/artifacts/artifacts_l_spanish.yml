 artifact_pas_darmes_spurs_description: "Um par de esporas [SCOPE.Custom('ArtifactQuality')] de [newly_created_artifact.GetFeatureText( 'generic_material_metal' )] pertencentes a [owner.GetFullName], entregues a [winner.GetFullName] em um pas d'armes em [location.GetName]."
 artifact_tournament_favor: "Favor do Torneio"
