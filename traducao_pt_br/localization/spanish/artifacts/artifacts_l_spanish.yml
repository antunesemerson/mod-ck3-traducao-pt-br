 #FP3 artifacts
 artifact_oxus_bracelet_name: "Pulseira de Oxus"
 artifact_oxus_bracelet_description: "Esta pulseira de maravilhosa artesanato é dito ser originária da terra de $k_transoxiana$. Embora sua incrustação de esmalte e pedras semipreciosas esteja perdida há muito tempo, o ouro mantém seu brilho. Pulseiras como esta eram presentes de honra nas cortes do Rei dos Reis na antiguidade, então talvez tenha sido usada por um grande lorde na Babilônia."
 fp3_incense_burner_sculpture: "Escultura de Queimador de Incenso"
 fp3_incense_burner_sculpture_desc: "Este queimador de incenso em forma de felino emite fumaça perfumada pelos muitos buracos em seu corpo. A cabeça com olhos engastados em gemas tem uma dobradiça para que se possa colocar incenso aceso dentro."
 fp3_ancient_drinking_vessel: "Vaso de Bebida Acaemênida"
 fp3_ancient_drinking_vessel_desc: "Este copo ornamentado termina em forma de um bode. Foi feito em tempos esquecidos, mas sua beleza não desbotou."
 artifact_sassanian_sword_name: "Espada Sassânida"
 artifact_sassanian_sword_description: "Diz-se ser um vestígio da antiga era Sassânida, esta espada $sassanian_sword_description_base$, tornando-a uma visão magnífica de se ver. Embora hoje em dia seja muito frágil para ser levada à batalha, talvez esta espada tenha sido empunhada por um herói agora perdido no tempo?"
 artifact_sassanian_replica_sword_name: "Espada Estilo Sassânida"
 sassanian_sword_description_base: "é adornada com várias gemas e apresenta padrões intricados"
 famed_replica_sassanian_sword_description: "Esta espada é inspirada na visão de uma gloriosa era passada, remontando ao passado heroico dos ancestrais do fabricante. Ela $sassanian_sword_description_base$, tornando-a uma visão magnífica. Ao empunhá-la, projeta-se a imagem dos lendários reis do passado."
 masterwork_replica_sassanian_sword_description: "Esta espada claramente pretende imitar as armas de uma era mais antiga, remontando ao passado heroico dos ancestrais do fabricante. Ela $sassanian_sword_description_base$. Embora seja um eco distante do passado, quem a empunha pode se imaginar como um poderoso senhor de uma era passada."
 common_replica_sassanian_sword_description: "Esta pobre imitação faz pouco caso da ancestralidade do fabricante. Está incrustada com pedras baratas e decorada com padrões irregulares e ásperos. Transportar isso em sua bainha, faz alguém parecer um tolo iludido, desejoso de retornar a um tempo que já passou."
 #CE1 Artifacts
 artifact_magnificent_crown_name: "Coroa Magnífica"
 artifact_magnificent_crown_description: "O belo filigrana desta coroa e os padrões finamente trabalhados servem para destacar a verdadeira razão de sua existência: os relevos gravados dos ancestrais d [ROOT.Char.GetFirstName] invocam sua autoridade e a entrelaçam com a sua própria."
 artifact_splendid_necklace_name: "Colar Esplêndido"
 artifact_splendid_necklace_description: "Este fino colar está envolto no brasão de armas da [artifact.GetOwner.GetHouse.GetBaseName], não deixando dúvidas quanto à legitimidade do portador."
 artifact_fine_brooch_name: "Broche Fino"
 artifact_fine_brooch_description: "A sutil invocação do nome de [artifact.GetOwner.GetHouse.GetBaseName] ao redor das bordas deste broche fez com que sua legitimidade se espalhasse rapidamente."
 medicine_jar: "Jarro Medicinal"
 medicine_jar_desc: "Este jarro de barro de esmalte fino contém ervas raras e potentes, minerais medicinais e várias partes de animais secas - tudo usado por médicos ao tratar doenças e equilibrar humores."
 whale_fat_candles_name: "Velas de Gordura de Baleia"
 whale_fat_candles_description: "Estas velas foram feitas a partir da gordura de um terrível leviatã. Elas ameaçam com espinhos de gordura de baleia."
 warenne_coin: "Moeda Warenne"
 warenne_coin_description: "Esta moeda possui o emblema quadriculado azul e amarelo da dinastia Warenne no anverso. Uma mancha escura de sangue marca sua borda."
 traitors_head: "Cabeça de Traidor"
 traitors_head_description: "Uma cabeça desprendida, cortada de forma precisa de seu dono. É mais uma mensagem do que uma lembrança."
 artifact_: "Artefato Destruído"
 artifact_slot_untyped: "Artefato destruído" #Yes the tabs are intended
 artifact_tale_of_genji: "A história de Genji"
 artifact_tale_of_genji_description: "Supostamente inspirada na vida de Minamoto $TO_ru$, "O Conto de Genji" é uma obra em estilo de romance escrita pela dama Murasaki. Detalha a história da vida e dos romances do fictício príncipe Genji, filho do imperador."
 artifact_pillow_book: "O livro do travesseiro"
 artifact_pillow_book_description: "Escrito pela poetisa e dama da corte Sei Shōnagon como seu diário íntimo, este chamado "Livro do Travesseiro" permite vislumbrar as fofocas do dia a dia, os romances e o drama da aristocracia japonesa."
