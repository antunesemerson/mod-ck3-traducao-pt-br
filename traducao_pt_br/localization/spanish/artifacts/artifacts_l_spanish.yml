 tiny_sculpture_trinket_name: "Miniatura de Escultura"
 tiny_sculpture_trinket_description: "Uma pequena escultura de [statue_owner.GetTitledFirstNameNoTooltip|l]. De bolso e pronta para governar[statue_owner.Custom('ES_OA')] feita por [inspiration_owner.GetTitledFirstNameNoTooltip|l]."
 tiny_box_trinket_name: "Miniatura de Caixa"
 tiny_box_trinket_description: "Uma caixinha pequena, porém misteriosa. Talvez libere um único pecado no mundo quando for aberta. Criada por [inspiration_owner.GetTitledFirstNameNoTooltip|l]."
 tiny_chest_trinket_name: "Miniatura de Baú"
 tiny_chest_trinket_description: "Um pequeno baú trancado do tamanho de um polegar. Ele chacoalha quando sacudido, revelando o que há dentro. Feito por [inspiration_owner.GetTitledFirstNameNoTooltip|l]."
 tiny_cabinet_trinket_name: "Miniatura de Armário"
 tiny_cabinet_trinket_description: "Um armário pequeno o bastante para que provavelmente devesse ser guardado em outro armário, para evitar que pise nele. Criado por [inspiration_owner.GetTitledFirstNameNoTooltip|l]."
 tiny_throne_trinket_name: "Trono em miniatura"
 tiny_throne_trinket_description: "Um trono apropriado para um rato ou outro roedor governar. Criado por [inspiration_owner.GetTitledFirstNameNoTooltip|l]."
 #fund_inspiration.6301 same sex love poems
 prince_archivist_love_poem_name: "Eu a Lua, Você o Sol"
 prince_archivist_love_poem_description: "Uma balada de dois homens apaixonados, um príncipe e um arquivista, observando as estrelas no alto de uma torre, longe de olhares indiscretos, e juntos entre as estrelas. Os rumores sugerem que o arquivista se inspira nas experiências do autor, [inspiration_owner.GetTitledFirstNameNoTooltip|l]."
 witch_queen_love_poem_name: "Um Coração Dispensado"
 witch_queen_love_poem_description: "Um poema estrelado por duas mulheres apaixonadas, uma bruxa e uma rainha perdida na floresta, perto da cabana de campo dela. Ambas encontram consolo em um momento longe da sociedade. Sussurra-se que a bruxa é uma autorretrato da autora, [inspiration_owner.GetTitledFirstNameNoTooltip|l]"
