 blooded_blade: "Espada Ensanguentada"
 blooded_blade_description: "Os padrões em espiral e serrilhados desta arma são indicadores sutis da relativa fragilidade da lâmina, mas também de sua herança: uma arma temperada no sangue de [ROOT.Char.GetTitledFirstName|l]."
 sullied_blooded_blade: "Espada Contaminada"
 sullied_blooded_blade_description: "Os padrões em espiral e serrilhados desta arma são indicadores sutis da baixa qualidade geral da lâmina, mas também de sua herança: uma arma temperada no sangue de [ROOT.Char.GetTitledFirstName|l]."
 fake_papal_tiara_name: "Tiara Papal Falsa"
 fake_papal_tiara_description: "Uma réplica imponente de uma mitra papal que talvez não resista a uma inspeção minuciosa. Ainda assim, é uma diversão, não é mesmo?"
 artisanal_sword: "Espada d [ROOT.Char.GetFirstName]"
 artisanal_sword_description: "Uma espada lindamente forjada, cujo pomo cravejado de joias complementa uma empunhadura atraente, porém robusta. A lâmina com padrões é perfeitamente balanceada, sua ponta afunilando até se tornar uma nada perfurante."
