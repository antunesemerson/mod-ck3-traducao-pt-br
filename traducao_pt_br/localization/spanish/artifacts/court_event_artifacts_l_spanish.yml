l_spanish:
 #court.4500 Fake artifacts and trinkets
 blood_brooch_name: "Broche de Sangue"
 blood_brooch_description: "Este broche tem uma esfera de vidro cheia de sangue de [ROOT.GetCharacter.GetTitledFirstName|l]."
 cuckoldry_psalter_name: "O Saltério da Cornitude"
 cuckoldry_psalter_description: "Passando de cuco a enganado ao longo dos tempos, diz-se que este tomo é o melhor presente que se pode dar a um cônjuge. Pelo menos as figuras de marfim na capa parecem felizes juntas."
 chastity_belt_name: "Cinto de Castidade"
 chastity_belt_description: "Este cinto de castidade tem espinhos tanto por dentro quanto por fora, para a proteção de você e dos outros."
 holy_needle_name: "A Agulha Sagrada de Antioquia"
 holy_needle_description: "Bem, você poderia fazer um belo bordado da Crucificação."
 finger_bones_name: "Os Ossos dos Dedos de um Santo"
 finger_bones_description: "Todos os onze!"
 dead_chicken_name: "O Escudo do Covarde"
 dead_chicken_description: "Ninguém vai querer estar perto de você se você brandir este frango morto, principalmente seus inimigos."
 worm_on_a_string_name: "Minhoca em uma Corda"
 worm_on_a_string_description: "Um brinquedo que provavelmente impressionaria uma criança pequena."
 #court.4750 Book commissions
 pope_joan_book_name: "Contos de Papa Joana"
 pope_joan_book_desc: "Um livro em que [ROOT.Char.GetTitledFirstNameNoTooltip|l] é retratado como Papa Joana. Devoto, blasfemo ou sedutor?"
 lady_godiva_book_name: "Contos de Lady Godiva"
 lady_godiva_book_desc: "Al menos la representación [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitledFirstNameNoTooltip|l] desnud[ROOT.Char.Custom('ES_OA')] a caballo es halagadora."
 caligula_book_name: "Quinhentos Golpes"
 caligula_book_desc: "Quinhentas páginas em que Calígula chicoteia [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetTitledFirstNameNoTooltip|l]."
 nasreddin_book_name: "Contos de Nasreddin"
 nasreddin_book_desc: "No qual [ROOT.Char.GetTitledFirstNameNoTooltip|l] recebe a honra de ser ridicularizado por Nasreddin."
 valmiki_book_name: "Epigramas de Valmiki"
 valmiki_book_desc: "Uma série de tiradas do mais antigo dos poetas, Valmiki, insolitamente proferidas pela boca de [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitledFirstNameNoTooltip|l]"
 ruler_hero_book_name: "Contos [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitledFirstNameNoTooltip|l]"
 ruler_hero_book_desc: "A primeira linha mostra [ROOT.Char.GetTitledFirstNameNoTooltip|l] declarando à sua corte: 'Preciso me sentar, pois não consigo suportar vocês de pé.'"
 sinbad_book_name: "Viagens de Sinbad"
 sinbad_book_desc: "Um livro no qual várias feras que Simbad enfrenta têm o rosto de [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitledFirstNameNoTooltip|l]"
 #court.4806 fan relics
 purple_underwear_name: "Roupa íntima roxa imperial"
 purple_underwear_description: "Apenas adequada para um imperador.\n\nSic itur ad astra...?"
 fake_reichskrone_name: "Réplica da Reichskrone"
 fake_reichskrone_description: "Use para realmente se tornar um #EMP pretendente#! ao trono"
