l_spanish:
 bm_867_china: "Outono da Virtude"
 bm_867_china_desc: "Por dois séculos e meio, a grande dinastia Tang governou a China. Nesse tempo, ela conheceu e suportou imensas lutas e incontáveis calamidades, entre elas uma rebelião que ceifou inúmeras vidas, e ainda assim ela sobrevive, e até prospera.\n\nMas a sobrevivência sempre tem um preço. Para defender melhor o império, os Tang concederam poderes extraordinários aos governadores militares, que, em sua recém-descoberta liberdade, viram a oportunidade de fundar seus próprios estados, pequenos despotismos que apenas prestam lealdade de fachada ao trono.\n\n#bold A queda de uma única folha pode anunciar a chegada do outono. Os sábios buscam calor e abrigo contra o inverno que virá. Os ousados fazem planos.#!"
 bookmark_china_867_huang_chao: "Huáng Chāo"
 bookmark_china_867_huang_chao_subheading: "$BOOKMARK_SUBHEADING_LANDLESS_ADMIN$"
 bookmark_china_867_huang_chao_desc: "Nascido de uma longa linhagem de contrabandistas de sal, Huáng Chāo possui a ousadia e a riqueza conquistadas com uma vida do lado errado da lei, mas ainda assim almeja a única coisa que lhe escapou: o status que acompanha um cargo no governo.\n\nIncapaz de passar no exame imperial, apesar de seus melhores esforços, sua frustração aumenta a cada ano que passa, à medida que suas perspectivas de sucesso diminuem.\n\n#bold Huáng Chāo realizará seu sonho, ou a ambição frustrada o levará a uma aposta desesperada?#!"
 bookmark_china_867_zhuye_chixin: "Comandante Zhūyè Chìxīn"
 bookmark_china_867_zhuye_chixin_subheading: "$BOOKMARK_SUBHEADING_MILITARY_GOVERNOR$"
 bookmark_china_867_zhuye_chixin_desc: "Há muito tempo os Tang cortejam os shatuo por sua bravura e destreza marcial, e nisso Zhūyè Chìxīn não foge à tradição de seus antepassados.\n\nHonrado por seu papel no resgate ousado da tia do imperador anos atrás, a ascensão constante do general shatuo no favor imperial faz alguns se perguntarem até onde vão suas ambições.\n\n#bold Agora que a estrela dos Tang está em declínio, será Zhūyè Chìxīn ousado o bastante para tomá-la?#!"
 bookmark_china_867_he_quanhao: "Comandante Hé Quánhào"
 bookmark_china_867_he_quanhao_subheading: "$BOOKMARK_SUBHEADING_MILITARY_GOVERNOR$"
 bookmark_china_867_he_quanhao_desc: "A família de Hé Quánhào governa como senhores da guerra independentes em tudo, exceto no nome, desde a época de seu avô, oferecendo aos Tang nada mais do que uma submissão simbólica.\n\nO exército aclamou Quánhào como governador após a morte de seu pai, mas não sem certa apreensão; há uma veia de crueldade na natureza desse jovem.\n\n#bold Hé Quánhào conseguirá superar sua natureza para continuar a obra de seus ancestrais, ou seus impulsos provarão ser sua ruína?#!"
 bookmark_china_867_zhang_huaishen: "Jiédùshǐ Zhāng Huáishèn"
 bookmark_china_867_zhang_huaishen_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_china_867_zhang_huaishen_desc: "Tendo conquistado e anexado vastas extensões de terra em nome da dinastia Tang, o senhor da guerra Zhāng Yìchāo ocupou um lugar de honra na corte imperial e nomeou seu sobrinho, Huáishèn, para governar esses territórios em seu nome.\n\nMas Huáishèn, um comandante astuto e competente, não carece de ambições próprias e está pouco inclinado a ceder seu lugar aos primos quando chegar a hora.\n\n#bold Zhāng Huáishèn conseguirá prevalecer na disputa sucessória que se aproxima e reivindicar uma posição de destaque em sua família?#!"
 bookmark_china_867_gao_pian: "Comandante Gāo Piān"
 bookmark_china_867_gao_pian_subheading: "$BOOKMARK_SUBHEADING_MILITARY_GOVERNOR$"
 bookmark_china_867_gao_pian_desc: "Descendente dos antigos reis de Qí e neto de um general célebre, muitos tomam como certo que Gāo Piān está destinado a grandes feitos, e sua proeza de derrubar duas águias do céu com uma única flecha parece confirmar suas habilidades sobrenaturais.\n\nEnviado às fronteiras do sul para se defender contra incursões estrangeiras, os sucessos de Gāo Piān lhe conquistaram a inimizade daqueles que veem nele uma ameaça às próprias ambições.\n\n#bold Um destino augusto aguarda Gāo Piān, ou ele cairá por terra como as águias que derrubou?#!"
