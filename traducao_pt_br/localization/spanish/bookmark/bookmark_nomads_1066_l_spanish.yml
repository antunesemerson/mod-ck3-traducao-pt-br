l_spanish:
 bm_1066_nomads: "Às Portas"
 bm_1066_nomads_desc: "Desde tempos imemoriais, povos migraram pelas estepes e seguiram os caminhos dos nômades por incontáveis gerações. Agora, o mundo além avança sobre suas terras natais. Impérios sedentários expandem suas fronteiras cada vez mais a cada ano.\n\n#bold Será possível reverter a maré dos assentamentos? Os modos nômades devem ser abandonados? Em cidades e fazendas, os povos da estepe podem encontrar novas vidas... mas, se uma nova era de grandes conquistadores surgir, os velhos caminhos poderão ser salvos!#!"
 bookmark_nomads_cumans: "Cã Saru da Cumania"
 bookmark_nomads_cumans_subheading: "$BOOKMARK_SUBHEADING_KHAN$"
 bookmark_nomads_cumans_desc: "Recém-chegado à sela, Saru comanda as vastas hordas da Cumania. Em suas fronteiras repousam ricos principados, prontos para serem tomados, mas será que Saru tem habilidade para manter a horda unida para novas conquistas?\n\nA Cumania pode ser vasta, mas seu povo pode ser tanto um trunfo quanto um fardo ? por trás de cada boca para alimentar há um ego igualmente faminto.\n\n#bold Você conseguirá manter seus vizinhos subjugados e seu status elevado enquanto cavalga à frente da horda cumana?#!"
 bookmark_nomads_keraits: "Grande Chefe Inanch"
 bookmark_nomads_keraits_subheading: "$BOOKMARK_SUBHEADING_HIGH_CHIEFTAIN$"
 bookmark_nomads_keraits_margus: "Margus"
 bookmark_nomads_keraits_hongji: "Grão-cã Hongji"
 bookmark_nomads_keraits_desc: "Exilados da China por decreto do Imperador Wuzong dois séculos atrás, missionários nestorianos encontraram um público receptivo entre os Keraits. Impulsionado por ambição e fé, o senhor Kerait Inanch agora tenta reunir os povos da estepe sob sua bandeira ? uma bandeira coroada por uma cruz.\n\n#bold Una os nômades do leste e espalhe a fé nestoriana pelas estepes!#!"
 bookmark_nomads_late_kirghiz: "Kokotoy dos Quirguizes"
 bookmark_nomads_late_kirghiz_subheading: "$BOOKMARK_SUBHEADING_HIGH_CHIEFTAIN$"
 bookmark_nomads_late_kirghiz_desc: "Mencionados outrora com temor por todos os que viviam nas estepes do norte, os Quirguizes hoje vivem dias de decadência - seu império está em ruínas, e apenas um frágil sopro do Caganato Quirguiz persiste no norte.\n\n#bold As últimas centelhas da glória quirguiz se apagarão, ou sua chama voltará a brilhar mais forte que o Sol?#!"
 bookmark_nomads_eastern_karakhanids: "Muhmud dos Karluks"
 bookmark_nomads_eastern_karakhanids_subheading: "$BOOKMARK_SUBHEADING_KHAN$"
 bookmark_nomads_eastern_karakhanids_desc: "As hordas dos caracânidas - os #italic cãs negros#! - de Transoxiana controlaram antigamente a Rota da Seda, mas esses dias de glória ficaram para trás há muito tempo. Agora, divididas entre as casas de Ali e Hasan, as duas metades do império disputam a supremacia.\n\nNo leste, os alidas abandonaram sua herança nômade, mas os hasânidas do oeste permanecem fiéis às suas raízes nômades.\n\n#bold Os caracânidas estão divididos - o futuro do canato repousa em uma sela ou em uma corte palaciana?#!"
 bookmark_nomads_pechenegs: "Tatus dos Pechenegues"
 bookmark_nomads_pechenegs_subheading: "$BOOKMARK_SUBHEADING_KHAN$"
 bookmark_nomads_pechenegs_desc: "Os nômades Pechenegues estão cercados por povos sedentários: ao sul, a política conturbada dos bizantinos oferece oportunidades tanto para saqueadores quanto para mercenários. A oeste, os magiares já se estabeleceram na Panônia ? mas outros também se assentaram ali antes, apenas para serem consumidos pelos próximos invasores. Ao norte, os príncipes da Rus' vivem em constantes rivalidades.\n\n#bold Conduza os Pechenegues para uma nova era, crescendo e se transformando para cumprir qualquer destino que os aguarde!#!"
