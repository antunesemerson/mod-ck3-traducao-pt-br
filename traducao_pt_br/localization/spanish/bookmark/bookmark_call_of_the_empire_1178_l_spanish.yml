l_spanish:
 bm_1178_call_of_the_empire: "Chamado do Império"
 bm_1178_call_of_the_empire_desc: "Um imperador idoso, um herdeiro jovem e uma derrota recente no campo de batalha nas mãos dos seljúcidas da Anatólia deixaram Bizâncio vulnerável, e a história tem provado repetidas vezes que as maiores ameaças ao império frequentemente vêm tanto de dentro quanto de fora.\n\n#bold ¿Afrontarán los herederos de Roma su último ocaso o superarán una larga noche hasta un nuevo amanecer?#!"
 bookmark_call_of_the_empire_tamar: "Princesa Tamar"
 bookmark_call_of_the_empire_tamar_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_call_of_the_empire_tamar_giorgi: "Rei Giorgi da Geórgia"
 bookmark_call_of_the_empire_tamar_rusudan: "Rusudan"
 bookmark_call_of_the_empire_tamar_desc: "Apesar da veemente oposição da nobreza georgiana, o rei da Geórgia deixou claro que sua filha mais velha, Tamar, o sucederá no trono, um ato sem precedentes na longa história do reino.\n\nO caminho adiante será difícil e poucos entre seus futuros vassalos ficarão satisfeitos em vê-la suceder, mas aqueles que conhecem bem a princesa confiam plenamente que ela estará à altura da ocasião.\n\n#bold ¿Puedes demostrar que se equivocan quienes dudan de tu valía y llevar a Georgia a una gloriosa edad de oro?#!"
 bookmark_call_of_the_empire_kilij_arslan: "Sultão Kilij Arslan"
 bookmark_call_of_the_empire_kilij_arslan_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_call_of_the_empire_kilij_arslan_suleyman: "Suleyman"
 bookmark_call_of_the_empire_kilij_arslan_kaykhusraw: "Kaykhusraw"
 bookmark_call_of_the_empire_kilij_arslan_desc: "Kilij Arslan, recém-saído da vitória sobre os bizantinos na batalha de Miriocéfalo, provou ser uma força a ser levada em conta na Anatólia.\n\nCom o tempo, ele poderá conduzir seus exércitos até as próprias muralhas de Constantinopla, mas as disputas de seus muitos filhos pela sucessão podem se revelar uma distração mortal, pois até o próprio pai de Kilij Arslan ascendeu ao trono sobre o cadáver de seu próprio irmão.\n\n#bold ¿Quién de entre tus hijos demostrará ser digno de continuar tus empresas? Y, ¿podrá Rûm sobrevivir a sus rivalidades?#!"
 bookmark_call_of_the_empire_angelos: "Strategos Andronikos"
 bookmark_call_of_the_empire_angelos_subheading: "$BOOKMARK_SUBHEADING_GOVERNOR$"
 bookmark_call_of_the_empire_angelos_alexios: "Alexios"
 bookmark_call_of_the_empire_angelos_ioannes: "Ioannes"
 bookmark_call_of_the_empire_angelos_desc: "Neto do basileu Aleixo Comneno, Andrônico teve uma carreira distinta a serviço do império, mas quanto mais seus irmãos e filhos sobem na pirâmide do poder, mais se aproximam de alturas perigosas em que um passo em falso pode ser fatal para todos.\n\n#bold A dinastia Comneno foi construída sobre laços entre irmãos, e você tem numerosos parentes consanguíneos. Você conseguirá aproveitar seus vínculos familiares para ascender ainda mais?#!"
 bookmark_call_of_the_empire_palaiologos: "Strategos Alexios"
 bookmark_call_of_the_empire_palaiologos_subheading: "$BOOKMARK_SUBHEADING_GOVERNOR$"
 bookmark_call_of_the_empire_palaiologos_eirene: "Eirene"
 bookmark_call_of_the_empire_palaiologos_desc: "A família de Aleixo se destaca até mesmo entre os nomes poderosos e influentes do Império Bizantino, tendo ocupado seu lugar à mesa proverbial por mais de um século, e seus ancestrais contribuíram enormemente para a ascensão dos Comnenos.\n\nSua lealdade ao trono tem sido inabalável, mas a proximidade do poder ხშირად leva a poderosas tentações: por quanto tempo os Paleólogos se contentarão em servirá\n\n#bold ¿Seguirán Alejo y su familia apoyando al trono, o lo codiciarán para sí mismos?#!"
 bookmark_call_of_the_empire_ioannes_kantakouzenos: "Strategos Ioannes"
 bookmark_call_of_the_empire_ioannes_kantakouzenos_subheading: "$BOOKMARK_SUBHEADING_GOVERNOR$"
 bookmark_call_of_the_empire_ioannes_kantakouzenos_michael: "Michael"
 bookmark_call_of_the_empire_ioannes_kantakouzenos_desc: "Um dos comandantes mais experientes do basileu Manuel, a estatura hercúlea de Ioannes e sua bravura no campo de batalha só eram equiparadas por sua arrogância espantosa e impetuosidade desenfreada, traços que raramente conduzem a uma vida longa e saudável na arena política bizantina.\n\n#bold ¿Llevará la audacia de Ioannes a la familia Cantacuceno más allá de su estado actual, o su arrogancia acabará siendo su perdición?#!"
