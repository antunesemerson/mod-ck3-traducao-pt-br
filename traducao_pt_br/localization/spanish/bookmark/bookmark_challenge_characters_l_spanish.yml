l_spanish:
 #867
 #Haraldr
 challenge_character_haraldr_vestfold: "Chefe Haraldr"
 challenge_character_haraldr_vestfold_desc: "Haraldr, um herói das sagas, é lembrado como um grande rei que uniu os chefes rivais da Noruega sob um único estandarte.\n\n#bold Você consegue pôr fim às disputas e unir a Noruega sob seu domínio?#!"
 #Ashot
 challenge_character_ashot_armenia: "Príncipe Ashot"
 challenge_character_ashot_armenia_desc: "Embora seu reinado tenha sido de prosperidade para seu povo, Ashot devia seu trono e seu reino à graça do califa, e permaneceu subordinado a ele até sua morte.\n\n#bold Você conseguirá libertar-se de seu suserano estrangeiro e provar que é um soberano por direito próprio?#!"
 #Aella
 challenge_character_aella_northumberland: "Rei Menor Ælla"
 challenge_character_aella_northumberland_desc: "Sitiado por invasores estrangeiros, a morte de Ælla pelas mãos deles marcou o fim de toda resistência significativa, e seu sucessor foi pouco mais que um fantoche nórdico.\n\n#bold Você consegue virar a maré e salvar a Nortúmbria do flagelo viking?#!"
 #Gregorios
 challenge_character_gregorios_napoli: "Conde Gregorios"
 challenge_character_gregorios_napoli_desc: "Quando a influência bizantina na Itália enfraqueceu, os governantes de Nápoles buscaram aliados no mundo muçulmano diante do avanço lombardo, para consternação do papa.\n\n#bold Você consegue aproveitar o vazio deixado pelos bizantinos para fundar um império próprio?#!"
 #Dawit
 challenge_character_dawit_dembiya: "Ras Dawit"
 challenge_character_dawit_dembiya_desc: "Embora nunca tenham sido numerosos e muitas vezes estivessem em perigo, os beta-israelitas conseguiram resistir à assimilação por seus vizinhos maiores e mais poderosos.\n\n#bold Você consegue superar as adversidades e construir uma pátria próspera e segura para os beta-israelitas?#!"
 #Werner
 challenge_character_werner_worms: "Conde Werner"
 challenge_character_werner_worms_desc: "Embora o nome saliano ainda não fosse famoso nos dias de Werner, seus descendentes contariam com quatro imperadores do Sacro Império Romano e até mesmo um papa.\n\n#bold Você consegue reivindicar o legado de Carlos Magno para si e reforjar seu império fragmentado?#!"
 #Siemowit
 challenge_character_siemowit_wielkopolska: "Alto Chefe Siemowit"
 challenge_character_siemowit_wielkopolska_desc: "Filho do lendário Piast, o Carreteiro, Siemowit e seu pai iniciaram uma dinastia que governaria a Polônia até o final do século XIV.\n\n#bold Você consegue conduzir a Polônia com segurança através dos séculos e torná-la a inveja tanto do leste quanto do oeste?#!"
 #Ahmad
 challenge_character_ahmad_egypt: "Sultão Ahmad"
 challenge_character_ahmad_egypt_desc: "Ahmad ascendeu de origens humildes até conquistar o domínio do Egito, mas seus herdeiros não conseguiram se igualar a ele e seu reino desmoronou apenas vinte e um anos após sua morte.\n\n#bold Com a riqueza e o poder do Egito ? sua disposição, você consegue tornar-se senhor do Mediterrâneo?#!"
 #Dyre
 challenge_character_dyre_kiev: "Jarl Dyre"
 challenge_character_dyre_kiev_desc: "Dyre, um aventureiro nórdico que buscava deixar sua marca no leste, viu sua ousada empreitada terminar em uma usurpação ignominiosa e em sua morte pelas mãos de Oleg, o Sábio.\n\n#bold Você consegue reescrever o doloroso relato de Dyre em uma saga que ecoará através dos séculos?#!"
 #Dumnarth
 challenge_character_dumnarth_cornwall: "Rei Menor Dumnarth"
 challenge_character_dumnarth_cornwall_desc: "Dumnarth tem a dúbia honra de ser lembrado sobretudo por ter sido o último dos reis da Cornualha e por ter tido um fim molhado em um acidente num rio.\n\n#bold Sob seu governo, a Cornualha conseguirá enfrentar os desafiantes anglo-saxões e nórdicos e sair vitoriosa?#!"
 #Rhodri
 challenge_character_rhodri_gwynedd: "Príncipe Rhodri"
 challenge_character_rhodri_gwynedd_desc: "Herdando o trono de um pequeno reino galês às vésperas das invasões vikings, a coroa de Rhodri pesava em sua cabeça, mas ele jogou habilmente com as cartas que lhe foram dadas.\n\n#bold Você consegue navegar com segurança pelas águas desta era tumultuada e garantir que Gwynedd emerja triunfante?#!"
 #Gunda
 challenge_character_gunda_orangallu: "Samanta Gunda"
 challenge_character_gunda_orangallu_desc: "Só foi quando os Kakatiyas se converteram do jainismo ao hinduísmo que conseguiram obter terras suficientes para se proclamar reis, uma façanha talvez facilitada pela ausência do rigoroso compromisso jainista com a não violência.\n\n#bold Você consegue obter um trono próprio sem deixar de seguir os dogmas de sua fé?#!"
 #Muhammad
 challenge_character_muhammad_africa: "Sultão Muhammad"
 challenge_character_muhammad_africa_desc: "Embora seu breve reinado seja lembrado principalmente por sua dissipação e extravagância, os generais de Muhammad foram tão bem-sucedidos que obrigaram o próprio papa a pagar tributo a esse potentado decadente.\n\n#bold Agora que provou as riquezas da Itália, você a consumirá por inteiro para saciar seus desejos?#!"
 #Alfonsu
 challenge_character_alfonsu_asturias: "Rei Alfonsu"
 challenge_character_alfonsu_asturias_desc: "Quase no fim de sua vida, Alfonsu caiu presa das ambições de seus filhos e foi destituído de sua coroa, forçado a dividir seu domínio entre três deles.\n\n#bold Você consegue evitar o destino de Alfonsu e garantir que os cristãos da Ibéria permaneçam unidos contra a ameaça omíada?#!"
 #Vicayalaya
 challenge_character_vicayalaya_chola_nadu: "Raja Vicayalaya"
 challenge_character_vicayalaya_chola_nadu_desc: "Originalmente um vassalo da dinastia Pallava, Vicayalaya viu uma oportunidade e se lançou sozinho para fundar um império que viria a unir todo o sul da Índia sob suas bandeiras.\n\n#bold Você consegue levar as ambições cholas à sua conclusão natural e colocar toda a Índia sob seu domínio?#!"
 #Lambert
 challenge_character_lambert_spoleto: "Duque Lambert"
 challenge_character_lambert_spoleto_desc: "Lambert, convidado para assistir à consagração do papa, preferiu saquear a cidade, pilhando mansões e mosteiros em igual medida, e ninguém escapou de sua rapacidade.\n\n#bold Sem respeitar nem as leis dos homens nem as de Deus, até onde você irá em busca de suas ambições?#!"
 #Amoghavarsha
 challenge_character_amoghavarsha_karnata: "Maharaja Amoghavarsha"
 challenge_character_amoghavarsha_karnata_desc: "Amoghavarsha, que ascendeu ao trono na tenra idade de 14 anos, teve um dos reinados mais longos já registrados e foi reconhecido por sua benevolência e por suas conquistas literárias e culturais.\n\n#bold Você consegue garantir que as conquistas de Amoghavarsha sejam preservadas para as gerações futuras?#!"
 #1066
 #Gudrod
 challenge_character_gudrod_western_isles: "Rei Menor Gudröd"
 challenge_character_gudrod_western_isles_desc: "Gudröd, um audaz senhor de guerra das Hébridas com passado mercenário, ampliou seu domínio até tornar-se senhor de Dublin, Man e do mar da Irlanda, mas as disputas entre seus descendentes acabaram por reduzir suas conquistas.\n\n#bold Você consegue estabelecer um domínio mais permanente sobre estas belas ilhas?#!"
 #Richard
 challenge_character_richard_capua: "Duque Richard"
 challenge_character_richard_capua_desc: "Embora a casa de Hauteville tenha conquistado a supremacia sobre a Sicília, os Drengots estavam inegavelmente lá primeiro, tendo sido um dos primeiros saqueadores normandos a pisar na península.\n\n#bold Você consegue colocar os arrivistas Hauteville em seu devido lugar e provar a preeminência dos Drengot?#!"
 #Fariburz
 challenge_character_fariburz_shirvan: "Shirvanshah Fariburz"
 challenge_character_fariburz_shirvan_desc: "Os Shirvanshás são lembrados como patronos e benfeitores de poetas e filósofos; as artes e a vida intelectual floresciam frequentemente sob seu governo.\n\n#bold Você consegue transformar sua corte em um farol radiante de cultura para todo o mundo admirar?#!"
 #Shisnand
 challenge_character_shisnand_coimbra: "Conde Shisnand"
 challenge_character_shisnand_coimbra_desc: "Um aristocrata moçárabe que passou do serviço Abbadid para o leonês, Shisnand governou Coimbra quase autonomamente por mais de vinte anos e foi sucedido por seu genro após sua morte.\n\n#bold Tendo servido senhores muçulmanos e cristãos, você consegue construir uma ponte entre as fés e trazer paz é Ibéria?#!"
 #Alusian
 challenge_character_alusian_vidin: "Conde Alusian"
 challenge_character_alusian_vidin_desc: "Talvez o segundo filho do último imperador da Bulgária tenha sido coberto de honrarias por seus novos senhores bizantinos, mas ele não desperdiçou a oportunidade de ressuscitar o império de seu pai, embora no fim tenha retornado ao rebanho.\n\n#bold Você consegue se livrar do jugo bizantino e reivindicar seu direito de nascimento?#!"
 #Rostislav
 challenge_character_rostislav_tmutarakan: "Conde Rostislav"
 challenge_character_rostislav_tmutarakan_desc: "Despojado de seu patrimônio pela morte prematura de seu pai, Rostislav conquistou a distante península de Tmutarakan e a fez seu reduto, mas foi envenenado antes que pudesse realizar suas ambições.\n\n#bold Você consegue superar a hostilidade de seus parentes e obter um principado digno de sua linhagem?#!"
 #Werner
 challenge_character_werner_aargau: "Conde Werner"
 challenge_character_werner_aargau_desc: "Enquanto os Habsburgos ainda não haviam deixado sua marca na época de Werner, a política astuta veria seus descendentes sentados em muitos tronos por séculos a fio.\n\n#bold Você consegue obter a Áustria para os Habsburgos e fazer o mundo inteiro reconhecer sua ascensão?#!"
 #Herbert
 challenge_character_herbert_vermandois: "Conde Herbert"
 challenge_character_herbert_vermandois_desc: "Embora a linhagem de Carlos Magno já não produzisse mais reis, seu sangue perdurou em Herberto de Vermandois, embora a geração seguinte visse suas terras saírem da família.\n\n#bold Você consegue voltar o relógio e arquitetar um retorno dos carolíngios ao poder, por bem ou por mal?#!"
 #Erik
 challenge_character_erik_svealand: "Príncipe Erik"
 challenge_character_erik_svealand_desc: "Erik, um governante pagão que renunciou ao cristianismo e voltou às suas raízes, foi um dos últimos de uma raça em extinção numa Escandinávia cada vez mais cristianizada.\n\n#bold Você consegue provar a todos que os velhos costumes são superiores a esses sacerdotinhos estrangeiros e seu novo deus?#!"
 #Krutoj
 challenge_character_krutoj_nordmark: "Duque Krutoj"
 challenge_character_krutoj_nordmark_desc: "Krutoj, um devoto seguidor dos costumes tradicionais de seu povo, liderou uma revolta e assassinou seu senhor cristão, tomando o trono para si, mas sua conspiração para eliminar o filho de seu senhor acabou resultando em sua própria morte.\n\n#bold Você consegue superar seus rivais e legitimar seu governo, apesar de seu começo sangrento?#!"
 #Ishaq
 challenge_character_ishaq_baalbek: "Sheikh Ishaq"
 challenge_character_ishaq_baalbek_desc: "Apesar de seu pequeno número e da perseguição daqueles que consideravam suas crenças heréticas, os drusos têm resistido ao longo dos séculos, refugiando-se nas escarpadas montanhas do Levante.\n\n#bold Você consegue conduzir os drusos para além das montanhas e encontrar uma pátria próspera só deles?#!"
 #Badr
 challenge_character_badr_acre: "Sheikh Badr"
 challenge_character_badr_acre_desc: "Soldado fatímida de origem armênia, Badr ascendeu pelas fileiras até se tornar o ditador militar supremo do califado, reduzindo o próprio califa a pouco mais que uma figura decorativa.\n\n#bold Badr e seus sucessores dominaram a política egípcia por mais de 60 anos. Você consegue superar seus feitos e livrar-se totalmente do califa?#!"
 #Berenguer
 challenge_character_berenguer_barcelona: "Duque Berenguer"
 challenge_character_berenguer_barcelona_desc: "Em busca da justiça, Berenguer organizou a codificação dos costumes de seu domínio como os Usatges de Barcelona, que acabariam servindo de base para o direito catalão por séculos.\n\n#bold Com o tempo, os descendentes de Berenguer viriam a controlar grande parte do Mediterrâneo. Você consegue aproveitar suas conquistas e fazer o mesmo?#!"
 #Raoul
 challenge_character_raoul_valois: "Conde Raoul"
 challenge_character_raoul_valois_desc: "Embora no início da vida tenha sido um opositor dos Capetos, Raoul mais tarde mudou de lado e tornou-se um fiel servo da coroa francesa, eventualmente casando-se com a viúva do próprio rei que ele havia combatido.\n\n#bold Com a mãe de seu jovem soberano como esposa, você consegue converter sua influência em algo maior?#!"
 #Ali
 challenge_character_ali_siracusa: "Sheikh Ali"
 challenge_character_ali_siracusa_desc: "Entre os últimos redutos contra a invasão normanda da Sicília, Ali se lançou ao mar e se afogou ao tentar subir a bordo da embarcação de seu inimigo.\n\n#bold Os normandos chegaram, mas ainda não completaram a conquista. Você consegue reverter seus avanãos e reivindicar a Sicília para si?#!"
 #Eadgar
 challenge_character_eadgar_warwickshire: "Eadgar"
 challenge_character_eadgar_warwickshire_desc: "Nascido no exílio, o último herdeiro da casa de Wessex retornou à Inglaterra bem a tempo de ver seu direito de nascimento ser usurpado uma segunda vez por Harold Godwinson e então perdido de forma irrevogável para um conquistador normando.\n\n#bold A luz da casa de Wessex tremula fracamente, mas ainda não se apagou. Você consegue restaurar sua sorte?#!"
 #Ali
 challenge_character_ali_taizz: "Emir Ali"
 challenge_character_ali_taizz_desc: "Ali, filho de um magistrado, partiu com um pequeno grupo de seguidores e conquistou um reino, mas recebeu elogios ainda maiores pela sabedoria de sua esposa, Asma, a quem confiou a administração de seus domínios.\n\n#bold Com uma parceira tão capaz ao seu lado, tudo parece possível. Juntos, toda a Arábia está ao seu alcance!#!"
 #Pierre
 challenge_character_pierre_piedmonte: "Duque Pierre"
 challenge_character_pierre_piedmonte_desc: "A casa de Savoie deve grande parte de seu território à herança da mãe de Pierre, Adelaide de Turim, cuja influência foi fundamental na corte de seu filho, quase certamente para o melhor.\n\n#bold Você consegue sair da sombra de sua famosa mãe e provar que é um governante digno por seus próprios méritos?#!"
 #Anawrahta
 challenge_character_anawrahta_pagan: "Rei Anawrahta"
 challenge_character_anawrahta_pagan_desc: "Anawrahta, fundador de Pagan, governou com prudência, esmagou sem piedade qualquer ameaça ao seu novo reino, e seu patrocínio ao budismo theravada contribuiu enormemente para a difusão da fé.\n\n#bold Os sucessores de Anawrahta foram tão capazes quanto seu progenitor, mas os mongóis se mostraram fortes demais para os pagãos. Você consegue resistir melhor é tempestade que se aproxima?#!"
 #1178
 #Piarres
 challenge_character_piarres_albarracin: "Conde Piarres"
 challenge_character_piarres_albarracin_desc: "Outrora vassalo de um potentado muçulmano, Piarres cristianizou seu domínio e declarou sua independência, não reconhecendo nenhum senhor além de Santa Maria.\n\n#bold Tendo se declarado igual a reis e califas, você consegue agora cumprir sua reivindicação e erguer um novo reino capaz de rivalizar com todos os anteriores?#!"
 #John
 challenge_character_john_ulster: "Conde John"
 challenge_character_john_ulster_desc: "Por direito de uma espada ao seu lado e com a ajuda de alguns homens fortes, John de Courcy tornou-se senhor do leste do Ulster até sua queda e encarceramento às mãos de um rei inglês que suspeitava de suas ambições.\n\n#bold Você consegue terminar o que John começou e garantir que o estandarte dos Courcy tremule sobre toda a Irlanda?#!"
 #Rogier
 challenge_character_rogier_albi: "Conde Rogier"
 challenge_character_rogier_albi_desc: "Embora talvez não tenham abraçado abertamente a doutrina, os Trencavels eram conhecidos por sua controversa tolerância e simpatia pelos hereges cátaros que se espalharam por suas terras.\n\n#bold Você consegue proteger os cátaros da perseguição e garantir que sua fé floresça?#!"
 #Khusraw Malik
 challenge_character_khusraw_malik_punjab: "Sultão Khusraw Malik"
 challenge_character_khusraw_malik_punjab_desc: "Ameaçado por inimigos em todas as direções, Khusraw Malik lutou bravamente para preservar o reino de seus ancestrais, mas sua linhagem chegou ao fim logo pelas mãos de um carrasco gurida.\n\n#bold Você consegue lutar para recuperar uma posição de força e repetir as conquistas de Mahmud de Ghazni?#!"
 #Kulin
 challenge_character_kulin_bosna: "Doux Kulin"
 challenge_character_kulin_bosna_desc: "Preso entre as ambições bizantinas e húngaras nos Bálcãs, Kulin explorou com astúcia o conflito entre as duas grandes potências para preservar sua autonomia e expandir sua influência.\n\n#bold Você conseguirá libertar-se de seu suserano e inaugurar uma era dourada de paz e prosperidade para a Bósnia?#!"
 #Nur al-Din Muhammed
 challenge_character_nur_al_din_muhammed_nizari: "Imã Muhammed"
 challenge_character_nur_al_din_muhammed_nizari_desc: "De fortalezas formidáveis nas montanhas da Pérsia, Muhammed desfrutou de um longo governo como imã hereditário dos Nizaris, que o reconheciam como o único legítimo guardião de sua fé por sua descendência de Nizar.\n\n#bold Você consegue propagar sua doutrina e alcançar ampla aceitação para sua fé?#!"
 #Algimantas
 challenge_character_algimantas_lithuanians: "Alto Chefe Algimantas"
 challenge_character_algimantas_lithuanians_desc: "Algimantas e seus herdeiros conseguiram manter um principado pagão por mais tempo do que qualquer outro povo da Europa, resistindo com sucesso à conversão até o final do século XIV.\n\n#bold Já que os cristãos insistem tanto em converter seu povo, você consegue abrir os olhos deles para a verdade do vidilismo?#!"
 #Sargis
 challenge_character_sargis_greater_armenia: "Duque Sargis"
 challenge_character_sargis_greater_armenia_desc: "Um formidável vassalo armênio do rei da Geórgia, as lealdades de Sargis podem ter sido às vezes duvidosas, mas sua influência e poder eram tais que ele não podia ser ignorado.\n\n#bold Você consegue partir por conta própria para restaurar a Grande Armênia de seus antigos antepassados?#!"
 #Aba
 challenge_character_aba_socotra: "Emir Aba"
 challenge_character_aba_socotra_desc: "O isolamento de Socotra permitiu que ela permanecesse como uma ilha de nestorianismo por séculos, e seus habitantes raramente recebiam alguém além de suas costas rochosas.\n\n#bold Você consegue conduzir seu povo para fora de sua posição precária e alcançar fama imperecível além do horizonte?#!"
 #Prithviraja
 challenge_character_prithviraja_rajputana: "Maharaja Prithviraja"
 challenge_character_prithviraja_rajputana_desc: "Prithviraja lutou valentemente contra incursões repetidas dos gúridas, triunfando sobre os invasores em pelo menos uma grande batalha, mas encontrou seu fim como prisioneiro dos gúridas.\n\n#bold Você consegue repelir a ameaça gúrida e garantir o futuro da dinastia Chauhan?#!"
 #Renaud
 challenge_character_renaud_kerak: "Conde Renaud"
 challenge_character_renaud_kerak_desc: "O mais feroz e virulento oponente de Salāh al-Dīn no reino de Jerusalém, o ataque de Renaud a uma caravana de peregrinos muçulmanos trouxe a perda de Jerusalém e sua própria execução nas mãos do Sultão do Egito.\n\n#bold A história se lembra de Renaud como um saqueador voraz. Você consegue garantir um legado mais nobre para ele?#!"
 #Henry
 challenge_character_henri_champagne: "Duque Henri"
 challenge_character_henri_champagne_desc: "O governo esclarecido de Henri, educado nas artes liberais, trouxe grande prosperidade ao seu povo, com as célebres feiras de Champagne atraindo mercadores e suas valiosas mercadorias de toda a Europa.\n\n#bold Você consegue transformar Champagne em sinônimo de paz e prosperidade?#!"
 #Richard
 challenge_character_richard_poitiers: "Príncipe Richard"
 challenge_character_richard_poitiers_desc: "Nascido como o terceiro filho, os caprichos do destino colocaram Ricardo no trono da Inglaterra, e suas campanhas subsequentes na Terra Santa lhe renderam glória eterna como #italic Ricardo Coração de Leão#!.\n\n#bold Apesar de toda sua fama, as batalhas de Richard renderam poucos ganhos permanentes. Você consegue aproveitar sua segunda chance para conquistar uma vitória digna de seu nome?#!"
 #Maghan
 challenge_character_maghan_sibi: "Maghan Kon Fatta"
 challenge_character_maghan_sibi_desc: "As lendas dizem que um caçador profetizou certa vez que, se Maghan se casasse com uma mulher feia, seu filho seria um rei grande e poderoso. Seja qual for a veracidade da história, Sunjata, o filho de Maghan, de fato acabou fundando o império do Mali.\n\n#bold Você consegue transformar a humilde profecia do caçador em realidade e fundar um novo império?#!"
 #Mohammed
 challenge_character_mohammed_azerbaijan: "Jahan Pahlavan Mohammed"
 challenge_character_mohammed_azerbaijan_desc: "Habilidoso fazedor de reis dos últimos sultões seljúcidas, Mohammed governou o império em tudo, menos no nome, embora seus descendentes tenham sido incapazes de resistir ao avanço corásmio.\n\n#bold Você tem o próprio sultão em suas mãos. Use-o bem, e toda a Pérsia se curvará à sua vontade!#!"
 #Heinrich
 challenge_character_heinrich_angria: "Heinrich, o Leão"
 challenge_character_heinrich_angria_desc: "Um rival amargo do Imperador do Sacro Império Romano-Germânico, Heinrich foi o magnata mais poderoso do império em sua época, mas sua inimizade com o imperador acabaria sendo sua ruína.\n\n#bold Você consegue triunfar onde o Heinrich histórico fracassou e vencer sua nêmesis Hohenstaufen?#!"
