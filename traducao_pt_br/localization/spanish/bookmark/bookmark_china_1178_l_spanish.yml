l_spanish:
 bm_1178_china: "Agitação no Céu"
 bm_1178_china_desc: "A China está dividida. O Filho do Céu foi expulso das Planícies Centrais pelos invasores jurchen, e as figuras mais proeminentes do império optaram por seguir uma política de apaziguamento vergonhoso em vez de reclamar as terras de seus antepassados.\n\nTigres e lobos vagam desenfreados, e os rios correm vermelhos com o sangue dos justos. Para permitir que tal destino calamitoso recaísse sobre o império, o desagrado do Céu deve ser profundo.\n\n#bold El pueblo reclama un héroe que ponga fin al desorden, ¿quién responderá a la llamada?#!"
 bookmark_china_1178_xin_qiji: "Intendente Xīn Qìjí"
 bookmark_china_1178_xin_qiji_subheading: "$BOOKMARK_SUBHEADING_GOVERNOR$"
 bookmark_china_1178_xin_qiji_desc: "Xīn Qìjí, órfão desde a infância, foi criado por seu avô, que lhe incutiu um desejo fervoroso de expulsar os invasores jurchen das planícies centrais.\n\nXīn Qìjí ganhou fama ao vingar o assassinato de seu comandante, mas aí terminam seus feitos; seu sonho de conter a maré jurchen foi frustrado repetidas vezes pela política de apaziguamento dos Song.\n\n#bold ¿Conseguirá Xīn Qìjí reclamar el norte o dirigirá sus energías hacia otras empresas?#!"
 bookmark_china_1178_zhang_shi: "Governador Zhāng Shì"
 bookmark_china_1178_zhang_shi_subheading: "$BOOKMARK_SUBHEADING_MILITARY_GOVERNOR$"
 bookmark_china_1178_zhang_shi_desc: "Zhāng Shì, filho de um herói militar, é tão realizado como erudito e filósofo quanto seu pai o foi como general.\n\nEmbora seja respeitado por seus escritos, seu futuro político é incerto devido à sua fervorosa defesa pela reconquista dos territórios do norte da dinastia Jin; uma proposta profundamente impopular entre aqueles que preferem a paz à guerra.\n\n#bold Será Zhāng Shì aquele que moverá o mundo, ou ele, como tantos outros, simplesmente se moverá com ele?#!"
 bookmark_china_1178_zhu_xi: "Prefeito Zhū Xī"
 bookmark_china_1178_zhu_xi_subheading: "$BOOKMARK_SUBHEADING_GOVERNOR$"
 bookmark_china_1178_zhu_xi_desc: "Reconhecido como um jovem prodígio, Zhū Xī demonstrou que suas conquistas não são glórias passageiras; rejeitando o taoismo e o budismo, dedicou-se ao estudo da filosofia confuciana, e agora seus escritos circulam amplamente enquanto aspirantes a eruditos competem pelo privilégio de assistir a uma de suas palestras.\n\n#bold Amplamente aclamado por suas obras escritas e reflexões filosóficas, talvez a busca pelo poder posicione melhor Zhū Xī para ver sua sociedade ideal realizada?#!"
 bookmark_china_1178_li_renxiao: "Nínglìng Ngwemi Renxiao"
 bookmark_china_1178_li_renxiao_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_china_1178_li_renxiao_desc: "Após quase quatro décadas no trono, o povo de Renxiao se gaba de que o seu é o maior e mais próspero reinado que o reino tangute já conheceu. No entanto, por mais glorioso que seja o presente, o futuro reserva mais incerteza.\n\nFaz menos de dez anos que Renxiao mandou executar seu próprio primeiro-ministro e seus generais após uma tentativa fracassada de golpe de Estado, e as relações entre o rei e a soldadesca nunca mais foram as mesmas desde então.\n\n#bold ¿Podrás guardar al gran Xia de la depredación de sus vecinos?#!"
 bookmark_china_1178_tudan_xixian: "Comandante Túdān Xíxiǎn"
 bookmark_china_1178_tudan_xixian_subheading: "$BOOKMARK_SUBHEADING_GOVERNOR$" #meritorcatic khan
 bookmark_china_1178_tudan_xixian_desc: "Descendente de um dos clãs jurchen mais nobres e marido de uma princesa da casa imperial Jin, a linhagem de Xíxiǎn é tão impecável quanto sua habilidade no tiro com arco e na equitação.\n\nTaciturno, de princípios morais e hábil em assuntos de guerra, sua reputação é tal que se diz que ele equivale a um exército de dez mil homens.\n\n#bold La dinastía Jin ha ocupado las llanuras centrales, pero el sur aún resiste. ¿Quién mejor para terminar la conquista que el más grande de los generales yurchen?#!"
