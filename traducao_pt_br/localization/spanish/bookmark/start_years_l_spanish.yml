l_spanish:
 start_year_1178_10_01_desc: "A era das cruzadas está em pleno andamento em 1178 d.C. O rei leproso Baudouin senta-se no trono do reino cruzado de Jerusalém, um domínio com futuro tão incerto quanto o seu, enquanto o novo sultão do Egito, Salāh al-Dīn, prepara-se para reivindicar a Terra Santa de uma vez por todas. Enquanto isso, ao norte, o Império Bizantino enfrenta a perda de seu controle sobre a Anatólia e a perspectiva iminente de um novo imperador no trono pela primeira vez em quase quatro décadas, com toda a intriga que isso implica."
 start_year_1066_09_15_desc: "O retorno do cometa Halley anuncia um turbulento 1066 d.C., enquanto grandes conflitos eclodem por todo o mundo. Enquanto os seljúcidas avançam cada vez mais pelas terras bizantinas e o povo cingalês se levanta contra seus opressores no Sri Lanka, uma guerra total estourou na Inglaterra, onde três pretendentes buscam a coroa para si. As tensões aumentam na fragmentada Península Ibérica enquanto governantes tribais observam a mudança no equilíbrio de poder no continente, em igual medida com medo e ganância."
 start_year_867_01_01_desc: "No ano de 867 d.C., invasores do norte aterrorizam litorais e margens de rios, enquanto a Europa permanece dividida sob os carolíngios. No subcontinente indiano, a luta tripartida entre as dinastias Pratihara, Pala e Rashtrakuta arde há décadas, mas o conflito ainda está apenas no início."
 bm_group_867: "867"
 bm_group_1066: "1066"
 bm_group_1178: "1178"
