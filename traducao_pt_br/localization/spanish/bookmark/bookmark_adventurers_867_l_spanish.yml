l_spanish:
 bm_867_adventurers: "Os Grandes Aventureiros"
 bm_867_adventurers_desc: "Cada dinastia começa de forma humilde. A escalada ao poder geralmente é um processo lento, com cada geração avançando alguns degraus na escada, através de casamentos cuidadosamente planejados e guerras incessantes.\n\n #bold Mas estes são tempos de grandes mudanças e tumultos. Com muita coragem, e talvez um pouco de sorte, um herói pode elevar o nome de sua família da obscuridade à lenda. Você está pronto para aceitar o desafio?#!"
 #Jarl Haesteinn
 bookmark_adventurers_jarl_haesteinn: "Jarl Hæsteinn"
 bookmark_adventurers_jarl_haesteinn_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_adventurers_jarl_haesteinn_desc: "Graças à sua astúcia e coragem, o jarl Hæsteinn se tornou um homem rico. Após liderar uma lucrativa incursão pelo Mediterrâneo junto com Björn Braço de Ferro, ele se estabeleceu na Bretanha. Os francos têm cofres muito generosos, e um poderoso guerreiro viking seria um grande aliado em tempos de turbulência política.\n\n#bold Pero la fortuna siempre va acompañada de enemigos. ¿Podrá la codicia con Hastein o su dinastía prosperará bajo tu batuta?#!"
 bookmark_adventurers_jarl_haesteinn_alt_ragnarr: "$Ragnarr$"
 bookmark_adventurers_jarl_haesteinn_alt_ragnarr_desc: "alt desc"
 #Rurik Rurikid
 bookmark_adventurers_rurik_rurikid: "Rurik Rurikid"
 bookmark_adventurers_rurik_rurikid_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_adventurers_rurik_rurikid_desc: "Poucos alcançaram a grandeza partindo do nada como o valente Rurik! Junto com seus irmãos, ele trouxe ordem às terras selvagens do Leste e, após a morte deles, ele é o único governante de um grande território. No entanto, isso é apenas o começo.\n\n#bold Un día, los descendientes de Rúrik fundarán el Zarato de Rusia. ¿O no? ¡El destino de esta gran dinastía está en tus manos!#!"
 bookmark_adventurers_rurik_rurikid_alt_helgi: "$Helgi$ $nick_the_seer$"
 #Eudes Capet
 bookmark_adventurers_count_eudes: "Conde Eudes"
 bookmark_adventurers_count_eudes_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_adventurers_count_eudes_desc: "Em julho de 866, o chefe viking Hastein matou Roberto, o Forte, pai de Eudes. Poucos meses depois, sua mãe Adelaide morreu ao dar à luz seu irmão Roberto. O mundo é cruel e o futuro pode parecer incerto, mas esses meninos órfãos estão destinados a sentar-se no trono francês. Seus descendentes, os Capetos, governarão a França por séculos.\n\n#bold ¿Podrás navegar por la traicionera política de la Francia medieval y cumplir el destino de los hermanos robertinos?#!"
 bookmark_adventurers_count_eudes_alt_robert: "$Roberto$"
 bookmark_adventurers_count_eudes_alt_robert_desc: "alt desc"
 bookmark_adventurers_count_eudes_alt_uncle_eudes: "$Eudes$"
 bookmark_adventurers_count_eudes_alt_uncle_eudes_desc: "alt desc"
 #Almos Arpad
 bookmark_adventurers_almos_arpad: "Álmos Árpád"
 bookmark_adventurers_almos_arpad_subheading: "$BOOKMARK_SUBHEADING_KHAN_WITH_THE$"
 bookmark_adventurers_almos_arpad_desc: "Quando as sete tribos húngaras se uniram para escolher um líder supremo, seus votos recaíram sobre o valente Álmos. Um dia, seu filho Árpád seguirá seus passos — mas apenas se os húngaros conseguirem manter sua independência. O perigo se aproxima pelo leste.\n\n#bold ¿Podrás defender a los húngaros y llevarlos a la grandeza? ¡Esta es tu oportunidad de relatar las aventuras de la dinastía Árpád!#!"
 #Daurama Daura
 bookmark_adventurers_daurama_daura: "Daurama Daura"
 bookmark_adventurers_daurama_daura_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_adventurers_daurama_daura_desc: "Como a última Magajiya de Daura, Daurama é um símbolo das tradições do povo Hausa. Seu novo marido, Bayajiddah (originário do Iraque), representa a mudança e a chegada de cada vez mais estrangeiros à terra dos Hausa, trazendo com eles suas estranhas crenças e culturas…\n\n#bold Daurama pasará a la historia como la última Magajiya, pero ¿es necesario que lo sea?#!"
 bookmark_adventurers_daurama_daura_alt_bawo: "$Bawo$"
 bookmark_adventurers_almos_arpad_alt_son_arpad: "$A_rpA_d$"
 bookmark_adventurers_almos_arpad_alt_linutika: "$LinU_tika$"
 #EVENTS
 bookmark.0101.t: "O que há em um nome?"
 bookmark.0101.desc_intro: "Há gerações, [hausaland.GetNameNoTier] é governada pelas Magajiya, uma linhagem de governantes matriarcais da qual sou a última representante.\n\nNossas tradições têm nos servido bem, mas o mundo está mudando. Os feitos heroicos de meu [ROOT.Char.Custom2('RelationToMeShort', bayajidda)] [bayajidda.GetFirstName] lhe renderam grande riqueza e respeito… embora venha de terras distantes, seus sucessos também anunciam grandes mudanças para meu povo.\n\n"
 bookmark.0101.desc_living: "Meu filho, [bewo.GetTitledFirstName|l], é a alegria dos olhos de seu pai. Embora seja apenas um bebê, me pergunto se ele se identificará mais com seu pai aventureiro ou com meu legado tradicional?"
 bookmark.0101.desc_dead: "Meu filho, [bewo.GetTitledFirstName|l] era a alegria dos olhos de seu pai. Embora ainda seja só um bebê, me pergunto se ele se identificará mais com o legado de aventura de seu pai, ou com meu próprio legado tradicional?"
 bookmark.0101.a: "[bewo.GetFirstNameNoTooltip] deve carregar as tradições da [ROOT.Char.GetCulture.GetNameNoTooltip] para uma nova era."
 bookmark.0101.a.tt: "[bewo.GetUIName] se tornará seu [player_heir|lE]"
 bookmark.0101.b: "Meu filho é meu filho, seja qual for seu nome ou cultura."
 bookmark.0101.b.tt: "#warning @warning_icon! Esta opção pode deixar você sem um [player_heir|lE]!#!"
 bookmark.0101.c: "A Magajiya não precisa de homens para continuar seu legado!"
 bookmark.0101.c.tt: "Sua irmã [shawata.GetUIName] continuará sendo sua [Concept( 'player_heir', 'heredera jugable' )|E]"
 #Credit to Stu Taylor of Dead Good Comics for the title line and entire lead-in to this event.
 bookmark.0211.t: "Em Memória do Seu Bom Gosto"
 #Historically, both of Michael's hands were severed — we don't have a portrait modifier for that, I'm afraid, so we pretend it was just the one.
 bookmark.0211.desc: "O cadáver de [michael.GetFirstName] jaz em posição fetal diante de mim; o jorro inicial de sangue de seu membro decepado agora se reduziu a um filete. Uma boa noite, mesmo que [Glossary( 'hayamos atacado antes de lo previsto', 'BOOKMARK_0211_MICHAEL_III_DEATH_GLOSS' )].\n\nImperador #EMP superior#!. Bah, um idiota sem talento nem estômago para a política. Com todas as vantagens que Deus pode dar a um homem, e ainda assim perdeu tudo para um[basil.Custom('ES_XA')] sem nome das províncias.\n\nClaro que já não sou [Select_CString( basil.IsFemale, 'una mera provinciana', 'un mero provinciano' )]. A partir desta noite, sou #EMP [basil.Custom('ES_ElLa')]#! [Select_CString( basil.IsFemale, 'emperatriz', 'emperador' )], [basil.GetTitledFirstName|l], primeiro[basil.Custom('ES_OA')] da que certamente será a gloriosa dinastia de [basil.GetDynasty.GetName].\n\nEsvaziando a taça —um dos vinhos favoritos de [michael.GetFirstNameNoTooltip]—, pondero como a história se lembrará do jovem. Como #EMP permitiré#! que a história se lembre dele."
 bookmark.0211.a: "Ele morreu bêbado, ele permanecerá um bêbado!"
 bookmark.0211.a.flavour: "Você e sua prole caluniarão [michael.GetFirstNameNoTooltip] por décadas após sua morte, fazendo dele um bêbado e um perdulário."
 bookmark.0211.b: "O tolo me deu sua família, seu trono e sua vida. Isso é suficiente."
 bookmark.0211.b.flavour: "Permite que a reputação de [michael.GetFirstNameNoTooltip] se recupere, e celebra a restauração das práticas iconófilas de sua mãe durante a regência dela por ele como algo quase santo."
 bookmark.0211.c: "Este realmente é um vinho particularmente fino..."
 bookmark.0211.c.flavour: "Permites que a lembrança de [michael.GetFirstNameNoTooltip] se apague naturalmente... em sua maior parte."
 BOOKMARK_0211_MICHAEL_III_DEATH_GLOSS: "Historicamente, Michael III foi assassinado em 24 de setembro de 867, em vez de 31 de dezembro de 866. Sua data de morte foi antecipada em Crusader Kings 3 por motivos de jogabilidade."
