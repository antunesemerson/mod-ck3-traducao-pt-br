l_spanish:
 bm_867_mandalas: "Deuses Vivos na Terra"
 bm_867_mandalas_desc: "Não há lugar onde o poder régio e o poder espiritual estejam tão intimamente entrelaçados quanto no Sudeste Asiático. Por séculos, as fés dhármicas conquistaram um domínio mais firme sobre seu povo, mas foi apenas no último século que aqueles que antes foram reis começaram a assumir o título de devaraja, reis-deuses.\n\n#bold Qual destes reis-deuses erguerá um legado de devoção, e quem será derrotado e esquecido?#!"
 bookmark_mandalas_867_jayavarman_angkor: "Jayavarman III"
 bookmark_mandalas_867_jayavarman_angkor_subheading: "Sdach de Angkor"
 bookmark_mandalas_867_jayavarman_angkor_desc: "Angkor tem sido uma nova potência em ascensão desde os tempos de Jayavarman II, o primeiro de sua linhagem a assumir o título de devaraja. Após sua morte, o reino mal é reconhecível como o grande império que um dia foi, reduzido a pouco mais que uma cidade-estado.\n\nMas ser o deus dos khmer não é um papel fácil de dominar. Jayavarman III teve dificuldades para superar seu predecessor e se tornar ele mesmo um grande arquiteto.\n\n#bold Os Varman estarão à altura de seu legado divino? Ou serão esquecidos como tantos outros antes deles?#!"
 bookmark_mandalas_867_indra: "Indra"
 bookmark_mandalas_867_indra_subheading: "Rajá de Kutai"
 bookmark_mandalas_867_indra_desc: "O pequeno reino de Kutai foi um dos primeiros do arquipélago a convidar sacerdotes hindus para apoiar seu governo.\n\nNo entanto, a dinastia Segara não conseguiu transformar essa aliança no tipo de autoridade visto em outros lugares, governando um reino sustentado tanto por lealdades tribais quanto por cerimônias religiosas.\n\n#bold Indra continuará o caminho para se tornar um mandala, ou retornará às suas raízes e abraçará os costumes dos estados tribais da ilha?#!"
 bookmark_mandalas_867_padumaraja: "Padumaraja"
 bookmark_mandalas_867_padumaraja_subheading: "Sdach de Haripuñjaya"
 bookmark_mandalas_867_padumaraja_desc: "Ainda não tão promissora quanto as metrópoles em ascensão de Pagan ou Angkor, a pequena cidade-estado mon de Haripunjaya muitas vezes desempenhou o papel de vassalo subserviente, apesar de sua posição privilegiada entre esses reinos.\n\nPadumaraja é o último dos Haripunjaya, uma dinastia com grandes ambições que, até agora, não conseguiu alcançar uma posição mais elevada.\n\n#bold Será Padumaraja quem finalmente elevará sua dinastia rumo aos deuses?#!"
 bookmark_mandalas_867_lokapala: "Lokapala"
 bookmark_mandalas_867_lokapala_subheading: "Rajá de Mataram"
 bookmark_mandalas_867_lokapala_desc: "Lokapala assumiu o controle de toda a parte oriental de Java e agora desfruta de grande poder direto. Porém, a parte ocidental da ilha ainda presta tributo aos seus rivais, os imperadores de Srivijaya.\n\n#bold O destino dos Sanjayas é estender seu poder sobre as outras ilhas, ou eles acabarão como tributários periféricos do império naval de Srivijaya?#!"
 bookmark_mandalas_867_pyinbya: "Pyinbya"
 bookmark_mandalas_867_pyinbya_subheading: "Rajá de Pagan"
 bookmark_mandalas_867_pyinbya_desc: "Pagan, uma das várias cidades rivais no vale do Irrawadi, agora é uma potência regional que domina um grande número de vassalos tributários.\n\nPyinbya de Pagan vem de uma longa linhagem de reis locais, mas é ele quem transformou uma cidade em um senhorio ambicioso.\n\n#bold Pyinbya transformará Pagan na grandiosa capital que ela está destinada a será#!"
 bookmark_mandalas_867_tanet: "Tanet"
 bookmark_mandalas_867_saladu: "Saladu"
