l_spanish:
 bm_1178_swords_of_faith: "Espadas da Fé"
 bm_1178_swords_of_faith_desc: "Impulsionados pelo fervor religioso e pela promessa de recompensas tanto espirituais quanto temporais, príncipes e mendigos marcharam rumo ao leste em nome de Deus, do ouro e da glória eterna.\n\nSua guerra santa lhes rendeu o reino de Jerusalém e agora, quase um século depois, seus herdeiros lutam para manter o legado dos cruzados diante de potentados muçulmanos tão poderosos quanto Salah ad-Din Yusuf, o novo sultão do Egito.\n\n#bold Esta é a era das cruzadas, na encruzilhada entre o zelo religioso e a ambição mundana. Escolha seu caminho com sabedoria, pois que prêmio é maior que a própria Terra Santa?#!"
 bookmark_swords_of_faith_saladin: "Salāh al-Dīn Yusuf"
 bookmark_swords_of_faith_saladin_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_swords_of_faith_saladin_saphadin: "Sayf al-Dīn Ahmad"
 bookmark_swords_of_faith_saladin_ali: "Ali"
 bookmark_swords_of_faith_saladin_desc: "O último vizir dos fatímidas até agora provou ser um sucessor enérgico e capaz da dinastia que destronou, apesar de uma recente derrota nas mãos do jovem e leproso rei de Jerusalém.\n\nEmbora o califa abássida o tenha nomeado formalmente sultão do Egito e da Síria, enquanto os descendentes dos cruzados se apegarem às conquistas de seus antepassados, seu reino jamais estará verdadeiramente completo.\n\n#bold Podem os aiúbidas impor-se sobre o reino de Jerusalém para reclamar a Terra Santa, ou a queda desta nova dinastia será tão repentina quanto a sua ascensão?#!"
 bookmark_swords_of_faith_sibylla: "Princesa Sibylla"
 bookmark_swords_of_faith_sibylla_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_swords_of_faith_sibylla_baudouin: "Rei Baudouin de Jerusalém"
 bookmark_swords_of_faith_sibylla_baudouin_son: "Baudouin"
 bookmark_swords_of_faith_sibylla_desc: "Jerusalém já conheceu uma rainha em sua breve história e parece que em breve verá outra. O rei Balduíno, irmão de Sibila, governou com habilidade apesar da lepra, mas é apenas uma questão de tempo até que a doença lhe tire a vida.\n\nComo uma jovem viúva e herdeira reconhecida de seu irmão, a mão de Sibila é avidamente cobiçada por muitos, e uma aliança forte poderia fazer muito para fortalecer sua posição.\n\n#bold A situação de Jerusalém é perigosa e seu rei não durará muito neste mundo. Você pode ascender ao trono e garantir que ele não apenas sobreviva, mas prospere?#!"
 bookmark_swords_of_faith_levon: "Conde Levon"
 bookmark_swords_of_faith_levon_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_swords_of_faith_levon_roupen: "Príncipe Roupen da Cilícia"
 bookmark_swords_of_faith_levon_desc: "A morte já atingiu a família de Leão duas vezes: primeiro veio buscar seu pai, vítima da traição bizantina; depois voltou para seu tio, um apóstata tirânico assassinado por seus próprios cortesãos, com medo de que fossem os próximos a sofrer suas crueldades.\n\nAgora, Rubén, o irmão de Leão, governa na Cilícia; um homem de temperamento santo que preside um ninho de víboras repleto de intrigas e ambição, e talvez seja apenas uma questão de tempo até que a morte ataque pela terceira vez.\n\n#bold Você conseguirá superar o legado familiar de conflitos internos e transformar a Cilícia em um reino por direito próprio?#!"
 bookmark_swords_of_faith_gokbori: "Muzaffar al-Dīn Gökböri"
 bookmark_swords_of_faith_gokbori_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_swords_of_faith_gokbori_ghazi: "Sayf al-Dīn Ghazi"
 bookmark_swords_of_faith_gokbori_yusuf: "Zayn al-Dīn Yusuf"
 bookmark_swords_of_faith_gokbori_desc: "Privado de seu patrimônio e forçado ao exílio em favor de um irmão mais novo, Gökböri emprestou sua espada e bravura a um príncipe zêngida e conquistou para si um novo feudo em Harran.\n\nSeu serviço a seu novo senhor tem sido constante, mas o príncipe a quem serve jaz acometido por uma doença da qual provavelmente não sobreviverá, e Gökböri sabe bem que a lealdade deve ter seus limites, e que um futuro incerto muitas vezes anuncia oportunidades.\n\n#bold O sultão do Egito demonstrou até onde um homem de vontade e habilidade pode chegar. Você consegue seguir seus passos e fundar uma nova dinastia própria?#!"
 bookmark_swords_of_faith_raimon: "Duque Raimon"
 bookmark_swords_of_faith_raimon_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_swords_of_faith_raimon_eschiva: "Eschiva"
 bookmark_swords_of_faith_raimon_desc: "Privado de seu pai ainda jovem por assassinos nizari, Raimon vem lutando contra saqueadores turcomanos desde os dezessete anos, contratou corsários para devastar as costas bizantinas e suportou quase uma década de cativeiro em uma prisão zêngida.\n\nUma vez libertado, foi a escolha natural para servir como regente do rei criança Balduíno, mas esse jovem leproso agora já atingiu a maioridade e Raimon voltou às suas terras para refletir sobre o futuro do reino, assim como o seu próprio.\n\n#bold Você provou e renunciou ao poder de um rei, e continua sendo um pilar do reino. O que fará com sua influência?#!"
 #EVENTS
 bookmark.0300.t: "O Filho do Pai?"
 bookmark.0300.desc: "Mi difunto esposo, [dead_husband.GetFirstName], murió meses antes del nacimiento de nuestro hijo. La criatura nunca conocerá a su padre y no es poca la distancia que le separa de su familia paterna.\n\nPor generoso y valiente que fuera su padre, nuestro matrimonio #italic fue#! breve y su nombre tiene poco peso aquí…\n\nSi [baby_baudouin.GetFirstName] ha de llevar un día una corona sobre la sien, podría beneficiarle permitir que el recuerdo de su padre se difuminara y en lugar de eso criarlo en las tradiciones de su propio linaje real."
 bookmark.0300.a: "Eu criarei [baby_baudouin.GetFirstNameNoTooltip] para se ver primeiro como um [ROOT.Char.GetHouse.GetBaseNameNoTooltip]."
 bookmark.0300.b: "Não, devemos honrar a memória de [dead_husband.GetFirstNameNoTooltip]."
 bookmark.0300.b.tt: "#warning @warning_icon! Esta opção deixará você com um [player_heir|lE] que não será de sua dinastia!#!"
