l_spanish:
 martial_good_trait_match_good_outcome: "Como [ROOT.Char.GetFirstName] é um[ROOT.Char.Custom('ES_XA')] crinç[ROOT.Char.Custom('ES_OA')] ativ[ROOT.Char.Custom('ES_OA')] e entusiasmado, não é surpresa que tenha se saído bem em seus estudos sobre guerra e combate."
 martial_bad_trait_match_good_outcome: "Dizer que o indisciplinado [ROOT.Char.GetFirstName] não parecia feito[ROOT.Char.Custom('ES_OA')] para uma vida de guerra seria um eufemismo. No entanto, ele desafiou todas as expectativas."
 martial_neutral_trait_match_good_outcome: "Com tutela suficiente, mesmo uma criança que tenha mostrado pouca inclinação natural para a guerra, como [ROOT.Char.GetFirstName], pode chegar a entender verdadeiramente o assunto."
 education_martial_3_outcome_description: "[ROOT.Char.GetFirstName] mostrou grande aptidão tanto em táticas de guerra quanto na condução de exércitos. Estou certo de que um[ROOT.Char.Custom('ES_XA')] grande comandante."
 education_martial_3_outcome_description_not_commander: "[ROOT.Char.GetFirstName] mostrou grande aptidão tanto em táticas de batalha quanto na administração de exércitos. É uma pena que nunca vá comandar exércitos."
 education_martial_4_outcome_description: "É impressionante ver tal habilidade em alguém tão jovem. [ROOT.Char.GetFirstName] demonstra um nível de percepção raro até mesmo entre comandantes veteranos!"
 martial_good_trait_match_bad_outcome: "A natureza enérgica de [ROOT.Char.GetFirstName] era considerada um sinal de afinidade com a guerra e o combate, mas talvez fosse apenas indisciplina."
 martial_bad_trait_match_bad_outcome: "[ROOT.Char.GetFirstName] nunca demonstrou muito interesse pelo assunto da guerra, mas eu sempre esperava que pudesse ser apenas uma fase passageira. Fui ingênuo."
 martial_neutral_trait_match_bad_outcome: "Por muito tempo, eu esperava que uma boa tutela seria suficiente para ensinar [ROOT.Char.GetFirstName] as intrincadezas da guerra. Fui ingênuo."
 education_martial_1_outcome_description: "[ROOT.Char.GetSheHe|U] entende minimamente a matéria. Ao menos sabe como segurar uma espada e até sabe distinguir um infante de um $knight_culture_player_no_tooltip_lowercase$."
 education_martial_2_outcome_description: "[ROOT.Char.GetFirstName|U] adquiriu um entendimento básico do assunto. Ao menos já aprendeu o essencial para comandar um exército. Só espero que o resto venha com a experiência."
 education_martial_prowess_1_outcome_description: "\n\nEm nível pessoal, aproveitou pouco seus estudos $knight_culture_player_adjective_no_tooltip_lowercase$ s, e é bastante desajeitado em combates um contra um."
 education_martial_prowess_2_outcome_description: "\n\nEm nível pessoal, também conseguiu lutar com sucesso contra pequenos grupos de camponeses rebeldes, demonstrando ser um[ROOT.Char.Custom('ES_XA')] $knight_culture_player_no_tooltip_lowercase$ competente."
 education_martial_prowess_3_outcome_description: "\n\nA nível pessoal, ela/ele provou ser um combatente bem-sucedido em combate corpo a corpo, capaz de empunhar sua espada e seu séquito pessoal como uma unidade coesa."
 education_martial_prowess_4_outcome_description: "\n\nEm nível pessoal, demonstrou ser um[ROOT.Char.Custom('ES_XA')] guerreir[ROOT.Char.Custom('ES_OA')] incrivelmente competente e dominar até mesmo as formas mais difíceis da luta tradicional [ROOT.Char.GetCulture.GetNameNoTooltip]."
 diplomacy_good_trait_match_good_outcome: "Desde pequen[ROOT.Char.Custom('ES_OA')]; [ROOT.Char.GetFirstName] sempre sempre teve facilidade com as palavras. Não é surpresa, então, que tenha se saído bem no estudo das relações diplomáticas."
 diplomacy_good_trait_match_bad_outcome: "Apesar de ser uma criança muito tagarela[ROOT.Char.Custom('ES_XA')], [ROOT.Char.GetFirstName] às vezes tem dificuldade para se dar bem com as pessoas."
 diplomacy_bad_trait_match_good_outcome: "Apesar de raramente se dar bem com outras crianças, [ROOT.Char.GetFirstName] mostrou uma aptidão surpreendente para manobras diplomáticas."
 diplomacy_bad_trait_match_bad_outcome: "[ROOT.Char.GetFirstName] se concentrou tanto no que #EMP [ROOT.Char.Custom('ES_ElElla')]#! queria, então talvez não seja nenhuma grande surpresa que lhe tenha custado aprender a influenciar os outros."
 diplomacy_neutral_trait_match_good_outcome: "Com a tutoria adequada, até mesmo uma[ROOT.Char.Custom('ES_XA')] crianç[ROOT.Char.Custom('ES_OA')] como [ROOT.Char.GetFirstName], que demonstrou pouca inclinação natural para a influência diplomática, pode chegar a compreendê-la plenamente."
 diplomacy_neutral_trait_match_bad_outcome: "Por muito tempo, eu estava esperando que uma boa tutela seria suficiente para ensinar [ROOT.Char.GetFirstName] as complexidades da diplomacia. No entanto, todos os esforços foram em vão."
 stewardship_good_trait_match_good_outcome: "[ROOT.Char.GetFirstName] é um[ROOT.Char.Custom('ES_XA')] administrador[ROOT.Char.Custom('ES_XA')] nat[ROOT.Char.Custom('ES_OA')] e a ninguém deveria surpreender que tenha avançado tanto em seus estudos sobre a administração do reino."
 stewardship_good_trait_match_bad_outcome: "Apesar de sempre parecer buscar autoridade e ordem, [ROOT.Char.GetFirstName] não se tornou tão proficiente quanto o esperado na administração de terras e pessoas."
 stewardship_bad_trait_match_good_outcome: "Apesar de estar mais interessado em rumores sobre o povo do reino do que seus impostos e censo, [ROOT.Char.GetFirstName] desenvolveu aptidão para administração."
 stewardship_bad_trait_match_bad_outcome: "Talvez sem surpresa, a obsessão de [ROOT.Char.GetFirstName] pelos detalhes minuciosos das vidas das pessoas não foi benéfica para sua compreensão da administração de um reino inteiro."
 stewardship_neutral_trait_match_good_outcome: "Com a tutoria adequada, até mesmo um[ROOT.Char.Custom('ES_XA')] criança[ROOT.Char.Custom('ES_OA')] como [ROOT.Char.GetFirstName], que demonstrou pouca inclinação natural para a administração, pode chegar a compreendê-la de verdade."
 stewardship_neutral_trait_match_bad_outcome: "Por muito tempo eu esperava que uma boa tutela seria suficiente para ensinar [ROOT.Char.GetFirstName] as complexidades da administração. Todas as tentativas foram em vão, no entanto."
 intrigue_good_trait_match_good_outcome: "Sempre astut[ROOT.Char.Custom('ES_OA')] na inféncia, [ROOT.Char.GetFirstName] demonstrou repetidas vezes ao longo de seus estudos que possuía uma afinidade natural para o planejamento cuidadoso e mais do que um pouco de dissimulação."
 intrigue_good_trait_match_bad_outcome: "Apesar de ter tido bastante experiência com mentiras quando era crian[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetFirstName] sempre teve dificuldade em aplicar esse tipo de criatividade de forma estruturada."
 intrigue_bad_trait_match_good_outcome: "Apesar de ser um[ROOT.Char.Custom('ES_XA')] menin[ROOT.Char.Custom('ES_OA')] introvertid[ROOT.Char.Custom('ES_OA')] e às vezes estar em seu próprio mundo, [ROOT.Char.GetFirstName] desenvolveu certa inclinação para a arte da manipulação."
 intrigue_bad_trait_match_bad_outcome: "Sendo [ROOT.Char.GetFirstName] um[ROOT.Char.Custom('ES_XA')] crianç[ROOT.Char.Custom('ES_OA')] quiet[ROOT.Char.Custom('ES_OA')] e reclus[ROOT.Char.Custom('ES_OA')] nunca demonstrou muito interesse em conseguir o que queria."
 intrigue_neutral_trait_match_good_outcome: "Com a tutela adequada, até mesmo um[ROOT.Char.Custom('ES_XA')] menin[ROOT.Char.Custom('ES_OA')] como [ROOT.Char.GetFirstName], que demonstrou pouca inclinação natural para o planejamento cuidadoso, pode chegar a realmente entender seus usos."
 intrigue_neutral_trait_match_bad_outcome: "Por muito tempo eu esperava que uma boa tutela seria suficiente para ensinar [ROOT.Char.GetFirstName] as complexidades do planejamento cuidadoso. Todas as tentativas foram em vão, no entanto."
 learning_good_trait_match_good_outcome: "[ROOT.Char.GetFirstName], um[ROOT.Char.Custom('ES_XA')] menin[ROOT.Char.Custom('ES_OA')] sempre curios[ROOT.Char.Custom('ES_OA')] e ávid[ROOT.Char.Custom('ES_OA')] de conhecimento, demonstrou afinidade com os estudos desde cedo."
 learning_good_trait_match_bad_outcome: "Apesar de ser um[ROOT.Char.Custom('ES_XA')] menin[ROOT.Char.Custom('ES_OA')] curios[ROOT.Char.Custom('ES_OA')] e com vontade de aprender, a atenção de [ROOT.Char.GetFirstName] foi se desviando à medida que envelhecia."
 learning_bad_trait_match_good_outcome: "Apesar de sempre parecer tão desatento como uma criança, [ROOT.Char.GetFirstName] provou que o estudo focado não é tudo o que faz um estudioso."
 learning_bad_trait_match_bad_outcome: "Tendo sido uma[ROOT.Char.Custom('ES_XA')] criança[ROOT.Char.Custom('ES_OA')] tão desatenta, não é difícil entender por que [ROOT.Char.GetFirstName] teve tanta dificuldade para lidar com os estudos."
 learning_neutral_trait_match_good_outcome: "Com a tutoria adequada, mesmo uma[ROOT.Char.Custom('ES_XA')] crianç[ROOT.Char.Custom('ES_OA')] como [ROOT.Char.GetFirstName], que demonstrou pouca inclinação natural para os estudos, pode chegar a compreender qualquer assunto."
 learning_neutral_trait_match_bad_outcome: "Durante muito tempo, eu esperava que um bom ensino fosse suficiente para ensinar [ROOT.Char.GetFirstName] as complexidades de qualquer tipo de aprendizagem. Todas as tentativas foram em vão, no entanto."
 education_diplomacy_1_outcome_description: "As práticas de cortesia e honra sempre foram um desafio para [ROOT.Char.Custom('ES_ElElla')]. Mas, ao menos, [ROOT.Char.GetFirstName] tem noções básicas de etiqueta."
 education_diplomacy_2_outcome_description: "Poucos em qualquer corte ficariam muito impressionados com seu domínio da etiqueta, mas ao menos [ROOT.Char.GetFirstName] sabe como se virar em boa companhia."
 education_diplomacy_3_outcome_description: "Com esse excelente domínio de todas as maneiras de etiqueta e da eloqüência que o acompanha, a [ROOT.Char.GetFirstName] terá pouca dificuldade para se orientar na vida na corte."
 education_diplomacy_4_outcome_description: "Com sua lábia de prata, [ROOT.Char.GetFirstName] pode conquistar a opinião de condes e reis por igual! Quando fala, a corte escuta em silêncio extasiado."
 education_stewardship_1_outcome_description: "Pode-se considerar uma sorte que [ROOT.Char.GetFirstName] tenha dominado a arte de contar moedas, pois quase todos os outros aspectos do trabalho de administrador lhe escapam."
 education_stewardship_2_outcome_description: "Poucos ficariam impressionados com sua compreensão da matéria, mas [ROOT.Char.GetFirstName] ao menos desenvolveu um sólido entendimento dos princípios da administração e dos fundamentos de uma frugalidade sensata."
 education_stewardship_3_outcome_description: "[ROOT.Char.GetFirstName] demonstra uma compreensão completa dos fluxos de ouro e do deslocamento das pessoas, e até expressa uma criatividade notável ao lidar com esses assuntos."
 education_stewardship_4_outcome_description: "Não satisfeito[ROOT.Char.Custom('ES_OA')]em compreender o fluxo da riqueza e das pessoas, [ROOT.Char.GetFirstName]parece capaz de prevê-lo como se fosse por instinto! Também sempre encontra novas maneiras de lucrar com isso."
 education_intrigue_1_outcome_description: "Por sua falta de sutileza e paciência, a [ROOT.Char.GetFirstName] lhe custa executar planos de longo prazo… mas, pelo menos, tenta fazê-los."
 education_intrigue_2_outcome_description: "Embora [ROOT.Char.GetFirstName] tenha demonstrado ser mais que capaz de tramar pequenas conspirações, poucos diriam que sejam refinadas, embora o refinamento nem sempre seja necessário."
 education_intrigue_3_outcome_description: "Agora [ROOT.Char.GetFirstName] sabe muitas maneiras de conseguir o que quer, mas, mais importante, tem plena consciência das implicações políticas desses desejos."
 education_intrigue_4_outcome_description: "Mas agora é mais difícil dizer. Tudo o que lhe é incumbido é feito por outros antes de chegar a suas mãos, e já não conta essas mentiras mesquinhas que costumava contar. Talvez, no fundo, não fosse tão inteligente quanto parecia afinal."
 education_learning_1_outcome_description: "Parece que a busca pelo conhecimento nunca se enraizou de verdade em sua mente, e agora passar tempo entre livros e tomos parece mais uma tarefa para ele do que uma alegria."
 education_learning_2_outcome_description: "Não é muito estudioso[ROOT.Char.Custom('ES_OA')] mas ao menos conseguiu decorar certas citações dos clássicos. Provavelmente nunca escreverá grandes teoremas, mas talvez leia um ou dois."
 education_learning_3_outcome_description: "[ROOT.Char.GetFirstName] é um[ROOT.Char.Custom('ES_XA')] estudante ávid[ROOT.Char.Custom('ES_OA')] que se tornou um fornecedor[ROOT.Char.Custom('ES_XA')] de conhecimento e demonstrou ser plenamente capaz de estruturar argumentos teóricos e teológicos avançados."
 education_learning_4_outcome_description: "Sua compreensão das obras filosóficas e teóricas é impressionante e costuma entablar debates com seus antigos mestres. Mesmo em uma idade tão jovem, já pode ser ouvido citando trechos obscuros para apoiar novas ideias e teorias."
 ChildhoodPersonalityTrait_charming: "[GetTrait('charming').GetName( ROOT.Char )]"
 ChildhoodPersonalityTrait_rowdy: "[GetTrait('rowdy').GetName( ROOT.Char )]"
 ChildhoodPersonalityTrait_bossy: "[GetTrait('bossy').GetName( ROOT.Char )]"
 ChildhoodPersonalityTrait_curious: "[GetTrait('curious').GetName( ROOT.Char )]"
 ChildhoodPersonalityTrait_pensive: "[GetTrait('pensive').GetName( ROOT.Char )]"
 diplomatic_education: "$education_diplomacy_loc$"
 martial_education: "$education_martial_loc$"
 stewardship_education: "$education_stewardship_loc$"
 intrigue_education: "$education_intrigue_loc$"
 learning_education: "$education_learning_loc$"
