 trickster_spirit_britannia: "[Glossary( 'pixie', 'PIXIE_GLOSS' )]"
 PIXIE_GLOSS: "Um espírito minúsculo e alado do folclore celta e britânico, que gosta de travessuras brincalhonas e de desviar viajantes do caminho."
 trickster_spirit_germania: "[Glossary( 'kobold', 'KOBOLD_GLOSS' )]"
 KOBOLD_GLOSS: "Um espírito doméstico do folclore alemão que alterna entre realizar tarefas prestativas e travessuras quando é ofendido."
 trickster_spirit_netherlands: "[Glossary( 'kabouter', 'KABOUTER_GLOSS' )]"
 KABOUTER_GLOSS: "Uma criatura parecida a um gnomo da tradição holandesa, que costuma ajudar nas tarefas ou pregar peças quando desrespeitada."
 trickster_spirit_francia: "[Glossary( 'lutin', 'LUTIN_GLOSS' )]"
 LUTIN_GLOSS: "Um pequeno espírito doméstico ou da floresta do folclore francês, conhecido por travessuras como embaraçar os cabelos e esconder objetos."
 trickster_spirit_iberia: "[Glossary( 'duende', 'DUENDE_GLOSS' )]"
 DUENDE_GLOSS: "Um espírito pequeno e esquivo do folclore ibérico que causa pequenos desarranjos nas casas."
 trickster_spirit_north: "[Glossary( 'tomte', 'TOMTE_GLOSS' )]"
 TOMTE_GLOSS: "Um espírito escandinavo dito proteger as fazendas e os animais, mas propenso a travessuras se irritado."
 trickster_spirit_east: "[Glossary( 'domovoi', 'DOMOVOI_GLOSS' )]"
 DOMOVOI_GLOSS: "Um espírito doméstico eslavo que protege a casa, mas faz travessuras quando é ofendido ou negligenciado."
 trickster_spirit_middle_east: "[Glossary( 'djinn', 'DJINN_GLOSS' )]"
 DJINN_GLOSS: "Um espírito de fogo sem fumaça do folclore do Oriente Médio, capaz de mudar de forma e enganar."
 trickster_spirit_india: "[Glossary( 'rakshasa', 'RAKSHASA_GLOSS' )]"
 RAKSHASA_GLOSS: "Um metamorfomago malévolo da mitologia indiana, hábil em ilusão e astúcia."
 trickster_spirit_africa_north: "[Glossary( 'ifrit', 'IFRIT_GLOSS' )]"
 IFRIT_GLOSS: "Um espírito ardente e rebelde do folclore norte-africano, associado à astúcia e à força."
 trickster_spirit_africa_west: "[Glossary( 'ninki nanka', 'NINKI_NANKA_GLOSS' )]"
 NINKI_NANKA_GLOSS: "Um espírito temível com aparência de dragão dos pântanos da África Ocidental; acredita-se que traz a morte àqueles que o veem."
 trickster_spirit_africa_east: "[Glossary( 'popo bawa', 'POPOBAWA_GLOSS' )]"
 POPOBAWA_GLOSS: "Um espírito semelhante a um morcego do folclore suaíli, conhecido por espalhar medo à noite por meio de metamorfose e tortura psicológica."
 trickster_spirit_steppe: "[Glossary( 'Gulyabani', 'GULYABANI_GLOSS' )]"
 GULYABANI_GLOSS: "Um ghoul peludo e imponente do folclore turco, conhecido por rondar lugares desolados e se alimentar de viajantes solitários à noite."
 trickster_spirit_siberia: "[Glossary( 'kutkh', 'KUTKH_GLOSS' )]"
 KUTKH_GLOSS: "Um espírito de corvo encontrado nas tradições siberianas, tanto criador quanto um trapaceiro travesso."
 trickster_spirit_tibet: "[Glossary( 'ro-langs', 'ROLANGS_GLOSS' )]"
 ROLANGS_GLOSS: "Um cadáver reanimado do folclore tibetano, conhecido por seus movimentos rígidos e intenção malévola."
 trickster_spirit_china: "[Glossary( 'huli jing', 'HULIJING_GLOSS' )]"
 HULIJING_GLOSS: "Um espírito de raposa chinês com o poder da metamorfose, famoso por suas artimanhas enganosas e sedutoras."
 trickster_spirit_korea: "[Glossary( 'kumiho', 'KUMIHO_GLOSS' )]"
 KUMIHO_GLOSS: "Um espírito de raposa de nove caudas da mitologia coreana, conhecido por enganar e se alimentar de humanos."
 trickster_spirit_japan: "[Glossary( 'tanuki', 'TANUKI_GLOSS' )]"
 TANUKI_GLOSS: "Um espírito metamórfico de um cão-guaxinim do folclore japonês, conhecido por ilusões e travessuras brincalhonas."
 trickster_spirit_sakhalin_hokkaido: "[Glossary( 'kamaitachi', 'KAMAITACHI_GLOSS' )]"
 KAMAITACHI_GLOSS: "Um espírito de doninha que cavalga o vento das lendas do norte do Japão, conhecido por fatiar a carne sem dor."
 trickster_spirit_thailand: "[Glossary( 'phi tai hong', 'PHITAIHONG_GLOSS' )]"
 PHITAIHONG_GLOSS: "Um fantasma vingativo da tradição tailandesa, formado por uma morte súbita ou violenta, conhecido por assombrar e iludir."
 trickster_spirit_malaysia: "[Glossary( 'penanggalan', 'PENANGGALAN_GLOSS' )]"
 PENANGGALAN_GLOSS: "Um espírito de cabeça flutuante do folclore malaio, que parece enganosamente humano durante o dia e aterrorizante à noite."
 trickster_spirit_indonesia: "[Glossary( 'ebu gogo', 'EBU_GOGO_GLOSS' )]"
 EBU_GOGO_GLOSS: "Espíritos minúsculos e peludos da floresta, do folclore indonésio, conhecidos por imitar a fala humana e roubar comida ou pequenos objetos das aldeias."
 trickster_spirit_philippines: "[Glossary( 'tikbalang', 'TIKBALANG_GLOSS' )]"
 TIKBALANG_GLOSS: "Um espírito alto com cabeça de cavalo do folclore filipino, conhecido por desviar viajantes do caminho e pregar peças nas florestas."
 trickster_spirit_borneo: "[Glossary( 'orang bunian', 'ORANG_BUNIAN_GLOSS' )]"
 ORANG_BUNIAN_GLOSS: "Espíritos invisíveis do folclore bornéu que habitam as florestas; sabe-se que interagem com os humanos, às vezes para fazê-los se perder ou causar travessuras."
 trickster_spirit_maluku: "[Glossary( 'jin kurcaci', 'JIN_KURCACI_GLOSS' )]"
 JIN_KURCACI_GLOSS: "Seres pequenos com forma humana do folclore das Molucas, conhecidos por habitar florestas e montanhas, oferecendo orientação ou travessuras àqueles que encontram."
 trickster_spirit_italy: "[Glossary( 'mazapégul', 'MAZAPEGUL_GLOSS' )]"
 MAZAPEGUL_GLOSS: "Um espírito noturno travesso do folclore italiano, conhecido por assombrar quartos, trançar as crinas dos cavalos e sentar-se sobre o peito dos dorminhocos para causar pesadelos."
 trickster_spirit_balkans: "[Glossary( 'kallikantzaros', 'KALLIKANTZAROS_GLOSS' )]"
 KALLIKANTZAROS_GLOSS: "Um duende malévolo conhecido por surgir durante os doze dias do Natal para aprontar travessuras e semear o caos."
 trickster_spirit_indochina: "[Glossary( 'mrenh kongveal', 'MRENH_KONGVEAL_GLOSS' )]"
 MRENH_KONGVEAL_GLOSS: "Espíritos pequenos e esquivos do folclore khmer, conhecidos por suas travessuras brincalhonas e por seu papel protetor de animais e viajantes."
 trickster_spirit_default: "espírito brincalhão"
