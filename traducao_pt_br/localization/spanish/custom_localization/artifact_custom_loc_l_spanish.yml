 #DamageArtifactAction
 damage_artifact_fire: "colocar fogo em"
 evidence_artifact_fire: "Por algum motivo, a bainha da roupa do capitão está levemente chamuscada. Que curioso..."
 damage_artifact_knocked_over: "derrubado"
 damage_artifact_toppled: "caído"
 evidence_artifact_knocked_over: "No canto do meu olho, não posso deixar de notar que as mãos do capitão estão arranhadas."
 damage_artifact_smeared_food: "sujo de comida"
 evidence_artifact_smeared_food: "Curiosamente, as manchas de comida na [ROOT.Artifact.GetName] correspondem às que estão nas mangas do capitão..."
 damage_artifact_spilled_drink: "derramado [ROOT.Artifact.GetOwner.Custom('RegionalDrink')]"
 evidence_artifact_spilled_drink: "O capitão parece estar todo sujo com o mesmo líquido. Será que eu realmente não era para notar?"
 damage_artifact_tear: "rasgado"
 damage_artifact_cut_holes: "cortado buracos em"
 evidence_artifact_tear: "Há pequenos cortes por toda as mãos do capitão. Fico me perguntando de onde eles vieram."
 damage_artifact_tear_down: "destruído"
 evidence_artifact_tear_down: "O capitão tem um arranhão na bochecha e suas roupas estão desalinhadas. Isso parece muito suspeito..."
 damage_artifact_threw_up: "vomitado em cima"
 evidence_artifact_threw_up: "Mi aguda capacidad de observación se da cuenta de que en los dientes y la comisura de la boca de tal capitán hay pegada una pizca de #EMP alguna sustancia pegajosa#!."
 damage_artifact_unspeakable: "feito coisas indizíveis em"
 evidence_artifact_unspeakable: "As calças desabotoadas do capitão, assim como as mechas de cabelo saindo de seu capacete, me deixam imaginando #EMP quem#! fez coisas indizíveis na [ROOT.Artifact.GetName]..."
 damage_artifact_fallback: "causou danos em"
 #Marco Polo quotes
 marco_polo_quote_intro_1: "Você ouvirá por si mesmo, e isso certamente o encherá de maravilha."
 marco_polo_quote_intro_2: "O mundo é uma vasta tapeçaria, tecida com os fios de diferentes culturas e tradições."
 marco_polo_quote_desc_1: "Nós andamos nus porque não queremos nada deste mundo; pois viemos ao mundo nus e despidos. Quanto a não ter vergonha de mostrar nossos membros, o fato ? que não pecamos com eles e, portanto, não temos mais vergonha deles do que você tem ao mostrar sua mão, seu rosto ou as outras partes do seu corpo que não o levam ao pecado carnal; enquanto você usa seus membros para cometer pecado e luxúria, e assim os cobre e tem vergonha deles. Mas nós não temos mais vergonha de mostr?-los do que temos de mostrar nossos dedos, porque não pecamos com eles."
 marco_polo_quote_desc_2: "E eu asseguro que as mulheres compram e vendem e fazem tudo que é necessário para seus maridos e lares. Pois os homens não se preocupam com nada além de caça, guerra e falcoaria. Eles vivem de carne, leite e caça, e de ratos, que são abundantes em todo lugar."
 marco_polo_quote_desc_3: "Eles são guerreiros robustos, excelentes em coragem e resistência. Deixe-me explicar como conseguem suportar mais do que qualquer outro homem. Muitas vezes, se necessário, seguem ou permanecem por um mês inteiro sem provisões, bebendo apenas o leite de uma água e comendo a caça que eles mesmos abatem."
 marco_polo_quote_desc_4: "Aqui está outro costume estranho que eu havia esquecido de descrever. Você pode considerar um fato que, quando há dois homens, um dos quais teve um filho homem que morreu aos quatro anos, ou o que você quiser, e o outro teve uma filha que também morreu, eles organizam um casamento entre eles."
 marco_polo_quote_desc_5: "H? certos vales grandes e profundos, cujo fundo ? inacessível. Por isso, os homens que vão ? procura de diamantes levam consigo pedaços de carne, o mais magros possível, e os lançam no fundo de um vale. Quando as águias veem a carne jogada, elas se lançam sobre ela e a levam para algum topo rochoso. As pessoas vão aos ninhos dessas águias brancas, das quais h? muitas, e em suas fezes encontram muitos diamantes que as aves engoliram ao devorar a carne lançada nos vales."
 marco_polo_quote_desc_6: "H? uma fonte de óleo que libera uma quantidade tão grande que ? suficiente para carregar muitos camelos. O uso dado a ele não ? alimentício, mas serve como unguento para curar males cutâneos em homens e gado, bem como outras doenças, e também ? bom para queimar. Na região ao redor, nenhum outro óleo ? usado nas lâmpadas, e pessoas vêm de terras distantes para adquiri-lo."
 marco_polo_quote_desc_7: "Se for questionado como a população do país pode fornecer número suficiente para essas funções, e por quais meios podem ser sustentados, podemos responder que todos os idólatras mantêm de seis, oito ou dez mulheres, conforme suas circunstâncias, com as quais têm um número prodigioso de filhos. Alguns têm até trinta filhos capazes de seguir seus pais nas armas."
 marco_polo_quote_end_1: "Eu falo e falo, mas o ouvinte retém apenas as palavras que está esperando. Não é a voz que comanda a história: é o ouvido."
 marco_polo_quote_end_2: "Pois, conte como eu puder, você nunca ficaria satisfeito achando que eu estou dentro da verdade e da razão."
