 #Commander Traits (cultural traditions)
 trait_sea_raider: "Saqueador do Mar"
 trait_sea_raider_desc: "O Saqueador do Mar não teme a dureza dos elementos no oceano e emprega uma combinação de ousadia e navegação habilidosa para atacar costas desprotegidas sem aviso."
 trait_sea_raider_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] não teme a dureza dos elementos no oceano e emprega uma combinação de ousadia e navegação habilidosa para atacar costas desprotegidas sem aviso."
 #State traits
 trait_disinherited: "Deserdado"
 trait_disinherited_desc: "Este personagem foi deserdado por [Concept( 'dynast', 'chefe da sua dinastia' )|E] e não pode herdar nenhum título de nenhum outro membro da dinastia."
 trait_disinherited_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] foi deserdad[ROOT.GetCharacter.Custom('ES_OA')] por seu/sua [Concept( 'dynast', 'chefe da dinastia' )|E] e não pode herdar nenhum título de qualquer outro membro da dinastia."
 trait_denounced: "Denunciado"
 trait_denounced_desc: "Este personagem foi denunciado por seu [Concept( 'dynast', 'chefe da sua dinastia' )|E] e agora pode ser preso por qualquer outro membro da dinastia."
 trait_denounced_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] foi denunciad[ROOT.GetCharacter.Custom('ES_OA')] por seu/sua [Concept( 'dynast', 'chefe da dinastia' )|E] e agora pode ser encarcerad[ROOT.GetCharacter.Custom('ES_OA')] por outro membro da dinastia."
 trait_decadent: "Acusado de Decadência"
 trait_decadent_desc: "Este personagem foi acusado de decadência por seu/sua [Concept( 'house_head', 'chefe da casa' )|E]. Quer as alegações sejam verdadeiras ou não, sua reputação e credibilidade estão significativamente abaladas."
 trait_decadent_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] foi acusad[ROOT.GetCharacter.Custom('ES_OA')] de decadência por seu/sua [Concept( 'house_head', 'chefe da casa' )|E]. Verdadeiras ou não as acusações, sua reputação e credibilidade estão significativamente manchadas."
 trait_extolled: "Exaltado pela Casa"
 trait_extolled_desc: "Este personagem teve suas virtudes exaltadas por seu/sua [Concept( 'house_head', 'chefe da casa' )|E]. Seja a atenção merecida ou não, agora lhe custa manter-se longe dos olhares indiscretos do público."
 trait_extolled_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] teve suas virtudes exaltadas por seu/sua [Concept( 'house_head', 'chefe da casa' )|E]. Seja a atenção merecida ou não, agora tem dificuldade em se manter afastad[ROOT.GetCharacter.Custom('ES_OA')] dos olhares indiscretos do público."
 trait_gallivanter: "Aventureiro Ocioso"
 trait_gallivanter_desc: "Esta personagem evita responsabilidades além daquelas que já possui — seu tempo é precioso, e ela não deseja desperdiçá-lo com deveres inúteis e ambições vazias."
 trait_gallivanter_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] evita assumir mais responsabilidades do que já possui; seu tempo é precioso e não deseja desperdiçá-lo com deveres inúteis e ambições sem sentido."
