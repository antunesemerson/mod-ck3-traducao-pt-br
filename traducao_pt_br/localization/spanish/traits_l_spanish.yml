 #EP2
 trait_tourney_participant: "Hastíludo"
 trait_tourney_participant_desc: "Esta personagem participou de jogos marciais, afiando suas habilidades de guerra e combate pessoal."
 trait_tourney_participant_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] has participated in martial games, sharpening their skills in warfare and personal combat."
 trait_track_foot: "Pé"
 trait_track_foot_desc: "O corpo humano é a ferramenta suprema, e dominá-lo lhe trará o mundo."
 trait_track_horse: "Cavalo"
 trait_track_horse_desc: "Besta e cavaleiro em perfeita harmonia, gloriosos e livres sob o interminável céu azul."
 trait_track_bow: "Arco"
 trait_track_bow_desc: "Os tendões do arqueiro e da corda do arco, unidos para levar a flecha certeira ao alvo."
 trait_track_wit: "Engenho"
 trait_track_wit_desc: "A força se esvai, a beleza murcha, mas uma mente afiada o levará pelas situações mais sombrias."
 #REWORKED LIFESTYLES
 trait_lifestyle_hunter_desc: "Esta personagem atendeu ao chamado da natureza selvagem."
 trait_lifestyle_hunter_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] atendeu ao chamado da natureza selvagem."
 trait_track_hunter: "Venator"
 trait_track_hunter_desc: "O som das trompas, dos cães, da presa! Seja com arco ou a cavalo, não há emoção que se compare a derrubar uma fera selvagem!"
 trait_track_falconer: "Falcoeiro"
 trait_track_falconer_desc: "Não há passatempo mais nobre do que a arte da caça com gavião e falcão."
 trait_track_lifestyle_mystic: "Místico"
 trait_track_lifestyle_mystic_desc: "Os mistérios do mundo, tanto físicos quanto outros, se revelam a quem contempla o suficiente."
 trait_track_pilgrim: "Peregrino"
 trait_track_pilgrim_desc: "Pés calejados, membros doloridos, rosto castigado pelo tempo. Tudo isso é um pequeno preço a pagar por cumprir seu dever sagrado."
 trait_track_lifestyle_reveler: "Festeiro"
 trait_track_lifestyle_reveler_desc: "Uma bebida e uma risada, tudo em boa companhia. O que mais há na vida?"
 trait_track_lifestyle_blademaster: "Mestre da Lâmina"
 trait_track_lifestyle_blademaster_desc: "Anos de vida dedicados a dominar uma arma, para que sua graça resultante possa um dia salvar uma vida e tirar outra."
 trait_track_lifestyle_physician: "Médico"
 trait_track_lifestyle_physician_desc: "Estanque o fluxo de sangue aqui, abra uma veia ali. Esses humores logo estarão equilibrados!"
 trait_track_lifestyle_poet: "Poesia"
 trait_track_lifestyle_poet_desc: "Palavras podem render fama eterna, e a pena pode cortar mais fundo que a lâmina mais afiada."
 #EP3
 trait_governor: "Governador"
 trait_track_governor: "$trait_governor$"
 trait_track_governor_desc: "Impostos. Terras. Tropas. Tudo pode e deve ser administrado à perfeição.\n\n#weak Este [trait|lE] pode subir de nível por meio de ações que melhorem os [counties|lE] mantidos ou beneficiem o [realm|lE], como concluir [governance_issues|lE], construir [buildings|lE] ou escolher certas opções em eventos.#!"
 trait_governor_desc: "Esta personagem adquiriu habilidades valiosas em seu papel como governador."
 trait_governor_3_byz: "$duke_administrative_male_byzantine_group$ Veterano"
 trait_governor_3: "Governador Veterano"
 trait_governor_2_byz: "$duke_administrative_male_byzantine_group$ Experiente"
 trait_governor_2: "Governador Experiente"
 trait_governor_1_byz: "$duke_administrative_male_byzantine_group$"
 trait_governor_1_byz_female: "$duke_administrative_female_byzantine_group$"
 trait_governor_1: "Governador"
 trait_governor_3_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] é um[ROOT.GetCharacter.Custom('ES_XA')] administrador[ROOT.GetCharacter.Custom('ES_XA')] e árbitr[ROOT.GetCharacter.Custom('ES_OA')] excepcional, o que [ROOT.GetCharacter.GetHerHim] o torna a escolha perfeita como governador[ROOT.GetCharacter.Custom('ES_XA')]."
 trait_governor_2_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] tem muita experiência na administração de terras e atua bem como governador[ROOT.GetCharacter.Custom('ES_XA')]."
 trait_governor_1_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] adquiriu habilidades valiosas em seu cargo de governador[ROOT.GetCharacter.Custom('ES_XA')]."
 trait_gallowsbait: "Isca da Forca"
 trait_gallowsbait_desc: "Nem todo crime diz respeito aos Grandes e Bons — esta personagem está fazendo fama como um pequeno criminoso."
 trait_gallowsbait_character_desc: "Nem todo crime diz respeito aos grandes e aos bons; [ROOT.GetCharacter.GetFirstNameNoTooltip] está ganhando fama como um[ROOT.GetCharacter.Custom('ES_XA')] criminoso de pouca monta."
 trait_track_bandit: "Bandido"
 trait_track_bandit_desc: "A luz da lei não vai muito além das muralhas de uma cidade; aqui fora, poder é lei."
 trait_track_trickster: "Trapaceiro"
 trait_track_trickster_desc: "Uma mente lenta não é apenas uma tragédia — para os espertos, é uma #EMP oportunidade#!."
 trait_track_thief: "Ladrão"
 trait_track_thief_desc: "Afinal, posse é nove décimos da lei."
 trait_track_poacher: "Caçador Furtivo"
 trait_track_poacher_desc: "Não faz mal algum, se for só um animal. Certo?"
 trait_track_marauder: "Saqueador"
 trait_track_marauder_desc: "Sequestrar e matar fora da alta sociedade é menos glamouroso, mas não necessariamente menos lucrativo."
 trait_despoiler_of_byzantium: "Espoliador de Bizâncio"
 trait_despoiler_of_byzantium_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] esteve entre [Select_CString( ROOT.GetCharacter.IsFemale, 'las señoras latinas', 'los señores latinos' )] temíveis que conquistaram e arruinaram um antigo império cristão."
 trait_campeador: "Campeador"
 trait_campeador_desc: "A perícia de [ROOT.GetCharacter.GetFirstNameNoTooltip] no campo de batalha lhe rendeu o título de [Select_CString( ROOT.GetCharacter.IsFemale, 'Campeadora', 'Campeador' )]."
 trait_violet_poet: "Poeta Violeta"
 trait_violet_poet_desc: "O que mais faz um coração cantar e uma voz trovejar senão o próprio amor? [ROOT.GetCharacter.GetFirstNameNoTooltip] sabe disso, e sabe com maestria."
 trait_track_violet_poet: "Rapsodista"
 trait_track_violet_poet_desc: "A expressão mais verdadeira de um poeta não pode vir apenas por palavras, mas também pela alma e pelo corpo.\n\n#weak Este [trait|lE] pode subir de nível por dois meios diferentes: escrevendo poesia ou por métodos mais #UND amorosos#!."
 trait_knight_errant: "Cavaleiro Andante"
 trait_knight_errant_character: "$knight_culture_player_no_tooltip$-Errant"
 trait_knight_errant_desc: "Um cavaleiro de renome, esta personagem defende os fracos, protege os desarmados e derrota os perversos."
 trait_knight_errant_character_desc: "Um $knight_culture_player_no_tooltip_lowercase$ de renome, [ROOT.GetCharacter.GetFirstNameNoTooltip] defende os fracos, protege os desarmados e derrota os perversos."
 trait_track_knight_errant: "Praticante do Bem"
 trait_track_knight_errant_desc: "Não basta afirmar ser uma pessoa justa; também é preciso demonstrá-lo.\n\n#weak Este [trait|lE] pode subir de nível ao concluir [task_contracts|lE] de Justiça, Destreza ou Marcial que demonstrem qualidades honrosas."
 the_wake: "O Wake"
 trait_track_the_wake: "Perseguidor dos Pântanos"
 trait_track_the_wake_desc: "O destino tece uma rede sutil. O que é meu por direito será retomado pela força.\n\n#weak Este [trait|lE] pode subir de nível derrotando [characters|lE] de [culture|lE] #BOL $norman$#! em [battle|lE] ou em [single_combat_duel_plural|lE].#!"
 the_wake_1: "Exilado"
 the_wake_2: "O Fora-da-Lei"
 the_wake_3: "O Açougueiro"
 the_wake_4: "The Ankou"
 the_wake_5: "$the_wake$"
 the_wake_1_desc: "Pobre do jovem Hereweard, o nobre exilado. Um homem sem propósito, um errante apático. Tanto potencial, deixado tão sem cumprir."
 the_wake_2_desc: "Um propósito foi encontrado, mas muito trabalho precisa ser feito. Trabalho sangrento, até que os pântanos lamacentos corram vermelhos com o sangue dos forasteiros."
 the_wake_3_desc: "Homens menores se atolam e se afogam nos brejos pegajosos e fétidos de onde este vem. Alguns chegam a sussurrar que ele consegue andar sobre a superfície de qualquer charco, tamanha é sua maestria sobre os pântanos."
 the_wake_4_desc: "Crianças aterrorizadas ouvem histórias da besta que ronda os pântanos, para que não se afastem demais da segurança."
 the_wake_5_desc: "A sombra escura no lusco-fusco ronda a terra, sempre vigilante, sempre alerta. Hereweard, o Sangrento. Hereweard, o Temido. Hereweard, o Wake."
 norman_opinion: "Opinião Normanda"
 TRAIT_FLAG_DESC_can_raid: "Ativa [Concept('raiding', 'saques')|E]"
 trait_immortal: "Imortal"
 trait_immortal_desc: "Esta personagem se destaca do restante da humanidade, sem sofrer os rigores da idade, da decadência e do tempo."
 trait_immortal_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] se destaca do restante da humanidade, sem sofrer os rigores da idade, da decadência e do tempo."
 #BP3
 trait_lifestyle_wayfarer: "Andarilho"
 trait_lifestyle_wayfarer_desc: "Para [ROOT.GetCharacter.GetFirstNameNoTooltip] viajar é mais do que um meio para atingir um fim. Ele desaparece às vezes por dias a fio e sempre retorna para contar histórias fantásticas de lugares distantes, montanhas altas, cavernas escuras ou florestas densas."
 trait_lifestyle_voyager: "Viajante"
 trait_lifestyle_voyager_desc: "A mais gloriosa das cidades, as ruínas da antiguidade, reis e rainhas de reinos distantes. [ROOT.GetCharacter.GetFirstNameNoTooltip] viu tudo isso e adora compartilhar sua experiência com os outros."
 trait_lifestyle_surveyor: "Inspetor"
 trait_lifestyle_surveyor_desc: "O reino prospera sob o olhar atento de [ROOT.GetCharacter.GetFirstNameNoTooltip]. Com a inclinação para viajar intrinsecamente tecida no tecido do governo, [ROOT.GetCharacter.GetFirstNameNoTooltip] supervisiona pessoalmente os vassalos e enfrenta os desafios da administração, garantindo um domínio próspero e bem cuidado."
 trait_lifestyle_surveyor_adventurer_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] é conhecido por sua perícia em viajar pelo território. Conhece a natureza selvagem como a palma da sua mão, pode se deslocar em torno de exércitos inimigos, preparar emboscadas aterrorizantes ou, simplesmente, garantir uma viagem segura de uma cidade a outra."
 #MPO
 trait_nomadic_philosophy: "Caminho do Nômade"
 trait_nomadic_philosophy_desc: "Esta personagem foi moldada desde o nascimento pela vida dura da estepe. Seus modos, embora estranhos para os dóceis povos assentados, oferecem força e astúcia incomparáveis.\n\n#weak $nomadic_philosophy_ender$#!"
 trait_nomadic_philosophy_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] foi moldado desde o nascimento pela vida dura da estepe. Seus costumes, embora estranhos para os pacíficos povos assentados, oferecem força e astúcia incomparáveis.\n\n#weak $nomadic_philosophy_ender$#!"
 nomadic_philosophy_ender: "Eu contra meus irmãos — meus irmãos e eu contra meus primos — meus irmãos, meus primos e eu contra as outras tribos — todas as tribos contra o mundo."
 trait_lifestyle_seasoned_pastor: "Pastor Experiente"
 trait_lifestyle_seasoned_pastor_desc: "Esta personagem tornou-se especialista nas artes da criação e consegue garantir que seu gado aproveite o pasto da melhor forma possível."
 trait_lifestyle_seasoned_pastor_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] se tornou expert[ROOT.GetCharacter.Custom('ES_OA')] na arte da criação de animais e pode garantir que o gado aproveite da melhor forma possível o pasto."
 unlock_maa_steppe_raiders: "Pode recrutar [GetMaA('steppe_raiders').GetName|l] como [men_at_arms|lE]"
 unlock_maa_heavy_horse_archers: "Pode recrutar [GetMaA('heavy_horse_archers').GetName|l] como [men_at_arms|lE]"
 unlock_maa_nomad_lancers: "Pode recrutar [GetMaA('nomad_lancers').GetName|l] como [men_at_arms|lE]"
 TRAIT_FLAG_DESC_gok_obedience_flag: "Aumento massivo de @obedience_icon![obedience|lE] vindo dos [subjects|lE]"
 trait_golden_lineage: "Linhagem Dourada"
 trait_golden_lineage_desc: "O que a linhagem desta personagem causou ao mundo não pode ser esquecido. Ela é um rebento dourado de fogo e conquista."
 trait_golden_lineage_character_desc: "O que o sangue de [ROOT.GetCharacter.GetFirstNameNoTooltip] forjou no mundo não pode ser esquecido. É um descendente dourado do fogo e da conquista."
 descendants_gain_golden_lineage_female: "Todas as descendentes mulheres de [golden_lineage.GetShortUIName] e seus filhos"
 descendants_gain_golden_lineage_male: "Todos os descendentes homens de [golden_lineage.GetShortUIName] e seus filhos"
 #TGP
 trait_track_confucian_education: "Confucionismo"
 trait_track_confucian_education_desc: "Por meio da frugalidade e da benevolência, construiremos uma sociedade melhor, juntos.\n\n#weak Este [trait|lE] pode ser aprimorado por meio da [character_interaction|lE] #V $request_mentoring_interaction$#! ou das [court_position_tasks|lE] de #V $grand_mentor_court_position$#! ou dos [court_positions|lE] de #V $court_tutor_court_position$#!"
 trait_confucian_education_character_desc: "Esta personagem acabou de iniciar a jornada rumo à sabedoria."
 trait_confucian_education: "Educação Confuciana"
 trait_confucian_education_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] acabou de iniciar sua jornada no caminho rumo à sabedoria."
 trait_confucian_education_1: "Confuciano Genuíno"
 trait_confucian_education_1_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] vislumbrou a vasta sabedoria dos Caminhos Confucianos."
 trait_confucian_education_2: "Classicista Estudioso"
 trait_confucian_education_2_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] aplica com humildade os ensinamentos de Confúcio à sua vida cotidiana."
 trait_confucian_education_3: "Eticista Virtuoso"
 trait_confucian_education_3_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] está começando a compreender o que significa ser um virtuoso confucionista."
 trait_confucian_education_4: "Paragão Moral"
 trait_confucian_education_4_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] está vivendo de acordo com o Caminho como um verdadeiro exemplo."
 trait_confucian_education_5: "Sábio Imaculado"
 trait_confucian_education_5_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] é praticamente um[ROOT.GetCharacter.Custom('ES_XA')] santo[ROOT.GetCharacter.Custom('ES_OA')] nos círculos confucionistas. Outros confucionistas de muitos lugares ouviram falar de sua destreza moral e ética."
