 SEX_MALE: "Homem"
 SEX_FEMALE: "Mulher"
 #Education Traits
 trait_education_intrigue_1: "Conspirador Amador"
 trait_education_intrigue_1_desc: "O Conspirador Amador recebeu alguma instrução na arte da intriga, mas qualquer domínio real dessa arte lhe escapou."
 trait_education_intrigue_1_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] recebeu alguma instrução na arte da intriga, mas qualquer conhecimento real dessa arte lhe escapou."
 trait_education_intrigue_2: "Trapaceiro Flamboyante"
 trait_education_intrigue_2_desc: "O Trapaceiro Flamboyante recebeu uma educação na arte da intriga, mas ainda tem muito a aprender antes que erros e trapalhadas deixem de ser a regra."
 trait_education_intrigue_2_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] recebeu uma educação na arte da intriga, mas ainda tem muito a aprender antes que erros e trapalhadas deixem de ser a regra."
 trait_education_intrigue_3: "Tecelão de Intrigas"
 trait_education_intrigue_3_desc: "O Tecelão de Intrigas é mestre em intriga, manipulação e sigilo."
 trait_education_intrigue_3_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] é um[ROOT.GetCharacter.Custom('ES_XA')] mestre[ROOT.GetCharacter.Custom('ES_OA')] da intriga, da manipulação e do secretismo."
 trait_education_intrigue_4: "Sombra Elusiva"
 trait_education_intrigue_4_desc: "A Sombra Elusiva se destacou como mestre da intriga, e o véu de sigilo que a envolve é incomparável."
 trait_education_intrigue_4_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] se destacou como um[ROOT.GetCharacter.Custom('ES_XA')] mestre[ROOT.GetCharacter.Custom('ES_OA')] da intriga, e o manto de secretismo ao seu redor é incomparável."
 trait_education_intrigue_5: "Mestre das Marionetes"
 trait_education_intrigue_5_desc: "O Mestre das Marionetes é um sussurro ao vento, uma sombra na parede. Sua faca serve onde palavras não serviriam."
 trait_education_intrigue_5_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] é um sussurro ao vento, uma sombra na parede. Sua faca serve onde palavras não serviriam."
 trait_education_diplomacy_1: "Apaziguador Ingênuo"
 trait_education_diplomacy_1_desc: "O Apaziguador Ingênuo recebeu alguma educação na arte da diplomacia, mas ainda assim costuma ser mais um constrangimento para si e para os que o cercam do que qualquer outra coisa."
 trait_education_diplomacy_1_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] recebeu alguma educação na arte da diplomacia, mas, ainda assim, costuma ser mais uma vergonha para si mesm[ROOT.GetCharacter.Custom('ES_OA')] e para aqueles ao seu redor."
 trait_education_diplomacy_2: "Negociador Adequado"
 trait_education_diplomacy_2_desc: "As coisas frequentemente acabam favorecendo o Negociador Adequado, mas ainda se discute se isso se deve à sua habilidade diplomática ou à sorte."
 trait_education_diplomacy_2_character_desc: "As coisas costumam favorecer [ROOT.GetCharacter.GetFirstNameNoTooltip], mas ainda se discute se isso se deve à sua habilidade diplomática ou à sorte."
 trait_education_diplomacy_3: "Negociador Carismático"
 trait_education_diplomacy_3_desc: "Mestre da retórica persuasiva e das nuances da diplomacia, o Negociador Carismático é um excelente diplomata."
 trait_education_diplomacy_3_character_desc: "Mestre[ROOT.GetCharacter.Custom('ES_OA')] da retórica persuasiva e das nuances da diplomacia, [ROOT.GetCharacter.GetFirstNameNoTooltip] é um diplomata excelente."
 trait_education_diplomacy_4: "Eminência Parda"
 trait_education_diplomacy_4_desc: "Tão familiarizado com as nuances da diplomacia quanto com a palma da própria mão, a Eminência Parda é mestre nessa arte."
 trait_education_diplomacy_4_character_desc: "Conhecendo as nuances da diplomacia como a palma da sua mão, [ROOT.GetCharacter.GetFirstNameNoTooltip] é um[ROOT.GetCharacter.Custom('ES_XA')] mestre[ROOT.GetCharacter.Custom('ES_OA')] desta arte."
 trait_education_diplomacy_5: "Árbitro Virtuoso"
 trait_education_diplomacy_5_desc: "A língua de prata do Árbitro Virtuoso pode encantar os corações mais duros e abrir até as portas mais barricadas."
 trait_education_diplomacy_5_character_desc: "A língua de prata de [ROOT.GetCharacter.GetFirstNameNoTooltip] pode conquistar o coração mais duro e abrir a porta mais inexpugnável."
 trait_education_stewardship_1: "Pródigo Dissipador"
 trait_education_stewardship_1_desc: "O Pródigo Dissipador recebeu educação em administração para estudar o fluxo do dinheiro, mas infelizmente esse fluxo parece seguir em uma direção só..."
 trait_education_stewardship_1_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] recebeu educação em administração para estudar o fluxo do dinheiro, mas infelizmente esse fluxo parece seguir em uma direção só..."
 trait_education_stewardship_2: "Escrivão Econômico"
 trait_education_stewardship_2_desc: "O Escrivão Econômico é adequado quando o assunto são investimentos e administração, mas as trapalhadas na arte da gestão ainda são a regra."
 trait_education_stewardship_2_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] é adequado quando o assunto são investimentos e administração, mas as trapalhadas na arte da gestão ainda são a regra."
 trait_education_stewardship_3: "Construtor de Fortuna"
 trait_education_stewardship_3_desc: "O Construtor de Fortuna possui um senso apurado para tudo que diz respeito à administração e é uma força administrativa a ser reconhecida."
 trait_education_stewardship_3_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] possui um senso apurado para tudo que diz respeito à administração e é uma força administrativa a ser reconhecida."
 trait_education_stewardship_4: "Toque de Midas"
 trait_education_stewardship_4_desc: "O Toque de Midas é seguido por sucesso após sucesso na arte da administração, exibindo um domínio incontestável dessa arte."
 trait_education_stewardship_4_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] é seguido por sucesso após sucesso na arte da administração, exibindo um domínio incontestável dessa arte."
 trait_education_stewardship_5: "Soberano Dourado"
 trait_education_stewardship_5_desc: "O Soberano Dourado consegue levar um empreendimento fracassado à prosperidade com o menor vestígio de atenção, fazendo brotar riquezas onde antes havia insolvência."
 trait_education_stewardship_5_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] consegue levar um empreendimento fracassado à prosperidade com o menor vestígio de atenção, fazendo brotar riquezas onde antes havia insolvência."
 trait_education_martial_1: "Guerreiro Desorientado"
 trait_education_martial_1_desc: "O Guerreiro Desorientado recebeu educação na arte da guerra, mas tem mais chance de ferir a si mesmo do que a seus inimigos."
 trait_education_martial_1_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] recebeu uma educação na arte da guerra, mas é mais provável que machuque a si mesm[ROOT.GetCharacter.Custom('ES_OA')] do que aos seus inimigos."
 trait_education_martial_2: "Soldado Durão"
 trait_education_martial_2_desc: "O Soldado Durão demonstrou alguma aptidão em assuntos marciais, mas ainda tem muito a aprender."
 trait_education_martial_2_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] demonstrou alguma aptidão em assuntos marciais, mas ainda tem muito a aprender."
 trait_education_martial_3: "Tático Habilidoso"
 trait_education_martial_3_desc: "O Tático Habilidoso é um comandante confiável e um guerreiro temível, renomado por sua habilidade marcial."
 trait_education_martial_3_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] é um[ROOT.GetCharacter.Custom('ES_XA')] comandante confiável e um[ROOT.GetCharacter.Custom('ES_XA')] guerreir[ROOT.GetCharacter.Custom('ES_OA')] temível, conhecid[ROOT.GetCharacter.Custom('ES_OA')] por sua habilidade marcial."
 trait_education_martial_4: "Estrategista Brilhante"
 trait_education_martial_4_desc: "O campo de batalha é o domínio do Estrategista Brilhante, e nenhum assunto marcial está além de seu conhecimento."
 trait_education_martial_4_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] domina o campo de batalha, e nenhum assunto marcial está além de seu conhecimento."
 trait_education_martial_5: "Senhor da Guerra Exaltado"
 trait_education_martial_5_desc: "O Senhor da Guerra Exaltado supera probabilidades aparentemente insuperáveis no campo de batalha com perfeita facilidade, virando campanhas inteiras com uma única manobra habilidosa."
 trait_education_martial_5_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] supera probabilidades aparentemente insuperáveis no campo de batalha com perfeita facilidade, virando campanhas inteiras com uma única manobra habilidosa."
 trait_education_martial_prowess_1: "Escudeiro Desastrado"
 trait_education_martial_prowess_1_desc: "O Escudeiro Desastrado é cavaleiro apenas tecnicamente, lembrando pouco de seu treinamento formal."
 trait_education_martial_prowess_1_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] é apenas um[ROOT.GetCharacter.Custom('ES_XA')] guerreir[ROOT.GetCharacter.Custom('ES_OA')] em teoria, e lembra pouco do seu treinamento formal."
 trait_education_martial_prowess_2: "Cavaleiro Confiante"
 trait_education_martial_prowess_2_desc: "O Cavaleiro Confiante conhece as formas de combate tradicionais de sua cultura, tendo até lutado algumas escaramuças contra camponeses recalcitrantes ainda na adolescência."
 trait_education_martial_prowess_2_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] conhece bem os métodos de combate tradicionais de sua cultura; quando era adolescente, chegou até a lutar contra alguns camponeses recalcitrantes."
 trait_education_martial_prowess_3: "Bandeirante Formidável"
 trait_education_martial_prowess_3_desc: "O Bandeirante Formidável liderou tropas e combateu bandidos ainda antes da maioridade, temperado pela batalha como um combatente determinado."
 trait_education_martial_prowess_3_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] liderou tropas e lutou contra bandidos até mesmo antes de sua maioridade, endurecendo-se para se tornar um[ROOT.GetCharacter.Custom('ES_XA')] guerreiro[ROOT.GetCharacter.Custom('ES_OA')] decidido[ROOT.GetCharacter.Custom('ES_OA')]."
 trait_education_martial_prowess_4: "Campeão Famoso"
 trait_education_martial_prowess_4_desc: "O Campeão Famoso é conhecido, respeitado e talvez até temido em todo o reino como um expoente das práticas guerreiras de sua cultura."
 trait_education_martial_prowess_4_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] é conhecid[ROOT.GetCharacter.Custom('ES_OA')], respeitad[ROOT.GetCharacter.Custom('ES_OA')] e talvez até temid[ROOT.GetCharacter.Custom('ES_OA')] em todo o reino como um paradigma das práticas guerreiras da sua cultura."
 trait_education_martial_prowess_5: "Lâmina Veloz"
 trait_education_martial_prowess_5_desc: "A proficiência em combate da Lâmina Veloz é comentada em tons sussurrados; seu nome basta para fazer até o veterano mais calejado hesitar."
 trait_education_martial_prowess_5_character_desc: "Fala-se em sussurros da perícia de [ROOT.GetCharacter.GetFirstNameNoTooltip] em combate. Só o nome bastaria para fazer até o veterano mais calejado parar em seco."
 trait_education_learning_1: "Escriba Consciencioso"
 trait_education_learning_1_desc: "Apesar de uma educação voltada para o aprendizado, o Escriba Consciencioso demonstra pouca aptidão para o tema — ao menos sabe ler..."
 trait_education_learning_1_character_desc: "A pesar de uma educação centrada no aprendizado, [ROOT.GetCharacter.GetFirstNameNoTooltip] mostra pouca aptidão para a matéria. Pelo menos sabe ler…"
 trait_education_learning_2: "Pensador Perspicaz"
 trait_education_learning_2_desc: "O Pensador Perspicaz é versado na maioria dos assuntos teológicos, mas infelizmente tanto a verdadeira habilidade quanto a dedicação parecem faltar."
 trait_education_learning_2_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] é expert[ROOT.GetCharacter.Custom('ES_OA')] na maioria das questões teológicas, mas, infelizmente, parece carecer tanto de habilidade real quanto de dedicação."
 trait_education_learning_3: "Intelectual Astuto"
 trait_education_learning_3_desc: "O Intelectual Astuto possui profunda compreensão de teologia, filosofia e de todos os assuntos do saber elevado."
 trait_education_learning_3_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] possui profunda compreensão de teologia, filosofia e de todos os assuntos do saber elevado."
 trait_education_learning_4: "Filósofo Genial"
 trait_education_learning_4_desc: "O Filósofo Genial possui uma percepção extraordinária sobre todos os assuntos do saber superior."
 trait_education_learning_4_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] possui uma percepção extraordinária sobre todos os assuntos do saber superior."
 trait_education_learning_5: "Oráculo Erudito"
 trait_education_learning_5_desc: "O conhecimento do Oráculo Erudito sobre o divino e o mundano é incomparável, e seu conselho é procurado pelos grandes e pelos sábios dos círculos acadêmicos."
 trait_education_learning_5_character_desc: "O conhecimento de [ROOT.GetCharacter.GetFirstNameNoTooltip] sobre o divino e o mundano não tem igual, e até os círculos eruditos mais poderosos recorrem ao seu conselho."
 #Lifestyle Traits
 trait_diplomat: "Diplomata"
 trait_diplomat_desc: "O Diplomata navega com destreza pelas águas perigosas das interações sociais e alcança seus objetivos com carisma deslumbrante e convicção, mediando entre os mais altos governantes da terra."
 trait_diplomat_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] navega com destreza pelas águas perigosas das interações sociais e alcança seus objetivos com carisma deslumbrante e convicção, mediando entre os mais altos governantes da terra."
 trait_family_first: "Família em Primeiro Lugar"
 trait_family_first_neutral: "Hierarca Familiar"
 trait_family_first_male: "Patriarca"
 trait_family_first_female: "Matriarca"
 trait_family_first_desc: "Uma pessoa verdadeiramente dedicada à própria família e à prosperidade de sua Casa."
 trait_family_first_character_desc: "[ROOT.Char.GetWomanMan] verdadeiramente dedicad[ROOT.Char.Custom('ES_OA')] à sua família e à prosperidade da sua Casa."
 trait_august: "Augusto"
 trait_august_desc: "Este personagem é honrado como um verdadeiro governante, digno dos impérios de outrora!"
 trait_august_character_desc: "Recebe honras como um[ROOT.GetCharacter.Custom('ES_XA')] autêntic[ROOT.GetCharacter.Custom('ES_OA')] governante, dign[ROOT.GetCharacter.Custom('ES_OA')] dos impérios de outrora!"
 trait_reveler_1: "Festeiro Ávido"
 trait_reveler_1_desc: "O Festeiro Ávido já provou a vida intoxicante da farra e da devassidão e quer mais."
 trait_reveler_1_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] já provou a vida intoxicante da farra e da devassidão e quer mais."
 trait_reveler_2: "Festeiro Famoso"
 #trait_reveler_2_desc: "The Famous Reveler is the life of every gathering, attracting both debauchery and glamor."
 trait_reveler_2_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] é a alma de toda reunião, atraindo tanto devassidão quanto glamour."
 trait_reveler_3: "Festeiro Lendário"
 #trait_reveler_3_desc: "Food, drink, intoxication of both body and mind — the Legendary Reveler denies themselves nothing and is the nexus of every feast."
 trait_reveler_3_character_desc: "Comida, bebida, intoxicação tanto do corpo quanto da mente… [ROOT.GetCharacter.GetFirstNameNoTooltip] não se nega nada e é o nexo de cada banquete."
 trait_blademaster_1: "Aspirante a Mestre da Lâmina"
 trait_blademaster_1_desc: "Habilidoso em combate pessoal — o Aspirante a Mestre da Lâmina sabe qual ponta enfiar nos outros."
 trait_blademaster_1_character_desc: "Destro[ROOT.Char.Custom('ES_OA')] no combate pessoal, [ROOT.GetCharacter.GetFirstNameNoTooltip] sabe com qual ponta atacar."
 trait_blademaster_2: "Mestre da Lâmina"
 #trait_blademaster_2_desc: "The Blademaster is a formidable and respected opponent in all kinds of combat."
 trait_blademaster_2_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] é um[ROOT.GetCharacter.Custom('ES_XA')] oponente formidável e respeitado em todo tipo de combate."
 trait_blademaster_3: "Mestre da Lâmina Lendário"
 #trait_blademaster_3_desc: "The prowess of the Legendary Blademaster is the stuff of stories."
 trait_blademaster_3_character_desc: "A destreza de [ROOT.GetCharacter.GetFirstNameNoTooltip] é digna de histórias."
 trait_hunter_1: "Caçador Novato"
 trait_hunter_1_desc: "O Caçador Novato atende com destreza ao chamado da natureza e do arco."
 trait_hunter_1_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] atende com destreza ao chamado da natureza e do arco."
 trait_hunter_2: "Caçador"
 #trait_hunter_2_desc: "The Hunter navigates the wilds with uncanny precision and knowledge."
 trait_hunter_2_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] navega pela natureza selvagem com precisão e conhecimento extraordinários."
 trait_hunter_3: "Mestre Caçador"
 #trait_hunter_3_desc: "The Master Hunter lives for the kill."
 trait_hunter_3_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] vive pela caçada."
 trait_strategist: "Estrategista"
 trait_strategist_desc: "Um dedicado estudante da arte da guerra, capaz de virar qualquer situação a seu favor."
 trait_strategist_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] é um dedicado estudante da arte da guerra, capaz de virar qualquer situação a seu favor."
 trait_overseer: "Supervisor"
 trait_overseer_desc: "A orientação, a firmeza de mão e a autoridade necessárias para garantir que os problemas sejam resolvidos adequadamente."
 trait_gallant: "Galante"
 trait_gallant_desc: "A verdadeira nobreza não vem apenas do sangue, mas de ações temperadas por um espírito como aço reluzente."
 trait_architect: "Arquiteto"
 trait_architect_desc: "As obras de um construtor experiente permanecerão de pé por séculos."
 trait_administrator: "Administrador"
 trait_administrator_desc: "Organizar, administrar e aumentar a eficiência — o Administrador dá conta disso."
 trait_administrator_character_desc: "Organizar, administrar e aumentar a eficiência — [ROOT.GetCharacter.GetFirstNameNoTooltip] dá conta disso."
 trait_avaricious: "Avarento"
 trait_avaricious_desc: "Ouro, ouro, ouro! Pode haver chamado maior, meta mais nobre, do que a busca pela riqueza?"
 trait_schemer: "Conspirador"
 trait_schemer_desc: "Entender e manipular o que move as outras pessoas — e explorá-las!"
 trait_schemer_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] vive para entender e manipular o que move as outras pessoas — e explorá-las!"
 trait_seducer: "Sedutor"
 trait_seducer_female: "Sedutora"
 trait_seducer_desc: "Desejar não é difícil. O verdadeiro desafio é #EMP ser#! desejado."
 trait_torturer: "Torturador"
 trait_torturer_desc: "Infligir dor. Segurar a vida de alguém nas próprias mãos. Isso é poder de verdade."
 trait_whole_of_body: "Corpo Inteiro"
 trait_whole_of_body_desc: "Conheça a si mesmo, conheça seus limites e conheça toda a extensão do seu alcance."
 trait_scholar: "Estudioso"
 trait_scholar_desc: "Filosofia, natureza e conhecimento. Entender o mundo é a única forma de governá-lo."
 trait_theologian: "Teólogo"
 trait_theologian_desc: "A divindade guarda a resposta para toda pergunta, do que habita o coração dos homens aos mistérios da vida."
 trait_mystic_female_1: "Sábia"
 trait_mystic_male_1: "Sábio"
 trait_mystic_1_desc: "Esta personagem é conhecida por sua abordagem pouco convencional, porém prática, da religião."
 trait_mystic_1_character_desc: "[ROOT.Char.GetFirstNameNoTooltip] é conhecid pela abordagem pouco convencional, porém prática, que tem da religião."
 trait_mystic_2: "Místico"
 #trait_mystic_2_desc: "This character is known for their unusual methods for achieving religious ascension."
 trait_mystic_2_character_desc: "[ROOT.Char.GetFirstNameNoTooltip] é conhecid por seus métodos incomuns de alcançar ascensão religiosa."
 trait_mystic_3: "Operador de Milagres"
 #trait_mystic_3_desc: "Incense, chants, and odd cantrips – this character works miracles through unconventional means."
 trait_mystic_3_character_desc: "Incenso, cânticos e encantamentos estranhos — [ROOT.Char.GetFirstNameNoTooltip] opera milagres por meios pouco convencionais."
 trait_physician_1: "Médico Novato"
 trait_physician_1_desc: "Esta personagem é treinada na arte da cura."
 trait_physician_1_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] está instruído[ROOT.GetCharacter.Custom('ES_OA')] na arte de curar."
