 trait_scholarly_court_1: "Cortesão Erudito"
 trait_scholarly_court_1_desc: "Esta personagem passou pelo menos [EmptyScope.ScriptValue('years_to_gain_court_type_trait')|0] anos vivendo em uma [GetCourtType('court_scholarly').GetName] erudita, repleta de sábios e intelectuais."
 trait_scholarly_court_1_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] passou pelo menos [EmptyScope.ScriptValue('years_to_gain_court_type_trait')|0] anos vivendo em uma [GetCourtType('court_scholarly').GetName] erudita, repleta de sábios e intelectuais."
 trait_scholarly_court_2: "Cortesão Erudito Valorizado"
 trait_scholarly_court_2_desc: "Este personagem passou pelo menos [EmptyScope.ScriptValue('years_to_gain_court_type_trait')|0] anos vivendo em uma [GetCourtType('court_scholarly').GetName] erudita, cheia de [ROOT.GetCharacter.GetWomenMen] sábios astutos e intelectuais estimados."
 trait_scholarly_court_2_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] passou pelo menos [EmptyScope.ScriptValue('years_to_gain_court_type_trait')|0] anos vivendo em uma [GetCourtType('court_scholarly').GetName] erudita, repleta de [ROOT.GetCharacter.GetWomenMen] astutos e estudiosos respeitados."
