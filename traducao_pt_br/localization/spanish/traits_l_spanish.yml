 game_concept_clouded_eyes_mitigation: "Mitigar Olhos Turvos"
 game_concept_clouded_eyes_mitigation_desc: "Embora não seja possível impedir que a [GetTrait('clouded_eyes').GetName( GetNullCharacter )|l] progrida, é possível desacelerá-la ao:\n$EFFECT_LIST_BULLET$Evitar [Concept('travel', 'viajar')|E]\n$EFFECT_LIST_BULLET$Evitar localidades com [terrain|El] de [GetTerrain( 'desert' ).GetName|l] ou [GetTerrain( 'desert_mountains' ).GetName|l]\n$EFFECT_LIST_BULLET$Evitar localidades com [winter_severity_normal|El] ou [winter_severity_harsh|El]"
 game_concept_fragile_bones_mitigation: "Mitigar Ossos Frágeis"
 game_concept_fragile_bones_mitigation_desc: "Embora não seja possível impedir o avanço de [GetTrait('fragile_bones').GetName( GetNullCharacter )|l], é possível evitar grandes aumentos desta [trait_level_track|El] ao:\n$EFFECT_LIST_BULLET$Evitar [Concept('travel', 'viajar')|E] e realizar [activities|El]\n$EFFECT_LIST_BULLET$Evitar [Concept( 'commander', 'comandar exércitos' )|E]"
 game_concept_withering_mind_mitigation: "Mitigar Mente Definhante"
 game_concept_withering_mind_mitigation_desc: "Embora não seja possível impedir o avanço de [GetTrait('withering_mind').GetName( GetNullCharacter )|l], é possível desacelerá-lo ao:\n$EFFECT_LIST_BULLET$Ter [friends|El] #weak (quanto mais, melhor)#!\n$EFFECT_LIST_BULLET$Ter [lovers|El] #weak (quanto mais, melhor)#!\n$EFFECT_LIST_BULLET$Manter o [stress|El] baixo\n$EFFECT_LIST_BULLET$Ter os [traits|El] [GetTrait('family_first').GetName( GetNullCharacter )|l] ou [GetTrait('seducer').GetName( GetNullCharacter )|l]\n$EFFECT_LIST_BULLET$[Concept('traveling', 'Viajar')|E] e participar de [activities|El]\n\nAlém disso, muitos desses fatores também reduzem a chance de obter este [trait|El]."
 game_concept_infirm_mitigation: "Mitigar Enfermidade"
 game_concept_infirm_mitigation_desc: "Manter-se saudável é a principal forma de evitar a enfermidade.\n\nO [trait|El] [GetTrait('infirm').GetName( GetNullCharacter )|l] progride um nível inteiro ao contrair uma [illness|El], e em pequena quantidade a cada ano.\n\nSe você ficar doente por um longo período, a [trait_level_track|El] avançará muito mais rapidamente a cada ano. Também avançará muito mais rápido se você tiver mais de 65 anos."
 game_concept_elder_traits: "Traços de Saúde da Velhice"
 game_concept_elder_traits_desc: "À medida que os [characters|El] envelhecem, podem ganhar [traits|El] relacionados à idade, como [GetTrait('faltering_heart').GetName( GetNullCharacter )|l] ou [GetTrait('fragile_bones').GetName( GetNullCharacter )|l]. Eles normalmente aparecem por volta dos #V 50#! anos, mas podem surgir antes.\n\nÉ menos provável ganhar esses traços se tiver:\n$BULLET_WITH_TAB$Boa [health|El]\n$BULLET_WITH_TAB$Os traços [GetTrait('athletic').GetName( GetNullCharacter )|l], [GetTrait('physique_good_1').GetName( GetNullCharacter )|l] ou [GetTrait('whole_of_body').GetName( GetNullCharacter )|l]\n$BULLET_WITH_TAB$#indent_newline:6 Para traços como [GetTrait('withering_mind').GetName( GetNullCharacter )|l]: [GetTrait('family_first').GetName( GetNullCharacter )|l], [GetTrait('seducer').GetName( GetNullCharacter )|l], conhecer [languages|El], ter [friends|El] e [lovers|El]#!\n\nÉ mais provável ganhá-los se tiver:\n$BULLET_WITH_TAB$Má [health|El]\n$BULLET_WITH_TAB$Os traços [GetTrait('drunkard').GetName( GetNullCharacter )|l] ou [GetTrait('reclusive').GetName( GetNullCharacter )|l]\n$BULLET_WITH_TAB$[GetModifier( 'obese_modifier' ).GetNameWithTooltip|l] ou [GetModifier( 'malnourished_modifier' ).GetNameWithTooltip|l]\n$BULLET_WITH_TAB$Um [stress|El] alto\n$BULLET_WITH_TAB$Pais ou avós com esses traços"
