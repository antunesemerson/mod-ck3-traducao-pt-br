 pulugaism: "Pūlugaísmo"
 pulugaism_desc: "Os $pulugaism_adherent_plural$ acreditam que o mundo foi forjado por $pulugaism_high_god_name$, o deus lagarto, antes de se cansar da humanidade e castig?-la com uma grande inundação. Apenas dois homens e duas mulheres sobreviveram, e $pulugaism_high_god_name$ os ajudou a recriar o mundo, com a humanidade redescobrindo o fogo e $pulugaism_high_god_name$ recriando todas as coisas naturais. Seus seguidores mantém uma relação complexa, muitas vezes combativa, com $pulugaism_high_god_name$. Atos que despertam a ira de $pulugaism_high_god_name_possessive$ provocam desastres naturais, mas podem ser contornados com o sacrifécio adequado."
