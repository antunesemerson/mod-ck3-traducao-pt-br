 biliku_religion_desc: "Esta ? a crença em um panteão de deuses que mantém uma relação complexa com a humanidade. Muitas histórias nakkavara tratam de grandes ancestrais envolvidos em combate com as principais divindades de sua fé. Alguns personificam a divindade principal como uma deusa aranha, enquanto outros a veem como um deus lagarto. Em todas as versões das histórias, o criador lança um tição contra o grande ancestral que roubou o fogo e então desaparece do mundo material, cansado da humanidade. O criador deixou para três seus filhos, que assumiram a forma do vento para trazer tanto recompensas quanto punições aos humanos."
