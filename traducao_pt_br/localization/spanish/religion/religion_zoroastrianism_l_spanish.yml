 #Mazdayasna
 mazdayasna: "Mazdeísmo"
 mazdayasna_adj: "mazdeísta"
 mazdayasna_adherent: "mazdeísta"
 mazdayasna_adherent_plural: "mazdeístas"
 mazdayasna_desc: "Os seres humanos auxiliam na luta contra #italic Aka Manah#! por meio de bons pensamentos e boas vidas. Isso é feito por meio da pureza ritual, da preservação da natureza e da destruição de criaturas malignas."
 #Behafaridism
 zurvanism: "Behafaridismo"
 zurvanism_adj: "Behafaridi"
 zurvanism_adherent: "Behafaridita"
 zurvanism_adherent_plural: "Behafariditas"
 zurvanism_desc: "Seguidores dos ensinamentos de Behafarid, os $zurvanism_adherent_plural$ buscam cooperação com o mundo islâmico, realizando numerosas reformas em sua fé em resposta às críticas muçulmanas ao Zoroastrismo tradicional. Entre essas reformas estão a proibição do consumo de álcool, a forte oposição ao casamento familiar e o incentivo à caridade como forma de usar a própria riqueza para o bem público."
 #Zurvanism doctrine - FP3 update: removed from doctrine_asceticism and saved for possible future Fatalism tenet.
 tenet_zurvanism_name: "Zurvanismo"
 tenet_zurvanism_desc: "Os zurvanistas acreditam que Ohrmazd e Ahriman eram gêmeos iguais, mas opostos, nascidos de Zurvã, o Criador de tudo. O Zurvanismo enfatiza fortemente o auxílio a Ahura Mazda por meio da erradicação do mal e das falsidades."
 zurvanism_creator_god_name: "Zurvã"
 zurvanism_creator_god_name_possessive: "de Zurvã"
 #Gayomarthianism
 gayomarthianism: "Gayomarthianismo"
 gayomarthianism_adj: "Gayomarthiano"
 gayomarthianism_adherent: "Gayomarthiano"
 gayomarthianism_adherent_plural: "Gayomarthianos"
 gayomarthianism_desc: "Com base na ideia de que Ahura Mazda, por meio de seus pensamentos, criou espíritos malignos por acidente, os Gayomarthianos rejeitam a infalibilidade do Senhor da Sabedoria e, em vez disso, enfatizam a prática ritualística para aprender a Verdade em comunhão com Ahura Mazda."
 #Khurmazta
 khurmazta: "Khurmazdismo"
 khurmazta_adj: "Khurmazta"
 khurmazta_adherent: "Khurmazta"
 khurmazta_adherent_plural: "Khurmaztas"
 khurmazta_desc: "Com raízes profundas na mistura religiosa da Sogdiana, os Khurmazta adoram um amplo conjunto de deuses e espíritos, tanto ancestrais quanto universais. Eles também reverenciam ícones, algo anátema para muitos outros zoroastristas. No entanto, por mais únicos que alguns aspectos de sua fé possam ser, de outras maneiras permanecem dentro da órbita da doutrina zoroastriana tradicional, praticando rituais de pureza e cuidando dos fogos eternos com devoção incessante."
 khurmazta_good_god_zravan: "Zravan"
 khurmazta_good_god_weshparkar: "Weshparkar"
 khurmazta_good_god_adbad: "Adbad"
 khurmazta_fertility_god_name: "Nana"
 khurmazta_fertility_god_name_possessive: "de Nana"
 khurmazta_high_god_name: "Khurmazta Bagh"
 khurmazta_high_god_name_possessive: "de Khurmazta Bagh"
 khurmazta_war_god_name: "Waseghn"
 khurmazta_war_god_name_possessive: "de Waseghn"
 khurmazta_fate_god_name: "Parn"
 khurmazta_fate_god_name_possessive: "de Parn"
 khurmazta_devil_name: "Shimnu"
 khurmazta_devil_name_possessive: "de Shimnu"
 #Mazdakism
 mazdakism: "Mazdakismo"
 mazdakism_adj: "Mazdakita"
 mazdakism_adherent: "Mazdakita"
 mazdakism_adherent_plural: "Mazdakitas"
 mazdakism_desc: "Os profetas radicais Zardusht Khuragan e Mazdak foram influenciados por crenças esotéricas do final da Antiguidade e defenderam a propriedade compartilhada dos recursos e a cooperação universal entre os seres humanos para superar os cinco demônios da avareza, ira, inveja, possessividade e vingança."
 #Khurramism
 khurramism: "Khurramismo"
 khurramism_adj: "Khurramita"
 khurramism_adherent: "Khurramita"
 khurramism_adherent_plural: "Khurramitas"
 khurramism_desc: "Num mundo de Luz e Escuridão, governantes injustos devem ser derrubados em apoio ao que é bom. Por meio de profetas como Mazdak, Abu Muslim e al-Muqanna, os Khurramitas acreditam que o divino nasce na humanidade e um dia retornará para liderá-los como o Messias."
 #Urartuism
 urartuism: "Arewordik"
 urartuism_adj: "Arewordi"
 urartuism_adherent: "Arewordi"
 urartuism_adherent_plural: "Arewordis"
 urartuism_high_god_name: "Aramazd"
 urartuism_high_god_name_2: "$urartuism_high_god_name$"
 urartuism_high_god_name_possessive: "de Aramazd"
 urartuism_fertility_god_name: "Anahit"
 urartuism_fertility_god_name_possessive: "de Anahit"
 urartuism_death_deity_name: "Spandaramet"
 urartuism_death_deity_name_possessive: "de Spandaramet"
 urartu_good_god_the_sun: "Arew"
 urartu_good_god_mithra: "Mihr"
 urartu_good_god_zoroaster: "Zradasht"
 urartuism_desc: "Muitas crenças antigas ainda ressoam na fé Arewordik, uma seita de criptozoroastristas em que Ohrmazd (como Aramazd) governa um panteão de deuses, incluindo o próprio Sol, que juntos dirigem o mundo."
 urartu_good_god_vanatur: "Vanatur"
 urartuism_priest_male: "Hazarpet"
 urartuism_priest_male_plural: "Hazarpets"
 #Afridunism, Daylamite "paganism"
 afridunism: "Afridunismo"
 afridunism_adj: "Afridunista"
 afridunism_adherent: "Afridunista"
 afridunism_adherent_plural: "Afridunistas"
 afridunism_desc: "Com raízes nas tradições dailamitas e no paganismo persa, muitos aspectos do Afridunismo antecedem até mesmo o antigo credo zoroastrista. Os adeptos se esforçam para viver de acordo com as regras estabelecidas pelo herói mítico Faridun, que enfatizam o poder absoluto dos líderes familiares e um feroz espírito de independência."
 afridunism_good_god_mithra: "Mithra"
 afridunism_good_god_hvar_khshaita: "Hvar-Khshaita"
 afridunism_war_god_name: "Verethragna"
 afridunism_war_god_name_possessive: "de Verethragna"
 afridunism_priest_male: "zautar"
 afridunism_priest_male_plural: "zautares"
 #Doctrines for FP3
 doctrine_zoroastrian_branches_name: "Bem e Mal"
 doctrine_zoroastrian_branches_desc: "Devemos apoiar o sacerdócio estabelecido e sua doutrina para proteger nossa fé contra heresias, ou são eles que estão equivocados e corrompidos?"
 doctrine_major_branch_behdin_name: "Behdin"
 doctrine_major_branch_behdin_desc: "Apesar de podermos divergir em algumas peculiaridades da prática, nós, zoroastristas tradicionais, não concordamos sobre os fundamentos da lealdade a Ahura Mazda?"
 doctrine_heretic_branch_zandik_name: "Korramdin"
 doctrine_heretic_branch_zandik_desc: "Os $doctrine_major_branch_behdin_name$ nos chamam de hereges, excluídos e subversivos. Embora nada nos una além do desprezo deles, a retidão dita nossa resistência, e o desdém deles endurece nossos corações."
 doctrine_parameter_hostility_override_doctrine_major_branch_behdin: "Considera outras [faiths|lE] Behdin como [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V]."
 doctrine_parameter_hostility_override_doctrine_heretic_branch_zandik: "Considera outras [faiths|lE] Korramdin como [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V]"
