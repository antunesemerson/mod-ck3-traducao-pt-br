 jainism_religion_desc: "Jainistas buscam seguir os vinte e quatro mestres, os tirthankaras, para deixar o eterno ciclo mundano de morte e renascimento alcançando a onisciência, Kevala Jnana. Não violência e uma vida de retidão estão no centro da fé jainista, uma vez que a principal oração afirma que \"a função das almas é ajudar umas às outras\"."
