 #Digambara
 digambara: "Digambara"
 digambara_adj: "Digambara"
 digambara_adherent: "Digambara"
 digambara_adherent_plural: "Digambaras"
 digambara_desc: "Kevala Jnana liberta o corpo de todas as necessidades físicas. Entretanto, a alma só pode ser libertada quando completamente despida, por isso os monges Digambara devem viver sem roupas."
 #Svetambara
 svetambara: "Svetambara"
 svetambara_adj: "Svetambara"
 svetambara_adherent: "Svetambara"
 svetambara_adherent_plural: "Svetambaras"
 svetambara_desc: "Kevala Jnana é um estado da alma, não do ser físico. Por meio de uma vida de retidão, o indivíduo pode alcançar a onisciência e encerrar o ciclo sem fim. O momento de moksha em si só é alcançável por meio da morte, quando o indíviduo se torna Siddha."
 svetambara_devotee_male: "sadhu"
 svetambara_devotee_male_plural: "sadhus"
 svetambara_devotee_female: "sadhvi"
 svetambara_devotee_female_plural: "sadhvis"
 #Yapaniya
 yapaniya: "Yapaniya"
 yapaniya_adj: "Yapaniya"
 yapaniya_adherent: "Yapaniya"
 yapaniya_adherent_plural: "Yapaniyas"
 yapaniya_desc: "A fé dos jainistas Yapaniya tem certa semelhança tanto com as tradições Svetambara quanto Digambara, provocando os fiéis de ambas. Espera-se que os mendicantes Yapaniya fiquem nus, assim como os Digambara, mas eles não seguem suas regras estritas. A fé também sustenta que mulheres podem alcançar Moksha, e monjas são comuns dentro da fé."
 yapaniya_devotee_male: "sadhus"
 yapaniya_devotee_male_plural: "sadhus"
 yapaniya_devotee_female: "sadhvis"
 yapaniya_devotee_female_plural: "sadhvis"
