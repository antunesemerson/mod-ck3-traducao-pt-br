 mundhum_religion_adj: "Mundhum"
 mundhum_religion_adherent: "Mundhumi"
 mundhum_religion_adherent_plural: "Mundhumistas"
 mundhum_religion_desc: "O mundhumismo é uma tradição religiosa dos povos kirati do Himalaia que se concentra nas antigas histórias e canções chamadas Mundhum, que eles consideram suas escrituras. É uma religião sincrética que incorpora muitas divindades e práticas do hinduísmo junto com o culto aos ancestrais."
