l_spanish:
 doctrine_muhammad_succession_name: "Sucessão de Maomé"
 doctrine_muhammad_succession_desc: "A questão de quem é o sucessor legítimo de Maomé como líder espiritual da comunidade muçulmana é essencial."
 muhammad_succession_sunni_doctrine_name: "Sunita"
 muhammad_succession_sunni_doctrine_desc: "Abu Bakr foi escolhido pela Umma como seu líder de direito, tanto política quanto religiosamente."
 doctrine_parameter_hostility_override_muhammad_succession_sunni_doctrine_1: "Considera outras [faiths|lE] sunitas como [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V]"
 doctrine_parameter_hostility_override_muhammad_succession_sunni_doctrine: "Considera outras [faiths|lE] sunitas como [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V]"
 muhammad_succession_shia_doctrine_name: "Xiita"
 muhammad_succession_shia_doctrine_desc: "Ali foi nomeado por Maomé como líder da Umma, e somente por meio dele a linhagem da liderança espiritual pode ser traçada."
 doctrine_parameter_hostility_override_muhammad_succession_shia_doctrine_1: "Considera outras [faiths|lE] xiitas como [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V]"
 doctrine_parameter_hostility_override_muhammad_succession_shia_doctrine: "Considera outras [faiths|lE] xiitas como [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V]"
 muhammad_succession_muhakkima_doctrine_name: "Muhakkima"
 muhammad_succession_muhakkima_doctrine_desc: "Ali foi o sucessor legítimo de Maomé, e sua aceitação da arbitragem durante a Primeira Fitna, portanto, vai contra a vontade de Alá! Só Ele pode julgar um líder adequado para nós."
 doctrine_parameter_hostility_override_muhammad_succession_muhakkima_doctrine_1: "Considera outras [faiths|lE] Muhakkima como [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V]"
 doctrine_parameter_hostility_override_muhammad_succession_muhakkima_doctrine: "Considera outras [faiths|lE] Muhakkima como [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V]"
 muhammad_succession_zandaqa_doctrine_name: "Zandaqa"
 muhammad_succession_zandaqa_doctrine_desc: "Embora possamos traçar a linhagem do Profeta corretamente ou não de acordo com outros muçulmanos, nossas crenças nos marcam como párias independentemente. Que os pecadores nos chamem de Zandaqa: nós sabemos a verdade!"
