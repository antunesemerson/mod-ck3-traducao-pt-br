 tenet_sacred_shadows_name: "Mentiras Sagradas"
 tenet_sacred_shadows_desc: "Mentir é a mais profunda arte que existe. Aqueles que podem convencer os outros de suas mentiras são santos. Aqueles que podem mentir para si mesmos com sucesso são imparáveis."
 doctrine_parameter_piety_gain_from_successful_intrigue_schemes: "Adeptos ganham piedade por completarem com sucesso [schemes|lE] de [intrigue|lE]"
 doctrine_parameter_adherents_more_likely_to_join_schemes: "Adeptos são mais propensos a se tornarem Agentes nos de outros [schemes|lE] personagens"
 tenet_pursuit_of_power_name: "Busca do Poder"
 tenet_pursuit_of_power_desc: "O que é ou não justo é transitório, definido por aqueles que atualmente detêm o poder. Isso significa que a busca pelo poder é a única causa verdadeiramente justa."
 tenet_pastoral_isolation_name: "Isolamento Pastoral"
 tenet_pastoral_isolation_desc: "Tudo o que queremos é ser deixados em paz. Nossas práticas são nossas e não dizem respeito a ninguém assim como as crenças alheias não nos dizem respeito."
 doctrine_parameter_unattractive_for_character_conversions: "Os [characters|lE], mas não [counties|lE], estão mais dispostos a se deixarem converter para fora desta [faith|lE]"
 tenet_natural_primitivism_name: "Primitivismo Natural"
 tenet_natural_primitivism_desc: "A civilização é antinatural, uma tentativa fútil e blasfema do homem de impor ordem a uma criação inerentemente anárquica. Abracemos o naturismo e vivamos como [ROOT.Faith.PantheonTerm] nos quis, selvagens e livres."
 doctrine_parameter_naked_adherents_active: "Adeptos não usam roupas"
 doctrine_parameter_natural_primitivism_law_cost_increase: "Custos Jurídicos: #N +50%#!"
 doctrine_parameter_unlock_jizya_contract: "Desbloqueia o [vassal_contract|lE] e [tax_decree|lE] da jizia"
 #FP3 tenets
 tenet_communal_possessions_name: "Posses Comunais"
 tenet_communal_possessions_desc: "[ROOT.Faith.HighGodName] pretendia para todos nós uma parcela igual dos recursos da Terra. Devemos manter todas as coisas em comum e redistribuir a riqueza roubada dos poderosos."
 doctrine_parameter_piety_from_gifts_active: "Os seguidores ganham [piety|lE] ao enviar [gifts|lE] e doar [artifacts|lE]"
 doctrine_parameter_piety_from_marrying_lowborn_active: "Os governantes ganham [piety|lE] ao se casar com personagens [lowborn|lE]"
 tenet_sacrificial_ceremonies_name: "Cerimônias de Sacrifício"
 tenet_sacrificial_ceremonies_desc: "O sacrifício humano, tanto voluntário quanto involuntário, nos aproxima do divino. É costume e virtuoso que alguém se ofereça para se sacrificar em cerimônia, assim como é virtuoso sacrificar aqueles que cometeram crimes imperdoáveis contra os Deuses."
 tenet_megaliths_name: "Construções Megalíticas"
 tenet_megaliths_desc: "A adoração não deve ser feita apenas nos limites de um templo, que são construções primitivas do homem que o distraem das criações divinas que nos cercam. Nós abraçamos a pedra e o ar livre, organizando as pedras que o Criador nos deu de maneiras que os agradam e nos aproximam da divindade."
 doctrine_parameter_can_build_megaliths: "Permite a construção de megalitos em domínios [Concept( 'temple', 'consagradas' )|E] e de grandes megalitos nas capitais ducais."
 province_is_of_a_megalith_faith_tt: "Este [county|lE] deve seguir uma [faith|lE] que acredita na importância dos Megaliths."
 tenet_fp3_fedayeen_name: "Fedayeen"
 tenet_fp3_sacred_murder_name: "Assassinato Sagrado"
 tenet_fp3_fedayeen_desc: "Quando a guerra convencional não é suficiente, é nosso dever diante de [ROOT.Faith.HighGodNameAlternate] destruir os seus inimigos por meio de infiltração e decepção. Não devemos temer nem a morte nem a dor e prontamente sacrificamos nossas vidas pela causa maior."
 doctrine_parameter_master_assassin_court_position_unlocked: "Desbloqueia a [court_position|lE] #V [GetCourtPositionType( 'master_assassin_court_position' ).GetName()|l]#!"
 doctrine_parameter_death_is_glory: "Probabilidade de morte ou ferimentos em [battle|lE]: #N +10 %#!"
 doctrine_parameter_sanctioned_assassinations: "Nenhuma perda de [piety|lE] ao matar personagens de uma [faith|lE] diferente por meio de [schemes|lE] de [GetScheme('murder').GetTypeName|l]"
 #EP3 Tenets
 tenet_household_gods_name: "Deuses da Casa"
 tenet_household_gods_desc: "Nós reverenciamos nossos #EMP Lares#! e os #EMP Genii#! — os espíritos protetores que vigiam nossos lares. Acima de tudo, honramos nosso glorioso imperador, cuja alma é encarregada de proteger todo o reino."
 #BP3 Parameter
 doctrine_parameter_allows_brewery: "$allows_brewery$ para [temple_holdings|lE]"
 #TGP
 immaterial_harmony_name: "Harmonia Imaterial"
 special_doctrine_immaterial_harmony_name: "Harmonia Imaterial"
 special_doctrine_immaterial_harmony_desc: "Não há conflito entre nossas tradições e os ensinamentos de Buda ou dos sábios. É possível praticar qualquer uma delas, ou até mesmo todas ao mesmo tempo, sem dificuldade espiritual."
 doctrine_parameter_hostility_override_special_doctrine_immaterial_harmony: "Considera que as [faiths|lE] com a doutrina especial da $special_doctrine_immaterial_harmony_name$ são, e é considerada por estas, [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V] em vez de ser $hostility_astray_tooltippable$, $hostility_hostile_tooltippable$ ou $hostility_evil_tooltippable$"
 tenet_extinction_of_dharma_name: "Extinção do dharma"
 tenet_extinction_of_dharma_desc: "Demônios andam pela terra sob o disfarce de piedosos e devotos; quem matar um dará um passo em direção à Buditude, quem matar dez dará dez passos em direção à Buditude."
 tenet_cranial_trophies_name: "Troféus Cranianos"
 tenet_cranial_trophies_desc: "A cabeça contém a quintaessência de seu proprietário. Ao cortá-la e extrair seu conteúdo, podemos reivindicar para nós essa poderosa energia espiritual."
 doctrine_parameter_killing_bestows_heads: "É possível conseguir um [artifact|lE] troféu cranial ao [executing|lE] outro personagem, matá-lo em um [single_combat_duel|lE] ou abatê-lo em [battle|lE]"
 doctrine_parameter_decapitation_steals_prestige_as_piety: "Ao obter um [artifact|lE] de troféu craniano, o assassino ganhará [piety|lE] adicionalmente em proporção à [prestige|lE] do falecido"
 tenet_benevolent_governance_name: "Governança benevolente"
 tenet_benevolent_governance_desc: "Aqueles que governam as massas têm o dever moral de promover o que é bom e renegar o que é mau. Somente aderindo a esse princípio um governante pode ser verdadeiramente justo."
 tenet_filial_piety_name: "Piedade filial"
 tenet_filial_piety_desc: "A piedade filial e a obediência aos mais velhos são fundamentais para a realização da bondade humana. Quando nossos pais estão vivos, os servimos como convém; quando morrem, os enterramos como convém e depois os veneramos como convém."
 tenet_harmonious_society_name: "Sociedade harmoniosa"
 tenet_harmonious_society_desc: "Tudo deve estar em equilíbrio: indivíduos, natureza, sociedade. O Filho do Céu marca o tempo e nós seguimos seu canto."
 doctrine_parameter_sway_scheme_better: "[scheme_success_chance|E] de [GetScheme('sway').GetTypeName]: #P +15 %#! [success_chance_i]"
 doctrine_parameter_sway_scheme_piety: "As [schemes|lE] de [GetScheme('sway').GetTypeName] bem-sucedidas direcionadas contra seu [liege|lE] ou [vassals|lE] fornecem [piety|lE] [piety_i]"
 doctrine_parameter_more_often_zealots: "É mais provável que os [vassals|lE] tenham a [Concept('vassal_stance', 'postura')|lE] [GetVassalStance( 'zealot' ).GetName] [GetVassalStance( 'zealot' ).GetTextIcon]"
 tenet_harmonious_society_sway_boon: "Sua [faith|lE] tem [GetFaithDoctrine('tenet_harmonious_society').GetBaseName]: $VALUE|+0=$"
 tenet_pursuit_of_knowledge_name: "Busca pelo conhecimento"
 tenet_pursuit_of_knowledge_desc: "Aqueles dotados naturalmente com o conhecimento desde o nascimento são os mais superiores. Aqueles que buscam o conhecimento voluntariamente vêm em segundo lugar. Aqueles que são lentos e não buscam aprender são os mais baixos entre as pessoas."
 doctrine_parameter_inspections_unlocked_and_costs_piety: "Desbloqueia a [activity|lE] [GetActivityType('activity_survey').GetName] por um custo de [piety|lE]"
 doctrine_parameter_inspection_gives_devotion: "Ao concluir a [activity|lE] [GetActivityType('activity_survey').GetName] concede [piety_experience|lE]"
 doctrine_parameter_better_study_scheme: "[scheme_success_chance|E] de [GetScheme('study_confucian_classics').GetTypeName]: #P +15 %#! [success_chance_i]"
 doctrine_parameter_parents_get_hooks_on_children: "Os progenitores receberão automaticamente [perpetual_hooks|lE] sobre seus [children|lE]"
 tgp_local_shrines_patronized: "Santuários locais patrocinados"
 tenet_sacred_destruction_name: "Destruição sagrada"
 tenet_sacred_destruction_desc: "Não há criação sem destruição. Para que algo novo comece, algo velho deve acabar."
 doctrine_parameter_successful_sieges_give_piety: "Vencer um [siege|lE] ofensivo concede [piety|lE] e destrói mais [development|lE] do [county|lE]"
 successful_sieges_give_piety_toast: "Dogma de $tenet_sacred_destruction_name$"
 tenet_preservation_name: "Conservação"
 tenet_preservation_desc: "Criação, proteção, transformação. A virtude deriva da construção, de erguer algo e vê-lo prosperar."
 building_temples_gives_development_toast: "Dogma de $tenet_preservation_name$"
 doctrine_parameter_building_temples_gives_development: "Construir em uma [church_holding|lE] ou em uma [Concept('temple_citadel_holding', 'ciudadela santuario')|E] aumenta o [development|lE] do [county|lE]"
 doctrine_parameter_monastic_schools_allowed_in_every_holding_type: "Permite a construção da linha de [buildings|lE] #V $building_type_monastic_schools_01$#! em todos os [Concept('holding_types', 'tipos de posesiones')|E]"
