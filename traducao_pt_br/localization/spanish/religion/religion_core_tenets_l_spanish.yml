l_spanish:
 doctrine_core_tenets_name: "Princípios"
 tenets_name: "Princípios"
 #Abrahamic Tenets
 tenet_communion_name: "Comunhão"
 tenet_communion_desc: "Nossos rituais não são meramente simbólicos — eles invocam a própria presença do divino. Aqueles que não podem ou não se juntam a nós em sua prática não podem ser verdadeiros crentes."
 doctrine_parameter_seek_indulgences_active: "Personagens podem #V Seek Indulgences#! de seus [head_of_faith|lE] para pagar [gold|lE] em troca de [piety|lE]"
 doctrine_parameter_seek_indulgences_active_2: "Os personagens que cometeram atos [Concept( 'criminal', 'criminales' )|E] também podem #V comprar indulgencia#! para obter o perdão"
 doctrine_parameter_excommunication_active: "Os [heads_of_faith|lE] espirituais podem [excommunicate|lE] outros personagens de sua [faith|lE]"
 tenet_excommunicated: "[GetTrait('excommunicated').GetName( GetNullCharacter )]"
 tenet_armed_pilgrimages_name: "Peregrinações Armadas"
 tenet_armed_pilgrimages_desc: "Nossos peregrinos viajam pelo mundo para visitar nossos locais sagrados - teremos prazer em empunhar a espada para mantê-los seguros de qualquer um que tente prejudicá-los"
 doctrine_parameter_cheaper_holy_wars_active: "Custa aos [rulers|lE] desta [faith|lE] #P -20%#! menos [piety|lE] para declarar [holy_wars|lE]"
 doctrine_parameter_great_holy_wars_active: "Se houver, o [head_of_faith|lE] pode declarar uma [great_holy_war|lE] quando a [faith|lE] tiver alto [fervor|lE]"
 doctrine_parameter_ghw_no_hof_conversion_buffs_active: "Na ausência de [head_of_faith|lE], os adeptos recebem um bônus para a [councillor_task|lE] de [convert_county|lE] por cada [holy_site|lE] controlado"
 doctrine_parameter_pilgrimage_decision_active: "Personagens desta [faith|lE] ganham um bônus adicional após a conclusão bem sucedida de uma [pilgrimage|lE]"
 tenet_monasticism_name: "Monasticismo"
 tenet_monasticism_desc: "Os prazers da boa comida e bebida só servem para nos distrair do serviço ao divino. Nos isolar em monastérios remotos é a melhor maneira de evitar essas tentações."
 doctrine_parameter_take_vows_active: "Os [courtiers|lE] podem fazer os votos e se tornar [GetTrait('devoted').GetName( GetNullCharacter )]."
 tenet_divine_marriage_name: "Casamento Divino"
 tenet_divine_marriage_xwedodah: "Xwedodah"
 tenet_divine_marriage_desc: "Ao casar-se com parentes próximos, imitamos as uniões sagradas dos primeiros seres na criação. Boas qualidades serão transmitidas à nossa linhagem familiar e, assim, ganhamos pureza e favor na batalha eterna contra o mal."
 doctrine_parameter_divine_marriage_opinion: "Adeptos que são casados com um membro [close_family|lE] tem $VALUE|0+=$ [opinion|lE] dos [vassals|lE] da mesma [faith|lE]"
 doctrine_parameter_divine_marriage_piety_gain_active: "O bonus de casamento de [GetFaithDoctrine('doctrine_monogamy').GetBaseName] tambem garante uma grande quantidade de [piety|lE] se voce se casar com um membro [close_family|lE]"
 tenet_pacifism_name: "Pacifismo"
 tenet_pacifism_desc: "A viol?ncia ? um ato abomin?vel que s? leva ao sofrimento, ? dor e ao arrependimento. Trabalhando para evit?-la sempre que poss?vel, podemos construir sociedades mais fortes e seguras para os fi?is viverem."
 doctrine_parameter_holy_wars_forbidden: "Não pode declarar nenhum tipo de [Concept( 'holy_wars', 'guerra santa' )|E] nem [raid|lE]"
 doctrine_parameter_pacifist_opinion_active: ""
 pacifist_opinion_active_opinion_name: "Companheiro Pacifista"
 pacifist_opinion_active_county_opinion_name: "Condado do Companheiro Pacifista"
 doctrine_parameter_opinion_of_pacifist_opinion_active: "[opinion|E] de outros Pacifistas: $VALUE|+=0$"
 doctrine_parameter_piety_from_long_peace: "Governantes em paz por pelo menos dois anos terão sua [piety|lE] alterada em $VALUE|+$ cada mês"
 PIETY_LONG_PEACE: "Longa Paz"
 tenet_vows_of_poverty_name: "Votos de Pobreza"
 tenet_vows_of_poverty_desc: "O dinheiro corrompe os corações dos homens e afasta-os da verdadeira fé. Nós devemos evitar a aquisição de riqueza material se quisermos nos concentrar no que realmente importa."
 doctrine_parameter_vows_of_poverty_active: "Os [rulers|lE] podem [decide|lE] fazer um Voto de Pobreza, reduzindo a renda de [tax|lE], mas aumentando o ganho mensal de [piety|lE]"
 tenet_human_sacrifice_name: "Sacrifício Humano"
 tenet_human_sacrifice_desc: "A melhor forma de provar nossa devoção é através do ato de sacrifício. O mais valioso sacrifício que podemos oferecer é o sacrifício de uma vida humana."
 doctrine_parameter_human_sacrifice_active: "As [executions|lE] ganham [piety|lE] em vez de custar [piety|lE]\n$EFFECT_LIST_BULLET$ As [executions|lE] nunca custam [prestige|lE] ao [sharing_power|lE]"
 doctrine_parameter_flower_war_cb_active: "Concede o [casus_belli|lE] de [flowery_war|lE] contra reinos vizinhos desta [faith|lE]"
 tenet_gruesome_festivals_blot_name: "Blót"
 tenet_gruesome_festivals_name: "Festivais Terríveis"
 tenet_gruesome_festivals_desc: "Todos nós nascemos no sangue. Sobrevivemos pelo sangue de nosso gado, nossa família, nossos inimigos. É apenas natural que [ROOT.Faith.PantheonTerm] exijam sua justa parte."
 gruesome_festivals_active_name: "habilidade para realizar sacrifícios grandiosos"
 doctrine_parameter_gruesome_festivals_active: "Capaz de realizar sacrifícios grandiosos cerca de uma vez a cada década para sujeitos do mesma-[faith|lE] e [county_opinion|lE]"
 tenet_volcanic_veneration_name: "Veneração Vulcânica"
 tenet_volcanic_veneration_desc: "Há pouco mais divino do que a terra recém-nascida jorrando das profundezas flamejantes de nossa casa. Passamos nossas vidas à beira do desastre, sempre à mercê de [ROOT.Faith.PantheonTerm]."
 tenet_cthonic_redoubts_name: "Redutos Cthônicos"
 tenet_cthonic_redoubts_desc: "Não há abrigo melhor do que as raízes da Terra, nenhuma fortaleza mais resistente do que suas espinhas proeminentes, nenhuma peregrinação mais sagrada do que suas trilhas ocultas. Observamos a Criação de cima desses cumes altivos e sentimos o verdadeiro peso do Divino."
 doctrine_parameter_easier_to_convert_faith_in_mountains: "Velocidade de [convert_county|lE] em [terrain|lE] montanhosos: #P +[EmptyScope.ScriptValue('easier_to_convert_faith_in_mountains_bonus_loc_control')|0]%#!"
 doctrine_parameter_easier_to_convert_culture_in_same_faith_mountains: "Velocidade de [promote_culture|lE] em ([terrain|lE]) de montanha da mesma [faith|lE]: #P +[EmptyScope.ScriptValue('promote_culture_easier_to_convert_culture_in_same_faith_mountains_bonus_loc_control')|0] %#!"
 doctrine_parameter_harder_to_convert_faith_away_in_mountains: "Velocidade hostil de [convert_county|lE] em [terrain|lE] montanhosos: #P [EmptyScope.ScriptValue('harder_to_convert_faith_away_in_mountains_malus_loc_control')|0]%#!"
 tenet_consolamentum_name: "Endura"
 tenet_consolamentum_name_alternate: "Suicídio Ritual"
 tenet_consolamentum_desc: "Quando envelhecemos ou adoecemos, nós realizamos um ritual para purificar nossas almas do pecado. Uma vez feito, encerramos nossas vidas de forma rápida e definitiva, para que o pecado não tenha oportunidade de nos infestar novamente."
 doctrine_parameter_consolamentum_active: "Adeptos podem [decide|lE] encerrar suas vidas quando velhos, incapazes ou morimbumdos; Fazer isso não causa nenhuma das penalidades regulares por suicídio"
 tenet_gnosticism_name: "Gnosticismo"
 tenet_gnosticism_desc: "Por meio do conhecimento, a centelha divina que repousa dentro de todos os seres humanos pode ser libertada e retornar à sua fonte celestial no reino espiritual."
 doctrine_parameter_hostility_override_tenet_gnosticism: "Considera que as outras [faiths|lE] gnósticas e dualistas são [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V] em vez de $hostility_hostile_tooltippable$ ou $hostility_evil_tooltippable$"
 doctrine_parameter_hostility_override_special_doctrine_is_gnostic_faith: ""
 doctrine_parameter_granting_titles_gives_stress: "Doar [titles|lE] alivia uma quantidade proporcional de [stress|lE]"
 tenet_mendicant_preachers_name: "Pregadores Mendicantes"
 tenet_mendicant_preachers_desc: "Nossos missionários viajam por toda a parte com nada além das roupas do corpo. Eles vivem da generosidade daqueles que visitam e, em troca, compartilham o conhecimento da verdadeira fé."
 doctrine_parameter_mendicant_preachers_conversion_active: "Velocidade de conversão do Condado: #P +33#!"
 tenet_communal_identity_name: "Identidade Comunal"
 tenet_communal_identity_desc: "Nossa fé e nossa cultura são intrinsecamente ligadas. Esta prática fortalece os laços de nossa comunidade, embora tenda a exluir os estrangeiros."
 doctrine_parameter_same_communal_identity_opinion_active: "#P +10#! [opinion|lE] com personagens da mesma [faith|lE]"
 doctrine_parameter_same_culture_conversion_bonus_active: "Velocidade de conversão em [counties|lE] da minha [culture|lE] : #P +50%#!"
 doctrine_parameter_same_faith_promote_culture_bonus_active: "Velocidade ao promover cultura em [counties|lE] da minha [faith|lE]: #P +50%#!"
 doctrine_parameter_other_culture_conversion_penalty_active: "Velocidade de conversão em [counties|lE] de uma [culture|lE] diferente: #N -50%#!"
 tenet_pentarchy_name: "Eclesiarcado"
 tenet_pentarchy_alternate_name: "A Pentarquia"
 tenet_pentarchy_desc: "Nosso locais sagrados são mais do que só lugares sagrados - eles são o próprio trono do poder, de onde nossos líderes religiosos governam."
 tenet_aniconism_name: "Aniconismo"
 tenet_aniconism_desc: "A adoração de imagens tem cegado muitos para a verdade divina. Nós expulsaremos todos os ídolos de nossos locais sagrados para que nossos fiéis não caiam nessa armadilha."
 doctrine_parameter_reforging_artifacts_costs_piety: "Os [rulers|lE] desta [faith|lE] devem gastar [piety|lE] para [reforge|lE] ou [repair|lE] [artifacts|lE]"
 doctrine_parameter_destroying_artifacts_is_pious: "Os [rulers|lE] desta [faith|lE] podem destruir [artifacts|lE] por [piety|lE]"
 destroying_artifacts_is_not_pious_tt: "Sua [faith|lE] não pode destruir [artifacts|lE] por [piety|lE]"
 artifact_is_rarer_than_masterwork_tt: "Este [artifact|lE] tem uma [rarity|lE] maior do que Obra-prima"
 tenet_alexandrian_catechism_name: "Catecismo Alexandrino"
 tenet_alexandrian_catechism_desc: "A Escola Catequista de Alexandria teve a longa tradição de encorajar os teólogos a pensar criticamente e questionar o status quo.\n\n Apesar da destruição física da escola, nós mantivemos essas tradições."
 tenet_islamic_rationalism_name: "Racionalismo Islâmico"
 tenet_islamic_rationalism_desc: "Dado que [ROOT.Faith.HighGodNameAlternate] é justo e sábio, não pode ir contra a razão nem desconsiderar o bem-estar de Sua criação. Somente por meio da razão pura podemos esperar compreender nossa parte em Sua grande obra e distinguir o bem do mal."
 tenet_hedonistic_name: "Hedonista"
 tenet_hedonistic_desc: "O divino preencheu este mundo com uma abundância de prazeres para nos entregarmos e desfrutarmos - não aproveitar de tais coisas é desprezar a própria obra da criação."
 doctrine_parameter_piety_from_feasts_active: "Sediar um [GetActivityType('activity_feast').GetName|l] aumenta a [piety|lE]"
 doctrine_parameter_piety_from_festivals_active: "[AddLocalizationIf( HasDlcFeature( 'all_under_heaven' ), 'doctrine_parameter_piety_from_festivals_active_auh')]" #Only show if you have AUH
 doctrine_parameter_piety_from_festivals_active_auh: "Realizar um [GetActivityType('activity_festival').GetName|l] concede [piety|lE]"
 tenet_carnal_exaltation_name: "Exaltação Carnal"
 tenet_carnal_exaltation_desc: "Os prazeres da carne são sublimes de uma maneira que transcende outras experiências terrenas, nos aproximando do divino. Nós devemos glorificar nossos desejos sexuais e buscar oportunidades de saciá-los."
 tenet_polyamory_name: "Poliamor"
 tenet_polyamory_desc: "Nosso amor mútuo deve ser tão incondicional quanto o amor de [ROOT.Faith.FertilityGodName] por nós. Devemos expulsar as ideias antiquadas de que uma pessoa é dona do afeto de outra."
 doctrine_parameter_no_unfaithfulness_penalty_active: "Adeptos não recebem penalidade de [opinion|lE] ou [imprisonment_reasons|lE] de seus cônjuges ou amantes de seus cônjuges por terem relações extraconjugais"
 tenet_unrelenting_faith_name: "Fé Implacável"
 tenet_unrelenting_faith_desc: "Nossas convicções são fortes, e teremos prazer em lutar e morrer por nossa fé. Não importa o quanto as probabilidades estejam contra nós, não devemos nos render."
 tenet_unrelenting_faith_zandik_name: "Rebelião Justa"
 tenet_unrelenting_faith_zandik_desc: "Não desejamos mal a nenhuma alma, nem a nada, mas se nossos caminhos forem ameaçados, os defenderemos com ferocidade implacável."
 tenet_rite_name: "Rito"
 tenet_rite_desc: "Nossas crenças não são tão diferentes das de nossa fé mãe... por que discutir sobre detalhes quando concordamos nos pontos principais da doutrina e, o mais importante, na autoridade final para arbitragem?"
 doctrine_parameter_maintains_head_of_faith_on_creation: "Novas [faiths|lE] mantêm seus antigos [head_of_faith|lE] na criação"
 doctrine_parameter_ecumenical_christians_keep_ecumenism: "[GetPlayer.Custom('GetRiteEcumenismFullOrEmpty')]"
 GetRiteEcumenismFullOrEmpty_full: "As [faiths|lE] cristãs com a [GetFaithDoctrine('special_doctrine_ecumenical_christian').GetBaseName] mantêm-na na criação"
 GetRiteEcumenismFullOrEmpty_empty: ""
 #Muslim Tenets
 tenet_struggle_submission_name: "Luta e Submissão"
 tenet_struggle_submission_desc: "A vontade divina é a fonte de todo o bem, logo uma boa existência é baseada em submissão a essa vontade, expressa através da luta para cumprí-la."
 doctrine_parameter_bonus_holy_war_piety_active: "A [piety|lE] e [piety_experience|lE] por vencer [holy_wars|lE] aumentam em #P 50%#!"
 tenet_religious_legal_pronouncements_name: "Lei Religiosa"
 tenet_religious_legal_pronouncements_hisbah: "Hisbah"
 tenet_religious_legal_pronouncements_fatwa: "Fátua"
 tenet_religious_legal_pronouncements_halakha: "Halachá"
 tenet_religious_legal_pronouncements_desc: "O limite entre argumentos teológicos e jurídicos é tênue, e as qualidades espirituais podem e devem ser consideradas em assentamentos seculares."
 doctrine_parameter_temporal_condemnation_enabled: "Governantes com um [learning|lE] alto podem condenar seus vassalos [Concept( 'sinful', 'pecaminosos' )|E]. Quanto mais pecaminoso for um vassalo, menos aprendizado seu governante precisa para condená-lo.\n$EFFECT_LIST_BULLET$Vassalos condenados são vistos como [criminals|lE] e seus títulos podem ser revogados"
 doctrine_parameter_religious_legal_pronouncements_law_cost_reduction: "Custos Jurídicos: #P -10%#!"
 tenet_religious_legal_pronouncements_cost_tooltip: "Lei Religiosa: #P -10%#!"
 tenet_religious_fatwa_cost_tooltip: "Fátua: #P -10%#!"
 tenet_religious_halakha_cost_tooltip: "Halachá: #P -10%#!"
 tenet_false_conversion_sanction_name: "Falsas Conversões Sancionadas"
 tenet_temporal_condemnation_taqiya: "Taqiya"
 tenet_anusim: "Anusim"
 tenet_false_conversion_sanction_desc: "Se sua vida está ameaçada, é aceitável professar uma falsa fé, contanto que você mantenha a verdade em seu coração."
 doctrine_parameter_sanctioned_false_conversion: "Resistência à conversão: #P +30%#!\n$EFFECT_LIST_BULLET$[characters|E] e [counties|lE] podem às vezes voltar a esta [faith|lE] se se desviarem."
 tenet_tax_nonbelievers_name: "Impostos dos Não Crentes"
 tenet_tax_nonbelievers_desc: "O serviço militar é para os crentes somente, enquanto um imposto é cobrado dos não crentes pela proteção que lhes é oferecida."
 tenet_tax_nonbelievers_jizya_name: "Jizia"
 tenet_literalism_name: "Literalismo"
 tenet_literalism_desc: "Nossas escrituras sagradas claramente afirmam a intenção divina, e a interpretação humana é de valor limitado."
 doctrine_parameter_literalist_debate_enabled: "Pode debater com outros nobres do reino a custo de [opinion|lE] para ganhar ou perder [piety|lE]"
 tenet_legalism_name: "Legalismo"
 tenet_legalism_desc: "Nossas leis s?o o resultado de gera??es de sabedoria e devo??o, e segui-las ?, por sua pr?pria natureza, um ato piedoso. Um pecador, n?o importa quem, nunca estar? acima da lei."
 doctrine_parameter_legalism_reduced_faction_virtues: "Os [vassals|lE] e [counties|lE] são menos propensos a se juntar a [factions|lE] contra um governante [virtuous|lE]"
 doctrine_parameter_legalism_increased_faction_sins: "É mais provável que [vassals|lE] e [counties|lE] se juntem a [factions|lE] contra um governante [sinful|lE]"
 doctrine_parameter_legalism_modified_law_costs: "Reduz os custos jurídicos em #P -10%#! para cada [virtue|lE] que um governante tem"
 doctrine_parameter_legalism_modified_law_costs_2: "Aumenta os custos jurídicos em #N 10%#! para cada [sin|lE] que um governante tem"
 doctrine_parameter_legalism_trust_just_leader_active: "Os [electors|lE] regidos por tipos de [succession|lE] eletiva têm mais probabilidade de votar na escolha de seu [liege|lE] se seu Suserano tiver o traço $trait_just$"
 tenet_legalism_law_cost_tooltip: "[legalism|E]:\n Meus pecados e virtudes estão afetando isso em: [SCOPE.ScriptValue('legalism_law_cost_modifier')|-0%]"
 tenet_reincarnation_name: "Reencarnação"
 tenet_reincarnation_desc: "Já vivemos muitas vidas antes desta e continuaremos a viver muitas outras vidas após esta. Cada morte é somente o começo de algo novo."
 tenet_reincarnation_zoroastrian_name: "Raj'a"
 tenet_reincarnation_zoroastrian_desc: "Assim como os deuses podem encarnar em corpos humanos, também podemos renascer. Os bons são recompensados com formas de beleza e pureza, e podem eventualmente tornar-se anjos de luz pura."
 doctrine_parameter_reincarnation_resistance_to_conversion: "Resist?ncia ? convers?o do condado: #P +20%#!"
 doctrine_parameter_reincarnation_events_active: "Crianças tem uma chance de ser consideradas como a reencarnação de um ancestral, gerando bônus em [piety|lE] e [opinion|lE]"
 tenet_esotericism_name: "Esoterismo"
 tenet_esotericism_kabbalah: "Cabala"
 tenet_esotericism_desc: "Os grandes mistérios do divino podem estar além da compreensão mortal, mas isso não é desculpa para a ignorância. Sua própria existência nos obriga a buscar conhecimento e compreensão do mundo ao nosso redor."
 doctrine_parameter_tenet_esotericism_mystic_education: "Crianças com o [education_focus|lE] em [learning|lE] podem adquirir a característica [GetTrait('lifestyle_mystic').GetName( GetNullCharacter )] se se saírem bem em seus estudos."
 tenet_esotericism_kabbalah_desc: "Os ensinamentos da Cabala tornam compreensível para os mortais a relação entre o Deus eterno, a natureza do infinito conhecida como Ein Sof, e a criação de Deus. A Cabala forma a base para todo o misticismo judaico, e os praticantes da Cabala frequentemente interagem com outras escolas judaicas."
 tenet_religious_kabbalah_cost_tooltip: "Cabala: #P -10%#!"
 #Eastern Tenets
 tenet_adaptive_name: "Adaptativa"
 tenet_adaptive_desc: "A adesão dogmática a velhas restrições só prejudica os fiéis. Enquanto nos mantivermos fiéis às crenças fundamentais de nossa fé,podemos adaptar nossas leis ao mundo a nossa volta."
 doctrine_parameter_tenet_adaptive_conversion_resistance: "Resitência à conversão do Condado: #P +30%#!"
 doctrine_parameter_reduced_vassal_religion_discontent: "Os [vassals|lE] infiéis são menos propensos a se unir às [factions|lE] independentistas e populistas"
 doctrine_parameter_immaterial_harmony_conversion_cost_reduced: "Custo de [piety|El] [piety_i|E] para se converter a outra [faith|El] com esta [doctrine|El] : #P -50 %#!"
 doctrine_parameter_immaterial_harmony_buddhist_take_vows: "As [faiths|El] [GetReligionByKey('buddhism_religion').GetAdjective]s podem usar a [interaction|El] #V $take_vows_interaction$#!"
 tenet_inner_journey_name: "Jornada Interior"
 tenet_inner_journey_desc: "Somente pelo entendimento de si mesmo nós podemos entender o mundo. A jornada de auto-descoberta é importante, uma vez que é longa e difícil."
 doctrine_parameter_meditation_mechanics_active: "Personagens podem [decide|lE] meditar em reclusão, reduzindo o [stress|lE] e possivelmente ganhando percepções teológicas"
 tenet_dharmic_pacifism_name: "Pacifismo Dármico"
 tenet_dharmic_pacifism_desc: "Somos todos uma parte da ordem cósmica. A violência contra qualquer coisa é violência contra tudo, inclusive a si mesmo."
 tenet_bhakti_name: "Bhakti"
 tenet_bhakti_patron_god_name: "Deuses Patronos"
 tenet_bhakti_desc: "Os mortais não podem viver à altura da glória divina, mas pela seleção de um único aspecto da divindade para imitar, adorar e ser devoto, podemos nos aproximar daquilo que, de outra forma, seria impossível."
 doctrine_parameter_select_personal_god_active: "Governantes podem [decide|lE] escolher um avatar pessoal para venerar, recebendo um bônus relacionado a este."
 tenet_asceticism_name: "Ascese"
 tenet_asceticism_desc: "As buscas materialistas nos cegam para a verdade divina. Só nos dedicando a uma vida simples, sem luxos, é possível alcançar a iluminação espiritual."
 tenet_ritual_hospitality_name: "Hospitalidade Ritual"
 tenet_ritual_hospitality_alternate_name: "Puja"
 tenet_ritual_hospitality_desc: "\"Hospitalidade é uma das maiores virtudes que a humanidade pode mostrar. Os hóspedes em nossas casas, sejam eles mortais ou divinos, devem ser tratados sempre com a maior honra e respeito."
 doctrine_parameter_host_honored_guests_active: "Os [rulers|lE] podem hospedar outros personagens como Convidado de Honra, gastando [piety|lE] em troca de um aumento em [opinion|lE]"
 #Pagan tenets
 tenet_warmonger_name: "Guerreiro"
 tenet_warmonger_desc: "Fé e guerra andam de mãos dadas. Aquele que se recusa a lutar em nome do divino não pode ser chamado de verdadeiro crente."
 doctrine_parameter_conquest_cb_enabled: "Os [rulers|lE] têm um [casus_belli|lE] de conquista contra governantes vizinhos."
 doctrine_parameter_faith_can_raid: "Permite [Concept( 'raiding', 'asaltar' )|E] [counties|lE] estrangeiros para obter saque"
 doctrine_parameter_invasion_cb_enabled: "Os [rulers|lE] prestigiosos podem usar um [casus_belli|lE] de invasão uma vez na vida"
 doctrine_parameter_great_holy_wars_active_if_reformed: "Se houver, o [head_of_faith|lE] pode declarar [great_holy_wars|lE] desde que esta [faith|lE] seja [organized|lE]."
 tenet_ancestor_worship_name: "Adoração ao Ancestral"
 tenet_ancestor_worship_desc: "Nossos ancestrais nos protegem de além túmulo, nos guiando e mostrando o caminho a seguir. Por isso nós devemos honrá-los e respeitá-los."
 tenet_adorcism_name: "Adorcismo"
 tenet_adorcism_desc: "Os esp?ritos deste mundo podem realizar grandes obras, tanto boas quanto malignas. Ao honr?-los e respeit?-los, s? podemos esperar que fa?am o bem a n?s e o mal aos nossos inimigos."
 doctrine_parameter_spirit_possession_active: "Habilita a [decision|lE] 'Buscar o Auxílio dos Espíritos'"
 tenet_ritual_celebrations_name: "Celebrações Rituais"
 tenet_ritual_celebrations_desc: "A adoração do divino é algo a ser exaltado e compartilhado com nossa comunidade. Organizar grandes festivais para honrar e louvar o divino nos aproxima."
 doctrine_parameter_mandatory_feast_attendance: "É mais provável que participem [vassals|lE] de seus banquetes e, se se recusarem, perderão [piety|lE] por isso"
 tenet_sky_burials_name: "Enterros Celestiais"
 tenet_sky_burials_desc: "Os mortos não devem ficar aprisionados sob a terra - é muito melhor permitir que eles sejam consumidos por pássaros necrófagos, onde, em um ato final de generosidade, eles alimentam o mundo que os alimentou."
 doctrine_parameter_sky_burials_active: "Os [rulers|lE] podem dar a seus ancestrais um Enterro Celestial para ganhar [piety|lE] e agradar seus [vassals|lE]\n$EFFECT_LIST_BULLET$ É possível construir o [duchy_building|lE] [GetBuilding('charnel_grounds_01').GetName|l]"
 can_build_towers_of_silence_active_name: "habilidade de usar o [duchy_building|lE] [GetBuilding('tower_of_silence_01').GetName|l]"
 doctrine_parameter_can_build_towers_of_silence_active: "[vassals|lE] podem construir o [duchy_building|lE] [GetBuilding('tower_of_silence_01').GetName|l] para fortalecer o zelo do [county|lE] — #EMP se#! a [faith|lE] de seu [liege|lE] não praticar o $tenet_sky_burials_name$"
 tenet_sacred_childbirth_name: "Parto Sagrado"
 tenet_sacred_childbirth_alternate_name: "Kūdikis Lemti"
 tenet_sacred_childbirth_desc: "As casas de banho onde mães dão à luz devem ser limpas e preparadas com os rituais adequados, a fim de encorajar o divino a nos conceder sua benção durante o parto"
 doctrine_parameter_safer_childbirths_active: "As mães são #P menos propensas#! a morrer no parto"
 doctrine_parameter_healthier_children_active: "As crianças são #P menos propensas#! a ficarem doentes ou nascerem mortas"
 doctrine_parameter_piety_from_childbirth_active: "Mães e pais ganham [piety|lE] quando seu filho nasce"
 piety_from_childbirth_toast: "Parto Sagrado"
 tenet_sanctity_of_nature_name: "Santidade da Natureza"
 tenet_sanctity_of_nature_desc: "O mundo natural é criação divina e nós somos meros hóspedes nele. Devemos respeitar e honrar cada árvore, cada animal e até mesmo o próprio solo."
 #This parameter does nothing; it's just here to flag the tenet's nature silently so we can reference it without directly tagging the tenet.
 doctrine_parameter_believes_in_harmony_with_nature_invisible: ""
 tenet_mystical_birthright_name: "Direito de Primogenitura Auspiciosa"
 tenet_mystical_birthright_alternate: "Táltos Születés"
 tenet_mystical_birthright_desc: "Cada um de nós nasceu com um destino, o mais importante deles é o de Táltos - aqueles que são escolhidos desde o nascimento para possuir poderes mágicos e se tornarem grandes líderes espirituais."
 doctrine_parameter_mystic_birthright_active: "Raramente as crianças nascerão com o traço [GetTrait('lifestyle_mystic').GetName( GetNullCharacter )]"
 tenet_astrology_name: "Astrologia"
 tenet_astrology_desc: "A noite o céu é nossa janela para o reino do divino. Os grandes segredos e mistérios do mundo estão escritos lá, abertos para todos aprenderem se estes souberem onde olhar."
 doctrine_parameter_divine_the_stars_active: "Permite adeptos divinem as estrelas e prevejam seus futuros"
 tenet_divination_name: "Adivinhação"
 tenet_divination_desc: "O destino dos mortais e o futuro do mundo estão escritos nas estrelas e em sinais ocultos, e por meio de rituais, sonhos e presságios, praticantes habilidosos podem desvendar esses segredos dos espíritos além."
 tenet_sun_worship_name: "Adoração do Sol"
 tenet_sun_worship_desc: "O portador da luz, o doador de vida, a chama sempre ardente - ele reina alto no céu como o verdadeiro soberano do mundo."
 doctrine_parameter_summer_festivals_active: "Sediar banquetes nos meses de verão concede [piety|lE]"
 doctrine_parameter_trial_by_sun_active: "Os [criminals|lE] encarcerados podem ser sentenciados a um Julgamento do Sol"
