 tenet_ritual_cannibalism_name: "Canibalismo Ritual"
 tenet_ritual_cannibalism_desc: "A humanidade é abençoada por ter recebido a centelha do divino. A carne humana é, portanto, sagrada e contém algo a ser saboreado, não enterrado ou queimado."
 doctrine_parameter_cannibalism_legal: "O traço [GetTrait('cannibal').GetName( GetNullCharacter )] não é mais considerado [criminal|lE]"
 tenet_exaltation_of_pain_name: "Exaltação da Dor"
 tenet_exaltation_of_pain_desc: "Dor é a sensação universal, violência a língua universal. Infligir dor em outros é dá-los uma benção, portanto, receber a dor é receber a graça."
 doctrine_parameter_torturing_prisoners_grants_piety: "Torturar [prisoners|lE] ganha [piety|lE] em vez de custar [piety|lE]"
