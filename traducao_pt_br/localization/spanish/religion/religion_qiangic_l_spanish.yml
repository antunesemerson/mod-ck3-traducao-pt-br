 #Melieism (Tangut Root West)
 melieism: "Melie" #lit. Root West
 melieism_adj: "Melie"
 melieism_adherent: "Melieista"
 melieism_adherent_plural: "Melieistas"
 melieism_desc: "As crenças nativas dos tanguts se concentram na Garça Branca como o aspecto masculino celestial do divino, enquanto o Macaco Vermelho era visto como o aspecto feminino terreno da divindade. Assim, a sociedade tangut não budista se dividia em duas classes segundo esses princípios: os sacerdotais "cabeças negras" e os plebeus "caras vermelhas"."
