 #Rrmeaism
 rrmeaism: "Vvluphixje" #lit. White Stone Worship
 rrmeaism_adj: "Vvluphixje"
 rrmeaism_adherent: "Vvluphimi"
 rrmeaism_adherent_plural: "Vvluphim"
 rrmeaism_desc: "A religião dos Rrmea, ou Qiang, concentra grande parte de sua adoração na veneração das pedras brancas, ou Vvluphi. Os sacerdotes-xamãs conhecidos como xbi usam um chapéu de pele de macaco e batem um tambor de pele de ovelha durante a realização de rituais."
