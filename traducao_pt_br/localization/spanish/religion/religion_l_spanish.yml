 doctrine_homosexuality_name: "Relações entre pessoas do mesmo sexo"
 doctrine_homosexuality_crime_name: "Crime"
 doctrine_homosexuality_crime_desc: "Os desejos pecaminosos dos sodomitas são um perigo para a própria sociedade, então eles devem ser punidos e presos por suas transgressões."
 doctrine_homosexuality_shunned_name: "Evitado"
 doctrine_homosexuality_shunned_desc: "É antinatural que dois homens se envolvam em relações sexuais um com o outro, independentemente das circunstâncias."
 doctrine_homosexuality_accepted_name: "Aceito"
 doctrine_homosexuality_accepted_desc: "O amor transcende a fisicalidade em algo tão profundo e maravilhoso que não pode ser restringido pelo mero gênero."
 doctrine_parameter_homosexuality_illegal: "Homens com o [trait|lE] [GetTrait('sodomite').GetName( GetNullCharacter )] são [criminals|lE]"
 doctrine_parameter_homosexuality_shunned: "Os homens com o [trait|lE] [GetTrait('sodomite').GetName( GetNullCharacter )] são [Concept( 'shunned', 'evitados' )|E]"
 doctrine_parameter_homosexuality_accepted: "Relacionamentos do mesmo sexo são totalmente aceitos"
 doctrine_deviancy_name: "Desvio"
 doctrine_deviancy_crime_name: "Criminoso"
 doctrine_deviancy_crime_desc: "É claro que há apenas uma maneira correta de amar outra pessoa. Qualquer desvio desse formato é pecaminoso e deve ser punido."
 doctrine_deviancy_shunned_name: "Evitado"
 doctrine_deviancy_shunned_desc: "Existem algumas práticas sexuais que são simplesmente anormais e estranhas. É razoável pensar que as pessoas com esses desejos são igualmente anormais e estranhas."
 doctrine_deviancy_accepted_name: "Aceito"
 doctrine_deviancy_accepted_desc: "O amor é belo e sagrado, não importa a forma que ele tome. Todos devem ser permitidos a amar e fazer o que quiserem."
 doctrine_deviancy_virtuous_name: "Virtuoso"
 doctrine_deviancy_virtuous_desc: "Os prazeres da carne nos aproximam do divino, e assim aqueles que estão livres de desejos convencionais são o ápice da virtude em nossa fé."
 doctrine_parameter_deviancy_illegal: "Personagens com o [trait|lE] [GetTrait('deviant').GetName( GetPlayer )] são [criminals|lE]"
 doctrine_parameter_deviancy_shunned: "Os personagens com [trait|lE] [GetTrait('deviant').GetName( GetPlayer )] são [Concept( 'shunned', 'evitados' )|E]"
 doctrine_parameter_deviancy_accepted: "Personagens com o [trait|lE] [GetTrait('deviant').GetName( GetPlayer )] são totalmente aceitos"
 doctrine_witchcraft_name: "Bruxaria"
 doctrine_witchcraft_crime_name: "Criminoso"
 doctrine_witchcraft_crime_desc: "Somente os divinos têm o direito de realizar milagres nesta terra. Qualquer um que fizer tentativas profanas de fazer o mesmo será punido por sua arrogância e presunção."
 doctrine_witchcraft_shunned_name: "Evitado"
 doctrine_witchcraft_shunned_desc: "Os divinos têm a jurisdição legítima sobre as forças sobrenaturais neste mundo, então qualquer tentativa de coagir essas forças a obedecer a vontade de um mortal é intrinsecamente equivocada."
 doctrine_witchcraft_accepted_name: "Aceito"
 doctrine_witchcraft_accepted_desc: "A magia preenche o mundo ao nosso redor, e é nosso direito e nosso privilégio se envolver com ela da maneira como nossos ancestrais fizeram."
 doctrine_witchcraft_virtuous_name: "Virtuoso"
 doctrine_witchcraft_virtuous_desc: "Praticar bruxaria é colocar a própria alma em perigo diante de espíritos malignos. Pela coragem neste aspecto necessário de manter nossas próprias almas limpas, as bruxas devem ser veneradas."
 doctrine_parameter_witchcraft_illegal: "Os personagens com o [trait|lE] [GetTrait('witch').GetName( GetPlayer )] [trait|lE] são [criminals|lE]"
 doctrine_parameter_witchcraft_shunned: "Personagens com o [trait|lE] [GetTrait('witch').GetName( GetPlayer )] [trait|E] são [Concept( 'shunned', 'evitados' )|E]"
 doctrine_parameter_witchcraft_accepted: "Os personagens com o [trait|lE] [GetTrait('witch').GetName( GetPlayer )] [trait|E] são totalmente aceitos"
 witchcraft_illegal_name: "Doutrina Criminal da Bruxaria"
 witchcraft_shunned_name: "Doutrina da Bruxaria Desprezada"
 doctrine_head_of_faith_name: "Líder da Fé"
 doctrine_head_of_faith_desc: "O [head_of_faith|lE] é o líder de uma [faith|E]"
 doctrine_no_head_name: "Nenhum"
 doctrine_no_head_desc: "É pura tolice assumir que alguém possa compreender a vontade de [ROOT.Faith.HighGodName]. Devemos seguir nossos corações para descobrir qual é o Seu plano para nós."
 doctrine_parameter_no_head_of_faith: "Não tem um [head_of_faith|lE]"
 no_head_of_faith_name: "Sem [head_of_faith|lE] de [doctrine|lE]"
 doctrine_parameter_minimum_fervor: "O fervor não pode ficar abaixo de #V $VALUE|0$%#!"
 doctrine_spiritual_head_name: "Espiritual"
 doctrine_spiritual_head_desc: "O mundo físico e o mundo espiritual não são iguais. Devemos garantir que o mundo espiritual tenha seu próprio líder, para nos guiar e proteger nossa fé de ser profanada por desejos físicos."
 doctrine_parameter_spiritual_head_of_faith: "A posição de [head_of_faith|lE] é dada a um membro proeminente do clero"
 doctrine_parameter_spiritual_head_of_faith_claims: "O [head_of_faith|lE] pode conceder [claims|lE] em títulos fundiários a aderentes piedosos"
 doctrine_parameter_spiritual_head_of_faith_gold: "O [head_of_faith|lE] pode conceder [gold|lE] a aderentes piedosos"
 doctrine_temporal_head_name: "Temporal"
 doctrine_parameter_temporal_head_of_faith: "A posição de [head_of_faith|lE] é dada ao fundador da [faith|lE] e é passada para seu [primary_heir|lE] quando eles morrem"
 doctrine_parameter_temporal_head_of_faith_directed_holy_wars: "Se a fé estiver imersa em [great_holy_wars|lE] o Chefe da Fé pode dirigir a guerra e escolher quem será o alvo da guerra"
 doctrine_temporal_head_desc: "O espiritual e o físico estão intrinsecamente ligados, inteiros e inseparáveis. É tolo ter dois líderes diferentes para um único reino."
 doctrine_marriage_type_name: "Tipo de Casamento"
 doctrine_monogamy_name: "Monogâmico"
 doctrine_monogamy_desc: "O casamento é um laço sagrado entre duas pessoas. Tentar formar esse laço com várias pessoas ao mesmo tempo é sacrilégio."
 doctrine_polygamy_name: "Poligâmico"
 doctrine_polygamy_desc: "Como o casamento é uma união sagrada, ter múltiplos casamentos é claramente mais sagrado do que ter apenas um casamento - contanto que cada casamento seja sagrado em si mesmo."
 doctrine_concubines_name: "Concubinas"
 doctrine_concubines_desc: "O casamento é um laço sagrado, mas desde que o cônjuge tenha prioridade, pode ser permitido ter concubinas para se relacionar também."
 hostility_group_name: "Grupo Hostil"
 abrahamic_hostility_doctrine_name: "Abraâmico"
 abrahamic_hostility_doctrine_desc: "As seguintes religiões são abraâmicas:\n[GetReligionFamily('rf_abrahamic').GetReligions]"
 pagan_hostility_doctrine_name: "Pagão"
 pagan_hostility_doctrine_desc: "As seguintes religiões são pagãs:\n[GetReligionFamily('rf_pagan').GetReligions]"
 eastern_hostility_doctrine_name: "Oriental"
 eastern_hostility_doctrine_desc: "As seguintes religiões são dhármicas:\n[GetReligionFamily('rf_eastern').GetReligions]"
 sinitic_hostility_doctrine_name: "Sinítica"
 sinitic_hostility_doctrine_desc: "As seguintes religiões são siníticas:\n[GetReligionFamily('rf_eastern').GetReligions]"
 special_tolerance_name: "Tolerância Especial"
 special_doctrine_ecumenical_christian_name: "Ecumenismo"
 special_doctrine_ecumenical_christian_desc: "Nossos líderes religiosos historicamente estiveram envolvidos em diálogos inter-religiosos para aumentar a cooperação entre as diferentes denominações cristãs."
 special_doctrine_full_tolerance_name: "Tolerância Total"
 full_tolerance_name: "$special_doctrine_full_tolerance_name$"
 doctrine_parameter_hostility_override_special_doctrine_full_tolerance: "Todas as [faiths|lE] são consideradas como [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V]"
 special_doctrine_full_tolerance_desc: "Todos são livres para escolher sua própria fé. Nossas diferenças não nos dividem, elas nos tornam mais fortes."
 nudity_doctrine_name: "Visão sobre Nudez"
 special_doctrine_naked_priests_name: "Sacerdotes Nus"
 special_doctrine_naked_priests_desc: "Nossos sacerdotes sabem que roupas aprisionam o espírito e nos impedem de alcançar a verdadeira iluminação. Apenas ao nos despirmos de nossas vestes podemos despertar nossas almas e experimentar o amor de [ROOT.Faith.HighGodNamePossessive]."
 doctrine_parameter_naked_priests_active: "Sacerdotes e personagens zelosos não usam roupas."
 doctrine_gender_name: "Visão sobre Gênero"
 doctrine_gender_male_dominated_name: "Dominação Masculina"
 doctrine_gender_male_dominated_desc: "Os homens são mais fortes e melhor equipados para nos liderar neste mundo duro e implacável, então devemos confiar a eles o governo de nossa sociedade."
 doctrine_gender_equal_name: "Igualdade"
 doctrine_gender_equal_desc: "É tolo negar a pessoas habilidosas um papel no governo puramente por causa de seu gênero. Permitiremos que todos que são capazes governem nossa sociedade."
 doctrine_gender_female_dominated_name: "Dominação Feminina"
 doctrine_gender_female_dominated_desc: "As mulheres provaram repetidamente que apenas elas possuem a sabedoria e prudência necessárias para governar adequadamente nossa sociedade."
 doctrine_divorce_name: "Divórcio"
 doctrine_divorce_disallowed_name: "Não Permitido"
 doctrine_divorce_disallowed_desc: "Os votos do casamento são finais e vinculantes. Somente a morte pode nos separar."
 doctrine_divorce_approval_name: "Aprovado com Restrições"
 doctrine_divorce_approval_desc: "Embora os laços do casamento não devam ser levados a sério, circunstâncias atenuantes às vezes podem tornar o divórcio uma necessidade."
 doctrine_divorce_allowed_name: "Sem Restrições"
 doctrine_divorce_allowed_desc: "O casamento é apenas uma parceria entre duas pessoas e, como todas as parcerias, pode ser encerrado a qualquer momento."
 doctrine_parameter_divorce_disallowed: "Aos personagens nunca será permitido [divorce|lE] de seus [spouses|lE]"
 doctrine_parameter_divorce_approval: "Aos personagens é permitido [divorce|lE] de seus [spouses|lE] se seu [head_of_faith|lE] espiritual aprovar (ou [house_head|lE] se não existir uma cabeça espiritual da fé)"
 doctrine_parameter_divorce_allowed: "Os personagens sempre poderão [Concept( 'divorce', 'divorciarse' )|E] de seus [Concept( 'spouse', 'cónyuges' )|E] gastando [piety|lE]"
 doctrine_bastardry_name: "Bastardia"
 doctrine_bastardry_none_name: "Sem Bastardos"
 doctrine_bastardry_none_desc: "O sangue determina a linhagem, não o casamento. Crianças nascidas fora do casamento são tão legítimas quanto qualquer outra."
 doctrine_bastardry_legitimization_name: "Legitimação"
 doctrine_bastardry_legitimization_desc: "O casamento é sagrado, então as crianças nascidas fora dele devem ser abençoadas de outra maneira se quiserem ser consideradas legítimas."
 doctrine_bastardry_all_name: "Sem Legitimação"
 doctrine_bastardry_all_desc: "Os laços do casamento são sagrados e as crianças nascidas fora do casamento sempre serão ilegítimas."
 doctrine_parameter_bastards_none: "Não existem os [bastards|lE], todos os filhos são [Concept( 'legitimate', 'legítimos' )|E]"
 doctrine_parameter_bastards_legitimize: "Os [bastards|lE] só poderão ser legitimados com a aprovação de seu [house_head|lE] ou [dynast|lE]"
 doctrine_parameter_bastards_always: "Os [bastards|lE] nunca poderão ser legitimados"
 doctrine_adultery_men_name: "Adulterio Masculino"
 doctrine_adultery_men_crime_name: "Crime"
 doctrine_adultery_men_crime_desc: "É crime para os homens se envolverem em relações sexuais fora do casamento, e eles serão punidos de acordo."
 doctrine_adultery_men_shunned_name: "Desprezado"
 doctrine_adultery_men_shunned_desc: "É pecaminoso para os homens se envolverem em relações sexuais fora do casamento, mas como todos os pecados, é o divino que deve julgá-los por suas falhas."
 doctrine_adultery_men_accepted_name: "Aceito"
 doctrine_adultery_men_accepted_desc: "Não há nada intrinsecamente errado em um homem decidir se envolver em relação sexual fora do casamento, então a decisão é dele sozinho."
 doctrine_parameter_adultery_male_crime: "Os homens com o [trait|lE] [GetTrait('adulterer').GetName( GetNullCharacter )] ou [GetTrait('fornicator').GetName( GetNullCharacter )] são [criminals|lE]"
 doctrine_parameter_adultery_male_shunned: "Os homens com o [trait|lE] [GetTrait('adulterer').GetName( GetNullCharacter )] ou [GetTrait('fornicator').GetName( GetNullCharacter )] são [Concept( 'shunned', 'evitados' )|E]"
 doctrine_parameter_adultery_male_accepted: "Os homens com o [trait|lE] [GetTrait('adulterer').GetName( GetNullCharacter )] ou [GetTrait('fornicator').GetName( GetNullCharacter )] são totalmente aceitos"
 doctrine_adultery_women_name: "Adultério Feminino"
 doctrine_adultery_women_crime_name: "Criminoso"
 doctrine_adultery_women_crime_desc: "É crime para as mulheres se envolverem em relações sexuais fora do casamento, e elas serão punidas de acordo."
 doctrine_adultery_women_shunned_name: "Evitada"
 doctrine_adultery_women_shunned_desc: "É pecaminoso para as mulheres se envolverem em relações sexuais fora do casamento, mas como todos os pecados, é o divino quem deve julgá-las por suas falhas."
 doctrine_adultery_women_accepted_name: "Aceita"
 doctrine_adultery_women_accepted_desc: "Não há nada intrinsecamente errado em uma mulher decidir se envolver em relação sexual fora do casamento, então a decisão é dela sozinha."
 doctrine_parameter_adultery_female_crime: "As mulheres com o [trait|lE] [GetTrait('adulterer').GetName( GetNullCharacter )] ou [GetTrait('fornicator').GetName( GetNullCharacter )] são [criminals|lE]"
 doctrine_parameter_adultery_female_shunned: "As mulheres com o [trait|lE] [GetTrait('adulterer').GetName( GetNullCharacter )] ou [GetTrait('fornicator').GetName( GetNullCharacter )] são [Concept( 'shunned', 'evitados' )|E]"
 doctrine_parameter_adultery_female_accepted: "As mulheres com o [trait|lE] [GetTrait('adulterer').GetName( GetNullCharacter )] ou [GetTrait('fornicator').GetName( GetNullCharacter )] são totalmente aceitas"
 doctrine_kinslaying_name: "Fratricídio"
 doctrine_kinslaying_any_dynasty_member_crime_name: "Criminoso Dinástico"
 doctrine_kinslaying_any_dynasty_member_crime_desc: "Todos os parentes são unidos pelo sangue, e matar até mesmo um parente distante é um crime grave contra toda a dinastia. Tais transgressões não serão esquecidas."
 doctrine_parameter_kinslaying_any_dynasty_member_crime: "Os [kinslayers|lE] com o [trait|lE] [GetTrait('kinslayer_1').GetName( GetPlayer )] ou pior são [criminals|lE] aos olhos de sua [dynasty|lE]"
 doctrine_parameter_kinslaying_extended_family_crime: "Os [kinslayers|lE] com o [trait|lE] [GetTrait('kinslayer_2').GetName( GetPlayer )] ou pior são [criminals|lE] aos olhos de sua [dynasty|lE]"
 doctrine_parameter_kinslaying_close_kin_crime: "Os [kinslayers|lE] com o [trait|lE] [GetTrait('kinslayer_3').GetName( GetPlayer )] são [criminals|lE] aos olhos de sua [dynasty|lE]"
 doctrine_parameter_kinslaying_shunned: "Os [kinslayers|lE] são [Concept( 'shunned', 'evitados' )|E]"
 doctrine_parameter_kinslaying_accepted: "Personagens que matam parentes não são vistos como [kinslayers|lE]"
 doctrine_kinslaying_extended_family_crime_name: "Familiar é Crime"
 doctrine_kinslaying_extended_family_crime_desc: "O assassinato da própria família é um dos crimes mais abomináveis que se pode cometer. Quem comete tal ato será severamente punido."
 doctrine_kinslaying_close_kin_crime_name: "Parentes Próximos são Criminosos"
 doctrine_kinslaying_close_kin_crime_desc: "O fratricídio e atos similares não podem ser tolerados em uma sociedade justa e correta. Aqueles que cometem tais ofensas serão punidos."
 doctrine_kinslaying_shunned_name: "Evitado"
 doctrine_kinslaying_shunned_desc: "Embora seja chocante matar parentes próximos, tais atos não são inherentemente mais criminosos do que qualquer outro assassinato."
 doctrine_kinslaying_accepted_name: "Aceito"
 doctrine_kinslaying_accepted_desc: "O assassinato da própria família não é diferente de qualquer outro assassinato e deve ser tratado da mesma forma."
 kinslayer_crime_dynasty: "Assassino de Parentes"
 doctrine_consanguinity_name: "Consanguinidade"
 doctrine_consanguinity_dynastic_name: "Proibição linear"
 doctrine_consanguinity_dynastic_desc: "É estritamente proibido casar-se com alguém com quem se compartilhe sobrenome e ascendência comum, não importa quão distante seja o parentesco, nem é aceitável casar-se com pessoas de outros sobrenomes com parentesco de sangue próximo."
 doctrine_consanguinity_restricted_name: "Tabu de Parentesco Próximo"
 doctrine_consanguinity_restricted_desc: "É um pecado contra [ROOT.Faith.HighGodName] permitir que dois parentes se casem ou se envolvam em relações sexuais."
 doctrine_parameter_consanguinity_restricted_marriage: "Casamento entre quaisquer [extended_family_members|lE] e/ou [close_family_members|lE] é proibido"
 doctrine_parameter_consanguinity_restricted_close_kin_incest: "Relações sexuais entre quaisquer [extended_family_members|lE] e/ou [close_family_members|lE] resultarão no [secret|lE] de incesto"
 doctrine_consanguinity_cousins_name: "Casamento entre Primos"
 doctrine_consanguinity_cousins_desc: "Primos podem ser parentes, mas suficientemente distantes para que seja aceitável que se casem para preservar sua linhagem."
 doctrine_parameter_consanguinity_cousins_marriage: "Casamento entre primos é permitido"
 doctrine_parameter_consanguinity_cousins_incest: "Relações sexuais entre primos não resultarão no [secret|lE] de incesto"
 doctrine_consanguinity_aunt_nephew_and_uncle_niece_name: "Casamento de Avunculado"
 doctrine_consanguinity_aunt_nephew_and_uncle_niece_desc: "Desde que não sejam diretamente relacionados, membros da família podem se casar entre si pelo bem da dinastia."
 doctrine_parameter_consanguinity_aunt_nephew_and_uncle_niece_marriage: "Casamento entre primos, tias/sobrinhos e tios/sobrinhas é permitido"
 doctrine_parameter_consanguinity_aunt_nephew_and_uncle_niece_incest: "Relações sexuais entre primos, tias/sobrinhos e tios/sobrinhas não serão consideradas incestuosas [secret|lE]"
 doctrine_consanguinity_unrestricted_name: "Casamento sem restrições"
 doctrine_consanguinity_unrestricted_desc: "É natural e saudável que membros da família se amem, e aqueles que dizem que o amor deve ser restrito a relações não sexuais são tolos."
 doctrine_parameter_consanguinity_unrestricted_marriage: "Casamento entre todos os membros da família é permitido"
 doctrine_parameter_consanguinity_unrestricted_incest: "Relações sexuais entre quaisquer membros da família não serão consideradas [secret|lE] incestuosos"
 doctrine_parameter_consanguinity_restricted_dynastic_marriage: "O casamento entre membros da mesma [dynasty|El] é proibido"
