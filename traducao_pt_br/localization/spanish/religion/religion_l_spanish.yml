 doctrine_funeral_name: "Tradição Funerária"
 doctrine_funeral_stoic_name: "Sepultamento Estoico"
 doctrine_funeral_stoic_desc: "O corpo morreu, mas a alma vive. A morte não é um tempo para tristeza e lamento, mas sim um funeral deve honrar os mortos ao entregar seu corpo à terra em uma cerimônia quieta e humilde."
 doctrine_funeral_bewailment_name: "Sepultamento de Lamento"
 doctrine_funeral_bewailment_desc: "A alma iniciou sua longa jornada para [ROOT.Faith.PositiveAfterLife] e nunca mais a veremos no mundo dos vivos. É imperativo que todos que conheceram o falecido se reúnam e ofereçam seu lamento em uma demonstração pública de tristeza. Isso tanto honra os mortos quanto purifica nossas almas da dor sentida por sua partida."
 doctrine_funeral_cremation_name: "Cremação"
 doctrine_funeral_cremation_desc: "Das cinzas viemos, às cinzas retornamos. O corpo de nosso falecido é disposto em uma grande pira funerária, e as cinzas resultantes são espalhadas pela terra para continuar a jornada dos mortos."
 doctrine_funeral_sky_burial_name: "$tenet_sky_burials_name$"
 doctrine_funeral_sky_burial_desc: "$tenet_sky_burials_desc$"
 doctrine_funeral_mummification_name: "Mumificação"
 mummification_funeral_name: "Mumificação"
 doctrine_funeral_mummification_desc: "O corpo deixou de funcionar, mas ainda é o vaso pelo qual o espírito irá viajar para [ROOT.Faith.PositiveAfterLife]. Portanto, a forma física deve ser tão constante quanto a alma, aguardando o julgamento de [ROOT.Faith.FateGodName]."
 doctrine_family_rites_name: "Ritos familiares"
 doctrine_family_rites_desc: "A morte é um período de luto e ritual para os vivos. A hierarquia e a senioridade importam tanto na morte quanto na vida; é importante venerar os mais velhos mesmo após seu falecimento, e ser visto venerando da maneira correta."
 doctrine_parameter_burial_funeral: ""
 doctrine_parameter_stoic_funeral: "A [activity|El] [funeral|lE] oferece mais oportunidades para ganhar [piety|El]"
 doctrine_parameter_bewailment_funeral: "A [activity|El] [funeral|lE] oferece mais oportunidades para reduzir [stress|lE]"
 doctrine_parameter_cremation_funeral: "A [activity|El] [funeral|lE] tem custos muito reduzidos em [gold|lE]"
 doctrine_parameter_mummification_funeral: "A [activity|El] [funeral|lE] custa mais [gold|lE] e gera poderosos [artifacts|lE] ao final da atividade"
 doctrine_parameter_family_rites: "A [activity|El] do [funeral|lE] oferece oportunidades para ganhar [merit|El]"
