 global_religion.1000.t: "[local_character.GetFaith.GetAdherentNamePluralNoTooltip] no exílio"
 global_religion.1000.desc_same_faith_counties: "Mais de [local_character.MakeScope.Var( 'loc_number' ).GetValue|0] [local_character.GetFaith.GetAdherentNamePlural], exilados de [target_faith_associated_county.GetName], desejam entrar em meu domínio. Seu líder, [local_character.GetFirstName], quer uma audiência: \"Estamos em busca de uma vida melhor e mais segura, [ROOT.Char.GetTitleAsNameNoTooltip]\", diz. \"Permita-nos nos estabelecer em [ROOT.Char.GetPrimaryTitle.GetDefinitiveName]\"."
 global_religion.1000.desc_same_faith_counties_alt: "A perseguição religiosa está a todo vapor em [target_faith_associated_county.GetName], onde a nobreza [target_faith_associated_county_faith.GetAdjective] está sendo forçada a se converter a [local_character.GetFaith.GetAdjective].\n\nAgora, mais de [local_character.MakeScope.Var( 'loc_number' ).GetValue|0] exilados desejam entrar em meu domínio. Seu líder, [local_character.GetFirstName], pede uma audiência: \"Estamos buscando uma vida melhor e mais segura, [ROOT.Char.GetTitleAsNameNoTooltip]\", diz. \"Permita-nos nos estabelecer em [ROOT.Char.GetPrimaryTitle.GetDefinitiveName]\"."
 global_religion.1000.desc_any_counties: "A perseguição religiosa é comum em [target_faith_associated_county.GetName] onde a nobreza [target_faith_associated_county_faith.GetAdjective] está sendo forçada a se converter em [local_character.GetFaith.GetAdjective].\n\nAgora, mais de [local_character.MakeScope.Var( 'loc_number' ).GetValue|0] exilados desejam entrar em meu domínio. Seu líder, [local_character.GetFirstName], pede uma audiência: \"Estamos procurando uma vida melhor e mais segura, [ROOT.Char.GetTitleAsNameNoTooltip],\" suplica. \"Permita-nos nos estabelecer ao redor de [initial_county_target.GetNameNoTier].\"\n\nSe eu permitir, a fé [local_character.GetFaith.GetAdjective] se espalhará por [ROOT.Char.GetPrimaryTitle.GetDefinitiveName]."
 global_religion.1000.desc_any_counties_alt: "Mais de [local_character.MakeScope.Var( 'loc_number' ).GetValue|0] [local_character.GetFaith.GetAdherentNamePlural], exilados de [target_faith_associated_county.GetName], desejam entrar em meu domínio. Seu líder, [local_character.GetFirstName] quer uma audiência: \"Estamos buscando uma vida melhor e mais segura, [ROOT.Char.GetTitleAsNameNoTooltip]\", suplica. \"Permita-nos nos estabelecer ao redor de [initial_county_target.GetNameNoTier]\".\n\nSe eu permitir, a fé [local_character.GetFaith.GetAdjective] se espalhará por [ROOT.Char.GetPrimaryTitle.GetDefinitiveName]."
 global_religion.1000.special: "Adotarei a fé [local_character.GetFaith.GetAdjectiveNoTooltip]!"
 global_religion.1000.a: "São mais que bem-vindos aqui."
 global_religion.1000.b: "[ROOT.Char.GetPrimaryTitle.GetDefinitiveNameNoTooltip|U] não pode acolher-vos."
 global_religion.1000.violent: "Exilados indefesos? Roube-os."
 global_religion.1000.serenity_aspect: "Você viverá na capital, [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
