 doctrine_pilgrimage_name: "Atitude de Peregrinação"
 doctrine_pilgrimage_local_rites_name: "Ritos locais"
 doctrine_pilgrimage_local_rites_desc: "Os adeptos desta fé preferem o conforto e a estabilidade dos ritos de rotina nos santuários locais em vez dos perigos e do desgaste de longas peregrinações."
 doctrine_parameter_local_shrine_offering: "Tem acesso à [decision|lE] [GetDecisionWithKey('visit_local_shrine_decision').GetName], mas a [activity|lE] [pilgrimage|E] custa mais"
 local_shrine_offering_name: "$doctrine_pilgrimage_name$: $doctrine_pilgrimage_local_rites_name$"
 doctrine_pilgrimage_forbidden_name: "Proibida"
 doctrine_pilgrimage_forbidden_desc: "A presença de [ROOT.Faith.HighGodName] pode ser sentida em todos os lugares, e a noção de que certos lugares são mais divinos do que outros é simplesmente heresia."
 doctrine_pilgrimage_encouraged_name: "Encorajada"
 doctrine_pilgrimage_encouraged_desc: "Esta fé incentiva seus membros a visitar locais terrenos considerados de significado espiritual como uma forma de demonstrar reverência pelo [ROOT.Faith.PantheonTerm]."
 doctrine_pilgrimage_mandatory_name: "Obrigatória"
 doctrine_pilgrimage_mandatory_desc: "Espera-se que todos os [ROOT.Faith.GetAdherentNamePlural] em pleno vigor físico realizem uma jornada espiritual a um lugar sagrado assim que possível. Não fazê-lo representa uma falta de submissão ao [ROOT.Faith.HighGodName]."
 doctrine_pilgrimage_mandatory_hajj_name: "Hajj"
 doctrine_pilgrimage_mandatory_hajj_desc: "Espera-se que todos os muçulmanos em pleno vigor físico realizem um Hajj a Meca durante sua vida. Embora sejam feitas isenções especiais, qualquer [ROOT.Faith.GetAdherentNameNoTooltip] que não complete um Hajj será visto com ceticismo."
 forbidden_from_pilgrimage_name: "$doctrine_pilgrimage_name$: $doctrine_pilgrimage_forbidden_name$"
 doctrine_parameter_forbidden_from_pilgrimage: "Não tem acesso à [activity|El] de [pilgrimage|El][AddLocalizationIf( GetPlayer.GetGovernment.HasGovernmentFlag( 'government_is_mandala' ), 'mandala_pilgrimage_warning')]"
 doctrine_parameter_can_go_on_pilgrimage: "Tem acesso à [activity|lE] de [pilgrimage|lE]"
 mandatory_pilgrimage_name: "$doctrine_pilgrimage_name$: $doctrine_pilgrimage_mandatory_name$"
 doctrine_parameter_mandatory_pilgrimage: "O [trait|lE] [GetTrait('pilgrim').GetName( GetNullCharacter )|l] concede bônus adicionais e a [activity|lE] de [pilgrimage|lE] oferece mais [piety|lE] ao ser concluída"
 mandatory_hajj_name: "$doctrine_pilgrimage_name$: $doctrine_pilgrimage_mandatory_name$"
 doctrine_parameter_mandatory_hajj: "O [trait|lE] [GetTrait('hajjaj').GetName( GetNullCharacter )|l] concede bônus adicionais e a [activity|lE] de [hajj|lE] oferece mais [piety|lE] ao ser concluída"
 doctrine_parameter_basic_pilgrimage_rewards: ""
 mandala_pilgrimage_warning: "\n@alert_icon! #alert_trial Convertirse a una [faith|El] $forbidden_from_pilgrimage_name$ hace imposible avanzar como [ruler|El] [mandala_government|lE]#!\n"
