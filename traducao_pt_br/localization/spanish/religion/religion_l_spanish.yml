 doctrine_parameter_allows_cousin_marriage: ""
 doctrine_parameter_allows_aunt_nephew_and_uncle_niece_marriage: ""
 doctrine_parameter_allows_unrestricted_marriage: ""
 doctrine_pluralism_name: "Atitude Religiosa"
 doctrine_parameter_hostility_towards_us_mult: "Os praticantes de outras [faiths|lE] terão penalidades de opinião de $VALUE|%V0$"
 doctrine_pluralism_fundamentalist_name: "Fundamentalista"
 doctrine_pluralism_fundamentalist_desc: "Nossa fé é a única verdadeira, nossa palavra a única verdadeira. Qualquer desvio do [ROOT.Faith.ReligiousText] é inerentemente blasfêmico."
 doctrine_parameter_pluralism_fundamentalist_proselytization_bonus: "Velocidade de conversão do condado: #P +20%#!"
 doctrine_parameter_pluralism_fundamentalist_revocation_tyranny_minimal: "Pode #P revogar títulos de terra#! de infiéis hostis $hostility_hostile_tooltippable$ e $hostility_evil_tooltippable$ sem incorrer em [tyranny|lE]"
 doctrine_parameter_pluralism_fundamentalist_faction_join_chance: "São #N más probable#! que [counties|lE] de outras [faiths|lE] se unam a [factions|lE]"
 doctrine_parameter_pluralism_fundamentalist_vulnerable_to_heresy: "#N Perigo aumentado#! de heresias quando o [fervor|lE] está baixo"
 doctrine_pluralism_righteous_name: "Justo"
 doctrine_pluralism_righteous_desc: "Como mortais, não podemos compreender completamente a vontade do [ROOT.Faith.HighGodNamePossessive], mas nossos [ROOT.Faith.PriestNeuterPlural] ainda têm uma boa ideia do que é sagrado e do que é profano."
 doctrine_parameter_pluralism_righteous_revocation_tyranny_reduced: "Podem #P revocar títulos com terras#! de infiéis hostis sem incorrer em [tyranny|lE]"
 doctrine_pluralism_pluralistic_name: "Pluralista"
 doctrine_pluralism_pluralistic_desc: "É uma tolice dizer que há apenas uma interpretação correta da vontade divina e que todas as outras visões estão erradas. Cada um de nós tem sua própria maneira de adorar [ROOT.Faith.HighGodName]."
 doctrine_parameter_pluralism_pluralistic_proselytization_penalty: "Velocidade de Conversão de Condado: #N -20%#!"
 doctrine_parameter_pluralism_pluralistic_faction_join_chance: "É #P menos probable#! que condados de outras [faiths|lE] se juntem a [factions|lE]"
 doctrine_parameter_pluralism_pluralistic_resistant_to_heresy: "#P Perigo reduzido#! de heresias quando o [fervor|lE] está baixo"
 doctrine_parameter_pluralism_pluralistic_holy_wars_preserve_vassals: "Vencer uma [holy_war|lE] vassalizará [rulers|lE] infiéis na área de destino em vez de apreender suas terras"
 doctrine_theocracy_name: "Tradição Clerical"
 doctrine_theocracy_temporal_name: "Teocrático"
 doctrine_theocracy_temporal_desc: "Apenas [ROOT.Faith.PriestNeuterPlural] sancionados podem ser encarregados de manter as doutrinas de nossa fé e, por extensão, de gerenciar e cuidar de nossos lugares sagrados."
 doctrine_parameter_theocracy_temple_lease: "As [holdings|lE] do Templo são arrendadas aos [realm_priest|lE] de seu titular, que os servem como [vassal|lE] [theocratic|lE]"
 doctrine_theocracy_lay_clergy_name: "Clero Leigo"
 doctrine_theocracy_lay_clergy_desc: "Qualquer seguidor dedicado é mais do que capaz de entender, seguir e pregar as doutrinas de nossa fé."
 doctrine_parameter_theocracy_temple_ownership: "Os [rulers|lE] seculares controlam diretamente suas [holdings|lE] consagradas e recebem todos os benefícios associados."
 #Intentionally left blank:
 doctrine_parameter_lay_clergy: ""
 doctrine_parameter_allowed_holding_type_church_holding: ""
 doctrine_clerical_function_name: "Função Clerical"
 doctrine_clerical_function_taxation_name: "Controle"
 doctrine_clerical_function_taxation_desc: "A autoridade dos [ROOT.Faith.AltPriestTermPlural] deriva diretamente de [ROOT.Faith.HighGodName], e isso ainda se aplica aqui na Terra."
 doctrine_clerical_function_alms_and_pacification_name: "Esmolas e Pacificação"
 doctrine_clerical_function_alms_and_pacification_desc: "Nossos [ROOT.Faith.PriestNeuterPlural] são responsáveis por garantir que os pobres e oprimidos tenham comida e abrigo suficientes quando não podem provê-los por si mesmos."
 doctrine_clerical_function_recruitment_name: "Recrutamento"
 doctrine_clerical_function_recruitment_desc: "Nossos [ROOT.Faith.PriestNeuterPlural] podem pegar em armas e defender nossa fé. A responsabilidade de liderar como exemplo lhes concede força extra em combate."
 doctrine_parameter_clergy_can_fight: "Membros do [clergy|lE] podem servir como [commanders|lE] ou $knight_culture_player_plural$"
 doctrine_clerical_gender_name: "Gênero Clerical"
 doctrine_clerical_gender_male_only_name: "Apenas Homens"
 doctrine_clerical_gender_male_only_desc: "Apenas homens podem assumir a grande responsabilidade de servir como [ROOT.Faith.PriestMalePlural] de nossa fé."
 doctrine_parameter_clergy_must_be_male: "Apenas homens podem ser concedidos [holdings|lE] de templo ou servir como [court_chaplains|lE]"
 doctrine_clerical_gender_female_only_name: "Apenas Mulheres"
 doctrine_clerical_gender_female_only_desc: "Apenas mulheres são sábias o suficiente para interpretar a vontade de [ROOT.Faith.HighGodNamePossessive] e servir como [ROOT.Faith.PriestFemalePlural] de nossa fé."
 doctrine_parameter_clergy_must_be_female: "Apenas mulheres podem ser concedidas [holdings|lE] de templo ou servir como [court_chaplains|lE]"
 doctrine_clerical_gender_either_name: "Qualquer Gênero"
 doctrine_clerical_gender_either_desc: "Qualquer pessoa que tenha sentido o chamado divino deve ser capaz de servir como um [ROOT.Faith.PriestNeuterPlural], independentemente de seu gênero."
 doctrine_parameter_clergy_can_be_either_gender: "O gênero não tem influência sobre quem pode ser concedido [holdings|lE] de templo ou servir como [court_chaplains|lE]"
 doctrine_clerical_marriage_name: "Casamento Clerical"
 doctrine_clerical_marriage_allowed_name: "Permitido"
 doctrine_clerical_marriage_allowed_desc: "O casamento é uma instituição sagrada, e os [ROOT.Faith.PriestNeuterPlural] devem ser capazes de participar dela como qualquer outro fiel."
 doctrine_parameter_clergy_can_marry: "Membros do [clergy|lE] podem se [marry|lE]"
 doctrine_clerical_marriage_disallowed_name: "Não Permitido"
 doctrine_clerical_marriage_disallowed_desc: "Tornar-se um [ROOT.Faith.PriestNeuter] significa dedicar a vida a [ROOT.Faith.HighGodName]. É inerentemente infiel considerar ter um cônjuge mortal além disso."
 doctrine_parameter_clergy_can_marry_disabled: "Aos membros do [clergy|lE] é proibido o [marriage|lE]"
 doctrine_clerical_succession_name: "Nomeação Clerical"
 doctrine_clerical_succession_temporal_appointment_name: "Temporária, Revogável"
 doctrine_clerical_succession_temporal_appointment_desc: "[ROOT.Faith.BishopNeuterPlural] são servos do reino e, portanto, devem poder ser contratados e demitidos por seu suserano com apenas pequenas restrições."
 doctrine_clerical_succession_spiritual_appointment_name: "Espiritual, Revogável"
 doctrine_clerical_succession_spiritual_appointment_desc: "Embora os [ROOT.Faith.AltPriestTermPlural] devam nomear todos os [ROOT.Faith.BishopNeuterPlural], os governantes seculares ainda devem ser capazes de demitir aqueles que falharem com eles."
 doctrine_clerical_succession_temporal_fixed_appointment_name: "Temporária, Vitalícia"
 doctrine_clerical_succession_temporal_fixed_appointment_desc: "Embora um governante deva ser capaz de selecionar seu próprio [ROOT.Faith.BishopNeuterPlural], suas responsabilidades são sagradas e divinas, e sua nomeação não deve estar sujeita a revogação."
 doctrine_clerical_succession_spiritual_fixed_appointment_name: "Espiritual, Vitalícia"
 doctrine_clerical_succession_spiritual_fixed_appointment_desc: "[ROOT.Faith.BishopNeuterPlural|U] são servos do divino, e como representantes do divino, a escolha que os [ROOT.Faith.AltPriestTermPlural] fazem para a posição é final e absoluta."
 doctrine_parameter_clerical_appointment_ruler: "[rulers|lE] nomeiam seu próprio [realm_priest|lE] ou [court_chaplain|lE]"
 doctrine_parameter_clerical_appointment_head_of_faith: "O [head_of_faith|lE] ou clero nomeia todos os [realm_priests|lE] ou [court_chaplains|lE]"
 doctrine_parameter_clerical_appointment_fixed_disabled: "O [realm_priest|lE] ou [court_chaplain|lE] pode ser demitido e substituído por um novo nomeado"
 doctrine_parameter_clerical_appointment_fixed: "O [realm_priest|lE] ou [court_chaplain|lE] permanece em seu cargo vitaliciamente"
 doctrine_theism_name: "Teísmo"
 doctrine_monotheist_name: "Monoteísta"
 doctrine_monotheist_desc: "Apenas um deus é cultuado. Os outros supostos \"deuses\" não passam de ídolos vazios, e no pior dos casos são tentativas de algum enganador maligno de seduzir os fiéis para longe da devida adoração a [ROOT.Faith.HighGodName].[AddLocalizationIf( GetPlayer.GetGovernment.HasGovernmentFlag( 'government_is_mandala' ), 'mandala_monotheist_warning')]"
 mandala_monotheist_warning: "\n\n$FAITH_MANDALA_MONOTHEIST_WARNING$"
 mandala_monotheist_warning_tt_global: "[AddLocalizationIf( GetPlayer.GetGovernment.HasGovernmentFlag( 'government_is_mandala' ), 'mandala_monotheist_warning')]"
 mandala_monotheist_warning_tt_first: "$mandala_monotheist_warning_tt_global$"
 mandala_monotheist_warning_tt_third: "$mandala_monotheist_warning_tt_global$"
 doctrine_polytheist_name: "Politeísta"
 doctrine_polytheist_desc: "O cosmos está cheio de divindades e espíritos poderosos. Em algumas crenças, eles estão claramente definidos em um panteão, enquanto em outras nem sequer têm nome, pois seu mundo espiritual é imenso e impregna tudo ao nosso redor."
 unreformed_faith_doctrine_name: "Não Reformada"
 unreformed_faith_name: "doutrina"
 unreformed_faith_doctrine_desc: "Uma fé não reformada não possui um clero organizado e doutrinas canônicas estabelecidas; diferentes comunidades podem seguir nominalmente a mesma fé enquanto possuem práticas religiosas e crenças muito diferentes."
 doctrine_parameter_unreformed: "Impede que os [rulers|lE] tribais possam mudar o [Concept( 'government', 'tipo de gobierno' )|E] \n$EFFECT_LIST_BULLET$ Concede o [unreformed_pagan_combat_bonus|lE]"
 doctrine_parameter_hostility_override_tenet_unreformed_syncretism: "Não pagãs [faiths|lE] com o dogma $tenet_unreformed_syncretism_name$ são consideradas [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V] em vez de $hostility_evil_tooltippable$"
 west_african_unreformed_faith_doctrine_name: "$unreformed_faith_doctrine_name$"
 west_african_unreformed_faith_doctrine_desc: "$unreformed_faith_doctrine_desc$"
 heresy_hostility_name: "Visão sobre a Heresia"
 heresy_hostility_doctrine_name: "Outras [faiths|lE] da mesma [religion|lE] são heréticas"
 heresy_hostility_doctrine_desc: "Cuidado com o falso profeta que torce e subverte a Fé para seus próprios fins. Aqueles que o fazem são hereges e devem ser destruídos."
 divine_destiny_name: "Destino Divino"
 divine_destiny_doctrine_name: "Governantes Legítimos do Mundo"
 divine_destiny_doctrine_desc: "Somos aqueles que vão inaugurar uma era de paz e prosperidade para todos os povos. Somos os governantes legítimos do mundo."
 doctrine_parameter_divine_destiny_holy_war_cost_reduction: "Custo de [piety|lE] na Guerra Santa: #P -50%#!"
 adoptionist_school_name: "Credo Adopcionista"
 special_doctrine_adoptionist_school_elipandic_doctrine_name: "Escola Elipandista"
 special_doctrine_adoptionist_school_elipandic_doctrine_desc: "A variante elipandista do $adoptionist$, que prefere se concentrar nas variações sutis da cristologia, sublinha a importância das diferenças #EMP precisas#! em relação ao dogma trinitário. Uma distinção complexa bem feita é considerada infinitamente melhor que uma explicação simples mal justificada."
 special_doctrine_adoptionist_school_felicitous_doctrine_name: "Escola Felicista"
 special_doctrine_adoptionist_school_felicitous_doctrine_desc: "Os adeptos felicianos do $adoptionist$ acreditam na praticidade acima da pureza, entendendo que devem trabalhar dentro de sistemas hostis para min?-los. Uma mentira abominível em busca de uma causa nobre ? considerada valer mais do que mil verdades inúteis."
 special_doctrine_adoptionist_school_radical_doctrine_name: "Escola Radical"
 special_doctrine_adoptionist_school_radical_doctrine_desc: "Os $adoptionist_adherent_plural$ radicais não admitem outro Deus além do Pai, não aceitam a divindade da carne mortal e não reconhecem outros $christianity_religion_adherent_plural$ que eles mesmos. Receber Cristo sem concordar com até a última #EMP letra#! do cânone é admitir a apostasia."
 special_doctrine_is_christian_faith_name: "Ensinos de Jesus"
 is_christian_faith_name: "$special_doctrine_is_christian_faith_name$"
 special_doctrine_is_christian_faith_desc: "Há aqueles no mundo que aderem aos ensinamentos de Jesus sem reconhecer sua divindade. Embora blasfemo, ainda devemos mostrar compaixão por essas almas desorientadas, pois elas podem se converter à verdadeira fé algum dia."
 doctrine_parameter_hostility_override_tenet_christian_syncretism: "As [faiths|lE] não-cristãs com o tenet $tenet_christian_syncretism_name$ são consideradas [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V] em vez de $hostility_evil_tooltippable$"
 special_doctrine_is_islamic_faith_name: "Ensinos do Profeta"
 is_islamic_faith_name: "$special_doctrine_is_islamic_faith_name$"
 special_doctrine_is_islamic_faith_desc: "Embora não sigam todas as leis do Profeta, há alguns neste mundo que são mais guiados pela vontade de Allah do que sabem. Com o tempo, esses meios-convertidos podem até abandonar seus caminhos malignos e se tornarem verdadeiros membros da Ummah!"
 doctrine_parameter_hostility_override_tenet_islamic_syncretism: "As [faiths|lE] não-islâmicas com o tenet $tenet_islamic_syncretism_name$ são consideradas [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V] em vez de $hostility_evil_tooltippable$"
 special_doctrine_is_jewish_faith_name: "Ensinos de Moisés"
 is_jewish_faith_name: "$special_doctrine_is_jewish_faith_name$"
 special_doctrine_is_jewish_faith_desc: "Nem todos entre os gentios vivem no pecado. Há aqueles que respeitam o povo escolhido de Deus e esses merecem nossa consideração em troca."
 doctrine_parameter_hostility_override_tenet_jewish_syncretism: "As [faiths|lE] não-judaicas com o tenet $tenet_jewish_syncretism_name$ são consideradas [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V] em vez de $hostility_evil_tooltippable$"
 prophecy_of_malachi_name: "A Profecia de Malaquias"
 special_doctrine_not_allowed_to_hof_name: "Sacerdócio Desmantelado"
 not_allowed_to_hof_name: "$special_doctrine_not_allowed_to_hof_name$"
 prophecy_of_malachi_desc: "De acordo com a doutrina judaica tradicional, um novo Sumo Sacerdote só pode ser nomeado com a vinda do Profeta ou se for encontrado um descendente de Aarão apto para servir como sacerdote."
 special_doctrine_not_allowed_to_hof_desc: "O Sacerdócio Maior desta fé foi completamente desmantelado. Qualquer tentativa de nomear um Sumo Sacerdote requer primeiro uma reconstrução completa da estrutura tradicional da igreja."
 doctrine_parameter_block_from_create_hof_parameter: "Esta fé não pode recriar o seu [head_of_faith|lE] em circunstâncias normais."
 special_doctrine_is_eastern_faith_name: "Entrelaçamento Multirreligioso"
 is_eastern_faith_name: "$special_doctrine_is_eastern_faith_name$"
 special_doctrine_is_eastern_faith_desc: "Juntos, não somos unidos por uma única fé, mas pelas muitas fé que compõem o tecido religioso de nossa sociedade. Embora possamos nos chamar por nomes diferentes e seguir caminhos diferentes, alguns de fora de nosso próprio sistema de crenças aprenderam a conviver em nossa sociedade como se fossem um de nós."
 doctrine_parameter_hostility_override_tenet_eastern_syncretism: "As [faiths|lE] não-orientais com o tenet $tenet_eastern_syncretism_name$ são consideradas [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V] em vez de $hostility_evil_tooltippable$"
 special_doctrine_is_sinitic_faith_name: "Cosmologia sinítica"
 is_sinitic_faith_name: "$special_doctrine_is_sinitic_faith_name$"
 special_doctrine_is_sinitic_faith_desc: "$special_doctrine_is_eastern_faith_desc$"
 doctrine_parameter_hostility_override_tenet_sinitic_syncretism: "Não-siníticas [faiths|El] com o dogma $tenet_sinitic_syncretism_name$ são consideradas [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V] em vez de $hostility_evil_tooltippable$"
 special_doctrine_is_gnostic_faith_name: "$tenet_gnosticism_name$"
 is_gnostic_faith_name: "$special_doctrine_is_gnostic_faith_name$"
 special_doctrine_is_gnostic_faith_desc: "$tenet_gnosticism_desc$"
 special_doctrine_fire_worship_name: "Fogo Sagrado"
 fire_worship_name: "$special_doctrine_fire_worship_name$"
 special_doctrine_fire_worship_desc: "Todos nós somos unidos por nossa veneração ao fogo, o elemento mais puro e agente da glória divina. É nosso dever sagrado manter as chamas eternas acesas no mundo, para dissipar a falsidade e o mal."
 doctrine_parameter_same_hof_hostility_override: "Considera que outras [faiths|lE] que compartem [head_of_faith|lE] são [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V]"
 is_hostile_to_maitreya_name: "Hostilidade a $maitreya$"
 special_doctrine_maitreya_hostility_name: "Hostil aos $maitreya_adherent_plural$"
 special_doctrine_maitreya_hostility_desc: "Os $maitreya_adherent_plural$ aspiram a destruir todos os demais seguidores dos ensinamentos de Buda. Embora nem todos sigam o mesmo caminho, os modos dos $maitreya$ são intoleráveis."
 special_doctrine_is_maitreya_name: "É $maitreya$"
 special_doctrine_is_maitreya_desc: "É nosso dever solene reconstruir o mundo e inaugurar a era do Buda Maitreya."
