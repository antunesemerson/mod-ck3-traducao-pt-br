 #Ash'ari
 ashari: "Ash'arism"
 ashari_adj: "Ash'ari"
 ashari_adherent: "Ash'ari"
 ashari_adherent_plural: "Ash'aris"
 ashari_desc: "Uma escola ortodoxa de teologia que sustenta que Alá criou cada momento no tempo, mas os humanos tem livre arbítrio para escolher entre Bom - o que Deus ordenou - e Mal - o que Deus proíbe."
 #Muwalladism
 muwalladi: "Muladismo"
 muwalladi_adj: "Muladi"
 muwalladi_adherent: "Muladi"
 muwalladi_adherent_plural: "Muladis"
 muwalladi_desc: "Longe do centro do mundo Árabe, muçulmanos Ibéricos adaptaram-se a realidade de governar uma região com grandes populações de Cristãos e Judeus que tinham estranhas tradições estrangeiras."
 #Masmudism
 masmudi: "Almoadismo"
 masmudi_adj: "Almóada"
 masmudi_adherent: "Almóada"
 masmudi_adherent_plural: "Almóadas"
 masmudi_desc: "Um braço reformista do Islamismo Sunita que se originou com tribos Berbere no norte da África, o movimento Almóada se via como unitarista e pregava a doutrina do monoteísmo purificado."
 masmudi_religious_head_title: "Califa"
 masmudi_religious_head_title_name: "califado"
 #Mu'tazila
 mutazila: "Mu'tazila"
 mutazila_adj: "Mu'tazila"
 mutazila_adherent: "Mu'tazilita"
 mutazila_adherent_plural: "Mu'tazilitas"
 mutazila_desc: "Uma escola racionalista de teologia que afirma que o Alcorão #EMP não#! coexiste eternamente com Deus, j? que Ele deve ter precedido sua própria palavra."
 #Maturidi
 maturidi: "Maturidismo"
 maturidi_adj: "Maturidi"
 maturidi_adherent: "Maturidi"
 maturidi_adherent_plural: "Maturidis"
 maturidi_desc: "Uma teologia racionalista que defende que a ética tem uma existência objetiva, como se derivada das qualidades eternas de Deus, e que os humanos devem, portanto, buscar escolhas éticas."
 #Quranism
 quranist: "Coranismo"
 quranist_adj: "Coranista"
 quranist_adherent: "Coranista"
 quranist_adherent_plural: "Coranistas"
 quranist_desc: "Uma interpretação literalista do islamismo que afirma que o Alcorão é a única fonte de conhecimento divino, e que deveria ser seguido à risca, ignorando o Hádice e as Fátuas."
 #Ismaili
 ismaili: "Ismailismo"
 ismaili_adj: "Ismailita"
 ismaili_adherent: "Ismailita"
 ismaili_adherent_plural: "Ismailitas"
 ismaili_desc: "Uma fé Xiita que considera a linhagem dos verdadeiros Imames - aqueles imbuídos com o conhecimento divino e a infalibidade - para percorrer o caminho de Ismael da linhagem de Jafar. Eles também são conhecidos como Setenistas, uma vez que Ismael foi o sétimo Imame depois de Maomé."
 #Qarmatians
 qarmatian: "Carmatianismo"
 qarmatian_adj: "Cármata"
 qarmatian_adherent: "Cármata"
 qarmatian_adherent_plural: "Cármatas"
 qarmatian_desc: "Um braço do Ismailismo que incorporou elementos do Zoroastrismo. O número de Imames era predestinado por Deus para ser sete e então não poderiam existir mais nenhum Imame antes que o sétimo Imame - Maomé da linhagem de Ismael - retornasse para guiar os fiéis."
 #Nizari
 nizari: "Nizarismo"
 nizari_adj: "Nizari"
 nizari_adherent: "Nizari"
 nizari_adherent_plural: "Nizaris"
 nizari_desc: "Uma fé racionalista que apoia a razão na interpretação do Alcorão e do Hádice. Ser Imame é hereditário, e eles traçam a linhagem de sucessão até Ali."
 #Zayidi
 zayidi: "Zaidismo"
 zayidi_adj: "Zaidi"
 zayidi_adherent: "Zaidi"
 zayidi_adherent_plural: "Zaidis"
 zayidi_desc: "Um verdadeiro Imame não é infalível, mas definido por sua luta contra a corrupção e o mal. Zaidis são, portanto, definidos por suas crenças de que Zayd da linhagem de Ali era o sucessor de direito ao Imamato, devido a sua rebelião contra os Omíadas."
 #Imamism (Twelver)
 imami: "Imamismo"
 imami_adj: "Imami"
 imami_adherent: "Imami"
 imami_adherent_plural: "Imamis"
 imami_desc: "Os Imamis acreditam que doze Imames foram profetizados para liderar a Umma, e que o décimo segundo Imame, Imame Zaman, aguarda o momento de seu retorno para liderar os muçulmanos para o dia do Julgamento Final."
 islam_ayatollah: "aiatolá"
 islam_ayatollah_plural: "aiatolás"
 ghulat: "Ikhtilafismo"
 ghulat_adj: "Ikhtilafi"
 ghulat_adherent: "Ikhtilafi"
 ghulat_adherent_plural: "Ikhtilafis"
 ghulat_desc: "Ikhtilafis acreditam na natureza divina dos Imames infalíveis, iniciando por Ali. Deus não só escolheu-os e inspirou-os, mas habitou-os parcialmente para guiar seus atos, e por extensão toda a Umma."
 alawite: "Alauísmo"
 alawite_adj: "Alauíta"
 alawite_adherent: "Alauíta"
 alawite_adherent_plural: "Alauítas"
 alawite_desc: "Os ensinamentos da religião Alauíta são secretos e o Alcorão é sua única fonte de textos sagrados. Adicionalmente a crença na sucessão dos Imames a partir de Ali, os Alauítas também acreditam na reencarnação, e que todas as criaturas foram estrelas expulsas do paraíso que devem agora reconquistar seu lugar vivendo sucessivas vidas de bondade e fé."
 #Alevis
 alevi: "Alevismo"
 alevi_adj: "Alevita"
 alevi_adherent: "Alevita"
 alevi_adherent_plural: "Alevitas"
 alevi_desc: "Os Alevitas acreditam na sucessão dos Doze Imames, mas também seguem muitas outras tradições, como esboçado em suas escrituras sagradas, os Buyruks. Na tradição Alevita, Deus é a Verdade e Maomé e Ali são manifestações Dele no mundo."
 alevi_house_of_worship: "cemevi"
 alevi_house_of_worship_2: "$alevi_house_of_worship$" #Optional translation alt
 alevi_house_of_worship_3: "$alevi_house_of_worship$" #Optional translation alt
 alevi_house_of_worship_plural: "cemevis"
 alevi_religious_text: "Buyruks"
 alevi_religious_text_2: "$alevi_religious_text$" #Optional translation alt
 alevi_religious_text_3: "$alevi_religious_text$" #Optional translation alt
 #Druze
 druze: "Druso"
 druze_adj: "Druso"
 druze_adherent: "Druso"
 druze_adherent_plural: "Drusos"
 druze_desc: "Vindos das Montanhas de Druso, a fé Drusa segue muiitos dos princípios do Ismailismo, mas também considera crenças gnósticas em uma teologia esotérica focada na Verdade da existência."
 druze_religious_text: "Epístolas da Sabedoria"
 druze_religious_text_2: "$druze_religious_text$" #Optional translation alt
 druze_religious_text_3: "$druze_religious_text$" #Optional translation alt
 #Ibadi
 ibadi: "Ibadismo"
 ibadi_adj: "Ibadita"
 ibadi_adherent: "Ibadita"
 ibadi_adherent_plural: "Ibaditas"
 ibadi_desc: "Os Ibaditas não creem que é necessário que todo o Islã seja governado por um Califa ou um Imame, se não houver candidato adequado. Eles são, portanto, Muhakkima, não reconhecendo nem a linhagem de Ali nem os sucessores de Abu Bakr como líderes dignos."
 #Azariqa
 azariqa: "Azraquismo"
 azariqa_adj: "Azariqa"
 azariqa_adherent: "Azariqa"
 azariqa_adherent_plural: "Azariqas"
 azariqa_desc: "Ao não reconhecer nenhum sucessor de Maomé digno, os Azariqas consideram seu direito e dever combater qualquer líder que não sustente os valores de sua fé. Na verdade, qualquer diferença na interpretação da fé marca o indivíduo como infiel."
 #Najdat
 najdat: "Najadatismo"
 najdat_adj: "Najadate"
 najdat_adherent: "Najadate"
 najdat_adherent_plural: "Najadates"
 najdat_desc: "Adeptos do braço Najadate do Carija acreditam firmemente no estabelecimento de uma liderança muçulmana por consenso dos fiéis. O líder não é infalível, mas por meio da comunidade eles são escolhidos por Deus."
 #Sufri
 sufri: "Sufismo"
 sufri_adj: "Sufi"
 sufri_adherent: "Sufi"
 sufri_adherent_plural: "Sufis"
 sufri_desc: "Os Sufis acreditam na liderança e orientação divina por meio da interpretação da palavra de Deus, ao invés da sucessão hereditária. A vontade de Deus é revelada como uma expressão da vontade de Umma, enquanto o povo de Umma conhecer bem o Alcorão."
 #Hafizi
 hafizi: "Hafizi"
 hafizi_adj: "Hafizi"
 hafizi_adherent: "Hafizi"
 hafizi_adherent_plural: "Hafizis"
 hafizi_desc: "Os Hafizis dão prioridade em apoiar quem consideram o verdadeiro califa acima de todos os outros, assim como resistir a todas as tentativas de destituição ou deposição deles. Na derrota, são definidos pela rebelião por uma causa digna, e na vitória, pela adesão orgulhosa à vontade de seu líder."
