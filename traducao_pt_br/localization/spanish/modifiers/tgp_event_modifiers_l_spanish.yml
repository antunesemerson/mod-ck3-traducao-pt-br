l_spanish:
 tgp_doddering_magistrate_modifier: "Magistrado senil"
 tgp_doddering_magistrate_modifier_desc: "É realmente impressionante quanta desordem burocrática uma única pessoa pode causar."
 tgp_disrespected_elderly_modifier: "Falta de respeito aos idosos"
 tgp_disrespected_elderly_modifier_desc: "Um idoso descontente pode causar uma quantidade surpreendente de problemas."
 tgp_reduced_taxes_modifier: "Carga tributária reduzida"
 tgp_reduced_taxes_modifier_desc: "Pode ser que reduzir os impostos não enriqueça o estado, mas, sem dúvida, faz maravilhas pela sua popularidade."
 tgp_imprisoned_poor_modifier: "Empobrecidos encarcerados"
 tgp_imprisoned_poor_modifier_desc: "Que surpresa, parece que encarcerar os pobres não ajuda na popularidade."
 tgp_compelled_labor_modifier: "Trabalho forçado"
 tgp_compelled_labor_modifier_desc: "As pessoas foram postas para trabalhar e, embora não estejam necessariamente felizes com a perspectiva, são eficientes no que fazem."
 tgp_appreciative_populace_modifier: "Populaça agradecida"
 tgp_appreciative_populace_modifier_desc: "Magistrados virtuosos são sempre apreciados pelo povo comum."
 tgp_pardoned_prisoners_modifier: "Prisioneiros libertados"
 tgp_pardoned_prisoners_modifier_desc: "Os menos culpados ainda eram culpados de algo — e alguns rapidamente voltaram aos velhos hábitos."
 tgp_convict_labor_modifier: "Trabalho de condenados"
 tgp_convict_labor_modifier_desc: "Quando se trata de construção, os prisioneiros são uma solução tradicional para a escassez de mão de obra."
 tgp_enforced_justice_on_official_modifier: "Justiça rigorosa"
 tgp_enforced_justice_on_official_modifier_desc: "A administração que trata os seus com a mesma severidade que trata os outros é digna de respeito."
 tgp_potent_physick: "Fármaco forte"
 tgp_potent_physick_desc: "O filtro do vendedor ambulante tem se mostrado #EMP vigorizante#! em mais de um sentido."
 tgp_expelled_popular_peddler_modifier: "Mercador popular expulso"
 tgp_expelled_popular_peddler_modifier_desc: "O mercado lamenta a perda de um elixir tão eficaz."
 tgp_delayed_taxes_modifier: "Impostos postergados"
 tgp_delayed_taxes_modifier_desc: "A população desta província recebeu permissão para adiar o pagamento de seus impostos — prejudicial para a Tesouraria da administração, mas apreciado pelo povo."
 tgp_reassured_populace: "Populacho tranquilizado"
 tgp_reassured_populace_desc: "Um líder de confiança é uma grande fonte de tranquilidade para um povo preocupado."
 tgp_state_annexed_land: "Terras anexadas pelo Estado"
 tgp_state_annexed_land_desc: "O que o Estado quer, o Estado frequentemente toma, e poucos estão em posição de protestar."
 tgp_empowered_merchants_association: "Associação de comerciantes reforçada"
 tgp_empowered_merchants_association_desc: "Conceder privilégios especiais a um grupo específico de comerciantes pode resolver muitos problemas do mercado, mas pode estabelecer um precedente perigoso."
 tgp_army_reconstruction: "Reconstrução com ajuda militar"
 tgp_army_reconstruction_desc: "Os soldados podem resmungar por serem colocados para trabalhar em projetos de construção, mas sua eficácia é inegável."
 tgp_well_planned_bridge: "Ponte bem planejada"
 tgp_well_planned_bridge_desc: "Aqui foi construída recentemente uma ponte admirável."
 tgp_settled_caravans: "Caravanas mercantes assentadas"
 tgp_settled_caravans_desc: "Convencer as caravanas mercantes a se estabelecerem permanentemente provou ser um impulso para a economia local."
 tgp_suppressed_popular_storyteller: "Narrador popular silenciado"
 tgp_suppressed_popular_storyteller_desc: "Silenciar uma voz franca pode reduzir a agitação, mas também pode causá-la."
 tgp_state_sponsored_storytellers: "Narradores patrocinados pelo Estado"
 tgp_state_sponsored_storytellers_desc: "As pessoas daqui são regularmente brindadas com histórias de magistrados benevolentes e soldados heroicos."
 tgp_converted_storyteller: "Contador de histórias traidor"
 tgp_converted_storyteller_desc: "Poucos pregam com o fervor de um convertido, e parece que isso se aplica aos contadores de histórias tanto quanto aos sacerdotes."
 tgp_consolidated_population: "População consolidada"
 tgp_consolidated_population_desc: "Consolidar as populações de aldeias dispersas em um único local impulsionou significativamente o desenvolvimento da região."
 tgp_market_regulation: "Mercados bem regulados"
 tgp_market_regulation_desc: "A mão rígida do Estado garante que os negócios sejam conduzidos adequadamente e de acordo com as normas."
 tgp_purchased_land: "Aquisições de terras"
 tgp_purchased_land_desc: "Uma carreira no governo costuma oferecer amplas oportunidades de enriquecimento pessoal."
 tgp_hastily_rebuilt_bridge: "Ponte reconstruída às pressas"
 tgp_hastily_rebuilt_bridge_desc: "A pressa nem sempre é a melhor conselheira quando se trata de construção, mas às vezes a necessidade é grande demais para esperar."
 tgp_ferry_crossing: "Travessia de balsa"
 tgp_ferry_crossing_desc: "Problemas difíceis muitas vezes exigem soluções inovadoras, e uma balsa é um substituto capaz para uma ponte."
 tgp_harem_medical_treatment_modifier: "Cuidado do harém"
 tgp_harem_medical_treatment_modifier_desc: "As flores do harém são tão delicadas quanto belas; sua saúde deve ser vigiada com tanto cuidado e rigor quanto sua fidelidade."
 tgp_emperors_notice_modifier: "Aviso do Filho do Céu"
 tgp_emperors_notice_modifier_desc: "Apesar de sua linhagem de baixa origem, este personagem foi descoberto entre a multidão pelo Filho do Céu durante um Exame Metropolitano."
 tgp_harsh_cultivation_modifier: "Cultivo severo"
 tgp_harsh_cultivation_modifier_desc: "A competição feroz com outro discípulo de seu mentor cria um ambiente de estudo difícil, mas recebe muita atenção."
 tgp_strict_supervision_modifier: "Supervisão estrita"
 tgp_strict_supervision_modifier_desc: "Miríades contemplam os céus. Poucos recebem seu olhar de volta. E somente este personagem é observado com atenção especial."
