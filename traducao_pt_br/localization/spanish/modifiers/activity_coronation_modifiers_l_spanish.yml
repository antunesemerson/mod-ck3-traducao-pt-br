l_spanish:
 ach_how_to_lose_a_war_listener_modifier: "Contos de Guerras Perdidas: o Ouvinte"
 ach_how_to_lose_a_war_listener_modifier_desc: "Este personagem ouviu uma história trágica sobre uma guerra perdida e aprendeu o que não fazer na vida e na guerra."
 ach_how_to_lose_a_war_talker_modifier: "Contos de Guerras Perdidas: o Narrador"
 ach_how_to_lose_a_war_talker_modifier_desc: "Este personagem falou e falou sobre sua desventura. Mas se abrir demais e se repetir lhe deram algum conforto mental."
 ach_peace_broker_modifier: "Pacificador com lábia"
 ach_peace_broker_modifier_desc: "Na véspera de sua coroação, este personagem impediu a repetição de uma guerra revanchista, um segundo erro sangrento."
 ach_neutered_revanchist_modifier: "Revanchista vingativo neutralizado"
 ach_neutered_revanchist_modifier_desc: "Este personagem teve uma conversa transformadora durante uma cerimônia de coroação que o fez repensar sua postura diante da vida e do próprio passado."
 ach_partners_in_revanchism_passive_modifier: "Companheiros de revanchismo: preparação"
 ach_partners_in_revanchism_passive_modifier_desc: "Este personaje se prepara para cooperar con otro gobernante para librar una guerra de revancha.\n\n#weak Este modificador conseguirá efectos extra cuando se declare la guerra a un objetivo previsto. Se llamará a la guerra al gobernante que comparta este modificador y se unirá si es posible. Tu nuevo modificador de guerra estará activo durante un año#!"
 ach_partners_in_revanchism_active_modifier: "Companheiros de Revanchismo: guerra"
 ach_partners_in_revanchism_active_modifier_desc: "Este personagem coopera estreitamente com outro governante em uma guerra de vingança."
 ach_hof_visit_modifier: "Visita do líder da fé"
 ach_hof_visit_modifier_desc: "Estas terras estão agitadas pela visita de seu líder religioso e da enorme comitiva que o acompanha. Os fiéis acorrem em massa à província, e os moradores locais estão carregados de bênçãos e esmolas."
 ach_beat_peasants_modifier: "Camponeses espancados"
 ach_beat_peasants_modifier_desc: "Este personagem ganhou a reputação de reprimir pessoalmente seus inferiores quando eles saem da linha."
 ach_positive_rumors_modifier: "Rumores positivos"
 ach_positive_rumors_modifier_desc: "O povo comum do reino parece agitado com histórias sem fundamento sobre a glória deste personagem."
 ach_negative_rumors_modifier: "Rumores negativos"
 ach_negative_rumors_modifier_desc: "A fofoca não tem sido generosa com este personagem ultimamente."
 ach_arrested_rumormongers_modifier: "Murmuradores presos recentemente"
 ach_arrested_rumormongers_modifier_desc: "Os fofoqueiros locais recentemente se calaram por medo da opressão de seu senhor."
 ach_arrested_rumormongers_character_modifier: "$ach_arrested_rumormongers_modifier$"
 ach_arrested_rumormongers_character_modifier_desc: "Este personagem ganhou a reputação de estar disposto a prender camponeses fofoqueiros, um sinal de medo e de certo grau de insegurança."
 ach_imperious_modifier: "Imperioso"
 ach_imperious_modifier_desc: "Este personagem ganhou a reputação de estar acima de preocupações mesquinhas."
 ach_coronation_treated_wound_modifier: "Feridas tratadas"
 ach_coronation_treated_wound_modifier_desc: "As feridas deste personagem foram tratadas com destreza."
 ach_coronation_crackdown_modifier: "Repressão na coroação"
 ach_coronation_crackdown_modifier_desc: "Multidões de guardas desceram sobre a população desta região para restaurar a ordem. Muito foi destruído, mas a ordem foi restaurada."
 ach_coronation_crackdown_character_modifier: "$ach_coronation_crackdown_modifier$"
 ach_coronation_crackdown_character_modifier_desc: "Este personagem demonstrou disposição para soltar seus próprios soldados contra sua população para restaurar a ordem, inspirando respeito em muitos, mas repulsa em alguns."
 ach_awed_peasantry_modifier: "Campesinato pasmado"
 ach_awed_peasantry_modifier_desc: "Este personagem fez um discurso para acalmar uma multidão tumultuada, cuja eloquência levou centenas às lágrimas."
 ach_coronation_blissful_ignorance_modifier: "Ignorância feliz"
 ach_coronation_blissful_ignorance_modifier_desc: "Este personagem sabe que é melhor ignorar felizmente certos problemas potenciais."
 ach_coronation_trusts_nobody_modifier: "Não confia em ninguém"
 ach_coronation_trusts_nobody_modifier_desc: "Este personagem se assusta com qualquer sombra e está cada vez mais convencido de que seus vassalos tramam sua ruína."
 ach_coronation_stampede_modifier: "Pânico na coroação"
 ach_coronation_stampede_modifier_desc: "Uma infeliz série de acontecimentos levou dezenas de pessoas — em sua maioria plebeus — a morrerem pisoteadas."
 ach_declarations_of_loyalty_modifier: "Declarações de lealdade"
 ach_declarations_of_loyalty_modifier_desc: "Parece que este personagem não tem nada para conversar com os outros vassalos além da retidão de seu suserano."
 ach_coronation_theocratic_allies_modifier: "Aliados teocráticos"
 ach_coronation_theocratic_allies_modifier_desc: "Este personagem se beneficiou muito do apelo de um vassalo ao clero."
 ach_coronation_little_birds_modifier: "Passarinhos"
 ach_coronation_little_birds_modifier_desc: "Este personagem conta com o apoio da rede de espionagem de um de seus vassalos; que grande alívio!"
 ach_coronation_expended_resources_modifier: "Recursos gastos"
 ach_coronation_expended_resources_modifier_desc: "Este personagem gastou recentemente muitos recursos apoiando outro governante."
 ach_coronation_expended_resources_martial_modifier: "$ach_coronation_expended_resources_modifier$"
 ach_coronation_expended_resources_martial_modifier_desc: "$ach_coronation_expended_resources_modifier_desc$ Até seus próprios exércitos foram exauridos."
 ach_coronation_expended_resources_martial_nomad_modifier: "$ach_coronation_expended_resources_modifier$"
 ach_coronation_expended_resources_martial_nomad_modifier_desc: "$ach_coronation_expended_resources_modifier_desc$ Até mesmo seus próprios exércitos foram exauridos."
 ach_coronation_expended_resources_intrigue_modifier: "$ach_coronation_expended_resources_modifier$"
 ach_coronation_expended_resources_intrigue_modifier_desc: "$ach_coronation_expended_resources_modifier_desc$ Como resultado, sua rede de espionagem está sobrecarregada."
 ach_focusing_on_prayer_modifier: "Focar na oração"
 ach_focusing_on_prayer_modifier_desc: "Este personagem está reprimindo bastante frustração ao se concentrar em assuntos de fé."
 ach_familial_support_modifier: "Apoio familiar"
 ach_familial_support_modifier_desc: "Esta dinastia é conhecida por agir como um todo maior."
 ach_reign_of_terror_modifier: "Reinado de terror"
 ach_reign_of_terror_modifier_desc: "Esta província sofre as cruéis represálias de um senhor desprezado."
 ach_reign_of_terror_character_modifier: "Reinado de terror"
 ach_reign_of_terror_character_modifier_desc: "Este personagem respondeu aos rumores do campesinato com uma série cruel de represálias brutais."
 ach_useful_crowds_modifier: "Multidões úteis"
 ach_useful_crowds_modifier_desc: "Os agentes deste personagem se movem sem serem vistos entre as multidões locais."
 ach_coronation_good_listener_modifier: "Bom ouvinte"
 ach_coronation_good_listener_modifier_desc: "Este personagem começou a observar as pessoas e está aprendendo tanto, oh, tanto como resultado…"
 ach_coronation_studying_ceremony_modifier: "Estudar a cerimônia de coroação"
 ach_coronation_studying_ceremony_modifier_desc: "Este personagem aprende muito ao testemunhar as dificuldades de organizar uma cerimônia de coroação."
 ach_coronation_gossips_with_servants_modifier: "Fofoqueando com servos"
 ach_coronation_gossips_with_servants_modifier_desc: "Este personagem passou a trocar fofocas com a criadagem."
 ach_social_distancing_modifier: "Mantendo distância"
 ach_social_distancing_modifier_desc: "Este personagem mantém bastante distância dos outros. Embora seja surpreendentemente eficaz para manter a saúde, ter de gritar pelos cômodos para ser ouvido não é tão ideal assim."
 ach_favored_minority_modifier: "Minoria favorecida"
 ach_favored_minority_modifier_desc: "O governante desta província optou por favorecer seu povo apesar de pertencer a uma cultura diferente."
 ach_drunk_province_1_modifier: "Populacho embriagado"
 ach_drunk_province_1_modifier_desc: "Os moradores locais desfrutaram bastante da bebida durante a recente coroação."
 ach_drunk_province_2_modifier: "População intoxicada"
 ach_drunk_province_2_modifier_desc: "A obscena disponibilidade de álcool durante a recente coroação levou a níveis de embriaguez até então nunca vistos nesta província."
 ach_generous_coronation_drinks_modifier: "Bebidas generosas de coroação"
 ach_generous_coronation_drinks_modifier_desc: "Este personagem garantiu que o povo tivesse bastante bebida durante sua coroação e, até hoje, balbuciam brindes em seu nome."
 ach_secret_stash_modifier: "Esconderijo secreto"
 ach_secret_stash_modifier_desc: "Este personagem conseguiu uma quantidade de haxixe exótico.\n\nConcede um uso único de [decision|lE] [GetDecisionWithKey('stress_loss_hashishiyah_decision').GetName]"
 ach_liege_subsidies_modifier: "Subsídios Reais"
 ach_liege_subsidies_modifier_desc: "O governante local tem o favor de seu suserano, e seus domínios também."
