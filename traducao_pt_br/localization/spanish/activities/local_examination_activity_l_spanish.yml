l_spanish:
 ### SETUP
 activity_local_examination: "Exame local"
 activity_local_examination_plural: "Exames locais"
 activity_local_examination_destination_selection: "Você só pode realizar um $activity_local_examination$ em sua [capital|lE]."
 activity_local_examination_selection_tooltip: "Realize um [GetActivityType('activity_local_examination').GetName|l] para avaliar a habilidade e o [merit|lE] de seus súditos $activity_local_examination_host_rewards$"
 activity_local_examination_desc: "É nossa honra e dever manter a estrutura e organizar estes exames. Eles nos permitem avaliar, determinar e conceder [merit|lE] aos indivíduos mais adequados — para garantir a prosperidade futura do reino."
 activity_local_examination_host_desc: "$activity_local_examination_host_rewards$$activity_local_examination_guest_rewards$"
 activity_local_examination_host_rewards: "\n$BULLET_WITH_TAB$[legitimacy_i] [legitimacy|E]\n$BULLET_WITH_TAB$[prestige_i|E] [prestige|E]"
 activity_local_examination_guest_desc: "\n$BULLET_WITH_TAB$Una oportunidad de completar el #V examen provincial#!\n @provincial_exam_icon!$BULLET_WITH_TAB$Puede aumentar tu [trait_level_track_xp|El] de [GetTrait('confucian_education').GetName( GetNullCharacter )|l]\n$BULLET_WITH_TAB$Puede aumentar tu [merit|El]\n$BULLET_WITH_TAB$ @alert_icon! #alert_trial ¡Si no conoces el [language|El] [host.GetCulture.GetLanguage.GetName], tus probabilidades de aprobar se reducen enormemente!"
 activity_local_examination_guest_rewards: "\n$BULLET_WITH_TAB$Pode recrutar um personagem altamente habilidoso\n$BULLET_WITH_TAB$Os participantes podem ganhar [trait_level_track_xp|lE] de [GetTrait('confucian_education').GetName( GetNullCharacter )|l]\n$BULLET_WITH_TAB$Os participantes podem ganhar [merit|lE]"
 local_examination_base_cost: "Custo base"
 activity_local_examination_host_an_a: "um"
 activity_local_examination_with_icon: "$activity_local_examination$ @provincial_exam_icon!"
 activity_local_examination_expected_frequency: "Espera-se a cada ano"
 activity_local_examination_can_complete_tt: "$activity_local_examination_not_available_tt$"
 activity_local_examination_not_available_tt: "#T [GetActivityType( 'activity_local_examination' ).GetNameNoTooltip]#!\nNesta [activity|lE], os examinados podem concluir:\n@provincial_exam_icon! Exame provincial\n\n$activity_local_examination_expected_frequency$"
 activity_local_exam_not_passed_tt: "Você não passou no exame local"
 # Province Selection
 activity_local_examination_province_kaifeng_palace_desc: "#P ++ $building_type_kaifeng_palace_01$#!"
 activity_local_examination_province_examination_hall_desc: "#P ++ $building_type_examination_hall_01$#!"
 #Activity Window Characters
 activity_window_character_player_guest_traveling: "[guest|E]\n[Character.GetShortUINameNoTooltip|U]"
 activity_local_examination_guest_help_text: "Todos os [activity_guests|lE] serão submetidos aos exames; uma aprovação significa mais [merit|lE] para o convidado, assim como mais [prestige|lE] para o [activity_host|lE]\n\nOs exames também são a ocasião perfeita para criar conexões e conhecer funcionários importantes."
 ### PHASES
 local_examination_phase_assembly: "Reunião"
 local_examination_phase_assembly_desc: "Todos os candidatos elegíveis estão se dirigindo às salas de exame."
 local_examination_phase_preparation: "Preparação"
 local_examination_phase_preparation_desc: "Os candidatos, assim como o anfitrião, aguardam sua vez, apressando-se para fazer os preparativos possíveis para as provas."
 local_examination_phase_examination: "Exame provincial"
 local_examination_phase_examination_desc: "Começa o exame. Que seja o que tiver de ser."
