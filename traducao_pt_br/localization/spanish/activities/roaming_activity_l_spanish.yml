 roaming_option_travel_length: "Duração da Viagem"
 roaming_short_length: "Caminhada Curta"
 roaming_short_length_desc: "$EFFECT_LIST_BULLET$ A [activity|lE] será mais curta e terá menos oportunidades\n\n#weak Uma jornada curta longe das cortes e dos nobres limpará minha mente de todas as dúvidas.#!"
 roaming_long_length: "Caminhada Longa"
 roaming_long_length_desc: "$EFFECT_LIST_BULLET$ A [activity|lE] será mais longa, e dará mais oportunidades\n\n#weak Eu preciso de uma longa jornada, longe de tudo, um momento para ser só eu mesmo.#!"
 roaming_befriend_intent: "Fazer Amigos"
 roaming_befriend_intent_desc: "Você busca oportunidades para ganhar [opinion|lE] com seu Acompanhante de Viagem. Lembre-se de trazer alguém!"
 roaming_mystic_intent: "Místico"
 roaming_mystic_intent_desc: "Você deseja momentos para ficar sozinho com seus pensamentos. Maior chance de ganhar [trait_level_track_xp|lE]."
 roaming_storyteller_intent: "Contador de Histórias"
 roaming_storyteller_intent_desc: "Você busca momentos que fariam uma boa e memorável história! Aumentará a [prestige_experience|lE] ganha com a atividade."
 activity_roaming_province_desc: "Você viaja para [ROOT.Province.GetName]"
