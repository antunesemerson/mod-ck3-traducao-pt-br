 apa_roaming_forest_gnarled_oak_key: "Viajando pelas [activity.GetCurrentPhase.GetLocation.Custom('HoldingNoHoldingTerrainRoaming')], [first.GetShortUIName] encontrou um enorme carvalho retorcido com um tronco oco, um refúgio para pássaros ninhando."
