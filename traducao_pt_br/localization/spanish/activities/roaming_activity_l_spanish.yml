l_spanish:
 activity_roaming: "Caminhada"
 activity_roaming_desc: "Parta em uma expedição solitária para os cantos escondidos do reino. Esta aventura oferece uma pausa das pressões da existência cortesã, proporcionando a oportunidade de descansar em florestas antigas e colinas suaves."
 activity_roaming_host_desc: "$BULLET_WITH_TAB$[opinion|E] [opinion_i|E]\n$BULLET_WITH_TAB$[stress_loss|E] [stress_loss_i|E]\n$BULLET_WITH_TAB$[prestige_experience|E] [prestige_experience_i|E]\n$BULLET_WITH_TAB$ Pode ganhar o [trait|lE] [GetTrait('lifestyle_mystic').GetName( GetNullCharacter )|l] ou [trait_level_track_xp|lE]"
 activity_roaming_guest_desc: ""
 activity_roaming_conclusion_desc: "A jornada proporcionou uma oportunidade maravilhosa de momentaneamente deixar de lado os fardos da governança e abraçar um descanso das pressões que ela envolve."
 activity_roaming_selection_tooltip: "Parta em uma jornada, deixando de lado os fardos da governança por um momento.\n\nRecompensas esperadas:\n $activity_roaming_host_desc$"
 activity_roaming_destination_selection: "O [terrain|lE] mais remoto aumentará a [prestige_experience|lE] e a [stress_loss|lE] que se ganhem com a [activity|lE]."
 honorary_guest_traveling_companion_for_host: "$honorary_guest_traveling_companion$"
 honorary_guest_traveling_companion_desc_for_host: ""
 honorary_guest_traveling_companion: "Acompanhante de Viagem"
 activity_roaming_guest_help_text: "[activity_guest|lE] terá oportunidades de reduzir seu [stress|lE] e ganhar [prestige_experience|lE]."
 phase_roaming: "Vagueio"
 phase_roaming_desc: ""
 activity_roaming_predicted_cost: "O custo de uma [hike|lE] é principalmente afetado pela sua duração. Uma caminhada mais longa terá mais oportunidades, mas também custará mais."
 hike_province_requirement_landless: "Os [adventurers|lE] e [characters|lE] sem [domain|lE] só podem [Concept('hike', 'fazer caminhada')|E] [hike_i] na [barony|lE] em que se encontrem ou uma vizinha"
