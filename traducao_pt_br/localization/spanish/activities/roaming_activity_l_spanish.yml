 activity_roaming_ok_terrain: "\n #P + [ROOT.Province.GetTerrain.GetNameNoTooltip]#! ([terrain|lE])"
 activity_roaming_empty_holding: "\n#P + Sem domínio#!"
 no_holding_roaming: "[ThisLocation.GetTerrain.GetNameNoTooltip] de [ThisLocation.GetNameNoTooltip]"
 no_holding_roaming_tooltip: "[ThisLocation.GetTerrain.GetNameNoTooltip] de [ThisLocation.GetName]"
 holding_roaming: "[ThisLocation.Custom('GetTerrainTypePlural')] ao redor de [ThisLocation.GetNameNoTooltip]"
 holding_roaming_tooltip: "[ThisLocation.Custom('GetTerrainTypePlural')] ao redor de [ThisLocation.GetName]"
 roaming_fame_reward_tt: "[perk|E] [GetPerk('roaming_perk').GetName( GetNullCharacter )|l]: você ganha #P [fame_value|0]#! de [prestige_experience|lE]"
 ### Events
 #Arrival Event
 roaming_intro_terrain_snippet_forest: "Árvores imponentes, com a luz do sol brincando sobre o solo musgoso, e o aroma fresco da natureza no ar."
 roaming_intro_terrain_snippet_forest_2: "Pássaros cantando nas copas das árvores altas, e animais se movendo pela vegetação rasteira."
 roaming_intro_terrain_snippet_forest_winter: "Uma paisagem tranquila onde as árvores permanecem como sentinelas estoicas, quebradas ocasionalmente pelo suave estalar da neve."
 roaming_intro_terrain_snippet_forest_winter_2: "Uma vasta extensão silenciosa, com o solo delicadamente coberto pela neve, e as árvores adornadas pela geada."
 roaming_intro_terrain_snippet_forest_monsoon: "O som rítmico da chuva pode ser ouvido ao nosso redor, gotas pesadas caindo das copas das árvores."
 roaming_intro_terrain_snippet_mountain: "Olho para as imponentes montanhas ao nosso redor, com seus picos elevados que parecem alcançar os céus."
 roaming_intro_terrain_snippet_mountain_2: "Uma vista deslumbrante se desenrola diante de nós, com animais e pessoas quase invisíveis à distância."
 roaming_intro_terrain_snippet_mountain_winter: "Os picos das montanhas estão cobertos por um manto de neve, e o clima é afiado e frio com o inverno."
 roaming_intro_terrain_snippet_mountain_monsoon: "Rios e pequenas cachoeiras caem pela montanha, transformando os vales abaixo em exuberantes refúgios de vida."
 roaming_intro_terrain_snippet_hills: "As colinas se estendem como um mar verde e marrom à nossa frente."
 roaming_intro_terrain_snippet_hills_2: "Consigo ver os pequenos picos das colinas, um após o outro, cada um deles um pequeno objetivo a ser conquistado nos próximos dias."
 roaming_intro_terrain_snippet_hills_winter: "As colinas estão adornadas por geada e neve delicada, estendendo-se pela distância."
 roaming_intro_terrain_snippet_hills_winter_2: "As colinas estão cobertas de branco pelo frio. Há um silêncio nessas colinas, quebrado apenas pelo ocasional estalar suave da neve sob meus pés."
 roaming_intro_terrain_snippet_hills_monsoon: "As chuvas esculpem pequenos riachos de água pelas encostas das colinas, passageiros, mas uma visão impressionante."
 roaming_intro_terrain_snippet_plains: "Um horizonte sem fim sob os vastos céus, com a grama ondulando formando um mar suave de verde."
 roaming_intro_terrain_snippet_plains_2: "Planícies infinitas, com um animal ocasional pastando suavemente à distância."
 roaming_intro_terrain_snippet_plains_winter: "Ventos cortantes e a neve cobrindo a terra, até onde a vista alcança."
 roaming_intro_terrain_snippet_plains_winter_2: "O silêncio tranquilo do inverno envolveu a terra, interrompido apenas por animais errantes em busca de alimento."
 roaming_intro_terrain_snippet_plains_monsoon: "Planícies enlameadas molhadas por chuvas intensas até onde os olhos podem ver."
 roaming_intro_terrain_snippet_farmlands: "Fileiras intermináveis de colheitas se estendem até onde os olhos podem ver, com camponeses ou servos trabalhando ao sol."
 roaming_intro_terrain_snippet_farmlands_2: "Os fazendeiros cuidam de seus campos enquanto os animais pastam tranquilamente em campos verdes."
 roaming_intro_terrain_snippet_farmlands_winter: "Campos vazios cobertos pelo frio e pela neve, sem camponeses ou animais à vista."
 roaming_intro_terrain_snippet_farmlands_winter_2: "Campos vazios cobertos de geada, e o frio é um lembrete da época do ano."
 roaming_intro_terrain_snippet_farmlands_monsoon: "Os campos explodem de vida durante as intensas chuvas, com os fazendeiros locais aproveitando ao máximo a situação."
 roaming_intro_terrain_snippet_desert: "Uma vasta extensão de areias douradas se estende infinitamente diante de mim, com o sol pendendo baixo no céu."
 roaming_intro_terrain_snippet_desert_2: "A vastidão dourada se desenrola em todas as direções, até onde os olhos podem ver, quieta e implacável."
 roaming_intro_terrain_snippet_desert_monsoon: "As areias cederam brevemente às intensas chuvas, e por um momento há vida a ser vista neste ambiente normalmente árido."
 roaming_intro_terrain_snippet_desert_mountains: "Picos escarpados se erguem contra o céu, como sentinelas silenciosas dessa terra árida."
 roaming_intro_terrain_snippet_desert_mountains_2: "Vais ocultas entre as gigantescas montanhas, com pequenas oases proporcionando um momento de alívio para os cansados viajantes."
 roaming_intro_terrain_snippet_desert_mountains_monsoon: "Rios de água abrem novos caminhos pelas encostas das montanhas durante a chuva, suavizando a paisagem por este breve momento."
 roaming_intro_terrain_snippet_oasis: "Palmeiras balançando suavemente ao redor de uma pequena oase, com um grupo de animais bebendo tranquilamente da água."
 roaming_intro_terrain_snippet_oasis_2: "A vegetação cerca as águas claras de uma pequena oase, oferecendo descanso para um grupo de viajantes."
 roaming_intro_terrain_snippet_oasis_monsoon: "A oase e seus arredores estão florescendo sob as intensas chuvas, com a vegetação se estendendo muito além dos limites usuais da própria oase."
 roaming_intro_terrain_snippet_wetlands: "Pântanos até onde os olhos podem ver, com um pequeno grupo de pessoas cuidadosamente utilizando os pequenos canais enquanto se movem pelo local."
 roaming_intro_terrain_snippet_wetlands_2: "A água reflete o céu, e as plantas aquáticas balançam lentamente ao vento. Há um zumbido constante de insetos e o balido de animais."
 roaming_intro_terrain_snippet_wetlands_monsoon: "O pântano se transformou, com o aumento do nível da água, quase impossível de se mover pela área. Enquanto pondero sobre como atravessar a paisagem, vejo um homem lentamente caminhando pela água, com o nível alcançando seu peito."
 roaming_intro_second_half_generic: "Finalmente, posso deixar todas aquelas lutas passadas para trás e apenas focar em encontrar um momento para relaxar — uma chance de deixar tudo de lado e realmente descansar."
 roaming_intro_second_half_winter: "Eu esperava que este fosse um momento de relaxamento longe do estresse da corte, mas... está mais frio do que eu imaginei."
 roaming_intro_second_half_monsoon: "Com a monção sobre nós, talvez este tenha sido um momento ruim para deixar para trás as dificuldades da nobreza. Eu meio que sinto falta de estar em um lugar fechado agora."
 bp3_roaming.0005.t: "Chegada"
 bp3_roaming.0005.desc: "Meu séquito e eu finalmente chegamos a [province.GetName] e, por um momento, fico impressionado com a vista. [province.Custom('RoamingIntroTerrainSnippet')]\n\n[province.Custom('RoamingIntroSecondHalf')]"
 bp3_roaming.0005.a: "Ah, finalmente, paz."
 bp3_roaming.0005.b: "Que vista!"
 bp3_roaming.0005.c: "Espero ter trazido roupas suficientes..."
 bp3_roaming.0005.d: "Que timing..."
 roaming_start_of_the_journey_key_title: "Início da Jornada"
 roaming_start_of_the_journey_key: "[root_scope.GetShortUIName|U] começa sua jornada através da [activity.GetCurrentPhase.GetLocation.Custom('HoldingNoHoldingTerrainRoaming')]."
 #Outro Event
 roaming_outro_snippet_stress_loss_weak: "Essas terras acalmaram minha mente cansada, embora de forma sutil. Um leve descanso dos tumultos da vida."
 roaming_outro_snippet_stress_loss_weak_2: "Neste refúgio, encontrei alguns momentos de alívio, aliviando meu espírito um pouco."
 roaming_outro_snippet_stress_loss_weak_3: "Este lugar ofereceu uma breve fuga das minhas responsabilidades. Foi um conforto modesto, mas ainda assim um conforto."
 roaming_outro_snippet_stress_loss_medium: "Sinto como se um peso tivesse sido tirado dos meus ombros."
 roaming_outro_snippet_stress_loss_medium_2: "Aqui, abraçado pela natureza e longe das pessoas, meus problemas parecem menos assustadores."
 roaming_outro_snippet_stress_loss_medium_3: "Sinto como se uma sensação de calma tivesse tomado conta de mim, e meus problemas habituais parecem uma sombra de seu antigo eu. Pelo menos por agora."
 roaming_outro_snippet_stress_loss_strong: "Sinto-me rejuvenescid[ROOT.Char.Custom('ES_OA')] como se tivesse tirado um pesado manto de preocupações e apreensões."
 roaming_outro_snippet_stress_loss_strong_2: "Deixo estas terras me sentindo profundamente renovado[ROOT.Char.Custom('ES_OA')] , com a mente clara e o coração mais leve."
 roaming_outro_snippet_stress_loss_strong_3: "O estresse, que antes parecia esmagador, agora parece distante, como nuvens escuras afastadas pelo sol."
 roaming_outro_snippet_stress_loss_very_strong: "Sozinho na natureza, encontrei clareza e um entendimento mais profundo do meu caminho."
 roaming_outro_snippet_stress_loss_very_strong_2: "O estresse derreteu, e sinto que encontrei um novo significado para a vida."
 roaming_outro_snippet_stress_loss_very_strong_3: "Neste lugar tranquilo, consegui deixar todas as minhas preocupações de lado e voltar como um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] novo[ROOT.Char.Custom('ES_OA')] e rejuvenescido[ROOT.Char.Custom('ES_OA')]."
 roaming_outro_snippet_returning_home: "Virando-me, com um pequeno suspiro para mim mesmo, começo o meu retorno."
 roaming_outro_snippet_returning_home_2: "Relutantemente, viro-me, deixo as memórias de lado e começo a seguir para casa, para as responsabilidades que certamente me aguardam."
 roaming_outro_snippet_returning_home_3: "Respiro fundo, saboreando os últimos momentos neste refúgio, antes de embarcar na jornada de volta."
 roaming_outro_snippet_returning_home_4: "Com um coração mais calmo do que esteve por um bom tempo, finalmente me despeço deste lugar, é hora de voltar para casa."
 bp3_roaming.0010.t: "Retorno para Casa"
 bp3_roaming.0010.desc: "Com um último passo, finalmente deixo o/a [province.Custom('HoldingNoHoldingTerrainRoaming')]. Olho para trás, uma última vez, relembrando minha jornada pelo/a [province.GetTerrain.GetNameNoTooltip|l]. [ROOT.Char.Custom('RoamingOutroStressLoss')]\n\n[ROOT.Char.Custom('RoamingOutroReturningHome')]"
 bp3_roaming.0010.a: "Ah, assim é a vida..."
 roaming_end_of_the_journey_key_title: "Fim da Jornada"
 roaming_end_of_the_journey_key: "[host.GetShortUIName|U] termina sua jornada através do [activity.GetCurrentPhase.GetLocation.Custom('HoldingNoHoldingTerrainRoaming')]."
 ### Mid-Activity Events
 bp3_roaming.0050.t: "A Vista de Tirar o Fôlego"
 bp3_roaming.0050.desc: "Seguimos subindo a encosta, lentamente, passo a passo. Foi um dia longo e sinto minhas coxas queimando. No momento, só tento me concentrar em colocar um pé à frente do outro, quando um dos meus guardas me ajuda nos últimos passos\n\nDe repente, nos encontramos em uma saliência, e consigo ver o vale se estendendo abaixo de nós, uma tapeçaria de verde e marrom. O cansaço e o esforço da jornada me fizeram esquecer completamente o quanto havíamos subido, mas agora... agora tudo vale a pena."
 bp3_roaming.0050.a: "Que visão para os olhos e pernas cansados."
 breathtaking_view_key_title: "$bp3_roaming.0050.t$"
 breathtaking_view_key: "[host.GetShortUIName] [Select_CString( host.IsLocalPlayer, 'alcançou', 'alcançou' )] o ponto mais alto de [province.GetName], o que lhe proporcionou uma vista magnífica e decidiu que era hora de voltar para casa."
 bp3_roaming.0060.t: "O Pequeno Oasis"
 bp3_roaming.0060.desc: "Depois de caminhar por horas por este ermo dourado, começamos a ver sinais de um oásis ao longe. No começo, temo que possa ser uma miragem, mas à medida que nos aproximamos, vemos animais pastando ao redor.\n\nEncontro um pequeno lugar à sombra, onde meus guardas e eu finalmente podemos descansar os pés. Um lugar para repousar, por enquanto. É o ponto perfeito para parar antes de começarmos a procurar um caminho de volta para casa."
 bp3_roaming.0060.a: "Que lugar bonito aqui no meio da natureza."
 the_oasis_key_title: "$bp3_roaming.0060.t$"
 the_oasis_key: "[host.GetShortUIName] se deparou com um pequeno oásis tranquilo em [province.GetName], onde descansou antes de começar a procurar o caminho de volta."
 bp3_roaming.0070.t: "O Fim do Caminho"
 bp3_roaming.0070.desc.intro: "Levamos horas seguindo um antigo caminho pela floresta até que ele começa a desvanecer e acaba desaparecendo por completo. Ao olhar ao redor, me encontro em uma pequena clareira, e não há nada aqui. Só... o silêncio da natureza.\n\n"
 bp3_roaming.0070.desc.landless: "Não sou estranho à vida nos ermos, mas, de alguma forma, agora parece que cruzamos a fronteira entre o reino humano e o desconhecido. É hora de deixar essa pequena clareira para trás e viajar de volta ao acampamento. Pergunto-me se algum dia a verei novamente."
 bp3_roaming.0070.desc.landed: "Estar aqui já parecia distante da minha vida em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTier], mas, de alguma forma, agora parece que cruzamos a fronteira entre o reino humano e o desconhecido. É hora de deixar essa pequena clareira para trás e começar a caminhada de volta para casa. Pergunto-me se algum dia a verei novamente."
 bp3_roaming.0070.a: "Que lugar curioso."
 paths_end_key_title: "$bp3_roaming.0070.t$"
 paths_end_key: "[host.GetShortUIName] encontrou um pequeno claro em uma floresta nas terras selvagens de [province.GetName], onde teve um momento de descanso antes de partir de volta para casa."
 bp3_roaming.0080.t: "O Cheiro do Oceano"
 bp3_roaming.0080.desc: "Muito antes de o vermos, ouvimos os gritos das gaivotas voando sobre nossas cabeças e notamos o cheiro salgado pairando no ar. Então, ele se abre à nossa frente; um vasto mar azul que se estende até onde a vista alcança. Sentamo-nos junto à água, observando as ondas chegarem suavemente.\n\nPor um momento, sinto como se pudesse deixar de lado todas as minhas preocupações. Um instante em que posso simplesmente aproveitar esta experiência. Sei que terei de voltar para casa em breve, mas, por enquanto, estou aqui."
 bp3_roaming.0080.a: "Que vida tranquila."
 ocean_scent_key_title: "$bp3_roaming.0080.t$"
 ocean_scent_key: "[host.GetShortUIName] levou seu grupo à costa em [province.GetName], onde descansaram antes de iniciar a longa jornada de volta para casa."
 bp3_roaming.0090.t: "O Rio no Fim da Jornada"
 bp3_roaming.0090.desc: "Já está ficando tarde quando finalmente chegamos a um riacho, sem ponte à vista. Olho o melhor que posso, mas não há nada para ser visto do outro lado. De certa forma, parece a fronteira entre os últimos vestígios da civilização e a natureza desconhecida do outro lado.\n\nTiro um momento para me sentar e descansar os pés. De vez em quando, sinto como se visse algo se movendo do outro lado da água, ou como se alguém estivesse me observando, mas não consigo distinguir nada."
 bp3_roaming.0090.a: "Um bom ponto de parada, acho."
 river_journeys_end_key_title: "$bp3_roaming.0090.t$"
 river_journeys_end_key: "[host.GetShortUIName] se deparou com um rio intransponível no interior de [province.GetName], onde parou para descansar antes de iniciar a viagem de volta para casa."
 ### Random Events
 bp3_roaming.0100.t: "Encontrando um Estranho"
 bp3_roaming.0100.desc: "Enquanto vagueio pelo(a) [activity.GetCurrentPhase.GetLocation.Custom('GetTerrainType')], encontro um[ancient_traveler.Custom('ES_XA')] anciã[ancient_traveler.Custom('ES_OA')] sentad[ancient_traveler.Custom('ES_OA')] sobre uma rocha desgastada à beira do caminho. Passam-se momentos em silêncio, pois est[ancient_traveler.Custom('ES_EA')] [ancient_traveler.GetWomanMan] parece estar profundamente absort[ancient_traveler.Custom('ES_OA')] em seus pensamentos antes de notar minha presença.\n\nCom um leve aceno de cabeça, ergue-se — cada movimento acompanhado pelo estalar dos ossos — e parte rumo ao desconhecido."
 bp3_roaming.0100.desc.companion: "\n\n[special_guest.GetFirstName] se senta na rocha desgastada e solta um suspiro de alívio; está mais interessado em fazer uma pausa do que em conversar com est[ancient_traveler.Custom('ES_EA')] [ancient_traveler.GetWomanMan]."
 bp3_roaming.0100.a: "Em que será que ele/ela estava pensando aqui, no meio da natureza?"
 bp3_roaming.0100.a.flavor: "Parece um lugar fantástico para pensar, afinal."
 bp3_roaming.0100.b: "Finalmente, uma chance de sentar e descansar."
 bp3_roaming.0100.c: "Espere, ancian[ancient_traveler.Custom('ES_OA')]!"
 bp3_roaming.0100.c.flavor: "Talvez ele/ela tenha alguma sabedoria para compartilhar?"
 bp3_roaming.0100.c.win: "Tenho uma conversa frutífera com [ancient_traveler.GetNameNoTooltip]"
 bp3_roaming.0100.c.neutral: "Convenco [ancient_traveler.GetNameNoTooltip] a se juntar à minha corte"
 bp3_roaming.0100.c.loss: "[ancient_traveler.GetNameNoTooltip] não tem interesse em conversar"
 bp3_roaming.0100.d: "\"E quando desviei o olhar por um instante, simplesmente desapareceu…\""
 roaming_pondering_stone_mystic_key_title: "Revelações"
 roaming_pondering_stone_mystic_key: "[host.GetShortUIName] teve várias revelações enquanto estava sentado[host.Custom('ES_OA')] em [activity.GetCurrentPhase.GetLocation.Custom('HoldingNoHoldingTerrainRoaming')]."
 roaming_pondering_stone_key_title: "A Pedra da Reflexão"
 roaming_pondering_stone_key: "[host.GetShortUIName|U] encontrou uma pedra gasta no/a [activity.GetCurrentPhase.GetLocation.Custom('HoldingNoHoldingTerrainRoaming')] onde se sentou a refletir sobre sua vida."
 roaming_resting_stone_key_title: "A Pedra do Descanso"
 roaming_resting_stone_key: "[host.GetShortUIName|U] encontrou uma rocha silenciosa e desgastada para descansar na [activity.GetCurrentPhase.GetLocation.Custom('HoldingNoHoldingTerrainRoaming')]."
 roaming_old_man_key_title: "Viajante Ancião"
 roaming_old_man_key: "No [activity.GetCurrentPhase.GetLocation.Custom('HoldingNoHoldingTerrainRoaming')] [host.GetShortUIName] encontrou um[ancient_traveler.Custom('ES_XA')] anciã[ancient_traveler.Custom('ES_OA')] enrugad[ancient_traveler.Custom('ES_OA')]."
 roaming_ancient_traveler_poet_key_title: "Viajante Místico"
 roaming_ancient_traveler_poet_key: "No [activity.GetCurrentPhase.GetLocation.Custom('HoldingNoHoldingTerrainRoaming')], [host.GetShortUIName] encontrou um[ancient_traveler.Custom('ES_XA')] místic[ancient_traveler.Custom('ES_OA')]."
 pondering_rulership_modifier: "Refletindo sobre a Liderança"
 pondering_rulership_modifier_desc: "Este personagem passou um tempo considerável refletindo sobre o peso da liderança."
 pondering_religion_modifier: "Refletindo sobre Religião"
 pondering_religion_modifier_desc: "Este personagem passou um tempo considerável refletindo sobre o impacto da religião em sua vida."
 pondering_war_modifier: "Refletindo sobre a Guerra"
 pondering_war_modifier_desc: "Este personagem passou um tempo considerável refletindo sobre a guerra e a estratégia."
 pondering_schemes_modifier: "Refletindo sobre Conspirações"
 pondering_schemes_modifier_desc: "Este personagem passou um tempo considerável refletindo sobre conspirações e quem pode estar planejando armá-lo."
 pondering_management_modifier: "Refletindo sobre Gestão"
 pondering_management_modifier_desc: "Este personagem passou um tempo considerável refletindo sobre como pode melhorar seu reino."
 pondering_travel_modifier: "Refletindo sobre a Viagem"
 pondering_travel_modifier_desc: "Este personagem passou um tempo considerável refletindo sobre suas jornadas."
 bp3_roaming.0110.t: "[sighting_province.GetTitle.GetDeJureLiege.Custom('GetAnimalType')|U] em [sighting_province.GetNameNoTooltip]"
 bp3_roaming.0110.desc: "À medida que o tempo vai piorando, de repente vislumbro algo enorme surgindo da vegetação à minha frente. Um exemplar surpreendentemente grande de [sighting_province.GetTitle.GetDeJureLiege.Custom('GetAnimalType')] para a frente de mim e seu olhar cruza com o meu ao notar minha presença.\n\nBasta um instante até que o animal salte de repente de volta para a floresta."
 bp3_roaming.0110.desc.companion: "Ao meu lado, ouço [special_guest.GetFirstName] soltar um suspiro de alívio."
 bp3_roaming.0110.a: "Talvez seja hora de preparar uma caça."
 bp3_roaming.0110.b.weakling: "Ufa! Fiquei preocupado por um segundo."
 bp3_roaming.0110.b.hunter: "Que coisa curiosa!"
 bp3_roaming.0110.c: "\"Após uma luta feroz, a enorme besta virou-se e fugiu...\""
 roaming_animal_sighting_key_title: "Avistamento de Animal"
 roaming_animal_sighting_key: "[host.GetShortUIName] [Select_CString( host.IsLocalPlayer, 'encontrou', 'encontrou' )] um animal selvagem quando percorria o/a [activity.GetCurrentPhase.GetLocation.Custom('HoldingNoHoldingTerrainRoaming')|l]."
 roaming_animal_sighting_poet_key_title: "$roaming_animal_sighting_key_title$"
 roaming_animal_sighting_poet_key: "[host.GetShortUIName] [Select_CString( host.IsLocalPlayer, 'lutou', 'lutou' )] contra um animal selvagem no/a [activity.GetCurrentPhase.GetLocation.Custom('HoldingNoHoldingTerrainRoaming')]."
 bp3_roaming.0120.t: "Um [sighting_province.GetTitle.GetDeJureLiege.Custom('GetAnimalType')|U] das Lendas"
 bp3_roaming.0120.desc: "Enquanto avanço suportando o mau tempo, de repente vejo algo se mover na periferia da visão. Por um segundo, a visão se clareia e vejo um exemplar de [sighting_province.GetTitle.GetDeJureLiege.Custom('GetAnimalType')] de pelagem [sighting_province.GetTitle.GetDeJureLiege.Custom('GetLegendaryColor')] que me encara de volta.\n\nMinha mente corre para se lembrar das poucas histórias que ouvi sobre esse animal mítico e enigmático, agora que ele está bem à minha frente, mas desaparece entre a [activity.GetCurrentPhase.GetLocation.Custom('RoamingLegendaryBeastProvinceWeather')], tão rápido quanto apareceu."
 bp3_roaming.0120.desc.companion: "$bp3_roaming.0110.desc.companion$"
 bp3_roaming.0120.a: "Deve ser meu!"
 bp3_roaming.0120.b: "Que visão!"
 bp3_roaming.0120.c: "\"Então a enorme besta veio em minha direção...\""
 roaming_legendary_sighting_key_title: "Avistamento Lendário"
 roaming_legendary_sighting_key: "[host.GetShortUIName] [Select_CString( host.IsLocalPlayer, 'cruzou', 'cruzou' )] com um animal lendário ao viajar por [activity.GetCurrentPhase.GetLocation.Custom('HoldingNoHoldingTerrainRoaming')]."
 roaming_legendary_sighting_poet_key_title: "$roaming_legendary_sighting_key_title$"
 roaming_legendary_sighting_poet_key: "[host.GetShortUIName] foi atacado por um animal lendário na [activity.GetCurrentPhase.GetLocation.Custom('HoldingNoHoldingTerrainRoaming')]."
 LegendaryBeastProvinceWeatherSnow: "neve"
 LegendaryBeastProvinceWeatherRain: "chuva"
 LegendaryBeastProvinceWeatherFog: "nevoeiro"
 bp3_roaming.0130.t: "Um Campo de Batalha Esquecido"
 bp3_roaming.0130.desc: "Ouço os pássaros necrófagos ao longe muito antes de vê-lo com meus próprios olhos. Um pequeno campo de batalha tomado por cadáveres, claramente deixados apodrecer por algum tempo.\n\nOs pássaros, com os bicos ensanguentados, de vez em quando erguem o olhar de sua refeição quando passo por ali."
 bp3_roaming.0130.desc.companion: "[special_guest.GetFirstName] sente náuseas ao ver o espetáculo e sai da área."
 bp3_roaming.0130.a: "Deveria oferecer uma pequena oração pelos mortos."
 bp3_roaming.0130.b: "Vamos ver se consigo encontrar algo valioso."
 bp3_roaming.0130.c: "\"E então vi os mortos se erguerem do chão...\""
 roaming_battlefield_prayer_key_title: "Campo de Batalha Esquecido"
 roaming_battlefield_prayer_key: "Em [activity.GetCurrentPhase.GetLocation.GetNameNoTooltip], [host.GetShortUIName] encontrou um campo de batalha esquecido, onde fez uma breve oração pelos mortos."
 roaming_battlefield_scavenging_key_title: "$roaming_battlefield_prayer_key_title$"
 roaming_battlefield_scavenging_key: "Em [activity.GetCurrentPhase.GetLocation.GetNameNoTooltip], [host.GetShortUIName] encontrou um campo de batalha esquecido e se deteve por um momento para vasculhar em busca de objetos valiosos."
 roaming_battlefield_poet_key_title: "$roaming_battlefield_prayer_key_title$"
 roaming_battlefield_poet_key: "Em [activity.GetCurrentPhase.GetLocation.GetNameNoTooltip], [host.GetShortUIName] encontrou um campo de batalha esquecido, onde afirma ter visto os mortos se levantarem."
 bp3_roaming.0140.t: "Uma Noite nas Terras Selvagens"
 bp3_roaming.0140.desc: "Uma escuridão silenciosa envolve o acampamento quando nos preparamos para dormir. Há um guarda de vigia, mas não há descanso a ser encontrado. Os sons das criaturas chilreando, rastejando e se agitando na escuridão rompem o silêncio.\n\nLá no alto, o céu noturno é uma tapeçaria infinita de pequenas luzes. Por um momento, tento simplesmente afastar o ruído de fundo, enquanto me concentro nessa visão."
 bp3_roaming.0140.desc.companion: "\n\nEnquanto faço isso, ouço [special_guest.GetFirstName] roncando baixinho por perto. Não parece que mais alguém esteja com dificuldade para descansar..."
 bp3_roaming.0140.a: "Não pense nisso, apenas feche os olhos e reze."
 bp3_roaming.0140.b: "\"Guardas! Vasculhem as florestas em busca de qualquer besta; mítica ou comum!\""
 bp3_roaming.0140.b.1: "Você passa a noite toda procurando por ameaças."
 bp3_roaming.0140.b.2: "Você espanta qualquer coisa que estivesse por aí."
 bp3_roaming.0140.b.3: "Você adormece[ROOT.Char.Custom('ES_OA')] esperando que os guardas façam seu trabalho"
 bp3_roaming.0140.c: "\"Eu vi pequenas criaturas não-humanas dançando na borda da luz...\""
 bp3_roaming.0140.d: "Um momento perfeito para pensar."
 roaming_night_scare_key_title: "Noite nas Terras Selvagens"
 roaming_night_scare_key: "[host.GetShortUIName] passou a noite inteira em [activity.GetCurrentPhase.GetLocation.GetNameNoTooltip] assustad[host.Custom('ES_OA')] pelos sons da noite."
 roaming_night_threat_key_title: "$roaming_night_scare_key_title$"
 roaming_night_threat_key: "[host.GetShortUIName] passou a noite inteira em [activity.GetCurrentPhase.GetLocation.GetNameNoTooltip] procurando por ameaças imaginárias."
 roaming_night_sleep_key_title: "$roaming_night_scare_key_title$"
 roaming_night_sleep_key: "[host.GetShortUIName] passou uma boa noite de descanso após espantar as criaturas que [host.GetHerHim] incomodavam em [activity.GetCurrentPhase.GetLocation.GetNameNoTooltip]."
 roaming_night_poet_key_title: "$roaming_night_scare_key_title$"
 roaming_night_poet_key: "Acredita-se que passou a noite inteira vigiando as bestas inumanas que dançavam ao redor do seu acampamento."
 roaming_night_mystic_key_title: "O Céu Noturno"
 roaming_night_mystic_key: "[host.GetShortUIName] passou a noite inteira observando o céu noturno e refletindo sobre a vida."
 bp3_roaming.0150.t: "Um Lago Tranquilo"
 bp3_roaming.0150.desc: "Depois de um longo dia caminhando pelo(a) [activity.GetCurrentPhase.GetLocation.Custom('HoldingNoHoldingTerrainRoaming')], de repente encontro um lago tranquilo no meio da natureza selvagem. Além de alguns passarinhos silenciosos bebendo água, não se vê um único homem nem animal.\n\n"
 bp3_roaming.0150.desc.no_companion: "Sento-me à beira d'água, descanso os pés e dou um profundo suspiro."
 bp3_roaming.0150.desc.companion: "Nos sentamos junto à água, descansamos os pés e ouço a [special_guest.GetFirstName] suspirar com força."
 bp3_roaming.0150.a: "Ah, um momento para descansar."
 bp3_roaming.0150.b: "\"Eu parti quando ouvi uma melodia encantadora ecoar através da água...\""
 roaming_quiet_pond_key_title: "O Lago Tranquilo"
 roaming_quiet_pond_key: "[host.GetShortUIName] encontrou uma poça tranquila nas terras selvagens de [activity.GetCurrentPhase.GetLocation.GetNameNoTooltip], onde encontrou descanso."
 roaming_quiet_pond_poet_key_title: "$roaming_quiet_pond_key_title$"
 roaming_quiet_pond_poet_key: "[host.GetShortUIName] encontrou um lago tranquilo, mas supostamente fugiu quando uma melodia encantadora [host.GetHerHim] o incitou a se familiarizar mais intimamente com as profundezas da água…"
 bp3_roaming.0160.t: "A Fazenda Ardente"
 bp3_roaming.0160.desc: "Muito antes de ela entrar no campo de visão, sinto o cheiro de madeira e carne queimadas. Quando chegamos, tudo o que consigo ver é a carcaça fumegante do que um dia deve ter sido uma enorme fazenda.\n\n"
 bp3_roaming.0160.desc.no_companion: "Meus guardas levam apenas um momento para apontar que não há mais ninguém ou nada para salvar aqui."
 bp3_roaming.0160.desc.companion: "Ouço a [special_guest.GetFirstName] falando com meus guardas; não há mais ninguém nem nada para salvar aqui."
 bp3_roaming.0160.desc.outro: "O que resta são apenas as cinzas de um lar e daqueles que viviam nele."
 bp3_roaming.0160.a: "Encontre os restos e dê-lhes o descanso adequado."
 bp3_roaming.0160.b: "Guardas, limpem o local."
 bp3_roaming.0160.c: "\"Tentamos várias vezes invadir o edifício em chamas, mas sem sucesso...\""
 roaming_burning_farm_piety_key_title: "A Fazenda Ardente"
 roaming_burning_farm_piety_key: "Em suas viagens, [host.GetShortUIName] encontrou uma fazenda ardente. [host.GetSheHe] e seus guardas deram descanso aos restos antes de partir."
 roaming_burning_farm_greedy_key_title: "$roaming_burning_farm_piety_key_title$"
 roaming_burning_farm_greedy_key: "Em suas viagens, [host.GetShortUIName] encontrou uma fazenda ardente. [host.GetSheHe] e seus guardas limparam o local antes de partir."
 roaming_burning_farm_poet_key_title: "$roaming_burning_farm_piety_key_title$"
 roaming_burning_farm_poet_key: "Durante suas viagens, [host.GetShortUIName] encontrou uma fazenda em chamas. Supostamente tentou o seu melhor para ajudar os que viviam ali, mas sem sucesso."
 bp3_roaming.0170.t: "Um Dia Tranquilo"
 bp3_roaming.0170.desc: "Apesar de minhas muitas expectativas, o dia se desenrolou de maneira extremamente tranquila e serena. No começo, eu me animava com cada som e visão. Contudo, com o passar do tempo, nada pareceu especialmente memorável, e minha atenção começou a diminuir.\n\n"
 bp3_roaming.0170.desc.no_companion: "Gradualmente, porém, começo a apreciar a simplicidade da caminhada em si. Torna-se um momento apenas para mim e meus pensamentos."
 bp3_roaming.0170.desc.companion: "No entanto, pouco a pouco, vejo-me apreciando o tempo que passo com [special_guest.GetFirstName]. Não surge nada de importância, mas ainda assim é agradável."
 bp3_roaming.0170.a: "Talvez isso seja exatamente o que eu precisava."
 roaming_quiet_day_key_title: "Um Dia Tranquilo"
 roaming_quiet_day_key: "[host.GetShortUIName|U] teve um dia estranhamente tranquilo enquanto passava por [activity.GetCurrentPhase.GetLocation.GetNameNoTooltip]."
 bp3_roaming.0180.t: "Murmúrios Cansados"
 bp3_roaming.0180.desc: "Estou gostando bastante do nosso passeio por [ROOT.Char.GetCurrentLocation.GetName], mas, para meu pesar, o mesmo não pode ser dito do meu companhei[special_guest.Custom('ES_OA')] de viagem. [special_guest.GetFirstName] começou a ficar muito para trás, e às vezes ouço palavrões vindo de \n\nEstou bastante segur[ROOT.Char.Custom('ES_OA')] de que ainda estamos bem longe do nosso objetivo e que ainda resta uma caminhada considerável até chegarmos lá."
 bp3_roaming.0180.a: "Não se preocupe, é logo ali!"
 bp3_roaming.0180.a_short: "Você continua!"
 bp3_roaming.0180.b: "Talvez seja hora de uma pausa..."
 roaming_tired_mutterings_lies_key_title: "Murmúrios Cansados"
 roaming_tired_mutterings_lies_key: "Apesar das queixas cansadas de [special_guest.GetShortUIName|U], [host.GetShortUIName|U] se recusou a ouvir."
 roaming_tired_mutterings_break_key_title: "Murmúrios Cansados"
 roaming_tired_mutterings_break_key: "Após os murmúrios e queixas cansadas de [special_guest.GetShortUIName|U], [host.GetShortUIName|U] decidiu fazer uma pausa."
 roaming_tired_mutterings_athletic_key_title: "Uma Longa Caminhada"
 roaming_tired_mutterings_athletic_key: "[host.GetShortUIName|U] passou um tempo considerável atravessando [activity.GetCurrentPhase.GetLocation.GetNameNoTooltip], ganhando resistência e encontrando prazer na atividade."
 bp3_roaming.0190.t: "Uma Chance para Conversar"
 bp3_roaming.0190.desc: "Enquanto percorremos as terras selvagens ao redor de [ROOT.Char.GetCurrentLocation.GetName], [special_guest.GetFirstName] e eu temos bastante tempo para conversar. Eu esperava que aproveitássemos bem esse tempo [Select_CString(And(ROOT.Char.IsFemale, special_guest.IsFemale), 'juntas', 'juntos')], mas me surpreende o quão bem tudo está indo.\n\n[special_guest.GetFirstName] traz uma variedade de assuntos interessantes, seja sobre pessoas específicas em [ROOT.Char.GetCurrentLocation.GetName], fofocas locais ou histórias memoráveis. As horas passam sem que eu perceba, e parecem apenas um instante."
 bp3_roaming.0190.a: "Não acredito que [random_courtier.GetFirstNameNoTooltip] disse isso! Isso é hilário!"
 roaming_chance_to_talk_key_title: "Uma Chance para Conversar"
 roaming_chance_to_talk_key: "[special_guest.GetShortUIName|U] e [host.GetShortUIName|U] aproveitaram o tempo conversando enquanto atravessavam [activity.GetCurrentPhase.GetLocation.GetName]."
 bp3_roaming.0200.t: "A Tela no Céu"
 bp3_roaming.0200.desc: "Já se passaram várias horas desde o pôr do sol quando, de repente, os céus assumem os mais belos tons de roxo, azul e laranja. É como se [ROOT.Char.GetFaith.HighGodName] em pessoa usasse os céus como tela.\n\nEm admiração e temor, todos nós observamos o espetáculo se desenrolar em silêncio. Só depois que ele termina é que todos começam a falar da visão, tanto com reverência quanto com medo."
 bp3_roaming.0200.a: "Que visão!"
 roaming_nightsky_canvas_key_title: "A Tela no Céu"
 roaming_nightsky_canvas_key: "[host.GetShortUIName|U] observou um impressionante fenômeno astronômico se desenrolar nos céus sobre [activity.GetCurrentPhase.GetLocation.GetName]."
 bp3_roaming.0210.t: "Os Pássaros Acima"
 bp3_roaming.0210.desc: "Enquanto viajamos por [province.GetName] , há duas aves nos seguindo há horas. Elas apenas circulam lentamente ao nosso redor, pousam longe demais para estarem em perigo e nos chamam de longe. Quando se aproximam por um instante, vejo suas plumas pretas e brancas.\n\nDepois de um tempo, elas dão outra volta e então voam embora. Mesmo depois de partirem, ainda podemos ouvir seu canto à distância."
 bp3_roaming.0210.a: "Bem, um para tristeza, dois para sorte."
 the_birds_overhead_key_title: "$bp3_roaming.0210.t$"
 the_birds_overhead_key: "[host.GetShortUIName] viu como um par de aves [host.GetHerHim] seguiam por [province.GetName] e cantavam para o grupo à distância."
 bp3_roaming.0220.t: "A Vila Esquecida"
 bp3_roaming.0220.desc: "#emp Há uma vila aqui?!#!, me pego dizendo, muito confus[ROOT.Char.Custom('ES_OA')].\n\nNão estava em nenhum mapa e absolutamente ninguém havia mencionado nada a respeito. E, ainda assim, aqui está. Quando pergunto como a vila se chama, as pessoas simplesmente dizem: A vila? É a vila, com um forte sotaque que jamais tinha ouvido antes.\n\nQuem são essas pessoas?! Por que eu nunca tinha ouvido falar delas antes?"
 bp3_roaming.0220.a: "Espera, elas não me devem muitos impostos?"
 bp3_roaming.0220.a.landless: "Vamos ver o que eles têm por aqui..."
 bp3_roaming.0220.b: "Eu preciso aprender tudo sobre essas pessoas!"
 bp3_roaming.0220.b.mystic: "Aprendido com o Místico da Vila"
 bp3_roaming.0220.c: "Que curioso! Isso vai ser uma boa história."
 roaming_forgotten_village_modifier: "$bp3_roaming.0220.t$"
 roaming_forgotten_village_modifier_desc: "Uma vila esquecida na área recentemente se reconectou com muitos de seus vizinhos, compartilhando seus conhecimentos e tradições."
 the_forgotten_village_key_title: "$bp3_roaming.0220.t$"
 the_forgotten_village_key: "[host.GetShortUIName] encontrou uma antiga vila esquecida enquanto viajava pelas terras distantes de [province.GetName]."
 the_forgotten_village_mystic_key_title: "O Místico da Vila"
 the_forgotten_village_mystic_key: "[host.GetShortUIName] aprendeu as tradições de um místico da vila em [province.GetName]."
 bp3_roaming.0230.t: "O Eremita [Select_CString( hermit_character.IsFemale, 'La ermitaña', 'El ermitaño' )]"
 bp3_roaming.0230.desc: "Ao atravessarmos o interior de [province.GetName] meus guardas e eu nos deparamos de repente com [Select_CString( hermit_character.IsFemale, 'uma mulher', 'um homem' )] com roupas sujas sentad[hermit_character.Custom('ES_OA')] em solidão. Assim que percebe que nos aproximamos, exclama em voz alta: \"São a nova prova que me envia [hermit_character.GetFaith.HighGodName]?!\".\n\n\"Como é que é?\", consigo dizer, confus[ROOT.Char.Custom('ES_OA')] e um pouco ofendid[ROOT.Char.Custom('ES_OA')].\n\n\"Venha, eu lhes contarei tudo sobre as provações e lamentações de [hermit_character.GetName] [Select_CString( hermit_character.IsFemale, 'a Sábia', 'o Sábio' )]…\"."
 bp3_roaming.0230.a: "Você tem umas ideias curiosas, [hermit_character.GetNameNoTooltip]."
 bp3_roaming.0230.a.hermit: "Falou com o ermitão[hermit_character.Custom('ES_OA')]"
 bp3_roaming.0230.b: "#emp Conte-me mais...#!"
 bp3_roaming.0230.b.tooltip: "Você se converte secretamente para [hermit_faith.GetName|l]"
 bp3_roaming.0230.c: "O que vocês disseram sobre [ROOT.Char.GetFaith.HighGodName|U]? Inaceitável! Não vou tolerar isso, seu herege!"
 the_hermit_key_title: "O Eremita [Select_CString( hermit_character.IsFemale, 'La ermitaña', 'El ermitaño' )]"
 the_hermit_key: "[host.GetShortUIName] encontrou [Select_CString( hermit_character.IsFemale, 'uma eremita curiosa', 'um eremita curioso' )] na natureza."
 the_hermit_learning_key_title: "Ensinos do Eremita"
 the_hermit_learning_key: "[host.GetShortUIName] falou longamente com [Select_CString( hermit_character.IsFemale, 'uma eremita', 'um eremita' )] no interior de [province.GetName]."
 roaming_the_hermit_modifier: "Ideias Inconvencionais"
 roaming_the_hermit_modifier_desc: "Este personagem frequentemente compartilha ideias e pensamentos não convencionais sobre religião."
 bp3_roaming.0240.t: "Uma Noite para Lembrar"
 bp3_roaming.0240.desc: "Enquanto nos acomodamos para passar a noite, vemos o céu inteiro iluminado por estrelas. É uma das noites mais límpidas que tivemos desde que saímos de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTier].\n\nEstá tudo em silêncio, não se ouve nenhum som, nem de pessoas nem de animais. É como se [province.GetTerrain.GetNameNoTooltip|l] por completo prendesse a respiração enquanto contemplamos o céu noturno. Eu deveria ir para a cama e descansar até a manhã, mas... Talvez eu possa ficar acordad[ROOT.Char.Custom('ES_OA')] mais uma ou duas horas."
 bp3_roaming.0240.a: "Vou lembrar disso por toda a minha vida."
 a_night_to_remember_key_title: "Uma Noite para Lembrar"
 a_night_to_remember_key: "[host.GetShortUIName] passou quase toda a noite acordad[ROOT.Char.Custom('ES_OA')] contemplando o céu noturno estrelado."
 bp3_roaming.0250.t: "Uma Pequena Sepultura"
 bp3_roaming.0250.desc: "Enquanto percorremos o/a [province.Custom('HoldingNoHoldingTerrainRoaming')|l], encontramos o que parece ser uma pequena tumba. Ela tem [province.Custom('RoamingGraveVariants')]. Não há nada que indique por que essa tumba está aqui, tão longe da civilização.\n\nApesar da localização remota, muito esforço foi dedicado para deixar a área bonita. Considerando a situação, eu deveria…"
 bp3_roaming.0250.a: "Fazer algumas orações."
 bp3_roaming.0250.b: "Desenterrar qualquer valioso que tenha sido escondido na sepultura."
 roaming_grave_variant_cross: "uma pequena e bela cruz erguida do solo"
 roaming_grave_variant_burial_mound: "um pequeno montículo de sepultura com várias pedras cuidadosamente colocadas no topo"
 roaming_grave_variant_stone: "uma pequena pedra, com um nome gravado nela"
 no_treasure: "Sem Tesouro"
 small_treasure: "Pequeno Tesouro"
 medium_treasure: "Médio Tesouro"
 large_treasure: "Grande Tesouro"
 bp3_roaming.0250.artifact: "Você desenterra um [artifact|lE]"
 a_small_grave_key_title: "Uma Pequena Sepultura"
 a_small_grave_key: "[host.GetShortUIName] encontrou uma pequena sepultura nas terras selvagens de [province.GetName]."
 #APAs
 roaming_fame_very_small_tt: "[perk|E] [GetPerk('roaming_perk').GetName( GetNullCharacter )|l]: #EMP Isso vai render uma boa história#!."
 roaming_fame_small_tt: "[perk|E] [GetPerk('roaming_perk').GetName( GetNullCharacter )|l]: #EMP Vai render uma boa história!#!."
 roaming_fame_medium_tt: "[perk|E] [GetPerk('roaming_perk').GetName( GetNullCharacter )|l]: #EMP Isso renderá uma história memorável!#!."
