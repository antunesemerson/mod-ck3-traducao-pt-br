 ### PHASES
 imperial_examination_phase_assembly: "Reunião"
 imperial_examination_phase_assembly_desc: "Procurando por toda parte, todos os candidatos elegíveis estão se dirigindo às salas de exame."
 imperial_examination_phase_preparation: "Preparação"
 imperial_examination_phase_preparation_desc: "Os candidatos, assim como o anfitrião, aguardam sua vez, apressando-se para fazer os preparativos possíveis para os exames."
 imperial_examination_phase_examination: "Exame metropolitano"
 imperial_examination_phase_examination_desc: "Começa o exame metropolitano. Que seja o que tiver de ser."
 imperial_examination_phase_palace_examination: "Exame do Palácio"
 imperial_examination_phase_palace_examination_desc: "A avaliação do palácio começa. É aqui que os estudiosos de maior destaque provam seu valor diante do Imperador."
 ### OPTIONS
 #Examination Focus [Special Type] Option
 imperial_examination_focus: "Foco de exame"
 imperial_examination_focus_martial: "Estrategistas militares"
 imperial_examination_focus_martial_desc: "Os exames serão mais meritórios para os candidatos que se destacarem em [martial|lE].\n\n#weak \"A estratégia militar é uma virtude como qualquer outro conhecimento.\"#!"
 imperial_examination_focus_stewardship: "Governança eficiente"
 imperial_examination_focus_stewardship_desc: "Os exames serão mais meritórios para os candidatos que se destacarem em [stewardship|lE].\n\n#weak \"Há uma diferença clara entre quem ganha a vida falando e as pessoas realmente úteis.\"#!"
 imperial_examination_focus_learning: "Estudiosos perspicazes"
 imperial_examination_focus_learning_desc: "Os exames serão mais meritórios para os candidatos que se destaquem em [learning|lE].\n\n#weak \"É um prazer aprender e dar bom uso a esse conhecimento.\"#!"
 #Examination Breadth Option
 imperial_examination_breadth: "Amplitude do exame"
 imperial_examination_breadth_exclusive: "Convocação exclusiva"
 imperial_examination_breadth_exclusive_desc: "$EFFECT_LIST_BULLET$ A atividade está aberta apenas a um seleto grupo, excluindo membros do público em geral\n$EFFECT_LIST_BULLET$ Você receberá #EMP menos#! [merit|lE] ao concluir\n\n#weak Deixarei que os filhos mais distintos dos meus súditos sirvam em #EMP mi#! meu senhorio.#!"
 imperial_examination_breadth_restricted: "Convocação restrita"
 imperial_examination_breadth_restricted_desc: "$EFFECT_LIST_BULLET$O número de candidatos é limitado a uma multidão modesta, permitindo alguns membros do público em geral. \n\n#weak Los potenciales gobernadores pueden surgir de las raíces más humildes.#!"
 imperial_examination_breadth_open: "Convocação aberta"
 imperial_examination_breadth_open_desc: "$EFFECT_LIST_BULLET$ A atividade é realizada em grande escala, atraindo muitos candidatos ansiosos\n $EFFECT_LIST_BULLET$ Você ganhará #EMP más#! [legitimacy|lE] ao concluir\n\n #weak A sabedoria pode vir de todas as áreas. Vamos lançar uma rede ampla e ver quem se destacará na ocasião."
 #Passing Grade Option
 imperial_examination_passing_grade: "Nota de aprovação do exame"
 imperial_examination_passing_grade_extreme: "Nota máxima"
 imperial_examination_passing_grade_extreme_desc: "$EFFECT_LIST_BULLET$ A nota mínima de aprovação dos exames é muito alta, eliminando #EMP un montón#! de candidatos\n$EFFECT_LIST_BULLET$Você ganhará #EMP mucha más#! [legitimacy|lE] ao concluir os exames\n\n#weak Somente os melhores dos melhores terão aprovação e se tornarão em #EMP mis#! próximos funcionários do governo.#!"
 imperial_examination_passing_grade_high: "Nota alta"
 imperial_examination_passing_grade_high_desc: "$EFFECT_LIST_BULLET$ A nota de aprovação no exame é normal, o que eliminará a quantidade esperada de candidatos\n$EFFECT_LIST_BULLET$ As recompensas de [legitimacy|lE] não são afetadas\n\n#weak Meus critérios são altos, mas razoáveis. Se queremos funcionários governamentais nomeados por mérito, terão que alcançar certo nível de excelência.#!"
 imperial_examination_passing_grade_mediocre: "Nota mediana"
 imperial_examination_passing_grade_mediocre_desc: "$EFFECT_LIST_BULLET$ A nota mínima de aprovação nos exames é um pouco mais branda e elimina uma quantidade #EMP más pequeña#! menor de candidatos\n$EFFECT_LIST_BULLET$ Você ganhará #EMP menos#! [legitimacy|lE] ao concluir o exame\n\n#weak Quién decide que los examinandos con inicios modestos no pueden aprender en el trabajo. Mientras tengan cimientos sólidos, yo digo que los aprobemos.#!"
 imperial_examination_passing_grade_low: "Nota baixa"
 imperial_examination_passing_grade_low_desc: "$EFFECT_LIST_BULLET$ A nota de aprovação do exame é muito branda, eliminando uma quantidade #EMP mínima#! de examinandos\n $EFFECT_LIST_BULLET$ Você ganhará #EMP mucha menos#! [legitimacy|lE] ao concluir o exame\n\n #weak Precisamos de funcionários meritórios #EMP ya#!. Eu faço as regras e determino os padrões; eles obedecem. Tal é meu mandato.#!"
 #Conclusion
 activity_imperial_examination_conclusion_desc: "O [GetActivityType( 'activity_imperial_examination' ).GetName|l] foi concluído."
 imperial_examination_conclusion.intro: "Os exames finalmente chegaram ao fim."
 imperial_examination_conclusion.intro.passing_grade.extreme: "\n\nAs restrições de #BOL $imperial_examination_passing_grade_extreme$#! concederam uma quantidade #BOL extraordinária#! de [merit|lE] a um #BOL pequeno#! número de [entrants|lE]."
 imperial_examination_conclusion.intro.passing_grade.high: "\n\nAs restrições de #BOL $imperial_examination_passing_grade_high$#! deram uma quantidade #BOL alta#! de [merit|lE] a um número #BOL mediano#! de [entrants|lE]."
 imperial_examination_conclusion.intro.passing_grade.mediocre: "\n\nAs restrições de #BOL $imperial_examination_passing_grade_mediocre$#! concederam uma quantidade #BOL mediana#! de [merit|lE] a um #BOL gran#! número de [entrants|lE]."
 imperial_examination_conclusion.intro.passing_grade.low: "\n\nAs restrições de #BOL $imperial_examination_passing_grade_low$#! concederam uma quantidade #BOL baixa#! de [merit|lE] a um número #BOL muito alto#! de [entrants|lE]."
 imperial_examination_conclusion.intro.breadth.imperial: "\n\nA #BOL $imperial_examination_breadth_open$#! do convite significava que tínhamos uma #BOL gran#! quantidade total de [entrants|lE]."
 imperial_examination_conclusion.intro.breadth.grand: "\n\nA #BOL $imperial_examination_breadth_restricted$#! do convite significava que tínhamos uma quantidade total de [entrants|lE] #BOL decente#!."
 imperial_examination_conclusion.intro.breadth.palace: "\n\nA #BOL $imperial_examination_breadth_exclusive$#! da convocação significava que tínhamos uma quantidade total de [entrants|lE] #BOL pequeña#!."
 imperial_examination_conclusion.general: "\n\nDe um conjunto inicial de #BOL [activity.MakeScope.Var('num_initial_entrants').GetValue]#! [entrants|lE], #BOL [activity.MakeScope.Var('num_final_failees').GetValue]#! #EMP suspendieron#! no exame.\n\n[activity.MakeScope.Var('first_place_entrant').Char.GetShortUIName] teve o maior sucesso entre os [entrants|lE] , com uma nota [activity.Custom('ActivityGetExamScoreAdjective')] de #BOL [activity.MakeScope.Var('first_place_entrant_score').GetValue|0]#!; em seguida vinham [activity.MakeScope.Var('second_place_entrant').Char.GetShortUIName] e [activity.MakeScope.Var('third_place_entrant').Char.GetShortUIName]."
 imperial_examination_conclusion.entrant_failee: "\n\nO exame terminou em profunda decepção. Preciso me esforçar mais na próxima vez."
 imperial_examination_conclusion.entrant_passed: "\n\nAprovado no Exame Metropolitano, minha família pode se orgulhar de minhas conquistas."
 imperial_examination_conclusion.entrant_passed_palace: "\n\nO império agora me reconhece como um dos seus melhores eruditos[ROOT.Char.Custom('ES_OA')] de seus melhores erudit[ROOT.Char.Custom('ES_OA')]os e as oportunidades à minha frente são imensas."
 local_examination_conclusion.entrant_passed: "\n\nHoje passei no Exame Provincial, e minha família pode se orgulhar das minhas conquistas."
