 ### SETUP
 activity_imperial_examination: "Exame da capital"
 activity_imperial_examination_plural: "Exames da capital"
 activity_imperial_examination_destination_selection: "Você só pode realizar um $activity_imperial_examination$ em sua [capital|lE]."
 activity_imperial_examination_not_hegemon: "#bold No#! você possui um [title|lE] de nível [hegemony|lE]"
 activity_imperial_examination_selection_tooltip: "Realize um [GetActivityType('activity_imperial_examination').GetName|l] para avaliar a habilidade e o [merit|lE] de seus súditos $activity_imperial_examination_host_rewards$"
 activity_imperial_examination_desc: "É nosso dever e uma honra manter a estrutura e organizar estes exames. Eles nos permitem avaliar, julgar e conceder [merit|lE] aos indivíduos mais adequados — para garantir a futura prosperidade do reino."
 activity_imperial_examination_host_desc: "$activity_imperial_examination_host_rewards$$activity_imperial_examination_guest_rewards$"
 activity_imperial_examination_host_rewards: "\n $BULLET_WITH_TAB$[legitimacy|E] [legitimacy_i]\n $BULLET_WITH_TAB$[prestige|E] [prestige_i|E]"
 activity_imperial_examination_guest_desc: "\n$BULLET_WITH_TAB$Uma oportunidade de concluir o #V Exame Metropolitano#! @metropolitan_exam_icon!\n$BULLET_WITH_TAB$Uma oportunidade de concluir o #V Exame Palaciano#! @palace_exam_icon!\n$BULLET_WITH_TAB$Pode aumentar o seu [trait_level_track_xp|El] de [GetTrait('confucian_education').GetName( GetNullCharacter )|l]\n$BULLET_WITH_TAB$Pode aumentar a sua [merit|El]\n$BULLET_WITH_TAB$ @alert_icon! #alert_trial Se você não conhece o [language|El] [host.GetCulture.GetLanguage.GetName], suas chances de aprovação são muito reduzidas!#![SelectLocalization( Scope.HasFlag('passed_provincial_exam'), 'blank_line', 'activity_imperial_examination_warning' )]"
 activity_imperial_examination_warning: "\n#indent_newline:8 $BULLET_WITH_TAB$ @warning_icon! #color_red Como você não foi aprovado no [provincial_examination|lE] @provincial_exam_icon!, é provável que seja reprovado!#!"
 activity_imperial_examination_guest_rewards: "\n $BULLET_WITH_TAB$ Pode recrutar um personagem altamente qualificado\n $BULLET_WITH_TAB$ Os participantes podem ganhar [trait_level_track_xp|lE] de [GetTrait('confucian_education').GetName( GetNullCharacter )|l]\n $BULLET_WITH_TAB$ Os participantes podem ganhar [merit|lE]"
 imperial_examination_base_cost: "Custo base"
 activity_imperial_examination_with_icon: "$activity_imperial_examination$ @metropolitan_exam_icon! @palace_exam_icon!"
 activity_imperial_examination_can_complete_tt: "$activity_imperial_examination_not_available_tt$"
 activity_imperial_examination_expected_frequency: "Esperado a cada #V 5#! anos"
 activity_imperial_examination_not_available_tt: "#T [GetActivityType( 'activity_imperial_examination' ).GetNameNoTooltip]#!\nNesta [activity|lE], os candidatos podem concluir:\nExame metropolitano @metropolitan_exam_icon! \nExame palaciano @palace_exam_icon!\n\n $activity_imperial_examination_expected_frequency$"
 # Province Selection
 activity_imperial_examination_province_kaifeng_palace_desc: "\n #P ++ $building_type_kaifeng_palace_01$#!"
 activity_imperial_examination_province_examination_hall_desc: "\n #P ++ $building_type_examination_hall_01$#!"
 #Activity Window Characters
 activity_window_character_player_entrant_traveling: "$activity_window_character_player_entrant$"
 activity_window_character_player_entrant: "$activity_window_character_entrant$"
 activity_window_character_entrant: "[Concept('entrant',Select_CString(Character.IsFemale,'Examinanda', 'Examinando'))|E]\n[Character.GetShortUINameNoTooltip|U]"
 activity_window_character_examiner: "Examinador\n[Character.GetShortUINameNoTooltip|U]"
 activity_window_character_minister_of_rites: "[minister_of_rites|E]\n[Character.GetShortUINameNoTooltip|U]"
 activity_imperial_examination_guest_help_text: "Qualquer um dos [activity_guests|El] aptos para o exame pode realizá-lo. Se for aprovado, o examinado receberá mais [merit|El], assim como [prestige|El] para o [activity_host|lE]. Embora os convidados não possam entrar na sala do exame, podem usar sua influência para apoiar os examinandos de diversas maneiras.\n\nAs provas são a ocasião perfeita para fazer contatos e impressionar os examinadores, talvez garantindo um ancião para você."
