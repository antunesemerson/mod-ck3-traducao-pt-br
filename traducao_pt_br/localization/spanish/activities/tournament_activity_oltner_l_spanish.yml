l_spanish:
 tournament_events.9000.t: "Os Encantos de [tournament_province.GetNameNoTooltip]"
 tournament_events.9000.desc: "Passeando pelos arredores do torneio, sou tomado pela pura beleza que me cerca aqui, em [tournament_province.GetName].\n\nCaminho por [tournament_province.Custom('TerrainTypeProvince')] salpicado de manchas de [tournament_province.Custom('get_region_flower_type_plural')] e só decido parar para tocar a casca de um exemplar intocado de [tournament_province.Custom('GetRandomAppropriateTree')] Levanto a vista e vejo um grupo de [ROOT.Char.Custom('GetRandomRegionalWildDaytimeBird')]s voando sobre mim.\n\n"
 tournament_events.9000.desc_home: "Deveria fazer isso com mais frequência, afinal, este é meu lar."
 tournament_events.9000.desc_not_home: "Espero ter a oportunidade de retornar no futuro."
 tournament_events.9000.a: "Ah, que relaxante!"
 tournament_events.9000.b: "Um lugar perfeito para treinar em paz."
 tournament_events.9000.impatient: "Bobagem sentimental! #EMP Preciso me exercitar!#!"
 tournament_events.9001.t: "Um Cavaleiro $knight_culture_player_no_tooltip$ Sem Senhor"
 tournament_events.9001.desc: "Enquanto exploro os terrenos, uma figura bem armada se aproxima de mim.\n\n\"[ROOT.Char.GetTitledFirstName], é uma honra\". [liegeless_knight.Custom('ES_ElLa')|U] [liegeless_knight.GetWomanMan] faz uma breve reverência e [liegeless_knight.Custom('quirk_pos_present')]. \"Sou [liegeless_knight.GetFullName], um[liegeless_knight.Custom('ES_XA')] $knight_culture_player_no_tooltip_lowercase$ que busca emprego. Sou [liegeless_knight.Custom('FormalComplimentAdjective')], [liegeless_knight.Custom('ComplimentAdjective')], leal e minha casa é forte. #EMP [liegeless_knight.GetHouse.GetMotto]!#!\", grita [liegeless_knight.GetSheHe] e fica em posição de sentido.\n\nÉ óbvio que est[liegeless_knight.Custom('ES_EA')] nobre menor está exagerando suas virtudes, mas parece competente. E desesperad[liegeless_knight.Custom('ES_OA')]."
 tournament_events.9001.a: "\"Você pode se juntar aos meus $knight_culture_player_plural_no_tooltip_lowercase$.\""
 tournament_events.9001.b: "\"Vou recompensá-lo generosamente se você prestar juramento de fidelidade a mim!\""
 tournament_events.9001.c: "\"Vá embora, mal confio em você.\""
 tournament_events.9001.d: "\"Tenho muito a aprender com você!\""
 tournament_events.9002.t: "O espetáculo de um[strongman_1.Custom('ES_XA')] [strongman_1.GetWomanMan] forte"
 tournament_events.9002.desc: "Ruídos animados me fazem descobrir uma arena improvisada, montada pelos camponeses locais, onde dois lutadores parrudos fazem um espetáculo. Eles trocam golpes, se esquivam, abaixam e circulam um ao outro até que um deles faz um movimento ousado:\n\n\"Eu chamo esse de #EMP [strongman_1.Custom('GetManeuver')] [strongman_1.Custom('GetDescriptorManeuver')]!#!\", grita antes de levantar o oponente e arremessá[strongman_1.GetHerHim] no chão — fazendo com que [strongman_2.GetSheHe] se renda imediatamente. \"[strongman_1.GetFirstName] [strongman_1.Custom('ES_ElLa')] [strongman_1.Custom('ComplimentAdjective')|U] e [strongman_1.Custom('RandomPositiveLookAdjective')|U], vitorios[strongman_1.Custom('ES_OA')] mais uma vez!\", gaba-se [Select_CString( strongman_1.IsFemale, 'a vencedora', 'o vencedor' )]."
 tournament_events.9002.whole_of_body: "É tão relaxante assistir às técnicas profissionais!"
 tournament_events.9002.a: "Uau! Como é empolgante!"
 tournament_events.9002.b: "Hmm, devo estudar suas técnicas..."
 tournament_events.9002.c: "Você, [Select_CString( strongman_1.IsFemale, 'a vencedora', 'o vencedor' )]! Aqui estão algumas moedas!"
 tournament_events.9002.b.success: "Você se inspira nos lutadores"
 tournament_events.9002.b.failure: "Você não consegue aprender nada"
 tournament_events.9003.t: "Um Passeio Fortuito"
 tournament_events.9003.desc: "Procurando refúgio do burburinho e do barulho dos terrenos do torneio, tropeço em um pequeno caminho escondido entre algumas árvores de [tournament_province.Custom('GetRandomRegionalWood')]. Vagando pela [tournament_province.Custom('GetProvinceFoliageDesc')], avisto cama após cama de belas [tournament_province.Custom('get_region_flower_type_plural')].\n\n"
 tournament_events.9003.friend: "De repente, avisto meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('intent_target_character'))] [intent_target_character.GetFirstName] aproximando-se pela direção oposta, a sorte sorri para mim! Tenho desejado encontrar-me com [intent_target_character.GetSheHe] a sós, talvez eu pudesse puxar conversa?"
 tournament_events.9003.lover: "Ao erguer o olhar da minha solidão, vejo a flor mais bela de todas. Minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('intent_target_character'))] [intent_target_character.GetFirstName], a meta dos meus sonhos, encontrou o mesmo caminho que eu!"
 tournament_events.9003.a: "Passamos um pelo outro em silêncio."
 tournament_events.9003.b: "Um lugar perfeito para treinar em paz."
 tournament_events.9003.lover_attempt: "\"Você é mais lind[intent_target_character.Custom('ES_OA')] mais bela do que qualquer uma destas flores\"."
 tournament_events.9003.lover_attempt.critical_success: "[intent_target_character.GetSheHe|U] se apaixona perdidamente por você"
 tournament_events.9003.lover_attempt.success: "[intent_target_character.GetSheHe|U] acha o gesto muito romântico"
 tournament_events.9003.lover_attempt.minor_success: "[intent_target_character.GetSheHe|U] acha o gesto fofo"
 tournament_events.9003.lover_attempt.fail: "[intent_target_character.GetSheHe|U] está completamente confuso[intent_target_character.Custom('ES_OA')]"
 tournament_events.9003.friend_attempt: "\"É chato andar sozinho, vamos conversar sobre [intent_target_character.Custom('MatchingConversationSubject')]?\""
 tournament_events.9003.friend_attempt.critical_success: "[intent_target_character.GetSheHe|U] gosta muito da sua companhia"
 tournament_events.9003.friend_attempt.success: "[intent_target_character.GetSheHe|U] está entretid com a conversa"
 tournament_events.9003.friend_attempt.failure: "[intent_target_character.GetSheHe|U] se afasta silenciosamente..."
 tournament_events.9004.t: "Entretenimento Alado"
 tournament_events.9004.desc: "\"Vamos, #EMP [falconer_1.Custom('GetBirdName')|U]#!, mais rápido!\" Ouço a voz de um[falconer.Custom('ES_XA')] [falconer_1.GetWomanMan] que ecoa por todo o recinto. Levanto a cabeça e vejo uma coisinha minúscula cortando o céu como um pequeno raio negro. Logo ela mergulha em direção à linha de chegada.\n\n\"Bah, vocês devem ter trapaceado! Seu pássaro não pode voar tão rápido assim, olhem só — ele é [falconer_1.Custom('GetBirdInsult')]!\", grita o perdedor furioso, enquanto [falconer.Custom('ES_ElLa')] vencedor[falconer.Custom('ES_XA')] parece encantado[falconer.Custom('ES_OA')]."
 tournament_events.9004.hunter: "Eu poderia aprender algumas coisas com isso..."
 tournament_events.9004.a: "Isso é um excelente entretenimento!"
 tournament_events.9004.b: "Hm, deve exigir muita preparação para fazer isso."
 tournament_events.9004.c: "Dobro ou nada, vamos de novo!"
 tournament_events.9004.c.success: "Você ganha a aposta"
 tournament_events.9004.c.failure: "Você perde a aposta"
 tournament_events.9004.d: "Não tenho tempo para isso."
 round_as_an_egg: "redondo como um ovo"
 heavy_as_a_stone: "pesado como uma pedra"
 graceful_as_a_goose: "gracioso como um ganso"
 shaped_like_a_brick: "com formato de tijolo"
 as_thick_as_you: "tão grosso quanto você"
 barely_a_fledgeling: "mal um filhote"
 wobbly_like_a_duck: "instável como um pato"
 as_fast_as_a_mountain: "tão rápido quanto uma montanha"
 as_bright_as_a_rain_cloud: "tão brilhante quanto uma nuvem de chuva"
 an_empty_cup: "uma xícara vazia"
 a_stick_simple: "um graveto"
 a_rock: "uma pedra"
 available_because_of_intent: "Esta opção está disponível por causa da sua [intent|lE]"
 you_get_drunk: "Você fica bêbad"
 they_share_some_tricks: "Eles compartilham alguns truques"
 you_have_a_good_time: "Você se diverte, mas nada mais"
 tournament_events.9005.t: "Festa Barulhenta"
 tournament_events.9005.desc: "A comida e a bebida abundam durante o torneio, para deleite dos presentes. Três camponeses em particular parecem estar compartilhando o que parece ser um #EMP barril inteiro#! de [tournament_host.Custom('RegionalDrink')].\n\n\"Tvas… t'vasanterar deesso, so [peasant_2.Custom2('InsultNoun', SCOPE.sC('peasant_1'))]!\", balbucia um, embriagado, lançando [peasant_1.Custom('ThrowableObjectArticle')] sem força em seu vizinho.\n\n\"[peasant_1.GetFirstName], losi… lossiento! [peasant_1.Custom('GetLaughType')]\", a vítima cobre o rosto, desviando o ataque. \"Me ajude, [peasant_3.GetFirstName]! #EMP *hip*#!\".\n\n\"Você consegue sol[peasant_2.Custom('ES_OA')], [peasant_2.GetName]!\", exclama [peasant_3.Custom('ES_ElLa')] últim[peasant_3.Custom('ES_OA')], bebendo uma caneca inteira de um grande gole."
 tournament_events.9005.a: "Eles estão agitados... mas eu realmente #EMP preciso disso#! $knight_culture_player_plural_no_tooltip_lowercase$..."
 tournament_events.9005.b: "Vocês se importam se eu me juntar a vocês para tomar uma xícara de [tournament_host.Custom('RegionalDrink')]?"
 tournament_events.9005.c: "Eles estão completamente bêbados... deve ser fácil provocá-los!"
 tournament_events.9005.d: "Nojento."
 tournament_events.9006.t: "Contos do Torneio"
 tournament_events.9006.desc: "Uma pequena multidão se reuniu em torno de um[memory_holder.Custom('ES_XA')] [memory_holder.GetTitledFirstName] que discursa com paixão. Eles parecem estar ouvindo atentamente.\n\n"
 tournament_events.9006.family: "\"A glória pessoal é uma coisa, mas a verdadeira glória está em outro lugar\", [memory_holder.Custom('quirk_pos_present')]. \"Sua família é sua força; sem eles você não é nada! Isso me lembra de quando [story_memory.GetDescription]…\"."
 tournament_events.9006.martial: "\"A força do braço é importante, mas ainda mais importante é a força da #EMP mente#!\", [memory_holder.Custom('quirk_pos_present')]. \"Tornar-se um estrategista habilidoso envolve ouvir os fracassos e sucessos dos outros, o que me leva ao momento em que [story_memory.GetDescription]…\"."
 tournament_events.9006.death: "\"O verdadeiro sucesso nasce de uma mente focada.\" [memory_holder.GetSheHe] [memory_holder.Custom('quirk_pos_present')]. \"Suprima as memórias que te distraem e use as fraquezas do seu oponente contra ele. Deixe-me contar a história de quando [story_memory.GetDescription]...\""
 tournament_events.9006.war: "\"Como consegui isto tão impressionante, vocês se perguntam?\", [memory_holder.Custom('quirk_pos_present')]. \"Lutei na guerra e liderei exércitos contra inimigos poderosos. Vou contar a vocês quando [story_memory.GetDescription]…\"."
 tournament_events.9006.relationships: "\"Sua própria habilidade só levará você até certo ponto em um torneio.\" [memory_holder.GetSheHe] [memory_holder.Custom('quirk_pos_present')]. \"São aqueles que apoiam, ou não apoiam, você que decidem seu destino — deixe-me contar sobre quando [story_memory.GetDescription]...\""
 tournament_events.9006.travel: "\"A jornada é tão importante quanto o destino, sempre se arrisque!\", [memory_holder.Custom('quirk_pos_present')]. \"Eu nunca teria chegado tão longe sem aproveitar todas as oportunidades no caminho; por exemplo, quando [story_memory.GetDescription]…\"."
 tournament_events.9006.desc_end: "\n\nPassa quase meia hora, mas parecem segundos… [memory_holder.GetSheHe|U] realmente sabe contar histórias!"
 tournament_events.9006.a: "Isso vai me ajudar na próxima competição!"
 tournament_events.9006.b: "Acho que aprendi algo com isso."
 lifestyle_experience_increased: "Experiência de Estilo de Vida Aumentada"
 you_learn_a_little: "Você aprende um pouco"
 you_learn_a_lot: "Você aprende muito"
 tournament_events.9006.shy: "Eu gostaria de poder falar em público assim..."
 tournament_events.9006.impatient: "Que desperdício de teeeempo!"
 tournament_events.9007.t: "Fanfarra de Cavaleiros"
 tournament_events.9007.desc: "“Você vai vencer isso!”, exclama meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hype_knight'))] [hype_knight.GetFirstName]. “Será uma coisa trivial, como quando [hype_memory.GetSecondPerspectiveDescription]… Você é muito [ROOT.Char.Custom('FormalComplimentAdjective')] e [ROOT.Char.Custom('ComplimentAdjective')] para fracassar!”.\n\nÉ bom saber que meus $knight_culture_player_plural_no_tooltip_lowercase$ me dão cobertura!"
 tournament_events.9007.ambitious: "Silêncio, [hype_knight.Custom('RaunchyComplimentNoun')|l] — eu já sei disso!"
 tournament_events.9007.a: "Eu me sinto imparável!"
 tournament_events.9007.b: "Eu não seria nada sem meus gloriosos apoiadores!"
 tournament_events.9007.c: "Agradeço a [ROOT.Char.GetFaith.HighGodName] por minha futura vitória."
 tournament_events.9008.t: "A Performance de um Bobo"
 tournament_events.9008.desc: "\"Vejam todos, venham ver [tournament_fool.Custom('ES_AlAla')] [tournament_fool.Custom2('DescriptorPositive', SCOPE.sC('tournament_fool') )] [tournament_fool.GetFirstName]!\". Uma[tournament_fool.Custom('ES_XA')] [tournament_fool.GetWomanMan] vestid[tournament_fool.Custom('ES_OA')] de cores grita, mantendo em um equilíbrio precário um [tournament_fool.Custom('GetObjectToBalanceOnNose')] sobre o nariz.\n\n\"Também sei histórias! Talvez vocês gostassem de ouvir algo alegre, como o relato de quando [memory_story.GetThirdPerspectiveDescription]?\", diz enquanto faz parada de mãos.\n\n\"Ou talvez minha [ROOT.Char.GetLadyLord] preferisse ouvir uma história #EMP sombría#!, como a de quando [memory_story_negative.GetThirdPerspectiveDescription]?\"."
 tournament_events.9008.schemer: "Eu #EMP sei#! que você já ouviu algo mais suculento..."
 tournament_events.9008.a: "Nada de histórias chatas — quero te ver malabarizar!"
 tournament_events.9008.b: "Me conte o conto alegre!"
 tournament_events.9008.c: "A história sombria vai criar o clima certo."
 cheery_disposition_modifier: "Disposição Alegre"
 cheery_disposition_modifier_desc: "Esse personagem é animado e convidativo."
 grim_disposition_modifier: "Disposição Sombria"
 grim_disposition_modifier_desc: "Esse personagem é sério e determinado."
