l_spanish:
 major_decisions.1001.t: "Carne Divina"
 major_decisions.1001.desc: ""Fomos colocados nesta terra para servir ao nosso próximo", a voz do [court_chaplain.GetCouncilTitle|l] de [court_chaplain.GetName] ecoa por todo o salão de jantar."
 major_decisions.1001.desc_landless: "\"Servir ao próximo; o que isso implica?\", pergunto retoricamente enquanto meu olhar afiado percorre os rostos dos meus seguidores à mesa de jantar farta. \"Não seria amar e cuidar de cada aspecto do ser humano?\""
 major_decisions.1001.desc_outro: "\n\n"Ao aceitar a dádiva da carne, você também aceita o amor Dele".\n\nOs servos —aqueles que ainda estão conosco— fizeram um trabalho maravilhoso. Banquetearemos noite adentro, embriagando-nos com [ROOT.Char.Custom('RegionalDrink')] e o sabor da divindade humana."
 major_decisions.1001.a: "Me dê uma mão e passe mais [ROOT.Char.Custom('RegionalDrink')]!"
 major_decisions.1002.t: "Banquete Macabro"
 major_decisions.1002.desc: "Não consigo acreditar no que estou ouvindo: toda a corte de [cannibal.GetName], até seu [court_chaplain.GetCouncilTitle|l] se entregou ao canibalismo!\n\nAs ruas correm vermelhas de sangue enquanto seu grupo infernal se banqueteia."
 major_decisions.1002.desc_landless: "Não consigo acreditar no que estou ouvindo: [cannibal.GetName] e toda a sua [cannibal.Custom('GetCourt')|l] se entregou ao canibalismo!\n\nO campo ficará vermelho de sangue enquanto o grupo infernal de se banquetear."
 major_decisions.1002.desc_cannibal: "[cannibal.GetName] convenceu seu [court_chaplain.GetCouncilTitle|l] a adotar publicamente o canibalismo.\n\nFico encantado em saber que o gosto pela carne está se espalhando mais do que nunca!"
 major_decisions.1002.desc_cannibal_landless: "[cannibal.GetName] e sua [cannibal.Custom('GetCourt')|l] adotaram publicamente o canibalismo.\n\nNão vamos dar as costas a ele; fico encantado em saber que o gosto pela carne está se espalhando mais do que nunca!"
 major_decisions.1002.a: "Mal puedo esperar a jantar com [ROOT.Char.Custom('ES_ElElla')]!"
 major_decisions.1002.b: "Que [ROOT.Char.GetFaith.HighGodName] tenha misericórdia de suas almas perversas!"
 major_decisions.1101.t: "Um Reino Reforjado"
 major_decisions.1101.opening_duchies: "Fiz o que ninguém mais conseguiu. Uni as terras de [duchy_1.GetNameNoTierNoTooltip] às de [duchy_2.GetNameNoTierNoTooltip] e [duchy_3.GetNameNoTierNoTooltip]."
 major_decisions.1101.desc: "Trabalhei a vida inteira para isso. Chamarei meus vassalos e farei com que voltem a jurar lealdade.\n\nAgora e sempre, eles me prestarão homenagem não apenas como seu [ROOT.Char.GetLadyLord] mas sim como [ROOT.Char.GetTitleAsNameNoTooltip]! [ROOT.Char.GetTitleAsNameNoTooltip] de [new_title.GetNameNoTier]!"
 major_decisions.1101.a: "Meu reino durará para sempre."
 major_decisions.1101.i_have_become_royal: "Você se tornou [founder.GetTitleAsNameNoTooltip] de [new_title.GetNameNoTier]"
 major_decisions.1102.desc: "Noss[founder.Custom('ES_OA')] [founder.Custom('ES_SennorSennora')] convocou todos os seus vassalos e servos do reino para que venham ao seu lado. Sabemos que é chegada a hora, e ninguém contestará sua reivindicação.\n\n[founder.GetFirstName] governará como [new_title.GetTierAsNameNoTooltip] sobre o grande reino de [new_title.GetNameNoTier]!"
 major_decisions.1102.a: "Vida longa ao[founder.GetTitleAsNameNoTooltip]!"
 major_decisions.1102.a.dislike: "Vida longa ao[founder.GetTitleAsNameNoTooltip]…"
 major_decisions.1102.has_become_royal: "[founder.GetFirstName] se tornou [founder.GetTitleAsNameNoTooltip] de [new_title.GetNameNoTier]"
 major_decisions.1103.opening_kingdoms: "Fiz o que ninguém mais conseguiu. Uni as terras de [kingdom_1.GetNameNoTierNoTooltip] às de [kingdom_2.GetNameNoTierNoTooltip] e [kingdom_3.GetNameNoTierNoTooltip]."
 major_decisions.1103.opening: "Todos os meus vassalos e [ROOT.Char.GetFaith.PriestNeuterPlural] enfim se reuniram diante do meu trono. Conquistei este momento aos olhos deles e, mais importante, aos olhos de [ROOT.Char.GetFaith.PantheonTerm]."
 major_decisions.1103.i_am_religious_head: "\n\nÉ justo que eu coloque a coroa sobre minha própria cabeça, enquanto meus servos, tanto temporais quanto espirituais, se curvam diante de mim."
 major_decisions.1103.blessed_by_religious_head: "\n\nEnquanto [religious_figure.GetTitledFirstName|l] coloca a coroa sobre minha cabeça, eu declaro meu novo império. É isso que meus vassalos servidores vieram testemunhar e, quando a declaração deixa meus lábios, todo o poder do meu reino, espiritual e temporal, ajoelha-se diante de mim."
 major_decisions.1103.a: "[new_title.GetNameNoTierNoTooltip] reina supremo!"
 major_decisions.1104.opening: "[founder.GetFirstName], nuestr[founder.Custom('ES_OA')] [founder.GetLadyLord] e governante, convocou todos os vassalos e [founder.GetFaith.PriestNeuterPlural] do reino ao seu lado. Não posso negar que ele conquistou com justiça este momento aos olhos de [ROOT.Char.GetFaith.PantheonTerm]."
 major_decisions.1104.i_am_religious_head: "\n\nQuando a coroando,"
 major_decisions.1104.religious_head_empire: "\n\nQuando é coroado,"
 major_decisions.1104.blessed_by_religious_head: "\n\n\n\nQuando [religious_figure.GetTitledFirstName|l] coroa a [founder.GetTitledFirstName|l],"
 major_decisions.1104.end: "[founder.GetFirstName] proclama isto como a origem de seu novo reino. Seus servos se curvam em deferência diante de [founder.Custom('ES_ElElla')]."
 major_decisions.1104.a: "[new_title.GetNameNoTierNoTooltip] viverá para sempre!"
 major_decisions.1105.t: "Um Reino Usurpador"
 major_decisions.1105.desc: "\"[founder.GetTitleAsNameNoTooltip]\" [founder.GetFirstName] de [new_title.GetNameNoTierNoTooltip] declarou um novo Reino, e parte do território que é legitimamente #EMP meu#! faz parte dele!"
 major_decisions.1105.a: "Esse[founder.Custom('ES_EA')] farsante nunca vai durar…"
 major_decisions.2001.t: "Universidade"
 major_decisions.2001.desc_first: "Uma nova era do conhecimento está sobre nós! Tenho recebido um fluxo constante de construtores e estudiosos, e os planos para a magnífica universidade estão tomando forma.\n\n"
 major_decisions.2001.desc_more: "O mestre de obras me informa que os tijolos da universidade estão prontos para serem assentados — tudo o que resta decidir é um local e um nome!"
 major_decisions.2001.desc: "O mestre de obras me informa que os tijolos da universidade estão prontos para serem assentados — tudo o que resta decidir é um nome!"
 major_decisions.2001.b_fes: "Fundarei a Universidade de al-Qarawiyyin!"
 major_decisions.2001.b_cairo: "Fundarei a Universidade de Al-Azhar!"
 major_decisions.2001.b_bologna: "Fundarei a Universidade de Bolonha!"
 major_decisions.2001.b_salamanca: "Fundarei a Universidade de Salamanca!"
 major_decisions.2001.b_madrid: "Fundarei a Universidade Complutense de Madri!"
 major_decisions.2001.b_oxford: "Fundarei a Universidade de Oxford!"
 major_decisions.2001.b_cambridge: "Fundarei a Universidade de Cambridge!"
 major_decisions.2001.b_padua: "Fundarei a Universidade de Pádua!"
 major_decisions.2001.b_siena: "Fundarei a Universidade de Siena!"
 major_decisions.2001.b_coimbra: "Fundarei a Universidade de Coimbra!"
 major_decisions.2001.b_napoli: "Fundarei a Santa Universidade Romana de Nápoles!"
 major_decisions.2001.b_tirakka: "Fundarei a Universidade de Sankoré!"
 major_decisions.2001.fallback: "Vou fundar... universidade nenhuma hoje."
 major_decisions.2001.fallback.tt: "O Desenvolvimento do condado é baixo demais, ou ele já tem um Espaço para Edifício Especial"
 major_decisions.2002.desc: "Uma nova era do conhecimento está sobre nós; uma universidade foi fundada no reino de [founder.GetName]. Ela rapidamente está se tornando um centro para estudiosos e outras pessoas instruídas, sendo proclamada o ambiente ideal para os jovens aprenderem o trivium e o quadrivium, e tudo mais que alguém possa precisar para compreender o mundo."
 major_decisions.2002.a: "Que o conhecimento deles beneficie a todos nós!"
 major_decisions.2011.t: "O/Sábio[new_courtier.Custom('ES_OA')|U]"
 major_decisions.2011.desc: "[new_courtier.GetName], um[new_courtier.Custom('ES_XA')] [new_courtier.GetWomanMan] tanto [ROOT.Char.Custom2('DescriptorPositive', SCOPE.sC('new_courtier') )] quanto inteligente, me saúda com graça.\n\n"Fiquei sabendo da vossa nova universidade! Seria uma honra servir a um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] que valoriza o conhecimento dessa maneira"."
 major_decisions.2011.a: "Sejam bem-vind[new_courtier.Custom('ES_OA')]!"
 major_decisions.2011.b: "Você não encontrará lugar para si aqui."
 major_decisions.3001.t: "Casa da Vegetação"
 major_decisions.3001.desc: "Ao meu redor, uma abundância de plantas floresce, a água condensando nos painéis acima enquanto o sol atravessa o vidro e toca meu rosto erguido. Giro — cada vez mais rápido — e atiro minha jaqueta ao chão, exultante, enquanto rio.\n\n\"O sol está aqui conosco; valeu bem a fortuna que custou!\""
 major_decisions.3001.a: "Dominei a luz do sol!"
 major_decisions.3002.desc: "[builder.GetName] está completamente louco! Gastou uma fortuna para erguer um edifício inteiramente de vidro e proclamou que domou e capturou o sol.\n\nÉ certo que os relatos de plantas florescendo são apenas produto de suas delírios. Será que a farsa desse louc[builder.Custom('ES_OA')]?"
 major_decisions.3002.a: "Isto está ficando ridículo!"
 major_decisions.3100.t: "Uma Questão de Sucessão"
 major_decisions.3100.desc: "A questão de quem deverá me suceder após minha morte tem me atormentado sem cessar ultimamente, com a ameaça de dividir o reino sempre em minha mente.\n\nClaro, embora geralmente seja difícil persuadir o reino a aceitar uma nova ordem sucessória, pode ser #EMP muito#! mais fácil retornar à antiga..."
 major_decisions.3100.a: "Os antigos costumes do meu povo eram os melhores!"
 major_decisions.3100.d: "É, pensando melhor, a partilha é mais justa."
 major_decisions.3100.tt_opinion_witengamot: "Vassalos de [cultures|lE] com a [culture_tradition|lE] $tradition_the_witenagemot_name$"
 major_decisions.3100.tt_opinion_thing: "Vassalos de [cultures|lE] da [heritage|lE] $heritage_north_germanic_name$"
 major_decisions.3100.tt_opinion_tanistry: "Vassalos cujas [cultures|lE] sejam da [heritage|lE] $heritage_goidelic_name$"
 major_decisions.3100.tt_opinion_jirga: "Vassalos de [cultures|lE] com a [culture_tradition|lE] $tradition_fp3_jirga_name$"
