 nick_the_negotiator: "o/a Negociador[CHARACTER.Custom('ES_XA')]"
 nick_the_negotiator_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] um[CHARACTER.Custom('ES_XA')] diplomático[CHARACTER.Custom('ES_OA')] magistral e [Select_CString( CHARACTER.IsLocalPlayer, 'has', 'ha' )] forjou muitas alianças poderosas"
