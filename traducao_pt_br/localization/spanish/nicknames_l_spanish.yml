 nick_cuckoo: "Cuco"
 nick_cuckoo_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'tienes', 'tiene' )] muitos filhos em muitos ninhos diferentes…"
 nick_aurei_testiculi: "Aurei Testiculi"
