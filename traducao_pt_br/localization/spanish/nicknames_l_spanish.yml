 nick_the_collector: "o Colecionador"
 nick_the_collector_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'has', 'ha' )] reuniu uma coleção realmente impressionante de artefatos únicos."
 nick_the_haunted: "o/a Assombrad[CHARACTER.Custom('ES_OA')]"
