 nick_the_petulant: "o Petulante"
 nick_the_petulant_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] frequentemente insolente e grosseir[CHARACTER.Custom('ES_OA')] , de uma maneira quase infantil."
 nick_the_turbulent: "o/a Turbulento(a)[CHARACTER.Custom('ES_OA')]"
