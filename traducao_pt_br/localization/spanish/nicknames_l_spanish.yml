l_spanish:
 DEFAULT_NICKNAME_DESC: "Amigos e inimigos por toda a terra conhecem [CHARACTER.GetShortUINameNoTooltipNoFormat] como '[CHARACTER.GetNicknameNoTooltip]'."
 nick_tiny: "Pequen[CHARACTER.Custom('ES_OA')]"
 nick_tiny_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'é', 'é' )] célebre por [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )]… altura de miras."
 nick_bluetooth: "Dente Azul"
 nick_bluetooth_desc: "Um dente solitário e enegrecido dá a [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )] um sorriso singularmente famoso."
 nick_canmore: "[CHARACTER.Custom('ES_ElLa')] Cabeçudo[CHARACTER.Custom('ES_OnOna')]"
 nick_canmore_desc: "Também chamad[CHARACTER.Custom('ES_OA')] «[CHARACTER.Custom('ES_ElLa')] Grande Chefe[CHARACTER.Custom('ES_EA')]», é [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] considerada uma força poderosa e unificadora para o reino."
 nick_tanglehair: "Cabelos Emaranhados"
 nick_tanglehair_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'hiciste', 'hizo' )] fez um voto: não pentear, cortar ou limpar[Select_CString( CHARACTER.IsLocalPlayer, 'te', 'se' )] o cabelo antes de unir os senhores menores em conflito da Noruega."
 nick_fairhair: "Belos Cabelos"
 nick_fairhair_desc: "Após unir a Noruega sob [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] estandarte, [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'se' )] [Select_CString( CHARACTER.IsLocalPlayer, 'ganaste', 'ganó' )] o direito de cortar, pentear e perfumar[Select_CString( CHARACTER.IsLocalPlayer, 'te', 'se' )] o cabelo mais uma vez. Não há cabelo mais bonito do que aquele conquistado com trabalho e luta."
 nick_haardraade: "Governante Duro"
 nick_haardraade_desc: "Na frente, as pessoas [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] chamam de «$nick_haardraade$». Por trás das costas, [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] atitude carrancuda e justiça severa fazem com que [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim)] o apelidem de «$nick_the_tyrant$»."
 nick_hardeknud: "Harthacnut"
 nick_hardeknud_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tus', 'Sus' )|U] muitos súditos não conseguem chegar a um acordo sobre a pronúncia exata de [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] nome, então se [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim)] conhece por muitas variações."
 nick_hildetand: "Dente de Guerra"
 nick_hildetand_desc: "Abundam as lendas sobre como [CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString( CHARACTER.IsLocalPlayer, 'perdiste', 'perdió' )] uns dentes de forma dramática na batalha, apenas para que milagrosamente [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] crescessem dois novos."
 nick_lodbrok: "Loðbrók"
 nick_lodbrok_desc: "As massas covardes do mundo [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim)] chamam \"Calçapeluda\", pois dizem que [Select_CString( CHARACTER.IsLocalPlayer, 'vistes', 'viste' )] umas calças de couro arrancado do cadáver de um poderoso dragão. Naturalmente, um que #EMP [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )]#! [Select_CString( CHARACTER.IsLocalPlayer, 'abatiste', 'abatió' )]."
 nick_ring: "Anel"
 nick_ring_desc: "Ninguém sabe ao certo por que o mundo [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim)] chama «$nick_ring$», embora alguns camponeses animados esperem que seja porque [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es')] generos[CHARACTER.Custom('ES_OA')] com [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] bolsa."
 nick_snake_in_the_eye: "Serpente-no-Olho"
 nick_snake_in_the_eye_desc: "Os viajantes sussurram que [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )] [Select_CString( CHARACTER.IsLocalPlayer, 'portas', 'porta' )] o ouroboros, o símbolo eterno de uma serpente mordendo a própria cauda, como uma mancha no olho. Poucos estão dispostos a chegar tão perto para verificar a veracidade de tais afirmações."
 nick_the_affable: "o Afável"
 nick_the_affable_desc: "Tranquilo[CHARACTER.Custom('ES_OA')], de trato fácil, agradável. A [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetSheHe )] não [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] importa qual epíteto [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )]a pessoa é chamada pela gente, mas, por sorte, quase sempre é algo #EMP agradable#!."
 nick_the_apostle: "o Apóstolo"
 nick_the_apostle_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'fuiste', 'fue' )] um[CHARACTER.Custom('ES_OA')] dos companheiros pessoais de Jesus Cristo, acompanhando-o durante toda a vida e pregando Sua palavra depois de seu martírio."
 nick_the_avenger: "o/a Vingador[CHARACTER.Custom('ES_XA')]"
 nick_the_avenger_desc: "Os inimigos de [Select_CString( CHARACTER.IsLocalPlayer, 'tu persona', CHARACTER.GetShortUINameNoTooltipNoFormat )] [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] o conhecem como uma força implacável e incansável da justiça a qualquer custo."
 nick_the_bald: "o Calv[CHARACTER.Custom('ES_OA')]"
 nick_the_bald_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'sufriste', 'sufrió' )] uma falta de cabelo paralisante, e parece que ninguém está disposto a deixar que o [Select_CString( CHARACTER.IsLocalPlayer, 'olvides', 'olvide' )]."
 nick_the_bald_ironic: "$nick_the_bald$"
 nick_the_bald_ironic_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'pasaste', 'pasó' )] grande parte da vida sem uma coroa que [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] adornasse a cabeça, e a corte se nega a deixar que o [Select_CString( CHARACTER.IsLocalPlayer, 'olvides', 'olvide' )]."
 nick_the_bastard: "o/a Bastardo[CHARACTER.Custom('ES_OA')]"
 nick_the_bastard_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'naciste', 'nació' )] fora dos limites do matrimônio, e parece que não [Select_CString( CHARACTER.IsLocalPlayer, 'puedes', 'puede' )] esquecê-lo. O resto do mundo certamente não vai."
 nick_the_betrayer: "o/a Traidor[CHARACTER.Custom('ES_XA')]"
 nick_the_betrayer_desc: "Todo mundo sabe o que [Select_CString( CHARACTER.IsLocalPlayer, 'hiciste', 'hizo' )]."
 nick_the_black: "o/a Negr[CHARACTER.Custom('ES_OA')]"
 nick_the_black_desc: "Uma atitude cruel, tratos notoriamente injustos e uma conduta maldita de modo geral para com [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] semelhantes dão a [Select_CString( CHARACTER.IsLocalPlayer, 'tu persona', CHARACTER.GetShortUINameNoTooltipNoFormat )] uma má reputação."
 nick_the_blessed: "o(a) Bendit[CHARACTER.Custom('ES_OA')]"
 nick_the_blessed_desc: "Uma postura reta e uma voz firme na defesa da fé são tudo o que se pode dizer ao descrever [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )]."
 nick_the_blind: "o/a Ceg[CHARACTER.Custom('ES_OA')]"
 nick_the_blind_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )|U] a falta de visão parece ser a única coisa que o mundo pode ver de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )]."
 nick_the_bold: "o/a Valente"
 nick_the_bold_desc: "Audaz, intrépido[CHARACTER.Custom('ES_OA')] , valente, heroico[CHARACTER.Custom('ES_OA')]: [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] nome é sinônimo de ação direta e tomada rapidamente. Até mesmo [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] inimigos [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] chamam [CHARACTER.GetShortUINameNoTooltipNoFormat] «$nick_the_bold$»; ao menos isso detém a enxurrada de sinônimos."
 nick_the_boneless: "o/a Desossad[CHARACTER.Custom('ES_OA')]"
 nick_the_boneless_desc: "O frágil esqueleto de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )] oculta a ferocidade de [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] mente e espírito."
 nick_the_brave: "o/a Valente[CHARACTER.Custom('ES_OA')]"
 nick_the_brave_desc: "Nem uma coxa trêmula nem um pulso trêmulo [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] afastam [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] objetivos."
 nick_the_chaste: "o/a Casto/a[CHARACTER.Custom('ES_OA')]"
 nick_the_chaste_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'tienes', 'tiene' )] é conhecido por preferir uma boa noite de sono."
 nick_the_confessor: "o/a Confessor[CHARACTER.Custom('ES_XA')]"
 nick_the_confessor_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'tienes', 'tiene' )] é conhecido por [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] sua contrição até pelos pecados mais leves."
 nick_the_conqueror: "o/a Conquistador[CHARACTER.Custom('ES_XA')]"
 nick_the_conqueror_desc: "Que feito mais poderoso pode ser escrito nos anais do que a subjugação de #EMP todo#! um reino inteiro? Sem dúvida, [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )] não [Select_CString( CHARACTER.IsLocalPlayer, 'dejarás', 'dejará' )] que as pessoas se esqueçam de [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] feito."
 nick_the_cruel: "o Cruel"
 nick_the_cruel_desc: "A [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetShortUINameNoTooltipNoFormat )] [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] gosta pensar que, na verdade, [Select_CString( CHARACTER.IsLocalPlayer, 'tienes', 'tiene' )] tem um temperamento relativamente alegre. As pessoas simplesmente não parecem captar [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] sentido de humor #EMP #!."
 nick_the_child_of_devilgod: "a Prole de [CHARACTER.GetFaith.DevilName|U]"
 #_Oh my_, an extra E? Wonder what _that_ could mean!
 ## Shh, it's fine. Leave it alone.
 nick_the_child_of_devilgod_desc: "Línguas venenosas cochicham que [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] [Select_CString( CHARACTER.IsFemale, 'hija ilegítima', 'hijo ilegítimo' )] de [CHARACTER.GetFaith.DevilName|U]. Ao menos, até que as [Select_CString( CHARACTER.IsLocalPlayer, 'arrancas', 'arranca' )]."
 nick_the_crusader: "o/a Cruzad[CHARACTER.Custom('ES_OA')]"
 nick_the_crusader_desc: "Infiéis, apóstatas e hereges caem igualmente perante [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] espada."
 nick_the_destroyer: "o/a Destruidor[CHARACTER.Custom('ES_XA')]"
 nick_the_destroyer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] célebre por incendiar propriedades, queimar edifícios e semear a terra com sal e os ossos dos mortos."
 nick_the_destroyer_prophecy: "$nick_the_destroyer$"
 nick_the_destroyer_prophecy_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Sua', 'Sua' )|U] o sobrenome se atribuiu a uma profecia. Se [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] destino é derrubar uma ordem corrupta ou incendiar uma justa, é motivo de debate."
 nick_the_devil: "o/a Diabo[CHARACTER.Custom('ES_OA')]"
 nick_the_devil_desc: "Más intenções envolvem [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] ações como um manto, e toda a terra atribui a [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] atos a pior intenção possível."
 nick_the_drunkard: "o/a Bêbado[CHARACTER.Custom('ES_OA')]"
 nick_the_drunkard_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'te pasas', 'se pasa' )] passa a vida buscando clareza no fundo de uma caneca de cerveja. Todo mundo sabe que nunca a [Select_CString( CHARACTER.IsLocalPlayer, 'encontrarás', 'encontrará' )]."
 nick_the_fair: "o/a Belo(a)[CHARACTER.Custom('ES_OA')]"
 nick_the_fair_desc: "Acredita-se que [CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'tienes', 'tiene' )] tem um semblante agradável."
 nick_the_fat: "o Gordo[CHARACTER.Custom('ES_OA')]"
 nick_the_fat_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tus', 'Sus' )] bochechas têm fama de, em algumas ocasiões, cuspir pernas inteiras de frango."
 nick_the_fearless: "o/a Intrépido[CHARACTER.Custom('ES_OA')]"
 nick_the_fearless_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tus', 'Sus' )] soldados dizem que nunca [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] o viram recuar. Nem diante de homem, cavalo ou projétil. A maioria das pessoas acredita nisso."
 nick_the_fowler: "o/a Pajarin[CHARACTER.Custom('ES_OA')]"
 nick_the_fowler_desc: "Os rumores da corte dizem que [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )] [Select_CString( CHARACTER.IsLocalPlayer, 'pasas', 'pasa' )] tanto tempo caçando aves selvagens quanto governando."
 nick_the_gentle: "o/a gentil[CHARACTER.Custom('ES_OA')]"
 nick_the_gentle_desc: "Quando [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )] [Select_CString( CHARACTER.IsLocalPlayer, 'haces', 'hace' )] faz as coisas direito, as pessoas não têm certeza de que [Select_CString( CHARACTER.IsLocalPlayer, 'has', 'han' )] feito algo."
 nick_the_german: "o/a Alemão/ã[CHARACTER.Custom('ES_AnAna')]"
 #East Francia will be renamed...
 nick_the_german_desc: "As pessoas do [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] reino [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] chamam «$nick_the_german$», mas, na verdade, não [Select_CString( CHARACTER.IsLocalPlayer, 'entiendes', 'entiende' )] por quê."
 nick_the_german_post_mortem: "$nick_the_german$"
 #... Germany when you die!
 nick_the_german_post_mortem_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Sua', 'Sua' )] a morte marcou a transição brusca quando a Francônia Oriental passou a ser chamada de Alemanha."
 nick_the_good: "o/a Bom[CHARACTER.Custom('ES_OA')]"
 nick_the_good_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Sua', 'Sua' )] disposição justa e compromisso com os valores de [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] fé faz com que outros [CHARACTER.GetFaith.GetAdherentNamePluralNoTooltip] vejam com admiração [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )]."
 nick_the_gouty: "o/a Gotoso/a[CHARACTER.Custom('ES_OA')]"
 nick_the_gouty_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tus', 'Sus' )] articulações inflamadas e dolorosamente deformadas apontam para [Select_CString( CHARACTER.IsLocalPlayer, 'tu persona', CHARACTER.GetShortUINameNoTooltip )] como parte das classes altas e luxuosas da sociedade. Talvez #EMP demasiado#! luxuosas."
 nick_the_great: "o Grande"
 nick_the_great_desc: "Os feitos de [Select_CString( CHARACTER.IsLocalPlayer, 'tu persona', CHARACTER.GetShortUINameNoTooltipNoFormat )] são lendários. O povo canta canções sobre [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] feitos, e a nobreza resmunga sobre expectativas injustas."
 nick_the_hammer: "o Martelo"
 nick_the_hammer_desc: "Quem quiser saber por que [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] chamam de «$nick_the_hammer$» só precisa perguntar aos [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] inimigos desafortunados."
 nick_the_handsome: "o/a Belo(a)[CHARACTER.Custom('ES_OA')]"
 nick_the_handsome_desc: "#EMP Oh, cielos#!. Poucas pessoas no mundo podem se gabar dessa mandíbula esculpida, desses ombros retos, ou da beleza de [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] mirada."
 nick_the_heathen: "o/a Pagão"
 nick_the_heathen_desc: "Em uma conversão verdadeiramente terrível, [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )] não apenas [Select_CString( CHARACTER.IsLocalPlayer, 'abandonaste tu', 'abandonó su' )] fé, mas #EMP toda#! a tradição religiosa, trocando-a por uma visão totalmente अलगada da ordem divina."
 nick_the_heathen_rebel: "$nick_the_heathen$"
 nick_the_heathen_rebel_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] célebre por [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] rebelião contra o que [Select_CString( CHARACTER.IsLocalPlayer, 'consideras', 'considera' )] as práticas idólatras de [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] compatriotas e sua falsa teologia."
 nick_the_holy: "o/a Sagrad[CHARACTER.Custom('ES_OA')]"
 nick_the_holy_desc: "Nenhum vício, pecado, sacrilégio ou impiedade mancha [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] vida decretada pela divindade."
 nick_the_hunchback: "o/a Corcunda[CHARACTER.Custom('ES_OA')]"
 nick_the_hunchback_desc: "Ninguém que olhe para [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )] não pode deixar de notar o caroço característico nas costas de [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] e a cabeça projetada de [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )]. Às vezes parece ser tudo o que conseguem ver."
 nick_the_hunter: "o/a Caçador[CHARACTER.Custom('ES_XA')]"
 nick_the_hunter_desc: "O disparo rápido e o olhar mais rápido de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )] têm fama de alcançar léguas em todas as direções. Alguns dizem que [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] arco alcança tão longe quanto a fama de [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] nome."
 nick_the_ironside: "Ironside"
 nick_the_ironside_desc: "Lança, machado, espada, flecha…, [Select_CString( CHARACTER.IsLocalPlayer, 'tienes', 'tiene' )] fama de ter fama de ser capaz de desviar qualquer golpe, do mais majestoso golpe ao punhal de um assassino."
 nick_the_just: "o/a Justo/a[CHARACTER.Custom('ES_OA')]"
 nick_the_just_desc: "Lei e ordem são o fundamento de tudo o que há de bom na vida. Sem lei, a ordem é tirânica; sem ordem, a lei é impotente."
 nick_the_kind: "o Bondoso"
 nick_the_kind_desc: "Uma palavra serena, um sorriso reconfortante, um convite em um dia frio…, [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )] [Select_CString( CHARACTER.IsLocalPlayer, 'crees', 'cree' )] que o mundo pode ser movido por um pouco de compaixão."
 nick_the_lame: "o/a Manc[CHARACTER.Custom('ES_OA')]"
 nick_the_lame_desc: "Atingid[CHARACTER.Custom('ES_OA')] de uma perna manca, o mundo não só se recusa a se adaptar, como nem mesmo deixa que [CHARACTER.GetShortUINameNoTooltipNoFormat]o [Select_CString( CHARACTER.IsLocalPlayer, 'olvides', 'olvide' )]."
 nick_the_lawgiver: "o/a Legislador[CHARACTER.Custom('ES_XA')]"
 #em-dashes out in memory of Maxi.
 nick_the_lawgiver_desc: "Regras, ordem, devido processo… Os presentes de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )] a [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] povo são muitos."
 nick_the_liberator: "o/a Libertador[CHARACTER.Custom('ES_XA')]"
 nick_the_liberator_desc: "Com aço afiado ou palavras persuasivas, [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )] [Select_CString( CHARACTER.IsLocalPlayer, 'has', 'ha' )] conquistou grandes liberdades para aqueles em cativeiro."
 nick_the_lion: "o/a Le[CHARACTER.Custom('ES_OnOna')]"
 nick_the_lion_desc: "Nobre, feroz, majestoso: se o leão é o rei das feras, então [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] semelhança óbvia com o animal sugere um destino brilhante para [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )]."
 nick_the_lionheart: "o Coração de Leão"
 #I wish to protest having to write nice things about Richard the Lionheart.
 ## Everyone knows Edward I is the superior English king, and that his great uncle sucks.
 nick_the_lionheart_desc: "Valente até o exagero, devastador[CHARACTER.Custom('ES_XA')] na batalha, letal em duelo. Quem se pergunta como [Select_CString( CHARACTER.IsLocalPlayer, 'te has', 'se ha')] ganhou este apelido, está claro que não conhece nada de [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetShortUINameNoTooltipNoFormat )]."
 nick_the_lisp_and_lame: "o/a Gago[CHARACTER.Custom('ES_OA')] Cox[CHARACTER.Custom('ES_OA')]"
 nick_the_lisp_and_lame_desc: "Não satisfeito com um andar lento e desajeitado, [CHARACTER.GetFaith.HealthGodName] também achou por bem amaldiçoar [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )] com um horrível ceceio."
 nick_the_magnificent: "o/a Magnífic[CHARACTER.Custom('ES_OA')]"
 nick_the_magnificent_desc: "As histórias de [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] façanhas esplêndidas são contadas da Irlanda até Catay."
 nick_the_martyr: "o Mártir"
 nick_the_martyr_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] morreu por [CHARACTER.GetFaith.HighGodName], e os [CHARACTER.GetFaith.GetAdherentNamePlural] do mundo lembram [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] sacrifício."
 nick_the_merry: "o/a Alegre"
 nick_the_merry_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'é', 'é' )] célebre por [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] grande bom humor, boas piadas e festas excelentes."
 nick_the_honorable: "o/a Honorável"
 nick_the_honorable_desc: "Quando um acordo é fechado ou quando [Select_CString( CHARACTER.IsLocalPlayer, 'das', 'da' )]a palavra, pode-se confiar que [CHARACTER.GetShortUINameNoTooltipNoFormat]a [Select_CString( CHARACTER.IsLocalPlayer, 'mantendrás', 'mantendrá' )]com tanta firmeza quanto o aço."
 nick_the_greedy: "o/a Ganancioso[CHARACTER.Custom('ES_OA')]"
 nick_the_greedy_desc: "O que é melhor do que um saco de prata? Dois sacos de prata!"
 nick_the_monk: "o/a Monj[CHARACTER.Custom('ES_EA')]"
 nick_the_monk_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tu', 'Su' )] porte religioso e estilo de vida contido fazem de [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetShortUINameNoTooltipNoFormat )] [Select_CString( CHARACTER.IsFemale, 'la monja', 'el monje' )] o ideal para muitos."
 nick_the_noble: "o Nobre"
 #Technically "HerHim" would be more correct here, be "SheHe" reads nicer IMHO.
 nick_the_noble_desc: "Embora haja muitos nobres neste mundo, poucos se aproximam tanto dos ideais da palavra quanto [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe)]."
 nick_the_old: "o/a Velh[CHARACTER.Custom('ES_OA')]"
 nick_the_old_desc: "Não é raro que as pessoas cumprimentem [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )] com espanto ao ver que [Select_CString( CHARACTER.IsLocalPlayer, 'sigues', 'sigue')] ainda está vivo."
 nick_the_pious: "o/a Piedoso/a[CHARACTER.Custom('ES_OA')]"
 nick_the_pious_desc: "O fervor e a dedicação de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )] a [CHARACTER.GetFaith.GetName|l] são considerados uma marca de devoção intensa e inspiradora."
 nick_the_proud: "o/a Orgulhoso/a[CHARACTER.Custom('ES_OA')]"
 nick_the_proud_desc: "A maioria dos nobres aprende a manter a postura ereta o tempo todo, mas poucos fazem disso motivo de orgulho como [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )]."
 nick_the_quarreller: "o(a) Briguento(a)[CHARACTER.Custom('ES_OA')]"
 nick_the_quarreller_desc: "Considera-se prudente não iniciar uma conversa com [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )], a menos que você tenha algumas horas de sobra. Às vezes, dias."
 nick_the_restorer: "o/a Restaurador[CHARACTER.Custom('ES_XA')]"
 nick_the_restorer_desc: "Quando o reino parecia perdido nas trevas, #EMP [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )]#! [Select_CString( CHARACTER.IsLocalPlayer, 'emergiste', 'emergió' )] para trazê-lo de volta à luz."
 nick_the_saint: "o/a Sant[CHARACTER.Custom('ES_OA')]"
 nick_the_saint_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer,'has', 'ha' )] entrou para a história do [CHARACTER.GetFaith.GetName|l] como um[CHARACTER.Custom('ES_XA')] dos seus seguidores mais abençoad[CHARACTER.Custom('ES_OA')]os. Acabad[CHARACTER.Custom('ES_OA')]os e por assim dizer."
 nick_the_scholar: "o(a) Erudit[CHARACTER.Custom('ES_OA')]"
 nick_the_scholar_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Sua', 'Sua' )] sabedoria e conhecimento fazem parte do corpus de muitas academias eruditas."
 nick_the_silent: "o/a Silencios[CHARACTER.Custom('ES_OA')]"
 nick_the_silent_desc: "O silêncio é ouro e [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )] [Select_CString( CHARACTER.IsLocalPlayer, 'tienes', 'tiene' )] abundância disso."
 nick_the_stammerer: "o/a Gago[CHARACTER.Custom('ES_OA')]"
 nick_the_stammerer_desc: "Embora a articulação de [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] frases possa ser eloquente, a sua entrega deixa muito a desejar."
 nick_the_stranger: "o/a Estranho[CHARACTER.Custom('ES_OA')]"
 nick_the_stranger_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'llegaste', 'llegó' )] a [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] domínio de muito longe. Mesmo agora, muitos dos [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] hábitos ainda são estranhos e estrangeiros."
 nick_the_strong: "o Forte"
 nick_the_strong_desc: "O mundo em geral [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] considera capaz de partir pedras… com os dentes."
 nick_the_troubadour: "o/a Trovador[CHARACTER.Custom('ES_XA')]"
 nick_the_troubadour_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] conhecido[CHARACTER.Custom('ES_OA')] por [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] bela voz e inclinação para a música. Ao menos, por aqueles de quem ele/ela [Select_CString( CHARACTER.IsLocalPlayer, 'caes', 'cae' )] bem."
 nick_the_unready: "o/a Indeciso[CHARACTER.Custom('ES_OA')]"
 nick_the_unready_desc: "É raro o conflito ou discussão que não sobrecarrega completamente [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )]."
 nick_the_unready_anglo_saxon: "$nick_the_unready$"
 nick_the_unready_anglo_saxon_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tu', 'Su' )] nome se traduz literalmente como «Conselho nobre». [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )|U] causa não pouca irritação receber o apelido «[CHARACTER.Custom('ES_ElLa')] Indecis[CHARACTER.Custom('ES_OA')]» ou «Conselho nobre sem conselhos». Provavelmente porque alguém pensou que o trocadilho era engraçado."
 nick_the_usurper: "o/a Usurpador[CHARACTER.Custom('ES_XA')]"
 nick_the_usurper_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'derrocaste', 'derrocó' )] ao legítimo senhor de [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] feudo, tomando o que lhe pertencia à ponta da espada."
 nick_the_victorious: "o/a Vitorios[CHARACTER.Custom('ES_OA')]"
 nick_the_victorious_desc: "O triunfo [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] chega naturalmente a [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetShortUINameNoTooltipNoFormat )] e o mundo concorda."
 nick_the_viking: "o/a Viking[CHARACTER.Custom('ES_OA')]"
 nick_the_viking_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] sempre [Select_CString( CHARACTER.IsLocalPlayer, 'has', 'ha' )] acreditado que a propriedade é um conceito mais maleável do que a maioria das pessoas."
 nick_the_young: "o/a Jovem"
 nick_the_young_desc: "Sendo jovem, [Select_CString( CHARACTER.IsLocalPlayer, 'encontraste', 'encontró' )] distinção e notoriedade. Não importa quantos anos passem, [Select_CString( CHARACTER.IsLocalPlayer, 'estás', 'está' )] segur[CHARACTER.Custom('ES_OA')] de que o epíteto vai pegar."
 nick_the_younger: "o Mais Jovem"
 nick_the_younger_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'tienes', 'tiene' )] a infelicidade de compartilhar nome com outra pessoa notável e, por isso, [Select_CString( CHARACTER.IsLocalPlayer, 'has', 'ha' )] sido rebaixad[CHARACTER.Custom('ES_OA')] para sempre a [CHARACTER.GetFirstName] #EMP «$nick_the_younger$»#!."
 nick_whiteshirt: "Camisa Branca"
 nick_whiteshirt_desc: "As pessoas costumam perguntar[Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] por que [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] chamam «$nick_whiteshirt$». E [CHARACTER.GetShortUINameNoTooltipNoFormat] apenas [Select_CString( CHARACTER.IsLocalPlayer, 'sonríes', 'sonríes' )]."
 nick_the_cannibal: "o/a Canibal"
 nick_the_cannibal_desc: "Poucas pessoas conseguem suportar [Select_CString( CHARACTER.IsLocalPlayer, 'seu', 'seu' )] sorriso de lábios entreabertos, especialmente quando sangue fresco escorre por [Select_CString( CHARACTER.IsLocalPlayer, 'seus', 'seus' )] dentes bem cuidados."
 nick_the_dragon: "o/a Drag[CHARACTER.Custom('ES_OnOna')]"
 nick_the_dragon_desc: "$nick_the_dragoness_desc$"
 nick_the_devourer: "o/a Devorador[CHARACTER.Custom('ES_XA')]"
 nick_the_devourer_desc: "O mundo treme ao pensar em quantas vidas caíram em [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] fauces sem fundo…"
 nick_the_bewitched: "o/a Enfeitiçad[CHARACTER.Custom('ES_OA')]"
 nick_the_bewitched_desc: "Abandonad[CHARACTER.Custom('ES_OA')] por [CHARACTER.GetFaith.HighGodName] e amaldiçoad[CHARACTER.Custom('ES_OA')] por [CHARACTER.GetFaith.WitchGodName], quando as pessoas falam de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )], frequentemente é com pena."
 nick_the_witch: "a Bruxa[CHARACTER.Custom('ES_OA')]"
 nick_the_witch_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] considerad[CHARACTER.Custom('ES_OA')] uma traficante de coisas estranhas além do véu da mundanidade."
 nick_the_unfaithful: "o/a Infiel"
 nick_the_unfaithful_desc: "Os votos de casamento são mais como... diretrizes de casamento na [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] opinião."
 nick_the_unchaste: "o(a) Impudico(a)[CHARACTER.Custom('ES_OA')]"
 nick_the_unchaste_desc: "Acredita-se que [CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] [Select_CString( CHARACTER.IsFemale, 'una lujuriosa', 'un lujurioso' )] fora do casamento."
 nick_the_beguiling: "o/a Cativante[CHARACTER.Custom('ES_XA')]"
 nick_the_beguiling_desc: "Diz-se que um olhar recatado [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] pode provocar… um enfraquecimento dos joelhos."
 nick_the_temptress: "a Tentadora"
 nick_the_temptress_desc: "Ao [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] dedo torto, nobres e plebeus caem em sua armadilha por igual."
 nick_the_seductress: "a Sedutora"
 nick_the_seductress_desc: "Um sorriso diz mil palavras — palavras que provavelmente não poderiam ser ditas em boa companhia."
 nick_the_lewd: "o/a Lascivo[CHARACTER.Custom('ES_OA')]"
 nick_the_lewd_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tus', 'Sus' )] comentários, comportamento e, às vezes, vigorosa gesticulação física são, no melhor dos casos, pouco sutis."
 nick_the_lecher: "o/a Libidinoso[CHARACTER.Custom('ES_OA')]"
 nick_the_lecher_desc: "As pessoas que [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] gostam se acostumam com [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] sua baba. Ou vão embora."
 nick_the_seducer: "o Sedutor"
 nick_the_seducer_desc: "$nick_the_seductress_desc$"
 nick_the_shadow: "a Sombra"
 #Big RIP Bleden Mark.
 nick_the_shadow_desc: "Os rumores dizem que, onde quer que a escuridão caia, [CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString( CHARACTER.IsLocalPlayer, 'tienes', 'tiene' )] ouvidos."
 nick_the_whisperer: "o/a Sussurrador[CHARACTER.Custom('ES_XA')]"
 nick_the_whisperer_desc: "Assim chamado[CHARACTER.Custom('ES_OA')] porque [CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString( CHARACTER.IsLocalPlayer, 'pasas', 'pasa' )] passa mais tempo falando em voz baixa do que é apropriado."
 nick_the_spider: "a Aranha"
 nick_the_spider_desc: "Tenha cuidado na corte, dizem. Aonde quer que você vá, encontrará $nick_the_spider$."
 nick_the_fox: "a Rapos[CHARACTER.Custom('ES_OA')]"
 nick_the_fox_desc: "Astuto[CHARACTER.Custom('ES_OA')] , sagaz, ambicioso[CHARACTER.Custom('ES_OA')]… Pode ser que [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] virtudes não sejam cavalheirescas, mas sim #EMP son#! eficazes."
 nick_the_shrewd: "o/a Astuto/a[CHARACTER.Custom('ES_OA')]"
 nick_the_shrewd_desc: "É aconselhável nunca jogar cartas contra [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetSheHe)]; poucos podem ter certeza do que [Select_CString( CHARACTER.IsLocalPlayer, 'llevas', 'lleva' )] traz na manga."
 nick_the_gracious: "o/a Gracios[CHARACTER.Custom('ES_OA')]"
 nick_the_gracious_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tus', 'Sus' )] bons modos, porte nobre e indulgência majestosa fazem com que [CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString( CHARACTER.IsLocalPlayer, 'seas', 'sea' )] muito popular na maioria das mesas."
 nick_the_magnanimous: "o Magnânimo[CHARACTER.Custom('ES_OA')]"
 nick_the_magnanimous_desc: "Que nunca se diga que [Select_CString( CHARACTER.IsLocalPlayer, 'dejaste', 'dejó' )] deixou algo sem dar."
 nick_the_architect: "o/a Arquiteto[CHARACTER.Custom('ES_OA')]"
 nick_the_architect_desc: "A maioria olha para uma pilha de tijolos e madeira e vê o trabalho de um operário. [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )|U] [Select_CString( CHARACTER.IsLocalPlayer, 'ves', 've' )] #EMP potencial#!."
 nick_the_wise: "o/a Sábio/a[CHARACTER.Custom('ES_OA')]"
 nick_the_wise_desc: "É considerado sensato pedir [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] opinião, se se [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] puder convencer a dá-la."
 nick_the_impaler: "o/a Empalador[CHARACTER.Custom('ES_XA')]"
 nick_the_impaler_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tus', 'Sus' )] os métodos de justiça podem ser severos, mas a taxa de reincidência #EMP es#! pequena."
 nick_the_tormentor: "o/a Atormentador[CHARACTER.Custom('ES_XA')]"
 nick_the_tormentor_desc: "A maioria prefere morrer pela espada de um oficial de justiça a se deixar levar para [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] masmorras."
 nick_the_depraved: "o/a Depravad[CHARACTER.Custom('ES_OA')]"
 nick_the_depraved_desc: "O povo cochicha que [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] desejos não são naturais. [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )|U] os [Select_CString( CHARACTER.IsLocalPlayer, 'consideras', 'considera' )] simplesmente #EMP refinados#!."
 nick_the_monster: "o monstro[CHARACTER.Custom('ES_OA')]"
 nick_the_monster_desc: "O campesinato acha que [CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] um monstro, um pesadelo chupador de sangue vindo se banquetear com a medula dos filhos deles. Esperemos que estejam errados."
 nick_the_wicked: "o Perverso"
 nick_the_wicked_desc: "O [CHARACTER.GetFaith.GetName|l] tem muitas restrições… que [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )] [Select_CString( CHARACTER.IsLocalPlayer, 'sueles', 'suele' )] tende a infringir habitualmente."
 nick_the_accursed: "o/a Maldit[CHARACTER.Custom('ES_OA')]"
 nick_the_accursed_desc: "É raro o [CHARACTER.GetFaith.PriestNeuter] capaz de pronunciar [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] nome sem cuspir na terra."
 nick_priest_hater: "o Odiador de Sacerdotes"
 nick_priest_hater_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Sua', 'Sua' )] aversão ao clero é bem conhecida e, devido à capacidade dos sacerdotes de escrever, bem documentada."
 nick_priest_eater: "o Comedor de Sacerdotes"
 nick_priest_eater_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'detestas', 'detesta' )] tudo o que diz respeito ao clero, menos o gosto."
 nick_the_able: "o/a Hábil[CHARACTER.Custom('ES_OA')]"
 nick_the_able_desc: "Governar um domínio? Lutar uma batalha? Preparar uma refeição? Acalmar uma criança? Projetar um edifício? Arrancar um dente? Há poucas coisas que [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )] não [Select_CString( CHARACTER.IsLocalPlayer, 'sepas', 'sepa' )] fazer quando [Select_CString( CHARACTER.IsLocalPlayer, 'te pones', 'se pone' )] a isso. Afinal, a especialização é para os insetos."
 nick_the_mad: "o/a Louc[CHARACTER.Custom('ES_OA')]"
 nick_the_mad_desc: "Se a gente soubesse o que [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )] [Select_CString( CHARACTER.IsLocalPlayer, 'sabes', 'sabe' )], também riria: esta vida é um jogo de um deus louco."
 nick_the_ruthless: "o Impiedoso"
 nick_the_ruthless_desc: "Nem todo mundo tem força para fazer o que precisa ser feito. Nem todo mundo, mas [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )] sim."
 nick_the_simple: "o Simples"
 nick_the_simple_desc: "Os pensamentos de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )] podem ser melhor descritos como abençoadamente livres de peso."
 nick_the_leper: "o(a) Leproso(a)[CHARACTER.Custom('ES_OA')]"
 nick_the_leper_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] nunca [Select_CString( CHARACTER.IsLocalPlayer, 'podrías', 'podría' )] esquecer a doença que lentamente consome [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] carne. De qualquer forma, o mundo adora lembrá[Select_CString( CHARACTER.IsLocalPlayer, 'telo', 'selo' )]."
 nick_half_hand: "Meia-Mão"
 nick_half_hand_desc: "Alguns dizem que [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] falta um dedo. Outros, que metade da mão, e ainda mais que [Select_CString( CHARACTER.IsLocalPlayer, 'tienes', 'tiene' )] o braço dividido até o cotovelo. A [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetShortUINameNoTooltipNoFormat )] não [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] gosta de comentar."
 nick_the_hideous: "o Hediondo"
 nick_the_hideous_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'tienes', 'tiene' )] um rosto que só uma mãe poderia amar. Ou esperamos que amasse."
 nick_the_frog: "o Sapo"
 nick_the_frog_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tus', 'Sus' )] características têm algo de batráquio. Fora do alcance de [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] ouvidos, geralmente se usam explicações menos #EMP corteses#!."
 nick_the_repulsive: "o/a Repulsiv[CHARACTER.Custom('ES_OA')]"
 nick_the_repulsive_desc: "A superlotação raramente é um problema quando [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )] [Select_CString( CHARACTER.IsLocalPlayer, 'estás', 'está')] por perto."
 nick_the_frail: "o Frágil"
 nick_the_frail_desc: "Costuma-se dizer que [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] ossos são feitos de vidro — ao menos, se estilhaçam como vidro."
 nick_the_weak: "o Fraco"
 nick_the_weak_desc: "Algumas crianças fanfarronas acham que poderiam lutar contra [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )] e vencer. [CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString( CHARACTER.IsLocalPlayer, 'preferirías', 'preferiría' )] preferiria não testar a teoria."
 nick_the_brute: "o/a Brut[CHARACTER.Custom('ES_OA')]"
 nick_the_brute_desc: "Nunca dado[CHARACTER.Custom('ES_OA')] a fugir da violência, [Select_CString( CHARACTER.IsLocalPlayer, 'trazas', 'traza' )] pouca distinção entre dano físico, social e mental. No fim, tudo corta do mesmo jeito, não é?"
 nick_the_bear: "o/a Urs[CHARACTER.Custom('ES_OA')]"
 nick_the_bear_desc: "A forma peluda e imponente de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )] pode ser intimidante…, embora, é preciso reconhecer, não para #EMP todos#!."
 nick_the_terrible: "o Terrível"
 nick_the_terrible_desc: "As crianças choram, os camponeses tremem e o leite azeda quando [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )] [Select_CString( CHARACTER.IsLocalPlayer, 'pasas', 'pasas' )] por perto. Supostamente."
 nick_the_tyrant: "o/a Tirano[CHARACTER.Custom('ES_OA')]"
 nick_the_tyrant_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] #EMP [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )]#! o reino, e qualquer um que discordar aprenderá o que o reino faz com traidores."
 nick_the_wolf: "o/a Lob[CHARACTER.Custom('ES_OA')]"
 nick_the_wolf_desc: "Astuto[CHARACTER.Custom('ES_OA')], vicioso[CHARACTER.Custom('ES_OA')], nobre, mas raramente honroso. Há piores formas de resumir [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )]."
 nick_the_benevolent: "o Benevolente"
 nick_the_benevolent_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'te comprometes', 'se compromete' )] com patronatos e caridade sempre que [Select_CString( CHARACTER.IsLocalPlayer, 'puedes', 'puede' )]."
 nick_the_philosopher: "o/a Filósof[CHARACTER.Custom('ES_OA')]"
 nick_the_philosopher_desc: "O mundo natural está cheio de curiosidades, mistérios e enigmas, e [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )] [Select_CString( CHARACTER.IsLocalPlayer, 'adoras', 'adora' )] adora falar sobre eles. Longamente."
 nick_the_compassionate: "o/a Compassivo[CHARACTER.Custom('ES_OA')]"
 nick_the_compassionate_desc: "O que é o melhor da vida de [Select_CString( CHARACTER.IsLocalPlayer, 'seu personagem', CHARACTER.GetShortUINameNoTooltipNoFormat )]? Fazer amizade com um inimigo, ver seu ódio ceder diante de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetSheHe )] e sentir a alegria da reconciliação."
 nick_the_theologian: "o/a Teólog[CHARACTER.Custom('ES_OA')]"
 nick_the_theologian_desc: "Para que serve a vida, senão para explorar a verdadeira natureza de [CHARACTER.GetFaith.CreatorName]?"
 nick_the_enlightened: "o/a Iluminad[CHARACTER.Custom('ES_OA')]"
 nick_the_enlightened_desc: "O conhecimento superior é sua própria recompensa, mas ser reconhecid[CHARACTER.Custom('ES_OA')] por isso #EMP sí#! é bastante agradável."
 nick_the_stalwart: "o/a Resistente[CHARACTER.Custom('ES_OA')]"
 #Kyros Go Home.
 nick_the_stalwart_desc: "Não importa quão forte seja a tempestade, quantas lâminas cruzem o ar ou quantas tumbas haja no chão, [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )] [Select_CString( CHARACTER.IsLocalPlayer, 'resistirás', 'resistirá' )]. [Select_CString( CHARACTER.IsLocalPlayer, 'Tienes', 'Tiene' )] que fazê-lo."
 nick_the_merciless: "o/a Cruel[CHARACTER.Custom('ES_OA')]"
 nick_the_merciless_desc: "Nenhum quartel é dado nem esperado. Os amigos [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim)] chamam pragmátic[CHARACTER.Custom('ES_OA')]. Os inimigos, desonroso."
 nick_the_imperious: "o/a Imperioso[CHARACTER.Custom('ES_OA')]"
 nick_the_imperious_desc: "Não há mais razão que a da força, e como sempre [Select_CString( CHARACTER.IsLocalPlayer, 'tienes', 'tiene')] a razão, [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] cabe assegurar[Select_CString( CHARACTER.IsLocalPlayer, 'te', 'se' )] que todos saibam que [CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString( CHARACTER.IsLocalPlayer, 'tienes', 'tiene' )] a força."
 nick_the_poet: "o/a Poe[CHARACTER.Custom('ES_TaTisa')]"
 nick_the_poet_desc: "Por onde [Select_CString( CHARACTER.IsLocalPlayer, 'vas', 'va' )], logo em seguida se ouve o som de uma pena arranhando desajeitadamente rimas e versos."
 nick_the_cosmic_poet: "o Poeta[CHARACTER.Custom('ES_TaTisa')] Cósmico[CHARACTER.Custom('ES_OA')]"
 nick_the_cosmic_poet_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tienes', 'Tiene' )] a cabeça nas nuvens, e os pensamentos entre as estrelas."
 nick_the_gardener: "o/a Jardineiro[CHARACTER.Custom('ES_OA')]"
 nick_the_gardener_desc: "Para [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] mente, o mundo inteiro é um jardim — se o cultivar, ele crescerá."
 nick_the_mindbreaker: "o Quebra-Mentes"
 nick_the_mindbreaker_desc: "As pessoas sussurram com temor sobre o que acontece com aqueles que experimentam [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] intentos torturantes."
 nick_the_flayer: "O Esfolador[CHARACTER.Custom('ES_XA')]"
 nick_the_flayer_desc: "Graças a [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetShortUINameNoTooltipNoFormat )]o reino conhece intimamente o que dizem sobre os segredos de um homem esfolado."
 nick_the_meticulous: "o/a Meticulos[CHARACTER.Custom('ES_OA')]"
 nick_the_meticulous_desc: "Atenção aos detalhes é importante, e a falta dela demonstra uma falha de caráter, pelo menos segundo [CHARACTER.GetShortUINameNoTooltipNoFormat]."
 nick_the_heartbreaker: "o/a Rompecorações"
 nick_the_heartbreaker_desc: "Dizem que a [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetShortUINameNoTooltipNoFormat )] [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] gosta um pouco de perigo."
 nick_the_bully: "o/a Valentão[CHARACTER.Custom('ES_OnOna')]"
 nick_the_bully_desc: "O [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetShortUINameNoTooltipNoFormat )] [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] gosta de implicar[Select_CString( CHARACTER.IsLocalPlayer, 'te', 'se' )] com aqueles que [Select_CString( CHARACTER.IsLocalPlayer, 'consideras', 'considera' )] considera inferiores a [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetSheHe)]."
 nick_the_foolish: "o/a Tolo/a[CHARACTER.Custom('ES_OA')]"
 nick_the_foolish_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'é', 'é' )] célebre por [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )]… abordagem #EMP particular#! para a tomada de decisões."
 nick_the_gullible: "[CHARACTER.Custom('ES_ElLa')] Ingênu[CHARACTER.Custom('ES_OA')]"
 nick_the_gullible_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'é', 'é' )] confiante demais[CHARACTER.Custom('ES_OA')] para [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] próprio bem."
 nick_the_undefeated: "o/a Invicto[CHARACTER.Custom('ES_OA')]"
 nick_the_undefeated_desc: "Absolutamente e totalmente invicto[CHARACTER.Custom('ES_OA')] em combate, nunca [Select_CString( CHARACTER.IsLocalPlayer, 'has', 'ha' )] sentido o pungir de uma derrota ignominiosa."
 nick_the_triumphant: "o Triunfante"
 nick_the_triumphant_desc: "Quando o mundo apresentou um campeão que se proclamava invencível, [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )] o [Select_CString( CHARACTER.IsLocalPlayer, 'abatiste', 'abatió' )] e [Select_CString( CHARACTER.IsLocalPlayer, 'cercenaste', 'cercenó' )] sua lenda."
 nick_the_fury: "o(a) Fúrios[CHARACTER.Custom('ES_OA')]"
 nick_the_fury_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tu', 'Su' )] ira, rancor e #EMP venganza#! são considerados uma terrível certeza. Uma que #EMP es#! inevitável."
 nick_feareater: "Devorador do Medo"
 nick_feareater_desc: "O medo, o ódio e o #EMP terror#! do inimigo motivam [CHARACTER.LocalPlayerString( 'tu persona', CHARACTER.GetShortUINameNoTooltipNoFormat )], incitando[Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] a atos de carnificina e crueldade. Atos muito, muito eficazes."
 nick_the_hawk: "o Falcão"
 nick_the_hawk_desc: "Pouco escapa da [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] mirada penetrante e nada escapa de [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] garras afiadas."
 nick_the_trustworthy: "o/a Confiável"
 nick_the_trustworthy_desc: "Firme, confiável, cativantemente sincero[CHARACTER.Custom('ES_OA')] embora escandalosamente ingênuo[CHARACTER.Custom('ES_OA')] com [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] inimigos."
 nick_the_trustworthy_ironic: "$nick_the_trustworthy$"
 nick_the_trustworthy_ironic_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U], literalmente, nunca [Select_CString( CHARACTER.IsLocalPlayer, 'has', 'ha' )]contou uma mentira na vida."
 nick_the_unrelenting: "o/a Incansável"
 nick_the_unrelenting_desc: "Quando [Select_CString( CHARACTER.IsLocalPlayer, 'te empeñas', 'se empeña' )] em algo, o [Select_CString( CHARACTER.IsLocalPlayer, 'consigues', 'consigue' )]. Não importa quanto tempo leve."
 nick_the_glorious: "o/a Glorios[CHARACTER.Custom('ES_OA')]"
 nick_the_glorious_desc: "Certamente [CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'pasarás', 'pasará' )] entrará para a história como um dos indivíduos mais imponentes que já enfeitaram o mundo."
 nick_the_ecumenist: "o Ecumenista"
 nick_the_ecumenist_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tus', 'Sus' )] os esforços para a consolidação e conciliação do mundo cristão fazem de [CHARACTER.LocalPlayerString( 'ti', CHARACTER.GetShortUINameNoTooltipNoFormat )] [Select_CString( CHARACTER.IsFemale, 'una heroína', 'un héroe' )] para muitos, embora também um[CHARACTER.Custom('ES_XA')] herege para alguns."
 nick_the_unifier_of_africa: "o/a Unificador[CHARACTER.Custom('ES_XA')] da África"
 nick_the_unifier_of_africa_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'é', 'é' )] a primeira pessoa da história a unir a África sob [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] estandarte."
 nick_the_motherfather_of_spain: "o/a [CHARACTER.GetMotherFather|U] da Espanha"
 nick_the_motherfather_of_spain_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'uniste', 'unió' )] vários reinos ibéricos diversos em um só, uma base sólida — a Espanha."
 nick_the_ladylord_of_the_ganges: "o [CHARACTER.GetLadyLord] do Ganges"
 nick_the_ladylord_of_the_ganges_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] [CHARACTER.Custom('ES_ElLa')] tesoureiro[CHARACTER.Custom('ES_XA')] sagrad[CHARACTER.Custom('ES_OA')] do rio #EMP más#! sagrado do mundo."
 nick_the_wend: "o/a Wend[CHARACTER.Custom('ES_OA')]"
 nick_the_wend_desc: "Tendo consolidado os diversos reinos eslavos ocidentais em um só, [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] é uma lenda em [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] tempo."
 nick_the_crowned: "[CHARACTER.Custom('ES_ElLa')] Coroado[CHARACTER.Custom('ES_OA')]"
 nick_the_crowned_desc: "Houve coroas antes que a [Select_CString(CHARACTER.IsLocalPlayer,'tuya','suya')], claro, mas #EMP esas#! quase não contam."
 nick_the_bogatyr: "o Bogatyr"
 nick_the_bogatyr_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] reconhecid[CHARACTER.Custom('ES_OA')] por ter conseguido unificar todos os povos eslavos."
 nick_the_polyanitsa: "a Polyanitsa"
 nick_the_polyanitsa_desc: "$nick_the_bogatyr_desc$"
 nick_the_dane: "o/a dinamarquês/a[CHARACTER.Custom('ES_OA')]"
 nick_the_dane_desc: "O mundo [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim)] conhece como um escandinavo[CHARACTER.Custom('ES_OA')] infame. Não se importa muito com que #EMP tipo#!."
 nick_pendragon: "Pendragon"
 nick_pendragon_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'te apoyaste', 'se apoyó' )] em… #EMP antiguas#! lendas antigas para apoiar [Select_CString(CHARACTER.IsLocalPlayer,'tus','sus')] reivindicações sobre a Britânia."
 nick_the_tuatha_de_danann: "os Tuatha Dé Danann"
 nick_the_tuatha_de_danann_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'te apoyaste', 'se apoyó' )] em lendas antigas para sustentar [Select_CString(CHARACTER.IsLocalPlayer,'tus','sus')] direitos à Britânia."
 nick_the_sword_of_god: "a Espada de Deus"
 nick_the_sword_of_god_desc: "Como arma justa escolhida pelo Senhor, [Select_CString( CHARACTER.IsLocalPlayer, 'esculpiste', 'esculpió' )] $e_outremer$ das terras dos infiéis."
 nick_the_messenger_of_christ: "o/a Mensageir[CHARACTER.Custom('ES_OA')] de Cristo"
 nick_the_messenger_of_christ_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'llevaste', 'llevó' )] a palavra do Cordeiro de Deus a todo o povo de $e_outremer$."
 nick_the_maiden_of_virgin: "a Donce[CHARACTER.Custom('ES_LLla')] da Virgem"
 nick_the_maiden_of_virgin_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Sua', 'Sua' )] pureza é tão renomada quanto a própria bendita Mãe de Deus."
 nick_the_knight_of_gabriel: "o Cavaleiro de Gabriel"
 nick_the_knight_of_gabriel_desc: "Como a espada ardente do anjo vingador de Deus, [Select_CString( CHARACTER.IsLocalPlayer, 'levantaste', 'levantó' )] $e_outremer$ tijolo ensanguentado por tijolo."
 nick_the_shepherd: "o/a Pastor[CHARACTER.Custom('ES_XA')]"
 nick_the_shepherd_desc: "Não importa onde os Escolhidos de Deus vagueiem, [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )] os [Select_CString( CHARACTER.IsLocalPlayer, 'ayudarás', 'ayudará' )] a levá-los em segurança para casa."
 nick_the_judge: "o Juiz"
 nick_the_judge_desc: "$k_israel$ tem clamado por juízes justos e verdadeiros ao longo da história. Às vezes se [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] lembra entre eles."
 nick_the_saoshyant: "o Saoshyant"
 nick_the_saoshyant_desc: "Quando o mundo inteiro parecia engolido por [CHARACTER.GetFaith.DevilName], [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )] [Select_CString( CHARACTER.IsLocalPlayer, 'estuviste', 'estuvo' )] lá para restaurar a Luz."
 nick_the_timely_rain: "a Chuva Oportuna"
 nick_the_timely_rain_desc: "A generosidade de [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] espírito e o respeito em [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] porte honram [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )]."
 nick_the_jade_unicorn: "o Unicórnio de Jade"
 nick_the_jade_unicorn_desc: "A [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetShortUINameNoTooltipNoFormat )] se [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] é considerado(a) imbatível com um bastão."
 nick_the_wizard: "o/a Mag[CHARACTER.Custom('ES_OA')]"
 nick_the_wizard_desc: "As pessoas costumam prestar tanta atenção em [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] pontualidade peculiar que não levam em conta os [Select_CString( CHARACTER.IsLocalPlayer, 'seus', 'seus' )] truques perversos."
 nick_the_big_halberd: "a Grande Alabarda"
 #^Unclear what this one refers to, so rather than assume... the obvious, we allow it to lapse to the default.
 nick_the_panther_head: "a Cabeça de Pantera"
 nick_the_panther_head_desc: "Uns olhos cruéis e penetrantes, bigodes eriçados e um rosnado felino mais do que merecem este epíteto a [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )]."
 nick_the_thunderbolt: "o Raio"
 nick_the_thunderbolt_desc: "Dizem que [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] inimigos só [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] ouvem depois de já terem recebido [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] golpe."
 nick_the_whirlwind: "o Redemoinho"
 nick_the_whirlwind_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'golpeas', 'golpea' )] forte, rápido e, acima de tudo, de forma imprevisível."
 nick_the_beautiful_beard: "a Bela Barba"
 #"HerHim" is probably more grammatically correct, but "SheHe" has a nice ring to it here.
 nick_the_beautiful_beard_desc: "Seu volume, seus cachos, seu perfume fragrante; será que alguém no mundo pode se orgulhar de ostentar uma barba tão majestosa quanto a [Select_CString( CHARACTER.IsLocalPlayer, 'tuya', 'suya' )]?"
 nick_the_tattooed_monk: "o/a Monj[CHARACTER.Custom('ES_EA')] Tatuad[CHARACTER.Custom('ES_OA')]"
 nick_the_tattooed_monk_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tu', 'Su' )] força prodigiosa pode ser lendária, mas [CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString( CHARACTER.IsLocalPlayer, 'te alegras', 'se alegra' )] de que as pessoas se lembrem primeiro da tinta decorosa de [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] corpo."
 nick_the_pilgrim: "o/a Peregrin[CHARACTER.Custom('ES_OA')]"
 nick_the_pilgrim_desc: "Poucas pessoas viajam tão longe ou por tanto tempo quanto [CHARACTER.GetShortUINameNoTooltipNoFormat], mas [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )] [Select_CString( CHARACTER.IsLocalPlayer, 'sabes', 'sabe' )] que, para entender verdadeiramente [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] fé, é preciso experimentá-la em seus lugares mais sagrados e em suas muitas expressões."
 nick_the_black_whirlwind: "Redemoinho Negro"
 nick_the_black_whirlwind_desc: "O olhar de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )] inspira temor nos corações dos homens."
 nick_the_unrestrained: "o/a Desmedid[CHARACTER.Custom('ES_OA')]"
 nick_the_unrestrained_desc: "O apelido de [Select_CString( CHARACTER.IsLocalPlayer, 'tu persona', CHARACTER.GetShortUINameNoTooltipNoFormat )] é tanto um comentário sobre [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] língua sem freios, quanto sobre [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] habilidade para fugir de [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] carcereiros."
 nick_the_winged_tiger: "o Tig[CHARACTER.Custom('ES_EEsa')] Alad[CHARACTER.Custom('ES_OA')]"
 nick_the_winged_tiger_desc: "A única coisa que se iguala a [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] ferocidade é [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] salto vertical."
 nick_the_turbulent_river_dragon: "o Drag[CHARACTER.Custom('ES_OnOna')] ão do Rio Tempestuoso"
 nick_the_turbulent_river_dragon_desc: "A [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetShortUINameNoTooltipNoFormat )] [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] gostam de água e pântanos como um… dragão."
 nick_the_wild: "o/a Selvagem"
 nick_the_wild_desc: "Maníac no olhar, insensat nos atos e frenétic no campo de batalha."
 nick_the_ferocious_giant: "o/a Gigante[CHARACTER.Custom('ES_EA')] Feroz"
 nick_the_ferocious_giant_desc: "Pode que o epônimo de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )] não seja poético, mas poucos podem negar sua precisão."
 nick_the_prodigy: "o Prodígio"
 nick_the_prodigy_desc: "Polímata reconhecid[CHARACTER.Custom('ES_OA')]; [Select_CString( CHARACTER.IsLocalPlayer, 'demuestras', 'demuestra' )]uma habilidade imensa em praticamente tudo aquilo a que [Select_CString( CHARACTER.IsLocalPlayer, 'te propones', 'se propone' )]."
 nick_the_defender_of_highgod: "o defensor[CHARACTER.Custom('ES_XA')] de [CHARACTER.GetFaith.HighGodName]"
 nick_the_defender_of_highgod_desc: "[CHARACTER.GetFaith.GetName|l] tem poucos guardiões assim no mundo mortal como [CHARACTER.GetShortUINameNoTooltipNoFormat]."
 nick_the_blood_motherfather: "o [CHARACTER.GetMotherFather|U] de Sangue"
 nick_the_blood_motherfather_desc: "As pessoas sussurram sobre [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] apelido com medo e admiração. É preciso ser um tipo muito particular de [CHARACTER.Custom('MatriarchPatriarch')] para tratar a família como [Select_CString( CHARACTER.IsLocalPlayer, 'haces', 'hace' )] [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )]."
 nick_the_divine: "o/a Divin[CHARACTER.Custom('ES_OA')]"
 nick_the_divine_desc: "Quando ouvem falar de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )], poucos conseguem pensar em qualquer outra coisa. Será que [Select_CString( CHARACTER.IsLocalPlayer, 'estarás', 'estará' )] como pouco tocad[CHARACTER.Custom('ES_OA')] pela divindade?"
 nick_the_anointed: "o/a Ungid[CHARACTER.Custom('ES_OA')]"
 nick_the_anointed_desc: "Os camponeses sussurram que [CHARACTER.GetFaith.HighGodName] [Select_CString( CHARACTER.IsLocalPlayer, ' te', '' )] escolheu [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetShortUINameNoTooltipNoFormat )] para realizar Sua obra no mundo mortal."
 nick_the_stupor_mundi: "Stupor Mundi"
 nick_the_stupor_mundi_desc: "Talvez seja um pouco arrogante, mas… o que mais [Select_CString( CHARACTER.IsLocalPlayer, 'puedes ser', 'puede ser' )] [CHARACTER.GetShortUINameNoTooltipNoFormat], senão a Maravilha do Mundo?"
 nick_the_glass: "o [CHARACTER.GetWomanMan|U] de Vidro"
 nick_the_glass_desc: "A obsessão de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )] em construir estranhas choupanas de vidro é tão comentada quanto confusa."
 nick_the_trojan: "o(a) troiano(a)[CHARACTER.Custom('ES_OA')]"
 nick_the_trojan_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'rivalizaste', 'rivalizó' )] rivalizou com os feitos do antigo Corineu ao trazer de volta a verdadeira herdeira de Troia: Dumnonia."
 nick_the_butcher: "o/a Açougueiro[CHARACTER.Custom('ES_OA')]"
 nick_the_butcher_desc: "Carne é carne. Tudo para de gritar no fim."
 nick_the_fishy: "o/a Suspeito[CHARACTER.Custom('ES_OA')]"
 nick_the_fishy_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] não #EMP [Select_CString( CHARACTER.IsLocalPlayer, 'consigues', 'consigue' )]#! consegue evitar que se fale de um certo cheiro de peixe ao redor de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetSheHe)]."
 nick_blue_snake: "Serpente Azul"
 nick_blue_snake_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] não [Select_CString( CHARACTER.IsLocalPlayer, 'responde', 'responde' )] perguntas sobre [Select_CString( CHARACTER.IsLocalPlayer, 'seu', 'seu' )] epônimo."
 nick_the_loyal: "o Leal"
 nick_the_loyal_desc: "Chova ou faça sol, aconteça o que acontecer, [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )]amigos sabem que [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe)] [Select_CString( CHARACTER.IsLocalPlayer, 'estarás', 'estará' )]ficará ao lado deles."
 nick_troublemaker: "Encrenqueiro"
 nick_troublemaker_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] famoso por [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] opiniões, percepção e volume."
 nick_the_seer: "o Vidente"
 nick_the_seer_desc: "Ver é crer, mas aqueles que não conseguem ver por si mesmos precisam recorrer a alguém como [CHARACTER.GetShortUINameNoTooltipNoFormat]."
 nick_the_timid: "o/a Tímid[CHARACTER.Custom('ES_OA')]"
 nick_the_timid_desc: "De modos suaves, até nervosos, [CHARACTER.GetShortUINameNoTooltipNoFormat] não [Select_CString( CHARACTER.IsLocalPlayer, 'lidias', 'lidia' )] bem com o confronto direto."
 nick_the_red: "o/a Vermelh[CHARACTER.Custom('ES_OA')]"
 nick_the_red_desc: "O cabelo vermelho-fogo de [Select_CString( CHARACTER.IsLocalPlayer, 'tu cabeza', CHARACTER.GetShortUINameNoTooltipNoFormat )] é algo que a maioria das pessoas comenta. De modo tedioso, segundo [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] própria experiência."
 nick_the_truthspeaker: "aquele que diz a Verdade"
 nick_the_truthspeaker_desc: "Não importa a gravidade do assunto, as pessoas sabem que podem confiar na [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] honestidade e integridade."
 nick_the_curthose: "Curthose"
 nick_the_curthose_desc: "Quando criança,[CHARACTER.Custom('ES_OA')] [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] pai [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] chamava «Curthose» ou «Botinhas». Na vida adulta,[CHARACTER.Custom('ES_OA')] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] é incapaz de #EMP impedir#! que as pessoas [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] continuem chamando-o por tal apelido."
 nick_the_deep_minded: "o/a Dout[CHARACTER.Custom('ES_OA')]"
 nick_the_deep_minded_desc: "As pessoas falam de [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )]ideias ponderadas e opiniões profundas. [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )|U] [Select_CString( CHARACTER.IsLocalPlayer, 'prefieres sentarte', 'prefiere sentarse' )]e pensar."
 nick_the_white: "o/a Blanc[CHARACTER.Custom('ES_OA')]"
 nick_the_white_desc: "Se [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim)] chamam «$nick_the_white$» por [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] pele pálida ou por um cabelo ainda mais pálido, não o [Select_CString( CHARACTER.IsLocalPlayer, 'tienes', 'tiene' )] claro. Há nomes piores."
 nick_wang_khan: "Wang Khan"
 nick_wang_khan_desc: "![Select_CString( CHARACTER.IsLocalPlayer, 'Tus', 'Sus' )] grandes vitórias sobre os tártaros fizeram com que se [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )]declare Rei Khan! Certamente depois disso [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )]aguarda um futuro longo e brilhante, não é?"
 nick_the_bard: "o bardo[CHARACTER.Custom('ES_OA')]"
 nick_the_bard_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tu', 'Su' )] belo canto e dedos hábeis para tocar tornam [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim)] uma celebridade em qualquer corte que [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'se' )] [Select_CString( CHARACTER.IsLocalPlayer, 'dignas', 'digna' )] se digna a visitar."
 nick_the_bard_ironic: "$nick_the_bard$"
 nick_the_bard_ironic_desc: "Chamam [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] de «$nick_the_bard$» porque é mais divertido imaginá-lo(a)[Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim)] amarrado(a) ao lado de um cavalo em disparada do que tentando[Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] cantar."
 nick_hotspur: "Hotspur"
 nick_hotspur_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tus', 'Sus' )] inimigos sussurram que, durante as campanhas, [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] esporas nunca tocam o chão, tal é o tempo que [Select_CString( CHARACTER.IsLocalPlayer, 'pasas', 'pasa' )] passa na sela, assim como a ousadia de [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus')] ataques. Não [Select_CString( CHARACTER.IsLocalPlayer, 'estás', 'está' )] segur[CHARACTER.Custom('ES_OA')] de que isso seja algo ruim."
 nick_the_black_adder: "a Naja Negra"
 nick_the_black_adder_desc: "Com muitos planos astutos, [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] inimigos [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] consideram [Select_CString( CHARACTER.IsFemale, 'una mujercilla', 'un hombrecillo' )] horrível."
 nick_the_inevitable: "o Inevitável"
 nick_the_inevitable_desc: "No final, tudo sempre acaba saindo à [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su')] maneira. As pessoas aprendem isso sozinhas ou você as [Select_CString( CHARACTER.IsLocalPlayer, 'enseñas', 'enseña' )] [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )]."
 nick_the_plump: "o(a) Gordinho(a)[CHARACTER.Custom('ES_EA')]"
 nick_the_plump_desc: "A maioria das pessoas [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim)] chama «$nick_the_plump$» porque há muito de [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetShortUINameNoTooltipNoFormat )] para amar."
 nick_the_diseased: "o/a Enfermo/a[CHARACTER.Custom('ES_OA')]"
 nick_the_diseased_desc: "A primeira coisa que as pessoas costumam ouvir sobre [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )] é [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] tosse."
 nick_the_flash: "o Raio de [CHARACTER.GetFaith.HighGodName]"
 nick_the_flash_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'intentas', 'intenta' )] não considerar[Select_CString( CHARACTER.IsLocalPlayer, 'te', 'se' )] a Ira de [CHARACTER.GetFaith.HighGodName]; «o Relâmpago» é muito mais diplomático."
 nick_hand: "Mão Ruim"
 nick_hand_desc: "Foi notada a [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] falta de sorte e propensão a tomar decisões que mais tarde se revelam desastrosas."
 nick_bloody: "Sanguinár[CHARACTER.Custom('ES_OA')]"
 nick_bloody_desc: "Não é incomum entre a nobreza matar alguns inimigos ao longo da vida. Alguns se perguntam, desconfortavelmente, quantos #EMP [Select_CString( CHARACTER.IsLocalPlayer, 'habrás', 'habrá' )]#! tido que matar para que só se [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] conheça por isso."
 nick_the_oathbreaker: "o Quebra-Juramentos"
 nick_the_oathbreaker_desc: "Um[CHARACTER.Custom('ES_OA')] vale o que sua palavra vale."
 nick_little: "Pequen[CHARACTER.Custom('ES_OA')]"
 nick_little_desc: "Pode que [Select_CString( CHARACTER.IsLocalPlayer, 'seas', 'sea' )] pequen[CHARACTER.Custom('ES_OA')] mas [Select_CString( CHARACTER.IsLocalPlayer, 'albergas', 'alberga' )] toda a raiva e a fúria de um carcaju raivoso."
 nick_the_honest: "o/a Honrad[CHARACTER.Custom('ES_OA')]"
 nick_the_honest_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'consideras', 'considera' )] que a honestidade é #EMP siempre#! a melhor política."
 nick_the_passionate: "o/a Apaixonad[CHARACTER.Custom('ES_OA')]"
 nick_the_passionate_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tus', 'Sus' )] amigos e aliados adoram [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] ímpeto, mas [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] detratores acreditam que [Select_CString( CHARACTER.IsLocalPlayer, 'necesitas', 'necesita' )] se acalmar[Select_CString( CHARACTER.IsLocalPlayer, 'te', 'se' )] ."
 nick_the_silly: "o/a Bob[CHARACTER.Custom('ES_OA')]"
 nick_the_silly_desc: "Seja o que os outros disserem sobre [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetShortUINameNoTooltipNoFormat )] a respeito, [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )] nunca [Select_CString( CHARACTER.IsLocalPlayer, 'te tomas', 'se toma' )] a vida #EMP demasiado#! tão a sério."
 nick_one_eyed: "Caolho"
 nick_one_eyed_desc: "$nick_monophthalmos_desc$"
 nick_the_trembling: "o/a Trêmulo/a[CHARACTER.Custom('ES_OA')]"
 nick_the_trembling_desc: "Não se pode dizer que [Select_CString( CHARACTER.IsLocalPlayer, '', 'CHARACTER.GetShortUINameNoTooltipNoFormat' )] [Select_CString( CHARACTER.IsLocalPlayer, 'seas', 'sea' )] seja famoso por um encanto ousado ou investidas ousadas, lamentavelmente."
 nick_the_rash: "o/a Impetuoso[CHARACTER.Custom('ES_OA')]"
 nick_the_rash_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'te ves', 'se ve' )] como alguém direto, mas o resto do mundo [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] o considera irreflexiv[CHARACTER.Custom('ES_OA')]o e precipitad[CHARACTER.Custom('ES_OA')]o."
 nick_moneybags: "o/a Endinheirad[CHARACTER.Custom('ES_OA')]"
 nick_moneybags_desc: "Provavelmente [CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString( CHARACTER.IsLocalPlayer, 'preferirías', 'preferiría' )] ser conhecid[CHARACTER.Custom('ES_OA')] como «[CHARACTER.Custom('ES_ElLa')] Rico[CHARACTER.Custom('ES_OA')]», mas, infelizmente, as pessoas têm uma visão muito específica de [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] fortuna."
 nick_the_elegant: "o Elegante"
 nick_the_elegant_desc: "Um toque delicado produz um resultado gracioso; um processo refinado cultiva uma reputação sofisticada."
 nick_the_eager: "o/a Ansios[CHARACTER.Custom('ES_OA')]"
 nick_the_eager_desc: "O entusiasmo é [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] lema, o gosto [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] credo."
 nick_the_insane: "o Insano"
 nick_the_insane_desc: "As pessoas andam pisando em ovos ao redor de [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetSheHe)]; talvez com razão, talvez não, mas por que arriscar ofender [Select_CString( CHARACTER.IsFemale, 'una loca', 'un loco' )]?"
 nick_the_sleeper: "o Dorminhoco"
 nick_the_sleeper_desc: "As pessoas costumam comentar que talvez [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )] [Select_CString( CHARACTER.IsLocalPlayer, 'serías', 'sería')] fosse mais feliz como um gato doméstico."
 nick_the_quick: "o Rápido"
 nick_the_quick_desc: "Rápido de mente, rápido de corpo."
 nick_the_quick_ironic: "$nick_the_quick$"
 nick_the_quick_ironic_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'dices', 'dice' )] conta aos outros que é porque [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es')] tem raciocínio rápido. Não é por isso."
 nick_the_selfish: "o Egoísta"
 nick_the_selfish_desc: "Todo o mundo sabe que [CHARACTER.GetShortUINameNoTooltipNoFormat] não [Select_CString( CHARACTER.IsLocalPlayer, 'piensa', 'piensas' )] em ninguém além de #EMP [Select_CString( CHARACTER.IsLocalPlayer, 'você', 'sí' )] mism[CHARACTER.Custom('ES_OA')]#!."
 nick_the_worthy: "o/a Digno[CHARACTER.Custom('ES_OA')]"
 nick_the_worthy_desc: "Discute-se quem decidiu isso, mas todos concordam que [CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es')] certamente um[CHARACTER.Custom('ES_XA')] [CHARACTER.GetWomanMan] de mérito."
 nick_the_unworthy: "o(a) Indigno(a)[CHARACTER.Custom('ES_OA')]"
 nick_the_unworthy_desc: "Um fracasso de [CHARACTER.GetWomanMan], na teoria e na prática."
 nick_the_traitor: "o Traidor[CHARACTER.Custom('ES_XA')]"
 nick_the_traitor_desc: "Uma promessa feita por [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetSheHe)] vale tanto quanto o ar que a carrega."
 nick_the_courageous: "o/a Valente[CHARACTER.Custom('ES_OA')]"
 nick_the_courageous_desc: "Pode-se confiar que [Select_CString( CHARACTER.IsLocalPlayer, 'seguirás', 'seguirá' )] seguirá adiante, apesar de todos os perigos."
 nick_the_brilliant: "o Brilhante"
 nick_the_brilliant_desc: "Poucos podem igualar [Select_CString( CHARACTER.IsLocalPlayer, 'seus', 'seus' )] dotes intelectuais e menos ainda se atrevem a tentar."
 nick_the_demon: "o/a Demôni[CHARACTER.Custom('ES_OA')]"
 nick_the_demon_desc: "[CHARACTER.GetFaith.DevilName|U] certamente daria uma referência favorável de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )] no Parlamento de [CHARACTER.GetFaith.random_NegativeAfterLife]."
 nick_the_immortal: "o Imortal"
 nick_the_immortal_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'pareces', 'parece' )] bastante jovem para a idade que [Select_CString( CHARACTER.IsLocalPlayer, 'tienes', 'tiene' )]."
 nick_the_generous: "o/a Generos[CHARACTER.Custom('ES_OA')]"
 nick_the_generous_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Darías', 'Daría')] daria a alguém até a camisa, se a última pessoa não a tivesse levado antes."
 nick_the_diplomat: "o/a Diplomátic[CHARACTER.Custom('ES_OA')]"
 nick_the_diplomat_desc: "Uma solução pacífica é aquela que pode ser alcançada com palavras e a [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetSheHe)] se [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le')] dão #EMP muy#! muito bem com as palavras."
 nick_the_peacemaker: "o Pacificador[CHARACTER.Custom('ES_XA')]"
 nick_the_peacemaker_desc: "A paz vale qualquer preço."
 nick_the_tactician: "o Tático"
 nick_the_tactician_desc: "Estratégia pode exigir astúcia, mas tática exige perspicácia."
 nick_the_overseer: "o Supervisor"
 nick_the_overseer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'é', 'é' )] notório por [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )]… muita atenção."
 nick_the_guardian: "o/a Guardião"
 nick_the_guardian_desc: "Chova ou faça sol, amigo ou inimigo, [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )] sempre [Select_CString( CHARACTER.IsLocalPlayer, 'estás', 'está' )] lá para aqueles a quem [Select_CString( CHARACTER.IsLocalPlayer, 'has', 'ha' )] jurado proteger"
 nick_the_chivalrous: "o/a Cavalheiresco/a[CHARACTER.Custom('ES_OA')]"
 nick_the_chivalrous_desc: "Para alguns, a honra pode ser barata, mas para [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )], não há nada mais precioso no mundo."
 nick_the_valiant: "o Valente[CHARACTER.Custom('ES_OA')]"
 nick_the_valiant_desc: "Um líder que não lidera da linha de frente não é líder algum."
 nick_the_deceiver: "o Impostor[CHARACTER.Custom('ES_XA')]"
 nick_the_deceiver_desc: "Por que se incomodar com aço caro e sangue quando palavras são de graça?"
 nick_the_crow: "o Corvo"
 nick_the_crow_desc: "Aqueles que gostam de [CHARACTER.GetShortUINameNoTooltipNoFormat] dizem que é por mente afiada e visão precisa. Os que não gostam, dizem que a morte ronda [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] por perto."
 nick_the_trickster: "o(a) Trapaceiro(a)[CHARACTER.Custom('ES_OA')]"
 nick_the_trickster_desc: "Será que #EMP [Select_CString( CHARACTER.IsLocalPlayer, 'dices', 'dice' )]#! mentiras tão descaradas quanto as histórias que os outros contam sobre [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetSheHe )]?"
 nick_the_chronicler: "o Cronista"
 nick_the_chronicler_desc: "As gerações futuras certamente ficarão gratas pelo [Select_CString( CHARACTER.IsLocalPlayer, 'seu', 'seu' )] faro meticuloso para a documentação."
 nick_the_truthseeker: "o/a Buscador[CHARACTER.Custom('ES_XA')] da verdade"
 nick_the_truthseeker_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] célebre por buscar a verdade, aonde quer que isso leve e custe o que custar."
 nick_the_sage: "o/a Sábio[CHARACTER.Custom('ES_OA')]"
 nick_the_sage_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] culto[CHARACTER.Custom('ES_OA')] e [Select_CString( CHARACTER.IsLocalPlayer, 'estás', 'está' )] mais do que disposto[CHARACTER.Custom('ES_OA')] a transmitir conhecimento aos jovens."
 nick_the_historian: "o/a Historiador[CHARACTER.Custom('ES_XA')]"
 nick_the_historian_desc: "Aqueles que não tentam ao menos aprender com a história estão condenados a repeti-la."
 nick_the_sly: "o/a Astuto/a[CHARACTER.Custom('ES_OA')]"
 nick_the_sly_desc: "Hum? Ah, esse olhar? Não é nada. Não se preocupe com isso."
 nick_the_cucumber_king: "o Rei Pepino"
 nick_the_cucumber_king_desc: "Não são tantas as pessoas que podem dizer que usurparam um reino. Menos ainda podem argumentar que um tubérculo estrategicamente mal-apropriado foi a chave do feito."
 nick_the_peaceful: "o Pacífico"
 nick_the_peaceful_desc: "Não podemos todos simplesmente nos dar bem?"
 nick_the_whetstone: "a Pedra de Amolar"
 nick_the_whetstone_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe)|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] célebre por ceder até mesmo diante de lâminas cegas, como uma boa pedra de amolar."
 nick_the_slayer_of_the_snake: "o Matador da Serpente"
 nick_the_slayer_of_the_snake_desc: "Originalmente de Bagdá, [Select_CString( CHARACTER.IsLocalPlayer, 'mataste', 'mató' )] matou a poderosa serpente Sarki, causadora maligna de uma seca devastadora, para conquistar a mão da rainha de Daura."
 nick_the_illuminator: "o/a Iluminador[CHARACTER.Custom('ES_XA')]"
 nick_the_illuminator_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'recibes', 'recibe' )] alabanzas por ser [Select_CString( CHARACTER.IsFemale, 'la primera', 'el primero' )] en traer la luz de la #EMP fe#! verdadera a [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] pueblo, siendo este el origen de su salvación."
 nick_the_builder: "o construtor[CHARACTER.Custom('ES_XA')]"
 nick_the_builder_desc: "A maioria dos governantes fala em "construir" seu domínio apenas no sentido teórico. Mas [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )] não."
 nick_the_martyrophile: "o/a Martirófilo[CHARACTER.Custom('ES_OA')]"
 nick_the_martyrophile_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Você', CHARACTER.GetShortUINameNoTooltipNoFormat )|U] recebe amplo reconhecimento dentro de [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua')] fé por documentar a vida de seus mártires sagrados."
 nick_the_campeador: "o Campeador[CHARACTER.Custom('ES_XA')]"
 nick_the_campeador_desc: "Muitos sustentam que jamais houve uma expressão mais pura da virtude marcial da bondade cavalheiresca; [CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'rechazas', 'rechaza' )] as homenagens e [Select_CString( CHARACTER.IsLocalPlayer, 'te contentas', 'se contenta' )] em viver segundo os ideais que [Select_CString( CHARACTER.IsLocalPlayer, 'te has', 'se ha' )] impôs."
 nick_the_girthy: "o/a Gordo[CHARACTER.Custom('ES_OA')]"
 nick_the_girthy_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Sua', 'Sua')] massa, volume e força são o assunto de todas as cidades que [Select_CString( CHARACTER.IsLocalPlayer, 'visitas', 'visita' )]."
 nick_the_missionary: "o/a Missionário[CHARACTER.Custom('ES_OA')]"
 nick_the_missionary_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] não [Select_CString( CHARACTER.IsLocalPlayer, 'descansarás', 'descansará' )] enquanto houver uma alma não salva pela luz de [CHARACTER.GetFaith.GetName]."
 #Version of Hotspur _without_ the football reference.
 nick_the_hotspur: "o Impetuoso"
 nick_the_hotspur_desc: "Dizem que [CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] tão corajoso nas [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus')] decisões que [Select_CString( CHARACTER.IsLocalPlayer, 'te lanzas', 'se lanza')] a elas sem sequer tirar[Select_CString( CHARACTER.IsLocalPlayer, 'te', 'se')] as esporas."
 nick_the_vanquisher: "o/a Conquistador[CHARACTER.Custom('ES_XA')]"
 nick_the_vanquisher_desc: "Que quem quiser se ponha contra [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetShortUINameNoTooltipNoFormat )], pois [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] a Foice de [CHARACTER.GetFaith.DeathDeityName]."
 nick_the_bloody: "o/a Sangrent[CHARACTER.Custom('ES_OA')]"
 nick_the_bloody_desc: "A [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )] não se abala com um pouco de bagunça — não importa quantas pessoas isso costumava ser."
 nick_the_shy: "o(a) Tímido(a)[CHARACTER.Custom('ES_OA')]"
 nick_the_shy_desc: "É[Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] é visto tão raramente que o que a maioria sabe sobre [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetShortUINameNoTooltipNoFormat )] é [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] apelido."
 nick_the_giant: "o/a Gigant[CHARACTER.Custom('ES_EA')]"
 nick_the_giant_desc: "Os rumores dizem que [Select_CString( CHARACTER.IsLocalPlayer, 'é', 'é')] tão grande quanto uma casa… Segundo [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] experiência, depende da casa."
 nick_bad_hand: "Mão Ruim"
 nick_bad_hand_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Afirmas', 'Afirma' )] que é por causa de [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] sua direita desajeitada, mas a maioria das pessoas sabe que simplesmente se [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] dão muito mal em jogos de cartas."
 nick_the_little: "o/a Pequen[CHARACTER.Custom('ES_OA')]"
 nick_the_little_desc: "De [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetShortUINameNoTooltipNoFormat )] se diz que só [Select_CString( CHARACTER.IsLocalPlayer, 'tienes', 'tiene')] problemas de estatura."
 nick_the_one_eyed: "o/a Caolh[CHARACTER.Custom('ES_OA')]"
 nick_the_one_eyed_desc: "$nick_monophthalmos_desc$"
 nick_the_oppressor: "o/a Opressor[CHARACTER.Custom('ES_OA')]"
 nick_the_oppressor_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] não [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] [CHARACTER.Custom('ES_ElLa')] o governante mais célebre[CHARACTER.Custom('ES_OA')] que seus [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] súditos tiveram."
 nick_the_apostate: "o Apóstata"
 nick_the_apostate_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'hiciste', 'hizo' )] diante da maré vitoriosa de outra fé e, em contraste, [Select_CString( CHARACTER.IsLocalPlayer, 'proclamaste', 'proclamó' )] [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] amor e lealdade a [CHARACTER.GetFaith.HighGodName]."
 nick_the_pagan: "o/a Pagão/ã[CHARACTER.Custom('ES_OA')]"
 nick_the_pagan_desc: "A maioria tenta zombar de [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetShortUINameNoTooltipNoFormat )] quando [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] o chamam assim. Que o façam. [Select_CString( CHARACTER.IsLocalPlayer, 'Tú', CHARACTER.GetSheHe )|U] [Select_CString( CHARACTER.IsLocalPlayer, 'sabes', 'sabe' )] sabe a verdade."
 nick_the_heretic: "o Herege"
 nick_the_heretic_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Sua', 'Sua' )] conversão ao [CHARACTER.GetFaith.GetName|l] foi tão dramática que é uma das coisas que as pessoas mais lembram de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )]."
 nick_the_savage: "o Selvagem"
 nick_the_savage_desc: "Não há nada nem ninguém que não [Select_CString( CHARACTER.IsLocalPlayer, 'dudarías', 'dudaría')] em despedaçar membro por membro. Homem, mulher, criança, cachorro… [CHARACTER.GetShortUINameNoTooltipNoFormat|U] os [Select_CString( CHARACTER.IsLocalPlayer, 'matarías', 'mataría' )] a todos e [Select_CString( CHARACTER.IsLocalPlayer, 'dejarías', 'dejaría' )] que [CHARACTER.GetFaith.HighGodName] reconheça os seus."
 nick_the_defiant: "o Desafiante"
 nick_the_defiant_desc: "Que venham, que venham todos que quiserem! [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )|U] caminho é o certo, e [Select_CString( CHARACTER.IsLocalPlayer, 'matarás', 'matará' )] matará quantas pessoas forem necessárias para prová-lo!"
 nick_the_sea_king: "[CHARACTER.Custom('ES_ElLa')] [CHARACTER.Custom('GetQueenKing')|U] dos mares"
 nick_the_sea_king_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tu', 'Su' )] costumeira é saquear e despojar, tomar o que [Select_CString( CHARACTER.IsLocalPlayer, 'quieres', 'quiere' )] de quem [Select_CString( CHARACTER.IsLocalPlayer, 'quieres', 'quiere' )]. [Select_CString( CHARACTER.IsLocalPlayer, 'Te niegas', 'Se niega' )] a mudar seus costumes ou a permitir que [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] povo mude os seus."
 nick_the_great_and_terrible: "o Grande e Terrível"
 nick_the_great_and_terrible_desc: "Pirata sem igual, [Select_CString( CHARACTER.IsFemale, 'una dama', 'un señor' )]de sangue e ouro, a própria encarnação de uma espada reluzente erguida sobre as ondas encrespadas de sal marinho. [Select_CString( CHARACTER.IsLocalPlayer, 'Te ganaste', 'Se ganó' )]o direito ao nome de «[CHARACTER.Custom('ES_ElLa')] Grande» e [Select_CString( CHARACTER.IsLocalPlayer, 'te has', 'se ha' )]construído a reputação para ser chamado de [CHARACTER.Custom('ES_OA')]«[CHARACTER.Custom('ES_ElLa')] #EMP Terrible#!»."
 nick_the_stonefaced: "o Cara de Pedra"
 nick_the_stonefaced_desc: "Abra um sorriso. Por favor? Só uma vez?"
 nick_the_dry: "o/a Sec[CHARACTER.Custom('ES_OA')]"
 nick_the_dry_desc: "Considera-se impossível saber se [Select_CString( CHARACTER.IsLocalPlayer, 'te estás', 'se está' )] está rindo por dentro o tempo todo ou se… simplesmente não [Select_CString( CHARACTER.IsLocalPlayer, 'entiendes', 'entiende' )] o conceito de #EMP diversión#!."
 nick_the_joyless: "o Sisudo"
 nick_the_joyless_desc: "Quem quer que lide com [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )] no dia a dia logo aprende a ser exato e preciso em suas palavras, porque [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe)] jamais as [Select_CString( CHARACTER.IsLocalPlayer, 'comprenderás', 'comprenderá' )] de outro modo."
 nick_lacks_laughs: "Sem-Risos"
 nick_lacks_laughs_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'tienes', 'tiene' )]uma reputação tão notória de seriedade que se diz que não [Select_CString( CHARACTER.IsLocalPlayer, 'oíste', 'oyó' )]ouvir alguém rir até que [Select_CString( CHARACTER.IsLocalPlayer, 'fuiste', 'fue' )]um[CHARACTER.Custom('ES_XA')] [Select_CString( CHARACTER.IsFemale, 'mujer hecha y derecha', 'hombre hecho y derecho' )]. E então [Select_CString( CHARACTER.IsLocalPlayer, 'creíste', 'creyó' )]que aquela pessoa estava tendo uma convulsão."
 nick_the_dull: "o/a Ented[CHARACTER.Custom('ES_OA')]"
 nick_the_dull_desc: "Ninguém realmente se lembra por que exatamente [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim)] «$nick_the_dull$». Todos concordam que realmente não vale a pena lembrar."
 nick_the_snorer: "o/a Roncador[CHARACTER.Custom('ES_XA')]"
 nick_the_snorer_desc: "Se [Select_CString( CHARACTER.IsLocalPlayer, 'ronques', 'ronque' )] ou não é uma questão de mera especulação, mas quando [Select_CString( CHARACTER.IsLocalPlayer, 'estás', 'está')] está em casa, os roncos infestam [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] corte."
 nick_troll_slayer: "Matador de Troll"
 nick_troll_slayer_desc: "O povo comum se orgulha com orgulho de [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] toque protetor e de como [Select_CString( CHARACTER.IsLocalPlayer, 'mataste', 'mató')] matou um troll em sua defesa."
 nick_the_bane_of_danes: "o Flagelo dos Daneses"
 nick_the_bane_of_danes_desc: "A opinião popular sustenta que não há família na Escandinávia que não tenha perdido um parente por culpa de [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] espada."
 nick_the_culture_wall: "a Muralha [CHARACTER.GetCulture.GetNameNoTooltip]"
 nick_the_culture_wall_desc: "Nenhum saqueador estrangeiro, nenhum viking escravagista, nenhum saqueador faminto cruza [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] vias fluviais ou devasta [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] povo."
 nick_nord_foe: "Inimig[CHARACTER.Custom('ES_OA')] do Norte"
 nick_nord_foe_desc: "Alguns tolos dizem que não [Select_CString( CHARACTER.IsLocalPlayer, 'puedes', 'puede' )]assustar um nórdico, porque têm gelo nas veias. [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )|U] [Select_CString( CHARACTER.IsLocalPlayer, 'sabes', 'sabe' )]que morrem gritando e sangrando como todo mundo."
 nick_the_scourge_of_the_northerners: "o Flagelo dos Nortistas"
 nick_the_scourge_of_the_northerners_desc: "Dinamarqueses, noruegueses, suecos. Todos vêm para [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] terras em busca de escravos e saque. [CHARACTER.GetShortUINameNoTooltip] apenas lhes [Select_CString( CHARACTER.IsLocalPlayer, 'das', 'da' )] uma morte rápida e uma eternidade em [CHARACTER.GetFaith.random_NegativeAfterLife]."
 nick_the_burner_of_ash: "o Queimador de Cinzas"
 nick_the_burner_of_ash_desc: "Nada cheira tão bem quanto um drácar queimando numa manhã de primavera."
 nick_the_garlic: "o Rei do Alho"
 nick_the_garlic_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'apareciste', 'apareció' )] retratad[CHARACTER.Custom('ES_OA')] em uma cantiga infantil popular e zombeteira."
 nick_garlic_queen: "a Rainha do Alho"
 nick_garlic_queen_desc: "$nick_the_garlic_desc$"
 nick_gajapati: "Gajapati"
 nick_gajapati_desc: "O uso inovador de elefantes de guerra de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )] certamente entrará para a história."
 nick_the_transcriber: "o/a Transcritor[CHARACTER.Custom('ES_XA')]"
 nick_the_transcriber_desc: "O conhecimento depende de transmissão, e que instrumentos maiores existem para isso do que livros e pergaminhos que podem ser lidos por gerações?"
 nick_of_clairvaux: "of Clairvaux"
 #I really, sincerely hate the Problem of the Three Bernards.
 ## Not least because there's more than three of them.
 ### I realize that Clairvaux is not in Occitania but I had to slog through dozens of Occitan/Catalan Bernards and now the greater French region's Bernard population are hopelessly tainted for me.
 nick_of_clairvaux_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tu', 'Su' )] a origem é importante para distinguir[Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim)] de um número sinceramente ridículo de «Bernardos» concorrentes."
 nick_the_headless: "o Sem-Cabeça"
 nick_the_headless_desc: "Rápid[CHARACTER.Custom('ES_OA')] e direto[CHARACTER.Custom('ES_OA')]. Muito similar a [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] fim."
 nick_the_footstool: "o Escabelo"
 nick_the_footstool_desc: "As responsabilidades de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltip )] são… onerosas. E muito discutidas."
 nick_father_of_the_baltic: "Pai do Báltico"
 nick_father_of_the_baltic_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'trajiste', 'trajo' )] Livônia trouxe a este mundo com sangue, suor e trabalho duro."
 nick_mother_of_the_baltic: "Mãe do Báltico"
 nick_mother_of_the_baltic_desc: "$nick_father_of_the_baltic_desc$"
 nick_scourge_of_the_baltic: "Flagelo do Báltico"
 nick_scourge_of_the_baltic_desc: "Graças a [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )], a Livônia certamente perdurará — sobre uma sólida base de ossos e sofrimento."
 nick_the_mountain_king: "o Rei das montanhas"
 nick_the_mountain_king_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )|U] salões majestosos são bem conceituados."
 nick_beth_nahrain: "Soberano dos Dois Rios"
 nick_beth_nahrain_desc: "A mera presença desse indivíduo envia uma onda colossal através das massas, deixando-as arrebatadas em espanto e admiração por seus feitos de unificação."
 nick_the_child_killer: "o Matador de Crianças"
 nick_the_child_killer_desc: "Os estudiosos bíblicos geralmente sustentam que não [Select_CString( CHARACTER.IsLocalPlayer, 'entendiste', 'entendió' )] a sentença de Salomão."
 nick_the_anathema: "o Anátema"
 nick_the_anathema_desc: "O caos do mundo mortal recua diante de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltip)]."
 nick_the_angel_of_death: "o Anjo de [CHARACTER.GetFaith.DeathDeityName|U]"
 nick_the_angel_of_death_desc: "Em [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] opinião, [Select_CString( CHARACTER.IsLocalPlayer, 'pusiste', 'puso' )] pôs fim ao sofrimento dele. O resto do mundo não vê assim."
 nick_monophthalmos: "Monophthalmos"
 nick_monophthalmos_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Seu', 'Seu' )] olho restante recebe muito mais atenção do que o par inteiro jamais recebeu."
 nick_health_god_mercy: "a Misericórdia de [CHARACTER.GetFaith.HealthGodNamePossessive]"
 nick_health_god_mercy_desc: "Apesar de começos sórdidos, [CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'te abriste','se abrió')]trilhou seu caminho no mundo da medicina e [Select_CString( CHARACTER.IsLocalPlayer, 'ganaste', 'ganó' )]ganhou fama por cuidar dos pobres."
 nick_genghis_khan: "Genghis Khan"
 nick_genghis_khan_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'eres','es')] o castigo de [CHARACTER.GetFaith.HighGodName] por todos os pecados do mundo. Pois, se o mundo não estivesse cheio de pecadores, teria enviado [CHARACTER.GetFaith.HighGodName] alguém como #EMP [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetShortUINameNoTooltip)]#! em castigo?"
 nick_cengiz_khan: "Cengiz Khan"
 nick_cengiz_khan_desc: "$nick_genghis_khan_desc$"
 nick_yekhe_khagan: "Yekhe Khagan"
 nick_yekhe_khagan_desc: "O Grande, o Magnífico, o soberano do mar de pastos e de todas as terras habitadas! [CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] o garanhão que montará o mundo."
 nick_dort_yonlug_khagan: "Dört Yönlüg Khagan"
 nick_dort_yonlug_khagan_desc: "A terra se estende pelos quatro pontos cardeais até os confins mais distantes, sombrios e desconhecidos. [CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'posees', 'posee' )] tudo por direito! O cosmos se reorganiza para [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] conveniência e está à [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] disposição."
 nick_tengri_khagan: "Tengri Khagan"
 nick_tengri_khagan_desc: "Nos antigos dias dos poderosos kágans göktürks, este título foi gravado em pedra! Tengri Khagan — o nascido do Céu, o Sábio: [CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'é', 'é' )] foi criado pelo Grande Céu Azul para governar o mundo."
 nick_xormuzta: "Xormuzta"
 nick_xormuzta_desc: "Um antigo honorífico, há muito associado à 'divindade celeste' do antigo Irã, e hoje usado entre cristãos orientais e afins para reverenciar fundadores lendários como [CHARACTER.GetShortUINameNoTooltipNoFormat]."
 nick_mar_sargis: "Mar Sargis"
 nick_mar_sargis_desc: "Diz-se que visões santas [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] guiam para um governo piedoso, [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] patrono é o mártir São Sargis."
 nick_cihangir: "Cihangir"
 nick_cihangir_desc: "Pela vontade divina de Alá, [CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString( CHARACTER.IsLocalPlayer, 'conquistarás', 'conquistará' )] o mundo inteiro. Jamais a Dar al-Islam e as terras dos infiéis ouviram tão alto o estrondo dos cascos dos cavalos!"
 nick_culture_khagan: "[CHARACTER.GetCulture.GetNameNoTooltip] Khagan"
 nick_culture_khagan_desc: "![CHARACTER.GetShortUINameNoTooltipNoFormat|U] a mais ilustre criatura entre todos os [CHARACTER.GetCulture.GetCollectiveNounNoTooltip] e [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] [CHARACTER.GetCulture.GetCollectiveNounNoTooltip]: os filhos do destino, os cavaleiros que arrasam cidades empunhando as espadas e os chicotes do império!"
 nick_akhshunwar: "Akhshunwar"
 nick_akhshunwar_desc: "H? muito tempo os senhores da Rota da Seda ostentam grandes t?tulos como #EMP Ikhshid#!, #EMP Shahanshah#! e #EMP Akhshunwar#!, mas nenhum antes foi t?o dign[CHARACTER.Custom('ES_OA')] quanto [CHARACTER.GetShortUINameNoTooltipNoFormat] de possuir o honor?fico "portador[CHARACTER.Custom('ES_XA')] do poder"."
 nick_fabulous_she_he: "Magnífica [CHARACTER.GetFirstNameNoTooltip], [CHARACTER.GetNameNoTooltip]"
 nick_fabulous_she_he_desc: "Não é incomum que observadores casuais se ajoelhem por respeito quando essa pessoa passa."
 nick_the_wary: "o/a Cauteloso/a[CHARACTER.Custom('ES_OA')]"
 nick_the_wary_desc: "Um olhar penetrante e uma expressão desconfiada são as coisas que as pessoas mais lembram de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltip)]."
 nick_the_black_sheep: "a Ovelha Negra"
 nick_the_black_sheep_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] e a maior parte de [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] família não [Select_CString( CHARACTER.IsLocalPlayer, 'os habláis', 'se hablan' )]."
 nick_sisyphus: "o Sísifo"
 nick_sisyphus_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] é mais conhecido[CHARACTER.Custom('ES_OA')] por tentar mover objetos pesados em trajetórias impossíveis."
 nick_blue_lion: "o Leão Azul"
 nick_blue_lion_desc: "Todos sabem que, quando chega o inverno, $nick_blue_lion$ ruge #EMP apenas#! à meia-noite."
 nick_the_hairy: "o Peludo"
 nick_the_hairy_desc: "O que [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )]? [CHARACTER.GetWomanMan|U] ou [CHARACTER.Custom('GetGenderAlliteratingAnimal')]? À primeira vista, é difícil saber."
 nick_the_child: "a Crianç[CHARACTER.Custom('ES_OA')]"
 nick_the_child_desc: "Ah, [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] a vida acabou cedo demais para ser conhecid[CHARACTER.Custom('ES_OA')] por qualquer coisa além de [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] o abrupto final."
 nick_the_wake: "a Vigília"
 nick_the_wake_desc: "Com os olhos sempre atentos à injustiça, conquistadores estrangeiros e traidores nativos tremem só de ouvir falar de [Select_CString( CHARACTER.IsLocalPlayer, 'seu', 'seu' )] nome!"
 nick_the_bearded: "o barbudo[CHARACTER.Custom('ES_OA')]"
 nick_the_bearded_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe)|U], assim como muitos homens, [Select_CString( CHARACTER.IsLocalPlayer, 'tienes', 'tiene' )] barba. De verdade, não [Select_CString( CHARACTER.IsLocalPlayer, 'sabes', 'sabe' )] realmente por que as pessoas insistem em apontar isso."
 nick_the_mountain_dweller: "o Habitante das Montanhas"
 nick_the_mountain_dweller_desc: "É raro ver [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )] fora de [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] lar montanhoso."
 nick_the_honest_hipped: "a de Quadris Sinceros"
 nick_the_honest_hipped_desc: "[CHARACTER.GetSheHe|U] faz qualquer homem querer falar $language_iberian_name$."
 nick_the_legend_riad: "a Lenda"
 nick_the_legend_riad_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Sua', 'Sua' )|U] lenda sombria se projeta sobre o mundo inteiro."
 nick_the_shadow_riad: "$nick_the_shadow$"
 nick_the_shadow_riad_desc: "$nick_the_legend_riad_desc$"
 nick_the_justicar: "[CHARACTER.Custom('ES_ElLa')] Justiciar"
 nick_the_justicar_desc: "A maioria das pessoas concorda que [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] decisões são justas e equilibradas."
 nick_the_green: "[CHARACTER.Custom('ES_ElLa')] Verde"
 nick_the_green_desc: "Acredita-se que [CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] um[CHARACTER.Custom('ES_XA')] hábil com a colher de pedreiro."
 #EP1
 nick_king_of_fashion: "o [CHARACTER.GetTitleAsNameNoTooltip] da Moda"
 nick_king_of_fashion_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'has', 'ha' )] encontrou poder e influência em um mundo de seda e zibelina."
 nick_prince_of_fashion: "[CHARACTER.Custom('ES_ElLa')] [CHARACTER.Custom('GetPrincessPrince')] da moda"
 nick_prince_of_fashion_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'has', 'ha' )] sido ridicularizado[CHARACTER.Custom('ES_OA')] por [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] escolhas de moda."
 nick_the_foreigner: "o/a Estrangeir[CHARACTER.Custom('ES_OA')]"
 nick_the_foreigner_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] de terras distantes daqui."
 nick_the_culture: "o/a da cultura [CHARACTER.MakeScope.Var('nick_the_culture_var').Culture.GetNameNoTooltip]"
 nick_the_culture_desc: "As pessoas do domínio preferem se referir a [Select_CString( CHARACTER.IsLocalPlayer, 'tu persona', CHARACTER.GetShortUINameNoTooltipNoFormat )]pela cultura que assumem que [Select_CString( CHARACTER.IsLocalPlayer, 'tienes', 'tiene' )]."
 nick_the_linguist: "o Linguista"
 nick_the_linguist_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'hablas', 'habla')] fala mais idiomas do que alguns dos [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] súditos."
 nick_the_clumsy: "o Desastrado"
 nick_the_clumsy_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] não [Select_CString( CHARACTER.IsLocalPlayer, 'é', 'é' )] especialmente célebre por [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] delicadeza."
 nick_the_stumbler: "o/a Cambaleante[CHARACTER.Custom('ES_OA')]"
 nick_the_stumbler_desc: "Palavras e pés tendem a atrapalhar [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] a [Select_CString( CHARACTER.IsLocalPlayer, 'tu persona', CHARACTER.GetShortUINameNoTooltipNoFormat )]."
 nick_the_graceful: "o Gracioso"
 nick_the_graceful_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Seu', 'Seu' )] modo de andar, dicção e mero #EMP porte#! cativam os curiosos."
 nick_the_heart_throb: "o/a Quebra-Corações"
 nick_the_heart_throb_desc: "É raro o coração que não se agita ao [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] passo."
 nick_the_beautiful: "o/a Belo(a)[CHARACTER.Custom('ES_OA')]"
 nick_the_beautiful_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] divino[CHARACTER.Custom('ES_OA')], deslumbrante e [Select_CString( CHARACTER.IsLocalPlayer, 'estás', 'está' )] perpetuamente cobiçad[CHARACTER.Custom('ES_OA')]."
 nick_the_beautiful_generous: "[CHARACTER.Custom('ES_ElLa')] Belo[CHARACTER.Custom('ES_OA')]"
 nick_the_beautiful_desc_generous: "Talvez [CHARACTER.GetShortUINameNoTooltipNoFormat] não [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] bel[CHARACTER.Custom('ES_OA')] no sentido tradicional, mas, ainda assim, esse apelido lhe cabe por [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] ações belas."
 nick_the_blushing: "o(a) Enrubescid[CHARACTER.Custom('ES_OA')]"
 nick_the_blushing_desc: "As situações sociais têm o jeito de corar as [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] bochechas."
 nick_the_stutterer: "o/a Gago[CHARACTER.Custom('ES_OA')]"
 nick_the_stutterer_desc: "As pessoas se deliciam em lembrar[Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] algumas poucas palavras murmurejadas."
 nick_the_slow: "o/a Lento/a[CHARACTER.Custom('ES_OA')]"
 nick_the_slow_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] não [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] [CHARACTER.Custom('ES_ElLa')] ser mais brilhante que a corte já viu."
 nick_the_eloquent: "o Eloquente"
 nick_the_eloquent_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Sua', 'Sua' )] linguagem é tão distinta quanto [Select_CString( CHARACTER.IsLocalPlayer, 'seu', 'seu' )] porte."
 nick_the_stud: "o Galã"
 nick_the_stud_desc: "É sabido que [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] aparência já deu às pessoas #EMP ideias#!."
 #FP2
 nick_the_bell_keeper: "o(a) Guardião(ã) do Sino[CHARACTER.Custom('ES_OA')]"
 nick_the_bell_keeper_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tus', 'Sus' )] opiniões sobre o toque dos sinos são… um pouco heterodoxas."
 nick_the_requiem: "o Réquiem"
 nick_the_requiem_desc: "E que melodia era."
 nick_the_King_of_Thieves: "o Rei dos Ladrões"
 nick_the_King_of_Thieves_desc: "Senhor[CHARACTER.Custom('ES_XA')] de ladrões, bandidos e outros malfeitores."
 nick_the_Queen_of_Thieves: "a Rainha dos Ladrões"
 nick_the_Queen_of_Thieves_desc: "$nick_the_King_of_Thieves_desc$"
 nick_the_Thief_Slayer: "o Matador de Ladrões"
 nick_the_Thief_Slayer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] não [Select_CString( CHARACTER.IsLocalPlayer, 'tienes', 'tiene' )] tem paciência com os ladrõezinhos."
 nick_the_flying: "o/a Voador[CHARACTER.Custom('ES_XA')]"
 nick_the_flying_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tus', 'Sus' )] invenções realizaram feitos lendários."
 nick_the_flightless: "o Não-Voador"
 nick_the_flightless_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tus', 'Sus' )] invenções conquistaram pouco mais que um desfecho climático."
 nick_the_cid_campeador: "El Cid Campeador"
 nick_the_cid_campeador_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Sua', 'Sua' )] lenda é de admiração, cavalheirismo, traição e honra."
 nick_benavert: "Benavert"
 #It's unclear what Benavert refers to, so we default to base.
 nick_the_pragmatic: "o/a Pragmátic[CHARACTER.Custom('ES_OA')]"
 nick_the_pragmatic_desc: "A melhor solução é a mais apropriada para o momento."
 nick_the_equitable: "o/a Equitativ[CHARACTER.Custom('ES_OA')]"
 nick_the_equitable_desc: "Uma divisão justa e equilibrada é o que [Select_CString( CHARACTER.IsLocalPlayer, 'prefieres', 'prefiere' )] para tudo."
 nick_the_crownless: "o Descoronad[CHARACTER.Custom('ES_OA')]"
 nick_the_crownless_desc: "Embora não seja especialmente poético, o epíteto de [Select_CString( CHARACTER.IsLocalPlayer, 'tu persona', CHARACTER.GetShortUINameNoTooltipNoFormat )] é evocador, direto e [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] arde nos ouvidos toda vez que é dito."
 #BP1
 nick_the_real: "o Verdadeiro"
 nick_the_real_desc: "Todos conhecem a história de como [CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString( CHARACTER.IsLocalPlayer, 'luchaste', 'luchó' )] contra [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] duplo #EMP malvad[CHARACTER.Custom('ES_OA')]#!."
 nick_strongarm: "Braço Forte"
 nick_strongarm_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] sempre [Select_CString( CHARACTER.IsLocalPlayer, 'estás', 'está' )] pronto[CHARACTER.Custom('ES_OA')] para meter a mão. Principalmente porque [Select_CString( CHARACTER.IsLocalPlayer, 'sabes', 'sabe' )] que [Select_CString( CHARACTER.IsLocalPlayer, 'vas', 'va')] vai ganhar."
 nick_baby_eating: "o Devorador de Bebês"
 nick_baby_eating_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tu', 'Su' )] epíteto se explica por si só. É [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] lógica que confunde as pessoas."
 nick_the_dung_named: "o Nomeado pelo Esterco"
 nick_the_dung_named_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tus', 'Sus' )] detratores sussurram que [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'se' )] [Select_CString( CHARACTER.IsLocalPlayer, 'ensuciaste', 'ensució' )] na pia batismal durante o batismo…"
 nick_with_the_tress: "da Mecha"
 nick_with_the_tress_desc: "Românticos desmaados do mundo todo falam de como nunca [Select_CString( CHARACTER.IsLocalPlayer, 'vas', 'va' )] a lugar nenhum sem uma mecha de cabelo de [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] amor."
 nick_with_the_lock: "do Cacho"
 nick_with_the_lock_desc: "$nick_with_the_tress_desc$"
 nick_irontooth: "Irontooth"
 nick_irontooth_desc: "Dizem de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )] que [Select_CString( CHARACTER.IsLocalPlayer, 'tienes', 'tiene' )] as presas de uma fera selvagem, ou, no mínimo, certamente [Select_CString( CHARACTER.IsLocalPlayer, 'tienes', 'tiene' )] essa força de mandíbula."
 nick_the_dunged: "o/a Cagado[CHARACTER.Custom('ES_OA')]"
 nick_the_dunged_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'prefieres', 'prefiere' )] não insistir na lembrança. Todo mundo tenta não mencionar o cheiro."
 nick_the_smelly: "o Fedido"
 nick_the_smelly_desc: "De algum jeito, de alguma forma, isso #EMP ainda#! persiste."
 nick_the_venator: "o Venator"
 nick_the_venator_desc: "Nenhum animal pode escapar aos [Select_CString( CHARACTER.IsLocalPlayer, 'seus', 'seus' )] instintos de caça[CHARACTER.Custom('ES_XA')]."
 #EP2
 nick_the_dirty: "o/a Suj[CHARACTER.Custom('ES_OA')]"
 nick_the_dirty_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'luchas', 'lucha')] tão sujo quanto é [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua')] aparência."
 nick_the_cheater: "o/a Trapaceir[CHARACTER.Custom('ES_OA')]"
 nick_the_cheater_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] um paradigma de desonra e duplicidade."
 nick_the_toxophilite: "o/a Toxofílico[CHARACTER.Custom('ES_OA')]"
 nick_the_toxophilite_desc: "Arcos, projéteis, balistas… Poucas coisas na arte do combate direto à distância que não [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le')] entusiasmem."
 nick_saddle_born: "Sela[CHARACTER.Custom('ES_OA')]"
 nick_saddle_born_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'encajas', 'encaja')] parece tão natural na sela que alguns sussurram que nunca [Select_CString( CHARACTER.IsLocalPlayer, 'has', 'ha')] pisou o chão."
 nick_the_champion: "o/a Campeão[CHARACTER.Custom('ES_OnOna')]"
 nick_the_champion_desc: "Campeão[CHARACTER.Custom('ES_OnOna')]! #EMP Campe[CHARACTER.Custom('ES_OnOna')]#!! O brado ecoa por onde [Select_CString( CHARACTER.IsLocalPlayer, 'vas', 'va')], e embora a aclamação seja agradável, o volume não é."
 nick_northmen_slayer: "o Matador dos Nórdicos"
 nick_northmen_slayer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'abatiste', 'abatió')] ignominiosamente abateu um saqueador nórdico."
 nick_pirate_slayer: "o Flagelo dos Mares"
 nick_pirate_slayer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'masacraste', 'masacró' )] massacrava um pirata notório."
 nick_son_of_dangerous_animal: "[CHARACTER.Custom('GetDaughterSon')|U] de [CHARACTER.Custom('GetAnimalPlural')]"
 nick_son_of_dangerous_animal_desc: "Desde logo que [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim)]chamam assim. Que útero de mãe humana poderia ter gerado tal fera?"
 nick_the_own_culture: "o [CHARACTER.GetCulture.GetNameNoTooltip]"
 nick_the_own_culture_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tu', 'Su' )] epíteto é uma marca de [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] história, uma da qual [Select_CString( CHARACTER.IsLocalPlayer, 'te enorgulleces', 'se enorgullece')]."
 nick_the_mother_culture: "o [CHARACTER.GetMother.GetCulture.GetNameNoTooltip]"
 nick_the_mother_culture_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tu', 'Su' )] apelido faz referência a [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] linhagem paterna, não à [Select_CString( CHARACTER.IsLocalPlayer, 'tuyo', 'suyo' )] própria."
 nick_the_father_culture: "o [CHARACTER.GetFather.GetCulture.GetNameNoTooltip]"
 nick_the_father_culture_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tu', 'Su' )] o apelido faz referência a [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] linhagem materna, não à [Select_CString( CHARACTER.IsLocalPlayer, 'tuyo', 'suyo' )] próprio."
 nick_prester_john: "Prester John"
 nick_prester_john_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'te has', 'se ha')] se deixou levar um pouco demais por lendas estrangeiras exóticas."
 nick_prester_joan: "Prester Joan"
 nick_prester_joan_desc: "$nick_prester_john_desc$"
 nick_the_thoughtless: "o Irrefletido"
 nick_the_thoughtless_desc: "Dizem que não é que [Select_CString( CHARACTER.IsLocalPlayer, 'hables', 'hable' )] fale sem pensar, é que não [Select_CString( CHARACTER.IsLocalPlayer, 'piensas', 'piensa' )] de jeito nenhum."
 nick_the_heartless: "o Desalmado"
 nick_the_heartless_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] não [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] uma pessoa sentimental, tendo executado um amante."
 nick_the_craven: "o Covarde"
 nick_the_craven_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] sempre [Select_CString( CHARACTER.IsLocalPlayer, 'has', 'ha' )] acreditou que a discrição é a melhor parte da valentia."
 nick_monarch_of_beauty_and_noblesse_masc: "Rei da Beleza e Nobreza"
 nick_monarch_of_beauty_and_noblesse_masc_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Tus', 'Sus' )] súditos são notoriamente efusivos nos elogios a [Select_CString( CHARACTER.IsLocalPlayer, 'tu persona', CHARACTER.GetShortUINameNoTooltipNoFormat )]"
 nick_monarch_of_beauty_and_noblesse: "Rainha da Beleza e Nobreza"
 nick_monarch_of_beauty_and_noblesse_desc: "$nick_monarch_of_beauty_and_noblesse_masc_desc$"
 nick_monarch_of_grim_and_grievance_masc: "Rei da Tristeza e do Ressentimento"
 nick_monarch_of_grim_and_grievance_masc_desc: "Os súditos de [Select_CString( CHARACTER.IsLocalPlayer, 'tu señorío', CHARACTER.GetShortUINameNoTooltipNoFormat )] não [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] respeitam, muito menos pelo [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] aspecto."
 nick_monarch_of_grim_and_grievance: "Rainha da Tristeza e do Ressentimento"
 nick_monarch_of_grim_and_grievance_desc: "$nick_monarch_of_grim_and_grievance_masc_desc$"
 nick_monarch_of_dice: "o [CHARACTER.GetTitleAsNameNoTooltip] dos Dados"
 nick_monarch_of_dice_desc: "[Select_CString( CHARACTER.IsLocalPlayer, 'Sua', 'Sua' )] coração, determinação e sorte simplesmente fenomenais parecem [Select_CString( CHARACTER.IsLocalPlayer, 'hacerte', 'hacerle')] superar qualquer jogo de azar."
 nick_the_naysayer: "o/a Negativ[CHARACTER.Custom('ES_OA')]"
 nick_the_naysayer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'te presentaste', 'se presentó')] diante de [CHARACTER.GetFaith.HighGodName] e o mundo, e [Select_CString( CHARACTER.IsLocalPlayer, 'faltaste', 'faltó')] ao compromisso sagrado que [Select_CString( CHARACTER.IsLocalPlayer, 'habías', 'había')] fez."
 nick_monarch_of_fools_masc: "Bispo dos Tolos"
 nick_monarch_of_fools_masc_desc: "A [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetShortUINameNoTooltipNoFormat )] se [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] é considerado um[CHARACTER.Custom('ES_XA')] arauto[CHARACTER.Custom('ES_OA')] entre bufões."
 nick_monarch_of_fools: "Dama-Bispo dos Tolos"
 nick_monarch_of_fools_desc: "$nick_monarch_of_fools_masc_desc$"
 nick_the_just_widowed: "a Viúva Justa[CHARACTER.Custom('ES_OA')]"
 nick_the_just_widowed_desc: "O cônjuge recém-casado de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUINameNoTooltipNoFormat )] morreu tragicamente tão cedo."
 nick_monopod: "o Monópode"
 nick_monopod_desc: "Dizem que [Select_CString( CHARACTER.IsLocalPlayer, 'podrías', 'podría' )] duelar sobre a cabeça de um alfinete, se assim o [Select_CString( CHARACTER.IsLocalPlayer, 'quisieras', 'quisiera' )]."
 nick_sure_footed: "o Pé-Firme"
 nick_sure_footed_desc: "$nick_monopod_desc$"
 nick_the_resilient: "o Resiliente"
 nick_the_resilient_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'llegaste', 'llegó' )] tornou-se conhecid[CHARACTER.Custom('ES_OA')] como «[CHARACTER.GetNicknameNoTooltip]» após mostrar uma resistência extrema apesar de [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] muitas feridas permanentes."
 nick_one_eye: "Caolho[CHARACTER.Custom('ES_OA')]"
 nick_one_eye_desc: "$nick_monophthalmos_desc$"
 nick_one_hand: "Manco[CHARACTER.Custom('ES_OA')]"
 nick_one_hand_desc: "O braço perdido de [Select_CString( CHARACTER.IsLocalPlayer, 'tu persona', CHARACTER.GetShortUINameNoTooltip )] é uma característica tão marcante que todos [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] o chamem «[CHARACTER.GetNicknameNoTooltip]»."
 nick_one_leg: "Coj[CHARACTER.Custom('ES_OA')]"
 nick_one_leg_desc: "A perna perdida de [Select_CString( CHARACTER.IsLocalPlayer, 'tu persona', CHARACTER.GetShortUINameNoTooltipNoFormat )] é um traço tão marcante que todo mundo [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] chame “[CHARACTER.GetNicknameNoTooltip]”."
 nick_of_a_thousand_faces: "das Mil Faces"
 nick_of_a_thousand_faces_desc: "A [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetShortUINameNoTooltipNoFormat )] nunca é vista com a mesma máscara dois dias seguidos… se é que [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] [Select_CString( CHARACTER.IsLocalPlayer, 'tú', CHARACTER.GetSheHe )]…"
 nick_the_plaguebearer: "o(a) Portador[CHARACTER.Custom('ES_XA')] da peste"
 nick_the_plaguebearer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'estás', 'está' )] doente[CHARACTER.Custom('ES_OA')] e acometid[CHARACTER.Custom('ES_OA')] de maus humores, fazendo com que as pessoas mantenham distância."
 nick_the_persevering: "o Perseverante"
 nick_the_persevering_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'llegaste', 'llegó' )] a tornar-se conhecid[CHARACTER.Custom('ES_OA')] como «[CHARACTER.GetNicknameNoTooltip]» após demonstrar uma resistência extrema apesar de [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] muitas feridas permanentes."
 nick_the_lord_of_realm: "o [CHARACTER.GetLadyLord|U] de [CHARACTER.GetCapitalLocation.GetTitle.GetBaseNameNoTierNoTooltip]"
 nick_the_lord_of_realm_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] tão querid[CHARACTER.Custom('ES_OA')] por [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] súditos que [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] proclamam «[CHARACTER.GetNicknameNoTooltip]»."
 nick_twistedbeard: "Barba Retorcida"
 nick_twistedbeard_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] um[CHARACTER.Custom('ES_XA')] governante bret[CHARACTER.Custom('ES_OnOna')] ou de ascendência bretã com grande destreza marcial."
 nick_the_boar: "o Javali"
 nick_the_boar_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] forte, resistente e tenaz… mas não agradável à vista."
 nick_the_faceless: "o Sem-Rosto"
 nick_the_faceless_desc: "A [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetShortUINameNoTooltipNoFormat )] quase nunca se [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] vê desde que [Select_CString( CHARACTER.IsLocalPlayer, 'quedaste', 'quedó' )] desfigurad[CHARACTER.Custom('ES_OA')]."
 nick_the_cyclops: "o Ciclope"
 nick_the_cyclops_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] alto[CHARACTER.Custom('ES_OA')] e com apenas um olho, como o ciclope mitológico."
 nick_the_beanstalk: "o Pé de Feijão"
 nick_the_beanstalk_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] enormemente alto[CHARACTER.Custom('ES_OA')], mas [Select_CString( CHARACTER.IsFemale, 'delgada y enjuta', 'delgado y enjuto' )], o que leva a comparações com essa planta."
 nick_the_nun: "a Freira"
 nick_the_nun_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'tienes', 'tiene' )] um foco interior piedoso, preferindo passar os dias em oração silenciosa."
 nick_the_ill_ruler: "o Mau Governante"
 nick_the_ill_ruler_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'é', 'é' )] um governante ruim, que [Select_CString( CHARACTER.IsLocalPlayer, 'inspiras', 'inspira' )] pouco respeito após ter abusado de [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] poder, ou ter demonstrado incapacidade para manter a estabilidade no senhorio."
 nick_the_dragoness: "a Dragoa"
 nick_the_dragoness_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] temível… e dizem por aí que [Select_CString( CHARACTER.IsLocalPlayer, 'comes', 'come' )] pessoas."
 nick_the_careless: "o/a Descuidad[CHARACTER.Custom('ES_OA')]"
 nick_the_careless_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'abusaste', 'abusó' )] de [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] poder, daí este apelido pouco lisonjeiro durante uma guerra civil."
 nick_the_undying: "o Imperecível"
 nick_the_undying_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'deberías', 'debería' )] estar doente[CHARACTER.Custom('ES_OA')], mas [Select_CString( CHARACTER.IsLocalPlayer, 'estás', 'está' )] tremendamente saudável[CHARACTER.Custom('ES_OA')]."
 nick_of_the_empty_pockets: "dos Bolsos Vazios"
 nick_of_the_empty_pockets_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'tienes', 'tiene' )] buracos na bolsa e sempre se [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] lembrará pela dívida na qual [Select_CString( CHARACTER.IsLocalPlayer, 'hundiste', 'hundió' )] a tesouraria."
 nick_the_goliath: "o Golias"
 nick_the_goliath_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] [Select_CString( CHARACTER.IsFemale, 'una guerrera', 'un guerrero' )] enorme, como o Golias bíblico."
 nick_the_shield_of_capital: "o Escudo de [CHARACTER.GetCapitalLocation.GetTitle.GetBaseNameNoTierNoTooltip]"
 nick_the_shield_of_capital_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] [Select_CString( CHARACTER.IsFemale, 'una guerrera empedernida', 'un guerrero empedernido' )], amado[CHARACTER.Custom('ES_OA')] pelo povo de [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] capital."
 nick_the_ladder_legs: "Pernas de Escada"
 nick_the_ladder_legs_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'caminas', 'camina' )] anda por aí com pernas longas, como pernas de pau, o que convida a comentários mal-intencionados."
 nick_the_peacock: "o Pavão"
 nick_the_peacock_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'é', 'é' )] superficial e insípid[CHARACTER.Custom('ES_OA')] e [Select_CString( CHARACTER.IsLocalPlayer, 'exhibes', 'exhibe' )] [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] nova moda como um pássaro-do-paraíso."
 nick_the_bellower: "o/a Ressoador[CHARACTER.Custom('ES_OA')]"
 nick_the_bellower_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] muito, muito barulhent[CHARACTER.Custom('ES_OA')]. E muito, muito aterrorizante[CHARACTER.Custom('ES_XA')]."
 nick_the_healer: "o/a Curandeiro/a[CHARACTER.Custom('ES_XA')]"
 nick_the_healer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'has', 'ha' )] aprendeu a arte da medicina, e não [Select_CString( CHARACTER.IsLocalPlayer, 'rehúsas', 'rehúsa' )] tratar os necessitados."
 nick_the_prophet: "o Profeta"
 nick_the_prophet_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] um ícone religioso de renome."
 nick_the_understanding: "o/a Compreensiv[CHARACTER.Custom('ES_OA')]"
 nick_the_understanding_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] compassivo[CHARACTER.Custom('ES_OA')] e racional, e com prazer [Select_CString( CHARACTER.IsLocalPlayer, 'aconsejas', 'aconseja' )] a quem precisa."
 nick_the_righteous: "o/a Justo/a[CHARACTER.Custom('ES_OA')]"
 nick_the_righteous_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] conhecido por ter um forte senso de justiça e equidade."
 nick_the_venerable: "[CHARACTER.Custom('ES_ElLa')] Venerável"
 nick_the_venerable_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'has', 'ha' )] passou a vida de maneira respeitável, o que [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le')] lhe rendeu confiança."
 nick_the_miracle_worker: "o(a) Fazedor(a)[CHARACTER.Custom('ES_XA')] de milagres"
 nick_the_miracle_worker_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'te aventuras', 'se aventura' )] em assuntos místicos, mas [Select_CString( CHARACTER.IsLocalPlayer, 'usas', 'usa' )] o que [Select_CString( CHARACTER.IsLocalPlayer, 'aprendes', 'aprende' )] para fazer boas ações."
 nick_the_merciful: "o/a Compassivo[CHARACTER.Custom('ES_OA')]"
 nick_the_merciful_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] indulgente, benevolente e lent[CHARACTER.Custom('ES_OA')] para a ira. É raro que os prisioneiros pasem muito tempo em [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] masmorras."
 nick_the_silver_tongue: "Língua de Prata"
 nick_the_silver_tongue_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'sabes', 'sabe' )] sabe usar as palavras de maneiras que poucos dominam, e [Select_CString( CHARACTER.IsLocalPlayer, 'é', 'é' )] é capaz de virar a maioria das situações em [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] seu favor."
 nick_the_stallion: "o Garanhão"
 nick_the_stallion_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] forte, atlétic[CHARACTER.Custom('ES_OA')]… e muitas vezes se [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] olha com olhos de desejo."
 nick_the_forgetful: "o/a Esquecid[CHARACTER.Custom('ES_OA')]"
 nick_the_forgetful_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'te olvidas', 'se olvida' )] frequentemente de [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] deveres, para consternação de [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] súditos."
 nick_the_hermit: "o/a Eremit[CHARACTER.Custom('ES_OA')]"
 nick_the_hermit_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'prefieres', 'prefiere' )] não gosta de companhia e raramente é [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] visto."
 nick_the_recluse: "o/a Recluso/a[CHARACTER.Custom('ES_OA')]"
 nick_the_recluse_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'sueles aislarte', 'sueles aislarse' )] longe de olhares indiscretos."
 nick_the_feeble: "o Fraco"
 nick_the_feeble_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] raramente [Select_CString( CHARACTER.IsLocalPlayer, 'puedes', 'puede' )] reunir a força necessária até mesmo para mover objetos pequenos, e muitas vezes se [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] ridiculariza por isso."
 nick_the_vain: "o/a Va[CHARACTER.Custom('ES_OA')]"
 nick_the_vain_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] considerado por [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] súditos como tremendamente superficial e fútil[CHARACTER.Custom('ES_OA')]."
 nick_the_castellan: "o/a Castellão[CHARACTER.Custom('ES_OA')]"
 nick_the_castellan_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'has', 'ha' )] supervisionado muitos projetos de construção dentro de [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] domínio."
 nick_the_carpenter: "o/a Carpinteiro/a[CHARACTER.Custom('ES_OA')]"
 nick_the_carpenter_desc: "Assim como Jesus era carpinteiro, [CHARACTER.GetShortUINameNoTooltipNoFormat] também o [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )]. Piedos[CHARACTER.Custom('ES_OA')] e diligente."
 nick_the_griffin: "o Grifo"
 nick_the_griffin_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] feroz tanto com a espada quanto com as intrigas."
 nick_the_patron_of_arts: "o Patrono das Artes"
 nick_the_patron_of_arts_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'é', 'é' )] famoso por [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] patronato de artistas e artesãos."
 nick_the_zealot: "o/a Fervoros[CHARACTER.Custom('ES_OA')]"
 nick_the_zealot_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'é', 'é' )] célebre por uma devoção violenta a [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] fé."
 nick_the_elder: "o/a Viej[CHARACTER.Custom('ES_OA')]"
 nick_the_elder_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'has', 'ha' )] viveu muitos, muitos anos. Muito mais do que se poderia esperar."
 nick_the_evil: "o/a Maligno[CHARACTER.Custom('ES_OA')]"
 nick_the_evil_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] um[CHARACTER.Custom('ES_XA')] pecador[CHARACTER.Custom('ES_XA')], ímpi[CHARACTER.Custom('ES_OA')], e nunca [Select_CString( CHARACTER.IsLocalPlayer, 'has', 'ha' )] temido intimidar padres e súditos por igual."
 nick_the_jovial: "o Jovial"
 nick_the_jovial_desc: "Banquetes! Danças! Comida! [CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] famoso por ser boa companhia em todos os tipos de reuniões."
 nick_the_jolly: "o Alegre"
 nick_the_jolly_desc: "Música e boa comida! Isso é tudo que a [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetShortUINameNoTooltipNoFormat )] [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] importa aos olhos de [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] vassalos."
 nick_the_strange: "o/a Estranh[CHARACTER.Custom('ES_OA')]"
 nick_the_strange_desc: "Embora [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] súditos não achem que [Select_CString( CHARACTER.IsLocalPlayer, 'seas', 'sea' )] mal[CHARACTER.Custom('ES_OA')], [CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'tienes', 'tiene' )] umas paixões… bastante excêntricas."
 nick_the_unlucky: "o/a Azarado[CHARACTER.Custom('ES_OA')]"
 nick_the_unlucky_desc: "Parece que [CHARACTER.GetShortUINameNoTooltipNoFormat|U] nunca [Select_CString( CHARACTER.IsLocalPlayer, 'consigues', 'consigue' )] um momento de paz, já que a desgraça [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] o acompanha desde o nascimento."
 nick_the_lucky: "o/a Afortunad[CHARACTER.Custom('ES_OA')]"
 nick_the_lucky_desc: "Os desafios da vida são meros obstáculos no caminho para [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetShortUINameNoTooltipNoFormat )] que, obviamente, [Select_CString( CHARACTER.IsLocalPlayer, 'has', 'ha' )] sido abençoad[CHARACTER.Custom('ES_OA')] pelas forças do poder."
 nick_the_effeminate: "o/a Afeminad[CHARACTER.Custom('ES_OA')]"
 nick_the_effeminate_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'te has', 'se ha' )] visto menosprezado[CHARACTER.Custom('ES_OA')] por [Select_CString( CHARACTER.IsLocalPlayer, 'tu', 'su' )] falta de destreza guerreira em uma cultura dominada por ideais de masculinidade."
 nick_the_clueless: "o/a Desinformad[CHARACTER.Custom('ES_OA')]"
 nick_the_clueless_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] simplesmente nunca [Select_CString( CHARACTER.IsLocalPlayer, 'pareces', 'parece' )] ser capaz de tomar uma decisão, passando de uma coisa para outra com a convicção de uma sardinha."
 nick_the_ill_tempered: "o/a Mal-humorado[CHARACTER.Custom('ES_OA')]"
 nick_the_ill_tempered_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] rápid[CHARACTER.Custom('ES_OA')] para a ira… e [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] súditos sabem disso."
 nick_the_sleeping_king: "o [CHARACTER.GetTitleAsNameNoTooltip] Adormecido"
 nick_the_sleeping_king_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'te pasas', 'se pasa' )] o dia todo e a noite toda na cama, despertando especulações entre [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] súditos. Talvez seja uma maldição?"
 nick_the_humble: "o Humilde"
 nick_the_humble_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'tienes', 'tiene' )] um comportamento altruísta e humilde, creditando à divindade todos os seus sucessos."
 nick_the_horse: "o Cavalo"
 nick_the_horse_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] [Select_CString( ROOT.Char.IsFemale, 'una guerrera', 'un guerrero' )] de renome das estepes, que lidera hordas a galope para saquear terras estrangeiras."
 nick_the_desired: "o/a Desejad[CHARACTER.Custom('ES_OA')]"
 nick_the_desired_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] desejad[CHARACTER.Custom('ES_OA')] por toda parte."
 nick_the_determined: "o/a Determinad[CHARACTER.Custom('ES_OA')]"
 nick_the_determined_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] célebre por [Select_CString( CHARACTER.IsLocalPlayer, 'proponerte', 'proponerse' )] algo e #EMP hacerlo.#!."
 nick_do_nothing: "Faz-Nada"
 nick_do_nothing_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] conhecido por sua preguiça, inação e falta de ambição."
 nick_the_indolent: "o Indolente"
 nick_the_indolent_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] célebre por ser petulantemente apático[CHARACTER.Custom('ES_OA')]."
 nick_the_sluggard: "o/a Preguiçoso[CHARACTER.Custom('ES_OA')]"
 nick_the_sluggard_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'te tomas', 'se toma' )] seu tempo para fazer #EMP lo que sea#!…"
 nick_the_idle: "o/a Ocioso[CHARACTER.Custom('ES_OA')]"
 nick_the_idle_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'é', 'é' )] célebre por [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )]… não fazer nada."
 nick_the_short: "o/a Curto[CHARACTER.Custom('ES_OA')]"
 nick_the_short_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] baixo[CHARACTER.Custom('ES_OA')] de estatura, algo que todos logo apontam."
 nick_longshanks: "Pernas Longas"
 nick_longshanks_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] [Select_CString( CHARACTER.IsFemale, 'atlética y musculosa', 'atlético y musculoso' )], e é mais comumente encontrado malhando.[Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] se encontra fazendo exercício."
 nick_the_wrathful: "o Irascível"
 nick_the_wrathful_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] célebre por ser de pavio curto e ainda mais curto o tempo que leva para sacar a espada."
 nick_elbow_high: "Altura do Cotovelo"
 nick_elbow_high_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] não [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] mais alt[CHARACTER.Custom('ES_OA')] que uma criança, para divertimento de [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] companheiros."
 nick_the_rotund: "o/a Redond[CHARACTER.Custom('ES_OA')]"
 nick_the_rotund_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] quase tão larg[CHARACTER.Custom('ES_OA')] quanto alt[CHARACTER.Custom('ES_OA')], praticamente esféric[CHARACTER.Custom('ES_OA')]!"
 nick_the_faith: "[CHARACTER.Custom('ES_ElLa')] do credo [CHARACTER.GetFaith.GetAdherentNameNoTooltip]"
 nick_the_faith_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] uma pessoa ardorosa de fé [CHARACTER.GetFaith.GetAdherentNameNoTooltip] deslocada, o que [Select_CString( CHARACTER.IsLocalPlayer, 'te', CHARACTER.GetHerHim )] torna uma novidade aos olhos dos demais."
 nick_the_eunuch: "o Eunuco"
 nick_the_eunuch_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'estás', 'está' )] desprovido de masculinidade, algo que as pessoas gostam de apontar."
 nick_longsword: "Espada Longa"
 nick_longsword_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'estudiaba', 'estudió' )] estudou a lâmina enquanto os outros festejavam."
 nick_greataxe: "Grande Machado"
 nick_greataxe_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] [Select_CString( CHARACTER.IsFemale, 'una maestra', 'un maestro' )] do machado. Inimigos, cuidado!"
 nick_the_mace: "a Maça"
 nick_the_mace_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'puedes', 'puede' )] pode espancar qualquer inimigo até a submissão."
 nick_the_spear_of_capital: "a Lança de [CHARACTER.GetCapitalLocation.GetTitle.GetBaseNameNoTierNoTooltip]"
 nick_the_spear_of_capital_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] um parangon de luta com lança."
 nick_the_maul: "o Malho"
 nick_the_maul_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] célebre por esmagar toda a oposição com um martelo poderoso."
 nick_no_pants: "Sem-Calças"
 nick_no_pants_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'te has', 'se ha' )] foi menosprezad[CHARACTER.Custom('ES_OA')] por ser um[CHARACTER.Custom('ES_XA')] [CHARACTER.GetWomanMan] em uma cultura dominada por ideais de masculinidade."
 nick_the_tiger_of_place: "o Tigre de [CHARACTER.GetCapitalLocation.GetTitle.GetBaseNameNoTierNoTooltip]"
 nick_the_tiger_of_place_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] um[CHARACTER.Custom('ES_XA')] guerreiro temível[CHARACTER.Custom('ES_OA')] e valente defensor[CHARACTER.Custom('ES_XA')]."
 nick_the_navigator: "o Navegador"
 nick_the_navigator_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] [Select_CString( CHARACTER.IsFemale, 'una maestra', 'un maestro' )] dos mares, que atravessa as ondas como uma serpente marinha."
 nick_foul_fart: "Peido Fétido"
 nick_foul_fart_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] famoso por ter… um controle questionável de [Select_CString( CHARACTER.IsLocalPlayer, 'tus', 'sus' )] funções corporais durante festas, reuniões do conselho e encontros públicos."
 nick_ale_lover: "Amante da Cerveja"
 nick_ale_lover_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'é', 'é' )] é capaz de beber qualquer um debaixo da mesa!"
 nick_the_berserker: "o Berserker"
 nick_the_berserker_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] um[CHARACTER.Custom('ES_XA')] temível e #EMP furios[CHARACTER.Custom('ES_OA')]#! guerreir[CHARACTER.Custom('ES_OA')] que destrói a moral de qualquer um que se ponha diante de [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetSheHe )]."
 nick_the_actually_bald: "o/a Calv[CHARACTER.Custom('ES_OA')]"
