 nick_the_slobberer: "o Babalão"
 nick_the_slobberer_desc: "A [Select_CString( CHARACTER.IsLocalPlayer, 'ti', CHARACTER.GetShortUINameNoTooltipNoFormat )] [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )]tem dificuldade para comer com dignidade em eventos diplomáticos."
