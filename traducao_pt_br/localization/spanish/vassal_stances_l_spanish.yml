 parochial: "Paroquial"
 parochial_desc: "$parochial$ [Concept( 'vassals', 'vassalo' )|E] querem estabilidade, descentralização, paz e que o reino se mantenha fora de assuntos externos. Vassalos honrados ou reservados costumam adotar esta [vassal_stance|lE].\n\n#low Os vassalos do tipo $parochial$ gostam quando seu senhor:#!\n$EFFECT_LIST_BULLET$ Construa ou aprimore [holdings|lE]\n$EFFECT_LIST_BULLET$ Torne-os [guardians|lE] de sua [close_family|lE]\n$EFFECT_LIST_BULLET$ Use a [councillor_task|lE] $task_domestic_affairs$\n\n#low Os vassalos do tipo $parochial$ não gostam quando seu senhor:#!\n$EFFECT_LIST_BULLET$ Tenha uma [crown_authority|lE] alta\n$EFFECT_LIST_BULLET$ Declare [wars|lE] não triviais\n\nPreferem [heirs|lE] honrados e racionais com grande habilidade [Concept( 'stewardship', 'administrativa' )|E] [diplomacy_i]."
