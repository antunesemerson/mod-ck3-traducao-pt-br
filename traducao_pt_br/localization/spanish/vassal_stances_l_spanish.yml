 minority: "Minoria"
 minority_desc: "Os [Concept( 'vassals', 'vassalos' )|E] $minority$ sentem que sua [liege|lE] marginaliza sua [faith|lE] ou [culture|lE]. Vassalos de [faiths|lE] hostis ou culturas com menos de 30% de [cultural_acceptance|lE] costumam adotar esta [vassal_stance|lE].\n\n#low Vassalos minoritários gostam quando seu senhor:#!\n$EFFECT_LIST_BULLET$Usa a [councillor_task|lE] $task_accept_culture$\n#weak (pois costumam mudar de postura quando superam 30% de aceitação cultural)#!\n\n#low Vassalos minoritários não gostam quando seu senhor:#!\n$EFFECT_LIST_BULLET$Converte a fé ou cultura de um [county|lE]\n$EFFECT_LIST_BULLET$Tem uma [crown_authority|lE] alta\n\nPreferem [heirs|lE] honoráveis e compassivos, de preferência de uma fé ou cultura diferente da de seu senhor atual."
