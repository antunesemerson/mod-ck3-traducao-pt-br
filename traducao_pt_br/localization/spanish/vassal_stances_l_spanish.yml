 zealot: "Zelote"
 zealot_desc: "Os [vassals|E] do tipo $zealot$ se concentram em assuntos da fé e são influenciados por ações piedosas. Vassalos fanáticos e vingativos costumam adotar esta [vassal_stance|lE], assim como o [clergy|lE].\n\n#low Vassalos fervorosos gostam quando seu senhor:#!\n$EFFECT_LIST_BULLET$Constrói ou melhora [holdings|lE] de [Concept( 'temple', 'templos' )|E]\n$EFFECT_LIST_BULLET$Tem sucesso com a [scheme|lE] [GetScheme('learn_language').GetTypeName|l]\n$EFFECT_LIST_BULLET$Tem [traits|lE] [Concept( 'virtuous', 'virtuosos' )|E]\n$EFFECT_LIST_BULLET$Realiza [activities|lE] de [pilgrimage|lE]\n\n#low Vassalos fervorosos não gostam quando seu senhor:#!\n$EFFECT_LIST_BULLET$Pede [gold|lE] [gold_i] ao [head_of_faith|lE]\n$EFFECT_LIST_BULLET$Tem [traits|lE] [Concept( 'sinful', 'pecaminosos' )|E]\n\nPreferem [heirs|lE] fervorosos e virtuosos com grande habilidade em [learning|lE] [learning_i]."
