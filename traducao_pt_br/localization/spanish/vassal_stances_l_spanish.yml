 belligerent_desc: "[SelectLocalization(GetPlayer.GetGovernment.IsType('nomad_government'), 'belligerent_nomad_desc', 'belligerent_general_desc')]"
 belligerent_nomad_desc: "Um [vassal|lE] $belligerent$ busca exemplos de autoridade de seu [liege|lE]. Participa frequentemente em torneios para testemunhar as façanhas de [prowess|lE] de seu senhor. Os [nomads|lE] têm maior chance de adotar esta [vassal_stance|lE].\n\n#low Os vassalos do tipo $belligerent$ gostam quando seu senhor:#!\n$EFFECT_LIST_BULLET$ Tenha uma [nomadic_authority|lE] alta\n$EFFECT_LIST_BULLET$ Organize atividades de [GetActivityType( 'activity_tournament' ).GetName|l] e vença [contests|lE]\n$EFFECT_LIST_BULLET$ Organize [activities|lE] de [GetActivityType( 'activity_hunt' ).GetName|l]\n$EFFECT_LIST_BULLET$ Vença [single_combat_duel_plural|lE]\n$EFFECT_LIST_BULLET$ Exija [obedience|lE]\n\n#low Os vassalos do tipo $belligerent$ não gostam quando seu senhor:#!\n$EFFECT_LIST_BULLET$ Perca [single_combat_duel_plural|lE]\n$EFFECT_LIST_BULLET$ Tenha uma [obedience|lE] baixa\n$EFFECT_LIST_BULLET$ Tenha [succession_laws|lE] de partilha\n\nPreferem [heirs|lE] audazes e irascíveis com uma habilidade de [prowess|lE] [prowess_i] alta."
 belligerent_general_desc: "Um [vassal|lE] $belligerent$ busca exemplos de autoridade de seu [liege|lE]. Ele costuma participar de torneios para testemunhar em primeira mão os feitos de [prowess|lE] de seu suserano. Os [nomads|lE] têm maior chance de adotar esta [vassal_stance|lE].\n\n#low Os vassalos do tipo $belligerent$ gostam quando seu suserano:#!\n$EFFECT_LIST_BULLET$ Tenha uma [crown_authority|lE] alta\n$EFFECT_LIST_BULLET$ Organize atividades de [GetActivityType( 'activity_tournament' ).GetName|l] e vença [contests|lE]\n$EFFECT_LIST_BULLET$ Organize [activities|lE] de [GetActivityType( 'activity_hunt' ).GetName|l]\n$EFFECT_LIST_BULLET$ Vença [single_combat_duel_plural|lE]\n\n#low Os vassalos do tipo $belligerent$ não gostam quando seu suserano:#!\n$EFFECT_LIST_BULLET$ Perca [single_combat_duel_plural|lE]\n$EFFECT_LIST_BULLET$ Tenha uma [crown_authority|lE] baixa\n$EFFECT_LIST_BULLET$ Tenha [succession_laws|lE] de partilha\n\nPreferem [heirs|lE] audazes e irascíveis com uma habilidade de [prowess|lE] [prowess_i] alta."
