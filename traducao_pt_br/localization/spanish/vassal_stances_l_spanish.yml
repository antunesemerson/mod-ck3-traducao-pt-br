 courtly: "Cortesão"
 courtly_desc: "Os [Concept( 'vassals', 'vassalos' )|E] [GetVassalStance( 'courtly' ).GetNameNoTooltip|l] acreditam na nobreza e na tradição e desejam preservar as hierarquias existentes. Vassalos sociáveis ou compassivos costumam adotar esta [vassal_stance|lE].\n\n#low Vassalos refinados gostam quando seu senhor:#!\n$EFFECT_LIST_BULLET$Concede [court_positions|lE]\n$EFFECT_LIST_BULLET$Cria novos [titles|lE]\n$EFFECT_LIST_BULLET$Convida-os para [activities|lE] do tipo [GetActivityType('activity_feast').GetName|l]\n\n#low Vassalos refinados não gostam quando seu senhor:#!\n$EFFECT_LIST_BULLET$Concede [titles|lE] a personagens [lowborn|lE]\n$EFFECT_LIST_BULLET$[Concept( 'marries', 'Casa-se' )|E] com um personagem [lowborn|lE] como [primary_spouse|lE]\n$EFFECT_LIST_BULLET$[Concept( 'disinherits', 'Deserda' )|E] [heirs|lE] não contestados\n\nPreferem [heirs|lE] sociáveis e compassivos com alta habilidade [Concept( 'diplomacy', 'diplomática' )|E] [diplomacy_i]."
