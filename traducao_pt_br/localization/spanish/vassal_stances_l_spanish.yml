l_spanish:
 glory_hound: "Caçador de Glória"
 glory_hound_desc: "Os [Concept( 'vassals', 'vassalos' )|E] $glory_hound$ valorizam a posição e o prestígio, e mostrar ao mundo a força do reino do qual fazem parte. Vassalos ousados ou pouco compassivos costumam adotar esta [vassal_stance|lE].\n\n#low Os vassalos caçadores de glória gostam quando seu senhor:#!\n$EFFECT_LIST_BULLET$ Tenha [succession_law|lE] de partilha\n$EFFECT_LIST_BULLET$ Conquiste a [victory|lE] em [wars|lE] ofensivas\n$EFFECT_LIST_BULLET$ Os convide para [activities|lE] de [GetActivityType('activity_hunt').GetName|l]\n\n#low Os vassalos caçadores de glória não gostam quando seu senhor:#!\n$EFFECT_LIST_BULLET$ Tenha alta [crown_authority|lE]\n$EFFECT_LIST_BULLET$ Assine a [defeat|lE] ou a [white_peace|lE] nas guerras\n$EFFECT_LIST_BULLET$ Se [Concept('marries', 'case')|E] com um personagem [lowborn|lE] como [primary_spouse|lE]\n\nPreferem [heirs|lE] valentes e audaciosos com alta habilidade [Concept( 'martial', 'marcial' )|E] [martial_i]."
 glory_hound_filter_option: "$glory_hound$"
