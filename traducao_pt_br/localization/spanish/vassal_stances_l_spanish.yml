 barons_and_minor_landholders: "Pequeno Proprietário"
 barons_and_minor_landholders_desc: "Os [vassals|E] de tipo $barons_and_minor_landholders$ desejam liberdade e impostos baixos. Todos os [rulers|lE] de posto de barão adotarão esta [vassal_stance|lE].\n\n#low Vassalos do tipo $barons_and_minor_landholders$ gostam quando seu senhor:#!\n$EFFECT_LIST_BULLET$Tem uma [crown_authority|lE] baixa\n\n#low Vassalos proprietários de terras menores não gostam quando seu senhor:#!\n$EFFECT_LIST_BULLET$Revoga [baronies|lE]\n$EFFECT_LIST_BULLET$Tem uma [crown_authority|lE] alta\n\nPreferem [heirs|E] generosos e compassivos."
