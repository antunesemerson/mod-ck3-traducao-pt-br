 glory_hound_opinion: "Opinião de todo [vassal|lE] [GetVassalStance( 'glory_hound' ).GetName|l][GetVassalStance( 'glory_hound' ).GetTextIcon]"
 glory_hound_same_faith_opinion: "$glory_hound_opinion$ #weak (Mesma [faith|lE])#!"
