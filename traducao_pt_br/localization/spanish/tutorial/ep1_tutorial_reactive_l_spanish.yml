l_spanish:
 #Tell the player that Hybridising is a thing they SHOULD do, whether or not they can currently
 reactive_advice_should_form_hybrid_culture: "Culturas Híbridas"
 action_reactive_advice_should_form_hybrid_culture: "$open_tutorial_lesson$$reactive_advice_should_form_hybrid_culture$"
 action_reactive_advice_should_form_hybrid_culture_desc: "Trabalhe para formar uma [hybrid_culture|lE] com o [culture.GetCollectiveNoun]."
 action_reactive_advice_should_form_hybrid_culture_click: "$click_to_open_lesson$"
 lessons_ep1_form_hybrid_culture: "$reactive_advice_should_form_hybrid_culture$"
 lessons_ep1_should_form_hybrid_culture_desc: "Você pode formar uma [hybrid_culture|lE] com esta [culture|lE], se a [cultural_acceptance|lE] for alta o suficiente e sua cultura tiver mais de 50 anos!\n\nIsso significa que você criará uma nova cultura, com partes tanto da sua cultura quanto da outra.\n\nVocê pode ganhar aceitação cultural se:\n$EFFECT_LIST_BULLET$Conceder [counties|lE] dessa cultura a personagens dessa cultura\n$EFFECT_LIST_BULLET$Usar a [councillor_task|lE] [accept_culture|lE]\n$EFFECT_LIST_BULLET$Aumentar a [culture_intermingling|lE]\n$EFFECT_LIST_BULLET$Ter [vassals|lE] dessa cultura\n\nSe você tiver alta aceitação cultural e pelo menos um condado dessa cultura dentro do seu [realm|lE]!"
 lessons_ep1_hybrid_culture_benefits: "Benefícios das Culturas Híbridas"
 lessons_ep1_hybrid_culture_benefits_desc: "Formar uma cultura híbrida traz vários benefícios:\n\n$EFFECT_LIST_BULLET$Você poderá escolher [culture_pillars|lE] e [culture_traditions|lE] de qualquer uma das culturas parentais.\n$EFFECT_LIST_BULLET$Sua nova cultura herdará todas as [innovations|lE] de ambas as culturas parentais.\n$EFFECT_LIST_BULLET$Terá alta aceitação cultural com ambas as culturas parentais\n$EFFECT_LIST_BULLET$Uma cultura híbrida pode converter as terras de suas culturas parentais muito mais rápido por alguns anos após sua formação."
 #Royal Court Feature
 action_reactive_advice_royal_court: "$open_tutorial_lesson$$ra_rc_intro$"
 action_reactive_advice_royal_court_desc: "Abra isto para uma introdução à sua Corte Real"
 action_reactive_advice_royal_court_click: "$click_to_open_lesson$"
 reactive_advice_royal_court: "$ra_rc_intro$"
 ra_rc_intro: "Corte Real"
 ra_rc_intro_desc: "¡Ahora tienes acceso a tu propia [royal_court|lE]!\n\nLa corte real es un tipo especial de corte que representa tu entrada en el escenario mundial por todo lo alto, lo cual te dará acceso a muchas opciones y beneficios nuevos.\n\nEstá disponible para [kings|lE] y [emperors|lE] de los [Concept( 'government', 'gobiernos' )|E] [GetGovernment( 'feudal_government' ).GetName|l], [GetGovernment( 'clan_government' ).GetName|l], [GetGovernment( 'tribal_government' ).GetName|l] y [GetGovernment( 'administrative_government' ).GetName|l]."
 ra_rc_open: "$ra_rc_intro$"
 ra_rc_open_desc: "Puedes hacer muchas cosas en tu [royal_court|lE], así que no dudes en explorar estas opciones por tu cuenta.\n\nPor ahora, hagamos un rápido recorrido por todas las nuevas acciones que tienes a tu disposición."
 ra_rc_open_prompt: "Abrir a Corte Real (destacada)"
 ra_rc_throne_room_open: "$ra_rc_intro$"
 ra_rc_throne_room_open_desc: "Para continuar, vamos voltar para a Sala do Trono"
 ra_rc_throne_room_open_prompt: "Abrir a aba da Sala do Trono (destacada)"
 ra_rc_throne_room: "$ra_rc_intro$"
 ra_rc_throne_room_desc: "Esta é a sua Sala do Trono. Várias situações e [court_events|lE] podem ocorrer aqui de tempos em tempos, e você pode escolher intervir no que está acontecendo."
 ra_rc_hold_court: "Realizar Corte"
 ra_rc_hold_court_desc: "Se você sentir que sua Sala do Trono não está animada o suficiente, você pode [hold_court|lE]. Isso convida requerentes de todo o seu [realm|lE], trazendo seus problemas diante do seu sábio julgamento."
 ra_rc_grandeur_open: "$ra_rc_grandeur$"
 ra_rc_grandeur_open_desc: "No entanto, talvez ninguém queira ir à sua [royal_court|lE] se ela não for bem conhecida! Em seguida, vamos dar uma olhada no Esplendor da Corte!"
 ra_rc_grandeur_open_prompt: "Abrir a aba do Esplendor da Corte (destacada)"
 ra_rc_grandeur: "Esplendor da Corte"
 ra_rc_grandeur_desc: "Seu [grandeur_level|lE] indica o quão famoso é o seu [royal_court|lE].\n\nVários fatores contribuem para a [grandeur|lE], mas as principais fontes são [amenities|lE] e [court_artifacts|lE].\n\nConforme seu [realm|lE] cresce, espera-se que você tenha alcançado níveis mais altos de grandeza; isso é conhecido como [grandeur_expectations|lE]."
 ra_rc_amenities: "Amenidades da Corte"
 ra_rc_amenities_desc: "[amenities|lE] são vários serviços e conveniências que você oferece a todos que frequentam seu [royal_court|lE]. Cada uma oferece seus próprios benefícios, e todas contribuem para o [grandeur|lE].\n\nTodas elas custam [gold|lE] mensalmente, então tome cuidado para não gastar demais!"
 ra_rc_court_types_and_language: "Tipos de Corte e Idioma da Corte"
 ra_rc_court_types_and_language_desc: "Si quiere profundizar en la [grandeur|lE], puedes explorar los [court_types|lE] e [court_language|lE].\n\nLos tipos de corte afectan lo que ciertos [grandeur_levels|lE] te dan, mientras que cambiar el lenguaje de tu corte puede aumentar tu [grandeur|lE] total."
 ra_rc_artifacts_open: "$ra_rc_artifacts$"
 ra_rc_artifacts_open_desc: "Por fim, vamos dar uma olhada nos Artefatos da Corte, outra fonte de [grandeur|lE], bem como outros benefícios."
 ra_rc_artifacts_open_prompt: "Abrir a aba dos Artefatos da Corte (destacada)"
 ra_rc_artifacts: "Artefatos da Corte"
 ra_rc_artifacts_desc: "Aquí podrás elegir qué [court_artifacts|lE] se exhiben en tu [royal_court|lE].\n\nLos artefactos de la corte son [Concept( 'artifacts', 'objetos' )|E] especiales como estatuas y tapices que se pueden exponer. Proporcionan distintas bonificaciones y también te dan [grandeur|lE].\n\nAhora volvamos al salón del trono."
 ra_rc_conclusion: "$ra_rc_intro$"
 ra_rc_conclusion_desc: "Este es el fin del recorrido por tu [royal_court|lE].\n\nPor ahora, siéntete libre de probar lo que quieras. ¡Te sugerimos [hold_court|lE] para celebrar tu nueva posición!"
 #Fund Inspiration
 lessons_ep1_fund_inspiration: "Financiar Inspirações"
 ra_inspiration_open_desc: "Ahora puedes financiar tu primera [inspiration|lE]. Inspiración es el deseo de un personaje de crear un [artifact|lE].\n\nLos [characters|lE] [Concept( 'inspired', 'inspirados' )|E] vienen y van por las [royal_courts|lE] más prestigiosas del mundo; se te notificará cuando uno de ellos se detenga en tu corte, y se te invitará a ser [sponsor|lE] de su [project|lE].\n\nEl pago de una cantidad variable de oro te asegurará los servicios de este personaje y, después de un tiempo, ¡un nuevo artefacto!"
 ra_inspiration_open: "Inspirações"
 ra_inspiration_court_view: "Encontrar Inspirações"
 ra_inspiration_court_view_desc: "En tu [royal_court|lE], a la izquierda puedes ver todas las [inspirations|lE] presentes actualmente en tu corte.\n\nPuedes comprobar su estado haciendo clic en su icono (resaltado)."
 ra_inspiration_court_view_prompt: "Clique em um Ícone de Inspiração (destacado)"
 ra_inspiration_funding: "Financiando Inspirações"
 ra_inspiration_funding_desc: "Aquí puedes ver al personaje inspirado, lo que pretende hacer, cómo es su habilidad, si te puedes permitir financiar la inspiración y cuánto te costará.\n\nSi la inspiración ya está en marcha, puedes ver cuánto tiempo tardará en completarse; si no lo está, puedes comenzarla."
 reactive_advice_fund_inspiration: "$lessons_ep1_fund_inspiration$"
