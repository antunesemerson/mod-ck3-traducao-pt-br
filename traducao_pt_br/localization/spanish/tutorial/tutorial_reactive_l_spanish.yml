 ra_army_auto_explain: "$reactive_advice_army_automation$"
 ra_army_auto_explain_desc: "Aqui você pode decidir se seus [armies|lE] devem ser automatizados ou não. Você pode fazer isso a qualquer momento, até mesmo no meio de uma [war|lE].\n\nVocê ainda pode recrutar manualmente [men_at_arms|lE], contratar [mercenaries|lE] e realizar [raids|lE]. Você pode ajustar esse comportamento aqui, clicando no botão de Configurações de $ARMY_AUTOMATION_FEATURE_NAME$."
