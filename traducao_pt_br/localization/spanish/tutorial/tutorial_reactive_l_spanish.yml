 ra_regency_future_regent_intro_desc: "No futuro, talvez você não consiga governar seu [realm|El] por conta própria, caso em que uma [regency|El] será iniciada.\n\nAntes que isso aconteça, você pode ver o seu futuro [regent|El] e até mesmo designar um você mesmo.\n\n$REACTIVE_ADVICE_YOU_REGENCY_REASONS$"
 ra_regency_future_regent_open_realm_panel: "$REACTIVE_ADVICE_FUTURE_REGENT$"
 ra_regency_future_regent_open_realm_panel_desc: "Vamos visualizar a sua futura [regency|El]! Você pode vê-la na Visão do Reino."
 ra_regency_future_regent_open_realm_panel_prompt: "Abra a Visão do Reino (destacado)"
 ra_regency_future_regent_open_UI: "$REACTIVE_ADVICE_FUTURE_REGENT$"
 ra_regency_future_regent_open_UI_desc: "O seu status de [regency|lE] é mostrado aqui, no topo da Visão do Reino."
 ra_regency_future_regent_open_UI_prompt: "Abra a Visão da Regência (destacado)"
 ra_regency_future_regent_open_tab: "$REACTIVE_ADVICE_FUTURE_REGENT$"
 ra_regency_future_regent_open_tab_desc: "O seu futuro [regent|El] é mostrado na guia '$DIARCHY_WINDOW_YOUR_TAB$'."
 ra_regency_future_regent_open_tab_prompt: "$ra_regency_liege_open_tab_prompt$"
 ra_regency_future_regent_current_regent: "$REACTIVE_ADVICE_FUTURE_REGENT$"
 ra_regency_future_regent_current_regent_desc: "O seu futuro [regent|El] é mostrado aqui.\n\nA menos que você designe um, o candidato com a maior [regent_succession_score|El] será escolhido."
 ra_regency_future_regent_swap_regent: "$REACTIVE_ADVICE_FUTURE_REGENT$"
 ra_regency_future_regent_swap_regent_desc: "Você pode designar um [regent|El] usando este botão.\n\nVocê deve tentar encontrar um regente com muita [diarch_loyalty|El] e uma grande [Concept( 'diarch_aptitude', 'aptitud' )|E]."
 ra_regency_future_regent_succession: "$REACTIVE_ADVICE_FUTURE_REGENT$"
 ra_regency_future_regent_succession_desc: "Se o atual [regent|El] morrer ou não puder agir como tal, o próximo personagem na ordem de sucessão assumirá o seu lugar."
 ra_regency_future_regent_conclusion: "$REACTIVE_ADVICE_FUTURE_REGENT$"
 ra_regency_future_regent_conclusion_desc: "Por enquanto, considere designar um [regent|El], se você deseja ter mais controle sobre quem governará em seu lugar."
 #Travel Planning
 REACTIVE_ADVICE_TRAVEL_PLANNING: "Planejamento de Viagem"
 action_reactive_advice_travel_planning: "$open_tutorial_lesson$$REACTIVE_ADVICE_TRAVEL_PLANNING$"
 action_reactive_advice_travel_planning_desc: "Você está prestes a viajar. Abra isso para aprender mais sobre o planejamento da sua viagem."
 action_reactive_advice_travel_planning_click: "$click_to_open_lesson$"
 reactive_advice_travel_planning: "$REACTIVE_ADVICE_TRAVEL_PLANNING$"
 ra_travel_planning_intro: "$REACTIVE_ADVICE_TRAVEL_PLANNING$"
 ra_travel_planning_intro_desc: "Você está prestes a [Concept( 'travel', 'viajar' )|E] a partir de sua localização atual. Antes de partir, você deve planejar sua viagem."
 ra_travel_planning_entourage: "$REACTIVE_ADVICE_TRAVEL_PLANNING$"
 ra_travel_planning_entourage_desc: "Você raramente [Concept( 'travel', 'viajar' )|E] sozinho; os [characters|lE] que viajam com você são sua [entourage|lE].\n\nEsses personagens também costumam se juntar a você no seu destino."
 ra_travel_planning_speed_safety: "$REACTIVE_ADVICE_TRAVEL_PLANNING$"
 ra_travel_planning_speed_safety_desc: "Há dois fatores principais a ter em conta ao planejar o [travel|lE]; a [travel_speed|lE] e a [Concept( 'travel_safety', 'seguridad' )|E].\n\nA velocidade base é de 100% e uma velocidade alta significa chegar ao destino mais rápido.\n\nA segurança contrabalança qualquer [travel_danger|lE] que você possa encontrar na rota. Ter uma segurança alta significa que você e sua [entourage|lE] podem viajar por áreas perigosas com menos risco."
 ra_travel_planning_caravan_master: "$REACTIVE_ADVICE_TRAVEL_PLANNING$"
 ra_travel_planning_caravan_master_desc: "Você pode nomear um [GetCourtPositionType('travel_leader_court_position').GetName()|l]; um [court_position|lE] especial que se juntará a você em todas as suas [travels|lE].\n\nTem um grande impacto na [Concept( 'travel_speed', 'velocidad' )|lE] e na [travel_safety|lE], então normalmente você vai querer alguém nessa posição para viagens mais longas."
 ra_travel_planning_travel_options: "$REACTIVE_ADVICE_TRAVEL_PLANNING$"
 ra_travel_planning_travel_options_desc: "Você também pode escolher até duas [travel_options|El] para esta jornada específica.\n\nAs opções de viagem geralmente custam [gold|lE] e oferecem vários benefícios, principalmente para a [travel_speed|lE] e a [travel_safety|lE].\n\nMuitas opções reduzem o [travel_danger|lE] em certos tipos de [terrain|lE] de sua rota. Cada tipo de perigo em uma localização é mostrado no mapa com uma cor única. Quaisquer perigos que você possa encontrar também são mostrados como ícones em sua rota."
 ra_travel_planning_custom_route: "$REACTIVE_ADVICE_TRAVEL_PLANNING$"
 ra_travel_planning_custom_route_desc: "Por fim, você pode personalizar sua rota para contornar certos [Concept( 'travel_danger', 'peligros' )|E] durante a viagem, em vez de ir diretamente ao seu destino."
 ra_travel_planning_conclusion: "$REACTIVE_ADVICE_TRAVEL_PLANNING$"
 ra_travel_planning_conclusion_desc: "Antes de partir, verifique o Tempo Total de Viagem e que haja poucas chances de encontrar [Concept( 'travel_danger', 'peligros del viaje' )|E] na rota.\n\nBoa viagem!"
 #Create Accolade
 REACTIVE_ADVICE_CREATE_ACCOLADE: "Louvores"
 reactive_advice_create_accolade: "$REACTIVE_ADVICE_CREATE_ACCOLADE$"
 ra_create_accolade_knights_panel: "$REACTIVE_ADVICE_CREATE_ACCOLADE$"
 ra_create_accolade_knights_panel_desc: "Agora você pode conceder um [accolade|lE] a um dos seus [knights|lE]!\n\nTodo cavaleiro que possua um louvor se torna um [acclaimed_knight|lE], o que concederá bônus a você e às suas [armies|lE].\n\nO louvor permanecerá até que você o destrua e será passado para os futuros cavaleiros por meio da [accolade_succession|lE]."
 ra_create_accolade_knights_panel_prompt: "Selecione um Louvor não atribuído (destacado)"
 ra_create_accolade_candidates: "$REACTIVE_ADVICE_CREATE_ACCOLADE$"
 ra_create_accolade_candidates_desc: "Ao criar um [accolade|lE], você escolhe um dos seus [knights|lE] válidos na lista."
 ra_create_accolade_candidates_prompt: "Escolha um Candidato na lista (destacado)"
 ra_create_accolade_attributes: "$REACTIVE_ADVICE_CREATE_ACCOLADE$"
 ra_create_accolade_attributes_desc: "Todo [acclaimed_knight|lE] tem dois [accolade_types|lE] (destacados): um principal e um secundário. Antes de criar o [accolade|lE], estes atributos são mostrados para cada candidato.\n\nCada atributo concede a você e aos seus [armies|lE] diversos bônus, à medida que o louvor ganha [glory|lE]. A glória é obtida ao participar de [contests|lE] de [GetActivityType( 'activity_tournament' ).GetName()|l] e [battles|lE].\n\nO atributo principal é sempre parte do [accolade|lE] e não pode ser alterado na [accolade_succession|lE]."
 ra_create_accolade_conclusion: "$REACTIVE_ADVICE_CREATE_ACCOLADE$"
 ra_create_accolade_conclusion_desc: "Agora você pode criar este [accolade|lE] se desejar.\n\nMais Louvores ficarão disponíveis conforme a sua [culture|lE] descobrir [innovations|lE]."
 #House Unity
 reactive_advice_house_unity: "Unidade da Casa"
 action_reactive_advice_house_unity: "Conselho: $reactive_advice_house_unity$"
 action_reactive_advice_house_unity_desc: "Saiba mais sobre a [house_unity|lE] para [clans|lE] e como você pode influenciá-la para obter benefícios e acessar diferentes [succession_laws|lE]."
 action_reactive_advice_house_unity_click: "$click_to_open_lesson$"
 ra_house_unity_1: "$reactive_advice_house_unity$"
 ra_house_unity_1_desc: "Como [clan|lE], você tem acesso à [house_unity|lE]!\n\nEsta representa o estado das relações internas de sua [house|lE], que variam de Antagônico a Harmonioso. Cada [house_unity_level|lE] traz uma série de efeitos para todos os membros da casa e determinará a [succession_law|lE] ativa.\n\nSaber como modificar a unidade da casa será útil para alcançar seus objetivos."
 ra_house_unity_2: "$reactive_advice_house_unity$"
 ra_house_unity_2_desc: "Primeiro, você precisa saber como visualizar a [house_unity|lE]. Para isso, abra a visualização da sua [house|lE]."
 ra_house_unity_panel_prompt: "Abrir a visualização da [house|lE]"
 ra_house_unity_3: "$reactive_advice_house_unity$"
 ra_house_unity_3_desc: "A aba de Unidade da Casa contém todas as informações e interações necessárias para aproveitar ao máximo a Unidade da Casa. Você pode ver sua pontuação atual de Unidade da Casa, o nível atual e ter uma visão geral dos níveis mais altos e mais baixos de Unidade da Casa.\n\nAlém disso, aqui você pode ver as mudanças recentes na unidade. Isso ? importante, pois todos os membros da casa podem realizar [house_unity_unifying_actions|lE] ou [house_unity_devisive_actions|lE] para afetar a Unidade da Casa."
 ra_house_unity_4: "$reactive_advice_house_unity$"
 ra_house_unity_4_desc: "Como mencionado anteriormente, cada [house_unity_level|lE] tem seus próprios efeitos. Nesta seção, você pode ver a lista de efeitos ativos.\n\nLembre-se de que esses efeitos são para todos os membros da [house|lE]. Entre os efeitos, você encontrará a [succession_law|lE] ativa da sua Casa."
 ra_house_unity_5: "$reactive_advice_house_unity$"
 ra_house_unity_5_desc: "Por fim, cada Casa de Cl? tem acesso a Decisões de Unidade da Casa. Essas [decisions|lE] concederão diferentes benefécios para todos os membros da casa. No entanto, em sua maioria, apenas o [house_head|lE] pode promulg?-las.\n\n#weak Você pode tentar se tornar Líder da Casa usando a interação \"Desafiar Líder da Casa\" no seu Líder da Casa atual.#!"
 ra_house_unity_6: "$reactive_advice_house_unity$"
 ra_house_unity_6_desc: "Agora você sabe tudo o que precisa sobre a Unidade da Casa!\n\nUse esse conhecimento para garantir que sua Casa deixe uma marca duradoura na história."
 #Tax Collection
 action_reactive_advice_tax_collector: "Conselho: Arrecadação de Impostos"
 action_reactive_advice_tax_collector_desc: "Abra para uma introdução sobre [tax_jurisdictions|lE] e [tax_collectors|lE]."
 action_reactive_advice_tax_collector_click: "$click_to_open_lesson$"
 reactive_advice_tax_collector: "Arrecadação de Impostos"
 ra_tax_collector_1: "$reactive_advice_tax_collector$"
 ra_tax_collector_1_desc: "Você já tem [tax_collectors|lE]!\n\nEles ajudarão a reunir [gold|lE] e [levies|lE] dos vassalos do seu clã. Os coletores de impostos também ajudarão a gerenciar as [tax_jurisdictions|lE] e farão cumprir os decretos fiscais.\n\n#weak A aptidão dos seus coletores de impostos afetará as contribuições que você receberá dos seus contribuintes.#!"
 ra_tax_collector_2: "$reactive_advice_tax_collector$"
 ra_tax_collector_2_desc: "Primeiro, você precisa saber onde encontrar suas [tax_jurisdictions|lE], como nomear [tax_collectors|lE] e designar Contribuintes."
 ra_tax_collector_panel_prompt: "Abrir o painel de [tax_jurisdictions|lE]"
 ra_tax_collector_3: "$reactive_advice_tax_collector$"
 ra_tax_collector_3_desc: "Bem-vindo à visão de [tax_jurisdiction|lE]!\n\nAqui você pode visualizar e gerenciar tudo sobre suas jurisdições.\n\nNo topo, você pode ver quantos [tax_collectors|lE] você nomeou e a quantidade total de [gold|lE] e [levies|lE] que você obtém de seus contribuintes."
 ra_tax_collector_4: "$reactive_advice_tax_collector$"
 ra_tax_collector_4_desc: "Estas são suas [tax_jurisdictions|lE], onde você pode designar seus Vassalos do Clã como Contribuintes e selecionar Decretos Fiscais para cada jurisdição. Você também precisará nomear um [tax_collector|lE] para gerenciar cada uma de suas jurisdições fiscais e aplicar os Decretos Fiscais.\n\n#weak Uma jurisdição com Contribuintes, mas sem um Arrecadador de Impostos, estará isenta de impostos, o que significa que você não receberá [gold|lE] ou [levies|lE] dela.#!"
 ra_tax_collector_5: "$reactive_advice_tax_collector$"
 ra_tax_collector_5_desc: "Parabéns!\n\nVocê já sabe o básico sobre a arrecadação de impostos. Lembre-se de configurar os decretos fiscais das [tax_jurisdictions|lE] para adaptar as [vassal_obligations|lE] às suas necessidades atuais.\n\nQue sua [clan|lE] deixe uma marca permanente na história."
 action_reactive_advice_legitimacy: "Conselho: Legitimidade"
 action_reactive_advice_legitimacy_desc: "Abra para uma introdução à [legitimacy|lE]."
 action_reactive_advice_legitimacy_click: "$click_to_open_lesson$"
 reactive_advice_legitimacy: "Legitimidade"
 ra_legitimacy_1: "$reactive_advice_legitimacy$"
 ra_legitimacy_1_desc: "A [legitimacy|lE] ? a representação do seu 'direito de governar'. Seus [vassals|lE] geram [legitimacy_expectations|lE], e espera-se que você as atenda.\n\nUma $game_concept_legitimacy$ alta lhe d? uma série de benefécios, e uma $game_concept_legitimacy$ baixa afetar? negativamente a facilidade com que você governa.\n\n#weak A $game_concept_legitimacy$ tem 5 [legitimacy_levels|lE] e um nível inferior 'Ilegítimo'. Uma certa fração da [legitimacy|lE] do governante anterior ? herdada pelo seu [heir|lE]. Ganha-se $game_concept_legitimacy$ por muitos meios diferentes, incluindo vencer guerras, criar [legends|lE] ou participar de [activities|lE]. Da mesma forma, também se pode perder por perder guerras e títulos, ou por [epidemics|lE] incontroladas que assolem a terra.#!"
 ra_legitimacy_2: "$reactive_advice_legitimacy$"
 ra_legitimacy_2_desc: "A vista de [legitimacy|lE] encontra-se no canto inferior esquerdo. Contém informações sobre seu [legitimacy_level|lE], suas [legitimacy_expectations|lE], de quanta [legitimacy|lE] você dispõe e os efeitos atuais de tudo o que foi mencionado.\n\n#weak Los inconvenientes y beneficios de tener una cierta puntuación de [legitimacy|lE] incluyen bonificaciones y penalizaciones de opinión, desventajas y ventajas en [dynasty_prestige|lE], costes aumentados y reducidos de [casus_belli|lE], y límites variables para unirse a [Concept( 'faction', 'facciones' )|E] y [alliances|lE].#!"
 action_reactive_advice_epidemics: "Conselho: Epidemias"
 action_reactive_advice_epidemics_desc: "Abra para uma introdução a [epidemics|lE]."
 action_reactive_advice_epidemics_click: "$click_to_open_lesson$"
 reactive_advice_epidemics: "Epidemias"
 ra_epidemics_panel_prompt: "Abrir o painel de [epidemics|lE]"
 ra_specific_epidemics_panel_prompt: "Abrir o painel 'Ver Epidemias'"
 ra_epidemics_1: "$reactive_advice_epidemics$"
 ra_epidemics_1_desc: "[epidemics|lE] são surtos de doenças que se espalham pelo mapa, afetando tanto [characters|lE] quanto [holdings|lE]. Quando uma Praga está presente em uma área, as [baronies|lE] afetadas têm uma [infection_rate|lE] que governa a gravidade de seu impacto.\n\nA visualização de [epidemics|lE] pode ser encontrada no canto inferior direito."
 ra_epidemics_2: "$reactive_advice_epidemics$"
 ra_epidemics_2_desc: "Cada [epidemic|lE] no mapa é dividida em seções no painel $reactive_advice_epidemics$.\n\nOs painéis de $reactive_advice_epidemics$ do reino fornecem informações sobre $reactive_advice_epidemics$ dentro do seu reino, os painéis de $reactive_advice_epidemics$ do mundo informam sobre $reactive_advice_epidemics$ no resto do mundo, e os painéis de $reactive_advice_epidemics$ próximos mostram o progresso de $reactive_advice_epidemics$ que ainda não estão dentro do seu reino, mas estão próximos o suficiente para potencialmente representar uma ameaça no futuro."
 ra_epidemics_3: "$reactive_advice_epidemics$"
 ra_epidemics_3_desc: "Dentro deste painel, informações relevantes são armazenadas para cada Praga. Ele rastreia qual é a gravidade da Praga - Menor, Maior ou Apocalíptica - quando e onde ela começou, quantos [characters|lE] ela matou, e ambos os [modifiers|lE] de personagem e localização, para [baronies|lE] e [counties|lE].\n\nO botão 'Ver Praga' o levará a mais detalhes."
 ra_epidemics_4: "$reactive_advice_epidemics$"
 ra_epidemics_4_desc: "Este painel inclui informações sobre a [infection_rate|lE] de cada [barony|lE] impactada pela Praga. A [infection_rate|lE] progredirá em direção ao seu valor máximo em diferentes taxas dependendo da intensidade da Praga, e pode ser mitigada com $game_concept_epidemic_resistance$.\n\n#weak Como você gerencia e lida com $reactive_advice_epidemics$ não apenas governará como seu [realm|lE] se recupera e subsequentemente prospera, mas também quanto [legitimacy|lE] você perderá como governante.#!"
 action_reactive_advice_legends: "Conselho: Legendas"
 action_reactive_advice_legends_desc: "Aberto para uma introdução às [legends|lE]."
 action_reactive_advice_legends_click: "$click_to_open_lesson$"
 reactive_advice_legends: "Legendas"
 ra_legends_panel_prompt: "Abrir o painel de [legends|lE]"
 ra_legends_view_panel_prompt: "Abrir o painel de Criação de Lendas"
 ra_legends_1: "$action_reactive_advice_legends$"
 ra_legends_1_desc: "[legends|lE] são contos de feitos famosos que um [character|lE] realizou durante sua vida. Cada Lenda tem seu próprio [legend_type|lE]: Legitimadora, Heroica ou Sagrada.\n\nA visualização de [legends|lE] pode ser encontrada no canto inferior esquerdo."
 ra_legends_2: "$action_reactive_advice_legends$"
 ra_legends_2_desc: "Aqui aparecem todas as [Concept( 'legend', 'lendas' )|E] que você tem disponíveis, assim como suas informações.\n\nNo topo estão as [legend_seeds|lE], a base de uma Lenda. Elas podem ser conquistadas ou, em alguns casos, já estar em sua posse porque seu personagem cumpriu certos critérios. Abaixo delas estão as $action_reactive_advice_legends$ do mundo, que acompanham outras $action_reactive_advice_legends$ do mundo que não são promovidas ativamente por você.\n\n#weak 'Promotores' são os personagens que apoiam ativamente uma determinada Lenda.#!"
 ra_legends_3: "$action_reactive_advice_legends$"
 ra_legends_3_desc: "As informações incluídas no painel $action_reactive_advice_legends$ incluem custo base, manutenção, efeitos ativos e Qualidade da Lenda.\n\nDestacado está o botão usado para selecionar uma Lenda da sua lista."
 ra_legends_4: "$action_reactive_advice_legends$"
 ra_legends_4_desc: "Este painel inclui informações sobre a lenda que você está prestes a criar, além de lhe dar uma seleção de [characters|lE]. Estes são os possíveis escolhidos para [legend_protagonists|lE].\n\n#weak Empezar una leyenda activará la crónica de la leyenda, desde la cual puedes aumentar la [Concept( 'legend_quality', 'calidad de la leyenda' )|E] o completar la misma.#!"
 #Plague Resistance
 action_reactive_advice_plague_resistance: "Conselho: Resistência a Pragas"
 action_reactive_advice_plague_resistance_desc: "Aberto para uma introdução à [epidemic_resistance|lE]."
 action_reactive_advice_plague_resistance_click: "$click_to_open_lesson$"
 reactive_advice_plague_resistance: "Resistência a Pragas"
 ra_plague_resistance_1: "$reactive_advice_plague_resistance$"
 ra_plague_resistance_1_desc: "Ao lidar com pragas, você tem algumas opções para restringir seu avanão por suas terras.\n\nO principal fator que determina isso ? a [epidemic_resistance|lE]. Quanto maior for a resistência ? praga de seus [baronies|lE] e [counties|lE], melhor você poder? conter uma praga.\n\n#weak Embora seja possível combater uma peste, ? importante lembrar que provavelmente você não conseguir? det?-la completamente. Prepare-se para que grandes pestes se espalhem apesar dos seus melhores esforços.#!"
 ra_plague_resistance_2: "$reactive_advice_plague_resistance$"
 ra_plague_resistance_2_desc: "A $reactive_advice_plague_resistance$ pode ser aumentada de várias maneiras. Construções como $building_type_hospices_01$ e $building_type_charnel_grounds_01$ dão bônus inatos à $reactive_advice_plague_resistance$ para o [county|lE] ou [barony|lE] em que são construídos.\n\n Outras opções menos permanentes incluem [court_position_tasks|lE] realizadas pelo $court_physician_court_position$, [decisions|lE] ou eventos."
 ra_plague_resistance_3: "$reactive_advice_plague_resistance$"
 ra_plague_resistance_3_desc: "À medida que a $reactive_advice_plague_resistance$ aumenta, a [infection_rate|lE] dos [baronies|lE] relevantes diminui.\n\nEmbora seja improvável que você consiga erradicar completamente uma Praga grande apenas tomando medidas como essas, reduzir a [infection_rate|lE] ajudará a reduzir a devastação geral em seu [realm|lE]."
 action_reactive_advice_tutorial_schemes: "Conselho: $game_concept_schemes$"
 action_reactive_advice_tutorial_schemes_desc: "Abra para uma introdução aos [schemes|lE]."
 action_reactive_advice_tutorial_schemes_click: "$click_to_open_lesson$"
 reactive_advice_tutorial_schemes: "$ra_tutorial_schemes_1$"
 ra_tutorial_schemes_1: "$game_concept_schemes$"
 ra_tutorial_schemes_1_desc: "Você acabou de iniciar uma [scheme|lE]! As $game_concept_schemes$ são metas de longo prazo voltadas para outro personagem. Podem incluir objetivos hostis, como [GetScheme('murder').GetTypeName|l] ou [GetScheme('abduct').GetTypeName|l], ou ser mais benevolentes, como a de [GetScheme('befriend').GetTypeName|l]."
 ra_tutorial_schemes_2: "$game_concept_schemes$"
 ra_tutorial_schemes_2_desc: "Você acabou de iniciar uma [scheme|lE]! Os $game_concept_schemes$ são metas de longo prazo direcionadas a outro personagem. Podem incluir objetivos hostis, como [GetScheme('murder').GetTypeName|l] ou [GetScheme('abduct').GetTypeName|l] seu alvo, ou ser mais benignos, como a de [GetScheme('befriend').GetTypeName|l]."
 ra_tutorial_schemes_3: "$game_concept_schemes$"
 ra_tutorial_schemes_3_desc: "Aqui você verá todas as suas conjuras ativas. Você pode ter ativada uma [personal_scheme|lE] e uma [Concept('hostile_scheme', 'hostil')|E] ao mesmo tempo.\n\n#TUT Emplea conjuras cuando quieras, pero ten en cuenta que a tu personaje se le darán mejor o peor ciertas conjuras según sus [traits|lE] y [skills|lE]. Ciertos [perks|lE] de [lifestyle|lE] pueden desbloquear $game_concept_schemes$ extra para tu personaje.#!"
 #Favorite Child
 action_reactive_advice_favorite_child: "Conselho: Filho Favorito"
 action_reactive_advice_favorite_child_desc: "Agora você pode escolher [favorite_child|lE]. Abra isso para saber mais sobre isso e como selecioná-los."
 action_reactive_advice_favorite_child_click: "$click_to_open_lesson$"
 reactive_advice_favorite_child: "Filho Favorito"
 ra_favorite_child_1: "$reactive_advice_favorite_child$"
 ra_favorite_child_1_desc: "Agora você pode escolher quem é seu [favorite_child|lE]. Isso significa que ele terá uma melhor [opinion|lE] em relação a você e, quando você morrer, poderá escolher continuar seu legado com ele, em vez do seu herdeiro.\n\nSeu filho favorito pode ser:\n$BULLET_WITH_TAB$ Filhos\n$BULLET_WITH_TAB$ Netos\n$BULLET_WITH_TAB$ Bisnetos\nDesde que pertença à sua [dynasty|lE]."
 ra_favorite_child_1_prompt: "Abra a visão do seu Personagem (destacado)"
 ra_favorite_child_2: "$reactive_advice_favorite_child$"
 ra_favorite_child_2_desc: "Na visão do seu personagem, encontre a criança que você deseja nomear como filho preferido.\n\nClique com o botão direito na criança para interagir e procure a opção Escolher Filho Favorito. Ou clique nos descendentes dos seus descendentes.\n\nLembre-se de que escolher um $game_concept_favorite_child$ também significa que o resto dos seus descendentes podem ter uma opinião mais baixa sobre você."
 ra_favorite_child_2_prompt: "Clique com o botão direito em uma de suas crianças para ver as Interações disponíveis (destacado)"
 ra_favorite_child_3: "$reactive_advice_favorite_child$"
 ra_favorite_child_3_desc: "Após selecionar um filho favorito, haverá um ícone em seu retrato. E mesmo que eles não sejam seu herdeiro, será possível continuar como eles após sua morte.\n\nSe você quiser mudar seu filho favorito, volte à visão do personagem e selecione outro."
 #Army Automation
 action_reactive_advice_army_automation: "Conselho: $ARMY_AUTOMATION_FEATURE_NAME$"
 action_reactive_advice_army_automation_desc: "Se você não quiser controlar manualmente cada [war|lE], pode ativar $ARMY_AUTOMATION_FEATURE_NAME$. Abra isto para aprender como fazer."
 action_reactive_advice_army_automation_click: "$click_to_open_lesson$"
 reactive_advice_army_automation: "$ARMY_AUTOMATION_FEATURE_NAME$"
 ra_army_auto_intro: "$reactive_advice_army_automation$"
 ra_army_auto_intro_desc: "Se quiser focar em outras coisas além de controlar seus [armies|lE], pode deixar o jogo controlá-los."
 ra_army_auto_open: "$reactive_advice_army_automation$"
