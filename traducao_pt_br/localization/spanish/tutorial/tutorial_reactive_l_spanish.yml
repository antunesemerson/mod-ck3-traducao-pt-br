 ra_admin_gov_troops_1: "Militar em um Governo Administrativo"
 ra_admin_gov_troops_1b: "Militar em um Governo Administrativo"
 ra_admin_gov_troops_1_desc: "@ra_admin_troops_1! Em um [administrative_government|lE], a gestão militar e de tropas funciona de forma diferente de outros tipos de $game_concept_government$.\n\nEmbora você continue tendo acesso e controle total sobre suas próprias tropas, também tem acesso aos $TUTORIAL_PROVINCIAL_ARMIES$. Em um $game_concept_administrative_government$, cada [province|lE] pode ter um [army|lE] próprio que pertence especificamente a esse [title|lE].\n\nOs [governors|lE] assumem o papel de funcionário civil e militar, enquanto o [top_liege|lE] tem a capacidade de gerenciar as tropas dos $game_concept_governors$, assumir o controle delas ou design?-las a outros $game_concept_governors$ por todo o [realm|lE]."
 ra_admin_gov_troops_1_prompt: "Abrir a aba $TUTORIAL_PROVINCIAL_ARMIES_NO_TOOLTIP$ (destacada)"
 ra_admin_gov_troops_2: "Militar em um Governo Administrativo"
 ra_admin_gov_troops_2b: "Militar em um Governo Administrativo"
 ra_admin_gov_troops_2_desc: "Os [governors|lE] podem criar [men_at_arms|lE] como parte da $game_concept_governorship$ da qual são responsáveis. Essas tropas pertencem ao [title|lE] e podem ser emprestadas por outros $game_concept_governors$ do [realm|lE].\n\nO [top_liege|lE] tem os $TUTORIAL_PROVINCIAL_ARMIES$ ? sua disposição e possui a habilidade de gerenciar as tropas dos $game_concept_governors$. Pode control?-las em suas próprias [wars|lE] ou realoc?-las para $game_concept_governors$ que possam precisar delas.\n\nIsso lhe concede a habilidade de recrut?-las e us?-las para reforçar as fronteiras do $game_concept_realm$."
 ra_admin_gov_troops_2_prompt: "Inspecionar um [GetPlayer.Custom('GetProvincialArmyConceptNoTooltip')]"
 ra_admin_gov_troops_3: "Adquirindo Exércitos Adicionais"
 ra_admin_gov_troops_3_desc: "Como [governor|lE], você pode empregar sua [influence|lE] para pedir a ajuda do $game_concept_army$ de uma [province|lE] diferente.\n\nO [top_liege|lE] pode obrigar qualquer $game_concept_governor$ a realocar seu $game_concept_army$ ou assumir o controle dele diretamente."
 ra_admin_gov_troops_4: "Especificações do Exército"
 ra_admin_gov_troops_4_desc: "Se as tropas forem recrutadas pelo [governor|lE] em uma [war|lE], o [top_liege|lE] não pode reatribuir as tropas até que tenham sido dispensadas.\n\nEm caso de revoltas de $game_concept_governors$ contra o [liege|lE], o $game_concept_governor$ recupera quaisquer tropas que tenham origem em seu [governorship|lE].\n\nFique de olho na situação em todo o reino para otimizar seu uso."
 ra_admin_gov_troops_5: "No Caminho para o Poder"
 ra_admin_gov_troops_5_desc: "@ra_admin_troops_5! Enquanto um [realm|lE] [administrative|lE] é alimentado por ações políticas e intrigas, ter um Militar forte e bem gerido não apenas melhorará suas defesas, mas também ajudará em suas empreitadas diplomáticas.\n\nAfinal, a força militar é apenas um dos muitos Caminhos para o Poder..."
 action_reactive_advice_laamp_contract_move: "$open_tutorial_lesson$ Encontrando Contratos"
 action_reactive_advice_laamp_contract_move_desc: "Suas oportunidades de [task_contract|lE] locais estão escassas? Abra isso para uma introdução a como encontrar novos Contratos."
 action_reactive_advice_laamp_contract_move_click: "$click_to_open_lesson$"
 reactive_advice_laamp_contract_move: "$ra_laamp_contract_move_1$"
 ra_laamp_contract_move_1: "Encontrando Contratos"
 ra_laamp_contract_move_1_desc: "Se o trabalho escasseia na sua região ou você busca empregos mais emocionantes, mover o [camp|lE] pode ser a forma mais fácil de encontrar uma boa quantidade de [task_contracts|lE] novos.\n\nVocê deve [Concept('travel', 'viajar' )|lE] uma distância razoável desde onde ficava o seu antigo acampamento para garantir que encontrará novas oportunidades ao chegar."
 ra_domicile_camp_task: "Navegar até a janela do Acampamento"
 ra_laamp_contract_move_2: "Mudando seu Acampamento"
 ra_laamp_contract_move_2_desc: "Aqui está um exemplo de destino a uma distância razoável da sua localização atual de [camp|lE].\n\nVocê pode planejar a [travel|lE] diretamente da visão de [county|lE] para qualquer [barony|lE] selecionada no condado.\n\n#weak Atenção: também ? possível iniciar uma viagem de acampamento pela janela do Acampamento, usando o botão Mover Domicílio na parte inferior.#!"
 ra_domicile_travel_task: "Navegar até a visualização de $relocate_camp_to_interaction$"
 ra_laamp_contract_move_3: "Viajar com seu Acampamento"
 ra_laamp_contract_move_3_desc: "[Concept('traveling', 'Viajar' )|E] com seu [camp|lE] é como uma viagem normal, mas você leva consigo todos os seus [camp_buildings|lE] e [followers|lE] e terá que gastar [provisions|lE]."
 ra_domicile_depart_task: "Iniciar sua Viagem de Acampamento"
 ra_laamp_contract_move_4: "$ra_laamp_contract_move_3$"
 ra_laamp_contract_move_4_desc: "$ra_laamp_contract_move_3_desc$"
 ra_domicile_arrive_task: "Concluir sua Viagem de Acampamento"
 ra_laamp_contract_move_5: "Novos Contratos"
 ra_laamp_contract_move_5_desc: "Agora que você chegou, muitos [task_contracts|lE] novos contratos de tarefa estarão disponíveis para você na região!\n\nLembre-se, você pode mover seu [camp|lE] a qualquer momento para encontrar novos [task_contracts|lE] e novas oportunidades surgirão contanto que você [Concept('travel', 'viajes' )|E] o bastante longe — pelo menos dois [duchies|lE] [de_jure|lE] de distância do seu antigo acampamento é uma boa regra geral."
 reactive_advice_tutorial_war: "Guerra"
 reactive_advice_lesson_army_movement: "$lesson_army_movement$"
 reactive_advice_lesson_army_purpose: "Batalhas e cercos"
 reactive_advice_lesson_battle_mechanics: "$lesson_battle_mechanics$"
 reactive_advice_lesson_siege_mechanics: "$lesson_siege_mechanics$"
 reactive_advice_lesson_warscore: "$lesson_warscore$"
 reactive_advice_lesson_winning_wars: "$lesson_winning_wars$"
 reactive_advice_lesson_losing_wars: "$lesson_losing_wars$"
 #CE2
 reactive_advice_migration: "Migração"
 action_reactive_advice_migration: "Conselho: $reactive_advice_migration$"
 action_reactive_advice_migration_desc: "Como um Nômade nas Grandes Estepes, você pode Migrar para novas terras. Abra para aprender mais sobre Migração."
 action_reactive_advice_migration_click: "$click_to_open_lesson$"
 ra_migration_1: "$reactive_advice_migration$"
 ra_migration_1_desc: "Ao jogar como [nomad|lE] em [the_great_steppe|lE], você tem a possibilidade de [migrate|lE].\nA migração ? importante para os nômades porque ? uma ótima maneira de encontrar novas terras para o seu [herd|lE] pastar e crescer.\n\nO rebanho representa seu povo e seus animais, e precisa de terras com boa [county_fertility|lE] para se alimentar.\nVamos dar uma olhada em como encontrar os melhores lugares na estepe, onde a fertilidade beneficiar? você e o seu [realm|lE]."
 ra_migration_1_prompt: "Clique no botão de Migração (destacado)"
 ra_migration_1b: "$ra_migration_1$"
 ra_migration_2: "$reactive_advice_migration$"
 ra_migration_2_desc: "Escolher um novo local para você e seu [herd|lE] deve ser baseado principalmente na [county_fertility|lE]. A fertilidade da terra é medida em uma escala de 0 a 100 e diminuirá gradualmente à medida que você habitar as terras. Quando for totalmente esgotada, você precisará [migrate|lE] para um novo local para continuar crescendo."
 ra_migration_2_prompt: "Clique no modo de mapa para visualizar o modo de mapa de fertilidade (destacado)"
 ra_migration_3: "$reactive_advice_migration$"
 ra_migration_3_desc: "A distância que você pode [migrate|lE] depende dos seus [title_tiers|lE] e da lei de [dominance|lE] que você atualmente impõe. Reinos com um grande Domínio e alta Dominância terão necessidades diferentes em relação à Migração, e em algum momento você pode não precisar migrar mais para o propósito de fazer seu [herd|lE] crescer. Para selecionar um local ao qual você potencialmente deseja migrar, clique em um título [de_jure|lE] no mapa."
 ra_migration_3_prompt: "Clique em qualquer local dentro do alcance no mapa"
 ra_migration_4: "$reactive_advice_migration$"
 ra_migration_4_desc: "Dependendo da sua localização escolhida, você verá pinos no mapa informando a [county_fertility|lE] específica, ou a soma da [domain_fertility|lE] de todo o título [de_jure|lE] selecionado."
 ra_migration_5: "$reactive_advice_migration$"
 ra_migration_5_desc: "A localização escolhida para sua [migration|lE] sempre ter? pelo menos um [nomad|lE] ou [herder|lE] com quem você ter? que negociar para obter acesso. Você pode oferecer [herd|lE], [gold|lE] ou usar um [hook|lE] para ajud?-lo a convenc?-los a aceitar sua proposta de migrar para a área deles."
 ra_migration_6: "$reactive_advice_migration$ (aceitar negociação)"
 ra_migration_6_desc: "Pode haver vários [nomads|lE] no mesmo local da sua área-alvo. Se você [migrate|lE] reagirão de forma hostil, mas se conseguir persuadir o personagem mais forte da área para a qual está se deslocando, será recebido favoravelmente por todos. \n\n Se a negociação de migração for aceita, você deixará seu título atual para trás e possivelmente também seus [subjects|lE]."
 ra_migration_7: "$reactive_advice_migration$ (Negociação recusada)"
 ra_migration_7_desc: "Se o [nomad|lE] com a maior [herd|E] da região não aceitar sua proposta, você ter? que declarar [war|lE] contra ele e contra todos os outros nômades que habitam o local escolhido. Nesses casos, você poder? ver na janela a força total do rebanho.\n\nAssim como quando a negociação ? aceita, uma proposta recusada far? com que você deixe para três seu [title|lE] atual e, possivelmente, também seus [subjects|lE]. Você também será considerado [unlanded|lE], o que significa que não ter? [county_fertility|lE] e, portanto, seu rebanho não crescer?.\n\nSerá de seu interesse vencer a guerra ou, depois disso, encontrar outro lugar para onde você e seu rebanho possam migrar."
 ra_migration_8: "$reactive_advice_migration$"
 ra_migration_8_desc: "Se tudo correr bem com a [migration|lE], você terá um monte de novas terras para pastar e um novo [Concept('settlement_issue', 'asunto de asentamiento')|E] para lidar, o que lhe dará a oportunidade de administrar conflitos e aumentar o [Concept('county_control', 'control del condado')|E] local no novo [domain|lE].\n\nEm [the_great_steppe|lE], as terras mudam de mãos com frequência, então certifique-se de equilibrar bem seu [dread|lE] com sua [opinion|lE] para manter todas as portas abertas. Para um [nomad|lE], perder um título significa ter o triplo ao alcance, desde que você continue aumentando seu [herd|lE] e seu [dominance|lE]."
 #one small steppe for man...
 reactive_advice_great_steppe: "A grande estepe"
 action_reactive_advice_great_steppe: "Conselho: $reactive_advice_great_steppe$"
 action_reactive_advice_great_steppe_desc: "A Grande Estepe é uma Situação em que você precisará levar em conta a Fertilidade das terras. Abra para aprender mais sobre o que isso afeta."
 action_reactive_advice_great_steppe_click: "$click_to_open_lesson$"
 ra_great_steppe_1: "$reactive_advice_great_steppe$"
 ra_great_steppe_1_desc: "Bem-vindo ? [the_great_steppe|lE]!\n\nJogando como [ruler|lE] [GetGovernment( 'nomad_government' ).GetName|l], sua principal preocupação ? garantir que seu [herd|lE] possa crescer. Para isso, você precisar? de terras férteis para pastar, portanto ter? de se deslocar em busca de pastagens abundantes para que seu rebanho e você prosperem.\n\nOs [GetGovernment( 'nomad_government' ).GetName]s governam na região da estepe, onde você participar? de uma [situation|lE]. A estepe ? dividida em três regiões, nas quais o foco está na [county_fertility|lE] da terra."
 ra_great_steppe_1_prompt: "Clique no botão Situações para continuar (destacado)"
 ra_great_steppe_1b: "$reactive_advice_great_steppe$"
 ra_great_steppe_2: "$reactive_advice_great_steppe$"
 ra_great_steppe_2_desc: "Cada uma das três regiões será afetada por uma [steppe_season|lE]. Essas estações não são o inverno ou verão comuns, mas um efeito de longo prazo sobre a [county_fertility|lE] da terra.\n\nComo e onde esses efeitos irão afet?-lo ? visível por meio dos efeitos das estações. Por exemplo, viver em uma região com pastagem abundante ter? impacto na fertilidade para o seu [herd|lE] pastar, mas também afetar? a opinião das pessoas que o seguem."
 ra_great_steppe_3: "$reactive_advice_great_steppe$"
 ra_great_steppe_3_desc: "Para poder planejar com antecedência, você pode contar com a ajuda do seu [GetCourtPositionType('court_astrologer_court_position').GetName()|l]. O astrólogo preverá a chance de qual das duas estações será a próxima em uma região.\n\nCom essa informação, você poderá decidir se o melhor é permanecer em um local ou tentar [migrate|lE] para uma região vizinha.\n\nQuanto mais tempo você puder permanecer em terra fértil, maior será seu [herd|lE] e mais feliz será seu povo."
 ra_great_steppe_4: "$reactive_advice_great_steppe$"
 ra_great_steppe_4_desc: "Para ter uma visão geral de como os outros [nomads|lE] em [the_great_steppe|lE] estão, você pode visualizar isso na parte inferior do painel. O nômade com o maior [herd|lE] detém o título de [gurkhan|lE], com a força de seu rebanho sendo a maior ameaça ou o maior aliado que você pode encontrar na estepe. Se você detiver esse título, poder? também aumentar seu [dominance|lE] (no painel de reinos) até o quinto e último nível, Dominância Irrestrita.\n\nA força dos rebanhos será usada durante guerras e incursões, mas na forma de [horde|lE]. Horda ? a parte do seu rebanho apta para lutar, então pense nisso como seus cavalos, camelos e pessoas que podem usar arco e flecha, enquanto o restante do rebanho ? composto por ovelhas, vacas, crianças e assim por diante."
 ra_great_steppe_5: "$reactive_advice_great_steppe$"
 ra_great_steppe_5_desc: "Para ver outras regiões, você pode clicar nelas nesta visualização, mas a que afeta você é aquela em que está atualmente. \n\nE agora, você está pronto para liderar seu rebanho durante tempos abundantes e difíceis? Encontrar novas terras através de [war|lE] ou [migrating|lE] é sempre uma opção para um [ruler|lE] [GetGovernment( 'nomad_government' ).GetName|l] forte que deseje mostrar ao seu povo o caminho para as terras ricas, a Maçã de Ouro da estepe."
 reactive_advice_kurultai: "Conselho do kurultai"
 action_reactive_advice_kurultai: "Conselho: $reactive_advice_kurultai$"
 action_reactive_advice_kurultai_desc: "Abra isso para aprender mais sobre o Conselho Nômade, o Curiltai."
 action_reactive_advice_kurultai_click: "$click_to_open_lesson$"
 ra_kurultai_1: "$reactive_advice_kurultai$"
 ra_kurultai_1_desc: "Como governante na [the_great_steppe|lE] tens um [council|lE] [kurultai|lE]. \n\nÉ provável que você já saiba como funciona o conselho, mas quando jogar como [nomad|lE] você terá um novo tipo de administradores que se concentrarão mais em apoiar o crescimento da sua [county_fertility|lE] ou da sua [herd|lE]."
 ra_kurultai_1_prompt: "Clique no Painel do Conselho para continuar (destacado)"
 ra_kurultai_1b: "$ra_kurultai_1$"
 ra_kurultai_2: "$reactive_advice_kurultai$"
 ra_kurultai_2_desc: "Você pode ter 4 membros do [kurultai|lE] no seu [council|lE], junto com seu [spouse|lE] e um [spymaster|lE]. O curiltai pode ter várias tarefas vinculadas a diferentes [skills|lE], por exemplo, Gerenciar Fertilidade, que será uma tarefa baseada na [stewardship|lE] do seu curiltai. Se você tiver um curiltai atribuído, pode clicar no botão no canto inferior esquerdo para trocar a tarefa."
 ra_kurultai_3: "$reactive_advice_kurultai$"
 ra_kurultai_3_desc: "O [kurultai|lE] trabalhará nas tarefas atribuídas, mas seu maior impacto será na [succession|lE] do seu [realm|lE].\n\nCada personagem em [the_great_steppe|lE] pode ser [obedient|lE] a um [ruler|lE], e a obediência é muito importante especificamente para os membros do seu curiltai e sua influência sobre quem será seu [heir|lE]."
 ra_kurultai_3_prompt: "Clique na aba de reinos para continuar (destacado)"
 ra_kurultai_4: "$reactive_advice_kurultai$"
 ra_kurultai_4_desc: "Na parte superior deste painel, você pode ver se a sua [succession|lE] é considerada estável ou caótica. Isso será um indicador de se seu [heir|lE] herdará todo o seu [realm|lE] ou se será dividido entre outros personagens mais poderosos."
 ra_kurultai_4_prompt: "Clique na aba de sucessão para continuar (destacado)"
 ra_kurultai_5: "$reactive_advice_kurultai$"
 ra_kurultai_5_desc: "Na barra destacada, você verá uma indicação de se o seu [kurultai|lE] e seus filhos mais velhos aprovarão a [succession|lE] ou se oporão a ela.\n\nPara chegar ao ponto de ter uma sucessão estável, você precisa manter o kurultai [obedient|lE] obediente a você, mas também precisará fazer com que as [steppe_seasons|lE] joguem a seu favor. Se a estação atual afetar suas terras de forma negativa, como faria um Zud, seu povo pensará que você está sendo punido e questionará seu governo e a decisão de quem o sucederá. \n\nPara manter o controle da Sucessão, mantenha seu povo obediente e [Concept('migrate', 'migra')|E] para terras que estejam a seu favor."
 #tributaries
 reactive_advice_tributaries: "Tributários"
 action_reactive_advice_tributaries: "Conselho: $reactive_advice_tributaries$"
 action_reactive_advice_tributaries_desc: "Tributários são um tipo de Sujeito que um Governante pode ter. Abra isso para obter uma introdução ao que são os Tributários."
 action_reactive_advice_tributaries_click: "$click_to_open_lesson$"
 ra_tributaries_1: "$reactive_advice_tributaries$"
 ra_tributaries_1_desc: "[tributaries|lE] são um tipo de [subject|lE], uma relação entre dois [rulers|lE] onde um acordo de [truce|lE] é estabelecido em troca de um pagamento periódico. Quando o acordo é firmado, o tributário então fornece [herd|lE], [taxes|lE] ou [prestige|lE] ao outro, seu [suzerain|lE]."
 ra_tributaries_1_prompt: "Clique no painel de Reinos para continuar (destacado)"
 ra_tributaries_2: "$reactive_advice_tributaries$"
 ra_tributaries_2_desc: "Em comparação ao tipo usual de [subject|lE], [vassals|lE], os [tributaries|lE] têm um pouco mais de liberdade em relação ao seu [suzerain|lE]. Eles podem se libertar se suas próprias exigências sobre um líder não forem atendidas e procurar a sorte em outro lugar."
 ra_tributaries_2_prompt: "Clique na guia Subjects para continuar (destacado)"
 ra_tributaries_3: "$reactive_advice_tributaries$"
 ra_tributaries_3_desc: "Todos os tipos de [subjects|lE] serão exibidos no painel de reinos. Na lista de Subjects, você verá a chance dos seus [tributaries|lE] de quererem se libertar e um [tributary_contract|lE] especial onde você, como [suzerain|lE], pode por exemplo aumentar ou diminuir seus pagamentos, ou o apoio à guerra que qualquer um de vocês terá em futuros conflitos."
 ra_tributaries_4: "$reactive_advice_tributaries$"
 ra_tributaries_4_desc: "Como [migration|lE] é uma ação comum para [nomads|lE], se afastar das terras de seus [tributaries|lE] tem um grande impacto na disposição deles de continuar sendo seu tributo. Se não puderem testemunhar sua grandeza, logo procurarão proteção e tréguas com outros [rulers|lE] mais próximos."
 ra_tributaries_5: "$reactive_advice_tributaries$"
 ra_tributaries_5_desc: "Se você mesmo tem o papel de [tributary|lE], isso pode permitir que você faça sua [herd|lE] crescer em paz sob a proteção de um maior [suzerain|lE], mas o poder pode trocar de mãos rapidamente em [the_great_steppe|lE]; certifique-se de que você e as pessoas que considera amigas se ajudem quando precisarem crescer, mas não tenha medo de se libertar e se juntar ao lado de um Khan maior quando a situação exigir."
 reactive_advice_meritocratic_governor: "Governador"
 action_reactive_advice_meritocratic_governor: "Conselho: $reactive_advice_meritocratic_governor$"
 action_reactive_advice_meritocratic_governor_desc: "Como $game_concept_governor$, você terá poderes especiais, mas também responsabilidades. Abra isto para ver uma introdução sobre como ser $game_concept_governor$."
 action_reactive_advice_meritocratic_governor_click: "$click_to_open_lesson$"
 ra_merit_governor_intro: "$reactive_advice_meritocratic_governor$"
 ra_merit_governor_intro_desc: "Você é um [governor|El]!\n\nComo funcionário público de alto escalão, você tem acesso aos recursos do governo, mas deve usá-los bem."
 ra_merit_governor_advancing: "$reactive_advice_meritocratic_governor$"
 ra_merit_governor_advancing_desc: "Cada [governor|El] governa uma [province|El] de um determinado [title_tier|El].\n\nEm ordem ascendente de importância, são os seguintes:\n$EFFECT_LIST_BULLET$$county_celestial_chinese_vassal$ #weak (um título de [county|El])#!\n$EFFECT_LIST_BULLET$$duchy_celestial_chinese_vassal$ #weak (um título de [duchy|El])#!\n$EFFECT_LIST_BULLET$$kingdom_celestial_chinese_vassal$ #weak (um título de [kingdom|El])#!\n\nPara avançar na hierarquia e alcançar um $game_concept_title_tier$ mais alto, você deve aumentar seu [merit_level|El] ganhando [merit|lE] e, no momento oportuno, se aposentar para concluir os [imperial_examinations|El]."
 ra_merit_governor_treasury_1: "$reactive_advice_meritocratic_governor$"
 ra_merit_governor_treasury_1_desc: "$ra_treasury_1_desc$"
 ra_merit_governor_treasury_2: "$reactive_advice_meritocratic_governor$"
 ra_merit_governor_treasury_2_desc: "$ra_treasury_2_desc$"
 ra_merit_governor_treasury_3: "$reactive_advice_meritocratic_governor$"
 ra_merit_governor_treasury_3_desc: "$ra_treasury_3_desc$"
 ra_merit_governor_realm_open: "$reactive_advice_meritocratic_governor$"
 ra_merit_governor_realm_open_desc: "Já que você tem acesso ao [treasury|El], seria bom dar-lhe uma boa utilidade.\n\nComo [governor|El], você governa as terras e o povo da sua [province|El]. Usar o $game_concept_treasury$ para investir nela seria uma boa ideia."
 ra_merit_governor_realm_open_prompt: "Abra o painel Realm"
 ra_merit_governor_domain_tab_open: "$reactive_advice_meritocratic_governor$"
 ra_merit_governor_domain_tab_open_desc: "As [holdings|El] que você governa estão listadas na aba 'Domínio'."
 ra_merit_governor_domain_tab_open_prompt: "Abra a aba Domínio"
 ra_merit_governor_holdings_list: "$reactive_advice_meritocratic_governor$"
 ra_merit_governor_holdings_list_desc: "Aqui você pode ver cada [holding|El] que você governa, que também formam seu [domain|El].\n\nCada [holding|El] é um assentamento central onde são arrecadados [taxes|El] e são reunidas tropas de [levy|El]."
 ra_merit_governor_holdings_list_prompt: "Selecione uma de suas $game_concept_holdings$"
 ra_merit_governor_holding_view: "$reactive_advice_meritocratic_governor$"
 ra_merit_governor_holding_view_desc: "Estes são os espaços da [holding|El] selecionada onde podem ser construídos [buildings|El].\n\nComo estes $game_concept_buildings$ pertencem ? [province|El], você paga por sua construção usando o [treasury|El], e não o seu [gold|El] pessoal.\n\nConstruir edifécios como [governor|lE] lhe conceder? [merit|lE], o que acabar? permitindo que você governe [provinces|lE] de uma [title_tier|lE] mais alta.\n\n#I Se quiser, inicie uma construção antes de continuar.#!"
 ra_merit_governor_activities_open: "$reactive_advice_meritocratic_governor$"
 ra_merit_governor_activities_open_desc: "Como [governor|lE], outra forma de empregar sua [treasury|lE] é realizar a [activity|lE] $activity_survey|V$."
 ra_merit_governor_activities_open_prompt: "Abra a tela \"Atividades\""
 ra_merit_governor_inspection: "$reactive_advice_meritocratic_governor$"
 ra_merit_governor_inspection_desc: "A [activity|lE] $activity_survey|V$ deduzirá [treasury|lE] de sua [province|lE], mas também melhorará a $game_concept_province$ e lhe dará a oportunidade de ganhar [merit|lE]."
 ra_merit_governor_advancing_retire: "$reactive_advice_meritocratic_governor$"
 ra_merit_governor_advancing_retire_desc: "Não importa quanto [merit|lE] você ganhe, para desbloquear [merit_levels|lE] mais altos, também é preciso completar os [imperial_examinations|lE].\n\nNo entanto, os [governors|El] não têm permissão para se inscrever nos [imperial_examinations|El].\n\nPortanto, assim que você atingir o [merit_level|El] máximo atual, aposentar-se e frequentar os [province|El] é a única maneira de avançar para uma [title_tier|El] de $game_concept_examinations$ superior.\n\n#I Você pode se aposentar do cargo de $game_concept_governor$ usando a [decision|El] $renounce_governorship_decision|V$ na janela \"$DECISIONS_VIEW_TITLE$\"."
 ra_merit_governor_finish: "$reactive_advice_meritocratic_governor$"
 ra_merit_governor_finish_desc: "Isso é tudo o que há para saber sobre ser [governor|El], por enquanto. Mais adiante, receberá mais conselhos à medida que surgirem situações mais específicas.\n\nA melhor maneira de começar é construir [buildings|lE] nas [holdings|lE] da [province|lE] e realizar a [activity|lE] $activity_survey|V$, pois isso lhe renderá [merit|El]."
 reactive_advice_treasury: "$game_concept_treasury$"
 action_reactive_advice_treasury: "Conselho: $ra_treasury_1$"
 action_reactive_advice_treasury_desc: "O Tesouro representa o dinheiro ao qual você tem acesso como $game_concept_governor$ ou $game_concept_hegemon$. Abra-o para ver uma introdução ao funcionamento do Tesouro."
 action_reactive_advice_treasury_click: "$click_to_open_lesson$"
 ra_treasury_1: "$reactive_advice_treasury$"
 ra_treasury_1_desc: "Neste [realm|El] o [top_liege|El] e cada [governor|El] têm um [treasury|El] [treasury_i].\n\nEnquanto o [gold|El] representa sua riqueza pessoal, o $game_concept_treasury$ é usado apenas para fins governamentais, como melhorar sua [province|El] se você for $game_concept_governor$.\n\nO $game_concept_treasury$ está ligado ao seu [title|El] atual; portanto, se sua posição dentro do [realm|El] mudar, você não terá mais acesso ao seu antigo $game_concept_treasury$."
 ra_treasury_2: "$ra_treasury_1$"
 ra_treasury_2_desc: "Você está livre para doar seu próprio [gold|El] para suplementar seu [treasury|El] caso ele esteja ficando baixo.\n\nEsteja avisado de que não h? maneira legal de recuperar o $game_concept_gold$ que você doar!\n\n#I Se desejar fazer isso, pode usar o botão destacado.#!"
 ra_treasury_3: "$ra_treasury_1$"
 ra_treasury_3_desc: "Se você estiver com pouco [gold|El], você pode usar a [scheme|El] $celestial_siphon_treasury_interaction_without_scheme_suffix|V$ sobre você mesmo ou qualquer outro [governor|El] do [realm|El]. Isso converte o [treasury|El] do [character|El] em $game_concept_gold$ para você.\n\nNo entanto, você não gostaria de ser pego desviando fundos do Estado…"
 #dynastic cycle
 reactive_advice_dynastic_cycle: "$game_concept_dynastic_cycle$"
 action_reactive_advice_dynastic_cycle: "Conselho: $game_concept_dynastic_cycle$"
 action_reactive_advice_dynastic_cycle_desc: "O $game_concept_dynastic_cycle$ é o ciclo de ascensão e queda das dinastias da China e sua visão do Império."
 action_reactive_advice_dynastic_cycle_click: "$click_to_open_lesson$"
 ra_dynastic_cycle_intro: "$game_concept_dynastic_cycle$"
 ra_dynastic_cycle_era_effects: "$game_concept_dynastic_cycle$"
 ra_dynastic_cycle_era_open_groups: "$game_concept_dynastic_cycle$"
 ra_dynastic_cycle_era_open_eras: "$game_concept_dynastic_cycle$"
 ra_dynastic_cycle_era_groups: "$game_concept_dynastic_cycle$"
 ra_dynastic_cycle_era_group_leader: "$game_concept_dynastic_cycle$"
 ra_dynastic_cycle_era_actions: "$game_concept_dynastic_cycle$"
 ra_dynastic_cycle_intro_desc: "#F O império, outrora dividido, deve se unir;\ne, depois de muito tempo unido, deve se dividir.\nAssim tem sido sempre.\n\n — #italic Luó Guànzhōng\nRomance dos Três Reinos#!#!\n\nHistoricamente, a China foi governada por muitas [dynasties|El] distintas, separadas por eras de guerra e divisão.\n\nO [dynastic_cycle|El] representa esse processo, assim como a luta por influência e reformas dentro do império."
 ra_dynastic_cycle_open: "$game_concept_dynastic_cycle$"
 ra_dynastic_cycle_open_desc: "O [dynastic_cycle|El] é uma [situation|El] que envolve todos os [rulers|El] da China e dos arredores.\n\nVamos dar uma olhada."
 ra_dynastic_cycle_open_trigger: "Abrir a visão de $game_concept_dynastic_cycle$"
 ra_dynastic_cycle_era_open_eras_desc: "Primeiro, vamos ver em que [dynastic_cycle_era_short|El] se encontra o ciclo dinástico."
 ra_dynastic_cycle_era_open_eras_trigger: "Abrir a aba de $dynastic_cycle_tab_dynastic_cycle$"
 ra_dynastic_cycle_era_effects_desc: "A China está em uma [dynastic_cycle_era_short|El] de avanço.\n\nSe você é um funcionário de baixo escalão, o mais importante é entender como isso afeta você, o que será mostrado aqui.\n\nHá muitas $game_concept_dynastic_cycle_eras_short$ distintas, e todas conduzirão a China em uma direção diferente."
 ra_dynastic_cycle_era_open_groups_desc: "O estado do império não pode mudar por si s?, mas ? influenciado por grupos de [characters|El] poderosos dentro das fronteiras da China. Vamos dar uma olhada nesses $game_concept_characters$."
 ra_dynastic_cycle_era_open_groups_trigger: "Abrir a aba de $dynastic_cycle_tab_movements$"
 ra_dynastic_cycle_era_groups_desc: "Muitos [characters|El] por toda a China afetam seu futuro. Estes $game_concept_characters$ pertencem a [movements|El], e cada um deles quer guiar a China em uma direção diferente.\n\nPor exemplo, o $dynastic_cycle_participant_group_advancement_movement|V$ quer melhorar o império olhando para dentro por meio da [dynastic_cycle_era_short|El] de avanço, enquanto o $dynastic_cycle_participant_group_expansion_movement|V$ deseja que a China cresça e se expanda por meio da força militar em uma Era Expansionista."
 ra_dynastic_cycle_era_group_leader_desc: "Cada [movement|El] tem um [Concept('movement_leader', 'líder')|E] que pode fazer petições para promover a causa do $game_concept_movement$.\n\nPara se tornar $game_concept_movement_leader$, é preciso ter a maior [Concept('movement_power', 'poder')|E] dentro do $game_concept_movement$."
 ra_dynastic_cycle_era_actions_desc: "Você também pode realizar Ações para influenciar o [dynastic_cycle|El], seja por conta própria ou por meio de sua [movement|El].\n\nVocê encontrará essas Ações na parte inferior da janela.\n\nSe sua situação ainda é \"$dynastic_cycle_participant_group_undecided_movement|V$\", você deveria se unir a um $game_concept_movement$."
 #merit candidacy
 reactive_advice_merit_candidacy: "Candidatos a governador"
 action_reactive_advice_merit_candidacy: "Conselho: $reactive_advice_merit_candidacy$"
 action_reactive_advice_merit_candidacy_desc: "Vamos dar uma olhada no que é preciso para ser $game_concept_governor$."
 action_reactive_advice_merit_candidacy_click: "$click_to_open_lesson$"
 ra_merit_candidacy_intro: "$reactive_advice_merit_candidacy$"
 ra_merit_candidacy_intro_desc: "Somente aqueles com o [merit_level|El] mais alto se tornam em [governors|El].\n\nCada vez que um $game_concept_governor$ deixa seu cargo, outra pessoa é nomeada automaticamente para ocupar seu lugar.\n\nAssim, se você mantiver uma boa $game_concept_merit_level$, em algum momento você será nomeado [governor|El], se a [law|El] do seu [realm|El] permitir."
 ra_merit_candidacy_open: "$reactive_advice_merit_candidacy$"
 ra_merit_candidacy_open_desc: "Vamos dar uma olhada em como sua [house|El] e você estão progredindo na burocracia!"
 ra_merit_candidacy_open_prompt: "Abra a janela \"$ADMINISTRATIVE_GOVERNMENT_HEADER$\" (destacada)"
 ra_merit_candidacy_house_members: "$reactive_advice_merit_candidacy$"
 ra_merit_candidacy_house_members_desc: "Esta lista mostra como cada membro da sua [house|El] lida com a burocracia.\n\nComo você só pode ser [governor|El] de uma [province|El], ajudar os membros da sua família em suas carreiras também é importante."
 ra_merit_candidacy_merit: "$reactive_advice_merit_candidacy$"
 ra_merit_candidacy_merit_desc: "Cada [character|El] tem um [merit_level|El]. Quanto maior for o $game_concept_merit_level$, maior será o [title_tier|El] das [provinces|El] sobre as quais poder? governar como [governor|El].\n\nÀ medida que o seu $game_concept_merit_level$ aumenta, mais nomeações influentes se tornarão disponíveis:\n$BULLET_WITH_TAB$#V 9.? a 8.?#!: $game_concept_governor$ de um $county_celestial_chinese_vassal$ #weak (um título de [county|El])#!\n$BULLET_WITH_TAB$#V 7.? a 6.?#!: $game_concept_governor$ de um $duchy_celestial_chinese_vassal$ #weak (um título de [duchy|El])#!\n$BULLET_WITH_TAB$#V 5.? a 4.?#!: $game_concept_governor$ de um $kingdom_celestial_chinese_vassal$ #weak (um título de [kingdom|El])#!\n$BULLET_WITH_TAB$#V 3.? a 1.?#!: [minister|lE] do [son_of_heaven|E] #weak (um título de [empire|El])#!\n\nOs $game_concept_characters$ sem $game_concept_merit_level$ não podem se tornar $game_concept_governor$."
 ra_merit_candidacy_score: "$reactive_advice_merit_candidacy$"
 ra_merit_candidacy_score_desc: "Embora o [merit_level|El] seja importante, se dois candidatos tiverem o mesmo [merit_level|El] , quem tiver a [candidate_score|El] @appointment_score! mais alta receberá uma [province|El] primeiro.\n\nAssim, aumentar sua $game_concept_candidate_score$ significa que você não precisará esperar tanto para se tornar [governor|El].\n\nPara aumentar a $game_concept_candidate_score$ de um membro da [house|lE] , você gasta [influence|lE] [influence_i] com $influence_meritorious_career_interaction|V$ , ou inicia uma conspiração de $promote|V$ #weak (ambas opciones resaltadas)#!."
 ra_merit_candidacy_exams: "$reactive_advice_merit_candidacy$"
 ra_merit_candidacy_exams_desc: "Cada [imperial_examination|El] concluído aumenta o [merit|El] e desbloqueia [merit_levels|El] mais altos.\n\nOutros membros da $game_concept_house$ se juntarão a você se você for aos $game_concept_examinations$ e tentarão conclu?-los.\n\nAssim, voltar a um $game_concept_examination$ que você j? concluiu ter? benefécios além de você mesmo."
 ra_merit_candidacy_child_exams: "$reactive_advice_merit_candidacy$"
 ra_merit_candidacy_child_exams_desc: "Se os membros da [house|El] ainda são [children|El], você também pode ajudar na carreira deles enviando-os para o #V examen infantil#! @child_exam_icon!.\n\nSe forem bem-sucedidos, isso acelera seu progresso para avançarem aos $game_concept_examinations$."
 ra_merit_candidacy_summary: "$reactive_advice_merit_candidacy$"
 ra_merit_candidacy_summary_desc: "Ao acumular [merit_level|El] ao participar dos [imperial_examinations|El] e governando bem sua [province|El], você avançará até o topo da burocracia.\n\nNo topo da hierarquia, você pode até ser nomeado [minister|El], servindo diretamente ao próprio [son_of_heaven|E]!"
 action_reactive_advice_great_projects: "Conselho: grandes projetos"
 reactive_advice_great_projects: "$action_reactive_advice_great_projects$"
 action_reactive_advice_great_projects_desc: "Você pode planejar ou contribuir para um $game_concept_great_project$."
 action_reactive_advice_great_projects_click: "$click_to_open_lesson$"
 ra_gp_1: "Grandes projetos"
 ra_gp_1_desc: "Você pode iniciar ou contribuir para um [great_project|El]! Vamos dedicar um momento para falar deles."
 ra_gp_1_prompt: "Abra a aba Projetos no painel Decisões (destacada)"
 ra_gp_2: "$ra_gp_1$"
 ra_gp_2_desc: "Os [great_projects|El] são empreendimentos em grande escala que podem ser concluídos com a ajuda de vários [characters|El].\n\nSão usados para construir [great_buildings|El] e para se recuperar de [natural_disasters|El], entre outras coisas.\n\nVamos dar uma olhada em um $game_concept_great_project$."
 ra_gp_2_prompt: "Abrir um Grande Projeto (destacado)"
 ra_gp_3: "$ra_gp_1$"
 ra_gp_3_desc: "Os [great_projects|El] têm uma localização e um custo que deve ser pago antes de serem iniciados.\n\nUma vez iniciados, o fundador e seus [subjects|El] poderão fornecer [great_project_contributions|El] para ajudar a complet?-los, o que significa que o fundador normalmente não precisar? arcar com o custo de todas as $game_concept_great_project_contributions$.\n\nOs $game_concept_great_projects$ costumam levar muito tempo para serem concluídos e exigem um grande esforço."
 reactive_advice_natural_disasters: "Catástrofes naturais"
 action_reactive_advice_natural_disasters: "Conselho: $reactive_advice_natural_disasters$"
 action_reactive_advice_natural_disasters_desc: "Há um $game_concept_natural_disaster$ em seu $game_concept_realm$. Você pode tomar medidas para mitigar seus efeitos."
 action_reactive_advice_natural_disasters_click: "$click_to_open_lesson$"
 ra_natural_disasters_1: "$reactive_advice_natural_disasters$"
 ra_natural_disasters_1_desc: "Ah, não! Um [natural_disaster|El] atingiu seu [realm|El].\n\nVamos dar uma olhada no que você pode fazer a respeito."
 ra_natural_disasters_1_prompt: "Abrir a situação de desastre natural"
 ra_natural_disasters_2: "$reactive_advice_natural_disasters$"
 ra_natural_disasters_2_desc: "Uma [natural_disaster|El] tem três [situation_phases|El].\n\n#high Alerta#! : está prestes a acontecer uma $game_concept_natural_disaster$.\n#high Impacto#! : a catástrofe está em vigor.\n#high Recuperación#! : você pode começar a reconstrução.\n\nComo [ruler|El], seus [subjects|El] esperam que você lide com as consequências de uma $game_concept_natural_disaster$."
 reactive_advice_women_in_china: "Mulheres na China"
 action_reactive_advice_women_in_china: "Conselho: Mulheres na China"
 action_reactive_advice_women_in_china_desc: "A $game_concept_law$ de gênero do seu $game_concept_realm$ não lhe permite tornar-se em $game_concept_governor$."
 action_reactive_advice_women_in_china_click: "$click_to_open_lesson$"
 ra_women_in_china: "Mulheres na China"
 ra_women_in_china_desc: "Para se tornar [Concept('governor', 'gobernadora')|E] sendo mulher na China, primeiro você precisa mudar as Leis de Gênero da [hegemony|El]. Para fazer isso, primeiro você deve se tornar o [hegemon|El].\n\nSe você estiver interessado em viver essa experiência, recomendamos alterar as Regras de Jogo da Lei de Gênero durante a Configuração, ou criar seu próprio Personagem Personalizado para ser o $game_concept_hegemon$ na tela de marcador."
