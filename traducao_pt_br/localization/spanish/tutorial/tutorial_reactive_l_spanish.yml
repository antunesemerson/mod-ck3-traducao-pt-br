l_spanish:
 open_tutorial_lesson: "Conselho:"
 click_to_open_lesson: "#I Clique para saber mais#!"
 reactive_advice_mercenaries: "$reactive_advice_mercenaries_step_1$"
 action_reactive_advice_mercenaries: "$open_tutorial_lesson$$reactive_advice_mercenaries_step_1$"
 action_reactive_advice_mercenaries_desc: "Mercenários são soldados de aluguel que podem inclinar a balança em uma guerra.\nAbra para receber algumas dicas e sugestões sobre a melhor forma de utilizá-los!"
 action_reactive_advice_mercenaries_click: "$click_to_open_lesson$"
 reactive_advice_mercenaries_step_1: "Mercenários"
 reactive_advice_mercenaries_desc: "Se você estiver perdendo uma guerra, pode inclinar a balança a seu favor contratando [mercenaries|lE].\n\nOs mercenários custam [gold|lE], mas fornecerão a você um [army|lE] significativo. Uma vez contratados, você poderá controlá-los como qualquer outro exército.\n\n#TUT Você pode querer contratar uma unidade mercenária para a guerra atual. Embora você possa contrair [Concept( 'debt', 'dívidas' )|lE] ao fazê-lo, recomendamos que opte por uma mais acessível, a menos que esteja em clara desvantagem.#!"
 reactive_advice_mercenaries_task: "Navegue até o $HIRE_TROOPS$ veja e selecione qualquer banda mercenária"
 reactive_advice_succession: "$reactive_advice_succession_step_1$"
 action_reactive_advice_succession: "$open_tutorial_lesson$$reactive_advice_succession_step_1$"
 action_reactive_advice_succession_desc: "O que acabou de acontecer? Você morreu e teve uma sucessão!\nAbra isso para um resumo do que aconteceu, bem como algumas dicas de como planejar futuros."
 action_reactive_advice_succession_click: "$click_to_open_lesson$"
 reactive_advice_succession_step_1: "Sucessão"
 reactive_advice_succession_desc: "O rei está morto, longa vida ao rei!\n\nNão se preocupe — embora seu personagem antigo tenha morrido, Crusader Kings III é um jogo de dinastias. Como seu [ruler|lE] tinha um [player_heir|El] agora você o controla!\n\n#TUT La muerte es una parte natural del juego y a menudo asumirás el rol de tu [Concept( 'eligible_child', 'primogénito' )|E], (según las [succession_laws|lE] del señorío). Para planificar una sucesión segura, te recomendamos que tengas al menos dos hijos, para que el segundo sirva de reemplazo por si el primero muere.\n\nDurante la sucesión, puede que te quedes sin algunos de los [titles|lE] que tuviera tu personaje anterior. No te preocupes, conservarás [claims|lE] sobre todos los títulos que pierdas.#!\n\n#weak Te recomendamos que dediques cierto tiempo a familiarizarte con tu personaje actual antes de continuar.#!"
 reactive_advice_domain_limit: "$reactive_advice_domain_limit_step_1$"
 reactive_advice_domain_limit_step_1: "Limite de Domínio"
 reactive_advice_domain_limit_desc: "Você está atualmente mantendo mais terras em seu [domain|lE] do que seu personagem ? capaz de gerenciar por conta própria... ? hora de criar novos [vassals|lE]!\n\nComo você provavelmente vai querer manter títulos valiosos em seu Domínio, recomendamos que v? até a aba Domínio na visão do seu reino, onde poder? ver quanto cada título vale para você. Além disso, considere quais títulos estão em seu [de_jure|lE].\n\n#TUT Deve-se evitar ultrapassar o [domain_limit|lE] por muito tempo, pois isso ter? consequências.\n\nPara permanecer abaixo do limite, ? melhor conceder o excesso de [titles|lE] a novos vassalos. Embora você possa conceder títulos aos vassalos existentes, geralmente ? melhor encontrar alguém sem terras para receb?-los.\n\nMembros distantes da [dynasty|lE] ou [courtiers|lE] com o [trait|lE] [GetTrait('content').GetName( GetPlayer )] são excelentes vassalos, enquanto [claimants|lE] aos seus títulos ou cortesãos com o traço [GetTrait('ambitious').GetName( GetPlayer )] nem tanto.#!"
 reactive_advice_vassal_limit: "$reactive_advice_vassal_limit_step_1$"
 reactive_advice_vassal_limit_step_1: "Limite de vassalo"
 reactive_advice_vassal_limit_desc: "Ninguém consegue administrar uma horda de condes... aspirantes a conquistadores precisam confiar em [vassals|lE] de nível mais alto, como duques, para que administrem suas terras por eles!\n\nNa visualização de Domínio, você pode ver seu atual limite de vassalos.\n\n#TUT Assim como acontece com o limite de domínio, não ? recomendável superar o [vassal_limit|lE]. Para evitar essa penalidade, você deve consolidar seus vassalos.\n\nA melhor forma de fazer isso ? conceder [duchies|lE] aos seus vassalos. Isso permitir? que governem uma área maior para que você não precise fazer isso! Porém, para que funcione, você mesmo deve possuir um [kingdom|lE] ou um [empire|lE]. Não cometa o erro de entregar um dos seus [primary_titles|lE]!\n\nSe você acabar superando o limite de vassalagem como duque, recomendamos formar um reino assim que puder.#!"
 reactive_advice_megaduke_penalty: "$reactive_advice_megaduke_penalty_step_1$"
 reactive_advice_megaduke_penalty_step_1: "Ducado muito grande!"
 reactive_advice_megaduke_penalty_desc: "Seu [duchy|El] está desmoronando sob a pressão de ter terras demais. Você deveria [create|El] ou [usurp|El] um [kingdom|El]!\n\n#TUT Talvez você j? possa criar um reino? Se sim, abra a visão de Dicas e veja se h? algum que possa criar. Se não, h? uma [decision|El] para fundar seu próprio reino... embora seja bom ter cuidado, pois títulos que você funda costumam ser mais fracos que os [de_jure|El] j? existentes.\n\nSe você ? um [vassal|El] e seu [liege|El] ? um rei, ter? que exigir independência antes de se tornar rei. O primeiro passo ? entrar em uma [independence_faction|El] ou cri?-la.#!"
 reactive_advice_bastards: "$reactive_advice_bastards_step_1$"
 action_reactive_advice_bastards: "$open_tutorial_lesson$$reactive_advice_bastards_step_1$"
 action_reactive_advice_bastards_desc: "Um filho bastardo pode ser uma bênção ou uma maldição, mas o que isso realmente significa?\nAbra isso para um resumo sobre bastardia e como isso pode funcionar para você!"
 action_reactive_advice_bastards_click: "$click_to_open_lesson$"
 reactive_advice_bastards_step_1: "Bastardos"
 reactive_advice_bastards_desc: "Ops! Parece que você tem um filho [bastard|lE]! Pode ser uma ameaça ou uma oportunidade…\n\n#TUT Tener hijos bastardos no es tan malo; se pueden casar para procurarte [alliances|lE] y, al mismo tiempo, no ponen en peligro la [succession|lE], porque no se les considera [Concept( 'legitimate', 'legítimos' )|E].\n\nNo es mala idea rodearse de unos cuantos bastardos a los que puedes [Concept('legitimized', 'legitimar')|E] si te ves falto de descendencia. Ahora bien, vigila la [opinion|lE] que tu [spouse|lE] tenga de ti…\n\nSi quieres tener hijos bastardos, te recomendamos la [scheme|lE] de [GetScheme('seduce').GetTypeName] con personajes solteros. Si seduces a una mujer casada, su marido puede creer que el niño es suyo y, en ese caso, no podrás legitimarlo.#!"
 reactive_advice_protecting_against_hostile_schemes: "$reactive_advice_protecting_against_hostile_schemes_step_1$"
 action_reactive_advice_protecting_against_hostile_schemes: "$open_tutorial_lesson$$reactive_advice_protecting_against_hostile_schemes_step_1$"
 action_reactive_advice_protecting_against_hostile_schemes_desc: "Muitos perigos se escondem nas sombras, e a ameaça de um esquema nunca está longe.\nAbra isto para um resumo dos esquemas e como se proteger!"
 action_reactive_advice_protecting_against_hostile_schemes_click: "$click_to_open_lesson$"
 reactive_advice_protecting_against_hostile_schemes_step_1: "Proteção contra esquemas"
 reactive_advice_protecting_against_hostile_schemes_step_2: "$reactive_advice_protecting_against_hostile_schemes_step_1$"
 reactive_advice_protecting_against_hostile_schemes_desc: "Cuidado onde pisa! Como governante, são muitos os que [Concept( 'scheme', 'conspirarão' )|E] para ver você morto…\n\nTente garantir que seus súditos tenham uma boa [opinion|lE] de você — mas, o mais importante, #emphasis sempre#! mantenha o seu [spymaster|lE] leal.\n\n#TUT Você pode não saber que elas existem, mas [hostile_schemes|lE] podem ter você como alvo a qualquer momento. Para impedir conspirações, recomendamos que mantenha sempre satisfeitos seus [vassals|lE] e [courtiers|lE].#!"
 reactive_advice_protecting_against_hostile_schemes_2_desc: "Ter um chefe de espiões com uma opinião muito baixa sobre você pode ser uma sentença de morte, pois não haverá como descobrir as [secret_schemes|lE]!\n\n#TUT Considere tudo isso se planeja jogar como um [tyrant|lE], pois, embora você possa reprimir seus súbditos com o [dread|lE], eles ainda podem conspirar contra você.\n\nPor fim, cuidado com [GetTrait('sadistic').GetName( GetPlayer )] ou [GetTrait('ambitious').GetName( GetPlayer )] [claimants|lE] ao seu trono...#!"
 reactive_advice_protect_against_factions: "$reactive_advice_protect_against_factions_step_1$"
 action_reactive_advice_protect_against_factions: "$open_tutorial_lesson$$reactive_advice_protect_against_factions_step_1$"
 action_reactive_advice_protect_against_factions_desc: "Uma facção é uma coisa perigosa se não for controlada.\nAbra isso para um resumo das facções e a melhor forma de lidar com elas!"
 action_reactive_advice_protect_against_factions_click: "$click_to_open_lesson$"
 reactive_advice_protect_against_factions_step_1: "Proteção contra facções"
 reactive_advice_protect_against_factions_desc: "Formou-se uma [faction|lE] contra você, mas não entre em pânico. Ainda há tempo para consertar isso!\n\nOs [vassals|lE] e [counties|lE] se unem a facções quando estão insatisfeitos com nosso governo. Para contrariar isso, podemos melhorar sua [opinion|lE] sobre nós ou tentar que nos [Concept( 'dreaded', 'teman' )|E].\n\n#TUT Para evitar las facciones, te recomendamos mejorar la [opinion|lE] que los vasallos tienen de ti, moderar las conquistas e intentar el [GetScheme('murder').GetTypeName|l] de todo [claimant|lE] más popular que tú.\n\nNormalmente tendrás tiempo de apaciguar a los vasallos antes de que presenten sus exigencias… Aprovecha bien este tiempo.#!"
 reactive_advice_protect_against_factions_2_desc: "Os condados com uma [Concept( 'county_opinion', 'opinión' )|E] baixa tendem a se unir à [peasant_faction|lE]. Ao contrário de outras facções, esta facção se levantará independentemente de ter chance de vencer ou não!\n\nÀs vezes, você simplesmente terá de colocar os camponeses em seu lugar…\n\n#TUT Es mejor que vigiles las facciones campesinas porque, si atacan cuando estás en guerra, pueden hacer un daño considerable a tu [control|lE].#!"
 reactive_advice_protect_against_factions_step_2: "$reactive_advice_protect_against_factions_step_1$"
 reactive_advice_imprisoned: "$reactive_advice_imprisoned_step_1$"
 action_reactive_advice_imprisoned: "$open_tutorial_lesson$$reactive_advice_imprisoned_step_1$"
 action_reactive_advice_imprisoned_desc: "Alguém prendeu você! Isto não é bom...\nAbra aqui algumas dicas sobre o que acontecerá e o que você pode fazer se for preso."
 action_reactive_advice_imprisoned_click: "$click_to_open_lesson$"
 reactive_advice_imprisoned_step_1: "Você foi preso!"
 reactive_advice_imprisoned_desc: "Seu personagem foi capturado e agora está à mercê de outra pessoa. Não há muito que você possa fazer a respeito.\n\nVá até o personagem que mantém você [prisoner|lE] e use a [interaction|lE] #TUT_KW Resgatar-se#!. Com sorte, você poderá pagar para sair! Caso contrário, ele pode decidir [Concept( 'execute', 'executá-lo' )|E].\n\n#TUT Se você estiver em [war|lE] com seu captor, ele pode forçar a [victory|lE]. Você não pode fazer nada a respeito, exceto ter mais cuidado da próxima vez!\n\nSe você foi capturado enquanto [Concept( 'commanding', 'comandava' )|E] um [army|lE], pode ser que seu cativeiro se deva a uma falta de [prowess|lE] [prowess_i]. Às vezes é melhor não arriscar, mesmo que isso implique não comandar suas forças pessoalmente.\n\nSe você foi capturado durante um [siege|lE], foi porque o inimigo [occupied|lE] sua [realm_capital|lE]. Tente manter os inimigos longe da sua capital!#!"
 reactive_advice_county_control: "$reactive_advice_county_control_step_1$"
 action_reactive_advice_county_control: "$open_tutorial_lesson$$reactive_advice_county_control_step_1$"
 action_reactive_advice_county_control_desc: "Se o [control|lE] estiver baixo em um [county|El], você receberá menos dele.\nAbra isso para obter uma explicação sobre como gerenciar o Controle do seu Condado!"
 action_reactive_advice_county_control_click: "$click_to_open_lesson$"
 reactive_advice_county_control_step_1: "Controle de condado"
 reactive_advice_county_control_desc: "Um dos seus [counties|El] tem um nível baixo de [control|El], o que significa que você receberá uma quantidade reduzida de [taxes|El] e [levies|El]. No entanto, há maneiras de aumentar o controle novamente!\n\n#TUT Hay muchos sitios donde consultar el control: en la casilla Dominio de la vista Señorío, en la vista Pistas y en la vista Condado.\n\nPara aumentar el control, ve a la vista Consejo y asigna a tu [marshal|El] la tarea [increase_control|E]. El control también aumenta con el tiempo, pero es un proceso muy lento, así que te recomendamos emplear un mariscal de alto nivel.\n\nSi dejas que el control del condado se mantenga bajo mucho tiempo, puede llegar a [Concept( 'county_corruption', 'corromperse' )|E]. Para evitarlo, te recomendamos que no conquistes demasiadas tierras de una vez.#!"
 reactive_advice_looming_game_over: "$reactive_advice_looming_game_over_step_1$"
 reactive_advice_looming_game_over_step_1: "Evitando Game Over"
 reactive_advice_looming_game_over_desc: "Ah, não! Parece que você não tem [player_heir|lE]. Se você morrer agora, será [game_over|lE]… vamos tentar evitar isso!\n\n#TUT Se você se encontra nesta situação, é muito provável que seja o último personagem da sua dinastia. Tendo isso em mente, só há uma forma válida de agir… gerar um herdeiro [legitimate|lE]!\n\nSe você está em uma sociedade que só permite que um dos sexos herde, pode tentar mudar a [gender_law|lE] para torná-la menos restritiva. Se você tiver [bastards|lE], este é o momento de legitimá-los!\n\nAlém disso, certifique-se de estar [married|lE] com um personagem com alta [fertility|lE] (como regra geral, mulheres com mais de 45 anos raramente são férteis). Se isso ainda não funcionar, resta o [Concept( 'divorce', 'divórcio' )|E] ou o [GetScheme('murder').GetTypeName|l] do seu [spouse|lE] e case-se com outra pessoa… ou use a [scheme|lE] de [GetScheme('seduce').GetTypeName] para gerar um bastardo.\n\nO tempo é curto, não corra riscos desnecessários!#!"
 reactive_advice_bankruptcy: "$reactive_advice_bankruptcy_step_1$"
 action_reactive_advice_bankruptcy: "$open_tutorial_lesson$$reactive_advice_bankruptcy_step_1$"
 action_reactive_advice_bankruptcy_desc: "Você não tem nenhum [gold_i], você está endividado!\nAbra isso para ver um resumo sobre a dívida e como sair dela."
 action_reactive_advice_bankruptcy_click: "$click_to_open_lesson$"
 reactive_advice_bankruptcy_step_1: "Dívida"
 reactive_advice_bankruptcy_desc: "Estamos sem [gold|lE] [gold_i]… isso é muito ruim, precisamos cortar nossos gastos e tentar encher o tesouro o mais rápido possível.\n\n#TUT Ter [Concept( 'debt', 'deudas' )|E] nos impede de fazer muitas coisas, como declarar [wars|lE] ou reforçar [men_at_arms|lE]. Também gera [county_corruption|lE]. Não deixe sua dívida sair do controle!\n\nA coisa mais óbvia a fazer é encerrar qualquer [war|lE] que você esteja travando — pois, quando se está em paz, não é preciso pagar a manutenção de [armies|lE]. Se você está perdendo muito Ouro, talvez até queira considerar desmobilizar alguns homens de armas.\n\nSe sua [faith|lE] permitir, você pode usar a [interaction|lE] #TUT_KW $hof_ask_for_gold_interaction$#! em seu [head_of_faith|lE] ou a Decisão #TUT_KW $borrow_from_holy_order_decision$#!.\n\nTambém pode ser uma boa ideia mudar para o [focus|lE] $stewardship_wealth_focus_short$, se ainda não o fez.#!"
 reactive_advice_rightful_liege: "$reactive_advice_rightful_liege_step_1$"
 action_reactive_advice_rightful_liege: "$open_tutorial_lesson$$reactive_advice_rightful_liege_step_1$"
 action_reactive_advice_rightful_liege_desc: "A estrutura de jure ? muito importante para seus vassalos. Não ser o suserano #emphasis legítimo#! deles pode prejudicar suas relações.\nAbra isto para ver um resumo do que significa ser um suserano legítimo!"
 action_reactive_advice_rightful_liege_click: "$click_to_open_lesson$"
 reactive_advice_rightful_liege_step_1: "Senhor Legítimo"
 reactive_advice_rightful_liege_step_2: "$reactive_advice_rightful_liege_step_1$"
 reactive_advice_rightful_liege_desc: "Você não ? o [rightful_liege|lE] de um [vassal|lE]. Isso reduzir? a [opinion|lE] dele sobre você e far? com que forneça menos [taxes|lE] e [levies|lE].\n\nVocê deve se esforçar para ser o suserano legítimo de todos os seus vassalos!\n\n#TUT Para fazer isso, você precisa possuir o [title|lE] [de_jure|lE] imediatamente superior ao deles. Um vassalo de nível [county|lE] quer estar sob seu [duchy|lE] de jure. Por exemplo, o conde de $c_madrid$ quer estar sob o duque de $d_toledo$.\n\n? muito comum ter alguns vassalos dos quais você #emphasis não#! ? o suserano legítimo. Não h? muito o que fazer sobre isso, e ? completamente normal! No entanto, lembre-se de usar a [interaction|lE] #TUT_KW $grant_vassal_interaction$#! para organizar seus vassalos. Você não pode ficar com todos os títulos sozinho!#!"
 reactive_advice_rightful_liege_2_desc: "Ao conquistar novas terras, você frequentemente conseguir? novos vassalos dos quais não ? o suserano legítimo. Planejar suas conquistas adequadamente pode reduzir esse problema.\n\n#TUT Para evitar ter vassalos demais que não gostam de você, recomendamos concentrar suas conquistas em uma área de jure de cada vez. Assim, #emphasis com o tempo#!, você poder? se tornar o suserano legítimo deles. Lembre-se de verificar com frequência se pode [create|lE] novos títulos!\n\nE não se esqueça de usar os modos de mapa de jure sempre que estiver planejando suas conquistas.#!"
 reactive_advice_bishop_endorsement: "$reactive_advice_bishop_endorsement_step_1$"
 action_reactive_advice_bishop_endorsement: "$open_tutorial_lesson$$reactive_advice_bishop_endorsement_step_1$"
 action_reactive_advice_bishop_endorsement_desc: "Seu bispo não está endossando você!\nAbra isso para um resumo do que isso significa para você e como você pode corrigi-lo."
 action_reactive_advice_bishop_endorsement_click: "$click_to_open_lesson$"
 reactive_advice_bishop_endorsement_step_1: "Endosso do Bispo"
 reactive_advice_bishop_endorsement_desc: "Graças ? [faith|lE] do seu personagem, você tem um [realm_priest|lE] em seu [council|lE].\n\nEsses bispos têm um poder imenso e estão mais do que dispostos a compartilh?-lo com você... desde que você fique do lado bom deles.\n\n#TUT Seu bispo fornece [taxes|lE] e [levies|lE] das [temple_holdings|lE] de seu [realm|lE]. As quantidades dependerão da [opinion|lE] que ele tiver de você.\n\nSe você cair em desgraça com ele, não receber? nada, e o bispo pode até tornar sua vida difícil! Por exemplo, ele pode obrig?-lo a se divorciar do seu [spouse|lE]...\n\nVocê deve fazer o possível para melhorar a opinião dele sobre você. Usar a [interaction|lE] #TUT_KW $gift_interaction$#! ou iniciar uma [scheme|lE] [GetScheme('sway').GetTypeName] são duas boas opções a considerar.\n\nSe tudo o mais falhar, [GetScheme('murder').GetTypeName|l] sempre ? uma opção... Talvez o sucessor dele seja mais amigável?#!"
 reactive_advice_encyclopedia: "$reactive_advice_encyclopedia_step_1$"
 action_reactive_advice_encyclopedia: "$open_tutorial_lesson$$reactive_advice_encyclopedia_step_1$"
 action_reactive_advice_encyclopedia_desc: "Quer saber mais sobre alguns termos do jogo? Abra para obter uma introdução à Enciclopédia."
 action_reactive_advice_encyclopedia_click: "$click_to_open_lesson$"
 reactive_advice_encyclopedia_step_1: "Enciclopédia"
 reactive_advice_encyclopedia_desc: "Crusader Kings III tem muitos conceitos e termos sobre os quais você pode aprender mais. Se tiver dúvidas sobre um conceito do jogo, pode abrir a Enciclopédia.\n\nSiga os elementos destacados na interface para ver como fazer isso.\n\n#TUT Na categoria \"Lições do tutorial\" da Enciclopédia você encontrar? muitas seções do tutorial, caso precise refrescar a memória. #!"
 reactive_advice_religion: "$lesson_basics_religion_1$"
 action_reactive_advice_religion: "$open_tutorial_lesson$$lesson_basics_religion_1$"
 action_reactive_advice_religion_desc: "Quer aprender mais sobre fé e religião? Abra para uma introdução à sua religião."
 action_reactive_advice_religion_click: "$click_to_open_lesson$"
 reactive_advice_dynamic_culture: "Cultura"
 action_reactive_advice_dynamic_culture: "$open_tutorial_lesson$$reactive_advice_dynamic_culture$"
 action_reactive_advice_dynamic_culture_desc: "Quer aprender mais sobre culturas? Abra para uma introdução às culturas."
 action_reactive_advice_dynamic_culture_click: "$click_to_open_lesson$"
 reactive_advice_fabricate_claim: "$reactive_advice_fabricate_claim_step_1$"
 action_reactive_advice_fabricate_claim: "$open_tutorial_lesson$$reactive_advice_fabricate_claim_step_1$"
 action_reactive_advice_fabricate_claim_desc: "Você se acha incapaz de declarar guerra? Você pode inventar uma reivindicação!\nAbra isso para um resumo de como usar seu conselho para fabricar reivindicações."
 action_reactive_advice_fabricate_claim_click: "$click_to_open_lesson$"
 reactive_advice_fabricate_claim_step_1: "Fabricação de reivindicações"
 reactive_advice_fabricate_claim_desc: "Você não pode declarar uma guerra sem um [casus_belli|lE]. A fonte mais comum de casus belli são os [claims|lE], mas às vezes é difícil conseguir o que você quer.\n\nÉ aí que entra o [fabricated_claims_short|lE]!\n\n#TUT Puedes pedirle a tu [court_chaplain|lE] que invente un derecho sobre cualquier [county|lE] cercano. Para ello, ve a la vista [council|E], o directamente en la vista Condado. Solo puedes inventar derechos de uno en uno y llevan su tiempo.\n\nEsta herramienta es especialmente útil cuando se juega con un [ruler|lE] de menos rango, pues cuanto más grande es el [realm|lE], más fáciles de conseguir son los casus belli.\n\nTe recomendamos que te inventes derechos sobre tus vecinos más cercanos… ¡especialmente los más débiles! Si juegas con un conde, céntrate en reclamar títulos dentro del mismo [duchy|lE] [de_jure|lE] que la [Concept( 'realm_capital', 'capital de tu reino' )|E].#!"
 reactive_advice_education: "$reactive_advice_education_step_1$"
 action_reactive_advice_education: "$open_tutorial_lesson$$reactive_advice_education_step_1$"
 action_reactive_advice_education_desc: "Seu herdeiro não se tornará um grande governante sem uma educação adequada!\nAbra isso para obter uma visão geral sobre a tutela e como preparar adequadamente seu herdeiro para o poder."
 action_reactive_advice_education_click: "$click_to_open_lesson$"
 reactive_advice_education_step_1: "Educação"
 reactive_advice_education_desc: "Parece que seu [player_heir|lE] não tem um [guardian|lE]! Sem uma [education|lE] adequada, ter? [skills|lE] medíocres e [traits|lE] aleatérios.\n\n#TUT Use a [interaction|lE] #TUT_KW $educate_child_interaction$#! em seu herdeiro e encontre um personagem adequado para ser seu [guardian|lE].\n\nProcure um personagem com conhecimento na área em que deseja que seu [ward|lE] se destaque. Recomendamos procurar um guardião com um [education_trait|lE] de alto nível (por exemplo, [GetTrait('education_martial_4').GetName( GetPlayer )|l]) ou um traço como [GetTrait('intellect_good_1').GetName( GetPlayer )|l] ou [GetTrait('intellect_good_3').GetName( GetPlayer )|l]. Se não estiver disposto a correr o risco de permitir que outra pessoa molde a personalidade de seu filho, você pode educar seu herdeiro você mesmo!\n\nEm geral, ? bom que todos os seus filhos tenham uma boa educação. Ainda assim, se houver filhos pelos quais você se importe menos (como o quarto ou quinto), pode sempre atribu?-los aos seus [vassals|lE] para ganhar um aumento de [opinion|lE]. A maneira mais fécil de encontrar um possível tutor ? usar a interação #TUT_KW $offer_ward_interaction$#! diretamente sobre um vassalo.#!"
 reactive_advice_tooltip_modes: "$reactive_advice_tooltip_modes_step_1$"
 action_reactive_advice_tooltip_modes: "$open_tutorial_lesson$$reactive_advice_tooltip_modes_step_1$"
 action_reactive_advice_tooltip_modes_desc: "Crusader Kings III possui diferentes modos de dicas de ferramenta!\nAbra isso para obter uma visão geral dos diferentes modos e descubra qual se adequa melhor ao seu estilo de jogo."
 action_reactive_advice_tooltip_modes_click: "$click_to_open_lesson$"
 reactive_advice_tooltip_modes_step_1: "Modos de dica de ferramenta"
 reactive_advice_tooltip_modes_step_2: "Modos de dica de ferramenta avançados"
 reactive_advice_tooltip_modes_desc: "Os modos de dicas de ferramenta controlam #EMP como#! você acessa [highlighted_text|lE] e informações nas dicas de ferramenta #weak (ou seja, como travar as dicas de ferramenta para que você possa mover o mouse sobre elas)#!.\n\nO modo de dicas de ferramenta padrão é chamado de #V Bloqueio por Tempo#!. Com esse modo, as dicas de ferramenta ficarão travadas no lugar após um tempo determinado, indicado por uma pequena barra de progresso."
 reactive_advice_tooltip_modes_2_desc: "Se você é um jogador experiente ou apenas prefere não ter suas dicas bloqueadas automaticamente, recomendamos tentar #V Action Lock#!. Com este modo, você pressiona o #V Middle-mouse Button#! para bloquear dicas.\n\n#I Você muda os modos de dicas indo para o #V In-game Menu#!, então, para #V Settings#!, então a seção #V Game#! — a #V Tooltip Mode setting#! existe.#!"
 action_perk_bonus_cap_modes: "Limite máximo de bônus de perícia atingido"
 action_perk_bonus_cap_modes_desc: "Você atingiu o valor máximo de bônus que uma perícia pode fornecer. Algumas perícias, como [GetPerk('sound_foundations_perk').GetName(GetPlayer)], possuem um valor máximo de pontos de habilidade que podem ser concedidos."
 action_perk_bonus_cap_modes_click: "$click_to_open_lesson$"
 reactive_advice_perk_bonus_cap: "$action_perk_bonus_cap_modes$"
 reactive_advice_perk_bonus_cap_desc: "$action_perk_bonus_cap_modes_desc$ Enquanto estiver acima do limite, o bônus não aumentará mais e não diminuirá até que você esteja abaixo do limite."
 reactive_advice_perk_bonus_cap_step_1: "$action_perk_bonus_cap_modes$"
 action_reactive_advice_varangian_adventure: "$open_tutorial_lesson$$reactive_advice_varangian_adventure_step_1$"
 action_reactive_advice_varangian_adventure_desc: "Você pode iniciar uma Aventura Varangiana.\nAbra para saber mais sobre esse tipo especial de guerra."
 action_reactive_advice_varangian_adventure_click: "$click_to_open_lesson$"
 reactive_advice_varangian_adventure: "$game_concept_varangian_adventures$"
 reactive_advice_varangian_adventure_step_1: "$game_concept_varangian_adventures$"
 reactive_advice_varangian_adventure_desc: "Você pode declarar uma [varangian_adventure|lE].\n\nEnquanto durar a [era|lE] $culture_era_tribal$, esse tipo de guerra estar? disponível para permitir que você comece uma nova vida em uma terra distante, longe das costas geladas de sua terra natal.\n\nO sucesso das $game_concept_varangian_adventures$ não apenas transferir? seu senhorio para uma localização estrangeira, mas também tornar? independentes todas as suas terras existentes, incluindo seus vassalos.\n\nSua primeira [varangian_adventure|lE] realizada como governante $north_germanic_group$ também chamar? tropas extras dos condados de mesma [faith|lE] e mesma [culture|lE] que você possuir em [GetGeographicalRegion('dlc_fp1_region_core_mainland_scandinavia').GetName] para ajud?-lo a conquistar seu novo lar."
 #Court positions
 action_reactive_advice_court_positions: "$open_tutorial_lesson$$ra_court_pos_open_view$"
 action_reactive_advice_court_positions_desc: "Abra isso para uma introdução às Posições na Corte"
 action_reactive_advice_court_positions_click: "$click_to_open_lesson$"
 reactive_advice_court_positions: "$ra_court_pos_open_view$"
 ra_court_pos_open_view: "Posições na Corte"
 ra_court_pos_open_view_desc: "Este é um bom momento para revisar suas [court_positions|lE]. São nomeações e honrarias que você pode dar aos seus [courtiers|lE] e [vassals|lE].\n\nCada um proporciona um benefício em troca de um salário mensal. Por exemplo, o [GetCourtPositionType('court_physician_court_position').GetName()|l] manterá você e sua [court|lE] saudáveis."
 ra_court_pos_open_view_trigger: "Abra a aba Posições na Corte (destacada)"
 ra_court_pos_appointing: "$ra_court_pos_open_view$"
 ra_court_pos_appointing_desc: "Você pode nomear novas [court_positions|lE] clicando em um dos retratos vazios para uma Posição na Corte vaga. Um personagem com alta [aptitude|lE] para a posição lhe dar? um bônus maior.\n\n#TUT Quando você nomeia alguém para uma posição, isso também afeta a [opinion|lE] dessa pessoa sobre você. Por causa disso, pode ser benéfico nomear alguém com pouca $game_concept_aptitude$ apenas para faz?-la gostar mais de você.#!"
 ra_court_pos_salary: "$ra_court_pos_open_view$"
 #Inventory
 action_reactive_advice_artifact_inventory: "$open_tutorial_lesson$$ra_artifact_inventory_general$"
 action_reactive_advice_artifact_inventory_desc: "Abra isso para uma introdução aos artefatos do inventário"
 action_reactive_advice_artifact_inventory_click: "$click_to_open_lesson$"
 reactive_advice_artifact_inventory: "$ra_artifact_inventory_general$"
 ra_artifact_inventory_general: "Inventário"
 ra_artifact_inventory_general_desc: "Você adquiriu seu primeiro [inventory_artifact|lE]. Esses [artifacts|lE] são carregados com você e fornecem vários benefícios."
 ra_artifact_inventory_open_step: "$ra_artifact_inventory_general$"
 ra_artifact_inventory_open_step_desc: "Os [inventory_artifacts|lE] são armazenados no seu Inventário, vamos abri-lo agora."
 ra_artifact_inventory_open_step_open: "Abra o Inventário (destacado)"
 ra_artifact_inventory_welcome: "$ra_artifact_inventory_general$"
 ra_artifact_inventory_welcome_desc: "No seu inventário, você pode equipar [inventory_artifacts|lE] para obter vários benefécios, como aumentar determinada [skill|lE] ou aumentar seu [prestige|lE].\n\nVocê também pode [repair|lE] ou [reforge|lE] [inventory_artifacts|lE], o que restaurar? sua [durability|lE] e impedir? que sejam destruídos com o passar do tempo.\n\nVocê também pode ver quais [artifact_claims|lE] possui e tentar tomar esses [artifacts|lE] para si mesmo!"
 #Station Men-at-Arms
 ra_maa_stationing_open_card_step: "Posicionando os Homens de Armas"
 ra_maa_stationing_open_card_step_desc: "Você tem [men_at_arms|lE] que não estão [Concept( 'stationed', 'acantonados' )|lE].\n\nSe você acantonar seus [regiments|El] os tornará mais poderosos e melhores no combate, o que pode ser vital para vencer [battles|El].\n\nVamos acantonar um regimento agora!"
 ra_maa_stationing_open_card_step_tt: "Clique em um dos seus Homens de Armas marcado com o texto '#X $MAA_UNSTATIONED$#!' (destacado)"
 ra_maa_stationing_click_station_button: "$ra_maa_stationing_open_card_step$"
 ra_maa_stationing_click_station_button_desc: "Você pode acantonar um [regiment|lE] de [men_at_arms|lE] por [holding|lE] em seu [domain|lE]\n\nTodas as possessões são válidas para qualquer tipo de regimento, mas algumas concedem maiores bônus do que outras.\n\nVamos escolher uma possessão para acantonar este regimento."
 ra_maa_stationing_click_station_button_tt: "Clique no botão 'Alterar Domínio Posicionado' (destacado)"
 ra_maa_stationing_select_station: "$ra_maa_stationing_open_card_step$"
 ra_maa_stationing_select_station_desc: "Diferentes [holdings|lE] oferecem quantidades diferentes de bônus, dependendo dos [buildings|lE] que você escolhe construir.\n\nNesta visualização, você pode ver exatamente o quanto seu [regiment|El] de [men_at_arms|lE] melhoraria se estivesse estacionado em um Domínio.\n\nClique em uma província #P verde#! no mapa, que você acha que oferece o melhor bônus para o seu regimento."
 ra_maa_stationing_select_station_tt: "Clique em qualquer Domínio #P Verde#! no mapa"
 ra_maa_stationing_finished: "$ra_maa_stationing_open_card_step$"
 ra_maa_stationing_finished_desc: "O [regiment|lE] de [men_at_arms|lE] agora está [stationed|lE]. Você pode ver o quanto melhorou abaixo do retrato dele (a parte destacada).\n\nLembre-se de conferir de vez em quando para que seus regimentos estejam acantonados nas [holdings|lE] ideais.\n\nIsso é especialmente importante se você conquistar ou herdar novos territórios, ou se decidir especializar uma posse com [buildings|lE] como [GetBuilding('smiths_01').GetName] ou [GetBuilding('stables_01').GetName]."
 reactive_advice_station_maa: "$ra_maa_stationing_open_card_step$"
 #Tours
 REACTIVE_ADVICE_TOURS: "Viagens"
 action_reactive_advice_tours_picking_vassals: "$open_tutorial_lesson$$REACTIVE_ADVICE_TOURS$"
 action_reactive_advice_tours_picking_vassals_desc: "Agora você está planejando quais vassalos visitar em sua Grande Viagem. Abra isso para saber mais sobre o planejamento de Viagens."
 action_reactive_advice_tours_picking_vassals_click: "$click_to_open_lesson$"
 reactive_advice_tours_picking_vassals: "$REACTIVE_ADVICE_TOURS$"
 ra_tours_picking_vassals_intro: "$REACTIVE_ADVICE_TOURS$"
 ra_tours_picking_vassals_intro_desc: "Estás prestes a embarcar em uma [GetActivityType( 'activity_tour' ).GetName()|l] pelo seu [realm|lE].\n\nDurante uma gira, [Concept( 'travel', 'viajarás' )|E] para visitar seus [vassals|lE], você investirá [gold|lE] para obter recompensas como [county_control|lE], [opinion|lE] e [cultural_acceptance|E], e muito mais!"
 ra_tours_picking_vassals_add: "$REACTIVE_ADVICE_TOURS$"
 ra_tours_picking_vassals_add_desc: "Primeiro, você precisa escolher quais [vassals|lE] visitar.\n\nQuem visitar depende do tipo de [GetActivityType( 'activity_tour' ).GetName()|l]. Por exemplo, em uma [majesty_tour|El], cada [stop|lE] aumenta a [opinion|lE] desse vassalo, então você pode escolher vassalos com baixa opinião sobre você.\n\nViajar longe entre paradas aumenta o custo em [gold|lE] de cada parada."
 ra_tours_picking_vassals_add_prompt: "Adicione pelo menos um vassalo para visitar, clicando no mapa"
 ra_tours_picking_vassals_stops: "$REACTIVE_ADVICE_TOURS$"
 ra_tours_picking_vassals_stops_desc: "Em cada [stop|lE] da Viagem, você pode escolher entre:\n$BULLET_WITH_TAB$[tour_the_grounds|E], aumentando o [county_control|lE]\n$BULLET_WITH_TAB$ Solicitar um [hosted_dinner|lE], formando [hooks|lE] e [relations|lE]\n$BULLET_WITH_TAB$ Pedir ao seu [vassal|lE] para organizar um [cultural_festival|lE], aumentando a [county_opinion|lE] e [cultural_acceptance|lE]"
 ra_tours_picking_vassals_conclusion: "$REACTIVE_ADVICE_TOURS$"
 ra_tours_picking_vassals_conclusion_desc: "Assim que estiver satisfeito com as [stops|lE] e a ordem em que estão, você pode avançar para a próxima etapa do planejamento."
 #Active Regency Liege Side
 REACTIVE_ADVICE_REGENCY_TERM: "Regência"
 REACTIVE_ADVICE_REGENCY_OPEN_VIEW_PROMPT: "Abrir a Visão de Regência (destacado)"
 REACTIVE_ADVICE_YOU_REGENCY_REASONS: "Pode haver uma [regency|El] por muitas razões, incluindo:\n$BULLET_WITH_TAB$ Quando você viaja [travel|El] fora de seu [realm|El]\n$BULLET_WITH_TAB$ Quando você é uma [child|El]\n$BULLET_WITH_TAB$ Quando você se torna [GetTrait('incapable').GetName( GetPlayer )|l]"
 reactive_advice_regency_for_liege: "$action_reactive_advice_regency_for_liege$"
 action_reactive_advice_regency_for_liege: "$open_tutorial_lesson$$REACTIVE_ADVICE_REGENCY_TERM$"
 action_reactive_advice_regency_for_liege_desc: "Agora você tem um Regente. Abra isso para uma introdução às Regências."
 action_reactive_advice_regency_for_liege_click: "$click_to_open_lesson$"
 ra_regency_liege_intro: "$REACTIVE_ADVICE_REGENCY_TERM$"
 ra_regency_liege_intro_desc: "Agora você tem um [regent|El].\n\n $REACTIVE_ADVICE_YOU_REGENCY_REASONS$"
 ra_regency_liege_effects: "$REACTIVE_ADVICE_REGENCY_TERM$"
 ra_regency_liege_effects_desc: "Em uma [regency|El] você ainda pode realizar qualquer ação que normalmente poderia realizar.\n\nNo entanto, o [regent|El] obtém [diarch_powers|El] poderes especiais que pode usar em você ou em seus [vassals|El]. Você sempre tem direito de [Concept( 'veto', 'vetar' )|E] sobre esses poderes."
 ra_regency_liege_open_UI: "$REACTIVE_ADVICE_REGENCY_TERM$"
 ra_regency_liege_open_UI_desc: "Vamos dar uma olhada na sua [regency|El] agora!"
 ra_regency_liege_open_UI_prompt: "$REACTIVE_ADVICE_REGENCY_OPEN_VIEW_PROMPT$"
 ra_regency_liege_open_tab: "$REACTIVE_ADVICE_REGENCY_TERM$"
 ra_regency_liege_open_tab_desc: "Seu [regent|El] é mostrado na guia '$DIARCHY_WINDOW_YOUR_TAB$'."
 ra_regency_liege_open_tab_prompt: "Abra a guia '$DIARCHY_WINDOW_YOUR_TAB$' (destacado)"
 ra_regency_liege_scales_of_power: "$REACTIVE_ADVICE_REGENCY_TERM$"
 ra_regency_liege_scales_of_power_desc: "Estas são as [scales_of_power|El].\n\nQuanto mais as Escalas favorecerem o seu [regent|El], mais [diarch_powers|El] eles terão acesso e será mais difícil encerrar a [regency|El].\n\nVocê pode inclinar a balança a seu favor diretamente com o botão '$DIARCHY_WINDOW_SWING_SCALES$'."
 ra_regency_liege_mandate: "$REACTIVE_ADVICE_REGENCY_TERM$"
 ra_regency_liege_mandate_desc: "Você pode atribuir um [mandate|El] ao seu [regent|El], direcionando seus esforços para essa área específica.\n\nVocê sempre pode alterar esse Mandato posteriormente, dependendo das suas prioridades."
 ra_regency_liege_ending: "$REACTIVE_ADVICE_REGENCY_TERM$"
 ra_regency_liege_ending_desc: "Se as condições que iniciaram a [regency|El] não forem mais válidas, você pode tentar encerr?-la.\n\nO [regent|El] precisa aceitar isso, mas você pode oferecer coisas como [gold|El] ou um [favor|El] para aumentar a probabilidade de aceitação. \n\nSe ele recusar, pode declarar [war|El] contra você!"
 ra_regency_liege_conclusion: "$REACTIVE_ADVICE_REGENCY_TERM$"
 ra_regency_liege_conclusion_desc: "As regências são em sua maioria uma questão reativa. Por enquanto, fique de olho nas [scales_of_power|El].\n\nQuando o [regent|El] usar um de seus [diarch_powers|El], você será informado e poderá decidir o que fazer a respeito."
 #Active Regency Regent Side
 reactive_advice_regency_for_regent: "$action_reactive_advice_regency_for_regent$"
 action_reactive_advice_regency_for_regent: "$open_tutorial_lesson$ Regente"
 action_reactive_advice_regency_for_regent_desc: "Agora você é o Regente do seu Suserano. Abra isso para uma introdução às Regências."
 action_reactive_advice_regency_for_regent_click: "$click_to_open_lesson$"
 ra_regency_regent_intro: "$REACTIVE_ADVICE_REGENCY_TERM$"
 ra_regency_regent_intro_desc: "Você está atuando como [regent|El] de seu [liege|El].\n\nUma [regency|El] pode ocorrer por muitas razões, incluindo:\n$BULLET_WITH_TAB$ Quando seu senhor viaja para fora de [travel|El] do seu [realm|El]\n$BULLET_WITH_TAB$ Quando seu senhor é uma [child|El]\n$BULLET_WITH_TAB$ Quando seu senhor se torna [GetTrait('incapable').GetName( GetPlayer )]"
 ra_regency_regent_powers: "$REACTIVE_ADVICE_REGENCY_TERM$"
 ra_regency_regent_powers_desc: "Como [regent|El] obténs [diarch_powers|El] especiais que você pode usar com seu [liege|El] ou com seus companheiros [vassals|El]. Seu senhor sempre tem direito a [Concept( 'veto', 'vetarlos' )|El].\n\nUsar esses poderes com seus companheiros vassalos pode ser visto como um abuso de poder, o que lhe dará uma penalidade de [strife_opinion|El]."
 ra_regency_regent_open_UI: "$REACTIVE_ADVICE_REGENCY_TERM$"
 ra_regency_regent_open_UI_desc: "Vamos dar uma olhada na sua [regency|El] agora!"
 ra_regency_regent_open_UI_prompt: "$REACTIVE_ADVICE_REGENCY_OPEN_VIEW_PROMPT$"
 ra_regency_regent_open_tab: "$REACTIVE_ADVICE_REGENCY_TERM$"
 ra_regency_regent_open_tab_desc: "Seu status como [regent|El] é exibido na guia '$DIARCHY_WINDOW_LIEGE_TAB$'."
 ra_regency_regent_open_tab_prompt: "Abra a guia '$DIARCHY_WINDOW_LIEGE_TAB$' (destacado)"
 ra_regency_regent_scales_of_power: "$REACTIVE_ADVICE_REGENCY_TERM$"
 ra_regency_regent_scales_of_power_desc: "Essas são as [scales_of_power|El].\n\nQuanto mais as Escalas favorecerem você, mais [diarch_powers|El] você terá acesso, e será mais difícil encerrar a [regency|El].\n\nVocê pode inclinar as Escalas a seu favor diretamente com o botão '$DIARCHY_WINDOW_SWING_SCALES$'."
 ra_regency_regent_mandate: "$REACTIVE_ADVICE_REGENCY_TERM$"
 ra_regency_regent_mandate_desc: "Seu [liege|El] pode lhe dar um [mandate|El], que lhe proporcionará oportunidades para melhorar o [realm|El].\n\nSe você lidar bem com essas oportunidades, você inclinará as [scales_of_power|El] a seu favor."
 ra_regency_regent_ending: "$REACTIVE_ADVICE_REGENCY_TERM$"
 ra_regency_regent_ending_desc: "Se as condições que iniciaram a [regency|El] não forem mais válidas, seu [liege|El] poder? tentar encerr?-la.\n\nSe as [scales_of_power|El] estiverem fortemente a seu favor, você pode até resistir ao encerramento da regência, talvez até iniciando uma [war|El] pelo [primary_title|El] dele!"
 ra_regency_regent_conclusion: "$REACTIVE_ADVICE_REGENCY_TERM$"
 ra_regency_regent_conclusion_desc: "Como [regent|El], você pode tentar usar seus [diarch_powers|El] em seu [liege|El] ou em seus colegas [vassals|El].\n\nSe você não deseja antagonizar seu suserano, pode simplesmente reagir às oportunidades que surgem, e seu suserano pode recompensá-lo por sua lealdade!"
 #Prepare by setting a Regent
 REACTIVE_ADVICE_FUTURE_REGENT: "Futuro Regente"
 action_reactive_advice_set_future_regent: "$open_tutorial_lesson$$REACTIVE_ADVICE_FUTURE_REGENT$"
 action_reactive_advice_set_future_regent_desc: "Se você se tornar incapaz de governar, um Regente governará em seu lugar. Abra isso para aprender como controlar quem será o seu Regente."
 action_reactive_advice_set_future_regent_click: "$click_to_open_lesson$"
