 ra_landless_adventurer_1: "Aventureiro Sem Terra"
 ra_landless_adventurer_2: "Seu Acampamento"
 ra_landless_adventurer_3: "Seus Seguidores"
 ra_landless_adventurer_4: "Contratos"
 ra_landless_adventurer_5: "Propósito do Acampamento"
 ra_landless_adventurer_6: "No Caminho para o Poder"
 ra_landless_adventurer_1_desc: "@ra_landless_adventurer_2! \nVocê é um [adventurer|lE]! Viaje pelo mundo, visite os [courts|lE] de [rulers|lE] para encontrar trabalho e complete [task_contracts|lE] para obter recompensas remuneradas. Você pode melhorar seu [camp|lE], recrutar [followers|lE] e construir uma vasta [contact_list|lE]."
 ra_landless_adventurer_2_desc: "Como um [adventurer|lE], você não está preso a nenhum pedaço de terra, mas tem a liberdade de viajar pelo mundo. Sua base de operações como $game_concept_adventurer$ é seu [camp|lE], que você pode melhorar e expandir com [camp_buildings|lE] ao longo de sua carreira de aventureiro."
 ra_landless_adventurer_3_desc: "Durante suas viagens, você pode reunir [followers|lE], que terão funções semelhantes às dos [courtiers|lE] de [rulers|lE] com terras. Ao [Concept( 'traveling', 'viajar' )|E] como [adventurer|lE] , você terá a opção de usar a [travel_option|lE] [GetTravelOption('adventurers_scout_for_talent_option').GetName|l].\n\nAlém disso, você também poderá obter $game_concept_followers$ novos ao tomar a [decision|lE] «Visitar posse». Em seu $game_concept_camp$ , você pode ver seus $game_concept_followers$ com o botão localizado no canto superior esquerdo do painel."
 ra_landless_adventurer_4_desc: "Como [adventurer|lE], sua principal fonte de renda seráo os [task_contracts|lE]. Você pode v?-los representados no mapa em forma de pergaminhos. Os $game_concept_task_contracts$ podem ser encontrados por todo o mundo e exigem que você execute uma tarefa específica para um empregador.\n\nSeu [prestige_level|lE] determina o [task_contract_tier|lE] dos $game_concept_task_contracts$ que você receber?. Obter o nível de fama [GetPrestigeLevelName('(int32)2')] ou superior desbloqueia a compra ou conquista de [land|lE], caso você deseje se tornar um [ruler|lE] [landed|lE]. Níveis superiores desbloqueiam opções ainda mais poderosas.\n\nVocê pode acessar novos $game_concept_task_contracts$ ao mover seu [camp|lE], uma ação que custar? uma quantidade de [provisions_i][provisions|lE] com base na distância percorrida."
 ra_landless_adventurer_5_desc: "Você pode visualizar detalhes sobre seu [camp|lE] na aba do $game_concept_realm$ (destacada). A partir daí, você pode alterar seu [camp_purpose|lE] e abrir a visão geral do $game_concept_camp$.\n\nO propósito do seu $game_concept_camp$ determinará o tipo de [task_contracts|lE] que você poderá encontrar, pode desbloquear certas [decisions|lE] e [camp_buildings|lE], bem como uma variedade de outros benefícios."
 ra_landless_adventurer_6_desc: "@ra_landless_adventurer!\nAceite [task_contracts|lE], mova seu [camp|lE] para explorar diferentes partes do mundo e aumente o número de quem [Concept('following', 'te siguen' )|E].\n\nComo [adventurer|lE], você tem a liberdade de escolher o caminho futuro de sua [dynasty|lE]. Você continuará na estrada, tentará conquistar um [title|lE] em uma terra distante ou se intrometerá nos assuntos de [rulers|lE] pelo mundo inteiro?"
 reactive_advice_admin_gov: "Governo Administrativo"
 ra_admin_gov_1: "$reactive_advice_admin_gov$"
 ra_admin_gov_1b: "$reactive_advice_admin_gov$"
 ra_admin_gov_2: "$reactive_advice_admin_gov$"
 ra_admin_gov_2b: "$reactive_advice_admin_gov$"
 ra_admin_gov_3: "Visão Geral da Província"
 ra_admin_gov_4: "Sucessão e Influência"
 ra_admin_gov_5: "Governança da Província"
 ra_admin_gov_5b: "Governança da Província"
 ra_admin_gov_6: "Famílias Poderosas"
 ra_admin_gov_7: "Estatutos"
 ra_admin_gov_8: "No Caminho para o Poder"
 ra_admin_gov_1_desc: "@ra_admin_gov_1!Você está em um [administrative_government|lE]. Ele é formado por $TUTORIAL_GOVERNORS$, que administram e presidem terras para seu [top_liege|lE], embora na verdade não possuam essas terras eles mesmos."
 ra_open_admin_gov_panel_prompt: "Abra a aba \"$TUTORIAL_PROVINCES_NO_TOOLTIP$\" do Painel do Governo Administrativo (destacado)"
 ra_admin_gov_2_desc: "Estas são todas as $TUTORIAL_PROVINCES$ presentes no [top_realm|lE].\n\nUm $TUTORIAL_GOVERNOR$ s? pode possuir uma $TUTORIAL_PROVINCE_NO_TOOLTIP$, e ficar mais forte significa distribuir o poder sobre as $TUTORIAL_PROVINCES_NO_TOOLTIP$ entre os membros de sua [house|lE].\n\nComo um $TUTORIAL_GOVERNOR_NO_TOOLTIP$ não possui a $TUTORIAL_PROVINCE_NO_TOOLTIP$ atribuída, ter? de assegurar sua posição por meio de [schemes|lE] e ação política.\n\n#I Você pode inspecionar as $TUTORIAL_PROVINCES_NO_TOOLTIP$ clicando nelas no mapa ou na lista.#!"
 ra_open_admin_gov_theme_detail_prompt: "Inspecionar uma $TUTORIAL_PROVINCE_NO_TOOLTIP$"
 ra_admin_gov_3_desc: "As [skills|lE] de um $TUTORIAL_GOVERNOR_NO_TOOLTIP$ e seu nível no [trait|lE] [GetTrait('governor').GetName( GetNullCharacter )] determinarão sua [governor_efficiency|lE], o que indica quantos [levies|lE] e [taxes|lE] poderá coletar para seu $game_concept_top_liege$.\n\nUma $game_concept_governor_efficiency$ alta também fortalece os $TUTORIAL_PROVINCIAL_ARMIES$ da [province|lE].\n\nSe você for o [top_liege|lE], deve garantir que as $game_concept_provinces$ estejam sob o controle de $TUTORIAL_GOVERNORS_NO_TOOLTIP$ com uma $game_concept_governor_efficiency$ alta."
 ra_admin_gov_3_prompt: "Abra a aba \"Nomeação de $TUTORIAL_GOVERNOR_NO_TOOLTIP$\""
 ra_admin_gov_4_desc: "A [succession|lE] de uma $TUTORIAL_PROVINCE$ em um [administrative_government|lE] é determinada por eleição, na qual você gasta [influence|lE] @influence_icon! para aumentar a [Concept('candidate_score', 'puntuación')|E] de uma candidatura. \n\nSe você quer expandir seu poder dentro do [realm|lE] , você vai querer garantir que os membros da sua [house|lE] sejam $TUTORIAL_GOVERNORS$ , ou até mesmo detenham o [title|lE] de $game_concept_top_realm$."
 ra_admin_gov_5_desc: "Cada $TUTORIAL_PROVINCE$ é [Concept('governed', 'gobernada' )|E] governada por uma [family|lE]. Você pode ver o brasão da [house|lE] exibido ao lado de cada $TUTORIAL_PROVINCE_NO_TOOLTIP$.\n\nÀ medida que sua $game_concept_house$ adquire mais [titles|lE] você se tornará mais proeminente, podendo até se tornar uma [powerful_family|lE]."
 ra_open_admin_gov_powerful_families_intro: "Abra a aba das Famílias Nobres (destacada)"
 ra_admin_gov_6_desc: "Uma [powerful_family|lE] é uma [house|lE] influente no [administrative_government|lE]. A família do [top_liege|lE] sempre é considerada poderosa, não importa qual seja sua [powerful_family_rating_mid|lE]. Além disso, podem existir outras cinco $game_concept_powerful_families$.\n\nEmbora qualquer $game_concept_house$ possa estabelecer uma [powerful_family_attribute|lE], ele só terá efeito se a Família associada for considerada Poderosa."
 ra_open_admin_gov_open_estate_prompt: "Veja sua Propriedade"
 ra_admin_gov_7_desc: "Um [estate|lE] é um tipo de [domicile|lE], que representa uma posse de terra privada não vinculada a nenhum [title|lE] [landed|lE] em particular. Em um [administrative_government|lE], serve como base de operações para sua [family|lE] e será herdado dentro de sua [house|lE].\n\nVocê pode aprimorá-lo e construir novos [estate_buildings|lE] dentro do seu $game_concept_estate$ para aumentar sua [influence|lE] e influência política dentro do [realm|lE].\n\n#TUT Vale notar que [rulers|lE] [feudal|lE] dentro de um $game_concept_administrative_government$ não terão acesso a um $game_concept_estate$.#!"
 ra_admin_gov_8_desc: "@ra_admin_gov_8! Em um [administrative_government|lE] tudo gira em torno da família, da influência política, da intriga e de nomear a pessoa certa para o cargo certo.\n\nVocê usará a [influence|lE] para melhorar sua posição no [realm|lE] ao mesmo tempo em que conduz membros da sua [dynasty|lE] rumo a posições de poder.\n\n[Concept('scheme', 'Intriga')|E] contra seus rivais e minam sua autoridade por meio de conspirações políticas. O caminho para o poder é longo e sinuoso, mas jogue bem suas cartas e talvez consiga abrir caminho."
 ra_agent_scheme_rework_1: "Esquemas Complexos"
 ra_agent_scheme_rework_1_desc: "Vamos dedicar um momento para revisar as [schemes|lE] complexas. Elas são formadas por três parâmetros principais: [success_chance|lE], [scheme_speed_single|lE] e [secrecy|lE].\n\nPara ajudá-lo a completar uma $game_concept_scheme$, existem diferentes tipos de [agents|lE], que geralmente vêm em grupos pré-selecionados de cinco ao iniciar uma $game_concept_scheme$ complexa."
 reactive_advice_agent_scheme_rework: "$ra_agent_scheme_rework_1$"
 ra_agent_scheme_rework_2: "Detalhes do Esquema Complexo"
 ra_agent_scheme_rework_2_desc: "Um [scheme|lE] complexo se desenrolará ao longo de várias [scheme_phases|lE]. Cada $game_concept_scheme_phase$ consiste em um número de dias, após os quais sua [success_chance|lE] aumentará.\n\nHá uma chance de que você obtenha uma [scheme_opportunity_opportunity|lE] após cada $game_concept_scheme_phase$, que você pode usar para convencer [agents|lE] a se juntar, ou para executar o $game_concept_scheme$ com uma maior $game_concept_success_chance$."
 ra_agent_scheme_rework_3: "Potencial do Esquema Complexo"
 ra_agent_scheme_rework_3_desc: "Cada [scheme|lE] tem um [scheme_potential|lE] associado. Este Potencial pode ser aumentado através do uso de [agents|lE], e serve como um limite rígido para a [success_chance|lE] máxima que você pode acumular.\n\nO $game_concept_scheme_potential$ nunca pode exceder 95%, o que significa que todos os $game_concept_schemes$, independentemente do número de [scheme_opportunity_opportunities|lE] gastos para aumentar a $game_concept_success_chance$, sempre terão uma chance de falhar."
 ra_agent_scheme_rework_4: "Segredo do Esquema Complexo"
 ra_agent_scheme_rework_4_desc: "Uma [scheme|lE] complexa carrega um certo nível de [secrecy|lE]. Este valor representa o quão provável é que a conspiração seja descoberta.\n\nQuando se inicia uma $game_concept_scheme$, ela terá um período de graça de alguns meses, durante o qual não pode ser descoberta sob nenhuma circunstância. Após esse período, a conspiração corre o risco de ser descoberta por [scheme_breaches|lE].\n\nÉ possível executar uma conspiração mesmo que ela tenha brechas, mas com uma [success_chance|lE] reduzida. Se a sua $game_concept_scheme$ acumular sete brechas, ela será cancelada.\n\n#TUT Es más, ciertas conjuras básicas, como [GetScheme('seduce').GetTypeName|l], también se pueden considerar secretas y, por tanto, tienen un periodo de gracia asociado.#!"
 ra_agent_scheme_rework_5: "Agentes em Esquemas Complexos"
 ra_agent_scheme_rework_5_desc: "Complexas [schemes|lE] têm cinco vagas de [agent|lE] que podem ser preenchidas com potenciais co-conspiradores. Em geral, é uma boa ideia preencher o maior número possível das vagas de agente, já que elas podem fornecer bônus benéficos para a [scheme_speed|lE], a [secrecy|lE] ou a [scheme_potential|lE].\n\nOs diferentes tipos de agente favorecem [skills|lE] distintas. Por exemplo, um [GetAgentSlotType( 'agent_infiltrator' ).GetName|l] se beneficia de [intrigue|lE] [intrigue_i|E] e [diplomacy|lE] [diplomacy_i|E] além de certos [traits|lE]."
 ra_agent_scheme_rework_6: "Executando um Esquema"
 ra_agent_scheme_rework_6_desc: "Se você considera que já intrigou bastante, pode ser hora de pensar em executar seu [scheme|lE]. Para isso, você pode usar [EmptyScope.ScriptValue('multi_ending_scheme_charge_to_advance_threshold_t1_value')], [EmptyScope.ScriptValue('multi_ending_scheme_charge_to_advance_threshold_t2_value')], [EmptyScope.ScriptValue('multi_ending_scheme_charge_to_advance_threshold_t3_value')] ou [EmptyScope.ScriptValue('multi_ending_scheme_charge_to_advance_threshold_t4_value')] das suas [scheme_opportunity_opportunities|lE] acumuladas.\n\nAlém disso, se você suspeitar que alguém está tramando contra você, pode valer a pena mudar sua [scheme_countermeasure|lE] ativa para evitar qualquer possível contratempo.\n\nBoa sorte e boa trama!"
