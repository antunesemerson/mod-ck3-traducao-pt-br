l_spanish:
 lesson_china_introduction: "$lesson_basics_welcome$"
 lesson_china_introduction_desc: "@tutorial_screenshot_1_china!\nComo jovem estudioso na China, sua posição é humilde, mas promissora. Por meio do aprendizado, da astúcia e de uma conduta meritória, você pode ascender pelos escalões imperiais.\n\nEmbora sua vida seja breve, seus herdeiros levarão o nome de sua casa à glória duradoura.\n\nSob o governo estável da dinastia Song, os exames imperiais oferecem um caminho para o cargo de governador — e talvez até para o próprio trono imperial."
 lesson_china_camera: "$lesson_basics_quick_camera$"
 lesson_china_camera_desc: "$lesson_basics_quick_camera_desc$"
 lesson_china_zoom: "$lesson_basics_quick_zoom$"
 lesson_china_zoom_desc: "$lesson_basics_quick_zoom_desc$"
 lesson_china_nested_tooltips: "Dicas de ferramenta aninhadas"
 lesson_china_nested_tooltips_desc: "$lesson_basics_tooltips_in_tooltips_desc$"
 lesson_china_nested_tooltips_hover_word: "$lesson_basics_tooltips_in_tooltips_hover_word$"
 lesson_china_nested_tooltips_hover_word_deeper: "$lesson_basics_tooltips_in_tooltips_hover_word_deeper$"
 lesson_china_nested_tooltips_complete: "$lesson_china_nested_tooltips$"
 lesson_china_nested_tooltips_complete_desc: "$lesson_china_nested_tooltips_desc$"
 lesson_china_characters: "Personagens"
 lesson_china_characters_desc: "Você joga com [GetPlayer.GetShortUINameNotMeNoTooltip], um dos muitos [characters|lE] deste mundo, representados pelos avatares de personagens.\n\nVocê é um burocrata em ascensão em [GetTitleByKey('h_china').GetDefinitiveName]!"
 lesson_china_this_is_you_1: "$lesson_basics_quick_this_is_you_1$"
 lesson_china_this_is_you_1_desc: "Aqui é onde você verá a si mesmo e à sua [family|El] mais próxima.\n\nÀ direita, você verá sua [player_heir|El], com quem jogará quando seu [character|El] atual morrer.\n\n#TUT Se algum dia você se perder no mapa, pode clicar no seu personagem para recentralizar a câmera no seu [realm|El].#!"
 lesson_china_this_is_you_2: "$lesson_basics_quick_this_is_you_2$"
 lesson_china_this_is_you_2_desc: "Geralmente é uma boa ideia ter [spouse|El]. Ele(a) o(a) ajudará a governar seu [realm|lE] e ajudará você a garantir o futuro de sua [dynasty|lE].\n\nNo momento, você não é casado(a). Por que não fazemos algo a respeito disso?"
 lesson_china_find_spouse_tt: "$lesson_basics_quick_find_spouse_tt$"
 lesson_china_marriage_window: "$lesson_basics_quick_this_is_you_2$"
 lesson_china_marriage_window_desc: "Encontrar o [spouse|El] ideal não é fácil, mas aqui estão algumas coisas a ter em mente:\n\n$EFFECT_LIST_BULLET$Habilidade: suas [skills|El] serão somadas às suas\n$EFFECT_LIST_BULLET$Genética: [congenital_traits|El] como [GetTrait('lisping').GetName( GetNullCharacter )|l] poderão ser herdados por seus [children|El]\n$EFFECT_LIST_BULLET$Nobreza: se você se casar com alguém [lowborn|El], perderá [prestige|El]"
 lesson_china_married_great_job: "$lesson_basics_quick_married_great_job$"
 lesson_china_married_great_job_desc: "Parabéns pelo casamento!\n\nSe, após a morte do seu personagem, não restarem outros membros vivos da sua [dynasty|lE], você perde o jogo. Ter $game_concept_spouse$ pode ajudar a evitar isso."
 lesson_china_this_is_you_3: "$lesson_basics_quick_this_is_you_3$"
 lesson_china_this_is_you_3_desc: "Aqui estão os [traits|El] do seu personagem! Como você pode ver, ele é @ambitious_icon_tutorial![Nbsp][GetTrait('ambitious').GetName( GetNullCharacter )], @compassionate_icon_tutorial![Nbsp][GetTrait('compassionate').GetName( GetNullCharacter )] e @gregarious_icon_tutorial![Nbsp][GetTrait('gregarious').GetName( GetNullCharacter )].\n\n#TUT Os $game_concept_traits$ afetam como seu personagem reage aos eventos do mundo do jogo. Você também pode adquirir novos traços ao jogar.#!"
 lesson_china_skills: "$lesson_basics_quick_skills$"
 lesson_china_skills_desc: "$lesson_basics_quick_skills_desc$"
 lesson_china_house: "$game_concept_house$"
 lesson_china_house_desc: "Esta é sua [house|El], a #V Casa [GetPlayer.GetHouse.GetNameNoTooltip]#!, uma família chinesa de [nobles|E].\n\nComo [house_head_head|El] de sua $game_concept_house$, espera-se que você guie os membros de sua $game_concept_house$ ao sucesso dentro do governo chinês.\n\nSua $game_concept_house$ é pequena, mas crescerá com o tempo quando [children|El] nascerem.\n\n#TUT Cada [house|El] pertence a uma [dynasty|El]. No entanto, a Casa [GetPlayer.GetHouse.GetNameNoTooltip] é tão pequena que a $game_concept_house$ e a $game_concept_dynasty$ são a mesma coisa.#!"
 lesson_china_realm: "$game_concept_realm$"
 lesson_china_realm_desc: "Nesta área é exibido o seu [realm|El], ou, em outras palavras, as terras e recursos que você controla.\n\nComo seu personagem é um nobre humilde, você não possui [land|El], então o seu $game_concept_realm$ é limitado. Para adquirir terras, você pode tentar se tornar um [governor|El]. Falaremos mais sobre isso depois."
 lesson_china_titles: "$game_concept_titles$"
 lesson_china_titles_desc: "Você possui um [title|El]. Os $game_concept_titles$ representam a posse das terras.\n\nVocê tem apenas o $game_concept_title$ de [GetPlayer.GetPrimaryTitle.GetName], que lhe concede a posse da [estate|El] privada de sua família. Retornaremos a esta $game_concept_estate$ em breve.\n\n#TUT Quando você governar uma [province|El] como [governor|El], ela também aparecerá como um $game_concept_title$ nesta área.#!"
 lesson_china_relationships: "$lesson_basics_quick_relationships$"
 lesson_china_relationships_desc: "Nesta seção, você verá uma série de [characters|lE] diferentes com os quais tem uma conexão. Isso inclui sua [family|lE], qualquer pessoa com quem você tenha um(a) [relationship|lE], seus [courtiers|lE] e seus [subjects|lE]."
 lesson_china_liege_introduction: "$game_concept_liege$"
 lesson_china_liege_introduction_desc: "Seu [liege|El] é o [son_of_heaven|E], o imperador da China. Uma das formas de interagir com ele é clicando com o botão direito sobre o personagem.\n\nIsso abrirá o menu de interação, que permite, por exemplo, #high Encontrar Ancião#! ou #high Solicitar Mentoria#!."
 lesson_china_find_elder_tt: "Clique com o botão direito em seu $game_concept_liege$"
 lesson_china_liege_introduction_good_job: "Outros personagens"
 lesson_china_liege_introduction_good_job_desc: "Muito bem! Você pode interagir com a maioria dos [characters|El] clicando com o botão direito sobre eles.\n\nTalvez você queira [GetScheme('seduce').GetTypeName] seu [spouse|El] ou #high Educar#! seus irmãos mais novos."
 lesson_china_resources_1: "$lesson_basics_quick_resources_1$"
 lesson_china_resources_1_desc: "Agora vamos olhar para a barra no canto superior direito da tela.\n\nAli você encontrará uma série de recursos que podem ser usados para interagir com o mundo de várias maneiras."
 lesson_china_resources_gold: "$lesson_basics_quick_resources_gold$"
 lesson_china_resources_gold_desc: "$lesson_basics_quick_resources_gold_desc$"
 lesson_china_resources_prestige: "$lesson_basics_quick_resources_prestige$"
 lesson_china_resources_prestige_desc: "$lesson_basics_quick_resources_prestige_desc$"
 lesson_china_resources_piety: "$lesson_basics_quick_resources_piety$"
 lesson_china_resources_piety_desc: "A [piety|lE] [piety_i|E] é um recurso que reflete o quão virtuoso é seu personagem.\n\nSeu [piety_level|lE] também aumenta com a $game_concept_piety$ que você acumular. Focar em [learning|lE] [learning_i|E] pode ser uma boa ideia para um personagem especialmente devoto."
 lesson_china_resources_influence: "@influence_icon! $game_concept_influence$"
 lesson_china_resources_influence_desc: "[influence_i] [influence|El] é sua habilidade de fazer com que os outros escutem o que você tem a dizer. Ao ganhar $game_concept_influence$, sua [influence_level|El] também aumenta.\n\nComo recurso, a $game_concept_influence$ é usada principalmente para promover seu candidato desejado para que se torne [governor|El] de uma [province|El]."
 lesson_china_resources_renown: "$lesson_basics_quick_resources_renown$"
 lesson_china_resources_renown_desc: "$lesson_basics_quick_resources_renown_desc$"
 lesson_china_estate_heading: "Sua propriedade familiar"
 lesson_china_open_estate: "$lesson_china_estate_heading$"
 lesson_china_open_estate_desc: "Como [house_head_head|El] de sua [house|El], você possui uma [estate|El].\n\nEsta é sua sede privada de poder, e quaisquer investimentos que você fizer nela permanecerão com você durante todo o jogo.\n\nEla fica em [GetPlayer.GetCapitalLocation.GetBaronyNameExplicitlyNoTooltip], e permanecerá aqui mesmo se você se tornar [governor|El] em outro lugar."
 lesson_china_open_estate_prompt: "Abra sua propriedade (destacada)"
 lesson_china_estate_intro: "$lesson_china_estate_heading$"
 lesson_china_estate_intro_desc: "Os benefícios que você recebe de sua [estate|El] vêm dos [estate_buildings|El]. Vamos construir um agora!"
 lesson_china_estate_intro_prompt: "Selecione o espaço de construção vazio (destacado)"
 lesson_china_estate_build_list: "$lesson_china_estate_heading$"
 lesson_china_estate_build_list_desc: "Um [estate_building|El] que aumente sua renda de [gold|El], como o $rice_field_01_domicile_building|V$, seria um bom começo.\n\nNo entanto, fique à vontade para escolher qualquer construção que quiser."
 lesson_china_estate_build_list_prompt: "Construa qualquer $game_concept_estate_building$"
 lesson_china_estate_manor: "$lesson_china_estate_heading$"
 lesson_china_estate_manor_desc: "A construção está em andamento, muito bem!\n\nVocê deve ter notado que há um limite no número de espaços em que pode construir [estate_buildings|El]. Para abrir espaço para construir mais edifícios, você eventualmente terá que melhorar seu edifício de #V Mansão#! central."
 lesson_china_estate_manor_prompt: "Selecione sua mansão (destacada)"
 lesson_china_estate_manor_selected: "$lesson_china_estate_heading$"
 lesson_china_estate_manor_selected_desc: "Todos os [estate_buildings|El] podem ser melhorados, e a Mansão não é exceção.\n\nO mais importante é que, ao melhorar a Mansão, você obterá mais espaços para $game_concept_estate_buildings$.\n\nMelhorar a Mansão é bastante caro, então não vamos fazer isso agora."
 lesson_china_estate_close: "$lesson_china_estate_heading$"
 lesson_china_estate_close_desc: "Vamos deixar sua propriedade por enquanto.\n\nVocê deve primeiro fechar sua Mansão e, depois, fechar a janela da propriedade."
 lesson_china_estate_close_prompt: "Feche a janela da propriedade"
 lesson_china_estate_summary: "$lesson_china_estate_heading$"
 lesson_china_estate_summary_desc: "Como mencionado anteriormente, sua [estate|El] é sua propriedade privada.\n\nEla permanecerá com você quando você eventualmente começar a jogar como [player_heir|El].\n\nEmbora você eventualmente se torne [governor|El] de uma rica [province|El], quaisquer investimentos feitos lá pertencerão ao Estado.\n\nPortanto, gastar o [gold|El] que você ganha para melhorar sua [estate|El] é uma boa ideia!"
 lesson_china_admin_intro: "Carreira governamental"
 lesson_china_admin_intro_desc: "Embora pareça uma ideia tentadora, você não deveria passar a vida inteira em sua [estate|El].\n\nComo funcionário, espera-se que você demonstre sua [merit|El], suba na hierarquia e se torne [governor|El], possivelmente até [minister|El]."
 lesson_china_admin_merit: "$lesson_china_admin_intro$"
 lesson_china_admin_merit_desc: "Este é o seu [merit_level|El] atual.\n\nO $game_concept_merit_level$ mede o seu valor e posição na burocracia imperial. O posto mais baixo é o #V 9.º#! e o mais meritório é o #V 1.º.#!\n\nAté o momento, você não provou nada, então não tem $game_concept_merit_level$ e não pode se tornar [governor|El]."
 lesson_china_admin_open: "$lesson_china_admin_intro$"
 lesson_china_admin_open_desc: "Vamos aumentar nosso [merit_level|El]!"
 lesson_china_admin_open_prompt: "Abra o painel \"$ADMINISTRATIVE_GOVERNMENT_HEADER$\" (destacado)"
 lesson_china_exam: "$lesson_china_admin_intro$"
 lesson_china_exam_desc: "O império é uma meritocracia e os [imperial_examinations|El] asseguram que apenas os mais habilidosos e virtuosos administrem as [provinces|El] como [governors|El].\n\nVocê pode aumentar seu [merit_level|El] ao participar de $activity_local_examination|V$ e das [activities|El] de $activity_imperial_examination|V$.\n\nOs $game_concept_examinations$ são organizados tanto pelos [governors|El] quanto pelo próprio [son_of_heaven|E].\n\nVocê receberá um convite quando forem realizados."
 lesson_china_STUDY_SCHEME_SEGMENT: "Estudar"
 TUTORIAL_OPEN_DECISION_PANEL_PROMPT: "Abra o painel \"$DECISIONS_VIEW_TITLE$\""
 lesson_china_decisions_open: "$lesson_china_STUDY_SCHEME_SEGMENT$"
 lesson_china_decisions_open_desc: "Se você decidir participar de um [imperial_examination|El], é bom se preparar bem.\n\nVocê pode se preparar para os $game_concept_examinations$ estudando os Clássicos Confucionistas."
 lesson_china_decisions_open_prompt: "$TUTORIAL_OPEN_DECISION_PANEL_PROMPT$"
 lesson_china_decisions: "$lesson_china_STUDY_SCHEME_SEGMENT$"
 lesson_china_decisions_desc: "Estas são as Decisões, diversas ações pessoais que você pode realizar.\n\nPor enquanto, vamos escolher $tgp_china_study_confucian_classics_decision|V$."
 lesson_china_decisions_prompt: "Comece a decisão \"$tgp_china_study_confucian_classics_decision$\""
 lesson_china_stress: "$lesson_china_STUDY_SCHEME_SEGMENT$"
 lesson_china_stress_desc: "Ótimo, você começou seus estudos!\n\nEstudar aumentará seu [stress_i][stress|lE]. Além disso, o $game_concept_stress$ normalmente é ganho ou perdido dependendo de como você agir, conforme suas [personality_traits|lE].\n\nSe você ganhar [GetDefine('NCharacter', 'STRESS_PER_LEVEL')|0V] de $game_concept_stress$, seu [stress_level|El] aumentará e sua saúde mental será prejudicada.\n\n#I Fique de olho no indicador destacado de $game_concept_stress$ para evitar colapsos mentais#!"
 lesson_china_schemes_open: "$lesson_china_STUDY_SCHEME_SEGMENT$"
 lesson_china_schemes_open_desc: "Estudar é uma [scheme|El]: um projeto pessoal de longo prazo. Vamos dar uma olhada rápida no estado do seu $game_concept_scheme$."
 lesson_china_schemes_open_prompt: "Abra a tela \"Intriga\""
 lesson_china_schemes_list: "$lesson_china_STUDY_SCHEME_SEGMENT$"
 lesson_china_schemes_list_desc: "Esta é sua [scheme|El] de $study_confucian_classics$.\n\nÉ uma $game_concept_scheme$ recorrente. Quando for concluída, será resolvida com base na [scheme_success_chance|El] e então recomeçará.\n\nComo esta $game_concept_scheme$ aumenta sua [stress|El], eventualmente você terá de abandoná-la.\n\n#I Para abandonar uma $game_concept_scheme$, use o botão no canto superior direito da $game_concept_scheme$."
 lesson_china_unpause: "$lesson_basics_quick_resources_time$"
 lesson_china_unpause_desc: "No momento, o jogo está pausado. Você pode controlar a velocidade com que o tempo passa no mundo pelo botão no canto inferior direito.\n\n#TUT Crusader Kings III é um jogo que se desenrola ao longo de centenas de anos, então fique à vontade para jogar no seu ritmo.#!\n\nQuando o jogo estiver pausado, ninguém organizará um [imperial_examination|El] para você comparecer, nem seu [scheme|El] de $study_confucian_classics$ progredirá, então vamos despausar o jogo e esperar um convite!"
 lesson_china_unpause_tt: "$lesson_basics_quick_unpause_tt$"
 lesson_china_done: "$lesson_basics_quick_done$"
 lesson_china_done_desc: "Agora a partida não está mais pausada e o tempo está passando. A partir deste momento, você está livre para moldar o futuro da família [GetPlayer.GetHouse.GetName].\n\n#TUT Fique de olho nos conselhos reativos @reactive_advice_icon! que aparecerem na parte superior da tela com mais orientações.#!\n\nPor enquanto, seu objetivo mais importante é aguardar o próximo [imperial_examination|El] e participar dele."
 # special reactive advice for china
 action_reactive_advice_china_council: "Conselho: $ra_china_council_1$"
 action_reactive_advice_china_council_desc: "Como $game_concept_governor$, você pode confiar em seu $game_concept_council$ para ajudá-lo a administrar a $game_concept_province$. Abra isto para ver uma introdução sobre como o Conselho funciona."
 action_reactive_advice_china_council_click: "$click_to_open_lesson$"
 ra_china_council_1: "Conselho do governador"
 ra_china_council_1_desc: "Como [governor|El], você não precisa administrar sua [province|lE] sozinho. Vamos dar uma olhada em seu [council|lE], que se expandiu desde antes de você se tornar um $game_concept_governor$."
 ra_china_council_1_prompt: "$lesson_basics_council_view_tt$"
 ra_china_council_2: "$ra_china_council_1$"
 ra_china_council_2_desc: "Este é o seu [council|lE], que consiste em seis [councillors|lE], incluindo seu [spouse|lE].\n\nEles podem, por exemplo, $task_collect_taxes|V$ ou $task_find_secrets|V$ por meio das [councillor_tasks|El].\n\nAgora que você é [governor|El], também podem $task_develop_county|V$ ou realizar uma $task_conversion|V$, entre outras coisas."
