 ##############
 #Tribal Era #
 ##############
 #Military
 innovation_motte: "Motas"
 innovation_motte_desc: "Simples, mas eficaz, construir nossos castelos em montes elevados de terra é a melhor maneira de garantir que tenhamos literalmente uma posição elevada e defensiva sobre nossos inimigos."
 innovation_motte_chinese: "Hāng Tu" #夯土
 innovation_motte_chinese_desc: "Construir nossas fortificações com terra compactada é a melhor maneira de garantir que tenhamos, literalmente, a vantagem sobre nossos inimigos. Simples, mas eficaz."
 innovation_motte_actual_motte: "Mottes"
 innovation_motte_actual_motte_desc: "$innovation_motte_desc$"
 innovation_catapult: "Onagro"
 innovation_catapult_desc: "Embora lentas para carregar e atirar, catapultas movidas a torção como essas nos permitem atacar as fortificações inimigas enquanto permanecemos fora do alcance de seus arqueiros."
 innovation_catapult_chinese: "Besta de cerco"
 innovation_catapult_chinese_desc: "Grandes bestas portáteis com múltiplos arcos opostos para aumentar o comprimento de tensão e a potência, muitas vezes montadas em uma estrutura com rodas para mobilidade."
 innovation_barracks: "Barracas"
 innovation_barracks_desc: "Ao construir edifícios dedicados a alojar nossos soldados, podemos garantir que teremos espaço suficiente para acomodar nossos exércitos cada vez maiores."
 innovation_mustering_grounds: "Locais de Reunião"
 innovation_mustering_grounds_desc: "Simplesmente ter pessoas dispostas a lutar por nós não é suficiente para vencer guerras. Reservar espaço para as pessoas treinarem e se reunirem para a batalha nos permitirá apoiar grupos de guerreiros mais experientes que podem nos levar à vitória."
 innovation_bannus: "Bannus"
 innovation_bannus_desc: "Com base na autoridade de comandar homens em batalha, o ban dá aos nossos governantes a capacidade de obrigar homens livres a lutar por eles, formando uma base legal para a reunião de grandes exércitos."
 eligible_accolade_vanguard_attribute_ACCOLADES_DLC: "[knights|lE] desta [culture|lE] se tornam elegíveis para [accolades|lE] de [GetAccoladeType('vanguard_attribute').GetName|l]"
 eligible_accolade_vanguard_attribute: "[AddLocalizationIf( HasDlcFeature( 'accolades' ), 'eligible_accolade_vanguard_attribute_ACCOLADES_DLC')]"
 unlock_maa_armored_footmen: "Pode recrutar [GetMaA('armored_footmen').GetName|l] como [men_at_arms|lE]"
 unlock_maa_onager: "Pode recrutar [GetMaA('onager').GetName|l] como [men_at_arms|lE]"
 innovation_quilted_armor: "Armadura Acolchoada"
 innovation_quilted_armor_desc: "Formadas por uma dúzia ou mais de camadas de linho costuradas juntas, essas jaquetas podem impedir até mesmo flechas pesadas e são uma maneira acessível de blindarmos um regimento inteiro para a batalha."
 #Civic
 innovation_gavelkind: "Sucessão Equitativa"
 innovation_gavelkind_desc: "Estabilidade e prosperidade andam de mãos dadas. Em vez de ter vassalos disputando o poder quando o velho monarca falece, podemos definir um sistema de herança predeterminado e equitativo que eliminará grande parte da instabilidade que tradicionalmente ocorre na sucessão."
 innovation_crop_rotation: "Rotação de Cultivos"
 innovation_crop_rotation_desc: "Com a transição do modelo tradicional de agricultura de dois campos para a rotação de culturas de três campos, podemos cultivar mais safras a cada ano sem esgotar o solo de nossas fazendas."
 innovation_city_planning: "Planejamento Urbano"
 innovation_city_planning_desc: "Ao projetar nossas cidades antes de come?ar a constru?-las, podemos criar novas propriedades em locais estrat?gicos que s?o mais funcionais e esteticamente agrad?veis do que as antigas, que surgiram ao acaso com o tempo."
 innovation_casus_belli: "Casus Belli"
 innovation_casus_belli_desc: "A lei do país pode ter sido por gerações 'A Força da Razão', mas se tivermos uma justificativa para nossas guerras, podemos evitar provocar a ira de nossos vizinhos e a retaliação que muitas vezes acarreta."
 innovation_plenary_assemblies: "Assembleias Plenárias"
 innovation_plenary_assemblies_desc: "Para governar com eficácia, devemos reunir todos os homens livres do reino para discutir e resolver questões legislativas. A participação é obrigatória, quem não comparecer será multado e perderá o direito de influenciar qualquer decisão tomada."
 innovation_development_01: "Obras Públicas"
 innovation_development_01_desc: "O financiamento da construção de obras públicas como estradas, escolas e aquedutos permitirá que nossos assentamentos cresçam para tamanhos maiores, garantindo a prosperidade de nosso povo para as gerações futuras."
 innovation_currency_01: "Moeda"
 innovation_currency_01_desc: "O escambo é lento e ineficiente, adotar uma moeda oficialmente reconhecida, como conchas de cauri ou pepitas de metal, irá impulsionar o comércio e aumentar a difusão de ideias em nossa nação."
 innovation_ledger: "Livros de Contas"
 innovation_ledger_desc: "Conforme nossas terras crescem, precisamos de uma maneira melhor de controlar o que possuímos. Manter um livro de contas dos nossos bens garantirá que sempre saibamos quais recursos temos à nossa disposição."
 #Regional
 innovation_viking_tradition: "Táticas Viking"
 innovation_viking_tradition_desc: "O povo do norte tem uma longa tradição de comércio, mas também de pirataria. Poucos estão preparados para lutar contra uma ameaça que aparece sem aviso das margens de um rio, e os guerreiros vikings são mestres desse tipo de guerra."
 innovation_longboats: "Drakkars"
 innovation_longboats_desc: "Drakkars são embarcações marítimas formidáveis que podem viajar para quase qualquer lugar e até mesmo enfrentar o mau tempo, dando-nos uma mobilidade excepcional no mar."
 innovation_war_camels: "Camelos de Batalha"
 innovation_war_camels_desc: "Os camelos são naturalmente adequados para viver em terrenos desérticos, mas não são criaturas inerentemente de batalha. Nossos criadores e treinadores podem mudar isso, dando-nos acesso à cavalaria adaptável que nos permitirá dominar as areias."
 eligible_accolade_camelry_attribute_ACCOLADES_DLC: "Os [knights|lE] desta [culture|lE] se tornam aptos para os [accolades|lE] de [GetAccoladeType('camelry_attribute').GetName|l]"
 eligible_accolade_camelry_attribute: "[AddLocalizationIf( HasDlcFeature( 'accolades' ), 'eligible_accolade_camelry_attribute_ACCOLADES_DLC')]"
 innovation_elephantry: "Elefantes de Batalha"
 innovation_elephantry_desc: "Os elefantes s?o dif?ceis de criar em cativeiro, ent?o cada mahout deve capturar seus pr?prios elefantes selvagens e trein?-los. Isso significa que h? uma arte delicada em usar adequadamente essas grandes criaturas em batalha, mas ? uma arte que nos dedicamos a dominar."
 eligible_accolade_elephantry_attribute_ACCOLADES_DLC: "Os [knights|lE] desta [culture|lE] se tornam aptos para os [accolades|lE] de [GetAccoladeType('elephantry_attribute').GetName|l]"
 eligible_accolade_elephantry_attribute: "[AddLocalizationIf( HasDlcFeature( 'accolades' ), 'eligible_accolade_elephantry_attribute_ACCOLADES_DLC')]"
 innovation_wootz_steel: "Aço Wootz"
 innovation_wootz_steel_desc: "Também conhecido como aço Hinduwani ou Sérico, esse metal rico em carbono é excelente para fazer armas. O aço Wootz é amplamente comercializado e considerado o melhor aço do mundo. Ao longo da maior parte da história, chamou a atenção de comerciantes árabes, egípcios, chineses e até romanos."
 innovation_african_canoes: "Canoas da África Ocidental"
 innovation_african_canoes_desc: "As grandes canoas da África Ocidental são excelentes para navegar pelos rios e nos permitem transportar tropas rapidamente para onde precisamos."
 innovation_table_of_princes: "Távola dos Príncipes"
 innovation_table_of_princes_desc: "A Távola dos Príncipes é o assento real dos governantes da Boêmia, e aquele que está sentado à mesa é reconhecido como o governante legítimo. De acordo com o código de antiguidade na casa, os títulos eram dados ao membro vivo mais velho da dinastia governante."
 unlock_single_heir_dynasty_house_changing: "Pode promulgar $single_heir_dynasty_house$ com qualquer [crown_authority|lE]"
 tradition_visigothic_codes_name: "$innovation_visigothic_codes$"
 tradition_visigothic_codes_desc: "$innovation_visigothic_codes_desc$"
 innovation_visigothic_codes: "Códigos Visigóticos"
 innovation_visigothic_codes_desc: "Embora muitas das tradições mais antigas dos visigodos tenham sido varridas do mundo por muito tempo, os filhos dos Pireneus se lembram dos costumes antigos e de como a terra era dividida entre filhos e filhas de maneira prática, mas justa."
 unlock_equal_succession_changing: "Pode promulgar a $equal_law$ [law|lE] com qualquer [crown_authority|lE]"
 ######################
 #Early Medieval Era #
 ######################
 #Military
 innovation_battlements: "Muralhas com Ameias"
 innovation_battlements_desc: "Além de fortificar apenas a torre de menagem, construir uma muralha externa resistente que possa ser seguramente controlada por nossos arqueiros dará aos nossos castelos uma camada extra de proteção contra invasores."
 innovation_mangonel: "Manganelas"
 innovation_mangonel_desc: "Uma melhoria significativa em nossos projetos de catapulta existentes, as manganelas movidas a tração são muito mais rápidas de carregar e disparar do que as máquinas movidas a torção."
 innovation_mangonel_chinese: "Escadas de nuvens"
 innovation_mangonel_chinese_desc: "Escadas de cerco dobráveis com dobradiça, frequentemente equipadas com escudos, guinchos, ganchos de agarrar e dispositivos de içamento baseados em polias. Também serviam como um ponto de observação elevado durante os cercos."
 eligible_accolade_besieger_attribute_ACCOLADES_DLC: "Os [knights|lE] desta [culture|lE] tornam-se aptos para os [accolades|lE] de [GetAccoladeType('besieger_attribute').GetName|l]"
 eligible_accolade_besieger_attribute: "[AddLocalizationIf( HasDlcFeature( 'accolades' ), 'eligible_accolade_besieger_attribute_ACCOLADES_DLC')]"
 innovation_burhs: "Burhs"
 innovation_burhs_desc: "Espalhados pelo campo, os burhs são importantes povoações fortificadas que podemos usar para reunir tropas e servir como centros administrativos."
 innovation_burhs_japan: "Suki" #柵
 innovation_burhs_japan_desc: "Desde a construção do #italic Mizuki#! durante o reinado do imperador Tenji, a importância das fortificações passou a ser mais valorizada. Podemos usar centros fortificados como estes tanto para reunir tropas quanto para servir como centros administrativos."
 innovation_burhs_chinese: "Wū bì" #塢壁
 innovation_burhs_chinese_desc: "Os wū bì são assentamentos fortificados importantes espalhados pelo campo, que podem ser usados tanto para reunir tropas quanto para servir como centros administrativos."
 innovation_burhs_anglo_saxon: "Burhs"
 innovation_burhs_anglo_saxon_desc: "Os burhs são assentamentos fortificados importantes espalhados pela zona rural, que podemos usar tanto para reunir tropas quanto para servir como centros administrativos."
 innovation_burhs_latin: "Castros"
 innovation_burhs_latin_desc: "Antigos princípios de fortificação ainda são úteis hoje em dia, e podemos usar esse tipo de centros fortificados tanto para reunir tropas quanto para servir como centros administrativos."
 innovation_house_soldiers: "Soldados da Casa"
 innovation_house_soldiers_desc: "À medida que nossas famílias nobres crescem em poder, elas precisam de soldados para fazer cumprir sua vontade. O estabelecimento de uma ordem de soldados dedicados a suas casas garantirá que tenhamos tropas mais bem treinadas e equipadas do que em um recrutamento padrão."
 innovation_horseshoes: "Ferraduras"
 innovation_horseshoes_desc: "Um cavalo com casco partido rapidamente ficará coxo e será incapaz de trabalhar ou ser conduzido para a batalha. Ao ferrar nossos cavalos com placas de bronze ou ferro, podemos manter seus cascos saudáveis ​​e protegidos de danos."
 innovation_arched_saddle: "Selas Arqueadas"
 innovation_arched_saddle_desc: "A cavalaria leve é ​​uma força a ser considerada, mas não explora verdadeiramente o potencial do cavalo de guerra. As selas de montar arqueadas nos permitem colocar guerreiros com armaduras pesadas e lanças inclinadas, o que lhes permite tirar o máximo proveito de seu ímpeto enquanto investem contra as linhas inimigas."
 eligible_accolade_lancer_attribute_ACCOLADES_DLC: "Os [knights|E] desta [culture|lE] tornam-se aptos para [accolades|lE] de [GetAccoladeType('lancer_attribute').GetName|l]"
 eligible_accolade_lancer_attribute: "[AddLocalizationIf( HasDlcFeature( 'accolades' ), 'eligible_accolade_lancer_attribute_ACCOLADES_DLC')]"
 unlock_maa_armored_horsemen: "Pode recrutar [GetMaA('armored_horsemen').GetName|l] como [men_at_arms|lE]"
 #Civic
 innovation_hereditary_rule: "Governo Hereditário"
 innovation_hereditary_rule_desc: "A divisão uniforme do reino entre todos os herdeiros elegíveis fratura a unidade de nosso povo. Em vez de dilacerar nosso reino em cada sucessão, podemos garantir que temos um coração estável e próspero estabelecendo um sistema de governo hereditário."
 innovation_manorialism: "Senhorialismo"
 innovation_manorialism_desc: "Com a propriedade da terra consolidada sob nossa elite, muitos homens e mulheres se vêem incapazes de trabalhar. Vamos estabelecer um sistema feudal onde homens livres possam trabalhar em nossos campos em troca de aluguel, enquanto aqueles que não podem pagar podem entrar em nosso serviço como servos obrigados."
 innovation_royal_prerogative: "Prerrogativa Real"
 innovation_royal_prerogative_desc: "Como nossa realeza tem um fardo maior colocado sobre eles por sua responsabilidade de governar o reino, eles também devem receber privilégios reservados exclusivamente para eles."
 innovation_chronicle_writing: "Crônica Escrita"
 innovation_chronicle_writing_desc: "As histórias das façanhas de nossa família não mais serão transmitidas apenas por meio da tradição oral. Manteremos um registro de tudo o que realizamos, tanto para inspirar as gerações futuras quanto para provar nossas reivindicações sobre as terras que deveríamos possuir por direito."
 innovation_armilary_sphere: "Esfera Armilar"
 innovation_armilary_sphere_desc: "Compostos por uma estrutura esf?rica de an?is m?veis, esses dispositivos nos permitem mapear e prever o movimento dos c?us. Embora sejam dispositivos astrol?gicos fascinantes por si s?, esse conhecimento tamb?m ajudar? nossos capit?es a navegar em ?guas distantes da costa."
 innovation_baliffs: "Oficiais de Justiça"
 innovation_baliffs_desc: "Um rei não pode estar em todos os lugares ao mesmo tempo. Ao nomear oficiais de justiça para fazer cumprir a lei do rei em todo o reino, podemos governar uma área maior com mais eficácia do que poderíamos de outra forma."
 innovation_baliffs_bailiffs: "Oficiais de justiça"
 innovation_baliffs_bailiffs_desc: "$innovation_baliffs_desc$"
 innovation_baliffs_latin: "Potestade"
 innovation_baliffs_latin_desc: "Os antigos romanos definiam os poderes dos funcionários para criar, fazer cumprir e julgar a lei como #italic potestad#! um conceito usado para conceder poder aos magistrados para fazer cumprir a lei em todo o reino. Ao concedermos #italic potestad#! aos funcionários locais, podemos governar uma área maior de maneira mais eficaz do que poderíamos de outra forma."
 innovation_development_02: "Governo Comunal"
 innovation_development_02_desc: "Grandes cidades enfrentam regularmente uma série de problemas cada vez mais complexos. Delegar alguma autoridade aos conselhos locais permitirá que eles resolvam essas questões sem a necessidade de envolver o rei."
 innovation_currency_02: "Cunhagem"
 innovation_currency_02_desc: "As moedas não regulamentadas são difíceis de controlar e carecem de estabilidade. Moedas cunhadas, medidas em pesos específicos e marcadas com um selo real, dão nova confiança às transações comerciais."
 #Regional
 innovation_reconquista: "Expansionismo Espiritual"
 innovation_reconquista_desc: "Distra?dos por brigas internas, toleramos por muito tempo a presen?a de infi?is na Hisp?nia. Chegou a hora de reunirmos nossas for?as para expuls?-los desta terra de uma vez por todas!"
 innovation_stem_duchies: "Ducado tribal"
 innovation_stem_duchies_desc: "Apesar de vir de diferentes tribos, reconhecemos a importância da unidade e da cooperação. A independência é supervalorizada quando a estabilidade é o que leva à segurança e à prosperidade."
 innovation_ghilman: "Ghilman"
 innovation_ghilman_desc: "Os Ghilman, soldados escravos feitos prisioneiros de guerra, são guerreiros dedicados que são mais leais a nós e mais baratos de pagar do que mercenários comuns."
 #####################
 #High Medieval Era #
 #####################
 #Military
 innovation_hoardings: "Cadafalso"
 innovation_hoardings_desc: "Colocadas no topo de nossas ameias, essas construções de madeira se estendem acima da base das muralhas do nosso castelo.\n\nEles permitem que nossos defensores atirem flechas, joguem pedras ou despejem óleo fervente nos atacantes, enquanto permanecem totalmente protegidos dos arqueiros inimigos."
 innovation_trebuchet: "Trabuco"
 innovation_trebuchet_desc: "Uma maravilha da engenharia, o trabuco de contrapeso pode lançar projéteis pesados ​​a distâncias maiores do que qualquer máquina de cerco que o precedeu."
 innovation_trebuchet_chinese: "Torres móveis"
 innovation_trebuchet_chinese_desc: "Para conquistar as torres de pedra inimigas, essas altas torres de madeira com rodas eram empurradas contra elas, permitindo que os soldados alcançassem as muralhas inimigas com um mínimo de segurança."
 innovation_castle_baileys: "Pátio de Armas"
 innovation_castle_baileys_desc: "Embora a torre de menagem sirva como o coração de um castelo, está longe de ser a única construção importante. Construir edifícios como estábulos e arsenais em um pátio protegido garantirá que possamos guarnecer e equipar adequadamente nossas tropas, independentemente das circunstâncias."
 innovation_men-at-arms: "Homens de Armas"
 innovation_men-at-arms_desc: "Os habilidosos no cavalo e na lança sempre serão solicitados, mas nem sempre estão disponíveis. Manter grupos de homens de armas a nosso serviço, garantirá que não faltem guerreiros experientes quando a guerra estourar."
 innovation_knighthood: "Corpo de Cavaleiros"
 innovation_knighthood_desc: "Ao conceder t?tulos de cavaleiro a nossos melhores guerreiros e pag?-los com propriedades de terra em vez de meras moedas, podemos dar-lhes a honra que merecem, bem como garantir sua lealdade para conosco."
 innovation_advanced_bowmaking: "Arcos Avançados"
 innovation_advanced_bowmaking_desc: "Embora os arqueiros tenham tradicionalmente feito e mantido seus próprios arcos, os artesãos começaram a fazer novos tipos de arcos, que são mais fortes e complexos do que antes. Ao adotar esses novos desenhos, podemos transformar esses arcos mestres em um recurso militar inestimável."
 unlock_maa_crossbowmen: "Pode recrutar [GetMaA('crossbowmen').GetName|l] como [men_at_arms|lE]"
 eligible_accolade_crossbower_attribute_ACCOLADES_DLC: "Os [knights|lE] desta [culture|lE] tornam-se aptos para os [accolades|lE] de [GetAccoladeType('crossbowmen_attribute').GetName|l]"
 eligible_accolade_crossbower_attribute: "[AddLocalizationIf( HasDlcFeature( 'accolades' ), 'eligible_accolade_crossbower_attribute_ACCOLADES_DLC')]"
 #Civic
 innovation_heraldry: "Heráldica"
 innovation_heraldry_desc: "Criar brasões que identifiquem nossas nobres famílias fará com que seus membros se vejam como parte de um todo maior, encorajando-os a melhorar a reputação de sua família, em vez de apenas ficarem obcecados com sua posição pessoal."
 innovation_windmills: "Moinhos de Vento"
 innovation_windmills_desc: "A invenção do moinho de vento nos permite aproveitar a força do vento com muito mais eficiência do que antes, reduzindo enormemente o trabalho necessário para moer grãos e processar matérias-primas."
 innovation_divine_right: "Direito Divino"
 innovation_divine_right_desc: "É hora de reconhecermos que foi a vontade divina que colocou nossos governantes em seus tronos, e opor-se a eles é opor-se à própria divindade."
 innovation_land_grants: "Concessões de Terras"
 innovation_land_grants_desc: "A terra é a recompensa mais valiosa que podemos conceder aos nossos súditos, mas não possuímos muito diretamente. No entanto, se lhes dermos permissão para começar a cultivar aquela terra não cultivada ali... quem se oporia? Mesmo que acabasse em conflito, é evidente que o direito nos acompanharia em defesa de nossos súditos!"
 innovation_scutage: "Tributo"
 innovation_scutage_desc: "Sempre foi esperado que nossos súditos prestem serviço militar, mas há alguns que não podem ou não querem. Se oferecermos a eles uma maneira de cumprir suas obrigações com ouro em vez de aço, teremos a certeza de que todos paguem o que nos devem."
 innovation_guilds: "Guildas"
 innovation_guilds_desc: "À medida que nossas terras se expandem, torna-se cada vez mais ineficiente gerenciar diretamente todo o comércio que ocorre em nosso domínio. Ao conceder alvará de guilda a organizações de mercadores e artesãos, podemos dar-lhes mais autonomia sobre seus negócios e, ao mesmo tempo, garantir que lucremos com seus empreendimentos."
 innovation_development_03: "Urbanização"
 innovation_development_03_desc: "As grandes cidades de Roma, Bizâncio e Delhi há muito se destacam como relíquias de um legado grande e inigualável. À medida que nossa infraestrutura e população crescem, finalmente temos os meios para desenvolver novos assentamentos que rivalizam com esses antigos centros urbanos."
 innovation_currency_03: "Banco"
 innovation_currency_03_desc: "Negociações particularmente grandes ou caras freqüentemente requerem uma enorme quantidade de moedas pesadas. Depositar essa riqueza em tesouros seguros e transferir a propriedade sem mover as moedas físicas permitirá que grandes quantidades de bens sejam negociadas com mais facilidade."
 #Regional
 innovation_east_settling: "Ostsiedlung"
 innovation_east_settling_desc: "As terras a nosso leste são pouco povoadas, mas ricas em recursos naturais. Estabelecer uma iniciativa para expandir e estabelecer propriedades rurais levará ao crescimento e prosperidade de nosso povo."
 innovation_seigneurialism: "Seigneurialismo"
 innovation_seigneurialism_desc: "Delegar mais responsabilidade aos nobres locais os deixará felizes, ao mesmo tempo que liberará mais de nossa atenção para focar em nosso próprio domínio."
 innovation_muladi: "Muladi"
 innovation_muladi_desc: "Guerras, ataques e perseguições em todo o mundo expulsaram muitas pessoas de suas casas. Ao receber essas almas deslocadas em nossas terras, independentemente de sua origem, podemos desenvolver uma sociedade rica e próspera."
 innovation_french_peerage: "Nobreza"
 innovation_french_peerage_desc: "Ao reconhecer legitimamente o mais ilustre dos nobres vassalos de nosso reino, promoveremos um sentimento de maior lealdade à coroa."
 #####################
 #Late Medieval Era #
 #####################
 #Military
 innovation_machicolations: "Mata-cães"
 innovation_machicolations_desc: "Uma melhoria notável em nossos Cadafalsos anteriores, os Mata-cães de pedra têm o mesmo propósito, sendo significativamente mais duráveis e oferecendo mais proteção para nossos defensores."
 innovation_gunpowder: "Pólvora"
 innovation_gunpowder_desc: "O desenvolvimento de p?s explosivos criou novos tipos de armas e de guerreiros para us?-las. Empregar essas armas potentes requer cadeias de produ??o e fornecimento impens?veis no passado, mas o custo desses trabalhos se paga por si s? com o poder liberado por essa nova tecnologia."
 innovation_royal_armory: "Arsenal Real"
 innovation_royal_armory_desc: "À medida que o tamanho de nossos exércitos aumenta, devemos garantir que cada soldado estará devidamente armado e blindado. O estabelecimento de um arsenal real para produzir e abrigar todo o equipamento de nossos exércitos contribuirá muito para atender a essa necessidade."
 innovation_standing_armies: "Exércitos Profissionais"
 innovation_standing_armies_desc: "As levas militares nos fornecem um grande n?mero de soldados, mas, por mais que tentemos trein?-los e equip?-los, eles sempre ser?o inferiores aos soldados profissionais. Estabelecer um grande ex?rcito permanente garantir? que os interesses de nosso reino sejam defendidos pelos melhores guerreiros dispon?veis."
 innovation_sappers: "Sapadores"
 innovation_sappers_desc: "Não importa quão fortes sejam os muros do nosso inimigo, se ele puder ser cavado por baixo. Empregar sapadores para escavar as fortificações inimigas com túneis é uma maneira eficaz de romper até mesmo as defesas mais difíceis."
 innovation_plate_armor: "Armadura de Placas"
 innovation_plate_armor_desc: "A forma definitiva de proteção pessoal, uma armadura de placas bem trabalhada, com juntas que garantem uma amplitude de movimento superior às armaduras anteriores, sendo quase impenetrável às armas inimigas."
 #Civic
 innovation_primogeniture: "Primogenitura"
 innovation_primogeniture_desc: "Um reino, um herdeiro. Embora os filhos mais novos de nosso monarca possam se sentir abandonados por terem uma herança negada, esta é a melhor maneira de garantir que mantenhamos um reino estável que não seja dilacerado por crises de sucessão."
 innovation_cranes: "Guindastes"
 innovation_cranes_desc: "Uma esquecida maravilha da engenharia, os romanos usaram guindastes sobre rodas com grande sucesso na construção de seu império, e nós também devemos usar."
 innovation_noblesse_oblige: "Obrigação Nobre"
 innovation_noblesse_oblige_desc: "A nobreza ? mais do que privil?gios e direitos; ela tamb?m traz um dever para com o reino, uma obriga??o de agir de maneira adequada e justa. Estabelecer claramente o que se espera de nossa elite nos dar? um ideal ao qual aspirar e nos unir? enquanto trabalhamos para alcan??-lo."
 innovation_rightful_ownership: "Propriedade Legítima"
 innovation_rightful_ownership_desc: "É nosso direito divino possuir nossas terras de jure, e é hora do mundo reconhecer esse fato. Não seremos mais retidos por protocolos e decoros obsoletos."
 innovation_ermine_cloaks: "Capas de Arminho"
 innovation_ermine_cloaks_desc: "Qualquer um pode reivindicar um título, mas para ser um verdadeiro monarca, deve inspirar admiração e majestade em seus súditos. Nossas novas capas de arminho são uma forma de vestido real que certamente fará exatamente isso."
 innovation_ermine_cloaks_ermine: "Capas de arminho"
 innovation_ermine_cloaks_ermine_desc: "Qualquer um pode reivindicar um título, mas, para ser um verdadeiro monarca, é preciso inspirar admiração e majestade nos súditos. Nossas novas capas de arminho são uma forma de vestimenta régia que certamente conseguirá isso."
 innovation_court_officials: "Oficiais de Justiça"
 innovation_court_officials_desc: "Nosso reino se expandiu a tal ponto que nem mesmo os nobres menores conseguem administrar tudo de forma eficaz. Nomear oficiais da corte e burocratas para cuidar das tarefas mais mundanas da corte garantirá que as engrenagens do governo continuem girando sem problemas."
 innovation_development_04: "Pensamento Renascentista"
 innovation_development_04_desc: "Desenvolvimentos na ciência, filosofia e lógica transformaram nossas cidades em centros maravilhosos de educação e inovação. Os enormes saltos tecnológicos e culturais que estamos dando agora colocaram um potencial até então nunca sonhado ao nosso alcance."
 innovation_currency_04: "Notas Promissórias"
 innovation_currency_04_desc: "Uma evolução dos sistemas bancários anteriores, as notas promissórias em papel permitem que nossos cidadãos negociem bens e serviços com rapidez e segurança em grandes distâncias sem serem sobrecarregados por espécies pesadas."
 #Regional
 innovation_wierdijks: "Wierdijks"
 innovation_wierdijks_desc: "Construir diques fortes e confiáveis é uma tarefa essencial se quisermos viver e prosperar nos países baixos. Novas técnicas de reforço de diques de terra com tapetes de algas marinhas aumentarão sua resistência e durabilidade."
 innovation_condottieri: "Condotieros"
 innovation_condottieri_desc: "Por ser rica e ter uma localização central, a Itália se tornou um importante centro para as companhias mercenárias viajarem quando não estão em campanha ativa. Como eles já estão aqui, devemos ser capazes de negociar taxas melhores para eles do que normalmente cobrariam."
 innovation_deccan_unity: "Unidade do Decão"
 innovation_deccan_unity_desc: "O influxo de novas crenças e religiões em nossa sociedade deixou claro que nosso foco anterior no regionalismo foi um erro. Devemos nos unir a outros de nossa fé e assegurar um estado forte e duradouro que possa resistir às pressões externas."
 students_of_knighthood: "Crianças que concluem sua [education|lE] com um [education_focus|lE] [martial|lE] ganham o [trait|lE] $trait_education_martial_prowess$"
 #Sponsor Research Related
 fp3_innovation_mural_sextant: "Sextante Mural"
 fp3_innovation_mural_sextant_desc: "Esses grandes instrumentos murais podem ser usados para ler e medir precisamente a posição de objetos celestiais."
 fp3_innovation_fritware: "Faiença"
 fp3_innovation_fritware_desc: "Belas cerâmicas em pedra na imagem da porcelana oriental, misturando materiais como quartzo ou vidro. Elas são valiosas mercadorias ou presentes impressionantes."
 fp3_innovation_fritware_tooltip: "Ganho de [opinion|lE] de [send_gift|lE]: #P +20%#!"
 #################
 #The Silk Road #
 #################
 culture_parameter_silk_road_innovation_parameter: "Pode ser obtido apenas como [cultural_fascination|lE] potencial por meio da [heritage|lE] [GetCulturePillar('heritage_chinese').GetName|l], a [tradition|lE] [GetCultureTradition('tradition_sinophilic').GetName|l] ou a [silk_road|E]"
 innovation_fire_medicine: "Medicina do fogo" #'Huoyao,' 火藥
 innovation_fire_medicine_desc: "Ao sondar os mist?rios da vida, ?s vezes podemos descobrir coisas que s? criam morte. A medicina de fogo, uma potente combina??o de enxofre, salitre e algum material combust?vel, cria uma chama mortal que arde ferozmente, quase de forma explosiva."
 innovation_champa_rice: "Arroz champa"
 innovation_champa_rice_desc: "O arroz precisa de muito tempo e água — exceto o arroz de Champa. Essa variedade cresce mais rápido, suporta melhor as secas e oferece uma colheita muito mais farta do que praticamente qualquer outro tipo de arroz conhecido. Em alguns casos, até pode ser colhido duas vezes em um ano. Quando bem administrado, esse arroz pode impulsionar as fazendas e alimentar um boom populacional."
 culture_parameter_champa_rice_wet_land_paddies: "As linhas de [buildings|El] [GetBuilding('paddy_fields_01').GetTypeName|V] e [GetBuilding('farm_estates_01').GetTypeName|V] podem ser construídas em [GetTerrain( 'wetlands' ).GetName|l]"
 culture_parameter_champa_rice_building_bonuses: "A linha de [buildings|lE] [GetBuilding('paddy_fields_01').GetTypeName|V] concede bonificações adicionais"
 building_paddy_fields_requirement_terrain_tt: "Uma das seguintes opções:\n$EFFECT_LIST_BULLET$ A [province|lE] é de [GetTerrain( 'terraced_hills' ).GetName|l]\n$EFFECT_LIST_BULLET$ A [province|lE] é de [GetTerrain( 'floodplains' ).GetName|l] e está na [region|El] [GetGeographicalRegion('paddy_fields_region').GetName|l]\n$EFFECT_LIST_BULLET$ A [province|lE] é de [GetTerrain( 'wetlands' ).GetName|l] e a [culture|El] tem a [innovation|El] #V $innovation_champa_rice$#!\n$EFFECT_LIST_BULLET$ A [province|lE] é de [GetTerrain( 'hills' ).GetName|l] ou [GetTerrain( 'jungle' ).GetName|l] e a [culture|El] tem a [tradition|El] [GetCultureTradition('tradition_tgp_rice_cultivators').GetName|V]"
 innovation_sericulture: "Sericultura"
 innovation_sericulture_desc: "A arte da produção de seda é um processo complexo, mas muito recompensador; seu conhecimento é zelosamente guardado por aqueles que lucram com o domínio desta indústria."
 culture_parameter_unlocks_silk_buildings_parameter: "Desbloqueia a linha de [domicile_buildings|lE] [GetDomicileBuilding('silk_01').GetNameNoTooltip|V]"
 innovation_dragon_kiln: "Fornos de dragão"
 innovation_dragon_kiln_desc: "A melhor porcelana só pode ser produzida em fornos de queima altamente especializados, localizados perto de valiosos depósitos de mineração. Esses fornos são construídos em encostas íngremes que ajudam a criar um vórtice de calor para queimar a cerâmica mais dura possível. Embora sejam desafiadores de construir, os produtos que produzem estão entre as cerâmicas mais elegantes (e mais lucrativas) conhecidas em qualquer corte."
 innovation_rocket_cart: "Carros-foguete"
 innovation_rocket_cart_chinese: "Huochē" #火車 (Huǒchē)
 innovation_rocket_cart_koreanic: "Hwacha" #火車 (화차)
 innovation_rocket_cart_desc: "Com fórmulas explosivas mais rudimentares que as necessárias para as caras bombardas, podem ser lançadas enormes salvas de flechas de fogo a partir de um único engenho. Como essas flechas de fogo ainda têm apenas o impacto de... uma flecha, elas são muito mais adequadas para ser disparadas #italic desde#! umas muralhas do que #italic contra#! elas."
 innovation_rocket_cart_chinese_desc: "$innovation_rocket_cart_desc$"
 innovation_rocket_cart_koreanic_desc: "$innovation_rocket_cart_desc$"
 innovation_compass: "Bússola"
 innovation_compass_desc: "Com um simples pedaço de pedra-imã, torna-se possível sempre saber em que direção uma pessoa está viajando. Com o tempo e desenvolvimento adicional, talvez eventualmente seja possível se orientar sem nunca precisar parar e pedir informações a alguém."
 culture_parameter_cheaper_adventure_inspiration: "Custo de [inspiration|El] de aventura: #P -50 %#!"
 innovation_block_printing: "Xilogravura"
 innovation_block_printing_desc: "Com o uso de uma série de blocos de madeira entalhados, torna-se possível montar um conjunto de estampas que pode ser reutilizado várias vezes para reproduzir as mesmas palavras e imagens em qualquer material adequado. Isso simplifica enormemente o processo de produção de livros, reduzindo custos e tornando a palavra escrita muito mais acessível a todos."
 culture_parameter_block_printing_scriptorium_bonuses: "[SelectLocalization( HasDlcFeature( 'legends' ), 'culture_parameter_block_printing_scriptorium', 'blank_line' )]"
 culture_parameter_block_printing_scriptorium: "A linha de [buildings|lE] [GetBuilding('scriptorium_01').GetTypeName|V] concede bônus adicionais"
 culture_parameter_block_printing_university_bonuses: "[SelectLocalization( HasDlcFeature( 'legends' ), 'culture_parameter_block_printing_scriptorium', 'blank_line' )]"
 culture_parameter_block_printing_university_bonuses_text: "Custo dos materiais de estudo de [GetActivityType('activity_adult_education').GetName|l]: #P -50 %#!"
 innovation_grenades: "Granadas"
 innovation_grenades_desc: "Apesar de todos os avanços na arte da guerra, uma ferramenta antiga ainda é inestimável: o braço. Pequenos recipientes cheios de uma substância inflamável ou explosiva podem ser facilmente fabricados e arremessados por qualquer pessoa com uma técnica de arremesso decente. Distribuir granadas aos soldados antes de uma batalha pode lhes dar uma forma secundária de atacar e chocar o inimigo."
 innovation_cupellation: "Forno de copela"
 innovation_cupellation_desc: "Usando fornos especializados de alta temperatura, ? poss?vel fundir metais preciosos a partir de amostras minerais, extra?-los de min?rios fundidos e produzir uma amostra refinada que ensaiadores podem examinar mais detalhadamente. Copelar min?rio de uma mina de chumbo ? a melhor maneira de determinar o teor de prata dessa mina; copelar ouro pode indicar sua pureza para uma poss?vel cunhagem."
 culture_parameter_cupellation_mine_building_bonuses: "[taxes|E] de [holding|lE] em [baronies|lE] com o [special_building|lE] #V Mina#!: #P [EmptyScope.ScriptValue('innovation_cupellation_mine_tax_bonus_value')|%0+=] @gold_icon!#!"
 innovation_lacquered_armor: "Armadura laqueada"
 innovation_lacquered_armor_desc: "A aplicação meticulosa de certas resinas sobre as armaduras as fortalece consideravelmente e ajuda a impermeabilizar as placas de ferro mais pesadas. Embora esse processo seja conhecido há algum tempo, seu uso tem se limitado em grande parte a caixas, garrafas e outras mercadorias. A armadura laqueada representa uma nova forma de proteger tanto os soldados quanto seu equipamento."
 culture_parameter_higher_quality_armor_artifacts_parameter: "As [artifacts|lE] de armadura criadas a partir de [inspirations|lE] [Concept('sponsored', 'financiadas')|E] e [GetDecision('commission_artifact_decision').GetName] são de maior qualidade"
 innovation_double_entry_bookkeeping: "Contabilidade por partida dobrada"
 innovation_double_entry_bookkeeping_desc: "Os registros precisam acompanhar a crescente complexidade das finanças e da economia. Registrar todos os pagamentos de entrada e saída em registros separados ajuda a manter balanços confiáveis e a garantir que as entradas não sejam ignoradas por acidente — ou \"por acidente\" — ao revisar as contas."
 culture_parameter_bookkeeping_collect_taxes_bonus: "[councillor_task|E] $task_collect_taxes$: #P +10 %#! [gold_i|E]"
 innovation_waterworks: "Obras hidráulicas"
 innovation_waterworks_desc: "A água dá vida, mas tem muitos outros usos além de saciar a sede ou irrigar os campos. Aproveitado com engenho, esse recurso caído dos céus pode mover máquinas muitas vezes mais potentes do que qualquer gado, facilitar as viagens e o comércio por canais feitos pelo homem ou, simplesmente, manter as ruas movimentadas limpas e habitáveis."
 culture_parameter_unlocks_waterworks_buildings: "Desbloqueia a linha de [buildings|lE] [GetBuilding('waterworks_01').GetName|V]"
 innovation_tiefutu: "$tiefutu$"
 innovation_tiefutu_desc: "$tiefutu_flavor$"
 innovation_bulkheads: "Mamparos de separação"
 innovation_bulkheads_desc: "A maneira mais segura de impedir que um navio afunde é evitar, antes de tudo, que seu casco seja rompido. Mas, se isso acontecer, a embarcação ainda poderá ser salva se o casco for dividido em compartimentos com paredes estanques entre eles. Mesmo que o navio fosse danificado, uma antepara poderia impedir que a água o afundasse por completo, salvando homens, suprimentos e o próprio navio no processo."
 innovation_coking: "Coqueificação"
 innovation_coking_desc: "O carvão vegetal é uma parte vital da ferraria, mas precisa de vastas florestas por perto para transformar a madeira nesse combustível essencial. O carvão, aquecido em algo parecido com um forno de carvão vegetal, pode ser transformado em coque. O coque é tão útil quanto o carvão vegetal na ferraria e em outros fogos industriais, sem precisar derrubar uma floresta inteira."
 culture_parameter_coking_smith_bonuses: "As linhas de [buildings|lE] [GetBuilding('smiths_01').GetTypeName|V] e [GetBuilding('blacksmiths_01').GetTypeName|V] concedem bônus adicionais"
 innovation_composite_crossbow: "Bestas compostas"
 innovation_composite_crossbow_desc: "Assim como com arcos simples, a for?a do bra?o de um arco determina a pot?ncia potencial de seu disparo. Ao refor?ar a envergadura com chifre ou at? mesmo a?o, o peso de tra??o e, portanto, o alcance e a pot?ncia de uma besta podem se tornar muito maiores do que os de qualquer equivalente de madeira, al?m de torn?-la mais resistente e duradoura."
 innovation_pharmacopoeia: "Farmacopeia"
 innovation_pharmacopoeia_desc: "Todo bom m?dico precisa saber produzir os rem?dios certos no momento certo, usando os ingredientes certos, preparados da maneira certa e nas quantidades certas. Embora esse conhecimento costume passar de mestre a aprendiz de forma individual, #italic escrever#! como fazer rem?dios espec?ficos pode ajudar imensamente a padronizar e propagar a prepara??o de diferentes tratamentos."
 culture_parameter_physician_pharmacopoeia_bonus: "Eficácia do tratamento do [court_position|lE] [GetCourtPositionType('court_physician_court_position').GetName()]: #P +20 %#!"
