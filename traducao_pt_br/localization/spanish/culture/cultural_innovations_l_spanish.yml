 unlock_siege_maa_second_level: "[GetPlayer.Custom('GetRegionalSiegeLevel2MAA')]"
 unlock_siege_maa_third_level: "[GetPlayer.Custom('GetRegionalSiegeLevel3MAA')]"
 unlock_siege_maa_fourth_level: "[GetPlayer.Custom('GetRegionalSiegeLevel4MAA')]"
 unlock_maa_ballista: "Pode recrutar [GetMaA('ballista').GetName|l] como [men_at_arms|lE]"
 unlock_maa_cloud_ladder: "Pode recrutar [GetMaA('cloud_ladder').GetName|l] como [men_at_arms|lE]"
 unlock_maa_siege_tower: "Pode recrutar [GetMaA('siege_tower').GetName|l] como [men_at_arms|lE]"
 unlock_maa_cannon: "Pode recrutar [GetMaA('cannon').GetName|l] como [men_at_arms|lE]"
 unlock_maa_bombard: "Pode recrutar [GetMaA('bombard').GetName|l] como [men_at_arms|lE]"
 unlock_maa_trebuchet: "Pode recrutar [GetMaA('trebuchet').GetName|l] como [men_at_arms|lE]"
 unlock_maa_mangonel: "Pode recrutar [GetMaA('mangonel').GetName|l] como [men_at_arms|lE]"
