 #Military
 tradition_hird_name: "$innovation_hird$"
 tradition_hird_desc: "$innovation_hird_desc$"
 innovation_hird: "Hirds"
 innovation_hird_desc: "A tradição de manter séquitos armados a serviço de uma família tem nos servido bem. Ao formalizar e expandir esse sistema, podemos colocar regimentos inteiros de huscarls em nossos exércitos."
 innovation_zweihanders: "Zweihanders"
 innovation_zweihanders_desc: "Essas enormes espadas de duas mãos servem tanto para cortar $knight_culture_player_plural_no_tooltip_lowercase$ em dois quanto para quebrar formações de piqueiros inimigos. Eles são um complemento formidável para nossos próprios regimentos de piqueiros."
 #innovation_longbows: "Longbow"
 #innovation_longbows_desc: "Taking advantage of the strong yew wood that grows here, our bowyers have learned to make longbows so powerful they require specialized training from an early age to use effectively. This investment is worth it, as our longbowmen can shoot arrows which travel further and penetrate deeper than those fired by other archers."
 innovation_adaptive_militia: "Milícia Adaptativa"
 innovation_adaptive_militia_desc: "Armas como o goedendag são baratas e fáceis de fazer, mas são incrivelmente eficazes contra cargas de cavalaria. Sua existência nos permite adaptar nossas milícias para que tenham uma melhor chance de lutar contra $knight_culture_player_plural_no_tooltip_lowercase$ com armadura."
 innovation_valets: "Ordenanças"
 innovation_valets_desc: "A fundação de um sistema de ordenanças ou servos para nossos nobres cavaleiros nos permitirá implantar $knight_culture_player_plural_no_tooltip_lowercase$ melhores armados e protegidos."
 innovation_pike_columns: "Colunas de Piqueiros"
 innovation_pike_columns_desc: "Os piqueiros sempre foram fortes defensores, mas historicamente carecem de mobilidade e ataque. Criar novas formações para corrigir essa deficiência aumentará nossas chances de vitória na batalha."
 innovation_legionnaires: "Legionários"
 innovation_legionnaires_desc: "Assim como restauramos o Império Romano, também restauraremos a estrutura da antiga legião romana e suas temidas tropas de elite!"
 innovation_desert_tactics: "Táticas de Deserto"
 innovation_desert_tactics_desc: "O Levante é um lugar estranho com terreno ruim para cargas de cavalaria. Devemos nos adaptar a essas terras e implantar uma cavalaria que seja mais adequada para lutar em nosso novo lar."
 innovation_caballeros: "Cavalaria Andaluza"
 innovation_caballeros_desc: "Os garanhões andaluzes são melhores para viajar e lutar em terrenos acidentados do que outras raças de cavalos. Podemos treinar regimentos de cavalaria especializados que aproveitem isso."
 innovation_cataphracts: "Catafractários"
 innovation_cataphracts_desc: "Totalmente envolto em roupas de ferro protetoras, nossa cavalaria catafrata intimidante pode quebrar quase qualquer linha defensiva atacando direto com suas lanças."
 innovation_hobbies: "Hobbies"
 innovation_hobbies_desc: "Os montadores de nossos cavalos hobby celtas são rápidos e ágeis, perfeitos para explorações e ataques em terrenos acidentados que não são do agrado dos $knight_culture_player_plural_no_tooltip_lowercase$."
 innovation_rectilinear_schiltron: "Schiltron Retilíneo"
 innovation_rectilinear_schiltron_desc: "O tradicional círculo de piqueiros é uma formação defensiva poderosa, mas tem ataque e mobilidade limitadas. Embora exija grande disciplina, nosso schiltron retilíneo é uma formação superior, capaz de táticas poderosas tanto ofensivas quanto defensivas."
 tradition_forest_wardens_name: "$innovation_forest_wardens$"
 tradition_forest_wardens_desc: "$innovation_forest_wardens_desc$"
 innovation_forest_wardens: "Guardiões da Floresta"
 innovation_forest_wardens_desc: "Nossos ancestrais viveram nessas florestas por gerações, mas agora estão sob a ameaça de estranhos. Séculos de experiência acumulada em combates nas florestas nos ajudarão a proteger nossa terra ancestral."
 innovation_compound_bows: "Arcos Compostos"
 innovation_compound_bows_desc: "Feito de tiras laminadas de chifre, madeira e tendões, nossos arcos compostos são muito menores do que um arco tradicional, embora sejam igualmente poderosos. Este perfil reduzido torna possível atirar confortavelmente de um cavalo, permitindo-nos colocar em campo arqueiros a cavalo verdadeiramente devastadores."
 tradition_khadga_puja_name: "Khadga Puja"
 tradition_khadga_puja_desc: "Esta cultura adotou a arte marcial e o culto ritual das espadas de duas mãos, permitindo-lhes cultivar guerreiros fortes e capazes. As espadas pesadas permitem que eles derrubem infantaria e cavalaria semelhantemente."
 innovation_khandayats: "Khandayats"
 innovation_khandayats_desc: "Hábil no uso da espada khanda, nossa valiosa infantaria é hábil tanto em lutar na selva quanto em dividir a cavalaria leve inimiga em dois."
 tradition_garuda_warriors_name: "Guerreiros Garuda"
 tradition_garuda_warriors_desc: "Os guerreiros distinguidos desta cultura são designados como Garudas e são esperados para lutar até a morte. Mesmo aqueles que seguem um Garuda são esperados para morrer se o líder deles morrer, seja em batalha ou por sua própria mão."
 tradition_futuwaa_name: "$innovation_futuwaa$"
 tradition_futuwaa_desc: "$innovation_futuwaa_desc$"
 innovation_futuwaa: "Futuwaa"
 innovation_futuwaa_desc: "Nossa juventude começou a formar clubes que promovem habilidade, vigor e comportamento moral. Ao endossar e apoiar esses clubes, vamos garantir um suprimento de soldados aptos que podemos reunir para nossa causa."
 tradition_land_of_the_bow_name: "Terra do Arco"
 tradition_land_of_the_bow_desc: "Em uma terra abundante, enriquecida pelo Nilo e sua própria engenhosidade, os núbios prosperaram por gerações. Por quase tanto tempo, o arco tem sido a arma de escolha para deter os saqueadores e bandidos dos desertos circundantes."
 tradition_desert_ribat_name: "Ribats do Deserto"
 tradition_desert_ribat_desc: "Esta cultura tem uma tradi??o de retiros fortificados no deserto, onde os piedosos podem viver em conex?o com o c?u aberto e as areias. Este estilo de vida cria guerreiros do deserto capazes e piedosos e atrai m?sticos."
 tradition_mubarizuns_name: "$innovation_mubarizuns$"
 tradition_mubarizuns_desc: "$innovation_mubarizuns_desc$"
 innovation_mubarizuns: "Mubarizun"
 innovation_mubarizuns_desc: "Modelados com base nos lendários campeões do exército Rashidun, nossos soldados Mubarizun são treinados para se destacarem tanto no combate em formação quanto no combate individual."
 tradition_hussar_name: "$innovation_hussar_raids$"
 tradition_hussar_desc: "$innovation_hussar_raids_desc$"
 innovation_hussar_raids: "Incursão $hussar$"
 innovation_hussar_raids_desc: "Cavalaria leve capaz de atacar rapidamente os inimigos expostos antes de ser disparada de volta, nossos $hussar$ podem ser transformado em regimentos especializados em perseguição e assalto."
 tradition_druzhina_name: "$innovation_druzhina$"
 tradition_druzhina_desc: "$innovation_druzhina_desc$"
 innovation_druzhina: "Druzhina"
 innovation_druzhina_desc: "Os soldados varangianos há muito servem como guarda-costas imponentes de nossos monarcas, mas podem facilmente servir como infantaria pesada dedicada em nossos exércitos."
 tradition_horn_mountain_skirmishing_name: "$innovation_mountain_skirmishing$"
 tradition_horn_mountain_skirmishing_desc: "$innovation_mountain_skirmishing_desc$"
 innovation_mountain_skirmishing: "Escaramuças de Montanha"
 innovation_mountain_skirmishing_desc: "As grandes montanhas no Chifre da África representam desafios logísticos para muitos tipos de exércitos, mas nossos escaramuçadores podem se adaptar facilmente a essas condições para derrotar os invasores inimigos."
 tradition_bush_hunting_name: "$innovation_bush_hunting$"
 tradition_bush_hunting_desc: "$innovation_bush_hunting_desc$"
 innovation_bush_hunting: "Caça na Mata"
 innovation_bush_hunting_desc: "A mata ? um lugar agreste e acidentado, mas oferece in?meras oportunidades para quem sabe onde procur?-las e como explor?-las. Treinar nossos arqueiros nessas t?cnicas dar? a eles uma vantagem ao enfrentar inimigos nessas ?reas."
 tradition_mobile_guards_name: "$innovation_mobile_guards$"
 tradition_mobile_guards_desc: "$innovation_mobile_guards_desc$"
 innovation_mobile_guards: "Táticas Defensivas"
 innovation_mobile_guards_desc: "Nosso povo foi exilado e expulso várias vezes. Embora trágicas, essas experiências nos levaram a nos tornarmos excepcionalmente habilidosos em táticas de retaguarda que minimizam as baixas."
 innovation_alpine_supremacy: "Supremacia Alpina"
 innovation_alpine_supremacy_desc: "A grande altitude de nossa terra natal exige de nossos soldados uma logística e técnicas de combate diferentes das das terras baixas. Dominar essas habilidades nos tornará indiscutíveis senhores das montanhas."
 innovation_sahel_horsemen: "Cavaleiros de Sahel"
 innovation_sahel_horsemen_desc: "O Sahel é uma planície seca e árida, onde grandes distâncias são frequentemente cobertas por cavalos. Os Cavaleiros de Sahel são guerreiros montados que usam armaduras acolchoadas leves e dardos para devastar seus inimigos. Eles são rápidos e podem facilmente enfrentar desertos e terras áridas."
 innovation_bamboo_bows: "Arco de Bambu"
 innovation_bamboo_bows_desc: "Uma das armas tradicionais mais antigas para os soldados indianos é o arco de bambu, que é barato de ser fabricado, fácil de ser carregado e mantido. Como o arco também é uma arma favorita de muitos caçadores, não há escassez de arqueiros experientes nos exércitos indianos."
 innovation_zbrojnosh: "Zbrojnosh"
 innovation_zbrojnosh_desc: "As colinas e montanhas cobertas de florestas de nossa terra natal exigem uma abordagem diferente da guerra. Nossos homens armados, os Zbrojnosh, são treinados para transformar o terreno a seu favor e provaram ser bons lutadores, capazes de derrotar exércitos muito maiores."
 tradition_upland_skirmishing_name: "$innovation_upland_skirmishing$"
 tradition_upland_skirmishing_desc: "$innovation_upland_skirmishing_desc$"
 innovation_upland_skirmishing: "Escaramuças das Terras Altas"
 innovation_upland_skirmishing_desc: "As colinas da savana arborizada têm sido nossa terra natal por gerações. Nossos ancestrais nos mostraram como utilizar este terreno, e com invasores ameaçando nossas fronteiras, podemos usar esse conhecimento em nossa defesa."
 innovation_sarawit: "Sarawit"
 innovation_sarawit_desc: "As terras altas onde nossos ancestrais se estabeleceram requerem uma abordagem particular da agricultura. A construção de campos em socalcos nos ensinou a desenvolver novas táticas militares, que são empregadas por nossos soldados Serawit."
 tradition_mountain_herding_name: "Pastoreio de Montanha"
 tradition_mountain_herding_desc: "Esta cultura tornou as montanhas mais frias em seus lares em uma região de outra forma seca e árida. Os pastores e agricultores dessas terras altas são guerreiros resilientes e robustos, e ao longo do tempo o trabalho árduo dessa gente os fizeram florescer muito acima do deserto árido."
 innovation_desert_mountain_herding: "Pr?ticas de Montanha Des?rtica"
 innovation_desert_mountain_herding_desc: "Desde os tempos antigos, o povo de nossas montanhas busca métodos para pastorear seus rebanhos em terrenos inóspitos. Fazer isso os transformou em guerreiros muito resistentes e robustos, chamados Abudrar."
 tradition_burman_royal_army_name: "Exército Real"
 tradition_burman_royal_army_desc: "$innovation_royal_army_tradition_desc$"
 innovation_royal_army_tradition: "Tradição do Exército Real"
 innovation_royal_army_tradition_desc: "Temos uma longa tradição de um exército permanente feito para proteger a capital. Isso nos deu acesso a soldados resistentes que trabalham muito bem com tropas de apoio, como os elefantes de guerra."
 innovation_repeating_crossbow: "Chu-ko-nu"
 innovation_repeating_crossbow_chinese: "Shenbigong" #神臂弓
 innovation_repeating_crossbow_desc: "A besta repetidora, conhecida como Chu-ko-nu, é uma invenção engenhosa com um mecanismo fácil de usar que pode ser operado por qualquer pessoa. Embora falte em alcance e poder de penetração, compensa com a rapidez de seus disparos, tornando-se uma arma ideal para posições defensivas."
 innovation_repeating_crossbow_chinese_desc: "$innovation_repeating_crossbow_desc$"
 innovation_men_at_arms: "Homens de Armas"
 innovation_men_at_arms_desc: "Treinar e equipar exércitos permanentes que permanecem sob a disposição direta de nossos governantes será um trampolim no caminho para centralizar nosso poder."
 innovation_pole_vault: "Salto com Vara"
 innovation_pole_vault_desc: "O salto com vara é uma invenção simples que requer muito treinamento e prática para dominar. Um saltador habilidoso será capaz de se impulsionar para a frente sobre grandes lacunas e rochas altas, bem como sobre algumas fortificações."
