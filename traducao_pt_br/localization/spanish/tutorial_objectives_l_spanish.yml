l_spanish:
 unify_region_decision: "Unificar a Região da Capital"
 unify_region_decision_desc: "Unificar todos os povos da #EMP minha#! região é um esforço digno e justo!"
 unify_region_decision_tooltip: "Solidifique seu domínio sobre a região de sua capital"
 unify_region_decision_confirm: "Unificar a Região"
 tutorial_event_prefix: "Objetivos do Governante:"
 tutorial.1001.t: "$tutorial_event_prefix$ $unify_region_decision$"
 tutorial.1001.desc: "[councillor.GetName] me encontra no meu [ROOT.Char.Custom('GetCourtyard')]:\n\n“[councillor.Custom2('AppropriateGreetingPositive', ROOT.Char)] você tem prestado um grande serviço a todas as pessoas em nosso domínio”, me bajula; está claro que quer algo em troca.\n\n“Você já pensou em governar toda a região de [region.GetName]? Tenho planos, grandes planos!”."
 tutorial.1001.a: "Sim, guie-me, [councillor.GetNameNoTooltip]!"
 opted_into_tutorial_objectives_tt: "#EMP Optar por Objetivos do Governante#!"
 enable_unify_region_decision_tt: "Habilita a [decision|lE] [GetDecisionWithKey('unify_region_decision').GetName]"
 tutorial.1001.b: "Está embriag[councillor.Custom('ES_OA')]? Não preciso da ajuda dela."
 tutorial.1002.t: "$tutorial_event_prefix$ Região Conquistada"
 tutorial.1002.desc: "Sentad[ROOT.Char.Custom('ES_OA')] no trono, olho pela janela para a distância, como se pudesse ver todas as minhas terras em [region.GetName]… e elas são vastas."
 tutorial.1002.desc_alive: "Mando chamar [councillor.GetName].\n\n\"Conseguimos, [councillor.GetFirstNameNoTooltip], mas ainda não consigo acreditar! Seus planos ambiciosos realmente funcionaram #EMP de verdade#!.\" Eu pulo do trono para dar um abraço.\n\n\"Sempre soube que vocês conseguiriam!\", diz [councillor.GetFirstNameNoTooltip], me abraçando. \"Fizemos isso pelo povo.\""
 tutorial.1002.desc_dead: "\n\nDitos[councillor.Custom('ES_OA')] [councillor.GetName]; seus ambiciosos planos realmente deram certo#EMP de verdad#!."
 tutorial.1002.a: "Gostaria que [councillor.GetNameNoTooltip] pudesse ver isso."
 tutorial.1002.a_councillor: "Sim, fizemos isso por eles!"
 ruler_objective_region_conquered_modifier: "Filhos da Terra"
 ruler_objective_region_conquered_modifier_desc: "Esta dinastia adquiriu uma presença esmagadora em sua região natal e pretende governá-la por séculos."
 EVENT_WINDOW_OPTION_AVAILABLE_RULER_OBJECTIVES: "Esta opção está disponível por causa de objetivos de governante ativos"
 custom_ireland_development_growth: "$MOD_MONTHLY_DEVELOPMENT_GROWTH_FACTOR$ na [region|lE] [GetGeographicalRegion('custom_ireland').GetName]"
 # Dev. only advice example loc
 hint_dev_example_summary: "#D Resumo curto do conselho #!"
 hint_dev_example_description: "#D Descrição significativamente mais longa do que o jogador deveria estar fazendo, ou possivelmente já está fazendo, e principalmente do porquê.#!"
 hint_summary_get_succession: "Obtenha [title.GetNameNoTier] por sucessão"
 hint_murder_successors: "Assassine sucessores à sua frente ou à frente de seu filho na linha sucessória"
 hint_marry_into_succession: "Use a [character_interaction|lE] #HIGH $arrange_marriage_interaction$#! para organizar um casamento entre [holder.GetName] ou seus [heirs|lE] e você ou os [Concept('dynasty_members', 'miembros de tu dinastía')|E], para que seus [children|lE] herdem o [title|lE] no futuro.\n\n#help Preste atenção às [succession_laws|lE] de [title.GetName] e à opção de [marriage|lE] [matrilineal|lE] no #HIGH $arrange_marriage_interaction$#! para garantir que o título seja herdado pelos filhos da sua dinastia. Depois que uma criança nascer, você pode acelerar a herança usando a [scheme|lE] de #HIGH $start_murder_interaction$#! contra todos os que estiverem na linha de sucessão à frente do seu filho.#!"
 hint_summary_get_title: "Crie o título de jure de [title.GetNameNoTier]"
 hint_summary_fabricate_claim: "Fabrique uma reivindicação sobre [title.GetNameNoTier]"
 hint_summary_ask_for_claim: "Peça uma reivindicação sobre [title.GetNameNoTier]"
 hint_claim_benefits: "\n\nTer uma reivindicação desbloqueia um #HIGH [casus_belli|lE] de Reivindicação#! que permite tomar [title.GetName] em uma guerra."
 hint_ask_for_claim: "Use a [character_interaction|lE] #HIGH $hof_ask_for_claim_interaction$#! em seu [head_of_faith|lE] [hof.GetFullName] para pagar [piety|lE] por uma [claim|lE] sobre este [title|lE].\n\n#help Será uma [pressed_claim|lE], então seus [children|lE] herdarão a reivindicação e poderão usar o mesmo casus belli.$hint_claim_benefits$#!"
 hint_fabricate_claim: "Forje um [claim|lE] usando a [councillor_task|lE] do seu [ROOT.Char.GetCouncillorPosition( 'councillor_court_chaplain' ).GetPositionName|l] [chaplain.GetFirstName] #HIGH $task_fabricate_claim$#!.\n\n#help Un [ROOT.Char.GetCouncillorPosition( 'councillor_court_chaplain' ).GetPositionName|l] con una [learning_skill|lE] mayor tendrá más probabilidades de conseguir derechos sobre [title_duchy.GetName]. Será siempre un [unpressed_claim|lE], así que tus [children|lE] no lo heredarán, por lo que tendrás que actuar con rapidez. $hint_claim_benefits$#!"
 hint_summary_get_war: "Conquiste [title.GetNameNoTier] por guerra"
 hint_declare_war_intro: "Declare [war|lE] usando o [casus_belli|lE] #HIGH [cb.GetName]#!. Vencer a guerra irá"
 hint_declare_war_outro: "\n\n#help Veja [alliances|lE], [levies|lE], [knights|lE] e [men_at_arms|lE] de [holder.GetName] e compare com os seus para garantir a vitória.#!"
 hint_conquest_war: "$hint_declare_war_intro$ conceder [title.GetName] ao seu [domain|lE]. $hint_declare_war_outro$"
 hint_create_title: "Crie um [title|lE] [de_jure|lE] superior: [de_jure_title.GetName].\n\n#help Isso desbloqueará [casus_bellis|lE] [de_jure|lE] ou aumentará a aceitação da [character_interaction|lE] #HIGH $offer_vassalization_interaction$#!.#!"
 hint_summary_conquer_vassal: "Obriga [holder.Custom('ES_AlAla')] [holder.GetTitledFirstName|l] a se tornar seu vassalo[holder.Custom('ES_OA')]"
 hint_summary_offer_vassal: "Peça a [holder.GetShortUINameNoTooltip] que se torne seu vassal[holder.Custom('ES_OA')]"
 hint_offer_vassalization: "Obtenha um [Concept('vassalize', 'vasallaje')|E] pacífico por meio da [character_interaction|lE] #HIGH $offer_vassalization_interaction$#!.\n\n#help Isso transformará [holder.Custom('ES_AlAla')] [holder.GetTitledFirstName|l] em seu [Concept('vassal',Select_CString(holder.IsFemale,'vasalla', 'vasallo'))|E]."
 hint_vassalization_war: "$hint_declare_war_intro$ te concederá o título de [title.GetName] como [vassal|lE]. $hint_declare_war_outro$"
 hint_summary_help_offer_vassal: "Melhorar as relações com [holder.Custom('ES_ElLa')] [holder.GetTitledFirstName|l] por meio de intrigas"
 hint_help_offer_vassalization: "Use [character_interaction|lE] #HIGH $sway_interaction$#!, #HIGH $befriend_interaction$#! ou #HIGH $seduce_interaction$#! sobre [holder.GetName] para melhorar sua [opinion|lE] sobre você.\n\n#help Isso fará com que [holder.Custom('ES_ElLa')] [holder.GetTitledFirstNameNoTooltip|l] esteja mais dispost[holder.Custom('ES_OA')] a aceitar a [character_interaction|lE] #HIGH $offer_vassalization_interaction$#!.$hint_opinion_schemes_benefits$#!"
 hint_summary_help_offer_vassal_interactions: "Melhorar as relações com [holder.Custom('ES_ElLa')] [holder.GetTitledFirstName|l] por meio de interações"
 hint_help_offer_vassalization_interactions: "Use a [character_interaction|lE] #HIGH $gift_interaction$#!, #HIGH $offer_ward_interaction$#! ou #HIGH $gift_artifact_interaction$#! em [holder.GetName|l] para melhorar a sua [opinion|lE] sobre você.\n\n#help Isso fará com que [holder.Custom('ES_ElLa')] [holder.GetTitledFirstNameNoTooltip|l] fique mais dispost[holder.Custom('ES_OA')] a aceitar a [character_interaction|lE] #HIGH $offer_vassalization_interaction$#!. $hint_opinion_interaction_benefits$#!"
 hint_summary_murder_top_liege: "Assassinar [holder.Custom('ES_AlAla')] [holder.GetTitledFirstName|l]"
 hint_murder_top_liege: "Usa a [character_interaction|lE] #HIGH $start_murder_interaction$#! para matar a [holder.GetName].\n\n#help Isso fará com que [title_heir.Custom('ES_AlAla')] [Concept('heir',Select_CString(title_heir.IsFemale,'herdeira', 'herdeiro'))|E] do título [title.GetName], [title_heir.GetName|l], se torne o novo [Concept('holder',Select_CString(title_heir.IsFemale,'nova titular', 'novo titular'))|E]. Os novos governantes costumam ter reinos mais fracos, porque o reino fica dividido entre outros [heirs|lE] ou a penalidade de [short_reign|lE] reduz a opinião de seus vassalos, afetando seus [taxes|lE] e [levies|lE].#!"
 hint_summary_get_knights: "Contrate [ROOT.Char.Custom('KnightCulturePluralNoTooltip')|l]"
 hint_get_knights: "Use a [decision|lE] [GetDecisionWithKey('invite_knights_decision').GetName] para conseguir novos [guests|lE] que você poderá recrutar como [knights|lE] usando a [character_interaction|lE] #HIGH $recruit_guest_interaction$#!.\n\nUse a [character_interaction|lE] #HIGH $invite_to_court_interaction$#! com qualquer personagem [unlanded|lE] com alta [prowess|lE] que encontrar ao procurar nas [courts|lE] de outros [rulers|lE].\n\nUse a [character_interaction|lE] #HIGH $arrange_marriage_interaction$#! para [marry|lE] seus [courtiers|lE] com outros cortesãos sem terras com alta destreza.\n\n#help Dependiendo de tu [martial_custom|lE], puede que tengas que usar un matrimonio [matrilineal|lE] para que acudan a tu [court|lE]. Puedes usar el buscador de personajes y ordenarlos por destreza#!."
 hint_summary_marry_allies: "Case-se com governantes poderosos"
 hint_marry_allies: "Use a [character_interaction|lE] #HIGH $arrange_marriage_interaction$#! para [marry|lE] você mesmo ou sua [close_family|lE] com outros [rulers|lE] ou seus familiares próximos com alta força militar para ganhar [alliances|lE] poderosas (use ordenar por Poder da Aliança na janela de interação).$hint_allies_benefits$"
 hint_summary_perk_negotiate_allies: "Obtenha a vantagem $defensive_negotiations_perk_name$"
 hint_allies_benefits: "\n\n#help Quando estiver em [war|lE] contra [holder.GetName], use a [character_interaction|lE] #HIGH $call_ally_interaction$#! em seus Aliados. Eles podem se juntar e usar seus exércitos para ajudá-lo a vencer a guerra.#!"
 hint_perk_negotiate_allies: "Selecione [diplomacy_lifestyle|E] e ganhe pontos de [experience|lE] suficientes para desbloquear o [perk|lE] [GetPerk('defensive_negotiations_perk').GetName(GetPlayer)].\n\n#help Isso desbloqueará a [character_interaction|lE] #HIGH $perk_alliance_interaction$#!, permitindo que você [Concept('ally', 'aliarte')|E] com outros [rulers|lE] sem a necessidade de [Concept('marrying', 'matrimonios')|E].$hint_allies_benefits$#!"
 hint_summary_negotiate_allies: "Negocie alianças"
 hint_negotiate_allies: "Use a [character_interaction|lE] #HIGH $perk_alliance_interaction$#! para [Concept('ally', 'aliarte')|E] com outro [ruler|lE] sem necessidade de[Concept('marrying', 'matrimonios')|E].$hint_allies_benefits$"
 hint_summary_help_ask_for_claim_interactions: "Melhorar a opinião [hof.Custom('ES_DelDela')] [hof.GetTitledFirstName|l] com interações"
 hint_help_help_ask_for_claim_interactions: "Use [character_interaction|lE] #HIGH $gift_interaction$#!, #HIGH $seek_indulgences_interaction$#!, #HIGH $offer_ward_interaction$#! ou #HIGH $gift_artifact_interaction$#! em [hof.GetName] para melhorar a [opinion|lE] de você.\n\n#help Isso tornará [hof.Custom('ES_DelDela')] [hof.GetTitledFirstNameNoTooltip|l] mais disposto a aceitar a [character_interaction|lE] #HIGH $hof_ask_for_claim_interaction$#!.\n\n#HIGH $seek_indulgences_interaction$#! e $hint_opinion_interaction_benefits$#!"
 hint_opinion_interaction_benefits: "#HIGH Siempre puedes usar $gift_interaction$#! se você tiver bastante [gold|lE] [gold_i]. #HIGH Usa $offer_ward_interaction$#! apenas se você tiver uma [child|lE] não adulto sem [guardian|lE]. Use #HIGH $gift_artifact_interaction$#! apenas se você tiver um [artifact|lE]."
 hint_summary_help_ask_for_claim: "Melhorar a opinião de [hof.Custom('ES_DelDela')] [hof.GetTitledFirstName|l] por meio de conspirações"
 hint_help_help_ask_for_claim: "Use [character_interaction|lE] #HIGH $sway_interaction$#!, #HIGH $befriend_interaction$#! ou #HIGH $seduce_interaction$#! com [hof.GetName|l] para melhorar sua [opinion|lE] sobre você.\n\n#help Isso fará com que [hof.Custom('ES_ElLa')] [hof.GetTitledFirstNameNoTooltip|l] esteja mais disposto[hof.Custom('ES_OA')] a aceitar a [character_interaction|lE] #HIGH $hof_ask_for_claim_interaction$#!.$hint_opinion_schemes_benefits$#!"
 hint_opinion_schemes_benefits: "\n\n#HIGH $sway_interaction$#! pode ser usada sempre e com qualquer pessoa no seu [diplomatic_range|lE]. Usa #HIGH $befriend_interaction$#! apenas se você tiver um [perk|El] de [GetPerk('befriend_perk').GetName(GetPlayer)] ou a [tradition|lE] [GetCultureTradition('tradition_fp2_ritualised_friendship').GetName]. Usa #HIGH $seduce_interaction$#! apenas se você tiver uma [sexuality|lE] compatível."
 hint_summary_recruit_maa: "Crie Homens de Armas"
 hint_recruit_maa: "Use [gold|lE] [gold_i] para criar [regiments|lE] de [men_at_arms|lE] bem equipados e treinados para fortalecer seu [army|lE]. Vá para a janela Militar e selecione um tipo de [men_at_arms|lE].\n\n#help Elige el tipo dependiendo de cuál [Concept('counter', 'contrarresta')|lE] mejor los [men_at_arms|lE] de [holder.GetName]. Esto se puede ver en la ventana de su personaje, bajo la ayuda emergente de fuerza militar.#!"
 hint_summary_recruit_mercenaries: "Recrute Mercenários"
 hint_recruit_mercenaries: "Use [gold|lE] [gold_i] para recrutar [mercenaries|lE] para fortalecer seu [army|lE]. Vá até a janela Militar e selecione a aba de Mercenários.\n\n#help Los [mercenaries|lE] trabajarán para ti según un [mercenary_contract|lE] durante 3 años. Puedes prorrogarlo cuando quieras otros 3 años más pagando la misma cantidad de oro que cuando los contrataste.\n\nElige el tipo dependiendo del [gold|lE] que tengas (puedes [Concept('debt', 'endeudarte')|E] para contratarlos, pero la deuda reduce la [advantage|lE] y bloquea el refuerzo de [men_at_arms|lE]) y cuál [Concept('counter', 'contrarresta')|lE] mejor a los [men_at_arms|lE] de [holder.GetName]. Esto se puede ver en la ventana de su personaje, bajo la ayuda emergente de fuerza militar.#!"
 hint_summary_take_decision: "Conclua o Objetivo do Governante"
 hint_take_decision: "Você cumpre todos os requisitos da [decision|lE] [GetDecisionWithKey('unify_region_decision').GetName]; tome-a para concluir o Objetivo do Governante."
 advice_become_house_head_summary: "Torne-se o [house_head|El] de sua Casa"
 advice_become_house_head_description: "Um [house_head|El] normalmente conserva esse cargo pelo resto da vida. Embora assassinar em massa os membros da sua própria família seja sempre uma opção, talvez seja mais rápido criar uma nova casa. \n\n#help $EFFECT_LIST_BULLET$ Abra '$DECISIONS_AND_CONTRACTS_BUTTON$' à direita.\n $EFFECT_LIST_BULLET$ Em "#S $DECISIONS_VIEW_MAJOR_DECISIONS$#!" você encontrará a decisão "#S $create_cadet_branch_decision$#!"#!"
