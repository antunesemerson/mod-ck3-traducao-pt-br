l_spanish:
 WAR_DECLARED_OVERVIEW_DISMISS: "Reúnam as tropas!"
 #WAR_DECLARED_OVERVIEW_DISMISS_TOOLTIP: "" delete this
 WAR_DECLARED_OVERVIEW_FLAVOR: "[WAR.Custom('WarDeclaredOpening')][WAR.Custom('WarDeclaredFlavor')]"
 war_declared_opening.neutral: "[ROOT.War.GetActiveCB.GetAttacker.Custom2('AppropriateGreeting',ROOT.War.GetActiveCB.GetDefender)]\n\n"
 war_declared_opening.negative: "[ROOT.War.GetActiveCB.GetAttacker.Custom2('AppropriateGreetingNegative',ROOT.War.GetActiveCB.GetDefender)]\n\n"
 war_declared_flavor.zealous: "Seus atos perversos ficaram impunes por tempo demais. Isso muda hoje, pois vim trazer a você a retribuição sagrada! [ROOT.War.GetActiveCB.GetAttacker.Custom('ZealousDoW')]"
 war_declared_flavor.zealous.mercifulgod: "[ROOT.Char.GetFaith.HighGodName] tenha piedade de você, pois eu não terei!"
 war_declared_flavor.zealous.reincarnation: "Que sua próxima vida seja menos miserável do que esta."
 war_declared_flavor.zealous.fallback: "Não posso perder, pois [ROOT.Char.GetFaith.HighGodName] está comigo!"
 war_declared_flavor.naughty: "Você tem sido um[ROOT.War.GetActiveCB.GetDefender.Custom('ES_XA')] [ROOT.War.GetActiveCB.GetDefender.Custom('GirlBoy')] muito má[ROOT.War.GetActiveCB.GetDefender.Custom('ES_OA')], e tal comportamento não pode ser ignorado! Prepare-se, pois no campo de batalha lhe infligirei o castigo que tanto merece!"
 war_declared_flavor.holy_war: "Sua falsa religião manteve seus súditos na escuridão por tempo demais. Em nome de [ROOT.War.GetActiveCB.GetAttacker.GetFaith.HighGodName], levarei a verdadeira fé até eles e os libertarei de sua blasfêmia!"
 war_declared_flavor.greedy: "[ROOT.War.GetActiveCB.GetAttacker.Custom2('AppropriateSupplimentaryGreeting',ROOT.War.GetActiveCB.GetDefender)] Há muito cobiço suas terras, apenas para me ver privado de possuí-las. Nunca mais! Chegou a hora de finalmente tomar o que mereço!"
 war_declared_flavor.dejure: "[ROOT.War.GetActiveCB.GetAttacker.Custom2('AppropriateSupplimentaryGreeting',ROOT.War.GetActiveCB.GetDefender)] Sua ocupação de terras que legitimamente me pertencem não pode mais ser tolerada. Chegou a hora de vê-las retornarem à minha posse!"
 war_declared_flavor.subjugation: "Decidi incorporar suas terras ao meu reino. Submeta-se agora, e terei piedade de você... Resista, e o forçarei a se ajoelhar e rastejar diante de mim!"
 war_declared_flavor.subjugation.tribal: "Você é fraco, e eu sou forte. Não preciso de outra justificativa para vir e tomar de você o que eu quiser!"
 war_declared_flavor.subjugation.arrogant: "Que insolência, fingir ser um[ROOT.War.GetActiveCB.GetDefender.Custom('ES_XA')] soberan[ROOT.War.GetActiveCB.GetDefender.Custom('ES_OA')] igual a mim, quando é óbvio que sou superior! Esmagarei seus exércitos patéticos no campo de batalha e te obrigarei a se ajoelhar diante de mim!"
 war_declared_flavor.conquest: "Você é um governante fraco e não merece as terras que possui. Eu mostrarei como é um verdadeiro soberano quando tomar essas terras de você!"
 war_declared_flavor.peasant: "Sua arrogância não conhece limites. Não se preocupe, em breve você aprenderá uma lição de humildade!"
 war_declared_flavor.populist: "[ROOT.War.GetActiveCB.GetAttacker.Custom2('NegativeSupplimentaryGreeting',ROOT.War.GetActiveCB.GetDefender)] Se é guerra que você quer, então a terá! Não deixaremos ninguém nos impedir de formar um novo reino para nós mesmos!"
 war_declared_flavor.independence: "[ROOT.War.GetActiveCB.GetAttacker.Custom2('NegativeSupplimentaryGreeting',ROOT.War.GetActiveCB.GetDefender)] Vivemos sob seu domínio por tempo demais. Não podemos mais tolerar isso: com sangue e aço, seremos livres!"
 war_declared_flavor.liberty: "[ROOT.War.GetActiveCB.GetAttacker.Custom2('NegativeSupplimentaryGreeting',ROOT.War.GetActiveCB.GetDefender)] Não podemos mais tolerar as leis severas que violam nossos antigos direitos. Pela espada, essas leis serão derrubadas!"
 war_declared_flavor.claimant: "[ROOT.War.GetActiveCB.GetAttacker.Custom2('NegativeSupplimentaryGreeting',ROOT.War.GetActiveCB.GetDefender)] Você é um pretendente e um tirano. É hora de restaurar o monarca legítimo ao trono!"
 war_declared_flavor.retraction_refused: "$char_interaction.0221.desc$"
 war_declared_flavor.revocation_refused: "$char_interaction.0201.desc$"
 war_declared_flavor.imprisonment_refused: "Eu o chamo de tirano e me recuso a me submeter à sua autoridade! O reino se levantará contra seu governo maligno!"
 war_declared_flavor.fallback: "[ROOT.War.GetActiveCB.GetAttacker.Custom2('AppropriateSupplimentaryGreeting',ROOT.War.GetActiveCB.GetDefender)] Parece que não há outra solução para nossa disputa além de resolvê-la no campo de batalha."
 is_war_overview_tab_open_trigger: "Está com a aba de visão geral da guerra aberta"
