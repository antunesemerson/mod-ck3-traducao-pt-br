 great_project_type_mandala_capital_01: "$building_type_mandala_capital_01$"
 great_project_type_mandala_capital_01_desc: "Chegou a hora de fazermos nossa contribuição para a eternidade. Erguaremos um templo imponente para honrar nosso devaraja!"
 great_project_type_mandala_capital_01_possessive: "do $building_type_mandala_capital_01$"
 great_project_type_mandala_capital_01_contribution_rite_of_worthiness: "Rito de dignidade"
 great_project_type_mandala_capital_01_contribution_rite_of_worthiness_desc: "Provaremos que somos dignos de receber permissão para construir um [GetBuilding('mandala_capital_01').GetTypeName|l] e competiremos pela devoção dos habitantes deste [kingdom|lE] [de_jure|lE]!"
 great_project_type_mandala_capital_01_contribution_slabs_of_sandstone: "Lajes de arenito"
 great_project_type_mandala_capital_01_contribution_slabs_of_sandstone_desc: "Este templo venerará o divino, mas sua construção tem exigências terrenas. Abastecer o [great_project|El] com os materiais de que precisa é uma das maiores contribuições possíveis."
 great_project_type_mandala_capital_01_contribution_laterite_blocks: "Blocos de laterita"
 great_project_type_mandala_capital_01_contribution_laterite_blocks_desc: "Solo se precisa solo terreno laterítico para uma base sólida, bem como para a decoração."
 great_project_type_mandala_capital_01_contribution_timber: "Madeira"
 great_project_type_mandala_capital_01_contribution_timber_desc: "Usaremos toda a madeira que for necessária para sustentar a estrutura com vigas, telhados, portas giratórias... e também para permitir alguns detalhes nos painéis decorativos."
 great_project_type_mandala_capital_01_contribution_work_force: "Mão de obra"
 great_project_type_mandala_capital_01_contribution_work_force_desc: "As pedras não se movem sozinhas! Forneceremos ao [great_project|lE] a mão de obra bruta necessária para concluir esta tarefa gloriosa."
 great_project_type_mandala_capital_01_contribution_woodcarvings: "Entalhes em madeira"
 great_project_type_mandala_capital_01_contribution_woodcarvings_desc: "Além dos painéis decorativos, criaremos entalhes e gravuras para venerar o divino e trazer bênçãos sobre nosso povo."
 great_project_type_mandala_capital_01_contribution_sanctified_domes: "Cúpulas santificadas"
 great_project_type_mandala_capital_01_contribution_sanctified_domes_desc: "Erigiremos cúpulas; uma construção feita pelo homem que nos permitirá refletir sobre nossa própria engenhosidade."
 great_project_type_mandala_capital_01_contribution_ornate_reliefs: "Relevos ornamentados"
 great_project_type_mandala_capital_01_contribution_ornate_reliefs_desc: "Uns relevos que mostrem devatas, apsaras e representem momentos divinos encherão este lugar, para pasmo dos fiéis."
 great_project_type_mandala_capital_01_contribution_family_shrine: "Santuário familiar"
 great_project_type_mandala_capital_01_contribution_family_shrine_desc: "Será erguido um santuário dedicado à progenie de nossos grandes governantes."
 great_project_mandala_capital_pick_aspect_tt: "Você assumiu um [mandala_aspect|lE]"
 great_project_mandala_capital_has_creation_aspect_tt: "Você assumiu o [aspect_of_creation|El]"
 great_project_mandala_capital_has_serenity_aspect_tt: "Você assumiu o [aspect_of_serenity|El]"
 great_project_mandala_capital_has_destruction_aspect_tt: "Você assumiu o [aspect_of_destruction|El]"
 great_project_mandala_capital_has_trickery_aspect_tt: "Você assumiu o [aspect_of_trickery|El]"
 great_project_type_mandala_capital_02: "Melhoria de $building_type_mandala_capital_01$"
 great_project_type_mandala_capital_02_desc: "Agora temos a capacidade de expandir nosso imponente templo! Criemos uma maravilha que perdure por todas as eras!"
 great_project_type_mandala_capital_02_possessive: "de $building_mandala_capital_02$"
 great_project_type_mandala_capital_02_contribution_rite_of_worthiness: "Rito de dignidade"
 great_project_type_mandala_capital_02_contribution_rite_of_worthiness_desc: "Demostraremos ser dignos de que se nos permita aprimorar nosso [GetBuilding('mandala_capital_01').GetTypeName|l] e competiremos pela devoção dos habitantes deste [kingdom|lE] [de_jure|lE]!"
 great_project_type_mandala_capital_02_contribution_brick: "Tijolo"
 great_project_type_mandala_capital_02_contribution_brick_desc: "Não se pode criar mais do nada. Forneceremos ao [great_project|lE] todos os tijolos de que precisar para concluir as obras neste $building_mandala_capital_02$."
 great_project_type_mandala_capital_02_contribution_tiles: "Pilhas de telhas"
 great_project_type_mandala_capital_02_contribution_tiles_desc: "Um telhado que funciona bem é um telhado de telhas. Enviaremos nossas melhores telhas para o [great_project|lE] e o protegeremos da umidade!"
 great_project_type_mandala_capital_02_contribution_shallow_pools: "Poças rasas"
 great_project_type_mandala_capital_02_contribution_shallow_pools_desc: "Os elementos aquáticos são essenciais para proporcionar frescor, mas também para nos conectar ao plano divino."
 great_project_type_mandala_capital_02_contribution_work_force: "$great_project_type_mandala_capital_01_contribution_work_force$"
 great_project_type_mandala_capital_02_contribution_work_force_desc: "É necessário um grande esforço para realizar grandes feitos! Precisamos fornecer mais mão de obra ao [great_project|lE] para concluir as reformas neste $building_mandala_capital_02$."
 great_project_type_mandala_capital_02_contribution_decorative_tiles: "Ladrilhos decorativos"
 great_project_type_mandala_capital_02_contribution_decorative_tiles_desc: "Vamos nos dar ao luxo e adicionar telhas decorativas aos telhados. Bordas curvas. Entalhes intrincados. Mais magnificência para agradar à vista, assim como ao divino."
 great_project_type_mandala_capital_02_contribution_decorated_domes: "Cúpulas decoradas"
 great_project_type_mandala_capital_02_contribution_decorated_domes_desc: "Cúpulas boas são cúpulas redondas. E estas serão, com saliências e motivos interessantes em um piscar de olhos."
 great_project_type_mandala_capital_02_contribution_family_statues: "Estátua sagrada do herdeiro"
 great_project_type_mandala_capital_02_contribution_family_statues_desc: "Os herdeiros de nossa linhagem divina terão seus rostos sagrados esculpidos em estátuas de pedra, para que sejam lembrados para sempre."
 great_project_type_mandala_capital_03: "$great_project_type_mandala_capital_02$"
 great_project_type_mandala_capital_03_desc: "$great_project_type_mandala_capital_02_desc$"
 great_project_type_mandala_capital_03_possessive: "do $building_mandala_capital_03$"
 great_project_type_mandala_capital_03_contribution_rite_of_worthiness: "Rito de valor"
 great_project_type_mandala_capital_03_contribution_rite_of_worthiness_desc: "Provaremos que somos dignos de nos permitir aprimorar nosso [GetBuilding('mandala_capital_01').GetTypeName|l] e ascenderemos aos anais da história!"
 great_project_type_mandala_capital_03_contribution_volcanic_stone: "Pedra vulcânica"
 great_project_type_mandala_capital_03_contribution_volcanic_stone_desc: "As ambições mais elevadas precisam das bases mais sólidas. Forneceremos ao [great_project|lE] a pedra vulcânica de que precisa para construir alicerces sólidos que durarão para sempre."
 great_project_type_mandala_capital_03_contribution_corbel_gateways: "Portais com mísulas"
 great_project_type_mandala_capital_03_contribution_corbel_gateways_desc: "À medida que expandimos o templo, precisamos de estruturas adequadas para sustentar a construção. Estes portais ajudarão a guiar aqueles que vagam pelos terrenos em busca de iluminação."
 great_project_type_mandala_capital_03_contribution_divine_statues: "Estátuas divinas"
 great_project_type_mandala_capital_03_contribution_divine_statues_desc: "Estas cabeças gigantes podem parecer imponentes, mas, em essência, santificam este lugar e inspiram uma sensação de atmosfera e virtude."
 great_project_type_mandala_capital_03_contribution_work_force: "$great_project_type_mandala_capital_01_contribution_work_force$"
 great_project_type_mandala_capital_03_contribution_work_force_desc: "Para alcançar o divino, precisamos trabalhar duro. São necessários mais homens para construir os $building_mandala_capital_03$ e nossa contribuição será ricamente recompensada."
 great_project_type_mandala_capital_03_contribution_creation_aspect: "Estátuas da criação"
 great_project_type_mandala_capital_03_contribution_creation_aspect_desc: "Estas cabeças gigantes fitam ao longe, ocupadas com planos e organização — sustentando a vida neste plano e no seguinte. Elas têm uma semelhança impressionante com nosso governante divino."
 great_project_type_mandala_capital_03_contribution_serenity_aspect: "Estátuas de serenidade"
 great_project_type_mandala_capital_03_contribution_serenity_aspect_desc: "Estas cabeças gigantes transmitem uma sensação de paz e tranquilidade, e parecem ter alcançado a iluminação. Têm uma semelhança impressionante com nosso governante divino."
 great_project_type_mandala_capital_03_contribution_destruction_aspect: "Estátuas da Destruição"
 great_project_type_mandala_capital_03_contribution_destruction_aspect_desc: "Estas cabeças gigantes têm uma careta aterradora em seus rostos, prontas para avançar e atacar os inimigos que ousarem invadir estes terrenos sagrados. Elas têm uma semelhança impressionante com o nosso governante divino."
 great_project_type_mandala_capital_03_contribution_trickery_aspect: "Estátuas de engano"
 great_project_type_mandala_capital_03_contribution_trickery_aspect_desc: "Estas cabeças gigantes têm sorrisos travessos e transmitem a sensação de que veem através de nós — tanto no sentido literal quanto no filosófico. Elas guardam uma semelhança impressionante com nosso governante divino."
 great_project_type_mandala_capital_03_contribution_gilded_domes: "Cúpulas douradas"
 great_project_type_mandala_capital_03_contribution_gilded_domes_desc: "Para irradiar seu esplendor, as cúpulas dos $building_mandala_capital_03$ devem estar recobertas com o melhor ouro que se possa oferecer."
 great_project_type_mandala_capital_03_contribution_family_temple_compound: "Complexo de templos da família"
 great_project_type_mandala_capital_03_contribution_family_temple_compound_desc: "Um complexo sagrado para o culto aos descendentes do governante divino que construiu estes grandes templos."
 great_project_type_mandala_capital_04: "$great_project_type_mandala_capital_02$"
 great_project_type_mandala_capital_04_desc: "$great_project_type_mandala_capital_02_desc$"
 great_project_type_mandala_capital_04_possessive: "do $building_mandala_capital_04$"
 great_project_type_mandala_capital_04_contribution_rite_of_worthiness: "Rito de merecimento"
 great_project_type_mandala_capital_04_contribution_rite_of_worthiness_desc: "Demostraremos nuestra indudable valia para que se nos permita melhorar nosso [GetBuilding('mandala_capital_01').GetTypeName|l] e deixaremos nossa marca no mundo!"
 great_project_type_mandala_capital_04_contribution_slabs_of_granite: "Lajes de granito"
 great_project_type_mandala_capital_04_contribution_slabs_of_granite_desc: "A única imagem imortal é aquela talhada em alvenaria. Forneceremos a melhor pedra para criar a arte para o $building_mandala_capital_04$ que perdurará por toda a eternidade."
 great_project_type_mandala_capital_04_contribution_zaungdans: "Zaungdans"
 great_project_type_mandala_capital_04_contribution_zaungdans_desc: "As escadarias divinas também são uma parte importante para subir e, assim, se aproximar da divindade. Também são um local esplêndido para montar barracas de mercado e outras necessidades."
 great_project_type_mandala_capital_04_contribution_gilded_shrines: "Santuários dourados"
 great_project_type_mandala_capital_04_contribution_gilded_shrines_desc: "Teremos santuários com ídolos, e cada divindade contida em cada ídolo nos mostrará clemência e ajudará nosso governante divino."
 great_project_type_mandala_capital_04_contribution_work_force: "$great_project_type_mandala_capital_01_contribution_work_force$"
 great_project_type_mandala_capital_04_contribution_work_force_desc: "Uma obra tão grandiosa não requer apenas músculos e suor, mas também olhos atentos, ferramentas delicadas e a mente de um artesão. O trabalho que fornecemos não se limita a transportar material básico de um lado para outro, mas cria as complexas obras de arte de que o [great_project|lE] tanto necessita."
 great_project_type_mandala_capital_04_contribution_bell_stupas: "Estupas campaniformes"
 great_project_type_mandala_capital_04_contribution_bell_stupas_desc: "O mais fino mármore será oferecido ao $building_mandala_capital_05$, para que se assente sobre os alicerces mais elegantes."
 great_project_type_mandala_capital_04_contribution_bejeweled_domes: "Cúpulas cravejadas de joias"
 great_project_type_mandala_capital_04_contribution_bejeweled_domes_desc: "Os céus devem brilhar sobre este $building_mandala_capital_04$, e nós abasteceremos o [great_project|lE] com as joias necessárias para que pareça que as próprias estrelas repousam entre os pilares deste complexo divino."
 great_project_type_mandala_capital_04_contribution_family_temple_complex: "Complexo de templos da família"
 great_project_type_mandala_capital_04_contribution_family_temple_complex_desc: "A prole do nosso grande Devaraja será honrada com seu próprio complexo de templos dentro da cidade real. Aqui, serão adorados muito antes de assumirem as rédeas do poder."
 great_project_type_mandala_capital_05: "$great_project_type_mandala_capital_02$"
 great_project_type_mandala_capital_05_desc: "$great_project_type_mandala_capital_02_desc$"
 great_project_type_mandala_capital_05_possessive: "do $building_mandala_capital_05$"
 great_project_type_mandala_capital_05_contribution_rite_of_worthiness: "Rito de Merecimento"
 great_project_type_mandala_capital_05_contribution_rite_of_worthiness_desc: "Provaremos nosso valor indubitável para que nos seja permitido aprimorar nosso [GetBuilding('mandala_capital_01').GetTypeName|l] e o transformaremos em algo verdadeiramente transcendente!"
 great_project_type_mandala_capital_05_contribution_marble_foundation: "Fundação de mármore"
 great_project_type_mandala_capital_05_contribution_marble_foundation_desc: "O mármore mais fino será oferecido ao $building_mandala_capital_05$ para que repouse sobre as fundações mais elegantes."
 great_project_type_mandala_capital_05_contribution_divine_barays: "Barays divinos"
 great_project_type_mandala_capital_05_contribution_divine_barays_desc: "Nossa estrutura terá as piscinas mais profundas, aquelas que nos protegem dos inimigos e também nos conectam ao plano espiritual."
 great_project_type_mandala_capital_05_contribution_work_force: "$great_project_type_mandala_capital_01_contribution_work_force$"
 great_project_type_mandala_capital_05_contribution_work_force_desc: "Forneceremos trabalhadores de toda habilidade, do mais humilde camponês ao mais sábio erudito, vindos de todos os cantos do reino, para ajudar na construção do $building_mandala_capital_05$."
 great_project_type_mandala_capital_05_contribution_bejeweled_reliefs: "Relevos cravejados"
 great_project_type_mandala_capital_05_contribution_bejeweled_reliefs_desc: "Bailarinas celestiais cobrirão as paredes, projetando graça em seus passos, com seus maravilhosos trajes adornados de joias."
 great_project_type_mandala_capital_05_contribution_bunga_mas_forest: "Floresta de Bunga Mas"
 great_project_type_mandala_capital_05_contribution_bunga_mas_forest_desc: "A veneração de um monumento tão augusto e virtuoso exige os presentes mais refinados e profundos. Forneceremos ao $building_mandala_capital_05$ um conjunto de árvores e flores feitos de ouro, habilmente confeccionados pelos melhores artesãos."
 great_project_type_mandala_capital_05_contribution_dynastic_temple_complex: "Área do templo dinástico"
 great_project_type_mandala_capital_05_contribution_dynastic_temple_complex_desc: "Uma seção do complexo de templos da capital do nosso Devaraja será dedicada à adoração da nossa linhagem e de seus descendentes."
