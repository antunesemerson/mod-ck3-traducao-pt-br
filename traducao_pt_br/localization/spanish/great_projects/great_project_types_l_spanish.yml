 great_project_type_great_wall_possessive: "da Grande Muralha"
 great_project_type_great_wall_contribution_master_builder: "Contratar um mestre construtor e iniciar a construção"
 great_project_type_great_wall_contribution_master_builder_desc: "As fortificações precisam ser levadas a sério! As mentes mais capazes devem ser encarregadas de supervisionar este [great_project|lE], para garantir que sejam usados os melhores materiais, que sejam empregados os trabalhadores mais resistentes e que se ergam as muralhas mais fortes."
