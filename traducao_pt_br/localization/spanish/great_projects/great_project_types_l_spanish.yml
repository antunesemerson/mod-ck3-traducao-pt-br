 great_project_type_great_wall: "Melhorar a Grande Muralha"
 great_project_type_great_wall_desc: "A Grande Muralha ergue-se como um testemunho da habilidade de engenharia de nossos predecessores e da inventividade em dissuadir possíveis invasores. Ainda assim, como tudo o mais, o tempo deixou sua marca. A muralha está em grande necessidade de melhorias."
