 great_project_type_minister_project_culture_desc: "Como podemos estar verdadeiramente unidos se não compartilharmos valores em comum? As diferenças podem causar discórdia e inquietação. Podemos resolver esses problemas, ao menos parcialmente, com um esforço de integração de longo prazo. Um domínio, um povo."
