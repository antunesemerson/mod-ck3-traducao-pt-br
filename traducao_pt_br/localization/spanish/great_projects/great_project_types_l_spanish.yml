 great_project_type_grand_canals: "Os grandes canais"
 great_project_type_grand_canals_desc: "Os antigos guardiões desta terra construíram vastas redes de canais para conectar rios e lagos por meio de vias navegáveis artificiais, unindo o norte e o sul. Expandir esse sistema com técnicas modernas o tornará ainda mais eficiente, ao mesmo tempo em que honrará o legado e a habilidade de seus engenheiros originais."
