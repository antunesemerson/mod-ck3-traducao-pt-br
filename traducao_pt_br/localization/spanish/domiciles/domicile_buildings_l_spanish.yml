 proving_grounds_horse_run_domicile_building: "Corrida de Cavalos"
 proving_grounds_horse_run_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('proving_grounds_01').GetName|l])#!\nCavalos, assim como homens, precisam de exercício e treinamento regularmente, além de apenas trotar de um lugar para outro."
 proving_grounds_camel_run_domicile_building: "Corrida de Camelos"
 proving_grounds_camel_run_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('proving_grounds_01').GetName|l])#!\nEles podem ser bestas recalcitrantes e turbulentas, mas isso é ainda mais razão para treinar nossa camelar regularmente."
 proving_grounds_elephantry_reserve_domicile_building: "Reserva de Elefantes"
 proving_grounds_elephantry_reserve_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('proving_grounds_01').GetName|l])#!\nUm estoque de elefantes reserva, as maiores e mais grandiosas criaturas de [GetPlayer.GetFaith.CreatorNamePossessive], é algo que a maioria dos #EMP reis#! não pode se gabar."
 proving_grounds_nightly_barding_drills_domicile_building: "Drills Noturnos de Armaduras"
 proving_grounds_nightly_barding_drills_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('proving_grounds_01').GetName|l])#!\nElos se torcem, couro estoura, placas enferrujam e o treinamento esmaece tanto para a elite da cavalaria pesada quanto para qualquer outra pessoa."
 proving_grounds_life_in_the_saddle_domicile_building: "Vida na Selaria"
 proving_grounds_life_in_the_saddle_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('proving_grounds_01').GetName|l])#!\nAlguns nascem para isso, outros são criados para isso mais tarde na vida."
