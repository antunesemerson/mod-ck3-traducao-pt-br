 mess_tent_01_domicile_building: "Tenda de Refeições"
 mess_tent_01_domicile_building_desc: "O cheiro das fogueiras de cozinha, o familiar chacoalhar dos cozinheiros, e o caldo marrom quente servido em tigelas de madeira rachadas — há algo mais encorajador na estrada?"
