 baggage_train_ample_steeds_domicile_building: "Cavalos Abundantes"
 baggage_train_ample_steeds_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('baggage_train_01').GetName|l])#!\nCavalos, assim como pessoas, se cansam. Um bom estábulo de reservas faz maravilhas para deixá-los descansar quando mais importa."
 baggage_train_porters_domicile_building: "Carregadores Habilidosos"
 baggage_train_porters_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('baggage_train_01').GetName|l])#!\nO que não pode ser carregado deve ser deixado para trás, então é imperativo que possamos carregar o máximo possível."
 baggage_train_trackers_domicile_building: "Rastreador Proficiente"
 baggage_train_trackers_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('baggage_train_01').GetName|l])#!\nNa estrada, sempre há algo que precisa ser rastreado, desde javalis até bandidos."
 baggage_train_kennel_domicile_building: "Canis"
 baggage_train_kennel_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('baggage_train_01').GetName|l])#!\nOs cães estavam nos seguindo de qualquer forma, então é melhor colocá-los para trabalhar."
 baggage_train_siege_engineers_domicile_building: "Engenheiros de Cerco"
 baggage_train_siege_engineers_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('baggage_train_01').GetName|l])#!\nÉ extremamente impraticável manter os recursos e especialistas necessários para realizar um bom cerco enquanto viaja. A menos que você se comprometa com isso."
 baggage_train_shrine_domicile_building: "Santuário Portátil"
 baggage_train_shrine_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('baggage_train_01').GetName|l])#!\nA fé nos acompanha onde quer que vamos, mas um local para ela não faz mal."
 baggage_train_scribes_domicile_building: "Escritores Leais"
 baggage_train_scribes_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('baggage_train_01').GetName|l])#!\nPapel pode ser um luxo, mas com a ajuda adequada, pode se transformar em uma ferramenta útil para alguns."
 baggage_train_bartering_grounds_domicile_building: "Terras de Troca"
 baggage_train_bartering_grounds_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('baggage_train_01').GetName|l])#!\nO acampamento já está repleto de comércio, dar um lugar e foco a isso nos permite estruturá-lo."
 baggage_train_proof_of_claims_domicile_building: "Provas de Reivindicações"
 baggage_train_proof_of_claims_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('baggage_train_01').GetName|l])#!\nPalavras são baratas, mas há maneiras de torná-las mais atraentes."
 baggage_train_ransom_cages_domicile_building: "Gaiolas de Resgate"
 baggage_train_ransom_cages_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('baggage_train_01').GetName|l])#!\nO transporte seguro e a exibição de prisioneiros são imperativos para conseguir o melhor preço por eles."
 baggage_train_negotiators_domicile_building: "Negociadores Especializados"
 baggage_train_negotiators_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('baggage_train_01').GetName|l])#!\nReputações são coisas maleáveis — especialmente se você se esforçar."
 baggage_train_ascetics_domicile_building: "Ascetas Errantes"
 baggage_train_ascetics_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('baggage_train_01').GetName|l])#!\nEsses buscadores espirituais trazem dignidade e sabedoria que são uma visão incomum em um bando errante, mas não natural."
 baggage_train_pleasure_tents_domicile_building: "Tendas Privadas"
 baggage_train_pleasure_tents_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('baggage_train_01').GetName|l])#!\nAinda mais do que a maioria das habitações, um acampamento é um espaço comunal — um mal adequado para intimidade pessoal. A maioria dos seguidores aprecia ter uma área para simplesmente estar... #EMP sozinhos#! juntos."
