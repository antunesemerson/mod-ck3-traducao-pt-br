 camp_perimeter_good_siting_domicile_building: "Localização Favorável"
 camp_perimeter_good_siting_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('camp_perimeter_01').GetName|l])#!\nSó um tolo arma acampamento onde quer que esteja quando a noite começa a cair: você se move até encontrar o #EMP lugar#! certo."
 camp_perimeter_fixed_layout_domicile_building: "Layout Fixo"
 camp_perimeter_fixed_layout_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('camp_perimeter_01').GetName|l])#!\nUm layout fixo e imutável para o que vai onde no acampamento constrói caráter e um senso de lugar, independentemente da localização."
 camp_perimeter_extra_watch_domicile_building: "Vigilância Extra"
 camp_perimeter_extra_watch_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('camp_perimeter_01').GetName|l])#!\nEm climas estranhos, longe de casa, somos lembrados da nossa vulnerabilidade — e do que podemos fazer a respeito."
 camp_perimeter_palisade_domicile_building: "Construtores de Palissade"
 camp_perimeter_palisade_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('camp_perimeter_01').GetName|l])#!\nPensar em defesa é mais fácil quando você torna isso um hábito a ponto de fazê-lo sem pensar."
 camp_perimeter_ditch_domicile_building: "Cavando Valas"
 camp_perimeter_ditch_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('camp_perimeter_01').GetName|l])#!\n#EMP Nada#! disciplina soldados tão bem quanto forçá-los a cavar uma obra de terra por dia, todos os dias, no final do dia, para sempre."
 camp_perimeter_camp_hygiene_domicile_building: "Higiene do Acampamento"
 camp_perimeter_camp_hygiene_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('camp_perimeter_01').GetName|l])#!\nSe cheira mal, vai longe do resto de nós. Uma regra simples, aplicada com disciplina rigorosa."
