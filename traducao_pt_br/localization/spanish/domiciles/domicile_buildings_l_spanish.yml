 #TIT-53191
 proving_grounds_the_stump_domicile_building: "O Toquinho"
 #proving_grounds_the_stump_domicile_building: "The [GetPlayer.Custom('GetStumpName')|U]"
 proving_grounds_the_stump_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('proving_grounds_01').GetName|l])#!\nVeja aquele ali? Vê o alvo nele? Esse é o alvo de hoje. Arcos prontos!"
 proving_grounds_personal_bouts_domicile_building: "Lutas Pessoais"
 proving_grounds_personal_bouts_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('proving_grounds_01').GetName|l])#!\nÉ totalmente possível desenvolver uma resistência ao trauma craniano, baseando-se principalmente em traumas cranianos anteriores."
 proving_grounds_training_circle_domicile_building: "Círculo de Treinamento"
 proving_grounds_training_circle_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('proving_grounds_01').GetName|l])#!\nVocê não pratica para #EMP se tornar#! habilidoso, você pratica para #EMP permanecer#! habilidoso."
 proving_grounds_mock_battle_drills_domicile_building: "Treinos de Batalha Simulados"
 proving_grounds_mock_battle_drills_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('proving_grounds_01').GetName|l])#!\nUma parede de lanças ainda é uma parede. Ela permanece forte unida ou desmorona como um só."
 proving_grounds_lockwagon_domicile_building: "Carroça de Carga"
 proving_grounds_lockwagon_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('proving_grounds_01').GetName|l])#!\nSomos um bando que se move, luta e #EMP saqueia#! como um só. Equipamentos vão para o pote, e distribuímos a partir daí. Ou então."
 proving_grounds_martial_study_domicile_building: "Estudo Marcial"
 proving_grounds_martial_study_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('proving_grounds_01').GetName|l])#!\nToda batalha já foi lutada antes, toda guerra travada é resultado de outra. Por que não se referir aos resultados?"
 proving_grounds_the_stick_game_domicile_building: "O Jogo do Bastão"
 proving_grounds_the_stick_game_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('proving_grounds_01').GetName|l])#!\nPrimeiro a pegá-lo sem quebrá-lo ganha o pote: feridas superficiais apenas, facas cegas, e se você for visto, está fora."
 proving_grounds_bodyguard_drills_domicile_building: "Treinos de Guarda Costas"
 proving_grounds_bodyguard_drills_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('proving_grounds_01').GetName|l])#!\nNossa presente... #EMP situação#!, apresenta ameaças e desafios únicos ao nosso protegido. Leve-os tão a sério quanto a morte."
 #Perimeter
 camp_perimeter_01_domicile_building: "Perímetro do Acampamento"
 camp_perimeter_01_domicile_building_desc: "Sentinelas, patrulhas, piquetes e senhas. A segurança é melhor quando se torna um hábito, não um pensamento posterior."
