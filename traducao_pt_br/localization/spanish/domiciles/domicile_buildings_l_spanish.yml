 camp_fire_trailing_musicians_domicile_building: "Músicos Errantes"
 camp_fire_trailing_musicians_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('camp_fire_01').GetName|l])#!\nÉ surpreendente o quanto é mais motivador ouvir quem realmente sabe #EMP tocar#! do que quem definitivamente não sabe."
 camp_fire_wandering_poets_domicile_building: "Poetas Errantes"
 camp_fire_wandering_poets_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('camp_fire_01').GetName|l])#!\nGravidade, trocadilhos, um senso pelo profundo, o profano e o lascivo — um bom poeta precisa de tudo isso e mais."
 camp_fire_capering_fools_domicile_building: "Tolos Espalhafatosos"
 camp_fire_capering_fools_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('camp_fire_01').GetName|l])#!\nComédia de situação pode não ser alta arte, mas é engraçado quando o pequeno bate a cabeça no tronco."
 camp_fire_libations_for_the_lost_domicile_building: "Libações pelos Perdidos"
 camp_fire_libations_for_the_lost_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('camp_fire_01').GetName|l])#!\nNos reunimos em memória daqueles que não veremos novamente, e para lembrar os rostos que ainda podemos perder."
 camp_fire_local_hangers_on_domicile_building: "Local de Desperdício"
 camp_fire_local_hangers_on_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('camp_fire_01').GetName|l])#!\nA vida presa a um só lugar pode se tornar tão maçante que motiva qualquer quantidade de fofocas."
 camp_fire_future_dreams_domicile_building: "Grandes Aspirações"
 camp_fire_future_dreams_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('camp_fire_01').GetName|l])#!\nÉ fácil perder de vista um objetivo de longo prazo, a menos que você o teça em cada ato, cada conversa, cada bragança embriagada."
 camp_fire_nightly_debates_domicile_building: "Debates Noturnos"
 camp_fire_nightly_debates_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('camp_fire_01').GetName|l])#!\nPergunte a dois acadêmicos sobre um assunto e você receberá cinco opiniões conflitantes. Educativo, se barulhento."
 camp_fire_juicy_rumors_domicile_building: "Rumores Suculentos"
 camp_fire_juicy_rumors_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('camp_fire_01').GetName|l])#!\nHá muito #EMP material#! fácil de reunir por aí, se você estiver disposto a jogar os jogos certos."
