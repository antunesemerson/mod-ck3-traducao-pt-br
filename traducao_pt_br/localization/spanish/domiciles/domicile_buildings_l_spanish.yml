 barber_tent_reference_corpus_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('barber_tent_01').GetName|l])#!\nHá um bom livro, manual ou pergaminho aplicável à maioria das situações. Frequentemente com ilustrações úteis."
 barber_tent_morticians_tools_domicile_building: "Ferramentas do Morticiano"
 barber_tent_morticians_tools_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('barber_tent_01').GetName|l])#!\nDesenterre-os, limpe-os e retire os dentes, cortando quaisquer objetos de valor antes que inchem demais."
