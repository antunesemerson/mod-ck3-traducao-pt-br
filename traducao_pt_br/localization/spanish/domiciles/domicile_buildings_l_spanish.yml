 mess_tent_herbalists_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('mess_tent_01').GetName|l])#!\nSaber a diferença entre o que é seguro para comer e o que é violento, causando morte por hemorragia, é sempre valioso."
 mess_tent_brewers_domicile_building: "Cervejeiros Móveis"
 mess_tent_brewers_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('mess_tent_01').GetName|l])#!\nHá uma arte na produção e no transporte de uma boa cerveja, e um luxo supremo em ter seu próprio suprimento."
 mess_tent_curers_domicile_building: "Cureiros Habilidosos"
 mess_tent_curers_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('mess_tent_01').GetName|l])#!\nQualquer tolo pode esfregar sal na carne, mas é preciso um profissional para fazer isso em grande escala e mantê-la com gosto comestível por meses."
 mess_tent_bakers_domicile_building: "Padeiros Errantes"
 mess_tent_bakers_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('mess_tent_01').GetName|l])#!\nPão fresco é uma maneira maravilhosamente restauradora de começar o dia."
 mess_tent_cooks_domicile_building: "Cozinheiros Habilidosos"
 mess_tent_cooks_domicile_building_desc: "#weak (Requer [GetDomicileBuilding('mess_tent_01').GetName|l])#!\nFazer mais com menos é um bom lema para pregar, mas poucos o praticam como cozinheiros em movimento."
