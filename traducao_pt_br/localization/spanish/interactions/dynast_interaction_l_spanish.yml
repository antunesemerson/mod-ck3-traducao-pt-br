l_spanish:
 dynasty_interaction_header: "[dynast_interaction|E]\n"
 disinherit_interaction: "Deserdar"
 disinherit_interaction_desc: "$dynasty_interaction_header$Remover [recipient.GetShortUINameNoTooltip] da [line_of_succession|lE]"
 disinherit_interaction_notification: "Membro da dinastia deserdado"
 courtly_vassal_disapproves_disinheriting: "Cada [GetVassalStance( 'courtly' ).GetTextIcon][GetVassalStance( 'courtly' ).GetName] [vassal|lE] ([actor.MakeScope.ScriptValue('number_of_courtly_vassals')|V0]) perde #N 20#! [opinion|lE] de [actor.GetShortUIName] por #V 10 anos#! #weak (Desaprova deserdar herdeiros não disputados)#!"
 restore_inheritance_interaction: "Restaurar a herança"
 restore_inheritance_interaction_desc: "$dynasty_interaction_header$Restaurar [recipient.GetShortUINameNoTooltip] à [line_of_succession|lE] natural\n\n#weak Isto está disponível porque [recipient.GetSheHe] foi [disinherited|E]#!"
 restore_inheritance_interaction_notification: "Herança restaurada"
 denounce_interaction: "Denunciar"
 denounce_interaction_desc: "$dynasty_interaction_header$[denounce|E] [recipient.GetShortUINameNoTooltip]\n\n#weak Isto dará a todos os membros da nossa [dynasty|lE] um [imprisonment_reason|lE] contra [recipient.GetHerHim].#!"
 denounce_interaction_notification: "Membro da Dinastia denunciado"
 forgive_interaction: "Perdoar"
 denounced_change_to_forgiven: "A #V $denounced_opinion$ Opinião#! #weak (-50)#! muda para #V $forgave_denounced_opinion$#! #weak (-25)#! (#P +25#! [opinion|lE])"
 forgiven_changed_to_denounced: "A #V $forgave_denounced_opinion$ Opinião#! #weak (-25)#! muda para #V $denounced_opinion$#! #weak (-50)#! (#N -25#! [opinion|lE])"
 forgive_interaction_desc: "$dynasty_interaction_header$Retirar a [Concept( 'denounce', 'denúncia' )|E] contra [recipient.GetShortUINameNoTooltip]"
 forgive_interaction_notification: "Perdoou membro da dinastia"
 call_dynasty_member_to_war_interaction: "Chamar Membro da Dinastia para a Guerra"
 call_dynasty_member_to_war_interaction_desc: "Chamar [recipient.GetShortUINameNoTooltip] para servir sua [dynasty|lE] na guerra"
 call_dynasty_member_to_war_interaction_extra_icon: "$hook_extra_icon$"
 dynast_legitimize_bastard_interaction: "Legitimar bastardo #weak (Dynasty)#!"
 dynast_legitimize_bastard_interaction_desc: "$dynasty_interaction_header$Declarar [recipient.GetShortUINameNoTooltip] como $game_concept_legitimized_bastard$\n\n#weak Isto está disponível porque [recipient.GetSheHe] é um[recipient.Custom('ES_XA')] [bastard|lE] da minha [dynasty|lE]#!"
 dynast_legitimize_bastard_interaction_notification: "Bastardo legitimado"
 dynast_claim_title_interaction: "Reivindicar título"
 dynast_claim_title_interaction_desc: "$dynasty_interaction_header$[Concept( 'claim', 'Reivindicar' )|E] para você um [title|lE] em mãos de [recipient.GetShortUINameNoTooltip]."
 dynast_claim_title_interaction_notification: "Título Reivindicado"
 ALREADY_HAVE_CLAIM_ON_THIS_TITLE: "Você já possui um direito a este título"
 ALREADY_HAVE_CLAIMS_ON_ALL_TITLES: "Você já possui direitos a todos os títulos de [TARGET_CHARACTER.GetShortUIName]"
 dynast_end_dynasty_wars_interaction: "Fim das guerras da dinastia"
 dynast_end_dynasty_wars_interaction_desc: "$dynasty_interaction_header$Exija que [recipient.GetShortUINameNoTooltip] encerre imediatamente todas as suas guerras ofensivas contra qualquer outro membro da nossa [dynasty|lE]"
 dynast_end_dynasty_wars_interaction_notification: "Guerra da dinastia finalizada"
 recipient_secondary_legitimize_bastard_interaction: "Bastardo"
 send_to_varangian_guard_interaction: "Enviar para a Guarda Varangiana #weak (Dinastia)#!"
 send_to_varangian_guard_interaction_desc: "$dynasty_interaction_header$Enviar [recipient.GetShortUINameNoTooltip] para longe para ganhar glória e fortuna na Guarda Varangiana. Quem sabe, pode até ajudar a formar caráter!"
 send_to_varangian_guard_interaction_toast: "[recipient.GetShortUIName] partiu para a Guarda Varangiana"
 send_to_varangian_guard_interaction_toast_desc: "Fama e glória o aguardam!"
