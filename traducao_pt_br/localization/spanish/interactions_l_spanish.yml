 char_interaction.0261.desc: "Por autoridade conferida por [intermediary.Custom('ES_ElLa')] [intermediary.GetTitledFirstName|l], por meio desta eu vos despojo de vosso falso domínio sobre [landed_title.GetName]. Deveis me entregar o título em custódia para a Coroa, com efeito imediato."
 char_interaction.0261.a: "Um abuso de poder revoltante!"
 char_interaction.0262.desc: "[intermediary.GetTitledFirstName] ficará sabendo disso, mas $char_interaction.0199.desc$"
 char_interaction.0262.a: "[intermediary.GetSheHe|U] já ficou sabendo."
 char_interaction.0263.desc: "Não sois [intermediary.Custom('ES_ElLa')] [intermediary.GetTitleAsNameNoTooltip] e não me curvo perante os vossos mesquinhos caprichos. Se quereis [landed_title.GetName], tereis de tomá-lo à força."
 char_interaction.0263.result.criminal: "Se [actor.GetShortUINameNoTooltip] [Select_CString(actor.IsLocalPlayer, 'te echas', 'se echa' )] volta atrás"
 char_interaction.0263.result.war: "Se [actor.GetShortUINameNoTooltip] [Select_CString(actor.IsLocalPlayer, 'sigues', 'sigue' )] com a reivindicação"
 char_interaction.0263.a: "Então é traição."
 char_interaction.0263.a.tt: "Seus crimes foram reportados a [intermediary.Custom('ES_AlAla')] [intermediary.GetTitledFirstName|l]"
 char_interaction.0263.b: "Você acha que estou blefando? À guerra!"
 char_interaction.0271.desc: "Pela autoridade do cargo que me foi concedido por [intermediary.GetTitledFirstName|l] , estou corrigindo algumas inconsistências triviais nas fronteiras do reino.\n\nÉ-vos ordenado entregar a vassalagem [intermediary.Custom('ES_DelDela')] [intermediary.GetTitledFirstName|l] ao legítim[recipient.Custom('ES_OA')] [recipient.GetLadyLord]. A mim."
 char_interaction.0271.a: "Não posso recusar, mas se eu #EMP pudesse#!..."
 char_interaction.0272.desc: "Você está ultrapassando os limites de sua autoridade, mas eu não posso resistir ao cargo de meu [intermediary.GetTitleAsName], mesmo quando é #EMP você#! quem o exerce.\n\nAceito a retração de meu vassalo."
 char_interaction.0272.a: "Você nunca teve escolha, [recipient.GetFirstNameNoTooltip]."
 char_interaction.0273.desc: "Fiz um juramento para proteger meus vassalos até mesmo da pilhagem de gente como #EMP vos#!.\n\nPodeis arrancar-me [intermediary.Custom('ES_ElLa')] [intermediary.GetTitledFirstName|l] e suas terras em combate ou fugir de volta para aquela toca abandonada por [recipient.GetFaith.random_GoodGodNames] em que vos escondeis."
 char_interaction.0273.result.criminal: "$char_interaction.0263.result.criminal$"
 char_interaction.0273.result.war: "$char_interaction.0263.result.war$"
 char_interaction.0273.a: "Você vai se arrepender disso, [recipient.GetFirstNameNoTooltip]."
 char_interaction.0273.a.tt: "$char_interaction.0263.a.tt$"
 char_interaction.0273.b: "Que convite #EMP agradável#!!"
 char_interaction.0281.desc: "Pela autoridade do cargo que [intermediary.GetTitledFirstName|l] me concedeu, estou colocando você sob prisão por suspeita de atividades iníquas.\n\nEntregue-se aos meus soldados ou enfrente as consequências."
 char_interaction.0281.a: "Não tenho escolha."
 char_interaction.0282.desc: "Ao contrário de minhas ações, suas exigências são criminosas.\n\nPelo bem do reino, obedecerei, mas saiba que não esquecerei esta afronta."
 char_interaction.0282.a: "Onde foi que dei a impressão de que eu queria que você #EMP esquecesse#!?"
 char_interaction.0283.desc: "Me entregar à sua misericórdia? Acho que não. Se você quer me jogar na cadeia, pode vir me pegar pessoalmente.\n\nEmbora, se você insistir, talvez eu #EMP possa#! ir até você... se permitir que eu leve alguns #EMP amigos#!."
 char_interaction.0283.a: "Você vai se arrepender disso, eventualmente."
 char_interaction.0283.a.tt: "$char_interaction.0263.a.tt$"
 char_interaction.0283.b: "Acho que você não entendeu. Isto não foi um pedido."
 char_interaction.0291.desc.positive: "Embora, é claro, confie em você para representar meus interesses, aqui você errou. [recipient.Custom('ES_ElLa')|U] [recipient.GetTitledFirstName] é um[recipient.Custom('ES_XA')] súdito[recipient.Custom('ES_OA')] leal e valioso[recipient.Custom('ES_OA')], e deveriam direcionar suas energias para outro lugar."
 char_interaction.0291.desc.negative: "Vocês não conseguem fazer #EMP nada#! direito? O simplório mais lento da terra conseguiria ver que [recipient.Custom('ES_ElLa')] [recipient.GetTitledFirstName] não é no que vocês deveriam focar. Pare de intimidar vassalos melhores e faça o seu trabalho."
 char_interaction.0291.desc.neutral: "No momento, não é do meu interesse permitir esta ação. Confio que você entende e continuará a governar com dignidade em meu nome no restante."
 char_interaction.0291.a: "Tenho certeza de que meu suserano sabe o que faz."
 char_interaction.0291.b: "Filhote insolente!"
 char_interaction.0291.c: "Tolo babão!"
 char_interaction.0291.d: "Idiota gagá!"
 char_interaction.0291.e: "Eu. Odeio. Isso.[intermediary.Custom('ES_EA')]-#EMP [intermediary.GetWomanMan].#!"
 char_interaction.0291.f: "Esse #EMP desgraciad[intermediary.Custom('ES_OA')]#!."
 char_interaction.0291.g: "Espero que você apodreça em seu confinamento!"
 char_interaction.0291.h: "[intermediary.GetSheHe|U] certamente não vai me impedir da próxima vez..."
