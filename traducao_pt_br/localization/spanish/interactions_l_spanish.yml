 char_interaction.0370.desc: "Decidi que continuar pagando tributo a você já não é do meu interesse."
 char_interaction.0370.desc.herder: "Você se afastou muito de onde eu o encontrei pela última vez, e não consigo continuar pagando tributo a você."
 char_interaction.0370.a: "Que [actor.GetShortUINameNoTooltip] não [Select_CString(actor.IsLocalPlayer, 'encuentres', 'encuentre')] socorro quando as fortunas falharem."
 char_interaction.0370.a.herder: "Eu deveria ter mantido meu reino unido."
 char_interaction.0370.b: "Então teremos de #EMP fazer#! [actor.GetShortUINameNoTooltip] pagar!"
