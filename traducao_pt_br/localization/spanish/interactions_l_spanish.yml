 #Fruitful in spite of hatred
 marriage_interaction.0010.ending.d_desc: "\n\nQue o casamento deles seja frutífero apesar do rancor entre eles."
 marriage_interaction.0010.ending.d_actor_desc: "\n\nQue seu casamento seja frutífero apesar do rancor entre vocês."
 marriage_interaction.0010.ending.d_recipient_desc: "\n\nQue nosso casamento seja frutífero apesar do rancor entre nós."
 marriage_interaction.0010.ending.d_both_desc: "\n\nQue nosso casamento seja frutífero apesar do rancor entre nós, meu [secondary_actor.Custom2('InsultAdjective', ROOT.Char)] [secondary_actor.Custom('WifeHusband')]!"
 #Perfect match
 marriage_interaction.0010.ending.e_desc: "\n\nNunca vi um casal tão perfeito, eles foram feitos um para o outro!"
 marriage_interaction.0010.ending.e_actor_desc: "\n\nNunca vi um casal tão perfeito, vocês foram feitos um para o outro!"
 marriage_interaction.0010.ending.e_recipient_desc: "\n\nFinalmente estamos unidos em [secondary_actor.Custom('GetCulturallyAppropriateMarriageReference')] assim como em alma e coração!"
 marriage_interaction.0010.ending.e_both_desc: "\n\nFinalmente estamos unidos em [secondary_actor.Custom('GetCulturallyAppropriateMarriageReference')] assim como em alma e coração, meu [secondary_actor.Custom('ComplimentAdjective')] [secondary_actor.Custom('WifeHusband')]!"
 #Recipient hates secondary recipient
 marriage_interaction.0010.ending.f_desc: "\n\nPor que alguém iria querer se casar com aquele [secondary_recipient.Custom2('InsultAdjective', ROOT.Char)] [secondary_recipient.Custom2('InsultNoun', ROOT.Char)] está além da minha compreensão, mas desejo-lhes felicidades."
 marriage_interaction.0010.ending.f_actor_desc: "\n\nPor que alguém iria querer se casar com aquele [secondary_recipient.Custom2('InsultAdjective', ROOT.Char)] [secondary_recipient.Custom2('InsultNoun', ROOT.Char)] está além da minha compreensão, então boa sorte."
 #Sinner, or criminal
 marriage_interaction.0010.ending.g_desc: "\n\nRezo para que juntos possam encontrar redenção e expiação, assim como felicidade."
 marriage_interaction.0010.ending.g_actor_desc: "\n\nRezo para que vocês juntos possam encontrar redenção e expiação, assim como felicidade."
