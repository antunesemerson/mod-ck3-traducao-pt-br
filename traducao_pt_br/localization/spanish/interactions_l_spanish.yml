 court_amenities_interactions.0001.t: "Acusado de Violar a Lei Suntuária!"
 court_amenities_interactions.0001.desc_intro: "Enquanto eu vagava pelos salões de [debate_locale.GetNameNoTierNoTooltip]vestid[ROOT.Char.Custom('ES_OA')] como de costume, sou de repente parado[ROOT.Char.Custom('ES_OA')] nada mais nada menos que por [actor.Custom('ES_ElLa')] [actor.GetTitledFirstName|l]!\n\n[actor.GetNameNoTooltip] me pressiona o dedo com força contra o meu peito."
 court_amenities_interactions.0001.desc_byzantine: "“Por que você presume ser aceitável usar púrpura? Apenas #EMP minha#! família tem essa honra! Tire isso imediatamente!”"
 court_amenities_interactions.0001.desc_court_position: ""Você chama de #EMP esse#! traje algo digno de um[recipient.Custom('ES_XA')] [recipient.GetTitleAsNameNoTooltip|l]? Você parece um bobo! Tire essa roupa neste instante, ou chamarei os guardas!"."
 court_amenities_interactions.0001.desc.nakey: ""Ainda que devamos celebrar o corpo humano em todas as suas formas, o mínimo que um[recipient.Custom('ES_OA')] pode fazer é cuidar de si mesm[recipient.Custom('ES_OA')]! Há quanto tempo vocês não tomam banho?""
 court_amenities_interactions.0001.desc: "\"Quem exatamente você pensa que é, desfilando com essa roupa ridícula? Isto é uma corte real, não um bordel! Vá encontrar algo mais humilde!\""
 court_amenities_interactions.0001.desc_outro: "\n\n[actor.GetSheHe|U] me acusou de violar as leis suntuárias de [actor.GetPrimaryTitle.GetName], uma mancha social com a qual terei de conviver para sempre, embora eu ainda possa dar um baile em [actor.Custom('ES_AlAla')] [actor.GetTitledFirstNameNoTooltip|l]! Talvez até consiga uma indenização…"
 court_amenities_interactions.0001.a: "\"E o que exatamente VOCÊ está vestindo?\""
 court_amenities_interactions.0001.a.tt_success: "#positive_value Você defende suas escolhas de roupa com sucesso#!"
 court_amenities_interactions.0001.a.tt_failure: "#negative_value Seus argumentos sartoriais têm pouco peso#!"
 court_amenities_interactions.0001.b: "Pagarei o preço com minha dignidade..."
 court_amenities_interactions.0001.b.tt: "$religious_interaction.2400.b.tt$"
 court_amenities_interactions.0002.t: "Um Debate Elegante"
 court_amenities_interactions.0002.desc_intro: "Devemos ter ficado debatendo por horas as leis de asseio e aparência adequados, gesticulando violentamente um para o outro, citando leis antigas que poucos na corte pareciam conhecer. Quando a fumaça do espetáculo se dissipou,"
 court_amenities_interactions.0002.desc_won.nakey: "Parece que ganhei!\n\n Por isso, [actor.GetName] foi obrigado[actor.Custom('ES_OA')] a vestir as roupas de um[actor.Custom('ES_XA')] plebeu[actor.Custom('ES_OA')] e esconder do mundo seu corpo vergonhosamente negligenciado."
 court_amenities_interactions.0002.desc_won: "Parece que eu ganhei!\n\n Por isso, [recipient.GetName] foi obrigado[recipient.Custom('ES_OA')] a se despir até a roupa de baixo! Todos os presentes na corte [recipient.GetHerHim] o viram exatamente como [ROOT.Char.GetFaith.CreatorName] [recipient.GetHerHim] trouxe ao mundo!"
 court_amenities_interactions.0002.desc_lost.nakey: "Fiquei chocado ao descobrir que, de fato, eu estava infringindo a lei!\n\n Pela primeira vez em minha vida, sinto-me envergonhad[ROOT.Char.Custom('ES_OA')] do corpo que [ROOT.Char.GetFaith.CreatorName] me deu, e justamente quando sinto minha nudez se tornar obscena, guardas e estilistas próximos se aproximam para me vestir com trapos imundos e comuns."
 court_amenities_interactions.0002.desc_lost: "Fiquei chocado ao descobrir que, de fato, estava infringindo a lei!\n\n Permaneço envergonhad[ROOT.Char.Custom('ES_OA')] enquanto os guardas do castelo de [debate_locale.GetNameNoTierNoTooltip] e estilistas me despem até as roupas de baixo e continuam me despindo! Expost[ROOT.Char.Custom('ES_OA')] perante a corte, fujo da cena com o orgulho entre as pernas."
 court_amenities_interactions.0002.a_won: "Há! Que diversão!"
 court_amenities_interactions.0002.a_lost.humble: "Deixe-os ver. Não tenho vergonha."
 court_amenities_interactions.0002.a_lost.lustful: "Costumo reservar essa honra para meus amantes."
 court_amenities_interactions.0002.a_lost: "Talvez eu nunca mais mostre meu rosto."
 court_amenities_interactions.0003.desc_won.nakey: "parece que ganhei!\n\n Por isso, [actor.GetName] foi obrigado[actor.Custom('ES_OA')] a vestir as roupas de um[actor.Custom('ES_XA')] plebeu[actor.Custom('ES_OA')] e ocultar do mundo seu corpo vergonhosamente descuidado."
 court_amenities_interactions.0003.desc_won: "Parece que ganhei!\n\n Por isso, [actor.GetName] foi obrigado[actor.Custom('ES_OA')] a se despir até as roupas de baixo! Todos os presentes na corte [actor.GetHerHim] o viram exatamente como [ROOT.Char.GetFaith.CreatorName] [actor.GetHerHim] o trouxe ao mundo!"
 court_amenities_interactions.0004.desc: "parece que a violação legal de [victim.GetNameNoTooltip] é um crime punível com todo o rigor da lei de [debate_locale.GetNameNoTierNoTooltip]! Isso significa que eu poderia prender [victim.GetNameNoTooltip]! Embora não fosse esse o resultado que eu esperava, isso certamente me coloca em uma posição poderosa!"
 court_amenities_interactions.0004.a: "Talvez eu releve essa violação, em troca de um favor..."
 court_amenities_interactions.0004.b: "ficaria muito melhor em trapos de prisão!"
