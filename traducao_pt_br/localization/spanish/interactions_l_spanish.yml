 char_interaction.0250.desc: "[actor.Custom2('PositiveSupplimentaryGreeting', recipient)]\nLamento informar-lhe de que decidi aumentar as obrigações do nosso pacto.\n\nSei que entenderá meu dilema, já que [actor.GetPrimaryTitle.GetNameNoTierNoTooltip] precisa de proteção urgente, e sua contribuição desempenha um papel enorme.\n\nAlém disso, #emphasis ¡me lo debéis!#!"
 char_interaction.0250.a: "Parece que tenho pouca escolha..."
 char_interaction.0251.desc: "[actor.Custom2('PositiveSupplimentaryGreeting', recipient)]\nTenho sido um[actor.Custom('ES_XA')] bom vassal[actor.Custom('ES_OA')] convosco, mas é claro que deveis entender que também tenho súditos meus!\n\nO contrato que nos une é muito restritivo, então com certeza vereis como seria sensato torná-lo mais flexível um pouco, não é?\n\nAlém disso, #emphasis ¡me lo debéis!#!"
 char_interaction.0253.desc: "[actor.Custom2('PositiveSupplimentaryGreeting', recipient)]\nDecidi que é preciso alterar o tipo de administração de[recipient.GetPrimaryTitle.GetNameNoTooltip].\n\nEsta decisão serve ao bem comum de[actor.GetPrimaryTitle.GetNameNoTierNoTooltip].\n"
 char_interaction.0253.a: "Assumirei minhas novas responsabilidades."
 char_interaction.0252.desc: "[actor.Custom2('PositiveSupplimentaryGreeting', recipient)]\nEm reconhecimento às nossas oferendas e ao respeito por [recipient.GetPrimaryTitle.GetNameNoTooltip], peço que honre essa devoção concedendo [SCOPE.Custom('CelestialTributaryRequest')].\n\nQue este favor reforce a harmonia entre seu trono e nosso humilde reino."
 char_interaction.0252.a: "Concederei a você acesso a nossas bancas de mercado."
 char_interaction.0252.b: "Sim, sua dinastia provou ser digna de se unir à minha."
 char_interaction.0252.c: "Desde que você permaneça leal ao seu [recipient.GetTitleTierName]!"
