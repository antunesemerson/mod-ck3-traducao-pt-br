 council_interaction.0001.desc: "Sinto-me honrado por seu pedido para que eu sirva como seu [sender.GetActiveCouncilTask.GetPositionName]."
 council_interaction.0001.desc.accept: "Começarei a trabalhar imediatamente para cumprir minhas novas responsabilidades, e o verei na próxima reunião do conselho!"
 council_interaction.0002.desc.refuse: "Infelizmente, minhas responsabilidades atuais não me deixam tempo para assumir tarefas adicionais, então lamento dizer que preciso recusar sua oferta."
