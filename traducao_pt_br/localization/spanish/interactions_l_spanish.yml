 marriage_interaction.0011.desc: "Após pensar bastante, devo recusar seu pedido de casamento.\n\n[secondary_actor.GetFirstName] e [secondary_recipient.GetFirstName] não foram feitos um para o outro."
 marriage_interaction.0011.b_desc: "Após pensar bem, devo recusar sua proposta de noivado.\n\n[secondary_actor.GetFirstName] e [secondary_recipient.GetFirstName] não foram feitos um para o outro."
 marriage_interaction.0011.a: "Uma pena..."
 marriage_interaction.0020.desc: "Decidi romper o noivado entre [rejecting_betrothed.GetShortUIName] e [rejected_betrothed.GetShortUIName]."
 marriage_interaction.0020.actor_desc: "Decidi romper meu noivado com [rejected_betrothed.GetShortUIName]."
 marriage_interaction.0020.recipient_desc: "Decidi romper seu noivado com [rejecting_betrothed.GetShortUIName]."
 marriage_interaction.0020.both_desc: "Decidi romper nosso noivado. Nosso casamento não acontecerá."
 marriage_interaction.0020.a: "Que desonroso!"
 marriage_interaction.0030.desc: "Nosso casamento claramente não é favorecido por [actor.GetFaith.HighGodName]. Acabou."
 marriage_interaction.0030.a: "Finalmente, estou livre do[actor.Custom('ES_EA')] [actor.Custom2('InsultNoun', ROOT.Char)] [actor.Custom2('InsultAdjective', ROOT.Char)]!"
 marriage_interaction.0030.a_love: "[actor.GetFirstName], não! Eu amo você!"
 marriage_interaction.0040.desc: "Decidi tomá-la como minha concubina."
 marriage_interaction.0040.a: "Que assim seja."
 marriage_interaction.0041.desc: "Liberei sua [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('recipient'))] da minha prisão para que me sirva como concubina[recipient.Custom('ES_OA')]."
 marriage_interaction.0041.a: "Vil demônio!"
 marriage_interaction.0042.desc: "Decidi entregá-la a [recipient.GetTitledFirstName|l] como concubina."
 marriage_interaction.0043.desc_concubine: "Eu libertei sua concubina da minha prisão para que passe a ser concubina de [recipient.GetTitledFirstName|l]."
 marriage_interaction.0043.desc_spouse: "Libertei vos[secondary_recipient.Custom('ES_OA')] [secondary_recipient.Custom('WifeHusband')|l] da minha prisão para que passe a ser concubin[secondary_recipient.Custom('ES_OA')] [recipient.Custom('ES_DelDela')] [recipient.GetTitledFirstName|l]."
 marriage_interaction.0050.desc: "Seus serviços como minha concubina não são mais necessários."
