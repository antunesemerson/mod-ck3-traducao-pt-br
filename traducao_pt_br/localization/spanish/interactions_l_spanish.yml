 ASK_FOR_DIVORCE_NOTIFICATION: "Meu casamento com [secondary_recipient.GetShortUIName] claramente não é abençoado por [actor.GetFaith.HighGodName]. Você me concederia um divórcio?"
 OFFER_RANSOM_PROPOSAL_PERSONAL: "Estou disposto a libertá-lo de meus cuidados, mas a liberdade não sai de graça. Considere minha oferta."
 OFFER_RANSOM_PROPOSAL: "Estou disposto a libertar [secondary_recipient.GetShortUIName] de meus cuidados, mas a liberdade não sai de graça. Considere minha oferta."
 PAY_RANSOM_PROPOSAL_PERSONAL: "Não suporto mais este encarceramento! Aceitaria esta oferta em troca da minha liberdade?"
 PAY_RANSOM_PROPOSAL: "Sinto grande apreço por [secondary_recipient.GetShortUIName]. Vocês poderiam libertar[secondary_recipient.Custom('ES_LoLa')] em troca disso?"
 RELEASE_PRISONER_OFFER: "Por mais que tenha apreciado ser seu anfitri[ROOT.Char.Custom('ES_OnOna')], decidi deixá-lo ir."
 RELEASE_PRISONER_OFFER_CONDITIONAL: "Estou disposto a libertá-lo da prisão, mas não incondicionalmente..."
 HOUSE_HEAD_DEMAND_CONVERSION: "Como seu Chefe da Casa, realmente preciso exigir que você abrace a única Fé verdadeira: [actor.GetFaith.GetName]."
 CONVERT_TO_RELIGION: "Decidi abraçar [recipient.GetFaith.GetName], a única fé verdadeira."
 LIEGE_DEMAND_CONVERSION: "Chegou a hora de abandonar seus caminhos desviantes e abraçar a única Fé verdadeira, [actor.GetFaith.GetName]!"
 GRANT_VASSAL_PROPOSAL: "Boas notícias! Decidi tornar [secondary_actor.GetFullName] vassal[secondary_actor.Custom('ES_OA')] seu[secondary_actor.Custom('ES_OA')]."
 RETRACT_VASSAL_PROPOSAL: "Cheguei à conclusão de que, para o bem de [secondary_actor.GetPrimaryTitle.GetNameNoTierNoTooltip], [recipient.GetFullName] ficará sob minha autoridade direta como vassal[recipient.Custom('ES_OA')]."
 REVOKE_TITLE_PROPOSAL: "Cheguei à conclusão de que você não pode ser encarregado da dignidade e responsabilidade de [landed_title.GetName]. Portanto, exijo que renuncie a este título imediatamente."
 RELIGIOUS_HEAD_SEEK_INDULGENCES: "Embora eu tente ser um[actor.Custom('ES_XA')] bom[actor.Custom('ES_XA')], [actor.GetFaith.GetAdherentName], ainda tropeço de vez em quando. Como tal, desejo doar esta soma de ouro à Igreja para compensar minhas faltas."
 RELIGIOUS_HEAD_DECLARATION_OF_REPENTANCE: "Vi o erro dos meus caminhos e, tendo me arrependido de meus atos, peço que suspenda minha excomunhão para que eu possa me reunir novamente com meus irmãos e irmãs na fé."
 RELIGIOUS_HEAD_REQUEST_EXCOMMUNICATION: "[secondary_recipient.GetShortUIName] ultrapassou os limites com suas últimas malfeitorias. Eu vos peço que [secondary_recipient.Custom('ES_LoLa')] excomungue para que o mundo saiba que condenamos suas ações."
 RELIGIOUS_HEAD_ASK_GOLD: "Como [actor.GetFaith.GetAdherentName] fiel, vejo-me impedido de realizar boas obras por falta de recursos. Poderia poupar algum para mim, para que eu possa cumprir a vontade do divino?"
 RELIGIOUS_HEAD_ASK_CLAIM: "[secondary_recipient.GetShortUIName|U] não tem estado mantendo bem os valores de nossa fé e os [actor.GetFaith.GetAdherentNamePlural] de [target.GetNameNoTier] sofrem por isso. Concederíeis vossa bênção para libertar essas terras de seu governo desorientado?"
 RELIGIOUS_HEAD_ASK_HOLY_WAR_TARGET: "Embora o zelo seja digno de inveja, também devemos ser pragmáticos se quisermos que nossa fé triunfe. Não seria mais sensato fazer de [target.GetNameNoTier] o alvo de nossa guerra santa?"
 ASK_TO_TAKE_VOWS: "Creio que seja do seu melhor interesse entrar em um pacto monástico. Embora eu não possa forçá-lo a isso, você realmente deveria considerar..."
 SEND_GIFT_PROPOSAL: "Por favor, aceite este humilde presente. Não é muito, mas espero que lhe seja útil. À nossa amizade contínua!"
 SEND_GIFT_ACCEPT: "Aceito seu presente!"
 SEND_GIFT_REJECT: "Rejeito sua caridade"
 call_ally.0001.opening: "[actor.Custom2('AppropriateGreeting', ROOT.Char)]"
 call_ally.0001.desc: "Convoco você a honrar nossa [alliance|lE] e se juntar à [target.GetName]!"
 call_ally.0001.a: "À Guerra!"
 call_ally.0100.opening: "[recipient.Custom2('AppropriateGreeting', ROOT.Char)]"
 call_ally.0100.desc: "Claro que me juntarei a você nesta guerra! Nossos inimigos aprenderão a temer as [recipient.Custom('ES_LoLa')] s [recipient.Custom('WomenMenPeople_GenderPreference')] de [recipient.GetPrimaryTitle.GetNameNoTierNoTooltip]!"
 call_ally.0101.desc: "Infelizmente, não estou em posição de me envolver em suas guerras."
 call_ally.0101.a: "Que [recipient.Custom2('InsultAdjective', ROOT.Char)] [recipient.Custom2('InsultNoun', ROOT.Char)]!"
 char_interaction.0001.opening: "[recipient.Custom2('AppropriateGreeting', actor )]"
 char_interaction.0001.desc: "Aceito vossa graciosa oferta de vassalagem, meu [recipient.Custom('ES_SennorSennora')]!"
 char_interaction.0002.desc: "Não preciso de sua proteção e prefiro manter para mim as riquezas do meu Reino."
 char_interaction.0002.a: "Terei de explorar outras opções..."
 char_interaction.0010.opening: "[recipient.Custom2('AppropriateGreetingPositive', actor )]"
 char_interaction.0010.desc: "[actor.GetFirstName], acho que este é o começo de uma bela relação de vassalagem!"
 char_interaction.0010.a: "Meu [recipient.Custom('ES_SennorSennora')]!"
 char_interaction.0011.desc: "Embora eu aprecie sua oferta de fidelidade, não posso aceitá-la."
 char_interaction.0011.a: "Que pena."
 char_interaction.0020.opening: "[actor.Custom2('AppropriateGreetingNegative', recipient)]"
 char_interaction.0020.desc: "Como Chefe da Dinastia, eu por meio desta o deserd e o desherdo! Você não herdará nenhum título de qualquer membro da Dinastia [actor.GetDynastyName]."
 char_interaction.0020.a: "O quê? Por quê?!"
 char_interaction.0030.opening: "[actor.Custom2('AppropriateGreetingPositive', recipient)]"
 char_interaction.0030.desc: "Como Chefe da Dinastia, eu por meio desta restauro seu direito de herdar títulos dos membros da Dinastia [actor.GetDynastyName]!"
 char_interaction.0030.a: "Sou grato!"
 char_interaction.0040.desc: "Como Chefe da Dinastia, eu por meio desta denuncio você como um reprovado e uma desgraça para toda a Dinastia [actor.GetDynastyName]!"
 char_interaction.0040.a: "O quê? Por quê?!"
 char_interaction.0041.desc: "Vosso comportamento [recipient.Custom2('InsultBehavior', SCOPE.sC('actor'))] e decadente envergonha toda a casa [actor.GetHouse.GetBaseName] e, como jef[ROOT.Char.Custom('ES_EA')] da mesma, considero ser meu dever informar o restante do clã sobre vossos modos [recipient.Custom2('InsultAdjective', SCOPE.sC('actor'))].\n\nQue a luz [actor.GetFaith.HighGodNamePossessive] vos guie de volta ao caminho da virtude..., embora eu duvide disso."
 char_interaction.0041.a: "Calúnia!"
 char_interaction.0042.desc: "Sois tanto [recipient.Custom('FormalComplimentAdjective')] como [recipient.Custom('ComplimentAdjective')], uma inspiração para toda a casa [actor.GetHouse.GetBaseName] e, como chefe[ROOT.Char.Custom('ES_EA')] da mesma, é meu dever exaltar as vossas virtudes perante todo o clã!\n\nQue permaneçais na graça [actor.GetFaith.HighGodNamePossessive]."
 char_interaction.0042.a: "Encantador!"
 char_interaction.0050.desc: "Como Chefe da Dinastia, eu por meio desta perdoo suas transgressões passadas e retiro sua Denúncia entre os membros da Dinastia [actor.GetDynastyName]!"
 char_interaction.0050.a: "A justiça foi feita!"
 char_interaction.0060.desc: "Eu gostei bastante de [target.GetName], então, como seu Chefe da Dinastia, decidi reivindicá-lo para mim. Faça disso o que quiser."
 char_interaction.0060.a: "Isso não pode ser bom."
 char_interaction.0070.opening: "[actor.Custom2('AppropriateGreeting', recipient )]"
 char_interaction.0070.desc: "Esta luta interna dentro da Dinastia [actor.GetDynastyName] é indecorosa e deve terminar imediatamente. Como Chefe da Dinastia, por meio desta declaro Paz Branca entre você e seus inimigos na Dinastia!"
 char_interaction.0070.a: "Que intrometido insuportável!"
 char_interaction.0071.desc: "Esta luta interna dentro da Dinastia [actor.GetDynastyName] é indecorosa e deve terminar imediatamente. Como Chefe da Dinastia, ordenei que [recipient.GetFullName] aceitasse Paz Branca com você."
 char_interaction.0071.a: "Sou grato!"
 char_interaction.0078.desc_them: "Eu sei que tínhamos combinado que [ward.GetTitledFirstName|l] seria educado por mim, mas acontece o seguinte... já estou muito ocupado com outros pupilos. Desculpe."
 char_interaction.0078.desc: "Sei que combinamos que [ward.GetTitledFirstName|l] seria educad[ward.Custom('ES_OA')] por [guardian.GetTitledFirstName|l], mas acontece uma coisa… Está muito ocupad[guardian.Custom('ES_OA')] com outros pupilos. Sinto muito."
 char_interaction.0078.a: "De todas as afrontas...!"
 char_interaction.0079.desc_them: "Achei que tivéssemos combinado que você educaria [ward.GetTitledFirstName|l], mas agora ouço dizer que você está com as mãos cheias de outros pupilos?! Que vergonha."
 char_interaction.0079.desc: "Pensava que tínhamos combinado que [guardian.GetTitledFirstName|l] educaria [ward.GetTitledFirstName|l], e agora descubro que está atolado com outros pupilos?! Que vergonha."
 char_interaction.0079.a: "Talvez eu tenha cometido um erro..."
 char_interaction.0080.desc: "Eu ficaria feliz que [guardian.GetShortUINameNoFormat] educasse meu [ward_liege.Custom2('RelationToMeShort', SCOPE.sC('ward'))], [ward.GetShortUINameNoFormat] — uma criação nobre para um espírito nobre!"
 char_interaction.0080.desc_self: "Eu ficaria feliz que você educasse meu [ward_liege.Custom2('RelationToMeShort', SCOPE.sC('ward'))], [ward.GetShortUINameNoFormat] — uma criação nobre para um espírito nobre!"
 char_interaction.0080.desc_guardian_self_ward: "Eu ficaria feliz em educar você — uma criação nobre para um espírito nobre!"
 char_interaction.0080.desc_guardian_self: "Eu ficaria feliz em educar seu[ward.Custom('ES_OA')] [ward_liege.Custom2('RelationToMeShort', SCOPE.sC('ward'))], [ward.GetShortUIName]: uma criação nobre para um espírito nobre!"
 char_interaction.0080.desc_guardian: "Eu ficaria feliz que meu [guardian_liege.Custom2('RelationToMeShort', SCOPE.sC('guardian'))], [guardian.GetShortUINameNoFormat], educasse [ward.GetShortUINameNoFormat] — uma criação nobre para um espírito nobre!"
 char_interaction.0080.desc_ward_selfaccept: "Ficaria feliz se você me educasse — uma educação nobre para um espírito nobre!"
 char_interaction.0081.desc: "Infelizmente, não consideramos seu arranjo de educação proposto do nosso agrado."
 char_interaction.0081.a: "Que pena."
 char_interaction.0082.t: "Um Mentor para Mim"
 char_interaction.0082.intro: "[guardian.Custom('ES_ElLa')|U] [guardian.GetTitledFirstName|l] chegou finalmente de [guardian_liege.GetPrimaryTitle.GetNameNoTierNoTooltip], carregad[guardian.Custom('ES_OA')] de tomos e pergaminhos."
 char_interaction.0082.desc.liege: "\n\nMe diz que as aulas de [ward.GetFirstNameNoTooltip] começarão em breve!"
 char_interaction.0082.desc: "\n\n me diz que minhas lições começarão em breve!"
 char_interaction.0082.a: "Muito bem."
 char_interaction.0083.t: "Uma Mente para Moldar"
 char_interaction.0083.intro: "[ward.Custom('ES_ElLa')|U] jovem [ward.GetTitledFirstName|l],"
 char_interaction.0083.not_related: "[ward_liege.Custom2('RelationToMeShort', SCOPE.sC('ward'))] [ward_liege.Custom('ES_DelDela')] [ward_liege.GetTitledFirstName|l],"
 char_interaction.0083.related: "meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('ward'))],"
 char_interaction.0083.outro: "enfim chegou de [ward_liege.GetPrimaryTitle.GetNameNoTierNoTooltip] para sua educação."
 char_interaction.0083.desc.host: "\n\n[guardian.Custom('ES_ElLa')|U] [guardian.GetTitledFirstName|l] começará suas aulas em breve."
 char_interaction.0083.desc: "\n\nAssim que se acomodar, as aulas começarão."
 char_interaction.0083.a: "Excelente."
 char_interaction.0084.desc: "Seu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('ward'))], [ward.Custom('ES_ElLa')] [ward.GetTitledFirstName|l], chegou em segurança a [guardian_liege.GetPrimaryTitle.GetNameNoTierNoTooltip] e começarei suas lições imediatamente."
 char_interaction.0084.a: "Muito bem."
 char_interaction.0090.from_ward.desc: "Temo que minha educação em sua corte não atenda mais às minhas necessidades. Retornarei imediatamente a [capital.GetNameNoTierNoTooltip]."
 char_interaction.0090.two_wards.desc: "Temo que a educação de [ward.GetTitledFirstName|l] e [ward_2.GetTitledFirstName|l] em sua corte não atenda mais às nossas necessidades. Eles estão, por meio desta, sendo chamados de volta aos nossos cuidados."
 char_interaction.0090.one_ward.desc: "Temo que a educação de [ward.GetTitledFirstName|l] em vossa corte já não atende às nossas necessidades. Assim sendo, [ward.Custom('ES_LoLa')] a chamamos de volta para os nossos cuidados."
 char_interaction.0090.a: "Devo me sentir insultado?"
 char_interaction.0100.desc: "Meu amigo, por favor aceite este humilde presente como sinal de minha apreciação."
 char_interaction.0100.a: "Um acréscimo bem-vindo aos meus cofres!"
 char_interaction.0110.desc: "Por meio desta, concedo a você [landed_title.GetName], seu título, território formal e renda associada. Que você governe bem!"
 char_interaction.0110.a: "Meu poder cresce!"
 char_interaction.0111.desc: "Por meio desta, concedo a governança de [landed_title.GetName]. Espero que demonstre ser um[actor.Custom('ES_XA')] representante dign[actor.Custom('ES_OA')] [actor.Custom('ES_DelDela')] [actor.GetTitleAsNameNoTooltip|l] e administre bem estas terras!"
 char_interaction.0120.desc: "Após a devida consideração, decidi fazer de você meu herdeiro legal. Não me decepcione, pois ainda não é tarde demais para eu mudar de ideia."
 char_interaction.0120.a: "Isso é o certo!"
 char_interaction.0130.a: "Um bom acordo."
 char_interaction.0131.opening: "[recipient.Custom2('AppropriateGreetingNegative', actor )]"
 char_interaction.0131.desc: "Considero sua oferta de resgate totalmente descabida. Faça o que é honroso e solte [secondary_recipient.GetShortUIName]."
 char_interaction.0131.desc_personal: "Eu preferiria apodrecer em sua masmorra a aceitar sua oferta absurda de resgate."
 char_interaction.0131.a: "Hora de reduzir as rações de..."
 char_interaction.0140.desc: "Aceito sua oferta de resgate. [secondary_recipient.GetShortUIName] será devolvido a você imediatamente!"
 char_interaction.0141.desc: "Considero sua oferta de resgate bastante decepcionante. Acho que vou manter [secondary_recipient.GetShortUIName] por enquanto."
 char_interaction.0141.a: "Maldito[actor.Custom('ES_OA')] seja esse[actor.Custom('ES_EA')] [actor.Custom2('InsultNoun', ROOT.Char)] [actor.Custom2('InsultAdjective', ROOT.Char)]!"
 char_interaction.0150.desc: "Muito bem, eu o libertarei, embora deva admitir que me afeiçoei à sua companhia."
 char_interaction.0151.desc: "Temo que terei de recusar sua oferta de resgate. Você terá de suportar minha hospitalidade por mais algum tempo."
 char_interaction.0160.desc: "Não tenho escolha a não ser aceitar suas condições para minha libertação."
 char_interaction.0160.desc_demand_conversion: "Eu me convertirei ao [actor.GetFaith.GetName|l]."
 char_interaction.0160.desc_renounce_claims: "Renunciarei a todos os meus direitos sobre suas terras tão [recipient.Custom2('InsultAdjective', actor)]."
 char_interaction.0160.desc_banish: "Eu partirei e nunca mais voltarei."
 char_interaction.0160.desc_gain_hook: "Ficarei em dívida com você."
 char_interaction.0160.desc_take_vows: "Vou me unir ao grupo de [recipient.Custom('NunMonkPlural')|l]."
 char_interaction.0160.desc_become_executioner: "Serei voss[ROOT.Char.Custom('ES_OA')] verdug[ROOT.Char.Custom('ES_OA')]."
 char_interaction.0160.desc_recruit: "Me juntarei à sua corte tão [recipient.Custom2('InsultAdjective', actor)]."
 char_interaction.0160.desc_demand_admin: "Serei parte de sua administração tão [recipient.Custom2('InsultAdjective', actor)]."
 char_interaction.0160.a: "Adeus, [recipient.GetFirstNameNoTooltip]..."
 char_interaction.0160.a.courtier: "Cuidado por onde anda agora, [recipient.GetFirstNameNoTooltip]..."
 char_interaction.0161.desc: "Prefiro apodrecer em sua masmorra a aceitar suas exigências absurdas."
 char_interaction.0170.t: "Uma Hora Difícil"
 char_interaction.0170.desc: "Me despertaram de madrugada dois guardas desconhecidos. Quando me levaram para fora, não tive ilusões sobre o que estava prestes a acontecer. Ao me ajoelhar diante do carrasco de [actor.GetShortUIName], experimentei um momento de serena e perfeita lucidez."
 char_interaction.0170.desc_burned: "Assim que terminei minha magra refeição, a porta foi escancarada e fui agarrado e arrastado para fora. Não será uma morte fácil — a pira já foi acesa e eu já sinto o calor em minhas pernas. Um silêncio cai sobre a multidão enquanto observam meus momentos finais com expressões desvairadas no rosto."
 char_interaction.0170.desc_devoured: "A porta se abre de supetão e os guardas de [actor.GetShortUIName] me jogam no chão e me imobilizam aqui. Então entra [actor.GetTitleAsNameNoTooltip] em pessoa, com uma faca na mão e um largo sorriso.\n\nSem ligar para meus gritos, ele rasga minha carne com a faca e a dentadas. Em meio à névoa, vejo seu rosto coberto de sangue — manchado de pedaços de #EMP mí#!— e imploro, mas quando vejo como mastiga e engole com deleite, percebo que vou morrer assim."
 char_interaction.0170.desc_public: "Ao romper da aurora, sou acordado rudemente por dois guardas que me arrastam para fora.\n\nEnquanto me conduzem até um patíbulo erguido no meio de uma multidão reunida, meu coração afunda, e, quando o carrasco de [actor.GetShortUIName] me sorri e ergue sua pesada espada, eu desespero.\n\nA multidão se cala quando o carrasco se impõe sobre mim, obrigando-me a ajoelhar, e com um grunhido de esforço e um #EMP silbido#! quase inaudível, tudo fica escuro."
 char_interaction.0170.a: "Maldita seja sua alma negra, [actor.GetFirstNameNoTooltip]!!!"
 char_interaction.0170.life_is_just_a_joke.a: "A vida #EMP é#! só uma piada, não é?"
 char_interaction.0180.desc: "Como seu Chefe da Casa, decidi que você deve abraçar [actor.GetFaith.GetName], a única Fé verdadeira. Receio que você não tenha escolha neste assunto."
 char_interaction.0180.desc.liege: "Como seu [ROOT.Char.Custom('ES_SennorSennora')], eu exijo que abandone sua falsa fé e se junte a mim como um [actor.GetFaith.GetAdherentName] mais, imediatamente."
 char_interaction.0180.a: "Suponho que deva."
 char_interaction.0181.desc: "Muito bem, abraçarei a Fé [actor.GetFaith.GetAdjective], embora seja estranho abandonar tanto do que me é familiar."
 char_interaction.0182.desc: "Nunca abandonarei minha Fé e, em vez disso, fundarei minha própria Casa!"
 char_interaction.0182.a: "Que decepção..."
 char_interaction.0190.desc: "Muito bem, abraçarei a Fé [actor.GetFaith.GetAdjective], embora seja estranho abandonar tanto do que me é familiar."
 char_interaction.0191.desc: "Minha Fé está no cerne do meu ser — eu jamais a abandonarei."
 char_interaction.0200.desc: "Cheguei à conclusão de que você não pode ser encarregado da dignidade e responsabilidade de [landed_title.GetName]. Portanto, a partir de agora, eu o destituto deste título para o bem maior do Reino."
 char_interaction.0200.a: "Não posso acreditar!"
 char_interaction.0201.desc: "[landed_title.GetName] pertence legitimamente à Casa [recipient.GetHouse.GetName]. Não o entregarei em hipótese alguma."
 char_interaction.0201.a: "Que ousadia!"
 char_interaction.0199.desc: "Não vejo alternativa senão me curvar à sua decisão de me destituir de [landed_title.GetName]."
 char_interaction.0199.a: "Exatamente."
 char_interaction.0211.desc: "Agradeço sinceramente sua generosa oferta de fazer de [secondary_recipient.GetShortUIName] vassal[secondary_recipient.Custom('ES_OA')] de mim[secondary_recipient.Custom('ES_OA')], mas temo que devo recusar."
 char_interaction.0211.a: "Ingrato!"
 char_interaction.0220.desc: "Aceito a retratação, da sua parte, do meu vassalo[secondary_recipient.Custom('ES_OA')] , [secondary_recipient.GetShortUIName] , embora eu ache isso injusto."
 char_interaction.0220.a: "Ótimo."
 char_interaction.0221.desc: "Não posso trair o juramento de lealdade de [secondary_recipient.GetShortUIName]. Defenderei meu vassal[secondary_recipient.Custom('ES_OA')], mesmo que isso signifique romper o juramento que tenho com você."
 char_interaction.0221.a: "Isto é traição!"
 char_interaction.0230.title: "Renegado!"
 char_interaction.0230.desc.courtier: "[recipient.GetTitledFirstName] conseguiu evitar a captura e fugiu para o campo!"
 char_interaction.0230.desc.courtier_court_chaplain_stayed: "[recipient.GetTitledFirstName] conseguiu evitar ser capturad[recipient.Custom('ES_OA')]. Dizer que está disgustad[recipient.Custom('ES_OA')] com minhas ações seria muito pouco."
 char_interaction.0230.a: "Traidor!"
 char_interaction.0230.a_court_chaplain_stayed: "Bem, isto é... constrangedor."
 char_interaction.0231.title: "Justiça"
 char_interaction.0231.desc_prison: "[recipient.GetTitledFirstName] foi detido[recipient.Custom('ES_OA')] e aguarda seu destino, preso[recipient.Custom('ES_OA')] em minhas masmorras."
 char_interaction.0231.desc_house_arrest: "Por minhas ordens, [recipient.GetTitledFirstName|l] agora está confinado[recipient.Custom('ES_OA')] em sua casa. Coloquei alguns dos meus guardas para garantir que cumpra a prisão domiciliar."
 char_interaction.0231.desc_stockade: "Por minha ordem, [recipient.Custom('ES_ElLa')] [recipient.GetTitledFirstName|l] agora está confinad[recipient.Custom('ES_OA')] na estacada, onde aguarda seu destino."
 char_interaction.0231.a: "Ótimo."
 char_interaction.0232.desc: "Por tempo demais tenho suportado indignidades às mãos de [actor.Custom('ES_DelDela')] [actor.GetTitledFirstName|l].\n\n"
 char_interaction.0232.liege: "Não ficarei de braços cruzados enquanto noss[actor.Custom('ES_OA')] senhor[actor.Custom('ES_XA')] abusa de seus leais vassalos. Insto você a se juntar a mim na luta para depor semelhante tiran[actor.Custom('ES_OA')]."
 char_interaction.0232.regent: "Não ficarei de braços cruzados enquanto [actor.GetSheHe] abusa dos vassalos leais [ceremonial_liege.Custom('ES_DelDela')] [ceremonial_liege.GetTitledFirstName|l]. Eu lhe peço que se junte a mim na luta para destronar tamanho tirano[actor.Custom('ES_OA')]."
 char_interaction.0232.a: "Você não estará sozinho[recipient.Custom('ES_OA')]!"
 char_interaction.0232.b: "Você é o traidor[recipient.Custom('ES_XA')]!"
 char_interaction.0233.desc: "Por crimes contra a Coroa, você está, por meio desta, sob prisão."
 char_interaction.0233.a: "O quê!?! Isto é ultrajante!"
 marriage_interaction.0010.desc: "Aceito com prazer sua proposta de casamento!"
 marriage_interaction.0010.b_desc: "Aceito com prazer sua proposta de noivado!"
 marriage_interaction.0010.c_desc: "Aceito sua proposta de casamento."
 marriage_interaction.0010.d_desc: "Aceito sua proposta de noivado."
 marriage_interaction.0010.e_desc: "Eu, [secondary_recipient.GetFirstName], aceito com prazer sua mão em casamento!"
 marriage_interaction.0010.mid.a_desc: "\n\nVos[actor.Custom('ES_OA')] [actor.Custom2('RelationToMe', SCOPE.sC('secondary_actor'))], [secondary_actor.GetFirstName] e minha [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [secondary_recipient.GetFirstName], se unirão em [secondary_actor.Custom('GetCulturallyAppropriateMarriageReference')]."
 marriage_interaction.0010.mid.a_no_acquaintance_desc: "\n\nVos[secondary_actor.Custom('ES_OA')] cortesão[secondary_actor.Custom('ES_OA')], [secondary_actor.GetFirstName] e minha [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [secondary_recipient.GetFirstName], se unirá em [secondary_actor.Custom('GetCulturallyAppropriateMarriageReference')]."
 marriage_interaction.0010.mid.b_desc: "\n\nVocê será unido a meu [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [secondary_recipient.GetFirstName], em [secondary_actor.Custom('GetCulturallyAppropriateMarriageReference')]."
 marriage_interaction.0010.mid.c_desc: "\n\nTomarei gentilmente a mão de vostr[secondary_actor.Custom('ES_OA')] [actor.Custom2('RelationToMe', SCOPE.sC('secondary_actor'))], [secondary_actor.GetFirstName], em [secondary_actor.Custom('GetCulturallyAppropriateMarriageReference')]."
 marriage_interaction.0010.mid.c_no_acquaintance_desc: "\n\nTomarei graciosamente a mão de vostr[secondary_actor.Custom('ES_OA')] cortesã[secondary_actor.Custom('ES_OA')], [secondary_actor.GetFirstName] em [secondary_actor.Custom('GetCulturallyAppropriateMarriageReference')]."
 marriage_interaction.0010.mid.d_desc: "\n\nVosso[secondary_actor.Custom('ES_OA')] [actor.Custom2('RelationToMe', SCOPE.sC('secondary_actor'))], [secondary_actor.GetFirstName] ficará noivo(a) de meu [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [secondary_recipient.GetFirstName]."
 marriage_interaction.0010.mid.e_desc: "\n\nVocê ficará noivo de meu [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [secondary_recipient.GetFirstName]."
 marriage_interaction.0010.mid.f_desc: "\n\nTomei com gentileza a mão de vosstr[secondary_actor.Custom('ES_OA')] [actor.Custom2('RelationToMe', SCOPE.sC('secondary_actor'))], [secondary_actor.GetFirstName], quando chegar a hora."
 marriage_interaction.0010.mid.g_desc: "\n\nSeu [actor.Custom2('RelationToMe', SCOPE.sC('secondary_actor'))], [secondary_actor.GetFirstName], e eu seremos o melhor casal de #EMP todos#!!"
 marriage_interaction.0010.mid.h_desc: "\n\nVocê e eu seremos o melhor casal de #EMP todos#!!"
 marriage_interaction.0010.gwedding.desc: "\n\nTambém aguardo com expectativa o [GetActivityType('activity_wedding').GetName|l] prometido; tente não me decepcionar."
