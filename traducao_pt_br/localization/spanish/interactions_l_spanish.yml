 char_interaction.0361.desc: "Tanto sua covardia patética quanto suas ofertas miseráveis estão abaixo de nós."
 char_interaction.0361.a: "Palavras de luta, que não esquecerei tão cedo."
 char_interaction.0362.opening: "[recipient.Custom2('AppropriateGreetingPositive', actor )]"
 char_interaction.0362.desc: "[actor.GetFirstName], quaisquer riquezas que [recipient.GetPrimaryTitle.GetName] possa reunir serão dedicadas à sua glória!"
 char_interaction.0362.a: "Aceito sua graciosa oferta de tributo."
