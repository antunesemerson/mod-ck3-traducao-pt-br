 liege_offer_council_position_exchange: "\nDeterminei que é necessário reorganizar meu conselho. Com efeito imediato, você passará a me servir como meu [target.GetPositionName].\n"
 liege_offer_council_position_liked: "\nFostes um[ROOT.Char.Custom('ES_XA')] súdito[ROOT.Char.Custom('ES_OA')] leal e devot[ROOT.Char.Custom('ES_OA')]o, e desejo recompensar vossos serviços.\n\nEm reconhecimento, e por meio desta, vos ofereço o cargo de [target.GetPositionName] de [actor.GetPrimaryTitle.GetNameNoTierNoTooltip].\n"
 liege_offer_council_position_powerful: "\nComo [recipient.GetTitleAsNameNoTooltip] influente, é justo que você tenha voz em meu conselho.\n\nAssim, por meio desta, ofereço a você o cargo de [target.GetPositionName] de [actor.GetPrimaryTitle.GetNameNoTierNoTooltip].\n"
 liege_offer_council_position_disliked: "\nCheguei à inexorável conclusão de que realmente sois o(a) melhor candidat[target.Char.Custom('ES_OA')] para o cargo vago que tenho no meu conselho.\n\nEmbora me doa fazer isso, infelizmente, vejo-me obrigado a oferecer-vos o cargo de [target.GetPositionName] de [actor.GetPrimaryTitle.GetNameNoTierNoTooltip].\n"
 liege_offer_council_position_skilled: "\nSeus consideráveis talentos não passaram despercebidos, [recipient.GetFirstNameNoTooltip].\n\nEm reconhecimento às suas habilidades, gostaria de lhe oferecer o cargo de [target.GetPositionName] de [actor.GetPrimaryTitle.GetNameNoTierNoTooltip].\n"
 liege_offer_council_position_fallback: "\nA fortuna sorri para vós, [recipient.GetFirstNameNoTooltip] pois preciso de um novo [target.GetPositionName] e sois o(a) únic[target.Char.Custom('ES_OA')] candidat[target.Char.Custom('ES_OA')] disponível.\n\nAceitais o cargo, não é?\n"
