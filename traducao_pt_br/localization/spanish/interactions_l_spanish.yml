 council_interaction.0011.desc: "Ultimamente, minha atenção tem sido exigida em excesso, e estou tendo dificuldade para cuidar de todas as minhas responsabilidades.\n\nAlgo precisa ceder, e acredito que será melhor para nós dois se eu renunciar ao cargo de [council_task.GetPositionName]."
