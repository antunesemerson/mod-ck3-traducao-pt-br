 end_war_attacker_victory_attacker_desc: "\nEstá claro para todos que eu o derrotei. Por que continuar resistindo? Há certa dignidade em aprender a aceitar o próprio destino."
 end_war_attacker_victory_defender_desc: "\nVocê me derrotou. Não posso mais resistir — por meio desta me rendo a você e a seus exércitos. Apenas deixe-me manter minha dignidade."
 end_war_attacker_white_peace_attacker_desc: "\nAgora está claro para mim que errei ao atacá-lo. Sangue demais já foi derramado nesta guerra — vamos acabar com essa luta sem sentido."
 end_war_attacker_white_peace_defender_desc: "\nJá não foi derramado sangue demais nesta sua guerra sem sentido? Nenhum de nós tem nada a ganhar continuando a lutar. Vamos fazer a paz."
 end_war_attacker_defeat_attacker_desc: "\nQueria saber o que me fez pensar que eu poderia enfrentar um inimigo tão formidável quanto você. Infelizmente, não posso mudar o passado, apenas o futuro.\n\nEu me rendo a você — vamos seguir em frente e deixar este conflito para trás."
 end_war_attacker_defeat_defender_desc: "\nVocê pode ter pensado que poderia me derrotar, mas eu provei que estava enganado. Não torne isso mais confuso do que precisa ser — renda-se, e vamos acabar com esta guerra."
