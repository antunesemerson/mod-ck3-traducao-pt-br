 marriage_interaction.0010.ending.c_recipient_desc: "\n\nQue possamos trazer felicidade e realização um ao outro!"
 marriage_interaction.0010.ending.c_both_desc: "\n\nQue possamos trazer felicidade e realização um ao outro, meu [secondary_actor.Custom('ComplimentAdjective')] [secondary_actor.Custom('WifeHusband')]!"
 #Strength and support
 marriage_interaction.0010.ending.h_desc: "\n\nQue encontrem força e apoio um no outro!"
 marriage_interaction.0010.ending.h_actor_desc: "\n\nQue vocês encontrem força e apoio um no outro!"
 marriage_interaction.0010.ending.h_recipient_desc: "\n\nQue encontremos força e apoio um no outro!"
