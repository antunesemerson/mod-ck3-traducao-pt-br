 KNIGHTS_VIEW_TITLE_FORBID_TT: "#T Prohibir a [Character.GetShortUIName] convertirse en caballero#!\n\n[Character.GetShortUIName] #emphasis nunca#! podrá unirse a tus [armies|lE] como caballero. Esto le impedirá morir en [battle|lE]."
 CREATE_ACCOLADE_FORBID_TT: "#T Prohibir a [CreateAccoladeView.GetSelectedKnight.GetShortUIName] convertirse en $knight_culture_player$#!\n\n[CreateAccoladeView.GetSelectedKnight.GetShortUIName] #emphasis nunca#! podrá unirse a tus [armies|lE] como $knight_culture_player_no_tooltip$. Esto le impedirá morir en [battle|lE]."
 KNIGHTS_VIEW_TITLE_BY_PROWESS_TT: "#T Permitir a [Character.GetShortUIName] convertirse en caballero#!\n\n[Character.GetShortUIName] podrá unirse a tus [armies|lE] como caballero si su [prowess|lE] es de las mayores del [realm|lE]"
 CREATE_ACCOLADE_BY_PROWESS_TT: "#T Permitir [CreateAccoladeView.GetSelectedKnight.GetShortUIName] como $knight_culture_player$#!\n\n[CreateAccoladeView.GetSelectedKnight.GetShortUIName] poderá se juntar às suas [armies|lE] como $knight_culture_player_no_tooltip$ se sua [prowess|lE] estiver entre as mais altas do [realm|lE]"
 KNIGHTS_VIEW_TITLE_FORCE_TT: "#T Obligar a [Character.GetShortUIName] convertirse en caballero#!\n\n[Character.GetShortUIName] #emphasis debe#! unirse a tus [armies|lE] como caballero, independientemente de su [prowess|lE]. Puede ocupar el lugar de un caballero con mayor destreza."
 CREATE_ACCOLADE_FORCE_TT: "#T Forçar [CreateAccoladeView.GetSelectedKnight.GetShortUIName] a ser $knight_culture_player$#!\n\n[CreateAccoladeView.GetSelectedKnight.GetShortUIName] #emphasis deve#! se juntar às suas [armies|lE] como $knight_culture_player_no_tooltip$, independentemente de sua [prowess|lE]. Pode ocupar o lugar de um $knight_culture_player_no_tooltip$ com maior destreza."
