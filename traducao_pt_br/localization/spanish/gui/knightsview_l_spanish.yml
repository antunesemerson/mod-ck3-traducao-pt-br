 #this is can_be_knight_trigger in 00_war_and_peace_triggers.txt
 KNIGHT_RESTRICTIONS_TT: "#T Restrições de [knights|El]#!\nSomente seus [vassals|El] diretos, [courtiers|El] ou [followers|El] podem servir como [knights|El].\nSua [culture|El] ou [faith|El] determina quais gêneros podem servir como [knights|El].\n\nUm cavaleiro não pode ser:\n - Jogador, [child|El], [prisoner|El] ou [GetTrait('incapable').GetName(GetPlayer.Self)|l]\n - Membro do [clergy|El] (a menos que sua [faith|El] ou [culture|El] permitam)\n - [master_assassin|El] ou [GetTrait('blind').GetName(GetPlayer.Self)|l] (a menos que sua [culture|El] permita ou seja [GetTrait('order_member').GetName(GetPlayer.Self)|l])\n - [diarch|E] ou [ceremonial_liege|El]\n - [governor|El] de um [duchy|El] (ou um [title|El] superior) ou [house_head|El] de uma [noble_family|El]\n\nAs [traditions|El] culturais ou eventos podem remover algumas restrições"
 KP_CULTURE_MINIMUM_PROWESS: "@alert_icon! Sua [culture|lE] requer pelo menos 12 de [prowess|El]"
 KP_CULTURE_ADMIN_FAMILY_KNIGHTS: "@check_icon! Seu [culture|lE] elimina algumas restrições de gênero para as [wars|El] defensivas"
 KP_CULTURE_HIGH_PROWESS: "@check_icon! Seu [culture|lE] remove a maioria das restrições para os [knights|El] com uma [prowess|El] mínima de 10"
