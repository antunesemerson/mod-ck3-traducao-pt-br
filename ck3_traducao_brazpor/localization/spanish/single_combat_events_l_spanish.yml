 ## Defender Lost, Opponent Finishing Move Injury
 single_combat.0031.desc.opponent_response.wait_and_hope.injury: "que me atinge bem nos nós dos dedos da mão onde levo [sc_loser.Custom('signature_weapon')].\n\nPor reflexo, meus dedos se abrem, deixando minha arma cair no chão com estrondo.\n\nNós nos olhamos com #EMP incredulidad#! durante alguns segundos até que [sc_victor.GetFirstNameNoTooltip] ergue [sc_victor.Custom('signature_weapon')] hesitante. "R-renda-se ou morra!"."
 single_combat.0031.desc.opponent_response.unsure_attack.injury: "e apesar da timidez do golpe, ele me pega desprevenido e caio de lado.\n\nEmbora consiga me levantar, um[sc_victor.Custom('ES_XA')] extasiad[sc_victor.Custom('ES_OA')] [sc_victor.GetFirstNameNoTooltip] já tem [sc_victor.Custom('signature_weapon')] em posição, dispost[sc_victor.Custom('ES_OA')] a [sc_victor.Custom('SignatureWeaponKillTypeGroinFirstPersonFuture')] com apenas um puxão."
 single_combat.0031.desc.opponent_response.enthusiastic_onslaught.injury: "que quase arranca [sc_loser.Custom('signature_weapon')] da minha mão.\n\n[sc_victor.GetSheHe] só precisa de um golpe para me colocar de joelhos. Antes que eu consiga levantar minha guarda novamente, [sc_victor.Custom('SignatureWeaponTipType')] de [sc_victor.Custom('signature_weapon')] de [sc_victor.GetFirstNameNoTooltip] pressiona-se com entusiasmo contra a minha garganta."
 single_combat.0031.desc.opponent_response.hail_mary.injury: "Por um momento, sua insolência me diverte, até que sinto algo se prender na parte de trás da minha perna.\n\nNum instante, estou no chão e [sc_victor.GetFirstNameNoTooltip] está sobre mim, exatamente tão surpres[sc_victor.Custom('ES_OA')] quanto eu. No entanto, o braço onde carrega [sc_victor.Custom('signature_weapon')] permanece firme e ameaçador."
 single_combat.0031.desc.opponent_response.pocket_sand.injury: "algo pesado me derruba debaixo dos joelhos.\n\nPisco rapidamente, tentando clarear a visão, e a imagem enevoada que surge diante de mim é a de [sc_victor.Custom('signature_weapon')] se preparando para [sc_victor.Custom('SignatureWeaponKillTypeGroinFirstPersonFuture')]."
 single_combat.0031.desc.opponent_response.nut_em.injury: "e caio como um saco de tijolos.\n\nPor #EMP [sc_loser.GetFaith.HighGodName]#!, que cabeça mais #EMP ridiculamente#! dura tem es[sc_victor.Custom('ES_EA')] [sc_victor.GetWomanMan].\n\nO mundo ainda gira para mim, faixas brancas de agonia rasgam minha visão quando olho para cima e vejo [sc_victor.GetFirstNameNoTooltip] preparando [sc_victor.Custom('signature_weapon')] para [sc_victor.Custom('SignatureWeaponKillTypeFirstPersonFuture')] com um único golpe rápido."
 single_combat.0031.desc.opponent_response.guard.injury: "e então, com uma parada-estocada #EMP instantánea#! me tira [sc_loser.Custom('signature_weapon')] da mão.\n\nMal tenho tempo de piscar.\n\nExalando confiança, meu rival adota uma postura ofensiva, preparando-se para [sc_loser.Custom('SignatureWeaponKillTypeFirstPersonFuture')]."
 single_combat.0031.desc.opponent_response.probing_attack.injury: "desgastando minha determinação a cada vez com [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] com grande precisão.\n\nFaço o possível para afastar [sc_victor.GetHerHim], mas no fim ele acaba arrancando [sc_loser.Custom('signature_weapon')] da minha mão.\n\nSó me restam segundos antes que meu corpo acabe [sc_loser.Custom('SignatureWeaponKillTypePastParticiple')]."
 single_combat.0031.desc.opponent_response.onslaught.injury: "obrigando-me a recuar repetidas vezes.\n\nNão demora muito até que eu desmorone, caindo de costas com estrondo. [sc_victor.GetFirstNameNoTooltip] [sc_victor.Custom('SignatureWeaponActionThirdPerson')] [sc_victor.Custom('signature_weapon')] mais uma vez sobre meu corpo caído, dispost[sc_victor.Custom('ES_OA')] a acabar comigo em um instante."
 single_combat.0031.desc.opponent_response.surprise_attack.injury: "pegando-me de surpresa. O golpe me faz girar meio corpo com tanta força que quase caio no chão.\n\nAntes que eu possa me recuperar, [sc_victor.GetSheHe] reposicionou [sc_victor.Custom('signature_weapon')], dispost[sc_victor.Custom('ES_OA')] para um golpe fatal. Nós dois congelamos, pensando no próximo movimento, e fica claro que o golpe de [sc_victor.GetFirstNameNoTooltip] poderá [sc_victor.Custom('SignatureWeaponKillTypeFirstPersonFuture')] antes que eu consiga desviar ou aparar."
 single_combat.0031.desc.opponent_response.taunt.injury: "jogo fora [sc_loser.Custom('signature_weapon')] e tento estrangulá[sc_victor.GetHerHim]-o.\n\nSó quando [sc_victor.GetFirstNameNoTooltip] balança [sc_victor.Custom('signature_weapon')] que percebo o que fiz."
 single_combat.0031.desc.opponent_response.put_the_boot_in.injury: "Faço o meu melhor, mas meu oponente parte direto para uma sequência de [sc_victor.Custom('SignatureWeaponAttemptedLightPlural')] em sucessão e logo caio no chão, atordoad[sc_loser.Custom('ES_OA')] e ofegante.\n\nApesar de ainda ter [sc_loser.Custom('signature_weapon')] em mãos, [sc_victor.Custom('signature_weapon')] de [sc_victor.GetFirstNameNoTooltip] está prestes a [sc_victor.Custom('SignatureWeaponKillTypeHeadFirstPersonFuture')]."
 single_combat.0031.desc.opponent_response.strict_guard.injury: "me faz cambalear.\n\nAntes que eu consiga me endireitar, [sc_victor.GetFirstNameNoTooltip] está sobre mim novamente, [sc_victor.Custom('signature_weapon')] voando em direção à minha cabeça com [sc_victor.Custom('SignatureWeaponEndType')] para a frente até eu acabar com a [sc_loser.Custom('MaskFace')] cheia de [sc_victor.Custom('SignatureWeaponEndMaterial')] da arma.\n\nMal percebo que [sc_loser.Custom('signature_weapon')] escapa de minha mão."
 single_combat.0031.desc.opponent_response.confident_attack.injury: "dando-me uma surra tão grande que minha guarda vacila o suficiente para que [sc_victor.GetSheHe] tenha a abertura #EMP perfecta#!.\n\nCom um golpe poderoso, me faz recuar aos tropeços e faz minha [sc_loser.Custom('signature_weapon')] voar.\n\nAgora um passo em falso significa a morte."
 single_combat.0031.desc.opponent_response.expert_onslaught.injury: "Esmagando-me com cada golpe, machucando meus ossos com cada aparada, até que desabo no chão como um amontoado quase quebrado.\n\nSinto tanto frio, tanta tontura, é como se minha cabeça pulsasse, mas minha mente estivesse em outro cômodo. O que…? Estamos girando? Estou girando?\n\nUm pedaço de catarro ensanguentado sai da minha boca com uma tosse rouca; o espasmo faz com que eu solte [sc_loser.Custom('signature_weapon')]. [sc_victor.GetFirstNameNoTooltip] afasta a arma com um chute e então encosta o metal frio de [sc_victor.Custom('signature_weapon')] contra minha garganta."
 single_combat.0031.desc.opponent_response.attempt_disarm.injury: "Nos encaramos por um instante. É um silêncio tenso e estranho, ambos esperando que o outro faça o próximo movimento.\n\n[sc_victor.GetFirstNameNoTooltip] [sc_victor.Custom('SignatureWeaponFlourishThirdPersonPresentParticiple')] [sc_victor.Custom('signature_weapon')] de modo ameaçador e ergue uma sobrancelha."
 ### No need for a lightning_assault, as you can't end the duel in the first round.
 single_combat.0031.desc.opponent_response.tire_opponent.injury: "Sinto minha pegada em [sc_loser.Custom('signature_weapon')] enfraquecer.\n\nMeu oponente deve ter percebido algo na minha postura, porque um golpe amplo e firme de [sc_victor.Custom('signature_weapon')] faz minha arma voar.\n\nEstou à mercê dele."
 single_combat.0031.desc.opponent_response.reason_you_suck_speech.injury: "minha guarda se rompe de pura frustração.\n\nNesse #EMP justo#! momento [sc_victor.GetSheHe] ataca, [sc_victor.Custom('SignatureWeaponAttemptedLight')] que me arranca [sc_loser.Custom('signature_weapon')] da minha mão com uma floritura praticada.\n\n\"Não tema [sc_victor.GetFirstNameNoTooltip]; você ainda tem um domínio melhor sobre [sc_loser.Custom('signature_weapon')] do que sobre seu [sc_loser.GetPrimaryTitle.GetTierAsNameNoTooltip]\"."
 single_combat.0031.desc.opponent_response.technique_from_legend.injury: "Numa cena tão pitoresca que poderia ter saído diretamente de uma lenda, meu oponente despedaça minha guarda e arranca [sc_loser.Custom('signature_weapon')] da minha mão antes de desferir um golpe [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] devastador que me joga ao chão.\n\n[sc_victor.Custom('signature_weapon')|U] erguida, ignorando minha boca escancarada, prepara-se para [sc_victor.Custom('SignatureWeaponKillTypeGroinFirstPersonFuture')]."
 single_combat.0031.desc.opponent_response.like_a_viper.injury: "Tento desviar o golpe dessa víbora, mas é inútil. Meu oponente aproveita a oportunidade para enganchar minha [sc_loser.Custom('signature_weapon')] e torcê-la na direção errada, arrancando a arma pateticamente para longe do meu alcance.\n\n[sc_victor.Custom('signature_weapon')] de [sc_victor.GetFirstNameNoTooltip] repousa sobre meu peito, bem diante do meu coração acelerado."
 single_combat.0031.desc.opponent_response.pocket_silver.injury: "leva [sc_victor.Custom('signature_weapon')] #EMP dentro#! da minha guarda, bem debaixo da minha garganta.\n\nSacudo [sc_loser.Custom('signature_weapon')] por instinto, ponderando minhas opções em um silêncio constrangedor.\n\n[sc_victor.GetFirstNameNoTooltip] me franze a testa e tensiona os músculos, pronto para atacar."
 single_combat.0031.desc.opponent_response.martial_voice.injury: "Pulando para trás tão rápido que quase deixo minha pele para trás, leva uma fração de segundo até eu perceber que [sc_loser.Custom('signature_weapon')] não pulou comigo, girando pelo ar até onde a deixei cair, me deixando indefes[sc_loser.Custom('ES_OA')] enquanto [sc_victor.GetFirstNameNoTooltip] se prepara para um segundo golpe."
 single_combat.0031.desc.opponent_response.mocking_boast.injury: "acerta um golpe sólido na mão em que seguro [sc_loser.Custom('signature_weapon')] com [sc_victor.Custom('SignatureWeaponEndType')] de [sc_loser.Custom('signature_weapon')] que empunha, fazendo a arma sair voando da minha mão.\n\nMeu oponente se prepara para [sc_victor.Custom('SignatureWeaponKillTypeFirstPersonFuture')] com um floreio e um sorrisinho.\n\n"Agora, o que diz o perdedor[sc_loser.Custom('ES_XA')]?""
 ### No need for an is_that_a_crocodile, as it's never just an injury.
 single_combat.0031.desc.opponent_response.desert_warrior.injury: "fazendo [sc_victor.Custom('SignatureWeaponAttemptedLightPlural')] com uma precisão que acaba me derrubando, exaust[sc_loser.Custom('ES_OA')] no(a) [sc_defender.Custom('GroundType')].\n\nRolei para o lado e me deparo com [sc_victor.GetFirstNameNoTooltip] que se prepara para [sc_victor.Custom('SignatureWeaponKillTypeHeadFirstPersonFuture')], [sc_victor.Custom('signature_weapon')] já erguida(o) no alto."
 single_combat.0031.desc.opponent_response.jungle_stalker.injury: "chutando-me #EMP fuerte#! na virilha, fazendo-me encolher com um grito.\n\nNo chão, me debato por alguns segundos, tentando me livrar dessa maldita planta demoníaca, amaldiçoando a dor aguda nas minhas entranhas, até parar abruptamente quando sinto o metal frio de [sc_victor.Custom('SignatureWeaponTipType')] de [sc_victor.Custom('signature_weapon')] pressionado contra minha testa."
 single_combat.0031.desc.opponent_response.open_terrain_expert.injury: "Poucos instantes depois, começo a cambalear, exaust[sc_loser.Custom('ES_OA')], e meu oponente me joga no chão com [sc_victor.Custom('SignatureWeaponAttemptedHeavy')].\n\nTento me levantar, mas a bota de [sc_victor.GetFirstNameNoTooltip] se apoia sobre meu peito e ergue [sc_victor.Custom('signature_weapon')] para [sc_victor.Custom('SignatureWeaponKillTypeHeadFirstPersonFuture')]."
 single_combat.0031.desc.opponent_response.rough_terrain_expert.injury.rocky: "Caio de costas por uma pequena descida, caindo mal entre as rochas, por pouco não atingindo minha própria arma de assinatura.\n\nErgo-me como posso, mas o metal frio de [sc_victor.Custom('signature_weapon')] de [sc_victor.GetFirstNameNoTooltip] já me pressiona a nuca."
 single_combat.0031.desc.opponent_response.rough_terrain_expert.injury.boggy: "Caio de costas direto em uma poça de água barrenta e lamacenta.\n\n[sc_loser.Custom('signature_weapon')|U] escapa da minha mão de imediato, e me debato para manter a cabeça acima da água, puxar ar e cuspir a água do pântano fétido.\n\nUma bota pisa suavemente sobre a [sc_loser.Custom('MaskFace')], mantendo-me mal acima da superfície e ameaçando me afundar."
 single_combat.0031.desc.opponent_response.forest_fighter.injury: "o toco de árvore ao qual ele me empurra.\n\nCaio de cabeça e [sc_loser.Custom('signature_weapon')] voa para a vegetação rasteira. Antes que eu consiga me levantar, um chute forte me derruba entre as folhas, e o metal frio de [sc_victor.Custom('signature_weapon')] pressiona com força contra a minha garganta."
 single_combat.0031.desc.opponent_response.raaargh.injury: "arremessando-me como uma boneca de pano.

Caio de costas, perdendo [sc_victor.Custom('signature_weapon')], e [sc_victor.GetSheHe] se ergue sobre mim, com #EMP ódio#! assassino e animal em [sc_victor.GetHerHis] [sc_victor.Custom('EyeEyes')]. É assim… é assim que vou morrer.

Tão rápido quanto veio, a raiva desaparece, deixando [sc_victor.GetFirstNameNoTooltip] oscilando levemente, ainda quase pront[sc_victor.Custom('ES_OA')] para [sc_victor.Custom('SignatureWeaponKillTypeFirstPersonFuture')] apesar da calma momentânea."
 single_combat.0031.desc.opponent_response.hard_grit.injury: "dançando em direção aos meus golpes, só para se esquivar no último instante.\n\nEstou quase enfeitiçad[sc_loser.Custom('ES_OA')] quando [sc_loser.Custom('signature_weapon')] desaparece num piscar de olhos. A arma se afasta com um estrondo, deixando-me indefes[sc_loser.Custom('ES_OA')] enquanto [sc_victor.GetFirstNameNoTooltip] se prepara para [sc_victor.Custom('SignatureWeaponKillTypeFirstPersonFuture')]."
 single_combat.0031.desc.opponent_response.feint_and_stab.injury: "[sc_victor.Custom('SignatureWeaponAttemptedHeavy')] que chega inesperadamente e me desequilibra.\n\n[sc_victor.GetFirstNameNoTooltip] avança, trazendo [sc_victor.Custom('signature_weapon')] a um palmo de minha [sc_loser.Custom('MaskFace')].\n\n"Rendam-se, por [sc_victor.GetFaith.WarGodName], ou morram!"."
 single_combat.0031.desc.opponent_response.butchery.injury: "culmina em um rugido gutural e [sc_victor.Custom('SignatureWeaponAttemptedHeavyPlural')] em cascata que me põem de joelhos.\n\nTento erguer [sc_loser.Custom('signature_weapon')] para aparar outro golpe devastador, apenas para levar uma joelhada rápida na [sc_loser.Custom('MaskFace')].\n\nMe curvo para trás contra o/a [sc_defender.Custom('GroundType')], minha visão turva até que, de repente, avisto o brilho de [sc_victor.Custom('SignatureWeaponTipType')] de [sc_victor.Custom('signature_weapon')] de [sc_victor.GetFirstNameNoTooltip]."
 single_combat.0031.desc.opponent_response.stoic_veteran.injury: "[sc_victor.Custom('SignatureWeaponTipType')] de [sc_victor.Custom('signature_weapon')] contra minha [sc_loser.Custom('MaskFace')], inexoravelmente perto."
 single_combat.0031.desc.opponent_response.blade_dance.injury: "devolvendo-me à dolorosa realidade.\n\nAntes que eu possa voltar a me defender, o golpe seguinte de [sc_victor.GetFirstNameNoTooltip] arranca [sc_loser.Custom('signature_weapon')] da minha mão, deixando-me expost[sc_loser.Custom('ES_OA')] e vulnerável."
 single_combat.0031.desc.opponent_response.wrath_of_highgod.injury: "[sc_victor.Custom('SignatureWeaponAttemptedHeavy')] que chega inesperadamente e me desequilibra.\n\n[sc_victor.GetFirstNameNoTooltip] avança, trazendo [sc_victor.Custom('signature_weapon')] a um palmo de minha [sc_loser.Custom('MaskFace')].\n\n"Rendam-se, por [sc_victor.GetFaith.WarGodName], ou morram!"."
 single_combat.0031.desc.opponent_response.hurt_me_better.injury: "de algum modo ultrapassa minha guarda e [sc_victor.Custom('SignatureWeaponKillTypeTorsoThirdPersonActive')].\n\nRecuo, [sc_victor.Custom('signature_weapon')] sai da ferida com um som de sucção, encharcando o chão aos meus pés, e abro a boca sem conseguir falar.\n\n[sc_victor.GetFirstNameNoTooltip] parece tão impactad[sc_victor.Custom('ES_OA')] quanto eu."
 single_combat.0031.desc.opponent_response.special_fallback.injury: "e eu cambaleio para trás.\n\nDeve ter me acertado em algum lugar, mas a dor súbita é intensa demais para eu saber exatamente onde. Sinto sangue quente que corre pelo meu peito, a agonia se irradia rapidamente, espalhando-se pelo meu torso superior.\n\n[sc_victor.GetFirstNameNoTooltip] agita [sc_victor.Custom('signature_weapon')], avançando para [sc_victor.Custom('SignatureWeaponKillTypeFirstPersonFuture')]."
 single_combat.0031.desc.opponent_response.something_to_hide.injury: "que pareciam ridículas. Pelo menos até que um deles me acerta na mão de [sc_loser.Custom('signature_weapon')], fazendo minha arma sair voando.\n\nTenho tempo apenas para erguer a mão em defesa quando [sc_victor.GetFirstNameNoTooltip] se aproxima e [sc_victor.Custom('SignatureWeaponKillTypeGroinThirdPersonActive')] com [sc_victor.Custom('signature_weapon')].[sc_victor.Custom('SignatureWeaponKillTypeGroinThirdPersonActive_Aftermath')].\n\nMinha boca se abre sem palavras, a dor é intensa demais para eu conseguir fazer mais do que engasgar."
 ## Defender Lost, Opponent Finishing Move Fatality
 single_combat.0031.desc.opponent_response.wait_and_hope.fatality: "há uma explosão de puro tormento direto nas minhas entranhas.\n\nTombo para trás, e alguma coisa me acerta sob o queixo, abrindo fundo o osso da minha mandíbula. Sangue arterial jorra livremente do ferimento, e minha vida escorre para o [sc_defender.Custom('GroundType')] enquanto eu desabo no chão."
 single_combat.0031.desc.opponent_response.unsure_attack.fatality: "e tudo fica escuro. Minha visão simplesmente… para de funcionar. Agito minha [sc_loser.Custom('signature_weapon')] desesperadamente, tentando afastar [sc_victor.Custom('ES_AlAla')] [sc_victor.GetWomanMan] hostil que tenta me matar.\n\nNão adianta, pois sinto algo [sc_victor.Custom('SignatureWeaponWoundVerb1')] se profundamente no meu ombro, abrindo um caminho sangrento pelo meu corpo.\n\nCambaleio e vacilo, tossindo uma mistura de catarro acobreado: [sc_victor.GetFirstNameNoTooltip] deve ter atingido um pulmão."
 single_combat.0031.desc.opponent_response.enthusiastic_onslaught.fatality: "até que um golpe meu mal encaixado arranca a arma da minha mão.\n\n[sc_victor.GetFirstNameNoTooltip] não perde tempo em desferir [sc_victor.Custom('SignatureWeaponAttemptedLightPlural')] consecutivos, arrancando tiras ensanguentadas da minha carne a cada golpe.\n\nCaio de joelhos, arfando, tossindo grossos fios vermelhos de saliva. [sc_victor.Custom('MaskFace')|U] de [sc_victor.GetFirstNameNoTooltip] está impassível enquanto se prepara para o golpe mortal"
 single_combat.0031.desc.opponent_response.hail_mary.fatality: "fazendo-me recuar e ficando cada vez mais desequilibrad[sc_loser.Custom('ES_OA')] até que um golpe errante me faz cair.\n\nNão consigo me levantar do chão, pois [sc_victor.Custom('signature_weapon')] de [sc_victor.GetFirstNameNoTooltip] acaba [sc_victor.Custom('SignatureWeaponKillTypeRearTorsoPresentParticiple')] com [sc_victor.Custom('SignatureWeaponAttemptedHeavy')]."
 single_combat.0031.desc.opponent_response.pocket_sand.fatality: "impossíveis de repelir. Paro as duas ou três primeiras investidas, mas a quarta me arranca [sc_loser.Custom('signature_weapon')] de [sc_loser.Custom('HandHands')] e a quinta me tira o ar dos pulmões.\n\nMal tenho tempo de perceber o que está acontecendo antes que [sc_victor.Custom('signature_weapon')] de [sc_victor.GetFirstNameNoTooltip] [sc_victor.Custom('SignatureWeaponWoundVerb2ThirdPersonPresent')] profundamente na minha caixa torácica, despedaçando ossos e rasgando carne.\n\nDesabo para trás, arfando, morrendo. Meu peito arde em brasa e meus membros já estão frios; minha consciência parece escorrer pela ferida escancarada."
 single_combat.0031.desc.opponent_response.nut_em.fatality: "fazendo minha [sc_loser.Custom('signature_weapon')] sair girando de minhas mãos.\n\nRecuo rapidamente, mas não tão rápido quanto [sc_victor.GetFirstNameNoTooltip] possa se lançar, [sc_victor.Custom('SignatureWeaponKillTypeFirstPersonPresentParticiple')] com um movimento rápido.\n\nA vida jorra de mim, e eu desabo, com lucidez suficiente para olhar meu assassinat[sc_victor.Custom('ES_OA')] nos olhos."
 single_combat.0031.desc.opponent_response.guard.fatality: "abandono a guarda e me lanço contra [sc_victor.GetSheHe].\n\nNão é de se estranhar que meu ataque temerário deixe minha barriga exposta."
 single_combat.0031.desc.opponent_response.probing_attack.fatality: "Aproveitando bem a abertura, [sc_victor.GetFirstNameNoTooltip] passa fluidamente para [sc_victor.Custom('SignatureWeaponAttemptedLight')] que me arranca [sc_loser.Custom('signature_weapon')] da mão.\n\n[sc_victor.GetSheHe|U] já está executando o revés antes que eu consiga esquivar do ataque, [sc_victor.Custom('SignatureWeaponWoundVerb1PresentParticiple')] [sc_victor.Custom('signature_weapon')] mortalmente no meu peito."
 single_combat.0031.desc.opponent_response.onslaught.fatality: "rasga minha guarda. Outro golpe me provoca uma sacudida de dor gelada pelo peito e o braço onde levo [sc_loser.Custom('signature_weapon')] fica pendendo inútil ao meu lado.\n\nNão sinto o membro, não consigo mover as pernas, não posso fazer nada.\n\n[sc_victor.Custom('SignatureWeaponAttemptedHeavy')|U] mais [sc_victor.Custom('SignatureWeaponCriticalPresent')] meu peito e eu cambaleio, oscilando no lugar.\n\n[sc_victor.GetFirstNameNoTooltip] prepara [sc_victor.Custom('signature_weapon')] para o golpe final"
 single_combat.0031.desc.opponent_response.surprise_attack.fatality: "até que um golpe de raspão inesperado me abre bem no ventre.\n\nO golpe me faz recuar, algo carnudo e de vermelho-escuro desliza para fora do ferimento enquanto eu desabo no [sc_defender.Custom('GroundType')].\n\nA dor me domina. Eu já sangrei tanto assim antes? Minha [sc_loser.Custom('signature_weapon')] é chutada para longe, mas eu já não consigo me importar.\n\nAcima de mim, [sc_victor.GetFirstNameNoTooltip] prepara seu golpe final com [sc_victor.Custom('signature_weapon')]."
 single_combat.0031.desc.opponent_response.taunt.fatality: "que me golpeia, forçando-me a cair no chão como uma massa de carne que grita.\n\nMinha visão vacila, e a vista se esvai sob a dor, mas ainda consigo distinguir pedaços machucados da minha carne agarrados a [sc_victor.Custom('signature_weapon')] de [sc_victor.GetFirstNameNoTooltip].\n\nO próximo golpe pega minha garganta, cortando meus gritos com uma misericórdia sangrenta."
 single_combat.0031.desc.opponent_response.put_the_boot_in.fatality: "Antes que eu consiga protestar, [sc_victor.GetFirstNameNoTooltip] enfia um [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] na minha caixa torácica, e tudo se reduz a dor ardente.\n\nSinto os dois golpes seguintes, mas vagamente, como através de névoa ou de um sudário espesso. Minha visão encolhe até um ponto."
 single_combat.0031.desc.opponent_response.strict_guard.fatality: "rasga minha guarda. Outro golpe me provoca uma sacudida de dor gelada pelo peito e o braço onde levo [sc_loser.Custom('signature_weapon')] fica pendendo inútil ao meu lado.\n\nNão sinto o membro, não consigo mover as pernas, não posso fazer nada.\n\n[sc_victor.Custom('SignatureWeaponAttemptedHeavy')|U] mais [sc_victor.Custom('SignatureWeaponCriticalPresent')] meu peito e eu cambaleio, oscilando no lugar.\n\n[sc_victor.GetFirstNameNoTooltip] prepara [sc_victor.Custom('signature_weapon')] para o golpe final"
 single_combat.0031.desc.opponent_response.confident_attack.fatality: "uma abertura conveniente surge na minha guarda.\n\nO golpe seguinte rasga uma ferida aberta em meu estômago, lançando sangue, bílis e comida semidigerida sobre minhas botas.\n\nGrito, com uma dor inimaginável, agarrando minhas vísceras expostas. Talvez seja tudo coisa da minha cabeça, mas imagino que um lampejo de piedade passa pela [sc_victor.Custom('MaskFace')] de [sc_victor.GetFirstNameNoTooltip] enquanto ergue [sc_victor.Custom('signature_weapon')] para pôr fim ao meu sofrimento."
 single_combat.0031.desc.opponent_response.expert_onslaught.fatality: "Grito de frustração.\n\nParece que era #EMP precisamente#! exatamente [sc_victor.GetFirstNameNoTooltip] que [sc_victor.Custom('SignatureWeaponWoundVerb5')] [sc_victor.Custom('signature_weapon')] em minha garganta.\n\nComeço a engasgar e sufocar quase imediatamente, o ar nunca chega. Só sangue. Coágulos de sangue espessa, cheia de saliva, que brotam da minha garganta e saem pela minha boca."
 single_combat.0031.desc.opponent_response.attempt_disarm.fatality: "Vou bloquear, mas calculo mal… Tudo gira ao meu redor, e sinto um movimento vertiginoso e nauseante me dominar até minha cabeça bater em algo com um #EMP paf#! que soa como carne.\n\nNão sinto nada. Não consigo falar. Eu… vejo meu corpo estendido a alguns passos daqui, o sangue jorrando do coto do pescoço.\n\nEstou…"
 ### No need for a lightning_assault, as you can't end the duel in the first round.
 single_combat.0031.desc.opponent_response.tire_opponent.fatality: "há [sc_victor.Custom('SignatureWeaponTipType')] de [sc_victor.Custom('signature_weapon')] a se encontrar comigo.\n\nA arma me acerta em cheio na boca, numa explosão de dentes e pedaços ensanguentados de carne. Minha mandíbula fica pendendo, flácida e inútil. Cambaleio, tentando gritar, mas só saem soluços abafados.\n\nNem sequer vejo o golpe de misericórdia de [sc_victor.GetFirstNameNoTooltip]."
 single_combat.0031.desc.opponent_response.reason_you_suck_speech.fatality: "Há algo nessa voz que me congela, como um cervo ao som do chifre do caçador. O golpe deveria ser fácil de aparar, esquivar, ou… qualquer coisa, na verdade.\n\nMas eu não o faço.\n\nEm vez disso, me [sc_victor.Custom('SignatureWeaponWoundVerb2ThirdPersonPresent')] profundamente o ombro, separando ossos e nos cobrindo de sangue arterial."
 single_combat.0031.desc.opponent_response.technique_from_legend.fatality: "lança [sc_loser.Custom('signature_weapon')] da minha mão como se fosse um brinquedo.\n\nSou tomada pelo pânico, dá para ver nos meus [sc_loser.Custom('EyeEyes')|l], mas já é tarde. [sc_victor.GetFirstNameNoTooltip] arqueia [sc_victor.Custom('signature_weapon')] para a frente, pront[sc_victor.Custom('ES_OA')] para [sc_victor.Custom('SignatureWeaponKillTypeFirstPersonFuture')] com um golpe rápido."
 single_combat.0031.desc.opponent_response.like_a_viper.fatality: "choca comigo, derrubando-me no chão.\n\n[sc_loser.Custom('signature_weapon')|U] sai voando. Durante uma fração de segundo, contemplo a goela aberta desse terrível réptil.\n\nEntão tudo fica escuro, molhado e doloroso: luto, me engasgo, tento gritar, mas nenhum som atravessa as mandíbulas da besta, salvo o estalar de ossos quebrados e o jorrar de medula."
 single_combat.0031.desc.opponent_response.pocket_silver.fatality: "derrubando habilmente meus joelhos.\n\nJogado[sc_loser.Custom('ES_OA')] no/a [sc_defender.Custom('GroundType')], luto para me levantar, sem fôlego.\n\n[sc_victor.Custom('signature_weapon')|U] de [sc_victor.GetFirstNameNoTooltip] me [sc_victor.Custom('SignatureWeaponWoundVerb2ThirdPersonPresent')] o peito de cima para baixo e, assim, tudo termina. Meus membros se contorcem pateticamente, mas a luta deixou meu corpo."
 single_combat.0031.desc.opponent_response.martial_voice.fatality: "atingindo-me em cheio no olho com [sc_victor.Custom('SignatureWeaponEndType')] de [sc_victor.Custom('signature_weapon')].\n\nSurpreendid[sc_loser.Custom('ES_OA')] e já lutando contra a folhagem, [sc_loser.Custom('signature_weapon')] se me solta da mão.\n\nIndefens[sc_loser.Custom('ES_OA')], sou presa fácil para [sc_victor.GetFirstNameNoTooltip] e [sc_victor.Custom('SignatureWeaponAttemptedHeavyPlural')] em sequência me evisceram com método."
 single_combat.0031.desc.opponent_response.mocking_boast.fatality: "Só quando exagero demais é que percebo o que [sc_victor.GetSheHe] lancei [sc_loser.Custom('signature_weapon')] longe demais à minha frente, [sc_victor.GetFirstNameNoTooltip] gira sua [sc_victor.Custom('signature_weapon')] de volta, e uma dor incandescente explode no meu flanco.\n\nEu desabo, chiando e tossindo, engolindo goles estrangulados de ar. É tudo inútil.\n\n[sc_victor.GetFirstNameNoTooltip] [sc_victor.Custom('SignatureWeaponActionThirdPerson')] [sc_victor.Custom('signature_weapon')] para o golpe fatal."
 single_combat.0031.desc.opponent_response.is_that_a_crocodile.fatality: "Tropeço, escorrego e caio pela encosta com os braços abertos.\n\nAlgo afiado, uma rocha ou uma arma, me acerta a coluna, e minha metade inferior fica dormente enquanto a metade superior grita de agonia. O mundo gira até parar de repente. Meu braço se dobra ao contrário, o sangue me enche a visão, e estou tão frio…\n\n[sc_victor.GetFirstNameNoTooltip] se ergue sobre mim, pront[sc_victor.Custom('ES_OA')] para acabar com meu sofrimento."
 single_combat.0031.desc.opponent_response.desert_warrior.fatality: "Escorrego e caio em uma poça profunda de água salobra.\n\n[sc_loser.Custom('signature_weapon')|U] se perde imediatamente para mim e, enquanto me debatia, uma bota pesada desce sobre a nuca, mantendo-me sob a poça fétida.\n\nTodos os meus esforços são recebidos com um golpe casual de [sc_victor.Custom('signature_weapon')] de [sc_victor.GetFirstNameNoTooltip], até que me faltem forças até mesmo para tentar obrigarl[sc_victor.Custom('ES_OA')] a se afastar de mim."
 single_combat.0031.desc.opponent_response.jungle_stalker.fatality: "o galho da árvore antes de eu tropeçar nele, caindo entre a vegetação rasteira.\n\nEspinhos e silvas me rasgam a [sc_loser.Custom('MaskFace')], algo duro puxa quase arrancando [sc_loser.Custom('signature_weapon')] da mão. Luto para soltá-la, dobrad[sc_loser.Custom('ES_OA')] no chão, quando algo frio como a morte [sc_victor.Custom('SignatureWeaponKillTypeRearTorsoThirdPersonActive')].\n\nO colapso é imediato, terra e plantas em decomposição enchem minha boca. Não sinto as pernas e meus braços viraram malva.\n\n[sc_victor.GetFirstNameNoTooltip] me chuta de costas e me desfere o golpe mortal."
 single_combat.0031.desc.opponent_response.open_terrain_expert.fatality: "[sc_loser.Custom('SignatureWeaponBreaksVerbPresentParticiple')] de [sc_loser.Custom('signature_weapon')] com [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] singular.\n\n[sc_victor.GetFirstNameNoTooltip] investe, golpeando-me com tanta força [sc_loser.Custom('MaskFace')] que engulo vários dentes e voo para trás, girando sobre a cabeça.\n\nAcerto o/a [sc_defender.Custom('GroundType')] com força, incapaz de processar o que está acontecendo. Quando volto a mim, há uma bota descendo ferozmente sobre meu [sc_loser.Custom('MaskFace')].\n\nUma vez e outra e outra…"
 single_combat.0031.desc.opponent_response.rough_terrain_expert.fatality.rocky: "Não demora muito até que eu seja forçado a encarar a realidade. [sc_victor.GetFirstNameNoTooltip] me deixa na defensiva, não tenho brechas para recuperar terreno e não posso continuar bloqueando para sempre.\n\nQuando a morte chega, pelo menos é rápida: [sc_victor.Custom('signature_weapon')] de [sc_victor.GetFirstNameNoTooltip] me [sc_victor.Custom('SignatureWeaponWoundVerb4ThirdPersonPresent')] o pescoço até virar um esfacelamento sangrento."
 single_combat.0031.desc.opponent_response.rough_terrain_expert.fatality.boggy: "O golpe abre caminho em meu peito e uma verdadeira fonte de sangue jorra da ferida.\n\nFoi uma loucura enfrentar um[sc_victor.Custom('ES_XA')] [sc_victor.GetWomanMan] que mata por esporte com tanta frequência? Talvez sim, talvez não. De todo modo, o entorpecimento que se espalha rapidamente pelos meus membros me diz que não me resta muito tempo para lamentar meus erros."
 single_combat.0031.desc.opponent_response.forest_fighter.fatality: "Não demora muito para eu virar um trapo trêmulo, com os olhos enlouquecidos de dor. Queria estar entorpecido, mas isso só parece ficar mais intenso a cada golpe de [sc_victor.Custom('signature_weapon')] de [sc_victor.GetFirstNameNoTooltip].\n\nÉ quase um alívio quando [sc_victor.GetSheHe] me agarra pela nuca e [sc_victor.Custom('SignatureWeaponKillTypeHead2ThirdPersonActive')]; pelo menos morro mais depressa."
 single_combat.0031.desc.opponent_response.raaargh.fatality: "até um golpe final contra [sc_loser.Custom('signature_weapon')] [sc_loser.Custom('SignatureWeaponBreaksThirdPersonSingularPresent2')].\n\nNão tenho muito tempo para lamentar minha desgraça, pois o próximo golpe me acerta em cheio no peito e [sc_victor.Custom('SignatureWeaponKillTypeTorsoThirdPersonActive')].\n\nDesabo no chão, a vida se esvai a cada segundo, minha boca se move mais por acidente do que por escolha. [sc_victor.Custom('signature_weapon')|U] de [sc_victor.GetFirstNameNoTooltip] ainda está cravada em mim."
 single_combat.0031.desc.opponent_response.hard_grit.fatality: "abrindo cortes sangrentos em [sc_loser.Custom('ArmArms')] e a parte superior do peito, extraindo meu sangue como se fosse água de poço.\n\nFica claro que sou um brinquedo para [sc_victor.GetSheHe].\n\nEsgotad[sc_loser.Custom('ES_OA')], morrendo, caio de joelhos. Uma poça do meu próprio sangue me aquece, enquanto me esforço para olhar para meu assassinat[sc_victor.Custom('ES_OA')].\n\n[sc_victor.GetFirstNameNoTooltip] me devolve o olhar com franco desinteresse. [sc_victor.Custom('signature_weapon')|U] em sua mão começa a descer terrivelmente sobre mim."
 single_combat.0031.desc.opponent_response.feint_and_stab.fatality: "[sc_victor.Custom('SignatureWeaponAttemptedHeavy')] tão forte contra [sc_loser.Custom('signature_weapon')] que [sc_loser.Custom('SignatureWeaponBreaksThirdPersonSingularPresent')].\n\nAturdid[sc_loser.Custom('ES_OA')], fico paralisad[sc_loser.Custom('ES_OA')], soltando a arma inútil sobre o [sc_defender.Custom('GroundType')]. Só dura um segundo, mas é tudo o que [sc_victor.GetFirstNameNoTooltip] precisa para [sc_loser.Custom('SignatureWeaponKillTypeFirstPersonFuture')]."
 single_combat.0031.desc.opponent_response.butchery.fatality: "culmina em [sc_victor.Custom('SignatureWeaponAttemptedLightPlural')] em série que me apagam como um filhote recém-nascido.\n\nTodos os meus contragolpes parecem ineficazes, meu oponente está dispost[sc_victor.Custom('ES_OA')] a aceitar uma quantidade absurda de punição, desde que possa revidar com juros.\n\nNão vejo o golpe mortal, só o sinto [sc_victor.Custom('SignatureWeaponWoundVerb2PresentParticiple')] meu flanco. Sangue quente e úmido começa a jorrar em pulsos pela minha cintura enquanto me desabo contra o/a [sc_defender.Custom('GroundType')]."
 single_combat.0031.desc.opponent_response.stoic_veteran.fatality: "[sc_victor.Custom('SignatureWeaponEndType')] de [sc_victor.Custom('signature_weapon')] de [sc_victor.GetFirstNameNoTooltip] atingindo diretamente minha [sc_loser.Custom('MaskFace')]. Caio de cara com um arquejo, [sc_loser.Custom('signature_weapon')] escapa de mim ao desabar, e meu oponente me chuta para cima.\n\nAntes que eu tenha tempo de protestar, [sc_victor.Custom('SignatureWeaponKillTypeThirdPersonActive')] com [sc_victor.Custom('signature_weapon')]. Meu estômago #EMP canta#! de agonia, meus membros ficam dormentes, meu rosto esfria.\n\nIsto... isto é o fim."
 single_combat.0031.desc.opponent_response.blade_dance.fatality: "abrindo cortes sangrentos em [sc_loser.Custom('ArmArms')] e a parte superior do peito, extraindo meu sangue como se fosse água de poço.\n\nFica claro que sou um brinquedo para [sc_victor.GetSheHe].\n\nEsgotad[sc_loser.Custom('ES_OA')], morrendo, caio de joelhos. Uma poça do meu próprio sangue me aquece, enquanto me esforço para olhar para meu assassinat[sc_victor.Custom('ES_OA')].\n\n[sc_victor.GetFirstNameNoTooltip] me devolve o olhar com franco desinteresse. [sc_victor.Custom('signature_weapon')|U] em sua mão começa a descer terrivelmente sobre mim."
 single_combat.0031.desc.opponent_response.wrath_of_highgod.fatality: "[sc_victor.Custom('SignatureWeaponAttemptedHeavy')] tão forte contra [sc_loser.Custom('signature_weapon')] que [sc_loser.Custom('SignatureWeaponBreaksThirdPersonSingularPresent')].\n\nAturdid[sc_loser.Custom('ES_OA')], fico paralisad[sc_loser.Custom('ES_OA')], soltando a arma inútil sobre o [sc_defender.Custom('GroundType')]. Só dura um segundo, mas é tudo o que [sc_victor.GetFirstNameNoTooltip] precisa para [sc_loser.Custom('SignatureWeaponKillTypeFirstPersonFuture')]."
 single_combat.0031.desc.opponent_response.hurt_me_better.fatality: "Esperar que meu oponente se ferisse[sc_victor.Custom('ES_OA')] resulta ser uma má ideia.\n\nGelad[sc_loser.Custom('ES_OA')] pela indecisão, sou presa fácil para [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] que"
 single_combat.0031.desc.opponent_response.special_fallback.fatality: "With more hope than skill, I try a tentative [sc_loser.Custom('SignatureWeaponAttemptedLight')] that gets me nowhere. My opponent has little trouble pulling back from my strike, only to"
 ### No need for a something_to_hide, as it's never fatal.
 ## Aggressor Lost, Own Combat Move Feedback
 single_combat.0031.desc.sc_attacker.wait_and_hope: "Agarrando um punhado de [sc_defender.Custom('GritType')], eu o atiro contra meu oponente, mas uma rajada de vento me prega uma peça e faz com que ele acerte #EMP mi#! [sc_loser.Custom('MaskFace')].\n\n"
 single_combat.0031.desc.sc_attacker.unsure_attack: "Juro que vi uma abertura na guarda do meu oponente, mas quando me lanço para arremeter meu crânio contra sua [sc_loser.Custom('MaskFace')], algo me pega"
 single_combat.0031.desc.sc_attacker.enthusiastic_onslaught: "Faço tudo o que posso para manter uma postura defensiva sólida, mas não adianta. Uma lacuna evidente nas minhas defesas me deixa abert[sc_loser.Custom('ES_OA')] para"
 single_combat.0031.desc.sc_attacker.hail_mary: "My attempt to conserve my strength goes awry rapidly when one of my probing attacks is parried so heavily that"
 single_combat.0031.desc.sc_attacker.pocket_sand: "Lanço [sc_loser.Custom('SignatureWeaponAttemptedHeavy')] repetidamente contra meu oponente, uma chuva incessante de golpes que conectam de forma devastadora. Até que deixam de conectar.\n\n"
 single_combat.0031.desc.sc_attacker.nut_em: "Though I veiled my actions as best I could, my opponent sees through my surprise attack, parrying me unexpectedly and throwing me onto the back-foot.\n\n"
 single_combat.0031.desc.sc_attacker.guard: "Me recuo, dispost[sc_loser.Custom('ES_OA')] a insultar até a última gota meu oponente, mas me deixo distrair por um momento.\n\nNão vejo vir [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] que"
 single_combat.0031.desc.sc_attacker.probing_attack: "Though my [sc_loser.Custom('SignatureWeaponAttemptedHeavy')] staggers my opponent, [sc_victor.GetSheHe] retaliates before my kick even connects: a [sc_victor.Custom('SignatureWeaponAttemptedLight')] so vicious it knocks my fake leg off and sends me tumbling to the ground.\n\n"
 single_combat.0031.desc.sc_attacker.onslaught: "Though my [sc_loser.Custom('SignatureWeaponAttemptedHeavy')] staggers my opponent, the follow-up kick misses entirely, and one retaliatory [sc_victor.Custom('SignatureWeaponAttemptedLight')] later I'm left breathless on the ground.\n\n"
 single_combat.0031.desc.sc_attacker.surprise_attack: "There are few who'd argue that my guard is anything less than nigh-impossible to break, yet somehow my opponent manages it, possibly by skill, possibly by luck.\n\n"
 single_combat.0031.desc.sc_attacker.taunt: "Empunho minha [sc_loser.Custom('signature_weapon')] com perícia e graça, mas até um especialista comete erros. No meio de um [sc_loser.Custom('SignatureWeaponAttemptedLight')] calculadamente arriscad, meu oponente"
 single_combat.0031.desc.sc_attacker.put_the_boot_in.peg_leg: "Com habilidade mortal, lanço [sc_loser.Custom('SignatureWeaponAttemptedHeavyPlural')] em cascata contra meu oponente, forçando[sc_victor.GetHerHim] a recuar passo a passo. A vitória está tão perto que quase posso saboreá-la!\n\n"
 single_combat.0031.desc.sc_attacker.put_the_boot_in.fallback: "Calculando que esta seja minha melhor chance de uma vitória fácil, tento varrer a [sc_victor.Custom('signature_weapon')] da mão de meu oponente com um poderos [sc_loser.Custom('SignatureWeaponAttemptedHeavy')]. É quase uma surpresa quando [sc_victor.GetSheHe] agarra minha [sc_loser.Custom('signature_weapon')] no ângulo errado,"
 single_combat.0031.desc.sc_attacker.strict_guard: "There are few who'd argue that my guard is anything less than nigh-impossible to break, yet somehow my opponent manages it, possibly by skill, possibly by luck.\n\n"
 single_combat.0031.desc.sc_attacker.confident_attack: "Ganhando tempo, recuo me afastando do meu oponente, tentando me esquivar entre seus golpes até que ele se canse. Uma estratégia perigosa na melhor das hipóteses, me vejo aprisionad[sc_loser.Custom('ES_OA')] por [sc_victor.Custom('SignatureWeaponAttemptedLightPlural')] que"
 single_combat.0031.desc.sc_attacker.expert_onslaught: "Alguns talvez me chamem de tolo por criticar o estilo de vida de meu oponente enquanto ambos empunhamos armas mortais. Certamente se sentiriam vindicados quando"
 single_combat.0031.desc.sc_attacker.attempt_disarm: "Muitas vezes me perguntei o que é mais forte: a palavra escrita de um[sc_loser.Custom('ES_XA')] [sc_loser.GetLadyLord] ou sua espada afiada. Para meu oponente, ao menos, parece ser [sc_victor.Custom('signature_weapon')], vendo como ele zomba da minha imitação lendária.\n\n"
 ### No need for a lightning_assault, as you can't end the duel in the first round.
 single_combat.0031.desc.sc_attacker.tire_opponent: "Com toda a destreza de que sou capaz, arranco da cintura uma bolsa de moedas e a arremesso direto contra meu oponente. Infelizmente, [sc_victor.GetSheHe] reage por instinto mais rápido do que eu imaginava, aniquilando a bolsa com um reflex [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] que me cobre de pesadas moedas de prata.\n\nApesar da surpresa,"
 single_combat.0031.desc.sc_attacker.reason_you_suck_speech: "Comandar a plebe e comandar soldados bem-nascidos acabam sendo aptidões deprimente e totalmente separadas. Mais irritado do que intimidado pelos meus gritos, meu oponente espera eu ficar sem fôlego e então"
 single_combat.0031.desc.sc_attacker.technique_from_legend: ""Você sabe qual é uma boa maneira de construir uma reputação?", pergunta meu oponente, estreitando os olhos em resposta aos meus alardes zombeteiros, "matar alguém famoso".\n\nEu... ele não está errado. Minha hesitação lhe dá #EMP justo#! a oportunidade para"
 single_combat.0031.desc.sc_attacker.like_a_viper: "Desvio para trás, cedendo terreno de forma selvagem para me colocar fora do alcance da besta. Só que ela não se move.\n\nÉ uma rocha. É apenas uma maldita #EMP roca#!, não um maldito crocodilo, e agora meu oponente me deixa desequilibrad[sc_loser.Custom('ES_OA')] e cambaleante.\n\n"
 single_combat.0031.desc.sc_attacker.pocket_silver: "Espero, espero e espero que meu oponente se canse do calor do deserto, mas parece que continua suando, continua lutando, e minha consternação me faz baixar a guarda.\n\n"
 single_combat.0031.desc.sc_attacker.martial_voice: "A selva torna muitos aspectos do combate difíceis, mas um amador paciente consegue superar alguns dos piores obstáculos apenas mantendo a calma. É enquanto espero o temperamento de meu oponente ruir que sinto algo começar a se enrolar em minha perna, e baixo os olhos para ver que fiquei preso em uma videira grossa.\n\n"
 single_combat.0031.desc.sc_attacker.mocking_boast: "Com espaço de sobra para lutar, eu recuo e recuo e recuo, trocando terreno pela frustração de meu oponente. Só quando tropeço é que percebo que [sc_victor.GetSheHe] estava me conduzindo para alguma coisa. Vejo a rocha pela primeira vez quando caio para trás.\n\n"
 single_combat.0031.desc.sc_attacker.is_that_a_crocodile: "Embora meu oponente não esteja tão acostumado[sc_victor.Custom('ES_OA')] a lutar em um terreno tão irregular e rochoso quanto eu, ele mantém a postura extremamente bem, fazendo com que meus empurrões não sirvam para nada além de atrapalhar #EMP mi#! próprio equilíbrio.\n\n"
 single_combat.0031.desc.sc_attacker.desert_warrior: "Mesmo para um[sc_loser.Custom('ES_XA')] veterano[sc_loser.Custom('ES_OA')] como eu, pântanos e brejos apresentam muitos perigos difíceis de avaliar. Todas as poças em que empurro meu oponente acabam sendo rasas a ponto de não oferecerem perigo, mas, na primeira vez que arrisco um passo na água, afundo até o joelho!\n\n"
 single_combat.0031.desc.sc_attacker.jungle_stalker: "Às vezes, florestas são tão densas e ameaçadoras que só um tolo pisaria nelas sozinho. Outras vezes, são tão enganosamente idílicas que crianças desmaiam só de pensar em brincar ali.\n\nNosso trecho atual de mata se inclina mais para o segundo caso, e, enquanto procuro alguma vantagem ambiental a explorar, meu oponente"
 single_combat.0031.desc.sc_attacker.open_terrain_expert: "Gritando feito um assassino enlouquecido, atiro-me sobre meu oponente, debatendo, esmurrando, mordendo, chutando, uma tempestade de fúria e violência que parece durar para sempre.\n\nQuando ela passa, eu me vejo"
 single_combat.0031.desc.sc_attacker.rough_terrain_expert.rocky: "Em combate, tenho o hábito fácil de explorar a arrogância do meu inimigo. Confiança sem fundamento é melhor punida com uma derrota rápida. Meu oponente agora, porém, parece determinado a trocar golpe por golpe e nada mais, deixando brechas apenas para me atrair a me estender demais.\n\n"
 single_combat.0031.desc.sc_attacker.rough_terrain_expert.boggy: "Dividir minha atenção entre dois golpes provou ter sido... ambicioso. A primeira coisa de que me dou conta é a [sc_loser.Custom('signature_weapon')] sendo arrancada da minha mão quando minha adaga da mão livre dá um puxão involuntário em sua direção,"
 single_combat.0031.desc.sc_attacker.forest_fighter: "No fim das contas, matar camponeses apavorados à frente de um exército de saqueadores profissionais é um tanto diferente de um combate singular contra um inimigo firme.

Técnicas que aterrorizam crianças, enfermos e idosos simplesmente não têm o mesmo efeito sobre meu oponente, que aproveita meu excesso de confiança para"
 single_combat.0031.desc.sc_attacker.raaargh: "Na Guarda, nós principalmente protegíamos o Imperador contra assassinos, mas a maioria dos assassinos foge ao sinal de um[sc_loser.Custom('ES_XA')] vareg[sc_loser.Custom('ES_OA')] bem armad[sc_loser.Custom('ES_OA')]. Meu oponente, para seu crédito, não parece abalado pela minha aparência intimidadora, e meus golpes estoicos são recebidos com uma esquiva determinada após outra.\n\n"
 single_combat.0031.desc.sc_attacker.hard_grit: "Na batalha, sou um artista. Cada golpe é uma pincelada, cada inimigo caí… #EMP mierda#!, merda, a mão de [sc_loser.Custom('signature_weapon')], me acertou #EMP justo#! bem na mão onde seguro [sc_loser.Custom('signature_weapon')] isso não era para acontecer!\n\n"
 single_combat.0031.desc.sc_attacker.feint_and_stab: "Não tenho dúvida de que [sc_loser.GetFaith.HighGodName] pretende que eu vença este duelo, e digo isso em minha oração aos gritos. Infelizmente, meu oponente aproveita minha atenção dividida para"
 single_combat.0031.desc.sc_attacker.butchery: "No fim das contas, matar camponeses apavorados à frente de um exército de saqueadores profissionais é um tanto diferente de um combate singular contra um inimigo firme.

Técnicas que aterrorizam crianças, enfermos e idosos simplesmente não têm o mesmo efeito sobre meu oponente, que aproveita meu excesso de confiança para"
 single_combat.0031.desc.sc_attacker.stoic_veteran: "Na Guarda, nós principalmente protegíamos o Imperador contra assassinos, mas a maioria dos assassinos foge ao sinal de um[sc_loser.Custom('ES_XA')] vareg[sc_loser.Custom('ES_OA')] bem armad[sc_loser.Custom('ES_OA')]. Meu oponente, para seu crédito, não parece abalado pela minha aparência intimidadora, e meus golpes estoicos são recebidos com uma esquiva determinada após outra.\n\n"
 single_combat.0031.desc.sc_attacker.blade_dance: "me arremessa contra o/a [sc_defender.Custom('GroundType')]. Tento me recompor, mas quando já me oriente[sc_loser.Custom('ES_OA')] tenho [sc_victor.Custom('SignatureWeaponTipType')] [sc_victor.Custom('SignatureWeaponTipAdjective')] de [sc_victor.Custom('signature_weapon')] pressionando com força contra minha garganta.\n\nMais uma vez, fico paralisad[sc_loser.Custom('ES_OA')]."
 single_combat.0031.desc.sc_attacker.wrath_of_highgod: "avança com [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] que me desequilibra completamente.\n\nAntes que eu consiga me endireitar, um chute de acompanhamento me lança ao chão, e estou olhando para [sc_victor.Custom('signature_weapon')] de [sc_victor.GetFirstNameNoTooltip], pronto para cravar-se no meu pescoço."
 single_combat.0031.desc.sc_attacker.hurt_me_better: "Não vejo exatamente o golpe de [sc_victor.Custom('SignatureWeaponEndType')] contra minha têmpora quanto o sinto, uma explosão de dor em brasa acompanhada de uma mudança repentina de perspectiva enquanto tombо dado.\n\nOs pés de [sc_victor.GetFirstNameNoTooltip] aparecem à minha frente, assumindo uma postura de combate após uma pausa carregada de pena.\n\nTenho força suficiente para soltar uma única frase."
 single_combat.0031.desc.sc_attacker.special_fallback: "Com toda a fúria que consigo reunir, lanço um chute violento contra a canela do meu oponente, apenas para sentir meu equilíbrio ruir completamente quando erro #EMP totalmente#!, fazendo meu corpo seguir o pé desgovernado.

"
 single_combat.0031.desc.sc_attacker.something_to_hide: "[sc_victor.Custom('SignatureWeaponAttemptedLightPlural')] bem colocados, com o golpe final fazendo minha arma voar da minha mão.\n\n[sc_victor.GetFirstNameNoTooltip] não perde tempo em preparar [sc_victor.Custom('signature_weapon')] para um golpe mortal."
 ## Aggressor Lost, Own Combat Move Injury
 single_combat.0031.desc.sc_attacker.wait_and_hope.injury: "Em vez disso, minha [sc_loser.Custom('signature_weapon')] corta o puro nada, e sinto algo pesado enganchar atrás do meu joelho e puxar. Giro de forma desajeitada, tentando trazer minha arma de volta para a luta, e recebo uma [sc_loser.Custom('MaskFace')] cheia de punho por meu esforço.\n\nEnquanto cambaleio, um golpe firme arranca minha [sc_loser.Custom('signature_weapon')], e fica imediatamente claro que eu perdi."
 single_combat.0031.desc.sc_attacker.unsure_attack.injury: "Antes que eu possa girar [sc_loser.Custom('signature_weapon')] para me defender da inevitável resposta, sou surpreendido por uma joelhada inesperada no estômago. Curvar-me de dor só me rende uma cotovelada adicional na nuca, e eu desabo, quase cego[sc_loser.Custom('ES_OA')] de dor, no chão."
 single_combat.0031.desc.sc_attacker.enthusiastic_onslaught.injury: "me acerta em cheio, e eu desabo com um #EMP baque#! pesado.\n\nDe bruços no [sc_defender.Custom('GroundType')], mal consigo murmurar uma frase ou duas."
 single_combat.0031.desc.sc_attacker.hail_mary.injury: "Eu me inclino para o lado, tentando reagir, mas [sc_victor.GetFirstNameNoTooltip] desfere um golpe cruel com [sc_victor.Custom('signature_weapon')] que me acerta a coluna e me derruba.\n\nEm algum lugar atrás e acima de mim, [sc_victor.GetHerHim] ouço-o se preparando para um golpe mortal com um escárnio audível."
 single_combat.0031.desc.sc_attacker.pocket_sand.injury: "O que realmente importa é que, após apenas alguns golpes com [sc_victor.Custom('signature_weapon')] a arma de [sc_victor.GetFirstNameNoTooltip] está repousando friamente contra minha garganta, [sc_victor.Custom('SignatureWeaponTipType')] [sc_victor.Custom('SignatureWeaponTipAdjective')] pressionando contra minha jugular.\n\nEnquanto considero minhas opções, [sc_victor.GetFirstNameNoTooltip] se move impacientemente."
 single_combat.0031.desc.sc_attacker.nut_em.injury: "desvia minha própria arma de volta para mim com uma parada bem colocada.\n\nAo desviar de [sc_loser.Custom('signature_weapon')] me coloca diretamente no caminho de [sc_victor.Custom('signature_weapon')] de [sc_victor.GetFirstNameNoTooltip] e, embora o golpe não cause dano letal, ainda assim me arremessa ao chão. Minha arma voa para longe quando caio."
 single_combat.0031.desc.sc_attacker.guard.injury: "No entanto, enquanto aproveito um momento para saborear a doce sensação, [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] de repente me acerta em cheio na têmpora. Atordoad[sc_loser.Custom('ES_OA')] momentaneamente, cambaleio, e o golpe seguinte me deixa desarmado, completamente à mercê de [sc_victor.GetFirstNameNoTooltip].\n\nCansad[sc_victor.Custom('ES_OA')] mas triunfante, meu rival [sc_victor.Custom('SignatureWeaponActionThirdPerson')] [sc_victor.Custom('signature_weapon')] para o golpe fatal."
 single_combat.0031.desc.sc_attacker.probing_attack.injury: "fazendo minha arma voar.\n\nIndefens[sc_loser.Custom('ES_OA')], só tenho um instante para admitir a derrota antes que [sc_victor.GetFirstNameNoTooltip] possa [sc_victor.Custom('SignatureWeaponKillTypeFirstPersonFuture')]."
 single_combat.0031.desc.sc_attacker.onslaught.injury: "Em vez disso, minha [sc_loser.Custom('signature_weapon')] corta o puro nada, e sinto algo pesado enganchar atrás do meu joelho e puxar. Giro de forma desajeitada, tentando trazer minha arma de volta para a luta, e recebo uma [sc_loser.Custom('MaskFace')] cheia de punho por meu esforço.\n\nEnquanto cambaleio, um golpe firme arranca minha [sc_loser.Custom('signature_weapon')], e fica imediatamente claro que eu perdi."
 single_combat.0031.desc.sc_attacker.surprise_attack.injury: "me golpeiam com tanta força que simplesmente perco o equilíbrio e caio.\n\n[sc_victor.GetFirstNameNoTooltip] não me deixa me recompor e logo está sobre mim, pront[sc_victor.Custom('ES_OA')] para [sc_victor.Custom('SignatureWeaponKillTypeGroinFirstPersonFuture')]."
 single_combat.0031.desc.sc_attacker.taunt.injury: "[sc_victor.GetSheHe] me acerta no pescoço com um revés de [sc_victor.Custom('SignatureWeaponEndType')].\n\nEnquanto eu engasgo e cuspo, tentando puxar ar pela minha goela machucada, [sc_victor.GetFirstNameNoTooltip] tem todo o tempo do mundo para preparar o golpe perfeito.\n\nEm um segundo, certamente poderá [sc_victor.Custom('SignatureWeaponKillTypeHeadFirstPersonFuture')]."
 single_combat.0031.desc.sc_attacker.put_the_boot_in.injury: "Longe de ser um golpe magistral que encerre a luta, me pego fazendo uma pose dramática e perco completamente o controle de minha [sc_loser.Custom('signature_weapon')]! A arma se afasta em um arco gracioso.\n\nDesconcertad[sc_victor.Custom('ES_OA')] mas feliz, [sc_victor.GetFirstNameNoTooltip] se limita a brandir vagamente [sc_victor.Custom('signature_weapon')] em minha direção."
 single_combat.0031.desc.sc_attacker.strict_guard.injury: "sua pura #EMP tenacidade#!.\n\nApoiando-se no meu golpe, e não se afastando, [sc_victor.GetFirstNameNoTooltip] é capaz de me desviar o suficiente para eu quase errar #EMP por um triz#!, deixando-me expost[sc_loser.Custom('ES_OA')] para uma joelhada rápida no estômago.\n\nCaio, e lá está [sc_victor.Custom('SignatureWeaponTipType')] de [sc_victor.Custom('signature_weapon')] pressionada contra minha garganta antes que eu consiga pensar em me recuperar."
 single_combat.0031.desc.sc_attacker.confident_attack.injury: "[sc_victor.GetFirstNameNoTooltip] aproveita sua vantagem, arrancando-me [sc_loser.Custom('signature_weapon')] da mão. Indefens[sc_loser.Custom('ES_OA')], eu cuspo suavemente uma moeda de prata."
 single_combat.0031.desc.sc_attacker.expert_onslaught.injury: "lança [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] a uma velocidade vertiginosa.\n\nSurpreendid[sc_loser.Custom('ES_OA')] e sem fôlego, sou derrubado sem dificuldade. [sc_victor.GetFirstNameNoTooltip] se posiciona sobre mim, preparando [sc_victor.Custom('signature_weapon')] para [sc_victor.Custom('SignatureWeaponKillTypeHeadFirstPersonFuture')]."
 single_combat.0031.desc.sc_attacker.attempt_disarm.injury: "golpear-me no peito com [sc_victor.Custom('SignatureWeaponAttemptedLight')]. Surpreendid[sc_loser.Custom('ES_OA')] e sem fôlego, ofereço pouca resistência ao golpe seguinte, que leva meu [sc_loser.Custom('signature_weapon')] e [sc_victor.GetFirstNameNoTooltip] se prepara para [sc_victor.Custom('SignatureWeaponKillTypeFirstPersonFuture')] com seu próximo ataque."
 ### No need for a lightning_assault, as you can't end the duel in the first round.
 single_combat.0031.desc.sc_attacker.tire_opponent.injury: "[sc_victor.Custom('SignatureWeaponAttemptedLightPlural')|U] que eu não esperava por parte de [sc_victor.GetFirstNameNoTooltip] mais tarde, tropeço e caio de cara contra o/a [sc_defender.Custom('GroundType')]. Tenho [sc_victor.Custom('signature_weapon')] de [sc_victor.GetFirstNameNoTooltip] no cangote no instante seguinte."
 single_combat.0031.desc.sc_attacker.reason_you_suck_speech.injury: "Tento me libertar com minha [sc_loser.Custom('signature_weapon')], mas não sou rápido o bastante, e [sc_victor.GetFirstNameNoTooltip] me pega com um [sc_victor.Custom('SignatureWeaponAttemptedLight')] que finca minha arma no chão da selva.\n\nTalvez eu tenha alguns segundos antes de o duelo terminar para mim."
 single_combat.0031.desc.sc_attacker.technique_from_legend.injury: "[sc_loser.Custom('signature_weapon')|U] voa da minha mão e o pé de [sc_victor.GetFirstNameNoTooltip] cai sobre meu pescoço antes que eu consiga ver onde ele aterrissa."
 single_combat.0031.desc.sc_attacker.like_a_viper.injury: "Um infeliz [sc_victor.Custom('SignatureWeaponAttemptedLight')|U] me faz cair encosta acima. Suave, pelos padrões, mas já é toda a abertura de que [sc_victor.GetFirstNameNoTooltip] precisa para [sc_victor.Custom('SignatureWeaponKillTypeFirstPersonFuture')] se eu permitir."
 single_combat.0031.desc.sc_attacker.pocket_silver.injury: "É brincadeira de criança para [sc_victor.GetFirstNameNoTooltip] me desarmar depois disso, deixando-me totalmente à mercê de"
 single_combat.0031.desc.sc_attacker.martial_voice.injury: "me pega com um [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] devastador que quase me apaga.\n\nQuando meus sentidos voltam, minha [sc_loser.Custom('signature_weapon')] desapareceu e há uma arma pressionada com força na minha garganta."
 single_combat.0031.desc.sc_attacker.mocking_boast.injury: "que consegui [sc_loser.Custom('SignatureWeaponBreaksVerbPastTense')] de [sc_loser.Custom('signature_weapon')]!\n\n[sc_victor.GetFirstNameNoTooltip] está um pouco afastad[sc_victor.Custom('ES_OA')], não muito mais desgastad[sc_victor.Custom('ES_OA')] do que quando tive o ataque de fúria berserk, me observando com cautela. O mais importante é que ainda tem uma arma, e não muito longe para um avanço sólido."
 ### No need for an is_that_a_crocodile, as it's never just an injury.
 single_combat.0031.desc.sc_attacker.desert_warrior.injury: "só para que o golpe de reverso de [sc_victor.GetFirstNameNoTooltip] me afaste #EMP esa#! arma com um golpe.\n\nPrivad[sc_loser.Custom('ES_OA')] de arma, da arma reserva e com meu oponente se preparando para [sc_victor.Custom('SignatureWeaponKillTypeGroinFirstPersonFuture')], só há uma coisa a fazer."
 single_combat.0031.desc.sc_attacker.jungle_stalker.injury: "desarmar-me com uma facilidade alarmante.\n\nMinha postura e intimidação agora parecem vazias, qualquer postura dramática é facilmente neutralizada por um turbilhão de [sc_victor.Custom('signature_weapon')] de [sc_victor.GetFirstNameNoTooltip]."
 single_combat.0031.desc.sc_attacker.open_terrain_expert.injury: "Faço o meu melhor, mas era só questão de tempo até algo dar errado, e [sc_victor.GetFirstNameNoTooltip] acaba conseguindo encaixar uma riposta que torce a [sc_loser.Custom('signature_weapon')] diretamente para fora da minha mão.\n\nCom isso, o duelo está decidido."
 single_combat.0031.desc.sc_attacker.rough_terrain_expert.injury.rocky: "Tenho que me concentrar e me recuperar, posso vencer, só preciso, só, eu estou me deparando com um[sc_victor.Custom('ES_XA')] petulante[sc_victor.GetFirstNameNoTooltip] que [sc_victor.Custom('SignatureWeaponActionThirdPerson')] [sc_victor.Custom('signature_weapon')] #EMP mucho#! em [sc_victor.Custom('HandHands')] com um ar deliberado de ameaça."
 single_combat.0031.desc.sc_attacker.rough_terrain_expert.injury.boggy: "dar um chute forte na minha virilha, e eu desabo como um saco de repolhos.\n\nArfar minha raiva contra a blasfêmia dele não me serve de nada e, antes que eu possa me recuperar, me vejo [sc_loser.Custom('MaskFace')] com [sc_victor.Custom('SignatureWeaponTipType')] de [sc_victor.Custom('signature_weapon')]."
 single_combat.0031.desc.sc_attacker.forest_fighter.injury: "A essa altura, com minha mente preocupada, não exige muito para que [sc_victor.GetFirstNameNoTooltip] apare meus golpes, me desarme e force uma rendição."
 single_combat.0031.desc.sc_attacker.raaargh.injury: "[sc_victor.GetFirstNameNoTooltip] se aproveita facilmente, me deixando ser lançado para a frente antes de chutar minha perna restante para fora debaixo de mim. Caio de forma desajeitada[sc_loser.Custom('ES_OA')] um amontoado, e alguns chutes maliciosos em seguida me mantêm assim."
 single_combat.0031.desc.sc_attacker.hard_grit.injury: "cuspindo nacos de sangue de um lábio completamente rasgado.\n\nO golpe seguinte me pega na barriga, me derrubando pesadamente no chão. Sem ar, eu arquejo e tenho ânsias, só sentindo minha [sc_loser.Custom('signature_weapon')] deixar minha mão no último instante."
 single_combat.0031.desc.sc_attacker.feint_and_stab.injury: "só para que o golpe de reverso de [sc_victor.GetFirstNameNoTooltip] me afaste #EMP esa#! arma com um golpe.\n\nPrivad[sc_loser.Custom('ES_OA')] de arma, da arma reserva e com meu oponente se preparando para [sc_victor.Custom('SignatureWeaponKillTypeGroinFirstPersonFuture')], só há uma coisa a fazer."
 single_combat.0031.desc.sc_attacker.butchery.injury: "me [sc_victor.Custom('SignatureWeaponWoundVerb1ThirdPersonPresent')] diretamente na garganta. Observo com horror por um segundo ou dois enquanto o sangue da minha vida jorra em jatos úmidos, antes de ir se apagando até um pulso fraco que molha rapidamente meu peito.\n\nCaio de joelhos. O mundo está tão escuro. Sempre foi tão escuro assim?\n\nTão entorpecido."
 single_combat.0031.desc.sc_attacker.stoic_veteran.injury: "se lança inesperadamente contra mim.\n\n[sc_victor.Custom('SignatureWeaponAttemptedLight')|U] ao lado encontra um ponto fraco no meu peito [sc_victor.Custom('SignatureWeaponKillTypeTorso2PresentParticiple')] na diagonal. Sinto uma dor paralisante e um entorpecimento avassalador ao mesmo tempo em que meu corpo começa a falhar instantaneamente por causa de meia dúzia de órgãos fatalmente danificados.\n\nA única coisa que me mantém estável é [sc_victor.Custom('signature_weapon')] e sua empunhadura alojada em minha cavidade torácica."
 single_combat.0031.desc.sc_attacker.blade_dance.injury: "Não levo mais que alguns golpes quando algo [sc_victor.Custom('SignatureWeaponWoundVerb2ThirdPersonPresent')] meu peito. Me viro, com o equilíbrio perdido, e vejo [sc_victor.Custom('signature_weapon')] de [sc_victor.GetFirstNameNoTooltip] sair do meu corpo em um jorro de sangue e fragmentos de osso.\n\nA dor chega uma fração de segundo depois que a incredulidade passa. Uma agonia gritante, branca e ardente, é rapidamente tomada por uma dormência avassaladora que se espalha inexoravelmente a partir de minha ferida fatal no peito."
 single_combat.0031.desc.sc_attacker.wrath_of_highgod.injury: "uma derrota tão rápida que nem sei se meu primeiro golpe chegou a acertar.\n\nHá um instante eu atacava [sc_victor.GetFirstNameNoTooltip] com tudo que tinha, e no seguinte não sinto a mão da [sc_loser.Custom('signature_weapon')]. Algo... algo na coluna, talvez? Não consigo mover um músculo quando desabo no/a [sc_defender.Custom('GroundType')].\n\nSou chutado(a) para as costas, ao menos me resta a dignidade de olhar meu/ minha assassinat[sc_victor.Custom('ES_OA')] nos olhos.\n\nEntão [sc_victor.Custom('signature_weapon')] de [sc_victor.GetFirstNameNoTooltip] se crava."
 single_combat.0031.desc.sc_attacker.hurt_me_better.injury: "A distração permite que [sc_victor.Custom('signature_weapon')] de [sc_victor.GetFirstNameNoTooltip] atinja meu torso, [sc_victor.Custom('SignatureWeaponKillTypeTorsoPresentParticiple')] com uma eficiência brutal.\n\nMeu corpo explode em agonia e eu recuo cambaleando. Quê? Como ele fez isso? Eu…\n\nSangue jorra do meu peito em arcos quentes e úmidos, e eu gorgolejo algo ininteligível com meus pulmões destruídos; nem #EMP yo#! sei ao certo o quê. O golpe de misericórdia vem tarde demais."
 single_combat.0031.desc.sc_attacker.special_fallback.injury: "perto do queixo, [sc_victor.Custom('SignatureWeaponKillTypeHead2PresentParticiple')].\n\n[sc_victor.Custom('signature_weapon')] de [sc_victor.GetFirstNameNoTooltip] sai encharhada em meu sangue. Meio grito, meio gorgolejo um grito de horror, mas meus braços ainda funcionam bem o suficiente para que meu inimigo considere um golpe de misericórdia.\n\nEm vez disso, cambaleio por momentos torturantes, ainda agarrando [sc_loser.Custom('signature_weapon')] por segurança, até que já não consiga mais cambalear."
 single_combat.0031.desc.sc_attacker.something_to_hide.injury: "[sc_victor.Custom('SignatureWeaponAttemptedHeavy')] do meu oponente que se crava profundamente na coxa.\n\nTrocamos vários golpes mais até eu notar uma sensação alarmante de umidade na cintura. Por um instante, penso que minha coragem me abandonou no meio da batalha até um olhar para baixo me mostrar que tenho a perna #EMP empapada#! de sangue.\n\nDe repente, percebo tudo e caio ao chão, ainda me contorcendo."
 ## Aggressor Lost, Own Combat Move Fatality
 single_combat.0031.desc.sc_attacker.wait_and_hope.fatality: "Algo se parte no meu joelho e caio no chão. Embora eu role o mais rápido que posso, agitando [sc_loser.Custom('signature_weapon')] para afastar [sc_victor.GetFirstNameNoTooltip], não [sc_victor.GetHerHim] #EMP veo#! por toda parte. Onde ele foi parar? Ele tem de estar aqui em alg-"
 single_combat.0031.desc.sc_attacker.unsure_attack.fatality: "Tento recuperar uma dose de controle, mas seu próximo golpe consegue arrancar [sc_loser.Custom('signature_weapon')] de minha mão. Em um instante, tudo é pânico, e então o duelo é decidido.\n\n[sc_victor.Custom('signature_weapon')] de [sc_victor.GetFirstNameNoTooltip] [sc_victor.Custom('SignatureWeaponWoundVerb2ThirdPersonPresent')] profundamente em meu ombro, rasgando a clavícula e arrancando algo vital. O entorpecimento é imediato: o pânico, a dor, tudo… simplesmente deixa de importar."
 single_combat.0031.desc.sc_attacker.enthusiastic_onslaught.fatality: "me acerta.\n\nSó sinto a dor ricocheteando pelo meu corpo, mil terminações nervosas gritando em agonia enquanto eu cambaleio e morro."
 single_combat.0031.desc.sc_attacker.hail_mary.fatality: "[sc_victor.GetFirstNameNoTooltip] não me dá tempo algum para me recompor; sua [sc_victor.Custom('signature_weapon')] [sc_victor.Custom('SignatureWeaponKillTypeTorso2PresentParticiple')] com um [sc_victor.Custom('SignatureWeaponAttemptedLight')]. Sangue irrompe pela minha garganta e pela minha boca, respingando de volta na minha [sc_loser.Custom('MaskFace')] numa mancha pegajosa.\n\nEm algum lugar sob camadas e camadas de dor, sinto meu coração ainda batendo, ainda empurrando sangue por veias rasgadas e para fora de artérias despedaçadas. Não há volta depois disso."
 single_combat.0031.desc.sc_attacker.pocket_sand.fatality: "No fim, isso pouco importa. A ruína despedaçada da minha garganta é prova suficiente de que aconteceu, e o como é irrelevante.\n\nEu vacilo, a vida se esvaindo. Num momento eu sou, no seguinte..."
 single_combat.0031.desc.sc_attacker.nut_em.fatality: "acerta [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] sólido no meu estômago, rasgando a carne frágil e derramando descuidadamente minhas tripas no chão.\n\nEscorrego na bagunça dos meus próprios intestinos, caindo para trás com um grito e o corpo em chamas de angústia.\n\nO golpe de misericórdia não pode chegar rápido o bastante."
 single_combat.0031.desc.sc_attacker.guard.fatality: "Até que uma aparada surpresa rebate contra meu [sc_loser.Custom('MaskFace')], [sc_loser.Custom('SignatureWeaponWoundVerb6PresentParticiple')] um ferimento até o osso que me faz recuar. Solto um grito de agonia surpresa, me afastando do choque das armas quando meus pés são varridos debaixo de mim.\n\nTenho tempo apenas para gritar um protesto antes que [sc_victor.GetSheHe] [sc_victor.Custom('SignatureWeaponKillTypeGroinThirdPersonActive')], [sc_victor.Custom('SignatureWeaponKillTypeGroinThirdPersonActive_Aftermath')].\n\nA morte é um alívio."
 single_combat.0031.desc.sc_attacker.probing_attack.fatality: "acaba mesmo [sc_loser.Custom('SignatureWeaponBreaksVerbPresentParticiple')].\n\nÉ brincadeira de criança para [sc_victor.GetFirstNameNoTooltip] [sc_victor.Custom('SignatureWeaponKillTypeFirstPersonFuture')] com sua [sc_victor.Custom('signature_weapon')] depois disso, e meu mundo encolhe até virar estreitos alfinetes de luz e dor."
 single_combat.0031.desc.sc_attacker.onslaught.fatality: "Algo se parte no meu joelho e caio no chão. Embora eu role o mais rápido que posso, agitando [sc_loser.Custom('signature_weapon')] para afastar [sc_victor.GetFirstNameNoTooltip], não [sc_victor.GetHerHim] #EMP veo#! por toda parte. Onde ele foi parar? Ele tem de estar aqui em alg-"
 single_combat.0031.desc.sc_attacker.surprise_attack.fatality: "me desequilibra totalmente.\n\nCambaleando e tropeçando, [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] consistente me lança direto para o/a [sc_defender.Custom('GroundType')]. Até com a arma quebrada consigo rechaçar o seguinte ataque de [sc_victor.GetFirstNameNoTooltip], mas o que vem depois [sc_victor.Custom('SignatureWeaponKillTypeHead2ThirdPersonActive')].\n\nMeus gritos horrendos não duram muito, pois a dor toma conta da minha consciência antes que a morte o faça."
 single_combat.0031.desc.sc_attacker.taunt.fatality: "[sc_victor.GetFirstNameNoTooltip] aproveita que estou com a atenção distraída para preparar [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] contundente que [sc_victor.Custom('SignatureWeaponKillTypeHead2ThirdPersonActive')].\n\nSou lançado para trás, jorrando como uma fonte macabra. Isso não pode ser. Não era para acabar assim. Eu poderia ter… Ainda poderia… Eu posso…\n\nNão posso fazer nada. Cambaleio rumo à minha tumba encharcada de sangue."
 single_combat.0031.desc.sc_attacker.put_the_boot_in.fatality: "Longe de ser uma vitória instantânea, sou catapultado[sc_loser.Custom('ES_OA')] ao chão de cara. Mal consigo me contorcer quando [sc_victor.Custom('signature_weapon')] de [sc_victor.GetFirstNameNoTooltip] [sc_victor.Custom('SignatureWeaponKillTypeRearTorsoThirdPersonActive')].\n\nA adrenalina anula boa parte da dor, mas não toda, e grito quando me chutam de costas para o golpe fatal inevitável."
 single_combat.0031.desc.sc_attacker.strict_guard.fatality: "o arco de [sc_victor.Custom('signature_weapon')] de [sc_victor.GetFirstNameNoTooltip] que corta em meu peito pelo lado, [sc_victor.Custom('SignatureWeaponKillTypeTorsoPresentParticiple')] com [sc_victor.Custom('SignatureWeaponAttemptedHeavy')].\n\nLançad[sc_loser.Custom('ES_OA')] pelo contra-ataque e meu próprio impulso, me lanço contra o/a [sc_defender.Custom('GroundType')]. Meus braços ainda funcionam, mas já os sinto… tão fracos. Tão pesados. É tudo o que posso fazer para me virar, sangue vermelho e pegajoso jorra do meu peito."
 single_combat.0031.desc.sc_attacker.confident_attack.fatality: "[sc_victor.GetFirstNameNoTooltip] se move rapidamente, derrubando-me no chão antes que eu consiga ver o que está acontecendo. Um momento terrível depois e [sc_victor.Custom('SignatureWeaponKillTypeGroinThirdPersonActive')]. [sc_victor.Custom('SignatureWeaponKillTypeGroinThirdPersonActive_Aftermath')].\n\nNo começo eu grito, mas meus pulmões falham mais rápido do que eu esperava, e tudo o que consigo fazer é #EMP aguantar#! sem palavras."
 single_combat.0031.desc.sc_attacker.expert_onslaught.fatality: "avança e com bastante calma [sc_victor.Custom('SignatureWeaponWoundVerb4ThirdPersonPresent')] direto na garganta com um único movimento rápido.\n\nO fim é quase… anticlimático. Não há floreios, nem gritos nem sinais de que o sobrenatural venha me buscar.\n\nSó dor pulsante, meus próprios gorgolejos úmidos e [my_foe.Custom('EyeEyes')] de [sc_victor.GetFirstNameNoTooltip] me vendo morrer sem nenhuma emoção."
 single_combat.0031.desc.sc_attacker.attempt_disarm.fatality: "lanço uma finta astuta, girando as costas para [sc_victor.GetFirstNameNoTooltip] enquanto tento aparar na direção errada.\n\nMenos de um segundo depois, a [sc_victor.Custom('signature_weapon')] de meu inimigo [sc_victor.Custom('SignatureWeaponKillTypeRearTorsoThirdPersonActive')] com um [sc_victor.Custom('SignatureWeaponAttemptedHeavy')]. Eu desabo, dobrado para o lado errado sobre minhas pernas, com a agonia reverberando por qualquer pedaço de carne esventrada e osso que ainda consiga se ligar aos meus nervos destruídos."
 ### No need for a lightning_assault, as you can't end the duel in the first round.
 single_combat.0031.desc.sc_attacker.tire_opponent.fatality: "É só quando paro para enxugar uma gota de suor dos #EMP meus#! [sc_loser.Custom('EyeEyes')] que tudo começa a dar muito errado: [sc_victor.GetFirstNameNoTooltip] escolhe aquele instante #EMP exato#! para me atingir com um [sc_victor.Custom('SignatureWeaponAttemptedHeavy')]. Sou derrubado antes que consiga me recompor, e o golpe seguinte [sc_victor.Custom('SignatureWeaponWoundVerb5ThirdPersonPresent')] de forma brutal no meu pescoço.\n\nEu gorgolejo pela garganta destruída, soprando bolhas sujas de sangue e saliva enquanto tento dizer qualquer coisa. Apesar de todo o calor, sinto tanto frio."
 single_combat.0031.desc.sc_attacker.reason_you_suck_speech.fatality: "Esse olhar se revela minha perdição. [sc_victor.GetFirstNameNoTooltip] salta com alegria aproveitando a oportunidade e, quando torno a olhar meio segundo depois, tenho [sc_victor.Custom('SignatureWeaponTipType')] de [sc_victor.Custom('signature_weapon')] a ponto de [sc_victor.Custom('SignatureWeaponWoundVerb1')] me o estômago.\n\nGrito de dor, mas é tarde demais. Mesmo que o primeiro ferimento não tenha sido fatal, parece que [sc_victor.GetFirstNameNoTooltip] vai acertar em cheio com seu próximo golpe."
 single_combat.0031.desc.sc_attacker.technique_from_legend.fatality: "O pouso é suave, mas o pé de [sc_victor.GetFirstNameNoTooltip] em minha virilha não é, e continuo atordoad[sc_loser.Custom('ES_OA')] por um instante vital. É tudo de que precisa para [sc_victor.Custom('SignatureWeaponKillTypeTorsoFirstPersonFuture')] com [sc_victor.Custom('signature_weapon')].\n\nMeu coração bombeia sangue para fora do peito, derramando-se pelas minhas costelas, encharcando o/a [sc_defender.Custom('GroundType')] ao meu redor.\n\nPelo menos morro onde posso ver o céu aberto."
 single_combat.0031.desc.sc_attacker.like_a_viper.fatality: "No fim, isso prova ser a minha ruína. Um empurrão a mais me manda encosta abaixo por um pequeno precipício, e eu aterrisso pesado sobre uma única perna, destruindo-a por completo.\n\nQuando [sc_victor.GetFirstNameNoTooltip] finalmente desce até mim pela saliência, eu já estou quase apagado de dor. Não há luta possível nesse estado. Meu inimigo ergue sua [sc_victor.Custom('signature_weapon')]: ao menos meu sofrimento vai acabar rápido."
 single_combat.0031.desc.sc_attacker.pocket_silver.fatality: "Só com o mais desesperado dos debates da minha vida consigo me libertar, mas minha sorte dura pouco. Quando cambaleio para fora de uma poça, caio de cara em outra. Alguma coisa lá em cima [sc_victor.Custom('SignatureWeaponKillTypeRearTorsoThirdPersonActive')].\n\nNão consigo me mexer. Não consigo lutar. Tento gritar, mas água verde enche meus pulmões, e eu afundo ainda mais no abismo lodoso do pântano."
 single_combat.0031.desc.sc_attacker.martial_voice.fatality: "lança [sc_victor.Custom('SignatureWeaponAttemptedLightPlural')] em uma saraivada.\n\nNão sei exatamente qual me corta qual artéria, mas não demora muito até eu ir mais devagar, ensopad[sc_loser.Custom('ES_OA')] em meu próprio sangue, do ombro ao pulso. Com pouca cerimônia, eu desabo. Estou tão cansad[sc_loser.Custom('ES_OA')]. Não consigo continuar… não consigo continuar…"
 single_combat.0031.desc.sc_attacker.mocking_boast.fatality: "a [sc_victor.GetFirstNameNoTooltip] preocupantemente perto de mim.\n\nTento fazer com que meus braços alcancem [sc_victor.GetSheHe], notando apenas de passagem que deixei cair [sc_loser.Custom('signature_weapon')], mas… nada. De onde veio todo esse sangue? Esse pedaço de carne é meu? Por que me sinto tão… tão entorpecido?\n\nOh."
 single_combat.0031.desc.sc_attacker.is_that_a_crocodile.fatality: "Leva um tempo até que um de nós cometa um erro que o outro possa explorar, mas isso acaba acontecendo. Eu me entrego demais a [sc_loser.Custom('SignatureWeaponAttemptedLight')] e, antes que eu consiga desviar, tenho [sc_victor.Custom('signature_weapon')] nas minhas tripas.\n\nAssim acontece."
 single_combat.0031.desc.sc_attacker.desert_warrior.fatality: "o que me distrai o suficiente para que eu não perceba [sc_victor.Custom('SignatureWeaponAttemptedLight')] posterior, [sc_victor.Custom('SignatureWeaponKillTypeTorso2PresentParticiple')].\n\nEu cambaleio e então caio para trás no [sc_defender.Custom('GroundType')], convulsionando, tentando gritar, mas incapaz de emitir mais que um sussurro rouco. Como alguém poderia sobreviver a tanta #EMP dolor#!?\n\nNão se pode."
 single_combat.0031.desc.sc_attacker.jungle_stalker.fatality: "passar pela minha guarda e [sc_victor.Custom('SignatureWeaponKillTypeHead2FirstPersonFuture')].\n\nCambaleio para a frente, sem palavras, engasgando com meu próprio sangue, até mesmo soltando [sc_loser.Custom('signature_weapon')] para tentar me concentrar em estancar o ferimento de onde minha vida jorra para o/a [sc_defender.Custom('GroundType')].\n\nE- era assim que se sentia? Tão… tantas vezes…"
 single_combat.0031.desc.sc_attacker.open_terrain_expert.fatality: "São necessárias mais do que algumas estocadas bem-sucedidas antes que eu finalmente vacile, com sangue vertendo de meia dúzia de vergões rasgados e cortes irregulares por todo o torso. Se mais nada, ninguém pode dizer que eu caí facilmente, mas todos têm seus limites.\n\nCaio de joelhos, pront[sc_loser.Custom('ES_OA')] para o golpe fatal de [sc_victor.GetFirstNameNoTooltip]. Parece que encontrei o meu."
 single_combat.0031.desc.sc_attacker.rough_terrain_expert.fatality.rocky: "Que diabos esse imbecil imprudente acha que est[sc_victor.Custom('ES_EA')] á fazendo? Eu-\n\ntenho [sc_victor.Custom('signature_weapon')] cravada no peito. Como? Por onde? Mas eu... eu sou um[sc_loser.Custom('ES_XA')] artista."
 single_combat.0031.desc.sc_attacker.rough_terrain_expert.fatality.boggy: "me acerte na [sc_loser.Custom('MaskFace')] com o [sc_victor.Custom('SignatureWeaponEndType')] de [sc_victor.Custom('signature_weapon')].\n\nTropeço para trás, rosnando em fúria cega diante da blasfêmia, mas minha raiva também é interrompida rapidamente quando [sc_victor.GetFirstNameNoTooltip] [sc_victor.Custom('SignatureWeaponWoundVerb5ThirdPersonPresent')] enfia sua arma em meu pulmão. Eu me engasgo, gaguejando, mal conseguindo emitir um som enquanto o sangue começa a encher minha cavidade torácica."
 single_combat.0031.desc.sc_attacker.forest_fighter.fatality: "Não importa quem seja, ninguém pode derramar tanto sangue e parece que eu já derramei sangue demais.\n\n[sc_victor.GetFirstNameNoTooltip] prepara [sc_victor.Custom('signature_weapon')] para [sc_victor.Custom('SignatureWeaponKillTypeHeadFirstPersonFuture')]."
 single_combat.0031.desc.sc_attacker.raaargh.fatality: "Com acesso desimpedido às minhas costas, para [sc_victor.GetFirstNameNoTooltip] lhe é fácil [sc_victor.Custom('SignatureWeaponKillTypeFirstPersonFuture')] com [sc_victor.Custom('SignatureWeaponAttemptedLightPlural')].\n\nEu desabo no chão, caindo de lado, arquejando e ofegando entre ossos quebrados e órgãos dilacerados. Tanta dor. Tanta dor. Desaparecendo no frio, desaparecendo na dormência, desaparecendo para... desaparecendo..."
 single_combat.0031.desc.sc_attacker.hard_grit.fatality: "Leva um tempo até que um de nós cometa um erro que o outro possa explorar, mas isso acaba acontecendo. Eu me entrego demais a [sc_loser.Custom('SignatureWeaponAttemptedLight')] e, antes que eu consiga desviar, tenho [sc_victor.Custom('signature_weapon')] nas minhas tripas.\n\nAssim acontece."
 single_combat.0031.desc.sc_attacker.feint_and_stab.fatality: "o que me distrai o suficiente para que eu não perceba [sc_victor.Custom('SignatureWeaponAttemptedLight')] posterior, [sc_victor.Custom('SignatureWeaponKillTypeTorso2PresentParticiple')].\n\nEu cambaleio e então caio para trás no [sc_defender.Custom('GroundType')], convulsionando, tentando gritar, mas incapaz de emitir mais que um sussurro rouco. Como alguém poderia sobreviver a tanta #EMP dolor#!?\n\nNão se pode."
 single_combat.0031.desc.sc_attacker.butchery.fatality: "#EMP AAARGH!#!"
 single_combat.0031.desc.sc_attacker.stoic_veteran.fatality: "…"
 single_combat.0031.desc.sc_attacker.blade_dance.fatality: "Mrrm! #EMP MRRRMMM!#! #DIE2 Mrrrm#!..."
 single_combat.0031.desc.sc_attacker.wrath_of_highgod.fatality: "Grk-hrk-#EMP GRK#!-#DIE1 grk#!..."
 single_combat.0031.desc.sc_attacker.hurt_me_better.fatality: "No, no, #EMP no, NO! Plea-#! #BOL AAARGH!#!"
 single_combat.0031.desc.sc_attacker.special_fallback.fatality: "[sc_loser_soulmate.GetFirstNameNoTooltip], #DIE1 forgive#! #DIE2 me#!..."
