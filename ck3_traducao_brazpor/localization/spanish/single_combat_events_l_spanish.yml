 #Status Update Fragments
 ## Own Duel Success Fragments
 single_combat.0001.desc.injury_check.personal.very_unlikely: "\n\nMinha forma está excelente, com pouca chance de erro,"
 single_combat.0001.desc.injury_check.personal.unlikely: "\n\nMinha forma está boa, com apenas pequenos erros,"
 single_combat.0001.desc.injury_check.personal.moderate: "\n\nMinha forma está decente, com algumas falhas,"
 single_combat.0001.desc.injury_check.personal.likely: "\n\nMinha forma está se deteriorando rápido, com numerosas brechas exploráveis,"
 single_combat.0001.desc.injury_check.personal.very_likely: "\n\nMinha forma é inexistente, meu próximo movimento arriscado pode significar derrota,"
 ## Opponent Duel Success Fragments
 single_combat.0001.desc.injury_check.opponent.very_unlikely: "e a postura de [my_foe.GetFirstNameNoTooltip] é incrível."
 single_combat.0001.desc.injury_check.opponent.unlikely: "e a postura de [my_foe.GetFirstNameNoTooltip] é formidável."
 single_combat.0001.desc.injury_check.opponent.moderate: "e a postura de [my_foe.GetFirstNameNoTooltip] é aceitável."
 single_combat.0001.desc.injury_check.opponent.likely: "e a postura de [my_foe.GetFirstNameNoTooltip] está falhando."
 single_combat.0001.desc.injury_check.opponent.very_likely: "e a postura de [my_foe.GetFirstNameNoTooltip] é um desastre."
 ## Duel Success Each-Way Fragments
 single_combat.0001.desc.success_check.almost_impossible: "\n\nAinda não consegui abrir a guarda do meu oponente, e ainda não vejo jeito de conquistar a vitória."
 single_combat.0001.desc.success_check.very_unlikely: "\n\nA guarda do meu oponente é feroz, e sinto que estou longe da vitória."
 single_combat.0001.desc.success_check.unlikely: "\n\nMeu oponente ainda está conseguindo resistir bem aos meus golpes, mas parece estar prestes a vacilar."
 single_combat.0001.desc.success_check.moderate: "\n\nEstamos equilibrados, com a vitória balançando no fio da navalha."
 single_combat.0001.desc.success_check.likely: "\n\nMeu oponente está recuando, mas ainda preciso consolidar minha vitória."
 single_combat.0001.desc.success_check.very_likely: "\n\nMeu oponente está cambaleando diante de mim, com a vitória tão próxima que quase posso senti-la."
 single_combat.0001.desc.success_check.almost_certain: "\n\nNão devo estar a mais de um golpe bem colocado da vitória."
