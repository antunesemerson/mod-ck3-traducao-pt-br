 ##################################################
 #Combat Descs
 ## Own Combat Move Feedback
 single_combat.0001.desc.my_feedback.wait_and_hope.will_die: "Eu travo. Posso morrer aqui. Se eu não fizer algo, eu #EMP vou#! morrer aqui. Não consigo me forçar a me mover, tremendo enquanto rezo para que [my_foe.GetFirstNameNoTooltip] tropece e caia, abrindo uma brecha."
 single_combat.0001.desc.my_feedback.wait_and_hope.will_live: "Eu espero meu tempo, aguardando. Talvez eu não seja o melhor combatente[myself.Custom('ES_XA')] mas, se eu der corda suficiente a [my_foe.GetFirstNameNoTooltip] talvez acabe se enforcando a si mesm[my_foe.Custom('ES_OA')]."
 single_combat.0001.desc.my_feedback.unsure_attack: "I try a few perfunctory [myself.Custom('SignatureWeaponAttemptedLightPlural')], focusing mostly on trying not to lose my [myself.Custom('signature_weapon')], but nothing really even gets close to my foe."
 single_combat.0001.desc.my_feedback.enthusiastic_onslaught: "Tenho [myself.Custom('signature_weapon')], tenho um inimigo e estou decidid[myself.Custom('ES_OA')] que os dois se conheçam, seja como for. Golpes selvagens, golpes invertidos de [myself.Custom('SignatureWeaponEndType')] ou qualquer coisa para derrubar meu oponente."
 single_combat.0001.desc.my_feedback.hail_mary: "[myself.Custom('SignatureWeaponFlourishPresentParticiple')|U] violentamente [myself.Custom('signature_weapon')], avanço contra [my_foe.GetFirstNameNoTooltip]. Se vou morrer, farei com que seja uma luta difícil, e [my_foe.GetFirstNameNoTooltip] se vê obrigad[my_foe.Custom('ES_OA')] ante meu entusiasmo desesperado."
 single_combat.0001.desc.my_feedback.pocket_sand: "Agarro um punhado de [sc_defender.Custom('GritType')] e o jogo contra a [my_foe.Custom('MaskFace')] de [my_foe.GetFirstNameNoTooltip] fazendo com que recue engasgando."
 single_combat.0001.desc.my_feedback.nut_em: "Desviando [my_foe.Custom('signature_weapon')] de [my_foe.GetFirstNameNoTooltip] por um instante crucial, entro na sua guarda e levo meu crânio contra o dele com um estalo enjoativo."
 single_combat.0001.desc.my_feedback.guard: "Com golpes hábeis da minha [myself.Custom('signature_weapon')], afasto várias tentativas de ataque, mantendo [my_foe.GetFirstNameNoTooltip] à distância."
 single_combat.0001.desc.my_feedback.probing_attack: "Escolhendo meus momentos com cuidado, desfiro vários golpes rápidos, jogando [my_foe.GetFirstNameNoTooltip] de um lado para o outro e abrindo lentamente a guarda de."
 single_combat.0001.desc.my_feedback.onslaught: "Com a [myself.Custom('signature_weapon')|U] em mãos, faço chover [myself.Custom('SignatureWeaponAttemptedLightPlural')] sobre [my_foe.GetFirstNameNoTooltip], sem dar a um instante de trégua entre os golpes."
 single_combat.0001.desc.my_feedback.surprise_attack: "Percebendo uma fraqueza, lanço-me contra [my_foe.GetFirstNameNoTooltip], [myself.Custom('SignatureWeaponActionPresentParticiple')] [myself.Custom('signature_weapon')], fazendo [my_foe.GetHerHim] recuar com [my_foe.Custom('SignatureWeaponAttemptedHeavy')]."
 single_combat.0001.desc.my_feedback.taunt: "\"Além disso\", grito, \"você é [my_foe.Custom2('InsultAdjectiveArticle', ROOT.Char)], [my_foe.Custom2('InsultAdjective', ROOT.Char)] [my_foe.Custom2('InsultNoun', ROOT.Char)], cuja [my_foe.Custom2('PointOfRidicule', ROOT.Char)] é motivo de chacota em toda a terra!\"."
 single_combat.0001.desc.my_feedback.put_the_boot_in: "Com [myself.Custom('SignatureWeaponAttemptedHeavy')] de [myself.Custom('signature_weapon')], faço [my_foe.GetFirstNameNoTooltip] recuar para trás, depois avanço no golpe e [my_foe.GetHerHim] chuto-o direto no peito."
 single_combat.0001.desc.my_feedback.strict_guard: "[myself.Custom('signature_weapon')|U] me protege melhor do que qualquer escudo, aparando, revidando e me defendendo contra cada movimento de [my_foe.GetFirstNameNoTooltip]. Onde quer que [my_foe.GetSheHe] mova [my_foe.Custom('signature_weapon')], depara-se com minha arma, à espera."
 single_combat.0001.desc.my_feedback.confident_attack: "Faço fluir [myself.Custom('signature_weapon')] em torno de [my_foe.GetFirstNameNoTooltip] como se fosse água, encadeando cada ataque ao seguinte em uma sequência perfeitamente sincronizada."
 single_combat.0001.desc.my_feedback.expert_onslaught: "Pulo para a ação, desferindo [myself.Custom('SignatureWeaponAttemptedLightPlural')] em uma saraivada, forçando-me contra a guarda de [my_foe.GetFirstNameNoTooltip], desgastando[my_foe.GetHerHim] com cada golpe cronometrado com maestria."
 single_combat.0001.desc.my_feedback.attempt_disarm: "[myself.Custom('SignatureWeaponAttemptedHeavy')|U] colosal de [myself.Custom('signature_weapon')] quase basta para arrancar [my_foe.Custom('signature_weapon')] de [my_foe.GetFirstNameNoTooltip], mas consegue se recuperar #EMP por poco#!."
 single_combat.0001.desc.my_feedback.lightning_assault: "Colocando toda a minha força no meu primeiro golpe, lanço-me diretamente contra [my_foe.GetFirstNameNoTooltip]; [myself.Custom('SignatureWeaponActionPresentParticiple')] [myself.Custom('signature_weapon')] em punho alto para [myself.Custom('SignatureWeaponAttemptedHeavy')] que [my_foe.GetHerHim] deixa atordoado."
 single_combat.0001.desc.my_feedback.tire_opponent: "Uma e outra vez, recuo, desvio e serpenteio, mantendo-me sempre a uma distância tentadora de ataque. Em breve [my_foe.GetFirstNameNoTooltip] mostra sinais de cansaço."
 #^possessive used here in lieu of a contracted "it's".
 single_combat.0001.desc.my_feedback.reason_you_suck_speech: "Alguns diriam que é loucura criticar todos os aspectos da vida de [my_foe.GetFirstNameNoTooltip] enquanto est[my_foe.Custom('ES_EA')] me ataca. Eles não conhecem a #EMP satisfacción#! que é ter um público cativo."
 single_combat.0001.desc.my_feedback.technique_from_legend: "Faço o possível para me lembrar das lendas no calor do momento, [myself.Custom('SignatureWeaponActionPresentParticiple')] [myself.Custom('signature_weapon')] como os heróis de outrora. Basta para desferir um golpe contundente contra meu adversário surpreendid[my_foe.Custom('ES_OA')] inimig[my_foe.Custom('ES_OA')]."
 single_combat.0001.desc.my_feedback.like_a_viper: "Com toda a minha força, atravesso a guarda de [my_foe.GetFirstNameNoTooltip] e desfero um golpe ardente com [myself.Custom('signature_weapon')], tentando [myself.Custom2('SignatureWeaponKillTypeThirdPersonFutureGendered',SCOPE.sC('my_foe'))]. Por apenas uma margem estreita, não consigo obter uma vitória sangrenta."
 single_combat.0001.desc.my_feedback.pocket_silver: "Agarrando uma pesada bolsa de moedas da cintura, eu a lanço contra [my_foe.GetFirstNameNoTooltip]. Ela acerta bem na [my_foe.Custom('MaskFace')] me dando uma breve abertura para [myself.Custom('SignatureWeaponAttemptedLight')] com [myself.Custom('signature_weapon')]."
 single_combat.0001.desc.my_feedback.martial_voice: "Comandar a ralé em batalha é um exercício de gritos e intimidação, e demonstro isso a [my_foe.GetFirstNameNoTooltip] berrando impropérios com toda a potência dos meus consideráveis pulmões."
 single_combat.0001.desc.my_feedback.mocking_boast: "Minhas palavras ferem profundamente o ego de [my_foe.GetFirstNameNoTooltip]. #EMP Todo mundo#! conhece minha fama e meu prestígio e que sua reputação #EMP palidece#! em comparação."
 single_combat.0001.desc.my_feedback.is_that_a_crocodile: "Com um rugido, a besta emerge da água, avançando contra nós dois. Eu recuo rapidamente disparad[myself.Custom('ES_OA')] e deixo [my_foe.GetFirstNameNoTooltip] [myself.Custom('SignatureWeaponFlourishPresentParticiple')] [my_foe.Custom('signature_weapon')] contra ela, em pânico. Quando o crocodilo recua, eu me aproximo de suas costas."
 single_combat.0001.desc.my_feedback.desert_warrior: "Aqui, com esse calor, é preciso ser resistente para lutar. [my_foe.GetFirstNameNoTooltip] #EMP gotea#! suor e sua respiração está ofegante; é brincadeira de criança exaurir[my_foe.GetHerHim] com [myself.Custom('SignatureWeaponAttemptedLightPlural')] ocasionais."
 single_combat.0001.desc.my_feedback.jungle_stalker: "A densa folhagem da selva torna o movimento lento na melhor das hipóteses, impossível na pior, e as sombras raramente estão a mais de um rápido jogo de pés. Onde [my_foe.GetFirstNameNoTooltip] se atrapalha, eu me destaco, desaparecendo apenas para reaparecer com um [myself.Custom('SignatureWeaponAttemptedHeavy')]."
 single_combat.0001.desc.my_feedback.open_terrain_expert: "Com todo o espaço do mundo para lutar, dou círculos lânguidos em torno de [my_foe.GetFirstNameNoTooltip], cedendo terreno inútil a cada golpe que ele dá e recuando sem esforço depois de cada um dos meus ataques."
 single_combat.0001.desc.my_feedback.rough_terrain_expert.rocky: "A paisagem rochosa em que lutamos é perigosa. Qualquer um de nós poderia tropeçar e despencar para a morte, e um empurrão violento aqui é tão perigoso quanto uma ponta de espada. Sinto grande prazer em demonstrar isso repetidas vezes a [my_foe.GetFirstNameNoTooltip]."
 single_combat.0001.desc.my_feedback.rough_terrain_expert.boggy: "As charnecas são notoriamente traiçoeiras até nas melhores circunstâncias, e esta não é exceção. Embora eu ainda não tenha conseguido empurrar a [my_foe.GetFirstNameNoTooltip] para as águas salobras, está #EMP muy#! muito perto."
 single_combat.0001.desc.my_feedback.forest_fighter: "As matas oferecem muitas oportunidades de vantagem. Eu me esquivo para trás, colocando um trecho de arbustos espinhosos entre [my_foe.GetFirstNameNoTooltip] e eu, depois volto sobre meus passos para lançar um(a) [myself.Custom('SignatureWeaponAttemptedLight')] feroz contra [my_foe.GetSheHe]."
 single_combat.0001.desc.my_feedback.raaargh: "Com saliva voando e [myself.Custom('signature_weapon')] [myself.Custom('SignatureWeaponFlourishPresentParticiple')] loucamente, eu me lanço sobre meu inimigo. Uma névoa vermelha rasga minha mente, e tudo vira fúria, sangue e catarse deliciosa."
 single_combat.0001.desc.my_feedback.hard_grit: "Com facilidade treinada, desvio de um golpe de [my_foe.GetFirstNameNoTooltip], avançando e erguendo [myself.Custom('signature_weapon')] para [myself.Custom('SignatureWeaponAttemptedHeavy')], antes de recuar rapidamente para uma distância segura."
 single_combat.0001.desc.my_feedback.feint_and_stab: "[myself.Custom('signature_weapon')|U] faz [myself.Custom('SignatureWeaponAttemptedLight')] para um lado e, com a outra mão, saco uma segunda adaga e lanço uma estocada contra [my_foe.GetFirstNameNoTooltip], que tenta apará-la."
 single_combat.0001.desc.my_feedback.butchery: "Não consigo contar quantas pessoas eu já [myself.Custom('SignatureWeaponKillTypePastParticiple')] com [myself.Custom('signature_weapon')]. Talvez [my_foe.GetFirstName] seja o próximo, talvez não, mas minha chuva de golpes selvagens deve tê-lo preocupado com isso."
 single_combat.0001.desc.my_feedback.stoic_veteran: "A Guarda Varangiana não encoraja frouxidão. É preciso um olhar vigilante e um braço firme para se destacar entre os guarda-costas do Imperador, e a cada golpe eu mostro a [my_foe.GetFirstNameNoTooltip] como lutam os Portadores do Machado."
 single_combat.0001.desc.my_feedback.blade_dance: "Na batalha, sou um artista. Cada golpe é uma pincelada, cada inimigo caído ou gota de sangue, uma salpicadura de tinta. Quando empunho [myself.Custom('signature_weapon')], alternando sem esforço entre floreio e golpe, pinto um quadro de agonia em meu inimigo."
 single_combat.0001.desc.my_feedback.wrath_of_highgod: "[myself.GetFaith.HighGodName] é sábio, e sua ira está do #EMP meu#! lado. Grito minha devoção aos céus, para que [my_foe.GetFirstNameNoTooltip] trema de medo diante da minha fé."
 single_combat.0001.desc.my_feedback.hurt_me_better: "Nada faz o sangue pulsar como a picada de uma doce agonia, e ninguém entende a dor como eu. Impulsionad[myself.Custom('ES_OA')] por minhas feridas, me lanço contra [my_foe.GetFirstNameNoTooltip], desferindo [myself.Custom('SignatureWeaponAttemptedLightPlural')] selvagens com [myself.Custom('signature_weapon')]."
 single_combat.0001.desc.my_feedback.special_fallback: "Percebendo um momento de oportunidade, desfero um chute feroz, bem na canela de [my_foe.GetFirstNameNoTooltip], quase fazendo [my_foe.GetHerHim] manc"
 single_combat.0001.desc.my_feedback.something_to_hide: "Durante um momento, [my_foe.GetFirstNameNoTooltip] fica quiet[my_foe.Custom('ES_OA')]. Então, algo parece se encaixar na cabeça dela, e o corpo dela fraqueja visivelmente sob o peso da lembrança do meu domínio sobre [my_foe.GetSheHe]."
 ## Opponent Combat Move Feedback
 single_combat.0001.desc.opponent_response.wait_and_hope: "[my_foe.GetFirstNameNoTooltip] permanece completamente imóvel, aparentemente esperando que eu simplesmente largue minha [myself.Custom('signature_weapon')]."
 single_combat.0001.desc.opponent_response.unsure_attack: "[my_foe.GetFirstNameNoTooltip] tenta, hesitante, lançar um [myself.Custom('SignatureWeaponAttemptedLight')] contra mim, mas o golpe é facilmente afastado."
 single_combat.0001.desc.opponent_response.enthusiastic_onslaught.banned_house: "\"#EMP [my_foe.GetFullNameNoTooltip]!#!\" $single_combat.0001.desc.opponent_response.enthusiastic_onslaught.epilogue$"
 single_combat.0001.desc.opponent_response.enthusiastic_onslaught.own_house: "\"Você é uma desgraça para o nome [my_foe.GetHouse.GetNameNoTooltip]!\" $single_combat.0001.desc.opponent_response.enthusiastic_onslaught.epilogue$"
 single_combat.0001.desc.opponent_response.enthusiastic_onslaught.motto: "\"#EMP [my_foe.GetHouse.GetMotto]#!, escória!\" $single_combat.0001.desc.opponent_response.enthusiastic_onslaught.epilogue$"
 single_combat.0001.desc.opponent_response.enthusiastic_onslaught.epilogue: "Grita meu oponente, [my_foe.Custom('SignatureWeaponFlourishPresentParticiple')] [my_foe.Custom('signature_weapon')] furiosamente contra mim, perto de mim e ao meu redor."
 single_combat.0001.desc.opponent_response.hail_mary: "Consciente de que está totalmente em desvantagem[my_foe.Custom('ES_OA')], [my_foe.GetFirstNameNoTooltip] se lança diretamente contra mim, obrigando-me a recuar com o desespero dos condenados."
 single_combat.0001.desc.opponent_response.pocket_sand: "Num instante estamos lutando; no seguinte, há um grito de \"#EMP Huyah!#!\". Meus [myself.Custom('EyeEyes')] ardem, minha visão se turva, e minha boca sente o gosto do [sc_defender.Custom('GritType')] arremessado."
 single_combat.0001.desc.opponent_response.nut_em: "Ao enxergar uma oportunidade, [my_foe.GetFirstNameNoTooltip] avança e me dá uma cabeçada forte na minha [myself.Custom('MaskFace')]. Cambaleio para trás, desequilibrado."
 single_combat.0001.desc.opponent_response.guard: "[my_foe.GetFirstNameNoTooltip] adota uma postura defensiva, fazendo o máximo possível para me repelir. [my_foe.Custom('EyeEyes')|U] de [my_foe.Custom('ES_EA')] [my_foe.GetWomanMan] seguem todos os meus movimentos."
 single_combat.0001.desc.opponent_response.probing_attack: "A réplica de [my_foe.GetFirstNameNoTooltip] está cuidadosamente calculada, aguardando o momento exato para responder com [my_foe.Custom('SignatureWeaponAttemptedLightPlural')] golpes leves de [my_foe.Custom('signature_weapon')]."
 single_combat.0001.desc.opponent_response.onslaught: "[my_foe.GetFirstNameNoTooltip] estala o pescoço, então começa a fazer chover golpes contra minha guarda, uma maratona de [my_foe.Custom('SignatureWeaponAttemptedHeavyPlural')] que quase me quebram com sua ferocidade implacável."
 single_combat.0001.desc.opponent_response.surprise_attack: "[my_foe.GetFirstNameNoTooltip] muda de direção de repente, jogando-se para o lado num [my_foe.Custom('SignatureWeaponAttemptedHeavy')] que eu mal consigo desviar."
 single_combat.0001.desc.opponent_response.taunt: "[my_foe.GetFirstNameNoTooltip], aparentemente desprezando a luta de verdade, escolhe fazer uma série de comentários pessoais e ferinos sobre mim, minha família e a maneira como como aspargos."
 single_combat.0001.desc.opponent_response.put_the_boot_in: "[my_foe.GetFirstNameNoTooltip] avança, forçando-me para trás com um [my_foe.Custom('SignatureWeaponAttemptedLight')] antes de erguer um chute alto até meu peito. Quase vou ao chão."
 single_combat.0001.desc.opponent_response.strict_guard: "[my_foe.GetFirstNameNoTooltip] adota uma postura defensiva, [my_foe.Custom('signature_weapon')] formando uma parede praticamente impenetrável de paradas perfeitas entre mim e [my_foe.GetSheHe]."
 single_combat.0001.desc.opponent_response.confident_attack: "[my_foe.GetFirstNameNoTooltip] retruca com uma série fluida de [my_foe.Custom('SignatureWeaponAttemptedLightPlural')] e [my_foe.Custom('SignatureWeaponAttemptedHeavyPlural')], cada golpe me forçando um pouco mais para trás."
 single_combat.0001.desc.opponent_response.expert_onslaught: "[my_foe.GetFirstNameNoTooltip] responde com uma feroz saraivada de [my_foe.Custom('SignatureWeaponAttemptedLightPlural')], quase [my_foe.Custom('SignatureWeaponKillTypeFirstPersonPresentParticiple')] repetidas vezes."
 single_combat.0001.desc.opponent_response.attempt_disarm: "Com uma velocidade surpreendente, [my_foe.GetFirstNameNoTooltip] desfere [my_foe.Custom('SignatureWeaponAttemptedHeavy')] com [my_foe.Custom('signature_weapon')], quase fazendo com que eu solte [myself.Custom('signature_weapon')]."
 single_combat.0001.desc.opponent_response.lightning_assault: "[my_foe.GetFirstNameNoTooltip] não perde tempo e me recebe com uma intensa série de [my_foe.Custom('SignatureWeaponAttemptedHeavyPlural')] que me obrigam a recuar passo a passo."
 single_combat.0001.desc.opponent_response.tire_opponent: "[my_foe.GetFirstNameNoTooltip] recua diante de cada um dos meus golpes, deixando-me atacar sem conseguir outro acerto sólido. Não demora para eu sentir o cansaço chegando."
 single_combat.0001.desc.opponent_response.reason_you_suck_speech: "Numa tentativa de me humilhar, [my_foe.GetFirstNameNoTooltip] simplesmente recua sempre que me aproximo, insultando-me em detalhes, #EMP sabiendo bien#! que não posso deixar de prestar atenção."
 single_combat.0001.desc.opponent_response.technique_from_legend: "[my_foe.GetFirstNameNoTooltip] [my_foe.Custom('SignatureWeaponActionThirdPerson')] [my_foe.Custom('signature_weapon')] de uma forma estranhamente familiar e executa quase perfeitamente [my_foe.Custom('SignatureWeaponAttemptedHeavy')] que eu juraria já ter visto antes."
 single_combat.0001.desc.opponent_response.like_a_viper: "Quando me dou conta, de algum modo [my_foe.GetFirstNameNoTooltip] está #EMP dentro#! dentro da minha guarda, [my_foe.Custom('signature_weapon')], avançando em direção ao meu coração. Só por uma margem ínfima consigo desviar para trás."
 single_combat.0001.desc.opponent_response.pocket_silver: "Do nada, [my_foe.GetFirstNameNoTooltip] arremessa uma pesada bolsa contra minha [myself.Custom('MaskFace')], que acerta com um #EMP estalo#!. Quando me recupero, [my_foe.GetSheHe] já está pressionando sua vantagem sobre mim."
 single_combat.0001.desc.opponent_response.martial_voice: "[my_foe.Custom('signature_weapon')] de [my_foe.GetFirstNameNoTooltip] passa para uma posição defensiva preguiçosa e [my_foe.GetSheHe] começa a gritar comigo em um tom que seria usado contra um servo malcomportado, não contra um[myself.Custom('ES_XA')] [myself.GetTitleAsNameNoTooltip]."
 single_combat.0001.desc.opponent_response.mocking_boast: "[my_foe.GetFirstNameNoTooltip] recua, criando uma pequena pausa. A calma temporária se enche de fanfarronices sobre a fama de e ataques ao meu valor, o bastante para me enfurecer."
 single_combat.0001.desc.opponent_response.is_that_a_crocodile: "Um inesperado sibilar reptiliano revela um crocodilo furioso, recém-saído de um curso d'água próximo, e só com vários [my_foe.Custom('SignatureWeaponAttemptedHeavyPlural')] consigo afastá-lo."
 single_combat.0001.desc.opponent_response.desert_warrior: "Enquanto me esgoto lutando neste calor, parece que [my_foe.GetFirstNameNoTooltip] se mantém fresc[my_foe.Custom('ES_OA')] e ágil, encantad[my_foe.Custom('ES_OA')] de oferecer apenas [my_foe.Custom('SignatureWeaponAttemptedLight')] de vez em quando."
 single_combat.0001.desc.opponent_response.jungle_stalker: "[my_foe.GetFirstNameNoTooltip] demonstra ser um[my_foe.Custom('ES_XA')] inimig[my_foe.Custom('ES_OA')] escorregadi[my_foe.Custom('ES_OA')], esquivando meus ataques e movendo-se pela densa vegetação rasteira com uma facilidade que para mim é impossível."
 single_combat.0001.desc.opponent_response.open_terrain_expert: "[my_foe.GetFirstNameNoTooltip] faz excelente uso do terreno aberto, desferindo [my_foe.Custom('SignatureWeaponAttemptedLightPlural')] antes de recuar para o amplo espaço."
 single_combat.0001.desc.opponent_response.rough_terrain_expert.rocky: "Especialista[my_foe.Custom('ES_OA')] em encostas rochosas, [my_foe.GetFirstNameNoTooltip] não perde tempo em reivindicar o terreno mais alto, uma vantagem com a qual #EMP casi#! me arranca vários membros."
 single_combat.0001.desc.opponent_response.rough_terrain_expert.boggy: "Mais acostumad[my_foe.Custom('ES_OA')] a lutar nestes pântanos lamacentos do que eu, [my_foe.GetFirstNameNoTooltip] tenta repetidas vezes me forçar a entrar nessa água salobra, quase com sucesso."
 single_combat.0001.desc.opponent_response.forest_fighter: "Uma[my_foe.Custom('ES_XA')] [my_foe.GetWomanMan] do bosque hábil[my_foe.Custom('ES_OA')], [my_foe.GetFirstNameNoTooltip] parece atravessar espinheiros e arbustos sem dificuldade, deixando-me a mim abrir caminho entre os obstáculos atrás de [my_foe.GetSheHe]."
 single_combat.0001.desc.opponent_response.raaargh: "[my_foe.GetFirstNameNoTooltip] parece vibrar por um segundo, então explode de fúria, berrando alto o bastante para sacudir a Terra e se atirando sobre mim com uma rara #EMP selvageria#!."
 single_combat.0001.desc.opponent_response.hard_grit: "[my_foe.GetFirstNameNoTooltip] é um[my_foe.Custom('ES_XA')] lutador[my_foe.Custom('ES_OA')] preocupantemente competente e, repetidas vezes, desvia ou bloqueia até os golpes mais sólidos para devolvê-los contra mim."
 single_combat.0001.desc.opponent_response.feint_and_stab: "[my_foe.GetFirstNameNoTooltip] tenta fintar para a esquerda com [my_foe.Custom('signature_weapon')], apenas para atacar meu coração com uma adaga oculta na outra mão."
 single_combat.0001.desc.opponent_response.butchery: "Um sorriso cruel se espalha pelos lábios de [my_foe.GetFirstNameNoTooltip] e antes que eu consiga ajustar minha guarda, quase cedoo sob uma saraivada feroz de [my_foe.Custom('SignatureWeaponAttemptedLightPlural')], que cai como uma chuva feroz."
 single_combat.0001.desc.opponent_response.stoic_veteran: "O tempo que [my_foe.GetFirstNameNoTooltip] passou na Guarda Varega [my_foe.GetHerHim] deixou estoic[my_foe.Custom('ES_OA')], brutal e mortal com [my_foe.Custom('signature_weapon')], desferindo [my_foe.Custom('SignatureWeaponAttemptedHeavy')] continuamente contra meu torso."
 single_combat.0001.desc.opponent_response.blade_dance: "[my_foe.GetFirstNameNoTooltip] é célebre por sua habilidade com [my_foe.Custom('signature_weapon')] e me lembra disso com [my_foe.Custom('SignatureWeaponAttemptedLightPlural')] que encadeia com facilidade, adereçados de [my_foe.Custom('SignatureWeaponAttemptedHeavy')] ocasional e terrível."
 single_combat.0001.desc.opponent_response.wrath_of_highgod: ""Por [my_foe.GetFaith.HighGodNameAlternate] e [my_foe.GetFaith.WarGodName], sofra, blasfem[myself.Custom('ES_OA')]!", grita [my_foe.GetFirstNameNoTooltip], [my_foe.Custom('SignatureWeaponActionPresentParticiple')] [my_foe.Custom('signature_weapon')] aos céus."
 single_combat.0001.desc.opponent_response.hurt_me_better: "Um fio de sangue escorre do couro cabeludo de [my_foe.GetFirstNameNoTooltip]. Quando chega ao seu lábio superior, ele o lambe com um sorriso diabólico."
 single_combat.0001.desc.opponent_response.special_fallback: "Inesperadamente, [my_foe.GetFirstNameNoTooltip] consegue lançar um chute cruel contra minha canela, mancando-me por um instante."
 single_combat.0001.desc.opponent_response.something_to_hide: "\"Você se esqueceu de que está em #EMP deuda#! dívida comigo, [myself.GetFirstNameNoTooltip]?\" sorri [my_foe.GetFirstNameNoTooltip]. Quando percebo do que está falando, meus ombros cedem."
 ##################################################
 #Outcome Event: Loser
 ## Defender Lost, Own Combat Move Feedback
 single_combat.0031.desc.sc_defender.wait_and_hope: "Esperar que meu oponente dê o primeiro passo não me faz nenhum favor, apenas dá a [sc_victor.GetSheHe] a vantagem."
 single_combat.0031.desc.sc_defender.unsure_attack: "Meus ataques débeis não fazem absolutamente nada."
 single_combat.0031.desc.sc_defender.enthusiastic_onslaught: "Meu [sc_loser.Custom('SignatureWeaponFlourishPresentParticiple')] selvagem não vale de nada, servindo apenas para me cansar."
 single_combat.0031.desc.sc_defender.hail_mary: "Meu ataque desesperado com tudo que tenho não leva a lugar nenhum."
 single_combat.0031.desc.sc_defender.pocket_sand: "Meu oponente desvia sem esforço do [sc_defender.Custom('GritType')] que arremesso."
 single_combat.0031.desc.sc_defender.nut_em: "Minha cabeçada abortada só dá ao meu oponente uma enorme abertura."
 single_combat.0031.desc.sc_defender.guard: "Meu oponente força a passagem através da minha guarda."
 single_combat.0031.desc.sc_defender.probing_attack: "Meu oponente afasta meus golpes cronometrados."
 single_combat.0031.desc.sc_defender.onslaught: "Meus [sc_loser.Custom('SignatureWeaponAttemptedHeavyPlural')|U] não conseguem fazer grande coisa."
 single_combat.0031.desc.sc_defender.surprise_attack: "Meu oponente enxerga através do meu ataque surpresa."
 single_combat.0031.desc.sc_defender.taunt: "Minhas provocações caem em ouvidos moucos."
 single_combat.0031.desc.sc_defender.put_the_boot_in: "Meu [sc_loser.Custom('SignatureWeaponAttemptedHeavy')] inicial acerta, mas meu chute me desequilibra."
 single_combat.0031.desc.sc_defender.strict_guard: "Apesar dos meus melhores esforços, meu oponente despedaça minha guarda."
 single_combat.0031.desc.sc_defender.confident_attack: "Meu oponente consegue aparar meus golpes com firmeza."
 single_combat.0031.desc.sc_defender.expert_onslaught: "Mesmo meus melhores [sc_loser.Custom('SignatureWeaponAttemptedHeavyPlural')] parecem não surtir efeito."
 single_combat.0031.desc.sc_defender.attempt_disarm: "Minha tentativa de desarme quase faz #EMP minha#! [sc_loser.Custom('signature_weapon')] voar."
 ### No need for a lightning_assault, as you can't end the duel in the first round.
 single_combat.0031.desc.sc_defender.tire_opponent: "Minha tentativa de atrair meu oponente falha, pois [sc_victor.GetSheHe] ignora meus desvios teatrais."
 single_combat.0031.desc.sc_defender.reason_you_suck_speech: "Meu oponente range os dentes e ignora meu discurso."
 single_combat.0031.desc.sc_defender.technique_from_legend: "Na realidade, os feitos das lendas são difíceis, e eu fracasso em fazer grande coisa."
 single_combat.0031.desc.sc_defender.like_a_viper: "Avanço para o que pensei ser uma brecha, só para acabar golpeando o ar vazio."
 single_combat.0031.desc.sc_defender.pocket_silver: "Meu oponente desvia sem esforço da bolsa que arremesso, sem nem se impressionar."
 single_combat.0031.desc.sc_defender.martial_voice: "Minha tentativa de intimidar meu oponente fracassa imediatamente."
 single_combat.0031.desc.sc_defender.mocking_boast: "Minhas fanfarronices caem em ouvidos moucos; meu oponente ignora por completo minhas provocações."
 single_combat.0031.desc.sc_defender.is_that_a_crocodile: "O crocodilo para no meio da investida, reconsiderando o ataque."
 single_combat.0031.desc.sc_defender.desert_warrior: "Por mais suado[sc_victor.Custom('ES_OA')] que esteja, meu oponente parece incansável."
 single_combat.0031.desc.sc_defender.jungle_stalker: "A selva costuma ser difícil para lutar, mas meu oponente segue firme."
 single_combat.0031.desc.sc_defender.open_terrain_expert: "Mesmo com todo o espaço que eu poderia desejar, meu oponente se mostra implacável."
 single_combat.0031.desc.sc_defender.rough_terrain_expert: "Apesar do terreno desagradável, meu oponente acompanha o ritmo dos meus ataques."
 single_combat.0031.desc.sc_defender.forest_fighter: "Nem todo mundo luta bem numa floresta, mas meu oponente acompanha golpe por golpe."
 single_combat.0031.desc.sc_defender.raaargh: "Uma pausa na minha apoplexia me deixa quase catatônic[sc_loser.Custom('ES_OA')]; meu oponente está iles[sc_victor.Custom('ES_OA')]; mas me sinto acab[sc_loser.Custom('ES_OA')] em frangalhos."
 single_combat.0031.desc.sc_defender.hard_grit: "Apesar de toda a minha experiência, meu oponente frustra cada um dos meus golpes."
 single_combat.0031.desc.sc_defender.feint_and_stab: "Meu oponente enxerga através da minha finta, tornando inútil a estocada complementar."
 single_combat.0031.desc.sc_defender.butchery: "Posso até ser um abatedor proficiente, mas isso não me serve de nada aqui."
 single_combat.0031.desc.sc_defender.stoic_veteran: "Tudo o que aprendi em Miklagarðr não foi suficiente; meu oponente me apara repetidas vezes."
 single_combat.0031.desc.sc_defender.blade_dance: "Minhas tentativas de floreio se mostram equivocadas, com meu oponente contra-atacando cada uma delas."
 single_combat.0031.desc.sc_defender.wrath_of_highgod: "Minha prece bradada só dá ao meu oponente uma oportunidade."
 single_combat.0031.desc.sc_defender.hurt_me_better: "A dor muitas vezes foi minha aliada, mas hoje ela me abandona."
 single_combat.0031.desc.sc_defender.special_fallback: "Meu oponente não tem dificuldade alguma para se afastar do meu chute."
 single_combat.0031.desc.sc_defender.something_to_hide: "Meu oponente ou não ouve ou não se importa com minhas ameaças implícitas."
