 ## Defender Won, Own Combat Move Feedback
 single_combat.0041.desc.sc_defender.wait_and_hope: "Minha rajada de [sc_victor.Custom('SignatureWeaponAttemptedLightPlural')] se mostra eficaz."
 single_combat.0041.desc.sc_defender.unsure_attack: "No combate, a surpresa muitas vezes vence, e isso se confirma aqui."
 single_combat.0041.desc.sc_defender.enthusiastic_onslaught: "Parece que minhas provocações mexeram demais com meu oponente."
 single_combat.0041.desc.sc_defender.hail_mary: "Chutar quando a pessoa já está por baixo é golpe baixo, mas funciona."
 single_combat.0041.desc.sc_defender.pocket_sand: "Nada rompeu minha guarda antes, e nada a rompe hoje."
 single_combat.0041.desc.sc_defender.nut_em: "Como dizem, a confiança gera competência, e meus golpes provam isso."
 single_combat.0041.desc.sc_defender.guard: "Poucas pessoas conseguem suportar [sc_victor.Custom('SignatureWeaponAttemptedHeavyPlural')] em sequência, e meu oponente não é exceção."
 single_combat.0041.desc.sc_defender.probing_attack: "Eu esperava pegar meu oponente desprevenido, mas minha tentativa de desarmá-lo[sc_loser.Custom('ES_LoLa')] vai muito melhor."
 single_combat.0041.desc.sc_defender.onslaught: "Minha rajada de [sc_victor.Custom('SignatureWeaponAttemptedLightPlural')] se mostra eficaz."
 single_combat.0041.desc.sc_defender.surprise_attack: "Atrair meu oponente para se exaurir parece funcionar bem."
 single_combat.0041.desc.sc_defender.taunt: "Parece que o pelo de meu oponente se arrepia mais com meu discurso do que com minha [sc_victor.Custom('signature_weapon')]."
 single_combat.0041.desc.sc_defender.put_the_boot_in: "Derrotar meu oponente é tão fácil quanto recontar uma história."
 single_combat.0041.desc.sc_defender.strict_guard: "Avanço em direção ao coração de meu oponente, quase acabando com isso num único golpe."
 single_combat.0041.desc.sc_defender.confident_attack: "Uma boa dose de prata na [sc_loser.Custom('MaskFace')] parece fazer maravilhas."
 single_combat.0041.desc.sc_defender.expert_onslaught: "Meu oponente fica positivamente #EMP horrorizado#! com minhas obscenidades gritadas."
 single_combat.0041.desc.sc_defender.attempt_disarm: "Meu oponente range os dentes com #EMP força#! diante dos meus comentários."
 ### No need for a lightning_assault, as you can't end the duel in the first round.
 single_combat.0041.desc.sc_defender.tire_opponent: "O calor parece cobrar um preço alto de meu oponente."
 single_combat.0041.desc.sc_defender.reason_you_suck_speech: "A selva atrapalha meu oponente repetidas vezes."
 single_combat.0041.desc.sc_defender.technique_from_legend: "A vastidão em que lutamos me dá controle fácil do duelo."
 single_combat.0041.desc.sc_defender.like_a_viper: "Esse terreno acidentado se mostra complicado para meu oponente lutar."
 single_combat.0041.desc.sc_defender.pocket_silver: "A floresta desacelera meu oponente com facilidade."
 single_combat.0041.desc.sc_defender.martial_voice: "Poucos conseguem se manter diante do meu berserkergang, e meu oponente não é exceção."
 single_combat.0041.desc.sc_defender.mocking_boast: "Experiência duramente conquistada rende frutos quando usada com sabedoria, e eu a uso muitíssimo bem."
 single_combat.0041.desc.sc_defender.is_that_a_crocodile: "Embora recue a tempo, minha estocada com a mão secundária quase acaba com isso."
 single_combat.0041.desc.sc_defender.desert_warrior: "Meus ataques impiedosos cobram um preço terrível."
 single_combat.0041.desc.sc_defender.jungle_stalker: "A Guarda não quebra, nem aqui, nem nunca."
 single_combat.0041.desc.sc_defender.open_terrain_expert: "Eu luto como a água corre: flexível, mas inevitável."
 single_combat.0041.desc.sc_defender.rough_terrain_expert: "Claramente [sc_victor.GetFaith.HighGodName] sorri para mim."
 single_combat.0041.desc.sc_defender.forest_fighter: "A dor é a melhor aliada numa luta, e está do #EMP meu#! lado."
 single_combat.0041.desc.sc_defender.raaargh: "Poucos oponentes esperam o chute tático na canela."
 single_combat.0041.desc.sc_defender.hard_grit: "Meu oponente parece apavorad[my_foe.Custom('ES_OA')] com minhas insinuações."
 single_combat.0041.desc.sc_defender.feint_and_stab: "Embora recue a tempo, minha estocada com a mão secundária quase acaba com isso."
 single_combat.0041.desc.sc_defender.butchery: "Quando [sc_loser.GetFirstNameNoTooltip] fica simplesmente congelad[sc_loser.Custom('ES_OA')] no lugar, quase sou eu quem fica atordoado[myself.Custom('ES_OA')]! Mas se [sc_loser.GetSheHe] não quer lutar, isso não vai me deter, e eu avanço com [sc_victor.Custom('SignatureWeaponAttemptedHeavy')].\n\n"
 single_combat.0041.desc.sc_defender.stoic_veteran: "[sc_loser.GetFirstNameNoTooltip] tenta alguns [sc_loser.Custom('SignatureWeaponAttemptedLightPlural')] perfunctórios, mas nada de que eu não consiga me esquivar com facilidade.\n\n"
 single_combat.0041.desc.sc_defender.blade_dance: "[sc_loser.GetFirstNameNoTooltip] voa em minha direção, gritando incoerentemente e [sc_loser.Custom('SignatureWeaponFlourishPresentParticiple')] [sc_loser.Custom('signature_weapon')] com todo o entusiasmo [sc_loser.Custom('ES_DelDela')] amador[sc_loser.Custom('ES_OA')] desesperado[sc_loser.Custom('ES_OA')].\n\n"
 single_combat.0041.desc.sc_defender.wrath_of_highgod: "[sc_loser.GetFirstNameNoTooltip] se lança em um ataque de tudo ou nada, [sc_loser.Custom('signature_weapon')] fora, pronto[sc_loser.Custom('ES_OA')] para vencer ou morrer com [sc_loser.Custom('SignatureWeaponAttemptedHeavyPlural')].\n\nInfelizmente para [sc_loser.GetSheHe],"
 single_combat.0041.desc.sc_defender.hurt_me_better: "[sc_loser.GetFirstNameNoTooltip] vai pegar um punhado de [sc_defender.Custom('GritType')] do chão, mas, quando tenta me jogar isso, uma rajada de vento o devolve para a [sc_loser.Custom('MaskFace')].\n\n"
 single_combat.0041.desc.sc_defender.special_fallback: "De forma imprudente, [sc_loser.GetFirstNameNoTooltip] dispara na minha direção, com a [sc_loser.Custom('signature_weapon')] pendendo frouxa, claramente tentando me dar uma baita cabeçada.\n\n"
 single_combat.0041.desc.sc_defender.something_to_hide: "[sc_loser.GetFirstNameNoTooltip] mantém uma guarda decente, mas não impenetrável. Dá trabalho, mas no fim eu consigo"
 ## Defender Won, Opponent Finishing Move Feedback
 single_combat.0041.desc.opponent_response.wait_and_hope: "[sc_loser.GetFirstNameNoTooltip] parte com tudo para a ofensiva, fazendo chover [sc_loser.Custom('SignatureWeaponAttemptedHeavyPlural')] sobre mim, tornando um pesadelo aparar cada um deles.\n\nSó consigo escapar dessa chuva de golpes porque dou um passo lateral por sorte bem no meio de um piscar de olhos,"
 single_combat.0041.desc.opponent_response.unsure_attack: "[sc_loser.GetFirstNameNoTooltip] tenta mudar o arco do próximo golpe no meio do movimento, claramente esperando me pegar de surpresa, mas consigo encaixar uma aparada sólida que deixa [sc_loser.GetHerHim] cambaleando."
 single_combat.0041.desc.opponent_response.enthusiastic_onslaught: "[sc_loser.GetFirstNameNoTooltip] recua, os sinais de um sorriso cruel começam a se desenhar em seu rosto. Seja qual for a provocação que vá soltar, não quero ouvi-la, e me lanço a [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] quase instintivamente.\n\n"
 single_combat.0041.desc.opponent_response.hail_mary: "[sc_loser.GetFirstNameNoTooltip] me acerta com um [sc_loser.Custom('SignatureWeaponAttemptedHeavy')] feroz, seguindo o golpe bem-sucedido com uma tentativa de me chutar com sua perna falsa.\n\nSem pensar, desço a [sc_victor.Custom('SignatureWeaponEndType')] da minha [sc_victor.Custom('signature_weapon')] com tanta força que a perna falsa se solta e meu oponente despenca ao chão."
 single_combat.0041.desc.opponent_response.pocket_sand: "[sc_loser.GetFirstNameNoTooltip] me golpeia ferozmente com [sc_loser.Custom('SignatureWeaponAttemptedHeavy')], acompanhando o golpe bem-sucedido com uma tentativa de me chutar. Desvio para o lado, cravando [sc_victor.Custom('SignatureWeaponAttemptedLight')] nas costas dele quando passa, e meu oponente cai ao chão.\n\n"
 single_combat.0041.desc.opponent_response.nut_em: "Seja lá o que mais [sc_loser.GetFirstNameNoTooltip], é condenadamente bom em manter a guarda. É mais sorte do que habilidade quando finalmente consigo"
 single_combat.0041.desc.opponent_response.guard: "[sc_loser.GetFirstNameNoTooltip] é habilidoso[sc_loser.Custom('ES_OA')] com [sc_loser.Custom('signature_weapon')], mas todo guerreiro precisa correr riscos para vencer, e no meio de uma tentativa de [sc_loser.Custom('SignatureWeaponAttemptedLight')] particularmente arriscada que eu"
 single_combat.0041.desc.opponent_response.probing_attack: "[sc_loser.GetFirstNameNoTooltip] luta como um[sc_loser.Custom('ES_XA')] possesso[sc_loser.Custom('ES_OA')], desferindo [sc_loser.Custom('SignatureWeaponAttemptedHeavyPlural')] como se fosse uma tempestade que me força a recuar cada vez mais.\n\nNão é até que ele para um segundo para exultar com sua vitória iminente que"
 single_combat.0041.desc.opponent_response.onslaught: "[sc_loser.GetFirstNameNoTooltip] salta sobre mim, [sc_loser.Custom('SignatureWeaponAttemptedHeavy')] imponente que quase arranca [sc_victor.Custom('signature_weapon')] da minha mão, mas eu me mantenho firme e me apoio no golpe.\n\nEvidentemente, peguei sua arma no ângulo errado, porque"
 single_combat.0041.desc.opponent_response.surprise_attack: "[sc_loser.GetFirstNameNoTooltip] tenta mudar o arco do próximo golpe no meio do movimento, claramente esperando me pegar de surpresa, mas consigo encaixar uma aparada sólida que deixa [sc_loser.GetHerHim] cambaleando."
 single_combat.0041.desc.opponent_response.taunt: "[sc_loser.GetFirstNameNoTooltip] finge avançar repetidamente, parecendo me dar oportunidades de atacar, só para escapar no último instante. Sentindo a chance, eu pressiono mais e com mais força a cada [sc_victor.Custom('SignatureWeaponAttemptedLight')], até acabar acertando [sc_loser.GetHerHim] várias vezes.\n\n"
 single_combat.0041.desc.opponent_response.put_the_boot_in.peg_leg: "Todo mundo sabe que [sc_loser.GetFirstNameNoTooltip] é um[sc_loser.Custom('ES_XA')] orador[sc_loser.Custom('ES_XA')], e pela sua postura, está claro que está prestes a aproveitar esta oportunidade para fazer uma palestra. Bem, é hora de mostrar[sc_loser.GetHerHim] como uma língua de prata se sai contra [sc_victor.Custom('signature_weapon')] de aço.\n\n"
 single_combat.0041.desc.opponent_response.put_the_boot_in.fallback: "[sc_loser.GetFirstNameNoTooltip] assume uma pose dramaticamente desajeitada."
 single_combat.0041.desc.opponent_response.strict_guard: "Movendo-se tão rápido que mal percebo o plano de [sc_loser.GetFirstNameNoTooltip] se lança #EMP dentro#! da minha guarda, [sc_loser.Custom('signature_weapon')] voando direto para meu coração. Tenho apenas um instante para reagir antes de uma morte certa.\n\n"
 single_combat.0041.desc.opponent_response.confident_attack: "[sc_loser.GetFirstNameNoTooltip] pega algo da cintura e o arremessa em minha direção. Antes mesmo de conseguir entender o que era, eu o destruo instintivamente com [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] fazendo com que uma verdadeira chuva de moedas de prata caia sobre meu rival.\n\nCom meu oponente cegad[sc_loser.Custom('ES_OA')] temporariamente,"
 single_combat.0041.desc.opponent_response.expert_onslaught: "[sc_loser.GetFirstNameNoTooltip], seja por raiva ou arrogância, descarrega-se sobre mim, ralhando comigo como se eu fosse um plebeu coberto de terra. Sinto o sangue subir, mas me controlo até [sc_loser.GetSheHe] parar para puxar fundo o ar.\n\n"
 single_combat.0041.desc.opponent_response.attempt_disarm: "[sc_loser.GetFirstNameNoTooltip] mantém a distância, recuando de cada golpe meu. Em vez disso, limita-se a fazer um comentário mordaz atrás do outro sobre minha fama no mundo até que minha paciência se esgote por completo.\n\n\"Sabe qual é uma boa maneira de conquistar uma reputação?\", pergunto, sem resposta. \"Matar alguém famoso\".\n\nA surpresa momentânea de [sc_loser.GetFirstNameNoTooltip] é tudo de que preciso para"
 ### No need for a lightning_assault, as you can't end the duel in the first round.
 single_combat.0041.desc.opponent_response.tire_opponent: "Esse calor, esse calor #EMP debilitante#!! Esse calor #EMP exaustivo#!! Está me matando lentamente, mas eu persevero por pura força de vontade. [sc_loser.GetFirstNameNoTooltip] parece que quase não é afetado, mas, ainda assim, fica cada vez mais surpreso com minha tenacidade.\n\nQuando a sua guarda relaxa um pouco,"
 single_combat.0041.desc.opponent_response.reason_you_suck_speech: "Embora lutar na selva possa ser um desastre, [sc_loser.GetFirstNameNoTooltip] faz parecer #EMP fácil#!. Pelo menos, até o pé ficar preso numa trepadeira.\n\n"
 single_combat.0041.desc.opponent_response.technique_from_legend: "[sc_loser.GetFirstNameNoTooltip] luta melhor em terreno aberto e sabe disso; ceder terreno [sc_loser.GetHerHim] beneficia. Isso torna a luta frustrante até que eu veja por perto uma grande rocha de aspecto afiado, #EMP justo#! com altura de uma canela.\n\nCom paciência, conduzo meu inimig[sc_loser.Custom('ES_OA')] em direção ao pequeno obstáculo, contando com seu reposicionamento arrogante."
 single_combat.0041.desc.opponent_response.like_a_viper: "[sc_loser.GetFirstNameNoTooltip] é um[sc_loser.Custom('ES_XA')] veterano[sc_loser.Custom('ES_OA')] de combate em terrenos inclinados, habilidos[sc_loser.Custom('ES_OA')] em lutar em colinas e montanhas e faz questão de me mostrar isso. Uma vez após outra, tenho que me preparar contra um empurrão firme destinado a me fazer tropeçar,\n\n"
 single_combat.0041.desc.opponent_response.pocket_silver: "Nos pântanos, [sc_loser.GetFirstNameNoTooltip] luta como [sc_victor.GetFaith.DevilName] em pessoa, e me empurra repetidas vezes para as águas fedorentas da região. Para minha sorte, nenhuma das poças se mostra especialmente funda.\n\nÉ quase irônico que a primeira poça em que [sc_loser.GetSheHe] se atreve a entrar engula a perna dele até o joelho.\n\n"
 single_combat.0041.desc.opponent_response.martial_voice: "Embora [sc_loser.GetFirstNameNoTooltip] tenha reputação de se virar com competência na mata, nem todas as florestas oferecem tantas vantagens.\n\nA área de mata em que estamos agora parece francamente idílica, e procurar alguma forma de aproveitar sua experiência é obviamente uma enorme distração para [sc_loser.GetFirstNameNoTooltip]."
 single_combat.0041.desc.opponent_response.mocking_boast: "[sc_loser.GetFirstNameNoTooltip] se estremece, parando no lugar por alguns segundos tensos antes de #EMP explotar#! em fúria.\n\nCom todo medo pela sua segurança desaparecido, o/a berserker se lança contra mim em um redemoinho formado por [sc_loser.Custom('SignatureWeaponAttemptedHeavyPlural')], socos, chutes e dentes rangendo.\n\n"
 single_combat.0041.desc.opponent_response.is_that_a_crocodile: "[sc_loser.GetFirstNameNoTooltip] luta bem, não dá quartel e não comete erros. Cada brecha é explorada, cada fraqueza cobra um preço em dor e esforço.\n\nSó jogando de modo conservador, igualando cada golpe dele e nada mais posso acompanhar seu ritmo, esperando até #EMP [sc_loser.GetSheHe]#! cometa um erro antes que eu"
 single_combat.0041.desc.opponent_response.desert_warrior: "[sc_loser.GetFirstNameNoTooltip] lança [sc_loser.Custom('SignatureWeaponAttemptedLight')] contra mim com [sc_loser.Custom('signature_weapon')], mas parece mal focalizado.\n\nNão me custa muito arrancar a arma da mão do meu oponente, e só então vejo o brilho de uma adaga escondida em seu outro punho."
 single_combat.0041.desc.opponent_response.jungle_stalker: "Apesar da reputação temível de [sc_loser.GetFirstNameNoTooltip] de [sc_victor.Custom('SignatureWeaponAttemptedHeavyPlural')] brutais de sua parte parecem… desleixadas, por falta de uma palavra melhor. São fáceis de aparar e, embora cada golpe arda como uma carícia de [sc_victor.GetFaith.DevilName], ter uma arma na mão torna o/a temido/a saqueador[sc_loser.Custom('ES_XA')] mais manejável.\n\n"
 single_combat.0041.desc.opponent_response.open_terrain_expert: "[sc_loser.GetFirstNameNoTooltip] empunha [sc_loser.Custom('signature_weapon')] com toda a competência de um[sc_loser.Custom('ES_XA')] varegue[sc_loser.Custom('ES_OA')], desferindo golpes longos e regulares com sua arma. É difícil, mas nada que eu não seja capaz de aparar bem o suficiente.\n\n"
 single_combat.0041.desc.opponent_response.rough_terrain_expert.rocky: "[sc_loser.GetFirstNameNoTooltip] será célebre por sua habilidade com [sc_loser.Custom('signature_weapon')], mas é óbvio que está excessivamente impressionad[sc_loser.Custom('ES_OA')] com sua própria destreza.\n\n[sc_victor.Custom('SignatureWeaponAttemptedLight')|U] oportunista à mão onde leva [sc_loser.Custom('signature_weapon')] e sua postura se desfaz,"
 single_combat.0041.desc.opponent_response.rough_terrain_expert.boggy: "Ao uivar sua devoção a [sc_loser.GetFaith.HighGodName], [sc_loser.GetFirstNameNoTooltip] deixa que sua atenção se desvie completamente do nosso duelo.\n\nCom um rápido encolher de ombros para reconhecer a absurda arrogância de meu rival, avanço e"
 single_combat.0041.desc.opponent_response.forest_fighter: "Só [sc_victor.GetFaith.HealthGodName] sabe ao certo que cara [sc_loser.GetFirstNameNoTooltip] está fazendo agora. Medo? Dor? Luxúria? Confusão? Provavelmente eu nunca saberei.\n\nSeja o que for, transforma-se numa série de [sc_loser.Custom('SignatureWeaponAttemptedLightPlural')] timidamente inofensivos,"
 single_combat.0041.desc.opponent_response.raaargh: "De repente, [sc_loser.GetFirstNameNoTooltip] avança, mirando um chute violento exatamente onde #EMP estaba#! minha canela estava há um momento. Surpreendid[sc_loser.Custom('ES_OA')] com minha mudança inesperada, meu inimig[sc_loser.Custom('ES_OA')] passa por mim, totalmente desequilibrad[sc_loser.Custom('ES_OA')].\n\n"
 single_combat.0041.desc.opponent_response.hard_grit: "[sc_loser.GetFirstNameNoTooltip] está em pleno intento patético de me desestabilizar, com uma voz assustadora e ameaças floreadas quando perco a paciência e [sc_loser.GetHerHim] acerto na mandíbula com [sc_victor.Custom('SignatureWeaponEndType')] de [sc_victor.Custom('signature_weapon')].\n\n[sc_loser.GetSheHe|U] recua imediatamente cambaleando,"
 single_combat.0041.desc.opponent_response.feint_and_stab: "[sc_loser.GetFirstNameNoTooltip] lança [sc_loser.Custom('SignatureWeaponAttemptedLight')] contra mim com [sc_loser.Custom('signature_weapon')], mas parece mal focalizado.\n\nNão me custa muito arrancar a arma da mão do meu oponente, e só então vejo o brilho de uma adaga escondida em seu outro punho."
 single_combat.0041.desc.opponent_response.butchery: "Nenhuma aparada me detém, nenhum desvio me evita, e tenho de me conter no último instante para evitar [sc_victor.Custom2('SignatureWeaponKillTypeHeadThirdPersonPresentGendered',SCOPE.sC('sc_loser'))].\n\nEm vez disso, simplesmente encosto [sc_victor.Custom('signature_weapon')] contra [sc_loser.GetFirstNameNoTooltip]. Mais uma vez fica paralisad[sc_loser.Custom('ES_OA')], mas está claro que eu venci."
 single_combat.0041.desc.opponent_response.stoic_veteran: "Arriscando na timidez de [sc_loser.GetFirstNameNoTooltip], lanço-me com [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] que [sc_loser.GetHerHim] o desequilibra totalmente. Sem parar para respirar, [sc_loser.GetHerHim] forte no joelho e [sc_loser.GetFirstNameNoTooltip] cai com um #EMP golpe sordo#! forte.\n\n Isso me dá tempo de sobra para me posicionar para uma morte truculenta. [sc_loser.GetFirstNameNoTooltip] se rende em segundos."
 single_combat.0041.desc.opponent_response.blade_dance: "Escolhendo o momento, consigo abrir uma brecha na têmpora com [sc_victor.Custom('SignatureWeaponEndType')] de [sc_victor.Custom('signature_weapon')] e [sc_loser.GetSheHe] cai como uma ovelha com o crânio esmagado.\n\nTomo um segundo ou dois para ver a lamentável visão de est[sc_loser.Custom('ES_EA')] [sc_loser.GetWomanMan] gemendo no/a [sc_defender.Custom('GroundType')] à minha frente, depois me preparo para o golpe fatal.\n\n[sc_loser.GetFirstNameNoTooltip] grunhe uma rendição quando faltavam segundos."
 single_combat.0041.desc.opponent_response.wrath_of_highgod: "o desespero e a inépcia são maus companheiros de cama. A maioria dos seus ataques falha e os que não falham, eu aparo ou desvio com [sc_victor.Custom('signature_weapon')], desequilibrando [sc_loser.GetFirstNameNoTooltip] rapidamente.\n\nQuando acerta acidentalmente a própri[sc_loser.Custom('ES_OA')] na [sc_loser.Custom('MaskFace')] com sua própria mão, tenho pena e [sc_loser.Custom('ES_LoLa')] desarmo.\n\nA rendição vem rapidamente."
 single_combat.0041.desc.opponent_response.hurt_me_better: "[sc_loser.GetSheHe|U] está ocupado demais[sc_loser.Custom('ES_OA')] ofegando para notar ou desviar [sc_victor.Custom('SignatureWeaponEndType')] de [sc_victor.Custom('signature_weapon')] enquanto a cravo diretamente em sua garganta para derrubá[sc_loser.GetHerHim] sobre o/a [sc_defender.Custom('GroundType')] imediatamente.\n\nDeixo minha arma repousando suavemente sobre o estômago de [sc_loser.GetFirstNameNoTooltip] aguardando pacientemente que perceba e se renda. Não demora muito."
 single_combat.0041.desc.opponent_response.special_fallback: "Sem pensar duas vezes, enfio o joelho na barriga dele/dela, e o idiota desaba.\n\nÉ preciso reconhecer que [sc_loser.GetFirstNameNoTooltip] aterrissa o melhor possível e já está se esforçando para se levantar quando eu já me virei atrás de [sc_loser.GetSheHe].\n\nNo entanto, alguns chutes ferozes e [sc_victor.Custom('signature_weapon')] pressionada contra a coluna dele/dela o/a convencem a ficar imóvel e se render."
 single_combat.0041.desc.opponent_response.something_to_hide: "abrir uma brecha de bom tamanho em sua guarda.\n\nA partir daí, só recebo a rajada de [sc_victor.Custom('SignatureWeaponAttemptedLightPlural')] antes de conseguir arrancar [sc_loser.Custom('signature_weapon')] da mão.\n\nPreparo-me para um golpe mortal, mas [sc_loser.GetFirstNameNoTooltip] se rende antes que seja necessário."
 ## Defender Won, Opponent Finishing Move Injury
 single_combat.0041.desc.opponent_response.wait_and_hope.injury: "deixando que [sc_loser.Custom('signature_weapon')] corte o ar sem atrito. Cravo um pé na parte de trás do joelho de [sc_loser.GetFirstNameNoTooltip] e empurro, acertando-lhe a mandíbula quando se vira de forma atrapalhada para me enfrentar.\n\nCom [sc_loser.GetFirstNameNoTooltip] cambaleando, basta [sc_loser.Custom('SignatureWeaponAttemptedHeavy')] para fazer sua arma voar. Generosamente, dou à pessoa alguns segundos para se recompor antes de se render."
 single_combat.0041.desc.opponent_response.unsure_attack.injury: "Em vez de continuar com uma estocada, levo o joelho diretamente à barriga de [sc_loser.GetFirstNameNoTooltip] fazendo-o se curvar enquanto o ar é expelido de seus pulmões.\n\nIsso me oferece a nuca de meu inimig[sc_loser.Custom('ES_OA')] e acompanho o golpe na barriga com uma cotovelada feroz na nuca.\n\n[sc_loser.GetFirstNameNoTooltip] desaba sobre o / a [sc_defender.Custom('GroundType')]. Quase me surpreende que [sc_loser.GetFirstNameNoTooltip] seja capaz de engasgar uma rendição sem vomitar."
 single_combat.0041.desc.opponent_response.enthusiastic_onslaught.injury: "Tem o efeito necessário, deixando meu oponente atordoado[sc_loser.Custom('ES_OA')] no chão.\n\nEm seguida, vem uma rendição ligeiramente grogue logo depois."
 single_combat.0041.desc.opponent_response.hail_mary.injury: "\n\n[sc_loser.GetSheHe] tenta se levantar, mas um golpe rápido de [sc_victor.Custom('signature_weapon')] [sc_loser.GetHerHim] o mantém no chão. Solto uma zombaria audível para que saiba que sua hora chegou, e em troca dos meus esforços recebo uma rendição abafada."
 single_combat.0041.desc.opponent_response.pocket_sand.injury: "romper com [sc_victor.Custom('SignatureWeaponAttemptedLight')], levando [sc_victor.Custom('SignatureWeaponTipType')] de [sc_victor.Custom('signature_weapon')] contra sua garganta.\n\nFicamos parados por tempo demais enquanto [sc_loser.GetFirstNameNoTooltip] avalia suas opções. É preciso um olhar feroz e um tranco repentino para forçar a rendição do [sc_loser.Custom('ES_EA')] teimoso."
 single_combat.0041.desc.opponent_response.nut_em.injury: "consigo aparar com força suficiente para devolver-lhe a própria arma.\n\nPara desviar de [sc_loser.Custom('signature_weapon')], precisa se colocar no caminho de [sc_victor.Custom('signature_weapon')] que eu brando. Não é um golpe letal, mas [sc_loser.GetHerHim] o derruba mesmo assim.\n\nTendo perdido a arma na queda, [sc_loser.GetFirstNameNoTooltip] não tem escolha senão se render."
 single_combat.0041.desc.opponent_response.guard.injury: "Consigo desferrar um golpe desesperado contra a têmpora de [sc_victor.Custom('SignatureWeaponEndType')] com [sc_victor.Custom('signature_weapon')].\n\n[sc_loser.GetFirstNameNoTooltip] recua cambaleando, surpreendid[sc_loser.Custom('ES_OA')], abrindo-me uma excelente oportunidade para arrancar [sc_loser.Custom('signature_weapon')] com [sc_victor.Custom('SignatureWeaponAttemptedHeavy')].\n\nSem arma, meu oponente está à minha mercê, e sabe disso. Em instantes, tenho uma rendição amarga."
 single_combat.0041.desc.opponent_response.probing_attack.injury: "basta um pequeno tranco meu para fazer [sc_loser.Custom('signature_weapon')] voar como uma flecha comicamente grande.\n\nA rendição envergonhada vem assim que [sc_loser.GetFirstNameNoTooltip] compreende o que acabou de acontecer."
 single_combat.0041.desc.opponent_response.onslaught.injury: "deixando que [sc_loser.Custom('signature_weapon')] corte o ar sem atrito. Cravo um pé na parte de trás do joelho de [sc_loser.GetFirstNameNoTooltip] e empurro, acertando-lhe a mandíbula quando se vira de forma atrapalhada para me enfrentar.\n\nCom [sc_loser.GetFirstNameNoTooltip] cambaleando, basta [sc_loser.Custom('SignatureWeaponAttemptedHeavy')] para fazer sua arma voar. Generosamente, dou à pessoa alguns segundos para se recompor antes de se render."
 single_combat.0041.desc.opponent_response.surprise_attack.injury: "Desequilibrad[sc_loser.Custom('ES_OA')], [sc_loser.GetFirstNameNoTooltip] tropeça e gira desajeitadamente contra o/a [sc_defender.Custom('GroundType')].\n\nMantendo-me sobre meu oponente, desato uma saraivada de [sc_victor.Custom('SignatureWeaponAttemptedLightPlural')] com [sc_victor.Custom('signature_weapon')].\n\nMeu oponente se mantém firme no começo, rendendo-se apenas quando fica claro que estou prestes a [sc_victor.Custom2('SignatureWeaponKillTypeGroinThirdPersonFutureGendered',SCOPE.sC('sc_loser'))]."
 single_combat.0041.desc.opponent_response.taunt.injury: "Dando um passo à frente, acerto [sc_loser.GetHerHim] no pescoço com a [sc_victor.Custom('SignatureWeaponEndType')] da minha arma. [sc_loser.GetFirstNameNoTooltip] começa imediatamente a se engasgar sem parar, tentando forçar ar por uma traqueia que acabei de esmagar manualmente.\n\nDepois disso, fica fácil preparar um golpe que obviamente [sc_victor.Custom2('SignatureWeaponKillTypeThirdPersonFutureGendered',SCOPE.sC('sc_loser'))] e forçar a rendição."
 single_combat.0041.desc.opponent_response.put_the_boot_in.injury: "Por um momento, estou confundid[sc_victor.Custom('ES_OA')], insegur[sc_victor.Custom('ES_OA')] do que está acontecendo, até que ouço um barulho atrás de mim e percebo o que está acontecendo.\n\n[sc_loser.GetFirstNameNoTooltip] mudou de postura de forma tão dramática, e #EMP tão#! desajeitadamente que ele acabou #EMP perdido#! [sc_loser.Custom('signature_weapon')] no processo.\n\nMal consigo conter uma gargalhada estrondosa, simplesmente balanço um pouco minha própria arma para provocar uma rendição."
 single_combat.0041.desc.opponent_response.strict_guard.injury: "Agindo por instinto, me inclino para o golpe com toda a minha força, conseguindo #EMP por poco#! redirecionar o golpe por cima do meu ombro e seguir com um joelhada rápida nas entranhas.\n\n[sc_loser.GetFirstNameNoTooltip] desaba. Minha respiração sai em arfadas curtas e irregulares, o cérebro ainda processa meu contato literal com a morte, mas ainda sou capaz de pressionar [sc_victor.Custom('signature_weapon')] contra sua garganta antes que [sc_loser.GetSheHe] consiga se recuperar.\n\nEste duelo é meu."
 single_combat.0041.desc.opponent_response.confident_attack.injury: "me lanço diretamente para o ataque, desferindo [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] que arranca [sc_loser.Custom('signature_weapon')] da mão.\n\n[sc_loser.GetFirstNameNoTooltip] fica atordoad[sc_loser.Custom('ES_OA')] Cospe suavemente uma única moeda de prata e se rende."
 single_combat.0041.desc.opponent_response.expert_onslaught.injury: "Então, e só então, avanço com um [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] que [sc_loser.GetHerHim] o derruba de bunda.\n\nEmbora aturdid[sc_loser.Custom('ES_OA')], no começo [sc_loser.GetFirstNameNoTooltip] parece disposto a continuar lutando. Mas quando fica claro que estou prestes a [sc_victor.Custom2('SignatureWeaponKillTypeHeadThirdPersonFutureGendered',SCOPE.sC('sc_loser'))], ele se rende."
 single_combat.0041.desc.opponent_response.attempt_disarm.injury: "atacar com [sc_victor.Custom('SignatureWeaponAttemptedLight')] direto contra o peito de.\n\nSem o ar dos pulmões, [sc_loser.GetFirstNameNoTooltip] não consegue lutar muito quando derrubo [sc_loser.Custom('signature_weapon')] com meu próximo golpe.\n\nA rendição resultante é humilhada e amarga em igual medida."
 ### No need for a lightning_assault, as you can't end the duel in the first round.
 single_combat.0041.desc.opponent_response.tire_opponent.injury: "Solto [sc_victor.Custom('SignatureWeaponAttemptedLightPlural')] em cascata, surpreendendo tanto meu oponente que [sc_loser.GetSheHe] cai de rosto contra o/a [sc_defender.Custom('GroundType')].\n\nCravar [sc_victor.Custom('signature_weapon')] em seu pescoço me rende uma rendição abafada bem rapidamente."
 single_combat.0041.desc.opponent_response.reason_you_suck_speech.injury: "Aproveitando a oportunidade, lanço [sc_loser.Custom('signature_weapon')] à mata com [sc_victor.Custom('SignatureWeaponAttemptedLight')] arriscado, e então assumo posição para [sc_victor.Custom2('SignatureWeaponKillTypeThirdPersonFutureGendered',SCOPE.sC('sc_loser'))].\n\n[sc_loser.GetFirstNameNoTooltip] se rende imediatamente."
 single_combat.0041.desc.opponent_response.technique_from_legend.injury: "[sc_loser.GetSheHe|U] não desconfia de nada e tropeça exatamente como eu esperava.\n\n[sc_victor.Custom('SignatureWeaponAttemptedLight')|U] cuidadosamente posicionado transforma o tropeço em uma queda completa, fazendo a [sc_loser.Custom('signature_weapon')] voar enquanto cai.\n\nMinha bota no pescoço transforma a queda em uma rendição."
 single_combat.0041.desc.opponent_response.like_a_viper.injury: "mas consigo manter meu terreno.\n\nQuando surge a oportunidade de um contra-ataque, eu a aproveito, derrubando a [sc_loser.GetFirstNameNoTooltip] morro acima com [sc_victor.Custom('SignatureWeaponAttemptedLight')].\n\nNa hora das quedas, não é muito, mas [sc_loser.GetSheHe] está caíd[sc_loser.Custom('ES_OA')] o bastante para que eu possa [sc_victor.Custom2('SignatureWeaponKillTypeThirdPersonFutureGendered',SCOPE.sC('sc_loser'))] facilmente.\n\nConsigo a rendição."
 single_combat.0041.desc.opponent_response.pocket_silver.injury: "Felizmente, tanto a distração quanto a situação fazem com que desarmar[sc_loser.GetHerHim] seja quase comicamente fácil, especialmente em contraste com o confronto anterior.\n\nRaramente uma rendição teve gosto tão bom."
 single_combat.0041.desc.opponent_response.martial_voice.injury: "Tomando alguns segundos vitais para mirar, desfero [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] que quase deixam meu oponente desacordado.\n\nUma vez no chão, é fácil chutar [sc_loser.Custom('signature_weapon')] para os arbustos. A compreensão começa a voltar ao olhar de [sc_loser.GetFirstNameNoTooltip] logo depois de pressionar [sc_victor.Custom('SignatureWeaponTipType')] [sc_victor.Custom('SignatureWeaponTipAdjective')] contra a sua jugular, e a rendição vem rapidamente."
 single_combat.0041.desc.opponent_response.mocking_boast.injury: "A despeito de sua fúria, não é #EMP tão#! difícil de desviar[sc_loser.Custom('ES_LoLa')]; um excesso de raiva também cria um déficit de delicadeza, e recuar é uma opção em um duelo que simplesmente não existe em um corpo a corpo vertiginoso.\n\nQuando [sc_loser.GetFirstNameNoTooltip] sai de seu transe, é quase anticlimático. Em algum momento de sua fúria, parece que [sc_loser.Custom('SignatureWeaponBreaksVerbPastTense2')] de [sc_loser.Custom('SignatureWeaponTipType')]. A rendição é entregue entre dentes cerrados."
 ### No need for an is_that_a_crocodile, as it's never just an injury.
 single_combat.0041.desc.opponent_response.desert_warrior.injury: "Pensando rapidamente, cravo [sc_victor.Custom('SignatureWeaponEndType')] de [sc_victor.Custom('signature_weapon')] em sua outra mão com meu dorso da mão, fazendo a lâmina oculta voar para longe.\n\nNão querendo arriscar mais truques, me preparo para [sc_victor.Custom2('SignatureWeaponKillTypeGroinThirdPersonFutureGendered',SCOPE.sC('sc_loser'))]. [sc_loser.GetFirstNameNoTooltip] só evita uma morte brutal com uma das rendições mais rápidas que já vi."
 single_combat.0041.desc.opponent_response.jungle_stalker.injury: "No meio de uma [sc_loser.Custom('SignatureWeaponAttemptedHeavy')] especialmente extravagante, entro facilmente na guarda de [sc_loser.GetFirstNameNoTooltip] e arranco [sc_loser.Custom('signature_weapon')] da mão com [sc_victor.Custom('SignatureWeaponAttemptedLight')].\n\n[sc_loser.GetFirstNameNoTooltip] tenta desesperadamente manter uma aura intimidadora, mas é inútil quando eu ainda estou com [sc_victor.Custom('signature_weapon')].\n\nQuando [sc_loser.GetSheHe] se rende, não tenho vergonha de achar isso #EMP increíblemente#! satisfatório."
 single_combat.0041.desc.opponent_response.open_terrain_expert.injury: "Nosso combate se reduz a uma disputa de resistência, cada um esperando que o outro se desgaste primeiro. Felizmente para mim, [sc_loser.GetFirstNameNoTooltip] escorrega antes de mim, deixando-se vendid[sc_loser.Custom('ES_OA')] para uma riposta que faz com que [sc_loser.Custom('signature_weapon')] saia deslizando.\n\n[sc_loser.GetFirstNameNoTooltip], estoic[sc_loser.Custom('ES_OA')] até na derrota, relaxa os músculos e se rende imediatamente."
 single_combat.0041.desc.opponent_response.rough_terrain_expert.injury.rocky: "com a arma se afastando de seu alcance.\n\nMestre[sc_loser.Custom('ES_OA')] com [sc_loser.Custom('signature_weapon')] ou não, o pânico continua se espalhando pelas feições de [sc_loser.GetFirstNameNoTooltip] quando percebe que não tem arma.\n\nDando ao meu oponente pouco tempo para processar o que acabou de acontecer, eu simplesmente faço uma pose presunçosa com [sc_victor.Custom('signature_weapon')]. A rendição resultante é balbuciada em pura incredulidade."
 single_combat.0041.desc.opponent_response.rough_terrain_expert.injury.boggy: "e [sc_loser.GetHerHim] chuto com força na virilha.\n\nA oração aos gritos de [sc_loser.GetFirstNameNoTooltip] se transforma num guincho e desaba em um amontoado de membros agitados. Esse amontoado de [sc_loser.GetWomanMan] furios[sc_loser.Custom('ES_OA')] repreende minha blasfêmia meio sibilando, meio gritando, mas eu simplesmente descanso [sc_victor.Custom('signature_weapon')] ao lado de sua [sc_loser.Custom('MaskFace')] e espero que [sc_loser.GetFaith.HighGodName] me abata.\n\nA justiça divina nunca chega, mas a rendição furiosa certamente chega."
 single_combat.0041.desc.opponent_response.forest_fighter.injury: "e quase sinto uma onda de compaixão quando arranco a [sc_loser.Custom('signature_weapon')] da mão.\n\nÉ preciso um pouco de esforço para que [sc_loser.GetFirstNameNoTooltip] se concentre o bastante para uma rendição formal, mas acabamos chegando lá."
 single_combat.0041.desc.opponent_response.raaargh.injury: "Vendo um bom ponto para encerrar o duelo, meto a bota no monte resultante, chutando furiosamente até ouvir uma rendição estrangulada."
 single_combat.0041.desc.opponent_response.hard_grit.injury: "despenca atordoado[sc_loser.Custom('ES_OA')] no chão, vomitando o tempo todo.\n\nChuto [sc_loser.Custom('signature_weapon')] da mão e ele engasga uma rendição #EMP inmediatamente#!."
 single_combat.0041.desc.opponent_response.feint_and_stab.injury: "Pensando rapidamente, cravo [sc_victor.Custom('SignatureWeaponEndType')] de [sc_victor.Custom('signature_weapon')] em sua outra mão com meu dorso da mão, fazendo a lâmina oculta voar para longe.\n\nNão querendo arriscar mais truques, me preparo para [sc_victor.Custom2('SignatureWeaponKillTypeGroinThirdPersonFutureGendered',SCOPE.sC('sc_loser'))]. [sc_loser.GetFirstNameNoTooltip] só evita uma morte brutal com uma das rendições mais rápidas que já vi."
 single_combat.0041.desc.opponent_response.butchery.injury: "O golpe atinge meu oponente na garganta, abrindo um corte sangrento e machucado no gogó. Sangue carmesim começa a jorrar da ferida, [sc_loser.GetFirstNameNoTooltip] se inclina para ver com horror como sua vida escorre de seu pescoço e desce por seu peito.\n\n[sc_loser.GetFirstNameNoTooltip] cai de joelhos. Não demora muito até que fique quiet[sc_loser.Custom('ES_OA')]."
 single_combat.0041.desc.opponent_response.stoic_veteran.injury: "Como [sc_loser.GetSheHe] ainda parece estar tentando entender as coisas, arrisco uma estocada rápida. [sc_victor.Custom('SignatureWeaponAttemptedLight')|U] encontra um ponto fraco em seu peito, [sc_victor.Custom2('SignatureWeaponKillTypeTorso2ThirdPersonPresentParticipleGendered',SCOPE.sC('sc_loser'))] em um ângulo e penetrando profundamente na cavidade torácica.\n\n[sc_loser.GetFirstNameNoTooltip] se paraliza imediatamente, todo movimento se perde na fúria de agonia que deve estar consumindo[sc_loser.GetHerHim].\n\nQuando solto [sc_victor.Custom('signature_weapon')], [sc_loser.GetSheHe] já se foi e seu cadáver tomba desajeitadamente sobre o/a [sc_defender.Custom('GroundType')]."
 single_combat.0041.desc.opponent_response.blade_dance.injury: "Enfrento a investida com [sc_victor.Custom('SignatureWeaponAttemptedLight')] perfeitamente calculado que atinge meu oponente no peito, [sc_victor.Custom2('SignatureWeaponKillTypeTorsoThirdPersonPresentParticipleGendered',SCOPE.sC('sc_loser'))] antes de se soltar em um jato de fragmentos de osso e tiras ensanguentadas de carne.\n\n[sc_loser.GetFirstNameNoTooltip] gira, mais pelo impulso do que por qualquer outra coisa, rodopiando até virar um amontoado. O choque ainda se mistura à dor em seus espasmos desesperados, cada movimento brusco meio buscando uma saída enquanto seu coração dá os últimos batimentos."
 single_combat.0041.desc.opponent_response.wrath_of_highgod.injury: "Não corro riscos, desviando do trajeto do primeiro golpe e girando [sc_victor.Custom('signature_weapon')] para [sc_victor.Custom2('SignatureWeaponKillTypeRearTorsoThirdPersonFutureGendered',SCOPE.sC('sc_loser'))] com [sc_victor.Custom('SignatureWeaponAttemptedHeavy')].\n\nA paralisia é imediata, meu oponente tomba contra o/a [sc_defender.Custom('GroundType')] quando as pernas deixam de funcionar. [sc_loser.Custom('ES_LoLa')|U] derrubo com um chute, fazendo uma última reverência em reconhecimento antes de [sc_victor.Custom2('SignatureWeaponKillTypeThirdPersonPresentParticipleGendered',SCOPE.sC('sc_loser'))]."
 single_combat.0041.desc.opponent_response.hurt_me_better.injury: "Não sendo de quem deixa passar uma oportunidade, enfio [sc_victor.Custom('signature_weapon')] em seu peito, [sc_victor.Custom2('SignatureWeaponKillTypeTorsoThirdPersonPresentParticipleGendered',SCOPE.sC('sc_loser'))] em um movimento rápido.\n\nMeu oponente cambaleia para trás, jatos de sangue espirram irregularmente de seu torso destroçado.\n\nArranco minha arma do corpo de [sc_loser.GetFirstNameNoTooltip] para um golpe de misericórdia: ele já está mort[sc_loser.Custom('ES_OA')], não há necessidade de prolongar isso."
 single_combat.0041.desc.opponent_response.special_fallback.injury: "Ousado, mas [sc_victor.GetFaith.WarGodName] recompensa a cautela. Ergo minha [sc_victor.Custom('signature_weapon')] para um [sc_victor.Custom('SignatureWeaponAttemptedLight')] que [sc_victor.Custom2('SignatureWeaponKillTypeHead2ThirdPersonActiveGendered',SCOPE.sC('sc_loser'))].\n\nA #EMP explosión#! de sangue e vísceras resultante é recebida com um meio grito, meio gargarejo de pesadelo por [sc_loser.GetFirstNameNoTooltip], que continua cambaleando para a frente.\n\nEnquanto tiver [sc_loser.Custom('signature_weapon')] na mão, não posso arriscar um golpe de misericórdia. Em vez disso, [sc_loser.GetFirstNameNoTooltip] e eu apenas nos encaramos até que a maré de sangue derramado apague a luz em sua mirada."
 single_combat.0041.desc.opponent_response.something_to_hide.injury: "desferir [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] que atravessa a parte interna da sua coxa, dilacerando uma artéria.\n\nImpulsionado pela adrenalina, [sc_loser.GetFirstNameNoTooltip] luta por vinte ou trinta segundos antes que a perda de sangue comece a fazer efeito.\n\nA princípio [sc_loser.GetSheHe] não vê o que aconteceu e olha para baixo só para se encontrar cada vez mais encharcad[sc_loser.Custom('ES_OA')] em seu próprio sangue. A incredulidade dá lugar à sonolência, e meu oponente cai de forma abrupta no chão. Abater[sc_loser.GetHerHim] é rápido e indolor."
 ## Defender Lost, Opponent Finishing Move Fatality
 single_combat.0041.desc.opponent_response.wait_and_hope.fatality: "seguindo por puro reflexo com [sc_loser.Custom('SignatureWeaponAttemptedHeavy')] na corva que [sc_loser.GetHerHim] derruba.\n\nUm jogo de pés inteligente me mantém atrás do meu oponente enquanto ele cambaleia, e com um golpe bem colocado eu [sc_victor.Custom2('SignatureWeaponKillTypeRearHeadThirdPersonPresentGendered',SCOPE.sC('sc_loser'))].\n\n[sc_loser.GetFirstNameNoTooltip] morre instantaneamente."
 single_combat.0041.desc.opponent_response.unsure_attack.fatality: "\n\nMinha estocada arranca [sc_loser.Custom('signature_weapon')] da mão e [sc_loser.GetFirstNameNoTooltip] fica paralisado de pânico.\n\nIsso sela seu destino, pois eu passo a [sc_victor.Custom('SignatureWeaponWoundVerb5')] [sc_loser.Custom('signature_weapon')] em seu ombro. Algo vital se rasga e [sc_loser.GetFirstNameNoTooltip] fica flácid[sc_loser.Custom('ES_OA')] em um instante.\n\n[sc_loser.GetFirstNameNoTooltip] morre antes de tocar o/a [sc_defender.Custom('GroundType')]."
 single_combat.0041.desc.opponent_response.enthusiastic_onslaught.fatality: "Atinge-o no torso, com mais força do que eu esperava, e sou banhado por uma chuva de vísceras e costelas quebradas.\n\n[sc_loser.GetFirstNameNoTooltip] nunca chega a fazer a provocação, apenas desloca o peso e dá alguns passos trôpegos antes de cair mort[sc_loser.Custom('ES_OA')]."
 single_combat.0041.desc.opponent_response.hail_mary.fatality: "Mantendo a ofensiva, eu procedo a [sc_victor.Custom2('SignatureWeaponKillTypeTorso2ThirdPersonSimplePresentGendered',SCOPE.sC('sc_loser'))] com um golpe firme da minha [sc_victor.Custom('signature_weapon')].\n\n[sc_loser.GetFirstNameNoTooltip] vomita imediatamente um longo jato de sangue e ácido estomacal, engasgando e gaguejando enquanto a mistura cai pela sua boca e nariz. Não demora muito para que os ruídos parem."
 single_combat.0041.desc.opponent_response.pocket_sand.fatality: "passar furtivamente [sc_victor.Custom('SignatureWeaponAttemptedLight')] através de um muro de bloqueios.\n\nAcontece que um golpe é tudo de que precisava, [sc_victor.Custom('signature_weapon')] acaba [sc_victor.Custom2('SignatureWeaponKillTypeHead2ThirdPersonPresentParticipleGendered',SCOPE.sC('sc_loser'))].\n\n[sc_loser.GetFirstNameNoTooltip] parece incapaz de processar o sangue que jorra de sua jugular dilacerada, então ele ainda bloqueia por reflexo meu próximo golpe.\n\nTenho tempo apenas de me surpreender com a pura #EMP tenacidade#! antes que [my_foe.Custom('EyeEyes')] de [sc_loser.GetFirstNameNoTooltip] se apaguem para sempre."
 single_combat.0041.desc.opponent_response.nut_em.fatality: "acertar um golpe firme na barriga.\n\nO golpe rasga pele, gordura e músculo e arremessa intestinos viscosos para dentro de [sc_defender.Custom('GroundType')] com um pringue sanguinolento. [sc_loser.GetFirstNameNoTooltip] escorrega e cai para trás com um grito.\n\nDou um passo à frente, [sc_victor.Custom('signature_weapon')] erguida para pôr fim aos apuros de meu oponente."
 single_combat.0041.desc.opponent_response.guard.fatality: "Consigo executar uma parada surpreendentemente firme. O bloqueio desvia [sc_loser.Custom('signature_weapon')] de volta para [sc_loser.Custom('MaskFace')], [sc_loser.Custom('SignatureWeaponWoundVerb6PresentParticiple')] até o osso.\n\nNão perco tempo, varrendo os pés de [sc_loser.GetFirstNameNoTooltip] com um gancho de perna e investindo para acertar [sc_victor.Custom2('SignatureWeaponKillTypeGroinThirdPersonPresentParticipleGendered',SCOPE.sC('sc_loser'))], [sc_victor.Custom2('SignatureWeaponKillTypeGroinThirdPersonPresentParticipleGendered_Aftermath',SCOPE.sC('sc_loser'))].\n\nOs gritos levam quase tempo demais para se apagar."
 single_combat.0041.desc.opponent_response.probing_attack.fatality: "[sc_loser.Custom('SignatureWeaponBreaksThirdPersonSingularPresent')].\n\nCom sua arma inutilizada, [sc_loser.GetFirstNameNoTooltip] é facilmente [sc_victor.Custom('SignatureWeaponKillTypePastTense')]."
 single_combat.0041.desc.opponent_response.onslaught.fatality: "seguindo por puro reflexo com [sc_loser.Custom('SignatureWeaponAttemptedHeavy')] na corva que [sc_loser.GetHerHim] derruba.\n\nUm jogo de pés inteligente me mantém atrás do meu oponente enquanto ele cambaleia, e com um golpe bem colocado eu [sc_victor.Custom2('SignatureWeaponKillTypeRearHeadThirdPersonPresentGendered',SCOPE.sC('sc_loser'))].\n\n[sc_loser.GetFirstNameNoTooltip] morre instantaneamente."
 single_combat.0041.desc.opponent_response.surprise_attack.fatality: "Assim que [sc_loser.GetFirstNameNoTooltip] parece instável, desferi [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] que [sc_loser.GetHerHim] o derruba completamente.\n\nEm seu favor, é preciso reconhecer que ele aparou o golpe seguinte. O seguinte a esse [sc_victor.Custom2('SignatureWeaponKillTypeHead2ThirdPersonActiveGendered',SCOPE.sC('sc_loser'))]; uns gritinhos estrangulados rapidamente dão lugar à calma."
 single_combat.0041.desc.opponent_response.taunt.fatality: "Avançando, lanço [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] que [sc_victor.Custom2('SignatureWeaponKillTypeHead2ThirdPersonActiveGendered',SCOPE.sC('sc_loser'))].\n\n[sc_loser.GetFirstNameNoTooltip] se deixa cair, o sangue jorra de sua goela destroçada. Por um instante, parece que poderia se erguer, talvez até continuar lutando de algum modo.\n\nE então, desaba."
 single_combat.0041.desc.opponent_response.put_the_boot_in.fatality: "\n\nNão tenho muita certeza[sc_victor.Custom('ES_OA')] de #EMP por qué#! [sc_loser.GetSheHe] ficou assim, mas recompenso a estranheza com uma investida rápida seguida de [sc_victor.Custom('signature_weapon')] [sc_victor.Custom2('SignatureWeaponKillTypeRearTorsoThirdPersonPresentParticipleGendered',SCOPE.sC('sc_loser'))].\n\nNão há nenhum golpe mestre nem armadilha oculta, então suponho que a estranha postura era só… estranha.\n\nCom um dar de ombros, chuto [sc_loser.GetFirstNameNoTooltip] nas costas para desferir o golpe mortal."
 single_combat.0041.desc.opponent_response.strict_guard.fatality: "À velocidade do relâmpago, lanço minha [sc_victor.Custom('signature_weapon')] contra [sc_loser.GetFirstNameNoTooltip]. A arma [sc_victor.Custom2('SignatureWeaponKillTypeTorsoThirdPersonActiveGendered',SCOPE.sC('sc_loser'))] de um golpe cruel, derrubando[sc_loser.GetHerHim] para o/a [sc_defender.Custom('GroundType')].\n\nMeu oponente se debate no começo, tentando se erguer, mover-se, resistir. Não passa de rolar de costas antes que a perda de sangue finalmente vença [sc_loser.GetSheHe]."
 single_combat.0041.desc.opponent_response.confident_attack.fatality: "Ajo com rapidez, empurrando [sc_loser.GetHerHim] ao chão.\n\nAntes que possa se recuperar, me preparo para a brutalidade e começo a [sc_victor.Custom2('SignatureWeaponKillTypeGroinThirdPersonPresentParticipleGendered',SCOPE.sC('sc_loser'))].\n\nOs gritos se apagam muito antes que [sc_loser.GetFirstNameNoTooltip]."
 single_combat.0041.desc.opponent_response.expert_onslaught.fatality: "Então, simplesmente dou um passo à frente para [sc_victor.Custom('SignatureWeaponWoundVerb4')] lhe cortar a garganta com um único golpe de [sc_victor.Custom('signature_weapon')].\n\n[sc_loser.GetFirstNameNoTooltip] parece… confus[sc_loser.Custom('ES_OA')], assustad[sc_loser.Custom('ES_OA')], furios[sc_loser.Custom('ES_OA')]. É difícil expressar uma emoção quando se tem o pescoço destroçado e ensanguentado.\n\nSimplesmente observo enquanto ele se afoga lentamente no próprio sangue."
 single_combat.0041.desc.opponent_response.attempt_disarm.fatality: "fintar, fazê-lo virar as costas para mim e então [sc_victor.Custom2('SignatureWeaponKillTypeRearTorsoThirdPersonFutureGendered',SCOPE.sC('sc_loser'))].\n\nMeu inimig[sc_loser.Custom('ES_OA')] desaba instantaneamente, e o choque acaba com [sc_loser.GetSheHe] pouco depois."
 ### No need for a lightning_assault, as you can't end the duel in the first round.
 single_combat.0041.desc.opponent_response.tire_opponent.fatality: "Lanço-me em um [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] que [sc_loser.GetHerHim] derruba. O golpe seguinte se [sc_victor.Custom('SignatureWeaponWoundVerb5ThirdPersonPresent')] de forma desajeitada em seu pescoço.\n\nNão será uma morte agradável nem digna, mas pelo menos é rápida."
 single_combat.0041.desc.opponent_response.reason_you_suck_speech.fatality: "A distração me dá o tempo necessário para lançar [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] bem no estômago desprotegido de, o que o lança ao chão, gritando.\n\nA luta que se segue é breve, mas sangrenta. Ao menos para [sc_loser.GetFirstNameNoTooltip]."
 single_combat.0041.desc.opponent_response.technique_from_legend.fatality: "Quando [sc_loser.GetSheHe] tropeça, tropeça com força, e estou sobre [sc_loser.GetSheHe] num instante.\n\nUm chute rápido na virilha mantém [sc_loser.GetFirstNameNoTooltip] no chão por tempo suficiente para eu [sc_victor.Custom2('SignatureWeaponKillTypeTorso2ThirdPersonSimplePresentGendered',SCOPE.sC('sc_loser'))] com [sc_victor.Custom('signature_weapon')].\n\n[sc_loser.GetFirstNameNoTooltip] luta por um tempo, mas eventualmente se recosta e deixa a morte levar [sc_loser.GetSheHe]."
 single_combat.0041.desc.opponent_response.like_a_viper.fatality: "mas eu permaneço de pé.\n\nQuando [sc_loser.GetFirstNameNoTooltip] não vê um pequeno precipício atrás de [sc_loser.GetSheHe], tento um contra-empurrão, e o/a veterano/a[sc_loser.Custom('ES_OA')] guerreiro/a[sc_loser.Custom('ES_OA')] das colinas cai pesadamente para trás.\n\nOuço um estalo e um grito quando ele/ela cai da beirada e, ao descer correndo, vejo que ficou meio empalado/a no próprio fêmur quebrado. O golpe de misericórdia não demora muito."
 single_combat.0041.desc.opponent_response.pocket_silver.fatality: "Dou voltas, procurando um bom ponto para atacar. [sc_loser.GetFirstNameNoTooltip] consegue se soltar com dificuldade, apenas para cair de cara em outra poça, mais funda, e eu vejo minha chance: um único golpe veloz para [sc_victor.Custom2('SignatureWeaponKillTypeRearTorsoThirdPersonFutureGendered',SCOPE.sC('sc_loser'))].\n\nA paralisia é instantânea, e [sc_loser.GetFirstNameNoTooltip] afunda ainda mais no brejo fétido. Demora bastante até as bolhas pararem."
 single_combat.0041.desc.opponent_response.martial_voice.fatality: "\n\nAvanço contra [sc_loser.GetSheHe] com [sc_victor.Custom('SignatureWeaponAttemptedLightPlural')] em sequência. No começo, parece que meu oponente me repele bem até que começa a ir mais devagar, e sangue jorra de… algum lugar. Acho que devo ter cortado uma artéria.\n\nEm um minuto [sc_loser.GetFirstNameNoTooltip] desmaiou. Dou cabo de [sc_loser.GetSheHe]."
 single_combat.0041.desc.opponent_response.mocking_boast.fatality: "Mantenho distância, avançando apenas quando [sc_loser.GetFirstNameNoTooltip] atinge o auge para arrancar pedaços de carne, e assim dançamos por um tempo.\n\nNo entanto, por fim seu frenesi diminui, e um[sc_loser.Custom('ES_XA')] [sc_loser.GetWomanMan], não um[sc_loser.Custom('ES_XA')] berserker, balança diante de mim. A quantidade e a gravidade de seus ferimentos vão minando [sc_loser.GetSheHe] até que…"
 single_combat.0041.desc.opponent_response.is_that_a_crocodile.fatality: "Introduzo às escondidas um [sc_victor.Custom('SignatureWeaponAttemptedLight')] que se crava em seu estômago.\n\nUma morte dolorosa que, [sc_loser.GetFirstNameNoTooltip] aceita com dignidade, lutando apesar da dor até o fim."
 single_combat.0041.desc.opponent_response.desert_warrior.fatality: "\n\nAntes que [sc_loser.GetFirstNameNoTooltip] consiga empunhar sua arma secundária, giro minha própria [sc_victor.Custom('signature_weapon')] para [sc_victor.Custom2('SignatureWeaponKillTypeTorso2ThirdPersonSimplePresentGendered',SCOPE.sC('sc_loser'))]. O corpo machucado é arremessado para trás, convulsionando e sangrando sobre o/a [sc_defender.Custom('GroundType')].\n\nDentro de um minuto, todo movimento cessa."
 single_combat.0041.desc.opponent_response.jungle_stalker.fatality: "Com cautela, temendo uma armadilha, entro em uma brecha óbvia em sua guarda e desfero [sc_victor.Custom('SignatureWeaponAttemptedLight')] que [sc_victor.Custom2('SignatureWeaponKillTypeHead2ThirdPersonActiveGendered',SCOPE.sC('sc_loser'))] de forma grotesca.\n\n[sc_loser.GetFirstNameNoTooltip] começa imediatamente a engasgar com a fonte de sangue resultante, deixando [sc_loser.Custom('signature_weapon')] para agarrar o ferimento.\n\nAinda está apertando o ferimento quando expira, um minuto inteiro depois."
 single_combat.0041.desc.opponent_response.open_terrain_expert.fatality: "Entramos num tenso padrão de golpe-parada-estocada, e vou ganhando a vantagem lentamente, desgastando [sc_loser.GetFirstNameNoTooltip] golpe a golpe até que [sc_loser.GetSheHe] tenha acumulado vergões e feridas suficientes para matar a maioria das pessoas duas vezes.\n\nMas até [sc_loser.GetSheHe] tem seus limites. E quando o/a vareg[sc_loser.Custom('ES_OA')] cai de joelhos, list[sc_loser.Custom('ES_OA')] para o golpe de misericórdia, fica claro que ambos sabemos disso."
 single_combat.0041.desc.opponent_response.rough_terrain_expert.fatality.rocky: "enquanto eu já estou no meu golpe de retorno.\n\nA indignação se espalha pelos traços de [sc_loser.GetFirstNameNoTooltip], presumivelmente por minha insolência, mas não tenho interesse em deixar isso ir além.\n\n[sc_victor.Custom('signature_weapon')|U] [sc_victor.Custom('SignatureWeaponWoundVerb1ThirdPersonPresent')] profundamente e fatalmente no peito [sc_loser.Custom('ES_DelDela')] mestr[sc_loser.Custom('ES_OA')] da espada."
 single_combat.0041.desc.opponent_response.rough_terrain_expert.fatality.boggy: "e incrusto [sc_victor.Custom('SignatureWeaponEndType')] de [sc_victor.Custom('signature_weapon')] em sua [sc_loser.Custom('MaskFace')].\n\nGritando de ira ante tal blasfêmia, [sc_loser.GetFirstNameNoTooltip] recua aos tropeços, uma terrível maldição nos lábios até o momento em que passo a [sc_victor.Custom('SignatureWeaponWoundVerb5')] minha arma em seu pulmão.\n\nDepois disso, tudo é gagueira, engasgo e, por fim, silêncio."
 single_combat.0041.desc.opponent_response.forest_fighter.fatality: "e acho que nós dois sabemos que [sc_loser.GetSheHe] não pode representar grande ameaça nem impedir minha retaliação.\n\nUm único golpe firme e eu [sc_victor.Custom2('SignatureWeaponKillTypeHeadThirdPersonFutureGendered',SCOPE.sC('sc_loser'))]."
 single_combat.0041.desc.opponent_response.raaargh.fatality: "Com uma visão totalmente desobstruída de suas costas, faço chover [sc_victor.Custom('SignatureWeaponAttemptedLightPlural')] sobre [sc_loser.GetFirstNameNoTooltip], derrubando[sc_loser.GetHerHim] até o chão.\n\nAterrissa com força de lado, tossindo pedaços de sangue por um tempo até soltar um estertor de morte exausto."
 single_combat.0041.desc.opponent_response.hard_grit.fatality: "Introduzo às escondidas um [sc_victor.Custom('SignatureWeaponAttemptedLight')] que se crava em seu estômago.\n\nUma morte dolorosa que, [sc_loser.GetFirstNameNoTooltip] aceita com dignidade, lutando apesar da dor até o fim."
 single_combat.0041.desc.opponent_response.feint_and_stab.fatality: "\n\nAntes que [sc_loser.GetFirstNameNoTooltip] consiga empunhar sua arma secundária, giro minha própria [sc_victor.Custom('signature_weapon')] para [sc_victor.Custom2('SignatureWeaponKillTypeTorso2ThirdPersonSimplePresentGendered',SCOPE.sC('sc_loser'))]. O corpo machucado é arremessado para trás, convulsionando e sangrando sobre o/a [sc_defender.Custom('GroundType')].\n\nDentro de um minuto, todo movimento cessa."
 single_combat.0041.desc.opponent_response.butchery.fatality: "I wait, patiently hoping for a perfect moment to present itself.\n\nWhen none does, I try a positively #EMP tepid#! [sc_victor.Custom('SignatureWeaponAttemptedLight')] that"
 single_combat.0041.desc.opponent_response.stoic_veteran.fatality: "The best guard is a solid attack, but even a half-hearted one helps. With this in mind, I try a tentative [sc_victor.Custom('SignatureWeaponAttemptedLight')].\n\n"
 single_combat.0041.desc.opponent_response.blade_dance.fatality: "Roaring my defiance, I throw myself wholeheartedly into a bevy of [sc_victor.Custom('SignatureWeaponAttemptedHeavyPlural')], raining blow after blow down on my opponent.\n\n"
 single_combat.0041.desc.opponent_response.wrath_of_highgod.fatality: "This is not a bout I expect to win. With that in mind, I've no reason to play it safe, and throw myself forward [sc_victor.Custom('signature_weapon')]-first.\n\n"
 single_combat.0041.desc.opponent_response.hurt_me_better.fatality: "Abaixando-me, agarro um punhado de [sc_defender.Custom('GritType')] e o jogo diretamente no [sc_loser.Custom('MaskFace')] do meu oponente. [sc_loser.GetHerHim|U] pego totalmente de surpresa,"
 single_combat.0041.desc.opponent_response.special_fallback.fatality: "Descobrindo uma brecha #EMP perfecto#! na guarda do meu oponente, dou um passo à frente e desço minha [sc_victor.Custom('MaskFace')] contra a dele com #EMP fuerza#!."
 ### No need for a something_to_hide, as it's never fatal.
 ## Aggressor Won, Own Combat Move Feedback
 single_combat.0041.desc.sc_attacker.wait_and_hope: "Com [sc_victor.Custom('signature_weapon')] de [my_foe.GetFirstNameNoTooltip] voando, lanço [sc_victor.Custom('SignatureWeaponAttemptedHeavyPlural')] contra meu oponente."
 single_combat.0041.desc.sc_attacker.unsure_attack: "A dramatic sweep of my [sc_victor.Custom('signature_weapon')] in one direction gives way to a change of arc, and a [sc_victor.Custom('SignatureWeaponAttemptedLight')] that takes my opponent by surprise.\n\n"
 single_combat.0041.desc.sc_attacker.enthusiastic_onslaught: "With casual disregard I throw insult, mockery, and scorn at my opponent.\n\nLittle wonder, then,"
 single_combat.0041.desc.sc_attacker.hail_mary: "Decidido[sc_victor.Custom('ES_OA')] a ver meu oponente cair a qualquer custo, lanço todo o meu peso em [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] que [sc_loser.GetHerHim] faz cambalear, seguido de um chute feroz com minha perna falsa.\n\n"
 single_combat.0041.desc.sc_attacker.pocket_sand: "Decidido[sc_victor.Custom('ES_OA')] a ver meu oponente cair de qualquer jeito, lanço todo o meu peso em [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] que [sc_loser.GetHerHim] o faz cambalear, seguido de uma patada feroz.\n\n"
 single_combat.0041.desc.sc_attacker.nut_em: "Nenhum inimigo quebra minha guarda, e meu oponente de hoje não é exceção. Forço [sc_loser.GetHerHim] a a recuar vez após vez com uma sequência de paradas perfeitas, oferecendo apenas [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] arrasador quando está totalmente exaust[sc_loser.Custom('ES_OA')].\n\n"
 single_combat.0041.desc.sc_attacker.guard: "Ter confiança é ter metade da luta ganha, e eu lanço com elegância [sc_victor.Custom('SignatureWeaponAttemptedLightPlural')] com a confiança de um[sc_victor.Custom('ES_XA')] especialista[sc_victor.Custom('ES_OA')] veterano[sc_victor.Custom('ES_OA')]."
 single_combat.0041.desc.sc_attacker.probing_attack: "My [sc_victor.Custom('signature_weapon')]-arm moves fast as lightning, and strikes as hard as sundered stone."
 single_combat.0041.desc.sc_attacker.onslaught: "Ao ver a oportunidade perfeita de desarmar meu oponente, eu desço minha [sc_victor.Custom('signature_weapon')] em um [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] que arranca [sc_loser.Custom('signature_weapon')] das mãos dele.\n\n"
 single_combat.0041.desc.sc_attacker.surprise_attack: "A dramatic sweep of my [sc_victor.Custom('signature_weapon')] in one direction gives way to a change of arc, and a [sc_victor.Custom('SignatureWeaponAttemptedLight')] that takes my opponent by surprise.\n\n"
 single_combat.0041.desc.sc_attacker.taunt: "Taking my time, staying calm, mixing relentless parrying with infuriating dodges, I inexorably erode my opponent's energy.\n\n"
 single_combat.0041.desc.sc_attacker.put_the_boot_in.peg_leg: "I meet each blow of my opponent's [sc_loser.Custom('signature_weapon')] with a barbed quip and a leap backwards.\n\n"
 single_combat.0041.desc.sc_attacker.put_the_boot_in.fallback: "I will my body to match the vivid mental picture of legend, shifting into an awkward stance while [sc_victor.Custom('SignatureWeaponFlourishPresentParticiple')] my [sc_victor.Custom('signature_weapon')].\n\n"
 single_combat.0041.desc.sc_attacker.strict_guard: "With unerring accuracy, I hurl myself [sc_victor.Custom('signature_weapon')]-first at a blind spot in my opponent's guard."
 single_combat.0041.desc.sc_attacker.confident_attack: "Snatching a heavy purse of silver from my belt, I hurl it at my opponent's [sc_loser.Custom('MaskFace')]."
 single_combat.0041.desc.sc_attacker.expert_onslaught: "Comandar os humildes é uma arte um pouco diferente de comandar os de nascimento elevado, mas as ferramentas que isso me deu ainda se mostram úteis. Com uma voz marcial, eu"
 single_combat.0041.desc.sc_attacker.attempt_disarm: "It's beautiful, really, using someone's cringe at their own inadequacy to"
 ### No need for a lightning_assault, as you can't end the duel in the first round.
 single_combat.0041.desc.sc_attacker.tire_opponent: "Conheço bem esse jogo e simplesmente me afasto dançando do meu oponente quando se aproxima, mantendo-me perto o bastante para atacar, mas nunca perto o bastante para ser atingido. Não demora muito até que o deserto faça meu trabalho por mim,"
 single_combat.0041.desc.sc_attacker.reason_you_suck_speech: "A selva é uma aliada sólida em qualquer luta, e só tenho que esperar que ela enrede meu inimigo de alguma forma. Quando a [sc_loser.GetFirstNameNoTooltip] prende o pé em uma videira, eu ataco.\n\n"
 single_combat.0041.desc.sc_attacker.technique_from_legend: "Espaço é tradicionalmente um dos recursos mais valiosos em um duelo, mas cedo terreno ao meu oponente como água fluindo ao redor de uma rocha, apenas para"
 single_combat.0041.desc.sc_attacker.like_a_viper: "Hills and mountains are difficult to fight in at the best of times, but my experience with such areas makes this bout absolutely miserable for my opponent.\n\n"
 single_combat.0041.desc.sc_attacker.pocket_silver: "Bogs and fens are difficult to fight in at the best of times, but my experience with such areas makes this bout absolutely miserable for my opponent.\n\n"
 single_combat.0041.desc.sc_attacker.martial_voice: "Há uma arte no combate em bosques, uma mistura do sutil e do selvagem que só vem com amarga experiência. Com esse instinto, eu"
 single_combat.0041.desc.sc_attacker.mocking_boast: "Fúria, raiva e a necessidade insaciável de #BER matar#! crescem dentro de mim, rasgando um #BER buraco sangrento#! em minha psique. Sinto-me capaz de"
 single_combat.0041.desc.sc_attacker.is_that_a_crocodile: "No calor da batalha, não há perdão. Cada erro que meu inimigo comete é punido dez vezes, cada descuido pago em sangue. Com determinação implacável, eu"
 single_combat.0041.desc.sc_attacker.desert_warrior: "I swing my [sc_victor.Custom('signature_weapon')] in an almost lazy feint. My opponent doesn't see my off-hand dagger until it's too late, when it's already"
 single_combat.0041.desc.sc_attacker.jungle_stalker: "A grim smile curls over my lips as I launch into a blistering series of [sc_victor.Custom('SignatureWeaponAttemptedHeavyPlural')], each strike putting more focus on pain than victory.\n\n"
 single_combat.0041.desc.sc_attacker.open_terrain_expert: "[sc_victor.Custom('signature_weapon')|U] in hand, I hew at my opponent, long, even strikes that force [sc_loser.GetHerHim] back again and again."
 single_combat.0041.desc.sc_attacker.rough_terrain_expert.rocky: "I whirl my [sc_victor.Custom('signature_weapon')] with a deadly flourish, weaving a song of pain across my opponent with every blow."
 single_combat.0041.desc.sc_attacker.rough_terrain_expert.boggy: "I bellow my devotion to [sc_victor.GetFaith.HighGodName], [sc_victor.Custom('signature_weapon')] upraised in votive offering."
 single_combat.0041.desc.sc_attacker.forest_fighter: "Meu oponente parece pensar que está me ferindo com seus ridículos golpes, mas cada pontada de dor simplesmente me faz lutar com mais força, mais rapidez.\n\n"
 single_combat.0041.desc.sc_attacker.raaargh: "Percebendo uma falha momentânea na guarda do meu oponente, desfero um chute feroz na canela dele."
 single_combat.0041.desc.sc_attacker.hard_grit: "Com apenas um sussurro rangente, sibilo um lembrete inequívoco do domínio que tenho sobre meu oponente, fazendo com que ele fique congelad[sc_loser.Custom('ES_OA')] imediatamente.\n\n"
 single_combat.0041.desc.sc_attacker.feint_and_stab: "I swing my [sc_victor.Custom('signature_weapon')] in an almost lazy feint. My opponent doesn't see my off-hand dagger until it's too late, when it's already"
 single_combat.0041.desc.sc_attacker.butchery: "no entanto, atinge [sc_loser.GetFirstNameNoTooltip] nos nós dos dedos da mão em que segura [sc_loser.Custom('signature_weapon')]. Por reflexo, os nós dos dedos se abrem e sua arma cai no chão com estrondo.\n\n[sc_loser.GetFirstNameNoTooltip] e eu nos encaramos com os olhos arregalados; está claro que está tão surpreendid[sc_loser.Custom('ES_OA')] como eu.\n\nParece que leva uma eternidade até eu me lembrar de exigir uma rendição."
 single_combat.0041.desc.sc_attacker.stoic_veteran: "Um milagre absoluto, o golpe realmente acerta em [sc_loser.GetFirstNameNoTooltip] em um ângulo estranho que [sc_loser.GetHerHim] derruba!\n\nQuando consegue se levantar de novo, eu já posicionei minha [sc_victor.Custom('signature_weapon')] para [sc_victor.Custom2('SignatureWeaponKillTypeGroinThirdPersonFutureGendered',SCOPE.sC('sc_loser'))]. A rendição vem logo em seguida."
 single_combat.0041.desc.sc_attacker.blade_dance: "Como previsto, não demora muito até que eu force [sc_loser.GetFirstNameNoTooltip] a se ajoelhar, e daí é só um longo e preguiçoso golpe para erguer [sc_victor.Custom('SignatureWeaponTipType')] da minha arma até a garganta dele.\n\nA rendição vem no instante em que o metal frio toca o pescoço dele."
 single_combat.0041.desc.sc_attacker.wrath_of_highgod: "[sc_loser.GetFirstNameNoTooltip] observa, com desdém, sem tentar esquivar, mas brandindo sem esforço [sc_loser.Custom('signature_weapon')] para aparar minha arma.\n\nQuase por instinto, passo um pé atrás de um dos joelhos dele e puxo, mas realmente funciona! Meu oponente cai, e me apresso para me preparar para um golpe letal.\n\nUma rendição apressada e surpresa chega בדיוק quando eu começava a brandir [sc_victor.Custom('signature_weapon')]."
 single_combat.0041.desc.sc_attacker.hurt_me_better: "que tosse e se engasga enquanto desce pela traqueia.\n\nNão perco tempo: acerto [sc_loser.GetFirstNameNoTooltip] nos joelhos com [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] e meu oponente cai, ainda se retorcendo e tentando limpar [sc_defender.Custom('EyeEyes')].\n\nQuando consegue, já estou list[sc_victor.Custom('ES_OA')] para [sc_victor.Custom2('SignatureWeaponKillTypeGroinThirdPersonFutureGendered',SCOPE.sC('sc_loser'))].\n\nA rendição é bastante rápida."
 single_combat.0041.desc.sc_attacker.special_fallback: "Alguns diriam que é uma atitude arriscada ou insensata, mas uma cabeçada no rosto tira a maioria dos argumentos dos detratores, mesmo que isso também me prejudique.\n\nPor pior que eu me sinta, é evidente que [sc_loser.GetFirstNameNoTooltip] se sente pior, contorcendo-se no chão, ofegante e agarrando a [sc_loser.Custom('MaskFace')].\n\nAinda preciso me recompor um pouco, mas ainda consigo empunhar [sc_victor.Custom('signature_weapon')] para [sc_victor.Custom2('SignatureWeaponKillTypeThirdPersonFutureGendered',SCOPE.sC('sc_loser'))] a tempo de forçar uma rendição."
 single_combat.0041.desc.sc_attacker.something_to_hide: "até que me seja dada a oportunidade #EMP perfecta#!.\n\nCom uma aparada e riposta relâmpago, consigo arrancar [sc_loser.Custom('signature_weapon')] da mão de [sc_loser.GetFirstNameNoTooltip], fazendo-o voar.\n\nMeu oponente fica horrorizad[sc_loser.Custom('ES_OA')] enquanto me preparo para um segundo golpe, desta vez pronto para matar. No fim, mais violência se mostra desnecessária, pois consigo a rendição assim que [sc_loser.GetFirstNameNoTooltip] compreende as poucas opções que lhe restam."
 ## Aggressor Won, Own Combat Move Injury
 single_combat.0041.desc.sc_attacker.wait_and_hope.injury: "Cada golpe cobra um preço terrível, exigindo aparos tão fortes que o suor começa a correr pela [sc_loser.Custom('MaskFace')] de est[sc_loser.Custom('ES_EA')] [sc_loser.GetWomanMan] só por se defender.\n\nNinguém consegue manter esse nível de esforço por tanto tempo e, eventualmente, [sc_loser.GetFirstNameNoTooltip] desaba sobre o/a [sc_defender.Custom('GroundType')].\n\n[sc_victor.Custom('SignatureWeaponAction')|U] [sc_victor.Custom('signature_weapon')], e meus esforços recebem uma rendição exausta."
 single_combat.0041.desc.sc_attacker.unsure_attack.injury: "O ataque acerta com mais força do que eu esperava, quase faz [sc_loser.GetFirstNameNoTooltip] girar completamente e #EMP quase#! quase [sc_loser.GetHerHim] derrubá-lo por completo.\n\nConsegue se recompor no último instante, mas eu já posicionei minha [sc_victor.Custom('signature_weapon')] para [sc_victor.Custom2('SignatureWeaponKillTypeThirdPersonFutureGendered',SCOPE.sC('sc_loser'))].\n\nO duelo entra num impasse tenso enquanto [sc_loser.GetFirstNameNoTooltip] avalia suas opções, mas, no fim, acaba cedendo amargamente."
 single_combat.0041.desc.sc_attacker.enthusiastic_onslaught.injury: "que al final se enfureça tanto que perca de vista os aspectos de um combate sensato ao jogar [sc_loser.Custom('signature_weapon')] no chão e tentar me matar com [sc_loser.Custom('HandHands')].\n\nSó preciso sacudir um pouco a [sc_victor.Custom('signature_weapon')] para lembrar a [sc_loser.GetFirstNameNoTooltip] onde ele está, e logo recebo uma rendição sufocada entre os dentes cerrados."
 single_combat.0041.desc.sc_attacker.hail_mary.injury: "[sc_loser.GetFirstNameNoTooltip] fica cambaleando, e não deixo a oportunidade passar, disparando [sc_victor.Custom('SignatureWeaponAttemptedLightPlural')] como uma tempestade que o derrubam gritando no/a [sc_defender.Custom('GroundType')].\n\nCom fraqueza, meu rival move a mão de [sc_loser.Custom('signature_weapon')] tentando reunir coragem para continuar me desafiando.\n\nEu simplesmente preparo a arma para [sc_victor.Custom2('SignatureWeaponKillTypeHeadThirdPersonFutureGendered',SCOPE.sC('sc_loser'))]… ao menos até ouvir uma rendição trêmula."
 single_combat.0041.desc.sc_attacker.pocket_sand.injury: "Quando [sc_loser.GetFirstNameNoTooltip] se precipita para trás, eu me precipito com [sc_loser.GetSheHe] trazendo [sc_victor.Custom('SignatureWeaponEndType')] de [sc_victor.Custom('signature_weapon')] contra seu [sc_loser.Custom('MaskFace')]. Poucos #EMP crujidos#! há tão visceralmente satisfatórios quanto #EMP ese#!.\n\nAtordoad[sc_loser.Custom('ES_OA')] e debilitad[sc_loser.Custom('ES_OA')], meu oponente cai no chão, perdendo a arma no processo. Está tão cansad[sc_loser.Custom('ES_OA')] que me bastam alguns chutes para conseguir uma rendição oficial."
 single_combat.0041.desc.sc_attacker.nut_em.injury: "[sc_loser.GetFirstNameNoTooltip] faz tudo o que pode para me repelir, mas está totalmente na defensiva, e sua guarda só fica mais fraca e desajeitada a cada golpe.\n\nQuando a oportunidade se apresenta, faço voar [sc_loser.Custom('signature_weapon')] com [sc_victor.Custom('SignatureWeaponAttemptedHeavy')]. E assim, o combate está decidido.\n\nConsigo a rendição antes mesmo de iniciar o golpe de retorno."
 single_combat.0041.desc.sc_attacker.guard.injury: "Golpe a golpe, esmago meu oponente até uma rendição sangrenta e atordoada, cravando [sc_loser.GetHerHim] no chão com toda a fúria que [sc_victor.GetFaith.WarGodName] pode me conceder.\n\nQuando tudo o que resta é uma massa trêmula de [sc_loser.GetWomanMan] ensanguentado, me pergunto se fui longe demais. Então, [sc_loser.GetFirstNameNoTooltip] tosse com força suficiente para perder o controle de [sc_loser.Custom('signature_weapon')] e me permito um pequeno suspiro de alívio.\n\nCom a preocupação dissipada, chuto a arma do meu inimigo para longe e encosto a minha contra sua garganta. São necessárias algumas tentativas, mas [sc_loser.GetFirstNameNoTooltip] por fim consegue se render."
 single_combat.0041.desc.sc_attacker.probing_attack.injury: "Foi surpreendentemente bem, tudo considerado. [sc_loser.GetFirstNameNoTooltip] e eu ficamos nos encarando de forma estranha: [sc_loser.GetSheHe] não sabe se corre atrás da arma ou se rende, e eu, pego de surpresa por uma execução tão perfeita.\n\nFalando nisso, ponho fim a qualquer ideia que [sc_loser.GetFirstNameNoTooltip] pudesse ter de continuar lutando, erguendo uma sobrancelha e [sc_victor.Custom('SignatureWeaponActionPresentParticiple')] [sc_victor.Custom('signature_weapon')].\n\nA rendição é embaraçada, mas rápida."
 single_combat.0041.desc.sc_attacker.onslaught.injury: "Cada golpe cobra um preço terrível, exigindo aparos tão fortes que o suor começa a correr pela [sc_loser.Custom('MaskFace')] de est[sc_loser.Custom('ES_EA')] [sc_loser.GetWomanMan] só por se defender.\n\nNinguém consegue manter esse nível de esforço por tanto tempo e, eventualmente, [sc_loser.GetFirstNameNoTooltip] desaba sobre o/a [sc_defender.Custom('GroundType')].\n\n[sc_victor.Custom('SignatureWeaponAction')|U] [sc_victor.Custom('signature_weapon')], e meus esforços recebem uma rendição exausta."
 single_combat.0041.desc.sc_attacker.surprise_attack.injury: "Em favor de [sc_loser.GetFirstNameNoTooltip] há que reconhecer que aguenta mais do que eu teria pensado, mas, no fim, a mera duração do nosso combate começa a surtir efeito sobre [sc_loser.GetSheHe].\n\nEspero um pouco mais só para me certificar, instigando meu rival com [sc_victor.Custom('SignatureWeaponAttemptedLightPlural')] ocasionais e então arranco [sc_loser.Custom('signature_weapon')] da mão dele com [sc_victor.Custom('SignatureWeaponAttemptedHeavy')].\n\nCansad[sc_loser.Custom('ES_OA')], [sc_loser.GetFirstNameNoTooltip] se rende e tomba de cabeça para a [sc_defender.Custom('GroundType')] com a [sc_loser.Custom('MaskFace')] à frente."
 single_combat.0041.desc.sc_attacker.taunt.injury: "Linha por linha, eu me aproprio do ego dele e faço um banquete das inseguranças dele, até que sua guarda se torne descuidada por pura irritação.\n\nSó quando o aborrecimento de [sc_loser.GetFirstNameNoTooltip] tiver atingido o auge, eu avanço e arranco [sc_loser.Custom('signature_weapon')] com [sc_victor.Custom('SignatureWeaponAttemptedLight')].\n\nUm último comentário sobre sua firmeza sob pressão, e então espero a amarga, amarga rendição. Lágrimas salgadas nunca tiveram gosto tão doce."
 single_combat.0041.desc.sc_attacker.put_the_boot_in.injury: "Então, seja como for, tudo simplesmente... funciona. Eu afasto com facilidade a guarda de [sc_loser.GetFirstNameNoTooltip], derrubo [sc_loser.Custom('signature_weapon')] da mão de [sc_loser.GetHerHim] e o envio despencando no chão.\n\nAntes que eu perceba, já estou me preparando para [sc_victor.Custom2('SignatureWeaponKillTypeGroinThirdPersonFutureGendered',SCOPE.sC('sc_loser'))]. Surpreendid[sc_loser.Custom('ES_OA')], confus[sc_loser.Custom('ES_OA')], e cada vez mais aterrorizad[sc_loser.Custom('ES_OA')], tudo o que [sc_loser.GetFirstNameNoTooltip] pode fazer é gaguejar uma rendição."
 single_combat.0041.desc.sc_attacker.strict_guard.injury: "[sc_loser.GetFirstNameNoTooltip], suponho que vendo a vida passar diante de seus olhos quando minha arma se crava em seu coração, ele se apressa para aparar.\n\nPermito-me um sorriso malévolo ao enroscar minha arma na dele de forma desajeitada e, com um forte golpe de chicote, transformo uma estocada mortal em um desarme. [sc_loser.Custom('signature_weapon')] de [sc_loser.GetFirstNameNoTooltip] sai voando pelo ar.\n\nCom o combate vencido, faço questão de, de maneira bastante exibida, encostar [sc_victor.Custom('SignatureWeaponTipType')] da minha arma contra o coração de minha inimig[sc_loser.Custom('ES_OA')]. A rendição é tão rápida quanto o golpe inicial de [sc_victor.Custom('signature_weapon')]."
 single_combat.0041.desc.sc_attacker.confident_attack.injury: "\n\nEmbora [sc_loser.GetFirstNameNoTooltip] consiga desviar o projétil, aproveito o tempo para enfiar [sc_victor.Custom('signature_weapon')] #EMP dentro#! em sua guarda, cravando [sc_victor.Custom('SignatureWeaponTipType')] [sc_victor.Custom('SignatureWeaponTipAdjective')] contra a garganta de est[sc_loser.Custom('ES_EA')] [sc_loser.GetWomanMan].\n\n[sc_loser.GetFirstNameNoTooltip] não se rende de imediato. Por um instante, até parece que ela possa tentar algo com sua própria arma, mas meu franzir de cenho e uma mudança de peso deixam claro que isso só pode acabar de uma forma.\n\nConsigo a rendição."
 single_combat.0041.desc.sc_attacker.expert_onslaught.injury: "[sc_loser.GetFirstNameNoTooltip] fica totalmente surpres[sc_loser.Custom('ES_OA')] quando passo de um berro trovejante para [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] e salta para trás, tomado de medo.\n\nO instinto é rápido, mas carece de sutileza, e meu inimigo demonstra isso ao largar [sc_loser.Custom('signature_weapon')] ao se lançar para longe.\n\nJá estou no meio de preparar um golpe mortal quando [sc_loser.GetFirstNameNoTooltip] se rende às pressas."
 single_combat.0041.desc.sc_attacker.attempt_disarm.injury: "abrir uma brecha em sua defesa. É a definição de profecia autorrealizável, ainda que com uma ajudinha.\n\nA partir daí, um golpe forte na mão da [sc_loser.Custom('signature_weapon')] de [sc_loser.GetFirstNameNoTooltip] faz com que a arma lhe escape. Giro minha [sc_victor.Custom('signature_weapon')] com uma floritura, preparando-me para [sc_victor.Custom2('SignatureWeaponKillTypeThirdPersonFutureGendered',SCOPE.sC('sc_loser'))]. Não consigo resistir à vontade de fazer uma última provocação.\n\n“E o que diz o/a perdedor[sc_loser.Custom('ES_XA')]?”\n\nAcontece que é “me rendo”. Rendimento, rendimento, rendimento."
 ### No need for a lightning_assault, as you can't end the duel in the first round.
 single_combat.0041.desc.sc_attacker.tire_opponent.injury: "deixando [sc_loser.GetFirstNameNoTooltip] cambaleando à beira do esgotamento.\n\nSó ataco quando o calor opressivo [sc_loser.GetHerHim] o/a derrubou quase por completo, disparando [sc_victor.Custom('SignatureWeaponAttemptedLightPlural')] em uma sequência que arremessa meu oponente para [sc_defender.Custom('GroundType')].\n\nQuando [sc_loser.GetFirstNameNoTooltip] já rolou de costas, eu já tenho minha [sc_victor.Custom('signature_weapon')] pronta para [sc_victor.Custom2('SignatureWeaponKillTypeThirdPersonFutureGendered',SCOPE.sC('sc_loser'))]. [sc_loser.GetFirstNameNoTooltip] cospe uma boca cheia de [sc_defender.Custom('GroundType')] e se rende."
 single_combat.0041.desc.sc_attacker.reason_you_suck_speech.injury: "Um chute rápido na virilha derruba meu oponente, aos gritos, na vegetação rasteira. [sc_loser.GetFirstNameNoTooltip] se debate no início, mas logo fica imóvel quando posiciono [sc_victor.Custom('SignatureWeaponTipType')] de [sc_victor.Custom('signature_weapon')] junto a [sc_loser.Custom('MaskFace')].\n\nA rendição não demora nada."
 single_combat.0041.desc.sc_attacker.technique_from_legend.injury: "Finalmente, [sc_loser.GetFirstNameNoTooltip] tropeça de puro cansaço e parto para a ação com [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] que [sc_loser.GetHerHim] arremessa ao chão.\n\nMeu oponente tenta se levantar, mas sua luta se transforma em pânico quando eu piso em sua cabeça com minha bota.\n\nErgo [sc_victor.Custom('signature_weapon')] para [sc_victor.Custom2('SignatureWeaponKillTypeHeadThirdPersonFutureGendered',SCOPE.sC('sc_loser'))], e consigo uma rendição atordoada em troca dos meus esforços."
 single_combat.0041.desc.sc_attacker.like_a_viper.injury: "De novo e de novo, derrubo [sc_loser.GetFirstNameNoTooltip] e de novo, ele consegue se recuperar no último segundo. Ao menos, até que não consegue mais e é lançado para trás, descendo de um pequeno aclive.\n\nCorro atrás do meu inimig[sc_loser.Custom('ES_OA')], e pressiono [sc_victor.Custom('signature_weapon')] contra a nuca dele antes que consiga se recompor. Uma rendição um tanto machucada é oferecida sem hesitação."
 single_combat.0041.desc.sc_attacker.pocket_silver.injury: "Leva alguns tentativas, mas, por fim, consigo empurrar [sc_loser.GetFirstNameNoTooltip] para uma poça de água pantanosa fétida que lhe chega até os joelhos. [sc_loser.GetSheHe|U] escorrega, perdendo [sc_loser.Custom('signature_weapon')] na queda, e afunda sob a superfície com um splash asqueroso.\n\nEntão é fácil passar uma bota sobre seu [sc_loser.Custom('MaskFace')] desde o chão firme, e a ameaça de sufocar no pântano fétido me rende uma rendição rápida, embora um tanto gorgolejante."
 single_combat.0041.desc.sc_attacker.martial_voice.injury: "abro caminho entre as sarças e as árvores do bosque com um abandono selvagem.\n\n[sc_loser.GetFirstNameNoTooltip] nem sequer vê o toco podre em direção ao qual [sc_loser.GetHerHim] o conduzo, tropeçando e caindo para trás com um grito de surpresa, fazendo com que [sc_loser.Custom('signature_weapon')] desapareça pela vegetação rasteira.\n\nDepois disso, um chute forte no peito e [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] final são tudo de que preciso para conseguir uma rendição."
 single_combat.0041.desc.sc_attacker.mocking_boast.injury: "Voando para a frente como um[sc_victor.Custom('ES_XA')] possu[sc_victor.Custom('ES_OA')], rompo a defesa de meu inimig[sc_loser.Custom('ES_OA')] e arranco [sc_loser.Custom('signature_weapon')] de sua mão com [sc_victor.Custom('SignatureWeaponAttemptedHeavy')].\n\nTão rápido que mal consigo vê-lo, com força suficiente para que #EMP meus#! ossos tremam, despejo uma chuva de golpes cheios de ódio que lançam [sc_loser.GetHerHim] ao chão com facilidade.\n\nA raiva se dissipa tão depressa quanto veio, deixando-me agitad[sc_victor.Custom('ES_OA')] mas em meu juízo perfeito. [sc_loser.GetFirstNameNoTooltip] grita sua rendição enquanto ainda pode."
 ### No need for an is_that_a_crocodile, as it's never just an injury.
 single_combat.0041.desc.sc_attacker.desert_warrior.injury: "avançando com a empunhadura primeiro em direção a seu [sc_loser.Custom('MaskFace')].\n\nO golpe atinge [sc_loser.GetFirstNameNoTooltip] #EMP fuerte#!, afundando tão profundamente que juro que posso sentir o osso contuso, e [sc_loser.GetSheHe] cambaleia para trás aturdid[sc_loser.Custom('ES_OA')].\n\nQuando [sc_loser.Custom('signature_weapon')] cai de sua mão, meu oponente gagueja sua rendição sem que eu precise fazer nada."
 single_combat.0041.desc.sc_attacker.jungle_stalker.injury: "[sc_loser.GetFirstNameNoTooltip] se tambaleia e se abate com cada golpe, mas cada onda de dor delicioso que [sc_loser.GetHerHim] percorre apenas me incita a lutar com mais força.\n\nQuando ele desaba, está ofegante e cuspindo grossos jorros de sangue.\n\nMe preparo para [sc_victor.Custom2('SignatureWeaponKillTypeRearHeadThirdPersonPresentGendered',SCOPE.sC('sc_loser'))] lentamente. É quase uma decepção ouvir uma rendição atormentada antes que [sc_victor.Custom('signature_weapon')] possa cair."
 single_combat.0041.desc.sc_attacker.open_terrain_expert.injury: "É tudo o que [sc_loser.GetFirstNameNoTooltip] pode fazer para acompanhar meu ritmo, até que um dos meus golpes acerta [sc_loser.Custom('signature_weapon')] com tanta força que de fato [sc_loser.Custom('SignatureWeaponBreaksThirdPersonSingularPresent2')].\n\nGaguejando, sem armas, meu inimigo recua alguns passos enquanto a realidade se impõe.\n\nÉ uma rendição rápida."
 single_combat.0041.desc.sc_attacker.rough_terrain_expert.injury.rocky: "O verdadeiro combate é uma arte, e eu sou um[sc_victor.Custom('ES_XA')] artista.\n\nSó quando [sc_loser.GetFirstNameNoTooltip] foi derrubado a ponto de ficar quase entorpecido é que eu desfero o golpe final, desarmando[sc_loser.GetHerHim] com [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] que faz o [sc_loser.Custom('signature_weapon')].\n\nPreparo-me mental e fisicamente para [sc_victor.Custom2('SignatureWeaponKillTypeThirdPersonFutureGendered',SCOPE.sC('sc_loser'))], pausando perfeitamente no instante em que meu oponente se rende."
 single_combat.0041.desc.sc_attacker.rough_terrain_expert.injury.boggy: "Ao que parece, meu inimig[sc_loser.Custom('ES_OA')] acha que a oração vai durar mais do que realmente dura, porque é pego totalmente de surpresa quando eu mudo sem esforço para um [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] que quase [sc_loser.GetHerHim] o(a) derruba no chão.\n\nEnquanto [sc_loser.GetFirstNameNoTooltip] se recompõe, eu avanço, deslizando [sc_victor.Custom('SignatureWeaponTipType')] de [sc_victor.Custom('signature_weapon')] até uma polegada de sua [sc_loser.Custom('MaskFace')].\n\nUma rendição nunca é mais satisfatória do que quando é dedicada a [sc_victor.GetFaith.HighGodName]."
 single_combat.0041.desc.sc_attacker.forest_fighter.injury: "Lentamente, a agonia e a adrenalina sobem em espiral até um crescendo, solto um rugido estrondoso e avanço em uma onda de [sc_victor.Custom('SignatureWeaponAttemptedHeavyPlural')] que fazem [sc_loser.GetFirstNameNoTooltip] ajoelhar-se.\n\nMeu oponente tenta aparar, sem perceber que meu joelho segue direto para [sc_loser.Custom('MaskFace')]. Ele cai para trás, ofegante.\n\n[sc_loser.GetFirstNameNoTooltip] ainda está ofegante quando se rende segundos depois, os olhos cravados em [sc_victor.Custom('signature_weapon')]."
 single_combat.0041.desc.sc_attacker.raaargh.injury: "Parece que [sc_loser.GetHerHim] pega desprevenido[sc_loser.Custom('ES_OA')] e tropeça com força.\n\nAproveito a oportunidade para encostar delicadamente [sc_victor.Custom('SignatureWeaponTipType')] da [sc_victor.Custom('signature_weapon')] no rosto de [sc_loser.GetFirstNameNoTooltip].\n\nConsigo uma rendição assim que o choque passa."
 single_combat.0041.desc.sc_attacker.hard_grit.injury: "Enquanto [sc_loser.GetFirstNameNoTooltip] está perdid[sc_loser.Custom('ES_OA')] em seus pensamentos, lanço [sc_victor.Custom('SignatureWeaponAttemptedLight')] que o faz recuar e, em seguida, um segundo golpe que arranca [sc_loser.Custom('signature_weapon')] de sua mão.\n\nDesarmad[sc_loser.Custom('ES_OA')], podendo [sc_victor.Custom('SignatureWeaponWoundVerb1')][sc_loser.Custom('ES_LoLa')] com facilidade e a segundos de morrer pelas minhas mãos, [sc_loser.GetFirstNameNoTooltip] se rende."
 single_combat.0041.desc.sc_attacker.feint_and_stab.injury: "avançando com a empunhadura primeiro em direção a seu [sc_loser.Custom('MaskFace')].\n\nO golpe atinge [sc_loser.GetFirstNameNoTooltip] #EMP fuerte#!, afundando tão profundamente que juro que posso sentir o osso contuso, e [sc_loser.GetSheHe] cambaleia para trás aturdid[sc_loser.Custom('ES_OA')].\n\nQuando [sc_loser.Custom('signature_weapon')] cai de sua mão, meu oponente gagueja sua rendição sem que eu precise fazer nada."
 single_combat.0041.desc.sc_attacker.butchery.injury: "no entanto, atravessa a guarda de [sc_loser.GetFirstNameNoTooltip] e [sc_victor.Custom2('SignatureWeaponKillTypeTorsoThirdPersonActiveGendered',SCOPE.sC('sc_loser'))].\n\nMeu rival recua desajeitadamente, soltando [sc_victor.Custom('signature_weapon')] com um desagradável som de sucção. O sangue jorra e, em seguida, transborda, encharcando o chão ao redor dele. Sua boca se abre e se fecha em espasmos enquanto tenta formar palavras apesar da dor.\n\n[sc_loser.GetFirstNameNoTooltip] parece tão impactad[sc_loser.Custom('ES_OA')] quanto eu."
 single_combat.0041.desc.sc_attacker.stoic_veteran.injury: "Que me dêm um tiro se eu conseguir apontar exatamente #EMP dónde#! atingiu [sc_loser.GetFirstNameNoTooltip], mas deve ter atingido, porque ele cambaleia para trás com o golpe. O sangue jorra de algum lugar do peito dele, sangue que [sc_loser.GetSheHe] fica parado a encarar com incredulidade.\n\nSei como isso termina e me recuso a arriscar que meu oponente me leve para o túmulo com ele. [sc_victor.Custom('signature_weapon')|U] erguida, avanço para desferir o golpe fatal."
 single_combat.0041.desc.sc_attacker.blade_dance.injury: "O entusiasmo pode compensar muitas coisas, e aqui consegue suplantar totalmente a habilidade, arrancando [sc_loser.Custom('signature_weapon')] da mão de [sc_loser.GetFirstNameNoTooltip] com pura força.\n\nNão perco tempo em me aproximar do meu oponente desarmad[sc_loser.Custom('ES_OA')] que já está se defendendo com [sc_loser.Custom('HandHands')], e parto para [sc_victor.Custom2('SignatureWeaponKillTypeGroinThirdPersonFutureGendered',SCOPE.sC('sc_loser'))] com uma eficiência implacável.\n\nOs gritos cessam muito antes que a maré de sangue."
 single_combat.0041.desc.sc_attacker.wrath_of_highgod.injury: "Só depois de me comprometer com a estocada percebo que estou atacando alto demais. Em pânico, tento abaixar a arma, e o espasmo repentino do movimento ultrapassa a guarda de [sc_loser.GetFirstNameNoTooltip] e cai diretamente sobre seu crânio.\n\nO golpe [sc_victor.Custom('SignatureWeaponWoundVerb1ThirdPersonPresent')] atravessa diretamente o osso e entra no cérebro, matando[sc_loser.GetHerHim] instantaneamente.\n\nPor um momento, o cadáver de [sc_loser.GetFirstNameNoTooltip] cambaleia e vacila, sustentado pelo braço onde está minha [sc_victor.Custom('signature_weapon')] antes de desabar desajeitadamente sobre o [sc_defender.Custom('GroundType')]."
 single_combat.0041.desc.sc_attacker.hurt_me_better.injury: "e aproveito a falha momentânea para cravar [sc_victor.Custom('signature_weapon')] em seu estômago com toda a força que posso.\n\nQuando [sc_loser.GetFirstNameNoTooltip] recua, cegad[sc_loser.Custom('ES_OA')] e sangrando, avanço com um golpe mortal que rasga seu pescoço em profundidade. A carne se parte como carne de açougue, respingando sangue morno sobre nós dois.\n\n[sc_loser.GetFirstNameNoTooltip] morre um minuto depois de atingir o chão."
 single_combat.0041.desc.sc_attacker.special_fallback.injury: "Como acontece com todas as cabeçadas, é quase tão doloroso para mim quanto para [sc_loser.GetSheHe], mas [sc_loser.GetFirstNameNoTooltip] parece… id[sc_loser.Custom('ES_OA')]. Como se o golpe tivesse embaralhado sua mente.\n\nApós [sc_victor.Custom('SignatureWeaponAttemptedLightPlural')] para testar a guarda do meu oponente, arrisco um [sc_victor.Custom('SignatureWeaponAttemptedHeavy')]. O golpe [sc_victor.Custom('SignatureWeaponWoundVerb1ThirdPersonPresent')] profundamente em seu ombro, atravessando a carne vital da cavidade torácica.\n\nSangue e fragmentos de osso jorram da ferida quando libero [sc_victor.Custom('signature_weapon')]. [sc_loser.GetFirstNameNoTooltip] cambaleia, oscila, tomba e fica imóvel."
 single_combat.0041.desc.sc_attacker.something_to_hide.injury: "até que um golpe mal calculado me permite arrancar-lhe [sc_loser.Custom('signature_weapon')].\n\nAntes que [sc_loser.GetFirstNameNoTooltip] possa protestar, disparo uma série de [sc_victor.Custom('SignatureWeaponAttemptedLightPlural')] que cobram em sangue e dor o seu mau julgamento.\n\nNão demora muito até que meu inimig[sc_loser.Custom('ES_OA')] caia de joelhos com a [sc_loser.Custom('MaskFace')] coberta de saliva ensanguentada. Com a reserva solene de um executador, finalmente [sc_victor.Custom2('SignatureWeaponKillTypeThirdPersonFutureGendered',SCOPE.sC('sc_loser'))]."
 ## Aggressor Won, Own Combat Move Fatality
 single_combat.0041.desc.sc_attacker.wait_and_hope.fatality: "Cada golpe lhe rouba algo: a postura, o ar nos pulmões, [sc_loser.Custom('signature_weapon')], pedaços de carne.\n\nSó quando está quase completamente indefens[sc_loser.Custom('ES_OA')] deixo minha arma [sc_victor.Custom('SignatureWeaponWoundVerb2')] mortalmente em seu peito.\n\n[sc_loser.GetSheHe|U] não parece apreciar a compaixão, convulsionando em espasmos fracos enquanto cai de costas na poça de sangue que se espalha cada vez mais."
 single_combat.0041.desc.sc_attacker.unsure_attack.fatality: "Tanto, ao que parece, que [sc_loser.GetSheHe] solta [sc_loser.Custom('signature_weapon')], que desliza para longe pelo/a [sc_defender.Custom('GroundType')]. Não sendo de desperdiçar uma vantagem, avanço, [sc_victor.Custom2('SignatureWeaponKillTypeThirdPersonPresentParticipleGendered',SCOPE.sC('sc_loser'))], em um único movimento fluido.\n\n[sc_loser.GetFirstNameNoTooltip] se desfaz no chão, a vida lhe escapa rapidamente, mas continua me encarando com a [sc_victor.Custom('MaskFace')] até o fim."
 single_combat.0041.desc.sc_attacker.enthusiastic_onslaught.fatality: "que [sc_loser.GetFirstNameNoTooltip] se enfurece tanto que sua guarda se rompe completamente em um acesso de fúria.\n\nAo me dar caminho para seu ventre, recompenso sua impaciência com uma morte lenta."
 single_combat.0041.desc.sc_attacker.hail_mary.fatality: "O golpe duplo despedaça a guarda de [sc_loser.GetFirstNameNoTooltip] e consigo primeiro desarmar[sc_loser.GetHerHim] com [sc_victor.Custom('SignatureWeaponAttemptedLight')] e então passar rapidamente para um golpe mortal no peito que abre uma cunha sangrenta direto até o coração.\n\nHá mortes mais lentas."
 single_combat.0041.desc.sc_attacker.pocket_sand.fatality: "O primeiro golpe abre um enorme buraco na guarda de [sc_loser.GetFirstNameNoTooltip], o segundo o priva do uso do braço de [sc_loser.Custom('signature_weapon')]. Meu oponente cambaleia, a lucidez se esvai em meio a uma avalanche de dor.\n\nTomo meu tempo para alinhar o próximo golpe, [sc_victor.Custom('SignatureWeaponWoundVerb1PresentParticiple')] profundamente no peito de [sc_victor.Custom('signature_weapon')].\n\nO próximo ataque simplesmente põe fim à dor."
 single_combat.0041.desc.sc_attacker.nut_em.fatality: "Quando julgo que é o momento certo, mudo meu padrão com um golpe lateral surpresa que acerta [sc_loser.GetFirstNameNoTooltip] bem no ventre.\n\nO golpe lança meu inimigo para trás; algo vermelho e de aparência vital desliza sem vida para fora do novo buraco enquanto [sc_loser.GetSheHe] tomba no chão.\n\nAproximo-me com cautela, mas logo fica claro que o choque está se instalando. Tomando um momento para chutar para longe [sc_loser.Custom('signature_weapon')] por via das dúvidas, me preparo para pôr fim ao sofrimento de [sc_loser.GetFirstNameNoTooltip]."
 single_combat.0041.desc.sc_attacker.guard.fatality: "Sinceramente, é admirável que [sc_loser.GetFirstNameNoTooltip] seja capaz de suportar tantos golpes de [sc_victor.Custom('signature_weapon')], já que caio sobre [sc_loser.GetSheHe] com toda a fúria de uma tempestade trovejante.\n\nLeva um minuto ou dois, mas no fim eu transformo [sc_loser.GetHerHim] em uma massa ensanguentada, retorcida e #EMP aullante#!.\n\nSó quando estou satisfeito de que não haverá uma chance de vingança no último segundo é que desfero o golpe final."
 single_combat.0041.desc.sc_attacker.probing_attack.fatality: "Sem dar quartel, eu me lanço contra [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] que [sc_victor.Custom('SignatureWeaponWoundVerb4ThirdPersonPresent')] limpas através da caixa torácica.\n\nContinuo atacando [sc_loser.GetFirstNameNoTooltip] enquanto ele cambaleia até o chão, lento e sem vida[sc_loser.Custom('ES_OA')], parando apenas quando os únicos movimentos que o cadáver faz são causados pelos meus golpes."
 single_combat.0041.desc.sc_attacker.onslaught.fatality: "Cada golpe lhe rouba algo: a postura, o ar nos pulmões, [sc_loser.Custom('signature_weapon')], pedaços de carne.\n\nSó quando está quase completamente indefens[sc_loser.Custom('ES_OA')] deixo minha arma [sc_victor.Custom('SignatureWeaponWoundVerb2')] mortalmente em seu peito.\n\n[sc_loser.GetSheHe|U] não parece apreciar a compaixão, convulsionando em espasmos fracos enquanto cai de costas na poça de sangue que se espalha cada vez mais."
 single_combat.0041.desc.sc_attacker.surprise_attack.fatality: "Leva um tempo até que se abra uma brecha adequada na guarda de [sc_loser.GetFirstNameNoTooltip], mas quando isso acontece, é tudo de que preciso. Com [sc_victor.Custom('SignatureWeaponAttemptedHeavy')] de [sc_victor.Custom('signature_weapon')], eu atravesso a barriga dele até o estômago.\n\nSangue, bile e os restos da última refeição do meu oponente jorram, encharcando a metade inferior do meu corpo e [sc_loser.GetSheHe] solta um grito ensurdecedor.\n\nTalvez eu esteja fazendo um favor ao encerrar rapidamente o sofrimento de [sc_loser.GetFirstNameNoTooltip]."
 single_combat.0041.desc.sc_attacker.taunt.fatality: "Seus golpes se tornam cada vez mais apressados, a frustração fica visivelmente evidente na desleixo de seus ataques, até que [sc_loser.GetFirstNameNoTooltip] solta um grito de frustração.\n\nNesse exato momento, eu passo por sua guarda, [sc_victor.Custom('SignatureWeaponWoundVerb5PresentParticiple')] [sc_victor.Custom('signature_weapon')] profundamente em sua garganta.\n\nA massa ensanguentada e dilacerada que fica depois dói só de olhar. Felizmente, [sc_loser.GetFirstNameNoTooltip] cai mort[sc_loser.Custom('ES_OA')] de bruços, poupando-nos a ambos desse sofrimento."
 single_combat.0041.desc.sc_attacker.put_the_boot_in.fatality: "Com mais esperança do que certeza, avanço contra [sc_loser.GetFirstNameNoTooltip], [sc_victor.Custom('signature_weapon')] imitando perfeitamente o que contam as histórias, com os olhos cerrados por reflexo.\n\nDe repente [sc_victor.Custom('signature_weapon')] bate contra algo rochoso, ouve-se a carne úmida partida ao meio, e um espasmo percorre meu braço. Abro os olhos, quase certo de que verei minha própria perdição, apenas para me deparar com o toco #EMP aniquilado#! do pescoço de [sc_loser.GetFirstNameNoTooltip], jorrando sangue pelo ar com temerária falta de cuidado.\n\nQuando encontro a cabeça, a luz há muito já desapareceu de seus [sc_loser.Custom('EyeEyes')]."
 single_combat.0041.desc.sc_attacker.strict_guard.fatality: "[sc_loser.GetFirstNameNoTooltip] se apressa para aparar, mas nem chega perto de me deter.

Atravesso sua defesa fraca, com [sc_victor.Custom('SignatureWeaponTipType')] de [sc_victor.Custom('signature_weapon')] se cravando em seu coração.

Soam estalos fortes e estouros úmidos, sinal de ossos quebrando e órgãos perfurados, durante o que parece uma eternidade, até que minha arma atravessa limpa para o outro lado.

É quase impossível dizer em que momento do golpe [sc_loser.GetFirstNameNoTooltip] morreu."
 single_combat.0041.desc.sc_attacker.confident_attack.fatality: "[sc_loser.GetFirstNameNoTooltip] desvia a bolsa, mas não vê o golpe seguinte.\n\n[sc_victor.Custom('SignatureWeaponAttemptedHeavy')|U] acerta em cheio na mandíbula, arrancando carne, dentes e ossos. [sc_loser.GetFirstNameNoTooltip] tenta gritar, mas não consegue com a boca destroçada.\n\nÉ até possível dizer que lhe faço um favor quando acabo com seu sofrimento."
 single_combat.0041.desc.sc_attacker.expert_onslaught.fatality: "\n\nSem nenhum aviso, as obscenidades que grito se transformam em [sc_victor.Custom('SignatureWeaponAttemptedHeavy')]. [sc_loser.GetFirstNameNoTooltip] continua tão horrorizad[sc_loser.Custom('ES_OA')] por minhas palavras que nem sequer tenta aparar o golpe.\n\nO metal encontra carne e osso, [sc_victor.Custom('SignatureWeaponWoundVerb2PresentParticiple')] profundamente no ombro do meu inimig[sc_loser.Custom('ES_OA')]. Sabemos que o fluxo de sangue resultante é intenso demais para sobreviver."
 single_combat.0041.desc.sc_attacker.attempt_disarm.fatality: "matá-lo. [sc_loser.GetFirstNameNoTooltip] fica tão atônit[sc_loser.Custom('ES_OA')] por meus comentários que é incapaz de impedir que eu arranque [sc_loser.Custom('signature_weapon')] da mão.\n\nMeu inimig[sc_loser.Custom('ES_OA')] já teve tempo de sobra para entender exatamente como as coisas vão terminar antes que eu [sc_victor.Custom2('SignatureWeaponKillTypeThirdPersonFutureGendered',SCOPE.sC('sc_loser'))]."
 ### No need for a lightning_assault, as you can't end the duel in the first round.
 single_combat.0041.desc.sc_attacker.tire_opponent.fatality: "e tudo o que eu preciso fazer é dar uma rasteira no joelho de [sc_loser.GetFirstNameNoTooltip].\n\nNo segundo em que ele estiver no/a [sc_defender.Custom('GroundType')]. Acabou. [sc_victor.Custom('SignatureWeaponAttemptedLight')|U] [sc_victor.Custom2('SignatureWeaponKillTypeTorsoThirdPersonActiveGendered',SCOPE.sC('sc_loser'))].\n\nDepois, a [sc_loser.GetFirstNameNoTooltip] não resta nada além de morrer."
 single_combat.0041.desc.sc_attacker.reason_you_suck_speech.fatality: "Lançando [sc_victor.Custom('SignatureWeaponEndType')] de [sc_victor.Custom('signature_weapon')] no olho de [sc_loser.GetFirstNameNoTooltip] é quase fácil demais arrancar [sc_loser.Custom('signature_weapon')].\n\nSem nenhum modo de se defender de mim, dou cabo de [sc_loser.GetFirstNameNoTooltip]."
 single_combat.0041.desc.sc_attacker.technique_from_legend.fatality: "Finalmente [sc_loser.GetFirstNameNoTooltip] se estica demais e, então, aproveito a vantagem com [sc_victor.Custom('SignatureWeaponAttemptedLight')] como um raio ao seu lado.\n\n[sc_victor.Custom('SignatureWeaponTipType')|U] de [sc_victor.Custom('signature_weapon')] volta com sangue escorrendo e vísceras arrastando-se. Meu oponente desaba em questão de segundos, esmagad[sc_loser.Custom('ES_OA')] por uma dor atroz.\n\nErgo minha arma para o golpe de misericórdia."
 single_combat.0041.desc.sc_attacker.like_a_viper.fatality: "[sc_loser.GetFirstNameNoTooltip] se apressa para aparar, mas nem chega perto de me deter.

Atravesso sua defesa fraca, com [sc_victor.Custom('SignatureWeaponTipType')] de [sc_victor.Custom('signature_weapon')] se cravando em seu coração.

Soam estalos fortes e estouros úmidos, sinal de ossos quebrando e órgãos perfurados, durante o que parece uma eternidade, até que minha arma atravessa limpa para o outro lado.

É quase impossível dizer em que momento do golpe [sc_loser.GetFirstNameNoTooltip] morreu."
 single_combat.0041.desc.sc_attacker.pocket_silver.fatality: "\n\nUm olhar atento percebe as oportunidades no combate, e o meu me dá a chance de [sc_loser.Custom('SignatureWeaponBreaksVerbPastTense')] [sc_loser.Custom('signature_weapon')] de [sc_loser.GetFirstNameNoTooltip]. Desarmad[sc_loser.Custom('ES_OA')], meu rival representa pouca ameaça, e meu próximo golpe está livre para [sc_victor.Custom('SignatureWeaponKillTypeTorsoThirdPersonFutureGendered')].\n\nCom isso, [sc_loser.GetFirstNameNoTooltip] está morto, ele só ainda não morreu completamente.\n\nDeixo que o futuro cadáver tombe para trás, com [sc_victor.Custom('signature_weapon')] ainda cravada em seu peito."
 single_combat.0041.desc.sc_attacker.martial_voice.fatality: "Golpe a golpe, minha sinfonia de dor toma forma sobre cada nervo de [sc_loser.GetFirstNameNoTooltip], arrancando gritos como um cântico coral ao som do aço contra o aço.\n\nQuando minha inspiração começa a secar, interrompo minha dança, permitindo que meu inimig[sc_loser.Custom('ES_OA')] caia de joelhos. O sangue jorra de [sc_loser.Custom('ES_ElElla')], a tal ponto que [sc_loser.GetFirstNameNoTooltip] mal consegue reunir forças para erguer os olhos para mim.\n\nTenho a cortesia de retribuir seu olhar e preparo [sc_victor.Custom('signature_weapon')] para a nota final da sinfonia."
 single_combat.0041.desc.sc_attacker.mocking_boast.fatality: "Antes que [sc_loser.GetFirstNameNoTooltip] tenha a chance de aproveitar meu momento piedoso, avanço com [sc_victor.Custom('SignatureWeaponAttemptedHeavy')]; [sc_loser.Custom('SignatureWeaponBreaksVerbPresentParticiple')] [sc_loser.Custom('signature_weapon')] da arma de assinatur[sc_loser.Custom('ES_OA')].\n\nEst[sc_loser.Custom('ES_EA')] fica atônit[sc_loser.Custom('ES_OA')] diante de tal prova da proteção [sc_victor.GetFaith.WarGodNamePossessive]. Só dura um segundo, mas é tudo de que preciso para [sc_victor.Custom2('SignatureWeaponKillTypeThirdPersonFutureGendered',SCOPE.sC('sc_loser'))]."
 single_combat.0041.desc.sc_attacker.is_that_a_crocodile.fatality: "Quando o transe da batalha toma conta de mim, desferro uma torrente de [sc_victor.Custom('SignatureWeaponAttemptedLightPlural')], alternando com perfeição entre bloqueios implacáveis e golpes quase mortais, com minha tolerância à dor desestabilizando todos os cálculos de [sc_loser.GetFirstNameNoTooltip].\n\nNão demora muito para que eu consiga desferir um ataque letal, abrindo um terrível buraco no flanco do meu inimigo.\n\n[sc_loser.GetFirstNameNoTooltip] sangra até a morte em um minuto."
 single_combat.0041.desc.sc_attacker.desert_warrior.fatality: "[sc_loser.GetFirstNameNoTooltip] tropeça, tempo suficiente para erguer [sc_victor.Custom('SignatureWeaponEndType')] de [sc_victor.Custom('signature_weapon')] para atingir seu rosto.\n\nSeu tropeço se torna uma queda completa, e a arma sai rolando com a queda. [sc_loser.Custom('ES_LoLa')|U] o chuto nas costas enquanto está aturdid[sc_loser.Custom('ES_OA')] e, com um golpe implacável, procedo a [sc_victor.Custom2('SignatureWeaponKillTypeThirdPersonFutureGendered',SCOPE.sC('sc_loser'))]."
 single_combat.0041.desc.sc_attacker.jungle_stalker.fatality: "Lançando [sc_victor.Custom('SignatureWeaponEndType')] de [sc_victor.Custom('signature_weapon')] no olho de [sc_loser.GetFirstNameNoTooltip] é quase fácil demais arrancar [sc_loser.Custom('signature_weapon')].\n\nSem nenhum modo de se defender de mim, dou cabo de [sc_loser.GetFirstNameNoTooltip]."
 single_combat.0041.desc.sc_attacker.open_terrain_expert.fatality: "Finalmente [sc_loser.GetFirstNameNoTooltip] se estica demais e, então, aproveito a vantagem com [sc_victor.Custom('SignatureWeaponAttemptedLight')] como um raio ao seu lado.\n\n[sc_victor.Custom('SignatureWeaponTipType')|U] de [sc_victor.Custom('signature_weapon')] volta com sangue escorrendo e vísceras arrastando-se. Meu oponente desaba em questão de segundos, esmagad[sc_loser.Custom('ES_OA')] por uma dor atroz.\n\nErgo minha arma para o golpe de misericórdia."
 single_combat.0041.desc.sc_attacker.rough_terrain_expert.fatality.rocky: "Goodbye, [sc_loser.GetTitledFirstNameNoTooltip|l]."
 single_combat.0041.desc.sc_attacker.rough_terrain_expert.fatality.boggy: "I am victorious!"
 single_combat.0041.desc.sc_attacker.forest_fighter.fatality: "caçando[sc_loser.GetHerHim] através da linha das árvores como um demônio.\n\nQuando [sc_loser.GetFirstNameNoTooltip] tropeça, tenho a melhor chance de vencer e disparo para a frente. [sc_victor.Custom('signature_weapon')|U] se [sc_victor.Custom('SignatureWeaponWoundVerb5ThirdPersonPresent')], [sc_victor.Custom2('SignatureWeaponKillTypeRearTorsoThirdPersonPresentParticipleGendered',SCOPE.sC('sc_loser'))] com [sc_victor.Custom('SignatureWeaponAttemptedHeavy')].\n\nDou-lhe um chute nas costas. [sc_loser.GetFirstNameNoTooltip] Mal está vivo o suficiente para me olhar nos olhos enquanto [sc_loser.GetHerHim] o mato."
 single_combat.0041.desc.sc_attacker.raaargh.fatality: "Uma névoa vermelha turva minha visão, a ponto de eu ver cenas quase estáticas de minhas ações mais do que os atos de fato. A arma de [sc_loser.GetFirstNameNoTooltip] fica inutilizada quando [sc_victor.Custom('SignatureWeaponBreaksThirdPersonSingularPresent')]. [sc_loser.Custom('ArmArms')|U] quase em dois. Seu rosto, uma massa ensanguentada da qual pingam dentes quebrados e gengivas rasgadas enquanto recuo o punho para desferir outro golpe.\n\nQuando volto a mim, há algo pegajoso e úmido sob meu calcanhar. Um olhar confirma que é o que restou do crânio de [sc_loser.GetFirstNameNoTooltip]."
 single_combat.0041.desc.sc_attacker.hard_grit.fatality: "It's Time to D-D-D-D-D-D-D-Duel"
 single_combat.0041.desc.sc_attacker.feint_and_stab.fatality: "Sucks to be [recipient.GetFirstName]. Or you, I guess."
 single_combat.0041.desc.sc_attacker.butchery.fatality: "You are the attacker, default"
 single_combat.0041.desc.sc_attacker.stoic_veteran.fatality: "You are the defender, default"
 single_combat.0041.desc.sc_attacker.blade_dance.fatality: "You are the attacker, fatal"
 single_combat.0041.desc.sc_attacker.wrath_of_highgod.fatality: "You are the defender, fatal"
 single_combat.0041.desc.sc_attacker.hurt_me_better.fatality: "You are the attack, non-lethal"
 single_combat.0041.desc.sc_attacker.special_fallback.fatality: "You are the defender, non-lethal"
