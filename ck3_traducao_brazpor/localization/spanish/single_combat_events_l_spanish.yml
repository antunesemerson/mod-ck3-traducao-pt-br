 ##################################################
 #Misc Loc
 ## Titles
 single_combat.0000.t: "Single Combat:"
 single_combat.0001.t: "$single_combat.0000.t$ [sc_attacker.GetTitledFirstNameNoTooltip]"
 single_combat.0011.t: "$single_combat.0000.t$ [sc_defender.GetTitledFirstNameNoTooltip]"
 single_combat.0031.t: "$single_combat.0000.t$ Defeat!"
 single_combat.0041.t: "$single_combat.0000.t$ Victory!"
 ## Intro Spiels
 single_combat.0001.desc.sc_defender.intro: "[sc_attacker.GetTitledFirstName] e eu circulamos um ao outro, cada qual ponderando suas opções. [sc_attacker.GetSheHe|U] [sc_attacker.Custom('SignatureWeaponActionThirdPerson')] um temível [sc_attacker.Custom('SignatureWeaponNameOrType')], enquanto eu aperto com firmeza meu próprio [sc_defender.Custom('SignatureWeaponNameOrType')]. A arma mortal parece fria e pesada em minhas mãos.\n\n"
 single_combat.0001.desc.capstone.intro.first_blood: "Esta luta pode ir só até o primeiro sangue, mas isso não acalma meus nervos."
 single_combat.0001.desc.capstone.intro.deadly: "Apenas um de nós sairá daqui hoje, e eu pretendo que seja eu."
 single_combat.0001.desc.sc_attacker.intro: "Por alguns breves momentos, [sc_defender.GetTitledFirstName|l] e eu caminhamos em semicírculos preguiçosos, cada um procurando uma brecha. [sc_attacker.Custom('SignatureWeaponAction')|U] [sc_attacker.Custom('SignatureWeaponNameOrType')] meus preparad[sc_attacker.Custom('ES_OA')] para me defender, enquanto [sc_defender.GetSheHe] segura [sc_defender.Custom('SignatureWeaponNameOrType')] firmemente na mão."
 single_combat.0001.desc.sc_attacker.intro.epilogue: "With a sudden twitch, our bout begins.\n\n"
