 ACTIVATE_SCHEME_COUNTERMEASURE_ACCEPT: "Ativar"
 #Scheme confirmation deactivation dialog
 DEACTIVATE_SCHEME_COUNTERMEASURE_TITLE: "Desativar '[SchemeCountermeasureType.GetName]'"
 DEACTIVATE_SCHEME_COUNTERMEASURE_TEXT: "#WEAK O perigo certamente já passou, não?#!\n$EFFECT_LIST_BULLET$Desativados todos os bônus e penalidades de [scheme_countermeasure|lE] contra [schemes|lE] específicos\n$EFFECT_LIST_BULLET$Desativados todos os [modifiers|lE] negativos em curso de [scheme_countermeasure_countermeasures|lE]"
 DEACTIVATE_SCHEME_COUNTERMEASURE_ACCEPT: "Desativar"
 #Target countermeasure UI
 SCHEME_COUNTERMEASURE_PROTECTING_TARGET: "#T [Scheme.GetSchemeCountermeasureProtectingTarget().GetName()]#!\n[Scheme.GetSchemeCountermeasureProtectingTarget().GetDesc()]\n\n[Scheme.GetSchemeCountermeasureProtectingTarget().GetParameterListDesc()]\n\n#BOL Modificadores:#!\n[Scheme.GetSchemeCountermeasureProtectingTarget().GetOwnerModifierDesc]"
 SCHEME_COUNTERMEASURE_MISSING_ON_TARGET: "Sem Foco em $game_concept_scheme_countermeasure_countermeasure$"
 #Feed Messages
 countermeasures.t.target_changes: "[ROOT.Char.GetFirstNameNoTooltip] Altera Contramedidas"
 countermeasures.desc.bounties_for_whispers: "$EFFECT_LIST_BULLET$ Nova [scheme_countermeasure_countermeasure|lE]: $scheme_countermeasure_type_bounties_for_whispers$\n$EFFECT_LIST_BULLET$[secrecy|E] reduzida"
 countermeasures.desc.arbitrary_arrests: "$EFFECT_LIST_BULLET$ Nova [scheme_countermeasure_countermeasure|lE]: $scheme_countermeasure_type_arbitrary_arrests$\n$EFFECT_LIST_BULLET$[secrecy|E] reduzido"
 countermeasures.desc.strengthen_sentries: "$EFFECT_LIST_BULLET$ Nova [scheme_countermeasure_countermeasure|lE]: $scheme_countermeasure_type_strengthen_sentries$\n$EFFECT_LIST_BULLET$[success_chance|E] reduzida para [schemes|lE] tipo [GetScheme('seduce').GetTypeName|l] e similares"
 countermeasures.desc.redouble_guards: "$EFFECT_LIST_BULLET$ Nova [scheme_countermeasure_countermeasure|lE] chamada: $scheme_countermeasure_type_redouble_guards$\n$EFFECT_LIST_BULLET$[success_chance|E] reduzida para [schemes|lE] tipo [GetScheme('murder').GetTypeName|l] e similares"
 countermeasures.desc.withdraw_from_view: "$EFFECT_LIST_BULLET$ Nova [scheme_countermeasure_countermeasure|E]: $scheme_countermeasure_type_withdraw_from_view$\n[success_chance|E] levemente reduzida para a maioria dos [schemes|lE]"
 countermeasures.desc.bribe_officials: "$EFFECT_LIST_BULLET$ Nova [scheme_countermeasure_countermeasure|lE] é: $scheme_countermeasure_type_bribe_officials$\n[success_chance|E] ligeiramente reduzida para a maioria de [political_schemes|lE]"
 #Misc. Countermeasure Tooltips
 can_set_own_countermeasures_trigger.tt: "Você deve estar em sua própria [court|lE] para determinar [scheme_countermeasure_countermeasures|lE]"
 countermeasures_in_target_court.tt.secrecy: "[scheme_countermeasure_countermeasures|E]"
 countermeasures_in_target_court.tt.effective: "[scheme_countermeasure_countermeasures|E] eficazes na [court|lE] [Concept( 'hosting', 'hogar' )|E]: $VALUE|/%+=0$"
 countermeasures_in_target_court.tt.backfiring: "[scheme_countermeasure_countermeasures|E] contraproducentes na [court|lE] [Concept( 'hosting', 'hogar' )|E]: $VALUE|/%+=0$"
