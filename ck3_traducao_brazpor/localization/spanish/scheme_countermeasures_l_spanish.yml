l_spanish:
 #Boilerplate copy for the standard countermeasures.
 scheme_countermeasure_type_bounties_for_whispers: "Recompensas por Sussurros"
 scheme_countermeasure_type_bounties_for_whispers_desc: "#WEAK Moedas ajudam muito a fazer a ralé falar, mesmo que isso exija ouvi-la.#!"
 scheme_countermeasure_type_arbitrary_arrests: "Prisões Arbitrárias"
 scheme_countermeasure_type_arbitrary_arrests_desc: "#WEAK Colocar algemas em cada servo, retentor e emissário que sequer pisque certamente é uma coerção eficaz. Só não é exatamente popular.#!"
 scheme_countermeasure_type_strengthen_sentries: "Reforçar Sentinelas"
 scheme_countermeasure_type_strengthen_sentries_desc: "#WEAK Olhos vigilantes afastam muito bem pretendentes sorrateiros, mas têm dificuldade contra conspiradores bem organizados e bem armados.#!"
 scheme_countermeasure_type_redouble_guards: "Dobrar a Guarda"
 scheme_countermeasure_type_redouble_guards_desc: "#WEAK Retentores armados são excelentes para frustrar aqueles com más intenções sérias, mas não conseguem impedir uma carta escondida sob a porta ou uma conversa num canto escuro.#!"
 scheme_countermeasure_type_withdraw_from_view: "Retirar-se de Vista"
 scheme_countermeasure_type_withdraw_from_view_desc: "#WEAK Quando a segurança é uma preocupação séria mas o perigo é desconhecido, simplesmente abdicar de todas as responsabilidades é uma opção.#!"
 calculating_schemes_boilerplate.tt: "\n $BULLET_WITH_TAB$[GetScheme('murder').GetTypeName]\n $BULLET_WITH_TAB$[GetScheme('overthrow_regent').GetTypeName]\n $BULLET_WITH_TAB$[GetScheme('steal_back_artifact').GetTypeName]"
