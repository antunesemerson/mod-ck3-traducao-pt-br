l_spanish:
 SUGGESTION_TITLE: "#T $NAME$#!"
 suggestion_recruit_maa_label: "Recrutar Homens de Armas"
 suggestion_recruit_maa: "Sugestão: recrutar um regimento de Homens de Armas"
 suggestion_recruit_maa_desc: "Você possui menos [men_at_arms|lE] do que o esperado para um [ruler|lE] do seu [rank|lE].\n\nRecrutar alguns reforçará seus [armies|lE], servindo tanto para dissuadir possíveis inimigos quanto para combater aqueles que insistirem em lutar mesmo assim."
 suggestion_recruit_maa_click: "#I Clique para ver seu Exército#!"
 suggestion_declare_war_label: "Declarar Guerra"
 suggestion_declare_war: "Sugestão: declarar guerra contra [recipient.GetShortUINameNoTooltip]"
 suggestion_declare_war_desc: "Vencer uma guerra contra [recipient.GetShortUIName] permitirá que você conquiste mais terras e expanda seu [realm|lE], ajudando a garantir o sucesso de longo prazo de sua [house|lE]."
 suggestion_declare_war_click: "#I Clique para declarar guerra#!"
 suggestion_construct_building_label: "Construir Edifício"
 suggestion_construct_building: "Sugestão: construir um edifício em [landed_title.GetNameNoTierNoTooltip]"
 suggestion_construct_building_desc: "Construir edifícios em [landed_title.GetNameNoTooltip] trará diferentes benefícios e vantagens, ajudando muito você no longo prazo."
 suggestion_construct_building_click: "#I Clique para ver a Propriedade#!"
 suggestion_fabricate_claim_label: "Fabricar Reivindicação"
 suggestion_fabricate_claim: "Sugestão: fabricar uma reivindicação sobre [landed_title.GetNameNoTierNoTooltip]"
 suggestion_fabricate_claim_desc: "O [landed_title.GetName] vizinho é rico e próspero, mas você não pode conquistá-lo sem um [casus_belli|lE].\n\nEnviar seu [court_chaplain|lE] ou [realm_priest|lE] para fabricar [claims|lE] sobre ele lhe dará a justificativa necessária para ir à [war|lE] e tomar o título para si!"
 suggestion_fabricate_claim_click: "#I Clique para ver o Título#!"
 suggestion_create_title_label: "Criar Título"
 suggestion_create_title: "Sugestão: criar [landed_title.GetNameNoTooltip]"
 suggestion_create_title_desc: "Você possui terras [de_jure|lE] suficientes para [create|lE] [landed_title.GetName]. Fazer isso aumentaria muito seu [prestige|lE] e também faria de você o [rightful_liege|lE] de todos os títulos sob ele."
 suggestion_create_title_click: "#I Clique para ver o Título#!"
 SUGGESTIONS_DEBUG: "#D DEPURAÇÃO DE SUGESTÕES:#!"
 suggestion_convert_county_label: "Converter Condado"
 suggestion_convert_county: "Sugestão: converter a Fé em [landed_title.GetNameNoTierNoTooltip]"
 suggestion_convert_county_desc: "Enviar seu [Concept( 'realm_priest', GetPlayer.GetCouncillorPosition( 'councillor_court_chaplain' ).GetPositionName )|E] para convencer os habitantes de [landed_title.GetName] a abraçarem a verdadeira fé estabilizará a área."
 suggestion_convert_county_click: "#I Clique para ver seu Conselho#!"
 suggestion_increase_control_label: "Aumentar Controle"
 suggestion_increase_control: "Sugestão: aumentar o Controle em [landed_title.GetNameNoTierNoTooltip]"
 suggestion_increase_control_desc: "Enviar seu [Concept( 'marshal', GetPlayer.GetCouncillorPosition( 'councillor_marshal' ).GetPositionName )|E] para aumentar o controle em [landed_title.GetName] reduzirá a [county_corruption|lE] no condado e possivelmente trará outros efeitos benéficos também."
 suggestion_increase_control_click: "#I Clique para ver seu Conselho#!"
 suggestion_increase_opinion_label: "Aumentar Opinião"
 suggestion_increase_opinion: "Sugestão: aumentar a opinião de [recipient.GetShortUINameNoTooltip] sobre nós"
 suggestion_increase_opinion_desc: "Seu/Sua [actor.Custom2('RelationToMeShort', SCOPE.sC('recipient'))] [recipient.GetShortUIName] tem uma baixa [opinion|lE] sobre você. Aumentá-la com uma [personal_scheme|lE] facilitaria sua vida."
 suggestion_increase_opinion_click: "#I Clique para iniciar um esquema de Influência#!"
 suggestion_raid_label: "Saquear"
 suggestion_raid: "Sugestão: saquear [landed_title.GetNameNoTierNoTooltip]"
 suggestion_raid_desc: "Enviar seu exército para [raid|El] [landed_title.GetNameNoTierNoTooltip] traria [loot|El] para você."
 suggestion_raid_click: "#I Clique para ver seu Exército#!"
 suggestion_grant_title_label: "Conceder Título"
 suggestion_grant_title: "Sugestão: conceder [landed_title.GetNameNoTierNoTooltip] a [recipient.GetShortUINameNoTooltip]"
 suggestion_grant_title_desc: "[recipient.GetShortUIName|U] é o detentor [de_jure|lE] de [landed_title.GetName]. Garantir que seu reino siga a estrutura De Jure o máximo possível traz estabilidade e menos penalidades de opinião."
 suggestion_grant_title_click: "#I Clique para conceder o título#!"
 suggestion_can_hire_court_positions: "Contratar Cargos de Corte"
 suggestion_can_hire_court_positions_label: "Sugestão: contratar mais Cargos de Corte"
 suggestion_can_hire_court_positions_desc: "Você deveria investir algum ouro para preencher mais [court_positions|lE] e ganhar seus bônus."
 suggestion_can_hire_court_positions_click: "#I Clique para ver os cargos de corte disponíveis#!"
 suggestion_request_war_aid_petition: "Pedir Assistência Militar"
 suggestion_request_war_aid_petition_label: "Sugestão: pedir Assistência Militar"
 suggestion_request_war_aid_petition_desc: "Você pode pedir ajuda ao seu [liege|lE] em sua [war|lE]. Ele pode entrar na guerra ou pagar por soldados."
 suggestion_request_war_aid_petition_click: "#I Clique para ver a [royal_court|lE] de seu [liege|lE]#!"
 suggestion_create_nation_fracturing_faction: "Criar uma $nation_fracturing_faction$"
 suggestion_create_nation_fracturing_faction_label: "Sugestão: $suggestion_create_nation_fracturing_faction$"
 suggestion_create_nation_fracturing_faction_desc: "Você pode desafiar seu [liege|lE] e tentar dissolver o reino para conquistar independência para você e todos os seus colegas [vassals|lE]."
 suggestion_create_nation_fracturing_faction_click: "#I Clique para ver as facções contra seu [liege|lE]#!"
