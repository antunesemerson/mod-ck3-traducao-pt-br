l_spanish:
 cid_loyalty_counter_positive: "Isto #positive_value mostrará#! [cid_loyalty|lE] em direção a [liege.Custom('ES_ElLa')] [liege.GetTitleAsNameNoTooltip|l]"
 cid_loyalty_counter_very_positive: "Isto #positive_value mostrará mucha#! [cid_loyalty|lE] para [liege.Custom('ES_ElLa')] [liege.GetTitleAsNameNoTooltip|l]"
 cid_loyalty_counter_negative: "Isto #negative_value cuestionará#! a [cid_loyalty|lE] para [liege.Custom('ES_ElLa')] [liege.GetTitleAsNameNoTooltip|l]"
 cid_loyalty_counter_very_negative: "Isto #negative_value cuestionará mucho#! a [cid_loyalty|lE] para com [liege.Custom('ES_ElLa')] [liege.GetTitleAsNameNoTooltip|l]"
 game_concept_cid_loyalty: "Lealdade de Rodrigo"
 game_concept_cid_loyalty_desc: "Al permanecer #V leal#! a su señor hasta en el exilio, el Cid puede recuperar su favor y ver restaurar su posición ventajosa.\n\nDe convertirse en #V desleal#!, el Cid puede ganar opciones especiales que lleven a ser un gobernante independiente."
 cid.0001.t: "Por ordem [liege.Custom('ES_DelDela')] [liege.GetTitleAsNameNoTooltip|l]"
 cid.0001.desc.intro: "Coloco o pé no estribo, acaricio a cabeça do meu cavalo e lanço um último olhar ao lugar que sempre será meu lar.\n\nExílio. As palavras [liege.Custom('ES_DelDela')] [liege.GetTitledFirstName|l] não deixaram margem para erro.\n\n"
 cid.0001.desc.alfonso: "Eu havia seguido tão lealmente seu irmão, teria seguido ele também."
 cid.0001.desc.garcia_ordonez: "Eu já o havia derrotado uma vez, em uma batalha que ele não conseguia esquecer."
 cid.0001.desc.liege_hate: "Caído em desgraça com [liege.Custom('ES_ElLa')] [liege.GetTitleAsNameNoTooltip|l]. Até que ponto um vassalo pode ser bom se seu suserano não o ama?"
 cid.0001.desc.courtier: "Os inimigos na corte envenenaram a mente dele(a). Inimigos que sempre quiseram me fazer mal, já que [liege.Custom('ES_ElLa')] [liege.GetTitleAsNameNoTooltip|l] me apreciava demais."
 cid.0001.desc.outro: "\n\nUm corvo voa à nossa direita — um mau presságio."
 cid.0001.a: "Eu sempre serei leal a você, meu [liege.GetTitleAsNameNoTooltip|l]."
 cid.0001.a.flavor: "#EMP E assim o Campeador exilado da terra foi.#!"
 cid.0001.b: "Que assim seja. Aqueles que me amam me seguirão."
 cid.0001.b.flavor: "#EMP Así supo mío Cid que no podía esperar la gracia [liege.Custom('ES_DelDela')] [liege.GetTitleAsNameNoTooltip|l] [liege.GetFirstNameNoTooltip].#!"
 story_el_cid_tt: "#EMP A Canção de El Cid#! começa"
 cid_exile_title: "Exílio:"
 cid.1000.t: "$cid_exile_title$ Portas Fechadas"
 cid.1000.desc: "A noite é escura e fria. Envio um dos meus homens para bater na porta mais próxima, em busca de um anfitrião gentil.\n\nA resposta não vem de imediato. Ouço murmúrios e passos até que uma figura finalmente aparece na entrada.\n\n“É a ordem [liege.Custom('ES_DelDela')] [liege.GetTitleAsNameNoTooltip|l]; não ousamos vos receber, meu senhor! Selada com o selo real de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] uma carta chegou para proibir o povo de \n\n[liege.Custom('ES_ElLa')] [liege.GetTitleAsNameNoTooltip|l] de abrir a porta para vós, ou vos dar abrigo”."
 cid.1000.a: "Não pressionaremos essas pobres pessoas."
 cid.1000.a.flavor: "#EMP Nossos bens, nossos lares, nossos próprios olhos, tudo isso está em jogo.#!"
 cid.1000.b: "\"Abra a porta ou teremos que arrombá-la!\""
 cid.1000.b.flavor: "#EMP E pequeno será o ganho para ti, mesmo que encontremos ruína por tua causa.#!"
 cid_opened_doors_modifier: "Portas Abertas"
 cid_opened_doors_modifier_desc: "Este personagem forçou a abertura das portas do povoado para garantir abrigo a seus seguidores."
 cid.1010.t: "$cid_exile_title$ Sem Ouro ou Prata"
 cid.1010.desc: "Los exiliados son señores precarios. No hay garantías de que pueda pagar a mis seguidores o siquiera alimentarlos. ¿Quién arriesgará la seguridad de sus familias por un hombre deshonrado?\n\nLas conversaciones en el campamento son de lo más sinceras.\n\nLevanto la vista y veo [friend.Custom('ES_AlAla')] [friend.GetTitledFirstName|l] caminar hacia mí, con pan y vino en las manos:\n\n«Campeador, en buena hora nacido, debemos seguir adelante. Yo pagaré a estos hombres y me ganaré la ira [liege.Custom('ES_DelDela')] [liege.GetTitledFirstName] por haberos ayudado»."
 cid.1010.a: "\"[cook.GetFirstNameNoTooltip], cozinhe #EMP qualquer coisa#! que puder encontrar.\""
 cid.1010.b: ""Obrigado, meu estimad[Select_CString( friend.IsFemale, 'amiga', 'amigo' )]"."
 cid.1010.b.flavor: "#EMP Se eu viver, te pagarei o dobro.#!"
 cid.1010.c: ""Não posso arriscar a ira [liege.Custom('ES_DelDela')] [liege.GetTitleAsNameNoTooltip|l]"."
 cid_1010_no_invite_var_desc: "[recipient.GetHerHim|U] baniu: $VALUE|=+0$"
 cid.1020.t: "$cid_exile_title$ Adeus, Meu Querido"
 cid.1020.desc.intro: "[spouse.GetFirstName] se arroja delante del altar, rezando fervientemente a [spouse.GetFaith.HighGodName] para que me proteja de todo mal.\n\n[spouse.GetHerHim] acerco a mi corazón y me besa la mano, consternad[spouse.Custom('ES_OA')] de pena como está.\n\n«Solo [ROOT.Char.GetFaith.HighGodName] sabe si nos volveremos a ver», digo, «aquí estaréis a salvo. No puedo haceros pasar por lo que"
 cid.0001.desc.children: "comigo. Crianças... sejam boas.\""
 cid.0001.desc.no_children: "comigo.\""
 cid.1020.a: ""[my_priest.GetFirstNameNoTooltip], talvez você possa interceder em nosso favor [Select_CString(And(ROOT.Char.IsFemale, spouse.IsFemale), 'nosotras', 'nosotros')]?"."
 cid.1020.b: "\"Que a espera seja curta.\""
 cid.1020.b.flavor: "#EMP Como quando a unha é arrancada da carne.#!"
 cid.1020.c: "\"Não posso te deixar.\""
 cid.1020.c.flavor: ""
 cid_family_good_modifier: "Como Unha e Carne"
 cid_family_good_modifier_desc: "Este personagem recusou-se a deixar para trás sua família, desobedecendo as ordens de seu suserano."
 cid.1030.t: "$cid_exile_title$ pelo amor de [liege.Custom('ES_DelDela')] [liege.GetTitleAsNameNoTooltip|l]"
 cid.1030.desc: "Ouro. Prata. Joias. Meu cofre finalmente está crescendo.\n\nAnéis de ouro, colares e estandartes. [liege.Custom('ES_AlAla')]´ [liege.GetTitledFirstName] não lhe seria estranha esta exibição.\n\nMas isso não é totalmente meu. [liege.GetFirstNameNoTooltip] continua sendo meu senhor[liege.Custom('ES_XA')] e, como tal, uma parte da minha fortuna também deve ser dele."
 cid.1030.a: "[artifact.GetName] será um ótimo presente."
 cid.1030.b: "Ouro nunca é demais."
 cid.1030.c: "Bah! Eu #EMP ganhei#! isso!"
 cid.1040.t: "$cid_exile_title$ [ROOT.Char.GetFaith.HighGodName] Tem Misericórdia"
 cid.1040.desc: "Alguns corações estão endurecidos e demoram muito a lembrar como é a suavidade.\n\nNão importa o que eu faça, o coração [liege.Custom('ES_DelDela')] [liege.GetTitledFirstName|l] está além do meu alcance.\n\n"[ROOT.Char.GetFaith.HighGodName]", começo, ajoelhando-me diante do altar. Todos os meus homens me cercam, curiosos. "Que a vossa bondade mude o coração [liege.Custom('ES_DelDela')] [liege.GetTitledFirstNameNoTooltip|l] e o faça lembrar do amor que sente por mim"."
 cid.1040.a: "Nosso acampamento será um exemplo de devoção."
 cid.1040.b: "Por favor, [ROOT.Char.GetFaith.HighGodName], guiai[liege.GetHerHim] de volta à luz."
 cid.1040.c: "Que vá para o seu [ROOT.Char.GetFaith.NegativeAfterLife]."
 cid_own_prayer: "Misericórdia para Mim"
 cid_own_prayer_desc: "Este personagem decidiu focar suas preces em si mesmo."
 cid_1040_a_tt: "Esta opção está disponível por causa do seu $baggage_train_shrine_domicile_building$"
 cid_restoration_title: "Restauração:"
 cid.2000.t: "$cid_restoration_title$ Do Cotovelo para Baixo"
 cid.2000.desc.intro: "A batalha estoura ao meu redor. A sombra dos pássaros sobre os exércitos fica cada vez mais densa.\n\nNão é difícil localizar"
 cid.2000.desc.loser: "a [loser.GetTitledFirstName], com suas armas no peitoral. \"Vamos\", dou de esporas ao meu corcel e começo a avançar contra [loser.GetSheHe]. Só um duelo pode acabar com tudo.\n\nEu o parto em dois até o cinturão, através do elmo e da malha."
 cid.2000.desc.fallback: "al enemigo, con sus armas en el peto. «Vamos», doy de espuela a mi corcel y empiezo a cargar hacia él. Solo un duelo puede poner fin a todo.\n\nParto en dos al enemigo hasta el cinto, a través del yelmo y la malla."
 cid.2000.desc.outro: "Do cotovelo para baixo, pingando de sangue."
 cid.2000.a: "Esta espada! Que beleza!"
 cid.2000.a.flavor: "#EMP Esta foi a batalha, este foi o dia, quando ele ganhou a grande espada.#!"
 cid.2000.b: "Enviar um enviado a [liege.GetShortUIName]. Este prêmio também é dele/dela."
 cid.2000.b.flavor: "#EMP Desejo enviar-vos [liege.Custom('ES_AlAla')] [liege.GetTitledFirstNameNoTooltip], meu senhor[liege.Custom('ES_OA')] natural, com uma centena de cavalos deste espólio, para que lhe beijeis a mão por mim."
 cid_2000_liege_tt: "Ganha [newly_created_artifact.GetNameNoTooltip] [artifact|lE]"
 cid.2001.t: "$cid_restoration_title$ De Um Mestre Corajoso"
 cid.2001.desc.intro: "Espada em punho, centímetro por centímetro, a pé, disputo o terreno. A chuva fica mais forte. Está muito frio.\n\n"
 cid.2001.desc.loser: "[loser.Custom('ES_ElLa')|U] [loser.GetTitledFirstName|l] marcha em minha direção. "[ROOT.Char.GetFirstNameNoTooltip]", ele me cumprimenta e eu retribuo a reverência. "Não há muito tempo para formalidades".\n\nNossas espadas se encontram repetidas vezes no ar até que decepo a mão dele."
 cid.2001.desc.fallback: "O inimigo marcha em minha direção. \"[ROOT.Char.GetFirstNameNoTooltip],\" ele me cumprimenta e eu inclino a cabeça em resposta. \"Não há tempo para cortesias.\"\n\nVez após vez, nossas espadas se encontram no ar até que eu corto a mão dele."
 cid.2001.desc.outro: "Um grito estridente. A espada cai no chão, dançando em um brilho pálido."
 cid.2001.desc.outro.tizona: "\n\nUm companheiro digno para minha Tizona."
 cid.2001.a: "Muitas mais batalhas à nossa frente!"
 cid.2001.a.tt: "Você se torna o dono de [newly_created_artifact.GetName]"
 cid.2001.a.flavor: "#EMP Bem sabe que os ganhei de forma cavalheiresca.#!"
 cid.2001.b: "Um presente digno de um[liege.Custom('ES_XA')] [liege.GetTitleAsNameNoTooltip]."
 cid.2010.t: "$cid_restoration_title$ Uma Oferta Favorável"
 cid.2010.desc: "[herald.Custom('ES_ElLa')|U] arauto [liege.Custom('ES_DelDela')] [liege.GetTitledFirstName|l] abre caminho até minha tenda com as primeiras luzes da manhã.\n\n"Atenção, todos os presentes, condes e cavaleiros!", anuncia. "Meu [liege.GetLadyLord], [liege.Custom('ES_ElLa')] [liege.GetTitledFirstNameNoTooltip|l] faz um pedido [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetTitledFirstNameNoTooltip|l]. Que [liege.GetFaith.HighGodName] seja para o seu benefício, [liege.Custom('ES_ElLa')] [liege.GetTitledFirstNameNoTooltip|l] vos pede a vostr[child.Custom('ES_OA')] [child.Custom('GetDaughterSon')] [child.GetFirstNameNoTooltip] como [child.GetWifeHusband] [proposed_spouse.Custom('ES_DelDela')] [proposed_spouse.GetTitledFirstName|l]".\n\nUma lágrima escorre pela minha face. Será este o primeiro passo rumo à reconciliação?"
 cid.2010.a: "\"Com grande alegria aceito esta honra!\""
 cid.2010.a.flavor: "#EMP Em seus bra?os deixo meu [child.Custom('GetDaughterSon')], brilhante como o sol.#!"
 cid.2010.b: ""Sou capaz de arrumar um cônjuge para ele[ROOT.Char.Custom('ES_OA')], muito obrigada"."
 cid_refused_betrothal: "Recusou o Suserano"
 cid_refused_betrothal_desc: "Este personagem recusou a oferta de casamento de seu suserano para seu filho e decidiu encontrar seu próprio."
 cid.2020.t: "$cid_restoration_title$ Um Homem Honrado"
 cid.2020.desc: "Recebo com grande surpresa um[liege.Custom('ES_OA')] nov[liege.Custom('ES_OA')] convidad[liege.Custom('ES_OA')] em minha tenda: [liege.Custom('ES_ElLa')] [liege.GetTitledFirstName|l] cercad[liege.Custom('ES_OA')] por seus guardas e com um sorriso no rosto.\n\n"Amig[ROOT.Char.Custom('ES_OA')]!", exclama. "Vós que sempre fostes leal a mim, mesmo quando, com tanto pesar, eu vos afastei. Eis que vos perdoo e vos concedo meu afeto em meu [liege.GetPrimaryTitle.GetTierAsNameNoTooltip|l] desde este mesmo dia".\n\n"Meu [liege.GetLadyLord]! Fui banido e privado da minha honra, e com grande esforço conquistei o que possuo agora. Graças a [ROOT.Char.GetFaith.HighGodName] por vossa graça!"
 cid.2020.a: "Tudo valeu a pena."
 cid.2020.a.flavor: "#EMP E alegre estava meu Cid e todos os seus homens quando seu estandarte repousou no cume da fortaleza.#!"
 cid.2020.b: "Não posso deixar meu acampamento para trás."
 cid.2020.b.flavor: "#EMP Ele de Vivar voltou-se para seus homens e os orientou a reunir os despojos que haviam conquistado.#!"
 cid_2020_b_tt: "Você continua como um [adventurer|lE]"
 cid.2020.c: "É hora de seguir caminhos separados."
 cid_treason_title: "Traição:"
 cid.4000.opening: "[ROOT.Char.Custom('ES_AlAla')|U] volúvel [ROOT.Char.GetFirstNameNoTooltip]"
 cid.4000.desc: "Sua falta de comprometimento me deixa perplexo. Se permanecer leal a mim era sua intenção, você falhou; se pretendia mostrar seu descontentamento — você falhou igualmente.\n\nVamos esquecer esses infortúnios."
 cid.4000.a: "Vamos."
 cid.4010.t: "$cid_restoration_title$ Mio Cid"
 cid.4010.desc: "Un golpe rápido en la puerta anuncia [herald.Custom('ES_AlAla')] [herald.GetTitledFirstName].\n\n«Por el amor [herald.GetFaith.HighGodNamePossessive], [ROOT.Char.GetFirstNameNoTooltip], ¿tenéis que ponerlo todo tan difícil?».\n\n«No lo empecé yo», respondo, con toda la severidad posible. «Si [liege.Custom('ES_ElLa')] [liege.GetTitleAsNameNoTooltip|l] quería que siguiera siendo leal, no debería haberme exiliado».\n\n«No le debo más lealtad, pues ya no es mi [Select_CString( liege.IsFemale, 'señora legítima', 'señor legítimo' )]. Podéis contarle eso»."
 cid.4010.a: "\"Conquistei minhas próprias terras.\""
 cid.4010.a.flavor: "#EMP Nove meses completos ele ficou diante dela, e quando chegou o décimo, tiveram que se render.#!"
 cid.4010.b: "\"A estrada me chama.\""
 cid.4010.b.flavor: "#EMP E aqui está a história do meu Cid Campeador.#!"
 cid.4010.c: ""Continuarei respeitando o seu legítimo governo"."
 cid.4010.c.flavor: "#EMP Por el amor [liege.Custom('ES_DelDela')] [liege.GetTitledFirstNameNoTooltip], quien exiliome.#!"
 cid.5000.opening: "[sender.Custom2('AppropriateGreeting', ROOT.Char)],"
 cid.5000.desc: "Uma palavra para vós, meu bom[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetLadyLord]; voss[el_cid_story.MakeScope.Var('cid_liege').GetCharacter.Custom('ES_OA')] [Select_CString( el_cid_story.MakeScope.Var('cid_liege').GetCharacter.IsFemale, 'legítima soberana', 'legítimo soberano' )], [el_cid_story.MakeScope.Var('cid_liege').GetCharacter.Custom('ES_ElLa')] [el_cid_story.MakeScope.Var('cid_liege').GetCharacter.GetTitledFirstName|l], faleceu.\n\nSejam quais forem os assuntos que tivestes com [el_cid_story.MakeScope.Var('cid_liege').GetCharacter.GetSheHe], nada significam para mim."
 cid.5000.a: "Acho que isso resolve tudo."
 story_el_cid: "[Concept( 'story_content_el_cid', 'El cantar del Cid' )|E]"
 story_el_cid_desc: "Injustamente exilado por seu amigo e suserano, Sancho II de Castela, após a guerra com Afonso VI, você agora parte para forjar sua lenda. Forjará seu próprio caminho, ou permanecerá leal?"
 CID_LIEGE: "Seu suserano informal"
 EL_CID_CUSTOM_STRING_KEY: "En el transcurso de tus viajes probarás tu [Concept( 'cid_loyalty', 'lealtad' )|E] a [Story.MakeScope.Var('cid_liege').Char.GetShortUIName], quien puede acabar ofreciéndote tierra como [vassal|El].\n\nTambién puedes labrarte tu propio camino librando [wars|El] en [GetGeographicalRegion('world_europe_west_iberia').GetName]. Esto puede premiarte con espadas históricas y darte una oportunidad alternativa de ganar tierras."
 EL_LOYALTY_COUNTER_TOOLTIP: "Valor atual de [Concept( 'cid_loyalty', 'Lealdade' )|E] : [Story.MakeScope.Var('cid_loyalty_counter').GetValue|V0]"
 cid_loyalty_counter_label: "[Concept( 'cid_loyalty', 'Lealdade' )|E]"
 CID_LOYALTY_MIN_LABEL: "#difficulty_hard Desleal#!"
 CID_LOYALTY_MAX_LABEL: "#difficulty_easy Leal#!"
