 petition_liege.0101.desc.council_seat_family: "por favor, meu [petition_liege.GetLadyLord], permiti que meu [petition_char.Custom2('RelationToMeShort', petition_char)] se sente em vosso conselho".\n\n"Seus talentos não são levados em consideração enquanto, nos mais altos círculos, são ouvidas pessoas inferiores; [petition_char.GetSheHe] compartilhará os encargos do domínio como voss[petition_vassal.Custom('ES_OA')] [petition_char.Custom('GetCouncilPositionRequest')|l]"."
 petition_liege.0101.desc.court_position: "por favor, meu [petition_liege.GetLadyLord], aceite meus serviços em vossa corte".\n\n"Meus talentos estão sendo desperdiçados em vez de servir aos vossos interesses"."
 petition_liege.0101.desc.court_position_family: "por favor, meu [petition_liege.GetLadyLord], aceite [petition_char.GetName] na sua corte".\n\n"[petition_char.GetSheHe|U] tem um grande talento, mas se sairia melhor a seu serviço do que ao meu"."
 petition_liege.0101.desc.governorship: "por favor, meu [petition_liege.GetLadyLord], não me concederia uma governadoria?".\n\n"Estou ansioso para servir ao reino e, francamente, meus talentos estão sendo desperdiçados. Com uma província própria, poderia servir aos seus interesses"."
 petition_liege.0101.desc.governorship_family: "por favor, meu [petition_liege.GetLadyLord], não concederíeis uma governadoria a [petition_char.GetName]?"\n\n"[petition_char.GetSheHe|U] está com muita vontade de servir ao reino e, francamente, é um desperdício tê-l[petition_char.GetHerHim] me servindo. Deveria ter uma província própria para servir aos vossos interesses.""
 petition_liege.0101.desc.house_governorship_rights: "por favor, meu [petition_liege.GetLadyLord], não concederíeis à Casa [petition_vassal.GetHouse.GetBaseName] o direito de continuar governando [petition_vassal.GetPrimaryTitle.GetTierAsNameNoTooltip] de [petition_vassal.GetPrimaryTitle.GetName]?".\n\n"Minha família administrou bem a região como vossos súditos leais e apenas deseja continuar assim"."
 petition_liege.0101.accept.council_seat_family: "Muito bem, [petition_char.GetFirstNameNoTooltip] terá seu assento."
 petition_liege.0101.accept.council_seat_family_occupied: "[petition_char.GetFirstNameNoTooltip] substituirá [second_party.Custom('ES_AlAla')] [second_party.GetTitledFirstNameNoTooltip|l] como meu [second_party.GetCouncilTitle|l]."
 petition_liege.0101.accept.court_position: "Muito bem, você me servirá."
 petition_liege.0101.accept.court_position_family: "Muito bem, [petition_char.GetFirstNameNoTooltip] me servirá."
 petition_liege.0101.accept.governorship: "Você governará [duchy_governorship.GetNameNoTierNoTooltip]."
 petition_liege.0101.accept.governorship_family: "[petition_char.GetFirstNameNoTooltip|U] governará [duchy_governorship.GetNameNoTierNoTooltip]."
