l_spanish:
 #Story Cycle
 admin_eunuch_header: "Eunuco Eminente:"
 admin_eunuch_upgrade_modifier_tt: "#weak [modifiers|lE] são melhorados#!"
 admin_eunuch_downgrade_modifier_tt: "#weak [modifiers|lE] são rebaixados#!"
 admin_eunuch_flavor_tt: "#weak A influência de [eunuch.GetFirstNameNoTooltip] pode oferecer grandes benefícios, mas a que custo?#!"
 admin_eunuch_rivalry_tt: "[THIS.Char.GetShortUIName] se aproxima de formar uma rivalidade com [eunuch.GetShortUIName]"
 #Events
 ep3_story_cycle_admin_eunuch.1001.t: "$admin_eunuch_header$ [eunuch.GetFullNameNoTooltip]"
 ep3_story_cycle_admin_eunuch.1001.intro_byz: "Há séculos, os [Glossary( 'eunoukhoi', 'EUNOUKOS_GLOSS' )] têm servido na burocracia e nos palácios de [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip] como conselheiros e confidentes, desempenhando papéis importantes nos duelos políticos do dia a dia."
 ep3_story_cycle_admin_eunuch.1001.intro: "O reino está sempre em necessidade de administradores e servos de confiança para garantir um bom governo e a segurança do palácio, e os eunucos estão entre os mais valorizados do/de a [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip]."
 ep3_story_cycle_admin_eunuch.1001.desc: "\n\n[eunuch.GetFirstName] ascendeu rapidamente pela hierarquia, e seu talento, probidade e discrição em tudo recebem elogios pouco comuns entre as fileiras do palácio."
 ep3_story_cycle_admin_eunuch.1001.arrivals: "\n\nProcedente de uma família humilde de [origin.GetDeJureLiege.GetName] seus parentes se juntaram recentemente a [eunuch.GetSheHe] em [ROOT.Char.GetCapitalLocation.GetBaronyNameExplicitlyNoTooltip]…"
 ep3_story_cycle_admin_eunuch.1001.a: "Tenho o trabalho perfeito para [eunuch.GetSheHe]."
 ep3_story_cycle_admin_eunuch.1001.b: "Um a ser observado..."
 EUNOUKOS_GLOSS: "Eunucos, literalmente \"guardas do quarto\" devido ao seu papel comum como camareiros, eram servos masculinos castrados. Extraídos de estratos sociais variados, muitas vezes altamente educados e confiáveis por não terem distrações carnais ou interesses paternos, rapidamente se tornaram atores poderosos na política bizantina."
 ep3_story_cycle_admin_eunuch.2010.t: "$admin_eunuch_header$ Mãos Confiáveis"
 ep3_story_cycle_admin_eunuch.2010.desc: "Meu eunuc[eunuch.Custom('ES_OA')], [eunuch.Custom('ES_ElLa')] [eunuch.GetTitledFirstName|l], aproxima-se de mim na corte falando em voz bem baixa enquanto seus olhos percorrem o recinto.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U]", ele murmura, "está claro para mim que a organização do governo poderia ser conduzida de forma muito mais fluida… do que é atualmente".\n\n"Garantir um programa claro e ordenado seria um grande alívio para o reino… deixe isso comigo"."
 ep3_story_cycle_admin_eunuch.2010.a: "Sim, você deve cuidar de tais assuntos [eunuch.GetFirstNameNoTooltip]."
 ep3_story_cycle_admin_eunuch.2010.b: "Os arranjos atuais são adequados."
 ep3_story_cycle_admin_eunuch.2015.t: "$admin_eunuch_header$ Compartilhe a Carga"
 ep3_story_cycle_admin_eunuch.2015.desc: "Meu eunuco[eunuch.Custom('ES_OA')], [eunuch.Custom('ES_ElLa')] [eunuch.GetTitledFirstName|l], tem sido de grande ajuda ultimamente, ao assumir muitas das odiosas cargas do meu domínio.\n\nEnquanto trabalhamos entre pilhas de documentos e esgotamos as reservas de cera do palácio com uma pressão após outra do meu selo imperial, [eunuch.GetFirstNameNoTooltip] profere suavemente: "Meu senhor[ROOT.Char.Custom('ES_XA')],"
 ep3_story_cycle_admin_eunuch.2015.war: "seu tempo e atenção estão sobrecarregados pela guerra,"
 ep3_story_cycle_admin_eunuch.2015.hunter: "você não tem tempo para sua caça preciosa,"
 ep3_story_cycle_admin_eunuch.2015.fallback: "você está tão sobrecarregado pelas mazelas do estado,"
 ep3_story_cycle_admin_eunuch.2015.outro: "e não me custaria nada aliviar você dessas cansativas responsabilidades...\""
 ep3_story_cycle_admin_eunuch.2015.a: "Você é uma grande ajuda, [eunuch.GetFirstNameNoTooltip]."
 ep3_story_cycle_admin_eunuch.2015.b: "Posso cuidar das coisas muito bem."
 ep3_story_cycle_admin_eunuch.2021.t: "$admin_eunuch_header$ Alto Cargo"
 ep3_story_cycle_admin_eunuch.2021.desc: "Meu eunuco[eunuch.Custom('ES_OA')], [eunuch.Custom('ES_ElLa')] [eunuch.GetTitledFirstName|l], organizou uma reunião privada, e me surpreende vê-[eunuch.GetHerHim] chegando com alguém atrás. "Ah, [ROOT.Char.GetTitleAsNameNoTooltip|l]!", [eunuch.GetSheHe] exclama alegremente. "Conheceis meu/minha [governor.Custom('ComplimentAdjective')] [eunuch.Custom2('RelationToMeShort', SCOPE.sC('governor'))], [governor.Custom('ES_ElLa')] [governor.GetTitledFirstName|l]?"\n\nCom uma precisão ensaiada, [governor.GetFirstNameNoTooltip] faz grande demonstração de si mesm[governor.Custom('ES_OA')] em meu benefício.\n\n"Meu senhor[ROOT.Char.Custom('ES_XA')], [governor.GetFirstNameNoTooltip] seria uma candidatura #EMP excelente#! para [title.GetTierAsNameNoTooltip] de [title.GetName]; muito melhor que a alternativa, em todo caso...""
 ep3_story_cycle_admin_eunuch.2021.a.grant: "Muito bem, [title.GetNameNoTierNoTooltip] é [governor.GetFirstNameNoTooltip]."
 ep3_story_cycle_admin_eunuch.2021.a: "Muito bem, [governor.GetFirstNameNoTooltip] será colocado na lista."
 ep3_story_cycle_admin_eunuch.2021.b: "Seu[governor.Custom('ES_OA')] [eunuch.Custom2('RelationToMeShort', SCOPE.sC('governor'))] deve usar os canais adequados…"
 ep3_story_cycle_admin_eunuch.2023.desc: "Observando do palácio, lamento o desperdício dos vossos talentos e a ascensão de [governor.GetWomenMen] menores como governadores[governor.Custom('ES_EA')] de [emperor.GetPrimaryTitle.GetNameNoTooltip].\n\nPelo bem de [emperor.GetPrimaryTitle.GetTierAsNameNoTooltip|l], e também pelo seu próprio, [emperor.Custom('ES_ElLa')] [emperor.GetTitleAsNameNoTooltip|l] deve reconhecer os vossos talentos. Com fundos, eu poderia garantir que ele soubesse disso…"
 ep3_story_cycle_admin_eunuch.2023.a: "Faça isso, eunuco!"
 ep3_story_cycle_admin_eunuch.2023.a.tt: "[eunuch.GetFirstName] tentará convencer [emperor.Custom('ES_AlAla')] [emperor.GetTitledFirstName|l] para que lhe conceda uma [governorship|lE]"
 ep3_story_cycle_admin_eunuch.toast: "Eunuco Eminente"
 ep3_story_cycle_admin_eunuch.2023.b: "Eu não tenho tempo para isso."
 ep3_story_cycle_admin_eunuch.2023.b.toast: "Sugestão Rejeitada"
 ep3_story_cycle_admin_eunuch.2024.t: "$admin_eunuch_header$ Cargo Nobre"
 ep3_story_cycle_admin_eunuch.2024.desc: "Meu eunuco[eunuch.Custom('ES_OA')], [eunuch.Custom('ES_ElLa')] [eunuch.GetTitledFirstName|l], desliza-se pelo quarto, indo timidamente até meu assento.\n\n"[ROOT.Char.GetTitleAsNameNoTooltip]!", exclama alegremente. "Fico muito feliz por tê-lo encontrado! Eu estava justamente pensando na situação de [title.GetBaseNameNoTier]: tal [title.GetTierAsNameNoTooltip] realmente se beneficiaria de uma liderança forte e confiável."\n\n"E, por acaso, acho que conheço exatamente a pessoa certa para o cargo. Na minha humilde opinião, [governor.Custom('ES_ElLa')] [governor.GetTitledFirstName|l] seria [Select_CString(governor.IsFemale, 'uma governadora', 'um governador' )] #EMP formidável#! — e leal —, Vossa Majestade.""
 ep3_story_cycle_admin_eunuch.2031.t: "$admin_eunuch_header$ Sant[new_patriarch.Custom('ES_OA')] [new_patriarch.GetMotherFather|U]"
 ep3_story_cycle_admin_eunuch.2031.intro: "Fico intrigad[ROOT.Char.Custom('ES_OA')] quando meu eunuco[eunuch.Custom('ES_OA')], [eunuch.Custom('ES_ElLa')] [eunuch.GetTitledFirstName|l], me pede para nos encontrarmos em"
 ep3_story_cycle_admin_eunuch.2031.intro_byz: "a Hagia Sophia"
 ep3_story_cycle_admin_eunuch.2031.intro_fallback: "o [ROOT.Char.GetFaith.HouseOfWorship]"
 ep3_story_cycle_admin_eunuch.2031.desc: "e ainda mais quando me deparo com [eunuch.GetHerHim] e seu/sua [eunuch.Custom2('RelationToMeShort', SCOPE.sC('new_patriarch'))], [new_patriarch.GetFirstName], que parece estar tentando alguma estranha aproximação da piedade [ROOT.Char.GetFaith.GetAdjectiveNoTooltip].\n\n[eunuch.GetFirstNameNoTooltip] fala bem — tão bem, na verdade, que quase não percebo a gravidade de seus argumentos persuasivos.\n\n"Meu senhor[ROOT.Char.Custom('ES_XA')]", gorjeia, com uma expressão estranha gravada em seus traços. "Certamente deve ser a vontade de [ROOT.Char.GetFaith.HighGodNameAlternatePossessive] que [new_patriarch.GetFirstNameNoTooltip] se torne [Select_CString( old_patriarch.IsFemale, 'a nova', 'o novo' )] [old_patriarch.GetTitleAsName|l] dos [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip]!""
 ep3_story_cycle_admin_eunuch.2031.a: "Vos[new_patriarch.Custom('ES_OA')] [eunuch.Custom2('RelationToMeShort', SCOPE.sC('new_patriarch'))] #EMP será#! [old_patriarch.Custom('ES_ElLa')] [old_patriarch.GetTitleAsNameNoTooltip|l]!"
 ep3_story_cycle_admin_eunuch.2031.b: "Vamos lá, isso é uma #EMP sugestão absurda#!..."
 ep3_story_cycle_admin_eunuch.2040.t: "$admin_eunuch_header$ Assento à Mesa"
 ep3_story_cycle_admin_eunuch.2040.desc: "Meu eunuco[eunuch.Custom('ES_OA')], [eunuch.Custom('ES_ElLa')] [eunuch.GetTitledFirstName|l], me aborda enquanto examino missivas. "Ah, [ROOT.Char.GetTitleAsNameNoTooltip|l]!", guincha enquanto fecha cuidadosamente a porta. "Tendes um momento?"

"Entristece-me ver o trabalho do vosso conselho prejudicado por seus... executores." Ergo uma sobrancelha.

[eunuch.GetFirstNameNoTooltip] limpa a garganta. "Seria um prazer para mim assumir algumas das responsabilidades e zelar pelos vossos interesses e pelos de [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip|l] com mais atenção.""

"Eu não gostaria que você se distraísse de suas outras obrigações." Ergo uma sobrancelha.

[eunuch.GetFirstNameNoTooltip] limpa a garganta. "$admin_eunuch_header$ Outra Voz"
 ep3_story_cycle_admin_eunuch.2040.a: "A cabeça do meu eunuco[eunuch.Custom('ES_OA')], [eunuch.Custom('ES_ElLa')] [eunuch.GetTitledFirstName|l], aparece pela porta da câmara do conselho. [eunuch.GetSheHe|U] sorri ao me ver e entra a trote com um de seus parentes atrás.\n\n"Meu [ROOT.Char.GetTitleAsNameNoTooltip|l]!" [eunuch.GetSheHe] treme. "Enquanto refletia sobre os talentos um tanto... deficientes de seus conselheiros, de repente me ocorreu uma ideia! Meu/minha [eunuch.Custom2('RelationToMeShort', SCOPE.sC('councillor'))] [councillor.GetFirstName], aqui presente, poderia ser um grande trunfo para Vossa Dignidade!""
 ep3_story_cycle_admin_eunuch.2040.b: "Muito bem, como você disser, [eunuch.GetFirstNameNoTooltip]."
 ep3_story_cycle_admin_eunuch.2040.a.toast: "Vou pensar sobre isso..."
 ep3_story_cycle_admin_eunuch.2041.t: "Como eunuco[eunuch.Custom('ES_OA')] do palácio, vejo muita má governança e me fica bem claro que sois uma das pessoas mais valiosas [emperor.Custom('ES_DelDela')] [emperor.GetTitleAsName|l].

Com vosso apoio, eu poderia defender com mais força as vantagens do vosso conselho: pelo bem de [emperor.GetPrimaryTitle.GetTierAsNameNoTooltip]."
 ep3_story_cycle_admin_eunuch.2041.desc: "Por todos os meios, [eunuch.GetFirstNameNoTooltip]!"
 ep3_story_cycle_admin_eunuch.2041.a: "[eunuch.GetFirstName] tentará convencer [emperor.Custom('ES_AlAla')] [emperor.GetTitledFirstName|l] para que te nomeie [Concept('councillor',Select_CString(ROOT.Char.IsFemale,'consejera', 'consejero'))|E]"
 ep3_story_cycle_admin_eunuch.2041.b: "Não estou interessado."
 ep3_story_cycle_admin_eunuch.2043.desc: "Como eunuco[eunuch.Custom('ES_OA')] do palácio, vejo muita má governança e me fica bem claro que sois uma das pessoas mais valiosas [emperor.Custom('ES_DelDela')] [emperor.GetTitleAsName|l].

Com vosso apoio, eu poderia defender com mais força as vantagens do vosso conselho: pelo bem de [emperor.GetPrimaryTitle.GetTierAsNameNoTooltip]."
 ep3_story_cycle_admin_eunuch.2043.a: "$admin_eunuch_header$ Iniciativa Abundante"
 ep3_story_cycle_admin_eunuch.2043.a.tt: "Meu eunuco[eunuch.Custom('ES_OA')], [eunuch.Custom('ES_ElLa')] [eunuch.GetTitledFirstName|l], aproxima-se de mim com um sorriso de satisfação nos lábios, gorjeando: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], tenho uma proposta das mais deliciosas para vós!"\n\n"
 ep3_story_cycle_admin_eunuch.2043.b: "\"O [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] sempre poderia usar mais moedas, e eu fiz as contas. Com um pequeno ajuste em nossa estratégia de cunhagem, poderíamos economizar uma grande quantia de moedas!\""
 ep3_story_cycle_admin_eunuch.2043.b.toast: "\"O [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] sempre poderia usar mais fundos e, nesse sentido, eu criei uma proposta para um aumento de impostos #EMP modesto#!.\""
 ep3_story_cycle_admin_eunuch.2044.t: ""Tendo ouvido muitas vozes por [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip|l], consigo ver uma grande oportunidade de ajudar a candidatura de vosstr[boon_target.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('boon_target'))] [boon_target.GetFirstName] para [boon_title.GetTierAsNameNoTooltip] de [boon_title.GetName]!"."
 ep3_story_cycle_admin_eunuch.2044.desc: "Meu eunuco[eunuch.Custom('ES_OA')], [eunuch.Custom('ES_ElLa')] [eunuch.GetTitledFirstName|l], limpa a garganta com estridência quando nos preparamos para discutir alguns assuntos de Estado.

"\"Eu tenho muitas fontes, assim como porta-vozes; eles só precisam de um pouco de direção. Nunca se pode ter advogados demais, isso é o que sempre digo.\"".

"Excelente, uma grande iniciativa!"
 ep3_story_cycle_admin_eunuch.2050.t: "Não é necessário, [eunuch.GetFirstNameNoTooltip]."
 ep3_story_cycle_admin_eunuch.2050.desc: "$admin_eunuch_header$ Pássaros Pequenos"
 ep3_story_cycle_admin_eunuch.2050.debase: "Meu eunuco[eunuch.Custom('ES_OA')], [eunuch.Custom('ES_ElLa')] [eunuch.GetTitledFirstName|l], organizou um encontro privado entre nós e meu/minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('secret_owner'))], [secret_owner.Custom('ES_ElLa')] [secret_owner.GetTitledFirstName|l], que, a julgar pela expressão em seu rosto, não sabe o que pensar disso.\n\n[Select_CString( eunuch.IsFemale, 'A castrada', 'O castrado' )] rindo histericamente mete medo em [secret_owner.Custom('ES_AlAla')] pobre [secret_owner.GetWomanMan], ao insinuar que conseguiu desenterrar algum segredo obscuro seu.\n\nPor fim, essa espécie de [eunuch.Custom2('InsultNoun', ROOT.Char)|l] arrogante se vira para mim com um sorriso repulsivo: "Bem, [ROOT.Char.Custom('FormOfAddressForLiege')], quer saber o que #EMP eu#! sei?""
 ep3_story_cycle_admin_eunuch.2050.raise_taxes: "Conte-me tudo, [eunuch.GetFirstNameNoTooltip]!"
 ep3_story_cycle_admin_eunuch.2050.candidacy: "Você descobre um dos [secrets|lE] [secret_owner.Custom('ES_DelDela')] [secret_owner.GetTitledFirstName|l]"
 ep3_story_cycle_admin_eunuch.2050.fabricate_hook: "Acho que prefiro não saber..."
 ep3_story_cycle_admin_eunuch.2050.imprison_rebel: "$admin_eunuch_header$ Algo em Andamento"
 ep3_story_cycle_admin_eunuch.2050.influence: "Meu eunuco[eunuch.Custom('ES_OA')], [eunuch.Custom('ES_ElLa')] [eunuch.GetTitledFirstName|l], organizou um encontro privado entre nós e meu/minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('scheme_owner'))], [scheme_owner.GetFirstName], que, a julgar pela expressão em seu rosto, está profundamente preocupad[scheme_owner.Custom('ES_OA')] com as palavras de [eunuch.GetFirstNameNoTooltip].\n\n[Select_CString( eunuch.IsFemale, 'A castrada', 'O castrado' )] gargalhante mete medo em [scheme_owner.Custom('ES_AlAla')] pobre [scheme_owner.GetWomanMan], ao insinuar que conseguiu desenterrar algum plano obscuro de meu/minha [ROOT.Char.Custom2('RelationToMePossessive', SCOPE.sC('scheme_owner'))].\n\nPor fim, essa espécie de [eunuch.Custom2('InsultNoun', ROOT.Char)|l] arrogante se vira para mim com um sorriso: "Bem, [ROOT.Char.Custom('FormOfAddressForLiege')], quer saber o que seu/sua [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('scheme_owner'))] tem andado tramando?""
 ep3_story_cycle_admin_eunuch.2050.outro: "Conte-me tudo, [eunuch.GetFirstNameNoTooltip]!"
 ep3_story_cycle_admin_eunuch.2050.a: "Você expõe um dos [hostile_schemes|lE] [scheme_owner.Custom('ES_DelDela')] [scheme_owner.GetTitledFirstName|l]"
 ep3_story_cycle_admin_eunuch.2050.b: "Acho que prefiro não saber..."
 ep3_story_cycle_admin_eunuch.2051.t: "$admin_eunuch_header$ Mais Responsabilidades"
 ep3_story_cycle_admin_eunuch.2051.desc: "Meu eunuco[eunuch.Custom('ES_OA')] [eunuch.Custom('ES_ElLa')] [eunuch.GetTitledFirstName|l], aproxima-se de mim tossindo um pouco enquanto aguardo uma audiência, antes de me abordar: "Ah, meu [eunuch.Custom2('RelationToMeShort', ROOT.Char)], queria lhe perguntar uma coisa".

"Embora eu aprecie muito meu lugar em sua corte, acho que poderia ser de mais ajuda. Na verdade, pensei em um cargo..."."
 ep3_story_cycle_admin_eunuch.2051.a: "Sim, sim, é seu [eunuch.GetFirstNameNoTooltip]."
 ep3_story_cycle_admin_eunuch.2051.a.tt: "Não, tenho outras ideias..."
 ep3_story_cycle_admin_eunuch.2051.b: "$admin_eunuch_header$ Promoção Familiar"
 ep3_story_cycle_admin_eunuch.2052.t: "Meu eunuco[eunuch.Custom('ES_OA')], [eunuch.Custom('ES_ElLa')] [eunuch.GetTitledFirstName|l], aproxima-se de mim, acompanhad[eunuch.Custom('ES_OA')] por [Select_CString( positioner.IsFemale, 'uma mulher', 'um homem' )] de aparência comum. "Então estais aqui, meu [ROOT.Char.GetTitleAsNameNoTooltip|l]!", sorri. "Trago-vos [positioner.Custom('ES_ElLa')] meu/minha habilidos[positioner.Custom('ES_OA')] [eunuch.Custom2('RelationToMeShort', SCOPE.sC('positioner'))], [positioner.GetTitledFirstName|l]!"

Com uma precisão ensaiada, [positioner.GetFirstNameNoTooltip] faz grande exibição de si mesm[positioner.Custom('ES_OA')] em meu benefício.

"Meu senhor[ROOT.Char.Custom('ES_XA')], [positioner.GetFirstNameNoTooltip] seria uma candidatura #EMP excelente#! para um cargo em vossa corte; certamente, em qualquer outro lugar estão desperdiçando suas capacidades...""
 ep3_story_cycle_admin_eunuch.2052.desc: "[positioner.GetFirstNameNoTooltip] é uma boa sugestão!"
 ep3_story_cycle_admin_eunuch.2052.a: "Não estou convencido..."
 ep3_story_cycle_admin_eunuch.2052.a.tt: "$admin_eunuch_header$ Ascensão Social"
 ep3_story_cycle_admin_eunuch.2052.b: "Meu eunuco[eunuch.Custom('ES_OA')], [eunuch.Custom('ES_ElLa')] [eunuch.GetTitledFirstName|l], apresenta-se diante de mim com um[eunuch_marry.Custom('ES_XA')] membro de sua família atrás. "Meu [ROOT.Char.GetTitleAsNameNoTooltip|l]!", [eunuch.GetSheHe] ri. "Tenho uma proposta encantadora para você!"\n\n"Meu/minha [eunuch.Custom2('RelationToMeShort', SCOPE.sC('eunuch_marry'))], [eunuch_marry.Custom('ES_ElLa')] [eunuch_marry.GetTitledFirstName|l], aqui presente, seria [Select_CString( eunuch_marry.IsFemale, 'uma esposa', 'um marido' )] #EMP ideal#! para seu/sua [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('emperor_marry'))], [emperor_marry.Custom('ES_ElLa')] [emperor_marry.GetTitledFirstName|l], tenho certeza de que concordará!"\n\nCom uma precisão quase ensaiada demais, [eunuch_marry.GetFirstNameNoTooltip] se apresenta orgulhos[eunuch_marry.Custom('ES_OA')] diante de mim."
 ep3_story_cycle_admin_eunuch.2060.t: "[eunuch_marry.GetFirstNameNoTooltip] é uma boa combinação para [emperor_marry.GetFirstNameNoTooltip]!"
 ep3_story_cycle_admin_eunuch.2060.desc: "Acho que não...".

"Ultimamente se tem falado muito sobre a atenção especial que meu eunuco[eunuch.Custom('ES_OA')], [eunuch.Custom('ES_ElLa')] [eunuch.GetTitledFirstName|l], parece dedicar ao seu/sua [eunuch.Custom2('RelationToMeShort', SCOPE.sC('protege'))], [protege.GetFirstName].\n\n[Select_CString( eunuch.IsFemale, 'A castrada', 'O castrado' )] trata [protege.GetHerHim] quase como [protege.Custom('ES_AlAla')] [protege.Custom('GetDaughterSon')] que nunca pôde ter..."
 ep3_story_cycle_admin_eunuch.2060.a: "Curioso."
 ep3_story_cycle_admin_eunuch.2060.b: "$admin_eunuch_header$ [student.Custom('ES_ElLa')] estudante"
 ep3_story_cycle_admin_eunuch.2061.t: "Parece que meu eunuc[eunuch.Custom('ES_OA')] e, [eunuch.Custom('ES_ElLa')] [eunuch.GetTitledFirstName|l], adotou [Select_CString( student.IsFemale, 'outra castrada', 'outro castrado' )] sob sua tutela e [student.GetHerHim] orienta nas tradições do aparelho burocrático [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip].

[student.GetFirstName] é vist[student.Custom('ES_OA')] com frequência com [eunuch.GetSheHe]; só podemos assumir que a dupla anda estudando minuciosamente números e discutindo a economia de [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip]..."
 ep3_story_cycle_admin_eunuch.2061.desc: "Outr[student.Custom('ES_OA')] eunuc[student.Custom('ES_OA')] útil, suponho."

Com uma precisão ensaiada, [positioner.GetFirstNameNoTooltip] faz grande exibição de si mesm[positioner.Custom('ES_OA')] em meu benefício.

"$admin_eunuch_header$ Acusações"
 ep3_story_cycle_admin_eunuch.2061.a: "A caminho da cama, cruzo com [eunuch.GetFirstName], que parece doente e diz ofegante: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], estou tão feliz por ter encontrado você! Oh, é uma notícia das mais angustiantes!".\n\nAproxima-se de mim e sussurra ao meu ouvido: "É o seu[spouse.Custom('ES_OA')] [spouse.Custom('WifeHusband')], meu [eunuch.Custom2('RelationToMeShort', ROOT.Char)]! Parece que tem estado… aprontando! Fora do casamento! Deitando-se com alguém da corte!".\n\n[eunuch.GetHerHim|U] encaro fixamente, procurando palavras."
 ep3_story_cycle_admin_eunuch.2061.b: "Explique-se, neste instante!"
 ep3_story_cycle_admin_eunuch.2070.t: "Você encontra a verdade"
 ep3_story_cycle_admin_eunuch.2070.desc: "Pode ser descoberto um [secret|lE] ou uma [scheme|lE]"
 ep3_story_cycle_admin_eunuch.2070.a: "Você encontra apenas dúvidas"
 ep3_story_cycle_admin_eunuch.2070.b: "Você não encontrou nada"
 ep3_story_cycle_admin_eunuch.3000.t: "Oh sim, estou ciente."
 ep3_story_cycle_admin_eunuch.3000.desc: "Esta opção está disponível porque você já conhecia o [secret|lE]"
 ep3_story_cycle_admin_eunuch.3000.a: "Essa miserável [spouse.Custom2('InsultNounSexual', ROOT.Char)]! Façam[spouse.GetHerHim] prender imediatamente!"
 ep3_story_cycle_admin_eunuch.3001.t: "Não há evidências de um caso."
 ep3_story_cycle_admin_eunuch.3001.desc: "Parece que meu eunuc[eunuch.Custom('ES_OA')] e, [eunuch.Custom('ES_ElLa')] [eunuch.GetTitledFirstName|l], adotou [Select_CString( student.IsFemale, 'outra castrada', 'outro castrado' )] sob sua tutela e [student.GetHerHim] orienta nas tradições do aparelho burocrático [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip].

[student.GetFirstName] é vist[student.Custom('ES_OA')] com frequência com [eunuch.GetSheHe]; só podemos assumir que a dupla anda estudando minuciosamente números e discutindo a economia de [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip]..."
 ep3_story_cycle_admin_eunuch.3001.a: "Prenda os três, de uma vez!"
 ep3_story_cycle_admin_eunuch.3010.t: "Talvez não seja #EMP tão#! ruim?"
 ep3_story_cycle_admin_eunuch.3010.desc: "$admin_eunuch_header$ Fazendo Inimigos"
 ep3_story_cycle_admin_eunuch.3010.a: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('whinger'))], [whinger.Custom('ES_ElLa')] [whinger.GetTitledFirstName|l], entra em meu gabinete cheio de alarde, vasculhando o aposento. Por fim se aproxima e suspira, "Ótimo, essa #EMP vil#! criatura não está aqui!".\n\nPenso por um momento em quem ele poderia estar se referindo, mas não há muita necessidade. "[whinger.Custom2('RelationToMeShort', ROOT.Char)|U]! Vocês #EMP Debéis#! devem fazer algo com [Select_CString( eunuch.IsFemale, 'esa eunuca', 'ese eunuco' )]! Ele tem um dedo em cada torta e um ouvido em cada latrina. Eu lhes digo, [eunuch.GetFirstName] está tramando algo ruim!"
 ep3_story_cycle_admin_eunuch.4000.t: "Ora, não seja ridícul[whinger.Custom('ES_OA')]! [eunuch.GetFirstNameNoTooltip] é [Select_CString( eunuch.IsFemale, 'uma servidora', 'um servidor' )] leal."
 ep3_story_cycle_admin_eunuch.4000.desc: "Talvez você esteja certo..."
 ep3_story_cycle_admin_eunuch.4000.a: "$admin_eunuch_header$ Revidar"
 ep3_story_cycle_admin_eunuch.4000.success: ""Não vedeis como esta aranha tece suas redes contra vós, [rival.Custom2('RelationToMeShort', ROOT.Char)]?", [rival.GetFirstName] interrompe um[eunuch.Custom('ES_XA')] [eunuch.GetFirstName] que está visivelmente perplexo e me olha.\n\nAs desavenças entre meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('rival'))] e [eunuch.GetFirstNameNoTooltip] têm piorado ultimamente e correm o risco de se tornar uma grande distração na corte.\n\n[eunuch.GetFirstNameNoTooltip] se recompõe antes de retrucar: "É uma acusação ultrajante, [ROOT.Char.Custom('FormOfAddressForLiege')]! Só me preocupam os interesses de [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip]!"."
 ep3_story_cycle_admin_eunuch.4000.success.tt: "[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('rival'))|U], confio em [eunuch.GetFirstNameNoTooltip], e você deve confiar também."
 ep3_story_cycle_admin_eunuch.4000.failure: "Sim, [Select_CString( eunuch.IsFemale, 'la eunuca', 'el eunuco' )] se excede."
 ep3_story_cycle_admin_eunuch.4010.failure.tt: "$admin_eunuch_header$ Menos Resistência"
 ep3_story_cycle_admin_eunuch.4000.b: "Dizem-me que meu/minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('puppet'))], [puppet.Custom('ES_ElLa')] [puppet.GetTitledFirstName|l], passa cada vez mais dias na companhia de [eunuch.Custom('ES_ElLa')] [eunuch.GetFirstName], e que [Select_CString(And(puppet.IsFemale, eunuch.IsFemale), 'as duas', 'os dois')] são vistos constantemente [Select_CString(And(puppet.IsFemale, eunuch.IsFemale), 'juntas', 'juntos')] conversando em particular e com atenção.\n\nInclusive me disseram que [puppet.GetFirstNameNoTooltip] está recebendo algum tipo de tutoria, como se [eunuch.GetFirstNameNoTooltip] [puppet.GetHerHim] estivesse preparando para um cargo na secretaria dos eunucos!"
 ep3_story_cycle_admin_eunuch.4000.b.reason: "Uma dupla improvável."
 ep3_story_cycle_admin_eunuch.4000.c: "$admin_eunuch_header$ Um Golpe Muito [emperor.GetPrimaryTitle.GetAdjectiveNoTooltip]"
 ep3_story_cycle_admin_eunuch.4000.innocent: "Enquanto caminho pela sala do trono, avisto [eunuch.GetFirstName] se aproximando com propósito, seguido por um grupo de eunuco. \"[ROOT.Char.GetTitleAsNameNoTooltip|l]!\" ele clama. \"Eu preciso falar com você!\""
 ep3_story_cycle_admin_eunuch.4010.t: "\n\nO eunuco suspira profundamente: "Lamento que tenha chegado a este ponto, vossa majestade. É #EMP muito#! lamentável. Fui instruído a informar-vos de que vosso governo já não é sustentável."\n\n"
 ep3_story_cycle_admin_eunuch.4010.desc: ""Foi decidido que vocês entregarão o cargo a voss[coupist.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', coupist)], [coupist.Custom('ES_ElLa')] [coupist.GetTitledFirstName|l], pelo bem do império!"."
 ep3_story_cycle_admin_eunuch.4010.a: ""Foi decidido que você passará o manto a[coupist.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', coupist)], [coupist.Custom('ES_ElLa')] [coupist.GetTitledFirstName|l], pelo bem do império!"."
 ep3_story_cycle_admin_eunuch.4010.c: ""Foi decidido: vocês passarão o cargo para meu [ROOT.Char.Custom2('RelationToMeShort', coupist)], [coupist.Custom('ES_ElLa')] [coupist.GetTitledFirstName|l], pelo bem de [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]!"."
 ep3_story_cycle_admin_eunuch.4010.d: ""Foi decidido que vós passareis o cargo ao vosso[coupist.Custom('ES_OA')] regente, [coupist.Custom('ES_ElLa')] [coupist.GetTitledFirstName|l], pelo bem do império!"."
 ep3_story_cycle_admin_eunuch.5000.t: ""Foi decidido: vós passareis o cargo [coupist.Custom('ES_AlAla')] [coupist.GetTitledFirstName|l], pelo bem do império!"."
 ep3_story_cycle_admin_eunuch.5000.desc: "Isto é #EMP TRAIÇÃO#!. Guardas! Prendam-nos!"
 ep3_story_cycle_admin_eunuch.5000.a: "O golpe foi frustrado"
 ep3_story_cycle_admin_eunuch.5000.b: "O golpe é bem-sucedido"
 ep3_story_cycle_admin_eunuch.5010.t: "Saia agora, e talvez eu deixe você manter sua cabeça."
 ep3_story_cycle_admin_eunuch.5010.desc: "Muito bem... Eu farei o que você pede."
 ep3_story_cycle_admin_eunuch.5010.a: "$admin_eunuch_header$ Agarrando-se ao Poder"
 ep3_story_cycle_admin_eunuch.5010.b: "[Select_CString( eunuch.IsFemale, 'La eunuca', 'El eunuco' )], [eunuch.Custom('ES_ElLa')] [eunuch.GetTitledFirstName|l], foi uma figura imponente na administração [previous_story_owner.Custom('ES_DelDela')] [previous_story_owner.GetTitledFirstName|l], meu"
 ep3_story_cycle_admin_eunuch.5020.t: "[eunuch.Custom('ES_ElLa')|U] [Glossary( 'eunoukhos', 'EUNOUKOS_GLOSS' )], [eunuch.Custom('ES_ElLa')] [eunuch.GetTitledFirstName|l], foi uma figura imponente na administração [previous_story_owner.Custom('ES_DelDela')] [previous_story_owner.GetTitledFirstName], minha"
 ep3_story_cycle_admin_eunuch.5020.desc: "[ROOT.Char.Custom2('RelationToMeShort', previous_story_owner)],"
 ep3_story_cycle_admin_eunuch.5020.a: "inimigo,"
 ep3_story_cycle_admin_eunuch.6000.t: "antecessor,"
 ep3_story_cycle_admin_eunuch.6000.desc: "e parece que ainda possui certa influência no palácio…\n\n[eunuch.GetSheHe|U] não perdeu tempo em buscar cair nas minhas graças e em fazer demonstrações obsequiosas pela corte. Talvez [eunuch.GetFirstNameNoTooltip] possa ser útil."
 ep3_story_cycle_admin_eunuch.6000.body: "[eunuch.GetFirstNameNoTooltip] deve ir."
 ep3_story_cycle_admin_eunuch.6000.family: "É hora de [student.GetFirstNameNoTooltip] assumir."
 ep3_story_cycle_admin_eunuch.6000.co_caesar: "[rival.GetFirstNameNoTooltip] é um par de mãos mais estáveis."
 ep3_story_cycle_admin_eunuch.6000.eunuch_family: "Não vou desestabilizar o equilíbrio de poder."
 ep3_story_cycle_admin_eunuch.6000.regent: "$admin_eunuch_header$ Uma Vida de Serviço"
 ep3_story_cycle_admin_eunuch.6000.fallback: "Infelizmente, [Select_CString( eunuch.IsFemale, 'uma valiosa servidora', 'um valioso servidor' )] de [admin_title.GetDefinitiveName] faleceu; [eunuch.GetFirstName], [Select_CString( eunuch.IsFemale, 'uma das eunucas', 'um dos eunucos' )] mais influentes desta época recente, [eunuch.GetDeathReasonHideKiller]…\n\nQue [ROOT.Char.GetFaith.HighGodName] não demore em prover [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] com [Select_CString( eunuch.IsFemale, 'outra servidora', 'outro servidor' )] de sua estatura e habilidade."
 ep3_story_cycle_admin_eunuch.6000.a: "As coisas certamente vão mudar..."
 ep3_story_cycle_admin_eunuch.6000.a.success: "$admin_eunuch_header$ Fechadura e Chave"
 ep3_story_cycle_admin_eunuch.6000.a.failure: "No passado [Select_CString( eunuch.IsFemale, 'uma valiosa servidora', 'um valioso servidor' )] de [admin_title.GetDefinitiveName], [eunuch.Custom('ES_ElLa')] influente [Select_CString( eunuch.IsFemale, 'eunuca cortesã', 'eunuco cortesão' )], [eunuch.GetFirstName], agora sofre a mordida dos grilhões de [background_dungeon_scope.GetPrimaryTitle.GetNameNoTooltip].\n\nSeria possível, talvez, devolver [eunuch.GetHerHim] ao meu serviço, se considerasse que tal esforço valesse a pena..."
 ep3_story_cycle_admin_eunuch.6000.c: "Uma perda para [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetDefinitiveNameNoTooltip]."
 ep3_story_cycle_admin_eunuch.6000.d: "[eunuch.GetFirstNameNoTooltip] é útil demais para ficar trancad[eunuch.Custom('ES_OA')]…[eunuch.Custom('ES_OA')]…"
 ep3_story_cycle_admin_eunuch.8000.t: "$admin_eunuch_header$ Indisposto"
 ep3_story_cycle_admin_eunuch.8000.intro: "No passado [Select_CString( eunuch.IsFemale, 'uma valiosa servidora', 'um valioso servidor' )] de [admin_title.GetDefinitiveName], [eunuch.Custom('ES_ElLa')] influente [Select_CString( eunuch.IsFemale, 'eunuca cortesã', 'eunuco cortesão' )], [eunuch.GetFirstName], agora serve a [eunuch.GetLiege.GetName].\n\nPoder-se-ia [eunuch.Custom('ES_LeLa')] talvez convencê-lo a voltar ao meu serviço, se tal esforço valesse a pena…"
 ep3_story_cycle_admin_eunuch.8000.intro_byz: "[Select_CString( eunuch.IsFemale, 'Esa eunuca', 'Ese eunuco' )] #EMP me#! pertence."
 ep3_story_cycle_admin_eunuch.8000.intro_family: "[eunuch.GetFirstNameNoTooltip] ensinou a [student.GetFirstNameNoTooltip] e est[student.Custom('ES_EA')] pode continuar seu trabalho."
 ep3_story_cycle_admin_eunuch.8000.intro_enemy: "Seu antigo[rival.Custom('ES_OA')] rival, [rival.GetFirstNameNoTooltip], pode continuar de onde parou."
 ep3_story_cycle_admin_eunuch.8000.intro_fallback: "Infelizmente, este escapou..."
 ep3_story_cycle_admin_eunuch.8000.desc: "$admin_eunuch_header$ Coisas Maiores"
 ep3_story_cycle_admin_eunuch.8000.a: "No passado [Select_CString( eunuch.IsFemale, 'uma valiosa servidora', 'um valioso servidor' )] da corte de [admin_title.GetAdjective], [eunuch.Custom('ES_ElLa')] influente [Select_CString( eunuch.IsFemale, 'eunuca cortesã', 'eunuco cortesão' )], [eunuch.GetFirstName] passou a ocupar tarefas mais importantes.\n\n"
 ep3_story_cycle_admin_eunuch.8000.b: "Parece que minha perda é o ganho do [eunuch.GetPrimaryTitle.GetName]..."
 ep3_story_cycle_admin_eunuch.8000.c: "Parece que minha perda é o ganho da propriedade [eunuch.GetHouse.GetBaseName]..."
 ep3_story_cycle_admin_eunuch.8000.d: "Parece que [eunuch.GetFirstNameNoTooltip] busca uma vida mais aventureira…"
 ep3_story_cycle_admin_eunuch.8010.t: "Uma pena."
