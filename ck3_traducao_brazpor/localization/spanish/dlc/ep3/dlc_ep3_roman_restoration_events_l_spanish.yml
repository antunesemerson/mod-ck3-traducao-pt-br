l_spanish:
 ep3_roman_restoration.0001.t: "O Sonho de Justiniano"
 ep3_roman_restoration.0001.desc: "O ar quente do Mediterrâneo carrega consigo os murmúrios de um império à beira da eternidade.

Aqui, dentro destas muralhas repletas de história de [ROOT.Char.GetCapitalLocation.GetBaronyNameExplicitly], a ambição de uma era passada clama. O sonho imperecível de Justiniano, sua busca incessante para reunir os fragmentos dispersos de Roma, me chama.

É meu fardo, ou meu privilégio, fazer renascer esses sonhos? Costurar domínios fragmentados sob uma única bandeira, como ele certa vez tentou fazer?"
 ep3_roman_restoration.0001.a: "Não haverá meias medidas."
 ep3_roman_restoration.0001.a.tt: "Que haja moderação em todas as coisas."
 ep3_roman_restoration.0100.t: "Podemos nos adaptar sem perder nosso caminho."
 ep3_roman_restoration.0100.desc: "É um dia auspicioso, pois hoje o Império dos Romanos realiza seu antigo potencial.

De todos os cantos do império, podem-se ouvir gritos de júbilo e orgulho: #EMP Ecce romani! Ave, César!#!

Mas agora devo conduzir as velas deste vasto empreendimento. O que faremos desta Roma? Entre meus muitos predecessores e as miríades de encarnações do poder romano, a escolha se estreita.

Seguiremos em frente, fiéis à nossa cultura recente? Ou abraçaremos plenamente as tradições de nossos antepassados?"
 ep3_roman_restoration.0100.a: "Uma declaração foi emitida da sede imperial de [scoped_emperor.GetCapitalLocation.GetBaronyNameExplicitly] pela mão de [scoped_emperor.GetName]. Terras distantes que pertenciam aos antigos romanos estão unificadas novamente pelos [scoped_emperor.GetCulture.GetCollectiveNoun], com ambições tão grandiosas quanto as dos antigos Césares.

"
 ep3_roman_restoration.0100.b: "Nenhuma meia medida foi tomada. Com o renascimento do [scoped_emperor.GetFaith.GetName], os antigos deuses são adorados mais uma vez em grandes templos, ecoando com cânticos a [scoped_emperor.GetFaith.HighGodName] e [scoped_emperor.GetFaith.KnowledgeGodName]. Este ressurgimento de ritos pagãos contrasta fortemente com a dominação cristã na Europa, apresentando um desafio ousado às ordens religiosas estabelecidas.

"
 ep3_roman_restoration.0100.c: "Sustentada pelo profundo apoio da Igreja [scoped_emperor.GetFaith.GetAdjective], a coroação foi uma afirmação solene do direito divino, abençoada por [Select_CString( scoped_emperor.GetFaith.GetReligiousHead.IsFemale, 'a própria', 'o próprio' )] [scoped_emperor.GetFaith.GetReligiousHead.GetTitledFirstName|l]. As raízes espirituais do império são profundas e entrelaçam estreitamente a fé com a ambição imperial.

"
 ep3_roman_restoration.hard_mode: "@warning_icon! #XB;EMP Você enfrentará os seguintes desafios:#! #indent_newline:4 #X 
$EFFECT_LIST_BULLET$Todas as [peasant_factions|lE] em seu [realm|lE] terão você como alvo
$EFFECT_LIST_BULLET$Mais [wars|lE] vindas de outros [titles|lE] de reino
$EFFECT_LIST_BULLET$Invasão mongol acelerada#!#!"
 ep3_roman_restoration.end_hard_mode: ""Meu Imperador, as notícias que trago são de grave preocupação. Venho pedir seu perdão por meu erro de julgamento. Algumas das políticas que implementei trouxeram inquietação e tumulto à minha [inefficient_governor.GetPrimaryTitle.GetName]", diz [inefficient_governor.Custom('ES_ElLa')] [inefficient_governor.GetTitledFirstName|l].

"Os mercados estão desertos, o povo comum sussurra sobre rebelião e a nobreza local está indignada. A estabilidade do meu tema está por um fio, enquanto a opinião popular em todo o meu domínio despenca."

"A confiança do povo em seu governo, por causa das ações de um[inefficient_governor.Custom('ES_XA')] [inefficient_governor.GetTitleAsNameNoTooltip|l] mal orientad[inefficient_governor.Custom('ES_OA')], enfrenta sua prova mais severa...""
 ep3_roman_restoration.invasion_cb: "Vou resolver isso pessoalmente."
 ep3_roman_restoration.household_gods_tenet: "Você recupera um pouco de Opinião Popular"
 ep3_roman_restoration.easy_mode: "Condados perdem Opinião Popular"
 uses_custom_caesar_flavourization_tt: "Está demitid[inefficient_governor.Custom('ES_OA')]"
 may_choose_to_convert_hellenic_desc: "Um leão não se importa com as opiniões das ovelhas."
 ep3_roman_restoration.0101.intro: "Uma declaração foi emitida da sede imperial de [scoped_emperor.GetCapitalLocation.GetBaronyNameExplicitly] pela mão de [scoped_emperor.GetName]. Terras distantes que pertenciam aos antigos romanos estão unificadas novamente pelos [scoped_emperor.GetCulture.GetCollectiveNoun], com ambições tão grandiosas quanto as dos antigos Césares.

"
 ep3_roman_restoration.0101.hellenic: "Nenhuma meia medida foi tomada. Com o renascimento do [scoped_emperor.GetFaith.GetName], os antigos deuses são adorados mais uma vez em grandes templos, ecoando com cânticos a [scoped_emperor.GetFaith.HighGodName] e [scoped_emperor.GetFaith.KnowledgeGodName]. Este ressurgimento de ritos pagãos contrasta fortemente com a dominação cristã na Europa, apresentando um desafio ousado às ordens religiosas estabelecidas.

"
 ep3_roman_restoration.0101.orthodox: "Sustentada pelo profundo apoio da Igreja [scoped_emperor.GetFaith.GetAdjective], a coroação foi uma afirmação solene do direito divino, abençoada por [Select_CString( scoped_emperor.GetFaith.GetReligiousHead.IsFemale, 'a própria', 'o próprio' )] [scoped_emperor.GetFaith.GetReligiousHead.GetTitledFirstName|l]. As raízes espirituais do império são profundas e entrelaçam estreitamente a fé com a ambição imperial.

"
 ep3_roman_restoration.0101.fallback: "Seja adotando um credo pouco convencional ou seguindo suas crenças ancestrais, [scoped_emperor.Custom('ES_ElLa')] [scoped_emperor.GetTitleAsNameNoTooltip|l] marcou sua ascensão com observâncias únicas que refletem suas inclinações religiosas distintas, estabelecendo as bases para uma identidade cultural diversa dentro do império.

"
 ep3_roman_restoration.0101.outro: "Um poder formidável agora projeta sua sombra sobre a Terra, prometendo um futuro em que a força e a determinação de seus vizinhos serão testadas como nunca antes."
 ep3_roman_restoration.0101.a: "Que [ROOT.Char.GetFaith.HighGodName] nos ajude..."
 ep3_roman_restoration.0300.t: "Governo Mal Orientado"
