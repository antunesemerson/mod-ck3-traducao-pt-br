 ep3_roman_restoration.0300.efficiency: "Isso aconteceu por causa da baixa [governor_efficiency|lE] de [inefficient_governor.GetName] #WEAK ([inefficient_governor.MakeScope.ScriptValue('governor_efficiency_presented')|0])#!"
 ep3_roman_restoration.0300.every_sub_realm_county: "Cada [county|lE] mantido por [inefficient_governor.GetName]"
 ep3_story_cycle_restoring_rome_faction_discontent: "Restaurando Roma: $VALUE|=+0$"
 ep3_restoring_rome_citizen_army_name: "Exército Cidadão"
 ep3_roman_restoration.0500.t: "Incursões Fronteiriças"
 ep3_roman_restoration.0500.desc: ""[ROOT.Char.GetTitleAsNameNoTooltip], compareço diante de você neste dia com presteza", começa meu [marshal.GetCouncilTitle] [marshal.GetFirstName]. "Pois os batedores relataram que forças sob a bandeira de [target_kingdom.GetName] cruzaram nossas fronteiras sob o manto da noite.

"Eles tomaram [target_county.GetName] como seu principal alvo, pilhando nossas terras e ameaçando a segurança do nosso povo. Está claro que [target_kingdom.GetTitleAsNameNoTooltip] acredita que um poder tão vasto e imenso como o nosso não perceberia essa transgressão."
 ep3_roman_restoration.0500.a: "Que ponha à prova minha determinação e veja o que encontra."
