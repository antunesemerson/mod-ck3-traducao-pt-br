 ep3_emperor_yearly.2401.t: "$ep3_powerful_families.8020.t$"
 ep3_emperor_yearly.2401.desc: "Muitas são as famílias de nobre linhagem e dignidade entre os cidadãos de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetDefinitiveName|l]. Porém, muito poucas se sentam à mesa [ROOT.Char.GetTopLiege.Custom('ES_DelDela')] [ROOT.Char.GetTopLiege.GetTitleAsNameNoTooltip|l] e compartilham as responsabilidades e as honras de conduzir o navio do Estado.\n\nPoucas têm #EMP poder#! poder real, mas hoje a Casa [ROOT.Char.GetHouse.GetBaseName] está entre elas!"
 ep3_emperor_yearly.2401.a: "A hora da [ROOT.Char.GetHouse.GetBaseNameNoTooltip] chegou!"
 #New Nobility
 ep3_emperor_yearly.2410.t: "Nova Nobreza"
 ep3_emperor_yearly.2410.desc: "Temos um novo nome entre os potentados de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetDefinitiveName|l]: a família [new_title.GetHolder.GetHouse.GetBaseName] conquistou o direito de ser considerada parte da nobreza; seja por corrupção, intriga ou verdadeiro valor, não saberia dizer.\n\nNão importa. Tenho a certeza de que não serão mais do que um grão de areia, pronto para ser varrido pelos ventos turbulentos da história — e pelo avanço inexorável da Casa [ROOT.Char.GetHouse.GetBaseName]!"
 ep3_emperor_yearly.2410.a: "Tsk. #EMP Provincianos.#!"
 2410_noble_family_tt: "Nova Família Nobre"
 2410_noble_family_tt_desc: "[new_title.GetHolder.GetShortUIName|U] estabeleceu a [noble_family|lE] [new_title.GetHolder.GetTopLiege.GetPrimaryTitle.GetAdjective] de [new_title.GetHolder.GetHouse.GetBaseName|V]."
