 #Heresy Brewing
 ep3_emperor_yearly.2330.t: "Heresia à Vista"
 ep3_emperor_yearly.2330.desc: "É inegável. A fé oficial de [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip] está enfrentando uma crise.\n\n"
 ep3_emperor_yearly.2330.desc_hof: "[hof.GetTitledFirstName|U] se juntou a mim hoje para discutir uma questão muito séria: a crise da fé oficial do [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip].\n\n\"Você não pode negar, [ROOT.Char.GetFirstNameNoTooltip]! Você deve ver isso também!\""
 ep3_emperor_yearly.2330.desc_end: "Os sinais estão por toda parte: pessoas vivendo em pecado, o [ROOT.Char.GetFaith.ReligiousText] esquecido e desconsiderado, e heresias brotando em cada canto escuro!"
 ep3_emperor_yearly.2330.desc_end_hof: "Os poderes leigos e religiosos devem se unir para salvar o bom povo de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]."
 ep3_emperor_yearly.2330.a: "Precisamos fazer algo!"
