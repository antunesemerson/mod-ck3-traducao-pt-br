l_spanish:
 governor_tax_scheme: "Coletar Impostos"
 governor_tax_scheme_desc_general: "Em um [scheme|lE] de Coleta de Impostos, você tenta reunir informações sobre impostos não pagos e fazer a vila suspeita pagar."
 governor_tax_scheme_desc: "Os impostos são cuidadosamente coletados e anotados para cada distrito e vila, tornando possível ver quando os impostos foram, de fato, pagos conforme o exigido. E, mais importante, quando os pagamentos estão #EMP ausentes#!."
 governor_tax_scheme_action: "Coletar Impostos em"
 governor_tax_scheme_invalidated_title: "O Esquema $governor_tax_scheme$ foi Invalidado"
 msg_governance_contract_appear.t: "Novo Problema de Governança"
 msg_governance_contract_appear.desc: "Um [governance_issue|lE] [new_governance_issue.GetType.GetName|V] apareceu em [target_province.GetName], dentro do [target_province.GetCounty.GetTitle.GetName]"
 task_contract_governance_desc_title: "Meu julgamento como [GetPlayer.Custom('GetGovernorConceptNoTooltip')|l] é necessário!"
 overdue_taxes_contract: "Impostos Vencidos"
 overdue_taxes_desc: "Seja por conspiração, privação ou pura negligência, uma vila nesta região falhou em enviar a parte de sua produção devida como impostos."
 overdue_taxes_desc_title: "$task_contract_governance_desc_title$"
 hoarding_mayor_contract: "Prefeito Acumulador"
 hoarding_mayor_desc: "O prefeito desta baronia está acumulando e guardando muito mais ouro do que se esperaria. O prefeito pode não estar enviando impostos suficientes para cima, ou talvez não esteja investindo o suficiente na cidade."
 hoarding_mayor_desc_title: "$task_contract_governance_desc_title$"
 bountiful_harvest_contract: "Colheita Abundante"
 bountiful_harvest_desc: "Relatos de abundância maravilhosa, de culturas altas e campos verdejantes, chegam de toda a [GetPlayer.Custom('GetProvinceConceptNoTooltip')]. Um benefício tão significativo deve ser bem utilizado. Não deixe as colheitas estragarem!"
 bountiful_harvest_desc_title: "$task_contract_governance_desc_title$"
 rampant_bandits_contract: "Bandidos Rampantes"
 rampant_bandits_desc: "Foras da lei e nômades indisciplinados assediam esta região de sua [GetPlayer.Custom('GetProvinceConceptNoTooltip')]. Para que os locais estejam seguros, e os comerciantes possam se mover livremente: eles precisam ser enfrentados."
 rampant_bandits_desc_title: "$task_contract_governance_desc_title$"
 governor_contract_event.1000.t: "Impostos Vencidos"
 governor_contract_event.1000.desc: "Meus escrivães insistem que uma aldeia em [tax_destination.GetName] está significativamente atrasada no pagamento de seus impostos.\n\nIgnorar essa situação seria uma grave negligência do meu dever. Os livros contábeis deixam isso bem claro. #EMP Faltan#! impostos. Os envios nunca foram feitos.\n\nNo momento, ignora-se a causa dessas omissões. Este assunto pode ser para funcionários… ou soldados."
 governor_contract_event.1000.a: "Vamos iniciar uma investigação!"
 governor_contract_event.1001.desc: "Meu séquito avança com dificuldade por uma estrada rural mal conservada, entre grupos dispersos de [ROOT.Char.GetCurrentLocation.Custom('get_region_flower_type_plural')] e um ou outro exemplar de [ROOT.Char.Custom('RegionalFarmAnimal')]... a aldeia devedora de impostos, meu destino, é bastante rústica e #EMP bastante#! sem nada de especial, apesar de estar a menos de um dia de viagem de [tax_destination.GetName].

Alguns moradores locais, vestidos com seus trajes tradicionais, reuniram-se no centro da aldeia. Fui recebido pacificamente, embora sem calor.

Preciso considerar como abordar minha investigação."
 governor_contract_event.1001.a: "Sua investigação falhou"
 governor_contract_event.1001.b: "Eu persuado os vilarejos a falar"
 governor_contract_event.1001.a_tt: "Não consigo aprender nada com os vilarejos"
 governor_contract_event.1001.success: "Inspeciono a vila e aprendo o que preciso"
 governor_contract_event.1001.failure: "Não consigo aprender o que preciso da vila"
 governor_contract_event.1001.a.success: "Impostos Vencidos: Sucesso"
 governor_contract_event.1001.a.failure: "Falar com os vilarejos provou ser inesperadamente frutífero!\n\nOs chefes de família estavam ansiosos para listar os membros de suas famílias e se alegraram em exaltar a produtividade de suas terras. Alguns até #EMP se gabaram#! de seu gado! Os agricultores me conduziram por seus campos, explicando quanto esperavam ganhar com a colheita."
 governor_contract_event.1001.b.success: "Fazer um levantamento cuidadoso de cada [ROOT.Char.Custom('RegionalFarmAnimal')], cada talo de cevada, cada cobertor artesanal e pote de barro resultou em uma boa estimativa dos impostos que esses servos #EMP deveriam#! pagar."
 governor_contract_event.1001.b.failure: "\n\nAlguma supervisão inexplicável, intencional ou não, parece ser a causa da falha desta vila em pagar suas obrigações. Mas uma tarefa permanece: decidir como melhor remediar a situação..."
 governor_contract_event.1003.t: "Reunir o que pudermos, e vender metade para desenvolver melhor a área."
 governor_contract_event.1003.desc_diplomacy: "Eles deverão pagar integralmente. E não um #EMP único#! grão a menos."
 governor_contract_event.1003.desc_stewardship: "Essas pessoas decentes precisam pagar apenas parcialmente."
 governor_contract_event.1003.desc_outro: "Estacionar uma guarnição aqui incentivará o pagamento adequado."
 governor_contract_event.1003.a: "Vamos designar um administrador para supervisionar a vila."
 governor_contract_event.1003.b: "Um alívio fiscal pode ajudar essas pessoas a prosperar?"
 governor_contract_event.1003.c: "Impostos Vencidos: Falha"
 governor_contract_event.1003.d: "Embora eu olhe em porões e armazéns, embora eu ande pelos campos, converse com os líderes da vila... não há sinal de riqueza retida em lugar algum neste vilarejo. Os vilarejos, por todas as aparências, são realmente, absolutamente pobres e incapazes de fornecer o que devem.\n\nSem evidências de que fui enganado, pouco resta para eu fazer aqui. Meus livros devem simplesmente absorver a perda."
 governor_contract_event.1003.e: "#EMP Tarnação!#!"
 governor_contract_event.1003.f: "Prefeito Acumulador"
 governor_contract_event.1004.t: "Recebi muitos relatórios de que [hoarding_mayor.Custom('ES_ElLa')] [hoarding_mayor.GetTitledFirstName|l], que supervisiona [mayor_destination.GetName], fica com a grande maioria dos impostos da cidade.\n\nEmbora se espere que um prefeito realmente possa ficar com quaisquer impostos que sobre, as quantias relatadas são #EMP excesivas#!. Elas beiram facilmente a corrupção. E, para piorar a situação, as ações de #EMP mí#!!"
 governor_contract_event.1004.desc: "Terei que resolver isso pessoalmente."
 governor_contract_event.1004.a: "Viajar até [mayor_destination.GetName] e falar com [Select_CString( hoarding_mayor.IsFemale, 'a prefeita', 'o prefeito' )]"
 governor_contract_event.1010.t: "Você começa a viajar novamente."
 governor_contract_event.1010.desc: "Perco pouco tempo ao chegar a [mayor_destination.GetName] e cavalgo rapidamente para a residência [Select_CString( hoarding_mayor.IsFemale, 'da prefeita', 'do prefeito' )]. Entro sem ser anunciado, e sou imediatamente recompensado pelo meu espetáculo.

"
 governor_contract_event.1010.a: "[hoarding_mayor.GetFirstName] me olha atônit[hoarding_mayor.Custom('ES_OA')] por um breve instante, antes de recobrar a compostura. Enquanto ouve minhas acusações, sua expressão vai se fechando cada vez mais.\n\n"Que acusações vis! Eu jamais…", [hoarding_mayor.GetFirstNameNoTooltip] faz uma pausa e respira fundo. "Muito bem. Como sugere que procedamos?"."
 governor_contract_event.1010.a_tt: "Surpreendid[hoarding_mayor.Custom('ES_OA')], [hoarding_mayor.GetFirstName] derrama a bebida sobre si; está claro que minha mera presença [hoarding_mayor.Custom('ES_LoLa')] deixou desconcertad[hoarding_mayor.Custom('ES_OA')]! Seu rosto vai empalidecendo cada vez mais enquanto exponho minhas acusações.

"Espere! Por favor! Certamente isso não passa de um mal-entendido. Podemos consertar as coisas, não podemos?""
 governor_contract_event.1012.a_tt: "[hoarding_mayor.GetFirstName] se vira, boquiabert[hoarding_mayor.Custom('ES_OA')], sem conseguir articular palavra. Ele/ela se apoia com uma mão sobre a mesa enquanto o repreendo e lanço uma acusação após outra.\n\n\"Eu... eu tenho certeza de que houve um mal-entendido, mas, é claro, ajudarei vocês a resolver a situação! Da maneira que julgarem melhor!\"."
 governor_contract_event.1011.desc_intro: "Perco pouco tempo ao chegar a [mayor_destination.GetName] e cavalgo rapidamente para a residência [Select_CString( hoarding_mayor.IsFemale, 'da prefeita', 'do prefeito' )]. Entro sem ser anunciado, e sou imediatamente recompensado pelo meu espetáculo.

"
 governor_contract_event.1011.desc_upset: "Devolva-a ao povo organizando festividades."
 governor_contract_event.1011.desc_fear: "Surpreendid[hoarding_mayor.Custom('ES_OA')], [hoarding_mayor.GetFirstName] derrama a bebida sobre si; está claro que minha mera presença [hoarding_mayor.Custom('ES_LoLa')] deixou desconcertad[hoarding_mayor.Custom('ES_OA')]! Seu rosto vai empalidecendo cada vez mais enquanto exponho minhas acusações.

"Questão de Governança: Cancelar Viagem"
 governor_contract_event.1011.desc_worried: "Não poderei fazer muito sobre a questão atual sem viajar para seu local. Espera-se que eu lide com esse tipo de problema diretamente, mas talvez eu precise olhar para o outro lado e focar minha atenção em questões mais urgentes..."
 governor_contract_event.1011.a: "Pensando bem, vamos!"
 governor_contract_event.1011.b: "Tenho assuntos mais importantes para lidar."
 governor_contract_event.1011.c: "Colheita Abundante"
 governor_contract_event.1011.d: "A bondade de [ROOT.Char.GetFaith.FertilityGodName] recaiu sobre nós! Em muitas aldeias de [ROOT.Char.GetPrimaryTitle.GetNameNoTier] colhem-se feixes intermináveis de cereais de campos bem regados pelas chuvas constantes. E que quantidade de [ROOT.Char.Custom('RegionalRootVegetablePlural')]! Aguarda-se com grande alegria uma colheita consideravelmente maior do que a anterior.

Essas são, claro, muito boas notícias. Preciso organizar uma força de trabalho extraordinária e cuidar da logística o mais rápido possível.

E agora, para onde meus vagões levarão esses grandes montes de produção de [ROOT.Char.Custom('GetSeason')]...?"
 governor_contract_event.1011.e: "Faça a distribuição igual em toda a província."
 governor_contract_event.1011.f: "Distribua ao lado do grão regular."
 governor_contract_event.1012.t: "A capital provincial deve se beneficiar."
 governor_contract_event.1012.desc: "Vamos doar para caridade e para aqueles que precisam."
 governor_contract_event.1012.a: "Preencha os celeiros e venda o excedente."
 governor_contract_event.1012.b: "Transfira #EMP tudo#! para a minha propriedade."
 governor_contract_event.1020.t: "O valor é aumentado em #P +[EmptyScope.ScriptValue('estate_granary_gold_bonus_value')|+0%]#! devido ao [GetDomicileBuilding('storage_granary_03').GetName|l] em sua [estate|lE]"
 governor_contract_event.1020.desc: "A bondade de [ROOT.Char.GetFaith.FertilityGodName] recaiu sobre nós! Em muitas aldeias de [ROOT.Char.GetPrimaryTitle.GetNameNoTier] colhem-se feixes intermináveis de cereais de campos bem regados pelas chuvas constantes. E que quantidade de [ROOT.Char.Custom('RegionalRootVegetablePlural')]! Aguarda-se com grande alegria uma colheita consideravelmente maior do que a anterior.

Essas são, claro, muito boas notícias. Preciso organizar uma força de trabalho extraordinária e cuidar da logística o mais rápido possível.

E agora, para onde meus vagões levarão esses grandes montes de produção de [ROOT.Char.Custom('GetSeason')]...?"
 governor_contract_event.1020.a: "Ataquem! Vamos pegá-los de surpresa!"
 governor_contract_event.1020.b: "Vamos traçar uma tática antes de atacarmos."
 governor_contract_event.1020.c: "Atrair eles para uma armadilha pode nos poupar muitos problemas."
 governor_contract_event.1020.d: "Você consegue e derrota os bandidos."
 governor_contract_event.1020.e: "Você falha e os bandidos escapam."
 governor_contract_event.1020.f: "Sua tática é um triunfo."
 harvest_claim_it_yourself_estate_tt: "Sua escolha de táticas deixa muito a desejar."
 governor_contract_event.1030.t: "Sua armadilha é impecável."
 governor_contract_event.1030.desc: "Sua armadilha não engana ninguém."
 governor_contract_event.1030.a: "Meu inimigo indisciplinado não pode ter qualquer esperança contra tropas bem treinadas! Seus projéteis agora já não se lançam contra a indefesa carne camponesa; em vez disso, chocam-se inofensivamente contra os escudos de nossa linha de batalha. Os criminosos se dispersam para fugir, mas os cavaleiros em nossos flancos cortam toda retirada.\n\nContemplo os mortos. Penso nos sobreviventes capturados."
 governor_contract_event.1030.b: "A minha é uma armadilha muito astuta.\n\nUm soldado jovem seminu, com uma refeição roubada na mão, corre em nossa direção; os fora da lei, esses #EMP cretinos#! lhes vêm logo atrás! Saltamos de nosso esconderijo — uivando, o inimigo aterrorizado reconhece seu erro — e caímos sobre eles! A segundos da morte, os nômades se rendem às minhas tropas.\n\nEste grupo de criminosos fica indefeso e desamparado."
 governor_contract_event.1031.desc: "Os habitantes de [bandit_destination.GetName] nos guiam com prazer até a toca de tão feroz [ROOT.Char.Custom('RegionalFerociousAnimal')]... O acampamento dos fora da lei está logo adiante, oculto pela vegetação rasteira e pelo terreno acidentado.

Pelo que ouço, creio que se trata de guerreiros nômades: gente dura que vive à margem da sociedade estabelecida, tão saciada pela riqueza da minha terra que transformou suas incursões de saque em uma estadia prolongada.

O inimigo ainda não percebeu a presença do meu grupo. Temos a oportunidade de atacar da forma que eu melhor julgar."
 governor_contract_event.1031.a: "Eles terão que pagar uma multa."
 governor_contract_event.1031.b: "Pendure-os."
 governor_contract_event.1031.c: "Confisque qualquer coisa de valor e os coloque na prisão."
 governor_contract_event.1031.success: "[ROOT.Char.Custom('CulturalCurse')|U]!\n\nO ataque dos meus soldados foi denunciado por pássaros assustados; chegamos ao inimigo o mais rápido que pudemos, mas os astutos nômades já estavam em seus cavalos e puseram-se a galope quase instantaneamente!\n\nCapturamos e abatemos alguns dos bandidos em fuga... mas eram poucos demais para dissuadir os demais de continuar saqueando e pilhando.\n\nExaustos, devemos voltar para casa."
 governor_contract_event.1031.failure: "Vamos esquecer este incidente."
 governor_contract_event.1031.b.success: "Esses bandidos provavelmente não partirão pacificamente. O povo de [bandit_destination.GetName] pode sofrer seus ataques por um bom tempo, a menos que eu intervenha.\n\nAlém disso, como oficial nomeado, a segurança deles é minha responsabilidade."
 governor_contract_event.1031.b.failure: "Eu preciso proteger essas pessoas!"
 governor_contract_event.1031.c.success: "O povo terá que se virar sozinho."
 governor_contract_event.1031.c.failure: "Viaje para [bandit_destination.GetName] e lide com os bandidos"
 governor_contract_event.1032.desc_tactical: "Soldados Descontentes"
 governor_contract_event.1032.desc_trap: "$discontent_soldiers$"
 governor_contract_event.1032.desc_charge: "O descontentamento se espalha entre suas tropas. Os guardas murmuram em seus postos. Oficiais menores pouco se importam com a disciplina."
 governor_contract_event.1032.desc_outro: "$task_contract_governance_desc_title$"
 governor_contract_event.1032.a: "$discontent_soldiers$"
 governor_contract_event.1032.b: "As notícias dos meus postos avançados, das tropas provinciais sob meu comando, estão todas de acordo: o descontentamento cresce entre os soldados. Seus períodos de serviço são longos demais, seu pagamento é baixo demais, as prostitutas locais são feias demais, os acampamentos são muito precários...

Para aqueles que vivem em um acampamento militar, os motivos para reclamar são sempre muitos, mas mesmo uma pequena intervenção poderia melhorar seus ânimos... isso certamente ajudaria muito a aumentar minha popularidade e a segurança da minha posição."
 governor_contract_event.1032.c: "Vou conceder a cada oficial sênior um lote de terra."
 governor_contract_event.1032.d: "Eles não estão tão mal quanto as tropas de [other_gov.Custom('ES_DelDela')] [other_gov.GetTitledFirstNameNoTooltip|l]!"
 governor_contract_event.1032.e: "Eles merecem um tempo de folga."
 governor_contract_event.1032.f: "Eles serão punidos por sua insubordinação!"
 governor_contract_event.1033.desc: "Mais dinheiro os deixará felizes."
 governor_contract_event.1033.a: "Tropas Estacionadas"
 governor_contract_event.1038.desc: "Os oficiais das tropas estacionadas nesta província receberam lotes de terra locais para se estabelecer."
 governor_contract_event.1038.a: "Tropas em Descanso"
 governor_contract_event.1038.b: "As tropas estacionadas nesta província receberam períodos de descanso mais longos para aumentar a moral."
 governor_contract_event.1038.a_tt: "Tropas Incentivadas"
 discontent_soldiers: "Este personagem é conhecido por pagar suas tropas mais do que o necessário, e tropas felizes são tropas eficazes."
 discontent_soldiers_contract: "Prefeito Inepto"
 discontent_soldiers_desc: "$inept_mayor$"
 discontent_soldiers_desc_title: "Este oficial chave provou ser quase completamente incompetente. Nobres locais, a plebe comum e até mesmo seus próprios ministros estão cada vez mais insatisfeitos."
 governor_contract_event.2000.t: "$task_contract_governance_desc_title$"
 governor_contract_event.2000.desc: "As notícias dos meus postos avançados, das tropas provinciais sob meu comando, estão todas de acordo: o descontentamento cresce entre os soldados. Seus períodos de serviço são longos demais, seu pagamento é baixo demais, as prostitutas locais são feias demais, os acampamentos são muito precários...

Para aqueles que vivem em um acampamento militar, os motivos para reclamar são sempre muitos, mas mesmo uma pequena intervenção poderia melhorar seus ânimos... isso certamente ajudaria muito a aumentar minha popularidade e a segurança da minha posição."
 governor_contract_event.2000.a: "Quando chego a [mayor_destination.GetName], corro até o escritório [Select_CString(inept_mayor.IsFemale, 'da prefeita', 'do prefeito' )] local, [inept_mayor.GetFirstName]. Ao que parece, pego[inept_mayor.Custom('ES_OA')] de surpresa, [inept_mayor.Custom('ES_ElLa')] burocrata enxota seus servos. Os livros-caixa estão presos em seus braços.

"Venho verificar a contabilidade da sua administração", digo, solenemente, com a testa franzida."
 governor_contract_event.2000.b: "

"É por... ah, aquela remessa de cereais?", gagueja [Select_CString(inept_mayor.IsFemale, 'a prefeita', 'o prefeito' )]. "A importação de seda? Sim, meus contatos são um pouco heterodoxos, mas foram perdoados por seus crimes! Bem... #EMP a maioria#!. Revogarei essas ordens, meu [ROOT.Char.GetTitleAsName|l], todas elas; não se preocupe!""
 governor_contract_event.2000.c: "

"Meu [ROOT.Char.GetTitleAsName|l], acaso pode duvidar da minha devoção absoluta ao meu cargo e da minha competência comprovada?!", exclama [Select_CString(inept_mayor.IsFemale, 'a prefeita', 'o prefeito' )], medindo-me para um confronto.

Mas eu sou seu superior[ROOT.Char.Custom('ES_XA')]."
 governor_contract_event.2000.d: "\n\n\"Notícias preocupantes, meu [ROOT.Char.GetTitleAsName|l]?\", [inept_mayor.GetFirstNameNoTooltip] ri sem jeito, de forma pouco convincente. \"Os figurões da região têm a língua comprida e uma imaginação fértil; o melhor é simplesmente evitar os mais barulhentos...\"."
 governor_contract_event.2000.e: "Mostre-me os livros contábeis."
 ep3_settled_troops_province_modifier: "Sois indign[inept_mayor.Custom('ES_OA')] de vosso cargo."
 ep3_settled_troops_province_modifier_desc: "Estou chamando meus especialistas da capital."
 ep3_longer_breaks_province_modifier: "Você pagará pessoalmente por todas as perdas!"
 ep3_longer_breaks_province_modifier_desc: "Incompetência na Administração"
 ep3_better_paid_soldiers_modifier: "Um dos principais centros deste condado está tão mal administrado que toda a área está sofrendo."
 ep3_better_paid_soldiers_modifier_desc: "Investimento Provincial"
 inept_mayor: "$prov_investment$"
 inept_mayor_contract: "Uma oportunidade se apresentou para você investir no capital de sua governadoria."
 inept_mayor_desc: "$task_contract_governance_desc_title$"
 inept_mayor_desc_title: "$prov_investment$"
 governor_contract_event.2010.t: "Como é bom quando uma governança diligente encontra resultados excelentes!\n\nO tesouro de [ongoing_destination.GetName] está cheio até a borda, e fui encarregado pela administração central de reinvestir o excedente localmente."
 governor_contract_event.2010.desc: "Infraestrutura é a chave para o sucesso."
 governor_contract_event.2010.a: "Fazer o trabalho de [ROOT.Char.GetFaith.HighGodName] na terra é um privilégio."
 governor_contract_event.2011.desc_intro: "Quando chego a [mayor_destination.GetName], corro até o escritório [Select_CString(inept_mayor.IsFemale, 'da prefeita', 'do prefeito' )] local, [inept_mayor.GetFirstName]. Ao que parece, pego[inept_mayor.Custom('ES_OA')] de surpresa, [inept_mayor.Custom('ES_ElLa')] burocrata enxota seus servos. Os livros-caixa estão presos em seus braços.

"Os comerciantes locais poderiam usar a ajuda extra."
 governor_contract_event.2011.desc_fear: "

"$prov_investment$: Sucesso"
 governor_contract_event.2011.desc_upset: "

"O rosto de [emperor.GetFaith.WealthGodName] que patrocina [emperor.Custom('ES_AlAla')] [emperor.GetTitledFirstName] é recriado com carinho —e de forma bastante lisonjeira— por meus artesãos. O nome de [emperor.Custom('ES_DelDela')] grande soberan[emperor.Custom('ES_OA')] fica gravado abaixo… assim como o meu.", exclama [Select_CString(inept_mayor.IsFemale, 'a prefeita', 'o prefeito' )], medindo-me para um confronto.

Mas eu sou seu superior[ROOT.Char.Custom('ES_XA')]."
 governor_contract_event.2011.desc_worried: "Até o mais baixo dos mendigos em [task_contract_location.GetNameNoTier] dorme com o estômago cheio esta noite. Minha distribuição de grãos fez com que famílias de rostos alegres levantassem feixes até as vigas; toda a região cheira a pão fresco assado."
 governor_contract_event.2011.a: "\n\nEsta escolha de investimento provou ser sagaz. Com apenas os primeiros resultados à vista, já sou elogiado e festejado pelo povo sob meus cuidados."
 governor_contract_event.2011.b: "Um trabalho bem feito."
 governor_contract_event.2011.c: "$prov_investment$: Falha"
 governor_contract_event.2011.d: "Informei à administração da capital sobre meu mais novo monumento, a estátua adornada com joias de grandiosidade ostentosa… e não recebi resposta alguma. [emperor.Custom('ES_ElLa')] [emperor.GetTitledFirstName|l] não se digna a honrar-me por meu ato de fidelidade, se é que sabe dele ao menos."
 ep3_mismanaged_administration_modifier: "Com meu ajuste de impostos e tarifas, os comerciantes cantam de alegria com os novos lucros... mas não vemos aumento na receita. Além disso, artesãos e trabalhadores locais reclamam da minha administração: diante da recente barateação das importações, eles lutam para vender seus produtos."
 ep3_mismanaged_administration_modifier_desc: "As tropas não estavam muito #EMP equilibradas#! em relação ao seu repentino bônus salarial... com abandono selvagem, jogaram seus pagamentos em uma orgia de festejos inconvenientes.\n\nAgora, os capitães amados enfrentam acusações criminais, soldados apresentam feridas de brigas com os locais, e de alguma forma sou eu quem é responsabilizado."
 prov_investment: "\n\nIsso, infelizmente, não se desenrolou como eu esperava. E o superávit da minha província se perdeu."
 prov_investment_contract: "Infeliz."
 prov_investment_desc: "O investimento é um sucesso."
 prov_investment_desc_title: "O investimento é uma falha."
 governor_contract_event.2020.t: "Infraestrutura em Desenvolvimento"
 governor_contract_event.2020.desc: "Estradas, estações de mensageiros, fornecimento de água, e tudo o que um condado precisa para crescer."
 governor_contract_event.2020.a: "Distribuição de Alimentos"
 governor_contract_event.2020.b: "Um superávit de dinheiro no governo local foi utilizado para importar alimentos baratos para a população em geral."
 governor_contract_event.2020.c: "Militar Aprimorado"
 governor_contract_event.2020.c_tt: "Uma quantidade significativa de ouro foi investida nas tropas estacionadas neste condado."
 governor_contract_event.2020.d: "Camponeses Invasores"
 governor_contract_event.2020.e: "$raiding_peasants$"
 governor_contract_event.2020.f: "Um bando auto-organizado de camponeses tem invadido nossas terras do outro lado da fronteira."
 governor_contract_event.2021.t: "$task_contract_governance_desc_title$"
 governor_contract_event.2021.desc_infrastructure: "$raiding_peasants$"
 governor_contract_event.2021.desc_church: "Chegam notícias preocupantes de [ongoing_destination.GetName].

Ao que parece, um grupo de camponeses locais tomou as armas e, em bandos desordeiros, aventurou-se para além de nossas fronteiras, no território de [neighbor.GetCulture.GetNameNoTooltip].

É improvável que a conduta em si provoque preocupações diplomáticas, mas as ações militares — e a posse de armas — são prerrogativa do exército. Portanto, toda violação da lei deve ser investigada."
 governor_contract_event.2021.desc_monument: "Preciso ver isso pessoalmente."
 governor_contract_event.2021.desc_traders: "Você viaja para [ongoing_destination.GetNameNoTooltip]"
 governor_contract_event.2021.desc_military: "Quando chego a [ongoing_destination.GetName], minhas informações se provam corretas. Não demora para meus guardas reunir um considerável grupo de locais, todos na posse de armas não autorizadas.\n\n\"Precisamos delas para nos defender e proteger nossas famílias!\" eles protestam. \"Aqueles canalhas de [neighbor.GetCulture.GetNameNoTooltip] não podem ser confiáveis! Eles precisam aprender a ficar bem longe de nós!\""
 governor_contract_event.2021.desc_food: "Vocês todos trabalharão para mim — legalmente."
 governor_contract_event.2021.desc: "Banditismo é punido com a morte."
 governor_contract_event.2021.a: "Você precisa de alguma ajuda #EMP não oficial#!?"
 governor_contract_event.2022.t: "Você deveria estar trabalhando em seus campos."
 governor_contract_event.2022.desc_monument: "Me dê todo o ouro que você roubou e poderá ir embora!"
 governor_contract_event.2022.desc_traders: "Invasões de Camponeses na Fronteira"
 governor_contract_event.2022.desc_military: "Os camponeses locais se armaram e estão ativamente protegendo suas fronteiras."
 governor_contract_event.2022.desc: "De Volta aos Campos"
 governor_contract_event.2022.a: "A milícia local foi desmobilizada e os camponeses enviados de volta aos campos."
 governor_contract_event.2020.success: "Bestas Predadoras"
 governor_contract_event.2020.failure: "$wild_predators$"
 ep3_contract_infrastructure_modifier: "Bestas selvagens comem os animais de uma reserva de caça local e atormentam os locais. Avistamentos são frequentemente relatados perto de suas vilas; incidentes sangrentos em seus cercados."
 ep3_contract_infrastructure_modifier_desc: "$task_contract_governance_desc_title$"
 ep3_food_distribution_modifier: "$wild_predators$"
 ep3_food_distribution_modifier_desc: "As notícias de [ongoing_destination.GetName] são graves.\n\nA população da fauna selvagem local está desaparecendo devido a uma presença cada vez maior de [ROOT.Char.Custom('RegionalFerociousAnimal')]. Essas feras, encorajadas pelo aumento de seus números, não se contentam em despovoar as terras selvagens, mas agora podem ser vistas rondando os assentamentos do meu povo.\n\nAs crianças e o gado são vigiados de perto, mas ainda assim… os arredores de [ongoing_destination.GetName] não são seguros."
 ep3_invested_military_modifier: "Preciso fazer algo."
 ep3_invested_military_modifier_desc: "Minha chegada a [ongoing_destination.GetName] se dá em meio a tragédia e preocupação. Os moradores sussurram que —na segurança de um cercado— um exemplar premiado de [ROOT.Char.Custom('RegionalFarmAnimal')] foi recentemente despedaçado por um enorme exemplar de [ROOT.Char.Custom('RegionalFerociousAnimal')].\n\nUma rápida cavalgada pela região confirma que essa informação é confiável; é raro ver animais selvagens, e por toda parte há sinais de ataques de [ROOT.Char.Custom('RegionalFerociousAnimal')].\n\nDizem que um bebê desapareceu. Dizem que foram encontrados ossinhos quebrados."
 raiding_peasants: "Eu conheço os profissionais certos."
 raiding_peasants_contract: "Você envia venenos especialistas para matar seletivamente os predadores fora de controle com iscas."
 raiding_peasants_desc: "Eu mesmo caçarei as criaturas!"
 raiding_peasants_desc_title: "Precisamos de mais caçadores."
 governor_contract_event.2030.t: "Os camponeses locais podem lidar com isso."
 governor_contract_event.2030.desc: "Chegam notícias preocupantes de [ongoing_destination.GetName].

Ao que parece, um grupo de camponeses locais tomou as armas e, em bandos desordeiros, aventurou-se para além de nossas fronteiras, no território de [neighbor.GetCulture.GetNameNoTooltip].

É improvável que a conduta em si provoque preocupações diplomáticas, mas as ações militares — e a posse de armas — são prerrogativa do exército. Portanto, toda violação da lei deve ser investigada."
 governor_contract_event.2030.a: "Muitos caçadores vêm reivindicar as bestas."
 governor_contract_event.2030.a.tt: "Poucos têm interesse em caçar um exemplar de [ROOT.Char.Custom('RegionalFerociousAnimal')]"
 governor_contract_event.2031.desc: "A habilidade local prevalece."
 governor_contract_event.2031.a: "Os camponeses são apenas presas."
 governor_contract_event.2031.b: "Enjaula-se até o último exemplar de [ROOT.Char.Custom('RegionalFerociousAnimal')]"
 governor_contract_event.2031.c: "Suas jaulas permanecem vazias."
 governor_contract_event.2031.d: "Vitória!\n\n[ongoing_destination.GetName] está livre dos terrores da natureza, purgado de seu problema de [ROOT.Char.Custom('RegionalFerociousAnimal')]; minha intervenção determinada libertou o povo do medo!\n\nNa [ongoing_destination.GetTerrain.GetNameNoTooltip|l] onde me encontro, as criaturas inocentes de pasto de [ROOT.Char.GetFaith.HighGodNamePossessive], seus herbívoros assustadiços, logo poderão voltar a pastar livremente."
 governor_contract_event.2031.e: "Eu assumo total crédito por este sucesso."
 ep3_peasant_border_raids_modifier: "Dentes que rangem, garras como pontas de lança, enormes bocas babando bem atrás de nós… cegos de terror, fugimos do/a [ongoing_destination.GetTerrain.GetNameNoTooltip|l] de [ongoing_destination.GetName], mal conseguindo salvar nossas vidas!\n\nA ameaça do tipo [ROOT.Char.Custom('RegionalFerociousAnimal')] aqui é verdadeiramente implacável. Será que são os servos selvagens de [ROOT.Char.GetFaith.DevilName] que assombram esta aldeia?\n\n[ROOT.Char.Custom('CulturalCurse')|U]! Só posso partir, deixando os moradores aterrorizados pelas criaturas…"
 ep3_peasant_border_raids_modifier_desc: "Só posso esperar que comecem a se devorar #EMP uns aos outros...#!"
 ep3_peasant_workers_modifier: "Caça Abundante"
 ep3_peasant_workers_modifier_desc: "A caça é abundante nesta área, tornando as caçadas mais bem-sucedidas."
 wild_predators: "$wild_predators$"
 wild_predators_contract: "Uma abundância de predadores selvagens ronda estas terras, matando camponeses e animais de caça igualmente."
 wild_predators_desc: "Animais de Estimação Feroces"
 wild_predators_desc_title: "Este personagem desenvolveu um gosto caro por animais de estimação ferozes."
 governor_contract_event.2040.t: "Uma Presença Maligna"
 governor_contract_event.2040.desc: "$evil_presence$"
 governor_contract_event.2040.a: "Camponeses aterrorizados afirmam estar sendo perseguidos por uma presença maligna. Incapazes de confortar este rebanho sobrecarregado, os clérigos locais solicitam sua intervenção."
 governor_contract_event.2041.desc: "$task_contract_governance_desc_title$"
 governor_contract_event.2041.a: "$evil_presence$"
 governor_contract_event.2041.a.tt: "Os [ongoing_destination.GetCounty.GetFaith.PriestNeuterPlural] locais de [ongoing_destination.GetName] escrevem para mim, em pânico, agarrando minha atenção com advertências urgentes sobre violência iminente.\n\nA população local está em frenesim devido a uma série de eventos suspeitos: presságios ruins, como"
 governor_contract_event.2041.b: "peixes estragados,"
 governor_contract_event.2041.c: "febres,"
 governor_contract_event.2041.d: "cônjuges brigando,"
 governor_contract_event.2041.e: "crianças acordando gritando à noite,"
 governor_contract_event.2041.e.tt: "dores de cabeça em massa,"
 governor_contract_event.2041.f: "caçadas mal sucedidas,"
 governor_contract_event.2041.b.success: "vacas doentes,"
 governor_contract_event.2041.b.fail: "produção arruinada,"
 governor_contract_event.2041.c.success: "campos arruinados,"
 governor_contract_event.2041.c.fail: "e aparições estranhas de cães."
 governor_contract_event.2041.d.success: "e aparições estranhas de cavalos."
 governor_contract_event.2041.d.fail: "e aparições estranhas de águias."
 governor_contract_event.2041.e.success: "e aparições estranhas de gatos."
 governor_contract_event.2041.e.fail: "e aparições estranhas de sapos."
 governor_contract_event.2042.desc: "e aparições estranhas de cobras."
 governor_contract_event.2042.a: "\n\nO povo está aterrorizado de que um demônio — ou algum outro mal indizível — tenha se instalado entre eles."
 governor_contract_event.2043.desc: "Suponho que uma investigação seja necessária."
 governor_contract_event.2043.a: "As boas gentes de [ongoing_destination.GetName] estão enlouquecidas de terror.

O pânico e a paranoia estão à flor da pele. Tanto em cortiços precários quanto na [ROOT.Char.Custom('ResidenceBuilding')] do magistrado local, minha comitiva se depara com portas trancadas, acusações contra amigos e parentes das práticas mais horríveis e cidadãos honestos que veem monstros em cada sombra. As atividades produtivas estão praticamente suspensas.

Esta situação precisa acabar de uma forma ou de outra. Sem fé na proteção de [ongoing_destination.GetCounty.GetFaith.HighGodNamePossessive]... os vínculos dessa sociedade dificilmente poderiam se desgastar mais."
 ep3_abundant_game_modifier: "Vou solicitar um exorcista oficial da capital."
 ep3_abundant_game_modifier_desc: "Traga um [ROOT.Char.GetFaith.PriestNeuter] renomado para um exorcismo."
 ep3_wild_predators_modifier: "Deve haver um feiticeiro maligno!"
 ep3_wild_predators_modifier_desc: "O que seus anciãos sugerem?"
 ep3_ferocious_pets_modifier: "Você só está vendo coisas. Bobagem."
 ep3_ferocious_pets_modifier_desc: "Investigação da Igreja"
 evil_presence: "A Igreja se envolveu em uma investigação sobre potenciais usuários de magia demoníaca."
 evil_presence_contract: "Racionalista"
 evil_presence_desc: "Este personagem tem a reputação de valorizar a razão acima da religião, uma opinião um tanto impopular."
 evil_presence_desc_title: "Práticas Tradicionais Mantidas"
 governor_contract_event.2050.t: "O governador local apoiou abertamente as práticas tradicionais — alguns as chamam de superstições — para lidar com demônios."
 governor_contract_event.2050.desc: "Cura Miraculosa"
 governor_contract_event.2051.desc_a: "$miraculous_healing$"
 governor_contract_event.2051.desc_b: "Um inválido local recebe muitas doações de relíquias e objetos valiosos, e a cada vez afirma ser restaurado à saúde pela graça divina. Os doadores ficam cada vez mais descontentes."
 governor_contract_event.2051.desc_c: "$task_contract_governance_desc_title$"
 governor_contract_event.2051.desc_d: "$miraculous_healing$"
 governor_contract_event.2051.desc_e: "Hoje me trouxeram um caso interessante, e de uma pessoa bastante incomum, para que eu o julgue.

[Select_CString(scammer.IsFemale, 'Esta mulher', 'Este homem' )] é acusad[scammer.Custom('ES_OA')] de fingir invalidez; de ser [Select_CString(scammer.IsFemale, 'uma charlatã', 'um charlatão' )] que ganha a vida enganando os fiéis. [scammer.Custom('quirk_pos_present')] de maneira encantadora, enquanto as relíquias doadas são colocadas diante de mim.

As testemunhas afirmam ter visto esse "[Select_CString(scammer.IsFemale, 'cega', 'cego' )]" à porta de suas [ROOT.Char.GetFaith.HouseOfWorshipPlural], apelando para a bondade dos fiéis e aquecendo os corações das congregações ao se curar milagrosamente, repetidas vezes... mas só depois de receber moedas ou itens sagrados."
 governor_contract_event.2051.desc_f: "Essa vigarista será punida de forma exemplar.[Select_CString(scammer.IsFemale, 'esta timadora', 'este timador' )] será punido de forma exemplar."
 governor_contract_event.2051.desc_g: "Eu poderia usar alguém com sua #EMP criatividade#!."
 governor_contract_event.2051.desc_h: "Devolva as relíquias, e eu posso esquecer que isso aconteceu."
 governor_contract_event.2051.desc_i: "Uma multa sólida é uma punição adequada."
 governor_contract_event.2051.desc_l: "A única possível penitência é a prisão."
 governor_contract_event.2051.desc_m: "[ROOT.Char.GetFaith.HighGodName] age de maneiras misteriosas."
 governor_contract_event.2051.desc_n: "Tesouro Enterrado"
 governor_contract_event.2051.desc_o: "$buried_treasure$"
 governor_contract_event.2051.desc_p: "Um camponês local encontrou um tesouro de ouro enterrado, e uma disputa surgiu sobre a quem ele pertence."
 governor_contract_event.2051.desc_q: "$task_contract_governance_desc_title$"
 governor_contract_event.2051.desc_end: "$buried_treasure$"
 governor_contract_event.2050.a: "Os anciãos de uma pequena comunidade perto de [ongoing_destination.GetName] entraram em contato comigo para tomar uma decisão sobre um evento nada habitual.\n\nUma família camponesa desenterrou um tesouro considerável de moedas de ouro enquanto trabalhava seus campos! Os vizinhos se dividiram imediatamente em dois bandos: alguns acreditam que o ouro deve ficar com quem o encontrou, enquanto outros sustentam que essa fortuna inesperada deve ser compartilhada por toda a aldeia.\n\nA palavra de uma autoridade superior pode aplacar a cobiça dessas pessoas simples e impedir que descambem para uma violência mesquinha."
 governor_contract_event.2051.desc: "As boas gentes de [ongoing_destination.GetName] estão enlouquecidas de terror.

O pânico e a paranoia estão à flor da pele. Tanto em cortiços precários quanto na [ROOT.Char.Custom('ResidenceBuilding')] do magistrado local, minha comitiva se depara com portas trancadas, acusações contra amigos e parentes das práticas mais horríveis e cidadãos honestos que veem monstros em cada sombra. As atividades produtivas estão praticamente suspensas.

Esta situação precisa acabar de uma forma ou de outra. Sem fé na proteção de [ongoing_destination.GetCounty.GetFaith.HighGodNamePossessive]... os vínculos dessa sociedade dificilmente poderiam se desgastar mais."
 governor_contract_event.2051.a: "Reinvista o ouro em sua própria comunidade."
 governor_contract_event.2051.b: "Todos os ganhos especiais devem ser taxados. #EMP Pesadamente.#!"
 governor_contract_event.2051.c: "O que é encontrado em terras públicas pertence ao reino."
 governor_contract_event.2051.d: "O tesouro é legalmente seu para fazer o que quiser."
 governor_contract_event.2051.e: "Este tesouro pertence a toda a comunidade."
 ep3_church_investigation_modifier: "O aureus era uma moeda de ouro emitida regularmente da Última República Romana até o início do século IV d.C., quando foi substituída pelo solidus. Originalmente, um aureus valia 25 denários de prata, mas, devido à inflação desenfreada do Império Tardio, o novo solidus valia toda uma fortuna de 275000 denários!"
 ep3_church_investigation_modifier_desc: "Tesouro Investido"
 ep3_rationalist_gov_modifier: "Um tesouro de ouro foi transformado em investimentos locais, para o benefício de todo o condado."
 ep3_rationalist_gov_modifier_desc: "Tesouro Distribuído"
 ep3_local_practices_modifier: "A população local desfruta de alguma prosperidade com a redistribuição de um tesouro descoberto."
 ep3_local_practices_modifier_desc: "Terra Pública"
 miraculous_healing: "$public_land$"
 miraculous_healing_contract: "Com total desrespeito pelos direitos tradicionais dos camponeses, um magnata local está ilegalmente acumulando terras."
 miraculous_healing_desc: "$task_contract_governance_desc_title$"
 miraculous_healing_desc_title: "$public_land$"
 governor_contract_event.2060.t: "Segundo os relatórios de [ongoing_destination.GetName], um[magnate.Custom('ES_XA')] potentad[magnate.Custom('ES_OA')] local, [magnate.GetTitledFirstName], empregou todos os truques possíveis e imagináveis para aumentar a extensão das terras que possui diretamente.

Está claro que nem todos esses métodos são legais, e alguns são de muito #EMP mau gosto#!."
 governor_contract_event.2060.desc: "Hoje me trouxeram um caso interessante, e de uma pessoa bastante incomum, para que eu o julgue.

[Select_CString(scammer.IsFemale, 'Esta mulher', 'Este homem' )] é acusad[scammer.Custom('ES_OA')] de fingir invalidez; de ser [Select_CString(scammer.IsFemale, 'uma charlatã', 'um charlatão' )] que ganha a vida enganando os fiéis. [scammer.Custom('quirk_pos_present')] de maneira encantadora, enquanto as relíquias doadas são colocadas diante de mim.

As testemunhas afirmam ter visto esse "Eu poderia esquecer o acidente por uma boa #EMP doação#!..."
 governor_contract_event.2060.a: "Vamos fingir que isso nunca aconteceu, #EMP amig[magnate.Custom('ES_OA')]#!!"
 governor_contract_event.2060.b: "Fique com a terra, mas deixe os locais cultivá-la."
 governor_contract_event.2060.c: "Pequenos Proprietários"
 governor_contract_event.2060.d: "A presença de pequenos proprietários foi reinstalada na área."
 governor_contract_event.2060.e: "Terras Confiscadas"
 governor_contract_event.2060.f: "Este é o lugar perfeito para expandir minha propriedade!"
 buried_treasure: "O Profeta Louco"
 buried_treasure_contract: "$mad_prophet$"
 buried_treasure_desc: "Um profeta auto-proclamado está aterrorizando todo um condado com suas previsões apocalípticas."
 buried_treasure_desc_title: "$task_contract_governance_desc_title$"
 governor_contract_event.2070.t: "$mad_prophet$"
 governor_contract_event.2070.desc: "Recebi notícias preocupantes de [ongoing_destination.GetName].\n\nAo que parece, tal [ongoing_destination.GetTitle.GetTierAsNameNoTooltip|l] entrou em turbulência porque uma pessoa que se autoproclama profeta tem espalhado pânico com previsões horríveis sobre a iminente chegada do Fim dos Dias.\n\nÉ bem provável que não passem de delírios de um lunático, mas quando esses delírios comprometem a segurança e a ordem pública, é meu dever intervir."
 governor_contract_event.2070.a: "Preciso investigar a situação."
 governor_contract_event.2071.desc: "Ao chegar a [ongoing_destination.GetName], sou apresentado à pessoa camponesa responsável por encontrar o tesouro — [Select_CString(peasant.IsFemale, 'uma mulher', 'um homem' )] chamada[Select_CString(peasant.IsFemale, '', 'o' )] [peasant.GetFirstName] — e ao próprio tesouro:

"
 governor_contract_event.2071.desc.byz: "Devemos calar."
 governor_contract_event.2071.desc.fallback: "Guardas, prendam [Select_CString(prophet.IsFemale, 'a agitadora', 'o agitador' )]."
 governor_contract_event.2071.desc.end: "

[peasant.GetFirstNameNoTooltip] — e, ao que parece, todos os servos de sua comunidade — observam com expectativa e sem fôlego: "Você organiza uma grande procissão religiosa."
 governor_contract_event.2071.a: "O clero local pode cuidar disso."
 governor_contract_event.2071.b: "Fico feliz em observar que meus guardas conseguiram dispersar a multidão e acabar com toda essa bobagem.\n\nOs cidadãos de [ongoing_destination.GetName] podem ficar tranquilos sabendo que vivem em um império civilizado, devoto e forte, imune a superstições e seguro contra desordens!"
 governor_contract_event.2071.c: ""... e isso demonstra de forma conclusiva que o fim do mundo #EMP não#! se aproxima e que a ira [ROOT.Char.GetFaith.HighGodNamePossessive] #EMP não#! cairá sobre nós."

[Select_CString(prophet.IsFemale, 'A profetisa', 'O profeta' )] fica sem palavras diante da minha douta dissertação, e a multidão aplaude, apreciando um bom debate religioso antes de voltar para casa."
 governor_contract_event.2071.d: "Adoro um trabalho bem feito!"
 governor_contract_event.2071.e: "Infelizmente, enviar os guardas não foi a escolha certa.

A multidão apavorada se aglomerou ao redor [Select_CString(prophet.IsFemale, 'da profetisa', 'do profeta' )] para proteger[prophet.GetHerHim], e muitos — tanto soldados quanto civis — ficaram feridos na briga que se seguiu.

[Select_CString(prophet.IsFemale, 'A profetisa agitadora', 'O profeta agitador' )] conseguiu escapar no meio do caos e desaparecer sem deixar rastro."
 AUREUS_GLOSS: ""Então, pela natureza de [ROOT.Char.GetFaith.HighGodName]... Não, acho que se trata de #EMP essência#!, certo? Ou era energia? Enfim, o que é não pode deixar de ser. Ou algo assim..."

Não preciso ver a confusão no rosto das pessoas à minha frente nem ouvir os risinhos do meu adversári[prophet.Custom('ES_OA')] para saber que só passei vergonha.

Tenho certeza de que os locais vão resolver essa questão por conta própria. Estou indo embora."
 ep3_treasure_invest_modifier: "Uma exibição vergonhosa."
 ep3_treasure_invest_modifier_desc: "Religiosamente Pacificado"
 ep3_treasure_distributed_modifier: "A fé e a confiança da população local nas instituições foram fortalecidas pela intervenção eficaz contra um culto do apocalipse em ascensão."
 ep3_treasure_distributed_modifier_desc: "Culto do Profeta Perseguido"
 public_land: "Um culto do apocalipse liderado por um profeta louco foi erradicado pela força."
 public_land_contract: "Debate Religioso Vencido"
 public_land_desc: "Este personagem brilhou em um debate religioso contra um profeta louco, mostrando ao povo o erro em seus caminhos."
 public_land_desc_title: "Títulos à Venda"
 governor_contract_event.2080.t: "$titles_sale$"
 governor_contract_event.2080.desc: "Segundo os relatórios de [ongoing_destination.GetName], um[magnate.Custom('ES_XA')] potentad[magnate.Custom('ES_OA')] local, [magnate.GetTitledFirstName], empregou todos os truques possíveis e imagináveis para aumentar a extensão das terras que possui diretamente.

Está claro que nem todos esses métodos são legais, e alguns são de muito #EMP mau gosto#!."
 governor_contract_event.2080.a: "O caso que me pedem julgar hoje é bastante delicado: um [priest.GetFaith.PriestNeuter] local foi pego oferecendo títulos e cargos religiosos aos filhos não qualificados de notáveis locais.

Essa pessoa, [priest.GetName], enche os próprios bolsos às custas de [priest.GetFaith.HighGodNamePossessive] e de seus superiores.

Essa prática — obviamente — é totalmente ilegal. Devido à natureza religiosa do próprio crime e das partes envolvidas, também é bastante controversa. Há um grande risco de que, com minha necessária intervenção em seus assuntos, o clero fique descontente."
 governor_contract_event.2081.desc: "O ouro deve ser doado às instituições religiosas."
 governor_contract_event.2081.a: "O ouro adquirido ilegalmente está aqui confiscado."
 governor_contract_event.2081.b: "Arrependa-se! E devolva o dinheiro aos seus compradores."
 governor_contract_event.2081.c: "Eu poderia usar um favor de alguém como você..."
 governor_contract_event.2081.d: "Ouro Reaproveitado"
 governor_contract_event.2081.e: "O ouro acumulado através da venda ilegal de ofícios religiosos foi bem utilizado por seus legítimos proprietários religiosos."
 ep3_lands_reinstated_modifier: "Tempos de Fome"
 ep3_lands_reinstated_modifier_desc: "$hungry_times$"
 ep3_land_confiscate_modifier: "Uma peste recente causou uma fome, que empurrou alguns locais a medidas #EMP desesperadas#! para sobreviver."
 ep3_land_confiscate_modifier_desc: "$task_contract_governance_desc_title$"
 mad_prophet: "$hungry_times$"
 mad_prophet_contract: "As notícias de [ongoing_destination.GetName] são particularmente preocupantes.\n\nAs medidas do governo para ajudar a área após uma recente peste foram aparentemente inadequadas; uma fome atingiu os assentamentos locais. Alguns habitantes foram levados a práticas desesperadas e abomináveis para sobreviver."
 mad_prophet_desc: "\n\nDe acordo com este relatório, vários camponeses foram pegos matando e despedaçando seus semelhantes para consumir sua carne!"
 mad_prophet_desc_title: "\n\nDe acordo com este relatório, vários camponeses foram pegos consumindo a carne de seus semelhantes que morreram de fome!"
 governor_contract_event.2090.t: "\n\nDe acordo com este relatório, vários camponeses foram pegos matando e consumindo animais religiosamente impuros, atraindo assim a ira do clero local."
 governor_contract_event.2090.desc: "Preciso ouvir mais sobre isso."
 governor_contract_event.2090.a: "Quando chego a [ongoing_destination.GetName], [Select_CString( cannibal.IsFemale, 'a acusada', 'o acusado' )] aguarda em correntes, a cabeça baixa, as roupas rasgadas e ensanguentadas.

Os acusados, com [cannibal.GetFirstName] à frente, acorrentados e trêmulos, de cabeça baixa, são alvo dos gritos de uma grande multidão de rostos esqueléticos. Punhos ossudos se agitam; vozes finas clamam por um castigo exemplar.

Mostram-me as provas... fêmures partidos e cabeças decepadas e apodrecidas. Algo horrível aconteceu aqui; foi realmente uma abominação diante de [ROOT.Char.GetFaith.HighGodName]."
 governor_contract_event.2091.desc: "Eu nunca deveria ter deixado esta comunidade sozinha."

Ao me abrir caminho entre servos intimidados e perplexos, sigo o som até sua origem.

Um[prophet.Custom('ES_XA')] [prophet.GetWomanMan] andrajos[prophet.Custom('ES_OA')] admoesta a multidão inquieta e aterrorizada com uma fúria inspirada pela divindade. As palavras de [prophet.GetName] tornam reais suas suspeitas sobre o desconhecido; fala-lhes do medo do caos, do temor a [prophet.GetFaith.NegativeAfterLife] e de nossa crença comum no fim de todas as coisas."
 governor_contract_event.2091.a: "Esforço de Rebuild"
 governor_contract_event.2091.a.tt: "O governador local está focando na reconstrução desta área após ter sido duramente atingida por uma epidemia."
 governor_contract_event.2091.b: "Controle Rigoroso"
 governor_contract_event.2091.c: "Alguns episódios #EMP infelizes#! neste condado forçaram o governador a colocar tudo sob observação especial."
 governor_contract_event.2091.d: "Medidas de Guerra"
 governor_contract_event.2091.e: "$wartime_measures$"
 governor_contract_event.2091.e.tt: "Meu liege está em guerra. Um pedido oficial acaba de chegar a mim da capital: forneça todo o suporte possível às tropas que passam."
 governor_contract_event.2091.f: "$task_contract_governance_desc_title$"
 governor_contract_event.2092.desc_persecute: "$wartime_measures$"
 governor_contract_event.2092.desc_debate: "Uma carta de aspecto oficial, com o selo [ROOT.Char.GetLiege.Custom('ES_DelDela')] [ROOT.Char.GetLiege.GetTitleAsNameNoTooltip|l] em pessoa, me aguarda hoje em meu gabinete.\n\n"Os exércitos invencíveis de noss[ROOT.Char.GetLiege.Custom('ES_OA')] [ROOT.Char.GetLiege.GetPrimaryTitle.GetBaseNameNoTier] marcham contra nosso desprezível inimigo. E, se tropas amigas atravessarem as terras designadas para seu governo, ordena-se que lhes forneçais todo conforto e apoio adequados.\n\n[ROOT.Char.GetLiege.Custom('ES_ElLa')|U] [ROOT.Char.GetLiege.GetTitleAsNameNoTooltip|l] agradece os sacrifícios que a leal população [ROOT.Char.GetLiege.GetCulture.GetName] realiza nestes momentos de tribulação"."

[Select_CString(prophet.IsFemale, 'A profetisa', 'O profeta' )] fica sem palavras diante da minha douta dissertação, e a multidão aplaude, apreciando um bom debate religioso antes de voltar para casa."
 governor_contract_event.2092.a: "Providenciaremos alojamentos para as tropas."
 governor_contract_event.2093.desc_persecute: "Infelizmente, enviar os guardas não foi a escolha certa.

A multidão apavorada se aglomerou ao redor [Select_CString(prophet.IsFemale, 'da profetisa', 'do profeta' )] para proteger[prophet.GetHerHim], e muitos — tanto soldados quanto civis — ficaram feridos na briga que se seguiu.

[Select_CString(prophet.IsFemale, 'A profetisa agitadora', 'O profeta agitador' )] conseguiu escapar no meio do caos e desaparecer sem deixar rastro."
 governor_contract_event.2093.desc_debate: "Suprimentos de Guerra"

Não preciso ver a confusão no rosto das pessoas à minha frente nem ouvir os risinhos do meu adversári[prophet.Custom('ES_OA')] para saber que só passei vergonha.

Tenho certeza de que os locais vão resolver essa questão por conta própria. Estou indo embora."
 governor_contract_event.2093.a: "Um sistema organizado de sentinelas protege este condado."
 ep3_religiously_pacified_modifier: "Compensações de Guerra"
 ep3_religiously_pacified_modifier_desc: "Este condado está recebendo apoio específico para continuar prosperando apesar de qualquer guerra em andamento."
