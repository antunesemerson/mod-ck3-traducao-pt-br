 hungry_times_contract: "Este personagem recrutou um número de ex-bandidos como mercenários, apesar do que outros possam pensar."
 hungry_times_desc: "Força de Trabalho Recrutada"
 hungry_times_desc_title: "Este condado possui um grande número de pessoas recrutadas para uma força de trabalho que serve à comunidade."
 governor_contract_event.2110.t: "Bandidos Rampantes"
 governor_contract_event.2110.desc: "Este condado é assombrado por bandidos; atacantes violentos contra viajantes e mercadores são comuns."
