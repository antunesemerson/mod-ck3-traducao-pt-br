 governor_contract_event.2100.a: "Infraestrutura Melhorada"
 governor_contract_event.2100.b: "Um oficial local gastou muitos fundos para melhorar a infraestrutura da área."
 governor_contract_event.2100.c: "Distribuição de Grãos"
 governor_contract_event.2100.d: "Este condado está se beneficiando da distribuição de grãos ao povo, a pedido do governador local."
