l_spanish:
 ep3_landless_admin.1000.t: "À Porta"
 ep3_landless_admin.1000.desc: "Uma batida suave na porta da propriedade me surpreende durante meu passeio.\n\n“Entre.”\n\nUm[proposed_councillor.Custom('ES_XA')] [proposed_councillor.GetWomanMan] bem-vestid[proposed_councillor.Custom('ES_OA')] está na porta, segurando sua sacola.\n\n“Venho oferecer meus serviços à virtuosa casa de [ROOT.Char.GetHouse.GetBaseNameNoTooltip]. Tenho grande habilidade e o servirei bem.”"
 ep3_landless_admin.1000.a: "\"Sempre faz falta gente talentosa\"."
 ep3_landless_admin.1000.b: "\"Certamente, seria #EMP uma honra para você#! me servir.\""
 ep3_landless_admin.1000.b.success: "[proposed_councillor.GetShortUIName] está muito impressionado"
 ep3_landless_admin.1000.b.mid: "[proposed_councillor.GetShortUIName] parece convencido"
 ep3_landless_admin.1000.b.failure: "[proposed_councillor.GetShortUIName] se sente insultado"
 ep3_landless_admin.1000.c: "\"Não preciso de companhia estranha.\""
 ep3_landless_admin.1010.t: "Em Boa Propriedade"
 ep3_landless_admin.1010.desc: "\"Que visão! Diz-se que lá dentro há duzentas salas e que todas as portas são de ouro maciço! E no porão — ah! Saudações, [ROOT.Char.Custom('FormOfAddressForLiege')]!\"\n\nUm[local.Custom('ES_XA')] [local.GetWomanMan] o mais simples[local.Custom('ES_XA')] possível para no meio do meu jardim. Uma criança pequena se esconde atrás de suas roupas.\n\n\"Estávamos apenas dando um passeio pela propriedade, já que os moradores locais estão maravilhados com sua magnificência!\""
 ep3_landless_admin.1010.a: "\"O que você está fazendo na minha propriedade...? Espiões!\""
 ep3_landless_admin.1010.b: "\"Precisamos de algumas contribuições...\""
 ep3_landless_admin.1010.c: "\"Certifique-se de que #EMP todos#! saibam.\""
 ep3_landless_admin.1010.d: "\"Talvez você quisesse ficará\""
 MODIFIER_DEFINITION_VALUE_PER_ESTATE_BUILDING: "\t#weak Aumento por nível do [building|lE] $estate_main_01_domicile_building$#!"
 ep3_good_estate_modifier: "Em Boa Propriedade"
 ep3_good_estate_modifier_desc: "Os locais estão impressionados com a manutenção deste $estate_main_01_domicile_building$."
 ep3_extra_security_modifier: "Paredes Aumentadas!"
 ep3_extra_security_modifier_desc: "Este personagem reforçou a segurança de sua propriedade em sua preocupação com espiões."
 ep3_landless_admin.1020.t: "Por um Pouco de Ouro..."
 ep3_landless_admin.1020.desc.intro: "O som de uma bolsa de moedas é difícil de confundir, [steward.GetTitledFirstName] abre a porta [steward.Custom('quirk_pos_pp')].\n\n\"Meu senhor[ROOT.Char.Custom('ES_XA')]! Que propriedade resplandecente! Os servos ficam maravilhados com"
 ep3_landless_admin.1020.desc.market: "o mercado"
 ep3_landless_admin.1020.desc.garden: "o jardim"
 ep3_landless_admin.1020.desc.guardhouse: "a casa de guarda"
 ep3_landless_admin.1020.desc.workshop: "a oficina"
 ep3_landless_admin.1020.desc.barracks: "os quartéis"
 ep3_landless_admin.1020.desc.vineyard: "o vinhedo"
 ep3_landless_admin.1020.desc.olive: "o pomar de oliveiras"
 ep3_landless_admin.1020.desc.tea: "a plantação de chá"
 ep3_landless_admin.1020.desc.outro: "desde a manhã,\" [steward.GetFirstNameNoTooltip] faz um gesto vago em sua direção.\n\n\"Seria um grande prazer para mim ajudá-lo a garantir que obtenhamos o máximo benefício disso.\""
 ep3_landless_admin.1020.a: "\"Um mercado é o coração de cada cidade.\""
 ep3_landless_admin.1020.b: "\"Consigo me imaginar descansando nesses jardins...\""
 ep3_landless_admin.1020.c: "\"Segurança é a medida mais importante.\""
 ep3_landless_admin.1020.d: "\"Artífices! Como eu os amo!\""
 ep3_landless_admin.1020.e: "\"Meus homens receberão o melhor treinamento.\""
 ep3_landless_admin.1020.f: "\"Mal posso esperar para degustar esse vinho!\""
 ep3_landless_admin.1020.g: "\"Óleo é o ingrediente mais básico.\""
 ep3_landless_admin.1020.h: "\"Precisamos de #EMP cada#! moeda para manter assim.\""
 ep3_landless_admin.1020.h.flavor: "Aquele ouro estaria muito mais seguro comigo..."
 ep3_landless_admin.1020.j: "\"O bom chá é o verdadeiro sinal de refinamento\"." #Brit maxxing 101
 ep3_landless_admin.1030.t: "Um Segredo por um Segredo"
 ep3_landless_admin.1030.desc: "Chegou um[courtier.Custom('ES_XA')] convidad[courtier.Custom('ES_OA')], direto da corte [liege.Custom('ES_DelDela')] [liege.GetTitledFirstName|l], e nada menos! Diante de mim está um[courtier.Custom('ES_XA')] [courtier.GetWomanMan], [courtier.Custom('quirk_pos_pp')].\n\n“Algumas palavras, [ROOT.Char.Custom('FormOfAddressForLiege')]. Dizem que tendes interesse em noss[liege.Custom('ES_OA')] soberan[liege.Custom('ES_OA')] comum... Eu [liege.GetHerHim] conheço. Todos na corte [liege.GetHerHim] conhecem. A força de um segredo é a de seu elo mais fraco”, ele/ela sorri.\n\n“Proponho um segredo em troca de outro segredo”."
 ep3_landless_admin.1030.a: "\"O que te impede de divulgar #EMP meus#! segredos!?\""
 ep3_landless_admin.1030.b: "\"Uma[courtier.Custom('ES_XA')] [courtier.GetWomanMan] sem honra não merece recompensa\"."
 ep3_landless_admin.1030.c: "\"Que oferta interessante...\""
 ep3_landless_admin.1030.d: "\"Minha gratidão deveria ser pagamento suficiente.\""
 ep3_landless_admin.1030.d.success: "Você convence [courtier.GetShortUIName]"
 ep3_landless_admin.1030.d.failure: "[courtier.GetShortUIName] está desapontado"
 ep3_landless_admin.1030.e: "\"Não me envolva nisso.\""
 ep3_no_secrets_modifier: "Sem Segredos"
 ep3_no_secrets_modifier_desc: "Este personagem é muito cauteloso com seus segredos."
 ep3_landless_admin.1040.t: "Próximo na Linha"
 ep3_landless_admin.1040.desc.intro: "O ar está denso com o aroma das flores e caminho junto [spymaster.Custom('ES_AlAla')] [spymaster.GetTitledFirstName|l] perto de um pequeno riacho, brilhante e límpido.\n\n\"Já pensou nisso, [ROOT.Char.Custom('FormOfAddressForLiege')]? Que [rival.Custom('ES_ElLa')] [rival.GetTitledFirstName|l] está perigosamente perto de [my_title.GetName]. Alguns dizem que [rival.GetFirstName] já vem planejando seus éditos…\".\n\n\"Mas não precisa ser assim. Os rumores são baratos\".\n\n"
 ep3_landless_admin.1040.desc.child: "Meu próprio filho... posso me atrever a fazer isso?"
 ep3_landless_admin.1040.desc.spouse: "Meu próprio cônjuge... prometi estar sempre ao seu lado."
 ep3_landless_admin.1040.desc.family: "Sangue do meu sangue... não deveria eu te proteger?"
 ep3_landless_admin.1040.a: "\"Rumores! Se não é a coisa que eu faço melhor!\""
 ep3_landless_admin.1040.b: "\"Bem, isso é lamentável. Estarei em meus aposentos.\""
 ep3_landless_admin.1040.c: "\"Vale a pena tentar.\""
 ep3_landless_admin.1040.d: "Mas vocês não ouviram… que [rival.GetFirstName] é #EMP indign[rival.Custom('ES_OA')]#!?"
 ep3_landless_admin.1040.d.success: "Você prejudica a candidatura de [rival.GetShortUIName]"
 ep3_landless_admin.1040.d.failure: "Sua influência diminui"
 ep3_landless_admin.1040.e: "\"Deixe os dados caírem onde puderem.\""
 ep3_landless_admin.1040.tt: "A pontuação de candidato de [rival.GetShortUIName] para [my_title.GetName] diminui em #negative_value [EmptyScope.ScriptValue('appointment_score_medium_value')|0]#!"
 ep3_well_rested_modifier: "Bem Descansado"
 ep3_well_rested_modifier_desc: "Este personagem decidiu priorizar seu descanso em relação à política."
 ep3_landless_admin.1050.t: "Logo Abaixo de Nós"
 ep3_landless_admin.1050.desc.intro: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U]!\", me alcança [servant.Custom('ES_ElLa')] [servant.GetTitledFirstName|l]; o suor escorre pela sua testa enquanto caminhamos. \"Os trabalhadores encontraram uns túneis sob"
 ep3_landless_admin.1050.desc.prison: "a cela da prisão."
 ep3_landless_admin.1050.desc.servants: "os aposentos dos servos."
 ep3_landless_admin.1050.desc.wine: "a adega."
 ep3_landless_admin.1050.desc.outro: "E se estendem em todas as direções\".\n\nO que vejo é impressionante. Não é algo que qualquer um dos nossos pedreiros poderia ter construído.\n\nHá uma presença muito antiga nestas paredes... pedra tão antiga que se esfarela."
 ep3_landless_admin.1050.a: "Quem... quem construiu isso!?"
 ep3_landless_admin.1050.b: "Seria uma pena se alguém se perdesse lá dentro..."
 ep3_landless_admin.1050.c: "Não podemos arriscar que nossos prisioneiros escapem."
 ep3_landless_admin.1050.c.success: "Você reforça sua prisão"
 ep3_landless_admin.1050.c.failure: "Seus esforços não dão frutos"
 ep3_landless_admin.1050.d: "Deve haver um tesouro lá embaixo!"
 ep3_landless_admin.1050.d.success: "Você encontra algo"
 ep3_landless_admin.1050.e: "Podemos usar isso para #EMP nossos#! agentes..."
 ep3_landless_admin.1050.e.success: "Você limpa os destroços dos túneis"
 ep3_landless_admin.1050.f: "Deixe como está."
 SCHEME_SECRET_DOMICILE_TUNNEL: "Você pode usar seus túneis secretos: $VALUE|+0=$"
 ep3_secret_tunnels_abduct: "Seus [schemes|lE] [GetScheme('abduct').GetTypeName|l] terá uma [success_chance|lE] maior"
 ep3_tunnel_investigation_modifier: "Investigação de Túneis"
 ep3_tunnel_investigation_modifier_desc: "Este personagem descobriu alguns túneis sob sua propriedade e decidiu investigá-los."
 ep3_tunnel_prison_modifier: "Ninguém Sai"
 ep3_tunnel_prison_modifier_desc: "Este personagem reforçou sua prisão."
 ep3_tunnel_servants_modifier: "Atalho Rápido"
 ep3_tunnel_servants_modifier_desc: "Este personagem usa os túneis sob sua propriedade como um atalho."
