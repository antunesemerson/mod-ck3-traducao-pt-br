 ep3_admin_events.0001.intro: "Chegaram notícias [liege.Custom('ES_DelDela')] [liege.GetTitledFirstName|l] por meio de um[scribe.Custom('ES_OA')] de seus escriba[scribe.Custom('ES_OA')]s: é hora de uma mudança.\n\nA pessoa [scribe.Custom('quirk_pos_present')] antes de ler o édito:\n\n"
 ep3_admin_events.0001.tribal: ""Devemos adotar os costumes tribais. O prestígio é a ferramenta mais importante que um governante possui. Saques, combates, duelos. [liege.Custom('ES_ElLa')|U] [liege.GetTitleAsNameNoTooltip|l] insta seus súditos a se tornarem homens e mulheres de honra admirável"."
 ep3_admin_events.0001.feudal: "«É a lealdade entre os homens que mantém os impérios fortes, não alguns documentos espalhados. [liege.Custom('ES_ElLa')|U] [liege.GetTitleAsNameNoTooltip|l] vos roga sua amizade e lealdade e, em troca, cuidará da sua segurança como [Select_CString( ROOT.Char.IsFemale, 'vasalla suya', 'vasallo suyo' )]»."
 ep3_admin_events.0001.clan: "\"Um reino é governado por famílias. Somos apenas tão fortes quanto nosso elo mais fraco. A terra é apenas um reflexo de nossas casas: uma casa unida nos levará à glória.\""
 ep3_admin_events.0001.fallback: "\"Os antigos modos de nossa administração se foram.\""
 ep3_admin_events.0001.a: "Como isso afeta #EMP eu#!?"
 ep3_admin_events.0001.b: "Preciso preparar tantos documentos."
 ep3_admin_events.0001.c: "Nada mudará."
 ep3_admin_change_love: "Abraçar a Mudança"
 ep3_admin_change_love_desc: "Este personagem não se importa com as implicações da mudança governamental."
 ep3_admin_change_hate: "Controlar a Mudança"
 ep3_admin_change_hate_desc: "Este personagem se importa profundamente com as implicações da mudança governamental."
 ep3_admin_events.0002.t: "[ROOT.Char.Custom('ES_ElLa')|U] [ROOT.Char.GetTitleAsNameNoTooltip|l] de [governor_title.GetNameNoTierNoTooltip]"
 ep3_admin_events.0002.liege: "[ROOT.Char.GetLiege.Custom('ES_ElLa')|U] [ROOT.Char.GetLiege.GetTitleAsName|l], em sua infinita sabedoria decidiu que a governança de [governor_title.GetTierAsNameNoTooltip] do país [governor_title.GetAdjective] deve recair sobre mim."
 ep3_admin_events.0002.house_dead: "Com o falecimento do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('previous_governor'))], [previous_governor.Custom('ES_ElLa')] [previous_governor.GetTitledFirstName], que [previous_governor.GetDeathReasonHideKiller] , foi anunciado que o governo do [governor_title.GetTierAsNameNoTooltip] [governor_title.GetAdjective] agora passa para mim."
 ep3_admin_events.0002.house_alive: "Com a redistribuição do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('previous_governor'))] [previous_governor.Custom('ES_ElLa')] [previous_governor.GetTitledFirstName], foi anunciado que o governo do [governor_title.GetTierAsNameNoTooltip] do [governor_title.GetAdjective] agora recai sobre mim."
 ep3_admin_events.0002.dead: "Com o falecimento [previous_governor.Custom('ES_DelDela')] [previous_governor.GetTitledFirstName], que [previous_governor.GetDeathReasonHideKiller] , foi anunciado que a governança do [governor_title.GetTierAsNameNoTooltip] do [governor_title.GetAdjective] agora recai sobre mim."
 ep3_admin_events.0002.alive: "Com a redistribuição de [previous_governor.Custom('ES_DelDela')] [previous_governor.GetTitledFirstName], foi anunciado que a governança do [governor_title.GetTierAsNameNoTooltip] do/a [governor_title.GetAdjective] passou para mim."
 ep3_admin_events.0002.new: "[ROOT.Char.GetLiege.Custom('ES_ElLa')|U] [ROOT.Char.GetLiege.GetTitledFirstName|l] anunciou que ele me confiou a governança do [governor_title.GetTierAsNameNoTooltip] do país [governor_title.GetAdjective]"
 ep3_admin_events.0002.house: "Agora cabe a mim garantir a contínua governança da Casa [ROOT.Char.GetHouse.GetBaseName] nesta província."
 ep3_admin_events.0002.appointment_succession: "Longas noites de fazer campanha e pedir favores finalmente deram resultado. Disseram-me que minha escolha como [Select_CString( ROOT.Char.IsFemale, 'la nueva', 'el nuevo' )] [ROOT.Char.GetTitleAsNameNoTooltip] era praticamente uma conclusão inevitável."
 ep3_admin_events.0002.appointment: "[ROOT.Char.GetLiege.Custom('ES_ElLa')|lU] [ROOT.Char.GetLiege.GetTitledFirstNameNoTooltip|l] ordenou pessoalmente minha nomeação imediata por decreto imperial. Ninguém pode contestar minha nova posição no/a [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip|l]."
 ep3_admin_events.0002.conquest: "As forças [previous_governor.Custom('ES_DelDela')] [previous_governor.GetTitledFirstNameNoTooltip|l] não foram rivais para minhas armas superiores, o que demonstrou minha maior legitimidade como defensor[ROOT.Char.Custom('ES_XA')] da província em nome de [ROOT.Char.GetTopLiege.Custom('ES_DelDela')] [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip]."
 ep3_admin_events.0002.desc: "\n\nApós receber minhas insígnias e fazer os juramentos de ofício, posso finalmente me mudar para minha sede provincial em [ROOT.Char.GetCapitalLocation.GetBaronyNameExplicitly] e começar meu mandato adequadamente."
 ep3_admin_events.0002.prosperity: "Devo desenvolver estas novas terras."
 ep3_admin_events.0002.inspection: "Preciso inspecionar as terras imediatamente."
 ep3_admin_events.0002.a: "Não há tempo a perder."
 ep3_admin_events.0002.tt: "Agora você é [Concept('governor',Select_CString(ROOT.Char.IsFemale,'la gobernadora', 'el gobernador'))|E] de [governor_title.GetName]"
 tgp_diligent_governor_modifier: "Governador diligente"
 tgp_diligent_governor_modifier_desc: "Este governador está desenvolvendo suas terras diligentemente."
 building_buildings_give_merit_tt: "Construir [buildings|El] em seus [holdings|El] é uma boa forma de que um [governor|El] aumente seu [merit|El] [merit_i]."
 ep3_admin_events.0002.tt_inspection: "Sua próxima [activity|El] de [GetActivityType('activity_feast').GetName|l] será grátis"
 inspections_give_merit_tt: "Usar a [activity|El] de [GetActivityType('activity_feast').GetName|l] é uma boa forma de que um [governor|El] aumente sua [merit|El] [merit_i]."
 ep3_admin_events.0004.t: "Administrativo Nunca Mais"
 ep3_admin_events.0004.desc: "Em uma reviravolta cruel e distorcida dos eventos, me vejo sem emprego e sem lar. #EMP Tudo#! pelo que trabalhei desapareceu em um instante.\n\nEu pego o que consigo carregar e olho para minha propriedade uma última vez."
 ep3_admin_events.0004.desc_spouse_upset: "\n\n [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('reacting_spouse'))] [reacting_spouse.GetFirstName] lança um olhar preocupado para mim. \"Eu tenho minhas coisas. Não faz sentido prolongar isso, suponho...\""
 ep3_admin_events.0004.desc_spouse_very_upset: "\n\n\"Como... Como isso pôde acontecer?!\" [reacting_spouse.GetShortUIName] chora alto atrás de mim. \"Perdemos tudo... O que eu devo fazer...\""
 ep3_admin_events.0004.a: "Vamos, [reacting_spouse.GetFirstName]. Fica tudo bem."
 ep3_admin_events.0004.b: "Sim, vamos."
 ep3_admin_events.0004.c: "Não há sentido em olhar para trás..."
 ep3_admin_events.0005.t: "Um Reino Só Meu"
 ep3_admin_events.0005.intro: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('messenger'))] , [messenger.GetShortUIName] me traz notícias funestas da capital.\n\n"
 ep3_admin_events.0005.desc_still_admin: "Nosso outrora grande senhorio j? n?o existe, e me encontro fora da influ?ncia de [gov_liege.GetFirstName], o que me deixa no comando de [ROOT.Char.GetPrimaryTitle.GetNameNoTier]. Al?m da minha independ?ncia e de ter carta branca, poucas coisas mudar?o. A burocracia est? enraizada em nosso modo de vida e assim continuar?."
 ep3_admin_events.0005.desc_lost_admin: "Como as circunstâncias se apresentaram, nosso grande reino foi perdido. E com ele, a burocracia que governava nosso modo de vida foi reduzida a cinzas. Não tenho outra escolha a não ser adaptar meu governo a essa nova realidade."
 ep3_admin_events.0005.a: "Vamos deixar o passado para trás e olhar para o futuro!"
 demand_admin_tribal: "[recipient.GetShortUIName|U] [Select_CString( recipient.IsLocalPlayer, 'eres', 'es' )] [tribal|lE] e somente os [governments|lE] assentados podem se converter em [Concept('administrative', 'administraciones')|E]"
