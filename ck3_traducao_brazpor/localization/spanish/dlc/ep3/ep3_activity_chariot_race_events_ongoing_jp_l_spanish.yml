l_spanish:
 #Befriend
 chariot_race_ongoing_jp.0100.t: "Espetáculo Compartilhado"
 chariot_race_ongoing_jp.0100.desc.intro: "Enquanto a multidão ruge impaciente, mantenho o olhar fixo em meu [ROOT.Char.Custom2('RelationToMeShort', intent_target)] [intent_target.Custom('ES_ElLa')] [intent_target.GetTitledFirstName|l]."
 chariot_race_ongoing_jp.0100.desc.courtier: "sentad[intent_target.Custom('ES_OA')] em uma arquibancada miserável na seção da corte."
 chariot_race_ongoing_jp.0100.desc.count: "sentad[intent_target.Custom('ES_OA')] em uma arquibancada modesta, salpicada de seus servos."
 chariot_race_ongoing_jp.0100.desc.duke: "sentado[intent_target.Custom('ES_OA')] entre sua comitiva, em uma das melhores arquibancadas."
 chariot_race_ongoing_jp.0100.desc.king: "rodeado[intent_target.Custom('ES_OA')] por sua comitiva, que se espalha por vários dos melhores camarotes."
 chariot_race_ongoing_jp.0100.desc.important: "sentad[intent_target.Custom('ES_OA')] tranquilamente no grande camarote [ROOT.Char.GetTopLiege.Custom('ES_DelDela')] [ROOT.Char.GetTopLiege.GetTitleAsName|l]."
 chariot_race_ongoing_jp.0100.desc.important_liege: "que está sentado de lado no meu camarote grandioso."
 chariot_race_ongoing_jp.0100.desc.liege: "ladeado[intent_target.Custom('ES_OA')] por confidentes em seu grande camarote."
 chariot_race_ongoing_jp.0100.desc.target_personality.fan: "Está empoleirad[intent_target.Custom('ES_OA')] na beirada do assento, aguardando a corrida com atenção extasiada."
 chariot_race_ongoing_jp.0100.desc.target_personality.wager: "Mais cedo, ouvi alguém dizer que [intent_target.GetSheHe] apostou uma grande quantia em [intent_target.MakeScope.Var('wager_target').Char.GetFirstName] da equipe [intent_target.Custom('GetChariotTeamColorPlural')] para [intent_target.Custom('GetWinPlaceShow')]."
 chariot_race_ongoing_jp.0100.desc.target_personality.bored: "[intent_target.GetSheHe|U] se abana languidamente, olhando para o Hipódromo com pouco interesse na corrida."
 chariot_race_ongoing_jp.0100.desc.target_personality.fallback: "[intent_target.GetSheHe|U] conversa com espectadores próximos enquanto comentam as perspectivas da corrida."
 chariot_race_ongoing_jp.0100.desc: "\n\nQuando as [Glossary( 'téthrippa', 'QUADRIGA_GLOSS')|l] passam velozmente diante de nossas arquibancadas, ele vira a cabeça para me acompanhar."
 chariot_race_ongoing_jp.0100.b.fan: "\"Honre seus patronos! Acene! O que vocês estão #EMP jogando#!?\""
 chariot_race_ongoing_jp.0100.b.wager: "\"Vamos, #EMP [intent_target.MakeScope.Var('wager_target').Char.GetFirstNameNoTooltip]#!! [intent_target.Custom('GetChariotTeamColorPlural')]! [intent_target.Custom('GetChariotTeamColorPlural')]!\""
 chariot_race_ongoing_jp.0100.b.bored: "Um bocejo bem cronometrado, seguido de uma revirada de olhos."
 chariot_race_ongoing_jp.0100.b: "Envie-lhe um bilhete."
 chariot_race_ongoing_jp.0100.b.tt.success: "[intent_target.GetFirstNameNoTooltip] gosta do seu estilo"
 chariot_race_ongoing_jp.0100.b.tt.neutral: "[intent_target.GetFirstNameNoTooltip] te ignora"
 chariot_race_ongoing_jp.0100.b.tt.failure: "[intent_target.GetFirstNameNoTooltip] te rejeita"
 chariot_race_ongoing_jp.0100.d.best.tt: "[intent_target.Custom('ES_ElLa')|U] [intent_target.GetTitledFirstName|l] já tem um dos melhores assentos"
 chariot_race_ongoing_jp.0100.d.better.tt: "[intent_target.Custom('ES_ElLa')|U] [intent_target.GetTitledFirstName|l] já tem um assento melhor que o seu"
 chariot_race_ongoing_jp.0100.d: "Vou fazer sinal para que se aproxime, estes assentos são melhores!"
 chariot_race_ongoing_jp.0100.d.host_flavor: "Quem poderia resistir a um assento no Kathisma?"
 chariot_race_ongoing_jp.0100.d.tt.success: "[intent_target.GetFirstNameNoTooltip] está encantado[intent_target.Custom('ES_OA')]"
 chariot_race_ongoing_jp.0100.d.tt.partial_success: "[intent_target.GetFirstNameNoTooltip] se sente lisonjead[intent_target.Custom('ES_OA')]"
 chariot_race_ongoing_jp.0100.d.tt.failure: "[intent_target.GetFirstNameNoTooltip] está apenas grato"
 chariot_race_ongoing_jp.0100.d.tt.critical_failure: "[intent_target.GetFirstNameNoTooltip] te ignora"
 chariot_race_ongoing_jp.0100.e: "Um aceno de reconhecimento deve bastar."
 chariot_race_ongoing_jp.0100.e.host: "Um aceno de reconhecimento pode ir longe."
 chariot_race_ongoing_jp.0200.t: "Mistura Imperial"
 chariot_race_ongoing_jp.0200.desc.intro: "Misturando-se pelas arquibancadas está uma multidão de vassalos imperiais, oficiais e seguidores, todos supostamente aqui para desfrutar de uma corrida. Na verdade, este é um dos melhores lugares do império para fechar acordos, expandir sua influência e talvez subir na hierarquia.\n\n [ROOT.Char.Custom2('RelationToMeShort', other)], [other.GetFirstName],"
 chariot_race_ongoing_jp.0200.desc.same_rank_ruler: "outro[other.Custom('ES_OA')] [other.GetTitleAsName|l] a serviço [other.GetTopLiege.Custom('ES_DelDela')] [other.GetTopLiege.GetTitleAsNameNoTooltip|l], $chariot_race_ongoing_jp.0200.desc.party_intro$apresentando uma oportunidade para tratar #EMP asuntos urgentes#! os quais enfrentam [ROOT.Char.GetPrimaryTitle.GetNameNoTier] e [other.GetPrimaryTitle.GetNameNoTier]."
 chariot_race_ongoing_jp.0200.desc.same_rank_courtier: "um[other.Custom('ES_XA')] colega arrivista que espera sua chance senta-se perto; talvez possamos nos beneficiar mutuamente…"
 chariot_race_ongoing_jp.0200.desc.higher_rank: "$chariot_race_ongoing_jp.0200.desc.landed_intro$ $chariot_race_ongoing_jp.0200.desc.party_intro$ e, embora não seja ninguém de grande importância no reino, [other.GetPrimaryTitle.GetNameNoTier] pode ainda dar #EMP algo#! útil para [ROOT.Char.GetPrimaryTitle.GetNameNoTier]…"
 chariot_race_ongoing_jp.0200.desc.lower_rank: "$chariot_race_ongoing_jp.0200.desc.landed_intro$ $chariot_race_ongoing_jp.0200.desc.party_intro$ apresentando uma rara oportunidade de se aproximar dos poderosos — [other.GetPrimaryTitle.GetNameNoTier] tem #EMP muito#! mais influência no império do que [ROOT.Char.GetPrimaryTitle.GetNameNoTier]."
 chariot_race_ongoing_jp.0200.desc.lower_rank_courtier: "um[other.Custom('ES_XA')] simples arrivista à espera de uma oportunidade, senta-se por perto — embora até a mais ignóbil das feras seja conhecida por ter utilidade..."
 chariot_race_ongoing_jp.0200.desc.landed_intro: "um[other.Custom('ES_XA')] [other.GetTitleAsName|l] a servi?o [other.GetTopLiege.Custom('ES_DelDela')] [other.GetTopLiege.GetTitleAsNameNoTooltip|l],"
 chariot_race_ongoing_jp.0200.desc.party_intro: "reivindicou uma arquibancada próxima para seu grupo,"
 chariot_race_ongoing_jp.0200.a: "Tenho certeza de que podemos aprender muito um com o outro."
 chariot_race_ongoing_jp.0200.b: "Não poderia ter pedido [Select_CString( other.IsFemale, 'uma vizinha', 'um vizinho' )] melhor!"
 chariot_race_ongoing_jp.0200.b.success: "[other.GetFirstNameNoTooltip] está encantado[other.Custom('ES_OA')]"
 chariot_race_ongoing_jp.0200.b.partial_success: "[other.GetFirstNameNoTooltip] está satisfeit[other.Custom('ES_OA')]"
 chariot_race_ongoing_jp.0200.b.failure: "[other.GetFirstNameNoTooltip] está perplexo[other.Custom('ES_OA')]"
 chariot_race_ongoing_jp.0200.c: "É uma bênção ter [Select_CString( other.IsFemale, 'uma vizinha', 'um vizinho' )] tão bonit[other.Custom('ES_OA')]."
 chariot_race_ongoing_jp.0200.c.success: "[other.GetFirstNameNoTooltip] está encantado[other.Custom('ES_OA')]"
 chariot_race_ongoing_jp.0200.c.partial_success: "[other.GetFirstNameNoTooltip] está satisfeito[other.Custom('ES_OA')]"
 chariot_race_ongoing_jp.0200.c.failure: "[other.GetFirstNameNoTooltip] está perplexo[other.Custom('ES_OA')]"
 chariot_race_ongoing_jp.0200.d: "Linhas de crédito são sempre apreciadas."
 chariot_race_ongoing_jp.0200.d.tt: "Seu [rank|lE] deve ser diferente do [other.Custom('ES_DelDela')] [other.GetTitledFirstName|l]"
 chariot_race_ongoing_jp.0200.e: "Dívida abre muitas portas, se bem administrada."
 chariot_race_ongoing_jp.0200.f: "Um bom lugar para negociar segredos."
 chariot_race_ongoing_jp.0200.f.available_tt: "Esta opção está disponível devido ao seu conhecimento do [secret|lE] de [given_secret.GetName] [given_secret.GetOwner.Custom('ES_DelDela')] [given_secret.GetOwner.GetTitledFirstName|l]"
 chariot_race_ongoing_jp.0200.f.tt: "Em troca, [other.Custom('ES_ElLa')] [other.GetTitledFirstName|l] pode revelar a você um [secret|lE]"
 chariot_race_ongoing_jp.0200.f.success: "[other.Custom('ES_ElLa')|U] [other.GetTitledFirstName|l] troca um segredo"
 chariot_race_ongoing_jp.0200.f.failure: "[other.Custom('ES_ElLa')|U] [other.GetTitledFirstName|l] não revela nada"
 chariot_race_ongoing_jp.0200.g: "Mi servicio podría abrirle puertas."
 chariot_race_ongoing_jp.0200.h: "Prefiro apenas assistir à corrida."
 chariot_race_ongoing_jp.0201.t: "Sociedade Selecionada"
 chariot_race_ongoing_jp.0201.desc.intro: "Enquanto as multidões abarrotam as arquibancadas e a nobreza serpenteia por suas áreas privilegiadas, felizmente, aqui no [Glossary( 'Kathisma', 'KATHISMA_GLOSS')|l] podemos desfrutar de alguma tranquilidade. Servos com todo tipo de refresco aguardam nossos caprichos enquanto os cocheiros exercem seu perigoso ofício lá embaixo.\n\n"
 chariot_race_ongoing_jp.0201.desc.emperor: "Entre os que se juntam a mim em meu camarote está meu [ROOT.Char.Custom2('RelationToMeShort', other)], [other.Custom('ES_ElLa')] [other.GetTitledFirstName|l], que claramente desfruta de seu acesso privilegiado a mim e do que isso comunica."
 chariot_race_ongoing_jp.0201.desc.other_emperor: "Tenho sorte de ter um assento próprio no reservado [ROOT.Char.GetTopLiege.Custom('ES_DelDela')] [ROOT.Char.GetTopLiege.GetTitleAsNameNoTooltip|l]: uma oportunidade cobiçada para conquistar o favor de minha [ROOT.Char.Custom2('RelationToMeShort', other)]."
 chariot_race_ongoing_jp.0201.desc.other: "Entre os demais agraciados com esse acesso está meu [ROOT.Char.Custom2('RelationToMeShort', other)] , [other.Custom('ES_ElLa')] [other.GetTitledFirstName|l], que está sentado por perto e claramente aprecia a exclusividade."
 chariot_race_ongoing_jp.0201.desc: "Talvez queira conversar..."
 chariot_race_ongoing_jp.0201.a: "Estas são as melhores pessoas."
 chariot_race_ongoing_jp.0201.b: "Venha, [other.GetFirstNameNoTooltip], sente-se ao meu lado."
 chariot_race_ongoing_jp.0201.b.tt: "Esta opção está disponível porque você é [THIS.Char.Custom('ES_ElLa')] [THIS.Char.GetTitleAsNameNoTooltip|Vl]"
 chariot_race_ongoing_jp.0201.c: "Um bom lugar para negociar segredos."
 chariot_race_ongoing_jp.0201.d: "Acho que deveríamos ter o camarote só para nós, na verdade."
 chariot_race_ongoing_jp.0201.e: "Conversar em vez de apreciar esta vista seria uma tragédia."
 chariot_race_ongoing_jp.0201.f: "Esta é a melhor companhia!"
 chariot_race_ongoing_jp.0201.h: "Você está radiante hoje, [other.GetFirstNameNoTooltip]."
 chariot_race_ongoing_jp.0300.t: "Adquirindo Acesso"
 chariot_race_ongoing_jp.0300.desc.intro: "Embora nós, da nobreza, tenhamos as melhores arquibancadas do Hipódromo, elas não são nada em comparação com os assentos de destaque do [Glossary( 'Kathisma', 'KATHISMA_GLOSS')|l] e com tudo o que ele representa.\n\nAlém da família próxima, sabe-se que [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip|l] permite o acesso a eles a quem esteja em seu favor ou, caso contrário, a quem [host.Custom('ES_LeLa')] pode obrigá-lo a isso…"
 chariot_race_ongoing_jp.0300.a: "Eu simplesmente #EMP pedirei#!."
 chariot_race_ongoing_jp.0300.a.tt: "[THIS.Char.GetShortUIName|U] [Select_CString( THIS.Char.IsLocalPlayer, 'entrarás', 'entrará' )] no catisma"
 chariot_race_ongoing_jp.0300.a.success: "[host.GetFirstNameNoTooltip] concede acesso"
 chariot_race_ongoing_jp.0300.a.failure: "[host.GetFirstNameNoTooltip] recusa"
 chariot_race_ongoing_jp.0300.b: "Um presente pode abrir muitas portas."
 chariot_race_ongoing_jp.0300.b.success: "[host.Custom('ES_ElLa')|U] [host.GetTitleAsNameNoTooltip|l] aceita"
 chariot_race_ongoing_jp.0300.b.failure: "[host.Custom('ES_ElLa')|U] [host.GetTitleAsNameNoTooltip|l] se recusa"
 chariot_race_ongoing_jp.0300.c: "Felizmente, [host.GetSheHe] #EMP me deve#!."
 chariot_race_ongoing_jp.0300.d: "Bah, não vou me rebaixar."
 chariot_race_ongoing_jp.0301.t: "Solicitando Acesso"
 chariot_race_ongoing_jp.0301.desc.intro: "Embora a nobreza tenha os melhores camarotes do Hipódromo, eles não são nada em comparação com os assentos de destaque do [Glossary( 'Kathisma', 'KATHISMA_GLOSS')|l] e tudo o que ele representa.\n\nTodos cobiçam um lugar aqui em cima, e parece que ninguém mais do que [weasel.GetName]."
 chariot_race_ongoing_jp.0301.desc.ask: "que colocou um bilhete de súplica nas mãos do guarda do palácio..."
 chariot_race_ongoing_jp.0301.desc.gold: "\n\nEmbora eu tenha ouvido que [weasel.GetSheHe] é bastante ric[weasel.Custom('ES_OA')]."
 chariot_race_ongoing_jp.0301.desc.hook: "que está exercendo minha dívida com [weasel.GetSheHe] com a típica grosseria..."
 chariot_race_ongoing_jp.0301.a: "Tudo bem, deixemos[weasel.GetHerHim] entrar."
 chariot_race_ongoing_jp.0301.b: "Tais privilégios vêm com certos custos..."
 chariot_race_ongoing_jp.0301.b.success: "[weasel.Custom('ES_ElLa')|U] [weasel.GetTitledFirstName|l] vomita"
 chariot_race_ongoing_jp.0301.b.failure: "[weasel.Custom('ES_ElLa')|U] [weasel.GetTitledFirstName|l] se recusa"
 chariot_race_ongoing_jp.0301.b.tt: "[weasel.Custom('ES_ElLa')|U] [weasel.GetTitledFirstName|l] não pode se dar ao luxo de oferecer um presente #weak ([THIS.Char.MakeScope.ScriptValue('minor_gold_value')|0] @gold_icon!)#!"
 chariot_race_ongoing_jp.0301.c: "Suponho que não tenho muita escolha..."
 chariot_race_ongoing_jp.0301.d: "Não acho que seja uma boa ideia."
 chariot_race_ongoing_jp.0400.t: "Outra Volta"
 chariot_race_ongoing_jp.0400.intro: "Os atendentes abaixam o marcador de golfinho [ROOT.Char.Custom('GetChariotMiddlingLapCount')] enquanto [first_place_charioteer.GetFirstName], da [first_place_charioteer.Custom('GetChariotTeamColorPlural')],"
 chariot_race_ongoing_jp.0400.intro_flavor1: "passa em disparada pelas brilhantes estátuas de antigos cocheiros, levantando brevemente o braço com o chicote em um triunfo prematuro."
 chariot_race_ongoing_jp.0400.intro_flavor2: "contorna a barreira, mal conseguindo se manter de pé, e faz com que os gritos frenéticos das massas atinjam novos níveis."
 chariot_race_ongoing_jp.0400.intro_flavor3: "impulsiona sua equipe de cavalos furiosamente à frente, com o chicote piscando como um instrumento de [ROOT.Char.GetFaith.HighGodName]."
 chariot_race_ongoing_jp.0400.intro_flavor4: "passa rapidamente por eles, lançando um olhar sobre o ombro, que é uma mistura de escárnio e preocupação."
 chariot_race_ongoing_jp.0400.intro_flavor5: "derrapa na curva. As seções que não tossem sob a grande nuvem de poeira que levantou explodem de alegria."
 chariot_race_ongoing_jp.0400.second1: "\n\n[second_place_charioteer.GetFirstName] segue de perto,"
 chariot_race_ongoing_jp.0400.second2: "\n\nSó a poucos metros atrás vêm os cavalos de [second_place_charioteer.GetFirstName] levantando a mesma areia,"
 chariot_race_ongoing_jp.0400.second3: "\n\n[second_place_charioteer.GetFirstName] está apenas ligeiramente atrás e ainda pode encurtar a distância,"
 chariot_race_ongoing_jp.0400.second4: "\n\nQuase diretamente atrás de [first_place_charioteer.GetSheHe], seguem os garanhões impacientes de [second_place_charioteer.GetFirstName],"
 chariot_race_ongoing_jp.0400.second5: "\n\n[second_place_charioteer.GetFirstName] está um pouco atrás, mas de forma alguma está perdido,"
 chariot_race_ongoing_jp.0400.third1: "e é perseguid[second_place_charioteer.Custom('ES_OA')] de perto por um [third_place_charioteer.GetFirstName] muito decidid[third_place_charioteer.Custom('ES_OA')] ."
 chariot_race_ongoing_jp.0400.third2: "enquanto [third_place_charioteer.GetFirstName] segue atrás, procurando uma oportunidade."
 chariot_race_ongoing_jp.0400.third3: "enquanto [third_place_charioteer.GetFirstName] está logo atrás, com os cavalos aparentemente à distância de uma mordida."
 chariot_race_ongoing_jp.0400.third4: "enquanto [third_place_charioteer.GetFirstName] persegue impacientemente, pressionando por uma oportunidade de ultrapassar."
 chariot_race_ongoing_jp.0400.third5: "enquanto [third_place_charioteer.GetFirstName] se aproxima lentamente, desesperad[third_place_charioteer.Custom('ES_OA')] por ultrapassar."
 chariot_race_ongoing_jp.0400.winning_place: "\n\nGrande [ROOT.Char.GetFaith.FateGodName]! Se [wager_target.GetFirstNameNoTooltip] puder apenas manter sua posição!"
 chariot_race_ongoing_jp.0400.losing_place: "\n\nGrande [ROOT.Char.GetFaith.FateGodName]! O que você está fazendo na posição #EMP [wager_target.Custom('GetChariotRacePlacement')]#!, [wager_target.GetFirstNameNoTooltip]?!"
 chariot_race_ongoing_jp.0400.out: "\n\nSó posso refletir tristemente sobre minha aposta lamentável em [wager_target.GetFirstName]..."
 chariot_race_ongoing_jp.0400.a: "#EMP Vamos lá, [wager_target.GetFirstNameNoTooltip]#!!"
 chariot_race_ongoing_jp.0400.b: "Na próxima vez, apostarei melhor, com certeza..."
 chariot_race_ongoing_jp.0400.c: "Que corrida!"
 chariot_race_ongoing_jp.0400.d: "#EMP Vai! [wager_target.GetWomanMan], VAI!#!"
 chariot_race_ongoing_jp.0500.t: "Exibindo-se"
 chariot_race_ongoing_jp.0500.intro: "Todos os olhares estão voltados para a quadriga de [first_place_charioteer.GetFirstName] e a liderança firme que abre caminho,"
 chariot_race_ongoing_jp.0500.first: "e está claro que é[evil_knievel.Custom('ES_EA')] [evil_knievel.GetWomanMan] ele sabe disso, pois"
 chariot_race_ongoing_jp.0500.last: "quando [evil_knievel.GetFirstName], muito atrás em último lugar,"
 chariot_race_ongoing_jp.0500.high: "quando [evil_knievel.GetFirstName], não muito atrás,"
 chariot_race_ongoing_jp.0500.middle: "quando [evil_knievel.GetFirstName], perdid[evil_knievel.Custom('ES_OA')] no meio,"
 chariot_race_ongoing_jp.0500.low: "quando [evil_knievel.GetFirstName], ficando para trás com os perdedores,"
 chariot_race_ongoing_jp.0500.trick_flavor1: "de repente salta para a frente de seu carro, dirigindo com uma mão enquanto acena para as arquibancadas!"
 chariot_race_ongoing_jp.0500.trick_flavor2: "salta dentro da carruagem e, de costas, continua a dirigir enquanto manda beijos para as arquibancadas!"
 chariot_race_ongoing_jp.0500.trick_flavor3: "salta para fora da carruagem e sobe nas costas de seu cavalo líder, com o braço levantado em triunfo!"
 chariot_race_ongoing_jp.0500.trick_flavor4: "salta para fora da carruagem e sobe nas costas de seu cavalo líder, acenando para as arquibancadas!"
 chariot_race_ongoing_jp.0500.filler: "\n\nAs massas rugem de alegria"
 chariot_race_ongoing_jp.0500.overtake: "mas [overtaking_charioteer.GetFirstName] não fica tão impressionado; ao ver a oportunidade, ele rapidamente ultrapassa para o [overtaking_charioteer.Custom('GetChariotRacePlacement')] lugar."
 chariot_race_ongoing_jp.0500.maintained: "enquanto [evil_knievel.GetFirstNameNoTooltip] de alguma forma mantém sua posição, impedindo as ultrapassagens, apesar de tudo!"
 chariot_race_ongoing_jp.0500.maintained_last: "parece que [evil_knievel.GetFirstNameNoTooltip] querer #EMP algo#! de glória, embora termine em último lugar."
 chariot_race_ongoing_jp.0500.dead: "Os aplausos atingem o auge, quando [evil_knievel.GetFirstName] de repente perde o equilíbrio! Um emaranhado de madeira, carne de cavalo e poeira rola pela areia e colide com as barreiras..."
 chariot_race_ongoing_jp.0500.alive: "[evil_knievel.GetFirstName] retorna graciosamente ? posi??o habitual de um auriga, sorrindo como [Select_CString( evil_knievel.IsFemale, 'uma rainha', 'um rei' )] enquanto o Hip?dromo vibra."
 chariot_race_ongoing_jp.0500.alive_overtaken: "[evil_knievel.GetFirstName] retorna apressadamente à posição correta, sacudindo o punho para seu ultrapassador."
 chariot_race_ongoing_jp.0500.loss_dead: "\n\nEnterro o rosto nas palmas das mãos… \"Seu idiota, [evil_knievel.GetFirstNameNoTooltip]…!"
 chariot_race_ongoing_jp.0500.loss: "\n\nEu olho em descrença. 'Seu #EMP tolo#!, [evil_knievel.GetFirstNameNoTooltip]!'"
 chariot_race_ongoing_jp.0500.gain: "\n\nHa! Isso vai ensinar [evil_knievel.Custom('ES_ElLa')] a bancar o bobo."
 chariot_race_ongoing_jp.0500.a: "Que bravura!"
 chariot_race_ongoing_jp.0500.b: "Oh #EMP [ROOT.Char.GetFaith.HighGodName]#!!"
 chariot_race_ongoing_jp.0500.c: "Ha! Fique de olho no prêmio, [overtaking_charioteer.GetFirstNameNoTooltip]!"
 chariot_race_ongoing_jp.0500.d: "Maldit[evil_knievel.Custom('ES_OA')] #EMP imbécil#! é, [evil_knievel.GetFirstNameNoTooltip]!"
 chariot_race_ongoing_jp.0600.t: "Bolsos Vazios"
 chariot_race_ongoing_jp.0600.intro: "Assim que [Select_CString( bookmaker.IsFemale, 'a corredora', 'o corredor' )] de apostas, [bookmaker.Custom('ES_ElLa')] [bookmaker.GetTitledFirstName|l], partiu, com sua bolsa que tilinta feliz com todo o dinheiro que tanto me custou ganhar, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('castigator'))], [castigator.Custom('ES_ElLa')] [castigator.GetTitledFirstName|l], grita incrédulo:\n\n #EMP Oh…!#! Pelo #EMP amor#!, [castigator.Custom2('RelationToMeShort', ROOT.Char)]!"
 chariot_race_ongoing_jp.0600.kathisma: "Um silêncio cai sobre o [Glossary( 'kathisma', 'KATHISMA_GLOSS')] enquanto as taças caem e as cabeças se voltam."
 chariot_race_ongoing_jp.0600.stands: "Um silêncio toma conta das arquibancadas circundantes enquanto todos se voltam para admirar esta explosão."
 chariot_race_ongoing_jp.0600.desc: "\n\n«Não me digam! Vocês estão apostando #EMP todo#! o dinheiro todo, não é?», continua [castigator.Custom('quirk_neg_adverb')]. «Não vai sobrar nada! E se surgir algum #EMP imprevisto#!?! [Select_CString( bookmaker.IsFemale, 'La corredora', 'El corredor' )] de apostas sai de vista, recuando sob o olhar penetrante de [castigator.GetFirstNameNoTooltip]."
 chariot_race_ongoing_jp.0600.a: "Ah, dê o fora, [castigator.GetFirstNameNoTooltip]! Estou tentando assistir à corrida!"
 chariot_race_ongoing_jp.0600.b: "Acho que eu poderia reduzir minha aposta..."
 halve_wager_effect_tt: "Sua aposta é #M reduzida pela metade#!"
 chariot_race_ongoing_jp.0600.c: "Você está #EMP cert!#! Rápido! Traga [bookmaker.GetFirstNameNoTooltip] de volta!"
 cancel_wager_effect_tt: "Sua aposta foi #N cancelada#!"
