l_spanish:
 ep3_yearly.1010.t: "Hipomania"
 ep3_yearly.1010.intro: "#EMP Cataclop, cataclop.#!\n\nMontad[horse_owner.Custom('ES_OA')] em sua montaria, [horse_owner.Custom('WarhorseStoryName')], meu colega governador[horse_owner.Custom('ES_XA')], [horse_owner.Custom('ES_ElLa')] [horse_owner.GetTitledFirstName|l], trota orgulhosamente pelo pátio. Sua [horse_owner.Custom('HorseStoryMareStallion')] se pavoneia com orgulho, sempre ciente de sua ilustre linhagem.\n\n[horse_owner.GetFirstNameNoTooltip] é a inveja de todos os governadores de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetBaseNameNoTooltip]... e eu não sou exceção."
 ep3_yearly.1010.greek_flavor: "O [Glossary( 'Hipperos', 'HIPPEROS_GLOSS' )] está profundamente enraizado na tradição grega."
 ep3_yearly.1010.outro: "\n\n[horse_owner.Custom('WarhorseStoryName')] deve ser meu! Mas como?"
 ep3_yearly.1010.a: "Talvez o preço certo persuada [horse_owner.GetFirstNameNoTooltip]..."
 ep3_yearly.1010.a.tt.success: "[horse_owner.Custom('ES_ElLa')|U] [horse_owner.GetTitledFirstNameNoTooltip|l] aceita sua oferta"
 ep3_yearly.1010.a.tt.failure: "[horse_owner.Custom('ES_ElLa')|U] [horse_owner.GetTitledFirstNameNoTooltip|l] rejeita sua oferta"
 ep3_yearly.1010.b: "[horse_owner.Custom('WarhorseStoryName')] é apropriado para alguém de posição mais elevada."
 ep3_yearly.1010.b.tt.success: "[horse_owner.Custom('ES_ElLa')|U] [horse_owner.GetTitledFirstNameNoTooltip|l] cede à sua influência"
 ep3_yearly.1010.b.tt.failure: "[horse_owner.Custom('ES_ElLa')|U] [horse_owner.GetTitledFirstNameNoTooltip|l] rejeita sua oferta"
 ep3_yearly.1010.c: "\"[spymaster.GetFirstNameNoTooltip], este cavalo será meu — por quaisquer meios necessários.\""
 ep3_yearly.1010.c.flavor: "Você encarrega seu chefe[spymaster.Custom('ES_EA')] de espiões, [spymaster.Custom('ES_ElLa')] [spymaster.GetTitledFirstName|l], de subtrair [horse_owner.Custom('HorseStoryMareStallion')]"
 ep3_yearly.1010.c.tt.success: "[spymaster.GetFirstNameNoTooltip] rouba o cavalo"
 ep3_yearly.1010.tt: "[horse_owner.Custom('WarhorseStoryName')] se torna seu"
 ep3_yearly.1010.c.tt.failure: "[spymaster.GetFirstNameNoTooltip] não consegue roubar o cavalo"
 ep3_yearly.1010.d: "Em cavalo dado não se olha os dentes, [horse_owner.GetFirstNameNoTooltip]."
 ep3_yearly.1010.d.tt: "Você envenena o cavalo [horse_owner.Custom('ES_DelDela')] [horse_owner.GetTitledFirstNameNoTooltip|l]"
 ep3_yearly.1010.d.success: "[horse_owner.GetFirstNameNoTooltip] não percebe"
 ep3_yearly.1010.d.failure: "[horse_owner.GetFirstNameNoTooltip] descobre seu plano"
 ep3_yearly.1010.d.dead_horse: "[horse_owner.Custom('WarhorseStoryName')] morre"
 HIPPEROS_GLOSS: "#bold Hipperos#! é uma palavra grega antiga que descreve uma obsessão por cavalos."
