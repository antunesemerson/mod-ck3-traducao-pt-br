 #Town Crier
 ep3_laamp_decision_event.1025.t: "[visiting_location.GetBaronyNameExplicitlyNoTooltip]: o [ROOT.Char.Custom('GetTowncrierElderCapitalized')|l]"
 ep3_laamp_decision_event.1025.desc_returned_01: "Quando retornamos com [Select_CString( laamp_town_crier.IsFemale, 'la pregonera', 'el pregonero' )] , o gato, agora enroscado, dorme numa mesa próxima, sem prestar atenção aos devaneios [Select_CString( laamp_town_crier.IsFemale, 'de la pregonera', 'del pregonero' )]. \n\n Reparoo que às vezes mexe os bigodes enquanto sonha, e me aproximo para refletir sobre o que foi proclamado:"
 ep3_laamp_decision_event.1025.desc_returned_02: "Quando retorno com [Select_CString( laamp_town_crier.IsFemale, 'la pregonera', 'el pregonero' )], o gato está esticado sob uma mesa, me vigia com um olho azul entreaberto.\n\nSintonizo com seu ronronar suave e, em seguida, imediatamente me desligo das listas anunciadas pelo arauto:"
 ep3_laamp_decision_event.1025.desc_reused_crier: "[Select_CString( laamp_town_crier.IsFemale, 'La pregonera', 'El pregonero' )]me reconhece com o olhar e se anima à medida que me aproximo, tagarelando sem parar sobre os contratos próximos anunciados pelos nobres locais.\n\nAinda o acompanha um velho gato branco e cinza-acastanhado que me observa com os olhos semicerrados enquanto tento ouvir os anúncios:"
 ep3_laamp_decision_event.1025.desc_tribal_returned_01: "Quando voltamos para o ancião, o boi, uma fera magnífica, está lambendo carinhosamente a mão de [laamp_town_crier.GetFirstName] enquanto est[laamp_town_crier.Custom('ES_EA')] lhe dá uns doces.\n\nCom um sorriso contente, [laamp_town_crier.GetFirstNameNoTooltip] me reitera as tarefas disponíveis que ajudariam a população local:"
 ep3_laamp_decision_event.1025.desc_tribal_returned_02: "Quando retorno [Select_CString( laamp_town_crier.IsFemale, 'a la anciana', 'al anciano' )], uma pessoa letrada de aparência importante está saindo do local.\n\nLanço um olhar intrigado em sua direção e então me viro para [laamp_town_crier.GetFirstName] e me lembro das tarefas disponíveis no momento:"
 ep3_laamp_decision_event.1025.desc_tribal_reused_crier: "[Select_CString( laamp_town_crier.IsFemale, 'La anciana', 'El anciano' )], a quem reconheço como [laamp_town_crier.GetFirstName] sorri para mim com gratidão quando volto ao seu posto.\n\nDepois de uma breve conversa amigável, es[laamp_town_crier.Custom('ES_EA')] me informa sobre o que está acontecendo e as tarefas que precisam ser cuidadas:"
 ep3_laamp_decision_event.1025.desc: "[Select_CString( laamp_town_crier.IsFemale, 'La pregonera', 'El pregonero' )]se anima à medida que me aproximo, tagarelando sem parar sobre os contratos próximos anunciados pelos nobres locais.\n\nÉ acompanhado por um velho gato branco, castanho e acinzentado que me olha com os olhos azuis mais nítidos enquanto escuto atentamente os anúncios narrados:"
 ep3_laamp_decision_event.1025.desc_tribal: "[Select_CString( laamp_town_crier.IsFemale, 'La anciana', 'El anciano' )], [laamp_town_crier.GetFirstName]me lança um olhar amistoso enquanto me aproximo.\n\nEnquanto cuida com prudência de uma carroça de bois, me informa sobre todos os assuntos e tarefas que precisam ser resolvidos nas redondezas:"
 ep3_laamp_decision_event.1025.desc_legendary_returned_01: "De volta com [Select_CString( laamp_town_crier.IsFemale, 'la pregonera', 'el pregonero' )], ao redor dela se reuniu um pequeno público que solta exclamações de espanto e admiração, como se deve, enquanto ouve as circunstâncias horripilantes pelas quais o nobre distante busca ajuda em seu apuro.\n\nErgo uma sobrancelha enquanto me recordo dos contratos regulares mencionados antes:"
 ep3_laamp_decision_event.1025.desc_legendary_returned_02: "Enquanto volto para [Select_CString( laamp_town_crier.IsFemale, 'la pregonera', 'el pregonero' )], ela está saturando outro grupo de transeuntes com detalhes cada vez mais exagerados sobre o nobre distante.\n\nHum silenciosamente enquanto pondero sobre os contratos mencionados anteriormente:"
 ep3_laamp_decision_event.1025.desc_tribal_legendary_returned_01: "De volta com [Select_CString( laamp_town_crier.IsFemale, 'la anciana', 'el anciano' )] de antes, está fofocando em voz alta com outras pessoas da tribo, trazendo todo tipo de detalhes pouco favoráveis sobre o nobre distante e sua situação.\n\n[Select_CString( laamp_town_crier.IsFemale, 'La anciana', 'El anciano' )] , [laamp_town_crier.GetFirstName] me lança um olhar de desaprovação de lado enquanto me aproximo para perguntar sobre as tarefas locais que precisam de atenção:"
 ep3_laamp_decision_event.1025.desc_tribal_legendary_returned_02: "Enquanto retorno para [Select_CString( laamp_town_crier.IsFemale, 'la anciana', 'el anciano' )], ele(a) aparentemente repreendeu outro membro da tribo, que agora está emburrado, sentado em uma carroça próxima.\n\n[Select_CString( laamp_town_crier.IsFemale, 'La mujer', 'El hombre' )] se anima ao iniciar uma conversa com [Select_CString( laamp_town_crier.IsFemale, 'otra mujer', 'otro hombre' )] enquanto me aproximo de [laamp_town_crier.GetFirstName], que é gentil o bastante para refrescar minha memória sobre as tarefas atualmente disponíveis:"
 ep3_laamp_decision_event.1025.desc_legendary_reused_crier: "Reconheço [Select_CString( laamp_town_crier.IsFemale, 'a la pregonera', 'al pregonero' )], [laamp_town_crier.GetFirstName], que está $ep3_laamp_decision_event.1025.desc_legendary_body$"
 ep3_laamp_decision_event.1025.desc_legendary: "[Select_CString( laamp_town_crier.IsFemale, 'La pregonera', 'El pregonero' )], [laamp_town_crier.GetFirstName] está $ep3_laamp_decision_event.1025.desc_legendary_body$"
 ep3_laamp_decision_event.1025.desc_legendary_body: "conversando com outras pessoas [visiting_location.GetCounty.GetCulture.GetNameNoTooltip] enquanto me aproximo do posto; sussurram sobre como certo nobre de terras distantes tem um problema particular e oferece recompensas #EMP magníficas#!.\n\nPenso nisso quando [laamp_town_crier.GetFirstName] de repente se lembra de seus deveres e se anima, informando prontamente aos que estão ao seu redor sobre os contratos disponíveis no momento:"
 ep3_laamp_decision_event.1025.desc_tribal_legendary_reused_crier: "À medida que me aproximo, [Select_CString( laamp_town_crier.IsFemale, 'la anciana', 'el anciano' )] [laamp_town_crier.GetFirstName], que havia se envolvido em uma discussão com outro membro da tribo, lança-me um olhar de reconhecimento. $ep3_laamp_decision_event.1025.desc_tribal_legendary_body$"
 ep3_laamp_decision_event.1025.desc_tribal_legendary: "[Select_CString( laamp_town_crier.IsFemale, 'Una de las ancianas', 'Uno de los ancianos' )], [laamp_town_crier.GetFirstName], estava envolvid[laamp_town_crier.Custom('ES_OA')] em uma discussão com outro integrante da tribo. $ep3_laamp_decision_event.1025.desc_tribal_legendary_body$"
 ep3_laamp_decision_event.1025.desc_tribal_legendary_body: "\n\nA outra pessoa come?a a gesticular e ou?o algo sobre um #EMP nobre distante que precisa urgentemente de ajuda em um assunto importante#!, prometendo fama e riquezas em troca.\n\nTerminam a conversa e me viro para [laamp_town_crier.GetFirstNameNoTooltip], que me informa das tarefas locais das quais ? preciso cuidar:"
 ep3_laamp_decision_event.1025.desc_nothing: "Quem atua como [ROOT.Char.Custom('GetTowncrierElder')] está sentad[laamp_town_crier.Custom('ES_OA')] em sua cadeira, cochilad[laamp_town_crier.Custom('ES_OA')]. Ao que parece, não há contratos disponíveis na região no momento."
