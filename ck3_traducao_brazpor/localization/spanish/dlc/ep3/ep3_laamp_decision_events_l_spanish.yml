l_spanish:
 #Visit Local Settlement
 ep3_laamp_decision_event.return.tt: "Você retorna para a [THIS.Char.Custom('GetMainsquareCommons')]"
 #Enter the Title of ProvinceName. What do you want to do?
 ep3_laamp_decision_event.1000.t: "[visiting_location.GetBaronyNameExplicitlyNoTooltip]: a [ROOT.Char.Custom('GetMainsquareCommonsCapitalized')|l]"
 ep3_laamp_decision_event.1000.desc_intro_returned_home: "À medida que a noite se aproxima, os habitantes de [visiting_location.GetBaronyNameExplicitlyNoTooltip] se recolhem em suas casas.\n\nOs lojistas fecharam suas barracas e os pontos de interesse fecharam seus portões."
 ep3_laamp_decision_event.1000.desc_intro_returned_from_second: "Rapidamente faço o caminho de volta do outro extremo da [ROOT.Char.Custom('GetMainsquareCommons')], passando por um vendedor ambulante com dezenas de pequenos frascos de vidro contendo líquidos de diferentes cores."
 ep3_laamp_decision_event.1000.desc_intro_returned_from_tavern: "Saio da [ROOT.Char.Custom('GetTavernDwelling')] e aperto os olhos na luz, respirando o ar fresco do lado de fora. O cheiro de um [visiting_location.GetCounty.GetCulture.GetNameNoTooltip] próximo vendendo [visiting_location.GetTitle.GetHolder.Custom('GetLocalStreetFoodPlural')] faz minha boca salivar."
 ep3_laamp_decision_event.1000.desc_intro_returned_from_church: "No caminho de volta dos terrenos da [visiting_location.GetCounty.GetFaith.HouseOfWorship], um grupo de [visiting_location.GetCounty.GetFaith.AltPriestTermPlural] se move em lenta procissão pela praça, cantando serenamente enquanto passam."
 ep3_laamp_decision_event.1000.desc_intro_returned_from_castle: "Voltando dos portões do castelo, noto uma patrulha de soldados [visiting_location.GetCounty.GetCulture.GetCollectiveNounNoTooltip] de aparência desleixada patrulhando o perímetro, mantendo um olhar atento em quem parece sombrio ou diferente."
 ep3_laamp_decision_event.1000.desc_intro_returned_from_craftsmen: "Após minha visita aos artesãos, um pequeno grupo de malabaristas faz uma pequena apresentação na praça principal, atraindo uma quantidade moderada de espectadores."
 ep3_laamp_decision_event.1000.desc_intro_returned_generic_01: "Passando pela [ROOT.Char.Custom('GetMainsquareCommons')] de [visiting_location.GetTitle.GetNameNoTierNoTooltip] está uma procissão de comerciantes estrangeiros curiosos, a caminho de [neighboring_county.GetTitle.GetNameNoTierNoTooltip]."
 ep3_laamp_decision_event.1000.desc_intro_returned_generic_02: "De volta à [ROOT.Char.Custom('GetMainsquareCommons')], um [ROOT.Char.Custom('RegionalFerociousAnimal')] domesticado cambaleia para cumprimentar entusiasticamente um transeunte inocente, causando bastante comoção."
 ep3_laamp_decision_event.1000.desc_intro_returned_generic_03: "Voltando à [ROOT.Char.Custom('GetMainsquareCommons')], somos recebidos pelo açougueiro local esvaziando os resíduos atrás, para alimentar seus cães de guarda."
 ep3_laamp_decision_event.1000.desc_intro_returned_generic_04: "No caminho de volta para a [ROOT.Char.Custom('GetMainsquareCommons')], paro para admirar o trabalho de um tecelão de tapeçarias local, criando uma obra de arte encomendada por [visiting_location.GetCounty.GetTitle.GetHolder.Custom('ES_ElLa')] [visiting_location.GetCounty.GetTitle.GetHolder.GetTitledFirstNameNoTooltip|l]."
 ep3_laamp_decision_event.1000.desc_intro_returned_constantinople_01: "Do mirante, contemplo [visiting_location.GetTitle.GetNameNoTierNoTooltip] na tentativa de apreender esta joia de [visiting_location.GetCounty.GetTitle.GetHolder.GetTopLiege.GetPrimaryTitle.GetNameNoTierNoTooltip].\n\nAqui estão presentes culturas de todos os lugares, entre o povo [visiting_location.GetCulture.GetNameNoTooltip], verdadeiramente um caldeirão de tradições e costumes.\n\nPerto do Hipódromo, parece ter começado uma competição, a julgar pelos tênues gritos de alegria e entusiasmo."
 ep3_laamp_decision_event.1000.desc_intro_constantinople: "Enquanto passamos por arcos e colunatas, entramos na grande cidade de [visiting_location.GetBaronyNameExplicitlyNoTooltip] Não é de se admirar que esta seja a joia da coroa [visiting_location.GetCounty.GetTitle.GetHolder.GetTopLiege.Custom('ES_DelDela')] [visiting_location.GetCounty.GetTitle.GetHolder.GetTopLiege.GetTitledFirstName|l], e olho ao longe, rumo ao coração da cidade."
 ep3_laamp_decision_event.1000.desc_intro_tribal_holding_01: "O povo local [visiting_location.GetCounty.GetCulture.GetNameNoTooltip] se reúne regularmente no [ROOT.Char.Custom('LocalHoldingType')] de [visiting_location.GetBaronyNameExplicitlyNoTooltip] para trocar mercadorias, fofocar e compartilhar histórias.\n\nQuando entro no agrupamento de s, um [ROOT.Char.Custom('RegionalFarmAnimal')] perdido move-se lentamente pelo caminho no centro da [ROOT.Char.Custom('SettlementCity')|l], e um pequeno [ROOT.Char.Custom('SmallAnimal')] sonolento atravessa a vegetação alguns passos à minha direita."
 ep3_laamp_decision_event.1000.desc_intro_tribal_holding_02: "Passamos por várias camadas de tribos com características mais militantes a caminho do coração de [visiting_location.GetTitle.GetNameNoTier].\n\nLanças, adagas e arcos; mas também [ROOT.Char.Custom('GetTribalTradegoods')], crenças indígenas — tudo faz parte de um [visiting_location.GetHolding.GetType.GetName|l]. Sou recebido principalmente com acenos amigáveis; mas também com alguns olhares desconfiados."
 ep3_laamp_decision_event.1000.desc_intro_church_holding: "Uma cidade magnífica, os diversos cânticos e hinos cobrem a [ROOT.Char.Custom('LocalHoldingType')|l] de [visiting_location.GetTitle.GetNameNoTier] como um cobertor reconfortante e não deixam dúvida sobre suas associações religiosas.\n\nAo passar pelos portões principais, vejo grande quantidade de adornos [visiting_location.GetCounty.GetFaith.GetAdherentNameNoTooltip] colocados nas paredes, assim como em pilastras e andaimes."
 ep3_laamp_decision_event.1000.desc_intro_castle_holding: "Poucos lugares são tão majestosos quanto um/a [visiting_location.GetHolding.GetType.GetName|l] e [visiting_location.GetTitle.GetNameNoTier] não é exceção. Tropas e estandartes [visiting_location.GetCounty.GetCulture.GetCollectiveNounNoTooltip] são visíveis por toda a cidade.\n\nAo passarmos pelos portões principais, avisto um punhado de guardas espiando pelas ameias lá de cima."
 ep3_laamp_decision_event.1000.desc_intro_city_holding: "Um importante entroncamento comercial para os [visiting_location.GetCounty.GetCulture.GetCollectiveNounNoTooltip], a riqueza gerada nos mercados de [visiting_location.GetTitle.GetNameNoTier] se infiltra em todos os cantos da cidade.\n\nAo entrarmos pelos portões da cidade, os gritos e imagens que anunciam comerciantes locais estão por toda parte."
 #Northern Europe
 ep3_laamp_decision_event.1000.desc_outro_regional_scandinavia_summer_returned_01: "\n\nO sol, praticamente nunca se pondo nesta época do ano, ainda está no céu, e a única coisa que compete com seu brilho é a palidez das pessoas na [ROOT.Char.Custom('SettlementCity')|l]."
 ep3_laamp_decision_event.1000.desc_outro_regional_scandinavia_summer_returned_02: "\n\nUma chuva temperada e inesperada chegou à [ROOT.Char.Custom('SettlementCity')|l] [ROOT.Char.Custom('GetSquareCommons')] e está caindo suavemente sobre as pessoas e o gado."
 ep3_laamp_decision_event.1000.desc_outro_regional_scandinavia_winter_returned_01: "\n\nA neve, refletindo a luz do sol, repousa pesada nos telhados e nas [ROOT.Char.Custom('GetTreesScaffolding')|l]; seu brilho ofuscante compete apenas com a palidez dos habitantes de [visiting_location.GetTitle.GetNameNoTierNoTooltip], de bochechas rosadas."
 ep3_laamp_decision_event.1000.desc_outro_regional_scandinavia_winter_returned_02: "\n\nApesar das temperaturas congelantes, não há vento. A [ROOT.Char.Custom('SettlementCity')|l] tem uma nitidez inquietante, enquanto todos os seres vivos no [ROOT.Char.Custom('GetSquareCommons')] exalam plumas brancas de calor."
 ep3_laamp_decision_event.1000.desc_outro_regional_scandinavia_winter_returned_03: "\n\nLogo escurecerá novamente, e os [visiting_location.GetCounty.GetCulture.GetCollectiveNounNoTooltip|U] correm de um lado para o outro na fraca luz do dia, tentando realizar todas as tarefas que se tornam impossíveis após o pôr do sol."
 #Britannia
 ep3_laamp_decision_event.1000.desc_outro_regional_britannia_returned_01: "\n\nLá em cima, as nuvens se abrem por um momento, permitindo que raios de sol dancem pelos telhados e habitantes do [ROOT.Char.Custom('GetSquareCommons')]."
 ep3_laamp_decision_event.1000.desc_outro_regional_britannia_returned_02: "\n\nRecusando-se a parar, a chuva melancólica continua caindo, lentamente formando poças no chão irregular. Um [ROOT.Char.Custom('RegionalFarmAnimal')] imóvel lamenta miseravelmente ter sido deixado na garoa."
 ep3_laamp_decision_event.1000.desc_outro_regional_britannia_returned_03: "\n\nUma névoa úmida envolve o [ROOT.Char.Custom('GetSquareCommons')] com um aperto de ferro, e qualquer pessoa que se aventure fora de casa tem suas roupas imediatamente umedecidas pela chuva sempre presente."
 #Europe
 ep3_laamp_decision_event.1000.desc_outro_regional_europe_returned_01: "\n\nUma leve garoa começou, realçando o verde da paisagem e trazendo um suave aroma de terra; dando a sensação de calma antes da tempestade."
 ep3_laamp_decision_event.1000.desc_outro_regional_europe_returned_02: "\n\nUm vento frio sopra de um lago próximo, fazendo com que o gado solte um balido surpreso e os comerciantes apertem suas capas mais firmemente ao redor dos ombros."
 ep3_laamp_decision_event.1000.desc_outro_regional_europe_returned_03: "\n\nÀ minha esquerda, camponeses locais estão retornando do serviço em uma igreja de pedra próxima. O ministro parado na entrada me lança um sorriso enigmático enquanto passo."
 #Iberia
 ep3_laamp_decision_event.1000.desc_outro_regional_iberia_returned_01: "\n\nAo longe, a luz de uma fonte decorativa projeta reflexos celestiais em um arco de ferradura próximo."
 ep3_laamp_decision_event.1000.desc_outro_regional_iberia_returned_02: "\n\nÀ minha esquerda, [Select_CString( dummy_gender.IsFemale, 'una anciana', 'un anciano' )] restaura cuidadosamente um mosaico local com um punhado de — em sua maioria — peças novas, para um resultado superior."
 ep3_laamp_decision_event.1000.desc_outro_regional_iberia_returned_03: "\n\nLá em cima, um ícone religioso observa a agitação da rua movimentada com um olhar contemplativo."
 #Middle East
 ep3_laamp_decision_event.1000.desc_outro_regional_middle_east_returned_01: "\n\nAinda faz calor lá fora, e as pessoas mudaram ligeiramente de posição, movendo-se para qualquer sombra disponível. Um abutre ameaçador circula à beira da [ROOT.Char.Custom('SettlementCity')|l]."
 ep3_laamp_decision_event.1000.desc_outro_regional_middle_east_returned_02: "\n\nEnquanto um escorpião passa rapidamente, as correntes de ar criam redemoinhos de areia que brilham de forma quase etérea ao sol do deserto."
 ep3_laamp_decision_event.1000.desc_outro_regional_middle_east_returned_03: "\n\nÀ minha direita encontram-se as ruínas de uma antiga mesquita, cujos materiais estão sendo reaproveitados pelos [visiting_location.GetCounty.GetCulture.GetCollectiveNounNoTooltip] da região."
 #India
 ep3_laamp_decision_event.1000.desc_outro_regional_india_returned_01: "\n\nLá em cima, um grupo de macacos macacos está causando alvoroço nas árvores, aparentemente irritado com alguma coisa."
 ep3_laamp_decision_event.1000.desc_outro_regional_india_returned_02: "\n\nPara o divertimento do público, um bando barulhento e incessante de periquitos coloridos ocupou o telhado de um prédio próximo, nos lembrando o quão perto estamos da natureza."
 ep3_laamp_decision_event.1000.desc_outro_regional_india_returned_03: "\n\nAo longe, uma profusão de tecidos de cores vivas, pendurados para secar, cria um cenário encantador para o/a [ROOT.Char.Custom('LocalHoldingType')|l] local."
 ep3_laamp_decision_event.1000.desc_outro_regional_india_returned_04: "\n\nNa rua, as crianças brincam nas poças deixadas pela chuva forte desta manhã."
 ep3_laamp_decision_event.1000.desc_outro_regional_india_returned_05: "\n\nÀ minha esquerda, um mahout treinando um novo elefante está reunindo uma pequena multidão de curiosos, observando o espetáculo."
 #Steppe
 ep3_laamp_decision_event.1000.desc_outro_regional_steppe_returned_01: "\n\nLá longe, um pacífico rebanho de bois e cavalos vagueia pelos campos, satisfazendo sua fome imediata."
 ep3_laamp_decision_event.1000.desc_outro_regional_steppe_returned_02: "\n\nUm pouco mais adiante, levam um potro para perto de uma égua imóvel, enquanto o homem da tribo prepara o processo de ordenha."
 ep3_laamp_decision_event.1000.desc_outro_regional_steppe_returned_03: "\n\nÀ minha direita, um punhado de membros da tribo está restaurando uma yurt danificada, cobrindo meticulosamente a nova lona com giz."
 #North Africa
 ep3_laamp_decision_event.1000.desc_outro_regional_north_africa_returned_01: "\n\nUma brisa brincalhona percorre rapidamente as casas circulares de taipa, proporcionando um alívio do calor sufocante."
 ep3_laamp_decision_event.1000.desc_outro_regional_north_africa_returned_02: "\n\nUm par de [dummy_gender.GetWomenMen] sai refrescad[dummy_gender.Custom('ES_OA')]s de um dos hammams e olho desejosamente para a entrada, com uma vontade s?bita de tomar um banho relaxante."
 ep3_laamp_decision_event.1000.desc_outro_regional_north_africa_returned_03: "\n\nUm burro zurra infeliz, pois aparentemente ficou preso em uma das estreitas ruas de paralelepípedos que separam as casas."
 #West Africa
 ep3_laamp_decision_event.1000.desc_outro_regional_west_africa_returned_01: "\n\nUm punhado de comerciantes vagueia pela seção oriental da [ROOT.Char.Custom('GetSquareCommons')]; dentre eles, um se destaca como o mais rico, desfrutando de sua riqueza em cauris."
 ep3_laamp_decision_event.1000.desc_outro_regional_west_africa_returned_02: "\n\nMinha vista se detém nas cores vibrantes da colheita local, apresentada sobre grossas esteiras — melões, abóboras, pepinos, laranjas. É um espetáculo alegre de se contemplar."
 ep3_laamp_decision_event.1000.desc_outro_regional_west_africa_returned_03: "\n\nO sol se reflete em um peso de latão ricamente ornamentado que é guardado por um[dummy_gender.Custom('ES_XA')] comprador[dummy_gender.Custom('ES_XA')] satisfeit[dummy_gender.Custom('ES_OA')] , pagando seu devido em pó de ouro."
 ep3_laamp_decision_event.1000.desc_outro_regional_west_africa_returned_04: "\n\nUm punhado de operários está construindo um segundo andar sobre uma das casas mais ornamentadas, mantendo o ritmo apesar do calor."
 #East Africa
 ep3_laamp_decision_event.1000.desc_outro_regional_east_africa_returned_01: "\n\nUma pequena lagartixa sobe pelos blocos de coral de uma das casas estreitas e encontra um caminho até o telhado plano, onde se aquece ao sol."
 ep3_laamp_decision_event.1000.desc_outro_regional_east_africa_returned_02: "\n\nOs tijolos cozidos de um muro na altura dos joelhos se aquecem sob o calor do sol, irradiando calor para qualquer coisa — ou qualquer um — que se atreva a subir em cima dele."
 ep3_laamp_decision_event.1000.desc_outro_regional_east_africa_returned_03: "\n\nAvisto uma pequena concha, para sempre presa em uma das paredes de calcário de uma moradia próxima."
 ep3_laamp_decision_event.1000.desc_outro_regional_east_africa_returned_04: "\n\nÀ minha esquerda, um dos comerciantes ajusta a cobertura de folhas de sua barraca no mercado para fazer sombra para suas nozes de cola."
 #Generic
 ep3_laamp_decision_event.1000.desc_outro_returned_generic_01: "\n\nO ruído e as intensas barganhas nas barracas de suprimentos próximas ecoam até aqui, dando à [ROOT.Char.Custom('GetMainsquareCommons')] um ar frenético."
 ep3_laamp_decision_event.1000.desc_outro_returned_generic_02: "\n\nUm traficante ameaçador está realizando seu comércio questionável um pouco mais adiante no [ROOT.Char.Custom('GetSquareCommons')], para o desgosto de alguns transeuntes."
 ep3_laamp_decision_event.1000.desc_outro_returned_generic_03: "\n\nEstá quente, embora não seja o calor intenso típico desta região. Os trabalhadores e nobres seguem com suas vidas diárias, aproveitando a temperatura agradável."
 ep3_laamp_decision_event.1000.desc_outro_returned_generic_04: "\n\nUm rebanho de [ROOT.Char.Custom('RegionalFarmAnimalPlural')] bloqueia muito eficazmente a passagem de um mercador itinerante, causando angústia e gritos."
 ep3_laamp_decision_event.1000.desc_outro_returned_generic_05: "\n\nÀ minha esquerda, um exemplar de [ROOT.Char.Custom('SoundingRegionalFarmAnimal')] protesta contra a inspeção minuciosa de um comprador potencial. [Select_CString( dummy_gender.IsFemale, 'La vendedora', 'El vendedor' )] acaricia gentilmente a cabeça dele, de forma reconfortante."
 ep3_laamp_decision_event.1000.desc_outro_returned_generic_06: "\n\nÀ minha direita, um pequeno canteiro de flores vibrantes de [ROOT.Char.Custom('get_region_flower_type_plural')] floresce, fornecendo uma encantadora mistura de cores ao [ROOT.Char.Custom('GetSquareCommons')]."
 ep3_laamp_decision_event.1000.desc_outro_returned_generic_07: "\n\nUm exemplar de [ROOT.Char.Custom('GetRandomRegionalWildDaytimeBird')] pousa sobre uma árvore [ROOT.Char.GetCurrentLocation.Custom('GetRandomAppropriateTree')] próxima e olha para baixo, para os agitados [visiting_location.GetCounty.GetCulture.GetCollectiveNounNoTooltip], com olhos inteligentes."
 #Partner
 ep3_laamp_decision_event.1000.desc_outro_returned_partner_generic_01: "\n\n[visiting_partner.GetFirstName] me cutuca de leve e aponta para uma árvore próxima de [visiting_location.Custom('GetRandomRegionalWood')] em cujo galho mais alto está empoleirado um robusto exemplar de [ROOT.Char.Custom('GetRandomRegionalWildDaytimeBird')] que aproveita o sol da tarde."
 ep3_laamp_decision_event.1000.desc_outro_returned_partner_generic_02: "\n\n[visiting_partner.GetFirstName] aprecia com entusiasmo e aponta para um exemplar solto de [ROOT.Char.Custom('get_region_dog_type')] que fica correndo em uma brincadeira de buscar com seu dono."
 ep3_laamp_decision_event.1000.desc_outro_returned_partner_generic_03: "\n\n[visiting_partner.GetFirstName] se contorce com descaro quando me joga uma minhoca recém-desenterrada. Surpreendid[ROOT.Char.Custom('ES_OA')] pela minhoca, dou um passo para trás e lhe lanço um olhar brincalhão, mas severo."
 ep3_laamp_decision_event.1000.desc_outro_returned_partner_generic_04: "\n\n[visiting_partner.GetFirstName] tarareia com apreço enquanto inspeciona meticulosamente uma barraca repleta de entalhes religiosos em [visiting_location.Custom('GetRandomRegionalWood')]."
 ep3_laamp_decision_event.1000.desc_outro_returned_partner_generic_05: "\n\n[visiting_partner.GetFirstName] desaparece de vista, mas logo retorna, oferecendo-me provar um pouco de seu [ROOT.Char.Custom('GetLocalStreetFood')] recém-adquirido."
 #Unique Location
 ep3_laamp_decision_event.1000.desc_outro_revisit_constantinople: "\n\nEmbora eu já tenha estado aqui antes, ainda me sinto bastante diminut[ROOT.Char.Custom('ES_OA')] enquanto observo a Santa Sofia e o hipódromo no horizonte."
 ep3_laamp_decision_event.1000.desc_outro_constantinople: "\n\nCom Santa Sofia e o hipódromo já no horizonte, começo a me sentir bastante pequeno[ROOT.Char.Custom('ES_OA')] ao contemplar com admiração estes monumentos."
 #Home
 ep3_laamp_decision_event.1000.desc_outro_home: "\n\nUm longo dia de afazeres finalmente está me alcançando, e me vejo ansiando por minha cama."
 ep3_laamp_decision_event.1000.desc_outro_partner_home: "\n\n[visiting_partner.GetFirstName] se espreguiça e solta um suspiro satisfeito: \"Não me importaria com uma refeição quente de volta ao acampamento agora\", diz, com saudade."
 #First time
 ep3_laamp_decision_event.1000.desc_outro_partner_01: "\n\n [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('visiting_partner'))], [visiting_partner.GetFirstName], olha ao redor com uma expressão de contentamento, aparentemente apreciando a mudança de cenário."
 ep3_laamp_decision_event.1000.desc_outro_revisit: "\n\nAprecio o pequeno alívio de que não mudou muito desde a última vez que visitei este lugar."
 ep3_laamp_decision_event.1000.desc_outro_new: "\n\nAo absorver as vistas e cheiros deste lugar, rapidamente me localizo neste novo ambiente."
 #Options
 ep3_laamp_decision_event.1000.a: "Devemos nos misturar com os locais"
 ep3_laamp_decision_event.1000.a_nomads: "$ep3_laamp_decision_event.1000.a$."
 ep3_laamp_decision_event.1000.a_tavern: "$ep3_laamp_decision_event.1000.a$ na taverna."
 ep3_laamp_decision_event.1000.a_second: "Devemos retornar ao [ROOT.Char.Custom('GetTavernDwelling')]."
 ep3_laamp_decision_event.1000.a.tt: "Ir para a taverna"
 ep3_laamp_decision_event.1000.a_nomads.tt: "Ir ao ponto de encontro local"
 ep3_laamp_decision_event.1000.b: "Os terrenos do [visiting_location.GetCounty.GetFaith.HouseOfWorship] parecem interessantes."
 ep3_laamp_decision_event.1000.b_second: "Havia alguns negócios inacabados no [visiting_location.GetCounty.GetFaith.HouseOfWorship]."
 ep3_laamp_decision_event.1000.b.tt: "Ir aos terrenos do [visiting_location.GetCounty.GetFaith.HouseOfWorship]"
 ep3_laamp_decision_event.1000.c: "Vamos dar uma olhada em [visiting_location.GetBaronyNameExplicitlyNoTooltip] [visiting_location.GetHolding.GetType.GetName|l]."
 ep3_laamp_decision_event.1000.c_second: "Havia alguns negócios inacabados no [visiting_location.GetHolding.GetType.GetName|l]."
 ep3_laamp_decision_event.1000.c.tt: "Ir aos terrenos do [visiting_location.GetHolding.GetType.GetName|l]"
 ep3_laamp_decision_event.1000.d: "Eu deveria visitar os bons artesãos."
 ep3_laamp_decision_event.1000.d_second: "Havia alguns negócios inacabados no distrito dos artesãos."
 ep3_laamp_decision_event.1000.d.tt: "Ir para o bairro dos artesãos locais"
 ep3_laamp_decision_event.1000.h: "Eu estava pensando em outra coisa..."
 ep3_laamp_decision_event.1000.h.tt: "Considerar outros pontos de interesse"
 tapped_out.tt: "Não há opções adicionais disponíveis no momento"
 ep3_laamp_decision_event.1000.i: "Terminei aqui. De volta ao acampamento."
 ep3_laamp_decision_event.1000.i_home: "Hora de voltar para casa."
 ep3_laamp_decision_event.1000.i_home_partner: "Vamos para casa, [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('visiting_partner'))]."
 ep3_laamp_decision_event.1000.i.tt: "Sair de [visiting_location.GetBaronyNameExplicitlyNoTooltip]"
 #Page 2 (Second)
 ep3_laamp_decision_event.1001.desc_intro_return_finished: "Esta parte do [ROOT.Char.Custom('GetMainsquareCommons')] de alguma forma ficou mais fria agora, e as pessoas já voltaram para suas casas ou se mudaram para outros lugares do [ROOT.Char.Custom('SettlementCity')]."
 ep3_laamp_decision_event.1001.desc_intro_returned_from_supplies: "Enquanto voltamos do comerciante de suprimentos, uma brisa da tarde sopra pela [ROOT.Char.Custom('GetMainsquareCommons')] de [visiting_location.GetTitle.GetNameNoTierNoTooltip]."
 ep3_laamp_decision_event.1001.desc_intro_returned_from_assaulting_supplies: "Os guardas me tratam com certa brutalidade, felizmente sem quebrar nada, quando me largam de volta no [ROOT.Char.Custom('GetMainsquareCommons')]."
 ep3_laamp_decision_event.1001.desc_intro_returned_from_artifacts: "Ao voltarmos dos vendedores de artefatos, parece que outras pessoas também retornam de várias partes de [ROOT.Char.Custom('SettlementCity')] e o vai e vem de visitantes na [ROOT.Char.Custom('GetMainsquareCommons')] é bem intenso."
 ep3_laamp_decision_event.1001.desc_intro_returned_from_contract: "Caminhando de volta do [ROOT.Char.Custom('GetTowncrierElder')], observo o céu por um momento antes de me encontrar novamente no [ROOT.Char.Custom('GetMainsquareCommons')]."
 ep3_laamp_decision_event.1001.desc_intro_returned_generic_01: "De volta a esta parte do [ROOT.Char.Custom('GetMainsquareCommons')], há decididamente menos pessoas ao redor. Um punhado de crianças acaricia um burro, que pastava pacificamente a meio caminho do cartaz do [ROOT.Char.Custom('GetTowncrierElder')]."
 ep3_laamp_decision_event.1001.desc_intro_returned_generic_02: "Retornando à outra metade do [ROOT.Char.Custom('GetMainsquareCommons')], alguns cães vira-latas estão correndo, brigando por um osso de animal — de tamanho considerável."
 ep3_laamp_decision_event.1001.desc: "Afastando-me da entrada do [ROOT.Char.Custom('SettlementCity')|l], caminho por uma trilha estreita que passa por algumas [ROOT.Char.Custom('GetCrookedhousesDelapidatedtents')] até um espaço aberto adjacente.\n\nÀ minha frente, está o caminho para os comerciantes de suprimentos e os vendedores de artefatos, e mais adiante também vejo o que parece ser um"
 ep3_laamp_decision_event.1001.desc_intro: "$ep3_laamp_decision_event.1001.desc$ arauto ao longe."
 ep3_laamp_decision_event.1001.desc_intro_nomads: "$ep3_laamp_decision_event.1001.desc$ ancião da tribo, vagando ao longe."
 #Regional Outros are lifted from ep3_laamp_decision_event.1000
 ep3_laamp_decision_event.1001.desc_outro_return_partner_finished: "$ep3_laamp_decision_event.1040.desc_outro_return_partner_finished$"
 ep3_laamp_decision_event.1001.desc_outro_return_finished: "\n\nEu olho ao redor e percebo que não tenho mais negócios a cuidar neste lugar específico."
 ep3_laamp_decision_event.1001.desc_outro_partner: "\n\n[visiting_partner.GetFirstName] está atrás de mim, mas logo me alcança enquanto eu considero meu próximo destino."
 ep3_laamp_decision_event.1001.a: "Os suprimentos estão por aqui."
 ep3_laamp_decision_event.1001.a_second: "Vamos dar mais uma olhada nesses suprimentos..."
 ep3_laamp_decision_event.1001.a.tt: "Ir para as barracas de suprimentos"
