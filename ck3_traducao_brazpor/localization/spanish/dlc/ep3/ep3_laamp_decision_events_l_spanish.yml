 ep3_laamp_decision_event.1021.desc_moment_of_purchase_01: "[laamp_artifact_peddler.GetFirstName] me olha com expectativa, aparentemente satisfeit[laamp_artifact_peddler.Custom('ES_OA')] com a minha decisão: \"Do que desejais se desfazer?\"."
 ep3_laamp_decision_event.1021.desc_moment_of_purchase_02: "[laamp_artifact_peddler.GetFirstName] me dá um aceno encorajador: \"Eu tenho a moeda. Quais mercadorias você estaria vendendo?\""
 ep3_laamp_decision_event.1021.desc_success: "[laamp_artifact_peddler.GetFirstName] me olha com um olhar contemplativo: \"...é mesmo? Bem, então. Para mercadorias tão valiosas, talvez eu possa liberar mais uma moeda ou duas.\""
 ep3_laamp_decision_event.1021.desc_failure: "[laamp_artifact_peddler.GetFirstName] dá uma risada e sua boca se transforma em um sorriso desdenhoso: \"Não seja ridículo. Minha oferta continua a mesma.\""
