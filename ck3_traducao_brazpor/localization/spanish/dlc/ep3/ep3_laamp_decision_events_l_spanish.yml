 ep3_laamp_decision_event.1001.b: "Talvez eu possa vender alguns artefatos."
 ep3_laamp_decision_event.1001.b_second: "Na verdade, deveríamos voltar para os vendedores de artefatos."
 ep3_laamp_decision_event.1001.b.tt: "Ir para as barracas de artefatos"
