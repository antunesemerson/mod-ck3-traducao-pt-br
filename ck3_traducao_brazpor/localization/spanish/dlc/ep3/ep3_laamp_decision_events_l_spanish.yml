 ep3_laamp_decision_event.1001.c: "O [ROOT.Char.Custom('GetTowncrierElder')] pode ter algo para nós."
 ep3_laamp_decision_event.1001.c_second: "Eu deveria revisitar o [ROOT.Char.Custom('GetTowncrierElder')]."
