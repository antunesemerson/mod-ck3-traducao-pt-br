 #The bespoke Treasure Map contract
 laamp_treasure_map_contract: "Mapa do Tesouro"
 laamp_treasure_map_contract_contract: "$laamp_treasure_map_contract$"
 laamp_treasure_map_contract_desc_title: "O Tesouro de uma Vida"
 laamp_treasure_map_contract_desc: "[TaskContract.GetEmployer.Custom('ES_ElLa')|U] caçador[TaskContract.GetEmployer.Custom('ES_XA')] de tesouros aposentad[TaskContract.GetEmployer.Custom('ES_OA')] [TaskContract.GetEmployer.GetName] precisa de ajuda para localizar um último tesouro esquivo. Isso permanecerá válido enquanto você estiver de posse do mapa do tesouro."
 laamp_treasure_map_contract_request: "Este [task_contract|lE] exige que você [Concept( 'travel', 'viajar' )|E] à localização do tesouro por meio da [decision|lE] [GetDecisionWithKey('treasure_map_contract_decision').GetName|l]"
 overflowing_provisions_to_gold.tt: "#EMP Dado que esto superaría tu capacidad de [provisions|lE], las [provisions_overflow_value|V0] @provisions_icon! extra se venderán en el mercado local por [provisions_transformed_to_gold_value|V0] @gold_icon!#!"
 treasure_map: "Mapa do Tesouro"
 treasure_map_desc: "Um mapa esfarrapado que supostamente leva a riquezas antigas em [newly_created_map.MakeScope.Var('artifact_treasure_location').GetProvince.GetBaronyNameExplicitlyNoTooltip]. Conseguido [Select_CString( laamp_town_crier.IsFemale, 'de la pregonera', 'del pregonero' )] de [newly_created_map.MakeScope.Var('picked_up_in_location').GetProvince.GetBaronyNameExplicitlyNoTooltip]."
 artifact_is_related_to_contract_tt: "Este [artifact|lE] está relacionado a um [task_contract|lE] e não pode ser destruído"
 gallowsbait_thief_blocked_from_contract.tt: "Você está muito envolvido no [GetTrait('gallowsbait').GetName( GetNullCharacter )|l] [GetTrait( 'gallowsbait' ).GetTraitTrackByKey( 'thief' ).GetName|l] [trait|lE] para ser confiável com este [vassal_contract|lE]"
 #Option: Visit the local tavern
 ep3_laamp_decision_event.1030.t: "[visiting_location.GetBaronyNameExplicitlyNoTooltip]: a [ROOT.Char.Custom('GetTavernDwelling')]"
 ep3_laamp_decision_event.1030.desc_returned_01: "Reentro na taverna percebendo que não muito mudou, entre os viajantes e os andarilhos relaxando enquanto suas necessidades são atendidas."
 ep3_laamp_decision_event.1030.desc_nomad_returned_01: "Reentro na moradia, mais uma vez impressionado pela hospitalidade e atmosfera amigável enquanto deixo escapar um suspiro relaxado."
 ep3_laamp_decision_event.1030.desc_returned_02: "De volta ao [ROOT.Char.Custom('GetTavernDwelling')], alguns seguranças [visiting_location.GetCounty.GetCulture.GetNameNoTooltip] acabaram de encerrar uma discussão que virou briga."
 ep3_laamp_decision_event.1030.desc_returned_from_story: "Os detalhes da história d [laamp_storyteller.GetFirstName] ainda ecoando em minha mente, volto para o salão comum decididamente mais barulhento."
 ep3_laamp_decision_event.1030.desc_nomad_returned_from_story: "Os detalhes da história d [laamp_storyteller.GetFirstName] ainda ecoando em minha mente, volto para dentro da moradia."
 ep3_laamp_decision_event.1030.desc_returned_from_recruit: "Enquanto volto dos recrutas, sinto um aroma tentador vindo da [visiting_location.GetCounty.GetTitle.GetHolder.Custom('GetLocalStreetFoodPlural')] sendo preparado na cozinha."
 ep3_laamp_decision_event.1030.desc_nomad_returned_from_recruit: "Voltando dos recrutas, quase tropeço em uma dupla de festeiros, atualmente ocupados provocando um terceiro, mais introvertido, homem por sua semelhança com um [ROOT.Char.Custom('RegionalMythicalCreatureLower')]."
 ep3_laamp_decision_event.1030.desc_returned_from_unwinding_spouse: "Deixo a agradável companhia d [laamp_spouse_material.GetFirstName], rearranjo meu traje e retorno de um dos fundos com um novo ânimo."
 ep3_laamp_decision_event.1030.desc_nomad_returned_from_unwinding_spouse: "Deixo a agradável tenda d [laamp_spouse_material.GetFirstName], rearranjo meu traje e volto sorrateiramente para dentro da moradia com um novo ânimo."
 ep3_laamp_decision_event.1030.desc_returned_from_spouse: "Quando deixo a companhia dela/deles, [laamp_spouse_material.GetFirstName] volta a conversar com um casal de [ROOT.Char.Custom('GetTaverngoersTribespeople')] amistosos enquanto eu retorno ao centro da [ROOT.Char.Custom('GetRoom')]."
 ep3_laamp_decision_event.1030.desc_returned_from_hood_noble_fail: "Ao falhar em resolver a situação, os seguranças locais jogam [laamp_hooded_figure.GetFirstName] e sua briga para fora do [ROOT.Char.Custom('GetTavernDwelling')]. Caminho cautelosamente de volta ao centro do [ROOT.Char.Custom('GetRoomTent')]."
 ep3_laamp_decision_event.1030.desc_returned_from_hood_noble: "A tensão ainda está alta quando deixo [laamp_hooded_figure.GetFirstName] em seu dilema e sigo de volta ao centro do [ROOT.Char.Custom('GetRoomTent')]."
 ep3_laamp_decision_event.1030.desc_returned_from_hood: "Navego de volta do porão enquanto meus olhos se ajustam à luz aumentada do salão comum."
 ep3_laamp_decision_event.1030.desc_nomad_returned_from_hood: "Navego de volta da outra tenda enquanto meus olhos se ajustam à escuridão da moradia."
 ep3_laamp_decision_event.1030.desc: "A taverna, reunindo viajantes e [visiting_location.GetCounty.GetCulture.GetCollectiveNounNoTooltip] locais, está repleta de atividade."
 ep3_laamp_decision_event.1030.desc_nomad: "Sou convidado a entrar em uma das tendas. Uma quantidade surpreendente de pessoas cabe dentro — viajantes e [visiting_location.GetCounty.GetCulture.GetCollectiveNounNoTooltip], todos se misturando em um #EMP zumbido#! humano contínuo."
 #Mid
 ep3_laamp_decision_event.1030.desc_mid_storyteller_intro: "\n\nHá [Select_CString(laamp_storyteller.IsFemale, 'Uma narradora', 'Um narrador' )] que se senta perto do fogo, um pouco mais adentro. Logo à frente, um grupo de camaradas esfarrapados importuna o estalajadeiro para que lhes sirva mais [visiting_location.GetCounty.GetTitle.GetHolder.Custom('RegionalDrink')] e, num canto do balcão,"
 ep3_laamp_decision_event.1030.desc_nomad_mid_storyteller_intro: "\n\nLá fora, [Select_CString(laamp_storyteller.IsFemale, 'Uma narradora', 'Um narrador' )] se senta junto à fogueira. À frente, um grupo barulhento de [visiting_location.GetCounty.GetTitle.GetHolder.GetWomenMen] da tribo relembra sua mais recente expedição e, em um canto,"
 ep3_laamp_decision_event.1030.desc_mid_reused_spouse: "$ep3_laamp_decision_event.1030.desc_mid_storyteller_intro$ Avisto a [laamp_spouse_material.Custom('RandomPositiveShallowAdjective')] [laamp_spouse_material.GetFirstName] sentada, claramente entediada."
 ep3_laamp_decision_event.1030.desc_mid_spouse: "$ep3_laamp_decision_event.1030.desc_mid_storyteller_intro$ está sentado um[laamp_spouse_material.Custom('ES_XA')] [laamp_spouse_material.Custom('RandomPositiveShallowAdjectiveWithArticle')] [laamp_spouse_material.Custom('RaunchyComplimentNoun')], aparentemente entediad[laamp_spouse_material.Custom('ES_OA')]."
 ep3_laamp_decision_event.1030.desc_nomad_mid_spouse: "$ep3_laamp_decision_event.1030.desc_nomad_mid_storyteller_intro$ se senta um[laamp_spouse_material.Custom('ES_XA')] [laamp_spouse_material.Custom('RandomPositiveShallowAdjectiveWithArticle')] [laamp_spouse_material.Custom('RaunchyComplimentNoun')], ao que parece entediad[laamp_spouse_material.Custom('ES_OA')]."
 ep3_laamp_decision_event.1030.desc_mid_return_reused_spouse: "\n\nPerto do balcão, [laamp_spouse_material.GetFirstName] ainda está sentada, traçando o topo da sua taça com um dedo esguio."
 ep3_laamp_decision_event.1030.desc_mid_return_spouse: "\n\nJunto à bancada, [laamp_spouse_material.Custom('ES_ElLa')] [laamp_spouse_material.Custom('RandomPositiveShallowAdjective')] [laamp_spouse_material.Custom('RaunchyComplimentNoun')] que vi antes ainda está elegante, com a taça na mão."
 ep3_laamp_decision_event.1030.desc_mid: "\n\nHá [Select_CString(laamp_storyteller.IsFemale, 'Uma narradora', 'Um narrador' )] que se senta perto do fogo, um pouco mais adiante, e logo à frente, um grupo de camaradas esfarrapados importuna o servidor para que lhes sirva mais [visiting_location.GetCounty.GetTitle.GetHolder.Custom('RegionalDrink')]."
 ep3_laamp_decision_event.1030.desc_nomad_mid: "\n\nLá fora, [Select_CString(laamp_storyteller.IsFemale, 'Uma narradora', 'Um narrador' )] se senta junto à fogueira. Na frente, um grupo barulhento de [visiting_location.GetCounty.GetTitle.GetHolder.GetWomenMen] da tribo relembra sua mais recente excursão."
 #Outro
 ep3_laamp_decision_event.1030.desc_outro_hooded: "\n\nPerto da entrada, avisto uma figura encapuzada discreta. Claramente alguém que valoriza sua privacidade."
 ep3_laamp_decision_event.1030.desc_outro_partner: "\n\n[visiting_partner.GetFirstName] observa o grupo de indivíduos com um brilho de interesse nos olhos."
 ep3_laamp_decision_event.1030.desc_outro: "\n\nDou alguns passos em direção à [ROOT.Char.Custom('GetRoom')] luminosa e acolhedora, e reflito sobre o que fazer primeiro."
 ep3_laamp_decision_event.1030.desc_outro_return_partner_finished: "\n\n[visiting_partner.GetFirstName], que começa a parecer um pouco cansad[visiting_partner.Custom('ES_OA')], lança um olhar para uma mesa próxima: \"Se formos ficar por mais tempo, poderíamos ao menos comer algo, não, [visiting_partner.Custom2('RelationToMe', ROOT.Char)]?\"."
 ep3_laamp_decision_event.1030.desc_outro_return_finished: "\n\nOlho ao redor da [ROOT.Char.Custom('GetRoom')], agora parece muito mais vazia, quando percebo que não tenho mais nada para fazer."
 ep3_laamp_decision_event.1030.desc_outro_hooded_return_intro: "\n\nAo lado da entrada, a figura encapuzada discreta ainda está sentada,"
 ep3_laamp_decision_event.1030.desc_outro_hooded_noble_return: "$ep3_laamp_decision_event.1030.desc_outro_hooded_return_intro$ tomando mais um copo."
 ep3_laamp_decision_event.1030.desc_outro_hooded_return: "$ep3_laamp_decision_event.1030.desc_outro_hooded_return_intro$ mexendo com uma pequena adaga."
 ep3_laamp_decision_event.1030.desc_outro_return_partner_01: "\n\nEm um canto da [ROOT.Char.Custom('GetTavernDwelling')]. [visiting_partner.GetFirstName] observa um grupo de locais lançando objetos pontiagudos contra um barril quebrado com mórbida fascinação.\n\nLanço um olhar ao jogo enquanto considero o que fazer em seguida."
 ep3_laamp_decision_event.1030.desc_outro_return_partner_02: "\n\nÀ minha direita, [visiting_partner.GetFirstName] sorri com apreço quando um camponês termina uma piada grosseira envolvendo vários fluidos corporais. Lanço a [visiting_partner.GetHerHim] um olhar surpreso, enquanto avalio o que fazer em seguida."
 ep3_laamp_decision_event.1030.desc_outro_return_partner_03: "\n\nMais à frente, [visiting_partner.GetFirstName] entra em uma pequena dança enquanto o trovador do [ROOT.Char.Custom('GetTavernDwelling')] encerra uma canção folclórica local. Eu observo a dança relaxadamente enquanto pondero o que fazer em seguida."
 ep3_laamp_decision_event.1030.desc_outro_return_01: "\n\nO clima está animado e alguns frequentadores do [ROOT.Char.Custom('GetTavernDwelling')] começaram a cantar uma melodia [visiting_location.GetCounty.GetCulture.GetNameNoTooltip]. No meio do barulho, eu considero meu próximo movimento."
 ep3_laamp_decision_event.1030.desc_outro_return_02: "\n\nAo fundo da [ROOT.Char.Custom('GetRoomTent')] um[ROOT.Char.Custom('ES_XA')] nobre está ocupado conversando com [Select_CString(ROOT.Char.IsFemale, 'um camponês', 'uma camponesa' )]. Meu olhar se detém no brasão de armas [ROOT.Char.Custom('ES_DelDela')] do nobre enquanto penso no que fazer em seguida."
 ep3_laamp_decision_event.1030.desc_outro_return_03: "\n\nEm uma mesa perto da entrada, alguns locais estão jogando um jogo de tabuleiro exótico usando peças ásperas de pedra preta e branca. Observando suas jogadas, eu cuidadosamente pondero minhas opções."
 #Options
 ep3_laamp_decision_event.1030.a: "Não me importaria em ouvir uma ou duas histórias."
 ep3_laamp_decision_event.1030.a_second: "Tive outra ideia sobre aquela história."
 ep3_laamp_decision_event.1030.a.tt: "Sentar-se perto do fogo"
 ep3_laamp_decision_event.1030.a.cooldown.tt: "[Select_CString(laamp_storyteller.IsFemale, 'La narradora', 'El narrador' )] não tem mais histórias para esta visita"
 ep3_laamp_decision_event.1030.b: "Vamos ver quem está disposto a ser recrutado."
 ep3_laamp_decision_event.1030.b_second: "Talvez devêssemos recrutar alguém, afinal."
 ep3_laamp_decision_event.1030.b.tt: "Perguntar aos [THIS.Char.Custom('GetTaverngoersTribespeople')] desempregados"
 ep3_laamp_decision_event.1030.b.cooldown.tt: "Você já recrutou um [follower|lE] nesta visita."
 ep3_laamp_decision_event.1030.c: "Oh meu. Quem é #EMP isso#!?"
 ep3_laamp_decision_event.1030.c_second: "Para [laamp_spouse_material.GetFirstNameNoTooltip]. #EMP Agora#!."
 ep3_laamp_decision_event.1030.c.tt: "Aproximar-se [laamp_spouse_material.Custom('ES_AlAla')] [laamp_spouse_material.Custom('RaunchyComplimentNoun')] junto ao balcão"
 ep3_laamp_decision_event.1030.c.tt_second: "Retomar a conversa com [laamp_spouse_material.GetShortUIName]"
 ep3_laamp_decision_event.1030.c.cooldown.tt: "Você já recrutou um potencial [spouse|lE] como [follower|lE] — retorne em [GetCurrentDateWithDiff( GetVarTimeRemaining( THIS.Char.MakeScope, '1035_has_spoused_recently') )]"
 ep3_laamp_decision_event.1030.c.success.cooldown.tt: "Você já recrutou um potencial [spouse|lE] nesta visita."
 ep3_laamp_decision_event.1030.c.failure.cooldown.tt: "Você já tentou recrutar um potencial [spouse|lE] nesta visita."
 ep3_laamp_decision_event.1030.d: "Que figura encapuzada intrigante..."
 ep3_laamp_decision_event.1030.d_second: "Outra conversa com [laamp_hooded_figure.GetFirstNameNoTooltip] não faria mal."
 ep3_laamp_decision_event.1030.d_third: "Eu deveria voltar para [laamp_hooded_figure.GetFirstNameNoTooltip]."
 ep3_laamp_decision_event.1030.d.tt: "Aproximar-se da figura encapuzada."
 ep3_laamp_decision_event.1030.d.tt_second: "Voltar para [laamp_hooded_figure.GetShortUIName]."
 ep3_laamp_decision_event.1030.e: "$ep3_laamp_decision_event.1010.e$"
 ep3_laamp_decision_event.1030.e_second: "Estamos terminados aqui."
 #Storyteller
 ep3_laamp_decision_event.1031.return.tt: "Você retorna à entrada do [THIS.Char.Custom('GetTavernDwelling')]"
 ep3_laamp_decision_event.1031.t: "[visiting_location.GetBaronyNameExplicitlyNoTooltip]: [Select_CString(laamp_storyteller.IsFemale, 'la narradora', 'el narrador' )]"
 ep3_laamp_decision_event.1031.desc_01: "#EMP \"...e ansiando para se livrar da incessante martelada, a cabeça de Zeus foi dividida em duas e de lá surgiu Atena, a mais sábia das divindades.\"#!"
 ep3_laamp_decision_event.1031.desc_02: "#EMP \"...e então Hórus e Set se tornaram inimigos mortais, lutando pelo trono vazio.\"#!"
 ep3_laamp_decision_event.1031.desc_03: "#EMP \"...e desde aquele dia, Ruha foi banida do Mundo da Luz e exilada para o Mundo das Trevas.\"#!"
 ep3_laamp_decision_event.1031.desc_04: "#EMP \"...e então o grande Leviatã destruiu o mundo pela quinta vez, morrendo no processo. Mas de seu corpo surgiram novas terras, plantas e animais.\"#!"
 ep3_laamp_decision_event.1031.desc_05: "#EMP \"...e então ele se tornou o atua das florestas, Tangaroa herdou os mares, Rūaumoko a terra tremulante e Tāwhirimatea o vento caprichoso.\"#!"
 ep3_laamp_decision_event.1031.desc_06: "#EMP \"...e então o ovo caiu; suas partes formando o universo — a gema do ovo se tornou o sol quente e a clara se tornou a bela lua.\"#!"
 ep3_laamp_decision_event.1031.desc_07: "#EMP \"...e então Kuutar fiou o fio dourado em uma magnífica túnica; larga como o céu noturno e longa como a eternidade.\"#!"
 ep3_laamp_decision_event.1031.desc_08: "#EMP \"...e então, quando ela percebeu que era seu próprio irmão, Kullervo, quem a seduzira, ela caiu do penhasco e na vida além.\"#!"
 ep3_laamp_decision_event.1031.desc_09: "#EMP \"...e então Finn, em sua raiva, virou pedra. Seus sonhos de destruição nunca foram realizados e, assim, a catedral ainda permanece, até hoje.\"#!"
 ep3_laamp_decision_event.1031.desc_10: "#EMP \"...e apesar do aviso de Kaangs, os humanos acenderam um fogo na crescente escuridão, e os animais fugiram para as colinas.\"#!"
 ep3_laamp_decision_event.1031.desc_11: "#EMP \"...e então o barro amassado foi coberto com pele, preenchido com sangue e Tore o nomeou Baatsi.\"#!"
 ep3_laamp_decision_event.1031.desc_12: "#EMP \"...e então o acampamento cheio de mulheres emergiu vitorioso sobre o acampamento cheio de homens, permitindo que eles mais uma vez #EMP interagissem#! uns com os outros.\"#!"
 ep3_laamp_decision_event.1031.desc_13: "#EMP \"...e eles a chamaram de Teryel, a primeira leoa.\"#!"
 ep3_laamp_decision_event.1031.desc_14: "#EMP \"...e o Soma foi dado aos deuses, mas quatro gotas foram derramadas sobre a própria terra, e dessas gotas surgiram cidades sagradas.\"#!"
 ep3_laamp_decision_event.1031.desc_15: "#EMP \"...e com um grande gole, o Culebre devorou sua vaca, patas e tudo.\"#!"
 ep3_laamp_decision_event.1031.desc_16: "#EMP \"...e então Toranos recebeu o sacrifício; o sangue escorrendo por seu torso, reanimando-o, criando assim uma nova primavera.\"#!"
 ep3_laamp_decision_event.1031.desc_17: "#EMP \"...e então Tjelvar veio à ilha, trazendo fogo, que fez a ilha parar de afundar nas ondas a cada noite.\"#!"
 ep3_laamp_decision_event.1031.desc_18: "#EMP \"...e então vieram as chuvas na África, com muito canto, dança e alegria.\"#!"
 ep3_laamp_decision_event.1031.desc_19: "#EMP …E quando voltou à praia pela manhã, o rei descobriu que as pedras preciosas tinham rodeado a mãe do tesouro por vontade própria.#!"
 ep3_laamp_decision_event.1031.desc_outro: "\n\n“Mas isso é história para outra hora.” [laamp_storyteller.GetFirstNameNoTooltip] me dirige um sorriso misterioso, se recosta em seu assento junto à lareira e toma outro gole de [laamp_storyteller.Custom('RegionalDrink')]."
 ep3_laamp_decision_event.1031.a: "Essa história teve alguns bons pontos."
 ep3_laamp_decision_event.1031.a_zealous: "… Acho que tinha um ou dois pontos relevantes."
 ep3_laamp_decision_event.1031.a_eccentric: "Veja, agora isso faz todo sentido!"
 ep3_laamp_decision_event.1031.a_success.t: "Habilidades Através de Morais"
 ep3_laamp_decision_event.1031.a_success.desc: "Você aprende algo com a moral da história."
 ep3_laamp_decision_event.1031.a_semi_success.t: "Oportunidade de Crescimento"
 ep3_laamp_decision_event.1031.a_semi_success.desc: "Partes da história são aplicáveis à sua situação."
 ep3_laamp_decision_event.1031.a_failure.t: "Boa História"
 ep3_laamp_decision_event.1031.a_failure.desc: "Pelo menos foi uma história emocionante."
 ep3_laamp_decision_event.1031.a.cooldown.tt: "Você refletiu sobre uma história recentemente — retorne em [GetCurrentDateWithDiff( GetVarTimeRemaining( THIS.Char.MakeScope, '1031_has_storied_recently') )]"
 ep3_laamp_decision_event.1031.b: "\"[laamp_storyteller.GetFirstNameNoTooltip], como você conta histórias tão bem?\""
 ep3_laamp_decision_event.1031.b_reveler: "Eu conheço essa!"
 ep3_laamp_decision_event.1031.b.cooldown.tt: "Você se divertiu com uma história recentemente — retorne em [GetCurrentDateWithDiff( GetVarTimeRemaining( THIS.Char.MakeScope, '1031_has_reveled_recently') )]"
 ep3_laamp_decision_event.1031.c: "\"Foi uma ótima história, amig[laamp_storyteller.Custom('ES_OA')]!\"."
 ep3_laamp_decision_event.1031.c_zealous: "Bah. Que absurdo blasfêmico."
 ep3_laamp_decision_event.1031.c.cooldown.tt: "Você desfrutou de uma história recentemente — retorne em [GetCurrentDateWithDiff( GetVarTimeRemaining( THIS.Char.MakeScope, '1031_has_relaxed_recently') )]"
 ep3_laamp_decision_event.1031.d: "$ep3_laamp_decision_event.1021.d$"
 #Recruitment
 ep3_laamp_decision_event.1033.t: "[visiting_location.GetBaronyNameExplicitlyNoTooltip]: os Recrutas"
 ep3_laamp_decision_event.1033.desc_returned_01: "Ao retornar aos potenciais recrutas, [laamp_first_recruit.GetFirstName], [laamp_second_recruit.GetFirstName] e [laamp_third_recruit.GetFirstName] se observam desconfiados.$ep3_laamp_decision_event.1033.desc_returned_outro_01$"
 ep3_laamp_decision_event.1033.desc_returned_jane_01: "Ao retornar aos potenciais recrutas, [laamp_first_recruit.GetFirstName] e [laamp_second_recruit.GetFirstName] engajam-se em uma conversa tranquila."
 ep3_laamp_decision_event.1033.desc_returned_outro_01: "\n\nQuando me notam, todos se animam e me encaram com expectativa."
 ep3_laamp_decision_event.1033.desc_returned_02: "De volta aos recrutas, o trio composto por [laamp_first_recruit.GetFirstName], [laamp_second_recruit.GetFirstName] e [laamp_third_recruit.GetFirstName] aparentemente acabou de resolver uma disputa.$ep3_laamp_decision_event.1033.desc_returned_outro_02$"
 ep3_laamp_decision_event.1033.desc_returned_jane_02: "De volta aos recrutas, o duo de [laamp_first_recruit.GetFirstName] e [laamp_second_recruit.GetFirstName] acaba de terminar um jogo de dados com resultados contestados."
 ep3_laamp_decision_event.1033.desc_returned_outro_02: "\n\nA tensão no ar muda levemente quando me aproximo, transformando-se em uma expectativa cautelosa."
 ep3_laamp_decision_event.1033.desc: "Aproximando-me do grupo de [visiting_location.GetCounty.GetCulture.GetCollectiveNounNoTooltip] desempregados, levanto minha voz e os endereço diretamente: \"Estou procurando algumas pessoas habilidosas e confiáveis para se juntar ao meu acampamento! Quem entre vocês está disposto para essa tarefa?\""
 ep3_laamp_decision_event.1033.desc_mid_two: "\n\nOs interessados se apresentam como [laamp_first_recruit.GetFirstName], [laamp_first_recruit.Custom('ES_ElLa')] de aspecto [laamp_first_recruit.Custom('PersonalityGetNegativeTraitDesc')|l], e [laamp_second_recruit.GetFirstName], [laamp_second_recruit.Custom('ES_ElLa')] de temperamento [laamp_second_recruit.Custom('PersonalityGetNegativeTraitDesc')|l]."
 ep3_laamp_decision_event.1033.desc_mid_three: "\n\nOs interessados se apresentam como [laamp_first_recruit.GetFirstName], [laamp_first_recruit.Custom('ES_ElLa')] do aspecto [laamp_first_recruit.Custom('PersonalityGetNegativeTraitDesc')|l], [laamp_second_recruit.GetFirstName], [laamp_second_recruit.Custom('ES_ElLa')] do temperamento [laamp_second_recruit.Custom('PersonalityGetNegativeTraitDesc')|l], e [laamp_third_recruit.GetFirstName], [laamp_third_recruit.Custom('ES_ElLa')] do semblante [laamp_third_recruit.Custom('PersonalityGetNegativeTraitDesc')|l]."
 ep3_laamp_decision_event.1033.desc_outro: "\n\nExamino os candidatos de cima a baixo, tentando decidir qual deles recrutar."
 ep3_laamp_decision_event.1033.desc_partner_outro: "\n\n[visiting_partner.GetFirstName] cantarola e examina os candidatos enquanto eu considero qual recrutar."
 ep3_laamp_decision_event.1033.desc_jane_outro: "\n\nQuando termino de fazer as apresentações, um[laamp_generic_jane.Custom('ES_XA')] [laamp_generic_jane.GetWomanMan] brus[laamp_generic_jane.Custom('ES_OA')] se aproxima de imediato de mim: Meu nome é [laamp_generic_jane.GetFirstName]. Por motivos que só a mim dizem respeito, eu gostaria de me juntar ao vosso acampamento."
 ep3_laamp_decision_event.1033.desc_returned_jane_outro: "\n\n[laamp_generic_jane.GetFirstNameNoTooltip] continua parada em um canto, devolvendo meu olhar enquanto avalio os candidatos."
 ep3_laamp_decision_event.1033.a: "\"Que tal você trabalhar para mim, [laamp_first_recruit.GetFirstNameNoTooltip]?\""
 ep3_laamp_decision_event.1033.b: "[laamp_second_recruit.GetFirstNameNoTooltip] parece um bom espécime."
 ep3_laamp_decision_event.1033.c: "Eu só vejo potencial em [laamp_third_recruit.GetFirstNameNoTooltip]."
 ep3_laamp_decision_event.1033.d: "\"...[laamp_generic_jane.GetFirstNameNoTooltip], não era? Junte-se a mim.\""
 ep3_laamp_decision_event.1033.d.cooldown.tt: "Você recrutou um [follower|lE] livre recentemente - retorne em [GetCurrentDateWithDiff( GetVarTimeRemaining( THIS.Char.MakeScope, '1033_generic_jane_cooldown') )]"
 ep3_laamp_decision_event.1033.e: "$ep3_laamp_decision_event.1021.d$"
 #Spouse Material
 ep3_laamp_decision_event.1035.t: "[visiting_location.GetBaronyNameExplicitlyNoTooltip]: o Potencial Par"
 ep3_laamp_decision_event.1035.desc_returned_01: "Volto para a mesa de [laamp_spouse_material.GetFirstName] e começo a sentir o sangue pulsando nos ouvidos.\n\nCalma. Muita calma. #EMP Habla.#!\n\n[laamp_spouse_material.GetFirstNameNoTooltip] está ocupad[laamp_spouse_material.Custom('ES_OA')] conversando com [Select_CString(laamp_spouse_material.IsFemale, 'un hombre', 'una mujer' )] quando me aproximo de [laamp_spouse_material.GetSheHe] e seus olhos se estreitam em expectativa:"
 ep3_laamp_decision_event.1035.desc_returned_02: "Quando volto à mesa dela, [laamp_spouse_material.GetFirstName] acaba de receber um prato fumegante de comida, cujo aroma faz meu estômago roncar.\n\n[laamp_spouse_material.GetFirstNameNoTooltip] mantém os olhos fixos no [visiting_location.GetCounty.GetTitle.GetHolder.Custom('GetLocalStreetFood')] enquanto comenta secamente: «Será que desta vez #EMP queréis#! queríeis mesmo algo?».\n\nSeu cumprimento sarcástico me faz hesitar, e pondero cuidadosamente minha resposta:"
 ep3_laamp_decision_event.1035.desc_reused_spouse: "Aproximo-me casualmente a [laamp_spouse_material.GetFirstName], que, tão radiante como sempre, ergue o olhar quando me aproximo.\n\nA princípio, parece que lhe custa me reconhecer, e depois seus olhos se estreitam em reconhecimento.\n\n #EMP Nada personal#!, digo a mim mesmo, e sorrio levemente enquanto tento ignorar o desconforto que sinto no peito:"
 ep3_laamp_decision_event.1035.desc: "Observo atentamente este ser [laamp_spouse_material.Custom('RaunchyComplimentNoun')|l] que está sentado em uma mesa próxima. O dono da taverna chamou [laamp_spouse_material.GetHerHim] de [laamp_spouse_material.GetFirstName], não chamou?\n\nParece confus[laamp_spouse_material.Custom('ES_OA')] quando me aproximo de [laamp_spouse_material.GetSheHe], provavelmente porque meu tumulto interior está estampado no rosto. Por que isso me incomoda? #EMP Soy [ROOT.Char.GetNameNoTooltip], voto a bríos!#!\n\nNão paro de me lembrar de minhas conquistas mais recentes para permanecer calmo. Estou falhando na maior parte do tempo."
 ep3_laamp_decision_event.1035.a: "\"Que tal eu te comprar mais uma caneca de [laamp_spouse_material.Custom('RegionalDrink')]?\""
 ep3_laamp_decision_event.1035.b_first: "\"Além de #EMP roubar corações#!, o que mais você faz?\""
 ep3_laamp_decision_event.1035.b_second: "\"Você tem um nome? Ou posso te chamar de #EMP meu#!?\""
 ep3_laamp_decision_event.1035.b_third: "\"Você tem um mapa? Eu acabei de #EMP me perder#! nos seus olhos.\""
 ep3_laamp_decision_event.1035.b_fourth: "\"Você pesca? Porque você me #EMP fisgou#!.\""
 ep3_laamp_decision_event.1035.b_fifth: "\"Se você me deixar pegar um beijo emprestado, eu #EMP prometo#! devolvê-lo na hora.\""
 ep3_laamp_decision_event.1035.b_fallback: "O que faz um [laamp_spouse_material.Custom('ES_XA')] [laamp_spouse_material.Custom('GirlBoy')] como você em um lugar como este?"
 ep3_laamp_decision_event.1035.b.success: "[laamp_spouse_material.GetShortUIName] está encantado com suas investidas."
 ep3_laamp_decision_event.1035.b.failure: "Você não consegue atrair a atenção de [laamp_spouse_material.GetShortUIName]."
 ep3_laamp_decision_event.1035.b.failure.tt: "[laamp_spouse_material.GetShortUIName] começa a ignorá-lo."
 ep3_laamp_decision_event.1035.b.cooldown.tt: "Você recentemente tentou atrair um potencial [spouse|lE] — tente novamente em [GetCurrentDateWithDiff( GetVarTimeRemaining( THIS.Char.MakeScope, '1035_spouse_duelled_recently') )]"
 ep3_laamp_decision_event.1035.c: "\"...por que não levamos isso para um lugar #EMP mais confortável#!...\""
 ep3_laamp_decision_event.1035.c.cooldown.tt: "Você se relaxou em um [ROOT.Char.Custom('GetTavernDwelling')] recentemente — retorne novamente em [GetCurrentDateWithDiff( GetVarTimeRemaining( THIS.Char.MakeScope, '1035_spouse_unwinded_recently') )]"
 ep3_laamp_decision_event.1035.d: "$ep3_laamp_decision_event.1021.d$"
 #Hooded Figure
 ep3_laamp_decision_event.1037.t_noble: "[visiting_location.GetBaronyNameExplicitlyNoTooltip]: [laamp_hooded_figure.GetFirstNameNoTooltip] está em apuros!"
 ep3_laamp_decision_event.1037.t: "[visiting_location.GetBaronyNameExplicitlyNoTooltip]: o Procurado [Select_CString(laamp_hooded_figure.IsFemale, 'la buscada', 'el buscado' )]"
 ep3_laamp_decision_event.1037.desc_noble_returned_01: "Volto até [laamp_hooded_figure.GetFirstName], que ainda está em conflito acalorado com o brigão local.\n\nSeus olhares permanecem fixos um no outro, o impasse está completo e só é prejudicado pelo brigão [visiting_location.GetCounty.GetCulture.GetNameNoTooltip] que ocasionalmente olha para a porta de soslaio, como se estivesse esperando por algo. Ou por #EMP alguém#!.\n\nSinto uma gota de suor escorrendo pelas minhas costas."
 ep3_laamp_decision_event.1037.desc_noble_returned_02: "De volta ? mesa de [laamp_hooded_figure.GetFirstName], a tens?o n?o diminuiu e a pessoa rude [visiting_location.GetCounty.GetCulture.GetNameNoTooltip] segue esperando o pagamento.\n\n[laamp_hooded_figure.Custom('ES_ElLa')|U] [laamp_hooded_figure.GetTitleAsNameNoTooltip|l] #EMP se recusa#! a cumprir, e o transeunte ocasional diminui o passo ao passar, apenas para apressar-se quando percebe o que est? prestes a acontecer.\n\nMeu olhar vai de um lado para o outro sem parar."
 ep3_laamp_decision_event.1037.desc_returned_01_intro: "De volta à adega, [laamp_hooded_figure.GetFirstName] está ocupad[laamp_hooded_figure.Custom('ES_OA')] observando um mapa. Uma tábua do assoalho range"
 ep3_laamp_decision_event.1037.desc_nomad_returned_01_intro: "Na outra tenda [laamp_hooded_figure.GetFirstName] está ocupad[laamp_hooded_figure.Custom('ES_OA')] olhando um mapa. Esbarro em um [laamp_hooded_figure.Custom('GetSmallHidingObject')] sem querer"
 ep3_laamp_decision_event.1037.desc_returned_01_outro: "e [laamp_hooded_figure.GetSheHe] vira a cabeça de súbito para olhar para mim.\n\n“Você voltou”, comenta, enquanto fecha cuidadosamente o mapa que mostra a posse próxima de [1037_neighboring_holding.GetBaronyNameExplicitly]. “Quer alguma coisa?”.\n\n[laamp_hooded_figure.GetFirstNameNoTooltip] se levanta, cruza os braços e se apoia discretamente sobre uma perna."
 ep3_laamp_decision_event.1037.desc_returned_01: "$ep3_laamp_decision_event.1037.desc_returned_01_intro$ $ep3_laamp_decision_event.1037.desc_returned_01_outro$"
 ep3_laamp_decision_event.1037.desc_nomad_returned_01: "$ep3_laamp_decision_event.1037.desc_nomad_returned_01_intro$ $ep3_laamp_decision_event.1037.desc_returned_01_outro$"
 ep3_laamp_decision_event.1037.desc_returned_02: "Eu olho para baixo na adega antes de descer as escadas mais uma vez. $ep3_laamp_decision_event.1037.desc_returned_02_outro$"
 ep3_laamp_decision_event.1037.desc_nomad_returned_02: "Eu levanto a aba da tenda e olho para dentro antes de entrar: $ep3_laamp_decision_event.1037.desc_returned_02_outro$"
 ep3_laamp_decision_event.1037.desc_returned_02_outro: "Eu espreito a adega antes de descer as escadas mais uma vez. [laamp_hooded_figure.Custom('ES_ElLa')|U] malandro [laamp_hooded_figure.GetFirstName] se reclina na cadeira com o olhar fixo no [ROOT.Char.Custom('GetCeilingCanopy')]\n\nLança despreocupadamente uma moeda [visiting_location.GetCounty.GetCulture.GetNameNoTooltip] ao ar, vira-a e então a apanha com mão firme.\n\nLimpo a garganta e [laamp_hooded_figure.GetFirstNameNoTooltip] fecha os olhos enquanto guarda a moeda, cruzando as mãos atrás da cabeça e resmungando: \"Sim?\""
 ep3_laamp_decision_event.1037.desc_returned_03: "Ao voltar para a adega, a porta está fechada. Eu a abro com cuidado e desço as escadas.\n\nUm pouco mais adiante, [laamp_hooded_figure.GetFirstName] esfrega algo que parece… ¿#EMP sangre#!? Certamente é sangue de #EMP animal#!…\n\n[laamp_hooded_figure.GetFirstName] faz estalar os nós dos dedos enquanto põe o balde de lado e volta sua atenção para mim: «Você é persistente, não é?»."
 ep3_laamp_decision_event.1037.desc_nomad_returned_03: "Em pé do lado de fora da tenda do canalha de [laamp_hooded_figure.GetFirstName] ouço algo que parece um remexer vindo de dentro. De repente, para.\n\nEnfio a cabeça com cuidado para dentro da tenda e o vejo na escuridão, limpando uma faca de uma substância escura. Sangue...?\n\n[laamp_hooded_figure.GetFirstNameNoTooltip] se vira na minha direção com indiferença: \"Foi só uma #EMP rata#!. Mas #EMP vos#!, por outro lado, vocês são bem persistentes, não são?\"."
 ep3_laamp_decision_event.1037.desc_intro: "A figura encapuzada se move discretamente pela taverna e desce uma escada até a adega. Olho ao redor com cautela, enquanto [laamp_hooded_figure.GetHerHim] sigo escada abaixo.\n\nAo fundo, [laamp_hooded_figure.GetSheHe] se senta em uma cadeira em frente a uma mesa e abaixa o capuz"
 ep3_laamp_decision_event.1037.desc_nomad_intro: "A figura encapuzada se move discretamente pela moradia e sai pelo outro lado. Olho ao redor com cautela, enquanto [laamp_hooded_figure.GetHerHim] sigo para fora e entro em uma tenda adjacente.\n\nLá dentro, [laamp_hooded_figure.GetSheHe] se senta em uma cadeira em frente a uma mesa e abaixa o capuz"
 ep3_laamp_decision_event.1037.desc_reused_thief_outro: "\n\nReconheço [laamp_hooded_figure.GetFirstName] quando ele/a bate animadamente [laamp_hooded_figure.Custom('ES_OA')] o punho na mesa: Ora, que me parta um raio! Não esperava voltar a ver #EMP veros#! de novo — pelo menos não nesta vida. O que posso fazer por você?"
 ep3_laamp_decision_event.1037.desc_reused_thief: "$ep3_laamp_decision_event.1037.desc_intro$.$ep3_laamp_decision_event.1037.desc_reused_thief_outro$"
 ep3_laamp_decision_event.1037.desc_nomad_reused_thief: "$ep3_laamp_decision_event.1037.desc_nomad_intro$.$ep3_laamp_decision_event.1037.desc_reused_thief_outro$"
 ep3_laamp_decision_event.1037.desc_noble: "… e então vem o imposto de #EMP assento#!\", comenta o canalha [visiting_location.GetCounty.GetCulture.GetNameNoTooltip] com um sorriso irônico, enquanto aponta para a cadeira da figura encapuzada. \"Isso será mais um pouco de ouro, certamente.\"\n\n[Select_CString( laamp_hooded_figure.IsFemale, 'A encapuzada', 'O encapuzado' )] se levanta de repente e, quando a capa cai, [laamp_hooded_figure.GetHerHim] reconheço como [laamp_hooded_figure.GetName], nada menos: \"É um ultraje!\", exclama [laamp_hooded_figure.Custom('ES_ElLa')] [laamp_hooded_figure.GetTitleAsNameNoTooltip|l], claramente abalado.\n\n\"Não me façam recorrer aos meus #EMP sócios comerciais#!\", ameaça o canalha, e a situação fica cada vez mais tensa."
 ep3_laamp_decision_event.1037.desc: "$ep3_laamp_decision_event.1037.desc_intro$$ep3_laamp_decision_event.1037.desc_outro$"
 ep3_laamp_decision_event.1037.desc_nomad: "$ep3_laamp_decision_event.1037.desc_nomad_intro$$ep3_laamp_decision_event.1037.desc_outro$"
 ep3_laamp_decision_event.1037.desc_outro: ": «Suponho que me reconhecem pela minha reputação». #EMP «¡[laamp_hooded_figure.Custom('ES_ElLa')|U] delincuente y especie de [laamp_hooded_figure.Custom2('CriminalCrierInsult', ROOT.Char)] [laamp_hooded_figure.Custom2('CriminalAdjective', ROOT.Char)] de [laamp_hooded_figure.GetFirstNameNoTooltip]!»#!».\n\n«… Eu já #EMP ablandado#! pessoas por insultos mais leves. Então, o que querem?». O olhar de [laamp_hooded_figure.GetFirstName] se fixa em mim enquanto ergue uma sobrancelha com curiosidade."
 ep3_laamp_decision_event.1037.a: "\"Eu pagarei a conta dele\"."
 ep3_laamp_decision_event.1037.a.flavor: "Tenho certeza de que isso será útil."
 ep3_laamp_decision_event.1037.b_diplomacy: "\"Certamente você ganharia mais ouro com um cliente #EMP que retorna#!\""
 ep3_laamp_decision_event.1037.b_stewardship: "\"Isso não é o imposto sobre a #EMP acomodação#! atual, lamento.\""
 ep3_laamp_decision_event.1037.b_intrigue: "\"Os guarda-costas estão #EMP justo#! do lado de fora; por informar…\""
 ep3_laamp_decision_event.1037.b_learning: "\"Nós somos melhores do que isso, com certeza?\""
 ep3_laamp_decision_event.1037.b_martial: "\"Quer resolver isso com #EMP eu#! em vez?\""
 ep3_laamp_decision_event.1037.b.flavor: "Qual é o pior que poderia acontecer?"
 ep3_laamp_decision_event.1037.b.success: "Você convence com sucesso o patife a deixar [laamp_hooded_figure.GetShortUIName] em paz"
 ep3_laamp_decision_event.1037.b.success.t: "Nobre salvo[laamp_hooded_figure.Custom('ES_OA')]"
 ep3_laamp_decision_event.1037.b.failure: "Você não consegue convencer o patife"
 ep3_laamp_decision_event.1037.b.failure.t: "Não Convincente"
 ep3_laamp_decision_event.1037.c: "\"Est[laamp_hooded_figure.Custom('ES_EA')] #EMP [laamp_hooded_figure.GetTitleAsNameNoTooltip]#! já está comprometido(a), seu [ROOT.Char.Custom2('InsultNoun', ROOT.Char)]!\"."
 ep3_laamp_decision_event.1037.c.flavor: "Já vi coisas piores."
 ep3_laamp_decision_event.1037.d: "\"Eu poderia usar um[laamp_hooded_figure.Custom('ES_XA')] [laamp_hooded_figure.GetWomanMan] de seu talento, [laamp_hooded_figure.GetFirstNameNoTooltip]\"."
 ep3_laamp_decision_event.1037.d_thief_position: "\"Você sabe, tenho uma posição vaga de $master_thief_camp_officer$ só para você.\""
 ep3_laamp_decision_event.1037.e: "\"Um[laamp_hooded_figure.Custom('ES_XA')] profissional do seu calibre #EMP medraría#! prosperaria no meu acampamento\"."
 ep3_laamp_decision_event.1037.e.success: "[laamp_hooded_figure.GetShortUIName] está intrigado com essa ideia"
 ep3_laamp_decision_event.1037.e.failure: "Você não consegue atrair [laamp_hooded_figure.GetShortUIName]"
 ep3_laamp_decision_event.1037.e.failure.tt: "[laamp_hooded_figure.GetShortUIName] começa a te ignorar"
 ep3_laamp_decision_event.1037.f: "\"Você poderia me ensinar a... arte?\""
 ep3_laamp_decision_event.1037.g: "\"Você e eu, [Select_CString(And(ROOT.Char.IsFemale, laamp_hooded_figure.IsFemale), 'juntas','juntos')] #EMP dominaríamos#! dominaríamos este domínio, [laamp_hooded_figure.GetFirstNameNoTooltip]\"."
 ep3_laamp_decision_event.1037.h: "$ep3_laamp_decision_event.1021.d$"
 #Option: Visit the local church grounds
 ep3_laamp_decision_event.1040.t: "[visiting_location.GetBaronyNameExplicitlyNoTooltip]: os terrenos da [visiting_location.GetCounty.GetFaith.HouseOfWorship]"
 ep3_laamp_decision_event.1040.desc_returned_01: "De volta aos terrenos da [visiting_location.GetCounty.GetFaith.HouseOfWorship], tudo está igual. À medida que o sol se move lentamente pelo céu, os edifícios adjacentes da praça se revezam em proporcionar sombra para a praça aberta"
 ep3_laamp_decision_event.1040.desc_returned_02: "Um intenso aroma de incenso penetra implacavelmente minhas narinas enquanto caminho pelo sol suave de volta aos terrenos da [visiting_location.GetCounty.GetFaith.HouseOfWorship]."
 ep3_laamp_decision_event.1040.desc_returned_from_healer: "Entrecerro os olhos enquanto volto da escuridão da cabana [Select_CString(laamp_healer_character.IsFemale, 'de la sanadora', 'del sanador' )] para encontrar o caminho de volta à praça da [visiting_location.GetCounty.GetFaith.HouseOfWorship]."
 ep3_laamp_decision_event.1040.desc_returned_from_church: "Ao voltar pelos portões da [visiting_location.GetCounty.GetFaith.HouseOfWorship], uma tranquilidade arcádica me acompanha enquanto me encontro de volta na praça da [visiting_location.GetCounty.GetFaith.HouseOfWorship]."
 ep3_laamp_decision_event.1040.desc_returned_from_garden: "Retorno do jardim sereno sentindo-me mais leve[ROOT.Char.Custom('ES_OA')] enquanto observo o movimento agitado da praça da [visiting_location.GetCounty.GetFaith.HouseOfWorship]."
 ep3_laamp_decision_event.1040.desc_returned_from_physician: "Eu sigo pelos becos estreitos de volta do estudo de [laamp_physician_recruit.GetFirstNameNoTooltip] e me encontro de volta aos terrenos da [visiting_location.GetCounty.GetFaith.HouseOfWorship]."
 ep3_laamp_decision_event.1040.desc: "Há uma certa paz na praça da [visiting_location.GetCounty.GetFaith.HouseOfWorship], apesar de haver muito comércio, [visiting_location.GetCounty.GetFaith.PriestNeuterPlural] e ajudantes por perto.\n\nUma magnífica [visiting_location.GetCounty.GetFaith.HouseOfWorship] se ergue no meio, e ao lado, avisto placas com ousadas promessas de cura, bem como um jardim anexo para a contemplação silenciosa de [visiting_location.GetCounty.GetFaith.HighGodName]."
 ep3_laamp_decision_event.1040.desc_outro_physician_sickly_minor: "\n\nNa extremidade da praça, um devoto prega sobre uma saúde corporal melhor; e, como combinamos antes, levaram meu enferm[1040_sickly_minor.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('1040_sickly_minor'))] [1040_sickly_minor.GetFirstName] à cabana [Select_CString(laamp_healer_character.IsFemale, 'de la sanadora', 'del sanador' )], onde me aguarda."
 ep3_laamp_decision_event.1040.desc_outro_physician: "\n\nEm um canto da praça, um devoto prega sobre como uma melhor saúde corporal melhora nossa saúde espiritual. Ele/ela se mantém firme apesar das ocasionais provocações da multidão de camponeses."
 ep3_laamp_decision_event.1040.desc_outro_sickly_minor: "\n\nConforme combinamos no acampamento com um dos auxiliares, acompanharam meu enferm[1040_sickly_minor.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('1040_sickly_minor'))] [1040_sickly_minor.GetFirstName], até a cabana [Select_CString(laamp_healer_character.IsFemale, 'de la sanadora', 'del sanador' )], onde me aguarda."
 ep3_laamp_decision_event.1040.desc_outro_partner: "\n\n[visiting_partner.GetFirstName] acena com gratidão e já observa barracas curiosas e pontos de interesse ao redor da movimentada praça."
 ep3_laamp_decision_event.1040.desc_outro: "\n\nEu me encontro em um estado de contentamento, olhando para a praça, e respiro fundo algumas vezes enquanto reflito sobre meu próximo destino."
 ep3_laamp_decision_event.1040.desc_outro_return_partner_finished: "\n\n[visiting_partner.GetFirstName], que já começa a mostrar cansaço, diz: \"Não sou de [visiting_partner.GetHerHim] que reclamam, mas… você não acha que já terminamos aqui, [visiting_partner.Custom2('RelationToMe', ROOT.Char)]?\""
 ep3_laamp_decision_event.1040.desc_outro_return_finished: "\n\nApós passar um tempo considerável aqui na praça da [visiting_location.GetCounty.GetFaith.HouseOfWorship], estou satisfeito com os negócios deste dia e olho ao redor em busca do caminho mais rápido de volta à praça principal."
 ep3_laamp_decision_event.1040.desc_outro_physician_return: "\n\n[Select_CString(laamp_physician_recruit.IsFemale, 'La predicadora devota','El predicador devoto' )] continua pregando seus ensinamentos relacionados à saúde, mas parece estar se aproximando do fim da palestra."
 ep3_laamp_decision_event.1040.desc_outro_sickly_minor_return: "\n\nPor algum motivo, agora parece que há um monte de crianças na praça. Estiveram sempre aqui? Elas brincam e brigam, encontrando o tempo todo novas maneiras de fazer as mesmas coisas de sempre; não raro, para surpresa e desgosto de seus cuidadores.\n\nNão consigo parar de pensar no estado de saúde de [1040_sickly_minor.GetFirstName], enquanto olho pela praça em busca do meu próximo destino."
 ep3_laamp_decision_event.1040.desc_outro_return_partner_01: "\n\nÀ minha esquerda, [visiting_partner.GetFirstName] examina com curiosidade uma banca coberta de garrafinhas minúsculas — supostamente cheias de gotas de veneno de [ROOT.Char.Custom('VenomousCreature')].\n\nA simples ideia me arrepia, enquanto tento decidir para onde ir a seguir."
 ep3_laamp_decision_event.1040.desc_outro_return_partner_02: "\n\n[visiting_partner.GetFirstName] me dá uma cotovelada no ombro, apontando para os guardas que escoltam [Select_CString(ROOT.Char.IsFemale, 'una mujer andrajosa','un hombre andrajoso' )] para fora do local, gritando sobre o fim do mundo.\n\nErgo as sobrancelhas instintivamente e observo a agitação enquanto considero o que fazer em seguida."
 ep3_laamp_decision_event.1040.desc_outro_return_partner_03: "\n\n[visiting_partner.GetFirstName] me entrega um petisco enquanto passeamos pela praça.\n\nMastigo cuidadosamente as rações secas enquanto penso qual será meu próximo passo."
 ep3_laamp_decision_event.1040.desc_outro_return_01: "\n\nEm um canto sombreado da praça, um charlatão tenta convencer um[ROOT.Char.Custom('ES_XA')] nobre das propriedades curativas da areia vermelha.\n\nObservo casualmente sua discussão enquanto pondero qual será meu próximo movimento."
 ep3_laamp_decision_event.1040.desc_outro_return_02: "\n\nEm uma barraca próxima com espelhos de obsidiana, um [visiting_location.GetCounty.GetFaith.PriestNeuter] tenta disfarçar sua empolgação quando finalmente tem a oportunidade de se observar.\n\nLevemente divertid[ROOT.Char.Custom('ES_OA')], tento decidir para onde ir a seguir."
 ep3_laamp_decision_event.1040.desc_outro_return_03: "\n\nJunto à pequena rotunda, um camelô que carrega transcrições de [ROOT.Char.Custom('RandomReligiousTextName')] lê o texto em voz alta para um público modesto.\n\nEscuto distraíd[ROOT.Char.Custom('ES_OA')] enquanto observo a praça e penso no que fazer em seguida."
 ep3_laamp_decision_event.1040.a: "Os curandeiros certamente me fariam bem."
 ep3_laamp_decision_event.1040.a_sickly_minor: "Deveríamos ir à cabana [Select_CString(laamp_healer_character.IsFemale, 'da curandeira', 'do curandeiro' )]"
 ep3_laamp_decision_event.1040.a_second: "Devo voltar [Select_CString(laamp_healer_character.IsFemale, 'con la sanadora', 'con el sanador' )]."
 ep3_laamp_decision_event.1040.a_second_sickly_minor: "[1040_sickly_minor.GetFirstNameNoTooltip] ainda está esperando na cabana [Select_CString(laamp_healer_character.IsFemale, 'de la sanadora', 'del sanador' )]."
 ep3_laamp_decision_event.1040.a.tt: "Dirija-se à cabana [Select_CString(laamp_healer_character.IsFemale, 'da curandeira', 'do curandeiro' )]"
 ep3_laamp_decision_event.1040.a.cooldown.tt: "[Select_CString(laamp_healer_character.IsFemale, 'La sanadora', 'El sanador' )] está fora fazendo recados durante todo o restante desta visita."
 ep3_laamp_decision_event.1040.b: "A [visiting_location.GetCounty.GetFaith.HouseOfWorship] parece intrigante."
 ep3_laamp_decision_event.1040.b_second: "Vamos voltar para a [visiting_location.GetCounty.GetFaith.HouseOfWorship]."
 ep3_laamp_decision_event.1040.b.tt: "Entrar na [visiting_location.GetCounty.GetFaith.HouseOfWorship]"
 ep3_laamp_decision_event.1040.b.cooldown.tt: "A [visiting_location.GetCounty.GetFaith.HouseOfWorship] está ocupada com uma cerimônia pelo resto desta visita"
 caught_stealing.tt: "Você foi recentemente pego roubando de um lugar sagrado, então está banido[ROOT.Char.Custom('ES_OA')] até [GetCurrentDateWithDiff( GetVarTimeRemaining( THIS.Char.MakeScope, '1040_caught_stealing') )]"
 ep3_laamp_decision_event.1040.c: "Um passeio pelo jardim não faria mal."
 ep3_laamp_decision_event.1040.c_second: "Preciso revisitar o jardim."
 ep3_laamp_decision_event.1040.c.tt: "Visitar o jardim anexo"
 ep3_laamp_decision_event.1040.c.cooldown.tt: "O jardim está cheio de pessoas pelo resto desta visita"
 ep3_laamp_decision_event.1040.d: "Talvez [Select_CString(laamp_physician_recruit.IsFemale, 'la predicadora','el predicador' )] esteja certo?"
 ep3_laamp_decision_event.1040.d_second: "Outra conversa com [laamp_physician_recruit.GetFirstNameNoTooltip] não faria mal."
 ep3_laamp_decision_event.1040.d.tt: "Falar com [Select_CString(laamp_physician_recruit.IsFemale, 'la médica','el médico' )] [laamp_physician_recruit.GetShortUIName]"
 ep3_laamp_decision_event.1040.e: "$ep3_laamp_decision_event.1010.e$"
 ep3_laamp_decision_event.1040.e_second: "Terminamos aqui."
 #Healer
 ep3_laamp_decision_event.1041.return.tt: "Você retorna aos terrenos da [visiting_location.GetCounty.GetFaith.HouseOfWorship]"
 ep3_laamp_decision_event.1041.t: "[visiting_location.GetBaronyNameExplicitlyNoTooltip]: o Curandeiro [Select_CString(laamp_healer_character.IsFemale, 'la sanadora', 'el sanador' )]"
 ep3_laamp_decision_event.1041.desc_returned_sickly_minor: "[1040_sickly_minor.GetFirstName] descansa sobre um leito macio perto do fogão num canto da cabana [Select_CString(laamp_healer_character.IsFemale, 'da curandeira', 'do curandeiro' )], esperando meu retorno. Por instinto, me inclino para verificar sua respiração e acaricio seu cabelo.\n\n[laamp_healer_character.GetFirstName] deixa sua [ROOT.Char.Custom('WritingInstrument')] e me lança um olhar severo: \"O que foi que combinamos?\""
 ep3_laamp_decision_event.1041.desc_returned_physician_partner: "Ao entrarmos na cabana [Select_CString(laamp_healer_character.IsFemale, 'de la sanadora', 'del sanador' )] de [laamp_healer_character.GetFirstName] está se ocupando de algumas ervas, mas ergue o olhar para nós ao descermos a escada: “Ah, então vocês mudaram de ideia?”\n\nÀ minha esquerda, [visiting_partner.GetFirstNameNoTooltip] está alternando o peso do corpo de um pé para o outro, ainda com vontade de tentar fazer o procedimento que vimos [laamp_healer_character.GetFirstNameNoTooltip] realizar mais cedo."
 ep3_laamp_decision_event.1041.desc_returned_01: "[laamp_healer_character.GetFirstName] está cuidando de outro paciente quando desço as escadas e entro na cabana [Select_CString(laamp_healer_character.IsFemale, 'de la sanadora', 'del sanador' )]. Ele/ela olha para mim e, em seguida, indica ao paciente que se sente em alguma roupa de cama mais ao fundo do quarto.\n\nDepois, ele/ela fecha uma cortina improvisada feita de um lençol gasto para dar ao paciente e a [Select_CString(And(ROOT.Char.IsFemale, laamp_healer_character.IsFemale), 'nosotras', 'nosotros')] um pouco de privacidade.\n\n\"Vejo que vocês voltaram\", observa diligentemente: \"Vocês precisavam da minha ajuda com alguma coisa?\"."
 ep3_laamp_decision_event.1041.desc_returned_02: "Ao descer novamente para a cabana tenuemente iluminada [Select_CString(laamp_healer_character.IsFemale, 'de la sanadora', 'del sanador' )], [laamp_healer_character.GetFirstName] está sentado um pouco mais ao fundo, folheando as páginas de um diário de algum tipo. É difícil distinguir à distância, mas parece conter representações da forma humana.\n\n[laamp_healer_character.GetFirstNameNoTooltip] fecha cuidadosamente o diário, guarda-o, depois me olha e comenta com uma voz calma: “Ah, então você voltou. Acabou encontrando algo que o aflige?”"
 ep3_laamp_decision_event.1041.desc_sickly_minor: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('1040_sickly_minor'))] [1040_sickly_minor.GetFirstName], que está doent[1040_sickly_minor.Custom('ES_OA')] , se junta a mim na choupana [Select_CString(laamp_healer_character.IsFemale, 'de la sanadora', 'del sanador' )]. Tosse sombri[1040_sickly_minor.Custom('ES_OA')] enquanto [1040_sickly_minor.GetHerHim] o carrego escada abaixo.\n\n[Select_CString(laamp_healer_character.IsFemale, 'La sanadora', 'El sanador' )], [laamp_healer_character.GetFirstName], levanta-se de seu banco de madeira e me lança um olhar sombrio[laamp_healer_character.Custom('ES_OA')] : «Precisará dos meus serviços?»."
 ep3_laamp_decision_event.1041.desc_physician_partner: "Quando entramos na choupana [Select_CString(laamp_healer_character.IsFemale, 'da curandeira','do curandeiro' )], [laamp_healer_character.GetFirstName] está no meio de realizar um procedimento de limpeza em um[ROOT.Char.Custom('ES_XA')] idos[ROOT.Char.Custom('ES_OA')]. [visiting_partner.GetFirstName] observa com entusiasmo [laamp_healer_character.GetFirstNameNoTooltip], com um brilho de empolgação no olhar: \"Eu não me importaria de tentar #EMP isso#!…\"\n\n[laamp_healer_character.GetFirstNameNoTooltip] levanta os olhos ao ouvir nossas vozes: \"Não os vi aí! O que os aflige?\""
 ep3_laamp_decision_event.1041_intro: "A luz está mais fraca e há um #EMP aroma#! peculiar na cabana [Select_CString(laamp_healer_character.IsFemale, 'de la sanadora','del sanador' )]. Não #EMP desagradable#!, mas invasivo.\n\n[laamp_healer_character.GetFirstName] está de pé diante de uma mesa alta e prepara uma poção."
 ep3_laamp_decision_event.1041.desc_reused_healer: "$ep3_laamp_decision_event.1041_intro$ olha para cima, erguendo levemente as sobrancelhas: \"Vejo que você voltou inteiro! Como posso ajudar você desta vez?\""
 ep3_laamp_decision_event.1041.desc: "$ep3_laamp_decision_event.1041_intro$ Olha para cima quando me aproximo: \"Saudações. Como estão seus humores? Precisam de uma purga?\""
 ep3_laamp_decision_event.1041.desc_outro_return_horn: "\n\nUm pouco mais adentro da sala, o magnífico [1041_health_artifact.GetName] ainda repousa junto com outros trinkets medicinais."
 ep3_laamp_decision_event.1041.desc_outro_return_artifact: "\n\nUm pouco mais adentro da sala, o [1041_health_artifact.GetName] ainda clama por meu interesse."
 ep3_laamp_decision_event.1041.desc_outro_horn: "\n\nPelo canto do olho, avisto alguns trinkets medicinais, dos quais um magnífico chifre chama minha atenção."
 ep3_laamp_decision_event.1041.desc_outro_artifact: "\n\nUm pouco mais adentro da sala, em uma prateleira cheia de trinkets medicinais, avisto um curioso [1041_health_artifact.GetName], clamando por meu interesse."
 ep3_laamp_decision_event.1041.a: "Talvez um equilíbrio de humores me faria bem."
 ep3_laamp_decision_event.1041.a_ill: "\"Eu... poderia usar um tratamento, sim.\""
 ep3_laamp_decision_event.1041.b: "\"Estou interessado naquele [1041_health_artifact.GetNameNoTooltip].\""
 ep3_laamp_decision_event.1041.c: "\"Você #EMP realizaria#! o procedimento, [visiting_partner.GetFirstNameNoTooltip]?\""
 ep3_laamp_decision_event.1041.c.flavor: "Qual é a pior coisa que poderia acontecer!"
 ep3_laamp_decision_event.1041.d: "[1040_sickly_minor.GetFirstNameNoTooltip], meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('1040_sickly_minor'))], precisa de tratamento!"
 ep3_laamp_decision_event.1041.d.partner: "[visiting_partner.GetFirstNameNoTooltip], meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('visiting_partner'))], precisa de tratamento!"
 ep3_laamp_decision_event.1041.treatment_success.t: "Sucesso"
 ep3_laamp_decision_event.1041.treatment_failure.t: "Sem sucesso"
 ep3_laamp_decision_event.1041.treatment_failure.desc: "O tratamento não teve sucesso"
 ep3_laamp_decision_event.1041.e: "$ep3_laamp_decision_event.1021.d$"
 aged_medicine_jar: "Frasco de Medicina Antiga"
 potent_medicine_jar: "Frasco de Medicina Potente"
 lapidary_tourmaline: "Turmalina Lapidária"
 lapidary_tourmaline.desc: "Uma gema de turmalina cabochão de tamanho considerável, diz-se que possui propriedades revigorantes."
 lapidary_turquoise: "Turquesa Lapidária"
 lapidary_turquoise.desc: "Uma gema de turquesa cabochão de tamanho considerável, diz-se que possui propriedades revigorantes."
 lapidary_tigerseye: "Olho de Tigre Lapidário"
 lapidary_tigerseye.desc: "Uma gema de olho de tigre cabochão de tamanho considerável, diz-se que possui propriedades revigorantes."
 lapidary_jasper: "Jasper Lapidário"
 lapidary_jasper.desc: "Um grande cabochão de jasper, diz-se que possui propriedades benéficas para a saúde."
 lapidary_garnet: "Granada Lapidária"
 lapidary_garnet.desc: "Um grande cabochão de granada, diz-se que possui propriedades benéficas para a saúde."
 lapidary_sapphire: "Safira Lapidária"
 lapidary_sapphire.desc: "Uma única e magnífica safira, diz-se que protege seu portador."
 lapidary_ruby: "Rubin Lapidário"
 lapidary_ruby.desc: "Uma única e magnífica rubi, diz-se que protege seu portador."
 scented_herb_pouch: "Bolsa de Ervas Aromáticas"
 scented_herb_pouch.desc: "Uma pequena bolsa de ervas contendo uma mistura de ervas aromáticas, diz-se que afasta infecções."
 pomander: "Pomander"
 pomander.desc: "Uma pequena bola perfumada, carregada em uma bolsa ornamentada. O aroma é dito para afastar infecções."
 #Church
 ep3_laamp_decision_event.1043.t: "[visiting_location.GetBaronyNameExplicitlyNoTooltip]: o [visiting_location.GetCounty.GetFaith.HouseOfWorship]"
 ep3_laamp_decision_event.1043.desc_returned_01: "Um sermão acaba de terminar quando retornamos à [visiting_location.GetCounty.GetFaith.HouseOfWorship]. [laamp_clergy_character.Custom('ES_ElLa')|U] [laamp_clergy_character.Custom('SisterBrother')] [laamp_clergy_character.GetFirstName] caminha de um lado para o outro com uma vassoura, arrumando e deixando o local sagrado em ordem para qualquer visitante que venha aqui em busca de oração e reflexão.\n\nErgue o olhar quando me aproximo, um sorriso suave vincando seus lábios: «Bem-vind[ROOT.Char.Custom('ES_OA')] de volta ao Seu abraço acolhedor. Por que não ficam um pouco e apreciam a paisagem?»."
 ep3_laamp_decision_event.1043.desc_returned_02: "[laamp_clergy_character.Custom('ES_ElLa')|U] [laamp_clergy_character.Custom('SisterBrother')] [laamp_clergy_character.GetFirstName] está sentado em um dos bancos diante do púlpito, ao que parece absorto[laamp_clergy_character.Custom('ES_OA')] em reflexão, quando entro novamente na [visiting_location.GetCounty.GetFaith.HouseOfWorship].\n\nEle vira a cabeça em minha direção, olhando por cima do ombro enquanto me aproximo: \"Tanto trabalho. Deixe esses pés cansados descansarem um pouco, [Select_CString(ROOT.Char.IsFemale, 'hija mía','hijo mío' )]. Como posso ajudá-lo?\"."
 ep3_laamp_decision_event.1043.desc_reused_clergy: "Ao atravessar os notáveis portões de [visiting_location.GetCounty.GetFaith.HouseOfWorship], [laamp_clergy_character.Custom('ES_LoLa')]s [GetTrait('devoted').GetNameNoTooltip( laamp_clergy_character )|l]s que cuidam deste lugar acabaram de terminar de distribuir as tarefas do dia.\n\nPercorro o corredor principal e reconheço inesperadamente [laamp_clergy_character.Custom('ES_AlAla')] [laamp_clergy_character.Custom('SisterBrother')] [laamp_clergy_character.GetFirstName], que, por sua vez, me lança um olhar indecifrável e se aproxima: [Select_CString(ROOT.Char.IsFemale, 'Minha filha díscola','Meu filho díscolo' )]. [visiting_location.GetCounty.GetFaith.HighGodName] te trouxe [Select_CString(ROOT.Char.IsFemale, 'sã e salva','são e salvo' )] de volta à nossa porta!"
 ep3_laamp_decision_event.1043.desc: "Ao atravessar os portões do/do(a) [visiting_location.GetCounty.GetFaith.HouseOfWorship], fico impressionado com o trabalho que deve ter sido necessário nas estruturas requintadas e na decoração sagrada.\n\nUm[laamp_clergy_character.Custom('ES_OA')] [Select_CString(laamp_clergy_character.IsFemale, 'das','dos' )] [GetTrait('devoted').GetNameNoTooltip( laamp_clergy_character )|l]s que cuidam deste lugar me nota e se aproxima com calma[laamp_clergy_character.Custom('ES_OA')]: Saudações, [Select_CString(ROOT.Char.IsFemale, 'minha filha','meu filho' )]. Sou [laamp_clergy_character.Custom('ES_ElLa')] [laamp_clergy_character.Custom('SisterBrother')] [laamp_clergy_character.GetFirstName]. Como posso ajudá-lo?"
 ep3_laamp_decision_event.1043.desc_outro: "\n\nMeus olhos casualmente passam pela cesta de doações em moeda um pouco mais adiante no corredor."
 ep3_laamp_decision_event.1043.desc_outro_thief: "\n\nAtrás de mim, [visiting_partner.GetFirstName] está lançando olhares suspeitos para uma cesta cheia de doações em moeda um pouco mais adiante no corredor."
 ep3_laamp_decision_event.1043.desc_return_outro_thief: "\n\n[visiting_partner.GetFirstName] ainda olha com cobiça por entre os bancos em direção à cesta com as doações em moedas."
 ep3_laamp_decision_event.1043.desc_return_outro: "\n\nA cesta de doações em moeda cresceu cada vez mais."
 ep3_laamp_decision_event.1043.a: "\"Tenho uma doação a fazer!\""
 ep3_laamp_decision_event.1043.a.flavor_unzealous: "Eu #EMP suponho#!..."
 ep3_laamp_decision_event.1043.b: "\"Talvez [visiting_location.GetCounty.GetFaith.HighGodName] possa abençoar nossa causa?\""
 ep3_laamp_decision_event.1043.c: "Claramente #EMP eu#! estou precisando dessas doações."
 ep3_laamp_decision_event.1043.c_guarded: "Mais uma doação, para #EMP meu#! bolso."
 ep3_laamp_decision_event.1043.c_master_thief: "\"Psst, [visiting_partner.GetFirstNameNoTooltip], fique de olho!\""
 ep3_laamp_decision_event.1043.c.flavor: "Faça uma distração, roube algumas moedas. Fácil."
 ep3_laamp_decision_event.1043.c.flavor_guarded: "Hmm. Os guardas com certeza circulam com muito mais frequência por aqui, por alguma razão..."
 ep3_laamp_decision_event.1043.c.thievery_success.t: "Furtos Bem-Sucedidos"
 ep3_laamp_decision_event.1043.c.thievery_success.desc: "Você rouba com sucesso as doações."
 ep3_laamp_decision_event.1043.c.thievery_failure.t: "Banido!"
 ep3_laamp_decision_event.1043.c.thievery_failure.desc: "Você é banido do [visiting_location.GetCounty.GetFaith.HouseOfWorship]."
 ep3_laamp_decision_event.1043.c.thievery_critical_failure.t: "Guardas Chamados"
 ep3_laamp_decision_event.1043.c.thievery_critical_failure.desc: "$ep3_laamp_decision_event.1010.a_martial.critical_failure$"
 ep3_laamp_decision_event.1043.d: "$ep3_laamp_decision_event.1021.d$"
 #Post-Donation
 ep3_laamp_decision_event.1044.desc_epiphany: "Ao entregar a doação, os olhos de [laamp_clergy_character.GetFirstName] se arregalam de choque: \"Você... você é exatamente como Seu... Seu... eu juro...\" me encara por um momento, movendo os lábios sem dizer nada, como um peixe fora d'água.\n\nEntão, ao perceber o que está fazendo, [laamp_clergy_character.GetFirstNameNoTooltip] se recompõe e pigarreia: \"Seria uma honra doar #EMP mi#! vida à sua causa\"."
 ep3_laamp_decision_event.1044.desc: "O sorriso de [laamp_clergy_character.GetFirstName] se alarga enquanto ele se inclina e me põe uma mão no ombro: Muito generoso da sua parte, [Select_CString(ROOT.Char.IsFemale, 'minha filha','meu filho' )]. Entendo que, para [Select_CString(ROOT.Char.IsFemale, 'uma aventureira','um aventureiro' )] como você, nem sempre é fácil conseguir dinheiro.\n\nEle acena com ar sentencioso, e a mão volta ao lado enquanto fixa os olhos em mim."
 ep3_laamp_decision_event.1044.a: "\"Talvez [visiting_location.GetCounty.GetFaith.HighGodName] possa abençoar nossa jornada?\""
 ep3_laamp_decision_event.1044.a_epiphany: "\"Só me interessa a graça [visiting_location.GetCounty.GetFaith.HighGodNamePossessive]\"."
 ep3_laamp_decision_event.1044.b: "\"Nós #EMP poderíamos#! usar outro corpo apto.\""
 ep3_laamp_decision_event.1044.c: "\"Não me importo com nada, a não ser com meu próximo.\""
 ep3_laamp_decision_event.1044.c_epiphany: "… no estamos contratando no momento."
 #Garden
 ep3_laamp_decision_event.1045.t: "[visiting_location.GetBaronyNameExplicitlyNoTooltip]: o Jardim"
 ep3_laamp_decision_event.1045.desc_returned_01: "O jardim ainda está tranquilo, e alguns visitantes estão conversando em voz baixa nas áreas de assento, enquanto outros estão imersos em contemplação silenciosa, observando a natureza passar.\n\nEu escuto o murmúrio e a brisa; o vento nas árvores, sentindo-me de repente mais à vontade."
 ep3_laamp_decision_event.1045.desc_returned_02: "Desta vez, avisto um pequeno pássaro em uma das árvores [visiting_location.Custom('GetRandomRegionalWood')], na borda de tentar suas asas pela primeira vez.\n\nEle desliza suavemente pela beira do ninho, mas suas asas ficam de alguma forma emaranhadas e, por alguns momentos, o pássaro cai livre pelo ar até... o vento gentilmente agarra o pássaro, carregando-o para a segurança. Uma sensação de alívio se espalha pelo meu peito."
 ep3_laamp_decision_event.1045.desc: "O jardim é contornado por sebes, e as árvores estão espalhadas pelos suaves montes onde o pássaro e o esquilo ocasional podem ser observados através da folhagem.\n\nSinto uma presença bastante forte aqui, imersa em toda essa beleza. E se, através de todas as minhas provações e tribulações, [visiting_location.GetCounty.GetFaith.HighGodName] esteve comigo o tempo todo...?"
 ep3_laamp_decision_event.1045.desc_outro_return_partner: "\n\nUm pouco mais adiante na estrada, [visiting_partner.GetFirstName] está dando mais uma olhada nas plantas comestíveis da área."
 ep3_laamp_decision_event.1045.desc_outro_return_gardener: "\n\nE mais adiante na estrada, avisto ainda mais iguarias selvagens, se estendendo sob o sol da tarde."
 ep3_laamp_decision_event.1045.desc_outro_partner: "\n\nPor trás de mim, consigo ouvir [visiting_partner.GetFirstName] murmurando toda vez que encontramos mais uma planta comestível obscura durante nosso passeio."
 ep3_laamp_decision_event.1045.desc_outro_gardener: "\n\nPelo canto do olho, noto frutas e ervas silvestres de aparência deliciosa, contribuindo para a exuberância do jardim."
 ep3_laamp_decision_event.1045.a: "Sinto-me em paz."
 ep3_laamp_decision_event.1045.a_convert: "Talvez [visiting_location.GetCounty.GetFaith.GetNameNoTooltip] não seja tão ruim, afinal."
 ep3_laamp_decision_event.1045.a.cooldown.tt: "Você contemplou este jardim recentemente — retorne em [GetCurrentDateWithDiff( GetVarTimeRemaining( THIS.Char.MakeScope, '1045_contemplated_garden_recently') )]"
 ep3_laamp_decision_event.1045.b: "Seria uma pena desperdiçar essas iguarias."
 ep3_laamp_decision_event.1045.b_partner: "\"[visiting_partner.GetFirstNameNoTooltip], que tal fazermos uma coleta?\""
 ep3_laamp_decision_event.1045.b_flavor: "Hora de colher!"
 ep3_laamp_decision_event.1045.b.cooldown.tt: "Você colheu neste jardim recentemente — retorne em [GetCurrentDateWithDiff( GetVarTimeRemaining( THIS.Char.MakeScope, '1045_has_harvested_recently') )]"
 ep3_laamp_decision_event.1045.c: "\"...tantos cantos e recantos escondidos, #EMP [visiting_partner.GetFirstNameNoTooltip]#!...\""
 ep3_laamp_decision_event.1045.c.flavor: "Verdadeiramente divino."
 ep3_laamp_decision_event.1045.c.cooldown.tt: "Você relaxou neste jardim recentemente — retorne em [GetCurrentDateWithDiff( GetVarTimeRemaining( THIS.Char.MakeScope, '1045_garden_unwinded_recently') )]"
 ep3_laamp_decision_event.1045.d: "$ep3_laamp_decision_event.1021.d$"
 #Physician
 ep3_laamp_decision_event.1047.t: "[visiting_location.GetBaronyNameExplicitlyNoTooltip]: o Médico [Select_CString(laamp_physician_recruit.IsFemale, 'la médica', 'el médico' )]"
 ep3_laamp_decision_event.1047.desc_returned_01: "A porta para o gabinete de [laamp_physician_recruit.GetFirstName] está ligeiramente entreaberta, e pela fresta vejo [laamp_physician_recruit.GetFirstNameNoTooltip] cortando o cabelo de um cliente, que permanece muito quieto, usando umas tesouras assustadoramente afiadas e finas.\n\nBato na porta e entro, fazendo com que a atenção [Select_CString(laamp_physician_recruit.IsFemale, 'de la médica', 'del médico' )] se volte para mim: «Muito sorrateir[ROOT.Char.Custom('ES_OA')]. O que queríeis?»."
 ep3_laamp_decision_event.1047.desc_returned_02: "[laamp_physician_recruit.GetFirstName] está do lado de fora da sua porta, examinando o ombro de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan], aparentemente com dor[ROOT.Char.Custom('ES_XA')].\n\n[laamp_physician_recruit.GetSheHe|U] conclui a visita, fornecendo instruções sobre a melhor forma de curar a articulação, então se vira para mim: \"Vocês voltaram. Queriam algo desta vez?\"."
 ep3_laamp_decision_event.1047.desc_returned_03: "Enquanto subo com cautela as escadas que levam ao estudo de [laamp_physician_recruit.GetFirstName], espreito pela porta aberta.\n\nParece estar envolvid[laamp_physician_recruit.Custom('ES_OA')] em algum tipo de exercício físico, suando em bicas. Agacha-se, levanta-se e recomeça sem parar.\n\nDepois de uma série de repetições, ele para, enxuga o suor da testa e toma um gole de uma garrafa próxima. Seu olhar, agora afiado como uma navalha, se fixa em mim: \"Você é bastante insistente, não é?\"."
 ep3_laamp_decision_event.1047_desc_intro: "Sigo a [laamp_physician_recruit.GetFirstName] por um beco estreito, subo umas escadas e entro em seu estúdio. O cômodo está abarrotado, do chão ao teto, com prateleiras contendo escritos e gravuras relacionadas a humores, saúde e espiritualidade.\n\nEle/ela se senta na única cadeira atrás da escrivaninha, acariciando distraidamente um pequeno talismã e finalmente percebe minha presença:"
 ep3_laamp_decision_event.1047.desc_reused_physician: "$ep3_laamp_decision_event.1047_desc_intro$\"Oh. Não te vi em algum lugar antes? O que você quer?\"\n\nEu pondero cuidadosamente minhas palavras, antes de responder:\""
 ep3_laamp_decision_event.1047.desc: "$ep3_laamp_decision_event.1047_desc_intro$\"Oh. Você. Queria algo?\"\n\n\"Vi sua palestra para aqueles em situação difícil,\" eu respondo, hesitando antes de continuar:\""
 ep3_laamp_decision_event.1047.a: "\"Quer vir trabalhar para mim?\""
 ep3_laamp_decision_event.1047.b: "\"Ajude-me a fortalecer o espírito dos meus seguidores!\""
 ep3_laamp_decision_event.1047.c: "\"Você precisa #EMP usar#! suas habilidades para se manter afiado. Junte-se ao meu acampamento.\""
 ep3_laamp_decision_event.1047.c.success: "[laamp_physician_recruit.GetShortUIName] concorda com sua avaliação"
 ep3_laamp_decision_event.1047.c.failure: "Você não consegue atrair [laamp_physician_recruit.GetShortUIName]"
 ep3_laamp_decision_event.1047.c.failure.tt: "[laamp_physician_recruit.GetShortUIName] começa a te ignorar"
 ep3_laamp_decision_event.1047.d: "$ep3_laamp_decision_event.1021.d$"
 #Option: Visit the local castle grounds
 ep3_laamp_decision_event.1050.t: "[visiting_location.GetBaronyNameExplicitlyNoTooltip]: o Castelo"
 ep3_laamp_decision_event.1050.desc_returned_01: "Reentro os portões do [visiting_location.GetHolding.GetType.GetName|l], estudando o padrão e a cor da bandeira que retrata o brasão da casa [visiting_location.GetTitle.GetHolder.GetHouse.GetName], enquanto faço isso."
 ep3_laamp_decision_event.1050.desc_returned_02: "Ao voltarmos da praça principal, uma brisa faz com que o vibrante estandarte da [visiting_location.GetTitle.GetHolder.GetHouse.GetNameNoTooltip] balança suavemente sobre o parapeito."
 ep3_laamp_decision_event.1050.desc_returned_from_training: "Caminhando de volta pelos portões do [visiting_location.GetHolding.GetType.GetName|l] vindos do campo de treinamento, os guardas em seus postos mal me dão uma segunda olhada desta vez."
 ep3_laamp_decision_event.1050.desc_returned_from_garrison: "Saindo das acomodações dos guardas, squinto diante da súbita inundação de luz e inalo profundamente o ar fresco."
 ep3_laamp_decision_event.1050.desc_returned_from_reinforcers: "Ainda ponderando sobre os soldados desmoralizados, passeio tranquilamente de volta ao pátio do [visiting_location.GetHolding.GetType.GetName|l], onde não muito mudou."
 ep3_laamp_decision_event.1050.desc_returned_from_bodyguard: "Deixo [laamp_bodyguard_recruit.GetFirstName] continuar descarregando suas frustrações nos cadáveres dos animais, enquanto navego com sucesso pelas ruas estreitas de volta aos terrenos do [visiting_location.GetHolding.GetType.GetName|l]."
 ep3_laamp_decision_event.1050.desc: "Os terrenos do [visiting_location.GetBaronyNameExplicitlyNoTooltip] [visiting_location.GetHolding.GetType.GetName|l] estão, como esperado, equipados para propósitos marciais: com barris de flechas, armas de haste perdidas, um belo estábulo, e assim por diante."
 ep3_laamp_decision_event.1050.mid_maa: "\n\nO campo de treinamento fica logo do lado de fora dos portões, a guarnição tem alguns guardas vagando por ali, e mais adiante na rua avisto um grupo de combatentes [visiting_location.GetCounty.GetCulture.GetNameNoTooltip] desleixados e desmoralizados."
 ep3_laamp_decision_event.1050.mid_no_maa: "\n\nO campo de treinamento fica logo do lado de fora dos portões e um punhado de guardas da guarnição está vagando pela entrada, ou meio adormecidos ou polindo suas armas."
 ep3_laamp_decision_event.1050.desc_outro_bodyguard: "\n\nDo outro lado do pátio, um[laamp_bodyguard_recruit.Custom('ES_XA')] [laamp_bodyguard_recruit.GetWomanMan] rosna para [Select_CString(laamp_bodyguard_recruit.IsFemale, 'otras', 'otros' )] : «... e isso NÃO FOI CULPA MINHA!». A discussão está ficando mais acalorada e não perco a situação de vista."
 ep3_laamp_decision_event.1050.desc_outro_partner: "\n\n[visiting_partner.GetFirstName] olha ao redor de forma contemplativa, então pondera sobre o robusto estandarte que exibe o brasão de armas de [visiting_location.GetTitle.GetHolder.GetHouse.GetName], que tremula suavemente ao vento."
 ep3_laamp_decision_event.1050.desc_outro: "\n\nEu prendo os lábios e olho ao redor ruminativamente para o caos organizado que consiste em [visiting_location.GetTitle.GetHolder.Custom('KnightCulturePluralNoTooltipLowercase')], guardas, homens de armas e soldados."
 ep3_laamp_decision_event.1050.desc_outro_return_partner_finished: "$ep3_laamp_decision_event.1040.desc_outro_return_partner_finished$"
 ep3_laamp_decision_event.1050.desc_outro_return_finished: "\n\nTendo examinado a fundo os detalhes do [visiting_location.GetHolding.GetType.GetName|l] de [visiting_location.GetBaronyNameExplicitlyNoTooltip], j? cumpri minhas tarefas e terminei com este lugar.\n\nDou uma olhada em busca da rota mais r?pida para voltar ? pra?a principal de [visiting_location.GetTitle.GetNameNoTierNoTooltip]."
 ep3_laamp_decision_event.1050.desc_outro_bodyguard_return: "\n\nO grupo de [Select_CString(laamp_bodyguard_recruit.IsFemale, 'enfadadas', 'enfadados' )] ainda está discutindo em um canto do pátio, e um grupo de guardas observa atentamente a situação para evitar que isso escale para um banho de sangue."
 ep3_laamp_decision_event.1050.desc_outro_return_partner_01: "\n\nSinto um leve cutucão de [visiting_partner.GetFirstName] que me sussurra sobre os lamentáveis traços de [visiting_partner.Custom('GetGenderAlliteratingAnimal')] de um dos guardas na borda da praça.\n\nFranzo a testa para [visiting_partner.GetFirstName] em desaprovação enquanto considero meu próximo destino."
 ep3_laamp_decision_event.1050.desc_outro_return_partner_02: "\n\n[visiting_partner.GetFirstName] observa curiosamente um vendedor ambulante que empunha delicadamente uma lâmina curva no ar para demonstrar a superioridade da curvatura.\n\nMeu olhar vagueia enquanto observo a praça, refletindo sobre para onde ir em seguida."
 ep3_laamp_decision_event.1050.desc_outro_return_partner_03: "\n\nOlho para a minha esquerda enquanto [visiting_partner.GetFirstName] prende um bocejo. Levanto uma sobrancelha enquanto [visiting_partner.GetSheHe] faz uma expressão de desculpas, e meu olhar retorna ao pátio, ponderando o que fazer a seguir."
 ep3_laamp_decision_event.1050.desc_outro_return_01: "\n\nEm um canto da praça, um grupo de crianças com espadas de madeira imita o que parece ser um treinamento de [visiting_location.GetTitle.GetHolder.Custom('KnightCulturePluralNoTooltipLowercase')] com uma precisão inquietante.\n\nObservo-as atentamente enquanto reflito sobre meu próximo destino."
 ep3_laamp_decision_event.1050.desc_outro_return_02: "\n\nUm cortejo a cavalo acaba de sair pelos port?es e, pelo que parece, pertence a um[ROOT.Char.Custom('ES_XA')] nobre local; observo o espet?culo enquanto reflito sobre para onde ir em seguida."
 ep3_laamp_decision_event.1050.desc_outro_return_03: "\n\nNos acessos do pátio e [visiting_location.GetHolding.GetType.GetName|l], os guardas estão aparecendo, substituindo os antigos a tempo para a troca de turno. Eu observo casualmente a troca enquanto pondero o que fazer a seguir."
 ep3_laamp_decision_event.1050.a: "Vamos visitar os terrenos de treinamento locais."
 ep3_laamp_decision_event.1050.a_second: "Seria bom fazer outra visita aos terrenos de treinamento."
 ep3_laamp_decision_event.1050.a.tt: "Ir para os terrenos de treinamento"
 ep3_laamp_decision_event.1050.a.cooldown.tt: "Os terrenos de treinamento estão ocupados atendendo a um treino agendado"
 recruited_maa.tt: "[laamp_disgruntled_moa.GetShortUIName] está ocupad[laamp_disgruntled_moa.Custom('ES_OA')] se mudando para o seu acampamento"
 ep3_laamp_decision_event.1050.b: "Devemos procurar por pessoas capazes na guarnição."
 ep3_laamp_decision_event.1050.b_second: "A guarnição ainda é interessante."
 ep3_laamp_decision_event.1050.b.tt: "Ir para a guarnição dos guardas"
 ep3_laamp_decision_event.1050.b.cooldown.tt: "Devido a intrusos, as portas da guarnição estão fechadas pelo resto desta visita"
 ep3_laamp_decision_event.1050.c: "Talvez aqueles soldados [visiting_location.GetCounty.GetCulture.GetCollectiveNounNoTooltip] desleixados possam ser úteis?"
 ep3_laamp_decision_event.1050.c_second: "Os [visiting_location.GetCounty.GetCulture.GetCollectiveNounNoTooltip] desmoralizados ainda podem ser úteis."
 ep3_laamp_decision_event.1050.c.tt: "Ir para os soldados desmoralizados"
 ep3_laamp_decision_event.1050.c.cooldown.tt: "Seus novos [soldiers|lE] de [men_at_arms|lE] estão ocupados na mudança para o seu acampamento"
 ep3_laamp_decision_event.1050.c.cooldown_province.tt: "Você reforçou [men_at_arms|lE] em [visiting_location.GetBaronyNameExplicitly] nos últimos 90 dias"
 ep3_laamp_decision_event.1050.d: "Eu me pergunto sobre o que eles estão discutindo?"
 ep3_laamp_decision_event.1050.d_second: "Vamos conversar de novo com [laamp_bodyguard_recruit.Custom('ES_ElLa')] guarda-costas aposentad[laamp_bodyguard_recruit.Custom('ES_OA')]."
 ep3_laamp_decision_event.1050.d.tt: "Aproximar-se [Select_CString(laamp_bodyguard_recruit.IsFemale, 'a las', 'a los' )] [laamp_bodyguard_recruit.GetWomenMen] que discutem"
 ep3_laamp_decision_event.1050.d.tt_second: "Falar com [laamp_bodyguard_recruit.GetShortUIName]"
 ep3_laamp_decision_event.1050.e: "$ep3_laamp_decision_event.1010.e$"
 ep3_laamp_decision_event.1050.e_second: "$ep3_laamp_decision_event.1040.e_second$"
 #Training
 ep3_laamp_decision_event.1051.return.tt: "Você retorna aos terrenos do [visiting_location.GetHolding.GetType.GetName|l]"
 ep3_laamp_decision_event.1051.t: "[visiting_location.GetBaronyNameExplicitlyNoTooltip]: os Terrenos de Treinamento"
 ep3_laamp_decision_event.1051.desc_returned_01: "De volta nos campos de treinamento, [Select_CString(laamp_disgruntled_moa.IsFemale, 'la jefa', 'el jefe' )] de armas fica por ali, empilhando equipamento e murmurando em voz baixa sobre o estado das coisas.\n\nPreocupando-se para não parecer #EMP demasiado#! descontentamento de forma muito explícita, ele(a) me lança um olhar mal-humorado enquanto me aproximo dele(a) novamente.[laamp_disgruntled_moa.GetSheHe]."
 ep3_laamp_decision_event.1051.desc_returned_02: "Nos campos de treinamento, [Select_CString(laamp_disgruntled_moa.IsFemale, 'la jefa', 'el jefe' )] de armas permanece em posição de sentido enquanto um oficial superior inspeciona o equipamento. \n\nAssim que este parte para o/a [visiting_location.GetHolding.GetType.GetName|l] , [laamp_disgruntled_moa.GetFirstNameNoTooltip] , agora que ninguém o/a [laamp_disgruntled_moa.Custom('ES_LoLa')] vê, volta à postura curvada e parece encolher vários centímetros. [laamp_disgruntled_moa.GetFirstNameNoTooltip] me lança um olhar fulminante."
 ep3_laamp_decision_event.1051.desc: "«… e eu te digo, por aqui as coisas vêm indo #EMP siglos#! caindo ladeira abaixo», resmunga [laamp_disgruntled_moa.GetFirstName]; [Select_CString(laamp_disgruntled_moa.IsFemale, 'la jefa', 'el jefe' )] \n\ninstintivamente, começo a analisar a abundância de equipamentos e obstáculos de treinamento, tentando ignorar o olhar desafiador de [laamp_disgruntled_moa.GetFirstNameNoTooltip]."
 ep3_laamp_decision_event.1051.desc_outro_martial_partner: "\n\nÀ minha direita, [visiting_partner.GetFirstName] pega uma das espadas de treinamento e começa a agitá-la com uma mão experiente, olhando para mim expectante."
 ep3_laamp_decision_event.1051.desc_outro_return_martial_partner: "\n\nE junto a uma armação de espadas sem fio está [visiting_partner.GetFirstName] [visiting_partner.GetFirstName], de braços cruzados. Ele olha para as armas, depois volta o olhar para mim e sorri com malícia."
 ep3_laamp_decision_event.1051.a: "Vamos ter uma sessão de treinamento!"
 ep3_laamp_decision_event.1051.a_athletic.desc: "Seu treino de luta é muito eficiente"
 ep3_laamp_decision_event.1051.a.desc: "Você faz um pouco de treino"
 ep3_laamp_decision_event.1051.b: "\"Você deveria vir se juntar ao nosso acampamento. Muita liberdade.\""
 ep3_laamp_decision_event.1051.c: "\"Tenha paciência, [visiting_partner.GetFirstNameNoTooltip]!\""
 ep3_laamp_decision_event.1051.c_joshing.t: "Brincando"
 ep3_laamp_decision_event.1051.c_joshing.desc: "O treino foi ineficiente"
 ep3_laamp_decision_event.1051.c_wounded.t: "$playdate_training_injury_log_title$"
 ep3_laamp_decision_event.1051.c_wounded.desc: "$martial_authority.8000_injury$"
 ep3_laamp_decision_event.1051.d: "$ep3_laamp_decision_event.1021.d$"
 #Garrison
 ep3_laamp_decision_event.1053.t: "[visiting_location.GetBaronyNameExplicitlyNoTooltip]: a Guarnição"
 ep3_laamp_decision_event.1053.desc_returned_01: "Ao voltar para a guarnição, [laamp_plain_guard.GetFirstName] está tratando com carinho o lábio inchado.\n\nNum canto, perto de uma mesa improvisada feita de um barril, uma partida de cartas está quase terminando e [laamp_talented_guard.GetFirstName] resmunga em aprovação ao calcular seus ganhos.\n\nA dupla me avalia enquanto me aproximo do grupo de guardas."
 ep3_laamp_decision_event.1053.desc_returned_02: "De volta à guarnição sombreada, [laamp_plain_guard.GetFirstName] está tirando uma soneca enquanto [laamp_talented_guard.GetFirstName] conta moedas. Quando [Select_CString(laamp_talented_guard.IsFemale, 'la guardia veterana', 'el guardia veterano' )] repara em mim, dá um cotovelaço em [laamp_plain_guard.GetFirstNameNoTooltip].\n\n[Select_CString(laamp_plain_guard.IsFemale, 'La guardia más inexperta', 'El guardia más inexperto' )] desperta de repente e se senta, esfregando os olhos para afastar o sono.\n\n[Select_CString(And(laamp_talented_guard.IsFemale, laamp_plain_guard.IsFemale), 'Las dos', 'Los dos')] me encaram com curiosidade."
 ep3_laamp_decision_event.1053.desc: "Dentro da sufocante guarnição, os guardas montaram um ringue para aprimorar suas habilidades. Dois [Select_CString(And(laamp_talented_guard.IsFemale, laamp_plain_guard.IsFemale), 'de ellas', 'de ellos')]o usam no momento, trocando golpes enquanto um punhado de espectadores torce.\n\nObservo um pouco o treinamento e fica claro para mim que [laamp_talented_guard.GetFirstName], [Select_CString(laamp_talented_guard.IsFemale, 'la primera', 'el primer' )] guarda, é muito mais experiente que [laamp_plain_guard.GetFirstName], [Select_CString(laamp_plain_guard.IsFemale, 'la segunda', 'el segundo' )] guarda.\n\nQuando terminam, me aproximo do ringue com cautela, e então passam a me prestar atenção:"
 ep3_laamp_decision_event.1053.a: "\"[laamp_plain_guard.GetFirstNameNoTooltip], quer vir trabalhar para mim?\""
 ep3_laamp_decision_event.1053.b: "\"Teríamos uso para alguém com suas habilidades, [laamp_talented_guard.GetFirstNameNoTooltip].\""
 ep3_laamp_decision_event.1053.c: "\"Alguém afim de uma rodada de dados?\""
 ep3_laamp_decision_event.1053.c.plain_wins: "[laamp_plain_guard.GetShortUIName] vence a rodada"
 ep3_laamp_decision_event.1053.c.talented_wins: "[laamp_talented_guard.GetShortUIName] vence a rodada"
 ep3_laamp_decision_event.1053.c.you_win: "Você vence a rodada"
 ep3_laamp_decision_event.1053.d: "$ep3_laamp_decision_event.1021.d$"
 #Reinforcers
 ep3_laamp_decision_event.1055.t: "[visiting_location.GetBaronyNameExplicitlyNoTooltip]: os Reforços"
 ep3_laamp_decision_event.1055.desc_maxed_out_returned: "Ao retornar ao acampamento de tendas, os grupos de soldados continuam me encarando enquanto se afastam para me deixar passar.\n\nMurmuram sobre como eu fui parte de quem abateu uma [ROOT.Char.Custom('RegionalMythicalCreatureLower')] mítico, entre outras histórias mais fantásticas.\n\nMeus lábios se curvam em um leve sorriso ao me ver de novo diante de sua figura de proa, com a cabeça levemente inclinada e evitando meu olhar enquanto espera que eu fale."
 ep3_laamp_decision_event.1055.desc_returned_01: "Ao retornar ao acampamento de tendas, avisto um punhado de soldados dando água aos seus cavalos. Seus mantos mostram sinais de pertencer a uma das brigadas de cavalaria mais esquivas.\n\nPercorro o sinuoso caminho entre as tendas de volta [laamp_maa_reinforcer.Custom('ES_AlAla')] imponente [laamp_maa_reinforcer.GetWomanMan] de antes, que nem se dá ao trabalho de disfarçar seu descontentamento.\n\nOlha para mim com olhos cansados e espera que eu fale."
 ep3_laamp_decision_event.1055.desc_returned_02: "De volta ao acampamento de tendas, os soldados mal me dão atenção enquanto passo por eles e me aprofundo cada vez mais no acampamento.\n\nAo final, encontro com [laamp_maa_reinforcer.Custom('ES_ElLa')] [laamp_maa_reinforcer.GetWomanMan] de antes, e um leve tremor na sua sobrancelha é toda a surpresa que ele demonstra ao me ver novamente tão cedo.\n\nSeus olhos vagam ao longe, enquanto espera que eu fale."
 ep3_laamp_decision_event.1055.desc_maxed_out: "Caminho até o acampamento de tendas bem na beira de [visiting_location.GetBaronyNameExplicitlyNoTooltip] e sinto seus olhares sobre mim.\n\nOs soldados surrados e espezinhados murmuram às minhas costas enquanto me aproximo de um[laamp_maa_reinforcer.Custom('ES_XA')] dos líderes da ralé.\n\nSeus olhos se arregalam ligeiramente, enquanto espera que eu fale."
 ep3_laamp_decision_event.1055.desc: "O acampamento de tendas na orla de [visiting_location.GetBaronyNameExplicitlyNoTooltip] est? lotado de soldados e combatentes, grandes e pequenos, de v?rias culturas diferentes, mas principalmente de [visiting_location.GetCounty.GetCulture.GetCollectiveNounNoTooltip].\n\nEles est?o reunidos em grupos, a maioria com a testa franzida e olhando ao redor, como se buscassem uma maneira de se livrar de sua mis?ria.\n\nContinuo andando at? encontrar um[laamp_maa_reinforcer.Custom('ES_XA')] [laamp_maa_reinforcer.GetWomanMan] imponente, que acabou de parar de gritar com alguns combatentes marcados pela guerra e me encara com desconfian?a."
 ep3_laamp_decision_event.1055.a: "Cavalga comigo, [ROOT.Char.Custom('ES_ElLa')] célebre [ROOT.Char.GetTitledFirstNameNoTooltip]!"
 ep3_laamp_decision_event.1055.a.flavor: "Prestigioso? Eu só faço o que precisa ser feito."
 ep3_laamp_decision_event.1055.a.cooldown.tt: "Você tem aproveitado seu [prestige_level|lE] recentemente — mais tropas gananciosas por glória se reuniram em [GetCurrentDateWithDiff( GetVarTimeRemaining( THIS.Char.MakeScope, '1055_reinforced_with_prestige_recently') )]"
 ep3_laamp_decision_event.1055.prestige_level: "Por causa do seu [prestige_level|lE]:"
 ep3_laamp_decision_event.1055.prestige_full.tt: "$ep3_laamp_decision_event.1055.prestige_level$$ep3_laamp_decision_event.1055.full.tt$"
 ep3_laamp_decision_event.1055.prestige_partial_80.tt: "$ep3_laamp_decision_event.1055.prestige_level$$ep3_laamp_decision_event.1055.all_regiments$$ep3_laamp_decision_event.1055.positive_partial.tt$ (#V 80#!%)#!"
 ep3_laamp_decision_event.1055.prestige_partial_60.tt: "$ep3_laamp_decision_event.1055.prestige_level$$ep3_laamp_decision_event.1055.all_regiments$$ep3_laamp_decision_event.1055.positive_partial.tt$ (#V 60#!%)#!"
 ep3_laamp_decision_event.1055.prestige_partial_40.tt: "$ep3_laamp_decision_event.1055.prestige_level$$ep3_laamp_decision_event.1055.all_regiments$$ep3_laamp_decision_event.1055.alert_partial.tt$ (#V 40#!%)#!"
 ep3_laamp_decision_event.1055.prestige_partial_20.tt: "$ep3_laamp_decision_event.1055.prestige_level$$ep3_laamp_decision_event.1055.all_regiments$$ep3_laamp_decision_event.1055.alert_partial.tt$ (#V 20#!%)#!"
 ep3_laamp_decision_event.1055.b: "\"Junte-se a mim, no serviço de [ROOT.Char.GetFaith.GetNameNoTooltip]!\""
 ep3_laamp_decision_event.1055.b.flavor: "Apenas [ROOT.Char.GetFaith.HighGodName] julgará minha piedade."
 ep3_laamp_decision_event.1055.b.cooldown.tt: "Você tem aproveitado seu [piety_level|lE] recentemente — mais tropas zelosas se reuniram em [GetCurrentDateWithDiff( GetVarTimeRemaining( THIS.Char.MakeScope, '1055_reinforced_with_piety_recently') )]"
 ep3_laamp_decision_event.1055.piety_level: "Por causa do seu [piety_level|lE]:"
 ep3_laamp_decision_event.1055.piety_full.tt: "$ep3_laamp_decision_event.1055.piety_level$$ep3_laamp_decision_event.1055.full.tt$"
 ep3_laamp_decision_event.1055.piety_partial_80.tt: "$ep3_laamp_decision_event.1055.piety_level$$ep3_laamp_decision_event.1055.all_regiments$$ep3_laamp_decision_event.1055.positive_partial.tt$ (#V 80#!%)#!"
 ep3_laamp_decision_event.1055.piety_partial_60.tt: "$ep3_laamp_decision_event.1055.piety_level$$ep3_laamp_decision_event.1055.all_regiments$$ep3_laamp_decision_event.1055.positive_partial.tt$ (#V 60#!%)#!"
 ep3_laamp_decision_event.1055.piety_partial_40.tt: "$ep3_laamp_decision_event.1055.piety_level$$ep3_laamp_decision_event.1055.all_regiments$$ep3_laamp_decision_event.1055.alert_partial.tt$ (#V 40#!%)#!"
 ep3_laamp_decision_event.1055.piety_partial_20.tt: "$ep3_laamp_decision_event.1055.piety_level$$ep3_laamp_decision_event.1055.all_regiments$$ep3_laamp_decision_event.1055.alert_partial.tt$ (#V 20#!%)#!"
 ep3_laamp_decision_event.1055.c: "\"Talvez pudéssemos fazer alguma troca?\""
 ep3_laamp_decision_event.1055.c.tt: "Um [regiment|lE] de [men_at_arms|lE] aleatório: \n #P #EMP $BULLET_WITH_TAB$ Se refuerza completamente!#!#!"
 ep3_laamp_decision_event.1055.d: "\"Esta é sua chance de lutar pela #EMP retidão!#!\""
 ep3_laamp_decision_event.1055.d.flavor: "Juntos, por um mundo melhor."
 ep3_laamp_decision_event.1055.d.tt: "Graças ao seu [trait_level_track_xp|lE] de [GetTrait('knight_errant').GetName( GetNullCharacter )|l]:$refill_maa_regiments_fully_reinforced_tt$"
 ep3_laamp_decision_event.1055.e: "$ep3_laamp_decision_event.1021.d$"
 ep3_laamp_decision_event.1055.all_regiments: "\n$BULLET_WITH_TAB$ Todos os seus [men_at_arms|lE] [regiments|lE] (#V [num_damaged_maa_regiments]#!):"
 ep3_laamp_decision_event.1055.full.tt: "$ep3_laamp_decision_event.1055.all_regiments$$refill_maa_regiments_fully_reinforced_tt$"
 ep3_laamp_decision_event.1055.positive_partial.tt: "#P #EMP \n$BULLET_WITH_TAB$ Os regimentos serão parcialmente reforçados!"
 ep3_laamp_decision_event.1055.alert_partial.tt: "#alert_trial \n$BULLET_WITH_TAB$ Os regimentos serão reforçados parcialmente!"
 #Bodyguard
 ep3_laamp_decision_event.1057.t: "[visiting_location.GetBaronyNameExplicitlyNoTooltip]: [laamp_bodyguard_recruit.Custom('ES_ElLa')] guarda-costas"
 ep3_laamp_decision_event.1057.desc_returned_01: "Quando volto ao beco onde deixei o antigo [laamp_bodyguard_recruit.GetFirstName], [laamp_bodyguard_recruit.Custom('ES_ElLa')] antig[laamp_bodyguard_recruit.Custom('ES_OA')] guarda-costas, ele está conversando tranquilamente com seu patrão, o açougueiro local.\n\nAo me aproximar, eles encerram sua conversa camarada e o açougueiro dá um tapinha amigável em \n\n[laamp_bodyguard_recruit.GetFirstNameNoTooltip], agora com um leve brilho de simpatia no olhar, se vira para mim: \"Oh. Você voltou. Queria algo?\"."
 ep3_laamp_decision_event.1057.desc_returned_02: "[laamp_bodyguard_recruit.GetFirstName], [laamp_bodyguard_recruit.Custom('ES_ElLa')] ex-[laamp_bodyguard_recruit.Custom('ES_OA')] guarda-costas, ergue o olhar quando retorno ao beco onde exerce seu novo ofício.\n\nA faca dança no ar enquanto ele corta outro cadáver de animal em filés bem feitos, e a intensidade me faz recuar involuntariamente.\n\n[laamp_bodyguard_recruit.GetFirstNameNoTooltip] me lança um olhar vazio e se dirige a mim com uma voz sem emoção: \"...sim?\""
 ep3_laamp_decision_event.1057.desc_returned_03: "De volta no beco, [laamp_bodyguard_recruit.GetFirstName] está sentado na carroça vazia, cuidando de um ferimento no nó do dedo, provavelmente resultado de uma briga com outras pessoas irritadas com sua reputação.\n\nCom uma careta, [laamp_bodyguard_recruit.GetFirstNameNoTooltip] reconhece minha presença e diz: \"Ah, vocês só me veem nos meus melhores momentos, né?\". Ele se recosta e suspira. \"Esqueceu de alguma coisa?\"."
 ep3_laamp_decision_event.1057.desc_reused_bodyguard: "Reconheço vagamente [Select_CString(laamp_bodyguard_recruit.IsFemale, 'a la mujer', 'al hombre' )] que grita e, quando [laamp_bodyguard_recruit.Custom('ES_ElLa')] acusador[laamp_bodyguard_recruit.Custom('ES_XA')] se vai, eu sigo [laamp_bodyguard_recruit.GetFirstNameNoTooltip] por um beco.$ep3_laamp_decision_event.1057.desc_mid$\n\n[laamp_bodyguard_recruit.Custom('ES_ElLa')|U] guarda-costas desonrad[laamp_bodyguard_recruit.Custom('ES_OA')] estreita os olhos quando me aproximo: «Espera, não te vi em algum lugar antes...?» Faz uma careta. «Não importa. O que queres?»"
 ep3_laamp_decision_event.1057.desc: "Entre os gritos, capto o nome de [laamp_bodyguard_recruit.GetFirstName], e quando [laamp_bodyguard_recruit.Custom('ES_ElLa')] acusador[laamp_bodyguard_recruit.Custom('ES_XA')] se vai, eu sigo [laamp_bodyguard_recruit.GetFirstNameNoTooltip] por um beco.$ep3_laamp_decision_event.1057.desc_mid$\n\n[laamp_bodyguard_recruit.Custom('ES_ElLa')|U] guarda-costas desonrad[laamp_bodyguard_recruit.Custom('ES_OA')] me lança um olhar murcho[laamp_bodyguard_recruit.Custom('ES_OA')] quando me aproximo: «O que vocês querem? Não consegui nem manter viva uma maldita #EMP planta#!…»."
 ep3_laamp_decision_event.1057.desc_mid: "\n\n[laamp_bodyguard_recruit.GetFirstNameNoTooltip] começa a descarregar carcaças de animais de uma carroça surrada, murmurando para si: «… por #EMP un[laamp_bodyguard_recruit.Custom('ES_XA')]#! nobre que morre sob minha guarda e… como eu ia saber #EMP yo#! que seu [laamp_bodyguard_recruit.Custom('RegionalDrink')] estava…?». E, de frustração, soca a carroça."
 ep3_laamp_decision_event.1057.a: "$ep3_laamp_decision_event.1047.a$"
 ep3_laamp_decision_event.1057.b: "\"Veja esses músculos? #EMP Eu#! estaria basicamente protegendo #EMP você#!.\""
 ep3_laamp_decision_event.1057.c: "\"Junte-se a mim, e vamos restaurar sua reputação!\""
 ep3_laamp_decision_event.1057.c.success: "[laamp_bodyguard_recruit.GetShortUIName] está convencido"
 ep3_laamp_decision_event.1057.c.failure: "Você não consegue atrair [laamp_bodyguard_recruit.GetShortUIName]"
 ep3_laamp_decision_event.1057.c.failure.tt: "[laamp_bodyguard_recruit.GetShortUIName] começa a ignorá-lo"
 ep3_laamp_decision_event.1057.d: "\"Esta é sua chance de #EMP redenção.#!\""
 ep3_laamp_decision_event.1057.e: "$ep3_laamp_decision_event.1021.d$"
 #Option: Visit the local city craftsmen
 ep3_laamp_decision_event.1060.t: "[visiting_location.GetBaronyNameExplicitlyNoTooltip]: o Distrito dos Artesãos"
 ep3_laamp_decision_event.1060.desc_returned_01: "O sol está alto sobre o distrito dos artesãos enquanto retorno a uma profusão de sons, vistas e cheiros."
 ep3_laamp_decision_event.1060.desc_returned_02: "Uma nuvem suaviza a luz sobre o distrito dos artesãos, e retorno a um cheiro agressivo, ao perceber que me aproximei demais da oficina do curtidor a caminho de volta."
 ep3_laamp_decision_event.1060.desc_returned_from_weaponsmith: "Voltando do ferreiro, os diversos artesãos e seus ajudantes ainda estão a todo vapor carregando mercadorias de um lado para o outro."
 ep3_laamp_decision_event.1060.desc_returned_from_armorer: "O suor da forja está lentamente escorrendo pelas minhas costas e sou agraciado com uma brisa fresca ao retornar ao distrito dos artesãos."
 ep3_laamp_decision_event.1060.desc_returned_from_jeweler: "Eu estreito os olhos diante do brilho ofuscante da praça ao sair da morada do ourives e entrar na praça do distrito dos artesãos."
 ep3_laamp_decision_event.1060.desc_returned_from_quartermaster: "O ar está significativamente menos abafado no distrito dos artesãos, enquanto saio da taverna turva onde [laamp_quartermaster_recruit.GetFirstName] está afogando suas mágoas."
 ep3_laamp_decision_event.1060.desc: "No bairro dos artesãos de [visiting_location.GetBaronyNameExplicitly] estão representadas todas as profissões relevantes: a forja de armas de [laamp_weaponsmith_craftsman.GetFirstName] junto ao campo de treinamento, [Select_CString( laamp_armorer_craftsman.IsFemale, 'la armadurera', 'el armadurero' )] [laamp_armorer_craftsman.GetFirstName] em sua ferraria e [laamp_jeweler_craftsman.GetFirstName], [Select_CString( laamp_jeweler_craftsman.IsFemale, 'la joyera', 'el joyero' )], mais adiante."
 ep3_laamp_decision_event.1060.desc_outro_quartermaster: "\n\nTambém há um[laamp_quartermaster_recruit.Custom('ES_XA')] [laamp_quartermaster_recruit.GetWomanMan] [Select_CString( laamp_quartermaster_recruit.IsFemale, 'harapienta y resignada', 'harapiento y resignado' )] que fica vadiando por aí. Ele me olha e rosna indignado: «Eu costumava ser #EMP alguien#!! Eu sou [laamp_quartermaster_recruit.GetFirstName] , #EMP [laamp_quartermaster_recruit.Custom('ES_ElLa')] intendente [visiting_location.GetTitle.GetHolder.GetTopLiege.Custom('ES_DelDela')] [visiting_location.GetTitle.GetHolder.GetTopLiege.GetTitleAsNameNoTooltip|l]!#!», antes de se acalmar, aparentemente perdid[laamp_quartermaster_recruit.Custom('ES_OA')] em pensamentos."
 ep3_laamp_decision_event.1060.desc_outro_partner: "\n\n[visiting_partner.GetFirstName] passeia tranquilamente pela rua e comenta os produtos à mostra. E me olha enquanto eu paro, tentando determinar para onde ir em seguida."
 ep3_laamp_decision_event.1060.desc_outro: "\n\nEu paro por um momento, observando as crianças brincando entre os materiais brutos. Seus pais gentilmente as afastam enquanto decido onde ir a seguir."
 ep3_laamp_decision_event.1060.desc_outro_return_partner_finished: "$ep3_laamp_decision_event.1040.desc_outro_return_partner_finished$"
 ep3_laamp_decision_event.1060.desc_outro_return_finished: "\n\nMeus pés doem e meu estômago ronca, foi um dia produtivo no distrito dos artesãos. Eu me vejo olhando ao redor em busca do caminho mais rápido de volta à praça principal."
 ep3_laamp_decision_event.1060.desc_outro_quartermaster_return: "\n\nEnquanto reflito sobre meu próximo destino, observo [Select_CString( laamp_quartermaster_recruit.IsFemale, 'a la antigua', 'al antiguo' )] intendente, que continua vagueando sem rumo pela praça."
 ep3_laamp_decision_event.1060.desc_outro_return_partner_01: "\n\n[visiting_partner.GetFirstName] fareja o ar, movendo-se rapidamente pela praça, desviando dos transeuntes numa tentativa de acompanhar meu ritmo.\n\n[visiting_partner.GetSheHe|U] me alcança quando paro por um breve segundo, refletindo sobre o que fazer em seguida."
 ep3_laamp_decision_event.1060.desc_outro_return_partner_02: "\n\nÀ minha esquerda, [visiting_partner.GetFirstName] examina com curiosidade uma banca de mercado coberta com peles de [ROOT.Char.Custom('RegionalFerociousAnimal')] de todos os tamanhos, formas e cores.\n\nA cabeça empalhada de uma dessas feras me sorri enquanto olho para a rua, tentando decidir para onde ir em seguida."
 ep3_laamp_decision_event.1060.desc_outro_return_partner_03: "\n\n[visiting_partner.GetFirstName] se move sem rumo de um lado para o outro da praça, observando as barracas. Enquanto [visiting_partner.GetHerHim] observo distraidamente, pondero o que fazer a seguir."
 ep3_laamp_decision_event.1060.desc_outro_return_01: "\n\nEu olho distraidamente para cima e para baixo da praça, exibindo um olhar vazio enquanto pondero onde ir a seguir."
 ep3_laamp_decision_event.1060.desc_outro_return_02: "\n\nAlgumas crianças brincam com um [ROOT.Char.Custom('get_region_dog_type')] enorme, alimentando-o com restos enquanto se revezam montando em seu dorso musculoso.\n\nObservo casualmente sua brincadeira enquanto considero meu próximo passo."
 ep3_laamp_decision_event.1060.desc_outro_return_03: "\n\nUm grupo de crianças encontrou um grande bloco de minério e o está chutando para cima e para baixo pela rua, seguindo algumas regras obscuras criadas por elas mesmas.\n\nObservo-as com fascínio enquanto considero cuidadosamente qual será minha próxima providência."
 ep3_laamp_decision_event.1060.a: "Armas são mais úteis agora."
 ep3_laamp_decision_event.1060.a_second: "As armas parecem intrigantes."
 ep3_laamp_decision_event.1060.a.tt: "Ir para a barraca do ferreiro"
 ep3_laamp_decision_event.1060.a.cooldown.tt: "Você já comprou uma arma [artifact|lE] nesta visita"
 ep3_laamp_decision_event.1060.b: "Minha armadura precisa de uma atualização."
 ep3_laamp_decision_event.1060.b_second: "O armorer tinha algumas peças relevantes."
 ep3_laamp_decision_event.1060.b.tt: "Ir para a forja do armorer"
 ep3_laamp_decision_event.1060.b.cooldown.tt: "Você já comprou uma armadura [artifact|lE] nesta visita"
 recruited_armorer.tt: "[laamp_armorer_craftsman.GetShortUIName] está ocupad[laamp_armorer_craftsman.Custom('ES_OA')] se mudando para o seu acampamento"
 ep3_laamp_decision_event.1060.c: "Estou procurando acessórios."
 ep3_laamp_decision_event.1060.c_second: "Preciso dar uma segunda olhada no ourives."
 ep3_laamp_decision_event.1060.c.tt: "Ir para a morada do ourives"
 ep3_laamp_decision_event.1060.c.cooldown.tt: "Você já comprou uma joia [artifact|lE] nesta visita"
 ep3_laamp_decision_event.1060.d: "Vamos conversar com #EMP [Select_CString(laamp_quartermaster_recruit.IsFemale, 'la dama', 'el caballero' )]#! [laamp_quartermaster_recruit.GetFirstNameNoTooltip]."
 ep3_laamp_decision_event.1060.d_second: "Deveríamos voltar a visitar [laamp_quartermaster_recruit.Custom('ES_AlAla')] intendente [laamp_quartermaster_recruit.GetFirstNameNoTooltip]."
 ep3_laamp_decision_event.1060.d.tt: "Abordar [laamp_quartermaster_recruit.GetShortUIName]"
 ep3_laamp_decision_event.1060.e: "$ep3_laamp_decision_event.1010.e$"
 ep3_laamp_decision_event.1060.e_second: "$ep3_laamp_decision_event.1040.e_second$"
 #Weaponsmith
 ep3_laamp_decision_event.1061.return.tt: "Você retorna ao distrito dos artesãos"
 ep3_laamp_decision_event.1061.t: "[visiting_location.GetBaronyNameExplicitlyNoTooltip]: o Ferreiro"
 ep3_laamp_decision_event.1061.desc_returned_01: "De volta aos campos de treinamento, [Select_CString( laamp_weaponsmith_craftsman.IsFemale, 'la forjadora', 'el forjador' )] [laamp_weaponsmith_craftsman.GetFirstName]segue de pé perto de sua banca; agora lustra suavemente uma das armas com um retalho de pano macio.\n\nEle/Ela cantarola enquanto faz isso, mas para imediatamente quando chego. \"Então, no fim das contas, vocês encontraram algo para apunhalar?\" diz, sem o menor traço de camaradagem."
 ep3_laamp_decision_event.1061.desc_returned_02: "Quando retorno à forja de armas, [laamp_weaponsmith_craftsman.GetFirstName] tirou um petisco de uma bolsa que levava no cinto e o come apreciativamente em pequenos pedaços.\n\nAo notar minha presença, cuidadosamente escova as migalhas de sua capa, levanta-se e me lança um olhar enigmático: \"Mudou de ideia?\""
 ep3_laamp_decision_event.1061.desc_intro: "[Select_CString( laamp_weaponsmith_craftsman.IsFemale, 'La forjadora', 'El forjador' )] [laamp_weaponsmith_craftsman.GetFirstName], que conversa ociosamente com alguns servos próximos, está de pé junto a uma barraca improvisada perto dos campos de treinamento."
 ep3_laamp_decision_event.1061.desc_reused_weaponsmith: "$ep3_laamp_decision_event.1061.desc_intro$\n\nMe lança um olhar de reconhecimento, ergue uma sobrancelha e dá alguns passos em minha direção: \"Ora, nem todo dia se vê um cliente voltando!\"[ROOT.Char.Custom('ES_XA')] cliente[ROOT.Char.Custom('ES_EA')]!\"\n\n\"Por favor, dê uma olhada nas minhas criações\", diz ele, e tenta sorrir."
 ep3_laamp_decision_event.1061.desc: "$ep3_laamp_decision_event.1061.desc_intro$\n\nMe lança um olhar, encerra rapidamente a conversa e então se dirige a mim enquanto aponta para as armas em exposição: \"Estas são as peças que tenho à venda\".\n\n\"Temperadas nas chamas mais ardentes\", acrescenta, com um tom de orgulho na voz."
 ep3_laamp_decision_event.1061.a: "\"Eu diria que [1061_first_weapon.GetNameNoTooltip] parece uma ótima escolha.\""
 ep3_laamp_decision_event.1061.b: "\"Eu não me importaria com o [1061_second_weapon.GetNameNoTooltip].\""
 ep3_laamp_decision_event.1061.c: "\"[1061_third_weapon.GetNameNoTooltip] é do jeito que #EMP eu#! gosto.\""
 ep3_laamp_decision_event.1061.d: "$ep3_laamp_decision_event.1021.d$"
 #Armorer
 ep3_laamp_decision_event.1063.t: "[visiting_location.GetBaronyNameExplicitlyNoTooltip]: o Armorer"
 ep3_laamp_decision_event.1063.desc_returned_01: "[laamp_armorer_craftsman.GetFirstName] faz uma pausa do martelar monótono. Caminha pela oficina, aparentemente procurando algo: \"Alicate\", resmunga, \"nunca estão onde eu os deixo\".\n\nEntão, [laamp_armorer_craftsman.GetFirstNameNoTooltip] volta sua atenção para mim e indica com a cabeça as peças de armadura expostas: \"Pois então?\"."
 ep3_laamp_decision_event.1063.desc_returned_02: "A forja est? um pouco mais fria desta vez, enquanto [laamp_armorer_craftsman.GetFirstName] est? consertando uma pe?a de metal diferente, moldando o a?o com delicadeza at? submet?-lo.\n\nCom cuidado para n?o atrapalhar seu processo, vou at? l? para continuar examinando as pe?as de armadura expostas na bancada.\n\n\"Precisais de alguma prote??o depois de tudo, imagino?\", comenta [laamp_armorer_craftsman.GetFirstNameNoTooltip] com tom divertido."
 ep3_laamp_decision_event.1063.desc_reused_armorer: "A ferraria de [laamp_armorer_craftsman.GetFirstName] está exatamente como eu me lembrava. Meu olhar se fixa imediatamente na bancada de trabalho ao fundo da sala, onde [laamp_armorer_craftsman.GetFirstNameNoTooltip] guarda suas peças de armadura à venda.\n\nSeu olhar se mostra divertido ao erguer os olhos do peitoral em que trabalha e me reconhecer: \"Um[ROOT.Char.Custom('ES_XA')] cliente[ROOT.Char.Custom('ES_EA')] que voltou! Encontrou algo de que goste?\""
 ep3_laamp_decision_event.1063.desc: "A forja do armeiro [Select_CString( laamp_armorer_craftsman.IsFemale, 'de la armadurera', 'del armadurero' )] [laamp_armorer_craftsman.GetFirstName] e o ar fica denso para respirar.\n\n[laamp_armorer_craftsman.GetFirstNameNoTooltip] lança um rápido olhar para mim, dá a martelada final em um almófar impecavelmente liso e então se aproxima, enxugando as mãos.\n\n\"Você pode ver o que tenho à venda naquela prateleira\", diz, apontando para a robusta bancada de trabalho no fundo da sala."
 ep3_laamp_decision_event.1063.a: "[1063_first_armor.GetNameNoTooltip] tem um bonito brilho."
 ep3_laamp_decision_event.1063.b: "A obra-prima de [1063_second_armor.GetNameNoTooltip] é requintada."
 ep3_laamp_decision_event.1063.c: "Faz todo sentido pegar [1063_third_armor.GetNameNoTooltip]."
 ep3_laamp_decision_event.1063.d: "\"Que talento! Você deveria se juntar a nós.\""
 ep3_laamp_decision_event.1063.e: "$ep3_laamp_decision_event.1021.d$"
 #Jeweler
 ep3_laamp_decision_event.1065.t: "[visiting_location.GetBaronyNameExplicitlyNoTooltip]: o Joalheiro"
 ep3_laamp_decision_event.1065.desc_returned_01: "Na morada [Select_CString(laamp_jeweler_craftsman.IsFemale, 'de la joyera', 'del joyero' )], [laamp_jeweler_craftsman.GetFirstName] curvou-se sobre um broche incrustado de joias em forma de uma exímia flor de [visiting_location.Custom('get_region_flower_type')]. Quando escuto atentamente, [laamp_jeweler_craftsman.GetHerHim] ouço-o sussurrar apaixonadamente: «Minha preciosa flor, sem dúvida...».\n\nApresso-me a dar um passo à frente para que uma das tábuas do assoalho rangesse, e [laamp_jeweler_craftsman.GetFirstNameNoTooltip] percebe minha presença.\n\nSobressaltad[laamp_jeweler_craftsman.Custom('ES_OA')], [laamp_jeweler_craftsman.GetFirstNameNoTooltip] recobra os sentidos e exclama: «Você de novo! Meu Deus — mudou de ideia?"
 ep3_laamp_decision_event.1065.desc_returned_02: "Ao meu retorno, [laamp_jeweler_craftsman.GetFirstName] segurando sua [ROOT.Char.Custom('WritingInstrument')] para investigar as prateleiras de joias, enquanto faz inventário em um diário em frangalhos.\n\nLançando-me um breve olhar, diz: \"Então vocês voltaram? Qual queriam?\" e então se dirige para inspecionar o restante das prateleiras."
 ep3_laamp_decision_event.1065.desc_reused_jeweler: "[Select_CString( laamp_jeweler_craftsman.IsFemale, 'La joyera', 'El joyero' )] [laamp_jeweler_craftsman.GetFirstName] está ajustando o ornamento de [visiting_location.Custom('GetRandomRegionalWood')] de uma estatueta quando entro na loja escura.\n\nLevanta o olhar, me examina e murmura com satisfação: «[Select_CString( ROOT.Char.IsFemale, 'Una clienta', 'Un cliente' )] de volta. Que #EMP honor!#!!».\n\nAinda segurando a estatueta, [laamp_jeweler_craftsman.GetFirstNameNoTooltip] aponta para os objetos em exposição: «O que vos interessará desta vez?»."
 ep3_laamp_decision_event.1065.desc: "Na penumbra da morada do joalheiro, [laamp_jeweler_craftsman.GetFirstName] se empoleirou em um balcão alto, enquanto coloca com delicadeza o menor adorno em [1065_first_accessory.GetName].\n\nHipnotizad[ROOT.Char.Custom('ES_OA')], observo seu delicado trabalho por um momento, antes de pigarrear.\n\n[laamp_jeweler_craftsman.GetFirstNameNoTooltip] percebe minha presença, endireita-se e diz pensativ[laamp_jeweler_craftsman.Custom('ES_OA')]: \"Está procurando um broche? Um anel? Um colar, talvez?\", enquanto empunha um dos pequenos artefatos."
 ep3_laamp_decision_event.1065.a: "\"Eu não me importaria com aquele [1065_first_accessory.GetNameNoTooltip].\""
 ep3_laamp_decision_event.1065.b: "\"[1065_second_accessory.GetNameNoTooltip] — agora #EMP isso#! é algo para mim.\""
 ep3_laamp_decision_event.1065.c: "\"Eu gostaria de comprar o [1065_third_accessory.GetNameNoTooltip].\""
 ep3_laamp_decision_event.1065.d: "$ep3_laamp_decision_event.1021.d$"
 #Quartermaster
 ep3_laamp_decision_event.1067.t: "[visiting_location.GetBaronyNameExplicitlyNoTooltip]: o Quartermaster"
 ep3_laamp_decision_event.1067.desc_returned_01: "[laamp_quartermaster_recruit.GetFirstName] continua sentado[laamp_quartermaster_recruit.Custom('ES_OA')] em um canto escuro da taverna, segurando sua taça de [laamp_quartermaster_recruit.Custom('RegionalDrink')] como se fosse o bilhete para a salvação.\n\nMal levanta o olhar, enquanto avanço cuidadosamente pela penumbra para me aproximar de [laamp_quartermaster_recruit.GetSheHe]. “Você de novo?” murmura, e então se vira."
 ep3_laamp_decision_event.1067.desc_returned_02: "[laamp_quartermaster_recruit.GetFirstName] está no meio de uma discussão acalorada com [Select_CString( ROOT.Char.IsFemale, 'otra parroquiana', 'otro parroquiano' )] da taverna, um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] [Select_CString( ROOT.Char.IsFemale, 'alta y morena', 'alto y moreno' )] que aparentemente queria que [laamp_quartermaster_recruit.GetFirstNameNoTooltip] #EMP «deje de gimotear de una vez!».#!\n\nAntes que as coisas esquentem, [laamp_quartermaster_recruit.GetFirstNameNoTooltip] percebe minha presença e se desentende da situação com um resmungo.\n\n«Você voltou», declara, com um olhar surpreendentemente sóbrio. «O que era mesmo que você queria?»"
 ep3_laamp_decision_event.1067.desc_returned_03: "[laamp_quartermaster_recruit.GetFirstName] olha fixamente para o vazio quando volto à taverna. Demora um instante e então pisca, sacudindo lentamente a cabeça.\n\nUm serviçal da taverna coloca outro copo de [laamp_quartermaster_recruit.Custom('RegionalDrink')] diante de [laamp_quartermaster_recruit.GetFirstNameNoTooltip], que se recosta com um profundo suspiro e cobre os olhos com a palma da mão.\n\nAproximo-me com cuidado [Select_CString( laamp_quartermaster_recruit.IsFemale, 'a la antigua', 'al antiguo' )] intendente enquanto pigarreio:"
 ep3_laamp_decision_event.1067.desc_reused_quartermaster: "Enquanto tento pensar onde já vi antes [laamp_quartermaster_recruit.GetFirstName][laamp_quartermaster_recruit.GetHerHim], não tenho dificuldade em segui-lo até uma das tavernas imundas por perto.\n\nLá dentro, ele/ela vai até o balcão para pegar uma bebida e então se vira e me lança um olhar surpreendentemente penetrante: Não finja que não nos conhecemos de antes.\n\nNum único movimento rápido, esvazia a taça de [laamp_quartermaster_recruit.Custom('RegionalDrink')] e ergue uma sobrancelha suada: Quer alguma coisa?"
 ep3_laamp_decision_event.1067.desc: "Sigo [laamp_quartermaster_recruit.GetFirstName] até uma taverna próxima. A luz se torna tênue e o cheiro de líquidos rançosos me toma os sentidos.\n\n[laamp_quartermaster_recruit.GetFirstNameNoTooltip] senta-se ao balcão e pede uma bebida. \"Eu costumava ser alguém...\", repete para si, como um mantra, enquanto lasca sua taça com uma unha desgastada.\n\nAproximo-me [laamp_quartermaster_recruit.Custom('ES_AlAla')] intendente desonrad[laamp_quartermaster_recruit.Custom('ES_OA')] e respiro fundo antes de iniciar a conversa:"
 ep3_laamp_decision_event.1067.a: "$ep3_laamp_decision_event.1047.a$"
 ep3_laamp_decision_event.1067.b: "\"Eu tenho um bom número de seguidores para você organizar!\""
