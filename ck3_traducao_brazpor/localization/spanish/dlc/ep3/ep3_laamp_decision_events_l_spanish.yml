 #Option: Buy supplies
 ep3_laamp_decision_event.1010.t: "[visiting_location.GetBaronyNameExplicitlyNoTooltip]: Suprimentos!"
 ep3_laamp_decision_event.1010.desc_posh_stalls: "As barracas do distrito de alimentos de [visiting_location.GetBaronyNameExplicitly] estão transbordando de mercadorias, o que derruba os preços. Localizo a barraca do [laamp_supply_merchant.Custom('ES_DelDela')] comerciante de suprimentos [laamp_supply_merchant.GetFirstName]; ele encontrou um equilíbrio excelente entre boa qualidade e preços acessíveis.\n\nAo notar meu interesse,"
 ep3_laamp_decision_event.1010.desc: "De [ROOT.Char.Custom('RegionalRootVegetablePlural')] a tecidos, de lenha a linha de costura, [laamp_supply_merchant.Custom('ES_ElLa')] comerciante de suprimentos [laamp_supply_merchant.GetFirstName] tem de tudo. A barraca está cheia até a borda com tudo o que alguém possa precisar para uma noite na natureza.\n\nMe aproximo um pouco mais para chamar sua atenção e"
 ep3_laamp_decision_event.1010.desc_returned: "Com a barraca ainda repleta de itens, [laamp_supply_merchant.Custom('ES_ElLa')] comerciante de suprimentos [laamp_supply_merchant.GetFirstName] pega um legume regional solto de [ROOT.Char.Custom('RegionalRootVegetable')] que caiu da beirada do balcão.\n\nLevanto sutilmente as sobrancelhas para ele(a) para sinalizar meu retorno, e"
 ep3_laamp_decision_event.1010.desc_reused_merchant_reaction_01: "[laamp_supply_merchant.GetSheHe] me olha de cima a baixo, agradavelmente surpreendid[laamp_supply_merchant.Custom('ES_OA')]："
 ep3_laamp_decision_event.1010.desc_reused_merchant_reaction_02: "[laamp_supply_merchant.GetSheHe] parece realmente um pouco surpres[laamp_supply_merchant.Custom('ES_OA')] ao me ver:"
 ep3_laamp_decision_event.1010.desc_reused_merchant_intro: "Um[ROOT.Char.Custom('ES_XA')] cliente[ROOT.Char.Custom('ES_EA')] que voltou!"
 ep3_laamp_decision_event.1010.desc_reused_merchant_01: "Uma visão para olhos cansados!"
 ep3_laamp_decision_event.1010.desc_reused_merchant_02: "Não conseguiu se satisfazer, conseguiu!"
 ep3_laamp_decision_event.1010.desc_reused_merchant_03: "Não posso acreditar!"
 ep3_laamp_decision_event.1010.desc_reused_merchant_outro_01: "O que você está tendo?"
 ep3_laamp_decision_event.1010.desc_reused_merchant_outro_02: "O que você vai querer?"
 ep3_laamp_decision_event.1010.desc_trait_gregarious_new: "seu rosto se ilumina ao me olhar com um sorriso amistoso:"
 ep3_laamp_decision_event.1010.desc_trait_gregarious_return: "me lança outro sorriso amigável:"
 ep3_laamp_decision_event.1010.desc_trait_callous_new: "mal me olha na minha direção quando fala comigo:"
 ep3_laamp_decision_event.1010.desc_trait_callous_return: "mal reconhece minha presença:"
 ep3_laamp_decision_event.1010.desc_trait_greedy_new: "Seu rosto se transforma em um sorriso satisfeito ao me ver:"
 ep3_laamp_decision_event.1010.desc_trait_greedy_return: "há um brilho em seu olhar enquanto me analisa dos pés à cabeça:"
 ep3_laamp_decision_event.1010.desc_trait_shy_new: "começa a me olhar com uma intensidade que não combina com a gentileza de sua voz:"
 ep3_laamp_decision_event.1010.desc_trait_shy_return: "reflete cuidadosamente sobre meu retorno antes de dizer com suavidade:"
 ep3_laamp_decision_event.1010.desc_trait_eccentric_new: "me lança um olhar vazio, claramente absorto[laamp_supply_merchant.Custom('ES_OA')]:"
 ep3_laamp_decision_event.1010.desc_trait_eccentric_return: "olha para mim, aparentemente sem perceber que já nos vimos há meros instantes:"
 ep3_laamp_decision_event.1010.desc_generic_new_01: "acena na minha direção:"
 ep3_laamp_decision_event.1010.desc_generic_new_02: "me lança um olhar cúmplice:"
 ep3_laamp_decision_event.1010.desc_generic_returned_01: "ergue uma sobrancelha, divertido[laamp_supply_merchant.Custom('ES_OA')]:"
 ep3_laamp_decision_event.1010.desc_generic_returned_02: "olha para cima e se dirige a mim:"
 ep3_laamp_decision_event.1010.desc_outro_new_01: "\"Algo chamou sua atenção?\""
 ep3_laamp_decision_event.1010.desc_outro_new_02: "\"Viu algo que você gostaria?\""
 ep3_laamp_decision_event.1010.desc_outro_new_03: "\"O que você precisa?\""
 ep3_laamp_decision_event.1010.desc_outro_special_new_04: "\"Mundo difícil lá fora, não é? O que posso te trazer?\""
 ep3_laamp_decision_event.1010.desc_outro_returned_01: "\"Os suprimentos parecem bons, afinal?\""
 ep3_laamp_decision_event.1010.desc_outro_returned_02: "\"Eu tinha a sensação de que você voltaria.\""
 ep3_laamp_decision_event.1010.desc_outro_returned_03: "\"Os melhores de todos o [visiting_location.GetTitle.GetHolder.GetLiege.GetPrimaryTitle.GetNameNoTierNoTooltip].\""
 ep3_laamp_decision_event.1010.desc_outro_sneaky_partner: "\n\n[visiting_partner.GetFirstName] estala os dedos e me olha, assentindo discretamente na direção dos suprimentos, e murmura: \"Quer causar uma distração...?\"."
 ep3_laamp_decision_event.1010.desc_outro_sneaky_partner_returned: "\n\n[visiting_partner.GetFirstName] não para de olhar as mercadorias expostas enquanto me observa em busca de qualquer sinal em potencial para conseguir suprimentos \"#EMP gratis#!\"."
 ep3_laamp_decision_event.1010.a_diplomacy: "\"Você não teria umas provisões para dispensar, amig[laamp_supply_merchant.Custom('ES_OA')]…?\""
 ep3_laamp_decision_event.1010.a_diplomacy.success: "Você encantou com sucesso [laamp_supply_merchant.GetShortUIName]"
 ep3_laamp_decision_event.1010.a_diplomacy.failure: "[laamp_supply_merchant.GetShortUIName] percebe seu desespero"
 ep3_laamp_decision_event.1010.a_diplomacy.critical_failure: "$ep3_laamp_decision_event.1010.a_martial.critical_failure$"
 ep3_laamp_decision_event.1010.a_stewardship: "\"Posso me encarregar disso para você, por uma pequena comissão.\""
 ep3_laamp_decision_event.1010.a_stewardship.success: "Você convenceu com sucesso [laamp_supply_merchant.GetShortUIName]"
 ep3_laamp_decision_event.1010.a_stewardship.failure: "[laamp_supply_merchant.GetShortUIName] não é enganado pela sua lógica"
 ep3_laamp_decision_event.1010.a_stewardship.critical_failure: "$ep3_laamp_decision_event.1010.a_martial.critical_failure$"
 ep3_laamp_decision_event.1010.a_intrigue: "\"É[visiting_location.GetCounty.GetTitle.GetHolder.GetTopLiege.Custom('ES_EA')] de lá não é o [visiting_location.GetCounty.GetTitle.GetHolder.GetTopLiege.Custom('ES_ElLa')] [visiting_location.GetCounty.GetTitle.GetHolder.GetTopLiege.GetTitleAsNameNoTooltip|l]?!\"."
 ep3_laamp_decision_event.1010.a_intrigue.success: "Você consegue roubar um monte de suprimentos"
 ep3_laamp_decision_event.1010.a_intrigue.failure: "Você gagueja e levanta as suspeitas de [laamp_supply_merchant.GetShortUIName]"
 ep3_laamp_decision_event.1010.a_intrigue.critical_failure: "$ep3_laamp_decision_event.1010.a_martial.critical_failure$"
 ep3_laamp_decision_event.1010.a_learning: "\"Acho que aqueles alimentos estão começando a estragar...\""
 ep3_laamp_decision_event.1010.a_learning.success: "[laamp_supply_merchant.GetShortUIName] concorda em se desfazer dos suprimentos vencidos"
 ep3_laamp_decision_event.1010.a_learning.failure: "$ep3_laamp_decision_event.1010.a_stewardship.failure$"
 ep3_laamp_decision_event.1010.a_learning.critical_failure: "$ep3_laamp_decision_event.1010.a_martial.critical_failure$"
 ep3_laamp_decision_event.1010.a_martial: "\"Eu posso levar os suprimentos. Ou toda a barraca. Sua escolha.\""
 ep3_laamp_decision_event.1010.a_martial.success: "Você intimida com sucesso [laamp_supply_merchant.GetShortUIName]"
 ep3_laamp_decision_event.1010.a_martial.failure: "[laamp_supply_merchant.GetShortUIName] vê através de suas ameaças vazias"
 ep3_laamp_decision_event.1010.a_martial.critical_failure: "Os guardas são chamados"
 ep3_laamp_decision_event.1010.a_prowess.success: "$ep3_laamp_decision_event.1010.a_martial.success$"
 ep3_laamp_decision_event.1010.a_prowess.failure: "$ep3_laamp_decision_event.1010.a_martial.failure$"
 ep3_laamp_decision_event.1010.a_prowess.critical_failure: "$ep3_laamp_decision_event.1010.a_martial.critical_failure$"
 ep3_laamp_decision_event.1010.a.failure.tt: "O custo das [provision|lE] é #N aumenta#! durante #V [EmptyScope.ScriptValue('visit_settlement_minimum_cooldown_months')|0] meses#!"
 ep3_laamp_decision_event.1010.a.cooldown.tt: "Você tentou conseguir [provisions|lE] de graça recentemente — tente novamente em [GetCurrentDateWithDiff( GetVarTimeRemaining( THIS.Char.MakeScope, '1010_has_convinced_recently') )]"
 ep3_laamp_decision_event.1010.b: "\"Vou comprar alguns desses e alguns daqueles.\""
 ep3_laamp_decision_event.1010.c_callous: "\"Posso te trocar este jovem aprendiz em troca de suprimentos.\""
 ep3_laamp_decision_event.1010.c: "\"...talvez eu possa trocar um jovem aprendiz?\""
 ep3_laamp_decision_event.1010.c.flavor: "Por favor, me perdoe..."
 ep3_laamp_decision_event.1010.c.flavor_callous: "Pelo menos uma boca a menos para alimentar."
 ep3_laamp_decision_event.1010.d: "\"O-ho! Desculpe, sou desastrado!\""
 ep3_laamp_decision_event.1010.d.flavor: "[visiting_partner.GetFirstNameNoTooltip], #EMP vai!#!"
 ep3_laamp_decision_event.1010.d.success: "[visiting_partner.GetShortUIName] rouba com sucesso um monte de suprimentos"
 ep3_laamp_decision_event.1010.d.failure: "$ep3_laamp_decision_event.1010.a_martial.critical_failure$"
 ep3_laamp_decision_event.1010.d.cooldown.tt: "Você tentou roubar [provisions|lE] recentemente — tente novamente em [GetCurrentDateWithDiff( GetVarTimeRemaining( THIS.Char.MakeScope, '1010_has_stolen_recently') )]"
 ep3_laamp_decision_event.1010.e: "Vamos voltar."
 #Option: Sell an artifact to local peddlers
 ep3_laamp_decision_event.1020.t: "[visiting_location.GetBaronyNameExplicitlyNoTooltip]: Sem Perguntas"
 ep3_laamp_decision_event.1020.desc_intro_reused_peddler: "Uma voz se impõe por entre a agitação das barracas de artefatos: \"Sempre agradeço o retorno de um[ROOT.Char.Custom('ES_XA')] client[ROOT.Char.Custom('ES_EA')]!\", exclama [laamp_artifact_peddler.GetFirstName], enquanto se aproxima para olhar meu inventário."
 ep3_laamp_decision_event.1020.desc_intro_posh_stalls: "O distrito comercial de [visiting_location.GetBaronyNameExplicitly] transborda de vendedores e fornecedores de artefatos tanto raros quanto exóticos e não tenho dificuldade em localizar [laamp_artifact_peddler.Custom('ES_AlAla')] célebre comerciante de artefatos [laamp_artifact_peddler.GetFirstName]."
 ep3_laamp_decision_event.1020.desc_intro_new_01: "Estou procurando alguém para me livrar de alguns itens; [laamp_artifact_peddler.Custom('ES_ElLa')] comerciante de artefatos [laamp_artifact_peddler.GetFirstName] aparece para dar uma olhada no meu inventário."
 ep3_laamp_decision_event.1020.desc_intro_new_02: "O beco transborda de barracas, esbarro acidentalmente em alguém por trás com o ombro. Quando [laamp_artifact_peddler.Custom('ES_ElLa')] comerciante de artefatos [laamp_artifact_peddler.GetFirstName] se vira para me enfrentar, nota meu inventário e se inclina para examiná-lo mais de perto."
 ep3_laamp_decision_event.1020.desc_intro_returned_01: "Voltando até os vendedores de artefatos, [laamp_artifact_peddler.GetFirstName] me observa com curiosidade quando retorno às bancas de artefatos: \"Minha oferta continua de pé\".\n\nEntão ele se vira para sua banca e começa a reorganizar as mercadorias."
 ep3_laamp_decision_event.1020.desc_intro_returned_02: "De volta aos vendedores de artefatos, a barraca de [laamp_artifact_peddler.GetFirstName] ainda se destaca da multidão por sua abundância e variedade de alta qualidade.\n\n[laamp_artifact_peddler.GetFirstNameNoTooltip] nota minha presença, faz uma pausa por um momento e diz: \"Então, temos um acordo?\""
 ep3_laamp_decision_event.1020.desc_intro_intermediate_returned_01: "Enquanto pondero minhas opções, [laamp_artifact_peddler.GetFirstName] me lança um olhar indiferente e diz: \"Minha oferta continua de pé\", com voz monótona.\n\nDepois, ele se vira casualmente para sua barraca e começa a rearranjar as mercadorias."
 ep3_laamp_decision_event.1020.desc_intro_intermediate_returned_02: "Enquanto hesito ligeiramente, [laamp_artifact_peddler.GetFirstName] parece um pouco incomodad[laamp_artifact_peddler.Custom('ES_OA')] com minha indecisão.\n\nDá de ombros, dizendo \"Acho que vocês podem levar o tempo que precisarem\", e vai ajudar outro cliente."
 ep3_laamp_decision_event.1020.desc_one_artifact_new_01: "\n\nCom um toque experiente [laamp_artifact_peddler.GetFirstNameNoTooltip] examina a superfície do meu [1020_first_artifact_to_sell.GetName], acena com a cabeça e depois murmura algo para si."
 ep3_laamp_decision_event.1020.desc_one_artifact_new_02: "\n\n[laamp_artifact_peddler.GetFirstNameNoTooltip] toca delicadamente a superfície da minha [1020_first_artifact_to_sell.GetName] e inclina a cabeça, como se estivesse ouvindo algo. Depois assente."
 ep3_laamp_decision_event.1020.desc_two_artifacts_new_01: "\n\n[laamp_artifact_peddler.GetFirstNameNoTooltip] passa os dedos por meu [1020_first_artifact_to_sell.GetName] e seu olhar fica intrigado ao notar meu [1020_second_artifact_to_sell.GetName]."
 ep3_laamp_decision_event.1020.desc_two_artifacts_new_02: "\n\n[laamp_artifact_peddler.GetFirstNameNoTooltip] começa a fazer movimentos de pinça em direção a [1020_first_artifact_to_sell.GetName], contemplando cuidadosamente o(a) [1020_first_artifact_to_sell.Custom('ArtifactType')], e depois inspeciona suavemente o(a) [1020_second_artifact_to_sell.GetName], aparentemente satisfeit[laamp_artifact_peddler.Custom('ES_OA')] com algo."
 ep3_laamp_decision_event.1020.desc_three_artifacts_new_01: "\n\nExaminando, virando e girando; [laamp_artifact_peddler.GetFirstNameNoTooltip] examina minuciosamente cada detalhe — seja o acabamento de meu [1020_first_artifact_to_sell.GetName], os materiais de meu [1020_second_artifact_to_sell.GetName] ou os ornamentos de meu [1020_third_artifact_to_sell.GetName]."
 ep3_laamp_decision_event.1020.desc_three_artifacts_new_02: "\n\nAntes que eu perceba, [laamp_artifact_peddler.GetFirstNameNoTooltip] examinou minuciosamente o meu [1020_first_artifact_to_sell.GetName] e [1020_second_artifact_to_sell.GetName]. Suas mãos se movem rapidamente pela superfície do meu [1020_third_artifact_to_sell.GetName], procurando defeitos."
 ep3_laamp_decision_event.1020.desc_outraged_partner_new: "\n\nDe repente, ouço no meu ouvido a voz indignada do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('visiting_partner'))], [visiting_partner.GetFirstName]: Estão tirando vantagem de você! #EMP Eu#! posso conseguir um acordo melhor para você!."
 ep3_laamp_decision_event.1020.desc_outraged_partner_returned: "\n\nPelo canto do olho, percebo [visiting_partner.GetFirstName] ainda fervendo de raiva pelas ofertas baratas de [laamp_artifact_peddler.GetFirstNameNoTooltip]."
 ep3_laamp_decision_event.1020.a: "Eu estaria disposto a me desfazer de..."
 ep3_laamp_decision_event.1020.a.tt: "Você pode escolher qual artefato vender"
 ep3_laamp_decision_event.1020.a.first_artifact.tt: "A #V oferta atual#! de [1020_first_artifact_to_sell.GetName]: [gold_i] [1020_first_artifact_to_sell.MakeScope.Var('1020_artifact_sell_value').GetValue|0]"
 ep3_laamp_decision_event.1020.a.second_artifact.tt: "A #V oferta atual#! de [1020_second_artifact_to_sell.GetName]: [gold_i] [1020_second_artifact_to_sell.MakeScope.Var('1020_artifact_sell_value').GetValue|0]"
 ep3_laamp_decision_event.1020.a.third_artifact.tt: "A #V oferta atual#! de [1020_third_artifact_to_sell.GetName]: [gold_i] [1020_third_artifact_to_sell.MakeScope.Var('1020_artifact_sell_value').GetValue|0]"
 ep3_laamp_decision_event.1020.b: "\"[laamp_artifact_peddler.GetFirstNameNoTooltip], aquele comerciante ali realmente me fez uma oferta maior.\""
 ep3_laamp_decision_event.1020.b.success: "Você consegue convencer [laamp_artifact_peddler.GetShortUIName]"
 ep3_laamp_decision_event.1020.b.success.first_artifact.tt: "A #P oferta aumentada#! de [1020_first_artifact_to_sell.GetName]: [gold_i] [1020_first_artifact_to_sell.MakeScope.Var('1020_artifact_sell_high_value').GetValue|0]"
 ep3_laamp_decision_event.1020.b.success.second_artifact.tt: "A #P oferta aumentada#! de [1020_second_artifact_to_sell.GetName]: [gold_i] [1020_second_artifact_to_sell.MakeScope.Var('1020_artifact_sell_high_value').GetValue|0]"
 ep3_laamp_decision_event.1020.b.success.third_artifact.tt: "A #P oferta aumentada#! de [1020_third_artifact_to_sell.GetName]: [gold_i] [1020_third_artifact_to_sell.MakeScope.Var('1020_artifact_sell_high_value').GetValue|0]"
