 nemesis_eternal_enemy_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'proclamaste', 'proclamó' )] que [CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'eres', 'es' )] [CHARACTER.Custom('ES_ElLa')] agente final do mal na Terra"
