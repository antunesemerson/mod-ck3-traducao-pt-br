l_spanish:
 #Decisions
 hasan_evangelize_the_faith: "Evangelizar a Fé"
 hasan_evangelize_the_faith_desc: "Minha missão divina é espalhar a palavra de Allah e de seu profeta escolhido."
 hasan_evangelize_the_faith_tooltip: "Tentar espalhar sua [faith|lE] em um condado próximo"
 hasan_evangelize_the_faith_confirm: "Realizar o sermão"
 hasan_agitate_the_populace: "Agitar a População Local"
 hasan_agitate_the_populace_desc: "Nem todos no reino estão cientes dos males de seus governantes. Algumas palavras do livro sagrado devem orientá-los na direção certa."
 hasan_agitate_the_populace_tooltip: "Tentar reduzir a [county_opinion|lE] de um condado próximo."
 hasan_agitate_the_populace_confirm: "Eles verão a verdade"
 hasan_ignite_the_flames: "Começar a Revolução"
 hasan_ignite_the_flames_desc: "Os fiéis estão reunidos e chegou a hora de acabar com a vilania que governa estas terras."
 hasan_ignite_the_flames_tooltip: "Declarar uma [war|lE] para desmantelar o império"
 hasan_ignite_the_flames_confirm: "Nossa hora é agora"
 hasan_found_the_assassins: "Fundar os Assassinos"
 hasan_found_the_assassins_desc: "Blasfemos e hereges infestam a terra e ficou claro que palavras sozinhas não os acalmarão. Chegou a hora de escalar este conflito teológico para um militar, e os inimigos dos fiéis enfrentarão a lâmina."
 hasan_found_the_assassins_tooltip: "Estabelecer uma [holy_order|lE] para proteger sua [faith|lE]"
 hasan_found_the_assassins_confirm: "Bismillah!"
 hasan_expand_the_assassins: "Expandir os Assassinos"
 hasan_expand_the_assassins_desc: "Precisamos de mais holdings para expandir a influência dos Assassinos. A partir daí, podemos ver a queda dos blasfemos."
 hasan_expand_the_assassins_tooltip: "Expandir sua [holy_order|lE]"
 hasan_expand_the_assassins_confirm: "Um novo lar"
 #Story Cycle
 ULTIMATE_FOE: "Seu inimigo final"
 story_hasan: "A lenda de Hasan Sabbah"
 story_hasan_desc: "Mais do que os exércitos, a força da fé pode derrubar impérios e tecer novas histórias! Você fundará os Assassinos e livrará seu povo do jugo seljúcida? Você ascenderá para se tornar o novo Velho da Montanha?"
 PROGRESS_TOWARDS_ASSASSIN_PATH: "Progresso rumo ao caminho dos Assassinos"
 #Events
 hasan_sabbah.1000.t: "Pregadores [GetFaithByKey('ismaili').GetAdherentNamePluralNoTooltip]"
 hasan_sabbah.1000.desc: "[amira.GetName|U], crente e seguidor[amira.Custom('ES_XA')] do califa egípcio, tem pregado sua visão pouco ortodoxa do islamismo no coração de [location.GetName]. Não tenho dúvidas da verdade do islamismo e de [ROOT.Char.GetFaith.HighGodName|U], e nunca antes duvidei de que tal verdade pudesse ser encontrada em outro lugar que não o [ROOT.Char.GetFaith.GetName|l], mas as palavras de [amira.GetFirstNameNoTooltip] soam diferentes aos meus ouvidos.\n\nPasso grande parte do restante do dia discutindo livros sagrados e hadiths com [amira.GetFirstNameNoTooltip] e, pela primeira vez, ouço a verdade na filosofia [GetFaithByKey('ismaili').GetAdjective]."
 hasan_sabbah.1000.a: "Você conseguiu ferir e prejudicar minha crença."
 hasan_sabbah.1000.b: "A verdade não pode ser buscada fora dos limites do Islã."
 hasan_sabbah.1010.t: "Evangelismo [ROOT.Char.GetFaith.GetAdherentNameNoTooltip]"
 hasan_sabbah.1010.desc: "As pessoas se reuniram ao meu redor no coração de [location.GetNameNoTier] seus olhos estão turvos na ausência da luz de [ROOT.Char.GetFaith.HighGodNamePossessive].\n\nTendo memorizado passagens do meu [ROOT.Char.GetFaith.ReligiousText|l], começo a falar…"
 hasan_sabbah.1010.a: "Em nome de [ROOT.Char.GetFaith.HighGodName|U], o mais perdoador e misericordioso..."
 hasan_sabbah.1010.a.win: "A multidão é convencida"
 hasan_sabbah.1010.a.lose: "A multidão permanece inconsciente"
 hasan_sabbah.1020.t: "Chamado Divino"
 hasan_sabbah.1020.desc: "Um emissário de [ismaili_caliph.GetName] me saúda hoje com uma reverência cortês e uma mensagem.\n\n“O califa soube do vosso grande trabalho aqui e deseja que aprofundem os vossos estudos como missionár[GetPlayer.Custom('ES_OA')] da fé [ismaili_caliph.GetFaith.GetAdjective] em [cairo.GetNameNoTier]”."
 hasan_sabbah.1020.a: "[ROOT.Char.GetFaith.HighGodName] tem um propósito para mim lá."
 hasan_sabbah.1020.a.tt: "Você viajará para [cairo.GetProvince.GetBaronyNameExplicitly]"
 hasan_sabbah.1020.b: "Sou mais necessário onde estou."
 hasan_sabbah.1022.t: "O Califado [GetFaithByKey('ismaili').GetAdherentNameNoTooltip]"
 hasan_sabbah.1022.desc: "Acabei de chegar e a situação no califado é realmente nefasta. [nizar.GetFirstName|U], [Select_CString( nizar.IsFemale, 'sucesora legítima', 'sucesor legítimo' )] e favorit[nizar.Custom('ES_OA')] de [ismaili_caliph.GetName], foi removid[nizar.Custom('ES_OA')] da linha de sucessão. Está claro que isso não é o que o Profeta tinha em mente para o futuro do islamismo.\n\nAs intrigas e mentiras dos homens corromperam os desígnios [ROOT.Char.GetFaith.HighGodNamePossessive|U]; é preciso fazer algo!"
 hasan_sabbah.1022.a: "Eu fico ao lado de [nizar.GetFirstNameNoTooltip|U]!"
 hasan_sabbah.1022.b: "Devo manter o curso."
 hasan_sabbah.1030.t: "Morte de um Califa"
 hasan_sabbah.1030.desc: "[ismaili_caliph.GetName|U] se uniu enfim a [ROOT.Char.GetFaith.HighGodName|U] e está em paz, mas aqueles de nós que ficaram para trás devem enfrentar o peso de sua ausência. Por meio de manobras políticas e forças além da compreensão,"
 hasan_sabbah.1030.desc_caliph_heir: "$hasan_sabbah.1030.desc$ [new_ismaili_caliph.GetName] [new_ismaili_caliph.GetHerHim] sucedeu $hasan_sabbah.1030.desc_outro$"
 hasan_sabbah.1030.desc_caliph_no_heir: "$hasan_sabbah.1030.desc$ o Califado não tem sucessor $hasan_sabbah.1030.desc_outro$"
 hasan_sabbah.1030.desc_outro: "e todas as reivindicações [GetFaithByKey('nizari').GetAdjective].\n\nSei com certeza que [nizar.GetName] era [Select_CString( nizar.IsFemale, 'la candidata favorita', 'el candidato favorito' )], mas se eu revelar minha lealdade, certamente me tornarei um inimig[ROOT.Char.Custom('ES_OA')]."
 hasan_sabbah.1030.a: "Não perecerei na incredulidade como um[ROOT.Char.Custom('ES_XA')] descrente[ROOT.Char.Custom('ES_OA')]!"
 hasan_sabbah.1030.b: "[new_ismaili_caliph.GetFirstNameNoTooltip|U] é [Select_CString( new_ismaili_caliph.IsFemale, 'la califa legítima', 'el califa legítimo' )]."
 hasan_sabbah.1030.c: "Apoiarei qualquer candidato [GetFaithByKey('ismaili').GetAdjective]."
 hasan_sabbah.1031.t: "O Inimigo de [ROOT.Char.GetFaith.GetNameNoTooltip|l]"
 hasan_sabbah.1031.desc: "Quando termino o sermão, olho para a multidão de rostos iluminados que retribuem meu olhar. Começo a pensar em seu senhor[seljuk_equivalent.Custom('ES_XA')] , [seljuk_equivalent.GetFirstName] , que foi, em primeiro lugar, quem os desviou de [ROOT.Char.GetFaith.HighGodName]. Enquanto [seljuk_equivalent.GetSheHe] desfruta de uma vida decadente, seus súditos clamam na lama, obscurecidos da verdade do Todo-Poderoso.\n\nAcho que já não consigo suportar isso, e só desejo ver seu povo livre de [seljuk_equivalent.GetSheHe], unido na filosofia [ROOT.Char.GetFaith.GetAdjective]!"
 hasan_sabbah.1031.a: "Ele deve perecer!"
 hasan_sabbah.1031.b: "Sinto que o verdadeiro inimigo está em outro lugar..."
 hasan_sabbah.1040.t: "Um Sermão Empolgante"
 hasan_sabbah.1040.desc: "Os olhos desinteressados e sem vida da multidão encaram vagamente na minha direção enquanto seguro meu [ROOT.Char.GetFaith.ReligiousText] e me preparo para falar."
 hasan_sabbah.1040.a: "[ultimate_foe.GetFirstNameNoTooltip|U] é [ROOT.Char.GetFaith.DevilName|U] encarnado!"
 hasan_sabbah.1040.a.win: "$hasan_sabbah.1010.a.win$"
 hasan_sabbah.1040.a.lose: "$hasan_sabbah.1010.a.lose$"
 hasan_sabbah.1050.t: "O Velho da Montanha"
 hasan_sabbah.1050.desc: "Por fim, o império de [defender.GetName], semelhante a [defender.Custom2('InsultAdjective', ROOT.Char)], foi enviado de volta a [ROOT.Char.GetFaith.NegativeAfterLife]. Ao lugar a que pertence. Sobre as cinzas do império, meus seguidores voltam seus olhos para mim em busca do nosso futuro, e do futuro de [ROOT.Char.GetFaith.GetName|l].\n\nNo caos da ausência de [defender.GetFirstNameNoTooltip], [hasan_home.GetName] está maduro para ser tomado e ainda pode servir como centro para quaisquer empreendimentos futuros que possamos ter na região."
 hasan_sabbah.1050.a: "Assim começa a era de [hasan_home.GetNameNoTierNoTooltip]."
 hasan_sabbah.1050.b: "Continuamos nossa batalha eterna."
 #Modifiers
 ep3_agitated_populace: "População Agitada"
 ep3_agitated_populace_desc: "Um pregador carismático recentemente realizou um culto inflamável denunciando os males da classe dominante neste condado."
 ep3_religious_doubts: "Dúvidas Religiosas"
 ep3_religious_doubts_desc: "Um missionário carismático recentemente pregou sua religião estrangeira nesta província. Embora não tenha conseguido converter a maioria das pessoas, isso perturbou a fé dos camponeses na religião tradicional."
