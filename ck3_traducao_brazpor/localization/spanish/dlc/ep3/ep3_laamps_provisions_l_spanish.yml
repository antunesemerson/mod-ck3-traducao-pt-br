l_spanish:
 ep3_laamps_provisions.1000.t: "Racionamento"
 ep3_laamps_provisions.1000.desc: "\"[concerned.Custom2('RelationToMeShort', ROOT.Char)|U],\" começa [concerned.GetFirstName], \"Não pude deixar de notar que estamos com cerca de metade de nossas provisões...\"\n\n\"Não deveríamos começar a reduzir nossas rações ou — ainda melhor — planejar uma parada para reabastecer? Não é uma emergência ainda, mas essas situações não demoram muito para piorar. Um simples atraso, e podemos nos ver forçados a comer as solas de nossas botas!\""
 ep3_laamps_provisions.1000.a: "Pare de se preocupar, vai ficar tudo bem!"
 ep3_laamps_provisions.1000.b: "Compre algo gostoso na próxima cidade!"
 ep3_laamps_provisions.1010.t: "Desertores Famintos"
 ep3_laamps_provisions.1010.desc: "Esta mañana ha desaparecido otro grupo de soldados.\n\nEs una tendencia que se lleva produciendo desde hace varios días y debo aceptar que no es que se pierdan durante una patrulla o los ataquen fieras salvajes mientras están de guardia; simplemente desertan.\n\nAdmito que las cosas están siendo difíciles: la comida y el agua escasean, y la paga se retrasa mucho más de lo esperado. Aun así, ¡no puedo perdonar semejante cobardía!"
 ep3_laamps_provisions.1010.a: "Fracos!"
 ep3_laamps_provisions.1020.t: "Covardes"
 ep3_laamps_provisions.1020.desc: "«#EMP ¡Ya no aguanto más!#!».\n\nCuando salgo amodorrad[ROOT.Char.Custom('ES_OA')] de mi tienda, veo a un[leaver.Custom('ES_XA')] [Select_CString(leaver.IsFemale, 'furiosa', 'furioso' )] [leaver.GetTitledFirstName|l] que despotrica y se lleva a rastras fuera del campamento un macuto con sus escasas pertenencias».\n\n«¡Ya no siento los pies, la espalda me duele sin parar y no recuerdo cuándo fue la última vez que comí caliente! ¡O a gusto! ¡O comida de verdad! #EMP ¡Yo os maldigo, condenad[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetFirstNameNoTooltip]!#!»."
 ep3_laamps_provisions.1020.a: "Vá embora, covarde!"
 ep3_laamps_provisions.1025.t: "Não Vale a Pena"
 ep3_laamps_provisions.1025.desc: "«#EMP De verdad#!, he intentado apoyaros, [ROOT.Char.GetFirstNameNoTooltip], lo he intentado lo mejor posible, ¡pero esto ha ido demasiado lejos!», dice [leaver.Custom2('MyCharacterIntroduction', ROOT.Char)] con lágrimas de frustración en los ojos y una expresión homicida en su rostro.\n\n«¡Nos llevaréis a todos a la tumba! ¡Todo por vuestra absurda ambición y ridícula tacañería! ¡Pero no os seguiré a una muerte prematura! ¡Yo me marcho YA!»."
 ep3_laamps_provisions.1025.a: "Adeus."
 ep3_laamps_provisions.1030.t: "Soldados Famintos"
 ep3_laamps_provisions.1030.desc: "Alguns dos meus soldados ainda estão desertando; a maioria, no entanto, não tem nem forças para partir.\n\nDia após dia, o número dos meus seguidores diminui, à medida que a fome, a sede e uma série de doenças os abatem um por um."
 ep3_laamps_provisions.1030.a: "Ainda assim, continuamos marchando."
 ep3_laamps_provisions.1040.t: "Corpo Enfraquecido"
 ep3_laamps_provisions.1040.desc: "Uma tosse persistente sacode meu corpo. Um pouco de água me faria bem, mas acabou ontem. Minhas mãos tremem; provavelmente estou com febre.\n\nSinto-me fraco e doente[ROOT.Char.Custom('ES_OA')]; um estado que parece que compartilho com muitos dos meus seguidores.\n\nPrecisamos reunir provisões, e tem que ser #EMP ya#!, antes que seja tarde demais."
 ep3_laamps_provisions.1040.a: "Estou apenas exausto..."
 ep3_laamps_provisions.1050.t: "O Toque da Morte"
 ep3_laamps_provisions.1050.desc_pet_horse: "Meu pobre [ROOT.Char.Custom( 'WarhorseStoryName' )]!\n\nAs dificuldades da nossa jornada foram demais, até mesmo para um corcel tão poderoso..."
 ep3_laamps_provisions.1050.desc_pet_dog: "Meu pobre [ROOT.Char.Custom( 'DogStoryName' )]!\n\nAs dificuldades da nossa jornada foram demais, até mesmo para um cão tão corajoso..."
 ep3_laamps_provisions.1050.desc_pet_cat: "Meu pobre [ROOT.Char.Custom( 'CatStoryName' )]!\n\nAs dificuldades da nossa jornada foram demais para um gatinho tão pequeno..."
 ep3_laamps_provisions.1050.desc_pet_no: "Que tragédia!"
 ep3_laamps_provisions.1050.desc_pet: "Sempre me lembrarei da maneira como seus olhos inteligentes costumavam sorrir para mim em dias melhores, mas o brilho perdido, apagado pela dor e tristeza, quando você levantou a cabeça para mim pela última vez, é tudo o que consigo ver.\n\nQue [ROOT.Char.GetFaith.HighGodName] me perdoe pela minha tolice que nos trouxe até aqui. Eu não acho que posso me perdoar."
 ep3_laamps_provisions.1050.desc_follower: "\n\nNossos animais têm caído como moscas, os soldados tombando à beira da estrada, e agora isto; [ROOT.Char.GetFaith.DeathDeityName] visitou meu acampamento e levou [dead.Custom2('MyCharacterIntroduction', ROOT.Char)]! O preço de todas as dificuldades desta jornada imprudente foi demais para [dead.GetSheHe]…\n\nEsta morte pesa muito sobre a minha consciência."
 ep3_laamps_provisions.1050.a: "Adeus, amig[dead.Custom('ES_OA')]."
 ep3_laamps_provisions.1050.a_tt: "Seu animal de estimação morreu"
 ep3_laamps_provisions.1050.a_1: "Não merecia isso."
 ep3_laamps_provisions.1050.b: "Pelo menos conseguimos um pouco de carne fresca com isso!"
 ep3_laamps_provisions.1050.c: "Afinal de contas... Por que não...?"
 ep3_laamps_provisions.1050.d: "Desculpa... Eu estou tão, tão #EMP arrependido#!..."
 ep3_laamps_provisions.1050.d.tt: "Você come a carcaça de seu pobre animal"
 ep3_laamps_provisions.1060.t: "Ar Mau"
 ep3_laamps_provisions.1060.desc: "Hoy hay un pesado silencio sobre mi campamento, solo interrumpido por los débiles gemidos de los enfermos.\n\nDurante la noche, muchos de mis seguidores empezaron a mostrar síntomas de enfermedad. Por la mañana, ya parecía una verdadera epidemia. Mi gente, ya debilitada por la larga marcha y el acceso limitado a la comida y el agua, apenas pueden reunir fuerzas para levantarse, no digamos ya andar.\n\nSi quiero salvar a alguien, debemos detenernos ya."
 ep3_laamps_provisions.1060.a: "O que devo fazer?"
 ep3_laamps_provisions.1070.t: "Eu Vejo uma Luz?"
 ep3_laamps_provisions.1070.desc: "Não me lembro da última vez que comi.\n\nTenho a garganta seca como pergaminho.\n\nMe #EMP duele#! todo.\n\nNem consigo me lembrar para onde estou indo, só que preciso seguir em frente.\n\nNão quero continuar, só quero que tudo isso #EMP termine…#!"
 ep3_laamps_provisions.1070.a: "Eu não... posso continuar..."
 ep3_laamps_provisions.1070.a1: "Você morre de fome"
 ep3_laamps_provisions.1070.a2: "Seu estômago fica permanentemente danificado"
 ep3_laamps_provisions.1070.a3: "Sua força te abandona"
 ep3_laamps_provisions.1070.a4: "O desespero te empurra a fazer uma refeição profana"
 ep3_laamps_provisions.1070.a5: "Você adoece"
 ep3_laamps_provisions.1070.a6: "Algo em sua mente se quebra"
 ep3_laamps_provisions.1070.a7: "A luz desaparece de seus olhos"
 ep3_laamps_provisions.1070.a8: "Seu corpo fica permanentemente atrofiado"
 ep3_laamps_provisions.1070.tt: "Inanição"
 weak_stomach_modifier: "Estômago Fraco"
 weak_stomach_modifier_desc: "Depois de sobreviver com pouca ou nenhuma comida por um tempo, o estômago desse personagem não suporta mais refeições grandes ou elaboradas, tornando-o facilmente enjoado."
 hunger_sickness_modifier: "Doença da Fome"
 hunger_sickness_modifier_desc: "Desde que quase morreu de fome, este personagem não é mais o mesmo: sua pele está marcada por feridas, e seu corpo e mente estão mais fracos."
 every_follower_custom: "Todo [follower|lE]"
 starving_opinion: "Deixe-me Morrer de Fome"
 every_maa_regiment_custom: "Todo regimento de Homens-de-Armas"
 ep3_laamps_provisions.1080.t: "Bolsas Vazias e Estômagos Vazios"
 ep3_laamps_provisions.1080.desc_companion: "«Entiendo vuestro entusiasmo, ¡creed que #EMP lo entiendo#!! Pero os ruego que reconsideréis vuestra prisa». Los ojos de [complainer.GetFirstName] parecen tristes y hundidos cuando me mira.\n\n«No seáis tan testarud[ROOT.Char.Custom('ES_OA')]. Se nos ha acabado la comida y el agua dulce; ¡si no paramos inmediatamente a descansar y reabastecernos de provisiones, marcharemos directos a nuestra muerte!»."
 ep3_laamps_provisions.1080.desc_alone: "Sinceramente, pensei que conseguiria. Era meio apertado, mas eu não esperava que as coisas piorassem tanto tão rapidamente.\n\nEncontro-me abandonad[ROOT.Char.Custom('ES_OA')], sem provisões para sustentar minha marcha, com fome, sede e extremamente fraco.\n\nO objetivo se aproxima a cada passo, mas, pela primeira vez, sinto a dúvida corrosiva de que talvez eu não chegue lá com vida."
 ep3_laamps_provisions.1080.a: "Ainda assim, devemos continuar."
 ep3_laamps_provisions.1080.b: "Precisamos descansar antes que seja tarde demais."
 ep3_laamps_provisions.1080.sea: "Você está no mar, não há onde descansar, exceto em seu próprio navio!"
 ep3_laamps_provisions.1080.c: "Defina um curso para a terra, #EMP agora#!!"
 ep3_laamps_provisions.1080.c.tt: "Seu [travel|E] será cancelado e redirecionado para [landfall.GetBaronyNameExplicitly] ([landfall.GetCounty.GetTitle.GetHolder.GetTopLiege.GetPrimaryTitle.GetName])"
 critically_low_provisions_alert: "Provisões Criticamente Baixas"
 critically_low_provisions_alert_desc: "Suas [provisions|lE] estão prestes a acabar!"
