l_spanish:
 ep3_laamp_flavor.0001.t1: "Comedores de Carniça"
 ep3_laamp_flavor.0001.t2: "Engolindo o Orgulho"
 ep3_laamp_flavor.0001.desc1: "Os urubus circulam acima enquanto o sol escaldante castiga meu estômago vazio. Vasculho as rações que restaram; só nos resta biscoito duro e até isso está acabando rápido. Precisaremos reabastecer logo ou enfrentaremos a fome.\n\nInformei aos outros sobre nossa terrível situação. Nenhuma de nossas opções parecia atraente, no mínimo. Alongando o braço do arco, [vulture_shooter.GetFirstName] se apresenta voluntari[vulture_shooter.Custom('ES_OA')] para abater alguns carniceiros e reabastecer nossas parcas provisões."
 ep3_laamp_flavor.0001.desc2: "Las gaviotas sobrevuelan dando círculos mientras el movimiento ondulante del barco solo sirve para resaltar el dolor de mi estómago vacío. Rebusco entre las raciones que nos quedan; solo hay galletas duras e incluso estas se nos acabarán rápidamente. Tendremos que reabastecernos pronto o moriremos de hambre.\n\nInformo a los demás de nuestra grave situación. Ninguna de nuestras opciones sonaba atractiva, como poco. Calentando el brazo del arco, [vulture_shooter.GetFirstName] se presenta voluntari[vulture_shooter.Custom('ES_OA')] para abatir a algunos carroñeros con los que reponer nuestras exiguas provisiones."
 ep3_laamp_flavor.0001.desc: "Os corvos circulam acima de nós enquanto minha barriga dói de fome. Vasculho as rações que restaram; só temos bolachas secas, e até elas estão acabando rapidamente. Precisaremos reabastecer logo ou enfrentar a fome.\n\nInformo aos demais sobre nossa grave situação. Nenhuma de nossas opções parecia atraente, no mínimo. Aquecendo o braço do arco, [vulture_shooter.GetFirstName] se apresenta voluntari[vulture_shooter.Custom('ES_OA')] para abater alguns carniceiros e repor nossos escassos suprimentos."
 ep3_laamp_flavor.0001.a: "Uma excelente sugestão."
 ep3_laamp_flavor.0001.a.cannibal: "Já comi pior."
 ep3_laamp_flavor.0001.b: "Eles teriam um gosto absolutamente #EMP horrível#!"
 ep3_laamp_flavor.0001.c: "Comer carniça é conhecido por causar doenças."
 ep3_laamp_flavor.0001.d: "Aposto que posso abater mais aves que [vulture_shooter.GetFirstNameNoTooltip]."
 ep3_laamp_flavor.0001.a.sick: "Comendo Carniça"
 ep3_laamp_flavor.0001.a.fine: "Comendo Carniça"
 agreed_to_shoot_vultures: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'congeniasteis', 'congeniaron')] compartilhando uma refeição putrefata."
 agreed_to_shoot_vultures_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] [Select_CString(Or(TARGET_CHARACTER.IsLocalPlayer, CHARACTER.IsLocalPlayer), 'congeniasteis', 'congeniaron')] compartilhando uma refeição pútrida."
 no_vulture_eating: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'discutisteis', 'discutieron')] sobre a perspectiva de comer carniça."
 no_vulture_eating_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] [Select_CString(Or(TARGET_CHARACTER.IsLocalPlayer, CHARACTER.IsLocalPlayer), 'discutisteis', 'discutieron')] sobre a perspectiva de comer carniça."
 ep3_laamp_flavor.0001.sick: "Carne de necrófago não me cai bem"
 ep3_laamp_flavor.0001.notsick: "Mal comestível, mas sobrevivível"
 ep3_laamp_flavor.0020.t: "Ladrão!"
 ep3_laamp_flavor.0020.intro: "Corri para a praça da cidade assim que fiquei sabendo da notícia; pegaram [thieving_follower.GetFirstName] em flagrante roubando de uma barraca do mercado . Lá do alto, preside nada menos que [town_leader.Custom('ES_ElLa')] [town_leader.GetTitledFirstName|l], que me lança um olhar capaz de matar. Em contraste, [thieving_follower.GetFirstNameNoTooltip] parece muito mais content[thieving_follower.Custom('ES_OA')] de me ver de sua situação no cepo.\n\n“A pena por roubo em [town_location.GetName]…”, explica [town_leader.Custom('ES_ElLa')] [town_leader.GetTitledFirstName|l],"
 ep3_laamp_flavor.0020.desc1: ""normalmente, uma surra severa se a multa habitual não puder ser paga. No entanto, como um[thieving_follower.Custom('ES_XA')] membro conhecid[thieving_follower.Custom('ES_OA')] de uma gangue de vagabundos criminosos, não me sinto inclinado a ser tão clemente"."
 ep3_laamp_flavor.0020.desc: "\"tipicamente uma surra severa. No entanto, estou disposto a renunciar a esta punição se uma multa apropriada puder ser paga.\""
 ep3_laamp_flavor.0020.a: "Vou pagar a multa por [thieving_follower.GetFirstNameNoTooltip]."
 ep3_laamp_flavor.0020.b: "[thieving_follower.GetFirstNameNoTooltip] deve aceitar a punição."
 ep3_laamp_flavor.0020.c: "Por favor, [town_leader.GetTitledFirstNameNoTooltip|l] , imploro a vocês. Soltem [thieving_follower.GetFirstNameNoTooltip]!"
 ep3_laamp_flavor.0020.d: "Exigimos julgamento por combate!"
 thievery_rivalry_opinion: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] tornaram-se ressentidos um com o outro por causa de um ato de furto."
 ep3_laamp_flavor.0020.d.tt.success: "Nós somos vitoriosos na batalha, e [thieving_follower.GetFirstName] é absolvido"
 ep3_laamp_flavor.0020.d.tt.fail: "A luta foi perdida, e [thieving_follower.GetFirstName] deve pagar o preço"
 thievery_helper_opinion: "[CHARACTER.GetUIName|U] e [TARGET_CHARACTER.GetUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'congeniasteis', 'congeniaron')] quando [CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'ayudaste', 'ayudó' )] a [TARGET_CHARACTER.GetShortUIName] a escapar das consequências de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'tus', 'sus' )] ações."
 thievery_helper_opinion_corresponding: "[TARGET_CHARACTER.GetUIName|U] e [CHARACTER.GetUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'congeniasteis', 'congeniaron')] quando [CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'ayudaste', 'ayudó' )] a [TARGET_CHARACTER.GetShortUIName] a escapar das consequências de suas ações."
 ep3_laamp_flavor.0030.t: "Doces Sonhos"
 ep3_laamp_flavor.0030.desc: "¡Las mesas de banquete se alargan hasta lo lejos! ¡Mi alto trono reluce con rubíes y zafiros! Invitados de los cuatro rincones del mundo llegan para celebrar mi vigésimo aniversario de reinado bendecido.\n\n«¿Otra copa de dulce ambrosía, [Select_CString(ROOT.Char.IsFemale, 'gloriosa emperatriz', 'glorioso emperador' )]?», me pregunta mi archicamarer[dream_friend.Custom('ES_OA')] [dream_friend.GetFirstName], ofreciéndome una copa esplendorosa que vacío con ansia.\n\n«¡Danzad para mí, payas[dream_rival.Custom('ES_OA')]!», bramo a [dream_rival.GetFirstName], [Select_CString(dream_rival.IsFemale, 'descreditada y humillada', 'desacreditado y humillado' )]. Ese es el destino de quienes me contrarían. Cierro los ojos un momento.\n\nCuando los abro de nuevo, me encuentro en un lecho de paja demasiado familiar. Suspiro. Solo ha sido un sueño."
 ep3_laamp_flavor.0030.a: "Vou tornar meu sonho realidade."
 ep3_laamp_flavor.0030.b: "Foi um sonho agradável enquanto durou."
 ep3_laamp_flavor.0030.c: "Estou feliz por estar livre daquela vida."
 dream_ambitious: "Ambições Regais"
 dream_envious: "Inveja de Terras"
 dream_content: "Liberdade de Responsabilidades"
 ep3_laamp_flavor.0040.t: "Senhorzinho Perdido"
 ep3_laamp_flavor.0040.desc: "Cuando exploramos el/la [location_scope.GetTerrain.GetNameNoTooltip|l] de [ROOT.Char.GetCurrentLocation.GetName], veo a alguien abrevar a un caballo al borde del camino. Al acercarnos, [runaway_child.GetHerHim] reconozco como [runaway_child.GetFullName], [runaway_child.Custom('ES_ElLa')] [runaway_child.Custom('GetDaughterSon')] [local_ruler.Custom('ES_DelDela')] [local_ruler.GetTitledFirstName|l]. Sus ojos reflejan miedo y confusión y sus elegantes ropajes están sucios y desgarrados.\n\nTras una conversación breve y tensa, me entero de que [runaway_child.GetFirstNameNoTooltip] se ha escapado de casa por no sé qué pelea familiar cuyos detalles me cuesta entender. No pasó mucho tiempo antes de que [Select_CString(runaway_child.IsFemale, 'la chica', 'el chico' )] se perdiera en la espesura. Con lágrimas en los ojos, [runaway_child.GetFirstNameNoTooltip] nos pregunta si puede venir con nosotros o, al menos, escoltar[runaway_child.GetHerHim] de vuelta con su [local_ruler.GetMotherFather]."
 ep3_laamp_flavor.0040.a: "Venha conosco, vamos levá-lo para casa."
 ep3_laamp_flavor.0040.b: "Bem-vind[runaway_child.Custom('ES_OA')] à nossa alegre banda."
 ep3_laamp_flavor.0040.c: "Mal posso esperar para escrever a carta de resgate."
 stole_my_child_opinion: "Roubou Meu Filho"
 returned_my_child_opinion: "Devolveu Meu Filho em Segurança"
 ep3_laamp_flavor.0050.t: "O Necromante"
 ep3_laamp_flavor.0050.desc: "Incapaz de dormir, un paseo nocturno por el/la [location_scope.GetTerrain.GetNameNoTooltip|l] me hace divagar sin pensarlo hasta que oigo… ¿#EMP cánticos#!?\n\nSigo el sonido hasta su origen y encuentro un círculo de antorchas que ilumina una escena curiosa e inquietante.\n\nUn hombre vestido con una túnica y con los ojos fijos en su grimorio, invoca los nombres de los demonios que pretende someter a su voluntad. Ante él hay un círculo ritual de tiza, complejo, elegante y absolutamente demente; ¡es obvio que se trata de un [Glossary('nigromante', 'NECROMANCER_GLOSS' )]!\n\nDel impacto, tropiezo y anuncio ruidosamente mi presencia."
 ep3_laamp_flavor.0050.a: "Você cessará essa feitiçaria imunda imediatamente!"
 ep3_laamp_flavor.0050.b: "Interessante! O que você pode me ensinar sobre demonologia?"
 ep3_laamp_flavor.0050.c: "Podeis instruir meu [player_heir_scope.Custom('GetDaughterSon')] , [player_heir_scope.GetFirstNameNoTooltip] nas artes das trevas?"
 ep3_laamp_flavor.0050.d: "Terrível! Eu devo fugir!"
 learned_in_demonology: "Aprendeu Demonologia"
 ep3_laamp_flavor.0050.d.tt.success: "O nefasto necromante é expulso"
 ep3_laamp_flavor.0050.d.tt.fail: "O necromante o sobrepuja, forçando uma retirada"
 NECROMANCER_GLOSS: "Apesar do nome, a necromancia histórica abrangia uma mistura de esoterismos abraâmicos, geralmente envolvendo súplicas a espíritos considerados #EMP impuros#! pela Igreja, sejam eles demônios, os mortos ou figuras bíblicas mais nebulosas."
 ep3_laamp_flavor.0060.t: "Peso Morto"
 ep3_laamp_flavor.0060.desc: ""Chega de chororô! Eu também não como há dias e não tenho o luxo de ser carregado como um príncipe!"; [follower.GetFirstName] golpeia com o punho as grades de ferro da jaula de [prisoner.GetFirstName] puxada por um cavalo.\n\n"Estamos morrendo de fome e aquele rato é um desperdício completo das nossas rações. Deveríamos enforcar[prisoner.GetHerHim] e acabar logo com isso". [follower.GetFirstNameNoTooltip] aponta para uma árvore morta adiante."
 ep3_laamp_flavor.0060.a: "[prisoner.GetFirstNameNoTooltip] já viveu o suficiente."
 ep3_laamp_flavor.0060.b: "Você não precisa ir para casa, mas não pode ficar aqui."
 ep3_laamp_flavor.0060.c: "[Select_CString(prisoner.IsFemale, 'Esa prisionera', 'Ese prisionero' )] me é valios[prisoner.Custom('ES_OA')] , deixe-o estar.[prisoner.Custom('ES_OA')] estar."
 burdensome_prisoner_modifier: "Peso Morto"
 ep3_camp_temperament.0001.t: "Alimentar um Amigo"
 ep3_camp_temperament.0001.desc: "«Tal vez no podamos conseguiros las mejores carnes», me sorprende la voz de [potential_friend.GetFirstName], que tiene una gran sonrisa en el rostro, «pero los que erran no pueden ser escrupulosos».\n\n[potential_friend.GetFirstNameNoTooltip] alza una copa y hace un gesto hacia el resto de mis seguidores, que están sentados en torno a una fogata débil con sacos de fruta fresca abiertos junto a ellos.\n\n«No creáis que no vemos lo que hacéis por nosotros», continúa [potential_friend.GetSheHe], ahora más silenciosamente, «todos hemos de hacer nuestra parte»."
 ep3_camp_temperament.0001.a: "\"Vamos todos comer juntos!\""
 ep3_camp_temperament.0001.b: "\"Você deve ter envenenado isso!\""
 ep3_camp_temperament.0001.c: "Posso vender isso por algum ouro..."
 ep3_camp_temperament.0001.d: ""#EMP Vos#!, amigo[potential_friend.Custom('ES_OA')], você é um verdadeiro tesouro"."
 ep3_camp_temperament.0001.e: "\"Obrigado pelos seus esforços.\""
 ep3_camp_temperament.0010.t: "Em Todos os Cantos"
 ep3_camp_temperament.0010.desc.intro: "A chuva levou a maioria dos meus seguidores a buscar refúgio sob o mesmo tronco de [ROOT.Char.GetCurrentLocation.Custom('GetRandomAppropriateTree')], [enemy.Custom('ES_ElLa')] [enemy.GetTitledFirstNameNoTooltip|l] vocifera com fervor no meio da multidão, e eu procuro ocultar minha presença.\n\n"Essa espécie de [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('enemy'))], absoluto inútil e estúpido! Não vê que é incapaz de governar seu próprio acampamento? Como podemos esperar que governe algo maior do que uma poça?".\n\n"
 ep3_camp_temperament.0010.desc.spouse: "Mal posso acreditar. Meu próprio cônjuge."
 ep3_camp_temperament.0010.desc.child: "Mal posso acreditar. Meu próprio filho."
 ep3_camp_temperament.0010.desc.friend: "Mal posso acreditar. Meu mais querido amigo."
 ep3_camp_temperament.0010.a: "Não... você não."
 ep3_camp_temperament.0010.a.flavor: "#EMP E você também, [enemy.GetFirstNameNoTooltip]?#!"
 ep3_camp_temperament.0010.b: "Agora você trabalha para mim."
 ep3_camp_temperament.0010.c: "Você pagará por isso."
 ep3_camp_temperament.0010.d: "Alguma comida pode persuadi-los."
 ep3_camp_temperament.0010.e: "Eles não precisam gostar de mim."
 ep3_camp_temperament_0010_tt: "Você recebe uma bonificação #positive_value media#! para uma [scheme|lE] de [GetScheme('murder').GetTypeName|l] e de [GetScheme('sway').GetTypeName|l] contra [enemy.GetName]"
 ep3_heartbreak_modifier: "Inimigo Familiar"
 ep3_heartbreak_modifier_desc: "Este personagem foi difamado para seu acampamento por um membro próximo da família."
 SCHEME_ET_TU_BRUTE: "Você descobriu os planos de [target.GetShortUINameNoTooltip]; $VALUE|+0=$"
 bribed_opinion: "Subornado"
 ep3_determined_modifier: "Movido por Despeito"
 ep3_determined_modifier_desc: "Este personagem está determinado a limpar seu nome, custe o que custar."
 ep3_camp_temperament.0020.t: "Boato"
 ep3_camp_temperament.0020.desc: "A porta da minha tenda se abre e [secret_owner.Custom('ES_ElLa')] [secret_owner.GetTitledFirstName|l] está diante de mim. Com uma leve reverência, começa: \"Peço desculpas por interromper, [ROOT.Char.Custom('FormOfAddressForLiege')], mas trago notícias que podem interessar-vos".\n\n"Eu estava descansando em [ROOT.Char.Custom('GetPubName')], bebendo com um grupo que se revelou como servos de [secret_owner.Custom('ES_DelDela')] [secret_owner.GetTitledFirstName|l]".\n\n"Não tiveram pudor em falar sobre seu senhor[secret_owner.Custom('ES_XA')]. \"E o que há de [secret_owner.GetSheHe]?\", perguntei e consegui descobrir um segredo em vosso benefício"."
 ep3_camp_temperament.0020.a: "'Um segredo faria uma ótima história...'"
 ep3_camp_temperament.0020.b: "'Você fez um excelente trabalho.'"
 ep3_camp_temperament.0020.c: "'O que você estava fazendo na taverna...?'"
 ep3_camp_temperament.0020.d: "'Conte-me de uma vez!'"
 ep3_camp_temperament.0020.e: "Isso fica entre [secret_owner.Custom('ES_ElLa')] [secret_owner.GetTitledFirstNameNoTooltip|l] e [ROOT.Char.GetFaith.HighGodName]."
 ep3_camp_temperament_0020_d_tt: "Você descobre o [secret|lE] de [secret_owner.GetShortUIName]"
 ep3_inspired_by_life: "Inspirado pela Vida"
 ep3_inspired_by_life_desc: "Este personagem usa os segredos que conhece para escrever histórias envolventes."
 ep3_camp_temperament.0030.t: "Motim!"
 ep3_camp_temperament.0030.desc.intro: ""Ah, [ROOT.Char.GetTitledFirstName|l], que honra contar com sua companhia nesta noite", me saúda [cocky_follower.Custom('ES_ElLa')] [cocky_follower.GetTitledFirstName|l] quando me aproximo da fogueira. Só [cocky_follower.GetSheHe] continua bebendo junto ao fogo. "Peço-lhe", ele aponta para um tronco ao lado e espera até que eu me sente para continuar:\n\n"Não fica nada bem, não é? O acampamento inteiro parece zangado com você... e talvez haja um motivo para isso,"
 ep3_camp_temperament.0030.desc.no_food: "com a comida acabando... você nunca sabe.'"
 ep3_camp_temperament.0030.desc.other: "'não acha?'"
 ep3_camp_temperament.0030.desc.outro: "\n\n'Que pena seria se alguém... aproveitasse o momento.'"
 ep3_camp_temperament.0030.a: "'Na verdade... er... foi culpa de [bus_follower.GetShortUINameNoTooltip]!'"
 ep3_camp_temperament.0030.b: "'Eu vou te mostrar!'"
 ep3_camp_temperament.0030.b.success: "Você vence a luta"
 ep3_camp_temperament.0030.b.failure: "Você perde a luta"
 ep3_camp_temperament.0030.c: "'O que você acabou de dizer?'"
 ep3_camp_temperament.0030.d: "'Vocês estão todos livres para ir.'"
 ep3_camp_temperament.0030.e: "'Distribua este ouro entre o seu povo.'"
 ep3_poopy_pants: "Motim Fracassado"
 ep3_poopy_pants_desc: "Este personagem foi publicamente humilhado quando tentou iniciar um motim contra seu líder."
 benevolent_to_mutiniers_opinion: "Benevolente com os Mutiantes"
 ep3_camp_temperament.0040.t: "Um Seguidor Devoto"
 ep3_camp_temperament.0040.desc: "«Un momento, mi [ROOT.Char.GetTitleAsNameNoTooltip|l]», [follower.Custom('ES_ElLa')] [follower.GetTitledFirstName|l] me detiene mientras reviso el acampamento. [follower.GetFirstNameNoTooltip] sigue jadeando con fuerza cuando me interpela, [follower.Custom('quirk_pos_pp')]:\n\n«No creáis que vuestros esfuerzos pasan desapercibidos. [dummy_gender.Custom('ES_LoLa')|U]s [dummy_gender.GetWomenMen] os admiran, los niños juegan a ser vos… ¡y el campamento entero considera que sois [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetWomanMan] más grande que existe!».\n\n«Deseo ayudaros de la misma manera que vos nos ayudáis a nosotros; conozco vuestros… esfuerzos actuales y creo que os merecería la pena que me incorporarais a ellos»."
 ep3_camp_temperament.0040.a: "'Você está certo! Eu sou ótimo!'"
 ep3_camp_temperament.0040.b: "'Eu terminarei o trabalho #EMP sozinho.#!'"
 ep3_camp_temperament.0040.c: "'Que grande demonstração de lealdade!'"
 ep3_camp_temperament.0040.d: "'Fique à vontade.'"
 ep3_camp_temperament.0040.d.tt: "[follower.GetShortUIName|U] ocupa uma nova vaga de [agent|lE] [GetAgentSlotType( 'agent_devotee' ).GetName] $game_concept_success_chance_max_i$ na [scheme|lE] de [my_scheme.GetName|l] contra [my_scheme.GetTargetCharacter.Custom('ES_ElLa')] [my_scheme.GetTargetCharacter.GetTitledFirstName|l]"
 ep3_camp_temperament.0040.e: "'Certifique-se de que #EMP todos#! saibam o quão grande eu sou.'"
 devotee_agent_desc: "[recipient.GetShortUIName] é seu $agent_devotee$"
 ep3_arrogant_schemer_modifier: "Conspirador Prestigioso"
 ep3_arrogant_schemer_modifier_desc: "A boa reputação deste personagem o ajuda em suas tramas pessoais."
 ep3_self_employed_scheme_modifier: "Autônomo"
