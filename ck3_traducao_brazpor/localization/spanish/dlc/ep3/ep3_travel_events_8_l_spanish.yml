 friend_let_me_go_corresponding: "[CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsLocalPlayer, 'permitiu', 'permitiu' )] que [TARGET_CHARACTER.GetShortUIName] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'fosse', 'fosse' )] buscar o amor."
