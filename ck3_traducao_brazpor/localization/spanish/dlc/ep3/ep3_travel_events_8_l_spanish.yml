l_spanish:
 ep3_travel_events.8000.t: "Pertencer a Algum Lugar"
 ep3_travel_events.8000.desc.intro: "Desde seu encontro casual em [location.GetName], meu querid[romantic_child.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', romantic_child)] [romantic_child.GetName] e [prospective_prince.GetName] têm sido completamente inseparáveis. [prospective_prince.Custom('ES_ElLa')|U] [prospective_prince.Custom('GetDaughterSon')] [prince_parent.Custom('ES_DelDela')] [prince_parent.GetTitleAsNameNoTooltip|l] está totalmente e absolutamente embriag[prospective_prince.Custom('ES_OA')] de amor. Ver um cortejo assim é encantador, mas precisamos partir para outras aventuras, e em breve eles serão separados.\n\n\"Oh, [ROOT.Char.GetMotherFather],"
 ep3_travel_events.8000.desc.mid2.bold_child: "estou cansad[romantic_child.Custom('ES_OA')] de viajar. Desejo ficar aqui com [prospective_prince.GetNameNoTooltip]!\""
 ep3_travel_events.8000.desc.mid2.timid_child: "acho que talvez nunca conheça outr[prospective_prince.Custom('ES_OA')] [prospective_prince.GetWomanMan] como [prospective_prince.GetHerHim]. Você acha que um dia poderemos nos estabelecer e criar raízes próprias?\""
 ep3_travel_events.8000.outro.dislikes_child: "\n\nEsta pode ser minha única oportunidade de me livrar deste parasita para sempre."
 ep3_travel_events.8000.outro: "\n\nVejo a angústia estampada em seu rosto e não posso deixar de me perguntar se seu lugar realmente ainda é comigo."
 ep3_travel_events.8000.a: "\"Seu lugar é ao lado de [prospective_prince.GetFirstNameNoTooltip], não de um[ROOT.Char.Custom('ES_XA')] velh[ROOT.Char.Custom('ES_OA')] [ROOT.Char.Custom2('InsultNoun', ROOT.Char)] como eu.\""
 ep3_travel_events.8000.b: "\"[prospective_prince.GetFirstNameNoTooltip|U] pode simplesmente vir conosco!\""
 ep3_travel_events.8000.c: "\"Vamos, [romantic_child.GetFirstNameNoTooltip].\""
 ep3_travel_events.8001.t: "Raízes Próprias"
 ep3_travel_events.8001.desc: "[prospective_prince.Custom2('MyCharacterIntroduction', ROOT.Char )|U] volta para casa de seu passeio trazendo do braço [Select_CString(romantic_child.IsFemale, 'uma jovem desconhecida', 'um jovem desconhecido' )]. É uma criatura claramente descuidada, cansada da estrada e com a modesta roupa salpicada de sujeira.\n\n\"[ROOT.Char.GetMotherFather|U]! Este[romantic_child.Custom('ES_EA')] é [romantic_child.GetFirstName], [romantic_child.Custom('GetDaughterSon')] de [laamp.GetName], [Select_CString(laamp.IsFemale, 'a célebre aventureira', 'o célebre aventureiro' )]. Também é [romantic_child.Custom('ES_ElLa')] [romantic_child.GetWomanMan] [romantic_child.Custom('ES_DelDela')] por quem me apaixonei, e se nos derdes a vossa bênção, nos casaremos!\""
 ep3_travel_events.8001.a: "\"Você tem minha bênção.\""
 ep3_travel_events.8001.b: "\"De jeito nenhum!\""
 ep3_travel_events.8002.t: "Em Outro Tempo"
 ep3_travel_events.8002.desc: "Assim que o último de nossos suprimentos está carregado e estamos prontos para nos aventurar pelos caminhos intermináveis, sou interrompido pelos gritos desesperados de meu [romantic_child.Custom('GetDaughterSon')]. Quando finalmente chega até mim, sou envolvido em um forte abraço. Ao que parece, [prince_parent.GetName] não abençoou esta união e [romantic_child.GetName] volta para se juntar a mim em minhas viagens."
 ep3_travel_events.8002.a: "\"Calma.\""
 ep3_travel_events.8010.t: "Não Fará Falta"
 ep3_travel_events.8010.desc: "Enquanto continuamos por [location.GetName], meu olhar é atraído por um túmulo elaboradamente decorado em meio a uma rede de sepulturas comuns. O túmulo parece estar aberto, e logo em sua entrada vejo o brilho de algum tesouro desconhecido.\n\nApenas meu grupo parece estar por perto, e certamente quem quer que tenha possuído o conteúdo deste túmulo não me julgaria por levar o que de outra forma ficaria sem uso, certo?"
 ep3_travel_events.8010.a: "Estou certo de que ninguém notaria."
 ep3_travel_events.8010.a.win: "Você saqueia alguns bens funerários sem interrupção"
 ep3_travel_events.8010.a.lose: "Seu grupo é pego"
 ep3_travel_events.8010.b: "Não vou profanar os mortos!"
 soulmate_laamp_adventure: "[CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsLocalPlayer, 'se encontrou', 'se encontrou' )] por acaso com [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetShortUIName )] em uma aventura e [Select_CString(CHARACTER.IsLocalPlayer, 'se apaixonou', 'se apaixonou' )] perdidamente."
