l_spanish:
 ep3_governor_yearly.3001.t: "Construtor, Comprador, Proprietário de Terras"
 ep3_governor_yearly.3001.desc_christian: "Aqueles que merecem sua recompensa, Deus concede prosperidade. As terras de um preguiçoso estão tomadas pelo mato, mas as minhas —terras de alimentos levados à minha despensa, de aluguéis pagos em meu nome— se estendem até o horizonte."
 ep3_governor_yearly.3001.desc_other: "Como a terra floresce! Como as despensas estão cheias! Ao redor da minha propriedade em [root_domicile_province.GetTitle.GetNameNoTier], investi caro na produção local e agora, abençoado, muitas famílias trabalhadoras pagam aluguel para mim."
 ep3_governor_yearly.3001.desc_mid: "\n\nEnquanto isso, [governor.Custom('ES_ElLa')] [governor.GetTitledFirstName|l] governa entre silvas e confusão. Os"
 ep3_governor_yearly.3001.desc_greek: "[Glossary( 'choritai', 'CHORITAI_GLOSS' )]"
 ep3_governor_yearly.3001.desc_non_greek: "pequenos proprietários"
 ep3_governor_yearly.3001.desc: "de [target_theme.GetNameNoTier] praticamente não sabem se suas leis os protegem de serem comprados! Os contribuintes [governor.Custom('ES_DelDela')] [governor.GetTitleAsNameNoTooltip|l] poderiam ser meus inquilinos com #EMP tanta#! facilidade…\n\n"
 ep3_governor_yearly.3001.desc_garden: "Meus jardins recém-fechados — são apenas um começo?"
 ep3_governor_yearly.3001.desc_garden_leisure: "Meus jardins recentemente ampliados, ricos com belas [root_domicile_province.Custom('get_region_flower_type_plural')] — são apenas um começo?"
 ep3_governor_yearly.3001.desc_garden_fruit: "Meus jardins recentemente ampliados, perfumados por frutas amadurecendo — são apenas um começo?"
 ep3_governor_yearly.3001.desc_grazing_land: "Meus direitos habilmente negociados para novas terras de pastagem — são apenas um começo?"
 ep3_governor_yearly.3001.desc_horse_pasture: "Meus recém-assinados direitos sobre ricas pastagens de cavalos — são apenas um começo?"
 ep3_governor_yearly.3001.desc_camel_pasture: "Meus barulhentos, fedorentos, #EMP lucrativos#! rebanhos de camelos corpulentos — são apenas um começo?"
 ep3_governor_yearly.3001.desc_grain_field: "Meus campos de grãos recentemente arados — são apenas um começo?"
 ep3_governor_yearly.3001.desc_vineyard: "As intermináveis fileiras dos treliças frondosas das minhas novas vinhas — são apenas um começo?"
 ep3_governor_yearly.3001.desc_olive: "Meus olivais recém-comprados, com suas preciosas e enrugadas árvores — são apenas um começo?"
 ep3_governor_yearly.3001.desc_silk: "Meus novos bosques de amoreiras produtoras de seda — são apenas um começo?"
 ep3_governor_yearly.3001.desc_tea: "Minhas fileiras crescentes de arbustos de chá verde — serão apenas o começo?"
 CHORITAI_GLOSS: "#bold Choritai#! é o termo em Grego Antigo para aqueles que pertencem a uma comunidade de vilarejo, um #EMP chorion#!."
 ep3_governor_yearly.3001.a_success: "\"Eu? O maior senhor de terras ao redor?\""
 ep3_governor_yearly.3001.a_failure: "Rapidamente você se vê envolvid[ROOT.Char.Custom('ES_OA')] em escândalos"
 ep3_governor_yearly.3001.a_govs_low: "Esta opção está disponível devido à baixíssima [governor_efficiency|lE] de [Select_CString( governor.IsLocalPlayer, 'você', governor.GetShortUIName )]"
 ep3_governor_yearly.3001.c_gov_gain: "A [governor_efficiency|lE] de [Select_CString( governor.IsLocalPlayer, 'você', governor.GetShortUIName )] aumenta em #P 5#!"
 ep3_governor_yearly.3001.a: "Eu conseguiria comprar metade do [target_theme.GetTierAsNameNoTooltip]!"
 ep3_governor_yearly.3001.a.flavor: "Esta administração inútil não vai notar minhas novas propriedades até a época de impostos!"
 ep3_governor_yearly.3001.b: "Melhor eu prosperar um pouco do que um[defector.Custom('ES_XA')] [governor.GetTitleAsNameNoTooltip|l] imbecil."
 ep3_governor_yearly.3001.b.flavor: "Tenho dinheiro para gastar — por que não adquirir mais terras lucrativas?"
 ep3_governor_yearly.3001.b_gov_response: "@warning_icon! #X [governor.GetShortUIName] pode puni-lo!#!"
 ep3_governor_yearly.3001.c: "Em vez disso… eu poderia oferecer minha ajuda [governor.Custom('ES_AlAla')] [governor.GetTitleAsNameNoTooltip|l]."
 ep3_governor_yearly.3001.c.flavor: "Meus avisos poderiam ajudar a impedir outros proprietários de terras... e provar meu valor."
 ep3_governor_yearly.3001.c_gain_influence: "Você ganha #P 75#! #high Influence#!"
 ep3_governor_yearly.3001.minor_influence_loss: "Você gasta #N 75#! #high Influence#!"
 ep3_governor_yearly.3001.b_miniscule_influence_loss: "Você gasta #N 35#! #high Influence#!"
 vast_tracts_of_land_modifier: "Pequenas Propriedades Abundantes"
 vast_tracts_of_land_modifier_desc: "Esta casa coleta aluguéis e supervisiona os assuntos de muitas oficinas e pequenas propriedades."
 productive_lands_modifier: "Numerosas Pequenas Propriedades"
 productive_lands_modifier_desc: "As fronteiras da propriedade desta família aumentaram através de coerção e compras inteligentes."
 ep3_governor_yearly.3002.t: "Contribuintes para Inquilinos"
 ep3_governor_yearly.3002.desc: "\"Vejam, vejam os registros!\", explode [tax_farmer.GetName].\n\n\"Mais uma aldeia cujos impostos arrecadei, em vosso nome, desde que comprei o contrato! E agora enviam os fazendeiros tributados para [landlord.GetName]\", seu nov[landlord.Custom('ES_OA')] grande proprietário! E e[landlord.Custom('ES_EA')] paga uma miséria\".\n\n\"É[landlord.Custom('ES_EA')]"
 ep3_governor_yearly.3002_insult_greek: "[Glossary( 'metrokoites', 'METROKOITES_GLOSS' )]"
 METROKOITES_GLOSS: "#bold Metrokoites#! é um insulto grego que descreve 'aquele que dorme com a própria mãe.'"
 ep3_governor_yearly.3002_insult_armenian: "[Glossary( 'eshi dzag', 'ESHI_DZAG_GLOSS' )]"
 ESHI_DZAG_GLOSS: "#bold Eshi dzag#! é um insulto armênio que significa 'filho de um burro.'"
 ep3_governor_yearly.3002_insult_generic: "[landlord.Custom2('InsultNoun', SCOPE.sC('tax_farmer'))]"
 ep3_governor_yearly.3002.desc_mid: "mentiu para esses rústicos sobre suas proteções: está comprando"
 ep3_governor_yearly.3002_half_duchy: "tantas, #EMP tantas#!"
 ep3_governor_yearly.3002_some_of_duchy: "muitas"
 ep3_governor_yearly.3002.desc_outro: "dos pastos locais. Pensai, grande [ROOT.Char.GetTitleAsNameNoTooltip|l]… nos impostos e nas levies perdidas…\"."
 ep3_governor_yearly.3002.a: "Será que o[landlord.Custom('ES_EA')] proprietário de pouca monta quer brincar #EMP conmigo#!…?"
 ep3_governor_yearly.3002.a.flavor: "\"Terras #EMP roubadas#! de pobres #EMP inocentes#!? Brutalidade, intimidação?\" Sim, acho que é isso que ouço as testemunhas dizendo..."
 ep3_governor_yearly.3002.b: "\"Force-os a se apresentar! Force-os a pagar!\""
 ep3_governor_yearly.3002.b.flavor: "Os tolos comuns servirão à ponta da espada! Agora eles pagam o dobro de senhores."
 ep3_governor_yearly.3002.c: "É meu dever denunciar isso!"
 ep3_governor_yearly.3002.c.flavor: "Fazer um escândalo por tamanha avareza prova que sou um[landlord.Custom('ES_XA')] governador de [target_theme.GetNameNoTierNoTooltip] competente e ativ[landlord.Custom('ES_OA')]! Mais ou menos…"
 ep3_governor_yearly.3002.d: "\"Envie [landlord.Custom('ES_AlAla')] [landlord.GetDynastyHouseNameNoTooltip]… meus cumprimentos\"."
 ep3_governor_yearly.3002.d.flavor: "Pelo menos alguém nesta [target_theme.GetTierAsNameNoTooltip] ficará feliz..."
 ep3_governor_yearly.3002.a_medium_influence_loss: "Você gasta #N 150#! de #high influencia#!"
 ep3_governor_yearly.3002.b_miniscule_influence_gain: "Você ganha #P 35#! de #high influencia#!"
 ep3_governor_yearly.3002.b_minor_influence_loss_landlord: "[landlord.GetShortUIName] gasta #N 75#! de #high influencia#!"
 ep3_governor_yearly.3000_major_governance_loss: "Tu [governor_efficiency|lE] disminuye en #N 15#! durante #high 10 años#!"
 ep3_governor_yearly.3000_governance_loss: "Tu [governor_efficiency|lE] disminuye en #N 10#! durante #high 10 años#!"
 ep3_governor_yearly.3000_miniscule_governance_loss: "Tu [governor_efficiency|lE] disminuye en #N 5#! durante #high 10 años#!"
 some_smallholds_modifier: "Conjunto de Pequenas Propriedades"
 some_smallholds_modifier_desc: "Apesar de uma intervenção pesada, esses proprietários de terras ainda coletam aluguéis de alguns inquilinos extra-legais."
 taxed_and_pressganged_tenants_modifier: "Inquilinos Taxados e Recrutados à Força"
 taxed_and_pressganged_tenants_modifier_desc: "Pequenos proprietários locais que venderam suas terras são duplamente roubados e, embora seja ilegal, forçados ao serviço armado."
 ep3_governor_yearly.3003.t: "[landlord.GetNameNoTooltip],"
 ep3_governor_yearly.3003.desc_accused_of_crime: "Estou horrorizado ao saber que você está aterrorizando pequenos proprietários inocentes! Minhas #EMP muitas#! testemunhas dizem que você — entre outros erros — mandou crianças cuspirem em viúvas? Roubou cães? Derramou água pelas chaminés? E tudo isso só para comprar algumas pastagens ressecadas!\n\nSua violação da lei foi, infelizmente, notada e tornada pública... Temo que você possa ouvir mais sobre isso."
 ep3_governor_yearly.3003.desc_force_used: "Fale com seus novos inquilinos. Diga a eles que seus impostos sobre a terra ainda são devidos, seu serviço em guerra ainda é obrigatório. Quando meus soldados chegarem, não os impeça.\n\nA lei diz que agora você é proprietário das terras. As pessoas, no entanto, são #EMP minhas#!."
 ep3_governor_yearly.3003.desc_scandal: "Você pode pensar que sou um incompetente, que não tenho quase nenhuma preocupação com o bem-estar de [target_theme.GetNameNoTier], mas é #EMP você#! quem desafia a tradição para chamar tanto disso de seu — que vergonha!\n\nVocê verá que sua avareza se tornou um assunto favorito de conversa em [governor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTier]. Infelizmente, isso é bem merecido."
 ep3_governor_yearly.3003.desc_backs_down: "Parabenizo você por suas novas aquisições! Belas vilas com gente sensata — é um bom país que você possui!\n\nSim, alguns podem reclamar sobre antigas leis feitas para limitá-lo: eles torcem as mãos sobre o futuro de [root_domicile_province.GetTitle.GetNameNoTier]... mas a sua, uma mão sábia e firme, é a melhor para brandir o cetro!"
 ep3_governor_yearly.3003.a_accused_of_crime: "Acusações falsas! E ainda assim — #EMP eles vieram pelas minhas terras?!?#!"
 ep3_governor_yearly.3003.a_force_used: "Isso vai enfurecer meus inquilinos! Isso os empobrecerá!"
 ep3_governor_yearly.3003.a_scandal: "Pode prejudicar minha reputação… mas não minhas propriedades!"
 ep3_governor_yearly.3003.a_backs_down: "![governor.Custom('ES_ElLa')|U] [governor.GetTitleAsNameNoTooltip|l] recua! Tudo é meu com segurança."
 ep3_governor_yearly.3010.t: "Ainda assim, [emperor.Custom('ES_ElLa')] [emperor.GetTitleAsNameNoTooltip|l] luta"
 ep3_governor_yearly.3010.desc: "Já há anos que as forças [emperor.Custom('ES_DelDela')] [emperor.GetTitledFirstName|l]"
 ep3_governor_yearly.3010.desc_attacker: "empreendem uma [war.Custom('WarCasusBelliShort')|l] contra [foe.GetName].\n\nNas províncias, ouvimos histórias de cercos breves e batalhas indecisas travadas até finais confusos e sangrentos… Debatemos sobre sonhos de conquistas estrangeiras, os sonhos que persegue noss[emperor.Custom('ES_OA')] [emperor.GetTitleAsNameNoTooltip|l]."
 ep3_governor_yearly.3010.desc_defender: "defendido contra a [war.Custom('WarCasusBelliShort')|l] de [foe.GetName].\n\nNas províncias, ouvimos contos de cercos tensos, de batalhas incertas lutadas até finais confusos e sangrentos... sussurramos sobre o ataque do inimigo e nos preocupamos com os subjugados e os mortos."
 ep3_governor_yearly.3010.desc_mid: "A fé do povo vacila."
 ep3_governor_yearly.3010.desc_winning: "\n\nSim, segundo todos os relatos, a luta vai bem… mas, por [ROOT.Char.GetFaith.HighGodName], como o avanço de [emperor.Custom('ES_DelDela')] [emperor.GetTitleAsNameNoTooltip|l] é lento!"
 ep3_governor_yearly.3010.desc_losing: "\n\n[ROOT.Char.GetFaith.HighGodName] não favoreceu [emperor.Custom('ES_AlAla')] [emperor.GetTitleAsNameNoTooltip|l]. Segundo todos os relatos, seus exércitos caminham rumo à derrota."
 ep3_governor_yearly.3010.desc_middling: "\n\nO favor de [ROOT.Char.GetFaith.HighGodNamePossessive] continua indescritível; não parece haver fim para a luta à vista."
 ep3_governor_yearly.3010.a: "Eu, como soldad[ROOT.Char.Custom('ES_OA')] leal, marcharei para a frente!"
 ep3_governor_yearly.3010.a.flavor: "E um [Select_CString(ROOT.Char.IsFemale, 'una soldado', 'un soldado' )] leal e generos[ROOT.Char.Custom('ES_OA')] não deveria sentir o calor da estima de seu comandante...?"
 ep3_governor_yearly.3010.a.success: "[emperor.Custom('ES_ElLa')|U] [emperor.GetTitleAsNameNoTooltip|l] aceita sua ajuda"
 ep3_governor_yearly.3010.a.fail: "[emperor.Custom('ES_AlAla')|U] [emperor.GetTitleAsNameNoTooltip|l] não se interessa"
 ep3_governor_yearly.3010.b: "Um #EMP governante forte#! poderia ter acabado com isso."
 ep3_governor_yearly.3010.b.flavor: "O reino não deveria buscar um mestre que não vacila e fracassa?"
 ep3_governor_yearly.3010.c: "As províncias estão tão longe da mente [emperor.Custom('ES_DelDela')] [emperor.GetTitleAsNameNoTooltip|l]…"
 ep3_governor_yearly.3010.c.flavor: "… e são tão suscetíveis às minhas maquinações."
 ep3_governor_yearly.3010.d: "Uma doação piedosa, uma oração em seu nome."
 ep3_exploited_weak_master_modifier: "Soberano Enfraquecido Explorado"
 ep3_exploited_weak_master_modifier_desc: "Enquanto seu soberano estava envolvido na guerra, este governador desviou fundos e reorganizou o governo local para fins egoístas."
 msg_claimed_weak_emperors_title.t: "[ROOT.Char.GetTitleAsNameNoTooltip] Desafia o Governo"
 msg_claimed_weak_emperors_title.flavor: "Deplorando sua longa guerra, a plebe aclama uma figura mais decisiva."
 msg_claimed_weak_emperors_title.t.2: "Membro da Fação Condena a Guerra"
 msg_claimed_weak_emperors_title.flavor.2: "Sua guerra prolongada contra [foe.GetName] dá credibilidade a seus detratores."
 decried_weakness_score_desc: "Fraqueza Imperial Deplorada"
 governor_challenges_weakness_candidate_score: "A [candidate_score|lE] de [Select_CString( ROOT.Char.IsLocalPlayer, 'você', ROOT.Char.GetShortUIName )] para [emperor.GetPrimaryTitle.GetName] aumenta em #P 20#!"
 ep3_governor_yearly.3011.opening: "[Select_CString(emperor.IsFemale, 'Soberana mía', 'Soberano mío' )], eminentíssimo[emperor.Custom('ES_OA')] [emperor.GetTitleAsName|l],"
 ep3_governor_yearly.3011.desc: "Nossos exércitos lutam há muito contra [foe.GetName], e ainda não temos nenhum triunfo para proclamar.\n\nSe eu emprestar minhas tropas domésticas, meus fundos pessoais, à sua causa - tal serviço leal seria devidamente apreciado?"
 ep3_governor_yearly.3011.a: "Qualquer coisa para ver meus inimigos derrotados de uma vez por todas!"
 ep3_governor_yearly.3011.b: "[governor.Custom('ES_ElLa')|U] [governor.GetTitledFirstName|l] dificilmente ? [Select_CString(governor.IsFemale, 'uma aliada', 'um aliado' )] que valha a pena ter..."
 ep3_governor_yearly.3012.opening: "?, valente ministr[ROOT.Char.Custom('ES_OA')] de [ROOT.Char.GetPrimaryTitle.GetNameNoTier],"
 ep3_governor_yearly.3012.desc_fail: "Deixando de lado as condições absurdas da sua oferta, sua força militar não é tão necessária.\n\nVocês ainda podem sonhar em se juntar a [Select_CString(emperor.IsFemale, 'vuestra emperatriz', 'vuestro emperador' )] no estrondo da guerra, mas se a ambição é a única coisa que os guia, melhor será saborear a doce música de seu pacífico idílio."
 ep3_governor_yearly.3012.desc_success: "Aceito sua oferta. Aguardamos o novo vigor de seus soldados na cansada linha de batalha.\n\nPor sua coragem, sua generosidade de espírito, sua constância, poucas recompensas terrenas são iguais."
 ep3_governor_yearly.3012.kyrie_eleison: "[Glossary( '¡Kýrie, eléison!', 'KYRIE_ELEISON_GLOSS' )]"
 ep3_emperor_yearly.3011.a_to_war: "Um oficial [emperor.GetPrimaryTitle.GetAdjectiveNoTooltip] entra na luta!"
 ep3_emperor_yearly.3011.a_no_war: "#EMP Tan solo#! desejava servir a noss[emperor.Custom('ES_OA')] [emperor.GetTitleAsNameNoTooltip|l]…"
 ep3_governor_yearly.3020.t: "E [ROOT.Char.GetFaith.HighGodName] [emperor.GetHerHim] nomeou… [emperor.GetSheHe]?"
 ep3_governor_yearly.3020.desc: "[emperor.Custom('ES_ElLa')|U] [emperor.GetTitleAsName|l] [target_trait.GetNameNoTooltip( GetNullCharacter )|l] que nos governa costuma ser objeto de conversas em voz baixa."
 ep3_governor_yearly.3020.desc_physical: "\n\nPode o nosso domínio permanecer unido enquanto sua manifestação em carne e osso estiver deformada? Será que o semblante arruinado [emperor.Custom('ES_DelDela')] [emperor.GetTitledFirstNameNoTooltip|l] será estampado em novas moedas? E —só de pensar nisso, estremeço— os soberanos escolhidos [ROOT.Char.GetFaith.HighGodNameAlternatePossessive] serão de agora em diante aleijados miseráveis?\n\nNão, est[emperor.Custom('ES_EA')] [emperor.GetTitleAsName|l], com seu caráter [target_trait.GetNameNoTooltip( GetNullCharacter )|l], não é digno da púrpura…"
 ep3_governor_yearly.3020.desc_crime: "\n\nSomos realmente o mais abençoado dos reinos quando somos governados por um[emperor.Custom('ES_XA')] vil delinquente, um[emperor.Custom('ES_XA')] pecador[emperor.Custom('ES_XA')] que infringe os preceitos de [ROOT.Char.GetFaith.HighGodNameAlternate]? Quantas mais de nossas leis serão escritas por mãos tão manchadas?\n\nNoss[emperor.Custom('ES_OA')] [Select_CString(emperor.IsFemale, 'ama y señora', 'amo y señor' )] de caráter [target_trait.GetNameNoTooltip( GetNullCharacter )|l], senta-se no trono mais alto; #EMP ¡es la máxima humillación!#!. Uma pessoa de status inferior já teria sido executada há muito tempo…"
 ep3_governor_yearly.3020.a: "A desobediência cresce melhor no escuro..."
 ep3_governor_yearly.3020.a.flavor: "E todos os sussurros de indignidade imperial devem voltar para mim."
 ep3_governor_yearly.3020.a.success: "Os fofoqueiros prestam atenção ao seu discurso virulento"
 ep3_governor_yearly.3020.a.fail: "Suas farpas não intrigam ninguém"
 ep3_governor_yearly.3020.b: "Devo escrever uma carta de condenação!"
 ep3_governor_yearly.3020.flavor: "Pois esta marca de desaprovação [ROOT.Char.GetFaith.HighGodNameAlternatePossessive] não é apenas uma mancha para [emperor.Custom('ES_ElLa')] [emperor.GetTitleAsNameNoTooltip|l], mas para o reino!"
 ep3_governor_yearly.3020.c: "Trabalhos diligentes me impedirão de pensar nisso."
 governor_insulted_imperial_trait_candidate_score: "O [candidate_score|lE] de [Select_CString( ROOT.Char.IsLocalPlayer, 'você', ROOT.Char.GetShortUIName )] para [emperor.GetPrimaryTitle.GetName] aumenta em [EmptyScope.ScriptValue('appointment_score_minor_value')|P0]"
 insulted_trait_score_desc: "Condenou o [trait|E] Indigno de [liege|lE]"
 msg_unflattering_imperial_trait_gossip.t: "Fofoqueiro Escandaloso"
 msg_unflattering_imperial_trait_gossip.flavor: "Rumores perigosos abundam: seus ministros ressentem-se de seu [target_trait.GetName( GetNullCharacter )|l] [emperor.GetTitleAsNameNoTooltip|l]."
 ep3_governor_yearly.3021.opening: "Meu [emperor.GetTitleAsNameNoTooltip|l],"
 ep3_governor_yearly.3021.desc_physical: "Sabeis bem que os [minister.GetCulture.GetCollectiveNoun] ficamos aterrorizados quando um corpo mutilado se senta no trono do soberano perfeito [minister.GetFaith.HighGodNamePossessive].\n\n! Devo exortar-vos a vós, nuestr[emperor.Custom('ES_OA')] [emperor.GetTitleAsNameNoTooltip|l] de caráter [target_trait.GetNameNoTooltip( GetNullCharacter )|l], que supliqueis a proteção de [minister.GetFaith.HighGodNameAlternate]! Só mediante a clemência divina poderemos superar estes tempos tão aberrantes."
 ep3_governor_yearly.3021.desc_crime: "Temo que sua natureza pecaminosa coloque seu domínio em perigo. [emperor.GetTitleAsNameNoTooltip] de caráter [target_trait.GetNameNoTooltip( GetNullCharacter )|l], exorto-vos, diante de todo o reino, a buscar a absolvição de [minister.GetFaith.HighGodNameAlternate].\n\nQuanto tempo uma alma pode suportar a podridão do pecado? E quanto mais nós, os potentados, poderemos suportar a mancha de vossas tropelias?"
 ep3_governor_yearly.3021.a: "Imperfeito como sou, juro lutar pelo meu povo."
 ep3_governor_yearly.3021.b: "Impertinência!"
 ep3_governor_yearly.3021.bad_trait: "@warning_icon! #X Isso aconteceu por causa do seu [target_trait.GetName( GetNullCharacter )|l] [trait|lE]#!"
 ep3_governor_yearly.3021.a.flavor: "Por um tempo, pelo menos, os piedosos podem me perdoar e deixar isso escapar de suas mentes..."
 emperor_repented_for_flaws_modifier: "Arrependido pelas Falhas Imperiais"
 emperor_repented_for_flaws_modifier_desc: "Embora este personagem não seja totalmente digno de um alto cargo, ele se esforçou publicamente para se absolver disso."
 ep3_governor_yearly.3021.blocker: "Você não receberá este evento por pelo menos #high 10 anos#!"
 ep3_governor_yearly.3030.t: "Tempos Tranquilos"
 ep3_governor_yearly.3030.desc_christian: "\"Bem-aventurados os pacificadores!\", escreveu São Mateus e, certamente, assim transmitiu a verdade do Senhor.\n\n[emperor.GetPrimaryTitle.GetDefinitiveName] e minha [ROOT.Char.GetPrimaryTitle.GetNameNoTier] conhecem a paz de Cristo há anos."
 ep3_governor_yearly.3030.desc_generic: "[emperor.GetPrimaryTitle.GetDefinitiveName] e meu [ROOT.Char.GetPrimaryTitle.GetNameNoTier] vivem em paz há anos.\n\n"
 ep3_governor_yearly.3030.desc: "O gado engorda nos campos. Os jovens, sem serem afetados pelos deveres marciais, deitam-se a se bronzear na relva. Em nossas cidades felizes, os comerciantes operam livremente e os ministros cuidam de assuntos de interesse público.\n\nNão deverá meu reinado e o [emperor.Custom('ES_DelDela')] [emperor.GetTitledFirstName|l] não conhecer grandes feitos gloriosos? Apenas isto… contentamento?"
 ep3_governor_yearly.3030.a: "O idílio pacífico nos tornou #EMP fracos!#!"
 ep3_governor_yearly.3030.a.flavor: "Aventurar-se além da fronteira, com aço na mão — isso despertará minhas tropas!"
 ep3_governor_yearly.3030.b: "Não planejo para a guerra, mas para a prosperidade."
