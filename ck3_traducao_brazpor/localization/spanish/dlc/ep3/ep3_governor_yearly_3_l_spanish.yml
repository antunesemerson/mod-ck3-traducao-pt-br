 msg_governor_compliments_legitimacy.t: "[root_scope.GetTitleAsNameNoTooltip] Admira a Legitimidade"
 ep3_neglecting_house_head_duties_modifier: "Negligenciando Deveres Ministeriais"
 ep3_neglecting_house_head_duties_modifier_desc: "Nem agradando aos parentes, nem ao mestre, este personagem passa as horas frutíferas do dia entre conspiradores e escaladores sociais."
 ep3_governor_yearly_3050_neglect_duties_tooltip: "Você perde #N -5%#! de [governor_efficiency|lE] por #high 10 anos#!"
 ep3_governor_yearly_3050_factions_emp_tooltip: "Outros [vassals|lE] têm mais probabilidade de se juntar a [factions|lE] que incluem [root_scope.GetShortUIName]"
 msg_governor_challenging_illegitimacy.t: "[root_scope.GetTitleAsNameNoTooltip] Desleal Ganha Suporte"
 msg_governor_challenging_illegitimacy.desc: "[root_scope.GetName] e seus apoiadores condenam sua escassa [legitimacy|lE]."
 msg_governor_supports_rule.t: "[root_scope.GetTitleAsNameNoTooltip] Defende Seu Mandato"
 msg_governor_supports_rule.desc: "[root_scope.GetName|V] defende publicamente você contra aqueles que falam sobre sua ilegitimidade."
 ep3_governor_yearly.3050.t: "Um dos Demônios Menores de [ROOT.Char.GetFaith.NegativeAfterLife|U]"
 ep3_governor_yearly.3050.desc: "Estranhas notícias abundam sobre [emperor.FullNameNoTooltip], noss[emperor.Custom('ES_OA')] [emperor.GetTitleAsNameNoTooltip|l], que vacila à beira de seu trono."
 ep3_governor_yearly.3050.mess: "\n\nChegou um vendedor de curativos falando de… encomendas impiedosas feitas a ele pelo palácio. Olhos de lagosta, unhas de crianças, poções de mandrágora e piche — tudo para que [emperor.Custom('ES_ElLa')] [emperor.GetTitleAsNameNoTooltip|l] se enfiasse em suas fauces balbuciantes! A besta se arrasta pelo palácio, nua, pintad[emperor.Custom('ES_OA')], pintad[emperor.Custom('ES_OA')] com suas estranhas medicinas e amaldiçoando o nome de [emperor.GetFaith.HighGodName]."
 ep3_governor_yearly.3050.shiftless: "\n\nOs servos que fugiram de seu serviço nos descrevem uma extensão tártara, com um aroma pungente de perfume velho… [emperor.Custom('ES_ElLa')|U] [emperor.GetTitleAsNameNoTooltip|l] passa horas deitado na escuridão, suplicante sob uma #EMP criatura#! sussurrante de membros longos. Quando seus ministros chamam, [emperor.GetFirstNameNoTooltip] mal se move… mas quando o diabo move seus lábios grossos, [emperor.Custom('ES_ElLa')] [emperor.GetTitleAsNameNoTooltip|l] pede aos gritos por alívio, vinho e bolos."
 ep3_governor_yearly.3050.coward: "\n\nSeus próprios parentes sussurram esta história de família. Em sua terra natal, uma mulher santa foi violentada e, quando chegou sua maturidade, o que saiu não foi uma criança, mas… #EMP un revoltijo de gusanos.#! Um destes nojentos vermes foi devorado por um rato, o rato por uma gaivota, e a gaivota por [emperor.GetFirstNameNoTooltip] em pessoa. Agora [emperor.Custom('ES_ElLa')] [emperor.GetTitleAsNameNoTooltip|l] treme e chora — até mesmo diante do chilrear de um arganaz!"
 ep3_governor_yearly.3050.cruel: "\n\nUma dama de sua corte jura que [emperor.GetHerHim] o viu nos jardins à noite… #EMP ¡bebiendo la sangre de un gato callejero!#! Sob o pelo rasgado que enfeitava a coroa, o rosto cruel de [emperor.GetFirstNameNoTooltip] rosnava e cuspia sangue. Então, fugiu, carregado por cima do muro do jardim por dois espectros com asas de morcego!"
 ep3_governor_yearly.3050.generic_bad: "\n\nMoços e servas sussurram que, na verdade, [emperor.GetFirstNameNoTooltip] #EMP nació del ano de [ROOT.Char.GetFaith.DevilName]#!. ¡[emperor.Custom('ES_ElLa')|U] [emperor.GetTitleAsNameNoTooltip|l], um[emperor.Custom('ES_XA')] nativ[emperor.Custom('ES_OA')] de [ROOT.Char.GetFaith.NegativeAfterLife|U]! ¡Es[emperor.Custom('ES_EA')] farsante se arrastou desde os fossos malditos até as alcovas do palácio e se insinuou na pele de noss[emperor.Custom('ES_OA')] legítim[emperor.Custom('ES_OA')] [emperor.GetTitleAsNameNoTooltip|l]!"
 ep3_governor_yearly.3050.outro: "\n\nTais notícias imundas sempre escorrem da corte de [emperor.GetFirstNameNoTooltip]."
 ep3_governor_yearly.3050.a: "#EMP DEMÔNIO!#!"
 ep3_governor_yearly.3050.b: "Por que responder a este desgraçado... e não a mim?"
 ep3_governor_yearly.3050.c: "#EMP Silencio!#! Ninguém caluniará meu [emperor.GetTitleAsNameNoTooltip|l]!"
 ep3_governor_yearly.3050.c.flavor: "Deixe claro: considero aqueles que espalham essas mentiras absurdas completamente desprezíveis!"
 ep3_governor_yearly.3050.d: "O infortúnio do dever é o ganho do político."
 ep3_governor_yearly.3060.t: "Uma Coroação Resplandecente"
 ep3_governor_yearly.3060.t_regent: "Uma confirmação resplandecente"
 ep3_governor_yearly.3060.intro_regent: "A política palaciana se move devagar… na maior parte do tempo. [previous_holder.Custom('ES_ElLa')|U] [previous_holder.GetTitledFirstNameRegnal|l] já não administra [emperor.Custom('ES_AlAla')] [emperor.GetPrimaryTitle.GetTierAsNameNoTooltip|l]."
 ep3_governor_yearly.3060.intro_usurper: "A coroa foi arrancada das têmporas de noss[previous_holder.Custom('ES_OA')] anterior soberan[previous_holder.Custom('ES_OA')]; [previous_holder.GetTitledFirstNameRegnal] já não reina sobre [emperor.GetPrimaryTitle.GetTierAsName]."
 ep3_governor_yearly.3060.intro_deceased: "[Select_CString( previous_holder.IsFemale, 'La guardiana', 'El guardián' )] do [emperor.GetPrimaryTitle.GetTierAsName], [Select_CString( previous_holder.IsFemale, 'nuestra pastora', 'nuestro pastor' )] e soberan[previous_holder.Custom('ES_OA')], abandonou este mundo mortal. [previous_holder.GetTitledFirstNameRegnal] está morto."
 ep3_governor_yearly.3060.desc_regent: "\n\nNo mais profundo dos salões do palácio imperial de [emperor.GetCapitalLocation.GetTitle.GetNameNoTier], os poderes foram proclamados [emperor.Custom('ES_DelDela')] nov[emperor.Custom('ES_OA')] [emperor.GetTitleAsNameNoTooltip|l] diante dos funcionários reunidos."
 ep3_governor_yearly.3060.desc_afield: "\n\nAcampados em [emp_location.GetName], entre estandartes reluzentes, ergue-se [Select_CString( emperor.IsFemale, 'uma nova', 'um novo' )] [emperor.GetTitleAsNameNoTooltip] sobre um grande escudo polido."
 ep3_governor_yearly.3060.desc_temple: "\n\nNo imponente [emperor.GetFaith.HouseOfWorship] de [emperor.GetCapitalLocation.GetTitle.GetNameNoTier], entre dignitários e prelados, [Select_CString( emperor.IsFemale, 'uma nova', 'um novo' )] [emperor.GetTitleAsNameNoTooltip] é aclamad[emperor.Custom('ES_OA')] pela primeira vez."
 ep3_governor_yearly.3060.desc_byzantine: "\n\n #EMP \"Salve, [emperor.GetFirstNameRegnal]!\"#!, exclamam os congregados. #EMP \"Pela graça de Cristo, fiel [emperor.GetTitleAsNameNoTooltip|l] e #EMP [Glossary( 'autocrátor', 'AUTOKRATOR_GLOSS')]#! dos romanos; o [emperor.GetHouse.GetName], sempre [Glossary( 'augusto', 'AUGOUSTOS_GLOSS')]!\"#!"
 ep3_governor_yearly.3060.desc_byzantine_femme: "\n\n #EMP \"Salve, [emperor.GetFirstNameRegnal]!\"#!, gritam os congregados. #EMP \"Pela graça de Cristo, fiel [emperor.GetTitleAsNameNoTooltip|l] e #EMP [Glossary( 'autocrátor', 'AUTOKRATOR_GLOSS')]#! dos romanos; a [emperor.GetHouse.GetName], sempre [Glossary( 'augusta', 'AUGOUSTOS_GLOSS')]!\"#!"
 AUGOUSTOS_GLOSS: "Um honorífico que significa 'venerável' ou 'majestoso', concedido aos sucessores do primeiro imperador de Roma. No século 7, o título grego Basileus o substituiu em importância imperial."
 AUTOKRATOR_GLOSS: "Um título grego clássico que se refere a alguém que comanda sem superiores, revivido no período bizantino médio para uso por imperadores seniores."
 ep3_governor_yearly.3060.desc_regent_acclaim: "\n\nSelos coloridos e assinaturas meticulosas cobrem rapidamente os documentos oficiais. #EMP Pelas vontades de [emperor.GetFaith.HighGodName] e de [ceremonial_liege.Custom('ES_DelDela')] [ceremonial_liege.GetTitledFirstName|l], [emperor.GetMotherFather] de [emperor.GetPrimaryTitle.GetNameNoTierNoTooltip]; muito [ceremonial_liege.Custom('FormalComplimentAdjective')] [ceremonial_liege.GetHouse.GetName]!#!."
 ep3_governor_yearly.3060.desc_generic: "\n\n #EMP Salve, [emperor.GetFirstName]!#!, gritam os reunidos. #EMP Pela vontade de [emperor.GetFaith.HighGodName], poderos[emperor.Custom('ES_OA')] [emperor.GetTitleAsNameNoTooltip|l] e [emperor.GetMotherFather] de [emperor.GetPrimaryTitle.GetNameNoTierNoTooltip]; [emperor.Custom('ES_ElLa')] muito [emperor.Custom('FormalComplimentAdjective')] [emperor.GetHouse.GetName]!#!\""
 ep3_governor_yearly.3060.desc_regent_legit: "\n\nSeus súditos rezam: #EMP Que [emperador.Custom('ES_ElLa')] [emperor.GetTitledFirstName|l] cuide do vosso governo, preserve sempre o reinado de Vossa Majestade, e a paz e a ordem de tal [emperor.GetPrimaryTitle.GetTierAsNameNoTooltip|l]!#!."
 ep3_governor_yearly.3060.desc_high_legit: "\n\nSeus súbditos rezam: #EMP [ROOT.Char.GetFaith.random_GoodGodNames], conserve o reinado de Vossa Majestade eternamente; agora e para sempre! Pelos séculos dos séculos!#!"
 ep3_governor_yearly.3060.desc_medium_legit: "\n\nMoedas cintilantes voam acima de uma procissão gloriosa! Os magistrados se curvam diante de [emperor.Custom('ES_ElLa')] [emperor.GetTitledFirstNameNoTooltip|l]… intimidados, se não leais ainda."
 ep3_governor_yearly.3060.desc_low_legit: "\n\nEnquanto os rituais de bajulação são realizados, os sussurros percorrem o reino… com que direito governa est[emperor.Custom('ES_EA')] [emperor.GetTitleAsNameNoTooltip] tão [emperor.Custom2('InsultAdjective', ROOT.Char)]?"
 ep3_governor_yearly.3060.a: "Agora, seu [emperor.Custom2('RelationToMeShort', SCOPE.sC('root_scope'))] [emperor.Custom('ES_DelDela')] [emperor.GetTitleAsNameNoTooltip|l] receberá uma recompensa!"
 ep3_governor_yearly.3060.b: "Eu devo denunciar este regime!"
 ep3_governor_yearly.3060.b.flavor: "E me preparar, nas sombras, para fazer mais do que simplesmente denunciar..."
 ep3_governor_yearly.3060.c: "Apoio publicamente [Select_CString(emperor.IsFemale, 'a nova', 'o novo' )] [emperor.GetTitleAsNameNoTooltip|l]"
 ep3_governor_yearly.3060.c.flavor_high_legit: "Quem poderia fazer algo diferente?"
 ep3_governor_yearly.3060.c.flavor_low_legit: "Embora isso só me traga ridículo."
 ep3_governor_yearly.3060.c.flavor_regent: "Quem sou eu para questionar a vontade [ceremonial_liege.Custom('ES_DelDela')] [ceremonial_liege.GetTitleAsNameNoTooltip|l]?"
 ep3_governor_yearly.3060.c.flavor_med_legit: "Tal lealdade é esperada."
 ep3_governor_yearly.3060.d: "Tenho poucas opiniões sobre meu novo soberano."
 ep3_governor_yearly.3060.d.regent: "Poucas opiniões tenho sobre o novo regente."
 admin_coronation_still_req_tt: "[emperor.GetShortUIName] conquistou [emperor.GetPrimaryTitle.GetName], mas mantém a [law|lE] [law_i] [GetLaw('uncrowned').GetName] até que realize uma [coronation|lE]"
 ep3_head_of_opposition_modifier: "Centro de Oposição"
 ep3_head_of_opposition_modifier_desc: "Os detratores de um soberano poderoso se aglomeram em torno deste personagem; eles são um conhecido campeão dos descontentes."
 ep3_succession_low_legitimacy_tooltip: "#low Los efectos se han visto alterados por la escasa [legitimacy|lE] [emperor.Custom('ES_DelDela')] [emperor.GetTitleAsName|l]#!"
 ep3_succession_high_legitimacy_tooltip: "#low Los efectos se han visto alterados por la mucha [legitimacy|lE] [emperor.Custom('ES_DelDela')] [emperor.GetTitleAsName|l]#!"
 ep3_governor_yearly.3070.t: "Uma Língua Bem Viajada"
 ep3_governor_yearly.3070.intro: "Meu senhor[liege.Custom('ES_XA')], que frequenta a corte [liege.Custom('ES_DelDela')] [liege.GetTitledFirstName|l], é famoso por testar as estradas de [liege.GetPrimaryTitle.GetTierAsName]. O/A [root_capital.GetTerrain.GetNameNoTooltip|l] que rodeia"
 ep3_governor_yearly.3070.landed: "minha capital fica bastante distante... mas, ainda assim, o imprudente [racer.Custom('ES_ElLa')] imprudente[racer.Custom('ES_OA')] agora"
 ep3_governor_yearly.3070.unlanded: "a propriedade da minha família fica bastante longe, mas, não obstante, [racer.Custom('ES_ElLa')] temerári[racer.Custom('ES_OA')] já"
 ep3_governor_yearly.3070.chariot: "corre com seu distinto carro por [root_capital.GetName]."
 ep3_governor_yearly.3070.horse: "galopa impetuosamente por [root_capital.GetName]."
 ep3_governor_yearly.3070.desc: "\n\n«Vocês chegaram a viver #EMP aquí?!?#!», debocha [racer.GetSheHe]. «Não me surpreende que [liege.Custom('ES_ElLa')] [liege.GetTitleAsNameNoTooltip|l] não se lembre do vosso nome… Na verdade, me surpreende que alguma palavra, qualquer viajante de [liege.GetCapitalLocation.GetTitle.GetNameNoTier] sobreviva à viagem!»"
 ep3_governor_yearly.3070.a: "As perspectivas abundam aqui! Não vamos a lugar nenhum."
 ep3_governor_yearly.3070.b: "Arrumem as malas, família: estamos nos mudando para a capital."
 ep3_governor_yearly.3070.c: "\"Você vê o meu problema... agora me ajude.\""
 ep3_governor_yearly.3070.c.flavor: "Esta criatura do palácio deve ter laços influentes — laços que poderiam me ligar a uma posição melhor."
 ep3_governor_yearly.3070.d: "A jornada é dura? Eu cuidarei das estradas."
 ep3_governor_yearly.3070.d.success: "A construção de estradas fomenta a conexão com a capital"
 ep3_governor_yearly.3070.d.fail: "Os construtores de estradas enfrentam mil dilemas"
 ep3_governor_yearly.3070.e: "Adoro estas terras pitorescas."
