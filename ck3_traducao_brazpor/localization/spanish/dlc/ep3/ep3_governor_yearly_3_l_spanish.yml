 ep3_governor_yearly.3040.t_greek: "[emperor.GetTitleAsNameNoTooltip] Autokrator!"
 ep3_governor_yearly.3040.t: "[emperor.Custom('ES_ElLa')|U] [emperor.GetTitleAsNameNoTooltip|l] mais perfeit[emperor.Custom('ES_OA')]"
 ep3_governor_yearly.3040.desc: "Estou começando a ter dificuldade para lembrar — será que [emperor.GetPrimaryTitle.GetName] eram apenas trevas e desordem absoluta antes de que [emperor.Custom('ES_ElLa')] [emperor.GetTitledFirstName|l] empunhasse seu cetro?\n\nAs pessoas da corte sonhavam com algo além de compartilhar a companhia da [emperor.GetHouse.GetName]? Será que nossos soldados chegaram a entoar o nome de algum estranho feio e disforme? Será que nossos magnatas chegaram a beijar pés não moldados na carne perfeita de [emperor.Custom('ES_DelDela')] [emperor.GetTitleAsNameNoTooltip|l] [ROOT.Char.GetFaith.HighGodNamePossessive]?\n\nNa verdade, não preciso me lembrar. Questionar dessa forma a legitimidade infalível de minha soberan[emperor.Custom('ES_OA')] seria inútil."
 ep3_governor_yearly.3040.a: "Devo entrelaçar minha família com sua augusta parentela!"
 ep3_governor_yearly.3040.a.flavor: "Tal piedade filial só poderia nos fortalecer ambos."
 ep3_governor_yearly.3040.b: "Pode que [emperor.Custom('ES_ElLa')] poderos[emperor.Custom('ES_OA')] [emperor.GetTitleAsNameNoTooltip|l] não precise da minha ajuda…"
 ep3_governor_yearly.3040.b.flavor: "… mas os aspirantes da Casa [emperor.GetHouse.GetNameNoTooltip] não estão tão seguros assim."
 ep3_governor_yearly.3040.c: "#EMP Eu#! devo ser tão imutável."
 ep3_governor_yearly.3040.c.flavor: "Não dependo da força do meu senhor[emperor.Custom('ES_XA')], mas de tropas robustas e do vigor local!"
 ep3_governor_yearly.3040.d: "Os recrutas clamam para lutar em nome dele!"
 ep3_governor_yearly.3040.d.flavor: "E eu os alistarei com prazer."
