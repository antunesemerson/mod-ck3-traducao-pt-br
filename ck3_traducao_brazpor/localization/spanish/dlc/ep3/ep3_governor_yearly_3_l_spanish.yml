 ep3_governor_ignored_isolation_removal_tooltip: "Sua [governor_efficiency|lE] foi #P restaurada#!"
 ep3_face_of_empire_modifier: "Braço da Administração"
 ep3_face_of_empire_modifier_desc: "Usando a força da devoção deste personagem, o reino se estende além de seu núcleo obediente."
 ep3_anxious_for_new_assignment_tooltip: "Você perde #N -5%#! [governor_efficiency|lE] por #high 5 anos#!"
 ep3_anxious_for_new_assignment_desc: "#weak [governor_efficiency|E]: #N -5%#!#!"
 ep3_governor_yearly.3080.t: "Tomado por [root_capital.GetTerrain.GetNameNoTooltip]"
 ep3_governor_yearly.3080.t_sea: "Tomado pelo Mar"
 ep3_governor_yearly.3080.intro: "Muitos dias de viagem separam [root_capital.GetName], meu quartel-general, de [liege.GetCapitalLocation.GetTitle.GetNameNoTier]."
 ep3_governor_yearly.3080.desc_faction: "Ainda assim, meu relatório sobre a [rebel_faction.GetName] que está se reunindo já deveria ter chegado a [liege.Custom('ES_AlAla')] [liege.GetTitledFirstName|l] há muito tempo!\n\n“Todos os exércitos da capital e nem um único soldado sobrando...”, preocupa-se [captain.GetName] , meu oficial. “Nenhum soldado sai vivo ao cruzar com os rebeldes...”\n\nEm meu posto distante ardem os fogos do descontentamento. E, sem novas tropas, eles só podem queimar com mais intensidade."
 ep3_governor_yearly.3080.desc: "Há muito espero a chegada de bens de luxo, de soldos, necessários para manter a lealdade do país [ROOT.Char.GetPrimaryTitle.GetAdjective]. Mas nada vem [liege.Custom('ES_DelDela')] de [liege.GetTitledFirstName|l].\n\n\"Devem ter se perdido em algum lugar\", supõe meu oficial, [captain.GetName], \"Presos por fora-da-lei? Extraviados em algum lugar áspero? Talvez os produtos tenham sido vendidos aos locais?\".\n\nSeja como for… mal consigo impor a grandeza [liege.GetPrimaryTitle.GetAdjective] sendo uma espécie de miserável marginal em uma terra distante."
 ep3_governor_yearly.3080.a: "Devemos, lentamente, construir a autossuficiência."
 ep3_governor_yearly.3080.b: "[ROOT.Char.GetFaith.HighGodName], me tire deste #EMP amaldiçoado#! compromisso!"
 ep3_governor_yearly.3080.c: "Venha, [captain.GetFirstNameNoTooltip]: nós lidaremos com eles ourselves."
 ep3_governor_yearly.3080.c.success: "Os rebeldes foram dominados"
 ep3_governor_yearly.3080.c.fail: "As relações permanecem... tensas"
 ep3_governor_yearly.3080.c.crit_fail: "Sua força é emboscada e dizimada"
 ep3_governor_yearly.3080.d: "Venha, [captain.GetFirstNameNoTooltip]: vamos recuperar o que foi perdido."
 ep3_governor_yearly.3080.d.success: "Os suprimentos são rapidamente garantidos"
 ep3_governor_yearly.3080.d.fail: "Nada é encontrado"
 ep3_governor_yearly.3080.d.crit_fail: "Perseguições, debacles... e ainda nada"
 ep3_governor_yearly.3080.e: "Tenho certeza de que tudo ficará #EMP bem.#!"
 ep3_anxious_for_new_assignment_modifier: "Ansioso por Nova Designação"
 ep3_anxious_for_new_assignment_modifier_desc: "Este funcionário é definido por uma poderosa sede de fama, influência... tudo, menos a sujeira de governar.\n[governor_efficiency|E] : #N -5 % @governor_efficiency!#!"
 ep3_invested_in_power_center_modifier: "Investimentos Prósperos"
 ep3_invested_in_power_center_modifier_desc: "Esta família se cerca de propriedades prósperas."
 ep3_cosmopolitan_domicile_modifier: "Propriedade Cosmopolita"
 ep3_cosmopolitan_domicile_modifier_desc: "A propriedade desta família é um centro de influência política e fiscal."
 custom.every_realm_vassal_local_estate: "Cada [vassal|lE] colega cuja [domicile|lE] está em seu [domain|lE]"
 custom.every_vassal_same_domicile_location: "Cada [vassal|lE] colega compartilhando sua localização [domicile|lE]"
 ep3_governor_yearly.3090.t: "O Coração de [liege.GetPrimaryTitle.GetNameNoTierNoTooltip]"
 ep3_governor_yearly.3090.desc: "Tenho visto soldados arrastarem-se desanimados rumo à fronteira. Ouvi oficiais, temendo a distância de suas designações, lamentarem as canções estrangeiras grosseiras e os jantares ásperos e sem graça…\n\nem [root_capital.GetName], nada disso me diz respeito. Os assuntos do [liege.GetPrimaryTitle.GetTierAsName] em si fluem por minhas"
 ep3_governor_yearly.3090.landed: "meu [ROOT.Char.GetPrimaryTitle.GetTierAsName]; comercializamos produtos reais, mantemos contatos com o palácio [liege.Custom('ES_DelDela')] [liege.GetTitleAsName|l] e influenciamos fortemente a política do reino.\n\nQue bom é servir no coração dessa grande e próspera entidade."
 ep3_governor_yearly.3090.unlanded: "portas da propriedade — entrando, claro, apenas com cortesia refinada. Assim, meus parentes nunca estão longe dos negócios do reino.\n\nQuão bom é viver no coração dessa grande e próspera entidade."
 ep3_governor_yearly.3090.a: "Eu poderia intermediar o acesso aos salões do poder..."
 ep3_governor_yearly.3090.a.flavor: "… mas aqueles com menos conexões deverão me pagar um preço alto."
 ep3_governor_yearly.3090.b: "Seria sábio expandir nossos investimentos locais."
 ep3_governor_yearly.3090.c: "Estou a fim de uma festa de jantar!"
 ep3_governor_yearly.3090.c.flavor: "Com convidados locais de importância política, claro!"
 ep3_ignoring_realm_decline_modifier: "Ignorando os Problemas do Reino"
 ep3_ignoring_realm_decline_modifier_desc: "Em resposta à má gestão do reino... este personagem está se distanciando emocionalmente."
 ep3_ignoring_realm_decline_tooltip: "#weak [governor_efficiency|E]: #N -5%#!#!"
 ep3_ignoring_realm_decline_years_tooltip: "Você perde #N -5%#! [governor_efficiency|lE] por #high 10 anos#!"
 ep3_following_governorship_example_tooltip: "Cada [vassal|lE] de [liege.GetShortUIName] ganha #high 10#! [trait_level_track_xp|lE] no [GetTrait('governor').GetName( root_scope )|l] [trait|lE]"
 ep3_governor_yearly.3100.t: "Nosso [liege.GetPrimaryTitle.GetTierAsNameNoTooltip], Pandemonium"
 ep3_governor_yearly.3100.intro_liege: "Agora decreta #EMP o quê#!?, digo ofegante. #EMP O que me ordena [Select_CString( liege.IsFemale, 'nossa senhora', 'nosso senhor' )]?!?#!."
 ep3_governor_yearly.3100.intro_governors: "\"Esses ministros inúteis se recusam a #EMP o quê?#!\", eu gaguejo. #EMP \"O que não fariam por [Select_CString( liege.IsFemale, 'nossa senhora', 'nosso senhor' )]?!?\"#!"
 ep3_governor_yearly.3100.desc: "\n\n[messenger.GetFirstName], [Select_CString( messenger.IsFemale, 'una enviada', 'un enviado' )], gagueja: «[liege.Custom('ES_ElLa')|U] tão [liege.Custom('FormalComplimentAdjective')] e constante [liege.GetTitledFirstNameRegnal|l], tendo em vista a saúde de seu [liege.GetPrimaryTitle.GetTierAsName], ordena que sejam taxados todos os trabalhadores, todos os servos…»\n\nNão posso mais ouvir."
 ep3_governor_yearly.3100.desc_liege_debt: "Essa espécie de [liege.Custom2('InsultNoun', ROOT.Char)] e seus comparsas endinheirados e vestidos de caxemira já drenaram [liege.GetPrimaryTitle.GetNameNoTierNoTooltip] de toda riqueza! Com seus novos esquemas, eles só passarão fome e se arruinarão…"
 ep3_governor_yearly.3100.desc_liege_skill: "[liege.Custom('quirk_neg_adverb')|U], essa espécie de [liege.Custom2('InsultNoun', ROOT.Char)] volta-se para nós, os ministros, em busca do que [liege.GetSheHe] mesm[liege.Custom('ES_OA')] não pode conseguir: os benefícios de um governo sensato!\n\nNão há esperança para [liege.GetPrimaryTitle.GetNameNoTierNoTooltip]…"
 ep3_governor_yearly.3100.desc_governors: "Que ordem tão, tão #EMP básica#!! Será que tem #EMP algo#! que negociar [liege.Custom('ES_ElLa')] [liege.GetTitleAsNameNoTooltip|l] com seus oficiais? Tudo o que faz é pisar nos frutos do senhorio?\n\n[liege.GetPrimaryTitle.GetNameNoTier] está infestado de idiotas…"
 ep3_governor_yearly.3100.a: "Parece que devo ensinar governança."
 ep3_governor_yearly.3100.b: "Meu suserano[liege.Custom('ES_XA')] deve corrigir este má administração!"
 ep3_governor_yearly.3100.b.success: "Sua carta tem uma convicção impressionante"
 ep3_governor_yearly.3100.b.fail: "[liege.Custom('ES_ElLa')] [liege.GetTitleAsNameNoTooltip|l] se ofende"
 ep3_governor_yearly.3100.c: "Do desordem vem o lucro."
 ep3_governor_yearly.3100.c.flavor: "Nestes tempos corruptos, quem notará um pouco mais de corrupção?"
 ep3_governor_yearly.3100.d: "Não posso consertar este estado miserável das coisas..."
 ep3_governor_yearly.3100.d.flavor: "Mal consigo suportar pensar nisso..."
 msg_governor_upset_about_skill.t: "[root_scope.GetTitleAsNameNoTooltip] Decreta Administração"
 msg_governor_upset_about_skill.desc: "Seu [vassal|lE] está insatisfeito com suas [skills|lE] ruins."
 msg_governor_upset_about_governance.t: "[root_scope.GetTitleAsNameNoTooltip] Denuncia o Regime"
 msg_governor_upset_about_governance.desc: "Seu [vassal|lE] está insatisfeito com suas fracas [skills|lE] ou [governor_efficiency|lE]."
 msg_governor_upset_about_insolvency.t: "[root_scope.GetTitleAsNameNoTooltip] Critica a Insolvência"
 msg_governor_upset_about_insolvency.desc: "Seu [vassal|lE] foi afetado pela sua dívida de [gold|lE]."
 msg_governor_upset_about_bad_govs.t: "[root_scope.Custom('ES_ElLa')|U] [root_scope.GetTitleAsNameNoTooltip|l] despreza os ministros incompetentes"
 msg_governor_upset_about_bad_govs.desc: "Seu [vassal|lE] reclama da baixa [governor_efficiency|lE] entre seus colegas."
