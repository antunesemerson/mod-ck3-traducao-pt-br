 #Embrace Heresy
 embrace_heresy_decision: "Desde que os antigos contrabandeavam os primeiros bichos-da-seda das terras mais remotas do Leste para Constantinopla, a fabricação e venda de seda sempre foram um monopólio imperial."
 embrace_heresy_decision_desc: "$establish_silk_production_decision_desc.boilerplate$\n\nSeria uma empreitada cara, mas poderíamos comprar uma dispensa imperial que nos permitisse estabelecer nossa própria produção de seda em nossa propriedade familiar."
 embrace_heresy_decision_tooltip: "$establish_silk_production_decision_desc.boilerplate$\n\nComo chefe da família imperial, posso conceder a mim mesmo e aos meus sucessores o privilégio de sua fabricação com apenas um gesto da mão."
