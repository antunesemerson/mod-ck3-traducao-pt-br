 #Activity Start: Liege welcomes Governor
 ep3_decisions_event.2001.opening: "Você recebe [confirmation_vassal.Custom('ES_AlAla')] [confirmation_vassal.GetTitledFirstName|l]"
 ep3_decisions_event.2001.desc: "Estou ocupado demais[ROOT.Char.Custom('ES_OA')] para #EMP ver[confirmation_vassal.GetHerHim]#!."
 ep3_decisions_event.2001.a: "Você manda [confirmation_vassal.Custom('ES_AlAla')] [confirmation_vassal.GetTitledFirstName|l]"
 ep3_decisions_event.2001.a.tt.court: "[confirmation_liege.Custom2('AppropriateGreeting', ROOT.Char )]"
 ep3_decisions_event.2001.a.tt: "Receio que estou muito ocupado para realizar uma cerimônia de confirmação neste momento. Muitas responsabilidades disputam meu tempo, como você pode entender.\n\nBoa viagem de volta para [confirmation_vassal.GetCapitalLocation.GetBaronyNameExplicitlyNoTooltip]."
 ep3_decisions_event.2001.b: "#EMP O quê?!#!"
 ep3_decisions_event.2001.b.tt: "Você manda [confirmation_vassal.Custom('ES_AlAla')] [confirmation_vassal.GetTitledFirstName|l]"
 ep3_decisions_event.2002.opening: "$admin_confirmation_event_header$ Servo do Império"
 ep3_decisions_event.2002.desc: "Os funcionários do meu palácio lotam minha [ROOT.Char.Custom('GetThroneRoom')], onde uma fila interminável de nomeados imperiais aguarda.\n\n[confirmation_vassal.Custom('ES_ElLa')|U] o mais notável de todos é [confirmation_vassal.Custom('ES_ElLa')] [confirmation_vassal.GetTitledFirstName|l] [confirmation_vassal.GetDynastyHouseName], que veio até aqui de [confirmation_vassal.GetCapitalLocation.GetNameNoTooltip]. Meu [ROOT.Char.Custom2('RelationToMeShort', confirmation_vassal)] governa seu [confirmation_vassal.GetPrimaryTitle.GetName]:"
 ep3_decisions_event.2002.a: "um centro agitado de produção e comércio,"
 #Liege Event
 ep3_decisions_event.2010.t: "uma região fronteiriça acidentada e um dos grandes bastiões do reino,"
 ep3_decisions_event.2010.desc: "uma joia do reino com muitos privilégios raros,"
 ep3_decisions_event.2010.desc_theme_civilian: "uma região costeira de estaleiros e portos,"
 ep3_decisions_event.2010.desc_theme_military: "um pequeno enclave de importação menor,"
 ep3_decisions_event.2010.desc_theme_frontier: "uma jurisdição vasta de grande importância,"
 ep3_decisions_event.2010.desc_theme_imperial: "uma região de tamanho razoável de valor multifacetado para o reino,"
 ep3_decisions_event.2010.desc_theme_naval: "lar de confiáveis, [confirmation_vassal.GetCapitalLocation.GetCounty.GetCulture.GetEthos.GetNameNoTooltip|l] [confirmation_vassal.GetCapitalLocation.GetCounty.GetCulture.GetCollectiveNoun]"
 ep3_decisions_event.2010.desc_theme_small: "lar de estranhos, [confirmation_vassal.GetCapitalLocation.GetCounty.GetCulture.GetEthos.GetNameNoTooltip|l] [confirmation_vassal.GetCapitalLocation.GetCounty.GetCulture.GetCollectiveNoun]"
 ep3_decisions_event.2010.desc_theme_big: "lar de provinciais [ROOT.Char.GetCulture.GetCollectiveNoun]"
 ep3_decisions_event.2010.desc_theme_balanced: "e adeptos da fé [ROOT.Char.GetPrimaryTitle.GetAdjective] [confirmation_vassal.GetCapitalLocation.GetCounty.GetFaith.GetName|l]"
 ep3_decisions_event.2010.desc_cool_foreigners: "os vilões pagãos [confirmation_vassal.GetCapitalLocation.GetCounty.GetFaith.GetAdherentNamePlural]!"
 ep3_decisions_event.2010.desc_weird_foreigners: "— e os [ROOT.Char.GetFaith.HouseOfWorshipPlural] de sua fé [confirmation_vassal.GetCapitalLocation.GetCounty.GetFaith.GetAdjective]."
 ep3_decisions_event.2010.desc_same_culture: "— e alguns bons [ROOT.Char.GetFaith.HouseOfWorshipPlural] da verdadeira fé [ROOT.Char.GetFaith.GetAdjective]."
 ep3_decisions_event.2010.desc_state_faith: "\n\nMesmo olhando para a nuca de [confirmation_vassal.Custom('ES_DelDela')] [confirmation_vassal.GetTitledFirstNameNoTooltip|l], sinto seu desprezo ardente. Murmura juramentos [second.Custom('quirk_neg_adverb')]… enquanto sonha em me matar a golpes com o cetro de seu cargo."
 ep3_decisions_event.2010.desc_heretic_faith: "\n\n[second.Custom('quirk_pos_adverb')|U], [confirmation_vassal.Custom('ES_ElLa')] [confirmation_vassal.GetTitledFirstNameNoTooltip|l] participa nos ritos. Assume o cetro de seu cargo e [second.Custom('quirk_pos_pp')] jura me servir com lealdade."
 ep3_decisions_event.2010.desc_accepted_faith: "\n\nOs anos lhe curvam as costas como uma pedra de moinho, [confirmation_vassal.Custom('ES_AlAla')] [confirmation_vassal.GetTitledFirstNameNoTooltip|l] lhe custa suplicar. [confirmation_vassal.Custom('ES_ElLa')|U] anciã[confirmation_vassal.Custom('ES_OA')] tem muita experiência… e, com sorte, alguns bons anos para fazer uso dela."
 ep3_decisions_event.2010.desc_my_faith: "\n\nApenas um[confirmation_vassal.Custom('ES_XA')] jovem inexperiente, [confirmation_vassal.Custom('ES_ElLa')] [confirmation_vassal.GetTitledFirstNameNoTooltip|l] recita os ritos com o cetro de seu cargo firmemente apertado por mãos delicadas. Com esta pessoa, ainda há muito a provar…"
 ep3_decisions_event.2010.desc_hate: "\n\nA pessoa que suplica diante de mim governa com um toque [confirmation_vassal.Custom('ComplimentAdjective')]. Seja qual for a política que defende, seja lá o que se esconda em seu coração, [confirmation_vassal.Custom('ES_ElLa')] [confirmation_vassal.GetTitledFirstNameNoTooltip|l] é um orgulho para meu [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip]."
 ep3_decisions_event.2010.desc_love: "\n\nAgora confirmo a nomeação de quem, segundo todos os relatos, administra mal, [second.Custom('quirk_neg_adverb')]. Mas [confirmation_vassal.Custom('ES_ElLa')] desdenhos[confirmation_vassal.Custom('ES_OA')] [confirmation_vassal.GetTitledFirstNameNoTooltip|l], ao jurar um serviço perfeito que não pode prestar, será de pouca utilidade…"
 ep3_decisions_event.2010.desc_decrepit: "\n\n[confirmation_vassal.Custom('ES_ElLa')|U] [confirmation_vassal.GetTitledFirstNameNoTooltip|l] se inclina profundamente, toma seu cetro simbólico de autoridade e jura servir fielmente ao seu [ROOT.Char.GetTitleAsNameNoTooltip|l]."
 ep3_decisions_event.2010.desc_young: "\"Governe bem, [confirmation_vassal.GetTitleAsNameNoTooltip|l].\""
 ep3_decisions_event.2010.desc_skilled: "\n\nA pessoa que suplica diante de mim governa com um toque [confirmation_vassal.Custom('ComplimentAdjective')]. Seja qual for a política que defende, seja lá o que se esconda em seu coração, [confirmation_vassal.Custom('ES_ElLa')] [confirmation_vassal.GetTitledFirstNameNoTooltip|l] é um orgulho para meu [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip]."
 ep3_decisions_event.2010.desc_incompetent: "Na [confirmation_liege.Custom('GetThroneRoom')] do palácio principal de [confirmation_liege.GetCapitalLocation.GetTitle.GetNameNoTier], [confirmation_liege.Custom('ES_ElLa')] [confirmation_liege.GetTitledFirstNameRegnal|l], regente [confirmation_liege.GetFaith.HighGodNamePossessive] na Terra, se senta em todo o seu esplendor.\n\n"
 ep3_decisions_event.2010.desc_generic_outro: "Esperar entre outros altos funcionários enquanto um[confirmation_liege.Custom('ES_XA')] jovem com o rosto cheio de espinhas reclama e se remexe em seu trono é… bastante estranho."
 ep3_decisions_event.2010.a: "[Select_CString( confirmation_liege.IsFemale, 'La pagana', 'El pagano' )] que governa [confirmation_liege.GetPrimaryTitle.GetTierAsName] dos [confirmation_liege.GetCapitalLocation.GetCounty.GetFaith.GetAdherentNamePlural]. Até mesmo aqui, entre os [confirmation_liege.GetFaith.PriestNeuterPlural] e prelados da corte, o clima é tenso."
 #Vassal Event
 ep3_decisions_event.2011.desc: "E em caos. Criaturas do palácio zombam enquanto nós, funcionários, somos empurrados para o lugar, e poucos rituais são observados."
 ep3_decisions_event.2011.desc_child: "Uma fila interminável de funcionários aguarda; todos em admiração, todos ansiosos para se ajoelhar diante de nosso soberano."
 ep3_decisions_event.2011.desc_heretic: "Uma[confirmation_liege.Custom('ES_XA')] [confirmation_liege.GetWomanMan], entronizad[confirmation_liege.Custom('ES_OA')]. Ainda bem que nós, funcionários visitantes, temos o olhar proibido de nossa[confirmation_liege.Custom('ES_OA')] soberan[confirmation_liege.Custom('ES_OA')]!"
 ep3_decisions_event.2011.desc_war: "Sou conduzido a me juntar a uma fila de altos funcionários. Com o clamor de todos, músicos e arautos, nossas grandes cerimônias começam."
 ep3_decisions_event.2011.desc_poorly_run: "[confirmation_liege.Custom('ES_ElLa')|U] [confirmation_liege.GetTitleAsNameNoTooltip|l] se dirige a mim [second.Custom('quirk_neg_adverb')]; destila desprezo sobre minha cabeça submissa, enquanto minhas vestes ficam penduradas acima.\n\n"
 ep3_decisions_event.2011.desc_well_run: "No entanto, a voz [confirmation_liege.Custom('ES_DelDela')] [confirmation_liege.GetTitleAsNameNoTooltip|l] é calorosa e seu tom [second.Custom('quirk_pos_adjective')] enquanto se dirige a mim e me apresenta minhas insígnias.\n\n"
 ep3_decisions_event.2011.desc_gender: "[confirmation_liege.Custom('ES_ElLa')|U] [confirmation_liege.GetTitleAsNameNoTooltip|l] dirige-se a cada nomeado por vez, concedendo-lhes suas insígnias e recebendo seus juramentos, até que chega a mim.\n\n"
 ep3_decisions_event.2011.desc_typical_palace: ""A paz de [confirmation_liege.GetFaith.PositiveAfterLife] ainda vive em [confirmation_vassal.GetPrimaryTitle.GetNameNoTier]", diz, "é um jardim, a ser cuidado com gentileza"."
 ep3_decisions_event.2011.desc_hate: ""Deveis afiar a espada de [confirmation_vassal.GetPrimaryTitle.GetNameNoTier]", diz, "e que ela seja empunhada apenas pelos justos"."
 ep3_decisions_event.2011.desc_love: ""Durma pouco", ordena. "Mantenham-se firmes, pois [confirmation_vassal.GetPrimaryTitle.GetNameNoTier] é onde tudo o que é o senhorio [confirmation_liege.GetPrimaryTitle.GetAdjective] vive ou morre"."
 ep3_decisions_event.2011.desc_meh: ""Em [confirmation_vassal.GetPrimaryTitle.GetNameNoTier]", diz, "vós sois a imagem de [confirmation_liege.GetPrimaryTitle.GetTierAsNameNoTooltip] em si. Poucos, salvo os mais devassos, conhecem tais liberdades"."
 ep3_decisions_event.2011.desc_theme_civilian: ""Na sal das praias de [confirmation_vassal.GetPrimaryTitle.GetNameNoTier]", diz [confirmation_liege.GetSheHe], "sinto o cheiro do sangue deste [confirmation_liege.GetPrimaryTitle.GetTierAsNameNoTooltip]; vejo as lágrimas de suas viúvas"."
 ep3_decisions_event.2011.desc_theme_military: ""Uma jurisdição modesta, [confirmation_vassal.GetPrimaryTitle.GetNameNoTier]", diz, "mas digna"."
 ep3_decisions_event.2011.desc_theme_frontier: ""Um vasto domínio como [confirmation_vassal.GetPrimaryTitle.GetNameNoTier]", diz, entre formalidades, "uma fera poderosa que só o mestre certo pode domar…"."
 ep3_decisions_event.2011.desc_theme_imperial: ""[confirmation_liege.GetFaith.HighGodName] e vosso [confirmation_liege.GetTitleAsNameNoTooltip|l] vos concedem vosso posto", diz. "Lembrai-vos disso e governai [confirmation_vassal.GetPrimaryTitle.GetNameNoTier] bem"."
 ep3_decisions_event.2011.desc_theme_naval: "\n\nDou todas as respostas adequadas. E, inclinando-me profundamente diante de meu senhor[confirmation_liege.Custom('ES_XA')], tomo enfim o cetro da autoridade provincial."
 ep3_decisions_event.2011.desc_theme_small: "Salve você, [confirmation_liege.GetTitleAsNameNoTooltip|l]."
 ep3_decisions_event.2011.desc_theme_big: ""Um vasto domínio como [confirmation_vassal.GetPrimaryTitle.GetNameNoTier]", diz, entre formalidades, "uma fera poderosa que só o mestre certo pode domar…"."
 ep3_decisions_event.2011.desc_theme_balanced: "$admin_confirmation_event_header$ Invalidado"
 ep3_decisions_event.2011.desc_outro: "Agora que sou [ROOT.Char.GetTitleAsNameNoTooltip|l] de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], minha jornada não é mais necessária..."
