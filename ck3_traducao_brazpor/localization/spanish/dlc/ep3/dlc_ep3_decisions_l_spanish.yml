 artifact_wall_court_icon_large_name: "Seus servos lhe sugerirão uma série de candidatos adequados para o cargo de [GetCourtPositionType('chief_eunuch_court_position').GetName()|l]"
 artifact_wall_court_icon_large_description: "Um [GetCourtPositionType('chief_eunuch_court_position').GetName()|l] digno"
 artifact_wall_court_icon_small_name: "Meus servos procuraram longe e perto por um digno $chief_eunuch_court_position$ para se juntar ao meu tribunal.\n\nDois candidatos, em particular, chamaram minha atenção: [mediocre_eunuch.GetFirstName] está ferozmente determinado a provar seu valor, mas [good_eunuch.GetFirstName] parece ser mais habilidoso."
 artifact_wall_court_icon_small_description: "[mediocre_eunuch.GetFirstNameNoTooltip] tem a atitude certa!"
