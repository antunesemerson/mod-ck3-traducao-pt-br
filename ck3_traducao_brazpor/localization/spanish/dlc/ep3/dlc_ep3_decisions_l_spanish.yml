 #Commission Icon
 commission_artifact_decision_option_trinket_icon_desc: "A contemplação e adoração da bela arte nos aproximam de Deus e fortalecem nossa fé. É por isso que devo oferecer meu patrocínio a um pintor local para a produção de um novo ícone sagrado!"
 commission_trinket_icon_tooltip: "Encomendar um ícone religioso [artifact|lE] de um pintor local"
 commission_court_icon_large_tooltip: "Convocar um pintor"
 commission_court_icon_small_tooltip: "A \"Mãe de Deus\", Maria. Na iconografia, essa definição identifica uma cena da qual a arte bizantina gosta muito: Maria amamentando ou segurando Jesus bebê em seus braços."
 commission_artifact_decision_option_trinket_icon: "\"Cristo Onipotente\" ou \"Governante de Todos\". Muito comum na iconografia bizantina, é uma representação de Jesus segurando um Novo Testamento em uma mão e abençoando os espectadores com a outra."
