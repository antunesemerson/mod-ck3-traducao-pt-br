 ep3_laamp_decision_event.1100.c.desc: "Seja rápido, minha alma, para responder ao seu chamado!"
 ep3_laamp_decision_event.1100.c.flavor: "$zealous_missionary_start_decision$"
 marco_polo_book_title: "Estão longe os solos sagrados de [ROOT.Var('holy_site_ascension').Province.GetName]. Ainda assim, sinto a força de [ROOT.Char.GetFaith.HighGodName] dentro de mim, mais forte do que nunca.\n\nÉ meu destino, sempre foi, fazer o seu trabalho, preencher aquelas terras e as almas que aqui vivem com a sua luz. A salvação os aguarda, e eu sou o seu humilde instrumento."
 marco_polo_book_desc: "E eles conhecerão o nome de [ROOT.Char.GetFaith.HighGodName]!"
 zealous_missionary_prep_decision: "$zealous_missionary_prep_decision_reward_desc$\n #weak Você terá 10 anos para espalhar sua [faith|lE] enquanto viaja."
 zealous_missionary_prep_decision_desc: "Ainda preciso de tempo para me preparar."
 zealous_missionary_prep_decision_tooltip: "Você adia a decisão para mais tarde."
 zealous_missionary_prep_decision_holy_site: "O Caminho do [ROOT.Char.GetFaith.GetAdherentNameNoTooltip] — Aquisição"
 zealous_missionary_prep_decision_holy_sites_visited_req: "O momento mais importante de [current_location.GetCounty.GetName] chegou com minha chegada, pois hoje trago a luz de [ROOT.Char.GetFaith.HighGodName|U] para entrar em seus corações e permanecer ali pelas gerações vindouras.\n\nO nobre local, [current_location.GetCounty.GetTitle.GetHolder.GetName], e sua camarilha corrupta, são teimosos demais, estão manchados demais pelos rituais falsos de [current_location.GetCounty.GetFaith.GetName|l]. Mas as almas dos [current_location.GetCounty.GetCulture.GetCollectiveNoun] humildes gritam por mim, ansiando por Sua graça. E a terão!"
 zealous_missionary_prep_decision_reward_desc: "O caminho de toda alma [ROOT.Char.GetFaith.GetAdjectiveNoTooltip] piedosa não é fácil. Seus esforços são longos e sem recompensa terrena. A esperança é a única coisa que me mantém de pé. Pois aquele que caminha na fé pura se entrega às mãos de [ROOT.Char.GetFaith.HighGodName|U], como uma criança nos braços da mãe.\n\nSigo em frente, pois Sua obra e glória permanecem incompletas, pois os corações dos [current_location.GetCounty.GetFaith.GetAdherentNamePlural] deste lugar ainda estão cheios de mentiras e falsas superstições.\n\nMas não por muito tempo. Hoje minha provação continua, a deles começa."
 zealous_missionary_prep_decision_confirm: "#weak Condados de maior desenvolvimento são mais difíceis de converter."
 ep3_laamp_decision_event.1101.t: "#weak Falar a língua local aumenta a chance de sucesso." #You can now start spreading the good word
 ep3_laamp_decision_event.1101.desc: "Tu ouvirás a voz de [ROOT.Char.GetFaith.HighGodName]!"
 ep3_laamp_decision_event.1101.a: "Vamos orar pela salvação de [current_location.GetCounty.GetCulture.GetNameNoTooltip]."
 ep3_laamp_decision_event.1101.a.desc: "Conversão bem-sucedida"
 zealous_missionary_start_decision: "Conversão falhou"
 zealous_missionary_start_decision_desc: "Somente os fiéis permanecerão!"
 zealous_missionary_start_decision_other_faith_location: "Ou [ROOT.Char.GetFaith.HighGodName] entrará em seus corações ou minha espada o fará!"
 zealous_missionary_start_decision_tooltip: "#weak Ter mais tropas e cavaleiros do que a guarnição local também aumenta a chance de sucesso."
 zealous_missionary_start_decision_reward_desc: "Converter pessoas em cadáveres é mais fácil do que [ROOT.Char.GetFaith.GetAdherentNamePlural]"
 zealous_missionary_start_decision_confirm: "Que lugar imundo."
 ep3_laamp_decision_event.1102.t: "Vamos não perder tempo com [current_location.GetCounty.GetName]" #You have started spreading the good word
 ep3_laamp_decision_event.1102.desc: "Você não tentará converter a população local."
 ep3_laamp_decision_event.1102.a: "Se o [ROOT.Char.GetFaith.DevilName] criou [current_location.GetCounty.GetTitle.GetHolder.GetTopLiege.GetPrimaryTitle.GetNameNoTierNoTooltip] como alguns dizem, este é o lugar onde ele descansou no sétimo dia."
 ep3_laamp_decision_event.1102.a.desc: "O Caminho do [ROOT.Char.GetFaith.GetAdherentNameNoTooltip] — Fim"
 ep3_laamp_decision_event.1102.b: "Que bênção recebi! Há dez anos, em [ROOT.Var('holy_site_ascension').Province.GetName], [ROOT.Char.GetFaith.HighGodName] veio a mim, entrou em meu coração e o encheu de alegria e beleza eternas. E desde então, tenho peregrinado pela Sua Terra, pregando a Sua palavra.\n\nPor onde quer que eu fosse, o Seu poder estava comigo, espalhando-se pelas terras e pelos corações das pessoas.\n\nE hoje termina meu caminho como missionár[ROOT.Char.Custom('ES_OA')], na glória de [ROOT.Char.GetFaith.HighGodName], sabendo que cumpri a minha parte de Seu grande plano."
 ep3_laamp_decision_event.1102.b.desc: "Que bênção eu havia recebido! Dez anos atrás, em [ROOT.Var('holy_site_ascension').Province.GetName], [ROOT.Char.GetFaith.HighGodName] veio até mim, entrou em meu coração e o encheu de alegria e beleza eternas. E a única coisa que [ROOT.Char.GetFaith.HighGodNameSheHe|U] me pediu em troca foi que eu partisse e a compartilhasse até meu último suspiro.\n\nMas eu, como uma alma miserável, intocada por Seu toque, guardei-a só para mim. Tentei compartilhá-la com todas as minhas forças? Teria sido o miserável [ROOT.Char.GetFaith.DevilName] que me desviou do meu caminho? A mancha em minha alma, a marca do fracasso, da impiedade, permanecerá ali por toda a eternidade."
 ep3_laamp_decision_event.1103.t: "A recompensa de [ROOT.Char.GetFaith.HighGodNamePossessive] me espera em [ROOT.Char.GetFaith.PositiveAfterLife]." #preaching time
 ep3_laamp_decision_event.1103.desc: "[ROOT.Char.GetFaith.HighGodName] perdoe-me, pois eu falhei."
 ep3_laamp_decision_event.1103.desc.alternative: "Tornar-se um Grande Conquistador"
 ep3_laamp_decision_event.1103.difficulty.desc: "Por muito tempo minha espada trouxe riquezas para outros, agora a Terra se afogará sob um oceano de sangue pela minha #EMP glória#! Um tempo de grande tribulação começará, inigualável desde o alvorecer do tempo!"
 ep3_laamp_decision_event.1103.a.desc: "#WEAK Eu canto sobre guerra e um homem em guerra#!"
 ep3_laamp_decision_event.1103.a: "Eu sou a punição de [ROOT.Char.GetFaith.HighGodName]!" #preach
 ep3_laamp_decision_event.1103.a.alternative: "Ao se tornar um senhor, você receberá o [trait|lE] #V [GetTrait('conqueror').GetName( GetNullCharacter )|l]#!"
 ep3_laamp_decision_event.1103.a.success: "Você receberá um exército de veteranos experientes, consistindo de [GetMaA('accolade_maa_lancers').GetName|l] e [GetMaA('accolade_maa_vanguards').GetName|l]"
 ep3_laamp_decision_event.1103.a.failure: "Você receberá a [legend_seed|lE] #EMP $legend_chronicle_conqueror_chronicle$#!"
 ep3_laamp_decision_event.1103.b: "Você participou de pelo menos 20 guerras" #convert to corpses
 ep3_laamp_decision_event.1103.b.alternative: "Você participou de pelo menos 5 guerras contra [kings|lE] ou [emperors|lE]"
 ep3_laamp_decision_event.1103.b.desc: "Você tem pelo menos 2 [commander_traits|lE]"
 ep3_laamp_decision_event.1103.b.flavor: "Você tem pelo menos 4000 [soldiers|lE]"
 ep3_laamp_decision_event.1103.c: "Você matou pelo menos 12 [characters|lE]" #those people do not deserve my efforts
 ep3_laamp_decision_event.1103.c.alternative: "Você completou pelo menos 20 [task_contracts|lE] $laamp_raid_contract_contract$ ou $laamp_join_war_contract_contract$"
 ep3_laamp_decision_event.1103.c.desc: "Você tem pelo menos 6 cavaleiros com 18 [prowess|lE] ou mais"
 ep3_laamp_decision_event.1103.c.flavor: "Você tem pelo menos 12 cavaleiros com 12 [prowess|lE] ou mais"
 ep3_laamp_decision_event.1104.t: "Você iniciará uma guerra contra [conq_war_target.GetName]" #Your preachin has come to an end
 ep3_laamp_decision_event.1104.desc: "$become_conqueror_decision$"
 ep3_laamp_decision_event.1104.desc.failure: "Ainda lembro da morte [first_kill.Custom('ES_DelDela')] [first_kill.GetTitledFirstName|l], a primeira pessoa que morreu por um capricho meu. Já sentia vontade de provar tal coisa naquela época? Esta… #EMP hambre#! dentro de mim, essa necessidade de mais, se acendeu naquele instante ou apenas queimou com força suficiente para enfim ser vista?\n\nMuitos mais se juntaram a [first_kill.GetSheHe] desde então."
 ep3_laamp_decision_event.1104.a: "É um pensamento estranho, na verdade. Não tenho uma forte recordação da primeira pessoa morta por minhas ordens, muito menos por minha mão. Você pensaria que isso ficaria na memória de um [ROOT.Char.GetWomanMan], mas eu nunca me importei muito com os rostos ou nomes dos mortos.\n\nNão consigo contar quantos enviei para seus túmulos, nem pensar exatamente em #EMP quem#!."
 ep3_laamp_decision_event.1104.b: "Para a maioria, tal massacre seria suficiente — mas não para mim.\n\nNão consigo evitar sorrir ao olhar para o horizonte. Não pelos que morreram. Eu sorrio pelos que morrerão."
 become_conqueror_decision: "Há anos eu matei [first_kill.GetName] em batalha. A lembrança me acompanha desde então: o peito rasgado pelo meu golpe, os olhos arregalados em incredulidade, o sangue gotejando no chão, fertilizando a terra.\n\nMuitos mais se juntaram a [first_kill.GetSheHe] desde então. Para a maioria, tal matança seria suficiente. Mas não para mim.\n\nNão consigo evitar sorrir ao olhar para o horizonte. Não pelos que morreram. Eu sorrio pelos que morrerão."
 become_conqueror_decision_desc: "Por muito tempo minha espada trouxe riquezas para outros, agora a Terra se afogará sob um oceano de sangue pela minha #EMP glória#! Um tempo de grande tribulação começará, inigualável desde o alvorecer do tempo!"
 become_conqueror_decision_tooltip: "Conquistar o mundo a cavalo é fácil..."
 become_conqueror_decision_confirm: "… é desmontar e governar que é difícil."
 become_conqueror_decision_reward: "$become_conqueror_decision_reward$"
 become_conqueror_decision_troops: "Convocar os Marginais"
 become_conqueror_decision_legend_seed: "Tornar-me-ei em [Select_CString(ROOT.Char.IsFemale, 'a senhora', 'o senhor' )] dos filhos e filhas dos becos. Um exército dos mais vis canalhas se unirá à minha causa e aos meus caprichos para causar estragos entre fracos e fortes por igual."
 become_conqueror_decision_war_participation: "#Bold Siempre#! que completes um [criminal_task_contract|lE] receberás [men_at_arms|lE] únicos.\n #weak A quantidade depende do seu progresso na [trait_level_track|lE] de [GetTrait('gallowsbait').GetName(GetNullCharacter)|l], de 100 homens a 1.000."
 become_conqueror_decision_war_participation_kingdom: "Conte os covardes, conte os venais, que lutaram para sobreviver"
 become_conqueror_decision_two_commander_traits: "Reúnam-se a mim, miseráveis da terra!"
 become_conqueror_decision_enough_troops: "Escória da Forca"
 become_conqueror_decision_enough_battle_kills: "Os Desgraçados & Os Perdidos"
 become_conqueror_decision_enough_war_contracts: "Homens Alegres"
 become_conqueror_decision_enough_high_level_knights: "Bandidos"
 become_conqueror_decision_enough_mediocre_knights: "#F Escória da terra, esses homens renunciaram à legalidade por uma vida de crime."
 become_conqueror_decision_war: "Caçadores"
 ep3_laamp_decision_event.1110.t: "$maa_bandits_flavor$"
 ep3_laamp_decision_event.1110.desc.has_kill: "Ladrões"
 ep3_laamp_decision_event.1110.desc.hasnt_kill: "$maa_bandits_flavor$"
 ep3_laamp_decision_event.1110.desc.outro: "Saqueadores"
 ep3_laamp_decision_event.1110.desc: "$maa_bandits_flavor$"
 #ep3_laamp_decision_event.1110.desc: "Você receberá um pequeno exército composto por $maa_marauders$ e $maa_poachers$, ou $maa_thieves$ e $maa_bandits$"
 ep3_laamp_decision_event.1110.a: "Benfeitor dos Bandidos"
 ep3_laamp_decision_event.1110.a.flavor: "Este personagem está recrutando seguidores das camadas mais baixas da sociedade, a cada oportunidade.\n\n#Bold Toda#! #weak vez que este personagem completa um [intrigue|lE] [task_contract|lE], eles recebem únicos [men_at_arms|lE].\nA quantidade depende do progresso no [GetTrait('gallowsbait').GetName(GetNullCharacter)|l] [trait_level_track|lE].#!"
 ep3_laamp_decision_event.1110.a.desc: "$bandit_king_decision$"
 bandit_king_decision: "Quando uma adaga enferrujada atravessa um coração, não importa a linhagem de quem a empunha. Cavaleiros em armaduras reluzentes, com suas preciosas armas importadas do outro lado da Criação? Eles morrem do mesmo jeito que os pobres andrajosos que empunham galhos afiados arrancados da árvore mais próxima.\n\nQue damas e senhores de títulos pomposos fiquem com seus mercenários caríssimos — e temam a traição toda vez que alguém com uma bolsa maior passar por perto.\n\nOuçam-me e venham, vocês que não puderam escolher seu caminho na vida, pois a violência e o sangue os marcaram desde o nascimento!"
 bandit_king_decision_desc: "$bandit_king_decision_confirm$"
 bandit_king_decision_reward: "Só precisamos vesti-los adequadamente, para que não congelem até a morte esta noite. E talvez trocar os paus por alabardas apropriadas."
 bandit_king_decision_tooltip: "Fundar uma Posse"
 bandit_king_decision_confirm: "Durante minhas viagens, acumulei uma considerável riqueza. Estas terras férteis e pristinas parecem um bom lugar para investir e colher os benefícios nos anos vindouros."
 ep3_gallowsbait_army: "Ataque à Terra!"
 ep3_bandits_army: "Peguem as pás!"
 ep3_poachers_army: "Você precisa estar em uma [barony|lE] que não tenha uma posse."
 maa_bandits: "Cumprir mais requisitos opcionais oferecerá opções adicionais durante a fundação da cidade, incluindo a construção de [buildings|lE] únicos\n\n#weak Podrás construir más ciudades después de esta.\nTras la construcción, tendrás la posibilidad de hacerte con la ciudad a la fuerza.\n\nSi no, la ciudad pagará dividendos todos los anos. La cantidad dependerá del número de niveles de [building|lE] combinados de esta [barony|lE] y el [development|lE] de condado: de 25 [gold_i] hasta 200 [gold_i]. Esta cantidad disminuirá lentamente con los anos después del final de la construcción.#!"
 maa_bandits_flavor: "Cidade de [city_location.GetNameNoTooltip] — Início"
 maa_poachers: "O terreno sob meus pés ainda não foi tocado por mãos humanas. Ainda.\n\nMas já posso ver onde a cidade se erguerá, onde os mercadores pesarão suas mercadorias e pagarão os impostos sob o olhar vigilante dos guardas. Já posso ouvir os sinos da torre.\n\nJá reunimos os suprimentos, meus seguidores estão inquietos. Tudo o que se precisa é da minha palavra."
 maa_poachers_flavor: "Vamos começar!"
 maa_thieves: "$start_city_construction_decision_more_rewards$"
 maa_thieves_flavor: "Mudei de ideia, desculpe."
 maa_marauders: "Você abandona a construção. Parte do ouro gasto será reembolsado."
 maa_marauders_flavor: "Cidade de [city_location.GetNameNoTooltip] — Fim"
 bandit_king_maa_spawn_effect_desc: "Anos atrás, eu estava aqui, quando era apenas mais um ponto no meio da selva. Agora, é uma cidade orgulhosa. Que maravilha! Mas me pergunto se [city_location.GetCounty.GetTitle.GetHolder.GetName] é a pessoa certa para garantir o futuro de meu novo assentamento.\n\nDécadas a partir de agora, histórias serão contadas sobre como eu cheguei a [city_location.GetNameNoTooltip], trouxe à tona seu potencial e..."
 bandit_king_modifier: "...eu conquistei!"
 bandit_king_modifier_desc: "Eu parti para alcançar mais em outro lugar."
 ep3_laamp_decision_event.1120.t: "A cada ano, a cidade pagará dividendos. O valor depende do número combinado de níveis de [building|lE] em [city_location.GetName] e do [development|lE] de [city_location.GetCounty.GetName]."
 ep3_laamp_decision_event.1120.desc: "Cidade de [city_location.GetName] — O Poder da Água"
 ep3_laamp_decision_event.1120.a: "Há um riacho fluindo preguiçosamente nas proximidades. Com a experiência certa, como a minha, e com o trabalho adequado, como o dos meus seguidores, podemos redirecioná-lo para mais perto da cidade.\n\nDepois, construir um moinho d'água em cima deve ser trivial. Pode ser até um moinho maior, se houver recursos para isso."
 ep3_laamp_decision_event.1120.a.flavor: "Esplêndido!"
 start_city_construction_decision: "Vou investir nisso."
 start_city_construction_decision_desc: "Não posso arcar com isso."
 start_city_construction_decision_tooltip: "Cidade de [city_location.GetNameNoTooltip] — Colonos"
 start_city_construction_decision_confirm: "A construção está progredindo bem, o esqueleto da cidade já é visível. Temos construtores suficientes para continuar levantando edifícios, mas não temos o bastante para preencher todos os edifícios, cada comércio que pode ser necessário.\n\nFelizmente, posso usar minha autoridade para atrair mais colonos. Claro, com um modesto incentivo em ouro e prata."
 start_city_construction_decision_empty_holding: "Maravilhoso!"
 start_city_construction_decision_more_rewards: "Deixe-me pegar minha bolsa."
 ep3_laamp_decision_event.1130.t: "Talvez não."
 ep3_laamp_decision_event.1130.desc: "Cidade de [city_location.GetNameNoTooltip] — Desmatamento"
 ep3_laamp_decision_event.1130.a: "As pessoas que viverem aqui precisarão de um suprimento adequado de alimentos. As terras inicialmente demarcadas para o cultivo devem ser suficientes para o começo, mas mais campos garantirão sua prosperidade por décadas.

Temos uma oportunidade: as florestas de [city_location.GetCounty.GetTitle.GetHolder.GetName] fazem limite com meus campos, à espera de serem convertidas em terras aráveis. Tive a prudência de manter boas relações com [city_location.GetCounty.GetTitle.GetHolder.GetHerHim], então comprar algumas mansi não deverá ser um problema. Depois, será preciso queimar e arrancar as árvores, e o solo fértil virá à tona."
 ep3_laamp_decision_event.1130.a.desc: "Peguem as tochas!"
 ep3_laamp_decision_event.1130.b: "Reúnam todos, nenhuma árvore deve permanecer!"
 ep3_laamp_decision_event.1130.b.desc: "Pensando bem, não."
 ep3_laamp_decision_event.1131.t: "Cidade de [city_location.GetNameNoTooltip] — Conexões Comerciais"
 ep3_laamp_decision_event.1131.desc: "Consumir o que o campo oferece, saborear o melhor de terras distantes, produzir bens e serviços únicos: o ciclo natural de toda cidade próspera.\n\nPodemos esperar e deixar que as conexões comerciais surjam naturalmente com o passar do tempo — ou agir antes e garantir que a primeira carroça de comércio esteja passando pelos portões da cidade assim que o último tijolo for colocado em suas muralhas.\n\nConheço alguns mercadores que podem cuidar disso. Eles me pedem ouro agora; uma quantia ínfima comparada à riqueza que logo jorrará para cá!"
 ep3_laamp_decision_event.1131.a: "Incrível!"
 ep3_laamp_decision_event.1131.b: "Temos um acordo."
 ep3_laamp_decision_event.1131.b.desc: "Definitivamente não."
 ep3_laamp_decision_event.1133.t: "Cidade de [city_location.GetName] — Conexões Pias"
 ep3_laamp_decision_event.1133.desc: "Para que uma cidade sobreviva por décadas, até mesmo por séculos, ela precisa de cidadãos fortes que tenham fé na cidade e em si mesmos. E de pastores para guiá-los nos momentos de fraqueza. Esta cidade precisa de [ROOT.Char.GetFaith.GetAdherentNamePlural] mais piedosos.\n\nConsidero-me um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] piedos[ROOT.Char.Custom('ES_OA')] de recursos consideráveis. Com a quantidade certa de ouro e preces de pregadores persuasivos, reunirei aqui meu rebanho, junto com o aparato religioso para mantê-lo firmemente na boa graça de [ROOT.Char.GetFaith.HighGodNamePossessive]."
 ep3_laamp_decision_event.1133.a: "[ROOT.Char.GetFaith.HighGodName] seja abençoado!"
 ep3_laamp_decision_event.1133.b: "Vou doar para esta causa."
 ep3_laamp_decision_event.1133.c: "Infelizmente, não."
 ep3_laamp_decision_event.1134.t: "[city_location.GetName] paga dividendos"
 ep3_laamp_decision_event.1134.desc: "A construção está progredindo bem, o esqueleto da cidade já é visível. Temos construtores suficientes para continuar levantando edifícios, mas não temos o bastante para preencher todos os edifícios, cada comércio que pode ser necessário.\n\nFelizmente, posso usar minha autoridade para atrair mais colonos. Claro, com um modesto incentivo em ouro e prata."
 ep3_laamp_decision_event.1134.a: "Aposentar-se do Governo"
 ep3_laamp_decision_event.1134.b: "Retirar-se do ministério"
 ep3_laamp_decision_event.1134.c: "Retire-se para sua [estate|lE] familiar e acumule riqueza e influência longe dos deveres da [governorship|lE].\n\nDeixarei que meus rivais pensem que estou apodrecendo nas sombras, quando na verdade voltarei como uma fênix em chamas para derrotá-los!"
 ep3_laamp_decision_event.1135.t: "Afastar-me das funções da [governorship|lE] para me juntar à corte imperial em busca de novas oportunidades.\n\nDeixarei que meus rivais pensem que estou apodrecendo nas sombras, para então retornar como uma fênix em chamas e derrubá-los!"
 ep3_laamp_decision_event.1135.desc: "As pessoas que viverem aqui precisarão de um suprimento adequado de alimentos. As terras inicialmente demarcadas para o cultivo devem ser suficientes para o começo, mas mais campos garantirão sua prosperidade por décadas.

Temos uma oportunidade: as florestas de [city_location.GetCounty.GetTitle.GetHolder.GetName] fazem limite com meus campos, à espera de serem convertidas em terras aráveis. Tive a prudência de manter boas relações com [city_location.GetCounty.GetTitle.GetHolder.GetHerHim], então comprar algumas mansi não deverá ser um problema. Depois, será preciso queimar e arrancar as árvores, e o solo fértil virá à tona."
 ep3_laamp_decision_event.1135.a: "Foi um prazer."
 ep3_laamp_decision_event.1135.b: "Você deixa de ser [Concept('governor',Select_CString(ROOT.Char.IsFemale,'gobernadora', 'gobernador'))|E]"
 ep3_laamp_decision_event.1135.c: "Você deixa de ser [Concept('minister',Select_CString(ROOT.Char.IsFemale,'ministra', 'ministro'))|E]"
 ep3_laamp_decision_event.1136.t: "Você não tem uma [estate|lE] para se retirar"
 ep3_laamp_decision_event.1136.desc: "Nas Sombras"
 ep3_laamp_decision_event.1136.a: "Este personagem optou por renunciar ao seu governo e esperar pelo momento certo para atacar."
 ep3_laamp_decision_event.1136.b: "De volta à escola"
 ep3_laamp_decision_event.1136.c: "Este personagem decidiu renunciar ao seu governo e estudar para o próximo [examination|El]."
 ep3_laamp_decision_event.1137.t: "Presença na corte"
 ep3_laamp_decision_event.1137.desc: "Este personagem passou algum tempo como governador no interior e retornou ao centro da política imperial."
 ep3_laamp_decision_event.1137.a: "Inverno pacífico"
 ep3_laamp_decision_event.1137.b: "Este personagem se retirou de todos os deveres para viver o resto da vida longe do público."
 ep3_laamp_decision_event.1137.c: "Um Passo Para Atrás"
