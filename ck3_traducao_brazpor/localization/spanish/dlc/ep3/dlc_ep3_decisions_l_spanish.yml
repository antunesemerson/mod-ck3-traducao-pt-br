 ep3_decisions_event.2080.desc.liege_dead_me: "Se vão me confirmar, terá que ser meu novo[ROOT.Char.GetLiege.Custom('ES_OA')] senhor[ROOT.Char.GetLiege.Custom('ES_XA')], [ROOT.Char.GetLiege.Custom('ES_ElLa')] [ROOT.Char.GetLiege.GetTitledFirstNameRegnal|l]."
 ep3_decisions_event.2080.desc.liege_dead: "Depois de todo o trabalho preparando minha cerimônia de confirmação,"
 ep3_decisions_event.2080.desc.liege_imprisoned_me: "\n\nIsso certamente muda a situação."
 ep3_decisions_event.2080.desc.liege_imprisoned: "Avante, para coisas maiores."
