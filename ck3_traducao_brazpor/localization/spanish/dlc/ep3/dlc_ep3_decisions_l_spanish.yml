 ep3_decisions_event.3000.desc: "Afirmativo!"
 ep3_decisions_event.3000.a: "Preparar Dromons de Fogo Grego"
 restored_greek_theme_gov_efficiency_tt: "Incendiar o Bósforo já salvou [GetTitleByKey('b_constantinople').GetNameNoTier] da ruína antes, e pode fazer isso novamente. O corpo de água abrigado é um dos poucos lugares onde o fogo líquido, nossa substância secreta, pode ser implantado de forma confiável.\n\nQue enormes sifões de fogo sejam fabricados, e uma frota de guarnição armada."
 ep3_decisions_event.3001.t: "Permite que [GetTitleByKey('b_constantinople').GetNameNoTier] arrase [armies|lE] [Concept( 'embarked', 'embarcados' )|E] com a arma mais imprevisível e mais zelosamente guardada de todas."
