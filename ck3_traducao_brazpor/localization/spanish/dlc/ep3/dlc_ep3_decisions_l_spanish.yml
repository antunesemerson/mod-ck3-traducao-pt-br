 ep3_decisions_event.7000.b_flavor_golden_aplomb: "Dividir o Império"
 ep3_decisions_event.7000.a.crit_success: "Houve muitas razões pelas quais um império tão vasto foi dividido nos anos de nossos antepassados — e essas razões permanecem relevantes até hoje. O poder deve ser dividido novamente."
 ep3_decisions_event.7000.a.success: "[GetPlayer.GetPrimaryTitle.GetName] será dividido em dois, formando assim o [eastern_roman_empire|E]"
