 prepare_greek_fire_dromons_capital_unoccupied_tt: "Como [ROOT.Char.GetTitleAsName|l], devo ser [Select_CString(ROOT.Char.IsFemale, 'a senhora', 'o senhor' )] indiscutível de minhas águas territoriais. É um direito concedido por [ROOT.Char.GetFaith.HighGodName] e protegido de cercos e assaltos pelo uso das chamas de [ROOT.Char.GetFaith.PositiveAfterLife], nosso domínio do fogo líquido.

Se Constantinopla deve ser protegida, nossos cais precisam abrigar mais do que navios mercantes indefesos!

Onde estão meus ágeis [Glossary( 'drômones', 'DROMONS_GLOSS' )]? Onde estão artesãos engenhosos como [Glossary( 'Kallinikos de Heliópolis', 'KALLINIKOS_GLOSS' )], que forjarão grandes projetores de chamas para cuspir faíscas sobre as proas de minhas embarcações?"
 prepare_greek_fire_dromons_no_modifier_tt: "Galeões bizantinos, movidos por remos e velas, bem adequados para fazer guerra no Mediterrâneo."
 defensive_fire_dromons_3_years_tooltip: "O arquiteto do século VII #bold Kallinikos#! é atribuído com a invenção da forma adequada de fogo grego."
 defensive_fire_dromons_success_tooltip: "Colocarei Constantinopla para trabalhar."
 defensive_fire_dromons_custom_desc: "Os latinos construirão nossos navios com prazer."
