 greek_backwater_modifier_region: "Grécia Restaurada"
 backwater_county_eligible_modifier_removal_tt: "Conselho meu e alguns estrategos selecionados me trazem notícias sobre o reino, meu [ROOT.Char.Custom2('RelationToMeShort', interlocutor)] [interlocutor.GetFirstName] fala.\n\n“Eu seria omisso se não observasse, [interlocutor.Custom2('RelationToMeShort', ROOT.Char)] meu[ROOT.Char.Custom('ES_OA')] , que os esforços do império para restaurar as terras gregas ao seu status histórico como bastiões da civilização foram bem-sucedidos.”\n\n“Os estrategos têm trabalhado incansavelmente para desenvolver suas terras e, assim, aumentar a glória de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip|l]!”."
