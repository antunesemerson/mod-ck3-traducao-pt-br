 ep3_decisions_event.5020.desc: "Desbloqueia a [building|lE] da [estate|lE] [GetDomicileBuilding('silk_01').GetName|l]"
 ep3_decisions_event.5020.desc_more: "[GetDomicileBuilding('silk_01').GetName] Desbloqueado"
 ep3_decisions_event.5020.a: "Você precisa ter desbloqueado [GetModifier('ep3_unlocked_silk').GetNameWithTooltip] por meio da [decision|lE] [GetDecisionWithKey('establish_silk_production_decision').GetName] ou sua [culture|lE] precisa ter a [innovation|lE] #V $innovation_sericulture$#!"
 ep3_decisions_event.5020.b: "Encomendar Regalia de Seda"
 ep3_decisions_event.5020.c: "Nossa família está entre os poucos produtores e vendedores autorizados imperialmente da mais fina seda bizantina. Nossa atividade nos traz ouro e influência — e algumas #EMP vantagens extras#! — mas raramente desfrutamos dos benefícios diretamente. Eu acho que mereço algo #EMP extra legal#! para mim, uma vez!"
 ep3_decisions_event.5020.d: "Encomendar um [artifact|lE] feito de seda para si mesmo"
 embrace_heresy_tt: "Chamar o artesão"
 leverage_position_tt: "Um artesão de sua Propriedade produzirá um [artifact|lE] de Regalia de seda para você"
 unlocks_demand_state_faith_decision: "Regalia de Seda Completa"
 has_embraced_heresy_tt: "Com uma elegante floritura, [local_artisan.GetFirstName] mestre[local_artisan.Custom('ES_OA')] artesã[local_artisan.Custom('ES_OA')] da magnanaria da minha família, me entrega um conjunto de túnicas de seda da mais alta qualidade.\n\n\"Seu pedido está pronto, [ROOT.Char.Custom('FormOfAddressForLiege')]. Espero que esteja à altura de seus padrões\".\n\nA seda flui como água entre meus dedos, enquanto meus olhos se esforçam para captar todos os mínimos detalhes dos ornamentos."
 push_heresy_as_state_faith: "Simplesmente deslumbrante!"
