 ep3_decisions_event.4065.desc: "Você, seu [GetCourtPositionType('chief_forager_camp_officer').GetName()|l] ou seu [GetCourtPositionType('huntperson_camp_officer').GetName()|l], podem procurar [provisions|lE]"
 ep3_decisions_event.4065.a: "Requer o [GetDomicileBuilding('mess_tent_01').GetName|l] [domicile_building|lE]"
 ep3_decisions_event.4065.b: "A Riqueza de [forage_province.GetNameNoTooltip]"
 ep3_decisions_event.4065.c: "Saindo do meu acampamento, examino os [forage_province.Custom('TerrainTypeProvince')] ao redor, em busca de qualquer sinal de caça ou forragem.\n\n"
 convert_to_feudalism_from_administrative_decision: "[forage_province.GetName] pode oferecer mais nas estações amenas, mas o amargo frio do inverno endurece o [forage_province.Custom('GetProvinceGroundDesc')], e envolve os [forage_province.Custom('GetTerrainTypePlural')] em geada. Não encontraremos muito aqui..."
 convert_to_feudalism_from_administrative_decision_desc: "Vasculhar o [forage_province.Custom('GetProvinceGroundDesc')] e os [forage_province.Custom('GetTerrainTypePlural')] de [forage_province.GetName] oferece pouco encorajamento: o lugar está desprovido de qualquer coisa digna de nosso estômago. Nossa melhor esperança é caçar."
 convert_to_feudalism_from_administrative_decision_confirm: "Embora haja muitos cogumelos, raízes e bagas para serem encontrados ao redor de [forage_province.GetName], este não é um paraíso para caçadores. Não há nem mesmo uma lebre à vista."
 convert_to_feudalism_from_administrative_decision_tooltip: "Estamos com sorte: o clima de [forage_province.GetName] é ameno e rico. Aonde quer que se olhe, os presentes da natureza transbordam pelos [forage_province.Custom('GetTerrainTypePlural')]. Faremos bem aqui."
 you_have_governorship_rights_tt: "[forage_province.GetName] deve nos tratar bem. Os [forage_province.Custom('GetTerrainTypePlural')] estão cheios de vida, e é necessário apenas tomar o tempo e o cuidado adequados para encontrar comida aqui."
