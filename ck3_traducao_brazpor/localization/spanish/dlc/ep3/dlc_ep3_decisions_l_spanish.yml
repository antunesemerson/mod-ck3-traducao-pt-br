 defensive_fire_dromons_modifier: "Dromons de Fogo Defensivo"
 defensive_fire_dromons_modifier_desc: "Reestabelecer as Fronteiras Teodosianas"
 defensive_fire_dromons_modifier_custom_desc: "Quando o imperador [GetScriptedCharacterByHistoryID( '70534' ).GetFirstName] dividiu o Império Romano em duas metades administrativas, a parte oriental foi para seu filho mais velho, [GetScriptedCharacterByHistoryID( '70519' ).GetFirstName] e nós somos seus sucessores diretos. No entanto, as fronteiras da nossa "[Glossary( 'pars', 'PARS_ORIENTIS_GLOSS' )]" se contraíram consideravelmente desde aqueles dias; será motivo de grande glória para um basileus restabelecer as fronteiras que [GetScriptedCharacterByHistoryID( '70534' ).GetFirstNameNoTooltip] nos deixou originalmente."
 ep3_decisions_event.3100.t: "Reestabelecer as fronteiras originais da Roma Oriental"
 ep3_decisions_event.3100.desc: "Como [ROOT.Char.GetTitleAsName|l], devo ser [Select_CString(ROOT.Char.IsFemale, 'a senhora', 'o senhor' )] indiscutível de minhas águas territoriais. É um direito concedido por [ROOT.Char.GetFaith.HighGodName] e protegido de cercos e assaltos pelo uso das chamas de [ROOT.Char.GetFaith.PositiveAfterLife], nosso domínio do fogo líquido.

Se Constantinopla deve ser protegida, nossos cais precisam abrigar mais do que navios mercantes indefesos!

Onde estão meus ágeis [Glossary( 'drômones', 'DROMONS_GLOSS' )]? Onde estão artesãos engenhosos como [Glossary( 'Kallinikos de Heliópolis', 'KALLINIKOS_GLOSS' )], que forjarão grandes projetores de chamas para cuspir faíscas sobre as proas de minhas embarcações?"
 DROMONS_GLOSS: "Um dia glorioso para os romanos em toda parte!"
 KALLINIKOS_GLOSS: "#bold Pars Orientis#! — o 'Parte Oriental' — é o nome latino original do Império Romano Oriental. O nome implica apenas uma partição administrativa, sem uma divisão formal ou política."
 ep3_decisions_event.3100.a: "Colocarei Constantinopla para trabalhar."
 ep3_decisions_event.3100.b: "Refundar o Pandidakterion"
 ep3_decisions_event.3100.c: "O Imperador [GetScriptedCharacterByHistoryID( '70533' ).GetFirstName] fundou o [Glossary( 'Pandidakterion', 'PANDIDAKTERION_GLOSS' )] em 425 d.C., um dos maiores centros de estudo do mundo. Muitos séculos se passaram desde então, e os tempos mudaram. Se quisermos que o Pandidakterion continue na vanguarda do conhecimento humano, a instituição precisa ser renovada e reorganizada."
