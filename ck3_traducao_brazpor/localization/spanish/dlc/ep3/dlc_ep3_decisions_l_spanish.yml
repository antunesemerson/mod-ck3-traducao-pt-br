 knight_errant_decision_armor_tt: "Uma Desgraça para a Família"
 ep3_decisions_event.5001.t: ""Não teria imaginado que suportásseis tamanha vergonha tão docilmente". Um cavalo para bem ao lado do nosso acampamento. Reconheço [my_rival.Custom('ES_AlAla')] cavaleiro como minha #EMP queridísim[my_rival.Custom('ES_OA')]#! [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('my_rival'))], [my_rival.Custom('ES_ElLa')] [my_rival.GetTitledFirstName|l].\n\n"O que deu em você? Brincar de $knight_culture_player_plural_no_tooltip_lowercase$, fingindo que está vivendo num conto de fadas", [my_rival.GetFirstNameNoTooltip] desmonta e cospe no chão.\n\n"Quando você vai cair na real? Arranjem alguma terra, antes de continuar desonrando o bom nome da nossa família"."
