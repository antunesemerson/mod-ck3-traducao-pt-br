 all_powerful_vassals_required_tt: "\nTodos os [vassal|lE] [feudal|lE] ou [clan|lE] dentro do seu [de_jure|lE] [realm|lE] e de sua [faith|lE] podem mudar seu [government|lE] para [administrative|lE], se cumprirem uma das seguintes condições:"
 go_administrative_government_desc: "Eles são um [powerful_vassal|lE]"
 go_administrative_government_name: "Tiene una [opinion|lE] sobre ti de #P 25#! o más."
 go_administrative_government_tooltip: "Além disso, quaisquer vassalos que tenham uma opinião positiva sobre você têm uma chance de adotar o tipo de [government|lE] [administrative|lE]."
 go_celestial_government_desc: "Alguns [vassals|lE] não se converteram para o governo administrativo e terão que ser convencidos ou forçados a adotar o [government|lE] [administrative|lE] mais tarde."
 go_celestial_government_name: "Todo [governor|lE] se tornará um [vassal|lE] de [title_tier|lE] [duchy|lE]"
 go_celestial_government_tooltip: "Qualquer [kingdom|lE] [title_tier|lE] [vassal|lE] mudará o tipo de [government|lE] para [feudal|lE]"
 go_meritocratic_government_desc: "Qualquer [kingdom|lE] [title_tier|lE] [vassal|lE] mudará o tipo de [government|lE] para [clan|lE]"
 go_meritocratic_government_name: "Qualquer [noble_families|lE] com uma [estate|lE] receberá uma quantia de [gold|lE][gold_i]"
 go_meritocratic_government_tooltip: "Legislador"
 go_japan_administrative_government_desc: "Este personagem instituiu uma forma de [government|lE] [Concept('administrative', 'administrativa')|E] neste reino. Embora isso signifique que as leis e a burocracia agora reinam supremas, todos ainda se lembram de quem colocou a estrutura em seu lugar. Isso torna governar consideravelmente mais fácil do que será para os futuros sucessores."
 go_japan_administrative_government_name: "$major_decisions.0001.t$"
 go_japan_administrative_government_tooltip: "Reorganizar um reino do tamanho de [ROOT.Char.GetPrimaryTitle.GetDefinitiveNameNoTooltip|l] não é pouca coisa. O que antes era uma rede de lealdades pessoais agora é um estado com governadores e funcionários.\n\n"
 convert_to_administrative_decision_title_multiple: "Algumas partes do domínio ainda não foram afetadas por esta reforma. [obstinate_vassal.GetName] não confia nem em mim nem nas minhas reformas. Não podemos tolerar isso por muito tempo.\n\n"
 convert_to_administrative_decision_confirm_multiple: "Algumas partes do domínio não são afetadas por esta reforma. [non_state_faith_vassal.GetName] desconfia da ideia de uma fé de estado e rejeita minhas reformas. Isso não pode ser tolerado por muito tempo.\n\n"
 convert_to_administrative_decision_tooltip_multiple: "Algumas partes do reino permanecem intocadas por esta reforma. [non_de_jure_vassal.GetPrimaryTitle.GetNameNoTooltip|U] está fora do novo estado que construímos. Não podemos tolerar isso por muito tempo.\n\n"
 convert_to_administrative_celestial_desc: "À medida que o legalismo se espalha pelo reino, sem dúvida, as noções de família e vassalagem cederão lugar ao orgulho cívico e à centralização."
 convert_to_administrative_meritocratic_desc: "A lei agora governa estas terras!"
 convert_to_administrative_japanese_desc: "[actor.Custom2('AppropriateGreeting', ROOT.Char)]"
 dukes_become_governors: "O reino está sendo reorganizado, com o mérito como princípio orientador. Já não há espaço para proprietários de terras hereditários.\nEspero que todo vassalo se adeque conforme o esperado e se junte às fileiras dos meus Governadores."
 vassals_can_become_administrative: "Por [actor.GetPrimaryTitle.GetNameNoTierNoTooltip|l]!"
 powerful_vassals_become_administrative: "Não abrirei mão dos meus direitos."
 vassals_become_administrative: "Interessante"
 vassals_who_may_switch_to_administrative: "Adotar [ROOT.Char.Custom('GetTribalReformGovernment')] Modos"
 vassal_did_not_become_administrative: "Menos burocracia e mais #EMP ação#! é o que este reino precisa. Se [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip|l] deve florescer, devemos cortar nossos laços com aquilo que nos impede."
 governors_become_dukes: "Adotar os modos de [ROOT.Char.Custom('GetTribalReformGovernment')]"
 kings_become_feudal: "Mudar o tipo de [government|lE]"
 kings_become_clan: "Você [liege|lE] lhe concedeu #high derechos provinciales de la casa#! na [GetPlayer.Custom('GetProvinceConcept')] que possui por meio da [decision|El] [GetDecisionWithKey('petition_liege_decision').GetName]"
 estates_get_bought: "Sua [GetPlayer.Custom('GetProvinceConcept')] faz fronteira com um [realm|lE] diferente"
 first_admin_emperor: "$major_decisions.0200.t$"
 first_admin_emperor_desc: "Às vezes é melhor voltar ao que é conhecido e comprovado.\n\nEnquanto a abordagem administrativa só tem prejudicado [actor.GetPrimaryTitle.GetNameNoTierNoTooltip], os antigos modos de vida têm seus benefícios inegáveis e sua estrutura tradicional para nos ajudar a alcançar novos patamares."
 ep3_decisions_event.4060.t: "Devemos nos adaptar às circunstâncias em mudança."
