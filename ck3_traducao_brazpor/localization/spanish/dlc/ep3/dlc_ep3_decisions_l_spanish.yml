 MODIFIER_DEFINITION_MAIN_DESC_PER_EGYPT_GRANARY: "[head_of_faith.Custom('ES_ElLa')|U] [head_of_faith.GetTitledFirstName|l] me olha com grande desgosto; a única coisa que impede que insultos furiosos saiam de sua boca é o mais básico decoro."
 grain_dole_already_active: "[head_of_faith.Custom('ES_ElLa')|U] [head_of_faith.GetTitledFirstName|l] me faz um gesto, com um sorriso acolhedor no rosto, e me aproximo de [head_of_faith.GetSheHe]. "Meu querid[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]", saúda-me."
