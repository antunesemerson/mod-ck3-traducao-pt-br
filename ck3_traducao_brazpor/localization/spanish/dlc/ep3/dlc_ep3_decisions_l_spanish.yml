 butcher_animals_decision.tt.you_have_no_elephants: "É uma coisa espantosa, matar um animal que você não criou para comer. Principalmente se for um cão de caça, o companheiro mais leal que qualquer pessoa provavelmente conhecerá.\n\n"
 butcher_animals_decision_option_elephants: "Os cães uivam como demônios enquanto são levados ao matadouro, farejando o sangue, a morte e os corpos empilhados de seus companheiros. Eu mesmo cuidarei de [ROOT.Char.Custom('DogStoryName')]. Eu lhe devo isso."
 butcher_animals_decision.tt.dogs: "Os cães uivam como demônios enquanto são levados para o abate, sentindo o sangue, a morte e os corpos empilhados de seus companheiros. Conhecia alguns deles pelo nome, embora pelo menos não possa me considerar um [ROOT.Char.Custom('MistressMaster')] para nenhum."
 butcher_animals_decision.tt.provisions_gain.per_dog_mod: "Como só meu adorado [ROOT.Char.Custom('DogStoryName')] de que cuidar, só há uma garganta para cortar. Ainda assim, o animal parece notar que algo está errado, que algo #EMP no encaja#!."
 butcher_animals_decision.tt.provisions_gain.building.dog: "Com apenas um cão no acampamento, não é muito um abate, mas a besta parece entender que seu destino se aproxima mesmo assim."
 butcher_animals_decision.tt.cooldown.dogs: "Com tão poucos cães disponíveis para nós, não há dúvida de que meu próprio [ROOT.Char.Custom('DogStoryName')] deve se juntar ao abate. O primeiro é abatido de forma limpa, mas os demais logo sentem o cheiro do abate e começam a uivar e a gemer."
 butcher_animals_decision.tt.cats: "Com tão poucos cães disponíveis para nós, devemos estar desesperados por comida. O primeiro é abatido de forma limpa, mas os demais logo sentem o cheiro do abate e começam a uivar e a gemer."
 butcher_animals_decision.tt.provisions_gain.per_cat_mod: "Temos a sorte de ter muitos cães disponíveis, incluindo meu próprio [ROOT.Char.Custom('DogStoryName')], embora eles pareçam inquietos — como se suspeitassem do que os aguarda. Depois que o primeiro é levado para morrer, eles começam a uivar."
 butcher_animals_decision.tt.cooldown.cats: "Temos a sorte de ter muitos cães disponíveis, muita comida em potencial para nos sustentar, embora eles pareçam inquietos — como se suspeitassem do que os aguarda. Depois que o primeiro é levado para morrer, eles começam a uivar."
 butcher_animals_decision.tt.horses: "\n\nMuitos dos meus seguidores me olham com repulsa, mas outros parecem entender que isso é uma necessidade.\n\nAo menos, logo haverá silêncio."
 butcher_animals_decision.tt.provisions_gain.your_horse_mod: "O cachorro [THIS.Char.Custom('ES_DelDela')] [THIS.Char.GetTitledFirstNameNicknamed|l], [THIS.Char.Custom('DogStoryName')], é abatido"
 butcher_animals_decision.tt.provisions_gain.building.horse: "Seu cão, [THIS.Char.Custom('DogStoryName')], é abatido"
 butcher_animals_decision.tt.cooldown.horses: "Todo [follower|lE] com um cão"
 butcher_animals_decision.tt.elephants: "Adeus, bons meninos."
 butcher_animals_decision.tt.provisions_gain.building.elephant: "O uivar, o triste #EMP uivar#!..."
 butcher_animals_decision.tt.cooldown.elephants: "Eh, posso conseguir outro."
 butcher_animals_decision.tt.dog.you: "Carne é carne."
 butcher_animals_decision.tt.dog.courtier: "Um Acampamento Sem Gatos"
 butcher_animals_decision.tt.recently_ate_dogs: "Não é difícil matar um gato, nem mesmo é um pouco esportivo.\n\n"
 butcher_animals_decision.tt.cat.you: "Eu... não queria que as coisas com [ROOT.Char.Custom('CatStoryName')] terminassem assim, de verdade, mas precisamos de cada migalha e pedaço de comida que conseguirmos reunir.\n\nMesmo que seja meu fiel e leal [ROOT.Char.Custom('CatStoryGirlBoy')]."
 butcher_animals_decision.tt.cat.courtier: "Especialmente quando só há um felino a ser encontrado em todo o acampamento, mas precisamos #EMP de#! comida, #EMP qualquer#! comida."
 butcher_animals_decision.tt.recently_ate_cats: "Não há nem tantos para capturarmos, e uma vez que os reunimos, os pobres bichos estão em grande parte indefesos. Em confinamento, não podem fazer nada além de sibilos de irritação ou ronronos confusos."
 butcher_animals_decision.tt.horse.you: "$ep3_laamp_decision_event.1202.desc.eaten.some.have_cat$\n\nAté mesmo [ROOT.Char.Custom('CatStoryName')]."
 butcher_animals_decision.tt.recently_ate_horses: "Você diria que a maioria deles fugiria de nós, mas não; quando seu senso de perigo deveria prevalecer, a maioria dos felinos de [ROOT.Char.GetPrimaryTitle.GetDefinitiveName] confia em seus donos.\n\nAté [ROOT.Char.Custom('CatStoryName')]."
 butcher_animals_decision.tt.recently_ate_elephants: "Você acharia que a maioria deles escaparia de nós, mas não; quando seu senso de perigo deveria prevalecer, a maioria dos felinos de [ROOT.Char.GetPrimaryTitle.GetDefinitiveName] confia em seus donos.\n\nUm erro absurdo."
 butcher_dogs_tooltip: "\n\nUma vez que são capturados e colocados em jaulas, são facilmente eliminados, mesmo que nenhum dos meus seguidores pareça especialmente orgulhoso de si mesmos — ou de mim — por isso."
 butcher_cats_tooltip: "O gato [THIS.Char.Custom('ES_DelDela')] [THIS.Char.GetTitledFirstNameNicknamed|l], [THIS.Char.Custom('CatStoryName')], é abatido."
 butcher_horses_tooltip: "Seu gato, [THIS.Char.Custom('CatStoryName')], é abatido"
 butcher_elephants_tooltip: "Todo [follower|lE] com um gato"
 ep3_laamp_decision_event.1201.t: "Nossa companhia régia chega ao fim, [ROOT.Char.Custom('CatStoryName')]."
 ep3_laamp_decision_event.1201.desc.intro: "Não temos outra escolha."
 ep3_laamp_decision_event.1201.desc.eaten.kennels.have_dog: "Eh, é só um gato."
 ep3_laamp_decision_event.1201.desc.eaten.kennels.no_dog: "Sim, sim, corta, corta. Heh."
 ep3_laamp_decision_event.1201.desc.eaten.one.have_dog: "Carne de Cavalo para os Famintos"
 ep3_laamp_decision_event.1201.desc.eaten.one.no_dog: "A carne de cavalo é magra e abundante, não estranha a muitas dietas — #EMP se#! você puder arcar com seu consumo.\n\nDadas as circunstâncias difíceis em que nos encontramos, [ROOT.Char.GetPrimaryTitle.GetDefinitiveName] mal pode se dar ao luxo de não reduzir o rebanho,"
 ep3_laamp_decision_event.1201.desc.eaten.some.have_dog: "abatendo não apenas nossos cavalos sobressalentes, mas meu próprio [ROOT.Char.Custom('WarhorseStoryName')]."
 ep3_laamp_decision_event.1201.desc.eaten.some.no_dog: "mesmo que o único cavalo que podemos dispensar seja meu próprio [ROOT.Char.Custom('WarhorseStoryName')]."
 ep3_laamp_decision_event.1201.desc.eaten.many.have_dog: "abatendo nossos cavalos reservas em massa, apesar de sua confusão e pânico."
 ep3_laamp_decision_event.1201.desc.eaten.many.no_dog: "\n\nEssa recompensa nos custa um pouco de velocidade, mas deve nos dar tempo para encontrar uma fonte mais confiável de sustento.\n\nAo menos, espero."
 ep3_laamp_decision_event.1201.desc.outro: "Mesmo na morte, eles nos levam adiante."
 ep3_laamp_decision_event.1201.tt.dog_lost: "[ROOT.Char.Custom('WarhorseStoryName')] me faz seguir em frente até na morte."
 ep3_laamp_decision_event.1201.tt.your_dog_lost: "Honestamente, deveríamos estar comendo mais #EMP deles#!, isso está delicioso."
 ep3_laamp_decision_event.1201.tt.followers_with_dogs: "Cemitério de Elefantes"
 ep3_laamp_decision_event.1201.a.own_dog: "Depois dos primeiros, a manada parece perceber que algo está errado.

Só com muito esforço conseguimos controlá-los e realmente começar o abate — naturalmente focando nos velhos, nos doentes, nos fracos e nos jovens.

Um a um, levamos nossa reserva de elefantes primeiro à espada, depois ao cutelo do açougueiro.

Um trabalho horrendo e ensanguentado, tornado ainda mais difícil por seus gritos guturais de pânico e seus bramidos de terror.

Mas são eles ou nós."
 ep3_laamp_decision_event.1201.a: "A morte deles é nossa salvação."
 ep3_laamp_decision_event.1201.b.own_dog: "Pela [ROOT.Char.GetFaith.HealthGodName], o tamanho desses #EMP bifes#!."
 ep3_laamp_decision_event.1201.b: "$ep3_laamp_decision_event.1204.t$: Repercussões"
 ep3_laamp_decision_event.1202.t: "Já faz um ano desde que o desespero de nossa jornada nos #EMP obrigou#! a tomar... medidas drásticas.\n\nPor mais inteligentes que sejam, os elefantes também têm muita carne, e quando a coisa se resumiu às nossas vidas contra as deles, a escolha se mostrou bastante simples.\n\nPartimos para cima da nossa manada com machados e facas de açougueiro, abatendo velhos e jovens com sombria determinação, sabendo que seu sacrifício era necessário.\n\nAinda assim, parece que o restante dos elefantes — os que são usados por nossos guerreiros — #EMP lembram#! o massacre. As feras dão trabalho, recusam-se a obedecer nossas ordens e não fazem praticamente nada que não envolva autopreservação ou alimentação.\n\nAté são #EMP frustrantemente#! hostis comigo pessoalmente, pois parecem me responsabilizar como líder da manada humana."
 ep3_laamp_decision_event.1202.desc.intro: "Maldição e explosão, essas bestas recalcitrantes!"
 ep3_laamp_decision_event.1202.desc.eaten.one.have_cat: "Você nunca poderá utilizar a elefanteria de forma eficaz novamente"
 ep3_laamp_decision_event.1202.desc.eaten.one.no_cat: "Elefantes Nunca Esquecem"
 ep3_laamp_decision_event.1202.desc.eaten.some.have_cat: "Nem perdoam."
 ep3_laamp_decision_event.1202.desc.eaten.some.no_cat: "Reclamador Bizantino Ascendente"
 ep3_laamp_decision_event.1202.desc.eaten.many.have_cat: "As orações dos fiéis, as esperanças daqueles que desejam ver a Bizâncio restaurada, repousam sobre este governante decisivo."
 ep3_laamp_decision_event.1202.desc.eaten.many.no_cat: "Reclamador Bizantino Ascendente"
 ep3_laamp_decision_event.1202.desc.outro: "As esperanças daqueles que desejam ver a Bizâncio restaurada repousam sobre este governante decisivo."
 ep3_laamp_decision_event.1202.tt.cat_lost: "Você detém [GetTitleByKey('e_byzantium').GetName]"
 ep3_laamp_decision_event.1202.tt.your_cat_lost: "Se você não possuir o [title|lE] de [kingdom|lE], você ganhará uma [pressed_claim|lE]"
 ep3_laamp_decision_event.1201.tt.followers_with_cats: "Humilhar o $stooge_camp_officer$"
 ep3_laamp_decision_event.1202.a.own_cat: "Seja ovos podres, vegetais estragados ou palavras ferinas, o povo sempre exige alguma humilhação pública."
 ep3_laamp_decision_event.1202.a: "Ha, #EMP ha!#!"
 ep3_laamp_decision_event.1202.b.own_cat: "Troque algum [prestige|lE] por uma vida agradável e [stress|lE] livre"
 ep3_laamp_decision_event.1202.b: "Você humilha publicamente seu $stooge_camp_officer$:\n$EFFECT_LIST_BULLET$ Você perde um pouco de [stress_i] [stress|lE]\n$EFFECT_LIST_BULLET$ Você ganha um pouco de [dread_i] [dread|lE]\n$EFFECT_LIST_BULLET$ Você ganha o [GetModifier( 'stooge_humiliated_modifier' ).GetNameWithTooltip] [modifier|lE] por #high 2#! anos"
 ep3_laamp_decision_event.1203.t: "Humilhado o Stooge"
 ep3_laamp_decision_event.1203.desc.intro: "Ah. É bom quando coisas ruins acontecem a pessoas ruins."
 ep3_laamp_decision_event.1203.desc.eaten.both: "Você Humilha [stooge.GetShortUIName]"
 ep3_laamp_decision_event.1203.desc.eaten.own_horse: "[stooge.GetShortUIName] Parece Irritado..."
 ep3_laamp_decision_event.1203.desc.eaten.reserve_steeds: "[stooge.GetShortUIName] Está Gemendo"
 ep3_laamp_decision_event.1203.desc.outro: "[stooge.GetShortUIName] Foge em Lágrimas"
 ep3_laamp_decision_event.1203.a.many_steeds: "Afastou o Stooge"
 ep3_laamp_decision_event.1203.a.single_steed: "Este personagem humilhou o mesmo $stooge_camp_officer$ por tanto tempo que ele fugiu."
