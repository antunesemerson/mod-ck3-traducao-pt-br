 change_state_faith: "Meu sonho,"
 change_state_faith_decision_desc: "O sonho do meu mentor,"
 change_state_faith_decision_selection_tooltip: "um centro próspero e agitado para as artes aqui em [location.GetName], finalmente se concretou.\n\nÀ medida que as últimas tábuas de madeira são colocadas no chão, o cheiro de tijolos recém-pintados se espalha pelo pátio. Uma aclamação sobe da multidão que assiste quando recebo os órfãos locais para que comecem suas aulas.\n\nTudo o que desejo é que ele permaneça de pé por gerações."
