 ep3_laamp_decision_event.1100.t: "$zealous_missionary_prep_decision$"
 ep3_laamp_decision_event.1100.desc: "Há poucos lugares nesta Terra onde o poder de [ROOT.Char.GetFaith.HighGodName] onipotente possa ser testemunhado como em [holy_site_location.GetNameNoTooltip]. Benditos sejam os fiéis que viajam até aqui para sentir seu poder.\n\nPara muitos, esta terra sagrada é o fim de sua jornada, o auge de suas vidas. Mas para mim, este é apenas o começo do meu caminho.\n\nE para aqueles a quem estou prestes a levar Sua luz, sua única chance de salvação."
 ep3_laamp_decision_event.1100.a: "Eu me banho na glória de [ROOT.Char.GetFaith.HighGodName|U]!"
 ep3_laamp_decision_event.1100.a.flavor: "$zealous_missionary_prep_decision_reward_desc$\nPara continuar em seu caminho piedoso, você precisa se mover para terras infiéis."
 ep3_laamp_decision_event.1100.a.desc: "O Caminho do [ROOT.Char.GetFaith.GetAdherentNameNoTooltip] — Prelúdio"
 ep3_laamp_decision_event.1100.b: "Não se pode esperar que [ROOT.Char.GetFaith.HighGodName|U] faça todo o trabalho. [ROOT.Char.GetFaith.HighGodNameSheHe|U] precisa dos fiéis para guiar os perdidos... quer eles queiram ou não."
 ep3_laamp_decision_event.1100.b.flavor: "Sua localização deve seguir uma [faith|lE] diferente"
 ep3_laamp_decision_event.1100.b.desc: "Preciso ser uma das boas almas [ROOT.Char.GetFaith.GetAdjectiveNoTooltip] s"
