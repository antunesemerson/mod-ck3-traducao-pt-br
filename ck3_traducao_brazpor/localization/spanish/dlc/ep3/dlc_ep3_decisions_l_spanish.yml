 eastern_kingdoms_held_or_vassals_tt: "O #bold Pandidakterion#!, que significa 'lugar para todos os ensinamentos', foi fundado em 425 d.C. por Teodósio II e abrigava 31 cátedras, metade ensinadas em latim e metade em grego. Foi refundado por Constantino IX em 1046 e sobreviveu até a conquista otomana em 1453."
 every_county_in_theodosian_region: "Você possui o [GetTitleByKey('c_byzantion').GetName]"
 ep3_decisions_event.4000.t: "As Fronteiras de Teodósio"
 ep3_decisions_event.4000.desc: "Pedir Apoio"
 ep3_decisions_event.4000.a: "Bizâncio sempre foi o baluarte mais oriental do cristianismo, mas a atual guerra contra os inimigos da Verdadeira Fé está nos drenando de força e recursos. Embora nossos relacionamentos com as outras ramificações do cristianismo não sejam fáceis, pode ser hora de engolir nosso orgulho e pedir ajuda aos nossos irmãos em Cristo."
 PARS_ORIENTIS_GLOSS: "Contatar nossos irmãos cristãos de outra fé e pedir seu apoio"
 #Pandidakterion
 refound_pandidakterion_decision: "[caller.Custom2('AppropriateGreeting', called )]"
 refound_pandidakterion_decision_desc: "[called.Custom('SisterBrother')|U] em Cristo, nossa posição como o baluarte oriental do cristianismo está em perigo, pois a atual guerra contra os infiéis colocou uma pressão sobre nossos recursos.\n\nPor favor, ajude-nos a repelir o inimigo comum."
 refound_pandidakterion_decision_tooltip: "Nós ajudaremos você — pela motivação certa!"
 refound_pandidakterion_decision_confirm: "Devemos submetê-lo à autoridade de [ROOT.Char.GetFaith.GetReligiousHead.Custom('ES_DelDela')] [ROOT.Char.GetFaith.GetReligiousHeadTitle.GetNameNoTooltip|l]."
 chancellor_domestic_affairs_opinion_pandidakterion_bonus_desc: "Apenas [ROOT.Char.GetFaith.GetReligiousHead.GetSheHe] pode decidir que tipo de ajuda a cristandade pode oferecer a seus irmãos extraviados."
 task_organize_levies_pandidakterion_bonus_desc: "[ROOT.Char.Custom('ES_ElLa')|U] [ROOT.Char.GetTitledFirstNameNoTooltip|l] pergunta ao seu líder religioso"
 task_organize_levies_maintenance_pandidakterion_bonus_desc: "Desculpe, não podemos ajudar você."
 PANDIDAKTERION_GLOSS: "[ROOT.Char.Custom('ES_ElLa')|U] [called.GetTitledFirstNameNoTooltip|l] se recusou a ajudar"
 pandidakterion_tt: "Se você prometer apoiá-los, o Exército de Cristo marchará com você!"
 #Crusades
 ask_western_help_decision: "[sponsor.Custom2('AppropriateGreeting', called )]"
 ask_western_help_decision_desc: "Recebi um pedido de ajuda [caller.Custom('ES_DelDela')] [caller.GetTitledFirstName|l]. Embora suas crenças estejam erradas, seu povo ainda é nosso irmão em Cristo e há muito tempo atua como o baluarte oriental da cristandade.\n\nHá alguma forma de estendermos uma mão amiga a eles?"
 ask_western_help_decision_tooltip: "Nós ajudaremos, mas não de graça."
 ask_western_help_decision_confirm: "[pope.Custom('ES_ElLa')|U] [pope.GetTitledFirstNameNoTooltip|l] enviará ajuda"
 ep3_decisions_event.4010.t: "Se eles prometerem apoio, o Exército de Cristo marchará com eles!"
 ep3_decisions_event.4010.desc: "![pope.Custom('ES_ElLa')|U] [pope.GetTitledFirstNameNoTooltip|l] pode convocar uma [pope.GetFaith.GHWName|l]!"
 ep3_decisions_event.4010.a: "[called.Custom2('AppropriateGreeting', caller )]"
 ep3_decisions_event.4010.b: "Ouvimos a súplica de nossos irmãos e irmãs em Cristo e desejamos ajudar. Se você prometer seu apoio, os exércitos da cristandade se unirão em sua defesa em uma sagrada [pope.GetFaith.GHWName|l]!"
 ep3_decisions_event.4010.b.tt_2: "Aceito sua oferta."
 ep3_decisions_event.4010.b.tt: "Você se compromete a enviar [caller.MakeScope.ScriptValue('massive_gold_value')|V0] @gold_icon! ao cofre de guerra da [pope.GetFaith.GHWName|l]."
 ep3_decisions_event.4010.c: "Isso não é o que eu pedi!"
 ep3_decisions_event.4010.c.tt: "[caller.GetTitledFirstNameNoTooltip|U] recuou[caller.Custom('ES_OA')]"
 ep3_decisions_event.4011.b: "Com um coração grato, aceitamos sua oferta de ajuda e aguardamos ansiosamente a chegada dos exércitos de apoio.\n\nPor favor, apresse-se."
 ep3_decisions_event.4011.c: "#EMP Deus Vult!#!"
 ep3_decisions_event.4012.t: "[pope.Custom('ES_ElLa')|U] [pope.GetTitledFirstNameNoTooltip|l] convocou uma [pope.GetFaith.GHWName|l]!"
 ep3_decisions_event.4012.desc: "Ouvimos o pedido de nossos irmãos e irmãs em Cristo, e nossos corações sangram por seus sofrimentos. No entanto, a ajuda não vem barata.\n\nSe você puder apoiar nossos esforços com uma compensação monetária, prometemos enviar tropas em seu auxílio."
 ep3_decisions_event.4012.a: "Assim seja."
 ep3_decisions_event.4012.a.tt: "Não pedi por condições."
 ep3_decisions_event.4012.b: "[caller.Custom('ES_ElLa')|U] [caller.GetTitledFirstNameNoTooltip|l] aceitou sua oferta"
 ep3_decisions_event.4012.b.tt: "Irmãos Cristãos em Necessidade"
 ep3_decisions_event.4013.t: "Voluntários Religiosos"
 ep3_decisions_event.4013.desc: "O [war_leader|lE] inimigo não é cristão e ou possui um título de [kingdom|lE] ou faz parte de [Concept( 'kingdom', 'uno' )|E]"
 ep3_decisions_event.4013.a: "Enviarás uma solicitação de ajuda militar a um líder cristão de uma fé diferente. Ele pode pedir ouro em troca de tropas ou recusar. Se um [head_of_faith|lE] se envolver, a situação pode escalar até se tornar uma Grande Guerra Santa!\n\nA decisão tem um tempo de recarga de 20 anos."
 ep3_decisions_event.4013.a.tt: "Seu [Concept( 'realm_size', 'tamanho do seu senhorio' )|E] é inferior a #N 84#! condados"
 ep3_decisions_event.4013.b: "Você já tomou a decisão nos últimos 20 anos!"
 ep3_decisions_event.4013.b.tt: "Ainda há alguém a quem você pode pedir ajuda"
 ep3_decisions_event.4014.desc: "Com um coração grato, aceitamos sua oferta de ajuda e aguardamos ansiosamente a chegada dos exércitos de apoio.\n\nPor favor, apresse-se."
 ep3_decisions_event.4014.a: "Evangelizar os Pagãos"
 ep3_decisions_event.4014.a.tt: "Como depositário da única fé verdadeira, o dever de [GetTitleByKey('e_byzantium').GetName] é evangelizar os pagãos e acolhê-los no redil de nossa Igreja como nossos irmãos e irmãs mais jovens em Cristo. Isso é ainda mais relevante, pois eles vivem logo além de nossas fronteiras e ameaçam a integridade e a segurança do império."
 ep3_decisions_event.4015.desc: "Envie um missionário para converter seus vizinhos pagãos"
 ep3_decisions_event.4015.a: "Enviar o Missionário"
 ep3_decisions_event.4015.b: "Você enviará um missionário para tentar converter o governante vizinho de uma fé pagã.\n$EFFECT_LIST_BULLET$ Se o missionário tiver sucesso, o governante se converterá à sua [faith|lE] e será seu [ally|lE]. Você ganhará uma [legend_seed|lE].\n$EFFECT_LIST_BULLET$ Participar desse esforço de evangelização é visto como um empreendimento tão prestigioso que você ganhará [influence|lE] e [prestige|lE] mesmo que seu missionário fracasse."
 ep3_decisions_event.4015.a.tt: "Evangelizando os [pagan.GetCulture.GetCollectiveNounNoTooltip]"
 called_for_help_fervor: "O Reino dos Céus pertence aos fiéis, mas nosso vizin[pagan.Custom('ES_OA')], [pagan.Custom('ES_ElLa')] [pagan.GetTitledFirstName|l], ignora isso e persiste em acreditar em superstições e falsos deuses.

Salvar sua alma e as de seu povo é uma nobre empreitada em si, mas sua conversão também tem vantagens #EMP terrenas#!; para começar, reduzir sua hostilidade contra nós e trazê-los para a nossa própria esfera de influência.

[Select_CString(evangelizer.IsFemale, 'Minha missionária escolhida', 'Meu missionário escolhido' )], [evangelizer.GetFirstName], está list[evangelizer.Custom('ES_OA')] para partir."
 ep3_religious_volunteers_army: "Que [ROOT.Char.GetFaith.HighGodName] te guie!"
 valid_primary_war_enemy_for_crusade: "[evangelizer.GetFirstNameNoTooltip] parte para a capital [pagan.Custom('ES_DelDela')] [pagan.GetTitledFirstNameNoTooltip|l]."
 ask_western_help_decision_effect_desc: "Os emissários de nossos vizinhos vêm e vão com tanta frequência que todos se misturam na minha mente. No entanto, [Select_CString(evangelizer.IsFemale, 'a enviada', 'o enviado' )] de hoje de [GetTitleByKey('e_byzantium').GetName] se destaca como nenhum antes.

Para começar, parece ser uma espécie de [evangelizer.GetWomanMan] sant[evangelizer.Custom('ES_OA')] e, em vez de apresentar exigências políticas, est[evangelizer.Custom('ES_EA')] [evangelizer.GetFirstName] prega sobre um Deus onipotente, honrado em templos de ouro e prata que sempre cheiram a incenso."
 valid_realm_size_for_help: "Por favor, me conte mais."
 recently_asked_for_help: "Você cria uma [alliance|lE] com [sender.Custom('ES_ElLa')] [sender.GetTitledFirstName|l], [Select_CString(sender.IsFemale, 'la señora', 'el señor' )] [evangelizer.Custom('ES_DelDela')] [evangelizer.GetTitledFirstNameNoTooltip|l]"
 there_is_someone_to_ask_for_help: "Não precisamos de novos deuses."
 #Proselytize
 evangelize_the_slavs_decision: "Isso certamente enviará uma mensagem: seus pregadores não são bem-vindos aqui! Mas devemos estar prontos para represálias..."
 evangelize_the_slavs_decision_desc: "Meu predecessor[sender.Custom('ES_XA')], [sender.GetFirstName], investiu na evangelização dos [pagan.GetCulture.GetCollectiveNounNoTooltip], mas, infelizmente para [sender.GetHerHim], serei eu quem colherá os benefícios de seus esforços. De fato, seu missionár[evangelizer.Custom('ES_OA')], [evangelizer.GetFirstName], acaba de voltar."
 evangelize_the_slavs_decision_tooltip: "Há meses enviei meu leal [evangelizer.GetFirstName] para que levasse o conhecimento de Deus aos [pagan.GetCulture.GetCollectiveNounNoTooltip]. É com grande alegria que o recebo de volta hoje, pois estive aguardando ansiosamente o relatório dele."
 evangelize_the_slavs_decision_confirm: "\n\nTrago ótimas notícias, meu senhor[ROOT.Char.Custom('ES_XA')]! [pagan.Custom('ES_ElLa')|U] [pagan.GetTitledFirstName|l] tinha muita vontade de ouvir as Boas-Novas e se converteu à [evangelizer.GetFaith.GetName|l], junto com muitos de seu povo."
 evangelize_the_slavs_decision_effect: "\n\n"Trago más notícias, meu senhor[ROOT.Char.Custom('ES_XA')]. Infelizmente, [pagan.Custom('ES_ElLa')] [pagan.GetTitledFirstName|l] permaneceu indiferente à Palavra de Deus e me mandou de volta de mãos vazias"."
 ep3_decisions_event.4020.t: "Excelente!"
 ep3_decisions_event.4020.desc: "O Reino dos Céus pertence aos fiéis, mas nosso vizin[pagan.Custom('ES_OA')], [pagan.Custom('ES_ElLa')] [pagan.GetTitledFirstName|l], ignora isso e persiste em acreditar em superstições e falsos deuses.

Salvar sua alma e as de seu povo é uma nobre empreitada em si, mas sua conversão também tem vantagens #EMP terrenas#!; para começar, reduzir sua hostilidade contra nós e trazê-los para a nossa própria esfera de influência.

[Select_CString(evangelizer.IsFemale, 'Minha missionária escolhida', 'Meu missionário escolhido' )], [evangelizer.GetFirstName], está list[evangelizer.Custom('ES_OA')] para partir."
 ep3_decisions_event.4020.a: "\n$EFFECT_LIST_BULLET$ Tem uma [GetFaithDoctrine('unreformed_faith_doctrine').GetBaseName|l] [GetReligionFamily('rf_pagan').GetName|l] [faith|lE]\n$EFFECT_LIST_BULLET$ Não está em [war|lE]\n$EFFECT_LIST_BULLET$ Não rejeitou violentamente uma tentativa de conversão anteriormente"
 ep3_decisions_event.4020.a.tt: "A aliança entrará em vigor assim que [evangelizer.GetNameNoTooltip] retornar ao seu suserano."
 ep3_decisions_event.4022.desc: "Os emissários de nossos vizinhos vêm e vão com tanta frequência que todos se misturam na minha mente. No entanto, [Select_CString(evangelizer.IsFemale, 'a enviada', 'o enviado' )] de hoje de [GetTitleByKey('e_byzantium').GetName] se destaca como nenhum antes.

Para começar, parece ser uma espécie de [evangelizer.GetWomanMan] sant[evangelizer.Custom('ES_OA')] e, em vez de apresentar exigências políticas, est[evangelizer.Custom('ES_EA')] [evangelizer.GetFirstName] prega sobre um Deus onipotente, honrado em templos de ouro e prata que sempre cheiram a incenso."
 ep3_decisions_event.4022.a: "Por favor, me conte mais."
 ep3_decisions_event.4022.a.tt: "Você cria uma [alliance|lE] com [sender.Custom('ES_ElLa')] [sender.GetTitledFirstName|l], [Select_CString(sender.IsFemale, 'la señora', 'el señor' )] [evangelizer.Custom('ES_DelDela')] [evangelizer.GetTitledFirstNameNoTooltip|l]"
 ep3_decisions_event.4022.b: "Restaurar o Império Bizantino"
 ep3_decisions_event.4022.c: "A destruição de [GetTitleByKey('e_byzantium').GetName] foi uma tragédia sem precedentes para nosso povo, mas seguimos lutando. Afinal, enquanto existir um único [Glossary( 'romaios', 'ROMAIOS_GLOSS' )], Roma ainda existirá.\n\nUm dia, um soberano legítimo voltará a se sentar no trono de Constantinopla, e o império se erguerá mais uma vez."
 ep3_decisions_event.4022.c.tt: "Criar [GetTitleByKey('e_byzantium').GetName] e reinstituir seus antigos costumes"
 ep3_decisions_event.4025.desc_new: "Roma renasce!"
 ep3_decisions_event.4025.desc_old: "Um Império Renascente"
 ep3_decisions_event.4025.desc_success: "Pela morte dos fiéis, pelo fogo da retórica, pela própria vontade de [ROOT.Char.GetFaith.HighGodName]: eis que o #EMP [GetTitleByKey('e_byzantium').GetName|U] vive de nuevo!#!\n\nContemplo a Rainha das Cidades enquanto uma brisa morna do mar de Mármara brinca com minhas vestes reais. Belos cânticos ecoam da grande casa da Santa Sabedoria. Os cidadãos dançam nas ruas, dando voz à gratidão e à alegria.\n\nNossos dias de humilhação, quando o mundo escarnecia dos [Glossary( 'romaioi', 'ROMAIOS_GLOSS' )], sem dúvida chegaram ao fim. Um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] legítim[ROOT.Char.Custom('ES_OA')] volta a sentar-se no trono de [GetScriptedCharacterByHistoryID( '70523' ).GetFirstName].\n\n#EMP Yo.#!"
 ep3_decisions_event.4025.desc_failure: "A glória de Roma continuará a crescer!"
 ep3_decisions_event.4025.a: "#bold Romaioi#! (singular #bold Romaios#!) é a transliteração grega do nome latino #bold Romani#!, como os romanos se chamavam. Ao longo da Idade Média, os bizantinos se identificaram como romanos e chamaram seu império de #EMP Basileia ton Romaion#!, o Império dos Romanos."
 ep3_decisions_event.4025.b: "É apenas um retrocesso temporário."
 ep3_decisions_event.4026.desc: "Fundar a Guarda Varangiana"
 ep3_decisions_event.4026.a: "Durante anos, guerreiros das terras mais remotas do Norte se reuniram em Constantinopla, atraídos por nossas riquezas. Eles oferecem seus serviços como mercenários, uma arte na qual são exímios, e não têm lealdades além do dinheiro e de seu próprio orgulho. Se conseguirmos organizar sua presença em torno do Imperador, teremos uma força militar invencível ao nosso serviço pessoal!"
