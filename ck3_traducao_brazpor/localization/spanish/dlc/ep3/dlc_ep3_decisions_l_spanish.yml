 consolidate_rule_decision: "Adotar a Fé do Estado"
 consolidate_rule_decision_desc: "Adotar a [state_faith|lE] de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip|l] assinala um momento crucial. Alinhar meu caminho espiritual com a vontade de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip|l] reforçará minha posição como [ROOT.Char.GetTitleAsNameNoTooltip|l] e não há dúvida de que forjará uma conexão mais profunda com meus súditos."
