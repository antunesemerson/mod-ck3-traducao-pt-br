 ep3_decisions_event.4023.t: "Reinstaurar a Distribuição de Grãos" #AI event, leave empty
 ep3_decisions_event.4023.desc: "Por séculos, os cidadãos de Roma, e mais tarde de Constantinopla, desfrutaram do maior benefício de viver na Capital do Mundo: distribuições regulares de pão gratuito ou com preço controlado. A tradição foi perdida junto com o Celeiro de Roma — Egito — mas qualquer Imperador que a reinstaurar aumentaria imediatamente sua popularidade com as massas." #AI event, leave empty
 ep3_decisions_event.4023.a: "Introduzir distribuições de pão para o povo da capital" #AI event, leave empty
