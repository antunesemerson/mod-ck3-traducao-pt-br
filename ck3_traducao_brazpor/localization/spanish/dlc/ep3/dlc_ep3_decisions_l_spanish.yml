 seasoned_visitor_decision_not_enough_poi_advanced: "Nos próximos dez anos, você trilhará o caminho de um missionário [THIS.Char.GetFaith.GetAdherentNameNoTooltip] piedoso:\n#weak Você poderá converter os condados que visitar para o [THIS.Char.GetFaith.GetName|l], seja pela verdade de suas palavras ou pela força de sua espada.\n#bold Gran peligro#! aguarda aqueles que falharem no caminho, pois somente os dignos receberão a recompensa de Sua graça em Sua [THIS.Char.GetFaith.PositiveAfterLife|U].\n\n$EFFECT_LIST_BULLET$ @alert_icon! $ep3_laamp_decision_event.1103.difficulty.desc$\n$EFFECT_LIST_BULLET$ [learning_i] $ep3_laamp_decision_event.1103.a.desc$\n$EFFECT_LIST_BULLET$ [martial_i] $ep3_laamp_decision_event.1103.b.desc$"
