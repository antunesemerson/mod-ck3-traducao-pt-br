 ep3_decisions_event.4080.desc.outro: "Tragam-me [imprisoned_house_head.GetName] cobert[imprisoned_house_head.Custom('ES_OA')] de grilhões. Quem foi outrora [imprisoned_house_head.Custom('ES_ElLa')] líder da casa [imprisoned_house_head.GetHouse.GetName] se ajoelha diante de mim; sua expressão reflete uma mistura de desafio e desespero.\n\n“Vossa Majestade”, começa com a voz quebrada pela vergonha, “imploro-vos, libertai-me destas correntes. A ambição cega, mas agora vejo onde está de fato o meu lugar.”\n\n“Tende clemência e juro ser vosso[imprisoned_house_head.Custom('ES_OA')] súdito[imprisoned_house_head.Custom('ES_OA')] mais leal, já despojad[imprisoned_house_head.Custom('ES_OA')] de meu antigo orgulho.”"
