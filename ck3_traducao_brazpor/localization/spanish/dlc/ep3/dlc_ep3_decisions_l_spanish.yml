 ep3_decisions_event.4030.a: "A Distribuição de Grãos"
 ROMAIOS_GLOSS: "O povo tem motivos de sobra para celebrar o retorno à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]!\n\nMais uma vez, graças a #EMP mis#! esforços, [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], a capital do mundo recebe um fluxo constante de grãos baratos do Egito, exatamente como acontecia há séculos.\n\nE, como disse apropriadamente o antigo poeta, tudo o que precisamos para manter o povo satisfeito é pão e circo!"
 #Varangian Guard
 found_varangian_guard_decision: "Reconfirmar a Distribuição de Grãos"
 found_varangian_guard_decision_desc: "Após sua reintrodução formal, os cidadãos de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] se acostumaram aos luxos oferecidos pela Doação de Grãos — as distribuições regulares de pão gratuito ou com preço controlado. É um instrumento poderoso nas mãos de qualquer Imperador para garantir a produtividade de seu povo e sua própria popularidade."
