 ep3_decisions_event.7000.a.crit_failure: "#HIGH [new_holder.GetName]#!:\n$EFFECT_LIST_BULLET$ Recebe o [eastern_roman_empire|E]\n$EFFECT_LIST_BULLET$[GetTitleByKey( 'c_byzantion' ).GetBaseNameNoTier] se torna sua nova [realm_capital|lE]"
 ep3_decisions_event.7000.b: "Os efeitos iniciais de restaurar Roma serão revertidos:\n$EFFECT_LIST_BULLET$ Todas as [peasant_factions|lE] do seu [realm|lE] deixarão de ter você como alvo\n$EFFECT_LIST_BULLET$ A frequência de [wars|lE] de outros [titles|lE] de reino será reduzida\n$EFFECT_LIST_BULLET$ A frequência das [Concept('epidemic', 'epidemias')|E] será reduzida\n$EFFECT_LIST_BULLET$ A linha do tempo da invasão mongol voltará ao normal#!"
 ep3_decisions_event.7000.c: "As viagens de [ROOT.Char.GetFullNameNoTooltip]"
 ep3_decisions_event.7000.c.named: "Eu viajei por longas distâncias, estive em lugares estranhos e exóticos. A sabedoria que acumulei é inimitável, um tesouro para qualquer alma curiosa e erudita."
 ep3_decisions_event.7000.c.crit_success: "Olhe para suas viagens"
 ep3_decisions_event.7000.c.success: "Você desbloqueará novas [lifestyle|lE] [perks|lE] #EMP ou#! criará um Livro [artifact|lE] que aumentará o ganho de [lifestyle_experience|lE] para futuros portadores\n#i Cada #V 12#! visitado $game_concept_points_of_interest$, até #V 60#!, aumentará as recompensas#!"
 ep3_decisions_event.7000.c.failure: "Eu vi coisas maravilhosas"
 ep3_decisions_event.7000.c.crit_failure: "Você visitou #color_white 26#! [points_of_interest|lE] #weak (Atual: [THIS.Var('poi_visited').GetValue|V0])#!"
 ep3_decisions_event.7000.d: "Você visitou #color_white 42#! [points_of_interest|lE] #weak (Atual: [THIS.Var('poi_visited').GetValue|V0])#!"
 ep3_decisions_event.7000.d.named: "Não é este o Criador de Artefatos"
 ep3_decisions_event.7000.d.crit_success: "$seasoned_visitor_decision$"
 ep3_decisions_event.7000.d.success: "O sol radiante que se ergue sobre os picos nevados das montanhas, os bairros humildes efervescentes das cidades em expansão, os templos que abrigam as almas mais piedosas e as mais abjetas.\n\nAs obras dos homens ao longo dos séculos, as maravilhas da natureza criadas pela mão de [ROOT.Char.GetFaith.HighGodName] onipotente. Eu vi tudo.\n\nFalei com nobres e plebeus por igual, vi pessoas viverem de inúmeras maneiras. Semelhante tesouro de observações perspicazes, de minhas reminiscências impecáveis, seria uma maravilha estimada por qualquer um com sequer uma centelha de curiosidade... se eu decidisse escrevê-lo."
 ep3_decisions_event.7000.d.failure: "Minhas memórias pertencem somente a mim."
 ep3_decisions_event.7000.d.crit_failure: "Posso falar e falar, mas o ouvinte retém apenas as palavras que espera."
