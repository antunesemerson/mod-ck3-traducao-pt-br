 reconfirm_grain_dole_decision: "Mudar a Fé do Estado"
 reconfirm_grain_dole_decision_desc: "Reformar a [state_faith|lE] é uma jogada ousada. Reestruturar a tradição espiritual de [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] para que esteja à altura da minha visão… Sem dúvida, redefinirá a identidade do domínio e o meu legado como [ROOT.Char.GetTierAsNameNoTooltip|l]."
