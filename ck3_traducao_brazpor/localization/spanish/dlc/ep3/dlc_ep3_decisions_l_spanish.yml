 ep3_decisions_event.5000.t: "Ícone Realizado"
 ep3_decisions_event.5000.desc: "Abraçar a Heresia"
 ep3_decisions_event.5000.a: "Apesar de existir uma fé oficial respaldada por [ROOT.Char.GetTopLiege.Custom('ES_ElLa')] [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetNameNoTooltip|l], as crenças heréticas abundam em nossas terras. Se eu adotasse publicamente uma delas e me colocasse à sua frente, poderia canalizar o potencial bruto de uma fé desenfreada para aumentar meu poder e perseguir minha agenda política."
 theotokos: "Abraçar uma heresia e se tornar seu líder"
 ladder_heaven: "Uma [faith|lE] seguida por pelo menos 3 [counties|lE], que pertença à mesma [religion|lE] que a [state_faith|lE] do [realm|lE] de seu [top_liege|lE], mas seja considerada [faith_hostile|lE], deve estar presente em pelo menos 1 condado do [realm|lE] de seu [top_liege|lE] ou em um condado estrangeiro adjacente"
 pantokrator: "Abraçando a Heresia"
 annunciation: "A oportunidade é clara, e eu só preciso aproveitá-la.\n\nA fé [heresy_1.GetAdjective|U] está em ascensão em [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetNameNoTooltip] e precisa de um guia forte e influente para representá-la no palco político. Claro, colocar-me na posição de ser considerado um herege é um risco, mas o potencial inexplorado de reunir uma minoria perseguida em torno de uma bandeira compartilhada é tentador."
 saint_peter: "\n\nA cena religiosa do [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip] é tão fragmentada que não preciso me limitar à minha primeira escolha também."
 saint_paul: "O [heresy_1.GetNameNoTooltip|l] é o caminho"
 saint_theodore: "Talvez [heresy_2.GetNameNoTooltip|l] pareça mais promissora?"
 saint_basil: "O [heresy_3.GetNameNoTooltip|l] tem o maior potencial."
 moses: "Talvez eu esteja sendo precipitado..."
 archangel_michael: "Você abraçará a heresia escolhida [faith|lE]"
 crucifixion: "Você colherá os benefícios em [hooks|lE] e [influence|lE], proporcionalmente ao número de [vassals|lE] e [counties|lE] do [realm|lE] de seu [top_liege|lE] que sigam a mesma [faith|lE] herética que você"
 commission_icon_decision: "Desbloquear o [GetDecisionWithKey('push_heresy_as_state_faith').GetName|l] [decision|lE]"
 commission_icon_decision_desc: "Você abraçou uma [faith|lE] através do [GetDecisionWithKey('embrace_heresy_decision').GetName|l] [decision|lE] e ainda a segue"
 commission_icon_decision_tooltip: "Impor Mudança de Fé do Estado"
 commission_icon_decision_confirm: "O apoio popular da fé que lidero tem crescido por toda [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetNameNoTooltip]. Está na hora de que [ROOT.Char.GetTopLiege.Custom('ES_ElLa')] [ROOT.Char.GetTopLiege.GetTitleAsNameNoTooltip|l] reconheça nosso poder e admita que a [ROOT.Char.GetFaith.GetName] é a única opção válida como fé oficial de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip]!"
 THEOTOKOS_GLOSS: "Tente pressionar seu suserano a reconhecer sua fé como a fé do estado"
 PANTOKRATOR_GLOSS: "Seu suserano avaliará seu pedido. Quanto mais forte for sua posição política e religiosa, mais provável será a aceitação. Aumente sua [influence|lE] e o número de [vassals|lE] e [counties|lE] em seu [top_liege|lE]'s [realm|lE] que seguem sua mesma [faith|lE] para aumentar sua chance de sucesso."
