 knight_errant_decision_tt: "Uma donzela justa foi ameaçada por um cavaleiro maligno, mas [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] o derrotou em um combate singular, um [ROOT.Legend.GetProperty( 'friendly_animal' ).GetFlagName] branco nascendo da poça de sangue."
