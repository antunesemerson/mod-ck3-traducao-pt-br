 ep3_laamp_decision_event.1205.desc: "Já faz um ano desde que o desespero de nossa jornada nos #EMP obrigou#! a tomar... medidas drásticas.\n\nPor mais inteligentes que sejam, os elefantes também têm muita carne, e quando a coisa se resumiu às nossas vidas contra as deles, a escolha se mostrou bastante simples.\n\nPartimos para cima da nossa manada com machados e facas de açougueiro, abatendo velhos e jovens com sombria determinação, sabendo que seu sacrifício era necessário.\n\nAinda assim, parece que o restante dos elefantes — os que são usados por nossos guerreiros — #EMP lembram#! o massacre. As feras dão trabalho, recusam-se a obedecer nossas ordens e não fazem praticamente nada que não envolva autopreservação ou alimentação.\n\nAté são #EMP frustrantemente#! hostis comigo pessoalmente, pois parecem me responsabilizar como líder da manada humana."
