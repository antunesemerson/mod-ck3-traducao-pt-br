l_spanish:
 #Estate Decisions
 estate_hire_agents_decisions: "Contratar Agentes"
 estate_hire_agents_decisions_desc: "Quando a posição política e a influência não são suficientes para conseguir o que quero, simplesmente preciso buscar #EMP outras#! alternativas. No entanto, preciso de agentes para fazer isso de maneira mais eficiente."
 estate_hire_agents_decisions_confirm: "Traga-me esses agentes!"
 estate_hire_agents_decisions_tooltip: "Procure e recrute potenciais agentes para avançar melhor com seus [schemes|lE]"
 estate_governor_patrols_decision: "Conduzir Patrulhas na Governadoria"
 estate_governor_patrols_decision_desc: "Para manter a população na minha governadoria segura e saudável, posso estabelecer patrulhas regulares para manter quaisquer bandidos potenciais à distância. Isso também pode se provar benéfico em batalhas, uma vez que teremos tropas sempre à disposição, caso chegue a isso."
 estate_governor_patrols_decision_confirm: "Comece a patrulhar imediatamente!"
 estate_governor_patrols_decision_tooltip: "Estabeleça patrulhas em sua [governorship|lE]"
 estate_bolster_security_decision: "Reforçar a Segurança da Propriedade"
 estate_bolster_security_decision_desc: "Não estou me tornando paranoico, estou? Parece que todos estão prontos para me prejudicar. Provavelmente, para me apunhalar pelas costas ou manchar minha reputação. Um aumento no meu detalhe de segurança certamente vai me deixar mais tranquilo. #EMP Certo?#!"
 estate_bolster_security_decision_confirm: "Vamos nomear mais guardas."
 estate_bolster_security_decision_tooltip: "Melhore sua segurança pessoal contra [schemes|lE]"
 estate_granary_decision: "Manipular o Mercado de Grãos"
 estate_granary_decision_desc: "Minhas granjas pessoais armazenam uma quantidade significativa de grãos. Em tempos de necessidade, posso vender lentamente meu grão, um saco de cada vez, a preços muito elevados. Precisarei puxar algumas cordas para manipular o mercado a meu favor, mas terei um grande benefício."
 estate_granary_decision_confirm: "Comece a vender o grão. #EMP Devagar#!"
 estate_granary_decision_tooltip: "Aumente sua [gold_i|E][gold|lE] [income|lE] mensal no futuro próximo vendendo o grão armazenado em suas granjas"
 estate_unlock_granary_decision_factors_tt: "\nFatores que contribuem para aumentar o efeito:"
 estate_unlock_granary_decision_no_factors_tt: "#weak Sem fatores adicionais#!"
 estate_unlock_granary_decision_grain_building_tt: "#weak Sua [estate|lE] possui o [GetDomicileBuilding('grain_field_01').GetName|l] [domicile_building|lE] — Aumenta com cada nível#!"
 estate_unlock_granary_decision_rice_building_tt: "#weak Tu [estate|El] tiene el [domicile_building|El] [GetDomicileBuilding('east_asian_estate_rice_field_01').GetName|l]. Aumenta con cada nivel#!"
 estate_unlock_granary_decision_capital_tt: "#weak Sua [estate|lE] está localizada na [capital|lE]#!"
 estate_unlock_granary_decision_terrain_tt: "#weak Sua [estate|lE] está localizada em [domicile_owner.GetDomicile.GetLocation.GetTerrain.GetName] [terrain|lE]#!"
 estate_unlock_granary_decision_control_tt: "#weak [domicile_owner.GetDomicile.GetLocation.GetCounty.GetName] sofre de [county_control|lE] reduzido#!"
 estate_unlock_granary_decision_development_1_tt: "#weak [domicile_owner.GetDomicile.GetLocation.GetCounty.GetName] tem pelo menos [EmptyScope.ScriptValue('estate_granary_development_bonus_1_value')|V0] [development|lE]#!"
 estate_unlock_granary_decision_development_2_tt: "#weak [domicile_owner.GetDomicile.GetLocation.GetCounty.GetName] tem pelo menos [EmptyScope.ScriptValue('estate_granary_development_bonus_2_value')|V0] [development|lE]#!"
 estate_unlock_granary_decision_epidemic_tt: "#weak Há uma [epidemic|lE] em [domicile_owner.GetDomicile.GetLocation.GetName] que faz os cidadãos locais pagarem ainda mais pelo seu grão#!"
 #Hold a Triumph Decision
 hold_triumph_decision: "Realizar um Triunfo"
 hold_triumph_decision_desc: "Os triunfos estão entre as tradições romanas mais antigas e respeitadas. Nos dias antigos, o general vitorioso retornava a Roma para uma multidão aclamadora e as maiores honras — por um dia, igual a um deus em tudo, exceto no nome. Hoje, o povo celebrará meus maiores sucessos e a prosperidade que trouxe a eles!$ep3_triumph_influence_cost_desc$"
 hold_triumph_decision_tooltip: "Organize um desfile majestoso para celebrar seus sucessos e promover sua imagem pública"
 hold_triumph_decision_confirm: "Prepare meu cavalo!"
 ep3_triumph_influence_cost_desc: "

@alert_icon! #alert_trial O custo de celebrar um triunfo aumenta se você não venceu uma [war|lE] em 5 anos!#!"
 hold_triumph_decision_effects: "$ep3_decisions_event_triumph$ Uma Processão Impressionante"
 ep3_decisions_event_triumph: "Sento-me erguid[ROOT.Char.Custom('ES_OA')] sobre meu cavalo, radiante em meu traje mais régio, à frente de uma procissão majestosa que atravessa duas alas de uma multidão entusiasmada."
 ep3_decisions_event.0001.t: "\n\nAssim como meus muito estimados predecessores fizeram antes de mim, entro na cidade sagrada de [ROOT.Char.GetCurrentLocation.GetBaronyNameExplicitly] através da [Glossary( 'Puerta dorada', 'GOLDEN_GATE_GLOSS' )] desfilo pelo centro da cidade, entre as antigas estátuas e monumentos de glórias passadas, e paro no [Glossary( 'Milion', 'MILION_GLOSS' )], onde começam todas as medidas do império."
 ep3_decisions_event.0001.intro: "O #bold Portão Dourado#! é parte das Muralhas Teodosianas que cercam Constantinopla e marca o início da rua principal da cidade, a Mese."
 ep3_decisions_event.0001.desc_const: "O #bold milion#! marca o centro do [GetTitleByKey('e_byzantium').GetBaseName] e é o ponto de origem a partir do qual todas as distâncias até as cidades do império são medidas."
 GOLDEN_GATE_GLOSS: "\n\nApós entrar em [t_location.GetNameNoTier] pela porta principal, seguimos pela rua principal diretamente para o coração pulsante da cidade."
 MILION_GLOSS: "Meus soldados me seguem orgulhosos, compartilhando a glória da vitória sobre [triumph_enemy_defeated.Custom('ES_ElLa')] [triumph_enemy_defeated.GetTitledFirstName|l], enquanto os cidadãos zombam dos prisioneiros e admiram o butim de guerra."
 ep3_decisions_event.0001.desc_other: "Soldados, servos portando riquezas e altos funcionários em suas vestes oficiais me seguem orgulhosamente, representando a prova viva do poder e da majestade do meu reinado."
 ep3_decisions_event.0001.desc: "\n\nMas onde deve terminar o desfile triunfal?"
 ep3_decisions_event.0001.desc_no_war: "O Hipódromo é o melhor lugar."
 ep3_decisions_event.0001.desc_end: "Para o [ROOT.Char.Custom('TriumphReligiousLocation')]!"
 ep3_decisions_event.0001.a: "Quero realmente causar uma impressão em meus súditos!"
 ep3_decisions_event.0001.b: "O triunfo seguirá em direção ao Hipódromo"
 ep3_decisions_event.0001.a.flavor: "A religião é a base do meu poder."
 ep3_decisions_event.0001.a.tt: "O triunfo seguirá em direção à Hagia Sophia"
 ep3_decisions_event.0001.b.flavor: "$ep3_decisions_event_triumph$ No Hipódromo"
 ep3_decisions_event.0001.b.tt: "Enquanto faço minha entrada triunfante no Hipódromo, o lugar natural para o poder estabelecido se comunicar com os plebeus, pretendo comunicar uma única coisa: #EMP Vitória#!."
 ep3_decisions_event.0002.t: "O Hipódromo é o único lugar onde o povo geralmente pode me ver, então é importante que eles vejam exatamente o que eu preciso que eles vejam: poder, riqueza e controle."
 ep3_decisions_event.0002.desc_enemy: "\n\nSegue um desfile interminável de prisioneiros, amarrados e maltrapilhos. A maioria deles são soldados rasos, mas na frente da fila está [valid_prisoner.Custom('ES_ElLa')] [valid_prisoner.GetTitledFirstName|l], montado em um burro, para diversão da multidão."
 ep3_decisions_event.0002.desc_no_war: "\n\nNa verdade, riquezas, artefatos, despojos de guerra e símbolos de realeza são desfilados atrás — mais do que suficiente para elicitar aplausos impressionados da multidão."
 ep3_decisions_event.0002.desc_prisoner: "Entre os despojos de guerra, a peça central é o [sacked_artifact.GetName], saqueado durante um cerco."
 ep3_decisions_event.0002.desc_no_prisoner: "Na caixa imperial, eu vislumbro [enemy_hostage.Custom2('MyCharacterIntroduction', ROOT.Char)] com uma expressão carrancuda."
 ep3_decisions_event.0002.desc_artifact: "\n\nAs massas estão expectantes e o ar ressoa com excitação e uma cacofonia de gritos. Eu darei ao povo o que eles desejam."
 ep3_decisions_event.0002.desc_hostage: "A punição pública dos prisioneiros!"
 ep3_decisions_event.0002.desc_conclusion: "Farei um espetáculo de como eu escolher lidar com eles!"
 ep3_decisions_event.0002.a: "A distribuição dos despojos de guerra ao povo."
 ep3_decisions_event.0002.a.tt: "Todos adoram sentir que fazem parte da vitória!"
 ep3_decisions_event.0002.b: "Comida e ouro serão distribuídos à multidão adoradora!"
 ep3_decisions_event.0002.b.tt: "Todos amam coisas grátis, certo?"
 ep3_decisions_event.0002.c: "Mas meu discurso, é claro!"
 ep3_decisions_event.0002.c.tt: "Preciso escolher cuidadosamente como me apresentar aos meus súditos."
 ep3_decisions_event.0002.d: "Você escolhe um tópico para seu discurso"
 ep3_decisions_event.0002.d.tt: "Queimar o [sacked_artifact.GetNameNoTooltip] e distribuir os despojos."
 ep3_decisions_event.0002.d.custom_tooltip: "Todos devem sentir que fazem parte da vitória e da total humilhação do inimigo!"
 ep3_decisions_event.0002.e: "$ep3_decisions_event_triumph$ em [ROOT.Char.Custom('TriumphReligiousLocation')]"
 ep3_decisions_event.0002.e.tt: "\"Os humanos são seres frágeis, e até mesmo a maior das vitórias desaparece diante da grandeza de [ROOT.Char.GetFaith.HighGodName]\", penso sombriamente enquanto atravesso as portas. Sou imediatamente impactado pela majestade e pela grandiosidade do edifício.\n\nCertamente o povo apreciará um gesto humilde e devoto da minha parte como corolário da minha brilhante vitória sobre [triumph_enemy_defeated.Custom('ES_ElLa')] [triumph_enemy_defeated.GetTitledFirstName|l]."
 ep3_decisions_event.0003.t: "A soberba é a pior inimiga dos poderosos e dos fortes.

Mas ainda pior é #EMP dar a impressão de soberba#! aos nossos súditos! Afinal, [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip|l] não é senão [ROOT.Char.Custom('ES_ElLa')] representante de [ROOT.Char.GetFaith.HighGodName] na Terra. Poder, riquezas e majestade são apenas um reflexo da glória da Corte Divina, por isso é importante demonstrar respeito pela hierarquia."
 ep3_decisions_event.0003.desc: "É também por isso que convenientemente pedi a [enemy_hostage.Custom2('MyCharacterIntroduction', ROOT.Char)] para se juntar a mim aqui."
 ep3_decisions_event.0003.desc_no_war: "A soberba é a pior inimiga dos poderosos e dos fortes.

Mas ainda pior é #EMP dar a impressão de soberba#! aos nossos súditos! Afinal, [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip|l] não é senão [ROOT.Char.Custom('ES_ElLa')] representante de [ROOT.Char.GetFaith.HighGodName] na Terra. Poder, riquezas e majestade são apenas um reflexo da glória da Corte Divina, por isso é importante demonstrar respeito pela hierarquia."
 ep3_decisions_event.0003.desc_hostage: "Dedicarei os despojos a [ROOT.Char.GetFaith.HighGodNameAlternate]."
 ep3_decisions_event.0003.a: "Um gesto de paz sancionado religiosamente certamente contribuirá para aliviar as tensões com o povo [triumph_enemy_defeated.Custom('ES_DelDela')] [triumph_enemy_defeated.GetTitledFirstNameNoTooltip|l]."
 ep3_decisions_event.0003.b: "Doarei o [sacked_artifact.GetName] no altar."
 ep3_decisions_event.0003.c: "$ep3_decisions_event_triumph$ O Desfile dos Prisioneiros"
 ep3_decisions_event.0003.d: "Uma fileira atrás da outra de prisioneiros entra no Hipódromo. Sujos, escanzelados, com as cabeças raspadas, quase daria para ter pena deles, se não fossem os odiados inimigos que humilhamos há pouco no campo de batalha.\n\n[valid_prisoner.Custom('ES_ElLa')|U] [valid_prisoner.GetTitledFirstNameNoTooltip|l] os conduz na desonra como fez na guerra, mas montado em um burro de costas, vestid[valid_prisoner.Custom('ES_OA')] com trapos o(a) deixam [valid_prisoner.GetHerHim] muito menos intimidador(a)."
 ep3_decisions_event.0003.c.tt: "A expressão no rosto de [enemy_hostage.Custom2('MyCharacterIntroduction', ROOT.Char)] escurece ainda mais."
 ep3_decisions_event.0003.d.tt_artifact: "Eles serão cegados."
 ep3_decisions_event.0004.t: "Executá-los publicamente."
 ep3_decisions_event.0004.desc: "A misericórdia imperial os alcançou: deixem-nos andar livres."
 ep3_decisions_event.0004.desc_hostage: "$ep3_decisions_event_triumph$ O Discurso Imperial"
 ep3_decisions_event.0004.a: "Ao subir ao camarote imperial do Hipódromo, reflito sobre a melhor forma de tirar proveito da vitória sobre [triumph_enemy_defeated.Custom('ES_ElLa')] [triumph_enemy_defeated.GetTitledFirstName|l]."
 ep3_decisions_event.0004.b: "As multidões são volúveis, e não me escapa que não tenho nenhuma grande vitória para justificar meu triunfo ou oferecer qualquer credibilidade sobre a qual eu possa construir meu discurso. No entanto, preciso impressioná-los de alguma forma, porque a estabilidade do meu reinado baseia-se em grande parte no apoio popular."
 ep3_decisions_event.0004.c: "\n\nTalvez eu devesse apontar para o rico saque de guerra conquistado e para a segurança reforçada em nossas fronteiras, embora os muitos prisioneiros capturados durante a guerra, como [valid_prisoner.Custom('ES_ElLa')] [valid_prisoner.GetTitledFirstName|l], desfilados diante da multidão, falem por si mesmos. Talvez eu devesse me concentrar na política interna em vez disso?"
 ep3_decisions_event.0005.t: "\n\nAs guerras são superestimadas, então talvez eu devesse desviar a atenção deles para outro lugar, por exemplo, para a estabilidade interna ou a prosperidade."
 ep3_decisions_event.0005.desc_victory: "Por um canto do olho, vislumbro [enemy_hostage.Custom2('MyCharacterIntroduction', ROOT.Char)] sentad[enemy_hostage.Custom('ES_OA')] imóvel e inexpressivo."
 ep3_decisions_event.0005.desc_no_war: "Com a orientação de [ROOT.Char.GetFaith.WarGodName], muitas vitórias virão!"
 ep3_decisions_event.0005.desc_prisoner: "O povo da sua capital se lembrará disso e o julgará de acordo!"
 ep3_decisions_event.0005.desc_politics: "Que [ROOT.Char.GetFaith.HealthGodName] sempre conduza o Império à segurança!"
 ep3_decisions_event.0005.desc_hostage: "Sob a proteção de [ROOT.Char.GetFaith.HighGodName], o Império prosperará!"
 ep3_decisions_event.0005.a: "Eles acreditam em sua promessa e esperarão vitórias militares de você."
 ep3_decisions_event.0005.tt: "Eles não estão convencidos por suas palavras doces."
 ep3_decisions_event.0005.b: "Eles acreditam em sua promessa e esperarão paz interna."
 ep3_decisions_event.0005.c: "Eles acreditam em sua promessa e esperarão que o império prospere."
 ep3_decisions_event.0005.a.success: "A agitação surgirá em sua Capital se nenhuma vitória vier"
 ep3_decisions_event.0005.a.failure: "Você ainda pode impressioná-los vencendo uma guerra"
 ep3_decisions_event.0005.b.success: "A agitação surgirá em sua Capital se rebeliões acontecerem"
 ep3_decisions_event.0005.c.success: "Você ainda pode impressioná-los não enfrentando nenhuma rebelião"
 ep3_decisions_event.a.tt: "A agitação surgirá em sua Capital se o império não se sair bem"
 ep3_decisions_event.a.tt_no: "Você ainda pode impressioná-los fazendo o império se sair bem"
 ep3_decisions_event.b.tt: "A multidão acredita em você"
 ep3_decisions_event.b.tt_no: "A multidão não está convencida"
 ep3_decisions_event.c.tt: "Triunfo Ofensivo"
 ep3_decisions_event.c.tt_no: "Ramo de Oliveira Jurado"
 ep3_decisions_event.success: "Triunfo Religioso"
 ep3_decisions_event.failure: "$ep3_decisions_event_triumph$ Cumprindo a Palavra"
 cultural_acceptance_triumph_offensive: "Minha última vitória aconteceu há anos, e as promessas que fiz naquela época mal passam pela minha cabeça hoje em dia. No entanto, os cidadãos de [t_location.GetName] não as esqueceram, como me lembra [talker.Custom2('MyCharacterIntroduction', ROOT.Char)].\n\n"O povo anda cochichando, minha [ROOT.Char.GetTitleAsNameNoTooltip|l]."
 cultural_acceptance_triumph_peace: "Você se lembra que prometeu a eles grandes vitórias militares?"
 fervor_gain_triumph_of_god: "Você se lembra que prometeu a eles estabilidade e um reino pacífico?"
 ep3_decisions_event.0006.t: "Você se lembra que prometeu a eles um império próspero e bem-sucedido?"
 ep3_decisions_event.0006.desc: "\n\nEu me lembro. E acho que tudo acabou bem!"
 ep3_decisions_event.0006.desc_victory: "\n\nEu me lembro. E sei que falhei. Mas eu só precisava de mais tempo! Afinal, eu sempre cumpro minhas promessas."
 ep3_decisions_event.0006.desc_stability: "Eu sempre cumpro minhas promessas."
 ep3_decisions_event.0006.desc_prosperity: "Exceto quando não cumpro."
 ep3_decisions_event.0006.desc_yes: "$ep3_decisions_event_triumph$ Conclusão"
 ep3_decisions_event.0006.desc_no: "E com isso, o [Glossary('hoi polloi', 'HOI_POLLOI_GLOSS' )] foi apaziguado mais uma vez. Meu poder e a legitimidade do meu governo foram reafirmados.\n\n"
 ep3_decisions_event.0006.a: "Ao me preparar para deixar o Hipódromo, os aplausos do meu povo enchem o ar, ecoando nas pedras antigas que testemunharam a glória dos imperadores do passado. Sinto o peso da história sobre mim, os olhos de Constantinopla fixos em sua [Select_CString(GetPlayer.IsFemale, 'emperatriz', 'emperador' )].\n\nHoje, sob o brilho do sol poente, meu triunfo não é apenas uma celebração, mas um testemunho do espírito duradouro e da força do império.\n\n"[Glossary( 'Aien aristeuein', 'TRIUMPH_HIPPODROME_CONC_GLOSS')]", sussurro."
 ep3_decisions_event.0006.b: "Dentro dos muros sagrados de Santa Sofia, sou envolvido por uma grandiosidade solene. Os cânticos do meu povo se elevam em harmonia, ecoando por este vasto espaço sagrado. Aqui, no abraço divino desta maravilha arquitetônica, sinto-me conectado a algo maior do que eu mesmo. \n\nMeu triunfo neste lugar sagrado transcende o mero poder terreno — é uma união de fé e liderança, um símbolo da bênção divina sobre meu reinado.\n\nAgora que estou sob a majestosa cúpula, não sou apenas [Select_CString(GetPlayer.IsFemale, 'a imperatriz', 'o imperador' )] de Constantinopla, mas [Select_CString(GetPlayer.IsFemale, 'a guardiã', 'o guardião' )] de seu coração espiritual.\n\n"[Glossary( 'Hyper tes basileias soterias', 'TRIUMPH_HAGIA_SOPHIA_CONC_GLOSS')]", sussurro."
 ep3_decisions_event.0007.t: "\"#bold Aien aristeuein#!\" é uma frase grega antiga da #EMP Ilíada#! de Homero que significa \"Sempre superar.\""
 ep3_decisions_event.0007.desc: "\"#bold Hyper tes basileias soterias#!\" é uma formulação comum em grego antigo que significa \"Pela salvação do império.\""
 ep3_decisions_event.0007.hippodrome: "Viva a glória de [ROOT.Char.GetCurrentLocation.GetBaronyNameExplicitlyNoTooltip]."
 ep3_decisions_event.0007.hagia_sophia: "Seu triunfo chega ao fim"
 TRIUMPH_HIPPODROME_CONC_GLOSS: "\"#bold Aien aristeuein#!\" é uma frase grega antiga da #EMP Ilíada#! de Homero que significa \"Sempre superar.\""
 TRIUMPH_HAGIA_SOPHIA_CONC_GLOSS: "Meu [GetCourtPositionType('charioteer_court_position').GetNameNoTooltip|l]"
 ep3_decisions_event.0007.a: "Meus servos me trouxeram uma seleção de candidatos a cocheiro: aquele que me represente de forma brilhante no hipódromo.\n\n[mediocre_charioteer.GetFirstName] carece de experiência, mas ainda assim pode ser uma boa escolha. Por outro lado, [good_charioteer.GetFirstName] é um[good_charioteer.Custom('ES_XA')] competidor comprovad[good_charioteer.Custom('ES_OA')] ."
 ep3_decisions_event.0007.a.tt: "\n\nTambém #EMP poderia#! fazer uma oferta convincente a [stolen_charioteer.GetFirstName], [stolen_charioteer.Custom('ES_ElLa')] cocheiro [stolen_charioteer.GetEmployer.Custom('ES_DelDela')] [stolen_charioteer.GetEmployer.GetTitledFirstName|l]. Talvez deseje [Select_CString( ROOT.Char.IsFemale, 'uma patrona', 'um patrono' )] mais generos[ROOT.Char.Custom('ES_OA')]…"
 #Find a Charioteer
 ep3_decisions_event.1000.t: "A [aptitude|lE] de [mediocre_charioteer.GetUIName] é [mediocre_charioteer.GetCourtPositionAptitude( GetCourtPositionType( 'charioteer_court_position' ) )|l]"
 ep3_decisions_event.1000.desc: "[good_charioteer.GetFirstNameNoTooltip] tem a experiência que estou procurando!"
 ep3_decisions_event.1000.desc.stolen_charioteer: "A [aptitude|lE] de [good_charioteer.GetUIName] é [good_charioteer.GetCourtPositionAptitude( GetCourtPositionType( 'charioteer_court_position' ) )|l]"
 ep3_decisions_event.1000.a: "Estou de olho em [stolen_charioteer.GetFirstNameNoTooltip] há algum tempo."
 ep3_decisions_event.1000.a.aptitude: "A [aptitude|lE] de [stolen_charioteer.GetUIName] é [stolen_charioteer.GetCourtPositionAptitude( GetCourtPositionType( 'charioteer_court_position' ) )|l]"
 ep3_decisions_event.1000.b: "Pensando bem..."
 ep3_decisions_event.1000.b.aptitude: "A [aptitude|lE] de [good_charioteer.GetUIName] é [good_charioteer.GetCourtPositionAptitude( GetCourtPositionType( 'charioteer_court_position' ) )|l]"
 ep3_decisions_event.1000.c: "Meu [GetCourtPositionType('bookmaker_court_position').GetNameNoTooltip|l]"
 ep3_decisions_event.1000.c.aptitude: "Meus servos me trouxeram uma seleção de candidatos a agiota de apostas: aquele que gerencie as apostas e as finanças das corridas de bigas no Hipódromo.\n\n[mediocre_bookmaker.GetFirstName] carece de experiência, mas ainda assim pode ser uma boa escolha. Por outro lado, escolher [good_bookmaker.GetFirstName] seria o mais prudente."
 ep3_decisions_event.1000.d: "[mediocre_bookmaker.GetFirstNameNoTooltip] merece minha fé... e meu dinheiro."
 #Find a Bookmaker
 ep3_decisions_event.1010.t: "[good_bookmaker.GetFirstNameNoTooltip] tem a experiência que estou procurando!"
 ep3_decisions_event.1010.desc: "A [aptitude|lE] de [good_bookmaker.GetUIName] é [good_bookmaker.GetCourtPositionAptitude( GetCourtPositionType( 'bookmaker_court_position' ) )|l]"
 ep3_decisions_event.1010.a: "[mediocre_bookmaker.GetFirstNameNoTooltip] merece minha fé... e meu dinheiro."
 ep3_decisions_event.1010.a.aptitude: "Confirmação da Governadoria"
