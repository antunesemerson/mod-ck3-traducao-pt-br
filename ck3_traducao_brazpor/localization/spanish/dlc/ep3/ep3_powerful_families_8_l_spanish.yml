 friend_aided_my_family_corresponding: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'ajudou', 'ajudou' )] a família de [TARGET_CHARACTER.LocalPlayerString( 'você', TARGET_CHARACTER.GetShortUIName )] a aumentar sua influência no domínio"
