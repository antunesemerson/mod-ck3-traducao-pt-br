l_spanish:
 ep3_powerful_families.8000.t: "Em Altos Lugares"
 ep3_powerful_families.8000.desc: "Hoje abri uma carta de [influential_family_member.Custom2('MyCharacterIntroduction', ROOT.Char)]. Seu baixo caráter e natureza maquiavélica ficam evidentes quando propõe que aproveitemos sua posição para acessar e modificar documentos em posse de [liege.Custom('ES_DelDela')] [liege.GetTitleAsNameNoTooltip|l].\n\nA nomeação de [influential_family_member.GetNameNoTooltip] para a corte de [liege.GetName] tem sido, até agora, um recurso vital para promover os interesses da família. E embora sua proposta busque nos impulsionar ainda mais, ela poderia colocar sua posição em risco para sempre…"
 ep3_powerful_families.8000.a: "Uma oportunidade deliciosa!"
 ep3_powerful_families.8000.a.win: "[influential_family_member.GetFirstNameNoTooltip] tem sucesso"
 ep3_powerful_families.8000.a.lose: "[influential_family_member.GetFirstNameNoTooltip] é pego"
 ep3_powerful_families.8000.b: "Pesquise nos arquivos por segredos!"
 ep3_powerful_families.8000.b.tt: "[influential_family_member.GetFirstNameNoTooltip] pode descobrir segredos de [liege.GetNameNoTooltip]"
 ep3_powerful_families.8000.b.win.secret: "[influential_family_member.GetFirstNameNoTooltip] descobre um segredo"
 ep3_powerful_families.8000.b.win.no_secret: "[influential_family_member.GetFirstNameNoTooltip] não encontra segredos"
 ep3_powerful_families.8000.c: "Apenas seja um servo leal."
 ep3_powerful_families.8010.t: "[liege.GetTitleAsNameNoTooltip|U] em Apuros"
 ep3_powerful_families.8010.desc: "A [war.GetName|U] continua em fúria e, após uma sequência de batalhas e cercos malsucedidos, [liege.GetName] ficou claramente em desvantagem. Em [liege.GetPrimaryTitle.GetName], as famílias e cortesãos influentes murmuram e tramam para promover seus próprios interesses no momento de fraqueza [liege.Custom('ES_DelDela')] [liege.GetTitleAsNameNoTooltip|l] e talvez agora seja a nossa vez de fazer o mesmo.\n\nSe ajudarmos [liege.Custom('ES_AlAla')] [liege.GetTitleAsNameNoTooltip|l], poderemos conquistar seu favor e entrelaçar nossa influência em torno do trono como uma poderosa videira…"
 ep3_powerful_families.8010.a: "Uma ajuda monetária lhe conquistará a confiança."
 ep3_powerful_families.8010.b: "Devemos prometer nossas tropas diretamente para a guerra!"
 ep3_powerful_families.8010.c: "Devemos explorar este momento de fraqueza."
 ep3_powerful_families.8010.a.win: "Sua influência cresce"
 ep3_powerful_families.8010.a.lose: "[liege.Custom('ES_ElLa')|U] [liege.GetTitleAsNameNoTooltip|l] desconfia"
 ep3_powerful_families.8010.d: "Agora não é a hora."
 ep3_powerful_families.8011.t: "[generous_family.Custom2('AppropriateGreetingPositive', liege )]"
 ep3_powerful_families.8011.desc: "Seus valentes esforços na [war.GetName] não passaram despercebidos pela minha família. Pegue sua parte de nossa riqueza e que isso ajude a trazer vitória para todos nós!"
 ep3_powerful_families.8011.a: "Que generosidade."
 ep3_powerful_families.8012.t: "Uma Família Que Guerra Juntas"
 ep3_powerful_families.8012.desc: "Não é nenhum segredo que a [war.GetName] não está indo tão bem quanto havíamos esperado no início, e as famílias em conflito já começaram a tramar maneiras de preencher o vácuo de poder no reino. No entanto, [generous_family.GetName] busca isso de um modo que me é muito útil.\n\nEm sua carta, ela se oferece para comprometer seus exércitos com a guerra, apenas em troca de um número substancial de títulos e poderes honorários."
 ep3_powerful_families.8012.a: "Muito bem."
 ep3_powerful_families.8012.a.toast: "[liege.GetFirstName] aceita sua oferta"
 ep3_powerful_families.8012.b: "Não serei explorado!"
 ep3_powerful_families.8012.b.toast: "[liege.GetFirstName] rejeita sua oferta"
 ep3_powerful_families.8020.t: "No Broto"
 ep3_powerful_families.8020.desc: "Em todo o reino, o poder de uma nova família parece estar se enraizando. Como uma erva daninha, ela espalhou sua influência por todos os cantos de nossa sociedade e raramente passa um dia sem que se ouça o nome \"[new_family.GetHouse.GetBaseName].\"\n\nNão se pode negar que esta família floresceu em uma das maiores do reino, e minha família agora olha para mim em busca de orientação sobre como devemos abordar esse novo poder."
 ep3_powerful_families.8020.a: "Precisamos abafá-los."
 ep3_powerful_families.8020.a.win: "Você suprime a influência deles por enquanto"
 ep3_powerful_families.8020.a.lose: "Seus esforços são em vão"
 ep3_powerful_families.8020.b: "Devemos deixá-los saber que somos amigos."
 ep3_powerful_families.8020.b.win: "[new_family.GetFirstName] está impressionado[new_family.Custom('ES_OA')]"
 ep3_powerful_families.8020.b.lose: "[new_family.GetFirstName] não fica impressionado"
 ep3_powerful_families.8020.c: "Basta evitá-los."
 ep3_powerful_families.8030.t: "Famílias Que Tramam Juntas..."
 ep3_powerful_families.8030.desc: "[faction.GetName|U] ainda é um movimento em ascensão, mas, é claro, conta com o apoio da minha grande família. Algumas famílias, no entanto, não parecem ainda ver a retidão da causa e até agora desprezaram a oportunidade de se juntar a nós.\n\nEnquanto redijo cartas coordenando os próximos passos da facção, não consigo deixar de me perguntar por que [friendly_family.Custom2('MyCharacterIntroduction', ROOT.Char)] ainda não manifestou apoio à causa."
 ep3_powerful_families.8030.a: "Preciso entrar em contato com [friendly_family.GetSheHe] imediatamente!"
 ep3_powerful_families.8030.a.win: "[friendly_family.GetHerHim|U] convence"
 ep3_powerful_families.8030.a.lose: "Você não recebe resposta"
 ep3_powerful_families.8030.b: "Isso não é para isso que os amigos servem."
 ep3_powerful_families.8040.t: "Cordiais"
 ep3_powerful_families.8040.desc: "Desde que [location.GetName] caiu em posse da casa [other_family.GetHouse.GetName], comecei a me sentir como um[ROOT.Char.Custom('ES_XA')] hóspede em minha própria propriedade. É claro que as terras dentro da casa são minhas, mas tudo além dos portões pertence aos [other_family.GetName].\n\nEnquanto faço meu passeio matinal pelos terrenos, não consigo deixar de me perguntar se não seria politicamente vantajoso que [other_family.GetFirstNameNoTooltip] caminhasse ao meu lado…"
 ep3_powerful_families.8040.a: "Devemos convidar[other_family.GetHerHim] imediatamente!"
 ep3_powerful_families.8040.a.win: "A visita vai bem"
 ep3_powerful_families.8040.a.lose: "A visita foi um desastre"
 ep3_powerful_families.8040.b: "Precisamos trabalhar para fazer estas terras nossas."
 ep3_powerful_families.8040.b.win: "Sua influência se espalha"
 ep3_powerful_families.8040.b.lose: "Seu plano é exposto"
 ep3_powerful_families.8040.c: "Preciso apenas manter a cabeça baixa."
 ep3_powerful_families.8060.t: "Uma Vila Vilanesca"
 ep3_powerful_families.8060.desc: "Dou um passeio tranquilo por [location.GetNameNoTier] com meu séquito habitual de confidentes e protetores, e me maravilho com os magníficos edifícios que há ali. Estou embriagad[ROOT.Char.Custom('ES_OA')] pela beleza das terras que governo, mas meu bom humor azeda quando contemplo uma posse grotesca da família [other_family.GetHouse.GetName].\n\nSuas propriedades são como verrugas salpicadas por minhas terras, que de resto são perfeitas, e meu sangue ferve ao pensar que preciso continuar suportando sua presença."
 ep3_powerful_families.8060.a: "Atingir suas finanças."
 ep3_powerful_families.8060.a.win: "Você extrai sua riqueza"
 ep3_powerful_families.8060.a.lose: "Você é pego"
 ep3_powerful_families.8060.b: "Subornar seus servos."
 ep3_powerful_families.8060.c: "Preciso tolerar a presença deles por enquanto."
 ep3_powerful_families.8070.t: "Loucuras"
 ep3_powerful_families.8070.desc: "Meus guardas jogam [child.GetName] tremendo, aos meus pés. Seu rosto é a própria vergonha, e não consigo nem imaginar o que terá feito.\n\n\"Pegamos esta espécie de [child.Custom2('InsultNoun', ROOT.Char)] confraternizando na propriedade de [other_family.GetHouse.GetName]. Não é preciso se perguntar onde estão suas verdadeiras lealdades\".\n\nA ideia de que meu próprio parentesco confraternize com meus inimigos é repugnante, mas talvez essa ligação possa ser aproveitada."
 ep3_powerful_families.8070.a: "\"Continue indo lá e me conte tudo.\""
 ep3_powerful_families.8070.a.win: "[child.GetFirstNameNoTooltip|U] se torna seu informante"
 ep3_powerful_families.8070.a.lose: "[child.GetFirstNameNoTooltip|U] é pego"
 ep3_powerful_families.8070.b: "\"Tente acabar com essa rivalidade tola nossa.\""
 ep3_powerful_families.8070.b.crit_win: "[child.GetFirstNameNoTooltip|U] acaba com a rivalidade"
 ep3_powerful_families.8070.b.win: "[child.GetFirstNameNoTooltip|U] faz progressos"
 ep3_powerful_families.8070.b.lose: "[child.GetFirstNameNoTooltip|U] falha"
 ep3_powerful_families.8070.c: "\"Saia da minha vista.\""
 ep3_powerful_families.8080.t: "Silêncio Tremulante"
 ep3_powerful_families.8080.desc: "O tilintar de uma taça chama toda a atenção para [other_family.GetName], que se levanta para fazer um discurso. Começa bem, mas uma pequena hesitação logo se transforma em um silêncio longo e desconfortável.\n\nMe dirige um olhar de medo e desespero, implorando-me em silêncio que eu venha em seu auxílio."
 ep3_powerful_families.8080.a: "Uma oportunidade perfeita para humilhar a casa [other_family.GetHouse.GetNameNoTooltip]!"
 ep3_powerful_families.8080.b: "Eu irei ajudar."
 ep3_powerful_families.8090.t: "Savageria Civil"
 ep3_powerful_families.8090.desc: "Esta noite me vejo enredado[ROOT.Char.Custom('ES_OA')] entre [liege.GetName] e tão [other_family.Custom2('InsultAdjective', ROOT.Char)] de [other_family.GetName]. Sou obrigado a ouvir esse adulador[other_family.Custom('ES_XA')] tagarelar sem parar sobre a suposta lealdade e talento da casa [other_family.GetHouse.GetName].\n\nA única coisa mais repugnante do que as palavras que saem de sua boca são os pedacinhos de comida que vêm junto com elas. Preciso encontrar um jeito de calar essa espécie de [other_family.Custom2('InsultNoun', ROOT.Char)], ainda que seja só para aliviar minha dor de cabeça."
 ep3_powerful_families.8090.a: "\"O que dizer da casa [ROOT.Char.GetHouse.GetNameNoTooltip], meu senhor[liege.Custom('ES_XA')]?\""
 ep3_powerful_families.8090.a.win: "[liege.GetFirstNameNoTooltip|U] está impressionad[liege.Custom('ES_OA')]"
 ep3_powerful_families.8090.a.lose: "[liege.GetFirstNameNoTooltip|U] está entediad[liege.Custom('ES_OA')]"
 ep3_powerful_families.8090.b: "A noite acabará eventualmente."
 ep3_powerful_families.8100.t: "Serviço Civil"
 ep3_powerful_families.8100.desc: "Esta noite tenho a sorte de me ver preso em uma conversa com [liege.GetName]. [liege.GetFirstNameNoTooltip] lamenta passar muitas noites sem ouvir doce poesia.\n\nRecordo que [cp_fam.GetName|U] dedicou muitos de seus dias a vagar pelos jardins praticando seu domínio da língua [cp_fam.GetCulture.GetLanguage.GetNameNoTooltip]. Podemos fazer uso desse passatempo de [cp_fam.GetFirstNameNoTooltip] e estender nossa influência sobre a corte de [liege.GetPrimaryTitle.GetName]…"
 ep3_powerful_families.8100.a: "[cp_fam.GetFirstNameNoTooltip|U] é [Select_CString( cp_fam.IsFemale, 'uma grande poetisa', 'um grande poeta' )], meu senhor[liege.Custom('ES_XA')]!"
 ep3_powerful_families.8100.a.win: "[cp_fam.GetFirstNameNoTooltip|U] é nomeado"
 ep3_powerful_families.8100.a.lose: "[cp_fam.GetFirstNameNoTooltip|U] é rejeitado"
 ep3_powerful_families.8100.b: "\"Fico feliz que você também aprecie as coisas mais finas.\""
 friend_supported_at_feast: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'apoiou', 'apoiou' )] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetShortUIName )] durante um banquete"
