l_spanish:
 ep3_laamps.8000.t: "A Verdade"
 ep3_laamps.8000.desc: "Desde que dei meu primeiro passo triunfante de volta a [claimed_land.GetName], a notícia da minha chegada se espalhou rapidamente entre o povo. Toda vila por onde passo me trata como se eu ainda governasse estas terras, enchendo-me de presentes e elogios.\n\nAs pessoas denunciam os males de [claim_holder.GetName] e cantam canções sobre o dia em que [claim_holder.GetHerHim] eu o derrubarei e restaurarei a justiça e a decência nestas terras.\n\n"
 ep3_laamps.8000.desc.outro.sinner: "Eu me pergunto se eles realmente se lembram de como eu era..."
 ep3_laamps.8000.desc.outro: "É claro que eles apenas validam a correção da minha reivindicação, mas encorajá-los pode fazer com que [claim_holder.GetNameNoTooltip] me veja como uma ameaça."
 ep3_laamps.8000.a: "Estou aqui para retomar o que é meu!"
 ep3_laamps.8000.b: "O apoio deles ajudará minhas viagens."
 ep3_laamps.8010.t: "O Companheiro Leal"
 ep3_laamps.8010.desc: "A mais recente ninhada dos canis é apresentada diante de mim. Recém-desmamados de sua mãe, eles rastejam ao redor latindo para o mundo, tão fresco e novo diante deles. Um filhote robusto e forte ignora tudo e rasteja direto para mim, seus olhos bem abertos e sua cauda chicoteando descuidadamente seus irmãos enquanto me olha com admiração e adoração."
 ep3_laamps.8010.a: "Venha comigo."
 ep3_laamps.8020.t: "A Jornada de uma Vida"
 ep3_laamps.8020.desc: "Quando me deito para passar a noite, ouço uma agitação vinda de onde estão meus guardas. Mal posso acreditar no que vejo: a fonte dessa confusão é [wouldbe_companion.GetName], membro da corte de [holder.GetFirstName], pois está discutindo com meus guarda-costas.

[wouldbe_companion.GetSheHe|U] me chama do outro lado do acampamento.

"Uma Oportunidade Rara"
 ep3_laamps.8020.a: "[armorer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima de mim no acampamento, polindo minha [artifact.GetName].\n\n'[ROOT.Char.GetLadyLord|U], [location.GetName] é rica em depósitos de metais de alta qualidade, melhores do que qualquer um que já vi antes. Com sua permissão, eu ficaria encantado em melhorar sua [artifact.GetNameNoTooltip] com esses materiais lucrativos.'"
 ep3_laamps.8020.a.2: "'Ótima ideia!'"
 ep3_laamps.8020.b: "Seu artefato foi melhorado"
 ep3_laamps.8030.t: "[armorer.GetFirstNameNoTooltip] comete um erro"
 ep3_laamps.8030.desc: "'Apenas repare meu equipamento.'"
 ep3_laamps.8030.a: "'Esses minerais devem ser vendidos!'"
 ep3_laamps.8030.a.win: "Deixe os Cães Dormirem"
 ep3_laamps.8030.a.lose: "Um grito agudo me arranca do meu sono e me devolve à escuridão da noite. Sigo até a origem do ruído e encontro a [frightened_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)] encolhid[frightened_courtier.Custom('ES_OA')] em frente à sua tenda!\n\n“[ROOT.Char.GetFirstName]! Não entrem, há um lobo na minha cama!”.\n\nAbro a tenda e encontro uma loba muito prenha. Ela rosna para mim, sem dúvida com medo do que eu possa fazer aos seus filhotes ainda não nascidos."
 ep3_laamps.8030.b: "Eu vou matar a fera."
 ep3_laamps.8030.c: "Você mata o lobo"
 ep3_laamps.8040.t: "Você é atacado"
 ep3_laamps.8040.desc: "Os filhotes seriam ótimos animais de estimação."
 ep3_laamps.8040.a: "Parece o início de nosso novo canil!"
 ep3_laamps.8040.a.win: "Precisamos de uma nova tenda."
 ep3_laamps.8040.a.lose: "Sem Amigos ou Proteção"
 ep3_laamps.8040.b: "Sou interrompido em meu passeio por meu [ROOT.Char.Custom('GetRandomCampBuilding')|l] quando uma pessoa desconhecida e nervosa se aproxima — [minority.GetWomanMan] que se apresenta como [minority.GetName] e é claramente tão [Select_CString(minority.IsFemale, 'deslocada', 'deslocado' )] em [ROOT.Char.GetCurrentLocation.GetName] quanto eu.

"[ROOT.Char.GetLadyLord|U],"
 ep3_laamps.8040.c: "você e eu sabemos que [minority.GetFaith.GetAdherentNamePlural] não são bem-vindos por aqui. Sem dúvida, você também já encontrou o preconceito que os fiéis de [minority.GetFaith.HighGodName] enfrentam nestas terras."
 ep3_laamps.8040.d: "você e eu sabemos que estas terras não aceitam aqueles que adoram de forma diferente dos lordes e damas."
 ep3_laamps.8050.t: "não me sinto à vontade nestas terras e… confiava que uma[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] pessoa de mundo como vossa mercê pudesse estar dispost[ROOT.Char.Custom('ES_OA')] acolher alguém sem lar do credo [minority.GetFaith.GetAdherentName]?"
 ep3_laamps.8050.desc.intro: "Sou interrompido em meu passeio por meu [ROOT.Char.Custom('GetRandomCampBuilding')|l] quando uma pessoa desconhecida e nervosa se aproxima — [minority.GetWomanMan] que se apresenta como [minority.GetName] e é claramente tão [Select_CString(minority.IsFemale, 'deslocada', 'deslocado' )] em [ROOT.Char.GetCurrentLocation.GetName] quanto eu.

"Ajude[minority.GetHerHim] a encontrar um lar em outro lugar."
 ep3_laamps.8050.desc.mid.samefaith: "Vá embora, vagabundo[minority.Custom('ES_OA')]."
 ep3_laamps.8050.desc.mid.alsohated: "Nem Uma Gota"
 ep3_laamps.8050.desc.mid.fallback: "Eu me aquieto ao sol do deserto, desfrutando de um breve momento de paz nesse estilo de vida frenético que escolhi para mim. Mas então, o som da madeira se partindo, um grito e o respingo da água fazem meu coração afundar.

Vejo [idiot.Custom2('MyCharacterIntroduction', ROOT.Char)] de pé ao lado dos restos encharcados e lascados de nosso barril de água. Aparentemente, [idiot.GetSheHe] o deixou cair sobre algumas pedras afiadas enquanto o descarregava, e agora as últimas de nossas provisões de água se infiltram fundo na areia."
 ep3_laamps.8050.desc.outro: "Precisamos encontrar mais imediatamente!"
 ep3_laamps.8050.a: "Você encontra uma fonte"
 ep3_laamps.8050.b: "Você não encontra nada"
 ep3_laamps.8050.c: "Bem, é hora de começarmos a reciclar..."
 ep3_laamps.8060.t: "'[idiot.GetFirstNameNoTooltip|U]! Resolva isso!'"
 ep3_laamps.8060.desc: "Eu me aquieto ao sol do deserto, desfrutando de um breve momento de paz nesse estilo de vida frenético que escolhi para mim. Mas então, o som da madeira se partindo, um grito e o respingo da água fazem meu coração afundar.

Vejo [idiot.Custom2('MyCharacterIntroduction', ROOT.Char)] de pé ao lado dos restos encharcados e lascados de nosso barril de água. Aparentemente, [idiot.GetSheHe] o deixou cair sobre algumas pedras afiadas enquanto o descarregava, e agora as últimas de nossas provisões de água se infiltram fundo na areia."
 ep3_laamps.8060.a: "Você é pego!"
 ep3_laamps.8060.a.win: "Teremos que sobreviver sem."
 ep3_laamps.8060.a.lose: "Frutos Estrangeiros"
 ep3_laamps.8060.b: "Ao vagar fora do acampamento, encontro uma clareira na floresta repleta de todo tipo de frutas silvestres coloridas enfeitando os arbustos. Elas são diferentes de tudo o que já vi antes e parecem tão deliciosamente tentadoras que levaria menos de uma hora para meus seguidores colhê-las todas.

Será que isso é um presente tão necessário de [ROOT.Char.GetFaith.CreatorName|U] ou uma artimanha de [ROOT.Char.GetFaith.TricksterGodName|U] para nos testar?"
 ep3_laamps.8060.c: "Me pergunto o que [forager.GetFirstNameNoTooltip] faria com isso."
 ep3_laamps.8060.c.win: "Ah! Eu reconheço esses frutos!"
 ep3_laamps.8060.c.lose: "A vida é uma aventura, até mesmo para o estômago."
 ep3_laamps.8060.d: "Os frutos estavam deliciosos"
 ep3_laamps.8060.d.lose: "Você comeu veneno"
 ep3_laamps.8060.e: "Devemos sobreviver sem eles."
 ep3_laamps.8070.t: "Um Marinheiro Estranho"
 ep3_laamps.8070.desc: "Ao vagar fora do acampamento, encontro uma clareira na floresta repleta de todo tipo de frutas silvestres coloridas enfeitando os arbustos. Elas são diferentes de tudo o que já vi antes e parecem tão deliciosamente tentadoras que levaria menos de uma hora para meus seguidores colhê-las todas.

Será que isso é um presente tão necessário de [ROOT.Char.GetFaith.CreatorName|U] ou uma artimanha de [ROOT.Char.GetFaith.TricksterGodName|U] para nos testar?"
 ep3_laamps.8070.a: "\"Ahhha! Você é um gênio!\""
 ep3_laamps.8070.b: ""Precisamos [Select_CString(sailor.IsFemale, 'uma marinheira', 'um marinheiro' )] com experiência no acampamento"."
 ep3_laamps.8070.c: "\"Você acha que #EMP isso#! foi uma boa história?\""
 ep3_laamps.8070.c.win: "Suas histórias impressionam"
 ep3_laamps.8070.c.lose: "Suas histórias não impressionam"
 ep3_laamps.8070.d: "\"Saia de perto de mim.\""
 ep3_laamps.8080.t: "As Costas Distantes"
 ep3_laamps.8080.desc.intro_sea: "Passeio pelo mercado desta terra estranha. Os vendedores acenam em uma língua estrangeira e me encontro perdid[ROOT.Char.Custom('ES_OA')] em um mar de aromas exóticos, mas, por estranho que pareça, tudo isso me lembra o lar.

"
 ep3_laamps.8080.desc.intro: "Onde mais eu poderia ter o prazer de cheirar lavanda fresca, ou de ver o sol se pôr sobre as ruínas da velha Roma, ou ouvir o coro jubilante de uma igreja, ou passar o inverno aquecido pela lareira de um estranho amigável? Em nenhum lugar, exceto na Europa."
 ep3_laamps.8080.desc.outro: "Ver o céu do deserto vivo com estrelas, cruzar as areias em meio aos camelos da caravana, contemplar a magnificência das mais antigas civilizações da humanidade no Cairo, Bagdá, Persépolis. Que terra poderia reivindicar ser o coração de toda a humanidade, se não aqui?"

"Ouço as doces melodias dos tambores ecoando por todo o mercado e os cães uivando na natureza, e sinto que começo a pertencer. Meus pés descansam em areia estrangeira, e estranhas aves circulam no céu, e, por fim, me sinto satisfech[ROOT.Char.Custom('ES_OA')]."
 ep3_laamps.8080.a: "Onde mais é livre um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan], se não na estepe sem fim que se estende com nada além do grande céu azul [ROOT.Char.GetFaith.CreatorNamePossessive] sobre sua cabeça? Quase sinto que poderia correr e cavalgar por uma vida inteira, sentir o vento no rosto e a grama sob os pés, e simplesmente perseguir o horizonte para sempre."
 ep3_laamps.8080.b: "À distância, ouço o som raro de pessoas cantando com a garganta e sinto vontade de me juntar ao coro. A beleza interminável dos Himalaias se estende à minha frente, e me sinto compelido a descobrir cada recanto oculto e utopia secreta que espreita dentro."
 ep3_laamps.8080.c: "O calor crescente confere a tudo o brilho iridescente de um pavão; homens e mulheres circulam apressados sob as imponentes pagodas. O aroma das folhas de chá impregna e percorre estas ruas, misturando-se com a teca recém-cortada para criar uma combinação embriagante. O sol está alto sobre este vale escavado pelo poderoso Irrawaddy, e as cem culturas que nele vivem me recebem como [Select_CString(ROOT.Char.IsFemale, 'uma irmã', 'um irmão' )] que se perdeu de vista há muito tempo."
 ep3_laamps.8080.c.win: "As imponentes montanhas proporcionam sombra aos arrozais situados aos seus pés. O ar fresco e úmido gruda no meu rosto enquanto afasto um mosquito. Encontrei verdadeira prosperidade nos vales montanhosos e sinto como se tivesse encontrado um autêntico paraíso pessoal na Terra."
 ep3_laamps.8080.c.lose: "O som das ondas quebrando contra a costa enche meus ouvidos, e, com uma inspiração profunda, o ar salgado do mar enche meu nariz e meus pulmões. A calma flui por todo o meu corpo, e sou tomado por uma ânsia de viver. Tudo o que quero é permanecer nesta terra, ainda que por um momento, para saborear tudo."
 ep3_laamps.8080.d: "Vejo uma longa cadeia de montanhas, como se fosse a coluna vertebral do mundo, que se estende até o horizonte, com neve em seus picos. As pessoas daqui são gentis e generosas, e se esforçam para que eu me sinta bem-vindo."
 ep3_laamps.8090.t: "Folhas densas me protegem do sol escaldante enquanto contemplo as belas paisagens à minha frente. Vejo uma libélula pousar sobre uma vitória-régia e não posso deixar de refletir sobre minha própria jornada: eu sou essa libélula, este lugar é verdadeiramente único e mágico, e me apaixonei completamente."
 ep3_laamps.8090.desc.intro: "Passeio pelo mercado desta terra estranha. Os vendedores acenam em uma língua estrangeira e me encontro perdid[ROOT.Char.Custom('ES_OA')] em um mar de aromas exóticos, mas, por estranho que pareça, tudo isso me lembra o lar.

"
 ep3_laamps.8090.desc.world_europe: "Talvez todos os [ROOT.Char.GetCulture.GetNameNoTooltip] devessem encontrar um lar aqui."
 ep3_laamps.8090.desc.world_middle_east: "Todos os seus [children|lE] no acampamento"
 ep3_laamps.8090.desc.world_india: "Todo membro [close_family|lE] no acampamento da sua [culture|lE]"
 ep3_laamps.8090.desc.world_africa: "Todos no acampamento"
 ep3_laamps.8090.desc.world_steppe: "Abraçado por um grande herói"
 ep3_laamps.8090.desc.world_tibet: "Herói do Povo"
 ep3_laamps.8090.desc.world_burma: "Os camponeses passaram a considerar este personagem como um herói do povo que os salvará dos altos impostos e da tirania."
 ep3_laamps.8090.desc.world_asia_china: "Preparando Invasão"
 ep3_laamps.8090.desc.world_asia_japan: "Este personagem está se preparando para invadir terras estrangeiras e fazer um novo lar para seu povo lá."
 ep3_laamps.8090.desc.world_asia_korea: "Terras Familiares"
 ep3_laamps.8090.desc.world_asia_southeast: "Este personagem está desfrutando do apoio popular dos camponeses nas terras que viaja."
 ep3_laamps.8090.desc.outro: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'levou', 'levou' )] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetShortUIName )] para a aventura da vida"
 ep3_laamps.8090.a: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'levou', 'levou' )] [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUIName )] para a aventura da vida"
 ep3_laamps.8090.b: "[CHARACTER.GetShortUIName|U] recusou uma oportunidade de levar um dos cortesãos de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'sua corte', TARGET_CHARACTER.GetShortUIName )]"
 ep3_laamps.8090.c: "[TARGET_CHARACTER.GetShortUIName|U] recusou uma oportunidade de levar um dos cortesãos de [Select_CString( CHARACTER.IsLocalPlayer, 'sua corte', CHARACTER.GetShortUIName )]"
 every_child_in_camp: "[CHARACTER.GetShortUIName|U] presenteou [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetShortUIName )] com um cão de caça forte e leal"
 every_relative_in_camp_your_culture: "[TARGET_CHARACTER.GetShortUIName|U] presenteou [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUIName )] com um cão de caça forte e leal"
 every_camp_member: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'congeniasteis', 'congeniaron')] por causa das excentricidades em comum"
 cultural_acceptance_distant_hero: "Materiais Duráveis"
 laamp_prepping_for_invasion: "Um aventureiro ajudou algumas minorias a escaparem da perseguição."
 laamp_prepping_for_invasion_desc: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'ofreciste', 'ofreció' )] provisões a [CHARACTER.GetShortUIName] quando mais precisava."
 laamps_8090_preparing_invasion: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'ofreciste', 'ofreció' )] provisões a [TARGET_CHARACTER.GetShortUIName] quando mais precisava."
 laamps_8090_preparing_invasion_desc: "Este personagem está se preparando para invadir terras estrangeiras e fazer um novo lar para seu povo lá."
 laamp_familiar_lands: "Apoio Legitimista"
 laamp_familiar_lands_desc: "$laamp_legitimist_support_contract$"
 friend_trip_of_a_lifetime: "Para o herdeiro legítimo,"
 friend_trip_of_a_lifetime_corresponding: "A notícia sobre sua reivindicação legítima se espalhou amplamente e criou uma oportunidade para discutirmos nosso apoio."
 friend_returned_my_companion: "Você está convidado a comparecer diante de nós. Vamos conversar sobre como podemos ajudá-lo em sua justa busca. Temos certeza de que chegaremos a um entendimento sobre o apoio extraordinário que podemos fornecer. E sobre um pequeno pagamento que cobraremos no futuro."
 friend_returned_my_companion_corresponding: "$laamp_legitimist_support_contract$ — Muitas Reivindicações"
 friend_gave_them_a_dog: ""Bem-vind[ROOT.Char.Custom('ES_OA')], seja bem-vind[ROOT.Char.Custom('ES_OA')]. Estou muito feliz que tenha vindo", diz [petitioned_ruler.GetName], enquanto sou conduzid[ROOT.Char.Custom('ES_OA')] em segredo diante de [petitioned_ruler.GetHerHim].

"Temos muito a conversar. Mas, primeiro, vamos tratar da escolha de seus esforços. Parece que você tem várias reivindicações sobre títulos diversos e, embora desejemos vê-lo conquistá-los todos eventualmente, é preciso começar com um objetivo claro, para que o trabalho não se perca correndo atrás de muitos focos, como diz o ditado.

Ouço dizer que [title_2.GetName] é um lugar muito agradável nesta época do ano, mas, no fim, a escolha é sua. Qual deles será?""
 friend_gave_them_a_dog_corresponding: "[title_1.GetName]"
 friend_eccentric: "Esta escolha não poderá ser alterada mais tarde. Novas negociações com outros benfeitores também terão como alvo este título."
 artifact_durable_materials_02: "[title_2.GetName]"
 cultural_acceptance_fled_persecution: "[title_3.GetName]"
 friend_treasured_more_than_food: "[title_4.GetName]"
 friend_treasured_more_than_food_corresponding: "$laamp_legitimist_support_contract$ — Prelúdio"
 #Legitimist
 laamp_legitimist_support_contract: "\"O mais importante, Vossa Graça...\""
 laamp_legitimist_support_contract_contract: "Você começará as negociações sem pedir mais"
 laamp_legitimist_support_contract_desc_title: "Deslumbrar[petitioned_ruler.GetHerHim] com teu brilho."
 laamp_legitimist_support_contract_desc: "Você começará as negociações com um nível de apoio aumentado"
 laamp_legitimist_support_contract_request: "Desconcertar[petitioned_ruler.GetHerHim] com palavras sem sentido."
 ep3_laamps.8101.t: "Você terá mais turnos para negociar com [petitioned_ruler.GetName]"
 ep3_laamps.8101.desc: "O tempo nunca é desperdiçado entre amigos!", diz [petitioned_ruler.GetName], enquanto sou conduzid[ROOT.Char.Custom('ES_OA')] em segredo diante de [petitioned_ruler.GetHerHim].

"Temos muito a conversar. Mas, primeiro, vamos tratar da escolha de seus esforços. Parece que você tem várias reivindicações sobre títulos diversos e, embora desejemos vê-lo conquistá-los todos eventualmente, é preciso começar com um objetivo claro, para que o trabalho não se perca correndo atrás de muitos focos, como diz o ditado.

Ouço dizer que [title_2.GetName] é um lugar muito agradável nesta época do ano, mas, no fim, a escolha é sua. Qual deles será?"Você convence [petitioned_ruler.GetShortUIName]"
 ep3_laamps.8101.a: "Você perde um turno de negociações"
 ep3_laamps.8101.a.desc: "$laamp_legitimist_support_contract$ — Debate"
 ep3_laamps.8101.b: "[petitioned_ruler.GetName] se remexe na cadeira, o olhar te perfurando.\n\n"
 ep3_laamps.8101.c: "O ar está tenso, pois há muito em jogo. Pela postura de [petitioned_ruler.GetName] você percebe o quão importante este assunto é para [petitioned_ruler.GetSheHe].\n\n"
 ep3_laamps.8101.d: "As velas foram trocadas e as bebidas reabastecidas, os servos de [petitioned_ruler.GetName] se retiraram sem uma palavra desnecessária, pois são seus superiores que devem falar.\n\n"
 ep3_laamps.8102.t: ""Já falamos o suficiente", diz [petitioned_ruler.GetName] com severidade. "Esta é nossa oferta final. Vocês podem demonstrar sua sabedoria aceitando-a"."
 ep3_laamps.8102.desc: "\"Vemos isso como uma base para o futuro brilhante que nos aguarda. Acreditamos que você tem a capacidade de entregar, não desapontar. E não cometemos erros em tais julgamentos.\""
 ep3_laamps.8102.a: ""Sim, sim, isso pode funcionar. Com a graça [petitioned_ruler.GetFaith.HighGodNamePossessive]. Vai funcionar! Por que não veio até nós antes? Sem dúvida, vocês precisam trabalhar o seu timing, se quiserem ter sucesso"."
 ep3_laamps.8102.a.desc: "\"Ha! Gostaríamos de ver a expressão no rosto de [claimed_title.GetHolder.GetName] quando você entrar em [capital_barony.GetNameNoTier] com nossas tropas. Por favor, seja gentil e peça a alguém para anotar todos os detalhes.\""
 ep3_laamps.8102.b: "\n\n#italic Você tem #color_yellow [ROOT.Var('legitimist_turns').GetValue] #! turnos de negociações restantes"
 ep3_laamps.8102.b.desc: "\n#italic [petitioned_ruler.GetShortUINameNoTooltip] prometeu #EMP #color_yellow Apoio Avassalador #! - #color_yellow 1800 moedas de ouro e 3000 tropas de elite.#!"
 ep3_laamps.8102.c: "\n#italic [petitioned_ruler.GetShortUINameNoTooltip] prometeu #EMP #color_yellow Apoio Formidável #! - #color_yellow 1500 moedas de ouro e 2500 tropas de elite.#!"
 ep3_laamps.8102.c.desc: "\n#italic [petitioned_ruler.GetShortUINameNoTooltip] prometeu #EMP #color_yellow Apoio Considerável #! - #color_yellow 1200 moedas de ouro e 2000 tropas de elite.#!"
 ep3_laamps.8102.d: "\n#italic [petitioned_ruler.GetShortUINameNoTooltip] prometeu #EMP #color_yellow Apoio Substancial #! - #color_yellow 900 moedas de ouro e 1500 tropas de elite.#!"
 ep3_laamps.8102.d.desc: "\n#italic [petitioned_ruler.GetShortUINameNoTooltip] prometeu #EMP #color_yellow Apoio Modesto #! - #color_yellow 600 moedas de ouro e 1000 tropas de elite.#!"
 ep3_laamps.8102.e: "\n#italic [petitioned_ruler.GetShortUINameNoTooltip] prometeu #EMP #color_yellow Apoio Padrão #! - #color_yellow 300 moedas de ouro e 500 tropas de elite.#!"
 ep3_laamps.8102.e.desc: "\n#italic Após conquistar [claimed_title.GetName], você terá que pagar #color_yellow [ROOT.Var('legitimist_obligations').GetValue] #! vezes a cada dois anos, cada vez #color_yellow metade de sua renda anual.#!"
 ep3_laamps.8102.b.success: "\n#italic Após conquistar [claimed_title.GetName], você terá que pagar #color_yellow metade de sua renda anual.#!"
 ep3_laamps.8102.b.failure: "Ainda é necessário mais."
 ep3_laamps.8103.t: "Você receberá uma quantia maior de apoio agora, por um pagamento adicional no futuro."
 ep3_laamps.8103.intro_1: "A glória vale mais que ouro!"
 ep3_laamps.8103.intro_2: "Você convence [petitioned_ruler.Custom('ES_AlAla')] [petitioned_ruler.GetNameNoTooltip|l] a fornecer mais apoio sem aumentar os pagamentos da sua parte"
 ep3_laamps.8103.intro_3: "$ep3_laamps.8102.b.success$"
 ep3_laamps.8103.no_more_turns_flavor: "$ep3_laamps.8102.b.failure$"
 ep3_laamps.8103.mid_1: "Não posso esgotar meu reino!"
 ep3_laamps.8103.mid_2: "Você tentará convencer [petitioned_ruler.Custom('ES_AlAla')] [petitioned_ruler.GetNameNoTooltip|l] a reduzir em um a quantidade de pagamentos."
 ep3_laamps.8103.mid_3: "$ep3_laamps.8102.b.success$"
 ep3_laamp.8103.turns_left: "$ep3_laamps.8102.b.failure$"
 ep3_laamps.8103.support_6: "É... aceitável."
 ep3_laamps.8103.support_5: "@warning_icon! #color_red Esta opção encerra as negociações#!"
 ep3_laamps.8103.support_4: "$laamp_legitimist_support_contract$ — Conclusão"
 ep3_laamps.8103.support_3: "Dois governantes [Select_CString(And(ROOT.Char.IsFemale, petitioned_ruler.IsFemale), 'envolvidas', 'envolvidos')] em uma negociação acalorada, um[petitioned_ruler.Custom('ES_XA')] com uma coroa nas têmporas, enquanto a minha ainda está nua. Mas será o cansaço que sinto, esse peso repentino na minha cabeça, ou é a coroa de [claimed_title.GetName] que está tão perto agora?

Uma careta deve ter traído meus pensamentos, pois [petitioned_ruler.GetName] sorri de forma cúmplice. "Você será [Select_CString( ROOT.GetCharacter.IsFemale, 'uma boa', 'um bom' )] [claimed_title.GetHolder.GetTitleAsNameNoTooltip|l], e em breve — no máximo em quatro anos. Nossas tropas e nosso ouro cuidarão disso. E, por favor, não se preocupe. Nós lhe lembraremos se você... por acaso esquecer sua parte do nosso acordo."

[petitioned_ruler.GetFirstNameNoTooltip] ergue sua taça, um brinde final para selar o trato."
 ep3_laamps.8103.support_2: "Paciência é a chave nos assuntos militares."
 ep3_laamps.8103.support_1: "Você pedirá mais tempo para se preparar para a guerra."
 ep3_laamps.8103.obligations: "Você terá 8 anos para reivindicar [claimed_title.GetName]"
 ep3_laamps.8103.one_obligations: "Você terá 4 anos para reivindicar [claimed_title.GetName]"
 ep3_laamps.8103.a: "Ao futuro de [claimed_title.GetNameNoTooltip]!"
 ep3_laamps.8103.a.desc: "Você concorda com as condições. $ep3_laamps.8105.a.failure$"
 ep3_laamps.8103.b: "Isso foi uma perda de tempo."
 ep3_laamps.8103.b.desc: "@warning_icon! #color_red Você rompe as negociações.#! [petitioned_ruler.GetName] não o apoiará e certamente terá uma opinião pior sobre você."
 ep3_laamps.8103.b.success: "@warning_icon! #color_red Obter terras com um título diferente de [claimed_title.GetName] ou mudar o propósito do acampamento anulará o trato.#!
O herdeiro de [petitioned_ruler.GetPrimaryTitle.GetName] herdará as obrigações. #weak Pode haver maneiras de se esquivar de pagar..."
 ep3_laamps.8103.b.failure: "$laamp_legitimist_support_contract$ — Chegou a Hora"
 ep3_laamps.8103.c: "Há anos, [petitioned_ruler.GetName] me forneceu excelentes soldados e ouro para me ajudar a reivindicar o que legitimamente me pertence.\n\nO trono de [claimed_title.GetName], ocupado por [claimed_title.Custom('ES_ElLa')] vil usurpador[claimed_title.Custom('ES_XA')] [claimed_title.GetHolder.GetShortUIName]!\n\n[petitioned_ruler.GetShortUIName] espera que eu ataque em breve, e a cada dia que passa fica mais impaciente. Mas minhas forças estão prontas? Consegui apoio suficiente? O povo de [claimed_title.GetName] chora o bastante por meu retorno triunfal?"
 ep3_laamps.8103.c.desc: "[claimed_title.GetHolder.GetShortUIName] sentirá o aço frio!"
 ep3_laamps.8103.c.success: "Teremos que agir, se quisermos viver em um mundo diferente."
 ep3_laamps.8103.c.failure: "Ainda não é a hora certa."
 ep3_laamps.8103.d: "$ep3_laamps.8102.b.success$"
 ep3_laamps.8103.d.desc: "Suas obrigações aumentaram"
 ep3_laamps.8105.t: "Você terá mais 2 anos para reivindicar [claimed_title.GetName]"
 ep3_laamps.8105.desc: "Dois governantes [Select_CString(And(ROOT.Char.IsFemale, petitioned_ruler.IsFemale), 'envolvidas', 'envolvidos')] em uma negociação acalorada, um[petitioned_ruler.Custom('ES_XA')] com uma coroa nas têmporas, enquanto a minha ainda está nua. Mas será o cansaço que sinto, esse peso repentino na minha cabeça, ou é a coroa de [claimed_title.GetName] que está tão perto agora?

Uma careta deve ter traído meus pensamentos, pois [petitioned_ruler.GetName] sorri de forma cúmplice. "Nosso[ROOT.Char.Custom('ES_OA')] indigno[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetFirstName],"

[petitioned_ruler.GetFirstNameNoTooltip] ergue sua taça, um brinde final para selar o trato."
 ep3_laamps.8105.a: "Você falhou em garantir sua reivindicação sobre [claimed_title.GetName]"
 ep3_laamps.8105.a.desc: "$laamp_legitimist_support_contract$ — O Pedágio"
 ep3_laamps.8105.a.success: "Quão feliz foi minha chegada vitoriosa em [claimed_title.GetName]! Após tanto tempo percorrendo caminhos inóspitos, sendo sempre um[ROOT.Char.Custom('ES_XA')] hóspede em terras estrangeiras, sem lar, sem o que me pertencia por direito, meu doce [claimed_title.GetTierAsNameNoTooltip]. Mas enfim tudo está em ordem, como deveria ter sido desde o começo. Sou um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] poderos[ROOT.Char.Custom('ES_OA')]

No entanto, há um espinho neste buquê. [petitioned_ruler.Custom('ES_ElLa')|U] [petitioned_ruler.GetName], que me ajudou imensamente a conseguir tudo isso, exige que eu pague o que combinamos há tantos anos. Claro, a honrada casa [ROOT.Char.GetHouse.GetNameNoTooltip] sempre paga suas dívidas, não é?"
 ep3_laamps.8105.a.failure: "[Glossary( 'Pacta sunt servanda', 'PACTA_SUNT_SERVANTA_GLOSS' )]"
 ep3_laamps.8105.b: "Latim para 'Os acordos devem ser cumpridos'"
 ep3_laamps.8105.b.desc: "#color_yellow [petitioned_ruler.MakeScope.Var('legitimist_obligations_left').GetValue] Pagamentos #! restantes"
 ep3_laamps.8105.c: "Este é o último pagamento para [petitioned_ruler.GetName]."
 ep3_laamps.8105.c.desc: "Pagarei, mas não agora."
 ep3_laamps.8105.invalidations_reasons: "@warning_icon! #color_red Obter terras com um título diferente de [claimed_title.GetName] ou mudar o propósito do acampamento anulará o trato.#!
O herdeiro de [petitioned_ruler.GetPrimaryTitle.GetName] herdará as obrigações. #weak Pode haver maneiras de se esquivar de pagar..."
 ep3_laamps.8106.t: "Seu argumento é visto como uma desculpa fraca"
 ep3_laamps.8106.desc: "[petitioned_ruler.GetShortUINameNoTooltip], você é um tolo absoluto!"
 ep3_laamps.8106.a: "@warning_icon! Não pagará nem uma moeda quebrada a [petitioned_ruler.GetName]. Deveria ter sabido melhor."
 ep3_laamps.8106.a.desc: "#italic Devido à sua [income|lE] escassa, você reembolsa apenas o valor exato a cada vez: #color_yellow 300 #! [gold_i]"
 ep3_laamps.8106.b: "Para [ROOT.Char.GetNameNoTooltip]"
 ep3_laamps.8106.b.success: "Uma tristeza imensurável enche nosso coração, pois [Select_CString( previous_ruler.IsFemale, 'nossa apreciada', 'nosso apreciado' )] [previous_ruler.GetName] já não está sentad[previous_ruler.Custom('ES_OA')] no trono, que [petitioned_ruler.GetFaith.HighGodName] abençoe sua alma. Ah, mas há a questão de um pagamento ainda não acertado por nosso apoio em colocá-l[previous_ruler.Custom('ES_OA')] naquele trono. Esperamos que tenham sido informados dos detalhes… e que sejam honrados o suficiente para cumprir sua parte."
 ep3_laamps.8106.b.failure: "$ep3_laamps.8108.a$"
 ep3_laamps.8106.b.desc: "Daqui a um ano, um pagamento de metade da renda anual do reino será esperado por [petitioned_ruler.GetShortUIName]"
 ep3_laamps.8106.c: "$laamp_legitimist_support_contract$ — Conclusão Inesperada"
 ep3_laamps.8106.c.desc: "Há muito tempo, foi feito um acordo: [petitioned_ruler.GetName] fornecia apoio para a reconquista de [claimed_title.GetName] na forma de soldados e ouro adiantados, em troca de uma parcela substancial da renda do meu domínio.\n\nNo entanto, [petitioned_ruler.GetFirstName] jamais teria previsto que"
 ep3_laamps.8107.t: "seria envolvido em uma guerra mortal comigo"
 ep3_laamps.8107.desc: "As palavras não podem expressar o quão decepcionados estamos com você. #EMP Verme!#! Tínhamos um futuro tão brilhante à nossa frente, e você decidiu abrir mão de tudo.
Considere-nos profundamente contrariados, e considere a si mesmo um verme. Pedimos que tenha o tato necessário para desaparecer desta Terra de forma silenciosa e lamentável."
 ep3_laamps.8107.a: "faleceu deste mundo"
 ep3_laamps.8107.a.desc: "perdeu sua honra e título"
 ep3_laamps.8108.t: "Antes que a dívida fosse paga integralmente. Parece que ninguém mais importante em seu domínio estava a par dos detalhes do acordo. Agora está claro — ninguém virá cobrar.\n\nUma reviravolta estranha dos acontecimentos, quase como se a mão astuta de alguém tivesse guiado os rumos do destino."
 ep3_laamps.8108.desc: "Quão feliz foi minha chegada vitoriosa em [claimed_title.GetName]! Após tanto tempo percorrendo caminhos inóspitos, sendo sempre um[ROOT.Char.Custom('ES_XA')] hóspede em terras estrangeiras, sem lar, sem o que me pertencia por direito, meu doce [claimed_title.GetTierAsNameNoTooltip]. Mas enfim tudo está em ordem, como deveria ter sido desde o começo. Sou um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] poderos[ROOT.Char.Custom('ES_OA')]

No entanto, há um espinho neste buquê. [petitioned_ruler.Custom('ES_ElLa')|U] [petitioned_ruler.GetName], que me ajudou imensamente a conseguir tudo isso, exige que eu pague o que combinamos há tantos anos. Claro, a honrada casa [ROOT.Char.GetHouse.GetNameNoTooltip] sempre paga suas dívidas, não é?"
 ep3_laamps.8108.a: "Solicitar Apoio Legitimista"
 PACTA_SUNT_SERVANTA_GLOSS: "Solicite um convite para discutir o nível e as condições de apoio à sua reivindicação Legitimista"
 ep3_laamps.8108.payments_left: "Exército Legitimista"
 ep3_laamps.8108.no_payments_left: "Após aceitar esta [task_contract|lE] e viajar para [recipient.GetCurrentLocation.GetName], você poderá negociar até #color_yellow 1800 ouro#! e #color_yellow 3000 tropas de elite#!, em troca de pagamentos consideráveis posteriormente."
 ep3_laamps.8108.b: "As negociações falharam. Você precisará buscar ajuda em outro lugar."
 ep3_laamps.8108.b.desc: "Este personagem já está apoiando um Legitimista"
 ep3_laamps.8108.b.success: "Você tem uma [claim|E] sobre este [realm|lE] personagem"
 ep3_laamps.8108.b.failure: "Você tem um gancho sobre [recipient.GetShortUIName] : $VALUE|=+0$"
 ep3_laamps.8108.c: "Um Novo Rosto no Acampamento"
 ep3_laamps.8108.c.desc: "Enquanto tento calcular a logística do nosso próximo movimento, um[new_person.Custom('ES_XA')] passante imponente levanta sem esforço uma de nossas carroças. Um dos meus seguidores corre até mim e implora:

"[ROOT.Char.Custom('MistressMaster')|U], [new_person.GetSheHe] levantou a carroça inteira acima da cabeça! Pode ficar? [new_person.GetSheHe|U] nem precisa de uma arma, pode simplesmente agarrar e lançar nossos inimigos!"

Uma pessoa assim poderia ser muito útil, se também carregasse minha bagagem. No entanto, consumirá muitas provisões."
 ep3_laamps.8108.legitimist_too_poor: "Uma única gargalhada rompe a melancolia da noite. Depois outra, e vejo meus seguidores sisudos transformados em uma turma de crianças risonhas. Qual é a origem dessa comoção?\n\n"Ah, finalmente nos encontramos, [ROOT.Char.GetTitledFirstNameNoTooltip|l]! Permita-me apresentar-me; sou [new_person.GetName], bobo[new_person.Custom('ES_OnOna')] sem igual. Já me apresentei no passado para [location_top_liege.Custom('ES_ElLa')] grande [location_top_liege.GetName|l], mas agora me ofereço a você e ao seu senso de humor!"."
 ep3_laamps.8109.t: "Estamos há algum tempo no/a [location.GetTerrain.GetNameNoTooltip|l] do povo [location.GetCulture.GetName] de [location_county.GetNameNoTier]. Os moradores locais têm visitado com frequência nosso acampamento para negociar, ou simplesmente para passar o tempo. Recentemente, vi um[new_person.Custom('ES_XA')] [new_person.GetWomanMan] ficar por mais tempo que os demais.

"Aqui em [location_county.GetNameNoTier], tivemos anos de vacas magras e anos de vacas gordas. E acho que as vacas magras estão voltando. Não quero morrer onde nasci, nem permanecer aqui por mais tempo. Humildemente peço que me deixem juntar-me ao seu bando, meu [ROOT.Char.GetLadyLord|U].""
 ep3_laamps.8109.desc: "Bem-vindo, [new_person.GetFirstName]!"
 ep3_laamps.8109.a: "Por favor, vá embora."
 ep3_laamps.8109.a.desc: "Vá embora e espalhe a palavra: Fiquem longe!"
 ep3_laamps.8110.t: "Os personagens não tentarão se juntar ao seu acampamento aleatoriamente pelos próximos 20 anos."
 ep3_laamps.8110.desc_intro: "Há muito tempo, foi feito um acordo: [petitioned_ruler.GetName] fornecia apoio para a reconquista de [claimed_title.GetName] na forma de soldados e ouro adiantados, em troca de uma parcela substancial da renda do meu domínio.\n\nNo entanto, [petitioned_ruler.GetFirstName] jamais teria previsto que"
