l_spanish:
 #Drassanes
 building_type_drassanes_01: "$building_drassanes_01$"
 building_type_drassanes_01_desc: "$building_drassanes_01_desc$"
 building_drassanes_01: "Drassanes"
 building_drassanes_01_desc: "Fora das muralhas da cidade de Barcelona, aos pés da colina #italic Montjuich#!, este grande arsenal de doca seca arma e protege uma frota de galés de guerra.\nSob abóbadas pontiagudas de pedra, trabalhadores labutam incansavelmente. Torres altas e longos muros guardam os segredos de seu trabalho contra forasteiros."
 #Great Kyz Kala
 building_type_kyz_kala_01: "$building_kyz_kala_01$"
 building_type_kyz_kala_01_desc: "$building_kyz_kala_01_desc$"
 building_kyz_kala_01: "Grande Kyz Kala"
 building_kyz_kala_01_desc: "Este imenso palácio se ergue sobre o exuberante oásis de Merv. Paredes estriadas envolvem oficinas, arsenais e salões cavernosos onde emissários e burocratas cumprem seus deveres.\nMeio residência, meio fortaleza, este grande edifício é tão capaz de sediar os mais magníficos banquetes quanto de repelir os mais bárbaros ataques."
 #Cluny Abbey
 building_type_cluny_abbey_01: "Mosteiro de Cluny"
 building_type_cluny_abbey_01_desc: "$building_cluny_abbey_01_desc$"
 building_cluny_abbey_01: "Abadia de Cluny"
 building_cluny_abbey_01_desc: "Um presente de terras e direitos, em troca da salvação eterna. Esse é o pacto firmado entre a comunidade monástica de Cluny e o senhor local.\nCom o tempo, cresceu e se tornou uma comunidade vibrante e influente, livre de interferência secular, impondo a disciplina beneditina por toda parte.\n\nSob seus muitos telhados vermelhos, monges rezam, trabalham e iluminam manuscritos – um modelo a ser seguido em todo o continente."
 building_cluny_abbey_02: "Maior Ecclesia"
 building_cluny_abbey_02_desc: "O que antes eram apenas algumas moradias monacais foi substituído por um vasto complexo religioso.\nPara consolidar esse legado, seus abades embarcaram em um colossal projeto de construção, a #italic Maior Ecclesia#!. Destinada a ser a maior igreja da cristandade, suas cinco naves são mais longas que as do Vaticano, e suas imensas abóbadas de pedra são uma realização arquitetônica repleta de torres e telhados."
 #Walls of York
 building_type_york_walls_01: "$building_york_walls_01$"
 building_type_york_walls_01_desc: "$building_york_walls_01_desc$"
 building_york_walls_01: "Muralhas de York"
 building_york_walls_01_desc: "Estendendo-se por vários quilômetros, essas vastas muralhas protegem a cidade desde os tempos dos Césares. Elas utilizam de forma inteligente os dois rios que serpenteiam pelos campos, protegendo-a de inimigos a leste e a oeste. Todo o tráfego é canalizado por pontos estratégicos, os #italic Bars#!, onde pedágios podem ser cobrados ou flechas e fogo podem ser lançados."
 #Great Mosque of Damascus
 building_type_damascus_mosque_01: "$building_damascus_mosque_01$"
 building_type_damascus_mosque_01_desc: "$building_damascus_mosque_01_desc$"
 building_damascus_mosque_01: "Grande Mesquita de Damasco"
 building_damascus_mosque_01_desc: "Esta mesquita tem uma história venerável para contar. Aqui, séculos de espiritualidade e engenhosidade maravilhosa se sobrepõem, pois foi construída sobre um templo romano e uma antiga basílica cristã.\nO edifício é renomado por seus mármores opulentos e coloridos, bem como por seus mosaicos dourados montados por artistas vindos de tão longe quanto Constantinopla."
 #Jokhang Temple
 building_type_jokhang_01: "$building_jokhang_01$"
 building_type_jokhang_01_desc: "$building_jokhang_01_desc$"
 building_jokhang_01: "Templo de Jokhang"
 building_jokhang_01_desc: "La leyenda dice que el Jokhang se construyó sobre un antiguo lago sagrado, que era el corazón de una diablesa con la forma del Tíbet. Tres veces se levantó y tres veces se lo tragó la furia del lago antes de que las oraciones y ofrendas sacrificiales de la esposa del primer emperador fueron capaces de aplacarla por fin.\nEl templo es el más sagrado de esta tierra, un complejo laberíntico de patios y residencias monásticas surcadas por corredores cavernosos y muros cubiertos de mantequilla de yak."
 #Wartburg
 building_type_wartburg_01: "$building_wartburg_01$"
 building_type_wartburg_01_desc: "$building_wartburg_01_desc$"
 building_wartburg_01: "Wartburg"
 building_wartburg_01_desc: "Na floresta da Turíngia, situada no topo de um grande precipício rochoso, esta fortaleza controla todo o movimento de mercadorias e pessoas na região.\nUma pesada barbacã protege o único acesso ao castelo, e altas muralhas brancas serpenteiam pelas fendas da montanha. O #italic Palas#! é o edifício mais importante do complexo, um imenso salão de pedra fria aquecido pelas muitas lareiras em seu interior."
 #Beta Giyorgis
 building_type_beta_giyorgis_01: "$building_beta_giyorgis_01$"
 building_type_beta_giyorgis_01_desc: "$building_beta_giyorgis_01_desc$"
 building_beta_giyorgis_01: "São Jorge de Lalibela"
 building_beta_giyorgis_01_desc: "O #italic Beta Giyorgis#! foi esculpido inteiramente em uma rocha vulcânica avermelhada. Ao seu redor, há uma dúzia de outros templos e edifícios irmãos, projetados para representar tanto a Jerusalém Terrena quanto a Celestial. Esta é a prova viva do vínculo entre o reino sagrado e esta terra.\nEscavado profundamente na rocha, o salão principal da igreja é ricamente pintado com belos afrescos, enquanto ícones sagrados adornam suas paredes."
 #Holy Wisdom of Novgorod
 building_type_holy_wisdom_01: "$building_holy_wisdom_01$"
 building_type_holy_wisdom_01_desc: "$building_holy_wisdom_01_desc$"
 building_holy_wisdom_01: "Santa Sabedoria de Deus"
 building_holy_wisdom_01_desc: "Esta magnífica igreja foi modelada com base na Hagia Sophia, para representar a mesma luz, riqueza e poder em uma terra gélida do norte. O austero calcário branco contrasta com as cores vibrantes dos afrescos em seu interior. Iluminada pelo brilho quente das velas, sombras dançam pelos mosaicos dourados das muitas cúpulas da catedral."
 #Kano Earthworks
 building_type_kano_walls_01: "$building_kano_walls_01$"
 building_type_kano_walls_01_desc: "$building_kano_walls_01_desc$"
 building_kano_walls_01: "Obras de Terra de Kano"
 building_kano_walls_01_desc: "Massivas muralhas de terra e barro, com vários metros de altura, cercam a antiga cidade de Kano.\nEssas fortificações abrangem uma área muito maior do que a habitada pelos moradores, incluindo campos de trigo para sustentar a população durante longos cercos."
 #Somapura University
 building_type_somapura_university_01: "$building_somapura_university_01$"
 building_type_somapura_university_01_desc: "$building_somapura_university_01_desc$"
 building_somapura_university_01: "Universidade de Somapura"
 building_somapura_university_01_desc: "Por séculos, Somapura tem sido um dos mais importantes centros de aprendizado da Índia, atraindo estudiosos de regiões distantes graças às suas múltiplas conexões com mosteiros budistas, jainistas e hindus.\nSeu plano quadrangular representa a verdadeira harmonia e pureza do universo, um local perfeito para o florescimento da mente."
 #Duomo of Florence
 building_type_duomo_florence_01: "Duomo de Florença"
 building_type_duomo_florence_01_desc: "Sede do arcebispo local e grande motivo de orgulho cívico para todos os cidadãos de Florença, o Duomo é uma das maiores façanhas arquitetônicas já concebidas."
 building_duomo_florence_01: "Santa Reparata"
 building_duomo_florence_01_desc: "Seguindo as antigas muralhas romanas perto de seu portão norte, esta basílica cristã primitiva tem sido o lar dos cristãos de Florença desde antes da época de Constantino. Sofreu incêndios criminosos e saques, reconstruções e bênçãos, mas manteve suas três naves originais e seus elegantes arcos arredondados.\nAinda assim, à medida que a cidade cresce, a velha basílica pode precisar crescer junto com ela."
 building_duomo_florence_02: "Batistério de São João"
 building_duomo_florence_02_desc: "Este é um colossal batistério octogonal no centro da cidade, dedicado a seu padroeiro, São João.\nO edifício é coberto por mármores luxuosos e decorado com esculturas primorosas e mosaicos dourados, um verdadeiro testemunho da riqueza da cidade. A lenda diz que já foi um templo dedicado a Marte, e sua aparência lembra notavelmente o Panteão de Roma."
 building_duomo_florence_03: "Santa Maria del Fiore"
 building_duomo_florence_03_desc: "Uma grande catedral - um #italic Duomo#! - digna da rica Florença agora se ergue sobre a cidade.\nAs longas naves e o enorme átrio octogonal são revestidos por mármores de cores vibrantes, criando um jogo óptico de profundidade. A fachada é decorada com estátuas de profetas, deuses e patronos. Sua alta torre sineira marca as horas de trabalho e oração para os cidadãos."
 building_duomo_florence_04: "A Cúpula"
 building_duomo_florence_04_desc: "A #italic Cúpula#! se ergue imensa sobre o complexo. Esbelta e etérea contra o céu azul, é a maior realização dos construtores florentinos.\nA torre é mais alta e larga do que qualquer outra já concebida, sem contrafortes ou sistemas de suporte externos para evitar seu colapso, graças ao uso engenhoso de uma dupla camada de tijolos e alvenaria."
 #Konarak Sun Temple
 building_type_konark_temple_01: "$building_konark_temple_01$"
 building_type_konark_temple_01_desc: "$building_konark_temple_01_desc$"
 building_konark_temple_01: "Templo do Sol de Konarak"
 building_konark_temple_01_desc: "Trabalhado por milhares de artesãos, o Templo do Sol de Konarak é um imenso templo dedicado ao deus do sol, Surya. Todo o complexo foi construído para se assemelhar ao poderoso carro do deus, carregando a luz do mar em direção ao leste.\nUm magnífico exemplo da arquitetura Kalinga, o templo é coberto de relevos e esculturas representando deuses, soldados, músicos e criaturas lendárias, narrando as escrituras hindus."
 #University of al-Qarawiyyin
 building_type_al_qarawiyyin_university_01: "$building_al_qarawiyyin_university_01$"
 building_type_al_qarawiyyin_university_01_desc: "$building_al_qarawiyyin_university_01_desc$"
 building_al_qarawiyyin_university_01: "Universidade de al-Qarawiyyin"
 building_al_qarawiyyin_university_01_desc: "Fundado por mercadores e migrantes de Kairouan, este vasto complexo tornou-se um dos mais prestigiados centros de ensino superior do mundo islâmico ocidental. Atrai estudiosos de regiões distantes e educa as elites locais nas disciplinas mais refinadas.\nA #italic madrasa#! é composta por vários salões e aposentos - oferecendo cama e descanso a estudantes estrangeiros, com o #italic Sahn#! servindo como pátio central para debates públicos."
 #Kairouan Basins
 building_type_kairouan_basins_01: "$building_kairouan_basins_01$"
 building_type_kairouan_basins_01_desc: "$building_kairouan_basins_01_desc$"
 building_kairouan_basins_01: "Reservatórios de Kairouan"
 building_kairouan_basins_01_desc: "Construídos para fornecer água potável à cidade em tempos de necessidade, esses enormes reservatórios purificam a água da chuva atuando como tanques de decantação e filtrando os sedimentos.\nO sistema é composto por várias seções interligadas, desde um reservatório menor até um maior, culminando em um tanque de água decorado em alvenaria."
 #Ghana Palace
 building_type_ghana_palace_01: "$building_ghana_palace_01$"
 building_type_ghana_palace_01_desc: "$building_ghana_palace_01_desc$"
 building_ghana_palace_01: "Palácio de Gana"
 building_ghana_palace_01_desc: "Cercado por um bosque sagrado, encontra-se o palácio dos #italic Ghanas#! - chefes reais da cidade.\nO complexo é composto por edifícios de arenito e tijolos de barro, protegidos por um recinto murado. Suas paredes são adornadas com relevos e entalhes magnificamente coloridos. Uma estrutura imponente, este palácio domina a cidade ao seu redor."
 #Visegrad Citadel
 building_type_visegrad_castle_01: "$building_visegrad_castle_01$"
 building_type_visegrad_castle_01_desc: "$building_visegrad_castle_01_desc$"
 building_visegrad_castle_01: "Cidadela de Visegrád"
 building_visegrad_castle_01_desc: "Esta cidadela é um sistema grandioso e inexpugnável de muralhas e torres que protege a curva do Danúbio e controla seu rico comércio. \nA cidadela de Visegrad é composta por uma porção inferior com uma robusta torre hexagonal de frente para o rio e uma acrópole superior que coroa a elevada colina. A enorme fortificação triangular serve tanto como residência quanto como um opulento refúgio de caça."
 #Archcollegiate Church of St. Mary and St. Alexius in Tum
 building_type_wawel_cathedral_01: "$building_wawel_cathedral_01$"
 building_type_wawel_cathedral_01_desc: "$building_wawel_cathedral_01_desc$"
 building_wawel_cathedral_01: "Igreja Colegial de Santa Maria e São Alexius"
 building_wawel_cathedral_01_desc: "Construída com gnaisse e calcário com a ajuda de artesãos da Alemanha, esta grande igreja de pedra é uma das primeiras do seu tipo nas terras polonesas e um testemunho do poder da Igreja.\nAs massivas paredes oferecem aos fiéis a promessa de salvação e proteção crucial contra os mortais. Diz-se que a torre ocidental carrega as marcas das garras do Diabo, um testemunho de seu potencial defensivo."
 building_wawel_cathedral_02: "Igreja Arquecollegial de Santa Maria e São Alexius"
 building_wawel_cathedral_02_desc: "$building_wawel_cathedral_01_desc$\nApós ser elevada ao posto de Igreja Arquecollegial, agora é mantida por um colégio de cânones, um corpo organizado composto unicamente por clérigos. Seu tamanho e esplendor são magníficos, mas como não é a sede de um bispo, não tem o título de catedral."
 building_wawel_cathedral_03: "Catedral de Santa Maria e São Alexius"
 building_wawel_cathedral_03_desc: "$building_wawel_cathedral_01_desc$\nApós investir recursos substanciais, o Papa finalmente criou uma nova diocese aqui, juntamente com a sede de um bispo. Finalmente, este orgulhoso edifício pode ser chamado de catedral."
 #Vatapi Caves
 building_type_vatapi_caves_01: "$building_vatapi_caves_01$"
 building_type_vatapi_caves_01_desc: "$building_vatapi_caves_01_desc$"
 building_vatapi_caves_01: "Cavernas de Vatapi"
 building_vatapi_caves_01_desc: "Construídas pela antiga dinastia Chalukya, essas cavernas sagradas foram escavadas profundamente em uma imponente formação de arenito. Em seu interior, encontra-se um mundo silencioso e sagrado.\nUm portal triunfal conduz os peregrinos à face monolítica da montanha. As cavernas são decoradas com ídolos de todas as principais religiões da Índia."
 #Golden fort of Jaisalmer
 building_type_jaisalmer_fort_01: "$building_jaisalmer_fort_01$"
 building_type_jaisalmer_fort_01_desc: "$building_jaisalmer_fort_01_desc$"
 building_jaisalmer_fort_01: "Forte Dourado"
 building_jaisalmer_fort_01_desc: "As muralhas douradas de Jaisalmer abrigam não apenas uma fortaleza defensiva, mas toda uma cidade, situada no meio do deserto de Thar.\nDiz-se que, ao pôr do sol, suas paredes adquirem uma tonalidade quente de mel dourado, enquanto, durante o dia, podem fazer a cidade se camuflar com a paisagem ao redor."
