 tgp_east_asia_interaction_events.1000.opening: "[recipient.Custom2('AppropriateGreetingPositive', actor)]"
 tgp_east_asia_interaction_events.1000.desc: "Fico lisonjeado de que você se ofereça para moldar meu reino [recipient.GetPrimaryTitle.GetAdjectiveNoTooltip] à sua imagem."
 tgp_east_asia_interaction_events.1000.favor: "\n\nEmbora eu ache que talvez eu tenha alguma dificuldade em convencer os outros…"
 tgp_east_asia_interaction_events.1000.a: "Um deus estaria em dívida com você."
 tgp_east_asia_interaction_events.1000.b: "Esta é minha vontade. Ousais obstruir meu decreto?"
 tgp_east_asia_interaction_events.1001.gold: "\n\nTalvez, se eu pudesse mostrar uma prova da sua boa vontade, os outros também ficariam impressionados…"
 tgp_east_asia_interaction_events.1002.a: "Será recompensado por me servir"
 tgp_east_asia_interaction_events.1003.opening: "[actor.Custom2('AppropriateGreetingPositive', recipient)]"
 tgp_east_asia_interaction_events.1003.desc: "É hora de que [recipient.GetPrimaryTitle.GetBaseNameNoTier] faça finalmente parte do mandala [actor.GetPrimaryTitle.GetAdjectiveNoTooltip]. Ofereço-lhe governar como [actor.GetPrimaryTitle.GetTierAsNameNoTooltip|l]. Para isso, eu o investirei com o pleno apoio de meu sacerdócio."
 tgp_east_asia_interaction_events.1003.end: "\n\nFarás valer a minha vontade como um dos meus representantes na Terra."
 tgp_east_asia_interaction_events.1003.a: "Que todos o saibam!"
 tgp_east_asia_interaction_events.1003.b: "Como um favor a você, será feito."
 tgp_east_asia_interaction_events.1003.c: "Precisarei de recursos para levar isso a cabo."
 tgp_east_asia_interaction_events.1003.d: "Um governante de [recipient.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] não se curvará!"
 tgp_east_asia_interaction_events.1000.accept_toast: "Exigência aceita"
 tgp_east_asia_interaction_events.1000.refuse_toast: "Exigência recusada"
 tgp_east_asia_interaction_events.1000.force_toast: "Governo forçado"
