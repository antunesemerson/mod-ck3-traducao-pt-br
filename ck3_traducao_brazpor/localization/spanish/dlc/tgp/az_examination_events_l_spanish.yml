l_spanish:
 az_examination.0001.t: "O julgamento do pincel"
 az_examination.0001.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('entrant'))] [entrant.GetTitledHouseNameOrFirstName] se inclina levemente, apresentando um pergaminho cuidadosamente dobrado.\n\n“[ROOT.Char.GetTitleAsNameNoTooltip|U]”, diz. “Com toda a humildade, ofereço minhas composições para sua crítica. Trabalhei nestas linhas — algumas são ousadas por sua certeza, enquanto outras… refletem minha busca por equilíbrio. Agradeço suas opiniões.”"
 az_examination.0001.intrigue: ""Desde que se lembre de que sou eu quem o está ajudando a você"."
 az_examination.0001.a: "Ofereça comentários gentis e construtivos."
 az_examination.0001.b: "Zombar de suas tentativas patéticas."
 az_examination.0001.c: "Comparar seu trabalho com o dos antigos e escrever um comentário."
 az_examination.0002.t: "Desafio público"
 az_examination.0002.desc.exam: "[debater.Custom2('MyCharacterIntroduction', ROOT.Char)|U] $az_examination.0002.desc$"
 az_examination.0002.desc.debate: "[debater.GetFirstName], representante do [debater_movement.GetName], $az_examination.0002.desc$"
 az_examination.0002.desc: "me encurrala quando saio do escritório. A expressão de superioridade em seu rosto me diz que ele está esperando a chance de atacar um[ROOT.Char.Custom('ES_XA')] erudit[ROOT.Char.Custom('ES_OA')] desprevenid[ROOT.Char.Custom('ES_OA')].\n\n"Ninguém entende os Anais da Primavera e do Outono melhor do que eu! As palavras de [Glossary( 'Kǒngzǐ', 'CONFUCIUS_GLOSS' )] não são um simples registro de eventos. Sua formulação sutil exalta os virtuosos e condena os perversos. Não concorda?"."
 az_examination.0002.a: ""Obviamente uma esp?cie de [debater.Custom2('InsultNoun', ROOT.Char)] como voc? n?o conseguiria l?-lo direito!""
 az_examination.0002.b: ""Não há lugar para fantasia aqui"."
 az_examination.0002.c: ""Cada caminho para a sabedoria é único"."
 az_examination.0002.d: "Abandone este debate improdutivo."
 az_examination.0003.t: "Uma infusão sem honra"
 az_examination.0003.desc: "[tea_offender.Custom2('MyCharacterIntroduction', ROOT.Char)|U] aproxima-se dos examinadores com uma bandeja de chá. Serve o chá com a mão errada, as mangas roçando o chão, e oferece as xícaras sem reverência nem bênção.\n\n[host_examiner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] observa com frio desdém. "Vós abandonais os ritos corretos em prejuízo da vossa virtude, [tea_offender.GetFirstNameNoTooltip]", declara alto o bastante para que todos o ouçam. As mãos de [tea_offender.GetFirstNameNoTooltip] tremem levemente enquanto se curva de forma rígida."
 az_examination.0003.a: ""Permita-me demonstrar, [host_examiner.GetTitledFirstNameNoTooltip|l]"."
 az_examination.0003.b: ""Por que esta espécie de [tea_offender.Custom2('InsultNoun', ROOT.Char)] nos serve?""
 az_examination.0003.c: "Permanecer em silêncio."
 az_examination.0004.t: "Respostas proibidas"
 az_examination.0004.desc: "Pillo a [caught_entrant.Custom2('MyCharacterIntroduction', ROOT.Char)] hojeando nerviosamente un manuscrito gastado, con los ojos abiertos con un entusiasmo mal disimulado.\n\nTartamudea, «So… ¡solo es como referencia! No lo iba a usar en el examen, ¡palabra!». [merchant.Custom('ES_ElLa')|U] mercader, [merchant.GetTitledHouseNameOrFirstName], me sonríe con complicidad. «Una ayuda de estudio muy valiosa, oh, grande. Solo unas pocas monedas. ¿Tal vez un[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] tan distinguid[ROOT.Char.Custom('ES_OA')] como vos querría el conjunto completo?»."
 az_examination.0004.b: "Reporte esta desonra e confisque o pergaminho."
 az_examination.0004.c: "Adquira um pergaminho interessante [merchant.Custom('ES_DelDela')] mercador."
 az_examination.0004.c.tt: "Você se torna [ROOT.Char.Custom('ES_ElLa')] dono[ROOT.Char.Custom('ES_OA')] de um [artifact|lE] pergaminho de [learning|lE] e [GetTrait('confucian_education').GetName(GetNullCharacter)|l]"
 az_examination.0004.c.tt_equipped: "Comprado um [artifact_scroll.GetName|l]"
 az_examination.0004.d: ""Não vi nada"."
 az_examination.0005.china.t: "Refletindo sobre Mêncio"
 az_examination.0005.china.desc: "[fellow_examiner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] está diante de uma estela de pedra com um verso de Mêncio gravado nela, com as mãos cruzadas atrás das costas em contemplação.\n\n\"Li esta linha incontáveis vezes\", murmura [fellow_examiner.GetSheHe] enquanto você se aproxima, \"mas sua essência ainda me escapa. Mêncio diz: \"Uma grande pessoa é aquela que conserva o coração de uma criança\". O que você acha disso, [ROOT.Char.GetTitledFirstNameNoTooltip|l]?\"."
 az_examination.0005.korea.t: "Refletindo sobre Choe Chiwon"
 az_examination.0005.korea.desc: "[fellow_examiner.Custom2('MyCharacterIntroduction', ROOT.Char)] contempla una piedra grabada; la caligrafía es sin duda la de Choe Chiwon, tallada en líneas que fluyen. [fellow_examiner.GetFirstNameNoTooltip] tiene las manos a la espalda, la mirada perdida en plena reflexión.\n\n«Choe escribió estas palabras al regresar de la corte Tang», dice con voz queda mientras te unes a [fellow_examiner.GetSheHe]. «Dijo: \"El noble debe gobernar su corazón antes de gobernar a otros\". Les llevo dando vueltas desde que era [Select_CString( fellow_examiner.IsFemale, 'una pupila', 'un pupilo' )] y me siguen confundiendo»."
 az_examination.0005.t: "Refletindo sobre um verso antigo"
 az_examination.0005.desc: "[fellow_examiner.Custom2('MyCharacterIntroduction', ROOT.Char)] chama sua atenção ao contemplar atentamente uma estela com um texto clássico gravado.\n\n“Essa passagem me intriga há muito tempo”, diz suavemente. “O que você acha, [ROOT.Char.GetTitledFirstNameNoTooltip|l]?”."
 az_examination.0005.china.a: ""É um chamado para preservar o que os antigos chamavam [Glossary( 'de', 'CONFUCIAN_DE')]"."
 CONFUCIAN_DE: "Refere-se ao poder moral ou à virtude, uma força que permite a um indivíduo influenciar positivamente os outros e manter a harmonia social."
 az_examination.0005.a: ""É um chamado para preservar a clareza moral de alguém"."
 az_examination.0005.b: ""A ordem legítima acima de tudo"."
 az_examination.0005.c: ""Que… sensível da parte dele"."
 az_examination.0005.d: ""Devemos buscar o significado por nós mesmos"."
 az_examination.0006.t: "Piedade familiar"
 az_examination.0006.desc: "Vislumbro a [favored_entrant.GetFirstName], em pé talvez perto demais de [local_ruler.GetTitledHouseNameOrFirstName]. Seus olhos se encontram por tempo um pouco demais. "Não falharei com você, [favored_entrant.Custom2('RelationToMe', SCOPE.sC('local_ruler'))]". [favored_entrant.GetFirstNameNoTooltip] sussurra sob a respiração.\n\nQuando [local_ruler.Custom('ES_ElLa')] [local_ruler.GetTitleAsNameNoTooltip] me avista, ele se aproxima rapidamente de mim. "[favored_entrant.GetFirstNameNoTooltip] conquistou seu lugar, eu lhe asseguro", murmura [local_ruler.Custom('ES_ElLa')] [local_ruler.GetTitledFirstNameNoTooltip|l] e um sorriso educado aparece em seus lábios."
 az_examination.0006.a: ""Vou verificar isso pessoalmente"."
 az_examination.0006.b: ""Todos nos erguemos com a mão que nos é dada"."
 az_examination.0006.c: ""Que seu trabalho fale por [favored_entrant.GetSheHe]"."
 az_examination.0007.t: "O peso da tinta"
 az_examination.0007.desc: "[aged_examiner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] prepara el segundo de los [Glossary( 'cuatro tesoros', 'FOUR_TREASURES')] antes del examen. Muele hollín de pino en el tintero de bronce con golpes precisos, practicados, para mezclar tinta de buena calidad. Con una mirada aguda, me pasa la mano del mortero.\n\n«Ahora os toca a vos. Esta tinta debe fluir como la luz de la luna sobre el agua y durar más que los imperios. La fórmula correcta está en el [Glossary( 'Libro de los ritos', 'BOOK_OF_RITES')]»."
 BOOK_OF_RITES: "Um clássico sobre a ordem e a harmonia, que prescreve a conduta adequada para eruditos, filhos e soberanos igualmente. Seguir seus preceitos é honrar os alicerces da civilização."
 FOUR_TREASURES: "Os Quatro Tesouros — pincel, tinta, papel e pedra de tinta — são as ferramentas essenciais do erudito. Seu uso cuidadoso reflete disciplina, clareza e reverência pela tradição."
 az_examination.0007.a: ""Os clássicos nunca falham"."
 az_examination.0007.b: ""Algumas gotas de resina de ginseng…""
 tgp_ginseng_resin_modifier: "Mistura experimental de tinta"
 tgp_ginseng_resin_modifier_desc: "Os rituais silenciosos do estudo agora perduram em cada gesto seu, conferindo um toque sutil ao seu comportamento."
 az_examination.0007.c: ""Que os servos misturem a tinta"."
 az_examination.0008.t: "Um desafio oportuno"
 az_examination.0008.desc: "Antigos pergaminhos de prática são desenrolados entre [examiner.Custom2('MyCharacterIntroduction', ROOT.Char)] e minha pessoa. \"Eles são de uma era anterior\", observa, tirando o pó do pergaminho com reverência. \"Por que não responde a uma das perguntas — e me deixa avaliar sua resposta?\".\n\n[ROOT.GetCharacter.Custom('quirk_pos_adverb')|U] , ergo uma sobrancelha. Esses pergaminhos me fazem lembrar da época em que [memory.GetDescription|l]."
 az_examination.0008.a: ""Vamos avaliar as respostas um do outro"."
 az_examination.0008.a.success.tt: "Você supera [examiner.GetTitledHouseNameOrFirstName]"
 az_examination.0008.a.failure.tt: "A sagacidade [examiner.Custom('ES_DelDela')] [examiner.GetTitledFirstName|l] supera a sua"
 az_examination.0008.b: ""Ah, que dias aqueles… Recordemos eles"."
 az_examination.0008.c: ""Hoje não"."
 az_examination.0009.t: "Uma colisão de tintas"
 az_examination.0009.desc: "A caixa cai no chão com um terrível splash. [clumsy_entrant.Custom2('MyCharacterIntroduction', ROOT.Char)] encara, horrorizad[clumsy_entrant.Custom('ES_OA')] , com o pincel ainda na mão e tinta respingada nas pernas, enquanto [angry_examiner.Custom2('MyCharacterIntroduction', ROOT.Char)] avança furioso, com os olhos em fúria.\n\n\"Vocês arruinaram um dia inteiro de preparativos!\" ele brada."
 az_examination.0009.a: ""Foi culpa minha. Eu deveria ter prendido a caixa"."
 az_examination.0009.b: ""Este nível de desastrado é inaceitável!"."
 az_examination.0009.c: ""Limpe-o. Temos trabalho a fazer"."
 az_examination.0010.t: "Um favor selado"
 az_examination.0010.desc: "[requesting_entrant.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima com passos silenciosos, olhando ao redor, e me entrega um pergaminho.\n\n"Poderíeis entregar isto a [target_examiner.GetTitledHouseNameOrFirstName]?", sussurra. "É... privado"."
 az_examination.0010.a: "Entregue a carta discretamente."
 az_examination.0010.b: "Denunciar a tentativa de [requesting_entrant.GetFirstNameNoTooltip] de influenciar o exame."
 az_examination.0010.c: "Quebre o selo imediatamente e leia-o."
 az_examination.0010.c.tt: "Você descobre um [secret|lE] pertencente a [requesting_entrant.GetFirstName]"
 az_examination.0010.c.toast: "Uma revelação escandalosa!"
 az_examination.0011.t: "Uma troca sussurrada de assentos"
 az_examination.0011.desc: "[sneaky_entrant_1.GetTitledHouseNameOrFirstName] se inclina hacia [sneaky_entrant_2.GetTitledHouseNameOrFirstName]. Hablan en murmullos pero puedo oír por encima la conversación de [Select_CString(And(sneaky_entrant_1.IsFemale, sneaky_entrant_2.IsFemale), 'las examinandas', 'los examinados')]:\n\n«Si nos cambiamos los asientos», murmura [sneaky_entrant_2.Custom('ES_ElLa')] [sneaky_entrant_2.GetTitledFirstNameNoTooltip|l], «será el examinante de la mirada amable quien juzgue mi ensayo»."
 az_examination.0011.a: "Denuncie o esquema deles diante de toda a sala."
 az_examination.0011.b: "Ofereça sua ajuda… e seu silêncio."
 az_examination.0011.b.success: "[Select_CString(And(sneaky_entrant_1.IsFemale, sneaky_entrant_2.IsFemale), 'Las examinandas', 'Los examinados')] se apegam a cada palavra sua"
 az_examination.0011.b.failure: "[Select_CString(And(sneaky_entrant_1.IsFemale, sneaky_entrant_2.IsFemale), 'Las examinandas', 'Los examinados')] suspeitam de você"
 az_examination.0011.c: "Exorte-os em voz baixa a reconsiderar."
 az_examination.0012.t: "Um convite privado"
 az_examination.0012.desc: "[senior_examiner.GetTitledHouseNameOrFirstName], um[senior_examiner.Custom('ES_XA')] examinante respeitad[senior_examiner.Custom('ES_OA')], me saúda com um sorriso gentil à sombra do pavilhão do jardim. “É sempre uma alegria falar com aqueles que valorizam o conhecimento. Venha, junte-se a mim para tomar chá”, proclama calorosamente. Percebo aquela espécie de [jealous_rival.Custom2('InsultNoun', ROOT.Char)] [jealous_rival.Custom2('InsultAdjective', ROOT.Char)] de [jealous_rival.GetTitledHouseNameOrFirstName] do outro lado do pavilhão, com os olhos queimando de inveja enquanto se aproxima com uma bandeja, tentando obviamente cair nas boas graças de [senior_examiner.Custom('ES_ElLa')] examinante."
 az_examination.0012.a: ""Seria uma honra para mim"."
 az_examination.0012.b: ""E se abríssemos espaço para mais alguém?""
 az_examination.0012.c: ""Perdoe-me… Hoje preciso cuidar dos meus pergaminhos"."
 az_examination.0013.t: "Os ensaios desaparecidos"
 az_examination.0013.desc: "«¡Han desaparecido!», exclama [fellow_assistant.GetTitledHouseNameOrFirstName], otr[fellow_assistant.Custom('ES_OA')] ayudant[fellow_assistant.Custom('ES_EA')], sacando de un tirón un cajón tras otro. «Los ensayos para la clasificación; ¡he buscado por todas partes!».\n\nAl otro lado de la estancia, [calm_examiner.GetTitledHouseNameOrFirstName], un[calm_examiner.Custom('ES_OA')] de [calm_examiner.GetHerHim]s examinantes, hojea un libro con despreocupación y murmura: «Dejarse llevar por el pánico no nos los va a devolver». Tengo la certeza de que esta especie de [calm_examiner.Custom2('InsultNoun', ROOT.Char)] tiene algo que ver con esto."
 az_examination.0013.a: ""Vamos procurar juntos ? n?s as encontraremos a tempo!""
 az_examination.0013.a.success: "Você recupera os pergaminhos perdidos"
 az_examination.0013.a.failure: "Os pergaminhos continuam perdidos"
 az_examination.0013.b: ""Você está calmo demais[calm_examiner.Custom('ES_OA')] para esta situação, [calm_examiner.GetFirstNameNoTooltip]. O que você está escondendo?"."
 az_examination.0013.b.success: "Oportunamente, [calm_examiner.GetFirstNameNoTooltip] "se lembra\" de ter movido os ensaios"
 az_examination.0013.b.failure: "Sua acusação é recebida com desdém frio"
 az_examination.0013.c: ""Eu simplesmente os reescreverei"."
 az_examination.0013.d: ""Isso não é problema meu"."
 az_examination.0014.t: "Sob pressão"
 az_examination.0014.desc: "Desperto de repente. Será que acabei dormid[ROOT.Char.Custom('ES_OA')] na minha mesa? Toco a bochecha e sinto na pele a marca do livro em que havia apoiado a cabeça.\n\nMe viro para encarar [praising_examiner.Custom('ES_AlAla')] examinante [praising_examiner.GetTitledHouseNameOrFirstName], cujos passos me tiraram do sono. Um leve sorriso curva seus lábios. "Não se aflija, jovem. Seus esforços diligentes não passaram despercebidos e, com o tempo, sua dedicação certamente será recompensada".\n\nPensar que minhas noites em claro e as longas horas que passei lendo foram reconhecidas. É gratificante."
 az_examination.0014.a: ""Suas expectativas serão atendidas"."
 az_examination.0014.c: "«¿Seré un[ROOT.Char.Custom('ES_XA')] aprendiz[ROOT.Char.Custom('ES_XA')] dign[ROOT.Char.Custom('ES_OA')]?»."
 az_examination.0014.d: ""Sua preocupação me comove"."
 tgp_examiner_promise_modifier: "Grandes expectativas"
 tgp_examiner_promise_modifier_desc: "Este personagem prometeu honrar os elogios de seus mais velhos e toda a atenção que isso traz."
 az_examination.0015.t: "O orgulho de um[proud_family_member.Custom('ES_XA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('proud_family_member'))]"
 az_examination.0015.desc: "[proud_family_member.Custom2('MyCharacterIntroduction', ROOT.Char)|U] está perto da borda da reunião, os olhos brilhando de orgulho.\n\n"Lá está! É[ROOT.Char.Custom('ES_EA')] minha [proud_family_member.Custom2('RelationToMeShort', ROOT.Char)] [ROOT.Char.Custom('ComplimentAdjective')]!". Sua voz ecoa, surpreendendo alguns recém-chegados próximos e atraindo olhares irritados."
 az_examination.0015.a: "Curvo-me diante de [proud_family_member.GetSheHe] com graça e gratidão."
 az_examination.0015.b: "Falarei com [proud_family_member.GetSheHe] mais tarde sobre a discrição."
 az_examination.0015.c: "Inclino a cabeça e me misturo à multidão."
 az_examination.0015.d: "Vou te deixar orgulhos[proud_family_member.Custom('ES_OA')], [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('proud_family_member'))] de mim[proud_family_member.Custom('ES_OA')]!"
 az_examination.0016.t: "Algumas palavras gentis"
 az_examination.0016.desc: "[kind_examiner.Custom('ES_ElLa')|U] [kind_examiner.GetTitledFirstName|l], um[kind_examiner.Custom('ES_XA')] examinador respeitad[kind_examiner.Custom('ES_OA')], aproxima-se em silêncio, afastando-se da conversa dos candidatos mais bem-sucedidos.\n\n"Talvez vocês não tenham sido aprovados, mas não pensem que todo o seu esforço foi em vão. O caminho até o serviço público é longo… e às vezes sinuoso"."
 az_examination.0016.a: ""Tens minha mais profunda gratidão"."
 az_examination.0016.b: ""Você me guiará como seu[ROOT.Char.Custom('ES_OA')] aprendiz[ROOT.Char.Custom('ES_XA')]?""
 az_examination.0016.c: ""Vossas palavras me guiarão"."
 tgp_examiner_encouragement_modifier: "Palavras de incentivo"
 tgp_examiner_encouragement_modifier_desc: "Este personagem carrega a bênção de um examinador respeitado."
 az_examination.0017.t: "A carta oculta"
 az_examination.0017.desc: "Ao ajustar minhas vestes, sinto um papel rígido enfiado bem fundo na manga. Alguém deve ter me passado uma carta antes do exame.\n\nE diz: "quando a dúvida o atormentar como moscas, lembre-se: você estudou, lutou e jamais se rendeu".\n\nDo outro lado do pátio, vejo [letter_examiner.Custom2('MyCharacterIntroduction', ROOT.Char)], carregando um maço de pergaminhos. Nossos olhares se encontram por um instante. Em [letter_examiner.GetSheHe] eu poderia me abrir e discutir o significado desta carta."
 az_examination.0017.b: ""Estas palavras são minhas e apenas minhas"."
 az_examination.0017.c: "Que [letter_examiner.GetFirstNameNoTooltip] veja isto."
 tgp_letter_self_reflection_modifier: "Autorreflexão"
 tgp_letter_self_reflection_modifier_desc: "Este personagem carrega uma força silenciosa vinda de palavras de incentivo e da crença da família."
 az_examination.0018.t: "Ancião entre os participantes"
 az_examination.0018.desc: "Observo uma figura sentada sob um guarda-sol: [old_exam_taker.Custom2('MyCharacterIntroduction', ROOT.Char)]. Está ligeiramente inclinado[old_exam_taker.Custom('ES_OA')] e seus olhos parecem ao mesmo tempo penetrantes e cansados.\n\n\"Nunca é tarde demais\", diz ao notar meu olhar. \"Mas, nessa idade, é uma longa estrada a percorrer\"."
 az_examination.0018.b: ""Deixe-me compartilhar o que aprendi"."
 az_examination.0018.c: ""Espero nunca acabar assim"."
 tgp_not_getting_any_younger_modifier: "Não é o meu futuro"
 tgp_not_getting_any_younger_modifier_desc: "Este personagem viu um participante idoso em um exame que estava fazendo. Agora está determinado a não deixar isso acontecer com ele."
 az_examination.0018.d: ""Vocês têm minha admiração, [old_exam_taker.Custom('ComplimentAdjective')]"."
 az_examination.0019.t: "O peso das expectativas"
 az_examination.0019.desc.intro: "Ao sair da câmara, uma voz familiar chama meu nome.\n\n[disappointed_relative.GetFirstName] capta minha atenção entre a multidão, dizendo:"
 az_examination.0019.desc.wrathful: ""Você nos envergonhou", sibila, com fria fúria queimando em seu olhar."
 az_examination.0019.desc.callous: ""Você fracassou", diz de forma seca, com uma expressão de desaprovação no rosto."
 az_examination.0019.desc.shy: ""Eu... eu vim para ver você", murmura, e seu rosto cora intensamente. "Desculpe se — se isto é constrangedor.""
 az_examination.0019.desc.compassionate: ""Ah, meu [entrant.Custom2('RelationToMe', ROOT.Char)]", diz com olhos brilhando com lágrimas contidas. "Vocês fizeram o melhor possível; era tudo o que eu queria"."
 az_examination.0019.desc.fallback: ""Vocês chegaram tão perto", diz suavemente, a decepção estampada claramente em seu rosto."
 az_examination.0019.a: ""Da próxima vez, terei sucesso. Eu juro"."
 az_examination.0019.b: ""Poderíeis… me ajudar?""
 az_examination.0019.c: "Não consigo encará-lo(a) agora mesmo…"
 tgp_brooding_reflection_modifier: "Reflexão taciturna"
 tgp_brooding_reflection_modifier_desc: "Este personagem se recolheu para refletir profundamente — ou talvez para remoer seu fracasso."
 az_examination.0020.t: "A ascensão de um par"
 az_examination.0020.desc: "O pátio fervilha de vozes, ecoando orgulho e decepção em igual medida. Em meio ao redemoinho de vestes e pergaminhos, avisto meu colega [successful_peer.GetFirstName]. Um olhar para sua manga, bordada com o selo do Exame do Palácio, me diz tudo o que preciso saber.\n\nEla sorri ao se aproximar. Talvez por hábito, compaixão ou verdadeira alegria."
 az_examination.0020.a: ""Voc? mereceu isto. De verdade.""
 az_examination.0020.b: "Resmungo e redobro meus estudos."
 az_examination.0020.c: "Estou mais preocupado com outros assuntos, de qualquer forma."
 tgp_envy_fueled_study_modifier: "Disciplina alimentada pela inveja"
 tgp_envy_fueled_study_modifier_desc: "Este personagem está tomado por inveja e determinação, estudando com renovada intensidade para superar o fracasso e rivalizar com aqueles que o deixaram para trás."
