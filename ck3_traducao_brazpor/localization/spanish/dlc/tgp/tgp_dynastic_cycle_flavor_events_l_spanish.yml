l_spanish:
 tgp_dynastic_cycle_events.0001.t: "O caminho a seguir"
 tgp_dynastic_cycle_events.0001.desc: "Há quietude no jardim, exceto pelo farfalhar das folhas na brisa. No silêncio, meus pensamentos se voltam para o domínio nestes tempos de [my_situation.GetTopCurrentPhase.GetName|l].

Será que apenas resistir bastará? Pode o domínio perseverar quando permanece tão imóvel quanto este jardim?

O chá na bandeja de meu criado já esfriou."
 tgp_dynastic_cycle_events.0001.aa: "O momento de avançar é #EMP agora#!."
 tgp_dynastic_cycle_events.0001.a: "Não podemos viver no futuro."
 tgp_dynastic_cycle_events.0001.a.potential_friend: "#EMP Eu deveria enviar uma carta ao fiel [potential_friend.GetTitledFirstNameNoTooltip|l]#!
"
 tgp_dynastic_cycle_events.0001.a.friend: "#EMP Eu deveria enviar uma carta ao meu querid[friend.Custom('ES_OA')] [friend.GetTitledFirstNameNoTooltip|l].#!
"
 tgp_dynastic_cycle_events.0001.b: "Sob pressão"
 tgp_dynastic_cycle_events.0001.c: "Meu discípul[disciple.Custom('ES_OA')], [disciple.Custom('ES_ElLa')] [disciple.GetTitledFirstName|l], veio me visitar, mas seus motivos não são felizes.

"Mestr[ROOT.Char.Custom('ES_OA')]... o domínio deriva como um navio em plena tempestade. Cada dia traz novas discórdias e novos inimigos. [my_situation.GetTopCurrentPhase.GetName|l] cresce. Não sei como será o amanhã, nem o que ele será."

Não posso deixar de notar que as mãos dele estão trêmulas."
 friend_together_in_preparation: ""Não permitirei que digam que [Select_CString(disciple.IsFemale, 'a discípula', 'o discípulo' )] de [ROOT.Char.GetFirstNameNoTooltip] é [Select_CString(disciple.IsFemale, 'uma fraca', 'um fraco' )]!""
 friend_together_in_preparation_corresponding: "Pobre criança. Preciso confortar [disciple.GetHerHim]."
 tgp_advancement_focus_modifier: ""É por meio das dificuldades que se aprende.""
 tgp_advancement_focus_modifier_desc: "A audácia da fome"
 tgp_dynastic_cycle_events.0010.t: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], más notícias." Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('marshal'))|l], [marshal.Custom('ES_ElLa')] [marshal.GetName|l], aproxima-se de mim, [marshal.Custom('quirk_pos_pp')].

"Na calada da noite, os camponeses de [peasant_county.GetName] arrombaram os celeiros. Se eu pudesse contratar mais guardas, talvez conseguíssemos encontrá-los."

Nem mesmo nosso reino está a salvo de [my_situation.GetTopCurrentPhase.GetName|l]."
 tgp_dynastic_cycle_events.0010.desc: "Meu discípul[disciple.Custom('ES_OA')], [disciple.Custom('ES_ElLa')] [disciple.GetTitledFirstName|l], veio me visitar, mas seus motivos não são felizes.

"Pessoas desesperadas fazem coisas desesperadas."

Não posso deixar de notar que as mãos dele estão trêmulas."
 tgp_dynastic_cycle_events.0010.a: "Mudança de caminho"
 tgp_dynastic_cycle_events.0010.b: ""O momento de [my_situation.GetTopCurrentPhase.GetName|l] é #EMP agora#!!"

As passadas estrondosas do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('marshal'))|l], [marshal.Custom('ES_ElLa')] [marshal.GetName|l], anunciam sua presença melhor do que palavras.

"Admiro vossa dedicação ao caminho civil, mas esta situação de [my_situation.GetTopCurrentPhase.GetType.GetNameNoTooltip|l] exige ousadia! Lembrai-vos da história de [ROOT.Char.Custom('GetRandomAnnalsPassage')] e liderai nossos exércitos!""
 tgp_dynastic_cycle_events.0010.c: "É hora de ser audaz!"
 tgp_dynastic_cycle_events.0020.t: ""Anseio aprender, mas não mudar.""
 tgp_dynastic_cycle_events.0020.desc: "Não há honra maior do que o governo civil." Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('marshal'))|l], [marshal.Custom('ES_ElLa')] [marshal.GetName|l], aproxima-se de mim, [marshal.Custom('quirk_pos_pp')].

"Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('steward'))] [steward.GetTitledFirstName|l] entra no gabinete com um sorriso no rosto e moedas na mão.

"[ROOT.Char.Custom('FormOfAddressForLiege')|U], as caravanas do oeste estão cada vez mais frequentes, vindas de [silk_road_situation.GetName]. Com um investimento modesto em melhores conexões com ela, talvez possamos atrair a riqueza de muitos reinos para o nosso.""

Nem mesmo nosso reino está a salvo de [my_situation.GetTopCurrentPhase.GetName|l]."
 tgp_dynastic_cycle_events.0020.a: "A Rota da Seda continuará. Conosco ou sem nós."
 tgp_dynastic_cycle_events.0020.b: "Rota da Seda Avançada"
 tgp_dynastic_cycle_events.0020.c: "Este personagem investiu na Rota da Seda #EMP no momento certo#!."
 tgp_executed_peasants_county_modifier: "Uma Mudança de Favor"
 tgp_executed_peasants_county_modifier_desc: "O domínio que [favored_movement.GetName] exerce sobre o trono se fortalece, e seus conselhos moldam a política ao seu gosto.

Se minha causa quiser ascender, preciso enfraquecer sua reputação. Um debate público pode influenciar o julgamento da corte, talvez até mesmo o [top_liege.custom('ES_DelDela')] [top_liege.GetTitleAsNameNoTooltip|l].

Mas desafiá-los é arriscar a humilhação, caso minhas palavras me traiam."
 tgp_dynastic_cycle_events.0030.t: "Não posso me dar ao luxo de duvidar."
 tgp_dynastic_cycle_events.0030.desc: "O [my_movement.GetNameNoTooltip] terá seus próprios méritos."

As passadas estrondosas do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('marshal'))|l], [marshal.Custom('ES_ElLa')] [marshal.GetName|l], anunciam sua presença melhor do que palavras.

"Admiro vossa dedicação ao caminho civil, mas esta situação de [my_situation.GetTopCurrentPhase.GetType.GetNameNoTooltip|l] exige ousadia! Lembrai-vos da história de [ROOT.Char.Custom('GetRandomAnnalsPassage')] e liderai nossos exércitos!""
