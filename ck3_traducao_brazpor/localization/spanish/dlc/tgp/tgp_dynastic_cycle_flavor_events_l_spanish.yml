 tgp_dynastic_cycle_events.0030.b: ""Anseio aprender, mas não mudar.""
 tgp_dynastic_cycle_events.0030.c: "Não há honra maior do que o governo civil."
 tgp_dynastic_cycle_events.0040.t: "Uma Estrada de Oportunidade"
 tgp_dynastic_cycle_events.0040.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('steward'))] [steward.GetTitledFirstName|l] entra no gabinete com um sorriso no rosto e moedas na mão.

"[ROOT.Char.Custom('FormOfAddressForLiege')|U], as caravanas do oeste estão cada vez mais frequentes, vindas de [silk_road_situation.GetName]. Com um investimento modesto em melhores conexões com ela, talvez possamos atrair a riqueza de muitos reinos para o nosso.""
 tgp_dynastic_cycle_events.0040.a: ""Esta época de [my_situation.GetTopCurrentPhase.GetType.GetNameNoTooltip|l] é a ocasião perfeita!""
 tgp_dynastic_cycle_events.0040.b: ""Não me façam perder tempo!""
 tgp_dynastic_cycle_events.0040.c: "A Rota da Seda continuará. Conosco ou sem nós."
 tgp_silk_road_advancement_modifier: "Rota da Seda Avançada"
 tgp_silk_road_advancement_modifier_desc: "Este personagem investiu na Rota da Seda #EMP no momento certo#!."
 tgp_dynastic_cycle_events.0050.t: "Uma Mudança de Favor"
 tgp_dynastic_cycle_events.0050.desc: "O domínio que [favored_movement.GetName] exerce sobre o trono se fortalece, e seus conselhos moldam a política ao seu gosto.

Se minha causa quiser ascender, preciso enfraquecer sua reputação. Um debate público pode influenciar o julgamento da corte, talvez até mesmo o [top_liege.custom('ES_DelDela')] [top_liege.GetTitleAsNameNoTooltip|l].

Mas desafiá-los é arriscar a humilhação, caso minhas palavras me traiam."
