 tgp_decision_events.0100.t: "Fazer petição de $game_concept_movement$ : [petitioner.Custom('GetMyMovementNoTooltip')]"
 tgp_decision_events.0100.desc: "Como humilde representante do [petitioner.Custom('GetMyMovement')], trago uma petição para"
 tgp_decision_events.0100.desc_change_candidate_score_law: "mudar a [GetLawGroup('candidate_score_laws').GetNameNoTooltip]! Para garantirmos a melhor pessoa para o cargo, devemos levar em conta [Select_CString(petition_recipient.HasRealmLaw('candidate_score_merit_law'), 'todos, independentemente de sua posi??o', 'apenas as fam?lias influentes' )]."
 tgp_decision_events.0100.desc_change_bureaucracy_laws_increase: "expandir a $game_concept_celestial_bureaucracy$! Vocês devem consolidar seu direito divino e centralizar o poder em torno do governo."
 tgp_decision_events.0100.desc_change_bureaucracy_laws_decrease: "reduzir a $game_concept_celestial_bureaucracy$! Os governadores locais deveriam ter mais poder para conseguir cumprir suas obrigações para com o Império com mais eficiência."
 tgp_decision_events.0100.desc_change_army_laws_increase: "aumentar a estrutura de comando do exército! Somente a burocracia pode garantir a segurança do Império."
 tgp_decision_events.0100.desc_change_army_laws_decrease: "Reduza a estrutura de comando do exército! Os governadores individuais precisam de mais poder para proteger o Império."
 tgp_decision_events.0100.desc_change_province_metropolitan: "Mudar a $game_concept_province_administration$ para $celestial_province_metropolitan_short$!\n\nO Império é tão forte quanto sua cidade mais fraca."
 tgp_decision_events.0100.desc_change_province_industrial: "mudar a $game_concept_province_administration$ para $celestial_province_industrial_short$!\n\n"São necessários investimentos de longo prazo nas terras do império para que ele prospere eternamente."
 tgp_decision_events.0100.desc_change_province_military: "mudar a $game_concept_province_administration$ para $celestial_province_military_short$!\n\n"Devemos cultivar o caminho dos guerreiros para garantir o futuro imperecível do Império."
 tgp_decision_events.0100.desc_change_province_protectorate: "alterar a $game_concept_province_administration$ para $celestial_province_protectorate_short$!\n\n“Os circuitos precisam ser reforçados para proteger o povo de quaisquer invasores e bandidos."
 tgp_decision_events.0100.desc_change_retirement_law_increase: "aumentar a $celestial_retirement_law$!\n\n\"Os circuitos devem permanecer nas mãos de governadores competentes pelo maior tempo possível."
 tgp_decision_events.0100.desc_change_retirement_law_decrease: "reduzir a $celestial_retirement_law$!\n\n\"É preciso fortalecer os circuitos revezando os governadores pelo maior tempo possível."
 tgp_decision_events.0100.desc_change_retirement_law_outro: "Esta é a única maneira de nos mantermos fortes e prósperos. [petition_recipient.Custom('ES_ElLa')|U] [petition_recipient.GetTitleAsNameNoTooltip|l] terá que concordar comigo!"
 tgp_decision_events.0100.desc_change_province_petitioner: "E posso persuadir o Imperador de que minha [petitioner.GetCapitalLocation.GetName] o precisa."
 tgp_decision_events.0100.desc_change_province_no_petitioner: "E há muitos lugares pelo reino pelos quais eu poderia argumentar."
 tgp_decision_events.0100.desc_change_province_house: "Enquanto isso, [house_movement_member.GetName], da minha casa, também sente um forte desejo e necessidade desta mudança."
 tgp_decision_events.0100.desc_change_province_disciple: "Mas devo pensar no meu discípul[disciple_movement_member.Custom('ES_OA')] [disciple_movement_member.GetName]."
 tgp_decision_events.0100.desc_change_province_other: "No entanto, lembro que outr[other_movement_member.Custom('ES_OA')] integrante do meu $game_concept_movement$ , [other_movement_member.GetName] também seria [Select_CString(other_movement_member.IsFemale, 'buena candidata', 'buen candidato' )]."
 change_province_effect.can_choose: "Você pode escolher entre #V você#! um membro da sua [house|El] seu [disciple|El] ou um membro do [movement|El] para mudar a [province_administration|El] para"
