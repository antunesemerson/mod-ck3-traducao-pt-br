 tgp_decision_events.0102.petition_accepted: "Petição #P aceptada#!"
 tgp_decision_events.0101.a_title: "Petição aceita"
 tgp_decision_events.0103.t: "$tgp_decision_events.0100.t$"
 tgp_decision_events.0103.desc: "Minha recusa está causando desconforto a [petitioner.GetName], mas rapidamente recupera a compostura e pergunta:\n\n\"Perdoe minha insolência, mas não serei dispensado tão facilmente. O assunto é importante para todos os membros do [actors_movement.GetName|l]. Por favor, reconsiderem.\" ele se dirige a você."
 tgp_decision_events.0103.desc_give_influence: ""Sou respeitado entre o meu povo, e eles confiaram em mim para ser sua voz. Só nos importamos com o bem-estar do [GetTitleByKey('h_china').GetName]"."
 tgp_decision_events.0103.desc_give_maa: ""O Império teria utilidade para alguns regimentos dos meus melhores soldados. Concorde conosco e eles estarão sob seu comando"."
 tgp_decision_events.0103.desc_use_hook: ""Nós nos conhecemos muito bem há algum tempo. Acho que você me deve um favor e gostaria que concordasse conosco"."
 tgp_decision_events.0103.desc_give_hook: ""Ofereço-me como servo leal. Podeis usar minha força e influência quando chegarem os tempos sombrios, assim como agora peço as vossas"."
 tgp_decision_events.0103.a: ""Muito bem, então, concederei o que deseja.""
 tgp_decision_events.0103.b: ""Fora da minha vista, #emp de inmediato!#!""
 tgp_decision_events.0103.a_title: "$tgp_decision_events.0101.a_title$"
 tgp_decision_events.0103.b_title: "Petição recusada"
