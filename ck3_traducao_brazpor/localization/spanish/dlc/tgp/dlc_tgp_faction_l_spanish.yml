 tgp_decision_events.0100.desc_increase_budget_salary: "$tgp_decision_events.0100.desc_increase_budget$ os governadores.\n\nPrecisam de mais tesouro para manter a prosperidade do domínio e investir em atividades culturais e edifícios."
 tgp_decision_events.0100.desc_increase_budget_ministry: "$tgp_decision_events.0100.desc_increase_budget$ os ministros.\n\nEles iniciam muitos grandes projetos e precisam de financiamento para mantê-los em andamento."
 tgp_decision_events.0100.desc_increase_budget_military: "$tgp_decision_events.0100.desc_increase_budget$ os comandantes.\n\nDevem manter nossos exércitos e ter meios para reuni-los. Nossos inimigos precisam temer-nos!"
 tgp_decision_events.0100.desc_increase_budget_outro: "\n\nNo entanto, os cofres [hegemon.Custom('ES_DelDela')] [hegemon.GetTitleAsName|l] são finitos. Para que esta petição seja financiada, outra deve perder seus fundos."
 tgp_decision_events.0100.f: "Os generais desperdiçam seus recursos em nome de nossa defesa."
 tgp_decision_events.0100.g: "Os governadores são generosos demais com seus gastos."
 tgp_decision_events.0100.h: "Os ministros saqueiam o tesouro para projetos inúteis."
