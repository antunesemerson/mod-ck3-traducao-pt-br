 ##################################################
 # JAPANESE REGENT FACTION
 ##################################################
 replace_ceremonial_regent_faction_name: "Impor um $game_concept_ceremonial_regent$"
 replace_ceremonial_regent_faction: "Facção de $replace_ceremonial_regent_faction_name$"
 replace_ceremonial_regent_faction_desc: "Os membros da [faction|lE] $replace_ceremonial_regent_faction_name$ pretendem expulsar à força o [ceremonial_regent|lE] atual.\n\n#S Ultimátum#!\n $replace_ceremonial_regent_faction_desc_kampaku$"
 replace_ceremonial_regent_faction_desc_emperor: "O líder da facção substitui o [ceremonial_regent|lE] atual, toma todos os [titles|lE] [Concept( 'landed', 'com terras' )|E] e pode se tornar em [cloistered_emperor|lE] ou tentar restabelecer o governo imperial direto"
 replace_ceremonial_regent_faction_desc_kampaku: "O líder da facção substitui o [ceremonial_regent|lE] atual e toma todos os [titles|lE] [Concept( 'landed', 'com terras' )|E]"
 replace_ceremonial_regent_faction_short_effect_desc_emperor: "Quer ser instalado como [cloistered_emperor|lE]"
 replace_ceremonial_regent_faction_short_effect_desc_regent: "Quer ser empossado como [ceremonial_regent|lE]"
 FACTION_JAPANESE_REPLACE_REGENT_NAME_DYNAMIC: "Impor [ROOT.Faction.GetSpecialCharacter.GetShortUINameNotMe|U] como $game_concept_ceremonial_regent$"
 FACTION_JAPANESE_REPLACE_REGENT: "Exigência de $replace_ceremonial_regent_faction_name$"
 FACTION_JAPANESE_REPLACE_REGENT_DESC: "[faction_leader.Custom2('AppropriateGreetingNegative', ROOT.Char)]\n\nOs nobres leais de [faction_target.GetPrimaryTitle.GetNameNoTierNoTooltip] não confiam em vossa regência intolerável! Renunciai ao vosso poder em meu favor, ou defrontai nossas espadas no campo de batalha!"
 FACTION_JAPANESE_REPLACE_RULER_DESC: "[faction_leader.Custom2('AppropriateGreetingNegative', ROOT.Char)]\n\nOs nobres leais de [faction_target.GetPrimaryTitle.GetNameNoTierNoTooltip] não têm nenhuma confiança em vosso governo despótico sem direção! Delegai vosso poder em meu favor ou enfrentai nossas espadas no campo de batalha!"
 FACTION_JAPANESE_REPLACE_REGENT_ACCEPTED: "Exigências de $replace_ceremonial_regent_faction_name$ aceitas"
 FACTION_JAPANESE_REPLACE_REGENT_ACCEPTED_DESC: "[faction_target.Custom2('AppropriateGreetingNegative', ROOT.Char)]\n\nVossas tentativas descaradas e sem vergonha de tomar o poder só enfraquecerão a [faction_target.GetPrimaryTitle.GetNameNoTier]. No entanto, para evitar um banho de sangue desnecessário, aceitarei as vossas exigências…"
 FACTION_JAPANESE_REPLACE_REGENT_REFUSED: "Exigências de $replace_ceremonial_regent_faction_name$ rejeitadas"
 FACTION_JAPANESE_REPLACE_REGENT_REFUSED_DESC: "[faction_target.Custom2('AppropriateGreetingNegative', ROOT.Char)]\n\nVossas ridículas tentativas de intimidação jamais terão êxito. Eu sou [faction_target.Custom('ES_ElLa')] legítim[faction_target.Custom('ES_OA')] [faction_target.GetTitleAsNameNoTooltip] de [faction_target.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]! A justiça alcançará todos os traidores — no campo de batalha, se necessário!"
 FACTION_JAPANESE_REPLACE_REGENT_SEND_DEMAND_NOTIFICATION: "A regência deve cair!"
 FACTION_JAPANESE_REPLACE_REGENT_SEND_DEMAND_NOTIFICATION_DESC: "Chegou a hora! Os lordes de [faction.GetName] concordam que [faction_target.GetName] é um[faction_target.Custom('ES_XA')] déspota que deve renunciar ao seu poder — à ponta de espada, se preciso for!"
 cannot_create_claimant_faction_against_kampaku_tooltip: "Não podem ser criadas [factions|lE] de [claimant|lE] contra o [ceremonial_regent|lE]"
 FACTIONS_WINDOW_JAPANESE_REGENT: "Aspirante"
 replace_ceremonial_regent_faction_kampaku_trigger: "Somente um [kampaku|lE] ou [joko|lE]"
 not_house_head_allied_to_faction_target_trigger: "Você não pode ser membro da casa do alvo da [faction|lE]"
 not_house_member_of_faction_target_trigger: "Seu [Concept('house_head', 'chefe da sua casa')|E] não pode ter uma [alliance|lE] com o alvo da [faction|lE]"
 must_be_leading_house_of_bloc_trigger: "Em [governments|El] com [house_blocs|El], somente os [house_heads|El] de uma [leading_house|El] $game_concept_bloc_possessive$ podem criar [factions|El] contra o [top_liege|El]"
 ##################################################
 # RESTORE EMPEROR FACTION
 ##################################################
 restore_ceremonial_liege_faction_name: "Restaurar o $game_concept_ceremonial_liege$"
 restore_ceremonial_liege_faction: "Facção a favor de $restore_ceremonial_liege_faction_name$"
 restore_ceremonial_liege_faction_desc: "Os membros da [faction|lE] para $restore_ceremonial_liege_faction_name$ buscam expulsar o [ceremonial_regent|lE] e restabelecer o governo direto do [ceremonial_liege|lE].\n\n#S Ultimátum#!\nO [ceremonial_liege|lE] substitui o [ceremonial_regent|lE] , toma todos os [titles|lE] [Concept( 'landed', 'com terras' )|E] e adota a [succession|lE] $single_heir_succession_law$"
 restore_ceremonial_liege_faction_short_effect_desc: "Quer devolver o poder ao [ceremonial_liege|lE]"
 FACTION_JAPANESE_RESTORE_EMPEROR_NAME_DYNAMIC: "Restaurar a [ROOT.Faction.GetSpecialCharacter.GetShortUINameNotMe|U]"
 FACTION_JAPANESE_RESTORE_EMPEROR: "Exigência de $restore_ceremonial_liege_faction_name$"
 FACTION_JAPANESE_RESTORE_EMPEROR_DESC: "[faction_leader.Custom2('AppropriateGreetingNegative', ROOT.Char)]\n\nSua tirania sobre a corte [ROOT.Char.Custom('GetTitleTierAdjective')], a família real e todo o território de [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] deve acabar.\n\nSaiam da frente para noss[faction.GetSpecialCharacter.Custom('ES_OA')] verdadeir[faction.GetSpecialCharacter.Custom('ES_OA')] governante, [faction.GetSpecialCharacter.Custom('ES_ElLa')] [faction.GetSpecialCharacter.GetTitledFirstName]!"
 tgp_faction_events.0201.b: "Você pagará por manchar a honra [faction.GetSpecialCharacter.Custom('ES_DelDela')] [faction.GetSpecialCharacter.GetTitleAsNameNoTooltip]!"
 tgp_faction_events.0201.b.cm: "Você arriscaria despedaçar [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip]?!"
 FACTION_JAPANESE_RESTORE_EMPEROR_ACCEPTED: "Exigência de $restore_ceremonial_liege_faction_name$ aceita"
 FACTION_JAPANESE_RESTORE_EMPEROR_ACCEPTED_DESC: "[faction_target.Custom2('AppropriateGreetingNegative', ROOT.Char)]\n\nTudo o que faço é pelo bem da corte [ROOT.Char.Custom('GetTitleTierAdjective')], da família real e de toda a [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip], digo isso de coração!\n\nEmbora eu questione suas motivações, não me colocarei no caminho de [faction.GetSpecialCharacter.Custom('ES_DelDela')] [faction.GetSpecialCharacter.GetTitledFirstName|l]."
 FACTION_JAPANESE_RESTORE_EMPEROR_REFUSED: "Exigência de $restore_ceremonial_liege_faction_name$ rejeitada"
 FACTION_JAPANESE_RESTORE_EMPEROR_REFUSED_DESC: "[faction_target.Custom2('AppropriateGreetingNegative', ROOT.Char)]\n\nQue insolência! Faço tudo pelo bem do ambiente cortesão [ROOT.Char.Custom('GetTitleTierAdjective')] , da família real e de toda a [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] , digo isso de coração!\n\nVocês e sua turma de traidores pagarão por manchar a honra [faction.GetSpecialCharacter.Custom('ES_DelDela')] [faction.GetSpecialCharacter.GetTitleAsNameNoTooltip]!"
 FACTION_JAPANESE_RESTORE_EMPEROR_SEND_DEMAND_NOTIFICATION: "$restore_ceremonial_liege_faction_name$"
 FACTION_JAPANESE_RESTORE_EMPEROR_SEND_DEMAND_NOTIFICATION_DESC: "[faction_leader.Custom2('AppropriateGreetingPositive', ROOT.Char)]\n\nA tirania [faction_target.Custom('ES_DelDela')] [faction_target.GetTitledFirstName|l] sobre a corte de [ROOT.Char.Custom('GetTitleTierAdjective')], a família real e todo o território de [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] deve acabar.\n\nDevemos nos preparar para lutar e restaurar noss[faction.GetSpecialCharacter.Custom('ES_OA')] verdadeiro[faction.GetSpecialCharacter.Custom('ES_OA')] governante, [faction.GetSpecialCharacter.Custom('ES_ElLa')] [faction.GetSpecialCharacter.GetTitledFirstName|l]!"
 FACTIONS_WINDOW_JAPANESE_RESTORE_EMPEROR: "[ceremonial_liege|E]"
 tgp_faction_events.0206.t: "A serviço de [claimant.Custom('ES_DelDela')] [claimant.GetTitleAsNameNoTooltip]"
 tgp_faction_events.0206.desc: "Por fim, nossa leal causa alcançou a vitória nesta justa guerra para acabar com a vilania [defender.Custom('ES_DelDela')] [defender.GetTitledFirstName|l] e libertar [claimant.Custom('ES_AlAla')] [claimant.GetTitleAsName] de sua vil influência.\n\nEmbora tenhamos restaurado a ordem na corte imperial, a guerra abalou o condado, e todo o [defender.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] confia em mim para trazer a paz e representar a família real…"
 tgp_faction_events.0206.a: "Vida longa ao [claimant.Custom('ES_AlAla')] [claimant.GetTitleAsNameNoTooltip]!"
 tgp_faction_events.0206.b: "O caminho é perigoso, devemos guiar nosso suserano…"
