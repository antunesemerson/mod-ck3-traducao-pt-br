 game_concept_silk_road_innovations: "Inovações da $game_concept_silk_road_situation$"
 game_concept_silk_road_innovation_desc: "As $game_concept_silk_road_innovations$ são [Concept('innovations', 'aquellas')|E] que se espalham para o oeste ao longo da [silk_road_situation|E].\n\nA cada [GetDefine('NSilkRoad', 'INNOVATION_TRAVEL_DURATION')|0V] anos, uma [situation_sub_region|lE] descoberta pelo povo Han será atribuída aleatoriamente à $game_concept_silk_road_innovation$ da China, com todas as outras [culture|lE] se movendo para o oeste ao longo da $game_concept_silk_road_innovations$.$game_concept_silk_road$As \n\n com a $game_concept_cultures$ [tradition|lE] têm acesso a todas as [GetCultureTradition('tradition_sinophilic').GetName|l] descobertas pelo povo $game_concept_culture$.\n\nOs [rulers|lE] fora da $game_concept_silk_road$ podem tentar trazer o conhecimento de volta à sua [culture|lE] por meio da [decision|lE] [GetDecisionWithKey('visit_silk_road_market_decision').GetName|V]. Se for bem-sucedido, a $game_concept_silk_road_innovation$ poderá ser descoberta como qualquer outra $game_concept_innovation$ ao retornar."
