 game_concept_situation_silk_road_phase_hardship_desc: "$situation_silk_road_phase_hardship_desc$"
 situation_silk_road_phase_exceptional_bounty: "Recompensa excepcional"
 situation_silk_road_phase_exceptional_bounty_desc: "É possível obter tesouros impressionantes, conseguir os maiores lucros, e as ideias e as inovações se espalham mais amplamente quando as coisas vão bem na Rota da Seda."
 situation_silk_road_phase_steady_trading: "Comércio constante"
 situation_silk_road_phase_steady_trading_desc: "Há lucros, os acordos são pechinchados e os negócios continuam normalmente. Pode haver opções mais lucrativas em outros lugares, mas a Rota da Seda é mais confiável."
 situation_silk_road_phase_hardship: "Dificuldades"
 situation_silk_road_phase_hardship_desc: "Por guerras, calamidades e reviravoltas imprevisíveis do destino, a Rota da Seda está completamente paralisada. Nem dinheiro nem ideias estão circulando, e a única coisa que se obtém ao seguir as rotas da Rota da Seda é miséria e pobreza."
