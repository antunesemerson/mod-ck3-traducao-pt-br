 tgp_silk_road_events.0010.desc: "Ao caminhar entre as agitadas barracas do mercado de [ROOT.Char.GetCurrentLocation.GetName], meu guia menciona ter ouvido fragmentos de conversas sobre "[innovation_temp.GetName|l]", repetido vez após vez. A cidade fervilha com isso, mas as pessoas baixam a voz quando veem estrangeiros como eu passando por ali.\n\nAvisto um grupo de comerciantes aglomerados sob uma barraca, que parecem menos cautelosos que os demais por aqui e continuam conversando mesmo quando meu guia e eu nos aproximamos. Será esta a minha chance de aprender?"
