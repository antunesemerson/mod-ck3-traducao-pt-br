l_spanish:
 # the Silk Road
 silk_road_situation: "A Rota da Seda"
 silk_road_situation_desc: "$game_concept_silk_road_situation_desc$"
 situation_silk_road_situation_desc: "$silk_road_situation_desc$"
 game_concept_silk_road_situation: "Rota da Seda"
 game_concept_silk_road: "$game_concept_silk_road_situation$"
 game_concept_silk_road_situation_desc: "A $game_concept_silk_road_situation$ não é uma única estrada, mas sim toda uma rede de rotas que conectam os cantos mais distantes da civilização para trocar ouro, bens e ideias. Ter acesso à Rota da Seda significa ter acesso a todas as riquezas do mundo.\n\nOs diferentes níveis de acesso à rota concedem bônus de ouro variados e podem proporcionar oportunidades únicas para desbloquear [innovations|lE] exóticas. A quantidade de ouro e conhecimento que circula pela Rota da Seda mudará de acordo com sua prosperidade, que é influenciada por muitos fatores, incluindo guerras, eventos e o [dynastic_cycle|lE] dinástico da China."
 game_concept_situation_silk_road_phase_exceptional_bounty: "$situation_silk_road_phase_exceptional_bounty$"
 game_concept_situation_silk_road_phase_exceptional_bounty_desc: "$situation_silk_road_phase_exceptional_bounty_desc$"
