 tgp_china_yearly.0030.t: "A Boa Palavra Viaja Longe"
 tgp_china_yearly.0030.desc_minister_of_personel: "[title_offerer.Custom2('AppropriateGreetingPositive', ROOT.Char)]

É meu dever encontrar indivíduos de grande talento como você e conduzi-los a cargos administrativos. "
 tgp_china_yearly.0030.desc_elder: "Como seu[title_offerer.Custom('ES_OA')] [Concept('elder',Select_CString(title_offerer.IsFemale,'anciã', 'ancião'))|E], devo admitir que me impressiona a reputação que você construiu para si como um[ROOT.Char.Custom('ES_XA')] [Select_CString(ROOT.Char.IsFemale,'confuciana', 'confuciano')] autêntic[ROOT.Char.Custom('ES_OA')]."
 tgp_china_yearly.0030.desc_fellow_confucian: "De [Select_CString(title_offerer.IsFemale, 'uma confuciana', 'um confuciano' )] para outr[ROOT.Char.Custom('ES_OA')], alegra-me saber de sua dedicação ao Caminho, e aguardo com expectativa a oportunidade de travar muitos debates amistosos no futuro."
 tgp_china_yearly.0030.desc_intro_outro: "

Em reconhecimento ao seu decoro, por meio desta ofereço reforçar sua candidatura ao governo de [free_title.GetName]."
 tgp_china_yearly.0030.a: "Aceito com gentileza."
 tgp_china_yearly.0030.b: "Ah, minha educação ainda não está completa."
