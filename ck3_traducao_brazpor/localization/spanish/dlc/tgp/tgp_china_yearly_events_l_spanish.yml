l_spanish:
 tgp_china_yearly.0001.t: "Quando o Caminho não Prevalece"
 tgp_china_yearly.0001.desc: "No caminho de volta para minha morada, não posso deixar de notar uma multidão reunida do lado de fora dos portões do(a) [poor_county.GetProvince.GetHolding.GetType.GetName|l] de [poor_county.GetProvince.GetName]. 

Mães, pais e crianças igualmente fazem fila nas ruas, com as cabeças inclinadas de vergonha, enquanto estendem as mãos pedindo sobras aos viajantes que passam."
 tgp_china_yearly.0001.a: ""Açoitem-nos para que voltem ao trabalho!""
 tgp_china_yearly.0001.a.flavor: "Plebe Amedrontada com Sucesso"
 tgp_china_yearly.0001.b: "Sucesso Incrível!"
 tgp_china_yearly.0001.b.success: ""Devo voltar aos meus estudos.""
 tgp_china_yearly.0001.b.critical: "Não estou pronto para lidar com questões tão difíceis."
 tgp_china_yearly.0001.c: "Esses assuntos mundanos não merecem minha atenção."
 tgp_china_yearly.0001.c.flavor: "Um[grieving_child.Custom('ES_XA')] Verdadeir[grieving_child.Custom('ES_OA')] [grieving_child.Custom('GetDaughterSon')]"
 tgp_china_yearly.0001.d: "[messenger.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me cumprimenta com [Select_CString(grieving_child.IsFemale, 'uma menina camponesa', 'um menino camponês' )] que segue seus passos. 

"Meu [ROOT.Char.GetTitleAsName], encontrei est[grieving_child.Custom('ES_EA')] [grieving_child.Custom('GirlBoy')] nos portões, pedindo uma audiência com você. [grieving_child.GetSheHe|U] perdeu recentemente seu único parente vivo e não tem meios para um sepultamento adequado. Deve haver algo que possamos fazer por [grieving_child.GetHerHim]!""
 tgp_china_yearly.0005.t: "Ouço um grito alto e passos apressados vindos dos portões do pátio. Ao seguir o som, encontro [messenger.Custom('ES_AlAla')] [messenger.GetTitledFirstName|l] segurando [Select_CString(grieving_child.IsFemale, 'uma menina camponesa', 'um menino camponês' )]. 

"Ajude-me, meu [ROOT.Char.GetTitleAsNameNoTooltip|l]!", a criança chora. "Meu [parent.GetMotherFather] morreu e me deixou sol[grieving_child.Custom('ES_OA')]. Não tenho pano para [parent.GetHerHis] corpo nem pregos para um caixão." Pelos olhos avermelhados e pela meleca endurecida no nariz, percebo que sua angústia é genuína."
 tgp_china_yearly.0005.eunuch: "[messenger.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me cumprimenta com [Select_CString(grieving_child.IsFemale, 'uma menina camponesa', 'um menino camponês' )] que segue seus passos. 

""Se acolhermos [grieving_child.GetHerHim], [grieving_child.GetSheHe] não poderá honrar seu [parent.GetMotherFather].""
 tgp_china_yearly.0005.knight: "Ouço um grito alto e passos apressados vindos dos portões do pátio. Ao seguir o som, encontro [messenger.Custom('ES_AlAla')] [messenger.GetTitledFirstName|l] segurando [Select_CString(grieving_child.IsFemale, 'uma menina camponesa', 'um menino camponês' )]. 

"Não podemos mandar sobre a vida e a morte"
 tgp_china_yearly.0005.outro: "

Se eu não fizer nada, há uma chance de que [Select_CString(grieving_child.IsFemale, 'esta menina', 'este menino' )] não sobreviva so[grieving_child.Custom('ES_OA')]."
 tgp_china_yearly.0005.a: "Você bane o escriba"
 tgp_china_yearly.0005.b: "[starving_lowborn.GetSheHe|U] poderia ser útil."
 tgp_china_yearly.0005.c: "Me pergunto o que os livros dizem sobre isso."
 tgp_china_yearly.0005.c.flavor: "Tenho assuntos mais importantes para tratar."
 tgp_china_yearly.0005.d: "Problemas Mercantis"
 tgp_china_yearly.0010.t: "Minha visita a uma casa de chá local é interrompida por uma confusão na rua. Olho para fora e vejo [market_vendor.Custom('ES_AlAla')] [market_vendor.GetTitledFirstName|l], pintor[market_vendor.Custom('ES_XA')] local, discutindo com um estranho. 

"Meus clientes esperam me encontrar aqui. Tenho várias encomendas para entregar a eles!", argumenta [market_vendor.Custom('ES_ElLa')] [market_vendor.GetTitledFirstNameNoTooltip|l], mas o mercador já montou uma barraca e expôs suas mercadorias. 

A barraca tem itens de [ROOT.Char.Custom('GetClothingArticle')|l]s, estátuas esculpidas de [ROOT.Char.Custom('RegionalFerociousAnimal')]s e uma série de elaborados grampos e pentes para cabelo. Está claro que este mercador vive do trabalho de outros artesãos."
 tgp_china_yearly.0010.desc: "Expulse o mercador." 

Abro caminho pela multidão à minha frente para inspecionar a barraca. A poesia está escrita em letras finas demais, com linhas apressadas que quase se misturam em alguns trechos. 

Tenho pouca fé na habilidade [starving_lowborn.Custom('ES_DelDela')] vendedor[starving_lowborn.Custom('ES_XA')] e ainda menos em suas alegações, mas muita gente entrou na fila para comprar sua obra."
 tgp_china_yearly.0010.a: "[tax_official.Custom('ES_ElLa')|U] [tax_official.GetTitledFirstName|l] se aproxima de mim no jardim com as mãos inquietas e um sorriso voraz. Mal tenho tempo de largar o exemplar de [ROOT.Char.GetCurrentLocation.Custom('get_region_flower_type')] que tenho na mão e me virar para [tax_official.GetHerHim] antes que [tax_official.GetSheHe] me aborde. 

"Seu[tax_liege.Custom('ES_OA')] senhor[tax_liege.Custom('ES_XA')] me enviou com uma mensagem", diz [tax_official.GetSheHe]. "[tax_liege.Custom('ES_ElLa')|U] [tax_liege.GetTitledFirstName|l] deseja informar que o tesouro imperial precisa de fundos, e [taxless_county.GetProvince.GetName] tem vários impostos atrasados que deseja que você cobre." 

Nem preciso dizer que minha reputação sofrerá se eu não obedecer, mas [Glossary( 'Kǒngzǐ', 'CONFUCIUS_GLOSS' )] nos ensina a abominar a ganância em todas as suas formas."
 tgp_china_yearly.0010.a.tt: "Envie os coletores de impostos."
 tgp_china_yearly.0010.b: "Recuse."
 tgp_china_yearly.0010.c: "#weak Você recebe este efeito porque não possui o traço "Educação Confuciana".#!"
 tgp_china_yearly.0010.d: "A Boa Palavra Viaja Longe"
 tgp_china_yearly.0015.t: "[title_offerer.Custom2('AppropriateGreetingPositive', ROOT.Char)]

É meu dever encontrar indivíduos de grande talento como você e conduzi-los a cargos administrativos. "
 tgp_china_yearly.0015.desc: "Minha visita a uma casa de chá local é interrompida por uma confusão na rua. Olho para fora e vejo [market_vendor.Custom('ES_AlAla')] [market_vendor.GetTitledFirstName|l], pintor[market_vendor.Custom('ES_XA')] local, discutindo com um estranho. 

"

Em reconhecimento ao seu decoro, por meio desta ofereço reforçar sua candidatura ao governo de [free_title.GetName].", argumenta [market_vendor.Custom('ES_ElLa')] [market_vendor.GetTitledFirstNameNoTooltip|l], mas o mercador já montou uma barraca e expôs suas mercadorias. 

A barraca tem itens de [ROOT.Char.Custom('GetClothingArticle')|l]s, estátuas esculpidas de [ROOT.Char.Custom('RegionalFerociousAnimal')]s e uma série de elaborados grampos e pentes para cabelo. Está claro que este mercador vive do trabalho de outros artesãos."
 tgp_china_yearly.0015.a: "Expulse o mercador."
 tgp_china_yearly.0015.b: "Permitamos que o mercador fique, pagando um preço."
 tgp_china_yearly.0015.c: "Faço-os se calarem para que eu possa me concentrar nos meus estudos."
 tgp_china_yearly.0015.d: "Que briga tão mesquinha."
 tgp_china_yearly.0020.t: "Um Assunto de Serviço Público"
 tgp_china_yearly.0020.desc: "[tax_official.Custom('ES_ElLa')|U] [tax_official.GetTitledFirstName|l] se aproxima de mim no jardim com as mãos inquietas e um sorriso voraz. Mal tenho tempo de largar o exemplar de [ROOT.Char.GetCurrentLocation.Custom('get_region_flower_type')] que tenho na mão e me virar para [tax_official.GetHerHim] antes que [tax_official.GetSheHe] me aborde. 

"Seu[tax_liege.Custom('ES_OA')] senhor[tax_liege.Custom('ES_XA')] me enviou com uma mensagem", diz [tax_official.GetSheHe]. "[tax_liege.Custom('ES_ElLa')|U] [tax_liege.GetTitledFirstName|l] deseja informar que o tesouro imperial precisa de fundos, e [taxless_county.GetProvince.GetName] tem vários impostos atrasados que deseja que você cobre." 

