 tribute_mission.1006.t: "$tribute_mission_header$ selo de investidura"
 tribute_mission.1006.desc: "[tributary_scope.Custom('ES_ElLa')|U] [tributary_scope.GetTitledFirstName|l] permanece postrad[tributary_scope.Custom('ES_OA')] lo que empieza a parecer un tiempo incĂłmodamente largo. ÂżAcaso espera algo mĂˇs de mĂ­?\n\nVeo a mi [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('scribe_character'))] [scribe_character.GetShortUIName], [Select_CString(scribe_character.IsFemale, 'la artesana', 'el artesano' )] que talla mis sellos oficiales, esperando estoicamente en un lateral de la corte abarrotada.\n\nÂżSerĂˇ la hora de conceder [tributary_scope.Custom('ES_AlAla')] [tributary_scope.GetTitledFirstNameNoTooltip|l] el reconocimiento oficial del Hijo del Cielo?"
 tribute_mission.1006.grant: "Formalizaremos este acordo para a posteridade."
 tribute_mission.1006.grant.tt: "[scribe_character.GetShortUIName] talharĂˇ um [seal_of_investiture|lE] para [tributary_scope.Custom('ES_ElLa')] [tributary_scope.GetTitledFirstName|l]"
 tribute_mission.1006.decline.no_money: "O tesouro imperial nĂŁo pode arcar com essa despesa."
 tribute_mission.1006.decline.dont_wanna: "[tributary_scope.GetFirstNameNoTooltip] nĂŁo merece tal honra."
 refused_seal_of_investiture_opinion: "Recusou-se a conceder um [seal_of_investiture|lE]"
 tribute_mission.1007.t: "$tribute_mission_header$ selo de investidura"
 tribute_mission.1007.desc: "ApĂłs uma pausa significativa,[receiving_character.Custom('ES_ElLa')] [receiving_character.GetTitledFirstName|l] se ergue cerimoniosamente. Ao sinal, [receiving_character.Custom('ES_OA')] surgem da multidĂŁo portando um [scribe_character.Custom('ES_ElLa')] escriba[scribe_character.Custom('ES_OA')] imperial [scribe_character.GetShortUIName] surge da multidĂŁo carregando um $game_concept_seal_of_investiture$ de fino acabamento, com meu nome nele!\n\n[receiving_character.Custom('ES_ElLa')|U] [receiving_character.GetTitledFirstName|l] o recebe com todo cuidado e me implora que me levante. A audiĂŞncia estĂˇ absorta.\n\nAo receber a bĂŞnĂ§ĂŁo do Filho do CĂ©u, um pensamento me ocorre: que novas portas este precioso contrato poderĂˇ abrir?"
 tribute_mission.1007.a: "Isso muda tudo."
 tribute_mission.1008.t: "$tribute_mission_header$ tributo em andamento"
 tribute_mission.1008.desc: "Mientras los obsequios se intercambian en la ceremonia, siento que la expectaciĂłn crece en la corte, como si faltasen por decir ciertas palabras. Si bien nunca se expresĂł directamente, las expectativas sobre mi persona se van haciendo patentes poco a poco.\n\n[receiving_character.Custom('ES_ElLa')|U] [receiving_character.GetTitledFirstNameNoTooltip|l] desea que prometa que estos obsequios seguirĂˇn llegando, a cambio de la benevolencia de [receiving_character.GetLiege.GetPrimaryTitle.GetNameNoTierNoTooltip].\n\nAĂşn hay tiempo para rechazar honorablemente la oferta y conservar mi independencia, con todo lo que ello conlleva."
 tribute_mission.1008.a: ""â€¦ e, claro, [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] ofereceria presentes a [receiving_character.GetLiege.GetPrimaryTitle.GetNameNoTierNoTooltip] com regularidade"."
 tribute_mission.1008.b: "[ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] nĂŁo se curvarĂˇ diante de."
