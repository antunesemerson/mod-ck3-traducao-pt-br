 tribute_mission.1000.t: "$tribute_mission_header$ prestando tributo"
 tribute_mission.1000.intro: "Entramos no grande salĂŁo de [overlord_scope.GetCapitalLocation.GetBaronyNameExplicitlyNoTooltip] e somos recebidos por"
 tribute_mission.1000.intro.overlord: "[overlord_scope.Custom('ES_ElLa')] [overlord_scope.GetTitledFirstName|l] fazendo um gesto rĂ©gio para que nos aproximemos."
 tribute_mission.1000.intro.diarch: "[receiving_character.Custom('ES_ElLa')] [receiving_character.GetDiarchTitle|l] [overlord_scope.Custom('ES_DelDela')] [overlord_scope.GetTitledFirstName|l], [receiving_character.Custom('ES_ElLa')] [receiving_character.GetTitledFirstName|l], fazendo um gesto para que nos aproximemos."
 tribute_mission.1000.intro.councillor: "[receiving_character.Custom('ES_ElLa')] [receiving_character.Custom('CouncilPosition')|l] [overlord_scope.Custom('ES_DelDela')] [overlord_scope.GetTitledFirstName|l], [receiving_character.Custom('ES_ElLa')] [receiving_character.GetTitledFirstName|l], que assente com a cabeĂ§a e faz um gesto para que nos aproximemos."
 tribute_mission.1000.intro.attendant: "um dos assistentes de alto escalĂŁo [overlord_scope.Custom('ES_DelDela')] [overlord_scope.GetTitledFirstName|l], com um sorriso de desculpas e nos fazendo um gesto para nos aproximarmos."
 tribute_mission.1000.desc.segway: "\n\nSem demora, declaro:"
 tribute_mission.1000.desc.bunga_mas: ""Admire este esplendor, um conjunto de Ăˇrvores bunga mas da mais alta qualidade, criados apenas para [overlord.Custom('ES_ElLa')] [overlord_scope.GetTitledFirstName|l] mais magnĂ­fic[overlord.Custom('ES_OA')]!". A multidĂŁo arregala os olhos e vĂˇrios murmĂşrios ecoam pelo salĂŁo."
 tribute_mission.1000.desc.small_gold: ""Permitam-me oferecer um humilde tributo, pequeno em tamanho, mas grande em espĂ­rito!", faĂ§o uma reverĂŞncia enquanto meus servos trazem as pequenas caixas de mercadorias comerciais."
 tribute_mission.1000.desc.adequate_gold: ""Apresentamos um tributo formidĂˇvel que reflete nosso apreĂ§o por noss[overlord_scope.Custom('ES_OA')] [overlord_scope.GetLadyLord|l]!", sorrio e aceno com a cabeĂ§a enquanto cestos e urnas fartos sĂŁo apresentados Ă  sala."
 tribute_mission.1000.desc.excessive_gold: ""Deleitem-se com tal magnificĂŞncia!", sorrio orgulhosamente enquanto a sala se #EMP pasma#! e #EMP asombra#! diante da mera opulĂŞncia do tributo apresentado: caixas, urnas, cestos, estĂˇtuas. #EMP Abundancia.#!"
 tribute_mission.1000.desc.small_herd: ""Trazemos as melhores criaturas dos nossos rebanhos, prontas para servir a noss[overlord_scope.Custom('ES_OA')] [overlord_scope.GetLadyLord]!""
 tribute_mission.1000.desc.adequate_herd: ""Os estĂˇbulos estĂŁo abarrotados com nossas criaturas, grandes e pequenas. Todas para noss[overlord_scope.Custom('ES_OA')] [overlord_scope.GetLadyLord]!""
 tribute_mission.1000.desc.excessive_herd: ""Uma grande quantidade de criaturas, grandes, pequenas, fortes e rĂˇpidas foi trazida perante nuestr[overlord_scope.Custom('ES_OA')] [overlord_scope.GetLadyLord|l]. Elas servirĂŁo bem Ă  corte de [overlord_scope.GetCapitalLocation.GetTitle.GetBaseNameNoTierNoTooltip]!"."
 tribute_mission.1000.desc.concubine: ""â€¦ apresento [human_tribute.Custom('ES_AlAla')] adorĂˇvel [human_tribute.GetTitledFirstNameNoTooltip|l], outra flor no jardim de [overlord_scope.GetCapitalLocation.GetTitle.GetBaseNameNoTierNoTooltip]!", e [human_tribute.Custom('ES_ElLa')] [human_tribute.GetTitledFirstNameNoTooltip|l] dĂˇ um gracioso passo Ă  frente, corando ao atrair a atenĂ§ĂŁo da sala."
 tribute_mission.1000.desc.eunuch: ""â€¦ contemplai [human_tribute.Custom('ES_AlAla')] eunuco admirĂˇvel[human_tribute.Custom('ES_OA')] [human_tribute.Custom('ES_ElLa')], [human_tribute.GetTitledFirstNameNoTooltip|l] que servirĂˇ com orgulho na corte de [overlord_scope.GetCapitalLocation.GetTitle.GetBaseNameNoTierNoTooltip]!", e [human_tribute.Custom('ES_ElLa')] [human_tribute.GetTitledFirstNameNoTooltip|l] dĂˇ um passo Ă  frente e faz com que a sala exploda em um mar de sussurros."
 tribute_mission.1000.desc.artifact: ""[artifact_to_tribute.Custom('ArtifactType')|U], este artefato Ă© um dos meus pertences mais preciosos; agora pertence [overlord_scope.Custom('ES_AlAla')] [overlord_scope.GetTitleAsNameNoTooltip|l], como um gesto de apreĂ§o mĂştuo"."
 tribute_mission.1000.outro.attendant: "\n\nO assistente reflete sobre isso por um momento, permitindo-me intervir de antemĂŁo:"
 tribute_mission.1000.outro: "\n\n[receiving_character.Custom('ES_ElLa')|U] [receiving_character.GetTitledFirstNameNoTooltip|l] reflete sobre isso por um momento, o que me permite me adiantar e dizer:"
 tribute_mission.1000.treasury: "\"Agora, os tecidos de [overlord_scope.GetCapitalLocation.GetTitle.GetBaseNameNoTierNoTooltip]... Que esplendor...\"."
 tribute_mission.1000.success.t: "ĂŠxito"
