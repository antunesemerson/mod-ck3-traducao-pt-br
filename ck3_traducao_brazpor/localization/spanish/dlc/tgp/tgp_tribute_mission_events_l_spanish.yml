 tribute_mission.1000.t: "$tribute_mission_header$ prestando tributo"
 tribute_mission.1000.intro: "Entramos no grande salão de [overlord_scope.GetCapitalLocation.GetBaronyNameExplicitlyNoTooltip] e somos recebidos por"
 tribute_mission.1000.intro.overlord: "[overlord_scope.Custom('ES_ElLa')] [overlord_scope.GetTitledFirstName|l] fazendo um gesto régio para que nos aproximemos."
 tribute_mission.1000.intro.diarch: "[receiving_character.Custom('ES_ElLa')] [receiving_character.GetDiarchTitle|l] [overlord_scope.Custom('ES_DelDela')] [overlord_scope.GetTitledFirstName|l], [receiving_character.Custom('ES_ElLa')] [receiving_character.GetTitledFirstName|l], fazendo um gesto para que nos aproximemos."
 tribute_mission.1000.intro.councillor: "[receiving_character.Custom('ES_ElLa')] [receiving_character.Custom('CouncilPosition')|l] [overlord_scope.Custom('ES_DelDela')] [overlord_scope.GetTitledFirstName|l], [receiving_character.Custom('ES_ElLa')] [receiving_character.GetTitledFirstName|l], que assente com a cabeça e faz um gesto para que nos aproximemos."
 tribute_mission.1000.intro.attendant: "um dos assistentes de alto escalão [overlord_scope.Custom('ES_DelDela')] [overlord_scope.GetTitledFirstName|l], com um sorriso de desculpas e nos fazendo um gesto para nos aproximarmos."
 tribute_mission.1000.desc.segway: "\n\nSem demora, declaro:"
 tribute_mission.1000.desc.bunga_mas: ""Admire este esplendor, um conjunto de árvores bunga mas da mais alta qualidade, criados apenas para [overlord.Custom('ES_ElLa')] [overlord_scope.GetTitledFirstName|l] mais magnífic[overlord.Custom('ES_OA')]!". A multidão arregala os olhos e vários murmúrios ecoam pelo salão."
 tribute_mission.1000.desc.small_gold: ""Permitam-me oferecer um humilde tributo, pequeno em tamanho, mas grande em espírito!", faço uma reverência enquanto meus servos trazem as pequenas caixas de mercadorias comerciais."
 tribute_mission.1000.desc.adequate_gold: ""Apresentamos um tributo formidável que reflete nosso apreço por noss[overlord_scope.Custom('ES_OA')] [overlord_scope.GetLadyLord|l]!", sorrio e aceno com a cabeça enquanto cestos e urnas fartos são apresentados à sala."
 tribute_mission.1000.desc.excessive_gold: ""Deleitem-se com tal magnificência!", sorrio orgulhosamente enquanto a sala se #EMP pasma#! e #EMP asombra#! diante da mera opulência do tributo apresentado: caixas, urnas, cestos, estátuas. #EMP Abundancia.#!"
 tribute_mission.1000.desc.small_herd: ""Trazemos as melhores criaturas dos nossos rebanhos, prontas para servir a noss[overlord_scope.Custom('ES_OA')] [overlord_scope.GetLadyLord]!""
 tribute_mission.1000.desc.adequate_herd: ""Os estábulos estão abarrotados com nossas criaturas, grandes e pequenas. Todas para noss[overlord_scope.Custom('ES_OA')] [overlord_scope.GetLadyLord]!""
 tribute_mission.1000.desc.excessive_herd: ""Uma grande quantidade de criaturas, grandes, pequenas, fortes e rápidas foi trazida perante nuestr[overlord_scope.Custom('ES_OA')] [overlord_scope.GetLadyLord|l]. Elas servirão bem à corte de [overlord_scope.GetCapitalLocation.GetTitle.GetBaseNameNoTierNoTooltip]!"."
 tribute_mission.1000.desc.concubine: ""… apresento [human_tribute.Custom('ES_AlAla')] adorável [human_tribute.GetTitledFirstNameNoTooltip|l], outra flor no jardim de [overlord_scope.GetCapitalLocation.GetTitle.GetBaseNameNoTierNoTooltip]!", e [human_tribute.Custom('ES_ElLa')] [human_tribute.GetTitledFirstNameNoTooltip|l] dá um gracioso passo à frente, corando ao atrair a atenção da sala."
 tribute_mission.1000.desc.eunuch: ""… contemplai [human_tribute.Custom('ES_AlAla')] eunuco admirável[human_tribute.Custom('ES_OA')] [human_tribute.Custom('ES_ElLa')], [human_tribute.GetTitledFirstNameNoTooltip|l] que servirá com orgulho na corte de [overlord_scope.GetCapitalLocation.GetTitle.GetBaseNameNoTierNoTooltip]!", e [human_tribute.Custom('ES_ElLa')] [human_tribute.GetTitledFirstNameNoTooltip|l] dá um passo à frente e faz com que a sala exploda em um mar de sussurros."
 tribute_mission.1000.desc.artifact: ""[artifact_to_tribute.Custom('ArtifactType')|U], este artefato é um dos meus pertences mais preciosos; agora pertence [overlord_scope.Custom('ES_AlAla')] [overlord_scope.GetTitleAsNameNoTooltip|l], como um gesto de apreço mútuo"."
 tribute_mission.1000.outro.attendant: "\n\nO assistente reflete sobre isso por um momento, permitindo-me intervir de antemão:"
 tribute_mission.1000.outro: "\n\n[receiving_character.Custom('ES_ElLa')|U] [receiving_character.GetTitledFirstNameNoTooltip|l] reflete sobre isso por um momento, o que me permite me adiantar e dizer:"
 tribute_mission.1000.treasury: "\"Agora, os tecidos de [overlord_scope.GetCapitalLocation.GetTitle.GetBaseNameNoTierNoTooltip]... Que esplendor...\"."
 tribute_mission.1000.success.t: "Êxito"
 tribute_mission.1000.success.desc: "Você consegue convencer[receiving_character.GetHerHim]"
 tribute_mission.1000.failure.t: "Tentativa fracassada"
 tribute_mission.1000.failure.desc: "Sua tentativa é ignorada"
 tribute_mission.1000.failure.tt: "[receiving_character.GetShortUIName] decide o presente"
 tribute_mission.1000.artifact: ""A arte de [overlord_scope.GetCulture.GetCollectiveNounNoTooltip] é algo e tanto…"."
 tribute_mission.1000.artifact.tt: "Você ganha um [artifact|lE] dos [overlord_scope.GetCulture.GetCollectiveNounNoTooltip]"
 tribute_mission.1000.innovation: ""Compartilhar conhecimento — existe propósito mais nobre…"."
 tribute_mission.1000.innovation.tt: "Você descobre uma [innovation|lE] nova para pesquisar ou ganhar progresso de [fascination|lE]"
 tribute_mission.1000.development: "Sobre aqueles mercados inexplorados em [tributary_scope.GetCapitalLocation.GetTitle.GetBaseNameNoTierNoTooltip]..."
 tribute_mission.1000.monk.tt: "[receiving_character.GetShortUIName] lhe dará um [courtier|lE] monge da religião [overlord_scope.GetFaith.GetAdjective]"
 tribute_mission.1000.abstain: ""Que [tributary_scope.GetFaith.HighGodName] nos traga grande prosperidade"."
 tribute_mission.1000.abstain.treasury.desc: "Bens comerciais preciosos são concedidos"
 tribute_mission.1000.abstain.artifact.desc: "Um artefato maravilhoso é criado"
 tribute_mission.1000.abstain.innovation.desc: "O progresso tecnológico é compartilhado"
 tribute_mission.1000.abstain.development.desc: "São enviados comerciantes [overlord_scope.GetCulture.GetCollectiveNounNoTooltip] para sua capital"
 tribute_mission.1000.abstain.monk.desc: "É concedido a você um monge da fé [overlord_scope.GetFaith.GetAdjective] para espalhar a sabedoria"
 tribute_mission.1000.abstain.legitimacy.desc: "Você recebe uma bênção adicional de legitimidade"
 #Recipient: Decide on the human tribute
 tribute_mission.1002.t: "$tribute_mission_header$ o destino que nos aguarda"
 tribute_mission.1002.segway: "[tributary_scope.Custom('ES_ElLa')|U] [tributary_scope.GetTitledFirstName|l] entra no grande salão com sua comitiva, ansios[tributary_scope.Custom('ES_OA')] por apresentar seu tributo."
 tribute_mission.1002.desc.concubine: "[Select_CString(human_tribute.IsFemale, 'Uma concubina sedutora', 'Um concubino sedutor' )] a quem, ao que parece, se apresenta como [human_tribute.Custom('ES_ElLa')] [human_tribute.GetTitledFirstName|l]."
 tribute_mission.1002.desc.new_eunuch: "[Select_CString(human_tribute.IsFemale, 'Una castrada incómoda', 'Un eunuco incómodo' )] ao que parece.\n\nApresentad[human_tribute.Custom('ES_OA')] como [human_tribute.Custom('ES_ElLa')] [human_tribute.GetTitledFirstName|l], se encolhe visivelmente enquanto se aproxima aos tropeços de mim para uma inspeção mais de perto."
 tribute_mission.1002.desc.eunuch: "[Select_CString(human_tribute.IsFemale, 'Una castrada ducha', 'Un eunuco avezado' )], ao que parece.\n\nApresentad[human_tribute.Custom('ES_OA')] como [human_tribute.Custom('ES_ElLa')] [human_tribute.GetTitledFirstName|l], exala uma paz e uma calma superiores à sua idade, e me observa em silêncio enquanto inspeciono sua pessoa."
 tribute_mission.1002.beauty.concubine.good: "\n\nSeu cabelo brilhante, pele clara, olhos cintilantes e corpo de forma agradável... Eu deleito meus olhos em sua figura, sem me saciar por completo ainda."
 tribute_mission.1002.beauty.concubine.bad: "\n\nCabelo emaranhado, pele cheia de espinhas..., o ângulo da mandíbula. Não há muitas qualidades redentoras em relação ao visual de [human_tribute.GetHerHim] salvam em questão de aparência. Frunzo os lábios levemente."
 tribute_mission.1002.physique.concubine.good: "\n\nO físico impressionante d[human_tribute.Custom('ES_EA')] [human_tribute.GetWomanMan] faz com que eu me sinta mais saudá[ROOT.Char.Custom('ES_OA')] com só de olhar[human_tribute.GetHerHim]. Acabo gostando bastante disso."
 tribute_mission.1002.physique.concubine.bad: "\n\nEsse pigarro constante, os braços finos demais… parece que há algo estranho em seu físico, mas é difícil apontar exatamente o quê. Isso me deixa ligeiramente incomod[ROOT.Char.Custom('ES_OA')]."
 tribute_mission.1002.exterior.plain: "\n\nSeu aspecto não tem nada de extraordinário, mas o brilho em seu olhar ainda me intriga."
 tribute_mission.1002.personality.shy: "\n\n[human_tribute.GetSheHe|U] se encolhe quando um par de guardas passa ao seu lado, perto demais. Tentando ocupar o mínimo de espaço possível, abaixa levemente os ombros, fazendo o mínimo de barulho possível."
 tribute_mission.1002.personality.bold: "\n\nUma postura vigorosa indica que est[human_tribute.Custom('ES_EA')] [human_tribute.GetWomanMan] é capaz de manter sua posição, para o bem ou para o mal."
 tribute_mission.1002.personality.cynical: "\n\nUm tremor no canto do olho, enquanto os braços assumem uma postura defensiva, indica que este[human_tribute.Custom('ES_EA')] [human_tribute.GetWomanMan] tem uma visão muito particular do mundo."
 tribute_mission.1002.personality.angry: "\n\nUma ruga cada vez mais profunda entre as sobrancelhas conta a história de um[human_tribute.Custom('ES_XA')] [human_tribute.GetWomanMan] muito teimos[human_tribute.Custom('ES_OA')] oso."
 tribute_mission.1002.personality.fallback: "\n\n[human_tribute.GetFirstNameNoTooltip] dirige os olhos na minha direção, depois percorre a sala com o olhar para então voltar para mim, como se procurasse pistas para resolver um enigma."
 tribute_mission.1002.a: ""Provavelmente se mostrará útil em alguma parte da corte"."
 tribute_mission.1002.b: ""Bem, deveríamos nomear vocês #EMP de inmediato…#!""
 tribute_mission.1002.b.flavor: "Mas que um #EMP hermoso ejemplar#!…"
 tribute_mission.1002.c: ""Vocês trabalharão diretamente para mim"."
 tribute_mission.1002.d: ""Hum, creio que estamos todos satisfeitos no momento"."
 tribute_mission.1002.d.tt: "É enviado de volta a [human_tribute.GetShortUIName] para [tributary_scope.GetCapitalLocation.GetTitle.GetBaseNameNoTier]"
 #Recipient: What do you get/give?
 tribute_mission.1005.t: "$tribute_mission_header$ o tributo"
 tribute_mission.1005.t.ai.bunga_mas: "$tribute_mission_header$ [newly_created_bunga_mas.GetNameNoTooltip]"
 tribute_mission.1005.t.bunga_mas: "$tribute_mission_header$ flores de ouro [tributary_scope.Custom('ES_DelDela')] [tributary_scope.GetTitledFirstNameNoTooltip|ll]"
 tribute_mission.1005.t.gold: "$tribute_mission_header$ o ouro [tributary_scope.Custom('ES_DelDela')] [tributary_scope.GetTitledFirstNameNoTooltip|l]"
 tribute_mission.1005.t.herd: "$tribute_mission_header$ a manada de [tributary_scope.Custom('ES_DelDela')] [tributary_scope.GetTitledFirstNameNoTooltip|l]"
 tribute_mission.1005.t.concubine: "$tribute_mission_header$ as flores [tributary_scope.Custom('ES_DelDela')] [tributary_scope.GetTitledFirstNameNoTooltip|l]"
 tribute_mission.1005.t.eunuch: "$tribute_mission_header$ o engenho [tributary_scope.Custom('ES_DelDela')] [tributary_scope.GetTitledFirstNameNoTooltip|l]"
 tribute_mission.1005.t.artifact: "$tribute_mission_header$ os artefatos [tributary_scope.Custom('ES_DelDela')] [tributary_scope.GetTitledFirstNameNoTooltip|l]"
 tribute_mission.1005.intro.human_tribute: "[tributary_scope.Custom('ES_ElLa')|U] [tributary_scope.GetTitledFirstNameNoTooltip|l] começa a mudar o peso de um pé para o outro enquanto aguarda minha decisão, lançando olhares de soslaio de vez em quando [human_tribute.Custom('ES_AlAla')] [human_tribute.GetTitledFirstName|l]."
 tribute_mission.1005.intro: "[tributary_scope.Custom('ES_ElLa')|U] [tributary_scope.GetTitledFirstName|l] entra aos trancos no grande salão, aproxima-se de mim como se nada fosse e me apresenta seu tributo com um sorriso bajulador:"
 tribute_mission.1005.desc.bunga_mas: "\n\nUma árvore de flores douradas! Este artefato requintado se ergue sobre o restante do tributo, ínfimo em comparação. Algumas folhinhas captam a luz e parecem emitir um brilho só comparável ao meu.\n\nMe recomponho rapidamente, tentando não demonstrar demais, enquanto me pergunto que benevolência devo conceder em troca deste magnífico presente…"
 tribute_mission.1005.desc.small_gold: "\n\nErgo uma sobrancelha quando os servos examinam o punhado de moedas e ornamentos que constituem este tributo menor.\n\nNão encherão nossos cofres, mas ao menos [tributary_scope.Custom('ES_ElLa')] [tributary_scope.GetTitledFirstNameNoTooltip|l] cumpriu suas obrigações de vassalo. Agora, que benevolência devo conceder em troca…"
 tribute_mission.1005.desc.adequate_gold: "\n\nInclino levemente a cabeça diante do tributo respeitável; os metais preciosos e os tecidos captam a luz de vez em quando, cintilando sutilmente.\n\nAgora vamos ao próximo assunto: que benevolência devo conceder em troca…"
 tribute_mission.1005.desc.excessive_gold: "\n\nOuro, tecidos, pedras preciosas… Uma exibição de desperdício chamativo, mas #EMP deliciosa#! me saúda. Controlo cuidadosamente minha expressão, tentando não parecer impressionado[ROOT.Char.Custom('ES_OA')] demais.\n\n Isto ficará muito bem. Agora, como recompensar esta demonstração de opulência…"
 tribute_mission.1005.desc.small_herd: "\n\nUma pequena quantidade de animais balem e olham com apreensão enquanto os servos os examinam.\n\nNão é muito, mas ao menos [tributary_scope.Custom('ES_ElLa')] [tributary_scope.GetTitledFirstNameNoTooltip|l] cumpriu com suas obrigações tributárias. Agora, que benevolência devo conceder-lhe em troca…"
 tribute_mission.1005.desc.adequate_herd: "\n\nAnimais de qualidade respeitável olham curiosamente ao redor da sala enquanto são examinados pelos meus servos.\n\nSerão uma boa adição. Agora, como recompensar isto…"
 tribute_mission.1005.desc.excessive_herd: "\n\nAlguns dos animais mais imaculados que já vi me são apresentados como tributo: pelagem reluzente, olhos brilhantes… e há ainda mais esperando lá fora. Um tributo certamente impressionante.\n\nAgora, como recompensar este despliegue de opulência…"
 tribute_mission.1005.desc.rejected_concubine: "\n\nUm espécime desprezível, cerro os lábios ao voltar a pousar o olhar sobre o que chamam de tributo. E [tributary_scope.Custom('ES_ElLa')] [tributary_scope.GetTitledFirstNameNoTooltip|l] [human_tribute.GetHerHim] considera dign[human_tribute.Custom('ES_OA')] de nossa atenção. #EMP Puf.#!\n\nAgora, o que deveria conceder a [tributary_scope.Custom('ES_AlAla')] [tributary_scope.GetTitledFirstNameNoTooltip|l]…"
 tribute_mission.1005.desc.appointed_concubine: "\n\nMinha mente vagueia um pouco enquanto me detenho com timidez nas curvas e #EMP atributos#!.\n\nEnquanto o sangue sobe às minhas faces, forço-me a me concentrar no assunto em questão… O que eu deveria conceder [tributary_scope.Custom('ES_AlAla')] [tributary_scope.GetTitledFirstNameNoTooltip|l] por nos trazer este #EMP delicioso#! tributo?"
 tribute_mission.1005.desc.concubine: "\n\nDepois de adicionar[human_tribute.GetHerHim]à nossa corte, tenho certeza de que será útil em algum lugar.\n\nDiante disso, devo decidir o que conceder a [tributary_scope.Custom('ES_AlAla')] [tributary_scope.GetTitledFirstNameNoTooltip|l]…"
 tribute_mission.1005.desc.rejected_eunuch: "$tribute_mission.1005.desc.rejected_concubine$"
 tribute_mission.1005.desc.appointed_eunuch: "\n\n[human_tribute.GetSheHe] me servirá bem como meu [Select_CString(human_tribute.IsFemale, 'nueva eunuca jefa', 'nuevo eunuco jefe' )].\n\nEsboço um leve sorriso de superioridade enquanto reflito cuidadosamente sobre o que conceder a [tributary_scope.Custom('ES_AlAla')] [tributary_scope.GetTitledFirstNameNoTooltip|l]…"
 tribute_mission.1005.desc.eunuch: "$tribute_mission.1005.desc.concubine$"
 tribute_mission.1005.desc.artifact: "\n\n[artifact_to_tribute.GetName|U] é um tributo bonito, e passo cuidadosamente a mão ao longo de sua borda. Uma peça sólida, sem dúvida.\n\nAgora, como devo responder a isto…"
 tribute_mission.1005.desc: "\n\nRefletindo cuidadosamente sobre o tributo apresentado.\n\nAgora, como devo responder a isto…"
 tribute_mission.1005.treasury: ""Recompensemos vosso tributo com valiosas mercadorias comerciais"."
 tribute_mission.1005.artifact: ""Concederei a voc? rel?quias dos [overlord_scope.GetCulture.GetCollectiveNounNoTooltip].""
 tribute_mission.1005.artifact.tt: "Você presenteia [tributary_scope.GetShortUINameNoTooltip] um [artifact|lE] dos [overlord_scope.GetCulture.GetCollectiveNounNoTooltip]"
 tribute_mission.1005.innovation: ""Temos alguns avanços tecnológicos que podemos compartilhar…"."
 tribute_mission.1005.innovation.tt: "Você recompensa [tributary_scope.GetShortUINameNoTooltip] com alguns avanços tecnológicos"
 tribute_mission.1005.development: ""Estabeleceremos um maravilhoso posto comercial em sua capital"."
 tribute_mission.1005.monk: ""Um dos meus monges mais sábios o guiará"."
 tribute_mission.1005.legitimacy: ""Por meio deste, reafirmo-vos como o verdadeiro governante de [tributary_scope.GetCapitalLocation.GetCounty.GetName]"."
 fervor_gain_suzerain_missionaries: "Missionários do suserano"
 fervor_loss_suzerain_missionaries: "Missionários rejeitados"
 #Tributary: Woah, some bling
 tribute_mission.1010.t: "$tribute_mission_header$ a partida"
 tribute_mission.1010.t.treasury: "$tribute_mission_header$ os bens comerciais dos [overlord_scope.GetCulture.GetCollectiveNounNoTooltip]"
 tribute_mission.1010.t.artifact: "$tribute_mission_header$ o melhor de [overlord_scope.GetCapitalLocation.GetTitle.GetBaseNameNoTierNoTooltip]"
 tribute_mission.1010.t.innovation: "$tribute_mission_header$ fascínios dos [overlord_scope.GetCulture.GetCollectiveNounNoTooltip]"
 tribute_mission.1010.t.development: "$tribute_mission_header$ comerciantes de [overlord_scope.GetCapitalLocation.GetTitle.GetBaseNameNoTierNoTooltip]"
 tribute_mission.1010.t.monk: "$tribute_mission_header$ a sabedoria de [overlord_scope.GetFaith.GetNameNoTooltip]"
 tribute_mission.1010.t.legitimacy: "$tribute_mission_header$ a legitimidade de [overlord_scope.GetFaith.GetNameNoTooltip|l]"
 tribute_mission.1010.intro.attendant: "O atendente pondera por mais alguns instantes antes de parecer tomar uma decisão."
 tribute_mission.1010.intro: "[receiving_character.Custom('ES_ElLa')|U] [receiving_character.GetTitledFirstName|l] avalia meu tributo de cima a baixo antes de, ao que parece, chegar a uma decisão."
 tribute_mission.1010.intro.postseal: "Ao término da cerimônia solene e legal do $game_concept_seal_of_investiture$ brota a opulenta riqueza de [overlord_scope.GetPrimaryTitle.GetDefinitiveNameNoTooltip]."
 tribute_mission.1010.segway: "\n\nEnquanto se dirige para o fundo da sala,"
 tribute_mission.1010.desc.treasury: "$tribute_mission.1010.segway$ uma profusão de recipientes carregados com tecidos preciosos, lingotes e especiarias de origem dos [overlord_scope.GetCulture.GetCollectiveNounNoTooltip] é exibida em uma demonstração de esplendor."
 tribute_mission.1010.desc.artifact: "$tribute_mission.1010.segway$ um artefato precioso para os [overlord_scope.GetCulture.GetCollectiveNounNoTooltip] , [tribute_reward_type_artifact.GetName], é apresentado a mim sobre uma almofada de veludo, o que realça seu esplendor."
 tribute_mission.1010.desc.innovation: "$tribute_mission.1010.segway$ um grupo de monges se aproxima de nós, entregando-nos um punhado de pergaminhos contendo novos fatos e revelações relativas às suas inovações."
 tribute_mission.1010.desc.development: "$tribute_mission.1010.segway$ um servo erudito se aproxima a nós, apresentando-me um contrato.\nNo contrato, detalha-se um acordo comercial para que os [overlord_scope.GetCulture.GetCollectiveNounNoTooltip] estabeleçam postos comerciais em [tributary_scope.GetCapitalLocation.GetTitle.GetBaseNameNoTierNoTooltip] que contribuam para o desenvolvimento e a riqueza geral da região."
 tribute_mission.1010.desc.monk: "$tribute_mission.1010.segway$ aparece [new_monk.Custom('GetArticledAgeDescriptionGender')] e se apresenta como [new_monk.Custom('ES_ElLa')] [new_monk.GetTitledFirstName|l], monj[new_monk.Custom('ES_EA')] da fé [overlord_scope.GetFaith.GetAdjectiveNoTooltip]. Me informa alegremente de sua intenção de viajar comigo até [tributary_scope.GetCapitalLocation.GetTitle.GetBaseNameNoTierNoTooltip] para oferecer seus serviços."
 tribute_mission.1010.desc.legitimacy: "\n\nEle me faz sinal para que eu me aproxime e então, com graça majestosa, desce lentamente até mim. Inclino a cabeça quando [overlord_scope.Custom('ES_ElLa')] [overlord_scope.GetTitleAsNameNoTooltip|l] realiza os gestos cerimoniais [overlord_scope.GetCulture.GetCollectiveNounNoTooltip].\n\nQuando termina, proclama com voz imponente: "Por meio desta, reafirmo sua autoridade como governante de [tributary_scope.GetCapitalLocation.GetCounty.GetName]. Pode ir em paz"."
 tribute_mission.1010.outro: "\n\n"Considerai-vos agraciado com a graça de [overlord_scope.GetCapitalLocation.GetTitle.GetBaseNameNoTierNoTooltip], meu [tributary_scope.GetTitleAsNameNoTooltip|l]. Boa viagem.""
 tribute_mission.1010.a: "Bendit[new_monk.Custom('ES_OA')] sejais!"
