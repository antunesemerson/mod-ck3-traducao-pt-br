 tribute_mission.1006.t: "$tribute_mission_header$ selo de investidura"
 tribute_mission.1006.desc: "[tributary_scope.Custom('ES_ElLa')|U] [tributary_scope.GetTitledFirstName|l] permanece prostrad[tributary_scope.Custom('ES_OA')] há um tempo que já começa a parecer desconfortavelmente longo. Será que ele(a) espera mais alguma coisa de mim?\n\nVejo meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('scribe_character'))] [scribe_character.GetShortUIName], [Select_CString(scribe_character.IsFemale, 'la artesana', 'el artesano' )] que grava meus selos oficiais, esperando estoicamente de lado na corte lotada.\n\nSerá que chegou a hora de conceder [tributary_scope.Custom('ES_AlAla')] [tributary_scope.GetTitledFirstNameNoTooltip|l] o reconhecimento oficial do Filho do Céu?"
 tribute_mission.1006.grant: "Formalizaremos este acordo para a posteridade."
 tribute_mission.1006.grant.tt: "[scribe_character.GetShortUIName] talhará um [seal_of_investiture|lE] para [tributary_scope.Custom('ES_ElLa')] [tributary_scope.GetTitledFirstName|l]"
 tribute_mission.1006.decline.no_money: "O tesouro imperial não pode arcar com essa despesa."
 tribute_mission.1006.decline.dont_wanna: "[tributary_scope.GetFirstNameNoTooltip] não merece tal honra."
 refused_seal_of_investiture_opinion: "Recusou-se a conceder um [seal_of_investiture|lE]"
 tribute_mission.1007.t: "$tribute_mission_header$ selo de investidura"
 tribute_mission.1007.desc: "Após uma pausa significativa,[receiving_character.Custom('ES_ElLa')] [receiving_character.GetTitledFirstName|l] se ergue cerimoniosamente. Ao sinal, [receiving_character.Custom('ES_OA')] surgem da multidão portando um [scribe_character.Custom('ES_ElLa')] escriba[scribe_character.Custom('ES_OA')] imperial [scribe_character.GetShortUIName] surge da multidão carregando um $game_concept_seal_of_investiture$ de fino acabamento, com meu nome nele!\n\n[receiving_character.Custom('ES_ElLa')|U] [receiving_character.GetTitledFirstName|l] o recebe com todo cuidado e me implora que me levante. A audiência está absorta.\n\nAo receber a bênção do Filho do Céu, um pensamento me ocorre: que novas portas este precioso contrato poderá abrir?"
 tribute_mission.1007.a: "Isso muda tudo."
 tribute_mission.1008.t: "$tribute_mission_header$ tributo em andamento"
 tribute_mission.1008.desc: "Enquanto os presentes são trocados na cerimônia, sinto a expectativa crescer pela corte, como se certas palavras ainda estivessem por ser ditas. Embora nunca tenha sido dito de forma direta, a expectativa sobre mim vai se tornando clara aos poucos.\n\n[receiving_character.Custom('ES_ElLa')|U] [receiving_character.GetTitledFirstNameNoTooltip|l] deseja que eu prometa que estes presentes continuarão a ser enviados, em troca da benevolência de [receiving_character.GetLiege.GetPrimaryTitle.GetNameNoTierNoTooltip].\n\nAinda há tempo para recusar a oferta com honra e preservar minha independência, com tudo o que isso possa acarretar."
 tribute_mission.1008.a: ""… e, claro, [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] ofereceria presentes a [receiving_character.GetLiege.GetPrimaryTitle.GetNameNoTierNoTooltip] com regularidade"."
 tribute_mission.1008.b: "[ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] não se curvará diante de."
