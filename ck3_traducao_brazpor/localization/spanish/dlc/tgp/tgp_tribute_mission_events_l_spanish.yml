 ### TRAVEL EVENTS ###
 #Tributary: Your human tribute is now unavailable
 tribute_mission.9750.t: "$tribute_mission_header$ o tributo acabou"
 tribute_mission.9750.desc: "Por causa de uma sĂ©rie de eventos infelizes, nosso tributo nĂŁo estĂˇ mais em nosso grupo! [human_tribute.Custom('ES_ElLa')|U] [human_tribute.GetTitledFirstName|l] foi emboraâ€¦\n\nFranzo a testa. Certamente devemos dar meia-volta e nos reagrupar, nĂŁo?"
 tribute_mission.9750.a: "NĂŁo, precisamos terminar nosso tributo!"
 tribute_mission.adequate_reserved_gold: "Reservar #V [THIS.Char.MakeScope.ScriptValue('adequate_gold_tribute_value')]#!Â @gold_icon! para o [tribute|lE]"
 tribute_mission.9750.b: "Melhor voltar para casa e pronto."
