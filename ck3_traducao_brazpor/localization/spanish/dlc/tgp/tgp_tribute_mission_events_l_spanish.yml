 ### LETTER EVENTS ###
 #Your Tributary refused your Exact Tribute Interaction
 tribute_mission.9000.opening: "[recipient.Custom2('AppropriateGreeting', ROOT.Char )]"
 tribute_mission.9000.desc: "Infelizmente, neste momento não tenho meios para realizar uma demonstração de tributo.\n\nEspero sinceramente que meu [actor.GetTitleAsNameNoTooltip|l]o entenda."
 tribute_mission.9000.a: "É mesmo?"
 #Tributary is going on a mission!
 tribute_mission.9010.opening: "[recipient.Custom2('AppropriateGreeting', ROOT.Char )]"
 tribute_mission.9010.desc: "Claro que concederemos ao meu [actor.GetTitleAsNameNoTooltip|l] com o tributo mais requintado!\n\nNossa jornada começa; e nosso destino é [actor.GetCapitalLocation.GetName]."
 tribute_mission.9010.a: "Excelente."
 #Tributary: You ignored the Tribute Mission, have some shame
 tribute_mission.9500.opening: "[overlord.Custom2('AppropriateGreeting', ROOT.Char )]"
 tribute_mission.9500.desc: "Eu pensava que você fosse uma pessoa de palavra. Concluo que esse não é o caso, tributári[ROOT.Char.Custom('ES_OA')].\n\nSeu recente fracasso em realizar uma missão de tributo à minha corte não passou despercebido."
 tribute_mission.9500.a: "Entendo."
 ### TRAVEL EVENTS ###
 #Tributary: Your human tribute is now unavailable
 tribute_mission.9750.t: "$tribute_mission_header$ o tributo acabou"
 tribute_mission.9750.desc: "Por causa de uma série de eventos infelizes, nosso tributo não está mais em nosso grupo! [human_tribute.Custom('ES_ElLa')|U] [human_tribute.GetTitledFirstName|l] foi embora…\n\nFranzo a testa. Certamente devemos dar meia-volta e nos reagrupar, não?"
 tribute_mission.9750.a: "Não, precisamos terminar nosso tributo!"
 tribute_mission.adequate_reserved_gold: "Reservar #V [THIS.Char.MakeScope.ScriptValue('adequate_gold_tribute_value')]#! @gold_icon! para o [tribute|lE]"
 tribute_mission.9750.b: "Melhor voltar para casa e pronto."
 tribute_mission.9750.tt: "$CANCEL_TRAVEL_PLAN_EFFECT$"
 #Tributary: Courtier slated for castration escapes
 tribute_mission.9760.t: "$tribute_mission_header$ a fuga"
 tribute_mission.9760.desc.vengeful: "O caos lá fora finalmente me tira do meu sono profundo. Mal desperto[ROOT.Char.Custom('ES_OA')], escuto sem vontade e finalmente consigo entender os gritos fragmentados. #EMP "… o tributo escapou! Procurai[escapee_eunuch.GetHerHim]!",#! quando uma silhueta escura aparece em minha soleira.\n\n#EMP [escapee_eunuch.GetFaith.HighGodName], perdoai o meu pecado,#! ruge nosso tributo humano, [escapee_eunuch.Custom('ES_ElLa')] [escapee_eunuch.GetTitledFirstName|l], enquanto se lança contra mim.\n\nRolei para fora da cama enquanto desvio por pouco do primeiro golpe e, de repente, ambos estamos de pé, girando [Select_CString(And(ROOT.Char.IsFemale, escapee_eunuch.IsFemale), 'uma', 'um')] em torno [Select_CString(And(ROOT.Char.IsFemale, escapee_eunuch.IsFemale), 'da outra', 'do outro')]."
 tribute_mission.9760.desc: "Desperto inexplicavelmente por um breve momento. Em meu torpor, olho ao redor da minha tenda, apenas para ver uma sombra passando pelas abas da entrada. Arrepiando-me com o ar frio da noite, levanto-me de minha enxerga e me arrasto até fora para espiar.\n\nPara minha surpresa, dou de cara com nada menos que nosso tributo humano, [escapee_eunuch.Custom('ES_ElLa')] [escapee_eunuch.GetTitledFirstName|l], que, de algum modo, conseguiu escapar de seus atendentes.\n\nSeus olhos se arregalam de medo quando percebe minha presença. \"Meu [escapee_eunuch.Custom2('RelationToMe', ROOT.Char )][escapee_eunuch.Custom('ES_OA')], por favor… Não posso fazer isso. Por favor,\" suplica, pront"
 tribute_mission.9760.a: "#EMP Você verá!#!."
 tribute_mission.9760.a.success: "Foi dominado por [escapee_eunuch.GetShortUIName]"
 tribute_mission.9760.a.success.tt: "[escapee_eunuch.GetShortUIName] está subjugado[escapee_eunuch.Custom('ES_OA')] e a [tribute_mission|lE] continua"
 tribute_mission.9760.a.failure: "[escapee_eunuch.GetShortUIName] escapa e tenta se vingar"
 tribute_mission.9760.b: ""#EMP Guardias!#!""
 tribute_mission.9760.b.success: "$tribute_mission.9760.a.success$"
 tribute_mission.9760.b.failure: "[escapee_eunuch.GetShortUIName] escapa"
 tribute_mission.9760.b.critical_failure: "[escapee_eunuch.GetShortUIName] é morto no processo"
 tribute_mission.9760.c: ""Você está livre para ir. Só #EMP Marchaos#! sem mais!"."
 #Somehow your Tribute Mission invalidated, refund and return home
 tribute_mission.9800.t: "$tribute_mission_header$ mudança de planos"
 tribute_mission.9800.desc.suzerain_turned_liege: "Parece que minhas obrigações de tributo mudaram agora que sou vassal[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetLiege.Custom('ES_DelDela')] [ROOT.Char.GetLiege.GetTitledFirstName|l].\n\nCom isso, há muitos outros assuntos dos quais cuidar em casa, e pagar tributo já não é um deles. Que reviravolta!"
 tribute_mission.9800.desc.no_longer_tributary: "Que reviravolta! Recebo a notícia de que não estamos mais acorrentados ao jugo do tributo!\n\nHá tantos assuntos e questões a tratar em casa… entre os quais lidar com esta nova independência é o tema principal."
 tribute_mission.9800.desc.different_end_location: "Com a mudança de soberania, parece que [current_overlord.Custom('ES_ElLa')] [current_overlord.GetTitledFirstName|l] tem sua capital em uma localização diferente.\n\nNossa viagem e tributo estavam programados para [old_overlord.Custom('ES_ElLa')] [old_overlord.GetTitledFirstName|l], de modo que meus conselheiros insistem que a decisão mais prudente é voltar para [ROOT.Char.GetCapitalLocation.GetName] e se reagrupar."
 tribute_mission.9800.desc.unable_to_accept_tribute: "Os murmúrios da estrada me informam de que nosso novo suserano não parece estar interessado no tipo de tributo que eu iria apresentar.\n\nPrefiro não correr o risco de irritar nossa alteza, então o mais prudente será nos reagruparmos de volta em [ROOT.Char.GetCapitalLocation.GetName]."
 tribute_mission.9800.a: "Vamos voltar para casa enquanto isso."
 tribute_mission_notification.new_overlord.title: "Suserano da missão de tributo alterado"
 tribute_mission_notification.new_overlord.desc: "[new_overlord.Custom('ES_ElLa')|U] soberano[new_overlord.Custom('ES_OA')] da sua [tribute_mission||lE] mudou para [new_overlord.GetShortUIName]"
 #OPINIONS
 slated_for_castration_opinion: "Destinado à castração"
 #MODIFIERS
 suzerain_trade_post_modifier: "Postos comerciais do suserano"
 suzerain_trade_post_modifier_desc: "Este condado recebe uma corrente contínua de comerciantes dos postos comerciais do suserano."
 #ARTIFACTS
 tribute_mission_common_bunga_mas_desc: "Um [Glossary( 'bunga mas', 'BUNGA_MAS_GLOSS' )], apresentado como tributo [overlord_scope.Custom('ES_AlAla')] [overlord_scope.GetTitledFirstName|l] por [tributary_scope.Custom('ES_ElLa')] [tributary_scope.GetTitledFirstName|l]."
 tribute_mission_masterwork_bunga_mas_desc: "Oferecido inicialmente como tributo [overlord_scope.Custom('ES_AlAla')] [overlord_scope.GetTitledFirstName|l] por [tributary_scope.Custom('ES_ElLa')] [tributary_scope.GetTitledFirstName|l], este belo conjunto de [Glossary( 'bunga mas', 'BUNGA_MAS_GLOSS' )] capta a luz de maneira espetacular."
 tribute_mission_famed_bunga_mas_desc: "Duas árvores requintadas de ouro e prata, estas [Glossary( 'bunga mas', 'BUNGA_MAS_GLOSS' )] foram oferecidas como tributo [overlord_scope.Custom('ES_AlAla')] [overlord_scope.GetTitledFirstName|l] por parte [tributary_scope.Custom('ES_DelDela')] [tributary_scope.GetTitledFirstName|l]. A ourivesaria e as gravuras nos contam a história de uma excelente arte artesanal."
 tribute_mission_illustrious_bunga_mas_desc: "Oferecido como tributo [overlord_scope.Custom('ES_AlAla')] [overlord_scope.GetTitledFirstName|l] por [tributary_scope.Custom('ES_ElLa')] [tributary_scope.GetTitledFirstName|l], o [Glossary( 'bunga mas', 'BUNGA_MAS_GLOSS' )] consiste em um conjunto magnífico de árvores de ouro e prata, forjadas meticulosamente e esculpidas com os melhores metais; flores capturadas como flores perpétuas."
