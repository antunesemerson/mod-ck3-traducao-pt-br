 tribute_mission.1010.intro.attendant: "O atendente pondera por mais alguns instantes antes de parecer tomar uma decisĂŁo."
 tribute_mission.1010.intro: "[receiving_character.Custom('ES_ElLa')|U] [receiving_character.GetTitledFirstName|l] avalia meu tributo de cima a baixo antes de, ao que parece, chegar a uma decisĂŁo."
 tribute_mission.1010.intro.postseal: "Ao tĂ©rmino da cerimĂ´nia solene e legal do $game_concept_seal_of_investiture$ brota a opulenta riqueza de [overlord_scope.GetPrimaryTitle.GetDefinitiveNameNoTooltip]."
 tribute_mission.1010.segway: "\n\nEnquanto se dirige para o fundo da sala,"
 tribute_mission.1010.desc.treasury: "$tribute_mission.1010.segway$ uma profusĂŁo de recipientes carregados com tecidos preciosos, lingotes e especiarias de origem dos [overlord_scope.GetCulture.GetCollectiveNounNoTooltip] Ă© exibida em uma demonstraĂ§ĂŁo de esplendor."
 tribute_mission.1010.desc.artifact: "$tribute_mission.1010.segway$ um artefato precioso para os [overlord_scope.GetCulture.GetCollectiveNounNoTooltip] , [tribute_reward_type_artifact.GetName], Ă© apresentado a mim sobre uma almofada de veludo, o que realĂ§a seu esplendor."
 tribute_mission.1010.desc.innovation: "$tribute_mission.1010.segway$ um grupo de monges se aproxima de nĂłs, entregando-nos um punhado de pergaminhos contendo novos fatos e revelaĂ§Ăµes relativas Ă s suas inovaĂ§Ăµes."
 tribute_mission.1010.desc.development: "$tribute_mission.1010.segway$ um servo erudito se aproxima a nĂłs, apresentando-me um contrato.\nNo contrato, detalha-se um acordo comercial para que os [overlord_scope.GetCulture.GetCollectiveNounNoTooltip] estabeleĂ§am postos comerciais em [tributary_scope.GetCapitalLocation.GetTitle.GetBaseNameNoTierNoTooltip] que contribuam para o desenvolvimento e a riqueza geral da regiĂŁo."
 tribute_mission.1010.desc.monk: "$tribute_mission.1010.segway$ aparece [new_monk.Custom('GetArticledAgeDescriptionGender')] e se apresenta como [new_monk.Custom('ES_ElLa')] [new_monk.GetTitledFirstName|l], monj[new_monk.Custom('ES_EA')] da fĂ© [overlord_scope.GetFaith.GetAdjectiveNoTooltip]. Me informa alegremente de sua intenĂ§ĂŁo de viajar comigo atĂ© [tributary_scope.GetCapitalLocation.GetTitle.GetBaseNameNoTierNoTooltip] para oferecer seus serviĂ§os."
 tribute_mission.1010.desc.legitimacy: "\n\nEle me faz sinal para que eu me aproxime e entĂŁo, com graĂ§a majestosa, desce lentamente atĂ© mim. Inclino a cabeĂ§a quando [overlord_scope.Custom('ES_ElLa')] [overlord_scope.GetTitleAsNameNoTooltip|l] realiza os gestos cerimoniais [overlord_scope.GetCulture.GetCollectiveNounNoTooltip].\n\nQuando termina, proclama com voz imponente: "Por meio desta, reafirmo sua autoridade como governante de [tributary_scope.GetCapitalLocation.GetCounty.GetName]. Pode ir em paz"."
 tribute_mission.1010.outro: "\n\n"Considerai-vos agraciado com a graĂ§a de [overlord_scope.GetCapitalLocation.GetTitle.GetBaseNameNoTierNoTooltip], meu [tributary_scope.GetTitleAsNameNoTooltip|l]. Boa viagem.""
 tribute_mission.1010.a: "Bendit[new_monk.Custom('ES_OA')] sejais!"
