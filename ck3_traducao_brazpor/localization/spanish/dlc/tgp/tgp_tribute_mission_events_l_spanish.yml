 #Tributary: Courtier slated for castration escapes
 tribute_mission.9760.t: "$tribute_mission_header$ a fuga"
 tribute_mission.9760.desc.vengeful: "El caos en el exterior al final me saca de mi sueĂ±o profundo. Apenas despiert[ROOT.Char.Custom('ES_OA')], escucho sin ganas y por fin consigo dar sentido a los gritos fragmentados. #EMP Â«â€¦ Âˇel tributo ha escapado! ÂˇBuscad[escapee_eunuch.GetHerHim]!Â»,#! cuando una silueta oscura aparece en mi umbral.\n\nÂ«#EMP [escapee_eunuch.GetFaith.HighGodName], perdonad mi pecadoÂ»,#! aĂşlla nuestro tributo humano, [escapee_eunuch.Custom('ES_ElLa')] [escapee_eunuch.GetTitledFirstName|l], mientras se lanza hacia mĂ­.\n\nRuedo fuera del lecho mientras evito por poco el primer golpe y, de repente, nos encontramos de pie, dando vueltas [Select_CString(And(ROOT.Char.IsFemale, escapee_eunuch.IsFemale), 'una', 'uno')] en torno [Select_CString(And(ROOT.Char.IsFemale, escapee_eunuch.IsFemale), 'a la otra', 'al otro')]."
 tribute_mission.9760.desc: "Despierto inexplicablemente por un instante. En mi sopor, miro en torno a mi tienda, solo para ver una sombra que pasa por las alas de la entrada. Temblando con el frĂ­o aire de la noche, salgo de mi yacija y echo un vistazo fuera.\n\nPara mi sorpresa, me topo nada menos que con nuestro tributo humano, [escapee_eunuch.Custom('ES_ElLa')] [escapee_eunuch.GetTitledFirstName|l], quien, de algĂşn modo, ha conseguido escapar de sus asistentes.\n\nSus ojos se agradan del miedo cuando se da cuenta de mi presencia. \"ÂˇMi [escapee_eunuch.Custom2('RelationToMe', ROOT.Char )], por favorâ€¦ No puedo seguir con esto. Por favorÂ», suplica, list[escapee_eunuch.Custom('ES_OA')] para echar a correr hacia la noche."
 tribute_mission.9760.a: "#EMP VocĂŞ verĂˇ!#!."
 tribute_mission.9760.a.success: "Foi dominado por [escapee_eunuch.GetShortUIName]"
 tribute_mission.9760.a.success.tt: "[escapee_eunuch.GetShortUIName] estĂˇ subjugado[escapee_eunuch.Custom('ES_OA')] e a [tribute_mission|lE] continua"
 tribute_mission.9760.a.failure: "[escapee_eunuch.GetShortUIName] escapa e tenta se vingar"
 tribute_mission.9760.b: ""#EMP Guardias!#!""
 tribute_mission.9760.b.success: "$tribute_mission.9760.a.success$"
 tribute_mission.9760.b.failure: "[escapee_eunuch.GetShortUIName] escapa"
 tribute_mission.9760.b.critical_failure: "[escapee_eunuch.GetShortUIName] Ă© morto no processo"
 tribute_mission.9760.c: ""VocĂŞ estĂˇ livre para ir. SĂł #EMP Marchaos#! sem mais!"."
 #Somehow your Tribute Mission invalidated, refund and return home
 tribute_mission.9800.t: "$tribute_mission_header$ mudanĂ§a de planos"
 tribute_mission.9800.desc.suzerain_turned_liege: "Parece que minhas obrigaĂ§Ăµes de tributo mudaram agora que sou vassal[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetLiege.Custom('ES_DelDela')] [ROOT.Char.GetLiege.GetTitledFirstName|l].\n\nCom isso, hĂˇ muitos outros assuntos dos quais cuidar em casa, e pagar tributo jĂˇ nĂŁo Ă© um deles. Que reviravolta!"
 tribute_mission.9800.desc.no_longer_tributary: "Que reviravolta! Recebo a notĂ­cia de que nĂŁo estamos mais acorrentados ao jugo do tributo!\n\nHĂˇ tantos assuntos e questĂµes a tratar em casaâ€¦ entre os quais lidar com esta nova independĂŞncia Ă© o tema principal."
 tribute_mission.9800.desc.different_end_location: "Com a mudanĂ§a de soberania, parece que [current_overlord.Custom('ES_ElLa')] [current_overlord.GetTitledFirstName|l] tem sua capital em uma localizaĂ§ĂŁo diferente.\n\nNossa viagem e tributo estavam programados para [old_overlord.Custom('ES_ElLa')] [old_overlord.GetTitledFirstName|l], de modo que meus conselheiros insistem que a decisĂŁo mais prudente Ă© voltar para [ROOT.Char.GetCapitalLocation.GetName] e se reagrupar."
 tribute_mission.9800.desc.unable_to_accept_tribute: "Os murmĂşrios da estrada me informam de que nosso novo suserano nĂŁo parece estar interessado no tipo de tributo que eu iria apresentar.\n\nPrefiro nĂŁo correr o risco de irritar nossa alteza, entĂŁo o mais prudente serĂˇ nos reagruparmos de volta em [ROOT.Char.GetCapitalLocation.GetName]."
 tribute_mission.9800.a: "Vamos voltar para casa enquanto isso."
