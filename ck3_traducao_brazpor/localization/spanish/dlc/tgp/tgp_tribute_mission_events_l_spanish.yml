 tribute_mission.1002.t: "$tribute_mission_header$ o destino que nos aguarda"
 tribute_mission.1002.segway: "[tributary_scope.Custom('ES_ElLa')|U] [tributary_scope.GetTitledFirstName|l] entra no grande salĂŁo com sua comitiva, ansios[tributary_scope.Custom('ES_OA')] por apresentar seu tributo."
 tribute_mission.1002.desc.concubine: "[Select_CString(human_tribute.IsFemale, 'Uma concubina sedutora', 'Um concubino sedutor' )] a quem, ao que parece, se apresenta como [human_tribute.Custom('ES_ElLa')] [human_tribute.GetTitledFirstName|l]."
 tribute_mission.1002.desc.new_eunuch: "[Select_CString(human_tribute.IsFemale, 'Una castrada incĂłmoda', 'Un eunuco incĂłmodo' )] al parecer.\n\nPresentad[human_tribute.Custom('ES_OA')] como [human_tribute.Custom('ES_ElLa')] [human_tribute.GetTitledFirstName|l], se estremece notablemente mientras avanza a trompicones hacia mĂ­ para una inspecciĂłn de cerca."
 tribute_mission.1002.desc.eunuch: "[Select_CString(human_tribute.IsFemale, 'Una castrada ducha', 'Un eunuco avezado' )], al parecer.\n\nPresentad[human_tribute.Custom('ES_OA')] como [human_tribute.Custom('ES_ElLa')] [human_tribute.GetTitledFirstName|l], exuda una paz y calma superiores a sus aĂ±os y me observa en silencio mientras yo inspecciono su persona."
 tribute_mission.1002.beauty.concubine.good: "\n\nSeu cabelo brilhante, pele clara, olhos cintilantes e corpo de forma agradĂˇvel... Eu deleito meus olhos em sua figura, sem me saciar por completo ainda."
 tribute_mission.1002.beauty.concubine.bad: "\n\nCabelo emaranhado, pele cheia de espinhas..., o Ă˘ngulo da mandĂ­bula. NĂŁo hĂˇ muitas qualidades redentoras em relaĂ§ĂŁo ao visual de [human_tribute.GetHerHim] salvam em questĂŁo de aparĂŞncia. Frunzo os lĂˇbios levemente."
 tribute_mission.1002.physique.concubine.good: "\n\nO fĂ­sico impressionante d[human_tribute.Custom('ES_EA')] [human_tribute.GetWomanMan] faz com que eu me sinta mais saudĂˇ[ROOT.Char.Custom('ES_OA')] com sĂł de olhar[human_tribute.GetHerHim]. Acabo gostando bastante disso."
 tribute_mission.1002.physique.concubine.bad: "\n\nEsse pigarro constante, os braĂ§os finos demaisâ€¦ parece que hĂˇ algo estranho em seu fĂ­sico, mas Ă© difĂ­cil apontar exatamente o quĂŞ. Isso me deixa ligeiramente incomod[ROOT.Char.Custom('ES_OA')]."
 tribute_mission.1002.exterior.plain: "\n\nSeu aspecto nĂŁo tem nada de extraordinĂˇrio, mas o brilho em seu olhar ainda me intriga."
 tribute_mission.1002.personality.shy: "\n\n[human_tribute.GetSheHe|U] se encolhe quando um par de guardas passa ao seu lado, perto demais. Tentando ocupar o mĂ­nimo de espaĂ§o possĂ­vel, abaixa levemente os ombros, fazendo o mĂ­nimo de barulho possĂ­vel."
 tribute_mission.1002.personality.bold: "\n\nUma postura vigorosa indica que est[human_tribute.Custom('ES_EA')] [human_tribute.GetWomanMan] Ă© capaz de manter sua posiĂ§ĂŁo, para o bem ou para o mal."
 tribute_mission.1002.personality.cynical: "\n\nUm tremor no canto do olho, enquanto os braĂ§os assumem uma postura defensiva, indica que este[human_tribute.Custom('ES_EA')] [human_tribute.GetWomanMan] tem uma visĂŁo muito particular do mundo."
 tribute_mission.1002.personality.angry: "\n\nUma ruga cada vez mais profunda entre as sobrancelhas conta a histĂłria de um[human_tribute.Custom('ES_XA')] [human_tribute.GetWomanMan] muito teimos[human_tribute.Custom('ES_OA')] oso."
 tribute_mission.1002.personality.fallback: "\n\n[human_tribute.GetFirstNameNoTooltip] dirige os olhos na minha direĂ§ĂŁo, depois percorre a sala com o olhar para entĂŁo voltar para mim, como se procurasse pistas para resolver um enigma."
 tribute_mission.1002.a: ""Provavelmente se mostrarĂˇ Ăştil em alguma parte da corte"."
 tribute_mission.1002.b: ""Bem, deverĂ­amos nomear vocĂŞs #EMP de inmediatoâ€¦#!""
 tribute_mission.1002.b.flavor: "Mas que um #EMP hermoso ejemplar#!â€¦"
 tribute_mission.1002.c: ""VocĂŞs trabalharĂŁo diretamente para mim"."
 tribute_mission.1002.d: ""Hum, creio que estamos todos satisfeitos no momento"."
 tribute_mission.1002.d.tt: "Ă‰ enviado de volta a [human_tribute.GetShortUIName] para [tributary_scope.GetCapitalLocation.GetTitle.GetBaseNameNoTier]"
 #Recipient: What do you get/give?
 tribute_mission.1005.t: "$tribute_mission_header$ o tributo"
 tribute_mission.1005.t.ai.bunga_mas: "$tribute_mission_header$ [newly_created_bunga_mas.GetNameNoTooltip]"
 tribute_mission.1005.t.bunga_mas: "$tribute_mission_header$ flores de ouro [tributary_scope.Custom('ES_DelDela')] [tributary_scope.GetTitledFirstNameNoTooltip|ll]"
 tribute_mission.1005.t.gold: "$tribute_mission_header$ o ouro [tributary_scope.Custom('ES_DelDela')] [tributary_scope.GetTitledFirstNameNoTooltip|l]"
 tribute_mission.1005.t.herd: "$tribute_mission_header$ a manada de [tributary_scope.Custom('ES_DelDela')] [tributary_scope.GetTitledFirstNameNoTooltip|l]"
 tribute_mission.1005.t.concubine: "$tribute_mission_header$ as flores [tributary_scope.Custom('ES_DelDela')] [tributary_scope.GetTitledFirstNameNoTooltip|l]"
 tribute_mission.1005.t.eunuch: "$tribute_mission_header$ o engenho [tributary_scope.Custom('ES_DelDela')] [tributary_scope.GetTitledFirstNameNoTooltip|l]"
 tribute_mission.1005.t.artifact: "$tribute_mission_header$ os artefatos [tributary_scope.Custom('ES_DelDela')] [tributary_scope.GetTitledFirstNameNoTooltip|l]"
 tribute_mission.1005.intro.human_tribute: "[tributary_scope.Custom('ES_ElLa')|U] [tributary_scope.GetTitledFirstNameNoTooltip|l] comeĂ§a a mudar o peso de um pĂ© para o outro enquanto aguarda minha decisĂŁo, lanĂ§ando olhares de soslaio de vez em quando [human_tribute.Custom('ES_AlAla')] [human_tribute.GetTitledFirstName|l]."
 tribute_mission.1005.intro: "[tributary_scope.Custom('ES_ElLa')|U] [tributary_scope.GetTitledFirstName|l] entra aos trancos no grande salĂŁo, aproxima-se de mim como se nada fosse e me apresenta seu tributo com um sorriso bajulador:"
 tribute_mission.1005.desc.bunga_mas: "\n\nUma Ăˇrvore de flores douradas! Este artefato requintado se ergue sobre o restante do tributo, Ă­nfimo em comparaĂ§ĂŁo. Algumas folhinhas captam a luz e parecem emitir um brilho sĂł comparĂˇvel ao meu.\n\nMe recomponho rapidamente, tentando nĂŁo demonstrar demais, enquanto me pergunto que benevolĂŞncia devo conceder em troca deste magnĂ­fico presenteâ€¦"
 tribute_mission.1005.desc.small_gold: "\n\nErgo uma sobrancelha quando os servos examinam o punhado de moedas e ornamentos que constituem este tributo menor.\n\nNĂŁo encherĂŁo nossos cofres, mas ao menos [tributary_scope.Custom('ES_ElLa')] [tributary_scope.GetTitledFirstNameNoTooltip|l] cumpriu suas obrigaĂ§Ăµes de vassalo. Agora, que benevolĂŞncia devo conceder em trocaâ€¦"
 tribute_mission.1005.desc.adequate_gold: "\n\nInclino levemente a cabeĂ§a diante do tributo respeitĂˇvel; os metais preciosos e os tecidos captam a luz de vez em quando, cintilando sutilmente.\n\nAgora vamos ao prĂłximo assunto: que benevolĂŞncia devo conceder em trocaâ€¦"
 tribute_mission.1005.desc.excessive_gold: "\n\nOuro, tecidos, pedras preciosasâ€¦ Uma exibiĂ§ĂŁo de desperdĂ­cio chamativo, mas #EMP deliciosa#! me saĂşda. Controlo cuidadosamente minha expressĂŁo, tentando nĂŁo parecer impressionado[ROOT.Char.Custom('ES_OA')] demais.\n\n Isto ficarĂˇ muito bem. Agora, como recompensar esta demonstraĂ§ĂŁo de opulĂŞnciaâ€¦"
 tribute_mission.1005.desc.small_herd: "\n\nUma pequena quantidade de animais balem e olham com apreensĂŁo enquanto os servos os examinam.\n\nNĂŁo Ă© muito, mas ao menos [tributary_scope.Custom('ES_ElLa')] [tributary_scope.GetTitledFirstNameNoTooltip|l] cumpriu com suas obrigaĂ§Ăµes tributĂˇrias. Agora, que benevolĂŞncia devo conceder-lhe em trocaâ€¦"
 tribute_mission.1005.desc.adequate_herd: "\n\nAnimais de qualidade respeitĂˇvel olham curiosamente ao redor da sala enquanto sĂŁo examinados pelos meus servos.\n\nSerĂŁo uma boa adiĂ§ĂŁo. Agora, como recompensar istoâ€¦"
 tribute_mission.1005.desc.excessive_herd: "\n\nAlguns dos animais mais imaculados que jĂˇ vi me sĂŁo apresentados como tributo: pelagem reluzente, olhos brilhantesâ€¦ e hĂˇ ainda mais esperando lĂˇ fora. Um tributo certamente impressionante.\n\nAgora, como recompensar este despliegue de opulĂŞnciaâ€¦"
 tribute_mission.1005.desc.rejected_concubine: "\n\nUm espĂ©cime desprezĂ­vel, cerro os lĂˇbios ao voltar a pousar o olhar sobre o que chamam de tributo. E [tributary_scope.Custom('ES_ElLa')] [tributary_scope.GetTitledFirstNameNoTooltip|l] [human_tribute.GetHerHim] considera dign[human_tribute.Custom('ES_OA')] de nossa atenĂ§ĂŁo. #EMP Puf.#!\n\nAgora, o que deveria conceder a [tributary_scope.Custom('ES_AlAla')] [tributary_scope.GetTitledFirstNameNoTooltip|l]â€¦"
 tribute_mission.1005.desc.appointed_concubine: "\n\nMinha mente vagueia um pouco enquanto me detenho com timidez nas curvas e #EMP atributos#!.\n\nEnquanto o sangue sobe Ă s minhas faces, forĂ§o-me a me concentrar no assunto em questĂŁoâ€¦ O que eu deveria conceder [tributary_scope.Custom('ES_AlAla')] [tributary_scope.GetTitledFirstNameNoTooltip|l] por nos trazer este #EMP delicioso#! tributo?"
 tribute_mission.1005.desc.concubine: "\n\nDespuĂ©s de aĂ±adir[human_tribute.GetHerHim] a nuestra corte, seguramente sea mĂˇs Ăştil en otros lugares.\n\nA la vista de esta situaciĂłn, he de decidir quĂ© concederle [tributary_scope.Custom('ES_AlAla')] [tributary_scope.GetTitledFirstNameNoTooltip|l]â€¦"
 tribute_mission.1005.desc.rejected_eunuch: "$tribute_mission.1005.desc.rejected_concubine$"
 tribute_mission.1005.desc.appointed_eunuch: "\n\n[human_tribute.GetSheHe] me servirĂˇ bem como meu [Select_CString(human_tribute.IsFemale, 'nueva eunuca jefa', 'nuevo eunuco jefe' )].\n\nEsboĂ§o um leve sorriso de superioridade enquanto reflito cuidadosamente sobre o que conceder a [tributary_scope.Custom('ES_AlAla')] [tributary_scope.GetTitledFirstNameNoTooltip|l]â€¦"
 tribute_mission.1005.desc.eunuch: "$tribute_mission.1005.desc.concubine$"
 tribute_mission.1005.desc.artifact: "\n\n[artifact_to_tribute.GetName|U] Ă© um tributo bonito, e passo cuidadosamente a mĂŁo ao longo de sua borda. Uma peĂ§a sĂłlida, sem dĂşvida.\n\nAgora, como devo responder a istoâ€¦"
 tribute_mission.1005.desc: "\n\nRefletindo cuidadosamente sobre o tributo apresentado.\n\nAgora, como devo responder a istoâ€¦"
 tribute_mission.1005.treasury: ""Recompensemos vosso tributo com valiosas mercadorias comerciais"."
 tribute_mission.1005.artifact: ""Concederei a voc? rel?quias dos [overlord_scope.GetCulture.GetCollectiveNounNoTooltip].""
 tribute_mission.1005.artifact.tt: "VocĂŞ presenteia [tributary_scope.GetShortUINameNoTooltip] um [artifact|lE] dos [overlord_scope.GetCulture.GetCollectiveNounNoTooltip]"
 tribute_mission.1005.innovation: ""Temos alguns avanĂ§os tecnolĂłgicos que podemos compartilharâ€¦"."
 tribute_mission.1005.innovation.tt: "VocĂŞ recompensa [tributary_scope.GetShortUINameNoTooltip] com alguns avanĂ§os tecnolĂłgicos"
 tribute_mission.1005.development: ""Estabeleceremos um maravilhoso posto comercial em sua capital"."
 tribute_mission.1005.monk: ""Um dos meus monges mais sĂˇbios o guiarĂˇ"."
