 tribute_mission_tributary_subject_standing_gain_title: "Ganho [tributary_scope.Custom('SubjectStanding')] [ConcatIfNeitherEmpty(GetPlayer.Custom('SubjectStandingIcon'),' ')]"
 tribute_mission_tributary_subject_standing_gain_tt_minor: "[tributary_scope.GetShortUIName|U] [Select_CString(tributary_scope.IsLocalPlayer, 'ganaste', 'ganó')] algum de [tributary_scope.Custom('SubjectStanding')|l] [ConcatIfNeitherEmpty(tributary_scope.Custom('SubjectStandingIcon'),' ')]"
