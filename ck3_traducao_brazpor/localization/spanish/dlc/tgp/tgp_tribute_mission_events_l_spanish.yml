 tribute_mission.9010.opening: "[recipient.Custom2('AppropriateGreeting', ROOT.Char )]"
 tribute_mission.9010.desc: "Claro que concederemos ao meu [actor.GetTitleAsNameNoTooltip|l] com o tributo mais requintado!\n\nNossa jornada comeĂ§a; e nosso destino Ă© [actor.GetCapitalLocation.GetName]."
