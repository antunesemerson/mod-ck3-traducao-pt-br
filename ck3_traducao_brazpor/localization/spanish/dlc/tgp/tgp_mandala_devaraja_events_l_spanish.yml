l_spanish:
 devaraja.0001.title: "Caridade saudável"
 devaraja.0001.desc: "[diseased_county_scope.GetName] pide ayuda ante la enfermedad que atormenta a su pueblo. Si hay algún lugar del señorío que clama caridad, este es. Pero mientras inspecciono el terreno en busca de un lugar de curación, se me acerca el ejemplar más desdichado posible de campesin[diseased_peasant.Custom('ES_OA')]. En una flagrante infracción del protocolo, se pone de rodillas y suplica mi ayuda.\n\nComo #italic devaraja#!, se supone que tengo que elevar a todos mis súbditos, pero ¿puede ser... #italic est[diseased_peasant.Custom('ES_EA')]#! a quien he de salvar?"
 devaraja.0001.a: "Devo ajudar neste momento difícil, não importa o quão miseráveis sejam essas pessoas."
 devaraja.0001.b: "Deixarei esta tarefa a meu [steward.GetCouncilTitle|l]; [steward.GetFirstNameNoTooltip] para que supervisione este trabalho."
 devaraja.0001.c: "Agh! Este lugar imundo não é digno de receber a caridade divina."
 healed_by_the_devaraja: "Curados pelo devaraja"
 devaraja.0002.title: "Orações para o deus-rei"
 devaraja.0002.desc.brahmin: "Cuando mi [GetCourtPositionType('court_brahmin_court_position').GetName|l], [brahmin_or_chaplain.GetName], concluye los asuntos oficiales del día, empieza a bendecir a la corte con versículos del #italic Anumodana#!, el cántico estándar para cerrar el día.\n\n#italic Igual que los ríos repletos de agua llenan el océano,#!\n#italic hasta lo concedido aquí beneficia a los muertos famélicos…#!\n\nDe repente, una cuestión surge en mi cabeza. ¿Osaré romper la etiqueta?"
 devaraja.0002.desc.chaplain: "Cuando mi [ROOT.Char.GetCouncillorPosition( 'councillor_court_chaplain' ).GetPositionName|l], [brahmin_or_chaplain.GetName|l], concluye los asuntos oficiales del día, empieza a bendecir a la corte con versículos del #italic Anumodana#!, el cántico estándar para cerrar el día.\n\n#italic Igual que los ríos repletos de agua llenan el océano,#!\n#italic hasta lo concedido aquí beneficia a los muertos famélicos…#!\n\nDe repente, una cuestión surge en mi cabeza. ¿Osaré romper la etiqueta?"
 devaraja.0002.a: ""Por que os mortos merecem tal mérito?""
 devaraja.0002.a.tt.success: "A última linha é habilmente alterada para elogiar você em vez disso"
 devaraja.0002.a.tt.failure: "Sua interrupção deixou todo o ritual constrangedor"
 devaraja.0002.b.tt: "A [brahmin_or_chaplain.GetFirstNameNoTooltip] se sente aliviado(a) que o ritual tenha saído como previsto"
 devaraja.0002.b: "Não deixe que os pensamentos intrusivos vençam!"
 devaraja.0002.c: "Interromper com uma última fala melhor."
 devaraja.0002.c.tt.success: "Seu engenho e conhecimento criam na hora um verso final melhor improvisado"
 devaraja.0002.c.quote.success: ""Até mesmo tudo o que é concedido aqui beneficia o #italic rey#!"" # ROOT could be something else, a duke or a queen, but 'king' still works as a generic stand-in for the ruler, and actually rhymes in Pali.
 devaraja.0002.b.tt.failure: "Você balbucia versos fracos depois de interromper [brahmin_or_chaplain.GetFirstNameNoTooltip]."
 devaraja.0003.title: "Uma conversa especial sobre o dharma"
 devaraja.0003.desc.guru: "De vez em cuando se espera do [GetCourtPositionType('court_guru_court_position').GetName|l] que faça uma palestra sobre o conceito de #italic dharma#! no palácio. Costuma ser um evento longo, estruturado e repleto de cânticos e formalidades, acompanhado por uma generosa oferenda ao orador em reconhecimento por seus esforços. Hoje, porém, [guru_or_chaplain.GetName] parece um tanto cansad[guru_or_chaplain.Custom('ES_OA')].\n\nDiante da audiência real, ele simplesmente declara: "[ROOT.Char.Custom('ES_ElLa')|U] [ROOT.Char.GetTitleTierName|l] já sabe tudo o que há para saber". Com isso, [guru_or_chaplain.GetFirstNameNoTooltip] entoa os trechos habituais para encerrar a palestra e retorna ao seu assento."
 devaraja.0003.desc.chaplain: "De vez em quando se espera que o [ROOT.Char.GetCouncillorPosition( 'councillor_court_chaplain' ).GetPositionName|l] dê uma palestra sobre o conceito de #italic dharma#! no palácio. Geralmente é um evento longo, estruturado e repleto de cânticos e formalidades, acompanhado de uma generosa oferta ao orador em reconhecimento por seus esforços. Hoje, porém, [guru_or_chaplain.GetName] parece um tanto cansad[guru_or_chaplain.Custom('ES_OA')].\n\nDiante da audiência real, ele simplesmente declara: "[ROOT.Char.Custom('ES_ElLa')|U] [ROOT.Char.GetTitleTierName|l] já sabe tudo o que há para saber". Com isso, [guru_or_chaplain.GetFirstNameNoTooltip] entoa os trechos habituais para encerrar a palestra e retorna ao seu assento."
 devaraja.0003.a: "¡Ja, bien hecho! Dadle su recompensa."
 devaraja.0003.b: "Muito esperto[guru_or_chaplain.Custom('ES_OA')]! Mas eu só recompenso o esforço."
 devaraja.0003.c: "Eu não recompenso a preguiça! Guardas, capturem[guru_or_chaplain.GetHerHim]!"
 devaraja.0003.d: "Chamem novamente [guru_or_chaplain.GetFirstNameNoTooltip]; eu #italic le#! perguntarei sobre o #italic dharma#!."
 devaraja.0003.d.tt.success: "Impressiona [guru_or_chaplain.GetFirstNameNoTooltip] e seus cortesãos com seu conhecimento do #italic dharma#!"
 devaraja.0003.d.tt.failure: "Você passa vergonha na frente de [guru_or_chaplain.GetFirstNameNoTooltip] e de seus cortesãos ao demonstrar que não compreende o #italic dharma#!"
 devaraja.0004.title: "Eu adoro um desfile"
 devaraja.0004.desc: "La ciudad de [capital_county.GetName] ha quedado marcada con las contiendas del pasado, arrasada por espadas y tormentas por igual a lo largo de los años. Además de mejoras materiales, precisa que hagamos algo para mejorar el espíritu del pueblo.\n\n¿No sería bonito tener un desfile de barcazas por la capital al final de la temporada de lluvias? Podríamos tener setenta y seis intérpretes tocando en la embarcación de cabeza, con ciento diez tamborileros cerca. ¡Y, para rellenar el desfile, pediríamos a todos los monasterios que paguen para decorar una barcaza!"
 devaraja.0004.a: "O povo vai se arrepiar quando os barcos passarem!"
 devaraja.0004.b: "Pedir ouro aos mosteiros neste momento não é auspicioso."
 devaraja.0004.b.tt: "Será notado se voltarmos atrás nessa ideia agora."
 devaraja.0004.c: "A procissão seguirá adiante — sem envolvimento monástico."
 devaraja_hosts_parade: "O grande desfile do devaraja"
 devaraja.0005.title: "O muro com dois rostos"
 devaraja.0005.desc: "Os novos edifícios do templo precisam de adornos, elementos artísticos que reflitam o divino e o poderoso. Ao refletir o aspecto [ROOT.Char.Custom('GetAspectNoun')] divino da nossa casa justa, podemos garantir que os afrescos e esculturas deste novo local apresentem visões dos deuses de [ROOT.Char.Custom('GetAspectNoun')]; ou representações da casa [ROOT.Char.GetHouse.GetName] que aumentem meu próprio prestígio."
 devaraja.0005.a: "Este lugar será consagrado aos deuses."
 devaraja.0005.b: "Este lugar será consagrado para o meu esplendor."
 devaraja.0006.title: "A sabedoria do remo"
 devaraja.0006.desc.guru: "A mi [GetCourtPositionType('court_guru_court_position').GetName|l], [guru_or_chaplain.GetName], se le ha visto remar en un botecito en los estaques que rodean el palacio. Deleitándome con mis cortesanos, hago llamar al gurú navegante desde el otro lado del agua. «¡Sois mi [GetCourtPositionType('court_guru_court_position').GetNameNoTooltip|l]! ¿No sentís ningún respeto por el alto cargo que poseéis? ¿Cómo podéis remar en un bote como si fuerais un vulgar pescador?».\n\nTras un momento de pausa, [guru_or_chaplain.GetFirstNameNoTooltip] responde: «Cuando [ROOT.Char.Custom('ES_ElLa')|l] [ROOT.Char.GetTitleTierName] del país disfruta en público del vicio, los [GetCourtPositionType('court_guru_court_position').GetNameNoTooltip|l]s pueden remar en botes»."
 devaraja.0006.desc.chaplain: "A mi [ROOT.Char.GetCouncillorPosition( 'councillor_court_chaplain' ).GetPositionName|l], [guru_or_chaplain.GetName], se le ha visto remar en un botecito en los estaques que rodean el palacio. Deleitándome con mis cortesanos, hago llamar al gurú navegante desde el otro lado del agua. «¡Sois mi [GetCourtPositionType('court_guru_court_position').GetNameNoTooltip|l]! ¿No sentís ningún respeto por el alto cargo que poseéis? ¿Cómo podéis remar en un bote como si fuerais un vulgar pescador?».\n\nTras un momento de pausa, [guru_or_chaplain.GetFirstNameNoTooltip] responde: «Cuando [ROOT.Char.Custom('ES_ElLa')|l] [ROOT.Char.GetTitleTierName] del país disfruta en público del vicio, los [ROOT.Char.GetCouncillorPosition( 'councillor_court_chaplain' ).GetPositionName|l]s pueden remar en botes»."
 devaraja.0006.a: "Talvez eu devesse ser mais discreto[ROOT.Char.Custom('ES_OA')] em público."
 devaraja.0006.b: "Que ridículo! As festas continuarão enquanto eu quiser."
 devaraja.0006.c: "Isso é um insulto! Privem [guru_or_chaplain.GetFirstNameNoTooltip] de seus títulos."
 devaraja.0006.d: "Talvez eu devesse parar de beber de vez."
 devaraja.0007.title: "Ambiguidade inequívoca"
 devaraja.0007.desc: "#italic Devaraja#! es un concepto delicado; por supuesto, soy un[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleTierName], pero también me asocio con la divinidad de [ROOT.Char.Custom('GetAspectNoun')]. ¿Soy lo mismo que un dios? Ah, esa es la cuestión delicada; una que requiere ambigüedad para ser divinidad por unos y rey para otros. \n\nO sería una cuestión delicada y ambigua si algunos apologistas parlanchines no me hubieran llamado [Select_CString( ROOT.Char.IsFemale, 'la diosa', 'el dios' )] de [ROOT.Char.Custom('GetAspectNoun')]. Los cortesanos ya andan a la greña, discutiendo sobre qué soy; no me queda más remedio que intervenir."
 devaraja.0007.a: "Sim, meus servos — sou o senhor de [Select_CString( ROOT.Char.IsFemale, 'a senhora', 'o senhor' )] de [ROOT.Char.Custom('GetAspectNoun')]."
 devaraja.0007.b: "Meu povo! Eu apenas sirvo a [ROOT.Char.Custom('GetAspectNoun')l]; não sou seu [Select_CString( ROOT.Char.IsFemale, 'señora', 'señor' )]."
 devaraja.0007.c: "Humanidade e divindade estão unidas em mim em uma existência mística." # DYOPHISITISM LET'S GOOO
 devaraja.0007.c.tt.success: "Você formula um conceito de compromisso que agrada a bastante gente"
 devaraja.0007.c.tt.failure: "Sua incursão na teologia só piorou as coisas"
 devaraja_as_god: "Devaraja divino"
 devaraja_as_king: "Devaraja real"
 devaraja_as_hypostatic_union: "Devaraja de dupla natureza"
 devaraja.0008.title: "Rumores sobre uma conversão no leito de morte"
 devaraja.0008.desc: "[suzerains_missionary.GetNameNoTooltip], misioner[suzerains_missionary.Custom('ES_OA')] [suzerain.Custom('ES_DelDela')] [suzerain.GetTitleTierName|l] [suzerain.GetFirstNameNoTooltip], casi se tropieza al acercarse.\n\n«¡Tengo noticias excelentes!», exclama. «He estado estudiando la historia de vuestra familia y le he preguntado los sirvientes más ancianos lo que recordaban y parece ser que vuestr[deathbed_conversion_ancestor.Custom('ES_OA')] antepasad[deathbed_conversion_ancestor.Custom('ES_OA')], [deathbed_conversion_ancestor.GetName], ¡en realidad se convirtió al [suzerain.GetFaith.GetName|l] justo antes de morir!».\n\n[suzerains_missionary.GetName] me mira con una emoción apenas reprimida. «¡Estáis más cerca de [suzerain.GetFaith.HighGodName] de lo que os creéis!»."
 devaraja.0008.a: "A alma de [deathbed_conversion_ancestor.GetName] era [suzerain.GetFaith.GetAdjective]? Posso acreditar nisso."
 devaraja.0008.a.tt.conversion: "Agora [ROOT.Char.GetName] afirma que seu antepassad[deathbed_conversion_ancestor.Custom('ES_OA')] [deathbed_conversion_ancestor.GetName] se converteu ao [suzerain.GetFaith.GetName|l]"
 devaraja.0008.b: "![deathbed_conversion_ancestor.GetRelationToString( ROOT.Char )] morreu como um(a) [deathbed_conversion_ancestor.GetFaith.GetAdherentName] e sempre será lembrado(a) assim!"
 devaraja.0009.title: "Missionário sem missão"
 devaraja.0009.desc: "Minha adesão a [suzerain.GetFaith.GetName|l] deixou [suzerains_missionary.GetName] sem corte para pregar. Embora esteja radiante com minha mudança de fé, é assaltado pela incerteza sobre o futuro."
 devaraja.0009.a: "[suzerains_missionary.GetName]! Junte-se a mim como meu/minha nov[suzerains_missionary.Custom('ES_OA')] [ROOT.Char.GetCouncillorPosition( 'councillor_court_chaplain' ).GetPositionName|l]!"
 devaraja.0009.a.tt.missionary_now_chaplain: "[ROOT.Char.GetName] nomeou seu missionário[suzerains_missionary.Custom('ES_OA')] [suzerains_missionary.GetName] para o cargo de [ROOT.Char.GetCouncillorPosition( 'councillor_court_chaplain' ).GetPositionName|l]"
 devaraja.0009.b: "[suzerains_missionary.GetName], seu trabalho aqui está feito… Agora #italic marchaos#!."
 devaraja.0010.title: "A fé mais solitária"
 devaraja.0010.desc: "[suzerains_missionary.GetName], com seu coração [suzerains_missionary.GetFaith.GetAdherentName], sente-se abatid[suzerains_missionary.Custom('ES_OA')] pela fé [suzerain.GetFaith.GetAdjective] de seu senhor. Encontra-se em uma encruzilhada; sua fé vacila enquanto aguarda um sinal. Que ele venha de você ou de [suzerains_missionary.GetFaith.DivineRealm] você decide."
 devaraja.0010.a: "[suzerains_missionary.GetName] tomará sua própria decisão no momento que lhe parecer apropriado."
 devaraja.0010.a.tt.unconverted: "A alma [suzerains_missionary.GetFaith.GetAdherentName] de [suzerains_missionary.GetName] continua triste"
 devaraja.0010.a.tt.converts: "[suzerains_missionary.GetName] adota a fé [suzerain.GetFaith.GetAdjective] de [suzerain.GetName]"
 devaraja.0010.b: "Talvez [suzerains_missionary.GetName] encontre um novo propósito em [ROOT.Char.GetFaith.GetName|l]?"
 devaraja.0010.b.tt.success: "[suzerains_missionary.GetName] se converte ao [ROOT.Char.GetFaith.GetName|l]"
 devaraja.0010.b.tt.failure: "O coração de [suzerains_missionary.GetName] continua sendo [suzerains_missionary.GetFaith.GetAdherentName]"
 fervor_gain_deathbed_conversion_discovered: "Conversão no leito de morte descoberta"
 fervor_gain_faith_reaffirmed: "Fé do antepassado reafirmada"
