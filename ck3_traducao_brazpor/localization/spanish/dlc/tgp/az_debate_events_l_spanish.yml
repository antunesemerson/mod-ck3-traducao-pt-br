l_spanish:
 az_debate.0001.t: "Um discípulo que vale a pena conquistar"
 az_debate.0001.desc: "Do outro lado do salão, [rival_elder.Custom2('MyCharacterIntroduction', ROOT.Char)] se inclina na direção de [disciple_candidate.Custom2('MyCharacterIntroduction', ROOT.Char)]. “Sob minha orientação, disciplina e lealdade são os pilares da verdadeira maestria”, proclama [rival_elder.Custom('ES_ElLa')] [rival_elder.GetTitledFirstNameNoTooltip|l] com uma voz carregada de orgulho.\n\n“Claro, anciã[rival_elder.Custom('ES_OA')]”, responde [disciple_candidate.Custom('ES_ElLa')] [disciple_candidate.GetTitledFirstNameNoTooltip|l], embora seu olhar se desvie para mim. “Mas... e as novas ideias, testadas em disputa aberta?”. Capto o mais tênue sorriso puxando seus lábios. A aspereza em seu tom é um vislumbre de inquietação e, talvez, uma abertura."
 az_debate.0001.a: "[rival_elder.GetHerHim|U] desafiá-lo publicamente."
 az_debate.0001.a.success: "Meu engenho supera o de [rival_elder.GetFirstNameNoTooltip]"
 az_debate.0001.a.failure: "Excedo-me em minhas refutações"
 az_debate.0001.b: "Oferecer mentoria em privado."
 az_debate.0001.b.success: "[disciple_candidate.GetFirstNameNoTooltip] aceita meu convite"
 az_debate.0001.b.failure: "Meus avanços não são bem recebidos"
 az_debate.0001.d: "Melhor deixar isso passar."
 az_debate.0002.t: "Um momento com o ancião"
 az_debate.0002.desc: "A notícia se espalha rapidamente pelo salão: chegou [elder_candidate.Custom2('MyCharacterIntroduction', ROOT.Char)].\n\n\"Não vou me demorar\", diz o Ancião, com voz calma, mas firme.\n\n[audience_rep.GetFirstNameNoTooltip] se inclina para mim e fala com urgência contida: \"Se tem algo a dizer, diga agora, antes que os outros o deixem de lado.\""
 az_debate.0002.a: "Impressionar com um único argumento perfeito."
 az_debate.0002.a.success: "Meu raciocínio acerta em cheio"
 az_debate.0002.a.failure: "Fraquejo"
 az_debate.0002.c: "Vou me assegurar de [elder_candidate.GetSheHe] antes que alguém perceba."
 az_debate.0002.c.success: "Eu me deslizo pela multidão como uma sombra"
 az_debate.0002.c.failure: "Chego a [elder_candidate.GetSheHe] tarde demais"
 az_debate.0002.d: "Deixe o momento passar."
 az_debate.0003.t: "O dilema"
 az_debate.0003.desc: "[disciple_candidate.Custom2('MyCharacterIntroduction', ROOT.Char)|U] da un paso adelante, sus ojos brillan con el desafío. «Si un gobernante debe elegir entre cumplir una promesa que hará daño al señorío o quebrantarla para salvar a su pueblo, ¿cuál es el camino justo?».\n\nNo es una conjetura vana, sino una tentativa para poner a prueba mi valía."
 az_debate.0003.a: ""Sigam-me e eu lhes mostrarei.""
 az_debate.0003.b: ""Ouvi bem: a verdade está nas parábolas e nos provérbios"."
 az_debate.0003.b.success: "A lição fica clara"
 az_debate.0003.b.failure: "O significado escapa"
 az_debate.0003.c: "Que o poder do [my_movement.GetNameNoTooltip] demonstre meu valor."
 az_debate.0003.d: "Encontraremos a resposta no/a [ROOT.Char.GetFaith.ReligiousText|U]."
 az_debate.0004.t: "Um coro de dúvidas"
 az_debate.0004.desc: "Vejo um pequeno grupo reunido em um círculo apertado; seu riso é agudo e desdenhoso. Um[freethinker_friend.Custom('ES_OA')] deles, [freethinker_friend.Custom2('MyCharacterIntroduction', ROOT.Char)], se inclina para mim com um sorriso astuto.\n\n\"Dizei-nos, [ROOT.Char.GetFirstNameNoTooltip], por que motivo qualquer um de nós deveria se curvar diante do vosso movimento? Não temos apreço por estandartes nem paciência para mestres.\""
 az_debate.0004.a: ""A própria razão provará a força do que eu defendo"."
 az_debate.0004.b: ""Vosso engenho é desperdiçado lá fora. Melhor caminhar comigo"."
 az_debate.0004.c: ""Vamos discutir isso com uma bebida de [ROOT.Char.Custom('GetExpensiveDrink')]"."
 az_debate.0004.c.success: "[freethinker_friend.GetFirstNameNoTooltip] se afeiçoa à sua companhia"
 az_debate.0004.c.failure: "A abordagem sutil falha"
 az_debate.0004.d: ""Então, fale livremente e siga seu próprio caminho"."
 az_debate.0005.t: "A última escolha de um ancião"
 az_debate.0005.desc: "[elder_candidate.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se acaricia la barbilla, su mirada va de [rival_candidate.Custom2('MyCharacterIntroduction', ROOT.Char)] a mí.\n\n«Puede que est[rival_candidate.Custom('ES_EA')] sea [Select_CString( rival_candidate.IsFemale, 'la última discípula', 'el último discípulo' )] que tome», dice con gravedad. «¿Podéis convencerme de que os lo merecéis?».\n\n[rival_candidate.GetFirstNameNoTooltip] cruza los brazos, sonriendo. «No perderé esta oportunidad»."
 az_debate.0005.a: "Estou pront[ROOT.Char.Custom('ES_OA')] para provar meu valor."
 az_debate.0005.a.success: "Você impressiona [elder_candidate.GetFirstNameNoTooltip]"
 az_debate.0005.a.failure: "Você não consegue impressionar [elder_candidate.GetFirstNameNoTooltip]"
 az_debate.0005.b: ""Deixe-me trabalhar em seu tratado final"."
 az_debate.0005.b.tt: "Sua [learning|lE] não é alto o suficiente e você não é [GetTrait('confucian_education').GetName(ROOT.Char)|l]"
 az_debate.0005.c: ""Não me oporei"."
 az_debate.0006.t: "A última lição"
 az_debate.0006.desc: "Con una mirada circunspecta, [current_elder.Custom2('MyCharacterIntroduction', ROOT.Char)] habla suavemente:\n\n«Habéis aprendido todo lo que podía impartir, [ROOT.Char.GetFirstNameNoTooltip]. He agotado mis enseñanzas, la lámpara de mi sabiduría está casi apagada. Pero no consideréis que os abandono. Hay alguien más cuyos conocimientos aún relucen: [new_elder.Custom2('MyCharacterIntroduction', ROOT.Char)]».\n\n[current_elder.Custom('ES_ElLa')|U] ancian[current_elder.Custom('ES_OA')] inclina la cabeza hacia la figura venerable, su presencia es solemne y expectante. «Si lo deseáis, os confiaré a su cuidado. ¿O tal vez vuestro camino tiene otro rumbo?».\n\nSe dice que continuar la cadena de transmisión es honrar lo que los ancianos llamaban [Glossary( 'dao', 'CONFUCIAN_DAO')]."
 az_debate.0006.a: ""Aceitarei a orientação de [new_elder.GetFirstNameNoTooltip]"."
 az_debate.0006.b: ""Seus ensinamentos são suficientes"."
 az_debate.0006.c: ""Por que limitar a sabedoria a uma só voz?""
 az_debate.0006.c.success: "[Select_CString(And(current_elder.IsFemale, new_elder.IsFemale),'Ambas ancianas','Ambos ancianos')] assentem, [Select_CString(And(current_elder.IsFemale, new_elder.IsFemale),'impresionadas','impresionados')]"
 az_debate.0006.c.failure: "[new_elder.GetFirstNameNoTooltip] se enrijece, ofendido[new_elder.Custom('ES_OA')]"
 CONFUCIAN_DAO: "Refere-se ao Caminho: a ordem moral e o percurso cósmico ensinados pelos sábios. É tanto um guia para a conduta correta quanto a base da harmonia entre o Céu, a Terra e a humanidade."
 az_debate.0007.t: "Uma repreensão diante de todos"
 az_debate.0007.desc: ""Você sequer ouve o que está dizendo?", dispara [rival_elder.Custom2('MyCharacterIntroduction', ROOT.Char)], sua voz cortando o salão. "Até uma criança poderia recitar os clássicos com mais senso!".\n\nAs palavras caem como golpes sobre [disciple_candidate.Custom2('MyCharacterIntroduction', ROOT.Char)], seu discípul[disciple_candidate.Custom('ES_OA')]. Os escribas vacilam no meio do traço, a tinta se aglomera em seus pincéis. [disciple_candidate.GetFirstNameNoTooltip] baixa o olhar, com as bochechas coradas e os ombros rígidos, como se estivesse se preparando para a chuva."
 az_debate.0007.a: ""Não se deixem definir pelo temperamento alheio"."
 az_debate.0007.b: ""Diga-me o que [rival_elder.GetSheHe]"."
 az_debate.0007.b.success: "[Select_CString( disciple_candidate.IsFemale, 'La discípula', 'el discípulo' )] aceita ansiosamente"
 az_debate.0007.b.failure: "As minhas palavras engasgam"
 az_debate.0007.c: ""Vamos falar de harmonia, por favor"."
 az_debate.0008.t: "Encruzilhadas eruditas"
 az_debate.0008.desc: "No canto sombreado do salão, observo [neutral_scholar.Custom2('MyCharacterIntroduction', ROOT.Char)] trocando gentilezas com [rival_leader.Custom2('MyCharacterIntroduction', ROOT.Char)], membro do [GetSituation('dynastic_cycle').GetTopParticipantGroupByKey( 'undecided_movement' ).GetName].\n\n“O [rival_movement.GetName] cultiva a virtude por meio da disciplina”, insiste [rival_leader.GetTitledHouseNameOrFirstName] com as palmas abertas em calma confiança. “E ainda assim”, intervém com leveza [neutral_scholar.GetTitledHouseNameOrFirstName],“pode a disciplina sozinha nutrir a harmonia sem compaixão?”. [rival_leader.Custom('ES_ElLa')|U] defensor[rival_leader.Custom('ES_XA')] do [rival_movement.GetNameNoTooltip] franze a testa."
 az_debate.0008.a: "Pensem na harmonia que oferece [my_movement.GetNameNoTooltip]."
 az_debate.0008.b: ""Vamos ponderar os próprios clássicos"."
 az_debate.0008.b.success: "[Select_CString(And(neutral_scholar.IsFemale, rival_leader.IsFemale),'Las','Los')] deixo-os sem palavras"
 az_debate.0008.b.failure: "Eles acenam com a cabeça, sem se impressionar [Select_CString(And(neutral_scholar.IsFemale, rival_leader.IsFemale),'impresionadas','impresionados')]"
 az_debate.0008.c: ""Venha, [neutral_scholar.GetTitledHouseNameOrFirstName] e lhe mostrarei a verdadeira virtude"."
 az_debate.0008.d: ""Preferiria não intervir…""
 az_debate.0008.d.flavor: "… e me refresco sob esta sombra."
 az_debate.0009.t: "Um passo em falso no salão"
 az_debate.0009.desc: "Levantando-se com confiança, [errant_disciple.Custom2('MyCharacterIntroduction', ROOT.Char)] limpa a garganta. "O [Glossary( 'Maestro', 'CONFUCIUS_GLOSS' )] disse: \"Se um governante governa de acordo com o [Glossary('ritual', 'CONFUCIAN_LI')], é como se fosse a estrela do Norte, e todas as estrelas se curvariam perante ele!\"".\n\nUma onda de risos agita o salão. [stickler_scholar.Custom2('MyCharacterIntroduction', ROOT.Char)] inclina a cabeça e diz com uma voz suave como seda: "Curioso..., mas os Analectos não falam de ritual, e sim da [Glossary( 'virtud', 'CONFUCIAN_DE')]. É a virtude que mantém as estrelas em seu lugar, não a cerimônia"."
 CONFUCIAN_LI: "Refere-se à correção ritual e à observância das formas apropriadas, o que mantém a harmonia na sociedade e reflete a virtude interior."
 az_debate.0009.a: ""Não são as palavras que importam, mas a intenção"."
 az_debate.0009.b: "Redirecionar a assembleia com uma anedota cortês."
 az_debate.0009.d: ""Venha, [errant_disciple.GetFirstNameNoTooltip], vamos para outro lugar"."
 az_debate.0010.t: "Um poema espinhoso"
 az_debate.0010.desc: "Observo a [poet.Custom2('MyCharacterIntroduction', ROOT.Char)] recitar o último verso de seu poema: "Um tronco torto se estende em direção ao céu, suas raízes afundadas no fundo, seus galhos pesados de sombra…".\n\nUm murmúrio de aprovação surge da multidão.\n\n[critic.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se inclina para se aproximar e sussurrar em meu ouvido: "O poema de [poet.GetFirstNameNoTooltip] não é uma simples imagem. Ele sugere que [ROOT.Char.GetTopLiege.Custom('ES_ElLa')] [ROOT.Char.GetTopLiege.GetTitleAsName|l] se afasta do Mandato do Céu, que a decadência apodrece sem ser vista…"."
 az_debate.0010.a: ""É uma clara zombaria de noss[ROOT.Char.GetLiege.Custom('ES_OA')] [ROOT.Char.GetLiege.GetTitleAsNameNoTooltip|l]!"."
 az_debate.0010.b: "Buscarei seu conselho em privado."
 az_debate.0010.c: ""Por favor, não passa de arte!""
 tgp_subtle_counsel_modifier: "Conselho sutil"
 tgp_subtle_counsel_modifier_desc: "Este personagem busca o conselho de um especialista em sutileza"
 az_debate.0011.t: "Observando o ancião"
 az_debate.0011.desc: "A disputa se desenrola com uma cadência deliberada, cada palavra de [observed_elder.Custom2('MyCharacterIntroduction', ROOT.Char)] ressoa como o toque medido do sino de um templo.\n\n“Os ritos são os ossos do reino; sem eles, a virtude desmorona. Ignorar os clássicos é convidar o caos, fazer brotar ervas daninhas onde o grão deveria crescer.”"
 az_debate.0011.a: "Talvez [observed_elder.GetSheHe] possa me ensinar mais?"
 az_debate.0011.b: ""Uma lição importante"."
 az_debate.0011.c: ""Apoio explícito ao [GetPlayer.Custom('GetMyMovementShort')]!""
