l_spanish:
 genpei_intro: "Guerra Genpei:"
 tgp_genpei_character.1000.t: "$genpei_intro$ Genciana endemoniada"
 tgp_genpei_character.1000.desc: "La derrota de mi padre y el asesinato de mis hermanos en la [Glossary( 'rebelión Heiji', 'HEIJI_REBELLION_GLOSS' )] aún me atormentan. ¡Esta ignominia dirige mi venganza contra los viles [Glossary( 'Taira', 'TAIRA_GLOSS' )]! Aunque [kiyomori_taira.GetFirstName] crea haberse asegurado el [GetTitleByKey('k_chrysanthemum_throne').GetDefinitiveName|l] al casar a su hija con el [norihito_tenno.GetTitledFirstName|l], los [Glossary( 'Minamoto', 'MINAMOTO_GLOSS' )] siguen teniendo influencia en las provincias orientales y la familia imperial aprieta los dientes bajo su mandato.\n\nAunque la figura central de los Minamoto, [yorimasa_minamoto.GetFirstName], ayudó a [kiyomori_taira.GetFirstNameNoTooltip] a enfrentarse a mi padre, mis espías me dicen que hay fricciones entre [Select_CString(And(yorimasa_minamoto.IsFemale, kiyomori_taira.IsFemale), 'ambas', 'ambos')]. Por otra parte, mi prim[yoshinaka_minamoto.Custom('ES_OA')] [yoshinaka_minamoto.GetFirstName] no ha perdonado la muerte de su padre a manos de mi hermanastro, pero podría ser un aliado útil…"
 tgp_genpei_character.1000.a: "!#bold Yo#! e só eu acabarei com os [kiyomori_taira.GetDynasty.GetNameNoTooltip]!"
 tgp_genpei_character.1000.a.flavor: "[ruler.GetShortUIName|U] tentará reunir suas forças para libertar o [GetTitleByKey('k_chrysanthemum_throne').GetDefinitiveName|l] da tirania [kiyomori_taira.GetDynastyName]"
 tgp_genpei_character.1000.b: "Os [ruler.GetDynasty.GetNameNoTooltip] devemos nos unir contra eles."
 tgp_genpei_character.1000.b.flavor: "Vocês devem resolver suas diferenças se quiserem derrubar os quase inexpugnáveis [kiyomori_taira.GetDynastyName]"
 tgp_genpei_character.1010.t: "$genpei_intro$ a genciana desencadeada"
 tgp_genpei_character.1010.desc.intro: "[kiyomori_taira.GetFirstName]! Seu desejo de poder é um rio que corre sem controle e arrasa tanto a tradição nobre quanto a propriedade. Nem chamar-se [kiyomori_taira.GetTitleAsName|l] , senhor[kiyomori_taira.Custom('ES_XA')] de todo o Japão sacia sua sede devassa. Embriagad[kiyomori_taira.Custom('ES_OA')] com o domínio indiscutido dos [Glossary( 'Taira', 'TAIRA_GLOSS' )], viu-se no direito de depor [previous_emperor.Custom('ES_AlAla')] [Glossary( 'tennō', 'TENNO_GLOSS' )] [old_emperor.GetTitledFirstName|l] do [GetTitleByKey('k_chrysanthemum_throne').GetDefinitiveName|l] e colocar em seu lugar seu net[new_emperor.Custom('ES_OA')] , [new_emperor.GetFirstName]."
 tgp_genpei_character.1010.desc.blocboss: "Como a ponta da lança dos [Glossary( 'Minamoto', 'MINAMOTO_GLOSS' )]. Sou eu quem deve assumir a responsabilidade. Devemos ser a barreira contra a ambição de [kiyomori_taira.GetDynasty.GetNameNoTooltip]. Caso contrário, acabaremos como meros carregadores de sua liteira!"
 tgp_genpei_character.1010.desc.notblocboss: "\n\nNos últimos anos, minha família foi a barreira contra a ambição de [kiyomori_taira.GetDynasty.GetNameNoTooltip]. Agora, uma liderança [Glossary( 'Minamoto', 'MINAMOTO_GLOSS' )] incompetente quer nos transformar em carregadores de sua liteira. [minamoto_ruler.GetFirstName] é fraco demais. Se meu sábio pai estivesse aqui, jamais teria permitido isso."
 tgp_genpei_character.1010.a: "Devo reunir os [ruler.GetDynasty.GetNameNoTooltip]."
 tgp_genpei_character.1010.a.flavor: "A [bloc|El] se unirá à urgência do teu chamado e certamente fará dos [ruler.GetHouse.GetName] a [house|El] dirigente se usares a [interaction|El] #V $assume_house_bloc_leadership_interaction$#!."
 tgp_genpei_character.1010.a.tt: "Toda [house|El] de seu [bloc|El] melhora o nível de [Concept('house_relation', 'relación')|E] com [ruler.GetHouse.GetName]"
 tgp_genpei_character.1010.b: "Talvez os [kiyomori_taira.GetDynasty.GetNameNoTooltip] sejam os governantes legítimos?"
 tgp_genpei_character.1010.b.flavor: "Se você cair nas graças dele agora, poderá garantir seu lugar como um[ROOT.Char.Custom('ES_XA')] lacai[ROOT.Char.Custom('ES_OA')] notável."
 tgp_genpei_character.1090.t: "$genpei_intro$ a genciana vingativa"
 tgp_genpei_character.1090.desc: "Me foi arrancado meu direito de nascimento de liderar os [Glossary( 'Minamoto', 'MINAMOTO_GLOSS' )]! Meu nobre pai foi morto em um fratricídio mesquinho! Esses assassinatos de parentes da [Glossary( 'rebelión Heiji', 'HEIJI_REBELLION_GLOSS' )] não serviram para nada além de abrir caminho para que os vis [Glossary( 'Taira', 'TAIRA_GLOSS' )] dominem o [GetTitleByKey('k_chrysanthemum_throne').GetDefinitiveName|l]. [kiyomori_taira.GetFirstName], embriagad[kiyomori_taira.Custom('ES_OA')] de poder, passou a se intitular [Glossary( 'daijō-daijin', 'DAIJO_DAIJIN_GLOSS' )]!\n\nAgora meu prim[yoritomo_minamoto.Custom('ES_OA')] [yoritomo_minamoto.GetFirstName] busca unir os [yoritomo_minamoto.GetDynasty.GetNameNoTooltip] contra este tirano, mas não fez penitência pelo crime de seu pai. Minha nova casa, [ruler.GetHouse.GetName], ergue-se desafiadora como seu homônimo; as montanhas que me protegeram de meu tio assassino!\n\nSerá meu poder suficiente para pôr fim a esta era de tirania?"
 tgp_genpei_character.1090.a: "$tgp_genpei_character.1000.a$"
 tgp_genpei_character.1090.a.flavor: "$tgp_genpei_character.1000.a.flavor$"
 tgp_genpei_character.1090.b: "$tgp_genpei_character.1000.b$"
 tgp_genpei_character.1095.t: "$genpei_intro$ a genciana legítima"
 tgp_genpei_character.1095.desc: "El Japón de mi padre me parte el corazón. ¡[kiyomori_taira.GetFirstName] ha destruido todo lo que conocíamos! El último vestigio de rectitud, [old_emperor.Custom('ES_ElLa')] [Glossary( 'emperador', 'TENNO_GLOSS' )] [old_emperor.GetFirstName] en persona, ha sido expulsad[old_emperor.Custom('ES_OA')] del [GetTitleByKey('k_chrysanthemum_throne').GetDefinitiveName|l] y se ha puesto en su lugar [current_emperor.Custom('ES_AlAla')] mismísim[current_emperor.Custom('ES_OA')] niet[current_emperor.Custom('ES_OA')] de [kiyomori_taira.GetFirstNameNoTooltip], [current_emperor.GetFirstName].\n\nCon mi prim[yoritomo_minamoto.Custom('ES_OA')] [yoritomo_minamoto.GetFirstName] preparad[yoritomo_minamoto.Custom('ES_OA')] para dirigir a los [Glossary( 'Minamoto', 'MINAMOTO_GLOSS' )] contra la tiranía de [kiyomori_taira.GetFirstNameNoTooltip], ¿me uno a su causa cuando yo soy mejor guerrer[ROOT.Char.Custom('ES_OA')] y mi lugar legítimo es estar al mando? ¿O me arriesgo a dividir nuestras fuerzas y convocar a la familia solo bajo mi estandarte?"
 tgp_genpei_character.1095.a: "Não há futuro com [yoritomo_minamoto.GetFirstNameNoTooltip]. Para mim, os [ruler.GetDynasty.GetNameNoTooltip]!"
 tgp_genpei_character.1095.a.flavor: "$tgp_genpei_character.1000.a.flavor$"
 join_house_bloc_yoshinaka_tt: "A [house|El] [THIS.House.GetBaseName] se juntará ao seu [bloc|El]"
 tgp_genpei_character.1095.b: "Vou engolir esse sapo... por enquanto."
 tgp_genpei_character.1095.b.flavor: "O perigo da supremacia de [kiyomori_taira.GetDynasty.GetNameNoTooltip] é grande demais. Os [ruler.GetDynasty.GetNameNoTooltip] devem se unir para derrotá-los."
 tgp_genpei_character.1100.t: "$genpei_intro$ Genciana feroz"
 tgp_genpei_character.1100.desc: "Con la derrota de mi padre a manos de [kiyomori_taira.GetFirstName] de los [Glossary( 'Taira', 'TAIRA_GLOSS' )] en la [Glossary( 'rebelión Heiji', 'HEIJI_REBELLION_GLOSS' )], tuve que marcharme a las montañas del norte y convertirme a la fuerza en [Glossary( 'rōnin', 'RONIN_GLOSS' )]. Aquí, el poderoso [hidehira_fujiwara.GetFirstName] de los [Glossary( 'Fujiwara', 'FUJIWARA_GLOSS') ] me ha dado asilo.\n\nEl dominio de [kiyomori_taira.GetFirstNameNoTooltip] sobre la corte imperial augura una era de supremacía total [kiyomori_taira.GetDynasty.GetNameNoTooltip]. Y ante esto, [yorimasa_minamoto.GetFirstName], la figura central de nuestra dinastía [Glossary( 'Minamoto', 'MINAMOTO_GLOSS' )], nos humilla con su cobardía. Por suerte, mi hermano [yoritomo_minamoto.GetFirstName] cuenta con las espadas de las familias samuráis del este y se prepara para derrocar al tirano.\n\n¡Y por encima de todo, espero que la tormenta que está por llegar me ofrezca oponentes dignos para mi espada!"
 tgp_genpei_character.1100.a: "Servirei a [hidehira_fujiwara.GetFirstNameNoTooltip] por enquanto."
 tgp_genpei_character.1100.b: "Minha família precisa do meu apoio."
 tgp_genpei_character.1100.c: "O destino me deixou o caminho da espada."
 stay_duelist_adventurer: "#help Cuantos más duelos se ganen, más fuerte será el modificador de arriba#!"
 tgp_genpei_character.2000.t: "$genpei_intro$ A borboleta alça voo"
 tgp_genpei_character.2000.desc: "[GetTitleByKey('e_japan').GetBaseNameNoTierNoTooltip|U] é um reflexo da minha vontade, da minha astúcia e do poder dos [Glossary( 'Taira', 'TAIRA_GLOSS' )]! Nada me escapa, exceto o [GetTitleByKey('k_chrysanthemum_throne').GetDefinitiveName|l].\n\nMinha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('noriko_taira'))] [noriko_taira.GetFirstName] logo extrairá uma semente [norihito_tenno.Custom('ES_DelDela')] jovem [norihito_tenno.GetTitledFirstName]. Seu poderoso ventre dará à luz um herdeiro com sangue dos [ROOT.Char.GetHouse.GetBaseName] que corre por suas veias. Um herdeiro, pronto para esmagar todos os que ousarem desafiar nossa supremacia, assegurará nossa ascendência para sempre!"
 tgp_genpei_character.2000.a: "Por enquanto, acalme o rebanho."
 tgp_genpei_character.2000.b: "Envenene o poço…"
 tgp_genpei_character.2000.b.flavor: "Calunia [norihito_tenno.GetTitleAsName] com a esperança de que isso ajude a facilitar uma futura abdicação forçada."
 every_non_taira_vassal: "Todo [vassal|lE] que não seja da [dynasty|lE] [GetDynastyByID('japanese_taira_kanmu').GetName] de [GetTitleByKey('e_japan').GetBaseNameNoTierNoTooltip|U]"
 tgp_genpei_character.2000.c: "Alimentem o garoto com leite forte!"
 tgp_genpei_character.2000.c.flavor: "O novo herdeiro deve ser forte de corpo se quiser tomar o trono desde o nascimento."
 tgp_genpei_character.2010.t: "$genpei_intro$ Uma encruzilhada de poder"
 tgp_genpei_character.2010.desc: "¡Un[new_emperor.Custom('ES_XA')] hereder[new_emperor.Custom('ES_OA')] de mi sangre! [new_emperor.GetTitledFirstName] ha nacido y está list[new_emperor.Custom('ES_OA')] para ascender a [GetTitleByKey('k_chrysanthemum_throne').GetDefinitiveName|l]. Sería tan sencillo como deshacerse [current_emperor.Custom('ES_DelDela')] [current_emperor.GetTitledFirstName]. Si no fuera porque un movimiento así podría hacer estallar una rebelión…\n\n¡Esta tierra está plagada de traidores descontentos! Los obstinados [Glossary( 'Minamoto', 'MINAMOTO_GLOSS' )] de [minamoto_ruler.GetFirstName] siguen resentidos por el recuerdo de su derrota en la [Glossary( 'Heiji Rebellion', 'HEIJI_REBELLION_GLOSS' )]. Aunque ha perdido poder, [motofusa_fujiwara.GetFirstName] añora los días en los que los [Glossary( 'Fujiwara', 'FUJIWARA_GLOSS') ] dominaban [GetTitleByKey('e_japan').GetBaseNameNoTierNoTooltip|U]. El padre del emperador, el astuto [Glossary( 'Jōkō', 'JOKO_GLOSS') ] [go_shirakawa.GetFirstName], a quien tengo gran aprecio y quien fue un gran aliado en el pasado, se cuestiona ahora mis motivaciones. ¿Qué camino debería tomar?"
 tgp_genpei_character.2010.a: "Tanto faz as consequências, a ascendência Taira começa hoje!"
 tgp_genpei_character.2010.b: "Destruir [minamoto_ruler.GetDynasty.GetNameNoTooltip] ? a prioridade."
 tgp_genpei_character.2010.b.flavor: "Encontrará uma causa comum com [fujiwara_ruler.Custom('ES_ElLa')] [fujiwara_ruler.GetDynasty.GetName] e esmagará os últimos vestígios [minamoto_ruler.Custom('ES_DelDela')] traidor[minamoto_ruler.Custom('ES_OA')] [minamoto_ruler.GetDynasty.GetName]"
 tgp_genpei_character.2010.c: "A supremacia samurai resolverá todos os problemas."
 tgp_genpei_character.2010.c.flavor: "Você se unirá [minamoto_ruler.Custom('ES_AlAla')] [minamoto_ruler.GetDynasty.GetName], e administradores como [fujiwara_ruler.GetDynasty.GetName] não terão qualquer esperança de recuperar o controle."
 tgp_genpei_character.2010.d: "Reacender minha aliança mais forte"
 tgp_genpei_character.2010.d.flavor: "[go_shirakawa.GetName] e eu superamos todos os obstáculos contra ventos e marés. E vamos fazer isso de novo!"
 minamoto_clan_will_respond_to_our_actions: "#warning @warning_icon! Seguro que el bloque de los [GetDynastyByID('japanese_minamoto_seiwa').GetName] responderá#!"
 tgp_genpei_character.3000.t: "$genpei_intro$ Glicínia dispersa"
 tgp_genpei_character.3000.desc: "Me han echado de mi [GetTitleByKey('b_kyo').GetBaseNameNoTier] y me han relegado al [GetTitleByKey('c_oki').GetBaseNameNoTierNoTooltip] más remoto. ¡Qué injusticia! ¡Necio y confabulador como ninguno, [Glossary( 'Taira', 'TAIRA_GLOSS' )] [kiyomori_taira.GetFirstName] es la causa de mi sufrimiento y de la denigración de los [Glossary( 'Fujiwara', 'FUJIWARA_GLOSS') ]!\n\nDespués de que ayudáramos a derrotar a los [Glossary( 'Minamoto', 'MINAMOTO_GLOSS' )] en la [Glossary( 'Heiji Rebellion', 'HEIJI_REBELLION_GLOSS' )], se aprovechó de la enfermedad de mi [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('motozane_fujiwara'))], [motozane_fujiwara.GetFirstName], para dividir nuestros estados y consolidar su poder. Insatisfecho como [Glossary( 'Daijō-daijin', 'DAIJO_DAIJIN_GLOSS' )], ha casado a su hija con [norihito_tenno.GetTitledFirstName] en un complot desvergonzado por hacerse con el control del trono.\n\nMi única esperanza para detener a este tirano es el viejo y sabio [Glossary( 'Jōkō', 'JOKO_GLOSS') ] [go_shirakawa.GetFirstName], padre de [norihito_tenno.GetTitleAsNameNoTooltip], y nuestro antiguo aliado… o [hidehira_fujiwara.Custom('ES_ElLa')] rústic[hidehira_fujiwara.Custom('ES_OA')] [hidehira_fujiwara.GetFirstName] y sus ciertamente fuertes [hidehira_fujiwara.GetDynasty.GetName] al norte."
 DAIJO_DAIJIN_GLOSS: "#bold Daijō-daijin#!, #EMP canciller del señorío#!, dirigía el #EMP Daijō-kan#! o #EMP Consejo de Estado#!, una oficina de mucho renombre en el periodo Nara (710-794).\n\nEl título fue resucitado por [Glossary( 'Taira', 'TAIRA_GLOSS' )] Kiyomori como el puesto más alto después de la familia real, equivalente al de líder de facto del gobierno imperial."
 tgp_genpei_character.3000.a: "Todos conhecerão os pecados de [kiyomori_taira.GetFirstNameNoTooltip]!"
 tgp_genpei_character.3000.a.flavor: "Ainda deve haver [motofusa_fujiwara.GetTitleAsNameNoTooltip] que respeitem a tradição e os direitos da aristocracia de [GetTitleByKey('b_kyo').GetBaseNameNoTier]"
 tgp_genpei_character.3000.b: "[go_shirakawa.GetFirstNameNoTooltip] ainda pode recuperar a sanidade."
 tgp_genpei_character.3000.b.flavor: "O velho imperador conduziu o leme do Estado muito antes de você nascer."
 send_letter_to_go_shirakawa: "Você envia uma carta a [go_shirakawa.GetName]"
 tgp_genpei_character.3000.c: "Todo [motofusa_fujiwara.GetDynasty.GetNameNoTooltip], por mais vil que seja, deve ansiar por justiça."
 tgp_genpei_character.3000.c.flavor: "Que a glicínia cresça sem controle, de costa a costa, cercando o trono como é seu lugar de direito!"
 tgp_genpei_character.3010.opening: "Ao imperador do passado, [go_shirakawa.GetNameNoTooltip],"
 tgp_genpei_character.3010.desc: "O domínio sobre o qual você governou um dia está lentamente desmoronando. As duas grandes famílias samurais já estão reunindo todo o apoio que conseguem. Sei que você ainda amarga a tirania dos [GetDynastyByID('japanese_taira_kanmu').GetName]. A família [ROOT.Char.GetDynasty.GetName] precisa de você. Juntos, restauraremos a autoridade do governo imperial e daremos fim à indomável classe samurai."
 tgp_genpei_character.3010.a: "Não poderei ajudar contra os [GetDynastyByID('japanese_taira_kanmu').GetNameNoTooltip]."
 tgp_genpei_character.3010.b: "Você tem razão… Vamos nos unir contra eles."
 tgp_genpei_character.3100.t: "$genpei_intro$ Glicínia caprichosa"
 tgp_genpei_character.3100.desc: "Los altivos [Glossary( 'Fujiwara', 'FUJIWARA_GLOSS' )] de la capital nos miraron con desdén en el pasado. #EMP «¿Quién abandonaría las galas y los palacios de [ROOT.Char.GetTopLiege.GetCapitalLocation.GetBaronyNameExplicitlyNoTooltip] por las desoladas provincias del norte?».#! Qué necios fueron esos burócratas…\n\n[motofusa_fujiwara.GetFirstName] ahora solo es [Glossary( 'kampaku', 'KAMPAKU_GLOSS' )] de nombre, demasiado débil para desafiar al astuto [kiyomori_taira.GetFirstName], quien se ha proclamado [Glossary( 'daijō-daijin', 'DAIJO_DAIJIN_GLOSS' )], verdadero titiritero del [GetTitleByKey('k_chrysanthemum_throne').GetDefinitiveName|l]. Pronto los [Glossary( 'Taira', 'TAIRA_GLOSS' )] serán imparables, ¿y quién sabe cuándo desafiarán a mi propio feudo? ¿Está en mi mano salvar a la familia imperial de las garras de los Taira y dar comienzo a un nuevo orden de los Fujiwara?\n\nQuizás el descarrilado [Glossary( 'Minamoto', 'MINAMOTO_GLOSS' )] [yoshitsune_minamoto.GetTitledFirstName|l] demuestre ser un aliado útil contra este enemigo en común…"
 tgp_genpei_character.3100.a: "Devo aceitar minha posição atual."
 tgp_genpei_character.3100.b: "Defender a liberdade não é um ato egoísta!"
 tgp_genpei_character.4000.t: "$genpei_intro$ Crisântemo murchando"
 tgp_genpei_character.4000.desc: "Bajo mi guardia, [kiyomori_taira.GetFirstName] se ha convertido en el gobernante indiscutible de Japón. Fue una necedad de mi parte dejar que manipulara mis ambiciones para alinearme con los regentes [Glossary( 'Fujiwara', 'FUJIWARA_GLOSS' )], puesto que el poder se lo acabó quedando para [kiyomori_taira.GetHerselfHimself].\n\nMi hijo [norihito_tenno.GetTitledFirstName] aún se sienta en el [GetTitleByKey('k_chrysanthemum_throne').GetDefinitiveName|l], pero ¿por cuánto tiempo? [noriko_taira.GetFirstName], su [noriko_taira.Custom('WifeHusband')], hija de [kiyomori_taira.GetFirstNameNoTooltip], sin duda alguna dará pronto a luz a un heredero mucho más fácil de controlar.\n\nMi otrora ilimitada influencia como [Glossary( 'Jōkō', 'JOKO_GLOSS' )] está ahora en su hora más baja. Con [motofusa_fujiwara.GetFirstName] en el exilio y [Glossary( 'Kampaku', 'KAMPAKU_GLOSS' )] solo de nombre, y los [Glossary( 'Minamoto', 'MINAMOTO_GLOSS' )] aplastados por los [Glossary( 'Taira', 'TAIRA_GLOSS' )] durante la [Glossary( 'Heiji Rebellion', 'HEIJI_REBELLION_GLOSS' )], cuesta creer que a alguien se le ocurriría oponerse a los poderosos Taira…"
 tgp_genpei_character.4000.a: "Não vou mais tolerar isso."
 tgp_genpei_character.4000.b: "Por enquanto, é melhor esperar."
