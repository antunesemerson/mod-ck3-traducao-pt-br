 isolation_law_effects: "$EFFECT_LIST_BULLET$É menos provável que as [epidemics|lE] se espalhem para o seu [realm|lE]\n$EFFECT_LIST_BULLET$Melhores resultados nos tratamentos realizados por um [GetCourtPositionType('court_physician_court_position').GetName()|l]"
 imperial_expansion_law: "Pacificação imperial"
 imperial_expansion_law_subname: "As fronteiras do reino devem ser protegidas"
 imperial_expansion_law_effects: "$EFFECT_LIST_BULLET$Custo das [domicile_buildings|lE] de arsenal e estábulos: #P -25 %#!\n$EFFECT_LIST_BULLET$Desbloqueia o [casus_belli|lE] [GetCasusBelliType('japan_imperial_expansion_cb').GetName]\n$EFFECT_LIST_BULLET$Permite declarar [wars|lE] externas"
 manor_reform_law: "Reforma da Mansão"
 manor_reform_law_subname: "É preciso redistribuir as terras para impedir a corrupção"
 manor_reform_law_effects: "$EFFECT_LIST_BULLET$O custo de [influence|lE] para a revogação de [governorship|lE] é reduzido pela metade"
 bandit_crackdown_law: "Repressão de bandidos"
 bandit_crackdown_law_subname: "A ordem deve ser restabelecida no campo"
 imperial_policy_laws_cooldown_desc: "Foi alterada recentemente a [imperial_policy|lE]; as [Concept('imperial_policy', 'políticas imperiais')|E] podem ser alteradas novamente após [GetCurrentDateWithDiff( GetVarTimeRemaining( GetPlayer.MakeScope, 'imperial_policy_laws_cooldown') )]"
 IMPERIAL_POLICY_REASON: "[imperial_policy|E]"
