l_spanish:
 imperial_policy_laws: "Políticas imperiais"
 imperial_policy_laws_singular: "[imperial_policy|E]"
 defense_mobilization_law: "Mobilização de defesa"
 defense_mobilization_law_subname: "O reino deve se unir contra ameaças externas"
 defense_mobilization_law_effects: "$EFFECT_LIST_BULLET$Custo das [domicile_buildings|lE] de arsenal e estábulos: #P -25 %#!\n$EFFECT_LIST_BULLET$Desbloqueia o [casus_belli|lE] [GetCasusBelliType('japan_imperial_reconquest_cb').GetName]"
 disarmament_law: "Desarmamento"
 disarmament_law_subname: "As armas devem ser confiscadas para que a paz seja mantida"
 disarmament_law_effects: "$EFFECT_LIST_BULLET$Custo de prestígio de [casus_belli|lE] interno: #N +[EmptyScope.ScriptValue('tgp_disarmament_law_increased_cb_cost_value')|0%]#!\n$EFFECT_LIST_BULLET$Um [government|lE] [GetGovernment('japan_administrative_government').GetName|l] pode construir ou melhorar [holdings|lE] de [castle|lE]"
 disarmament_law_increased_cb_cost_desc: "[GetLaw('disarmament_law').GetName]"
 isolation_law: "Isolamento imposto"
