l_spanish:
 tgp_japan_general.8800.t: "[ROOT.Char.GetConfederation.GetName] se expande"
 tgp_japan_general.8800.desc: "Mis fuerzas pueden sentirse orgullosas al haberme servido bien a mí y a mi [attacker.GetConfederation.GetName] contra [war_loser.Custom('ES_ElLa')] [war_loser.GetTitledFirstName|l]. Ha perdido su [target_title.GetName] y me pertenece para concederlo.\n\nLo sensato sería asegurarse de que estas tierras se queden en manos de un servidor leal y de confianza, uno que escuche mis palabras y a quien se pueda llamar en el futuro."
 tgp_japan_general.8800.a: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('family_1') )], [family_1.GetFirstNameNoTooltip], governará bem."
 tgp_japan_general.8800.b: "Será para meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('family_2') )]. [family_2.GetFirstNameNoTooltip]."
 tgp_japan_general.8800.c: "Que recaia sobre meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('family_3') )], [family_3.GetFirstNameNoTooltip]."
 tgp_japan_general.8800.e: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('fallback_1') )], [fallback_1.GetFirstNameNoTooltip], demonstrará seu valor."
 tgp_japan_general.8800.f: "Confio no meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('fallback_2') )]. [fallback_2.GetFirstNameNoTooltip]."
 tgp_japan_general.8800.g: "É meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('fallback_3') )] , [fallback_3.GetFirstNameNoTooltip] , quem o mereceu."
 tgp_japan_general.8800.h: "Ainda não me decidi…"
 tgp_japan_general_8800_custom: "Todos os demais possíveis destinatários"
 tgp_japan_general.8800.cadet_tt: "Será fundada uma [house|lE] nova"
 new_ceremonial_liege_message_title: "[ceremonial_liege.Char.Custom('ES_ElLa')|U] [ceremonial_liege.GetTitleAsNameNoTooltip] está entronizado"
 new_ceremonial_liege_message_effect: "[ceremonial_liege.Char.Custom('ES_ElLa')|U] [ceremonial_liege.GetTitledFirstName] ascendeu a [ceremonial_title.GetDefinitiveName|l]"
 tgp_japan_general.9100.t: "[ROOT.Char.Custom('ES_ElLa')|U] novo[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip]"
 tgp_japan_general.9100.shoulders: "agora recai sobre meus ombros a responsabilidade de liderar meu [title.GetTierAsNameNoTooltip|l]."
 tgp_japan_general.9100.desc_murdered: "Após a trágica e #EMP desgraciada#! morte de [previous_holder.Custom2('MyCharacterIntroduction', ROOT.Char)], $tgp_japan_general.9100.shoulders$"
 tgp_japan_general.9100.desc_dead: "Com o falecimento de [previous_holder.Custom2('MyCharacterIntroduction', ROOT.Char)], $tgp_japan_general.9100.shoulders$"
 tgp_japan_general.9100.desc_joko: "Com a abdicação de [previous_holder.Custom2('MyCharacterIntroduction', ROOT.Char)], $tgp_japan_general.9100.shoulders$"
 tgp_japan_general.9100.desc_alive: "Agora cabe a mim liderar o imenso [title.GetTierAsNameNoTooltip] deixado por [previous_holder.Custom2('MyCharacterIntroduction', ROOT.Char)]."
 tgp_japan_general.9100.desc: "\n\nApresento-me diante dos vassalos, ajusto minha nova coroa e [ROOT.Char.Custom('quirk_pos_personal_present')]. Ah, as coisas que realizarei!"
 tgp_japan_general.9100.a: "Vida longa a [ROOT.Char.GetTitleAsNameNoTooltip]!"
 tgp_japan_general.9120.t: "Atrás do trono"
 tgp_japan_general.9120.desc: "Com a partida de [previous_holder.Custom('ES_DelDela')] [previous_holder.GetTitledFirstName|l] e minha crescente influência, os assuntos de Estado finalmente voltam a estar, em grande parte, sob a alçada imperial.\n\nComo é costume, muitos esperam que eu rape a cabeça e passe o trono ao meu sucessor[emperor_player_heir.Custom('ES_XA')], [emperor_player_heir.GetFirstName]. Como a linhagem está segura, deixarei de lado as responsabilidades cerimoniais de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] para que eu possa me concentrar nas questões políticas mais urgentes."
 tgp_japan_general.9120.a: "É hora de entrar no claustro…"
 tgp_japan_general.9120.b: "#EMP Soy#! [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip] e #EMP pienso#! governar!"
 tgp_japan_general.9300.t: "$game_concept_imperial_policy$:"
 tgp_japan_general.9300.t.defense_mobilization_law: "$tgp_japan_general.9300.t$ $defense_mobilization_law$"
 tgp_japan_general.9300.t.disarmament_law: "$tgp_japan_general.9300.t$ $disarmament_law$"
 tgp_japan_general.9300.t.isolation_law: "$tgp_japan_general.9300.t$ $isolation_law$"
 tgp_japan_general.9300.t.fortification_initative_law: "$tgp_japan_general.9300.t$ $fortification_initative_law$"
 tgp_japan_general.9300.t.imperial_expansion_law: "$tgp_japan_general.9300.t$ $imperial_expansion_law$"
 tgp_japan_general.9300.t.manor_reform_law: "$tgp_japan_general.9300.t$ $manor_reform_law$"
 tgp_japan_general.9300.t.bandit_crackdown_law: "$tgp_japan_general.9300.t$ $bandit_crackdown_law$"
 tgp_japan_general.9300.t.religious_reform_law: "$tgp_japan_general.9300.t$ $religious_reform_law$"
 tgp_japan_general.9300.restored_emperor: "Flanquead[ROOT.Char.Custom('ES_OA')] por mis cortesanos y asistentes, observo estoicamente los garabatos y sellos del funcionario al terminar mi nueva política para la totalidad de mi [liege.GetPrimaryTitle.GetTierAsNameNoTooltip|l].\n\n"
 tgp_japan_general.9300.liege: "Sob o olhar solene [ceremonial_liege.Custom('ES_DelDela')] [ceremonial_liege.GetTitledFirstName|l], escrevo e selo os toques finais do decreto, uma nova política para toda a [liege.GetPrimaryTitle.GetTierAsNameNoTooltip|l].\n\n"
 tgp_japan_general.9300.ceremonial_liege: "Cercado[ROOT.Char.Custom('ES_OA')] por meus cortesãos e assistentes, observo estoicamente [liege.Custom('ES_AlAla')] [liege.GetTitledFirstName|l] enquanto ele anota e sela, finalizando uma nova política para toda a extensão de [liege.GetPrimaryTitle.GetTierAsNameNoTooltip|l].\n\n"
 tgp_japan_general.9300.vassal_ceremonial: "Todos aguardam a notícia do palácio imperial de [liege.GetCapitalLocation.GetBaronyNameExplicitlyNoTooltip], onde hoje [liege.Custom('ES_ElLa')] [liege.GetTitledFirstName|l] proclamará uma nova política em nome [ceremonial_liege.Custom('ES_DelDela')] [ceremonial_liege.GetTitledFirstName|l].\n\n"
 tgp_japan_general.9300.vassal: "Todos aguardam a notícia do palácio imperial de [liege.GetCapitalLocation.GetBaronyNameExplicitlyNoTooltip], onde hoje [liege.Custom('ES_ElLa')] [liege.GetTitledFirstName|l] proclamará uma nova política para a totalidade de [liege.GetPrimaryTitle.GetTierAsNameNoTooltip|l].\n\n"
 tgp_japan_general.9300.defense_mobilization_law: "#EMP "[liege.GetPrimaryTitle.GetNameNoTierNoTooltip] sofre a investida de novas ameaças. Se o país deseja continuar sendo forte e livre, o povo deve se preparar para a guerra!".#!"
 tgp_japan_general.9300.disarmament_law: "#EMP [liege.GetPrimaryTitle.GetNameNoTierNoTooltip] está assolado pela discórdia e pela injustiça, devemos restringir a violência e confiscar as armas daqueles sem causa!.#!"
 tgp_japan_general.9300.isolation_law: "#EMP [liege.GetPrimaryTitle.GetNameNoTierNoTooltip] sofre sob as influências corruptoras dos forasteiros, cujas ideias e interesses semeiam discórdia — devem ser expulsos!#!"
 tgp_japan_general.9300.fortification_initative_law: "#EMP A ameaça de guerra paira sobre [liege.GetPrimaryTitle.GetNameNoTierNoTooltip]. Pelo bem de todos, devemos construir defesas poderosas para garantir que estejamos preparados para o pior.#!"
 tgp_japan_general.9300.imperial_expansion_law: "#EMP Em tempos de necessidade, [liege.GetPrimaryTitle.GetNameNoTierNoTooltip] defendeu-se legitimamente ao estender as fronteiras do país — mais uma vez devemos avançar!.#!"
 tgp_japan_general.9300.manor_reform_law: "#EMP "A grande prosperidade dos proprietários de mansões ocorre às custas de [liege.GetPrimaryTitle.GetNameNoTierNoTooltip] e do seu povo; suas propriedades devem ser restringidas!"#!"
 tgp_japan_general.9300.bandit_crackdown_law: "#EMP A autocomplacência deu lugar ao banditismo e à depravação, e o povo sofre por isso. É preciso restaurar a ordem pelo bem de [liege.GetPrimaryTitle.GetNameNoTierNoTooltip]!#!"
 tgp_japan_general.9300.religious_reform_law: "#EMP As vidas dos sacerdotes e do povo estão em desacordo. Devemos examinar os antigos dogmas se quisermos renovar a alma de [liege.GetPrimaryTitle.GetNameNoTierNoTooltip]!#!"
 tgp_japan_general.9300.outro: "Em breve, mensageiros serão enviados a todos os cantos de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetBaseNameNoTooltip] para anunciar o decreto [ceremonial_liege.Custom('ES_DelDela')] [ceremonial_liege.GetTitleAsNameNoTooltip]:\n\n"
 tgp_japan_general.9300.a: "Isso mesmo."
 tgp_japan_general.9300.a.disarmament_soryo: "$epidemic_events.1061.a$"
 #Eradicate CB lose
 tgp_japan_soryo_eradicate_cb_heir_move_manor_to_savior_tt: "[loser_heir.GetShortUIName] transferirá a [manor|lE] [loser_heir.GetHouse.GetName] para [savior.GetCapitalLocation.GetBaronyNameExplicitly]"
 tgp_japan_soryo_eradicate_cb_heir_move_to_savior_tt: "Você moverá a [manor|lE] [loser_heir.GetHouse.GetName] para [savior.GetCapitalLocation.GetBaronyNameExplicitly]"
 tgp_japan_soryo_eradicate_cb_heir_move_to_cap_tt: "Você moverá a [manor|lE] [loser_heir.GetHouse.GetName] para [loser_heir.GetTopLiege.GetCapitalLocation.GetBaronyNameExplicitly]"
 eradicated_my_house_opinion: "Erradicou minha Casa"
 every_house_member_mad: "Todo membro da [house|lE] sobrevivente"
 tgp_japan_general.9550.t: "Encurralados para o abate"
 tgp_japan_general.9550.desc.intro.a: "Esta guerra, minha instigação, os dividendos, a ruína da minha casa."
 tgp_japan_general.9550.desc.intro.b: "Quem imaginaria que nossa rivalidade com [winner.GetHouse.GetNameNoTooltip] levaria a isso?"
 tgp_japan_general.9550.desc: "Os gritos dos meus guerreiros e servos soam cada vez mais perto. Seus uivos desesperados são uma promessa do destino que logo recairá sobre todos os [ROOT.Char.GetHouse.GetName]."
 tgp_japan_general.9550.desc.alone: "\n\nEncolho-me, sozinho."
 tgp_japan_general.9550.desc.fam: "\n\nMinha família e eu nos apertamos juntos."
 tgp_japan_general.9550.desc.end: "A cada segundo, as raposas se aproximam às aves enjauladas em que nos tornamos.\n\nComo enfrentaremos os [ROOT.Char.GetHouse.GetNameNoTooltip] nossos últimos momentos?"
 every_close_family_house_member_in_court: "Você e todo [spouse|lE] e [Concept('close_family', 'familiar próximo')|E] membro da [house|lE] na corte de [Select_CString( loser.IsLocalPlayer, 'seu personagem', loser.GetShortUIName)]"
 every_house_member_in_court: "Os [spouses|El] de [loser.GetShortUIName] e todo membro da [house|El] em sua [court|El]"
 is_killed_by_you_and_you_kill_self: "cometerá suicídio para evitar a desonra pelas mãos de [winner.GetShortUIName] @death_icon!"
 tgp_japan_general.9550.a.alone: "Não terei uma morte ignóbil!"
 tgp_japan_general.9550.a.alone.flavor: "Morro pela minha própria mão"
 tgp_japan_general.9550.a.fam: "Não teremos uma morte ignóbil!"
 tgp_japan_general.9550.a.fam.flavor: "Morreremos por minha própria mão! Meu herdeir[loser_heir.Custom('ES_OA')], [loser_heir.GetShortUIName], fugirá para as terras de [savior.GetName], que simpatiza conosco"
 tgp_japan_general.9550.b: "Vamos usar nossas asas para voar para fora deste galinheiro!"
 tgp_japan_general.9550.b.success: "Você consegue escapar da erradicação."
 tgp_japan_general.9550.b.failure: "Você não consegue escapar da erradicação."
 tgp_japan_general.9550.b.flavor: "Vamos nos reagrupar e um dia nos vingaremos da [winner.GetHouse.GetNameNoTooltip]"
 tgp_japan_general.9550.c: "Teremos de arriscar nossa sorte à clemência da raposa."
 #Eradicate CB win
 tgp_japan_general.9551.t: "Erradicar a os [loser.GetHouse.GetNameNoTooltip]"
 tgp_japan_general.9551.desc.intro: ""Ainda que seja blasfêmia, eu gostaria de reencarnar como eu mesmo, para poder matar você na próxima vida, [winner.GetFirstNameNoTooltip]…",\n\nbalbucia [loser.Custom('ES_ElLa')] [loser.GetTitledFirstName|l] Antes que sua cabeça tombe no campo, sua boca ainda me amaldiçoa em silêncio. Uma morte tão espiritualmente corrupta quanto ignóbil. Seu cadáver sem cabeça jaz mole como um frango a ser depenado. Esse amontoado desmoronado de carne já não é uma ameaça, já não é humano.\n\nO império está mais limpo na ausência dos [loser.GetHouse.GetName]…"
 tgp_japan_general.9551.desc.alt.intro: "Oh, que ardiloso o(a) [loser.GetHouse.GetName]! Antes que pudéssemos capturar [loser.GetName]."
 tgp_japan_general.9551.desc.alt.suicide: "matou a si mesmo e aos seus mais próximos."
 tgp_japan_general.9551.desc.alt.escape: "fugiu para as terras de [savior.GetName]."
 tgp_japan_general.9551.desc.alt.outro: "\n\nFelizmente há outros [loser.GetHouse.GetNameNoTooltip] para matar."
 tgp_japan_general.9551.a: "Suas cabeças anunciarão sua erradicação!"
 tgp_japan_general.9551.a.flavor: "Seus rostos malignos adornarão estacas do lado de fora de sua antiga mansão"
 rival_eradicated_modifier: "Casa rival erradicada"
 rival_eradicated_modifier_desc: "Sua [house|lE] considerou apropriado ir à guerra para extinguir a linhagem de uma [house|lE] [rival|lE]. Enquanto outros julgam tal ato, o medo os mantém em silêncio."
 house_eradicated_modifier: "Casa erradicada"
 house_eradicated_modifier_desc: "Sua [house|lE] foi praticamente eliminada por uma [house|lE] [rival|lE] Ninguém teme você. Essa vergonha e inimizade prometem alimentar a vingança."
 house_eradicated_suicide_modifier: "Casa erradicada"
 house_eradicated_suicide_modifier_desc: "Antes de que sua [house|lE] fosse em grande parte eliminada por uma [house|lE] [rival|lE] , seus membros cometeram suicídio para evitar a desonra. A inimizade que resta promete ser combustível para a vingança."
 tgp_house_blocs.1001.t: "[bloc_leader.GetConfederation.GetName]: chamada às armas"
 tgp_house_blocs.1001.desc: "A liderança da casa [bloc_leader.GetHouse.GetBaseName] é tão inabalável e audaz quanto sempre, e agora [bloc_leader.Custom('ES_ElLa')] [bloc_leader.GetTitledFirstName|l] busca concentrar nossa oposição em [defender.GetName].\n\nNinguém que esteja a favor ou contra a [bloc_leader.GetConfederation.GetName] pode ignorar nosso poderio e a força que vem de nossa unidade. Poucos se surpreenderiam ao encontrar guerreiros de [ROOT.Char.GetHouse.GetBaseNameNoTooltip] entre as fileiras da hoste de [bloc_leader.GetHouse.GetBaseNameNoTooltip]."
 tgp_house_blocs.1001.a: "Estamos unidos!"
 tgp_house_blocs.1001.b: "Esta não é minha guerra."
