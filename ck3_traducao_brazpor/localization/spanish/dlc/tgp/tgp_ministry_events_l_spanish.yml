l_spanish:
 tgp_china_ministry.0001.t: "$great_project_type_grand_campaign_project$: adiante"
 tgp_china_ministry.0001.desc: "[great_project.GetName] está em andamento. O orgulho e as ambições de [owner.GetName] estão em jogo.\n\n\"É uma grande honra fazer parte de algo que fará história\", exclama orgulhosamente [contributor.GetName]. \"Nossa vitória sobre [defender.GetName] será rápida e se tornará tema de poemas futuros. Muito em breve, toda a extensão de [target_title.GetName] estará sob o Céu!\"."
 tgp_china_ministry.0001.a: "Que o [GetTitleByKey('h_china').GetNameNoTooltip] cresça!"
 tgp_china_ministry.0002.t: "$great_project_type_grand_campaign_project$: sucesso"
 tgp_china_ministry.0002.desc: "[great_project.GetName] arrebata a vitória das mãos de [defender.GetName].\n\n"Em breve colocaremos a totalidade de [target_title.GetName] sob o Céu!", proclama confiante[war_leader.Custom('ES_OA')] [war_leader.GetName]."
 tgp_china_ministry.0002.a: ""Avançar!""
 tgp_china_ministry.0003.t: "$great_project_type_grand_campaign_project$: fracasso"
 tgp_china_ministry.0003.desc: "[great_project.GetName] sofre uma derrota nas mãos de [defender.GetName].\n\n"Um pequeno contratempo no caminho para a vitória!", assegura [attacker.GetName]."
 tgp_china_ministry.0003.a: ""Minha paciência está se esgotando"."
 tgp_china_ministry.0004.t: "$great_project_type_grand_campaign_project$: mais além"
 tgp_china_ministry.0004.desc: "[great_project.GetName] já está em andamento. [contributor.GetName] declara sua vontade de se unir ao esforço de guerra.\n\n"[target_title.Custom('ES_ElLa')|U] fraco [title_holder.GetName] não é páreo para o [GetTitleByKey('h_china').GetName]. Tenho planos de como tomar [target_title.GetName]"."
 tgp_china_ministry.0004.a: "Considerai [target_title.GetNameNoTierNoTooltip] sob o Céu."
 grand_campaign_added_war_target_tt: "Foi adicionado [target_title.GetName] como um [title|El] disputado e uma meta de guerra à [war|El] #V [grand_campaign_war.GetName]#!"
 tgp_china_ministry.0005.t: "$great_project_type_grand_campaign_project$: ocaso"
 tgp_china_ministry.0005.desc_won: "[great_project.GetName] foi um grande sucesso. As terras de [target_kingdom.GetName] agora fazem parte do [GetTitleByKey('h_china').GetName].\n\n“O resultado era o esperado, mas, ainda assim, é motivo de celebração.” O imperador se regozija. “Que o povo saiba que o [ROOT.Char.GetPrimaryTitle.GetName] é o maior sob o Céu!”."
 tgp_china_ministry.0005.desc_lost: "[great_project.GetName] foi um desastre terrível. As terras de [target_kingdom.GetName] resistiram ao poder de [GetTitleByKey('h_china').GetName].\n\n“Um desfecho inesperado.” [owner.Custom('ES_ElLa')|U] [owner.GetTitleAsName|l] contém sua raiva. “Que o povo saiba que [ROOT.Char.GetPrimaryTitle.GetName] trouxe uma grande vergonha sobre os Céus!”."
 tgp_china_ministry.0005.a_win: "Ótimo trabalho!"
 tgp_china_ministry.0005.a_lost: "Toda a [GetTitleByKey('h_china').GetNameNoTooltip] deve se envergonhar."
 tgp_china_ministry.0006.opening: "[founder.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 tgp_china_ministry.0006.desc: "Lamento informá-lo de que o grande projeto foi cancelado [great_project.GetName]."
 tgp_china_ministry.0006.a: "Que pena."
 tgp_china_ministry.0007.t: "$tgp_china_ministry.0001.t$"
 tgp_china_ministry.0007.desc: "$tgp_china_ministry.0001.desc$"
 tgp_china_ministry.0007.a: "$tgp_china_ministry.0001.a$"
 tgp_china_ministry.0100.t: "A Tesouraria [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip]"
 tgp_china_ministry.0100.intro: "Chegou a hora de revisar o orçamento [ROOT.Char.Custom('GetRealmRank')]."
 tgp_china_ministry.0100.steward_desc: "[steward.GetShortUIName] está diante de mim, com a testa franzida, livro de contas na mão. Uma pequena tropa de ajudantes o segue, carregando pergaminhos, tomos e notas fiscais.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U]. #EMP Debemos#! revisar nossas despesas e preparar um novo orçamento para o tesouro. Temo que este assunto não possa esperar."
 tgp_china_ministry.0100.solo_desc: "Vejo-me cercad[ROOT.Char.Custom('ES_OA')] por uma pequena tropa de assistentes, carregados com pergaminhos, tomos e notas fiscais. Todos esperam que eu termine minha revisão.\n\n"
 tgp_china_ministry.0100.income_desc: "Nossos rendimentos atuais superam em muito nossos gastos."
 tgp_china_ministry.0100.deficit_desc: "Nossos gastos são grandes demais, e o tesouro entrará em colapso se não agirmos."
 tgp_china_ministry.0100.fallback_desc: "Faz vários anos desde que o último orçamento entrou em vigor."
 tgp_china_ministry.0100.a: "Muito bem. Vamos definir um novo orçamento."
 tgp_china_ministry.0100.b: "Mantenha as mesmas alocações."
 tgp_china_ministry.0100.c: "Confio em seu julgamento neste assunto."
 tgp_china_ministry.0100.a_tooltip: "Você pode escolher um [treasury_budget|lE] entre várias opções"
 single_quotation_desc: "\""
 tgp_china_ministry.0101.desc: "Vários documentos com propostas estão diante de mim, cada um traçando um rumo diferente para o tesouro: onde gastar e onde apertar o cinto.\n\nQual devo escolher?"
 tgp_china_ministry.0101.a: "Os salários devem ser nosso foco principal."
 tgp_china_ministry.0101.b: "Certifique-se de que todos os ministros recebam uma parte considerável."
 tgp_china_ministry.0101.c: "Um exército forte é um reino forte."
 tgp_china_ministry.0101.d: "Reservem uma porção maior apenas para uso imperial."
 tgp_china_ministry.0101.e: "Uma economia equilibrada nos servirá melhor."
 tgp_treasury_enact_salary_budget_info_desc: "Foco da [treasury_budget_category|El] : [treasury_salary_budget_short|lE] @gold_icon!\nUma [treasury_budget|El] que normalmente agrada aos [governors|El] e podem ganhar opinião se a nova alocação melhorar seus salários."
 tgp_treasury_enact_ministry_budget_info_desc: "Foco da [treasury_budget_category|lE] de: [treasury_ministry_budget_short|lE] @government_type_celestial!\nUm [treasury_budget|El] que costuma agradar aos [ministers|El], que ganham fundos adicionais que podem gastar em suas respectivas responsabilidades, como iniciar [great_projects|El]"
 tgp_treasury_enact_military_budget_info_desc: "Foco da [treasury_budget_category|El] de [treasury_military_budget_short|lE] @celestial_military_administration!\nUm [treasury_budget|El] que geralmente agrada aos [governors|El] militares, que recebem fundos adicionais para recrutar e manter [title_men_at_arms|El]"
 tgp_treasury_enact_hegemon_budget_info_desc: "Enfoque de la [treasury_budget_category|El]: [son_of_heaven|E] @legitimacy_icon_mandate!\nUn [treasury_budget|El] que deja una mayor parte del [treasury|El] sin asignar, lo que permite al [liege|lE] gastarlo como crea conveniente"
 tgp_treasury_enact_balanced_budget_info_desc: "Enfoque da [treasury_budget_category|El]; equilibrado @law_icon!\nUm [treasury_budget|El] que se esforça por distribuir o [treasury|El] de maneira equitativa entre todas as categorias"
 tgp_treasury_enact_salary_budget_desc: "Promulgar un [treasury_budget|lE] con estas reglas:\n#indent_newline:4 $TAB$$EFFECT_LIST_BULLET$El [treasury_salary_budget|lE] se fija al [GetLaw('budget_allocation_salary_45').GetShortName|V]\n$EFFECT_LIST_BULLET$El [treasury_ministry_budget|lE] se fija al [GetLaw('budget_allocation_ministry_25').GetShortName|V]\n$EFFECT_LIST_BULLET$El [treasury_military_budget|lE] se fija al [GetLaw('budget_allocation_military_20').GetShortName|V]#!"
 tgp_treasury_enact_ministry_budget_desc: "Promulgar un [treasury_budget|lE] con estas reglas:\n#indent_newline:4 $TAB$$EFFECT_LIST_BULLET$El [treasury_salary_budget|lE] se fija al [GetLaw('budget_allocation_salary_25').GetShortName|V]\n$EFFECT_LIST_BULLET$El [treasury_ministry_budget|lE] se fija al [GetLaw('budget_allocation_ministry_45').GetShortName|V]\n$EFFECT_LIST_BULLET$El [treasury_military_budget|lE] se fija al [GetLaw('budget_allocation_military_20').GetShortName|V]#!"
 tgp_treasury_enact_military_budget_desc: "Promulgar un [treasury_budget|lE] con estas reglas:\n#indent_newline:4 $TAB$$EFFECT_LIST_BULLET$El [treasury_salary_budget|lE] se fija al [GetLaw('budget_allocation_salary_30').GetShortName|V]\n$EFFECT_LIST_BULLET$El [treasury_ministry_budget|lE] se fija al [GetLaw('budget_allocation_ministry_20').GetShortName|V]\n$EFFECT_LIST_BULLET$El [treasury_military_budget|lE] se fija al [GetLaw('budget_allocation_military_40').GetShortName|V]#!"
 tgp_treasury_enact_hegemon_budget_desc: "Promulgar un [treasury_budget|lE] con estas reglas:\n#indent_newline:4 $TAB$$EFFECT_LIST_BULLET$El [treasury_salary_budget|lE] se fija al [GetLaw('budget_allocation_salary_30').GetShortName|V]\n$EFFECT_LIST_BULLET$El [treasury_ministry_budget|lE] se fija al [GetLaw('budget_allocation_ministry_25').GetShortName|V]\n$EFFECT_LIST_BULLET$El [treasury_military_budget|lE] se fija al [GetLaw('budget_allocation_military_25').GetShortName|V]#!"
 tgp_treasury_enact_balanced_budget_desc: "Promulgar un [treasury_budget|lE] con estas reglas:\n#indent_newline:4 $TAB$$EFFECT_LIST_BULLET$El [treasury_salary_budget|lE] se fija al [GetLaw('budget_allocation_salary_35').GetShortName|V]\n$EFFECT_LIST_BULLET$El [treasury_ministry_budget|lE] se fija al [GetLaw('budget_allocation_ministry_30').GetShortName|V]\n$EFFECT_LIST_BULLET$El [treasury_military_budget|lE] se fija al [GetLaw('budget_allocation_military_25').GetShortName|V]#!"
 tgp_treasury_enact_meritocratic_salary_budget_desc: "Promulgar un [treasury_budget|lE] con estas reglas:\n#indent_newline:4 $TAB$$EFFECT_LIST_BULLET$El [treasury_salary_budget|lE] se fija al [GetLaw('budget_allocation_salary_55').GetShortName|V]\n$EFFECT_LIST_BULLET$El [treasury_military_budget|lE] se fija al [GetLaw('budget_allocation_military_35').GetShortName|V]#!"
 tgp_treasury_enact_meritocratic_military_budget_desc: "Promulgar un [treasury_budget|lE] con estas reglas:\n#indent_newline:4 $TAB$$EFFECT_LIST_BULLET$El [treasury_salary_budget|lE] se fija al [GetLaw('budget_allocation_salary_35').GetShortName|V]\n$EFFECT_LIST_BULLET$El [treasury_military_budget|lE] se fija al [GetLaw('budget_allocation_military_55').GetShortName|V]#!"
 tgp_treasury_enact_meritocratic_balanced_budget_desc: "Promulgar un [treasury_budget|lE] con estas reglas:\n#indent_newline:4 $TAB$$EFFECT_LIST_BULLET$El [treasury_salary_budget|lE] se fija al [GetLaw('budget_allocation_salary_45').GetShortName|V]\n$EFFECT_LIST_BULLET$El [treasury_military_budget|lE] se fija al [GetLaw('budget_allocation_military_45').GetShortName|V]#!"
 tgp_china_ministry.0200.t: "O orçamento de um Tesoureiro"
 tgp_china_ministry.0200.desc: "Mais uma vez, meu [minister_of_revenue.GetCouncilTitle|l], [minister_of_revenue.GetFirstName], está diante de mim, livro-caixa em mãos.\n\n"Asseguro-vos, [ROOT.Char.Custom('FormOfAddressForLiege')] — o tesouro florescerá se seguirmos minha sugestão!"."
 tgp_china_ministry.0200.a: "Excelente. Coloque-a em vigor imediatamente!"
 tgp_china_ministry.0200.b: "Receio que tenho outros planos para o Tesouro."
 tgp_china_ministry.0200.toast_t_success: "Orçamento aceito"
 tgp_china_ministry.0200.toast_desc_success: "[treasury_ruler.GetShortUIName|U] aprovou sua proposta"
 tgp_china_ministry.0200.toast_t_failure: "Orçamento rejeitado"
 tgp_china_ministry.0200.toast_desc_failure: "[treasury_ruler.GetShortUIName|U] rejeitou sua proposta"
