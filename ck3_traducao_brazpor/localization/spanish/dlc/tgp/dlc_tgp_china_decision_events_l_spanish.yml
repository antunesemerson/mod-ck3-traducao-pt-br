l_spanish:
 ##################################################
 # CHINA CHILD EXAMINATION DECISION EVENTS
 ##################################################
 # SUCCESS CHANCE VALUES
 exam_success_chance.tgp_local_exam_initial_success: "Começo forte na avaliação"
 exam_success_chance.tgp_local_exam_impressed_examiner: "Examinador impressionado"
 exam_success_chance.tgp_local_exam_strong_finish: "Final de exame potente"
 examiner_takes_bribes_tt: "Você obtém esta opção devido aos traços do examinador"
 tgp_china_decision.1000.t: "Exame Infantil: Início"
 tgp_china_decision.1000.desc_new: "Cheguei à minha primeira prova. A reputação da minha família depende das minhas conquistas aqui hoje. Nestes salões, verdadeiras fontes de conhecimento, sinto como se meus antepassados estivessem observando, esperando para ver o que será de mim."
 tgp_china_decision.1000.desc_returning: "Estou mais uma vez no salão de estudos local, aguardando o julgamento dos astutos eruditos do reino. Neste impressionante salão de estudos, o peso de cada pergaminho e de cada pedaço de conhecimento contido nele pesa fortemente sobre meus ombros."
 tgp_china_decision.1000.desc_outro: "\n\n[examiner.Custom('ES_ElLa')|U] examinante, [examiner.Custom('ES_ElLa')] [examiner.GetTitledFirstName|l], me pedirá que recite alguns trechos dos clássicos. Ensaiei esses textos até poder vê-los com os olhos fechados.\n\nPor fim chega a minha vez de me aproximar do estrado."
 tgp_china_decision.1000.a: "Darei tudo de mim!"
 tgp_china_decision.1000.b: "Não farei mais do que o necessário."
 tgp_china_decision.1001.t_success: "Exame das Crianças: Sucesso!"
 tgp_china_decision.1001.t_fail: "Exame infantil: fracasso!"
 tgp_china_decision.1001.desc_success: "Uma calma me toma enquanto recito cada palavra, pronunciando-as com clareza perfeita. Parece quase fácil."
 tgp_china_decision.1001.desc_safe: "Olho para os meus pés, sem me arriscar nem a lançar um olhar a [examiner.Custom('ES_AlAla')] examinante por medo de desagradá-l[examiner.GetHerHim]. Minha recitação é breve, pois a apresso para esconder qualquer erro."
 tgp_china_decision.1001.desc_fail: "Meu rosto esquenta ao perceber que perdi o fio da passagem. Levanto o olhar para [examiner.Custom('ES_ElLa')] examinante e seu olhar fulminante me sufoca até me calar."
 tgp_china_decision.1001.desc_outro: "\n\n[examiner.Custom('ES_ElLa')|U] o examinador segue imediatamente com outro trecho para eu encarar, sem me dar tempo de me situar."
 tgp_china_decision.1001.a: "Preciso fazer isso #EMP bien#!."
 tgp_china_decision.1001.b: "Não vou me esforçar."
 tgp_china_decision.1002.t_success: "Exame infantil: sucesso!"
 tgp_china_decision.1002.t_fail: "Exame infantil: fracasso!"
 tgp_china_decision.1002.desc_success: "As palavras saem livremente dos meus lábios e, por um momento, acho ter visto os cantos da boca [examiner.Custom('ES_DelDela')] da examinante se contraírem. Ela acabou de sorrir? Impossível!"
 tgp_china_decision.1002.desc_safe: "Recito o mínimo possível para evitar cometer erros desnecessários. Arriscando olhar para [examiner.Custom('ES_AlAla')] examinante e vejo uma expressão entediada com minha atuação engessada."
 tgp_china_decision.1002.desc_fail: "Minhas palmas suam enquanto começo a me atrapalhar nas palavras. Não consigo me lembrar de nem uma única frase! Se ao menos a terra pudesse me engolir."
 tgp_china_decision.1002.desc_outro: "\n\nOutra vez. Não me oferece trégua. [examiner.Custom('ES_ElLa')|U] examinante fixa o olhar em mim e pede a próxima seção."
 tgp_china_decision.1002.a: "Tudo se resume a isso!"
 tgp_china_decision.1002.b: "Mantenhamos a calma…"
 tgp_china_decision.1005.t: "Lista de resultados"
 tgp_china_decision.1005.desc: "Finalizo o exame com"
 tgp_china_decision.1005.desc.success: "o moral elevado."
 tgp_china_decision.1005.desc.safe: "um suspiro de alívio."
 tgp_china_decision.1005.desc.failure: "moral baixa."
 tgp_china_decision.1005.desc.segway: "\n\nAo voltar para a fila de candidatos, percebo que as outras crianças ao meu redor são todas desconhecidas. Teria sido bom ver pelo menos um rosto familiar enquanto espero meu veredicto, para tornar a espera suportável. \n\nMuito mais tarde, os resultados são divulgados e corro até o quadro de avisos para ver que eu"
 tgp_china_decision.1005.desc.high_score: "foi muito bem no exame! Minha família ficará orgulhosa."
 tgp_china_decision.1005.desc.good_score: "tirou boas notas no exame."
 tgp_china_decision.1005.desc.passing_score: "aprovado no exame."
 tgp_china_decision.1005.desc.failing: "foi reprovado no exame."
 tgp_china_decision.1005.a_success: "Vou me esforçar ainda mais da próxima vez."
 tgp_china_decision.1005.a: "Eu só desejo honrar meus pais."
 tgp_china_decision.1005.b: "Meus excelentes professores merecem todo o crédito!"
 tgp_china_decision.1005.a_failure: "Voltarei."
 tgp_china_decision.1005.b_passing: "Este resultado me satisfaz."
 tgp_china_decision.1005.b_failed: "Que humilhação."
 provincial_exam_close_family_passed: "[GetPlayer.Custom2('RelationToMeShort', ROOT.Char)|U] passou no exame provincial"
 msg_provincial_exam_close_family_passed_desc: "[ROOT.Char.GetShortUIName|U] concluiu com sucesso o exame de nível inferior em [ROOT.Char.GetCurrentLocation.GetName]"
 provincial_exam_close_family_failed: "[GetPlayer.Custom2('RelationToMeShort', ROOT.Char)|U] falhou no Exame Provincial"
 msg_provincial_exam_close_family_failed_desc: "[ROOT.Char.GetShortUIName|U] tentou provar seu valor no exame de nível mais baixo em [ROOT.Char.GetCurrentLocation.GetName] e falhou"
