l_spanish:
 ###Disbelieve Mandala Scheme
 # Ongoing Events
 disbelieve_mandala_ongoing.0001.t: "$disbelieve_mandala$: Não há milagres"
 disbelieve_mandala_ongoing.0001.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('agent'))] , [agent.GetName] se aproxima de mim na escuridão da noite, sussurrando um plano perverso.\n\n«Pelos barracos do mercado e os pátios dos templos. Um mercador aqui, um servo ali, todos repetirão em voz baixa as mesmas histórias sobre [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l]».\n\n«Dirão que o milagre do rio não passava de um truque da correnteza e da luz das lanternas, e que viram o mendigo curado recebendo moedas de um cortesão que passava»."
 disbelieve_mandala_ongoing.0001.a: "Um plano brilhante, [agent.GetFirstNameNoTooltip]!"
 disbelieve_mandala_ongoing.0001.a.crit_success: "Acredita-se que os milagres sejam seus"
 disbelieve_mandala_ongoing.0001.a.success: "Diz-se que os milagres são falsos"
 disbelieve_mandala_ongoing.0001.a.failure: "Seu agente é descoberto"
 disbelieve_mandala_ongoing.0001.a.failure.breach: "#alert_trial @alert_icon! o [my_scheme.GetName] ganha #V 1#! [scheme_breach|lE]#!"
 disbelieve_mandala_ongoing.0001.b: "Não vale o risco."
 scheme_fake_miracles: "Milagres falsos"
 scheme_fake_miracles_desc: "Os atos milagrosos do seu alvo são vistos como meras coincidências."
 disbelieve_mandala_ongoing.0010.t: "$disbelieve_mandala$: nada mais que uma falsificação"
 disbelieve_mandala_ongoing.0010.desc: "«Poderíamos colocar uma relíquia», sugere meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spymaster'))] , [spymaster.GetName] , depois de insistir para nos encontrarmos no gabinete.\n\n«Uma falsa, forjada com muito cuidado, no santuário [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l]. Vamos deixá-la ser #EMP encuentre#! e depois se revelará como uma fraude: o povo duvidará dos milagres, o clero murmurará e sua aura sagrada ruirá»."
 disbelieve_mandala_ongoing.0010.a: "Tal #EMP [fake_relic.GetNameNoTooltip|l]#! parece quase real."
 disbelieve_mandala_ongoing.0010.a.success: "A conspiração tem sucesso"
 disbelieve_mandala_ongoing.0010.a.failure: "Seu agente é descoberto"
 disbelieve_mandala_ongoing.0010.b: "[target.Custom('ES_ElLa')|U] [target.GetTitledFirstNameNoTooltip|l] não é idiota."
 rival_planted_fake_artifact: "[CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'tentaste', 'tentou' )] colocar uma rel?quia falsa na corte de [TARGET_CHARACTER.LocalPlayerString( 'seu personagem', TARGET_CHARACTER.GetShortUIName )]."
 rival_planted_fake_artifact_corresponding: "$rival_planted_fake_artifact$"
 #Outcome Events
 scheme_critical_moments.1212.t: "[scheme.GetNameNoTooltip]: Sucesso"
 scheme_critical_moments.1212.desc: "Gretas suficientes despedaçariam qualquer coisa.\n\nMeus esforços para semear o ceticismo em relação à natureza divina [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] deram frutos, e agora não se pode mencionar seu nome sem que ao menos um membro da conversa pergunte o quão verdadeiros são os rumores sobre seus atos ardilosos e suas inconsistências incompetentes."
 scheme_critical_moments.1212.desc_discovered: "\n\nE mesmo que [target.GetFirstNameNoTooltip] saiba da minha participação, pouco importa! Em breve o mundo conhecerá [Select_CString(ROOT.Char.IsFemale, 'a la única y verdadera', 'al único y verdadero' )] devaraja: eu!"
 scheme_critical_moments.1212.desc_secret: "\n\n[target.GetFirstNameNoTooltip] continua perplex[target.Custom('ES_OA')] pelo ódio que recebe, totalmente sem ideia da minha participação!"
 scheme_critical_moments.1212.a: "Era a coisa certa a fazer."
 scheme_critical_moments.1213.t: "[scheme.GetNameNoTooltip]: Falha"
 scheme_critical_moments.1213.desc: "Nada. Meses de planejamento e conspirações, espalhando boatos e pagando subornos… e ainda assim a divindade de [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] continua tão inexpugnável como sempre!"
 scheme_critical_moments.1213.desc_discovered: "\n\nE para piorar ainda mais tudo isso, não só desperdicei tempo e recursos, como [target.GetFirstNameNoTooltip] também tomou conhecimento das minhas intenções tão mal executadas!"
 scheme_critical_moments.1213.desc_secret: "\n\nAo menos, [target.GetFirstNameNoTooltip] não percebeu absolutamente nada do que estava acontecendo…"
 scheme_critical_moments.1213.a: "É apenas um pequeno revés…"
 scheme_critical_moments.1214.t: "Mandala desacreditado"
 scheme_critical_moments.1214.desc: "Tudo começa com um olhar. Esse estranho olhar de #EMP vacilación#!? Quando lhes ordeno fazer algo em nome da divindade, hesitam um momento a mais do que deveriam. Os servos sussurram sobre minhas falhas, os defeitos que provam que, de fato, sou humano e não divino.\n\nComo ousam. Provarei que estão errados. Preciso fazê-lo."
 scheme_critical_moments.1214.desc_discovered: "\n\nE, para piorar a situação, meus agentes têm certeza: foi [owner.Custom('ES_ElLa')] [owner.GetTitledFirstName|l] quem orquestrou essa descrença na minha divindade…"
 scheme_critical_moments.1214.a: "Que inquietante…"
 scheme_critical_moments.1215.t: "Mandala inquebrável"
 scheme_critical_moments.1215.desc: "Rumores falsos e sussurros nefastos tentam minar minha autoridade. Tentam fazer de #EMP mí#! algo menos que um ser divino.\n\nMeus seguidores não tolerarão isso, e minha estatura está segura. Por enquanto."
 scheme_critical_moments.1215.desc_discovered: "No entanto, meus agentes estão certos: foi [owner.Custom('ES_ElLa')] [owner.GetTitledFirstName|l] quem orquestrou essa descrença em minha divindade…"
 scheme_critical_moments.1215.a: "Como se atrevem!"
 scheme_critical_moments.1215.a_discovered: "Maldito[inspiration_sponsor.Custom('ES_OA')] [owner.Custom2('InsultNoun', ROOT.Char)]!"
 ###Coerce Tributary Events
 scheme_critical_moments.1222.t: "[scheme.GetNameNoTooltip]: Sucesso"
 scheme_critical_moments.1222.desc: "Minhas provações e tribulações foram um sucesso! Tanto tempo dedicado a desgastar [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] até que, enfim, ele/ela caiu em si e deseja se pôr sob minha suserania.\n\nGovernarei com esplendor e graça!"
 scheme_critical_moments.1222.a: "Mais um tributário para o chamado!"
 scheme_critical_moments.1223.t: "[scheme.GetNameNoTooltip]: fracasso"
 scheme_critical_moments.1223.intro: "Sem sucesso. Todo esse meu trabalho, para quê?"
 scheme_critical_moments.1223.desc: "[target.Custom('ES_ElLa')|U] [target.GetTitledFirstName|l] rejeitou minhas investidas, insistindo que estará melhor por conta própria. Veremos sobre isso."
 scheme_critical_moments.1223.desc_suzerain: "[target.Custom('ES_ElLa')|U] [target.GetTitledFirstName|l] rejeitou minhas investidas, citando a superioridade [target.GetSuzerain.Custom('ES_DelDela')] [target.GetSuzerain.GetTitledFirstName] como seu únic[target.GetSuzerain.Custom('ES_OA')] líder. Que estupidez."
 scheme_critical_moments.1223.a: "Bah. Encontrarei seguidores mais dignos!"
 scheme_critical_moments.1224.t: "[scheme.GetNameNoTooltip]: Sucesso"
 scheme_critical_moments.1224.desc: "Chegou a hora. O momento em que [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l] deixar o redil [target.GetSuzerain.Custom('ES_DelDela')] [target.GetSuzerain.GetTitledFirstName|l] está próximo. A [target.GetFirstNameNoTooltip] só lhe resta informar [target.GetSuzerain.Custom('ES_AlAla')] [target.GetSuzerain.GetTitledFirstNameNoTooltip|l] sobre como está a situação e então receberei meu tributo…\n\nCom sorte, [target.GetSuzerain.Custom('ES_ElLa')] [target.GetSuzerain.GetTitledFirstNameNoTooltip|l] será um[target.GetSuzerain.Custom('ES_XA')] governante honrado e [target.GetHerHim] o deixará partir com um[ROOT.Char.Custom('ES_XA')] soberano[ROOT.Char.Custom('ES_OA')] mais #EMP adecuad[ROOT.Char.Custom('ES_OA')]#!."
 scheme_critical_moments.1224.a: "Mal posso esperar!"
 scheme_critical_moments.1225.t: "Tributário, Interrompido"
 scheme_critical_moments.1225.desc: "O enviado do meu tributári[target.Custom('ES_OA')], [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l], chega à minha corte e a mensagem é clara.\n\nEssa espécie de[owner.Custom2('InsultNoun', ROOT.Char)], [owner.Custom('ES_ElLa')] [owner.GetTitledFirstName|l], tem distorcido as ideias de[target.Custom('ES_DelDela')] pobre [target.GetTitledFirstNameNoTooltip|l] para voltar[target.GetHerHim] contra mim, e agora deseja #EMP abandonar#! meu rebanho, retirar o tributo e rejeitar minha soberania."
 scheme_critical_moments.1225.a: "É melhor eu apresentar alguns #EMP incentivos…#!"
 scheme_critical_moments.1225.b: "#EMP Eso ya lo veremos.#!"
 scheme_potential_suzerain_might_join_war_tt: "\n@alert_icon! #alert_trial ¡[CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'puedes', 'puede' )] convertir[Select_CString( CHARACTER.IsLocalPlayer, 'te', 'se' )] en [Concept('suzerain',Select_CString(CHARACTER1.IsFemale,'soberana', 'soberano'))|E] de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'tu personaje', TARGET_CHARACTER.GetShortUIName)] y [Select_CString( CHARACTER.IsLocalPlayer, 'puedes', 'puede' )] unir[Select_CString( CHARACTER.IsLocalPlayer, 'te', 'se' )] a la guerra como defensor!#!"
 scheme_critical_moments.1225.c: "Está tudo bem."
 scheme_critical_moments.1226.t_incentivizing: "[scheme.GetNameNoTooltip]: às vezes se ganha, às vezes se perde"
 scheme_critical_moments.1226.t_warring: "[scheme.GetNameNoTooltip]: unindo forças"
 scheme_critical_moments.1226.t: "[scheme.GetNameNoTooltip]: Soltando"
 scheme_critical_moments.1226.desc_incentivizing: "A carta [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] indica uma situação lamentável. [incentivizing_suzerain.Custom('ES_ElLa')|U] [incentivizing_suzerain.GetTitledFirstName|l] fez #EMP incentivado#! esse tipo de [owner.Custom2('InsultNounClumsy', ROOT.Char)] ancestral para que continue ao seu lado, pelo menos por mais um #EMP tiempo#!…\n\n e [incentivizing_suzerain.Custom('ES_EA')] falso[incentivizing_suzerain.Custom('ES_OA')] «devaraja» [incentivizing_suzerain.GetFirstNameNoTooltip] teve de pagar alguns dividendos, na falta de verdadeira divindade.\n\nTalvez da próxima vez [target.GetFirstNameNoTooltip] veja a luz e se junte ao meu rebanho."
 scheme_critical_moments.1226.desc_warring: "[dummy_envoy.Custom('ES_ElLa')|U] enviado[dummy_envoy.Custom('ES_OA')] [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l] entra correndo no salão da minha corte: «Guerra!», grita. «Guerra! «[warring_suzerain.Custom('ES_ElLa')|U] [warring_suzerain.GetTitledFirstName|l] assumiu pessoalmente a tarefa de corrigir pela #EMP fuerza#! o lapso momentâneo de julgamento do meu [target.GetLadyLord]!».\n\nAinda atordoad[dummy_envoy.Custom('ES_OA')], se inclina aos meus pés: «Por favor, por favor, #EMP ayudadnos!#!».\n\nUm arrepio me percorre a espinha. Guerra?"
 scheme_critical_moments.1226.desc: "Suserano Dobrado"
 scheme_critical_moments.1226.a: "\"Ao resgate!\""
 scheme_critical_moments.1226.b: "Bem, então…"
 scheme_critical_moments.1226.b_warring: "\"Não me inscrevi para nenhuma #EMP guerra#!\""
 scheme_critical_moments.1226.b_incentivizing: "Ah, bem. Mas me saí bem."
 coerce_and_leverage_contribution_ongoing.0001.t: "[my_scheme.GetNameNoTooltip]: cada um de vocês"
 coerce_and_leverage_contribution_ongoing.0001.desc.intro: "Faço uma visita a [target_county.GetName] em uma tentativa de conseguir que seus habitantes contribuam para meu grande projeto de [ROOT.Char.GetFaith.HouseOfWorship].\n\n"
 coerce_and_leverage_contribution_ongoing.0001.desc.high_dev: "As barracas que vendem [ROOT.Char.Custom('GetExpensiveMeal')] me atraem com um aroma delicioso."
 coerce_and_leverage_contribution_ongoing.0001.desc.low_dev: "Os moradores locais lotam sua [ROOT.Char.Custom('GetSquareCommons')], cercados por [ROOT.Char.Custom('GetCrookedhousesDelapidatedtents')] e comerciantes tentando se livrar de seus [ROOT.Char.Custom('get_region_root_vegetable_plural')] em estado mais apodrecido."
 coerce_and_leverage_contribution_ongoing.0001.desc.regular_dev: "Os comerciantes que vendem [ROOT.Char.Custom('GetTradeGoods')] fazem negócios com visitantes desprevenidos."
 coerce_and_leverage_contribution_ongoing.0001.desc.outro: "\n\n\"Ouçam, ouçam! Para o [peasant.Custom('dummy_peasant_profession')] e o [peasant.Custom2('dummy_peasant_profession', peasant)]! Tudo isso pode ser seu por apenas a mais #EMP diminuta#! quantidade de ouro!\"."
 coerce_and_leverage_contribution_ongoing.0001.a: "Esta gente pode dispensar uma moeda."
 coerce_and_leverage_contribution_ongoing.0001.b: "Eles têm dificuldades maiores."
 coerced_contribution_county_modifier: "Contribuições voluntárias"
 coerced_contribution_county_modifier_desc: "Os habitantes deste condado foram convidados à força a contribuir para um grande projeto."
 scheme_coerced_subjects_modifier: "$coerced_contribution_county_modifier$"
 scheme_coerced_subjects_modifier_desc: "$coerced_contribution_county_modifier_desc$"
 spared_contribution_county_modifier: "Contribuição poupada"
 spared_contribution_county_modifier_desc: "Os habitantes deste condado foram dispensados de suas obrigações monetárias para com um grande projeto."
 coerce_and_leverage_contribution_ongoing.0010.t: "[my_scheme.GetNameNoTooltip]: salvação em ouro"
 coerce_and_leverage_contribution_ongoing.0010.desc: "O aroma de [ROOT.Char.GetCurrentLocation.Custom('get_region_flower_type_plural')] me dá os bons dias, o ar está cheio do sentimento [ROOT.Char.Custom('GetSeasonAdj')] de [ROOT.Char.Custom('GetSeason')].\n\n[ROOT.Char.Custom('FormOfAddressForLiege')|U], o peso de erguer um/a [ROOT.Char.GetFaith.HouseOfWorship] é pesado, meu/minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('court_chaplain'))], [court_chaplain.GetName], se aproxima de mim, sorrindo [court_chaplain.Custom('quirk_pos_adverb')]. Mas os fiéis podem ser tocados pela promessa de um favor celestial.\n\nSe assim decretarmos, aqueles que se oferecerem para contribuir receberão bênçãos além do comum."
 coerce_and_leverage_contribution_ongoing.0010.aa: "\"A #EMP mí#! me agradariam tais bênçãos\"."
 coerce_and_leverage_contribution_ongoing.0010.a: "\"Faça isso\"."
 coerce_and_leverage_contribution_ongoing.0010.b: "Isto não merece sua atenção."
 coerce_and_leverage_contribution_ongoing.0020.t: "[my_scheme.GetNameNoTooltip]: O valor de uma promessa"
 coerce_and_leverage_contribution_ongoing.0020.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('servant'))], [servant.GetName] se curva, [servant.Custom('GetWritingMaterialPlural')] em mãos.\n\n\"Os cofres para a/o [ROOT.Char.GetFaith.HouseOfWorship] se enchem devagar demais\", anuncia [servant.Custom('quirk_pos_pp')].\n\n\"Mas as palavras podem comprar o que a moeda não consegue. Talvez uma carta [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l], com uma promessa tentadora, possa persuadir sua vontade a ajudar…\"."
 coerce_and_leverage_contribution_ongoing.0020.aa: "Uma promessa não precisa ser verdadeira…"
 coerce_and_leverage_contribution_ongoing.0020.a: "\"Apresai-vos em escrever!\""
 coerce_and_leverage_contribution_ongoing.0020.b: "\"Só mencionem que eu apreciaria sua generosidade\"."
 scheme_promised_hook_modifier: "Gancho prometido"
 scheme_promised_hook_modifier_desc: "O instigador desta trama prometeu um gancho ao seu alvo… Se era real ou não, só o dono sabe."
 #OPINIONS
 coerced_my_tributary_opinion: "Coagir meu tributário"
 coerced_tributary_opinion: "Tributário coagido"
 #Coerce Contribution Outcomes
 scheme_critical_moments.1242.t: "[scheme.GetNameNoTooltip]: Sucesso"
 scheme_critical_moments.1242.desc: "Sempre soube que podia contar com a ajuda do povo trabalhador de [target_title.GetBaseNameNoTierNoTooltip]. Por uma causa maior, e para celebrar seu governante, eles tiraram figurativamente as roupas do corpo para financiar meu complexo de templos.\n\nQue encantador."
 scheme_critical_moments.1242.a: "Bom, bom…"
 scheme_critical_moments.1243.t: "[scheme.GetNameNoTooltip]: fracasso"
 scheme_critical_moments.1243.desc: "Em [target_title.GetBaseNameNoTier] há um bando de gente muito [owner.Custom('InsultNoun')] que se recusa a cair na razão e rejeita energicamente meus pedidos para contribuir com meu #EMP grandioso#! projeto.\n\nCitam a #EMP falta de fondos#! como motivo. Que tolice! Quando há vontade, há um jeito!"
 scheme_critical_moments.1243.a: "Que insolência!"
 insusceptible_to_coerce_contribution_modifier: "Imune à coação"
 insusceptible_to_coerce_contribution_modifier_desc: "Este condado discorda de ser forçado a financiar um complexo de templos na capital."
 #Coerce Contribution Outcomes
 scheme_critical_moments.1252.t: "[scheme.GetNameNoTooltip]: Sucesso"
 scheme_critical_moments.1252.desc: "Sempre soube que podia contar com a ajuda [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l]! Meus encantos, minha persuasão e meus debates deram frutos. Ela concordou gentilmente em investir no meu projeto, fazendo de tudo para tornar meu templo ainda mais glorioso.\n\nA transcendência está cada vez mais próxima…"
 scheme_critical_moments.1252.a: "Maravilhoso!"
 scheme_critical_moments.1253.t: "[scheme.GetNameNoTooltip]: Fracasso"
 scheme_critical_moments.1253.desc: "Entro no aposento com os punhos cerrados de frustração, essa espécie de [target.Custom('InsultNoun')] que é [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l] se recusa a cair em razão. Será que eu não debati, argumentei, #EMP influido#! em seu círculo mais íntimo?!\n\nDiz que outros #EMP inversiones más inmediatas#! têm prioridade em vez do meu #EMP magnífico#! projeto. Eu esperava mais de [target.GetSheHe]. Não será a última vez que ele vai ouvir falar disso…"
 scheme_critical_moments.1253.a: "Tsc, tsc…"
 insusceptible_to_leverage_contribution_modifier: "Insensível à influência"
 insusceptible_to_leverage_contribution_modifier_desc: "Este personagem não abre nem a bolsa nem o coração para financiar contribuições."
 unlock_coerce_tributary_scheme_tt: "Requer nível #V 2#! do [aspect_of_trickery|lE]"
 coerce_tributary_ongoing.0001.t: "[my_scheme.GetNameNoTooltip]: estradas fechadas"
 coerce_tributary_ongoing.0001.desc: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U]!\". Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('steward'))], [steward.GetName] está diante de mim com o maior dos sorrisos.\n\n\"Eu… #EMP encontrado#! um antigo documento que nos permite exigir [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l] tarifas maiores se quiser usar nossas estradas. No entanto, precisarei de fundos para enviar uma pequena delegação a [capital.GetName]\"."
 coerce_tributary_ongoing.0001.a: "[target.GetFirstNameNoTooltip] aprenderá o quanto custa se opor a nós."
 coerce_tributary_ongoing.0001.a.success: "[target.GetShortUIName] aceita pagar"
 coerce_tributary_ongoing.0001.a.failure: "[target.GetShortUIName] não cede"
 coerce_tributary_ongoing.0001.b: "O tempo fará o trabalho por nós."
 scheme_extra_tariffs: "Tarifas extras"
 scheme_extra_tariffs_desc: "O líder da trama convenceu seu alvo de que, se ele não se tornar voluntariamente seu tributário, haverá #EMP muchos más#! inconvenientes."
 coerce_tributary_ongoing.0010.t: "[my_scheme.GetName]: negociações agressivas"
 coerce_tributary_ongoing.0010.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('marshal'))], [marshal.GetName], se inclina; o suor ainda escorre pela sua testa depois de treinar os [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')].\n\n\"[ROOT.Char.Custom('FormOfAddressForLiege')|U]\", começa, \"foram gastadas palavras demais tentando convencer [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l]. O tributo não é implorado — é tomado\".\n\nFecha o punho.\n\n\"Permita-me marchar com alguns dos meus guerreiros até os portões de [capital.GetName]\"."
 coerce_tributary_ongoing.0010.a: "\"Faça isso!\""
 coerce_tributary_ongoing.0010.a.success: "Convence a [target.GetShortUIName]"
 coerce_tributary_ongoing.0010.a.failure: "[target.GetShortUIName] se ofende muito"
 coerce_tributary_ongoing.0010.b: "Não há por que irritar [target.Custom('ES_AlAla')] [target.GetTitledFirstNameNoTooltip|l]."
 rival_tried_to_intimidate: "[TARGET_CHARACTER.GetShortUIName|U] [TARGET_CHARACTER.LocalPlayerString( 'tentaste', 'tentou' )] intimidar [CHARACTER.GetShortUIName] para que [Select_CString(CHARACTER.IsLocalPlayer, 'te convertesses', 'se convertesse')] em [Select_CString(CHARACTER.IsLocalPlayer, 'teu', 'seu')] tributári[TARGET_CHARACTER.Custom('ES_OA')]."
 rival_tried_to_intimidate_corresponding: "[Select_CString( CHARACTER.IsLocalPlayer, 'Seu personagem', CHARACTER.GetShortUIName )] foi intimidad[CHARACTER.Custom('ES_OA')] por [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'voc?', TARGET_CHARACTER.GetShortUIName )] para [Select_CString(CHARACTER.IsLocalPlayer, 'se tornar', 'se tornar')] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'seu', 'seu')] tribut?ri[CHARACTER.Custom('ES_OA')]."
 scheme_tribute_intimidation: "Negociações agressivas"
 scheme_tribute_intimidation_desc: "O líder deste esquema deixou muito claro ao alvo que, se não ceder, haverá consequências piores."
