 assimilate_to_mandala_decision_government_desc: "Com uma divindade sobre a Terra, a organização de semelhante governo só parece beneficiar nossa existência. Vejamos o que podemos aprender à medida que nos assimilamos a esta forma de governar."
 assimilate_to_mandala_decision_faith_desc: "Deveríamos observar este espécime e assimilá-lo. Como verdadeiros devotos da existência deste devaraja, certamente viveremos vidas mais plenas — e quem sabe; talvez até tenhamos a chance de nos juntar ao seleto grupo dos privilegiados..."
 assimilate_to_mandala_decision_desc: "Somos meros humanos, guiados por um ser maior do que nós mesmos. Devemos adaptar nosso modo de ser e nos transformar verdadeiramente em devotos desta divina existência de Devaraja — pelo bem do nosso povo, é claro."
