 local_rites.1.t: "Uma jornada sagrada"
 local_rites.1.desc: "Embora uma oferenda sagrada possa ser feita em qualquer templo, até mesmo no meu santuário local em [capital_location.GetNameNoTooltip], fica claro que nem todo espaço sagrado é igual.\n\nUma visita a uma comunidade de templo dedicada poderia levar bastante tempo, mas provavelmente seria mais impressionante."
 local_rites.1.home: "Bastará com nosso próprio santuário"
 local_rites.1.home.tt: "Uma oferenda em um santuário local de [tooltip_loc.GetNameNoTooltip] nos poupará a viagem.\nUma oferenda aqui custará [THIS.ScriptValue('miniscule_gold_value')|-0] [gold_i] em troca de [THIS.ScriptValue('minor_piety_gain')|+0] [piety_i]"
 local_rites.1.mount_tai: "Preciso ir fazer meu sacrifício ritual no Monte Tai"
 local_rites.1.fengshan.tt: "Uma oferenda única por dinastia com um impacto profundo.\nEsta oferenda custará [THIS.ScriptValue('major_treasury_value')|-0] [treasury_i] e [THIS.ScriptValue('massive_prestige_value')|-0] [prestige_i] em troca de [THIS.ScriptValue('major_piety_gain')|+0] [piety_i] e [THIS.ScriptValue('massive_legitimacy_gain')|+0] [legitimacy_i]"
 local_rites.1.major_shrine: "Os santuários de [point_of_interest_location.GetNameNoTooltip]"
 local_rites.1.major_shrine.tt: "Uma oferenda aqui custará [THIS.ScriptValue('medium_gold_value')|-0] [gold_i] ou [THIS.ScriptValue('medium_prestige_value')|-0] [prestige_i] em troca de [THIS.ScriptValue('major_piety_gain')|+0] [piety_i]"
 local_rites.1.normal.tt: "Uma oferenda aqui custará [THIS.ScriptValue('minor_gold_value')|-0] [gold_i] ou [THIS.ScriptValue('minor_prestige_value')|-0] [prestige_i] em troca de [THIS.ScriptValue('medium_piety_gain')|+0] [piety_i]"
 local_rites.1.hills: "O santuário nas colinas onduladas de [hills_location.GetNameNoTooltip]."
 local_rites.1.forest: "Os templos das florestas de [forest_location.GetNameNoTooltip]."
 local_rites.1.mountains: "Os santuários das montanhas de [mountains_location.GetNameNoTooltip]"
 local_rites.1.temple_holding: "O templo de [temple_holding_location.GetNameNoTooltip]"
 local_rites.2.toast: "Você chegou ao Santuário"
 local_rites.3.t: "Sacrifício ao Céu"
 local_rites.3.t.fengshan: "Feng e Shan"
 local_rites.3.fallback.t: "Sacrifício aos Deuses"
 local_rites.3.desc_mt_tai_huangdi: "Poucos testemunharam um Ritual de Fengshan no monte Tai, mas há poucos que não saibam o que isso significa. Um novo altar foi erguido com terra no topo do monte Tai, e bem abaixo o terreno foi limpo em honra à Terra.\n\nA maioria dos meus predecessores jamais tentou mediar entre o Céu e a Terra, e é raro ter esta oportunidade de assegurar o futuro da dinastia [GetTitleByKey('h_china').GetBaseNameNoTierNoTooltip]."
 local_rites.3.desc_important_shrine: "Os santuários de [shrine_location.GetName] são tão impressionantes quanto antigos, e seus responsáveis parecem acostumados a visitantes importantes. Ao observar o lugar sagrado onde incontáveis devotos prestaram suas homenagens antes de mim, sou tomado por uma sensação de reverência.\n\n\"O mecenato é um aspecto importante da manutenção de lugares sagrados como este. Os visitantes costumam fazer uma doação para apoiar a comunidade monástica\". [companion.GetName] me lança um olhar educado, mas um tanto inquisitivo."
 local_rites.3.desc_at_home: "Talvez uma oferenda no santuário familiar de [shrine_location.GetName] não seja tão impressionante quanto uma feita em um grande templo, mas pode ser tão importante quanto um ato de devoção.\n\nAo realizar a oferenda ritual, sou tomado por uma paz interior que não sentia havia muito tempo."
 local_rites.3.desc_mountain_shrine: "Subir os muitos degraus até o santuário no topo da montanha de [shrine_location.GetName] é exaustivo, mas também favorece a reflexão. Este ato de peregrinação é algo sobre o qual provavelmente pensarei por muito tempo depois que minha oferenda ritual tiver sido concluída.\n\nÀ medida que chegamos ao topo, [companion.GetName] se vira para mim. \"Manter uma localidade assim tão bem conservada em um lugar como este é algo admirável. Talvez haja uma maneira de apoiar os monges daqui? É o costume\"."
 local_rites.3.desc_hills_shrine: "A paisagem ondulada de [shrine_location.GetName] é linda e, quando chegamos ao santuário para fazer minha oferenda, já comecei a sentir uma paz interior que às vezes parecia estar além do meu alcance.\n\nAo chegar ao último degrau da escadaria do templo, [companion.GetNameNo] me olha. Há aqui uma pequena comunidade que existe para dar apoio a este santuário. Talvez pudéssemos mostrar nosso apoio a ela?"
 local_rites.3.desc_forest_shrine: "Chegar ao pequeno santuário de [shrine_location.GetName] significou viajar sob o dossel das árvores por bastante tempo. É difícil imaginar um ambiente mais pacífico e tranquilizante, e me pego pensando que lembrarei deste momento muito tempo depois que minha peregrinação terminar.\n\n\"Deveríamos considerar se devemos ajudar a comunidade daqui e garantir a prosperidade deste santuário.\" Viro-me e encontro [companion.GetName] me olhando com uma expressão inquisitiva."
 local_rites.3.desc_holding_shrine: "Ao chegar ao santuário de [shrine_location.GetName], reflito sobre seu papel e significado. Há santuários muito mais importantes, mas isso não quer dizer que não seja uma comunidade monástica exemplar. Ver a reverência de todos os que habitam aqui é inspirador.\nEnquanto me preparo para partir, [companion.GetName] volta-se para mim. \"Este é um lugar sagrado, então meus pensamentos devem se voltar para o divino, mas aqueles que se dedicam aos seus cuidados também são dignos de nossa reverência.\""
 local_rites.3.desc_cynical: "\n\nMal consigo conter meu desgosto, mas talvez eu deva fazer o que se espera de mim."
 fengshan_option: "Por ordem do Céu"
 local_rites.3.pay_gold: "Vamos fazer uma doação"
 local_rites.3.pay_prestige: "Não tenho nada a oferecer além da minha devoção"
 local_rites.3.pay_at_home: "\"Assim seja\"."
 local_shrine.optout: "Assuntos mundanos reclamam minha atenção"
