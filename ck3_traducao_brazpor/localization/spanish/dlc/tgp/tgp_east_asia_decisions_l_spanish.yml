 create_bunga_mas_decision_tooltip: "Contratar um artesão local para criar um [artifact|lE] de [Glossary( 'bunga mas', 'BUNGA_MAS_GLOSS' )] para você"
 create_bunga_mas_decision_desc: "A árvore é feita da mais fina prata e ouro — um tesouro valioso para oferecer como tributo. Levá-la-ei à corte do meu suserano e me deleitarei em sua glória!"
 create_bunga_mas_decision_confirm: "Requisição de bunga mas"
 create_bunga_mas_decision_effect: "Criar um [artifact|lE] de [Glossary( 'bunga mas', 'BUNGA_MAS_GLOSS' )]\n$BULLET_WITH_TAB$ Quando entregue ao suserano:\n$TAB$$BULLET_WITH_TAB$ Ganha pilha(s) de [GetModifier('bunga_mas_tribute_modifier').GetNameWithTooltip] #WEAK (máx. 3)#!"
 create_bunga_mas_decision_effect_message: ""
 BUNGA_MAS_GLOSS: "O Bunga Mas, ou flores de ouro e prata, era uma forma de tributo usada na Península Malaia. Consistia em duas pequenas árvores feitas de ouro e prata da mais alta qualidade."
