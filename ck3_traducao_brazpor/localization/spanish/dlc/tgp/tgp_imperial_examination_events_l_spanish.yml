l_spanish:
 ### ARRIVAL EVENTS ###
 #Entrant
 imperial_examination.1000.t: "Chegada dos examinados"
 imperial_examination.1000.desc: "Entro na cidade de [ROOT.Char.GetCurrentLocation.GetName] para ver suas ruas varridas e ricamente adornadas para nossa chegada. As pessoas se curvam e murmuram preces de boa sorte enquanto passamos, ao passo que os jogadores fazem suas apostas nos cantos das ruas.\n\nPor onde quer que eu olhe, vejo outros candidatos ao exame vestidos com suas melhores vestes de seda partir para as tavernas locais com suas cortesãs. Hoje, descobrirei até onde estou disposto a ir."
 imperial_examination.1000.a: "Terei sucesso, aconteça o que acontecer!"
 imperial_examination.1000.a.tt: "Você terá mais oportunidades de trapacear.\n@alert_icon! #alert_trial Podem pegar você!#! #weak (Se você permanecer sem ser descoberto, você ganhará um [secret|El] de #V $secret_exam_cheater$#!)#!"
 imperial_examination.1000.b: "Desejo provar meu valor de modo honrado."
 #Host
 imperial_examination.1001.t: "$imperial_examination.1000.t$"
 imperial_examination.1001.desc: "Candidatos a funcionários do governo lotam as ruas de [ROOT.Char.GetCurrentLocation.GetName]. A cidade ganha vida, animada pelas belas vestes de seda dos candidatos e pelas belas cortesãs que os acompanham. \n\nPassar no Exame Imperial é provar um entendimento profundo das cinco virtudes que servem como o ápice do aprendizado confucionista. \n\nNão se trata de recitar, mas de cultivar uma crença virtuosa e uma conduta moral."
 imperial_examination.1001.a: "A assembleia aguarda."
 #Guest
 imperial_examination.1002.t: "$imperial_examination.1000.t$"
 imperial_examination.1002.desc: "Entro na cidade de [ROOT.Char.GetCurrentLocation.GetName] com meu [ROOT.Char.Custom2('RelationToMe', candidate )] [candidate.Custom('ES_ElLa')], [candidate.GetTitledFirstName|l]. As ruas foram varridas e ricamente decoradas para a nossa chegada.\n\nAssim que [candidate.GetSheHe] for isolado nos alojamentos dos examinandos, minha capacidade de influenciar seu progresso será pequena. Talvez eu deva oferecer algumas palavras de conselho."
 imperial_examination.1002.a: ""Tenha sucesso a qualquer custo, [ROOT.Char.Custom2('RelationToMe', candidate )]"."
 imperial_examination.1002.a.tt: "[candidate.GetFirstNameNoTooltip] terá mais oportunidades de trapacear.\n@alert_icon! #alert_trial Podem pegá-lo!#! #weak (Se não o detectarem, conseguirá um [secret|El] de #V $secret_exam_cheater$#!)#!"
 imperial_examination.1002.b: ""Não envergonhe a casa [ROOT.Char.GetHouse.GetNameNoTooltip]"."
 imperial_examination.1003.t: "$imperial_examination.1000.t$"
 imperial_examination.1003.desc: "Entro na cidade de [ROOT.Char.GetCurrentLocation.GetName] com os braços carregados de pergaminhos de aprendizado e materiais de estudo.\n\n"
 imperial_examination.1003.not_passed_exam: "Ainda não me submeti ao exame. Ainda assim, há muitas coisas que posso fazer para ajudar os examinadores neste evento, se eu quiser me preparar[ROOT.Char.Custom('ES_OA')] para enfrentar o exame algum dia."
 imperial_examination.1003.passed_provincial_exam: "Hoje, descobrirei o que acontece no gabinete do examinador, como a tinta é misturada e os questionários são preparados. Tendo concluído o exame, agora é hora de cultivar o [Glossary( 'guānxi', 'GUANXI_GLOSS' )]."
 imperial_examination.1003.passed_metropolitan_not_palace: "Lembro-me de como soltei o pergaminho ao passar no exame metropolitano, da euforia que senti e de como ela azedou rapidamente quando não fiquei entre os dez primeiros. Talvez, se eu trabalhar o suficiente, um dia consiga chegar ao Exame do Palácio."
 imperial_examination.1003.passed_all_exams: "Como alguém que concluiu todos os níveis de exames, os examinadores agora me cumprimentam como um dos seus quando entro nos salões de estudo mais prestigiados da cidade."
 imperial_examination.1003.a: "$imperial_examination.1001.a$"
 #Entrant: Meet a fellow entrant
 imperial_examination.1020.t: "Novos rostos"
 imperial_examination.1020.desc: "Na hospedaria, noto outr[new_entrant.Custom('ES_OA')] examinand[new_entrant.Custom('ES_OA')] de aspecto solene, mordendo as unhas com ansiedade.\n\nAo levantar o olhar, nossos olhos se encontram brevemente e eu inicio a conversa: "Saudações — eu sou [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitledFirstNameNoTooltip|l]. Quem sois vós?".\n\nSeu olhar vagueia inquieto pela sala antes de responder: "[new_entrant.Custom('ES_ElLa')|U] [new_entrant.GetTitledFirstName|l], o que quereis?"."
 imperial_examination.1020.a: ""Você também está nervoso?""
 imperial_examination.1020.a.success.tt: "Você cria laços com [new_entrant.GetShortUIName]"
 imperial_examination.1020.a.failure.tt: "Sua conversa não surte efeito"
 imperial_examination.1020.b: ""Tenho certeza de que tudo vai correr bem!""
 #Taking in the Sights
 imperial_examination.1040.t: "Apreciando a paisagem"
 imperial_examination.1040.desc.again: "Mais uma vez, estou preso[ROOT.Char.Custom('ES_OA')] a caminho da sala do exame, espremido[ROOT.Char.Custom('ES_OA')] entre candidatos de olhos arregalados que lutam para encontrar o caminho pelas ruas da cidade."
 imperial_examination.1040.desc: "As ruas da cidade fervilham de atividade em preparação para o exame iminente. A expectativa paira no ar, e não consigo evitar ficar animado também."
 imperial_examination.1040.desc.outro: "\n\nCandidatos a governador fazem fila no salão de admissões para anunciar sua chegada. Dado o tamanho da fila, parece que terei tempo para vagar pela cidade antes que a assembleia comece."
 imperial_examination.1040.a: "Deveria procurar no mercado por um pergaminho."
 imperial_examination.1040.a.tt: "Você se torna [ROOT.Char.Custom('ES_ElLa')] dono[ROOT.Char.Custom('ES_OA')] de um [artifact|lE] de pergaminho de [learning|lE]"
 imperial_examination.1040.a.tt_equipped: "Comprado um [artifact_scroll.GetName|l]"
 imperial_examination.1040.b: "Eu deveria comprar um presente para o anfitrião."
 imperial_examination.1040.c: "Não tenho tempo para distrações."
 imperial_examination.1040.d: "Deveria ver o que posso aprender com os moradores locais."
 imperial_examination.1040.d.tt.success: "Você obtém percepções valiosas"
 imperial_examination.1040.d.tt.failure: "Você não consegue aprender nada de valor"
 imperial_examination.1040.e: "Eu deveria aprimorar minhas habilidades no campo de treino!"
 imperial_examination.1040.e.tt.success: "Você derrota os artistas marciais locais"
 imperial_examination.1040.e.tt.failure: "Você é derrotado pelos artistas marciais locais"
 artifact_scroll_name: "Manuscrito desgastado"
 artifact_scroll_desc: "Um texto educativo bastante manuseado e anotado, intitulado "Interpretações da humanidade", que trata de um dos cinco pilares do pensamento confuciano."
 examination_gifted_host_title: "Trazido um presente ao anfitrião"
 examination_gifted_host: "[CHARACTER.Custom('ES_ElLa')|U] [CHARACTER.GetTitledFirstName|l] [Select_CString(CHARACTER.IsLocalPlayer, 'obsequiaste', 'obsequió')] [TARGET_CHARACTER.Custom('ES_AlAla')] [TARGET_CHARACTER.GetTitledFirstName|l] com [ROOT.Char.Custom('GetExpensiveDessert')]"
 imperial_examination.1050.t: "Primeiras impressões"
 imperial_examination.1050.desc: "É fácil localizar [examiner.Custom('ES_AlAla')] [examiner.GetTitledFirstName|l], um[examiner.Custom('ES_XA')] examinante, pois um grupo de candidatos [examiner.GetHerHim] o rodeia como pavões, exibindo rolos de caligrafia e o convidando a debates eruditos. \n\nDestacar e causar uma primeira impressão duradoura nessa multidão não será tarefa fácil, pois é preciso competir com essa turma de gente mundana."
 imperial_examination.1050.a: "Impressione com uma interpretação original dos clássicos."
 imperial_examination.1050.a.success.tt: "Impressiona [examiner.Custom('ES_AlAla')] [examiner.GetTitledFirstName|l]"
 imperial_examination.1050.a.failure: "Não impressionas [examiner.Custom('ES_AlAla')] [examiner.GetTitledFirstName|l]"
 imperial_examination.1050.a.failure.tt: "Suas opiniões não estão erradas. Pior, estão obsoletas."
 imperial_examination.1050.b: "Você se atribui o mérito do trabalho de outro examinando."
 imperial_examination.1050.b.success.tt: "Fica impressionado [examiner.Custom('ES_AlAla')] [examiner.GetTitledFirstName|l]"
 imperial_examination.1050.b.failure.tt: "Você é pego plagiando"
 imperial_examination.1050.c: "Já provarei meu valor no exame."
 examination_impressed_examiner_title: "Causou uma primeira impressão excelente"
 examination_impressed_examiner: "[CHARACTER.Custom('ES_ElLa')|U] [CHARACTER.GetTitledFirstName|l] [Select_CString(CHARACTER.IsLocalPlayer, 'conseguiste', 'consiguió')] vantagem no exame graças a conquistar o favor de um[TARGET_CHARACTER.Custom('ES_XA')] examinador, [TARGET_CHARACTER.Custom('ES_ElLa')] [TARGET_CHARACTER.GetTitledFirstName|l]."
 imperial_examination.1060.t: "Uma doçura"
 imperial_examination.1060.desc: "Um aroma agradável de bolos recém-assados abre caminho entre a forte mistura de examinandos suados e pergaminhos empoeirados que invade o edifício do exame. \n\n"Trago-vos este humilde presente da minha província natal, [ROOT.Char.GetTitleAsNameNoTooltip|l]", diz [entrant_to_meet.Custom('ES_ElLa')] [entrant_to_meet.GetTitledFirstName|l], [Select_CString(entrant_to_meet.IsFemale, 'una examinanda prometedora', 'un examinando prometedor' )] do exame vindouro. \n\nEla se inclina e me apresenta uma caixa de jacarandá com incrustações de osso: a fonte desse aroma de dar água na boca e uma clara tentativa de ganhar meu favor."
 imperial_examination.1060.b: "Grandes fortunas virão para aqueles que demonstrarem tamanha generosidade."
 imperial_examination.1060.b.tt: "Probabilidades [entrant_to_meet.Custom('ES_DelDela')] [entrant_to_meet.GetTitledFirstName|l] de #BOL tener éxito#! #BOL aumentadas#! graças a uma [exam_advantage|lE]"
 imperial_examination.1060.c: "Vamos aproveitar isso juntos!"
 imperial_examination.1060.d: "Vou gostar disso!"
 imperial_examination.1070.t: "Um candidato muito favorável"
 imperial_examination.1070.desc: "Não posso evitar me perguntar que tipo de candidatos poderiam tentar a sorte no exame. \n\nOs [Glossary( 'cuatro modos', 'FOUR_WAYS_GLOSS' )] de selecionar um funcionário certamente determinarão o favor dos candidatos perante os examinadores. Como seu [ROOT.Char.GetTitleAsNameNoTooltip|l], tenho o poder de decidir o que conta como valores #EMP buenos#!."
 imperial_examination.1070.a: "Quem compartilha meus interesses deve ser promissor."
 every_shared_education_entrant.tt: "Todo [entrant|lE] com a [education|lE] [THIS.Char.Custom('GetEducationTraitConcept')|l] vê #BOL aumentada#! sua probabilidade de #BOL tener éxito#!"
 imperial_examination.1070.b: "Todos os que seguem o credo confuciano são dignos."
 imperial_examination.1070.b.tt: "Todo [entrant|lE] com os traços [GetTrait('compassionate').GetName(GetNullCharacter)] , [GetTrait('just').GetName(GetNullCharacter)] , [GetTrait('honest').GetName(GetNullCharacter)] ou [GetTrait('scholar').GetName(GetNullCharacter)] vê #BOL aumentada#! sua probabilidade de #BOL tener éxito#!"
 imperial_examination.1070.d: "Aqueles que são descendentes do filho do céu, é claro."
 imperial_examination.1070.d.tt: "Todo [entrant|lE] de sua [dynasty|lE] #BOL aumenta#! sua probabilidade de #BOL tener éxito#!"
 imperial_examination.1070.c: "Serei submetido ao julgamento dos examinadores."
 ### EMPEROR EVENTS ###
 #Emperor sneaks out to meet entrant
 imperial_examination.2000.t: "O [ROOT.Char.GetTitleAsNameNoTooltip|l] ou ninguém"
 imperial_examination.2000.desc: "Os homens se comportam da melhor forma possível diante da autoridade. Então, como [ROOT.Char.GetTitleAsNameNoTooltip|l], preciso surpreender meus súditos desprevenidos para descobrir quem é decente e quem é apenas um bom mentiroso. \n\nSaio dos meus aposentos vestindo uma túnica simples e me escondo na multidão para obter uma leitura mais precisa dos candidatos. \n\n[entrant_to_meet.Custom('ES_ElLa')|U] [entrant_to_meet.GetTitledFirstName|l] destaca-se como uma figura promissora."
 imperial_examination.2000.desc.scoreboardee: "Ya recita con facilidad párrafos de los clásicos a una audiencia entregada. También yo siento cómo me atraen las preguntas convincentes que plantea sobre los textos."
 imperial_examination.2000.desc.fallback: "[entrant_to_meet.GetSheHe|U] se senta e, ao seu redor, se reúne um pequeno grupo de candidatos, discutindo os clássicos com pontos de vista convincentes, porém um tanto sem inspiração."
 imperial_examination.2000.a: "Farei saber seu nome aos examinadores."
 imperial_examination.2000.a.tt: "Probabilidades [entrant_to_meet.Custom('ES_DelDela')] [entrant_to_meet.GetTitledFirstName|l] de #BOL tener éxito#! #BOL aumentadas#! graças a uma [exam_advantage|lE]"
 imperial_examination.2000.b: "[entrant_to_meet.GetTitleByKey] pode chegar longe, com alguma ajuda."
 imperial_examination.2000.c: "Mas, ai de mim, meus critérios são mais elevados do que isso."
 imperial_examination.2010.t: "Preparando o cenário"
 imperial_examination.2010.desc.two: "\"Deve ser agradável ter tantos membros da sua dinastia presentes no exame\", meu examinador me diz, [examiner.Custom('ES_ElLa')] [examiner.GetTitledFirstName|l]. \"Embora eu não tenha grandes esperanças em relação a [entrant_to_meet_2.Custom('ES_AlAla')] [entrant_to_meet_2.GetTitledFirstName|l]\".\n\n"
 imperial_examination.2010.desc.one: "Vejo que [dynasty_member.Custom('ES_ElLa')] [dynasty_member.GetTitledFirstName|l] chegou ao exame, me diz minha examinadora, [examiner.Custom('ES_ElLa')] [examiner.GetTitledFirstName|l]. Isso lhe agradará.\n\n"
 imperial_examination.2010.desc.outro: "Os olhos de [examiner.GetFirstNameNoTooltip] percorrem a lista de candidatos e vejo o volume revelador em sua bolsa de moedas, com os subornos já recebidos dos chefes de dinastias preocupados. \n\nNão há dúvida de que eu também poderia fazer uma pequena contribuição para promover um membro da minha casa."
 imperial_examination.2010.a: "[entrant_to_meet.GetShortUINameNoTooltip] merece algum reconhecimento."
 imperial_examination.2010.a.tt: "Probabilidades [entrant_to_meet.Custom('ES_DelDela')] [entrant_to_meet.GetTitledFirstName|l] de #BOL tener éxito#! #BOL aumentadas#! graças a uma [exam_advantage|lE]"
 imperial_examination.2010.b: "Minha decepção de [ROOT.Char.Custom2('RelationToMe', entrant_to_meet_2 )] precisa de toda a ajuda possível."
 imperial_examination.2010.b.tt: "Probabilidades [entrant_to_meet_2.Custom('ES_DelDela')] [entrant_to_meet_2.GetTitledFirstName|l] de #BOL tener éxito#! #BOL aumentadas#! graças a uma [exam_advantage|lE]"
 imperial_examination.2010.c: "Creio que não."
 imperial_examination.2030.t: "Uma joia em bruto"
 imperial_examination.2030.desc.open: ""Como era de se esperar com a grande quantidade de participantes neste exame, vários plebeus tentam dar conta do recado"."
 imperial_examination.2030.desc.restricted: ""Apesar de limitar a entrada do público em geral, o plebeu ocasional sempre consegue se esgueirar para o exame de algum modo"."
 imperial_examination.2030.desc.exclusive: ""Vossa graça [ROOT.Char.GetTitleAsNameNoTooltip|l]; envergonho-me de admitir que um plebeu sem nome conseguiu, de alguma forma, entrar nos salões de exame na esperança de provar seu valor"."
 imperial_examination.2030.desc.outro: "[examiner.Custom('ES_ElLa')|U] examinador, [examiner.Custom('ES_ElLa')] [examiner.GetTitledFirstName|l], me informa, olhando o pátio pela janela. \n\nAponta para um[promising_lowborn.Custom('ES_XA')] jovem que parece estar envolvido em uma discussão acalorada com dois nobres. \n\n"[promising_lowborn.GetTitledFirstName], chama-se. Apesar de seu jeito rude, devo admitir que ele mostra um potencial excepcional"."
 imperial_examination.2030.a: "Nenhum plebeu comum ofuscará os meus!"
 imperial_examination.2030.a.tt: "[dynasty_member.Custom('ES_ElLa')|U] [dynasty_member.GetTitledFirstName] #BOL ha visto aumentada#! a probabilidade de #BOL tener éxito#! graças a uma [exam_advantage|lE]"
 imperial_examination.2030.b: "Não [promising_lowborn.Custom('ES_LoLa')] tirarei os olhos desta."
 imperial_examination.2030.c: "Certamente, todos são iguais sob o Céu."
 #One of the examiners is taking bribes...?
 imperial_examination.2040.t: "Um suborno na mão"
 imperial_examination.2040.desc: "Corre o rumor de que [rumored_examiner.Custom('ES_ElLa')] examinador [rumored_examiner.GetTitledFirstName|l] #EMP recibe beneficios#! por favorecer a certos candidatos. \n\nDe fato, sua bolsa parece abarrotada de moedas e ele se mistura mais de perto com os candidatos do que convém à sua posição. \n\nNão é necessária investigação. Este homem mancha meu exame!"
 imperial_examination.2040.a: "[rumored_examiner.GetFirstNameNoTooltip] pagará reparação ao império."
 imperial_examination.2040.b: "Conheço alguém que poderia se beneficiar de certa #EMP ayuda#!."
 imperial_examination.2040.b.tt: "[dynasty_member.Custom('ES_ElLa')|U] [dynasty_member.GetTitledFirstName] #BOL ha visto aumentada#! a probabilidade de #BOL tener éxito#! graças a uma [exam_advantage|lE]"
 imperial_examination.2040.d: "Coloque esta vergonhosa [rumored_examiner.GetWomanMan] em correntes!"
 imperial_examination.2040.c: "O exame prosseguirá como de costume."
 ### METROPOLITAN EXAM EVENTS ###
 #Emperor exam event
 imperial_examination.3000.t: "O sino soa"
 imperial_examination.3000.desc: "Após um escrutínio rigoroso para detectar qualquer trapaça, os candidatos se alinham para fazer o exame. Eu os observo do meu palácio, contemplando seus rostos ansiosos e suas posturas rígidas. \n\nO sino ressoa da torre do pátio, seguido pelo som de tambores pesados — sons que reverberam sob meus pés e enchem meu coração de júbilo justo."
 imperial_examination.3000.a: "Começa."
 imperial_examination.3005.t: "$imperial_examination.3000.t$"
 imperial_examination.3005.desc: "Um silêncio cai sobre a taverna quando os sinos ecoam por [ROOT.Char.GetCurrentLocation.GetName]. Os portões das salas de exame estão fechados.\n\nAo meu redor, vejo pais e anciãos debatendo em sussurros contidos, tentando deduzir o resultado dos próximos testes. Um esforço vão."
 imperial_examination.3005.desc.outro.impatient: "Por mais que me doa admitir, tudo o que podemos fazer agora é esperar."
 imperial_examination.3005.desc.outro: "Tudo o que podemos fazer agora é esperar."
 imperial_examination.3005.a: "Este é um bom lugar para ser visto."
 imperial_examination.3005.b: "Eu deveria me relacionar…"
 imperial_examination.3006.t: "$imperial_examination.3000.t$"
 imperial_examination.3006.desc: "A expectativa paira no ar enquanto os sinos ressoam por [ROOT.Char.GetCurrentLocation.GetName]. Os portões das salas de exame estão fechados.\n\nEu sigo [examiner.Custom('ES_AlAla')] examinador, [examiner.Custom('ES_ElLa')] [examiner.GetTitledFirstName|l]."
 imperial_examination.3005.desc.martial: "O suor escorre pelas minhas costas de carregar flechas para reabastecer as aljavas; tenho as mãos cobertas de pequenos cortes por afiar as lâminas."
 imperial_examination.3005.desc.scholar: "O suor escorre pelas minhas costas de tanto carregar pergaminhos de um lado para o outro entre as cabines de exame; tenho as pontas dos dedos enegrecidas de recarregar os tinteiros."
 imperial_examination.3006.a: "Agora começa o trabalho de verdade."
 imperial_examination.3007.t: "$imperial_examination.3000.t$"
 imperial_examination.3007.desc: "Com um resmungo e um baque pesado, os portões do recinto do exame se fecham. Os sinos do pátio soam, chamando-nos para nos reunir."
 imperial_examination.3007.a: "É hora de provar meu valor."
 imperial_examination.3007.a.success_tooltip_first: "#weak Para passar no Exame Metropolitano, você precisa de uma pontuação de #V 50#!. Para fazer o Exame do Palácio, você precisa ficar entre os dez primeiros.#!"
 # Entrant caught cheating
 imperial_examination.3010.t: "Uma erva daninha entre as flores"
 imperial_examination.3010.desc: "Parei diante do gabinete dos examinadores, peg[ROOT.Char.Custom('ES_OA')] pela conversa sussurrada. Nunca vi um trapaceiro tão engenhoso antes, diz [examiner.Custom('ES_ElLa')] [examiner.GetTitledFirstName|l]."
 imperial_examination.3010.scholarship: ""O único motivo pelo qual percebi que os meias [entrant.Custom('ES_DelDela')] [entrant.GetTitledFirstName|l] tinham as respostas da prova rabiscadas foi porque água caiu nelas por acidente!"."
 imperial_examination.3010.martial: "[entrant.Custom('ES_ElLa')|U] [entrant.GetTitledFirstName|l] sabotou o arco de seu rival com um corte quase imperceptível no cabo, para que a arma se partisse assim que fosse dobrada."
 imperial_examination.3010.outro: "\n\n[examiner_2.Custom('ES_ElLa')|U] examinante, [examiner_2.Custom('ES_ElLa')] [examiner_2.GetTitledFirstName|l], balança a cabeça e murmura: Se apenas usasse essas habilidades para passar no exame por meios honestos, seria um[entrant.Custom('ES_XA')] funcionári[entrant.Custom('ES_OA')] estatal formidável."
 imperial_examination.3010.a: "[Select_CString(entrant.IsFemale, 'La tramposa', 'El tramposo' )] pode se redimir a meu serviço."
 imperial_examination.3010.b: "São os examinadores que precisam ser punidos!"
 imperial_examination.3010.c: "Deixarei que os examinadores resolvam isso."
 imperial_examination.3020.t: "Uma mancha em meu nome"
 imperial_examination.3020.desc: "Uma voz familiar grita das cabines de exame e me faz sair do meu alojamento. Encontro meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('entrant'))], [entrant.Custom('ES_ElLa')] [entrant.GetTitledFirstName|l], arrancando os cabelos e murmurando algo incoerente.\n\n"
 imperial_examination.3020.desc_martial: "Abandonou sua arma de haste na grama, deixando seu oponente de treino coçando o elmo."
 imperial_examination.3020.desc_scholarship: "Ele(a) deixou sua cabine, mas ainda a segura com uma expressão pálida e desesperada no rosto."
 imperial_examination.3020.desc.outro: "\n\nOs examinadores ficam boquiabertos com a exibição dramática antes de intervir rapidamente, mas o dano já está feito. Todos os participantes testemunharam um membro da minha dinastia desmoronando diante deles."
 imperial_examination.3020.a: "Falarei seriamente com [entrant.GetSheHe]."
 imperial_examination.3020.b: "Envie[entrant.GetHerHim] para casa imediatamente!"
 imperial_examination.3020.c: "Ah, foi uma insolação, nada mais."
 imperial_examination.3030.t: "Dormindo em serviço"
 imperial_examination.3030.desc: "Fico sabendo que [examiner.Custom('ES_ElLa')] examinante [examiner.GetFirstName] adormeceu na frente dos candidatos. Tudo começou com um cotovelo escorregando sobre a mesa do examinador e, pouco depois, ele estava roncando! \n\nAgora está acordad[examiner.Custom('ES_OA')] mas quem sabe o que os candidatos aprontaram enquanto [examiner.GetSheHe|U] cochilava?"
 imperial_examination.3030.a: "Isso põe em dúvida todos os resultados!"
 imperial_examination.3030.a.flavor: "A punição coletiva nunca falha em atingir seu alvo."
 imperial_examination.3030.b: "Vou me lembrar disso."
 imperial_examination.3030.c: "Com certeza, ninguém além de nós percebeu."
 ### ENTRANT EVENTS ###
 #Hire a stand-in to take the exam for you
 imperial_examination.4000.t: "Com um pouco de ajuda…"
 imperial_examination.4000.desc: "Letras, símbolos… Quando fecho os olhos, consigo imaginar fragmentos das passagens que passei o dia inteiro estudando. Cada traço de pincel parece flutuar na escuridão, mas seu significado permanece evasivo. Terei tempo para dominar todas as interpretações necessárias?\n\nOutr[exam_taker.Custom('ES_OA')] examinand[exam_taker.Custom('ES_OA')] caminha sorrateiramente até meu lado, com sua túnica roçando na minha. "Pouco se pode nutrir a mente ao passar a noite inteira estudando para uma prova. Vocês têm a vida toda para aprender. Permitam-me fazer a prova em seu lugar e descansem a cabeça exausta"."
 imperial_examination.4000.a: "#EMP Preciso#! de toda a ajuda possível…"
 imperial_examination.4000.b: "Não, isto está errado."
 imperial_examination.4000.b.cheater: "Faz sentido…"
 #Bribe an examiner
 imperial_examination.4010.t: "Vantagens em salas sombrias"
 imperial_examination.4010.desc: "A cada passo que dá [examiner_to_bribe.Custom('ES_ElLa')] examinante [examiner_to_bribe.GetFirstName], o tilintar das moedas o acompanha. Sua bolsa está prestes a estourar pelas costuras. Em várias ocasiões, [examiner_to_bribe.GetHerHim] flagro enredad[examiner_to_bribe.Custom('ES_OA')] em conversas sussurradas com os candidatos, tentando em vão escapar dos olhares indiscretos.\n\nFica claro que est[examiner_to_bribe.Custom('ES_EA')] [examiner_to_bribe.GetWomanMan] está envolvid #EMP lucrativo#!…"
 imperial_examination.4010.a: "Devo me apresentar."
 imperial_examination.4010.b: "Não vale a pena correr o risco."
 #Stay up studying
 imperial_examination.4020.t: "Dramas de madrugada"
 imperial_examination.4020.desc: "Estou sentad[ROOT.Char.Custom('ES_OA')], inclinad[ROOT.Char.Custom('ES_OA')] sobre meus livros, vasculhando freneticamente página após página em um esforço para memorizar todas as letras que eu puder para o exame que se aproxima.\n\nUma leve pulsação em minha testa me faz perceber o quanto estou semicerrando os olhos no quarto mal iluminado. Eu me levanto para umedecer meu pescoço com água fresca."
 imperial_examination.4020.a: "Só mais um pouco…"
 imperial_examination.4020.b: "Não posso continuar com isso."
 #Study with a friend
 imperial_examination.4030.t: "… De meus amigos"
 imperial_examination.4030.desc: ""[ROOT.Char.GetTitledFirstNameNoTooltip]! Como você está? Gostaria de se juntar a mim para mais preparativos para o exame?"; meu [ROOT.Char.Custom2('RelationToMe', friendly_entrant )] [friendly_entrant.Custom('ES_ElLa')] [friendly_entrant.GetTitledFirstName|l], me cumprimenta de seu assento confortável um pouco mais adiante no salão.\n\nDiante de [friendly_entrant.GetSheHe] há uma mesa abarrotada de pincéis de caligrafia secando e dezenas de grossos volumes de poesia."
 imperial_examination.4030.outro: "\n\nPenso por um momento sobre a proposta. Estudar juntos #EMP podría#! teria suas vantagens…"
 imperial_examination.4030.outro.lover: "\n\n[friendly_entrant.GetFirstNameNoTooltip] sempre foi tão #EMP atractiv[friendly_entrant.Custom('ES_OA')]#!?"
 imperial_examination.4030.a: ""Por onde começamos?""
 imperial_examination.4030.b: ""Bem, não me importaria estudar vosso caso #EMP a vos#!…""
 imperial_examination.4030.c: ""Preciso ir a outro lugar"."
 imperial_examination.4050.t: "Baijiu de madrugada"
 imperial_examination.4050.desc: "“Alguns de nós estamos pensando em compartilhar uma garrafa de baijiu. Vocês vão se juntar a nós, não vão?”, me pergunta meu [ROOT.Char.Custom2('RelationToMe', friendly_entrant )], [friendly_entrant.Custom('ES_ElLa')] [friendly_entrant.GetTitledFirstName|l], chamando-me enquanto estou junto a um lago no pátio, admirando como a luz reflete nas escamas dos peixes."
 imperial_examination.4050.a: "Conheço o jogo de beber perfeito!"
 imperial_examination.4050.b: "Prefiro desfrutar de um momento a sós com você."
 imperial_examination.4050.c: "Preciso estar em outro lugar."
 imperial_examination.4060.t: "Rival em potencial"
 imperial_examination.4060.desc_learning: "Debato com meus pares na hospedaria quando uma voz nasal e áspera interrompe meu argumento, dizendo: "Essa é uma ideia rasteira e, além do mais, altamente questionável!".\n\nViro-me para olhar quem falou, um[potential_rival.Custom('ES_XA')] nada maltrapilh[potential_rival.Custom('ES_OA')] de [ROOT.Char.GetCurrentLocation.GetName]. Há mais de uma hora, essa pessoa insiste em se meter em todas as conversas.\n\nQuanto menos eu ouvir essa voz, melhor."
 imperial_examination.4060.desc_martial: "Observo o pátio do lado de fora do alojamento e noto que estão erguendo uma trave de gol de [Glossary('cuju','CUJU_GLOSS')] e um murmúrio de empolgação vem da multidão que vai se reunindo. \n\nEsbarro com [Select_CString(promising_lowborn.IsFemale, 'otra examinanda', 'otro examinando' )] a caminho do jogo. [Select_CString(promising_lowborn.IsFemale, 'Esa mujer', 'Ese hombre' )], um[promising_lowborn.Custom('ES_XA')] figurão sem nome de [ROOT.Char.GetCurrentLocation.GetName], zomba de mim dizendo: "E para onde você acha que está indo? Espero que não para o jogo, com essas pernas finas. Elas certamente se quebrariam como gravetos!". \n\nAs pessoas ao nosso redor riem da insolência dele. Se eu não fizer nada a respeito, o riso da multidão certamente logo se voltará contra mim."
 imperial_examination.4060.a: "Ele vai ver só!"
 imperial_examination.4060.a.success: "Você deixa em ridículo [potential_rival.Custom('ES_AlAla')] novato[potential_rival.Custom('ES_OA')]"
 imperial_examination.4060.a.failure: "Você passa vergonha"
 imperial_examination.4060.b: "Talvez tenha certa razão..."
 imperial_examination.4060.c: "Você se recusa a entrar no jogo."
 imperial_examination.4060.d: "[promising_lowborn.Custom('GetDaughterSon')|U] de cafetão!"
 imperial_examination.4060.d.tt: "Você faz expulsar [promising_lowborn.Custom('ES_AlAla')] [promising_lowborn.GetTitledFirstName|l] do exame com base na suposta ocupação humilhante da família dele."
 imperial_examination.4070.t: "Apoio familiar não solicitado"
 imperial_examination.4070.desc: "Ouço uma voz familiar do lado de fora da sala de exames e recuo ao ver meu [parent.GetMotherFather] conversando com [examiner.Custom('ES_ElLa')] [examiner.GetTitledFirstName|l]. \n\nPuxo meu [parent.GetMotherFather] para o lado e pergunto o que está fazendo aqui, ao que responde feliz: "Só quero ajudar você. Eu também tenho contatos, sabia? Deixe-me apresentar seu nome e vou garantir que você tenha a chance de triunfar". \n\nLanço um olhar ao redor para garantir que nenhum dos meus colegas tenha nos visto. Por enquanto, ainda tenho tempo para mandar [parent.Custom('ES_AlAla')] [parent.GetTitledFirstName|l] para casa sem que minha reputação seja arruinada."
 imperial_examination.4070.a: "Só se [parent.GetSheHe] sabe lidar com as coisas com sutileza."
 imperial_examination.4070.a.success: "Seu [parent.GetMotherFather] consegue esconder suas intenções"
 imperial_examination.4070.a.failure: "Os planos de seu [parent.GetMotherFather] foram expostos"
 imperial_examination.4070.b: "Posso suportar a humilhação para ter sucesso."
 imperial_examination.4070.c: "[parent.GetMotherFather|U], #EMP marchaos#! por favor!"
 imperial_examination.4080.t: "O caminho se bifurca"
 imperial_examination.4080.desc: "Por onde quer que eu vá, o burburinho do debate erudito me segue. \n\nDuas vozes especialmente exaltadas se erguem sobre a multidão e viro a esquina para encontrar [examiner_1.Custom('ES_AlAla')] [examiner_1.GetTitledFirstName|l] e [examiner_2.Custom('ES_AlAla')] [examiner_1.GetTitledFirstName|l], dois rivais acadêmicos notórios, [Select_CString(And(examiner_1.IsFemale, examiner_2.IsFemale), 'académicas', 'académicos')] [Select_CString(And(examiner_1.IsFemale, examiner_2.IsFemale), 'enzarzadas', 'enzarzados')], em mais uma discussão acalorada. Mais especificamente, sobre quem escreveu o estudo mais distinto sobre [examiner_1.Custom('EruditeTopic')]. \n\n[examiner_1.Custom('ES_ElLa')|U] [examiner_1.GetTitledFirstName|l] nota meu olhar e pergunta: "Então, qual texto você prefere #EMP vos#!?"."
 imperial_examination.4080.a: "Prefiro o trabalho de [examiner_1.Custom('ES_DelDela')] [examiner_1.GetTitledFirstName|l]."
 imperial_examination.4080.b: "[examiner_2.Custom('ES_ElLa')|U] [examiner_2.GetTitledFirstName|l] é [examiner_2.Custom('ES_ElLa')] erudit[examiner_2.Custom('ES_OA')] de maior virtude."
 imperial_examination.4080.c: "Eu gosto de ambos em igual medida."
 sided_with_examiner_log: "[CHARACTER.Custom('ES_ElLa')|U] [CHARACTER.GetTitledFirstName|l] ficou do lado de [TARGET_CHARACTER.GetFirstName] em uma disputa acadêmica"
 sided_with_examiner_log_title: "Do lado do examinador"
 imperial_examination.cheat.tt: "Ganha-se uma [exam_cheat|lE]"
 imperial_examination.advantage.tt: "Ganha-se uma [exam_advantage|lE]"
 imperial_examination.has_advantage.tt: "Probabilidades de #BOL tener éxito#! #BOL aumentadas#! graças a uma [exam_advantage|lE]\n"
 imperial_examination.has_increased_advantage.tt: "Probabilidade de #BOL tener éxito#! #BOL enormemente#! aumentada graças a uma [exam_advantage|lE]\n"
 imperial_examination.caught_cheating.tt: "#warning Reduce#! seu ganho de mérito ao final do exame."
 imperial_examination.cheat_spent.tt: "#BOL Gastas#! uma [exam_cheat|lE]\n"
 imperial_examination.cheat_wash.tt: "Seu erro é encoberto e a trapaça é esquecida"
 imperial_examination.4090.t: "Tal para qual"
 imperial_examination.4090.desc: "Uma sensação de expectativa nervosa enche o alojamento, dissipada apenas pela agradável expressão do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('other_entrant'))] [other_entrant.Custom('ES_ElLa')] [other_entrant.GetTitledFirstName|l]. \n\nCom [other_entrant.GetSheHe], não preciso me explicar, e cada uma de minhas palavras ressoa profundamente. Nossas conversas ganham vida própria e nos surpreendem a [Select_CString(And(ROOT.Char.IsFemale, other_entrant.IsFemale), 'ambas', 'ambos')] com suas idas e vindas! \n\nPor fim, [other_entrant.GetSheHe] se inclina e diz: "Conheço outras pessoas de mentalidade semelhante que ficariam muito felizes em conhecê-lo. Você gostaria que eu fizesse as apresentações?"."
 imperial_examination.4090.a: "Tenho muita vontade de conhecê-los!"
 imperial_examination.4090.b: "Tenho textos importantes para ler."
 imperial_examination.4090.b.tt: "Sua dedicação rende [merit|lE] [merit_i]."
 imperial_examination.4100.t: "Uma folha de papel"
 imperial_examination.4100.desc: "Caminho com cuidado entre as cabines de exame, na esperança de deixar um pequeno pedaço de papel preparado com informações #EMP útil#! antes do iminente exame. \n\nNo exato momento em que encontro uma tábua solta na parede de uma das cabines, ouço uma tosse seca atrás de mim. Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('other_entrant'))] [other_entrant.Custom('ES_ElLa')] [other_entrant.GetTitledFirstName|l], não sei como, conseguiu se aproximar de mim sem fazer barulho. \n\nE me pergunta: “O que vocês estão fazendo aí?”."
 imperial_examination.4100.a: "Compartilhe as respostas para apaziguar [other_entrant.Custom('ES_AlAla')] [other_entrant.GetTitledFirstNameNoTooltip|l]."
 imperial_examination.4100.a.success: "Você convence [other_entrant.Custom('ES_AlAla')] [other_entrant.GetTitledFirstNameNoTooltip|l] a trapacear com você"
 imperial_examination.4100.a.failure: "Não convence [other_entrant.Custom('ES_AlAla')] [other_entrant.GetTitledFirstNameNoTooltip|l]"
 imperial_examination.4100.b: ""Estou aqui para adotar a mentalidade de estudante"."
 imperial_examination.4100.b.success: "[other_entrant.Custom('ES_ElLa')|U] [other_entrant.GetTitledFirstNameNoTooltip|l] acredita na sua mentira"
 imperial_examination.4100.b.failure: "Você não engana [other_entrant.Custom('ES_AlAla')] [other_entrant.GetTitledFirstNameNoTooltip|l]"
 imperial_examination.4100.c: "Jogar o papel em uma poça próxima."
 imperial_examination.8000.t: "No Palácio"
 imperial_examination.8000.desc: "Encontro-me entre os erudit[ROOT.Char.Custom('ES_OA')] os mais promissores do domínio. Esperei a vida toda por este momento. Em breve, caminharei pelos jardins do palácio, comerei as comidas mais requintadas que o império tem a oferecer e me apresentarei diante de [ROOT.Char.Custom('ES_OA')] [host.Custom('ES_AlAla')] [host.GetTitleAsNameNoTooltip|l] em pessoa."
 imperial_examination.8000.a: "Os olhos do Céu me contemplam!"
 imperial_examination.8010.t: "Na taverna"
 imperial_examination.8010.desc: "Não recebi um convite para o Exame do Palácio. Minha pontuação real ainda não foi divulgada. Enquanto isso, não estou mais confinado[ROOT.Char.Custom('ES_OA')] no recinto do exame.\n\n"
 imperial_examination.8010.desc_worried: "A agitação da taverna não me alcança, enquanto me sento e pondero o que eu poderia ter feito de forma diferente."
 imperial_examination.8010.desc_fallback: "O exame finalmente acabou, e posso respirar aliviado."
 imperial_examination.8010.a: "Preciso estudar muito para a próxima."
 imperial_examination.8010.b: "Ainda assim, estou satisfeito com o meu resultado."
 imperial_examination.9000.t: "Um encontro muito estimado"
 imperial_examination.9000.desc.intro: "Agora que o exame metropolitano terminou, [examiner.Custom('ES_ElLa')] examinante [examiner.GetFirstName] me apresenta [first_char.Custom('ES_AlAla')] examinand[first_char.Custom('ES_OA')] com a maior nota, [first_char.Custom('ES_ElLa')] [first_char.GetTitledFirstName|l].\n\n“Sua afinidade com"
 imperial_examination.9000.desc.diplomacy: "a diplomacia"
 imperial_examination.9000.desc.martial: "a arte da guerra"
 imperial_examination.9000.outro: "nos impressionou a todos hoje", diz [examiner.GetFirstNameNoTooltip]. "Os outros candidatos com as melhores notas já estão sendo escoltados ao palácio imperial neste momento".\n\n[first_char.GetFirstNameNoTooltip] se inclina profundamente e diz, com a voz embargada pelo respeito: "Vivo para servir [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetTitleAsNameNoTooltip|l]"."
 imperial_examination.9000.a: "Eu esperava uma [ROOT.Char.GetInvolvedActivity.Custom('GetExamFocusSkill')|l]."
 imperial_examination.9000.a.tt_martial: "Você recebe esta opção por causa da sua [activity_option|lE] $imperial_examination_focus_martial$"
 imperial_examination.9000.a.tt_learning: "Você tem esta opção por causa da sua [activity_option|lE] $imperial_examination_focus_learning$"
 imperial_examination.9000.a.tt_stewardship: "Você obtém esta opção por causa da sua [activity_option|lE] $imperial_examination_focus_stewardship$_"
 imperial_examination.9000.b: "Vocês honraram bem o Império."
 exam_focus_martial: "erudição marcial"
 exam_focus_learning: "erudito em aprendizado"
 exam_focus_stewardship: "erudição de tesouraria"
 examination_first_place_entrant_noticed_title: "Aviso dos Céus"
 examination_first_place_entrant_noticed: "[host.Custom('ES_ElLa')|U] [host.GetTitleAsNameNoTooltip|l] congratulou [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'seu personagem', TARGET_CHARACTER.GetShortUIName )] por sua alta colocação."
 imperial_examination.9001.t: "Sob o olhar do Céu"
 imperial_examination.9001.desc: "Mal o suor se secou em minha testa e já sou levado perante [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip|l]. Minha mão dói de tanto ter passado o dia inteiro segurando o"
 imperial_examination.9001.desc_brush: "pincel."
 imperial_examination.9001.desc_weapon: "arma."
 imperial_examination.9001.desc_bridge: "Dizem-me que obtive a nota mais alta entre [Select_CString(ROOT.Char.IsFemale, 'todas las examinandas', 'todos los examinandos' )] do reino."
 imperial_examination.9001.desc_denied: "\n\nPara minha surpresa, [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip|l] me lança um breve olhar quando me prostro diante de [host.GetSheHe] e diz: "Eu esperava alguém com mais [ROOT.Char.GetInvolvedActivity.Custom('GetExamFocusSkill')]".\n\nMeu rosto arde quando trazem outro[favored_entrant.Custom('ES_OA')] examinando[favored_entrant.Custom('ES_OA')] para ser elogiado em vez de mim, [favored_entrant.Custom2('MyCharacterIntroduction', ROOT.Char)]."
 imperial_examination.9001.desc_merit: "\n\nProstro-me diante de [host.Custom('ES_ElLa')] [host.Custom('GetDaughterSon')] do Céu em pessoa, curvando-me tanto quanto minha espada me permite.\n\n\"Você honrou bem o império\", diz. Será que captei um lampejo de orgulho em seus olhos? As luzes desta corte devem estar me pregando uma peça."
 imperial_examination.9001.a: "Vivo para servir."
 imperial_examination.9001.b: "Nunca esquecerei disto!"
 imperial_examination.9001.c: "Farei melhor, a qualquer custo."
 imperial_examination.9001.d: "Mantenha a calma…"
 tgp_changed_ways_modifier: "Costumes mudados"
 tgp_changed_ways_modifier_desc: "Este personagem seguiu um novo caminho para servir melhor à corte imperial."
 ### EXAM EVENTS ###
 #The [Exam] Essay
 imperial_examination.5000.t: "As perguntas frequentes"
 imperial_examination.5000.desc.cheater: "Sinto os olhos dos meus colegas queimando um buraco na nuca quando entro no salão de provas e encontro meu cubículo. Quantos sabem da minha invasão? Será que estou imaginando coisas? Preciso deixar esses pensamentos de lado e me concentrar na dissertação que está por vir."
 imperial_examination.5000.desc: "[examiner.Custom('ES_ElLa')|U] [examiner.GetTitledFirstName|l] me lança um olhar mortificante enquanto me encolho no assento, tentando me recompor antes do ensaio que está por vir."
 imperial_examination.5000.desc_bridge: "\n\nPede-se que eu trate do seguinte tema:"
 governance_weaponry: ""Alguém afirma possuir apenas uma lança, mas em segredo possui bestas. Que punição deve ser imposta?""
 governance_reinstatement: ""A um oficial merecedor é negada a reintegração, enquanto um oficial sem mérito tem a reintegração concedida. Como a situação deve ser julgada?""
 governance_documents: ""Se um oficial abrir um documento lacrado sem a devida autorização, como ele deve ser disciplinado?""
 governance_filial: ""Se um criminoso sem parentes conhecidos que foi condenado à morte for perdoado após a execução, os documentos apropriados devem ser alterados para restaurar sua reputação?""
 imperial_examination.5000.a: "Onde está meu pincel?!"
 imperial_examination.5000.a.cheater: "Farei o meu melhor…"
 imperial_examination.5000.b: ""[ROOT.Char.MakeScope.Var('has_exam_taker').Char.GetFirstNameNoTooltip], vá!"."
 imperial_examination.5000.c: ""Examinador [ROOT.Char.MakeScope.Var('has_bribed_examiner').Char.GetFirstNameNoTooltip], por favor, dê uma olhada na #EMP mi#! resposta…"."
 imperial_examination.5000.d: ""Examinador [ROOT.Char.MakeScope.Var('has_blackmailed_examiner').Char.GetFirstNameNoTooltip], você se lembra do meu #EMP progenitor#!?"."
 imperial_examination.5000.e: "#EMP echa una mirada a una hoja de respuestas oculta#!"
 imperial_examination.5000.f: "$imperial_examination.5000.d$"
 imperial_examination.duel.essay.critical_success.tt: "Você escreve um ensaio aclamado pela crítica"
 imperial_examination.duel.essay.great_success.tt: "Você escreve um bom ensaio"
 imperial_examination.duel.essay.success.tt: "Seu ensaio é decente"
 imperial_examination.duel.essay.failure.tt: "Você não consegue escrever um ensaio adequado"
 #A [Exam] Classic
 imperial_examination.5050.t: "Falar em nome dos sábios"
 imperial_examination.5050.history: ""Para cumprir com os registros de normas, segundo o \"Livro da História\", é preciso conhecer os governantes de antigamente". $imperial_examination.5050.desc$ é me pedido que demonstre meu conhecimento do discurso de [ROOT.Char.Custom('GetRandomHistoryPassage')]."
 imperial_examination.5050.changes: ""Para superar as dificuldades materiais, segundo o \"Livro das Mutações\", devemos nos ver como parte do universo". $imperial_examination.5050.desc$ se me incentiva a descrever minha compreensão dos modos de adivinhação do texto: da infinitude de linhas às Seis Bestas."
 imperial_examination.5050.poetry: ""Para refletir sobre o comportamento humano, segundo o \"Livro da Poesia\", é preciso erguer um espelho de autorreflexão".$imperial_examination.5050.desc$ me cabe interpretar os poemas de tão célebre [ROOT.Char.Custom('GetRandomPoetryPassage')]."
 imperial_examination.5050.annals: ""Para analisar a natureza das verdades ou falsidades, segundo os \"Anais de primavera e outono\", é preciso aprender com a loucura das dinastias do passado".$imperial_examination.5050.desc$ devo entrar em detalhes sobre o tema de [ROOT.Char.Custom('GetRandomAnnalsPassage')]."
 imperial_examination.5050.rites: ""Para entender a ordem do mundo, segundo o \"Livro dos Ritos\", é preciso respeitar a cerimônia adequada".$imperial_examination.5050.desc$ preciso listar as afirmações-chave conforme aparecem em [ROOT.Char.Custom('GetRandomRitesPassage')]."
 imperial_examination.5050.desc: "\n\nAssim diz a declaração inicial do questionário à minha frente. O espaço vazio no meio da minha [ROOT.Char.Custom('GetWritingMaterial')] parece imensuravelmente grande.\n\nPara este exame,"
 imperial_examination.5050.a: "Como disse o mestre Kong…"
 imperial_examination.5050.b: ""[ROOT.Char.MakeScope.Var('has_exam_taker').Char.GetFirstNameNoTooltip], vá!"."
 imperial_examination.5050.c: "\"Examinador [ROOT.Char.MakeScope.Var('has_bribed_examiner').Char.GetFirstNameNoTooltip], se você olhasse para #EMP mi#! versão da história…"."
 imperial_examination.5050.d: "\"Examinador [ROOT.Char.MakeScope.Var('has_blackmailed_examiner').Char.GetFirstNameNoTooltip], minha #EMP familia#! sempre favoreceu este texto."
 imperial_examination.5050.e: "$imperial_examination.5000.e$"
 imperial_examination.5050.f: "$imperial_examination.5050.d$"
 imperial_examination.duel.classics.critical_success.tt: "Sua interpretação do trecho é um sucesso crítico"
 imperial_examination.duel.classics.great_success.tt: "Você faz algumas observações muito boas sobre a passagem"
 imperial_examination.duel.classics.success.tt: "Sua passagem é decente"
 imperial_examination.duel.classics.failure.tt: "Você atrapalha a passagem"
 #[Exam] Poetry
 imperial_examination.5100.t: "Poesia [ROOT.Char.Custom('GetRegionalPoetryExam')|l]"
 imperial_examination.5100.desc: "Os examinados se reúnem nas cabines de exame, e assumo meu lugar entre eles. Apesar de nosso número, tudo está em silêncio, salvo pelo sussurro das folhas, agitadas por uma brisa suave. O incenso queima em um altar próximo, trazendo-me uma pequena paz.\n\nDevemos escrever poesia em composições de quatro linhas. Se eu quiser ter sucesso,"
 imperial_examination.5100.desc.river: "devo deixar meus pensamentos fluírem claros como o rio."
 imperial_examination.5100.desc.straight: "devo deixar que meus pensamentos finquem raízes profundas na terra."
 imperial_examination.5100.desc.explosive: "devo escrever com paixão, sem me conter!"
 imperial_examination.5100.desc.lofty: "devo deixar meus pensamentos vagarem até os recantos mais distantes do céu."
 imperial_examination.5100.desc.fallback: "devo extrair inspiração de toda a poesia que li."
 imperial_examination.5100.a: "Estendo a mão para o pincel."
