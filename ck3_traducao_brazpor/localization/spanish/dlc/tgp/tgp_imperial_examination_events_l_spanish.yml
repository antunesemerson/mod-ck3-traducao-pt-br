 imperial_examination.5150.t: "Competição de tiro com arco"
 imperial_examination.5150.desc: "Os candidatos se reúnem no campo de tiro e tomo meu lugar entre eles. \n\nApesar do nosso número, tudo está em silêncio, exceto pelo leve tilintar das armaduras enquanto nos posicionamos. \n\nO candidato à minha frente na fila prepara o arco."
 imperial_examination.5150.a: "Agarro meu arco com firmeza."
 imperial_examination.5150.b: ""[ROOT.Char.MakeScope.Var('has_exam_taker').Char.GetFirstNameNoTooltip], você faz o disparo"."
 imperial_examination.5150.c: "[ROOT.Char.MakeScope.Var('has_bribed_examiner').Char.GetFirstNameNoTooltip], por favor, examinai #EMP mi#! alvo…"
 imperial_examination.5150.d: ""Examinador [ROOT.Char.MakeScope.Var('has_blackmailed_examiner').Char.GetFirstNameNoTooltip], vocês conhecem meu progenitor, não conhecem?"."
