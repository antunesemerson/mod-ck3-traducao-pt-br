 horse_exam_hunter_success_first: "Você recebe esta opção por causa do seu [trait|lE] [GetTrait('lifestyle_hunter').GetName( GetNullCharacter )]"
 other_entrant_thundering_success: "avança pelo terreno, os cascos retumbando na planície. Apesar da velocidade do cavalo, ergue-se perfeitamente sobre seu lombo. É uma visão impressionante e arrebatadora."
 other_entrant_practiced_ride: "galopa com facilidade praticada pela região, mas carece da coragem para sacar o arco, o que resulta numa exibição lamentável."
 other_entrant_spooked_horse: "Enterra as esporas para assustar a pobre criatura, que o derruba com sucesso. É uma visão lamentável, mas um tanto reconfortante."
 other_entrant_swift_success: "atravessa veloz a planície, disparando uma saraivada de tiros em rápida sucessão; seus movimentos fluem como a água."
 other_entrant_shortstop_fail: "galopa pelo campo, inclinando-se para a frente, logo acima da sela, mas nenhuma de suas flechas acerta onde deveria."
 imperial_examination.duel.riding.critical_success.tt: "Sua técnica é perfeita"
 imperial_examination.duel.riding.great_success.tt: "Sua técnica é impressionante"
 imperial_examination.duel.riding.success.tt: "Sua técnica é razoável"
 imperial_examination.duel.riding.failure.tt: "Sua técnica é decepcionante"
 #Caught cheating!
 imperial_examination.6000.t: "Foi pego!"
 imperial_examination.6000.desc: "Suo abundantemente enquanto [examiner.Custom('ES_ElLa')] examinante [examiner.GetFirstName] me olha de cima a baixo com severidade e com as mãos nas costas. "Como #EMP osáis#! cachorr[ROOT.Char.Custom('ES_OA')] insolente. Eu deveria ir direto para a [ROOT.Char.Custom('ES_OA')] [activity.GetHost.Custom('ES_AlAla')] [activity.GetHost.GetTitleAsNameNoTooltip|l] e deixar sua excelência saber de suas #EMP fechorías#!. Se você tiver sorte, #EMP solo#! vocês só terão a pele arrancada antes de sua morte".\n\nTorrentes de suor escorrem pelas minhas costas, e me apresso para avaliar a situação e limpar minha garganta extremamente seca:"
 imperial_examination.6000.a: ""Estão armando para mim, você não vê?!""
 imperial_examination.6000.b: ""Claro que podemos fazer isso desaparecer, de alguma forma!""
 imperial_examination.6000.c: "“Veja, [friend_to_sacrifice.Custom('ES_ElLa')] [friend_to_sacrifice.GetTitledFirstNameNoTooltip|l] foi [friend_to_sacrifice.Custom('ES_ElLa')] #EMP verdader[friend_to_sacrifice.Custom('ES_OA')]#! o verdadeiro instigador[friend_to_sacrifice.Custom('ES_XA')]…”"
 imperial_examination.6000.d: ""Nunca mais voltará a acontecer #EMP jamás#!, eu juro!""
