 other_entrant_impressive_success: "Um murmúrio de aprovação surge da multidão de espectadores quando [other_entrant.GetSheHe] crava firmemente sua flecha no alvo."
 other_entrant_spinning_safe: "A flecha voa traçando um arco baixo, girando selvagemente no vento, mas ainda assim consegue atingir a borda inferior do alvo."
 other_entrant_embarrased_cough: "A flecha voa tão desviada que não consigo ouvir onde aterrissa atrás do alvo. Em algum lugar, alguém tosse."
 other_entrant_piercing_success: "A flecha se crava tão profundamente que se projeta atrás do alvo."
 other_entrant_drooping_safe: "A flecha atinge a borda do alvo. O golpe raso faz a cauda da flecha pender tristemente."
 other_entrant_vanishing_arrow: "A flecha raspa o canto do alvo antes de desaparecer atrás dele."
 imperial_examination.5160.t: "Demonstração de arma de haste"
 imperial_examination.5160.desc: "O peso do meu uniforme é um conforto familiar enquanto me junto aos outros examinandos. Espantalhos de palha foram colocados por todo o pátio em frente ao palácio de [ROOT.Char.GetCurrentLocation.GetName].\n\nMinha vez está chegando. Logo depois [other_entrant.Custom('ES_DelDela')] [other_entrant.GetTitledFirstName|l], que"
 imperial_examination.5160.a: "Assumo minha posição."
 imperial_examination.5160.b: "[ROOT.Char.MakeScope.Var('has_exam_taker').Char.GetFirstNameNoTooltip], tomem meu lugar."
 imperial_examination.5160.c: ""Examinador [ROOT.Char.MakeScope.Var('has_bribed_examiner').Char.GetFirstNameNoTooltip], observe-me!"."
 imperial_examination.5160.d: ""[ROOT.Char.MakeScope.Var('has_blackmailed_examiner').Char.GetFirstNameNoTooltip], você conhece a destreza matrimonial do meu progenitor!"."
 imperial_examination.5160.e: ""[ROOT.Char.MakeScope.Var('has_blackmailed_examiner').Char.GetFirstNameNoTooltip], isso lhe lembra o #EMP alcance#! da minha família?"."
 other_entrant_cutting_success: "corta a cabeça de seu alvo com uma floreio que traz um sorriso aos rostos dos examinadores."
 other_entrant_practiced_safe: "gira, bloqueia e derruba seu oponente de palha com movimentos praticados, embora um tanto previsíveis."
 other_entrant_stuck_fail: "faz uma investida ousada em direção ao seu alvo, mas, de alguma forma, consegue deixar sua arma presa no seu pequeno corpo de palha."
 other_entrant_practiced_success: "move-se com uma facilidade treinada, quase natural, que provoca um murmúrio de inveja na multidão."
 other_entrant_stumbling_fail: "tropeça e cai, sua arma bate no chão com estrondo. Solto um suspiro de alívio."
 imperial_examination.duel.polearm.critical_success.tt: "Sua forma é perfeita"
 imperial_examination.duel.polearm.great_success.tt: "Sua postura é impressionante"
 imperial_examination.duel.polearm.success.tt: "Sua forma é decente"
 imperial_examination.duel.polearm.failure.tt: "Sua forma é inadequada"
 imperial_examination.5170.t: "Avaliação de tiro com arco a cavalo"
 imperial_examination.5170.desc: "Acordados antes do cantar do galo, os outros candidatos e eu somos tirados de nossas camas e levados a um campo de tiro com arco ao ar livre.\n\nAli nos aguarda uma boa quantidade de corcéis, no topo de uma colina clara. O candidato à minha frente na fila prepara seu cavalo e passa a"
 imperial_examination.5170.a: "Agarrando as rédeas."
 imperial_examination.5170.b: "[ROOT.Char.MakeScope.Var('has_exam_taker').Char.GetFirstNameNoTooltip], tomem meu lugar."
 imperial_examination.5170.c: ""Examinador [ROOT.Char.MakeScope.Var('has_bribed_examiner').Char.GetFirstNameNoTooltip] , prestai atenção!"."
 imperial_examination.5170.d: ""Meu progenitor se destaca no arco montado. Não é, [ROOT.Char.MakeScope.Var('has_blackmailed_examiner').Char.GetFirstNameNoTooltip]?"."
 imperial_examination.5170.e: "O arco e eu somos um só. Não posso falhar!"
