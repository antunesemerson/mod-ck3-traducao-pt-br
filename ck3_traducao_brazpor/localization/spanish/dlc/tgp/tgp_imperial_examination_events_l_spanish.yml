 imperial_examination.5500.t.success: "Sucesso!"
 imperial_examination.5500.t.great_success: "Grande sucesso!"
 imperial_examination.5500.t.critical_success: "Sucesso crítico!"
 imperial_examination.5500.t.failure: "Fracasso!"
 imperial_examination.5500.desc.success_martial: "Com um "#EMP ZONC#!", a flecha se crava firmemente no alvo. Um murmúrio de aprovação surge dos espectadores. Está claro que causei uma boa impressão na multidão."
 imperial_examination.5500.desc.success_learning: "As lições dos meus professores aparecem claramente em minha mente, enquanto trechos de textos são facilmente evocados da memória."
 imperial_examination.5500.desc.safe_martial: "A flecha atinge a borda do alvo. O impacto é superficial, fazendo a cauda da flecha cair levemente."
 imperial_examination.5500.desc.safe_learning: "Repito os ditos bem conhecidos que me lembro de minhas leituras, mas não desenvolvo nem discuto o assunto em profundidade."
 imperial_examination.5500.desc.failed_martial: "Já Antes que as penas da flecha rocem a proteção do braço, sei que ela não vai acertar, e observo enquanto ela arranha o canto do alvo antes de desaparecer atrás dele."
 imperial_examination.5500.desc.failed_classics: "Esforço-me para lembrar as lições que meus mestres me ensinaram. Trechos de textos importantes parecem ter sido banidos da minha memória."
 imperial_examination.5500.desc.hegemon_positive: "\n\n[host.Custom('ES_ElLa')|U] [host.GetTitleAsNameNoTooltip|l] me olha, [host.Custom('quirk_pos_pp')]. \"Muito bem.\""
 imperial_examination.5500.desc.hegemon_negative: "\n\n[host.Custom('ES_ElLa')|U] [host.GetTitleAsNameNoTooltip|l] me olha, [host.Custom('quirk_neg_pp')]. \"Está dispensado.\""
 imperial_examination.5500.a: "Sempre me lembrarei deste momento."
 #Conclusion event
 imperial_examination.7000.t: "Lista de resultados"
 imperial_examination.7000.desc.emperor: "Os tambores da academia soam mais uma vez quando os resultados são divulgados. Os candidatos se reúnem em silêncio diante dos resultados afixados, expectantes e reverentes, na esperança de terem ascendido na escada rumo a um alto cargo.\n\nOs candidatos do Palácio são colocados à frente de todos os seus pares como exemplo e recompensa, enquanto os estudantes de menor desempenho inclinam a cabeça por sua vez."
 imperial_examination.7000.desc.cheater: "Os tambores da academia me arrancam do meu alívio temporário enquanto estou nas imediações do recinto do exame. Observo como meus colegas se apressam para ver a divulgação da lista, esperançosos quanto aos resultados do exame.\n\nAtrás deles, vislumbro os candidatos ao Exame do Palácio, posicionados em frente ao pátio do palácio imperial. O dia está claro, e o céu nos observa."
 imperial_examination.7000.desc.entrant: "Os tambores da academia sinalam o fim dos exames. Apresso-me quando anunciam os resultados para descobrir que obtive uma nota [ROOT.Char.Custom('PlayerGetExamScoreAdjective')] de #V [ROOT.Char.MakeScope.Var('imperial_examination_score').GetValue|0]#! , que me coloca na posição [ROOT.Char.MakeScope.Var('your_exam_position').GetValue|O] na lista.\n\nEnquanto isso, os candidatos de maior destaque do Exame do Palácio se posicionam em frente ao pátio do palácio imperial. Olho para [first_place_entrant.GetFirstName], que ficou em primeiro lugar entre eles, tornando-se o favorit[first_place_entrant.Custom('ES_OA')] [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip|l]."
 imperial_examination.7000.desc.palace_entrant: "Os tambores da academia anunciam o fim do exame. Permaneço com meus pares do Exame do Palácio, posicionado na frente do pátio do palácio imperial, observando os candidatos de nível inferior que se reúnem diante de nós antes da divulgação da lista abaixo de nós.\n\nQuando os candidatos metropolitanos nos veem, eles se inclinam e baixam a cabeça em reverência. Sinto a glória e o poder que me aguardam."
 imperial_examination.7000.desc.fallback: "Pela glória [host.Custom('ES_DelDela')] bom[host.Custom('ES_XA')] [host.GetTitleAsNameNoTooltip|l], foi concluído mais um [GetActivityType('activity_imperial_examination').GetName|l]. Com isso, uma nova leva de eruditos ascende a escada rumo aos altos cargos."
 imperial_examination.7000.a: "Tudo vai bem sob os céus."
 imperial_examination.7000.a.cheater: "Observando todos, menos a mim."
 imperial_examination.7001.t: "$imperial_examination.7000.t$"
 imperial_examination.7001.desc: "Os sinos dobram, sinalizando que o [GetActivityType('activity_local_examination').GetName|l] terminou e seus resultados foram publicados."
 imperial_examination.7001.desc.host: "\n\nCom isso, uma nova leva de eruditos deu seu primeiro, e mais importante, passo na escada rumo aos altos cargos. Eu preparei o cenário para suas carreiras, mas o restante depende deles."
 imperial_examination.7001.desc.cheater: "\n\nNão estou entre os eruditos da lista, pois os examinadores removeram meu nome da competição."
 imperial_examination.7001.desc.entrant.first: "\n\nMeu nome está no topo da lista, e meus pares viram a cabeça para me olhar com inveja. Está decidido: sou [ROOT.Char.Custom('ES_ElLa')] melhor erudit[ROOT.Char.Custom('ES_OA')] da prefeitura, o caminho para a [GetActivityType('activity_imperial_examination').GetName|l] se abre para mim."
 imperial_examination.7001.desc.entrant: "\n\nEmbora [first_place_entrant.GetFirstName] tenha tomado meu lugar no topo da lista, ainda assim fui aprovado no Exame Provincial com uma nota [ROOT.Char.Custom('PlayerGetExamScoreAdjective')] de #V [ROOT.Char.MakeScope.Var('imperial_examination_score').GetValue|0]#!."
 imperial_examination.7001.desc.fallback: "\n\nCom isso, uma nova leva de eruditos deu seu primeiro, e mais importante, passo na escada rumo aos altos cargos."
 imperial_examination.7001.a: "É um dia para lembrar."
 imperial_examination.7003.desc: "Os sinos tocam, sinalizando que o [GetActivityType('activity_imperial_examination').GetName|l] terminou e seus resultados foram publicados."
 # CLOSE FAMILY NOTIFICATION EVENTS
 # Intro event
 imperial_examination.7100.t: "Família representada no exame"
 imperial_examination.7100.desc: "Pela glória de [Select_CString(host.IsFemale, 'nuestra benigna', 'nuestro benigno' )] [host.GetTitleAsNameNoTooltip|l], temos uma nova leva de aspirantes a governador após o Exame da Capital em [location.GetName]."
 imperial_examination.7100.desc.intro_nr_of_relatives_singular: "Sólo meu [ROOT.Char.Custom2('RelationToMeShort', house_member)], [house_member.Custom('ES_ElLa')] [house_member.GetTitledFirstName|l], compareceu como examinand[house_member.Custom('ES_OA')]."
 imperial_examination.7100.desc.intro_nr_of_relatives: "\n\n[ROOT.Char.MakeScope.Var('num_exam_family_entrants').GetValue] membros da casa [ROOT.Char.GetHouse.GetNameNoTooltip] compareceram como candidatos."
 imperial_examination.7100.desc.all_failed: "[ROOT.Char.Custom('ActivityGetFaileesBothAll')] falharam."
 imperial_examination.7100.desc.all_passed_provincial: "[ROOT.Char.Custom('ActivityGetSuccessfulBothAll')] honraram nosso bom nome e passaram no exame."
 imperial_examination.7100.desc.all_passed_metropolitan: "[ROOT.Char.Custom('ActivityGetSuccessfulBothAll')] honraram nosso bom nome e passaram no Exame Provincial."
 imperial_examination.7100.desc.all_passed: "[ROOT.Char.Custom('ActivityGetFaileesBothAll')] honraram nosso bom nome."
 imperial_examination.7100.desc.one_passed: "Apenas um deles honrou nosso bom nome."
 imperial_examination.7100.desc.win_lose_ratio: "[ROOT.Char.MakeScope.Var('num_exam_family_entrants_passed').GetValue] passaram, enquanto [ROOT.Char.MakeScope.Var('num_exam_family_entrants_failed').GetValue] falharam no teste."
 imperial_examination.7100.desc.won_palace: "Dentre estes, [ROOT.Char.MakeScope.Var('num_exam_family_passed_palace').GetValue] chegaram ao Exame do Palácio."
 imperial_examination.7100.desc.palace_entrant: "\n\n[house_member.Custom('ES_ElLa')|U] [house_member.GetTitledFirstName|l] foi aprovado no Exame Metropolitano com uma nota [activity.Custom('ActivityGetExamScoreAdjective')], o que lhe concedeu o cobiçado convite para participar do Exame do Palácio diante de [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip|l] em pessoa! Com isso, além disso, [house_member.GetFirstNameNoTooltip] trouxe orgulho para a casa [ROOT.Char.GetHouse.GetNameNoTooltip]."
 imperial_examination.7100.desc.metropolitan_entrant: "\n\n[house_member.Custom('ES_ElLa')|U] [house_member.GetTitledFirstName|l] aprovou o Exame Metropolitano com uma nota [activity.Custom('ActivityGetExamScoreAdjective')], mas não conseguiu garantir uma das cobiçadas vagas no Exame do Palácio."
 imperial_examination.7100.desc.failed_entrant: "\n\n[house_member.Custom('ES_ElLa')|U] [house_member.GetTitledFirstName|l] foi reprovado no Exame Metropolitano."
 imperial_examination.7100.desc.cheater: "Não só isso, como foi pego(a) tentando trapacear no evento."
 imperial_examination.7100.desc.got_elder: "Pelo menos conseguiu impressionar [elder.Custom('ES_AlAla')] [elder.GetTitledFirstName|l], um[elder.Custom('ES_OA')] de [elder.Custom('ES_LoLa')] s examinadores imperiais, que [house_member.GetHerHim] adotou como [Concept('disciple',Select_CString(house_member.IsFemale,'discípula', 'discípulo'))|E]."
 imperial_examination.7100.desc.failed_fallback: "Anos e anos de formação extensa e #EMP cara#!, jogados fora em um instante."
 imperial_examination.7100.a.singular: "!"
 imperial_examination.7100.a.tt_first: "#weak Você se dirige ao examinando bem-sucedido#!"
 imperial_examination.7100.a.plural: "Devo felicitar os candidatos do palácio."
 imperial_examination.7100.b.singular: "Recuso-me a aceitar a mediocridade."
 imperial_examination.7100.b.tt_first: "#weak Você se dirige ao examinando metropolitano bem-sucedido#!"
 imperial_examination.7100.b.plural: "Desejo me dirigir aos candidatos de nível inferior."
 imperial_examination.7100.c: "Nesta casa, o fracasso não é tolerado!"
 imperial_examination.7100.c.tt_first: "#weak Você se dirige ao examinando reprovado#!"
 imperial_examination.7100.d: "Não tenho tempo para isso."
 influence_family_effect: "Influenciar os seguintes membros da família:"
 #Metropolitan event
 imperial_examination.7050.t: "Os examinandos metropolitanos"
 imperial_examination.7050.desc: "Por bom que seja ver a casa [ROOT.Char.GetHouse.GetNameNoTooltip] representada em nossa tradição mais esplêndida e venerada, seria de se esperar… um esforço mais concentrado.\n\n"
 imperial_examination.7050.a.singular: "[house_member.GetFirstNameNoTooltip] #EMP deve#! fazer o Exame do Palácio!"
 imperial_examination.7050.a.plural: "Espero que #EMP todos#! concluam o Exame do Palácio."
 imperial_examination.7050.a.tt_singular: "[house_member.GetShortUINameNoTooltip|U] tentará participar no próximo [GetActivityType('activity_imperial_examination').GetNameNoTooltip|l]"
 demand_retake_exam_effect: "#weak Estes personagens tentarão participar do próximo [GetActivityType('activity_imperial_examination').GetNameNoTooltip|l]#!"
 imperial_examination.7050.b: "O mérito, claro, é meu."
 imperial_examination.7050.c.singular: "Sé que lo ha dado todo."
 imperial_examination.7050.c.plural: "Tenho certeza de que fizeram o melhor que puderam."
 #Palace event
 imperial_examination.7055.t: "Família honrada no exame do palácio"
 imperial_examination.7055.desc: "É realmente uma bênção ter a casa [ROOT.Char.GetHouse.GetNameNoTooltip] representada na Exame do Palácio. Minha parentela se apresentou diante de [host.Custom('ES_ElLa')] [host.Custom('GetDaughterSon')|U] do Céu em pessoa e provou ser digna de seus elogios.\n\nCertamente é um sinal de que tempos prósperos estão por vir."
 imperial_examination.7055.b: "Não esperava menos dos membros da casa [ROOT.Char.GetHouse.GetNameNoTooltip]"
 #Failee event
 imperial_examination.7060.t: "Família desonrada no exame metropolitano"
 imperial_examination.7060.desc: "Como posso me apresentar diante de meus pares quando meus parentes passam vergonha e falham em honrar nossa tradição mais venerada? Talvez seja necessário um pouco de disciplina rígida."
 imperial_examination.7060.c: "Tentou trapacear #EMP así#!?"
 imperial_examination.7060.b: "Os resultados podem se misturar o tempo todo…"
 imperial_examination.7060.b.tt_singular: "O resultado [failed_entrant.Custom('ES_DelDela')] [failed_entrant.GetTitledFirstName|l] será trocado pelo de um candidato aprovado"
 imperial_examination.7060.b.tt_plural: "As respostas da prova dos candidatos bem-sucedidos serão creditadas à sua [close_family|lE] e aos seus [Concept('extended_family', 'parientes')|E]"
 imperial_examination.7060.d: "Isto é inadmissível!"
