 imperial_examination.5200.t: "Demonstração de tiro com arco"
 imperial_examination.5200.desc: "[host.Custom('ES_ElLa')|U] [host.GetTitleAsNameNoTooltip|l] me observa com um olhar avaliador. Com um amplo gesto para nós, os candidatos, proclama: "Uma postura imprópria revela falta de integridade. Uma técnica deficiente revela um poder de vontade corruptível".\n\nJunta os dedos em forma de torre e lança o olhar sobre o pátio. "Pela trajetória da sua flecha, julgarei sua capacidade de conquistar cidades e proteger nossas fronteiras. Esta é sua última chance de me impressionar".\n\nEle se vira e me chama para avançar."
 imperial_examination.5200.a: "Vou dar o meu máximo!"
 imperial_examination.5200.b: "Melhor não correr riscos."
 imperial_examination.5300.t: "O ensaio imperial"
 imperial_examination.5300.desc: "[host.Custom('ES_ElLa')|U] [host.GetTitleAsNameNoTooltip|l] me observa com um olhar avaliador. Com um amplo gesto para nós, os examinandos, proclama: "Uma má educação nos clássicos revela falta de moralidade. Um comentário fraco expõe fraqueza de resolução".\n\nJunta os dedos e olha para o pátio. "Pelos traços de vossos pincéis, julgarei vossa capacidade de governar o povo e preservar nossas tradições. Esta é vossa última chance de me impressionar".\n\nEle se vira e me chama adiante."
 imperial_examination.5300.a: "Apresentarei um argumento minucioso."
 imperial_examination.5300.b: "$imperial_examination.5200.b$"
 imperial_examination.5400.t: "$imperial_examination.5300.t$"
 imperial_examination.5400.desc: "$imperial_examination.5300.desc$"
 imperial_examination.5400.a: "$imperial_examination.5300.a$"
