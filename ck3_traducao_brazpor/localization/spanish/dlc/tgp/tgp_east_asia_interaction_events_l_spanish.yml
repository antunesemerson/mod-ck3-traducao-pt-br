l_spanish:
 tgp_east_asia_interaction_events.0010.opening: "[leaving_tributary.Custom2('AppropriateGreeting', ROOT.Char)]"
 tgp_east_asia_interaction_events.0010.desc: "Agora sirvo a outr[leaving_tributary.Custom('ES_OA')] devaraja. Um[leaving_tributary.Custom('ES_XA')] que nos mostrará o verdadeiro caminho.

Salve, [leaving_tributary.GetSuzerain.GetName]!"
 tgp_east_asia_interaction_events.0010.a: "[recipient.Custom2('AppropriateGreeting', actor )]"
 tgp_east_asia_interaction_events.0010.tt: "Meu devaraja apresenta um argumento convincente.

Permita-nos servi-lo, ainda que só por mais um pouco de tempo."
 tgp_east_asia_interaction_events.0020.opening: "Era o que eu pensava."
 tgp_east_asia_interaction_events.0020.desc: "Meu devaraja apresenta um argumento convincente.

Permita-nos servi-lo, ainda que só por mais um pouco de tempo."
 tgp_east_asia_interaction_events.0020.a: "Abraçado: um desafiante se aproxima"
 tgp_east_asia_interaction_events.0025.opening: "Parece que essa espécie de [actor.Custom2('InsultNoun', ROOT.Char)|l] que é [actor.Custom('ES_ElLa')] [actor.GetTitledFirstName|l] está tentando desviar meu tributári[recipient.Custom('ES_OA')], [recipient.Custom('ES_ElLa')] [recipient.GetTitledFirstName|l].\n\nTem-se feito tentativas de convencer [recipient.GetFirstNameNoTooltip] da ridícula divindade de [actor.GetFirstNameNoTooltip], ofuscando a minha."
 tgp_east_asia_interaction_events.0025.desc: "Vejo suas mentiras mesquinhas e não serei coagido tão facilmente!

Espero mais de um[ROOT.Char.Custom('ES_XA')] autêntic[ROOT.Char.Custom('ES_OA')] devaraja!"
 tgp_east_asia_interaction_events.0025.a: "[sending_character.Custom2('AppropriateGreeting', ROOT.Char)]"
 tgp_east_asia_interaction_events.0030.t: "Lamento informar-vos, [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('sending_character'))] de alma traidora, que escolhi reafirmar à força o papel tributário de [recipient.GetTitledFirstName|l].\n\nConsiderai isto um aviso."
 tgp_east_asia_interaction_events.0030.desc: "Lamento informar-vos de que minha fé permanece com meu verdadeiro devaraja, [recipient.GetSuzerain.Custom('ES_ElLa')] [recipient.GetSuzerain.GetTitledFirstName|l].

Não nos importune mais."
 tgp_east_asia_interaction_events.0030.a: "Entendo."
 tgp_east_asia_interaction_events.0030.b: "Acolheu meu tributário"
 tgp_east_asia_interaction_events.0030.c: "Tentou acolher meu tributário"
 tgp_east_asia_interaction_events.0035.opening: "Raiz, tronco e ramo"
 tgp_east_asia_interaction_events.0035.desc.warring: "É meu dever celestial promover o bem e eliminar o mal; e, quanto a este último, não há fonte de mal maior ao meu alcance do que [recipient.Custom('ES_ElLa')] [recipient.GetTitledFirstName|l]! Seus crimes #EMP mancham#! sua linhagem, e para um culpado assim não pode haver perdão; a erradicação desse mal deve chegar até suas raízes.

Aqueles que se opuserem à nossa vontade tremerão diante de sua destruição; sua cabeça será separada do corpo e deixada a apodrecer no mercado, seus ossos ficarão sem sepultura, seu espírito vagará inquieto e todo aquele que compartilhar seu sangue venenoso será executado ou banido para os quatro cantos do mundo."
 tgp_east_asia_interaction_events.0035.desc: "Lamento informar-vos de que minha fé permanece com meu verdadeiro devaraja, [recipient.GetSuzerain.Custom('ES_ElLa')] [recipient.GetSuzerain.GetTitledFirstName|l].

Não nos importune mais."
 tgp_east_asia_interaction_events.0035.a: "O poder do Estado é absoluto"
 embraced_my_tributary_opinion: "Todos os pais e filhos adultos abaixo da [retirement_age|El] e do gênero dominante da sua [faith|El] serão executados"
 attempted_to_embrace_my_tributary_opinion: "Serão [Concept('banished', 'banidos')|E] do [realm|El] [spouses|El] ou [concubines|El], bem como a [close_family|El] e a [Concept('extended_family', 'família extensa')|E] da mesma [house|El]"
 tgp_east_asia_interaction_events.2000.t: "Serão poupados [spouses|El] ou [concubines|El], bem como a [close_family|El] e a [Concept('extended_family', 'família extensa')|E] que estejam em um casamento com, ou sejam filhos de, um membro da [house|El] governante de [actor.GetHouse.GetName]"
 tgp_east_asia_interaction_events.2000.desc: "É meu dever celestial promover o bem e eliminar o mal; e, quanto a este último, não há fonte de mal maior ao meu alcance do que [recipient.Custom('ES_ElLa')] [recipient.GetTitledFirstName|l]! Seus crimes #EMP mancham#! sua linhagem, e para um culpado assim não pode haver perdão; a erradicação desse mal deve chegar até suas raízes.

Aqueles que se opuserem à nossa vontade tremerão diante de sua destruição; sua cabeça será separada do corpo e deixada a apodrecer no mercado, seus ossos ficarão sem sepultura, seu espírito vagará inquieto e todo aquele que compartilhar seu sangue venenoso será executado ou banido para os quatro cantos do mundo."
 tgp_east_asia_interaction_events.2000.a: "Por minha vontade e por meu direito, #EMP #bold acabaré#! com seu nome#!."
 tgp_east_asia_interaction_events.2000.a.title: "Punição Coletiva"
