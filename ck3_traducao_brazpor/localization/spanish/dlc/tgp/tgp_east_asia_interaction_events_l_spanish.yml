l_spanish:
 tgp_east_asia_interaction_events.0010.opening: "[leaving_tributary.Custom2('AppropriateGreeting', ROOT.Char)]"
 tgp_east_asia_interaction_events.0010.desc: "Ahora sirvo a otr[leaving_tributary.Custom('ES_OA')] devaraja. Un[leaving_tributary.Custom('ES_OA')] que nos mostrará el auténtico camino.\n\n¡Salve, [leaving_tributary.GetSuzerain.GetName]!"
 tgp_east_asia_interaction_events.0010.a: "Como isso pode ser?!"
 tgp_east_asia_interaction_events.0010.tt: "[leaving_tributary.GetShortUIName|U] não é mais [Concept('tributary', Select_CString(leaving_tributary.IsFemale, 'sua tributária', 'seu tributário' ) )|E]"
 tgp_east_asia_interaction_events.0020.opening: "[recipient.Custom2('AppropriateGreeting', actor )]"
 tgp_east_asia_interaction_events.0020.desc: "Mi devaraja presenta un argumento convincente.\n\nPermitidnos serviros, aunque sea solo un poco más de tiempo."
 tgp_east_asia_interaction_events.0020.a: "Era o que eu pensava."
 tgp_east_asia_interaction_events.0025.opening: "[recipient.Custom2('AppropriateGreeting', actor )]"
 tgp_east_asia_interaction_events.0025.desc: "¡Veo vuestras mentiras ruines y no se me coaccionará tan fácilmente!\n\n¡Esperaba más de un[ROOT.Char.Custom('ES_XA')] auténtic[ROOT.Char.Custom('ES_OA')] devaraja!"
 tgp_east_asia_interaction_events.0025.a: "Bem, então…"
 tgp_east_asia_interaction_events.0030.t: "Abraçado: um desafiante se aproxima"
 tgp_east_asia_interaction_events.0030.desc: "Parece que essa espécie de [actor.Custom2('InsultNoun', ROOT.Char)|l] que é [actor.Custom('ES_ElLa')] [actor.GetTitledFirstName|l] está tentando desviar meu tributári[recipient.Custom('ES_OA')], [recipient.Custom('ES_ElLa')] [recipient.GetTitledFirstName|l].\n\nTem-se feito tentativas de convencer [recipient.GetFirstNameNoTooltip] da ridícula divindade de [actor.GetFirstNameNoTooltip], ofuscando a minha."
 tgp_east_asia_interaction_events.0030.a: "Vou livrar sua mente dessa bobagem."
 tgp_east_asia_interaction_events.0030.b: "Vou resolver isso à força!"
 tgp_east_asia_interaction_events.0030.c: "Tenho assuntos mais importantes para atender."
 tgp_east_asia_interaction_events.0035.opening: "[sending_character.Custom2('AppropriateGreeting', ROOT.Char)]"
 tgp_east_asia_interaction_events.0035.desc.warring: "Lamento informaros, [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('sending_character'))] de alma traicionera, que he elegido refirmar por la fuerza el papel tributario [recipient.Custom('ES_DelDela')] [recipient.GetTitledFirstName|l].\n\nConsiderad esto una advertencia."
 tgp_east_asia_interaction_events.0035.desc: "Lamento informaros de que mi fe permanece con mi auténtic[recipient.GetSuzerain.Custom('ES_OA')] devaraja, [recipient.GetSuzerain.Custom('ES_ElLa')] [recipient.GetSuzerain.GetTitledFirstName|l].\n\nNo nos importunéis más."
 tgp_east_asia_interaction_events.0035.a: "Entendo."
 embraced_my_tributary_opinion: "Acolheu meu tributário"
 attempted_to_embrace_my_tributary_opinion: "Tentou acolher meu tributário"
 tgp_east_asia_interaction_events.2000.t: "Raiz, tronco e ramo"
 tgp_east_asia_interaction_events.2000.desc: "Es mi deber celestial impulsar el bien y eliminar el mal; y al respecto de esto último, ¡no hay mayor fuente de mal a mi alcance que [recipient.Custom('ES_ElLa')] [recipient.GetTitledFirstName|l]! Sus delitos #EMP mancillan#! su linaje, y para semejante culpable no puede haber perdón; la erradicación de este mal debe llegar hasta sus raíces.\n\nQuienes se opongan a nuestra voluntad temblarán ante la destrucción de su persona; se le separará la cabeza del cuerpo y se dejará que se pudra en el mercado, sus huesos no tendrán sepultura, su espíritu vagará errante y todo aquel que comparta su sangre ponzoñosa será ejecutado o desterrado a los extremos del mundo."
 tgp_east_asia_interaction_events.2000.a: "Por minha vontade e por meu direito, #EMP #bold acabaré#! com seu nome#!."
 tgp_east_asia_interaction_events.2000.a.title: "Punição Coletiva"
 tgp_east_asia_interaction_events.2000.a.tt: "[recipient.GetShortUIName] e sua família foram purgados por [Select_CString( purger.IsLocalPlayer, 'ti', purger.GetShortUIName )]"
 auto_accept_interaction_huangdi: "O poder do Estado é absoluto"
 celestial_extinguish_noble_family_interaction_death_explanation: "Todos os pais e filhos adultos abaixo da [retirement_age|El] e do gênero dominante da sua [faith|El] serão executados"
 celestial_extinguish_noble_family_interaction_banish_explanation: "Serão [Concept('banished', 'banidos')|E] do [realm|El] [spouses|El] ou [concubines|El], bem como a [close_family|El] e a [Concept('extended_family', 'família extensa')|E] da mesma [house|El]"
 celestial_extinguish_noble_family_interaction_exemption_explanation: "Serão poupados [spouses|El] ou [concubines|El], bem como a [close_family|El] e a [Concept('extended_family', 'família extensa')|E] que estejam em um casamento com, ou sejam filhos de, um membro da [house|El] governante de [actor.GetHouse.GetName]"
 is_currently_being_purged_tt: "[recipient.GetShortUIName] está sendo expurgado"
 purged_banishment_opinion: "Criminoso banido"
 purged_execution_opinion: "Condenado à morte"
