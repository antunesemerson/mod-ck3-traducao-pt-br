l_spanish:
 FUJIWARA_GLOSS: "#bold $dynn_Fujiwara$#! fue el [Glossary( 'honsei', 'HONSEI_GLOSS' )] con el que el emperador $Tenji$ obsequió a su cortesano influyente, $dynn_Nakatomi$ $Kamatari$.\n\nLas muchas ramas de sus descendientes dominarían la política japonesa durante siglos y servirían como [Glossary( 'kampaku', 'KAMPAKU_GLOSS' )] de la familia imperial [Glossary( 'Yamato', 'YAMATO_GLOSS' )].\n\nJunto con los [Glossary( 'Seiwa Minamoto', 'MINAMOTO_GLOSS' )] y los [Glossary( 'Kanmu Taira', 'TAIRA_GLOSS' )], los $dynn_Fujiwara$ fueron una de las casas más poderosas de la Alta Edad Media de Japón.\n\nSu [Glossary( 'mon', 'MON_GLOSS' )] tradicional era una flor de #EMP sagarifuji#! —glicina—."
 MINAMOTO_GLOSS: "#bold $dynn_Minamoto$#! — ou #EMP Genji#! — foi um [Glossary( 'honsei', 'HONSEI_GLOSS' )] concedido aos descendentes deserdados da família imperial [Glossary( 'Yamato', 'YAMATO_GLOSS' )]. A família $dynn_Minamoto$ mais importante descendia do imperador $Seiwa$.\n\nJunto com os [Glossary( 'Fujiwara', 'FUJIWARA_GLOSS' )] e os [Glossary( 'Kanmu Taira', 'TAIRA_GLOSS' )], os $Seiwa$ $dynn_Minamoto$ foram uma das casas mais poderosas do Japão na Alta Idade Média.\n\nSeu [Glossary( 'mon', 'MON_GLOSS' )] tradicional eram três flores de #EMP rindō#! —genciana— que brotavam de cinco folhas de bambu."
 TAIRA_GLOSS: "#bold $dynn_Taira$#! — ou #EMP Heike#! — foi um [Glossary( 'honsei', 'HONSEI_GLOSS' )] concedido aos descendentes deserdados da família imperial [Glossary( 'Yamato', 'YAMATO_GLOSS' )]. A família $dynn_Taira$ mais importante descendia do imperador $Kanmu$.\n\nJunto com os #EMP [Glossary( 'Fujiwara', 'FUJIWARA_GLOSS' )]#! e os #EMP [Glossary( 'Seiwa Minamoto', 'MINAMOTO_GLOSS' )]#!, os $Kanmu$ $dynn_Taira$ foram uma das casas mais poderosas da alta Idade Média do Japão.\n\nSeu [Glossary( 'mon', 'MON_GLOSS' )] tradicional era um(a) #EMP agehachō#! —borboleta-cauda-de-andorinha asiática—."
 TACHIBANA_GLOSS: "#bold $dynn_Tachibana$#! foi um [Glossary( 'honsei', 'HONSEI_GLOSS' )] concedido aos descendentes deserdados da família imperial [Glossary( 'Yamato', 'YAMATO_GLOSS' )].\n\nA família $dynn_Tachibana$ mais importante descendia do imperador $Bidatsu$.\n\nSeu [Glossary( 'mon', 'MON_GLOSS' )] tradicional era uma flor de árvore de #EMP tachibana#! —mandarina—."
 TAKASHINA_GLOSS: "#bold $dynn_Takashina$#! foi um [Glossary( 'honsei', 'HONSEI_GLOSS' )] concedido aos descendentes deserdados da família imperial [Glossary( 'Yamato', 'YAMATO_GLOSS' )].\n\nA família $dynn_Takashina$ mais importante descendia do imperador $Tenmu$."
 YAMATO_GLOSS: "Diz-se que a casa imperial #bold $dynn_Yamato$#! do Japão descende da própria deusa do sol, Amaterasu. Embora já tenham sido imperadores poderosos, os influentes [Glossary( 'Fujiwara', 'FUJIWARA_GLOSS' )] lhes tomaram o controle dos verdadeiros órgãos de governo do Estado para governar como regentes da dinastia imperial.\n\nMuitas das famílias mais influentes do Japão descendem diretamente dos imperadores de Yamato, incluindo os [Glossary( 'Minamoto', 'MINAMOTO_GLOSS' )] e os [Glossary( 'Taira', 'TAIRA_GLOSS' )].\n\nSeu [Glossary( 'mon', 'MON_GLOSS' )] tradicional era uma flor de #EMP kikka#! —crisântemo—."
 KAMPAKU_GLOSS: "#bold Kampaku#! es el título que recibe el regente oficial de un emperador adulto de Japón. Al principio fue un puesto de honor cercano al [Glossary( 'emperador', 'TENNO_GLOSS' )], pero la familia Fujiwara le arrebató poco a poco el control, hasta que el kampaku se convirtió en el gobernante de facto y los emperadores solo fueron figuras decorativas."
 TENNO_GLOSS: "#bold Ten'nō#! é o título dado ao imperador do Japão. Com o tempo, os regentes Fujiwara foram gradualmente tomando o controle da família imperial, até que o [Glossary( 'kampaku', 'KAMPAKU_GLOSS' )] se tornou o governante de fato, e os imperadores eram meras figuras decorativas."
 JOKO_GLOSS: "#bold Jōkō#! es el término general para un antiguo [Glossary( 'emperador', 'TENNO_GLOSS' )] que ha abdicado del Trono del Crisantemo. Como la familia imperial se disputaba el poder, se hizo cada más frecuente que un emperador eligiese abdicar cuando su sucesión estaba asegurada con un heredero sano, lo que le permitía participar en la política detrás del trono, sin sus responsabilidades ceremoniales."
 SHOEN_GLOSS: "#bold Shōen#! eram as casas senhoriais dos clãs nobres japoneses e as terras agrícolas anexas que estes foram arrancando cada vez mais do controle central à medida que o sistema centralizado [ritsuryo|lE] declinava."
 HONSEI_GLOSS: "Os #bold honsei#! —#EMP os sobrenomes originais#! — como #EMP [Glossary( 'Fujiwara', 'FUJIWARA_GLOSS' )]#!, #EMP [Glossary( 'Minamoto', 'MINAMOTO_GLOSS' )]#!, #EMP [Glossary( 'Taira', 'MINAMOTO_GLOSS' )]#!, #EMP [Glossary( 'Tachibana', 'TACHIBANA_GLOSS' )]#! e #EMP [Glossary( 'Takashina', 'TAKASHINA_GLOSS' )]#! são os sobrenomes mais antigos e prestigiados do Japão, tendo sido concedidos pela família imperial aos seus cortesãos.\n\nEsses sobrenomes acabariam por ser esclarecidos ou substituídos pelos sobrenomes #EMP Kamei#! e #EMP Uji#!, à medida que crescia a necessidade de diferenciar os ramos familiares e a corte imperial declinava."
 HEIJI_REBELLION_GLOSS: "A #bold Rebelião Heiji#! foi um conflito entre a casa [Glossary( 'Kawachi Minamoto', 'MINAMOTO_GLOSS' )] e o clã [Glossary( 'Kanmu Taira', 'TAIRA_GLOSS' )], com estes últimos apoiados por outras casas Minamoto, pelo controle do Imperador do Japão. \n\nAo acreditar que a corte imperial favorecia seus rivais, os Minamoto se rebelaram para tentar impedir isso. No fim, foram derrotados, e muitos membros da casa foram exilados ou executados."
 RONIN_GLOSS: "#bold Rōnin#! —literalmente #EMP "pessoa-onda"#! — foi um termo que surgiu no final do período Nara para se referir ao servo que fugia da terra de seu senhor. Mais tarde, passou a designar os samurais que não tinham senhor, seja pela morte dele ou pela perda de seu favor ou status. Sem trabalho e com poucas habilidades além do combate, muitos rōnin recorriam ao crime para sobreviver."
 MON_GLOSS: "Os #bold mon#! –#EMP brasão#! — eram os emblemas com os quais se associavam e identificavam as casas aristocráticas do Japão e seus muitos ramos."
 CHRYSANTHEMUM_THRONE_GLOSS: "El #bold Trono del Crisantemo#! se refiere al takamikura o trono imperial de Japón, tanto en el sentido literal como a la representación metonímica del [Glossary( 'emperador', 'TENNO_GLOSS' )], y a la autoridad legal para la existencia de su gobierno. El sello imperial, que presenta un crisantemo de dieciséis pétalos, fue adoptado por primera vez por el emperador Go-Toba (1180-1239) como símbolo personal, y más tarde fue adoptado por la [Glossary( 'casa imperial', 'YAMATO_GLOSS' )]. El crisantemo representa la longevidad y la renovación, en consonancia con la línea imperial ininterrumpida de Japón."
