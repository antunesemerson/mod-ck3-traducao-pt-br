l_spanish:
 emperor_imperial_examination.100.t: "Com admiração"
 emperor_imperial_examination.100.desc: "\"Muito august[ROOT.Char.Custom('ES_OA')] e sabi[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l], é a maior honra estar em vossa presença\". Meu [ROOT.Char.Custom2('RelationToMeShort', examination_character_2)], [examination_character_2.Custom('ES_ElLa')] [examination_character_2.GetTitledFirstName|l], fala com admiração. \"Que este exame prove que sou seu leal servidor[examination_character_2.Custom('ES_OA')] leal servidor[examination_character_2.Custom('ES_XA')]\".\n\n\"Que a força e o esplendor de [ROOT.Char.GetPrimaryTitle.GetNameNoTier] e [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.Custom('GetDaughterSon')|U] do Céu durem dez mil anos!\"."
 emperor_imperial_examination.100.a: "A lealdade, uma virtude acima de tudo."
 emperor_imperial_examination.100.b: "Elogios são fugazes, ações exigem esforço."
 imperial_examination.advantage.other.tt: "Ganha [exam_advantage|lE]"
 imperial_examination.advantage.dynasty_legacy.tt: "Como você desbloqueou o legado dinástico [GetDynastyPerk( 'tgp_chinese_legacy_1' ).GetName] , você começará a atividade com uma [exam_advantage|El]"
 emperor_imperial_examination.200.t: "Uma beleza selecionada"
 emperor_imperial_examination.200.desc: "«Vossa estimada majestade», diz reverentemente meu [ROOT.Char.Custom2('RelationToMeShort', examination_character_2)], [examination_character_2.Custon('ES_ElLa')] [examination_character_2.GetTitledFirstName|l]. «Durante minhas viagens por [concubine_origin.GetNameNoTier], conheci uma família de boa posição, os [examination_character_1.GetHouse.GetName], e falei com os anciãos da comunidade [examination_character_1.GetCulture.GetName]».\n\n«Pediram-me que escolhesse um[examination_character_1.Custom('ES_XA')] [examination_character_1.GetLadyLord] para servi-lo no palácio interno. Escolhi [examination_character_1.GetFirstName], um[examination_character_1.Custom('ES_XA')] [examination_character_1.GetWomanMan] de rara graça. Esperamos que ele vos agrade, ó [ROOT.Char.Custom('GetDaughterSon')|U] do Céu»."
 emperor_imperial_examination.200.a: "Pode se juntar ao harém."
 emperor_imperial_examination.200.b: "Conte-me sobre suas viagens, então."
 emperor_imperial_examination.200.c: "Meu palácio parece um bordel?"
 emperor_imperial_examination.300.t: "Oferta de relíquia"
 emperor_imperial_examination.300.desc: "\"Grande [ROOT.Char.GetTitleAsNameNoTooltip|l], imensa é vossa sábia graça\". Meu [ROOT.Char.Custom2('RelationToMeShort', examination_character_2)], [examination_character_2.Custon('ES_ElLa')] [examination_character_2.GetTitledFirstName|l], se prostra diante de mim. \"Trago uma humilde oferta, um artefato para exibir no palácio\".\n\n\"Este objeto, [newly_created_artifact.GetName], é uma relíquia da casa [examination_character_2.GetHouse.GetName]. Não pedimos mais do que vossa soberana majestade nos reconheça como servos leais\"."
 emperor_imperial_examination.300.a: "Uma oferenda digna."
 emperor_imperial_examination.300.b: "É de qualidade inferior; livre-se disso."
 emperor_imperial_examination.300.c: "A casa [examination_character_2.GetHouse.GetNameNoTooltip] precisa se concentrar no exame."
 emperor_imperial_examination.400.t: "Recitando os Anais"
 emperor_imperial_examination.400.desc: "Os examinadores e examinandos do palácio estão reunidos, lendo intensamente e sussurrando entre si em vozes baixas e nervosas. É mais do que justo que eu, [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.Custom('GetDaughterSon')|U] do Céu, transmita alguma sabedoria atemporal. Ao meu sinal, a sala cai em silêncio, tomada de admiração, à espera.\n\nFaço um gesto em direção às estantes e os servos vêm trazendo…"
 emperor_imperial_examination.400.a: "… os Anais de [ROOT.Char.Custom('GetRandomAnnalsPassage')]."
 emperor_imperial_examination.400.b: "… um trecho de [ROOT.Char.Custom('GetRandomPoetryPassage')]."
 emperor_imperial_examination.400.c: "… um trecho de [ROOT.Char.Custom('GetRandomRitesPassage')]."
 every_palace_entrant: "Todo candidato a entrar no palácio"
 custom_every_examiner: "Todo examinador"
 emperor_imperial_examination.500.t: "A poesia de [examination_character_2.GetFirstNameNoTooltip]"
 emperor_imperial_examination.500.desc: "«Majestade celestial, escrevi um poema em honra de vossa graça infinita». Meu [ROOT.Char.Custom2('RelationToMeShort', examination_character_2)]; [examination_character_2.Custom('ES_ElLa')] [examination_character_2.GetTitledFirstName|l]; abre um livro e recita:\n\n#EMP «Su [examination_character_2.Custom('GetAdventureNameBand')|l] de [examination_character_2.Custom('GeneratePoem_Title_Fragment_Season')], su [examination_character_2.Custom('GetAdventureNameBand')|l] de [examination_character_2.Custom('GetAdventureNameSuffix')|l] y [examination_character_2.Custom('GetAdventureNameSuffix')|l]… [examination_character_2.Custom('GetAdventureNamePrefixes')|l] en [poetry_province.Custom('GetTerrainTypePlural')], [examination_character_2.Custom('GetRandomSmallPreciousItem')] en sus manos. De [poetry_county.GetNameNoTier], en [poetry_province.Custom('ProvinceCompliment')] [examination_character_2.Custom('GeneratePoem_Title_Fragment_Noun')|l], [ROOT.Char.GetPrimaryTitle.GetNameNoTier] siendo tan [examination_character_2.Custom('FormalComplimentAdjective')|l]».#!\n\n[examination_character_2.GetSheHe|U] aguarda ansiosamente meu veredito."
 emperor_imperial_examination.500.a: "Seus versos são contidos, mas cheios de sentido."
 emperor_imperial_examination.500.b: "Palavras tão insuficientes quanto seu mérito."
 emperor_imperial_examination.600.t: "De bom humor"
 emperor_imperial_examination.600.desc: "Enquanto observava a multidão, um[examination_character_2.Custom('ES_OA')] de [examination_character_2.GetHerHim]s examinados, [examination_character_2.Custom('ES_Ella')] [examination_character_2.GetTitledFirstName|l], está tão absort[examination_character_2.Custom('ES_OA')] contando piadas que mal percebe para onde vai. Andando lentamente para trás, aproxima-se de mim sem querer, exclamando: \"... e foi assim que sua [examination_character_2.Custom('GetAdventureNameBand')|l] ficou sem [examination_character_2.Custom('GetAdventureNameSuffix')|l]!\"\n\nTusso levemente.\n\nA multidão à frente de [examination_character_2.GetSheHe] fica em silêncio. [examination_character_2.GetFirstNameNoTooltip] congela de medo."
 emperor_imperial_examination.600.a: "Quanta graça."
 emperor_imperial_examination.600.b: "Basta, concentrem-se no exame."
 emperor_imperial_examination.600.c: "Que desfeita; parta imediatamente."
 emperor_imperial_examination.700.t: "Presente de prata"
 emperor_imperial_examination.700.desc: "\"Grande [ROOT.Char.GetTitleAsNameNoTooltip|l]\", meu [ROOT.Char.Custom2('RelationToMeShort', examination_character_2)], [examination_character_2.Custom('ES_ElLa')] [examination_character_2.GetTitledFirstName|l], se inclina profundamente. \"Minha família, os [examination_character_2.GetHouse.GetName], tem contatos com os comerciantes da [GetSituationType('silk_road_situation').GetName|l] e o $sea_yellow_sea$; contatos que aproveitei para lhe oferecer um humilde presente\".\n\n\"É um cofre de moedas de prata de [silver_county.GetNameNoTier], que trazem o selo [silver_county_top_liege.Custom('ES_DelDela')] [silver_county_top_liege.GetTitleAsNameNoTooltip|l] de [silver_county_top_liege.GetPrimaryTitle.GetDefinitiveName|l]\"."
 emperor_imperial_examination.700.a: "Aceito magnanimamente."
 emperor_imperial_examination.700.b: "Contai-me sobre [silver_county_top_liege.GetPrimaryTitle.GetDefinitiveNameNoTooltip|l]."
 emperor_imperial_examination.700.c: "Dividam-no entre vocês; usem-no para os seus estudos."
 situation_type_silk_road_situation: "A Rota da Seda"
 situation_type_silk_road_situation_desc: "$game_concept_silk_road_situation_desc$"
 emperor_imperial_examination.800.t: "Um eunuco tributo"
 emperor_imperial_examination.800.desc: "\"Magnânim[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l], vos[examination_character_2.Custom('ES_OA')] humilde servo vos pede perdão por esta interrupção\", diz meu [ROOT.Char.Custom2('RelationToMeShort', examination_character_2)], [examination_character_2.Custom('ES_ElLa')] [examination_character_2.GetTitledFirstName|l], inclinando-se com um gongshou. \"Este é [examination_character_1.GetFirstName], um [GetTrait('eunuch_1').GetName( GetNullCharacter )|l] engenhoso, muito leal à casa [examination_character_2.GetHouse.GetName]\".\n\n\"Oferecemos seus serviços ao palácio, para que [ROOT.Char.GetPrimaryTitle.GetNameNoTier] floresça sob vossa graça\"."
 emperor_imperial_examination.800.a: "Encontraremos uma posição para ele."
 emperor_imperial_examination.800.b: "Ele poderia ser um examinador."
 emperor_imperial_examination.800.c: "Ficai com vosso servo."
 becomes_imperial_examiner.tt: "Torna-se um examinador"
 emperor_imperial_examination.900.t: "Um[examination_character_2.Custom('ES_XA')] servo[examination_character_2.Custom('ES_EA')] [examination_character_2.Custom('ComplimentAdjective')]"
 emperor_imperial_examination.900.desc: "\"Celestial [ROOT.Char.GetTitleAsNameNoTooltip|l], agradecemos-lhe este banquete\", diz meu [ROOT.Char.Custom2('RelationToMeShort', examination_character_1)], [examination_character_1.Custom('ES_ElLa')] [examination_character_1.GetTitledFirstName|l], enquanto se inclina profundamente com um[examination_character_2.Custom('ES_XA')] serviç[examination_character_2.Custom('ES_EA')] ao seu lado. \"Est[examination_character_2.Custom('ES_EA')] é meu [examination_character_1.Custom2('RelationToMeShort', examination_character_2)] [examination_character_2.GetFirstName], que traz um humilde presente: [examination_character_1.Custom('GetExpensiveDrink')] de meu lar, [origin_county.GetNameNoTier]\".\n\n\"Mas, mais do que a bebida, ofereço-lhe seus serviços. Seus conhecimentos de [examination_character_2.Custom('highest_skill_noun')|l] servirão bem ao palácio\"."
 emperor_imperial_examination.900.a: "As habilidades dela/dele são bem-vindas."
 emperor_imperial_examination.900.b: "Servirá melhor a você."
 emperor_imperial_examination.1000.t: "Talento estrangeiro"
 emperor_imperial_examination.1000.desc: "«Sabi[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l], apresento-me diante de vós com humilde agradecimento», diz [examination_character_2.Custom('ES_ElLa')] [examination_character_2.GetTitledFirstName|l], [Select_CString(examination_character_2.IsFemale, 'la examinanda palaciega', 'el examinando palaciego' )] , que fala um [chinese.GetLanguage.GetName] impecável. «Embora minha língua e nação de nascimento seja a [examination_character_2.GetCulture.GetName] , cheguei até aqui por vossa graça e não desejo nada mais do que servir a [ROOT.Char.GetPrimaryTitle.GetNameNoTier]».\n\n«Assim, aprendi a língua dos céus: o [chinese.GetLanguage.GetName], como sinal de humildade [examination_character_2.GetCulture.GetName]»."
 emperor_imperial_examination.1000.a: "Seus esforços serão reconhecidos."
 emperor_imperial_examination.1000.b: "A imitação [examination_character_2.GetCulture.GetNameNoTooltip] não tem lugar aqui."
