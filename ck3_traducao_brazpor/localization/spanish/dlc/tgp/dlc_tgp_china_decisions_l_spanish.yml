 claim_the_mantle_of_maitreya_decision_desc: "O mundo caiu na confusão. Monges e monjas abandonaram seus preceitos e seu dever para com o dharma; buscam riqueza material e se entregam aos prazeres terrenos.\n\nO povo anseia por um salvador que o liberte de seu sofrimento e aguarda com devoção o dia em que Maitreya descerá do firmamento celestial para renovar o mundo e trazer paz e prosperidade a todos.\n\nNão terão de esperar mais muito."
