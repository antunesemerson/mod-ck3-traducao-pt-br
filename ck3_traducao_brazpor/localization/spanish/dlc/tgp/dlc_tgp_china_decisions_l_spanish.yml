 return_to_the_steppe_decision: "Retorno à estepe"
 return_to_the_steppe_decision_desc: "Al buscar convertirnos en señores de ciudades, canjeamos nuestro derecho de nacimiento por sedas y tronos. Pero aquí, detrás de los muros de palacio somos poco más que prisioneros de aquellos que afirman servirnos.\n\n#EMP;high Mejor vivir como lobos bajo el cielo despejado que como pastores esclavos de nuestro propio rebaño.#!"
