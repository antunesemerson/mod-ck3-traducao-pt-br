l_spanish:
 ##################################################
 # JAPAN CAREER EVENTS
 ##################################################
 tgp_japan_career.0001.t: "A História dos [new_ruler.GetDynastyNameNoTooltip]"
 tgp_japan_career.0001.desc: "[kampaku.GetPrimaryTitle.GetDefinitiveName|U] está repleto de [blocs|lE], todos competindo pelo controle e pelo poder."
 tgp_japan_career.0001.soryo_desc: "Como governante [new_ruler.GetGovernment.GetName|l], minha família domou as províncias e sufocou rebeliões! Merecemos um grau de autonomia e poder pessoal que não está ao alcance desses decadentes burocratas [ritsuryo|El] da capital, [kampaku.GetCapitalLocation.GetTitle.GetNameNoTier|U].

Preciso aumentar meu exército, defender meu feudo e expandir nosso domínio. Cabe a mim restaurar a ordem em [kampaku.GetPrimaryTitle.GetNameNoTier] e a glória da minha [house|El] ? os [new_ruler.GetHouse.GetName]!"
 tgp_japan_career.0001.ritsuryo_desc: "Como governante [new_ruler.GetGovernment.GetName|l], meus deveres como burocrata residem na capital, [kampaku.GetCapitalLocation.GetTitle.GetNameNoTier|U]. Esse centro de poder e cultura é um terreno fértil para expandir a influência da minha casa, seja por meio de feitos exemplares ou de uma política de Estado astuta.

Essas tradições elegantes estão sendo minadas por guerreiros provincianos arrivistas [soryo|El] que buscam consolidar seu poder e ampliar seus feudos pessoais."
 tgp_japan_career.0001.kampaku_desc: "Como [new_ruler.GetTitleAsNameNoTooltip|l], assumo a responsabilidade máxima por este império em meu papel de [ceremonial_regent|El]. A partir da capital, [kampaku.GetCapitalLocation.GetTitle.GetNameNoTier|U], lidero os súditos do [japanese_emperor|El] e me esforço para preservar a frágil paz.

Preciso fazer malabarismos com as intrigas de poder de uma corte febril, repleta de burocratas ardilosos [ritsuryo|El], assim como com a preocupação crescente em relação aos guerreiros [soryo|El] que estabelecem feudos pessoais nas províncias."
 tgp_japan_career.0001.tenno_desc: "Como [japanese_emperor|El], meus deveres se concentram no divino e no cerimonial. O [kampaku.GetTitleAsName|l] cuida de todas as coisas mundanas, mas será que deveria? Há tensão no reino à medida que os [rulers|El] [soryo|El] criam feudos pessoais nas províncias, desafiando os burocratas tradicionais [ritsuryo|El] da minha capital, [kampaku.GetCapitalLocation.GetTitle.GetNameNoTier|U].

Será que esses agentes da mudança poderiam nos ajudar a voltar a uma era de verdadeiro poder imperial, com um[new_ruler.Custom('ES_XA')] [new_ruler.GetTitleAsName|l] que supervisione os assuntos celestiais e terrenos?"
 tgp_japan_career.0001.desc_2: "

Todos nós temos um papel a desempenhar, e é isso que faremos!"
 tgp_japan_career.0001.a: "Passe o que acontecer, permaneceremos firmes."
 tgp_japan_career.0001.b: "A paz é fugaz, devemos estar preparados!"
 tgp_japan_peace_modifier: "Esforços por Estabilidade"
 tgp_japan_peace_modifier_desc: "Este personagem está se concentrando em enfrentar qualquer obstáculo com a mente clara e tranquila."
 tgp_japan_war_modifier: "Preparados para o Conflito"
 tgp_japan_war_modifier_desc: "Este personagem está convencido de que uma guerra está se aproximando, e estará preparado para ela."
