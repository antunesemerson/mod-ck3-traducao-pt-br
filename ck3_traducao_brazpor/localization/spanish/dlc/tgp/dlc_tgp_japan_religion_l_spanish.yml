l_spanish:
 ### TENETS
 tenet_pure_land_name: "Renascimento Justo"
 tenet_pure_land_desc: "Aqui em #EMP paścima-kāla#! —a era da degeneração do dharma— nem a riqueza, nem o estudo, nem o nascimento nobre oferecem consolo. Somente os verdadeiros devotos dos preceitos de Buda poderão renascer na Terra Pura."
 tenet_sohei_name: "Sōhei"
 tenet_no_mind_name: "Mente sem mente"
 tenet_no_mind_desc: "A mente sem mente é aquela que alcançou a verdadeira plena consciência. Um estado cultivado por artesãos, virtuosos e artistas marciais, onde o corpo responde a todos os desafios sem pensar."
 doctrine_parameter_better_artifacts: "As [inspirations|El] financiadas produzem [artifacts|lE] de maior qualidade"
 doctrine_parameter_less_likely_to_become_infirm: "É menos provável que os personagens adquiram o [trait|lE] [GetTrait('infirm').GetName( GetNullCharacter )]"
 tenet_mountain_worship_name: "Montanhas sagradas"
 tenet_mountain_worship_desc: "No alto, longe de aldeias e fazendas, as montanhas tocam as nuvens acima. É ali, entre os picos e rochedos, que o sagrado pode realmente ser encontrado."
 doctrine_parameter_piety_from_hills_and_mountains_pilgrimages: "Os personagens ganham [piety|lE] extra por [pilgrimages|lE] a [GetTerrain( 'hills' ).GetName|l], [GetTerrain( 'mountains' ).GetName|l] e [GetTerrain( 'desert_mountains' ).GetName|l]"
 piety_from_hills_and_mountains_pilgrimages_tt: "Por [core_tenet|lE] [GetFaithDoctrine('tenet_mountain_worship').GetBaseName]: #P [THIS.ScriptValue('medium_piety_gain')]#! [piety_i]"
 ### DOCTRINE PARAMETERS
 doctrine_parameter_peasant_and_populist_factions_more_common: "As [factions|El] camponesas e populistas são mais comuns e poderosas"
 doctrine_parameter_children_less_likely_to_be_burdened: "É menos provável que os [children|lE] adquiram o [trait|lE] [GetTrait('burdened').GetName( GetNullCharacter )]"
