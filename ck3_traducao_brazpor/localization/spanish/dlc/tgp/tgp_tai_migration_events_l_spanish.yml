l_spanish:
 # Flight of the Tai, Mass migration main event
 tgp_tai_migration_event.1000.t: "A fuga dos tai"
 tgp_tai_migration_event.1000.desc: "Durante a reunião do conselho de hoje, fui informado de uma migração em massa de colonos tai. [migration_leader.GetName], [migration_leader.Custom('ES_ElLa')] representante mais velho de sua comunidade, está agora diante de mim, apresentando humildemente seu caso.

"Somente os mais habilidosos entre vocês residirão em meu [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip|l]."

Seu destino está em meus lábios."
 tgp_tai_migration_event.1000.a: "Fuga de artesãos"
 tgp_tai_migration_event.1000.b: "Colonos tai"
 tgp_tai_migration_event.1000.c: "Miríades de imigrantes aceitas"
 tgp_tai_migration_event_1000.c_shooed_immigrants_tt: "Imigrantes rejeitados"
 tgp_tai_migration_skilled_development_county_modifier: "Fuga de artesãos"
 tgp_tai_migration_migration_happened_county_modifier: "Tai com talento"
 tgp_tai_migration_migration_happened_character_modifier: "Um[migrant_skilled_character.Custom('ES_XA')] [migrant_skilled_character.GetWomanMan] que afirma vir das terras de [migrant_skilled_character.GetCulture.GetNameNoTooltip] se apresenta diante de mim como alguém instruído em busca de trabalho. Seus modos parecem refletir as notícias recentes sobre a fuga de seu povo.\n\n"
 tgp_tai_migration_migration_rejected_character_modifier: ""Vossa Santidade, chamo-me [migrant_skilled_character.GetName], um[migrant_skilled_character.Custom('ES_XA')] cuidador[migrant_skilled_character.Custom('ES_XA')] experiente, pront[migrant_skilled_character.Custom('ES_OA')] para servir. Tenho saúde, estou bem nutrid[migrant_skilled_character.Custom('ES_OA')] e conheço as necessidades dos bebês. Permiti-me ajudar para que vossa linhagem prospere.""
 # Lone skilled Tai character offers services
 tgp_tai_migration_event.2000.t: ""Meu [ROOT.Char.GetTitleAsNameNoTooltip|l], sou [migrant_skilled_character.GetName]. Tendo viajado pelos desertos, as estrelas me servem de mapa e os ventos, de aliados. Sob minha liderança, nenhuma caravana jamais se perderá, e nenhuma trilha será problemática.""
 tgp_tai_migration_event.2000.desc: ""Nascid[migrant_skilled_character.Custom('ES_OA')] para caçar, lapidad[migrant_skilled_character.Custom('ES_OA')] pela natureza, conheço o cheiro de toda fera e o silêncio de toda mata. Leio rastros como ninguém. O que me diz, meu [ROOT.Char.GetTitleAsNameNoTooltip|l]?""
 tgp_tai_migration_event.2000.wet_nurse.desc: ""Unguentos extraídos de tomos antigos e a destreza para agir sob pressão: sou [Select_CString( migrant_skilled_character.IsFemale, 'a única mulher', 'o único homem' )] de que precisareis para acalmar o vosso corpo celestial, meu [ROOT.Char.GetTitleAsNameNoTooltip|l]. Me chamam de [migrant_skilled_character.GetName].""
 tgp_tai_migration_event.2000.champion.desc: ""Meus olhos viram mitos, e minhas mãos tocaram impérios antigos. Deixe-me ficar, para que a sabedoria dos antigos chegue à sua corte.""
 tgp_tai_migration_event.2000.travel_leader.desc: ""Tenho influenciado muitos guerreiros e estadistas, meu [ROOT.Char.GetTitleAsNameNoTooltip|l]. Sua prole também alcançará a grandeza sob minha orientação, se assim me permitirdes.""
 tgp_tai_migration_event.2000.master_of_hunt.desc: "

Parece desesperad[migrant_skilled_character.Custom('ES_OA')] por abrigo, provavelmente pelas razões que levaram até aqui, mas claramente conhece bem seu ofício. Devo aproveitar suas habilidades?"
 tgp_tai_migration_event.2000.court_physician.desc: "Talvez eu precise dos seus serviços."
 tgp_tai_migration_event.2000.antiquarian.desc: "Ainda não, mas vocês devem ficar conosco."
 tgp_tai_migration_event.2000.court_tutor.desc: "[migrant_skilled_character.GetNameNoTooltip] se junta à sua corte"
 tgp_tai_migration_event.2000.end.desc: "

Parece desesperad[migrant_skilled_character.Custom('ES_OA')] por abrigo, provavelmente pelas razões que levaram até aqui, mas claramente conhece bem seu ofício. Devo aproveitar suas habilidades?"
 tgp_tai_migration_event.2000.a: "A proposta de um homem de família"
 tgp_tai_migration_event.2000.b: "Um estrangeiro íntegro se aproxima dos meus salões com notável confiança para fazer uma oferta administrativa.

Após uma saudação surpreendentemente sincera, ao contrário dos modos rústicos típicos, e um relato detalhado da penosa jornada de sua família até minhas terras, ele chega a uma conclusão ousada.

"...bandidos e saqueadores, eu lhes digo, meu [ROOT.Char.GetTitleAsNameNoTooltip|l]. O que restou de meus bens saqueados é um talento comprovado, percepção aguçada para supervisionar, lealdade e uma família que precisa da sua ajuda. Eu e meu sangue seremos seus servos até que nos considerem indignos.""
 tgp_tai_migration_event.2000.b.success: "Seu desejo será atendido, contanto que você seja leal."
 tgp_tai_migration_event.2000.b.failure: "Isso não me parece uma troca justa."
 tgp_tai_migration_event.2000.c: "Preciso recusar."
 # Noble Tai character and his family are asking for a spare county
 tgp_tai_migration_event.3000.t: "Meus guardas trazem ao salão uma família indigente de estrangeiros das terras do norte.

Após uma longa sessão de súplicas, o chefe da família olha dentro da minha alma e oferece tudo o que não possui para limpar os pisos do meu palácio em troca de abrigo sob minhas poderosas asas. Segundo sua história, parece que muitos dos seus estão vindo para nossas terras em busca de novos protetores."
 tgp_tai_migration_event.3000.desc: "Um estrangeiro íntegro se aproxima dos meus salões com notável confiança para fazer uma oferta administrativa.

Após uma saudação surpreendentemente sincera, ao contrário dos modos rústicos típicos, e um relato detalhado da penosa jornada de sua família até minhas terras, ele chega a uma conclusão ousada.

"...bandidos e saqueadores, eu lhes digo, meu [ROOT.Char.GetTitleAsNameNoTooltip|l]. O que restou de meus bens saqueados é um talento comprovado, percepção aguçada para supervisionar, lealdade e uma família que precisa da sua ajuda. Eu e meu sangue seremos seus servos até que nos considerem indignos.""
 tgp_tai_migration_event.3000.a: "Seu desejo será atendido, contanto que você seja leal."
 tgp_tai_migration_event.3000.b: "Isso não me parece uma troca justa."
 # A family of lowborn peasant characters offer services
 tgp_tai_migration_event.4000.t: "Uma família tai"
 tgp_tai_migration_event.4000.desc: "Meus guardas trazem ao salão uma família indigente de estrangeiros das terras do norte.

Após uma longa sessão de súplicas, o chefe da família olha dentro da minha alma e oferece tudo o que não possui para limpar os pisos do meu palácio em troca de abrigo sob minhas poderosas asas. Segundo sua história, parece que muitos dos seus estão vindo para nossas terras em busca de novos protetores."
 tgp_tai_migration_event.4000.a: "Eu os abrigarei nestes tempos difíceis."
 tgp_tai_migration_event.4000.b: "Minha corte não tem utilidade alguma para a sua família."
