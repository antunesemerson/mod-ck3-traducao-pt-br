l_spanish:
 debate_event.1000.t: "Preparando o cenário"
 debate_event.1000.desc_intro_host: "Sábios de todo o reino se reuniram"
 debate_event.1000.desc_intro_fallback: "Cheguei"
 debate_event.1000.desc_outro: "a [ROOT.Char.GetCurrentLocation.GetName] para o debate.\n\nOs debatedores já praticam seus discursos em rodas apertadas, as grandes famílias partem para reivindicar os melhores alojamentos enquanto uma procissão de carroças carregadas de verduras e carne avança ruidosamente em direção ao mercado.\n\nJá é hora de eu também me preparar."
 debate_event.1000.a: "Não há momento a perder!"
 debate_event.1000.a.success_desc: "Preparativos excelentes"
 debate_event.1000.b: "Devo explorar a cidade."
 debate_event.1000.c: "Uma oportunidade perfeita para relaxar."
 debate_event.1010.t: "O debate começa"
 debate_event.1010.desc: "Os eruditos entram em cascata na sala de debates, os discípulos seguem seus anciãos com os braços carregados de pergaminhos pesados. Meu oponente, [debate_opponent.Custom('ES_ElLa')] [debate_opponent.GetTitledFirstName|l], encontra-se list[debate_opponent.Custom('ES_OA')] no extremo oposto da sala, rodead[debate_opponent.Custom('ES_OA')] por outros membros do [opponent_movement.GetName].\n\nNão há mais tempo para preparativos. No início deste debate, devo confiar na minha astúcia para triunfar."
 debate_event.1010.a: "Este será o meu momento."
 debate_event.1015.t: "$debate_event.1010.t$"
 debate_event.1015.desc: "Me abro paso entre la multitud; espero conseguir un buen sitio para el debate posterior. El [my_movement.GetName] ocupa el fondo de la sala de debates. Unos cuantos cambios de posición y murmullos después, me encuentro entre los míos.\n\n[debate_contender.Custom('ES_ElLa')|U] [debate_contender.GetTitledFirstName|l] y [debate_opponent.Custom('ES_ElLa')] [debate_opponent.GetTitledFirstName|l] se encuentran frente a frente, [Select_CString(And(debate_contender.IsFemale, debate_opponent.IsFemale), 'listas', 'listos')] para demostrar que se merecen ser [Select_CString(And(debate_contender.IsFemale, debate_opponent.IsFemale), 'la', 'el')]"
 debate_event.1015.desc_favor: "[Select_CString(And(debate_contender.IsFemale, debate_opponent.IsFemale), 'favorita', 'favorito')] [ROOT.Char.GetTopLiege.Custom('ES_DelDela')] [ROOT.Char.GetTopLiege.GetTitleAsNameNoTooltip|l]."
 debate_event.1015.desc_leadership: "líder de [contender_movement.GetNameNoTooltip]."
 debate_event.1015.a: "Me pergunto quem vai ganhar."
 debate_event.1100.t: "Debate cancelado"
 debate_event.1100.desc_death: "Parece que [debate_opponent.Custom('ES_ElLa')] [debate_opponent.GetTitledFirstName|l] faleceu. Sem ninguém com quem debater, o debate foi cancelado."
 debate_event.1100.desc_fallback: "Acabaram de me informar de que o debate foi pausado. O motivo não está claro, exceto pelo fato de que não pode prosseguir neste momento."
 debate_event.1100.a: "Más notícias lamentáveis."
 debate_event.2000.t: "A loucura do orgulho"
 debate_event.2000.desc: "Voces elevadas me atraen al salón de estudios, donde encuentro a mi [ROOT.Char.Custom2('RelationToMe', talent )], [talent.Custom('ES_ElLa')] [talent.GetTitledFirstName|l], que gesticula a la muchedumbre reunida. «No estáis aquí para participar en un debate erudito, ¡sino para jactaros y proclamar vuestra superioridad sobre vuestros colegas!».\n\nHabla con la misma convicción que le he escuchado todo el día. Su rostro tiembla con una emoción apenas contenida. El talento astuto de est[talent.Custom('ES_EA')] [talent.GetWomanMan] promete, pero ese genio puede dar problemas."
 debate_event.2000.a: "Seus talentos florescerão sob minha orientação."
 debate_event.2000.b: "Deveríamos todos nos humilhar diante de suas palavras."
 debate_event.2010.t: "A influência do [elder_movement.GetNameNoTooltip]"
 debate_event.2010.desc: "«Debo decir que vuestra interpretación del pasaje de [ROOT.Char.Custom('GetRandomHistoryPassage')] me ha picado el interés», me dice [elder.Custom('ES_ElLa')] [elder.GetTitledFirstName|l] al final de un largo día, durante una charla amistosa. «Estoy segur[elder.Custom('ES_OA')] de que, diferencias aparte, podríamos aprender mucho [Select_CString(And(ROOT.Char.IsFemale, elder.IsFemale), 'la una', 'el uno')] [Select_CString(And(ROOT.Char.IsFemale, elder.IsFemale), 'de la otra', 'del otro')]».\n\nLa atmósfera amistosa de nuestras conversaciones me hace olvidar a menudo que [elder.GetSheHe] pertenece al [elder_movement.GetNameNoTooltip]; un hecho que se me recuerda cuando un colega del [my_movement.GetNameNoTooltip] echa una mirada incisiva en mi dirección."
 debate_event.2010.a: "Estou completamente de acordo."
 debate_event.2010.b: ""Algumas diferenças não podem ser ignoradas"."
 debate_event.2020.t: "Trocas amistosas"
 debate_event.2020.desc: "Mi colega del [my_movement.GetName], [movement_member.Custom('ES_ElLa')] [movement_member.GetTitledFirstName|l], se acerca con alguien encorvado a su espalda, con la cabeza inclinada a modo de saludo. «He oído que buscáis individuos con talento para vuestro séquito», dice [movement_member.GetFirstNameNoTooltip]. «Creo que [disciple.Custom('ES_ElLa')] [disciple.GetTitledFirstName|l] podría ser un[disciple.Custom('ES_XA')] candidat[disciple.Custom('ES_OA')] viable».\n\n[disciple.GetFirstNameNoTooltip] [disciple.Custom('quirk_pos_present')] y dice: «Sería un honor serviros, mi señor[ROOT.Char.Custom('ES_XA')]»."
 debate_event.2020.a: ""Tenho muito para ensinar a ela/ele"."
 debate_event.2020.b: "\"Sua amizade é tudo o que peço.\""
 friend_given_disciple_reason: "[CHARACTER.GetShortUIName|U] [CHARACTER.LocalPlayerString( 'recibiste', 'recibió' )] um discípulo de parte de [TARGET_CHARACTER.GetShortUIName] em um debate."
 friend_given_disciple_reason_corresponding: "$friend_given_disciple_reason$"
 debate_event.5000.t_imperial_debate: "O favor imperial"
 debate_event.5000.t_movement_debate: "A liderança de [host.Custom('GetMyMovementNoTooltip')]"
 debate_event.5000.desc_imperial: "Dignitários e espectadores lotam o salão do debate, observando-me enquanto avanço para me posicionar diante de [debate_opponent.Custom('ES_DelDela')] [debate_opponent.GetTitledFirstName|l]. Nós nos inclinamos um diante do outro ao mesmo tempo, braços estendidos, costas curvadas.\n\nDeveria aproveitar o momento e ser o primeiro a apresentar um argumento."
 debate_event.5000.desc: "O palco está montado e os espectadores já estão sentados. [debate_opponent.Custom('ES_ElLa')|U] [debate_opponent.GetTitledFirstName|l] se levanta de seu assento para se dirigir ao público, nossos colegas do [host.Custom('GetMyMovement')]\n\n"Estamos aqui para discutir as prioridades e a direção de nosso [host.Custom('GetMyMovement')]. O resultado deste debate também determinará sua liderança"."
 debate_event.5000.a: "Governarei conforme o decreto de Kǒngzǐ."
 debate_event.5000.b: "A lógica e a razão vencerão o dia."
 debate_event.5000.c: "Muito bem. #EMP Este#! é o momento de…"
 debate_event.5000.d: "Sua falta de liderança trará ruína!"
 debate_event.5000.a.flavor: "Aproveite sua experiência com o [trait|lE] [GetTrait('confucian_education').GetName( GetNullCharacter )]; quanto maior a experiência, maior o sucesso"
 debate_event.5000.c.flavor: "Tal como instruídos, seus [disciples|lE] tentarão animar os espectadores nos momentos oportunos. Com sorte, os próprios discípulos de [debate_opponent.GetShortUIName] não interferirão…"
 debate_event.5000.d.success_desc: "Você consegue apresentar argumentos convincentes"
 debate_event.5000.d.failure_desc: "Você não consegue apresentar um argumento convincente"
 debate_event.5010.insult_desc: "[debate_opponent.Custom('ES_ElLa')|U] [debate_opponent.GetTitledFirstName|l] não perde tempo e imediatamente começa a apresentar várias acusações e insultos, afirmando que #EMP yo#! sou indign[ROOT.Char.Custom('ES_OA')] para liderar.\n\nAbsurdo! Nada além de uma tentativa vil de minar minha autoridade."
 debate_event.5010.confucian_desc: "[debate_opponent.Custom('ES_ElLa')|U] [debate_opponent.GetTitledFirstName|l] fala tranquilamente sobre Confúcio e como seus ensinamentos devem nos guiar adiante."
 debate_event.5010.desc: "[debate_opponent.Custom('ES_ElLa')|U] [debate_opponent.GetTitledFirstName|l] fala sobre lógica e razão, e sobre como devemos usar os aprendizados anteriores para traçar um novo futuro para o reino."
 debate_event.crowd_approval_desc: "\n\nOs espectadores assentem."
 debate_event.crowd_disapproval_desc: "\n\nOs espectadores balançam a cabeça em desaprovação."
 debate_event.5010.a: "Dobro minha abordagem atual."
 debate_event.5010.b: "Talvez as palavras de Confúcio os convençam?"
 debate_event.5010.c: "Com certeza uma abordagem mais #EMP razonable#! os iluminará."
 debate_event.5010.d: "Vamos pôr meus discípulos para trabalhar."
 debate_event.5010.e: "Quando todo o resto falha, os insultos certamente funcionam."
 debate_event.5100.t_winner: "- Vitória!"
 debate_event.5100.t_loser: "- Derrota!"
 debate_event.5100.desc_winner: "Após uma preparação cuidadosa e uma execução magistral, fui declarado vencedor[ROOT.Char.Custom('ES_XA')] do debate!\n\n[debate_loser.Custom('ES_ElLa')|U] [debate_loser.GetTitledFirstName|l] oferece uma reverência breve, porém formal, antes de se dirigir a mim: "Suponho que cabe felicitar-vos. Em breve, os outros recorrerão a vós para que os liderem. Só peço que o façais com a máxima responsabilidade"."
 debate_event.5100.desc_loser: "Apesar de todos os meus esforços, foi proclamado [debate_winner.Custom('ES_AlAla')] [debate_winner.GetTitledFirstName|l] vencedor[debate_winner.Custom('ES_XA')] do debate. E, como tal, continuará sendo [debate_winner.Custom('ES_ElLa')] líder de sua [my_movement.GetNameNoTooltip].\n\nApós receber uma série de felicitações, ele finalmente volta sua atenção para mim.\n\n“Nem todos estão destinados a liderar. Mas não tema, sua hora ainda pode chegar.”"
 debate_event.5100.desc_unexpected_winner: "En un giro inesperado de los acontecimientos, se ha proclamado que #EMP yo#! he vencido. [debate_loser.Custom('ES_ElLa')|U] [debate_loser.GetTitledFirstName|l] me mira, y yo a [debate_loser.GetSheHe], [Select_CString(And(ROOT.Char.IsFemale, debate_loser.IsFemale), 'ambas', 'ambos')] igual de [Select_CString(And(ROOT.Char.IsFemale, debate_loser.IsFemale), 'atónitas', 'atónitos')]. ¿Lo hemos oído bien? Sí, sí, lo hemos oído.\n\nTras recomponerse, [debate_loser.GetFirstNameNoTooltip] se dirige a mí: «Supongo que he de felicitaros, pero no logro entender cómo nadie podría proclamar vuestra victoria…»."
 debate_event.5100.desc_unexpected_loser: "Em uma reviravolta completamente inesperada dos acontecimentos, foi proclamado que [debate_winner.Custom('ES_ElLa')] [debate_winner.GetTitledFirstName|l] foi #EMP vencido#!. [debate_winner.Custom('ES_ElLa')|U] [debate_winner.GetTitledFirstName|l] me olha, e eu a [debate_winner.GetSheHe], [Select_CString(And(ROOT.Char.IsFemale, debate_winner.IsFemale), 'ambas', 'ambos')] igualmente [Select_CString(And(ROOT.Char.IsFemale, debate_winner.IsFemale), 'atónitas', 'atónitos')]. Ouvimos isso direito? Sim, sim, ouvimos.\n\nDepois de receber uma rodada de felicitações, ainda com surpresa no rosto, [debate_loser.GetFirstNameNoTooltip] dirige-se a mim: "Acho que vocês se saíram de maneira admirável, mesmo que, de alguma forma, não tenham conseguido vencer hoje"."
 debate_event.5100.a: "Por enquanto, vou aproveitar o momento."
 debate_event.5100.b: "Terei de tentar de novo…"
 debate_event.5110.t: "- Eleger um vencedor"
 debate_event.5110.desc: "Los argumentos van y vienen entre los dos oponentes durante bastante tiempo. Arguyen con lógica, hablan sobre el futuro del señorío y, no sin algún insulto ocasional, reflexionan sobre las cualidades de un líder.\n\nAl terminar el debate, [debate_winner.Custom('ES_ElLa')] [debate_winner.GetTitledFirstName|l] parece haber tenido el razonamiento más fuerte y debería ser [Select_CString(debate_winner.IsFemale, 'la ganadora', 'el ganador' )] natural.\n\nPero como [ROOT.Char.GetTitleAsNameNoTooltip], de mí depende proclamar al ganador que yo considere adecuado."
 debate_event.5110.a: "[debate_winner.GetNameNoTooltip] venceu, de fato."
 debate_event.5110.a.tt: "O [winning_movement.GetNameNoTooltip] se torna em [favored_movement|El]"
 debate_event.5110.b: "#EMP En realidad#!, acho que [debate_loser.GetNameNoTooltip]."
 debate_event.5120.desc_winner: "Após um breve descanso, o cronista resume o debate e, sem afirmá-lo abertamente, deixa claro que eu venci o debate. No entanto, a decisão não é dele."
 debate_event.5120.desc_loser: "Após um breve intervalo, o anunciante resume o debate e, sem afirmá-lo explicitamente, deixa claro que [debate_winner.Custom('ES_ElLa')] [debate_winner.GetTitledFirstName|l] venceu o debate."
 debate_event.5120.bridge_hegemon_available: "Todas as cabeças se voltam para [ROOT.Char.GetTopLiege.Custom('ES_ElLa')] [ROOT.Char.GetTopLiege.GetName|l]."
 debate_event.5120.bridge_fallback: "\n\nUm enviado parte rapidamente para informar [ROOT.Char.GetTopLiege.Custom('ES_AlAla')] [ROOT.Char.GetTopLiege.GetTitleAsNameNoTooltip|l] e retorna com a notícia de que"
 debate_event.5120.desc_liege_confirm: "\n\n"Concordo. [debate_winner.GetFirstNameNoTooltip] venceu o debate com muita dignidade, lidando com a situação com a máxima habilidade e astúcia"."
 debate_event.5120.desc_liege_confirm_fallback: "a corte imperial considera que [winning_movement.GetNameNoTooltip] merece o favor do império."
 debate_event.5120.desc_liege_intervene: "\n\nProclamo que [declared_winner.Custom('ES_ElLa')] [declared_winner.GetTitledFirstName|l] venceu o debate de hoje."
 debate_event.5120.a: "Fico feliz que pense assim, meu [ROOT.Char.GetTopLiege.GetLadyLord]!"
 debate_event.5120.b: "O quê? Quer dizer, claro. Obrigado, meu [ROOT.Char.GetTopLiege.GetLadyLord]!"
 debate_event.5120.c: "Que… decepcionante."
 tgp_dynastic_cycle_decision_event.0082.a: "Nossa posição permanece segura. Por enquanto."
 tgp_dynastic_cycle_decision_event.0082.b: "Ufa. Por um momento, pensei que estávamos perdidos."
 tgp_dynastic_cycle_decision_event.0082.c: "Como ele(a) pôde tomar tal decisão?!"
 debate_events.5100.opponent_tt: "Reduziu o [movement_power|lE] [movement_power_i] do [opponent_movement.GetName] em #N [EmptyScope.ScriptValue('event_decrease_movement_power_major_value')|0]#!"
 debate_increased_movement_power_major_effect_tooltip: "Aumentado o [movement_power|lE] [movement_power_i] de [GetPlayer.Custom('GetMyMovement')] em [EmptyScope.ScriptValue('event_increase_movement_power_major_value')|+0]"
 debate_event.5130.desc_favor: "$debate_become_movement_leader_reward$"
 debate_event.5130.desc_leadership_won: "$debate_become_movement_leader_reward$"
 debate_event.5130.desc_leadership_defended: "$debate_remain_movement_leader_reward$"
