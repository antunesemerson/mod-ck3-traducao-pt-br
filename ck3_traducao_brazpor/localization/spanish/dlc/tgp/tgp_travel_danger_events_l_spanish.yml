l_spanish:
 tgp_travel_danger_events.0001.t: "Vida Entre as Ruínas"
 tgp_travel_danger_events.0001.intro: "Ao viajar por [ROOT.Char.GetCurrentLocation.GetName], vejo em toda parte o impacto de tal [disaster_situation.GetType.GetNameNoTooltip|l]."
 tgp_travel_danger_events.0001.flood: "Margens do rio cobertas de destroços, casas flutuando rio abaixo como folhas em um curso d'água. Uma aldeia inteira foi consumida pela correnteza impetuosa."
 tgp_travel_danger_events.0001.earthquake: "A terra que antes foi fértil e o vilarejo animado jazem silenciosos em desordem e escombros, engolidos pela própria terra."
 tgp_travel_danger_events.0001.desc: "\n\nQuando chegamos aos limites de uma cidade arrasada, vejo um(a) [Select_CString(peasant_character_child.IsFemale, 'uma menina solitária', 'um menino solitário' )] entre os escombros. Não me nota, pois está tentando desesperadamente reconstruir o que parece ter sido outrora uma casa de fazenda."
 tgp_travel_danger_events.0001.a: "Meus homens vão remover os escombros."
 tgp_travel_danger_events.0001.b: "Vou colocar [peasant_character_child.GetHerHim] sob minha proteção."
 tgp_travel_danger_events.0001.c: "Não tenho tempo para isso!"
 impressed_by_kindness: "Impressionado pela bondade"
