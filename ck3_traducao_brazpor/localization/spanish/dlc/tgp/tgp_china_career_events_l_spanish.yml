l_spanish:
 ##################################################
 # CHINA CAREER EVENTS
 ##################################################
 tgp_china_career.0001.t: "Servir ao Filho do Céu"
 tgp_china_career.0001.desc: "A burocracia de [emperor.GetPrimaryTitle.GetNameNoTierNoTooltip] é uma máquina vasta e complexa, mas bem azeitada. É dever de todo cidadão servir ao reino da melhor forma possível.\n\n"
 tgp_china_career.0001.minister_desc: "Como [new_ruler.GetTitleAsNameNoTooltip], todos os olhares estão voltados para mim. Um passo em falso seria suficiente para fazer minha carreira desmoronar.\n\nVou mostrar a [emperor.Custom('ES_AlAla')] [emperor.GetTitleAsNameNoTooltip] que sou digno da confiança dele."
 tgp_china_career.0001.landed_desc: "Como [new_ruler.GetTitleAsNameNoTooltip|l] de [new_ruler.GetPrimaryTitle.GetNameNoTier]. tenho muitas responsabilidades a desempenhar e obrigações a cumprir. O nome [ruler_family.GetName] será conhecido em todo o reino.\n\nTalvez eu até tenha o que é preciso para um dia tomar assento no governo e me tornar ministr[ROOT.Char.Custom('ES_OA')]?"
 tgp_china_career.0001.unlanded_desc: "Como parte da família [ruler_family.GetName] , terei de trabalhar duro para me destacar. Primeiro, terei de passar nos [examinations|lE] e conquistar [merit|lE]. Só então poderei ser nomeado oficial."
 tgp_china_career.0001.a: "O destino não espera. Vamos ao trabalho!"
 tgp_china_career.0001.b: "Todos saberão quem sou #EMP yo#!."
 tgp_merit_boost_modifier: "Focando no mérito"
 tgp_merit_boost_modifier_desc: "Este personagem está focando no mérito e estudando O Caminho."
 tgp_influence_boost_modifier: "Concentrando-se na Influência"
 tgp_influence_boost_modifier_desc: "Este personagem está focando em acumular influência e avançar em seus objetivos."
 tgp_china_career.0010.t: "Uma senda meritória"
 tgp_china_career.0010.first_rank_desc: "He conseguido el mérito suficiente para que se me conceda el rango de [merit_char.Custom('GetMeritRank')], y así dar el primer paso en una carrera larga y prometedora. Puede que un día se me nombre oficial para gobernar tierras y traer prosperidad al señorío.\n\n¿Tal vez una oportunidad para decidir qué carrera deseo seguir? ¿Ascender la escalera política de un funcionario público? ¿O aceptar el papel de un comandante que mande tropas y traiga la paz al señorío?"
 tgp_china_career.0010.higher_rank_desc: "Meu trabalho árduo e diligência deram frutos. Fui agraciado com a classificação de mérito [merit_char.Custom('GetMeritRank')]."
 tgp_china_career.0010.higher_rank_unspecific: "\n\nAprendi [ROOT.Char.Custom('GetRandomAnnalsPassage')] tão bem quanto o nome da minha mãe, mas ainda há muito a fazer."
 tgp_china_career.0010.highest_rank: "\n\nMuitos foram os pergaminhos estudados e as noites passadas em claro. Esta etapa da minha jornada terminou, mas o caminho continua."
 tgp_china_career.0010.duchy_desc: "\n\nPuedo comenzar mi carrera de verdad, dejar atrás los puestos administrativos menores y abrir la puerta a puestos más importantes. Una vez que haya una vacante, por supuesto."
 tgp_china_career.0010.kingdom_desc: "\n\nAgora tenho mérito suficiente para ser nomeado para províncias ainda maiores e mais importantes."
 tgp_china_career.0010.empire_desc: "\n\nPoucos obstáculos se interpõem no meu caminho. Tenho mérito suficiente para um cargo de ministro. E, se eu trabalhar o suficiente, talvez eu consiga tomar o posto de grão-chanceler?"
 tgp_higher_ambitions_modifier: "Ambições maiores"
 tgp_higher_ambitions_modifier_desc: "Este personagem decidiu concentrar todos os seus esforços em subir na escada do mérito."
 tgp_china_career.0010.aa: "Sei que posso fazer melhor."
 tgp_china_career.0010.a: "Um marco importante na minha carreira."
 tgp_china_career.0010.b1: "Um cargo civil me serviria melhor."
 tgp_china_career.0010.b2: "Sou um funcionário público, e um funcionário público continuarei sendo."
 tgp_china_career.0010.c1: "Buscarei a glória no campo de batalha!"
 tgp_china_career.0010.c2: "Comandar soldados na batalha é algo natural para mim."
 keep_civilian_career_desc: "Você continua buscando uma carreira civil — permanecendo elegível para [GetPlayer.Custom('GetProvincePluralConcept')] civis e a [GetLaw('celestial_appointment_succession_law').GetName|l]"
 keep_military_career_desc: "Você continua seguindo uma carreira militar — permanecendo elegível para [GetPlayer.Custom('GetProvincePluralConcept')] militares e a [GetLaw('celestial_military_appointment_succession_law').GetName|l]"
 merit_rank_none_gloss: "nenhum"
 merit_rank_9_gloss: "[Glossary('inferior-bajo','MERIT_LOWER_LOWER_GLOSS')]"
 merit_rank_8_gloss: "[Glossary('inferior-medio','MERIT_LOWER_MIDDLE_GLOSS')]"
 merit_rank_7_gloss: "[Glossary('inferior-alto','MERIT_LOWER_UPPER_GLOSS')]"
 merit_rank_6_gloss: "[Glossary('medio-bajo','MERIT_MIDDLE_LOWER_GLOSS')]"
 merit_rank_5_gloss: "[Glossary('medio-medio','MERIT_MIDDLE_MIDDLE_GLOSS')]"
 merit_rank_4_gloss: "[Glossary('medio-alto','MERIT_MIDDLE_UPPER_GLOSS')]"
 merit_rank_3_gloss: "[Glossary('superior-bajo','MERIT_UPPER_LOWER_GLOSS')]"
 merit_rank_2_gloss: "[Glossary('superior-medio','MERIT_UPPER_MIDDLE_GLOSS')]"
 merit_rank_1_gloss: "[Glossary('superior-alto','MERIT_UPPER_UPPER_GLOSS')]"
 tgp_china_career.0030.t: "O falecimento de um sábio"
 tgp_china_career.0030.desc: "Mi ancian[deceased_elder.Custom('ES_OA')], [deceased_elder.GetFirstName], ha dejado este mundo: me han dicho que [deceased_elder.GetSheHe] [deceased_elder.GetDeathReason]. Ya empiezo a notar su ausencia; el impulso de una pregunta detenida en la punta de la lengua al caer en la cuenta de que no hay nadie para responderla.\n\nMas tales sentimientos fugaces han de dar paso a asuntos más mundanos; el entierro y los ritos de luto, así como la cuestión de quién asumirá el papel de mi [deceased_elder.Custom('MistressMaster')] y continuará en su lugar."
 tgp_china_career.0030.a: "A jornada de [deceased_elder.GetFirstNameNoTooltip] terminou, mas a minha deve continuar."
 tgp_china_career.0030.a.tt: "Buscarás um [elder|El] novo entre os mais poderosos e influentes"
 tgp_china_career.0030.b: "Envie minhas condolências à sua família e uma prova do meu respeito."
 tgp_china_career.0030.c: "[superior_fellow_disciple.GetFirstNameNoTooltip] é [superior_fellow_disciple.Custom('ES_ElLa')] mais dign[superior_fellow_disciple.Custom('ES_OA')] de nós para continuar o trabalho [deceased_elder.Custom('ES_DelDela')] [deceased_elder.Custom('MistressMaster')]."
 tgp_china_career.0030.d: "Herdarei sua vontade e continuarei seu caminho."
