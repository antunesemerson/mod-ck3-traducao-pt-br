 tgp_japan_yearly_events.1180.desc: "Pergaminho kakejiku"
 court_position_from_event: "Um #bold pergamino kakejiku#! (ou #bold kakemono#!) é um pergaminho que exibe caligrafia ou pinturas, geralmente contando uma história."
 tgp_japan_yearly_events.1180.a: "Um [Glossary( 'pergamino kakejiku', 'KAKEJIKU_GLOSS' )] que narra a história de"
 tgp_japan_yearly_events.1180.b: "$artifact_kakejiku_scroll_desc$ uma garça solitária cuidando de uma árvore.

#weak As penas da garça se agitam ao vento enquanto ela observa a muda. Garças formam pares para a vida toda, mas esta árvore leva séculos para crescer...#!"
 tgp_japan_yearly_events.1180.c: "$artifact_kakejiku_scroll_desc$ duas pessoas unidas pelo destino, que crescem através das dificuldades e cultivam uma amizade profunda.

#weak Duas figuras se encontram sob um céu estrelado, seu vínculo unido por uma ponte celestial...#!"
 tgp_japan_yearly_events.1190.t: "$artifact_kakejiku_scroll_desc$ uma espada encantada, que só pode ser empunhada pelos guerreiros mais honrados.

#weak Uma cerejeira floresce perto de um lago calmo, e sob ela repousa uma lâmina embainhada...#!"
 tgp_japan_yearly_events.1190.desc_annoyed: "Uma história para a posteridade"
 tgp_japan_yearly_events.1020.desc_drunk: "[scroll_gifter.GetName] dá um passo à frente, carregando um longo objeto enrolado. "[scroll_gifter.Custom2('RelationToMeShort', ROOT.Char)|U], tenho um presente para a vossa união", diz [scroll_gifter.GetNameNoTooltip] e apresenta um pergaminho. "Um [Glossary( 'kakejiku', 'KAKEJIKU_GLOSS' )], com prosa do mais fino poeta. Que possais lembrar seu significado quando os tempos ficarem difíceis"."
 tgp_japan_yearly_events.1020.desc_dumb: "Pendure-o acima da cama conjugal."
 tgp_japan_yearly_events.1190.desc: "

Observo uma pilha de [ROOT.Char.Custom('GetWritingMaterialPlural')], tendo esquecido por que eram importantes. Releio seu conteúdo, mas ele não oferece nenhuma clareza; ainda assim, as exigências do Estado me obrigam a tomar decisões, por mais mal informadas que sejam."
 tgp_japan_yearly_events.1190.a: "Tenho de lidar com esta calamidade!"
 tgp_japan_yearly_events.1190.b: "Meu conselho decidirá em meu lugar."
 tgp_japan_yearly_events.1190.c: "Mais vale uma má decisão do que nenhuma…"
 tgp_japan_yearly_events.1190.c_tt: "Um [county|lE] aleatório do seu reino perderá um pouco de [control|lE]"
 tgp_japan_yearly_events.1220.t: "Um milagre com hábito"
 tgp_japan_yearly_events.1220.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', miracle_recipient)] [miracle_recipient.GetName] me traz notícias [Select_CString( monk.IsFemale, 'da monja', 'do monge' )] itinerante, [monk.GetName], que realizou um milagre.

"
 tgp_japan_yearly_events.1220.desc_health: ""Minha doença já não me atormenta, [miracle_recipient.Custom2('RelationToMeShort', ROOT.Char)]! Na verdade, o poder de suas preces me tornou mais forte do que antes da minha doença"."
 tgp_japan_yearly_events.1220.desc_wealth: "Ofereci [Select_CString(monk.IsFemale, 'à freira', 'ao monge' )] uma bolsa de ouro e, meses depois, me entregou uma com dez vezes o valor da minha, retribuindo o favor!"
 tgp_japan_yearly_events.1220.desc_knowledge: ""Alguns me consideravam insuls[miracle_recipient.Custom('ES_OA')] antes de conhecer [Select_CString(monk.IsFemale, 'esta monja', 'este monge' )]. Mas, depois de receber seus ensinamentos, minha mente transborda de conhecimento e acuidade mental!""
 tgp_japan_yearly_events.1220.a: "Incrível! Preciso ir atrás dess[Select_CString(monk.IsFemale, 'a monja', 'e monge' )]."
 tgp_japan_yearly_events.1220.b: "Há uma explicação lógica… em algum lugar."
