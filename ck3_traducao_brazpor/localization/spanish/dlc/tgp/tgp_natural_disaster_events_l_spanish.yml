l_spanish:
 # END
 natural_disaster.4001.t: "[situation.GetNameNoTooltip]: Recuperação concluída"
 natural_disaster.4001.desc: "O recente desastre que assolou nossa terra deixou danos que levarão gerações para serem reparados. Uma ferida, sentida por toda a terra, infligida a nobres e plebeus por igual.\n\nNos unimos para honrar aqueles que perderam a vida e para restaurar nossas cidades e vilas. Se o desastre atacar novamente, estaremos preparados."
 natural_disaster.4001.a: "Uma vitória contra a natureza, de fato."
 natural_disaster.4002.a: "Nosso trabalho não foi em vão!"
 # IMPACT
 natural_disaster.5001.t: "[situation.GetNameNoTooltip]: Progresso desfeito"
 natural_disaster.5001.desc: "Anos de investimento e os frutos de um trabalho exaustivo na região são desfeitos em um piscar de olhos. As famílias abandonam seus lares ancestrais, pois tudo o que resta são ruínas. Os cronistas lamentam a perda de tesouros sagrados e raros, junto com os vitales estoques de suprimentos do exército.\n\n"
 natural_disaster.5001.desc.flood: "Adegas e construções subterrâneas se perderam por completo, suas saídas submersas na água da enchente. O movimento torna-se quase impossível; animais de carga e homens afundam por igual na terra encharcada."
 natural_disaster.5001.desc.earthquake: "Os inocentes correm enquanto uma chuva de detritos cai do céu, apenas para serem engolidos por colunas de fumaça escura e sufocante. Edifícios que permaneceram imóveis por um éon agora jazem em ruínas, seus restos despedaçados completamente irreconhecíveis."
 natural_disaster.5001.a: "Haverá muito a reconstruir."
 natural_disaster_5001_flood_tt: "Todo [county|lE] do [realm|lE] em [situation_sub_region.GetName] de [situation.GetName] perdeu #N 1/[SCOPE.ScriptValue('natural_disaster_flood_development_loss_fraction_value')|0]#! de seu [development|lE] #weak (máx. -5)#!"
 natural_disaster.5011.t: "[situation.GetNameNoTooltip]: fraco e quebradiço"
 natural_disaster.5011.desc.earthquake: "As outrora altas e ameaçadoras muralhas de [epicenter_county.GetNameNoTier] ruíram,"
 natural_disaster.5011.desc.flood: "As outrora altas e sombrias muralhas que cercavam as cidades ao redor do [river_region.GetName|l] desmoronaram,"
 natural_disaster.5011.desc: "por isso, é impossível estacionar quaisquer regimentos ali. Os guerreiros são movidos para áreas mais seguras, mas isso, por sua vez, cria vulnerabilidade para a região.\n\nEm seu momento mais fraco, a terra jaz em ruínas — indefesa e vulnerável."
 natural_disaster.5011.a: "Isso vai ficando pior a cada dia."
 natural_disaster.5021.t: "[situation.GetNameNoTooltip]: Êxodo"
 natural_disaster.5021.desc: "As vítimas de [situation.GetName|l] se apressam em buscar segurança, deixando suas antigas vidas para trás. Com poucos restantes para garantir a segurança e a ordem da região, os malfeitores agem livremente para aterrorizar os sobreviventes. Governar a área já não é possível."
 natural_disaster.5021.a: "Foi abandonado."
 natural_disaster.5022.desc: "Os refugiados de tal [situation.GetName|l] fogem para reinos vizinhos em uma tentativa desesperada de escapar do caos. O crime corre solto na região, à medida que os mal-intencionados se aproveitam do caos. As áreas afetadas se tornam um fardo para o reino, deixando de produzir qualquer lucro ou progresso com a perda de seus habitantes."
 natural_disaster.5022.a: "Os sobreviventes estão a salvo aqui."
 natural_disaster.5031.t: "[situation.GetNameNoTooltip]: pastos arruinados"
 natural_disaster.5031.desc: "Muitos rebanhos diminuem à medida que a terra disponível para pastagem vai se reduzindo. A fúria da natureza devasta a terra, tornando impossível manter nossos rebanhos."
 natural_disaster.5031.a: "Essas terras já não são férteis."
 natural_disaster.5101.t: "[situation.GetNameNoTooltip]: Últimos momentos"
 natural_disaster.5101.desc.flood: "A água imunda me chega até o peito, espessa de lodo. Minhas vestes encharcadas me arrastam enquanto a correnteza aumenta."
 natural_disaster.5101.desc.earthquake: "O chão se ergue e poeira cai do teto. Uma pesada viga de suporte se parte e as paredes gemem. Em instantes, tudo desabará."
 natural_disaster.5101.travel: "\n\nTalvez buscar abrigo nesta [ROOT.Char.GetCurrentLocation.GetCounty.GetFaith.HouseOfWorship] não foi muito inteligente."
 natural_disaster.5101.army: "\n\nTalvez buscar abrigo neste/a [ROOT.Char.GetCurrentLocation.GetCounty.GetFaith.HouseOfWorship] não tenha sido muito inteligente. Ao meu redor, meus soldados são arrastados na multidão."
 natural_disaster.5101.activity: "\n\nNão haverá mais [involved_activity.GetActivityType.GetNameNoTooltip|l]s para mim."
 natural_disaster.5101.tent: "\n\nTalvez buscar abrigo neste/a [ROOT.Char.GetCurrentLocation.GetCounty.GetFaith.HouseOfWorship] não tenha sido muito prudente."
 natural_disaster.5101.estate: "\n\nCorro pelos corredores da minha propriedade apenas para descobrir que a única saída está emperrada meio fechada."
 natural_disaster.5101.court: "\n\nAbro caminho pela multidão de cortesãos apavorados, apenas para descobrir que a única saída está completamente bloqueada."
 natural_disaster.5101.desc.flood_end: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('at_risk_character'))], [at_risk_character.Custom('ES_ElLa')] [at_risk_character.GetTitledFirstNameNoTooltip|l], está alguns passos atrás, tentando me alcançar. Só há espaço para uma pessoa se espremer para chegar ao ar livre."
 natural_disaster.5101.desc.earthquake_end: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('at_risk_character'))], [at_risk_character.Custom('ES_ElLa')] [at_risk_character.GetTitledFirstNameNoTooltip|l], está alguns passos atrás, com os olhos arregalados. Há espaço para apenas uma pessoa atravessar a soleira antes que a viga desabe."
 natural_disaster.5101.a: "Agarro [at_risk_character.Custom('ES_AlAla')] [at_risk_character.GetTitledFirstNameNoTooltip|l] e corro em disparada para a porta."
 natural_disaster.5101.a.tt.success: "[at_risk_character.GetFirstNameNoTooltip] e você sobrevivem"
 natural_disaster.5101.a.tt.failure: "A calamidade te abala"
 natural_disaster.5101.a.tt.failure_root: "Você morre"
 natural_disaster.5101.a.tt.failure_secondary: "[at_risk_character.GetFirstNameNoTooltip] morre"
 natural_disaster.5101.b: "Cada um por si!"
 natural_disaster.5101.b.tt.success: "Você sobrevive, por pouco"
 natural_disaster.5101.b.tt.failure: "Você morre"
 natural_disaster.5101.b.tt.at_risk_character_duel: "[at_risk_character.GetFirstNameNoTooltip] pode morrer"
 natural_disaster.5101.c: "[at_risk_character.GetHerHim|U] obrigo a passar, sabendo que eu levarei o golpe."
 natural_disaster.5101.d: "Abandono [at_risk_character.Custom('ES_AlAla')] [at_risk_character.GetTitledFirstNameNoTooltip|l] e fujo."
 natural_disaster.5102.t.affected: "[situation.GetNameNoTooltip]: sobrevivente"
 natural_disaster.5102.t.not_affected: "[situation.GetNameNoTooltip]: Número de Mortes"
 natural_disaster.5102.t.second_round: "— Segundo impacto"
 natural_disaster.5102.t.third_round: "— Terceiro impacto"
 natural_disaster.5102.travel: "Meu séquito é"
 natural_disaster.5102.army: "Meu exército é"
 natural_disaster.5102.activity: "O participante à minha direita é"
 natural_disaster.5102.tent: "Minha tenda é"
 natural_disaster.5102.estate: "Minha propriedade"
 natural_disaster.5102.court: "Minha corte é"
 natural_disaster.5102.desc.flood: "levados pela água da enchente, nossos suprimentos e pertences ficam encharcados por sua correnteza.\n\nConsigo vencer a correnteza, abrindo caminho até um terreno mais alto. Olho para baixo e testemunho o desfecho, e o fedor da morte enche o ar."
 natural_disaster.5102.desc.earthquake: "é esmagado por um prédio desabando.\n\nConsigo desviar por milagre dos destroços que caem e me movo para um terreno mais estável. Contemplo os corpos esmagados ao meu redor, e a angústia aperta meu coração."
 natural_disaster.5102.a: "Tenho sorte de estar vivo."
 natural_disaster.5102.desc_remote.flood: "O reino fervilha com rumores apavorados sobre tal [situation.GetNameNoTooltip|l]. As águas da enchente ceifaram muitas vidas nas terras afetadas, até mesmo de nobres e cortesãos. Embora eu esteja longe do pior, a escala da perda é um choque de realidade."
 natural_disaster.5102.desc_remote.earthquake: "O reino fervilha com rumores apavorantes sobre o(a) [situation.GetNameNoTooltip|l]. Salões e torres ruíram, soterrando lordes e suas casas. O número de mortos é grave, até mesmo entre a nobreza."
 natural_disaster.5111.t: "[situation.GetNameNoTooltip]: acampamento atingido"
 natural_disaster.5111.desc.flood: "Incapazes de resistir a torrente, os cavalos começam a escorregar, arrastando seus cavaleiros consigo. O terror se espalha à medida que mais animais são engolidos pela enxurrada. Meus guerreiros têm o mesmo destino; suas pesadas armaduras, que antes os protegiam de todos os ataques, agora os arrastam para uma morte nas águas.\n\n\"Tende piedade de mim a…\", grita [knight.GetName] Antes que as águas sufocantes lhe encham a boca."
 natural_disaster.5111.desc.earthquake: "O chão ao se partir faz com que muitos guerreiros tropecem e caiam nos abismos recém-abertos. Outros ficam presos ou esmagados pela queda de escombros.\n\nUma pedra angular cai na cabeça do pobre cavalo de [knight.GetName] e morre instantaneamente. Embora [knight.GetNameNoTooltip] tenha escapado por milagre, o mesmo não se pode dizer de seus camaradas."
 natural_disaster.5111.a: "Os fardos da guerra se tornam cada vez mais pesados."
 natural_disaster_army_damaged_title: "[situation.GetType.GetName] afeta o exército"
 natural_disaster_allied_army_damaged_title: "[situation.GetType.GetName] atinge o exército aliado"
 natural_disaster_enemy_army_damaged_title: "[situation.GetType.GetName] atinge o exército inimigo"
 natural_disaster.5901.t.earthquake: "[situation.GetNameNoTooltip]: A ira da Terra"
 natural_disaster.5901.t.flood: "[situation.GetNameNoTooltip]: um torrente de água"
 natural_disaster.5901.desc.earthquake: "Os tremores de [epicenter_county.GetNameNoTier] atingiram seu ápice, devastando a terra. Casas e outros edifícios tombam em massa, e seus destroços esmagam muitos dos que tentam fugir.\n\nA destruição desencadeia uma cadeia devastadora de eventos, com incêndios e tumultos civis irrompendo. Almas corajosas tentam salvar os soterrados sob os escombros, apenas para perder a própria vida nas nuvens de fumaça e no fogo que se espalham por [epicenter_county.GetTierAsNameNoTooltip|l]."
 natural_disaster.5901.desc.flood: "A água corre pelas ruas e becos das cidades que cercam o [river_region.GetNameNoTooltip|l], arrastando os corpos de inocentes em sua corrente implacável. Alguns tentam atravessá-la a vau, apenas para serem engolidos por inteiro.\n\nA enchente se infiltra sob os pisos dos edifícios, encharcando a madeira e garantindo sua futura apodrecimento. As colheitas são esmagadas pela vaga avassaladora da inundação."
 natural_disaster.5901.a.earthquake: "[epicenter_county.GetNameNoTierNoTooltip] ficará em ruínas."
 natural_disaster.5901.a.flood: "A inundação do [river_region.GetNameNoTooltip|l] é iminente."
 natural_disaster.5902.desc: "As notícias do desastre recente são sombrias, e o povo está em desordem. Os governantes das regiões vizinhas observam a destruição com grande interesse, avaliando cuidadosamente a extensão da devastação.\n\nÉ preciso fazer um esforço para conter a crise e salvar o que puder ser recuperado. Seria imprudente ficar de braços cruzados enquanto algo assim acontece."
 # RECOVERY
 natural_disaster.6901.t: "[situation.GetNameNoTooltip]: As consequências"
 natural_disaster.6901.desc.flood: "Por fim as águas de [river_region.GetNameNoTooltip|l] voltaram ao normal. Ainda há poças profundas espalhadas pelo terreno, mas o sol brilha intensamente; em breve o excesso de água será absorvido pela terra."
 natural_disaster.6901.desc.earthquake: "A terra fica em silêncio e o solo de [epicenter_county.GetNameNoTier] já não treme. O que antes foi um/a [epicenter_county.GetTierAsNameNoTooltip|l] florescente agora está em ruínas, restando apenas um punhado de edifícios em pé."
 natural_disaster.6901.desc: "\n\nHá uma sensação de alívio, mas não há dúvida de que a região é uma sombra do que já foi. Essa devastação será mencionada por anos e assombrará a alma dos sobreviventes."
 natural_disaster.6901.a: "O caminho para restaurar a ordem é longo."
 natural_disaster.6902.desc: "Nobres e povo comum igualmente se alegram com o fim de tão terrível [situation.GetNameNoTooltip|l]. A alegria é efêmera, pois em breve os efeitos da catástrofe serão revelados. Será preciso trabalhar para restaurar o que foi perdido e consolar aqueles que caíram vítimas da desordem."
 natural_disaster.6902.a: "Esperemos que os esforços sejam adequados."
 natural_disaster.6911.t: "[situation.GetNameNoTooltip]: o ministro envia ajuda"
 natural_disaster.6911.desc: "[minister_helper.GetName], assistente [minister.Custom('ES_DelDela')] [minister.GetTitledFirstName|l], inspeciona o local da [situation.GetNameNoTooltip]\n\n“Minhas condolências, [ROOT.Char.GetNameNoTooltip]. Fui enviado aqui por [minister.Custom('ES_ElLa')] [minister.GetTitledFirstNameNoTooltip|l] para ajudá-lo a salvar a situação. [minister.Custom('ES_ElLa')|U] minist[minister.Custom('ES_OA')] deseja fazer o que for preciso, pois [minister.GetTopLiege.Custom('ES_ElLa')] [minister.GetTopLiege.GetTitledFirstName|l] aguarda uma rápida recuperação”."
 natural_disaster.6911.minister_chancellor: "\"Sua graça me honra\"."
 natural_disaster.6911.minister_censor: "\"O que eu preciso é lutar contra a corrupção\"."
 natural_disaster.6911.minister_grand_marshal: "\"Preciso manter a ordem\"."
 natural_disaster.6911.minister_of_personnel: "\"Serei a extensão da influência de [minister.Custom('ES_DelDela')] [minister.GetTitledFirstNameNoTooltip|l]\"."
 natural_disaster.6911.minister_of_revenue: "\"É preciso reduzir os impostos\"."
 natural_disaster.6911.minister_of_rites: "\"As orações ajudam muito\"."
 natural_disaster.6911.minister_of_war: "\"Mais fortificações evitarão desastres futuros\"."
 natural_disaster.6911.minister_of_justice: "$natural_disaster.6911.a.minister_censor$"
 natural_disaster.6911.minister_of_works: "\"O reassentamento das vítimas é a prioridade máxima\"."
 natural_disaster.6911.a: "\"As despesas estão altas, preciso do tesouro\"."
 natural_disaster_recovery_minister_of_revenue_tt: "Impede todos os [modifiers|El] negativos de [tax|El] por as [great_project_contributions|E] em [great_project.GetName]"
 natural_disaster_recovery_minister_of_works_tt: "Impede todos os [modifiers|El] negativos da [domain|El] pelas [great_project_contributions|El] em [great_project.GetName]"
 minister_has_aidee_to_send_tt: "Emprega [GetCourtPositionType( 'minister_bureaucrat_court_position' ).GetName|l]"
 # WARNING
 natural_disaster.7001.t: "[epicenter_county.GetNameNoTierNoTooltip]: Tremores profanos"
 natural_disaster.7001.desc: "[epicenter_county.GetProvince.GetCounty.GetFaith.HouseOfWorshipPlural|U] e santuários de [epicenter_county.GetNameNoTier] começaram a desmoronar devido aos tremores, o que incutiu medo até nos corações dos mais devotos. Está claro que os tremores não vão cessar e se intensificam a cada instante."
 natural_disaster.7001.a: "Esta catástrofe exige #EMP toda#! minha atenção!"
 natural_disaster.7001.a.tt: "Você entrará em uma regência até que o desastre chegue à $game_concept_situation_phase$ de recuperação."
 natural_disaster.7001.a.tt.already_in_diarchy: "Você já [Concept('power_sharing', 'compartes el poder')|E] e não precisa fazer mudanças para acomodar o peso extra."
 natural_disaster.7001.a.tt.discount: "As contribui??es para os projetos de recupera??o da [disaster|lE] lhe custar?o #v 10% menos#! enquanto [Concept('power_sharing', 'compartilhar o poder')|E]"
 natural_disaster.7001.b: "Devemos cuidar dos nossos!"
 natural_disaster.7001.b.tt: "Você pode $isolate_family_decision$"
 natural_disaster.7001.c: "Que [ROOT.Char.GetFaith.HighGodName] nos ajude!"
 natural_disaster.7011.t: "[epicenter_county.GetNameNoTierNoTooltip]: fauna em fuga"
 natural_disaster.7011.desc: "Os animais de [epicenter_county.GetNameNoTier] iniciaram um êxodo em massa, pois os tremores sob seu habitat ameaçam sua sobrevivência. As aves começaram uma migração precoce, e seus bandos bloqueiam a luz no céu.\n\nAlgumas pessoas seguem o caminho dos animais em busca de segurança, mas muitos moradores permanecem em suas casas, agarrando-se à esperança de que os tremores passem."
 natural_disaster.7011.d: "A natureza atende aos sinais, enquanto permanecemos complacentes."
 natural_disaster.7021.t: "[river_region.GetNameNoTooltip]: margens inchadas"
 natural_disaster.7021.desc: "O vento empurra águas estrangeiras para o próximo [river_region.GetNameNoTooltip|l] e faz a margem avançar muito além de seus limites. Alguns aproveitam a água excedente para suas próprias necessidades, mas a água continua transbordando.\n\nA região ao redor se transforma em um pântano, e a lama se acumula nos edifícios da cidade."
 natural_disaster.7021.a: "As águas estão soltas."
 natural_disaster.7031.t: "[river_region.GetNameNoTooltip]: chuvas torrenciais"
 natural_disaster.7031.desc: "Uma precipitação tão necessária cai sobre as terras vizinhas ao [river_region.GetNameNoTooltip|l] garantindo que a colheita continuará como planejado.\n\nEmbora a terra esteja mais do que saciada, a chuva aumenta de intensidade e não dá sinais de que vá parar. O sol não pode ser visto em lugar nenhum, e o rio começa a transbordar para o interior."
 natural_disaster.7031.a: "Que os céus tenham piedade."
 # JOIN
 natural_disaster.8001.t.earthquake: "[epicenter_county.GetNameNoTierNoTooltip]: estrondos nas profundezas"
 natural_disaster.8001.t.flood: "[river_region.GetNameNoTooltip]: marca de nível máximo da água"
 natural_disaster.8001.desc.earthquake: "Sou informado de uma grande perturbação em [epicenter_county.GetName]. O solo da região treme e se agita, com rachaduras se formando na superfície. As pequenas estruturas começaram a desabar.\n\nOs habitantes de seu [epicenter_county.GetTierAsNameNoTooltip|l] se inquietam, prejudicando os esforços de organização. Apesar de seu pânico, devo me esforçar para minimizar os danos causados e nos preparar para a destruição que se aproxima."
 natural_disaster.8001.desc.flood: "As águas de [river_region.GetName|l] sobem acima dos níveis normais, encharcando o terreno ao redor. Embora isso possa ajudar a impulsionar a colheita, as águas continuam subindo sem parar.\n\nO sensato seria interromper toda construção na região até que as águas da enchente baixem, e garantir que o maior número possível de pessoas consiga chegar a um lugar seguro."
 natural_disaster.8001.a: "Isso só pode significar uma coisa…"
 natural_disaster.8001.a.tt.earthquake: "Um [earthquake|E] em breve atingirá [epicenter_county.GetNameNoTier]"
 natural_disaster.8001.a.tt.flood: "O [river_region.GetName|l] logo [Concept('flood', 'se desbordará')|E]"
 natural_disaster.8002.t: "[situation.GetNameNoTooltip]: Impacto em andamento"
 natural_disaster.8002.desc.earthquake: "Um violento terremoto devasta [epicenter_county.GetName]. É provável que o(a) [epicenter_county.GetTierAsNameNoTooltip|l] fique em ruínas, e seus habitantes, deslocados.\n\n"
 natural_disaster.8002.desc: "Recursos para ajudar as vítimas e restaurar as regiões estão sendo estocados, mas ainda não vimos todas as consequências do desastre."
 natural_disaster.8002.desc.flood: "O [river_region.GetName|l] transbordou e espalhou suas águas pelos assentamentos próximos. Muitos edifícios foram abandonados, e é provável que qualquer colheita seja perdida."
 natural_disaster.8002.a: "Uma situação grave."
 natural_disaster.8002.a.tt: "Há uma [flood|lE] do [river_region.GetName|l] em andamento."
 natural_disaster.8002.a.tt.earthquake: "Há um [earthquake|lE] em curso em [epicenter_county.GetNameNoTier]."
 natural_disaster.8003.t: "[situation.GetNameNoTooltip]: consequência"
 natural_disaster.8003.desc.earthquake: "Cidadãos em fuga esmagados pelo desabamento de edifícios, escombros bloqueando as rotas de fuga, incêndios e bandidos…\n\nSão apenas algumas das atrocidades vistas pelos residentes de [epicenter_county.GetNameNoTier] que se seguiram ao recente terremoto."
 natural_disaster.8003.desc.flood: "Famílias arrastadas pela corrente, colheitas perdidas na água, edifícios cheios de lama…\n\nTal é o destino da região que circunda o [river_region.GetName|l] após a cheia."
 natural_disaster.8003.desc_outro: "\n\nHá esforços de socorro em andamento, mas os danos causados podem muito bem persistir na região."
 natural_disaster.8003.a: "Devemos reconstruir."
 natural_disaster.8003.a.tt: "Houve uma [flood|El] do [river_region.GetName|l]."
 natural_disaster.8003.a.tt.earthquake: "Houve um [earthquake|lE] em [epicenter_county.GetNameNoTier]."
 disaster_option_warning: "@warning_icon! #warning Esto podría ser mortalmente peligroso!#!"
 travel_to_epicenter_county: "Planejar [Concept('travel', 'uma viagem')|E] para [epicenter_county.GetName]"
