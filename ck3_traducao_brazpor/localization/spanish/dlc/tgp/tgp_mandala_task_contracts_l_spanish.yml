 tgp_east_asia_mandala_task_contract_events.4900.desc: ""Sábi[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], uma [Glossary('nāga', 'NAGA_GLOSS')] vingativa espreita nos rios de [ritual_location.GetName]", suplica [Select_CString(local_character.IsFemale, 'uma mulher trêmula', 'um homem trêmulo' )]. "Dez aldeões desapareceram, arrastados para baixo das águas. Vós deveis atraí-la para longe antes que ela leve mais vidas!"

Viajamos pela margem do rio, o ar está denso de neblina e medo. Então, há movimento nos juncos. Não é nenhuma nāga, mas um crocodilo monstruoso, vasto e ancestral, um deus do rio em seu templo."
