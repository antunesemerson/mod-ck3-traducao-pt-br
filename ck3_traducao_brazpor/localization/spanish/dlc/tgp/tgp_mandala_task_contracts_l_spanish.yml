 tgp_east_asia_mandala_task_contract_events.4200.b: "Quando chegamos a [ritual_location.GetName], [Select_CString(local_character_2.IsFemale, 'uma menina', 'um menino' )] passa correndo ao meu lado com uma coroa improvisada. "Eu sou [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip]! Contemplai a minha divindade!", grita. A aldeia ganha vida com um festival em que os papéis se invertem: os pobres se vestem de nobres, os servos agem como senhores e os senhores carregam bandejas.\n\nSe eu me juntasse a eles disfarçado, sem ser notado, testemunhariam a verdadeira divindade."
