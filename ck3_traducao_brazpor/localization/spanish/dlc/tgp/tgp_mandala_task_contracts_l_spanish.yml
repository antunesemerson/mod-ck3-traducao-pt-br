 mandala_realm_contract_0001_desc: "[TaskContract.MakeScope.Var('loc_desc').GetFlagName|U]"
 mandala_realm_contract_0001_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0001_request: "Compareça em [TaskContract.GetLocation.GetName] e ganhe recompensas com base na sua [skill|E] do [mandala_aspect|lE]"
 mandala_provincial_ritual_desc_01: "Depositamos nossa fé nas mãos de [GetPlayer.Custom('ES_DelDela')] [GetPlayer.Custom('MistressMaster')|U]; aguardamos com entusiasmo sua presença para receber suas bênçãos."
 mandala_provincial_ritual_desc_02: "As pétalas estão murchando e nossa paz de espírito com elas; aguardamos ansiosamente que nossas almas e mentes sejam rejuvenescidas com sua presença"
 mandala_followers_doubting: "Os súditos exigem [mandala_rituals|lE]"
 tgp_east_asia_mandala_task_contract_events.0990.t: "$mandala_ritual_prefix$ pensando melhor"
 tgp_east_asia_mandala_task_contract_events.0990.desc: "Com hesitação, reconsidero meus planos de partir para [ongoing_destination.GetName] para realizar os rituais.\n\nSerá que este é realmente o momento de viajar? Meu tempo não seria melhor aproveitado em outro lugar? Reflexões importantes para um ícone religioso."
 tgp_east_asia_mandala_task_contract_events.0990.a: "O povo de [ongoing_destination.GetNameNoTooltip] me aguarda!"
 tgp_east_asia_mandala_task_contract_events.0990.a_tt: "$governor_contract_event.1012.a_tt$"
 tgp_east_asia_mandala_task_contract_events.0990.b: "$governor_contract_event.1012.b$"
 tgp_east_asia_mandala_task_contract_events.0990.b_tt: "Foi abandonado [ongoing_contract.GetType.GetName] em [ongoing_destination.GetName]"
 tgp_east_asia_mandala_task_contract_events.1000.t.creation: "$mandala_ritual_prefix$ abraçando o Criador"
 tgp_east_asia_mandala_task_contract_events.1000.t.serenity: "$mandala_ritual_prefix$ abraçando o sereno"
 tgp_east_asia_mandala_task_contract_events.1000.t.destruction: "$mandala_ritual_prefix$ abraçando o Destruidor"
 tgp_east_asia_mandala_task_contract_events.1000.t.trickery: "$mandala_ritual_prefix$ adotar o trapaceiro"
 tgp_east_asia_mandala_task_contract_events.1000.desc.creation: "#EMP Creación.#! A vida é frágil, e é nosso dever cuidar dela da melhor forma possível. Se cuidarmos da vida, dos animais e da natureza, ela nos fortalecerá e nos dará em dobro o que oferecermos. Olho ao redor enquanto cuidamos da flora local.\n\nCrianças, adultos, idosos — todos se reúnem para celebrar a vida. As crianças cavam alegremente na terra com suas ferramentas improvisadas, plantando sementes.\n\nUm[local_character.Custom('ES_OA')] de [local_character.GetHerHim] dos assistentes mais fervorosos, [local_character.Custom('ES_ElLa')] [local_character.GetTitledFirstName|l], sorri para mim e me olha com expectativa enquanto o suor escorre por sua testa, como se aguardasse minhas instruções."
 tgp_east_asia_mandala_task_contract_events.1000.desc.serenity: "Há um suave farfalhar na copa das árvores. Olho por cima do ombro e vejo mulheres, homens, anciãos, jovens e até um punhado de crianças pequenas participando da cerimônia, seguindo meus movimentos em silêncio.

#EMP Incline-se. Alongue-se. Respire. Estenda-se. Respire.#!

Um[local_character.Custom('ES_XA')] residente especialmente prestativ[local_character.Custom('ES_OA')], [local_character.Custom('ES_ElLa')] [local_character.GetTitledFirstName|l], se aproxima apressad[local_character.Custom('ES_OA')], perguntando qual deve ser o próximo passo."
 tgp_east_asia_mandala_task_contract_events.1000.desc.destruction: "As fogueiras estão queimando. Os sacrifícios foram feitos. Contemplo a cena, uma poderosa demonstração de força apresentada por [local_character.Custom('ES_ElLa')] líder local, [local_character.Custom('ES_ElLa')] [local_character.GetTitledFirstName|l], e seus mais firmes seguidores, orquestrada por mim.\n\nTodos, ansiosos para servir, ansiosos para repelir o mal antes que ele consuma a Criação. Nossa Criação.\n\nEm conjunto, voltam-se para mim, com uma pergunta unânime escrita em seus rostos: o que desejo que façam em seguida?"
 tgp_east_asia_mandala_task_contract_events.1000.desc.trickery: "criação"
 tgp_east_asia_mandala_task_contract_events.1000.a: "serenidade"
 tgp_east_asia_mandala_task_contract_events.1000.b: "destruição"
 #CUSTOM LOC
 aspect_noun_creation: "[aspect_of_creation|E]"
 aspect_noun_serenity: "[aspect_of_serenity|E]"
 aspect_noun_destruction: "[aspect_of_destruction|E]"
 aspect_noun_trickery: "[aspect_of_trickery|E]"
 aspect_concept_creation: "onipotente"
 aspect_concept_serenity: "sumo onipotente"
 aspect_concept_destruction: "divino"
 aspect_concept_trickery: "venerável"
 holy_compliment_almighty: "reverente"
 holy_compliment_most_omnipotent: "Gado estéril"
 holy_compliment_divine: "O gado de [TaskContract.GetLocation.GetNameNoTooltip] é estéril; poucos bezerros nascem. Os habitantes locais pedem um ritual de fertilidade, para que seu sustento não desapareça."
 holy_compliment_venerable: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 holy_compliment_reverent: "Faça uma aparição em [TaskContract.GetLocation.GetName] e tome uma decisão com base na sua [mandala_aspect|lE]"
 mandala_realm_contract_0002_contract: "$mandala_ritual_prefix$ gado estéril"
 mandala_realm_contract_0002_desc: ""Oh, muito grande e divin[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], ouvi a súplica da minha aldeia", diz [local_character.Custom('ES_ElLa')] aldeirinh[local_character.Custom('ES_OA')], colocando a mão sobre uma novilha esquelética ao seu lado. "Fazei com que nossas vacas voltem a ter bezerros!".\n\n Ele/ela aponta para os aldeões, que trazem grandes guirlandas coloridas de [ROOT.Char.GetCurrentLocation.Custom('get_region_flower_type_plural')] para o ritual."
 mandala_realm_contract_0002_desc_title: "O ritual durará um mês!"
 mandala_realm_contract_0002_request: "Bastará um ritual de uma semana."
 tgp_east_asia_mandala_task_contract_events.1100.t: "Ficarei por um dia."
 tgp_east_asia_mandala_task_contract_events.1100.desc: "A primeira semente"
 tgp_east_asia_mandala_task_contract_events.1100.a: "As gentes de [TaskContract.GetLocation.GetNameNoTooltip] planejam erguer uma [GetBuilding('temple_citadel_01').GetName|l] em seu nome. Recusam-se a começar a menos que você \"plante a primeira semente\" no local."
 tgp_east_asia_mandala_task_contract_events.1100.b: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 tgp_east_asia_mandala_task_contract_events.1100.c: "Apresente-se em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 mandala_realm_contract_0003_contract: "$mandala_ritual_prefix$ a primeira semente"
 mandala_realm_contract_0003_desc: ""Grande [ROOT.Char.GetTitleAsNameNoTooltip], nós, vossos humildes servos, desejamos erguer uma [GetBuilding('temple_citadel_01').GetName|l] em vosso glorioso nome", diz [local_character.Custom('ES_ElLa')] morador[local_character.Custom('ES_OA')] ao comando, olhando para o/a [ritual_location.Custom('TerrainTypeProvince')] diante de nós. "Mas o terreno ainda não está consagrado. Precisais plantar a primeira semente, enchendo a terra com vossa criação."

Um[local_character_2.Custom('ES_XA')] [local_character_2.GetWomanMan] dá um passo à frente, abanando-se timidamente. "Oh, divin[ROOT.Char.Custom('ES_OA')], ofereço-me voluntari[local_character_2.Custom('ES_OA')] para ajudar-vos a concluir o ritual, para que todos de [ritual_location.GetName] vejam!""
 mandala_realm_contract_0003_desc_title: "O/A [ritual_location.Custom('TerrainTypeProvince')] terá um mês da nossa união!"
 mandala_realm_contract_0003_request: "Vamos definir onde será colocada a primeira pedra."
 tgp_east_asia_mandala_task_contract_events.1200.t: "Posso... me virar sozinho[ROOT.Char.Custom('ES_OA')]."
 tgp_east_asia_mandala_task_contract_events.1200.desc: "Novilha sagrada"

Um[local_character_2.Custom('ES_XA')] [local_character_2.GetWomanMan] dá um passo à frente, abanando-se timidamente. "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 tgp_east_asia_mandala_task_contract_events.1200.a: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base na sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.1200.b: "$mandala_ritual_prefix$ novilha sagrada"
 tgp_east_asia_mandala_task_contract_events.1200.c: ""É um desastre", lamenta o ancião da aldeia. "Nossa novilha sagrada se recusa a se deitar; um presságio certo de esterilidade e decadência!"

"Por favor, precisamos que #EMP vós#! nos abençoeis em seu lugar. Subi neste pedestal de pedra e revelai vosso brilho divino para que todos vejam, para que os campos de [ritual_location.GetName] sejam férteis!" O ancião me encara.

Supõe-se que eu deva ficar em um pedestal, nu[ROOT.Char.Custom('ES_OA')], por uma semana, sem comer..."
 mandala_realm_contract_0004_contract: "Minha divindade não conhece limites — contemplem meu corpo!"
 mandala_realm_contract_0004_desc: "A comida e as roupas fazem parte do ritual."
 mandala_realm_contract_0004_desc_title: "Bastará uma efígie minha…"
 mandala_realm_contract_0004_request: "Testemunha divina"
 tgp_east_asia_mandala_task_contract_events.1300.t: "Um casal nobre de [TaskContract.GetLocation.GetName] não tem filhos. Eles pedem que você abençoe a união deles."
 tgp_east_asia_mandala_task_contract_events.1300.desc: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"

"$mandala_ritual_prefix$ testemunha divina" O ancião me encara.

Supõe-se que eu deva ficar em um pedestal, nu[ROOT.Char.Custom('ES_OA')], por uma semana, sem comer..."
 tgp_east_asia_mandala_task_contract_events.1300.a: "Observarei a sua união."
 tgp_east_asia_mandala_task_contract_events.1300.b: "Colocar minhas roupas entre vocês deve bastar."
 tgp_east_asia_mandala_task_contract_events.1300.c: "O sonho das parteiras"
 mandala_realm_contract_0005_contract: "Todas as parteiras de [TaskContract.GetLocation.GetNameNoTooltip] sonham a mesma coisa: sua divindade, unida em união sagrada com uma mulher marcada por presságios."
 mandala_realm_contract_0005_desc: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0005_desc_title: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 mandala_realm_contract_0005_request: "$mandala_ritual_prefix$ o sonho das parteiras"
 tgp_east_asia_mandala_task_contract_events.1400.t: "Ao me aproximar da aldeia nos arredores de [ritual_location.GetName], um grupo de parteiras me recebe. \"Todas nós tivemos o mesmo sonho, grande [ROOT.Char.GetTitleAsNameNoTooltip]\", dizem em uníssono. \"Este é [local_character_2.GetFirstName] — nascido em uma noite de presságios.\"\n\n\"Uma criança para salvar [ritual_location.GetName] nascerá se você se deitar com [local_character_2.GetSheHe].\" As parteiras se calam enquanto [local_character_2.Custom('ES_ElLa')] peculiar [local_character_2.GetWomanMan] dá um passo à frente e sorri timidamente."
 tgp_east_asia_mandala_task_contract_events.1400.desc: "\n\nLanço um olhar para meu [ROOT.Char.Custom2('RelationToMe', 1500_stand_in_character)] , [1500_stand_in_character.GetFirstName]. Tenho certeza de que poderia #EMP asumir#! a responsabilidade…"
 tgp_east_asia_mandala_task_contract_events.1400.a: "

Lanço um olhar para [Select_CString( 1500_stand_in_character.IsFemale, 'uma de minhas devotas', 'um de meus devotos' )], [1500_stand_in_character.GetFirstName]. Eu #EMP vinha#! pensando em experimentar algo novo..."
 tgp_east_asia_mandala_task_contract_events.1400.b: "Venha a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], [local_character_2.GetFirstNameNoTooltip]."
 tgp_east_asia_mandala_task_contract_events.1400.c: "Meu [ROOT.Char.Custom2('RelationToMe', 1500_stand_in_character )] cuidará de [local_character_2.GetFirstNameNoTooltip], lá em [ROOT.Char.GetCapitalLocation.GetNameNoTooltip]."
 mandala_realm_contract_0006_contract: "Meu [ROOT.Char.Custom2('RelationToMe', 1500_stand_in_character )] e eu cuidaremos de [local_character_2.GetFirstNameNoTooltip]."
 mandala_realm_contract_0006_desc: "Meu servo e eu cuidaremos de [local_character_2.GetFirstNameNoTooltip]."
 mandala_realm_contract_0006_desc_title: "Vamos deitar juntos esta mesma noite."
 mandala_realm_contract_0006_request: "[1500_stand_in_character.GetTitledFirstNameNoTooltip], distribua as sementes do meu reinado."
 tgp_east_asia_mandala_task_contract_events.1500.t: "Acólit[1500_stand_in_character. Custom('ES_OA')] [1500_stand_in_character.GetTitledFirstNameNoTooltip|l], distribua as sementes do meu reinado."
 tgp_east_asia_mandala_task_contract_events.1500.desc: "Esta noite meu #EMP espíritu#! estará com você…"
 tgp_east_asia_mandala_task_contract_events.1500.desc.stand_in: "Estátua chorosa"
 tgp_east_asia_mandala_task_contract_events.1500.desc.stand_in.acolyte: "

Lanço um olhar para [Select_CString( 1500_stand_in_character.IsFemale, 'uma de minhas devotas', 'um de meus devotos' )], [1500_stand_in_character.GetFirstName]. Eu #EMP vinha#! pensando em experimentar algo novo..."
 tgp_east_asia_mandala_task_contract_events.1500.a: "$mandala_ritual_prefix$ a estátua chorosa"
 tgp_east_asia_mandala_task_contract_events.1500.a.stand_in: ""[ROOT.Char.GetTitleAsNameNoTooltip|U], ó divin[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip]", chora [local_character.Custom('ES_ElLa')] fazendeir[local_character.Custom('ES_OA')], prostrando-se. "Uma antiga estátua em meu campo começou a chorar leite!" Lanço um olhar: há uma grande cabeça de pedra coberta por panos e flores, com o rosto marcado por rastros brancos.

"Os espíritos passam por ela! Rogamos que unjais este recém-nascido sobre ela para conquistar seu favor!", suplica."
 tgp_east_asia_mandala_task_contract_events.1500.a.stand_in.no_relation: "Este lugar não é um campo qualquer... é um santuário!"
 tgp_east_asia_mandala_task_contract_events.1500.a.stand_in.acolyte: "Deixe-me acrescentar mais oferendas aos espíritos."
 tgp_east_asia_mandala_task_contract_events.1500.b: "Ungirei a criança, como esperado."
 tgp_east_asia_mandala_task_contract_events.1500.b.stand_in: "Santuário da cabeça de pedra gigante"
 tgp_east_asia_mandala_task_contract_events.1500.b.stand_in.acolyte: "A antiga estátua de um rei esquecido deste lugar foi convertida em um santuário por um devaraja local."
 tgp_east_asia_mandala_task_contract_events.1500.c: "Flores brotando"
 mandala_realm_contract_0007_contract: "Uma estranha floração sufocou as mudas em [TaskContract.GetLocation.GetNameNoTooltip]. Os aldeões acreditam que isso foi obra sua e exigem que você restaure o equilíbrio legítimo."
 mandala_realm_contract_0007_desc: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0007_desc_title: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base no seu [mandala_aspect|lE]"
 mandala_realm_contract_0007_request: "$mandala_ritual_prefix$ flores brotando"
 tgp_east_asia_mandala_task_contract_events.1600.t: ""Oh, por que nos abandonastes, [ROOT.Char.GetTitleAsNameNoTooltip]?" diz [local_character.Custom('ES_ElLa')] morador[local_character.Custom('ES_OA')] à frente, com a voz carregada de desespero. "Nossas sementes estão sendo sufocadas por brotos de [ROOT.Char.GetCurrentLocation.Custom('get_region_flower_type_plural')], nem um único campo foi poupado!".\n\n"Sem grãos, vamos morrer de fome… Deveis caminhar descalç[ROOT.Char.Custom('ES_OA')] pelos campos para dizer à terra o que deve crescer nela"."
 tgp_east_asia_mandala_task_contract_events.1600.desc: "Precisareis mais do que isso… Peçam arroz da capital." Lanço um olhar: há uma grande cabeça de pedra coberta por panos e flores, com o rosto marcado por rastros brancos.

"Beijarei a terra, mas nada mais."
 tgp_east_asia_mandala_task_contract_events.1600.a: "Campos férteis"
 tgp_east_asia_mandala_task_contract_events.1600.b: "A chegada de sementes e ferramentas da capital tornou estes terrenos propícios para o desenvolvimento."
 tgp_east_asia_mandala_task_contract_events.1600.c: "Ritual fluvial"
 stone_head_shrine_modifier: "Um rio de [TaskContract.GetLocation.GetNameNoTooltip] é o meio de vida dos moradores locais. Os pescadores lhe pedem que realize um ritual de fertilidade para que continue repleto de peixes."
 stone_head_shrine_modifier_desc: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0008_contract: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 mandala_realm_contract_0008_desc: "$mandala_ritual_prefix$ ritual fluvial"
 mandala_realm_contract_0008_desc_title: "Um grupo de pescador[local_character.Custom('ES_EA')]s se encontra à beira do rio com as cestas cheias da pesca do dia. "Ó grande [ROOT.Char.GetTitleAsNameNoTooltip]! O rio transborda de [ROOT.Char.Custom('GetRegionalFish')], mas os anciãos nos dizem que no ano que vem estará árido!", diz [Select_CString(local_character.IsFemale, 'uma delas', 'um deles')].

"Esta noite teremos uma lua cheia rara. Precisamos que abençoeis as águas com fertilidade divina; [local_character_2.GetFirstName] se ofereceu para juntar-se a vós no ritual.""
 mandala_realm_contract_0008_request: "Junte-se a mim no rio, [local_character_2.GetFirstNameNoTooltip]."
 tgp_east_asia_mandala_task_contract_events.1700.t: "Só preciso jogar arroz na água."
 tgp_east_asia_mandala_task_contract_events.1700.desc: "Tanto peixe… você não está pagando tributo suficiente."
 tgp_east_asia_mandala_task_contract_events.1700.a: "Camponeses revoltados"
 tgp_east_asia_mandala_task_contract_events.1700.b: "Por uma razão ou outra, os camponeses deste condado estão indisciplinados."
 tgp_east_asia_mandala_task_contract_events.1700.c: "Campos malditos"
 fertile_ground_modifier: "Os arados continuam quebrando nos campos de [TaskContract.GetLocation.GetNameNoTooltip]. Os aldeões suspeitam de um espírito malévolo e pedem sua ajuda para quebrar a maldição."
 fertile_ground_modifier_desc: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0009_contract: "Faça uma aparição em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 mandala_realm_contract_0009_desc: "$mandala_ritual_prefix$ campos amaldiçoados"
 mandala_realm_contract_0009_desc_title: ""Este é o sétimo arado que quebra esta semana, [ROOT.Char.GetTitleAsNameNoTooltip]", diz [Select_CString(local_character.IsFemale, 'a chefe', 'o chefe' )], gesticulando furiosamente para os campos. "Sem dúvida, é um espírito da terra ciumento que os quebra!"

"Para quebrar a maldição, vós, em vossa divindade radiante, deveis arrastar o arado por cada campo e abrir o primeiro sulco!""
 mandala_realm_contract_0009_request: "Eu farei isso — me prendam!"
 tgp_east_asia_mandala_task_contract_events.1800.t: "Eu semeio, [entourage_character.GetFirstNameNoTooltip] puxa o arado…"
 tgp_east_asia_mandala_task_contract_events.1800.desc: "Plantarei apenas uma semente.", diz [Select_CString(local_character.IsFemale, 'uma delas', 'um deles')].

"Um raio atingiu uma árvore sagrada, queimando o bosque ao redor dela em [TaskContract.GetLocation.GetNameNoToooltip]. Os camponeses estão assustados e pedem que você realize um ritual de fertilidade sob a árvore."
 tgp_east_asia_mandala_task_contract_events.1800.a: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 tgp_east_asia_mandala_task_contract_events.1800.b: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.1800.c: "$mandala_ritual_prefix$ bosquejo marchito"
 upset_peasants_modifier: ""Divin[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], um raio atingiu nossa árvore sagrada e queimou o bosque…", diz est[local_character.Custom('ES_EA')] [local_character.GetWomanMan] do lugar enquanto aponta os restos carbonizados. "Tememos que não volte a crescer. Já não ouvimos o canto de [ROOT.Char.Custom('GetRandomRegionalWildDaytimeBird')] e os bandos de [ROOT.Char.Custom('GetRandomRegionalSmallGamePlural')] se foram".\n\n"Sob a árvore carbonizada é onde devemos deitar. Se nossa união der frutos, o bosque também dará. Vamos nos cobrir de carvão até que não se possa mais nos distinguir do céu noturno!"."
 upset_peasants_modifier_desc: "Terás sementes da capital — e minhas!"
 mandala_realm_contract_0010_contract: "Vou ajudá-los a plantar sementes da capital…"
 mandala_realm_contract_0010_desc: "Então, deitemos juntos."
 mandala_realm_contract_0010_desc_title: "Bastará untar você com carvão."
 mandala_realm_contract_0010_request: "Arvoredo exuberante"
 tgp_east_asia_mandala_task_contract_events.1900.t: "Graças à doação de sementes da capital do devaraja, os bosques deste condado estão florescendo."
 tgp_east_asia_mandala_task_contract_events.1900.desc: "Juramento da matança do porco"

"[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 tgp_east_asia_mandala_task_contract_events.1900.a: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.1900.b: "$mandala_ritual_prefix$ juramento do sacrifício do porco"
 tgp_east_asia_mandala_task_contract_events.1900.c: ""Grande e poderos[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], buscamos vossa bênção." [local_character.Custom('ES_ElLa')|U] [local_character.GetWomanMan] aponta para um chiqueiro. "Atacaremos nossos inimigos em [vengeance_target.GetNameNoTier], mas não antes que façais um sacrifício."

"Levai este porco preto ao/à [ritual_location.Custom('TerrainTypeProvince')] e derramai seu sangue sobre a pedra do juramento. Só então nosso voto de vingança será selado!""
 mandala_realm_contract_0011_contract: "Um porco? Não, eu providenciarei cinquenta!"
 mandala_realm_contract_0011_desc: "O porco será sacrificado e o juramento será selado."
 mandala_realm_contract_0011_desc_title: "Em vez disso, você fará um juramento de misericórdia."
 mandala_realm_contract_0011_request: "Ira ritual"
 tgp_east_asia_mandala_task_contract_events.2000.t: "Um ano de más colheitas fez com que uma aldeia de [TaskContract.GetLocation.GetNameNoTooltip] suplique por castigo; alguns voluntários imploram para serem atingidos a fim de apaziguar os espíritos."
 tgp_east_asia_mandala_task_contract_events.2000.desc: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 tgp_east_asia_mandala_task_contract_events.2000.a: "Apresente-se em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.2000.a.female: "$mandala_ritual_prefix$ ira ritual"
 tgp_east_asia_mandala_task_contract_events.2000.b: "Ao nos aproximarmos de [ritual_location.GetName], cerca de dez camponeses se aproximam de nós. "Poderos[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip]", diz seu líder, com a voz firme de determinação. "Nossos campos estão estéreis — amaldiçoados por espíritos da terra que exigem um sacrifício".\n\nEle se ajoelha na terra e aponta para minha espada. "Puni-nos. Derramai nosso sangue sobre o chão. Os espíritos serão alimentados — e nossas famílias também"."
 tgp_east_asia_mandala_task_contract_events.2000.c: "Meu próprio sangue agradará aos espíritos."
 lush_grove_modifier: "Vosso sacrifício curará a terra."
 lush_grove_modifier_desc: "Bastará com um porco."
 mandala_realm_contract_0012_contract: "Punição coletiva"
 mandala_realm_contract_0012_desc: "Um ladrão de [TaskContract.GetLocation.GetNameNoTooltip] roubou arroz sagrado e fugiu. Os aldeões querem que sua família seja punida em seu lugar."
 mandala_realm_contract_0012_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0012_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base na sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.2100.t: "$mandala_ritual_prefix$ punição coletiva"
 tgp_east_asia_mandala_task_contract_events.2100.desc: "Uma multidão de aldeões cerca um[local_character_2.Custom('ES_XA')] [local_character_2.GetWomanMan] e seu filho quando chegamos a [ritual_location.GetName]. Grande [ROOT.Char.GetTitleAsNameNoTooltip], grita [Select_CString(local_character.IsFemale, 'a moradora', 'o morador' )] à frente. [local_character_3.GetFirstName] —[Select_CString(local_character_3.IsFemale, 'a ladra', 'o ladrão' )] desta aldeia — roubou nosso arroz sagrado e fugiu para a [ritual_location.Custom('TerrainTypeProvince')]!\n\nE então aponta o dedo para [local_character_2.Custom('ES_AlAla')] [local_character_2.GetWomanMan]. Se [local_character_3.GetSheHe] não receber punição, então sua família deverá pagar. Atingi-os com a justiça divina!"

"[local_character_3.GetSheHe|U] cometeu o delito, sua família sofre o castigo. Assim seja."
 tgp_east_asia_mandala_task_contract_events.2100.a: "Deixe-me abençoar o arroz novamente."
 tgp_east_asia_mandala_task_contract_events.2100.b: "É capturado e morto [local_character_3.GetFirstName]"
 tgp_east_asia_mandala_task_contract_events.2100.c: "[local_character_3.GetFirstName] se te escapa"
 mandala_realm_contract_0013_contract: "Punições coletivas"
 mandala_realm_contract_0013_desc: "Neste condado, as famílias dos ladrões são punidas por crimes que não cometeram."
 mandala_realm_contract_0013_desc_title: "Espíritos infectados"
 mandala_realm_contract_0013_request: "Um xamã em [TaskContract.GetLocation.GetNameNoTooltip] é acusado de abrigar espíritos que trazem doenças. Os aldeões querem incendiar sua cabana — com ele dentro, se necessário."
 tgp_east_asia_mandala_task_contract_events.2200.t: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 tgp_east_asia_mandala_task_contract_events.2200.desc: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.2200.a: "$mandala_ritual_prefix$ espíritos infectados"
 tgp_east_asia_mandala_task_contract_events.2200.b: ""Perdoai nosso estado, poderos[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip]", diz um[local_character.Custom('ES_XA')] [local_character.GetWomanMan] de aparência adoentada, que tosse na mão. "Estamos todos doentes..., todos menos [local_character_2.Custom('ES_ElLa')] [local_character_2.GetWomanMan] que supostamente se #EMP supone#! que nos tratava".\n\n"Certamente ela abriga espíritos malignos!", resmunga. "Queimai a cabana [local_character_2.Custom('ES_DelDela')] portaespíritos; isso os expulsará!"."
 tgp_east_asia_mandala_task_contract_events.2200.c: "Caçaremos todos os falsos curandeiros de [ritual_location.GetNameNoTooltip]."
 mandala_realm_contract_0014_contract: "Queimaremos a cabana, com [local_character_2.Custom('ES_ElLa')] portador(a) do espírito lá dentro."
 mandala_realm_contract_0014_desc: "[local_character_2.Custom('ES_ElLa')|U] o portador de espírito vem comigo."
 mandala_realm_contract_0014_desc_title: "Sem curandeiros"
 mandala_realm_contract_0014_request: "O devaraja mandou matar todos os curandeiros e feiticeiros desta província."
 tgp_east_asia_mandala_task_contract_events.2300.t: "Lanças rombas"
 tgp_east_asia_mandala_task_contract_events.2300.desc: "Os homens de armas de [TaskContract.GetLocation.GetNameNoTooltip] são preguiçosos e estão desmoralizados. O ancião da aldeia lhe implora que os discipline."
 tgp_east_asia_mandala_task_contract_events.2300.a: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 tgp_east_asia_mandala_task_contract_events.2300.b: "Faça uma aparição em [TaskContract.GetLocation.GetName] e tome uma decisão com base no seu [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.2300.c: "$mandala_ritual_prefix$ lanças rombas"
 tgp_east_asia_mandala_task_contract_events.2300.a.success: ""Duvidam da vossa divindade, [ROOT.Char.GetTitleAsNameNoTooltip]", diz o ancião com voz grave. "Os guerreiros passam o dia bebendo; as estradas são inseguras e o banditismo campeia por toda parte..." Ele faz um gesto em direção à taverna próxima.

"Deveis discipliná-los. Usai vossa presença divina, e vossa espada celestial, para colocá-los na linha!""
 tgp_east_asia_mandala_task_contract_events.2300.a.failure: "Aprenderão a servir… com sangue."
 collective_punishments_modifier: "Cada um deles terá minha palavra — ou meu chicote."
 collective_punishments_modifier_desc: "Um discurso simples será suficiente."
 mandala_realm_contract_0015_contract: "Homens de armas motivados"
 mandala_realm_contract_0015_desc: "Os homens de armas que guardam esta província estão muito motivados após uma demonstração de seu devaraja. Ou o que restou deles."
 mandala_realm_contract_0015_desc_title: "Estradas mais seguras"
 mandala_realm_contract_0015_request: "As estradas estão um pouco mais seguras após uma visita do Devaraja."
 tgp_east_asia_mandala_task_contract_events.2400.t: "Vila desafiadora"
 tgp_east_asia_mandala_task_contract_events.2400.desc: "Uma aldeia de [TaskContract.GetLocation.GetNameNoTooltip] se recusa a pagar tributo, zombando da sua divindade. O sacerdote local implora que você marche até lá pessoalmente."
 tgp_east_asia_mandala_task_contract_events.2400.a: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 tgp_east_asia_mandala_task_contract_events.2400.b: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base na sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.2400.c: "$mandala_ritual_prefix$ vila desafiadora"
 no_healers_modifier: "Quando nos aproximamos a [ritual_location.GetName], as zombarias nos recebem: há uma efígie de mim, pendurada de cabeça para baixo, besuntada de cinzas e esterco. Os aldeões dançam ao seu redor, cantam canções sobre a minha fraqueza e uivam como cães selvagens.\n\nEles não me temem.\nEstão implorando pela minha ira."
 no_healers_modifier_desc: "Não deixarei ninguém vivo. O sangue encharcará o chão."
 mandala_realm_contract_0016_contract: "Queimarei seus estoques de grãos."
 mandala_realm_contract_0016_desc: "Eles só precisam de tranquilização."
 mandala_realm_contract_0016_desc_title: "Aldeia massacrada"
 mandala_realm_contract_0016_request: "Um devaraja massacrou a população de uma aldeia rebelde neste condado."
 tgp_east_asia_mandala_task_contract_events.2500.t: "Imposto de sangue"
 tgp_east_asia_mandala_task_contract_events.2500.desc: "O chamamento para a convocação militar em [TaskContract.GetLocation.GetNameNoTooltip] não foi atendido. Os oficiais locais pedem que você exija #EMP pagamento de sangue#!; quem não puder servir deve oferecer um substituto." Ele faz um gesto em direção à taverna próxima.

"Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.2500.a: "$mandala_ritual_prefix$ imposto de sangue"
 tgp_east_asia_mandala_task_contract_events.2500.b: "Ao nos aproximarmos de [ritual_location.GetName], um[local_character.Custom('ES_XA')] funcionári[local_character.Custom('ES_OA')] nos recebe. "[ROOT.Char.GetTitleAsNameNoTooltip|U], esta aldeia recusou-se a atender ao recrutamento", diz, lançando um olhar para um pergaminho. "A punição deles é pagar com sangue, e vós deveis exigi-lo."

"A mim não ouvirão, mas atenderão à vossa palavra divina. Fazei-os pagar o que lhes é devido", inclina-se."
 tgp_east_asia_mandala_task_contract_events.2500.c: "Vou cobrar sangue, não moedas. O levante será atendido."
 motivated_men_at_arms_modifier: "O tributo em sangue será arrecadado."
 motivated_men_at_arms_modifier_desc: "Bastará apenas minha presença."
 safer_roads_modifier: "Leva Imposta"
 safer_roads_modifier_desc: "Um devaraja, por meio de uma demonstração de violência, garantiu que este condado obedeça ao alistamento."
 mandala_realm_contract_0017_contract: "Rebeldes de bambu"
 mandala_realm_contract_0017_desc: "Os camponeses de [TaskContract.GetLocation.GetNameNoTooltip] afiam estacas de bambu, afirmando que agora podem #EMP "defenderse a sí mismos".#! Sua presença marcial é requisitada — antes que a rebelião comece."
 mandala_realm_contract_0017_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0017_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base na sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.2600.t: "$mandala_ritual_prefix$ rebeldes de bambu"
 tgp_east_asia_mandala_task_contract_events.2600.desc: "Ao entrarmos em [ritual_location.GetName] a cavalo, lanças de bambu afiadas se alinham nas aldeias como arsenais improvisados. "Oh, [ROOT.Char.GetTitleAsNameNoTooltip], só estamos afiando estes bastões para nos defendermos contra... [ROOT.Char.Custom('RegionalOnlyFerociousAnimalPlural')], isso mesmo", diz [Select_CString(local_character.IsFemale, 'uma das', 'um dos')] [local_character.GetWomenMen] locais, com um tom nada convincente.

"Nunca, em hipótese alguma, os usaríamos para outra coisa. Não é como se duvidássemos de vossa #EMP divindade#! ou algo assim...""
 tgp_east_asia_mandala_task_contract_events.2600.a: "Farei um exemplo sangrento de sua aldeia."
 tgp_east_asia_mandala_task_contract_events.2600.b: "Entreguem as lanças a vosso[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip]."
 tgp_east_asia_mandala_task_contract_events.2600.c: "Um empreendimento admirável."
 slaughtered_village_modifier: "Camponeses bem armados"
 slaughtered_village_modifier_desc: "Os camponeses deste condado têm permissão para manter grandes quantidades de lanças."
 mandala_realm_contract_0018_contract: "Sacrifício na estrada"
 mandala_realm_contract_0018_desc: "Uma estrada em [TaskContract.GetLocation.GetNameNoTooltip] sofreu ataques repetidos de bandidos. Os moradores acreditam que ela deve ser #EMP "alimentar"#! para reprimir a violência."
 mandala_realm_contract_0018_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0018_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.2700.t: "$mandala_ritual_prefix$ sacrifício na estrada"
 tgp_east_asia_mandala_task_contract_events.2700.desc: ""Grande [ROOT.Char.GetTitleAsNameNoTooltip], as estradas não são seguras em [ritual_location.GetName]", diz [Select_CString(local_character.IsFemale, 'a chefe', 'o chefe' )]. "Os viajantes são atacados, as caravanas são capturadas... Isso nunca acaba."

"Os espíritos da estrada devem estar furiosos." [local_character.GetSheHe|U] segura uma adaga. "É preciso alimentá-los, com sangue, até que a violência cesse.""

"Bastarão cinco dos meus cavalos."
 tgp_east_asia_mandala_task_contract_events.2700.a: "Tragam-me um porco da aldeia."
 tgp_east_asia_mandala_task_contract_events.2700.b: "Festival do deus da guerra"
 tgp_east_asia_mandala_task_contract_events.2700.c: "Um santuário de [TaskContract.GetLocation.GetNameNoTooltip] celebra a divindade da guerra [TaskContract.GetLocation.GetCounty.GetFaith.WarGodName]…, mas sem lhe prestar homenagens. Espera-se que você interrompa o rito e reafirme sua divindade."
 enforced_levy_modifier: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 enforced_levy_modifier_desc: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base no seu [mandala_aspect|lE]"
 mandala_realm_contract_0019_contract: "$mandala_ritual_prefix$ festival do Deus da Guerra"
 mandala_realm_contract_0019_desc: "Em [ritual_location.GetName], os aldeões dançam ao redor de uma grande efígie — uma que não é a minha. #EMP [ritual_location.GetCounty.GetFaith.WarGodName]! [ritual_location.GetCounty.GetFaith.WarGodName]! [ritual_location.GetCounty.GetFaith.WarGodName]! #! gritam. Meu nome jamais é pronunciado.\n\nUm[local_character.Custom('ES_XA')] camponês[local_character.Custom('ES_OA')] dá um passo à frente, sorrindo. "Venham celebrar [ritual_location.GetCounty.GetFaith.WarGodName]!", diz.\n\n #bold Mas eu sou [ritual_location.GetCounty.GetFaith.WarGodName].\nE esperam que eu os castigue.#!"
 mandala_realm_contract_0019_desc_title: "Por sangue e fogo, eles me adorarão a #EMP mí.#!"
 mandala_realm_contract_0019_request: "Estes camponeses servirão de exemplo."
 tgp_east_asia_mandala_task_contract_events.2800.t: "Muito bem. Vamos nos juntar aos festejos."
 tgp_east_asia_mandala_task_contract_events.2800.desc: "População temerosa", diz [Select_CString(local_character.IsFemale, 'uma das', 'um dos')] [local_character.GetWomenMen] locais, com um tom nada convincente.

"Monges briguentos"
 tgp_east_asia_mandala_task_contract_events.2800.a: "Eclodiu uma disputa por terras em [TaskContract.GetLocation.GetNameNoTooltip] entre dois mosteiros locais. Você foi chamado para restaurar a paz."
 tgp_east_asia_mandala_task_contract_events.2800.b: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 tgp_east_asia_mandala_task_contract_events.2800.c: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base na sua [mandala_aspect|lE]"
 well_armed_peasants_modifier: "$mandala_ritual_prefix$ monges briguentos"
 well_armed_peasants_modifier_desc: ""[ritual_location.GetName] nos pertence legitimamente, [local_character_2.Custom2('InsultNoun', local_character)] sem fé!", grita um [GetTrait('devoted').GetName( local_character )|l] com uma voz aguda como um sino. "Que [local_character_2.GetFaith.WarGodName] varra você e seu mosteiro da face da terra!", responde o outro, impassível.

O ar crepita de fúria, mas minha presença a acalma. Agora, aguardam meu veredicto."
 mandala_realm_contract_0020_contract: "Agora apresento meu julgamento divino."
 mandala_realm_contract_0020_desc: "Novos santuários serão erguidos para ambos os lados."
 mandala_realm_contract_0020_desc_title: "Você terá que compartilhar a terra."
 mandala_realm_contract_0020_request: "Novos santuários"
 tgp_east_asia_mandala_task_contract_events.2900.t: "O devaraja ergueu novos santuários para silenciar as disputas monásticas nesta província."
 tgp_east_asia_mandala_task_contract_events.2900.desc: "Monges descontentes"

"Você consegue chegar a um compromisso"
 tgp_east_asia_mandala_task_contract_events.2900.a: "A situação se agrava"
 tgp_east_asia_mandala_task_contract_events.2900.b: "Purificar o campo de batalha"
 tgp_east_asia_mandala_task_contract_events.2900.c: "Um campo de [TaskContract.GetLocation.GetNameNoTooltip] que, outrora manchado pela batalha, agora assombra os aldeões com pesadelos — eles pedem que você o purifique."
 mandala_realm_contract_0021_contract: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0021_desc: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base no seu [mandala_aspect|lE]"
 mandala_realm_contract_0021_desc_title: "$mandala_ritual_prefix$ purificar o campo de batalha"
 mandala_realm_contract_0021_request: ""Muito pacífic[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], um de nossos campos já foi um campo de batalha", diz [Select_CString(local_character.IsFemale, 'a anciã', 'o ancião' )], com a expressão nublada de preocupação. "Os espíritos foram perturbados pelo derramamento de sangue; agora eles nos assombram em sonhos."

"Deveis purificar o campo com uma procissão descalça e depor vossas armas, ainda que por um tempo. Que a terra esqueça o peso do aço, e os espíritos voltem a dormir.""
 tgp_east_asia_mandala_task_contract_events.3000.t: "Juro que haverá paz."
 tgp_east_asia_mandala_task_contract_events.3000.desc: "A procissão será liderada."
 tgp_east_asia_mandala_task_contract_events.3000.a: "Bastará cantar para os espíritos."
 tgp_east_asia_mandala_task_contract_events.3000.b: "Campos de batalha impuros"
 tgp_east_asia_mandala_task_contract_events.3000.c: "Depois que o devaraja decidiu não purificar os campos de batalha, os camponeses foram \"afligidos por pesadelos\", o que os tornou menos produtivos."
 fearful_population_modifier: "Abençoados sejam os tecelões"
 fearful_population_modifier_desc: "Os trabalhadores têxteis de [TaskContract.GetLocation.GetNameNoTooltip] te pedem que abençoe seus teares para que prosperem."
 mandala_realm_contract_0022_contract: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0022_desc: "Faça uma aparição em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 mandala_realm_contract_0022_desc_title: "$mandala_ritual_prefix$ Abençoe os Tecelões"
 mandala_realm_contract_0022_request: "Quando chegamos a [ritual_location.GetName], um[local_character.Custom('ES_XA')] de [Select_CString(local_character.IsFemale, 'muitas tecelãs', 'muitos tecelões' )] se curva diante de mim. "Nossos teares retratam o divino: [ROOT.Char.GetFaith.WealthGodName], [ROOT.Char.GetFaith.HealthGodName] e agora vós, meu [ROOT.Char.GetTitleAsNameNoTooltip]", diz, desdobrando um conjunto de tapeçarias vibrantes.

"Abençoai nosso ofício com prosperidade e nossa aldeia com paz. Tecei algo com vossas próprias mãos, um símbolo para venerarmos.""
 tgp_east_asia_mandala_task_contract_events.3100.t: "Tecerei uma imagem em ouro e seda de [ROOT.Char.GetFaith.WealthGodName]."
 tgp_east_asia_mandala_task_contract_events.3100.desc: "Uma imagem revestida de prata de [ROOT.Char.GetFaith.HealthGodName] é apropriada.", responde o outro, impassível.

O ar crepita de fúria, mas minha presença a acalma. Agora, aguardam meu veredicto."
 tgp_east_asia_mandala_task_contract_events.3100.a: "Os tecelões desta província criam belas imagens de deuses que representam a saúde e a longevidade."
 tgp_east_asia_mandala_task_contract_events.3100.b: "Gremios de tecelões prósperos"
 tgp_east_asia_mandala_task_contract_events.3100.c: "Os tecelões desta província criam belas imagens de deuses que representam a prosperidade e a riqueza."
 new_shrines_modifier: "Quebra de lanças"
 new_shrines_modifier_desc: "Os anciãos de [TaskContract.GetLocation.GetNameNoTooltip] pedem que você parta lanças cerimoniais, simbolizando o fim das sangrentas rixas locais."
 upset_monks_modifier: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 upset_monks_modifier_desc: "Faça uma aparição em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.3100.a.success: "$mandala_ritual_prefix$ ruptura de lanças"
 tgp_east_asia_mandala_task_contract_events.3100.a.failure: ""Clemente [ROOT.Char.GetTitleAsNameNoTooltip], hoje é um dia alegre!", diz radiante [Select_CString(local_character.IsFemale, 'a líder local', 'o líder local' )]. "Uma antiga rixa chegou ao fim; nossos filhos não morrerão mais em vão!"

"Agora só pedimos paz. Tomai nossas lanças e quebrai-as sobre o fogo, para que os espíritos confiem em nossas intenções.""
 mandala_realm_contract_0023_contract: "Quebrarei até minha própria lança; a paz reinará."
 mandala_realm_contract_0023_desc: "As lanças serão quebradas."
 mandala_realm_contract_0023_desc_title: "Quebrar uma lança basta."
 mandala_realm_contract_0023_request: "Você jurou não declarar guerras!"
 tgp_east_asia_mandala_task_contract_events.3200.t: "@alert_icon! #alert_trial Você jura não declarar guerras durante 5 anos!#!"
 tgp_east_asia_mandala_task_contract_events.3200.desc: "Vila sem rivalidades"

"A paz do guru"
 tgp_east_asia_mandala_task_contract_events.3200.a: "Um guru local prega a paz, para que as crianças de [TaskContract.GetLocation.GetNameNoTooltip] possam crescer arando os campos em vez de morrer em disputas."
 tgp_east_asia_mandala_task_contract_events.3200.b: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 tgp_east_asia_mandala_task_contract_events.3200.c: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 plagued_by_nightmares_modifier: "$mandala_ritual_prefix$ a Paz do Guru"
 plagued_by_nightmares_modifier_desc: "Exaltado [ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], sou [local_character.Custom('ES_ElLa')] guru [local_character.GetFirstName]; guio o povo de [ritual_location.GetName], diz este personagem [GetTrait('devoted').GetName( local_character )|l] com a voz firme de convicção. Chamei-vos até aqui porque estas terras precisam de mãos para trabalhar a terra, não para empunhar lanças.\n\nQue os filhos dos lavradores lavrem os campos de seus pais — que uma geração cresça conhecendo a verdadeira serenidade."
 mandala_realm_contract_0024_contract: "Eles conhecerão a serenidade — e você caminhará ao meu lado."
 mandala_realm_contract_0024_desc: "Tenho muito a aprender, você se juntará a mim?"
 mandala_realm_contract_0024_desc_title: "Suas lanças servem à minha divindade."
 mandala_realm_contract_0024_request: "Geração de paz"
 tgp_east_asia_mandala_task_contract_events.3300.t: "Permite-se que uma geração de camponeses cresça em paz; não lhes serão impostas levas."
 tgp_east_asia_mandala_task_contract_events.3300.desc: "Edito de Reconciliação", diz, desdobrando um conjunto de tapeçarias vibrantes.

"[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 tgp_east_asia_mandala_task_contract_events.3300.a: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base no seu [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.3300.b: "$mandala_ritual_prefix$ edito de reconciliação"
 tgp_east_asia_mandala_task_contract_events.3300.c: ""Grande [ROOT.Char.GetTitleAsNameNoTooltip], em [ritual_location.GetName], as disputas são resolvidas com lanças e fogo — não com palavras", diz o ancião, colocando uma grande tabuleta de pedra, junto com ferramentas para entalhe. "Sua palavra é lei divina. Talhe a paz na pedra e ponha fim à violência".\n\nEu vou pegar as ferramentas. Vou inscrever…"
 healthgod_symbol_modifier: "… que as armas são proibidas."
 healthgod_symbol_modifier_desc: "… que as disputas devem ser resolvidas com palavras."
 wealthgod_symbol_modifier: "… que sou bom[ROOT.Char.Custom('ES_OA')] e excelente."
 wealthgod_symbol_modifier_desc: "Inscrição sobre proibição de armas"
 mandala_realm_contract_0025_contract: "Por decreto do devaraja, não são permitidas armas."
 mandala_realm_contract_0025_desc: "Inscrição sobre arbitragem"
 mandala_realm_contract_0025_desc_title: "Por decreto do devaraja, as disputas só poderão ser resolvidas com palavras."
 mandala_realm_contract_0025_request: "Caminho Óctuplo"
 tgp_east_asia_mandala_task_contract_events.3400.t: "Um líder local solicita que passem em silêncio por oito aldeias: uma para cada canto de [TaskContract.GetLocation.GetNameNoTooltip]."
 tgp_east_asia_mandala_task_contract_events.3400.desc: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"

"$mandala_ritual_prefix$ Caminho Óctuplo"
 tgp_east_asia_mandala_task_contract_events.3400.a: ""[ritual_location.GetName] está cheio de aldeias, e também de cansaço, rivalidade e vício", diz [Select_CString(local_character.IsFemale, 'a anciã', 'o ancião' )], girando lentamente enquanto faz um gesto em um amplo círculo. "Oito delas cercam este [ritual_location.Custom('GetRandomRegionalDangerSingular')], cada uma em uma direção diferente."

"Para ensinar-lhes o [Glossary('Caminho Óctuplo', 'EIGHTFOLD_PATH_GLOSS')], deveis percorrê-lo vós mesm[ROOT.Char.Custom('ES_OA')]: oito aldeias, oito fardos, sem descanso nem conforto. Só então verão o que realmente significa o esforço correto.""
 tgp_east_asia_mandala_task_contract_events.3400.b: "Eu o suportarei como um bodhisattva."
 tgp_east_asia_mandala_task_contract_events.3400.c: "Seguirei o caminho, embora até eu precise descansar."
 sworn_peace_tt: "Irá mais rápido a cavalo…"
 unable_to_declare_war_tt: "Uma doutrina central do budismo, que apresenta oito princípios para uma vida reta: Visão Correta, Intenção Correta, Fala Correta, Ação Correta, Meio de Vida Correto, Esforço Correto, Atenção Correta e Concentração Correta.\n\nIdeais semelhantes eram respeitados nas tradições hindu, animista e sincrética do sul e sudeste da Ásia como um guia para a harmonia pessoal e social."
 feudless_village_modifier: "Caminho Óctuplo"
 feudless_village_modifier_desc: "Um devaraja demonstrou aqui as virtudes do [Glossary('sendero óctuple', 'EIGHTFOLD_PATH_GLOSS')]."
 mandala_realm_contract_0026_contract: "Percorreu o caminho óctuplo"
 mandala_realm_contract_0026_desc: "Este devaraja demonstrou aqui as virtudes do [Glossary('sendero óctuple', 'EIGHTFOLD_PATH_GLOSS')] ao percorrer oito aldeias sem descansar."
 mandala_realm_contract_0026_desc_title: "Bosque sagrado ameaçado"
 mandala_realm_contract_0026_request: "Um bosque sagrado de [TaskContract.GetLocation.GetNameNoTooltip] está ameaçado por caçadores furtivos e lenhadores. Os habitantes locais imploram que você deixe guerreiros para guardá-lo."
 tgp_east_asia_mandala_task_contract_events.3500.t: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 tgp_east_asia_mandala_task_contract_events.3500.desc: "Faça uma aparição em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.3500.a: "$mandala_ritual_prefix$ bosque sagrado ameaçado"
 tgp_east_asia_mandala_task_contract_events.3500.b: ""Nossos bosques sagrados de [ritual_location.Custom('GetRandomRegionalWood')] foram maculados, [ROOT.Char.GetTitleAsNameNoTooltip]", diz [Select_CString(local_character.IsFemale, 'a lenhadora', 'o lenhador' )], apontando para uma clareira. "Eles se tornaram um refúgio para lenhadores ilegais, caçadores furtivos e ladrões. Por favor, enviai vossos soldados para corrigir esse erro, e que a terra volte a prosperar.""
 tgp_east_asia_mandala_task_contract_events.3500.c: "Meus homens de armas protegerão as alamedas."
 generation_of_peace_modifier: "A guarnição de [county_scope.GetNameNoTooltip] protegerá as terras."
 generation_of_peace_modifier_desc: "Uma bênção removerá a mácula."
 mandala_realm_contract_0027_contract: "Bosques bem protegidos"
 mandala_realm_contract_0027_desc: "Os bosques desta condado estão bem protegidos."
 mandala_realm_contract_0027_desc_title: "Bosques com guarnição"
 mandala_realm_contract_0027_request: "Os bosques deste condado estão protegidos pela guarnição principal, o que a espalha demais."
 tgp_east_asia_mandala_task_contract_events.3600.t: "Voto de silêncio"
 tgp_east_asia_mandala_task_contract_events.3600.desc: "[TaskContract.GetLocation.GetNameNoTooltip] te pede que assuma um voto público de não violência: você terá que ficar sentado em silêncio durante dias para ensiná-los serenidade."
 tgp_east_asia_mandala_task_contract_events.3600.a: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 tgp_east_asia_mandala_task_contract_events.3600.b: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.3600.c: "$mandala_ritual_prefix$ voto de quietude"
 weapon_ban_modifier: "Antes mesmo de avistarmos [ritual_location.GetName], ouvimos: gritos, discussões, barulho constante. Não é um lugar sereno.

"Grande [ROOT.Char.GetTitleAsNameNoTooltip], se vós estiverdes em silêncio, eles também estarão; se vós estiverdes em paz, eles também estarão", suplica [Select_CString(local_character.IsFemale, 'a chefe', 'o chefe' )] do local. "Demonstrai vossa divindade e livrai-nos desta discórdia.""
 weapon_ban_modifier_desc: "Que três luas passem em silêncio, e a serenidade virá em seguida."
 arbitration_edict_modifier: "Uma semana de silêncio acalmará os inquietos."
 arbitration_edict_modifier_desc: "Um passeio pela cidade deveria acalmar todo mundo."
 mandala_realm_contract_0028_contract: "Cidade de discordância"
 mandala_realm_contract_0028_desc: "Esta província está assolada por discórdia e brigas."
 mandala_realm_contract_0028_desc_title: "Assentamento de pedras"
 mandala_realm_contract_0028_request: "Os aldeões de [TaskContract.GetLocation.GetNameNoTooltip] desejam erguer um edifício em sua honra. Eles precisam de uma cerimônia de rendição das armas antes de começar a construção."
 tgp_east_asia_mandala_task_contract_events.3700.t: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 tgp_east_asia_mandala_task_contract_events.3700.desc: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"

""Seren[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], somos os [Glossary('Śilpakāras', 'SILPAKARAS_GLOSS')] de [ritual_location.GetName]", dizem [Select_CString(local_character.IsFemale, 'as mulheres', 'os homens' )], inclinando-se enquanto erguem seus martelos de construção. "Desejamos levantar uma estrutura em nome da paz e da prosperidade."

"Mas antes de começarmos, pedimos que enterreis vossos [Glossary('pedangs', 'PEDANG_GLOSS')] sob as fundações, para expulsar os espíritos violentos e consagrar o terreno.""
 tgp_east_asia_mandala_task_contract_events.3700.a: "Ordenarei que meu exército depor as armas."
 tgp_east_asia_mandala_task_contract_events.3700.b: "Meu [sacrificial_regiment.GetNameNoTooltip] entregará suas armas."
 tgp_east_asia_mandala_task_contract_events.3700.c: "Enterrarei uma de minhas espadas sob a terra."
 EIGHTFOLD_PATH_GLOSS: "Em sânscrito, śilpakāra refere-se a um artesão especializado em arquitetura ou escultura. Nas cortes hindu-budistas do sul e do sudeste da Ásia, formaram guildas organizadas. Nos estados mandala khmer, javaneses e indianos, os śilpakāras frequentemente trabalhavam sob o patrocínio divino ou real."
 eightfold_path_modifier: "Śilpakāras piedosos"
 eightfold_path_modifier_desc: "Um grupo de [Glossary('śilpakāras', 'SILPAKARAS_GLOSS')] piedosos trabalha nesta província."
 walked_the_eightfold_path_modifier: "Desarmado ritualmente"
 walked_the_eightfold_path_modifier_desc: "Este personagem enterrou suas armas como parte de uma cerimônia ritual."
 mandala_realm_contract_0029_contract: "O asceta que ri"
 mandala_realm_contract_0029_desc: "Um asceta brincalhão está semeando o caos em [TaskContract.GetLocation.GetNameNoTooltip]. Os aldeões recorrem a você para enganar esse agente das traquinagens."
 mandala_realm_contract_0029_desc_title: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0029_request: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em seu [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.3800.t: "$mandala_ritual_prefix$ o asceta que ri"
 tgp_east_asia_mandala_task_contract_events.3800.desc: "Somos recebidos com grandes risadas ao chegarmos a [ritual_location.GetName]. Uma multidão se reúne em torno de um [GetTrait('devoted').GetName( local_character )|l] de aspecto rechoncho; seus rostos estão iluminados pela expectativa. "… e agora, contemplem est[local_character_2.Custom('ES_EA')] [local_character_2.Custom('dummy_peasant_profession')] de coração [GetTrait('arrogant').GetName( local_character_2 )|l] saindo de sua casa", diz [local_character.Custom('ES_ElLa')] asceta em voz baixa e brincalhona.\n\nNesse momento, um barril cai da porta e encharca [local_character_2.Custom('ES_AlAla')] [local_character_2.GetWomanMan] com um estrondo ensurdecedor. "Seu ego foi completamente enxaguado!", brada [local_character.Custom('ES_ElLa')] [GetTrait('devoted').GetName( local_character )|l], agarrando a barriga de tanto rir. Os aldeões irrompem em júbilo — até mesmo a vítima encharcada ri junto."
 tgp_east_asia_mandala_task_contract_events.3800.a: "Achar que podem ser mais espertos que [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetTitleAsNameNoTooltip]? Nunca!"
 tgp_east_asia_mandala_task_contract_events.3800.b: "Deve me ensinar!"
 tgp_east_asia_mandala_task_contract_events.3800.c: "É uma encarnação da minha vontade."
 well_protected_groves_modifier: "Isca para os espíritos"
 well_protected_groves_modifier_desc: "Os aldeões de [TaskContract.GetLocation.GetNameNoTooltip] pedem que você erga um ídolo isca espiritual, para enganar os espíritos malévolos que assombram suas terras."
 garrisoned_groves_modifier: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 garrisoned_groves_modifier_desc: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base na sua [mandala_aspect|lE]"
 mandala_realm_contract_0030_contract: "$mandala_ritual_prefix$ disfarce para os espíritos"
 mandala_realm_contract_0030_desc: ""[ROOT.Char.GetTitleAsNameNoTooltip|U], os espíritos amaldiçoam nossas colheitas de [local_character.Custom('RegionalRootVegetablePlural')] para que apodreçam", diz [Select_CString(local_character.IsFemale, 'a chefe', 'o chefe' )] do lugar, apontando para um monte de madeira e [ritual_location.Custom('GetRandomImprovisedBridgeMaterial')]. "Deveis erguer um ídolo para enganar os espíritos, acalmá-los ou afastá-los.""
 mandala_realm_contract_0030_desc_title: "Construirei um grande ídolo de [local_character.Custom('RegionalRootVegetable')] para intimidá-los."
 mandala_realm_contract_0030_request: "Um ídolo multifacetado de mim mesmo os banirá."
 tgp_east_asia_mandala_task_contract_events.3900.t: "Uma efígie de [ROOT.Char.GetFaith.HealthGodName] os acalmará."
 tgp_east_asia_mandala_task_contract_events.3900.desc: "Antes mesmo de avistarmos [ritual_location.GetName], ouvimos: gritos, discussões, barulho constante. Não é um lugar sereno.

"Ídolo espiritual vegetal"
 tgp_east_asia_mandala_task_contract_events.3900.a: "Acredita-se amplamente que um ídolo construído por um Devaraja proporciona uma colheita próspera."
 tgp_east_asia_mandala_task_contract_events.3900.b: "Ídolo espiritual do devaraja"
 tgp_east_asia_mandala_task_contract_events.3900.c: "Acredita-se amplamente que um ídolo construído por um Devaraja afasta espíritos malignos."
 discordant_town_modifier: "Jogo de inteligência"
 discordant_town_modifier_desc: "Um nobre de [TaskContract.GetLocation.GetNameNoTooltip] desafiou você para um jogo de inteligência — para provar sua divindade perante a corte."
 mandala_realm_contract_0031_contract: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 mandala_realm_contract_0031_desc: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base na sua [mandala_aspect|lE]"
 mandala_realm_contract_0031_desc_title: "$mandala_ritual_prefix$ jogo de inteligência"
 mandala_realm_contract_0031_request: "Ao nos aproximarmos de [ritual_location.GetHolding.GetType.GetName] em [ritual_location.GetName], sou recebido no interior por [local_character.Custom('ES_ElLa')] [local_character.GetTitledFirstNameNicknamed|l]. "Grande e astut[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], desafio-vos para uma partida de [local_character.Custom('BG_GameType_Generic')]", diz [local_character.GetSheHe], erguendo uma peça entalhada. "Vencei, e ganhareis meu respeito. Vencei por meio de #EMP enganos#!, e tereis minha lealdade eterna."

Os servos entram com [local_character.Custom('GetExpensiveMeal')] e [local_character.Custom('GetExpensiveDrink_Singular')]. "Mas se perderdes... bem, então veremos.""
 tgp_east_asia_mandala_task_contract_events.4000.t: "Colocarei as peças nas mãos de [ROOT.Char.GetFaith.TricksterGodNamePossessive]."
 tgp_east_asia_mandala_task_contract_events.4000.desc: "Minha habilidade me permitirá superar isso."

"Ladrão divino"
 tgp_east_asia_mandala_task_contract_events.4000.a: "Um criminoso de [TaskContract.GetLocation.GetNameNoTooltip] tem certa semelhança com você e cometeu atos de furto afirmando ser você."
 tgp_east_asia_mandala_task_contract_events.4000.b: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 tgp_east_asia_mandala_task_contract_events.4000.c: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 SILPAKARAS_GLOSS: "$mandala_ritual_prefix$ ladrão divino"
 pious_silpakaras_modifier: ""Exijo seu colar… é vital para o meu ritual", diz um[local_character.Custom('ES_XA')] [local_character.GetWomanMan] que tem uma semelhança #EMP inquietante#! comigo, pairando sobre um aldeão assustado. "Rápido, não faça sua [ROOT.Char.GetTitleAsNameNoTooltip] esperar!".\n\nEle se vira e fica gelad[local_character.Custom('ES_OA')] ao me ver. "Oh, muito venerável [ROOT.Char.GetTitleAsNameNoTooltip]! Eu só estava… arrecadando tributo em seu nome!", gagueja."
 pious_silpakaras_modifier_desc: "Chega de roubar — você falará com a minha voz em [ritual_location.GetNameNoTooltip]."
 ritually_disarmed_modifier: "Você será útil. Você voltará comigo."
 ritually_disarmed_modifier_desc: "Devolva tudo o que você roubou."
 mandala_realm_contract_0032_contract: "Autoridade onipresente"
 mandala_realm_contract_0032_desc: "É quase como se o Devaraja vivesse neste condado, de tão visto que ele é... mas ele não vive na capital?"
 mandala_realm_contract_0032_desc_title: "Julgamento espiritual"
 mandala_realm_contract_0032_request: "As pessoas de [TaskContract.GetLocation.GetNameNoTooltip] creem que estão sendo enganadas por um [TaskContract.GetLocation.Custom('GetProvinceTricksterSpirit')] zomba delas."
 tgp_east_asia_mandala_task_contract_events.4100.t: "[GetPlayer.GetTitleAsNameNoTooltip] [TaskContract.MakeScope.Var('loc_compliment').GetFlagName|l],"
 tgp_east_asia_mandala_task_contract_events.4100.desc: "Compareça em [TaskContract.GetLocation.GetName] e tome uma decisão com base em sua [mandala_aspect|lE]"
 tgp_east_asia_mandala_task_contract_events.4100.a: "$mandala_ritual_prefix$ julgamento espiritual"
 tgp_east_asia_mandala_task_contract_events.4100.b: ""Grande [ROOT.Char.GetTitleAsNameNoTooltip], um [ritual_location.Custom('GetProvinceTricksterSpirit')] está zombando de nós", rosna [Select_CString(local_character.IsFemale, 'a anciã', 'o ancião' )], esfregando a testa. "O poço está cheio de sapos, os bolos de arroz azedam de uma noite para outra, um bando de [ROOT.Char.Custom('GetRandomRegionalWildDaytimeBird')]s assusta as crianças, e acordei com um exemplar de #EMP [local_character.Custom('RegionalPoxAnimal')]#! dormindo ao meu lado!"

[local_character.GetSheHe|U] se aproxima com olhar nervoso. "Deveis ser mais espert[ROOT.Char.Custom('ES_OA')] que esse espírito trapaceiro... realizai um falso sacrifício para confundi-lo!""
 tgp_east_asia_mandala_task_contract_events.4100.c: "Reúnam a aldeia, vou \"sacrificar\" uma criança!"
