l_spanish:
 jail_inspection: "Inspeção de prisão"
 jail_inspection_contract: "$jail_inspection$"
 jail_inspection_request: "Esta situação permite que você escolha um resultado"
 jail_inspection_desc: "Chegam relatos graves da prisão do distrito: as condições são abismais e os prisioneiros estão à beira de uma revolta aberta."
 jail_inspection_desc_title: "$task_contract_governance_desc_title$"
 tgp_governor_contract_event.0010.t: "Inspeção da prisão"
 tgp_governor_contract_event.0010.desc: "Parece que os prisioneiros do cárcere distrital em ruínas de [jail_inspection_destination.GetName] estão inquietos, protestando contra suas condições e frustrando os melhores esforços dos carcereiros para mantê-los sob controle. Os relatórios alertam que uma solução deve ser encontrada logo, ou os prisioneiros podem sobrepujar seus guardas."
 tgp_governor_contract_event.0010.a: "Deveria cuidar disso pessoalmente."
 tgp_governor_contract_event.0010.a_tt: "Viajar para [jail_inspection_destination.GetName] e inspecionar pessoalmente a prisão."
 tgp_governor_contract_event.0010.b: "As súplicas dos condenados pouco me interessam."
 tgp_governor_contract_event.0001.t: "Inspeção da prisão"
 tgp_governor_contract_event.0001.desc: "Mal entrei na prisão quando meus sentidos são assaltados pelo fedor nauseante dos imundos e pelos gemidos lúgubres dos detentos. Algo pequeno roça brevemente meu pé antes de disparar para as sombras rápido demais para ser identificado.\n\nVolto meu olhar para a cela mais próxima e encontro os olhos [Select_CString(sick_prisoner.IsFemale, 'da prisioneira', 'do prisioneiro' )] que estão em seu interior; seu olhar é uma súplica silenciosa."
 tgp_governor_contract_event.0001.a: "Renove a prisão, mas os prisioneiros fornecerão a mão de obra." # (Special governor option)
 tgp_governor_contract_event.0001.b: "Devemos melhorar suas condições imediatamente!"
 tgp_governor_contract_event.0001.c: "Perdoai os menos culpados."
 tgp_governor_contract_event.0001.d: "Que os reclamantes mais barulhentos sejam calados a pauladas."
 tgp_governor_contract_event.0001.e: "Nós os libertaremos… como mão de obra para nossas fazendas e construções."
 task_contract_reward_effect_renovate_jail_desc: "$label_success_standard$"
 task_contract_reward_effect_improve_their_conditions_desc: "$label_success_standard$"
 task_contract_reward_effect_pardon_some_of_them_desc: "$label_success_standard$"
 task_contract_reward_effect_beat_the_complainers_desc: "$label_success_standard$"
 task_contract_reward_effect_convict_labor_desc: "$label_success_standard$"
 potent_physick: "Remédio potente"
 potent_physick_contract: "$potent_physick$"
 potent_physick_request: "Esta situação permite que você escolha um resultado"
 potent_physick_desc: "Um novo e potente curativo está sendo vendido no mercado, e a multidão de compradores ameaça a ordem pública."
 potent_physick_desc_title: "$task_contract_governance_desc_title$"
 tgp_governor_contract_event.0011.t: "Remédio potente"
 tgp_governor_contract_event.0011.desc: "Raramente o estabelecimento de um mascate no mercado desperta o interesse do governo, mas parece que um desses indivíduos em [potent_physick_destination.GetName] promove um elixir tão eficaz que as multidões ruidosas que ele atrai rapidamente se tornam uma perturbação da ordem pública."
 tgp_governor_contract_event.0011.a: "Qualquer cura que inspire tamanha demanda merece ser investigada."
 tgp_governor_contract_event.0011.a_tt: "Viajar a [potent_physick_destination.GetName] e restaurar a ordem no mercado."
 tgp_governor_contract_event.0011.b: "Não tenho interesse nos assuntos do mercado."
 tgp_governor_contract_event.0002.t: "Fármaco potente"
 tgp_governor_contract_event.0002.desc: "Depois que meus assistentes dispersaram a teimosa multidão, encontro-me diante de [Select_CString(snake_oil_peddler.IsFemale, 'la vendedora', 'el vendedor' )] de remédios e suas misturas. O olhar de [Select_CString(snake_oil_peddler.IsFemale, 'esta astuta buhonera', 'este astuto buhonero' )] avalia a qualidade de minhas vestes e se fixa nessa nova e lucrativa oportunidade.\n\n«Um único frasco, [ROOT.Char.Custom('FormOfAddressForLiege')]», diz, erguendo um dedo que ondula com animação para ilustrar. «Garantido para repor sua essência interior e corrigir o que o prejudica!».\n\n«Meu [ROOT.Char.GetLadyLord] teria interesse em adquirir um, ou talvez vários?». [Select_CString(snake_oil_peddler.IsFemale, 'La vendedora', 'El vendedor' )] irradia uma cobiça servil."
 tgp_governor_contract_event.0002.a: "Vamos requisitar estes filtros como suprimentos de emergência." # (Special governor option)
 tgp_governor_contract_event.0002.b: "Você tem #EMP licencia#! para esta barraca?"
 tgp_governor_contract_event.0002.c: "Arrume suas coisas e leve essa charlatanice para outro lugar."
 tgp_governor_contract_event.0002.d: "Acontece que preciso de [Select_CString(snake_oil_peddler.IsFemale, 'uma médica', 'um médico' )]..."
 tgp_governor_contract_event.0002.e: "Acho que sim: para dentro!"
 task_contract_reward_effect_emergency_appropriation_desc: "$label_success_standard$"
 task_contract_reward_effect_licensing_issue_desc: "$label_success_standard$"
 task_contract_reward_effect_begone_quack_desc: "$label_success_standard$"
 task_contract_reward_effect_hire_the_quack_desc: "$label_success_standard$"
 task_contract_reward_effect_down_the_hatch_desc: "$label_success_standard$"
 irregular_accounting: "Contabilidade irregular"
 irregular_accounting_contract: "$irregular_accounting$"
 irregular_accounting_request: "Esta situação permite que você escolha um resultado"
 irregular_accounting_desc: "Os impostos devidos desta região têm chegado cada vez mais tarde a cada coleta, e os custos de transporte aumentam a cada entrega."
 irregular_accounting_desc_title: "$task_contract_governance_desc_title$"
 tgp_governor_contract_event.0012.t: "Contabilidade irregular"
 tgp_governor_contract_event.0012.desc: "É de se esperar alguma variação nos prazos de entrega ao transportar impostos, seja devido às condições da estrada, ao clima ou a outros fatores difíceis de prever ou controlar.\n\nNo entanto, a arrecadação de [irregular_accounting_destination.GetName] chega com atraso incomum e os custos de transporte que são repassados ao meu escritório parecem cada vez mais excessivos."
 tgp_governor_contract_event.0012.a: "Isso merece um exame mais atento."
 tgp_governor_contract_event.0012.a_tt: "Viajar a [irregular_accounting_destination.GetName] e chegar ao fundo do assunto."
 tgp_governor_contract_event.0012.b: "Tenho certeza de que isso se resolverá com o tempo."
 tgp_governor_contract_event.0003.t: "Contabilidade irregular"
 tgp_governor_contract_event.0003.desc: "Quase admiraria a complexa operação [Select_CString(dubious_tax_agent.IsFemale, 'de la defraudadora', 'del defraudador' )], não fosse pelo fato de que os fundos que desviava para o próprio bolso eram meus.\n\nOs escrivães ainda estão desvendando a extensão total das irregularidades, mas o que encontraram até agora é mais do que suficiente para condenar[dubious_tax_agent.GetHerHim], caso incendiar os livros-razão quando chegamos não fosse prova suficiente.\n\n[Select_CString(dubious_tax_agent.IsFemale, 'La transgresora', 'El transgresor' )] está ao meu lado, aguardando julgamento, com os olhos baixos e a expressão tão sombria quanto seu futuro."
 tgp_governor_contract_event.0003.a: "Renunciai ao vosso lucro ilícito e contemplai vosso crime na prisão." # (Special governor option)
 tgp_governor_contract_event.0003.b: "Encarcerar uma mente tão #EMP emprendedora#! seria um desperdício."
 tgp_governor_contract_event.0003.c: "Isso poderia me deixar mal-visto; não é necessário que a verdade seja conhecida."
 tgp_governor_contract_event.0003.d: "Restitua o que roubou e será perdoado. Desta vez."
 tgp_governor_contract_event.0003.e: "Creo que lo que de #EMP verdad#! necesitáis es un[ROOT.Char.Custom('ES_XA')] compañer[ROOT.Char.Custom('ES_OA')]…"
 task_contract_reward_effect_confiscation_and_incarceration_desc: "$label_success_standard$"
 task_contract_reward_effect_recruit_embezzler_desc: "$label_success_standard$"
 task_contract_reward_effect_cover_up_desc: "$label_success_standard$"
 task_contract_reward_effect_into_your_pocket_desc: "$label_success_standard$"
 task_contract_reward_effect_continue_the_charade_desc: "$label_success_standard$"
 salt_smugglers: "Contrabandistas de sal"
 salt_smugglers_contract: "$salt_smugglers$"
 salt_smugglers_request: "Esta situação permite que você escolha um desfecho"
 salt_smugglers_desc: "O líder de uma quadrilha local de contrabando de sal foi detido e oferece a localização do restante do bando em troca da liberdade."
 salt_smugglers_desc_title: "$task_contract_governance_desc_title$"
 tgp_governor_contract_event.0013.t: "Contrabandistas de sal"
 tgp_governor_contract_event.0013.desc: "O contrabando de sal é uma grave ofensa contra a autoridade do governo, e [salt_smuggler.Custom('ES_ElLa')] líder de uma gangue desse tipo de fora-da-lei foi capturad[salt_smuggler.Custom('ES_OA')] em [salt_smugglers_destination.GetName] há pouco. Parece que [Select_CString(salt_smuggler.IsFemale, 'a chefe', 'o chefe' )] pediu para falar comigo pessoalmente e oferece sacrificar o restante da gangue em troca da própria vida."
 tgp_governor_contract_event.0013.a: "Pelo menos eu deveria ouvir essa oferta."
 tgp_governor_contract_event.0013.a_tt: "Viajar para [salt_smugglers_destination.GetName] e lidar com [Select_CString(salt_smuggler.IsFemale, 'de la forajida', 'del forajido' )] , de uma forma ou de outra."
 tgp_governor_contract_event.0013.b: "Responder ao chamado de [Select_CString(salt_smuggler.IsFemale, 'uma fora da lei', 'um fora da lei' )] está abaixo da minha dignidade."
 tgp_governor_contract_event.0004.t: "Contrabandistas de sal"
 tgp_governor_contract_event.0004.desc: "Talvez os grilhões prendam as mãos de [salt_smuggler.GetName], mas fizeram pouco para reprimir a natureza mentirosa de [Select_CString(salt_smuggler.IsFemale, 'de la contrabandista', 'del contrabandista' )]. Tem um jeito descaradamente ousado, como se fôssemos dois mercadores negociando no mercado e não magistrad[ROOT.Char.Custom('ES_OA')] e malfeitor[salt_smuggler.Custom('ES_XA')], cuja vida pende de um fio.\n\n«É, eu lhes direi onde estão o resto dos meus homens, assim que tirarem estas coisas», e ergue os pulsos amarrados, apontando para eles com um significativo arquejar das sobrancelhas, «e me garantirem passagem segura até algum lugar onde jamais precisemos nos encontrar novamente»."
 tgp_governor_contract_event.0004.a: "Executem[salt_smuggler.GetHerHim] e que #EMP eso#! envie uma mensagem à sua gangue." # (Special governor option)
 tgp_governor_contract_event.0004.b: "Você terá seu acordo, mas não quero voltar a vê-lo."
 tgp_governor_contract_event.0004.c: "[salt_smuggler.GetHerHim|U] interrogarei e teremos os homens dele em nossos termos."
 tgp_governor_contract_event.0004.d: "O que comprará sua indulgência será a localização dos seus ganhos ilícitos…"
 tgp_governor_contract_event.0004.e: "Poderia me cair bem um[salt_smuggler.Custom('ES_XA')] [salt_smuggler.GetWomanMan] com suas habilidades em particular."
 task_contract_reward_effect_execute_smuggler_desc: "$label_success_standard$"
 task_contract_reward_effect_cut_a_deal_desc: "$label_success_standard$"
 task_contract_reward_effect_interrogate_smuggler_desc: "$label_success_standard$"
 task_contract_reward_effect_a_cut_of_the_take_desc: "$label_success_standard$"
 task_contract_reward_effect_recruit_smuggler_desc: "$label_success_standard$"
 hoarding_grain: "Estocagem de grãos"
 hoarding_grain_contract: "$hoarding_grain$"
 hoarding_grain_request: "Esta situação te permite escolher um resultado"
 hoarding_grain_desc: "Uma família local notável tem estado a estocar grãos e se recusa a vender, elevando os preços, enquanto os oficiais foram intimidados a uma passividade submissa."
 hoarding_grain_desc_title: "$task_contract_governance_desc_title$"
 tgp_governor_contract_event.0014.t: "Acumulação de grãos"
 tgp_governor_contract_event.0014.desc: "É uma prática lamentável, mas não incomum, que famílias abastadas comprem cereais além do que precisam em tempos de abundância, com os olhos voltados para lucros futuros, mas fomos informados de que uma família em [hoarding_grain_destination.GetName] foi além do normal.\n\nParece que acumularam tanto cereal que o preço subiu a ponto de o povo comum mal poder pagar por ele."
 tgp_governor_contract_event.0014.a: "Minha presença será necessária para resolver isto."
 tgp_governor_contract_event.0014.a_tt: "Viajar a [hoarding_grain_destination.GetName] para solucionar a escassez de cereais."
 tgp_governor_contract_event.0014.b: "Assuntos de importância muito maior exigem minha atenção."
 tgp_governor_contract_event.0005.t: "Acúmulo de grãos"
 tgp_governor_contract_event.0005.desc: "O requintado mobiliário da mansão de [grain_hoarding_local_notable.GetName] contrasta de forma gritante com as miseráveis choupanas pelas quais passamos a caminho daqui. [Select_CString(grain_hoarding_local_notable.IsFemale, 'Nuestra anfitriona', 'Nuestro anfitrión' )] não faz qualquer tentativa de ocultar ou minimizar suas aquisições; na verdade, quase se orgulha delas.\n\n"Perdoe minha ignorância em assuntos de Estado, mas não consigo entender o interesse de meu [ROOT.Char.GetLadyLord|l] neste assunto", diz de forma insolente. "Trata-se simplesmente de uma questão de transações comerciais legítimas, e certamente meu [ROOT.Char.GetLadyLord|l] não tem assuntos mais urgentes para tratar…?"; sua última frase é mais uma afirmação do que uma pergunta."
 tgp_governor_contract_event.0005.a: "Liberem as reservas de grãos do governo e inundem o mercado." # (Special governor option)
 tgp_governor_contract_event.0005.b: "Essa mesquinha avareza não é indigno de uma pessoa de sua evidente dignidade?"
 tgp_governor_contract_event.0005.c: "Pode até ser lícito, mas certamente se poderia encontrar #EMP algo#! impróprio."
 tgp_governor_contract_event.0005.d: "E se eu me oferecesse para tirar o grão das suas mãos?"
 tgp_governor_contract_event.0005.e: "Eu poderia ter um cargo para você, se tivesse uma atitude mais cooperativa."
 task_contract_reward_effect_release_the_grain_desc: "$label_success_standard$"
 task_contract_reward_effect_shame_them_desc: "$label_success_standard$"
 task_contract_reward_effect_intimidate_them_desc: "$label_success_standard$"
 task_contract_reward_effect_purchase_grain_yourself_desc: "$label_success_standard$"
 task_contract_reward_effect_bribe_with_offices_desc: "$label_success_standard$"
 doddering_magistrate: "Magistrado decrepito"
 doddering_magistrate_contract: "$doddering_magistrate$"
 doddering_magistrate_request: "Esta situação permite que você escolha um desfecho"
 doddering_magistrate_desc: "Os escreventes deste distrito enviaram mensagens desesperadas informando que seu supervisor idoso já não está à altura da tarefa."
 doddering_magistrate_desc_title: "$task_contract_governance_desc_title$"
 tgp_governor_contract_event.0015.t: "Magistratura decrépita"
 tgp_governor_contract_event.0015.desc: "O princípio de que com a idade vêm a sabedoria e a experiência, ao que parece, não se aplica aos escrivães de [doddering_magistrate_destination.GetName], que enviaram coletivamente múltiplos apelos ao meu gabinete implorando que seu superior seja realocado ou removido de seu cargo[elderly_magistrate.Custom('ES_XA')], que é de uma idade particularmente venerável."
 tgp_governor_contract_event.0015.a: "É um assunto delicado, algo que devo resolver pessoalmente."
 tgp_governor_contract_event.0015.a_tt: "Viaje até [doddering_magistrate_destination.GetName] e avalie o desempenho [Select_CString(elderly_magistrate.IsFemale, 'de la funcionaria', 'del funcionario' )]."
 tgp_governor_contract_event.0015.b: "Não lhes cabe questionar seu superior[elderly_magistrate.Custom('ES_XA')]."
 tgp_governor_contract_event.0006.t: "Magistrado decrépito"
 tgp_governor_contract_event.0006.desc: "É como se eu pudesse ter vivido uma segunda vida no tempo que leva [Select_CString(elderly_magistrate.IsFemale, 'a la anciana funcionaria', 'al anciano funcionario' )] a se levantar de seu assento para realizar as saudações de costume.\n\nSua lenta reverência parece lhe causar imensa dificuldade, e ele a mantém por tanto tempo que chego a me perguntar se talvez esse tenha sido seu fim, antes que dois escribas se apressassem a ajudar essa pessoa a se endireitar novamente.\n\n«[ROOT.Char.Custom('FormOfAddressForLiege')|U] me honra demais», resmunga; sua voz range como a roda velha e gasta de uma carroça. «Como posso servi-lo, [ROOT.Char.Custom('FormOfAddressForLiege')]?»."
 tgp_governor_contract_event.0006.a: "Dê os deveres dela para outra pessoa, mas deixe que ela mantenha o cargo." # (Special governor option)
 tgp_governor_contract_event.0006.b: "Sua idade compromete sua habilidade; obrigue[elderly_magistrate.GetHerHim] a se afastar."
 tgp_governor_contract_event.0006.c: "Ele já deveria ter sido promovido há muito tempo! Em algum lugar #EMP discreto#!…"
 tgp_governor_contract_event.0006.d: "Vamos deixá-lo continuar. O Estado sobreviverá a ele."
 tgp_governor_contract_event.0006.e: "Pode continuar seu trabalho, mas será como um simples escriba[elderly_magistrate.Custom('ES_OA')]."
 task_contract_reward_effect_appoint_substitute_desc: "$label_success_standard$"
 task_contract_reward_effect_force_him_out_desc: "$label_success_standard$"
 task_contract_reward_effect_promote_somewhere_harmless_desc: "$label_success_standard$"
 task_contract_reward_effect_let_him_continue_desc: "$label_success_standard$"
 task_contract_reward_effect_demote_him_desc: "$label_success_standard$"
 burdensome_taxes: "Impostos onerosos"
 burdensome_taxes_contract: "$burdensome_taxes$"
 burdensome_taxes_request: "Esta situação permite que você escolha um resultado"
 burdensome_taxes_desc: "Chegou uma pessoa de uma aldeia remota, suplicando alívio dos impostos que o povo não pode pagar."
 burdensome_taxes_desc_title: "$task_contract_governance_desc_title$"
 tgp_governor_contract_event.0007.t: "Impostos onerosos"
 tgp_governor_contract_event.0007.desc: "Depois de um longo e cansativo dia ouvindo súplicas e queixas — muitas vezes vindas da mesma língua —, avança [Select_CString(village_elder.IsFemale, 'a última suplicante', 'o último suplicante' )], [Select_CString(village_elder.IsFemale, 'uma idosa', 'um idoso' )] vestid[village_elder.Custom('ES_OA')] de forma simples e austera; seu porte é humilde, mas não servil. Um escriba me passa um bilhete indicando que esta pessoa é a chefe [Select_CString(village_elder.IsFemale, 'da chefe', 'do chefe' )] de sua aldeia.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U]", começa, "nossa aldeia é humilde, e sabemos pouco de riqueza e prosperidade. As colheitas têm sido ruins, e os impostos que nos pedem para pagar estão além de nossos parcos meios. Eu lhe suplico: é preciso reduzir nosso fardo, ou então poderemos morrer de fome"."
 tgp_governor_contract_event.0007.a: "Vamos transferir a maior parte do fardo para uma região mais próspera." # (Special governor option)
 tgp_governor_contract_event.0007.b: "Reavalie-os a uma taxa reduzida: eu assumirei total responsabilidade."
 tgp_governor_contract_event.0007.c: "Eu pagarei a diferença, mas no ano que vem depende de você."
 tgp_governor_contract_event.0007.d: "Não será preciso que pagueis, mas os encargos continuarão pendentes até que os quiteis."
 tgp_governor_contract_event.0007.e: "Aqueles que não puderem pagar serão presos e seus bens confiscados."
 task_contract_reward_effect_revise_tax_assessment_desc: "$label_success_standard$"
 task_contract_reward_effect_waive_their_taxes_desc: "$label_success_standard$"
 task_contract_reward_effect_pay_it_yourself_desc: "$label_success_standard$"
 task_contract_reward_effect_delayed_taxes_desc: "$label_success_standard$"
 task_contract_reward_effect_imprison_debtors_desc: "$label_success_standard$"
 unsafe_highways: "Comércio perigoso"
 unsafe_highways_contract: "$unsafe_highways$"
 unsafe_highways_request: "Esta situação permite que você escolha um resultado"
 unsafe_highways_desc: "Os mercadores estão causando alvoroço, alegando que as estradas estão inseguras para viajar e ameaçando buscar novos mercados se o problema não for resolvido."
 unsafe_highways_desc_title: "$task_contract_governance_desc_title$"
 tgp_governor_contract_event.0008.t: "Comércio perigoso"
 tgp_governor_contract_event.0008.desc: "Uma delegação de mercadores com [fearful_merchant.GetName] à frente abarrota meu salão, suas vozes são um clamor de preocupação que exige proteção para seus comboios depois de perder mais um em um ataque de bandidos. "Esta situação é insustentável, [ROOT.Char.Custom('FormOfAddressForLiege')]", proclama seu líder.\n\n"Se nada for feito rapidamente para defender nossos bens e vidas desses selvagens, então não teremos outra opção senão abandonar nossos interesses em [unsafe_highways_destination.GetName] e levar nosso comércio — e as taxas que pagamos por ele — para outro lugar". Ela permanece expectante, após ter sido proferido o ousado ultimato."
 tgp_governor_contract_event.0008.a: "Forneceremos escolta, mas você pagará pelo privilégio." # (Special governor option)
 tgp_governor_contract_event.0008.b: "Entendo. Enviaremos patrulhas para vigiar as estradas."
 tgp_governor_contract_event.0008.c: "Seu ofício é arriscado; não conta com proteção?"
 tgp_governor_contract_event.0008.d: "Seria #EMP uma pena#! que seus impostos precisassem de revisão..."
 tgp_governor_contract_event.0008.e: "Os perigos trazem recompensas; fique, e eu farei valer a pena."
 task_contract_reward_effect_merchant_funded_government_escort_desc: "$label_success_standard$"
 task_contract_reward_effect_send_out_the_patrols_desc: "$label_success_standard$"
 task_contract_reward_effect_talk_them_into_bodyguards_desc: "$label_success_standard$"
 task_contract_reward_effect_threaten_with_sanctions_desc: "$label_success_standard$"
 task_contract_reward_effect_entice_with_promises_desc: "$label_success_standard$"
 dam_in_disrepair: "Dique em mau estado"
 dam_in_disrepair_contract: "$dam_in_disrepair$"
 dam_in_disrepair_request: "Esta situação permite que você escolha um resultado"
 dam_in_disrepair_desc: "Uma barragem em ruínas está deixando os moradores — e os oficiais — do distrito mais do que um pouco nervosos."
 dam_in_disrepair_desc_title: "$task_contract_governance_desc_title$"
 tgp_governor_contract_event.0009.t: "Barragem em mau estado"
 tgp_governor_contract_event.0009.desc: "Uma represa vital em [dam_in_disrepair_destination.GetName] está em estado de grave deterioração, e as consequências podem ser catastróficas se a situação não for tratada prontamente.\n\nNo entanto, isso não seria uma tarefa pequena, e a maior parte do nosso orçamento já está destinada a outras áreas. Para algo mais do que uma solução temporária, devemos encontrar alguma forma de reduzir os custos."
 tgp_governor_contract_event.0009.a: "Mobilize a população local, isentando os pobres e os doentes." # (Special governor option)
 tgp_governor_contract_event.0009.b: "Ponha para trabalhar aqueles que seriam mais afetados pelo seu colapso."
 tgp_governor_contract_event.0009.c: "Os residentes mais ricos devem contribuir de acordo com sua capacidade."
 tgp_governor_contract_event.0009.d: "As riquezas têm pouco valor quando comparadas às vidas: eu pagarei."
 tgp_governor_contract_event.0009.e: "Apropriaremos os recursos de que precisarmos dos comerciantes locais."
