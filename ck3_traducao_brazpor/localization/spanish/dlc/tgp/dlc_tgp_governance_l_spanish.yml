 seditious_storytelling: "Narrativas sediciosas"
 seditious_storytelling_contract: "$seditious_storytelling$"
 seditious_storytelling_request: "Esta situação permite que você escolha um desfecho"
 seditious_storytelling_desc: "[Select_CString(seditious_storyteller.IsFemale, 'Uma narradora', 'Um narrador' )] passou a contar histórias tingidas de dissidência e descontentamento."
 seditious_storytelling_desc_title: "$task_contract_governance_desc_title$"
 tgp_governor_contract_event.0028.t: "Narrativas sediciosas"
 tgp_governor_contract_event.0028.desc: "O último dos peticionários do dia deixa minha presença com gratidão, mas o som esmaecido de sua retirada contida é rapidamente substituído por passos apressados trazendo más notícias.\n\nÉ [concerned_councillor.GetFirstName], com o semblante grave. \"Acabei de receber um relatório #EMP escandaloso#! , [ROOT.Char.Custom('FormOfAddressForLiege')]! Um[seditious_storyteller.Custom('ES_OA')] desses contadores de histórias itinerantes está incitando o povo de [seditious_storytelling_destination.GetName] com histórias de magistrados corruptos e governantes negligentes!\"."
 tgp_governor_contract_event.0028.a: "Deixem-me julgar essas palavras com meus próprios ouvidos."
 tgp_governor_contract_event.0028.a_tt: "Viajar para [seditious_storytelling_destination.GetName] e ouvir as histórias de tal narrador[seditious_storyteller.Custom('ES_XA')]."
 tgp_governor_contract_event.0028.b: "Agora devo me preocupar com meros #EMP artistas#!?"
 tgp_governor_contract_event.0029.t: "Narrativas sediciosas"
 tgp_governor_contract_event.0029.desc: "Sentado despercebido no fundo da plateia, devo admitir que os relatos, no mínimo, subestimavam a situação.\n\nSó os mais simplórios poderiam deixar de perceber o significado da história decididamente mordaz de heróis errantes oprimidos que enfrentam magistrados infames e descaradamente corruptos e soldados com jeito de bandidos, cujo vilão principal soa #EMP sospechosamente#! familiar.\n\nMais preocupante do que as palavras [Select_CString(seditious_storyteller.IsFemale, 'de la narradora', 'del narrador' )] é o entusiasmo obviamente crescente da multidão por elas."
 tgp_governor_contract_event.0029.a: "Que seja feita uma proclamação pública que [seditious_storyteller.GetHerHim] condene por perturbar a ordem pública." # (Special governor option)
 tgp_governor_contract_event.0029.b: "Prendam imediatamente esse idiota insolente!"
 tgp_governor_contract_event.0029.c: "Contrataremos nossos próprios contadores de histórias para tecer uma narrativa nossa."
 tgp_governor_contract_event.0029.d: "Coloquemos guardas em todos os eventos dele(a) para lembrar ao público do seu lugar."
 tgp_governor_contract_event.0029.e: "Organize uma reunião discreta, e talvez eu possa fazê-lo/a entrar em razão."
