 contested_inheritance: "Herança disputada"
 contested_inheritance_contract: "$contested_inheritance$"
 contested_inheritance_request: "Esta situação permite que você escolha um resultado"
 contested_inheritance_desc: "Um notável local faleceu recentemente e seus herdeiros, envolvidos em uma disputa acirrada pela herança, solicitaram que o governo faça a mediação."
 contested_inheritance_desc_title: "$task_contract_governance_desc_title$"
 tgp_governor_contract_event.0034.t: "Herança contestada"
 tgp_governor_contract_event.0034.desc: "Ser um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleTierName|l] é mais do que ser um mero administrador e muitos me consideram uma figura imparcial em assuntos contenciosos.\n\nÉ por isso que uma família importante de [contested_inheritance_destination.GetName] solicitou minha presença para resolver uma disputa de herança especialmente feroz que deixou seus membros amargamente divididos."
 tgp_governor_contract_event.0034.a: "A discórdia em uma família de tanto renome reflete mal sobre a nossa sociedade."
 tgp_governor_contract_event.0034.a_tt: "Viajar a [contested_inheritance_destination.GetName] e pôr fim à disputa."
 tgp_governor_contract_event.0034.b: "Trata-se de um assunto de família e não do Estado."
 tgp_governor_contract_event.0035.t: "Herança contestada"
 tgp_governor_contract_event.0035.desc: "A tensão no ar é palpável enquanto revisamos mais uma vez as reivindicações concorrentes, e cada rodada de debate só serve para complicar ainda mais o assunto.\n\nApesar dos esforços transparentes para fingir cortesia em minha presença, suspeito que, se eu pudesse engarrafar o veneno velado dos herdeiros aspirantes, ele rivalizaria com qualquer veneno em poder."
 tgp_governor_contract_event.0035.a: "A propriedade será responsabilidade de #EMP toda#! família." # (Special governor option)
 tgp_governor_contract_event.0035.b: "Que o membro vivo mais velho da família seja seu custodiante."
 tgp_governor_contract_event.0035.c: "Por uma soma, eu poderia me deixar #EMP persuadir#!…"
 tgp_governor_contract_event.0035.d: "Devemos respeitar os desejos do falecido."
 tgp_governor_contract_event.0035.e: "Devo persuadi-los a resolver isso de uma maneira mais digna."
