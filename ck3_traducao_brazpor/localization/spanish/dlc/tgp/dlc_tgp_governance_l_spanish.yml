 tgp_governor_contract_event.0021.b.failure: "Mais combustível para sua rixa só pode piorar a situação"
 tgp_governor_contract_event.0021.b.toast_success: "Você encontrou provas conclusivas em favor da reivindicação de um dos lados"
 tgp_governor_contract_event.0021.b.toast_failure: "Os registros fragmentários apenas aprofundam o desentendimento entre eles"
 tgp_governor_contract_event.0021.d.success: "Os proprietários consideram sua oferta atraente"
 tgp_governor_contract_event.0021.d.failure: "Sua oferta é recusada categoricamente"
 tgp_governor_contract_event.0021.d.toast_success: "Apelas ao interesse material deles e isso termina em benefício mútuo"
 tgp_governor_contract_event.0021.d.toast_failure: "Sua oferta não diminuiu a força da obsessão deles por propriedades"
 tgp_governor_contract_event.0023.c.success: "Suas táticas investigativas inovadoras dão frutos"
 tgp_governor_contract_event.0023.c.failure: "Os escrivães disfarçados têm um desempenho abaixo do esperado"
 tgp_governor_contract_event.0023.c.toast_success: "Os vendedores fraudulentos foram pegos em flagrante e presos"
 tgp_governor_contract_event.0023.c.toast_failure: "Seus escrivães foram péssimos investigadores e foram facilmente enganados"
 tgp_governor_contract_event.0023.e.success: "Você pega os malfeitores desprevenidos"
 tgp_governor_contract_event.0023.e.failure: "Os falsificadores farejam o perigo e fogem"
 tgp_governor_contract_event.0023.e.toast_success: "A incursão foi um sucesso e os falsificadores foram detidos"
 tgp_governor_contract_event.0023.e.toast_failure: "Os vendedores souberam dos seus planos e fugiram"
 tgp_governor_contract_event.0025.e.success: "Os comerciantes são persuadidos a permanecer aqui"
 tgp_governor_contract_event.0025.e.failure: "Seus argumentos caem em ouvidos surdos"
 tgp_governor_contract_event.0025.e.toast_success: "Influenciados pela sua persuasão, os comerciantes decidiram ficar"
 tgp_governor_contract_event.0025.e.toast_failure: "Os caravaneiros ignoraram seus argumentos e partiram em busca de novas rotas"
 tgp_governor_contract_event.0027.d.success: "Suas gesticulações fazem com que os estrangeiros entendam você"
 tgp_governor_contract_event.0027.d.failure: "Os comerciantes de longe ficam ainda mais confusos"
 tgp_governor_contract_event.0027.d.toast_success: "Com certa dificuldade, você consegue se comunicar com os comerciantes"
 tgp_governor_contract_event.0027.d.toast_failure: "Suas tentativas de comunicação só servem para confundir ainda mais os estrangeiros"
 tgp_governor_contract_event.0029.e.success: "[Select_CString(seditious_storyteller.IsFemale, 'A narradora', 'O narrador' )] demonstra ser receptiv[seditious_storyteller.Custom('ES_OA')] aos seus argumentos"
 tgp_governor_contract_event.0029.e.failure: "Seus esforços são recebidos com uma intransigência teimosa"
 tgp_governor_contract_event.0029.e.toast_success: "Comovid[seditious_storyteller.Custom('ES_OA')] por sua eloquência, [Select_CString(seditious_storyteller.IsFemale, 'a narradora', 'o narrador' )] consentiu em amenizar suas histórias"
 tgp_governor_contract_event.0029.e.toast_failure: "[Select_CString(seditious_storyteller.IsFemale, 'A narradora', 'O narrador' )] desdenhou seus apelos e continua a inflamar as paixões populares"
 tgp_governor_contract_event.0031.a.success: "Seu discurso digno acalma as preocupações da multidão"
 tgp_governor_contract_event.0031.a.failure: "Os medos dos camponeses se mostram grandes demais para serem apaziguados"
 tgp_governor_contract_event.0031.a.toast_success: "O povo se tranquilizou com seu discurso circunspecto"
 tgp_governor_contract_event.0031.a.toast_failure: "Tomado pelo medo de uma retaliação divina, ninguém compareceu à reunião"
 tgp_governor_contract_event.0031.d.success: "Seus esforços ponderados e confiáveis ajudam a acalmar o povo"
 tgp_governor_contract_event.0031.d.failure: "As pessoas ficam ainda mais aterrorizadas quando os danos são revelados"
 tgp_governor_contract_event.0031.d.toast_success: "Você avalia os danos e começa os reparos e a reconstrução"
 tgp_governor_contract_event.0031.d.toast_failure: "Revelar os danos só serviu para deixar o povo ainda mais assustado"
 tgp_governor_contract_event.0033.d.success: "O consórcio recupera seu lugar de direito"
 tgp_governor_contract_event.0033.d.failure: "Tão ineptos quanto foram ao perder o mercado, não conseguem recuperá-lo"
 tgp_governor_contract_event.0033.d.toast_success: "Com sua ajuda, o consórcio conseguiu retomar o controle do mercado"
 tgp_governor_contract_event.0033.d.toast_failure: "Seja lá o que a associação tenha tentado, isso não lhes devolveu o lugar"
 tgp_governor_contract_event.0035.c.success: "Os herdeiros disputam, literalmente, o teu favor"
 tgp_governor_contract_event.0035.c.failure: "Ninguém está inclinado a apelar à sua avareza"
 tgp_governor_contract_event.0035.c.toast_success: "As ofertas vieram rápidas e furiosas e, sem dúvida, em seu benefício"
 tgp_governor_contract_event.0035.c.toast_failure: "Nenhum dos herdeiros em potencial foi receptivo à sua sugestão"
 tgp_governor_contract_event.0035.e.success: "A família é persuadida a continuar de maneira razoável e comedida"
 tgp_governor_contract_event.0035.e.failure: "Suas recomendações são ouvidas e ignoradas"
 tgp_governor_contract_event.0035.e.toast_success: "A pressão imposta pela sua postura serena os levou a um acordo"
 tgp_governor_contract_event.0035.e.toast_failure: "Seu sábio conselho é recebido com gratidão e descartado imediatamente"
