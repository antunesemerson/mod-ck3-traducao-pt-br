 monopoly_in_the_marketplace: "Monopólio no mercado"
 monopoly_in_the_marketplace_contract: "$monopoly_in_the_marketplace$"
 monopoly_in_the_marketplace_request: "Esta situação permite que você escolha um resultado"
 monopoly_in_the_marketplace_desc: "Um mercador poderoso está dominando o mercado e a associação local de mercadores está exigindo que o estado intervenha."
 monopoly_in_the_marketplace_desc_title: "$task_contract_governance_desc_title$"
 tgp_governor_contract_event.0032.t: "Monopólio no Mercado"
 tgp_governor_contract_event.0032.desc: ""… e se isso continuar, as consequências serão #EMP catastróficas#! para nosso sustento", conclui o chefe da delegação.\n\nSegundo os argumentos apresentados, um de seus rivais em [monopoly_in_the_marketplace_destination.GetName] conseguiu, às escondidas, assumir o controle do seu mercado principal e nega acesso a qualquer membro da associação, relegando-os a locais menos populares e profundamente pouco lucrativos."
 tgp_governor_contract_event.0032.a: "Vou cuidar pessoalmente deste assunto."
 tgp_governor_contract_event.0032.a_tt: "Viajar a [monopoly_in_the_marketplace_destination.GetName] e resolver os assuntos do mercado como mais lhe convier."
 tgp_governor_contract_event.0032.b: "Não ouvi nada mais incomum do que um mercador bem-sucedido."
 tgp_governor_contract_event.0033.t: "Monopólio no mercado"
 tgp_governor_contract_event.0033.desc: "Embora raramente sejam exemplos de honestidade, as palavras dos mercadores parecem ser verdadeiras nesta ocasião.\n\nÀ medida que vagamos discretamente de uma barraca a outra, até agora todas foram ostentadas de forma ousada com a mesma marca, identificando-as como propriedade coletiva de um único proprietário.\n\nA última das barracas à qual nos aproximamos é a maior e mais elaborada delas, e [merchant_magnate.Custom('ES_ElLa')] [merchant_magnate.GetWomanMan] que a preside majestosamente sorri orgulhos[merchant_magnate.Custom('ES_OA')]. Est[merchant_magnate.Custom('ES_EA')], obviamente, é [merchant_magnate.Custom('ES_ElLa')] rival de quem falam."
 tgp_governor_contract_event.0033.a: "Que nenhum comerciante possa possuir mais de uma banca." # (Special governor option)
 tgp_governor_contract_event.0033.b: "Amplie o mercado e leiloe apenas as novas barracas para os membros da associação."
 tgp_governor_contract_event.0033.c: "[merchant_magnate.GetSheHe|U] pode ficar, desde que esteja dispost[merchant_magnate.Custom('ES_OA')] a #EMP pagar#! pelo privilégio."
 tgp_governor_contract_event.0033.d: "Apoiaremos seus concorrentes e deixaremos a natureza seguir seu curso."
 tgp_governor_contract_event.0033.e: "Alguém tão próspero deve ser culpado de #EMP algo#!. Confiscai suas mercadorias!"
