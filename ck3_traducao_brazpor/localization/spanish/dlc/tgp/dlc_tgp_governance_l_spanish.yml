 task_contract_reward_effect_arrest_storyteller_desc: "$label_success_standard$"
 task_contract_reward_effect_encourage_rival_storytellers_desc: "$label_success_standard$"
 task_contract_reward_effect_intimidate_audience_desc: "$label_success_standard$"
