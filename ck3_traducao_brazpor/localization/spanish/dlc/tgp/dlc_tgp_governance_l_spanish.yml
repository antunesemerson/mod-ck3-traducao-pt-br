 crumbling_bridge: "Ponte em ruínas"
 crumbling_bridge_contract: "$crumbling_bridge$"
 crumbling_bridge_request: "Esta situação permite que você escolha um resultado"
 crumbling_bridge_desc: "Uma ponte importante desabou, prejudicando gravemente o tráfego local."
 crumbling_bridge_desc_title: "$task_contract_governance_desc_title$"
 tgp_governor_contract_event.0024.t: "Ponte em ruínas"
 tgp_governor_contract_event.0024.desc: "Uma das pedras angulares das responsabilidades de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleTierName|l] é a manutenção das infraestruturas essenciais, o que torna as notícias do recente desabamento de uma ponte em [crumbling_bridge_destination.GetName] algo bastante preocupante.\n\nIsso não só poderia afetar o tráfego e o comércio, como também pode minar a confiança em minha administração."
 tgp_governor_contract_event.0024.a: "Diga a eles que se preparem para minha chegada. Estou a caminho."
 tgp_governor_contract_event.0024.a_tt: "Viajar a [crumbling_bridge_destination.GetName] e lidar com as consequências."
 tgp_governor_contract_event.0024.b: "Sempre há outra ponte: só precisam se aventurar um pouco mais longe."
 tgp_governor_contract_event.0025.t: "Ponte desmoronada"
 tgp_governor_contract_event.0025.desc: "Ao contemplar os restos da ponte em ruínas, a situação é sombria. Enquanto os trabalhadores se esforçam para limpar os destroços, a multidão de mercadores e viajantes continua crescendo à medida que chegam mais pessoas que desconheciam essa interrupção inesperada em seus planos de viagem.\n\nÀ medida que as mercadorias vão se estragando e os ânimos se exaltam entre os que ficaram retidos, as consequências deste incidente podem ter um alcance amplo se eu não lidar com a situação com destreza."
 tgp_governor_contract_event.0025.a: "As estradas são as artérias da nação: farei com que o exército ajude a reconstruí-la." # (Special governor option)
 tgp_governor_contract_event.0025.b: "Use todos os recursos para construir uma nova ponte o mais rápido possível."
 tgp_governor_contract_event.0025.c: "Que se estabeleça uma balsa temporária até que a ponte seja reconstruída."
 tgp_governor_contract_event.0025.d: "A pressa só resultará em outro acidente. Construa uma substituição sólida."
 tgp_governor_contract_event.0025.e: "Aproveitemos esta oportunidade para convencer os mercadores encalhados a abrir suas lojas aqui."
