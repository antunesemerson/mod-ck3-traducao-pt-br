 quaking_in_panic: "Tremendo de pânico"
 quaking_in_panic_contract: "$quaking_in_panic$"
 quaking_in_panic_request: "Esta situação permite que você escolha um resultado"
 quaking_in_panic_desc: "Várias aldeias foram atingidas por um terremoto e a agitação resultante ameaça a ordem pública."
 quaking_in_panic_desc_title: "$task_contract_governance_desc_title$"
 tgp_governor_contract_event.0030.t: "Tremendo de pânico"
 tgp_governor_contract_event.0030.desc: "Estou absort[ROOT.Char.Custom('ES_OA')] em uma conversa com [my_councillor.GetFirstName] quando [alarmed_councillor.GetFirstName] irrompe no recinto com uma urgência pouco habitual e uma agitação visível.\n\n"Um mensageiro de [quaking_in_panic_destination.GetName], [ROOT.Char.Custom('FormOfAddressForLiege')]! Houve um terremoto e o campesinato o tomou como um mau presságio, afirmando que é um sinal de desagrado divino!"."
 tgp_governor_contract_event.0030.a: "O pânico, como um incêndio, é difícil de extinguir se for permitido que se espalhe."
 tgp_governor_contract_event.0030.a_tt: "Viajar para [quaking_in_panic_destination.GetName] e acalmar suas preocupações."
 tgp_governor_contract_event.0030.b: "Dou pouca atenção ao clamor dos camponeses."
 tgp_governor_contract_event.0031.t: "Tremendo de pânico"
 tgp_governor_contract_event.0031.desc: "A aldeia está em um estado evidente de intranquilidade quando chego, os camponeses se juntam ao redor da minha escolta com súplicas lamuriosas para aplacarmos a ira dos céus antes que outra catástrofe lhes aconteça.\n\nQuando lanço um olhar sobre a aldeia atrás deles, as paredes rachadas e as portas tortas de suas casas testemunham a origem de seus medos."
 tgp_governor_contract_event.0031.a: "Organizar uma reunião pública para tranquilizar o povo." # (Special governor option)
 tgp_governor_contract_event.0031.b: "Posicionar um pequeno destacamento de tropas para reprimir a agitação."
 tgp_governor_contract_event.0031.c: "Fazer com que os anciãos da aldeia expressem sua confiança de que o perigo já passou."
 tgp_governor_contract_event.0031.d: "Realizar uma revisão minuciosa dos danos e prometer mais ajuda."
 tgp_governor_contract_event.0031.e: "Realocar os mais afetados e consolidar a população da região."
