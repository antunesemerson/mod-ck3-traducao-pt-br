 confusion_of_tongues: "Uma confusão de línguas"
 confusion_of_tongues_contract: "$confusion_of_tongues$"
 confusion_of_tongues_request: "Esta situação permite que você escolha um desfecho"
 confusion_of_tongues_desc: "Um navio mercante estrangeiro naufragou em nossas costas e nenhum dos sobreviventes fala nossa língua."
 confusion_of_tongues_desc_title: "$task_contract_governance_desc_title$"
 tgp_governor_contract_event.0026.t: "Uma confusão de línguas"
 tgp_governor_contract_event.0026.desc: "É compreensível que comerciantes de terras distantes sejam atraídos pela prosperidade de tão grande [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip|l], que viajem distâncias enormes e enfrentem incontáveis perigos em busca de riqueza material.\n\nNo entanto, os perigos se mostram grandes demais para alguns infelizes, como acabou de acontecer em [confusion_of_tongues_destination.GetName]. Disseram-me que uma embarcação estrangeira está destroçada em nossas costas, e que o intérprete da tripulação não está entre os sobreviventes.\n\nA magistratura local está completamente sem saber como lidar com os estrangeiros molhados e confusos."
 tgp_governor_contract_event.0026.a: "O trabalho de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleTierName|l] nunca termina."
 tgp_governor_contract_event.0026.a_tt: "Viajemos a [confusion_of_tongues_destination.GetName] e encontremos os comerciantes estrangeiros."
 tgp_governor_contract_event.0026.b: "Isso parece problemático: apenas deixe-os onde estão."
 tgp_governor_contract_event.0027.t: "Uma confusão de línguas"
 tgp_governor_contract_event.0027.desc: "Quando eu chego, fica claro que o magistrado já não sabe o que fazer, exausto e exasperado em igual medida. "Nem um só deles entende uma palavra do que estou dizendo!", ele lamenta. "E toda vez que tentamos movê-los, eles reagem como se fôssemos bandidos!".\n\nNas proximidades, vejo os comerciantes náufragos, agrupados em posição defensiva ao redor do que restou de suas mercadorias; seus guardas apertam nervosamente os punhos de suas armas."
 tgp_governor_contract_event.0027.a: "Montem algumas tendas e informem a capital: eles encontrarão um intérprete." # (Special governor option)
 tgp_governor_contract_event.0027.b: "Volte e veja se há alguém no mercado que os entenda."
 tgp_governor_contract_event.0027.c: "Seu navio naufragou em #EMP nuestras#! costas, o que significa que seus bens foram confiscados."
 tgp_governor_contract_event.0027.d: "As palavras podem ter nos falhado, mas posso tentar me comunicar por gestos."
 tgp_governor_contract_event.0027.e: "Tirem-nos daqui imediatamente e usem força, se necessário."
 tgp_governor_contract_event.0027.f: "$epidemic_events.5902.a$"
