 task_contract_reward_effect_temporary_substitute_desc: "$label_success_standard$"
 task_contract_reward_effect_ferry_crossing_desc: "$label_success_standard$"
 task_contract_reward_effect_slower_replacement_desc: "$label_success_standard$"
 task_contract_reward_effect_settle_caravans_desc: "$label_success_standard$"
