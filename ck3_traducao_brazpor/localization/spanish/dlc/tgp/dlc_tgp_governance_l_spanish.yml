 fraud_in_broad_daylight_desc: "O mercado aqui está cheio de mercadorias falsificadas, e os compradores enganados estão indignados."
 fraud_in_broad_daylight_desc_title: "$task_contract_governance_desc_title$"
 tgp_governor_contract_event.0022.t: "Fraude em plena luz do dia"
 tgp_governor_contract_event.0022.desc: "O baque de uma caixa largada sem cerimônia no chão quebra minha concentração e me tira do trabalho. [reporting_councillor.GetFirstName] permanece ao seu lado.\n\n“Chegaram mais provas, meu [ROOT.Char.GetLadyLord|l]. Desta vez são frascos de perfume cheios de terra.”\n\nNos mercados de [fraud_in_broad_daylight_destination.GetName] têm proliferado mercadorias falsificadas."
 tgp_governor_contract_event.0022.a: "Isso exige uma investigação."
 tgp_governor_contract_event.0022.a_tt: "Viajar para [fraud_in_broad_daylight_destination.GetName] e restaurar a retidão ao mercado."
 tgp_governor_contract_event.0022.b: "Esses clientes não sabem de nada."
 tgp_governor_contract_event.0023.t: "Fraude em plena luz do dia"
 tgp_governor_contract_event.0023.desc: "Apesar de esforços vigorosos, identificar os falsificadores está se mostrando muito mais difícil do que eu esperava.\n\nOs comerciantes legítimos, uma vez que esgotam seu estoque, estão alugando seus espaços a forasteiros pelo restante do dia, permitindo que os golpistas distribuam seus produtos falsificados e desapareçam sem deixar rastro."
 tgp_governor_contract_event.0023.a: "Revistem todos os que estão no mercado e prendam os suspeitos." # (Special governor option)
 tgp_governor_contract_event.0023.b: "Ofereça uma recompensa por informações."
 tgp_governor_contract_event.0023.c: "Envie nossos escrivães disfarçados de compradores."
 tgp_governor_contract_event.0023.d: "Deixem que os comerciantes cuidem disso."
 tgp_governor_contract_event.0023.e: "Façam uma batida no mercado ao meio-dia."
