 tgp_governor_contract_event.2000.t: "$missing_equipment$"
 tgp_governor_contract_event.2000.desc: "Já fazem #EMP semanas#! desde que deveria ter chegado a última remessa de novos equipamentos. Ainda não me foi informado onde ela pode estar.\n\nA maioria das espadas, bestas, flechas e armaduras é fabricada nas oficinas de [capital_location.GetNameNoTooltip], que empregam milhares de pessoas. Só eles podem fornecer as quantidades de que precisamos.\n\nSem esses envios, não podemos equipar os novos recrutas nem substituir armas e armaduras gastas."
 tgp_governor_contract_event.2000.a: "Vamos visitar as oficinas."
 tgp_governor_contract_event.2000.a_tt: "Viajar às oficinas e resolver o problema pessoalmente"
 tgp_governor_contract_event.2000.b: "Sempre eu poderia comprar o equipamento."
 tgp_governor_contract_event.2000.c: "Envie uma missiva a [capital_location.GetNameNoTooltip]. Isso será resolvido eventualmente."
 tgp_governor_contract_event.2001.t: "$missing_equipment$: A Oficina"
 tgp_governor_contract_event.2001.desc: "[foreman.Custom('ES_ElLa')|U] gerente da oficina #EMP por fin#! chega e me saúda com uma reverência profunda e formal.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], que visita mais inesperada. Examinei os registros, conforme solicitado, e parece que um erro administrativo pode estar por trás da falta de remessas para [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]. Um erro lamentável. É claro que redirecionaremos nossa próxima entrega para vós"."
 tgp_governor_contract_event.2001.a: "Um erro #EMP administrativo#!?! [court_relation.GetFirstNameNoTooltip] ficará sabendo disso…"
 tgp_governor_contract_event.2001.a.tt: "Você consegue convencer [foreman.Custom('ES_AlAla')|U] gerente com a ameaça de falar sobre isso com [court_relation.GetShortUIName] na corte imperial"
 tgp_governor_contract_event.2001.b: "Certamente uma compensação extra se faz necessária?"
 tgp_governor_contract_event.2001.c: "Seria uma pena que este incidente viesse a público, não?"
 tgp_governor_contract_event.2001.d: "Muito bem. Apenas certifique-se de que seja assim."
 tgp_governor_contract_event.2001.tt_success_desc: "O capataz está convencido[foreman.Custom('ES_AlAla')|U] gerente"
 tgp_governor_contract_event.2001.tt_success: "Consegue convencer [foreman.Custom('ES_AlAla')|U] o encarregado a lhe fornecer mais"
 tgp_governor_contract_event.2001.tt_failure_desc: "[foreman.Custom('ES_ElLa')|U] gerente #bold não#! fica convencid[foreman.Custom('ES_OA')]"
 tgp_governor_contract_event.2001.tt_failure: "Você não consegue convencer [foreman.Custom('ES_AlAla')|U] gerente a fazer mais do que o prometido"
 tgp_governor_contract_event.2002.t: "$missing_equipment$: sucesso"
 tgp_governor_contract_event.2002.desc: "Minhas ameaças pouco sutis são rapidamente recompensadas com uma reverência ainda mais profunda.\n\n"É claro, meu [ROOT.Char.GetLadyLord|l]. Sua avaliação está completamente correta. Tenho certeza de que podemos chegar a um acordo. Talvez já tenha alguma sugestão?"."
 tgp_governor_contract_event.2002.a: "Assegurem também as entregas futuras."
 tgp_governor_contract_event.2002.b: "Fornecei-me vossos #EMP dos#! próximos envios."
 tgp_governor_contract_event.2002.c: "Uma compensação monetária é o adequado."
 tgp_governor_contract_event.2002.d: "Enviem-me o melhor equipamento que tiverem disponível."
 tgp_governor_contract_event.2003.t: "$missing_equipment$: fracasso"
 tgp_governor_contract_event.2003.desc: "[foreman.Custom('ES_ElLa')|U] o feitor faz uma pausa por um momento e franze a testa.\n\n«#EMP Vos#! não sois [Select_CString(ROOT.Char.IsFemale, 'la única', 'el único' )] comandante que precisa de equipamento. Já fiz mais do que o suficiente ao fornecer-vos nossa próxima remessa. Uma remessa esperada em outro lugar, devo dizer. Não desafiem a sorte, #EMP mi [ROOT.Char.GetLadyLord|l]#!».\n\n[Select_CString(foreman.Char.IsFemale, 'La mujer', 'El hombre' )] se vira e vai embora."
 tgp_governor_contract_event.2003.a: "#EMP Sea.#!"
 lines_in_the_soil: "Linhas na terra"
 lines_in_the_soil_contract: "$lines_in_the_soil$"
 lines_in_the_soil_request: "Esta situação permite que você escolha um desfecho"
 lines_in_the_soil_desc: "Um par de grandes proprietários de terras está bombardeando implacavelmente a magistratura com queixas sobre uma disputa de propriedade."
 lines_in_the_soil_desc_title: "$task_contract_governance_desc_title$"
 tgp_governor_contract_event.0020.t: "Linhas no solo"
 tgp_governor_contract_event.0020.desc: "A vida cotidiana de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleTierName|l] implica uma quantidade significativa de papelada, mas está claro que algo está errado quando quase todas as correspondências de hoje vêm de [lines_in_the_soil_destination.GetName].\n\nAo analisar os relatórios, parece que dois proprietários de terras locais entraram em conflito por uma propriedade espremida entre suas terras e, como consequência, transformaram o escritório da magistratura local em um campo de batalha jurídico."
 tgp_governor_contract_event.0020.a: "Acho que eu #EMP vendría#! faria bem sair do escritório."
 tgp_governor_contract_event.0020.a_tt: "Viajar a [lines_in_the_soil_destination.GetName] e mediar na disputa."
 tgp_governor_contract_event.0020.b: "Deixemos que suas petições acumulem poeira e eles logo se cansarão."
 tgp_governor_contract_event.0021.t: "Linhas na terra"
 tgp_governor_contract_event.0021.desc: "Depois de horas intermináveis de discussão, debate e vitriol mal disfarçado, só posso concluir que os ilustres indivíduos no centro desta disputa são uns #EMP zoquetes#! teimosos e desmiolados.\n\nÉ óbvio que este é apenas o capítulo mais recente de uma longa história de queixas, e nenhum dos dois está disposto a ceder sequer um punhado de terra ao outro.\n\nSe quero ter alguma esperança de pôr fim a essa contenda incessante, não me resta opção senão resolvê-la como juiz, não como árbitro[ROOT.Char.Custom('ES_OA')]."
 tgp_governor_contract_event.0021.a: "Que a terra seja remensurada e o resultado será definitivo." # (Special governor option)
 tgp_governor_contract_event.0021.b: "Consulte os arquivos para descobrir quem tem a melhor reivindicação."
 tgp_governor_contract_event.0021.c: "Dividir a propriedade igualmente e pronto."
 tgp_governor_contract_event.0021.d: "E se eu me oferecesse para comprar a terra?"
 tgp_governor_contract_event.0021.e: "Na ausência de um acordo, a terra se torna propriedade do Estado."
