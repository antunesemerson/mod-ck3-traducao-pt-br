 friend_flagellating_together: "Terceiro Impacto"
 rival_kinkshamed_my_flagellating: "A Peste da Guerra"
 rival_kinkshamed_my_flagellating_corresponding: "[pleading_vassal.GetName|U] se ajoelha, tremendo.

"Meu senhor[ROOT.Char.Custom('ES_XA')], duas pragas me afligem. A de [epidemic_scope.GetName|l] devora meu povo, e agora [attacking_vassal.GetName] vem tomar minhas terras. Não posso lutar contra ambas."

[pleading_vassal.GetSheHe|U] deposita um pequeno cofre de ouro — tudo que conseguiu trazer.

"Eu imploro. Ajude-me a encerrar esta guerra antes que nenhum dos domínios sobreviva.""
 ragnarok: "Pagarei com prazer para acabar com essa loucura."
 the_second_coming: "Como ousa trazer a praga de [epidemic_scope.GetNameNoTooltip|l] à #EMP mi#! porta!"
 revelation: "Guardas! Prendam com #EMP muito cuidado#! a [pleading_vassal.GetFirstNameNoTooltip] e depois, com um #EMP cuidado ainda maior#!, lavem tudo o que ele/a tocou!"
 the_day_of_judgement: "É possível dialogar com [attacking_vassal.Custom('ES_ElLa')] [attacking_vassal.GetTitledFirstNameNoTooltip|l]."
 the_coming_of_the_messiah: "[attacking_vassal.GetFirstNameNoTooltip] foi convencido a encerrar [vassal_war.GetName|l]"
 the_coming_of_the_seven_suns: "[vassal_war.GetName|l] continua"
 frashokereti: "[pleading_vassal.GetFirstNameNoTooltip] espalhou a [epidemic_scope.GetName|l]!"
 the_endtimes: "#color_red Se a guerra não for resolvida rapidamente, pode haver um preço a pagar...#!"
 the_end_of_days: "A Peste da Guerra: Consequências"
 the_apocalypse: "Enquanto a [vassal_war.GetName|l] não termina nunca. Os homens morrem pela terra e a terra lhes devolve em montes.\n\nAgora a onda de [epidemic_scope.GetName|l] se espalha mais rápido, alimentada pelos cadáveres em decomposição, pelas aldeias vazias e pela loucura dos cercos. Nenhum lado vence. Todos morrem."
 doomsday: "Oh querido."
 third_impact: "Inimigo Invisível"
 epidemic_events.2001.t: ""Nossos soldados caem sem lutar. A epidemia de [epidemic_scope.GetName|l] matou mais do que qualquer espada".\n\n[marshal.GetName] fala com dureza, mas está certo. De [first_epidemic_province.GetName] a [second_epidemic_province.GetName], os quartéis estão vazios. Não restam guerreiros — apenas camponeses e peste."
 epidemic_events.2001.desc: "[pleading_vassal.GetName|U] se ajoelha, tremendo.

"Um soldado é como um camponês. Seu único propósito na vida é morrer!"

[pleading_vassal.GetSheHe|U] deposita um pequeno cofre de ouro — tudo que conseguiu trazer.

"Frasco Medicinal"
 epidemic_events.2001.a: "Passo em frente ao estudo de [physician.GetName]; o medo de um surto de [epidemic_scope.GetName|l] nunca está longe. Suas estranhas ferramentas geralmente não oferecem consolo, mas hoje, um frasco pintado chama minha atenção.\n\n\"Isso me protege\", ele diz, embalando-o. \"Uma maravilha do artesanato e um escudo contra a doença\"."
 epidemic_events.2001.b: "Certamente eu sou quem deveria ser protegido?"
 epidemic_events.2001.b.desc: "[physician.GetFirstName] se desfaz do frasco."
 epidemic_events.2001.c: "[physician.GetFirstName] permanece não convencido."
 epidemic_events.2001.c.success: "Este frasco salva vidas? Me dê!"
 epidemic_events.2001.c.failure: "Você arranca [medicine_jar.GetName] de [physician.GetFirstName]"
 epidemic_events.2001.epidemic_spread.t: "O frasco quebra!"
 epidemic_events.2001.danger: "Se é o que você diz. Por favor, continue."
 epidemic_events.2002.t: "Mania da Dança"
 epidemic_events.2002.desc: "[Select_CString( dance_victim.IsFemale, 'Uma camponesa', 'Um camponês' )] se contorce no meu pátio; seus pés golpeiam a terra com um ritmo incessante e enlouquecedor.

"Perdoai[dance_victim.GetHerHim], meu senhor[ROOT.Char.Custom('ES_XA')], [dance_victim.GetSheHe] não consegue parar!""
 epidemic_events.2002.a: "Dançar sem descanso? #EMP Excelente!#!"
 epidemic_events.2003.t: "Toda dança eventualmente acaba. #EMP Não é mesmo?#!"
 epidemic_events.2003.desc: "Peguem umas cordas e amarrem[dance_victim.GetHerHim]!"
 epidemic_events.2003.a: "Pelo [ROOT.Char.GetFaith.HighGodName] eu vou te expulsar, demônio!"
 epidemic_events.2003.a.flavor: "$travel_danger_prefix$ Sangue na Porta"
 epidemic_events.2003.b: "Vermelho é a única cor presente em [epidemic_location.GetName]. Tosse é o único som. Encorajamos nossos montes a continuarem, mas posso ver [companion.GetTitledFirstName|l] parecendo pálida, seus lábios tão apertados que perderam todo o fluxo sanguíneo.\n\n\"Ajuda...\" um dos corpos que havíamos confundido com cadáveres se move lentamente, dolorosamente, seu corpo [sick_peasant.Custom('disease_desc_short')]."
 epidemic_events.2003.b.flavor: "\"Não posso fechar os olhos para isso.\""
 epidemic_events.2003.c: "\"[companion.GetFirstNameNoTooltip], você pode ajudá-los.\""
 epidemic_events.2003.c.flavor: "\"Não temos tempo para isso.\""
 epidemic_events.2005.t: "[companion.GetShortUIName] adoece"
 epidemic_events.2005.desc: "$travel_danger_prefix$ Carniça"
 epidemic_events.2005.a: "Nossas reservas de água estão acabando quando entramos em [epidemic_location.GetName]. A vila, aparentemente deserta, tem um poço bonito bem no centro, e conduzimos nossas montarias até ele.\n\nPouco depois, fica claro por que este lugar está deserto.\n\nHá corpos espalhados pelo chão, [sick_peasant.Custom('disease_desc_short')], e aves carniceiras circulam sobre suas cabeças pálidas. Um espetáculo lúgubre."
 epidemic_events.2005.a.success: "Li algo sobre água contaminada..."
 epidemic_events.2005.a.failure: "Água! #EMP Finalmente!#!"
 epidemic_events.2005.b: "Você adoece"
 epidemic_events.2005.b.success: "Devemos seguir em frente."
 epidemic_events.2005.b.failure: "Suposições de Sanidade"
 epidemic_events.2005.c: "Este personagem percebeu que os aldeões adoeceram depois de beber de um poço infectado."
 epidemic_events.2006.t: "Suprimentos de Água Escassos"
 epidemic_events.2006.desc: "[Select_CString( dance_victim.IsFemale, 'Uma camponesa', 'Um camponês' )] se contorce no meu pátio; seus pés golpeiam a terra com um ritmo incessante e enlouquecedor.

"Arremessei um cadáver por cima das muralhas do reduto de [flingee.GetName]"
 epidemic_events.2006.a: "você arremessou um cadáver por cima das muralhas da posse de [flingee.GetName]"
 epidemic_events.2006.b: "[owner.GetName] arremessou um cadáver por cima das muralhas da posse de [flingee.GetName]"
 epidemic_events.2006.c: "Um cadáver foi lançado em mim"
 epidemic_events.2006.d: "[flingee.GetName] carregou um corpo em uma catapulta e o lançou em meu domínio"
 epidemic_events.3000.t: "[flingee.GetName] carregou um corpo em uma catapulta e o lançou em seu domínio"
 epidemic_events.3000.desc: "[flingee.GetName] carregou um cadáver em uma catapulta e o lançou contra a posse de [owner.GetName]"
 epidemic_events.3000.a: "o chuveiro de carne"
 epidemic_events.3000.b: "[flinger.GetName] lançou um cadáver em meu domínio, reduzindo-o a um chuveiro de sangue e vísceras"
 epidemic_events.3000.c: "[flinger.GetName] lançou um cadáver em seu domínio, reduzindo-o a um chuveiro de sangue e vísceras"
 epidemic_events.3000.b.sick: "[flinger.GetName] lançou um cadáver no domínio de [owner.GetName], reduzindo-o a uma chuva de sangue e vísceras"
 epidemic_events.3010.t: "Faça Alguma Coisa!"
 epidemic_events.3010.desc: "Outro relatório sombrio de [infected_county.GetName].\n\n[church_person.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me entrega. “O povo exige ação!”, gesticula furiosamente. “Purguem as bestas que espalham este surto de [epidemic.GetName|l]! [ROOT.Char.GetFaith.HighGodName] o quer!”.\n\nLanço um olhar ao pergaminho. Os olhos dele brilham com propósito. Os meus… com dúvida."
 epidemic_events.3010.a: "Sabe, esses ratos parecem sujos o bastante..."
 epidemic_events.3010.b: "Os gatos estão #EMP em todo lugar.#! Eles devem ser os culpados."
 epidemic_events.3010.b.sick: "Os cães estão constantemente cobertos de sujeira. Livre-se deles!"
 epidemic_events.3010.c: "Devemos abater as ovelhas."
 humour_knowledge_modifier: "Não há necessidade."
 humour_knowledge_modifier_desc: "Tranque as Portas!"
 no_water_modifier: "[courtier.Custom2('MyCharacterIntroduction', ROOT.Char)|U] irrompe, com olhos esbugalhados e os braços cheios de [ROOT.Char.Custom('GetWritingMaterial')].\n\n\"Meu [ROOT.Char.Custom('FormOfAddressForLiege')], [epidemic_county.GetNameNoTier] está se afogando em cadáveres! As ruas estão tomadas pela morte!\", e joga as cartas com força. Eu examino a confusão frenética.\n\nDa última vez que soube, o surto em [epidemic_scope.GetName|l] estava sob controle…"
 no_water_modifier_desc: "\"Feche tudo! Feche #EMP tudo!#!\""
 ce1_flung_corpse: "Confio naqueles que estão encarregados de [epidemic_county.GetName]."
 ce1_flung_corpse_desc: ""Você não acha que já tenho coisas suficientes para me preocupar, [courtier.Custom2('InsultNoun', ROOT.Char)]?!"."
 ce1_flung_corpse_desc_second_perspective: "É melhor enviar algum auxílio enquanto o problema ainda está apenas começando."
 ce1_flung_corpse_desc_third_perspective: "Eles terão que se virar."
 ce1_corpse_flung_at_me: "O Silêncio da Costa"
 ce1_corpse_flung_at_me_desc: "Enquanto caminhamos, [steward.GetFirstName] me faz um discurso sombrio sobre a epidemia que se espalha por [coastal_province.GetName]. Ao longe, vemos os corpos empilhados ao longo da costa e um barco abandonado encalhado perto deles. Quando me viro para [steward.GetFirstNameNoTooltip], uma expressão curiosa começa a surgir em seu rosto.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], e se...", começa [steward.GetFirstNameNoTooltip], "e se simplesmente fizéssemos desses corpos um problema inexistente?"\n\nBrevemente desconcertad[ROOT.Char.Custom('ES_OA')], começo lentamente a desvendar o plano. Afinal, o barco estava abandonado, e esses corpos precisam ser descartados de uma forma ou de outra..."
 ce1_corpse_flung_at_me_desc_second_perspective: "Para onde será que essa água flui, eu me pergunto?"
 ce1_corpse_flung_at_me_desc_third_perspective: "Talvez possamos fazer deste navio o problema de #EMP outra pessoa...#!"
 ce1_meat_shower: "\"Carregue-o e deixe-o à deriva.\""
 ce1_meat_shower_desc: "O barco nunca mais é visto"
 ce1_meat_shower_desc_second_perspective: "O barco encalha novamente alguns dias depois"
 ce1_meat_shower_desc_third_perspective: "O barco afunda, e os corpos voltam a encalhar na costa"
 epidemic_events.5000.t: "Eles merecem ritos funerários adequados."
 epidemic_events.5000.desc: "Bem, pelo menos o barco parece navegável..."
 epidemic_events.5000.a: "Mãos Curativas"
 epidemic_events.5000.b: "Lama e miséria se agarram às ruas de [location.GetName]... e [Select_CString( peasant.IsFemale, 'a camponesa', 'o camponês' )] que se atira diante do meu cavalo aperta uma criança frágil.

"Meu [ROOT.Char.Custom('FormOfAddressForLiege')], por favor, tenha piedade. A peste levou tudo.""
 epidemic_events.5000.c: "\"Tirem esse #EMP negócio#! de perto de mim!\""
 epidemic_events.5000.d: "Bem, duvido que isso ajude, mas..."
 epidemic_events.5000.e: "Os camponeses acreditando que o toque real cura têm seus benefícios e desvantagens..."
 epidemic_events.5001.t: "[Select_CString( child.IsFemale, 'A menina', 'O menino' )] é curado milagrosamente"
 epidemic_events.5001.desc: "A infecção permanece, mas eles parecem mais felizes"
 epidemic_events.5001.a: "[Select_CString( child.IsFemale, 'A menina', 'O menino' )] piora"
 epidemic_events.5001.b: "Apenas continue se movendo, não os olhe nos olhos..."
 epidemic_events.5001.c: "A Maré Humana"
 epidemic_events.5001.d: "Um rugido, um estrondo; as portas da sala do trono se abrem de repente, e uma torrente de camponeses entra invadindo o salão. Velhos, jovens, doentes, assustados — todos os olhos se voltam para mim.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U]", implora um deles, "protejam-nos da onda de [epidemic_scope.GetName|l]. Devem fazê-lo".\n\nMeus guardas estão prontos, aguardam uma palavra minha."
 epidemic_events.5001.e: "\"Entrem todos!\""
 epidemic_events.5002.t: "Todos os novos cortesãos ganham #positive_value 40#! de opinião de #color_white você#!"
 epidemic_events.5002.desc: "Todos os cortesãos anteriores perdem #negative_value 10#! de opinião de #color_white você#!"
 epidemic_events.5002.a: "Que os acompanhem até a saída."
 epidemic_events.5002.a.tt: "Eles entendem a necessidade de isolamento"
 epidemic_events.5002.b: "Eles precisam ser removidos à força"
 epidemic_events.5002.b.success: "Guardas! Tirem eles daqui!"
 epidemic_events.5002.b.failure: "Vidas ou Ouro?"
 epidemic_events.5002.b.criticalfailure: "O ouro flui das costas; e assim também a epidemia de [epidemic_scope.GetName|l].\n\n[steward.Custom2('MyCharacterIntroduction', ROOT.Char)|U] tem um plano: os mercadores devem se isolar antes de descarregar suas mercadorias. \"Isso nos manterá em segurança\", insiste.\n\nInstituir uma quarentena significa menos impostos. A segurança vale esse custo?"
 epidemic_events.5002.c: "Faça isso por quarenta dias e castigue quem se opuser."
 epidemic_events.5002.d: "Todas as províncias costeiras do [realm|lE]"
 epidemic_events.5003.t: "Todos os $barons_and_minor_landholders_vassals$"
 epidemic_events.5003.desc: "Lama e miséria se agarram às ruas de [location.GetName]... e [Select_CString( peasant.IsFemale, 'a camponesa', 'o camponês' )] que se atira diante do meu cavalo aperta uma criança frágil.

"Eles precisam ser removidos à força"
 epidemic_events.5003.a: "Não podemos arriscar perturbar a economia."
 epidemic_events.5003.b: "Assunto Sério"
 epidemic_events.5003.b.tt: "O riso ecoa pelos corredores da corte. É estranho, dado o surto de [epidemic_scope.GetName|l] que continua assolando o exterior.\n\nSeguro a [councillor.Custom2('MyCharacterIntroduction', ROOT.Char)]. "O que tem tanta graça?".\n\n[councillor.GetFirstNameNoTooltip] sorri. "Os médicos dizem que a doença nasce do mau humor..., então a expulsamos às gargalhadas!"."
 epidemic_events.5003.b.criticalsuccess: "Você está completamente certo! Hah hah hah! Hee hee!"
 epidemic_events.5003.b.success: "A súplica a [ROOT.Char.GetFaith.HighGodName] é nossa única salvação."
 epidemic_events.5003.b.failure: "Bem, talvez haja algo nisso..."
 epidemic_events.5003.c: "Você realmente se sente um pouco melhor"
 epidemic_events.5004.t: "Você parece um pouco pouco convincente"
 epidemic_events.5004.desc: "Isso é absolutamente ridículo."
 epidemic_events.5004.a: "Bruxaria e Salvação"
 epidemic_events.5004.a.new_courtiers: "Uma comoção; [accuser.Custom2('MyCharacterIntroduction', ROOT.Char)] lidera uma multidão furiosa que cerca [herbalist.Custom2('MyCharacterIntroduction', ROOT.Char)].\n\n"Brux[herbalist.Custom('ES_OA')] catadora de ervas!", ruge. "No momento em que saiu, a maldita epidemia de [epidemic_scope.GetName|l] chegou!"\n\n[herbalist.GetFirstNameNoTooltip] permanece firme, fazendo gestos de desdém enquanto as vozes se elevam."
 epidemic_events.5004.a.old_courtiers: "\"Chega! A herbologia é uma arte nobre.\""
 epidemic_events.5004.b: "Aprisionem [herbalist.Custom('ES_AlAla')] brux[herbalist.Custom('ES_OA')]!"
 epidemic_events.5004.b.success: "\"Vamos pensar sobre isso, certo?\""
 epidemic_events.5004.b.failure: "Você consegue convencer a multidão"
 epidemic_events.5004.c: "A multidão ignora seus argumentos"
 epidemic_events.5005.t: "\"Chega! Parem com suas acusações infundadas, [accuser.GetFirstNameNoTooltip].\""
 epidemic_events.5005.desc: "Talvez se [herbalist.GetFirstNameNoTooltip] prometer abandonar a prática...?"
 epidemic_events.5005.a: "Seguro e Protegido"
 epidemic_events.5005.a.coastal_quarantine: "Esse surto de [epidemic_scope.GetName|l] não é exatamente algo #EMP bueno#!, mas devo admitir que estou curtindo a solidão. Sem visitantes, quase sem servos. Está silencioso. Pacífico.\n\nTalvez este isolamento esteja me ajudando a evitar a doença… ou talvez eu simplesmente goste de me esconder.\n\nAinda assim, eu deveria voltar a mostrar o rosto? Só um pouquinho?"
 epidemic_events.5005.a.landholders: "Ninguém é permitido ver-me sem a minha permissão!"
 epidemic_events.5005.b: "Devo ser visto pelos meus súditos."
 epidemic_events.5005.b.success: "Que ótima desculpa é essa [epidemic_scope.GetNameNoTooltip|l]!"
 epidemic_events.5005.b.failure: "Cheiro Malandro"
 epidemic_events.5005.c: "O mercado fede, mas uma barraca cheira estranhamente bem.

"Saquinhos frescos! As melhores ervas!", grita [Select_CString( merchant.IsFemale, 'a comerciante', 'o mercador' )], enfiando uma bolsa na minha mão. "Mantém a epidemia de [epidemic_scope.GetName|l] longe, meu senhor[ROOT.Char.Custom('ES_XA')]!""
 epidemic_events.5006.t: "\"Quantos você tem para vender?\""
 epidemic_events.5006.desc: "Comprarei seu melhor saquinho [newly_created_artifact.GetNameNoTooltip], por favor."
 epidemic_events.5006.a: "[merchant.Custom('ES_ElLa')|U] mercador aceita a contragosto"
 epidemic_events.5006.b: "[merchant.Custom('ES_ElLa')|U] o mercador se recusa a ceder"
 epidemic_events.5006.c: "[merchant.Custom('ES_ElLa')|U] mercador se recusa furiosamente a vender"
 epidemic_events.5006.c.success: "Um não faria mal."
 epidemic_events.5006.c.failure: "Estes não salvarão uma alma."
 epidemic_events.5006.d: "Ruínas sufocantes de [capital.GetBaseNameNoTierNoTooltip]"
 epidemic_events.5007.t: "Finalmente chegou. A temida pestilência assombra as ruas de [capital.GetBaseNameNoTier], sua foice descontrolada ceifando tudo em seu caminho.\n\n"
 epidemic_events.5007.desc: "Poucos pés agora pisam no Caminho de Santiago. Apenas os mais resistentes e fervorosos ainda percorrem o caminho em direção à cidade atingida pela peste, buscando salvação do todo-poderoso mesmo enquanto sucumbem à doença repugnante.\n\nAs belas praças, tão frequentemente cheias de alegria e comércio bem-intencionado, são o refúgio dos condenados. Os mortos e moribundos lutam até o fim aqui, miseravelmente sozinhos."
 epidemic_events.5007.a: "As suaves marés do Tâmisa carregam mais do que apenas sedimentos e comerciantes agora. Corpos inchados e branqueados pelo sol são depositados rio abaixo, seus rostos angustiados fixados em um sorriso silencioso e retorcido, bolhas purulentas vivas contra a pele pálida.\n\nAs antigas muralhas romanas, tantas vezes guardiãs contra a invasão dos vivos, agora são reforçadas com os mortos. As ruas estreitas e sinuosas se tornaram um labirinto de corpos empilhados, ratos usando os montes como refúgio e sustento."
 epidemic_events.5007.b: "Roma! Gloriosa Roma. A capital do mundo.\n\nIncontáveis almas caminharam por estas veneráveis vias, mas as fileiras dos mortos incham cada vez mais depressa, dia após dia. O flagelo varre as ruas, arruinando cada bela praça e glorioso arco. Os velhos mármores permanecem em silêncio, desamparados contra a tortura dos vivos. Os moribundos exalam seus últimos suspiros, nos lábios as palavras que mal ousavam ser pensadas em tempos melhores:\n\n"Até que ponto a Cidade Eterna é eterna?"."
 epidemic_events.5007.c: "As águas sinuosas do Sena banham alegremente as margens da Île de la Cité, ocultando a catástrofe em terra firme.\n\nOs enfermos vagueiam desesperados entre edifícios caindo aos pedaços. Onde antes os padeiros vendiam seus produtos, agora se amontoam os mortos, incapazes de acompanhar o avanço da onda de doença que assola a cidade.\n\nA cena seria quase pacífica, não fosse pelos gemidos e tosses dos moribundos."
 epidemic_events.5007.c.success: "A Cidade Desejada pelo Mundo. A Rainha das Cidades. A Porta para a Felicidade. A Encruzilhada do Mundo.\n\nTais nomes grandiosos e resplandecentes foram conferidos à poderosa metrópole, estendidos sobre seu promontório cintilante desde tempos imemoriais. Quão maldosamente irônicos esses mesmos nomes parecem agora, com os doentes e debilitados abrindo caminho miseravelmente entre os cadáveres daqueles que já sucumbiram.\n\nEles encontram algum consolo nessas glórias passadas enquanto morrem?"
 epidemic_events.5007.c.failure: "Os mercados e as praças comerciais da cidade, normalmente cheios de atividade, mergulharam em um silêncio sepulcral. As orgulhosas pontes sobre o Vltava estão obstruídas por doentes e mortos, que entopem as passagens nos vãos abaixo.\n\nVyšehrad contempla tristemente a mortandade, suas severas muralhas erguidas pelo duque Krok há tantas gerações são incapazes de deter um assassino tão letal e silencioso quanto a temida pestilência.\n\nA Cidade das Cem Torres morre lentamente, seus célebres campanários são incapazes de impedir que o céu desabe."
 epidemic_events.5007.d: "Que cidade é mais conhecida por seu aço do que Toledo? As águas do Tejo têm sido usadas para temperar as lâminas de um milhão de espadas, mas há algumas ameaças das quais nenhuma habilidade artesanal pode proteger.\n\nÉ uma triste ironia que um lugar tão diverso se una tão repentinamente diante de tamanha adversidade. A doença mata sem distinção, derrubando pessoas de todas as classes sociais.\n\nAs antigas ferrarias emudecem. Aqueles que nelas trabalhavam voltam suas mãos calejadas para a oração em vez do trabalho, na esperança de que o divino possa salvá-los onde uma arma não poderia."
 epidemic_events.5007.e: "O Cairo, uma cidade antiga sem medida, viu crescer e desaparecer cidades irmãs como Mênfis e Heliópolis, mas permaneceu forte. Suportou muito, mas terá de suportar ainda mais.\n\nO Nilo, o rio da vida, hoje arrasta a morte em seu curso. Suas águas levam os mortos perniciosos para que apodreçam nos deltas lamacentos onde deságua no mar, mas cada vez mais os substituem. Os nilômetros se asfixiam com os cadáveres, arremessados desesperadamente em suas gargantas para ganhar tempo, poupar espaço e salvar os vivos.\n\nA velha cidade definha."
 epidemic_events.5008.t: "Ninguém sabe quantas gerações viveram e morreram aqui, mas todos concordam que a própria cidade é absurdamente antiga. Ela precisará de toda a sua experiência e sabedoria para sobreviver a esta ameaça.\n\nAs famosas destilarias de perfumes continuam produzindo atar, frascos revestidos de pele de camelo, cheios até a borda, que os saudáveis penduram no pescoço para afastar os maus odores.\n\nEm outros lugares, porém, os únicos sons que ecoam das muralhas são os gemidos dos mortos e dos moribundos, cujos corpos se empilham a alturas impossíveis nas estreitas vielas."
 epidemic_events.5008.desc: "É mais conhecida como a Cidade da Luz, mas Varanasi tem sido a Cidade dos Mortos pelo mesmo tempo. Assim, parece apropriado que ela receba a mais mortal das pestilências.\n\nEm tempos mais felizes, o Ganges transbordava vida; agora, carrega apenas os mortos. Seus cadáveres inchados ficam presos nas margens do rio, chutados para longe pelos poucos vivos que se atrevem a sair.\n\nOs sons de prantos e tosse ecoam nas pedras antigas desta cidade antediluviana."
 epidemic_events.5008.a: "As ruas sinuosas e as moradias amontoadas, normalmente tão movimentadas com massas fervilhantes, estão silenciosas. Apenas os lamentos lastimosos dos enlutados e a tosse molhada e ofegante daqueles prestes a se juntarem aos mortos crescentes quebram o silêncio."
 epidemic_events.5008.b: "Doações de esmolas podem pelo menos amenizar a passagem dos moribundos."
 epidemic_events.5008.c: "#DIE1 A cidade...#! #DIE2 minha cidade preciosa...#!"
 epidemic_events.5009.t: "Você resolve reconstruir"
 epidemic_events.5009.desc: "O mercado fede, mas uma barraca cheira estranhamente bem.

"A Peste Negra"
 epidemic_events.5009.a: "A peste assola esta terra.\n\nBubões horríveis e inchados crescem sobre as vítimas, cujos pedidos lastimosos de socorro vão sendo lentamente abafados à medida que elas se engasgam e se afogam em suas próprias gargantas cheias de pus.\n\nDo mais humilde pivete de rua ao imperador mais festejado, todos temem a foice indiscriminada da implacável peste. Os sobreviventes devem assistir impotentes enquanto todos ao seu redor perecem.\n\nOs devotos buscam um salvador na divindade, e os poderosos, em suas riquezas, mas ninguém pode estar verdadeiramente a salvo. Terríveis tentáculos se espalham pela terra, constrangendo-a até que ela já não respire.\n\nA Peste Negra está sobre nós. Que [ROOT.Char.GetFaith.HighGodName] nos ampare."
 epidemic_events.5009.b: "A peste caminha entre nós.\n\nOs afetados incham com bubões, seus gritos se transformam em roncos à medida que lhes falta o ar. Na hora da morte, até o mais barulhento se cala.\n\nNinguém se salva. Do trabalhador descalço ao príncipe enclausurado, a roda do sofrimento gira para todos. Os vivos ficam para varrer as cinzas dos umbrais e contar as esteiras vazias.\n\nAlguns recitam sutras, outros se apegam ao ritual e à hierarquia — mas nenhum decreto detém a deterioração, nenhum mérito compensa o preço. Como a névoa em um vale, a peste se espalha sem ser vista, mas sentida em toda manhã silenciosa.\n\nA Peste Negra chegou. O céu desvia o olhar."
 epidemic_events.5009.b.success: "\"Pai nosso, que estais nos céus, santificado seja o vosso nome...\""
 epidemic_events.5009.b.failure: "Que possamos perseverar nestes tempos sombrios."
 epidemic_events.5009.b.criticalfailure: "Mergulhado até o Cotovelo"
 epidemic_events.5009.c: "O cadáver jazia sobre a mesa, cercado por diversos instrumentos de aspecto macabro, assim como por meu médic[physician.Custom('ES_OA')] [physician.GetFirstName] e por mim mesm[ROOT.Char.Custom('ES_OA')].

"Não sei, [ROOT.Char.Custom('FormOfAddressForLiege')]", começou a dizer [physician.GetFirstNameNoTooltip] com nervosismo, com o olhar fixo nos próprios pés. "Não sei o que podemos extrair deste corpo..."

[physician.GetSheHe|U] sabe muito bem o que #EMP poderíamos#! fazer, simplesmente não quer que eu lhe peça isso. Dissecar o cadáver de um portador da peste poderia nos render pistas preciosas sobre como combatê-la. A única dúvida é se há algum risco de contrair a terrível doença..."
 epidemic_events.5009.d: "\"Por que não fazemos isso juntos?\""
 epidemic_events.5010.t: "Percepções Obtidas"
 epidemic_events.5010.opening: "Peste Contratada"
 epidemic_events.5010.santiago: "Exijo uma dissecção."
 epidemic_events.5010.london: "Tudo bem, vamos passar sem isso."
 epidemic_events.5010.rome: "Travessias de Fronteira"
 epidemic_events.5010.paris: "Descendo às pressas do cavalo, abro caminho entre uma multidão de soldados em [border_province.GetName], dentro do condado fronteiriço de [border_county.GetNameNoTier]. A mensagem do meu marechal [marshal.GetFirstName] havia solicitado meu julgamento e minha presença, e, ao ver [marshal.GetHerHim], entendo o porquê.

Uma massa esfarrapada de pessoas, cansadas e famintas, permanece diante de nós, indecisa. É evidente que são refugiados da brutal peste que continua a devastar terras distantes, mas não há garantia de que tenham escapado ilesos.

Agora mesmo, consigo ver um homem no grupo pigarrear e tossir. [marshal.GetFirstNameNoTooltip] cobre a boca com incerteza."
 epidemic_events.5010.constantinople: "Não podemos arriscar. Mate todos eles."
 epidemic_events.5010.prague: "Talvez possamos montar alguns acampamentos temporários."
 epidemic_events.5010.toledo: "Mande-os embora."
 epidemic_events.5010.cairo: "Deixe-os passar."
 epidemic_events.5010.kanyakubja: "Prazeres Simples, Descartados"
 epidemic_events.5010.varanasi: ""[ROOT.Char.GetFirstName]! Não!" A voz de [family.GetFirstName] ressoa por cima do som do meu cavalo ao trotar pelo caminho. [family.GetFirstNameNoTooltip] corre ao meu lado, olhando-me com reprovação.

"Você sabe bem o que há lá fora. Toda essa morte e doença..." [family.GetSheHe] torce as mãos, triste. "Deve ficar aqui, [Select_CString( ROOT.Char.IsFemale, 'sã e salva', 'são e salvo' )] dentro [SelectLocalization( IsLandlessAdventurer( ROOT.Char ), 'do acampamento', 'dos muros')]. Por favor."

Só posso suspirar. Se eu tivesse saído um pouco mais rápido do portão, agora estaria cavalgando pelo campo, apreciando a natureza com alegria."
 epidemic_events.5010.fallback: "Provavelmente está certo."
 epidemic_events.5010.a: "\"Ah, estarei bem!\""
 epidemic_events.5010.b: "Pregadores do Apocalipse"
 epidemic_events.5010.b.win: "No mercado costuma haver bastante burburinho, mas hoje ecoa uma verdadeira cacofonia pelo lugar. Avisto [doomsday_preacher.Custom('ES_AlAla')] culpado: uma figura gritando a plenos pulmões.\n\n“O fim dos tempos está sobre nós!”, uiva, arengando alguns transeuntes. “Todos pereceremos! Assim está escrito!”.\n\nAs gotículas de saliva que voam da boca do pregador causam repulsa à maioria, mas alguns dos presentes na multidão começam a concordar em voz alta."
 epidemic_events.5010.b.neutral: "Ele está certo! Precisamos nos preparar!"
 epidemic_events.5010.b.lose: "Guardas? Prendam es[doomsday_preacher.Custom('ES_EA')] [doomsday_preacher.GetWomanMan]."
 epidemic_events.5900.t: "\"Mostre-me onde está escrito. Prove suas palavras.\""
 epidemic_events.5900.desc: "Você prova que eles estão errados"
 epidemic_events.5900.desc_asia: "Você perde o debate"
 epidemic_events.5900.christian: "Não escute [doomsday_preacher.GetHerHim]!"
 epidemic_events.5900.fallback: "Todas as baronias ao redor de [doomsday_province.GetName] têm uma chance de #color_white 15%#! de ganhar o mesmo modificador"
 epidemic_events.5901.t: "Nervos Abalados"
 epidemic_events.5901.desc: "O cadáver jazia sobre a mesa, cercado por diversos instrumentos de aspecto macabro, assim como por meu médic[physician.Custom('ES_OA')] [physician.GetFirstName] e por mim mesm[ROOT.Char.Custom('ES_OA')].

"Todas as baronias ao redor de [province.GetName] têm uma chance de #color_white 50%#! de ganhar o mesmo modificador"

[physician.GetSheHe|U] sabe muito bem o que #EMP poderíamos#! fazer, simplesmente não quer que eu lhe peça isso. Dissecar o cadáver de um portador da peste poderia nos render pistas preciosas sobre como combatê-la. A única dúvida é se há algum risco de contrair a terrível doença..."
 epidemic_events.5901.a: "Eles parecem não convencidos"
 epidemic_events.5901.a.tt: "De qualquer forma, debater com [peasant.GetSheHe] não fará com que ele acredite em mim."
 epidemic_events.5901.a.tt.plague: "Vagando, Delirando"
 epidemic_events.5901.b: "Os guardas normalmente não são tão francos quando se trata de me interromper nos aposentos do conselho, mas hoje invadiram com prontidão, com meu marechal [marshal.GetFirstName] à frente. Atrás deles, arrastada sem cerimônia, há uma figura lamentável, de olhos arregalados, com o que parece ser um chicote firmemente agarrado em suas mãos.

"Encontramos [flagellant.GetHerHim] em [doomsday_province.GetName], vagando pelas ruas e se flagelando com aquilo." [marshal.GetFirstNameNoTooltip|U] indica o chicote. "[flagellant.GetSheHe|U] está assustando os moradores com discursos sobre como a poderosa peste está vindo em nossa direção e que todos devemos nos arrepender.""
 epidemic_events.5901.c: "\"Você e seu tipo estão destruindo a fé [ROOT.Char.GetFaith.GetAdjectiveNoTooltip|l]!\""
 epidemic_events.5902.t: "Você consegue argumentar com sucesso o seu ponto"
 epidemic_events.5902.desc: "Descendo às pressas do cavalo, abro caminho entre uma multidão de soldados em [border_province.GetName], dentro do condado fronteiriço de [border_county.GetNameNoTier]. A mensagem do meu marechal [marshal.GetFirstName] havia solicitado meu julgamento e minha presença, e, ao ver [marshal.GetHerHim], entendo o porquê.

Uma massa esfarrapada de pessoas, cansadas e famintas, permanece diante de nós, indecisa. É evidente que são refugiados da brutal peste que continua a devastar terras distantes, mas não há garantia de que tenham escapado ilesos.

Agora mesmo, consigo ver um homem no grupo pigarrear e tossir. [marshal.GetFirstNameNoTooltip] cobre a boca com incerteza."
 epidemic_events.5902.a: "Flagelantes vagando livremente"
 epidemic_events.5902.b: "Uma Pequena Coceira"
 epidemic_events.5902.c: "Minhas pálpebras se abrem de súbito quando o sol da manhã incide sobre elas. Eu me ergo, me espreguiço, bocejo e... #EMP toso#!.

Minha garganta está um pouco dolorida. Meus olhos também estão um tanto mais enevoados do que o normal. Sinto até um leve catarro.

Oh, não. Por favor, não eu. Livrai-me deste destino. Dizei-me, ó [ROOT.Char.GetFaith.HighGodName], que a temida peste não se espalhou por estas terras e me tornou sua vítima..."
 epidemic_events.5902.d: "Meu médico me dará tratamentos de primeira linha!"
 epidemic_events.5903.t: "Não é nada. Certamente não é nada."
 epidemic_events.5903.desc: "Na verdade, não era nada" A voz de [family.GetFirstName] ressoa por cima do som do meu cavalo ao trotar pelo caminho. [family.GetFirstNameNoTooltip] corre ao meu lado, olhando-me com reprovação.

"Você realmente fica doente"

Só posso suspirar. Se eu tivesse saído um pouco mais rápido do portão, agora estaria cavalgando pelo campo, apreciando a natureza com alegria."
 epidemic_events.5903.a: "\"Você vai cavar sua própria cova se perguntar novamente.\""
 epidemic_events.5903.b: "Garanta que sejam compensados de forma justa."
 epidemic_events.5904.t: "\"Bah! Há muitos outros de onde você veio.\""
 epidemic_events.5904.desc: "O Horizonte Sombrio"
 epidemic_events.5904.a: "Missivas e mensagens se espalham pela minha mesa. Todas sobre um assunto específico. O pânico transparece nas palavras, formando por sua vez uma crescente poça de terror no meu estômago.\n\nA doença começa com calafrios e febre antes que bubões necróticos se formem sob as axilas dos desventurados. A respiração vem em golfadas miseráveis entre expurgos de sangue; lábios e dedos dos pés se tornam de um negro lívido. Depois, mata sem distinção: ricos e pobres, jovens e velhos, duques e desamparados.\n\nOs relatos, por enquanto, vêm de terras distantes, mas meus dedos trêmulos seguem as datas.\n\nEstá se aproximando."
 epidemic_events.5904.b: "Hah! Deixe-os morrer."
 epidemic_events.5904.c: "Está tão longe! Podemos muito bem nos alegrar com o infortúnio deles."
 epidemic_events.5904.c.tt.success: "Precisamos fazer algo!"
 epidemic_events.5904.c.tt.failure: "Tranquem edifícios! Fechem portas! Plantem canteiros de rosas!"
 epidemic_events.5904.d: "#EMP \"Eu olhei, e eis um cavalo verde...\"#!"
 epidemic_events.5904.d.tt: "Um mau presságio dos tempos que virão..."
 epidemic_events.5905.t: "Das Cinzas"
 epidemic_events.5905.desc: "Finalmente, a praga deixou o reino e devemos encarar isso como uma oportunidade para surgir do caos que deixou em seu rastro.\n\nAgora emergimos dos destroços do mundo antigo, e chegou a hora de considerar o novo."
 epidemic_events.5905.a: "\n\nMassas de sobreviventes já começaram a se mover para [new_preferred_capital.GetName] como seu novo refúgio, e isso pode se mostrar uma oportunidade empolgante para uma nova capital."
 epidemic_events.5905.a.tt: "[new_preferred_capital.GetNameNoTierNoTooltip|U] seria uma excelente nova capital."
 epidemic_events.5905.b: "Não devemos poupar esforços para reconstruir."
 epidemic_events.5905.b.tt.success: "Não há nada que eu possa fazer."
 epidemic_events.5905.b.tt.failure: "Cada [county|lE] que foi infectado nos últimos 10 anos"
 epidemic_events.5905.c: "Surto de Peste: [infected_county.GetNameNoTierNoTooltip]"
 epidemic_events.5906.t: "Uma [epidemic|lE] conhecida como [epidemic.GetName|l] atingiu [infected_county.GetName]"
 epidemic_events.5906.desc: "Os guardas normalmente não são tão francos quando se trata de me interromper nos aposentos do conselho, mas hoje invadiram com prontidão, com meu marechal [marshal.GetFirstName] à frente. Atrás deles, arrastada sem cerimônia, há uma figura lamentável, de olhos arregalados, com o que parece ser um chicote firmemente agarrado em suas mãos.

"Uma [epidemic|lE] conhecida como [epidemic.GetName|l] se espalhou para [LEFT_TITLE.GetProvince.GetBaronyNameExplicitly] e [RIGHT_TITLE.GetProvince.GetBaronyNameExplicitly]"
 epidemic_events.5906.a: "Uma [epidemic|lE] conhecida como [epidemic.GetName|l] se espalhou para [LEFT_TITLE.GetProvince.GetBaronyNameExplicitly], [RIGHT_TITLE.GetProvince.GetBaronyNameExplicitly] e $message_consolidation_others$"
 epidemic_events.5906.a.tt.success: "Disponível porque você tem um [GetCourtPositionType('court_physician_court_position').GetName|l]"
 epidemic_events.5906.a.tt.failure: "[flagellant.Custom('ES_ElLa')|U] flagelante se mantém firme"
 epidemic_events.5906.b: "Pode ser que tenha razão…"
 epidemic_events.5906.c: ""Prendam[flagellant.GetHerHim], [marshal.GetFirstNameNoTooltip]"."
 epidemic_events.5906.d: "Deixe[flagellant.GetHerHim] ir. Eles não estão fazendo mal a ninguém."
 epidemic_events.5906.d.tt: "Todas as baronias ao redor de [doomsday_province.GetName] têm uma chance de #color_white 25%#! de ganhar o mesmo modificador"
 fervor_loss_flagellants: "Flagelantes vagando livremente"
 epidemic_events.5907.t: "Uma Pequena Coceira"
 epidemic_events.5907.desc: "Minhas pálpebras se abrem de súbito quando o sol da manhã incide sobre elas. Eu me ergo, me espreguiço, bocejo e... #EMP toso#!.

Minha garganta está um pouco dolorida. Meus olhos também estão um tanto mais enevoados do que o normal. Sinto até um leve catarro.

Oh, não. Por favor, não eu. Livrai-me deste destino. Dizei-me, ó [ROOT.Char.GetFaith.HighGodName], que a temida peste não se espalhou por estas terras e me tornou sua vítima..."
 epidemic_events.5907.a: "Meu médico me dará tratamentos de primeira linha!"
 epidemic_events.5907.b: "Não é nada. Certamente não é nada."
 epidemic_events.5907.b.success: "Na verdade, não era nada"
 epidemic_events.5907.b.failure: "'Tis apenas um resfriado"
 epidemic_events.5907.b.criticalfailure: "Você realmente fica doente"
 epidemic_events.5908.t: "Empilhadores Rígidos"
 epidemic_events.5908.desc: "[Select_CString( gravedigger.IsFemale, 'A primeira', 'O primeiro' )] suplicante do dia dá um passo em minha direção, e fica claro que não se trata de alguém de alta posição. A sujeira e a fuligem sob as unhas confirmam isso, embora tenha claramente feito um esforço para parecer apresentável.

"Represento os coveiros de [province.GetName], [ROOT.Char.Custom('FormOfAddressForLiege')]", começa, "e temos um pedido a fazer a Vossa Graça. A temível peste se aproxima de nós enquanto falamos: nossa nobre profissão logo será muito necessária, isso é certo."

"Seremos nós os responsáveis pelos corpos, os que correm mais risco", continua. "Em troca, pedimos apenas um pequeno aumento na recompensa. Vossa Graça poderia dispensar algumas moedas?""
 epidemic_events.5908.a: "\"Você vai cavar sua própria cova se perguntar novamente.\""
 epidemic_events.5908.b: "Garanta que sejam compensados de forma justa."
 epidemic_events.5908.c: "\"Bah! Há muitos outros de onde você veio.\""
