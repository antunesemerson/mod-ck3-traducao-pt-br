l_spanish:
 health.1015.t: "[SCOPE.Custom('EventTitleDisease')]: A Pequena Desgraça"
 health.1015.desc: "#EMP Coceira.#! Acordo no meio da noite e descubro minha perna sangrando. Minhas unhas também. A coceira é tão forte que não consigo parar de cavar mais fundo.\n\nMergulho meu rosto em água fria esperando que passe. Minha reflexão — olhos vermelhos."
 health.1015.court_physician.desc: "\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], essa é a doença conhecida como sarampo"."
 health.1015.a: "Não aguento mais!"
 health.1016.t: "[SCOPE.Custom('EventTitleDisease')]: A Fonte Carmesim"
 health.1016.desc: "#EMP Argh.#! Eu seguro minhas entranhas com dor. Perdi a noção do tempo que passei nesta latrina. Horas, dias? #EMP Semanas?#! Arghhhhhh. A excreção sanguínea dói mais a cada vez. O cheiro também não ajuda.\n\nSinto que vou desmaiar..."
 health.1016.court_physician.desc: "\n\n"Receio que possa ser a doença do cerco, [ROOT.Char.Custom('FormOfAddressForLiege')]"."
 health.1016.a: "Por favor... água."
 health.1017.t: "[SCOPE.Custom('EventTitleDisease')]: A Ardência"
 health.1017.desc: "Não consigo parar o movimento. Pare! Pare! Meus braços continuam tremendo sozinhos, e consigo ver meus dedos ficando pretos. Os espasmos percorrem meu corpo — como se eu estivesse dançando.\n\nÉ tudo fogo. Pare! #EMP PARE!#!"
 health.1017.court_physician.desc: "\n\nParece que o fogo de [ROOT.Char.GetFaith.HouseholdGodName], [ROOT.Char.Custom('FormOfAddressForLiege')]."
 health.1017.a: "Faça parar!"
 health.1112.t: "[SCOPE.Custom('EventTitleDisease')]: Uma Chance de Respirar"
 health.1112.desc: "Sento-me na minha cama e olho para as minhas mãos, palmas para cima. Finalmente, as erupções desapareceram e minha pele voltou à sua cor normal.\n\nÉ quase estranho poder respirar novamente sem aquela coceira intensa."
 health.1112.a: "Hora de voltar à rotina."
 health.1112.a.tt: "Agora sou imune a [GetTrait('measles').GetName( GetNullCharacter )|l]"
 health.1113.t: "[SCOPE.Custom('EventTitleDisease')]: Um Descanso"
 health.1113.desc: "A primeira vez que consigo pensar claramente novamente, mal percebo. A névoa que envolvia minha cabeça parece ter se dissipado sem aviso.\n\nComida e água finalmente conseguem permanecer em meu corpo e sinto um desejo intenso por [ROOT.Char.Custom('FavoriteTreatDemand')|l]."
 health.1113.a: "Hora de beliscar alguma coisa."
 health.1114.t: "[SCOPE.Custom('EventTitleDisease')]: De Volta ao Normal"
 health.1114.desc: "Levanto-me da cama e a visão de dedos com cores saudáveis é tão rara quanto um cervo branco. Meu corpo finalmente me agraciou com um pouco de calma. Os espasmos não estão em lugar algum — não há mais dança.\n\nSolto um suspiro de alívio. Paz. Como sentiria falta dela."
 health.1114.a: "Agora, só dançarei em festas."
 epidemic_events.0001.t: "Cresce"
 epidemic_events.0001.desc: "#EMP Coceira.#! Acordo no meio da noite e descubro minha perna sangrando. Minhas unhas também. A coceira é tão forte que não consigo parar de cavar mais fundo.

Mergulho meu rosto em água fria esperando que passe. Minha reflexão — olhos vermelhos.

A noite chega. Eu me agarro à mesa de guerra de madeira e fecho os olhos. O suor cai sobre a superfície. Enfraquecid[ROOT.Char.Custom('ES_OA')] por [disease_scope.GetNameNoTooltip( GetPlayer )|l], [ROOT.Char.Custom('disease_desc_short')]. #EMP O que será de mim?#!

Ouço tosses abafadas vindas de fora da tenda. Já é tarde demais para mim; só posso esperar que não atinja meus [dummy_gender.GetWomenMen]."
 epidemic_events.0001.a: "pelos pregos de [ROOT.Char.GetFaith.HighGodNamePossessive]"
 epidemic_events.0001.a.toast: "pelos pregos de $chistianity_good_god_christ$"
 epidemic_events.0001.a.christian: "pelos braços de [ROOT.Char.GetFaith.HighGodNamePossessive]"
 epidemic_infected_knights_modifier: "pelo sangue de $chistianity_good_god_christ$"
 epidemic_infected_army_modifier: "pela morte de [ROOT.Char.GetFaith.HighGodNamePossessive]"
 christian_curse_bones: "pelos ferimentos de [ROOT.Char.GetFaith.HighGodNamePossessive]"
 christian_curse_nails: "pelo corpo de [ROOT.Char.GetFaith.HighGodNamePossessive]"
 christian_curse_nails2: "atacado por bubões negros"
 christian_curse_arms: "assedado por manchas vermelhas"
 christian_curse_blood: "afetado por excreções sanguíneas"
 christian_curse_death: "punido com movimentos erráticos"
 christian_curse_wounds: "atormentado pela febre do campo"
 christian_curse_body: "atormentado por uma tosse sangrenta"
 disease_desc_short_plague: "cheio de cicatrizes e erupções cutâneas"
 disease_desc_short_measles: "drenado pelo câncer"
 disease_desc_short_dysentery: "afligido por articulações inchadas"
 disease_desc_short_ergotism: "atormentado por tosses"
 disease_desc_short_typhus: "afligido por feridas venéreas"
 disease_desc_short_consumption: "marcado por bolhas venéreas"
 disease_desc_short_smallpox: "sobrecarregado pela pele em queda"
 disease_desc_short_cancer: "atormentado com incapacidade"
 disease_desc_short_gout: "fraco de corpo"
 disease_desc_short_pneumonic: "afligido por uma doença"
 disease_desc_short_great_pox: "O Culto da [cult_epidemic.GetNameNoTooltip]"
 disease_desc_short_lovers_pox: "[Select_CString( charismatic_priest.IsFemale, 'Uma sacerdotisa', 'Um sacerdote' )] de olhar selvagem, chamad[charismatic_priest.Custom('ES_OA')] [charismatic_priest.GetFirstName], prega que a epidemia de [cult_epidemic.GetName|l] é um castigo divino e que apenas adorar [charismatic_priest.GetFaith.HighGodName|U] pode nos salvar. Multidões acorrem a [charismatic_priest.GetHerHim], atraídas pelo fogo e pelo medo.

Se não agirmos, essa seita da peste poderá derrubar o poder [ROOT.Char.GetFaith.GetAdjective] em [infected_county.GetName] e além."
 disease_desc_short_leper: "Queimem esse lunático[charismatic_priest.Custom('ES_OA')]!"
 disease_desc_short_incapable: "Tenho certeza de que isso é inofensivo[charismatic_priest.Custom('ES_OA')]."
 disease_desc_short_infirm: "Finalmente, encontrei [charismatic_priest.GetFaith.HighGodName|U]!"
 disease_desc_short_ill: "Um Revenente Romântico"
 epidemic_events.1000.t: "Uma epidemia de [epidemic_scope.GetName|l] assola minhas terras e agora meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('superstitious_courtier'))], [superstitious_courtier.GetFirstName], sussurra sobre algo pior.

"Meu [ROOT.Char.GetTitleAsNameNoTooltip]", implora, "todos conhecemos vosso amor por [dead_lover.GetFirstName]. Mas a peste cavalga com os mortos. Precisamos selar o caixão [dead_lover.GetHerHis], pregá-lo com pregos, antes que [dead_lover.GetSheHe] se erga e espalhe a maldição"."
 epidemic_events.1000.desc: "[Select_CString( charismatic_priest.IsFemale, 'Uma sacerdotisa', 'Um sacerdote' )] de olhar selvagem, chamad[charismatic_priest.Custom('ES_OA')] [charismatic_priest.GetFirstName], prega que a epidemia de [cult_epidemic.GetName|l] é um castigo divino e que apenas adorar [charismatic_priest.GetFaith.HighGodName|U] pode nos salvar. Multidões acorrem a [charismatic_priest.GetHerHim], atraídas pelo fogo e pelo medo.

Se não agirmos, essa seita da peste poderá derrubar o poder [ROOT.Char.GetFaith.GetAdjective] em [infected_county.GetName] e além."
 epidemic_events.1000.a: "Todo [county|lE] do [realm|lE] com [epidemic_scope.GetName]"
 epidemic_events.1000.b: "Ar Ruim Sobre [epidemic_county.GetNameNoTierNoTooltip]"
 epidemic_events.1000.c: "O comércio murchou em [epidemic_county.GetNameNoTier]. [miasma_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)|U] culpa o miasma da morte — e propõe uma cura estranha.\n\nSe plantarmos um campo de doces [epidemic_province.Custom('get_region_flower_type_plural')], seu ar perfumado poderá expulsar a peste.\n\nEstranho. Mas talvez não mais estranho que a própria peste."
 epidemic_events.1010.t: "Vale a pena tentar."
 epidemic_events.1010.desc: "Uma epidemia de [epidemic_scope.GetName|l] assola minhas terras e agora meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('superstitious_courtier'))], [superstitious_courtier.GetFirstName], sussurra sobre algo pior.

"[leeched_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)|U] irrompe, com os olhos arregalados, agarrando um saco de sanguessugas.\n\n"As sanguessugas são o único jeito de deter a praga de [epidemic_scope.GetName|l]!", grita.\n\nA tradição diz que elas só devem ser usadas sob cuidados especializados — mas estes são tempos desesperadores. Será que realmente podemos nos dar ao luxo de esperar?"
 epidemic_events.1010.a: "Distribua sanguessugas para todos!"
 epidemic_events.1010.b: "As sanguessugas provam ser bem-sucedidas"
 epidemic_events.1010.c: "As sanguessugas são prejudiciais"
 all_realm_county_epidemic_scope: "Vamos seguir os ensinamentos estabelecidos."
 epidemic_events.1020.t: "Flagelantes na Corte"
 epidemic_events.1020.desc: "[epidemic_scope.GetName|l] continua varrendo meu reino, devastando tudo em seu caminho. Um grupo de fanáticos ganhou destaque nas regiões infectadas, afirmando que a salvação pode ser alcançada por meio de autoflagelação.\n\n"
 epidemic_events.1020.a: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('chaplain'))], [chaplain.GetFirstName], aproxima-se com os olhos acesos. "Meu senhor[ROOT.Char.Custom('ES_XA')]; é a penitência divina feita carne. Precisamos abençoar sua causa!"."
 epidemic_events.1020.b: "[chaplain.Custom2('MyCharacterIntroduction', ROOT.Char)|U] está furioso. \"É heresia — depravada e perigosa! Você deve condená-la.\"\n\nA multidão entoa mais alto."
 epidemic_events.1030.t: "Isso é perverso!"
 epidemic_events.1030.desc: "Tenho certeza de que estão prejudicando apenas a si mesmos."
 epidemic_events.1030.a: "Se o que dizem for verdade, então eu me flagelarei!"
 epidemic_events.1030.a.success: "Dia do Juízo Final"
 epidemic_events.1030.a.failure: "Encontro meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('chaplain'))] [chaplain.GetFirstName] caminhando de um lado para o outro, [Select_CString( chaplain.IsFemale, 'pálida e aflita', 'pálido e aflito' )]. "Meu [ROOT.Char.GetTitleAsNameNoTooltip], os hereges clamam que a praga de [epidemic_scope.GetName|l] é a ira de [ROOT.Char.GetFaith.HighGodNamePossessive], que o fim está sobre nós!"

Violência. Pânico. Fanáticos nas ruas pregando a desgraça.

"Precisamos agir. Ou sua loucura devorará o pouco de ordem que resta.""
 epidemic_events.1030.b: "\"Erradique-os!\""
 epidemic_events.1040.t: "\"Envie seus melhores teólogos para debatê-los!\""
 epidemic_events.1040.desc.intro: "O medo do apocalipse é dissuadido"
 epidemic_events.1040.desc.mid.approves: "O povo não está convencido"
 epidemic_events.1040.desc.mid: "\"Talvez eles estejam certos...\""
 epidemic_events.1040.a: "Julgamentos da peste:"
 epidemic_events.1040.b: "$story_plague_trials_title$ portadores da pestilência"
 epidemic_events.1040.c: "À medida que a praga de [epidemic_scope.GetName|l] se espalha, o medo gera loucura.\n\n"
 epidemic_events.1050.t: "as qualidades sobrenaturais dos gatos. Acreditam que, de alguma forma, gatos domésticos comuns estão carregando a praga com eles e amaldiçoando pessoas comuns com sua presença. Essa crença é tão disseminada que áreas mais afetadas pela praga começaram a abater gatos em massa."
 epidemic_events.1050.desc: "as qualidades sobrenaturais dos cães. As criaturas mais leais e confiáveis, aos olhos dos meus súditos mais humildes, de alguma forma são responsáveis pelo sofrimento e pela morte dentro do meu reino. Essa crença é tão comum que muitas áreas estão caçando ativamente as pobres bestas."

Violência. Pânico. Fanáticos nas ruas pregando a desgraça.

"Eles acreditam que nos tornamos muito [sinful_trait.GetName(ROOT.Char)|l] e que só através de um arrependimento em massa e de punições severas podemos voltar a viver da maneira que [ROOT.Char.GetFaith.HighGodName] deseja."
 epidemic_events.1050.a: "\n\nEsses atos foram amplamente condenados pelos [ROOT.Char.GetFaith.PriestNeuterPlural] do reino, mas, mesmo assim, os julgamentos continuam."
 epidemic_events.1050.b: "Não há nada que eu possa fazer."
 epidemic_events.1050.b.tt.success: "Pare-os imediatamente!"
 epidemic_events.1050.b.tt.failure: "Talvez nossa resposta esteja nas escrituras sagradas de [ROOT.Char.GetFaith.ReligiousText|U]."
 epidemic_events.1050.c: "#EMP Lo peor aún está por llegar…#!"
 story_plague_trials_title: "$story_plague_trials_title$ pira de animais de estimação"
 epidemic_events.1060.t: "Acordo com o céu de um laranja brilhante e a fumaça sufocando o ar. Será que os camponeses incendiaram a cidade?\n\n"
 epidemic_events.1060.desc.intro: "Não; são gatos. [chaplain.Custom('ES_ElLa')|U] [chaplain.GetTitledFirstName|l] me conta que estão sendo queimados vivos para se proteger da epidemia de [epidemic_scope.GetName|l]."
 epidemic_events.1060.desc.mid.cats: "Não, são os cães. [chaplain.Custom('ES_ElLa')|U] [chaplain.GetTitledFirstName|l] me informa que estão sendo queimados vivos para afastar [epidemic_scope.GetName|l]."
 epidemic_events.1060.desc.mid.dogs: "\n\n"É um caso bastante horrível", murmura. "Mas bastante popular"."
 epidemic_events.1060.desc.mid.faith: "Suponho que não há nada que eu possa fazer."
 epidemic_events.1060.desc.mid.trait: "Queimar animais não tem efeito algum"
 epidemic_events.1060.desc.mid2.witches: "Queimar animais de alguma forma aumenta as infecções"
 epidemic_events.1060.desc.mid2.sin: "Isso deve parar!"
 epidemic_events.1060.desc.outro: "Causar dano a esses animais deve se tornar um crime."
 epidemic_events.1060.a: "$story_plague_trials_title$ caçadores"
 epidemic_events.1060.b: "Uma bando de caçadores furtivos invade meu [ROOT.Char.Custom('GetCourt')] exalando suor e fumaça.\n\n"
 epidemic_events.1060.c: ""Meu suserano[ROOT.Char.Custom('ES_XA')] , são os gatos. Bestas escorregadias; olhos demais, nunca dormem. O povo diz que trazem a peste com seus ronronados"."
 witch_trial_story_tt: ""Meu [ROOT.Char.GetTitleAsNameNoTooltip], os cães estão amaldiçoados. Todo mundo sabe disso. Vamos terminar a purga — toda fera, todo vira-lata, até que a praga acabe"."
 epidemic_events.1061.t: "\n\nAguardam, sorrindo, sua bênção; já têm sangue nas botas."
 epidemic_events.1061.desc.intro: "Mate todos eles."
 epidemic_events.1061.desc.mid.cats: "Matar os animais não tem efeito"
 epidemic_events.1061.desc.mid.dogs: "A praga alivia"
 epidemic_events.1061.desc.outro: "A praga piora"
 epidemic_events.1061.a: "Capture-os e traga-os para a capital."
 epidemic_events.1061.a.success: "Isso não tem efeito"
 epidemic_events.1061.a.failure: "A capital está cheia de animais raivosos"
 epidemic_events.1061.b: "$story_plague_trials_title$ Repeti!"
 epidemic_events.1061.c: "O centro de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip|U] é barulhento com pânico e desespero, e cortando os lamentos dos condenados está a voz de um pregador comum da rua.\n\n\"Arrependam-se! Arrependam-se!"
 epidemic_events.1062.t: "Essa praga não é obra dos [faith_blamed.GetAdjective]! Isso é resultado do nosso próprio pecado."
 epidemic_events.1062.desc.intro: "Esta praga é um castigo de [ROOT.Char.GetFaith.HighGodName|U] por nossa fraqueza e propensão a ser [trait_blamed.GetName(ROOT.Char)|l]s."
 epidemic_events.1062.desc.mid.cats: "Não são as bruxas às quais devemos voltar nossos olhos, mas a nós mesmos! Não somos todos pecadores?"
 epidemic_events.1062.desc.mid.dogs: "É absurdo culpar essa praga por uma criatura tão miserável e patética quanto um gato! São nossos próprios pecados que devemos examinar!"
 epidemic_events.1062.desc.outro: "Culpar essa praga por cães de mente simples é um absurdo! São nossas almas corruptas que são culpadas por isso."
 epidemic_events.1062.a: "Somente ao nos esforçarmos para ser [virtuous_trait.GetName(ROOT.Char)|l] podemos sequer esperar pelo fim da praga.\"\n\nA multidão parece bastante cativada por essa mensagem, e muitos outros pregadores por toda a cidade parecem estar transmitindo a mesma mensagem com igual convicção e vigor. Não consigo deixar de sentir que talvez seja minha própria fraqueza e pecado que trazem essa praga sobre meu povo."
 epidemic_events.1062.a.no_effect: "Eu me arrependo!"
 epidemic_events.1062.a.success: "Bobagem e tolice."
 epidemic_events.1062.a.failure: "Certamente posso debater com um pregador comum da rua."
 epidemic_events.1062.b: "Você dissuade o pregador"
 epidemic_events.1062.b.no_effect: "Você se envergonha"
 epidemic_events.1062.b.failure: "$story_plague_trials_title$ piras de pureza"
 epidemic_events.1063.t: "Apesar dos meus esforços para sufocar a superstição, os julgamentos de bruxas irromperam por todo o domínio, e em lugar algum com mais força do que em [witch_trial_county.GetNameNoTier]. Ali, a epidemia de [epidemic_scope.GetName|l] transformou o medo em fúria.\n\n"
 epidemic_events.1063.desc.intro: "Os julgamentos buscam erradicar os [trait_blamed.GetName(ROOT.Char)|l] entre nós e puni-los severamente, às vezes até a morte."
 epidemic_events.1063.desc.mid.faith: "Os julgamentos buscam expor bruxas por meio de meios bárbaros e sem sentido, muitas vezes julgamentos que resultariam em morte, quer o acusado fosse uma bruxa ou não."
 epidemic_events.1063.desc.mid.sin: "\n\nSe isso é justiça, ela não serve nem a [ROOT.Char.GetFaith.HighGodName|U] nem à coroa."
 epidemic_events.1063.desc.mid.witch: "Envie os oficiais de justiça para [witch_trial_county.GetNameNoTierNoTooltip]. Isso acaba ali."
 epidemic_events.1063.desc.mid.cats: "Os julgamentos devem acabar!"
 epidemic_events.1063.desc.mid.dogs: "Devemos pregar contra essa prática."
 epidemic_events.1063.desc.outro: "Sua mensagem é convincente"
 epidemic_events.1063.a: "Os julgamentos continuam"
 epidemic_events.1063.b: "$story_plague_trials_title$ vergonha"
 epidemic_events.1063.c: "A epidemia do medo agora atinge a minha própria casa.\n\nOs pregadores voltaram a turba contra [shamed_buddy.Custom2('MyCharacterIntroduction', ROOT.Char)]. [shamed_buddy.GetHerHim|U] acusam de"
 epidemic_events.1063.c.success: "ser [trait_blamed.GetName(shamed_buddy)|l]"
 epidemic_events.1063.c.failure: "bruxaria"
 epidemic_events.1064.t: "ter trato com [ROOT.Char.GetFaith.EvilGodNames], de pecar entre sedas. Agora exigem que ele seja punido publicamente — arrastado para fora de seus salões e forçado a se arrepender.\n\nRecusar-se a isso arrisca uma revolta. Ceder envergonha a coroa."
 epidemic_events.1064.desc.intro: "Dê-lhes o que querem."
 epidemic_events.1064.desc.mid.sin: "Eu recuso!"
 epidemic_events.1064.desc.mid.witch: "Eu irei em seu lugar."
 epidemic_events.1064.desc.outro: "$story_plague_trials_title$ expulsão"
 epidemic_events.1064.a: "Nada do que dissermos convencerá os camponeses; eles culpam os [faith_blamed.GetAdherentNamePlural] da epidemia de [epidemic_scope.GetName|l]. Seus mercadores são assediados, suas casas são vandalizadas. Muitos fugiram e o comércio foi arruinado.\n\nPior ainda, em algumas aldeias eles estão sendo caçados.\n\nSe essa perseguição continuar, meu reino pode se esvair até secar — não pela peste, mas pelo medo."
 epidemic_events.1064.b: "Esse comportamento deve ser punido."
 epidemic_events.1064.c: "Isso está além do meu controle."
 epidemic_events.1064.c.success: "Posso oferecer santuário na capital."
 epidemic_events.1064.c.failure: "Influxo da Praga [faith_blamed.GetAdjectiveNoTooltip]"
 epidemic_events.1065.t: "À medida que a epidemia de [epidemic_scope.GetName|l] devasta o domínio de [bigoted_ruler_that_everyone_hates.GetName], os camponeses de lá têm insistido em culpar os [faith_blamed.GetAdherentNamePlural]. Esse problema se espalhou tanto que muitos já começaram a fugir de [bigoted_ruler_that_everyone_hates.GetPrimaryTitle.GetNameNoTierNoTooltip] e a vir para minhas terras."
 epidemic_events.1065.desc.intro: "Eles são bem-vindos aqui."
 epidemic_events.1065.desc.mid.sin: "Não podemos abrir as portas para a praga."
 epidemic_events.1065.desc.mid.witch: "Ofereça santuário na capital."
 epidemic_events.1065.desc.outro: "Cada condado vizinho de [bigoted_ruler_that_everyone_hates.GetName]"
 epidemic_events.1065.a: "$story_plague_trials_title$ sem crédito"
 epidemic_events.1065.b: "A caça às bruxas que culpa os [faith_blamed.GetAdherentNamePlural] pela epidemia de [epidemic_scope.GetName|l] estrangulou o comércio em todo o reino.\n\n[loneless_vassal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] entra aos tropeços na corte, com aparência de mendig[loneless_vassal.Custom('ES_OA')]. "A perseguição expulsou os agiotas, meu [ROOT.Char.GetTitleAsNameNoTooltip]. O medo da contaminação — e da turba — silencia cada moeda. A usura desapareceu. Meus cofres estão secos. Os seus podem ser os próximos"."
 epidemic_events.1065.c: "[loneless_vassal.GetPrimaryTitle.GetNameNoTierNoTooltip|U] será um local seguro para todos."
 epidemic_events.1066.t: "Posso oferecer-lhe um empréstimo."
 epidemic_events.1066.desc: "É lamentável."
 epidemic_events.1066.a: "Todas as posses de [loneless_vassal.GetName]"
 epidemic_events.1066.b: "Uma Sombra Sobre [infected_county.GetNameNoTierNoTooltip|U]"
 epidemic_events.1066.c: "As ruas de [infected_county.GetNameNoTier] ficaram silenciosas. [ROOT.Char.GetFaith.DeathDeityName|U] lançou sua praga sobre"
 epidemic_events.1067.t: "Percorrer [infected_county.GetNameNoTier] é ser tratado com uma sinfonia terrível de sofrimento humano. A peste chegou a"
 epidemic_events.1067.desc: "Uma caminhada por [infected_county.GetNameNoTier] revela algo profundamente desagradável. Uma praga chegou a"
 epidemic_events.1067.a: "este lugar mais sagrado.\n\n"
 epidemic_events.1067.b: "esta outrora próspera metrópole.\n\n"
 epidemic_events.1067.c: "este modesto vilarejo.\n\n"
 every_bordering_county: "Os infectados estão cobertos da cabeça aos pés com erupções que estão quentes ao toque.\n\n"
 epidemic_events.1068.t: "Bubões pustulentos pretos cobrem a pele dos infectados, cheios de um líquido fétido que emite um ar ruim quando estourado.\n\n"
 epidemic_events.1068.desc: "A pele dos infectados é vermelha escura e coberta de inchaços e protuberâncias. Inúmeras cicatrizes frescas cobrem a pele devido à coceira interminável, e aqueles olhos desesperados estão vermelhos e injetados.\n\n"
 epidemic_events.1068.a: "A pele irregular dos doentes é vermelho brilhante e dolorida ao toque. Eles suam mesmo no frio e têm o olhar de um leproso em seus olhos.\n\n"
 epidemic_events.1068.b: "Ao encontrar os olhos dos infectados, eles parecem ocos e vazios por dentro, como se o espírito estivesse em outro lugar. Suas roupas estão manchadas de vermelho profundo ao redor da parte de trás, e eles seguram suas barrigas como se estivessem prestes a cair.\n\n"
 epidemic_events.1068.c: "Os infectados frequentemente se contorcem em danças profanas em intervalos aleatórios entre acessos de gemidos sem sentido e sujando as ruas.\n\n"
 all_of_vassals_holding: "Em todos os lugares que se vai, não se pode escapar do barulho incessante de tosses e pigarros dos infectados, sangue coagulado manchando suas roupas de um vermelho profundo.\n\n"
 epidemic_events.1100.t: "A população está aflita com humores ruins de todos os tipos, resultando em sintomas que são numerosos demais para nomear.\n\n"
 epidemic_events.1100.desc.intro.apocalyptic: "Não há alma na cidade que não tenha sido atingida por essa terrível doença e ela continua a se espalhar rapidamente em direção à classe nobre."
 epidemic_events.1100.desc.intro.major: "Pelo menos metade da população camponesa foi infectada, e é apenas uma questão de tempo até que se espalhe para a nobreza."
 epidemic_events.1100.desc.intro.fallback: "Enquanto os números permanecem baixos, é apenas uma questão de tempo até que se espalhe mais."
 epidemic_events.1100.desc.intro2.holy_site: "Já estão chamando esta aflição de \"[epidemic.GetName|l]\", e está acontecendo em minha própria porta."
 epidemic_events.1100.desc.intro2.cool_place: "Já estão chamando esta aflição de \"[epidemic.GetName|l]\"."
 epidemic_events.1100.desc.intro2.backwater: "Receio que seja tarde demais..."
 epidemic_events.1100.desc.mid.typhus: "Esses pobres camponeses doentes..."
 epidemic_events.1100.desc.mid.bubonic_plague: "Bem, não há nada que eu possa fazer."
 epidemic_events.1100.desc.mid.smallpox: "Vou ficar atento."
 epidemic_events.1100.desc.mid.measles: "Eu #EMP nunca#! vou sair do meu quarto!"
 epidemic_events.1100.desc.mid.dysentery: "Já sobrevivi a coisas piores."
 epidemic_events.1100.desc.mid.ergotism: "Que desperdício de boa carne."
 epidemic_events.1100.desc.mid.consumption: "Não posso apenas esperar em um barco?"
 epidemic_events.1100.desc.mid.fallback: "[ROOT.Char.GetFaith.HealthGodName|U] nos proteja."
 epidemic_events.1100.desc.mid2.apocalyptic: "Alguém deveria fazer algo."
 epidemic_events.1100.desc.mid2.major: "Chame o médico!"
 epidemic_events.1100.desc.mid2.fallback: "Chame um médico!"
 epidemic_events.1100.desc.outro.capital: "Você buscará um [GetCourtPositionType('court_physician_court_position').GetName()|l] para ajudar a conter a [epidemic|lE]"
 epidemic_events.1100.desc.outro: "Seu [GetCourtPositionType('court_physician_court_position').GetName()|l] fornecerá muitas opções para neutralizar a [epidemic|lE]"
 epidemic_events.1100.a.already_has_it: "Corpos nas Ruas"
 epidemic_events.1100.a.compassionate: "[chaplain.Custom2('MyCharacterIntroduction', ROOT.Char)|U] chega com o semblante pálido.\n\nMeu [ROOT.Char.GetLadyLord], os mortos apodrecem nas ruas. Não conseguimos enterrá-los rápido o suficiente; o miasma é denso. Devemos abrir o [GetBuilding('burial_site_01').GetName|l] em [graveyard_county.GetName].\n\nNão pede permissão; implora por ela."
 epidemic_events.1100.a.callous: "Muito bem."
 epidemic_events.1100.a.diligent: "Aquele local é apenas para mim e os meus."
 epidemic_events.1100.a.paranoid: "Um Presente Horrendo"
 epidemic_events.1100.a.brave: "Ao entrar em [flung_corpse_location.GetName], uma ideia diabólica me passa pela cabeça. Algumas tropas jazem à beira da morte, doentes de [epidemic_scope.GetName|l] e logo deixarão este mundo. No entanto, ainda poderiam servir-me nesta guerra mesmo na morte.\n\nCertamente a miasma dos cadáveres fará adoecer mais dos meus soldados, a menos que nos desfaçamos dos corpos de algum modo. Talvez possamos fazer com que [corpse_flingee.GetName] se ajoelhe se lhe enviarmos um presentinho via catapulta..."
 epidemic_events.1100.a.cannibal: "Carregue os corpos!"
 epidemic_events.1100.a.eccentric: "Isso é obsceno!"
 epidemic_events.1100.a.zealous: "Um Presente do Além"
 epidemic_events.1100.a: "As tropas de [corpse_flinger.GetName] invadiram minhas terras e parecem ter parado diante do meu domínio; talvez seja o início de um cerco.\n\nPouco depois, ouço um estrondo repentino vindo de fora, como um estalo úmido. Corro para ver o que poderia ter causado um som tão sobrenatural, e o que vejo me gela.\n\nOs restos dilacerados de um cadáver jazem em uma poça de carne e ossos, como uma macabra vitrine de açougue. O corpo está evidentemente infestado por alguma doença estranha e, se nada for feito, certamente haverá um surto."
 epidemic_events.1100.b: "Arremesse-o de volta!"
 epidemic_events.1100.c: "A praga é evitada"
 look_for_physician_epidemic_tt: "Os corpos estão muito destruídos para serem movidos"
 physician_will_help_epidemic_tt: "Quarentena no corpo e limpe este lugar!"
 epidemic_events.1110.t: "A quarentena é bem-sucedida"
 epidemic_events.1110.desc: "A quarentena falha"
 epidemic_events.1110.a: "Apenas mantenha-o longe de mim!"
 epidemic_events.1110.b: "Um Presente Retornando"
 epidemic_events.1120.t: "Um assobio suave preenche o ar conforme algo aparece além dos muros de [flung_corpse_location.GetName]. O assobio fica mais alto até que, de repente, o objeto aterra com um estrondo no meio do acampamento.\n\nSangue, ossos e dentes jazem em uma cratera escassamente presos à carne irreconhecível a que um dia pertenceram. Parece que nosso 'presente' encontrou seu caminho de volta para nós."
 epidemic_events.1120.desc: "Está muito desfigurado para ser movido agora."
 epidemic_events.1120.a: "Recolha-os e tente novamente!"
 epidemic_events.1120.b: "Você arremessa o 'corpo' de volta"
 epidemic_events.1121.t: "$plague_still_infects_tt$"
 epidemic_events.1121.desc: "A Chuva de Carne"
 epidemic_events.1121.a: "Ouço o suave som de chuva batendo na minha janela. Fico um pouco agitado, pois o céu estava limpo da última vez que tive tempo de olhar, então espio para fora e vejo que o céu ainda está azul.\n\nEstendo a mão para fora da janela e me perturba ver sangue marrom escuro encharcar meus dedos. Por toda parte lá fora, minhas terras estão sendo encharcadas com a substância pútrida, com o ocasional som pesado de pedaços de carne. Os corpos evidentemente foram arremessados novamente, embora agora estejam tão castigados por este tormento que foram reduzidos a nada além de uma massa de sangue e vísceras."
 plague_averted_tt: "Absolutamente horrível."
 plague_still_infects_tt: "Queimar os animais não teve efeito"
 epidemic_events.1121.b: "#EMP Os julgamentos terminarão...#!"
 epidemic_events.1121.b.success: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'deu', 'deu' )] ajuda financeira para [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'sua tesouraria', TARGET_CHARACTER.GetShortUIName )] durante uma epidemia."
