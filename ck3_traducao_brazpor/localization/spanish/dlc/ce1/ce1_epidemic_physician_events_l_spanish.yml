l_spanish:
 physician_epidemic_events.1000.t: "Tratamento Inconvencional"
 physician_epidemic_events.1000.desc: "Meu [physician.Custom2('MyCharacterIntroduction', ROOT.Char)] e [zealous_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)] estão em pé de guerra sobre como lidar com a propagação da peste de [epidemic_scope.GetName|l].\n\n\"Sou médic[physician.Custom('ES_OA')], insiste Talāra. \"Deixem-me purgar esta peste!\".\n\n\"Heresia!\", rosna Mahakala. \"Devemos ungir os mortos e lhes dar os devidos ritos [zealous_courtier.GetFaith.GetAdherentName]\"."
 physician_epidemic_events.1000.a: "Talvez devêssemos simplesmente manter os corpos longe dos vivos."
 physician_epidemic_events.1000.b: "Devemos fazer tudo o que pudermos para acabar com esta praga."
 physician_epidemic_events.1000.b.success: "O tratamento funciona"
 physician_epidemic_events.1000.b.failure: "O tratamento falha"
 physician_epidemic_events.1000.c: "Não vamos profanar esses corpos."
 physician_epidemic_events.1010.t: "Quarentena"
 physician_epidemic_events.1010.desc: "À medida que a epidemia de [epidemic_scope.GetName|l] se espalha, meu [physician.Custom2('MyCharacterIntroduction', ROOT.Char)] defende uma medida drástica: isolar os doentes. \"O miasma se apega aos cadáveres\", adverte, \"e o ar viciado alimenta a peste\".\n\n[physician.GetFirstNameNoTooltip|U] quer impor quarentena — ninguém entra ou sai das terras infectadas.\n\n\"Em tempos desesperados, meu Kaiser, devemos fazer o que for necessário\"."
 physician_epidemic_events.1010.a: "Promulgar esta 'quarentena'."
 physician_epidemic_events.1010.b: "Isso é muito extremo."
 physician_epidemic_events.1020.t: "[epidemic.GetNameNoTooltip|U]: Prevenção Precoce"
 physician_epidemic_events.1020.start.desc: "A luz fraca e trêmula da enfermaria de [physician.GetFirstName] ilumina a cena enquanto [Select_CString( physician.IsFemale, 'la médica', 'el medico' )] traça um plano de ataque.\n\n“Os afetados por este surto de [epidemic.GetName|l]"
 missing_epidemic: "se contorcendo de agonia"
 physician_epidemic_events.1020.start.desc2: "como nunca vi antes."
 physician_epidemic_events.1020.safe_recommendation.desc: "Minha recomendação como profissional é que adotemos uma abordagem suave para prevenir a propagação. Afinal, não queremos prejudicar a economia."
 physician_epidemic_events.1020.risky_recommendation.desc: "Esta peste corre o risco de desestabilizar todo o reino, nosso povo e colheitas serão dizimados se não tomarmos medidas radicais."
 physician_epidemic_events.1020.mystic_recommendation.desc: "Esta peste nos foi enviada por [physician.GetFaith.DevilName], e é apenas pensando fora da caixa da medicina tradicional que podemos esperar desfazer esta maldição!"
 physician_epidemic_events.1020.end.desc: "\n\nEm última análise, a estratégia exata para prevenir a propagação desta praga é minha para decidir."
 physician_epidemic_events.1020.a: "Uma abordagem suave é a melhor."
 physician_epidemic_events.1020.b: "Medidas desesperadas são necessárias."
 physician_epidemic_events.1020.c: "Quaisquer práticas esotéricas que forem necessárias, nós faremos."
 physician_epidemic_events.1020.d: "A melhor ação é a inação."
 physician_epidemic_events.1021.t: "Prevenção Precoce: Sucesso"
 physician_epidemic_events.1021.desc: "Parece que a abordagem moderada provou ser bem-sucedida, com uma desaceleração na propagação dos sintomas da doença entre os plebeus. Embora o impacto seja bastante mínimo, pelo menos deve conceder mais tempo para trabalhar em uma solução mais permanente."
 physician_epidemic_events.1021.a: "Maravilhoso!"
 physician_epidemic_events.1022.t: "Prevenção Precoce: Falha"
 physician_epidemic_events.1022.desc: "As medidas preventivas de [physician.GetName] não apenas fracassaram, como parecem ter de fato irritado os humores e tornado a corrupção tanto mais infecciosa quanto mais grave."
 physician_epidemic_events.1023.t: "$physician_epidemic_events.1021.t$"
 physician_epidemic_events.1023.desc: "A doença que estava prestes a se espalhar como fogo sobre papel em todo o meu reino diminuiu para uma rasteira. As medidas radicais propostas por [physician.GetFirstName] cobraram um preço na economia a curto prazo, mas [epidemic.GetName|l] pode não ser exatamente a ameaça que todos temíamos."
 physician_epidemic_events.1023.a: "$physician_epidemic_events.1021.a$"
 physician_epidemic_events.1024.t: "$physician_epidemic_events.1022.t$"
 physician_epidemic_events.1024.desc: "Além de causar enormes danos à economia, os tratamentos de [physician.GetName] provocaram a perda de inúmeras vidas. Os camponeses, já enfraquecidos pelos estragos da doença, não puderam resistir aos embates das sangrias e das sanguessugas. Essa perda de vidas parece ter trazido consigo um aumento na propagação da doença, já que o miasma se adere aos cadáveres e infesta os pulmões dos sãos."
 physician_epidemic_events.1025.t: "$physician_epidemic_events.1021.t$"
 physician_epidemic_events.1025.desc: "Embora muitos os considerassem heréticos, os tratamentos de [physician.GetName] parecem ter funcionado bastante bem para retardar a propagação da doença. Regimes de exercícios para expelir a corrupção pelo suor, sangrias para liberar os maus humores e limpezas completas para evitar o acúmulo de miasma parecem ser exatamente o que é preciso para deter o surto de [epidemic.GetName|l]!"
 physician_epidemic_events.1025.a: "$physician_epidemic_events.1021.a$"
 physician_epidemic_events.1026.t: "$physician_epidemic_events.1022.t$"
 physician_epidemic_events.1026.desc: "Arrisquei-me ao aprovar os tratamentos her?ticos propostos por [physician.GetName], uma medida que parece ter desagradado muito a [ROOT.Char.GetFaith.HighGodName]. Agora estou sendo punido no sangue do meu povo, pois os tratamentos de [physician.GetNameNoTooltip] deixam os doentes e debilitados exaustos e sem sangue nas ruas. Fazem-nos engolir \"rem?dios\" incomuns e n?o comprovados antes de drenar seu sangue e exaurir seus corpos. Um espet?culo hediondo para qualquer um testemunhar, e uma maneira verdadeiramente grotesca de tratar os moribundos."
 physician_epidemic_events.1030.t: "Um Compendium Farmacêutico"
 physician_epidemic_events.1030.desc: "[physician.Custom('ES_ElLa')|U] O médico da minha corte se aproxima com um livro na mão e os olhos brilhando de propósito.\n\nMeu [ROOT.Char.GetTitleAsNameNoTooltip], estudei muitos supostos tratamentos para os surtos de [epidemic_scope.GetName|l]. Com vosso patrocínio, eu poderia compilar minhas descobertas — um presente para as gerações futuras."
 physician_epidemic_events.1030.a: "Muito bem."
 physician_epidemic_events.1030.a.failure: "O livro é um absurdo"
 physician_epidemic_events.1030.a.success: "Um grande livro farmacêutico é compilado"
 physician_epidemic_events.1030.b: "Isso parece ser um desperdício de dinheiro."
 physician_epidemic_events.1040.t: "Espectro"
 physician_epidemic_events.1040.desc: "[physician.Custom('ES_ElLa')|U] meu médico da corte se inclina profundamente antes de falar.\n\n\"Meu duque, cuidar dos enfermos levou nossos esforços ao limite — e o povo murmura que a Coroa já não se importa. Se vós abençoásseis algumas moedas e as distribuísseis entre a população, isso poderia apaziguar sua ira. Dizem que um toque real traz cura\"."
 physician_epidemic_events.1040.a: "Uma excelente ideia!"
 physician_epidemic_events.1040.b: "Não há casas de saúde?"
 physician_epidemic_events.1050.t: "A estalagem [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip]"
 physician_epidemic_events.1050.desc: "Meus guardas trazem até mim [physician.Custom2('MyCharacterIntroduction', ROOT.Char)] algemad[physician.Custom('ES_OA')].] Ele tem tratado soldados feridos —amigos e inimigos por igual— após cada batalha.\n\nChamam seu abrigo de «Pousada [ROOT.Char.GetPrimaryTitle.GetAdjective]» e meus comandantes exigem que seja fechado. Mas Edaraja só diz: «Eles sangram e sofrem como os nossos. Quem sou eu para expulsá-los?»."
 physician_epidemic_events.1050.a: "[physician.GetFirstNameNoTooltip] tem minha permissão para continuar."
 physician_epidemic_events.1050.b: "Solo me sirves a #EMP mí#!!"
 physician_epidemic_events.1060.t: "Um Banimento Desesperado"
 physician_epidemic_events.1060.desc: "[gross_sick_person.Custom2('MyCharacterIntroduction', ROOT.Char)|U] está pálido e ofegante. A peste invadiu meus próprios salões.\n\n[physician.Custom2('MyCharacterIntroduction', ROOT.Char)|U] exige medidas drásticas: \"É preciso remover os já doentes, meu senhor[ROOT.Char.Custom('ES_XA')]…, ou corremos o risco de perder todos eles\".\n\nÉ uma ideia cruel. Mas será mais cruel esperar?"
 physician_epidemic_events.1060.a: "Tire todos eles imediatamente!"
 physician_epidemic_events.1060.b: "Que sugestão grosseira."
 every_infected_courtier_or_guest: "Cada cortesão ou convidado infectado"
 every_uninfected_courtier_or_guest: "Cada cortesão ou convidado saudável"
