 game_concept_epidemic: "Praga"
 game_concept_epidemic_desc: "Uma $game_concept_epidemic$ é o surto de uma doença que se espalha pelo mapa, causando efeitos locais e infectando os personagens em sua área. As [baronies|lE] afetadas têm uma [infection_rate|lE] que determina sua gravidade e pode ser combatida melhorando a [epidemic_resistance|lE].\n\nUma Peste pode ter diferentes [Concept( 'plague_intensities', 'intensidades' )|E], afetando sua área de efeito, duração e [fatalities|lE]."
 game_concept_epidemic_i: "@epidemic_icon!"
 game_concept_epidemics: "Pragas"
 game_concept_epidemics_desc: "$game_concept_epidemic_desc$"
 game_concept_infection_rate: "Taxa de Infecção"
 game_concept_infection_rate_desc: "As [baronies|lE] afetadas por [epidemics|lE] têm um $game_concept_infection_rate$ que determina sua gravidade e a força de seus efeitos.\n\nO $game_concept_infection_rate$ sempre progredirá em direção ao seu valor máximo se nada for feito para combatê-lo. As [epidemics|lE] menores, maiores e apocalípticas progredirão em velocidades diferentes, marcadas por sua intensidade.\n\nPara mitigar o impacto da infecção, os [rulers|lE] podem melhorar a [epidemic_resistance|lE] de seu [realm|lE]."
 game_concept_infection_rates: "Taxas de Infecção"
 game_concept_infection_rates_desc: "$game_concept_infection_rate_desc$"
 game_concept_epidemic_resistance: "Resistência à Praga"
 game_concept_epidemic_resistance_desc: "A $game_concept_epidemic_resistance$ reduz a [infection_rate|lE] de uma [barony|lE] ou [county|lE], mitigando os efeitos de uma [epidemic|lE].\n\nA $game_concept_epidemic_resistance$ pode ser aumentada através de [buildings|lE] como $building_type_hospices_01$ ou $building_type_burial_site_01$ #weak ([duchy_building|lE])#!, tarefas [court_position_tasks|lE] realizadas pelo $court_physician_court_position$, [decisions|lE] ou eventos."
 game_concept_epidemic_res: "Res. à Praga"
 game_concept_epidemic_res_desc: "$game_concept_epidemic_resistance_desc$"
 game_concept_infection_chance: "Chance de Infecção"
 game_concept_chance_of_infection: "Chance de Infecção"
 game_concept_infection_chance_desc: "Sua $game_concept_infection_chance$ determina quão provável é contrair [diseases|lE] de uma [epidemic|lE] em curso."
 game_concept_plague_intensity: "Intensidade da Praga"
 game_concept_plague_intensity_desc: "Uma [epidemic|lE] pode ser Apocalíptica, Maior ou Menor, afetando sua área de disseminação, a duração e os [characters|lE] que são infectados por ela, causando [fatalities|lE]."
 game_concept_plague_intensities: "Intensidades da Praga"
