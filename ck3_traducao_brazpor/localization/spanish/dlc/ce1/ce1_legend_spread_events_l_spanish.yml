l_spanish:
 legend_debug.0001.desc: "#D Este é um evento de depuração#!"
 legend_spread_events.0001.t: "Vozes Inocentes"
 legend_spread_events.0001.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('chronicler'))] [chronicler.GetFirstName] me recebe com um sorriso generoso em sua biblioteca.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], em nosso esforço para escrever vossa lenda, pensamos em enviar algumas crianças pelos mercados para enaltecer os feitos de [ancestor.GetName]"."
 legend_spread_events.0001.a: "\"Envie-as imediatamente!\""
 legend_spread_events.0001.b: "\"Não temos como provar isso. Seja discreto.\""
 legend_spread_events.0001.c: "\"Na verdade... [my_child.GetShortUIName] pode se juntar a elas.\""
 legend_spread_events.0001.d: "\"Eu sou #EMP minha#! própria lenda.\""
 legend_spread_events.0001.a.tt.success: "Suas palavras parecem convincentes"
 legend_spread_events.0001.a.tt.failure: "Ninguém acredita nas crianças"
 legend_my_own_ancestor_modifier: "Minha Própria Lenda"
 legend_my_own_ancestor_modifier_desc: "Este personagem está destinado a se tornar seu próprio ancestral mítico"
 legend_spread_events.0010.t: "Um Verdadeiro Caçador"
 legend_spread_events.0010.desc: "Uma voz melódica chama minha atenção no instante em que abro a [ROOT.Char.Custom('GetDoor')] do salão. Alguns dos meus [ROOT.Char.Custom('GetFollowerOrVassalPlural')] cercam meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('bard'))] [bard.GetFirstName], que toca seu [bard.Custom('GetMusicalInstrument')], quase subindo na mesa de tanta emoção.\n\n\"E aqui está ele!\"[ROOT.Char.GetHerHim] grita, \"nosso[ROOT.Char.Custom('ES_OA')] mesmo[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l], cuja lenda eu canto com tanto fervor, pois com suas próprias mãos abateu…\""
 legend_spread_events.0010.a: "… um dragão!"
 legend_spread_events.0010.a.tt.success: "Todo o salão aplaude!"
 legend_spread_events.0010.a.tt.failure: "Suas mentiras são muito óbvias"
 legend_spread_events.0010.b: "… uma besta #EMP enorme#!!"
 legend_spread_events.0010.b.tt.success: "Os cortesãos cantam com você"
 legend_spread_events.0010.c: "… apenas um grande urso, nada mais."
 legends_dragon_slayer: "Caçador de Dragões"
 legends_dragon_slayer_desc: "Este personagem afirma ter caçado um dragão."
 legend_spread_events.0020.t: "Espalhando Rumores"
 legend_spread_events.0020.desc.intro: "Enquanto desço as escadas e atravesso o pátio em passeio, chego a um dos corredores de onde os servos costumam vigiar as crianças.\n\nMas não é um servo que encontro. A voz [courtier.Custom('ES_DelDela')] [courtier.GetTitledFirstName|l] chega até mim, alta e clara, e me oculto entre os pilares de pedra:\n\n\"E, afinal, o que [protagonist.Custom('ES_ElLa')|l] [protagonist.GetTitledFirstName|l] fez? Houve algum de nós lá para ver essa suposta #EMP leyenda#! que agora"
 legend_spread_events.0020.desc.you_protag: "[ROOT.Char.GetSheHe]"
 legend_spread_events.0020.desc.other_protag: "[ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitledFirstName|l]"
 legend_spread_events.0020.desc.outro: "tão orgulhosamente nos faz cantar agora?\""
 legend_spread_events.0020.a: "Deixe que fale o quanto quiser. Nas masmorras."
 legend_spread_events.0020.b: "\"Você, aí!\""
 legend_spread_events.0020.b.tt.success: "[courtier.GetShortUINameNoTooltip] se desculpa"
 legend_spread_events.0020.b.tt.failure: "[courtier.GetShortUINameNoTooltip] se sente ofendido"
 legend_spread_events.0020.c: "Melhor fingir que não ouvi nada..."
 legend_put_out_rumors_modifier: "Lenda Desacreditada"
 legend_put_out_rumors_modifier_desc: "Este personagem espalhou rumores duvidando de sua lenda."
 legend_sus_rumors_modifier: "Lenda Suspeita"
 legend_sus_rumors_modifier_desc: "A lenda reivindicada por este personagem foi questionada por seus cortesãos."
 legend_spread_events.0030.t: "Você Se Lembra?"
 legend_spread_events.0030.desc.intro: ""Então, dizei-me, [ROOT.Char.Custom('FormOfAddressForLiege')]…", a voz da minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('chronicler'))] [chronicler.GetFirstName] tira-me dos meus pensamentos e eu [chronicler.GetHerHim] encontro acenando com a mão, com a pena derramando tinta pelo chão.\n\n"
 legend_spread_events.0030.desc.you_protag: "\"E sobre aquela vez que [legend_memory.GetSecondPerspectiveDescription]? Isso certamente vale a pena adicionar à sua lenda...\""
 legend_spread_events.0030.desc.other_protag: ""E sobre aquela vez que [legend_memory.GetThirdPerspectiveDescription]? Isso certamente mereceria ser acrescentado à sua lenda…"."
 legend_spread_events.0030.a: "\"Você não me ouviu da última vez?\""
 legend_spread_events.0030.a.flavor: "#EMP Bocejo...#! Tenho coisas melhores para fazer."
 legend_spread_events.0030.b: "Ah, aquilo foi uma ocasião tão #EMP grandiosa#!..."
 legend_spread_events.0030.b.tt.success: "Todos se lembram do seu grande feito"
 legend_spread_events.0030.b.tt.failure: "As pessoas não parecem convencidas"
 legend_spread_events.0030.c: "Não sinto necessidade de mencionar isso novamente."
 humble_content_courtiers_and_guests: "Todos os [GetTrait('humble').GetName( GetNullCharacter )|l] ou [courtiers|lE] e [guests|lE] [GetTrait('content').GetName( GetNullCharacter )|l]"
 legend_lazy_modifier: "Não é Minha Responsabilidade"
 legend_lazy_modifier_desc: "Este personagem deixou o registro dos detalhes mais finos de sua lenda para outra pessoa."
 legend_memory_deed_modifier: "Memória Recente"
 legend_memory_deed_modifier_desc: "As façanhas extraordinárias deste personagem ainda estão presentes na memória de seu povo."
 legend_spread_events.0040.t: "Uma Petição Lacrimosa"
 legend_spread_events.0040.desc.intro: ""Ah, como a luz brilha agradavelmente em tal [SelectLocalization(IsLandlessAdventurer(ROOT.Char),'room_command_tent','room_throne_room')] esta manhã, [ROOT.Char.Custom('FormOfAddressForLiege')]", diz meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('chronicler'))] [chronicler.GetFirstName], caminhando pelo meu [ROOT.Char.Custom('GetRoom')].\n\n"Sem dúvida, isso me lembra o dia em que o destino decidiu começar"
 legend_spread_events.0040.desc.you_protag: "sua lenda... você se lembra de como foi benevolente,"
 legend_spread_events.0040.desc.other_protag: "a lenda [protagonist.Custom('ES_DelDela')] [protagonist.GetTitledFirstName|l]… Vocês se lembram de sua benevolência"
 legend_spread_events.0040.desc.outro: "ao ouvir a súplica desesperada daquele camponês?", diz com uma piscadela eloquente."
 legend_spread_events.0040.a: "Por que #EMP yo#! iria sequer ouvir um camponês?"
 legend_spread_events.0040.b: "\"Ah, que alma piedosa eu sou!\""
 legend_spread_events.0040.b.tt.success: "Sua piedade é impressionante"
 legend_spread_events.0040.b.tt.failure: "Sua piedade é claramente uma mentira"
 legend_spread_events.0040.c: "\"O que isso acrescentaria?\""
 legend_spread_events.0050.t: "Ao serviço de uma[honored_lady.Custom('ES_XA')] [honored_lady.GetLadyLord]"
 legend_spread_events.0050.desc: "#EMP E [ROOT.Legend.GetProtagonist.GetSheHe] era galante\ne [honored_lady.GetSheHe] era bel[honored_lady.Custom('ES_OA')].\nE [ROOT.Legend.GetProtagonist.GetSheHe] era [Select_CString(ROOT.Legend.GetProtagonist.IsFemale,'uma heroína','um herói')]\ne [honored_lady.GetSheHe] era pura belezaaaaaaa!#!.\n\nNão levo muito para descobrir de onde vem a música, pois logo encontro [bard.Custom('ES_AlAla')] [bard.GetTitledFirstName|l], afinando brincalhonamente seu instrumento, apoiad[bard.Custom('ES_OA')] em um banco de pedra.\n\nAh, [ROOT.Char.Custom('FormOfAddressForLiege')], seus olhos imediatamente se iluminam, não é verdade que o motivo da sua lenda foi impressionar [honored_lady.Custom('ES_AlAla')] [honored_lady.GetTitledFirstName|l]?"
 legend_spread_events.0050.a: ""Como ousa você!? Eu estou #EMP Casad[ROOT.Char.Custom('ES_OA')]#! casado(a) mesmo!""
 legend_spread_events.0050.b: "Sim, [honored_lady.GetFirstNameNoTooltip] é realmente bel[honored_lady.Custom('ES_OA')]…"
 legend_spread_events.0050.b.tt.success: "Seu gesto impressiona [honored_lady.GetFirstNameNoTooltip]"
 legend_spread_events.0050.b.tt.failure: "Seu gesto repugna [honored_lady.GetFirstNameNoTooltip]"
 legend_spread_events.0050.c: "\"Eu fiz isso por mim mesmo.\""
 legend_spread_events.0060.t: "Mais Mito do que Lenda"
 legend_spread_events.0060.desc.intro: ""Algumas palavras, meu [ROOT.Char.GetLadyLord]", [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('courtier'))] [courtier.GetFirstName] se aproxima de mim, com um rosto preocupado. "É sobre"
 legend_spread_events.0060.desc.you_protag: "sua"
 legend_spread_events.0060.desc.other_protag: "a lenda de [ROOT.Legend.GetProtagonist.GetShortUIName]…"
 legend_spread_events.0060.desc.outro: "Tem-se ouvido [bad_vassal.Custom('ES_AlAla')] [bad_vassal.GetTitledFirstName|l]a colocá-la em dúvida, e os mexericos da corte começaram a repercutir.\n\nSe não se apressarem a deter[bad_vassal.Custom('ES_LoLa')], receio que todos os camponeses do senhorio acreditem que é uma invenção."
 legend_spread_events.0060.a: ""Desgraçado [bad_vassal.Custom2('InsultNoun', ROOT.Char)]…""
 legend_spread_events.0060.b: "Minha palavra é mais forte que a sua."
 legend_spread_events.0060.b.tt.success: "As pessoas acreditam em você"
 legend_spread_events.0060.b.tt.failure: "[bad_vassal.GetShortUIName] é acreditado"
 legend_spread_events.0060.c: "Que coragem a sua de tentar isso comigo…"
 legend_spread_events.0060.d: "Deixe-os falar."
 legend_no_mocking_modifier: "Lenda Respeitada"
 legend_no_mocking_modifier_desc: "Este personagem fez com que a zombaria de sua lenda parasse imediatamente."
 legend_extra_mocking_modifier: "Lenda Zombada"
 legend_extra_mocking_modifier_desc: "A lenda deste personagem foi zombada por muitos."
 not_believable_modifier: "Abertamente Traidor"
 not_believable_modifier_desc: "As mentiras deste personagem contra seu suserano foram descobertas e revertidas contra eles."
 legend_spread_events.5000.t: "Fundamentos Sólidos"
 legend_spread_events.5000.desc: "O sol brilha intensamente sobre [capital.GetName] enquanto [chronicler.GetFirstName] e eu vagamos pelas ruas movimentadas. É um bom assentamento.\n\nPercebo que, na verdade, é um assentamento #EMP muito#! bom ao observar a intrincada alvenaria do arco sob o qual passamos. [chronicler.GetFirstNameNoTooltip] fixa o olhar em mim.\n\n“É justo reconhecer o mérito dos antepassados desse povo por terem criado este lugar”, começa ele. “Tanto mérito que, às vezes, você chega a se perguntar se foram mesmo eles...”"
 legend_spread_events.5000.a: "\"Esta arquitetura é #EMP claramente#! não de origem [culture.GetNameNoTooltip]!\""
 legend_spread_events.5000.b: "Certamente isso #EMP deve#! ter sido feito por não-[culture.GetCollectiveNounNoTooltip]?"
 legend_spread_events.5000.b.tt.success: "As pessoas parecem estar convencidas"
 legend_spread_events.5000.b.tt.failure: "Os orgulhosos plebeus rejeitam furiosamente suas afirmações"
 legend_spread_events.5000.c: "Certamente tal alvenaria poderia ser usada para algo melhor?"
 legend_spread_events.5000.d: "Esses ancestrais eram verdadeiramente pessoas trabalhadoras."
 legend_spread_events.5005.t: "A bênção de um[parent.Custom('ES_XA')] [parent.GetMotherFather]"
 legend_spread_events.5005.desc: "Encontrar meu [parent.GetMotherFather], [parent.GetFirstName], é um prazer raro hoje em dia, mas aqui estamos neste lugar de culto. [chronicler.GetFirstName] mantém uma respeitosa distância ao lado enquanto nos cumprimentamos.\n\n"[ROOT.Char.GetFirstName]! Que surpresa!", exclama [parent.GetSheHe], me abraçando. Sorri com nostalgia, olhando para as paredes ao redor. "Isso realmente me faz sentir jovem de novo. Você sempre foi uma criança tão piedosa. Sabia que, quando era apenas um bebê, você se recusava a se alimentar nos dias santos?".[ROOT.Char.Custom('ES_XA')] crianç[ROOT.Char.Custom('ES_OA')] tão piedos[ROOT.Char.Custom('ES_OA')]?\n\nEu... não sabia, não."
 legend_spread_events.5005.regular: "Pelo canto do olho, vejo [chronicler.GetFirstNameNoTooltip] começar a alcançar por seus [ROOT.Char.Custom('GetWritingMaterial')]."
 legend_spread_events.5005.parent_chronicler: "Talvez a meu querido[parent.Custom('ES_OA')] [parent.Custom('MotherFather')], como meu cronista[parent.Custom('ES_OA')] que é, poderia ser persuadido a colocar isso por escrito, não?"
 legend_spread_events.5005.a: "\"[parent.Custom('MotherFather')|U] por favor, você me constrange!\""
 legend_spread_events.5005.b: "\"Por favor, me lembre?\""
 legend_spread_events.5005.b.tt: "Bem, isso poderia ajudar meu caso..."
 legend_spread_events.5005.c: "Chega de falar sobre mim. Como estão #EMP vocês#!, [parent.Custom('MotherFather')]?"
 legend_spread_events.5010.t: "Imposição de Mãos"
 legend_spread_events.5010.desc: "Meu cronista [chronicler.GetFirstName] é afastad[chronicler.Custom('ES_OA')] do caminho quando uma figura estranha se lança contra mim na rua. Meus guardas intervêm e apontam suas armas, mas está claro que esta pobre alma não quer me machucar.\n\n\"Por favor!\", a respiração lhe falha ao falar. \"Estou muito doent[sick.Custom('ES_OA')]. Não me ocorreu nada além de tentar sair até aqui quando o vi passar, [ROOT.Char.Custom('FormOfAddressForLiege')]\".\n\n\"Já ouvi… falar dos milagres que você pode realizar. Basta um toque!\". [sick.GetSheHe|U] se aproxima cambaleando, estendendo os braços em súplica."
 legend_spread_events.5010.a: "\"Você deve doar para os mais necessitados.\""
 legend_spread_events.5010.a.tt: "Ao menos, incentivar doações aos necessitados fará #EMP minha#! imagem melhorar..."
 legend_spread_events.5010.b: "Bem, se isso funcionar..."
 legend_spread_events.5010.b.criticalsuccess: "[Select_CString( sick.IsFemale, 'La enferma', 'El enfermo' )] se cura"
 legend_spread_events.5010.b.success: "Eles dizem que já se sentem um pouco melhor"
 legend_spread_events.5010.b.failure: "Não parece haver mudança alguma"
 legend_spread_events.5010.c: "\"Por favor. Você deve procurar um tratamento adequado, em um hospício local.\""
 legend_spread_events.5015.t: "Um Legado Sangrento"
 legend_spread_events.5015.desc: "Experimento a lâmina de uma espada enquanto meu cronista [chronicler.GetFirstName] e eu examinamos o arsenal de [SelectLocalization( IsLandlessAdventurer( ROOT.Char ), 'meu acampamento', 'location.GetName')]. Ela está afiada e bem amolada. No entanto, [chronicler.GetFirstNameNoTooltip] está mais interessado em outra arma pendurada na parede.\n\n“Ouvi falar tanto dessa poderosa arma, [ROOT.Char.Custom('FormOfAddressForLiege')]”, diz ele, admirado. “Ouvi dizer que, só pela sua mão, ela matou meia dúzia!\n\n[artifact.GetName] paira ali placidamente. É verdade que foi uma arma fiel e letal ao longo de sua vida, e seus flancos foram repetidamente banhados no sangue dos inimigos. Uma boa lâmina. Uma lâmina vermelha."
 legend_spread_events.5015.a: "\"E ela tirará a vida de muitos mais.\""
 legend_spread_events.5015.b: "\"Bem, são apenas os que me lembro...\""
 legend_spread_events.5015.b.success: "A história da arma cresce"
 legend_spread_events.5015.b.failure: "Alguns olham com desconfiança para os contos"
 legend_spread_events.5015.c: "\"Não muitos mais que isso, [chronicler.GetFirstNameNoTooltip].\""
 legend_spread_events.5015.c.tt: "[artifact.GetName] ganha um modificador positivo aleatório"
 legend_spread_events.5020.t: "Desonrado"
 legend_spread_events.5020.desc: "Nossa caminhada por [SelectLocalization( IsLandlessAdventurer( ROOT.Char ), 'o acampamento', 'um corredor')] na penumbra do crepúsculo é interrompida por [chronicler.GetFirstName], cujo dedo se estende em direção à mão com a qual seguro a lanterna.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U]!" começa com um tremor na voz. "Essa marca na sua mão! Será que é… uma Chaga Sagrada?"\n\nOlho para minha mão. Uma grande mancha cobre o dorso dela. Na verdade, eu mal havia percebido que ela estava ali. No entanto, [chronicler.GetFirstNameNoTooltip] já estava viajando em suas teorias.\n\n"Temos de registrar isto! O povo precisa saber! Vós portais as santas chagas do próprio Cristo!""
 legend_spread_events.5020.a: "\"Você sabia que tenho outra no meu lado também?\""
 legend_spread_events.5020.a.tt: "Uma cicatriz antiga. Talvez seja significativa?"
 legend_spread_events.5020.b: "É #EMP bastante#! interessante..."
 legend_spread_events.5020.c: "\"É apenas uma marca antiga, [chronicler.GetFirstNameNoTooltip].\""
 legend_spread_events.5025.t: "Pergaminhos Empoeirados"
 legend_spread_events.5025.desc: "A paz e o sossego da minha [SelectLocalization( IsLandlessAdventurer( ROOT.Char ), 'tienda', 'estudio')] são completamente rompidos quando [chronicler.GetFirstName] entra abruptamente, carregando nos braços o que parece ser um exemplar de [ROOT.Char.Custom('GetWritingMaterial')] de bastante antiguidade.\n\n«¡[ROOT.Char.Custom('FormOfAddressForLiege')|U]!», grita. «¡Olhem, olhem! Encontramos um manuscrito antigo!». Ao jogá-lo sobre minha mesa, ele o aponta com o dedo, tomado pela empolgação.\n\n«Está em um idioma antigo que simplesmente não conseguimos decifrar. Mas vós…», [chronicler.GetFirstNameNoTooltip] me olha com reverência. «Talvez vós consigais! Deve ser uma obra de vossos antepassados!»."
 legend_spread_events.5025.a: "\"Você está certo, [chronicler.GetFirstNameNoTooltip]! Isso é fácil de traduzir!\""
 legend_spread_events.5025.b: "Vamos ver como me saio..."
 legend_spread_events.5025.b.success: "Você consegue traduzi-lo"
 legend_spread_events.5025.b.failure: "A língua escapa completamente de você"
 legend_spread_events.5025.c: "\"Não parece ser a língua de meus antepassados, eu temo.\""
 legend_spread_events.5030.t: "Amigos em Lugares Altos"
 legend_spread_events.5030.desc: "Embora as exigências de governar o reino nem sempre façam nossos caminhos se cruzarem, uma dessas oportunidades reuniu [vassal.GetFirstName] e eu. [vassal.GetFirstNameNoTooltip] me saúda calorosamente com um brilho cúmplice no olhar.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U] [ROOT.Char.GetFirstName]! Que prazer vê-lo!" e me aperta o ombro. "Sabia que, ultimamente, ouvi algumas histórias #EMP fascinantes#! sobre você?" diz, sorrindo de orelha a orelha diante do meu leve desconforto.\n\n"Na verdade, gostei bastante delas. Poderia me contar mais alguns detalhes?""
 legend_spread_events.5030.a: "\"Ficaria muito grato se você ajudasse a espalhar a notícia!\""
 legend_spread_events.5030.b: "\"Absolutamente. Agora, uma vez-\""
 legend_spread_events.5030.c: ""Também me alegro de vê-lo, meu bo[vassal.Custom('ES_XA')] [vassal.GetFirstNameNoTooltip]"."
 legend_spread_events.5035.t: "Assuntos de Família"
 legend_spread_events.5035.desc: "Es harto curioso, mi señor[ROOT.Char.Custom('ES_XA')], harto curioso. No sé muy bien qué pensar.\n\n[chronicler.GetFirstName] me presenta su [ROOT.Char.Custom('GetWritingMaterial')], que ha sacado de algún rincón polvoriento de una casa solariega. Lo miro con curiosidad. No sé muy bien de qué me habla…\n\nMirad. Vuestro linaje no aparece en ningún lugar de esta lista, aclara [chronicler.GetFirstNameNoTooltip] con lo que supongo que [chronicler.GetSheHe] #EMP cree#! que es encanto servicial. En realidad, consigue nublar aún más mi estado de ánimo.\n\nPodrían ser muy malas noticias para mis intentos de legitimación."
 legend_spread_events.5035.a: "\"Mande isso ser destruído. E [chronicler.GetFirstNameNoTooltip]...?\""
 legend_spread_events.5035.a.tt: "\"Se uma única palavra disso sair desta sala, eu #EMP saberei#! que foi você.\""
 legend_spread_events.5035.b: "\"Bobagem! Veja, o nome do meu pai está bem aqui!\""
 legend_spread_events.5035.b.success: "[chronicler.GetFirstNameNoTooltip] aceita feliz a correção"
 legend_spread_events.5035.b.failure: "[chronicler.GetFirstNameNoTooltip] não fica convencido[chronicler.Custom('ES_OA')]"
 legend_spread_events.5035.c: "Devemos manter isso em segredo. #EMP Muito#! em segredo."
 legend_spread_events.5035.c.success: "O segredo permanece enterrado"
 legend_spread_events.5035.c.failure: "O segredo escapa"
 legend_spread_events.5035.d: "Teremos que procurar outro documento."
 legend_spread_events.5040.t: "Flora da Família"
 legend_spread_events.5040.desc: ""Só mais algumas perguntas, [ROOT.Char.Custom('FormOfAddressForLiege')], e então eu posso deixá-los ir!", a falsa animação de [chronicler.GetFirstName] não consegue atenuar o cansaço que sinto à medida que o tempo que passamos examinando atentamente o seu [ROOT.Char.Custom('GetWritingMaterial')] para avaliar minha árvore genealógica se arrasta cada vez mais. [chronicler.GetFirstNameNoTooltip] aponta com seriedade para uma seção.\n\n"Não estou totalmente segur[chronicler.Custom('ES_OA')] sobre quem deveria ocupar exatamente #EMP estas#! seções em particular", diz, franzindo a testa em consternação. "Por acaso sabe, [ROOT.Char.Custom('FormOfAddressForLiege')]?""
 legend_spread_events.5040.a: "É #EMP claro#! que sim!"
 legend_spread_events.5040.a.tt: "Não, não sei, mas uma boa mentira torna o conhecimento redundante..."
 legend_spread_events.5040.b: "Tenho certeza de que [parent.GetMotherFather|l] saberia!"
 legend_spread_events.5040.c.tt: "De forma alguma sei, mas talvez se eu fosse convincente o suficiente..."
 legend_spread_events.5040.c.success: "Suas fabricações são convincentes"
 legend_spread_events.5040.c.failure: "Suas mentiras são óbvias"
 legend_spread_events.5040.d: "Coloque um [ROOT.Char.Custom('RegionalMythicalCreature')] lá dentro, tanto faz!"
 legend_spread_events.5040.d.success: "Algumas pessoas crédulas realmente acreditam"
 legend_spread_events.5040.d.failure: "A negligência lança dúvidas sobre sua árvore genealógica"
 legend_spread_events.5045.t: "Algumas Palavras?"
 legend_spread_events.5045.desc: "[chronicler.GetFirstName] e eu estamos em plena reflexão sobre rotas para espalhar a notícia da minha devoção ainda mais longe quando ele me segura pelo braço e faz um gesto com a cabeça. Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('imam'))] [imam.GetFirstName] entrou na mesquita, claramente começando os preparativos para a oração posterior.\n\n«¡[ROOT.Char.Custom('FormOfAddressForLiege')|U]!», sibila [chronicler.GetFirstNameNoTooltip]. «¡É #EMP perfecto#!! ¡[imam.GetFirstNameNoTooltip] está preparando o #EMP jutba#! de hoje! ¡Rápido, ide e convencei-o para que inclua vosso nome nele!».\n\nUma ideia brilhante! Mas me pergunto o que será necessário para que isso se torne realidade…"
 legend_spread_events.5045.a: "[imam.Custom('ES_ElLa')|U] imã não deixará passar um favor."
 legend_spread_events.5045.b: "Um suborno pode ser arriscado, mas recompensador..."
 legend_spread_events.5045.b.success: "[imam.Custom('ES_ElLa')|U] aceita sua oferta"
 legend_spread_events.5045.b.failure: "[imam.Custom('ES_AlAla')|U] o imã fica indignado com sua oferta"
 legend_spread_events.5045.c: "[imam.GetHerHim|U] simplesmente o convencerei."
 legend_spread_events.5045.c.success: "[imam.GetFirstNameNoTooltip] concorda"
 legend_spread_events.5045.c.failure: "[imam.GetFirstNameNoTooltip] rejeita seus apelos"
 legend_spread_events.5045.d: ""Não seja ridícul[chronicler.Custom('ES_OA')] , [chronicler.GetFirstNameNoTooltip]"."
 legend_spread_events.5050.t: "Fazendo uma Entrada"
 legend_spread_events.5050.desc: "Eu deveria ter visto os problemas chegando quando [chronicler.GetFirstName] entrou no meu [ROOT.Char.Custom('GetRoom')] trazendo um rosto desconhecido na retaguarda.\n\nPermita que eu apresente [jeweller.GetFirstName], [ROOT.Char.Custom('FormOfAddressForLiege')]. [Select_CString( jeweller.IsFemale, 'A desconhecida', 'O desconhecido' )] faz uma profunda reverência. Trabalha com joias e metais. Tive a ideia de que talvez você queira dar uma olhada em algumas de suas obras.\n\nTomei a liberdade de preparar algumas particularmente adequadas para você… e para aquilo que lhe interessa hoje, começa [jeweller.GetFirstNameNoTooltip], deixando uma bandeja sobre a mesa.\n\n#EMP 'O que me interessa?'#!. Está claro que [chronicler.GetFirstNameNoTooltip] tem estado ocupad[chronicler.Custom('ES_OA')]."
 legend_spread_events.5050.a: "Esta coroa é algo extraordinário."
 legend_spread_events.5050.b: "Este colar emana uma certa aura."
 legend_spread_events.5050.c: "Não estou disposto a gastar #EMP tanto#! assim..."
 legend_spread_events.5050.d: "\"Você ultrapassa limites, [chronicler.GetFirstNameNoTooltip].\""
 legend_spread_events.5055.t: "Escolhas Culturais"
 legend_spread_events.5055.desc: "Enquanto reflito sobre o que vestir hoje, o conselho de [chronicler.GetFirstName] é entusiasmado: "Talvez algo para inspirar seus vassalos, meu [ROOT.Char.GetLiege.GetTitleAsNameNoTooltip|l]? Algo tradicional?".\n\nSe quero conquistar o favor de meus súditos, devo, de fato, me apresentar como eles imaginam que um governante deva ser. Ainda assim, meu domínio abriga muitas culturas diferentes.\n\nMinha vestimenta majestosa poderia agradar a um(a) [vassal1.GetCulture.GetName] como [vassal1.Custom('ES_ElLa')] [vassal1.GetTitledFirstName|l], mas aqueles fora de nossa origem compartilhada —[vassal2.Custom('ES_ElLa')] [vassal2.GetTitledFirstName|l], por exemplo — perceberiam apenas que nossas diferenças se aprofundam cada vez mais."
 legend_spread_events.5055.a: "Ambos os grupos podem ser apaziguados."
 legend_spread_events.5055.a.tt: "Usar itens das culturas [vassal1.GetCulture.GetNameNoTooltip] e [vassal2.GetCulture.GetNameNoTooltip] me destacará como um[ROOT.Char.Custom('ES_XA')] governante tolerante e respeitos[ROOT.Char.Custom('ES_OA')]."
 legend_spread_events.5055.b: "Devo representar meu povo."
 legend_spread_events.5055.c: "Os súditos da [vassal2.GetCulture.GetNameNoTooltip] precisam de alguém para se inspirar."
 legend_spread_events.5055.d: "Devo evitar fazer inimigos."
 legend_spread_events.5055.d.tt: "É muito mais fácil evitar conflitos do que fazer declarações."
 5055_vassal1_culture: "Todos os vassalos da [culture|lE] [vassal1.GetCulture.GetName]"
 5055_vassal2_culture: "Todos os vassalos da [culture|lE] [vassal2.GetCulture.GetName]"
 5055_every_culture_vassal: "Todos os vassalos da [culture|lE] [vassal1.GetCulture.GetName] e [vassal2.GetCulture.GetName]"
 legend_spread_events.5060.t: "Lugares Sagrados"
 legend_spread_events.5060.opening: ""Sabeis, meu [ROOT.Char.GetLiege.GetTitleAsNameNoTooltip|l]…", [chronicler.GetFirstName] começa hesitante[chronicler.Custom('ES_OA')] enquanto caminhamos lentamente pelo meu [ROOT.Char.Custom('GetCourtyard')], "Não sei se devo mencionar isso, mas os devotos vão querer saber como perdestes"
 legend_spread_events.5060.one_eyed: "olho.\""
 legend_spread_events.5060.blind: "olhos.\""
 legend_spread_events.5060.ending: "\n\nEu paro. O tremor na voz de [chronicler.GetFirstNameNoTooltip] dá a entender que o assunto tem mais peso do que realmente precisa. Ainda assim, reflito, ouvindo os cânticos distantes dos [ROOT.Char.GetFaith.PriestNeuterPlural] trazidos pelo vento…\n\nSerá que finalmente chegou a hora de transformar esta enfermidade maldita em algo que enfim possa me beneficiar?"
 legend_spread_events.5060.a: "\"[ROOT.Char.GetFaith.HighGodName] veio a mim, e a visão me cegou!\""
 legend_spread_events.5060.b: "\"[ROOT.Char.GetFaith.HighGodName] levou isso para que eu pudesse provar minha devoção!\""
 legend_spread_events.5060.c: "\"Independentemente da causa, isso me humilhou perante [ROOT.Char.GetFaith.HighGodName].\""
 legend_spread_events.5060.d: "\"É apenas uma lesão antiga, [chronicler.GetFirstNameNoTooltip].\""
 legend_spread_events.5060.d.tt: "Não há propósito em mentir sobre esse antigo problema."
 legend_spread_events.5065.t: "Pão Sagrado"
 legend_spread_events.5065.desc: "Estou enchendo as bochechas com minha segunda porção de [ROOT.Char.Custom('GetExpensiveDessert')] quando vejo [chronicler.GetFirstName] me olhando com certo reproche.\n\n"Sabeis, [ROOT.Char.Custom('FormOfAddressForLiege')]...", começa gentilmente, "visto que estais tentando, digamos, demonstrar vossa santidade, talvez devesse pensar em conter um pouco isso?".\n\nBaixo os olhos para a comida. Está deliciosa, mas será que [chronicler.GetFirstNameNoTooltip] tem razão?"
 legend_spread_events.5065.a: "Bah, estou mais feliz assim!"
 legend_spread_events.5065.b: "\"Você está certo. Vou fazer melhor.\""
 legend_spread_events.5065.c: "Só um pouco aqui e ali certamente não vai fazer mal?"
 legend_spread_events.5070.t: "Uma Entrada Majestosa"
 legend_spread_events.5070.desc: "Estou de pé, esperando para me vestir enquanto [chronicler.GetFirstName] vai de um lado para o outro, ajustando minhas roupas. Satisfeit[chronicler.Custom('ES_OA')] com seu trabalho, [chronicler.GetSheHe] murmura um pouco.\n\n"Tenho me perguntado...", começa, "vocês já chegaram a considerar um estilo diferente?" Retribuo o olhar com desconfiança.\n\n"Vejam, vocês têm tentado enfatizar seus laços com seus antepassados. Não acham que talvez valha a pena pensar em se apresentar à imagem deles?""
 legend_spread_events.5070.a: "Vou me vestir como os primeiros [culture.GetCollectiveNounNoTooltip] fizeram!"
 legend_spread_events.5070.a.success: "Você é elogiado por sua vestimenta"
 legend_spread_events.5070.a.failure: "Ninguém está convencido"
 legend_spread_events.5070.b: "Talvez uma sugestão ou outra de estilo não seria mal..."
 legend_spread_events.5070.c: "Sou inspirado pelo passado, mas não me curvo a ele."
 every_culture_vassal: "Cada vassalo de sua [culture.GetNameNoTooltip]"
 legend_spread_events.5075.t: "Adoração Firme"
 legend_spread_events.5075.desc: "[imam.GetFirstName] passa por mim ao lado sem quase me cumprimentar, mas algo faz com que eu pare em seco. Meu acompanhante, [chronicler.GetFirstName] ao notar minha consternação, começa a explicar.\n\n\"É um calo de oração.\" [chronicler.GetSheHe|U] observa comigo o [imam.GetFaith.PriestNeuter] que se afasta, esticando o pescoço para ver a testa. \"Aqueles que se declaram os mais santos demonstram sua devoção prosternando-se com tanta força que acabam com um galo na cabeça\"."
 legend_spread_events.5075.a: "Certamente deve haver uma maneira de falsificar isso..."
 legend_spread_events.5075.a.success: "As pessoas são facilmente enganadas"
 legend_spread_events.5075.a.failure: "Sua astúcia falha"
 legend_spread_events.5075.b: "Devo rezar #EMP mais duro!#!"
 legend_spread_events.5075.b.success: "Funciona"
 legend_spread_events.5075.b.failure: "Ai"
 legend_spread_events.5075.c: "Que absurdo completo."
 legend_spread_events.5200.t: "Objetivos Exóticos"
 legend_spread_events.5200.desc: "[chronicler.GetFirstName] põe-se novamente a trabalhar, anotando detalhes da minha lenda.\n\n"Há algo que me intriga", reflete. "Por que escolhestes caçar essa besta? Por que, de todos os animais, escolhestes caçar esse feroz [legend.GetProperty( 'beast' ).GetFlagName]?""
 legend_spread_events.5200.a: "Eu desejava provar suas #EMP carnes exóticas#!."
 legend_spread_events.5200.b: "Matou meu [dead_parent.GetMotherFather|l] [dead_parent.GetFirstNameNoTooltip]!"
 legend_spread_events.5200.b.success: "Seu conto é crível"
 legend_spread_events.5200.b.failure: "Todo mundo já sabe que [dead_parent.GetSheHe] não morreu assim"
 legend_spread_events.5200.c: "Pela glória, é claro."
 legend_spread_events.5205.t: "Sendo o Melhor"
 legend_spread_events.5205.desc: "[chronicler.GetFirstName] se espreguiça brevemente, alcançando mais [ROOT.Char.Custom('GetWritingMaterial')] para alimentar a pilha cada vez maior.\n\n“Então, [ROOT.Char.Custom('FormOfAddressForLiege')]”, recomeça calmamente. “Dizei-me, por que estáveis tão empenhad[ROOT.Char.Custom('ES_OA')] em caçar um adversário tão feroz como um(a) [legend.GetProperty( 'beast' ).GetFlagName]? Certamente era de fato um inimigo perigoso?”."
 legend_spread_events.5205.a: "O que mais faria[ROOT.Char.Custom('ES_ElLa')] o maior caçador[ROOT.Char.Custom('ES_XA')] destas terras?"
 legend_spread_events.5205.b: "Foi tudo em busca de presas ainda mais perigosas..."
 legend_spread_events.5205.b.tt: "… e agora, eu sei como encontrá-la…"
 legend_spread_events.5205.c: "Eu precisava aprimorar minhas habilidades de rastreamento."
 legend_spread_events.5205.d: "Para provar minha habilidade como caçador[ROOT.Char.Custom('ES_XA')]."
 legend_spread_events.5210.t: "Bandido de Um Olho"
 legend_spread_events.5210.desc: "\"É realmente verdade?\" [chronicler.GetFirstName] procura mais [ROOT.Char.Custom('GetWritingMaterial')] para anotar suas observações, enquanto me pede confirmação de contos. \"Dizem que houve um encontro com um ser bastante repugnante.\"\n\n\"Ouvi rumores sobre isso, um grande ser desajeitado com um único olho. Um poderoso ciclope!\""
 legend_spread_events.5210.a: "E achou que eu também era um outro[ROOT.Char.Custom('ES_OA')] ciclope!"
 legend_spread_events.5210.b: "\"E uma fera realmente feroz era!\""
 legend_spread_events.5210.c: "Acho que era apenas um local, na verdade."
 legend_spread_events.5215.t: "Ina-cre-di-folha!"
 legend_spread_events.5215.desc: "Sento-me com [chronicler.GetFirstName] enquanto ele/ela continua catalogando mais da minha lenda.\n\n\"A parte das plantas era verdade, [ROOT.Char.Custom('FormOfAddressForLiege')]?\" A sobrancelha erguida em sinal de curiosidade deixa claro que [chronicler.GetHerHim] o incita a continuar. \"As plantas hostis, é claro! A flora de folhas gigantes capaz de drogar você à distância com seu pólen!\"."
 legend_spread_events.5215.a: "Posso atestar sua veracidade com certa autoridade."
 legend_spread_events.5215.b: "Um terrível problema, mas administrável."
 legend_spread_events.5215.c: "Não, mas aprendi que tais plantas realmente existem!"
 legend_spread_events.5216.t: "O Esporte Local"
 legend_spread_events.5216.desc: "Brinco com uma flecha perdida de um feixe apoiado contra a parede enquanto [chronicler.GetFirstName] continua registrando mais fatos da minha lenda.\n\n“Isso me lembra, [ROOT.Char.Custom('FormOfAddressForLiege')]”, começa [chronicler.GetFirstNameNoTooltip] ao olhá-la. “É verdade que houve um desafio? Um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom('GetLassLad')] da região, habilidoso com o arco, que desafiou todos os presentes para uma competição de arco e flecha? Quem venceu?”."
 legend_spread_events.5216.a: "\"Eu venci ao dividir sua flecha ao meio com a minha própria!\""
 legend_spread_events.5216.b: "Foi uma vitória fácil!"
 legend_spread_events.5216.b.success: "Parece ser crível"
 legend_spread_events.5216.b.failure: "Ninguém acredita"
 legend_spread_events.5216.c: "Foi apenas um treino, na verdade."
 legend_spread_events.5220.t: "Armadilhas da Natureza"
 legend_spread_events.5220.desc.start: "[chronicler.GetFirstName] me olha pensativamente[chronicler.Custom('ES_OA')].\n\n“Ouvi dizer que, em suas viagens, vocês enfrentaram toda sorte de desafios”. Meu aceno cauteloso parece animá-lo[chronicler.GetHerHim]. “Disseram-me que vocês quase caíram vítima de…"
 legend_spread_events.5220.desc.wet: "um pântano fétido e engolidor."
 legend_spread_events.5220.desc.dry: "uma área de areia movediça traiçoeira e sugadora."
 legend_spread_events.5220.desc.ending: "Disseram-me que vocês tiveram de lutar para se libertar, e que, se suas forças tivessem falhado, vocês teriam perecido!", [chronicler.GetFirstNameNoTooltip] me olha com expectativa."
 legend_spread_events.5220.a: "Ah, não foi nada para um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] da minha estatura!"
 legend_spread_events.5220.b: "De fato! Eu lutei até o fim, porém."
 legend_spread_events.5220.c: "Era apenas terreno encharcado."
 legend_spread_events.5225.t: "Poder das Flores"
 legend_spread_events.5225.desc: "O pequeno ramalhete de flores sobre minha mesa parece atrair o interesse de [chronicler.GetFirstName].\n\n\"Isso me faz lembrar, meu bom[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetLadyLord]\", começa, \"uma história que ouvi sobre vós. É verdade que vocês encontraram uma planta totalmente única em suas viagens?\". [chronicler.GetFirstNameNoTooltip] me olha rapidamente.\n\n\"Não teríeis por acaso um espécime convosco?\"."
 legend_spread_events.5225.a: "\"Claro!\""
 legend_spread_events.5225.a.tt: "Isso de forma alguma é uma flor única, mas é incomum o suficiente para enganar um leigo."
 legend_spread_events.5225.b: "Eu tenho uma bem aqui!"
 legend_spread_events.5225.b.tt: "Bem, esta não é a flor #EMP mais#! comum..."
 legend_spread_events.5225.b.success: "[chronicler.GetNameNoTooltip] nunca viu uma flor como esta antes"
 legend_spread_events.5225.b.failure: "[chronicler.GetNameNoTooltip] já tinha visto muitos exemplos assim antes"
 legend_spread_events.5225.c: "#EMP Flores?!#! Certamente deveríamos discutir coisas mais grandiosas?"
 legend_spread_events.5225.d: "\"Temor que não.\""
 legend_spread_events.5230.t: "Gosto por Sangue"
 legend_spread_events.5230.desc: "A irrupção de [chronicler.GetFirstName] em minha [ROOT.Char.Custom('GetRoom')] costuma anunciar uma enxurrada de perguntas incomuns, e desta vez não é diferente.\n\n"Meu [ROOT.Char.GetLadyLord]! Acabei de ouvir a história mais escandalosa!", grita, correndo atrás de mais [ROOT.Char.Custom('GetWritingMaterial')] para escrever. "Dizem que vocês foram atacados por uns #EMP caníbales#! em suas viagens! Seria possível que existam os antropófagos?!"."
 legend_spread_events.5230.a: "\"Veja esta cicatriz? Foi de um deles.\""
 legend_spread_events.5230.b: "… honestamente, eles realmente sabiam cozinhar carne."
 legend_spread_events.5230.c: "E eu vivi para contar a história!"
 legend_spread_events.5230.d: "Acho que eles eram apenas bandidos."
 legend_spread_events.5235.t: "Um contra Um"
 legend_spread_events.5235.desc: "Estou relatando meus feitos em batalha para [chronicler.GetFirstName] quando [chronicler.GetSheHe] me interrompe bruscamente.\n\n\"Então, é verdade? Você matou o vil comandante inimigo em combate singular?\" Seus olhos brilham com as possibilidades. Está claro que se trata de algum tipo de história fantasiosa passada de boca em boca.\n\nEu realmente estava na batalha, mas a confusão do combate corpo a corpo torna praticamente qualquer evento possível..."
 legend_spread_events.5235.a: "Eles morreram sob minha lâmina."
 legend_spread_events.5235.b: "Sob qual braço de espada eles morreram não importa."
 legend_spread_events.5240.t: "Discrição ou Valor?"
 legend_spread_events.5240.desc: "Com rabiscos apressados em uma tigela de sementes tombada, [chronicler.GetFirstName] registra a ordem de uma batalha do passado, mas muda rapidamente de assunto ao me ver olhando.\n\n“Esta seção é a que mais me intriga”, afirma, apontando para um desses traços entre as sementes. “Ouvi dizer que aqui fingistes uma retirada. Por outro lado, também ouvi acusações bem mais #EMP desfavorables#!…”.\n\nMeu coração de covarde palpita em pânico até mesmo diante de um inquérito tão polido."
 legend_spread_events.5240.a: "Foi uma retirada tática perfeita."
 legend_spread_events.5240.b: "Claro que foi uma retirada #EMP tática#!"
 legend_spread_events.5240.b.success: "Sua explicação soa convincente"
 legend_spread_events.5240.b.failure: "Suas protestações apenas confirmam a culpa"
 legend_spread_events.5240.c: "… não nos detenhamos nisso."
 legend_spread_events.5245.t: "Golpe Esmagador"
 legend_spread_events.5245.desc: "Mais tempo com [chronicler.GetFirstName] significa mais tempo vasculhando tediosamente uma batalha passada para que minha lenda possa ser registrada. [chronicler.GetFirstNameNoTooltip] percebe meu desinteresse e tenta outra abordagem.\n\n\"Agora, quando a ala esquerda do inimigo entra em colapso e nós devastamos sua retaguarda,\" começa, \"é mesmo verdade que foi você quem liderou esse ataque de flanco? Um verdadeiro golpe de gênio!"
 legend_spread_events.5245.a: "\"Eu fui. Muitos morreram sob nossas lâminas.\""
 legend_spread_events.5245.b: "\"Na verdade, eu liderei o golpe decisivo a partir do centro.\""
 legend_spread_events.5245.c: "Eu apenas supervisionei a batalha."
 legend_spread_events.5250.t: "Salvando um Inocente"
 legend_spread_events.5250.desc: "[ROOT.Char.Custom('FormOfAddressForLiege')|U]! Oh, meu [ROOT.Char.GetLadyLord]! A paixão na súplica de [chronicler.GetFirstName] me faz refletir. Acabei de ouvir sobre suas românticas tribulações no campo de batalha! [Select_CString( ROOT.Char.IsFemale, 'Um camponês', 'Uma camponesa' )] [Select_CString( ROOT.Char.IsFemale, 'perdido e confuso', 'perdida e confusa' )], mas certamente bel[ROOT.Char.Custom('ES_OAOpp')], vagando pelo campo de batalha, e #EMP você#! [Select_CString( ROOT.Char.IsFemale, 'salvando-o', 'salvando-a' )]!\\n\\nEstá claro que [chronicler.GetFirstNameNoTooltip] não pensa abandonar essa linha específica de investigação."
 legend_spread_events.5250.a: "\"Oh, eu salvei [ROOT.Char.Custom('GetHerHimOpposite')]. Direto para minha #EMP tenda#!!\""
 legend_spread_events.5250.b: "\"Recebi um beijo como recompensa, nada menos.\""
 legend_spread_events.5250.c: "\"Você deve estar me confundindo com outra pessoa.\""
 legend_spread_events.5255.t: "Contos de Guerra"
 legend_spread_events.5255.desc: ""Ao ouvir tanto sobre vossas batalhas, [ROOT.Char.Custom('FormOfAddressForLiege')]", diz [chronicler.GetFirstName], de forma trêmula e um tanto teatral, "é realmente uma maravilha que tenhais sobrevivido! Mortes e carnificinas de todo tipo vos cercaram, e ainda assim saístes ileso".\n\nImagino que todo mundo goste de uma boa história de guerra. Talvez enfeitar um pouco a minha possa ajudar a espalhar a notícia?"
 legend_spread_events.5255.a: "\"Dificilmente ileso, [chronicler.GetFirstNameNoTooltip].\""
 legend_spread_events.5255.b: "\"Onde mais você acha que consegui essas cicatrizes?\""
 legend_spread_events.5255.c: "\"Apenas graças a [ROOT.Char.GetFaith.HighGodName].\""
 legend_spread_events.5255.d: "\"Continuei avançando tão galantemente quanto pude!\""
 legend_spread_events.5260.t: "Bom Timing"
 legend_spread_events.5260.desc: "\"Nossas forças estavam tão pressionadas e atormentadas,\" [chronicler.GetFirstName] corta minha reverie enquanto discutimos uma batalha passada, \"e ainda assim prevalecemos! Ouvi dizer, de fato, que foi #EMP você#! quem chegou no momento crucial com reforços! Que chegada oportuna para garantir nossa vitória!\"\n\nA palavra de [promoted_legend.GetName] deve se espalhar longe, e palavras de minhas façanhas heroicas ajudarão nisso. Se eu escolher reivindicar este crédito particular, é claro..."
 legend_spread_events.5260.a: "\"Cheguei bem na hora.\""
 legend_spread_events.5260.b: "\"Tínhamos planejado tudo com antecedência.\""
 legend_spread_events.5305.t: "Sendo Cordial"
 legend_spread_events.5305.desc: "[chronicler.GetFirstName] anota diligentemente minhas palavras enquanto as dicto. Preciso ter cuidado com minhas escolhas: [potential_promoter.GetFirstName], [potential_promoter.Custom('ES_ElLa')] governante vizinh[potential_promoter.Custom('ES_OA')], poderia ser persuadido a apoiar minha causa na divulgação da história de [promoted_legend.GetName], mas uma formulação errada pode parecer... vaidosa, talvez.\n\nFaço uma pausa e [chronicler.GetFirstNameNoTooltip] também faz, esperando pacientemente. O que gostaria de #EMP gustaría#! ouvir de [potential_promoter.GetFirstNameNoTooltip]?"
 legend_spread_events.5305.a: "Com certeza ela adoraria ver triunfar outra alma [root_culture.GetName]!"
 legend_spread_events.5305.a.success: "[potential_promoter.GetFirstNameNoTooltip] concorda"
 legend_spread_events.5305.a.failure: "[potential_promoter.GetFirstNameNoTooltip] não fica impressionado"
 legend_spread_events.5305.b: "Talvez... uma ameaça sutil."
 legend_spread_events.5305.b.success: "[potential_promoter.GetFirstNameNoTooltip] está devidamente intimidado[potential_promoter.Custom('ES_OA')]"
 legend_spread_events.5305.b.failure: "[potential_promoter.GetFirstNameNoTooltip] rejeita suas ameaças"
 legend_spread_events.5305.c: "Certamente um apelo à amizade entre vizin[ROOT.Char.Custom('ES_OA')] hos funcionará, não é?"
 legend_spread_events.5305.c.success: "[potential_promoter.GetFirstNameNoTooltip] aceita"
 legend_spread_events.5305.c.failure: "[potential_promoter.GetFirstNameNoTooltip] não se importa com seus apelos"
 legend_spread_events.5305.d: "Ah, envie como está."
 legend_spread_events.5305.d.success: "[potential_promoter.GetFirstNameNoTooltip] fica impressionado"
 legend_spread_events.5310.t: "Arauto da Lenda"
 legend_spread_events.5310.desc: "Não consigo evitar de andar de um lado para o outro, inquieto, enquanto [herald.GetFirstName] prepara os suprimentos para sua visita à corte de [potential_promoter.GetFirstName], [potential_promoter.Custom('ES_ElLa')] governante vizinh[potential_promoter.Custom('ES_OA')]. A [herald.GetFirstNameNoTooltip|U] recebeu expressamente a tarefa de espalhar a notícia sobre [promoted_legend.GetName] e, de preferência, encurralar [potential_promoter.Custom('ES_AlAla')] [potential_promoter.GetTitleAsNameNoTooltip|l] e persuadi[potential_promoter.GetHerHim] para se juntar à causa.\n\nSerá preciso postura e graça para essa tarefa, e talvez alguns reforços extras…"
 legend_spread_events.5310.a: "\"Use sua inteligência!\""
 legend_spread_events.5310.a.success: "[potential_promoter.GetFirstNameNoTooltip] fica encantado"
 legend_spread_events.5310.a.failure: "[herald.GetFirstNameNoTooltip] resulta bajulador[herald.Custom('ES_OA')]"
 legend_spread_events.5310.b: "Este presente de ouro talvez convença [potential_promoter.Custom('ES_LoLa')] a persuadir."
 legend_spread_events.5310.b.success: "O atrativo do ouro se prova forte"
 legend_spread_events.5310.b.failure: "[potential_promoter.GetFirstNameNoTooltip] não é persuadido pelo presente"
 legend_spread_events.5310.c: "Apenas... vá lá e não estrague tudo."
 legend_spread_events.5310.c.success: "[herald.GetFirstNameNoTooltip] demonstra ser efetiv[herald.Custom('ES_OA')]"
 legend_spread_events.5315.t: "Espalhando a Palavra"
 legend_spread_events.5315.desc: "Pauso, escrevo, pauso, escrevo...\n\nAs palavras desta missiva devem ser escolhidas com cuidado. Nenhuma frase mal formulada em minha mensagem ao meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('vassal'))] , [vassal.GetFirstName] , mas o apoio dele a [promoted_legend.GetName] seria uma grande vantagem se eu acertar.\n\nAgora, vamos ver. O que #EMP sé#! que aprovaria [vassal.GetFirstNameNoTooltip]?"
 legend_spread_events.5315.a: "É uma pessoa muito motivada!"
 legend_spread_events.5315.a.success: "[vassal.GetFirstNameNoTooltip] fica satisfeito"
 legend_spread_events.5315.a.failure: "Você adivinhou incorretamente"
 legend_spread_events.5315.b: "[promoted_legend.GetNameNoTooltip] também pode ser uma história de #EMP vingança#!..."
 legend_spread_events.5315.c: "Talvez eu devesse ser o mais honesto possível?"
 legend_spread_events.5315.d: "Posso formular isso de maneira que [vassal.GetHerHim] agrada…"
 legend_spread_events.5320.t: "Correndo Atrás"
 legend_spread_events.5320.desc: "Os vassalos costumam se esforçar para chamar a atenção de seu suserano, mas, desta vez, a mesa virou. Seria de grande valia ter [vassal.GetFirstName] como defensor de minha [promoted_legend.GetName]. Devo fazer todo o possível para que se ponha do meu lado.\n\nDevo pensar cuidadosamente sobre o que seria melhor para chamar sua atenção. Talvez uma promessa de investimento em suas posses? Quem sabe a simples promessa de um favor?"
 legend_spread_events.5320.artifact: "\n\nDesvio o olhar para meu [artifact.GetName], do outro lado da sala. Será que se deixaria influenciar por um presente como esse?"
 legend_spread_events.5320.a: "Certamente não recusaria isso, não é?"
 legend_spread_events.5320.a.success: "[vassal.GetFirstNameNoTooltip] recebe com gratidão[vassal.Custom('ES_OA')]"
 legend_spread_events.5320.a.failure: "[vassal.GetFirstNameNoTooltip] recusa"
 legend_spread_events.5320.a.artifact: "Seu [artifact.GetName] recebe um modificador de [prestige|lE] #negative_value negativo#!"
 legend_spread_events.5320.b: "Um investimento em [capital_county.GetNameNoTierNoTooltip] poderia ser persuasivo."
 legend_spread_events.5320.b.success: "[vassal.GetFirstNameNoTooltip] fica encantado com a oferta"
 legend_spread_events.5320.b.failure: "[vassal.GetFirstNameNoTooltip] não fica impressionado"
 legend_spread_events.5320.c: "Deve bastar-lhe o favor de seu suserano[ROOT.Char.Custom('ES_XA')]."
 legend_spread_events.5320.d: "[vassal.GetSheHe|U] deveria seguir meu exemplo, independentemente!"
 legend_spread_events.5320.d.success: "[vassal.GetFirstNameNoTooltip] segue seu exemplo"
 legend_spread_events.5325.t: "Pássaros Mensageiros"
 legend_spread_events.5325.desc: "Mais #EMP uma#! missiva — desta vez de [legend_person.GetFirstName] — me é entregue por um mensageiro, e já sei do que se trata. As histórias de [promoted_legend.GetName] têm se espalhado longe e amplamente, e ainda mais bocas começam a levá-las ainda mais longe.\n\nÉ de fato uma grande história. Talvez haja algumas vantagens em me juntar aos likes de [legend_person.GetFirstNameNoTooltip]?"
 legend_spread_events.5325.protag: "\n\nOu, talvez, alguns benefícios materiais? O sujeito da lenda, [promoted_legend_owner.GetFirstName], tem um interesse pessoal em sua disseminação. Além disso, também possui uma boa quantia de riqueza. Talvez escrever uma resposta dê frutos?"
 legend_spread_events.5325.a: "O peso de minhas palavras se provará valioso."
 legend_spread_events.5325.b: "Me juntarei às fileiras dos crentes públicos."
 legend_spread_events.5325.c: "Endossarei isso; mas por uma quantia..."
 legend_spread_events.5325.c.success: "[promoted_legend_owner.GetFirstNameNoTooltip] fica encantado com a oferta"
 legend_spread_events.5325.c.failure: "[promoted_legend_owner.GetFirstNameNoTooltip] não fica impressionado"
 legend_spread_events.5325.c.success.tt: "Sua carta é bem recebida"
 legend_spread_events.5325.c.failure.tt: "Sua carta é mal recebida"
 legend_spread_events.5325.d: "Isso é tudo absurdo!"
 legend_spread_events.5325.stop_promoting_warning: "@alert_icon! #alert_trial Isso exigirá que você desista de sua [legend|lE] atual!#!"
 legend_spread_events.5325.stop_promoting: "Eu paro de promover minha [legend|lE] atual"
 legend_spread_events.5326.opening: "[ROOT.Char.Custom2('AppropriateGreetingPositive', promoted_legend_owner)]"
 legend_spread_events.5326.desc: "Sua proposta tem muito mérito! Por favor, aceite este presente em troca de seus esforços em espalhar a boa palavra sobre [promoted_legend.GetName]."
 legend_spread_events.5326.a: "Excelente!"
 legend_spread_events.5326.b: "Não abandonarei minha história atual."
 legend_spread_events.5327.opening: "[ROOT.Char.Custom2('AppropriateGreetingNegative', promoted_legend_owner)]"
 legend_spread_events.5327.desc: "Sua tentativa de suborno é tola e insultante! Meus feitos renomados não precisam de sua língua venenosa para serem divulgados!"
 legend_spread_events.5327.a: "Droga!"
 legend_spread_events.5330.t: "Sussurros Inadequados"
 legend_spread_events.5330.desc: "Uma boa história certamente deveria ser promovida por uma boa pessoa, não? Ainda assim, não param de chegar até mim notícias sobre as condutas pecaminosas [promoted_legend_owner.Custom('SinfulTrait')|l] de [promoted_legend_owner.GetFirstName] , [promoted_legend_owner.Custom('ES_ElLa')] [promoted_legend_owner.GetWomanMan] que não para de divulgar [promoted_legend.GetName].\n\nEu poderia me afastar de uma figura com tão má reputação, mas estar associado a uma história tão famosa me traz alguns benefícios próprios…"
 legend_spread_events.5330.a: "Como ousa! Sou um pilar de piedade [ROOT.Char.GetFaith.GetAdjectiveNoTooltip]!"
 legend_spread_events.5330.b: "Não posso ser associado a [promoted_legend_owner.GetSheHe]."
 legend_spread_events.5330.c: "Fingirei que não vi apenas desta vez..."
 legend_spread_events.5330.c.success: "Sua reputação impulsiona a de [promoted_legend_owner.GetFirstNameNoTooltip]"
 legend_spread_events.5335.t: "Um Tópico Digno"
 legend_spread_events.5335.desc: "Obviamente, espera-se que eu fale da boa história de [promoted_legend.GetName], mas há que dizer que o esplêndido porte e a moral íntegra de [promoted_legend.GetFirstName] facilitam isso sobremaneira.\n\nNobres e plebeus por igual falam de sua personalidade virtuosa e, certamente, não deixou de chegar aos meus ouvidos."
 legend_spread_events.5335.a: "Que bênção é sustentar sua lenda!"
 legend_spread_events.5335.b: "Talvez eu possa aproveitar isso para avançar ambas as nossas causas..."
 legend_spread_events.5335.c: "Será que posso aprender algo com [promoted_legend_owner.GetSheHe]?"
 legend_spread_events.5335.c.success: "Você ganha algumas percepções de [promoted_legend_owner.GetFirstNameNoTooltip]"
 legend_spread_events.8000.t: "O Tomo Oculto"
 legend_spread_events.8000.desc: "Apesar de todos os esforços, ainda há aqueles que negam que os [promoted_legend.GetProtagonist.GetCulture.GetName] são os verdadeiros herdeiros do povo [promoted_legend.GetProperty('culture').Culture.GetName]. Hoje [chronicler.Custom2('MyCharacterIntroduction', ROOT.Char)] veio até mim com algumas informações que dissuadiriam qualquer dúvida sobre a legitimidade da minha reivindicação!\n\n me conta sobre um antigo tomo, [chronicler.GetSheHe] acredita existir em algum lugar em [promoted_legend.GetProperty('original_region').GeographicalRegion.GetName], [province_to_visit.GetName] para ser preciso. As fontes são potencialmente duvidosas, mas se eu tentasse encontrar este tomo, posso ainda provar a legitimidade de [promoted_legend.GetName]."
 legend_spread_events.8000.a: "Estou indo em uma aventura!"
 legend_spread_events.8000.b: "Vou ficar em casa!"
 travel_to_tome_tt: "[Concept( 'travel', 'Viajarás' )|E] a [province_to_visit.GetName], onde talvez você encontre o tomo antigo"
 legend_spread_events.8001.t: "O Tomo dos [promoted_legend.GetProperty('culture').Culture.GetNameNoTooltip]: Perdido no Tempo"
 legend_spread_events.8001.desc: "Infelizmente, as circunstâncias me forçaram a abandonar meus planos de viagem e o rastro de evidências que estava seguindo esfriou. Não há nada que eu possa fazer para perseguir o tomo agora, e receio que ele possa ter se perdido no tempo."
 legend_spread_events.8001.a: "Maldição!"
 legend_spread_events.8002.t: "O Tomo dos [promoted_legend.GetProperty('culture').Culture.GetNameNoTooltip]: Chegada"
 legend_spread_events.8002.desc: "Por fim, cheguei a [province_to_visit.GetName], e após algumas rápidas orientações dos moradores, encontrei as ruínas onde se acredita que a tumba exista. Este monumento em ruínas da outrora grandiosa civilização [promoted_legend.GetProperty('culture').Culture.GetName] me lembra tanto [promoted_legend.GetProperty('title').Title.GetNameNoTier] que tenho certeza [ROOT.Char.Custom('ES_OA')] de que em algum lugar deve haver provas dessa conexão!\n\nAs ruínas estão em um estado delicado; ouço os suportes desmoronarem e cederem sob o peso dos anos. Preciso andar com cuidado para não correr o risco de destruir o monumento por completo."
 legend_spread_events.8002.a: "É necessário um estudo cuidadoso."
 legend_spread_events.8002.b: "Ao inferno com as ruínas, devo encontrar esse tomo!"
 legend_spread_events.8002.c: "Há tanto para aprender aqui, ao inferno com o tomo!"
 legend_spread_events.8002.d: "Li sobre este lugar! Eu sei exatamente onde procurar."
 legend_spread_events.8003.t: "O Tomo dos [promoted_legend.GetProperty('culture').Culture.GetNameNoTooltip]: Desenterrado"
 legend_spread_events.8003.desc: "Tenho buscado nas ruínas com meu séquito por dias, e ainda não encontrei nada que indicasse uma ligação entre os [promoted_legend.GetProtagonist.GetCulture.GetCollectiveNoun] e os [promoted_legend.GetProperty('culture').Culture.GetCollectiveNoun]. Então, de repente, meu grupo me apresenta uma caixa meio destruída pela crueldade do tempo, um livro espesso com poeira e sujeira dentro.\n\nAlguns golpes e uma sacudida, e encontro o livro repleto de criaturas da mitologia [promoted_legend.GetProperty('culture').Culture.GetName] representadas em um estilo distintamente [promoted_legend.GetProtagonist.GetCulture.GetNameNoTooltip]! Embora as palavras tenham desaparecido e se perdido no tempo, eu simplesmente devo acreditar que este maravilhoso livro prova uma ligação definitiva entre as duas culturas!"
 legend_spread_events.8003.a: "Que descoberta incrível!"
 legend_spread_events.8004.t: "O Tomo dos [promoted_legend.GetProperty('culture').Culture.GetNameNoTooltip]: Perdido"
 legend_spread_events.8004.desc: "Meu séquito e eu vasculhamos estas ruínas tanto quanto foi possível, e ainda assim não encontramos nenhum vestígio desse suposto tomo. No entanto, entre os escombros há uma série de objetos de grande interesse, alguns dos quais, sem dúvida, foram feitos por mãos de herança[promoted_legend.GetProperty('culture').Culture.GetName].\n\nGuardo no bolso uma pequena escultura de pedra de um animal e me preparo para voltar para casa."
 legend_spread_events.8004.a: "Pelo menos não foi um completo desperdício."
 legend_spread_events.8010.t: "Uma Figura Estranha"
 legend_spread_events.8010.desc: "Paramos para fazer uma pausa na estrada. Minha comitiva cerca uma clareira, apressando-se para vigiar bandidos e reunir suprimentos, deixando-me sozinho por um instante. O vento apaga minha fogueira crepitante como um fósforo sopraria minha respiração. Sinto algo atrás de mim e me viro para ver que um[challenger.Custom('ES_XA')] estranh[challenger.Custom('ES_OA')] conseguiu chegar ao meu acampamento. [challenger.GetSheHe|U] sorri despreocupadamente como se sempre tivesse estado ali.\n\n\"Que dia de sorte para dar de cara com [ROOT.Char.GetNameNoTooltip] a \"lendária\" em pessoa\", diz, revelando sua arma. \"Prove que você é uma lenda, [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('challenger'))]\"."
 legend_spread_events.8010.a: "\"Nossa batalha será lendária.\""
 legend_spread_events.8010.b: "\"Guardas!\""
 legend_spread_events.8012.t: "As Lendas Morrem"
 legend_spread_events.8012.desc: "Minha comitiva retorna bem a tempo de me ver cair aos pés do meu adversário. Assim que me levanto para enfrentar meu poderos[challenger.Custom('ES_OA')] e estranh[challenger.Custom('ES_OA')] oponente, parece ter desaparecido na natureza, como se nunca tivesse existido."
 legend_spread_events.8012.a: "Todo mundo [challenger.GetHerHim] viu, certo?"
 legend_spread_events.8012.b: "Ninguém viu nada."
 legend_spread_events.8013.t: "Uma Vitória Lendária"
 legend_spread_events.8013.desc: "Meu séquito retorna justamente quando saio vitorioso[ROOT.Char.Custom('ES_XA')] sobre meu misterioso[challenger.Custom('ES_OA')] oponente. Sua arma cai no chão e me olha atônito[challenger.Custom('ES_OA')].\n\nChamo meu séquito, mas quando volto a olhar para meus pés, [challenger.GetSheHe] desapareceu, como se nunca tivesse estado ali."
 legend_spread_events.8013.a: "Eu venci... Eu acho."
 legend_spread_events.8020.t: "Heresia!"
 legend_spread_events.8020.desc: "Hoje sou interrompido[ROOT.Char.Custom('ES_OA')] em minha [ROOT.Char.Custom('GetCourt')] quando [challenger.Custom2('MyCharacterIntroduction', ROOT.Char)] se lança contra mim, apontando e gritando "Herege!" em seu caminho.\n\n"[legend.GetName|U] afirma que [legend.GetProtagonist.GetNameNoTooltip] tem poderes além até de [ROOT.Char.GetFaith.HighGodName] em pessoa! Heresia, do mais alto grau!".\n\nParece [Select_CString( challenger.IsFemale, 'una lunática', 'un lunático' )], mas os murmúrios que percorrem minha [ROOT.Char.Custom('GetRoom')] indicariam que alguns já concordam com [challenger.GetSheHe]."
 legend_spread_events.8020.a: "Posso convencê-los[challenger.GetHerHim]."
 legend_spread_events.8020.a.win: "Você venceu o debate"
 legend_spread_events.8020.a.lose: "Você perdeu o debate"
 legend_spread_events.8020.b: "Tirem esse [challenger.Custom2('InsultNoun', ROOT.Char)] da minha [ROOT.Char.Custom('GetCourt')]."
 legend_spread_events.8020.c: "Não, o poder divino é derivado #EMP de#! [ROOT.Char.GetFaith.HighGodName]."
 legend_spread_events.8030.t: "Assim Como Você"
 legend_spread_events.8030.desc: "Ao longe, ouço [child.Custom2('MyCharacterIntroduction', ROOT.Char)] rindo enquanto brinca com seus colegas.\n\n“Sou [legend.GetProtagonist.GetNameNoTooltip], sou [Select_CString( child.IsFemale, 'la heroína', 'el héroe' )]!” Ele está encenando [legend.GetName] para seus colegas de brincadeira encantados.\n\nAs crianças olham para [child.GetFirstNameNoTooltip] com assombro e adoração, cativadas pela história. Meu coração se enche ao ouvir esses nomes e lugares lendários saírem dos lábios da próxima geração com tanta força e entusiasmo. Embora um dia todos nos tornemos pó, a lenda nunca morrerá."
 legend_spread_events.8030.a: "Deixe que ele/ela siga em frente."
 legend_spread_events.8030.b: "Devo oferecer minha própria recitação!"
 legend_spread_events.8040.t: "Um Antepassado Pecaminoso"
 legend_spread_events.8040.desc: ""Você alegaria descender [ancestor.Custom('ES_DelDela')] vil pecador[ancestor.Custom('ES_XA')] [ancestor.GetName]?", [challenger.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me recebe esta manhã com o dedo em riste e um olhar enlouquecido em seus olhos. "Blasfêmia! Foi um[ancestor.Custom('ES_XA')] perversa[ancestor.Custom('ES_OA')] de vícios profanos. Não era [virtue_trait.GetName(ancestor)|l] como nos fizeram crer a todos. Seu espírito era [sin_trait.GetName(ancestor)|l], um[ancestor.Custom('ES_XA')] autêntic[ancestor.Custom('ES_OA')] pecador[ancestor.Custom('ES_XA')] como nunca houve outr[ancestor.Custom('ES_OA')]!"\n\nAlém da convicção em sua voz, ele trouxe inúmeros registros e anedotas escritas sobre o comportamento ímpio de [ancestor.GetNameNoTooltip] que não fazem minhas alegações de linhagem parecerem boas…"
 legend_spread_events.8040.a: "Isso tudo é um absurdo, com certeza."
 legend_spread_events.8040.a.win: "[challenger.GetHerHim|U] convence"
 legend_spread_events.8040.a.lose: "Sua reputação é manchada"
 legend_spread_events.8040.b: "Blasfêmia, saia da minha [ROOT.Char.Custom('GetCourt')]!"
 legend_spread_events.8050.t: "Um Antepassado Virtuoso"
 legend_spread_events.8050.desc: "[chronicler.Custom2('MyCharacterIntroduction', ROOT.Char)|U] corre até mim apressadamente esta manhã, equilibrando uma pilha de [chronicler.Custom('GetWritingMaterialPlural')] de antigamente, com o rosto radiante de entusiasmo.\n\n"Meu [ROOT.Char.GetTitleAsNameNoTooltip|l], tenho excelentes notícias. Estive procurando informações sobre [ancestor.GetName] e encontrei evidências que sugerem que o caráter [sin_trait.GetName(ancestor)|l] dele/ela foi exagerado, e que, na verdade, ele/ela era bastante [virtue_trait.GetName(ancestor)|l]!".\n\nSeria difícil, mas se eu conseguir provar que isso é verdade, o legado de [ancestor.GetNameNoTooltip] seria ainda mais prestigioso!"
 legend_spread_events.8050.a: "Deve ser verdade!"
 legend_spread_events.8050.a.win: "Você convenceu a todos"
 legend_spread_events.8050.a.lose: "Você falhou em convencer alguém"
 legend_spread_events.8050.b: "Vamos nos concentrar nas coisas que podemos provar."
 legend_spread_events.8050.c: "Pero… qué pasa #EMP conmigo#!?"
 legend_spread_events.8060.t: "Uma Confissão no Leito de Morte"
 legend_spread_events.8060.desc: "Sou saudado por [chronicler.Custom2('MyCharacterIntroduction', ROOT.Char)] que afirma ter novas informações sobre [legend.GetName].\n\nSustenta que, em seu leito de morte de [ancestor.GetName], [ROOT.Char.GetFaith.HighGodName] entrou em seu coração e [ancestor.GetHerHim] iluminou com as virtudes de [ROOT.Char.GetFaith.GetName|l].\n\nCom este último ato, [ancestor.GetNameNoTooltip] foi redimido e chegou a [ROOT.Char.GetFaith.PositiveAfterLife]."
 legend_spread_events.8060.a: "Claro, [ancestor.GetSheHe] era um [ROOT.Char.GetFaith.GetAdherentNameNoTooltip]!"
 legend_spread_events.8060.a.win: "Você convenceu a todos"
 legend_spread_events.8060.a.lose: "Sua alegação continua sem convencer"
 legend_spread_events.8060.b: "Pelo menos seus #EMP valores#! eram [ROOT.Char.GetFaith.GetReligion.GetAdherentNamePluralNoTooltip]."
 legend_spread_events.8070.t: "Um Acontecimento Sagrado"
 legend_spread_events.8070.desc: "[chronicler.Custom2('MyCharacterIntroduction', ROOT.Char)|U] veio até mim hoje com uma proposta interessante. Afirma que [chronicler.GetSheHe] poderia distorcer um pouco a verdade e reescrever [legend.GetName] para que ocorresse nas terras sagradas de [holy_site.GetName] em vez das terrenas de [location.GetName].\n\nIsso seria, é claro, uma falsificação, mas acrescentaria um pouco mais de piedade à história."
 legend_spread_events.8070.a: "Vamos fazer isso."
 legend_spread_events.8070.a.win: "Todos estão convencidos"
 legend_spread_events.8070.a.lose: "Ninguém está convencido"
 legend_spread_events.8070.b: "Não, [location.GetNameNoTooltip] é apenas #EMP como#! [holy_site.GetNameNoTooltip]."
 legend_spread_events.8080.t: "O Punho Lendário"
 legend_spread_events.8080.desc: "Estou envolvid[ROOT.Char.Custom('ES_OA')] em uma conversa animada com [chronicler.Custom2('MyCharacterIntroduction', ROOT.Char)] e um grupo de meus cortesãos. Estou contando a história de [legend.GetName] quando [chronicler.GetNameNoTooltip] me interrompe.\n\n"Lembrai-me de como exatamente tal [legend.GetProperty('beast').GetFlagName], meu [ROOT.Char.GetTitleAsNameNoTooltip|l]. Não é verdade que matastes a fera a socos em um combate corpo a corpo?"."
 legend_spread_events.8080.a: "Sim. Isso é exatamente o que aconteceu."
 legend_spread_events.8080.a.crit_win: "Todos acreditam em você"
 legend_spread_events.8080.a.win: "As pessoas parecem acreditar em você"
 legend_spread_events.8080.a.lose: "As pessoas não parecem acreditar em você"
 legend_spread_events.8080.a.crit_lose: "Ninguém acredita em você"
 legend_spread_events.8080.b: "Ela foi morta como qualquer caçador faria."
 legend_spread_events.8090.t: "[Select_CString( person_of_the_lake.IsFemale, 'La dama', 'El señor' )] do/da [watery_place.GetProvince.GetTerrain.GetNameNoTooltip]"
 legend_spread_events.8090.desc: "[chronicler.Custom2('MyCharacterIntroduction', ROOT.Char)|U] está transcrevendo [legend.GetName] em seu [chronicler.Custom('GetWritingMaterial')] enquanto eu o ditava de novo, mas enquanto conto o começo da história, [chronicler.GetSheHe] para de registrar minhas palavras em [chronicler.Custom('GetWritingMaterial')].\n\n"Não consigo deixar de notar que falta algo aqui, meu [ROOT.Char.GetTitleAsNameNoTooltip|l]. Será que não [Select_CString( legend.GetProtagonist.IsLocalPlayer, 'encontrasteis', 'encontró' )] [Select_CString( legend.GetProtagonist.IsLocalPlayer, 'vos', legend.GetProtagonist.GetShortUIName )] [Select_CString( person_of_the_lake.IsFemale, 'una dama', 'un hombre' )] em [watery_place.GetName]? Será que essa pessoa não surgiu das águas e [Select_CString( legend.GetProtagonist.IsLocalPlayer, 'os', 'le' )] encarregou de uma missão divina?""
 legend_spread_events.8090.a: "Ah sim, como poderíamos esquecer."
 legend_spread_events.8090.b: "Bobagem: Eu a inventei!"
 legend_spread_events.8100.t: "Muito Assombrado"
 legend_spread_events.8100.desc: "Um raio me arranca do meu torpor e a [ROOT.Char.Custom('GetDoor')] se abre de repente, [superstitious_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)] está aos pés da minha cama.\n\n\"Sinto acordá-lo, meu [ROOT.Char.GetTitleAsNameNoTooltip|l], mas muitos de nós não conseguimos dormir. Acredito firmemente que há um espírito maligno agindo aqui, e ele quer nos levar a todos.\"\n\nEmbora eu fique mais do que um pouco irritado por ser acordado tão tarde, tenho certa familiaridade com um ritual para aprisionar espíritos malignos em objetos…"
 legend_spread_events.8100.a: "Vou infundir isso em meu artefato!"
 legend_spread_events.8100.a.win: "Você infunde o espírito"
 legend_spread_events.8100.a.lose: "Você falha na invocação"
 legend_spread_events.8100.a.crit_lose: "Você cai em um acesso"
 legend_spread_events.8100.b: "Vocês ficaram loucos[superstitious_courtier.Custom('ES_OA')]? Cai fora!"
 legend_spread_events.8100.c: "Eu sei exatamente o que fazer."
 legend_spread_events.8100.d: "Vou absorver o espírito em mim mesmo!"
 artifact_dread_gain_mult_3_modifier: "Terrível"
 legend_spread_events.8110.t: "O Sangue dos [loser.GetFaith.GetAdherentNamePluralNoTooltip]"
 legend_spread_events.8110.desc: ""Ora, isso é impossível, não aconteceu de jeito nenhum".\n\n"Não, é verdade! A cor carmesim de [infidel_weapon.GetName|U] provém do sangue de mil [loser.GetFaith.GetAdherentNamePluralNoTooltip] que [ROOT.Char.GetNameNoTooltip] matou pessoalmente, em sua [memory.GetName]!"\n\n[courtier_1.Custom2('MyCharacterIntroduction', ROOT.Char)|U] e [courtier_2.Custom2('MyCharacterIntroduction', ROOT.Char)] estão profundamente engajados em uma discussão, mas se calam quando percebem que estou ouvindo."
 legend_spread_events.8110.a: "É verdade, eu mesmo[ROOT.Char.Custom('ES_OA')] os matei a todos."
 legend_spread_events.8110.a.win: "Você os convence a ambos"
 legend_spread_events.8110.a.lose: "Você não é convincente"
 legend_spread_events.8110.b: "Não, isso é falso."
 legend_spread_events.8110.c: "A batalha foi grandiosa e deve ser comemorada."
 travel_to_distant_land_tt: "[Concept( 'travel', 'Viajarás' )|E] a [distant_location.GetName]"
 legend_spread_events.8120.t: "O Místico [distant_title.GetBaseNameNoTooltip|U]"
 legend_spread_events.8120.desc: "[chronicler.Custom2('MyCharacterIntroduction', ROOT.Char)] me saúda cordialmente e parece estar entusiasmado[chronicler.Custom('ES_OA')].\n\nMe fala de uma terra mística conhecida simplesmente como "[distant_title.GetBaseNameNoTooltip|U]", e desenrola diante de mim um mapa desse lugar maravilhoso. [chronicler.GetFirstNameNoTooltip] me diz que os rios correm com leite e mel, e que até os camponeses estão gordos com a abundância da terra. Embora normalmente eu nunca me aventurasse tão longe, as histórias da minha jornada heroica certamente teriam efeito em [legend.GetName]!"
 legend_spread_events.8120.a: "Eu devo ir para lá!"
 legend_spread_events.8120.b: "[distant_title.GetBaseNameNoTooltip|U]? Nenhum lugar assim pode existir."
 legend_spread_events.8121.t: "Terras Distantes: Abandonadas"
 legend_spread_events.8121.desc: "Meu maravilhoso mapa de [distant_title.GetBaseNameNoTooltip|U] foi perdido e temo que eu nunca possa viajar para aquela terra em minha vida."
 legend_spread_events.8121.a: "Ai."
 legend_spread_events.8122.t: "Terras Distantes: Chegada"
 legend_spread_events.8122.desc.intro: "Finalmente, cheguei na distante [distant_location.GetName] e"
 legend_spread_events.8122.desc.disappointing.sweden: "minha decepção é imensurável. O céu está negro durante o dia, a comida não passa de peixe em conserva e pão mofado, os locais se recusam a falar uns com os outros, e o frio é insuportável."
 legend_spread_events.8122.desc.disappointing.tribal: "Não poderia estar mais decepcionado. Me prometeram uma metrópole imponente, mas tudo que vejo são algumas tendas e cabanas."
 legend_spread_events.8122.desc.disappointing.wet: "Estou triste com o que vejo. Depois de atravessar águas, vejo algumas cabanas dispersas construídas em torno de águas lamacentas."
 legend_spread_events.8122.desc.disappointing.dry: "Estou chocado com o estado deste lugar. Algumas plantas ressequidas espalham-se por uma paisagem abandonada de edifícios em ruínas, com escassamente um ser vivo à vista."
 legend_spread_events.8122.desc.disappointing.fallback: "isso está longe do que me prometeram. A grande terra mágica de \"[distant_title.GetBaseNameNoTooltip|U]\" que excitava minha imaginação é apenas isso: imaginária. O real [distant_title.GetBaseNameNoTooltip|U] é triste e humilde."
 legend_spread_events.8122.desc.not_disappointing: "[distant_title.GetBaseNameNoTooltip|U] é exatamente o que eu esperava! Este lugar estranho está cheio de pessoas e civilização expansiva. Bancas de mercado estão repletas de comida e a cidade está viva com conversas."
 legend_spread_events.8122.desc.slightly_disappointing: "[distant_title.GetBaseNameNoTooltip|U] não é exatamente o que me prometeram. Embora um assentamento impressionante, os rios não fluem com leite e mel, e a riqueza da nobreza local não parece particularmente inimaginável."
 legend_spread_events.8122.desc.somewhat_disappointing: "Não consigo deixar de ficar desapontado. Embora seja um assentamento perfeitamente adequado, se este é o melhor que [distant_title.GetBaseNameNoTooltip|U] tem a oferecer, então seu esplendor foi muito exagerado."
 legend_spread_events.8122.desc.bridge: "\n\nFaço meu caminho até o que presumo ser a casa de uma família nobre e sou recebido por"
 legend_spread_events.8122.desc.outro.same_culture: "um[distant_courtier.Custom('ES_XA')] [distant_courtier.GetWomanMan] estranhamente familiar. Ela se apresenta em um [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip] perfeito e exige saber o que eu quero da corte de sua [Select_CString( distant_liege.IsFemale, 'señora', 'señor' )], [distant_liege.GetName]."
 legend_spread_events.8122.desc.outro.same_religion: "um[distant_courtier.Custom('ES_XA')] bom[distant_courtier.Custom('ES_OA')] [distant_courtier.GetWomanMan] de fé [ROOT.Char.GetFaith.GetReligion.GetAdjective]. Parece que até mesmo aqui [ROOT.Char.GetFaith.HighGodName|U] recebe a devida adoração. [distant_courtier.GetSheHe|U] quer saber quem sou e o que me traz até aqui."
 legend_spread_events.8122.desc.outro.fallback: "um[distant_courtier.Custom('ES_XA')] estranh[distant_courtier.Custom('ES_OA')] [distant_courtier.GetWomanMan] nobre. Vê-se claramente que meu porte nobre me precede, pois [distant_courtier.GetSheHe] parece imediatamente ansios[distant_courtier.Custom('ES_OA')] por saber quem sou e o que me traz por aqui."
 legend_spread_events.8122.a: "Quero ver como as pessoas lutam aqui."
 legend_spread_events.8122.b: "Deixe-me falar com seu[distant_liege.Custom('ES_OA')] senhor[distant_liege.Custom('ES_XA')] sobre [legend.GetName]."
 legend_spread_events.8122.b.success: "Sua lenda é cativante"
 legend_spread_events.8122.b.failure: "[distant_liege.GetFirstName] está entediado"
 legend_spread_events.8122.c: "Você tem um presente para mim?"
 legend_spread_events.8124.t: "Terras Distantes: Derrota"
 legend_spread_events.8124.desc: "Embora tenha lutado valentemente, parece que não sou páreo para os estilos de luta de um guerreiro [distant_title.GetAdjective]. Embora derrotado, o simples fato de ter enfrentado armas com um estrangeiro nesta terra mística aumentará meu status lendário."
 legend_spread_events.8124.a: "Ai."
 legend_spread_events.8125.t: "Terras Distantes: Vitória"
 legend_spread_events.8125.desc: "Meu oponente lutou de maneiras que eu nunca havia visto antes, e embora inicialmente isso me tenha desconcertado, saí vitorioso. As lendas sobre minha vitória sobre um guerreiro [distant_title.GetAdjective] certamente se espalharão por todo lugar."
 legend_spread_events.8125.a: "Maravilhoso."
 legend_spread_events.8125.b: "Junte-se a mim!"
 legend_spread_events.8130.t: "Uma Iniciação Angelical"
 legend_spread_events.8130.desc: "[chronicler.Custom2('MyCharacterIntroduction', ROOT.Char)|U] vem até mim com notícias sobre [legend.GetName]. Ele me diz que localizou vários registros que atestam que [founder.GetName] era mais do que um[founder.Custom('ES_XA')] simples [founder.GetTitleAsNameNoTooltip|l]. Que foi um anjo quem lhe concedeu seu direito como governante de [legend_title.GetName].\n\nEste mensageiro de [ROOT.Char.GetFaith.PositiveAfterLife] prometeu que a casa de [ROOT.Char.GetHouse.GetNameNoTooltip] governaria [legend_title.GetName] para sempre e faria cumprir a vontade [ROOT.Char.GetFaith.HighGodNamePossessive] na terra. Embora seja uma afirmação fantástica, se eu conseguir que as pessoas acreditem nela, ninguém questionará meu domínio."
 legend_spread_events.8130.a: "Isso é verdade."
 legend_spread_events.8130.a.win: "Sua reivindicação é plausível"
 legend_spread_events.8130.a.lose: "Sua reivindicação é considerada heresia"
 legend_spread_events.8130.b: "Não, isso é herético."
 legend_spread_events.8141.t: "Uma Vitória Legendária"
 legend_spread_events.8141.desc: "Enquanto as forças de [enemy_commander.GetName] fogem em debandada, fico a me deleitar com minha própria glória. Ao meu redor há estandartes dilacerados e os cadáveres putrefatos daqueles que se opuseram a mim. Um soldado jaz ao meu lado, chorando de agonia, com as mãos ensanguentadas por suas próprias entranhas. Respiro fundo esse ar acre e mortal, o cheiro da vitória.\n\nNa verdade, foi minha própria destreza como cavaleir[ROOT.Char.Custom('ES_OA')] e minha estratégia como comandante que decidiram este confronto. Esta foi uma batalha que certamente tornará meu nome famoso."
 legend_spread_events.8141.a: "Uma lenda digna de ser contada."
 legend_spread_events.8141.b: "Isso foi uma premonição do que está por vir."
 legend_spread_events.8150.t: "A Marca Permanente"
 legend_spread_events.8150.desc: "Enquanto me regozijo num banquete, noto que [intrigued_guest.Custom2('MyCharacterIntroduction', ROOT.Char)] tem me encarado atentamente em minha [ROOT.Char.Custom('GetInjuredBodyPart')], intrigad[intrigued_guest.Custom('ES_OA')] sem dúvida por conta de sua [ROOT.Char.Custom('PermanentInjuryAdjective')].\n\nAssim que faço saber que percebi, desvia rapidamente o olhar, sem dúvida envergonhad[intrigued_guest.Custom('ES_OA')] sorprendendo-o a contemplar minha deformidade. Embora sua fascinação seja algo ofensiva, isso me dá a oportunidade de contar como essa lesão aconteceu."
 legend_spread_events.8150.a: "\"Fui ferido lutando contra uma besta poderosa!\""
 legend_spread_events.8150.b: "\"Fui atacado por infiéis enquanto lutava por [ROOT.Char.GetFaith.HighGodName|U].\""
 legend_spread_events.8150.c: "\"É uma história que levarei para o túmulo.\""
 legend_spread_events.8150.d: "\"Você não tem maneiras? Não fique olhando!\""
 legend_spread_events.8160.t: "Um Amor Legendário"
 legend_spread_events.8160.desc: "Meu coração palpita ao pensar em [soulmate.GetSheHe], e até mesmo enquanto estou sentad[ROOT.Char.Custom('ES_OA')]a sós em minha [SelectLocalization( IsLandlessAdventurer( ROOT.Char ), 'tienda', 'estudio')], só desejo cantar nosso amor a todos que quiserem ouvir. Com minha [ROOT.Char.Custom('WritingInstrument')] sobre a página, meus sentimentos fluem pela tinta mais rápido do que consigo escrever.\n\nEnquanto encho a página com elogios a [soulmate.GetSheHe], não consigo deixar de pensar em como poderia imortalizar nosso amor por meio de [legend.GetName]! Embora a história se concentre em mim, narrar como conquistei o coração da minha bel[soulmate.Custom('ES_OA')] [soulmate.Custom('PetName')|l] seria um excelente acréscimo ao relato."
 legend_spread_events.8160.a: "Seremos lendas juntos."
 legend_spread_events.8160.b: "Não, a história é somente para mim."
 legend_spread_events.8170.t: "Para Quem Os Sinos Tocam"
 legend_spread_events.8170.desc.intro: "Uma noite me retiro para meus aposentos, exaust[ROOT.Char.Custom('ES_OA')] e cansad[ROOT.Char.Custom('ES_OA')] de mais um dia de tédio e monotonia. Ao me aproximar do sono, sou despertado de repente pelo estridente rangido de metal contra a pedra.\n\nDou um salto e vejo uma figura sombria à beira da minha cama, seu sorriso dentuço é a única parte iluminada de [ROOT.Char.GetFaith.DeathDeitySheHe] que consigo ver com clareza. Não consigo me mover, só posso olhar enquanto [ROOT.Char.GetFaith.DeathDeitySheHe] se aproxima de mim, adaga em mãos.\n\nEntão, de repente, desperto mais uma vez."
 legend_spread_events.8170.desc.mid.taoist: "Isso é um sinal claro de que minhas energias não estão harmonicamente alinhadas em direção a [ROOT.Char.GetFaith.HighGodName|U]."
 legend_spread_events.8170.desc.mid.reincarnation: "Embora meu espírito um dia continue o ciclo da reencarnação, ainda não estou pronto[ROOT.Char.Custom('ES_OA')]."
 legend_spread_events.8170.desc.mid.fallback: "[ROOT.Char.GetFaith.DeathDeitySheHe|U] me marcou com esta visita."
 legend_spread_events.8170.desc.outro: "Temo que eu seja recolhido por [ROOT.Char.GetFaith.DeathDeityName|U] muito em breve, um destino que devo mudar!"
 legend_spread_events.8170.a: "Eu devo me tornar imortal."
 legend_spread_events.8170.b.chess: "Provavelmente só queria jogar xadrez."
 legend_spread_events.8170.b.fallback: "Foi um sonho. Apenas isso, e nada mais."
 legend_spread_events.8171.t: "Ecos do Futuro"
 legend_spread_events.8171.desc: "Enquanto seguro meu bebê recém-nascido nos braços, não consigo deixar de ver meu próprio rosto refletido no dele. Todos dizem que ele se parece muito comigo, e estão certos.\n\nTalvez este seja o tipo de imortalidade que tenho buscado, alguém que leve adiante meu legado e continue minha história quando eu não estiver mais aqui."
 legend_spread_events.8171.a: "A história nunca termina."
 legend_spread_events.8172.t: "Qual é o Meu Propósito?"
 legend_spread_events.8172.desc: "Tudo está escuro ao meu redor. Logo adiante, ao longe, há uma luz solitária. Como por instinto, atravesso esse vazio em direção àquele único ponto de luz, até que sou saudado por uma figura solitária vestida de branco que se parece com uma versão mais velha de mim.\n\nSorria para mim com uma ternura que só um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetMotherFather] pode dar e me convida a sentar ao lado de [ROOT.Char.GetSheHe]. Imers[ROOT.Char.Custom('ES_OA')] na ternura de sua presença, sinto uma euforia e uma paz inexplicáveis.\n\n“Você sabe por que fiz os mortais morrerem, [ROOT.Char.GetFirstNameNoTooltip]? É isso que os separa de mim. Você sabe o quão preciosa é a vida. Sua eternidade em [ROOT.Char.GetFaith.PositiveAfterLife] está chegando, mas por enquanto há pessoas lá embaixo esperando por você.”"
 legend_spread_events.8172.a: "\"Entendi. Finalmente entendi.\""
 legend_spread_events.8172.b: "\"Não! Eu #EMP vou#! viver para sempre!\""
 legend_spread_events.8172.c: "Acho que já estou list[ROOT.Char.Custom('ES_OA')]."
 legend_spread_events.8172.a.flavor: "Acordas sendo um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] novo[ROOT.Char.Custom('ES_OA')]!"
 legend_spread_events.8172.b.flavor: "Você acorda revigorado."
 legend_spread_events.8172.c.flavor: "Você decide passar em silêncio."
 legend_spread_events.8180.t: "Vingança Justa"
 legend_spread_events.8180.desc: "Ultimamente passo noites em claro, lembrando de quando [dead_parent.Custom2('MyCharacterIntroduction', ROOT.Char)] [dead_parent.GetDeathReason]. Como se pode acreditar na justiça quando [killer.GetSheHe] vive e [dead_parent.GetFirstNameNoTooltip] deveria morrer?\n\nA mera ideia de pensar em que [killer.GetSheHe] continue se exibindo, respirando, me faz ferver de raiva e tudo o que eu quero é que isso acabe."
 legend_spread_events.8180.a: "[killer.GetNameNoTooltip] é meu inimigo[killer.Custom('ES_OA')]."
 legend_spread_events.8180.b: "Devo aprender a perdoar."
 8180_bonus_if_you_kill_tt: "A qualidade da sua lenda aumentará muito se você matar [killer.GetName]"
 legend_spread_events.8181.t: "[killer.Custom('ES_ElLa')|U] [killer.Custom2('InsultNoun'), ROOT.Char] enterrado[killer.Custom('ES_OA')|l]"
 legend_spread_events.8181.desc.intro: "Finalmente, [killer.GetName] não respira mais e posso suspirar aliviado agora que [killer.GetSheHe] não está mais sujando o mundo com sua presença."
 legend_spread_events.8181.desc.mid.murder: "Entregar[killer.GetHerHim] a [ROOT.Char.GetFaith.NegativeAfterLife] com minhas próprias mãos é uma grande honra."
 legend_spread_events.8181.desc.mid.fallback: "Tinha a esperança de acabar pessoalmente com essa espécie de [killer.Custom2('InsultNoun', ROOT.Char)], mas parece que [ROOT.Char.GetFaith.HighGodName] tinha seus próprios planos para tal [killer.Custom2('InsultNoun', ROOT.Char)]."
 legend_spread_events.8181.desc.outro: "\n\nSinto que [dead_parent.Custom2('MyCharacterIntroduction', ROOT.Char)] agora finalmente pode descansar em paz, e o mundo está como deveria ser."
 legend_spread_events.8181.a: "Justiça enfim."
 legend_spread_events.8190.t: "[Select_CString( ROOT.Char.IsFemale, 'A menina', 'O menino' )] [ROOT.Char.MakeScope.Var('animal_type').GetFlagName]"
 legend_spread_events.8190.desc: "Uma noite, sentado[ROOT.Char.Custom('ES_OA')] confortavelmente em meu escritório, conto [legend.GetName] a [chronicler.Custom2('MyCharacterIntroduction', ROOT.Char)] quando, de repente, me ocorre um pensamento. Meus pares muitas vezes me chamam de "excêntrico". Há algo em mim que torna difícil para os outros criarem uma ligação comigo.\n\nTenho dificuldade em me lembrar de grande parte da minha infância, mas sempre senti uma forte afinidade com o nobre [ROOT.Char.MakeScope.Var('animal_type').GetFlagName], quase como alguém sentiria por sua mãe ou seu pai. Levanto-me imediatamente e [chronicler.GetNameNoTooltip] deixa cair seu [chronicler.Custom('WritingInstrument')]. Ousarei fazer tal afirmação? Ousarei dizer que fui criado por um exemplar de [ROOT.Char.MakeScope.Var('animal_type').GetFlagName]?"
 legend_spread_events.8190.a: "Eu ousarei!"
 legend_spread_events.8190.a.win: "Você convence [chronicler.GetFirstNameNoTooltip]"
 legend_spread_events.8190.a.lose: "Algo se perdeu na tradução"
 legend_spread_events.8190.a.crit_lose: "[chronicler.GetFirstNameNoTooltip] parece zombar de você"
 legend_spread_events.8190.b: "Não ousarei."
 you_find_the_tome_tt: "Você encontra o tomo"
 you_fail_to_find_the_tome_tt: "Você falha em encontrar o tomo"
 you_destroy_the_tome_tt: "O tomo é destruído"
 major_legend_quality_decrease_tt: "O desconto para melhorar sua [legend|lE] #difficulty_hard diminui#! consideravelmente"
 medium_legend_quality_decrease_tt: "O desconto para melhorar sua [legend|lE] #difficulty_hard diminui#!"
 minor_legend_quality_decrease_tt: "O desconto para melhorar sua [legend|lE] #difficulty_hard diminui#! ligeiramente"
 major_legend_quality_increase_tt: "O desconto para melhorar sua [legend|lE] #difficulty_easy aumenta#! consideravelmente"
 medium_legend_quality_increase_tt: "O desconto para melhorar sua [legend|lE] #difficulty_easy aumenta#!"
 minor_legend_quality_increase_tt: "O desconto para melhorar sua [legend|lE] #difficulty_easy aumenta#! ligeiramente"
 legend_quality_if_wins_tt: "O desconto para melhorar sua [legend|lE] #difficulty_easy aumenta#! se você vencer o duelo"
 friend_legendary_tale: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'contou', 'contou' )] uma história lendária para [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetShortUIName )]."
 friend_legendary_tale_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'contou', 'contou' )] um relato lendário para [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUIName )]."
 ancient_culture_tome: "Tomo da [promoted_legend.GetProperty('culture').Culture.GetNameNoTooltip]"
 ancient_culture_tome_desc: "Este antigo tomo parece sugerir uma ligação entre o [promoted_legend.GetProperty('culture').Culture.GetCollectiveNoun] e o [ROOT.Char.GetCulture.GetCollectiveNoun]."
 ancient_culture_artifact: "Escultura [promoted_legend.GetProperty('culture').Culture.GetNameNoTooltip]"
 ancient_culture_artifact_desc: "Uma escultura antiga de um animal feita pelas mãos [promoted_legend.GetProperty('culture').Culture.GetName]. Está desbotada e mal reconhecível, mas segurar um pedaço do passado nas mãos faz com que alguém se sinta de alguma forma conectado a ele."
 legend_chapter_punched_animal_great: "[ROOT.Legend.GetProtagonist.GetNameNoTooltip] correu em direção ao [Localize( beast )] com o punho recuado e despedaçou a besta em miúdos com um único golpe poderoso no crânio."
 legend_chapter_punched_animal_good: "[ROOT.Legend.GetProtagonist.GetNameNoTooltip] recebeu o ataque de um exemplar de [Localize( beast )] e lutou contra a besta em combate corpo a corpo. Apesar do fator surpresa, [ROOT.Legend.GetProtagonist.GetSheHe] matou a fera com as próprias mãos."
 legend_chapter_punched_animal_bad: "[ROOT.Legend.GetProtagonist.GetNameNoTooltip] foi atacado por um exemplar de [Localize( beast )] e lutou contra a besta em combate corpo a corpo. Embora no final tenha tido de ser resgatad[ROOT.Legend.GetProtagonist.Custom('ES_OA')] por sua partida de caça, a fera foi abatida."
 legend_chapter_punched_animal_very_bad: "Para a confusão de sua partida de caça, [ROOT.Legend.GetProtagonist.GetNameNoTooltip] se separou do grupo para atacar um exemplar de [Localize( beast )] em suas regiões pudendas. Depois de colocar a partida em perigo de forma grave e desonrar-se a si mesm[ROOT.Legend.GetProtagonist.Custom('ES_OA')], a fera foi abatida."
 legend_chapter_person_of_lake_great: "[ROOT.Legend.GetProtagonist.GetNameNoTooltip] testemunhou um ser do [ROOT.Legend.GetProtagonist.GetFaith.PositiveAfterLife] emergir das águas. [ROOT.Legend.GetProtagonist.GetSheHe] conversou com eles e recebeu uma missão do [ROOT.Legend.GetProtagonist.GetFaith.HighGodName|U]."
 legend_chapter_person_of_lake_good: "Enquanto atravessava os pântanos, [ROOT.Legend.GetProtagonist.GetNameNoTooltip] encontrou uma pessoa excepcionalmente sábia que vivia nas águas e lhe confiou uma missão divina."
 legend_chapter_person_of_lake_bad: "Enquanto vagava meio delirante por beber água contaminada, [ROOT.Legend.GetProtagonist.GetNameNoTooltip] teve visões de uma pessoa bonita e sábia que lhe indicou seu destino mágico."
 legend_chapter_person_of_lake_very_bad: "[ROOT.Legend.GetProtagonist.GetNameNoTooltip|U] encontrou um eremita velho e desgrenhado espumando pela boca e gritando profecias para quem quisesse ouvir. [ROOT.Legend.GetProtagonist.GetNameNoTooltip|U] levou esse habitante do pântano a sério e escolheu torná-lo seu destino."
 legend_chapter_great_battle: "As forças de [ROOT.Legend.GetProtagonist.GetName] foram encurraladas por [ROOT.Legend.MakeScope.Var('8141_commander').Char.GetNameNoTooltip] e seu exército. A batalha foi longa e sangrenta e muitas vidas foram perdidas, mas [ROOT.Legend.GetProtagonist.GetNameNoTooltip|U] saiu vitorios[ROOT.Legend.GetProtagonist.Custom('ES_OA')], com os estandartes e as armas banhados no sangue de seus inimigos."
 legend_chapter_battled_mighty_beast_good: "[ROOT.Legend.GetProtagonist.GetNameNoTooltip|U] lutou valentemente e venceu uma grande e poderosa besta, mas a luta deixou uma marca permanente em seu corpo."
 legend_chapter_battled_mighty_beast_bad: "[ROOT.Legend.GetProtagonist.GetNameNoTooltip|U] decidiu atacar uma besta poderosa e foi permanentemente ferido no esforço fútil."
 legend_chapter_injured_evangelising_good: "[ROOT.Legend.GetProtagonist.GetNameNoTooltip|U] estava pregando corajosamente a fé entre hereges e incrédulos quando [ROOT.Legend.GetProtagonist.Custom('ES_LoLa')] atacaram por suas crenças e ficou deformad[ROOT.Legend.GetProtagonist.Custom('ES_OA')] para sempre."
 legend_chapter_injured_evangelising_bad: "[ROOT.Legend.GetProtagonist.GetNameNoTooltip|U] estava pregando heresia entre os camponeses e um grupo de verdadeiros fiéis [ROOT.Legend.GetProtagonist.GetHerHim] feriu."
 legend_chapter_mysterious_injury: "[ROOT.Legend.GetProtagonist.GetNameNoTooltip|U] [ROOT.Legend.GetProtagonist.Custom('GainedPermanentInjury')] em circunstâncias obscuras e misteriosas. O acontecimento que provocou sua [ROOT.Legend.GetProtagonist.Custom('PermanentInjuryAdjective')] continua sendo um assunto conhecido por ninguém além de [ROOT.Legend.GetProtagonist.GetSheHe]."
 legend_chapter_love: "[ROOT.Legend.GetProtagonist.GetNameNoTooltip|U] conquistou a mão do amor de sua vida, [ROOT.Legend.MakeScope.Var('8160_soulmate').Char.GetNameNoTooltip]. Em todas as grandes façanhas realizadas pelos outros, [ROOT.Legend.MakeScope.Var('8160_soulmate').Char.GetFirstNameNoTooltip] esteve lá com [ROOT.Legend.GetProtagonist.GetSheHe] o tempo todo e diz-se que seu amor foi um presente de [ROOT.Legend.GetProtagonist.GetFaith.FertilityGodName]."
 legend_chapter_immortal: "[ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip|U] foi abalado[ROOT.Legend.GetProtagonist.Custom('ES_OA')] no meio da noite pela impactante visita de [ROOT.Legend.GetProtagonist.GetFaith.DeathDeityName|U]. A partir desse encontro angustiante, [ROOT.Legend.GetProtagonist.GetName] decidiu fugir do que outros considerariam inevitável e buscar a vida eterna na Terra."
 legend_chapter_immortal_child_conclusion: "Os medos de [ROOT.Legend.GetProtagonist.GetNameNoTooltip|U] sobre a eternidade de [ROOT.Legend.GetProtagonist.GetFaith.PositiveAfterLife|U] foram aplacados de uma vez por todas com o nascimento de seu [ROOT.Legend.MakeScope.Var('8171_child').Char.Custom('GetDaughterSon')] [ROOT.Legend.MakeScope.Var('8171_child').Char.GetName]. Neste bebê, [ROOT.Legend.GetProtagonist.GetNameNoTooltip] viu seu próprio futuro e a imortalidade de seu legado."
 legend_chapter_accept_mortality_conclusion: "[ROOT.Legend.GetProtagonist.GetNameNoTooltip|U] recebeu a visita de [ROOT.Legend.GetProtagonist.GetFaith.CreatorName], que lhe falou diretamente sobre a natureza da criação e a beleza de uma vida efêmera. Desse lendário encontro, [ROOT.Legend.GetProtagonist.GetNameNoTooltip] saiu [Select_CString( ROOT.Legend.GetProtagonist.IsFemale, 'uma mulher nova', 'um homem novo' )], reconciliad[ROOT.Legend.GetProtagonist.Custom('ES_OA')] com a fugacidade da vida e a paz de [ROOT.Legend.GetProtagonist.GetFaith.PositiveAfterLife|U]."
 legend_chapter_confronted_creator_conclusion: "[ROOT.Legend.GetProtagonist.GetNameNoTooltip|U] recebeu a visita de [ROOT.Legend.GetProtagonist.GetFaith.CreatorName], que lhe falou diretamente sobre a natureza da criação e a beleza de uma vida finita. [ROOT.Legend.GetProtagonist.GetNameNoTooltip] desafiou até mesmo sua própria criadora e jurou continuar sua busca pela imortalidade."
 legend_chapter_revenge_quest: "[ROOT.Legend.GetProtagonist.GetNameNoTooltip|U] jurou vingar-se de [ROOT.Legend.MakeScope.Var('8180_revenge_quest').Char.GetNameNoTooltip] pelo assassinato de seu progenitor. Como representante de tudo o que é justo e reto na terra, [ROOT.Legend.GetProtagonist.GetNameNoTooltip] tomou a decisão de que seu propósito na vida era fazer justiça a esse vilão."
 legend_chapter_revenge_quest_complete: "Finalmente, [ROOT.Legend.MakeScope.Var('8180_revenge_quest').Char.GetNameNoTooltip] foi morto e entregue a [ROOT.Legend.GetProtagonist.GetFaith.NegativeAfterLife] por [ROOT.Legend.GetProtagonist.GetNameNoTooltip]."
 legend_chapter_revenge_quest_divine_justice: "Parece que [ROOT.Legend.GetProtagonist.GetFaith.HighGodName|U] concordou com a avaliação de [ROOT.Legend.GetProtagonist.GetName] e privou pessoalmente [ROOT.Legend.MakeScope.Var('8180_revenge_quest').Char.GetNameNoTooltip] da vida e entregou [ROOT.Legend.GetProtagonist.GetFaith.NegativeAfterLife] ao"
 legend_chapter_raised_by_animal: "[ROOT.Legend.GetProtagonist.GetNameNoTooltip|U] se perdeu quando era uma criança, e foi adotad[ROOT.Legend.GetProtagonist.Custom('ES_OA')] e criad[ROOT.Legend.GetProtagonist.Custom('ES_OA')] por um exemplar de [ROOT.Legend.MakeScope.Var('animal_parent').GetFlagName]. Muitos especulam que esta seja a causa de sua suposta excentricidade."
 legend_chapter_forged_own_path: "[ROOT.Legend.GetProtagonist.GetNameNoTooltip|U] sabia que a jornada que se avizinhava seria perigosa, mas seu caminho estava decidido desde o princípio. Sem hesitação alguma, traçou uma rota e um propósito, guiado apenas pela força de sua própria vontade."
 possessed_artifact_desc: "[witchy_artifact.GetDesc]\n\nContém um espírito maligno poderoso aprisionado por uma bruxa poderosa."
 infidel_artifact_desc: "[infidel_weapon.GetDesc]\n\nEsta arma foi usada para matar 1000 [memory.loser.GetFaith.GetAdherentNamePluralNoTooltip] na [memory.GetName]."
 ce1_battle_artifact_desc: "[infidel_weapon.GetDesc]\n\nEsta arma foi gravada com uma descrição da [memory.GetName]."
