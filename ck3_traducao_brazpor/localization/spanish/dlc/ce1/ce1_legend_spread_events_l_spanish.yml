 legend_spread_events.0070.t: "Digno?"
 legend_spread_events.0070.desc: "Os cantores ocupam o estrado de madeira para encher a noite de música. Enquanto dou um gole em minha [ROOT.Char.Custom('RegionalAlcoholicDrink')], fecho os olhos e me concedo um momento de descanso.\n\n"E agora, escutem todos! Escutem bem! #EMP [ROOT.Char.GetPromotedLegend.GetName]#!!".\n\nO clamor dos meus [ROOT.Char.Custom('GetCourtierPlural')] enche a sala, junto com o som de talheres batendo nas mesas e risadas estrondosas. Um pensamento cheio de dúvidas me atormenta em meio à admiração da [ROOT.Char.Custom('GetCourt')].\n\nSou eu… dign[ROOT.Char.Custom('ES_OA')]?"
 legend_spread_events.0070.a: "#EMP Claro que sou#!"
 legend_spread_events.0070.b: "Eu... Eu não tenho mais certeza."
 legend_spread_events.0070.c: "Eu não! Eu não! Eu não sou #EMP não!#!"
 legend_spread_events.0070.d: "Acho que sou."
 legend_spread_events.0070.a.tt: "Você vai refletir sobre isso"
 legend_spread_events.0071.t: "Um Verdadeiro Herói"
 legend_spread_events.0071.desc.intro: "A água sobe das profundezas da fonte, pequenas bolhas estouram na superfície. Eu olho para baixo no azul e vejo meu próprio reflexo.\n\n"
 legend_spread_events.0071.desc.mid.arrogant: "Forte. Belo. #EMP Dign[ROOT.Char.Custom('ES_OA')].#!"
 legend_spread_events.0071.desc.mid: "Uma sombra de dúvida atrás dos meus olhos. Eu tento afastá-la."
 legend_spread_events.0071.desc.promoter: "\n\n"[ROOT.Char.GetTitledFirstNameNoTooltip]…?". Me viro e vejo [promoter.Custom('ES_AlAla')] [promoter.GetTitledFirstName|l] bem ao meu lado. "Por favor, conte-me sua lenda. Viajei muitos dias e noites para ouvi-la"."
 legend_spread_events.0071.desc.fallback: "\n\nMeus [ROOT.Char.Custom('GetFollowerOrVassalPlural')]… O que veem em mim? Eu me aproximo da água. O que veem? [Select_CString( ROOT.Char.IsFemale, 'Una… heroína', 'Un… héroe' )]? Ao menos, espero que sim."
 legend_spread_events.0071.a: "\"Uma alma gêmea. Junte-se a mim.\""
 legend_spread_events.0071.b: "[other_promoter.GetFirstNameNoTooltip] pode ser persuadido... um completo oposto."
 legend_spread_events.0071.c: "Vou convencer meu povo."
 legend_spread_events.0071.d: "Devo ser [Select_CString( ROOT.Char.IsFemale, 'uma heroína', 'um herói' )] para mim mesm[ROOT.Char.Custom('ES_OA')]."
 legend_chain_arrogant_modifier: "Um Verdadeiro Herói"
 legend_chain_arrogant_modifier_desc: "Este personagem está cheio de confiança em sua natureza heroica."
 legend_chain_kinda_arrogant_modifier: "Um Herói Confiante"
 legend_chain_kinda_arrogant_modifier_desc: "Este personagem está determinado a mostrar a todos sua natureza heroica."
 legend_spread_events.0072.t: "Em Busca de Respostas"
 legend_spread_events.0072.desc.intro: "Eu entro no [ROOT.Char.Custom('GetFaithTemple')] e a luz pinta as paredes com os tons suaves do crepúsculo.\n\n"
 legend_spread_events.0072.desc.mid.depressed: "Respiro fundo. [ROOT.Char.GetFaith.HighGodName], eu falhei com você. Um[ROOT.Char.Custom('ES_XA')] mero mortal, indign[ROOT.Char.Custom('ES_OA')], inútil, #EMP patétic[ROOT.Char.Custom('ES_OA')].#!\n\n"
 legend_spread_events.0072.desc.mid.fallback: "Consegueis me ver, [ROOT.Char.GetFaith.HighGodName]? E o que há para contemplar? Um[ROOT.Char.Custom('ES_XA')] mortal vulgar, talvez indign[ROOT.Char.Custom('ES_OA')], talvez extraviad[ROOT.Char.Custom('ES_OA')]. Não resta ninguém para me guiar.\n\n"
 legend_spread_events.0072.desc.vassal: ""[ROOT.Char.GetTitledFirstNameNoTooltip]…?". Não havia percebido outra presença no templo. [praying_vassal.Custom('ES_ElLa')|U] [praying_vassal.GetTitledFirstName|l] está ao meu lado, com as mãos juntas em oração. "Viajei dias e noites para ouvir vossa lenda. Sei que [ROOT.Char.GetFaith.HighGodName] também deseja ouvi-la"."
 legend_spread_events.0072.desc.fallback: "Eu ando de um lado para o outro na sala. Tenho preocupações dentro de mim das quais não posso falar. Minha fé treme. O que significa ser santo? Se não posso ser isso, pelo menos tentarei."
 legend_spread_events.0072.a: "Apenas a opinião de [ROOT.Char.GetFaith.HighGodNamePossessive] importa."
 legend_spread_events.0072.b: "\"[praying_vassal.GetFirstNameNoTooltip]... você está certo.\""
 legend_spread_events.0072.c: "Meu povo deve saber da minha piedade."
 legend_spread_events.0072.d: "Encontrarei consolo em [bishop.Custom('ES_ElLa')] [bishop.GetTitledFirstNameNoTooltip|l]."
 legend_chain_zealous_modifier: "Lenda Zelosa"
 legend_chain_zealous_modifier_desc: "Este personagem encontrou as respostas de que precisava em um poder superior."
 legend_spread_events.0073.t: "Sozinho?"
 legend_spread_events.0073.desc.intro: "O ar está silencioso. Imóvel. As folhas estão tão paradas que não consigo dizer se todas as árvores morreram durante a noite.\n\n"
 legend_spread_events.0073.desc.mid.depressed: "Eu também me sinto da mesma forma.\n\n"
 legend_spread_events.0073.desc.mid.fallback: "Como eu gostaria de poder ficar aqui. Aqui, onde o som das trombetas não pode me alcançar. Aqui, onde as palavras da lenda são apenas um sussurro abafado.\n\n"
 legend_spread_events.0073.desc.vassal: ""[ROOT.Char.GetTitledFirstNameNoTooltip]...?" Viro-me para encontrar [fighting_vassal.Custom('ES_AlAla')] [fighting_vassal.GetTitledFirstName|l] encarando-me, com a mão na espada e o suor escorrendo pela testa. "Viajei dias e noites para encontrar-vos. Os ecos da vossa lenda me inspiraram a me tornar [Select_CString( fighting_vassal.IsFemale, 'uma guerreira', 'um guerreiro' )] melhor. Por favor, conte-me sobre seus feitos"."
 legend_spread_events.0073.desc.fallback: "Eu fecho os olhos. A luz intensa de uma lâmina vem à mente. Raios de sol refletidos no aço. Alguns outros olhos também. Uma besta, talvez. Ou um inimigo. Eu fecho a mão — eu já fiz isso no passado. Eu #EMP devo#! continuar fazendo."
 legend_spread_events.0073.a: "Existem batalhas nos esperando."
 legend_spread_events.0073.b: "\"Claro, venha, escute.\""
 legend_spread_events.0073.c: "Devo inspirar meu povo."
 legend_spread_events.0073.d: "[marshal.Custom('ES_ElLa')|U] [marshal.GetTitledFirstNameNoTooltip|l] sempre me cobre as costas."
 legend_chain_army_modifier: "Nascido para a Batalha"
 legend_chain_army_modifier_desc: "Este personagem encontrou uma motivação renovada nas batalhas que virão."
 legend_chain_marshal_modifier: "Lenda Marcial"
 legend_chain_marshal_modifier_desc: "Este personagem está focado em se tornar o melhor guerreiro possível."
 legend_spread_events.0074.t: "Nas Cavernas da Mente"
 legend_spread_events.0074.desc.intro: "Escuridão e frio habitam esses catacumbas."
 legend_spread_events.0074.desc.mid.depressed: "A tentação de ficar aqui me assalta. Apenas se esconder, e esquecer de tudo o mais. Um impulso.\n\n"
 legend_spread_events.0074.desc.mid.fallback: "E se eu apenas ficasse aqui? Em silêncio. A pedra e eu. Um roedor ocasional como meu único visitante. Há uma calma nisso.\n\n"
 legend_spread_events.0074.desc.vassal: ""[ROOT.Char.GetTitledFirstNameNoTooltip]?". A figura [wise_vassal.Custom('ES_DelDela')] [wise_vassal.GetTitledFirstName|l] aparece ao virar a esquina. "O que você está fazendo aqui embaixo? Que encontro fatídico. Viajei dias e noites para encontrá-lo. Sua lenda… Devo confessar que ela me comoveu".\n\n"
 legend_spread_events.0074.desc.spouse: ""Meu am[ROOT.Char.Custom('ES_OA')] meu[ROOT.Char.Custom('ES_OA')]…", meu querid[spouse.Custom('ES_OA')] [spouse.GetFirstName] está ao lado dele. "Eu estava preocupado com você[spouse.Custom('ES_OA')]"."
 legend_spread_events.0074.desc.fallback: "Vago pelos corredores sem rumo, sem saber onde vou parar. Sem me importar. Escuridão sobre escuridão sobre escuridão. Se eu fosse dign[ROOT.Char.Custom('ES_OA')] desta lenda… eu sentiria isso, certo? Talvez. Talvez."
 legend_spread_events.0074.a: "\"Meu amor... Não vou te desapontar.\""
 legend_spread_events.0074.b: "\"[wise_vassal.GetFirstNameNoTooltip], #EMP você#! me comoveu.\""
 legend_spread_events.0074.c: "Não posso decepcionar meu povo."
 legend_spread_events.0074.d: "[chancellor.Custom('ES_ElLa')|U] [chancellor.GetTitledFirstNameNoTooltip|l] pode me ajudar com os detalhes diplomáticos."
 legend_chain_spouse_modifier: "Apoio Inestimável"
 legend_chain_spouse_modifier_desc: "Este personagem foi comovido pelo apoio inestimável de seu cônjuge para sua lenda."
 legend_chain_chancellor_modifier: "Lenda Dúctil"
 legend_chain_chancellor_modifier_desc: "Este personagem contou com a ajuda de seu chanceler para recuperar a confiança em sua lenda."
 legend_protagonist_legitimacy_miniscule_tt: "Você ganha #positive_value [SCOPE.ScriptValue('miniscule_legitimacy_gain')|0]#! de [legitimacy|lE] legitimidade adicional de seu [legend_protagonist|lE]"
 legend_protagonist_legitimacy_minor_tt: "Você ganha #positive_value [SCOPE.ScriptValue('minor_legitimacy_gain')|0]#! de [legitimacy|lE] extra de seu [legend_protagonist|lE]"
 legend_protagonist_legitimacy_medium_tt: "Você ganha #positive_value [SCOPE.ScriptValue('medium_legitimacy_gain')|0]#! de [legitimacy|lE] extra por seu [legend_protagonist|lE]"
 legend_protagonist_legitimacy_major_tt: "Você ganha #positive_value [SCOPE.ScriptValue('major_legitimacy_gain')|0]#! adicional de [legitimacy|lE] por seu [legend_protagonist|lE]"
 legend_spread_events.5400.t: "Embelezamentos Necessários"
 legend_spread_events.5400.desc: ""Se eu pudesse incomodar por um momento, [ROOT.Char.Custom('FormOfAddressForLiege')]", começa [chronicler.GetFirstName], com um tom um pouco bajulador para o meu gosto, "seria de grande ajuda para nós acrescentar mais alguns detalhes a [promoted_legend.GetName]. Quanto mais… #EMP más grandiosos,#! melhor!". [chronicler.GetFirstNameNoTooltip] me olha expectante.\n\nAlgumas sementes de conspiração começam a brotar na minha mente. Passar a história já existente com detalhes mais extravagantes certamente não faria mal, mas substituir essa parte da história por outra completamente diferente também tem suas vantagens…"
 legend_spread_events.5400.a: "\"Claro, vou revisar mais uma vez!\""
 legend_spread_events.5400.a.majorsuccess: "Seus embelezamentos adicionam muito à história"
 legend_spread_events.5400.a.minorsuccess: "Seus embelezamentos são bastante modestos"
 legend_spread_events.5400.b: "\"Bem, sabe, muitas vezes é mal citado...\""
 legend_spread_events.5400.b.success: "Sua interpretação é plausível"
 legend_spread_events.5400.b.failure: "Os ajustes parecem um pouco patéticos"
 legend_spread_events.5400.c: "Talvez seja melhor deixar a história crescer naturalmente?"
 legend_chapter_silver_tongued: "[ROOT.Legend.GetProtagonist.GetName|U] sofreu repetidas vezes emboscadas e assédios de malfeitores que buscavam impedir sua justa missão. No entanto, [Select_CString( ROOT.Legend.GetProtagonist.IsFemale, 'la ingeniosa', 'el ingenioso' )] [ROOT.Legend.GetProtagonist.GetFirstName] os enganou repetidas vezes e escapou de suas garras."
 legend_chapter_easily_captured: "[ROOT.Legend.GetProtagonist.GetName|U] sofreu uma e outra vez as emboscadas e o assédio de malfeitores que buscavam impedir sua justa missão. Em muitas ocasiões, [ROOT.Legend.GetProtagonist.GetFirstName] caiu em suas emboscadas e definhou em cativeiro, o que atrasou a realização de seu nobre objetivo."
 legend_spread_events.5405.t: "Rumores da Natureza Selvagem"
 legend_spread_events.5405.desc: ""Eu lhe peço, [ROOT.Char.Custom('FormOfAddressForLiege')]!", [chronicler.GetFirstName] insiste em um ponto enquanto discutimos mais detalhes de [promoted_legend.GetName].\n\n"Preciso saber… o #EMP pueblo#! precisa saber", [chronicler.GetFirstNameNoTooltip] faz grandes gestos vagos, "quanta verdade há nesses rumores?". Mal abro a boca para perguntar antes que continue.\n\n"Dizem que, em suas viagens, encontrastes uma poderosa criatura de [ROOT.Char.Custom('RegionalMythicalCreature')], nada menos!"."
 legend_spread_events.5405.a: "\"De fato encontrei!\""
 legend_spread_events.5405.a.success: "Seu relato é cativante"
 legend_spread_events.5405.a.failure: "Seu relato carece de credibilidade"
 legend_spread_events.5405.b: "\"Isso é absurdo. Mas eu #EMP vi#! algo diferente...\""
 legend_spread_events.5405.b.success: "Você inventa com sucesso uma nova criatura na hora"
 legend_spread_events.5405.b.failure: "[chronicler.GetFirstNameNoTooltip] não acredita em você"
 legend_spread_events.5405.c: "\"Quem pode dizer? Vi tantas coisas maravilhosas...\""
 legend_chapter_discovery_mythical_beast: "Em sua jornada, [ROOT.Legend.GetProtagonist.GetFirstName] fez uma descoberta que [ROOT.Legend.GetProtagonist.Custom('ES_LoLa')] abalou até o âmago. Os antigos mitos sobre criaturas selvagens e maravilhosas se mostraram verdadeiros sem sombra de dúvida, e todos exaltaram [ROOT.Legend.GetProtagonist.GetFirstName] por sua bravura e mente inquisitiva."
 legend_chapter_discovery_new_myth: "Enquanto [ROOT.Legend.GetProtagonist.GetFirstName] vagava, descobriu ainda mais do que jamais havia sonhado ao partir em sua jornada. Uma criatura rara e extraordinária, duas vezes o tamanho de um homem, com seis pernas e um braço que crescia de seu torso! Nunca se tinha ouvido falar de tal besta, e assim foi como [ROOT.Legend.GetProtagonist.GetFirstName] acrescentou à crescente história de [ROOT.Legend.GetName]."
 legend_spread_events.5410.t: "O Que Há Além?"
 legend_spread_events.5410.desc: "Cada vez mais [ROOT.Char.Custom('GetWritingMaterialPlural')|l] enquanto [chronicler.GetFirstName] põe minha história no papel. Viagens por colinas e vales, através de rios caudalosos e até…\n\n\"Vós vos aventurastes tão longe, [ROOT.Char.Custom('FormOfAddressForLiege')]?\" Os olhos de [chronicler.GetFirstNameNoTooltip] estavam cheios de admiração. \"Tão longe assim no oceano selvagem?\".\n\nNinguém sabe o que existe além de nossas águas seguras e conhecidas. Talvez algumas suposições aceitas por todos, mas será esta a minha oportunidade de contar a minha própria versão?"
 legend_spread_events.5410.a: "\"Há outro grande continente, onde crescem as frutas do vinho...\""
 legend_spread_events.5410.a.flavor: "Tais rumores circulam há muitos anos, afinal..."
 legend_spread_events.5410.a.success: "A notícia de sua descoberta se espalha como fogo"
 legend_spread_events.5410.a.failure: "[chronicler.GetFirstNameNoTooltip] parece incerto diante da revelação[chronicler.Custom('ES_OA')] da revelação"
 legend_spread_events.5410.b: "Monstros ferozes fazem seu abode nas profundezas caprichosas!"
 legend_spread_events.5410.c: "Nossa exploração foi interrompida por batalhas com piratas ferozes."
 legend_spread_events.5410.d: "\"Lá fora? Nada além de mais oceano e morte.\""
 sea_monsters_modifier: "Monstros do Mar"
 sea_monsters_modifier_desc: "Este personagem viu e enfrentou os titãs das profundezas."
 legend_chapter_discovery_vinland: "Enquanto [ROOT.Legend.GetProtagonist.GetFirstName] vagava, descobriu algo sobre o qual até então só havia rumores e do qual se falava de forma fantasiosa. A mítica Vinlândia, uma grande terra no norte gélido, não era apenas real, mas habitável! Certamente, as grandes histórias teriam mais uma figura gravada nelas, desta vez falando de [ROOT.Legend.GetProtagonist.GetFirstName]."
 legend_chapter_sea_monsters: "As viagens que [ROOT.Legend.GetProtagonist.GetFirstName] realizou [ROOT.Legend.GetProtagonist.Custom('ES_LoLa')] o levaram a cruzar os mares e contemplar visões certamente aterradoras. Monstros marinhos gigantes e retorcidos os espreitaram por todos os lados, e só a hábil navegação de [ROOT.Legend.GetProtagonist.GetFirstName] permitiu que voltassem para casa ilesos."
 legend_spread_events.5415.t: "Povo Comum?"
 legend_spread_events.5415.desc: "O maravilhoso relato de [ROOT.Char.GetPromotedLegend.GetName] continua a se espalhar, e cada vez mais gente de todos os estratos da sociedade começou a entretecer sua perspectiva em sua rica tapeçaria. Ou pelo menos é o que diz [chronicler.GetFirstName].\n\n"Senhores e damas têm certeza de que tal relato afirma seu inegável direito de governar", reflete, "mas se entrarmos em uma taverna local, haverá muitos que dirão que ele é dedicado ao povo comum desta terra e aos seus modos honestos e laboriosos"."
 legend_spread_events.5415.a: "É #EMP claramente#! um conto de nobre."
 legend_spread_events.5415.b: "É claro que é sobre o povo comum!"
 legend_spread_events.5415.c: "Claramente é um conto sobre [protagonist.GetFirstNameNoTooltip], mais ninguém!"
 legend_spread_events.5415.c.protag: "… vocês não escreveram #EMP mi#! nome o suficiente?"
 legend_nobles_noted: "Nobres, Notados"
 legend_nobles_noted_desc: "Esta história enfoca as proezas da nobreza e reforça seu direito de governar."
 legend_commoners_celebrated: "Comuns, Celebrados"
 legend_commoners_celebrated_desc: "Esta história enfoca os camponeses trabalhadores, fortalecendo seus espíritos."
 legend_spread_events.5420.t: "Um Bebida Lendária"
 legend_spread_events.5420.desc: "[chronicler.GetFirstName] continua registrando cada vez mais histórias de [ROOT.Char.GetPromotedLegend.GetName], até que de repente faz uma pausa, com um sorriso malicioso nos lábios.\n\n“Pois bem, ouvi #EMP una#! história bastante interessante”, começa lentamente, “sobre certa competição de bebida, contra um ogro, nada menos! Como nossa [ROOT.Char.Custom('ES_OA')] [ROOT.Char.Custom('GetHeroineHero')] teve que se sair bem para beber uma criatura dessas debaixo da mesa! Talvez uma demonstração me ajudasse a apreciar de verdade tal feito?”.\n\nNão sei de onde veio essa história, mas começo a sentir uma certa pontada de orgulho…"
 legend_spread_events.5420.a: "Traga-me um barril e eu provarei isso!"
 legend_spread_events.5420.a.success: "Você esvazia o barril inteiro"
 legend_spread_events.5420.a.failure: "Você desmaia após algumas xícaras"
 legend_spread_events.5420.b: "Aconteceu. É melhor você acreditar!"
 legend_spread_events.5420.b.success: "[chronicler.GetFirstNameNoTooltip] está convencido"
 legend_spread_events.5420.b.failure: "[chronicler.GetFirstNameNoTooltip] permanece inconclusivo[chronicler.Custom('ES_OA')]"
 legend_spread_events.5420.c: "Estou... é... estou terrivelmente #EMP resfriado#! agora..."
 legend_spread_events.5420.c.tt: "Você desenvolve uma reputação"
 legend_hangover_modifier: "Ressaca"
 legend_hangover_modifier_desc: "Este personagem exagerou na bebida, para seu prejuízo."
 legend_shy_drinker: "Beberrão Tímido"
 legend_shy_drinker_desc: "Este personagem desenvolveu uma certa reputação de ser incapaz de segurar sua bebida."
