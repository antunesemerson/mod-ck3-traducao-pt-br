l_spanish:
 ce1_lasting_line: "Linha Duradoura"
 plague_cult_persecuted: "Perseguição ao Culto da Peste"
 plague_cult_persecuted_desc: "Um padre popular e carismático foi recentemente executado por propagar heresia."
 plague_cult_embraced: "Abraço ao Culto da Peste"
 plague_cult_embraced_desc: "Um padre popular e carismático tem pregado crenças heréticas nesta província, afirmando que trarão alívio da praga."
 beset_by_revenants: "Assediado por Revenants"
 beset_by_revenants_desc: "As pessoas desta província acreditam que revenants estão ressurgindo de suas sepulturas e trazendo pestilência e doença com eles."
 revenant_expelled: "Revenant Expulso"
 revenant_expelled_desc: "O caixão de uma pessoa nobre foi recentemente pregado, acalmando as preocupações dos habitantes locais sobre a possibilidade de um revenant ressurgir de sua sepultura."
 revenants_expelled: "Revenants Expulsos"
 revenants_expelled_desc: "Cada caixão neste condado foi pregado antes de entrar na terra, acalmando as preocupações dos habitantes locais sobre a possibilidade de um revenant ressurgir de sua sepultura."
 flowers_planted: "Flora Abundante"
 flowers_planted_desc: "Um vasto campo de flores foi cultivado aqui para combater o ar ruim de uma praga."
 miasma_ignored: "Miasma Rampante"
 miasma_ignored_desc: "O ar ruim preenche esta província, e a classe dominante recusou-se a plantar flora aromática para combatê-lo."
 medicating_with_leeches_good: "Tratamento Bem-sucedido com Sanguessugas"
 medicating_with_leeches_good_desc: "Este personagem tem se tratado com sanguessugas, melhorando sua resistência geral a doenças."
 medicating_with_leeches_bad: "Tratamento Malsucedido com Sanguessugas"
 medicating_with_leeches_bad_desc: "Este personagem tem se tratado com sanguessugas, deixando-os sonolentos e letárgicos, sem sinais reais de melhoria."
 persecuted_flagellants: "Flagelantes Perseguidos"
 persecuted_flagellants_desc: "A autoflagelação tornou-se extremamente comum neste condado, e os senhores locais têm perseguido brutalmente a prática com pouco sucesso."
 rampant_flagellants: "Flagelação Rampante"
 rampant_flagellants_desc: "Um culto de extremistas religiosos tem praticado autoflagelação neste condado, apesar das autoridades religiosas condenarem a prática."
 apocalyptic_inquisition: "Inquisição Apocalíptica"
 apocalyptic_inquisition_desc: "Alguns membros da população deste condado convenceram-se de que a praga recente é um sinal do apocalipse. Toda a população agora foi submetida a uma inquisição, independentemente de acreditar no culto ou não."
 plague_cult: "Culto Apocalíptico"
 plague_cult_desc: "Inúmeros homens e mulheres neste condado acreditam que a recente praga é um sinal do apocalipse, espalhando medo e histeria por todo o condado."
 rampant_witch_trials: "Julgamentos da Praga"
 rampant_witch_trials_desc: "Os habitantes locais deste condado têm realizado julgamentos para grupos que culpam pela recente praga."
 witch_trials_slowed: "Julgamentos da Praga Penalizados"
 witch_trials_slowed_desc: "$rampant_witch_trials_desc$ A prática foi amplamente condenada pela nobreza."
 protected_jews: "Protetor dos Judeus"
 protected_jews_desc: "Este personagem tem sido um defensor da segurança e proteção dos viajantes judeus dentro de seu reino, ganhando grande renome dentro das comunidades judaicas."
 divine_guidance: "Orientação Divina"
 divine_guidance_desc: "A população local deste condado foi recentemente convencida teologicamente a reduzir drasticamente a perseguição às minorias."
 plague_animals_loose: "Bestas da Praga"
 plague_animals_loose_desc: "Este condado está repleto de animais que os habitantes locais acreditam serem propagadores de praga e doença."
 royal_cats: "Animal Real: Gatos"
 royal_cats_desc: "Este personagem declarou que os gatos são o animal real do reino, e prejudicá-los é considerado um crime contra o trono."
 royal_dogs: "Animal Real: Cães"
 royal_dogs_desc: "Este personagem declarou que os cães são o animal real do reino, e prejudicá-los é considerado um crime contra o trono."
 lacking_cats_and_dogs_good: "Animais da Praga Eliminados"
 lacking_cats_and_dogs_good_desc: "Um recente extermínio deixou este condado com uma população de animais de rua drasticamente reduzida, reduzindo a propagação da praga."
 lacking_cats_and_dogs: "Animais Eliminados"
 lacking_cats_and_dogs_desc: "Um recente extermínio deixou este condado com uma população de animais de rua drasticamente reduzida, o que de alguma forma levou a um aumento na infectividade da doença."
 full_of_rabid_animals: "Cheio de Animais Raivosos"
 full_of_rabid_animals_desc: "Inúmeros animais de rua foram trazidos para este condado e têm espalhado doenças por toda a população."
 refused_to_repent: "Recusou-se a se Arrepender"
 refused_to_repent_desc: "Os habitantes deste condado recentemente exigiram que um nobre fosse publicamente envergonhado por seu pecado, e essa exigência foi recusada."
 witch_trials_obstructed: "Julgamentos de Bruxas Obstruídos"
 witch_trials_obstructed_desc: "$witch_trials_slowed_desc$"
 persecuted_minorities_expelled: "Minorias Expulsas"
 persecuted_minorities_expelled_desc: "Minorias foram expulsas deste condado, reduzindo drasticamente o comércio."
 persecuted_minorities_protected: "Minorias Perseguidas Protegidas"
 persecuted_minorities_protected_desc: "Minorias que teriam sido perseguidas em seu lar foram oferecidas santuário aqui."
 plague_minorities_sanctuary: "Santuário para Minorias"
 plague_minorities_sanctuary_desc: "Minorias que foram recentemente expulsas de suas casas foram oferecidas um lar aqui. Infelizmente, essas minorias foram expulsas durante uma praga e muitas vezes carregam a doença de seu lar consigo."
 plague_minorities_sanctuary_boosted: "Grande Santuário para Minorias"
 plague_minorities_sanctuary_boosted_desc: "$plague_minorities_sanctuary_desc$"
 persecuted_minorities_financial_sanctuary: "Santuário Financeiro"
 persecuted_minorities_financial_sanctuary_desc: "Comerciantes estrangeiros e minoritários foram oferecidos um santuário contra perseguição neste condado."
 minority_persecution_forbidden: "Perseguição às Minorias Proibida"
 minority_persecution_forbidden_desc: "Os habitantes deste local recentemente tentaram expulsar à força as minorias, mas essa prática foi proibida pela nobreza local."
 rats_eradicated: "Ratos Erradicados"
 rats_eradicated_desc: "A erradicação prudente de qualquer rato avistado levou a uma província mais próspera."
 pets_eradicated: "Animais de Estimação Purificados"
 pets_eradicated_desc: "A cruel erradicação de animais de estimação locais enfureceu muitos aqui."
 vectors_reduced: "Vetores de Doenças Reduzidos"
 vectors_reduced_desc: "A purga de grande parte da população local de ovelhas reduziu a propagação de uma praga."
 disastrous_cull: "Abate Desastroso"
 disastrous_cull_desc: "A purga de grande parte da população local de ovelhas danificou a economia local."
 pleas_ignored: "Pleitos Ignorados"
 pleas_ignored_desc: "Este personagem ignorou os apelos do clero e se tornou um inimigo deles como resultado."
 draconian_lockdown: "Bloqueio Dracônico"
 draconian_lockdown_desc: "Um conjunto punitivo de regras levou a danos generalizados na economia local aqui."
 trusted_ruler: "Governante Confiável"
 trusted_ruler_desc: "Os governantes locais têm a plena confiança de seu suserano aqui."
 supplies_sent: "Suprimentos Enviados"
 supplies_sent_desc: "Suprimentos foram enviados aqui para combater a ameaça da praga local."
 plight_ignored: "Plight Ignorado"
 plight_ignored_desc: "A praga nascente desta província foi amplamente ignorada por seu governante."
 dead_boats: "Barcos de Mortos"
 dead_boats_desc: "Barcos cheios de mortos chegaram às praias aqui, espalhando infecção e ruína."
 clear_beaches: "Praias Livres"
 clear_beaches_desc: "As praias desta província estão livres de doentes ou moribundos."
 contaminated_beaches: "Praias Contaminadas"
 contaminated_beaches_desc: "As praias desta província ocasionalmente recebem barcos cheios de mortos."
 pestilent_beaches: "Praias Pestilentas"
 pestilent_beaches_desc: "As praias desta província estão cheias de mortos infectados, uma visão verdadeiramente horrível de se ver."
 respected_dead: "Mortos Respeitados"
 respected_dead_desc: "Esta província presta plenos respeitos aos seus mortos, mesmo em meio a uma praga."
 health_first: "Saúde em Primeiro Lugar"
 health_first_desc: "Este personagem tenta priorizar sua própria saúde em relação à dos outros."
 dismissed_peasantry: "Mortos Respeitados"
 dismissed_peasantry_desc: "Os camponeses desta província se sentem desconsiderados e marginalizados por seus governantes."
 miracle_worker: "Trabalhador de Milagres"
 miracle_worker_desc: "Este personagem foi visto aparentemente curando os doentes com um simples toque!"
 man_of_the_people: "Nobre Popular"
 man_of_the_people_desc: "Este personagem dispensa simpatia aos seus inferiores mesmo em meio a uma praga."
 out_of_touch: "Desconectado da Realidade"
 out_of_touch_desc: "O 'Toque Real' deste personagem não curou os doentes, apenas os eliminou de vez!"
 commoners_welcomed_in: "Camponeses Recebidos"
 commoners_welcomed_in_desc: "Os camponeses desta província foram recebidos por seu suserano, e todos estão gratos pela hospitalidade."
 commoners_turned_away: "Camponeses Rejeitados"
 commoners_turned_away_desc: "Os camponeses desta província foram rejeitados por seu suserano em sua hora de necessidade, e muitos não estão satisfeitos com isso."
 fears_allayed: "Medos Acalmados"
 fears_allayed_desc: "Os camponeses desta província sentiram que seus medos foram acalmados e seguem felizmente as instruções."
 fears_ignored: "Medos Ignorados"
 fears_ignored_desc: "Os camponeses desta província sentem que seus medos foram ignorados e continuam a resmungar."
 strict_coastal_quarantine: "Quarentena Costeira Estrita"
 strict_coastal_quarantine_desc: "Mercadores que entram nesta província pelo mar têm que se isolar por muitos dias antes de poderem vender suas mercadorias."
 coastal_quarantine: "Quarentena Costeira"
 coastal_quarantine_desc: "Mercadores que entram nesta província pelo mar têm que se isolar por um tempo antes de poderem vender suas mercadorias."
 cackling_loon: "Ganso Cacarejante"
 cackling_loon_desc: "A propensão deste personagem para rir de seus problemas tem #EMP alguns#! aspectos negativos..."
 herbalist_suspicions: "Suspeitas de Herbalista"
 herbalist_suspicions_desc: "A habilidade deste personagem com pomadas e ervas os tornou objeto de suspeita em tempos de praga."
 absent_ruler: "Governante Ausente"
 absent_ruler_desc: "Este personagem responde à ameaça de uma iminente praga praticamente se recusando a sair de seus aposentos."
 present_ruler: "Governante Presente"
 present_ruler_desc: "Este personagem é um governante ativo e visível, mesmo em tempos de praga e ruína."
 hiding_from_epidemic: "Escondendo-se da Praga"
 hiding_from_epidemic_desc: "Este personagem passa o tempo trancado enquanto a peste assola seu domínio.\n\n[infection_chance|E]: #P -75 %#!"
 sachet_protection: "Sachê Protetor"
 sachet_protection_desc: "O sachê de ervas aromáticas que este personagem carrega consigo pode não protegê-los realmente contra doenças, mas certamente os faz e faz aqueles próximos #EMP se#! sentirem mais seguros."
 overly_fragrant: "Excessivamente Fragrante"
 overly_fragrant_desc: "A aplicação exagerada de vários sachês de ervas por este personagem pode não protegê-lo realmente contra doenças, mas certamente faz #EMP com que se#! sinta melhor — embora à custa dos olhos lacrimejantes dos que estão por perto."
 ce1_legendary_feaster: "Festeiro Lendário"
 ce1_legendary_feaster_desc: "Este personagem tem percorrido o mundo, espalhando sua lenda em eventos e celebrações para todos que queiram ouvir."
 ce1_legendary_performance: "Performance Lendária"
 ce1_legendary_performance_desc: "Este personagem recentemente fez uma performance dramática de sua lenda. Embora não tenha alcançado seu público-alvo, os camponeses pareceram muito impressionados com isso."
 ce1_legendary_taverns: "Lendas Locais"
 ce1_legendary_taverns_desc: "A lenda deste personagem foi entusiasticamente abraçada pelos plebeus de seu reino, facilitando muito a velocidade com que ela se espalha. Homens viajam de taverna em taverna compartilhando a lenda."
 ce1_legend_mocked: "Lenda Zombada"
 ce1_legend_mocked_desc: "A lenda deste personagem foi recentemente zombada em um festival cultural, fazendo com que outros se sentissem muito constrangidos para arriscar sua propagação."
 studying_ancient_cultures: "Estudando Culturas Antigas"
 studying_ancient_cultures_desc: "Este personagem recentemente explorou uma ruína antiga que pertencia a um povo antigo e foi iluminado pelo que descobriu lá."
 kids_legend_modifier: "Lenda Infantil"
 kids_legend_modifier_desc: "As crianças estão encenando a lenda deste personagem, aumentando a taxa com que ela se espalha."
 legendary_holy_site: "Local de Peregrinação Lendário"
 legendary_holy_site_desc: "Apesar de não ter significado para a fé, peregrinos estão se dirigindo a este condado devido a um conto lendário que o equipara a um lugar sagrado."
 legend_county_culture_builders: "Cultura da Capital"
 legend_county_culture_builders_desc: "Os cidadãos deste lugar se orgulham do fato de que seus antepassados foram aqueles que o construíram."
 legend_character_culture_builders: "Bênção dos Construtores"
 legend_character_culture_builders_desc: "Este personagem tem sido feliz em tranquilizar os moradores de sua capital de que seus antepassados em comum construíram um assentamento tão poderoso, e mais ninguém."
 legend_humble_king: "Rei Humilde"
 legend_humble_king_desc: "A humilde minimização das ações sagradas deste personagem lhes traz um pouco mais de prestígio aos olhos dos fiéis."
 legend_mothers_boy: "Respeitoso"
 legend_mothers_boy_desc: "A deferência deste personagem para com seus pais estabelece um padrão para todos seguirem."
 legend_charitable_donations: "Doações Caridosas"
 legend_charitable_donations_desc: "Esta província está se beneficiando de muitos exemplos de doações caridosas."
 legend_sick_hospitals: "Hospedarias Bem Utilizadas"
 legend_sick_hospitals_desc: "Os cidadãos desta província sabem que devem ir em primeiro lugar a uma hospedaria se ficarem doentes."
 legend_bloodthirsty_warrior: "Guerreiro Sanguinário"
 legend_bloodthirsty_warrior_desc: "Este personagem se orgulha de suas façanhas marciais."
 legend_stigmatic: "Estigmático"
 legend_stigmatic_desc: "Este personagem tem múltiplas feridas antigas em locais que espelham aqueles de Jesus."
 legend_culturally_sensitive: "Sensível Culturalmente"
 legend_culturally_sensitive_desc: "Este personagem compreende o potencial de tensão entre diferentes culturas e toma precauções para garantir que essas tensões raramente se inflamem."
 legend_visions_of_god: "Visões Divinas"
 legend_visions_of_god_desc: "Este personagem afirma que sua falta de visão se deve a uma visão sagrada que os deixou cegos."
 legend_holy_sacrifice: "Sacrifício Sagrado"
 legend_holy_sacrifice_desc: "Este personagem afirma que sacrificou um olho ao divino."
 legend_gods_humble_servant: "Servo Humilde dos Deuses"
 legend_gods_humble_servant_desc: "Este personagem afirma que sua doença visual os humilhou e os tornou mais piedosos como resultado."
 legend_sneaks_food: "Furtando Comida"
 legend_sneaks_food_desc: "Este personagem teme ser visto como impio por excesso, mas não consegue resistir a furtar alguns lanches aqui e ali."
 legend_fat_and_happy: "Gordo e Feliz"
 legend_fat_and_happy_desc: "Este personagem está um pouco acima do peso, mas eles absolutamente fizeram as pazes com isso."
 legend_historical_bedecking: "Vestimenta Antiga"
 legend_historical_bedecking_desc: "Este personagem veste as roupas de seu povo de longa data, invocando deliberadamente sua memória."
 legend_modern_ruler: "Governante Moderno"
 legend_modern_ruler_desc: "Este personagem se recusa a se curvar às regras do passado, forjando seu próprio caminho."
 legend_prayer_callus: "Calo de Oração"
 legend_prayer_callus_desc: "Este personagem tem um 'zabiba' ou 'calo de oração', uma marca na testa que prova sua devoção enquanto se prostra."
 legend_bruised_head: "Testa Machucada"
 legend_bruised_head_desc: "Este personagem se machucou levemente, causando uma dor de cabeça ocasional."
 legend_claimed_stigmatic: "Estigmático Alegado"
 legend_claimed_stigmatic_desc: "Este personagem carrega uma marca que afirmam ser semelhante àquelas sofridas por Jesus. Isso provou ser extremamente controverso."
 mysterious_sword_giver_great: "Água Mística"
 mysterious_sword_giver_great_desc: "Dizem que uma grande pessoa mística habita nas águas deste condado, concedendo destinos místicos a quem os encontrar."
 mysterious_sword_giver: "Água Ilustre"
 mysterious_sword_giver_desc: "$mysterious_sword_giver_great_desc$"
 ce1_evil_spirit: "Espírito Malévolo"
 ce1_evil_spirit_desc: "Este personagem acredita que foi possuído por um espírito maligno e, como resultado, tem sido altamente irritável e errático."
 angelic_founder: "Fundação Angelical"
 angelic_founder_desc: "Os membros desta casa concordam que sua fundação foi posta em movimento por um anjo."
 legendary_item: "Terra Estrangeira"
 legendary_item_desc: "O governante local trouxe terra de uma distante terra mística, fazendo muitos acreditarem que a terra tem propriedades mágicas."
 legendary_item_personal: "Jornada Lendária"
 legendary_item_personal_desc: "Este personagem viajou para uma terra muito distante, espalhando contos de sua lenda ao longo do caminho."
 ce1_heartthrob: "Coração Ardente"
 ce1_heartthrob_desc: "Este personagem está em uma busca romântica lendária e se recusa a chamar até mesmo seu amante mais próximo de seu verdadeiro amor."
 ce1_legendary_battle: "Batalha Lendária"
 ce1_legendary_battle_desc: "Este personagem recentemente se envolveu em uma batalha que poderia ser chamada de lendária por si só, um sinal de maiores feitos lendários por vir."
 legend_renowned_herbalist: "Herbalista Renomado"
 legend_renowned_herbalist_desc: "Este personagem supostamente encontrou plantas raras das quais aprendeu muito."
 legend_eagle_eyed: "Olho de Águia"
 legend_eagle_eyed_desc: "Segundo o boca a boca, este personagem provou sua habilidade com um arco contra qualquer um que os desafiasse."
 legend_cannibal_scarred: "Inimigo dos Canibais"
 legend_cannibal_scarred_desc: "Dizem que este personagem repeliu um ataque de canibais, deixando-os marcados."
 legend_nick_of_time: "No Momento Certo"
 legend_nick_of_time_desc: "Este personagem supostamente chegou no momento certo com reforços durante uma batalha decisiva."
 legend_well_organised: "Bem Organizado"
 legend_well_organised_desc: "A previsão deste personagem com a organização militar raramente os deixa desprevenidos quando a batalha chega."
 legend_bravely_ran_away: "Fugiu Corajosamente"
 legend_bravely_ran_away_desc: "Este personagem supostamente virou as costas quando a batalha estava próxima. O fato de eventualmente ter funcionado a seu favor impede que outros se comprometam totalmente com a zombaria, pelo menos."
 ce1_immortal: "Busca pela Imortalidade"
 ce1_immortal_desc: "Este personagem está em uma busca para encontrar uma maneira de se tornar imortal."
 ce1_level_headed: "Pensamento Lúcido"
 ce1_level_headed_desc: "Este personagem entende que os sonhos são apenas isso. Nada mais."
 ce1_accepted_mortality: "Em Paz"
 ce1_accepted_mortality_desc: "Este personagem recentemente confrontou sua mortalidade e encontrou conforto na natureza passageira da vida."
 ce1_will_to_live: "Crise Existencial"
 ce1_will_to_live_desc: "Este personagem teme morrer."
 ce1_forgiveness: "Perdão Interior"
 ce1_forgiveness_desc: "Este personagem recentemente escolheu perdoar alguém que os prejudicou muito."
 plague_tales: "Contos da Praga"
 plague_tales_desc: "A paranoia deste personagem sobre uma praga distante foi ao menos canalizada para o trabalho ativo de proteger seu próprio reino."
 plague_insights_gained: "Percepções da Praga Obtidas"
 plague_insights_gained_desc: "A dissecação oportuna de um cadáver deu a este personagem uma preciosa visão sobre os efeitos da Peste Bubônica."
 brutal_crackdown: "Repressão Brutal"
 brutal_crackdown_desc: "Uma repressão violenta aos refugiados na fronteira fortaleceu a autoridade, mas causou muita raiva neste baronato."
 shanty_towns: "Bairros de Lata"
 shanty_towns_desc: "A construção de vários bairros de lata na fronteira deste baronato permitiu que os refugiados fossem alojados de maneira semi-permanente."
 border_defended: "Fronteira Defendida"
 border_defended_desc: "Recusar refugiados na fronteira deste baronato agradou a alguns, mas a desaceleração da imigração tem seus próprios custos."
 refugees_coddled: "Refugiados Mimados"
 refugees_coddled_desc: "Os refugiados que fogem para este baronato foram permitidos entrar sem impedimentos."
 dangerous_rides: "Passeios Perigosos"
 dangerous_rides_desc: "As aventuras deste personagem na natureza selvagem colocam em perigo tanto eles quanto sua família, mas realmente melhoram seu humor."
 cautious_rider: "Cavaleiro Cauteloso"
 cautious_rider_desc: "Este personagem se recusa a se arriscar com qualquer passeio pelo campo potencialmente infectado."
 overly_protective: "Superprotetor"
 overly_protective_desc: "A paranoia deste personagem os levou a se preparar muito bem para uma possível praga iminente."
 mass_panic: "Pânico em Massa"
 mass_panic_desc: "Este baronato mergulhou em um pânico em massa ao saber de uma poderosa praga a caminho."
 allayed_fears: "Medos Acalmados"
 allayed_fears_desc: "As pessoas deste baronato tiveram seus medos sobre uma praga iminente amenizados."
 angry_crowds: "Multidões Furiosas"
 angry_crowds_desc: "As pessoas deste baronato estão assustadas e irritadas com uma série de pregadores apocalípticos presos."
 rumours_stifled: "Rumores Abafados"
 rumours_stifled_desc: "O trabalho confiante em sufocar rumores de uma praga distante deixou este baronato um lugar mais calmo."
 rumours_proliferated: "Rumores Proliferados"
 rumours_proliferated_desc: "As tentativas de sufocar rumores nesta província falharam, e muitos agora entram em pânico com a ideia de uma praga alcançar suas terras."
 uncaring_ruler: "Governante Despreocupado"
 uncaring_ruler_desc: "Os habitantes deste baronato se sentem abandonados por seu governante."
 flagellants_acquiesce: "Flagelantes Apaziguados"
 flagellants_acquiesce_desc: "Este personagem apaziguou os flagelantes que vagam pelas cidades e vilarejos."
 pacified_flagellants: "Flagelantes Pacificados"
 pacified_flagellants_desc: "As pessoas deste baronato não são mais importunadas pelos pregadores apocalípticos, pois os flagelantes itinerantes foram pacificados."
 eager_populace: "População Ansiosa"
 eager_populace_desc: "As pessoas deste baronato ouviram as palavras dos pregadores locais e estão dispostas a fazer o que for necessário para se preparar."
 unrestrained_flagellants: "Flagelantes Descontrolados"
 unrestrained_flagellants_desc: "Tentativas fracassadas de apaziguar os flagelantes neste baronato fizeram com que seu número aumentasse."
 regular_checkups: "Exames Regulares"
 regular_checkups_desc: "A dosagem regular de medicamentos caros administrada pelos médicos deste personagem os mantém o mais saudável possível."
 under_the_weather: "Abaixo do Tempo"
 under_the_weather_desc: "Este personagem está se sentindo um pouco debilitado."
 gravediggers_threatened: "Coveiros Ameaçados"
 gravediggers_threatened_desc: "Os coveiros deste baronato foram ameaçados e extorquidos, deixando-os mais pobres e muito menos propensos a trabalhar."
 gravediggers_compensated: "Coveiros Compensados"
 gravediggers_compensated_desc: "Os coveiros deste baronato receberam um pagamento extra, elevando sua moral."
 gravediggers_replaced: "Coveiros Substituídos"
 ce1_commoners_in_graves: "Cemitério Comum"
 ce1_commoners_in_graves_desc: "Este personagem recentemente abriu uma ala comum em seu cemitério real, agradando os locais, mas manchando sua reputação aos olhos de alguns nobres."
 ce1_common_graves: "Sepulturas Comuns"
 ce1_common_graves_desc: "Os plebeus estão sendo enterrados no cemitério deste condado, a um certo custo."
 ce1_bodies_in_the_street: "Corpos nas Ruas"
 ce1_bodies_in_the_street_desc: "Com os cemitérios cheios e o número de mortos aumentando, os corpos foram deixados para apodrecer nas ruas."
 ce1_siege_corpse: "Corpos Doentes"
 ce1_siege_corpse_desc: "Um exército hostil recentemente lançou corpos doentes em uma área deste condado."
 ce1_quarantined_corpse: "Corpos em Quarentena"
 ce1_quarantined_corpse_desc: "Um exército hostil recentemente lançou corpos doentes em uma área deste condado, mas os corpos foram mantidos separados com sucesso da maioria da população."
 ce1_heavily_ill: "Gravemente Doente"
 ce1_heavily_ill_desc: "A interação próxima com corpos doentes tem sido muito prejudicial para a saúde deste personagem."
 ce1_non_heretical_solution: "Corpos Segregados"
 ce1_non_heretical_solution_desc: "Corpos afetados pela praga estão sendo separados dos saudáveis neste reino."
 ce1_unorthodox_epidemic_treatment: "Tratamento Não Ortodoxo"
 ce1_unorthodox_epidemic_treatment_desc: "Através de práticas esotéricas e altamente heréticas, este personagem tem reduzido com sucesso a taxa de propagação da praga."
 ce1_unorthodox_epidemic_treatment_bad: "Tratamento Herético Mal-sucedido"
 ce1_unorthodox_epidemic_treatment_bad_desc: "Através de práticas esotéricas e altamente heréticas, este personagem tem sido malsucedido na redução da taxa de propagação da praga."
 ce1_major_quarantine: "Quarentena em Toda a Região"
 ce1_major_quarantine_desc: "Este personagem tem trancado os moradores em suas casas na tentativa de evitar a propagação da praga."
 ce1_major_quarantine_county: "Quarentena"
 ce1_major_quarantine_county_desc: "Ninguém tem permissão para entrar ou sair deste condado, reduzindo a propagação da praga."
 war_doctor: "Médico de Guerra"
 war_doctor_desc: "Um médico renomado e seus seguidores têm percorrido os campos de batalha, fornecendo cuidados de alta qualidade aos soldados doentes e enfermos."
 ce1_banishment_resistance: "Livre de Doença"
 ce1_banishment_resistance_desc: "Cortesãos gravemente doentes foram banidos da corte deste personagem, resultando em uma exposição muito reduzida à doença."
 minor_epidemic_treatment: "Prevenção de Epidemia Leve"
 minor_epidemic_treatment_desc: "O médico deste personagem recentemente prescreveu algumas medidas moderadas para prevenir a propagação da epidemia iminente."
 major_epidemic_treatment: "Prevenção de Epidemia Grave"
 major_epidemic_treatment_desc: "O médico deste personagem recentemente tomou medidas extremas para prevenir a propagação da epidemia iminente."
 critical_epidemic_treatment: "Prevenção de Epidemia Mística"
 critical_epidemic_treatment_desc: "Um médico místico recomendou tratamentos radicais e estranhos para a epidemia iminente, e embora tenham irritado as autoridades religiosas, parecem ser altamente eficazes."
 minor_epidemic_treatment_failed: "Prevenção de Epidemia Leve Malfeita"
 minor_epidemic_treatment_failed_desc: "Embora de natureza moderada, os esforços feitos por este personagem para retardar a propagação da praga iminente foram prejudiciais."
 major_epidemic_treatment_failed: "Prevenção de Epidemia Grave Malfeita"
 major_epidemic_treatment_failed_desc: "Medidas radicais foram tomadas por este personagem para prevenir a propagação de uma epidemia iminente, o que não apenas levou à estagnação econômica, mas também foi totalmente ineficaz na prevenção da propagação da doença."
 critical_epidemic_treatment_failed: "Prevenção de Epidemia Mística Malfeita"
 critical_epidemic_treatment_failed_desc: "As medidas tomadas por este personagem para tratar aqueles infectados com a praga não apenas foram eficazes, mas sua natureza heterodoxa perturbou muito as autoridades religiosas."
 ce1_royal_touch: "O Toque Real"
 ce1_royal_touch_desc: "Os doentes e moribundos deste condado foram recentemente visitados por seu senhor, concedendo-lhes seu toque real na forma de moedas abençoadas."
 funeral_unrelenting_devotion: "Devoção Inabalável"
 funeral_unrelenting_devotion_desc: "Este personagem jurou no túmulo de um ente querido se tornar um melhor governante."
 funeral_comfort: "Confortado"
 funeral_comfort_desc: "Este personagem recentemente confrontou sua própria mortalidade e encontrou conforto no significado encontrado em uma existência fugaz."
 funeral_existential_dread: "Angústia Existencial"
 funeral_existential_dread_desc: "Este personagem recentemente percebeu que um dia irá morrer. Eles não gostaram disso."
 ce1_modest_leader: "Líder Modesto"
 ce1_modest_leader_desc: "A lenda deste personagem em batalha cresce em conjunto com seu próprio comportamento quieto."
 ce1_black_thumb: "Polegar Preto"
 ce1_black_thumb_desc: "Este personagem não poderia estar menos interessado na natureza."
 legend_chaste_faithful: "Casto, Fiel"
 legend_chaste_faithful_desc: "Aqueles que seguem esta lenda são conhecidos por sua fidelidade."
 legend_lecherous_lewd: "Libidinoso, Obsceno"
 legend_lecherous_lewd_desc: "Aqueles que seguem esta lenda são famosos por seus modos devassos."
 ce1_forward_thinking: "Visionário"
 ce1_forward_thinking_desc: "Este personagem não se importa com as culturas do passado antigo, preferindo viver firmemente no presente."
 ce1_avenging_child: "Criança Vingadora"
 ce1_avenging_child_desc: "Este personagem está determinado a vingar a morte de seu pai nas mãos de um animal selvagem."
 legend_palatial_palatable: "Palaciano, Palatável"
 legend_palatial_palatable_desc: "Realmente, nada é mais grandioso do que uma mesa cheia das carnes mais exóticas!"
 ce1_consequentialist: "Consequencialista"
 ce1_consequentialist_desc: "Este personagem gosta de lembrar as pessoas que o destino é a parte importante, não a jornada."
 legend_edifices_enduring: "Edifícios, Duradouros"
 legend_edifices_enduring_desc: "Seguir os exemplos dos pedreiros do passado não é uma má ideia: de fato, o fato de suas criações ainda estarem erguidas hoje é um testemunho de suas habilidades."
 legend_monophthalmic_mythical: "Monofálmico, Mítico"
 legend_monophthalmic_mythical_desc: "Ciclopes andam entre nós! Se você mantiver os olhos bem abertos, talvez você também consiga dar uma olhada..."
 legendary_adventurer: "Espírito Aventureiro"
 legendary_adventurer_desc: "Este personagem está preparado para abandonar seu reino e espalhar sua lenda no exterior."
 epidemic_increased_maintance: "Manutenção Aumentada"
 epidemic_increased_maintance_desc: "Este personagem está pagando salários mais altos para substituir os soldados que foram afetados pela epidemia."
 epidemic_pressed_levies: "Levantamentos Pressionados"
 epidemic_pressed_levies_desc: "Este personagem está pressionando os camponeses em seus regimentos de Homens de Armas."
 epidemic_closed_barracks: "Barracas Fechadas"
 epidemic_closed_barracks_desc: "Para evitar perdas desnecessárias, os soldados serão isolados, e nenhum treinamento será permitido."
 ce1_gone_dancing: "Juntou-se à Dança sem Fim"
 ce1_gone_dancing_desc: "Este personagem juntou-se aos camponeses em sua dança interminável."
 fealty_demanded: "Lealdade Exigida"
 fealty_demanded_desc: "Este personagem exige lealdade de seus subordinados."
 legend_investments: "Investimentos Financeiros"
 legend_investments_desc: "Este condado teve uma série de investimentos provenientes dos negócios de seu suserano, impulsionando sua economia."
 legend_loose_lips: "Língua Solta"
 legend_loose_lips_desc: "Este personagem está disposto a permitir que sua influência seja comprada, deixando outros potencialmente dobrá-lo à sua vontade."
 legend_esteemed_expanding: "Estimado, Expansivo"
 legend_esteemed_expanding_desc: "Entre os apoiadores desta lenda estimada estão alguns verdadeiros luminários."
 legend_irreverent_immoral: "Irreverente, Imoral"
 legend_irreverent_immoral_desc: "A sanção desta lenda por parte de pessoas além de qualquer reprovação a tem manchado gravemente."
 legend_wicked_ways: "Caminhos Perversos"
 legend_wicked_ways_desc: "Os supostamente pecaminosos caminhos deste personagem têm levado a algumas dificuldades em espalhar uma palavra positiva sobre suas ações."
 legend_errors_exonerated: "Exonerado"
 legend_errors_exonerated_desc: "Os caminhos pecaminosos deste personagem foram enterrados fundo devido ao apoio de seus pares."
 legend_principled_pious: "Principado, Piedoso"
 legend_principled_pious_desc: "Todos aqueles que promovem esta lenda se beneficiam de sua integridade aos olhos do povo comum."
 legend_saintly_sinless: "Santo, Sem Pecado"
 legend_saintly_sinless_desc: "Os propagadores desta lenda são tão elogiados que isso até mesmo realça a própria lenda."
 healthy_court: "Corte Saudável"
 healthy_court_desc: "As ações deste personagem levaram a uma corte saudável e feliz."
 strange_levity: "Leviandade Estranha"
 strange_levity_desc: "A abordagem descontraída deste personagem para a tragédia não é a atitude favorita de todos."
 free_boats: "Barcos Gratuitos"
 free_boats_desc: "Este personagem se beneficiou de uma série de barcos abandonados que encalharam em suas praias, proporcionando-lhe melhores opções ao viajar."
 corpse_piles: "Montes de Cadáveres"
 corpse_piles_desc: "Esta baronia sofre com montes de cadáveres contaminados sendo deixados apodrecer em suas praias."
 shattered_by_plague: "Propenso à Peste"
 shattered_by_plague_desc: "Este condado vibrante e densamente povoado está a um simples espirro de uma pandemia importante."
 ravaged_by_plague: "Susceptível à Peste"
 ravaged_by_plague_desc: "As ruas movimentadas dos assentamentos deste condado o tornam uma vítima propícia para a disseminação de pestes."
 blighted_by_plague: "Vulnerável à Peste"
 blighted_by_plague_desc: "A densidade populacional acima da média deste condado o torna vulnerável à propagação de pestes."
 struck_by_plague: "Em Risco de Peste"
 struck_by_plague_desc: "Este condado abriga assentamentos de tamanho suficiente para facilitar um pouco mais a disseminação de pestes."
 legend_secure_safe: "Seguro, Protegido"
 legend_secure_safe_desc: "Esta lenda é famosa por unir as pessoas, transformando inimigos em amigos mesmo em áreas desconhecidas."
 plague_new_capital: "A Nova Capital"
 plague_new_capital_desc: "Uma recente peste devastou as terras e tornou este condado o candidato ideal para se tornar a nova capital do reino."
 plague_alms_donations: "Doações de Esmolas"
 plague_alms_donations_desc: "Os pobres e necessitados desta baronia se beneficiaram das doações de esmolas, elevando sua moral e dando-lhes um lugar para ficar."
 plague_determined_recover: "Determinado a se Recuperar"
 plague_determined_recover_desc: "Embora a cidade capital deste personagem tenha sido devastada pela peste, eles estão determinados a que ela se recupere."
 plague_the_long_road: "O Longo Caminho"
 plague_the_long_road_desc: "A cidade capital deste personagem foi devastada pela peste, e eles estão comprometidos com sua recuperação apesar de seus obstáculos."
 plague_crippling_sorrow: "Tristeza Debilitante"
 plague_crippling_sorrow_desc: "A cidade capital deste personagem foi devastada pela peste, e a pura morte e destruição que ela causou os levou a profundezas de desespero."
 legend_tolerant_trusting: "Tolerante, Confiante"
 legend_tolerant_trusting_desc: "Esta lenda foi permitida a crescer livremente, seu dono incentivando a ornamentação por bardos viajantes."
