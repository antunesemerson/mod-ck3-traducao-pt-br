 fp3_clan.1040.desc: "Meu coletor[target_tax_collector.Custom('ES_XA')] de impostos, [target_tax_collector.GetFirstName], me apresenta um relatório da última inspeção do reino que realizou e destaca um assunto de grande preocupação:

