l_spanish:
 ##################################################
 #STRUGGLE EVENTS
 ##################################################
 fp3_struggle.0051.t: "O Intermezzo Iraniano"
 fp3_struggle.0051.desc: "Uma luta civil sangrenta envolve o outrora inatingível [Mostaza.GetPrimaryTitle.GetBaseName]: a família governante se assassina e guerreia entre si, competindo para usurpar o [GetFaithByKey('ashari').ReligiousHeadTitleName]. O Iraque cambaleia enquanto, além das montanhas orientais, senhores fronteiriços persas aproveitam a situação para afirmar sua independência, construindo impérios próprios a partir dos destroços de Bagdá.\n\n"
 fp3_struggle.0051.desc.caliph: "Atrás de mim está uma pálida fileira de fantasmas; os [Mostaza.GetTitleTierName|l]s [Mutawakkil.GetFirstName], [Muntasir.GetFirstName] e [Mustain.GetFirstName], todos vítimas desta [struggle|lE]. Os persas indômitos e os turcos traiçoeiros estão ansiosos para me ver juntar-me aos espectros de meus predecessores, mas ainda posso virar o jogo!"
 fp3_struggle.0051.desc.involved: "Este é o momento para a casa [ROOT.Char.GetHouse.GetNameNoTooltip] agir e se elevar à glória — seremos os salvadores do Califado ou despedaçaremos o sonho de uma Ummah unida de uma vez por todas?"
 fp3_struggle.0051.desc.interloper: "Agora que os três últimos [Mostaza.GetTitleAsNameNoTooltip|l] s tiveram um fim rápido e prematuro, todos esperam que [Mostaza.GetFirstName] os siga. Em meio a tanta agitação e incerteza, abundam as oportunidades para a casa [ROOT.Char.GetHouse.GetNameNoTooltip]…"
 fp3_struggle.0051.desc.supporter: "Nunca houve tanta necessidade da lealdade e diligência estabilizadora da casa [ROOT.Char.GetHouse.GetNameNoTooltip]. Este é nosso momento de buscar a glória, salvar o Califado e nos tornar verdadeiros campeões da causa [ROOT.Char.GetFaith.GetAdjective]!"
 fp3_struggle.0051.desc.detractor: "Com os Mestres do Islã trancados em uma crise perpétua, esta é uma oportunidade como nenhuma outra para a casa [ROOT.Char.GetHouse.GetNameNoTooltip] se tornar mestra do próprio destino e esculpir nosso nome nos anais da história."
 fp3_struggle.0051.desc.unrest: "$fp3_struggle.0051.desc$"
 fp3_struggle.0051.desc.stabilization: "Após um período de crise, [Mostaza.GetPrimaryTitle.GetName] está se recuperando, a luta ensanguentada diminuindo lentamente no Irã."
 fp3_struggle.0051.desc.stabilization_actor: "A casa [ROOT.Char.GetHouse.GetNameNoTooltip] deve agir com cuidado aqui. Podemos usar a situação para preparar o terreno para um futuro próspero ou semear novo caos e discórdia que podem nos permitir alcançar alturas ainda maiores..."
 fp3_struggle.0051.a: "Que [ROOT.Char.GetFaith.HighGodName] esteja comigo!"
 fp3_struggle.0051.b: "Essas ambições tolas devem ser postas de lado!"
 fp3_struggle.0071.t: "[struggle_liege.GetFirstNameNoTooltip|U] Reafirma Dominância"
 fp3_struggle.0071.desc.caliph: "A contenda acabou! Seja pelo sucesso na guerra, por uma diplomacia hábil ou pela supremacia inerente da minha posição, traidores e rebeldes mudaram de tom. Agora, eles correm para jurar novos votos diante do meu trono, disputando para se curvar o mais profundamente possível e reafirmar sua fé em seu [ROOT.Char.GetTitleTierName|l] legítim[ROOT.Char.Custom('ES_OA')] e bem guiado[ROOT.Char.Custom('ES_OA')].\n\nOs indômitos senhores persas prometeram submissão e se arrependeram de sua tolice, ou foram substituídos por governadores da nação [ROOT.Char.GetCulture.GetName] piedosos e dignos de confiança. Completei a conquista da Pérsia que o Califado Rashidun começou há dois séculos, para a glória eterna do [ROOT.Char.GetFaith.GetReligion.GetNameNoTooltip|l]."
 fp3_struggle.0071.desc.supporter: "Por meio de promessas e ameaças, astúcia e força, a autoridade de [struggle_liege.Custom('ES_DelDela')] [struggle_liege.GetTitledFirstName|l] foi reafirmada. Os antigos rebeldes foram trazidos de volta ao redil, e os indômitos senhores persas correm para se prostrar diante do trono de [struggle_liege.GetTitleTierName].

Mas atrás desse trono estou #italic eu#!. Nesta época de turbulência, aceitei o desafio, provei ser [ROOT.Char.Custom('ES_ElLa')] maior partidári[ROOT.Char.Custom('ES_OA')] de [Mostaza.GetTitleTierName] e trouxe de volta a ordem ao mundo. Sem dúvida, logo todos reconhecerão minha contribuição, com glória eterna para a casa [ROOT.Char.GetHouse.GetNameNoTooltip]..."
 fp3_struggle.0071.a: "$fp3_struggle.0071.t$"
 fp3_struggle.0071.b: "Através de promessas e ameaças, astúcia e poder, minha autoridade sobre o #italic dar-al-Islam#! foi reafirmada. Embora muitos afirmem que isso se deve à graça de [ROOT.GetCharacter.GetFaith.HighGodNameAlternate], apenas com minha habilidade e manobras inteligentes [struggle_liege.GetPrimaryTitle.GetNameNoTooltip] foi salvo de uma guerra civil ainda mais sangrenta.\n\nIsso anunciará um novo e grande dia para a Pérsia e para o mundo! E para #italic mim!#!"
 fp3_struggle.0072.t: "Por meio de promessas e ameaças, astúcia e poder, a autoridade de [struggle_liege.Custom('ES_DelDela')] [struggle_liege.GetTitledFirstName|l] foi reafirmada. Embora muitos agora afirmem que isso se deveu à graça de [ROOT.GetCharacter.GetFaith.HighGodNameAlternate], [struggle_liege.GetPrimaryTitle.GetNameNoTooltip] foi salvo de uma guerra civil ainda mais sangrenta apenas com o apoio de aliados como eu.\n\nNão duvido de que meus esforços e minha lealdade serão recompensados, embora eu não possa deixar de me perguntar se teria havido mais a ganhar escolhendo o outro lado…"
 fp3_struggle.0072.desc.caliph: "Mediante promessas vazias e ameaças vis, [struggle_liege.Custom('ES_ElLa')] [struggle_liege.GetTitledFirstName|l] reafirmou sua suposta autoridade e recuperou a lealdade dos tolos e aduladores que costumavam acorrer à sua corte.\n\nApesar dos meus melhores esforços, o corrupto califado de [struggle_liege.GetPrimaryTitle.GetNameNoTierNoTooltip] perdura. Este é um dia sombrio para a Pérsia, mas talvez nem tudo esteja perdido. Um novo dia nascerá, trazendo novas oportunidades..."
 fp3_struggle.0072.desc.supporter: "A disputa pela Pérsia se acalma agora que [struggle_liege.Custom('ES_ElLa')] [struggle_liege.GetTitledFirstName|l] não apenas restaurou sua autoridade e império, mas ganhou mais poder do que nunca.

Ao colocar marionetes [struggle_liege.GetCulture.GetName] para governar a Pérsia e subjugar todos os que ousaram desafiar [struggle_liege.GetHerHim], [struggle_liege.GetFirstNameNoTooltip] reafirmou a supremacia [struggle_liege.GetFaith.GetAdjective] em [struggle_liege.GetPrimaryTitle.GetBaseNameNoTierNoTooltip].

É difícil ver como alguém poderia desafiar [struggle_liege.GetHerHim] agora, mas talvez nem tudo esteja perdido…"
 fp3_struggle.0072.desc.detractor: "O caos que envolve a Pérsia diminui agora que [struggle_liege.Custom('ES_ElLa')] [struggle_liege.GetTitledFirstName|l] não apenas restaurou sua autoridade e império, mas também reivindicou maior prestígio e poder do que jamais tivera antes.

Ao impor marionetes [struggle_liege.GetCulture.GetName] para governar a Pérsia e subjugar todos os que ousaram desafiar [struggle_liege.GetHerHim], [struggle_liege.GetSheHe] reafirmou a supremacia [struggle_liege.GetFaith.GetAdjective] em [struggle_liege.GetPrimaryTitle.GetBaseNameNoTierNoTooltip].

As pessoas agora afirmam que será impossível desafiar sua autoridade, mas talvez eu devesse pô-la à prova…"
 fp3_struggle.0072.desc.uninvolved: "A disputa pela Pérsia se acalma agora que [struggle_liege.Custom('ES_ElLa')] [struggle_liege.GetTitledFirstName|l] não apenas restaurou sua autoridade e império, mas ganhou mais poder do que nunca.

Ao colocar marionetes [struggle_liege.GetCulture.GetName] para governar a Pérsia e subjugar todos os que ousaram desafiar [struggle_liege.GetHerHim], [struggle_liege.GetFirstNameNoTooltip] reafirmou a supremacia [struggle_liege.GetFaith.GetAdjective] em [struggle_liege.GetPrimaryTitle.GetBaseNameNoTierNoTooltip].

É difícil ver como alguém poderia desafiar [struggle_liege.GetHerHim] agora, mas talvez nem tudo esteja perdido…"
 fp3_struggle.0072.desc.involved: "O caos que envolve a Pérsia diminui agora que [struggle_liege.Custom('ES_ElLa')] [struggle_liege.GetTitledFirstName|l] não apenas restaurou sua autoridade e império, mas também reivindicou maior prestígio e poder do que jamais tivera antes.

Ao impor marionetes [struggle_liege.GetCulture.GetName] para governar a Pérsia e subjugar todos os que ousaram desafiar [struggle_liege.GetHerHim], [struggle_liege.GetSheHe] reafirmou a supremacia [struggle_liege.GetFaith.GetAdjective] em [struggle_liege.GetPrimaryTitle.GetBaseNameNoTierNoTooltip].

As pessoas agora afirmam que será impossível desafiar sua autoridade, mas talvez eu devesse pô-la à prova…"
 fp3_struggle.0072.desc.interloper: "A luta pela Pérsia se acalma agora que [struggle_liege.Custom('ES_ElLa')] [struggle_liege.GetTitledFirstName|l] não apenas restaurou sua autoridade e império, mas também ganhou mais poder do que nunca.

Ao colocar marionetes [struggle_liege.GetCulture.GetName] para governar a Pérsia e subjugar todos os que ousaram desafiar [struggle_liege.GetHerHim], [struggle_liege.GetSheHe] reafirmou a supremacia [struggle_liege.GetFaith.GetAdjective] em [struggle_liege.GetPrimaryTitle.GetBaseNameNoTooltip].

Como sua autoridade agora será intimidadora demais para ser desafiada, talvez eu também deva me aproximar de [struggle_liege.Custom('ES_ElElla')] para ganhar uma posição mais firme na Pérsia…"
 fp3_struggle.0072.a: "Embora a causa de [struggle_liege.GetName] fosse justa, talvez estivesse condenada ao fracasso. O povo da Pérsia queria um novo líder, reacender os antigos fogos e a glória perdida da antiguidade. E eu atendi ao seu chamado. Dos alicerces que ergui, pode surgir um novo império, o primeiro na Pérsia desde a queda dos [sassanid_dynasty.GetName]. Ou eu poderia me contentar com o que já conquistei, fortalecendo a terra e acendendo uma chama no coração de todo persa…"
 fp3_struggle.0072.b: "Isso deve garantir o legado da casa [ROOT.Char.GetHouse.GetNameNoTooltip]."
 fp3_struggle.0082.t: "$fp3_struggle.0091.t$"
 fp3_struggle.0082.desc.intro: "À medida que o sol se ergue atrás do monte Damavand, seu suave brilho aquece os campos pálidos. [struggle_ender.GetName] cresceu o suficiente em força e legitimidade para proclamar a refundação de [persia_loc.GetName|U]. Um novo grande poder governa agora esta terra, um bastião contra os vingativos senhores da Arábia e os selvagens nômades das estepes, reivindicando a glória dos antigos reis.\n\n"
 fp3_struggle.0082.desc.supporter: "Ainda está por ver meu papel no império [struggle_ender.Custom('ES_DelDela')][struggle_ender.GetTitledFirstNameNoTooltip|l]. Com minha ajuda, [struggle_ender.GetNameNoTooltip] poderia construir um legado que perdurasse, ou talvez não seja mais que [Select_CString( struggle_ender.IsFemale, 'otra conquistadora', 'otro conquistador' )] para os anais: alguém grande, mas fugaz."
 fp3_struggle.0082.desc.involved: "O que antes não era mais que outra fronteira de um califado moribundo agora é o núcleo de um império em ascensão. O mundo observa com interesse, perguntando-se se [struggle_ender.Custom('ES_ElLa')] [struggle_ender.GetTitledFirstNameNoTooltip|l] pode construir um legado que perdure, ou se não passa de [Select_CString( struggle_ender.IsFemale, 'otra conquistadora', 'otro conquistador' )] para os anais: alguém grandioso, porém fugaz."
 fp3_struggle.0082.desc.interloper: "Foi inevitável"
 fp3_struggle.0082.desc.detractor: "[struggle_ender.GetFaith.GetAdherentNameNoTooltip] Ascensão"
 fp3_struggle.0082.desc.uninvolved: "Os sunitas desviados assumiram por tempo demais que seu califado moribundo era, à exceção de Deus, a mais alta autoridade deste mundo; quão errados estavam.\n\nCom a queda [struggle_ender.Custom('ES_DelDela')] [struggle_liege.GetTitledFirstName|l], assumi a liderança da #EMP umma#! e pretendo vingar a Batalha de Karbala pelos seguidores de [ali.GetFirstName]. Abrirei uma nova era de domínio [ROOT.Char.GetFaith.GetAdherentNameNoTooltip] e reivindicarei o maior trono deste mundo.\n\nOs sunitas, que antes estavam tão confiantes em sua superioridade arrogante, não terão outra escolha a não ser se submeter."
 fp3_struggle.0082.a: "Os ignorantes sunitas presumiam há muito tempo que seu califado corrupto deveria ser a autoridade mais alta deste mundo, mas em sua loucura, esqueceram que o julgamento pertence apenas a Deus! Eu fiz o que muitos [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip] se esforçaram para fazer antes de mim e encerrei o califado sunita. Embora longe de ser uma vingança adequada pela Batalha de Nahrawan e pelos séculos de perseguição, este é apenas o começo. Tornei-me o califa do [ROOT.Char.GetFaith.GetAdherentNameNoTooltip] e os liderarei para o grande acerto de contas com os xiitas, que certamente virá em seguida."
 fp3_struggle.0082.b: "O califado deve guiar a umma na Terra pelo caminho sagrado, mas, em nossa loucura, permitimos que ele enfraquecesse e se corrompesse. Isso muda hoje, quando inauguro uma nova era para a Pérsia e o islamismo sob minha liderança sábia e incorruptível.\n\nEmbora ainda haja muito trabalho a ser feito, é inegável que o que fiz alterará o rumo da história persa para sempre. Agora avançamos rumo ao futuro, rumo à fé [ROOT.Char.GetFaith.GetAdjective] e ao [GetTitleByKey('e_persia').GetName]!"
 fp3_struggle.0082.c: "Que [ROOT.Char.GetFaith.HighGodNameAlternate] guie meu governo!"
 fp3_struggle.0091.t: "$fp3_struggle.0095.t$"
 fp3_struggle.0091.desc.detractor: "? medida que o sol nasce atr?s do monte Damavand, seu brilho suave aquece os campos p?lidos. A coroa de [GetTitleByKey('e_persia').GetBaseName] j? n?o ser? uma simples linhagem hist?rica, mas um s?mbolo de nossa luta heroica contra [struggle_liege.Custom('ES_ElLa')] [struggle_liege.GetTitledFirstName|l].

Nenhum invasor estrangeiro nos conter? novamente; recuperamos o poder e a gl?ria dos dias antigos, quando o mundo tremia diante do Rei dos Reis.

Em breve, por toda a P?rsia tremular?o as bandeiras de um novo imp?rio. #italic Meu#! imp?rio!"
 fp3_struggle.0091.desc.supporter: "Que [ROOT.Char.GetFaith.HighGodNameAlternate] seja grande e misericordioso!"
 fp3_struggle.0091.a: "Este é um dia sombrio..."
 fp3_struggle.0092.t: "Fundação: Um Califado Subjugado"
 fp3_struggle.0092.intro: "Durante muito tempo, os muçulmanos aceitaram que o califado era, exceto Deus, a mais alta autoridade deste mundo, mas, à medida que o reino caiu em desânimo e decadência, surgiu a necessidade de repensar essa situação.\n\nAgora, surgiu um[struggle_liege.Custom('ES_XA')] nov[struggle_liege.Custom('ES_OA')] [ROOT.GetCharacter.GetPrimaryTitle.GetNameNoTooltip], comigo ao leme, para guiar o califa sob minha proteção e vigilância. Talvez [struggle_liege.GetName] seja [struggle_liege.Custom('ES_ElLa')] líder dos fiéis, mas #italic eu#! serei daqui em diante seu senhor[ROOT.GetCharacter.Custom('ES_XA')]; [ROOT.GetCharacter.Custom('ES_ElLa')] [Select_CString( ROOT.Char.IsFemale, 'nova representante', 'novo representante' )] do islã, e [struggle_liege.GetSheHe] faria #EMP bem#! em se lembrar disso!"
 fp3_struggle.0092.desc.iranian: "Durante muito tempo, os muçulmanos aceitaram que, à exceção de Deus, o califado era a máxima autoridade deste mundo, mas, à medida que o reino caiu no desânimo e na decadência, tornou-se evidente que os seguidores de Ali tinham um direito maior sobre os fiéis.\n\nDecidi colocar o califado de [struggle_liege.GetPrimaryTitle.GetNameNoTierNoTooltip] sob minha proteção e vigilância. Trarei uma nova era de domínio [ROOT.Char.GetFaith.GetAdherentName] na #EMP umma#!, e aos nossos detratores é melhor que se alinhem!"
 fp3_struggle.0092.desc.non-iranian: "Os sunitas aceitaram por muito tempo que, exceto Deus, o califado era a mais alta autoridade deste mundo, mas quando o domínio tremeu diante do poder dos muhakkima, eles viram o erro de seus caminhos.\n\nComigo no comando, os [ROOT.Char.GetFaith.GetAdherentNamePlural] assumiram a custódia do desventurado califa de [struggle_liege.GetPrimaryTitle.GetNameNoTierNoTooltip], e em breve toda a #EMP umma#! terá de abraçar nossas santas palavras: o julgamento pertence somente a Deus!"
 fp3_struggle.0092.a: "Um novo dia para o Islã!"
 fp3_struggle.0095.t: "$fp3_struggle.0100.t$"
 fp3_struggle.0095.desc.shia_and_zandaqa: "Que o califado de [struggle_liege.GetPrimaryTitle.GetNameNoTierNoTooltip] era um tigre de papel não deveria ter surpreendido ninguém e, de fato, seus exércitos se dispersaram, e seus leais romperam seus votos ou se esconderam em terras fronteiriças esquecidas. Agora, [struggle_ender.GetName] proclama ser [struggle_ender.Custom('ES_ElLa')] #italic protetor[struggle_ender.Custom('ES_XA')]#! do califa, mas só os tolos não reconhecerão o que isso realmente é — o califado sunita foi subjugado e humilhado, com [struggle_ender.GetSheHe] como seu [Select_CString( struggle_ender.IsFemale, 'nova senhora', 'novo senhor' )].\n\nComo antig[ROOT.Char.Custom('ES_OA')] oponente [struggle_liege.Custom('ES_DelDela')] [struggle_liege.GetTitledFirstNameNoTooltip|l], devo me certificar de reivindicar um lugar importante nesta nova ordem para a casa [ROOT.Char.GetHouse.GetNameNoTooltip] e para mim…"
 fp3_struggle.0095.desc.muhakkima: "Apesar do meu firme apoio, o Califado de [struggle_liege.GetPrimaryTitle.GetNameNoTierNoTooltip] revelou-se demasiado fragmentado, ou seus inimigos eram numerosos e tenazes demais. Agora, [struggle_ender.GetName] afirma ser [struggle_ender.Custom('ES_ElLa')] #italic protetor[struggle_ender.Custom('ES_XA')]#! do califa, mas, ? claro, o que isso significa na pr?tica ? que [struggle_ender.GetSheHe] subjugou ignominiosamente [Select_CString( struggle_liege.IsFemale, 'a justa soberana', 'o justo soberano' )] da #italic dar al-Islam#!.

Agora devo agir com cautela, para assegurar o futuro da casa [ROOT.Char.GetHouse.GetNameNoTooltip]?"
 fp3_struggle.0095.desc.fallback: "Os atos decisivos de [struggle_ender.GetName] parecem ter posto fim, embora frágil, à anarquia e ao caos na Pérsia. Tendo subjugado [struggle_liege.Custom('ES_AlAla')] [struggle_liege.GetTitledFirstName|l], agora [struggle_ender.Custom('ES_ElLa')] [struggle_ender.GetTitledFirstNameNoTooltip|l] reivindica a tutela sobre o califado sunita e o reconhecimento como [struggle_ender.Custom('ES_ElLa')] maior governante da terra.\n\nA pergunta agora é — a casa [ROOT.Char.GetHouse.GetNameNoTooltip] deve aceitar essa situação ou contestá-la?"
 fp3_struggle.0095.a: "$fp3_struggle.0101.desc.interloper$"
 fp3_struggle.0096.t: "A luta na Pérsia e na Mesopotâmia terminou, com [struggle_ender.GetName] subjugando [struggle_liege.GetName] e assumindo o controle de partes significativas do #italic dar-al-Islam#!. A autoridade e a glória do Califado Sunita foram para sempre diminuídas, enquanto [struggle_ender.GetPrimaryTitle.GetName] se tornou uma luz brilhante em ascensão. Só o tempo dirá se durará ou se é apenas uma estrela cadente..."
 fp3_struggle.0096.desc.supporter: "Que isso anuncie um novo dia!"
 fp3_struggle.0096.desc.involved: "Este é um dia sombrio para o Islã."
 fp3_struggle.0096.desc.interloper: "O Fim do [GetTitleByKey('d_sunni').GetName|l]"
 fp3_struggle.0096.desc.detractor: "Em luta vã contra generais ambiciosos, vassalos insatisfeitos e seus antigos escravos, o [GetTitleByKey('d_sunni').GetNameNoTooltip|l] colheu o que semeou. A arrogância e a vaidade cresceram demais, os gastos eram perdulários e volúveis, e a corte, traiçoeira como nenhuma outra.\n\nO império caiu, e #italic eu#! fui [ROOT.Char.Custom('ES_ElLa')] o artífice de sua queda. Aqui me ergo em glória, enquanto o governo de [struggle_liege.GetFirstName] será, no máximo, um conto de advertência nos livros de história, um breve interlúdio nos anais da Pérsia."
 fp3_struggle.0096.desc.uninvolved: "Este é o meu maior momento!"
 fp3_struggle.0096.a: "Eu fiz o que precisava ser feito."
 fp3_struggle.0096.b: "$fp3_struggle.0191.t$"
 fp3_struggle.0100.t: "Todos me traíram. Meus conselheiros, meus vassalos, meus amigos. Por mais que eu tentasse salvar o reino da [ROOT.Char.GetHouse.GetNameNoTooltip], foi sem esperança final, e embora eu possa agora me perguntar se poderia ter feito algo diferente, apenas [ROOT.GetCharacter.GetFaith.HighGodName] conhece a verdade. O reino está devastado e quebrado, entre torres derrubadas e as ruínas da glória passada. Não tenho escolha senão me esconder em minha [ROOT.Char.Custom('ResidenceBuilding')], enquanto tudo desmorona ao meu redor, e me contentar que pelo menos eu ainda estou vivo."
 fp3_struggle.0100.desc: "Trancado em uma luta sem esperança contra generais ambiciosos, vassalos descontentes e seus próprios ex-escravos, [struggle_liege.GetPrimaryTitle.GetNameNoTooltip] não pôde durar. Os gastos de ouro, sangue e trabalho foram enormes, e embora o mundo possa não reconhecer o papel que desempenhei, os sacrifícios que fiz, [ROOT.GetCharacter.GetFaith.HighGodName] reconhecerá. Mas para o bem ou para o mal, agora enfrentamos um reino partido, aberto àqueles que atacariam os reis deste mundo com um ataque fatal. No entanto, o destino das casas [struggle_liege.GetHouse.GetNameNoTooltip] pode não ser o meu, e dessas cinzas, novas flores podem florescer."
 fp3_struggle.0100.desc.shia_and_zandaqa: "Lutando em vão contra generais ambiciosos, vassalos insatisfeitos e seus antigos escravos, [struggle_liege.GetPrimaryTitle.GetNameNoTooltip] colheu o que semeou. A arrogância e a vaidade tornaram-se grandes demais, os gastos eram esbanjadores e volúveis, e a corte, traiçoeira como nenhuma outra. Os [struggle_liege.GetHouse.GetNameNoTooltip] caíram, e tão grande é sua queda que ninguém pode prever que voltem a se erguer. Seu nome será, no máximo, uma história de advertência nos livros de história, um breve interlúdio nos anais da Pérsia."
 fp3_struggle.0100.desc.muhakkima: "Custe o que custar, devo garantir o futuro da dinastia."
 fp3_struggle.0100.a: "É apenas um contratempo temporário."
 fp3_struggle.0101.t: "Isso anuncia novas oportunidades — para mim."
 fp3_struggle.0101.desc.detractor: "Que calamidade..."
 fp3_struggle.0101.desc.supporter: "Apesar do meu firme apoio, o Califado de [struggle_liege.GetPrimaryTitle.GetNameNoTierNoTooltip] revelou-se demasiado fragmentado, ou seus inimigos eram numerosos e tenazes demais. Agora, [struggle_ender.GetName] afirma ser [struggle_ender.Custom('ES_ElLa')] #italic protetor[struggle_ender.Custom('ES_XA')]#! do califa, mas, ? claro, o que isso significa na pr?tica ? que [struggle_ender.GetSheHe] subjugou ignominiosamente [Select_CString( struggle_liege.IsFemale, 'a justa soberana', 'o justo soberano' )] da #italic dar al-Islam#!.

Agora devo agir com cautela, para assegurar o futuro da casa [ROOT.Char.GetHouse.GetNameNoTooltip]?"
 fp3_struggle.0101.desc.interloper: "\"Meu [ROOT.Char.GetTitleTierName|l]\", diz [target.GetName] relutantemente, \"parece claro para mim agora, com inimigos mútuos por toda parte, que devemos fazer um esforço para confiar um no outro. Portanto, me curvo diante de você e professo minha lealdade mais uma vez.\""
 fp3_struggle.0101.desc.involved: ""Oh, grande [ROOT.Char.GetTitleTierName|l]", diz [target.GetName] curvando-se. "Vós, sob cuja sombra tenho a sorte de estar, meu [ROOT.Char.GetLadyLord] [Select_CString( ROOT.Char.IsFemale, 'misericordiosa y gloriosa', 'misericordioso y glorioso' )], quanto lamento ter duvidado de vós. Desvinculo-me de qualquer coisa imprudente, real ou imaginária, que se saiba que eu tenha dito sobre sua pessoa"."
 fp3_struggle.0101.desc.uninvolved: ""Ah, [ROOT.Char.GetTitleTierName|l]", declara solenemente [target.GetName]. "Todo reino precisa de um governante acima dos demais, aquele que faz girar a roda, que consegue ver além deste mundo fugaz de carne e loucura. Pode ser, de fato, que vós sejais tal [ROOT.Char.GetTitleTierName|l], e, portanto, esquecerei minhas dúvidas e minha vaidade, e renovarei o juramento que fiz a vós"."
 fp3_struggle.0101.a: "[target.GetName] busca meu olhar por um instante antes de fazer uma profunda reverência. "Sois [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleTierName|l], meu senhor[ROOT.Char.Custom('ES_XA')], e legítim[ROOT.Char.Custom('ES_OA')] líder da #italic umma#!. Tive minhas dúvidas, não o nego, mas não posso permitir que a causa dos fiéis seja posta em perigo. Não esqueci a promessa que vos fiz e não vacilarei novamente"."
 fp3_struggle.0101.b: "Muito bem... mas estarei de olho em você!"
 fp3_struggle.0191.t: "Tudo está perdoado."
 fp3_struggle.0191.desc: "Em luta vã contra generais ambiciosos, vassalos insatisfeitos e seus antigos escravos, o [GetTitleByKey('d_sunni').GetNameNoTooltip|l] colheu o que semeou. A arrogância e a vaidade cresceram demais, os gastos eram perdulários e volúveis, e a corte, traiçoeira como nenhuma outra.\n\nO império caiu, e #italic eu#! fui [ROOT.Char.Custom('ES_ElLa')] o artífice de sua queda. Aqui me ergo em glória, enquanto o governo de [struggle_liege.GetFirstName] será, no máximo, um conto de advertência nos livros de história, um breve interlúdio nos anais da Pérsia."
 fp3_struggle.0191.a: "Este é o meu maior momento!"
 fp3_struggle.0191.b: "Eu fiz o que precisava ser feito."
 fp3_struggle.0192.t: "Acender o Fogo Real"
 fp3_struggle.0192.desc.caliph: "Embora Mazdak, se vivesse, quisesse que eu fechasse os templos do fogo, chamando-os de monumentos à vaidade, sou [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleTierName|l] e posso escolher outro caminho. Se quero honrar seu legado, devo abençoar meu reinado com o fogo, como os grandes reis do passado."
 fp3_struggle.0192.desc.supporter_or_vassal: "Talvez ninguém devesse ser [ROOT.Char.GetTitleTierName|l] deste mundo. No entanto, as pessoas me confiaram essa posição, e merecem a proteção de Ātar, o #italic yazata#! do calor e da luz."
 fp3_struggle.0192.desc.detractor: "Agora que sou [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleTierName|l], devo governar guiado[ROOT.Char.Custom('ES_OA')] pela luz da glória de meus antepassados e me esforçar para conquistar o favor [ROOT.Char.GetFaith.HighGodNamePossessive]."
 fp3_struggle.0192.a: "Realizarei uma cerimônia na corte para acender uma grande chama na [ROOT.Char.Custom('ResidenceBuilding')] de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], e que ela queime durante todo o meu reinado."
 fp3_struggle.0192.b: "Cortesãos e vassalos de fé hostil podem não gostar disso, mas outros podem ficar #italic muito#! impressionados."
 fp3_struggle.0192.c: "Cortesãos e vassalos de fé hostil podem não gostar disso, mas outros ficarão impressionados."
 fp3_struggle.0123.d: "O que estou fazendo? Os templos deveriam ser destruídos."
 sway_outcome.1004.t: "Uma cerimônia elaborada, condizente com a glória dos reis persas!"
 sway_outcome_magnanimity.1004.desc: "Uma cerimônia modesta será suficiente."
 sway_outcome_blessed.1004.desc: "As chamas podem esperar."
 sway_outcome_grudgingly.1004.desc: "Esta decisão ficará indisponível por 20 anos."
 sway_outcome_flattery.1004.desc: "Você faz um voto solene de apagar as chamas sagradas."
 sway_outcome_dharmic.1004.desc: "Apagar do Fogo Real"
 sway_outcome_caliph.1004.desc: "O desastre atinge! Enquanto os exércitos de [occupant.GetName] saqueavam [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] e assaltavam a [ROOT.Char.Custom('ResidenceBuilding')], alguns de seus soldados chegaram à sala que abrigava meu fogo real e o apagaram cruelmente. Isso pode ser percebido como um presságio terrivelmente ruim para a dinastia [ROOT.Char.GetDynastyNameNoTooltip]."
 sway_outcome.1004.a: "Cortesãos e vassalos supersticiosos ou ardentes veem isso como um presságio muito ruim para o seu reinado."
 sway_outcome.1004.b: "Não importa, um símbolo era tudo o que era."
 ##################################################
 #Decision EVENTS
 ##################################################
 fp3_decision.0001.t: "Já passou da hora de o povo de [capital_county.GetName] apreciar a visão de um grande e novo projeto de construção."
 fp3_decision.0001.desc_mazdakist: "Não poderia ter escolhido um encarregado melhor para esta empreitada do que [chosen_architect.GetName]. Conta com toda a minha confiança."
 fp3_decision.0001.desc_khurramite: "\n\nPoderíamos usar o saque recentemente pilhado de [target_county.GetName] para garantir que o edifício fique suficientemente esplêndido, mas isso certamente irritaria a população.\n\nPor outro lado, eu poderia, benevolentemente, financiar este empreendimento com meus próprios recursos…"
 fp3_decision.0001.desc_general_zoroastrian: "Deixe que o povo de [target_county.GetNameNoTierNoTooltip] demonstre sua lealdade!"
 fp3_decision.0001_desc_ending: "Eu financiarei este empreendimento."
 fp3_decision.0001_vassal_and_courtier_opinion_impressed: "Pensando melhor, talvez em outro dia."
 fp3_decision.0001_vassal_and_courtier_opinion: "Magnífico projeto de construção local"
 fp3_decision.0001.a: "O projeto supera as expectativas"
 fp3_decision.0001.b: "O projeto segue conforme o planejado"
 fp3_decision.0001.c: "Ambições Arquitetônicas"
 fp3_decision.0001.d: "[chosen_architect.GetFirstName] está trabalhando diligentemente, reunindo uma força de trabalho para o nosso novo projeto."
 fp3_decision.0001_pledged_to_quench_fire: "Recursos e trabalhadores estão sendo transportados em massa de [target_county.GetNameNoTier]."
 fp3_decision.0001.a.tt: "“Tudo estará pronto em seu devido lugar, [ROOT.Char.Custom('FormOfAddressForLiege')]”, ele declara. “Mas o que devo construir?”.\n\n“Pensei em um grande mausoléu, revestido de lápis-lazúli das minas de Sar-i Sang. Ou talvez uma reforma de seu [ROOT.Char.Custom('ResidenceBuilding')] no estilo tradicional — isso certamente impressionaria seus súditos em [capital_province.GetNameNoTooltip]. Também poderíamos ampliar nossos #italic qanats#!, fontes e banhos, e decorá-los luxuosamente”. \n\n“O que prefere, ó, [ROOT.Char.GetTitleTierName|l]?”."
 fp3_decision.0002.t: "Um mausoléu para a dinastia [ROOT.Char.GetDynastyNameNoTooltip]."
 fp3_decision.0002.desc: "Reformar minha [ROOT.Char.Custom('ResidenceBuilding')]."
 fp3_decision.0002_fire_destroyed_tt: "Banheiros e fontes ricamente adornados."
 fp3_decision.0002.a: "Cada membro da [house|lE] [root_scope.MakeScope.Char.GetHouse.GetBaseNameNoTooltip]"
 fp3_decision.0002.b: "Uma Visão de Esplendor"
 fp3_decision.0002.c: "As olheiras pesam no normalmente radiante rosto de [chosen_architect.GetName]. Ele/ela passou a noite inteira elaborando um plano para o futuro embelezamento de [capital_province.GetName].\n\n"Imagino, [ROOT.Char.Custom('FormOfAddressForLiege')], um belo banho hammam, revestido de azulejos de cerâmica multicolorida. No interior, pisos de mosaico, banhos de vapor, piscinas frias e árvores viçosas plantadas em vasos de porcelana chinesa…".\n\n"Mas, se preferirdes um/a [ROOT.Char.GetFaith.HouseOfWorship] ou um pequeno palácio, eu naturalmente elaborarei novos planos"."
 fp3_dynasty_decision.0003.t: "O hammam parece encantador."
 fp3_dynasty_decision.0003.intro: "Eu preferiria ter um [ROOT.Char.GetFaith.HouseOfWorship]."
 fp3_dynasty_decision.0003.char: "Pode-se ter palácios demais?"
 fp3_dynasty_decision.0003.desc: "Você e [chosen_architect.GetFirstNameNoTooltip] estão se aproximando"
 fp3_dynasty_decision.0003.a: "Construção Clerical"
 fp3_dynasty_decision.0003.b: "[chosen_architect.GetTitledFirstName] não perde tempo em começar a elaborar os planos para uma nova adição em [capital_province.GetName].\n\n"Poderíamos construir um/a novo/a [ROOT.Char.GetFaith.HouseOfWorship]", sugere, "com um arco esplêndido e uma fachada de mármore no mais recente estilo persa".\n\n"
 fp3_dynasty_decision.0003.c: "\"Ou uma dakhma, uma Torre do Silêncio, onde os mortos podem descansar em silêncio até que o [ROOT.Char.Custom('GetRegionalEagleType')] desça para se alimentar. Mas faríamos isso tão grandioso e tão bonito em seu esplendor solene que até mesmo os pássaros carniceiros teriam que parar para apreciá-lo.\"\n\n"
 cultural_acceptance_built_magnificent_capital: "Ou uma grande madrasa, com quartos tranquilos para estudar e contemplar, um lugar de encontro para erudit[ROOT.Char.Custom('ES_OA')] os de todos os povos destas terras.\n\n"
 splurge_above_expectations_toast: "\"Alternativamente, um grande afresco narrativo ao longo da parede leste, entrelaçando temas piedosos com a história da casa [ROOT.Char.GetDynastyNameNoTooltip], seria notável!\""
 splurge_as_expected_toast: "Eu quero um [ROOT.Char.GetFaith.HouseOfWorship], se puder torná-lo verdadeiramente grandioso."
 fp3_dynasty_decision.0004.t: "Construa a dakhma para que possamos honrar os mortos com segurança."
 fp3_dynasty_decision.0004.intro: "Uma nova madrasa certamente melhoraria o reino."
 fp3_dynasty_decision.0004.plunder.desc: "Eu adoraria ver esse afresco..."
 fp3_dynasty_decision.0004.desc: "Um Monumento a Mim Mesmo"
 fp3_dynasty_decision.0004.a: "Passei longas horas em solidão, esboçando projetos para melhorar [capital_province.GetName].\n\nSem dúvida, este projeto ficará melhor agora que é fruto apenas da minha mente, em vez de ter intermediários intrometidos e cortesãos bajuladores. Mas no que ele se tornará?\n\nOlho para minhas anotações e vejo três projetos promissores. Eu poderia…"
 fp3_dynasty_decision.0004.b: "Embelezar e expandir o bazar."
 fp3_dynasty_decision.0004.c: "Construir uma praça grande e poço."
 every_house_member: "Construir um grande mausoléu, para quando chegar a minha hora."
 fp3_dynasty_decision.0005.t: "Projetar uma luxuosa casa de banhos."
 fp3_dynasty_decision.0005.desc: "Erguer uma alta e brilhante torre de vigia."
 fp3_dynasty_decision.0005.a: "Construir um palácio de verão tranquilo."
 fp3_dynasty_decision.0005.b: "Inaugurar uma maravilhosa [ROOT.Char.GetFaith.HouseOfWorship]."
 fp3_dynasty_decision.0005.c: "A Fortaleza de Badd"
 fp3_decisons_closer_to_love.tt: "Apenas algumas décadas atrás, durante o auge da rebelião Khurramite contra os Abássidas, o líder camponês Babak se refugiou com seus seguidores em uma antiga fortaleza parta. Aquilo se tornou sua última resistência, mas os Abássidas pagaram caro pela vitória."
 fp3_dynasty_decision.0007.t: "Nos primeiros dias do califado Abássida, seus exércitos perseguiram o líder Khurramite Babak até uma fortaleza alta em uma montanha na floresta Arasbaran, onde ele fez sua última resistência. Embora a ruína tenha sido desgastada pelos elementos ao longo dos anos, o local permanece impressionante e será uma ótima fortificação."
 fp3_dynasty_decision.0007_desc_beginning: "Lá no alto das Montanhas Negras da floresta Arasbaran, uma ruína de fortaleza repousa no topo de um pico coberto de neve. Este ninho de águia foi o local da última resistência do herói Khurramite Babak, há muito tempo, e eu o restaurarei para a glória que poderia ter tido nos dias antigos."
 fp3_dynasty_decision.0007_dakhma: "Os [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip] locais são muito simpáticos ao meu empreendimento e se comprometeram a me ajudar a restaurar e garantir o local.\n\n"
 fp3_dynasty_decision.0007_madrasa: "Os camponeses e pastores destas montanhas escarpadas são notoriamente indisciplinados, mas detestam o antigo clero [ROOT.Char.GetFaith.GetReligion.GetAdherentNameNoTooltip] e me prometeram seu apoio.\n\n"
 fp3_dynasty_decision.0007_outro: "A população local é belicosa e propensa a rebeliões, mas adora a memória de Babak, consagrada em sagas e canções, e me ajudará a reconstruir sua antiga casa de montanha.\n\n"
 fp3_dynasty_decision.0007.a: "Chegou a hora de estabelecer um novo assento para a casa [ROOT.Char.GetDynastyHouseNameNoTooltip], e que ele perdure por muito tempo!"
 fp3_dynasty_decision.0007.b: "Posso ver uma maneira de recuperar alguns custos..."
 fp3_dynasty_decision.0007.c: "Será uma fortaleza poderosa!"
 fp3_dynasty_decision.0007.d: "Não preciso de glória, apenas de uma fortaleza segura."
 fp3_dynasty_decision.0008.t: "Uma Fé para o Povo"
 fp3_dynasty_decision.0008.desc: "Apagando as Chamas Eternas"
 fp3_dynasty_decision.0008.a: "Por muito tempo, nós [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip] seguimos nosso próprio caminho e adoramos [ROOT.Char.GetFaith.HighGodName] de uma maneira que melhor satisfazia nossos corações. Nem mesmo nos grandes dias antigos precisávamos dos altos [ROOT.Char.GetFaith.random_AltPriestTermPlural] e seus rituais intrincados. E agora vivemos em um mundo diferente, com muitos desafios para nossa fé atribulada, e a necessidade de reforma nunca foi tão grande. Daqui para frente, o sacerdócio estará mais próximo do povo. Forjaremos nosso próprio futuro, com a posição de [ROOT.Char.GetFaith.PriestNeuter] aberta a qualquer pessoa que tenha a confiança da comunidade."
 fp3_dynasty_decision.0008.b: "Por muito tempo, os [ROOT.Char.GetFaith.random_AltPriestTermPlural] nos perseguiram a nós, os [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip]. Por muito tempo, eles se apegaram aos fogos sagrados, ao poder e às riquezas que herdaram. Fora de nossa fé, outros têm visto essas práticas arcaicas com desprezo. Basta! Em [ROOT.Char.GetFaith.GetNameNoTooltip|l], fecharemos os/as [ROOT.Char.GetFaith.HouseOfWorshipPlural] e extinguiremos para sempre os fogos eternos. Isso acabará com o poder dos [ROOT.Char.GetFaith.random_AltPriestTermPlural] e anunciará um novo começo para o [ROOT.Char.GetFaith.GetReligion.GetNameNoTooltip|l]. De agora em diante, não seremos guiados por [ROOT.Char.Custom('DefaultPriestWomenMen')] mortais — somente por [ROOT.Char.GetFaith.HighGodName]!"
 fp3_dynasty_decision.0008.c: "Isso abrirá muitas portas... para mim!"
 fp3_dynasty_decision.0008.d: "E que as brasas se transformem em cinzas frias!"
 fp3_dynasty_decision.0008.e: "Até um mendigo pode agora se tornar um sacerdote."
 fp3_dynasty_decision.0008.f: "Isso foi para o bem de todos."
 fp3_dynasty_decision.0008.g: "Os Magos Reformados"
 fp3_decision.0003.t: "Isso deixará muito aborrecidos os governantes [root_religion.GetAdherentNamePlural] com crenças menos radicais."
 fp3_decision.0003.desc_recently: "[head_of_faith|E] muda de [GetFaithDoctrine('doctrine_temporal_head').GetBaseName|l] para [GetFaithDoctrine('doctrine_no_head').GetBaseName|l]"
 fp3_decision.0001.desc_less_recently: "Reivindicando a Luz"
 fp3_decision.0001.desc_long_ago: "Os [founder.GetFaith.GetAdherentNamePlural] atribulados há muito tempo lutaram em vão, sem uma liderança devidamente orientada. Agora, sua ignomínia acabou, pois eu reivindiquei o #italic walayah#!, a guarda sobre os fiéis, e a #italic luz sobre luz#! de [ROOT.Char.GetFaith.HighGodNameAlternate]. Eu os liderarei com toda a habilidade e previsão que [ROOT.Char.GetFaith.HighGodNameAlternate] em sua sabedoria achar conveniente me conceder, e meus descendentes farão o mesmo depois de mim. Que isso anuncie um novo começo para os [founder.GetFaith.GetAdherentNamePluralNoTooltip]!"
 fp3_decision.0003.desc_khurramite: "Isso será meu dever e fardo."
 fp3_decision.0003.desc_zandik: "Que a luz sem calor brilhe sobre minha casa!"
 fp3_decision.0003.desc_fallback: "[Select_CString( founder.IsFemale, 'Uma nova', 'Um novo' )] [founder.GetFaith.ReligiousHeadName]"
 fp3_decision.0003.desc_ending: "[founder.GetFirstName] se propôs a reivindicar o cargo de [founder.GetFaith.ReligiousHeadName] para os [founder.GetFaith.GetAdherentNamePlural] e parece que muitos de seus seguidores apoiam esse movimento ousado. Dizem que possui o #italic weyalat#!, a guia mística de [ROOT.Char.GetFaith.HighGodNameAlternate] que lhe permite liderar os fiéis. Embora talvez eu não esteja em posição de contestar essa alegação diretamente, como uma das figuras de destaque do [founder.GetFaith.GetNameNoTooltip|l], minha opinião importará. Devo aceitar[founder.GetHerHim] como nov[founder.Custom('ES_OA')] líder dos fiéis ou me opor discretamente a [founder.GetSheHe]?"
 fp3_decision.0003.a: "Certamente [founder.Custom('ES_ElLa')] [founder.GetTitledFirstNameNoTooltip|l] demonstrará ser dign[founder.Custom('ES_OA')]."
 fp3_decision.0003.b: "Isso é um ultraje."
 fp3_decision.0003.c: "Você aceita de bom grado este [founder.GetFaith.ReligiousHeadName|l]."
 fp3_decision.0004.t: "Você silenciosamente se alinha... por enquanto."
 fp3_decision.0004_alternate.t: "Os [founder.GetFaith.GetAdherentNamePluralNoTooltip] merecem um[ROOT.Char.Custom('ES_XA')] líder de verdade…"
 fp3_decision.0004_desc: "[Select_CString( founder.IsFemale, 'Uma nova', 'Um novo' )] [founder.GetFaith.ReligiousHeadName]"
 fp3_decision.0004_alternate_desc: "[founder.GetFirstName] reuniu apoio suficiente e tem piedade percebida suficiente para se autodenominar [founder.GetFaith.ReligiousHeadName] dos [founder.GetFaith.GetAdherentNamePlural]. Embora alguns xiitas celebrem isso como uma pequena vitória por sua crença na #italic ismah#!, a infalibilidade [founder.Custom('ES_DelDela')] [founder.GetFaith.ReligiousHeadTitleName], mais $islam_religion_adherent_plural$ de orientação mais comunitária lamentam o surgimento de outra fratura na Umma. Enquanto isso, os [founder.GetFaith.GetAdherentNamePluralNoTooltip] parecem mais radicais do que nunca."
 fp3_decision.0004.a: "Preciso pensar sobre isso..."
 fp3_decision.0004.b: "Devo estar vigilante..."
 fp3_decision.0004.c: "Vingando Nossos Mártires"
 fp3_decision.0004.d: "Há muito tempo, a oposição obstinada dos haruritas ao covarde compromisso do outrora grande [ali.GetFirstName] com [Select_CString( muawiya.IsFemale, 'a usurpadora', 'o usurpador' )] [muawiya.GetFirstName] nos tornou um anátema tanto para sunitas quanto para xiitas. Desde então, nossos #italic fedaiyin#! têm dado suas vidas para acabar com traidores e apóstatas e devolver a proeminência aos haruritas.

Agora chegou esse dia: os califados traidores caíram e, comigo no comando, os [ROOT.Char.GetFaith.GetAdherentNamePlural] retomaram a Mesopotâmia e nossos antigos locais sagrados."
 fervor_gain_magi_destroyed: "Logo, todo [ROOT.Char.GetFaith.GetReligion.GetName|l] renunciará às suas falsas convicções e se unirá à nossa causa justa — ou morrerá!"
 destroy_the_magi_opinion_tooltip: "Em breve, nossos grandes oradores e poetas serão ouvidos por toda a Ummah, convertendo um número incontável para nossa causa justa."
 replace_the_high_priest_effect_tooltip: "Lā ḥukma illā lillāh!"
 fp3_decision.0008.t: "Ascensão de [avenger.GetFaith.GetNameNoTooltip|l]"
 fp3_decision.0008.desc: "[avenger.GetName] conseguiu apoio e piedade suficientes para iniciar uma onda de apoio [avenger.GetFaith.GetAdherentName] por vastas extensões do mundo muçulmano. Diz-se que muitos governantes e cidades se converteram à sua fé, voluntariamente ou não, e apenas [ROOT.Char.GetFaith.HighGodName] sabe o que planeja [avenger.GetNameNoTooltip] a seguir."
 fp3_decision.0008.a: "Este é um grande dia para o Islã!"
 fp3_decision.0008.b: "Isso é horrível..."
 fp3_decision.0009.t: "Objeções do [ROOT.Char.GetFaith.GetReligiousHeadTitle.GetAdjectiveNoTooltip]"
 fp3_decision.0009.desc: "[hof_emissary.Custom('ES_ElLa')|U] enviad[hof_emissary.Custom('ES_OA')] [ROOT.Char.GetFaith.GetReligiousHeadTitle.Custom('ES_DelDela')] [ROOT.Char.GetFaith.GetReligiousHeadTitle.GetName|l], [hof_emissary.GetName], parece bastante desgostad[hof_emissary.Custom('ES_OA')], o que talvez dê alguma pista sobre os próprios sentimentos [righteous_caliph.Custom('ES_DelDela')] [righteous_caliph.GetTitledFirstName|l] sobre este assunto.

"[righteous_caliph.GetFaith.ReligiousText] foi revelado ao mundo em árabe e não será lido em nenhuma outra língua", proclama [hof_emissary.GetFirstNameNoTooltip], "nem qualquer outro livro, pergaminho ou tábua de cera sobre assuntos de fé, enquanto meu mestre, o grande [righteous_caliph.GetTitleTierName], ainda respirar. [righteous_caliph.GetSheHe|U] exige que cesse seus esforços equivocados de tradução"."
 fp3_decision.0009.a: "Ai, meu caminho está traçado."
 fp3_decision.0009.b: "Muito bem, vou reverter a política."
 fp3_decision.0009.a.tt: "Orgulho Persa"
 fp3_decision.0009.b.tt: "Embora meu patrocínio mal tenha começado, alguns #italic ulemas#! de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] já começaram a produzir obras na língua local, e [persian_genius_ulama.GetName] parece especialmente ansios[persian_genius_ulama.Custom('ES_OA')].\n\n"Há muito defendo isso", diz. "A grandeza do [ROOT.Char.GetFaith.GetReligion.GetName|l] foi construída sobre a união da destreza árabe com o refinamento e o conhecimento persa. Há muito a Pérsia deveria ter recuperado seu papel como farol do esclarecimento espiritual. Já traduzi e comentei muitos hadiths e até redescobri algumas obras perdidas do próprio Hasan al-Basri, preservadas nas antigas bibliotecas de Gundeshapur…".\n\n"
 fp3_decision.0009.c: "Enquanto isso, [uncaring_caliph.Custom('ES_ElLa')|l] [uncaring_caliph.GetTitledFirstName|l] permanece em silêncio, observando estes acontecimentos com apreensão."
 fp3_decision.0010.t: "Eu olho para est[persian_genius_ulama.Custom('ES_EA')] [persian_genius_ulama.GetWomanMan] ambicios[persian_genius_ulama.Custom('ES_OA')] Talvez eu pudesse aproveitar[persian_genius_ulama.GetHerHim] melhor?"
 fp3_decision.0010.desc: "Isso parece promissor!"
 fp3_decision.0010.a: "Você deveria ficar e trabalhar diretamente para mim."
 fp3_decision.0010.b: "Você não poderá tomar esta [decision|lE] novamente por 30 anos."
 fp3_decision.0011.t: "Você fez um compromisso de não promover escrituras persas."
 fp3_decision.0011_opening.desc: "Há muito tempo, a oposição obstinada dos haruritas ao covarde compromisso do outrora grande [ali.GetFirstName] com [Select_CString( muawiya.IsFemale, 'a usurpadora', 'o usurpador' )] [muawiya.GetFirstName] nos tornou um anátema tanto para sunitas quanto para xiitas. Desde então, nossos #italic fedaiyin#! têm dado suas vidas para acabar com traidores e apóstatas e devolver a proeminência aos haruritas.

Agora chegou esse dia: os califados traidores caíram e, comigo no comando, os [ROOT.Char.GetFaith.GetAdherentNamePlural] retomaram a Mesopotâmia e nossos antigos locais sagrados."
 fp3_decision.0011_fanatic_murderer.desc: "Os governantes ao meu redor estão escolhendo lado, seja apoiando a unidade [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetFaith.GetReligiousHeadTitle.GetName|l], seja afirmando sua independência.

Embora, por enquanto, eu não tenha me decidido, mudar minha posição é algo simples. Só preciso anunciar se o nome [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetFaith.GetReligiousHead.GetTitledFirstName|l] será lido no começo ou no fim da oração de sexta-feira, diante [ROOT.Char.Custom('ES_DosDas')] [ROOT.Char.Custom('LevyMenWomen')] do domínio, que se reúnem em seus [ROOT.Char.GetFaith.HouseOfWorshipPlural] locais.

"
 fp3_decision.0011_unfanatic_unmurderer.desc: "Não há dúvida de que meu [ROOT.Char.GetLiege.GetTitledFirstName|l] espera que eu siga seus passos nesta questão."
 fp3_decision.0011.a: "Por sorte, isso me coloca em perfeita sintonia com meu suserano[ROOT.Char.GetLiege.Custom('ES_XA')], [ROOT.Char.GetLiege.Custom('ES_ElLa')] [ROOT.Char.GetLiege.GetTitledFirstName|l], que compartilha minhas novas crenças."
 fp3_decision.0012.t: "Ainda assim, é preocupante que meu senhor[ROOT.Char.GetLiege.Custom('ES_XA')], [ROOT.Char.GetLiege.Custom('ES_ElLa')] [ROOT.Char.GetLiege.GetTitledFirstName|l], não compartilhe minha posição e provavelmente veja minha nova postura com maus olhos."
 fp3_decision.0012.desc: "Embora seja de grande importância para mim e [ROOT.Char.GetFaith.GetReligiousHead.Custom('ES_ElLa')] [ROOT.Char.GetFaith.GetReligiousHead.GetTitledFirstNameNoTooltip|l], duvido que ao meu suserano[ROOT.Char.GetLiege.Custom('ES_XA')], [ROOT.Char.GetLiege.Custom('ES_ElLa')] [ROOT.Char.GetLiege.GetTitledFirstName|l], importe muito a política interna sunita."
 fp3_decision.0012.a: "Eu apoio meu [ROOT.Char.GetFaith.GetReligiousHead.GetTitleAsNameNoTooltip|l], mas não meu [ROOT.Char.GetLiege.GetTitleAsNameNoTooltip|l]."
 fp3_decision.0012.b: "Seu nome é lido no lugar de [ROOT.Char.Custom2('YourCharacterIntroduction', ROOT.Char.GetLiege)]"
 fp3_decision.0013.t: "[ROOT.Char.GetFaith.GetReligiousHead.Custom('ES_ElLa')|U] [ROOT.Char.GetFaith.GetReligiousHead.GetTitledFirstNameNoTooltip] tem minha lealdade!"
 fp3_decision.0013.desc: "[hof_emissary.Custom('ES_ElLa')|U] enviad[hof_emissary.Custom('ES_OA')] [ROOT.Char.GetFaith.GetReligiousHeadTitle.Custom('ES_DelDela')] [ROOT.Char.GetFaith.GetReligiousHeadTitle.GetName|l], [hof_emissary.GetName], parece bastante desgostad[hof_emissary.Custom('ES_OA')], o que talvez dê alguma pista sobre os próprios sentimentos [righteous_caliph.Custom('ES_DelDela')] [righteous_caliph.GetTitledFirstName|l] sobre este assunto.

"Seu lugar é em [ROOT.Char.GetFaith.GetReligiousHead.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], não em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 fp3_decision.0013.a: "Talvez meu nome devesse substituir o de meu suserano[ROOT.Char.GetLiege.Custom('ES_XA')]…"
 fp3_decision.0013.b: "$fp3_decision.0015.a.tt$"
 fp3_decision.0014.t: "Fiz algo audacioso aqui."
 fp3_decision.0014_opening.desc: "Vassalo Despreza sua Suserania"
 fp3_decision.0014_there_is_caliph.desc: "Ao Comandante dos Fiéis,"
 fp3_decision.0014_no_caliph.desc: "Seria uma honra reconhecer seu reinado abençoado e virtuoso sobre este mundo."
 fp3_decision.0014.a: "Que [recipient.GetFaith.HighGodName] abençoe seus esforços contra aqueles rebeldes malvados que ameaçam seu domínio."
 fp3_decision.0014.b: "Esplêndido."
 promote_persian_scripture_cannot_take_decision.tt: "Embora eu o reconheça como meu [recipient.GetFaith.ReligiousHeadName|l] legítim[recipient.Custom('ES_OA')], não posso atender às suas exigências."
 pledged_to_not_promote_persian_desc: "Descrente perverso!"
 fp3_decision.0015.t: "Abraçar o Zoroastrismo"
 fp3_decision.0015.desc.switch.supporter_becoming_detractor: "Proclamei que, de agora em diante, em minhas terras o nome [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetFaith.GetReligiousHead.GetTitledFirstName|l] será lido por último na oração de sexta-feira, quando tod[ROOT.Char.Custom('ES_OA')]s [ROOT.Char.Custom('ES_OsAs')] [ROOT.Char.Custom('LevyMenWomen')] do senhorio estiverem reunidos em seus [ROOT.Char.GetFaith.HouseOfWorshipPlural] locais.

Este claro sinal de separatismo certamente enfurecerá os lacaios que deixo para trás, mas quem se importa com as opiniões de bajuladores?

"
 fp3_decision.0015.desc.switch.detractor_becoming_supporter: "Proclamei que, daqui em diante, em minhas terras, o nome [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetFaith.GetReligiousHead.GetTitledFirstName|l] será lido em primeiro lugar durante a oração de sexta-feira.

Como este é o momento em que [ROOT.Char.Custom('LevyMenWomen')] do reino se reúnem em seus [ROOT.Char.GetFaith.HouseOfWorshipPlural] locais para o culto, isso deve servir como um claro sinal da minha submissão voluntária e apoio à unidade do califado.

"
 fp3_decision.0015.desc.switch.presently_neutral: "Os governantes ao meu redor estão escolhendo lado, seja apoiando a unidade [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetFaith.GetReligiousHeadTitle.GetName|l], seja afirmando sua independência.

Embora, por enquanto, eu não tenha me decidido, mudar minha posição é algo simples. Só preciso anunciar se o nome [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetFaith.GetReligiousHead.GetTitledFirstName|l] será lido no começo ou no fim da oração de sexta-feira, diante [ROOT.Char.Custom('ES_DosDas')] [ROOT.Char.Custom('LevyMenWomen')] do domínio, que se reúnem em seus [ROOT.Char.GetFaith.HouseOfWorshipPlural] locais.

"
 fp3_decision.0015.desc.liege.presently_neutral: "Meu [trial_by_combat_trial|lE] contra [recipient.GetFirstNameNoTooltip] foi invalidado"
 fp3_decision.0015.desc.liege.aligning: "Meu [trial_by_combat_trial|lE] contra [actor.GetFirstNameNoTooltip] foi invalidado"
 fp3_decision.0015.desc.liege.contradicting: "Que vença [actor.Custom('ES_ElLa')] melhor."
 fp3_decision.0015.desc.liege.fallback: "O [single_combat_duel|lE] começa!"
 fp3_decision.0015.a: "Machucad[actor.Custom('ES_OA')] e maltratad[actor.Custom('ES_OA')], [actor.GetFirstName] acabou entendendo que foi uma loucura me desafiar como líder da nossa casa.\n\nO desafio do meu irresolut[actor.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('actor'))] só serviu para demonstrar meu valor como líder tanto da casa [ROOT.Char.GetHouse.GetBaseName] quanto de meus súditos."
 fp3_decision.0015.a.tt: "Por fim [actor.GetFirstName] jaz morto[actor.Custom('ES_OA')], junto com suas ambições destrutivas e malignas.\n\nO desafio do meu irresolut[actor.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('actor'))] só serviu para demonstrar meu valor como líder tanto da casa [ROOT.Char.GetHouse.GetBaseName] como de meus súditos."
 fp3_decision.0015.b: "Exausto[ROOT.Char.Custom('ES_OA')] , ergo o rosto de [actor.GetFirstName]. O olhar triunfante do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('actor'))] me confirma o que eu já sabia: falhei…\n\n\"Enfim, nossa casa terá um líder forte\", suspira. \"Sou eu quem deve assumir os encargos da casa [ROOT.Char.GetHouse.GetBaseName]\".\n\nNão há dúvida alguma, [actor.GetFirstNameNoTooltip] demonstrou minha fraqueza perante a corte…"
 fp3_decision.0015.c: "Eu não fui forte o suficiente."
 fp3_decision.0015.c.tt: "Um líder deve manter seu rebanho sob controle."
 fp3_decision.0015.d: "Meu(a) [SCOPE.sC('recipient').Custom2('RelationToMeShort', SCOPE.sC('actor'))] [ROOT.Char.GetFirstNameNoTooltip],"
 fp3_decision.0015.e: "Você está claramente despreparado para assumir os fardos de liderar a Casa [ROOT.Char.GetHouse.GetBaseName].\n\nDevo recusar seu desafio equivocado, pelo bem da família."
 fp3_decision.0015.e.tt: "Eventualmente, você será forçado a me reconhecer!"
 fp3_decision.0015.f: "Seu tolo desprezo não será esquecido."
 fp3_decision.0015.vassal_semi_rebel: "Quando chego a [duel_location.GetBaseNameNoTierNoTooltip], minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('recipient'))] [recipient.Custom('ES_ElLa')], [recipient.GetTitledFirstName|l] me espera calmamente. Abraça-me diante da corte, reconhecendo todos os protocolos da nossa casa.\n\nSorri friamente, "Vem, [recipient.Custom2('RelationToMeShort', SCOPE.sC('actor'))], ouçamos o que tens a dizer".\n\n[recipient.GetFirstNameNoTooltip] pede alguns refrescos enquanto tomamos nossos assentos, antes de se voltar para mim com expectativa."
 fp3_misc_decisions.0010.opening: "Quando chego a [duel_location.GetBaseNameNoTierNoTooltip], meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('recipient'))], [recipient.Custom('ES_ElLa')] [recipient.GetTitledFirstName|l], me aguarda calmamente. Nos abraçamos, reconhecendo as formalidades de nossa casa.\n\n[recipient.GetSheHe|U] sorri levemente, "Venha, [recipient.Custom2('RelationToMeShort', SCOPE.sC('actor'))], vamos ouvir o que você tem a dizer."\n\n[recipient.GetFirstNameNoTooltip] pede refrescos enquanto nos sentamos, antes de se voltar para mim com expectativa."
 fp3_misc_decisions.0010.desc_intro: "Por onde começar..."
 fp3_misc_decisions.0010.desc_struggle: "As conversas começam!"
 fp3_misc_decisions.0010.a: "Começo com a história da casa [actor.GetHouse.GetBaseName] e os feitos de [actor.GetHouse.GetFounder.Custom('ES_DelDela')] [actor.GetHouse.GetFounder.GetTitledFirstName|l], avançando lentamente até os dias de hoje.\n\n[recipient.GetFirstName] escuta pacientemente, assentindo de vez em quando enquanto resumo as ameaças que nossa família enfrenta e como combatê-las.\n\nQuando termino, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('recipient'))] diz calmamente: "Sim, sim, muito bom. Mas por que #EMP vós#! deveis liderar nossa família em meu lugar?""
 fp3_misc_decisions.0011.desc: "Começo com a história da casa [actor.GetHouse.GetBaseName] e os feitos de nossos antepassados, avançando lentamente até os dias de hoje.\n\n[recipient.GetFirstName] escuta pacientemente, acenando de vez em quando enquanto resumo as ameaças que nossa família enfrenta e como combatê-las.\n\nQuando termino, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('recipient'))] diz calmamente, "Sim, sim, muito bem. Mas por que #EMP vós#! deveis liderar nossa família em vez de mim?"."
 fp3_misc_decisions.0011.a: "Olhe para a sua saúde, posso assumir o seu fardo."
 fp3_misc_decisions.0015.t: "Esta opção está disponível porque [recipient.GetSheHe] tem a saúde ruim [health|lE]"
 fp3_misc_decisions.0015.desc: "Agora é a hora da próxima geração conduzir nossa família."
 fp3_misc_decisions.0015.a: "Esta opção está disponível porque [recipient.GetSheHe] é muito mais velh[recipient.Custom('ES_OA')] que você"
 fp3_misc_decisions.0015.b: "Você ainda é jovem e inexperiente, com muito a aprender."
 fp3_misc_decisions.0015.c: "Esta opção está disponível porque [recipient.GetSheHe] é mais jovem que você"
 fp3_misc_decisions.0020.t: "[recipient.GetSheHe|U] deve estar com saúde fraca, ou ser um pouco mais velh[recipient.Custom('ES_OA')] ou mais jovem que você"
 fp3_misc_decisions.0020.desc.a: "Como súdito[recipient.Custom('ES_OA')] de [actor.GetPrimaryTitle.GetBaseNameNoTierNoTooltip], ouça-me."
 fp3_misc_decisions.0020.desc.a.lethal: "
[recipient.GetFirstName], essa mancha no nome da nossa família, morreu, e meu direito à liderança da casa é incontestável.
A força por si só não me tornou dign[ROOT.Char.Custom('ES_OA')]; no fim, foi minha determinação de conduzir a Casa de [ROOT.Char.GetHouse.GetBaseName] à grandeza — já que minha indecis[recipient.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('recipient'))] jamais conseguiu — que me fez vencer."
 fp3_misc_decisions.0020.desc.b: "Somente eu tenho a força para defender nossa casa."
 fp3_misc_decisions.0020.lose.a: "Esta opção está disponível porque o exército é consideravelmente menor"
 fp3_misc_decisions.0020.lose.b: "Você realmente quer ficar do meu lado ruim?"
 fp3_misc_decisions.0020.win.a: "Esta opção está disponível porque [recipient.GetSheHe] se sente intimidado[recipient.Custom('ES_OA')] por você"
 fp3_misc_decisions.0020.win.b: "Você deve ser seu [liege|lE] maior, ter um [rank|lE] maior, ter um exército consideravelmente maior ou ser [dreadful|lE]"
 fp3_misc_decisions.0022.t: "[recipient.GetFirstNameNoTooltip] aceita o seu argumento"
 fp3_misc_decisions.0022.desc.intro: "[recipient.GetFirstNameNoTooltip] quer algo em troca"
 fp3_misc_decisions.0022.desc.body: "[recipient.GetFirstName] fará uma exigência"
 fp3_misc_decisions.0022.trigger_failure.actor: "[recipient.GetFirstNameNoTooltip] rejeita o seu argumento"
 fp3_misc_decisions.0022.trigger_failure.recipient: "Perdoe-me, mas você #EMP sabe#! que eu sou mais capaz."
 fp3_misc_decisions.0022.a: "Suas [skills|lE] combinadas devem ser maiores que as deles"
 fp3_misc_decisions.0022.a.tt: "Esta opção está disponível porque suas [skills|lE] combinadas são maiores que as de [recipient.GetFirstNameNoTooltip]"
 fp3_misc_decisions.0023.desc.a: "Venha, [recipient.GetFirstNameNoTooltip], afaste-se."
 fp3_misc_decisions.0023.desc.a.lethal: "[actor.GetFirstName] chegou a [duel_location.GetBaseNameNoTierNoTooltip] para explicar sua lógica falaciosa para assumir a liderança da casa [actor.GetHouse.GetBaseName]. Sou educad[ROOT.Char.Custom('ES_OA')] o suficiente para abraç[actor.GetHerHim] antes das conversas.\n\n[actor.GetFirstNameNoTooltip] fala sobre a história de nossa casa, desde os dias [actor.GetHouse.GetFounder.Custom('ES_DelDela')] [actor.GetHouse.GetFounder.GetTitledFirstName|l] até o presente, e espero pacientemente pelo cerne de seu argumento.\n\nE, por fim, ele chega: "[actor.Custom2('RelationToMeShort', SCOPE.sC('recipient'))|U]…"
 fp3_misc_decisions.0023.desc.b: "[actor.GetFirstName] chegou a [duel_location.GetBaseNameNoTierNoTooltip] para apresentar sua lógica falaciosa para assumir o comando como líder da Casa [actor.GetHouse.GetBaseName]. Sou educado o bastante para abraçá-lo antes das conversas.\n\nFala sobre a história de nossa casa, desde os dias dos ancestrais distantes até o presente, e aguardo pacientemente o ponto crucial de seu argumento.\n\nE, por fim, vem: "[actor.Custom2('RelationToMeShort', SCOPE.sC('recipient'))|U]…"
 fp3_misc_decisions.0023.lose.a: "$fp3_misc_decisions.0027.a.sick$\" Então é a minha saúde que está em questão... $fp3_misc_decisions.0028.perhaps$"
 fp3_misc_decisions.0023.win.a: "$fp3_misc_decisions.0027.a.old$\" Então é a minha idade que está em questão... $fp3_misc_decisions.0028.perhaps$"
 fp3_misc_decisions.0025.t: "$fp3_misc_decisions.0027.a.young$\" Então é a minha juventude que está em questão... $fp3_misc_decisions.0028.perhaps$"
 fp3_misc_decisions.0025.desc: "$fp3_misc_decisions.0027.b.vassal$\" Não posso negar isso. $fp3_misc_decisions.0028.perhaps$"
 fp3_misc_decisions.0025.a: "$fp3_misc_decisions.0027.b.tier$\" Não posso negar isso. $fp3_misc_decisions.0028.perhaps$"
 fp3_misc_decisions.0025.b: "$fp3_misc_decisions.0027.b.military$\" Não posso negar isso. $fp3_misc_decisions.0028.perhaps$"
 fp3_misc_decisions.0026.desc: "$fp3_misc_decisions.0027.b.dread$\" A audácia! Embora... $fp3_misc_decisions.0028.perhaps$"
 fp3_misc_decisions.0026.desc.no_court: "$fp3_misc_decisions.0027.c$".\n\nNão sou tão incompetente assim! Sou...?"
 fp3_misc_decisions.0026.a: "$fp3_misc_decisions.0027.a.sick$". Isso é realmente tudo o que tinha a dizer?"
 fp3_misc_decisions.0026.a.tt: "Talvez esteja certa."
 fp3_misc_decisions.0027.desc: "Se [actor.GetShortUIName] aceitar:"
 fp3_misc_decisions.0027.desc.founder: "Você está certo, #EMP você#! deveria liderar nossa casa."
 fp3_misc_decisions.0027.a.sick: "Muito bem, mas eu gostaria de permanecer em uma posição consultiva."
 fp3_misc_decisions.0027.a.sick.tt: "Um líder digno certamente terá os fundos para respaldar suas palavras."
 fp3_misc_decisions.0027.a.old: "Talvez você possa assumir, mas quero a sua garantia."
 fp3_misc_decisions.0027.a.old.tt: "Não, eu não acho."
 fp3_misc_decisions.0027.a.young: "[recipient.GetFirstName] reflete sobre minhas palavras, estudando meu rosto com atenção enquanto a corte murmura ao nosso redor. Depois do que parece uma eternidade,"
 fp3_misc_decisions.0027.a.young.tt: "[recipient.GetFirstName] reflete sobre minhas palavras, estudando meu rosto atentamente enquanto a sala murmura ao nosso redor. Depois do que parece uma eternidade,"
 fp3_misc_decisions.0027.a.trigger: "assente.\n\n\"Sim. Talvez você esteja certo\", diz pensativamente[recipient.Custom('ES_OA')]. \"A partir de hoje, você será o chefe da casa [actor.GetHouse.GetBaseName]. Que [recipient.GetFaith.HighGodName] o guie a você e à nossa casa\"."
 fp3_misc_decisions.0027.b.vassal: "senta-se.\n\n"Talvez eu esteja dispost[recipient.Custom('ES_OA')] me afastar", diz cuidadosamente. "Se me dessem um lugar no governo de [actor.GetPrimaryTitle.GetBaseNameNoTooltip]...""
 fp3_misc_decisions.0027.b.vassal.tt: "ergue uma sobrancelha.\n\n"Talvez eu esteja dispost[recipient.Custom('ES_OA')] a sair de lado", diz cuidadosamente. "Se antes puder provar que você tem riqueza suficiente para cuidar da nossa casa…""
 fp3_misc_decisions.0027.b.tier: "sorri.\n\n“Eu poderia estar dispost[recipient.Custom('ES_OA')] me afastar”, diz com cautela. “Se você pudesse garantir que seria meu amigo…”."
 fp3_misc_decisions.0027.b.tier.tt: "franze a testa.\n\n"Não. Seus argumentos são fracos", diz com desdém. "Como chefe[recipient.Custom('ES_EA')] legítim[recipient.Custom('ES_OA')] da casa [actor.GetHouse.GetBaseName], peço que esqueçam essa ideia ridícula"."
 fp3_misc_decisions.0027.b.military: "Farei o meu melhor."
 fp3_misc_decisions.0027.b.military.tt: "Muito bem, será feito."
 fp3_misc_decisions.0027.b.dread: "O destino de nossa família não deve ser negociado."
 fp3_misc_decisions.0027.b.dread.tt: "O tolo #EMP aprenderá#! o meu valor, de uma forma ou de outra."
 fp3_misc_decisions.0027.b.trigger: "[recipient.GetFirstName] pondera cuidadosamente minha proposta, me sondando com o olhar.\n\n"
 fp3_misc_decisions.0027.accept: "Finalmente suspira, "Muito bem, [house_challenger.Custom2('RelationToMeShort', SCOPE.sC('house_head'))] , você terá o que deseja"."
 fp3_misc_decisions.0027.bargain: "Finalmente nega com a cabeça e diz, com certo desprezo: "O destino de nossa família não é algo a ser barganhado!"."
 fp3_misc_decisions.0027.bargain.tt: "Muito bem!"
 fp3_misc_decisions.0027.reject: "Então não há mais nada a discutir..."
 fp3_misc_decisions.0027.c: "Quando [house_head.GetFirstName] se vira para sair, seu rosto contorcido de desprezo, eu aproveito minha chance.\n\n"
 fp3_misc_decisions.0027.c.trigger: "[house_head.Custom('ES_ElLa')|U] tolo mal percebe minha rápida aproximação e mal reage quando enfio minha adaga em seu peito.

Quando olha para baixo, sem entender, me aproximo e sussurro: "A Casa [ROOT.Char.GetHouse.GetBaseNameNoTooltip] é #bold #EMP MINHA!#!#!", antes de arrancar a lâmina de seu ventre de um puxão."
 fp3_misc_decisions.0027.c.tt: "[Select_CString( house_head.IsFemale, 'A velhaca', 'O velhaco' )] se afasta a tempo de desviar minha adaga, gritando por seus guardas! Não consigo encurralar [house_head.GetHerHim] antes que eles caiam sobre mim, prendendo-me com força ao chão.

Meu [house_challenger.Custom2('RelationToMeShort', SCOPE.sC('house_head'))] se ergue sobre mim e rosna: "Joguem esta serpente nas masmorras!"."
 fp3_misc_decisions.0027.d: "É preciso astúcia para liderar uma casa, [house_challenger.Custom2('RelationToMeShort', SCOPE.sC('house_head'))]!"
 fp3_misc_decisions.0028.desc: "Você pagará por isso!"
 fp3_misc_decisions.0028.desc.founder: "Quando me viro para deixar o desacreditad[house_challenger.Custom('ES_OA')] com seus pensamentos perversos, capto um brilho de relance pelo canto do olho."
 fp3_misc_decisions.0028.sick: "$fp3_misc_decisions.0042.intro$\n\nDesvio-me a tempo de seu punhal desgovernado e chamo meus guardas.\n\n[house_challenger.GetSheHe|U] fica logo imobilizad[house_challenger.Custom('ES_OA')] no chão, contorcendo-se e gritando: "A casa [ROOT.Char.GetHouse.GetBaseNameNoTooltip] é #bold #EMP MÍA!#!#!"."
 fp3_misc_decisions.0028.old: "Jogue esta serpente nas masmorras!"
 fp3_misc_decisions.0028.young: "$fp3_misc_decisions.0042.intro$\n\nEsse demônio está diante de mim, com um brilho maligno no olhar, braço estendido, punho agarrando uma empunhadura…\n\nAproxima-se de mim e sussurra: "A Casa [ROOT.Char.GetHouse.GetBaseNameNoTooltip] é #bold #EMP MÍA!#!#!", antes de arrancar a lâmina do meu ventre de um puxão."
 fp3_misc_decisions.0028.vassal: "#DIE1 [house_head.Custom2('RelationToMeShort', SCOPE.sC('house_challenger'))|U]…#!"
 fp3_misc_decisions.0028.tier: "Costumes da Casa"
 fp3_misc_decisions.0028.military: "Agora vejo que os laços familiares são a chave mais importante para um governo justo e estável.\n\nSeguindo o exemplo [ROOT.Char.GetHouse.GetHeadOfHouse.Custom('ES_DelDela')] [ROOT.Char.GetHouse.GetHeadOfHouse.GetTitledFirstName|l], ordenei que o governo de [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] fosse reorganizado segundo as linhas de [ROOT.Char.GetHouse.GetBaseName]."
 fp3_misc_decisions.0028.dread: "A família vem primeiro!"
 fp3_misc_decisions.0028.skill: "[attacker.Custom2('AppropriateGreeting', ROOT.Char)]"
 fp3_misc_decisions.0028.fallback: "O fim da traição de vosso senhor[defender.Custom('ES_XA')], [defender.Custom('ES_ElLa')] [defender.GetTitledFirstName|l], contra seu califa legítimo está próximo.\n\nComo partidári[ROOT.Char.Custom('ES_OA')] leal, cuidarei para que assumais o trono de [defender.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] em seu lugar."
 fp3_misc_decisions.0028.perhaps: "De fato?"
 fp3_misc_decisions.0028.bargain.tt: "O fim da sua traição contra o seu legítimo califa está próximo.\n\nÉ hora de que [loyalist_puppet.Custom('ES_ElLa')] [loyalist_puppet.GetTitledFirstName|l], um[loyalist_puppet.Custom('ES_XA')] partidári[loyalist_puppet.Custom('ES_OA')] leal, governe [defender.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] em seu lugar."
 fp3_misc_decisions.0028.a: "Sobre o meu cadáver!"
 fp3_misc_decisions.0028.b: "Por fim, [Select_CString( defender.IsFemale, 'la traidora', 'el traidor' )] [defender.GetTitledFirstName|l] foi derrotad[defender.Custom('ES_OA')] e [defender.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] volta a estar nas mãos de um apoiador leal do califa.\n\nQue vosso reinado seja longo e abençoado!"
 fp3_misc_decisions.0028.c: "Viva!"
 fp3_misc_decisions.0028.d: "[attacker.GetTitledFirstName] agora é seu [ally|lE]"
 fp3_misc_decisions.0028.e: "Guerra para Instalar Apoiador Leal"
 fp3_misc_decisions.0029.desc: "$install_loyalist_puppet_declared_puppet$"
 fp3_misc_decisions.0029.desc.no_court: "$install_loyalist_puppet_declared_puppet$"
 fp3_misc_decisions.0029.accept: "Tal como eu pensava, não importa o quanto a ideia escandalize alguns nobres do reino, há talento a ser explorado nos pequenos cargos e ministérios menores de [ROOT.Char.GetPrimaryTitle.GetDefinitiveName].\n\nOs candidatos à promoção podem ser facilmente reduzidos a apenas dois grupos: de um lado, [batch_a_char1.GetFirstName], [batch_a_char2.GetFirstName] e [batch_a_char3.GetFirstName], e do outro, [batch_b_char1.GetFirstName] e [batch_b_char2.GetFirstName].\n\n"
 fp3_misc_decisions.0029.regent: "senta-se.\n\n"Talvez eu esteja dispost[recipient.Custom('ES_OA')] me afastar", diz cuidadosamente. "Se me dessem um lugar no governo de [actor.GetPrimaryTitle.GetBaseNameNoTooltip]...""
 fp3_misc_decisions.0029.gold: "Todos provêm da população [batch_a_county.GetProvince.GetCounty.GetCulture.GetName] de [batch_a_county.GetBaseNameNoTier], e o grupo de [batch_a_char1.GetFirstNameNoTooltip] é capaz, mas talvez lhe falte um pouco de educação refinada, enquanto [batch_b_char1.GetFirstNameNoTooltip] e seu colega são um pouco mais refinados, mas são apenas dois."
 fp3_misc_decisions.0029.hook: "O grupinho de [batch_a_char1.GetFirstNameNoTooltip] vem dos [batch_a_county.GetProvince.GetCounty.GetCulture.GetCollectiveNoun] de [batch_a_county.GetBaseNameNoTier], capazes, embora um pouco menos instruídos, enquanto [batch_b_char1.GetFirstNameNoTooltip] e seu comparsa são [batch_b_county.GetProvince.GetCounty.GetCulture.GetCollectiveNoun] de [batch_b_county.GetBaseNameNoTier] e apenas #EMP algo#! mais refinados."
 fp3_misc_decisions.0029.fail: "Todos os estrangeiros que se juntarem à sua corte"
 fp3_misc_decisions.0029.a: "Você ganha um [strong_hook|lE] #WEAK ($loyalty_hook$)#! sobre eles"
 fp3_misc_decisions.0029.b: "[batch_a_char1.GetFirstNameNoTooltip] e seus companheiros serão ótimos cortesãos."
 fp3_misc_decisions.0029.c: "Estou mais impressionado com [batch_b_char1.GetFirstNameNoTooltip]..."
 fp3_misc_decisions.0029.d: "Nenhum de vocês servirá — voltem aos seus postos!"
 fp3_misc_decisions.0030.desc: "Os estrangeiros perdem a chance de se destacar"
 fp3_misc_decisions.0030.accept: "Finalmente suspira, "Muito bem, [house_challenger.Custom2('RelationToMeShort', SCOPE.sC('house_head'))] , você terá o que deseja"."
 fp3_misc_decisions.0030.reject: "Finalmente nega com a cabeça e diz, com certo desprezo: "O destino de nossa família não é algo a ser barganhado!"."
 fp3_misc_decisions.0030.a: "Muito bem!"
 fp3_misc_decisions.0030.b: "Então não há mais nada a discutir..."
 fp3_misc_decisions.0041.intro: "Quando [house_head.GetFirstName] se vira para sair, seu rosto contorcido de desprezo, eu aproveito minha chance.\n\n"
 fp3_misc_decisions.0041.desc.success: "[house_head.Custom('ES_ElLa')|U] tolo mal percebe minha rápida aproximação e mal reage quando enfio minha adaga em seu peito.

Quando olha para baixo, sem entender, me aproximo e sussurro: "A Casa [ROOT.Char.GetHouse.GetBaseNameNoTooltip] é #bold #EMP MINHA!#!#!", antes de arrancar a lâmina de seu ventre de um puxão."
 fp3_misc_decisions.0041.desc.failure: "[Select_CString( house_head.IsFemale, 'A velhaca', 'O velhaco' )] se afasta a tempo de desviar minha adaga, gritando por seus guardas! Não consigo encurralar [house_head.GetHerHim] antes que eles caiam sobre mim, prendendo-me com força ao chão.

Meu [house_challenger.Custom2('RelationToMeShort', SCOPE.sC('house_head'))] se ergue sobre mim e rosna: "Joguem esta serpente nas masmorras!"."
