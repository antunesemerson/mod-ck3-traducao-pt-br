 secret_faith.1002.t: "A Era do Conhecimento"
 secret_faith.1002.desc: "[child.Custom2('MyCharacterIntroduction', ROOT.Char)|U] está no limbo entre a infância e a idade adulta. Ensinei-lhe o suficiente para compreender a verdade, e [child.GetSheHe] ainda é jovem o bastante para ter a mente aberta.

Se eu quiser introduzir[child.Custom('ES_LoLa')] ao serviço de [ROOT.Char.GetSecretFaith.HighGodName], agora é a hora ou nunca."
 secret_faith.1002.a: "Conhecimento Oculto"
 secret_faith.1002.b: "Há certas coisas que [guardian.Custom2('MyCharacterIntroduction', ROOT.Char)] me contou das quais ninguém mais fala. Nunca nos aprofundamos nesses assuntos e sei que o melhor é não fazer perguntas. 

No entanto, nesta noite, algo parece diferente entre nós. Quando nos sentamos para ler, [guardian.GetSheHe] pergunta se tenho curiosidade sobre algo..."
 secret_faith.1003.t: "Sim, me conte tudo! Por favor!"
 secret_faith.1003.desc: "Há certas coisas que [guardian.Custom2('MyCharacterIntroduction', ROOT.Char)] me contou das quais ninguém mais fala. Nunca nos aprofundamos nesses assuntos e sei que o melhor é não fazer perguntas. 

No entanto, nesta noite, algo parece diferente entre nós. Quando nos sentamos para ler, [guardian.GetSheHe] pergunta se tenho curiosidade sobre algo..."
 secret_faith.1003.a: "Sim, me conte tudo! Por favor!"
 secret_faith.1003.b: "Não, acho que não..."
 secret_faith.1003.c: "Isso é blasfêmia!"
