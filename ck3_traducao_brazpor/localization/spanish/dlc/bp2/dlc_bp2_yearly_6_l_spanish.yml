 bp2_yearly.6001.opening: "[childs_host.Custom2('AppropriateGreeting', ROOT.Char)]"
 bp2_yearly.6001.desc: "Ter sob meus cuidados[hosted_child.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hosted_child'))] [hosted_child.GetName] foi-me revelada uma lamentável verdade: pouco vos importam as virtudes tradicionais da cultura [ROOT.Char.GetCulture.GetNameNoTooltip]. Os pirralhos que não sabem nada dos nossos costumes se tornam em"
 bp2_yearly.6001.desc.insult.bellicose: "fracos"
 bp2_yearly.6001.desc.insult_bureaucratic: "vagabundos"
 bp2_yearly.6001.desc.insult.communal: "vadios"
 bp2_yearly.6001.desc.insult.courtly: "brutos"
 bp2_yearly.6001.desc.insult.egalitarian: "desordeiros"
 bp2_yearly.6001.desc.insult.spiritual: "hereges"
 bp2_yearly.6001.desc.insult.stoic: "vilões"
 bp2_yearly.6001.desc.outro: "em sua corte.\n\nTodos os líderes de nosso povo sabem disso. Eu me certifiquei disso."
 bp2_yearly.6001.a: "He de responder a esto! Debemos demostrarle que se equivoca!"
 bp2_yearly.6001.a.tt: "Os educadores de minha corte precisam de uma conversa séria sobre valores."
 bp2_yearly.6001.b: "Vou agir como eu quiser."
 bp2_yearly.6001.b.tt: "Não sou [ROOT.Char.Custom('ES_ElLa')] típico[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetCulture.GetNameNoTooltip], mas posso ser um excepcional."
 enforcing_cultural_values_modifier: "Impondo Valores Culturais"
 enforcing_cultural_values_modifier_desc: "Este personagem exige incessantemente que as tradições de sua cultura sejam seguidas."
 rejecting_bellicose_ways_modifier: "Rejeitando os Modos Belicosos"
 rejecting_bellicose_ways_modifier_desc: "\"Tradição? Que tolo tem algum respeito por nossas tradições?\""
 rejecting_bureaucratic_ways_modifier: "Rejeitando os Modos Burocráticos"
 rejecting_bureaucratic_ways_modifier_desc: "$rejecting_bellicose_ways_modifier_desc$"
 rejecting_communal_ways_modifier: "Rejeitando os Modos Comunais"
 rejecting_communal_ways_modifier_desc: "$rejecting_bellicose_ways_modifier_desc$"
