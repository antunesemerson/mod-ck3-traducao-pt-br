l_spanish:
 bp2_yearly.6000.t: "Não do Jeito [ROOT.Char.GetCulture.GetNameNoTooltip]"
 bp2_yearly.6000.desc.intro: "Quando meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hosted_child'))] [hosted_child.GetName] se apresenta, [tutor.GetName] narra uma semana de ensinamentos fracassados e frustrações."
 bp2_yearly.6000.desc.fault.bellicose: "\n\n\"Nunca foi dito a est[hosted_child.Custom('ES_EA')] [hosted_child.Custom('GirlBoy')] que, se quiser algo, precisa #EMP tomá-lo#!! [hosted_child.GetFirstNameNoTooltip] escolhe a paz com os outros meninos em vez de provar a si mesm[hosted_child.Custom('ES_OA')]! É tudo o que sabe!\""
 bp2_yearly.6000.desc.fault.bureaucratic: "\n\n\"[Select_CString( hosted_child.IsFemale, 'Esta menina', 'Este menino' )] é uma catástrofe ambulante. Passa os dias sonhando acordad[hosted_child.Custom('ES_OA')]. Não distingue a roupa íntima limpa da suja. O único que conhece é o caos!\"."
 bp2_yearly.6000.desc.fault.communal: "\n\n\"[Select_CString( hosted_child.IsFemale, 'Esta menina', 'Este menino' )] fala mal da própria mãe. Nunca foi advertida contra isso. Foi deixad[hosted_child.Custom('ES_LeLa')] foi deixado a agir por conta própria, sem se importar com os parentes que [hosted_child.GetHerHim] esperavam\"."
 bp2_yearly.6000.desc.fault.courtly: "\n\n\"A [Select_CString( hosted_child.IsFemale, 'esta menina', 'este menino' )] não foi ensinado nada sobre refinamento! Preciso bater na cabeça dele para que se curve diante de você, ó meu [ROOT.Char.GetTitleAsNameNoTooltip|l]. Sabe recitar versos? Falar com elegância com o outro sexo? Não!\"."
 bp2_yearly.6000.desc.fault.egalitarian: "\n\n\"Nunca lhe ensinaram respeito pelos povos que compartilham nossa terra. [Select_CString( hosted_child.IsFemale, 'Esta menina', 'Este menino' )] imitou o sotaque de um dignitário da nação [realm_minority.GetNameNoTooltip] berrando como uma ovelha! É essa a educação dele?!\"."
 bp2_yearly.6000.desc.fault.egalitarian_no_culture: "\n\n\"Nunca foi ensinado a respeitar os povos que compartilham nossa terra. [Select_CString( hosted_child.IsFemale, 'Esta menina', 'Este menino' )] imita suas línguas berrando como uma ovelha! Isso é educação?!\"."
 bp2_yearly.6000.desc.fault.spiritual: "\n\nFaz [Select_CString( hosted_child.IsFemale, 'esta menina', 'este menino' )] uma pausa para mostrar gratidão pela providência da sua comida? Invoca o divino em busca de ajuda? Não! Foi criad[hosted_child.Custom('ES_OA')] para uma vida sem respeito."
 bp2_yearly.6000.desc.fault.stoic: "\n\n\"[Select_CString( hosted_child.IsFemale, 'Esta menina', 'Este menino' )] franze o nariz diante da beleza de nossa pátria. Despreza a necessidade de se impor, de lutar… de defender nosso povo! Só lhe ensinaram um egoísmo choramingas\"."
 bp2_yearly.6000.desc.mid: "\n\nA ira de [tutor.GetFirstNameNoTooltip] se dirige contra [childs_home_liege.Custom('ES_ElLa')] [hosted_child.Custom2('RelationToMeShort', SCOPE.sC('childs_home_liege'))] de [Select_CString( hosted_child.IsFemale, 'esta criança', 'este menino' )].\n\nHá algo de"
 bp2_yearly.6000.desc.value.bellicose: "fogo e ardor"
 bp2_yearly.6000.desc.value.bureaucratic: "bom senso"
 bp2_yearly.6000.desc.value.communal: "amor pela parentela"
 bp2_yearly.6000.desc.value.courtly: "consideração por maneiras nobres"
 bp2_yearly.6000.desc.value.egalitarian: "graça social"
 bp2_yearly.6000.desc.value.spiritual: "respeito por nossos rituais sagrados"
 bp2_yearly.6000.desc.value.stoic: "senso de dever para com o seu povo"
 bp2_yearly.6000.desc.outro: "em [childs_home_liege.Custom('ES_ElLa')] [childs_home_liege.GetTitledFirstName|l]? Como pode uma juventude verdadeiramente [ROOT.Char.GetCulture.GetNameNoTooltip] surgir de uma corte assim, onde nada lhes é ensinado sobre nossas tradições?\""
 bp2_yearly.6000.a: "Todos conhecerão o desprezo [childs_home_liege.Custom('ES_DelDela')] [childs_home_liege.GetTitleAsNameNoTooltip|l]!"
 bp2_yearly.6000.a.tt: "Defende a causa de [hosted_child.Custom('ES_DelDela')] pobre e jovem [hosted_child.GetFirstNameNoTooltip], vítima da apatia de seu [hosted_child.Custom2('RelationToMeShort', SCOPE.sC('childs_home_liege'))] para com nossos costumes."
 bp2_yearly.6000.a.response: "[childs_home_liege.GetShortUIName] pode perder [opinion|lE] com os colegas [childs_home_liege.GetCulture.GetCollectiveNounNoTooltip]"
 bp2_yearly.6000.b: "Eu mesmo corrigirei [hosted_child.Custom('ES_AlAla')] criança[hosted_child.Custom('ES_OA')]."
 bp2_yearly.6000.b.success: "Nossos valores estão profundamente enraizados"
 bp2_yearly.6000.b.failure: "Alguns escrúpulos mal compreendidos são amargamente agarrados"
 bp2_yearly.6000.c: "Não me incomode com nossos malditos costumes."
 defender_of_bellicose_ways_modifier: "Defensor dos Modos Belicosos"
 defender_of_bellicose_ways_modifier_desc: "Este personagem defende resolutamente qualquer denegrimento de suas práticas culturais."
 defender_of_bureaucratic_ways_modifier: "Defensor dos Modos Burocráticos"
 defender_of_bureaucratic_ways_modifier_desc: "$defender_of_bellicose_ways_modifier_desc$"
