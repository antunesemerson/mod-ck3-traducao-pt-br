 bp2_yearly.6010.t: "Ninguém aprisionado"
 bp2_yearly.6010.desc: "\"#EMP Tenho muitos amigos, mas poucos presentes deles...#!\", canta [sad_boi.GetFirstName], com a voz embargada pela emoção.\n\nMeu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('sad_boi'))] joga seu instrumento de lado, gritando: \"Estou cansad[sad_boi.Custom('ES_OA')] de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTier]!"
 bp2_yearly.6010.adult: "Carece de todo conforto\".\n\nLança-me um olhar fulminante e acrescenta: \"Esta canção será meu apelo por ajuda para superar este infeliz cativeiro. Alguns fundos… se meu povo ainda se importa comigo…\"."
 bp2_yearly.6010.child: "Estou tão infeliz aqui.\"\n\nOlhando para mim com lágrimas nos olhos, acrescenta: \"Ouvir essa canção vai comover minha família! Eles enviarão algo para tornar meu #EMP exílio#! suportável, se... se ainda se importarem comigo...\""
 bp2_yearly.6010.outro: "\n\n[sad_boi.GetSheHe|U] retoma a melodia triste, com a saudade de casa em seus olhos."
 bp2_yearly.6010.a: "Sim, vamos ver a 'caridade' que podem oferecer..."
 bp2_yearly.6010.a.tt: "… para a minha bolsa."
 bp2_yearly.6010.b: "Infeliz?! #EMP Posso ajudar?#!"
 bp2_yearly.6010.b.tt: "Minha corte não pode ser cantada como um lugar de miséria!"
 bp2_yearly.6010.c: "Devo ensinar-lhe que este é o seu lugar."
 bp2_yearly.6010.c.tt: "Todos nós, nascidos aqui ou não, devemos suportar as dificuldades com dignidade."
 bp2_yearly.6010.c.success: "[sad_boi.GetSheHe|U] dará a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] outra chance"
 bp2_yearly.6010.c.tt_education: "O resultado da educação de [sad_boi.GetFirstName] melhorará"
 bp2_yearly.6010.c.failure: "Negar a verdade de sua letra perturba [sad_boi.GetFirstNameNoTooltip]"
 bp2_yearly.6010.d: "Uma bela composição, na verdade."
 bp2_yearly.6010.d.tt: "Que esse lamento seja cantado longa e amplamente: sua beleza importa mais do que seu conteúdo."
 bp2_yearly.6020.t: "Crianças Dizem Coisas Engraçadas"
 bp2_yearly.6020.desc: "Enquanto compartilho as últimas notícias da corte de [snitch.GetHomeCourt.GetTitledFirstName|l], meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('snitch'))] [snitch.GetName] parece estranhamente divertido[snitch.Custom('ES_OA')], com um sorriso distante"
 bp2_yearly.6020.child: "em seu rostinho.\n\n\"Tenho uma história, [ROOT.Char.GetTitleAsNameNoTooltip|l]. Um conto a partir do que vi com meus próprios olhos! Mas… não devo contar. Prometi que não contaria\".\n\n[snitch.GetFirstNameNoTooltip] ri com uma alegria travessa, deleitando-se com um raro poder sobre seus mais velhos.\n\n\"Que mal[ROOT.Char.Custom('ES_OA')]!\", grasna [snitch.GetFirstNameNoTooltip]."
 bp2_yearly.6020.youth: "em seu rosto adolescente oleoso.\n\n\"Tenho uma história, [ROOT.Char.GetTitleAsNameNoTooltip|l]: vós acabastes de me lembrar dela. Algo que nunca se deve repetir! Mas... eu era tão pequen[ROOT.Char.Custom('ES_OA')]. Agora parece que foi há tanto tempo.\"\n\n[snitch.GetFirstNameNoTooltip] ri com deleite perverso, deliciando-se com esse raro poder sobre aqueles que [snitch.GetHerHim] criaram.\n\n\"Que mal[ROOT.Char.Custom('ES_OA')]!\", grasna [snitch.GetFirstNameNoTooltip]."
 bp2_yearly.6020.liege: "\"Sempre tão sagrad[ROOT.Char.Custom('ES_OA')]..., sempre tão mal[ROOT.Char.Custom('ES_OA')]!\""
 bp2_yearly.6020.family: "\"A família pode ser tão levada!\""
 bp2_yearly.6020.a: "Continue..."
 bp2_yearly.6020.a.secret: "Você descobre um [secret|lE] guardado pela família de [snitch.GetShortUIName]"
 bp2_yearly.6020.a.non_family_secret: "Você descobre um [secret|lE] do círculo interno da [court|lE] de [no_no_doer.GetShortUIName]"
 bp2_yearly.6020.a.success: "Um conto deliciosamente sórdido"
 bp2_yearly.6020.a.failure: "Apenas imaturidade, eu suponho..."
 bp2_yearly.6020.a.no_secret: "Você não aprende nada de consequência"
 bp2_yearly.6020.b: "Uma língua solta leva à desonra."
 bp2_yearly.6020.b.tt: "[snitch.GetFirstNameNoTooltip] deveria favorecer a virtude da discrição em vez de fofocar."
 bp2_yearly.6020.b.discretion: "[snitch.GetShortUIName] é muito menos propenso a revelar seus [secrets|lE]"
 bp2_yearly.6030.t: "Olhos da Família"
 bp2_yearly.6030.desc: "Meu [snitch.Custom('ComplimentAdjective')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('snitch'))] [snitch.GetFirstName] ilumina uma manhã enevoada de caminhada, contando-me sobre seu cativeiro sob os cuidados de [warden.GetName].\n\n[snitch.GetSheHe|U] voltou muito mudad[snitch.Custom('ES_OA')]: mais sáb[snitch.Custom('ES_OA')], mais observador[snitch.Custom('ES_XA')]. Um[snitch.Custom('ES_XA')] [snitch.GetDynastyHouseName] leal, muito adaptad[snitch.Custom('ES_OA')] a viver em um lugar estrangeiro.\n\nUm[snitch.Custom('ES_XA')] [snitch.GetDynastyHouseNameNoTooltip] leal... talvez o fato de nossos familiares terem estado de olho na corte [warden.Custom('ES_DelDela')] [warden.GetTitledFirstNameNoTooltip|l] possa render algum valor...?"
 bp2_yearly.6030.hostage_reticent: "\n\nNo entanto, [snitch.GetFirstNameNoTooltip] parece #negative_value muy reaci[snitch.Custom('ES_OA')]#! em ser meu informante. Talvez até o tenham advertido contra isso."
 bp2_yearly.6030.hostage_normal: "\n\nO que, se é que algo, [snitch.GetFirstNameNoTooltip] sabe?"
 bp2_yearly.6030.a: "Posso arrancar os segredos de [warden.GetPrimaryTitle.GetNameNoTierNoTooltip]..."
 bp2_yearly.6030.maybe_secret: "#high [snitch.GetFirstName]#! #EMP puede#! compartilhar um [secret|lE] do círculo mais próximo de [warden.GetShortUIName]"
 bp2_yearly.6030.a.success: "Você aprende tudo o que [snitch.GetFirstNameNoTooltip] sabe"
 bp2_yearly.6030.a.failure: "[snitch.GetFirstNameNoTooltip] escapa das perguntas"
 bp2_yearly.6030.a.no_secret: "[snitch.GetFirstName] sabe... nada de consequência"
 bp2_yearly.6030.a.evade: "#high [snitch.GetFirstName]#! não compartilha nada útil"
 bp2_yearly.6030.b: "Pelo serviço à sua família - recompensa!"
 bp2_yearly.6030.b.tt: "Fazei com que saiba quão generosamente recompenso agentes e informantes!"
 bp2_yearly.6030.b.failure: "[snitch.GetFirstNameNoTooltip] não revela [secrets|lE]"
 bp2_yearly.6030.b.rewarded: "#high [snitch.GetFirstName]#! torna-se muito mais propenso a se juntar aos seus [schemes|lE]"
 bp2_yearly.6030.refuse_reward: "#high [snitch.GetFirstName]#! não está ajudando e não se importa"
 bp2_yearly.6030.c: "Sem honra, o período de reféns não vale nada."
 bp2_yearly.6030.c.tt: "As regras do acordo são rígidas e invioláveis."
 bp2_yearly.6030.c.honor: "[rulers|lE] são mais propensos a oferecer e exigir [hostages|lE] com você"
 bp2_yearly.6030.c.hostage_secrets: "@alert_icon! #alert_trial Você ganhará [tyranny|lE] ao pressionar [secrets|lE] de [hostages|lE]#!"
 honorable_warden_modifier: "Guardião Honroso"
 honorable_warden_modifier_desc: "Este personagem afirma oferecer dignidade inviolável aos [hostages|lE]."
 bp2_yearly.6040.t: "Tudo O Que Não Somos"
 bp2_yearly.6040.desc: "Observo os [ROOT.Char.GetCulture.GetCollectiveNoun] mais jovens de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTier] em seus estudos. Lentos para aprender, indisciplinados, brigam como seus pais.\n\nNão como os [advanced_culture.GetCollectiveNoun] do maravilhoso [childhood_location.GetCounty.GetTitle.GetNameNoTier]. Seu domínio é de ordem, grandes obras e grandes ideias. Enquanto eu"
 bp2_yearly.6040.hostage: "ficou cativo[ROOT.Char.Custom('ES_OA')]"
 bp2_yearly.6040.education: "educado"
 bp2_yearly.6040.outro: "ali, me vi iluminad[ROOT.Char.Custom('ES_OA')].\n\nVi minha gente como os primitivos que são.\n\nPoderia mudar isso. Armad[ROOT.Char.Custom('ES_OA')] com os ensinamentos da cultura [advanced_culture.GetNameNoTooltip] da minha juventude... Talvez eu devesse nos guiar pelo caminho incerto da reforma?"
 bp2_yearly.6040.a: "Meu reinado pode ser um renascimento."
 bp2_yearly.6040.a.tt: "Introduza aprendizados estrangeiros para substituir os costumes do meu povo - ou leve-os a uma glória maior."
 bp2_yearly.6040.a.reforms: "Você tenta reformar e avançar sua [culture|lE], [court|lE] e [realm|lE], seguindo o modelo [advanced_culture.GetName]"
 bp2_yearly.6040.a.warning: "@alert_icon! #alert_trial Esto será complejo y costoso. Espero que estés preparad[CHARACTER.Custom('ES_OA')].#!"
 bp2_yearly.6040.b: "Por que sequer #EMP considerar#! desafiar nossas tradições?"
 bp2_yearly.6040.b.tt: "Abraçarei nossas exquisitas maneiras [ROOT.Char.GetCulture.GetNameNoTooltip] e virarei as costas para tudo o mais!"
 bp2_yearly.6040.b.promote_culture: "A [councillor_task|lE] de [promote_culture|lE] será mais eficaz por #high 25 anos#!"
 bp2_yearly.6040.b.no_reforms: "Você não considerará essas reformas novamente"
 bp2_yearly.6040.c: "Agora não é o momento."
 bp2_yearly.6040.c.recurring: "Esse ímpeto de reforma provavelmente surgirá novamente"
 devoted_to_tradition_modifier: "Defensor da Tradição"
 devoted_to_tradition_modifier_desc: "Rejeitando a associação com estranhos, este personagem é um defensor renomado de seu povo."
 bp2_devoted_to_tradition_modifier_conversion_task_desc: "$devoted_to_tradition_modifier$"
 bp2_yearly.6050.t: "Pedra, Ferro, Argila e Taipa"
 bp2_yearly.6050.desc: "Por minhas ordens, os primeiros caminhos recém-abertos e modestos postos avançados se estendem desde [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTier] — construídos no estilo das grandes estradas, fortalezas e repartições de impostos da cultura [advanced_culture.GetName].\n\nAinda assim, minha capital não é a cintilante [childhood_location.GetCounty.GetTitle.GetNameNoTier], nem [ROOT.Char.GetPrimaryTitle.GetNameNoTier] é uma terra populosa, rica em comércio e artesanato. #EMP Ainda não.#!\n\nAo meu lado, [noble_representative.Custom('ES_ElLa')] [noble_representative.GetTitledFirstName|l] olha com desconfiança para minhas novas construções e meus arquitetos estrangeiros.\n\n\"Vós enriqueceis #EMP mercadores#! e #EMP plebeus#!\", zomba meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('noble_representative'))], \"quando vossa nobreza leal poderia estar erguendo novos salões graças à vossa generosidade!\""
 bp2_yearly.6050.a: "Minha nova e grandiosa capital prosperará!"
 bp2_yearly.6050.a.tt: "Uma nova jóia brilhará entre as cidades das terras civilizadas; seus habitantes prosperarão, assim como eu."
 bp2_yearly.6050.b: "Nós, povos civilizados, não #EMP damos#!. Nós tributamos e construímos."
 bp2_yearly.6050.b.tt: "Essas exações são costumeiras em terras estrangeiras - e assim o são aqui, agora!"
 bp2_yearly.6050.every_county_development: "O nível de [development|lE] em cada [county|lE] do seu [domain|lE] mudará por #positive_value +1#!"
 bp2_yearly.6050.county_control_loss: "O nível de [control|lE] mudará por #negative_value -30#! em cada [county|lE] do seu [domain|lE]"
 bp2_yearly.6050.county_opinion_modifier: "Cada [county|lE] não-[advanced_culture.GetName] em seu [domain|lE] recebe [GetModifier('unprecedented_taxation_modifier').GetNameWithTooltip|l]"
 bp2_yearly.6050.c: "Não posso me afastar dos meus nobres!"
 bp2_yearly.6050.c.tt: "Vou favorecer os magnatas de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] acima de tudo, sempre."
 bp2_yearly.6020.pay_vassals: "Você paga [gold_i|E]#N [root_scope.MakeScope.ScriptValue('minor_gold_value')]#! a todos os seus [powerful_vassals|lE] #EMP e#! perde [gold_i|E]#N [root_scope.MakeScope.ScriptValue('minor_gold_value')]"
 bp2_yearly.6050.reaffirmation_path: "@alert_icon! #alert_trial Isso #EMP rapidamente#! contribui para reafirmar os costumes de sua [root_scope.GetCulture.GetNameNoTooltip]#!"
 bp2_yearly.6050.reform_path: "@alert_icon! #alert_trial Isso contribui para suas amplas reformas [advanced_culture.GetNameNoTooltip]#!"
 cultural_acceptance_gain_beginning_reforms: "Um [ruler|lE] começou a importar os costumes de outra [culture|lE]"
 cultural_acceptance_gain_building_familiar_settlements: "Um reformador do [realm|lE] reconstruiu em um estilo agora compartilhado"
 cultural_acceptance_turned_away_trade: "Com mentiras de grandes projetos, um [ruler|lE] enganou construtores e comerciantes da outra [culture|lE]"
 massive_construction_efforts_modifier: "Esforços de Construção Maciços"
 massive_construction_efforts_modifier_desc: "Construtores especializados estão sendo importados de forma agressiva para trabalhar em projetos magníficos aqui."
 great_builder_modifier: "Grande Construtor"
 great_builder_modifier_desc: "Um patrocinador dedicado da construção ambiciosa: um modernizador e empregador de talento estrangeiro qualificado."
 unprecedented_taxation_modifier: "Taxação Sem Precedentes"
 unprecedented_taxation_modifier_desc: "Impostos no estilo estrangeiro, severos além do imaginável anterior, financiam um desenvolvimento local muito ressentido."
 loyal_realm_nobility_modifier: "Amado pelos Nobres do Reino"
 loyal_realm_nobility_modifier_desc: "Este personagem cultivou um relacionamento fervoroso com os nobres guerreiros de seu povo."
 bp2_yearly.6060.t: "Estudos na Eternidade"
 bp2_yearly.6060.desc: "A ritualidade [ROOT.Char.GetCulture.GetName], nossa interpretação de [ROOT.Char.GetFaith.GetName|l]… será que somos apenas crianças choramingando no escuro?\n\nQuando [clergy_representative.GetFirstName] e nossos [clergy_representative.GetFaith.PriestNeuterPlural] de visão estreita suplicam o favor de [ROOT.Char.GetFaith.HighGodName], minha mente é levada ao sussurro das vestes sagradas da cultura [advanced_culture.GetName], tomada pela verdade de sua retórica. Anseio pelos salões de aprendizado de [childhood_location.GetCounty.GetTitle.GetNameNoTier], vagar pelos mistérios ali revelados.\n\n"
 bp2_yearly.6060.same_faith: "Para [advanced_culture.GetCollectiveNounNoTooltip], a fé vive na grandiosidade, fortalecida pelo estudo. Ela é trazida dos mais altos aos mais baixos e, ao contrário de nossas superstições, ela permanece constante."
 bp2_yearly.6060.different_faith: "Será que todas as almas de um reino, com poucos templos e menos cartas... dependem dos meus lábios para compartilhar a verdade de [advanced_culture_faith.GetName]?"
 #My guardian Kopti ensured I knew that, though we share the same faith, with few temples and fewer lettered folk in our land... wisdom slips, like water, through Karluk fingers.
 bp2_yearly.6060.a: "Eu vivi apenas para isso. Eu sou um [advanced_culture_faith.GetAdherentNameNoTooltip]."
 bp2_yearly.6060.a.tt: "Quem mais poderia unir nossas fé? E que fé melhor para trazer ordem espiritual e iluminação para [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]?"
 bp2_yearly.6060.b: "A fé deve ser construída, deve ser ordenada."
 bp2_yearly.6060.b.tt: "Vamos emular como as fé estrangeiras são organizadas, como elas alcançam os céus e todos os aspectos da vida diária."
 bp2_yearly.6060.b.conversion_bonus: "[convert_county|lE] Velocidade de Progresso: #P +[EmptyScope.ScriptValue('zealous_proselytizer_percentage')|0]%#!"
 bp2_yearly.6060.c: "O aprendizado é a fonte de toda a força."
 bp2_yearly.6060.c.tt: "E se eu for [ROOT.Char.Custom('ES_ElLa')] mais cult[ROOT.Char.Custom('ES_OA')] e sáb[ROOT.Char.Custom('ES_OA')] de todos, se eu for puramente devot[ROOT.Char.Custom('ES_OA')] , meu reino certamente prosperará!"
 bp2_yearly.6060.c.nerd: "Você diminui todas as habilidades, exceto [learning|lE] por #negative_value 2#!"
 bp2_yearly.6060.c.tribal_warning: "@warning_icon! #X Você só poderá construir $building_type_generic_university$ quando não tiver mais um [tribal_government|lE]#!"
 bp2_yearly.6060.d: "E ainda sinto... #EMP nós#! somos os verdadeiros crentes!"
 bp2_yearly.6060.d.tt: "Não há nada ostensivo, nada complicado, sobre nossa verdade. Isso é correto."
 fervor_gain_reformer_converts: "Um reformador famoso se converteu"
 fervor_gain_reformer_champions_faith: "Um governante está revitalizando esta [faith|lE]"
 fervor_loss_reformer_rejects_faith: "A denúncia do célebre campeão de outra [faith|lE]"
 adapted_rituals_modifier: "Rituais Estrangeiros Adaptados"
 adapted_rituals_modifier_desc: "À medida que templos no estilo estrangeiro são construídos, rituais no estilo estrangeiro introduzidos, as pessoas dizem que nada é sagrado para esta pessoa... ou que tudo é?"
 court_of_scholars_modifier: "Corte de Acadêmicos"
 court_of_scholars_modifier_desc: "Um patrono de intelectuais e loucos, este personagem governa um povo em rápida mudança."
 bp2_yearly.6070.t: "Onde o Mundo Todo Contempla"
 bp2_yearly.6070.desc: "\"Sirvo há muito tempo a [advanced_court_owner.Custom('ES_AlAla')] [advanced_court_owner.GetTitledFirstName|l], a maior figura viva da cultura [advanced_culture.GetName]\", afirma [foreign_official.GetName], [Select_CString( foreign_official.IsFemale, 'uma suposta funcionária', 'um suposto funcionário' )] de [advanced_court_owner.GetPrimaryTitle.GetNameNoTier].\n\n\"A poesia de seu poder, as modas que deslumbram o mundo, as danças cortesãs, os distintivos e todo o resto... Desejais participar da cultura suprema, [ROOT.Char.GetTitleAsNameNoTooltip|l]? Posso ajudar-vos. Sei onde estão escondidas riquezas #EMP inimitáveis#!.\"\n\nMinhas ambições reformistas atraem essas criaturas amorais, igualmente ambiciosas: elas observam meu interesse pela mudança... com um oportunismo rastejante."
 bp2_yearly.6070.a: "Prefiro aprender como governa [advanced_court_owner.Custom('ES_ElLa')] [advanced_court_owner.GetTitleAsNameNoTooltip|l]."
 bp2_yearly.6070.a.tt: "Não estou interessado nos métodos da grandiosidade, mas nos métodos da civilização."
 bp2_yearly.6070.b: "Traga-nos modos civilizados, vestimentas magníficas."
 bp2_yearly.6070.b.tt: "Pelos melhores trajes [advanced_culture.GetNameNoTooltip] — o preço mais elevado! Não importa a sua... procedência..."
 bp2_yearly.6070.artifact_warning: "@warning_icon! #X [advanced_court_owner.Custom('ES_ElLa')|U] [advanced_court_owner.GetTitledFirstName|l] pode querer que sejam devolvidos#!"
 bp2_yearly.6070.change_clothes: "Alguns de seus súditos se vestirão como [advanced_culture.GetCollectiveNoun] enquanto você governar"
 bp2_yearly.6070.change_clothes_heir: "Alguns de seus súditos se vestirão como [advanced_culture.GetCollectiveNoun], enquanto você ou seu [primary_heir|lE] atual governar"
 bp2_yearly.6070.c: "A linguagem do poder é a principal entre os adereços."
 bp2_yearly.6070.c.tt: "Se eu realmente dominasse o [advanced_culture.GetLanguage.GetNameNoTooltip], eu seria um[ROOT.Char.Custom('ES_XA')] igual sem necessidade de adornos."
 bp2_yearly.6070.court_language_discount: "Você paga muito menos [prestige|lE] ao mudar a [court_language|lE]"
 bp2_yearly.6070.d: "Você, [advanced_culture.GetNameNoTooltip], é um inseto vil!"
 bp2_yearly.6070.d.tt: "Como se #EMP me#! visto(a) como parente desse verme? Dar um exemplo com [foreign_official.GetSheHe] vai mudar isso!"
 artifact_admired_culture_regalia: "Regalia Opulenta de [advanced_court_owner.GetPrimaryTitle.GetAdjectiveNoTooltip]"
 artifact_famed_culture_regalia_desc: "Um impressionante conjunto de fineries [advanced_culture.GetName] 'importadas', da qualidade que [advanced_court_owner.GetTitleAsNameNoTooltip|l] poderia encomendar de seus artesãos mais sofisticados."
 artifact_admired_culture_crown: "A Coroa de [root_scope.GetFirstNameNoTooltip]"
 artifact_famed_culture_crown_desc: "Um modelo majestoso ao estilo [advanced_culture.GetName], cujo tipo até então jamais fora visto em terras de [root_scope.GetCulture.GetName], esta coroa dourada de procedência contestada viajou muito longe para repousar sobre a cabeça de um[root_scope.Custom('ES_XA')] [root_scope.GetTitleAsNameNoTooltip|l] visionári[root_scope.Custom('ES_OA')]."
 artifact_advanced_culture_treatise: "Um Tratado em [advanced_culture.GetLanguage.GetNameNoTooltip] de [root_scope.GetPrimaryTitle.GetAdjectiveNoTooltip]"
 bp2_yearly.6080.t: "Sangue [ROOT.Char.GetCulture.GetNameNoTooltip]"
 bp2_yearly.6080.desc: "Uma hoste mercenária [advanced_culture.GetName], comandada por dois líderes veteranos, quer servir-me como guarda do palácio e treinar minhas forças. Eles esperam além dos meus portões. Lá dentro, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('angry_vassal'))], [angry_vassal.Custom('ES_ElLa')] [angry_vassal.GetTitledFirstName|l], ruge contra mim.\n\n\"#EMP [ROOT.Char.GetTitleAsNameNoTooltip] traidor[ROOT.Char.Custom('ES_XA')], cachorr[ROOT.Char.Custom('ES_OA')] dos [advanced_culture.GetCollectiveNounNoTooltip]!#! Desejais ser um[ROOT.Char.Custom('ES_XA')] tiran[ROOT.Char.Custom('ES_OA')] como nenhum verdadeiro [ROOT.Char.GetCulture.GetName], brandindo leis estrangeiras e poder forasteiro? Considerais nossos costumes perdidos?\"\n\n\"Então, nossos juramentos de lealdade também devem ser descartados!\", diz [angry_vassal.GetSheHe], flanquead[angry_vassal.Custom('ES_OA')] por sua escolta armada. \"Nós, vassalos, estamos de acordo: ou os [advanced_culture.GetCollectiveNounNoTooltip] se vão ou nossos laços convosco não terão valor!\""
 bp2_yearly.6080.a: "Eu poderia acomodá-los como migrantes pacíficos?"
 bp2_yearly.6080.a.tt: "Meus nobres certamente podem ser convencidos a não se importar, desde que apenas o povo comum seja suplantado..."
 bp2_yearly.6080.pop_opinion_modifier: "Cada [county|lE] não-[advanced_culture.GetName] no mesmo [duchy|lE] ganha #N [GetModifier('forcible_resettlement_modifier').GetNameWithTooltip|l]#!"
 bp2_yearly.6080.b: "Um[angry_vassal.Custom('ES_XA')] líder rebelde! #EMP A por [angry_vassal.GetSheHe]!#!"
 bp2_yearly.6080.b.tt: "Vamos ver os amantes da tradição tentarem se organizar na ausência dele!"
 bp2_yearly.6080.b.success: "O dissidente é capturado"
 bp2_yearly.6080.b.failure: "[angry_vassal.GetFirstNameNoTooltip] luta para sair"
 bp2_yearly.6080.add_both_courtiers: "[foreign_mercenary_1.GetName] e [foreign_mercenary_2.GetName] juntam-se à sua corte"
 bp2_yearly.6080.c: "Todos os laços antigos são perdidos: não serei detido."
 bp2_yearly.6080.c.tt: "Nosso povo está renascendo. Obrigações primitivas, dívidas antigas, não importam mais. Apenas completar minhas reformas importa."
 bp2_yearly.6080.hook_removal_vassals: "[vassals|lE] perdem todos os [hooks|lE] que têm em você"
 bp2_yearly.6080.hook_removal: "@warning_icon! #X Você perde todos os [hooks|lE] que tem em [vassals|lE]#!"
 bp2_yearly.6080.truce_removal: "@warning_icon! #X Todos as [truces|lE] entre você e seus [vassals|lE] foram cancelados#!"
 bp2_yearly.6080.d: "O sangue do meu povo não deve ser derramado."
 bp2_yearly.6080.d.tt: "Nosso povo, nossa causa comum, deve nos impulsionar e nos unir: devemos nos comprometer uns com os outros."
 elite_foreign_guard_modifier: "Barracas da Guarda de Elite"
 elite_foreign_guard_modifier_desc: "Lutadores altamente disciplinados, a maioria de outras terras e povos, estão sediados aqui. Eles treinam habilidades de combate e aguardam o chamado de seu suserano."
 custom.every_non_advanced_culture_vassal: "Cada [vassal|lE] não-[advanced_culture.GetName]"
 custom.every_non_advanced_culture_unhooked_no_truce_vassal: "Cada [vassal|lE] não-[advanced_culture.GetName] com quem você não tem [truce|lE] ou [hook|lE]"
 forcible_resettlement_modifier: "Reassentamentos Forçados"
 forcible_resettlement_modifier_desc: "Migrantes, deslocados por colonos 'importados' de uma cultura mais avançada, provocam ressentimento fervoroso aqui."
 common_noble_cause_modifier: "Causa Nobre Comum"
 common_noble_cause_modifier_desc: "Este personagem inspira seus colegas membros da cultura com o refrão de propósito compartilhado."
 cultural_acceptance_learning_from_culture: "Uma [innovation|lE] foi passada entre essas [cultures|lE]"
 bp2_yearly.6090.t: "Um Direito de Nascença, Renovado"
 bp2_yearly.6090.desc: "Eu persegui a aprovação [advanced_culture.GetName], desejei as trajes estrangeiras, me fiz de tolo pelos meus sonhos. Não mais.\n\n"
 bp2_yearly.6090.burn_letters: "Os diversos presentes que me enviou [advanced_court_owner.Custom('ES_ElLa')] [advanced_court_owner.GetTitledFirstName|l] ardem enquanto a nobreza [ROOT.Char.GetCulture.GetName] venera meu nome.\n\n"
 bp2_yearly.6090.burn_else: "A maioria dos acessórios [advanced_culture.GetNameNoTooltip] queimam, enquanto meus nobres [ROOT.Char.GetCulture.GetName] reverenciam meu nome.\n\n"
 bp2_yearly.6090.reaffirm_social: "À medida que [advanced_culture.GetCollectiveNounNoTooltip] sedentos de poder exploravam minha cobiça, meus vassalos pediam cautela."
 bp2_yearly.6090.reaffirm_realm: "Enquanto eu despedaçava nossas terras, eles construíam salões justos e armavam nobres cavaleiros $knight_culture_player_plural_no_tooltip_lowercase$."
 bp2_yearly.6090.reaffirm_ritual: "Mesmo quando eu desprezava suas antigas crenças, eu permanecia em suas orações."
 bp2_yearly.6090.reaffirm_maa: "Eles arriscavam sua honra, suas vidas, para impedir que eu entregasse [ROOT.Char.GetPrimaryTitle.GetNameNoTier] a estrangeiros."
 bp2_yearly.6090.outro: "\n\nMinha juventude em [childhood_location.GetCounty.GetTitle.GetNameNoTier] me levou ao erro. Os [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip] são meu povo. E eles não precisam de 'civilização.'"
 bp2_yearly.6090.a.bow: "Todo o mundo deveria se curvar diante de nós."
 bp2_yearly.6090.a.strength: "Todo o mundo deveria sentir nossa força."
 bp2_yearly.6090.a.governed: "Todo o mundo deveria prestar atenção à nossa sabedoria."
 bp2_yearly.6090.a.zeal: "Todo o mundo deveria conhecer nosso zelo."
 bp2_yearly.6090.a.kin: "Todo o mundo deveria responder ao nosso parentesco."
 bp2_yearly.6090.a.virtue: "Todo o mundo deveria se maravilhar com nossa virtude."
 bp2_yearly.6090.a.tt: "Vamos reacender nossos antigos laços — em um fogo para consumir todos aqueles que duvidarem dos [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip]!"
 bp2_yearly.6090.tribal_invasion: "Você pode usar o [casus_belli|lE] de Invasão uma vez adicional"
 bp2_yearly.6090.non_tribal_invasion: "Você pode usar o [casus_belli|lE] de Invasão uma vez"
 bp2_yearly.6090.no_invasion_req: "Seu [casus_belli|lE] de Invasão não possui requisito de [prestige_level|lE]"
 bp2_yearly.6090.b: "Devemos defender nossa terra, nossas famílias, para sempre."
 bp2_yearly.6090.b.tt: "Meu coração se parte com a ideia de perder tudo o que temos. Vamos permanecer resolutos, permanecer devotos: isso nunca pode acontecer."
 bp2_yearly.6090.traditionalist_traditions: "Você receberá descontos em [traditions|lE] relacionadas"
 a_cultures_great_defender_modifier: "O Maior Defensor do Povo"
 a_cultures_great_defender_modifier_desc: "Superando uma praga de dúvidas, este personagem se tornou um herói famoso para seu povo e um devoto de sua terra natal."
 inspired_defenders_modifier: "Inspirado na Servidão, Inspirado na Resistência"
 inspired_defenders_modifier_desc: "Os habitantes desta terra protegem ferozmente o que é deles e estão ávidos na defesa de seu senhor."
 uniter_and_conqueror_modifier: "Unificador e Conquistador"
 uniter_and_conqueror_modifier_desc: "Este líder visionário testou o valor de seu povo, até que a grandeza de seu destino compartilhado se tornou clara para todos."
 cultural_acceptance_loss_rejected_influence: "Um reformador rejeitou a outra cultura e escolheu o isolamento"
 bp2_yearly.6091.t: "Um Povo Imutável"
 bp2_yearly.6091: "Tanto entre os cortesãos dos meus salões resplandecentes quanto entre a plebe, minhas reformas frustradas cobraram um preço claro.\n\nA agitação endureceu o coração da comunidade [ROOT.Char.GetCulture.GetName] contra os forasteiros. O receio e a hostilidade reinam, mas também o amor por praticar nossas antigas tradições, festivais alegres e um orgulhoso espírito marcial.\n\nMeus conselheiros me contam o que o povo deseja: que líderes como eu recorram à tradição, à fé"
 bp2_yearly.6091.dominance: "e seu destino nos próximos anos."
 bp2_yearly.6091.defense: "e sua defesa nos próximos anos."
 bp2_yearly.6091.a: "Vamos celebrar tudo o que somos."
 bp2_yearly.6091.a.tt: "…e nada mais."
 bp2_yearly.6091.aggressive: "Sua [culture|lE] agora paga menos [prestige|El] por [GetCultureTradition('tradition_ruling_caste').GetName|l], [GetCultureTradition('tradition_hereditary_hierarchy').GetName|l], [GetCultureTradition('tradition_staunch_traditionalists').GetName|l], [GetCultureTradition('tradition_zealous_people').GetName|l], [GetCultureTradition('tradition_faith_bound').GetName|l] e [GetCultureTradition('tradition_warrior_culture').GetName|l]"
 bp2_yearly.6091.defensive: "Sua [culture|lE] agora paga menos [prestige|lE] por [GetCultureTradition('tradition_isolationist').GetName|l], [GetCultureTradition('tradition_hereditary_hierarchy').GetName|l], [GetCultureTradition('tradition_tribe_unity').GetName|l], [GetCultureTradition('tradition_staunch_traditionalists').GetName|l], [GetCultureTradition('tradition_stalwart_defenders').GetName|l], [GetCultureTradition('tradition_zealous_people').GetName|l] e [GetCultureTradition('tradition_faith_bound').GetName|l]"
 bp2_yearly.6100.t: "Meu [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip], Renascido!"
 bp2_yearly.6100.desc: "Os anos de desprezo e desconfiança, sacrifício e agitação... tudo para isto.\n\nAgora que meus [ROOT.Char.GetCulture.GetCollectiveNoun] se prostram diante de mim, as últimas palavras do meu maior edito de reforma são recitadas de forma trovejante. Governaremos de um novo modo, inspirado em [advanced_culture.GetName]. Construiremos até rivalizar com as glórias de [childhood_location.GetCounty.GetTitle.GetNameNoTier]. E toda criança que nascer na nação [ROOT.Char.GetCulture.GetNameNoTooltip] aprenderá as habilidades — e descobrirá as maravilhas — que eu conheci na minha juventude.\n\nMuita coisa mudou!"
 bp2_yearly.6100.reform_court: "Uma nova elegância revitaliza minha corte."
 bp2_yearly.6100.reform_maa: "Armas de ferro e palavras da lei defendem meu governo."
 bp2_yearly.6100.reform_faith: "Minha fé está focada, refinada, sublime."
 bp2_yearly.6100.reform_realm: "O comércio prospera, os assentamentos crescem e mais pessoas migram para meu [ROOT.Char.GetPrimaryTitle.GetNameNoTier] renascido a cada dia."
 bp2_yearly.6100.outro: "\n\nEu ainda sou [ROOT.Char.GetCulture.GetNameNoTooltip]. Mas eu sou o novo [ROOT.Char.GetCulture.GetNameNoTooltip]."
 bp2_yearly.6100.a: "Este é o meu legado - ele deve ser absoluto!"
 bp2_yearly.6100.a.tt: "Mudanças maiores são custosas, todos os pequenos proprietários de terra não são facilmente persuadidos... mas nós poderíamos adaptar ainda mais dos [advanced_culture.GetCollectiveNounNoTooltip]!"
 bp2_yearly.6100.b: "Eu consegui!"
 bp2_yearly.6100.b.tt: "Meu povo não precisa ser empurrado mais além. Eu já os conduzi ao início de uma nova era."
 cultural_acceptance_gain_completed_reform: "Um governante transformou completamente seu reino seguindo o modelo da outra cultura"
 bp2_yearly.6100.2_more_innovations: "[culture|lE] [root_scope.GetCulture.GetName] recebe #high 2#! [innovations|lE] adicionais da cultura [advanced_culture.GetName|l]"
 bp2_yearly.6100.1_more_innovation: "[culture|lE] [root_scope.GetCulture.GetName] recebe #high 1#! [innovation|lE] adicional da cultura [advanced_culture.GetName|l]"
 bp2_yearly.6100.gained_2_innovations: "[culture|lE] [root_scope.GetCulture.GetName] recebeu #high 2#! [innovations|lE] aleatórias da cultura [advanced_culture.GetName|l]"
 bp2_yearly.6100.gained_1_innovation: "[culture|lE] [root_scope.GetCulture.GetName] recebeu #high 1#! [innovation|lE] aleatória da cultura [advanced_culture.GetName|l]"
 flourishing_settlements_modifier: "Assentamentos Prosperando"
 flourishing_settlements_modifier_desc: "Com a introdução de novas práticas e tecnologias, os locais aqui estão agradecidos e prosperando."
 bp2_yearly.6110.t: "Reformas Estrangeiras"
 bp2_yearly.6110.realm: "Vejo um criado atiçando o fogo. Sua luz mal dura, um rival lamentável para a escuridão desta noite.\n\nTalvez a culpa de tudo seja o nosso modo de viver como [ROOT.Char.GetCulture.GetCollectiveNoun]. Um inimigo tão poderoso a enfrentar… e ainda há em mim convicção para igualar o próprio [ROOT.Char.GetPrimaryTitle.GetNameNoTier]?\n\nPenso no modo de vida [advanced_culture.GetName], em como vivem e governam. Talvez valha a pena impor alguma parte dele ao meu povo?"
 bp2_yearly.6110.combat: "Observo os $knight_culture_player_plural_no_tooltip_lowercase$ de minha casa ociosos ao sol da tarde, regalando uns aos outros histórias de feitos realizados.\n\nTiveram suas vitórias e lutam bem à maneira tradicional [ROOT.Char.GetCulture.GetName]. Mas… penso nas habilidades e táticas de uma unidade [advanced_culture.GetName] armada. Meus guerreiros deveriam tentar adaptar suas formas de guerrear?\n\nOu talvez devêssemos abraçar com os braços abertos alguma outra forma de influência [advanced_culture.GetNameNoTooltip]?"
 bp2_yearly.6110.social: "O mercado. A forma particular que temos em [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTier] de falar [ROOT.Char.GetCulture.GetLanguage.GetName] enche meus ouvidos. Os [ROOT.Char.GetCulture.GetCollectiveNoun], embora admirados de me ver, continuam com suas tarefas cotidianas.\n\nSei que sou como eles, mas #EMP diferente#!. Quem é diferente são eles e os [advanced_culture.GetCollectiveNoun].\n\nIsso é algo que deve ser mudado às pressas? Pois, embora eu não tenha crescido entre eles, meu capricho é o futuro de todos os [ROOT.Char.GetCulture.GetCollectiveNoun]. Cabe somente a mim introduzir aspectos da cultura [advanced_culture.GetNameNoTooltip]."
 bp2_yearly.6110.ritual: "As regras dos deuses estrangeiros diferem, assim me disseram, tanto quanto as regras dos homens. E, em lugares diferentes, os homens apreciam coisas distintas... enquanto seus deuses encorajam o que quiserem, para o bem ou para o mal.\n\nHá silêncio em minha [ROOT.Char.GetFaith.HouseOfWorship], como se o edifício meditasse.\n\nMeus antepassados de herança [ROOT.Char.GetCulture.GetHeritage.GetName] ficariam muito ofendidos, ficaria [ROOT.Char.GetFaith.HighGodName]... se as práticas de meu povo mudassem? Mas qual prática [advanced_culture.GetName] serviu melhor àqueles que me criaram?"
 bp2_yearly.6110.regional: "Caminho de um salão do trono quase vazio, lutando com minhas memórias e meus sonhos.\n\nProjeto as ruas de [childhood_location.GetCounty.GetTitle.GetNameNoTier] sobre minha [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTier] ainda por vir; vejo um banquete ao estilo de [advanced_culture.GetName] em uma mesa [ROOT.Char.GetCulture.GetName], e conduzo grupos de guerra reorganizados em seu primeiro gosto da vitória.\n\nO que faz com que os [advanced_culture.GetCollectiveNounNoTooltip] sejam tão distintos entre os povos? Tal costume pode ser adaptado, mas tudo começa com minha corte, comigo."
 bp2_yearly.6110.a: "[considered_tradition_1.GetNameNoTooltip]"
 bp2_yearly.6110.b: "[considered_tradition_2.GetNameNoTooltip]"
 bp2_yearly.6110.c: "[considered_tradition_3.GetNameNoTooltip]"
 bp2_yearly.6110.d: "[considered_tradition_4.GetNameNoTooltip]"
 bp2_yearly.6110.e: "Prefiro considerar outras mudanças..."
 bp2_yearly.6110.e.tt: "Eu simplesmente não consigo ver os [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip] se adaptando a essas práticas."
 cultural_acceptance_gain_adapted_tradition: "Uma [tradition|lE] foi adaptada"
 introduced_foreign_custom_modifier: "Introduziu um Costume Estrangeiro"
 introduced_foreign_custom_modifier_desc: "Sem dar tempo para que seu povo se ajustasse, este personagem impôs uma prática estranha a todos."
 repeated_foreign_reforms_modifier: "Repetição de Reformas Estrangeiras"
 repeated_foreign_reforms_modifier_desc: "Os membros da cultura deste personagem estão em alvoroço por ataques à sua maneira de viver."
 assault_on_tradition_modifier: "Ataque à Tradição"
 assault_on_tradition_modifier_desc: "Em uma vida, este personagem tornou sua cultura completamente irreconhecível."
 bp2_yearly.6120.t: "Onde os Laços São Testados"
 bp2_yearly.6120.desc: "Meu cativ[hostage.Custom('ES_OA')], [hostage.GetName], mexe-se ansios[hostage.Custom('ES_OA')], esperanços[hostage.Custom('ES_OA')]. Seu [hostage.Custom2('RelationToMeShort', SCOPE.sC('hostage_giver'))], [hostage_giver.Custom('ES_ElLa')] [hostage_giver.GetTitledFirstName|l], está perto, aqui em [ROOT.Char.GetCurrentLocation.GetName], e faz muito tempo que isso não acontecia.\n\nAgora [Select_CString( hostage.IsFemale, 'a garota', 'o garoto' )] vive comigo. Seu [hostage.Custom2('RelationToMeShort', SCOPE.sC('hostage_giver'))] e eu temos um pacto. [hostage.GetFirstNameNoTooltip] está sob meu domínio e deve ser leal a #EMP mim#!. Há risco em deixá-lo reacender seu amor pela família...\n\n\"Por favor\", implora. \"Por favor, meu [ROOT.Char.GetTitleAsNameNoTooltip|l], sinto muita falta do meu [hostage.Custom2('RelationToMeShort', SCOPE.sC('hostage_giver'))] de todo o coração!\""
 bp2_yearly.6120.a: "Saboreie o reencontro. É precioso."
 bp2_yearly.6120.a.tt: "Depois de tudo est[hostage.Custom('ES_EA')] [hostage.Custom('GirlBoy')] continua sendo [hostage.GetDynastyHouseNameNoTooltip], e pertence ao favor de sua família."
 bp2_yearly.6120.b: "Eu esperaria uma recompensa pelo favor generoso!"
 bp2_yearly.6120.b.tt: "Por que manter um refém, senão para extrair coisas como essas?"
 bp2_yearly.6120.hook: "Se [hostage_giver.GetShortUIName] aceitar, você ganhará um [weak_hook|lE] sobre [hostage_giver.GetSheHe]"
 bp2_yearly.6120.hook_acceptance: "A [personality|lE] de [hostage_giver.GetShortUIName] decidirá se aceitará"
 bp2_yearly.6120.c: "Vamos, vamos falar com [hostage_giver.GetSheHe] #EMP junt[ROOT.Char.Custom('ES_OA')]s#!."
 bp2_yearly.61020.c.tt: "Posso ser mais encantador[ROOT.Char.Custom('ES_XA')] que [Select_CString( hostage_giver.IsFemale, 'essa pessoa desagradável', 'essa pessoa desagradável' )] e fazer com que a própria família dele prefira minha companhia à dele!"
 bp2_yearly.6120.c.success: "Você domina a interação com [hostage_giver.GetFirstNameNoTooltip]"
 bp2_yearly.6120.c.failure: "Você parece ser um incômodo insuportável"
 bp2_yearly.6120.d: "#EMP Silêncio!#! Você mereceu um tapa, [hostage.Custom('GirlBoy')]!"
 bp2_yearly.6120.d.tt: "[hostage.GetFirstNameNoTooltip] me pertence a mim, não à companhia da família. Uma surra ajudará a se lembrar disso."
 bp2_yearly.6121.t: "[hostage.Custom('ES_ElLa')|U] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hostage'))] renegado[hostage.Custom('ES_OA')]"
 bp2_yearly.6121.reunion: "Estou aguardando este momento. Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hostage'))] [hostage.GetFirstName], [Select_CString( hostage.IsFemale, 'uma cativa', 'um cativo' )] que zela pela minha paz, está diante de mim em [ROOT.Char.GetCurrentLocation.GetName].\n\n\"[hostage.Custom2('RelationToMeShort', ROOT.Char)|U]!\"\n\nQuando corre para me abraçar, é como se nunca tivesse ido embora. Mas a força do seu abraço revela o quanto [Select_CString( hostage.IsFemale, 'esta menina', 'este menino' )] anseia pelo lar.\n\n[warden.Custom('ES_ElLa')|U] [warden.GetTitledFirstName|l] se portou bem ao nos permitir este encontro, mas ainda assim não é muito."
 bp2_yearly.6121.intrusion: "Com [hostage.Custom('ES_ElLa')] [warden.GetTitledFirstName|l] ao seu lado, [hostage.GetFirstName] está diante de mim. Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hostage'))] mudou muito desde que [hostage.GetHerHim] enviei para o cativeiro, mas eu reconheceria um[hostage.Custom('ES_XA')] [ROOT.Char.GetDynastyHouseName] em qualquer lugar!\n\n[hostage.GetHerHim|U] abraço. Tenta manter a seren[hostage.Custom('ES_OA')]o, mas a força de seu aperto revela o quanto sente saudade de casa.\n\nEntão, [warden.Custom('ES_ElLa')] [warden.GetTitledFirstNameNoTooltip|l] intervém para desviar a atenção do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hostage'))], tagarelando sobre este reencontro… e as colheitas locais de [ROOT.Char.GetCurrentLocation.GetName]?\n\nSeja como for, agradeço a [ROOT.Char.GetFaith.HouseholdGodName] em nome da minha família."
 bp2_yearly.6121.hook: "Vocês se perguntam se vão se reunir com seu[hostage.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hostage'))], não é? tenta me arrancar [warden.Custom('ES_ElLa')] [warden.GetTitledFirstName|l]. [hostage.GetFirstName], [Select_CString( hostage.IsFemale, 'a moça', 'o rapaz' )] a quem vocês entregaram tão generosamente em nome da paz.\n\n[warden.GetFirstNameNoTooltip] parece muito satisfeit[warden.Custom('ES_OA')] consigo mesmo.\n\nEnquanto estivermos junt[warden.Custom('ES_OA')]os em [ROOT.Char.GetCurrentLocation.GetName], vocês poderão compartilhar a companhia [Select_CString( hostage.IsFemale, 'da cativa', 'do cativo' )], embora isso ponha nosso acordo em risco...\n\n... se jurarem que essa generosidade da minha parte não será esquecida."
 bp2_yearly.6121.forbidden: "\"Você realmente achou que só porque vós e vosso[hostage.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hostage'))] [hostage.GetFirstName] estais em [ROOT.Char.GetCurrentLocation.GetName] iríeis se reunir?\"\n\n[warden.Custom('ES_ElLa')|U] [warden.GetTitledFirstName|l] nega com a cabeça.\n\n\"Meu cativ[hostage.Custom('ES_OA')] está muito ocupad[hostage.Custom('ES_OA')]. Além disso, pelos termos do nosso acordo, [hostage.GetSheHe] pertence só a mim.\"\n\nE, de fato, mal vi sinal [Select_CString( hostage.IsFemale, 'da garota', 'do garoto' )] que enviamos para longe..."
 bp2_yearly.6121.a: "[hostage.GetFirstNameNoTooltip]! Estou te levando para casa."
 bp2_yearly.6121.a.tt: "Maldito seja o desonra: [hostage.GetFirstNameNoTooltip] deve estar comigo! Que [warden.Custom('ES_ElLa')] [warden.GetTitledFirstNameNoTooltip|l] faça o que quiser a respeito."
 bp2_yearly.6121.b: "Um presente poderoso, para que você não passe fome!"
 bp2_yearly.6121.b.tt: "Coma! Coma! E ostente seu status como um [ROOT.Char.GetDynastyHouseNameNoTooltip]."
 bp2_yearly.6121.c: "É bom te ver, [hostage.Custom('GetLassLad')]."
 bp2_yearly.6121.d: "Qualquer coisa por amor à Casa [ROOT.Char.GetDynastyHouseNameNoTooltip]."
 bp2_yearly.6121.d.tt: "Nenhum parente meu será abandonado por seus próprios."
 bp2_yearly.6121.e: "Para um abraço roubado, eu não preciso de permissão..."
 bp2_yearly.6121.e.tt: "Certamente [warden.Custom('ES_ElLa')] [warden.GetTitledFirstNameNoTooltip|l] não pode me impedir de encontrar [hostage.GetFirstNameNoTooltip] e falar com [hostage.GetSheHe], ainda que seja por um momento."
 bp2_yearly.6121.e.success: "Você se infiltra para dar um abraço"
 bp2_yearly.6121.e.failure: "Você é pego"
 bp2_yearly.6121.f: "Ah. Não sinto falta [hostage.GetHerHim]."
 bp2_yearly.6121.f.tt: "Vou ver [hostage.GetHerHim] novamente algum dia… e tudo bem."
 bp2_yearly.6122.t: "Não Esquecido"
 bp2_yearly.6122.sneaking: "Enquanto meus agentes afastavam rapidamente [hostage.GetFirstName] dos guardas [warden.Custom('ES_DelDela')] [warden.GetTitledFirstName|l] aproveitando o grande acontecimento do jantar, eu também me esgueirei para este encontro de família.\n\nAs circunstâncias ignóbeis mal me passam pela cabeça enquanto meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hostage'))] me abraça, ri das minhas rugas, excitad[hostage.Custom('ES_OA')] de emoção.\n\nJá faz muito que partiu e logo terá de voltar para seu guardião. As coisas são assim, mas não invejo seu senhor exigente[warden.Custom('ES_XA')]."
 bp2_yearly.6122.rescue: "Como se enfureceu [warden.Custom('ES_ElLa')] [warden.GetTitledFirstName|l] quando [warden.GetHerHim] expulsei de minha presença, com seu/sua [Select_CString( hostage.IsFemale, 'ex-cativa', 'ex-cativo' )] [hostage.GetFirstName] ao meu lado.\n\n\"Ele voltará, [hostage.Custom2('RelationToMeShort', ROOT.Char)]?\", pergunta [hostage.Custom('ES_ElLa')] [hostage.Custom('GirlBoy')]. \"Eu queria voltar para casa, mas... não quero fazer vocês lutarem contra [warden.GetPrimaryTitle.GetNameNoTier].\"\n\nAsseguro a [hostage.GetFirstNameNoTooltip] que não será assim, mas a verdade continua evidente.\n\nQuebrei um pacto. Isso pode provar que sacrifiquei a paz, para o bem ou para o mal."
 bp2_yearly.6122.c: "Junt[ROOT.Char.Custom('ES_OA')]os enfrentaremos o que vier."
 bp2_yearly.6122.c.tt: "Se acabar mesmo virando guerra, ao menos [hostage.GetFirstNameNoTooltip] não será o primeiro entre os mortos...[hostage.GetHerHim]s primeiro[hostage.Custom('ES_OA')]s a cair..."
 bp2_yearly.6123.t: "O Herdeiro da Paz"
 bp2_yearly.6123.desc: "A reunião familiar é uma demonstração comovente, que eu presido com prazer.\n\n [hostage_giver.Custom('ES_ElLa')|U] [hostage_giver.GetTitledFirstName|l] transmite algumas parábolas sábias a [hostage.GetFirstName] à medida que o dia avança, enquanto espero o retorno do meu cativo [hostage.Custom('ES_OA')] de bom humor.\n\n“Cuid[hostage.GetHerHim] bem”, me exorta [hostage_giver.Custom('ES_ElLa')] [hostage_giver.GetTitleAsNameNoTooltip|l], enquanto levo embora seu [hostage_giver.Custom2('RelationToMeShort', SCOPE.sC('hostage'))]. “Mantenham[hostage.GetHerHim] longe de estranhos como eu.”"
 bp2_yearly.6123.stolen_hostage: "[hostage_giver.Custom('ES_ElLa')|U] [hostage_giver.GetTitledFirstName|l] fez o impensável! Minha retidão foi respondida com traição.\n\nEst[hostage_giver.Custom('ES_EA')] canalha me insta a ir embora enquanto [hostage.GetFirstName], [hostage.Custom('ES_ElLa')] [hostage.Custom('GirlBoy')] que é o símbolo da paz, permanece injustamente ao lado dele... e devo ir. Tenho pouca força comigo aqui. É um insulto! É ignóbil!\n\nAgora retorno para casa, desfeit[ROOT.Char.Custom('ES_OA')] e desprezad[ROOT.Char.Custom('ES_OA')], sem nenhuma garantia de que nada pior ainda esteja por vir.\n\n[hostage_giver.GetFirstNameNoTooltip] lamentará esta loucura, assim como lamento ter trazido meu/minha cativ[hostage.Custom('ES_OA')] para perto de tal serpente gananciosa..."
 bp2_yearly.6123.favor_accepted: "Meu julgamento estava correto… [hostage_giver.Custom('ES_ElLa')|U] [hostage_giver.GetTitledFirstName|l] é alguém disposto a ceder à pressão.\n\nEnquanto [hostage_giver.GetSheHe] mantém perto de [hostage.GetFirstName] , o afeto que reserva à sua família está plenamente à mostra.\n\nCom a recente obrigação de manter[hostage_giver.GetHerHim] a [hostage_giver.GetSheHe] e um[hostage.Custom('ES_XA')] cativ[hostage.Custom('ES_OA')] tão am[hostage.Custom('ES_OA')] sob meus cuidados, não vejo ameaça alguma por parte [hostage_giver.Custom('ES_DelDela')] [hostage_giver.GetTitleAsNameNoTooltip|l] nos dias que virão."
 bp2_yearly.6123.sneaker: "[hostage_giver.Custom('ES_ElLa')|U] [hostage_giver.GetTitledFirstName|l], essa rata sem honra, parece não respeitar minha autoridade sobre seu [hostage_giver.Custom2('RelationToMeShort', SCOPE.sC('hostage'))] [hostage.GetFirstName].\n\nNega ter enviado servos astutos para levar [hostage.Custom('ES_AlAla')] [hostage.Custom('GirlBoy')] para longe da minha mesa bem vigiada. Mas sei que só busca violar os acordos entre nós.\n\n\"Mentiras!\", protesta [hostage_giver.GetSheHe].\n\nEnquanto [hostage.GetFirstNameNoTooltip] viver em minha corte, #EMP deverá#! permanecer longe [hostage_giver.Custom('ES_DelDela')] [hostage_giver.GetTitleAsNameNoTooltip|l], sempre."
 bp2_yearly.6123.forbidden_desc: "Embora eu suspeite que isso [hostage_giver.GetHerHim] incomode, [hostage_giver.Custom('ES_ElLa')] [hostage_giver.GetTitledFirstName|l] tem respeitado meu pronunciamento sobre se pode se reunir com seu [hostage_giver.Custom2('RelationToMeShort', SCOPE.sC('hostage'))].\n\n\"Quase não sinto falta de es[hostage.Custom('ES_EA')] [hostage.Custom('GetLassLad')]\", afirma. \"Quase me alegro de que sejais obrigad[ROOT.Char.Custom('ES_OA')] a lidar com suas tolices por mais um tempo.\"\n\nÉ assim que deve ser. Além disso... é bom pôr uma pessoa à prova e saber como ela reage."
 bp2_yearly.6123.a: "Tod[hostage_giver.Custom('ES_OA')] um[hostage_giver.Custom('ES_XA')] [hostage_giver.Custom('WomanManPerson_GenderPreference')] de família, [hostage_giver.GetFirstNameNoTooltip]."
 bp2_yearly.6123.return_hostage: "[hostage.GetShortUIName] não é mais seu [hostage|lE]"
 bp2_yearly.6130.t: "Cativo, Cautivado"
 bp2_yearly.6130.desc.different_ages: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('kin'))] [kin.GetFirstName] e meu/minha cativ[hostage.Custom('ES_OA')] [hostage.GetName], apesar da diferença de idade, parecem cada vez mais inseparáveis.\n\nO mais velho dos dois protege o outro com firmeza e lhe dá bons conselhos sobre como as coisas funcionam no mundo, enquanto o mais jovem nunca deixa de arrancar um sorriso.\n\nObservando esses companheiros improváveis, não posso deixar de ter pena da separação que está por vir. Um dia, o acordo de cativeiro com os parentes de [hostage.GetFirstNameNoTooltip] terminará..."
 bp2_yearly.6130.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('kin'))] [kin.GetFirstName] e meu cativo[hostage.Custom('ES_OA')] [hostage.GetName] estão se tornando companheiros firmes.\n\nQuando [hostage.GetFirstNameNoTooltip] sente saudade de casa, [kin.GetFirstNameNoTooltip] sempre [hostage.Custom('ES_LoLa')] anima. Quando a posição do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('kin'))] lhe pesa, tem [hostage.GetFirstNameNoTooltip] para se juntar a [kin.GetSheHe] em seus deveres.\n\nAo observar as duas crianças compartilharem alegrias, não posso deixar de sentir pena delas pela separação que está por vir. Um dia, o acordo de cativeiro com os parentes de [hostage.GetFirstNameNoTooltip]…"
 bp2_yearly.6130.a: "\"Jurem apoiar um ao outro, sempre.\""
 bp2_yearly.6130.a.tt: "Um vínculo entre nossas duas cortes... talvez seja algo para nutrir?"
 bp2_yearly.6130.b: "\"O amor pela família deve estar acima de tudo!\""
 bp2_yearly.6130.b.tt: "Vá brincar com alguém que sempre estará lá por você, [kin.Custom('GirlBoy')]."
 bp2_yearly.6130.family_opinion: "[kin.GetShortUIName] ganha #P 30#! [opinion|lE] de sua [close_family|lE]"
 bp2_yearly.6130.alliance: "Se ambos se tornarem [rulers|lE], [kin.GetShortUIName] e [hostage.GetShortUIName] podem negociar uma [alliance|lE]"
 bp2_yearly.6140.t: "Pela Amizade, Muito Jovens"
 bp2_yearly.6140.desc: "Enquanto os ritos sagrados distraem todos os guardiões, meu [kin.Custom2('RelationToMeShort', SCOPE.sC('root_scope'))] [kin.GetFirstName] e [Select_CString( hostage.IsFemale, 'a cativa', 'o cativo' )] [hostage.GetFirstNameNoTooltip] despejam seu ódio crescente.\n\n\"Meu [kin.Custom2('RelationToMeShort', SCOPE.sC('root_scope'))] é [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsName|l] o mais poderoso[ROOT.Char.Custom('ES_OA')] de toda a terra!\", sibila [kin.GetFirstName]. \"Um dia, graças a [ROOT.Char.GetSheHe], seu repugnante [home_court.GetPrimaryTitle.GetNameNoTier] será reduzido a cinzas, e sua cabeça ficará pendurada na sela de um $knight_culture_player_no_tooltip_lowercase$!\"\n\n\"Quem me dera minha [hostage.Custom2('RelationToMeShort', SCOPE.sC('home_court'))] me levasse para casa\", responde [hostage.GetFirstNameNoTooltip], \"lá você teria medo de me insultar!\"\n\nDesde quando meu [kin.Custom2('RelationToMeShort', SCOPE.sC('root_scope'))] fala assim? E para [Select_CString( hostage.IsFemale, 'uma convidada', 'um convidado' )] de honra!"
 bp2_yearly.6140.a: "A competição aguça a inteligência do meu(a) [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('kin'))]."
 bp2_yearly.6140.a.tt: "Humilhe[hostage.GetHerHim] , [kin.Custom('GirlBoy')]! [hostage.GetFirstNameNoTooltip] é um[hostage.Custom('ES_XA')] inimig[hostage.Custom('ES_OA')] ao seu alcance."
 bp2_yearly.6140.b: "Reféns não são mantidos para conflitos, mas para a paz."
 bp2_yearly.6140.b.tt: "Melhor rezar #EMP contra#! o corte de cabeças, crianças."
 bp2_yearly.6150.t: "A Garantia Fala"
 bp2_yearly.6150.desc: "Os reféns costumam estar presentes, reunidos entre funcionários e familiares, quando [ROOT.Char.GetTitleAsName|l]s como eu recebem petições e realizam cerimônias.\n\nMeu cativ[hostage.Custom('ES_OA')] [hostage.GetFirstName] não gosta disso.\n\n\"Por favor, estão me encarando, como se eu fosse um prêmio...\", protesta, enquanto os últimos suplicantes vão saindo.\n\n\"Sinto-me como um espírito arrancado de [hostage.GetFaith.NegativeAfterLife]. Todos me encaram... Eles sabem que eu não pertenço a este lugar.\""
 bp2_yearly.6150.a: "Você pertence à minha família. Fique com eles."
 bp2_yearly.6150.a.tt: "Não há nada a temer! Você é praticamente um de nós."
 bp2_yearly.6150.b: "Vá estudar com os [ROOT.Char.GetFaith.PriestNeuterPlural], suponho..."
 bp2_yearly.6150.b.tt: "Eu posso me destacar por minha própria magnificência: meu primeiro dever para com esses reféns é cultivá-los."
 bp2_yearly.6150.c: "És meu[hostage.Custom('ES_OA')] para te tratar como eu quiser."
 bp2_yearly.6150.c.tt: "Não posso permitir que meu cativo[hostage.Custom('ES_OA')] dite o que eu faço."
 hostages_accepted_into_family_modifier: "Aceitando Reféns na Família"
 hostages_accepted_into_family_modifier_desc: "Um anfitrião gracioso e cerimonioso que faz questão de tratar reféns como parentes."
 eschews_flaunting_of_hostages_modifier: "Evita Exibir Reféns"
 eschews_flaunting_of_hostages_modifier_desc: "Reféns deste personagem são cuidados e cultivados, não exibidos."
 bp2_yearly.6150.family_opinion_hostage: "[hostage.GetShortUIName] ganha #P 20#! [opinion|lE] de sua [close_family|lE]"
 bp2_yearly.6160.t: "Pior dos Meus Cavaleiros"
 bp2_yearly.6160.desc: "Entre soluços e mentiras, descubro a verdade da noite passada.\n\nMeu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('kin'))] [kin.GetFirstName] e [Select_CString( hostage.IsFemale, 'a cativa', 'o cativo' )] [hostage.GetFirstName] escaparam às escondidas sob o manto da escuridão. Curiosos pelo mundo além da minha casa, entraram sorrateiramente em um povoado.\n\nForam descobertos admirando os cavalos de uma família local e fugiram em cavalos roubados.\n\n[kin.Custom('ES_LoLa')|U]s pequenos imbecis[kin.Custom('ES_OA')]s caíram direto em uma vala.\n\n\"[hostage.GetFirstNameNoTooltip] me incentivou a fazer isso!\", soluça meu/minha ferid[kin.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('kin'))], enquanto os aldeões lamentam seu cavalo, agora manco."
 bp2_yearly.6160.a: "Experimentem o trabalho para pagar suas dívidas."
 bp2_yearly.6160.a.tt: "Os pequenos desejam experimentar o mundo comum? Então deixe-os trabalhar para o dono do cavalo por um tempo."
 bp2_yearly.6160.b: "Você feriu meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('kin'))], cativ[hostage.Custom('ES_OA')]?! #EMP Fora!#!"
 bp2_yearly.6160.b.tt: "Nenhuma trégua vale a pena arriscar minha família com a presença de tais arruaceiros!"
 bp2_yearly.6160.c: "#EMP Suspiro.#! Acho que vou pagar por isso..."
 bp2_yearly.6160.d: "Curar o cavalo? Muito fácil."
 bp2_yearly.6160.e: "São crianças![kin.Custom('ES_OA')] Essas coisas acontecem."
 bp2_yearly.6160.e.tt: "Deixe esses encrenqueiros em paz. [kin.Custom('ES_OA')] Não há escândalo algum."
 labored_with_the_commons_modifier: "Trabalhou com o Povo Comum"
 labored_with_the_commons_modifier_desc: "Conhecido por ter trabalhado entre os vaqueiros e criadores de cavalos para compensar as loucuras da juventude."
 renowned_knowledge_of_horses_modifier: "Conhecimento Renomado de Cavalos"
 renowned_knowledge_of_horses_modifier_desc: "Muitos recorrem à sabedoria deste personagem para curar doenças e fortalecer a força dos cavalos."
 bp2_yearly.6200.t: "Onde os [ROOT.Char.Custom('KnightCulturePluralNoTooltip')|l] Conhecem a Paz"
 bp2_yearly.6200.desc: "Enquanto meu conselho planeja como defenderemos [ROOT.Char.GetPrimaryTitle.GetNameNoTier], meu cativ[hostage.Custom('ES_OA')], [hostage.GetName], é conduzid[hostage.Custom('ES_OA')] para dentro.\n\n\"Nobre [ROOT.Char.GetTitleAsName|l], vós me tratastes bem e com justiça. Agora que a ruína ameaça, é justo que em [home_court.GetPrimaryTitle.GetNameNoTier], minha terra natal, os [home_court.Custom('KnightCulturePluralNoTooltipLowercase')] estejam ociosos, com seus estandartes arriados?\"\n\nAjoelha-se.\n\n\"Dai-me licença para viajar — levarei nosso apelo por ajuda [home_court.Custom('ES_AlAla')] [home_court.GetTitledFirstName|l]! Sou sangue de seu sangue. [home_court.GetSheHe|U] vos apoiará por minha causa!\""
 bp2_yearly.6200.a: "Vá e retorne com ajuda."
 bp2_yearly.6200.a.tt: "Por favor, seja fiel! Por favor, me entregue nesta hora de necessidade!"
 bp2_yearly.6200.hostage_travel: "[hostage.GetShortUIName] viajará para [home_court.GetCapitalLocation.GetTitle.GetName]"
 bp2_yearly.6200.hostage_warning: "@alert_icon! #alert_trial [hostage.GetShortUIName] pode deixar de ser seu [hostage|lE]#!"
 bp2_yearly.6200.war_positive: "[home_court.GetShortUIName] pode ajudar em sua [war|lE]"
 bp2_yearly.6200.b: "Leve um presente valioso com você."
 bp2_yearly.6200.b.tt: "A generosidade aguçará o gosto pela guerra [home_court.Custom('ES_DelDela')] [home_court.GetTitleAsNameNoTooltip|l]."
 bp2_yearly.6200.c: "Leve [target_knight.GetFirstNameNoTooltip] leais e tenha pressa!"
 bp2_yearly.6200.war_very_positive: "#P [home_court.GetShortUIName] é mais provável que ajude em sua [war|lE]#!"
 bp2_yearly.6200.c.tt: "Um[target_knight.Custom('ES_XA')] acompanhante forte… e alguém que se certifique de que [hostage.GetFirstNameNoTooltip] não se esqueça dos meus interesses."
 bp2_yearly.6200.hostage_positive: "#P [hostage.GetShortUIName] é mais provável que retorne à sua [court|lE]#!"
 bp2_yearly.6200.hostage_travel_knight: "[hostage.GetShortUIName] e [target_knight.GetShortUIName] viajarão para [home_court.GetCapitalLocation.GetTitle.GetName]"
 bp2_yearly.6200.imprison_warning: "@alert_icon! #alert_trial [target_knight.GetShortUIName] puede acabar encarcelad[target_knight.Custom('ES_OA')] por [home_court.GetShortUIName]#!"
 bp2_yearly.6200.d: "Não, não posso permitir que um refém saia."
 bp2_yearly.6200.d.tt: "Não há garantia alguma de seu retorno! Nem mesmo de que [home_court.Custom('ES_ElLa')] [home_court.GetTitleAsNameNoTooltip|l] não prefira dar conforto aos meus inimigos."
 bp2_yearly.6202.t: "[hostage.Custom2('AppropriateGreeting', ROOT.Char )]"
 bp2_yearly.6202.opening: "Estou em [home_court.GetCapitalLocation.GetTitle.GetNameNoTier] mais uma vez."
 bp2_yearly.6202.assembled_nobles: "Nobres distintos lotavam a corte [home_court.Custom('ES_DelDela')] [home_court.GetTitleAsName|l] enquanto eu lia sua petição.\n\n"
 bp2_yearly.6202.nostalgia: "A brisa passa por árvores familiares. Eu fiz seu sofrimento conhecido aqui.\n\n"
 bp2_yearly.6202.impatient: "Nobres insignificantes, que só me conheciam quando era bebê, cochicharam quando comecei seu apelo e depois ficaram em silêncio.\n\n"
 bp2_yearly.6202.received_empathy: "Os reunidos choraram pela desgraça de [ROOT.Char.GetPrimaryTitle.GetNameNoTier]. Meu [hostage.Custom2('RelationToMeShort', SCOPE.sC('home_court'))] pareceu profundamente comovido[home_court.Custom('ES_OA')]"
 bp2_yearly.6202.received_debate: "O debate começou a esquentar. Meu [hostage.Custom2('RelationToMeShort', SCOPE.sC('home_court'))], embora não seja [Select_CString( hostage.IsFemale, 'vossa aliada', 'vosso aliado' )], quer ser um[home_court.Custom('ES_XA')] paladino por sua família"
 bp2_yearly.6202.received_scorn: "\"Com que direito ela/ele nos pede ajuda?\", me perguntaram, e tive pouca resposta. Meu [hostage.Custom2('RelationToMeShort', SCOPE.sC('home_court'))] parece descontente[home_court.Custom('ES_OA')]"
 bp2_yearly.6202.received_apathy: "Alguns não se importam nem um pouco, enquanto outros [home_court.Custom('KnightCulturePluralNoTooltipLowercase')] se reúnem para aguardar a palavra do meu [hostage.Custom2('RelationToMeShort', SCOPE.sC('home_court'))]. [home_court.GetSheHe|U] me pergunta quando espero partir"
 bp2_yearly.6202.fears_returning: "… e teme meu retorno à tua terra atribulada."
 bp2_yearly.6202.awaiting: "… mas ainda aguardamos sua decisão."
 bp2_yearly.6202.want_to_stay: "… no entanto, é sábio demais[home_court.Custom('ES_OA')] para fazer julgamentos apressados."
 bp2_yearly.6202.want_to_return: "… mas faz com que eu fique aqui enquanto a guerra continua!"
 bp2_yearly.6202.a: "Pelo menos [hostage.GetFirstNameNoTooltip] ainda está vivo."
 bp2_yearly_6203_army_name: "Hoste [ROOT.Var( 'bp2_yearly_6203_army_name_origin' ).Char.GetHomeCourt.GetPrimaryTitle.GetAdjectiveNoTooltip] de [ROOT.Var( 'bp2_yearly_6203_army_name_origin' ).Char.GetFirstNameNoTooltip]"
 bp2_yearly.6203.t: "[ROOT.Char.GetNameNoTooltip],"
 bp2_yearly.6203.join_war: "![home_court.GetPrimaryTitle.GetNameNoTier] está com você! Meu [hostage.Custom2('RelationToMeShort', SCOPE.sC('home_court'))], [home_court.Custom('ES_ElLa')] [home_court.GetTitledFirstName|l] intrépido[home_court.Custom('ES_OA')], honrará os laços entre [home_court.GetSheHe] e você com a força das armas.\n\nQue ninguém ameace um salão que abriga um[home_court.Custom('ES_XA')|l] [hostage.GetDynastyHouseName]!\n\n"
 bp2_yearly.6203.assist: "Entristece a [home_court.GetName] que não possa vir em vosso auxílio. No entanto, com a promessa da guerra e de suas glórias, reunimos uma força de errantes miseráveis e aventureiros de [home_court.GetPrimaryTitle.GetNameNoTooltip]. Que lutem bem por [ROOT.Char.GetPrimaryTitle.GetNameNoTier].\n\n"
 bp2_yearly.6203.betray: "Não podemos ignorar a fraqueza revelada em suas súplicas. Em vez disso, [home_court.Custom('ES_ElLa')] [home_court.GetTitledFirstName|l] confiará na força do seu inimigo. Prepare-se para sua chegada.\n\nTalvez vocês me vejam novamente em sua corte, quando meu [hostage.Custom2('RelationToMeShort', SCOPE.sC('home_court'))] saque sua capital."
 bp2_yearly.6203.decline: "Fiz o que pude, mas [home_court.Custom('ES_ElLa')] [home_court.GetTitledFirstName|l] vê pouco fundamento em seus argumentos. Sem nenhuma aliança, [home_court.GetPrimaryTitle.GetNameNoTier] não marcha quando [ROOT.Char.GetPrimaryTitle.GetNameNoTier] o convoca. Meu [hostage.Custom2('RelationToMeShort', SCOPE.sC('home_court'))] agradece que me tenha enviado a [home_court.GetSheHe] e lhe envia suas saudações.\n\n"
 bp2_yearly.6203.dont_keep_knight: "Meu lugar é na sua corte, então [target_knight.GetFirstName] e eu em breve retornaremos."
 bp2_yearly.6203.dont_keep: "Meu lugar é na sua corte, então em breve eu retornarei."
 bp2_yearly.6203.keep: "Mas já não sou [Select_CString( hostage.IsFemale, 'vossa cativa', 'vosso cativo' )]."
 bp2_yearly.6203.a: "Abençoados sejam eles! Nosso vínculo vai além do reféns."
 bp2_yearly.6203.a.tt: "E [home_court.GetFirstNameNoTooltip] toma as armas para defender a família, responde aos apelos dos necessitados: parece [Select_CString( home_court.IsFemale, 'uma boa amiga', 'um bom amigo' )]."
 bp2_yearly.6203.b: "#EMP Traição!#! Vou encharcar a terra de sangue!"
 bp2_yearly.6203.b.tt: "Eu vencerei todos os inimigos e obterei minha vingança!"
 bp2_yearly.6203.c.positive: "Para a guerra, [hostage.GetFirstNameNoTooltip]! #EMP Para a guerra!#!"
 bp2_yearly.6203.c.negative: "Fui um tolo por enviar[hostage.GetHerHim] para longe da minha vista…"
 bp2_yearly.6203.c.tt: "Eu te protejo, mas você protege todo o reino!"
 from_victory_vengeance_modifier: "Da Vitória, a Vingança"
 from_victory_vengeance_modifier_desc: "Esse personagem conduz exércitos e cavaleiros a selvagerias impiedosas, determinado a vingar traições passadas."
 bp2_yearly.6204.t: "Um Apelo de Meu Próprio Sangue"
 bp2_yearly.6204.desc: "Coberto[hostage.Custom('ES_OA')] de poeira da estrada e do cheiro de suor de cavalo, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hostage'))] [hostage.GetFirstName] voltou inesperadamente!\n\n“Não ponho em risco sua trégua, [hostage.Custom2('RelationToMeShort', SCOPE.sC('home_court'))]”, ofega. “A guerra não vem até aqui! Não, a guerra horrível vem até [warden.GetPrimaryTitle.GetNameNoTier], à sala onde estou mantido como cativo[hostage.Custom('ES_OA')]!”.\n\n"
 bp2_yearly.6204.desc_gift: "Apresenta tanto uma missiva quanto uma bolsa de ouro da parte de [warden.Custom('ES_DelDela')] [warden.GetTitledFirstName|l]."
 bp2_yearly.6204.desc_chaperone: "Sua companhia[target_knight.Custom('ES_OA')] cautelosa[target_knight.Custom('ES_OA')], [target_knight.GetName] apresenta uma missiva de parte de [warden.Custom('ES_DelDela')] [warden.GetTitledFirstName|l]."
 bp2_yearly.6204.desc_outro: "\n\n\"Você não tem obrigação de ajudar\", diz [hostage.GetFirstNameNoTooltip], \"mas meu/minha tutor[warden.Custom('ES_XA')] só me mostrou bondade! Não merece ser arruinad[warden.Custom('ES_OA')] por [attacker.GetName]!\""
 bp2_yearly.6204.desc_none: "[hostage.GetSheHe|U] apresenta uma missiva de parte [warden.Custom('ES_DelDela')] [warden.GetTitledFirstName|l]."
 bp2_yearly.6204.a: "Tragam minha [ROOT.Char.Custom('signature_weapon')]! #EMP Nós [ROOT.Char.GetDynastyHouseNameNoTooltip] lutaremos!#!"
 bp2_yearly.6204.a.tt: "Que ninguém ameace um salão que abriga meu parente!"
 bp2_yearly.6204.b: "Ajudarei a pagar e armar uma força."
 bp2_yearly.6204.b.tt: "Reúna jovens armados e errantes mendicantes para enviar com [hostage.GetFirstNameNoTooltip]! Eles podem lutar sem meu envolvimento formal."
 bp2_yearly.6204.c: "A defesa de [warden.GetPrimaryTitle.GetNameNoTierNoTooltip] não é meu dever."
 bp2_yearly.6204.c.tt: "Nós apenas compartilhamos uma trégua. Não somos aliados!"
 bp2_yearly.6205.t: "Para Terras de Conflito"
 bp2_yearly.6205.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hostage'))] [hostage.GetFirstName] sobe em seu corcel, em silêncio sepulcral. À frente aguarda o/a [warden.GetCapitalLocation.Custom('TerrainTypeProvince')] de [warden.GetCapitalLocation.GetTitle.GetNameNoTier]; onde o temível grupo [attacker.GetPrimaryTitle.GetAdjective] de [attacker.Custom('KnightCulturePluralNoTooltip')|l] pode estar à espera.\n\n"
 bp2_yearly.6205.desc_gift: "Meus cofres transbordam com os presentes [warden.Custom('ES_DelDela')] [warden.GetTitledFirstName|l], mas meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hostage'))] cavalga para a guerra praticamente sozinho[hostage.Custom('ES_OA')].\n\n"
 bp2_yearly.6205.desc_chaperone: "[target_knight.GetFirstName], [warden.Custom2('RelationToMeShort', SCOPE.sC('target_knight'))] [warden.Custom('ES_DelDela')] [warden.GetTitledFirstName|l], será a única escolta de meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hostage'))]. Levando as rédeas ao coração, jura morrer por minha família, se necessário.\n\n"
 bp2_yearly.6205.desc_none: "Alguns jovens esfarrapados se reuniram para servir à causa do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hostage'))], mas minhas hostes ficarão aqui… enquanto [hostage.GetFirstNameNoTooltip] cavalga para a guerra [warden.Custom('ES_DelDela')] [warden.GetTitledFirstName|l].\n\n"
 bp2_yearly.6205.desc_outro: "Mas... foi [warden.GetFirstNameNoTooltip] quem colocou um cenário tão horrível diante de mim! Sendo [Select_CString( warden.IsFemale, 'uma mulher', 'um homem' )] frac[warden.Custom('ES_OA')], envia convidados honrados, como meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hostage'))], a se prostrar diante do ressoar de uma única espada!\n\nE devo confiar que esse #EMP verme#! e sua laia mantenham minha família a salvo?"
 bp2_yearly.6205.a: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hostage'))] ficará aqui"
 bp2_yearly.6205.b: "Farei [warden.GetFirstNameNoTooltip] sofrer por essa afronta!"
 bp2_yearly.6205.c: "Bem... boa sorte, [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hostage'))]."
 bp2_yearly.6170.t: "Um Pacto com os Incivilizados"
 bp2_yearly.6170.desc: "\"Nenhum [ROOT.Char.GetDynastyHouseName] está satisfeito com o que vós fizestes!\", resmunga minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('kin'))] [kin.GetFirstName].\n\n\"Como pudestes enviar [hostage.GetName], meu/minha [kin.Custom2('RelationToMeShort', SCOPE.sC('hostage'))] [hostage.Custom('ComplimentAdjective')], para um salão fétido onde os bárbaros gritam \"[warden.Custom('CulturalCurse')|U]!\" e nunca \"Louvado seja [ROOT.Char.GetFaith.HighGodName]\"? Onde cães defecam livremente sobre selvagens e nobres [warden.GetCulture.GetName] igualmente?\"\n\nDe fato, [warden.GetName] não é da cultura [ROOT.Char.GetCulture.GetName], mas ainda assim é [Select_CString( warden.IsFemale, 'uma digna', 'um digno' )]...\n\n\"Estão mantendo [hostage.GetFirstNameNoTooltip] em uma cabana!\", grita [kin.GetFirstNameNoTooltip]. \"#EMP Cuidai das suas necessidades!#! Seus direitos como [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hostage'))] [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip|l]!\""
 bp2_yearly.6170.a: "Sim, é um ultraje à sua dignidade e à minha."
 bp2_yearly.6170.a.tt: "Meu(a) [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hostage'))] deve ter todos os confortos sofisticados de casa!"
 bp2_yearly.6170.b: "O dever com sua família os une a todos."
 bp2_yearly.6170.b.tt: "O sacrifício de [hostage.GetFirstNameNoTooltip] não será senão um entre muitos a serviço da Casa [ROOT.Char.GetDynastyHouseNameNoTooltip]."
 bp2_yearly.6170.c: "[hostage.GetSheHe|U] deve conhecer como outros povos vivem."
 bp2_yearly.6170.c.tt: "Viver como os incivilizados ensinará meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hostage'))] a viver sem luxos, a ser dur[hostage.Custom('ES_OA')] e engenhos[hostage.Custom('ES_OA')]…"
 bp2_yearly.6170.scheme_bonus: "[close_family|lE] e [spouses|lE] têm maior probabilidade de se juntar aos seus [hostile_schemes|lE] por #high 10 anos#!"
 bp2_yearly.6170.leave_court_bonus: "É menos provável que os [courtiers|E] de [Concept('close_family', 'sua família próxima')|E] vão embora durante #high 10 anos#!"
 lavish_care_modifier: "Cuidado Luxuoso"
 lavish_care_modifier_desc: "Este personagem é mimado por dezenas de serviçais cultos, existindo em riqueza e conforto."
 trained_by_the_uncivilized_modifier: "Treinado por Povo Rústico"
 trained_by_the_uncivilized_modifier_desc: "Como refém, este personagem foi ensinado pelos modos e métodos rústicos de uma cultura 'inferior'."
 cultural_acceptance_hostage_exchange: "Contato através de reféns prestigiosos"
 united_family_modifier: "Família Unida"
 united_family_modifier_desc: "Este personagem exige que seus parentes honrem altamente seus laços uns com os outros."
 bp2_yearly.6180.notification_high: "Reformas: [advanced_culture.GetNameNoTooltip] Governante Satisfeito"
 bp2_yearly.6180_notification_tooltip_high: "[pleased_ruler.Custom('ES_ElLa')|U] [pleased_ruler.GetTitledFirstName|l] elogia seu interesse em imitar a nobre [advanced_culture.GetCollectiveNoun]."
 bp2_yearly.6181.notification_high: "Reformas: Reino Desprezado Denunciado"
 bp2_yearly.6181_notification_tooltip_high: "[disappointed_ruler.Custom('ES_AlAla')|U] [disappointed_ruler.GetTitledFirstName|l] ficou decepcionado porque suas reformas não vão oferecer muitas novas oportunidades para os mercadores da cultura [advanced_culture.GetName]."
 bp2_yearly.6182.notification_high: "Reformas: Senhor Estrangeiro Condena Ritos"
 bp2_yearly.6182_notification_tooltip_high: "[disappointed_ruler.Custom('ES_ElLa')|U] [disappointed_ruler.GetTitledFirstName|l] te exorta a abandonar sua superstição [ROOT.Char.GetCulture.GetName], se quiser entregar seu povo."
 bp2_yearly.6183.notification_high: "Reformas: gentil[disappointed_ruler.GetWomanMan] lamenta a vulgaridade"
 bp2_yearly.6183_notification_tooltip_high: "[disappointed_ruler.Custom('ES_ElLa')|U] [disappointed_ruler.GetTitledFirstName|l] fica desconfiad[disappointed_ruler.Custom('ES_OA')] diante da sua recepção \"selvagem\" aos sofisticados cortesãos da nação [advanced_culture.GetName]."
 bp2_yearly.6184.notification_high: "Reformas: Senhor da Guerra Expressa Desprezo"
 bp2_yearly.6184_notification_tooltip_high: "[disappointed_ruler.Custom('ES_ElLa')|U] [disappointed_ruler.GetTitledFirstName|l] denuncia sua rejeição da elite [advanced_culture.GetName] e seu fraco controle sobre seus vassalos."
 bp2_yearly.6185.notification_high: "Reformas: Mercenários Assaltam [ROOT.Char.Custom('KnightCultureNoTooltip')|l]"
 bp2_yearly.6185_notification_tooltip_high: "[beaten_knight.Custom('ES_ElLa')|U] [beaten_knight.GetTitledFirstName|l] foi severamente espancad[beaten_knight.Custom('ES_OA')] e humilhad[beaten_knight.Custom('ES_OA')] por um bando errante de mercenários vingativos [advanced_culture.GetName]."
 bp2_yearly.6186.notification_high: "Reformas: Rumores de Barbarismo"
 bp2_yearly.6186_notification_tooltip_high: "Sua corte é ridicularizada como um bastião de maneiras incultas, um lugar anátema para cortesãos de culturas refinadas."
 dearth_of_intellectuals_modifier: "Escassez de Intelectuais"
 dearth_of_intellectuals_modifier_desc: "Fanáticos expulsaram muitos estudiosos estrangeiros, missionários e funcionários deste reino deste personagem."
 bereft_of_intellectuals_modifier: "Desprovido de Intelectuais"
 bereft_of_intellectuals_modifier_desc: "Fanáticos expulsaram quase todos os estudiosos estrangeiros, missionários e funcionários deste reino deste personagem."
 bp2_yearly.6187.notification_high: "Reformas: Estrangeiros Habilidosos Fugindo"
 bp2_yearly.6187_notification_tooltip_high: "[zealot_vassal.Custom('ES_ElLa')|U] [zealot_vassal.GetTitledFirstName|l] lidera outros fanáticos na expulsão de eruditos, missionários e funcionários do reino"
 bp2_yearly.6187_no_vassal_notification_tooltip_high: "Fanáticos recém-inflamados estão expulsando estudiosos, missionários e funcionários do reino."
 bp2_yearly.6188.notification_high: "Reformas: Nobreza Local Dominante"
 bp2_yearly.6188_notification_tooltip_high: "Em [isolating_county.GetName], nobres menores empoderados suprimem assentamentos urbanos, sufocam o comércio e acumulam riqueza."
 bp2_yearly.6189.notification_high: "Reformas: Construindo Muito Rapidamente"
 bp2_yearly.6189_notification_tooltip_high: "As grandiosas construções no estilo de [advanced_culture.GetName] de [affected_province.GetName] foram planejadas incorretamente: guerreiros convocados trabalham para evitar um desastre."
 grand_buildings_collapsed_modifier: "Construção Problemática"
 grand_buildings_collapsed_modifier_desc: "Este condado está perturbado pelo caos causado por projetos de construção ambiciosos."
 conscripted_warriors_modifier: "Guerreiros Convocados"
 conscripted_warriors_modifier_desc: "Todos os homens aptos aqui estão exaustos devido ao trabalho árduo e apressado na construção."
 bp2_yearly.6190.notification_high: "Reformas: saqueada [ROOT.Char.GetFaith.HouseOfWorship]"
 bp2_yearly.6190_notification_tooltip_high: "Em [affected_county.GetName], fanáticos locais [ROOT.Char.GetFaith.AltPriestTermPlural] destruíram os preciosos ícones e suprimentos votivos de [advanced_culture.GetName]."
 bp2_yearly.6191.notification_high: "Reformas: Desviando dos Primos"
 bp2_yearly.6191_notification_tooltip_high: "Notáveis [annoyed_culture.GetName] sentem-se alienados pela cultura de sua corte, que fica cada vez mais distinta da deles."
 cultural_acceptance_diverging_court: "[cultures|E] da [court|lE] Divergindo"
 bp2_yearly.6192.notification_high: "Reformas: Vassalo Abandona Confiança"
 bp2_yearly.6192_notification_tooltip_high: "[vassal.Custom('ES_ElLa')|U] [vassal.GetTitledFirstName|l] se sente desorientad[vassal.Custom('ES_OA')] em seu domínio em rápida mudança e já não vê motivo em ser constante e leal."
 bp2_yearly.6193.notification_high: "Reformas: Governança Empoderada"
 bp2_yearly.6193_notification_tooltip_high: "Nunca mais os magnatas esconderão sua riqueza! A infraestrutura no estilo de [advanced_culture.GetName] empodera sua autoridade."
 bp2_yearly.6194.notification_high: "Reformas: Gratidão do Vassalo"
 bp2_yearly.6194_notification_tooltip_high: "[vassal.Custom('ES_ElLa')|U] [vassal.GetTitledFirstName|l] engrandece seu nome diante de seus pares, agradecid[vassal.Custom('ES_OA')] por seus presentes e a reafirmação de seus laços."
 bp2_yearly.6195.notification_high: "Reformas: Presságios Sagrados da Mudança"
 bp2_yearly.6195_notification_tooltip_high: "Muitos duvidaram de você, mas sinais de [ROOT.Char.GetFaith.KnowledgeGodName] sugerem a justiça de suas práticas espirituais de [advanced_culture.GetName]."
 bp2_yearly.6196.notification_high: "Reformas: Uma Descoberta Abençoada"
 bp2_yearly.6196_notification_tooltip_high: "[priest.GetTitledFirstName] oferece um tesouro de riquezas: seja a riqueza que [ROOT.Char.GetFaith.HouseOfWorshipPlural] mantiveram escondida de você... ou uma bênção miraculosa de [ROOT.Char.GetFaith.HighGodName]."
 bp2_yearly.6197.notification_high: "Reformas: Esplendor em Ação"
 bp2_yearly.6197_notification_tooltip_high: "Chega até mim a notícia de que [vassal.Custom('ES_ElLa')|U] [vassal.GetTitledFirstName|l] está imitando os elementos da maneira [advanced_culture.GetName] de minha corte: apenas mais uma reação de admiração."
 custom.every_non_advanced_culture_courtier: "Todo [courtier|lE] que não seja da cultura [advanced_culture.GetName]"
 bp2_yearly.6198.notification_high: "Reformas: Defensor da Corte"
 bp2_yearly.6198_notification_tooltip_high: "[courtier.Custom('ES_ElLa')|U] [courtier.GetTitledFirstName|l], em nome dos teus cortesãos, promete devoção imperecível à tua Casa; provaste que manterás à distância os competidores que tentem tomar o poder."
 bp2_yearly.6199.notification_high: "Reformas: [ROOT.Char.Custom('KnightCultureNoTooltip')|l] Adaptável"
 bp2_yearly.6199_notification_tooltip_high: "[knight.Custom('ES_ElLa')|U] [knight.GetTitledFirstName|l] domina as técnicas marciais de [advanced_culture.GetName] e as emprega com destreza."
 bp2_yearly.6210.notification_high: "Reformas: Inspirado pelo Compromisso"
 bp2_yearly.6210_notification_tooltip_high: "[ruler.Custom('ES_ElLa')|U] [ruler.GetTitledFirstName|l] deseja igualar seu juramento de não derramar sangue [ruler.GetCulture.GetName] com uma proclamação de fraternidade."
 cultural_acceptance_embracing_identity: "Elogios trocados sobre [heritage|lE] comum"
 bp2_yearly.6211.notification_high: "Reformas: Primos Satisfeitos"
 bp2_yearly.6211_notification_tooltip_high: "Senhores e plebeus [pleased_culture.GetName] são inspirados pelo novo fervor entre seus primos [ROOT.Char.GetCulture.GetName] e migram para suas terras em maior número."
 cultural_acceptance_reformer_migration: "Migração e rápida adoção de práticas"
 bp2_yearly.6212.notification_high: "Reformas: Influência de [advanced_culture.GetName]"
 bp2_yearly.6212_notification_tooltip_high: "Famílias urbanas [advanced_culture.GetName] estabeleceram uma nova comunidade em sua capital, enquanto migrantes rústicos se estabelecem no campo."
 bp2_yearly.6212_2_notification_tooltip_high: "A administração diária de [ROOT.Char.GetPrimaryTitle.GetNameNoTier] assumiu um caráter decididamente [advanced_culture.GetName], algo sobre o qual os viajantes costumam comentar."
 bp2_yearly.6213.notification_high: "Reformas: Progresso Brutal"
 bp2_yearly.6213_notification_tooltip_high: "Seus executores tomaram para si a tarefa de reprimir histórias sobre sua doutrinação [advanced_culture.GetName] e a crueldade de seus métodos [advanced_culture.GetName]."
 bp2_yearly.6213_notification_2_tooltip_high: "Ritos tradicionais [ROOT.Char.GetCulture.GetName] foram ignorados, direitos tradicionais abusados, pelos funcionários [advanced_culture.GetName] que executam sua vontade."
 bp2_yearly.6214.notification_high: "Reformas: Transição das Comunidades"
 bp2_yearly.6214_notification_1_tooltip_high: "Comerciantes e artesãos de [affected_county.GetName] operam sob novos acordos e leis, competindo pelas moedas no estilo de [advanced_culture.GetName] agora em circulação."
 bp2_yearly.6214_notification_2_tooltip_high: "Pequenos [ROOT.Char.Custom('KnightCulturePluralNoTooltip')|l] e proprietários de terras livres truculentos de [affected_county.GetName] concordaram com os termos de serviço e fidelidade no estilo de [advanced_culture.GetName], reduzindo a violência e a discórdia local."
 bp2_yearly.6214_notification_3_tooltip_high: "[ROOT.Char.GetFaith.HouseOfWorshipPlural|U] de [affected_county.GetName] e paróquias de aldeias agora são administrados por homens refinados e instruídos, promovendo a educação e a governança no estilo de [advanced_culture.GetName]."
 bp2_yearly.6215.notification_high: "Reformas: Um [ROOT.Char.GetTitleAsNameNoTooltip|l] de Intenção"
 bp2_yearly.6215_notification_1_tooltip_high: "Magnatas voltados para a riqueza instam seus mestres a imitar seu famoso interesse em emendar a sociedade e o comércio [ROOT.Char.GetCulture.GetName]."
 bp2_yearly.6215_notification_2_tooltip_high: "O vigor guerreiro de sua comitiva, um exército combativo temperado por seu desejo de renascer [ROOT.Char.GetPrimaryTitle.GetNameNoTier], é amplamente respeitado."
 bp2_yearly.6215_notification_3_tooltip_high: "As cerimônias de seus salões sagrados são rumores por toda parte, enquanto as pessoas especulam avidamente sobre a natureza dividida de sua alma [ROOT.Char.GetCulture.GetName]."
 bp2_yearly.6216.notification_high: "Reformas: é [ROOT.Char.GetSheHe] #EMP noss[ROOT.Char.Custom('ES_OA')]#! [ROOT.Char.GetTitleAsNameNoTooltip|l]?"
 bp2_yearly.6216_notification_tooltip_high: "Seus agentes relatam murmúrios e cochichos entre a nobreza... será que algum tipo de adulador meio-[advanced_culture.GetName] merece sua reverência?"
 bp2_yearly.6216_notification_2_tooltip_high: "Um rumor se espalha sobre um complô estrangeiro... um fantoche corrompido por [advanced_culture.GetCollectiveNoun] e plantado no trono [ROOT.Char.GetPrimaryTitle.GetAdjective]..."
