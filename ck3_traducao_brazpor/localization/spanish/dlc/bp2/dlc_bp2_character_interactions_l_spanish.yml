 guardian_influenced_personality: "Influenciar Personalidade da Criança"
 guardian_influenced_personality_desc: "[actor.GetShortUINameNoTooltip] transmitiu à sua criança o traço [target_trait.GetName(recipient)|l] de seu filh[recipient.Custom('ES_OA')] [recipient.GetShortUINameNoTooltip]."
 guardian_influenced_personality_fail: "Falha ao Influenciar Personalidade da Criança"
 guardian_influenced_personality_fail_desc: "[actor.GetShortUINameNoTooltip] tentou transmitir o traço [target_trait.GetName(actor)|l] ao seu filh[recipient.Custom('ES_OA')], [recipient.GetShortUINameNoTooltip], mas falhou."
