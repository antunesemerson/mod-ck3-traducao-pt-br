l_spanish:
 influence_child_personality_interaction: "Influenciar Personalidade do Pupilo"
 influence_child_personality_interaction_desc: "Transmitir um [personality_trait|lE] ao seu [ward|lE]"
 had_guardian_influence_interaction: "Teve a interação recentemente [DATE.GetStringLong]"
 bp2_character_interaction.1001.t: "$influence_child_personality_interaction$: [target_trait.GetNameNoTooltip(GetPlayer)] — Successo"
 bp2_character_interaction.1001.desc_intro: "Me aproximo a meu [ROOT.Char.Custom2('RelationToMeShort', recipient)] [recipient.GetFirstName]"
 bp2_character_interaction.desc_lustful: "com a pergunta: \"Você conhece o amor?\".\n\n\"Sim\", responde [recipient.GetSheHe] com cautela. \"Eu amo meus parentes! E… bem… há alguém em quem não consigo parar de pensar…\".\n\n\"Persiga esse sentimento, [recipient.Custom('GirlBoy')]. O romance e a satisfação não nos encontram simplesmente — é preciso ir atrás deles! Abrace essa busca, pois seu desejo é simplesmente humano\".\n\n"
 bp2_character_interaction.1001.desc_lustful: "$bp2_character_interaction.desc_lustful$\"Ah, isso é bom,\" [recipient.GetSheHe] ri. \"Talvez um dia eu tenha beijado todo o [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip|l]!\""
 bp2_character_interaction.desc_chaste: "com a pergunta: \"Olhar para outra pessoa alguma vez fez seu coração se inflamar?\".\n\n\"Sim…\", responde [recipient.GetSheHe] vacilante. \"Às vezes\".\n\n\"Essa chama deve ser apagada. Enquanto seu coração arde com o fogo de [ROOT.Char.GetFaith.NegativeAfterLife], você acha que [ROOT.Char.GetFaith.FertilityGodName] o abençoará? Enquanto se entrega a desejos imundos? Não! Lembre-se, [recipient.Custom('GirlBoy')]: a luxúria é a ruína\".\n\n"
 bp2_character_interaction.1001.desc_chaste: "$bp2_character_interaction.desc_chaste$\"Eu juro,\" efunde [recipient.GetFirstNameNoTooltip], \"abominar a carne!\""
 bp2_character_interaction.desc_gluttonous_common: "e seu rosto culpado e engordurado, para lhe perguntar: \"O que você andou comendo…?\"\n\n\"Oh! Como terá vindo parar aqui um(a) semelhante [recipient.Custom('GetLocalStreetFood')]?\"\n\n"
 bp2_character_interaction.desc_gluttonous: "$bp2_character_interaction.desc_gluttonous_common$\"Os servos trouxeram mais para você?\", sorrio. \"Estou #EMP famint[ROOT.Char.Custom('ES_OA')]!#!\"\n\nEnquanto compartilhamos o banquete, incentivo [recipient.Custom('ES_AlAla')] [recipient.Custom('GirlBoy')] a comer; comer para crescer forte. \"Não se envergonhe dos sonhos e dos desejos! Saboreie todas as dádivas da corte.\"\n\n"
 bp2_character_interaction.1001.desc_gluttonous: "$bp2_character_interaction.desc_gluttonous$\"\"Com prazer!\" [recipient.GetSheHe] arrota."
 bp2_character_interaction.desc_temperate: "$bp2_character_interaction.desc_gluttonous_common$Eu pego o [recipient.Custom('GetLocalStreetFood')] e jogo-o para longe. \"Você não tem #EMP paciência?! Nenhum controle?#! Jure moderar-se em todas as coisas, [recipient.Custom('GirlBoy')]. Jure sua contenção a [ROOT.Char.GetFaith.HealthGodName]! O mundo não precisa de mais um degenerado.\"\n\n"
 bp2_character_interaction.1001.desc_temperate: "$bp2_character_interaction.desc_temperate$\"Eu juro\", entoa [recipient.GetSheHe]. \"[recipient.Custom2('RelationToMeShort', ROOT.Char)|U] meu[ROOT.Char.Custom('ES_OA')], estou tão envergonhad[recipient.Custom('ES_OA')]…\"."
 bp2_character_interaction.desc_greedy_common: "enquanto [recipient.GetSheHe] empunha um arco, gritando o nome de outro jovem. \n\n“Um dos pajens dos [ROOT.Char.Custom('KnightCulturePluralNoTooltip')|l]”, grita. “Vou atravessar sua garganta por reclamar o que é meu!”.\n\n"
 bp2_character_interaction.desc_greedy: "$bp2_character_interaction.desc_greedy_common$\"\"Fique calmo, pois a mente calculista é a que mais prospera. Sim, todos irão suplicar, mas, uma vez que saibam que você protege o que é seu, eles se rendem. Nenhum deles pode tirar sangue de uma pedra! Não dê nem sangue nem ouro, [recipient.GetFirstNameNoTooltip].\"\n\n"
 bp2_character_interaction.1001.desc_greedy: "$bp2_character_interaction.desc_greedy$\"\"Ou,\" [recipient.GetSheHe] responde. \"Talvez uma troca... uma #EMP muito#! vantajosa troca..."
 bp2_character_interaction.desc_generous: "$bp2_character_interaction.desc_greedy_common$\"Quantas desavenças haverá por causa de ninharias? Abaixe o arco, [recipient.Custom('GirlBoy')]. Você nunca perderá algo tão precioso quanto a honra. E, se for sábi[recipient.Custom('ES_OA')], tudo o que doar ainda lhe servirá.\"\n\n"
 bp2_character_interaction.1001.desc_generous: "$bp2_character_interaction.desc_generous$\"Enquanto você viver por mim,\" suspira [recipient.GetFirstNameNoTooltip], \"eu posso tentar viver por outros.\""
 bp2_character_interaction.desc_lazy_common: "e pergunto: \"Quando eu o chamo para me atender, você serve bem?\".\n\n\"Eu… faço o melhor que posso, [ROOT.Char.GetTitleAsNameNoTooltip|l]\".\n\n"
 bp2_character_interaction.desc_lazy: "$bp2_character_interaction.desc_lazy_common$“Na verdade... cumprir as normas sem esforço é tão bom quanto superá-las”, digo, despenteando[recipient.GetHerHim]. “No fim das contas, você vai se tornar o que tiver de se tornar. Vamos acabar logo com toda essa enrolação de ‘serviço’! Talvez você devesse tirar cochilos com mais frequência.”\n\n"
 bp2_character_interaction.1001.desc_lazy: "$bp2_character_interaction.desc_lazy$Com um pequeno bocejo, [recipient.GetFirstNameNoTooltip] concorda. \"Ah, sim!\""
 bp2_character_interaction.desc_diligent: "$bp2_character_interaction.desc_lazy_common$O seu melhor? Eu não espero habilidade de você ainda, [recipient.Custom('GirlBoy')]. Eu espero perseverança. Você não sente a alegria do jogo quando fez um bom trabalho? Pare de duvidar, pensando — faça! Apenas faça!\"\n\n"
 bp2_character_interaction.1001.desc_diligent: "$bp2_character_interaction.desc_diligent$[recipient.GetFirstNameNoTooltip] se levanta. \"Eu não vou te decepcionar, [recipient.Custom2('RelationToMeShort', ROOT.Char)]!\""
 bp2_character_interaction.desc_wrathful_common: "com a pergunta: \"O que é poderá\"\n\n"
 bp2_character_interaction.desc_wrathful: "$bp2_character_interaction.desc_wrathful_common$Uma pequena chama tremeluz em seus olhos enquanto respondo. \"O poder é liberdade na raiva. Liberdade para derrubar, para humilhar, aqueles que nos provocam ira.\"\n\n\"Como quando um[recipient.Custom('ES_XA')] [recipient.Custom('GirlBoy')] idiota rasgou minha capa! Nunca tinha sentido tanto ardor\", exclama [recipient.GetSheHe], enquanto dou minha aprovação vaidos[ROOT.Char.Custom('ES_OA')].\n\n"
 bp2_character_interaction.1001.desc_wrathful: "$bp2_character_interaction.desc_wrathful$\"Só espere,\" [recipient.GetSheHe] grita, \"os tolos aprenderão #EMP Eu respiro fogo!#!\""
 bp2_character_interaction.desc_calm: "$bp2_character_interaction.desc_wrathful_common$\"Ter [ROOT.Char.Custom('KnightCulturePluralNoTooltip')|l] e nobres sob meu comando? Hoje perdi meu/minha melhor [recipient.Custom('GetAccessory')] e parece que ninguém se importa...\"\n\n\"O poder começa com o poder sobre si mesmo\", explico. \"Ao olhar para os outros, ao ficar irritado e atacar, você afasta sentimentos de impotência e tolice. Em vez disso, respire fundo e encontre um julgamento claro.\"\n\n"
 bp2_character_interaction.1001.desc_calm: "$bp2_character_interaction.desc_calm$Depois de uma pausa, [recipient.GetFirstName] suspira e diz: \"Eu vou tentar.\""
 bp2_character_interaction.desc_impatient_common: "e coloco um ovo em sua mão, dizendo: \"Segure isto. Volto já\".\n\nVou embora e continuo o meu dia. Depois de algumas horas, volto e me [recipient.GetHerHim] encontro curv[recipient.Custom('ES_OA')] no mesmo banco, com o ovo ainda na mão.\n\n"
 bp2_character_interaction.desc_impatient: "$bp2_character_interaction.desc_impatient_common$Dou um tapa na palma da mão dele/dela, quebrando o ovo. Uma gosma envolve a mão — que choque no rosto dele/dela!\n\n\"Você desperdiçou o dia, [recipient.Custom('GirlBoy')]...\", digo enquanto vou embora.\n\n"
 bp2_character_interaction.1001.desc_impatient: "$bp2_character_interaction.desc_impatient$\"Nunca vou esperar por você novamente!\" [recipient.GetFirstNameNoTooltip] uiva. \"#EMP Eu juro isso!#!\""
 bp2_character_interaction.desc_patient: "$bp2_character_interaction.desc_impatient_common$Tiro das mãos dele(a) e [recipient.GetHerHim] abraço. \"Estou muito orgulhos[ROOT.Char.Custom('ES_OA')] de você. Como a galinha nutre a vida? Como o galo vigilante protege suas companheiras? Com paciência\".\n\n"
 bp2_character_interaction.1001.desc_patient: "$bp2_character_interaction.desc_patient$[recipient.GetFirstNameNoTooltip] sorri. \"Foi bom ter tempo para pensar.\""
 bp2_character_interaction.desc_arrogant_common: "e [recipient.GetHerHim] o parabenizo por vencer um de seus tutores em [SCOPE.Custom('BG_GameType_Generic')].\n\n\"Não foi nada\", responde [recipient.GetSheHe]. \"Na verdade, já venci a maioria dos adultos com quem joguei!\".\n\n"
 bp2_character_interaction.desc_arrogant: "$bp2_character_interaction.desc_arrogant_common$\"Excelente. Isso, [recipient.Custom('GirlBoy')], é porque você tem um grande destino. Não tema o seu orgulho: apenas covardes não têm fé em suas habilidades! Deixe todos verem quem você é, e eles o honrarão como tal!\"\n\n"
 bp2_character_interaction.1001.desc_arrogant: "$bp2_character_interaction.desc_arrogant$\"Ha!\", zomba [recipient.GetFirstNameNoTooltip]. \"Talvez você esteja com um pouco de ciúmes?\""
 bp2_character_interaction.desc_humble: "$bp2_character_interaction.desc_arrogant_common$\"Você gostaria de se medir… contra mim? Convidaremos todo o meu [ROOT.Char.GetPrimaryTitle.GetTierAsName|l]\", finjo enquanto [recipient.GetFirstNameNoTooltip] se encolhe e protesta.\n\n\"Devemos tomar cuidado\", digo, \"para não nos embriagarmos tanto com nossas virtudes a ponto de faltarmos com o respeito, de nos equivocarmos sobre nossas capacidades\".\n\n"
 bp2_character_interaction.1001.desc_humble: "$bp2_character_interaction.desc_humble$\"Por favor!\" implora [recipient.GetFirstNameNoTooltip]. \"Me perdoe!\""
 bp2_character_interaction.desc_deceitful_common: "com a pergunta: \"Você está mentindo para mim?\"\n\n\"Eu... ah... nunca!\".\n\n"
 bp2_character_interaction.desc_deceitful: "$bp2_character_interaction.desc_deceitful_common$\"Agora você está mentindo\", rio. \"E muito mal. Quando aprenderá a manter mentiras pequenas, mas constantes, todas com o doce sabor da verdade? Deseja ser um[recipient.Custom('ES_XA')] grande [recipient.GetWomanMan]? O mundo é um ninho de cobras, e só as mais astutas se coroam sobre as demais\".\n\n"
 bp2_character_interaction.1001.desc_deceitful: "$bp2_character_interaction.desc_deceitful$\"Oh, meu(a) [recipient.Custom2('RelationToMeShort', ROOT.Char)]! Você é a cobra que eu mais amo,\" mente [recipient.GetFirstNameNoTooltip]."
 bp2_character_interaction.desc_honest: "$bp2_character_interaction.desc_deceitful_common$\"Talvez. Isso é algo que não posso saber\", explico. \"Mas você não consegue #EMP sentir#! uma mentira, [recipient.Custom('GirlBoy')]? Eu conheço mentirosos: são pessoas sem honra, sem consideração pelo que a mentira possa causar... é isso que você quer ser?\"\n\n"
 bp2_character_interaction.1001.desc_honest: "$bp2_character_interaction.desc_honest$\"Bem... Já menti antes\", admite [recipient.GetFirstNameNoTooltip]. \"Mas desejo ser como você, [recipient.Custom2('RelationToMeShort', ROOT.Char)]. Bom[recipient.Custom('ES_OA')] e sincer[recipient.Custom('ES_OA')]!\""
 bp2_character_interaction.desc_craven_common: "e [recipient.GetHerHim] agarro-o pelo colarinho, cuspindo: #EMP \"Golpéame!\"#!.\n\n[recipient.GetSheHe|U] se encolhe, protestando: \"Mas você é [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip|l]!\".\n\n"
 bp2_character_interaction.desc_craven: "$bp2_character_interaction.desc_craven_common$Na verdade, eu sou, [recipient.Custom('GirlBoy')]. Colocar a mão em mim trará um terrível castigo. Você deve lembrar disso: o dever e a paixão podem destruir você igualmente. É melhor sobreviver do que morrer por tolice!\"\n\n"
 bp2_character_interaction.1001.desc_craven: "$bp2_character_interaction.desc_craven$[recipient.GetFirstNameNoTooltip] se humilha. \"Por favor, não me machuque!\", implora."
 bp2_character_interaction.desc_brave: "$bp2_character_interaction.desc_craven_common$\"Faça isso!\" Eu insisto, até que ele me acerte no meu rosto sorridente.\n\n\"Não tema, [recipient.Custom('GirlBoy')]! Porque se você pode me golpear, o que #EMP no#! poderá fazer? Tente, esforce-se, fracasse! Então você morrerá por honra, amor, dever — tudo melhor do que uma morte sem sentido no leito!\".\n\n"
 bp2_character_interaction.1001.desc_brave_self: "$bp2_character_interaction.desc_brave$\"[recipient.GetFaith.HighGodName] e [recipient.GetPrimaryTitle.GetNameNoTier]!\" grita [recipient.GetFirstNameNoTooltip]. \"Eu não vou falhar!\""
 bp2_character_interaction.1001.desc_brave_liege: "$bp2_character_interaction.desc_brave$\"[recipient.GetFaith.HighGodName] e [recipient.GetLiege.GetPrimaryTitle.GetNameNoTier]!\" exclama [recipient.GetFirstNameNoTooltip]. \"Eu não vou falhar!\""
 bp2_character_interaction.1001.desc_brave_root: "$bp2_character_interaction.desc_brave$\"[recipient.GetFaith.HighGodName] e [ROOT.Char.GetPrimaryTitle.GetNameNoTier]!\" exclama [recipient.GetFirstNameNoTooltip]. \"Eu não vou falhar!\""
 bp2_character_interaction.desc_shy_common: "enquanto [recipient.GetSheHe] joga soz[recipient.Custom('ES_OA')], algo que ultimamente tem feito com bastante frequência. Pergunto: \"Por quê?\"\n\n\"Que sentido tem, [recipient.Custom2('RelationToMeShort', ROOT.Char)] meu[ROOT.Char.Custom('ES_OA')]? As risadinhas, as fofocas… tudo isso é só um desperdício\".\n\n"
 bp2_character_interaction.desc_shy: "$bp2_character_interaction.desc_shy_common$Isso nunca muda, receio,\" suspiro. \"Você sempre enfrentará pedidos para passar tempo com os outros, para ser apenas um rosto público sem alma privada. Mantenha-se firme. Há graça na solidão.\"\n\n"
 bp2_character_interaction.1001.desc_shy: "$bp2_character_interaction.desc_shy$[recipient.GetFirstNameNoTooltip] murmura consentimento, evitando contato visual comigo."
 bp2_character_interaction.desc_gregarious: "$bp2_character_interaction.desc_shy_common$\"Pense,\" respondo. \"Existem memórias queridas de momentos sozinho? Onde está a excitação, o calor e o amor? Se você quiser, posso ensinar a contar histórias, a fazer piadas: o riso e os cochichos estarão sob o seu comando!\"\n\n"
 bp2_character_interaction.1001.desc_gregarious: "$bp2_character_interaction.desc_gregarious$\"Certo,\" sorri [recipient.GetFirstNameNoTooltip]. \"Me ensine.\""
 bp2_character_interaction.desc_ambitious_common: "com a pergunta: \"Você gosta de ser criança?\"\n\n\"Não\", [recipient.GetSheHe] arruga o nariz. \"Os adultos me tratam como um cachorro! Eles sempre me dizem o que eu tenho que fazer!\"\n\n"
 bp2_character_interaction.desc_ambitious: "$bp2_character_interaction.desc_ambitious_common$Prove a eles o quão tolos são! Mostre entusiasmo; esforce-se para ser mais do que você é. A menos que... você #EMP queira#! ser desprezado como uma criança... mesmo quando seu corpo murcha com a idade?\"\n\n"
 bp2_character_interaction.1001.desc_ambitious: "$bp2_character_interaction.desc_ambitious$\"Não! Há muito a ser feito,\" responde [recipient.GetFirstNameNoTooltip]. \"Espere só! Todos vão olhar para a minha liderança um dia.\""
 bp2_character_interaction.desc_content: "$bp2_character_interaction.desc_ambitious_common$\"Mas,\" eu contraponho, \"você deseja resolver disputas de propriedade, calcular impostos e sentir que aqueles que você ama dependem de você completamente, sempre? Logo, brincar não será mais para você. Aproveite o que você tem, [recipient.Custom('GirlBoy')]. Aproveite profundamente.\"\n\n"
 bp2_character_interaction.1001.desc_content: "$bp2_character_interaction.desc_content$\"Estou agradecid[recipient.Custom('ES_OA')]; estou mesmo! Por este tempo com você, [recipient.Custom2('RelationToMeShort', ROOT.Char)]\", sorri [recipient.GetFirstNameNoTooltip]."
 bp2_character_interaction.desc_arbitrary_common: "carregando um(a) [recipient.Custom( 'child_favorite_toy' )], o brinquedo favorito de outra criança, dizendo: \"Você pode ficar com isto\".\n\n\"Por quê?\", pergunta. \"Eu nem quero isso\".\n\n"
 bp2_character_interaction.desc_arbitrary: "$bp2_character_interaction.desc_arbitrary_common$Então jogue-o fora! É apenas um símbolo, [recipient.Custom('GirlBoy')]. Aja apenas com base em seus próprios sentimentos e julgamentos, desconsidere regras e leis, e você será livre para fazer o que desejar. Você pode ter tudo o que desejar.\"\n\n"
 bp2_character_interaction.1001.desc_arbitrary: "$bp2_character_interaction.desc_arbitrary$\"Sim,\" concorda [recipient.GetFirstNameNoTooltip], pegando o brinquedo, \"por que tentar ser justo em um mundo injusto?\""
 bp2_character_interaction.desc_just: "$bp2_character_interaction.desc_arbitrary_common$\"Não? Por quê? É natural desejar o que não é seu, se empolgar ao superar os outros. Por que não pegar o que puder e permitir que eu use meu poder como desejar?\"\n\n"
 bp2_character_interaction.1001.desc_just: "$bp2_character_interaction.desc_just$“Não seja um tirano[ROOT.Char.Custom('ES_OA')], [ROOT.Char.GetTitleAsNameNoTooltip|l]! Isso não está certo!”.\n\n“De fato”, eu sorrio. “É injusto”."
 bp2_character_interaction.desc_cynical_common: "com a pergunta: \"Por que sigo a [recipient.GetFaith.GetName]?\"\n\n\"Porque [ROOT.Char.GetFaith.HighGodName] é bom\", recita [recipient.GetSheHe].\n\n"
 bp2_character_interaction.desc_cynical: "$bp2_character_interaction.desc_cynical_common$Não apenas bom, mas também #EMP poderoso#!. [ROOT.Char.GetFaith.HighGodName] mantém a ordem nos reinos [recipient.GetFaith.GetAdjectiveNoTooltip]. E ao invocar o sagrado, [ROOT.Char.GetFaith.AltPriestTermPlural] podem imitar lordes e [ROOT.Char.GetFaith.DevoteeNeuterPlural] podem buscar ganho terreno. Você enxerga a mão de [ROOT.Char.GetFaith.HighGodName] nessas coisas? Ou os artifícios dos humanos?\"\n\n"
 bp2_character_interaction.1001.desc_cynical: "$bp2_character_interaction.desc_cynical$\"Eu vejo...\" luta [recipient.GetFirstNameNoTooltip], \"um mundo triste.\""
 bp2_character_interaction.desc_zealous: "$bp2_character_interaction.desc_cynical_common$\"Sim. Sua bondade é [ROOT.Char.GetFaith.HighGodNamePossessive]. Sua sabedoria é [ROOT.Char.GetFaith.KnowledgeGodNamePossessive]. Sua coragem é [ROOT.Char.GetFaith.WarGodNamePossessive]. Deseja estar sozinh[recipient.Custom('ES_OA')] neste mundo, vazi[recipient.Custom('ES_OA')]? Ou quer ser a voz do divino? Posso guiá-lo até isso.\"\n\n"
 bp2_character_interaction.1001.desc_zealous: "$bp2_character_interaction.desc_zealous$\"Estou arrepiado, [recipient.Custom2('RelationToMeShort', ROOT.Char)]!\" grita [recipient.GetFirstNameNoTooltip]. \"Sinto o favor de [recipient.GetFaith.HighGodName]!\""
 bp2_character_interaction.desc_paranoid_common: "com a pergunta: \"Em quem você mais confia?\"\n\n\"Claro — em você\", responde diligentemente [recipient.GetSheHe].\n\n"
 bp2_character_interaction.desc_paranoid: "$bp2_character_interaction.desc_paranoid_common$\"Então, acredite em mim quando eu digo que... na corte, estamos sempre sendo vigiados. Ouça os sussurros atrás de suas costas. Nem... nem confie em mim...\".\n\nUm rosto escurece uma janela próxima. \"#EMP Rápido!#!\", rosno. \"Atrás de mim, [recipient.Custom('GirlBoy')]!\".\n\n"
 bp2_character_interaction.1001.desc_paranoid: "$bp2_character_interaction.desc_paranoid$[recipient.GetFirstNameNoTooltip] corre para minha proteção, revelando uma adaga habilmente escondida."
 bp2_character_interaction.desc_trusting: "$bp2_character_interaction.desc_paranoid_common$Ajoelho-me diante de [recipient.GetSheHe] e tomo sua mão entre as minhas.\n\n\"Juro jamais lhe falhar, [recipient.Custom('GirlBoy')]. Você #EMP debes#! deve depender dos outros para sobreviver neste mundo mortal, e entre todos aqueles de quem você pode depender… sempre serei eu\".\n\n"
 bp2_character_interaction.1001.desc_trusting: "$bp2_character_interaction.desc_trusting$Uma lágrima se formando nos olhos, [recipient.GetFirstNameNoTooltip] responde: \"Eu confio em você.\""
 bp2_character_interaction.desc_compassionate: "$bp2_character_interaction.desc_callous_common$\"Seus corações são bons\", murmuro, abraçando[recipient.GetHerHim]. \"Mas o poder pode cegar, e a força, fascinar. Não deixe que os vislumbres malignos ceguem seu coração; em vez disso, veja neles a necessidade de gentileza\".\n\n"
 bp2_character_interaction.1001.desc_compassionate: "$bp2_character_interaction.desc_compassionate$\"Vou tentar ser nobre por todos os meus dias!\" chora [recipient.GetFirstNameNoTooltip]."
 bp2_character_interaction.desc_callous_common: "com preocupação. [recipient.GetSheHe|U] esteve presente quando um dos meus [ROOT.Char.Custom('KnightCulturePluralNoTooltip')|l] mutilou recentemente um servo desobediente.\n\nA criança assustada pergunta: \"Por que as pessoas são tão violentas?\".\n\n"
 bp2_character_interaction.desc_callous: "$bp2_character_interaction.desc_callous_common$\"Aquele servo,\" respondo, \"só fará seu trabalho por medo de espancamentos. Sem violência, sem força, nosso lugar neste mundo está perdido. Além disso... você deseja desperdiçar sua vida chorando por servos?\"\n\n"
 bp2_character_interaction.1001.desc_callous: "$bp2_character_interaction.desc_callous$\"Eca,\" zomba [recipient.GetFirstNameNoTooltip], \"Não.\""
 bp2_character_interaction.desc_sadistic: "$bp2_character_interaction.desc_callous_common$\"O mundo é violência\", respondo. \"As pessoas são fracas e egoístas, niñ[recipient.Custom('ES_OA')]. E são muitas. Derramar o sangue delas não tem sentido. Pense no poder que meu [ROOT.Char.Custom('KnightCultureNoTooltip')|l]. Você gostaria desse poder, não gostaria?...\".\n\n"
 bp2_character_interaction.1001.desc_sadistic: "$bp2_character_interaction.desc_sadistic$\"Sim,\" sussurra [recipient.GetFirstNameNoTooltip], \"Sim, eu gostaria...\""
 bp2_character_interaction.desc_stubborn: "cheio[ROOT.Char.Custom('ES_OA')] de convicção, perguntando: \"Que alegrias te aguardam hoje?\"\n\n\"Ah... meus amigos me convenceram a voltar a colher flores idiotas...\"\n\n\"[recipient.GetFirstNameNoTooltip]!\", eu grito. \"Quanto da vida você vai desperdiçar nos caprichos dos outros? Apegue-se ao seu julgamento; mantenha-se firme como um [ROOT.Char.Custom('KnightCultureNoTooltip')|l]! Você não acha que sua escolha será a mais divertida?\"\n\n"
 bp2_character_interaction.1001.desc_stubborn: "$bp2_character_interaction.desc_stubborn$\"Sim,\" reflete [recipient.GetSheHe], \"eu sei o que eu quero! Por que eu deixaria alguém me mudar?\""
 bp2_character_interaction.desc_fickle: "por capricho, perguntando: \"Que alegrias te aguardam hoje?\".\n\nEnquanto [recipient.GetSheHe] enumera planos, me encolho.\n\n\"Com que facilidade um inimigo poderia rastrear seus movimentos! Pense em quão cedo esses mesmos prazeres perderão a graça! É possível planejar sentir alegria? Conhecer a dor? Não! Dê a si mesmo a liberdade de fazer o que quiser\".\n\n"
 bp2_character_interaction.1001.desc_fickle: "$bp2_character_interaction.desc_fickle$[recipient.GetSheHe|U] dá de ombros e diz: \"Claro. De qualquer forma, eu não estou mais interessado nessas coisas.\""
 bp2_character_interaction.desc_eccentric: "e arremesso habilmente uma ratazana que se contorce para o seu colo.\n\nAssim que [recipient.GetSheHe] termina de pular e uivar de surpresa, me pergunta: \"Por quê? Por quê?!\".\n\n\"Ninguém deveria viver miseravelmente envergonhado por suas peculiaridades. E, sobretudo, não um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]! Despreze as expectativas, trilhe seu próprio caminho e você se tornará… algo. Algo grandioso\".\n\n"
 bp2_character_interaction.1001.desc_eccentric: "$bp2_character_interaction.desc_eccentric$\"Rindo, meu(a) [ROOT.Char.Custom2('RelationToMeShort', recipient)] mostra a língua em acordo."
 bp2_character_interaction.desc_vengeful: "enquanto [recipient.GetSheHe] lamenta com mau humor uma derrota de [ROOT.Char.Custom('BG_GameType_Generic')].\n\n\"Esse velhaco trapaceou!\", insiste [recipient.GetSheHe]. \"Será que meus amigos algum dia vão parar de tentar passar a perna em mim?\"\n\nAproveito o momento, dizendo: \"Eles sabem que podem te afrontar sem medo, crianç[recipient.Custom('ES_OA')]. Espeta uma peça no olho do trapaceiro! Quebra o tabuleiro nas costas do trapaceiro! Que todos saibam que você não perdoa nenhuma ofensa.\"\n\n"
 bp2_character_interaction.1001.desc_vengeful: "$bp2_character_interaction.desc_vengeful$\"Vingança,\" ri [recipient.GetFirstName], \"Eu tenho algumas ideias...\""
 bp2_character_interaction.desc_forgiving: "enquanto [recipient.GetSheHe] lamenta de cara amarrada uma derrota em [ROOT.Char.Custom('BG_GameType_Generic')].\n\n\"A garota fez trapaça!\", insiste [recipient.Custom('ES_ElLa')] [recipient.Custom('GirlBoy')]. \"Ela merecia aquela ficha no olho! Mas... ela não quer mais ser minha amiga...\"\n\nAproveito o momento, dizendo: \"Pense no perdão. Deixe-o viver sempre no seu coração. Se você tivesse tido misericórdia da trapaceira, não teria agora uma amiga a mais?\"\n\n"
 bp2_character_interaction.1001.desc_forgiving: "$bp2_character_interaction.desc_forgiving$\"Sim\", suspira. \"Vou me lembrar disso\"."
 bp2_character_interaction.1001.a: "É[recipient.Custom('ES_EA')] é minha [recipient.Custom('GirlBoy')]!"
 bp2_character_interaction.1001.a.tt: "Traço [target_trait.GetNameNoTooltip(GetPlayer)|l] herdado"
 bp2_character_interaction.1001.a.flavor: "Vocês começam a se entender melhor, e [recipient.GetSheHe] começa a se assemelhar mais a você."
 bp2_character_interaction.1002.t: "$influence_child_personality_interaction$: [target_trait.GetNameNoTooltip(GetPlayer)] — Falhou"
 bp2_character_interaction.1002.desc_intro: "$bp2_character_interaction.1001.desc_intro$"
 bp2_character_interaction.1002.desc_lustful: "$bp2_character_interaction.desc_lustful$Oh...\" [recipient.GetSheHe] resmunga. \"Mas há tantas coisas #EMP melhores#! para fazer..."
 bp2_character_interaction.1002.desc_chaste: "$bp2_character_interaction.desc_chaste$Mas...\" lamenta [recipient.GetFirstNameNoTooltip], \"meu coração não me trairia assim!"
 bp2_character_interaction.1002.desc_gluttonous: "$bp2_character_interaction.desc_gluttonous$Mas... eu só quero sentir #EMP controle#!..."
 bp2_character_interaction.1002.desc_temperate: "$bp2_character_interaction.desc_temperate$“Mas… só uma porção de [recipient.Custom('GetLocalStreetFood')]?”, protesta. “E [ROOT.Char.GetFaith.HealthGodName] permite tanta alegria com isso!”."
 bp2_character_interaction.1002.desc_greedy: "$bp2_character_interaction.desc_greedy$Uma pedra?\" pergunta [recipient.GetSheHe]. \"Sim... eu acho que ninguém gosta de alguém duro como uma pedra..."
 bp2_character_interaction.1002.desc_generous: "$bp2_character_interaction.desc_generous$Me dê um novo chapéu dourado,\" implora [recipient.GetFirstNameNoTooltip], \"E eu vou #EMP pensar#! nisso..."
 bp2_character_interaction.1002.desc_lazy: "$bp2_character_interaction.desc_lazy$Não!\" responde [recipient.GetFirstNameNoTooltip]. \"Eu não posso falhar! Eu vou me esforçar mais."
 bp2_character_interaction.1002.desc_diligent: "$bp2_character_interaction.desc_diligent$Eu não sei o que fazer!\" lamenta [recipient.GetFirstNameNoTooltip]. \"Por favor, me deixe sozinho..."
 bp2_character_interaction.1002.desc_wrathful: "$bp2_character_interaction.desc_wrathful$\"Mas…\" ele/ela engole em seco. \"Nunca quero sentir isso de novo…\"."
 bp2_character_interaction.1002.desc_calm: "$bp2_character_interaction.desc_calm$Meu julgamento é claro!\" retruca [recipient.GetFirstNameNoTooltip]. \"Eu julgo isso como estúpido!"
 bp2_character_interaction.1002.desc_impatient: "$bp2_character_interaction.desc_impatient$Eh...\" eu ouço [recipient.GetFirstNameNoTooltip] resmungar, \"ficar de galinha foi bastante relaxante."
 bp2_character_interaction.1002.desc_patient: "$bp2_character_interaction.desc_patient$Bem,\" resmunga [recipient.GetFirstNameNoTooltip], \"eu não quero ser uma galinha."
 bp2_character_interaction.1002.desc_arrogant: "$bp2_character_interaction.desc_arrogant$Eu não sei... talvez eu tenha ganhado por acaso..."
 bp2_character_interaction.1002.desc_humble: "$bp2_character_interaction.desc_humble$Em breve...\" murmura [recipient.GetName]. \"Em breve, serei imbatível..."
 bp2_character_interaction.1002.desc_deceitful: "$bp2_character_interaction.desc_deceitful$Há um poço, sim,\" retruca [recipient.GetFirstNameNoTooltip], \"Mas eu acho que só há cobras presas dentro."
 bp2_character_interaction.1002.desc_honest: "$bp2_character_interaction.desc_honest$\"Eu? Claro que não\", insiste [recipient.GetFirstNameNoTooltip], sem convicção. \"Como eu disse... eu sempre sou sincer[recipient.Custom('ES_OA')].\""
 bp2_character_interaction.1002.desc_craven: "$bp2_character_interaction.desc_craven$Me solte!\" grita [recipient.GetFirstNameNoTooltip]. \"Como um [recipient.Custom('KnightCultureNoTooltip')|l] nobre, eu não temo a morte!"
 bp2_character_interaction.1002.desc_brave: "$bp2_character_interaction.desc_brave$Mas... eu,\" geme [recipient.GetFirstNameNoTooltip]. \"Eu não quero morrer..."
 bp2_character_interaction.1002.desc_shy: "$bp2_character_interaction.desc_shy$\"Se você ouvisse as coisas que as pessoas dizem pelas suas costas, [recipient.Custom2('RelationToMeShort', ROOT.Char)]… você não se sentiria tão elegante[recipient.Custom('ES_OA')]\"."
 bp2_character_interaction.1002.desc_gregarious: "$bp2_character_interaction.desc_gregarious$\"Por favor…\", se desespera [recipient.Custom('ES_ElLa')] [recipient.Custom('GirlBoy')], \"só me deixem em paz\"."
 bp2_character_interaction.1002.desc_ambitious: "$bp2_character_interaction.desc_ambitious$Eu... não me importo,\" suspira [recipient.GetFirstNameNoTooltip]. \"Vou definhar de qualquer maneira."
 bp2_character_interaction.1002.desc_content: "$bp2_character_interaction.desc_content$Mas um dia,\" murmura [recipient.GetFirstNameNoTooltip], \"um dia eu terei muito mais..."
 bp2_character_interaction.1002.desc_arbitrary: "$bp2_character_interaction.desc_arbitrary$Talvez isso seja seu direito como [ROOT.Char.GetTitleAsNameNoTooltip|l],\" responde [recipient.GetFirstNameNoTooltip], \"Mas eu não sou #EMP permitido#! o mesmo..."
 bp2_character_interaction.1002.desc_just: "$bp2_character_interaction.desc_just$\"Bem,\" diz [recipient.GetFirstName], sorrindo maliciosamente, \"se você insiste...\""
 bp2_character_interaction.1002.desc_cynical: "$bp2_character_interaction.desc_cynical$Vejo a ordem escolhida por [recipient.GetFaith.HighGodNamePossessive]!\" retruca [recipient.GetFirstNameNoTooltip], \"E [recipient.GetFaith.HighGodName] é bom!"
 bp2_character_interaction.1002.desc_zealous: "$bp2_character_interaction.desc_zealous$Por favor, [recipient.Custom2('RelationToMeShort', ROOT.Char)],\" resmunga [recipient.GetFirstNameNoTooltip], \"Você acabou de cuspir em mim."
 bp2_character_interaction.1002.desc_paranoid: "$bp2_character_interaction.desc_paranoid$[recipient.GetFirstNameNoTooltip] ri."
 bp2_character_interaction.1002.desc_trusting: "$bp2_character_interaction.desc_trusting$Uh-huh,\" murmura [recipient.GetFirstNameNoTooltip]. \"#EMP Claro...\""
 bp2_character_interaction.1002.desc_compassionate: "$bp2_character_interaction.desc_compassionate$\"Amabilidade? Eu posso ser [recipient.Custom('ES_ElLa')] próxim[recipient.Custom('ES_OA')] a sair ferid[recipient.Custom('ES_OA')]... e como a amabilidade me protegeria?!\""
 bp2_character_interaction.1002.desc_callous: "$bp2_character_interaction.desc_callous$Bem, alguém tem que cuidar dessas almas pobres!"
 bp2_character_interaction.1002.desc_sadistic: "$bp2_character_interaction.desc_sadistic$“Nunca!”, recua [recipient.GetFirstNameNoTooltip]. “Quero ser bom[recipient.Custom('ES_OA')]!”."
 bp2_character_interaction.1002.desc_stubborn: "$bp2_character_interaction.desc_stubborn$Talvez...\" [recipient.GetSheHe] suspira. \"Mas está tudo bem...\""
 bp2_character_interaction.1002.desc_fickle: "$bp2_character_interaction.desc_fickle$Mas,\" [recipient.GetSheHe] protesta, \"eu dei minha palavra aos meus amigos!"
 bp2_character_interaction.1002.desc_eccentric: "$bp2_character_interaction.desc_eccentric$Eu acho,\" [recipient.GetSheHe] se encolhe, \"que eu preferiria me encaixar...\""
 bp2_character_interaction.1002.desc_vengeful: "$bp2_character_interaction.desc_vengeful$Mas... então ele nunca mais jogaria comigo..."
 bp2_character_interaction.1002.desc_forgiving: "$bp2_character_interaction.desc_forgiving$\"Uma #EMP amiga?!#!\", uiva. \"Não! Ainda ficaria sendo atormentado por uma #EMP tramposa#!!\"."
 bp2_character_interaction.1002.a: "Será que algum dia vou alcançar este [recipient.Custom('GetLassLad')] est[recipient.Custom('ES_EA')]…?"
 bp2_character_interaction.1002.a.tt: "Falha ao passar a característica [target_trait.GetNameNoTooltip(GetPlayer)|l]"
 bp2_character_interaction.1002.a.flavor: "Suas ensinamentos caem em ouvidos relutantes."
