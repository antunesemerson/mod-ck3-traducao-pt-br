l_spanish:
 bp2_yearly.2000.t: "Nos Passos Deles"
 bp2_yearly.2000.desc_dynasty: ""E assim, querid[ROOT.Char.Custom('ES_OA')] [story_teller.Custom2( 'RelationToMeShort', ROOT.Char )], foi assim que surgiu a grande Casa [ROOT.Char.GetHouse.GetBaseName|U]! Sua [ROOT.Char.Custom2( 'RelationToMeShort', root_house_founder )], [root_house_founder.Custom('ES_ElLa')|U] [root_house_founder.GetTitledFirstName|l], era célebre por ser [target_trait.GetName( ROOT.Char )|l]".\n\nMeu [ROOT.Char.Custom2( 'RelationToMeShort', story_teller )], [story_teller.Custom('ES_ElLa')] [story_teller.GetTitledFirstName|l], termina de me contar a origem ancestral da nossa casa. Ele/ela gosta de me ensinar a história de [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip], mas hoje nossa conversa esteve repleta de histórias inspiradoras sobre meu [ROOT.Char.Custom2( 'RelationToMeShort', root_house_founder )], fundador[root_house_founder.Custom('ES_XA')] da nossa casa."
 bp2_yearly.2000.desc: ""… e assim, querid[ROOT.Char.Custom('ES_OA')] [ROOT.Char.Custom('GirlBoy')], é assim que surgiu a casa [ROOT.Char.GetHouse.GetBaseName|U]. [root_house_founder.Custom('ES_ElLa')|U] [root_house_founder.GetTitledFirstName|l] era célebre por ser [target_trait.GetName( ROOT.Char )|l]".\n\nMeu [ROOT.Char.Custom2( 'RelationToMeShort', story_teller )], [story_teller.Custom('ES_ElLa')] [story_teller.GetTitledFirstName|l], termina de me contar a origem ancestral da minha casa. ხშირად me instrui na história de [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip], mas hoje nossa conversa esteve repleta de histórias inspiradoras sobre meu [ROOT.Char.Custom2( 'RelationToMeShort', root_house_founder )], [root_house_founder.GetFirstNameNoTooltip], fundador[root_house_founder.Custom('ES_XA')] da casa [ROOT.Char.GetHouse.GetBaseNameNoTooltip|U]."
 bp2_yearly.2000.a: "Seria prudente imitar[root_house_founder.GetHerHim]…"
 bp2_yearly.2000.a.negative: "A Casa [ROOT.Char.GetHouse.GetBaseNameNoTooltip|U] não se tornou grande sem riscos..."
 bp2_yearly.2000.b: "Preciso me diferenciar dos meus antepassados."
 bp2_yearly.2000.c: "Vou usar com orgulho a insígnia da Casa [ROOT.Char.GetHouse.GetBaseNameNoTooltip]!"
 bp2_yearly.2000.c.tt: "Você encomenda ao seu [GetCourtPositionType( 'court_artificer_court_position' ).GetNameNoTooltip], [artificer.GetName], que forje uma joia com o brasão da casa de [GetPlayer.GetHouse.GetBaseNameNoTooltip]"
 bp2_yearly.2000.d: "Só quero sair e brincar!"
 bp2_yearly.2001.desc: ""… e essa, querid[ROOT.Char.Custom('ES_OA')] [ROOT.Char.Custom('GirlBoy')], é a história de sua [ROOT.Char.Custom2( 'RelationToMe', ancestor )], [ancestor.Custom('ES_ElLa')|l] [ancestor.GetTitledFirstName|l]; foi famosa por ser [target_trait.GetName( GetPlayer )|l]".\n\nMeu [ROOT.Char.Custom2( 'RelationToMe', story_teller )], [story_teller.Custom('ES_ElLa')] [story_teller.GetTitledFirstName|l], termina de me contar as lendas do meu antepassad[ancestor.Custom('ES_OA')]. Gosta de me ensinar a história da minha casa, mas a conversa de hoje esteve repleta de histórias fantásticas e inspiradoras sobre os triunfos da minha família."
 bp2_yearly.2001.a: "Seria prudente imitar[ancestor.GetHerHim]…"
 bp2_yearly.2002.desc: "Meu [ROOT.Char.Custom2( 'RelationToMe', artificer )], [artificer.GetFirstName] o artefato [newly_created_artifact.GetNameNoTooltip] que encomendei! Ele me o apresenta:\n\n"Meu senhor[ROOT.Char.Custom('ES_XA')], aqui temos [newly_created_artifact.GetDesc|l]"."
 bp2_yearly.2002.a: "Trabalho brilhante, [artificer.GetFirstNameNoTooltip]!"
 house_founder_ring_name: "Casa [ROOT.Char.GetHouse.GetBaseNameNoTooltip] $artifact_ring$"
 house_founder_ring_desc: "Um anel elegante de fina qualidade. Ele exibe proeminentemente o brasão da Casa [ROOT.Char.GetHouse.GetBaseName]. $house_founder_artifact_motto_desc$"
 house_founder_necklace_name: "Casa [ROOT.Char.GetHouse.GetBaseNameNoTooltip] $artifact_necklace$"
 house_founder_necklace_desc: "[newly_created_artifact.GetDesc]\n\nO brasão da Casa [ROOT.Char.GetHouse.GetBaseName] está gravado no centro. $house_founder_artifact_motto_desc$"
 house_founder_brooch_name: "Casa [ROOT.Char.GetHouse.GetBaseNameNoTooltip] $artifact_brooch$"
 house_founder_brooch_desc: "[newly_created_artifact.GetDesc]\n\nO brasão da Casa [ROOT.Char.GetHouse.GetBaseName] está gravado no centro. $house_founder_artifact_motto_desc$"
 house_founder_artifact_motto_desc: "\"#EMP [ROOT.Char.GetHouse.GetMotto]#!\" está gravado em fino script no verso."
 #Imaginary Friend Events
 gained_imaginary_friend: "Ganhou Amigo Imaginário"
 imaginary_friend_significantly_increase_relationship: "Sua amizade com [THIS.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip] irá #difficulty_easy melhorar muito#!"
 imaginary_friend_increase_relationship: "Sua amizade com [THIS.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip] irá #p melhorar#!"
 imaginary_friend_decrease_relationship: "Sua amizade com [THIS.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip] será #n prejudicada#!"
 please_imaginary_friend: "[THIS.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip] ficará satisfeit[THIS.Var('imaginary_friend_name').Char.Custom('ES_OA')]"
 displease_imaginary_friend: "[THIS.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip] ficará descontente[THIS.Var('imaginary_friend_name').Char.Custom('ES_OA')]"
 bp2_yearly.2010.t: "Um Novo Amigo Misterioso"
 bp2_yearly.2010.desc: "Estou sozinho, brincando com meu [ROOT.Char.Custom( 'child_favorite_toy' )]... de novo.\n\nA vida de um[ROOT.Char.Custom('ES_XA')][ROOT.Char.GetTitleAsNameNoTooltip|l] tem muito em abundância. Mas o que há em maior abundância de todas as coisas é a solidão."
 bp2_yearly.2010.desc.landed: "Especialmente já que meu [ROOT.Char.Custom2( 'RelationToMeShort', ruler_parent )] governa [ruler_parent.GetPrimaryTitle.GetNameNoTier] enquanto eu tenho todas as minhas responsabilidades como [ROOT.Char.GetPrimaryTitle.GetNameNoTier]."
 bp2_yearly.2010.desc.parents_dead: "Especialmente porque meus dois pais faleceram."
 bp2_yearly.2010.outro: "\n\nUns passos leves chamam minha atenção. Olho para cima e vejo [Select_CString( ROOT.Char.IsFemale, 'uma menina desconhecida', 'um menino desconhecido' )] da minha idade. Olha meu brinquedo com curiosidade.\n\n"Parece que não consigo me lembrar do meu nome...", murmura, e as lágrimas começam a brotar em seus olhos.\n\n"Está bem! Vou te chamar de...""
 bp2_yearly.2010.a: "[name_option_1.GetFirstNameNoTooltip]"
 bp2_yearly.2010.b: "[name_option_2.GetFirstNameNoTooltip]"
 bp2_yearly.2010.c: "[name_option_3.GetFirstNameNoTooltip]"
 bp2_yearly.2011.t: "Um Jogo de Imaginação"
 bp2_yearly.2011.desc: "Meu/minha amig[ROOT.Char.Custom('ES_OAOpp')] [ROOT.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip] e eu estamos envolvid[ROOT.Char.Custom('ES_OA')] em uma partida empolgante de [ROOT.Char.Custom('BG_GameType_Generic')] quando [participant.GetFirstName], minha [ROOT.Char.Custom2( 'RelationToMe', participant )|l], se aproxima exibindo-se com um sorriso de superioridade no rosto."
 bp2_yearly.2011.a: "Não fale de [ROOT.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip] como se não estivesse aqui!"
 bp2_yearly.2011.b: "Você não tem algo melhor para fazer?"
 bp2_yearly.2011.c: "Estou apenas praticando..."
 bp2_yearly.2011.bully.toast: "$relation_bully$ Ganho"
 bp2_yearly.2012.t: "Reafirmando Minha Autoridade"
 bp2_yearly.2012.desc: "Meu [ROOT.Char.Custom2( 'RelationToMe', regent_scope )], [regent_scope.GetFirstName], está sempre me atormentando. Estou começando a me cansar de suas tramas para arrancar de mim o poder que me cabe por direito. Infelizmente, muitos dos meus conselheiros estão no bolso dele.\n\n“Você deveria enfrentá-lo”, diz [ROOT.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip], de repente ao meu lado. “Ou, pelo menos, arranjar uma situação embaraçosa para que [regent_scope.GetHerHim] o deixe em ridículo”."
 bp2_yearly.2012.a: "É hora de me dirigir à corte e afirmar minha competência."
 bp2_yearly.2012.a.success: "Você lembra a corte da sua autoridade"
 bp2_yearly.2012.a.failure: "[regent_scope.GetFirstNameNoTooltip] zomba de você"
 bp2_yearly.2012.b: "Vou sabotar a sela."
 bp2_yearly.2012.b.success: "Você faz [regent_scope.GetFirstNameNoTooltip] de bobo"
 bp2_yearly.2012.b.failure: "[regent_scope.GetFirstNameNoTooltip] descobre a sabotagem"
 bp2_yearly.2012.c: "Desestabilizar o equilíbrio de poder é muito arriscado."
 bp2_yearly.2013.t: "Tem certeza[ROOT.Char.Custom('ES_OA')]?"
 bp2_yearly.2013.desc: "Meu amig[ROOT.Char.Custom('ES_OAOpp')] [ROOT.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip] vem o dia todo me importunando sobre meu comportamento, mas parece que nossa discussão finalmente chegou ao clímax.\n\n\"Percebi que ultimamente você está agindo de forma cada vez mais [target_trait.GetNameNoTooltip( ROOT.Char )|l]… Não acha que você se tornaria um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] melhor se fosse [opposite_trait.GetNameNoTooltip( ROOT.Char )|l]?\""
 bp2_yearly.2013.a: "Estou perfeitamente feliz sendo [target_trait.GetNameNoTooltip( ROOT.Char )|l]."
 bp2_yearly.2013.b: "Acredito que você está parcialmente correto..."
 bp2_yearly.2013.c: "Você tem razão; serei mais eficaz[ROOT.Char.Custom('ES_OA')] sendo [opposite_trait.GetNameNoTooltip( ROOT.Char )|l]."
 bp2_yearly.2014.t: "Um Possível Crush"
 bp2_yearly.2014.desc: "[ROOT.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip] e eu damos um passeio pelos jardins quando [ROOT.Char.Custom( 'GetSheHeOpposite' )] muda o tema da nossa conversa para o amor e o desejo.\n\nEu sei que, em segredo, você gosta de [crush.GetFirstName]. Você deveria escrever uma carta para [crush.GetSheHe] te enchendo de elogios e exaltando suas qualidades [crush.Custom( 'RomanticComplimentAdjective' )].\n\nSe você estiver especialmente animad[ROOT.Char.Custom('ES_OnOna')] o, pode até revelar que você [crush.GetHerHim] reconhece pelo quão [crush.Custom( 'RomanticComplimentAdjective') ] ele realmente é..."
 bp2_yearly.2014.a: "Este ser [crush.Custom( 'RomanticComplimentAdjective')] conhecerá o conteúdo do meu coração!"
 bp2_yearly.2014.a.success: "[crush.GetFirstNameNoTooltip] desenvolve uma paixão por você"
 bp2_yearly.2014.b: "Melhor não assustar[crush.GetHerHim] ."
 bp2_yearly.2014.c: "Na verdade, estou mais interessado em #EMP você#!..."
 bp2_yearly.2014.d: "Eu nunca poderia!"
 bp2_yearly.2015.t: "Um Amigo Encorajador"
 bp2_yearly.2015.desc: ""Será que nunca vou me livrar dess[bully.Custom('ES_EA')] [bully.Custom2('InsultNoun', ROOT.Char)]?!", me lamento, de cabeça baixa depois de sofrer mais uma humilhação pública por parte de [Select_CString( bully.IsFemale, 'a valentona', 'o valentão' )] [bully.GetFirstName].\n\nEnquanto lágrimas quentes correm pelo meu rosto, me surpreendo com um toque suave no ombro. É minha amig[ROOT.Char.Custom('ES_OAOpp')], [ROOT.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip]."
 bp2_yearly.2015.a: "Vou tomar uma posição e defender minha honra."
 bp2_yearly.2015.a.success: "Você dá uma surra em [bully.GetFirstNameNoTooltip]"
 bp2_yearly.2015.a.failure: "[bully.GetFirstNameNoTooltip] dá uma surra em você"
 bp2_yearly.2015.b: "Esse boato se espalhará como fogo!"
 bp2_yearly.2015.b.success: "Você espalha com sucesso um boato sensacionalista"
 bp2_yearly.2015.b.failure: "Seu boato não pega"
 bp2_yearly.2015.c: "As consequências seriam muito graves..."
 bp2_yearly.2016.t: "Uma Amizade Florescente"
 bp2_yearly.2016.desc: "Que luxuoso ramalhete de aromas agradáveis.\n\nGosto de passear tranquilamente pelos jardins. Só queria que houvesse alguém aqui para compartilhar esses prazeres sensoriais. A vida de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] pode ser solitária.\n\nMal termino de pensar isso e meu amig[ROOT.Char.Custom('ES_OAOpp')] [ROOT.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip] sai de trás de um canteiro de flores: "Vamos colher [ROOT.Char.GetCurrentLocation.Custom('get_region_flower_type_plural')] e fazer coroas de flores!"."
 bp2_yearly.2016.a: "Não gostaria de nada mais!"
 bp2_yearly.2016.b: "Não estou com humor para tamanha frivolidade."
 bp2_yearly.2017.t: "Queimando a Meia-Noite"
 bp2_yearly.2017.desc: "[ROOT.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip] e eu passamos a maior parte do dia trancad[ROOT.Char.Custom('ES_OA')], cercad[ROOT.Char.Custom('ES_OA')] de livros. Mas já está ficando tarde. Passei tempo demais me entregando à palavra escrita e comecei a negligenciar minhas outras obrigações.\n\nAo fechar meu livro, meu companheiro me lança um olhar duro."
 bp2_yearly.2017.a: "Suponho que um pouco mais de indulgência não faria mal..."
 bp2_yearly.2017.a.tt: "Isso irá melhorar muito a sua [learning|lE] [education_focus|lE]"
 bp2_yearly.2017.b: "Não, o corpo precisa de exercício tanto quanto a mente."
 bp2_yearly.2017.b.tt: "Isso irá melhorar muito a sua [martial|lE] [education_focus|lE]"
 bp2_yearly.2018.t: "Um Amigo Confidente"
 bp2_yearly.2018.desc: "Estou sentad[ROOT.Char.Custom('ES_OA')] sozinh[ROOT.Char.Custom('ES_OA')], esfregando as têmporas, exaust[ROOT.Char.Custom('ES_OA')] após um longo dia de tarefas e deveres.\n\n"Ultimamente você tem estado muito angustiad[ROOT.Char.Custom('ES_OA')], [ROOT.Char.GetFirstNameNoTooltip]". Meu/minha amig[ROOT.Char.Custom('ES_OAOpp')], [ROOT.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip], aparece ao meu lado e fala comigo."
 bp2_yearly.2018.a: "Um confidente de confiança é exatamente o que eu preciso."
 bp2_yearly.2018.b: "Vou tentar organizar meus pensamentos em alguma composição..."
 bp2_yearly.2018.c: "O que eu realmente preciso é de uma boa rotina de treinamento!"
 bp2_yearly.2019.t: "Excentricidades"
 bp2_yearly.2019.desc.intro: "Meu [ROOT.Char.Custom2( 'RelationToMe', target_councilor )]; [target_councilor.Custom('ES_ElLa')] [target_councilor.GetTitledFirstName|l] se aproxima de meu [Select_CString( ROOT.Char.IsFemale, 'amigo', 'amiga' )] [ROOT.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip] e a mim em plena conversa.\n\n[target_councilor.GetFirstNameNoTooltip] me interroga, com a testa franzida em contemplação. "[ROOT.Char.Custom('FormOfAddressForLiege')|U], se eu pudesse roubar-vos um momento, gostaria de falar sobre"
 bp2_yearly.2019.desc.chaplain: "o estado das propriedades do [ROOT.Char.Custom('GetFaithTemple')] do reino.\""
 bp2_yearly.2019.desc.chaplain_unlanded: "o estado do santuário da família [ROOT.Char.GetHouse.GetBaseNameNoTooltip]."
 bp2_yearly.2019.desc.steward: "nossas estratégias para a coleta de impostos."
 bp2_yearly.2019.desc.steward_unlanded: "nossas estratégias para as finanças dos [ROOT.Char.GetHouse.GetBaseNameNoTooltip]."
 bp2_yearly.2019.desc.marshal: "os programas de treinamento para novos recrutas.\""
 bp2_yearly.2019.desc.marshal_unlanded: "os regimes de treinamento para novos recrutas."
 bp2_yearly.2019.desc.spymaster: "a colocação de alguns agentes-chave em cortes estrangeiras.\""
 bp2_yearly.2019.desc.spymaster_unlanded: "a colocação de alguns agentes chave pelo reino."
 bp2_yearly.2019.desc.chancellor: "nossas relações com reinos vizinhos.\""
 bp2_yearly.2019.desc.chancellor_unlanded: "nossas relações com casas vizinhas."
 bp2_yearly.2019.desc.kurultai: "o bem-estar do nosso rebanho."
 bp2_yearly.2019.desc.outro: "\n\n"É claro!", respondo. "Venha comigo, [ROOT.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip]. Quero saber o que você acha desses assuntos".\n\n"M-mas, [ROOT.Char.Custom('FormOfAddressForLiege')]", [target_councilor.GetFirstNameNoTooltip] faz uma careta. "Aqui só estamos [Select_CString(And(ROOT.Char.IsFemale, target_councilor.IsFemale), 'nosotras', 'nosotros')] dois…"."
 bp2_yearly.2019.a: "Mas é claro que há! [ROOT.Char.Custom('GetSheHeOpposite')|U] é meu [Select_CString( ROOT.Char.IsFemale, 'consejero', 'consejera' )] de maior confiança!"
 bp2_yearly.2019.a.tt: "Você abraça seu relacionamento com [ROOT.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip]"
 bp2_yearly.2019.b: "#EMP Err...#! Me equivoquei. Vamos considerar isso em particular."
 bp2_yearly.2019.b.tt: "Você rejeita seu relacionamento com [ROOT.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip]"
 bp2_yearly.2020.t: "O Retorno de um Amigo Misterioso"
 bp2_yearly.2020.desc: ""[ROOT.Char.GetFirstNameNoTooltip]... Que alegria revê-lo novamente... Já faz algum tempo desde a última vez que falamos". Uma voz familiar ecoa pelo corredor escuro.\n\nCom um sobressalto, finalmente percebo a quem pertence essa voz. Mas não... não pode ser! #EMP [ROOT.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip]?!#!? Meu [Select_CString( ROOT.Char.IsFemale, 'amigo imaginário', 'amiga imaginária' )] de infância?\n\n"Sou eu, [ROOT.Char.GetFirstNameNoTooltip]. Nós precisávamos um do outro há anos e agora precisamos novamente".\n\n"Preciso que faça algo por mim... #EMP por nosotros#!. Você deve matar seu [ROOT.Char.Custom2( 'RelationToMeShort', murder_target )], [murder_target.GetFirstName]. Só coisas boas sairão disso... você verá"."
 bp2_yearly.2020.a: "Se você insiste..."
 bp2_yearly.2020.b: "Não! Eu não vou fazer isso!"
 imaginary_friend_first_murder_scheme_tt: "Você ganha uma bonificação #EMP enorme#! para uma [scheme|lE] de [GetScheme('murder').GetTypeName|l] contra [murder_target.GetName]"
 imaginary_friend_future_murder_scheme_tt: "Você ganha um bônus #EMP massivo#! para um [scheme|lE] de [GetScheme('murder').GetTypeName|l] direcionado para [new_murder_target.GetName]"
 #Why haven't you started your murder scheme yet?
 bp2_yearly.2021.t: "Um Assassinato Adiado"
 bp2_yearly.2021.desc: ""Tsc, tsc, #EMP tch!#!".\n\n"Tínhamos um acordo, [ROOT.Char.GetFirstNameNoTooltip]. Você concordou em matar [new_murder_target.Custom('ES_AlAla')] [new_murder_target.GetTitledFirstName|l] e não fez nenhum esforço para cumprir esse objetivo", [ROOT.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip] me repreende por minha falta de ação.\n\n"Estou decepcionado…"."
 bp2_yearly.2021.a: "Começarei imediatamente."
 bp2_yearly.2021.b: "Só preciso de um pouco mais de tempo para me preparar..."
 bp2_yearly.2021.c: "Estamos #EMP feitos#!, [ROOT.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip]!"
 #Murder Successful
 bp2_yearly.2022.t: "$bp2_yearly.2020.t$"
 bp2_yearly.2022.desc: ""#EMP Muito bem, [ROOT.Char.GetFirstNameNoTooltip], muito bem#!...".\n\n"Você fez bem, [Select_CString( ROOT.Char.IsFemale, 'minha amiga', 'meu amigo' )]". [ROOT.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip] me felicita por ter assassinado meu agora falecid[target.Custom('ES_OA')] [ROOT.Char.Custom2( 'RelationToMeShort', target )]."
 bp2_yearly.2022.desc.next_target: ""Mas não nos demoremos, pois ainda há mais diversão pela frente, [Select_CString( ROOT.Char.IsFemale, 'amiga querida', 'amigo querido' )]. [new_murder_target.GetFirstName] está #EMP pront[new_target.Custom('ES_OA')] para a matança...#!"."
 bp2_yearly.2022.a: "Isso foi... #EMP bom#!."
 bp2_yearly.2022.b: "Não! Por favor, apenas vá embora..."
 #Murder Invalidated
 bp2_yearly.2023.t: "Um Assassinato Frustrado"
 bp2_yearly.2023.desc: ""Ao que parece houve… #EMP circunstancias imprevistas#!… a respeito do seu plano de matar [target.Custom('ES_AlAla')] [target.GetTitledFirstName|l]. Não importa. Em breve corrigiremos essa injustiça".\n\n"
 bp2_yearly.2023.a: "$bp2_yearly.2020.a$"
 bp2_yearly.2023.b: "Já tive o suficiente..."
 #Murder Failed
 bp2_yearly.2024.t: "$bp2_yearly.2023.t$"
 bp2_yearly.2024.desc: "$bp2_yearly.2023.desc$"
 bp2_yearly.2024.a: "$bp2_yearly.2020.a$"
 bp2_yearly.2024.b: "$bp2_yearly.2023.b$"
 #Devil Imaginary Friend Conclusion
 bp2_yearly.2025.t: "[ROOT.Char.Custom('ES_ElLa')|U] [ROOT.Char.GetTitleAsNameNoTooltip|l] louco[ROOT.Char.Custom('ES_OA')]"
 bp2_yearly.2025.desc: ""É isso aí, [ROOT.Char.GetFirstNameNoTooltip]! Estou tão orgulhos[ROOT.Char.Custom('ES_OAOpp')] de você". [ROOT.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip] aparece diante de mim.\n\nSó consigo imaginar e #EMP paladear#! o som estridente dos gritos da minha [ROOT.Char.Custom2( 'RelationToMe', target )] ao exalar seu último e patético suspiro!\n\n"Acredito que meu trabalho aqui está feito", diz [ROOT.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip].\n\n… mas mal [ROOT.Var('imaginary_friend_name').Char.GetHerHim] ouço por cima das minhas gargalhadas histéricas."
 bp2_yearly.2025.a: "Eu anseio por #EMP sangue!#!"
 imaginary_friend_mad_modifier_bribe_discount: "Convidar [agents|lE] para [schemes|lE] custará 50% a menos"
 #Angle Imaginary Friend Conclusion
 bp2_yearly.2030.t: "Um Mensageiro"
 bp2_yearly.2030.desc: "#EMP [ROOT.Char.GetFirstNameNoTooltip]...#!.\n\nAo me virar, vejo meu amig[ROOT.Char.Custom('ES_OAOpp')], [ROOT.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip] atrás de mim, com uma expressão de serena tranquilidade visível em seu rosto.\n\nTenho de te dizer uma coisa. Tenho guiado você em silêncio todos estes anos como [Select_CString( ROOT.Char.IsFemale, 'seu amigo', 'sua amiga' )]. Mas não sou um simples amigo, e sim um mensageir[ROOT.Char.Custom('ES_OAOpp')] de [ROOT.Char.GetFaith.HighGodName].\n\nTenho de fazer um último pedido a você. Você deve acender uma vela em minha homenagem em [target_holy_site.GetNameNoTier]. Só então terei permissão para retornar a [ROOT.Char.GetFaith.PositiveAfterLife]."
 bp2_yearly.2030.a: "Eu entendo o que devo fazer."
 bp2_yearly.2030.a.tt: "Sua próxima [GetActivityType('activity_pilgrimage').GetNameNoTooltip|l] para [target_holy_site.GetNameNoTier] terá 50% de desconto"
 bp2_yearly.2030.b: "Mesmo? Talvez eu deva repensar minha posição sobre tais coisas..."
 bp2_yearly.2030.c: "Tenho certeza de que [ROOT.Char.GetFaith.HighGodName] ouvirá minhas preces daqui."
 imaginary_friend_pilgrimage_discount: "Honrando seu amigo imaginário"
 bp2_yearly.2031.t: "Homenageando [ROOT.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip]"
 bp2_yearly.2031.desc: "Agora que finalmente cheguei a [ROOT.Char.GetCurrentLocation.GetName], é hora de homenagear [ROOT.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip]. Ele/ela me viu passar por muitas provações e foi uma verdadeira bênção na minha vida. Duvido que eu fosse [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetWomanMan] que sou hoje sem essa amizade."
 bp2_yearly.2031.a: "Descanse em paz, querido[ROOT.Char.Custom('ES_OAOpp')] [ROOT.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip]."
 imaginary_friend_pilgrimage_log_title: "[CHARACTER.GetName] honrou seu/sua [Select_CString( CHARACTER.IsFemale, 'amigo imaginário', 'amiga imaginária' )]"
 imaginary_friend_pilgrimage_log: "[CHARACTER.GetName] honrou seu/sua [Select_CString( CHARACTER.IsFemale, 'amigo imaginário', 'amiga imaginária' )] em [PROVINCE.GetBaronyNameExplicitly]"
 honored_imaginary_friend_memory: "homenageou amigo imaginário"
 honored_imaginary_friend_memory_desc: "homenageei [ROOT.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip], minha [Select_CString( ROOT.Char.IsFemale, 'amigo imaginário', 'amiga imaginária' )] em [ROOT.Var('location').GetProvince.GetNameNoTooltip]"
 honored_imaginary_friend_memory_desc_second_perspective: "você homenageou [ROOT.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip], seu/sua [Select_CString( ROOT.Char.IsFemale, 'amigo imaginário', 'amiga imaginária' )], em [ROOT.Var('location').GetProvince.GetNameNoTooltip]"
 honored_imaginary_friend_memory_desc_third_perspective: "[owner.GetFirstName] homenageou [ROOT.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip], seu/sua [Select_CString( owner.IsFemale, 'amigo imaginário', 'amiga imaginária' )], em [ROOT.Var('location').Province.GetNameNoTooltip]"
 #Neutral Imaginary Friend Conclusion
 bp2_yearly.2040.t: "Um Amigo Parte"
 bp2_yearly.2040.desc: "[ROOT.Char.GetFirstNameNoTooltip], você se tornou um [ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] notável, diz [ROOT.Var('imaginary_friend_name').Char.GetFirstNameNoTooltip] com os olhos marejados.\n\nVocê já não precisa de mim. É hora de eu partir e deixar que você viva sua vida plena e gloriosa. Há muitas pessoas ao seu redor em quem apoiar-se.\n\n"
 bp2_yearly.2040.desc.lover: "\"Seu(a) [ROOT.Char.Custom2( 'RelationToMeShort', SCOPE.sC('lover') )], [lover.GetFirstNameNoTooltip], olha você de forma provocante. Talvez você nunca tenha notado, mas é verdade. [lover.GetSheHe|U] anseia pelo seu toque.\"\n\n"
 bp2_yearly.2040.desc.friend: ""[friend.GetFirstNameNoTooltip] tornou-se seu amig[friend.Custom('ES_OA')] há [ROOT.Char.Custom( 'GetPeriodOfTimeWord' )]. Talvez [friend.GetSheHe] não soubesse disso naquela época, mas sua devoção por você não conhece limites. Seu apoio a você é inabalável"."
 bp2_yearly.2040.a: "[lover.GetFirstNameNoTooltip] me aquecerá em sua ausência."
 bp2_yearly.2040.b: "Não sabia da devoção de [friend.GetFirstNameNoTooltip] por mim!"
 bp2_yearly.2100.t: "Estabelecendo Fundações"
 bp2_yearly.2100.desc: "A brita solta range sob meus pés quando [interlocutor.GetFirstName] e eu a atravessamos. Ela me faz lembrar os exteriores escarpados dos edifícios por toda esta terra.\n\n\"Quero construir algo\", diz [interlocutor.GetFirstNameNoTooltip], compartilhando claramente meus pensamentos. \"Deveríamos construir algo, aqui, neste lugar! Algum tipo de maquete!\"; imediatamente começa a vasculhar o que está ao redor em busca de materiais.\n\nEnquanto [interlocutor.GetFirstNameNoTooltip] se apressa em direção a uma pilha de lenha próxima, reflito mais sobre a natureza da nossa atividade. Construir #EMP qué#!, exatamente?"
 bp2_yearly.2100.a: "Talvez um [ROOT.Char.Custom('GetDiplomacyBuilding')]?"
 bp2_yearly.2100.b: "[ROOT.Char.Custom('GetMartialBuilding')], para afiar nossas espadas!"
 bp2_yearly.2100.c: "Talvez um [ROOT.Char.Custom('GetStewardshipBuilding')] nos ensine o valor do dinheiro?"
 bp2_yearly.2100.d: "Algo grande, como um [ROOT.Char.Custom('GetIntrigueBuilding')]!"
 bp2_yearly.2100.e: "Nosso próprio centro de aprendizado, como [ROOT.Char.Custom('GetLearningBuilding')]!"
 bp2_yearly.2100.a.tt: "Isso aprimorará seu [education_focus|lE] de [diplomacy|lE]"
 bp2_yearly.2100.b.tt: "Isso aprimorará seu [education_focus|lE] de [martial|lE]"
 bp2_yearly.2100.c.tt: "Isso aprimorará seu [education_focus|lE] de [stewardship|lE]"
 bp2_yearly.2100.d.tt: "Isso aprimorará seu [education_focus|lE] de [intrigue|lE]"
 bp2_yearly.2100.e.tt: "Isso aprimorará seu [education_focus|lE] de [learning|lE]"
 bp2_yearly.2110.t: "[GetTrait('humble').GetNameNoTooltip( ROOT.Char )] ou [GetTrait('arrogant').GetNameNoTooltip( ROOT.Char )|l]?"
 bp2_yearly.2110.desc: "Meu [ROOT.Char.Custom2( 'RelationToMeShort', interlocutor )], [interlocutor.GetFirstName], e eu estamos praticando nossas habilidades marciais no pátio.\n\n"#EMP Agh!#!", ele rosna quando [interlocutor.GetHerHim] derrubo. Ele me olha com admiração. "Você é habilidos[ROOT.Char.Custom('ES_OA')] com uma arma, [ROOT.Char.GetFirstNameNoTooltip]. Queria ter metade da sua habilidade.""
 bp2_yearly.2110.a: "\"Você vai chegar lá, [interlocutor.GetFirstNameNoTooltip]. Vamos, vamos tentar de novo!\""
 bp2_yearly.2110.b: ""Meu destino é ser [Select_CString( ROOT.Char.IsFemale, 'a melhor guerreira', 'o melhor guerreiro' )] da casa [ROOT.Char.GetHouse.GetBaseNameNoTooltip]"."
 bp2_yearly.2110.c: "Permaneça em silêncio."
 bp2_yearly.2120.t: "[GetTrait('temperate').GetNameNoTooltip( ROOT.Char )] ou [GetTrait('gluttonous').GetNameNoTooltip( ROOT.Char )|l]?"
 bp2_yearly.2120.desc: "#EMP Tin, tin!#!\n\nMinha colher raspa o fundo da tigela enquanto devoro mais uma porção de ensopado. Sacio a sede com grandes goles da minha taça, que logo precisará ser reabastecida. Não me canso disso.\n\n[ROOT.Char.GetFirstNameNoTooltip]! O que estais fazendo? Não vos parece que tendes andado..., bem, #EMP consumiendo#! um pouco em excesso ultimamente?"."
 bp2_yearly.2120.a: "\"Você está certo. Minha glutonaria precisa ser controlada.\""
 bp2_yearly.2120.b: "Os banquetes #EMP fazem#! de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]."
 bp2_yearly.2130.t: "[GetTrait('generous').GetNameNoTooltip( ROOT.Char )] ou [GetTrait('greedy').GetNameNoTooltip( ROOT.Char )|l]?"
 bp2_yearly.2130.desc: "São raras as ocasiões em que consigo passar despercebido[ROOT.Char.Custom('ES_OA')] entre todos os meus acompanhantes e consigo momentos preciosos para mim. Uma chance de finalmente me sentir como as outras crianças.\n\nApertando meu [ROOT.Char.Custom( 'child_favorite_toy' )], caminho pelas ruas de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] apreciando as paisagens e os cheiros. As pessoas vão e vêm; os mercadores apregoam suas mercadorias.\n\nDeparo-me com um menino camponês de aparência doentia escondido na esquina de um beco."
 bp2_yearly.2130.a: "\"Aqui, que você aprecie este [ROOT.Char.Custom( 'child_favorite_toy' )] assim como eu."
 bp2_yearly.2130.a.flavor: "Você dá o seu brinquedo para a criança"
 bp2_yearly.2130.b: "\"Aqueles menos afortunados não merecem minha generosidade.\""
 bp2_yearly.2140.t: "[GetTrait('honest').GetNameNoTooltip( ROOT.Char )] ou [GetTrait('deceitful').GetNameNoTooltip( ROOT.Char )|l]?"
 bp2_yearly.2140.desc: "Caminho na ponta dos pés pelo corredor com minha guloseima noturna na mão. As cozinhas sempre as têm prontas nas altas horas da madrugada. Não há nada como saborear um pouco de [ROOT.Char.Custom( 'FavoriteTreat' )], ainda mais se tiver acabado de ser preparado.\n\nAo virar a esquina, deparo-me com [ROOT.Char.Custom2( 'RelationToMeShort', interlocutor )], [interlocutor.GetFirstName], meio sonolent[interlocutor.Custom('ES_OA')], esfregando os olhos. [ROOT.Char.GetFirstNameNoTooltip]! Vocês saquearam as cozinhas #EMP outra vez#!?\n\nEscondo minha [ROOT.Char.Custom( 'FavoriteTreat' )] por culpa."
 bp2_yearly.2140.a: "\"Sim, [ROOT.Char.Custom2( 'RelationToMeShort', interlocutor )]. Não pude resistir.\""
 bp2_yearly.2140.b: "\"Claro que não! Eu simplesmente não conseguia dormir.\""
 bp2_yearly.2150.t: "[GetTrait('lifestyle_herbalist').GetNameNoTooltip( ROOT.Char )] ou [GetTrait('lifestyle_gardener').GetNameNoTooltip( ROOT.Char )|l]?"
 bp2_yearly.2150.desc: "Nas últimas duas semanas, meu [GetCourtPositionType('court_physician_court_position').GetNameNoTooltip()] [interlocutor.GetFirstName] tem me ensinado tudo sobre o crescimento e o cultivo das plantas, bem como seus respectivos usos na medicina.\n\nHoje ele me trouxe para eu ver seus livros. \"Meu [interlocutor.Custom2( 'RelationToMeShort', ROOT.Char )], vocês fizeram um progresso incrível. No entanto, é hora de escolher um foco para os seus estudos\".\n\n\"Vocês prefeririam se concentrar na horticultura em si ou estão mais atraídos pelo impacto prático de tais plantas?\"."
 bp2_yearly.2150.a: "As ervas são inúteis sem o conhecimento adequado de seus usos."
 bp2_yearly.2150.b: "Estimular o crescimento de novas vidas é incomparável."
 bp2_yearly.2150.c: "Não vou continuar desperdiçando meu tempo com plantas."
 bp2_yearly.2160.t: "[GetTrait('compassionate').GetNameNoTooltip( ROOT.Char )] ou [GetTrait('sadistic').GetNameNoTooltip( ROOT.Char )|l]?"
 bp2_yearly.2160.desc: "Passeando pelo meu [ROOT.Char.Custom('GetCourtyard')], vejo [interlocutor.GetFirstNameNoTooltip] brigando com outras crianças sob a orientação de [marshal.Custom('ES_DelDela')] [marshal.GetTitledFirstName|l]. Infelizmente, não está indo muito bem e, de repente, [interlocutor.GetHerHim] é empurrado para trás, quase me derrubando no chão.\n\n\"Sinto muito, [interlocutor.Custom2( 'RelationToMeShort', ROOT.Char )]\", diz enquanto se levanta, tirando a poeira.\n\nTem um ferimento recente."
 bp2_yearly.2160.a: "\"Não se preocupe, [interlocutor.GetFirstNameNoTooltip]. Você vai melhorar com a prática.\""
 bp2_yearly.2160.b: "\"Mais dor garantirá que você não esqueça esse erro!\""
 bp2_yearly.2160.b.flavor: "Você esfrega terra do chão do [ROOT.Char.Custom('GetCourtyard')] em sua ferida"
