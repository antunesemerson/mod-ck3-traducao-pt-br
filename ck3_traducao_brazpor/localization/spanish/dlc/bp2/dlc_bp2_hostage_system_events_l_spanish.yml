l_spanish:
 bp2_hostage_system.0100.t: "A Qualquer Custo"
 bp2_hostage_system.0100.intro: "Com meu [war.Custom('WarCasusBelliShort')] agora em curso, o destino do meu cativo[hostage.Custom('ES_OA')] , [hostage.GetFirstName] , [hostage_home_court.Custom2('RelationToMe', SCOPE.sC('hostage'))] [hostage_home_court.Custom('ES_DelDela')] [hostage_home_court.GetTitledFirstName|l], ainda está por ser decidido.\n\n"
 bp2_hostage_system.0100.desc: "Todo dano que eu possa causar a esses demônios de [hostage_home_court.GetPrimaryTitle.GetAdjectiveNoTooltip] é útil, e [hostage_home_court.GetFirstNameNoTooltip] só pode culpar a si mesmo(a)[hostage_home_court.Custom('ES_OA')] ."
 bp2_hostage_system.0100.executed_hostage: "Esse demônio executou meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('victim') )]. [victim.GetFirstName]. A justiça exige que eu seja implacável…"
 bp2_hostage_system.0100.spared_hostage: "[hostage_home_court.GetFirstNameNoTooltip] mostrou clemência ao meu(a) [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('my_hostage'))], [my_hostage.GetFirstName]. Talvez deixar nossas disputas para os campos de batalha seja justificado..."
 bp2_hostage_system.0100.my_hostage: "\n\nMas o que dizer do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('my_hostage'))]? [my_hostage.GetFirstName]; está à mercê de [hostage_home_court.Custom('ES_DelDela')] [hostage_home_court.GetTitledFirstNameNoTooltip|l]…"
 bp2_hostage_system.0100.a: "Eu tomei minha decisão."
 bp2_hostage_system.0100.b: "[hostage.GetFirstNameNoTooltip] está seguro(a), por enquanto."
 bp2_hostage_system.0110.t: "Promessa Vazia"
 bp2_hostage_system.0110.desc: "Apesar de enviar seu [hostage_home_court.Custom2('RelationToMe', SCOPE.sC('hostage'))] , [hostage.GetFirstName] , para minha corte, [hostage_home_court.Custom('ES_ElLa')] [hostage_home_court.GetTitledFirstName|l] , semelhante [hostage_home_court.Custom2('InsultNoun', ROOT.Char)] traidor[hostage_home_court.Custom('ES_XA')] , traz guerra contra mim desde [hostage_home_court.GetPrimaryTitle.GetNameNoTierNoTooltip].\n\nDeve pensar que sou covarde, ou não se importa nem um pouco com o bem-estar de [hostage.GetFirstNameNoTooltip], para empreender uma [war.Custom('WarCasusBelliShort')] contra [ROOT.Char.Custom('ES_ElLa')] guardião de sua cativ[hostage.Custom('ES_OA')]…"
 bp2_hostage_system.0110.a: "[hostage_home_court.GetFirstNameNoTooltip] fez a escolha dele(a)."
 bp2_hostage_system.0110.b: "Vamos não ser precipitados..."
 bp2_hostage_system.0120.t: "O Inimigo do Meu Amigo"
 bp2_hostage_system.0120.intro: "Os acontecimentos conspiram contra meu cativo[hostage.Custom('ES_OA')] [hostage.GetFirstName], [hostage_home_court.Custom2('RelationToMe', SCOPE.sC('hostage'))] [hostage_home_court.Custom('ES_DelDela')] [hostage_home_court.GetTitledFirstName|l]. Embora [hostage.GetHerHim] o acolhi em minha corte com intenções honrosas, devo cumprir minhas outras obrigações na [war.Custom('WarCasusBelliShort')] [war_joiner_ally.Custom('ES_DelDela')] [war_joiner_ally.GetTitledFirstName|l]…\n\n"
 bp2_hostage_system.0120.desc: "A paz com [hostage_home_court.GetPrimaryTitle.GetNameNoTierNoTooltip] era meu objetivo, mas não há mais nada a fazer. A misericórdia pode manter um grau de confiança, mas, então novamente, tudo é justo em tempos de guerra."
 bp2_hostage_system.0120.a: "A situação mudou."
 bp2_hostage_system.0120.b: "Isso é entre [war_joiner_ally.GetFirstNameNoTooltip] e [hostage_home_court.GetFirstNameNoTooltip]..."
 bp2_hostage_system.0130.t: "O Amigo do Meu Inimigo"
 bp2_hostage_system.0130.desc: "Soube que [hostage_home_court.Custom('ES_ElLa')] [hostage_home_court.GetTitledFirstName|l] saiu tolamente em armas ao lado do meu inimig[war_joiner_ally.Custom('ES_OA')], [war_joiner_ally.Custom('ES_ElLa')] [war_joiner_ally.GetTitledFirstName|l], apesar de ter me enviado seu [hostage_home_court.Custom2('RelationToMe', SCOPE.sC('hostage'))], [hostage.GetFirstName], como cativ[hostage.Custom('ES_OA')].\n\nEsta mesquinha [war.Custom('WarCasusBelliShort')] deixou à mostra o quanto valem suas promessas de paz; para não falar de seu desprezo insensível por [hostage.GetFirstNameNoTooltip]."
 bp2_hostage_system.0130.a: "Não faço ameaças vazias."
 bp2_hostage_system.0130.b: "As coisas não são tão preto e branco."
 bp2_hostage_system.0140.opening: "[executioner.Custom2('AppropriateGreeting', ROOT.Char)]"
 bp2_hostage_system.0140.attacker: "Hoje termina sua miserável tentativa de me enganar com promessas de paz. Que seu[hostage.Custom('ES_OA')] [hostage_home_court.Custom2('RelationToMe', SCOPE.sC('hostage'))], [hostage.GetFirstName] encontre mais paz em [executioner.GetFaith.PositiveAfterLife]."
 bp2_hostage_system.0140.defender: "Sua invasão detestável, mesmo depois de me enviarem seu[hostage.Custom('ES_OA')] [hostage_home_court.Custom2('RelationToMe', SCOPE.sC('hostage'))], [hostage.GetFirstName], como cativo[hostage.Custom('ES_OA')], só pode ter uma resposta. Que [executioner.GetFaith.HighGodName] e [hostage.GetSheHe] vos perdoem."
 bp2_hostage_system.0140.attacker_ally: "Encontramo-nos em guerra graças a [war_joiner_ally.Custom('ES_AlAla')] [war_joiner_ally.GetTitledFirstName|l] e, por isso, isso custará a vida à minha cativa[hostage.Custom('ES_OA')] , voss[hostage.Custom('ES_OA')] [hostage_home_court.Custom2('RelationToMe', SCOPE.sC('hostage'))] , [hostage.GetFirstName]."
 bp2_hostage_system.0140.defender_ally: "Sua traição custou a vida de sua[hostage.Custom('ES_OA')] [hostage_home_court.Custom2('RelationToMe', SCOPE.sC('hostage'))], [hostage.GetFirstName]. Só espero que sua amizade com [war_joiner_ally.Custom('ES_ElLa')] [war_joiner_ally.GetTitledFirstName|l] tenha valido a pena."
 bp2_hostage_system.0140.a.attacker: "Inimaginável..."
 bp2_hostage_system.0140.a.defender: "Você vai pagar..."
 bp2_hostage_system.0140.a.attacker_ally: "Como pôde…"
 bp2_hostage_system.0140.a.defender_ally: "Sem coração..."
 bp2_hostage_system.0141.opening: "[hostage_sparer.Custom2('AppropriateGreeting', ROOT.Char)]"
 bp2_hostage_system.0141.intro: "Decidi poupar sua[hostage.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('hostage'))], [hostage.GetFirstName],"
 bp2_hostage_system.0141.attacker: "pois não é senão um peão inocente em seus jogos enganosos."
 bp2_hostage_system.0141.defender: "apesar de seu ataque traiçoeiro em desrespeito aos nossos pactos."
 bp2_hostage_system.0141.attacker_ally: "pois [hostage.GetSheHe] não precisa sofrer por causa [war_joiner_ally.Custom('ES_DelDela')] [war_joiner_ally.GetTitledFirstName|l]."
 bp2_hostage_system.0141.defender_ally: "pois [hostage.GetSheHe] não precisa sofrer por causa de [war_joiner_ally.Custom('ES_DelDela')] [war_joiner_ally.GetTitledFirstName|l]."
 bp2_hostage_system.0141.request: "\n\nConfio em que você mostrará a mesma misericórdia ao meu(a) [spared.Custom2('RelationToMe', SCOPE.sC('my_hostage'))], [my_hostage.GetFirstName]."
 bp2_hostage_system.0141.a.attacker: "Obrigado, [ROOT.Char.GetFaith.HighGodName]..."
 bp2_hostage_system.0141.a.defender: "Talvez ele(a) não seja tão ruim[hostage_sparer.Custom('ES_OA')]…"
 bp2_hostage_system.0141.a.attacker_ally: "É um alívio..."
 bp2_hostage_system.0141.a.defender_ally: "É alguma coisa, pelo menos..."
 bp2_hostage_system.0200.t: "Totalmente Crescido"
 bp2_hostage_system.0200.desc: "Minha cativa[hostage.Custom('ES_OA')], [hostage.GetFirstName], já é [Select_CString( hostage.IsFemale, 'toda una mujer', 'todo un hombre' )] e espera-se que em breve seja enviada para casa, como é costume. Certamente, sua [hostage.Custom2('RelationToMe', SCOPE.sC('hostage_home_court'))], [hostage_home_court.Custom('ES_ElLa')] [hostage_home_court.GetTitledFirstName|l], certamente o(a) aguarde."
 bp2_hostage_system.0200.my_hostage: "\n\nTalvez seja realmente melhor manter a boa vontade, pelo menos enquanto meu(a) [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('my_hostage'))], [my_hostage.GetFirstName], permanece nas garras do(a) [hostage_home_court.GetPrimaryTitle.GetAdjectiveNoTooltip]..."
 bp2_hostage_system.0200.closing: "\n\nSin embargo, debo velar por los intereses de #EMP mi#! casa."
 bp2_hostage_system.0200.a: "Pegue suas coisas, é hora de ir para casa."
 bp2_hostage_system.0200.b: "[hostage.GetFirstNameNoTooltip] deve ficar um pouco mais."
 bp2_hostage_system.0200.b.my_hostage: "Uma vez que [my_hostage.GetFirstNameNoTooltip] for devolvido(a), [hostage.GetFirstNameNoTooltip] será."
 hostage_more_likely_to_return_tt: "É mais provável que [hostage_home_court.Custom('ES_ElLa')] [hostage_home_court.GetTitledFirstName|l] devolva meu [my_hostage.GetFirstName]"
 bp2_hostage_system.0201.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('hostage'))] , [hostage_home_court.Custom('ES_ElLa')] [hostage.GetTitledFirstName|l], a quem foi enviado para ser um[hostage.Custom('ES_XA')] cativo[hostage.Custom('ES_OA')] do trono [hostage_warden.GetPrimaryTitle.GetAdjectiveNoTooltip] , finalmente voltou para casa sendo [Select_CString( hostage.IsFemale, 'toda una mujer', 'todo un hombre' )]! O pacto com [hostage_warden.Custom('ES_ElLa')] [hostage_warden.GetTitledFirstName|l] terminou, mas meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hostage'))] está a salvo."
 bp2_hostage_system.0201.my_hostage_adult: "\n\n[my_hostage.GetFirstName], [my_hostage.Custom('ES_ElLa')] [hostage_warden.Custom2('RelationToMe', SCOPE.sC('my_hostage'))] de [hostage_warden.GetFirstNameNoTooltip], continua sendo meu cativo[my_hostage.Custom('ES_OA')], embora já seja[Select_CString( hostage.IsFemale, 'una mujer', 'un hombre' )] e me olha com certa inveja. O justo seria devolvê-lo[my_hostage.GetHerHim]…"
 bp2_hostage_system.0201.my_hostage: "\n\n[my_hostage.GetFirstName], [my_hostage.Custom('ES_ElLa')] [hostage_warden.Custom2('RelationToMe', SCOPE.sC('my_hostage'))] de [hostage_warden.GetFirstNameNoTooltip], continua sendo meu cativo[my_hostage.Custom('ES_OA')], pois ainda não passa de um[my_hostage.Custom('ES_XA')] [my_hostage.Custom('GirlBoy')]."
 bp2_hostage_system.0201.a: "Há tanto para colocar em dia!"
 bp2_hostage_system.0201.b: "[my_hostage.GetFirstNameNoTooltip] também pode ir."
 bp2_hostage_system.0201.c: "Talvez quando [my_hostage.GetSheHe] for mais velho(a)."
 bp2_hostage_system.0201.c.adult: "Eu não acho que sim."
 bp2_hostage_system.0202.t: "Aguardado Retorno"
 bp2_hostage_system.0202.desc: "Esperei com esperança[ROOT.Char.Custom('ES_OA')] à medida que se aproximava o aniversário do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('hostage'))], [hostage.GetFirstName], pois é costume mandar os cativos de volta para casa quando deixam de ser crianças.\n\nMas, ah, parece que o plano [hostage_warden.Custom('ES_DelDela')] [hostage_warden.GetTitledFirstName|l] é manter [hostage.GetFirstNameNoTooltip] em [hostage_warden.GetCapitalLocation.GetNameNoTooltip] por mais um tempo…\n\n"
 bp2_hostage_system.0202.a: "Deve haver uma boa razão."
 bp2_hostage_system.0203.t: "De Volta ao Lar"
 bp2_hostage_system.0203.desc: "Aguardei com alguma apreensão a resposta [hostage_home_court.Custom('ES_DelDela')] [hostage_home_court.GetTitledFirstName|l] após enviar a [hostage_home_court.Custom2('RelationToMe', SCOPE.sC('hostage'))], [hostage.GetFirstName].\n\n"
 bp2_hostage_system.0203.closing: "A resposta, no entanto, foi rápida e meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('my_hostage'))] logo chegou aos meus portões!"
 bp2_hostage_system.0204.t: "Preso em Limbo"
 bp2_hostage_system.0204.closing: "A resposta foi clara; por infelicidade deve ficar com meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('my_hostage'))] , [my_hostage.GetFirstName] durante o futuro próximo para garantir que a paz continue…"
 bp2_hostage_system.0204.a: "Pobre [my_hostage.Custom('GirlBoy')]…"
 bp2_hostage_system.0300.t: "Sob Minha Vigilância"
 bp2_hostage_system.0300.intro: "A escolta segura de um refém é a responsabilidade, o juramento, de um guardião. Faço um pacto de honra para proteger[hostage.GetHerHim] de todo mal,"
 bp2_hostage_system.0300.killer: "e mesmo assim, matei [hostage.GetFirstName]."
 bp2_hostage_system.0300.violent: "mas [hostage.GetFirstName] encontrou um fim bastante trágico em minha corte."
 bp2_hostage_system.0300.fallback: "e, no entanto, agora jaz mort[hostage.Custom('ES_OA')]."
 bp2_hostage_system.0300.desc: "\n\nNão há nada que fazer; [hostage_home_court.Custom('ES_ElLa')] [hostage_home_court.GetTitledFirstName|l] ficará furioso quando a notícia chegar à corte [hostage_home_court.GetPrimaryTitle.GetAdjectiveNoTooltip] e nossos acordos serão descartados."
 bp2_hostage_system.0300.my_hostage: "\n\nSólo posso esperar que [hostage_home_court.Custom('ES_ElLa')] [hostage_home_court.GetTitledFirstName|l] pense melhor antes de fazer justiça com meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('my_hostage'))], [my_hostage.GetFirstName]."
 bp2_hostage_system.0300.a.killer: "Pois bem..."
 bp2_hostage_system.0300.a.violent: "Muito trágico..."
 bp2_hostage_system.0300.a: "Trágico..."
 bp2_hostage_system.0301.opening: "[hostage_warden.Custom2('AppropriateGreeting', ROOT.Char)]"
 bp2_hostage_system.0301.intro: "Lamento informar-lhe que seu[hostage.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('hostage'))], [hostage.GetFirstName], faleceu.\n\n"
 bp2_hostage_system.0301.killer: "Saibam que não me restou alternativa senão tirar sua vida."
 bp2_hostage_system.0301.violent: "A maneira como [hostage.GetSheHe] deixou este mundo, sob minha proteção, vai me assombrar."
 bp2_hostage_system.0301.fallback: "Perdoe-me por ter falhado de forma tão lamentável em minha missão como [Select_CString( ROOT.Char.IsFemale, 'tutora suya', 'tutor suyo' )]."
 bp2_hostage_system.0301.desc: "Espero que um dia você possa me perdoar, por ambos os nossos sakes."
 bp2_hostage_system.0301.my_hostage: "\n\nO que quer que tenha acontecido aqui, meu [hostage_warden.Custom2('RelationToMe', SCOPE.sC('my_hostage'))] , [my_hostage.GetFirstName] é inocente de tudo isso."
 bp2_hostage_system.0301.a.killer: "Será… #EMP maldit[hostage.Custom('ES_OA')]#!!"
 bp2_hostage_system.0301.a.violent: "[hostage.GetFirstNameNoTooltip]... por que...?"
 bp2_hostage_system.0301.a: "Não pode ser..."
 bp2_hostage_system.0301.b: "Um olho por um olho!"
 bp2_hostage_system.0400.t: "Mudança nas Circunstâncias"
 bp2_hostage_system.0400.landed_hostage: "Como meu cativo[hostage.Custom('ES_OA')]; [hostage.GetFirstName] herdou [hostage.GetPrimaryTitle.GetNameNoTierNoTooltip], e agora me vejo cuidando de um[hostage.Custom('ES_XA')] [hostage.GetTitleAsNameNoTooltip|l]!"
 bp2_hostage_system.0400.ruler_hostage: "Com meu cativo[hostage.Custom('ES_OA')], [hostage.GetFirstName]que agora está no comando de seu [hostage.GetDomicile.GetType.GetName|l] próprio, me vejo cuidando de um[hostage.Custom('ES_XA')] [hostage.GetTitleAsNameNoTooltip|l]!"
 bp2_hostage_system.0400.imprisoned_hostage_self: "Agora que meu antigo cativo[hostage.Custom('ES_OA')] , [hostage.GetFirstName] , agora definha em minha prisão, meu pacto com [home_court.Custom('ES_ElLa')] [home_court.GetTitledFirstName|l] está definitivamente encerrado."
 bp2_hostage_system.0400.imprisoned_hostage_fail: "Agora que meu antigo cativo[hostage.Custom('ES_OA')] escapou de minhas tentativas de aprisionar[hostage.GetHerHim] , meu pacto com [home_court.Custom('ES_ElLa')] [home_court.GetTitledFirstName|l] acabou definitivamente."
 bp2_hostage_system.0400.imprisoned_hostage: "Agora que meu cautiv[hostage.Custom('ES_OA')], [hostage.GetFirstName] definha na prisão [imprisoner.Custom('ES_DelDela')] [imprisoner.GetTitledFirstName|l] meu pacto com [home_court.Custom('ES_ElLa')] [home_court.GetTitledFirstName|l] de repente fica sem propósito."
 bp2_hostage_system.0400.unrelated_hostage: "Agora que meu cativeiro[hostage.Custom('ES_OA')] , [hostage.GetFirstName] , deixou de ter importância para [home_court.Custom('ES_ElLa')] [home_court.GetTitledFirstName|l] , de repente, nosso pacto fica sem propósito."
 bp2_hostage_system.0400.unlanded_warden_title: "Com a perda de [lost_title.GetNameNoTierNoTooltip]meu pacto com [home_court.Custom('ES_ElLa')] [home_court.GetTitledFirstName|l], [hostage.Custom2('RelationToMe', SCOPE.sC('home_court'))] do meu cativo[hostage.Custom('ES_OA')], [hostage.GetFirstName], de repente fica sem sentido."
 bp2_hostage_system.0400.unlanded_warden: "Com a perda das minhas terras, meu pacto com [home_court.Custom('ES_ElLa')] [home_court.GetTitledFirstName|l], [hostage.Custom2('RelationToMe', SCOPE.sC('home_court'))] do meu cativo[hostage.Custom('ES_OA')], [hostage.GetFirstName], de repente fica sem propósito."
 bp2_hostage_system.0400.unlanded_home_court_title: "[home_court.GetTitledFirstName], [home_court.Custom('ES_ElLa')] [hostage.Custom2('RelationToMe', SCOPE.sC('home_court'))] do meu [hostage.Custom('ES_OA')], [hostage.GetFirstName], perdeu suas terras [lost_title.GetAdjectiveNoTooltip] e, de repente, nosso pacto fica sem propósito."
 bp2_hostage_system.0400.unlanded_home_court: "[home_court.Custom('ES_ElLa')|U] [home_court.GetTitledFirstName|l], [hostage.Custom2('RelationToMe', SCOPE.sC('home_court'))] do meu cativo[hostage.Custom('ES_OA')], [hostage.GetFirstName] perdeu suas terras, e, de repente, nosso pacto carece de sentido."
 bp2_hostage_system.0400.dead_home_court: "[home_court.Custom('ES_ElLa')|U] [home_court.GetTitledFirstName|l], [hostage.Custom2('RelationToMe', SCOPE.sC('home_court'))] de meu cativeiro[hostage.Custom('ES_OA')], [hostage.GetFirstName] sem assegurar a sucessão de [home_court.GetHouse.GetBaseNameNoTooltip] e, de repente, nosso pacto carece de sentido."
 bp2_hostage_system.0400.imprisoned_self: "\n\n[home_court.GetFirstNameNoTooltip]"
 bp2_hostage_system.0400.imprisoned: "\n\nTenho certeza de que [hostage.GetFirstNameNoTooltip] logo será libertado..."
 bp2_hostage_system.0400.ruler: "\n\n[hostage.GetFirstNameNoTooltip] partirá em breve para assumir o trono em [hostage.GetCapitalLocation.GetName]."
 bp2_hostage_system.0400.family: "\n\n[hostage.GetFirstNameNoTooltip] está livre para ir embora e se reunir com sua família, se assim o desejar."
 bp2_hostage_system.0400.no_family: "\n\n[hostage.GetFirstNameNoTooltip] está livre para ir embora, embora seu destino esteja longe de ser certo."
 bp2_hostage_system.0400.adopted: "Com meu antigo refém[hostage.Custom('ES_OA')] , [hostage.GetFirstName] , agora considerado[hostage.Custom('ES_OA')] uma parte sólida da casa [ROOT.Char.GetHouse.GetBaseName] , o acordo anterior com [home_court.Custom('ES_ElLa')] [home_court.GetTitledFirstName|l] torna-se redundante."
 bp2_hostage_system.0400.adopted_stay: "\n\nAinda assim, [hostage.GetFirstNameNoTooltip] decidiu com alegria[hostage.Custom('ES_OA')] permanecer em minha corte em [ROOT.Char.GetCapitalLocation.GetName] por enquanto."
 bp2_hostage_system.0400.my_hostage: "\n\nEspero a volta do meu [warden.Custom2('RelationToMe', SCOPE.sC('my_hostage'))][my_hostage.GetFirstName]."
 bp2_hostage_system.0400.a: "Não há nada a ser feito."
 bp2_hostage_system.0400.b: "E ele é muito bem-vindo[hostage.Custom('ES_OA')]!"
 bp2_hostage_system.0400.home: "[hostage.GetFirstNameNoTooltip] parte"
 bp2_hostage_system.0401.landed_hostage: "Como meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('hostage'))] [hostage.GetFirstName] herdou [hostage.GetPrimaryTitle.GetNameNoTierNoTooltip], agora [warden.Custom('ES_ElLa')] [warden.GetTitledFirstName|l] se encontra cuidando de um[hostage.Custom('ES_XA')] [hostage.GetTitleAsNameNoTooltip|l]!"
 bp2_hostage_system.0401.ruler_hostage: "Como meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('hostage'))] , [hostage.GetFirstName], agora governa sobre um [hostage.GetDomicile.GetType.GetName|l] próprio, [warden.Custom('ES_ElLa')] [warden.GetTitledFirstName|l] se encontra cuidando de um[hostage.Custom('ES_XA')] [hostage.GetTitleAsNameNoTooltip|l]!"
 bp2_hostage_system.0401.imprisoned_hostage_self: "Descobri que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('hostage'))] , [hostage.GetFirstName] , foi aprisionad[hostage.Custom('ES_OA')] ignominiosamente por [warden.Custom('ES_ElLa')] [warden.GetTitledFirstName|l], que havia prometido cuidar de [warden.GetSheHe] como cativ[hostage.Custom('ES_OA')]."
 bp2_hostage_system.0401.imprisoned_hostage_fail: "Fiquei sabendo que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('hostage'))] , [hostage.GetFirstName] , escapou por pouco de ser encarcerad[hostage.Custom('ES_OA')] por seu tutor, [imprisoner.Custom('ES_ElLa')] [imprisoner.GetTitledFirstName|l]!"
 bp2_hostage_system.0401.imprisoned_hostage: "Agora que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('hostage'))] , [hostage.GetFirstName] , definha na prisão [imprisoner.Custom('ES_DelDela')] [imprisoner.GetTitledFirstName|l] , meu pacto com [warden.Custom('ES_ElLa')] [warden.GetTitledFirstName|l] de repente carece de sentido."
 bp2_hostage_system.0401.unrelated_hostage: "Agora que [hostage.GetFirstName], a quem enviamos daqui para ser cativ[hostage.Custom('ES_OA')] do trono [warden.GetPrimaryTitle.GetAdjectiveNoTooltip], deixou de ter importância para [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], de repente, nosso pacto com [warden.Custom('ES_ElLa')] [warden.GetTitledFirstName|l] carece de sentido."
 bp2_hostage_system.0401.unlanded_home_court_title: "Com a perda de [lost_title.GetNameNoTierNoTooltip], meu pacto com [warden.Custom('ES_ElLa')] [warden.GetTitledFirstName|l], tutor[warden.Custom('ES_XA')] de minha [home_court.Custom2('RelationToMe', SCOPE.sC('hostage'))], [hostage.GetFirstName], de repente perde o sentido."
 bp2_hostage_system.0401.unlanded_home_court: "Com a perda de minhas terras, meu pacto com [warden.Custom('ES_ElLa')] [warden.GetTitledFirstName|l], [hostage.Custom2('RelationToMe', SCOPE.sC('warden'))|l] do meu cativo[hostage.Custom('ES_OA')], [hostage.GetFirstName], de repente perde o sentido."
 bp2_hostage_system.0401.unlanded_warden_title: "[warden.GetTitledFirstName], [warden.Custom('ES_ElLa')] [hostage.Custom2('RelationToMe', SCOPE.sC('warden'))] do meu cativo[hostage.Custom('ES_OA')], [hostage.GetFirstName] perdeu suas terras [lost_title.GetAdjectiveNoTooltip] e, de repente, nosso pacto carece de sentido."
 bp2_hostage_system.0401.unlanded_warden: "[warden.Custom('ES_ElLa')|U] [warden.GetTitledFirstName|l], [hostage.Custom2('RelationToMe', SCOPE.sC('warden'))] do meu cativo[hostage.Custom('ES_OA')], [hostage.GetFirstName], perdeu suas terras e, de repente, nosso pacto não tem mais propósito."
 bp2_hostage_system.0401.dead_warden: "[warden.Custom('ES_ElLa')] [warden.GetTitledFirstName|U], [hostage.Custom2('RelationToMe', SCOPE.sC('warden'))] do meu cativeiro[hostage.Custom('ES_OA')], [hostage.GetFirstName], morreu sem garantir a sucessão de [warden.GetHouse.GetBaseNameNoTooltip]."
 bp2_hostage_system.0401.imprisoned: "\n\nRezo para que [ROOT.Char.GetFaith.HighGodName] seja bondoso e [hostage.GetFirstNameNoTooltip] seja logo libertado."
 bp2_hostage_system.0401.imprisoned_fail: "\n\nUma forma escandalosa de tratar uma[hostage.Custom('ES_XA')] cativa[hostage.Custom('ES_OA')], sem dúvida, mas o retorno de [hostage.GetFirstNameNoTooltip] [Select_CString( hostage.IsFemale, 'sana y salva', 'sano y salvo' )] é uma bênção."
 bp2_hostage_system.0401.adopted: "Ouvi rumores de que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('hostage'))] , [hostage.GetFirstName] , agora se considera parte da Casa [hostage.GetHouse.GetBaseName]! [warden.Custom('ES_ElLa')|U] [warden.GetTitledFirstName|l] , vil [warden.Custom2('InsultNoun', ROOT.Char)] , deve ter envenenado a mente dele!"
 bp2_hostage_system.0401.adopted_stay: "\n\nDizem até que [hostage.GetFirstNameNoTooltip] considera #EMP [warden.GetCapitalLocation.GetName]#! como seu verdadeiro lar, não [ROOT.Char.GetCapitalLocation.GetName]!"
 bp2_hostage_system.0401.a: "Seja como for."
 bp2_hostage_system.0401.b: "Traição!"
 bp2_hostage_system.0402.inherited: "Hoje cedo chegou a notícia de [ROOT.Char.GetCapitalLocation.GetNameNoTooltip]; meu [hostage.Custom2('RelationToMe', SCOPE.sC('home_court'))], [home_court.Custom('ES_ElLa')] [home_court.GetTitledFirstName|l], morreu…\n\nDizem que [home_court.GetDeathReasonHideKiller].\n\n[warden.Custom('ES_ElLa')|U] [warden.GetTitledFirstName|l] me concedeu licença e, como herdeir[ROOT.Char.Custom('ES_OA')] de [home_court.GetFirstNameNoTooltip], devo ser forte e assumir o legado de [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]."
 bp2_hostage_system.0402.dead: "\n\nNunca mais vou poder ver meu(a) [hostage.Custom2('RelationToMe', SCOPE.sC('home_court'))] novamente..."
 bp2_hostage_system.0402.a: "Precisamos partir."
 bp2_hostage_system.0410.t: "Mudança de Sorte"
 bp2_hostage_system.0410.desc: "As circunstâncias [home_court.Custom('ES_DelDela')] [home_court.GetTitledFirstName|l], [hostage.Custom2('RelationToMe', SCOPE.sC('home_court'))] do meu cativo[hostage.Custom('ES_OA')], [hostage.GetFirstName], mudaram; agora se vê reduzid[home_court.Custom('ES_OA')] a um[home_court.Custom('ES_XA')] [home_court.GetTitleAsNameNoTooltip|l] mais.\n\nNosso pacto foi feito sob pressupostos bastante diferentes, e talvez seja prudente reconsiderá-lo agora…"
 bp2_hostage_system.0410.a: "[hostage.GetFirstNameNoTooltip] e [my_hostage.GetFirstNameNoTooltip] vão voltar para casa."
 bp2_hostage_system.0410.b: "[my_hostage.GetFirstNameNoTooltip] deve voltar imediatamente."
 bp2_hostage_system.0410.c: "Você não tem mais utilidade, [hostage.GetFirstNameNoTooltip]."
 bp2_hostage_system.0410.d: "Nada muda."
 bp2_hostage_system.0411.opening: "[warden.Custom2('AppropriateGreeting', ROOT.Char)]"
 bp2_hostage_system.0411.intro: "Suas circunstâncias mudaram desde que me enviaram seu[hostage.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('hostage'))], [hostage.Custom('ES_ElLa')] [hostage.GetTitledFirstName|l], para ser meu cativo[hostage.Custom('ES_OA')]\n\n"
 bp2_hostage_system.0411.my_hostage: "Exijo que devolvais meu [warden.Custom2('RelationToMe', SCOPE.sC('my_hostage'))] [my_hostage.Custom('ES_ElLa')] [my_hostage.GetTitledFirstName|l], imediatamente."
 bp2_hostage_system.0411.hostage: "[hostage.GetSheHe|U] logo vai voltar, e nosso pacto será rompido."
 bp2_hostage_system.0411.both: "[hostage.Custom('ES_ElLa')|U] [hostage.GetTitledFirstName|l] já está a caminho de volta, como suponho que em breve estará meu [warden.Custom2('RelationToMe', SCOPE.sC('my_hostage'))] , [my_hostage.GetFirstName]."
 bp2_hostage_system.0411.a: "Muito bem."
 bp2_hostage_system.0500.t: "Um Novo Lar"
 bp2_hostage_system.0500.desc: "Sou informado de que meu cativo[hostage.Custom('ES_OA')] , [hostage.GetFirstName] , finalmente chegou de [hostage_home_court.GetPrimaryTitle.GetNameNoTierNoTooltip]."
 bp2_hostage_system.0500.anxious: "Certamente, [hostage_home_court.Custom('ES_ElLa')] [hostage_home_court.Custom2('RelationToMe', SCOPE.sC('hostage'))] [hostage_home_court.Custom('ES_DelDela')] [hostage_home_court.GetTitledFirstName|l] ficará inquiet[hostage.Custom('ES_OA')] com sua nova vida em [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]."
 bp2_hostage_system.0500.home: "\n\nConfiai em voss[hostage_home_court.Custom('ES_OA')] [hostage.Custom2('RelationToMe', SCOPE.sC('hostage_home_court'))], [hostage.GetHerHim] tranquilizo. Aqui sereis bem tratados."
 bp2_hostage_system.0500.away: "\n\nEstou convencid[ROOT.Char.Custom('ES_OA')] de que meu povo fará com que se sinta em casa."
 bp2_hostage_system.0500.a.home: "Vou te mostrar seu quarto."
 bp2_hostage_system.0500.a: "O pacto está em vigor."
 bp2_hostage_system.0501.opening: "Saudações meu(a) [hostage.Custom2('RelationToMe', hostage_home_court)],"
 bp2_hostage_system.0501.desc: "Cheguei [Select_CString( hostage.IsFemale, 'sana y salva', 'sano y salvo' )] a [hostage_warden.GetPrimaryTitle.GetNameNoTierNoTooltip] e [hostage.Custom('ES_ElLa')] [hostage_warden.GetTitledFirstName|l] ratificou o vosso pacto.\n\n"
 bp2_hostage_system.0501.child_alone: "Não há outras crianças aqui, e o lugar é muito estranho."
 bp2_hostage_system.0501.child: "Conheci as outras crianças da corte. Elas parecem simpáticas."
 bp2_hostage_system.0501.adult: "Por favor, não se esqueça de mim."
 bp2_hostage_system.0501.a.child_alone: "Pobre [hostage.Custom('GirlBoy')]…"
 bp2_hostage_system.0501.a.child: "Espero que esteja feliz lá."
 bp2_hostage_system.0501.a: "Tudo conforme planejado."
 bp2_hostage_system.0502.opening: "[hostage_warden.Custom2('AppropriateGreeting', hostage_home_court)]"
 bp2_hostage_system.0502.desc: "Vosso[hostage.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('hostage'))], [hostage.GetFirstName], chegou [Select_CString( hostage.IsFemale, 'sana y salva', 'sano y salvo' )] a [hostage_warden.GetPrimaryTitle.GetNameNoTierNoTooltip].\n\nConsiderai nosso pacto confirmado."
 bp2_hostage_system.0502.a: "Muito bem."
 bp2_hostage_system.0510.intro: "Fui informado pelo guarda de que meu(a) [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('hostage'))], [hostage.GetFirstName], se aproxima de [ROOT.Char.GetCapitalLocation.GetNameNoTooltip],"
 bp2_hostage_system.0510.duration_short: "embora pareça que foi apenas ontem que [hostage.GetSheHe] partiu para [warden.GetPrimaryTitle.GetNameNoTierNoTooltip]."
 bp2_hostage_system.0510.duration_long: "após muitos anos longe em [hostage_warden.GetPrimaryTitle.GetNameNoTierNoTooltip]. $bp2_hostage_system.0510.older$"
 bp2_hostage_system.0510.duration: "de volta para sua estadia em [hostage_warden.GetPrimaryTitle.GetNameNoTierNoTooltip]. $bp2_hostage_system.0510.older$"
 bp2_hostage_system.0510.older: "[hostage.GetSheHe|U] está mais velho, mas [hostage.GetHerHim] reconheço de imediato."
 bp2_hostage_system.0510.home: "\n\nNos abraçamos nos portões, "Você precisa me contar tudo, [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hostage'))] meu[hostage.Custom('ES_OA')]! Foi horrível?"."
 bp2_hostage_system.0510.away: "\n\nVamos conversar quando eu estiver em casa."
