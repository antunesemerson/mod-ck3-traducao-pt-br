l_spanish:
 ##EVENTS
 #Parent/Guardian: Your child/ward walks in on you performing your stress trait
 bp2_yearly.1000.t: "O Que Vem Por Aí..."
 bp2_yearly.1000.desc_drunkard: ""Servo, mais uma rodada, por favor… #EMP *hip*!#!"\n\nAs bebidas de [ROOT.Char.Custom('RegionalAlcoholicDrink')] me afetam a fala, mas estou acalorado[ROOT.Char.Custom('ES_OA')] em seu conforto demais para me preocupar com isso neste momento. Para quase nada me preocupar, na verdade.\n\nEm uma grande onda úmida, o álcool decide evacuar meu corpo… direto sobre o jantar! Os convidados ao meu redor bufam de nojo."
 bp2_yearly.1000.desc_hashishiyah: "El hachís de esta ocasión es de excelente calidad; ¡tan fuerte que me empieza a picar la piel y la ropa me #EMP aprieta demasiado#!!\n\nMe desnudo y, por puro capricho, sigo el canto de los pajaritos hasta el exterior. Un momento después, me giro…"
 bp2_yearly.1000.desc_reclusive: "\"Malditos tolos e vermes rançosos, todos eles!\", murmuro, enquanto enfim encontro a solidão e o silêncio. Massageio as têmporas e fecho os olhos.\n\nUm ruído inesperado me traz de volta à realidade. Abro os olhos de repente. #EMP No estoy sol[ROOT.Char.Custom('ES_OA')], como ansío estar?!#! Murmuro uma maldição."
 bp2_yearly.1000.desc_irritable: "É tarde da noite. Esses parasitas menores não param de tagarelar ao meu redor. Minha cabeça latejante crava pregos nos meus pensamentos.\n\nUma jarra que cai se espatifa no chão ao meu lado.\n\nSem hesitar, eu explodo e grito com o servo culpado: "#EMP [dummy_gender.Custom2('InsultNounClumsy', ROOT.Char)|U] insolente#!! Você foi gerado por um ogro [dummy_gender.Custom2('InsultAdjectiveClumsy', ROOT.Char)]?!"."
 bp2_yearly.1000.desc_flagellant: "#EMP *CRAQUE!*#! Meu chicote me rasga com raiva, #EMP novamente#! e #EMP novamente.#! A intensa, isolada e ardente dor me concentra.\n\nDou mais algumas chicotadas no meu corpo. Cada golpe me aproxima um pouquinho mais da doce absolvição."
 bp2_yearly.1000.desc_profligate: "#EMP Hmm#! isto parece bom. Sim, aquilo também. Feitas as minhas escolhas, jogo as finas mercadorias para os meus servos.\n\nVirando-me, vejo a pilha completa de frivolidades que acumulei. Está ficando bem... extensa. E minha bolsa... está bem vazia."
 bp2_yearly.1000.desc_improvident: "Um excelente sermão, um rito perfeito. Quando estamos prestes a sair de [ROOT.Char.GetFaith.HouseOfWorship], eu — claro — digno o(a) meu(minha) [ROOT.Char.Custom('DefaultPriestTitle')] não apenas com moedas, mas com todas as joias que posso dispensar. Alguns me olham, desconfiados.\n\nMas o ouro é algo fugaz! Mais pesado é o peso da culpa e da vergonha…"
 bp2_yearly.1000.desc_contrite: "[other_guest.Custom('ES_ElLa')|U] [other_guest.GetTitledFirstName|l] me olha boquiabert[other_guest.Custom('ES_OA')], horrorizad[other_guest.Custom('ES_OA')] pela informação íntima que acabei de confessar no jantar. "Você fez #EMP o quê#!?", repete confus[other_guest.Custom('ES_OA')].\n\nMinha contrição tem suas vantagens… e desvantagens, é preciso reconhecer. Sinto-me aliviad[ROOT.Char.Custom('ES_OA')]… mas não será porque sobrecarrego os outros?"
 bp2_yearly.1000.desc_comfort_eater: "Me reclino na cadeira, #EMP probablemente#! bastante chei[ROOT.Char.Custom('ES_OA')] porém outra guloseima sedutora desliza entre meus lábios. Os rigores da minha manhã agitada parecem quase soterrados.\n\nPercebo que estou cercado por incontáveis pratos vazios de [ROOT.Char.Custom('FavoriteTreat')]. Incontáveis."
 bp2_yearly.1000.desc_inappetetic: "Cutuco a comida à minha frente, mexendo-a para dar a impressão de que comi. Não quero causar preocupação.\n\nQuem tem tempo para comer? O dia é para governar; a noite é para fazer política. Como posso encontrar prazer na comida, enquanto tudo isso pesa sobre mim?"
 bp2_yearly.1000.desc_journaller: "Solto um suspiro de alívio, colocando de lado meus materiais de escrita. Deixo meus olhos percorrerem o comprimento do meu pequeno diário muito amassado, uma coleção de rabiscos que raramente deixo de lado.\n\nLevanto a cabeça e vejo que a luz do sol da manhã deu lugar ao pôr do sol. Apenas #EMP quanto tempo#! tenho me dedicado a escrever?"
 bp2_yearly.1000.desc_confider: "Seja na refeição da manhã ou em uma ocasião informal, muitas vezes me inclino para compartilhar minha perspectiva das coisas com meu confidente, [confider_friend.Custom('ES_ElLa')][confider_friend.GetTitledFirstName|l].\n\nQue bom é ouvir meus pensamentos com minhas próprias palavras e confiar nas opiniões de um amigo! Tendo obtido o conselho de [confider_friend.GetFirstNameNoTooltip] sobre um assunto trivial, olho para a mesa movimentada…"
 bp2_yearly.1000.desc_athletic: "Faço mais uma volta ao redor do [ROOT.Char.Custom('ResidenceBuilding')], suor escorrendo pelas minhas costas, captando alguns olhares de transeuntes. Um corpo forte realmente gera uma mente saudável!\n\nCom um rugido, paro abruptamente; pego uma grande pedra e a levanto até meu peito."
 bp2_yearly.1000.outro_bad: "\n\n...e então vejo meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('appropriate_child'))], [appropriate_child.Custom('ES_ElLa')] [appropriate_child.GetTitledFirstName|l], olhando fixamente para mim. #EMP Humm.#!"
 bp2_yearly.1000.outro: "\n\n...então percebo meu(a) [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('appropriate_child'))] [appropriate_child.GetFirstName] olhando para mim, intrigado."
 bp2_yearly.1000.a: "Não foi exatamente o meu melhor momento..."
 bp2_yearly.1000.a_good: "Agora, onde eu estava..."
 bp2_yearly.1000.a.flavor: "Tenho certeza de que [appropriate_child.GetFirstNameNoTooltip] ficará bem..."
 bp2_yearly.1000.a.flavor_good: "Certamente nem todos os hábitos são ruins?"
 bp2_yearly.1000.a.tt: "Sua exibição pode ter um impacto duradouro em [appropriate_child.GetShortUIName]"
 bp2_yearly.1000.b: "Quer se juntar a mim?"
 bp2_yearly.1000.b_drunkard: "Quer #EMP *hic*#! se juntar a mim?"
 bp2_yearly.1000.b_contrite: "Quais são #EMP as suas#! confissões, criança?"
 bp2_yearly.1000.b_inappetetic: "Comida é para os animais."
 bp2_yearly.1000.b_us: "Quer se juntar a nós?"
 bp2_yearly.1000.b_hashishiyah: "Quer experimentar?"
 bp2_yearly.1000.b_reclusive: "Por favor, #EMP vá embora#!."
 bp2_yearly.1000.b_flagellant: "Às vezes, o chicote é o seu único consolo."
 bp2_yearly.1000.b_improvident: "Minha bolsa está leve, mas meu coração ainda mais leve."
 bp2_yearly.1000.b_athletic: "Eu até posso correr mais rápido que [ROOT.Char.GetFaith.WitchGodName], sabe?"
 bp2_yearly.1000.b_agitated: "O que é que você está #EMP olhando!#!?"
 bp2_yearly.1000.b.flavor: "Quanto mais, melhor!"
 bp2_yearly.1000.b.flavor_contrite: "Segredos são como feridas infectadas..."
 bp2_yearly.1000.b.flavor_inappetetic: "Devemos voltar a fazer o trabalho real."
 bp2_yearly.1000.b.flavor_confider: "Confiar é uma arte!"
 bp2_yearly.1000.b.flavor_flagellant: "É a verdade."
 bp2_yearly.1000.b.flavor_improvident: "Devemos cuidar dos menos afortunados."
 bp2_yearly.1000.b.flavor_athletic: "... Bem, não é como se eu tivesse tentado."
 bp2_yearly.1000.b.flavor_agitated: "A #EMP audácia#! de algumas pessoas!"
 #Follow-up; the child is mimicking your stress behavior
 bp2_yearly.1001.t: "…dá voltas"
 bp2_yearly.1001.desc_drunkard: "As lojas estão #EMP geralmente#! seguras; isso é facilmente lembrado devido às queixas incessantes do cozinheiro sobre ratos. Cautelosamente, me aproximo do sombrio e aberto [ROOT.Char.Custom('GetRoom')].\n\n [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('appropriate_child'))] [appropriate_child.GetFirstName] aparece, com a boca aberta, olhos vidrados, e o hálito exalando [ROOT.Char.Custom('RegionalAlcoholicDrink')] — e guloseimas roubadas."
 bp2_yearly.1001.desc_hashishiyah: "Una risita ahogada sale de una [ROOT.Char.Custom('GetRoom')] donde no debería haber nadie. Entro por curiosidad y descubro a mi [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('appropriate_child'))], [appropriate_child.GetFirstName], escondid[appropriate_child.Custom('ES_OA')] en un rincón.\n\nIntenta contener su hilaridad, pero yo #EMP conozco#! esa sonrisa torcida… ¡Por no hablar de los ojos inyectados en sangre y el olor palpable a hachís!"
 bp2_yearly.1001.desc_reclusive: "Hace días que no se ha visto por nuestra residencia a mi [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('appropriate_child'))] [appropriate_child.GetFirstName]. Con los sirvientes que empiezan a murmurar y una demostración de preocupación por parte de sus familiares, me acerco a la puerta de su [ROOT.Char.Custom('GetChamber')].\n\nAl entrar —después de todo #EMP es#! mi dominio—, [appropriate_child.GetFirstNameNoTooltip] se da la vuelta sin ninguna formalidad ni cortesía, bufándome para que salga y [appropriate_child.GetHerHim] deje a solas."
 bp2_yearly.1001.desc_irritable: "A caminho da mesa para o privado, encontro um[appropriate_child.Custom('ES_XA')] [appropriate_child.GetFirstName] #EMP muy#! furios[appropriate_child.Custom('ES_OA')].\n\n"#EMP [appropriate_child.Custom2('InsultNounClumsy', SCOPE.sC('appropriate_child'))|U] insolente!#!", ele urra. "Você manchou meu [appropriate_child.Custom('child_object_of_interest')]! Por que você não se afoga em [ROOT.Char.Custom('RegionalDrink')]?""
 bp2_yearly.1001.desc_flagellant: "Mis [ROOT.Char.Custom('GetDungeonPlural')] resuenan con gritos de dolor…, gritos #EMP juveniles#!. Salgo corriendo.\n\nEntornando los ojos, veo que [appropriate_child.Custom('ES_ElLa')] culpable es mi [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('appropriate_child'))] [appropriate_child.GetFirstName] y… #EMP ¿eso es uno de mis látigos?#! Se me desencaja la mandíbula mientras [appropriate_child.GetFirstNameNoTooltip] vuelve a fustigarse en nombre de [ROOT.Char.GetFaith.HighGodNameAlternate]."
 bp2_yearly.1001.desc_profligate: "É a terceira vez este mês que [appropriate_child.GetFirstName] se aproxima para me pedir algum brinquedo novo e caro. Os vendedores ambulantes seguem todos os nossos movimentos a partir de minha [ROOT.Char.Custom('FortifiedBuilding')].\n\nIsso me preocupa um pouco; afinal, o que aconteceria se um dia [appropriate_child.GetFirstNameNoTooltip] estivesse à frente do próprio tesouro? Tantos gastos…\n\nE o que é isto? Comprou o mesmo adereço que eu comprei certa vez, um [ROOT.Char.Custom('GetAccessory')]?"
 bp2_yearly.1001.desc_improvident: "Nos últimos dias, notei que meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('appropriate_child'))]. [appropriate_child.GetFirstName]. está dando muitos de seus brinquedos a outras crianças.\n\nNos raros momentos entre os plebeus, ele(a) me importuna para dar aos mendigos — e para de chorar diante da triste história de cada pobre viúva!"
 bp2_yearly.1001.desc_contrite: "Nosso[appropriate_child.Custom('ES_OA')] [appropriate_child.GetFirstName] está em pé sobre uma caixa. Reuniu um grupo de crianças e está revelando a elas os segredos mais banais imagináveis. Em troca, ele convence as crianças a contarem suas próprias travessuras.\n\n"E-eu comi a última porção de [appropriate_child.Custom('FavoriteTreat')]", admite tremulamente[dummy_gender.Custom('ES_OA')] um[dummy_gender.Custom('ES_XA')] [dummy_gender.Custom('GirlBoy')]. "Eu matei um rato!", confessa outra criança."
 bp2_yearly.1001.desc_comfort_eater: "Mientras sigo con mi rutina, noto algo raro: mi [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('appropriate_child'))], [appropriate_child.GetFirstName], en un escondite con un montón de [appropriate_child.Custom('FavoriteTreat')], zampando.\n\nÚltimamente #EMP sí#! que han pasado muchas cosas, y [appropriate_child.GetFirstNameNoTooltip] #EMP ha#! adquirido una forma más bien regordeta…"
 bp2_yearly.1001.desc_inappetetic: "No jantar, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('appropriate_child'))] , [appropriate_child.GetFirstName] , que faz gestos aos servos que carregam bandejas para que [appropriate_child.GetHerHim] o deixem em paz.\n\n Será que é só que ela está ansiosa para partir para outras atividades? Ou — se não estou imaginando coisas — será que as bochechas dela estão ficando um pouco... pálidas e finas?"
 bp2_yearly.1001.desc_journaller: "Ultimamente, há uma enxurrada de bilhetes escritos à mão espalhados por minha [ROOT.Char.Custom('GetCourt')]. A origem? Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('appropriate_child'))] , [appropriate_child.GetFirstName] , curvad[appropriate_child.Custom('ES_OA')] em uma [ROOT.Char.Custom('GetChamber')] vazia, rabiscando à vontade.\n\nPenso no meu próprio hábito de escrever, em meu diário repleto de reflexões. Talvez eu tenha compartilhado uma prática que vale a pena."
 bp2_yearly.1001.desc_confider: "He notado recientemente un cambio sutil en mi [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('appropriate_child'))] [appropriate_child.GetFirstName]. [appropriate_child.GetSheHe|U] pasa más tiempo con sus amigos cercanos, cuchicheando y riendo.\n\nA fe mía que est[appropriate_child.Custom('ES_OA')]s [appropriate_child.Custom('GirlBoyPlural')] saben más de [appropriate_child.GetSheHe] que yo, y sus vínculos parecen fuertes. Amigos como estos, amigos de confianza con los que se puede hablar sin tapujos, son un verdadero regalo."
 bp2_yearly.1001.desc_athletic: "Ao sair para o exterior, as crianças passam em disparada: um[appropriate_child.Custom('ES_OA')] deles é claramente mais rápido[appropriate_child.Custom('ES_OA')] e ágil que seus companheiros.\n\nÉ meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('appropriate_child'))] [appropriate_child.GetFirstName] que está ultrapassando o restante!\n\nSorrio encorajador[ROOT.Char.Custom('ES_XA')], impressionado[ROOT.Char.Custom('ES_OA')] por sua inesperada demonstração de vontade e perseverança. Logo, os outros corredores tropeçam e param cedo demais. O orgulho por [appropriate_child.GetFirstNameNoTooltip] inflama meu coração!"
 bp2_yearly.1001.outro_bad: "\n\nEu me afasto da cena. É assim que #EMP eu#! ajo?"
 bp2_yearly.1001.outro: "\n\nTalvez não seja um hábito tão terrível afinal?"
 bp2_yearly.1001.a: "[appropriate_child.GetFirstNameNoTooltip], venha aqui."
 bp2_yearly.1001.a.flavor: "Faça o que eu digo, não faça o que eu faço."
 bp2_yearly.1001.a.flavor_good: "Esse comportamento deve ser incentivado!"
 bp2_yearly.1001.a.no_trait.t: "Tutorado"
 bp2_yearly.1001.a.no_trait.desc: "[appropriate_child.GetFirstNameNoTooltip] abandona o hábito"
 bp2_yearly.1001.a.trait.t: "Traço Adquirido"
 bp2_yearly.1001.a.trait.desc: "[appropriate_child.GetFirstNameNoTooltip] abraça o hábito"
 bp2_yearly.1001.b: "O que #EMP estou#! fazendo?"
 bp2_yearly.1001.b.flavor: "Devo me aprimorar."
 bp2_yearly.1001.c: "Eu... não consigo lidar com isso agora."
 bp2_yearly.1001.c_ecc_sadist: "Muito bem, [appropriate_child.Custom('GirlBoy')]!"
 bp2_yearly.1001.c_callous: "Quem sou eu para interromper?"
 bp2_yearly.1001.c.flavor: "Tenho certeza de que outra pessoa lidará com isso."
 bp2_yearly.1001.c.flavor_ecc_sadist: "Deixe a carne #EMP cantar.#!"
 bp2_yearly.1001.c.flavor_callous: "Quem disse que criar filhos era difícil?"
 #Child: You notice your parent/guardian performing a stress trait
 bp2_yearly.1005.t: "Criança Vê, Criança..."
 bp2_yearly.1005.intro: "De um tempo para cá, observei meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('stressed_adult'))] , [stressed_adult.Custom('ES_ElLa')] [stressed_adult.GetTitledFirstName|l],"
 bp2_yearly.1005.desc_drunkard: "beber [ROOT.Char.Custom('RegionalAlcoholicDrink')] bastante frequentemente.\n\nUma vez, eu me [stressed_adult.GetHerHim] encontrei em um canto do meu [stressed_adult.Custom('ResidenceBuilding')], de bruços em uma poça de... origem duvidosa. Estava embriagad[stressed_adult.Custom('ES_OA')] como uma cabaça.\n\nMas, apesar da sua aparência, #EMP sí#! que parecia estar bastante em paz."
 bp2_yearly.1005.desc_hashishiyah: "escapando com frequência para fumar haxixe.\n\nCerta vez, encontrei [stressed_adult.GetHerHim] deitad[stressed_adult.Custom('ES_OA')] no chão de seu [ROOT.Char.Custom('GetChamber')] por um dia inteiro, \"para examinar o teto\", disse-me, com olhos vidrados.\n\nParecia bem relaxad[stressed_adult.Custom('ES_OA')]."
 bp2_yearly.1005.desc_reclusive: "ficando escondid[stressed_adult.Custom('ES_OA')] fora da vista em seu [ROOT.Char.Custom('GetChamber')].\n\nNa semana passada, ficou lá por vários dias, chegando até a pedir que as refeições fossem servidas ali.\n\nParecia bastante em paz, embora isso o tenha levado a negligenciar alguns acontecimentos relativos à minha [ROOT.Char.Custom('GetCourt')]."
 bp2_yearly.1005.desc_irritable: "dando broncas severas e descontando em coisas bobas ultimamente.\n\nNo outro dia, quase arrancou a cabeça de um dos servos por dobrar os lençóis de forma errada.\n\nDepois disso, parecia bastante sereno[stressed_adult.Custom('ES_OA')]."
 bp2_yearly.1005.desc_flagellant: "hacerse daño a sí mism[stressed_adult.Custom('ES_OA')] voluntariamente.\n\nEl otro día, [stressed_adult.GetHerHim] oí flagelándose la piel mientras entonaba versículos religiosos.\n\nAl principio me daba miedo, pero parece que esto le calmó la mente."
 bp2_yearly.1005.desc_profligate: "conseguir muitos itens únicos.\n\nAlguns dos servos parecem desprezar os objetos como bugigangas insignificantes e descrevem seu comportamento como jogar ouro num poço.\n\nNão tenho tanta certeza… Parece que [stressed_adult.GetSheHe] gosta de colecionar essas bugigangas, não é?"
 bp2_yearly.1005.desc_improvident: "doando bastante ouro para instituições de caridade ultimamente.\n\nNotei que alguns na corte desaprovam um pouco isso, a ponto de até afirmarem que [stressed_adult.GetSheHe] não sabe lidar com ouro.\n\nMas se isso eleva seu espírito, isso é bom, não é... ?"
 bp2_yearly.1005.desc_contrite: "assumir e confessar as menores indiscrições.\n\nOutro dia, ele confessou a um servo que não se importava muito com as roupas do servo e que tinha a consciência pesada por isso.\n\nPareceu um tanto trivial, mas se isso acalma a mente dele... ?"
 bp2_yearly.1005.desc_comfort_eater: "devorando muitos pratos de [stressed_adult.Custom('FavoriteTreat')].\n\nE por muitos, não quero dizer cinco ou dez — e sim o triplo, e ouvi os servos cochichando que será preciso aumentar o tamanho da camisa dele/dela.\n\nNo entanto, parece que esse excesso de indulgência [stressed_adult.GetHerHim] alivia…"
 bp2_yearly.1005.desc_inappetetic: "descuidando alguma que outra refeição à noite.\n\nBom, na verdade, não [stressed_adult.Custom('ES_LoLa')] o vi comer desde ontem de manhã. Os servos cochicham que o alfaiate precisou diminuir o tamanho de suas camisas outra vez na semana passada.\n\nIsso é ruim?"
 bp2_yearly.1005.desc_journaller: "com manchas de tinta nos dedos.\n\nNão vai a lugar nenhum sem aquele livro encadernado em couro, sempre fazendo anotações.\n\nTirando as manchas de tinta, parece mais calmo[stressed_adult.Custom('ES_OA')] e organizado[stressed_adult.Custom('ES_OA')]. Parece… agradável."
 bp2_yearly.1005.desc_confider: "metafóricamente pegad[stressed_adult.Custom('ES_OA')] al oído de su confidente, [confidant_friend.Custom('ES_ElLa')] [confidant_friend.GetTitledFirstName|l].\n\nParecen compartirlo todo entre ellos cuando caminan juntos, cuchicheando.\n\nDebe de estar bien poder transmitirle a alguien todo lo bueno o malo de tu vida."
 bp2_yearly.1005.desc_athletic: "Faça sol ou chova, dando várias voltas correndo ao redor do perímetro da minha [stressed_adult.Custom('ResidenceBuilding')].\n\nAlguns dos cortesãos torcem o nariz diante do cheiro almiscarado que percebem após o treino; mas parece que os sussurros depreciativos só reforçam sua determinação.\n\nIsso me intriga."
 bp2_yearly.1005.a: "Deveria tentar."
 bp2_yearly.1005.a.flavor: "O que isso poderia fazer de mal...?"
 bp2_yearly.1005.a.stressed.t: "Estressado"
 bp2_yearly.1005.a.stressed.desc: "Não foi #EMP nada#! uma experiência agradável"
 bp2_yearly.1005.a.trait.desc: "Você gosta disso #EMP muito#!"
 bp2_yearly.1005.a.insight.t: "Visão"
 bp2_yearly.1005.a.insight.desc: "Você encontra um jeito melhor"
 bp2_yearly.1005.b: "Melhor não."
 #Parent/Guardian: Your child gives you a hug
 bp2_yearly.1010.t: "Incondicionalmente"
 bp2_yearly.1010.intro: "Enquanto me inclino sobre o mapa em minha [ROOT.Char.Custom('GetChamber')], um #EMP crac#! repentino faz com que eu vire a cabeça em direção à entrada. Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hugging_child'))] [hugging_child.GetFirstName] aparece no limiar"
 bp2_yearly.1010.desc_toddler: "se aproximando de mim com passos trôpegos a uma velocidade surpreendente para sua idade.\n\nSe agarra fortemente à minha perna, me abraçando com força e inclinando a cabeça para trás para me olhar."
 bp2_yearly.1010.desc_rambler: "correndo como o vento em minha direção, gritando #EMP 'Huuuugs!'#!\n\n se inclina perto e agarra meus quadris em um abraço firme."
 bp2_yearly.1010.desc_kid: "entra na sala.\n\n me olha com um olhar indecifrável por um momento e então vem até mim, me envolvendo em um abraço apertado."
 bp2_yearly.1010.desc_teenager: "entra no [ROOT.Char.Custom('GetRoom')], aparentemente desinteressado na minha presença.\n\nEntão, sem aviso, sou envolto em um abraço apertado. [hugging_child.GetSheHe|U] rapidamente solta, com uma expressão envergonhada."
 bp2_yearly.1010.outro_callous: "\n\nQue é essa sensação calorosa no meu peito?…"
 bp2_yearly.1010.outro_young: "\n\n[hugging_child.GetHerHim|U] miro, com uma lágrima escondida no olho enquanto minha mão acaricia seu cabelo numa tentativa de retribuir o gesto."
 bp2_yearly.1010.outro_older: "\n\n[hugging_child.GetHerHim|U] olho, com uma lágrima escondida no canto do olho enquanto minha mão aperta seu ombro numa tentativa de retribuir o gesto."
 bp2_yearly.1010.a: "Você é [Select_CString( hugging_child.IsFemale, 'uma boa', 'um bom' )] [hugging_child.Custom('GetDaughterSon')]…"
 bp2_yearly.1010.a_callous: "Pronto, pronto."
 bp2_yearly.1010.a.flavor: "Não chore. NÃO chore."
 bp2_yearly.1010.a.flavor_callous: "Agora, me solte..."
 #Parent/Guardian: Your child/ward found a pouch of gold while exploring
 bp2_yearly.1015.t: "[Select_CString( golden_child.IsFemale, 'La chica', 'El chico' )] de ouro"
 bp2_yearly.1015.intro: "Uma manhã, enquanto me preparo para encarar o dia, meu(a) [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('golden_child'))] [golden_child.GetFirstName] se aproxima de mim:"
 bp2_yearly.1015.desc_guardian: "\n\n\"[ROOT.Char.Custom('MistressMaster')|U] [ROOT.Char.GetFirstNameNoTooltip],"
 bp2_yearly.1015.desc_parent: "\n\n\"[golden_child.Custom2('RelationToMeShort', ROOT.Char)|U],"
 bp2_yearly.1015.outro: "encontramos isso ontem enquanto explorávamos o/a [ROOT.Char.Custom('ResidenceBuilding')]. Você deve ficar com isso.” Ela lhe entrega uma pequena bolsinha de moedas surrada. Ela faz um som de tilintar."
 bp2_yearly.1015.a: "Muito obrigado!"
 bp2_yearly.1015.a.flavor: "Que [golden_child.Custom('GirlBoy')] mais agradável."
 bp2_yearly.1015.a.flavor_greedy: "É só isso?…"
 bp2_yearly.1015.b: "Fique com isso. Invista!"
 bp2_yearly.1015.b.tt: "Isso ajudará ainda mais [education_focus|lE] na [stewardship|lE] de [golden_child.GetFirstNameNoTooltip]"
 bp2_yearly.1015.b.tt_matching: "Isso ajudará enormemente o [education_focus|lE] em [stewardship|lE] de [golden_child.GetFirstNameNoTooltip]"
 #Parent/Guardian: Your child/ward has found a secret in court
 bp2_yearly.1020.t: "Aqui Há Segredos"
 bp2_yearly.1020.intro: "Ao me inclinar para pegar uma escritura para estudar, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('secrety_child'))] [secrety_child.GetFirstName] irrompe em meu [ROOT.Char.Custom('GetRoom')], interrompendo minha tranquila solidão.\n\n"
 bp2_yearly.1020.desc_guardian: "\"[ROOT.Char.Custom('MistressMaster')|U] [ROOT.Char.GetFirstNameNoTooltip]!"
 bp2_yearly.1020.desc_parent: "\"[secrety_child.Custom2('RelationToMeShort', ROOT.Char)|U]!"
 bp2_yearly.1020.desc: "#EMP No os vais a creer#! o que descobri sobre [secret_keeper.Custom('ES_ElLa')] [secret_keeper.GetTitledFirstName|l]!". Faz uma pausa para recuperar o fôlego e dar um efeito dramático."
 bp2_yearly.1020.a: "Bem, então, fale!"
 bp2_yearly.1020.a.secret.t: "Segredo Aprendido"
 bp2_yearly.1020.a.tt: "Você aprende um segredo sobre um de seus cortesãos"
 bp2_yearly.1020.b: "Nã-não! Segredos são uma moeda de troca, meu querid[secrety_child.Custom('ES_OA')] [secrety_child.Custom('GirlBoy')]!"
 bp2_yearly.1020.b.tt: "Isso ajudará ainda mais a [education_focus|lE] em [intrigue|lE] de [secrety_child.GetFirstNameNoTooltip]"
 bp2_yearly.1020.b.tt_matching: "Isto ajudará enormemente a [education_focus|lE] em [intrigue|lE] de [secrety_child.GetFirstNameNoTooltip]"
 #Parent: Your child does not have the same educational trait as you. Change?
 bp2_yearly.1030.t: "A Queda da Maçã"
 bp2_yearly.1030.desc: "Tenho refletido ultimamente sobre a educação do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('focus_child'))] [focus_child.GetFirstName]; será que [focus_child.Custom('GetChildEducationFocus')|l] é a direção apropriada?\n\nTendo me instruído em [ROOT.Char.Custom('education_focus')|l], descobri que esse conhecimento em particular me foi muito útil.\n\nNão aconteceria o mesmo com [focus_child.GetSheHe]?"
 bp2_yearly.1030.a: "Moldai[focus_child.GetHerHim] à minha imagem."
 bp2_yearly.1030.a.tt_change: "O [education_focus|lE] de [focus_child.GetFirstNameNoTooltip] muda para [THIS.Char.Custom('GetEducationTraitConcept')|l]"
 bp2_yearly.1030.a.tt_tutor: "Você pessoalmente tutora [focus_child.GetFirstNameNoTooltip] para compensar qualquer educação perdida"
 bp2_yearly.1030.b: "Um conjunto de habilidades variado é sempre benéfico."
 bp2_yearly.1030.b.tt: "Isso ajudará ainda mais o [education_focus|lE] na [focus_child.Custom('GetEducationTraitConcept')|l] de [golden_child.GetFirstNameNoTooltip]."
 #Parent/Guardian: Your child/ward has a rock collection
 bp2_yearly.1035.t: "Uma Gema em Bruto"
 bp2_yearly.1035.desc: "Durante una de nuestras lecciones en la [ROOT.Char.Custom('GetChamber')] de mi [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('rock_child'))] [rock_child.GetFirstName], me fijo en una cantidad impresionante de piedras esmeradamente dispuestas en un estante.\n\nUna de ellas destaca en la colección; es algo basta, pero si se la examina de cerca, contiene un color rojo profundo y brillante en su interior.\n\n[rock_child.GetFirstNameNoTooltip] se da cuenta de mi interés, porque la coge y me la entrega: «Os la podéis quedar,"
 bp2_yearly.1035.desc_guardian: "[ROOT.Char.Custom('MistressMaster')] [ROOT.Char.GetFirstNameNoTooltip]."
 bp2_yearly.1035.desc_parent: "[rock_child.Custom2('RelationToMeShort', ROOT.Char)]."
 bp2_yearly.1035.a: "Oh. Obrigado."
 bp2_yearly.1035.a.flavor: "Isso é... uma gema?"
 gemstone_trinket_rough: "Gema Bruta"
 gemstone_trinket_rough.desc: "Uma pedra preciosa desenterrada por [rock_child.Custom('ES_ElLa')] [rock_child.GetTitledFirstNameNoTooltip|l] nas proximidades de [trinket_location.GetNameNoTooltip]."
 gemstone_trinket_modest: "Gema Modesta"
 gemstone_trinket_modest.desc: "Uma bela pedra preciosa desenterrada por [rock_child.Custom('ES_ElLa')] [rock_child.GetTitledFirstNameNoTooltip|l] nas proximidades de [trinket_location.GetNameNoTooltip]."
 gemstone_trinket_brilliant: "Gema Brilhante"
 gemstone_trinket_brilliant.desc: "Uma gema reluzente desenterrada por [rock_child.Custom('ES_ElLa')] [rock_child.GetTitledFirstNameNoTooltip|l] nas proximidades de [trinket_location.GetNameNoTooltip]."
 bp2_yearly.1035.b: "Você deve estudá-la, crianç[rock_child.Custom('ES_OA')]."
 bp2_yearly.1035.b.tt: "Isso ajudará ainda mais a [education_focus|lE] em [learning|lE] de [rock_child.GetFirstNameNoTooltip]"
 bp2_yearly.1035.b.tt_matching: "Isto ajudará enormemente a [education_focus|lE] em [learning|lE] de [rock_child.GetFirstNameNoTooltip]"
 #Parent/Guardian: Your child/ward has a text about martial arts
 bp2_yearly.1040.t: "Uma Pena Poderosa"
 bp2_yearly.1040.desc: "Al recoger las espadas acolchadas para un combate de práctica con mi [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('sparring_child'))] [sparring_child.GetFirstName], me fijo en un diario tirado a un lado.\n\nPor la portada, parece contener ejercicios y prácticas recomendadas relacionadas con las artes marciales.\n\n[sparring_child.GetFirstNameNoTooltip] mira en mi dirección: «Ah, eso; lo leo sobre todo por las ilustraciones. Podéis tomarlo prestado»."
 bp2_yearly.1040.a: "Intrigante."
 bp2_yearly.1040.a.flavor: "\"Segure a empunhadura, não a ponta afiada.\" Hum."
 bp2_yearly.1040.b: "Deveríamos experimentar!"
 bp2_yearly.1040.b.tt: "Isso ajudará ainda mais o [education_focus|lE] [martial|lE] de [sparring_child.GetFirstNameNoTooltip]"
 bp2_yearly.1040.b.tt_matching: "Isso ajudará muito a [education_focus|lE] [martial|lE] de [sparring_child.GetFirstNameNoTooltip]"
 #Parent/Guardian: There is a brawl among some children
 bp2_yearly.1045.t: "O Negociador"
 bp2_yearly.1045.intro: "Durante meu passeio vespertino pelas ruas de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], meu(a) [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('diplomacy_child'))] [diplomacy_child.GetFirstName] corre até mim:"
 bp2_yearly.1045.desc_guardian: "$bp2_yearly.1020.desc_guardian$"
 bp2_yearly.1045.desc_parent: "\"[diplomacy_child.Custom2('RelationToMeShort', ROOT.Char)|U]!"
 bp2_yearly.1045.desc: "Eles começaram a se atacar quando…".\n\nÉ interrompido por um grito agudo, que desvia nossa atenção para a briga acontecendo rua abaixo.\n\nOs combatentes parecem ser um casal de jovens de #EMP mi#! [ROOT.Char.Custom('GetCourt')], que circulam um ao redor do outro se preparando para outra briga."
 bp2_yearly.1045.a: "#EMP Interrompam isso, ambos vocês.#!"
 bp2_yearly.1045.a.perk.t: "Vantagem Obtida"
 bp2_yearly.1045.a.flavor: "Lutando; #EMP em meu próprio quintal#!..."
 bp2_yearly.1045.b: "#EMP Tentador#!! Eu gostaria de apostar em..."
 bp2_yearly.1045.b.flavor: "Aquele parece feroz."
 bp2_yearly.1045.b.win.t: "Vitória na Luta"
 bp2_yearly.1045.b.win.desc: "Seu lutador vence"
 bp2_yearly.1045.b.loss.t: "Derrota na Luta"
 bp2_yearly.1045.b.loss.desc: "Seu lutador perde"
 bp2_yearly.1045.c: "[diplomacy_child.GetFirstNameNoTooltip], ajude-os a mediar."
 bp2_yearly.1045.c.tt: "Isso ajudará ainda mais a [education_focus|lE] em [diplomacy|lE] de [diplomacy_child.GetFirstNameNoTooltip]"
 bp2_yearly.1045.c.tt_matching: "Isto ajudará muito o [education_focus|lE] em [diplomacy|lE] de [diplomacy_child.GetFirstNameNoTooltip]"
 #The tide/sandstorm is ruining your sandcastle!
 bp2_yearly.1050.t_builder: "O Construtor"
 bp2_yearly.1050.t: "$bp2_yearly.1050.t_builder$: Castelos de Areia na Areia"
 bp2_yearly.1050.t_twig: "$bp2_yearly.1050.t_builder$: A Tempestade que se Aproxima"
 bp2_yearly.1050.desc: "O majestoso castelo de areia se ergue sobre a praia, pois passei a tarde esculpindo detalhes minuciosos na areia úmida e granulada.\n\nNo entanto, à medida que o tempo avança implacavelmente, a maré também avança, e a cada segundo ela se aproxima da minha obra-prima lamacenta, mordiscando seus pés.\n\nOlho desesperadamente para a maré, tentando descobrir como garantir a segurança do meu castelo antes de me retirar."
 bp2_yearly.1050.desc_desert: "Os servos passaram o dia todo trazendo água para o meu majestoso castelo de areia no deserto, com o sol castigando implacavelmente nossas costas.\n\nEntalho um último detalhe minucioso na torre mais alta quando noto a tempestade de areia se aproximando no horizonte.\n\nMeu cenho se franze instantaneamente, enquanto tento descobrir como proteger meu castelo da tempestade que se aproxima antes de me retirar."
 bp2_yearly.1050.desc_twig: "A magnífica maquete de castelo que fiz com gravetos e pedrinhas realmente tem um ar esplêndido.\n\nEnquanto dou os retoques finais na torre mais alta, a chuva começa a cair e a tempestade que se formava no horizonte finalmente alcança o meu local.\n\nLanço um olhar desesperado para a tempestade, tentando furiosamente descobrir como garantir a segurança da minha criação antes de me retirar."
 bp2_yearly.1050.a: "Eu vou subornar a maré com essas pedras brilhantes!"
 bp2_yearly.1050.a.flavor: "Eu realmente gosto dessas pedras, mas é por uma boa causa."
 bp2_yearly.1050.a_twig: "Eu vou subornar a tempestade com essas pedras brilhantes!"
 bp2_yearly.1050.a.flavor_twig: "Eu realmente gosto dessas pedras, mas é por uma boa causa."
 bp2_yearly.1050.b: "Eu devo reforçar as paredes exteriores."
 bp2_yearly.1050.b.flavor: "#EMP Eu#! sempre me sinto seguro com paredes."
 bp2_yearly.1050.c: "Um pequeno santuário na praça principal será suficiente."
 bp2_yearly.1050.c.flavor: "[ROOT.Char.GetFaith.HighGodNameAlternate] certamente irá protegê-lo!"
 #Follow-up: Curse you, tide!
 bp2_yearly.1051.t: "$bp2_yearly.1050.t_builder$: Areias Mutantes"
 bp2_yearly.1051.t_twig: "$bp2_yearly.1050.t_builder$: Tudo o que Resta"
 bp2_yearly.1051.desc: "No dia seguinte, ao retornar à praia, eu me apresso até o local onde, no dia anterior, meu majestoso castelo erguia-se sobre a areia úmida."
 bp2_yearly.1051.desc_desert: "À medida que a tempestade diminui no dia seguinte, eu me apresso até o local onde construí cuidadosamente meu majestoso castelo de areia apenas no dia anterior."
 bp2_yearly.1051.desc_twig: "No início da madrugada, a tempestade finalmente se acalma, e eu me apresso pelas moitas para avaliar os danos causados ​​ao meu magnífico castelo de galhos."
 bp2_yearly.1051.outro: "\n\nLa mayor parte ha desaparecido, pero queda un elemento en pie: la torre más alta, con la pequeña insignia que tallé cuidadosamente en persona. #EMP Éxito.#!\n\nA sus pies encuentro una pequeña piedra iridiscente, medio enterrada en el barro. Tal vez sean imaginaciones mías, pero, al examinarla más de cerca, distingo vagamente la forma de… ¿un pequeño martillo?"
 bp2_yearly.1051.a: "Você vence #EMP esta#! rodada, maré."
 bp2_yearly.1051.a_twig: "Você vence #EMP esta#! rodada, tempestade."
 iridescent_stone_trinket: "Pedra Iridescente"
 iridescent_stone_trinket.desc: "A pedra suavemente iridescente encontrada em [ROOT.Char.GetCurrentLocation.GetName] parece ter uma mancha escura na forma de um pequeno martelo de um lado. Curioso."
 #You are challenged to a den-building competition
 bp2_yearly.1055.t: "$bp2_yearly.1050.t_builder$: E Então Eles Foram..."
 bp2_yearly.1055.desc: "O dia foi passado brincando do lado de fora na natureza — no geral, um dia bem agradável — quando de repente eu sou abordado por"
 bp2_yearly.1055.desc_related: "meu(a) [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('den_challenger'))], [den_challenger.GetTitledFirstName|l]: \"Eu desafio você para uma competição de construção de abrigos, [den_challenger.Custom2('RelationToMeShort', ROOT.Char )]!"
 bp2_yearly.1055.desc_relations: "meu(a) [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('den_challenger'))], [den_challenger.GetTitledFirstName|l]: \"Eu desafio você para uma competição de construção de abrigos, [ROOT.Char.GetFirstNameNoTooltip]!"
 bp2_yearly.1055.desc_liege: "uma criança local: "Sou [den_challenger.Custom('ES_ElLa')] [den_challenger.GetTitledFirstName|l] e eu o desafio para uma competição de construção de refúgios, [ROOT.Char.GetLadyLord] [ROOT.Char.GetFirstNameNoTooltip]!"."
 bp2_yearly.1055.outro: "\n\n[den_challenger.GetSheHe|U] se pavoneia e me lança um sorriso triunfante, totalmente certo de que vai vencer."
 bp2_yearly.1055.a: "Deixe-me apenas contratar esses trabalhadores..."
 bp2_yearly.1055.a.flavor: "Não é trapaça se for pago."
 bp2_yearly.1055.b: "Nós podemos construir um abrigo mais forte #EMP juntos!#!"
 bp2_yearly.1055.b.flavor: "Com paredes altas."
 bp2_yearly.1055.c: "Estou ocupad[ROOT.Char.Custom('ES_OA')] construindo este altar. Fora."
 bp2_yearly.1055.c.flavor: "[ROOT.Char.GetFaith.HighGodName] é o único que pode julgar #EMP o#! meu trabalho."
 #Follow-up: Things went down in the woods
 bp2_yearly.1056.t_economy: "$bp2_yearly.1050.t_builder$: … muitos"
 bp2_yearly.1056.t_martial: "$bp2_yearly.1050.t_builder$: … dois"
 bp2_yearly.1056.t_pious: "$bp2_yearly.1050.t_builder$: … Encharcados"
 bp2_yearly.1056.desc_economy: "Recrutar os jovens locais e pagar-lhes em [ROOT.Char.Custom('RegionalRootVegetablePlural')] funcionou maravilhosamente para construir o refúgio mais glorioso deste lado de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip].\n\n[den_challenger.Custom('ES_ElLa')|U] [den_challenger.GetTitledFirstName|l] olha a contragosto para minha criação e resmunga enquanto sua pobre construção individual mal mantém a chuva do lado de fora."
 bp2_yearly.1056.desc_martial: "[den_challenger.Custom('ES_ElLa')|U] [den_challenger.GetTitledFirstName|l] es sorprendentemente fuerte y entre amb[ROOT.Char.Custom('ES_OA')]s levantamos un auténtico refugio, muy resistente, justo a tiempo para que se abran los cielos y dejen caer un verdadero diluvio.\n\nLos rayos atraviesan el cielo a toda velocidad; ninguno nos alcanza ya que estamos protegidos por las paredes del refugio.\n\nMientras nos sentamos dentro del escondite, secos y a salvo gracias a nuestro duro trabajo, no puedo evitar contemplar el valor de la unión y la camaradería."
 bp2_yearly.1056.desc_pious: "Una vez coronado el altar con un palo viejo, la lluvia comienza a caer con fuerza y nos obliga a refugiarnos. Un enorme rayo caído del cielo golpea el altar con un estruendoso *ZRAC* y corro a acercarme para evaluar los daños.\n\nCuando por fin se ve el altar, una tenue columna de humo sale del palo, ennegrecido en un extremo y que ha recibido un buen impacto.\n\nLo observo detenidamente al recogerlo. Todavía está caliente en mi mano."
 bp2_yearly.1056.a_economy: "O emprego é verdadeiramente a #EMP raiz#! da prosperidade."
 bp2_yearly.1056.a_martial: "Alianças são uma ótima defesa. E paredes."
 bp2_yearly.1056.a_pious: "Isso certamente é um sinal de [ROOT.Char.GetFaith.HighGodNameAlternate]!"
 holy_stick: "Bastão Sagrado"
 holy_stick.desc: "Criado durante um raio em [ROOT.Char.GetCurrentLocation.GetName]. Uma mancha enegrecida em forma de martelo marca o cabo."
 #Appreciate the architecture of your capital
 bp2_yearly.1060.t: "$bp2_yearly.1050.t_builder$: Uma Visão para Recordar"
 bp2_yearly.1060.desc: "Como não tenho nada planejado para o dia, esta é uma boa oportunidade para me enriquecer nos diversos aspectos de nossa gloriosa posse de [ROOT.Var('the_builder_sightseed_capital').GetProvince.GetName].\n\nA questão é o que seria mais produtivo — deveria ir ao complexo militar comandado por [martial_character.Custom('ES_ElLa')] [martial_character.GetTitledFirstName|l], ao distrito comercial administrado por [steward_character.Custom('ES_ElLa')] [steward_character.GetTitledFirstName|l] ou fazer uma visita a [learned_character.Custom('ES_AlAla')] [learned_character.GetTitledFirstName|l] na [ROOT.Char.GetFaith.HouseOfWorship] local?"
 economical_architecture_book: "A Arquitetura do Comércio"
 economical_architecture_book_desc: "Um registro sobre a história dos portos comerciais e suas localizações."
 martial_architecture_book: "Um Castelo e Seus Servos"
 martial_architecture_book_desc: "Um registro sobre a arte da construção de castelos."
 religious_architecture_book: "Dei Gratia"
 religious_architecture_book_desc: "Um registro cuidadosamente elaborado de lugares notáveis para adoração em [ROOT.Char.GetCurrentLocation.GetCounty.GetName] com seus arredores."
 bp2_yearly.1060.a: "[steward_character.Custom('ES_ElLa')|U] [steward_character.GetTitledFirstNameNoTooltip|l] parece conhecer bem o assunto."
 bp2_yearly.1060.a.flavor: "O que faz um bom centro comercial?"
 bp2_yearly.1060.b: "Eu deveria inspecionar nossas defesas no complexo."
 bp2_yearly.1060.b.flavor: "Uma boa defesa é o melhor ataque… espere."
 bp2_yearly.1060.c: "Fé em primeiro lugar. Vamos à [ROOT.Char.GetFaith.HouseOfWorship]."
 bp2_yearly.1060.c.flavor: "Como podemos nos aproximar mais de [ROOT.Char.GetFaith.HighGodNameAlternate]?"
 #Follow-up: You spend the day with WhatsTheirFace
 bp2_yearly.1061.t: "$bp2_yearly.1050.t_builder$: Antes do Pôr do Sol"
 bp2_yearly.1061.desc_steward: "Passamos o dia percorrendo os salões das guildas, inspecionando a localização dos artesãos em relação ao seu espaço no mercado e outros aspectos econômicos da construção urbana.\n\n[architecture_character.Custom('ES_ElLa')|U] [architecture_character.GetTitledFirstName|l] é um[architecture_character.Custom('ES_XA')] guia expert[architecture_character.Custom('ES_OA')] , que fala sobre impostos e taxas, e traça o panorama da nossa situação econômica atual."
 bp2_yearly.1061.desc_martial: "Passamos o dia inspecionando as forças militares de [ROOT.Var('the_builder_sightseed_capital').GetProvince.GetName], seus pontos fortes e, certamente, suas fraquezas.\n\n"Toda corrente é tão forte quanto seu elo mais fraco", repete várias vezes [architecture_character.Custom('ES_ElLa')] [architecture_character.GetTitledFirstName|l] durante o passeio, e concordo com isso."
 bp2_yearly.1061.desc_religion: "Tenho dificuldade em me lembrar de um dia mais sereno e pacífico enquanto [architecture_character.Custom('ES_ElLa')] [architecture_character.GetTitledFirstName|l] e eu passeamos por [ROOT.Char.GetFaith.HouseOfWorshipPlural] e santuários de [ROOT.Var('the_builder_sightseed_capital').GetProvince.GetName].\n\nEm um momento, se volta para mim e diz: "Um arco bem construído pode evocar certo tipo de espiritualidade — não acha?"."
 bp2_yearly.1061.outro: "\n\n[architecture_character.GetSheHe|U] termina a visita me entregando [book_to_get.GetName] um exemplar bastante surrado de literatura sobre o tema."
 bp2_yearly.1061.a: "Hoje foi um bom dia."
 bp2_yearly.1061.a.flavor: "Aprendi tanto."
 #Your input is desired on the next building target
 bp2_yearly.1065.t: "$bp2_yearly.1050.t_builder$: A Comunal"
 bp2_yearly.1065.intro_parent: "Chegou a hora de substituir a praça pública de [ROOT.Var('the_builder_constructed_building_in').GetProvince.GetName] e meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('current_regent'))], [current_regent.Custom('ES_ElLa')] [current_regent.GetTitledFirstName|l], e me pediu que eu opine sobre o assunto."
 bp2_yearly.1065.intro_regent: "Chegou a hora de substituir a praça pública de [ROOT.Var('the_builder_constructed_building_in').GetProvince.GetName] e meu [ROOT.Char.GetDiarchTitle|l], [current_regent.Custom('ES_ElLa')] [current_regent.GetTitledFirstName|l], e me pediu para opinar sobre o assunto."
 bp2_yearly.1065.intro: "Chegou a hora de substituir a área comunal de [ROOT.Var('the_builder_constructed_building_in').GetProvince.GetName], e fui convidado a opinar sobre o assunto."
 bp2_yearly.1065.desc_parent_mayor: "\n\nO governante de [ROOT.Var('the_builder_constructed_building_in').GetProvince.GetNameNoTooltip], [province_holder.Custom('ES_ElLa')] [province_holder.GetTitledFirstName|l], e meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('current_regent'))] estiveram discutindo intensamente a manhã inteira e agora chegaram a um impasse."
 bp2_yearly.1065.desc_parent: "\n\nMeu(a) [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('current_regent'))] e o construtor de [ROOT.Var('the_builder_constructed_building_in').GetProvince.GetNameNoTooltip] estiveram tendo discussões acaloradas durante toda a manhã e agora chegaram a um impasse."
 bp2_yearly.1065.desc_regent_mayor: "\n\nO governante de [ROOT.Var('the_builder_constructed_building_in').GetProvince.GetNameNoTooltip], [province_holder.Custom('ES_ElLa')] [province_holder.GetTitledFirstName|l], e [current_regent.GetFirstNameNoTooltip] estiveram discutindo intensamente a manhã inteira e agora chegaram a um impasse."
 bp2_yearly.1065.desc_regent: "\n\n[current_regent.GetFirstNameNoTooltip] e o mestre de obras de [ROOT.Var('the_builder_constructed_building_in').GetProvince.GetNameNoTooltip] passaram a manhã inteira em discussões acaloradas e agora chegaram a um impasse."
 bp2_yearly.1065.desc_mayor: "\n\nO governante de [ROOT.Var('the_builder_constructed_building_in').GetProvince.GetNameNoTooltip], [province_holder.Custom('ES_ElLa')] [province_holder.GetTitledFirstName|l], e seu construtor estiveram discutindo intensamente durante toda a manhã e agora chegaram a um impasse."
 bp2_yearly.1065.desc: "\n\nO construtor e o almoxarife de [ROOT.Var('the_builder_constructed_building_in').GetProvince.GetNameNoTooltip] estiveram discutindo durante toda a manhã sobre quais deveriam ser as novas melhorias, e as discussões agora chegaram a um impasse."
 bp2_yearly.1065.outro: "\n\nAo entrar na sala, eles direcionam sua atenção para mim, claramente esperando uma resposta para esta pergunta."
 bp2_yearly.1065.a: "Devemos focar no comércio e na produção."
 bp2_yearly.1065.a.flavor: "Uma economia próspera é boa para todos."
 bp2_yearly.1065.b: "O domínio precisa de mais força militar."
 bp2_yearly.1065.b.flavor: "Um pouquinho de violência resolve qualquer problema."
 bp2_yearly.1065.c: "Um pouco mais de fervor só traria benefícios."
 bp2_yearly.1065.c.flavor: "A fé é tudo o que precisamos."
 bp2_yearly.1065.c.tt: "#X Isso vai alterar o [holding_type|lE] e remover quaisquer construções inválidas em [1065_province_for_building.GetName]#!"
 #All of our efforts have culminated into _this_
 bp2_yearly.1070.t: "$bp2_yearly.1050.t_builder$: O que há em um Arco"
 bp2_yearly.1070.intro: "Todos os meus anos estudando a arte da construção — desde construir castelos de mentira quando criança, tocas na selva, estudar a grande arquitetura de [sightseed_capital.GetName] e aconselhar sobre a expansão de [constructed_building_in.GetName] entre outras coisas — me levaram a este exato momento."
 bp2_yearly.1070.desc: "\n\nChegou a hora de deixar minha marca no mundo fundando um novo domínio na província de [1070_province_to_build_in.GetName]; e cabe a mim decidir nossa direção."
 bp2_yearly.1070.desc_no_province: "\n\n[1070_province_to_buff.GetName] precisa de alguns retoques, e cabe a mim aplicar meus conhecimentos e melhorar a posse tal como está."
 bp2_yearly.1070.desc_no_province_no_buff: "\n\nE embora meus domínios sejam imaculados e não precisem de nenhum trabalho manual ou retoque adicional; estou perturbado pela pergunta insistente no fundo da minha mente — onde está a essência da construção? Economia? Fé?"
 bp2_yearly.1070.a: "Uma cidade seria uma opção sólida."
 bp2_yearly.1070.a_buff: "Ajustar a favor do comércio é bom."
 bp2_yearly.1070.a_none: "Construa para a economia; e eles virão."
 bp2_yearly.1070.a.flavor: "Vamos construir um próspero centro econômico!"
 bp2_yearly.1070.a.flavor_none: "Uma bolsa cheia pode resolver qualquer problema."
 bp2_yearly.1070.b: "Mais castelos são o caminho do futuro."
 bp2_yearly.1070.b_buff: "A defesa é o melhor seguro para a prosperidade."
 bp2_yearly.1070.b_none: "Muralhas unirão os cidadãos."
 bp2_yearly.1070.b.flavor: "Com muralhas magníficas."
 bp2_yearly.1070.b.flavor_none: "… e mantenhamos o projétil ocasional à distância."
 bp2_yearly.1070.c: "[ROOT.Char.GetFaith.HighGodName] proporciona crescimento."
 bp2_yearly.1070.c.flavor: "Este domínio será dedicado a [ROOT.Char.GetFaith.HighGodNameAlternate]."
 bp2_yearly.1070.c.flavor_none: "Verdadeiramente."
 #Follow-up: Get the sweet sweet loo... I mean, sweet sweet effects!
 bp2_yearly.1071.t_city: "O Construtor de Cidades"
 bp2_yearly.1071.t_castle: "O Construtor de Castelos"
 bp2_yearly.1071.t_temple: "O Construtor de Templos"
 bp2_yearly.1071.desc_city: "A agitação da minuciosamente planejada área de mercado flui sem problemas para os distritos de artesanato e se estende até as lojas de comércio para envio e recebimento de bens do exterior."
 bp2_yearly.1071.desc_castle: "As torres brilhando ao sol da manhã; as imponentes muralhas mantendo qualquer atacante à distância."
 bp2_yearly.1071.desc_temple: "Um testemunho a [ROOT.Char.GetFaith.HighGodNameAlternate] — arcos que exalam um ar de espiritualidade; muralhas com uma base sólida, assim como nossa fé."
 bp2_yearly.1071.outro: "\n\n[constructed_holding.GetName] é realmente uma obra magnífica, e uma que entrará para a história como o início promissor de um novo talento arquitetônico — eu mesmo."
 bp2_yearly.1071.a: "Isso servirá."
 bp2_yearly.1071.a.flavor: ""
 #Clean up: You dun messed up, son
 bp2_yearly.1072.t: "$bp2_yearly.1050.t_builder$: Construtor de Sonhos Quebrados"
 bp2_yearly.1072.desc: "Eu... Eu... não tenho certeza do que aconteceu. O domínio que estava planejado para construção em [cancelled_holding.GetName] se dissipou e não existe mais."
 bp2_yearly.1072.a: "Ah, bem."
