l_spanish:
 bp2_yearly.4000.t: "Medos do Passado"
 bp2_yearly.4000.desc: "Enquanto embalo meu [first_babby.Custom('GetDaughterSon')] recém-nascid[first_babby.Custom('ES_OA')], a alegria extasiada se mistura com a tristeza, e uma pontada de medo me percorre a espinha.\n\nSerá que meu [ROOT.Char.GetMotherFather] me embalava assim [ROOT.Char.GetSheHe] e minha mãe morressem quando eu ainda era jovem, me deixando so[ROOT.Char.Custom('ES_OA')]?\n\nÉ uma maldição? Será que este mundo levará embora os pais da minha doce [first_babby.Custom('GetDaughterSon')], como fez comigo?"
 bp2_yearly.4000.a: "Eu prometo! Não vou te abandonar!"
 bp2_yearly.4000.a.flavor: "Será que conseguirei cumprir essa promessa?"
 bp2_yearly.4000.b: "O mundo é um lugar cruel, [first_babby.Custom('GetDaughterSon')] meu[first_babby.Custom('ES_OA')] ."
 bp2_yearly.4000.b.flavor: "E todos passamos pela vida sozinhos."
 bp2_yearly.4000.c: "Em [ROOT.Char.GetFaith.HighGodNameAlternate] coloco minha esperança."
 bp2_yearly.4001.t: "Justiça Adiada"
 bp2_yearly.4001.desc: "No era más que [Select_CString( ROOT.Char.IsFemale, 'una niña', 'un niño' )] cuando la vida de mi [ROOT.Char.Custom2('RelationToMeShort', murdered_relative)], [murdered_relative.GetName], terminó bruscamente por orden de [imprisoned_murderer.GetName]. Entonces no pude hacer nada para impedirlo ni para hacer justicia.\n\nHoy quien no puede hacer nada es [imprisoned_murderer.GetName], [Select_CString( imprisoned_murderer.IsFemale, 'encadenada y sometida', 'encadenado y sometido' )] a mi voluntad. Me pregunto qué querría [murdered_relative.GetNameNoTooltip]. ¿Venganza, una vida por su vida o una demostración de clemencia?"
 bp2_yearly.4001.a: "[murdered_relative.GetSheHe|U] [imprisoned_murderer.Custom2('InsultNoun', ROOT.Char)]"
 bp2_yearly.4001.b: "Há força no perdão, em escolher o que é certo."
 bp2_yearly.4002.t: "Um Chamado Espiritual"
 bp2_yearly.4002.desc: "Otra noche, otra ronda de alcohol. ¿Cuánto tiempo llevo bebiendo ya? ¿Días? ¿Semanas? ¿Acaso importa? En la espuma arremolinada de mi jarra medio llena veo algo de lo más extraño y peculiar. Los rostros preocupados de mis parientes muertos hace mucho, [first_aa_relative.GetFirstNameNoTooltip] y [second_aa_relative.GetFirstNameNoTooltip] me miran.\n\nLa neblina de mi borrachera se ve atravesada por los recuerdos de mi infancia, sepultados hace mucho, de encontrarlos muertos por exceso de bebida, sus cadáveres hinchados y aún embriagados.\n\n¿Voy a compartir su destino?"
 bp2_yearly.4002.a: "Antepassados, me deem forças! Eu não vou mais beber!"
 bp2_yearly.4002.b: "Um brinde a vocês dois, [first_aa_relative.GetFirstNameNoTooltip] e [second_aa_relative.GetFirstNameNoTooltip]!"
 bp2_yearly.4003.t: "O Caminho de um Governante"
 bp2_yearly.4003.desc: "[child_ruler.GetName|U] tiene ahora la misma edad que yo cuando ascendí al trono. Mi senda estuvo llena de dificultades al hacerme responsable de todo el señorío a una edad tan temprana y, sin embargo, me convirtió en [Select_CString( ROOT.Char.IsFemale, 'la mujer', 'el hombre' )] que soy hoy. Mi infancia fue muy diferente a la de mis compañeros: en lugar de juegos infantiles, jugué al juego de los adultos. Lo jugué y lo aprendí bien.\n\nExiste una tierra adecuada, [giveaway_county.GetDefinitiveName], donde [child_ruler.GetFirstNameNoTooltip] puede convertirse en gobernante como yo lo fui, pero ¿está list[child_ruler.Custom('ES_OA')]? ¿Es mi senda la única que puede preparar[child_ruler.Custom('ES_LoLa')] para el duro futuro?"
 bp2_yearly.4003.a: "Você seguirá meu caminho, [child_ruler.GetFirstNameNoTooltip]."
 bp2_yearly.4003.b: "Não repetiremos os erros do passado."
 bp2_yearly.4003.c: "Este condado vale mais que a educação dele!"
 #parental prestige event chain
 bp2_yearly.4010.t: "Sombra da Fama: Crepúsculo"
 bp2_yearly.4010.desc: "Há sussurros sobre os contos e feitos de meu [famous_parent.GetMotherFather], [ROOT.Char.Custom('ParentPrestigeLevelText')|l] [famous_parent.GetTitledFirstName|l], por onde quer que eu vá. Perto ou longe, parece que não há ninguém que não tenha ouvido seu nome.\n\nPergunto-me se continuarei para sempre à sombra de meu [famous_parent.GetMotherFather] ou se serei capaz de conquistar tanta fama em vida quanto ele. Até onde conseguirei chegar?"
 bp2_yearly.4010.a: "Humbildemente? Eu não sou humilde!"
 bp2_yearly.4010.b: "Um dia serei como você, [famous_parent.GetFirstNameNoTooltip]!"
 bp2_yearly.4010.b.flavor: "Serei famos[ROOT.Char.Custom('ES_OA')], brilharei intensamente, não importa o custo."
 bp2_yearly.4010.c: "Estou feliz por ter um[famous_parent.Custom('ES_XA')] [famous_parent.GetMotherFather] tão famos[famous_parent.Custom('ES_OA')]!"
 bp2_yearly.4010.c.flavor: "Estou satisfeit[ROOT.Char.Custom('ES_OA')] em viver à sombra dela."
 bp2_yearly.4011.t: "Sombra da Fama: Aurora"
 bp2_yearly.4011.desc: "Mi [famous_dead_parent.GetMotherFather], [famous_dead_parent.Custom('ES_ElLa')] gran [famous_dead_parent.GetTitledFirstName|l], [famous_dead_parent.GetDeathReason] hace bastante ya. Sin embargo, la llama de su vida aún brilla con fuerza. Le que le rodeó allí donde fuera, ahora parece seguirme a mí.\n\nMuchos aún me consideran su [ROOT.Char.Custom('GetDaughterSon')], ¡en vez de un[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] por derecho propio! ¡Ayer mismo, un campesino viejo [famous_dead_parent.GetHerHim] alababa como si aún siguiera viv[famous_dead_parent.Custom('ES_OA')]!\n\n¡Ha llegado la hora de salir de su sombra! ¡De dejar mi huella en el mundo! ¡Que se me reconozca como [ROOT.Char.Custom('ES_ElLa')] gran [ROOT.Char.GetTitledFirstName|l]!"
 bp2_yearly.4011.a: "O mundo lembrará de [famous_dead_parent.GetFirstNameNoTooltip] como #EMP #! [famous_dead_parent.GetMotherFather]!"
 bp2_yearly.4011.b: "Ai de mim, sempre serei s [ROOT.Char.Custom('GetDaughterSon')]."
 bp2_yearly.4011.c: "Já alcancei o suficiente."
 bp2_yearly.4011.d: "$bp2_yearly.4011.a$"
 bp2_yearly.4012.t: "Sombra da Fama: Claridade"
 bp2_yearly.4012.desc: "Ha pasado mucho desde que decidí centrarme en emular la fama de mi difunt[famous_dead_parent.Custom('ES_OA')] [famous_dead_parent.GetMotherFather], y aún más desde su muerte. Salir de su sombra es estresante y exigente. Aún siento que el mundo me juzga no por mis obras en sí, sino siempre en comparación con las [famous_dead_parent.Custom('ES_DelDela')] [famous_dead_parent.GetTitledFirstName|l].\n\nSé que se me respeta, pero ¿es suficiente? ¿Qué más puedo hacer para que se me recuerde? ¡Para llegar a ser más de lo que fue mi [famous_dead_parent.GetMotherFather]!"
 bp2_yearly.4012.a: "Ainda há muito para eu alcançar."
 bp2_yearly.4012.b: "Ah, por que se preocupar. Vou viver para sempre na sombra de [famous_dead_parent.GetFirstNameNoTooltip]."
 bp2_yearly.4012.c: "Somos iguais agora, [famous_dead_parent.GetMotherFather]."
 bp2_yearly.4012.d: "Nunca é o suficiente! Nunca!"
 bp2_yearly.4013.t: "Sombra da Fama: Zenith"
 bp2_yearly.4013.desc_success: "Hoje acordo com a certeza pela primeira vez na vida: ao que parece, minha fama não tem fronteiras e já não sou apenas [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.Custom('GetDaughterSon')] [famous_dead_parent.Custom('ES_DelDela')] [famous_dead_parent.GetTitledFirstName|l]. Posso me deleitar em minha própria glória, livre enfim da sombra de meu [famous_dead_parent.GetMotherFather].\n\nÉ hora de fazer uma pausa na minha busca incessante por reconhecimento? Ou devo arder e brilhar ainda mais até que todas as crianças pronunciem meu nome, até mesmo daqui a várias gerações?"
 bp2_yearly.4013.desc_failure: "Hoje acordei com um pensamento devastador: apesar de anos de esforço, as conquistas da minha vida ainda empalidecem em comparação com as de meu grande [famous_dead_parent.GetMotherFather]， [famous_dead_parent.Custom('ES_ElLa')] [famous_dead_parent.GetTitledFirstName|l]. Tenho me esforçado ao máximo, mas ainda assim sou incapaz de escapar da longa sombra de sua fama.\n\nÉ uma maldição que todo[famous_dead_parent.Custom('ES_OA')] [famous_dead_parent.GetMotherFather] impõe sobre seus filhos? Nascemos todos em uma corrida inútil contra os gigantes do passado?"
 bp2_yearly.4013.a: "Eu falhei com você, [famous_dead_parent.GetFirstNameNoTooltip] e também falhei comigo mesm[ROOT.Char.Custom('ES_OA')]."
 bp2_yearly.4013.b: "[ROOT.Char.Custom('PrestigeLevelText')] [ROOT.Char.GetFirstNameNoTooltip]. Gosto desse som."
 bp2_yearly.4013.c: "Não descansarei até que meu nome seja conhecido em toda a Terra!"
 #parental piety event chain
 bp2_yearly.4020.t: "Sombra da Fé: Crepúsculo"
 bp2_yearly.4020.desc: "¡Qué alegría ser [ROOT.Char.Custom('GetDaughterSon')] de tal sierv[pious_parent.Custom('ES_OA')] ejemplar de [ROOT.Char.GetFaith.HighGodName]! ¡El ardor que siento en mi corazón cuando oigo que se refieren a [pious_parent.GetSheHe] como [pious_parent.Custom('ES_ElLa')] [ROOT.Char.Custom('ParentPrestigeLevelText')|l] [pious_parent.GetTitledFirstName|l]! Su virtud es venerada por [ROOT.Char.GetFaith.PriestNeuterPlural] y [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip] piadosos por igual.\n\nY me pregunto, ¿me quedaré humildemente a la sombra de mi [pious_parent.GetMotherFather]? ¿O conseguiré superar semejante piedad en mi vida? ¿Será la gracia de [ROOT.Char.GetFaith.HighGodName] tan visible en mí como en [pious_parent.GetSheHe]?"
 bp2_yearly.4020.b: "Um dia serei como você, [pious_parent.GetFirstNameNoTooltip]!"
 bp2_yearly.4020.b.flavor: "Serei virtuoso[ROOT.Char.Custom('ES_OA')] , servirei a [ROOT.Char.GetFaith.HighGodName] , não importa o custo."
 bp2_yearly.4020.c: "Estou feliz por ter um[pious_parent.Custom('ES_XA')] [pious_parent.GetMotherFather] tão piedoso[pious_parent.Custom('ES_OA')]!"
 bp2_yearly.4020.c.flavor: "Me sinto satisfeit[ROOT.Char.Custom('ES_OA')] de viver à sua sombra."
 bp2_yearly.4021.t: "Sombra da Fé: Aurora"
 bp2_yearly.4021.desc: "Han pasado años desde que mi gran [pious_dead_parent.GetMotherFather], [pious_dead_parent.Custom('ES_ElLa')] [pious_dead_parent.GetTitledFirstName|l] [pious_dead_parent.GetDeathReason]. Espero que ahora esté sirviendo a [ROOT.Char.GetFaith.HighGodName] en [ROOT.Char.GetFaith.PositiveAfterLife]. Sin embargo, el brío de su fe sigue presente entre los vivos, como inspiración y desafío. Los [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip] piadosos aún piensan en mí como su [ROOT.Char.Custom('GetDaughterSon')]. ¡Ayer mismo, un viejo [ROOT.Char.GetFaith.PriestNeuter] [pious_dead_parent.GetHerHim] alababa como [pious_dead_parent.Custom('ES_ElLa')] gobernante actual!\n\n¿Pensará [ROOT.Char.GetFaith.HighGodName] igual respecto a mí? Siento la urgente necesidad de probarme como [ROOT.Char.GetWomanMan] de fe por mí mism[ROOT.Char.Custom('ES_OA')], ¡salir de la sombra de mi [pious_dead_parent.GetMotherFather]!"
 bp2_yearly.4021.a: "[ROOT.Char.GetFaith.HighGodName] me ver? por mim mesm[ROOT.Char.Custom('ES_OA')]!"
 bp2_yearly.4021.b: "Ai de mim, honrarei a memória de [pious_dead_parent.GetFirstNameNoTooltip] e [ROOT.Char.GetFaith.HighGodName] ficando em sua sombra."
 bp2_yearly.4021.c: "Já alcancei o suficiente."
 bp2_yearly.4021.d: "[ROOT.Char.GetFaith.HighGodName] conhecerá [pious_dead_parent.GetFirstNameNoTooltip] como #EMP #! [pious_dead_parent.GetMotherFather]!"
 bp2_yearly.4022.t: "Sombra da Fé: Claridade" #I feel hashtag blessed and moisturized, but is it enough?
 bp2_yearly.4022.desc: "A luz [ROOT.Char.GetFaith.HighGodNamePossessive] me guia em minha santa busca, como antigamente guiou meu [pious_dead_parent.GetMotherFather] , [pious_dead_parent.Custom('ES_ElLa')] grande [pious_dead_parent.GetTitledFirstName|l]. A vida do devoto servo de [ROOT.Char.GetFaith.HighGodNamePossessive] não é fácil, mas me sinto obrigad[ROOT.Char.Custom('ES_OA')] a ser ainda maior que meu [pious_dead_parent.GetMotherFather].\n\nTodo bom [ROOT.Char.GetFaith.GetAdherentNameNoTooltip] deve buscar sempre, sem descanso, o reconhecimento tanto de seus pares quanto [ROOT.Char.GetFaith.HighGodNamePossessive]? O exemplo de um [pious_dead_parent.GetMotherFather] é um farol a seguir ou uma meta a alcançar e superar?"
 bp2_yearly.4022.a: "Ainda há muito para eu alcançar."
 bp2_yearly.4022.b: "Ah, por que se preocupar. Espero que [ROOT.Char.GetFaith.HighGodName] seja indulgente."
 bp2_yearly.4022.c: "Somos iguais agora, [pious_dead_parent.GetMotherFather]."
 bp2_yearly.4022.d: "Nunca é o suficiente! Nunca!"
 bp2_yearly.4023.t: "Sombra da Fé: Zenith"
 bp2_yearly.4023.desc_success: "¡Alabemos a [ROOT.Char.GetFaith.FateGodName]! Hoy me he despertado con la certeza por primera vez en mi vida: he demostrado con creces que soy un[ROOT.Char.Custom('ES_XA')] miembro ejemplar del mundo [ROOT.Char.GetFaith.GetAdherentNameNoTooltip], no solo [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.Custom('GetDaughterSon')] [pious_dead_parent.Custom('ES_DelDela')] [pious_dead_parent.GetTitledFirstName|l]. Me deleito en la luz de [ROOT.Char.GetFaith.HighGodName]. Ya no me hallo a la sombra de mi [pious_dead_parent.GetMotherFather].\n\n¿Es hora de centrarme más en los asuntos terrenales y descansar tranquil[ROOT.Char.Custom('ES_OA')] sabiendo que me hallo en la gracia [ROOT.Char.GetFaith.HighGodNamePossessive]? ¿O un buen [ROOT.Char.GetFaith.GetAdherentNameNoTooltip] nunca, nunca jamás debe parar en la santa búsqueda del reconocimiento [ROOT.Char.GetFaith.HighGodNamePossessive]?"
 bp2_yearly.4023.desc_failure: "Hoje acordei com um pensamento avassalador: passei anos me esforçando para ser o mais piedoso[ROOT.Char.Custom('ES_OA')] possível e, ainda assim, continuo sentindo a luz de [ROOT.Char.GetFaith.HighGodName] obscurecida pela lembrança do meu [pious_dead_parent.GetMotherFather], [pious_dead_parent.Custom('ES_ElLa')] grande [pious_dead_parent.GetTitledFirstName|l]. Será esta a vontade de [ROOT.Char.GetFaith.FateGodNamePossessive]?\n\nÉ uma maldição que todo pai ou mãe impõe a seus filhos? Nascemos todos em uma corrida inútil contra os gigantes do passado? É este o mundo que [ROOT.Char.GetFaith.CreatorName] desejava?"
 bp2_yearly.4023.a: "Eu falhei com você! [ROOT.Char.GetFaith.HighGodName], por favor, me perdoe."
 bp2_yearly.4023.b: "[ROOT.Char.Custom('PietyLevelText')] [ROOT.Char.GetFirstNameNoTooltip]. Gosto desse som."
 bp2_yearly.4023.c: "[ROOT.Char.GetFaith.PositiveAfterLife|U] e a Terra sempre conhecerão meu nome!"
 bp2_yearly.4030.t: "Em uma Noite de Neve"
 bp2_yearly.4030.desc: "«¡[frosty_knight.GetFaith.CreatorName] sabe cuá-cuánto tiempo llevamos marchando por estas tierras heladas! ¡Y tantos hombres en [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] sin trabajar y durmiendo en lechos calientes!», se queja mi $knight_culture_player_no_tooltip_lowercase$, [frosty_knight.GetFirstName], temblando de frío. Sí, ¿cuánto? Los días han sido cortos y oscuros, y el sol sobre nosotros no nos ha dado alivio.\n\nCierro los ojos. ¡El sol! Me asalta el recuerdo de los primeros rayos del sol de un largo invierno, de un invierno que parecía durar toda la vida. El recuerdo de la infancia se extiende como agua caliente por mis venas, ofreciéndome consuelo y solaz. El sol y la primavera llegaron entonces.\n\n¡Y llegarán ahora!"
 bp2_yearly.4030.a: "E com o sol, a vitória!"
 bp2_yearly.4030.b: "O que deseja [frosty_knight.GetSheHe] tanto? Meu $knight_culture_player_no_tooltip_lowercase$, [frosty_knight.GetFirstNameNoTooltip]?"
 bp2_yearly.4030.b.flavor: "Ouçam, guerreiros de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]! Assim como a noite é longa, o sol virá! E com ele, a vitória! Voltaremos com glória eterna e a certeza de que nenhuma dificuldade pode nos deter!"
 bp2_yearly.4030.c: "Outro inverno rigoroso? Bom treino para o próximo!"
 bp2_yearly.4030.c.tt: "Fortaleça-se com o inverno rigoroso"
 bp2_yearly.4031.t: "Círculo de Cativeiro"
 bp2_yearly.4031.desc_first: "Una vez más en la vida, me veo privad[ROOT.Char.Custom('ES_OA')] de mi libre albedrío y engrilletad[ROOT.Char.Custom('ES_OA')]. Entonces era [Select_CString( ROOT.Char.IsFemale, 'una niña', 'un niño' )], encarcelad[ROOT.Char.Custom('ES_OA')] por semejante [old_imp.Custom2('InsultAdjective', ROOT.Char)], [old_imp.Custom('ES_ElLa')] [old_imp.GetTitledFirstName|l].\n\n"
 bp2_yearly.4031.desc_base: "Agora é [new_imp.Custom('ES_ElLa')] [new_imp.Custom2('InsultAdjective', ROOT.Char)] [new_imp.GetTitledFirstName|l] quem me mantém cativo.\n\nFoi o destino que me trouxe de volta para cá? Será que até as correntes são as mesmas? Minha liberdade foi apenas uma breve interrupção em meu cativeiro?"
 bp2_yearly.4031.desc_same_captor: "E agora [old_imp.GetSheHe] volta a me aprisionar de novo!\n\nSemejante [old_imp.Custom2('InsultNoun', ROOT.Char)] teve a audácia de ser tão #EMP cortés#! de me dar a mesma cela! Será que é apenas sua vontade maligna que me traz de volta à prisão? Talvez meu destino seja que minha liberdade tenha sido apenas uma breve interrupção do cativeiro?\n\n"
 bp2_yearly.4031.desc_last: "Serei sempre submetid[ROOT.Char.Custom('ES_OA')] ao capricho alheio?\n\nNão! Sobrevivi quando criança[ROOT.Char.Custom('ES_OA')] e recuperei minha liberdade. O que me impede agora?"
 bp2_yearly.4031.a: "Nunca mais! Serei livre!"
 bp2_yearly.4031.a.flavor: "Quebre as correntes, maldita escuridão!"
 bp2_yearly.4031.a.ct: "Tentativas de fuga são mais propensas a ter sucesso, embora falhas se tornem mais perigosas..."
 bp2_yearly.4031.b: "Paciência, [ROOT.Char.GetFirstNameNoTooltip]. Eu aguentei naquela época."
 bp2_yearly.4031.b.flavor: "E eu vou aguentar agora."
 bp2_yearly.4032.t: "Reféns Passados e Presentes"
 bp2_yearly.4032.desc: "Chegou a hora de [hostage_kiddo.GetFirstName] partir. [hostage_kiddo.Custom('ES_LoLa')|U] olho nos olhos e me vejo a mim mesm[ROOT.Char.Custom('ES_OA')] de crianç[ROOT.Char.Custom('ES_OA')] quando fui enviado como refém [ROOT.Char.Custom('ES_OA')] [new_papa.Custom('ES_AlAla')] [new_papa.GetTitledFirstName|l]. [tru_papa.Custom('ES_ElLa')|U] [tru_papa.GetTitledFirstName|l] me olhava então. O que foi dito naquele dia, não me lembro. O que pensou [tru_papa.GetSheHe] quando eu me fui?\n\nSerá que [hostage_kiddo.GetFirstNameNoTooltip] enviará seus próprios filhos como reféns no futuro? O que posso oferecer-lhe neste último momento?"
 bp2_yearly.4032.a: "[ROOT.Char.GetHouse.GetMotto], [hostage_kiddo.Custom('GetDaughterSon')] meu[hostage_kiddo.Custom('ES_OA')]."
 bp2_yearly.4032.a.flavor: "Lembre-se dessas palavras. Todo [ROOT.Char.GetDynasty.GetNameNoTooltip] é chamado a servir um dia. Seu dia chegou hoje."
 bp2_yearly.4032.b: "Você voltará para casa um dia, assim como eu."
