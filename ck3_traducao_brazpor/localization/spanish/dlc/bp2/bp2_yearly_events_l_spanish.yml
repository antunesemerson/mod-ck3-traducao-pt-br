l_spanish:
 #Pet Rock events
 pet_rock.0001.t: "Pedras no Caminho"
 pet_rock.0001.desc: " #EMP Plinc!#! \n\nVago do lado de fora quando meu sapato colide com uma pedrinha. O seixo tilinta brilhantemente ao se afastar de alguns de seus semelhantes e para a pouca distância de mim. Atraíd[ROOT.Char.Custom('ES_OA')] pela curiosidade, eu a pego. Seu exterior áspero me parece estranhamente quente.\n\nDe repente, sei exatamente o que ela quer. A pedra projeta uma aura #EMP amistosa#!. Quando a observo, aninhada na palma da minha mão, seu peso me transmite conforto e entusiasmo ao mesmo tempo."
 pet_rock.0001.a: "Seremos melhores amigos!"
 pet_rock.0001.a.tt: "Suas aventuras juntos começam!"
 pet_rock.0001.b: "O que eu estou pensando?"
 pet_rock.0001.b.tt: "Deveria passar menos tempo lá fora..."
 pet_rock.0002.t: "Uma Pedra"
 pet_rock.0002.desc: "Quando a pedra repousa no meu colo, contente em seu lugar, me pergunto como devo chamá-la. Algo histórico? Algo que aluda à sua forma? Algo que descreva a sensação tranquilizadora que experimento quando esfrego seu exterior [ROOT.Char.Custom('RockColor')]?\n\nAh, já sei! Vou chamá-la..."
 pet_rock.0002.a: "Que ótimo nome!"
 pet_rock.0100.t: "[ROOT.Char.Custom('RockStoryName')]: Valor Sedimentar"
 pet_rock.0100.desc: "Depois de mais um dia estressante, me jogo numa cadeira na minha [ROOT.Char.Custom('GetChamber')]— por quanto tempo mais vou conseguir aguentar isso?\n\nAo mexer o pé, ouço um leve barulho e encontro minha pedra de estimação [ROOT.Char.Custom('RockStoryName')] perchada ao lado do meu assento. Sento-me com [ROOT.Char.Custom('RockStorySheHe')] por um tempo, apenas ouvindo o silêncio calmante e acariciando o exterior [ROOT.Char.Custom('RockColor')]."
 pet_rock.0100.a: "Acho que posso aguentar isso um pouco mais."
 pet_rock.0101.t: "[ROOT.Char.Custom('RockStoryName')]: Um Brilho de Espelho"
 pet_rock.0101.desc: "Na beirada da minha mesa, minha pedra [ROOT.Char.Custom('RockStoryName')] fica ali emburrada. Dou uma olhada nela. Está claro que ficou de mal humor.\n\nTodos nós sabemos que [ROOT.Char.Custom('RockStorySheHe')] quer um polimento, para dar brilho a esse belo exterior [ROOT.Char.Custom('RockColor')]. Mas seu polidor favorito é tão #EMP caro#!…"
 pet_rock.0101.a: "Tudo bem, tudo bem, vamos te polir."
 pet_rock.0101.b: "Você vai ter que se contentar."
 pet_rock.0102.t: "[ROOT.Char.Custom('RockStoryName')]: Muito Limpo"
 pet_rock.0102.desc: "O [ROOT.Char.Custom('RockColor')] normalmente vibrante do exterior de [ROOT.Char.Custom('RockStoryName')] hoje parece meio sem vida. [ROOT.Char.Custom('RockStoryName')] repousa em seu lugar de forma acusatória, implorando por um banho.\n\nHoje #EMP tengo#! tenho uma audiência importante, não tenho? Isso seria difícil de explicar…"
 pet_rock.0102.a: "A reunião pode esperar!"
 pet_rock.0102.b: "Outro dia, [ROOT.Char.Custom('RockStoryName')]."
 pet_rock.0103.t: "[ROOT.Char.Custom('RockStoryName')]: Sustento Sorrateiro"
 pet_rock.0103.desc: "Outro prato de comida empilhada chega à minha frente, meu estômago praticamente ronrona sob o peso das garfadas anteriores. Um aroma maravilhoso chega ao meu nariz: hortelã!\n\nAssim que sinto o cheiro, penso na minha pedra [ROOT.Char.Custom('RockStoryName')]. A hortelã é o cheiro favorito dele!\n\nPraticamente consigo #EMP sentir#! sua presença suplicante emanando de sua posição na minha bolsa."
 pet_rock.0103.a: "Vamos ver se consigo enfiar algumas folhas para…"
 pet_rock.0103.b: "É melhor eu não."
 pet_rock.0104.t: "[ROOT.Char.Custom('RockStoryName')]: Fundo do Poço"
 pet_rock.0104.desc: "Penso comigo mesmo enquanto atravesso o [ROOT.Char.Custom('GetRoom')]. Quantas provações e tribulações um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]! Será que minha pedra [ROOT.Char.Custom('RockStoryName')] terá algum bom conselho?\n\nDou tapinhas em minha bolsa, seu poleiro habitual. Nada. De repente, me sinto perdid[ROOT.Char.Custom('ES_OA')] sem sua orientação calma e pedregosa.\n\nO pânico começa a tomar conta."
 pet_rock.0104.a: "Bem, há uma lá fora que parece ser #EMP parecida#!..."
 pet_rock.0104.b: "#EMP [ROOT.Char.Custom('RockStoryName')]!#! Onde estará?"
 pet_rock.0104.b.success: "[ROOT.Char.Custom('RockStoryHerHim')|U] você encontra em um baú"
 pet_rock.0104.b.failure: "… [ROOT.Char.Custom('RockStoryName')]?"
 pet_rock.0104.b.failure.tt: "Seu amigo se foi para sempre."
 pet_rock.0104.c: "Talvez tenha ido visitar um amigo?"
 pet_rock.0104.c.tt: "Suponho que seguiu em frente…"
 pet_rock.0105.t: "[ROOT.Char.Custom('RockStoryName')]: Prazer em Conhecer Você"
 pet_rock.0105.desc: "Estou falando com minha pedra [ROOT.Char.Custom('RockStoryName')] lá fora, pensando sobre nosso primeiro encontro, quando um grito de felicidade chega aos meus ouvidos. [other_rock_owner.GetFirstName] se aproxima de mim agarrando... é um-?\n\n\"Estou tão feliz em ver que você também tem um companheiro de pedra, [ROOT.Char.Custom('FormOfAddressForLiege')]!\". [other_rock_owner.GetFirstName] estende sua própria. \"Talvez eles possam ser amigos?\"."
 pet_rock.0105.a: "Que pedra com aparência estúpida."
 pet_rock.0105.b: "Tenho certeza de que eles vão se dar maravilhosamente bem!"
 pet_rock.0105.c: "Desculpe, [ROOT.Char.Custom('RockStoryName')] é um pouco tímida."
 pet_rock.0106.t: "[ROOT.Char.Custom('RockStoryName')]: Thunk!"
 pet_rock.0106.desc: "Estou à mesa, lendo algumas cartas e relatórios. [ROOT.Char.Custom('RockStoryName')] está ao meu lado, deleitando-se com o calor de um raio de sol.\n\nEstendo a mão para acariciar seu exterior [ROOT.Char.Custom('RockColor')], mas parece que está de muito bom humor. Quando me estico, a mesa balança, e [ROOT.Char.Custom('RockStoryName')] se atira para fora dela!"
 pet_rock.0106.a: "Hah! Seu pequeno tolo!"
 pet_rock.0107.t: "[ROOT.Char.Custom('RockStoryName')]: Transformado em Granito"
 pet_rock.0107.desc: "Enquanto carrego a [ROOT.Char.Custom('RockStoryName')] rumo aos meus aposentos, com seu exterior [ROOT.Char.Custom('RockColor')] em minha mão, pergunto-me se [ROOT.Char.Custom('RockStorySheHe')] tem ciúmes de mim. Afinal de contas, tenho meu [ROOT.Char.Custom('ResidenceBuilding')] para chamar de meu, decorar como quiser e abrigar meus amigos e familiares dentro dele.\n\n[ROOT.Char.Custom('RockStoryName')], não. Talvez seja hora de remediar isso?\n\n[ROOT.Char.Custom('RockStoryHerHim')|U] olho para ele e reflito."
 pet_rock.0107.a: "[ROOT.Char.Custom('RockStoryName')] pode ficar comigo na minha cama!"
 pet_rock.0107.b: "Vou tentar, por que não?"
 pet_rock.0107.b.success: "Você constrói um abrigo satisfatório"
 pet_rock.0107.b.failure: "Você bate o polegar"
 pet_rock.0107.c: "Acho que é uma pedra claramente do tipo que gosta de atividades ao ar livre."
 pet_rock.0108.t: "[ROOT.Char.Custom('RockStoryName')]: Tudo ou Nada?"
 pet_rock.0108.desc: "Há um ponto curioso nesta parede, penso, enquanto [ROOT.Char.Custom('RockStoryName')] repousa na palma da minha mão. À parede externa da minha [ROOT.Char.Custom('ResidenceBuilding')], falta um pedaço.\n\nPosso sentir a curiosidade de [ROOT.Char.Custom('RockStoryName')] na minha mão. [ROOT.Char.Custom('RockStoryHerHim')|U] o ergo para ver, e então, por impulso, [ROOT.Char.Custom('RockStoryHerHim')] o coloco diretamente no buraco. Como eu suspeitava, encaixa perfeitamente.\n\nSurge-me um pensamento: talvez fosse melhor para [ROOT.Char.Custom('RockStorySheHe')] e para mim se ele ficasse aqui,"
 pet_rock.0108.landed: "como parte da minha casa e do meu lar? Talvez até possamos encontrar novas e aprimoradas maneiras de reunir seus amigos em construções próprias?"
 pet_rock.0108.adventurer: "feliz neste novo lar? Talvez até possamos encontrar novos amigos para apresentá-los na próxima vez que voltarmos…"
 pet_rock.0108.a: "Não posso pensar em uma honra maior!"
 pet_rock.0108.a.adventurer: "É hora de deixar ir."
 pet_rock.0108.a.tt: "Suas aventuras com a sua pedra chegam ao fim."
 pet_rock.0108.b: "Nunca poderia deixar que ele/ela fosse!"
 pet_rock.0108.b.tt: "[ROOT.Char.Custom('RockStorySheHe')|U] viajará comigo, sempre."
