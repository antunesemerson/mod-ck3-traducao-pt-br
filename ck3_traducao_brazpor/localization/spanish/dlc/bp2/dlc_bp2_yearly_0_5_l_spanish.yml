 teeming_horde_of_cats_modifier: "Horda Abundante de Gatos"
 teeming_horde_of_cats_modifier_desc: "Este personagem parece estar perpetuamente cercado por uma banda errante de felinos arrogantes. Os animais dignos garantem que não haja pestes ao redor deles."
 loyal_pack_of_hounds_modifier: "Matilha Leal de Cães"
 loyal_pack_of_hounds_modifier_desc: "Este personagem nunca está sem seus cães leais. Onde eles vão, os caninos vão — isso torna a corte constrangedora, mas a campanha suportável."
 frequent_daydreamer_modifier: "Sonhador Frequente"
 frequent_daydreamer_modifier_desc: "Este personagem muitas vezes parece estar perdido em pensamentos profundos e pesados."
 strong_flock_of_eagles_modifier: "Bando Forte de Águias"
 strong_flock_of_eagles_modifier_desc: "Este personagem é frequentemente visto com um bando de águias, que parecem segui-lo onde quer que vá. As aves são um símbolo de força e poder."
