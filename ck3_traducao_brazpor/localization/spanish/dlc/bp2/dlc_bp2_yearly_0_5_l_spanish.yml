 bp2_yearly_0641_maa_maintenance_modifier: "Economia de Centavos"
 bp2_yearly_0641_maa_maintenance_modifier_desc: "Alguém está mantendo os homens de armas deste personagem com um orçamento apertado, porém eficaz."
 bp2_yearly_0641_cowed_vassal_modifier: "Lembretes Educados"
 bp2_yearly_0641_cowed_vassal_modifier_desc: "Os vassalos deste personagem aprenderam a ler subtexto muito, muito bem."
 bp2_yearly_0641_war_income_modifier: "Imposto de Guerra"
 bp2_yearly_0641_war_income_modifier_desc: "As circunstâncias políticas deram uma mãozinha a este personagem durante a guerra."
 next_free_ho_hire_modifier: "Contratação Gratuita de Ordem Sagrada"
 next_free_ho_hire_modifier_desc: "A próxima contratação de uma ordem sagrada por este personagem será gratuita."
 bp2_yearly_0641_mercenary_cost_reduction_modifier: "Mercantilismo de Mercenários"
 bp2_yearly_0641_mercenary_cost_reduction_modifier_desc: ""
 bp2_yearly_0641_raid_speed_modifier: "Senhores do Saque"
 bp2_yearly_0641_raid_speed_modifier_desc: "Os exércitos deste personagem são composto por alguns dos ladrões de guerra mais experientes do mundo."
 ##################################################
 ##Flavour Events
 bp2_yearly.0601.t: "Governando Corretamente"
 bp2_yearly.0601.desc.intro: "No papel de meu [ROOT.Char.GetDiarchTitle|l] , [regent.Custom2('MyCharacterIntroduction', ROOT.Char)] parece decidido[regent.Custom('ES_OA')] a me ensinar seus métodos preferidos de governo."
 bp2_yearly.0601.desc.rationale.disloyal.likes_you: "É[regent.Custom('ES_EA')] [regent.GetWomanMan] tem algo de malandro[regent.Custom('ES_OA')] como [ROOT.Char.GetDiarchTitle|l], mas, ainda assim, parece ter gostado de dar aulas.\n\n"
 bp2_yearly.0601.desc.rationale.neutral.likes_you: "Não é de forma alguma [regent.Custom('ES_ElLa')] [ROOT.Char.GetDiarchTitle|l] mais dedicado[regent.Custom('ES_OA')], mas, ainda assim, ele/ela reserva um tempo para me instruir quando pode.\n\n"
 bp2_yearly.0601.desc.rationale.loyal.predecessor_hook: "É raro que essas lições aconteçam sem que [regent.GetSheHe] me lembre do juramento que fez ao meu predecessor.\n\n"
 bp2_yearly.0601.desc.rationale.loyal.loyalty_hook: "Invariavelmente, as aulas começam com [regent.GetSheHe] reiterando que jurou ser leal a mim em todos os aspectos, incluindo o aprendizado.\n\n"
 bp2_yearly.0601.desc.rationale.loyal.honourable: "Métodos que sempre parecem de alguma forma retornar à honra, às regras rígidas pelas quais ela é aplicada e como ela pode ser obtida.\n\n"
 bp2_yearly.0601.desc.rationale.loyal.fallback: "As lições são longas, mas parecem vir da bondade do coração, ou pelo menos do afeto por mim.\n\n"
 bp2_yearly.0601.desc.rationale.fallback: "Nunca consegui descobrir por que faz isso, mas, às vezes, [regent.GetSheHe] insiste.\n\n"
 bp2_yearly.0601.desc.skill.boilerplate: "A aula de hoje aborda #EMP ainda mais#!"
 bp2_yearly.0601.desc.diplomacy.arrogant: "a arte de governar. Para [regent.GetSheHe]a tudo parece se resumir a pôr os outros em seu lugar, transmitir poder e aumentar sua majestade. As palavras são o meio pelo qual se impõe o verdadeiro domínio."
 bp2_yearly.0601.desc.diplomacy.humble: "a arte de governar. Para [regent.GetSheHe], a chave parece ser a empatia: a pessoa com quem falamos pode estar abaixo de nós, mas a modéstia na diplomacia se transforma em magnanimidade, e a magnanimidade vem implicitamente de uma posição de força."
 bp2_yearly.0601.desc.diplomacy.fallback: "política. Boa postura, fala eloquente, retórica, as complexidades da negociação - toda a fanfarronice usual com a qual a política adulta parece tão obcecada."
 bp2_yearly.0601.desc.martial.wrathful: "a teoria militar. Praticamente não para de espumar; insiste que, uma vez iniciada a batalha, a violência deve ser aplicada com rapidez e generosidade para assegurar a vitória. Dar quartel é convidar à derrota."
 bp2_yearly.0601.desc.martial.calm: "a teoria militar. Se concentra nos benefícios da moderação no planejamento, de comandar um exército enxuto, de usar a estratégia para minimizar quantas vidas são perdidas no combate. Para [regent.GetSheHe], o cuidado e a calma trazem a vitória."
 bp2_yearly.0601.desc.martial.fallback: "teoria militar. Onde montar um acampamento, como cuidar de um grande número de cavalos em campanha, quais formações funcionam melhor contra nossos inimigos tradicionais, e por aí vai..."
 bp2_yearly.0601.desc.stewardship.greedy: "o comércio e os impostos. Nada o anima tanto quanto o comércio e os impostos. O olhar de ganância alegre que se vislumbra [regent.Custom('MaskFace_BehindAcross')] seu [regent.Custom('MaskFace')] parece quase em êxtase, embasbacad[regent.Custom('ES_OA')] com as muitas maneiras de obter prata, enumerando-as cuidadosamente uma a uma durante horas."
 bp2_yearly.0601.desc.stewardship.generous: "comércio e impostos. Para [regent.GetSheHe], a prata é um meio para um fim, e esse fim é mais importante do que possuir riquezas por si só. A moeda deve ser retirada por um governante, sim, mas apenas quando necessário e sempre devolvida livremente."
 bp2_yearly.0601.desc.stewardship.fallback: "comércio e impostos. Impostos e comércio. Um discurso interminável e mutável sobre os detalhes finos da cunhagem, os melhores métodos para extrair riqueza e as inúmeras maneiras pelas quais tanto plebeus quanto nobres podem tentar esconder o que me é devido."
 bp2_yearly.0601.desc.intrigue.compassionate: "as manobras políticas. Para [regent.GetSheHe], a questão é como abrir caminho através de um ninho de serpentes sem sujar as mãos de sangue, a menos que seja absolutamente necessário."
 bp2_yearly.0601.desc.intrigue.callous: "as manobras políticas. Fala em frases curtas e categóricas e sempre emite julgamentos rápidos. É preciso lidar com os rivais prontamente, pela força ou pelo charme, sem punições desnecessárias nem clemência tola."
 bp2_yearly.0601.desc.intrigue.sadistic: "as manobras políticas. Passa a maior parte do tempo se deleitando com descrições inventivas de castigos para rivais, discutindo as sutilezas de cultivar uma reputação e reiterando que é mais fácil ser temido do que amado."
 bp2_yearly.0601.desc.intrigue.fallback: "manobras políticas. Guardando-se contra conspirações, exercendo poder por meio de insinuações, quais cargos detêm influência secreta, e assim por diante. Pior, grande parte da própria lição é composta de duplos sentidos e inferências."
 bp2_yearly.0601.desc.learning.shy: "a escolástica e a teologia. De tão suave que é sua voz, mal [regent.GetHerHim] posso ouvi-lo, mas mesmo assim ele continua resmungando por longos períodos, falando sobre as muitas lições de governo que podem ser encontradas nas obras dos luminares do passado."
 bp2_yearly.0601.desc.learning.gregarious: "a escolástica e teologia. Enérgic[regent.Custom('ES_OA')] e sentid[regent.Custom('ES_OA')], enumera uma lista de seus historiadores e filósofos favoritos, de estrelas acadêmicas em ascensão e de teorias muito debatidas, e de como o conhecimento beneficia igualmente governantes e governados."
 bp2_yearly.0601.desc.learning.fallback: "escolástica e teologia. É uma diatribe seca sobre história, filosofia, acadêmicos de cheiro estranho de terras distantes, todas as bobagens habituais, mas o ponto central parece ser que um governante instruído contribui para que seu povo seja feliz."
 bp2_yearly.0601.desc.child_reaction.disgust: "\n\nIsso me parece errado. Há algo horrível em imaginar [regent.GetFirstNameNoTooltip] tratando seus inferiores assim e imaginando que isso é algo #EMP bom#!."
 bp2_yearly.0601.desc.child_reaction.admiration: "\n\nHá algo fundamentalmente certo nisso para mim. [regent.GetFirstNameNoTooltip] compreende a verdadeira ordem das coisas, que é assim que a nobreza #EMP deveria#! se comportar."
 bp2_yearly.0601.desc.child_reaction.boredom: "\n\nAs opiniões de [regent.GetFirstNameNoTooltip] a respeito me parecem totalmente desinteressantes, mas estou preso #EMP todo#! nesta aula. Com certeza terei muito tempo para aprender tudo isso quando eu me tornar em [ROOT.Char.Custom('ES_OA')] por conta própria?[ROOT.Char.GetTitleAsNameNoTooltip|l] ou não?."
 bp2_yearly.0601.option.skill: "Prestar atenção nos detalhes técnicos."
 bp2_yearly.0601.option.perk: "Focar no espírito do conselho."
 bp2_yearly.0601.a: "$bp2_yearly.0601.option.skill$"
 bp2_yearly.0601.b: "$bp2_yearly.0601.option.perk$"
 bp2_yearly.0601.c: "$bp2_yearly.0601.option.skill$"
 bp2_yearly.0601.d: "$bp2_yearly.0601.option.perk$"
 bp2_yearly.0601.e: "$bp2_yearly.0601.option.skill$"
 bp2_yearly.0601.f: "$bp2_yearly.0601.option.perk$"
 bp2_yearly.0601.g: "$bp2_yearly.0601.option.skill$"
 bp2_yearly.0601.h: "$bp2_yearly.0601.option.perk$"
 bp2_yearly.0601.i: "$bp2_yearly.0601.option.skill$"
 bp2_yearly.0601.j: "$bp2_yearly.0601.option.perk$"
 bp2_yearly.0601.k: "Passar a aula da tarde sonhando acordad[ROOT.Char.Custom('ES_OA')]."
 bp2_yearly.0611.t: "A segunda capital de [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]"
 bp2_yearly.0611.desc.intro.bad_history: "Apesar de algumas das coisas que me fez no passado, [regent.Custom2('MyCharacterIntroduction', ROOT.Char)] ainda é meu [ROOT.Char.GetDiarchTitle|l]. Mesmo assim, mal sai de [regent_capital.GetBaseNameNoTier].\n\n"
 bp2_yearly.0611.desc.intro.fallback: "[regent.Custom2('MyCharacterIntroduction', ROOT.Char)|U] trabalha muito duro como meu [ROOT.Char.GetDiarchTitle|l] , trancad[regent.Custom('ES_OA')] em seu gabinete em [regent_capital.GetBaseNameNoTier].\n\n"
 bp2_yearly.0611.desc.regent_opinion.positive: "Sei que supostamente ele deve me proteger até que eu seja um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] adulto, mas até quando ele vem me visitar parece que sempre é"
 bp2_yearly.0611.desc.regent_opinion.negative: "Sei que não se importa muito comigo, mas me entristece que cada visita seja sempre"
 bp2_yearly.0611.desc.regent_opinion.fallback: "Sei que acha que sou apenas [Select_CString( ROOT.Char.IsFemale, 'uma menina', 'um menino' )], mas certamente ainda devo merecer um pouco de tempo? Em vez disso, suas visitas quase sempre são"
 bp2_yearly.0611.desc.government.tribal: "para falar com algum ancião influente, ou consultar o conselho, ou emprestar mensageiros oficiais, ou... ou..."
 bp2_yearly.0611.desc.government.fallback: "para alguns documentos importantes, ou o uso dos selos da casa, ou para falar com algum oficial, ou... ou..."
 bp2_yearly.0611.desc.outro: "\n\nEu só queria que [regent.GetSheHe] pensasse um pouco em #EMP mim#! às vezes, e não apenas em [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTier]."
 bp2_yearly.0611.a: "Talvez uma carta sincera pudesse compelir ..."
 bp2_yearly.0611.b: "#BER Sou [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip|l] e exijo ser ouvido!"
 bp2_yearly.0611.b.tt: "Você faz um escândalo até que [regent.GetFirstNameNoTooltip] te leva às reuniões importantes."
 bp2_yearly.0611.c: "Quem se importa? Mais tempo para brincar lá fora!"
 bp2_yearly.0611.d: "Cheiro uma oportunidade."
 bp2_yearly.0611.d.tt.success: "Você obtém a recompensa prometida de [regent.GetFirstName]"
 bp2_yearly.0611.d.tt.failure: "A [regent.GetSheHe] lhe incomodam suas lamúrias"
 bp2_yearly.0611.d.tt.failure.deceitful: "Por sua [personality|lE], [regent.GetFirstNameNoTooltip] respeita a tentativa"
 bp2_yearly.0611.e: "O que será que há nos aposentos privados quando [regent.GetSheHe] não está?"
 bp2_yearly.0611.f.young: "Vou encontrar outra pessoa para ler para mim!"
 bp2_yearly.0611.f.fallback: "Bah, posso ler história sem [regent.GetSheHe]."
 bp2_yearly.0611.g: "Harrumph, posso organizar minha própria diversão."
 bp2_yearly.0611.g.tt: "Sua próxima [GetActivityType('activity_playdate').GetName|l] [activity|lE] é gratuita, e [characters|lE] são mais propensos a comparecer"
 bp2_yearly.0621.t.close_family: "Presentes para [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip|l]"
 bp2_yearly.0621.t.fallback: "Presentes [regent.Custom('ES_DelDela')] [regent.Custom('GetAuntUncle')] [regent.GetFirstNameNoTooltip]"
 bp2_yearly.0621.desc.intro.bad_history: "Por tudo o que [regent.Custom2('MyCharacterIntroduction', ROOT.Char)]me prejudicou no passado, parece determinado[regent.Custom('ES_OA')]a me compensar com presentes elaborados.\n\n"
 bp2_yearly.0621.desc.intro.fallback: "[regent.Custom2('MyCharacterIntroduction', ROOT.Char)|U] está especialmente pensativ[regent.Custom('ES_OA')] ultimamente. Sempre parece me trazer os melhores presentes, o que [regent.GetHerHim] o transforma no [regent.Custom('ES_ElLa')] melhor [ROOT.Char.GetDiarchTitle|l].\n\n"
 bp2_yearly.0621.desc.midtro: "\"Ah, então aí está, jovem [ROOT.Char.Custom('MistressMaster')]\", ri [regent.GetSheHe] quando entro no pátio, onde espera com algo coberto por um pano. \"Hoje tenho algo muito especial para você\", sussurra de forma conspiratória[regent.Custom('ES_XA')].\n\nCom essas palavras, o pano cai, revelando"
 bp2_yearly.0621.desc.gift.gold: "altas pilhas de moedas de prata e ouro moldadas na forma de uma coroa."
 bp2_yearly.0621.desc.gift.prestige: "um grupo de cantores e dançarinos, que avançam girando e trinando uma música composta sobre mim."
 bp2_yearly.0621.desc.gift.piety: "uma maquete elaborada de [ROOT.Char.GetFaith.HouseOfWorship], bem como uma placa que explica a nova ala a ser construída com minha doação."
 bp2_yearly.0621.desc.gift.event_troops: "um servo armado, ajoelhado e oferecendo-me sua mão em fidelidade."
 bp2_yearly.0621.desc.gift.dog: "um elegante cão de caça, sua cauda abanando furiosamente."
 bp2_yearly.0621.desc.gift.cat: "um gato elegante, uma pata levantada, parecendo chocado ao me ver tanto quanto eu ao vê-lo."
 bp2_yearly.0621.desc.gift.eagle: "um filhote de águia astuto, com as asas abertas, empoleirado em um pedestal."
 bp2_yearly.0621.extra_stuff.success: "[regent.GetFirstName] encontra mais para presentear de última hora"
 bp2_yearly.0621.extra_stuff.failure: "Você recebe o que recebe e ficará feliz com isso"
 bp2_yearly.0621.a: "Que bela surpresa!"
 bp2_yearly.0621.b: "Hmmm... arm wrestling para dobrar?"
 bp2_yearly.0621.c: "Você não acha que está esquecendo de algo?"
 bp2_yearly.0621.d: "Você escondeu mais em algum lugar, eu sei..."
 bp2_yearly.0621.e: "Li que é boa sorte dar presentes grandes..."
 bp2_yearly.0621.f: "Isso não pode ser a única coisa?"
 bp2_yearly.0621.g.bad_blood: "Você não pode comprar o meu amor, #EMP [regent.GetFirstNameNoTooltip]#!."
 bp2_yearly.0621.g.good_terms: "Obrigado, mas já tenho um. Provavelmente."
 bp2_yearly.0631.t: "Palavras Sussurradas"
 bp2_yearly.0631.desc.intro.positive: "[regent.Custom2('MyCharacterIntroduction', ROOT.Char)|U] tem se mostrado, em sua maior parte, um[regent.Custom('ES_XA')] [ROOT.Char.GetDiarchTitle|l] leal e seus conselhos sempre tentaram buscar o melhor para os meus interesses.\n\nPortanto, é bastante sério e muito preocupante quando me relata todos os terríveis pecados dos quais se acusa [rival_successor.Custom2('MyCharacterIntroduction', ROOT.Char)].\n\n"
 bp2_yearly.0631.desc.intro.negative: "[regent.Custom2('MyCharacterIntroduction', ROOT.Char)|U] tem um histórico... irregular como meu [ROOT.Char.GetDiarchTitle|l]. Deveria ser meu escudo e protetor[regent.Custom('ES_XA')], mas parece mais interessad[regent.Custom('ES_OA')] em enriquecer-se.\n\nPortanto, não é de estranhar que eu tenha minhas dúvidas quando me conta todos os horríveis pecados de que se acusa a [rival_successor.Custom2('MyCharacterIntroduction', ROOT.Char)].\n\n"
 bp2_yearly.0631.desc.intro.vague: "O serviço de [regent.Custom2('MyCharacterIntroduction', ROOT.Char)] como meu [ROOT.Char.GetDiarchTitle|l] não foi tudo o que prometeu que seria; às vezes me ajuda, mas com a mesma frequência parece zelar apenas pelos próprios interesses.\n\nPortanto, fico muito inseguro quando me conta todos os horríveis pecados dos quais [rival_successor.Custom2('MyCharacterIntroduction', ROOT.Char)] é acusado.\n\n"
 bp2_yearly.0631.desc.rationale.nemesis: "\"… essa rata repugnante certamente está tramando sua queda, [ROOT.Char.GetFirstNameNoTooltip], assim como planeja a minha, e o despedaçamento de toda a [ROOT.Char.GetPrimaryTitle.GetDefinitiveName]!\"."
 bp2_yearly.0631.desc.rationale.warmonger: "\"… [rival_successor.GetSheHe] é um demônio e um[rival_successor.Custom('ES_XA')] belicista, [ROOT.Char.GetFirstNameNoTooltip], cujo apetite pela destruição injusta não conhece limites. Jogará toda a [ROOT.Char.GetPrimaryTitle.GetDefinitiveName] em uma guerra civil se tiver a menor oportunidade!\"."
 bp2_yearly.0631.desc.rationale.rival: "«… é um canalha de primeira linha, [ROOT.Char.GetFirstNameNoTooltip], [Select_CString( rival_successor.IsFemale, 'una mentirosa', 'un mentiroso' )], [Select_CString( rival_successor.IsFemale, 'ladrona', 'ladrón' )] e um patife que quer semear a discórdia em seu domínio»."
 bp2_yearly.0631.desc.rationale.revenge: "\"... ess[rival_successor.Custom('ES_EA')] agente estridente de [regent.GetFaith.DevilName] cometeu crimes horr?veis contra mim e os meus, [ROOT.Char.GetFirstNameNoTooltip], e certamente voltaria seu esp?rito irado contra toda a [ROOT.Char.GetPrimaryTitle.GetDefinitiveName] se tivesse a chance\"."
 bp2_yearly.0631.desc.rationale.criminality: "\"… [rival_successor.GetSheHe] é um[rival_successor.Custom('ES_XA')] criminoso notório, [ROOT.Char.GetFirstNameNoTooltip], um[rival_successor.Custom('ES_OA')] que sem dúvida está à procura de mais oportunidades para o vício e o pecado. O poder que ele teria se se tornasse em [ROOT.Char.GetDiarchTitle|l]…!\"."
 bp2_yearly.0631.desc.rationale.opposing_traits: "\"… mesmo falar com [rival_successor.GetSheHe] por mais de um instante pode deixar qualquer um louco, [ROOT.Char.GetFirstNameNoTooltip]. É surpreendente como alguém pode estar tão total e absolutamente errado sobre #EMP todo#!\"."
 bp2_yearly.0631.desc.rationale.sins: "\"… Não consigo suportar compartilhar a mesa com tal pessoa, nenhum bom [regent.GetFaith.GetAdherentName] poderia — e você também não deveria, [ROOT.Char.GetFirstNameNoTooltip] a menos que queira que os pecados dele(a) se gravem em seu frágil e jovem coração\"."
 bp2_yearly.0631.desc.rationale.petty_opinions: "\"… não se trata nem mesmo de nenhum acontecimento em particular, [ROOT.Char.GetFirstNameNoTooltip] é simplesmente tudo na maneira como ele se comporta. Com tempo suficiente, [rival_successor.GetSheHe] colocará a totalidade de [ROOT.Char.GetPrimaryTitle.GetDefinitiveName] contra você por pura irritação\"."
 bp2_yearly.0631.desc.rationale.hideousness: "\"… Quero dizer, #EMP mirad[rival_successor.GetHerHim]#! apenas! Se dizem que se trata de um[rival_successor.Custom('ES_XA')] \"[rival_successor.GetWomanMan]\", já vi sapos meio esmagados pelas rodas de carroças com melhor aparência. Tal feiura sem dúvida indica toda sorte de baixos impulsos pecaminosos borbulhando sob sua pele miserável\"."
 bp2_yearly.0631.desc.rationale.generic: "\"… por onde quer que vá, faz inimigos, [ROOT.Char.GetFirstNameNoTooltip], e eu entre eles. Trate[rival_successor.GetHerHim] com bondade demais e certamente se aproveitará da sua generosidade e o trairá em pouco tempo\"."
 bp2_yearly.0631.desc.outro: "\n\n\"Se vocês não se posicionarem contra ele agora mesmo, pode ser que [rival_successor.GetSheHe] encontre uma forma de tomar meu cargo e causar-lhes um dano #EMP permanente#!\"."
 bp2_yearly.0631.a: "Se... é isso que você acha que é melhor..."
 bp2_yearly.0631.b: "Nunca! Isso são nada além de mentiras distorcidas que você conta!"
 bp2_yearly.0631.b.tt: "Você se recusa a negar [rival_successor.GetFirstNameNoTooltip]"
 bp2_yearly.0631.c.rowdy: "Já tenho idade suficiente para reconhecer uma briga pessoal."
 bp2_yearly.0631.c.charming: "Tenho certeza de que consigo convencer[rival_successor.Custom('ES_LeLa')] se for preciso."
 bp2_yearly.0631.c.curious: "Difícil acreditar somente nas palavras de um de vocês, [regent.GetFirstNameNoTooltip]."
 bp2_yearly.0631.c.pensive: "Eu... vou ter que pensar sobre isso..."
 bp2_yearly.0631.c.bossy: "Não venha trazer seus problemas pessoais para #EMP mim#!."
 bp2_yearly.0641.t: "Quid Pro Quo"
 bp2_yearly.0641.desc.intro.request_boilerplate: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U] e [ROOT.Char.GetTitleAsNameNoTooltip|l], como voss[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetDiarchTitle|l], preciso de um pouco mais de autoridade para tratar de um assunto de certa import?ncia."
 bp2_yearly.0641.desc.intro.tribal: "Um legislador ancião segue [regent.Custom2('MyCharacterIntroduction', ROOT.Char)] quando [regent.GetSheHe] entra no pequeno gabinete.\n\n$bp2_yearly.0641.desc.intro.request_boilerplate$ Este testemunho confirmará seu juramento\".\n\n"
 bp2_yearly.0641.desc.intro.fallback: "[regent.Custom2('MyCharacterIntroduction', ROOT.Char)|U] entra com segurança no pequeno gabinete, segurando um maço de pergaminhos.\n\n$bp2_yearly.0641.desc.intro.request_boilerplate$ Se sois tão bondoso, assinai e selai estes documentos\".\n\n"
 bp2_yearly.0641.desc.midtro: "\"Claro, eu nunca me aproximaria de você de mãos vazias! Por esse pequeno favor, eu vou"
 bp2_yearly.0641.desc.vs_courtly: "falar com seus vassalos mais sofisticados, garantindo que você permaneça em suas boas graças\"."
 bp2_yearly.0641.desc.vs_glory_hound: "falar com seus vassalos mais sedentos de sangue, mantendo-os certos de seu destino glorioso\"."
 bp2_yearly.0641.desc.vs_parochial: "falar com seus vassalos mais isolados, deixando-os saber que a capital está sensível às preocupações deles\"."
 bp2_yearly.0641.desc.vs_zealot: "falar com seus vassalos mais zelosos, assegurando-lhes sua piedade em nome de [ROOT.Char.GetFaith.HighGodName]\"."
 bp2_yearly.0641.desc.vs_minority: "falar com seus vassalos mais ecléticos, mantendo a diversidade de seu reino estável\"."
 bp2_yearly.0641.desc.vs_baron: "falar com seus vassalos menores, mantendo os menos nobres entre os nobres na linha\"."
 bp2_yearly.0641.desc.dynasty: "ter cartas lisonjeiras escritas em seu nome até para sua família mais distante\"."
 bp2_yearly.0641.desc.fellow_vassals: "farei com que sejam escritas cartas amistosas a outros vassalos [ROOT.Char.GetLiege.Custom('ES_DelDela')] [ROOT.Char.GetLiege.GetTitledFirstName|l] para ganhar amigos em [ROOT.Char.GetLiege.GetPrimaryTitle.GetDefinitiveName]\"."
 bp2_yearly.0641.desc.powerful_vassal: "falar com os magnatas mais poderosos em suas terras, assegurando-lhes que suas vozes são ouvidas\"."
 bp2_yearly.0641.desc.hof: "enviarei uma carta efusiva [ROOT.Char.GetFaith.GetReligiousHead.Custom('ES_AlAla')] [ROOT.Char.GetFaith.GetReligiousHead.GetTitledFirstName|l], ressaltando sua posição com o representante escolhido [ROOT.Char.GetFaith.HighGodNamePossessive]\"."
 bp2_yearly.0641.desc.realm_priest: "falar com o [ROOT.Char.GetCouncillorPosition('councillor_court_chaplain').GetPositionName] e garantir que você permaneça em boa posição com o clero\"."
 bp2_yearly.0641.desc.maa_maintenance: "ver se não conseguimos encontrar algum extra para suas tropas domésticas\"."
 bp2_yearly.0641.desc.cowed_vassal: "organizar mais #EMP contribuições#! de seus vassalos mais temerosos\"."
 bp2_yearly.0641.desc.war_income: "organizar uma taxa de guerra a ser cobrada nestes tempos difíceis\"."
 bp2_yearly.0641.desc.free_ho_hire: "arranjar os serviços de alguns dos guerreiros mais ferozes de nossa fé, para serem usados durante a sua maioridade\"."
 bp2_yearly.0641.desc.mercenary_cost_reduction: "arranjar um desconto com alguns dos mercenários que inundam suas terras. A ser usado após a sua maioridade, é claro\"."
 bp2_yearly.0641.desc.raid_speed: "arranjar saqueadores veteranos para se juntar às suas bandas de guerra, para trazer-lhe rico saque estrangeiro\"."
 bp2_yearly.0641.desc.outro.tribal: "\n\nTudo o que tenho que fazer é dizer as palavras."
 bp2_yearly.0641.desc.outro.fallback: "\n\nTudo o que tenho que fazer é rabiscar as letras."
 bp2_yearly.0641.a: "Se você diz..."
 bp2_yearly.0641.b: "Você está indo longe demais, [regent.GetFirstNameNoTooltip]."
 bp2_yearly.0641.c.rowdy: "Sois [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetDiarchTitle|l], resolva você mesmo!"
 bp2_yearly.0641.c.charming: "Você sabe melhor — não pode #EMP você#! cuidar disso!?"
 bp2_yearly.0641.c.curious: "Que cansativo — não podemos falar sobre algo diferente?"
 bp2_yearly.0641.c.pensive: "Tenho estudos para cuidar, temo."
 bp2_yearly.0641.c.bossy: "Isso está abaixo de mim — faça como quiser."
 bp2_yearly.0641.c.tt: "Você dá a [regent.GetFirstNameNoTooltip] carta branca, mas não endossa"
 bp2_yearly.0651.t: "Sempre Que Você Precisar [regent.GetHerHim]"
 bp2_yearly.0651.desc.intro: "Meu [ROOT.Char.GetDiarchTitle|l] [regent.GetFirstName] escuta com fascínio[regent.Custom('ES_OA')] minha história, os olhos brilhando de interesse e afeto enquanto"
 bp2_yearly.0651.desc.story.rowdy.invented_game: "explico em detalhes as regras do novo jogo de bola que acabei de inventar. Sinto-me #EMP muy#! orgulhos[ROOT.Char.Custom('ES_OA')] disso."
 bp2_yearly.0651.desc.story.rowdy.climbed_roof: "Detalho a rota que segui para subir até a nova torre; é bem perigosa, mas sou [Select_CString( ROOT.Char.IsFemale, 'la mejor escaladora', 'el mejor escalador' )] de [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTier]."
 bp2_yearly.0651.desc.story.rowdy.prank: "dou risadinhas enquanto relato a última brincadeira que fiz; talvez eu tenha sido [Select_CString( ROOT.Char.IsFemale, 'la única', 'el único' )] que estava rindo, mas eu ria #EMP fuerte#!."
 bp2_yearly.0651.desc.story.charming.composed_poem: "Discorro sobre o simbolismo e o significado por trás de um poema que escrevi. Acho que é o meu melhor até agora, embora eu não saiba se ainda posso me chamar de [Select_CString( ROOT.Char.IsFemale, 'poetisa', 'poeta' )] ainda."
 bp2_yearly.0651.desc.story.charming.new_friend: "Conto a  sobre um dos filhos dos servos que parece estar encantado com meus jogos. Acho que fiz um amigo, pelo menos para a estação."
 bp2_yearly.0651.desc.story.charming.new_word: "Explico como pronunciar a nova palavra que inventei. Espero que ela pegue logo, assim que meus súditos a ouvirem usar [ROOT.Char.Custom('ES_AlAla')] #EMP [ROOT.Char.GetTitleAsNameNoTooltip|l]#!."
 bp2_yearly.0651.desc.story.curious.distant_land: "Conto a respeito da estranha terra distante da qual soube recentemente, e das pessoas estranhas que a habitam."
 bp2_yearly.0651.desc.story.curious.book_gift: "Explico detalhadamente o conteúdo de um livro que um dos meus vassalos menores comprou para mim — não é a obra mais gloriosa, mas devorei seu conteúdo com entusiasmo."
 bp2_yearly.0651.desc.story.curious.strange_bird: "Aponto as diferentes partes do meu esboço, tentando transmitir como o estranho pássaro que desenhei se movia de maneira estranha, como era a plumagem e faço minha melhor imitação de seu canto trinado."
 bp2_yearly.0651.desc.story.pensive.distant_letter: "Falo sobre a carta que montei com muito cuidado para um nobre distante de quem ouvi histórias. Não sei se minha mensagem chegará até eles, mas só o pensamento de que eles possam me escrever de volta é tão encantador."
 bp2_yearly.0651.desc.story.pensive.foreign_custom: "informo-lhe sobre um curioso costume estrangeiro de que ouvi falar recentemente, um que eu gostaria muito que também fosse a norma aqui em [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTier]."
 bp2_yearly.0651.desc.story.pensive.draft_law: "a lei que estou tentando redigir. Ela... ainda n?o est? #EMP totalmente#! conclu?da, mas me sinto orgulhos[ROOT.Char.Custom('ES_OA')] do quanto consegui avan?ar com ela."
 bp2_yearly.0651.desc.story.bossy.servants_caught: "falo para sobre os criados que peguei preguiçando e como os disciplinei com esmero por sua atitude negligente com o trabalho."
 bp2_yearly.0651.desc.story.bossy.court_protocol: "Detalho e demonstro o novo protocolo da corte que quero implementar. Acho que ele realmente demonstrará minha dignidade como [Select_CString( ROOT.Char.IsFemale, 'la auténtica', 'el auténtico' )] [ROOT.Char.GetTitleAsName|l] de [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTier]."
 bp2_yearly.0651.desc.story.bossy.organised_game: "explico como organizei um jogo com as outras crianças da corte, dividi elas em equipes e conduzi tudo sozinho[ROOT.Char.Custom('ES_OA')]."
 bp2_yearly.0651.desc.rationale.predecessor: "\n\n«[Select_CString( ROOT.Char.IsFemale, 'Pequeña', 'Pequeño' )] [ROOT.Char.GetFirstNameNoTooltip], vocês me lembram muito de [predecessor.GetFirstName] quando falam assim», suspira [regent.GetSheHe] , claramente perdido[regent.Custom('ES_OA')] em suas lembranças por minhas palavras. «Vocês se parecem tanto com seu[predecessor.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', predecessor)]»."
 bp2_yearly.0651.desc.rationale.loyalty: "\n\nVocês sabiam que me enchem de orgulho[regent.Custom('ES_OA')]? De protegê-los quando eram [Select_CString( ROOT.Char.IsFemale, 'uma menina', 'um menino' )] e ainda mais de servi-los agora que são [Select_CString( ROOT.Char.IsFemale, 'uma mulher', 'um homem' )]."
 bp2_yearly.0651.desc.rationale.compassion: "\n\n\"Tenho tanta sorte de servi-los, [Select_CString( ROOT.Char.IsFemale, 'pequena', 'pequeno' )] [ROOT.Char.GetFirstNameNoTooltip]\", suspira. \"Que sorte a minha ver [Select_CString( ROOT.Char.IsFemale, 'a mulher', 'o homem' )] em [ROOT.Char.Custom('ES_ElLa')] que vocês estão se tornando\"."
 bp2_yearly.0651.desc.rationale.fallback: "\n\n[Select_CString( ROOT.Char.IsFemale, 'Pequena', 'Pequeno' )] [ROOT.Char.GetFirstNameNoTooltip], algum dia, vocês serão [ROOT.Char.Custom('ES_ElLa')] melhor [ROOT.Char.GetTitleAsNameNoTooltip|l] que jamais teve [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTier]. Estou tão orgulhos[regent.Custom('ES_OA')] [Select_CString( ROOT.Char.IsFemale, 'da mulher', 'do homem' )] de quem vocês estão se tornando."
 bp2_yearly.0651.desc.outro: "\n\n\"Sempre estarei aqui para você, meu [ROOT.Char.GetTitleAsNameNoTooltip|l]. Mesmo quando chegar a ascensão do [regent.GetFaith.random_NegativeAfterLife], você pode contar comigo\"."
 bp2_yearly.0651.a: "E você jura que nunca me trairá?"
 bp2_yearly.0651.b: "[ROOT.Char.GetFirstNameNoTooltip] e [regent.GetFirstNameNoTooltip], amig[ROOT.Char.Custom('ES_OA')]s para sempre!"
 bp2_yearly.0651.c: "Isso é legal, mas estou contando uma história."
 bp2_yearly.0651.d: "Vamos lá, vamos contar à corte sobre o meu dia!"
 bp2_yearly.0661.t: "Uma Ferramenta para Usar"
 bp2_yearly.0661.desc: "«#EMP ¡Se trata de mi [offended_family.Custom2('RelationToMeShort', ROOT.Char)]!#!», grita [offended_family.GetFirstName], confrontando meu [ROOT.Char.GetDiarchTitle|l] [regent.GetFirstName] em um dos muitos salões vazios de [ROOT.Char.GetCapitalLocation.GetName], «você não pode me afastar assim de [ROOT.Char.GetSheHe]».\n\nEu não pretendia ouvir escondido; tropecei na conversa por acaso enquanto perseguia um servo, mas agora permaneço fora de vista enquanto os dois discutem.\n\n«Pode ser seu[ROOT.Char.Custom('ES_OA')] [offended_family.Custom2('RelationToMeShort', ROOT.Char)], mas está a #EMP mi#! cargo até que eu considere que está pront[ROOT.Char.Custom('ES_OA')] para cuidar dos próprios assuntos. Até lá, falo em nome de [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitledFirstName|l] e, na minha opinião, gente como você é a pior influência para uma mente jovem»."
 bp2_yearly.0661.a: "[regent.GetFirstNameNoTooltip] está certo, vergonha para você [offended_family.GetFirstNameNoTooltip]!"
 bp2_yearly.0661.b: "[offended_family.GetFirstNameNoTooltip] é meu [ROOT.Char.Custom2('RelationToMeShort', offended_family)] e [offended_family.GetHerHim] você respeitará."
 bp2_yearly.0661.c.rowdy: "Deixe eles resolverem, tenho lugares para ir."
 bp2_yearly.0661.c.charming: "Não há nada a ganhar escolhendo um favorito aqui."
 bp2_yearly.0661.c.curious: "Fascinante, mas sobre aquele servo..."
 bp2_yearly.0661.c.pensive: "Não quero fazer parte dessa discussão."
 bp2_yearly.0661.c.bossy: "Eu cuidarei deles quando eu realmente for [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip|l] de verdade."
