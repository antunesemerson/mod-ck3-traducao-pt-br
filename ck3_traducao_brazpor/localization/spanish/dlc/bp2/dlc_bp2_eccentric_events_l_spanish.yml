l_spanish:
 child_personality.7300.t: "Amigo dos Animais"
 child_personality.7300.desc: "Eu costumo me sentir muito mais à vontade perto dos animais dos jardins zoológicos e estábulos do que perto dos meus colegas e tutores na corte. Me encontro mais uma vez nos estábulos, cuidando e montando meu cavalo.\n\nSinto uma forte afinidade, como um bom amigo. Desmonto, dou uma boa escovada no meu corcel e me pergunto se deveríamos tratar nossos montes mais como camaradas."
 child_personality.7300.a: "Eu... eu acho que falo cavalo!"
 child_personality.7300.b: "Eles são como nós."
 child_personality.7300.c: "Um animal é uma ferramenta, nada mais."
 child_personality.7301.t: "$child_personality.7300.t$"
 child_personality.7301.desc: "De um tempo para cá, [child.GetFirstName] tem passado uma quantidade de tempo incomum nos estábulos e começou a negligenciar seus pares na corte. A criança parece obcecad[child.Custom('ES_OA')] com um cavalo em particular"
 child_personality.7301.eccentric.desc: "e até mesmo começou a afirmar que "fala cavalo",\n\npara, em seguida, fazer caretas com os lábios e relinchar, parando às vezes para me informar sobre o que o cavalo e [child.GetSheHe]."
 child_personality.7301.eccentric.obligatory_glitterhoof_reference: "Aparentemente, esta criatura tem ambições de subir à posição de [child.GetFaith.ReligiousHeadName]."
 child_personality.7301.eccentric.fallback: "Aparentemente, esta criatura deseja fazer parte do conselho."
 child_personality.7301.compassionate.desc: "e afirma que até as feras merecem cuidado e dignidade.\n\nO cavalo está impecavelmente tosado, ao contrário de [child.GetFirstNameNoTooltip], que evidentemente tem trabalhado como serviçal[child.Custom('ES_OA')] de estábulo."
 child_personality.7301.callous.desc: "mas, quando confrontado, [child.GetSheHe] insiste que uma fera é apenas uma mera ferramenta a ser usada e descartada quando não é mais útil.\n\n[child.GetFirstNameNoTooltip] não parece se preocupar em nada com a segurança ou o conforto da fera ao cavalgar, irritando-se ativamente quando o animal demonstra qualquer preocupação com a própria segurança."
 child_personality.7301.eccentric: "Que imaginação maravilhosa."
 child_personality.7301.compassionate: "Faça aos outros..."
 child_personality.7301.callous: "\"Excelente, mantenha esse sentimento.\""
 child_personality.7301.change.eccentric: "\"Não, fale com o cavalo. Me diga o que ele diz.\""
 child_personality.7301.change.compassionate: "\"Um cavalo é um companheiro como nenhum outro, [child.GetFirstNameNoTooltip].\""
 child_personality.7301.change.callous: ""Crian[child.Custom('ES_OA')] idiota, um cavalo é apenas uma ferramenta"."
 child_personality.7400.t: "Jogar ou Montar?"
 child_personality.7400.desc: "Lá venho passando meio dia feliz com [other_child.GetFirstName] e acho que poderia continuar brincando com [other_child.GetSheHe] até meu corpo doer.\n\nMas então vejo seu rosto desabar quando saco meu jogo de [ROOT.Char.Custom('BG_GameType_Generic')].\n\n"
 child_personality.7400.desc.outro.young: "\"Eu não quero jogar algo tão chato e entediante. Quero montar cavalos!\""
 child_personality.7400.desc.outro.older: "\"Ah, vamos lá, [ROOT.Char.GetFirstNameNoTooltip], ficamos o dia todo dentro de casa. Talvez devêssemos sair para um passeio!\""
 child_personality.7400.a: "\"Por que não os dois?\""
 child_personality.7400.b: "\"Não, vamos jogar O MEU jogo DO MEU jeito!\""
 child_personality.7400.c: "\"Ok, montar soa bem também...\""
 child_personality.7401.t: "$child_personality.7400.t$"
 child_personality.7401.desc: "[child.GetFirstName] passou quase o dia todo estranhamente silencios[child.Custom('ES_OA')], então decido que o mais prudente é ir verificar como está. Encontro [child.GetHerHim]"
 child_personality.7401.eccentric.desc: "no pátio de montaria com [other_child.GetFirstName]. Os dois estão gritando em voz alta de cima dos cavalos, recitando o que parece ser movimentos do jogo [child.Custom('BG_GameType_Generic')]. Após uma inspeção mais próxima, os dois estão jogando o jogo de tabuleiro em cima dos cavalos, ou pelo menos tentando. O pátio de montaria inteiro está cheio de peças do jogo e os dois caíram dos cavalos mais de uma vez."
 child_personality.7401.fickle.desc: "no picadeiro com [other_child.GetFirstName]. [child.GetFirstNameNoTooltip|U] não parece nada entusiasmad[child.Custom('ES_OA')] com estar ali, como se sua companheir[other_child.Custom('ES_OA')] o tivesse obrigado a estar ali.\n\n“Eu queria jogar jogo de tabuleiro, mas [other_child.GetFirstNameNoTooltip] disse que tínhamos que andar a cavalo, e isso também pareceu uma boa ideia!”."
 child_personality.7401.stubborn.desc: "no quarto com [other_child.GetFirstName] que parece estar jogando sem vontade de [child.Custom('BG_GameType_Generic')] com um [child.Custom('ES_XA')] [child.GetFirstNameNoTooltip] entusiasmado.\n\n[other_child.GetFirstNameNoTooltip|U] queria montar, mas eu decidi que deveríamos jogar jogos de tabuleiro em vez disso!"
 child_personality.7401.eccentric: "\"Que excelente compromisso!\""
 child_personality.7401.fickle: "\"Os caprichos mudam mais do que o tempo.\""
 child_personality.7401.stubborn: "\"Permaneça inabalável como uma pedra.\""
 child_personality.7401.change.eccentric: "\"Por que não jogar ambos ao mesmo tempo?\""
 child_personality.7401.change.fickle: "\"Os caprichos devem ser tão mutáveis quanto a água fluente.\""
 child_personality.7401.change.stubborn: "\"Não, mantenha os pés firmes no chão e exija que os outros se movam.\""
 stress_threshold.2360.t: "Colapso Mental: Um Visitante"
 stress_threshold.2360.desc: "Finalmente encontro algum alívio do estresse da vida da [ROOT.Char.Custom('GetCourt')|l] em minha [ROOT.Char.Custom('GetChamber')] particular, mas enquanto cochilo, à beira do sono, ouço uma batida melódica.\n\nAbro minha [ROOT.Char.Custom('GetDoor')] de supetão para ver quem é o visitante da meia-noite, só para ser atacado no rosto por um pequeno pássaro preto.\n\nNormalmente a visita de uma criatura [ROOT.Char.GetFaith.CreatorNamePossessive] seria um presente, mas essa pequena praga preta voa sem parar pela [ROOT.Char.Custom('GetRoom')|l], grasnando e guinchando para mim. Sinto meus punhos se apertarem e meu coração começar a disparar."
 stress_threshold.2360.a.eccentric.gain: "Acho que ele está falando comigo."
 stress_threshold.2360.a.eccentric.effect: "Ah, um visitante a esta hora! Vamos bater um papo."
 stress_threshold.2360.b.irritable.gain: "Não aguento mais isso!"
 stress_threshold.2360.b.irritable.effect: "Vou matar esse maldito pássaro!"
 stress_threshold.2360.c: "Tenho certeza de que ele vai embora eventualmente."
 bp2_yearly.8000.t: "À Minha Imagem"
 bp2_yearly.8000.desc.intro: "Recentemente, [hostage.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me fala apenas em [ROOT.Char.GetCourtLanguage.GetNameNoTooltip], e com notável fluência.\n\n"
 bp2_yearly.8000.desc.tutor: "Sem dúvida, tanto tempo passado sob os cuidados do meu Tesoureiro[tutor.Custom('ES_XA')] da corte, [tutor.GetFirstName], é o que fez de [Select_CString( hostage.IsFemale, 'esta niña', 'este niño' )] uma promessa tão grande para a nossa língua. Estou ansioso para ver seu domínio da língua cortesã avançar ainda mais."
 bp2_yearly.8000.desc.chaplain: "[hostage.GetFirstNameNoTooltip|U] me diz que seus educadores do clero, como [tutor.Custom2('MyCharacterIntroduction', ROOT.Char)], merecem créditos pelo domínio de sua língua da corte."
 bp2_yearly.8000.desc.guardian: "Está claro que [hostage.GetFirstNameNoTooltip] e [tutor.GetFirstName] estão desenvolvendo um vínculo e só posso esperar ver mais gratas surpresas na educação."
 bp2_yearly.8000.a: "Eu [hostage.GetHerHim] ensinarei pessoalmente."
 bp2_yearly.8000.b: "Que tentativa patética de [ROOT.Char.GetCourtLanguage.GetNameNoTooltip]."
 bp2_yearly.8000.c: "Isso é legal."
 bp2_yearly.8000.b.tt: "será desencorajado a [hostage.GetFirstNameNoTooltip] de aprender o [Concept( 'court_language', 'idioma da sua corte' )|E]"
 tutor_child_in_language_tt: "[hostage.GetFirstName|U] começará uma [scheme|lE] para aprender sua [court_language|lE] com uma forte bonificação"
 child_learning_language_tt: "Incentivarão [hostage.GetFirstNameNoTooltip] a iniciar uma [scheme|lE] para aprender o [Concept( 'court_language', 'idioma da sua corte' )|E]"
 bp2_yearly.8010.t: "Fala Engraçada"
 bp2_yearly.8010.desc: "Estou no meio de uma aula com [child.Custom2('MyCharacterIntroduction', ROOT.Char)] e seu sorriso contido me faz suspeitar que não está prestando atenção a uma palavra do que digo. De vez em quando, simplesmente repete algo que eu disse com uma voz estranha.\n\n"O que você está fazendo?"\n\n"O que você está fazendo?" [Select_CString( child.IsFemale, 'A menina', 'O menino' )] [child.Custom2('InsultNoun', ROOT.Char)] cai na gargalhada. "Desculpe, é que seu sotaque é tão engraçado!""
 bp2_yearly.8010.a: "Talvez eu devesse ensinar-lhe um [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip] rudimentar."
 bp2_yearly.8010.a.tt: "Você passa as próximas aulas falando o [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip] básico"
 tutor_child_in_native_language_tt: "[child.GetFirstName|U] começará um [scheme|lE] para aprender a sua [language|lE] com um bônus poderoso"
 bp2_yearly.8010.a.success: "Você ensina com sucesso o [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip]"
 bp2_yearly.8010.a.failure: "Você não consegue ensinar o [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip]"
 bp2_yearly.8010.b: ""Não, [child.Custom('ES_ElLa')] que fala estranho é #EMP tú#!!""
 bp2_yearly.8010.b.success: "Você consegue humilhar [Select_CString( child.IsFemale, 'à menina', 'ao menino' )]"
 bp2_yearly.8010.b.failure: "Você é ainda mais humilhado"
 bp2_yearly.8010.c: "Ok."
 bp2_yearly.8010.d: "Oway areway uway?"
 bp2_yearly.8010.d.tt: "Você passa a aula inventando uma língua secreta juntos"
 bp2_yearly.8020.t: "O Que Você Quer Fazer?"
 bp2_yearly.8020.desc: "Tenho jogado com [other_child.Custom2('MyCharacterIntroduction', ROOT.Char)] durante a maior parte do dia, e me diverti muito! Jogamos [ROOT.Char.Custom('BG_GameType_Generic')] e, quando a partida chega ao fim, [other_child.GetSheHe] me vence e fico boquiabert[child.Custom('ES_OA')].\n\n\"Que divertido! E agora o que fazemos?\".\n\nEsta é minha chance de escolher algo que eu ainda possa vencer…"
 bp2_yearly.8020.a: "Vamos correr em pernas de pau!"
 bp2_yearly.8020.b: "Vamos brincar com o teetotum!"
 bp2_yearly.8020.c: "Todos ganham com marionetes."
 bp2_yearly.8021.t: "O Jogo"
 bp2_yearly.8021.desc.intro: "Deixamos o tabuleiro de jogo de lado e preparamos"
 bp2_yearly.8021.desc.stilts: "nossas pernas de pau. Sou erguido no ar, quase tão alto quanto um adulto, e minhas pernas pequenas lutam para me manter no alto a essas alturas impressionantes. Assim que meu oponente se levanta e encontra seu equilíbrio instável, começamos!"
 bp2_yearly.8021.desc.teetotum: "o teetotum. Gira e gira, cada um de nós apostando nossas bolas nele. Embora não haja nada de valor em jogo, sinto meu coração acelerar quando ele cai de lado.\n\nO jogo vai e vem, bolas trocando de mãos, mas logo eu me encontro"
 bp2_yearly.8021.desc.stilts.outro: "\n\n[other_child.GetFirstNameNoTooltip|U] mal dá alguns metros antes de cair de cara, deixando-me como vencedor[child.Custom('ES_XA')]. Erguido[child.Custom('ES_OA')] sobre meu oponente sobre meus poderosos andejos, fico livre para levar meu prêmio."
 bp2_yearly.8021.desc.teetotum.outro: "que no fim eu fiquei com todas as bolinhas de gude. [other_child.GetFirstNameNoTooltip] solta um suspiro derrotad[other_child.Custom('ES_OA')] e eu sou [Select_CString( child.IsFemale, 'la orgullosa dueña', 'el orgulloso dueño' )] dono de todas as bolinhas de gude."
 bp2_yearly.8021.a: "Isso foi fácil demais![other_child.Custom('ES_OA')]!"
 bp2_yearly.8021.b: "Bom jogo."
 bp2_yearly.8021.c: "Eu disse que o vencedor teria um favor..."
 bp2_yearly.8022.desc.stilts.outro: "\n\nCorro o mais rápido que posso com meus pés instáveis, mas após apenas alguns metros, caio de cara e [other_child.GetFirstNameNoTooltip] é [other_child.Custom('ES_ElLa')] vencedor[other_child.Custom('ES_XA')]."
 bp2_yearly.8022.desc.teetotum.outro: "acabei ficando sem bolinhas de gude, o que faz de [other_child.GetFirstNameNoTooltip] em [other_child.Custom('ES_ElLa')] vencedor[other_child.Custom('ES_XA')]."
 bp2_yearly.8022.desc.rubbed_it_in: "\n\n está longe de ser humilde na vitória, zombando e menosprezando-me por perder."
 bp2_yearly.8022.desc.normal_child: "\n\n\"Isso foi muito divertido!\""
 bp2_yearly.8022.a: "Tanto faz."
 bp2_yearly.8022.a.mean: "\"Cala a boca! Eu te odeio!\""
 bp2_yearly.8022.b: "\"Guardas!\""
 bp2_yearly.8022.c: "\"Sim, deveríamos jogar de novo!\""
 bp2_yearly.8030.t: "Uma Boneca Solitária"
 bp2_yearly.8030.desc: "Chamas e gritos me cercam em [ROOT.Char.GetCurrentLocation.GetName] enquanto meu exército saqueia bens e captura valiosos prisioneiros. O odor acre de carne queimada enche o ar.\n\nEntre os escombros, vejo uma pequena boneca jogada de lado. Seus olhinhos de botão e seu sorriso costurado à mão me lembram da inocência que me espera em casa. \n\nMesmo coberta de lama, sinto a delicadeza de seu cabelo em minha mão. Não consigo evitar pensar que seria um presente perfeito para uma das crianças da corte."
 bp2_yearly.8030.a: "[child_1.GetFirstNameNoTooltip] adoraria isso!"
 bp2_yearly.8030.b: "Esta boneca me lembra muito [child_2.GetFirstNameNoTooltip]."
 bp2_yearly.8020.a.win: "Você venceu!"
 bp2_yearly.8020.a.lose: "Você perdeu..."
 bp2_yearly.8040.t: "Agora, [crush.GetSheHe] é um[crush.Custom('ES_XA')] [crush.GetWomanMan]"
 bp2_yearly.8040.desc.intro: "Já faz um bom tempo desde que vi minha antiga paixão, [crush.GetFirstName]."
 bp2_yearly.8040.desc.mid.same_location: "Então, vejo [crush.GetHerHim] entrar em meu [ROOT.Char.Custom('GetCourt')], com um aspecto tão resplandecente como sempre, uma visão de [ROOT.Char.GetFaith.PositiveAfterLife] como jamais houve. Sinto o coração acelerar e as mãos suarem, como quando eu era um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom('GirlBoy')].\n\nÉ difícil acreditar que seja [Select_CString( crush.IsFemale, 'a mesma', 'o mesmo' )] [crush.Custom('GirlBoy')] que eu idolatrava na minha juventude, e é ainda mais difícil acreditar que meus sentimentos não mudaram."
 bp2_yearly.8040.desc.mid.different_location: "Mesmo depois de todos esses anos, a ideia de [crush.GetSheHe] como o objeto da minha paixão de infância ocupa minha mente nas horas da madrugada.\n\nAgora é [Select_CString( crush.IsFemale, 'uma mulher', 'um homem' )] e não consigo deixar de sentir que pego a minha pena quando penso em sua pessoa."
 bp2_yearly.8040.desc.outro: "Talvez eu deva finalmente tornar meus sentimentos conhecidos."
 bp2_yearly.8040.a: "Vou confessar meu amor!"
 bp2_yearly.8040.b: "Devo deixar de lado esses pensamentos infantis."
 bp2_yearly.8040.c: "Nos casaremos de manhã!"
 bp2_yearly.8041.t: "Agora você é um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan]"
 bp2_yearly.8041.desc.intro.same_location: "Entro em minha [ROOT.Char.Custom('ResidenceBuilding')] e me deparo com [crushee.Custom2('MyCharacterIntroduction', ROOT.Char)] me observando como um[crushee.Custom('ES_XA')] selvagem faminto encararia sua próxima refeição. [crushee.GetSheHe|U] se abre caminho entre a multidão e"
 bp2_yearly.8041.desc.intro.different_location: "Encontro entre minhas cartas de Estado habituais algo bastante peculiar. Delicadamente envolta com uma fita vermelho-sangue, há uma carta com selo de cera adornado com um coração.\n\nÉ de [crushee.Custom2('MyCharacterIntroduction', ROOT.Char)] e detalha seus sentimentos profundos por mim."
 bp2_yearly.8041.desc.mid.same_location_marriage: "se inclina aos meus pés.\n\n"Oh, meu doce [ROOT.Char.Custom('LoverPetName')], só tive olhos para você desde os nossos dias de infância. Meu amor é mais puro do que qualquer outro que você possa encontrar neste mundo, e serei sua [crushee.Custom('WifeHusband')]. Se você me quiser, claro!"."
 bp2_yearly.8041.desc.mid.different_location_marriage: "Depois de um longo tempo falando sobre o seu encantamento de infância por mim, a carta termina propondo que se torne meu [crushee.Custom('WifeHusband')]!\n\n\"Estaremos casados no momento em que você responder, meu amor. Aceite-me e me esforçarei para fazer da sua felicidade o propósito da minha vida.\""
 bp2_yearly.8041.desc.mid.same_location_lovers: "me puxa para um canto tranquilo da [ROOT.Char.Custom('GetCourt')] e sussurra suavemente no meu ouvido.\n\n\"Eu tenho sentimentos profundos de amor por você desde que éramos crianças. Ofereço meu amor, se você aceitar.\""
 bp2_yearly.8041.desc.mid.different_location_lovers: "\n\n"Meu amor, só respiro por você e não consigo suportar ficar longe de você por muito mais tempo. Eu te amo desde que era um[crushee.Custom('ES_XA')] [crushee.Custom('GirlBoy')]. Por favor, corresponda ao meu amor e prometo fazer você feliz para sempre.""
 bp2_yearly.8041.a: "Eu retribuo seu amor!"
 bp2_yearly.8041.b: "Não sinto da mesma forma."
 bp2_yearly.8042.t: "Afetos Correspondidos"
 bp2_yearly.8042.desc.intro: "Professo meu amor a [crush.GetFirstName]"
 bp2_yearly.8042.desc.mid.same_location: "e [crush.GetSheHe] se inclina em meu ouvido e sussurra seus afetos de volta para mim."
 bp2_yearly.8042.desc.mid.different_location: "por carta, e leva apenas alguns dias para que me responda dizendo que [crush.GetSheHe] sente o mesmo!"
 bp2_yearly.8042.desc.outro: "\n\nEstou transbordando de alegria e simplesmente estupefato[ROOT.Char.Custom('ES_OA')] de que nosso amor tenha sido capaz de transcender a loucura da nossa juventude e florescer em um namoro maduro."
 bp2_yearly.8042.a: "Que maravilha."
 bp2_yearly.8043.t: "Afeições Desprezadas"
 bp2_yearly.8043.desc: "Parece que meus sentimentos continuam unilaterais. [crush.GetFirstName] parece completamente desinteressado de mim como amante, e estou deixado com o coração partido."
 bp2_yearly.8043.a: "Talvez se [crush.Custom('ES_LeLa')] possa persuadir."
 bp2_yearly.8043.b: "Ai de mim."
 bp2_yearly_8040_confess_crush: "Você e [crush.GetFirstName] podem se tornar amantes"
 bp2_yearly_8042_rejection: "[crushee.GetFirstName] será informado da sua rejeição"
 friend_secret_language: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [CHARACTER.LocalPlayerString( 'inventasteis', 'inventaron' )] inventaram um idioma secreto juntos"
 friend_gave_a_good_lesson: "[CHARACTER.GetShortUIName|U] [CHARACTER.LocalPlayerString( 'deu', 'deu' )] uma lição valiosa durante a infância de [TARGET_CHARACTER.LocalPlayerString( 'você', TARGET_CHARACTER.GetShortUIName )]"
 friend_gave_a_good_lesson_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] [TARGET_CHARACTER.LocalPlayerString( 'deu', 'deu' )] uma lição importante durante [CHARACTER.LocalPlayerString( 'sua', 'a' )] infância[CHARACTER.LocalPlayerString( '', 'Loc_ES_de_GetShortUIName' )]"
 friend_played_together: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [CHARACTER.LocalPlayerString( 'os divertisteis', 'se divirtieron' )] brincavam juntos quando crianças"
