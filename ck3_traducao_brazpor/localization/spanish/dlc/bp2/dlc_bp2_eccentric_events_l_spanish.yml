 rival_humiliated_a_child_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] [TARGET_CHARACTER.LocalPlayerString( 'humilhou', 'humilhou' )] vilmente [CHARACTER.LocalPlayerString( 'você', CHARACTER.GetShortUIName )] na [CHARACTER.LocalPlayerString( 'sua', 'a' )] infância"
 friend_language_tutor: "[CHARACTER.GetShortUIName|U] [CHARACTER.LocalPlayerString( 'ofereceu', 'ofereceu' )] a [TARGET_CHARACTER.LocalPlayerString( 'você', TARGET_CHARACTER.GetShortUIName )] orientação pessoal para aprender o idioma da [CHARACTER.LocalPlayerString( 'sua ', 'a ' )]corte[CHARACTER.LocalPlayerString( '', 'Loc_ES_de_GetShortUIName' )]"
 friend_language_tutor_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] [TARGET_CHARACTER.LocalPlayerString( 'ofereceu', 'ofereceu' )] a [CHARACTER.LocalPlayerString( 'você', CHARACTER.GetShortUIName )] orientação pessoal para aprender a língua da corte de [TARGET_CHARACTER.LocalPlayerString( 'seu senhorio', TARGET_CHARACTER.GetShortUIName )]"
 erratic_behaviour: "Comportamento Errático"
 erratic_behaviour_desc: "Este personagem tem se irritado sua corte recentemente ao se comportar de maneira irracional e estranha."
 bird_cruelty: "Crueldade com Pássaros"
 bird_cruelty_desc: "Este personagem tem exagerado recentemente em relação aos pássaros. Mesmo um leve piar ou grasnar do lado de fora parece ser o suficiente para deixá-los furiosos."
 child_personality.keeps_eccentric_tt: "[child.GetFirstName] mantém o traço [GetTrait('eccentric').GetName( child.Self )|l]"
 friend_boardgames_on_horseback: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [CHARACTER.LocalPlayerString( 'pasasteis', 'pasaron' )] passaram o dia em companhia jogando jogos de tabuleiro a cavalo"
 close_tutelage: "Tutela Próxima"
