l_spanish:
 bp2_yearly.8070.t: "Hora de Brincar"
 bp2_yearly.8070.desc.intro: "Finalmente, estou sozinho para brincar, e é claro que pego meu"
 bp2_yearly.8070.desc.mid.horses: "cavalo de madeira confiável da minha caixa de brinquedos e sonho em cavalgar em um grande torneio."
 bp2_yearly.8070.desc.mid.puppets: "pequenos bonecos previsíveis da caixa de brinquedos e começo a brincar. Sempre é bom ter controle total sobre suas vidas pequenas e atuar em cenários com eles de acordo com meu design."
 bp2_yearly.8070.desc.mid.board_game: "tabuleiro favorito de [ROOT.Char.Custom('BG_GameType_Generic')] da minha caixa de brinquedos. Não há nada melhor do que provar minha inteligência e ver todas as peças se encaixarem, e não há melhor adversário do que eu mesmo."
 bp2_yearly.8070.desc.mid.teetotum: "teetotum complicado da caixa de brinquedos. Há algo tão satisfatório em vê-lo girar e girar, apostando onde ele pode cair."
 bp2_yearly.8070.desc.mid.marbles: "mármores maravilhosos da caixa de brinquedos. Realmente, nada reúne os amigos como um bom saco de mármores e um pouco de imaginação!"
 bp2_yearly.8070.desc.outro: "\n\nMas então, [other_child.GetFirstName|U] se aproxima de mim com expectativa e pergunta: 'Posso brincar?'"
 bp2_yearly.8070.a: "Prefiro brincar sozinho[ROOT.Char.Custom('ES_OA')]."
 bp2_yearly.8070.b: "Tudo é mais divertido com [Select_CString( other_child.IsFemale, 'uma amiga', 'um amigo' )]!"
 bp2_yearly.8070.b.success: "Vocês se divertem muito junt[GetPlayer.Custom('ES_OA')]s"
 bp2_yearly.8070.b.failure: "Vocês têm um tempo cheio de brigas"
 bp2_yearly.8071.t: "Um Favorito da Infância"
 bp2_yearly.8071.desc.intro: "Enquanto vasculho minhas coisas antigas em busca de algum assunto de estado, encontro algo familiar."
 bp2_yearly.8071.desc.mid.horses: "Um cavalinho de madeira repousa em um canto escondido do meu guarda-roupa, enterrado entre roupas. Sinto-o tão leve e pequeno em minhas mãos. Agora estas são as mãos de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan], para onde foi o tempo?\n\n"
 bp2_yearly.8071.desc.mid.puppets: "Uma pequena coleção de bonecos empoeirados fica inativa no fundo de um baú antigo. Suas cores estão desbotadas, e suas roupas rasgadas de anos de uso amoroso, e muitos mais de negligência.\n\n"
 bp2_yearly.8071.desc.mid.board_games: "Meu primeiro tabuleiro de [ROOT.Char.Custom('BG_GameType_Generic')|l] está no fundo de um baú antigo, faltando pelo menos metade das suas peças e muito danificado. Cada lasca e rachadura é uma história da minha juventude que eu achava que havia esquecido.\n\n"
 bp2_yearly.8071.desc.mid.spinning_top: "Um pequeno teetotum fica entre as cartas de estado. Houve um tempo em que nada importava mais para mim do que esse pequeno pião, agora ele é pouco mais do que um peso de papel. Como pude deixar isso acontecer?\n\n"
 bp2_yearly.8071.desc.mid.marbles: "Encontro um pequeno saco de couro com mármores cobertos de poeira escondido entre meus outros pertences negligenciados. Muitos dos mármores estão danificados ou faltando, mas aqueles que permanecem são mais preciosos para mim do que ouro.\n\n"
 bp2_yearly.8071.desc.mid.other_child_alive: "Lembro-me de passar muitas tardes de verão brincando com [other_child.GetFirstName], e nada mais parecia importar. Eu me pergunto o que deve ter sido de [other_child.GetSheHe], ou se ao menos se lembra das brincadeiras que compartilhamos.\n\n"
 bp2_yearly.8071.desc.mid.other_child_dead: "Lembro-me de que minha infância era cheia de risos de [other_child.GetFirstName] enquanto brincávamos juntos. É uma risada que nunca vou esquecer, ou ouvir novamente.\n\n"
 bp2_yearly.8071.desc.outro: "Com meu brinquedo favorito agora em minhas mãos, parece que estou segurando minha própria infância."
 bp2_yearly.8071.a.puppet: "Eu poderia voltar a ser o marionetista[ROOT.Char.Custom('ES_OA')]!"
 bp2_yearly.8071.a.gambler: "Eu sempre soube quando apostar minhas fichas."
 bp2_yearly.8071.a.marbles: "Devo reunir as pessoas, assim como meus mármores faziam."
 bp2_yearly.8071.a: "Devo viver meus sonhos de infância."
 bp2_yearly.8071.b: "Vamos ver o que [other_child.GetFirstNameNoTooltip] está fazendo!"
 bp2_yearly.8071.c: "Sou uma pessoa diferente agora, e está tudo bem."
 bp2_yearly.8080.t: "Charme infantil"
 bp2_yearly.8080.desc: "Por mais que eu tente, as afeições de [target.Custom2('MyCharacterIntroduction', ROOT.Char)] ainda me escapam, mas posso sentir que estou prestes a alcançar algo grandioso. Com meu tutelamento sobre [ward.Custom2('MyCharacterIntroduction', ROOT.Char)], talvez eu seja capaz de ter sucesso em minha conquista ainda!\n\nUm empurrãozinho, e talvez [ward.GetFirstNameNoTooltip] cante minhas virtudes, e prove que tenho jeito com crianças que qualquer [target.GetWomanMan] acharia irresistível."
 bp2_yearly.8080.a: "Vamos fazer isso!"
 bp2_yearly.8080.a.likes.tt: "[ward.GetFirstNameNoTooltip] fala bem de você"
 bp2_yearly.8080.a.dislikes.tt: "[ward.GetFirstNameNoTooltip] fala mal de você"
 bp2_yearly.8080.b: "Não vou recorrer a isso."
 bp2_yearly.8081.t: "Cantando Minhas Virtudes"
 bp2_yearly.8081.desc: "Envio [ward.GetFirstName] até o objeto do meu afeto, e em pouco tempo, [target.GetFirstName] já está olhando para mim com um sorriso no rosto enquanto conversa com minha jovem pupila[ward.Custom('ES_OA')]."
 bp2_yearly.8081.a: "Que criança maravilhos[ward.Custom('ES_OA')] mais maravilhos[ward.Custom('ES_OA')]."
 bp2_yearly.8082.t: "Desprezado"
 bp2_yearly.8082.desc: "Envio a [ward.GetFirstName] até o alvo do meu afeto, com nada além das melhores expectativas em mente. Mas, não demora muito, [target.GetFirstName] me lança olhares de soslaio e ri sem parar cada vez que [ward.GetFirstNameNoTooltip] abre a boca.\n\nNão consigo ouvir muito, mas ouço as palavras "[ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('ward'))|U]", "[ROOT.Char.Custom2('InsultNoun', SCOPE.sC('ward'))|l]" e fedorento sendo repetidas com frequência."
 bp2_yearly.8082.a: "Maldito seja, crianç[ward.Custom('ES_OA')]!"
 bp2_yearly.8082.b: "Fedido? Devo intervir!"
 bp2_yearly.8090.t: "Brinquedos Familiares"
 bp2_yearly.8090.desc: "[monk.Custom2('MyCharacterIntroduction', ROOT.Char)] me conduz a uma sala levemente iluminada. Ele me apresenta uma coleção de brinquedos velhos, todos lascados e gastos pelo tempo.\n\n"Há muito tempo suspeito que sois o espírito reencarnado de [ancestor.GetName] e agora que tens [ROOT.Char.GetAge], é hora de eu pôr a teoria à prova. Diante de vós há cinco objetos, e apenas um deles pertenceu a [ancestor.Custom('ES_AlAla')] [ancestor.GetFirstNameNoTooltip|l]. Vós vos lembrais [ancestor.Custom('ES_DelDela')] [ancestor.GetWomanMan] que fostes? Qual destes objetos é vosso?"."
 bp2_yearly.8090.a: "O cavalo."
 bp2_yearly.8090.b: "Os bonecos."
 bp2_yearly.8090.c: "O tabuleiro de [ROOT.Char.Custom('BG_GameType_Generic')|l]."
 bp2_yearly.8090.d: "O pião."
 bp2_yearly.8090.e: "Os mármores."
 bp2_yearly.8090.f: "Nenhum deles."
 ancestor_horse_guess_tt: "Você sente que seu ancestral gostava do cavalo..."
 ancestor_puppet_guess_tt: "Você sente que seu ancestral gostava dos bonecos..."
 ancestor_board_games_guess_tt: "Você sente que seu ancestral gostava de [ROOT.Char.Custom('BG_GameType_Generic')|l]..."
 ancestor_spinning_tops_guess_tt: "Você sente que seu ancestral gostava de piões..."
 ancestor_marbles_guess_tt: "Você sente que seu ancestral gostava dos mármores..."
 ancestor_nothing_guess_tt: "Você sente que seu ancestral não gostava de nenhum desses itens..."
 bp2_yearly.8091.t: "Não Reencarnado!"
 bp2_yearly.8091.desc: "Quando dou minha resposta, vejo os olhos de [monk.GetName] se arregalarem de surpresa. Ele cai de joelhos em reverência a mim.\n\n"Que criança[ROOT.Char.Custom('ES_OA')] mais brilhante! Não me restam dúvidas, você só pode ser [ancestor.GetName] renascid[ancestor.Custom('ES_OA')]!""
 bp2_yearly.8091.a: "Uau! Quem é[ancestor.Custom('ES_EA')] essa pessoa?"
 bp2_yearly.8091.a.knew_them: "Sou meu própr[ROOT.Char.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort',ancestor)]."
 bp2_yearly.8092.t: "Não Mais Reencarnado"
 bp2_yearly.8092.desc: "Dou minha resposta e [monk.GetName] cai de joelhos, cabisbaix[monk.Custom('ES_OA')] .\n\n“Ah, minha imaginação deve ter me pregado uma peça. Aquele objeto não pertencia [ancestor.Custom('ES_AlAla')] grande [ancestor.GetName] e minha busca por sua alma continua.”"
 bp2_yearly.8092.a: "Posso tentar de novo?"
 bp2_yearly.8100.t: "Rolando"
 bp2_yearly.8100.desc: "Estou brincando nos jardins de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] com as outras crianças, em um raro momento livre dos olhos vigilantes de nossos guardiões e tutores.\n\nTudo acontece de repente: sou arrastad[GetPlayer.Custom('ES_OA')] e me vejo descendo uma colina íngreme com [potential_crush.GetFirstName], que me segura com força enquanto rolamos colina abaixo. Lá embaixo, fico atordoado, com seus olhos fixos profundamente nos meus enquanto sorri e ri nervosamente para mim.\n\nSinto algo estranho no peito enquanto olho para [potential_crush.GetHerHim]. Que sentimento é este?"
 bp2_yearly.8100.a: "Amor!"
 bp2_yearly.8100.b: "Ódio!"
 bp2_yearly.8100.c: "Indigestão!"
 bp2_yearly.8110.t: "Corteses Cortesãos"
 bp2_yearly.8110.desc: "Ter um filho crescendo em meu ventre é algo maravilhoso e sagrado, mas não há dúvida de que isso tem feito as atividades cotidianas testarem minha paciência. Felizmente, à medida que minha gravidez avança, não me faltam pessoas dispostas a me apoiar.\n\n[caretaker_1.Custom2('MyCharacterIntroduction', ROOT.Char)|U] está sempre presente para demonstrar sua devoção a [caretaker_1.GetFaith.HighGodName|U] e a mim a cada capricho. [caretaker_2.Custom2('MyCharacterIntroduction', ROOT.Char)|U] também parece estar tentando conquistar meu afeto, aliviando o estresse da vida diária. [caretaker_3.Custom2('MyCharacterIntroduction', ROOT.Char)|U], sempre leal, conseguiu antecipar todas as minhas necessidades sem que eu precisasse dizer uma palavra."
 bp2_yearly.8110.a: "\"Muito obrigado a todos.\""
 bp2_yearly.8110.b: "Sei que posso sempre contar com [caretaker_1.GetFirstNameNoTooltip]."
 bp2_yearly.8110.c: "[caretaker_2.GetFirstNameNoTooltip] ganhou minha afeição."
 bp2_yearly.8110.d: "[caretaker_3.GetFirstNameNoTooltip] sabe exatamente do que preciso."
 bp2_yearly.8120.t: "O Peso da Gravidez"
 bp2_yearly.8120.desc: "Agora, [spouse.Custom2('MyCharacterIntroduction', ROOT.Char)] está grávida e até a tarefa mais simples parece um verdadeiro fardo para [spouse.GetSheHe]. Permaneço deitado na cama e observo como [spouse.GetFirstNameNoTooltip] luta para se despir, mesmo com a ajuda dos servos.\n\nSe vira para mim, com um olhar saudoso, mas cansado, como se me pedisse ajuda."
 bp2_yearly.8120.a: "Farei tudo por você."
 bp2_yearly.8120.b: "Não é para isso que existem servos?"
 bp2_yearly.8120.c: "Tenho certeza de que sei como aliviar um pouco o estresse."
