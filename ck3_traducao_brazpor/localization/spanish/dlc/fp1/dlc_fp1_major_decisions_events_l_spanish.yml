l_spanish:
 #Securing the High Kingdom of the North Sea
 fp1_major_decisions.0001.t: "O Alto [founder.Custom('GetQueenKing')] do Norte"
 fp1_major_decisions.0001.desc: "Hace tiempo que ambiciono unir los grandes reinos del Mar del Norte bajo una corona única y permanente. He trabajado duro durante años, ganándome reconocimiento como un[ROOT.Char.Custom('ES_XA')] gran gobernante de mis reinos, uno a uno, y hoy hago realidad mi sueño.\n\nTras sacar juramentos cuidadosamente redactados de lealtad constante, de mis principales vasallos, sajones, noruegos y daneses por igual han reconocido mi título de gran [founder.Custom('GetQueenKing')], soberan[ROOT.Char.Custom('ES_OA')] indiscutible del Mar del Norte.\n\nTal vez mis descendientes seguirán gobernando sobre los reinos unidos. Tal vez no. Afortunadamente, ya no importa.\n\n¡Lleve quien lleve las coronas menores, #EMP todos#! se inclinarán ante [founder.GetTitleAsNameNoTooltip] [founder.GetHouse.GetBaseNameNoTooltip]!"
 fp1_major_decisions.0001.a: "Um reino duradouro e poderoso!"
 fp1_major_decisions.0002.t: "$fp1_major_decisions.0001.t$"
 fp1_major_decisions.0002.desc: "Há muitos anos, meu [founder.Custom('ES_SennorSennora')] , [founder.Custom('ES_ElLa')] [founder.Custom('GetQueenKing')] [founder.GetFirstName], deixou claro que deseja que seu reino [founder.GetHerHim] sobreviva.\n\nEmbora nossos reinos estejam ligados por laços de parentesco e conflito, a enorme distância e as diferenças entre eles faziam com que esse objetivo parecesse inalcançável.\n\nHoje, essas dúvidas se mostraram infundadas, quando [founder.GetFirstNameNoTooltip] distribui anos de juramentos escritos de lealdade mútua e vinculante entre todos os vassalos do reino.\n\nNasceu o $title_high_kingdom$ do $e_north_sea$!"
 fp1_major_decisions.0002.a: "Salve [founder.Custom('ES_AlAla')] [founder.GetTitleAsNameNoTooltip]!"
 fp1_major_decisions.0002.b: "Um[founder.Custom('ES_XA')] fals[founder.Custom('ES_OA')] [founder.Custom('GetQueenKing')], quatro vezes."
 fp1_major_decisions.0003.t: "$fp1_major_decisions.0001.t$"
 fp1_major_decisions.0003.desc: "Há muito tempo é uma ambição aberta de [founder.GetFirstName], [founder.Custom('GetQueenKing')] de $k_norway$, $k_england$ e $k_denmark$, conseguir que seu reino não se partisse com sua morte.\n\nHoje, após muitos anos de governo e negociações tensas, ela finalmente conseguiu o que queria.\n\nOs vassalos dos três reinos concordaram que, não importa quem se sente em cada trono, todos se curvarão perante o/a[founder.GetTitleAsNameNoTooltip]."
 fp1_major_decisions.0003.a: "Um reino para todos os [ROOT.GetCharacter.GetFaith.GetAdherentNamePluralNoTooltip] bons!"
 fp1_major_decisions.0003.b: "Proteja-nos, oh [ROOT.GetCharacter.GetFaith.HighGodName], da ira de [founder.GetFirstNameNoTooltip]!"
 fp1_major_decisions.0003.c: "Não é nada além de um[founder.Custom('ES_XA')] bárbar[founder.Custom('ES_OA')] pretensioso!"
 #Founding the Capital of the Rus'
 fp1_major_decisions.0011.t: "Uma Capital para toda a Rus'"
 fp1_major_decisions.0011.desc: "Del $river_volga$ al $river_dnieper$ y más allá, los varegos recorren los ríos y caminos de las tierras de los $east_slavic_group_collective_noun$. Asaltamos, conquistamos, nos mezclamos con los locales. Fundamos nuevos asentamiento cuando sentimos la necesidad, o los tomamos a la fuerza.\n\nHasta hoy, estos núcleos habían competido para atraer aventureros y caudillos que buscaban conseguir la primacía sobre el resto de los rus.\n\n¡Sea acabó! ¡Gracias a mis poderosas acciones y feroz reputación, atraeré a nórdicos y eslavos por igual para construir una capital digna de [founder.GetPrimaryTitle.GetNameNoTier]!"
 fp1_major_decisions.0011.a: "$c_kiev$ será uma boa capital!"
 fp1_major_decisions.0011.b: "[new_rus_capital.GetNameNoTierNoTooltip] é verdadeiramente a origem da nossa grandeza!"
 fp1_major_decisions.0012.t: "$fp1_major_decisions.0011.t$"
 fp1_major_decisions.0012.desc: "Usando o poder de seu nome e reputação, meu [founder.GetLadyLord] , [founder.GetTitledFirstName|l] , começou a estabelecer uma grande capital em [new_rus_capital.GetNameNoTier]. [founder.GetTitledFirstName|l] espera que, um dia, este assentamento seja o centro de todas as terras da Rus."
 fp1_major_decisions.0012.a: "Uma capital digna!"
 fp1_major_decisions.0012.b: "Bah, nada mais do que um covil de escória e vilania."
 fp1_major_decisions.0013.t: "$fp1_major_decisions.0011.t$"
 fp1_major_decisions.0013.desc: "Usando a força de seu nome e reputação, [founder.GetTitledFirstName|l], um[founder.Custom('ES_XA')] líder[founder.Custom('ES_EA')] guerreiro[founder.Custom('ES_OA')] bárbaro[founder.Custom('ES_OA')], exigiu a lealdade de todos os varegues errantes e eslavos sedentos de sangue.\n\nNeste exato momento, aventureiros, piratas, saqueadores e ladrões se aglomeram sob sua bandeira, inflando drasticamente a população de [new_rus_capital.GetNameNoTier]."
 fp1_major_decisions.0013.a: "Essa [new_rus_capital.GetNameNoTierNoTooltip] parece... próspera..."
 fp1_major_decisions.0013.b: "Eles ainda são apenas estrangeiros atrasados."
 fp1_major_decisions.0013.c: "Eu realmente não vejo como isso me diz respeito?"
 #Elevating the Kingdom of Mann & the Isles
 fp1_major_decisions.0021.t: "Um Reino de Piratas"
 fp1_major_decisions.0021.desc: "Desde hace años he surcado las aguas de todo el mundo, saqueando, rapiñando y arrasando. He robado más oro que el que verán la mayoría de los reyes y se maldice mi nombre del mar de Irlanda a Catay.\n\nSoy, sin ninguna duda, el/la[founder.GetWomanMan] más vil que existe y he volcado mis botines y reputación en el fuerte asentamiento y fortificación de $c_isle_of_man$.\n\nLa gente me condena por ser el/lapirata más malvad[founder.Custom('ES_OA')] que jamás hayan conocido.\n\nPero me #EMP conocen#!."
 fp1_major_decisions.0021.a: "Sou o/a[founder.GetLadyLord] de sangue e ouro!"
 fp1_major_decisions.0021.b: "Finalmente, meu sonho é alcançado..."
 fp1_major_decisions.0022.t: "$fp1_major_decisions.0021.t$"
 fp1_major_decisions.0022.desc: "Desde hace años ha sido un secreto a voces que [founder.GetFirstName] se negó a aceptar o tomar corona alguna, salvo una: [founder.GetPrimaryTitle.GetNameNoTier].\n\nLlevaba tanto tiempo en su punto de mira, que se diría que dedicó su vida a legitimar el poder y la autoridad de la isla que era su hogar.\n\nTras innumerables asaltos, guerras y matanzas en general, al final tuvo éxito.\n\nSe supone que cada joya de su nueva corona fue tomada en una incursión distinta. Algunos en la corte susurran que todavía le quedan huecos por llenar."
 fp1_major_decisions.0022.a: "Pense em todo o ouro que vamos ganhar!"
 fp1_major_decisions.0022.b: "Um[founder.Custom('ES_XA')] #EMP [founder.GetTitleAsNameNoTooltip]#!? É pior do que um barão ladrão!"
 fp1_major_decisions.0023.t: "$fp1_major_decisions.0021.t$"
 fp1_major_decisions.0023.desc: "Até o mais reles camponês das Ilhas Britânicas já ouviu falar do monstruoso [founder.Custom('ES_DelDela')] monstruos[founder.Custom('ES_OA')], flagelo dos mares e de sua busca de uma vida inteira por reconhecimento para seu reino de piratas saqueadores.\n\nÉ uma lenda que infunde medo tanto em lordes quanto em servos, mas parece que, ultimamente, a linha entre mito e história ficou turva.\n\nHoje, #EMP [founder.GetTitleAsNameNoTooltip]#! [founder.GetFirstNameNoTooltip] anunciou que a obra de sua vida foi concluída.\n\nA Britânia conta com um novo reino em suas costas, e é terrível de se contemplar."
 fp1_major_decisions.0023.a: "Mas não vai nos saquear a #EMP nosotros#! né?"
 fp1_major_decisions.0023.b: "Não mais do que um [founder.GetTitleAsNameNoTooltip] dos Ladrões!"
 #Forging the Jomsvikings
 fp1_major_decisions.0031.t: "Forjar os Jomsvikings"
 fp1_major_decisions.0031.desc: "¡Con mi poder y prestigio, he reunido una banda con los más despiadados y fanáticos [founder.GetFaith.GetAdherentNamePlural] de toda Escandinavia y los he templado en una hermandad militar!\n\nA través de las aguas, en tierras de eslavos y bálticos, estos jomsvikingos prosperarán. Asaltar y enfrentarse a los lugareños los volverá feroces y hará que solo los busquen los fieles más dignos.\n\nA cambio, recompensarán el honor con guerreros y botín, castigarán a los cobardes, conversos y reformistas.\n\nLa fe [founder.GetFaith.GetAdjective] perdurará desde el día de hoy hasta el Ragnarok."
 fp1_major_decisions.0031.a.cynical: "Contanto que eles lutem em minhas guerras..."
 fp1_major_decisions.0031.a.fallback: "Os Velhos Caminhos são os melhores caminhos!"
 fp1_major_decisions.0032.t: "$fp1_major_decisions.0031.t$"
 fp1_major_decisions.0032.desc: "Em um esforço para deter a onda de conversões abraâmicas e as alarmantes noções reformistas de alguns dos jarls mais cínicos, [founder.Custom2('MyCharacterIntroduction',ROOT.Char)] reuniu um grupo de zelosos [founder.GetFaith.GetAdherentNamePlural] em uma irmandade guerreira formal, com a intenção de defender os Velhos Caminhos.\n\nAlojados na poderosa fortaleza de $b_jomsberg$, estes exemplares da virtude [founder.GetFaith.GetAdjectiveNoTooltip] pretendem navegar pelo Báltico, recompensando a piedade e punindo a desonra e a covardia."
 fp1_major_decisions.0032.a: "Glória e sangue para [founder.GetFaith.HighGodName]!"
 fp1_major_decisions.0032.b: "Então, eles são piratas?"
 fp1_major_decisions.0033.t: "$fp1_major_decisions.0031.t$"
 fp1_major_decisions.0033.desc.autofounded: "[founder.GetTitledFirstName], um[founder.Custom('ES_XA')] aventureiro[founder.Custom('ES_OA')] nórdico[founder.Custom('ES_OA')] e empreendedor[founder.Custom('ES_XA')], lançou uma invasão feroz contra [victim.GetTitledFirstName|l], tomando as terras de [coup_target.GetNameNoTier] em um ataque surpresa.\n\nO que torna isso incomum é que a invasão parece ter uma motivação religiosa: [founder.GetFirstNameNoTooltip] se aliou a um[leader.Custom('ES_XA')] fanático[leader.Custom('ES_OA')] da fé [founder.GetFaith.GetAdjective] chamado [leader.GetFirstNameNoTooltip] para formar uma irmandade guerreira que chamam de jomsvikings."
 fp1_major_decisions.0033.desc.decision_founded: "Após anos de campanha, [founder.GetTitledFirstName|l], um[founder.Custom('ES_XA')] fanátic[founder.Custom('ES_OA')] da fé [founder.GetFaith.GetAdjective] , reuniu seguidores suficientes para tornar seu sonho realidade: na fortaleza recém-criada de $b_jomsberg$ , fundou uma irmandade guerreira para defender sua fé.\n\nOs jomsvikings nasceram."
 fp1_major_decisions.0033.desc.outro: "\n\nO grupo afirma que fará cumprir as Tradições Antigas, atacando abraâmicos, reformistas e pagãos rivais, saqueando uma trilha sangrenta pelas águas do Báltico."
 fp1_major_decisions.0033.a: "Todos conhecerão a ira de [founder.GetFaith.HighGodNamePossessive]!"
 fp1_founder_founded_the_jomsviking_tt: "Foi fundada uma [holy_order|E] da [faith|lE] de [founder.GetTitledFirstNameNoTooltip|l]\n $EFFECT_LIST_BULLET$[founder.GetFirstNameNoTooltip] torna-se o/a[holy_order_patron|E] da ordem""
 fp1_major_decisions.0033.b.competition: "Humpf, competição, você diz?"
 fp1_major_decisions.0033.b.heathens: "#EMP *Ains*#! … Mais saqueadores pagãos?"
 #Canute-'em-Up
 fp1_major_decisions.1001.t: "[ROOT.Char.GetTitleAsNameNoTooltip] do Mar do Norte"
 fp1_major_decisions.1001.desc.dumb: "Vivo una vida bastante cómoda. Como [ROOT.Char.GetTitleAsNameNoTooltip], todos saben que soy sabi[ROOT.Char.Custom('ES_OA')], benevolente e inconmensurablemente #EMP poderos[ROOT.Char.Custom('ES_OA')]l#!, pues el mundo entero considera que soy [ROOT.Char.Custom('GetDaughterSon')] favorit[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetFaith.HighGodNamePossessive].\n\nTodos mis cortesanos coinciden y me lo dicen frecuentemente, en especial [sycophant.Custom2('MyCharacterIntroduction',ROOT.Char)].\n\nCaramba, [sycophant.GetFirstNameNoTooltip] hasta afirma que la misma marea obedecería mis órdenes y retrocedería ante un simple susurro mío…"
 fp1_major_decisions.1001.desc.smart: "Como [ROOT.Char.GetTitleAsNameNoTooltip], me encuentro verdaderamente #EMP rodead[ROOT.Char.Custom('ES_OA')]#! de gente que hace lo imposible para decirme lo grande y poderos[ROOT.Char.Custom('ES_OA')] que soy.\n\nNormalmente los aparto; tal adulación es de esperar en los desesperados cuando se ven ante mí.\n\nSin embargo, hoy ha llegado a un nivel #EMP intolerable#!. [sycophant.Custom2('MyCharacterIntroduction',ROOT.Char)] creyó apropiado interrumpir mi desayuno para decirme que cree que la misma marea retrocedería ante una mera orden mía.\n\nPese a la nauseabunda y obvia falsedad de todo ello, esto me da una idea…"
 fp1_major_decisions.1001.a: "Para a praia!"
 fp1_major_decisions.1001.a.tt: "Você e sua corte fazem uma viagem à beira-mar..."
 fp1_major_decisions.1001.b: "Até mesmo palavras doces são apenas palavras."
 fp1_major_decisions.1002.t: "$fp1_major_decisions.1001.t$"
 fp1_major_decisions.1002.desc.dumb: "Pasamos toda la tarde a la orilla del mar, con mi corte temblando por el frío y los glaciales vientos del norte.\n\nMinuto a minuto, hora a hora, clamo al océano: ¡no pasarás! ¡Soy tu [ROOT.Char.GetTitleAsNameNoTooltip], y no me rebajaré a que alguien como tú me moje!\n\nRebeldes, las aguas se acercan cada vez más, hasta que empiezan a lamerme los pies. Mis seguidores parecen incómodos, se niegan a mirarme a los ojos, presuntamente #EMP avergonzados#! de ser testigos de un momento de absoluta #EMP debilidad#! de su gobernante."
 fp1_major_decisions.1002.desc.smart: "Con poco más que hacer hoy, obligo a #EMP toda#! mi corte a pasar la tarde junto al mar, mirándome, sentad[ROOT.Char.Custom('ES_OA')] en mi trono con mis ropajes de coronación, gritando al mar que cese en su avance hacia el interior.\n\nNi que decir tiene, las aguas no me escuchan.\n\nAl cabo de cinco minutos, mis seguidores entienden la intención.\n\nA las cinco horas, cuando las olas finalmente lamen mis pies, comprenden mi determinación.\n\nSoy [ROOT.Char.GetTitleAsNameNoTooltip] y nadie me tomará por idiota."
 fp1_major_decisions.1002.a: "Não sou mais que um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] e conheço meus limites. Você também deveria."
 fp1_major_decisions.1002.b: "Vede qu?o #EMP in?til#! ? o poder [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.Custom('GetQueenKing')] comparado ao de [ROOT.Char.GetFaith.HighGodName]!"
 fp1_major_decisions.1002.c: "#EMP FUJA!#! O Mar se alinhou com [ROOT.Char.GetFaith.DevilName]!"
 fp1_major_decisions.1002.d: "Miserável marujo de um oceano! Me passe aquele chicote!"
 fp1_major_decisions.1002.d.tt: "Você chicoteia a água para submissão"
 fp1_major_decisions.1002.e: "Talvez ainda haja mais para eu dominar além de apenas reinar…"
 #The True King of Norway
 fp1_major_decisions.1011.t: "Um Rei para $k_norway$"
 fp1_major_decisions.1011.desc.intro: "Há muitos anos, eu fiz uma promessa de nunca cortar meu cabelo, não até que obtivesse o título elevado de Rei da $k_norway$."
 fp1_major_decisions.1011.desc.gyda: "Pelo amor de [gyda.GetTitledFirstName|l],"
 fp1_major_decisions.1011.desc.oath: "Pela glória da minha casa e pelo legado dos meus filhos,"
 fp1_major_decisions.1011.desc.outro: "conquistaría cien reinos.\n\nAhora la tarea está cumplida, y ya no tengo la obligación de llevar el cabello así de largo y desgreñado.\n\nLa pregunta que queda es qué hacer con mis mechones."
 fp1_major_decisions.1011.a: "Minha promessa cumprida!"
 fp1_major_decisions.1011.b: "[gyda.GetFirstNameNoTooltip] e eu finalmente podemos ficar juntos!"
 fp1_major_decisions.1011.c: "Meu cabelo fica; é uma marca de todas as lutas que conheci."
 fp1_major_decisions.1011.c.tt: "Você continuará a ser conhecido como $nick_tanglehair$"
 fp1_major_decisions.1012.t: "[king_of_norway.GetTitledFirstNameNoTooltip|l] reivindicou $k_norway$ primeiro"
