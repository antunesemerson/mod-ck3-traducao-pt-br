l_spanish:
 #Holding a grand sacrifice.
 fp1_other_decisions.0001.t: "O Grande [blotter.Custom('GruesomeFestivalName')]"
 fp1_other_decisions.0001.desc: "Embora sejam realizados [blotter.Custom('GruesomeFestivalNamePlural')] festivais menores várias vezes ao longo do ano, uma vez por década os [gf_faith.GetAdherentNamePlural] de [blotter.GetPrimaryTitle.GetNameNoTierNoTooltip] se reúnem para uma grande celebração e, o mais importante, um grandioso #EMP sacrificio#!.\n\nEmbora muito sangue seja derramado para [gf_faith.PantheonTerm], a carne das ofertas vai para os fiéis. Um banquete tão farto costuma resultar em uma festa incrível.\n\nÉ claro que uma ocasião dessas é cara e, certamente, não é necessário convidar #EMP todos#! todos os [gf_faith.GetAdherentNamePluralNoTooltip]…"
 fp1_other_decisions.0001.a.capital: "Talvez apenas o povo de [capital_county.GetNameNoTierNoTooltip] e a corte?"
 fp1_other_decisions.0001.a.other: "A gente de [fallback_location.GetName] mantém a fé bem o suficiente para nos receber."
 fp1_other_decisions.0001.b: "Todos os homens e mulheres livres de meu domínio devem vir!"
 fp1_other_decisions.0001.c: "Todo nobre e plebeu de [blotter.GetPrimaryTitle.GetTierAsNameNoTooltip]!"
 fp1_other_decisions.0001.d: "Pensando melhor, isso é muito caro..."
 ## ^Technically, the two loc keys above should use gf_faith, but we permit blotter to think of the event through their personal world-view.
 fp1_other_decisions.0001.prep_start.tt: "As preparações para o [blotter.Custom('GruesomeFestivalName')] começam..."
 fp1_other_decisions.0001.prep_continue.tt: "As preparações para o [blotter.Custom('GruesomeFestivalName')] continuam..."
 fp1_other_decisions.0002.t: "$fp1_other_decisions.0001.t$"
 fp1_other_decisions.0002.desc.intro: "Um [blotter.Custom('GruesomeFestivalName')] pode ser um grande ou pequeno acontecimento.\n\nSegundo a tradição, também inclui sacrifícios humanos e animais. Vários prisioneiros serão oferecidos a [gf_faith.PantheonTerm], talvez até incluindo uma escolha especial minha. Suas vidas serão dadas em tributo a [gf_faith.PantheonTerm].\n\nEmbora as crenças do [gf_faith.GetNameNoTooltip|l] assim o exijam,"
 fp1_other_decisions.0002.desc.vassals_dislike_humsac: "há aqueles entre meus vassalos que acham a ideia bárbara,"
 fp1_other_decisions.0002.desc.counties_dislike_humsac: "há plebeus em meu reino que acham a ideia repugnante,"
 fp1_other_decisions.0002.desc.courtiers_dislike_humsac: "há alguns na corte que estão repugnados com a ideia,"
 fp1_other_decisions.0002.desc.fallback: "não é estritamente necessário,"
 fp1_other_decisions.0002.desc.outro: "e a cerimônia pode prosseguir com sacrifícios puramente animais se eu quiser evitar controvérsias."
 fp1_other_decisions.0002.a: "Uma boa variedade de sacrifícios animais será suficiente."
 fp1_other_decisions.0002.animals_only.regular.opinion: "[opinion|lE] e [county_opinion|lE] ganham com [gf_faith.GetAdherentNamePlural] serão menores do que com o sacrifício humano"
 fp1_other_decisions.0002.animals_only.appeased_humsac_haters: "Súditos que não endossam o sacrifício humano não perderão [opinion|lE] ou [county_opinion|lE]"
 fp1_other_decisions.0002.animals_only.regular.piety: "Se ganará #positive_value [THIS.Var('piety_gain_standard_animal').GetValue|0]#! [piety_i] $fp1_other_decisions.0002.piety_gain.rump$"
 fp1_other_decisions.0002.animals_only.regular.piety.loss: "Se perderá #negative_value [THIS.Var('piety_gain_standard_animal').GetValue|0]#! [piety_i] $fp1_other_decisions.0002.piety_gain.rump$"
 fp1_other_decisions.0002.b: "Traga uma besta ou ave para cada comensal!"
 fp1_other_decisions.0002.animals_only.magnificent.opinion: "[opinion|lE] e [county_opinion|lE] ganham com [gf_faith.GetAdherentNamePlural] serão equivalentes ao sacrifício humano"
 fp1_other_decisions.0002.animals_only.magnificent.piety: "Se ganará #positive_value [THIS.Var('piety_gain_magnificent_animal').GetValue|0]#! [piety_i] $fp1_other_decisions.0002.piety_gain.rump$"
 fp1_other_decisions.0002.animals_only.magnificent.piety.loss: "Se perderá#negative_value [THIS.Var('piety_gain_magnificent_animal').GetValue|0]#! [piety_i] $fp1_other_decisions.0002.piety_gain.rump$"
 fp1_other_decisions.0002.c: "Tradição importa. [gf_faith.PantheonTerm|U] deve provar sangue humano."
 fp1_other_decisions.0002.human_sacrifice.regular.opinion: "[opinion|lE] e [county_opinion|lE] ganham com [gf_faith.GetAdherentNamePlural] serão equivalentes aos sacrifícios animais magníficos"
 fp1_other_decisions.0002.animals_only.offended_humsac_haters: "Súditos que não endossam o sacrifício humano perderão amplamente [opinion|lE] e [county_opinion|lE]"
 fp1_other_decisions.0002.human_sacrifice.regular.piety: "#positive_value [THIS.Var('piety_gain_standard_human').GetValue|0]#! [piety_i] será ganho $fp1_other_decisions.0002.piety_gain.rump$"
 fp1_other_decisions.0002.human_sacrifice.regular.piety.loss: "#negative_value [THIS.Var('piety_gain_standard_human').GetValue|0]#! [piety_i] será perdido $fp1_other_decisions.0002.piety_gain.rump$"
 fp1_other_decisions.0002.human_sacrifice.optional_victim_picker: "Opcionalmente, você pode [designate_chief_sacrifice_article|lE] entre seus [prisoners|lE]"
 fp1_other_decisions.0002.human_sacrifice.become_cannibal: "Você se tornará um [GetTrait('cannibal').GetName( GetNullCharacter )] no [blotter.Custom('GruesomeFestivalName')]"
 fp1_other_decisions.0002.d: "Somente os melhores sacrifícios servirão: humanos e animais igualmente…"
 fp1_other_decisions.0002.human_sacrifice.magnificent.opinion: "[opinion|lE] e [county_opinion|lE] ganharão com [gf_faith.GetAdherentNamePlural] tão alto quanto pode ser"
 fp1_other_decisions.0002.human_sacrifice.magnificent.piety: "#positive_value [THIS.Var('piety_gain_magnificent_human').GetValue|0]#! [piety_i] será ganho $fp1_other_decisions.0002.piety_gain.rump$"
 fp1_other_decisions.0002.human_sacrifice.magnificent.piety.loss: "#negative_value [THIS.Var('piety_gain_magnificent_human').GetValue|0]#! [piety_i] será perdido $fp1_other_decisions.0002.piety_gain.rump$"
 fp1_other_decisions.0002.blot_invalidation.tt: "Obrigada a cancelar o [blotter.Custom('GruesomeFestivalName')]"
 fp1_other_decisions.0002.blot_invalidation.costs_recouped.tt: "A maioria do meu [gold|lE] e todo o meu [prestige|lE] foi recuperado"
 fp1_other_decisions.0002.piety_gain.rump: "no [blotter.Custom('GruesomeFestivalName')]"
 fp1_other_decisions.0003.t: "$fp1_other_decisions.0001.t$"
 fp1_other_decisions.0003.desc.intro.small: "Embora o encontro seja pequeno, o clima no [blotter.Custom('GruesomeFestivalName')] é entusiasmado, com felizes [gf_faith.GetAdherentNamePlural] se empurrando e zombando enquanto"
 fp1_other_decisions.0003.desc.intro.medium: "A [gf_faith.HouseOfWorship] está cheia até transbordar com felizes [gf_faith.GetAdherentNamePlural], todos rugindo enquanto"
 fp1_other_decisions.0003.desc.intro.large: "Os convidados do [blotter.Custom('GruesomeFestivalName')] são tão numerosos que eles cobrem a área ao redor da [gf_faith.HouseOfWorship], emitindo um rugido cacofônico enquanto"
 fp1_other_decisions.0003.desc.animals.regular: "uma respeitável parada de animais sacrificiais é levada ao altar.\n\n"
 fp1_other_decisions.0003.desc.animals.magnificent: "uma poderosa coluna de animais sacrificiais é conduzida ao altar.\n\n"
 fp1_other_decisions.0003.desc.humans.regular.sans_chief: "um bando de prisioneiros aterrorizados são conduzidos em direção ao altar, animais seguindo atrás deles.\n\n"
 fp1_other_decisions.0003.desc.humans.magnificent.sans_chief: "um grupo de prisioneiros ameaçadores e magníficos animais são conduzidos ao altar.\n\n"
 fp1_other_decisions.0003.desc.humans.regular.plus_chief: "[sacrifice.GetFirstName] é arrastado até o altar, o primeiro de vários prisioneiros e mais animais.\n\n"
 fp1_other_decisions.0003.desc.humans.magnificent.plus_chief: "[sacrifice.GetFirstName] é puxado até o altar, o primeiro de uma longa fila de homens e animais que se estende para fora das portas.\n\n"
 fp1_other_decisions.0003.desc.sacrifice.named.norse_cannibals: "[sacrifice.GetSheHe|U] luta em vão enquanto é estrangulad[sacrifice.Custom('ES_OA')] até a morte e depois desangrad[sacrifice.Custom('ES_OA')]. $fp1_other_decisions.0003.desc.sacrifice.norse_cannibal_excarnation$. $fp1_other_decisions.0003.desc.sacrifice.norse_blood_bowl$."
 fp1_other_decisions.0003.desc.sacrifice.named.cannibals: "Primeiro, ele é atordoado à força, $fp1_other_decisions.0003.desc.sacrifice.generic_cannibal_slaughter$."
 fp1_other_decisions.0003.desc.sacrifice.named.norse: "[sacrifice.GetSheHe|U] $fp1_other_decisions.0003.desc.sacrifice.norse_throttling$. $fp1_other_decisions.0003.desc.sacrifice.norse_blood_bowl$."
 fp1_other_decisions.0003.desc.sacrifice.named.fallback: "[sacrifice.GetSheHe|U] luta admiravelmente, até que sua garganta é cortada.\n\n$fp1_other_decisions.0003.desc.sacrifice.generic_human_disemboweling$?"
 fp1_other_decisions.0003.desc.sacrifice.unnamed.norse_cannibals: "A primeira vítima luta em vão, e seu estrangulamento é rápido. $fp1_other_decisions.0003.desc.sacrifice.norse_cannibal_excarnation$. $fp1_other_decisions.0003.desc.sacrifice.norse_blood_bowl$."
 fp1_other_decisions.0003.desc.sacrifice.unnamed.cannibals: "O primeiro [blotter.Custom('SacrificeTerm')] é arrastado para o altar e atordoado à força, $fp1_other_decisions.0003.desc.sacrifice.generic_cannibal_slaughter$."
 fp1_other_decisions.0003.desc.sacrifice.unnamed.norse: "O primeiro [blotter.Custom('SacrificeTerm')] $fp1_other_decisions.0003.desc.sacrifice.norse_throttling$. $fp1_other_decisions.0003.desc.sacrifice.norse_blood_bowl$."
 fp1_other_decisions.0003.desc.sacrifice.unnamed.fallback: "O primeiro humano [blotter.Custom('SacrificeTerm')] continua lutando até que sua garganta seja cortada.\n\n$fp1_other_decisions.0003.desc.sacrifice.generic_human_disemboweling$?"
 fp1_other_decisions.0003.desc.sacrifice.animal.norse: "Um por um, [blotter.Custom('GruesomeFestivalAnimalPreference')] são trazidos, estrangulados e sangrados até a morte. A carne vai para as chamas, e depois para o banquete. $fp1_other_decisions.0003.desc.sacrifice.norse_blood_bowl$."
 fp1_other_decisions.0003.desc.sacrifice.animal.fallback: "Um por um, [blotter.Custom('GruesomeFestivalAnimalPreference')] são trazidos, suas gargantas cortadas rapidamente e seus corpos entregues aos cozinheiros e à multidão faminta."
 fp1_other_decisions.0003.desc.outro.faithful: "\n\nRealmente, um espetáculo digno do [gf_faith.PantheonTerm]."
 fp1_other_decisions.0003.desc.outro.political: "\n\nEu posso não compartilhar da fé, mas súditos felizes fazem um [blotter.GetTitleAsNameNoTooltip] feliz."
 fp1_other_decisions.0003.happy_characters_list: "Todo [character|lE] [gf_faith.GetAdherentNameNoTooltip] convidado"
 fp1_other_decisions.0003.happy_titles_list: "Todo [county|lE] [gf_faith.GetAdherentNameNoTooltip] convidado"
 fp1_other_decisions.0003.unhappy_characters_list: "Todos os [realm|lE] [character|lE] que não praticam o sacrifício humano"
 fp1_other_decisions.0003.unhappy_titles_list: "Todo [county|lE] do [realm|lE] onde não se pratique o sacrifício humano"
 fp1_other_decisions.0003.attendee_became_cannibal: "Você compareceu ao banquete canibal de [blotter.GetTitledFirstNameNoTooltip|l]"
 fp1_other_decisions.0003.a: "À [gf_faith.HighGodName]! À [gf_faith.FertilityGodName]! À [gf_faith.WealthGodName]!"
 fp1_other_decisions.0003.b: "Esta parece uma excelente oportunidade para impressionar a nobreza."
 fp1_other_decisions.0003.b.nobility_list: "Todo nobre [gf_faith.GetAdherentNameNoTooltip] convidado de [rank|lE] no mínimo [count|lE]"
 fp1_other_decisions.0003.b.clergy_list: "Todo clérigo [gf_faith.GetAdherentNameNoTooltip] convidado de [rank|lE] no mínimo [count|lE] e seu [GetPlayer.GetCouncillorPosition( 'councillor_court_chaplain' ).GetPositionName]"
 fp1_other_decisions.0003.c: "Hora de se misturar com a ralé comum!"
 fp1_other_decisions.0003.d: "Me marcharé pronto, he hecho #EMP bastante#! ya."
 fp1_other_decisions.0003.e: "Para [gf_faith.HighGodName]! Estou pronunciando isso corretamente?"
 fp1_other_decisions.0003.f: "Esses [gf_faith.GetAdherentNamePluralNoTooltip] certamente têm uma fé convidativa..."
 fp1_other_decisions.0004.t: "$fp1_other_decisions.0001.t$"
 fp1_other_decisions.0004.desc: "En mis tierras, hay quienes creen en realizar grandes sacrificios para sus dioses ficticios. Mi propia e ilustrada fe [blotter.GetFaith.GetAdjective] no aprueba tal carnicería y, sin embargo, una característica curiosa de muchos de esos [blotter.Custom('GruesomeFestivalNamePlural')] es que dependen de la participación activa del [blotter.GetTitleAsNameNoTooltip].\n\nNo necesito convertirme a sus creencias para gestionar sus costumbres, pero sin duda ganaría muchos amigos entre mis súbditos menos ilustrados, tanto campesinos como nobles, si aceptase albergar un gran [blotter.Custom('GruesomeFestivalName')] por su fe."
 fp1_other_decisions.0004.a: "Os [option_1.GetAdherentNamePlural] podem valer a pena apaziguar..."
 fp1_other_decisions.0004.b: "Ent?o os [option_2.GetAdherentNamePlural] de fato me #EMP apoiariam#!?"
 fp1_other_decisions.0004.c: "Os festivais [option_3.GetAdjective] têm um certo fascínio."
 fp1_other_decisions.0004.d: "Isto seria, na melhor das hip?teses, uma heresia #EMP completa#!!"
 #Copy-paste labels.
 fp1_other_decisions.0003.desc.sacrifice.norse_blood_bowl: "Todo o sangue é coletado em uma tigela e os [gf_faith.PriestNeuterPlural] usam para pintar as paredes do [gf_faith.HouseOfWorship], por dentro e por fora."
 fp1_other_decisions.0003.desc.sacrifice.norse_cannibal_excarnation: "A carne comestível é cortada para o banquete, enquanto os restos vão para a árvore enforcada do lado de fora, e o próximo [blotter.Custom('SacrificeTerm')] é lançado para fora."
 fp1_other_decisions.0003.desc.sacrifice.norse_throttling: "se agita com ferocidade enquanto os [gf_faith.PriestNeuterPlural] [sacrifice.Custom('ES_LoLa')] estrangulam até a morte. A luz em seu olhar dura até que o primeiro animal seja sacrificado. Os cadáveres humanos para a árvore da forca, os animais para as fogueiras de cozinha"
 fp1_other_decisions.0003.desc.sacrifice.generic_cannibal_slaughter: "é nocauteado para deixar o corpo relaxar. O medo estragaria a carne. Então, os [gf_faith.PriestNeuterPlural] descem, cortando a carne suculenta para as panelas de cozimento, mesmo enquanto o próximo [blotter.Custom('SacrificeTerm')] é trazido, ainda gritando."
 fp1_other_decisions.0003.desc.sacrifice.generic_human_disemboweling: "Seus companheiros observam horrorizados enquanto o cadáver é eviscerado, sabendo que sua vez está por chegar. Talvez invejem a morte mais limpa dos animais, que vão direto às fogueiras de cozinha depois de morrer"
 fp1_other_decisions.0011.t: "$fp1_other_decisions.0001.t$"
 fp1_other_decisions.0011.desc.intro: "Os [blotter.Custom('GruesomeFestivalNamePlural')|U] são uma parte vital da [gf_faith.GetName|l] e [blotter.Custom2('MyCharacterIntroduction', ROOT.Char)] está realizando uma dessas reuniões.\n\nTrata-se de uma grande ocasião, da qual participam todos os [gf_faith.GetAdherentNamePluralNoTooltip] de [blotter.GetPrimaryTitle.GetNameNoTier], nobres e plebeus igualmente."
 fp1_other_decisions.0011.desc.cannibal_blot: "Como acontece com muitos rituais especiais, o consumo ritual de carne humana seria obrigatório para alguém da minha posição."
 fp1_other_decisions.0011.desc.fallback: "Comida, entretenimento e tudo o mais serão pagos integralmente por [blotter.GetTitledFirstNameNoTooltip|l]."
 fp1_other_decisions.0011.desc.outro: "\n\nEmbora eu esteja ocupad[ROOT.Char.Custom('ES_OA')] , é costume que um emissário explique meu impedimento. No entanto, se eu quisesse desfeitar minha [blotter.GetTitleAsNameNoTooltip] , poderia não enviar resposta alguma…"
 fp1_other_decisions.0011.a: "É apenas educado reservar um dia."
 fp1_other_decisions.0011.b: "Para o inferno [blotter.GetFirstNameNoTooltip] e o maldito cavalo em que veio o mensageiro dele."
 fp1_other_decisions.0011.b.tt: "[blotter.GetFirstNameNoTooltip] pode notar sua ausência eventualmente."
 fp1_other_decisions.0011.c: "A carne sagrada! Mal posso esperar para provar pela primeira vez..."
 fp1_other_decisions.0011.d: "Eu irei, mas não vou comer carne humana."
 fp1_other_decisions.0011.e: "N?o h? chance em [gf_faith.NegativeAfterLife] de eu fazer #EMP isso#!!"
 fp1_other_decisions.0011.e.tt: ""
 fp1_other_decisions.0012.t: "$fp1_other_decisions.0001.t$: Rostos Ausentes"
 fp1_other_decisions.0012.desc.intro: "Não é incomum que assuntos importantes faltem até mesmo em um grande [blotter.Custom('GruesomeFestivalName')], mas um emissário adequado para explicar o motivo e comparecer em seu lugar é considerado educado.\n\n"
 fp1_other_decisions.0012.desc.multiple_decliners: "A ausência de [decliner_1.GetTitledFirstName|l] e muitos outros foi"
 fp1_other_decisions.0012.desc.single_decliner: "A ausência de [decliner_1.GetTitledFirstName|l] foi"
 fp1_other_decisions.0012.desc.outro: "conspicuamente ausente e não enviou mensagem antecipadamente. Isso é um claro insulto à minha autoridade, se não exatamente ilegal."
 fp1_other_decisions.0012.a: "Maldita[decliner_1.Custom('ES_OA')] seja [decliner_1.GetTitledFirstNameNoTooltip|l]!"
 fp1_other_decisions.0012.a.decliner_toast.t: "[blotter.Custom('ES_ElLa')|U] [blotter.GetTitledFirstNameNoTooltip|l] percebeu sua ausência no [blotter.Custom('GruesomeFestivalName')]"
 fp1_other_decisions.0012.b: "Que se dane todos eles!"
 fp1_other_decisions.0012.b.all_decliners_list: "Todos os que recusaram [vassals|lE]"
 fp1_other_decisions.0012.c.singular: "Ah, [decliner_1.GetSheHe] perde isso."
 fp1_other_decisions.0012.c.plural: "Ah, perda deles."
 fp1_other_decisions.0021.t: "A Blasfêmia Definitiva"
 fp1_other_decisions.0021.desc: "Notícias aterrorizantes de [sacrificer.GetPrimaryTitle.GetNameNoTierNoTooltip]! Ao que parece, é[sacrificer.Custom('ES_EA')] o vil [sacrificer.Custom('GetUnbelieverName')], [sacrificer.GetShortUIName], sacrificou [sacrificed_hof.Custom('ES_AlAla')] o nobre [sacrificed_hof.GetTitledFirstName|l] à sua fé nojenta.\n\n"
 fp1_other_decisions.0021.desc.allows_holy_wars: "Já as veias dos zelosos [sacrificed_hof.GetFaith.GetAdherentNamePlural] em todos os lugares ardem com a ira justa!\n\nEsse insulto não pode passar impune e toda taverna, fortaleza e palácio onde as palavras de [sacrificed_hof.GetFaith.WarGodName] têm poder, ferve com rumores de guerra sagrada."
 fp1_other_decisions.0021.desc.disallows_holy_wars: "Mesmo nestes momentos difíceis, devemos lembrar os caminhos de [sacrificed_hof.GetFaith.HighGodName] e não derramar sangue em vão. Nada trará [sacrificed_hof.GetTitledFirstNameNoTooltip|l] de volta, e certamente [sacrificed_hof.GetSheHe] gostaria que [sacrificed_hof.Custom('ES_LoLa')] chorássemos de forma justa e pacífica."
 fp1_other_decisions.0021.a.zealous: "Que blasfêmia é essa?!"
 fp1_other_decisions.0021.a.cynical: "Se nada mais, isso é uma afronta ao nosso povo!"
 fp1_other_decisions.0021.a.fallback: "Como terrível!"
 fp1_other_decisions.0021.cheaper_holy_wars.tt: "As [holy_wars|lE] contra [sacrificer.GetShortUIName] agora estão significativamente mais baratas"
 fp1_other_decisions.0021.easier_holy_wars.tt: "[holy_wars|E] contra [sacrificer.GetShortUIName] requerem menos [piety_levels|lE] do que o usual"
 fp1_other_decisions.0021.ghw_target_preference.tt: "São mais prováveis [great_holy_wars|lE] contra [sacrificer.GetShortUIName]"
 fp1_other_decisions.0022.t: "$fp1_other_decisions.0021.t$"
 fp1_other_decisions.0022.desc: "Parece que os [unlucky_guest.GetFaith.GetAdherentNamePlural] de todo o mundo não receberam muito bem meu sacrifício de seu fals[unlucky_guest.Custom('ES_OA')] [unlucky_guest.GetTitleAsNameNoTooltip].\n\n"
 fp1_other_decisions.0022.desc.disallows_holy_wars: "Fieis à sua fé pacifista, eles parecem contentes em se reunir e oferecer orações silenciosas ao seu [unlucky_guest.GetFaith.HighGodName] em vez de buscar vingança sangrenta."
 fp1_other_decisions.0022.desc.allows_holy_wars: "Fiéis à sua fé guerreira, muitos deles clamam pela minha cabeça e pregam guerras santas até que meu reino seja varrido da face da Terra."
 fp1_other_decisions.0022.a.pacifists: "Hah, talvez [unlucky_guest.GetFaith.HighGodName] me atinja?"
 fp1_other_decisions.0022.a.craven: "Isso... pode ter sido um erro."
 fp1_other_decisions.0022.a.fallback: "Pah, deixe-os vir!"
 fp1_other_decisions.0023.t: "$fp1_other_decisions.0021.t$"
 fp1_other_decisions.0023.desc.intro: "Los [unlucky_guest.GetFaith.GetAdherentNamePlural] de todo el mundo están conmocionados. Nuestr[unlucky_guest.Custom('ES_OA')] amad[unlucky_guest.Custom('ES_OA')] [unlucky_guest.GetShortUIName] ha sido sacrificad[unlucky_guest.Custom('ES_OA')] por los viles [gf_faith.GetAdherentNamePlural] y, lo que es peor, por #EMP orden expresa#! de uno de los nuestros.\n\n"
 fp1_other_decisions.0023.desc.has_excommunication: "[blotter.GetShortUIName] foi sumariamente excomungad[blotter.Custom('ES_OA')] e suas ações blasfemas foram denunciadas a todos os bons [unlucky_guest.GetFaith.GetAdherentNamePluralNoTooltip]."
 fp1_other_decisions.0023.desc.does_not_have_excommunication: "Todos os [unlucky_guest.GetFaith.GetAdherentNamePluralNoTooltip] justos exigem que [blotter.GetShortUIName], maldito seja seu nome, seja expulso[blotter.Custom('ES_OA')] da fé."
 fp1_other_decisions.0023.desc.outro: "Que [unlucky_guest.GetFaith.NegativeAfterLife] possa engolir [blotter.GetHerHim]!"
 fp1_other_decisions.0023.a: "Isso é imperdoável!"
 fp1_other_decisions.0023.b: "Que tipo de [blotter.GetWomanMan] #EMP ?#! esse?!"
 fp1_other_decisions.0024.t: "$fp1_other_decisions.0021.t$"
 fp1_other_decisions.0024.desc.intro: "¿Qué me poseyó? ¿Qué secuaz de [unlucky_guest.GetFaith.DevilName] se apoderó de mi mente que me hizo aprobar #EMP públicamente#! el sacrificio de [unlucky_guest.GetShortUIName] a ídolos foráneos? Mi blasfemia es la comidilla de todos los [unlucky_guest.GetFaith.GetAdherentNamePlural] justos del mundo!\n\n"
 fp1_other_decisions.0024.desc.has_excommunication: "Nenhum mandado de excomunhão precisa chegar para que os [unlucky_guest.GetFaith.PriestNeuterPlural] se recusem a ouvir meus pecados."
 fp1_other_decisions.0024.desc.does_not_have_excommunication: "Até o [unlucky_guest.GetFaith.PriestNeuter] menos observante não fará contato visual comigo."
 fp1_other_decisions.0024.desc.outro: "No que diz respeito ao [unlucky_guest.GetFaith.GetReligion.GetName|l], ? como se eu estivesse perdid[ROOT.Char.Custom('ES_OA')] e condenad[ROOT.Char.Custom('ES_OA')]."
 fp1_other_decisions.0024.a: "#EMP O que eu fiz?!#!"
 fp1_other_decisions.0024.b: "Era apenas uma[unlucky_guest.Custom('ES_XA')] [unlucky_guest.GetWomanMan] , não uma divindade!"
 fp1_other_decisions.0024.c: "Foram meus súditos, não eu!"
 fp1_other_decisions.0063.t: "$game_concept_designate_chief_sacrifice_chief_sacrifice$ morreu antes de [ROOT.Char.Custom('GruesomeFestivalName')]"
 fp1_other_decisions.0063.desc: "[designated_sacrifice.GetTitledFirstNameNoTooltip|l] morreu antes que pudesse ser sacrificado."
 fp1_other_decisions.0101.t.root_title: "Rochas Através das Eras"
 fp1_other_decisions.0101.t: "$fp1_other_decisions.0101.t.root_title$: Assunto"
 fp1_other_decisions.0101.desc: "Toda pedra rúnica conta uma mensagem sobre um evento significativo na vida de quem a encomendou. A pedra registra tudo, do camponês mais humilde a um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] como eu.\n\nSobre o que este monumento falará?"
 fp1_other_decisions.0101.a: "Meu falecid[ancestor.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort',ancestor)], [ancestor.GetFirstNameNoTooltip]."
 fp1_other_decisions.0101.a.tt: "A pedra rúnica irá falar sobre sua família falecida..."
 fp1_other_decisions.0101.b: "Talvez [foe.Custom('ES_DelDela')] inimig[foe.Custom('ES_OA')] que aniquilei, [foe.GetTitledFirstNameNoTooltip]?"
 fp1_other_decisions.0101.b.tt: "A pedra rúnica irá falar sobre suas vitórias na conquista..."
 fp1_other_decisions.0101.c: "Minha ascensão ao trono de [new_title.GetNameNoTierNoTooltip]!"
 fp1_other_decisions.0101.c.tt: "A pedra rúnica falará de como você chegou ao poder..."
 fp1_other_decisions.0101.d: "Você quer que eu pague #EMP QUANTO#! por uma enorme pedra pintada?"
 fp1_other_decisions.0111.t: "$fp1_other_decisions.0101.t.root_title$: Localização"
 fp1_other_decisions.0111.desc.intro: "Agora que decidi o que gravar em minha pedra rúnica, só resta uma questão: onde colocá-la.\n\n"
 fp1_other_decisions.0111.desc.ancestor: "Memoriais da família, como [ancestor.GetFirstName], encorajam respeito e lealdade. Eles são melhor colocados em áreas que pensam pouco em mim, onde posso dar exemplo de minha dedicação e servidão a poderes superiores."
 fp1_other_decisions.0111.desc.conquest: "Memoriais de vitória, como minha vitória sobre [foe.GetTitledFirstName|l], são um lembrete constante do glorioso fim de uma guerra. Eles são melhor colocados em áreas que precisam de incentivo para cooperar."
 fp1_other_decisions.0111.desc.promotion: "Monumentos de nobilitação, como minha ascensão a [ROOT.Char.GetTitleAsNameNoTooltip] de [new_title.GetNameNoTierNoTooltip], incentivam as pessoas a servir seu governante através de altos e baixos. Eles são melhor colocados em áreas urbanas, onde mais jovens podem ser inspirados a se apresentar para o levantamento."
 fp1_other_decisions.0111.desc.outro: "\n\nClaro, um ou dois lugares me vêm à mente..."
 fp1_other_decisions.0111.a: "[location_a.GetNameNoTierNoTooltip|U] seria um bom lugar."
 fp1_other_decisions.0111.b: "[location_b.GetNameNoTierNoTooltip|U] parece bastante decente?"
 fp1_other_decisions.0111.c: "[location_c.GetNameNoTierNoTooltip|U] é uma ótima escolha!"
 fp1_other_decisions.1000.t: "Sacrificado!"
 fp1_other_decisions.1000.desc: "Estou diante da multidão que canta, todos com os olhos fixos em mim. [blotter.GetFirstName] está na frente com um sorriso no rosto, dispost[blotter.Custom('ES_OA')] a acabar com a minha vida.\n\n\"Grande [blotter.GetFaith.HighGodName]! Aceite este sacrifício!\" grita.\n\nEste é o meu fim.\n\nA escuridão desce.\n\nAcabou."
 fp1_other_decisions.1000.a: "Vejo você em [ROOT.Char.GetFaith.NegativeAfterLife]!"
