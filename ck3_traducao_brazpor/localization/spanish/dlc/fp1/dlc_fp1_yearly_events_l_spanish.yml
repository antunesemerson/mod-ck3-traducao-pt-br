l_spanish:
 ##################################################
 ##Misc
 fp1_berserk_roar_evtopt: "#BER RAAAAARGH!#!"
 ##################################################
 ##Ordinary Events
 fp1_yearly.0001.t: "Fuga de um Thrall"
 fp1_yearly.0001.desc: "Los esclavos son una realidad en la cultura [ROOT.Char.GetCulture.GetNameNoTooltip]. Humanos inferiores, capturados en el extranjero o nacidos de otros esclavos, que trabajan nuestros campos y cuidan nuestros hogares.\n\nEn teoría.\n\nAnoche, un[dummy_gender.Custom('ES_OA')] de ellos decidió que ya había tenido bastante y huyó, ¡llevándose consigo un montón de joyas valiosas! Lo que es peor, [scapegoat.Custom2('MyCharacterIntroduction',ROOT.Char)] [dummy_gender.Custom('ES_LoLa')] #EMP vio#! desaparecer en la oscuridad y no se le ocurrió contárselo a nadie hasta la mañana."
 fp1_yearly.0001.gold_stays_lost.tt: "Seu dinheiro ficará perdido"
 fp1_yearly.0001.a: "Mandar uma descrição para todas as vilas!"
 fp1_yearly.0001.a.tt_success: "Seu escravo[dummy_gender.Custom('ES_OA')] é descoberto[dummy_gender.Custom('ES_OA')] e capturado[dummy_gender.Custom('ES_OA')]"
 fp1_yearly.0001.a.tt_failure: "Seu servo[dummy_gender.Custom('ES_OA')] escapa da sua rede com sua prata"
 fp1_yearly.0001.b: "Tragam minha capa. Eu mesmo [dummy_gender.Custom('ES_LoLa')] caçarei."
 fp1_yearly.0001.b.tt_success: "Você pega [dummy_gender.Custom('ES_AlAla')] escrav[dummy_gender.Custom('ES_OA')] antes que consiga ir longe"
 fp1_yearly.0001.b.tt_failure: "$fp1_yearly.0001.a.tt_failure$"
 fp1_yearly.0001.c: "[scapegoat.GetFirstNameNoTooltip], isso é culpa sua, então você pode pagar!"
 fp1_yearly.0001.d: "Você está perdoado, [scapegoat.GetFirstNameNoTooltip]. Estas coisas acontecem."
 fp1_yearly.0011.t: "Pedidos para que [offensive_courtier.GetFirstNameNoTooltip] seja declarado Nithing"
 fp1_yearly.0011.desc: "Hoje passou pelo meu salão uma procissão de figuras importantes de [capital_barony.GetNameNoTier], cada uma com uma queixa específica contra meu [ROOT.Char.Custom2('RelationToMeShort',SCOPE.sC('offensive_courtier'))][offensive_courtier.GetTitledFirstName|l].\n\nAlguns se queixam de seu comportamento, outros de sua honra, mas todos concordam em uma coisa: é uma vergonha para a corte.\n\nEssa plebe imunda não se contenta com nada menos que uma declaração de nithing, para expulsar[offensive_courtier.GetHerHim]."
 fp1_yearly.0011.desc.priest: "[priest.Custom2('MyCharacterIntroduction',ROOT.Char)|U] insiste em que o comportamento de [offensive_courtier.GetFirstNameNoTooltip] #EMP na verdade#! é bastante piedoso, mas os burgueses resmungam que [priest.GetFirstNameNoTooltip] não precisa lidar com as consequências de tal "virtude"."
 fp1_yearly.0011.a: "Têm razão, devo desterrar[offensive_courtier.Custom('ES_LoLa')] e deserdar[offensive_courtier.Custom('ES_LoLa')]!"
 fp1_yearly.0011.b: "Têm razão, deve ser desterrad[offensive_courtier.Custom('ES_OA')]!"
 fp1_yearly.0011.c: "Camponeses! [offensive_courtier.GetFirstNameNoTooltip] é inocente."
 fp1_yearly.0011.d: "Isto não é assunto para o [ROOT.Char.GetTitleAsNameNoTooltip]..."
 fp1_yearly.0021.t: "Uma Questão de Vida ou Morte"
 fp1_yearly.0021.desc.intro: "Uma discussão recente entre dois dos meus $knight_culture_player_plural_no_tooltip_lowercase$ , [first_knight.GetTitledFirstName|l] e [second_knight.GetTitledFirstName|l] , escalou drasticamente. Ao que parece"
 fp1_yearly.0021.desc.doggo: "[first_knight.GetFirstNameNoTooltip] acertou por acidente o cachorro de [second_knight.GetFirstNameNoTooltip] quando caçavam um exemplar de [ROOT.Char.Custom('GetAnimalType')], e [second_knight.GetFirstNameNoTooltip] se recusa a permitir que [first_knight.GetFirstNameNoTooltip] simplesmente pague por um novo."
 fp1_yearly.0021.desc.spit_of_land: "[first_knight.GetFirstNameNoTooltip] comprou uma faixa remota de terra que [second_knight.GetFirstNameNoTooltip] afirma que lhe pertence. A propriedade não vale nada, exceto pelo fato de que supostamente ali crescem as melhores couves de [capital_barony.GetNameNoTierNoTooltip]."
 fp1_yearly.0021.desc.unrepeatable_insult: "eles começaram a trocar insultos do nada, e [first_knight.GetFirstNameNoTooltip] disse algo inaudível sobre [second_knight.GetFirstNameNoTooltip], uma cabra e um bom chifre de bebida."
 fp1_yearly.0021.desc.escalating_prank_war: "começou como uma competição inofensiva de quem fazia a piada mais engraçada, cada um jogando brincadeiras cada vez mais dramáticas no outro, e a diversão gradualmente se transformou em pura raiva."
 fp1_yearly.0021.desc.religious_differences: "tudo se resume a simples diferenças de fé, com [first_knight.GetFaith.GetAdherentName] e [second_knight.GetFaith.GetAdherentName] ambos se atacando por conta da natureza do divino."
 fp1_yearly.0021.desc.stolen_pig: "o ponto chave da discórdia é um porco gigante, que [first_knight.GetFirstNameNoTooltip] roubou de [second_knight.GetFirstNameNoTooltip]. Ou [second_knight.GetFirstNameNoTooltip] de [first_knight.GetFirstNameNoTooltip]. Honestamente, com todo o barulho, está bastante confuso."
 fp1_yearly.0021.desc.defiled_longboat.woman: "[unfortunate_knight.GetFirstNameNoTooltip] descobriu a [defiling_knight.GetFirstNameNoTooltip] #EMP refocilándose#! com o mascarão de proa do barco de [unfortunate_knight.GetFirstNameNoTooltip], arruinando tanto a pintura quanto sua aura antes temível."
 fp1_yearly.0021.desc.defiled_longboat: "[defiling_knight.GetFirstNameNoTooltip] se #EMP aliviou#! por todos os assentos do barco de [unfortunate_knight.GetFirstNameNoTooltip], deixando toda a embarcação #EMP fedendo#!."
 fp1_yearly.0021.desc.board_game: "os dois estavam jogando hnefatafl e começaram a discutir sobre as regras exatas. Em minutos, o tabuleiro foi jogado de lado e os punhos começaram a voar."
 fp1_yearly.0021.desc.outro: "\n\nAgora, ambos os $knight_culture_player_plural_no_tooltip_lowercase$ desafiaram abertamente um ao outro para um holmgang. O duelo certamente será dramático, mas como membros juramentados de minha casa, eles precisam da minha permissão para seguir em frente com a luta."
 fp1_yearly.0021.a: "Eles podem lutar por isso se quiserem."
 fp1_yearly.0021.a.tt_success: "[first_knight.GetFirstNameNoTooltip] vence o holmgang"
 fp1_yearly.0021.a.tt_failure: "[second_knight.GetFirstNameNoTooltip] vence o holmgang"
 fp1_yearly.0021.b: "Pueril! Eu proíbo isso!"
 fp1_yearly.0021.b.tt_success: "Seu comando inspira obediência aterrorizada"
 fp1_yearly.0021.b.tt_failure: "Seus $knight_culture_player_plural_no_tooltip_lowercase$ concordam de má vontade, mas zombam de você"
 fp1_yearly.0021.c: "Claro, e eu até vou apostar em [first_knight.GetFirstNameNoTooltip]."
 fp1_yearly.0021.c.tt_success: "$fp1_yearly.0021.a.tt_success$"
 fp1_yearly.0021.c.tt_failure: "$fp1_yearly.0021.a.tt_failure$"
 fp1_yearly.0021.d: "Por todos os meios, embora eu aposte em [second_knight.GetFirstNameNoTooltip]."
 fp1_yearly.0021.d.tt_failure: "$fp1_yearly.0021.a.tt_success$"
 fp1_yearly.0021.d.tt_success: "$fp1_yearly.0021.a.tt_failure$"
 fp1_yearly.0031.t: "Contos Altos na Mesa"
 fp1_yearly.0031.desc.intro: "Tem sido uma longa, muito longa noite na companhia de [lying_warrior.GetFirstName]. O viajante[lying_warrior.Custom('ES_OA')] se deteve em [capital_barony.GetBaseNameNoTierNoTooltip] para passar a noite, pagando sua estadia com histórias de seus feitos que se estenderam por #EMP horas#!.\n\n"
 fp1_yearly.0031.desc.sunk_longboat: "\"... então lá estava eu, no meio do Mar do Norte, com o barco longo afundando por causa de tanto maldito saque. Bem, eu não podia levar comigo, então pulei na água e nadei até a Noruega!\""
 fp1_yearly.0031.desc.wrestled_whale: "\"... sabia que eu tinha que abandonar minha tripulação ou lutar contra a baleia sozinho. Peguei minha faca, mergulhei no oceano e lutei contra a fera até a praia, sozinho!\""
 fp1_yearly.0031.desc.charged_city_fruit_knife: "\"... dez mil do inimigo lá dentro, armados com cimitarras, e eu armado apenas com uma faca pequena para descascar frutas. #EMP Eu consegui#!, graças à minha fiel faca de frutas!\""
 fp1_yearly.0031.desc.charged_city: "\"... carreguei diretamente para as muralhas da cidade, subi escalando, e abri caminho até o palácio real. Derreti a coroa do rei para pagar por um novo par de botas.\""
 fp1_yearly.0031.desc.kept_iceland_afloat: "\"... e se os dois gigantes realmente #EMP tivessem#! realizado o holmgang deles, a Islândia certamente teria afundado de volta ao mar. Sorte minha que eu os convenci a recuar.\""
 fp1_yearly.0031.desc.wooed_heir: ""… com um(a) [invented_heir.Custom('GetDaughterSon')] de [disparaged_king.GetTitledFirstName|l], #EMP sí#! que foi a melhor. Depois disso, porém, não fui muito bem visto(a) por [disparaged_king.GetTitledFirstNameNoTooltip|l], então tive que sair voando da corte dele/dela, eu lhes digo!"."
 fp1_yearly.0031.desc.hunted_troll: "\"... claro, esta ferida mais recente é do próprio troll. Grande como uma casa, silencioso como um rato, garras como a prole bastarda de [lying_warrior.GetFaith.DevilName]. Ainda assim, apunhalando algo por tempo suficiente, e ele morre.\""
 fp1_yearly.0031.desc.outro: "\n\nConto após conto, a saga continua, cada anedota mais longa e maior que a anterior."
 fp1_yearly.0031.a: "Você simplesmente #EMP deve#! ficar na corte, [lying_warrior.GetFirstNameNoTooltip]!"
 fp1_yearly.0031.b: "Isso soa... exagerado."
 fp1_yearly.0031.b.tt_success: "As mentiras de [lying_warrior.GetFirstNameNoTooltip]"
 fp1_yearly.0031.b.tt_failure: "[lying_warrior.GetFirstNameNoTooltip] rodeia você verbalmente"
 fp1_yearly.0031.c: "Fale bem da nossa hospitalidade em sua próxima parada!"
 fp1_yearly.0041.t: "Exploradores do Sul"
 fp1_yearly.0041.desc: "[explorer.GetFirstName], explorador[explorer.Custom('ES_XA')], erudit[explorer.Custom('ES_OA')] e enviad[explorer.Custom('ES_OA')] [sponsoring_liege.Custom('ES_DelDela')] [sponsoring_liege.GetTitledFirstName|l] de [sponsoring_liege.GetPrimaryTitle.GetName], tem estado percorrendo minhas terras ultimamente. Como erudit[explorer.Custom('ES_OA')] e devot[explorer.Custom('ES_OA')] na fé [explorer.GetFaith.GetAdherentNameNoTooltip], mantém um diário sobre suas experiências e escreve de tempos em tempos para sua terra natal sobre a vida neste confim do mundo.\n\nAgora [explorer.GetFirstNameNoTooltip] chegou a [capital_barony.GetNameNoTierNoTooltip] e solicita permissão para passar alguns dias a fim de observar nossos costumes locais e falar com os mais sábios de nossos anciãos.\n\nApesar da formalidade de seu pedido, o tom de [explorer.GetFirstNameNoTooltip] praticamente #EMP transborda#! condescendência."
 fp1_yearly.0041.a: "Talvez possa presenciar uma pequena cerimônia, não?"
 fp1_yearly.0041.a.tt_success: "Seu cerimonial impressiona [explorer.GetFirstNameNoTooltip]"
 fp1_yearly.0041.a.tt_failure: "Seus costumes pagãos desagradam [explorer.GetFirstNameNoTooltip]"
 fp1_yearly.0041.b: "Me fale mais sobre este... [explorer.GetFaith.HighGodName]?"
 fp1_yearly.0041.c: "Não há lugar para estrangeiros arrogantes em #EMP minha#! corte."
 fp1_yearly.0051.t: "Os Mortos Inquietos"
 fp1_yearly.0051.desc: "A morte de [draugr.GetTitledFirstName|l] há algum tempo, não passou despercebida pelo povo comum de [capital_county.GetNameNoTier]. Seja como for, [draugr.GetFirstNameNoTooltip] nunca foi popular entre os camponeses locais, e agora virou norma culpar qualquer maldição da terra no cadáver ambulante de est[draugr.Custom('ES_EA')] [draugr.GetWomanMan].\n\nNão passa uma semana sem que um fazendeiro, lenhador ou arremessador de esterco perto da capital reclame do draugr de [draugr.GetFirstNameNoTooltip].\n\nÉ preciso fazer #EMP algo#!."
 fp1_yearly.0051.a: "Eu visitarei o seu túmulo pessoalmente."
 fp1_yearly.0051.a.tt: "Você decide investigar pessoalmente..."
 fp1_yearly.0051.b: "Apenas desenterre o corpo e queime-o."
 fp1_yearly.0051.b.body_destroyed: "O povoado se alegra"
 fp1_yearly.0051.b.list: "Familiares e amigos de [draugr.GetFirstNameNoTooltip]"
 fp1_yearly.0051.c: "Talvez possamos resolver isso com feitiços protetores?"
 fp1_yearly.0051.c.tt_success: "Suas poções e feitiços tranquilizam os camponeses"
 fp1_yearly.0051.c.tt_failure: "Seus rituais são insuficientes"
 fp1_yearly.0061.t: "$fp1_yearly.0051.t$: Lobos"
 fp1_yearly.0061.desc: "Meu séquito e eu mal acabamos de chegar ao túmulo de [draugr.GetFirstNameNoTooltip], quando o primeiro rosnado ecoa lá de dentro.\n\nEnquanto o maior lobo que já vi se espreme para fora pela entrada escurecida, o restante da alcateia parece brotar do próprio chão. Deve haver uma dúzia ou mais, cada um do tamanho de um homem, e já vêm em disparada de todas as direções.\n\nOs camponeses estavam errados sobre o draugr, mas não sobre a maldição!"
 fp1_yearly.0061.a: "Soldados! Comigo!"
 fp1_yearly.0061.a.tt_success: "Você incentiva seus homens e mata os lobos!"
 fp1_yearly.0061.a.tt_failure: "Você mal escapa com vida"
 fp1_yearly.0061.b: "FUJA!"
 fp1_yearly.0062.t: "$fp1_yearly.0051.t$: Urso"
 fp1_yearly.0062.desc: "O túmulo de [draugr.GetFirstNameNoTooltip] é frio e lúgubre. Embora nem eu nem minha comitiva vejamos qualquer cadáver ambulante, há arranhões longos e profundos em algumas das paredes, e ossos de gado espalham-se pelo chão.\n\nUm farfalhar repentino em um canto chama minha atenção. O que eu havia tomado por um monte de folhas começa a se erguer, revelando o maior urso que já vi, facilmente com nove ou dez braças de altura. Ele pisca sonolento para nós, parecendo quase amigável.\n\nEntão ele ruge."
 fp1_yearly.0062.a: "Eu vou te transformar em um tapete!"
 fp1_yearly.0062.a.tt_success: "Você derruba o monstro"
 fp1_yearly.0062.a.tt_failure: "Sua comitiva o arrasta para longe da morte certa"
 fp1_yearly.0062.b: "$fp1_yearly.0061.b$"
 fp1_yearly.0063.t: "$fp1_yearly.0051.t$: Nithing"
 fp1_yearly.0063.desc: "No monte de [draugr.GetFirstNameNoTooltip] não há nem monstro, nem bens funerários, nem mesmo um cadáver. Após uma breve busca pela área, encontram o corpo de [draugr.GetFirstNameNoTooltip] jogado em uma vala, coberto de forma rudimentar com folhagem.\n\nEm vez disso, a sepultura parece ter sido convertida em uma moradia tosca, que algum bandido desavergonhado arrancou das mãos frias dos mortos.\n\nEnquanto discuto com minha comitiva o que fazer, um alegre assobio se torna audível à distância, aproximando-se. O patife se aproxima!"
 fp1_yearly.0063.a: "Todos, silêncio, encostem-se nas paredes!"
 fp1_yearly.0063.a.tt_success: "A armadilha funciona"
 fp1_yearly.0063.a.tt_failure: "[draugr_nithing.GetFirstNameNoTooltip] percebe que algo está errado e foge"
 fp1_yearly.0063.a.tt_failure.draugr_nithing_escapes: "[draugr_nithing.GetFirstNameNoTooltip] vagueia pela natureza, continuando a causar problemas"
 fp1_yearly.0063.b: "Que desperdício de meu tempo maldito!"
 fp1_yearly.0064.t: "$fp1_yearly.0051.t$: Órfão"
 fp1_yearly.0064.desc: "Os camponeses insistiam que o cadáver ambulante de [draugr.GetFirstNameNoTooltip] roubava sua comida, amaldiçoava seu gado e batia em suas janelas à noite, mas quando chego ao seu túmulo, encontro uma fera bem diferente.\n\nEm meio a um ninho de peles roubadas e comida pela metade, está uma criança órfã, me encarando, com os olhos arregalados de puro terror."
 fp1_yearly.0064.a: "Fora daqui, criança. Você não pode ficar aqui."
 fp1_yearly.0064.a.tt: "[draugr_orphan.GetFirstNameNoTooltip] vagueia pela natureza..."
 fp1_yearly.0064.b: "[Select_CString(draugr_orphan.IsFemale,'Niña','Niño')] ou não, para a masmorra com [Select_CString(draugr_orphan.IsFemale,'ella','él')]!"
 fp1_yearly.0064.c: "Venha à corte, [Select_CString(draugr_orphan.IsFemale,'niña','niño')]: uma tumba não é lugar para os vivos."
 fp1_yearly.0064.d: "Porque… toda criança merece ter um[Select_CString(draugr_orphan.IsFemale,'niña','niño')] [ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetMotherFather], não é?"
 fp1_yearly.0065.t: "$fp1_yearly.0051.t$: Afinal, quieto"
 fp1_yearly.0065.desc: "O túmulo de [draugr.GetFirstNameNoTooltip] está praticamente como quando foi enterrad[draugr.Custom('ES_OA')]. Assim como qualquer uma das tumbas que os camponeses me fazem verificar.\n\nTambém não encontro nada nas supostas cavernas amaldiçoadas, bosques tomados por trolls nem grutas de gigantes. Depois de algumas semanas, começo a me perguntar se temos tanta certeza de que esses monstros sequer #EMP existan#!.\n\nAo menos o exercício me faz bem."
 fp1_yearly.0065.a: "Talvez tenha sido o vento?"
 fp1_yearly.0065.a.locals_grumble: "Os Camponeses Estão Descontentes"
 fp1_yearly.0071.t: "Nos Lugares Profundos do Mundo"
 fp1_yearly.0071.desc.intro: "Os camponeses de [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTier] são um bando supersticioso, frequentemente me procurando com alegações de feiticeiros, gigantes e deuses disfarçados.\n\nNormalmente, eu ignoro tais alegações como teatro de camponeses, mas desta vez eles trouxeram evidências:"
 fp1_yearly.0071.desc.troll_type.bear: "um jovem camponês, com a cabeça esmagada em pó e polpa, e os pais chorando a morte do filho."
 fp1_yearly.0071.desc.troll_type.wolf: "o cadáver de um famoso caçador, o peito rasgado, com a carne macia do coração devorada."
 fp1_yearly.0071.desc.troll_type.wolverine: "um monte de ossos e fragmentos de carne rasgada que eles insistem ter sido recentemente uma lavadeira idosa."
 fp1_yearly.0071.desc.troll_type.lynx: "uma dúzia de porcos abatidos, cada um despedaçado com cuidado demais para um animal selvagem descoordenado, mas claramente obra de garras, e não de uma faca."
 fp1_yearly.0071.desc.troll_type.moose: "o cadáver manchado de sangue de uma ovelha, claramente despedaçada, mas não comida, nem mesmo mastigada, grosseiramente triturada por garras que eu nunca vi."
 fp1_yearly.0071.desc.outro.loveli_lakes: "\n\nEstou há pouco tempo examinando a bagunça quando [loveli_lakes.GetTitledFirstName|l].\n\n“Isto não é nenhum trasgo, [ROOT.Char.GetFirstNameNoTooltip]! Isto é obra de um alce selvagem! Conheço bem a fera, incluindo sua mordida nojenta, e gravarei minha marca no seu cadáver.”"
 fp1_yearly.0071.desc.outro.fallback: "\n\nOs moradores insistem que isto é nada menos que obra de um troll e exigem que eu vasculhe as florestas próximas para eliminá-lo."
 fp1_yearly.0071.a: "Eu matarei a besta eu mesmo!"
 fp1_yearly.0071.a.tt: "Você parte com um grupo de guerreiros"
 fp1_yearly.0071.b: "[marshal.GetTitledFirstNameNoTooltip|l], cuide disso."
 fp1_yearly.0071.b.tt_success: "Seu marechal e suas tropas caçam o monstro"
 fp1_yearly.0071.b.tt_failure: "A besta escapa do [marshal.GetFirstNameNoTooltip]"
 fp1_yearly.0071.c: "Parece ser um urso. Lidem com isso vocês mesmos, covardes."
 fp1_yearly.0081.hunt_invalidated: "Caça ao Troll de [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] encerrada"
 fp1_yearly.0081.hunt_invalidated.tt: "Circunstâncias imprevistas chamam sua atenção para longe"
 fp1_yearly.0081.desc.prelude: "A floresta sussurra suavemente enquanto avançamos com dificuldade, mantendo meu pequeno grupo de servidores em um abraço apertado e sombrio. Imagino que seja só o vento, mas alguns dizem que os trolls cantam como o vento quando estão sozinhos…\n\nVários desaparecimentos ocorreram perto desta clareira, o que a torna um provável acampamento para a fera. Pelo menos, é o que dizem os locais.\n\n"
 fp1_yearly.0081.desc.finisher: "Não é um troll, mas ainda é nossa presa!"
 fp1_yearly.0081.t: "$fp1_yearly.0071.t$: Morte Iminente"
 fp1_yearly.0081.desc: "$fp1_yearly.0081.desc.prelude$Um rugido ensurdecedor reverbera pela floresta, e algo que eu tinha tomado como uma pedra se ergue, mostrando-se como um urso absolutamente #EMP imponente#!.\n\n$fp1_yearly.0081.desc.finisher$"
 fp1_yearly.0081.a: "Que a morte te leve, monstro!"
 fp1_yearly.0081.a.tt_success: "Você mata o urso"
 fp1_yearly.0081.a.tt_failure: "O urso te rasga ao meio"
 fp1_yearly.0081.b: "#BER RAAAAAAAAAAAGH!#!"
 fp1_yearly.0081.b.tt: "Você rasga a fera ao meio em uma fúria de berserker"
 fp1_yearly.0081.c: "Em cima, #EMP em cima#! e neles, lobos de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]!"
 fp1_yearly.0081.c.tt_success: "Você inspira seus soldados a matar o urso"
 fp1_yearly.0081.c.tt_failure: "A fera te fere e escapa"
 fp1_yearly.0081.c.tt_failure.tt: "Você sofre uma lesão grave #warning PERMANENTE#!"
 fp1_yearly.0081.d: "#EMP FUJAAAAA!#!"
 fp1_yearly.0082.t: "$fp1_yearly.0071.t$: Morte Rápida"
 fp1_yearly.0082.desc: "$fp1_yearly.0081.desc.prelude$Há um rosnado arrepiante atrás de nós, o som de pés se movendo, e então alguém na retaguarda da equipe grita. Eu giro a tempo de evitar o lobo gigante, com pelagem salpicada de prata pela idade e vermelha de sangue, enquanto ele passa correndo. $fp1_yearly.0081.desc.finisher$"
 fp1_yearly.0082.a: "$fp1_yearly.0081.a$"
 fp1_yearly.0082.a.tt_success: "Você mata o lobo"
 fp1_yearly.0082.a.tt_failure: "O lobo te arranca a garganta"
 fp1_yearly.0082.b: "$fp1_yearly.0081.b$"
 fp1_yearly.0082.b.tt: "$fp1_yearly.0081.b.tt$"
 fp1_yearly.0082.c: "Rally! Formem um círculo!"
 fp1_yearly.0082.c.tt_success: "Você encurrala, cerca e mata o lobo"
 fp1_yearly.0082.c.tt_failure: "$fp1_yearly.0081.c.tt_failure$"
 fp1_yearly.0082.c.tt_failure.tt: "$fp1_yearly.0081.c.tt_failure.tt$"
 fp1_yearly.0082.d: "$fp1_yearly.0081.d$"
 fp1_yearly.0083.t: "$fp1_yearly.0071.t$: Morte Rabiosa"
 fp1_yearly.0083.desc: "$fp1_yearly.0081.desc.prelude$O primeiro vislumbre da besta é quando ela arranca a garganta do soldado à minha esquerda: uma bola de pelo e dentes em rápida movimentação, mal maior que um cachorro, mas mais rápido que uma espada em queda. Um texugo enfurecido! $fp1_yearly.0081.desc.finisher$"
 fp1_yearly.0083.a: "$fp1_yearly.0081.a$"
 fp1_yearly.0083.a.tt_success: "Você mata o texugo"
 fp1_yearly.0083.a.tt_failure: "O texugo rasga suas entranhas"
 fp1_yearly.0083.b: "$fp1_yearly.0081.b$"
 fp1_yearly.0083.b.tt: "$fp1_yearly.0081.b.tt$"
 fp1_yearly.0083.c: "Há uma cabana de caça aqui perto, recuem para pedir ajuda!"
 fp1_yearly.0083.c.tt_success: "Você atrai a besta para perto da cabana e a domina com o número de pessoas"
 fp1_yearly.0083.c.tt_failure: "$fp1_yearly.0081.c.tt_failure$"
 fp1_yearly.0083.c.tt_failure.tt: "$fp1_yearly.0081.c.tt_failure.tt$"
 fp1_yearly.0083.d: "$fp1_yearly.0081.d$"
 fp1_yearly.0084.t: "$fp1_yearly.0071.t$: Morte Silenciosa"
 fp1_yearly.0084.desc: "$fp1_yearly.0081.desc.prelude$Fico imóvel. De alguma forma, ele não nos viu, mas consigo #EMP mal#! distinguir a forma agachada de um lince do outro lado da clareira. Mais um passo descuidado poderia ter sido meu último. $fp1_yearly.0081.desc.finisher$"
 fp1_yearly.0084.a: "$fp1_yearly.0081.a$"
 fp1_yearly.0084.a.tt_success: "Você mata o lince"
 fp1_yearly.0084.a.tt_failure: "O lince quebra seu pescoço"
 fp1_yearly.0084.b: "$fp1_yearly.0081.b$"
 fp1_yearly.0084.b.tt: "$fp1_yearly.0081.b.tt$"
 fp1_yearly.0084.c: "Quietos! Vocês dois, flanqueiem-no, nós o empurraremos em direção a vocês..."
 fp1_yearly.0084.c.tt_success: "Você supera o lince em astúcia e caça"
 fp1_yearly.0084.c.tt_failure: "$fp1_yearly.0081.c.tt_failure$"
 fp1_yearly.0084.c.tt_failure.tt: "$fp1_yearly.0081.c.tt_failure.tt$"
 fp1_yearly.0084.d: "$fp1_yearly.0081.d$"
 fp1_yearly.0085.t: "$fp1_yearly.0071.t$: Morte Rampante"
 fp1_yearly.0085.desc.loveli_lakes: "[loveli_lakes.GetTitledFirstName] lidera o caminho. Em pouco tempo, chegamos ao covil da besta raivosa na floresta.\n\nSeria uma sorte pegar essa coisa dormindo, mas não é o caso, e a enorme besta raivosa se ergue quando entramos em sua clareira. Ela é praticamente o dobro da nossa altura.\n\nRespira de forma irregular, os olhos girando com uma violenta doença da mente, e bate no chão com seus cascos fendidos.\n\nE então, avança."
 fp1_yearly.0085.desc.fallback: "$fp1_yearly.0081.desc.prelude$O silêncio é rompido com um #EMP estrépito#! tremendo quando um alce titânico e raivoso entra em cena, duas vezes mais alto que uma pessoa, espumando e enfurecido pelas narinas. $fp1_yearly.0081.desc.finisher$"
 fp1_yearly.0085.a: "$fp1_yearly.0081.a$"
 fp1_yearly.0085.a.tt_success: "Você mata o alce com a espada"
 fp1_yearly.0085.a.tt_failure: "O alce destroça seus ossos"
 fp1_yearly.0085.b: "$fp1_yearly.0081.b$"
 fp1_yearly.0085.b.tt: "$fp1_yearly.0081.b.tt$"
 fp1_yearly.0085.c: "Ponto fraco na base do pescoço! Lanças e arcos apenas!"
 fp1_yearly.0085.c.tt_success: "Você derruba o alce sem ser pisoteado"
 fp1_yearly.0085.c.tt_failure: "$fp1_yearly.0081.c.tt_failure$"
 fp1_yearly.0085.c.tt_failure.tt: "$fp1_yearly.0081.c.tt_failure.tt$"
 fp1_yearly.0085.d: "$fp1_yearly.0081.d$"
 fp1_yearly.0091.t: "Uma embarcação digna de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip]"
 fp1_yearly.0091.desc: "O barco de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] diz muito sobre [ROOT.Char.GetSheHe]. Ele revela sua riqueza, seu sucesso, a imagem que deseja projetar para o resto do mundo.\n\nOlho para minha embarcação atual e a acho... insuficiente. Como para reforçar a ideia, um pedaço da cordagem se solta com um estalo, e toda a embarcação range de forma sinistra ao redistribuir o peso.\n\nEncomendar um novo navio é simples o bastante, mas será que uma simples substituição basta? Não mereço uma embarcação que fale ao mundo sobre #EMP mim#!?"
 fp1_yearly.0091.a: "Um leviatã, para carregar meus espólios!"
 fp1_yearly.0091.b: "Um monstro, para intimidar meus vassalos!"
 fp1_yearly.0091.c: "Um dragão, para rugir meu nome!"
 fp1_yearly.0091.d: "Eu não preciso de uma embarcação cara."
 fp1_yearly.0101.t: "Um Jogo de Adivinhações"
 fp1_yearly.0101.desc: "Adivinhações são um passatempo amado entre os [ROOT.Char.GetCulture.GetNameNoTooltip]. Dois ou mais jogadores trocarão problemas cada vez mais difíceis, muitas vezes rimando e mergulhados em alegoria ou mito.\n\nEm um dia particularmente longo e preguiçoso, [riddler.Custom2('MyCharacterIntroduction',ROOT.Char)] pensa em me desafiar para um jogo, com o que deve ser metade das pessoas na corte assistindo."
 fp1_yearly.0101.a: "Você testa #EMP minha#! capacidade de fala? Isso vai ser divertido!"
 fp1_yearly.0101.a.tt_success: "Você vence o jogo"
 fp1_yearly.0101.a.tt_failure: "[riddler.GetFirstNameNoTooltip] te vence"
 fp1_yearly.0101.a.every_courtier_and_guest: "Cada [courtier|lE] e [guest|lE]"
 fp1_yearly.0101.b: "Acho que li alguns livros sobre adivinhações..."
 fp1_yearly.0101.c: "Para começar: quem não tem cérebro e está indo para a masmorra?"
 fp1_yearly.0101.c.tt: "As pessoas podem lembrar de sua reação exagerada..."
 fp1_yearly.0101.c.tt_nickname: "Seus cortesãos sussurram pelas suas costas..."
 fp1_yearly.0101.d: "Obrigado, mas eu sou um [ROOT.Char.GetTitleAsNameNoTooltip], e tenho coisas a fazer."
 fp1_yearly.0111.t: "Amaldiçoado[accursed.Custom('ES_OA')]"
 fp1_yearly.0111.desc.intro: "[accursed.GetTitledFirstName] permanece em silêncio enquanto caminho ao redor do tótem de pele de cavalo em frente aos seus aposentos, inspecionando-o de todos os ângulos. [accursed.GetSheHe|U] está certo, é uma maldição #EMP poderosa#! que ameaça sua própria vida.\n\nAs runas gravadas no mastro"
 fp1_yearly.0111.desc.skill.intrigue_high: "são #color_blue_gray intrincadas e floreadas, prometendo um destino retorcido e doloroso#!."
 fp1_yearly.0111.desc.skill.learning_high: "são #color_blue_gray profundas e manchadas de sangue, claramente trabalhadas por um feiticeiro erudito#!."
 fp1_yearly.0111.desc.skill.intrigue_low: "são #color_blue_gray cruéis, mas vagas, como se os pensamentos sanguinários do trapaceiro vagassem#!."
 fp1_yearly.0111.desc.skill.learning_low: "estão #color_blue_gray em mau estado e encharcadas de sangue, o sinal de um feiticeiro amador#!."
 fp1_yearly.0111.desc.skill.fallback: "são #color_blue_gray indecifráveis#!."
 fp1_yearly.0111.desc.first_connector: "O texto real da maldição"
 fp1_yearly.0111.desc.trait_1.lazy_or_arbitrary: "#color_blue_gray parece indeciso e preguiçoso#!,"
 fp1_yearly.0111.desc.trait_1.wrathful_or_impatient: "está #color_blue_gray fervilhando com uma raiva inquieta#!,"
 fp1_yearly.0111.desc.trait_1.calm_or_patient: "é #color_blue_gray quase assustadoramente calmo e insidioso#!,"
 fp1_yearly.0111.desc.trait_1.sadistic_or_arrogant: "#color_blue_gray fala de um grande ego ou de uma imaginação horripilante#!,"
 fp1_yearly.0111.desc.trait_1.callous_or_ambitious: "#color_blue_gray sugere uma completa falta de consideração pelos outros seres humanos#!,"
 fp1_yearly.0111.desc.trait_1.deceitful_or_craven: "#color_blue_gray se torce e se contorce repetidamente em si mesma#!,"
 fp1_yearly.0111.desc.trait_1.brave_or_trusting: "#color_blue_gray é audaciosa e marcante, confiante em sua justiça#!,"
 fp1_yearly.0111.desc.trait_1.paranoid_or_vengeful: "#color_blue_gray parece cheia de um ódio pessoal absoluto#!,"
 fp1_yearly.0111.desc.trait_1.fallback: "#color_blue_gray é uma bagunça aleatória#!,"
 fp1_yearly.0111.desc.second_connector: "terminando com uma nota"
 fp1_yearly.0111.desc.trait_2.lazy_or_arbitrary: "isso é algo de um anticlímax mal explicado#! de #color_blue_gray."
 fp1_yearly.0111.desc.trait_2.wrathful_or_impatient: "de raiva rabiscada às pressas#! de #color_blue_gray."
 fp1_yearly.0111.desc.trait_2.calm_or_patient: "de inevitabilidade aterrorizante#! de #color_blue_gray."
 fp1_yearly.0111.desc.trait_2.sadistic_or_arrogant: "de gênio horrível#! de #color_blue_gray."
 fp1_yearly.0111.desc.trait_2.callous_or_ambitious: "de finalidade brutal e indiferente#! de #color_blue_gray."
 fp1_yearly.0111.desc.trait_2.deceitful_or_craven: "de covardia torcida#! de #color_blue_gray."
 fp1_yearly.0111.desc.trait_2.brave_or_trusting: "de uma #color_blue_gray confiança sincera na perdição de [accursed.GetFirstNameNoTooltip]#!."
 fp1_yearly.0111.desc.trait_2.paranoid_or_vengeful: "que culpa [accursed.GetFirstNameNoTooltip] pelo seu destino#! de #color_blue_gray."
 fp1_yearly.0111.desc.trait_2.fallback: "de anticlímax#! de #color_blue_gray."
 fp1_yearly.0111.desc.outro: "\n\nNo tenemos ni testigos ni #color_blue_gray pruebas#!, salvo el propio poste."
 fp1_yearly.0111.tt.correct_guess: "Se o seu palpite estiver correto"
 fp1_yearly.0111.tt.wrong_guess: "Se o seu palpite estiver errado"
 fp1_yearly.0111.tt.correct_accusation: "Você encontra muitas provas da culpa de [culprit.GetFirstNameNoTooltip]"
 fp1_yearly.0111.tt.correct_accusation.tt: "[accursed.GetTitledFirstName] fica livre[accursed.Custom('ES_OA')] da maldição e ficará eternamente grato[accursed.Custom('ES_OA')]"
 fp1_yearly.0111.tt.false_accusation: "Suas acusações provam ser infundadas"
 fp1_yearly.0111.tt.false_accusation.tt: "[accursed.Custom('ES_ElLa')|U] [accursed.GetTitledFirstName|l] está convencido[accursed.Custom('ES_OA')] de que seu fim chegará de forma dolorosa em breve"
 fp1_yearly.0111.a: "Isso cheira a [suspect_a.GetTitledFirstNameNoTooltip|l]!"
 fp1_yearly.0111.b: "Talvez... [suspect_b.GetTitledFirstNameNoTooltip|l]..."
 fp1_yearly.0111.c: "[suspect_c.GetTitledFirstNameNoTooltip|l] parece provável."
 fp1_yearly.0111.d: "[accursed.GetFirstNameNoTooltip], você não vê que é tudo coisa da sua mente?"
 fp1_yearly.0111.d.tt_success: "Você acalma [accursed.GetFirstName]"
 fp1_yearly.0111.d.tt_failure: "[accursed.GetFirstName] sofre um colapso mental"
 fp1_yearly.0111.e: "Não se preocupe, eu tenho um contra-feitiço!"
 ##################################################
 ##Flavour Events
 fp1_yearly.0501.t: "Em um passeio de barco"
 fp1_yearly.0501.desc: "Há muitas razões para navegar pelas águas próximas a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTier] em tempos de paz: para mostrar poder, dissuadir piratas, até mesmo simplesmente pescar ou apreciar a brisa do mar.\n\nDurante uma dessas viagens insignificantes, avisto ao longe uma embarcação local afundando.\n\nMesmo daqui, está claro que ela sofreu danos enquanto estava em incursões, e sua tripulação mal consegue mantê-la à tona, retirando água com taças de prata e tigelas de cerâmica. A cena seria cômica se não fosse tão grave."
 fp1_yearly.0501.a: "Pare e tente ajudá-los!"
 fp1_yearly.0501.a.tt_success: "Você salva a tripulação"
 fp1_yearly.0501.a.tt_failure: "O navio afunda com todos a bordo"
 fp1_yearly.0501.b: "Podemos ficar com o saque se matarmos os sobreviventes..."
 fp1_yearly.0501.b.tt_success: "Você aborda o barco facilmente"
 fp1_yearly.0501.b.tt_failure: "Os sobreviventes escapam para a costa"
 fp1_yearly.0501.c: "Vamos apenas continuar navegando."
 fp1_yearly.0511.t: "O Cheiro do Sucesso"
 fp1_yearly.0511.desc: "#EMP O cheiro é completamente insuportável#!.\n\nJá faz um mês que [stinker.GetFirstName] matou esse tal [ROOT.Char.Custom('GetAnimalType')] numa caçada e #EMP ainda#! está carregando a cabeça cheia de larvas consigo.\n\nTodos em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTier] estão enjoados, mas [stinker.GetSheHe] se recusa a se livrar dessa maldita coisa.\n\nParece que o resto da corte finalmente se fartou e obrigou [stinker.GetHerHim] a vir até mim para que eu dê meu veredito."
 fp1_yearly.0511.a: "É muito legal, [stinker.GetFirstNameNoTooltip]. Muito, muito legal."
 fp1_yearly.0511.b: "Pelo [ROOT.Char.GetFaith.HighGodName], [ROOT.Char.GetFaith.HealthGodName] e [ROOT.Char.GetFaith.HouseholdGodName] também, se #EMP livre#! disso!"
 fp1_yearly.0511.c: "$fp1_berserk_roar_evtopt$"
 fp1_yearly.0511.d: "E se conseguíssemos um #EMP novo#! troféu amanhã à noite?"
 fp1_yearly.0511.e: "Sim, [stinker.GetFirstNameNoTooltip], é repugnante. Agora por favor saia."
 fp1_yearly.0521.t: "Sangue na Neve"
 fp1_yearly.0521.desc: "Vem do nada e me acerta em cheio na têmpora. Eu nem vi o projétil chegando, muito menos tentei desviar, e por um momento cambaleio, cegad[ROOT.Char.Custom('ES_OA')].\n\nRisadinhas agudas ecoam atrás de mim, e eu me viro.\n\n[child.GetFirstName] se levanta do seu esconderijo, com outra bola de neve já agarrada em sua mãozinha maldosa."
 fp1_yearly.0521.a: "Bom arremesso! Venha aqui, seu pestinha!"
 fp1_yearly.0521.a.tt: "Você e [child.GetFirstNameNoTooltip] jogam bolas de neve até as pontas dos dedos congelarem"
 fp1_yearly.0521.b: "#EMP Ah! Não! Você me pegou!#!"
 fp1_yearly.0521.b.tt: "Você deixa que [child.GetFirstNameNoTooltip] te bombardeie até ficar satisfeit[child.Custom('ES_OA')]"
 fp1_yearly.0521.c: "Você acha que pode enfrentar #EMP a mim#! numa #EMP guerra de neve#!?"
 fp1_yearly.0521.c.tt: "¡Criança[child.Custom('ES_OA')] ou não, esta é uma batalha e você pretende vencer!"
 fp1_yearly.0521.c.tt_success: "Você consegue derrotar [child.Custom('ES_AlAla')] crianç[child.Custom('ES_OA')]"
 fp1_yearly.0521.c.tt_failure: "[child.GetFirstNameNoTooltip] te derrota"
 fp1_yearly.0521.d: "Isso é uma emboscada? #EMP Verdadeira#! estratégia exige #EMP astúcia#!!"
 fp1_yearly.0521.d.tt: "Você vence a batalha de bolas de neve sem esforço"
 fp1_yearly.0521.e: "$fp1_berserk_roar_evtopt$"
 fp1_yearly.0521.e.tt: "A bola de neve acende sua fúria descontrolada"
 fp1_yearly.0521.f: "[child.GetFirstNameNoTooltip], estou ocupad[ROOT.Char.Custom('ES_OA')]. Vá incomodar outra pessoa."
 fp1_yearly.0531.t: "A Família [ROOT.Char.GetDynasty.GetBaseNameNoTooltip] no Gelo"
 fp1_yearly.0531.desc: ""[ROOT.Char.Custom('GetMaPa')|U]!", grita [child.GetFirstName], puxando minha manga assim que entramos no lago. "É inútil, não valho para nada. Não consigo patinar, o gelo me odeia".\n\nUm olhar rápido indica que ele pode estar certo: o lugar parece que um exército passou por aqui, vendo a quantidade de gelo quebrado que meu [child.Custom('GetDaughterSon')] deixou em seu rastro."
 fp1_yearly.0531.a: "É fácil! Aqui, deixe-me explicar para você..."
 fp1_yearly.0531.a.tt_success: "[child.GetFirstNameNoTooltip] ganha confiança e equilíbrio"
 fp1_yearly.0531.a.tt_failure: "Você só frustra[child.GetHerHim] ainda mais"
 fp1_yearly.0531.b: "Não temos servos para você perturbar?"
 fp1_yearly.0531.c: "Vá brincar dentro de casa, você vai pegar um resfriado."
 fp1_yearly.0541.t: "A Besta de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]"
 fp1_yearly.0541.desc: ""Meu [ROOT.Char.GetTitleAsNameNoTooltip]", bufa [courtier.Custom('ES_ElLa')] [courtier.GetTitledFirstName|l] enquanto se aproxima de mim, puxando pela orelha do meu [child.Custom('GetDaughterSon')] [child.GetFirstName].\n\n"Est[child.Custom('ES_EA')] maldit[child.Custom('ES_OA')] cria[child.Custom('ES_OA')] tem estado se escondendo nos cantos, usando uma pele de [ROOT.Char.Custom('GetAnimalType')] como fantasia, só para saltar de repente e assustar até a alma das pessoas!""
 fp1_yearly.0541.a: "Isso é, honestamente, muito engraçado."
 fp1_yearly.0541.b: "[child.GetFirstNameNoTooltip], você precisa ser punido."
 fp1_yearly.0541.c: "Você incomoda #EMP meu#! [child.Custom('GetDaughterSon')]? Você está exilado!"
 fp1_yearly.0541.d: "Realmente, #EMP profundamente#! não me importo."
 fp1_yearly.0551.t: "Negócios Suspeitos"
 fp1_yearly.0551.desc: "Começou como um agrado ocasional. Um hábito incomum, mas somos uma pessoa da cultura [ROOT.Char.GetCulture.GetNameNoTooltip], e quem de nós nunca comeu algum arenque de procedência duvidosa em sua vida?\n\nNo entanto, nas últimas semanas, a predileção de [antisocialite.GetTitledFirstName|l] por peixe completamente #EMP podre#! passou de uma mania tolerável a uma onipresença pungente.\n\nEsta manhã, quando descobri o que havia feito com a latrina, decidi que já tinha tido o bastante. [antisocialite.Custom('ES_LoLa')|U] encontrei no corredor, o rosto encharcado em salmoura fétida, com meio olho de peixe escorrendo preguiçosamente por seu queixo."
 fp1_yearly.0551.a: "Sente-se, [antisocialite.GetFirstNameNoTooltip]. Precisamos conversar."
 fp1_yearly.0551.a.tt_success: "Você expressa seu ponto de vista com eloquência"
 fp1_yearly.0551.a.tt_failure: "[antisocialite.GetFirstNameNoTooltip] se sente extremamente ofendid[antisocialite.Custom('ES_OA')]"
 fp1_yearly.0551.b: "Talvez eu possa simplesmente mudar de quarto?"
 fp1_yearly.0551.b.tt: "[antisocialite.GetFirstNameNoTooltip] continuará a fedorentar o lugar"
 fp1_yearly.0551.b_alt: "Hum... você tem mais disso?"
 fp1_yearly.0551.b_alt.tt: "Você e [antisocialite.GetFirstNameNoTooltip] vão fedorentar juntos"
 fp1_yearly.0551.c: "Sabe de uma coisa? Para a masmorra. #EMP Agora#!."
 fp1_yearly.0551.d: "Qué pena! Resulta que precisan mi atención muy #EMP lejos#!!"
 fp1_yearly.0561.t: "Meu Braço Contra o Seu"
 fp1_yearly.0561.desc: ""O que você me diz, [ROOT.Char.GetFirstNameNoTooltip]?", arrota [knight.Custom2('MyCharacterIntroduction', ROOT.Char)] entre goles do caneco. Aquele [knight.Custom('GetYoungMiddleAgedOld')] flexiona os músculos com orgulho.\n\n"Acha que consegue me vencer na queda de braço? Vamos, melhor de três".\n\nA colher para no caminho até minha boca, mas a taverna explode em vivas atrevidos e gritos, e membros menos importantes da minha comitiva estão ansiosos para presenciar o confronto."
 fp1_yearly.0561.a: "Você me desafia?"
 fp1_yearly.0561.a.tt_success: "Você vence [knight.GetFirstNameNoTooltip]"
 fp1_yearly.0561.a.tt_failure: "[knight.GetFirstNameNoTooltip] vence"
 fp1_yearly.0561.b: "#EMP estala os dedos#!"
 fp1_yearly.0561.b.tt: "Você vence facilmente três vezes seguidas"
 fp1_yearly.0561.c: "Claro, eu conheço um truque ou dois..."
 fp1_yearly.0561.c.tt_success: "Você trapaceia e vence dramaticamente"
 fp1_yearly.0561.c.tt_failure: "[knight.GetFirstNameNoTooltip] descobre sua duplicidade"
 fp1_yearly.0561.d: "[knight.GetFirstNameNoTooltip], estou comendo. Vá incomodar outra pessoa."
 fp1_yearly.0571.t: "Vandalismo Mesquinho"
 fp1_yearly.0571.desc: "«[ROOT.Char.GetTitledFirstNameNoTooltip]!» grita [courtier.Custom2('MyCharacterIntroduction', ROOT.Char)]. Atrás de [courtier.GetSheHe], arrasta a minha [child.Custom('GetDaughterSon')] [child.GetFirstName]. Estão tão ocupados rosnando um com o outro que mal me olham no rosto.\n\n«Descobri es[child.Custom('ES_EA')] fedelho[child.Custom('ES_OA')] rabiscando sua pedra rúnica em [vandal_site.GetNameNoTier], desenhando genitais nos wyrms e gravando obscenidades no lugar das palavras»."
 fp1_yearly.0571.a: "Deixe a [child.Custom('ES_AlAla')] [child.Custom('GirlBoy')] comigo, vou conversar com [child.GetSheHe]."
 fp1_yearly.0571.tt_success: "[child.GetFirstNameNoTooltip] vê o erro de seus caminhos"
 fp1_yearly.0571.tt_failure: "[child.GetFirstNameNoTooltip] não entende qual é o problema"
 fp1_yearly.0571.b: "Vou cobrar o custo dos reparos de #EMP suas#! coisas, [child.GetFirstNameNoTooltip]!"
 fp1_yearly.0571.b.tt: "A pedra rúnica é reparada"
 fp1_yearly.0571.b.2: "Está tudo bem, eu posso pagar por isso."
 fp1_yearly.0571.c: "Não é mais que um[child.Custom('ES_XA')] crianç[child.Custom('ES_OA')] , acalme-se, [courtier.GetFirstNameNoTooltip]."
 fp1_yearly.0581.t: "Quando Eu Crescer"
 fp1_yearly.0581.desc.intro: "Uma dor repentina e aguda na parte de trás da minha canela é acompanhada por um grito aterrorizante atrás de mim. Viro-me, list[ROOT.Char.Custom('ES_OA')] para me defender, e me deparo com a figura diminuta de [child.GetFirstName] brandindo um robusto pedaço de madeira como porrete."
 fp1_yearly.0581.desc.victim: "Atrás [child.GetSheHe] sorri com desdém [victim.Custom2('MyCharacterIntroduction', ROOT.Char)]."
 fp1_yearly.0581.desc.outro: "\n\n"Temam-me! O/a temível viking[child.Custom('ES_OA')] [child.GetFirstNameNoTooltip] veio em busca do teu ouro e dos teus monges!", grita meu[child.Custom('GetDaughterSon')], e me dá uma pancada no joelho. Seu capacete de lata desliza sobre os olhos, então tudo o que posso ver é seu sorriso banguela.\n\n"[ROOT.Char.Custom('GetMaPa')|U], poderei ser [child.Custom('ShieldPersonFemaleMale')] quando crescer?"."
 fp1_yearly.0581.a: "Filh[child.Custom('ES_OA')] minha[child.Custom('ES_OA')], farás #EMP temblar#! o mundo inteiro."
 fp1_yearly.0581.a.tt: "[child.GetFirstNameNoTooltip] é significativamente mais propenso(a) a se tornar uma [GetTrait('shieldmaiden').GetName(child.Self)]"
 fp1_yearly.0581.b: "Um objetivo nobre! En garde, canalha![child.Custom('ES_OnOna')]"
 fp1_yearly.0581.b.tt: "$fp1_yearly.0581.a.tt$"
 fp1_yearly.0581.c: "Talvez, se você se provar contra [victim.GetFirstNameNoTooltip]..."
 fp1_yearly.0581.d: "Pare de me incomodar com sonhos tolos."
 fp1_yearly.0581.e: "Ha! Veremos, pequenino[child.Custom('ES_OA')]."
 fp1_yearly.0591.t: "Vozes Elevadas na Reunião Ting"
 fp1_yearly.0591.desc: "As reuniões do ting são uma tarefa necessária para qualquer [ROOT.Char.GetTitleAsNameNoTooltip] decente, e todas as pessoas livres da região comparecem para discutir assuntos locais, comerciar e disputar um ou outro privilégio.\n\nComo era de se esperar em reuniões tão grandes, elas costumam esquentar, e este ting não é exceção.\n\nTenho dificuldade em acompanhar os detalhes em meio a tantos gritos, mas parece que as pessoas do [county_a.GetNameNoTier]"
 fp1_yearly.0591.desc.border_dispute: "estão discutindo sobre uma vila ao longo da fronteira com [county_b.GetNameNoTier], com ambos os grupos reivindicando a terra."
 fp1_yearly.0591.desc.stolen_flocks: "acusam um magnata proeminente de [county_b.GetNameNoTier] de roubar seus rebanhos."
 fp1_yearly.0591.desc.kidnapped_child: "estão gritando com seus colegas de [county_b.GetNameNoTier] por supostamente sequestrar uma criança."
 fp1_yearly.0591.desc.drunken_arson: "protestam por sua inocência em uma série de incêndios criminosos cometidos por alcoólatras em [county_b.GetNameNoTier]."
 fp1_yearly.0591.desc.lost_dog: "afirmam que o cão icônico de uma vila foi roubado por desordeiros ciumentos de [county_b.GetNameNoTier]."
 fp1_yearly.0591.desc.disrupted_wedding: "exigem restituição por um casamento que foi jogado no caos por convidados bêbados de [county_b.GetNameNoTier]."
 fp1_yearly.0591.desc.suspicious_will: "estão insistindo na validade de um testamento que deixa grandes faixas de terra para eles em [county_b.GetNameNoTier]."
 fp1_yearly.0591.desc.sheltered_criminal: "deram abrigo a um criminoso de [county_b.GetNameNoTier]."
 fp1_yearly.0591.desc.bad_luck: "estão chorando que foram enfeitiçados e amaldiçoados por conjuradores de [county_b.GetNameNoTier]."
 fp1_yearly.0591.desc.fly_tipping: "estão sendo teimosos ao despejar lixo de uma cidade ao longo da fronteira com [county_b.GetNameNoTier]."
 fp1_yearly.0591.a: "O povo de [county_a.GetNameNoTierNoTooltip] está correto."
 fp1_yearly.0591.b: "[county_b.GetNameNoTierNoTooltip] tem meu apoio!"
 fp1_yearly.0591.c: "As boas gentes de [county_a.GetNameNoTierNoTooltip] aceitarão que os de #EMP [county_b.GetNameNoTierNoTooltip]#! façam isso com elas?"
 fp1_yearly.0591.d: "Todos eles vão cansar eventualmente."
 fp1_yearly.0601.t: "A Parte Mais Difícil de Governar"
 fp1_yearly.0601.desc: "Por sua própria natureza, os Ting podem muitas vezes ser #EMP extremadamente#! entediantes.\n\nSe os ânimos não se exaltam e ninguém faz drama, então é apenas uma longa lista de pessoas livres de baixo escalão discutindo assuntos mesquinhos e ficando na chuva. Ainda assim, como [ROOT.Char.GetTitleAsNameNoTooltip] estou obrigad[ROOT.Char.Custom('ES_OA')]o a estar aqui.\n\nEnvelhecendo a cada segundo.\n\nVendo as pessoas de [county.GetNameNoTier] discutirem entre si até a morte.\n\nDesejando que uma guerra me salve deste inferno em vida."
 fp1_yearly.0601.a: "Preciso ficar acordad[ROOT.Char.Custom('ES_OA')]"
 fp1_yearly.0601.a.tt_success: "Você se esforça e permanece sereno[ROOT.Char.Custom('ES_OA')]"
 fp1_yearly.0601.a.tt_failure: "Você cai de sua cadeira."
 fp1_yearly.0601.b: "Eu poderia estar fazendo coisas tão úteis com esse tempo..."
 fp1_yearly.0601.c: "$fp1_yearly.0601.b$"
 fp1_yearly.0601.d: "$fp1_yearly.0601.b$"
 fp1_yearly.0601.e: "$fp1_yearly.0601.b$"
 fp1_yearly.0601.f: "$fp1_yearly.0601.b$"
 fp1_yearly.0601.g: "Isso é inútil, vou tirar uma soneca."
 fp1_yearly.0601.g.nickname: "Suas palhaçadas resultam em um novo apelido"
 fp1_yearly.0611.t: "Liderando pelo Exemplo"
 fp1_yearly.0611.desc: ""[ROOT.Char.Custom('GetMaPa')|U]!", grita [child_b.GetFirstNameNoTooltip], correndo em minha direção com um [child_a.Custom('ES_XA')] [child_a.GetFirstNameNoTooltip] com cara de culpado atrás. Um grande corte desfigura o rosto do meu [child_b.Custom('GetDaughterSon')], superficial, mas que ainda sangra. "[child_a.GetFirstNameNoTooltip] me acertou com uma espada #EMP de verdade#! Disse que queria ser um [child_a.Custom('ES_XA')] guerreir[child_a.Custom('ES_OA')] como você!".\n\n[child_a.GetFirstNameNoTooltip] não consegue me olhar nos olhos.\n\n"Foi um acidente. Só estávamos brincando...""
 fp1_yearly.0611.a: "Escucha, ¡la #EMP guerra#! no es un #EMP juego#!!"
 fp1_yearly.0611.a.tt_success: "[child_a.GetFirstNameNoTooltip] entende e pede desculpas"
 fp1_yearly.0611.a.tt_failure: "Apenas falar gera sentimentos de amargura"
 fp1_yearly.0611.b: "Ha! Você está seguindo os passos do seu velho [ROOT.Char.Custom('GetMaPa')], [child_a.GetFirstNameNoTooltip]!"
 fp1_yearly.0611.c: "Certo, [child_b.GetFirstNameNoTooltip], deixe-me te ensinar a se defender de valentões."
 fp1_yearly.0611.d: "Crianças, levem isso para a sua enfermeira."
 fp1_yearly.0621.t: "Um Brinquedo Novo e Brilhante"
 fp1_yearly.0621.desc: "Estamos descarregando o último dos saques dos navios quando minha [child.Custom('GetDaughterSon')] [child.GetFirstName], tod[child.Custom('ES_OA')] sorrisos e pedindo histórias. Quantas pessoas eu derrubei? Quando poderá vir em uma incursão? Vi dragões marinhos?\n\nO aluvão de perguntas não termina até que veja uma enorme taça de prata em cima do maior dos baús do tesouro, com o sangue seco de seu antigo dono ainda descascando de leve pela lateral.\n\n[ROOT.Char.Custom('GetMaPa')|U], é linda! Pos... posso ficar com ela?"
 fp1_yearly.0621.a: "Claro que pode pegá-lo!"
 fp1_yearly.0621.b: "Nada agora: talvez quando for mais velho, possa ganhar o seu próprio."
 fp1_yearly.0621.c: "Fora daqui! Isso é para os adultos!"
 fp1_yearly.0631.t: "Uma Tendência Cínica"
 fp1_yearly.0631.desc: "Ao voltar de uma incursão bem-sucedida, todo bom membro da cultura [ROOT.Char.GetCulture.GetNameNoTooltip] sabe que precisa sacrificar uma parte de seus ganhos a [ROOT.Char.GetFaith.PantheonTerm].\n\nTodos menos [cynic.GetTitledFirstName|l], claro.\n\nEnquanto o resto de nós divide os despojos, vangloriando-nos de nossas melhores peças e discutindo qual entregaremos em agradecimento pela boa sorte e pelos ventos favoráveis, percebo que [cynic.GetSheHe] permanece em silêncio.\n\nAo confrontar a questão, ele até admite: "Não vi a mão de [cynic.GetFaith.PantheonTerm] em nossa incursão, meu [ROOT.Char.GetTitleAsNameNoTooltip], apenas as minhas mãos fazendo o meu trabalho. Minha parte é só minha"."
 fp1_yearly.0631.a: "[cynic.GetFirstNameNoTooltip], você está quase blasfemando!"
 fp1_yearly.0631.a.tt_success: "Você consegue envergonhar[cynic.GetHerHim]"
 fp1_yearly.0631.a.tt_failure: "[cynic.GetFirstNameNoTooltip] faz você parecer um tolo"
 fp1_yearly.0631.b: "Hmm, boa ideia. Toda ajuda é bem-vinda..."
 fp1_yearly.0631.c: "Ah, não é da minha conta."
 fp1_yearly.0641.t: "Digno do Oceano"
 fp1_yearly.0641.desc: "Nossos navios são, em muitos sentidos, o coração do poder de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip]. Sem acesso ao mar, o que somos senão lobos encurralados, incapazes de caçar ou vagar?\n\nÉ com não pouca apreensão, então, que minha última inspeção de nossos barcos armazenados mostra que muitos estão começando a mofar e apodrecer; seus cascos cuidadosamente calafetados correm o risco de se desfazer quando voltarem à água."
 fp1_yearly.0641.a: "Não deve custar tanto para consertá-los..."
 fp1_yearly.0641.a.tt: "Os navios são reparados sem problemas"
 fp1_yearly.0641.b: "Não tem [neighbour.GetTitledFirstNameNoTooltip|l] uma frota novinha em folha?"
 fp1_yearly.0641.b.tt_success: "Você consegue roubar de [neighbour.GetFirstNameNoTooltip] seus melhores navios"
 fp1_yearly.0641.b.tt_failure: "Você é pego e tem que fugir"
 fp1_yearly.0641.c: "Vai economizar a longo prazo pagar pelo melhor agora."
 fp1_yearly.0641.d: "Ah, deixe-os apodrecer. Qual é o problema?"
 fp1_yearly.0651.t: "Leviatã"
 fp1_yearly.0651.desc: "É próprio de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] forte passar tempo no mar, sentir o ar salgado no rosto e ter um bom navio sob os pés. Hoje, minha embarcação pessoal e um pequeno esquadrão de escolta saíram para exercícios, prática e prazer.\n\nA breve viagem foi uma mudança de ritmo revigorante em relação à vida na minha [ROOT.Char.Custom('GetCourt')]. De repente, avistamos: uma distante coluna de água, seguida por uma pequena ilha de carne cor de vinho que emerge das ondas.\n\nA maior besta das profundezas.\n\nUma #EMP baleia#!."
 fp1_yearly.0651.a: "Peguem as arpoadas!"
 fp1_yearly.0651.a.tt_success: "Você mata a baleia e a leva para a costa"
 fp1_yearly.0651.a.tt_failure: "A besta escapa de você"
 fp1_yearly.0651.b: "Deixem os outros lidarem com isso, apenas me tragam o cadáver."
 fp1_yearly.0651.c: "Que presa #EMP magnífica#!"
 fp1_yearly.0651.c.tt: "Você enfrenta um #EMP verdadeiro#! leviatã dos abismos"
 fp1_yearly.0651.c.tt_success: "$fp1_yearly.0651.a.tt_success$"
 fp1_yearly.0651.c.tt_failure: "$fp1_yearly.0651.a.tt_failure$"
 fp1_yearly.0651.d: "Uma criatura de majestade temível, deixe-a ir."
 fp1_yearly.0651.d.tt: "A baleia vai livre"
 fp1_yearly.0661.t: "Um Desafio Novo"
 fp1_yearly.0661.desc: "«O que eu estou dizendo, [ROOT.Char.GetTitledFirstNameNoTooltip|l], é que esquis são divertidos mesmo sem caçar. Não deveria ser tão incomum esquiar pelo simples prazer de fazê-lo, e não apenas pela utilidade», diz [knight.GetTitledFirstName|l] durante o jantar.\n\nÉ como se eu tivesse passado a vida inteira nessa conversa. A obsessão de est[knight.Custom('ES_EA')] [knight.GetWomanMan] é obsessão.\n\n«Devíamos tentar agora, enquanto a neve está espessa e fresca! Há uma colina íngreme não muito longe daqui. Aposto que consigo chegar lá embaixo antes de você, e nós dois vamos nos divertir muito!»"
 fp1_yearly.0661.a: "Que incomum! Eu aceito."
 fp1_yearly.0661.a.tt_success: "É por pouco, mas você vence!"
 fp1_yearly.0661.a.tt_failure: "[knight.GetFirstNameNoTooltip] escorrega para a vitória"
 fp1_yearly.0661.a.2: "Na neve? Eu aceito."
 fp1_yearly.0661.a.2.tt: "Você vence facilmente"
 fp1_yearly.0661.b: "Hmm, talvez eu pudesse usar uma pequena #EMP vantagem#!..."
 fp1_yearly.0661.b.tt_success: "Você marca uma vitória #EMP sem esforço#!"
 fp1_yearly.0661.b.tt_failure: "Você é flagrado danificando os esquis de [knight.GetFirstNameNoTooltip]"
 fp1_yearly.0661.c: "#EMP Competir#! esquiando? Sem caça? Parece chato."
 fp1_yearly.0671.t: "Uma Escorregada Perigosa"
 fp1_yearly.0671.desc: ""[ROOT.Char.Custom('GetMaPa')|U]!", grita [child.GetFirstNameNoTooltip] diretamente no meu ouvido. Abro os olhos a contragosto, um de cada vez. Essa é uma forma de acordar, suponho.\n\nMeu menin[child.Custom('ES_OA')] pequen[child.Custom('ES_OA')] treme de empolgação, enquanto aperta com força suas luvas e uma bandeja de madeira cara.\n\n"Está nevando lá fora e eu quero descer de #EMP trenó#!! Você me leva?"."
 fp1_yearly.0671.a: "Hah, deixe-me arranjar uma mesa para nós!"
 fp1_yearly.0671.b: "Vamos, vamos pegar uma bandeja com os cozinheiros!"
 fp1_yearly.0671.c: "Vá pedir a seu [sibling.Custom('SisterBrother')]."
 fp1_yearly.0671.d: "Vá embora, [ROOT.Char.GetMotherFather] está descansando."
 fp1_yearly.0681.t: "Por que não posso irá"
 fp1_yearly.0681.desc: "Meus $knight_culture_player_plural_no_tooltip_lowercase$ e eu estamos aproveitando uma bela noite em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], compartilhando histórias de velhas batalhas e incursões passadas, rindo, nos gabando e, em geral, afundando na bebida. Um bom momento, no fim das contas.\n\nCom dificuldade, avisto uma sombra rondando a porta do meu gabinete e chamo o intruso para entrar. Mãos voam para as empunhaduras por toda a sala.\n\nEm vez de um assassino, surge meu [child.Custom('GetDaughterSon')] [child.GetFirstName], com expressão determinada, cerrando fortemente [child.Custom('FistFists')].\n\n"[ROOT.Char.Custom('GetMaPa')|U], eu também quero sair em incursões também! Não é justo que eu fique de fora só porque sou jovem!"."
 fp1_yearly.0681.a: "Vou deixar você para proteger [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], está bem?"
 fp1_yearly.0681.b: "#EMP Ha!#! Nunca será um[child.Custom('ES_XA')] #EMP verdadeir[child.Custom('ES_OA')]#! guerreir[child.Custom('ES_OA')], pirralh[child.Custom('ES_XA')]."
 fp1_yearly.0681.b.haughty_knights: "Cada cavaleiro arrogante [knight|lE]"
 fp1_yearly.0681.c: "Nós falaremos sobre isso quando você for mais velho."
 fp1_yearly.0691.t: "Tentativa de Expiação"
 fp1_yearly.0691.desc: "É tarde quando [knight.GetTitledFirstName|l] se aproxima a mim com uma bolsa cheia nas costas.\n\n[ROOT.Char.GetTitledFirstNameNoTooltip|l], sinto muito ter de lhe dizer isto, mas não posso continuar a seu serviço.\n\nDesde a incursão em [county.GetNameNoTier], tenho sido consumido pela culpa por meus atos, e meus servos de fé [knight.GetFaith.GetAdherentName] me dizem que somente ao aceitar [knight.GetFaith.HighGodName] em meu coração minha alma poderá ser salva.\n\nÉ com o coração pesado que devo deixar vossa corte pecaminosa e as coisas terríveis que faço a vosso serviço."
 fp1_yearly.0691.a: "Certamente posso convencê-lo desta fé estrangeira?"
 fp1_yearly.0691.a.tt_success: "Você traz [knight.GetFirstNameNoTooltip] de volta à luz"
 fp1_yearly.0691.a.tt_failure: "[knight.GetSheHe|U] se recusa a ver a razão"
 fp1_yearly.0691.b: "[knight.GetFaith.GetReligion.GetNameNoTooltip]? Você ficou louco. Guardas!"
 fp1_yearly.0691.b.same_faith_courtiers_and_guests: "[courtiers|E] e [guests|lE] do mesmo [faith|lE]"
 fp1_yearly.0691.c: "Você pode partir se quiser."
 ##################################################
 ##Special Events
 fp1_yearly.1001.t: "Estranho na Corte"
 fp1_yearly.1001.desc.intro: "Tenho visto várias vezes nos últimos dias um[stranger.Custom('ES_XA')] misterioso[stranger.Custom('ES_OA')] vagabundo[stranger.Custom('ES_OA')] na corte: [stranger.GetFirstName]. Mas não me lembro do rosto dele nem de seu anúncio de chegada.\n\n"
 fp1_yearly.1001.desc.behaviour_1.sneaks: "Move-se furtivamente pelo local,"
 fp1_yearly.1001.desc.behaviour_1.leaves_early: "Sempre vai embora cedo do jantar,"
 fp1_yearly.1001.desc.behaviour_1.earnest: "Passa horas tendo conversas sérias com cortesãos,"
 fp1_yearly.1001.desc.behaviour_1.confident: "Caminha com confiança #EMP por todas partes#!,"
 fp1_yearly.1001.desc.behaviour_1.talkative: "Passa horas conversando com qualquer um,"
 fp1_yearly.1001.desc.behaviour_1.eats_their_fill: "Nunca deixa sequer uma migalha sem comer no jantar,"
 fp1_yearly.1001.desc.behaviour_2.sneaks: "e se esgueira pelo lugar até tarde da noite."
 fp1_yearly.1001.desc.behaviour_2.leaves_early: "e nunca fica mais tempo no jantar do que o necessário."
 fp1_yearly.1001.desc.behaviour_2.earnest: "e passa horas tendo conversas sérias com meus cortesãos."
 fp1_yearly.1001.desc.behaviour_2.confident: "e caminha com confiança #EMP por toda parte#!."
 fp1_yearly.1001.desc.behaviour_2.talkative: "e passa horas conversando com qualquer pessoa que cruzar o seu caminho."
 fp1_yearly.1001.desc.behaviour_2.eats_their_fill: "e nunca deixa um bocado sem comer no jantar."
 fp1_yearly.1001.desc.outro: "Pode ser que não seja nada, mas há algo em [stranger.GetSheHe] que me arrepia até os ossos.\n\nQue travessura um andarilho pode aprontar em um ou dois dias?"
 fp1_yearly.1001.probably_harmless.tt: "Isso terá efeitos mínimos."
 fp1_yearly.1001.guest_of_honour.tt: "Esto tendrá efectos #EMP dramáticos#!"
 fp1_yearly.1001.mysterious_stranger_disappears.tt: "O estranho misterioso desaparece..."
 fp1_yearly.1001.a: "Provavelmente é inofensiv[stranger.Custom('ES_OA')]."
 fp1_yearly.1001.b: "Um[ROOT.Char.Custom('ES_XA')] vagabund[ROOT.Char.Custom('ES_OA')]? Eu [stranger.GetHerHim|U] transformarei em meu convidado de honra!"
 fp1_yearly.1001.c: "Guardas! Expulsem ess[stranger.Custom('ES_EA')] mendig[stranger.Custom('ES_OA')]!"
 fp1_yearly.1011.t: "$fp1_yearly.1001.t$: Goði"
 fp1_yearly.1011.desc.critical_preamble: "A estranheza de [stranger.GetNameNoTooltip] cresce em proporção ao bom tratamento recebido, mas suas excentricidades nunca se tornam alarmantes. Depois de decidir deixar assim, fico chocado quando [stranger.GetNameNoTooltip] aparece uma noite, sem aviso, em meus aposentos privados.\n\n"
 fp1_yearly.1011.desc.critical_epilogue: "\n\nE assim, [stranger.GetNameNoTooltip] some, e instintivamente sei que, quando amanhecer, não restará nenhum vestígio de [stranger.GetSheHe]."
 fp1_yearly.1011.desc.standard_preamble: "[stranger.GetNameNoTooltip] segue rondando pela corte, mas parece que o pior que faz é apenas deixar as pessoas desconfortáveis, no máximo. Até a noite em que aparece em meus aposentos privados depois do anoitecer, claro.\n\n"
 fp1_yearly.1011.desc.standard_epilogue: "\n\nTão rapidamente quanto chegou, [stranger.GetFirstNameNoTooltip] se desvanece novamente nas sombras. As equipes de busca não encontram nada, nem um fio, e eu fico sem nada além de perguntas."
 fp1_yearly.1011.desc.separate_religion.critical: "$fp1_yearly.1011.desc.critical_preamble$«¡Incrédul[ROOT.Char.Custom('ES_OA')]!», grita semejante ingrato[stranger.Custom('ES_OA')]. «¿Crees que puedes comprar mi fe con buenos modales y almohadas de plumas? ¡Soy de verdadera estirpe [stranger.GetFaith.GetAdjectiveNoTooltip] y nunca abandonaré a los antiguos dioses! Es más, ¡le diré a todos tus [ROOT.Char.GetFaith.PriestNeuterPlural] [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip] que has albergado a un[stranger.Custom('ES_XA')] pagano[stranger.Custom('ES_OA')]!».$fp1_yearly.1011.desc.critical_epilogue$"
 fp1_yearly.1011.desc.separate_religion.standard: "$fp1_yearly.1011.desc.standard_preamble$«Se eu fosse um[stranger.Custom('ES_XA')] [stranger.GetWomanMan] menosprezado[stranger.Custom('ES_OA')] , eu te mataria aqui e agora por tua fé blasfema. Por sorte para ti, minha honra vale mais do que tua vida, e me contentei em espalhar a palavra de [stranger.GetFaith.HighGodName] pela tua corte».$fp1_yearly.1011.desc.standard_epilogue$"
 fp1_yearly.1011.desc.same_religion.critical: "$fp1_yearly.1011.desc.critical_preamble$\"Você adora os deuses pobremente, [ROOT.Char.GetFirstNameNoTooltip], mas os honra bem. Por mais que sua fé ofenda os Aesir, você agradou o Enforcado, e eu, Grímnir, deixarei os [stranger.GetFaith.PriestNeuterPlural] da terra saberem.\"$fp1_yearly.1011.desc.critical_epilogue$"
 fp1_yearly.1011.desc.same_religion.standard: "$fp1_yearly.1011.desc.standard_preamble$"Você adora mal os deuses e é incapaz de ver a verdadeira divindade, mesmo quando Grimnir caminha por seus corredores e se senta à sua mesa. Eu tenho pena de você, pobre [ROOT.Char.GetWomanMan], pois #EMP nunca#! jamais verá meus salões de Valhala!"$fp1_yearly.1011.desc.standard_epilogue$"
 fp1_yearly.1011.desc.same_faith.critical: "$fp1_yearly.1011.desc.critical_preamble$"Sua hospitalidade é louvável, [ROOT.Char.GetFirstNameNoTooltip], e vejo que você é sagaz, devot[ROOT.Char.Custom('ES_OA')] ou ambas as coisas. De qualquer forma, os sábios [stranger.GetFaith.PriestNeuterPlural] da terra saberão que você hospedou Grímnir e tratou bem o Senhor dos aesires".$fp1_yearly.1011.desc.critical_epilogue$"
 fp1_yearly.1011.desc.same_faith.standard: "$fp1_yearly.1011.desc.standard_preamble$\"Você foi observado por olhos mais velhos, [ROOT.Char.GetFirstNameNoTooltip], e considerado insuficiente\", grita [stranger.GetFirstNameNoTooltip], com saliva voando por toda parte. \"Grímnir vagueia em sua corte, e você não faz nada, não vê nada? Os [stranger.GetFaith.PriestNeuterPlural] da terra saberão que você foi visitado pelos Aesir, e que os deuses o observam para melhorar!\"$fp1_yearly.1011.desc.standard_epilogue$"
 fp1_yearly.1011.a: "Certamente isso não pode #EMP realmente#! ter sido o Pai de Todos?"
 fp1_yearly.1011.b: "Bastardo!"
 fp1_yearly.1011.possible_converts_specific_list: "Pelo menos um [courtier|lE]"
 fp1_yearly.1012.t: "$fp1_yearly.1001.t$: missionário[stranger.Custom('ES_OA')] de fé [stranger.GetFaith.GetAdjectiveNoTooltip]"
 fp1_yearly.1012.desc.preamble: "[stranger.GetNameNoTooltip] demonstra ser um[stranger.Custom('ES_XA')] convidad[stranger.Custom('ES_OA')] erudit[stranger.Custom('ES_OA')] que passa as noites envolvido em longas discussões com o restante da corte.\n\nEsta noite me visita, com um largo sorriso estampado no rosto.\n\n"
 fp1_yearly.1012.desc.same_faith_epilogue: "\n\n[stranger.GetFirstNameNoTooltip] faz uma pausa, indeciso. \"Se desejar, seria uma honra para mim ficar em sua corte permanentemente?\"."
 fp1_yearly.1012.desc.different_faith.critical: "$fp1_yearly.1012.desc.preamble$"[ROOT.Char.Custom('FormOfAddressForLiege')|U]! Faz tempo que não me tratavam tão bem, e agradeço-vos a vossa hospitalidade. No entanto, temo que devo confessar algo: sou de fé [stranger.GetFaith.GetAdherentNameNoTooltip], estou a serviço de [stranger.GetFaith.HighGodName], e tenho estado a educar vossos súditos em Suas ensinamentos"."
 fp1_yearly.1012.desc.different_faith.standard: "$fp1_yearly.1012.desc.preamble$\"Minha [ROOT.Char.GetTitleAsNameNoTooltip], eu sei que você já não me considera particularmente favorável, mas receio que venho aqui com uma confissão. Durante minha estadia em sua corte, tenho estado discutindo as obras de [stranger.GetFaith.HighGodName] com seus súditos, educando quem quiser ouvir na fé [stranger.GetFaith.GetAdjectiveNoTooltip]."
 fp1_yearly.1012.desc.same_faith.critical: "$fp1_yearly.1012.desc.preamble$"Olá [ROOT.Char.GetTitleAsNameNoTooltip]! Desejo agradecer-lhe por ter me tratado tão bem durante minha estadia aqui. Como [Select_CString(stranger.IsFemale,stranger.GetFaith.DevoteeFemale,stranger.GetFaith.DevoteeMale)] reverente e um[stranger.Custom('ES_OA')] mais do povo [stranger.GetFaith.GetAdherentNameNoTooltip], escrevi a teólogos influentes de todo o reino elogiando sua piedade".$fp1_yearly.1012.desc.same_faith_epilogue$"
 fp1_yearly.1012.desc.same_faith.standard: "$fp1_yearly.1012.desc.preamble$"[ROOT.Char.Custom('FormOfAddressForLiege')|U], não tenho sido totalmente sincer[stranger.Custom('ES_OA')] com vós. Embora pareça um[stranger.Custom('ES_XA')] mendic[stranger.Custom('ES_OA')] na verdade sou um[stranger.Custom('ES_XA')] [Select_CString(stranger.IsFemale,stranger.GetFaith.DevoteeFemale,stranger.GetFaith.DevoteeMale)] e tenho passado meu tempo na corte educando e falando sobre as obras de [stranger.GetFaith.HealthGodName]. Embora não tenhais encorajado isso, agradeço-vos por ter-me mostrado tamanha hospitalidade".$fp1_yearly.1012.desc.same_faith_epilogue$"
 fp1_yearly.1012.a: "Conte-me mais sobre es[stranger.Custom('ES_EA')]… [stranger.GetFaith.GetNameNoTooltip]…"
 fp1_yearly.1012.a.recoup_lost_piety.tt: "Recupera-se toda a [piety|lE] gasta em acolher [stranger.Custom('ES_AlAla')] missionário[stranger.Custom('ES_OA')]"
 fp1_yearly.1012.b: "Você #EMP o quê#!? Saia agora."
 fp1_yearly.1012.c: "[stranger.Custom2('InsultNoun', ROOT.Char)|U] [stranger.Custom2('InsultAdjective', ROOT.Char)]! #EMP GUARDIAS!#! Prendam[stranger.GetHerHim]!"
 fp1_yearly.1012.d: "Aceito seu serviço."
 fp1_yearly.1012.e: "Já tenho conselheiros e teólogos suficientes, obrigado."
 fp1_yearly.1012.possible_converts_specific_list: "$fp1_yearly.1011.possible_converts_specific_list$"
 fp1_yearly.1013.t: "$fp1_yearly.1001.t$: Nithing"
 fp1_yearly.1013.desc.critical: "#EMP Qué desastre!#!\n\n[stranger.GetNameNoTooltip] pagou minha hospitalidade roubando-me no meio da noite, enfiando no bolso toda peça de metal brilhante ou tecido exótico que conseguiu encontrar antes de partir no meu melhor cavalo!"
 fp1_yearly.1013.desc.standard: "[stranger.GetNameNoTooltip] fugiu na calada da noite, levando consigo todos os objetos valiosos em que pôde pôr as suas mãozinhas imundas."
 fp1_yearly.1013.desc.outro: "\n\nParece que tal estranh[stranger.Custom('ES_OA')] misterios[stranger.Custom('ES_OA')] era um[stranger.Custom('ES_XA')] nithing fugitivo: condenado[stranger.Custom('ES_OA')] por um crime tão hediondo que foi privado de juramento e honra e sua própria família [stranger.GetHerHim] o considera mort[stranger.Custom('ES_OA')]. Esse insulto fere fundo."
 fp1_yearly.1013.desc.outro.sodomite: "\n\nParece que esse estranho misterioso[stranger.Custom('ES_OA')] era um[stranger.Custom('ES_OA')] nithing em fuga: ostracizad[stranger.Custom('ES_XA')] pela comunidade, ele vagueia de corte em corte em busca de um refúgio seguro.[stranger.Custom('ES_OA')]Quando meus cortesãos mostraram ser tão conservadores quanto os de seu último anfitrião, ele preferiu fugir em vez de ficar e sofrer.\n\nQuando meus cortesãos mostraram ser tão conservadores quanto os de seu último anfitrião, ele preferiu fugir em vez de ficar e sofrer."
 fp1_yearly.1013.a: "Maldição!"
 fp1_yearly.1013.a.sodomite: "Viver tal vida..."
 fp1_yearly.1013.b: "Não descansarei até que encontrem [stranger.Custom('ES_AlAla')] nithing!"
 fp1_yearly.1014.t: "$fp1_yearly.1001.t$: Guerreiro[stranger.Custom('ES_OA')]"
 fp1_yearly.1014.desc.critical: "[stranger.GetNameNoTooltip] parece agradavelmente surpres[stranger.Custom('ES_OA')] de ser tratado como um[stranger.Custom('ES_XA')] convidad[stranger.Custom('ES_OA')] de honra e me aborda em privado ao final do dia.\n\n[ROOT.Char.Custom('FormOfAddressForLiege')|U], não tenho sido totalmente sincer[stranger.Custom('ES_OA')] com vós. Embora eu pareça fraco, na verdade sou um[stranger.Custom('ES_XA')] guerreir[stranger.Custom('ES_OA')] de renome! Tenho procurado um [ROOT.Char.GetLadyLord] dign[ROOT.Char.Custom('ES_OA')] de meus serviços, e vosso comportamento me faz pensar que podíeis ser vós."
 fp1_yearly.1014.desc.standard: "[stranger.GetNameNoTooltip] continua rondando pela corte por um tempo, até que enfim consegue uma audiência privada comigo.\n\n"Grande [ROOT.Char.GetTitleAsNameNoTooltip], desejo oferecer-lhe minha espada. Sou um[stranger.Custom('ES_XA')] guerreir[stranger.Custom('ES_OA')] errante que já há algum tempo procura um[ROOT.Char.Custom('ES_XA')] bom[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom('ES_SennorSennora')]. Minha estadia em sua corte me faz pensar que talvez seja vós"."
 fp1_yearly.1014.desc.outro: "\n\nNão é o processo normal para contratar $knight_culture_player_plural_no_tooltip_lowercase$, sem dúvida, mas #EMP sí#! é um elogio ter superado seu desafio."
 fp1_yearly.1014.a: "Magnífico! Você valerá bem o seu preço!"
 fp1_yearly.1014.b: "Tenho guerreiros capazes o suficiente que não testam minha paciência."
 fp1_yearly.1015.t: "$fp1_yearly.1001.t$: Vagamundo[stranger.Custom('ES_OA')]"
 fp1_yearly.1015.desc.critical: "[stranger.GetFirstNameNoTooltip] está confus[stranger.Custom('ES_OA')] , sobrecarregad[stranger.Custom('ES_OA')] e eufóric[stranger.Custom('ES_OA')] pelo tratamento que recebe. Ser tratado como um[stranger.Custom('ES_XA')] nobre menor parece uma experiência totalmente nova para [stranger.GetSheHe], e leva um tempo até a ficha cair."
 fp1_yearly.1015.desc.standard: "[stranger.GetFirstNameNoTooltip] continua bastante inofensiv[stranger.Custom('ES_OA')] me dou conta de tudo até que [stranger.Custom('ES_LoLa')] ouço conversando em voz baixa."
 fp1_yearly.1015.desc.outro: "\n\nPelo visto, na verdade não é #EMP más#! mais do[stranger.Custom('ES_XA')] vagabundo[stranger.Custom('ES_OA')] errante que se esgueirou para dentro das muralhas!\n\nEnquanto eu pensava no que fazer, [stranger.GetFirstNameNoTooltip] vem até mim, chapéu na mão, implorando para que lhe permitam ficar permanentemente."
 fp1_yearly.1015.a: "Claro que você pode ficar."
 fp1_yearly.1015.b: "O quê?! Absurdo, saia!"
 fp1_yearly.1062.t: "Uma Vida a Ser Lembrada: [ship_funeral_candidate.GetFirstNameNoTooltip]"
 fp1_yearly.1062.desc: "A recente morte de [ship_funeral_candidate.Custom2('MyCharacterIntroduction',mourner)] deixou seus entes queridos lamentando a perda de um grande [ship_funeral_candidate.GetWomanMan].\n\nComo um[ROOT.Char.Custom('ES_OA')] de [ROOT.Char.Custom('ES_LoLa')]s mais próxim[ROOT.Char.Custom('ES_OA')]s [ship_funeral_candidate.Custom('ES_AlAla')] falecid[ship_funeral_candidate.Custom('ES_OA')], eu poderia assumir a responsabilidade de organizar um funeral adequado.\n\nÉ uma tradição entre os bons [ship_funeral_candidate.GetFaith.GetAdherentNamePluralNoTooltip] enterrar nossos nobres com um barco, para melhor levá-los a [ship_funeral_candidate.GetFaith.PositiveAfterLife], e certamente [ship_funeral_candidate.GetFirstNameNoTooltip] merece essa alta distinção?"
 fp1_yearly.1062.a: "Um pequeno barco de pedra simbólico será suficiente."
 fp1_yearly.1062.a.tt: "Preparativos para o funeral começam..."
 fp1_yearly.1062.b: "Um grande barco de pedra, para impressionar [ship_funeral_candidate.GetFaith.WarGodName]!"
 fp1_yearly.1062.c: "Um barco ornamental a vela; [ship_funeral_candidate.GetFirstNameNoTooltip] merece o melhor."
 fp1_yearly.1062.d: "Isso é tudo #EMP extremamente#! caro..."
 fp1_yearly.1063.t: "$fp1_yearly.1062.t$"
 fp1_yearly.1063.desc.intro: "Estou diante da pequena multidão de enlutados, meus olhos varrendo cada um dos chorosos enlutados por sua vez, e começo meu discurso.\n\n\"[ship_funeral_candidate.GetFirstNameNoTooltip]"
 fp1_yearly.1063.desc.achievements.title.duchy: "um[ship_funeral_candidate.Custom('ES_XA')] bom[ship_funeral_candidate.Custom('ES_XA')] [ship_funeral_candidate.GetTitleAsNameNoTooltip],"
 fp1_yearly.1063.desc.achievements.title.kingdom: "um[ship_funeral_candidate.Custom('ES_XA')] [ship_funeral_candidate.GetTitleAsNameNoTooltip] resplandecente,"
 fp1_yearly.1063.desc.achievements.title.empire: "um[ship_funeral_candidate.Custom('ES_XA')] [ship_funeral_candidate.GetTitleAsNameNoTooltip] magnífic[ship_funeral_candidate.Custom('ES_OA')] ,"
 fp1_yearly.1063.desc.achievements.prestige.high: "um[ship_funeral_candidate.Custom('ES_XA')] [ship_funeral_candidate.GetWomanMan] ilustre,"
 fp1_yearly.1063.desc.achievements.prestige.very_high: "um[ship_funeral_candidate.Custom('ES_XA')] [ship_funeral_candidate.GetWomanMan] elevado[ship_funeral_candidate.Custom('ES_OA')],"
 fp1_yearly.1063.desc.achievements.prestige.max: "uma[ship_funeral_candidate.Custom('ES_XA')] [ship_funeral_candidate.GetWomanMan] que foi uma verdadeira lenda,"
 fp1_yearly.1063.desc.achievements.piety.high: "um[ship_funeral_candidate.Custom('ES_XA')] servidor[ship_funeral_candidate.Custom('ES_XA')] devot[ship_funeral_candidate.Custom('ES_OA')] de [ship_funeral_candidate.GetFaith.HighGodName],"
 fp1_yearly.1063.desc.achievements.piety.very_high: "um modelo sem igual de virtude [ship_funeral_candidate.GetFaith.GetAdjective]."
 fp1_yearly.1063.desc.achievements.piety.max: "um verdadeiro ícone da fé [ship_funeral_candidate.GetFaith.GetAdjective],"
 fp1_yearly.1063.desc.achievements.lifestyles.partying: "uma fonte de alegria e risos,"
 fp1_yearly.1063.desc.achievements.lifestyles.duelling: "um[ship_funeral_candidate.Custom('ES_XA')] duelista mortal,"
 fp1_yearly.1063.desc.achievements.lifestyles.hunting: "o melhor caçador[ship_funeral_candidate.Custom('ES_XA')] de todo [hunting_lands.GetNameNoTierNoTooltip],"
 fp1_yearly.1063.desc.achievements.lifestyles.magickerationing: "um[ship_funeral_candidate.Custom('ES_XA')] especialista[ship_funeral_candidate.Custom('ES_OA')] nas artes místicas,"
 fp1_yearly.1063.desc.achievements.single.intro: "tinha um impulso singular. Talvez por isso se [ship_funeral_candidate.Custom('ES_LeLa')] considerava"
 fp1_yearly.1063.desc.achievements.single.outro: "uma façanha que talvez nunca seja superada[ship_funeral_candidate.Custom('ES_OA')]"
 fp1_yearly.1063.desc.achievements.double.intro: "era uma pessoa de talento raro e interesses diversos. Tanto"
 fp1_yearly.1063.desc.achievements.double.connector: "quanto"
 fp1_yearly.1063.desc.achievements.double.outro: "nada pode preencher o vazio que sua perda deixa em nossas vidas"."
 fp1_yearly.1063.desc.achievements.triple.intro: "foi tantas coisas. Foi"
 fp1_yearly.1063.desc.achievements.triple.connector: "$fp1_yearly.1063.desc.achievements.double.connector$"
 fp1_yearly.1063.desc.achievements.triple.outro: "mas para mim, acima de tudo, [ship_funeral_candidate.GetSheHe] era meu [ship_funeral_candidate.Custom2('RelationToMe', mourner)]. Nunca veremos alguém como [ship_funeral_candidate.GetSheHe] novamente."
 fp1_yearly.1063.desc.ship_stone_small: "\n\nO túmulo atrás de mim já contém uma pequena réplica de um navio, traçada em pedras pesadas e cheia de seixos, já enterrada sob um peso de terra."
 fp1_yearly.1063.desc.ship_stone_grand: "\n\nO grande monte funerário atrás de mim já contém uma reprodução colosal de um navio, delineada em pedras rúnicas e preenchida com seixos, cada pedra grande o bastante para contar histórias da vida [ship_funeral_candidate.Custom('ES_DelDela')] falecid[ship_funeral_candidate.Custom('ES_OA')]."
 fp1_yearly.1063.desc.ship_wood_ornate: "\n\nO monte funerário atrás de mim já contém uma embarcação feita sob medida, fruto de madeiras exóticas e do nosso melhor trabalho de construção naval. Ela jamais navegará em mares mortais, mas possa agradar a [ship_funeral_candidate.GetFaith.PantheonTerm] e trazer bênçãos [ship_funeral_candidate.Custom('ES_AlAla')] falecid[ship_funeral_candidate.Custom('ES_OA')]."
 fp1_yearly.1063.desc.outro: "\n\nOs serviçais trazem o último dos tesouros funerários e, por fim, colocam o cadáver de [ship_funeral_candidate.GetFirstNameNoTooltip] sobre sua pira funerária."
 fp1_yearly.1063.trigger_failure.tt: "As circunstâncias impediram o funeral público de [ship_funeral_candidate.GetFirstNameNoTooltip]"
 fp1_yearly.1063.a: "Feche o monte."
 fp1_yearly.1071.t: "Brilhantemente Limpo"
 fp1_yearly.1071.desc: "O povo [ROOT.Char.GetCulture.GetNameNoTooltip] é famoso por sua limpeza meticulosa.\n\nUm dos grandes prazeres da vida é ouvir até mesmo nossos inimigos mais severos admitirem amargamente que não há barba mais bem penteada, nem cabelo de [ROOT.Char.GetWomanMan] mais ensaboado, nem rosto de [ROOT.Char.GetWomanMan] mais limpo e sem manchas do que o de um bom [ROOT.Char.GetCulture.GetNameNoTooltip].\n\nHoje é dia de banho, mas sinto que uma mudança de rotina me faria bem. Afinal, se todos os [ROOT.Char.GetCulture.GetNameNoTooltip]s são bem arrumados, não cabe a um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] estar #EMP más#! mais arrumad[ROOT.Char.Custom('ES_OA')]?"
 fp1_yearly.1071.a: "Higiene é a chave para uma vida longa!"
 fp1_yearly.1071.b: "Eu poderia me cuidar um pouco mais..."
 fp1_yearly.1071.c: "Apenas o de sempre está bom."
 fp1_yearly.1081.t: "Explorador[norse_explorer.Custom('ES_XA')] do Oeste"
 fp1_yearly.1081.desc.intro: "Minha noite foi consumida por um[norse_explorer.Custom('ES_XA')] explorador[norse_explorer.Custom('ES_XA')] ancião[norse_explorer.Custom('ES_OA')], [norse_explorer.GetFirstName], que deseja me contar histórias exóticas de seus feitos e aventuras no Oceano Atlântico.\n\nApesar da sua idade, os olhos de [norse_explorer.GetFirstNameNoTooltip] continuam tão perspicazes quanto sempre enquanto me fala sobre"
 fp1_yearly.1081.desc.greenland: "uma terra de nórdicos pobres e esforçados que vivem entre as neves perto do topo do mundo. A terra é tão gelada e fria que precisam importar toda a madeira e se alimentam quase inteiramente de carne e peixe."
 fp1_yearly.1081.desc.vinland: "uma terra tão distante a oeste quanto a Cathay é a leste, onde as uvas e trigo crescem livremente a ponto de parecer que se plantam sozinhas, e as colheitas de vinho são incomparáveis. Cada local é um guerreiro temível, não tolerando nenhuma intrusão."
 fp1_yearly.1081.desc.antilia: "uma ilha habitada por exilados da nação [antilia_culture.GetNameNoTooltip]. Uns cristãos ricos e opulentos, vivendo em castelos bem defendidos, descendentes de refugiados que fugiram da Hispânia durante a invasão moura."
 fp1_yearly.1081.desc.fortunate_isles.hellenist: "o último enclave sobrevivente do helenismo, uma pequena ilha no oeste povoada por gregos que têm mais em comum com a antiga $b_athens$ do que com a $b_constantinople$ atual. Os moradores passam o dia todo discutindo filosofia e brindando à glória dos deuses olímpicos!"
 fp1_yearly.1081.desc.fortunate_isles.other: "o refúgio dos últimos pagãos helênicos, que imitam de forma grosseira seus distantes antepassados de $b_athens$ e $b_thebes$. Os habitantes passam os dias na ociosidade, discutindo filosofias estranhas e praticando sua fé grosseira."
 fp1_yearly.1081.desc.st_brendans_island: "uma ilha oculta por estranhas névoas, onde o tempo parece passar mais devagar do que fora dela. Dos mistérios mais profundos da ilha, [norse_explorer.GetFirstNameNoTooltip] permanece em silêncio, embora às vezes lágrimas turvem os olhos dela."
 fp1_yearly.1081.desc.isle_of_the_blessed.christian: "uma ilha repleta de bretões devotos, que oram e levam vidas de serena contemplação. Tão grande é sua fé que cada um é imune a armas mortais, totalmente protegido por [norse_explorer.GetFaith.HighGodName]."
 fp1_yearly.1081.desc.isle_of_the_blessed.other: "uma ilha repleta de bretões devotos, rica em tesouros de ouro. Tão forte era sua fé que enchia a ilha de belos hinos mesmo depois de que a tripulação de [norse_explorer.GetFirstNameNoTooltip] os passasse pela espada."
 fp1_yearly.1081.desc.ard_majhulah: "uma terra estranha, mencionada apenas em textos antigos islâmicos, considerada perdida há anos. Os locais têm cada um pilhas de ouro e prata tão grandes que as usam como palitos de dente e para tecer suas roupas."
 fp1_yearly.1081.desc.the_sticky_sea: "um mar lamentoso no Atlântico, uma bagunça pegajosa e malcheirosa de águas, onde serpentes e algas conspiram para arrastar os marinheiros para a morte. Somente as tripulações mais fortes têm uma chance de se libertar."
 fp1_yearly.1081.desc.purple_islands: "um grupo de ilhas ao sul, repleto de flores vibrantes, muitas delas tons de roxo exótico, completamente desprovido de qualquer vestígio de vida humana. A beleza sinistra do lugar atrai até mesmo marinheiros endurecidos a se deitar e morrer, em paz com o mundo."
 fp1_yearly.1081.desc.hy_brasil: "uma ilha que permanece invisível grande parte do tempo, escondida atrás de neblinas impenetráveis, exceto por um dia a cada sete anos. Mesmo no único dia em que as neblinas permitem a viagem, nenhum marinheiro conseguiu pousar com sucesso."
 fp1_yearly.1081.desc.thule: "uma vasta terra muito, muito ao norte, onde toda a matéria se desfaz. Homens respiram água e terra tão facilmente quanto o ar, baleias monstruosas nadam pelo chão e céu, e todas as distinções se tornam acadêmicas."
 fp1_yearly.1081.desc.great_ireland.abrahamic: "uma terra distante a oeste, onde os habitantes vestem apenas branco, carregam lanças cruéis e lutam ferozmente uns contra os outros e até mesmo contra os mais nobres visitantes. Os locais adoram deuses pagãos antigos, há muito esquecidos pelos [norse_explorer.GetFaith.GetAdherentNamePluralNoTooltip] sensatos."
 fp1_yearly.1081.desc.great_ireland.other: "uma terra distante a oeste, onde os habitantes vestem apenas branco, carregam lanças cruéis e lutam com força e ferocidade inumanas. Tão lendária é sua destreza, que nenhum guerreiro desta terra jamais caiu perante uma lâmina estrangeira."
 fp1_yearly.1081.desc.sunset_empire: "um império no lado oposto do ponto mais largo do Atlântico, uma terra de sangue, crânios e conquistadores famintos, espreitando logo abaixo do horizonte ocidental. Seus mestres cruéis esperam pelo próprio Ragnarok, quando pretendem arrancar os corações pulsantes de todos os bons [norse_explorer.GetFaith.GetAdherentNamePluralNoTooltip]."
 fp1_yearly.1081.desc.outro: "\n\nEmbora já esteja ficando tarde, [norse_explorer.GetFirstNameNoTooltip] parece mais do que dispost[norse_explorer.Custom('ES_OA')] a continuar, se eu quiser."
 fp1_yearly.1081.a: "Fascinante. Por favor, comece do início novamente!"
 fp1_yearly.1081.b: "Não #EMP puedes#! estar dizendo a verdade, anciã[norse_explorer.Custom('ES_OA')]."
 fp1_yearly.1081.c: "Contos de terras distantes são sempre reconfortantes..."
 fp1_yearly.1081.c.sunset_empire: "Talvez devêssemos parar os navios de navegar para o oeste..."
