l_spanish:
 game_concept_designate_chief_sacrifice: "Designar Sacrifício Principal"
 game_concept_designate_chief_sacrifice_article: "Designar um Sacrifício Principal"
 game_concept_designate_chief_sacrifice_chief_sacrifice: "Sacrifício do Chefe"
 game_concept_designate_chief_sacrifice_desc: "Ao realizar um grande festival de sacrifício, os [characters|lE] podem designar um de seus [prisoners|lE] para ser o sacrifício principal. Este prisioneiro será morto primeiro e pode fazer com que o personagem que o sacrifica ganhe mais [piety|lE].

Sacrifícios preferíveis:
$EFFECT_LIST_BULLET$ $game_concept_characters$ sem terras cuja [faith|lE] é [faith_hostile|lL] ou [faith_evil|lL]
$EFFECT_LIST_BULLET$ $game_concept_characters$ [Concept( 'landed', 'com terras' )|E] com um [rank|lE] mínimo de [count|lE]
$EFFECT_LIST_BULLET$ [heads_of_faith|E] (embora isso possa ter repercussões)"
 game_concept_varangian_adventure: "Julgamento por Combate"
 game_concept_varangian_adventures: "Julgamentos por Combate"
 game_concept_varangian_adventuring: "Julgamento"
 game_concept_varangian_adventure_adventure: "Combate"
 game_concept_varangian_adventure_desc: "É um tipo especial de [war|lE] em que o atacante busca mover todo o seu [realm|lE] para o [war_target|lE].

Se vencer, anexará imediatamente os [counties|lE] apropriados e moverá sua [capital|lE] para lá. Seus antigos vassalos se tornarão independentes, e seus antigos condados serão entregues a novos senhores locais ambiciosos. As $game_concept_varangian_adventures$ estão disponíveis #EMP APENAS#! para [rulers|lE] de [title_tier|lE] de $game_concept_count$ e [duke|lE], tornando-se progressivamente mais caras a cada $game_concept_varangian_adventure_adventure$ bem-sucedida.

Este [casus_belli|lE] #EMP NUNCA#! estará disponível depois da [era|lE] $culture_era_tribal$ e não pode ser usado contra outras [cultures|lE] que possam realizar uma $game_concept_varangian_adventure_adventure$ ou contra $game_concept_rulers$ vizinhos.

Os $north_germanic_group_collective_noun$ que iniciarem sua primeira $game_concept_varangian_adventure$ recebem até [EmptyScope.ScriptValue('varangian_adventurers_standard_levy_cap_value')|0] de bônus em [special_troops|lE]. A quantidade aumenta a cada condado da mesma [faith|lE] e da mesma [culture|lE] que controlarem totalmente dentro de [GetGeographicalRegion('dlc_fp1_region_core_mainland_scandinavia').GetName]."
 game_concept_trial_by_combat: "Julgamento por Combate"
 game_concept_trials_by_combat: "Julgamentos por Combate"
 game_concept_trial_by_combat_trial: "Julgamento"
 game_concept_trial_by_combat_combat: "Combate"
 game_concept_trial_by_combat_desc: "Em algumas [cultures|lE], questões que não podem ser resolvidas por palavras ou guerra são motivo para um $game_concept_trial_by_combat$ em vez disso. Se aceito, os dois [characters|lE] participam de um [single_combat_duel|lE] em um acordo pré-selecionado. Se a parte ofensora vencer, provará sua inocência.

Os requisitos gerais para esse $game_concept_trial_by_combat_trial$ são:
$EFFECT_LIST_BULLET$Ambos devem ter uma cultura válida.
$EFFECT_LIST_BULLET$Você deve ter um [imprisonment_reason|lE] contra eles (que será consumido).
$EFFECT_LIST_BULLET$Eles não devem ser seu [liege|lE], [vassal|lE], [guest|lE] ou [courtier|lE], nem de um de seus $game_concept_vassals$.

$game_concept_characters$ que não são aptos a lutar por si mesmos ainda podem ser desafiados, desde que sejam [rulers|lE], nomeando um [knight|lE] para lutar em seu lugar.

Um $game_concept_trial_by_combat_combat$ só pode optar por ser travado até a [character_death_death|lE] se a parte ofendida for [tribal|lE] e ambos os $game_concept_characters$ lutarem pessoalmente no $game_concept_single_combat_duel$; se a parte ofensora tiver de nomear um campeão para lutar em seu nome, então $game_concept_character_death_death$ não é uma opção."
