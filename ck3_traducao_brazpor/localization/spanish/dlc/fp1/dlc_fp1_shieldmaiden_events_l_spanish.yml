l_spanish:
 ##################################################
 ##Ordinary Events
 fp1_shieldmaiden.0001.t: "Uma[shieldmaiden.Custom('ES_XA')] [shieldmaiden.Custom('ShieldPersonFemaleMale')] em potencial"
 fp1_shieldmaiden.0001.desc: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U], venho até vós para pedir uma chance de provar meu valor\", diz minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('shieldmaiden'))], [shieldmaiden.Custom('ES_ElLa')] [shieldmaiden.GetTitledFirstName|l]. Me mexo um pouco no trono, intrigad[ROOT.Char.Custom('ES_OA')], enquanto a corte se esforça para ouvir.\n\n\"Apesar de ser tão capaz quanto qualquer um de vossos $knight_culture_player_plural_no_tooltip_lowercase$, é-me proibido fazer parte da vossa muralha de escudos ou comandar vossas tropas. Eu desafiaria [challenged_knight.Custom('ES_AlAla')] [challenged_knight.GetTitledFirstName|l] para um duelo, a fim de mostrar meu valor em combate\"."
 fp1_shieldmaiden.0001.a: "Muito bem, você pode duelar [challenged_knight.GetTitledFirstNameNoTooltip|l]."
 fp1_shieldmaiden.0001.a.tt_success: "[challenged_knight.GetFirstNameNoTooltip] triunfa"
 fp1_shieldmaiden.0001.a.tt_failure: "[shieldmaiden.GetFirstNameNoTooltip] é vitorioso(a)"
 fp1_shieldmaiden.0001.b: "[challenged_knight.GetFirstNameNoTooltip]? Oh não, você lutará #EMP contra mim#!!"
 fp1_shieldmaiden.0001.b.tt_success: "Você derrota [shieldmaiden.GetFirstNameNoTooltip]"
 fp1_shieldmaiden.0001.b.tt_failure: "[shieldmaiden.GetFirstNameNoTooltip] te faz cambalear"
 fp1_shieldmaiden.0001.c: "O próprio pedido é corajoso o suficiente."
 fp1_accepted_shieldmaiden_without_question: "Todo [courtier|lE] e [vassal|lE] que acha que [shieldmaiden.Custom('ES_LoLa')] s [shieldmaiden.GetWomenMen] não sabe lutar"
 fp1_shieldmaiden.0001.d: "Uma[shieldmaiden.Custom('ES_XA')] [shieldmaiden.Custom('ShieldPersonFemaleMale')]? Ridículo!"
 fp1_shieldmaiden.0011.t: "[shieldmaiden.Custom('ShieldPersonFemaleMale')|l] impede a fuga"
 fp1_shieldmaiden.0011.desc: "Abrir a fechadura da minha cela com uma gazua é mais fácil do que eu esperava. Escapar de um guarda atrás do outro é mais difícil, mas consigo, esgueirando-me como uma sombra para longe da minha prisão.\n\nQuando eu praticamente estava #EMP saboreando#! saboreando a liberdade, ela me foi arrancada. Ao virar uma esquina, [shieldmaiden.GetTitledFirstName|l], [shieldmaiden.Custom('ShieldPersonFemaleMale')|l] de [imprisoner.GetFirstName] sai das sombras.\n\nNem percebo sua porreta até que ela venha direto contra o meu rosto."
 fp1_shieldmaiden.0011.a: "Espere, não, não— AARRGH!"
 fp1_shieldmaiden.0012.t: "$fp1_shieldmaiden.0011.t$"
 fp1_shieldmaiden.0012.desc: "Foi devolvido a [prisoner.GetTitledFirstName|l] ao confinamento nas primeiras horas da manhã, depois de ter quase escapado durante a noite.\n\nAo que parece, meu prisioneir[prisoner.Custom('ES_OA')] passou despercebido pela maioria dos guardas antes de ser notad[prisoner.Custom('ES_OA')] por [shieldmaiden.GetTitledFirstName|l] que, inquiet[shieldmaiden.Custom('ES_OA')] , havia saído para um passeio noturno.\n\nMeu [shieldmaiden.Custom('ShieldPersonFemaleMale')|l] passou a espancar violentamente [prisoner.GetFirstNameNoTooltip] até que, por fim, [prisoner.GetHerHim] o levou de volta aos seus carcereiros."
 fp1_shieldmaiden.0012.a: "Ótimo trabalho, [shieldmaiden.GetFirstNameNoTooltip]."
 fp1_shieldmaiden.0012.b: "Por que [prisoner.GetHerHim] você bateu tão forte?"
 fp1_shieldmaiden.0021.t: "$murder_save_header$ [shieldmaiden.Custom('ShieldPersonFemaleMale')]"
 fp1_shieldmaiden.0021.desc.assassin: "Meu assassino não conseguiu matar [target.GetTitledFirstName|l]! Ao que parece, interveio [shieldmaiden.GetTitledFirstName|l], [shieldmaiden.Custom('ShieldPersonFemaleMale')] de [target.GetFirstNameNoTooltip], que apareceu segundos antes de o assassinato acontecer e deu um fim no meu assassino de aluguel."
 fp1_shieldmaiden.0021.desc.thugs: "Os capangas que contratei para matar a [target.GetTitledFirstName|l] fracassaram em sua missão! Apesar de sua ferocidade, sua [shieldmaiden.Custom('ShieldPersonFemaleMale')] de [target.GetFirstName] conseguiu manter[target.GetHerHim] a salvo o suficiente para que seus guardas pudessem se reunir e despachar o restante dos bandidos."
 fp1_shieldmaiden.0021.desc.mob: "Embora a turba que incitei para matar a [target.GetTitledFirstName|l] conseguiu arrancar[target.GetHerHim] de seu cavalo, foram incapazes de terminar o serviço antes que sua [shieldmaiden.Custom('ShieldPersonFemaleMale')] de [target.GetFirstName] interviesse. [shieldmaiden.GetSheHe|U] despachou impiedosamente os camponeses que se aproximaram demais de [target.GetFirstNameNoTooltip], e assustou os outros para que fugissem."
 fp1_shieldmaiden.0021.desc.lured_into_forest: "Eu achava que meu plano para que [target.GetTitledFirstName|l] se perdesse na floresta tinha dado perfeitamente certo quando a noite caiu sem sinal do(a) [target.Custom('ES_DelDela')] [target.Custom('GirlBoy')] perdido(a)[target.Custom('ES_OA')].\n\nNo entanto, justo quando eu estava prestes a ir para a cama, fui informado de que sua [shieldmaiden.Custom('ShieldPersonFemaleMale')] de [target.GetFirstName] saiu da floresta trazendo [target.Custom('ES_AlAla')] [target.Custom('GirlBoy')]. Ao que parece, decidiu seguir o rastro de [target.GetFirstNameNoTooltip] na floresta e encontrou [target.GetSheHe] antes que os animais famintos o fizessem."
 fp1_shieldmaiden.0021.desc.child_pushed: "[target.Custom('ES_ElLa')|U] [target.Custom('GirlBoy')]foi idiota o bastante para cair na minha armadilha! [target.GetFirstName]subiu até a beira da sacada e meu agente [target.GetHerHim]o empurrou…\n\n…Mas o que deveria ter sido uma queda fatal não foi, pois sua [shieldmaiden.Custom('ShieldPersonFemaleMale')] [target.Custom('ES_LoLa')]o segurou pouco antes de atingir o chão. [target.GetSheHe|U]viverá para ver mais um dia, e duvido que caia nessa artimanha novamente."
 fp1_shieldmaiden.0021.shieldmaiden_dies: "\n\nPelo menos [shieldmaiden.GetFirstNameNoTooltip] não vai me importunar mais, pois morreu devido aos ferimentos."
 fp1_shieldmaiden.0021.a: "Acabou..."
 fp1_shieldmaiden.0021.b: "Não acabou até eu dizer que acabou!"
 fp1_shieldmaiden.0022.t: "$murder_save_header$ [shieldmaiden.Custom('ShieldPersonFemaleMale')]"
 fp1_shieldmaiden.0022.desc.assassin: "Hoje quase #EMP muero#!! Se [shieldmaiden.GetFirstName] não tivesse notado algo estranho e me seguido até meus aposentos, eu já seria um cadáver.\n\nFiquei sabendo do assassino quando [shieldmaiden.GetFirstNameNoTooltip] derrubou alguém no chão logo atrás de mim; depois foi tudo uma confusão de facas e socos, até que o agressor caiu morto."
 fp1_shieldmaiden.0022.desc.assassin.shieldmaiden_dies: "\n\nInfelizmente, [shieldmaiden.GetFirstNameNoTooltip] pagou o preço final. Embora o assassino esteja morto, seus ferimentos se mostraram fatais."
 fp1_shieldmaiden.0022.desc.thugs: "Viajo com meu séquito quando se ouve um grito entre uns arbustos. \"Ao ataque! Vão para o [ROOT.Char.GetTitleTierName]!\". Uma emboscada!\n\nNão são meros bandidos atrás do meu ouro, mas brutamontes atrás da minha vida! Minha [shieldmaiden.Custom('ShieldPersonFemaleMale')] [shieldmaiden.GetFirstNameNoTooltip] corre para me defender, colocando-se entre os bandidos sanguinários e eu.\n\n[shieldmaiden.GetFirstNameNoTooltip|U] recua lutando enquanto meus inimigos convergem sobre nossa posição, brandindo suas lâminas, mas logo meus outros guardas conseguem se reunir para nos defender e derrubam os atacantes restantes."
 fp1_shieldmaiden.0022.desc.thugs.shieldmaiden_dies: "Quando a luta cessa, [shieldmaiden.GetFirstNameNoTooltip] se desaba no chão e descubro seus ferimentos profundos. [shieldmaiden.GetSheHe] realmente me protegeu até o fim…"
 fp1_shieldmaiden.0022.desc.mob: "Estou cavalgando pelas ruas de [home_province.GetName] quando uma multidão de camponeses gritando e berrando desce sobre meu séquito. Antes que eu perceba o que está acontecendo, os plebeus me arrancam do meu cavalo e começam a me espancar!\n\nMinha [shieldmaiden.Custom('ShieldPersonFemaleMale')] [shieldmaiden.GetFirstName] corre para me defender com [shieldmaiden.Custom('signature_weapon')] em mãos, impiedosamente [shieldmaiden.Custom('SignatureWeaponWoundVerb1PresentParticiple')] os camponeses que estavam me golpeando e, talvez não tão gloriosamente, me protegendo de mais danos enquanto eu fico enterrado sob seus corpos."
 fp1_shieldmaiden.0022.desc.mob.shieldmaiden_lives: "\n\nDepois que os sons da luta cessam, [shieldmaiden.GetFirstNameNoTooltip] rola os corpos para longe de mim e me ajuda a ficar de pé. Além de nós, a rua agora está deserta, todos os conspiradores mortos ou fugidos."
 fp1_shieldmaiden.0022.desc.mob.shieldmaiden_dies: "\n\nNo momento em que eu me libero da pilha de cadáveres, a rua está deserta, exceto pelos corpos dos caídos - [shieldmaiden.GetFirstNameNoTooltip] entre eles."
 fp1_shieldmaiden.0022.desc.lured_into_forest: "Estava brincando de esconde-esconde com alguns cortesãos na floresta quando percebo que faz muito tempo que não ouço ninguém me procurar. Tempo demais.\n\nGrito, mas não ouço nada. Fui abandonado... Tento encontrar o caminho de volta para casa, mas não sei qual é qual, e escurece depressa.\n\nLogo ouço as feras se movendo entre as árvores, mas antes que consigam me alcançar, chega minha [shieldmaiden.Custom('ShieldPersonFemaleMale')] [shieldmaiden.GetFirstName] sem fôlego e brandindo uma tocha em chamas. O fogo parece afastar as feras, que mantêm distância enquanto [shieldmaiden.GetSheHe] arqueja: \"Vamos... para casa... meu senhor[ROOT.Char.Custom('ES_XA')]...\"."
 fp1_shieldmaiden.0022.desc.child_pushed: "\n\n#EMP BAM#!\n\nCaí nos braços da minha [shieldmaiden.Custom('ShieldPersonFemaleMale')], [shieldmaiden.GetFirstNameNoTooltip]. \"Crianç[ROOT.Char.Custom('ES_OA')] tolinh[ROOT.Char.Custom('ES_OA')]! Se eu não tivesse chegado a tempo… Deixa para lá. Vamos levá-lo para um lugar seguro.\"."
 fp1_shieldmaiden.0022.owner_discovered: "\n\nSó uma pessoa poderia ser responsável por este ataque: [owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]!"
 fp1_shieldmaiden.0022.a: "Quem gostaria de me ver #EMP morto(a)#!"
 fp1_shieldmaiden.0022.b: "[owner.GetSheHe|U] vai sofrer por isso!"
 fp1_shieldmaiden.0032.t: "[shieldmaiden.Custom('ShieldPersonFemaleMale')] Ganha Experiência"
 fp1_shieldmaiden.0032.desc.root: "Entre guerras, é importante manter as habilidades afiadas.\n\nEsta política é o que me faz descer até o campo de treinamento e bater, brigar e repreender meus soldados na minha terceira batalha de treino do dia.\n\nEles reclamam quando os chamo de volta para a quarta. Que reclamem à vontade: eu tenho treinamento a fazer."
 fp1_shieldmaiden.0032.desc.courtier: "Observar o treinamento de [shieldmaiden.GetTitledFirstName|l] é sempre uma experiência. Luta com tal ferocidade, tal fúria, que é fácil esquecer que ela está apenas simulando combates.\n\nO campo está cheio de equipamentos quebrados e soldados machucados. Uma pausa na ação provoca um coro de suspiros aliviados entre seus parceiros de treino enfraquecidos.\n\nMas, quase antes que percebam, a pausa termina e [shieldmaiden.GetFirstNameNoTooltip] volta à carga."
 fp1_shieldmaiden.0032.a.root: "Minha parede de escudos é inquebrável!"
 fp1_shieldmaiden.0032.a.courtier: "Veja como comanda tão bem aquela muralha de escudos!"
 fp1_shieldmaiden.0032.b.root: "Eu balanço tão forte quanto [shieldmaiden.GetFaith.WarGodName]!"
 fp1_shieldmaiden.0032.b.courtier: "Veja como brande sua espada!"
 fp1_shieldmaiden.0032.c.root: "Eu vejo todas as fraquezas em meus inimigos!"
 fp1_shieldmaiden.0032.c.courtier: "[shieldmaiden.GetSheHe|U] sempre consegue encontrar uma abertura!"
