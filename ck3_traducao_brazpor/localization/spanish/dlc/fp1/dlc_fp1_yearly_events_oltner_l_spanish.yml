l_spanish:
 fp1_yearly.2000.t: "Sede de Aventura"
 fp1_yearly.2000.desc: ""Estou indo embora, [parent.GetMotherFather]. E [lover_of_child.GetFirstNameNoTooltip] e eu estamos #EMP enamorado#!!".\n\nDesvio o olhar de [child_to_leave.GetFirstNameNoTooltip]. No que #EMP ahora#! está pensando [child_to_leave.Custom('ES_EA')] [child_to_leave.Custom('GetDaughterSon')] meu[child_to_leave.Custom('ES_OA')]?\n\n"[lover_of_child.GetFirstNameNoTooltip] e eu vamos buscar aventuras! O mundo é vasto, e há glória a ser encontrada! Quero gritar para o mundo #EMP \"[child_to_leave.GetHouse.GetMotto]\"#! até que ele se lembre do meu nome!"\n\nFica evidente que meu #EMP querid[child_to_leave.Custom('ES_OA')]#! [child_to_leave.Custom('GetDaughterSon')] está falando sério. Vou ter que fazer alguma coisa."
 fp1_yearly.2000.a: ""Venha aqui, meu/minha querid[child_to_leave.Custom('ES_OA')] [child_to_leave.Custom('GetDaughterSon')]. Acho que chegou a hora de um pouco de #EMP amor duro#!.""
 fp1_yearly.2000.b: "Escuta, é possível conseguir a #EMP glória#! em casa."
 fp1_yearly.2000.c: "\"Talvez #EMP isso#! faça você esquecer de partir?\""
 fp1_yearly.2000.d: "\"Você vai voltar, logo você verá...\""
 fp1_yearly.2000.d.tt: "#weak \"...você vai lembrar que pertence a mim.\"#!"
 fp1_yearly.2000.a.tt: "#V ¡Te bates con#! [child_to_leave.GetFirstName] para que se quede!\n#weak Este duelo NO es a muerte.#!\nSi vences, ganarás [prestige|E] [prestige_i]\n\nTu [prowess|lE]: #V [parent.GetProwess]#! [prowess_i]\n [prowess|E] de [child_to_leave.GetFirstName]: #V [child_to_leave.GetProwess]#! [prowess_i]"
 fp1_yearly.2000.c.tt: "[child_to_leave.GetFirstName] fica em sua [court|lE]"
 fp1_yearly.2000.b.tt: "Fica em sua [court|lE]"
 lust_for_adventure: "Sede de Aventura"
 lust_for_adventure_desc: "Este personagem está com sede de aventura e viagem. Eles provavelmente não voltarão para a corte de seus pais."
 mellowed_spirit: "Espírito Apaziguado"
 mellowed_spirit_desc: "Este personagem foi convencido por um dos pais de que a aventura não é para eles e que seu lugar é em casa."
 fp1_yearly.2003.t: "Sede de Aventura: Amor Duro"
 fp1_yearly.2003.desc: ""Eu me rendo! Eu me rendo, [parent.GetMotherFather]! Chega!", exclama minha [child_to_leave.Custom('GetDaughterSon')].\n\n"Vou ficar aqui na corte. [lover_of_child.GetFirstNameNoTooltip] não é mais importante para mim do que minha vida!", diz [child_to_leave.GetFirstNameNoTooltip] enquanto [lover_of_child.GetFirstNameNoTooltip] observa com desaprovação.\n\nParece que, enfim, [child_to_leave.GetFirstNameNoTooltip] está vendo razão!"
 fp1_yearly.2003.a: "Seu [parent.GetMotherFather] sabe o que é melhor, [child_to_leave.Custom('GirlBoy')]."
 fp1_yearly.2003.b: ""E termine com es[lover_of_child.Custom('ES_EA')] tal '[lover_of_child.GetFirstNameNoTooltip]' tamb?m!""
 fp1_yearly.2000.trigger_failure: "Meu duelo contra [child_to_leave.GetFirstNameNoTooltip] foi invalidado"
 fp1_yearly.2004.t: "Vontade de Viajar: Derrotado"
 fp1_yearly.2004.desc: "Sou derrubado, enfraquec[ROOT.Char.Custom('ES_OA')] pela luta, enquanto [child_to_leave.GetFirstNameNoTooltip] se aproxima de mim com a arma na mão.\n\n“Eu já disse que #EMP me voy#! , [parent.GetMotherFather]. Pelos transtornos, vou levar um saco do tesouro. Tenho certeza de que vocês entendem.”\n\nNão posso fazer nada além de ficar olhando enquanto minha [child_to_leave.Custom('GetDaughterSon')] vai embora, com [lover_of_child.GetFirstNameNoTooltip] em um braço e #EMP mi oro#! no outro."
 fp1_yearly.2004.a: "Pirralho[child_to_leave.Custom('ES_OA')] insolente…"
 fp1_yearly.2000.b.success: "[child_to_leave.GetFirstNameNoTooltip] desiste de seus sonhos e esperanças"
 fp1_yearly.2000.b.failure: "A [child_to_leave.GetTitledFirstNameNoTooltip|l] não se convence com seus argumentos"
 fp1_yearly.2100.t: "Competição Aquecida"
 fp1_yearly.2100.desc: "«¡[lover_2.Custom2('InsultNounSexual', SCOPE.sC('lover_1'))|U] [lover_2.Custom2('InsultAdjective', SCOPE.sC('lover_1'))]! ¡[lover_2.Custom2('InsultNoun', SCOPE.sC('lover_1'))|U] [lover_2.Custom2('InsultAdjective', SCOPE.sC('lover_1'))]! ¡[lover_2.Custom2('InsultSentence', SCOPE.sC('lover_1'))|U], eres [lover_2.Custom2('InsultNounSexual', SCOPE.sC('lover_1'))]!», [lover_1.GetFirstName] grita a todo pulmón.\n\nParece que tus amantes están a la greña.\n\n«Tu [lover_1.Custom2('PointOfRidicule', SCOPE.sC('lover_2'))] le da náuseas, so [lover_1.Custom2('InsultNounSexual', SCOPE.sC('lover_2'))]. ¡[lover_quarrel_target.GetFirstNameNoTooltip] no podría amar a semejante [lover_1.Custom2('InsultNounSexual', SCOPE.sC('lover_2'))] [lover_1.Custom2('InsultAdjective', SCOPE.sC('lover_2'))]! #EMP ¡[lover_quarrel_target.GetSheHe|U] es mí[lover_quarrel_target.Custom('ES_OA')] y de nadie más!#!», grita [lover_2.GetFirstName], sacando [lover_2.Custom('signature_weapon')] de su cinto…\n\nVa a correr la sangre."
 fp1_yearly.2100.a: "Sangrento #EMP emocionante!#! Sim! Lutem por meu amor!"
 fp1_yearly.2100.b: "Isso é #EMP loucura!#! Eu imploro, por favor, parem com isso imediatamente!"
 fp1_yearly.2100.c: "Eu vou detê-los eu mesmo!"
 fp1_yearly.2100.a.tt: "[lover_1.GetFirstName] e [lover_2.GetFirstName] #V Duelo#! até a morte."
 fp1_yearly.2100.b.tt: "[lover_1.GetFirstName] e [lover_2.GetFirstName] se acalmam."
 fp1_yearly.2101.t: "Concorrência acirrada: coração partido"
 fp1_yearly.2101.desc: ""Agora você é tod[lover_quarrel_target.Custom('ES_OA')] meu[lover_quarrel_target.Custom('ES_OA')], meu [lover_quarrel_target.GetFirstNameNoTooltip] [lover_quarrel_target.Custom('RomanticComplimentAdjective')]! Esse[lover_2.Custom('ES_EA')] [lover_2.Custom2('InsultNounSexual', SCOPE.sC('winning_lover'))] de [losing_lover.GetFirstName] jamais voltará a se interpor entre nós!", sussurra docemente [winning_lover.GetFirstName] enquanto coloca [winning_lover.Custom('signature_weapon')] no chão.\n\n"Venha, [lover_quarrel_target.Custom('RomanticComplimentNoun')] [lover_quarrel_target.Custom('RomanticComplimentAdjective')] meu[lover_quarrel_target.Custom('ES_OA')]. Esta farsa tem sido cansativa, por que não nos retiramos para o seu [ROOT.Char.Custom('GetChamber')]?", sugere sedutoramente [winning_lover.GetFirstNameNoTooltip]."
 fp1_yearly.2101.a: "Ah, [winning_lover.Custom('RomanticComplimentNoun')] mim[winning_lover.Custom('ES_OA')]! Você realmente sabe como me conquistar!"
 fp1_yearly.2101.b: "[losing_lover.GetFirstNameNoTooltip], não! #EMP Você vai pagar por isso, [winning_lover.GetFirstNameNoTooltip]!#!"
 fp1_yearly.2101.c: "Uma aventura amorosa? Por que não."
 fp1_yearly.2101.d: "Apenas... me deixe por agora."
 fp1_yearly.2100.b.success: "Suas palavras amorosas acalmam ambos"
 fp1_yearly.2100.b.failure: "Suas palavras caem em ouvidos surdos"
 fp1_yearly.2100.c.success: "Você separa os briguentos"
 fp1_yearly.2100.c.failure: "Você não chega a tempo"
 fp1_yearly.2100.c.tt: "Você impede [lover_1.GetFirstName] e [lover_2.GetFirstName] de brigar."
 fp1_yearly.2200.t: "O Berserker Entediado"
 fp1_yearly.2200.desc: ""Escutem! Eu sou [new_berserker.GetFirstNameNoTooltip] [ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('new_berserker'))|U], tragam-me canecas de cerveja, [new_berserker.Custom('AttractionWomanManMultiple')] e [new_berserker.Custom('FavoriteTreatDemand')]! Ou ousam desafiar minha fúria!?", grita [new_berserker.GetSheHe] para a multidão reunida.\n\nÉ evidente que est[new_berserker.Custom('ES_EA')] está entediado e procurando confusão. Talvez sua fúria pudesse ser melhor aproveitada em minhas fileiras?\n\n"Ninguém ousa me enfrentar? Covardes! O que eu não daria por uma boa briga…"."
 fp1_yearly.2200.a: "Ninguém me chama de covarde, [new_berserker.Custom2('InsultNoun', ROOT.Char)] de caráter [ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('new_berserker'))]!"
 fp1_yearly.2200.b: "Eu trarei muitas [new_berserker.Custom('FavoriteTreatDemand')] - se você se juntar às minhas fileiras."
 fp1_yearly.2200.c: "Nós vamos em uma incursão em breve, por que você não se junta como meu [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')]?"
 fp1_yearly.2200.d: "Guardas! Parem esse[new_berserker.Custom('ES_LoLa')]!"
 fp1_yearly.2200.a.tt: "#V Te bates con#! [new_berserker.GetFirstName] para que te sirva como [potential_employer.Custom('KnightCultureNoTooltipLowercase')].\n#weak Este duelo NO es a muerte.#!\nAunque pierdas, quizá se calme la ira de [new_berserker.GetFirstNameNoTooltip]…\n\nTu [prowess|E]: #V [potential_employer.GetProwess]#![prowess_i]\n[prowess|E] [new_berserker.GetFirstNamePossessive]: #V [new_berserker.GetProwess]#![prowess_i]"
 fp1_yearly.2200.c.success: "[new_berserker.GetFirstNameNoTooltip] concorda em se juntar às suas fileiras"
 fp1_yearly.2200.c.failure: "[new_berserker.GetFirstNameNoTooltip] causa estragos em sua corte"
 fp1_yearly.2200.fail.tt: "[new_berserker.GetFirstNameNoTooltip] machuca [potential_victim.GetFirstName] em sua fúria!"
 hurt_someone_close_to_me_crime: "Magoar Alguém Próximo a Mim"
 fp1_yearly.2200.d.success: "[new_berserker.GetFirstNameNoTooltip] cai morto[new_berserker.Custom('ES_OA')]"
 fp1_yearly.2200.trigger_failure: "Meu duelo contra [new_berserker.GetFirstNameNoTooltip] foi invalidado"
 fp1_yearly.2203.t: "O Berserker Entediado: Fúria Saciada"
 fp1_yearly.2203.desc: ""Você é mais forte do que parece!", ele resmunga [new_berserker.GetFirstNameNoTooltip].\n\nJaz ensanguentad[new_berserker.Custom('ES_OA')] no chão, com sua raiva saciada… por enquanto.\n\n“Ficaria feliz em lutar ao seu lado, juntos seríamos #EMP imparables!#!", grita."
 fp1_yearly.2203.a: "\"Sinto muito, mas seu caminho termina aqui.\""
 fp1_yearly.2203.b: "\"Seria uma honra lutar ao seu lado!\""
 fp1_yearly.2203.c: "\"Você causou estragos suficientes. Vá embora, agora.\""
 fp1_yearly.2204.t: "O Berserker Entediado: Gigante Gentil"
 fp1_yearly.2204.desc: "“Sinto muito”, diz [new_berserker.GetFirstNameNoTooltip], com emoção evidente. “Fico com raiva quando estou com fome.”\n\nTal gigant[new_berserker.Custom('ES_OnOna')] me oferece a mão para me ajudar a levantar. Sua fúria parece ter sido saciada… por enquanto.\n\n“Gostei da nossa luta. Ficarei feliz em me juntar a você, amig[ROOT.Char.Custom('ES_OA')]”, diz."
 fp1_yearly.2204.a: "\"E eu ficaria feliz em tê-lo como amigo!\""
 fp1_yearly.2204.b: "\"Por favor, apenas vá embora...\""
 grizzled_veterans: "Veteranos Calejados"
 glory_seekers: "Buscadores de Glória"
 fp1_yearly.2300.t: "Buscadores de Glória"
 fp1_yearly.2300.desc: "As tabernas de [tavern_location.GetNameNoTier] têm visto, ultimamente, uma afluência de guerreiros em busca de glória.\n\nEntre eles — um grupo de veteranos velhos e calejados pela guerra, huscarls em busca de um[recruiting_character.Custom('ES_XA')] nov[recruiting_character.Custom('ES_OA')] [recruiting_character.Custom('MistressMaster')].\n\nTambém há uma grande quantidade de jovens entusiastas que falam sem parar em encontrar glória em costas estrangeiras.\n\nTalvez eu deva tentar empregar alguns deles?"
 fp1_yearly.2300.a: "Vou trazer os huscarls para minha casa."
 fp1_yearly.2300.b: "Os jovens são inexperientes, mas são muitos!"
 fp1_yearly.2300.c: "Hora de dobrar o preço da cerveja!"
 fp1_yearly.2300.d: "Juntem-se a mim, bravos guerreiros! Eu os levarei à vitória!"
 huscarls_tt: "#F Huscarls são combatentes de linha de frente resistentes capazes de infligir muito dano às tropas mais fracas#!"
 bondi_tt: "#F Bondí são resilientes e excelentes lutadores nas planícies ou terras cultiváveis de terras estrangeiras#!"
 fp1_yearly.2400.t: "Preparativos para a Caçada"
 fp1_yearly.2400.desc: "A natureza me chama. Faz muito tempo desde minha última caçada. Lá fora, em [ROOT.Char.Custom('TerrainType')] de [hunting_province.GetName] há [ROOT.Char.Custom('GetAnimalPlural')] de caráter [ROOT.Char.Custom('GetAnimalAdjective')]. Um exemplar ficaria ótimo no jantar desta noite!\n\nMas está faltando algo. Minhas lanças de caça estão velhas e sem fio? Ou me falta um acompanhante?\n\nPreciso me certificar de me preparar bem."
 fp1_yearly.2400.a: "O que eu preciso é de um novo cão de caça!"
 fp1_yearly.2400.eagle: "Uma águia de caça me serviria bem!"
 fp1_yearly.2400.b: "Lanças recém-forjadas e flechas emplumadas com penas de corvo."
 fp1_yearly.2400.c: "O que tenho é suficiente. Só preciso de tempo para me preparar."
 fp1_yearly.2400.free_hunt: "Sua próxima [GetActivityType('activity_hunt').GetName] não custará nenhum [gold|lE]"
 brand_new_hunting_tools: "Novas Ferramentas de Caça"
 brand_new_hunting_tools_desc: "Este personagem gastou muito ouro em novos equipamentos de caça."
 fp1_yearly.2500.t: "Pedra Rúnica Devassa"
 fp1_yearly.2500.desc: "Tras un viaje por [runestone_location.Custom('TerrainTypeCountyScope')]s de [runestone_location.GetNameNoTier] llegué hasta la piedra rúnica de mi familia. Pero no parece que esté sol[ROOT.Char.Custom('ES_OA')], pues mi invitad[deviant_guest.Custom('ES_OA')] también está aquí. ¿Cómo ha encontrado este lugar?\n\n«¡No es lo que parece, mi [ROOT.Char.GetTitleTierName]!», sostiene.\n\nEl hecho de que esté medi[deviant_guest.Custom('ES_OA')] desnud[deviant_guest.Custom('ES_OA')] y frotándose vigorosamente contra #EMP la piedra rúnica de mi familia#! me dice que, de hecho, es exactamente lo que parece."
 fp1_yearly.2600.t: "Fúria dos Nórdicos"
 fp1_yearly.2600.desc: "«[ROOT.GetCharacter.GetFirstNameNoTooltip], eres un[ROOT.Char.Custom('ES_XA')] gran guerrer[ROOT.Char.Custom('ES_OA')], pero ¿#EMP de verdad#! te temen tus enemigos ?», pregunta [berserker_teacher.GetFirstName].\n\nHe visto a [berserker_teacher.GetFirstNameNoTooltip] convertid[berserker_teacher.Custom('ES_OA')] en una fiera humana en el campo de batalla y cómo innumerables enemigos huían de su figura aulladora. Ver el berserkergang de [berserker_teacher.GetFirstNameNoTooltip] es como contemplar la furia de [ROOT.GetCharacter.GetFaith.HighGodName] en persona.\n\n«Ven junto al fuego. Invoquemos tu furia», dice, haciéndome señas."
 fp1_yearly.2600.a: "Deixe-me pegar minha pele de urso!"
 fp1_yearly.2600.b: "Não, eu prefiro estar completamente no controle."
 fp1_yearly.2600.a.tt: "Intentar convertirse en [GetTrait('berserker').GetName( GetNullCharacter )]\n#weak Puede haber riesgos…#!"
 fp1_yearly.2600.b.tt: "Deixar de aproveitar a oportunidade de se tornar um [GetTrait('berserker').GetName( GetNullCharacter )]"
 fp1_yearly.2601.desc: "Sentamos-nos junto ao fogo, entoando palavras de grande poder. Eu cerro os dentes e fecho os olhos. Um arrepio percorre meu corpo; algo se agita dentro de mim... me envolvendo.\n\nAcordo do meu frenesi"
 fp1_yearly.2601.success_no_one_harmed: "com [berserker_teacher.GetFirstName] ao meu lado.\n\n"Você liberou uma fúria verdadeiramente impressionante! Aqueles troncos não tiveram chance!", sorri [berserker_teacher.GetFirstNameNoTooltip].\n\nPelo visto trabalhei em frenesi a noite inteira! Pelo menos não vamos ficar sem lenha por semanas…"
 fp1_yearly.2601.success_harm_close_one: "y [berserker_teacher.GetFirstName] me agarra de los hombros.\n\n«¡Vuelve en ti! ¡[harmed_victim.GetFirstName] no es tu enemig[harmed_victim.Custom('ES_OA')]!», grita [berserker_teacher.GetFirstNameNoTooltip].\n\nPor [ROOT.GetCharacter.GetFaith.HighGodName], ¡¿qué he hecho?!"
 fp1_yearly.2601.success_kill_berserker: "com o cadáver destroçado de [berserker_teacher.GetFirstName] ao meu lado, olho para meus punhos cerrados, cada um segurando um machado ensanguentado…\n\nPor [ROOT.GetCharacter.GetFaith.HighGodName], o que eu fiz!?"
 fp1_yearly.2601.success_kill_everyone: "Sangue está ao meu redor. Todo mundo está morto. #EMP Todo mundo está morto.#!\n\n #EMP O que eu fiz!?#!"
 fp1_yearly.2601.fail_fall_asleep: "Sinto-me fresc[ROOT.Char.Custom('ES_OA')] como um bebê recém-nascido! [berserker_teacher.GetFirstName] me olha com desaprovação.\n\n"Dormiu bem? E eu que pensei que você tinha isso em você…", diz [berserker_teacher.GetFirstNameNoTooltip] balançando a cabeça.\n\nAcho que meu frenesi foi apenas um sonho!"
 fp1_yearly.2601.a: "Mal posso esperar pela próxima batalha!"
 fp1_yearly.2601.b: "Isso deve ter sido obra de [ROOT.Char.GetFaith.TricksterGodName]..."
 fp1_yearly.2601.c: "Bom, pelo menos me sinto ótimo!"
