l_spanish:
 ##################################################
 ##Misc Keys
 TRUCE_TRADE_DEAL: "\nTrégua assinada em troca do cessar dos saques"
 ##################################################
 ##Standard Trade Events
 fp1_trade_events.0000.t: "Saque ou Comércio"
 fp1_trade_events.0002.t: "$fp1_trade_events.0000.t$?"
 fp1_trade_events.0002.desc: "Cuando mis tropas y yo nos preparamos para saquear las tierras de [county.GetNameNoTierNoTooltip], nos llegan noticias de nuestros exploradores.\n\nSe ve que las ciudades locales son ricas, pero muchas están bien fortificadas y nos podríamos encontrar atrapados por ejércitos vengativos antes de entrar a robar en los objetivos más suculentos.\n\nNo todo está perdido: el arte de un buen asalto consiste en aprovechar las oportunidades y podríamos tal vez arreglar comercio y tributos a cambio de envainar nuestras espadas."
 fp1_trade_events.0002.a: "Talvez o(a) [county.GetHolder.GetTitleAsNameNoTooltip] local esteja disposto(a)?"
 fp1_trade_events.0002.a.accepted: "Se sua oferta for aceita"
 fp1_trade_events.0002.a.rejected: "Se sua oferta for rejeitada"
 fp1_trade_events.0002.a.tt: "Você continua saqueando [county.GetNameNoTierNoTooltip]"
 fp1_trade_events.0002.b: "Uma trégua com o(a) governante [county.GetHolder.GetTopLiege.GetTitleAsNameNoTooltip] poderia ser inestimável..."
 fp1_trade_events.0002.c: "Sim, provavelmente #EMP poderíamos#! ganhar dinheiro com o comércio. Saqueie mesmo assim."
 fp1_trade_events.0002.c.tt: "$fp1_trade_events.0002.a.tt$"
 fp1_trade_events.0002.d: "Que tipo de covarde feudal #EMP deixa de#! saquear e ganhar dinheiro?"
 fp1_trade_events.0002.d.tt: "Você saqueia [county.GetNameNoTierNoTooltip] e se recusa a pensar em negociar em vez de saquear pelo resto de sua vida."
 fp1_trade_events.0003.t: "$fp1_trade_events.0000.t$?"
 fp1_trade_events.0003.desc: "¡Una horda desordenada de bandidos, piratas y otros sinvergüenzas armados hasta los dientes ha entrado en [county.GetNameNoTierNoTooltip], liderada por [raider.GetFirstName]!\n\nAl principio, mis exploradores pensaron que estaban aquí para saquear, pero un emisario de su [raider.GetTitleAsNameNoTooltip] afirma que estarían en encantados de comerciar. Sus fuerzas son ricas en botines nuevos y viejos y le daría a los lugareños la oportunidad de comprar productos exóticos de todo el mundo.\n\nEl sentido implícito está claro: si llegamos a un buen acuerdo se irán en paz; si rechazamos su oferta, tomarán lo que deseen."
 fp1_trade_events.0003.a: "Uma oferta inesperada, mas altamente bem-vinda."
 fp1_trade_events.0003.a.tt_success: "Sua oferta é aceita!"
 fp1_trade_events.0003.b: "#EMP Negociar#! Com esses bandidos?!"
 fp1_trade_events.0003.b.tt_failure: "Sua oferta é rejeitada!"
 fp1_trade_events.0011.t: "$fp1_trade_events.0000.t$: Acomodação Confortável"
 fp1_trade_events.0011.desc.subsequent_renewal: "Por décadas"
 fp1_trade_events.0011.desc.first_renewal: "Por muitos anos"
 fp1_trade_events.0011.desc.outro: "que cheguei a um acordo com [recipient.GetTitledFirstName|l]. Meus saqueadores mantêm as armas nos cinturões em suas terras, e seus súditos compram os luxos exóticos que tomamos de domínios menos diplomáticos.\n\nMas os termos do nosso acordo quase chegaram ao fim, e muitos em meu séquito relutam em abrir mão de seus convenientes contatos comerciais.\n\nSerá que [recipient.GetFirstNameNoTooltip] abert[recipient.Custom('ES_OA')] a uma prorrogação?"
 fp1_trade_events.0011.a: "Uma grande oferta!"
 fp1_trade_events.0011.a.accepted: "Sua oferta é aceita"
 fp1_trade_events.0011.a.rejected: "Sua oferta é rejeitada"
 fp1_trade_events.0011.b: "Isso já deu o que tinha que dar..."
 fp1_trade_events.0011.b.tt: "O acordo silenciosamente expirará"
 fp1_trade_events.0012.t: "$fp1_trade_events.0011.t$"
 fp1_trade_events.0012.desc.subsequent_renewal: "$fp1_trade_events.0011.desc.subsequent_renewal$"
 fp1_trade_events.0012.desc.first_renewal: "$fp1_trade_events.0011.desc.first_renewal$"
 fp1_trade_events.0012.desc.outro: "que se mantiene mi acuerdo con [raider.GetTitledFirstName|l]: [raider.GetSheHe] contiene a sus perros y mis mercaderes compran el botín que roba en otros lados.\n\nCon el fin del acuerdo a la vista, [raider.GetFirstNameNoTooltip] se ha puesto en contacto conmigo para solicitar una prórroga.\n\nEn privado, varios de sus guerreros más acaudalados me han ofrecido exquisitos regalos a cambio de seguir proporcionando libre acceso a nuestros mercados. Y #EMP sí#! que es agradable no tener que preocuparse de que unos jinetes [raider.GetPrimaryTitle.GetAdjectiveNoTooltip] saqueen la campiña…"
 fp1_trade_events.0012.a: "Uma proposta muito agradável!"
 fp1_trade_events.0012.a.tt_success: "$fp1_trade_events.0011.a.accepted$"
 fp1_trade_events.0012.b: "Já estou farto dest[raider.Custom('ES_EA')] [raider.GetWomanMan]."
 fp1_trade_events.0012.b.tt: "$fp1_trade_events.0011.b.tt$"
 fp1_trade_events.0012.b.tt_failure: "$fp1_trade_events.0011.a.rejected$"
 fp1_trade_events.0021.t: "$fp1_trade_events.0000.t$: Visitantes de Longe"
 fp1_trade_events.0021.desc: "Mi acuerdo comercial con [partner.GetTitledFirstName|l] garantiza que los comerciantes y nobleza menor a mi cargo visiten de forma regular sus tierras para promocionar su botín e importar lujos extranjeros.\n\nDesde luego, mucho menos común es que una expedición de [partner.GetPrimaryTitle.GetNameNoTier] se abra paso hasta [ROOT.Char.GetPrimaryTitle.GetNameNoTier], todo un evento en [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTier]. Puede resultar raro ver a extranjeros de tan lejos con las manos libres.\n\nLos capitanes de tal expedición han conseguido una audiencia para recabar apoyo: un [priest.GetFaith.PriestNeuter] elocuente y un mercader perspicaz."
 fp1_trade_events.0021.a: "Eu poderia usar alguém para contar meu dinheiro..."
 fp1_trade_events.0021.b: "Bem-vind[priest.Custom('ES_OA')] ao meu serviço, [priest.GetFirstNameNoTooltip]!"
 fp1_trade_events.0021.c: "E quem está acompanhando você no fundo?"
 fp1_trade_events.0021.d: "Sigam em frente, estrangeiros, meu acordo é com [partner.GetFirstNameNoTooltip]."
 fp1_trade_events.0031.t: "$fp1_trade_events.0021.t$"
 fp1_trade_events.0031.desc: "Os saqueadores de [raider.GetTitledFirstNameNoTooltip|l] são aterradores, tanto que fico agradecido por nos considerarmos amigos cautelosos em vez de inimigos sanguinários.\n\nUm dos mais #EMP feroces#! de seus membros é [warrior.GetFirstName], cuja reputação é de peso.\n\nQuando [warrior.GetSheHe] me pediu uma audiência, eu quase esperava uma tentativa de assassinato, mas fiquei #EMP gratamente#! surpreso ao descobrir que esse jovem guerreir[warrior.Custom('ES_OA')] desejava oferecer seus serviços."
 fp1_trade_events.0031.a: "[warrior.Custom('ES_LoLa')|U]s espadachin[warrior.Custom('ES_EA')]s de [raider.GetPrimaryTitle.GetNameNoTierNoTooltip] são legendári[warrior.Custom('ES_OA')]s!"
 fp1_trade_events.0031.b: "Vá embora, bandido[warrior.Custom('ES_OA')]."
 fp1_trade_events.0041.t: "$fp1_trade_events.0000.t$: Beligerantes com Benefícios"
 fp1_trade_events.0041.desc: "Mi acuerdo con [partner.Custom('ES_ElLa')] [partner.GetTitledFirstName|l] es beneficioso para ambas partes, pero a veces me pregunto si estoy aprovechando todo su potencial. A mis tierras les vendría bien el toque de sus expertos albañiles y carpinteros. Y aunque [partner.GetSheHe] está a salvo de mis incursores, muchos otros no tienen tales acuerdos.\n\nCon un poco de gasto conjunto que facilitase el tránsito de nuestros sirvientes, podríamos solventar ambos problemas: [partner.GetFirstNameNoTooltip] me manda artesanos diestros para que me sirvan un tiempo y, a cambio, yo le prestaría guerreros mayores y colonos ansiosos como consejeros para mantener sus tierras a salvo."
 fp1_trade_events.0041.foreign_architects_growth.tt: "Seu [domain|lE] [counties|lE] subdesenvolvido(s)"
 fp1_trade_events.0041.foreign_architects_no_growth.tt: "Seu [domain|lE] [counties|lE] com pelo menos 15 [development|lE]"
 fp1_trade_events.0041.partner_gets_raid_aid.tt: "Um dos [duchies|lE] mais vulneráveis de [partner.GetFirstNameNoTooltip] fica mais difícil de [Concept( 'raid', 'asaltar' )|E]"
 fp1_trade_events.0041.raider_gets_civic_aid.tt: "O [domain|lE] de [raider.GetFirstName] obtém crescimento maior de [development|lE] e descontos em construção"
 fp1_trade_events.0041.partner.benefiting_counties.tt: "[counties|E] no [duchy|lE] nomeado"
 fp1_trade_events.0041.a.advanced: "Eles poderiam construir um palácio no estilo [partner.GetCulture.GetNameNoTooltip]?"
 fp1_trade_events.0041.a.fallback: "Mãos habilidosas são sempre bem-vindas..."
 fp1_trade_events.0041.a.offer_accepted: "$fp1_trade_events.0011.a.accepted$"
 fp1_trade_events.0041.a.offer_rejected: "$fp1_trade_events.0011.a.rejected$"
 fp1_trade_events.0041.b: "Vamos manter isso informal."
 fp1_trade_events.0051.t: "$fp1_trade_events.0041.t$"
 fp1_trade_events.0051.desc: "[raider.GetTitledFirstName], mi soci[raider.Custom('ES_OA')] comercial a ratos, me ha presentado una oferta intrigante. Aunque es cierto que mis tierras están a salvo de sus jinetes, no se puede decir lo mismo de muchos otros villanos y nómadas, mientras que sus tierras son pobres y subdesarrolladas.\n\nSi ambos corriésemos con los gastos de viajes de nuestros servidores, [raider.GetFirstNameNoTooltip] me propone una especie de programa de intercambio: guerreros veteranos y colonos de sus tierras acudirían para proteger una de mis fronteras más vulnerables de ladrones menos delicados, mientras que albañiles y carpinteros de mi señorío servirían un tiempo en el suyo."
 fp1_trade_events.0051.offer_accepted: "$fp1_trade_events.0011.a.accepted$"
 fp1_trade_events.0051.offer_rejected: "$fp1_trade_events.0011.a.rejected$"
 fp1_trade_events.0051.a: "[option_1.GetNameNoTierNoTooltip] poderia usar alguns especialistas..."
 fp1_trade_events.0051.b: "[option_2.GetNameNoTierNoTooltip] pode ser um bom lugar para eles?"
 fp1_trade_events.0051.c: "Acho que prefiro fortalecer [option_3.GetNameNoTierNoTooltip]."
 fp1_trade_events.0051.d: "Que proposta ultrajante!"
 ##################################################
 #Special Trade Events
 fp1_trade_events.1131.t: "A Ameaça Northerner"
 fp1_trade_events.1131.desc: "Uma horda de piratas desordeiros, homens livres sem terras, filhos mais novos desesperados e outros malfeitores se juntou à proposta de [attacker.GetFirstName] de atacar minhas possessões.\n\nEmbora seja uma força de tamanho formidável, eles carecem de disciplina ou lealdade, com cada mercenário improvisado focado exclusivamente no que pode extrair da guerra acima de tudo.\n\nAo contrário de um inimigo convencional, talvez seja possível tratar diretamente com os invasores. Talvez se possa fazer um acordo..."
 fp1_trade_events.1131.a: "Nunca! De volta para o seu inferno congelado, escória!"
 fp1_trade_events.1131.b: "Se é terra que eles querem, por que não dar a eles?"
 fp1_trade_events.1131.c: "Na minha experiência, os soldados preferem ouro a glória..."
 fp1_trade_events.1131.c.tt: "Você paga um tributo diretamente às tropas de [attacker.GetFirstNameNoTooltip] para que elas se dispersem"
 fp1_trade_events.1131.d: "Vamos banir esses invasores como sempre fizemos."
 fp1_trade_events.1131.d.tt: "Você luta contra os Nords à moda antiga"
 fp1_trade_events.1171.t: "$fp1_trade_events.0000.t$: Uma Mão Santa Auxiliadora"
 fp1_trade_events.1171.desc: "Pese a las circunstancias #EMP poco corrientes#! en las que comenzó, mi relación con [partner.GetTitledFirstName|l] ha crecido con el tiempo.\n\nMás fuerte de lo que pensaba, ya que su última carta expresa una genuina preocupación por el destino de mi alma.\n\nEn un intento por convencerme para que me convierta al [partner.GetFaith.GetName], [partner.GetFirstNameNoTooltip] me ofrece la mano de su [prospective_spouse.Custom('GetDaughterSon')], una gran ceremonia para recibirme en su fe #EMP y#! una dote sustanciosa"
 fp1_trade_events.1171.a: "São argumentos #EMP muy#! convincentes…"
 fp1_trade_events.1171.b: "Que gesto bonito! Para uma amizade eterna!"
 fp1_trade_events.1171.b.tt: "Todos os efeitos acima, além de..."
 fp1_trade_events.1171.c.cynical: "Ah, eu esperava um suborno melhor do que isso."
 fp1_trade_events.1171.c.fallback: "Nenhum suborno pode me tentar a abandonar a [raider.GetFaith.GetNameNoTooltip]."
