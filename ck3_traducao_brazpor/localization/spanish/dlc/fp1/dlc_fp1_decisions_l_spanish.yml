l_spanish:
 secure_high_kingdom_north_sea_decision: "Assegure o Alto Reino do Mar do Norte"
 secure_high_kingdom_north_sea_decision_desc: "Os reinos de $k_england$, $k_denmark$ e $k_norway$ são uma combinação natural. Ricos, ferozes e unidos pelo comércio e sangue nobre. Se apenas alguém pudesse superar seu individualismo, unindo os três permanentemente..."
 secure_high_kingdom_north_sea_decision_tooltip: "Una $k_england$, $k_denmark$ e $k_norway$ em um [de_jure|lE] [realm|lE]"
 secure_high_kingdom_north_sea_decision_confirm: "Acima de tudo, um Grande Rei!"
 secure_high_kingdom_north_sea_decision_solve_danelaw: "O $k_danelaw$ já tem [counties|lE] [de_jure|lE] e primeiro $k_england$ é necessário desfazer a partição."
 secure_high_kingdom_north_sea_scripted_effect.daneland_reabsorbed.tt: "Todos os [duchies|lE] [Concept( 'completely_controlled', 'totalmente controlados' )|E] de $k_daneland$ devem ser [Concept( 'de_jure_drift_drifted', 'derivados' )|E] de volta a $k_england$"
 secure_high_kingdom_north_sea_scripted_effect: "Você recebe um [strong_hook|El] #weak (lealtad)#! sobre os [powerful_vassals|El]"
 secure_high_kingdom_north_sea_custom_powerful_vassals: "Todo [powerful_vassal|El]"
 secure_high_kingdom_denmark_held_years: "[temp_scope.GetName] mantido em posse por #V 10#! anos #weak (atualmente [SCOPE.ScriptValue('north_sea_held_value')|0V])#!"
 secure_high_kingdom_neustria: "Você ganha o [title|El] do #V Reino de Neustria#!"
 secure_high_kingdom_custom_every_coastal: "Toda [province|El] litorânea"
 north_sea_kingdom_coastal_modifier: "Pax Nordica"
 found_capital_of_the_rus_decision: "Fundar a Capital dos Rus'"
 found_capital_of_the_rus_decision_desc: "Nórdicos empreendedores saem da Escandinávia e percorrem os ricos rios dos ferozes eslavos do leste. Embora inúmeros assentamentos e reinos menores disputem o poder, tanto eslavos quanto nórdicos, apenas #EMP um#! pode verdadeiramente representar a unificação dos dois povos..."
 found_capital_of_the_rus_decision_tooltip: "Estabeleça sua capital como o verdadeiro lar de todos os Rus'"
 found_capital_of_the_rus_decision_confirm: "Uma grande capital para sempre!"
 found_capital_of_the_rus_decision_before_last_date: "A data é 1100.1.1 ou anterior"
 elevate_mann_and_the_isles_decision: "Elevar o Reino de Mann e as Ilhas"
 elevate_mann_and_the_isles_decision_desc: "A $c_isle_of_man$ está unicamente posicionada para atuar como um refúgio para saqueadores nórdicos, com fácil acesso não só às Ilhas Britânicas, mas a toda a Europa Ocidental.\n\nTudo o que precisa é alguém para mostrar a todos os bons vikings o caminho, para realizar seu potencial e pavimentar a ilha com ouro e ferro!"
 elevate_mann_and_the_isles_decision_tooltip: "Torne-se o governante pirata mais infame de todos os tempos"
 elevate_mann_and_the_isles_decision_confirm: "À infâmia e imortalidade!"
 hold_gruesome_festival_decision_blot_name: "Realizar Grande Blót"
 hold_gruesome_festival_decision_fallback_name: "Realizar Grande Sacrifício"
 hold_gruesome_festival_decision_desc.gf_humsac_practitioner: "Já passou da hora de todos os [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] se reunirem para fazer sacrifícios a [ROOT.Char.GetFaith.PantheonTerm]. Esses rituais não apenas unem os fiéis, mas também confirmam meu lugar como [ROOT.Char.GetTitleAsNameNoTooltip] de toda a terra."
 hold_gruesome_festival_decision_desc.non_gf_practioner: "Há entre meus súditos aqueles que praticam grandes ritos de sacrifício abençoados por sua [GetPlayer.GetTitleAsNameNoTooltip|l]. Não tenho dúvida de que, se eu concordar em realizar até mesmo uma variante limitada, isso certamente me renderia sua aprovação, embora adotar seus costumes mais... bárbaros possa me trazer o desprezo daqueles que rejeitam suas tradições."
 hold_gruesome_festival_decision_tt: "Você organiza um grande [Select_CString( Character.IsLocalPlayer, GetPlayer.Custom('GruesomeFestivalName') , '$gruesomefestivalname_festival|q$' )], envolvendo:\n#indent_newline:0 $EFFECT_LIST_BULLET$ Decidir o tamanho do festival\n#indent_newline:0 $EFFECT_LIST_BULLET$ Escolher o que sacrificar, até mesmo escolhendo um de seus [prisoners|lE] como [designate_chief_sacrifice_chief_sacrifice|lE]\n#indent_newline:0 $EFFECT_LIST_BULLET$ Ganhar ou perder [county_opinion|lE] e [opinion|lE] de [character|lE] dependendo dos [core_tenets|lE] da [faith|lE] de seus súditos"
 hold_gruesome_festival_decision_tt.piety_gain: "#indent_newline:0 Você ganha [piety|lE] porque é de fé [GetPlayer.GetFaith.GetAdherentName]"
 hold_gruesome_festival_decision_tt.piety_lose: "#indent_newline:0 #EMP Pierdes#! [piety|lE] porque você é de credo [GetPlayer.GetFaith.GetAdherentName]"
 hold_gruesome_festival_decision_tooltip: "Você convida seus súditos a participar de um ritual sagrado e custoso."
 hold_gruesome_festival_decision_confirm: "Na morte, renascimento."
 raise_stele_decision_name: "Erguer Pedra Rúnica"
 raise_stele_decision_desc: "É costumeiro entre os [GetPlayer.GetCulture.GetNameNoTooltip] erguer monumentos esculpidos para comemorar eventos importantes. A morte de um ente querido, a solução de uma disputa, a aquisição de terras e assim por diante. Talvez eu possa me beneficiar de tal rocha..."
 raise_stele_decision_tt.effects_list: "Um de seus [counties|lE] receberá um destes [modifiers|lE]:\n#indent_newline:0 $EFFECT_LIST_BULLET$ [GetModifier('fp1_stele_ancestors_strong').GetNameWithTooltip]\n#indent_newline:0 $EFFECT_LIST_BULLET$ [GetModifier('fp1_stele_conquest_strong').GetNameWithTooltip]\n#indent_newline:0 $EFFECT_LIST_BULLET$ [GetModifier('fp1_stele_promotion_strong').GetNameWithTooltip]"
 raise_stele_decision_tt.variable_strength: "Todos os modificadores são mais fortes quando erguidos em [cultures|lE] que usam pedras rúnicas"
 raise_stele_decision_tooltip: "Pague pela gravação de uma pedra rúnica em um dos seus condados"
 raise_stele_decision_confirm: "Mas o que gravar?"
 fp1_raise_runestone_vassals: "$EFFECT_LIST_BULLET$ Todos os [direct_vassals|lE] que também usam pedras rúnicas"
 raise_stele_decision_ancestor: "Você tem um ancestral recentemente falecido"
 raise_stele_decision_victory: "Você conquistou recentemente território"
 raise_stele_decision_rank: "Você ganhou recentemente um título"
 forge_the_jomsvikings_decision: "Forjar os Jomsvikings"
 forge_the_jomsvikings_decision_desc: "Os velhos caminhos estão morrendo. Diariamente, os abraâmicos seduzem nossos plebeus com promessas de vida eterna para todos, nossos aventureiros e colonos adotam deuses estrangeiros onde quer que desembarquem, e até reformistas dentro da Escandinávia querem nos tornar mais semelhantes aos povos da Cruz e da Lua.\n\nChega. Todos os leais [GetPlayer.GetFaith.GetAdherentNamePluralNoTooltip] devem se unir, para se guardarem contra a mudança e a blasfêmia!"
 forge_the_jomsvikings_decision.tt.is_in_correct_region: "Está na [GetGeographicalRegion('dlc_fp1_region_non_scandinavian_southern_baltic').GetName] [region|lE]"
 forge_the_jomsvikings_decision.tt.empty_castle_or_city: "Deve ter pelo menos uma [castle|lE] ou [city|lE] vazia, além da [county_capital|lE]"
 forge_the_jomsvikings_decision_tooltip: "Encontre um grupo de vikings piedosos para defender os velhos caminhos"
 forge_the_jomsvikings_decision_confirm: "Valhalla apenas para os dignos!"
 fp1_valid_norse_faith_for_jomsvikings_trigger_tt: "[THIS.Char.GetFaith.GetName] faz parte da [GetReligionByKey('germanic_religion').GetAdjective] [religion|lE] e é não-reformada"
