l_spanish:
 #St Peter's Basilica
 building_type_holy_site_st_peters_basilica_01: "$building_holy_site_st_peters_basilica_01$"
 building_type_holy_site_st_peters_basilica_01_desc: "$building_holy_site_st_peters_basilica_01_desc$"
 building_holy_site_st_peters_basilica_01: "Basílica de São Pedro"
 building_holy_site_st_peters_basilica_01_desc: "Erguida sobre o túmulo de São Pedro na colina do Vaticano por ordem do imperador Constantino I, após sua conversão ao cristianismo, a Basílica de São Pedro serve como centro da cristandade no Ocidente. \n\nSegundo a tradição, esta igreja serve como sede do papa católico e, ao longo dos séculos, expandiu-se até se tornar um vasto complexo, protegido pela Muralha Leonina."
 #Mont-Saint-Michel
 building_type_mont_st_michel_01: "Monte Saint-Michel"
 building_type_mont_st_michel_01_desc: "$building_mont_st_michel_01_desc$"
 building_mont_st_michel_01: "Oratório de São Aubert a São Miguel"
 building_mont_st_michel_01_desc: "Em 708, São Aubert, bispo de Avranches, viu em sonho uma visão do arcanjo Miguel, que lhe ordenou construir um oratório em uma ilha de maré próxima. Aubert, a princípio, ignorou essa visão, atribuindo-a a uma artimanha do Diabo. Por fim, o arcanjo conseguiu convencê-lo — segundo a lenda, perfurando-lhe o crânio com um toque — e o bispo ordenou a construção de um novo santuário no Monte Tombe. \n\nAssim começa a história de Mont-Saint-Michel."
 building_mont_st_michel_02: "A abadia românica de Mont-Saint-Michel"
 building_mont_st_michel_02_desc: "A nova igreja da abadia está situada no ponto mais alto da ilha, como testemunho do poder de Deus acima de tudo no Céu e na Terra, e da engenhosidade da humanidade. \n\nAos pés da abadia, uma pequena vila de peregrinos e pescadores cresce lentamente."
 building_mont_st_michel_03: "A Merveille"
 building_mont_st_michel_03_desc: "A abadia foi expandida com uma série de claustros, uma capelania, uma adega de vinhos, a Sala dos Cavaleiros e muitos alojamentos, formando um complexo gótico que só pode ser descrito como uma maravilha da engenharia. \n\nA abadia agora possui novas fortificações formidáveis, e o assentamento aos seus pés já é uma verdadeira cidade, abrigando tanto peregrinos quanto moradores locais."
 building_mont_st_michel_04: "Mosteiro fortificado de Mont-Saint-Michel"
 building_mont_st_michel_04_desc: "As guerras recentes deixaram claro que até uma ilha de paz como Mont-Saint-Michel pode ser um ponto de interesse estratégico essencial. Por esse motivo, a rocha foi fortemente fortificada com muralhas e bastiões pesados, e várias novas acomodações foram criadas para a guarnição. 

A cidade costeira agora é vibrante, com quase a ilha inteira coberta por casas."
 #Sanchi Stupa
 building_type_sanchi_stupa_01: "Grande Estupa de Sanchi"
 building_type_sanchi_stupa_01_desc: "A Grande Estupa foi construída pelo imperador máuria Ashoka no século III a.C., perto do local de seu casamento com sua esposa Devi. A grandiosa estrutura que abriga relíquias de Buda é uma das mais antigas de seu tipo, e também é famosa por seus portais torana intrincadamente esculpidos."
 building_sanchi_stupa_01: "Grande Estupa de Sanchi"
 building_sanchi_stupa_01_desc: "$building_boudhanath_01$"
 #Boudhanath
 building_type_boudhanath_01: "Boudhanath"
 building_type_boudhanath_01_desc: "A Estupa Boudha de Katmandu, também conhecida como Jarung Kashor e Khāsa Chaitya, é uma das maiores estupas do budismo e pode ter sido o local de nascimento do que viria a se tornar o ramo tibetano do budismo. Sua enorme cúpula e mandala abrigam os restos de vários budas e incontáveis relíquias sagradas de diversas formas e tipos. \n\nPor estar situada em uma antiga rota comercial entre o Nepal e o Tibete, viajantes e mercadores costumam parar ali para descansar e orar."
 building_boudhanath_01: "Boudhanath"
 building_boudhanath_01_desc: "$building_yazd_mosque_01$"
 #Grand Mosque of Yazd
 building_type_yazd_mosque_01: "Grande Mesquita de Yazd"
 building_type_yazd_mosque_01_desc: "Construído no local de um Templo do Fogo do século IV, este ilustre edifício maravilha tanto viajantes quanto peregrinos com seus grandes iwanes, sua cúpula azulejada e seu portal de entrada majestoso com um par de minaretes altíssimos."
 building_yazd_mosque_01: "Grande Mesquita de Yazd"
 building_yazd_mosque_01_desc: "$building_qutb_minar_01$"
 #Qutb Minar
 building_type_qutb_minar_01: "Pilar de ferro de Deli"
 building_type_qutb_minar_01_desc: "O imponente Pilar de Ferro de Délhi se ergue como símbolo da glória do rei Chandragupta II, embora governantes posteriores também tenham gravado seus nomes nele. Apesar de estar de pé há muito tempo, não há nenhum traço de ferrugem — um testemunho da habilidade dos ferreiros indianos!"
 building_qutb_minar_01: "Qutb Minar"
 building_qutb_minar_01_desc: "A Quwwat-ul-Islam, uma grande mesquita que circunda o antigo local que era o Pilar de Ferro de Délhi, coroada por um minarete verdadeiramente enorme chamado Qutb Minar. \n\nUm monumento magnífico ao poder dos governantes de Délhi."
 building_qutb_minar_02: "Mesquita Quwwat-ul-Islam ampliada"
 building_qutb_minar_02_desc: "O complexo em torno do Qutb Minar foi ampliado com mais pátios, portões e mausoléus, alcançando proporções lendárias."
 building_qutb_minar_03: "Alai Minar"
 building_qutb_minar_03_desc: "Um segundo minarete foi adicionado ao complexo, projetado à imagem do Qutb Minar, mas com o dobro do tamanho. Este colosso que se ergue sobre Deli é o ápice da arquitetura indo-islâmica."
 building_qutb_minar_04: "Alai Minar"
 building_qutb_minar_04_desc: "Um segundo minarete foi adicionado ao complexo, projetado à imagem do Qutb Minar, mas com o dobro do tamanho. Este colosso que se ergue sobre Deli é o ápice da arquitetura indo-islâmica."
