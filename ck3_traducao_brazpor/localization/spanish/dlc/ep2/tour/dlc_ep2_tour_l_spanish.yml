l_spanish:
 ##### TOUR #####
 ### ACTIVITY
 activity_tour: "Grande Turnê"
 activity_tour_desc: "Realize uma magnífica [tour|lE] e visite seus [vassals|E] e suas terras. Cada [stop|lE] terá duração de #bold 2 meses#!."
 activity_tour_selection_tooltip: "Viaje por todo o seu reino e visite seus vassalos em uma magnífica tournée\n\nRecompensas esperadas:\n$BULLET_WITH_TAB$[county_control|E] [control_i]\n$BULLET_WITH_TAB$[county_opinion|E] @domain_icon!\n$BULLET_WITH_TAB$Ganho de [legitimacy|lE] [legitimacy_i]\n$BULLET_WITH_TAB$Perda de [stress|lE] [stress_loss_i]"
 activity_tour_host_desc: "$BULLET_WITH_TAB$[county_control|E] @control_icon!\n$BULLET_WITH_TAB$[county_opinion|E] @domain_icon!\n$BULLET_WITH_TAB$ Ganho de [legitimacy|lE] [legitimacy_i]\n$BULLET_WITH_TAB$ Perda de [stress|El] [stress_loss_i]\n\nRecompensas da etapa de [tour_success|lE]:\n$BULLET_WITH_TAB$ Etapa #V 1#!: [prestige|lE] [prestige_i|E]\n$BULLET_WITH_TAB$ Etapa #V 2#!: [opinion|lE] de [vassal|lE] [GetVassalStance( 'parochial' ).GetName|l] [GetVassalStance( 'parochial' ).GetTextIcon]\n$BULLET_WITH_TAB$ Etapa #V 3#!: [opinion|lE] de [vassal|lE] visitado\n$BULLET_WITH_TAB$ Etapa #V 4#!: [GetModifier( 'itinerant_liege_modifier' ).GetNameWithTooltip|lE] #weak ([character|lE])#!\n$BULLET_WITH_TAB$ Etapa #V 5#!: [GetModifier( 'mega_itinerant_liege_modifier' ).GetNameWithTooltip|lE] #weak ([character|lE])#!"
 activity_tour_conclusion_characters_header: "Vassalos Visitados"
 itinerant_liege_modifier: "Suserano Itinerante"
 itinerant_liege_modifier_desc: "Este personagem realizou uma [tour|lE] bem-sucedida."
 mega_itinerant_liege_modifier: "Suserano Magnífico"
 mega_itinerant_liege_modifier_desc: "Este personagem realizou uma [tour|lE] magnífica."
 activity_window_character_stop_host: "Parar anfitrião\n[Character.GetShortUINameNoTooltip|U]"
 activity_tour_conclusion_desc: "Sua [GetActivityType( 'activity_tour' ).GetName|l] chegou ao fim."
 ### PHASES
 tour_phase_tour_grounds: "Tour pelas Terras"
 tour_phase_tour_grounds_desc: "[Concept( 'tour_the_grounds', 'Visitas los terrenos' )|E] na posse de seu [vassal|lE] para aumentar o [control|lE]."
 tour_phase_dinner: "Jantar Realizado"
 tour_phase_dinner_desc: "Você desfruta de um [hosted_dinner|El] organizado pelo seu [vassal|El], aumentando a [opinion|El] com seu vassalo."
 tour_phase_cultural_festival: "Festival Cultural"
 tour_phase_cultural_festival_desc: "Você aprecia um [cultural_festival|El], conhecendo a cultura local e aumentando a [county_opinion|El] e a [cultural_acceptance|El]."
 tour_phase_journey_home: "Retornar para Casa"
 tour_phase_journey_home_desc: "Retorne à sua capital, encerrando sua turnê."
 tour_phase_tour_grounds_cost_desc: "[tour_grounds|EU] em [province.GetBaronyNameExplicitly]"
 tour_phase_dinner_cost_desc: "[hosted_dinner|EU] em [province.GetBaronyNameExplicitly]"
 tour_phase_cultural_festival_cost_desc: "[cultural_festival|EU] em [province.GetBaronyNameExplicitly]"
 ### OPTIONS
 tour_option_speed: "Cavalos"
 tour_speed_bad: "Burros"
 tour_speed_normal: "Corcéis"
 tour_speed_good: "Secretariado"
 tour_type_majesty: "Turnê da Majestade"
 tour_type_majesty_desc: "$EFFECT_LIST_BULLET$ Alguns eventos permitirão ações especialmente majestosas\n$EFFECT_LIST_BULLET$ Realizá-las concede [prestige|El] e [opinion|El] de [vassal|lE] tanto ao partir de uma [stop|El] como ao final da sua [GetActivityType('activity_tour').GetName|l]\n\n#weak Esta gran gira es una oportunidad para demostrarles a mis súbditos que soy un[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom('ES_SennorSennora')] just[ROOT.Char.Custom('ES_OA')], benévol[ROOT.Char.Custom('ES_OA')] y majestuos[ROOT.Char.Custom('ES_OA')].#!"
 tour_type_intimidation: "Turnê da Intimidação"
 tour_type_intimidation_desc: "$EFFECT_LIST_BULLET$ Alguns eventos permitirão ações especialmente terríveis\n$EFFECT_LIST_BULLET$ Realizá-las concede [dread|El]\n$EFFECT_LIST_BULLET$ Quando você se afastar de uma [stop|El], você pode tentar forçar os [vassals|El] a sair de [factions|El] hostis\n\n#weak Esta gran gira es una oportunidad para poner a mis súbditos en su sitio y demostrar lo aterrador[ROOT.Char.Custom('ES_XA')] que puedo llegar a ser en verdad.#!"
 tour_type_taxation: "Turnê da Tributação"
 tour_type_taxation_desc: "$EFFECT_LIST_BULLET$ Alguns eventos permitirão ações avarentas\n$EFFECT_LIST_BULLET$ Realizá-las ganha [gold|El], tanto ao partir de uma [stop|El] quanto no final de sua [GetActivityType('activity_tour').GetName|l]\n\n#weak Esta Grande Turnê é uma oportunidade de lembrar meus vassalos que lhes é devido tributo e obrigação, e de erradicar qualquer evasão fiscal em meu reino.#!"
 tour_entourage: "Comitiva"
 tour_entourage_small: "Comitiva Pequena"
 tour_entourage_small_desc: "$EFFECT_LIST_BULLET$ Cinco [courtiers|El] próximos te acompanharão na [tour|El]\n\n#weak Esta gira es una oportunidad para alejarme de la vida cortesana y ver a los súbditos más lejanos. No necesito que la cháchara de la corte me siga en mis viajes.#!"
 tour_entourage_normal: "Comitiva Modesta"
 tour_entourage_normal_desc: "$EFFECT_LIST_BULLET$ Dez [courtiers|El] próximos me acompanharão na [tour|lE]\n$EFFECT_LIST_BULLET$ $tour_increase_prestige$\n\n#weak Esta turnê não é apenas para mim, mas também para a minha corte. Devo levar um pequeno séquito para que meus vassalos conheçam melhor os meus cortesãos.#!"
 tour_entourage_grand: "Comitiva Magnífica"
 tour_entourage_grand_desc: "$EFFECT_LIST_BULLET$ Todos os [courtiers|El] disponíveis te acompanharão na [tour|El]\n$EFFECT_LIST_BULLET$ $tour_increase_prestige$\n\n#weak Esta gira es una gran oportunidad para enseñar lo grandios[ROOT.Char.Custom('ES_OA')] y magnífic[ROOT.Char.Custom('ES_OA')] que soy, ¿y qué mejor manera para ello que mostrar a todos los miembros de mi envidiable corte?#!"
 tour_luxuries: "Luxos"
 tour_luxuries_bad: "Sem Luxos"
 tour_luxuries_bad_desc: "$EFFECT_LIST_BULLET$ Não aumenta o sucesso de sua [tour|El]\n\n #weak No traes artículos de lujo de casa.#!"
 tour_luxuries_normal: "Luxos Essenciais"
 tour_luxuries_normal_desc: "$EFFECT_LIST_BULLET$ $tour_increase_success$\n\n #weak Você traz apenas o essencial em alimentos luxuosos e comodidades.#!"
 tour_luxuries_good: "Luxos Extravagantes"
 tour_luxuries_good_desc: "$EFFECT_LIST_BULLET$ $tour_increase_success$\n\n#weak Nenhum gasto é grande demais para sua turnê, toda sorte de iguarias e comodidades será trazida ao longo de sua turnê.#!"
 tour_furniture_normal: "Móveis Luxuosos"
 tour_furniture_normal_desc: "$EFFECT_LIST_BULLET$ $tour_increase_success$\n $EFFECT_LIST_BULLET$ $tour_increase_prestige$\n\n #weak Armários, cadeiras e mesas serão trazidos em sua turnê.#!"
 tour_furniture_good: "Móveis Excessivos"
 tour_furniture_good_desc: "$EFFECT_LIST_BULLET$ $tour_increase_success$\n$EFFECT_LIST_BULLET$ $tour_increase_prestige$\n\n#weak Te llevarás prácticamente todos los artefactos y muebles que posees para demostrar tu tremenda riqueza.#!"
 tour_increase_success: "Aumentar o sucesso inicial de sua [tour|El]"
 tour_increase_prestige: "Ganho de [prestige|El]"
