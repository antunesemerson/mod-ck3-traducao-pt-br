 cultural_festival.2110.t: "Um Artista Inesperado"
 cultural_festival.2110.desc.intro: "A Grande Peça"
 cultural_festival.2110.desc.callous: "Uma grande oportunidade se apresenta para mim com a visita do meu [visiting_liege.GetLadyLord] , [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitledFirstName|l]. Eu certamente poderia aproveitar este encontro fadado pelo destino para conquistar sua simpatia e provavelmente ter mais facilidade para conseguir o que quero…\n\nTalvez eu pudesse organizar uma peça de teatro que retrate seus grandes feitos?"
 cultural_festival.2110.desc.outro: "Uma oportunidade perfeita para conquistar o favor do meu [visiting_liege.GetLadyLord]!"
 cultural_festival.2110.a: "Seu [visiting_liege.GetLadyLord] apreciará um bom retrato…"
 cultural_festival.2110.b: "Não vou gastar ouro com isso."
 cultural_festival.2110.c: "A Grande Peça: Um Elogio?"
 cultural_festival.2110.d: "O palco foi montado para a peça, bem no meio da praça. Guirlandas festivas pendem dos postes e os intérpretes estão dando os retoques finais no roteiro. "Claro que [visiting_liege.GetSheHe] não gosta de maçãs, seu idiota!", ouço o dramaturgo reclamar com [Select_CString( liege_actor.IsFemale, 'a atriz', 'o ator' )] principal.

Espero até o fim do ensaio e [liege_actor.GetSheHe] se apressa em se aproximar de mim antes que eu vá embora. "[ROOT.Char.Custom('FormOfAddressForLiege')|U]!", [liege_actor.GetSheHe] junta as mãos, quase suplicando. "Você tem alguma ideia de como eu deveria representar [visiting_liege.Custom('ES_AlAla')] [visiting_liege.GetTitledFirstNameNoTooltip|l]?""
 cultural_festival.2110.e: "\"O coração bondoso de [visiting_liege.GetShortUIName] deve ser refletido aqui.\""
 cultural_festival_2110_d_tt: "\"[visiting_liege.GetShortUIName] sempre age com coragem!\""
 cultural_festival_2110_d_opinion_tt: "\"Nada seria mais importante para [visiting_liege.GetShortUIName] do que a honra.\""
 available_because_intent_tt: "\"A ambição de [visiting_liege.GetShortUIName] não conhece limites!\""
 #Tour Cultural Festival Events - Bilateral
 cultural_festival.3000.t: ""Que reflita quão piedos[visiting_liege.Custom('ES_OA')] é [visiting_liege.GetShortUIName]!""
 cultural_festival.3000.desc: ""Lembrem-se de que [visiting_liege.GetSheHe] sempre está pront[visiting_liege.Custom('ES_OA')] para a ação!"."
 cultural_festival.3000.a: ""Certifique-se de retratar sua gentileza excepcional"."
 cultural_festival.3000.a.tt: ""Sua beleza faria qualquer um desmaiar!""
 cultural_festival.3000.b: "\"A força do seu corpo não conhece rival.\""
 cultural_festival.3001.t: "Mostrem que todos [visiting_liege.GetHerHim] amam e admiram."
 cultural_festival.3001.desc: "\"Reflete a aura dominante que [visiting_liege.GetSheHe] tem sobre as pessoas.\"", ouço o dramaturgo reclamar com [Select_CString( liege_actor.IsFemale, 'a atriz', 'o ator' )] principal.

Espero até o fim do ensaio e [liege_actor.GetSheHe] se apressa em se aproximar de mim antes que eu vá embora. "#F A recepção da representação por parte de [visiting_liege.GetTitledFirstName|l] depende de quão bem ela se adequa a [visiting_liege.GetSheHe]#!"
 cultural_festival.3001.compassionate: "Ao meu [visiting_liege.GetLadyLord] não vai gostar, mas #EMP a mí#! sim."
 cultural_festival.3001.bold: "Tudo em Jogo"
 cultural_festival.3001.honorable: "Este personagem decidiu retratar seu suserano como um bobo da corte em uma Peça Festival."
 cultural_festival.3001.greed: "A Grande Peça"
 cultural_festival.3001.rational: "Um palco de madeira ergue-se orgulhosamente no meio da praça. Coroas festivas pendem dos postes e os atores se escondem em um dos lados, rindo, conversando. Todos se calam no instante em que [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitledFirstName|l] entra, com o peito estufado, transbordando de orgulho.\n\n"Gostaria de anunciar que a peça em homenagem a [Select_CString( ROOT.Char.IsFemale, 'nossa convidada', 'nosso convidado' )] mais distinguid[ROOT.Char.Custom('ES_OA')], [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitledFirstNameNoTooltip|l], está prestes a começar, por favor, aproveitem!"\n\nA história continua, falando das ruas de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] e dos meus feitos."
 cultural_festival.3001.zealous: "É reconfortante ser elogiado assim!"
 cultural_festival.3001.energetic: "Nada de interessante é observado."
 cultural_festival.3001.forgiving: "Não consigo acreditar que eles pensam que eu agiria assim."
 cultural_festival.3001.beautiful: "E aí estou eu... vestid[ROOT.Char.Custom('ES_OA')] de #EMP [Select_CString( ROOT.Char.IsFemale, 'bufona', 'bufão' )]#!?"
 cultural_festival.3001.strong: "\"Este é o melhor elogio que já recebi!\""
 cultural_festival.3001.extroverted: "O melhor elogio"
 cultural_festival.3001.dominant: "Bem... acho que poderia ser pior."
 cultural_festival.3001.negative: "Uma peça divertida"
 cultural_festival.3001.tt: "Como eles puderam me retratar tão #EMP errado#!?"
 cultural_festival.3001.negative.flavor: "Uma performance insultante"
 dressed_liege_like_buffon_modifier: "A pior performance"
 dressed_liege_like_buffon_modifier_desc: "O que você acha que está fazendo!?"
 cultural_festival.3002.t: "Não posso dizer a ele/ela o que realmente penso disso."
 cultural_festival.3002.desc.intro: "[visiting_liege.Custom('ES_ElLa')|U] [visiting_liege.GetTitledFirstName|l] pareceu apreciar a peça"
 cultural_festival.3002.desc.good: "Boa Peça"
 cultural_festival.3002.desc.neutral: "Peça Neutra"
 cultural_festival.3002.desc.bad: "Peça Ruim"
 cultural_festival.3002.desc.buffoon: "Uma Primavera Maravilhosa"
 cultural_festival.3002.a: "Dou um passeio pelos terrenos do castelo e paro junto à fonte, aproveitando um momento para observar a água correndo sobre as pedras de mármore. Um gato rondará pelo jardim cuidado, espichando o dorso antes de ir embora.\n\nToco o relevo no cano de prata — o brasão da minha casa. Se ao menos… ah! Eu poderia impressionar [visiting_liege.Custom('ES_AlAla')] [visiting_liege.GetTitledFirstName|l] fazendo-o correr com uma substância diferente..."
 cultural_festival.3002.a.toast: "[ROOT.Char.Custom('RegionalAlcoholicDrink')|U], é claro!"
 cultural_festival.3002.b: "Algum suco delicioso seria mais fácil."
 cultural_festival.3002.b.toast: "Não vale a pena gastar tempo com isso."
 cultural_festival.3002.c: "Fonte Maravilhosa"
 cultural_festival.3002.c.toast: "Este personagem decidiu fazer a fonte jorrar álcool em vez de água."
 cultural_festival.3002.d.toast: "$alcohol_fountain_modifier$"
 cultural_festival.3002.d: "Este personagem decidiu fazer a fonte jorrar suco em vez de água."
 cultural_festival.3002.e: "Uma Primavera Maravilhosa"
 cultural_festival.3002.e.toast: "Sigo [stop_host_scope.Custom('ES_AlAla')] [stop_host_scope.GetTitledFirstName|l] enquanto me mostra o festival. "E agora", anuncia ao entrarmos nos terrenos do castelo, "o que espero que seja uma agradável surpresa". Ergo as sobrancelhas quando encontramos uma fonte maravilhosa, toda de pedra branca, com um tubo de prata e que jorra copiosamente…"
 festival_good_play: "#EMP [stop_host_scope.Custom('RegionalAlcoholicDrink')]?#!"
 festival_neutral_play: "#EMP suco?#!"
 festival_bad_play: "\n\nAlgumas pessoas se reúnem ao redor, rindo e jogando moedas no poço."
 cultural_festival.3010.t: "Vamos beber juntos!"
 cultural_festival.3010.desc: "Seria um desperdício não fazer um desejo!"
 cultural_festival.3010.a: "Poço dos Desejos"
 cultural_festival.3010.b: "Bebeu da Fonte"
 cultural_festival.3010.c: "Um Lembrete Leal"
 alcohol_fountain_modifier: "O céu sobre [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] está nublado e as serpentinas cinzentas da noite começam a rondar pelos estreitos becos. A fortaleza [stop_host_scope.Custom('ES_DelDela')] [stop_host_scope.GetTitledFirstName|l] ergue-se no topo da colina, quase desafiadora. Não lhe faria mal um lembrete de a quem serve.\n\nSou [ROOT.Char.GetTitleAsNameNoTooltip] por direito divino. A coroa paira sobre minha cabeça como a lua sobre todas as outras estrelas. Não importa o quanto brilheis, #EMP yo#! prevalecerei."
 alcohol_fountain_modifier_desc: "[stop_host_scope.GetFirstNameNoTooltip] renovará sua homenagem a mim."
 juice_fountain_modifier: "Isso será benéfico para você, mas talvez seu vassalo não goste...[stop_host_scope.Custom('ES_OA')]…"
 juice_fountain_modifier_desc: "Vamos apenas celebrar!"
 cultural_festival.3011.t: "Um Suserano Humilde"
 cultural_festival.3011.desc.intro: "Este personagem optou por não ter uma cerimônia extravagante de homenagem e aproveitar a festa em vez disso."
 cultural_festival.3011.desc.alcohol: "Um Lembrete Leal: Homenagem"
 cultural_festival.3011.desc.juice: "Todas as velas do quarto queimam furiosamente para manter a escuridão do lado de fora. Uma corrente de ar entra e sai pelas fendas de pedra ao redor das janelas. [stop_host_scope.GetTitledFirstName|U] está ajoelhad[stop_host_scope.Custom('ES_OA')] à minha frente e eu me estendo para tomar suas mãos entre as minhas.\n\n"[Select_CString( stop_host_scope.IsFemale, 'Minha amiga', 'Meu amigo' )]", começo, apertando mais forte, "vocês colocam suas mãos nas minhas no lugar de nossos corações. Tenho em alta conta sua fidelidade e, por isso, exijo de você…"."
 cultural_festival.3011.desc.outro: "\"ouro.\""
 cultural_festival.3011.a: "\"homens.\""
 cultural_festival.3011.b: "Isso #Bold não#! bloqueará o contrato de vassalagem."
 festival_wishing_well_modifier: "\"lealdade.\""
 drank_together_modifier: "Em troca, farei o mesmo."
 cultural_festival.3020.t: "\"amizade.\""
 cultural_festival.3020.desc: "Um Lembrete Leal: Prestando Homenagem"
 cultural_festival.3020.a: "É uma noite solene quando [visiting_liege.GetTitledFirstName|l] me convoca para meu próprio salão do trono. [visiting_liege.GetSheHe|U] enviou aviso à minha comitiva falando de uma "cerimônia de homenagem renovada". Respiro fundo antes de entrar na sala. Lá está [visiting_liege.GetSheHe], sentad[visiting_liege.Custom('ES_OA')] em #EMP minha#! cadeira. [Select_CString( visiting_liege.IsFemale, 'Uma senhora', 'Um senhor' )] é [Select_CString( visiting_liege.IsFemale, 'uma senhora', 'um senhor' )]. E [visiting_liege.GetFirstNameNoTooltip] vai fazer com que eu nunca me esqueça.

Ajoelho-me diante de [visiting_liege.GetHerHim] e [visiting_liege.GetSheHe] pega minhas mãos nas suas. "[Select_CString( ROOT.Char.IsFemale, 'Minha amiga', 'Meu amigo' )]", diz, "vós colocais vossas mãos entre as minhas em lugar de nossos corações. Tenho grande apreço por vossa fidelidade e, por isso, vos peço"
 cultural_festival.3020.a.tt: "\"amizade.\""
 cultural_festival.3020.b: "\"lealdade.\""
 festival_no_homage_modifier: "\"homens.\""
 festival_no_homage_modifier_desc: "\"ouro.\""
 cultural_festival.3021.t: "\"É para você levar.\""
 cultural_festival.3021.desc: "\"São para você levar.\""
 cultural_festival.3021.a: "Obrigações do Vassalo"
 cultural_festival.3021.b: "\"E eu as oferecerei com prazer!\""
 cultural_festival.3021.a.tt: "Um Relacionamento Estreito"
 cultural_festival.3021.c: "[visiting_liege.GetShortUIName] aumenta os impostos no seu Contrato de Vassalagem"
 cultural_festival.3021.c.flavor: "[visiting_liege.GetShortUIName] aumenta as levas no seu Contrato de Vassalagem"
 cultural_festival.3021.d: "[visiting_liege.GetShortUIName] recebe um gancho de Lealdade em você"
 cultural_festival.3022.t: "Para a Mais Bonita!"
 cultural_festival.3022.desc.intro: "Caminho pelas ruas de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], tentando pensar em novas ideias para o Festival Cultural quando um[local_farmer.Custom('ES_XA')] agricultor[local_farmer.Custom('ES_OA')] local se aproxima timidamente de mim. O exemplar de [ROOT.Char.Custom('RegionalFarmAnimal')] que [local_farmer.GetSheHe] traz consigo para e começa a mastigar algo no chão.

"Meu [ROOT.Char.GetLadyLord]", diz [local_farmer.GetSheHe], ficando cada vez mais animad[local_farmer.Custom('ES_OA')], "gostaríeis de julgar nosso concurso de beleza? Tenho certeza de que meu pequeno Resistente será o vencedor."

Lanço um olhar rápido para seu [ROOT.Char.Custom('RegionalFarmAnimal')], agora ocupado com algumas folhas. E se eu deixasse [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitledFirstName|l] julgar isso em meu lugar?". Respiro fundo antes de entrar na sala. Lá está [visiting_liege.GetSheHe], sentad[visiting_liege.Custom('ES_OA')] em #EMP minha#! cadeira. [Select_CString( visiting_liege.IsFemale, 'Uma senhora', 'Um senhor' )] é [Select_CString( visiting_liege.IsFemale, 'uma senhora', 'um senhor' )]. E [visiting_liege.GetFirstNameNoTooltip] vai fazer com que eu nunca me esqueça.

Ajoelho-me diante de [visiting_liege.GetHerHim] e [visiting_liege.GetSheHe] pega minhas mãos nas suas. "Não há como [visiting_liege.GetFirstNameNoTooltip] aproveitar isso."
 cultural_festival.3022.desc.friends: "Organizou um Concurso de Animais da Fazenda"
 cultural_festival.3022.desc.hook: "Para a Mais Bonita...?"
 cultural_festival.3022.desc.levies: "O palco em [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] foi montado com feno, flores e... convidados interessantes. Três [stop_host_scope.Custom('RegionalFarmAnimalPlural')] diferentes estão no centro, acompanhados de seus orgulhosos donos. [stop_host_scope.Custom('ES_ElLa')|U] [stop_host_scope.GetTitledFirstName|l] me faz um gesto do outro lado do tablado. "Ah, aí está [Select_CString( ROOT.Char.IsFemale, 'nossa juíza', 'nosso juiz' )]!"

Olho ao redor, tentando ver se [stop_host_scope.GetSheHe] está se referindo a mim, mas não há dúvida. Começo a caminhar em direção a [stop_host_scope.GetSheHe] enquanto continua: "Sejam bem-vindos à nossa feira anual de animais, onde coroaremos o exemplar de [stop_host_scope.Custom('RegionalFarmAnimal')] mais bonito!". Quando [stop_host_scope.GetFirstNameNoTooltip] fala, percebo que ele está apontando discretamente para o da esquerda."
 cultural_festival.3022.desc.money: "\"O da esquerda, obviamente!\""
 cultural_festival.3022.a: "\"A bonita tem uma beleza familiar...\""
 cultural_festival.3022.b: "\"[stop_host_scope.Custom('RegionalFarmAnimalPlural')] [stop_host_scope.GetCulture.GetNameNoTooltip] são verdadeiramente os mais bonitos!\""
 cultural_festival.3022.annoyed: "\"Eu nem vou me preocupar com isso.\""
 cultural_festival.3022.d: "Ah, eu sei exatamente qual é o melhor [stop_host_scope.Custom('RegionalFarmAnimal')]..."
 cultural_festival.3022.d.friends: "Você coroa seu rival, [farm_animal_rival.GetShortUIName], como vencedor[farm_animal_rival.Custom('ES_XA')]"
 cultural_festival.3022.money: "Concurso de Animais Julgado"
 cultural_festival.3022.levies: "Animal Feio Coroado"
 cultural_festival.3022.hook: "Este personagem escolheu um animal de aparência simples como o vencedor de um concurso de beleza."
 cultural_festival.3030.t: "Feira Animal Zombada"
 cultural_festival.3030.desc: "Caminho pelas ruas de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], tentando pensar em novas ideias para o Festival Cultural quando um[local_farmer.Custom('ES_XA')] agricultor[local_farmer.Custom('ES_OA')] local se aproxima timidamente de mim. O exemplar de [ROOT.Char.Custom('RegionalFarmAnimal')] que [local_farmer.GetSheHe] traz consigo para e começa a mastigar algo no chão.

"galinha"

Lanço um olhar rápido para seu [ROOT.Char.Custom('RegionalFarmAnimal')], agora ocupado com algumas folhas. E se eu deixasse [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitledFirstName|l] julgar isso em meu lugar?"
