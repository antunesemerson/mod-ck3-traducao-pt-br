 cultural_festival.3031.desc: "cabras"

Olho ao redor, tentando ver se [stop_host_scope.GetSheHe] está se referindo a mim, mas não há dúvida. Começo a caminhar em direção a [stop_host_scope.GetSheHe] enquanto continua: "vacas"
