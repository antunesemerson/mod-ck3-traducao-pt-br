 cultural_festival.2090.c: "Um Artista Inesperado"
 festival_arrested_artists: "Acrobatas pulam em trajes coloridos, um deles abre a boca para pegar uma bola que outro joga e o público irrompe em aplausos."
 festival_no_prisoners: "Tão facilmente entretidos."
 festival_no_prisoners_desc: "\n\nA música logo se faz ouvir. Já ouvi essa canção antes. Talvez. A maioria soa parecida demais. Até mesmo do estrado posso ouvir os camponeses cantando aos gritos.\n\n"E dançar nos campos de…" #EMP "Guau! Guau, guau!",#! uma figura decide se juntar, roubando as bolas de malabarismo.\n\n #EMP "Coged a ese perro!".#!"
 cultural_festival.2100.t: "Eu poderia levá-lo de volta comigo..."
 cultural_festival.2100.desc: "Um companheiro perfeito para [my_heir.GetFirstNameNoTooltip]!"
 cultural_festival.2100.a: "Ah... Não consigo resistir à vontade de acariciá-lo!"
 cultural_festival.2100.b: "Ah, que besta irritante."
 cultural_festival.2100.c: "Devo permanecer no lugar."
 cultural_festival.2100.c.success: "Você chuta o cachorro"
 cultural_festival.2100.c.failure: "Qualquer personagem presente que não seja Callous ou Sadistic"
