 cultural_acceptance_farm_contest: "whinnying $regional_farm_animal_horse$"
 regional_farm_animal_goat: "A Lâmina na Pedra"
 regional_farm_animal_chicken: "Ouço uma voz familiar enquanto passeio pelas ruas festivas de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]: "O que eu devo fazer com esta pedra, hein? Quer que eu simplesmente me sente em cima dela?".\n\n [marshal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] aponta para uma grande rocha que um pedreiro deixou em frente de [marshal.GetSheHe].\n\n"É para a competição de força", explica o pedreiro, dando de ombros. "Que competição de força? Isso é impossível de levantar!", retruca [marshal.Custom('ES_ElLa')] [marshal.GetTitledFirstNameNoTooltip|l]."
 regional_farm_animal_cow: ""Você não tem o necessário para #EMP levantarla#![Select_CString( marshal.IsFemale, 'amiga mía', 'amigo mío' )]"."
 regional_farm_animal_sheep: "Ninguém será capaz de remover a lâmina da pedra!"
 regional_farm_animal_pig: "@warning_icon! #X Você pode perder esse artefato"
 regional_farm_animal_yak: "\"Apenas se livre dela.\""
 regional_farm_animal_camel: "$cultural_festival.3040.t$"
 regional_farm_animal_horse: "Uma grande pedra foi colocada no centro de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], com um pouco mais de pompa do que para pensar que seja uma coincidência. Ao me aproximar, entendo rapidamente o interesse em torno dela, pois uma arma foi encrustada em sua superfície; sua lâmina brilhante, metade aço, metade pedra."
 regional_farm_animal_goat_plural: "Hah! Vou mostrar a eles o quão poderoso eu sou!"
 regional_farm_animal_chicken_plural: "Você retira a arma da pedra"
 regional_farm_animal_cow_plural: "[visiting_liege.GetShortUIName] retira a arma da pedra"
 regional_farm_animal_sheep_plural: "A arma não se moveu"
 regional_farm_animal_pig_plural: "Deveria deixar que [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitledFirstNameNoTooltip|l] a pegue, como uma gentileza."
 regional_farm_animal_yak_plural: "#EMP SIM!#! Sai daí!"
 regional_farm_animal_bleating_goat: "$cultural_festival.3040.t$: Exibição de Força"
 regional_farm_animal_clucking_chicken: "Ah. Aí está! A pedra foi colocada no centro da cidade, adornada com letras douradas que dizem "Quem retirar esta lâmina desta pedra será seu legítimo proprietário".

Viro a cabeça para olhar [visiting_liege.Custom('ES_AlAla')] [visiting_liege.GetTitledFirstName|l], que, é claro, é [Select_CString( visiting_liege.IsFemale, 'a candidata', 'o candidato' )] principal à vitória. No entanto... quando tenta puxar o punho, a arma não se move."
 regional_farm_animal_bellowing_cow: "\n\n"Maldição", ouço [visiting_liege.GetHerHim] murmurar. Talvez seja minha vez de tentar este desafio?"
 regional_farm_animal_bleating_sheep: ""Ah, que azar", diz [visiting_liege.GetSheHe] fazendo um gesto com a cabeça na minha direção, "vocês gostariam de experimentar, [Select_CString( ROOT.Char.IsFemale, 'minha amiga', 'meu amigo' )]?"."
 regional_farm_animal_snorting_pig: "#EMP Eu#! vou tirá-la da pedra!"
 regional_farm_animal_grunting_yak: "Por que arriscar a humilhação pública?"
 regional_farm_animal_grunting_camel: "Uma Performance Calmante"
 regional_farm_animal_whinnying_horse: "Um grupo de moradores subiu ao palco em um sermão que parece ser o mais longo e monótono que já ouvi.\n\nTento manter os olhos abertos, mas logo os montes de feno no canto da rua parecem um pouco confortáveis, um pouco tentadores..."
 cultural_festival.3040.t: "#EMP Debo#! manter-me acordad[ROOT.Char.Custom('ES_OA')]."
 cultural_festival.3040.desc: "Só estou descansando os olhos..."
 cultural_festival.3040.a: "Existe a chance de [stop_host_scope.GetShortUIName] perceber..."
 cultural_festival.3040.flavor: "Fingiu Interesse no Festival"
 cultural_festival.3040.a.tt: "Muito Silêncio..."
 cultural_festival.3040.b: "Quando um grupo de moradores sobe ao palco, escuto seu discurso com deleite e admiração. Se eu soubesse que em [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] tínhamos gente tão bem informada! Que fortaleza! Que atração!\n\nQuando me dirijo [visiting_liege.Custom('ES_AlAla')] [visiting_liege.GetTitledFirstName|l] para fazer um comentário sobre seus ensinamentos, descubro que ele tem os olhos… fechados? Seria #EMP ronco#! o que estou ouvindo?"
 cultural_festival.3041.t: "Como isso pode entediar [visiting_liege.GetHerHim]?!"
 cultural_festival.3041.desc: "[stop_host_scope.GetShortUIName] viu você dormindo"
 cultural_festival.3041.a: "Talvez isso não seja para todos..."
 cultural_festival.3041.a.success: "Posso...?"
 cultural_festival.3041.a.success.vassal: "O som de flautas e tambores é rapidamente acompanhado por um grupo de convidados dançantes, todos seguindo a música com movimentos alegres e risadas. Um casal se afasta para um beco, crianças pulam em círculo, um velho solitário se esforça para mexer os quadris.\n\n"
 cultural_festival.3041.a.failure: "Viro-me para meu cônjuge, [my_spouse.GetTitledFirstName|l], e admiro seu sorriso gentil, batendo palmas ao ritmo da música."
 cultural_festival.3041.b: "Observo [stop_host_scope.GetTitledFirstName|l] entre a multidão e, ao seu lado, um[vassal_spouse.Custom('ES_XA')] d[vassal_spouse.Custom('ES_EleEla')]s [vassal_spouse.GetWomenMen] mais bel[vassal_spouse.Custom('ES_OA')]s que jamais vi..."
 cultural_festival.3041.c: ""Posso, minha doce [my_spouse.GetFirstNameNoTooltip]?""
 cultural_festival.3042.t: "Dançar com o cônjuge [stop_host_scope.Custom('ES_DelDela')] [stop_host_scope.GetTitledFirstNameNoTooltip|l] causará um grande alvoroço…"
 cultural_festival.3042.desc.intro: "Sua dança seduz [vassal_spouse.GetShortUIName]".

Viro a cabeça para olhar [visiting_liege.Custom('ES_AlAla')] [visiting_liege.GetTitledFirstName|l], que, é claro, é [Select_CString( visiting_liege.IsFemale, 'a candidata', 'o candidato' )] principal à vitória. No entanto... quando tenta puxar o punho, a arma não se move."
 cultural_festival.3042.desc.failed: "Posso aproveitar essa oportunidade para dançar com os moradores locais."
 cultural_festival.3042.desc.pretended: "Ah, #EMP dançar#!."
 cultural_festival.3042.a: "Participou de Dança Local"
 cultural_festival.3042.b: "Parceiros de Dança"
 cultural_festival.3050.t: "Bato palmas ao ritmo da canção, mas paro quando vejo [visiting_liege.Custom('ES_AlAla')] [visiting_liege.GetTitledFirstName|l] se aproximar de nós. “Vocês...?”, começo, mas parece que não sou eu quem lhe interessa, pois ele direciona o convite ao meu cônjuge: “Me concederiam a honra de uma dança?”."
 cultural_festival.3050.desc: "Isso é um insulto à minha honra!"
 cultural_festival.3050.a: "Honra insultada"
 cultural_festival.3050.b: "E quem não [vassal_spouse.GetHerHim] escolheria!"
 cultural_festival.3050.b.tt: "Elogio Público"
 festival_enjoyed_local_performance: "Este personagem elogiou publicamente seu cônjuge de forma sedutora."
 cultural_festival.3051.t: "O Banquete dos Tolos"
 cultural_festival.3051.desc: "Uma ideia me vem à cabeça como um galho quebrado depois de ouvir os sinos dobrarem: uma Festa dos Loucos! Um mundo de cabeça para baixo em que um pecador é o sacerdote e todos nós nos deleitamos e festejamos por dias!\n\nAh, mas quem nomear como meu [ROOT.Char.GetFaith.BishopNeuter] dos loucos…? [rival_jester.Custom('ES_ElLa')|U] [rival_jester.GetTitledFirstName|l]? Nunca gostei dele nem um pouco. Ou talvez [sinful_jester.Custom('ES_ElLa')] [sinful_jester.GetTitledFirstName|l]? Seus modos pecaminosos são bem conhecidos por todos."
 cultural_festival.3051.a: "[rival_jester.GetShortUINameNoTooltip] merece a honra."
 cultural_festival.3051.a.toast: "Quem melhor do que [sinful_jester.GetShortUINameNoTooltip]?"
 cultural_festival.3051.b: "Ou talvez, noss[visiting_liege.Custom('ES_OA')] visitante [visiting_liege.GetTitledFirstNameNoTooltip|l]...?"
 cultural_festival.3060.t: "A igreja nunca aprovaria algo assim."
 cultural_festival.3060.desc.intro: "Banquete dos Tolos"
 cultural_festival.3060.desc.spouse: "Bispo dos Tolos"
 cultural_festival.3060.desc.vassal: "Este condado permitiu uma celebração do Banquete dos Tolos, onde rituais eclesiásticos foram parodiados"
 cultural_festival.3060.a: "$cultural_festival.3070.t$"
 cultural_festival.3060.b: "Rebeldia! Alegria! Ao entrar na praça principal de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], vejo um grupo de figuras vestidas como padres, cantando e dançando."
 cultural_festival.3060.b.success: "No centro, um manequim com um traje meio [ROOT.Char.GetFaith.BishopNeuter], meio bobo da corte, pronto para ser usado. [stop_host_scope.Custom('ES_ElLa')|U] [stop_host_scope.GetTitledFirstName|l] bate palmas do palco, rindo cruelmente: «E aqui está [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitledFirstName|l]: é noss[ROOT.Char.Custom('ES_OA')] $nick_monarch_of_fools_masc$! Escutem, amigos, pois seus costumes pecaminosos não conhecem fim, e agora tem o poder de impô-los!»."
 cultural_festival.3060.b.failure: "No seu centro, um[final_jester.Custom('ES_XA')] [final_jester.GetWomanMan], meio [ROOT.Char.GetFaith.BishopNeuter], meio buf[final_jester.Custom('ES_OnOna')], presidindo a multidão.\n\n[stop_host_scope.Custom('ES_ElLa')|U] [stop_host_scope.GetTitledFirstName|l] faz sua aparição, aplaudindo de alegria: "E agora escutai, amigos, porque [final_jester.Custom('ES_ElLa')] [final_jester.GetTitledFirstName|l] é noss[final_jester.Custom('ES_OA')] $nick_monarch_of_fools_masc$ e sua palavra é lei, e sua voz, a voz do Senhor. Que tipo de alegria #EMP pecaminosa#! podemos esperar de [final_jester.GetSheHe]?"."
 cultural_festival.3060.b.tt: "\"Mal posso esperar para descobrir!\""
 cultural_festival.3060.c: "\"Essa festividade blasfema não tem lugar em meu reino.\""
 cultural_festival.3060.d: "\"Hah! #EMP Contratado#!\""
 festival_danced_with_local_modifier: ""Como ousa me apresentar como um[ROOT.Char.Custom('ES_XA')] idiota[ROOT.Char.Custom('ES_OA')]?""
 cultural_festival.3061.t: "Sotaque Peculiar"
 cultural_festival.3061.desc: "De repente, me vejo separad[ROOT.Char.Custom('ES_OA')] de meu séquito por uma grande multidão que avança para observar os festejos e, antes que eu consiga reagir, acabo pres[ROOT.Char.Custom('ES_OA')] entre duas pessoas que mantêm uma conversa acalorada.

No entanto, não entendo nada do que dizem e [local_character_scope.Custom('ES_ElLa')] [local_character_scope.GetTitledFirstName|l] começa a falar diretamente comigo. Tento passar despercebid[ROOT.Char.Custom('ES_OA')], mas [local_translator_scope.Custom('ES_ElLa')] [local_translator_scope.GetTitledFirstName|l] me lança um olhar de soslaio.

Talvez eu devesse responder. A língua deles parece fascinante; será que eu conseguiria acompanhar a conversa daqui?"
 cultural_festival.3061.a: "Eu não entendo, mas quero que [local_translator_scope.GetNameNoTooltip] me ensine!"
 cultural_festival.3061.a.toast: "Apenas assinto e sorrio..."
 cultural_festival.3061.b: "Ninguém percebe que não entendo nada"
 festival_flattered_spouse_modifier: "[local_translator_scope.GetNameNoTooltip] me desmascara"
 festival_flattered_spouse_modifier_desc: "Na verdade, é tudo muito confuso para mim."
 cultural_festival.3070.t: "Gestos Rudes"
 cultural_festival.3070.desc: "Não consigo acreditar no que meus olhos veem: [inconsiderate_character_scope.Custom('ES_ElLa')] [inconsiderate_character_scope.GetTitledFirstName|l] começa a gesticular para [offended_character_scope.Custom('ES_ElLa')] [offended_character_scope.GetTitledFirstName|l], o que é considerado muito ofensivo na cultura [offended_character_scope.GetCulture.GetName].\n\n[offended_character_scope.GetNameNoTooltip] grita e chama [inconsiderate_character_scope.Custom('ES_AlAla')] [inconsiderate_character_scope.GetTitledFirstName|l] com nomes explícitos, enquanto seus homens [offended_character_scope.Custom('ES_LoLa')] o seguram. Parece que [offended_character_scope.Custom('ES_ElLa')] [offended_character_scope.GetTitledFirstName|l] não vai se acalmar sozinho[offended_character_scope.Custom('ES_OA')] , tenho que fazer algo para aliviar a tensão."
 cultural_festival.3070.a: "Espere, é apenas um mal-entendido."
 cultural_festival.3070.b: "Você convenceu [offended_character_scope.GetNameNoTooltip]"
 cultural_festival.3070.c: "[offended_character_scope.GetNameNoTooltip] não está convencid[offended_character_scope.Custom('ES_OA')]"
 cultural_festival.3070.d: "Devo repreender [inconsiderate_character_scope.GetNameNoTooltip] publicamente!"
 festival_feast_of_fools_county_modifier: "Talvez eu possa oferecer uma compensação em ouro."
 festival_king_of_fools_modifier: "Preparar um Desfile"
 festival_feast_of_fools_county_modifier_desc: "Desde que os convidados chegaram a [ROOT.Char.GetCurrentLocation.GetName] tiveram uma miríade de coisas para ver e fazer. No entanto, não devo descansar nem um momento para mantê-los entretidos, então estou pensando em fazer algo especial para [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitledFirstName|l] e sua comitiva. Um desfile que garanta que sejam recebidos e mostre nosso reino da melhor maneira possível.\n\nEmbora eu não tenha certeza de que tipo de desfile agradaria mais a [visiting_liege.Custom('ES_AlAla')] [visiting_liege.GetNameNoTooltip|l]…"
 cultural_festival.3071.t: "Vou exibir nosso poderio militar!"
 cultural_festival.3071.desc.intro: "Seu Lorde provavelmente #P gostará#! disso"
 cultural_festival.3071.desc_jester: "Seu Lorde provavelmente não se importará"
 cultural_festival.3071.desc_fallback: "Seu Lorde provavelmente #X odiará#! isso"
 cultural_festival.3071.a: "Vamos torná-lo sobre nosso povo."
 cultural_festival.3071.b: "Eu gostaria de uma experiência espiritual."
 cultural_festival.3071.c: "O [stop_host_scope.Custom('GetParadeType')|l]"
 cultural_festival.3071.d: "Minha decisão de organizar um [stop_host_scope.Custom('GetParadeType')|l] exige a nomeação de [coordinator_scope.Custom('ES_DelDela')] [coordinator_scope.GetTitledFirstName|l] como coordenador[coordinator_scope.Custom('ES_XA')] do desfile, e vou consultá-l[coordinator_scope.Custom('ES_OA')] sobre como preparar a celebração. [coordinator_scope.GetSheHe|U] reflete por um momento e então responde com algumas opções:

"
 cultural_festival.4000.t: "$cultural_festival.4201.desc$\"Poderíamos convidar os melhores cavaleiros do nosso reino e fazer uma batalha completa. Ou, talvez, apresentar as tropas e a guarnição de [ROOT.Char.GetCurrentLocation.GetName] em toda a sua força, lutando na praça principal.\""
 cultural_festival.4000.desc: "De repente, me vejo separad[ROOT.Char.Custom('ES_OA')] de meu séquito por uma grande multidão que avança para observar os festejos e, antes que eu consiga reagir, acabo pres[ROOT.Char.Custom('ES_OA')] entre duas pessoas que mantêm uma conversa acalorada.

No entanto, não entendo nada do que dizem e [local_character_scope.Custom('ES_ElLa')] [local_character_scope.GetTitledFirstName|l] começa a falar diretamente comigo. Tento passar despercebid[ROOT.Char.Custom('ES_OA')], mas [local_translator_scope.Custom('ES_ElLa')] [local_translator_scope.GetTitledFirstName|l] me lança um olhar de soslaio.

Talvez eu devesse responder. A língua deles parece fascinante; será que eu conseguiria acompanhar a conversa daqui?"
 cultural_festival.4000.a: "Traga as pessoas mais devotas e os [stop_host_scope.GetFaith.PriestNeuterPlural|l] do nosso reino!"
 cultural_festival.4000.b: "Use o que temos à disposição."
 cultural_festival.4000.b.success: "Vamos fazer algo mais simples."
 cultural_festival.4000.b.failure: "$cultural_festival.4201.t$"
 cultural_festival.4000.c: "[coordinator_scope.Custom('ES_ElLa')|U] [coordinator_scope.GetTitledFirstName|l] me convida a participar de um [stop_host_scope.Custom('GetParadeType')|l]. [coordinator_scope.GetSheHe|U] me garante que supervisionou pessoalmente os preparativos para me oferecer o melhor desfile que [cultural_festival_scope.GetName|l] podia oferecer. Enquanto fala,"
 cultural_festival.4100.t: "$cultural_festival.4202.desc$ os melhores cavaleiros do reino começam a lutar. Eles alternam constantemente entre os alvos e se movem de maneiras dinâmicas, como se estivessem dançando, e o som de suas espadas batendo nas armaduras é como música.\n\nÉ uma alegria assistir, e devo admitir a [coordinator_scope.GetNameNoTooltip] que é o melhor desfile que já vi!"
 cultural_festival.4100.desc: "$cultural_festival.4202.desc$ um regimento de tropas totalmente equipadas luta na praça principal do [cultural_festival_scope.GetNameNoTierNoTooltip].\n\nCertamente é uma exibição impressionante de habilidade marcial."
 cultural_festival.4100.a: "$cultural_festival.4202.desc$ alguns soldados treinam entre si. Parece que é tudo o que vou ver hoje, o que é uma pena, porque já estou entediado. Preferiria assistir a um cavalo comendo grama do que passar mais um minuto assistindo a isso. Não tenho certeza de como [stop_host_scope.GetNameNoTooltip] achou que isso seria uma boa ideia?"
 cultural_festival.4100.a.success: "$cultural_festival.4202.desc$ artesãos reunidos de todo o reino exibem suas melhores obras manuais.\n\nNunca vi produtos de tanta qualidade, as pessoas de [visiting_liege.GetPrimaryTitle.GetNameNoTooltip] são realmente talentosas."
 cultural_festival.4100.a.failure: "$cultural_festival.4202.desc$ artesãos de [cultural_festival_scope.GetNameNoTierNoTooltip] mostram seus melhores trabalhos artesanais.\n\n Nunca havia visto produtos de tanta qualidade. Fico surpreso que isso não tenha me chamado a atenção antes, as pessoas de [visiting_liege.GetPrimaryTitle.GetNameNoTooltip] têm um verdadeiro dom."
 cultural_festival.4100.b: "$cultural_festival.4202.desc$ um casal de moradores locais exibe algum tipo de artesanato.\n\nNão é nada que eu já não tenha visto antes. Estou bastante decepcionado[ROOT.Char.Custom('ES_OA')]; para falar a verdade."
 cultural_festival.4100.c: "$cultural_festival.4202.desc$ um grupo de [stop_host_scope.GetFaith.PriestNeuterPlural] reunidos na praça principal estão rezando com intensidade incomparável."
 cultural_festival.4200.t: "$cultural_festival.4202.desc$ [stop_host_scope.GetFaith.DevoteeNeuterPlural] locais estão rezando na praça principal, prestando reverência ao [stop_host_scope.GetFaith.HighGodName]."
 cultural_festival.4200.desc: "$cultural_festival.4202.desc$ um grupo de moradores locais reza para o [stop_host_scope.GetFaith.HighGodName] em uma voz monótona.\n\nÉ uma experiência verdadeiramente entediante."
 cultural_festival.4200.a: "\n\nNão estou familiarizad[ROOT.Char.Custom('ES_OA')] com a [stop_host_scope.GetFaith.GetName]. No entanto, sua devoção é impressionante."
 cultural_festival.4200.tt.liege_likes: "\n\nÉ bom ver que as pessoas de [cultural_festival_scope.GetNameNoTierNoTooltip] são tão devotas à nossa fé."
 cultural_festival.4200.tt.liege_indifferent: "\n\nNão estou familiarizad[ROOT.Char.Custom('ES_OA')] com a [stop_host_scope.GetFaith.GetName]. No entanto, sua devoção me assusta."
 cultural_festival.4200.tt.liege_dislikes: "\n\nÉ uma pena ver que [stop_host_scope.GetNameNoTooltip] parece não ser tão devoto à nossa fé como eu pensava."
 cultural_festival.4200.b: "É o melhor desfile que já vi!"
 cultural_festival.4200.c: "Eu poderia aprender uma coisa ou outra com [stop_host_scope.Custom('ES_DelDela')] [stop_host_scope.GetTitledFirstNameNoTooltip|l]."
 cultural_festival.4201.t: "Na verdade, eu preferiria ver um [stop_host_scope.Custom('GetLiegeParadeType')]."
 cultural_festival.4201.desc: "Minha decisão de organizar um [stop_host_scope.Custom('GetParadeType')|l] exige a nomeação de [coordinator_scope.Custom('ES_DelDela')] [coordinator_scope.GetTitledFirstName|l] como coordenador[coordinator_scope.Custom('ES_XA')] do desfile, e vou consultá-l[coordinator_scope.Custom('ES_OA')] sobre como preparar a celebração. [coordinator_scope.GetSheHe|U] reflete por um momento e então responde com algumas opções:

"
 cultural_festival.4201.desc_military: "$cultural_festival.4203.desc$ temo que [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitledFirstNameNoTooltip|l] acha o desfile entediante. Disse que preferiria ver um cavalo comer grama ou ver um [stop_host_scope.Custom('GetLiegeParadeType')|l]."

Que desgraçad[visiting_liege.Custom('ES_OA')] mais ingrat[visiting_liege.Custom('ES_OA')]!"
 cultural_festival.4201.desc_civil: "Estou feliz que todos tenham se divertido."
 cultural_festival.4201.desc_religious: "Bem, pelo menos meus súditos se divertiram."
 cultural_festival.4201.desc_end: "Troca de Presentes"
 cultural_festival.4201.a.military: "Sinto-me honrad[ROOT.Char.Custom('ES_OA')] de que [visiting_liege.Custom('ES_ElLa')] [visiting_liege.GetTitledFirstNameNoTooltip|l] me visite. Em troca, estou pensando em trocar presentes com [visiting_liege.Custom('ES_ElElla')] para que criemos um vínculo forte. Poderia encomendar um(a) [newly_created_artifact.GetName|l]. $cultural_festival.4302.desc_gold$"
 cultural_festival.4201.a.civil: "\n\nEu também tenho [existing_artifact.GetName|l] apenas jogado por aí. Seria um presente ótimo e mais pessoal."
 cultural_festival.4201.a.religious: "[visiting_liege.GetShortUIName] terá que escolher um presente para trocar"
 cultural_festival.4201.b: "Vou dar meu [existing_artifact.GetNameNoTooltip|l] pessoal."
 cultural_festival.4201.c: "Vou encomendar o [newly_created_artifact.GetNameNoTooltip|l] como presente."
 cultural_festival.4202.t: "Apenas ouro será suficiente."
 cultural_festival.4202.desc: "#EMP No#!."
 cultural_festival.4202.desc_military_best: "$cultural_festival.4300.t$"
 cultural_festival.4202.desc_military_good: "Sou abordado por [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitledFirstName|l], que está segurando"
 cultural_festival.4202.desc_military_worst: "[gifted_artifact.GetName].$cultural_festival.4301.desc_inbetween$\n\nAgradeço que [stop_host_scope.GetSheHe] tenha pensado nisso. $cultural_festival.4301.desc_end$"
 cultural_festival.4202.desc_civil_best: "um saco de moedas.$cultural_festival.4301.desc_inbetween$\n\nPego as moedas encantad[ROOT.Char.Custom('ES_OA')], mas parece que não sabia o que me dar… $cultural_festival.4301.desc_end$"
 cultural_festival.4202.desc_civil_good: "\n\n«Meu senhor[ROOT.Char.Custom('ES_XA')], é uma honra tê-lo aqui. Por favor, aceite este presente como comemoração deste festival cultural. Algo que nos lembre deste dia pelos anos que virão!»."
 cultural_festival.4202.desc_civil_worst: "No entanto, me olha com expectativa, será que espera que eu retribua com outro presente?"
 cultural_festival.4202.desc_religious_best: "Presente requintado! Eu adoro."
 cultural_festival.4202.desc_religious_good: "Você equipa o [gifted_artifact.GetName|l]"
 cultural_festival.4202.desc_religious_worst: "Item inútil. Talvez eu possa vendê-lo por sucatas?"
 cultural_festival.4202.desc_religious_different_faith_good: "Ouro? Que atencioso."
 cultural_festival.4202.desc_religious_same_faith_good: "Você terá que escolher um presente para trocar"
 cultural_festival.4202.desc_religious_different_faith_bad: "$cultural_festival.4300.t$"
 cultural_festival.4202.desc_religious_same_faith_bad: "Sinto-me honrad[ROOT.Char.Custom('ES_OA')] pelo presente; no entanto, como tenho de dar algo em troca, é melhor pensar em algo apropriado, para não parecer um[ROOT.Char.Custom('ES_XA')] bob[ROOT.Char.Custom('ES_OA')]! Eu poderia ordenar a alguém que me trouxesse [newly_created_artifact.GetName|l]"
 cultural_festival.4202.a.revelry: "$cultural_festival.4300.desc_existing_artifact$"
 cultural_festival.4202.a: "Será que eu não poderia seguir o caminho fácil, assim como [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitledFirstNameNoTooltip|l], e dar ouro a"
 cultural_festival.4202.b: "Embora um simples saco de moedas como presente seja sempre uma opção segura, certo?"
 cultural_festival.4203.t: "$cultural_festival.4300.a$"
 cultural_festival.4203.desc: "$cultural_festival.4300.b$"
 cultural_festival.4203.desc_success: "$cultural_festival.4300.c$"

É bom ser apreciado."
 cultural_festival.4203.desc_failure: "Quando [stop_host_scope.Custom('ES_ElLa')] [visiting_liege.GetTitledFirstName|l] aceita meu presente, ele/ela alcança seus cofres.\n\n\"Devo confessar que você me pegou de surpresa. Sinto-me honrad[visiting_liege.Custom('ES_OA')] por seu presente e, embora eu não tenha muito para lhe dar em troca, por favor aceite também esta pequena demonstração de minha gratidão\".\n\nMe entrega"

Que desgraçad[visiting_liege.Custom('ES_OA')] mais ingrat[visiting_liege.Custom('ES_OA')]!"
