 cultural_festival.4300.t: "$cultural_festival.4301.c$"
 cultural_festival.4300.desc: "Recordações Afetuosas"
 cultural_festival.4300.desc_existing_artifact: "Passo muito tempo na companhia [gift_receiver.Custom('ES_DelDela')] [gift_receiver.GetTitledFirstName|l], e isso me faz lembrar de um festival que celebramos juntos há muito tempo. Guardo vagas lembranças de que [giving_gift_memory.GetDescription|l]. Fico me perguntando se ele ainda está com aquele presente; talvez eu devesse perguntar a respeito?"
 cultural_festival.4300.tt: "Vou perguntar, educadamente."
 cultural_festival.4300.a: "[gift_receiver.Custom('ES_ElLa')|U] [gift_receiver.GetTitledFirstNameNoTooltip|l] decidirá o que acontecerá em seguida"
 cultural_festival.4300.b: "Não, eu não sou #EMP tão#! mesquinho[GetPlayer.Custom('ES_OA')]…"
 cultural_festival.4300.c: "$cultural_festival.4310.t$"
 cultural_festival.4300.d: "[giving_gift_memory_owner.Custom('ES_ElLa')|U] [giving_gift_memory_owner.GetTitledFirstName|l] me recebe de braços abertos.\n\n"Que festival maravilhoso! Ele me faz lembrar de outro que fizemos juntos há alguns anos. Você se lembra? Creio que lhe dei algum tipo de presente; você poderia refrescar minha memória sobre o que era mesmo?".\n\n"
 cultural_festival.4301.t: "Na verdade, ainda o tenho, é [old_gift.GetName|l]. Não sei muito bem por que [giving_gift_memory_owner.Custom('ES_ElLa')] [giving_gift_memory_owner.GetTitledFirstNameNoTooltip|l] anda bisbilhotando esse presente, mas, pelo jeito, talvez queira recuperá-lo."
 cultural_festival.4301.desc: "Pensando bem, também tenho um(a) [decoy_gift.GetName|l] que já não uso. Talvez eu consiga convencer[giving_gift_memory_owner.Custom('ES_LoLa')] de que se trata de seu antigo presente…"
 cultural_festival.4301.desc_artifact: "Infelizmente, acho que não o tenho mais comigo. Não sei ao certo como o perdi, mas [giving_gift_memory_owner.Custom('ES_ElLa')] [giving_gift_memory_owner.GetTitledFirstNameNoTooltip|l] também não precisa saber disso."
 cultural_festival.4301.desc_gold: "Será que eu poderia enganar[giving_gift_memory_owner.Custom('ES_OA')] para que acredite que me confundiu com outra pessoa?"
 cultural_festival.4301.desc_inbetween: "Claro, aqui está."
 cultural_festival.4301.desc_end: "[giving_gift_memory_owner.Custom('ES_ElLa')|U] [giving_gift_memory_owner.GetTitledFirstNameNoTooltip|l] só quer ver isso de novo"
 cultural_festival.4301.a: "[giving_gift_memory_owner.Custom('ES_ElLa')|U] [giving_gift_memory_owner.GetTitledFirstNameNoTooltip|l] espera um favor"
 cultural_festival.4301.a.tt: "Sim, com certeza [giving_gift_memory_owner.GetSheHe|l] me deu [decoy_gift.GetNameNoTooltip|l]!"
 cultural_festival.4301.b: "[giving_gift_memory_owner.GetSheHe|U] nunca me deu nada."
 cultural_festival.4301.c: "Você convence [giving_gift_memory_owner.Custom('ES_AlAla')] [giving_gift_memory_owner.GetTitledFirstNameNoTooltip|l] de que ele te deu um(a) [decoy_gift.GetNameNoTooltip|l]"
 cultural_festival.4301.tt: "[giving_gift_memory_owner.Custom('ES_ElLa')|U] [giving_gift_memory_owner.GetTitledFirstNameNoTooltip|l] se lembra do presente"
 cultural_festival.4302.t: "Convences [giving_gift_memory_owner.Custom('ES_AlAla')] [giving_gift_memory_owner.GetTitledFirstNameNoTooltip|l] de que nunca te deu nada"
 cultural_festival.4302.desc: "[giving_gift_memory_owner.Custom('ES_ElLa')|U] [giving_gift_memory_owner.GetTitledFirstNameNoTooltip|l] sabe que te deu algo"
 cultural_festival.4302.desc_existing_artifact: "Devo admitir que o perdi há muito tempo"
 cultural_festival.4302.desc_gifted_gold: "Exibiu o presente correto"
 cultural_festival.4302.desc_gold: "Tentou enganar [giving_gift_memory_owner.Custom('ES_AlAla')] [giving_gift_memory_owner.GetNameNoTooltip|l]"
 cultural_festival.4302.a: "Suas ações são usadas contra você"
 cultural_festival.4302.b: "$cultural_festival.4310.t$"
 cultural_festival.4302.c: "[gift_receiver.Custom('ES_ElLa')|U] [gift_receiver.GetTitledFirstName|l] reflete por um momento depois de ser perguntado sobre o presente.\n\n"
 cultural_festival.4302.d: ""Ah, sim, eu me lembro como se fosse ontem! Vocês me deram [decoy_gift.GetName|l]. Eu até ainda guardo comigo, quer segurá-lo?"

Parece muito confiant[gift_receiver.Custom('ES_OA')], enquanto ordena com rapidez a seus homens que tragam o presente."
 cultural_festival.4303.t: "$cultural_festival.4312.desc.decoy_gift$ No entanto, algo parece errado, ainda não tenho certeza do que é?"
 cultural_festival.4303.desc: "$cultural_festival.4312.desc.decoy_gift$ No entanto, isso é absurdo! Além disso, é uma mentira descarada. Lembro-me do presente exato que lhe dei, não vai me enganar assim."
 cultural_festival.4303.desc_artifact: "\"Receio não saber do que você está falando, [giving_gift_memory_owner.GetNameNoTooltip]. Talvez você me confundiu com outra pessoa, porque nunca trocamos presentes.\"\n\n"
 cultural_festival.4303.desc_gold: "$cultural_festival.4312.desc.no_gift$Embora pareça que eu nunca tenha dado nenhum presente a [gift_receiver.Custom('ES_AlAla')] [gift_receiver.GetTitledFirstName|l], eu juraria que trocamos presentes durante o festival anterior. Parece muito segur[gift_receiver.Custom('ES_OA')] de que essas coisas não aconteceram aqui, e se eu estiver enganad[ROOT.Char.Custom('ES_OA')]?"
 cultural_festival.4303.a: "[gift_receiver.GetSheHe|U] sustenta que nunca lhe dei nada. Isso é absurdo! Além disso, é uma mentira descarada. Lembro-me exatamente do presente que lhe dei, não vai me enganar assim."
 cultural_festival.4303.b: ""Com o coração apertado, devo confessar que faz muito tempo perdi o presente que me deram. Por favor, perdoem-me."

Parece que coloquei [gift_receiver.Custom('ES_AlAla')] [gift_receiver.GetTitledFirstName|l] em uma situação desconfortável. Isso foi há anos, e não se pode culpá-lo por tê-lo perdido. Nem sequer tenho certeza do que eu esperava..."
 cultural_festival.4303.c: ""Sim, eu me lembro de que era [old_gift.GetName|l]! Acho que ainda deveria estar comigo, se você quiser vê-lo."\n\n[gift_receiver.GetSheHe|U] me apresenta com orgulho [old_gift.GetNameNoTooltip|l]. Parece que cuidou muito bem dele."
 cultural_festival.4310.t: "Que gentileza da parte dele/dela. Eu realmente agradeço."
 cultural_festival.4310.desc: "Ah, esse deve ser o presente, certo?"
 cultural_festival.4310.a: "Espere um minuto. Esse não é o meu presente!"
 cultural_festival.4310.a.tt: "Que audácia! Isso não é o meu presente!"
 cultural_festival.4310.b: "É impossível. Tenho certeza de que lhe dei um presente!"
 cultural_festival.4311.t: "Que audácia! Eu sei que dei o presente!"
 cultural_festival.4311.desc: "Uma desculpa muito ruim, meu caro[ROOT.Char.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', gift_receiver )]."
 cultural_festival.4311.desc.old_gift: "Talvez eu possa usá-lo contra [gift_receiver.GetSheHe|l]…"
 cultural_festival.4311.desc.decoy_gift: "Que infeliz."
 cultural_festival.4311.desc.lost_gift: "Huh, acho que estava pensando em outra pessoa?"
