 cultural_festival.2090.desc: "Enquanto observo a quinquagésima apresentação entediante que este pútrido [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] tem a oferecer, me pego desejando que todos os dançarinos quebrem todos os ossos possíveis e simplesmente vão embora.

Espere um momento... #EMP eu#! posso mandá-los embora.

