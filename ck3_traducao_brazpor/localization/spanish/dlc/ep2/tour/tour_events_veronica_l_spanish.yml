l_spanish:
 #### Tour Travel Events
 tour_travel.3120.t: "Uma Visita à Estalagem do Conde"
 tour_travel.3120.desc.intro: "Todas as estalagens ao longo do caminho são igualmente caras. É difícil não notar nosso séquito e não é como se estivéssemos nos esforçando muito. Todo mundo para de falar no momento em que entramos.\n\nSó um[vassal_inn.Custom('ES_XA')] [vassal_inn.GetWomanMan] se aproxima de nós, ansios[vassal_inn.Custom('ES_OA')] por se juntar à nossa mesa. Logo começa a falar enquanto [vassal_inn.Custom('quirk_pos_standalone')|l]. E parece que não vai parar tão cedo: "E foi então que [vassal_memory.GetDescription]…".\n\n"
 tour_travel.3120.desc.artifact: ""Ah, veja só isto!", exclama [vassal_inn.GetFirstNameNoTooltip] colocando um exemplar de [vassal_artifact.GetName] sobre a mesa. "Agora ele é seu!"."
 tour_travel.3120.desc.fallback: "Melhor isso do que o silêncio."
 tour_travel.3120.a: "\"Gosto da sua companhia, [vassal_inn.GetFirstNameNoTooltip], por que você não se junta a mim?\""
 tour_travel.3120.a.success: "Você convence [vassal_inn.GetShortUIName]"
 tour_travel.3120.a.failure: "[vassal_inn.GetShortUIName] se sente lisonjead[vassal_inn.Custom('ES_OA')], mas não convencid[vassal_inn.Custom('ES_OA')]"
 tour_travel.3120.b: "\"Me conte mais!\""
 tour_travel.3120.c: "\"Que presente adorável!\""
 tour_travel.3130.t: "Consequências Menores"
 tour_travel.3130.desc.intro: ""Você aí, justo ali!", ouço um grito distante e me viro para encontrar um camponês segurando um arado, respirando agitadamente enquanto para por um segundo.\n\n"Sinto muito, [ROOT.Char.Custom('FormOfAddressForLiege')], mas rara é a ocasião que tenho de falar com você. Entendo que deveis fazer crescer o senhorio, mas"
 tour_travel.3130.desc.no_farms: "os prédios reais que você construiu aqui nos deixaram sem trabalho.\""
 tour_travel.3130.desc.no_jobs: "os moinhos que você construiu aqui tomaram parte de nossas terras.\""
 tour_travel.3130.desc.outro: "\n\n[complaining_peasant.GetSheHe|U] segura o arado."
 tour_travel.3130.a: "\"Isso pesa em meu coração. Tome esse ouro.\""
 tour_travel.3130.b: "\"Venha trabalhar em minhas terras. Darei a você o que foi tirado de você.\""
 tour_travel.3130.c: "\"O reino sempre vem em primeiro lugar.\""
 peasant_influx_modifier: "Influxo de Camponeses"
 peasant_influx_modifier_desc: "Essas terras foram oferecidas a um grupo de camponeses como reparação pelos danos causados pelos novos prédios."
 tour_travel.3140.t: "Fora dos Muros"
 tour_travel.3140.desc: "Ouço o alvoroço antes mesmo de ver o prédio. As vozes se elevam de dentro da modesta construção de madeira; há risos e música. Quando nos aproximamos, um[brothel_worker.Custom('ES_XA')] [brothel_worker.GetWomanMan] nos saúda, mordendo [ROOT.GetCharacter.Custom('GetSmallFoodIndef')].\n\n\"Ah, bem-vind[ROOT.GetCharacter.Custom('ES_OA')]\", diz enquanto [brothel_worker.Custom('quirk_pos_standalone')|l]. \"Gostariam de ficar para a noite? Ou só por algumas horas? Um momento?\".\n\nNão é difícil discernir suas intenções."
 tour_travel.3140.a: ""Me #EMP encantaría#!""
 tour_travel.3140.b: "\"Não vou cair em tentação.\""
 brothel_stop_modifier: "Forças Renovadas"
 brothel_stop_modifier_desc: "Este personagem parou em vários bordéis ao longo do caminho."
 #### Tour Cultural Festival Events
 #Liege Events
 cultural_festival.2000.t: "Festival Cultural em [activity.GetCurrentPhase.GetLocation.GetNameNoTooltip]"
 cultural_festival.2000.desc.intro: "As ruas de [ROOT.Char.GetCurrentLocation.GetName] estão ricamente decoradas para minha chegada, e meu vassal[stop_host_scope.Custom('ES_OA')] [stop_host_scope.Custom('ES_ElLa')], [stop_host_scope.GetTitledFirstName|l] me aguarda diligentemente.\n\n"
 cultural_festival.2000.desc.first_time_lovers: "Mal posso esperar para visitar essas terras pela primeira vez, sua bela paisagem e os céus maravilhosos que [stop_host_scope.GetFirstNameNoTooltip] tantas vezes me descreveu na cama. E"
 cultural_festival.2000.desc.first_time_rivals: "Ah, quantas vezes sonhei em devastar suas terras decadentes, em visitar a fortaleza da qual tanto se gabou, só para descobrir que ela é pior que a minha.\n\nEstou ansioso para ver esse #EMP fétido agujero.#! Por sorte, estou aqui para"
 cultural_festival.2000.desc.first_time_neutral: "Não posso dizer que não estou intrigado com os costumes desta terra e o que [stop_host_scope.GetFirstNameNoTooltip] tem a me oferecer. E, em troca, eu"
 cultural_festival.2000.desc.first_time_good: "Ah, como anseio me deliciar com as grandes atividades e alegrias que tenho certeza de que [stop_host_scope.GetFirstNameNoTooltip] preparou — e"
 cultural_festival.2000.desc.first_time_bad: "Então aqui estamos, preparados para um festival chato — medíocre no melhor dos casos — que [stop_host_scope.Custom('ES_ElLa')] lerd[stop_host_scope.Custom('ES_OA')] de [stop_host_scope.GetFirstNameNoTooltip] teve a decência de preparar. Felizmente, estou aqui para"
 cultural_festival.2000.desc.again_lovers: "Que vontade eu tinha de voltar a estas terras! Como me lembro de ter apreciado seus costumes e tradições da última vez, e como ansiava por rever meu querido[stop_host_scope.Custom('ES_OA')] [stop_host_scope.GetFirstNameNoTooltip].\n\nE, obviamente, para"
 cultural_festival.2000.desc.again_rivals: "Ah, colocar os pés #EMP novamente#! em [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] é comparável apenas a visitar as profundezas do [ROOT.Char.GetFaith.NegativeAfterLife] em si. Felizmente, estou de volta para"
 cultural_festival.2000.desc.again_good: "Ah! Como é maravilhoso colocar os pés aqui novamente! Mal posso esperar para ver quais apresentações esplêndidas e refeições deliciosas que [stop_host_scope.GetSheHe] preparou para mim desta vez. E"
 cultural_festival.2000.desc.again_neutral: "Não foi tão terrível da última vez, então estou realmente esperando que seja igualmente suportável agora. Certamente poderia usar um pouco de entretenimento, longe das intrigas cortesãs. E, é claro, para"
 cultural_festival.2000.desc.again_bad: "#EMP Ah#! estar aqui, #EMP novamente#!, é um dos maiores castigos do destino. Ter que lidar com a sua incrivelmente presença entediante pode ser o maior desafio. Felizmente, estou aqui também para"
 cultural_festival.2000.desc.majesty: "mostrar a essas pessoas a extensão da minha magnificência."
 cultural_festival.2000.desc.intimidation: "mostrar-lhe como um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]."
 cultural_festival.2000.desc.again_intimidation: "lembrá-los da minha última visita. Estou prestes a tornar esta igualmente #EMP inesquecível.#!"
 cultural_festival.2000.desc.taxation: "aliviar suas bolsas do peso de seu ouro."
 cultural_festival.2000.a: "\"Vamos começar!\""
 cultural_festival_begins_tt: "Iniciar a atividade do Festival Cultural"
 cultural_festival.2001.t: "Com o Pé Errado"
 cultural_festival.2001.desc.intro: "A música no palco principal é prontamente seguida pelos dançarinos. A beleza de seus movimentos faz com que pareçam parte do palco. Eles ergem as mãos ao ar, e é como ver uma árvore ganhar novos galhos.\n\nO público solta um suspiro espantado quando um dos dançarinos começa a escalar a parede de madeira do palco, dizendo "E agora eu me vingarei de… #EMP aaaAAAH!ۛ#!"\n\n"
 cultural_festival.2001.desc.child: "Quando [injured_artist.GetSheHe] cai ao chão, o capuz se abaixa, revelando o rosto [injured_artist.Custom('ES_DelDela')] [injured_artist.Custom('GetDaughterSon')] [stop_host_scope.Custom('ES_DelDela')] [stop_host_scope.GetTitledFirstName|l], [injured_artist.GetName]."
 cultural_festival.2001.desc.normal: "À medida que o artista cai no chão, o silêncio da multidão permite que todos ouçam um claro #EMP estalo#!."
 cultural_festival.2001.a: "Bem... isso certamente doeu."
 cultural_festival.2001.b: "\"Traga um médico imediatamente!\""
 cultural_festival.2001.c: "\"Eu farei você ser chicoteado por sua incompetência!\""
 festival_helped_injured_artist_modifier: "Artista Ferido Ajudado"
 festival_whipped_injured_artist_modifier: "Artista Ferido Chicoteado"
 cultural_festival.2002.t: "Com o Pé Direito"
 cultural_festival.2002.desc.intro: "Os camponeses locais montaram barracas com verduras e, ocasionalmente, bem raramente, [stop_host_scope.Custom('RegionalEdibleMeat')]. Enquanto continuo meu caminho, acompanhado por uma boa quantidade de cortesãos, vejo um rosto familiar entre eles, os olhos de [injured_artist.GetHerHis] fixos nos meus.

"Eu conheço bem essas terras."
 cultural_festival.2002.desc.secret: "E isso é tudo que tenho."
 cultural_festival.2002.desc.hunting: "\"Um pagamento justo.\""
 cultural_festival.2002.desc.savings: "\"Fiz o que tinha que fazer. Nada mais.\""
 cultural_festival.2002.a: "Conhecimento do Terreno"
 cultural_festival.2002.b: "[ROOT.Char.Custom('ES_ElLa')|U] [ROOT.Char.Custom('GetMonarchofBeautyGoodBad')]"
 terrain_knowledge_modifier: "Todo mundo em [activity.GetCurrentPhase.GetLocation.GetNameNoTooltip] parece estar imerso na conversa mais engraçada que já houve. Eles riem e tossem, e até se cutucam uns aos outros sempre que acham que pode estar exagerado demais. De vez em quando, consigo ouvir a palavra "tristemente".\n\nQuando me aproximo do palco principal, encontro [stop_host_scope.Custom('ES_AlAla')] [stop_host_scope.GetTitledFirstName|l] segurando uma coroa de flores nas mãos, com um sorriso malicioso: "Aqui [ROOT.Char.GetHerHim] está!", anuncia, apontando para mim, "noss[ROOT.Char.Custom('ES_OA')] [ROOT.Char.Custom('GetMonarchofBeautyGoodBad')]!"."
 cultural_festival.2010.t: "As ruas de [activity.GetCurrentPhase.GetLocation.GetNameNoTooltip] estão enfeitadas com [stop_host_scope.GetCurrentLocation.Custom('get_region_flower_type_plural')] e estandartes; toda a gente da aldeia celebra com alegria a minha chegada... Eu juraria que não tiram os olhos de mim.

Quando me aproximo do palco principal, encontro [stop_host_scope.Custom('ES_AlAla')] [stop_host_scope.GetTitledFirstName|l] segurando uma coroa de flores nas mãos, sorrindo para mim: "Aqui [ROOT.Char.GetHerHim] temos!", anuncia, "Noss[ROOT.Char.Custom('ES_OA')] [ROOT.Char.Custom('GetMonarchofBeautyGoodBad')]!""
 cultural_festival.2010.desc_bad: "\"Que surpresa amável!\""
 cultural_festival.2010.desc_good: "As ruas de [activity.GetCurrentPhase.GetLocation.GetNameNoTooltip] estão enfeitadas com [stop_host_scope.GetCurrentLocation.Custom('get_region_flower_type_plural')] e estandartes; toda a gente da aldeia celebra com alegria a minha chegada... Eu juraria que não tiram os olhos de mim.

Quando me aproximo do palco principal, encontro [stop_host_scope.Custom('ES_AlAla')] [stop_host_scope.GetTitledFirstName|l] segurando uma coroa de flores nas mãos, sorrindo para mim: "Você vence a luta"
 cultural_festival.2010.a: "[stop_host_scope.GetShortUIName] vence a luta"
 cultural_festival.2010.b: "Rei da Tristeza e Angústia"
 cultural_festival.2010.c: "Rainha da Tristeza e Angústia"
 cultural_festival.2010.c.success: "Rei da Beleza e Nobreza"
 cultural_festival.2010.c.failure: "Rainha da Beleza e Nobreza"
 monarch_of_beauty_bad_male: "Admiração Física"
 monarch_of_beauty_bad: "Reação Desproporcional"
 monarch_of_beauty_good_male: "É Época"
 monarch_of_beauty_good: "Ruas adornadas com tapeçarias! Ah, o cheiro de [stop_host_scope.Custom('RegionalEdibleMeat')] recém-cozida! Como [activity.GetCurrentPhase.GetLocation.GetNameNoTooltip] brilha nesta época do ano!\n\n"
 king_of_beauty_modifier: "Os sinos repicam e os moradores se preparam para a missa. Conversam animadamente sobre o nascimento de Cristo. "Digo que havia um burro!", "E isso aconteceu perto do rio, como aqui", "Quando meu filho chegar, espero que vocês também lhe deem ouro!".

Em seguida, uma breve encenação acontece rapidamente, e o Senhor nasce."
 king_of_ugly_modifier: "Eles ergueram um poste de maio no centro da vila, e moradores vestidos de branco se preparam para dançar ao seu redor. Eu vejo uma coroa de [stop_host_scope.GetCurrentLocation.Custom('get_region_flower_type_plural')] descansando em uma das mesas, e uma jovem sorri para mim antes de se juntar ao círculo. Lá no céu, a mais bela das luzes brilha a noite toda."
 cultural_festival.2020.t: "Uma fogueira foi acesa no centro da cidade para celebrar a vitória das estrelas mais brilhantes, subindo aos céus. Em meio à festa e à bebida de [stop_host_scope.Custom('RegionalDrink')], um dos moradores começa uma música à qual todos se juntam: 'O verão chegou, cantem alto, [ROOT.Char.Custom('GetRandomMigratoryBird')]! A semente está crescendo e o campo está florescendo, cantem, [ROOT.Char.Custom('GetRandomMigratoryBird')]!'"
 cultural_festival.2020.desc.intro: "Após as orações, os moradores visitam uns aos outros e celebram o fim do jejum. Pratos cheios de [stop_host_scope.Custom('get_region_root_vegetable_plural')] e peixes são servidos juntamente com [stop_host_scope.Custom('RegionalDrink')], e a celebração continua até o pôr do sol."
 cultural_festival.2020.desc.christmas: "Depois de semanas de trabalho, chegou finalmente o último dia da colheita, e grupos são formados entre os moradores para tentar reunir a última parcela da plantação. "Olhem para isto!", gaba-se um deles enquanto ergue sua foice em direção ao campo, cortando não mais do que qualquer outro.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], venham celebrar conosco!", convida [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitledFirstName|l], apontando para o grupo que dança alegremente junto à colheita.".

Em seguida, uma breve encenação acontece rapidamente, e o Senhor nasce."
 cultural_festival.2020.desc.midsommar: "#EMP Vamos beber um pouco de [stop_host_scope.Custom('RegionalAlcoholicDrink')]#!"
 cultural_festival.2020.desc.summer_solstice: "Hora de beber [stop_host_scope.Custom('RegionalDrink')] e comer [stop_host_scope.Custom('RegionalEdibleMeat')]!"
 cultural_festival.2020.desc.eid: "Festival Cultural Abraçado"
 cultural_festival.2020.desc.harvest: "Festividade Cultural Celebrada"
 cultural_festival.2020.desc.generic: "Este personagem participou de uma celebração local"
 cultural_festival.2020.a: "Beber e Esquecer!"
 cultural_festival.2020.b.drink: "Este personagem passou uma celebração local bebendo"
 cultural_festival.2020.b.no_drink: "Taxação Cultural"
 cultural_acceptance_embraced_festival: "Quando as pessoas de [activity.GetCurrentPhase.GetLocation.GetNameNoTooltip] começam a se reunir ao redor do palco de madeira, um pensamento me vem à mente… Um grupo tão grande de pessoas, todas querendo aproveitar um espetáculo notavelmente elaborado..., #EMP todo gratis#!. Que desperdício.\n\nSe eu ficasse perto da entrada, tenho certeza de que poderia exigir um pequeno pedágio por isso… afinal, é em [ROOT.Char.Custom('ES_OA')] meu #EMP mi#! honra."
 enjoyed_culture_modifier: "Eles me devem isso."
 enjoyed_culture_modifier_desc: "Devo causar uma boa impressão e não me envolver com isso."
 festival_tis_the_season: "Veja bem, viajar até aqui foi #EMP extremamente#! caro..."
 festival_tis_the_season_desc: "Sem Impostos do Festival"
 cultural_festival.2030.t: "Impostos do Festival"
 cultural_festival.2030.desc: "Festival Sem Cultura...?"
 cultural_festival.2030.a: "Não sei o que eu esperava quando pedi [stop_host_scope.Custom('ES_AlAla')] [stop_host_scope.GetTitledFirstName|l] que celebrasse um festival cultural para mostrar os costumes de seu povo..., mas não era #EMP isso#!.\n\nDesvio o olhar da dança descoordenada dos artistas mal treinados e tento encontrar algum consolo nas refeições preparadas... #EMP Eca#!. Sua [stop_host_scope.Custom('RegionalEdibleMeat')] está mal cozida e carbonizaram o prato de [stop_host_scope.Custom('get_region_root_vegetable_plural')]. Esta é uma boa representação da cultura [cultural_festival_scope.GetAdjectiveNoTooltip]?"
 cultural_festival.2030.b: "Isso... isso é #EMP terrível#!. Receba ajuda e melhore."
 cultural_festival.2030.c: "Na verdade, não é tão ruim assim."
 no_taxation_modifier: "Hah! Vou mostrar a eles como nós, [ROOT.Char.GetCulture.GetCollectiveNoun], dançamos."
 festival_taxation_modifier: "Todos ficam impressionados com a sua cultura"
 cultural_festival.2040.t: "Todos acham que você está sendo insensível"
 cultural_festival.2040.desc: "Ignorou a Cultura deles"
 cultural_festival.2040.a: "Assistência à Cultura Melhorada"
 cultural_festival.2040.b: "Valorizou a Cultura deles"
 cultural_festival.2040.c: "Festival Cultural Ignorado"
 cultural_festival.2040.c.success: "Movimentos Escandalosos"
 cultural_festival.2040.c.failure: ""E agora, em honra a [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitledFirstNameNoTooltip|l], todos desfrutaremos de uma dança local!", anuncia [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitledFirstName|l] e eu, animadamente, tomo o assento à sua direita, saboreando um pouco de fruta fresca e [stop_host_scope.Custom('RegionalDrink')].\n\n"
 no_culture_modifier: "Logo em seguida, os artistas sobem ao palco, e meus olhos rapidamente seguem suas pernas untadas, descobertas. Seus peitos nus brilham igualmente, não deixando #EMP nada#! para a imaginação. Ajusto-me na cadeira, que belo espetáculo do corpo é esse?"
 helped_culture_modifier: "Logo em seguida, os artistas sobem ao palco, todos vestidos... bem, seria um exagero dizer que eles estão #EMP vestidos#!. A pele nua de suas pernas foi untada com essências aromáticas, e seus... seus #EMP peitos#! estão tão descobertos que é impossível não olhar para eles."
 appreciated_culture_modifier: "\n\n[stop_host_scope.GetTitledFirstNameNoTooltip|l] me olha: "Está se divertindo, [Select_CString( ROOT.Char.IsFemale, 'minha amiga', 'meu amigo' )]?"."
 cultural_acceptance_insulted_festival: "O que #EMP é#! essa devassidão?"
 cultural_festival.2050.t: "Bem, é a cultura deles, né?"
 cultural_festival.2050.desc_intro: "Onde isso esteve a minha vida toda?"
 cultural_festival.2050.desc_lustful: "Um Artefato da Capital"
 cultural_festival.2050.desc_fallback: "Apesar de todo o esforço que claramente foi dedicado ao festival, ainda consigo notar algumas casas abandonadas e materiais de baixa qualidade em [activity.GetCurrentPhase.GetLocation.GetNameNoTooltip].\n\nQuando me aproximo da praça principal, vejo que [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitledFirstName|l] se encontra cercad[stop_host_scope.Custom('ES_OA')] por um grupo de crianças, que perguntam ansiosamente sobre nosso séquito. Eles se escondem imediatamente no momento em que me veem. \"Trouxe isto da capital, caso alguém queira ver...\", digo, enquanto mostro a [stop_host_scope.GetFirstNameNoTooltip] minha [sophisticated_artifact.GetNameNoTooltip], que trouxe comigo.\n\n\"Magnífico!\", diz enquanto as crianças voltam para vê-lo."
 cultural_festival.2050.desc_outro: "\"Na verdade, você pode ficar com isso.\""
 cultural_festival.2050.a: "\"Cuidado com essas mãos.\""
 cultural_festival.2050.b: "\"Pagarei pelos artesãos para que façam um para você!\""
 cultural_festival.2050.c: "Um Jogo de Azar"
 cultural_festival.2060.t: "Um cheiro impressionantemente forte me atinge quando abro a porta da taverna. Um grupo de [retired_mercenary.GetWomenMen] canta animadamente em uma mesa no fundo. "Ha! Eu disse que venceria!", grita um deles, rolando alguns dados entre os dedos. Então [retired_mercenary.GetSheHe] levanta a cabeça, olhando diretamente para mim. "Você também quer tentar a sorte, [ROOT.Char.GetTitleAsNameNoTooltip]?"

"Cuidado, [ROOT.Char.Custom('FormOfAddressForLiege')]", me adverte [stop_host_scope.Custom('ES_ElLa')] [stop_host_scope.GetTitledFirstName|l], "são [Select_CString( retired_mercenary.IsFemale, 'mercenárias retiradas', 'mercenários retirados' )] que se afeiçoaram às minhas terras"."
 cultural_festival.2060.desc: "\"Talvez você possa apenas ficar aqui... e ficar de olho nas pessoas.\""
 cultural_festival.2060.a: "\"Vamos lá, apenas #EMP uma#! última vez — se eu ganhar.\""
 cultural_festival.2060.b: "Você ganha o jogo"
 cultural_festival.2060.c: "Você perde o jogo"
 cultural_festival.2070.t: "\"Eu trouxe meus próprios dados, vamos tornar isso interessante!\""
 cultural_festival.2070.desc: "Eles descobrem que você trapaceou"

"Mercenários Aposentados Contratados"
 cultural_festival.2070.a: "Esse personagem contratou um grupo de mercenários aposentados para manter a paz."
 cultural_festival.2070.b: "Uma Última Guerra"
 cultural_festival.2070.b.success: "Esse personagem convenceu alguns mercenários aposentados a ajudá-los em uma guerra."
 cultural_festival.2070.b.failure: "Bebeu com Mercenários"
 cultural_festival.2070.c: "Um Negócio Milagroso"
 cultural_festival.2070.c.failure: "Enquanto passeio pelo festival, noto uma figura encapuzada vendendo frascos cujo líquido não se consegue distinguir.\n\n"Venham comprar meus remédios, [ROOT.Char.Custom('FormOfAddressForLiege')], pois fazem milagres e equilibram os humores até d[ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetWomanMan] mais frac[ROOT.Char.Custom('ES_OA')]."\n\nAo observar os frascos, vejo que um deles brilha em vermelho-escarlate, como se fosse feito do mais fino cinábrio. O outro é de um verde vivo, como se alguém tivesse encharcado placas de cobre em vinho fresco."
 cultural_festival.2070.d: "\"Eu vou pegar o frasco vermelho!\""
 festival_hired_mercenaries: "\"Ah, a poção verde parece a mais saudável!\""
 festival_hired_mercenaries_desc: "\"Não vou arriscar minha saúde com isso.\""
 festival_luck_mercenaries: "Isso pode ter consequências imprevistas"
 festival_luck_mercenaries_desc: "Tônico Milagroso"
 festival_drank_with_mercenaries: "Melhoria na Saúde"
 cultural_festival.2080.t: "Melhoria na Habilidade de Combate"
 cultural_festival.2080.desc: "Redução na Habilidade de Combate"
 cultural_festival.2080.a: "Melhoria na Fertilidade"
 cultural_festival.2080.b: "Redução na Fertilidade"
 cultural_festival.2080.c: "Redução na Saúde"
 cultural_festival.2080.tt: "Redução no Ganho de Estresse"
 festival_2080_red_health: "Aumento no Ganho de Estresse"
 cultural_festival_2080.a.health: "Aumento na Perda de Estresse"
 cultural_festival_2080.a.prowess: "Aumento na Atração"
 cultural_festival_2080.a.prowess_bad: "Esse personagem bebeu um tônico milagroso em um Festival Cultural"
 cultural_festival_2080.a.fertility: "$festival_2080_red_health$"
 cultural_festival_2080.a.fertility_bad: "$festival_2080_red_health_desc$"
 cultural_festival_2080.b.health_bad: "$festival_2080_red_health$"
