 festival_2080_blue_stress: "Em Fila!"
 festival_2080_blue_stress_desc: "Enquanto observo a quinquagésima apresentação entediante que este pútrido [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] tem a oferecer, me pego desejando que todos os dançarinos quebrem todos os ossos possíveis e simplesmente vão embora.

Espere um momento... #EMP eu#! posso mandá-los embora.

Limpo a garganta antes de falar: "Meus amados súditos, chegou aos meus ouvidos a mais lamentável informação de que vocês têm cometido roubos e traições por estas terras"."
 festival_2080_blue_stress_bad: "\"Seria uma pena se alguém os punisse por esses crimes...\""
 festival_2080_blue_stress_bad_desc: "\"Não são esses os mesmos camponeses que se revoltam contra mim? Peguem-nos!\""
 festival_2080_blue_attraction: "\"Deixem-nos ir.\""
 festival_2080_blue_attraction_desc: "Artistas Presos"
 festival_2080_blue_stress_loss: "Sem Prisioneiros"
 festival_2080_blue_stress_loss_desc: "Este personagem não aprisionou os artistas no condado durante um Festival Cultural"
