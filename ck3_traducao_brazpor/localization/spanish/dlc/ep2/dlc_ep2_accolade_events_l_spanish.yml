l_spanish:
 ep2_accolade_events.0100.t: "A Arte do Caçador"
 ep2_accolade_events.0100.desc: "Perseguir às cegas uma criatura selvagem, disparando flecha atrás de flecha ou esporeando-a cada vez com mais força...?\n\n"É inútil!", ri [huntsmaster.GetName], meu renomad[huntsmaster.Custom('ES_OA')] [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')].\n\nAs feras podem ser astutas. Farejam o caçador quando este se aproxima, dispersam-se diante da matilha e tornam-se violentas quando encurraladas. Derrubar presas significa conhecê-las bem, assim como seu território, e, quando a corneta soa, nunca desistir.\n\nO mais habilidoso dos caçadores é [huntsmaster.GetFirstNameNoTooltip]. Em sua companhia,"
 ep2_accolade_events.0100.desc.both: "meu [ROOT.Char.Custom2('RelationToMeShort', new_hunter_2)] [new_hunter_2.GetFirstName] e eu estamos aprendendo as formas das criaturas de [ROOT.Char.GetFaith.HighGodName]... e as formas de enganá-las."
 ep2_accolade_events.0100.desc.heir: "meu [ROOT.Char.Custom2('RelationToMeShort', new_hunter)] [new_hunter.GetFirstName] está aprendendo as formas das criaturas de [ROOT.Char.GetFaith.HighGodName]... e as formas de enganá-las."
 ep2_accolade_events.0100.desc.liege: "estou aprendendo as formas das criaturas de [ROOT.Char.GetFaith.HighGodName]... e as formas de enganá-las."
 ep2_accolade_events.0100.a: "À caçada!"
 ep2_accolade_events.0200.t: "Afiado como o Fio da Lâmina"
 ep2_accolade_events.0200.desc: ""Bem!", sorri [acclaimed_blademaster.GetName]. #EMP "Outra vez!"#!\n\nEspada se choca contra espada, vontade contra vontade. A necessidade de vitória é tudo o que o espadachim novato sente, mas [acclaimed_blademaster.Custom('ES_ElLa')] cavaleir[acclaimed_blademaster.Custom('ES_OA')] [acclaimed_blademaster.GetFirstNameNoTooltip] sorri enquanto desvia os golpes.\n\n"
 ep2_accolade_events.0200.desc.both_not_martial: "Reduzo a intensidade do meu ataque, exaust[ROOT.Char.Custom('ES_OA')].\n\n"Sua mão conhece bem a espada, [ROOT.Char.Custom('FormOfAddressForLiege')]", diz o [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')], "e a de seu/sua [ROOT.Char.Custom2('RelationToMeShort', new_blademaster_2)] também. Eu poderia... treinar vocês dois, se é isso que desejam?"\n\nContemplo a empunhadura em meus dedos cheios de bolhas. Devo desafiar meu nascimento?"
 ep2_accolade_events.0200.desc.liege_not_martial: "Reduzo a intensidade do meu ataque, exaust[ROOT.Char.Custom('ES_OA')].\n\n"Sua mão conhece bem a espada, [ROOT.Char.Custom('FormOfAddressForLiege')]", diz o [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')], "e a de seu/sua [ROOT.Char.Custom2('RelationToMeShort', new_blademaster_2)] também. Eu poderia... treinar você, assim como estou treinando [new_blademaster_2.GetHerHim], se é isso que deseja?"\n\nContemplo a empunhadura em meus dedos cheios de bolhas. Devo desafiar meu nascimento?"
 ep2_accolade_events.0200.desc.heir_not_martial: "Reduzo a intensidade do meu ataque, exaust[ROOT.Char.Custom('ES_OA')].\n\n"Sua mão conhece bem a espada, [ROOT.Char.Custom('FormOfAddressForLiege')]", diz o [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')], "assim como... a de seu/sua [ROOT.Char.Custom2('RelationToMeShort', new_blademaster_2)]. [new_blademaster_2.GetFirstName] perguntou se eu poderia treinar vocês dois."\n\nMeu herdeir[new_blademaster_2.Custom('ES_OA')] [new_blademaster_2.GetFirstName] quer desafiar seu nascimento?"
 ep2_accolade_events.0200.desc.both: "Reduzo a intensidade do meu ataque, exaust[ROOT.Char.Custom('ES_OA')].\n\n"Vossa mão conhece bem a espada, [ROOT.Char.Custom('FormOfAddressForLiege')]," diz o [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')], "assim como a de [ROOT.Char.Custom2('RelationToMeShort', new_blademaster_2)]! Há arte em suas fúrias: algo a cultivar.""
 ep2_accolade_events.0200.desc.heir: "Meu [ROOT.Char.Custom2('RelationToMeShort', new_blademaster)] [new_blademaster.GetFirstName] diminui a intensidade de seu ataque, exaust[new_blademaster.Custom('ES_OA')].\n\n"Sua mão conhece bem a espada, [ROOT.Char.Custom('FormOfAddressForLiege')]," diz o [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')]. "Há arte em sua fúria: algo a cultivar.""
 ep2_accolade_events.0200.desc.liege: "Diminuo a intensidade do meu ataque, exaust[ROOT.Char.Custom('ES_OA')].\n\n"Sua mão conhece bem a espada, [ROOT.Char.Custom('FormOfAddressForLiege')]," diz o [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')]. "Há arte em sua fúria: algo a cultivar.""
 ep2_accolade_events.0200.a: "Que nossos inimigos tremam!"
 ep2_accolade_events.0200.b: "Apenas aqueles que podem lutar precisam saber como."
 ep2_accolade_events.0200.b.tt: "Afinal, o [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] olha para o meu exemplo."
 defied_martial_custom_modifier: "Costume Marcial Desafiado"
 defied_martial_custom_desc: "Este personagem ignorou os costumes sociais ao permitir que espadachins inadequados empunhassem a espada."
 ep2_accolade_events.0300.t: "O Credo do Encantador de Multidões"
 ep2_accolade_events.0300.desc: "Sentad[master_of_revels.Custom('ES_OA')] ao meu lado para o desjejum, meu [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')] [master_of_revels.GetFirstName] me deleita com raras perspectivas sobre os cortesãos, conta histórias espetaculares e absurdas e faz desaparecer uma quantidade surpreendente de comida e bebida.\n\n"Os frutos da vida aguardam por todos os lados, meu [ROOT.Char.GetTitleTierName]," diz [master_of_revels.GetSheHe], "maduros no galho, provados apenas por quem sobe atrás deles sem pensar."\n\nO aproveitamento dos frutos da vida por parte de [master_of_revels.GetFirstNameNoTooltip] é assunto de todos. [master_of_revels.GetSheHe|U] sempre reúne amizade e fascínio, sem pensar.\n\n"
 ep2_accolade_events.0300.desc.both: "Uma inspiração barulhenta para meu herdeir[new_reveler_2.Custom('ES_OA')] [new_reveler_2.GetFirstName] e para mim."
 ep2_accolade_events.0300.desc.heir: "Uma inspiração barulhenta para meu herdeir[new_reveler_2.Custom('ES_OA')] [new_reveler_2.GetFirstName]."
 ep2_accolade_events.0300.desc.liege: "Encontro-me inspirad[ROOT.Char.Custom('ES_OA')]."
 ep2_accolade_events.0300.a: "Às noites animadas e aos frutos doces!"
