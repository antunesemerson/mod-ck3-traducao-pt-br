l_spanish:
 #BLOODY WEDDING
 ep2_wedding.0101.t: "'Até que a morte nos separe...'"
 ep2_wedding.0101.desc.intro: "Todos os convidados estão reunidos no pátio. É um dia maravilhoso e ensolarado. Eu olho para meus [dummy_gender.GetWomenMen] , os guardas que tanto prometi como anfitrião gentil[dummy_gender.Custom('ES_OnOna')]. Estão #EMP armados hasta los dientes#!. Em breve, meus preparativos darão frutos.\n\nVejo chegar [spouse_2.Custom('ES_AlAla')] [spouse_2.GetTitledFirstName|l], junto com sua comitiva"
 ep2_wedding.0101.desc.spouse: ". Casados… por apenas um dia."
 ep2_wedding.0101.desc.bad: ": uma presença tão desprezível deve ser banida."
 ep2_wedding.0101.desc.good: "… Sinto muito, querid[spouse_2.Custom('ES_OA')]."
 ep2_wedding.0101.a: "Cada membro da casa [spouse_2.GetHouse.GetNameNoTooltip] deve ser eliminado."
 ep2_wedding.0101.a_lowborn: "Cada membro desta família deve ser eliminado."
 ep2_wedding.0101.b: "Só vou tirar a vida de [spouse_2.GetFirstName]."
 ep2_wedding.0101.c: "A noite de núpcias - uma ocasião perfeita."
 ep2_wedding.0101.d: "Eu não posso fazer isso. Não aqui. Não agora."
 ep2_wedding.0101.a.tt: "O casamento começa... e será lembrado"
 ep2_wedding.0101.c.tt: "Uma escolha íntima"
 ep2_wedding.0101.d.tt: "O casamento começa e nenhum mal é causado"
 ep2_wedding.0200.desc.murder: "$ep2_wedding.0200.desc.murder_intro$\"Sou grato por sua benevolência, [ROOT.Char.Custom('FormOfAddressForLiege')], ela realmente aquece meu coração\"."
 ep2_wedding.0200.desc.murder_intro: "Enquanto os convidados entram no salão, eu me atraso, conversando com um grupo de presentes sobre [ROOT.Char.Custom('my_subject_of_interest')]. \"Que anfitri[ROOT.Char.Custom('ES_OnOna')] tão generos[ROOT.Char.Custom('ES_OA')]!\", ouço enquanto me despeço e sigo em direção à mesa principal. Meus guardas estão #EMP por doquier#!. Prontos. Ao me sentar, fito intensamente [spouse_2.Custom('ES_AlAla')] [spouse_2.GetTitledFirstName|l]:\n\n"
 ep2_wedding.0200.desc.murder_spouse: "$ep2_wedding.0200.desc.murder_intro$\"Em breve, seremos apenas #EMP nosotros dos#! [spouse_2.Custom('ES_OA')]\", digo, erguendo minha taça."
 ep2_wedding.0200.a.murder: "#EMP Aproveite!#!"
 ep2_wedding.0202.t.spouse: "… nos separe"
 ep2_wedding.0202.t: "… os separe"
 ep2_wedding.0202.desc.outro: "\n\nFaço um sinal aos meus servos enquanto dou uma mordida na [ROOT.Char.Custom('GetExpensiveDessert')]. Meus [dummy_gender.GetWomenMen] entram no salão, disfarçad[dummy_gender.Custom('ES_OA')]os de mercenários. As portas se trancam e a música começa a tocar. Que comece o massacre."
 ep2_wedding.0202.desc.intro: "Os convidados estão envolvidos em tantas conversas que é difícil acompanhar todas. [spouse_2.Custom('ES_ElLa')|U] [spouse_2.GetTitledFirstName|l] está cercad[spouse_2.Custom('ES_OA')] por um grupo de cortesãos ávidos, que não param de fazer elogios uns aos outros. Não sei se a distração é pura coincidência ou coisa do destino.\n\n"
 ep2_wedding.0202.desc.compassionate: "É uma pena que tenha chegado a isso. Não conseguirei olhar."
 ep2_wedding.0202.desc.paranoid: "Finalmente, meus inimigos vão parar de conspirar contra mim - seus lábios estarão calados para sempre."
 ep2_wedding.0202.desc.zealous: "Que suas almas encontrem redenção no [ROOT.Char.GetFaith.NegativeAfterLife]."
 ep2_wedding.0202.desc.sadistic: "Mal posso esperar para ver as tábuas de pedra ficarem vermelhas sob seus pés."
 ep2_wedding.0202.desc.craven: "Enxugo o suor da testa. #EMP Tossindo.#! Mantenha a cabeça baixa, [ROOT.Char.GetFirstNameNoTooltip], não deixe que desconfiem."
 ep2_wedding.0202.desc.arrogant: "Recosto-me na cadeira, tentando não sorrir. As pessoas vão lembrar disso por todas as eras."
 ep2_wedding.0202.desc.lazy: "Estou tão agradecid[ROOT.Char.Custom('ES_OA')] de não ter que fazê-lo eu mesm[ROOT.Char.Custom('ES_OA')]… Isso de assassinato me parece uma tarefa extenuante."
 ep2_wedding.0202.desc.just: "Chamo isso de justiça."
 ep2_wedding.0202.desc.cannibal: "Eu estava ficando com fome mesmo..."
 ep2_wedding.0202.desc.wrathful: "Que suas cabeças rolem pelos salões que tanto difamaram!"
 ep2_wedding.0202.desc.fallback: "Me pego assobiando descuidadamente junto."
 ep2_wedding.0202.a: "A casa de [spouse_2.GetHouse.GetNameNoTooltip] termina aqui."
 ep2_wedding.0202.a.lowborn: "Sua casa termina aqui."
 ep2_wedding.0203.t.spouse: "$ep2_wedding.0202.t.spouse$"
 ep2_wedding.0203.t: "$ep2_wedding.0202.t$"
 ep2_wedding.0203.desc.intro: "À medida que o banquete se aproxima do fim, as conversas começam a se esvair e os convidados passam a estar bêbados demais ou cansados demais. Os que estão sóbrios o suficiente —ou bêbados o suficiente— agora cercam [spouse_2.Custom('ES_AlAla')] [spouse_2.GetTitledFirstName|l], numa última tentativa de conquistar o favor do casamento.\n\n"
 ep2_wedding.0203.desc.compassionate: "Só espero que seja rápido e indolor."
 ep2_wedding.0203.desc.paranoid: "Agora com certeza [spouse_2.GetFirstName] aprenderá! Com certeza aprenderá! #EMP Todos#! o farão!"
 ep2_wedding.0203.desc.zealous: "Essa é a única maneira de se livrar de uma alma tão venenosa."
 ep2_wedding.0203.desc.sadistic: "Lambo a lâmina da faca. Como eu gostaria de poder fazê-lo eu mesm[ROOT.Char.Custom('ES_OA')]…"
 ep2_wedding.0203.desc.cannibal: "Olho de perto sua pele... que delícia."
 ep2_wedding.0203.desc.craven: "Não posso... não posso olhar. Pode ser ainda pior do que eu pensava!"
 ep2_wedding.0203.desc.arrogant: "Recosto-me na cadeira, dando um gole em [ROOT.Char.Custom('RegionalDrink')]."
 ep2_wedding.0203.desc.just: "É o que deve ser feito."
 ep2_wedding.0203.desc.wrathful: "#EMP Cortadle la cabeza a [spouse_2.GetFirstName]. ¡A la picota con [spouse_2.GetSheHe]!#!"
 ep2_wedding.0203.desc.fallback: "" #left intentionally blank
 ep2_wedding.0203.desc.outro: "Um[my_agent.Custom('ES_XA')] cortesão[my_agent.Custom('ES_OA')] ri uma boa dose a mais do que deveria. Um pouco mais alto. Então, saca uma adaga, e o coração de [spouse_2.GetFirstNameNoTooltip] emudece de repente, assim como os convidados.\n\n«Prendam[my_agent.Custom('ES_LoLa')]!», grito, plenamente ciente de que será libertad[my_agent.Custom('ES_OA')] amanhã mesmo."
 ep2_wedding.0203.a: "Uma tragédia!"
 ep2_wedding.0300.desc.murder_spouse: "Cuando o banquete se aproxima do fim, as velas se apagam e os convidados se retiram para seus aposentos. As vozes voltam a se erguer quando chega a hora da nossa noite de núpcias: \"Que os recém-casados o celebrem!\".\n\nA #EMP verdade#! é que não vejo a hora."
 ep2_wedding.3060.t: "Uma Noite para Morrer"
 ep2_wedding.3060.desc: "Nos espera uma cama ricamente adornada. Enquanto as velas iluminam o rosto [spouse_2.Custom('ES_DelDela')] [spouse_2.GetTitledFirstName|l], prendo a respiração por um instante. «Venha deitar-se comigo, minha [Select_CString( ROOT.Char.IsFemale, 'esposa amada', 'esposo amado' )]», diz [spouse_2.GetSheHe], tirando a blusa.\n\nA lua brilha como o clarão do dia. Eu acaricio sua garganta antes de beijá-la. Minha mão… Se eu apertar com força, tudo terá acabado."
 ep2_wedding.3060.a: "'Aproxime-se, meu querido...'"
 ep2_wedding.3060.a.success: "Você estrangula [spouse_2.GetShortUIName]"
 ep2_wedding.3060.a.failure: "[spouse_2.GetShortUIName] escapa do seu domínio"
 ep2_wedding.3060.b: "Conheço algumas ervas que [spouse_2.Custom('ES_LoLa')] silenciariam melhor."
 ep2_wedding.3060.b.success: "Você envenena [spouse_2.GetShortUIName] com sucesso"
 ep2_wedding.3060.b.failure: "[spouse_2.GetShortUIName] descobre suas intenções"
 ep2_wedding.3060.c: "Um movimento rápido. Eu tenho uma adaga bem debaixo deste travesseiro."
 ep2_wedding.3060.c.flavor: "Deixe-me cortar algumas frutas para você, meu querido!"
 ep2_wedding.3060.c.success: "Você corta a garganta de [spouse_2.GetShortUIName]"
 ep2_wedding.3060.c.failure: "[spouse_2.GetShortUIName] fica desconfiado"
 ep2_wedding.3060.d: "Não, eu não posso fazer isso."
 ep2_wedding.0301.t: "Sabor Amargo"
 ep2_wedding.0301.desc.family: "Corpos estão espalhados pelo quarto. Os serviçais preparam camas enquanto murmura-se sobre quem poderia ser o assassino. 'Ouvi dizer que eles tinham muitos inimigos.' 'Ouvi dizer que eles não tinham nenhum.'"
 ep2_wedding.0301.desc.agent: "Os guardas levaram [my_agent.Custom('ES_AlAla')] agente, mas nos rostos dos convidados ainda permanecem olhares de horror. Um médico se apresentou, como consolo, mas é evidente que não há cura para uma adaga no coração."
 ep2_wedding.0301.desc.wedding_night: "Corro pelos corredores até o grande salão, vestid[ROOT.Char.Custom('ES_OA')] só com um camisão. Antes de abrir a porta, paro por um momento para fazer minha melhor expressão de luto. #EMP \"Socorro! Auxilio!\"#!, grito. \"Um agente tirou a vida de [spouse_2.Custom('ES_DelDela')] [spouse_2.GetTitledFirstName|l] em nossos próprios aposentos!\"."
 ep2_wedding.0301.non_spouse: "\n\nO pranto [spouse_1.Custom('ES_DelDela')] [spouse_1.GetTitledFirstName|l] ecoa pela sala. Suas mãos seguram com firmeza as [spouse_2.Custom('ES_DelDela')] [spouse_2.GetTitledFirstName|l], recusando-se a soltá-las."
 ep2_wedding.0301.spouse: "\n\n\"Ah, meu amor, como o destino tem sido cruel conosco!\", choro, segurando firmemente sua mão fria. \"Vou encontrar quem fez isso com você e #EMP acabaré#! com ele\"."
 ep2_wedding.0301.spouse_wnight: "\n\nSilêncio reina. Meus guardas começam a correr em direção ao quarto e eu cubro meu rosto com as mãos."
 ep2_wedding.0301.a: "Cruel, cruel destino."
 ep2_wedding.0302.t: "Chega o Luto"
 ep2_wedding.0302.desc.family: "A música interrompe minha agradável conversa sobre [ROOT.Char.Custom('my_subject_of_interest')] com alguns convidados. Viro-me para olhar os artistas, e meus olhos se encontram inesperadamente com os de outra pessoa. Um grupo de mercenários marcha em direção a [spouse_2.Custom('ES_ElLa')] [spouse_2.GetTitledFirstName|l] e sua família.\n\nAs espadas são sacadas. #EMP \"No! No, por favor! Nooo!\".#!\n\nOs corpos caem no chão com um som seco e áspero."
 ep2_wedding.0302.desc.agent: "Um grito agudo interrompe minha agradável conversa sobre [ROOT.Char.Custom('my_subject_of_interest')] com alguns convidados. #EMP \"No!\".#! Viro-me para ver [spouse_2.Custom('ES_AlAla')] [spouse_2.GetTitledFirstName|l] com uma adaga cravada bem no coração.\n\nOs guardas se lançam rapidamente contra o assassino: \"Peguem-no, peguem-no!\", ouço gritar [host.Custom('ES_AlAla')] [host.GetTitledFirstName|l].\n\n"
 ep2_wedding.0302.desc.wedding_night: "As portas do grande salão se abrem abruptamente, e [spouse_1.Custom('ES_ElLa')] [spouse_1.GetTitledFirstName|l] está de pé bem no meio, respirando pesadamente, agarrando firmemente a madeira com os braços. \"Socorro... socorro!\" grita, \"Um agente tirou a vida de [spouse_2.Custom('ES_DelDela')] [spouse_2.GetTitledFirstName|l] em nossas próprias câmaras!\".\n\nO aposento fica em silêncio."
 ep2_wedding.0302.spouse: "Eu me aproximo apressadamente de [spouse_2.GetFirstNameNoTooltip] e seguro sua mão. Ainda quente. 'Não... meu coração... não tão cedo...'"
 ep2_wedding.0302.good: "Minha amad[spouse_2.Custom('ES_OA')] [spouse_2.GetFirstNameNoTooltip]… e ir embora assim."
 ep2_wedding.0302.bad: "Não deveria dizer que se lo merecia, mas…"
 ep2_wedding.0302.sadistic: "Não consigo desviar os olhos do sangue... um trabalho tão bem-feito."
 ep2_wedding.0302.indifferent: "Eu não conhecia [spouse_2.GetFirstNameNoTooltip] muito bem, mas ninguém merece um destino como esse."
 ep2_wedding.0302.a: "Uma tragédia."
 ep2_wedding.0955.t: "Aurora Vermelha"
 ep2_wedding_departure_intro: "O salão não se parece em nada com o dia anterior. Os serviçais limparam as mesas, não há música e a maioria dos convidados já se foi."
 ep2_wedding.0955.desc.intro: "$ep2_wedding_departure_intro$\n\nEnquanto me preparo para me despedir dos que restam,"
 ep2_wedding.0955.desc.failed: "vislumbro o rosto [spouse_2.Custom('ES_DelDela')] [spouse_2.GetTitledFirstName|l], conversando animadamente com seu séquito.\n\nSei que suspeita de mim, e com razão. Este casamento vai ser tudo, menos entediante."
 ep2_wedding.0955.desc.murder: "tomo um momento para pensar em [spouse_2.Custom('ES_ElLa')] [spouse_2.GetTitledFirstName|l]. Foi-se."
 ep2_wedding.0955.good: "Não precisava terminar assim."
 ep2_wedding.0955.bad: "Por fim, já não terei que ver mais a cara de tal [spouse_2.Custom2('InsultAdjective', ROOT.Char)]."
 ep2_wedding.0955.sadistic: "Se eu pudesse contar a todos que fui #EMP eu#!..."
 ep2_wedding.0955.compassionate: "Só posso esperar que [ROOT.Char.GetFaith.HighGodName] me perdoe."
 ep2_wedding.0955.indifferent: "O que está feito, está feito."
 ep2_wedding.0955.a: "Um verdadeiro alívio."
 ep2_wedding.0955.a.failure: "Da próxima vez... da próxima vez."
 ep2_wedding.0956.t: "Despedida"
 ep2_wedding.0956.desc: "$ep2_wedding_departure_intro$\n\n[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] se aproxima a mim, com a voz ainda tomada pela dor: \"Meu coração está pesado pela perda de [spouse_2.Custom('ES_DelDela')] [spouse_2.GetTitledFirstName|l], peço desculpas por esta celebração funesta\"."
 ep2_wedding.0956.a: "Estou apenas feliz por não ter sido eu."
 ep2_wedding.0956.a.good: "Não... isso não pode ser verdade."
 ep2_wedding.0204.t: "Sangue e Aço"
 ep2_wedding.0204.desc.intro: "Minha conversa alegre abruptamente chega ao fim quando"
 ep2_wedding.0204.desc.family.non_spouse: "Vejo um grupo de mercenários marchando em nossa direção. #EMP Ssh#!. Espadas são sacadas. Seus sorrisos prenunciam nossa tragédia.\n\n\"Digam adeus à sua família, [spouse_2.GetTitledFirstName].\""
 ep2_wedding.0204.desc.family: "$ep2_wedding.0204.desc.family.non_spouse$ Eles dizem, antes de colocarem uma lâmina em minha própria garganta."
 ep2_wedding.0204.desc.solo: "um membro da corte ri um pouco alto demais. Um pouco estranhamente. [mercenary_1.Custom('ES_LoLa')|U] olho e vejo que está segurando uma faca contra meu peito. \"Desejando-lhe o melhor.\""
 ep2_wedding.0204.a: "Não! #EMP Pare!#!"
 ep2_wedding.0204.a.tt.success: "Você sobrevive"
 ep2_wedding.0204.a.tt.failure: "Você morre"
 ep2_wedding.0204.a.tt.success.host: "[murder_victim.GetShortUIName] morre"
 ep2_wedding.0204.a.tt.failure.host: "[murder_victim.GetShortUIName] sobrevive"
 ep2_wedding.0204.a.spouse_2_murder.tt: "[spouse_2.GetShortUIName] morre"
 ep2_wedding.0957.opening: "Ao [ROOT.Char.Custom('ES_AlAla')|U] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('avenging_family'))] [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitledFirstNameNoTooltip|l]"
 ep2_wedding.0957.desc.parent: "Entreguei meu filh[spouse_2.Custom('ES_OA')] aos teus cuidados, e não fostes capaz de proteger[spouse_2.Custom('ES_LoLa')].$ep2_wedding.0957.desc_ending$"
 ep2_wedding.0957.desc: "Foi colocad[spouse_2.Custom('ES_OA')] [avenging_family.Custom2('RelationToMeShort', SCOPE.sC('spouse_2'))] sob vossa proteção, e é assim que [spouse_2.Custom('ES_LoLa')] o vigiais?$ep2_wedding.0957.desc_ending$"
 ep2_wedding.0957.desc_ending: "\n\nMeus olhos se enchem de lágrimas pela perda, mas em meu coração só há ódio.\n\nEu buscarei vingança, de uma forma ou de outra."
 ep2_wedding.0957.a: "Apenas mais um casamento que deu errado."
 ep2_wedding.0957.a.tt: "Todos os membros próximos da família de [spouse_2.GetShortUIName]"
 host_bloody_wedding_family_kill_title: "Casamento Sangrento"
 host_bloody_wedding_family_kill: "$host_bloody_wedding_family_kill_title$"
 host_bloody_wedding_solo_kill_title: "$host_bloody_wedding_family_kill_title$"
 host_bloody_wedding_solo_kill: "$host_bloody_wedding_family_kill_title$"
 host_bloody_wedding_excommunication_title: "Excomunhão"
 host_bloody_wedding_excommunication: "[CHARACTER.GetShortUIName] foi excomungado"
