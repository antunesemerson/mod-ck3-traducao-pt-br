 ep2_wedding.1050.b: "Um Espetáculo Exótico"
 ep2_wedding.1050.b.1: "Olho ao redor com um sorriso satisfeito. A atmosfera no banquete está descontraída, e os convidados conversam entre si agradavelmente, aproveitando a música e o entretenimento, sem saber que a melhor parte que planejamos para impressioná-los ainda está por vir. Faço um gesto para que meus serviçais prossigam."
 ep2_wedding.1050.b.1.tt: "Estou me divertindo muito no banquete de casamento. Em particular, [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] não poupou gastos com entretenimento. Os melhores músicos tocam para nós, enquanto atores e malabaristas praticam sua arte, e os trovadores declamam versos refinados. Fico bastante surpreso então quando [host.GetFirstNameNoTooltip] faz gestos para que tragam mais alguma coisa."
 wedding_dance_saved_log_title: "\n\nQuatro serviçais retornam rapidamente, arrastando atrás deles uma jaula contendo [host.Custom('GetAnimalTypeCaptive')] majestoso, a mais fina que já vi."
 wedding_dance_saved_log: "A fera está um pouco inquieta, mas as barras são fortes, e todos apreciam o espetáculo de uma posição segura."
 ep2_wedding.1050.b.2: "A fera está inquieta, e observo com um sentimento sinistro enquanto a jaula range e geme a cada movimento. Então, com um terrível #EMP estalo#!, uma barra crucial se rompe, e o caos se instaura."
 ep2_wedding.1050.b.2.tt: "\n\n[1070_target.Custom('ES_ElLa')|U] [1070_target.GetTitledFirstName|l] é rapidamente cercad[1070_target.Custom('ES_OA')] rapidamente."
