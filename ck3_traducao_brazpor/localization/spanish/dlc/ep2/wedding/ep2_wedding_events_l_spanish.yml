 host_wedding_entertainment_bad: "A magnificência do local do casamento impressionou todos os convidados."
 host_wedding_entertainment_bad_title: "$wedding_decoration_title$"
 wedding_food_title: "A magnificência do local do casamento pareceu apropriada."
 host_wedding_food_good: "$wedding_decoration_title$"
 host_wedding_food_good_title: "A magnificência do local do casamento deixou a desejar."
 host_wedding_food_normal: "$wedding_decoration_title$"
 host_wedding_food_normal_title: "O entretenimento oferecido impressionou os convidados."
 host_wedding_food_bad: "$wedding_entertainment_title$"
 host_wedding_food_bad_title: "O entretenimento oferecido foi considerado aceitável pelos convidados."
 wedding_decoration_title: "$wedding_entertainment_title$"
 host_wedding_decoration_good: "Os convidados não ficaram impressionados com o entretenimento oferecido."
