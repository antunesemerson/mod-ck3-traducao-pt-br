 ep2_wedding.1070.g.success: "Uma Combinação Perfeita...?"
 ep2_wedding.1070.g.tt.success: "A multidão está aplaudindo e brindando aos recém-casados, mas, entre eles, parece que perdi de vista minha [ROOT.Char.Custom2('RelationToMe', 1090_target)], [1090_target.GetFirstName]."
 wedding_beasts_rescue_success_log_title: "\n\nApós uma busca cuidadosa, finalmente encontro me [1090_target.GetHerHim] em uma área isolada, totalmente absorvid[1090_target.Custom('ES_OA')] em plena conversa com ninguém menos que [1090_match.Custom('ES_ElLa')] [1090_match.GetTitledFirstName|l], a mesma pessoa com quem tentei juntar[1090_target.GetHerHim] antes! Acho que não devo interferir…"
 wedding_beasts_rescue_success_log: "\n\nApós uma busca cuidadosa, finalmente encontro [1090_target.GetHerHim] sentado[1090_target.Custom('ES_OA')] em um canto, olhando com interesse e, eu diria, com desejo, [1090_match.Custom('ES_AlAla')] [1090_match.GetTitledFirstName|l], que diverte um grupo de convidados animados com piadas e histórias."
