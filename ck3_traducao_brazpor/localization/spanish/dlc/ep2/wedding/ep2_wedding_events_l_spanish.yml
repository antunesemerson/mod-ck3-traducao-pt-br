 wedding_first_sight_log: "[CHARACTER.GetUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'viu', 'viu' )] um mau presságio sobre [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'seu personagem', TARGET_CHARACTER.GetUIName )]"
 #A Good/Bad Omen
 ep2_wedding.1030.t: "Presságio Ignorado"
 ep2_wedding.1030.desc: "[CHARACTER.GetUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'desdeñaste', 'desdeñó' )] um mau presságio sobre [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'seu personagem', TARGET_CHARACTER.GetUIName )]"
 ep2_wedding.1030.desc_good1: "Maravilhoso! Um casamento adequado para dinastia [ROOT.Char.dynasty.GetName]!"
 ep2_wedding.1030.desc_good2: "[spouse_2.Custom('ES_ElLa')|U] [spouse_2.GetTitledFirstName|l], a caminho de seu futur[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetWifeHusband], tropeça e cambaleia, prestes a cair! Quando um servo preocupado se aproxima, [spouse_2.GetFirstNameNoTooltip] sorri e pega a culpada: uma ferradura!"
 ep2_wedding.1030.desc_good3: "Nova Família"
 ep2_wedding.1030.desc_bad1: "As cerimônias de casamento são sempre longas, bastante entediantes e geralmente sem acontecimentos, exceto quando uma comoção começa em algum lugar atrás de mim."
 ep2_wedding.1030.desc_bad2: "\n\nReconheço de imediato o som familiar da melhor voz de reclamação de [trouble_child.GetFirstName] enquanto se abre caminho pela multidão. “[ROOT.Char.GetMotherFather|U], será que est[other_parent.Custom('ES_EA')] vai ser meu nov[other_parent.Custom('ES_OA')] [other_parent.GetMotherFather], em vez de [other_parent.GetFirstName]?”."
 ep2_wedding.1030.desc_bad3: "\n\n"Tenho algo a dizer!". A voz familiar de [trouble_child.GetFirstName] reverbera de dentro da multidão. "É #EMP isto#! mesmo o melhor com que vocês puderam substituir meu [other_parent.GetMotherFather], [other_parent.Custom('ES_ElLa')] [other_parent.GetTitledFirstName|l]?!"."
 ep2_wedding.1030.desc_outro: "\n\nDe relance, avisto [other_parent.GetFirstNameNoTooltip] paralisad[other_parent.Custom('ES_OA')] de surpresa."
 ep2_wedding.1030.desc_good: "Pare com essa bobagem. #EMP Agora.#!"
 ep2_wedding.1030.desc_bad: "Eu sei, querido, é difícil para todos nós..."
 ep2_wedding.1030.a: "#EMP O seu/sua [other_parent.GetMotherFather] deveria ser segredo!#!"
 wedding_omen_good_log_title: "[CHARACTER.GetUIName|U], [CHARACTER.Custom('GetDaughterSon')] de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetUIName )], fez um escândalo durante a cerimônia de casamento."
 wedding_omen_good_log: "$ep2_wedding.1120.t$"
 ep2_wedding.1030.b: "[CHARACTER.GetUIName|U], [CHARACTER.Custom('GetDaughterSon')] de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetUIName )], fez um escândalo durante a cerimônia de casamento e revelou um segredo sobre seu nascimento."
 wedding_omen_bad_log_title: "Segredo Revelado"
 wedding_omen_bad_log: "\n\nNo centro de tudo, está [trouble_child.Custom('ES_ElLa')] [trouble_child.Custom('GetDaughterSon')] de [other_spouse.GetFirstName], [trouble_child.Custom('ES_ElLa')] [trouble_child.GetTitledFirstName|l], choramingando e soluçando. "[other_spouse.GetMotherFather|U], por que você está substituindo meu [other_parent.GetMotherFather], [other_parent.GetFirstName]?"."
 ep2_wedding.1030.c: "\n\n"Tenho algo a dizer!", [trouble_child.Custom('ES_ElLa')] [trouble_child.GetTitledFirstName|l], [trouble_child.Custom('GetDaughterSon')] de [other_spouse.GetFirstName], brada do meio da multidão. "É #EMP isto#! o melhor que você poderia usar para substituir meu [other_parent.GetMotherFather], [other_parent.Custom('ES_ElLa')] [other_parent.GetTitledFirstName|l]?!"."
 wedding_omen_dismissed_log_title: "Cale a boca, #EMP mocos[trouble_child.Custom('ES_OA')]#!."
 wedding_omen_dismissed_log: "Serei um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetMotherFather] pai/mãe melhor!"
 ep2_wedding.1030.d: "Estou desfrutando de uma generosa porção de [ROOT.Char.Custom('GetExpensiveMeal')] sem me preocupar com nada, quando me aborda [trouble_child.GetFirstName], muito arrependid[trouble_child.Custom('ES_OA')].\n\n[ROOT.Char.GetMotherFather|U], quero pedir desculpas por ter causado um escândalo durante a cerimônia. Não foi digno da minha criação e posição, e lamento profundamente."
 #New Family
 ep2_wedding.1120.t: "[CHARACTER.GetUIName|U] e [TARGET_CHARACTER.GetUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'tuvisteis', 'tuvieron' )] uma conversa franca e esclarecedora."
 ep2_wedding.1120.desc: "Reunião Familiar"
 ep2_wedding.1120.desc_child: "[CHARACTER.GetUIName|U] e [TARGET_CHARACTER.GetUIName|U] não [Select_CString( CHARACTER.IsLocalPlayer, 'pudisteis', 'pudieron' )] encontrar nenhum ponto em comum."
 ep2_wedding.1120.desc_adult: "Mal-entendido Familiar"
 ep2_wedding.1120.desc_parent: "Eu te perdoo."
 ep2_wedding.1120.a: "Foi realmente desnecessário."
 ep2_wedding.1120.b: "Devo respeitar sua decepção."
 ep2_wedding.1120.c: "Isso é ultrajante!"
 wedding_child_fuss_log: "[CHARACTER.GetUIName|U], [CHARACTER.Custom('GetDaughterSon')] de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetUIName )], fez um escândalo durante a cerimônia de casamento."
 wedding_child_fuss_log_title: "Sussurros Secretos"
 wedding_child_fuss_secret_log: "A cerimônia está em pleno andamento, mas não consigo me concentrar no que está acontecendo #EMP na frente#! de mim, porque posso ouvir um zumbido constante vindo de #EMP atrás#! de mim. Se eu me concentrar o suficiente, consigo pegar algumas partes do que parece ser uma grande sessão de fofocas envolvendo tanto convidados quanto servos. #EMP\"Você ouviu-\" \"Será verdade?\" \"Mas e-\" \"-não sabia??\"#!\n\n"
 wedding_child_fuss_secret_log_title: "Quando me viro irritad[ROOT.Char.Custom('ES_OA')] para perguntar, capto o olhar presunçoso [1130_knows.Custom('ES_DelDela')] [1130_knows.GetTitledFirstName|l], que parece estar no centro de toda a confusão. "Não têm nada a compartilhar, [ROOT.Char.Custom('FormOfAddressForLiege')]?"
 ep2_wedding.1121.desc_child: "[CHARACTER.GetUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'revelou', 'revelou' )] o segredo de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetUIName )] durante a cerimônia, causando um escândalo."
 ep2_wedding.1121.desc_adult: "$wedding_child_fuss_secret_log_title$"
 ep2_wedding.1121.a: "[CHARACTER.GetUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'tentou', 'tentou' )] revelar o segredo de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetUIName )] durante a cerimônia e [Select_CString( CHARACTER.IsLocalPlayer, 'fuiste', 'fue' )] expulso[CHARACTER.Custom('ES_OA')]."
 ep2_wedding.1121.b: "Intruso Expulso"
 ep2_wedding.1122.desc_repentant: "Não vou negar as evidências."
 ep2_wedding.1122.desc_unrepentant: "Guardas, removam de minha vista este[1130_knows.Custom('ES_EA')] #EMP calumniador[1130_knows.Custom('ES_XA')]#!."
 1122_child_pacified_log: "Em plena comoção, ergue-se [1130_knows.Custom('ES_ElLa')] [1130_knows.GetTitledFirstName|l], sorrindo com suficência. Não lhes disse [other_spouse.GetFirstName]? #EMP Todos#! sabem!"
 1122_child_pacified_log_title: "Chega de segredos entre nós, [other_spouse.GetFirstNameNoTooltip]."
 1122_child_not_pacified_log: "Isso é #EMP ultrajante#!"
 1122_child_not_pacified_log_title: "A cerimônia está em pleno andamento, mas não estou prestando muita atenção, pois minha mente é constantemente puxada de volta para a inquietante informação que sei sobre [spouse_with_secret.Custom('ES_ElLa')] [spouse_with_secret.GetTitledFirstName|l]. Será que ao menos [other_spouse.Custom('ES_ElLa')] [other_spouse.GetTitledFirstName|l] sabe? Não deveria?\n\nEu compartilho casualmente algumas das minhas preocupações com meu vizinho de assento e, quando percebo, toda a multidão fervilha de fofocas, e tanto [spouse_with_secret.GetFirstNameNoTooltip] quanto [other_spouse.GetFirstNameNoTooltip] estão olhando furiosos para o centro da comoção: eu."
 ep2_wedding.1122.a: "[other_spouse.GetFirstNameNoTooltip] merece algo melhor do que isso!"
 ep2_wedding.1122.b: "São apenas #EMP rumores bobos#!, não é, [spouse_with_secret.GetFirstNameNoTooltip]?"
 ep2_wedding.1122.c: "Devo respeitar sua decepção."
 ep2_wedding.1122.d: "Um Deslize"
 #Secret Whispers
 ep2_wedding.1130.t: "\n\n[fumbling_spouse.Custom('ES_ElLa')|U] [fumbling_spouse.GetTitledFirstName|l] tropeça e cai de cara no chão a caminho de seu cônjuge!"
 ep2_wedding.1130.desc: "\n\n[fumbling_spouse.Custom('ES_ElLa')|U] [fumbling_spouse.GetTitledFirstName|l] começa a gaguejar durante os votos, pronunciando tão mal o nome de seu cônjuge que isso é considerado um erro grave."
 ep2_wedding.1130.desc_continue: "\n\n[fumbling_spouse.Custom('ES_ElLa')|U] [fumbling_spouse.GetTitledFirstName|l] fica paralisad[fumbling_spouse.Custom('ES_OA')] de confusão. Está claro que esqueceu qual é o próximo passo da cerimônia."
 wedding_secret_revealed_log: "\n\nSinto [intent_target.Custom('ES_DelDela')] [intent_target.GetTitledFirstName|l] me perfurando com o olhar da multidão, incitando-me a intervir."
 wedding_secret_revealed_log_title: "\n\nEncontro-me com os olhos apavorados [intent_target.Custom('ES_DelDela')] [intent_target.GetTitledFirstName|l] que estão do outro lado da sala, implorando para que eu faça algo."
 wedding_secret_not_revealed_log: "Ainda posso resolver a situação..."
 wedding_secret_not_revealed_log_title: "Você ameniza a situação"
 ep2_wedding.1130.a: "Você amenizou a situação"
 ep2_wedding.1130.b: "[intent_target.GetFirstNameNoTooltip] fica impressionado(a) com sua recuperação habilidosa."
 ep2_wedding.1131.desc: "Você só se envergonha"
 ep2_wedding.1131.a: "Você se envergonhou"
 ep2_wedding.1131.b: "Vamos seguir em frente."
 ep2_wedding.1132.desc: "Isso acontece!"
 ep2_wedding.1132.a: "[CHARACTER.GetUIName|U] [CHARACTER.LocalPlayerString( 'enmendaste', 'enmendó' )] suavemente contornou um passo em falso cometido por [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetUIName )]."
 ep2_wedding.1132.b: "$ep2_wedding.1140.t$"
 #A Misstep
 ep2_wedding.1140.t: "$ep2_wedding.1140.t$"
 ep2_wedding.1140.desc: "Estou aproveitando a cerimônia, orgulhos[ROOT.Char.Custom('ES_OA')] do que consegui organizar. Tudo tem corrido bem até agora… e, assim que penso nisso, sei que ziquei tudo."
 ep2_wedding.1140.desc_1: "Procurando Romantismo"
 ep2_wedding.1140.desc_2: "As cerimônias de casamento costumam ser longas e tediosas, e meus olhos não param de vasculhar a multidão de convidados em busca do alvo dos meus desejos: [intent_target.Custom('ES_ElLa')] [intent_target.GetTitledFirstName|l]."
 ep2_wedding.1140.desc_3: "\n\nQuando enfim [intent_target.Custom('ES_LoLa')] localizo, [intent_target.GetSheHe] está um pouco afastad[intent_target.Custom('ES_OA')] da multidão, cheirando algumas flores da decoração do local e exibindo um sorriso encantado no rosto."
 ep2_wedding.1140.desc_target: "\n\nQuando enfim [intent_target.Custom('ES_LoLa')] localizo, está olhando atentamente[intent_target.Custom('ES_OA')] para os servos, que se apressam com os pratos cheios e os barris de [host.Custom('RegionalDrink')]."
 ep2_wedding.1140.desc_target_spouse: "\n\nQuando por fim [intent_target.Custom('ES_LoLa')] localizo, está fofocando com um pequeno grupo de convidados sobre a inutilidade de tais casamentos."
 ep2_wedding.1140.a: "\n\nQuando por fim [intent_target.Custom('ES_LoLa')] localizo, está pregando para alguns outros convidados sobre a santidade do casamento."
 ep2_wedding.1140.a.success: "\n\nQuando por fim [intent_target.Custom('ES_LoLa')] localizo, está ocupad[intent_target.Custom('ES_OA')], conversando com um pequeno grupo de convidados."
 ep2_wedding.1140.a.success.tt: "É a oportunidade perfeita para se aproximar de [intent_target.Custom('ES_ElElla')]."
 ep2_wedding.1140.a.success.tt2: "Ocasiones así exigen un poco de #EMP poesía#!!"
 ep2_wedding.1140.a.failure: "Sabéis de qué me #EMP dan ganas#! las bodas?"
 ep2_wedding.1140.a.failure.tt: "Você poderia me contar mais sobre isso?"
 ep2_wedding.1140.b: "[CHARACTER.GetUIName|U] [CHARACTER.LocalPlayerString( 'fez', 'fez' )] uma aproximação elegante para [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetUIName )]."
 ep2_wedding.1140.c: "$ep2_wedding.1150.t$"
 recovered_from_misstep_log: "[intent_target.GetFirstNameNoTooltip] está interessad[intent_target.Custom('ES_OA')]"
 recovered_from_misstep_log_title: "Você causou uma boa impressão em [intent_target.GetFirstNameNoTooltip]"
 made_a_misstep_log: "[intent_target.GetFirstNameNoTooltip] está irritado[intent_target.Custom('ES_OA')]"
 made_a_misstep_log_title: "Você incomodou [intent_target.GetFirstNameNoTooltip]"
 #Romantic Scouting
 ep2_wedding.1150.t: "Penetradores"
 ep2_wedding.1150.desc: "Casamentos da nobreza sempre são um grande espetáculo para as pessoas comuns, que se reúnem na esperança de vislumbrar seu governante e provar de suas riquezas.\n\nEm particular, não posso deixar de notar que as preparações em andamento para o grande banquete estão sendo seguidas com total atenção por um grupo de camponeses extremamente exaustos..."
 ep2_wedding.1150.desc_1: "Eu poderia deixá-los entrar!"
 ep2_wedding.1150.desc_2: "Isso vai animar as coisas!"
 ep2_wedding.1150.desc_3: "Eu poderia contrabandear comida para eles!"
 ep2_wedding.1150.desc_4: "[host.GetFirstNameNoTooltip] nunca vai perceber!"
 ep2_wedding.1150.desc_fallback: "Isso está abaixo de mim."
 ep2_wedding.1150.desc_conclusion: "Já faz um tempo que venho notando a crescente multidão de plebeus ao redor do evento.\n\nO que eu não esperava era ver uma pequena tropa deles invadindo as cozinhas e tentando beber o máximo que puderem de [ROOT.Char.Custom('RegionalDrink')] e [ROOT.Char.Custom('GetExpensiveMeal')].\n\n #EMP Cómo diantres han entrado?!#!"
 ep2_wedding.1150.a: "Expulse-os!"
 ep2_wedding.1150.b: "Deixem todos compartilhar nossa alegria!"
 ep2_wedding.1150.c: "Os camponeses são expulsos"
 seduction_good_impression_log: "Você restaurou a ordem"
 seduction_good_impression_log_title: "[host.GetFirstName] expulsou os camponeses."
 ep2_wedding.1150.a.success: "Você falha em controlar a multidão"
 ep2_wedding.1150.a.success.tt: "Os penetras continuam agindo sem controle"
 ep2_wedding.1150.a.failure: "[host.GetFirstName] não conseguiu lidar com os penetras."
 ep2_wedding.1150.a.failure.tt: "[host.GetFirstName] deixou os camponeses ficarem."
 #Gatecrashers
 ep2_wedding.1160.t: "$ep2_wedding.1160.t$"
 ep2_wedding.1160.desc: "[CHARACTER.GetUIName|U] não [CHARACTER.LocalPlayerString( 'conseguiste', 'consiguió' )] controlar uma invasão de plebeus invasores."
 ep2_wedding.1160.a: "$ep2_wedding.1160.t$"
 ep2_wedding.1160.a.tt: "[CHARACTER.GetUIName|U] [CHARACTER.LocalPlayerString( 'deixou', 'deixou' )] que um grupo de plebeus penetras se infiltre na festa."
 ep2_wedding.1160.b: "$ep2_wedding.1160.t$"
 ep2_wedding.1160.b.tt: "[host.GetFirstNameNoTooltip] nunca vai perceber!"
 ep2_wedding.1160.c: "O Desfile"
 ep2_wedding.1161.desc: "A chegada [rich_spouse.Custom('ES_DelDela')] [rich_spouse.Custom('GetBrideGroom')|l], [rich_spouse.Custom('ES_ElLa')] [rich_spouse.GetTitledFirstName|l], foi acompanhada por grande fanfarra: todo um desfile de cavalos ricamente ajaezados, lançando ferraduras de prata para os plebeus recolherem; tambores, liras, gaitas de fole, mímicos e bufões.\n\nAgora, o desfile se dispersou, mas ainda atrai bastante gente, distraída da cerimônia em andamento."
 ep2_wedding.1161.a: "\n\nEu gostaria de aproveitar tudo de uma vez! Em vez disso, vou entre um show de malabarismo, acariciar os cavalos e uma apresentação de cuspir fogo."
 ep2_wedding.1161.b: "\n\nTantas possibilidades! Devo soltar os cavalos? Ou talvez eu possa roubar um tambor e assustar os outros convidados..."
 ep2_wedding.1161.success: "\n\nEu avisto [murderee.Custom('ES_AlAla')] [murderee.GetTitledFirstName|l], encantad[murderee.Custom('ES_OA')] por uma apresentação musical, completamente alhe[murderee.Custom('ES_OA')] ao que [murderee.Custom('ES_LoLa')] a cerca…"
 ep2_wedding.1161.success.tt: "Eu também quero participar!"
 ep2_wedding.1161.success.tt2: "Você pega algumas ferraduras quando ninguém está olhando."
 ep2_wedding.1161.failure: "Agradável, mas um pouco exagerado."
 ep2_wedding.1161.failure.tt: "Você volta sua atenção para a cerimônia."
 ep2_wedding.1161.failure.tt2: "#EMP Tão empolgante!#!"
 ep2_wedding.1161.b.tt: "E se eu derrubasse aquele bobo da corte?"
 wedding_peasant_invasion_managed_log: "[murderee.Custom('ES_ElLa')|U] [murderee.GetTitledFirstName|l] está distraído…"
 wedding_peasant_invasion_managed_log_title: "Você tenta aproveitar a multidão e a confusão do desfile."
 wedding_peasant_invasion_not_managed_log: "Você se aproxima sorrateiramente de [murderee.GetFirstNameNoTooltip] e #EMP ataca#!"
 wedding_peasant_invasion_not_managed_log_title: "Você desaparece na multidão"
 wedding_peasant_invasion_stay_log: "Você não consegue atravessar a multidão"
 wedding_peasant_invasion_stay_log_title: "[murderee.GetFirstNameNoTooltip] desaparece na multidão"
 #The Parade
 ep2_wedding.1170.t: "$ep2_wedding.1170.t$"
 ep2_wedding.1170.desc: "Foi assassinado(a) [TARGET_CHARACTER.LocalPlayerString( 'você', TARGET_CHARACTER.GetUIName )] de forma misteriosa durante o desfile que celebrava a chegada de [CHARACTER.LocalPlayerString( 'você', CHARACTER.GetUIName )] ao casamento."
 ep2_wedding.1170.desc_relax: "Morte no Desfile"
 ep2_wedding.1170.desc_mischief: "\n\nTantas possibilidades! Devo soltar os cavalos? Ou talvez eu possa roubar um tambor e assustar os outros convidados..."
 ep2_wedding.1170.desc_murder: "Uma Combinação Ruim"
 ep2_wedding.1170.a: "Quando por fim estamos frente a frente, percebo pelo nervosismo [other_spouse.Custom('ES_DelDela')] [other_spouse.GetTitledFirstName|l] de que ele(a) mal está à vontade.\n\n[other_spouse.Custom('ES_ElElla')|l] não evita meu olhar, e a careta que se forma em sua boca me diz tudo o que preciso saber: ele(a) não gosta de mim."
 ep2_wedding.1170.a.tt: "Sua opinião não era necessária."
 ep2_wedding.1170.b: "Eu farei você gostar de mim!"
 ep2_wedding.1170.b.tt: "Não me importo! Cadê a comida?"
 ep2_wedding.1170.c: "#EMP Tão empolgante!#!"
 ep2_wedding.1170.d: "Queixas Religiosas"
 ep2_wedding.1170.e: "Todos estão empolgados e maravilhados com a magnificência do local do casamento. Todos, menos [grumbler.Custom('ES_ElLa')] [grumbler.GetTitledFirstName|l].\n\nDesde que chegou, tem ficado rondando, procurando qualquer pretexto para reclamar. "Vocês estão usando #EMP maquillaje#!?!". "Esses véus coloridos são #EMP pecaminosos#!!!". "E toda essa gente imoral se #EMP entremezclan#!?". "Será que tudo isso não passa de um espetáculo de luxo e luxúria?"."
 ep2_wedding.1170.e.tt: "Estou envergonhado(a)..."
 ep2_wedding.1170.success: "Guardas, acompanhem este[grumbler.Custom('ES_EA')] estraga-prazeres até a porta."
 ep2_wedding.1170.success.tt: "Vou fingir que não ouvi nada."
 ep2_wedding.1170.failure: "Sim, e eu também vou aproveitar!"
 ep2_wedding.1170.failure.tt: "Cada personagem zeloso presente"
 wedding_parade_arrival_log: "[CHARACTER.GetUIName|U] [CHARACTER.LocalPlayerString( 'montaste', 'montó' )] uma cena sobre a suntuosidade do casamento e a mistura impudica dos presentes."
 wedding_parade_arrival_log_title: "$ep2_wedding.1190.t$"
 wedding_parade_death_log: "Foi assassinado(a) [TARGET_CHARACTER.LocalPlayerString( 'você', TARGET_CHARACTER.GetUIName )] de forma misteriosa durante o desfile que celebrava a chegada de [CHARACTER.LocalPlayerString( 'você', CHARACTER.GetUIName )] ao casamento."
 wedding_parade_death_log_title: "O coração de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetMotherFather]"
 #A Bad Match
 ep2_wedding.1180.t: "\n\nQuando finalmente me viro, percebo que meu vizinho não é outro senão [listener.Custom('ES_ElLa')] [listener.GetTitledFirstName|l]! Posso aproveitar este momento de conexão…"
 ep2_wedding.1180.desc: "\n\nAo meu lado, [listener.Custom('ES_ElLa')] [listener.GetTitledFirstName|l] sorri apenas com gentileza."
 ep2_wedding.1180.a: "Estou tão orgulhos[ROOT.Char.Custom('ES_OA')]."
 ep2_wedding.1180.b: "Você não está com #EMP ciúmes#!?"
 ep2_wedding.1180.c: "O amor está realmente no ar..."
 #Religious Complaints
 ep2_wedding.1190.t: "[listener.GetFirstNameNoTooltip|U] poderá estar dispost[listener.Custom('ES_OA')] a considerar uma aliança com você também."
 ep2_wedding.1190.desc: "Se ao menos eu pudesse ver o mesmo para [intent_target.GetFirstNameNoTooltip]..."
 ep2_wedding.1190.a: "[listener.GetFirstNameNoTooltip|U] está impressionad[listener.Custom('ES_OA')]"
 ep2_wedding.1190.b: "Você impressionou [listener.GetFirstNameNoTooltip]"
 ep2_wedding.1190.c: "[listener.GetFirstNameNoTooltip|U] não está impressionado[listener.Custom('ES_OA')]"
 ep2_wedding.1190.d: "Você não conseguiu impressionar [listener.GetFirstNameNoTooltip|U]"
 every_zealous_attending_character: "[listener.GetFirstNameNoTooltip|U] está interessado(a)"
 wedding_religious_complaints_log: "[listener.GetFirstNameNoTooltip|U] não está interessado(a)"
 wedding_religious_complaints_log_title: "Você faz progresso ao aproximar [listener.GetFirstNameNoTooltip] de [intent_target.GetFirstNameNoTooltip]"
 #A Parent's Heart
 ep2_wedding.1200.t: "Vanglória"
 ep2_wedding.1200.desc: "[CHARACTER.GetUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'conseguiu', 'conseguiu' )] uma aliança com [TARGET_CHARACTER.LocalPlayerString( 'você', TARGET_CHARACTER.GetUIName )] ao demonstrar seus fortes contatos matrimoniais."
 ep2_wedding.1200.desc_interest: "Nova Aliança"
 ep2_wedding.1200.desc_generic: "\n\nAo meu lado, [listener.Custom('ES_ElLa')] [listener.GetTitledFirstName|l] sorri apenas com gentileza."
 ep2_wedding.1200.a: "Conversa Política"
 ep2_wedding.1200.b: "Enquanto a cerimônia segue seu curso, finalmente consigo me posicionar ao lado de [listener.Custom('ES_AlAla')] [talk_to.GetTitledFirstName|l] e puxar com [talk_to.Custom('ES_ElElla')] uma conversa fiada, que rapidamente entra em um terreno mais interessante: a política.\n\nTrocamos alguns comentários casuais até que [talk_to.Custom('ES_LoLa')] conduzo exatamente até onde eu queria."
 ep2_wedding.1200.c: "\n\n\"É doloroso admitir, mas meus cofres estão vazios!\""
 ep2_wedding.1200.d: "\n\n\"Vivo com medo constante por meu [talk_to.GetPrimaryTitle.GetTierAsNameNoTooltip|l] e por mim mesma...\""
 ep2_wedding.1200.d.tt: "\n\n\"Estou muito preocupada com os recentes ataques em minhas terras...\""
 ep2_wedding.1200.e: "\n\n\"Não consigo dormir à noite, vejo meus inimigos em cada sombra!\""
 ep2_wedding.1200.success: "\n\n\"É doloroso admitir, mas estou ficando mais velha!\""
 ep2_wedding.1200.success.tt: "\n\n\"Infelizmente, tivemos algumas colheitas ruins que prejudicaram nosso crescimento recentemente...\""
