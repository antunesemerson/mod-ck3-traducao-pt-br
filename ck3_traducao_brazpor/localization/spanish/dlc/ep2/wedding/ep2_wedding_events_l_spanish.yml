 wedding_welcome_garden_fail_log: "Um Par Adequado"
 ep2_wedding.1010.b: "Os preparativos para o casamento já estão a todo vapor, mas eu já tenho os olhos voltados para uma meta ainda maior: encontrar um par para meu [ROOT.Char.Custom2('RelationToMe', 1080_target)][1080_target.GetFirstName]!\n\nPor sorte, [1080_target.GetSheHe] já está no local, o que é um bom começo, e está por aí sem jeito. Agora, é encontrar alguém adequado... Meu olhar é atraído por um grupo de convidados conversando, entre os quais [matchmaking_1.Custom('ES_ElLa')] [matchmaking_1.GetTitledFirstName|l] se destaca por beleza e porte. #EMP Perfecto!#!"
 ep2_wedding.1010.b.success: "\n\nEstou prestes a enviar [1080_target.GetFirstNameNoTooltip] quando também percebo [matchmaking_2.Custom('ES_DelDela')] [matchmaking_2.GetTitledFirstName|l]. Será [matchmaking_2.GetSheHe], talvez, uma escolha melhor?"
