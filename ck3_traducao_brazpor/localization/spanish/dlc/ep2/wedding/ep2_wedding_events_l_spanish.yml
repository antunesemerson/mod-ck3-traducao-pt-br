 ep2_wedding.1310.b.newfriends: "[rival.Custom('ES_ElLa')|U] detestável [rival.GetTitledFirstName|l] tem me encarado fixamente do outro lado da mesa do banquete. Nossos olhares se encontram, e eu fico tenso para começar uma discussão quando [rival.GetSheHe] atravessa o salão em minha direção. Espera... está chorando?\n\n"
