 ep2_wedding.1100.a: "Será Você?"
 wedding_cleansing_log_title: ""Casamentos são só política", me preparo enquanto espero que meu futur[spouse_2.Custom('ES_OA')] [spouse_2.Custom('WifeHusband')] se junte a mim.

"Só política", repito para mim mesmo. "Quão ruim pode ser?".

Mas nada me preparou para o momento em que finalmente vejo [spouse_2.GetFirstName] pela primeira vez. Nenhum retrato ou descrição faria justiça ao olhar gentil em seu rosto. Nenhum poeta jamais cantou uma beleza como a de [spouse_2.GetHerHis]. O tempo parece parar quando nossos olhos se encontram, e todo o resto parece desaparecer.

Então [spouse_2.GetSheHe] sorri para mim, e eu sei. Tudo ficará bem."
 wedding_cleansing_log: "Será você a pessoa que eu estava esperando?"
 ep2_wedding.1100.b: "Flecha de Cupido"
 wedding_cleansing_new_log_title: "[CHARACTER.GetUIName|U] e [TARGET_CHARACTER.GetUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'os enamorasteis', 'se enamoraron' )] à primeira vista."
 wedding_cleansing_new_log: "[CHARACTER.GetUIName|U] [CHARACTER.LocalPlayerString( 'probaste', 'probó' )] um novo tipo de limpeza antes da boda"
 ep2_wedding.1100.c: "Um Presságio [ROOT.Char.Custom('GoodBad')]"
 wedding_cleansing_dismiss_log_title: "Os convidados estão reunidos, a cerimônia está prestes a começar e tudo parece em ordem, quando algo fora do comum acontece bem diante dos meus olhos.\n\n"
 wedding_cleansing_dismiss_log: "Um pato selvagem aparentemente perdido abre caminho entre os convidados e se aproxima com passo decidido [spouse_2.Custom('ES_AlAla')] [spouse_2.GetTitledFirstName|l], que ainda não percebeu. Ao chegar até [spouse_2.GetSheHe], o pássaro solta um ensurdecedor #EMP CUAAAC!#!, se vira e vai embora, para o espanto de [spouse_2.GetFirstNameNoTooltip] e diversão da multidão."
 ep2_wedding.1100.d: "[spouse_2.Custom('ES_ElLa')|U] [spouse_2.GetTitledFirstName|l], a caminho de seu futur[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetWifeHusband], tropeça e cambaleia, prestes a cair! Quando um servo preocupado se aproxima, [spouse_2.GetFirstNameNoTooltip] sorri e pega a culpada: uma ferradura!"
 #CEREMONY
 #Could it Be You?
 ep2_wedding.1020.t: "O amuleto da sorte que [spouse_2.Custom('ES_ElLa')] [spouse_2.GetTitledFirstName|l] que estava pendurado no pescoço se solta e cai no chão, e é pisoteado sem cuidado por servos apressados!"
 ep2_wedding.1020.desc: "Nuvens de tempestade se reúnem, aparentemente do nada, e se concentram exatamente sobre o local. Um céu ensolarado rapidamente se transforma em sombrio e ameaçador, lançando uma sombra sinistra sobre a cerimônia prestes a começar.", me preparo enquanto espero que meu futur[spouse_2.Custom('ES_OA')] [spouse_2.Custom('WifeHusband')] se junte a mim.

"\"Isso foi... surpreendente, não foi?\"".

Mas nada me preparou para o momento em que finalmente vejo [spouse_2.GetFirstName] pela primeira vez. Nenhum retrato ou descrição faria justiça ao olhar gentil em seu rosto. Nenhum poeta jamais cantou uma beleza como a de [spouse_2.GetHerHis]. O tempo parece parar quando nossos olhos se encontram, e todo o resto parece desaparecer.

Então [spouse_2.GetSheHe] sorri para mim, e eu sei. Tudo ficará bem."
 ep2_wedding.1020.a: "Isso não significa #EMP NADA#!."
