 ep2_wedding.1210.desc_raids: "Novo Vassalo"
 ep2_wedding.1210.desc_rivals: "\n\n\"Não consigo dormir à noite, vejo meus inimigos em cada sombra!\""
 ep2_wedding.1210.desc_age: "Relações Venenosas"
 ep2_wedding.1210.desc_bad_harvest: "São muitos os preparativos e rituais de uma cerimônia de casamento; em um intervalo entre eles, ouço algumas risadinhas e deboches vindos de um grupo de parentes de [other_spouse.GetFirstName].\n\nQuando vê que chamou minha atenção, [relative.Custom('ES_ElLa')] [relative.GetTitledFirstName|l] começa a se dirigir diretamente a mim:"
 ep2_wedding.1210.desc_rain: "Não consigo acreditar que nossa família tenha aceitado que [other_spouse.GetFirstNameNoTooltip] se maculasse casando com um(a) indivíduo social tão inferior[ROOT.Char.Custom('ES_OA')]!"
 ep2_wedding.1210.desc_enemies: "\"Não consigo acreditar que concordamos com uma união com a Casa #EMP desprezível#! [ROOT.Char.GetHouse.GetName]!\""
 ep2_wedding.1210.a: ""É #EMP indignante#! que deixemos que [other_spouse.Custom('ES_ElLa')] pobre [other_spouse.GetFirstNameNoTooltip] se case com um personagem tão desprezível quanto #EMP vos#!!"."
 ep2_wedding.1210.a.success: "Como pudemos permitir que esta vil #EMP sabandija#! corrompesse [other_spouse.Custom('ES_AlAla')] pobre [other_spouse.GetFirstNameNoTooltip]?"
 ep2_wedding.1210.a.failure: ""É uma verdadeira pena que não tenhamos conseguido encontrar ninguém #EMP mejor#! para [other_spouse.Custom('ES_ElLa')] pobre [other_spouse.GetFirstNameNoTooltip], mas assim é a vida…"."
 ep2_wedding.1210.b: "\n\nO alvoroço também chamou a atenção [diplo_intent.Custom('ES_DelDela')] [diplo_intent.GetTitledFirstName|l], que agora me observa atentamente."
 ep2_wedding.1210.b.success: "Sim, sim, claro..."
 ep2_wedding.1210.b.failure: "Isso é um desafio?"
 ep2_wedding.1210.c: "Eu #EMP vou#! provar que você está errado(a)."
 ep2_wedding.1210.c.success: "Lidar bem com a situação também causará uma boa impressão em [diplo_target.GetFirstNameNoTooltip]"
 ep2_wedding.1210.c.failure: "Você causa uma boa impressão em [relative.GetFirstNameNoTooltip]"
