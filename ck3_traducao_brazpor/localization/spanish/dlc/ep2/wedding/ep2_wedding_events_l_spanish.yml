 ep2_wedding.1080.a.failure: "Um Banho Ritual"
 ep2_wedding.1080.a.failure.tt: "O dia do meu casamento se aproxima, e meus parentes vêm se reunindo no local há dias, então não me surpreende quando meu [ROOT.Char.Custom2('RelationToMe', guest_1)], [guest_1.Custom('ES_ElLa')] [guest_1.GetTitledFirstName|l], e meu [ROOT.Char.Custom2('RelationToMe', guest_2)], [guest_2.Custom('ES_ElLa')] [guest_2.GetTitledFirstName|l], me levam para um balneário isolado não muito longe de [ROOT.Char.GetCurrentActivity.GetLocation.GetName].\n\n\"Segundo as antigas tradições do nosso povo\", começa [guest_1.GetFirstNameNoTooltip], \"você deixará suas roupas velhas e a #EMP kransen#!, a coroa virginal\".\n\n\"Nós o lavaremos completamente, e você renascerá como [Select_CString( ROOT.Char.IsFemale, 'uma bela noiva', 'um belo noivo' )]!\", conclui solenemente [guest_2.GetFirstNameNoTooltip]."
 wedding_propermatch_court_fail_log_title: "O dia do casamento de minha [ROOT.Char.Custom2('RelationToMe', bride)], [bride.Custom('ES_ElLa')] [bride.GetTitledFirstName|l], e a família está há dias em [ROOT.Char.GetCurrentActivity.GetLocation.GetName]. Hoje, estamos levando a noiva para longe, até uma casa de banhos isolada, para sua limpeza tradicional.\n\n“Hoje”, começo, “você deixará suas roupas velhas e a #EMP kransen#!, a circleta virginal. Uma vez limpa e purificada, você se erguerá como [Select_CString( bride.IsFemale, 'uma bela noiva', 'um belo noivo' )]!”\n\nAo meu lado, meu [ROOT.Char.Custom2('RelationToMe', guest_2)], [guest_2.Custom('ES_ElLa')] [guest_2.GetTitledFirstName|l], vibra em voz alta."
