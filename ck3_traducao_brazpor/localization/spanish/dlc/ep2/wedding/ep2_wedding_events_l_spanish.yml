 #Poisonous Relations
 ep2_wedding.1220.t: "Preconceitos Refutados"
 ep2_wedding.1220.desc: "São muitos os preparativos e rituais de uma cerimônia de casamento; em um intervalo entre eles, ouço algumas risadinhas e deboches vindos de um grupo de parentes de [other_spouse.GetFirstName].\n\nQuando vê que chamou minha atenção, [relative.Custom('ES_ElLa')] [relative.GetTitledFirstName|l] começa a se dirigir diretamente a mim:"
 ep2_wedding.1220.desc_marry_down: "Não consigo acreditar que nossa família tenha aceitado que [other_spouse.GetFirstNameNoTooltip] se maculasse casando com um(a) indivíduo social tão inferior[ROOT.Char.Custom('ES_OA')]!"
 ep2_wedding.1220.desc_feud: "Uma Alma Afim"
 ep2_wedding.1220.desc_despicable: "Durante a refeição, me vejo facilmente atraíd[GetPlayer.Custom('ES_OA')] com facilidade pela conversa [new_friend.Custom('ES_DelDela')] [new_friend.GetTitledFirstName|l].\n\nTem opiniões muito interessantes, conta as melhores piadas e parece que temos muito em comum. Quando conto uma anedota, ouve-me atentamente e faz os comentários apropriados na hora certa.\n\nQuem diria que eu encontraria uma companhia tão agradável neste casamento?"
 ep2_wedding.1220.desc_miscreant: "Eu realmente gosto da companhia de [new_friend.GetFirstNameNoTooltip]!"
 ep2_wedding.1220.desc_fallback: "Não é necessário nos aproximarmos ainda mais, no entanto."
 ep2_wedding.1220.desc_target: "Alma Afim"
 ep2_wedding.1220.a: "[CHARACTER.GetUIName|U] e [TARGET_CHARACTER.GetUIName] [CHARACTER.LocalPlayerString( 'se tornaram', 'se tornaram' )] [Select_CString( CHARACTER.IsFemale, 'amigas', 'amigos' )]"
 ep2_wedding.1220.b: "Isso é um desafio?"
 ep2_wedding.1220.c: "Uma Dança Ardente"
 ep2_wedding.1220.c.tt: "Todos estão de bom humor; à minha esquerda, um grupo de crianças está hipnotizado pelos malabaristas; à minha direita, os poetas declamam suas últimas composições para uma multidão extasiada.\n\nNo entanto, todo o banquete fica em silêncio quando um grupo de dançarinos com tochas segue para o centro do recinto, convidando os convidados a se juntarem a eles. A visão é deslumbrante sob a luz baixa do começo da noite: as tochas iluminam seus rostos sorridentes contra o céu que escurece, e lançam padrões entrelaçados em suas sombras.\n\nTudo parece incrível até que [1050_victim.GetTitledFirstName|l] tropeça, derruba uma tocha da mão de um vizinho e incendeia as próprias roupas…"
 ep2_wedding.1220.c.success: "Eu preciso fazer algo!"
 ep2_wedding.1220.c.success.tt: "Você salva [1050_victim.GetFirstNameNoTooltip] das chamas"
 ep2_wedding.1220.c.failure: "Você salvou [1050_victim.GetFirstNameNoTooltip]!"
