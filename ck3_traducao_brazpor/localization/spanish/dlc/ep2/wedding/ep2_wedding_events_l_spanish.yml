 ep2_wedding.1000.a.failure.tt: "Uma Receção Magnífica"
 wedding_artistic_mediate_log_title: "Fico feliz por ter avisado meus servos com antecedência para ficarem atentos à chegada [1010_target.Custom('ES_DelDela')] [1010_target.GetTitledFirstName|l] porque, caso contrário, no meio dos preparativos do casamento, eu a teria perdido.\n\nEm vez disso, estou orgulhosamente no meio do pátio, usando minhas roupas mais elegantes e cercad[GetPlayer.Custom('ES_OA')] de uma guarda de honra, quando [1010_target.GetFirstNameNoTooltip] faz sua entrada."
 wedding_artistic_mediate_log: "\n\n"Tenho o imenso prazer de lhe dar as boas-vindas, [1010_target.GetTitledFirstNameNoTooltip|l]! Estou cert[GetPlayer.Custom('ES_OA')] de que encontrará em minha hospitalidade algo muito agradável, e ficará impressionado com todas as maravilhas que meu reino tem a oferecer!"."
 wedding_artistic_mediate_fail_log_title: "\n\n"Apreciad[1010_target.Custom('ES_OA')] [1010_target.GetTitledFirstNameNoTooltip|l]! Finalmente você chegou! Nenhuma celebração me seria tão agradável quanto me deleitar com sua presença radiante!"."
 wedding_artistic_mediate_fail_log: "\n\n"[1010_target.GetTitledFirstNameNoTooltip|l], bem-vind[1010_match.Custom('ES_OA')]! [1010_match.GetFirstName], venham também dizer oi! #EMP Vocês devem causar uma boa impressão a [1010_target.GetSheHe] e à sua família, está claro?". Acrescento em um sussurro furioso."
