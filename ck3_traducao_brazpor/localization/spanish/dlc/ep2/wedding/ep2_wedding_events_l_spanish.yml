 #Wedding Night Events
 ep2_wedding.3000.t: "Confissões"
 ep2_wedding.3000.desc: "[my_spouse.Custom('ES_ElLa')|U] [my_spouse.GetTitledFirstName|l] ficou a noite toda apátic[my_spouse.Custom('ES_OA')], olhando pela janela e soltando suspiros melancólicos sempre que tento me aproximar de [my_spouse.GetHerHim]. Não para de mexer no cabelo e evitar meu olhar.

As velas estão quase se apagando e [my_spouse.GetSheHe] começa a chorar em silêncio quando me levanto para reacendê-las. "[ROOT.Char.GetFirstNameNoTooltip], eu… tenho algo a confessar."
 ep2_wedding.3000.a: "O sangue... estava por toda parte..."
 ep2_wedding.3000.a.success: "Uma vez eu tentei... foi terrível."
 ep2_wedding.3000.a.failure: "Eu não consigo evitar, seu sabor..."
 ep2_wedding.3000.b: "Eu sei que é repugnante para você, para todos..."
 ep2_wedding.3000.b.success: "Eu conheço as ervas certas, as palavras certas..."
 ep2_wedding.3000.b.failure: "Eu posso... Eu não posso acreditar nisso."
 ep2_wedding.3000.c: "Eu sei que não é bom, mas..."
 ep2_wedding.3000.tt: "\"Não se preocupe, meu amor, eu irei protegê-lo(a).\""
 ep2_wedding_3000_log_a_title: "\"Pare. Eu não quero ouvir o resto.\""
 ep2_wedding_3000_log_a: "\"Na verdade... eu também tenho algo para confessar.\""
 ep2_wedding_3000_log_b_title: "Confidência Compartilhada"
 ep2_wedding_3000_log_b: "[TARGET_CHARACTER.GetUIName] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'confessou seu', 'confessou seu' )] segredo a [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetUIName )] na noite de núpcias"
 wnight_common_things_opinion: "$wedding_confession_log_title$"
 wnight_common_things_opinion_desc: "[CHARACTER.GetUIName|U] e [TARGET_CHARACTER.GetUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'confessaram seus', 'confessaram seus' )] segredos na noite de núpcias"
 wnight_nothing_in_common_opinion: "Consciência Tranquila"
 wnight_nothing_in_common_opinion_desc: "Este personagem optou por ter uma Noite de Núpcias tranquila e não descobrir o segredo de seu cônjuge"
 ep2_wedding.3010.t: "Desinteresse"
 ep2_wedding.3010.desc.intro: "[my_spouse.Custom('ES_ElLa')|U] [my_spouse.GetTitledFirstName|l] ficou a noite toda apátic[my_spouse.Custom('ES_OA')], olhando pela janela e soltando suspiros melancólicos sempre que tento me aproximar de [my_spouse.GetHerHim]. Não para de mexer no cabelo e evitar meu olhar.

As velas estão quase se apagando e [my_spouse.GetSheHe] começa a chorar em silêncio quando me levanto para reacendê-las. "Eu entendo."
 ep2_wedding.3010.desc.murder: "#EMP Hah!#! Você não vai acreditar nisso, mas..."
 ep2_wedding.3010.desc.murder_attempt: "Confidentes"
 ep2_wedding.3010.desc.cannibal: "Este personagem vê seu cônjuge como um confidente confiável"
 ep2_wedding.3010.desc.deviant: "Uma Noite para Recordar"
 ep2_wedding.3010.desc.witch: "O fogo da lareira começou a se apagar, e contemplo suas chamas em silêncio. A luz, seu calor. [my_spouse.Custom('ES_ElLa')|U] [my_spouse.GetTitledFirstName|l] está procurando algo em seu baú de madeira e desvio os olhos das chamas para olhar[my_spouse.GetHerHim].\n\n"[ROOT.Char.GetFirstNameNoTooltip]", diz, oferecendo-me um pequeno pacote embrulhado em seda. "Guardei isto desde que soube do nosso noivado e agora o ofereço a você como prova do meu amor"."
 ep2_wedding.3010.desc.non_believer: "\"#EMP Você#! é o meu maior presente.\""
 ep2_wedding.3010.desc.fallback: "Concederá um bônus às [schemes|lE] de [GetScheme('courting').GetTypeName|l] contra [my_spouse.GetShortUIName]"
 ep2_wedding.3010.a: "\"Eu também tenho algo para você...\""
 ep2_wedding.3010.b: "Concederá um bônus às [schemes|lE] de [GetScheme('seduce').GetTypeName|l] contra [my_spouse.GetShortUIName]"
 ep2_wedding.3010.c: "\"Na verdade... eu também tenho algo para você.\""
 wedding_confession_log_title: "\"#EMP Hah!#! Você não vai me pegar com um truque desses!\""
 wedding_confession_log: "[love_memento.GetDesc]\n\n[my_spouse.GetShortUIName|U] deu este artefato a [ROOT.Char.GetFirstName] na noite de núpcias como prova de seu afeto."
 wedding_confession_joint_log_title: "Mecha de Cabelo"
 wedding_confession_joint_log: "Uma mecha de cabelo amarrada com uma fita de seda, exatamente na tonalidade de [my_spouse.GetShortUIName]."
 wnight_clear_conscience_modifier: "Fita de Bordado da Casa"
 wnight_clear_conscience_modifier_desc: "Uma fita cuidadosamente bordada, exibindo o lema da casa de [itsa_me_scope.GetTitledFirstName|l]."
 ep2_wedding.3020.t: "Colar de Iniciais"
 ep2_wedding.3020.desc: "[my_spouse.Custom('ES_ElLa')|U] [my_spouse.GetTitledFirstName|l] está sorrindo o dia todo, comemorando a cerimônia e mostrando o quão virtuos[my_spouse.Custom('ES_OA')] é em conversas amistosas. A conversa parece nunca acabar e, depois de termos passado um bom tempo no que agora é nosso quarto compartilhado, sinto vontade de me inclinar e beijar [my_spouse.GetHerHim]…

Mas não é nada como eu esperava. Seus lábios estão secos, seus movimentos, sem entusiasmo. Eu me afasto e [my_spouse.Custom('ES_LeLa')] olho nos olhos, interrogativ[ROOT.Char.Custom('ES_OA')].

"Um símbolo de fertilidade de madeira, representando um falo masculino."
 ep2_wedding.3020.a: "Você se tornará o proprietário[ROOT.Char.Custom('ES_OA')] de [love_memento.GetName]"
 ep2_wedding.3020.b: "Uma Noite Ardente"
 ep2_wedding.3020.c: "Ah, quão suave é a pele [my_spouse.Custom('ES_DelDela')] [my_spouse.GetTitledFirstName|l], que cheiro delicioso o seu cabelo tem! Certamente, minha noite de núpcias está sendo exatamente como eu esperava e nos entregamos com presteza ao pecado carnal.\n\nTal é nossa paixão que, sem prestar atenção às velas que iluminam fracamente a alcova, acidentalmente derrubo uma com o pé: "Não pare, meu amor!".\n\nMas [ROOT.Char.GetFaith.HighGodName] tem outros planos para nós, e o colchão de feno rapidamente pega fogo."
 wnight_confider_modifier: "Eu preciso salvar [my_spouse.GetFirstNameNoTooltip]!"
 wnight_confider_modifier_desc: "Você salva [my_spouse.GetFirstNameNoTooltip] das chamas!"
 ep2_wedding.3030.t: "Você fica ferid[GetPlayer.Custom('ES_OA')] ao tentar salvar [my_spouse.GetFirstNameNoTooltip]"
 ep2_wedding.3030.desc: "Preciso me salvar #EMP mí mism[ROOT.Char.Custom('ES_OA')]#!!"
 ep2_wedding.3030.a: "[my_spouse.GetFirstNameNoTooltip] se salva das chamas"
 ep2_wedding.3030.a.tt: "[my_spouse.GetFirstNameNoTooltip] sofre um ferimento[my_spouse.Custom('ES_OA')] no incêndio"
 ep2_wedding.3030.b: "Este é o meu momento de brilhar!"
 ep2_wedding.3030.b.tt: "Você mostra sua força ao salvar [my_spouse.GetFirstNameNoTooltip]"
 ep2_wedding.3030.c: "Esta seria a oportunidade perfeita para me livrar de [my_spouse.GetShortUINameNoTooltip]..."
 ep2_wedding.3030.d: "À fogueira, você vai, querid[my_spouse.Custom('ES_OA')] #EMP [my_spouse.GetWifeHusband]#!!"
 love_memento_desc: "[my_spouse.GetFirstNameNoTooltip] sobrevive à sua tentativa de assassinato"
 lock_of_hair: "[my_spouse.GetFirstNameNoTooltip] morre"
 lock_of_hair.desc: "O Que Paira Acima"
 house_ribbon: "A noite já se alongou e os convidados começam a ir embora depois que o casal parte para assuntos mais… privados. Entrevejo [intent_victim.Custom('ES_AlAla')] [intent_victim.GetTitledFirstName|l] do outro lado da sala e faço um esforço para não a abandonar até que #EMP [intent_victim.GetSheHe]#! o faça.\n\nUm cavaleiro estrangeiro sai para rezar e ficamos a sós.\n\n\"Bem, está na hora de eu também ir embora\", diz [intent_victim.GetFirstNameNoTooltip], levantando-se de sua cadeira.\n\nUma lâmpada de prata pende sobre sua cabeça como uma língua de fogo."
 house_ribbon.desc: "Agora, é o momento!"
 initials_necklace: "Você mata [intent_victim.GetFirstNameNoTooltip]"
 initials_necklace.desc: "[intent_victim.GetFirstNameNoTooltip] sobrevive"
 marriage_prayer_brooch: "A corda da lâmpada parece extremamente fraca esta noite..."
 marriage_prayer_brooch.desc: "A lâmpada mata [intent_victim.GetFirstNameNoTooltip]"
 wooden_phallus: "[intent_victim.GetFirstNameNoTooltip] fica desconfiado do incidente"
 wooden_phallus.desc: "Se [intent_victim.GetHerHim] eu seguir, saberei onde dorme…"
 ep2_wedding.3030.artifact_tt: "Você ganha um bônus significativo para os [GetScheme('murder').GetTypeName|l] [schemes|lE] direcionados a este personagem"
 ep2_wedding.3040.t: "Compromissos Cerimoniais"
 ep2_wedding.3040.desc: "Quando o banquete chega ao ápice, [my_spouse.GetFirstName] e eu trocamos olhares mortificados, revelando nossos sentimentos mútuos sobre a iminente cerimônia de consumação…\n\nEnquanto a procissão nos leva aos nossos aposentos, eu proponho, esperançad[ROOT.Char.Custom('ES_OA')], [ROOT.Char.Custom('WifeHusband')|U], não #EMP precisamos#! fazer isso, sabe?, por cima dos gritos e tambores."
 ep2_wedding.3040.a: "À medida que o banquete atinge seu auge, fico cada vez mais inquiet[ROOT.Char.Custom('ES_OA')] pela cerimônia de consumação, e está claro que [my_spouse.GetFirstName] não compartilha nenhuma das minhas reservas.

[my_spouse.Custom('ES_ElElla')|U] se vira para mim quando a procissão nos leva aos nossos aposentos e me diz, rindo: "Você parece um fantasma, [ROOT.Char.Custom('WifeHusband')]! Relaxe!", por cima dos gritos e dos tambores."
 ep2_wedding.3040.a.success: "Quando o banquete atinge seu auge, vai ficando evidente a inquietação de [shy_spouse.GetFirstName] pela iminente cerimônia de consumação…\n\nEnquanto a procissão segue para nossos aposentos, minha nov[shy_spouse.Custom('ES_OA')] [shy_spouse.Custom('WifeHusband')] me implora, por cima dos gritos e dos tambores: "Não poderíamos abrir mão disso…?"."
 ep2_wedding.3040.a.failure: "\n\nAs portas estão se aproximando rapidamente, os gritos da festa atingindo o ápice; a cerimônia está prestes a começar."
 ep2_wedding.3040.b: "Vamos ficar a sós no quarto!"
 ep2_wedding.3040.b.success: "Rápido, tranque a porta!"
 ep2_wedding.3040.b.failure: "Suponho que seja esperado de mim..."
 ep2_wedding.3040.c: "Por favor, querid[my_spouse.Custom('ES_OA')]? Não podemos deixá-los do lado de fora?"
 ep2_wedding.3040.c.success: "[my_spouse.GetFirstNameNoTooltip] está convencido(a)"
 ep2_wedding.3040.d: "[my_spouse.GetFirstNameNoTooltip] se recusa"
 ep2_wedding.3040.d.flavor: "Vem, querido[my_spouse.Custom('ES_OA')] tudo vai ficar bem"
 ep2_wedding.3040.d.success: "[my_spouse.GetFirstNameNoTooltip] cede"
 ep2_wedding.3040.d.failure: "[my_spouse.GetFirstNameNoTooltip] está chatead[my_spouse.Custom('ES_OA')]"
 ep2_wedding.3050.t: "Não sejam ridículos[my_spouse.Custom('ES_OA')] é tradição!"
 ep2_wedding.3050.desc: "[bedding_witness_1.Custom('ES_ElLa')|U] [bedding_witness_1.GetTitledFirstName|l] e os demais testemunhas"
 ep2_wedding.3050.a: "Consumação Barrada"
 ep2_wedding.3050.a.success: "[CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'fechou', 'fechou' )] a porta na cara dos espectadores da cerimônia de consumação com [TARGET_CHARACTER.LocalPlayerString( 'você', TARGET_CHARACTER.GetShortUIName )]"
 ep2_wedding.3050.a.failure: "Consumação Barrada"
 ep2_wedding.3050.b: "Este personagem obteve tranquilidade trancando a festa de consumação em sua noite de núpcias."
 ep2_wedding.3050.b.success: "Cerimônia de Consumação Barrada"
 ep2_wedding.3050.b.failure: "Cerimônia de Consumação Forçada"
 ep2_wedding.3050.c: "Cedeu à Cerimônia de Consumação"
 ep2_wedding.3050.c.tt: "Deitados"
 ep2_wedding.3200.t: "[my_spouse.GetFirstName] e eu somos conduzidos às câmaras pela animada festa de casamento, os gritos e risadas ecoantes anunciam a cerimônia de consumação.\n\n"
 ep2_wedding.3200.both: "[officiant.Custom('ES_ElLa')|U] [officiant.GetCouncilTitleFirstName|l] abençoa o leito conjugal"
 ep2_wedding.3200.self: "À medida que o banquete atinge seu auge, fico cada vez mais inquiet[ROOT.Char.Custom('ES_OA')] pela cerimônia de consumação, e está claro que [my_spouse.GetFirstName] não compartilha nenhuma das minhas reservas.

[my_spouse.Custom('ES_ElElla')|U] se vira para mim quando a procissão nos leva aos nossos aposentos e me diz, rindo: "antes de nos acomodar, derramando xícaras de vinho apimentado e forte, e nos orientando a bebê-las."
 ep2_wedding.3200.other: "antes de nos acomodar, nos ungindo de acordo com a moda [officiant.GetFaith.GetAdjectiveNoTooltip]."
 ep2_wedding.3200.closing: "Nos olhamos felizes enquanto a festa começa a sair, finalmente sozinhos!\n\n"
 ep2_wedding.3200.a: "Seguramos as mãos um do outro enquanto a festa se retira, não poderia haver melhor combinação.\n\n"
 ep2_wedding.3200.a.flavor: "Meu nov[my_spouse.Custom('ES_OA')] [my_spouse.GetWifeHusband] vira-se, fazendo uma careta de repulsa enquanto a comitiva se afasta.\n\n"
 ep2_wedding.3200.b: "Meu nov[my_spouse.Custom('ES_OA')] [my_spouse.GetWifeHusband] não parece muito entusiasmad[my_spouse.Custom('ES_OA')] enquanto a comitiva vai embora.\n\n"
 ep2_wedding.3200.c: "Nos viramos para nos olhar, ambos tensos de expectativa, e a festa se retira.\n\n"
 ep2_wedding.3200.c.success: "Viro-me para [my_spouse.GetFirstNameNoTooltip] enquanto a comitiva vai embora. \"Então... [my_spouse.GetWifeHusband]...!\"\n\n"
 ep2_wedding.3200.c.failure: "Antes que a porta se feche, meu buf[jester.Custom('ES_OnOna')], [jester.GetFirstName], faz gestos lascivos, rosna e late como um sabujo."
 ep2_wedding.3200.d: "Antes que a porta se feche, [jester.GetFirstName], —[jester.Custom('ES_ElLa')] buf[jester.Custom('ES_OnOna')] de [my_spouse.GetFirstNameNoTooltip]— faz gestos lascivos, rosna e late como um sabujo."
 ep2_wedding.3200.d.success: "Antes que a porta se feche, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('friend'))] [friend.Custom('ES_ElLa')] [friend.GetTitledFirstName|l], sorri e nos deseja boa sorte."
 ep2_wedding.3200.d.failure: "Antes que a porta se feche, [friend.Custom('ES_ElLa')] [friend.GetTitledFirstName|l], [my_spouse.Custom2('RelationToMeShort', SCOPE.sC('friend'))] de [my_spouse.GetFirstNameNoTooltip], sorri e nos deseja boa sorte."
 ep2_wedding.3200.e: "Antes da porta se fechar, meu(a) [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('other_spouse'))], [other_spouse.GetFirstName], nos lança um último olhar ferido."
 ep2_wedding_witnesses_tt: "Antes que a porta se feche, [other_spouse.GetFirstName], [my_spouse.Custom2('RelationToMeShort', SCOPE.sC('other_spouse'))] de [my_spouse.GetFirstNameNoTooltip], lança em nossa direção um último olhar ferido."
 wedding_barred_bedding_log_title: "Antes que a porta se feche, [family.GetFirstName], [my_spouse.Custom2('RelationToMeShort', SCOPE.sC('family'))] de [my_spouse.GetFirstNameNoTooltip] grita #EMP Assim se faz, [my_spouse.Custom('GirlBoy')]!#!."
 wedding_barred_bedding_log: "Antes que a porta se feche, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('family'))], [family.GetFirstName], grita #EMP É assim que se faz, [ROOT.Char.Custom('GirlBoy')]!#!."
 wedding_barred_doors_modifier: "A porta se fecha atrás do último dos espectadores, a festa barulhenta continua pelo corredor, embora as famílias estejam certamente ouvindo."
 wedding_barred_doors_modifier_desc: "Venha aqui, esperei por isso a noite toda!"
 wedding_barred_bedding_doors_opinion: "Seu [my_spouse.GetWifeHusband] se sente lisonjead[my_spouse.Custom('ES_OA')]"
 wedding_forced_bedding_ceremony_opinion: "[my_spouse.GetFirstNameNoTooltip] está disgustado[my_spouse.Custom('ES_OA')]"
 wedding_caved_to_bedding_opinion: "Oh — #EMP BOCEJO#! — de repente estou com sono..."
 ep2_wedding.3300.t: "Insultas ao seu [my_spouse.GetWifeHusband]"
 ep2_wedding.3300.opening: "[my_spouse.GetFirstNameNoTooltip] está aliviad[my_spouse.Custom('ES_OA')]"
 ep2_wedding.3300.blessing: "Acho que vou precisar de mais vinho para isso!"
 ep2_wedding.3300.decorate: "Seu [my_spouse.GetWifeHusband] concorda"
 ep2_wedding.3300.flowers: "[my_spouse.GetFirstNameNoTooltip] está ofendido[my_spouse.Custom('ES_OA')]"
 ep2_wedding.3300.wine: "Pela minha dinastia, farei isso..."
 ep2_wedding.3300.anointing: "Ambos se divertem mesmo que relutantemente"
 ep2_wedding.3300.lover: "Você e [my_spouse.GetFirstNameNoTooltip] seguem em frente como se estivessem cumprindo um dever"
 ep2_wedding.3300.friend: "Um Encontro de Casas"
 ep2_wedding.3300.hatred: "Com os recém-casados se retirando para a noite, as brasas são acesas, as jarras são enchidas e os músicos são convocados para festividades que se estendem pela noite adentro.\n\n"
 ep2_wedding.3300.unfriendly: "Horas depois, me pego olhando embaçado por cima da minha taça [other_family_relative.Custom('ES_AlAla')] [other_family_relative.GetTitledFirstName|l], [other_family_spouse.Custom2('RelationToMeShort', other_family_relative)] [other_family_spouse.Custom('ES_DelDela')] [other_family_spouse.Custom('GetBrideGroom')],"
 ep2_wedding.3300.friendly: "Horas depois, me vejo olhando, embaçado, através da fumaça [other_family_relative.Custom('ES_AlAla')] [other_family_relative.GetTitledFirstName|l], [other_family_spouse.Custom2('RelationToMeShort', other_family_relative)] [other_family_spouse.Custom('ES_DelDela')], [other_family_spouse.Custom('GetBrideGroom')]"
 ep2_wedding.3300.polite: "Horas depois, me pego piscando para [other_family_relative.Custom('ES_ElLa')] [other_family_relative.GetTitledFirstName|l], [other_family_spouse.Custom2('RelationToMeShort', other_family_relative)] [other_family_spouse.Custom('ES_DelDela')], [other_family_spouse.Custom('GetBrideGroom')],"
 ep2_wedding.3300.jester_self: "que acabou de quase engasgar com sua [host.Custom('RegionalAlcoholicDrink')] de tanto rir.\n\n"
 ep2_wedding.3300.jester: "que acabou de tossir incontrolavelmente de tanto rir.\n\n"
 ep2_wedding.3300.other_friend_self: "que boceja, saciad[other_family_relative.Custom('ES_OA')] e satisfeit[other_family_relative.Custom('ES_OA')].

"
 ep2_wedding.3300.other_friend: "[other_family_relative.GetSheHe|U] diz embriagado(a): 'Admito! Seu(a) [ROOT.Char.Custom2('RelationToMeShort', my_family_spouse)] é uma ó- #EMP HIC#! tima combinação para o(a) meu(minha) [other_family_relative.Custom2('RelationToMeShort', other_family_spouse)]! Q- #EMP HIC#! que sejam felizes!'"
 ep2_wedding.3300.other_spouse_self: "[other_family_relative.GetSheHe|U] balbucia: "Eu… #EMP *HIC*#! sabia que não tinha certeza sobre gente da casa [ROOT.Char.GetHouse.GetBaseNameNoTooltip], mas… #EMP *HIC*#! mas você é boa gente!"."
 ep2_wedding.3300.other_spouse: "Finalmente [other_family_relative.GetSheHe] diz: 'Admito! Seu(a) [ROOT.Char.Custom2('RelationToMeShort', my_family_spouse)] é uma ótima combinação para o(a) meu(minha) [other_family_relative.Custom2('RelationToMeShort', other_family_spouse)]! Que sejam felizes!'"
 ep2_wedding.3300.family: "No fim, [other_family_relative.GetSheHe] diz: Sabeis que não estava segur[other_family_relative.Custom('ES_OA')] da casa [ROOT.Char.GetHouse.GetBaseNameNoTooltip], mas vi que sois gente de bem."
 ep2_wedding.3300.family_self: "Isso me lembra, eu preciso da sua opinião!"
 ep2_wedding.3300.fallback: "Conversa Esclarecedora"
 ep2_wedding.3300.a: "Oh! Meu(minha) [ROOT.Char.Custom2('RelationToMeShort', my_family_suitor)] iria adorar você!"
 ep2_wedding.3300.a.success: "Alquimia Instantânea"
 ep2_wedding.3300.a.failure: "Eles se deram muito bem"
 ep2_wedding.3300.b: "Eles são apenas educados"
 ep2_wedding.3300.b.success: "Mais cerveja! Mais!"
 ep2_wedding.3300.b.failure: "Mais haxixe! Mais!"
 ep2_wedding.3300.c: "Devemos manter contato, agora somos família!"
 ep2_wedding.3300.c.success: "Diga-me, tod[other_family_relative.Custom('ES_OA')] s [other_family_relative.GetWomenMen] da casa [other_family_relative.GetHouse.GetBaseNameNoTooltip] são tão bel[other_family_relative.Custom('ES_OA')] s?"
 ep2_wedding.3300.c.failure: "[other_family_relative.GetFirstNameNoTooltip] se derrete"
 ep2_wedding.3300.d: "[other_family_relative.GetFirstNameNoTooltip] se afasta"
 ep2_wedding.3300.d.success: "Competição Fresca"
 ep2_wedding.3300.d.failure: "As portas se fecham atrás dos recém-casados, risos abafados e gritinhos ecoando pelos corredores. Eu desabo novamente no salão do banquete, incapaz de parar de pensar em [jealousy_focus.GetFirstName] e [jealousy_usurper.GetFirstName]...\n\n"
 ep2_wedding.3400.t: "Ambos são queridos para mim, mas temo que mudanças possam surgir na aurora, no calor de suas afeições, enquanto estou embriagado(a) na atmosfera festiva."
 ep2_wedding.3400.opening: "Meu(minha) [ROOT.Char.Custom2('RelationToMeShort', jealousy_focus)] desfruta do toque de outra pessoa - eu sei que [jealousy_focus.GetSheHe] tem responsabilidades, mas isso não ameniza as farpas que ferem meu coração."
 ep2_wedding.3400.drink_self: "Sei que ainda sou [ROOT.Char.GetWifeHusband] favorit[ROOT.Char.Custom('ES_OA')] de [jealousy_focus.GetFirstName], mas temo o que poderia trazer provar um[jealousy_usurper.Custom('ES_XA')] nov[jealousy_usurper.Custom('ES_OA')] [jealousy_usurper.GetWomanMan]."
 ep2_wedding.3400.hashish_self: "Outro[jealousy_usurper.Custom('ES_OA')] [jealousy_usurper.GetWifeHusband] para sua coleção; outro[jealousy_usurper.Custom('ES_OA')] competidor[jealousy_usurper.Custom('ES_XA')] pelo seu tempo e seu afeto."
 ep2_wedding.3400.fallback_self: "\n\n\"E quanto a mim? Maldita seja essa agonizante tríade..."
 ep2_wedding.3400.drink: "\n\n[jealousy_focus.GetSheHe|U] não me esquecerá… esquecerá de mim...?"
 ep2_wedding.3400.hashish: "\n\nAh, o que eu me importo?! Por que isso[jealousy_focus.Custom('ES_EA')] [jealousy_focus.Custom2('InsultNoun', ROOT.Char)] me incomoda tanto…?"
 ep2_wedding.3400.fallback: "que boceja, saciad[other_family_relative.Custom('ES_OA')] e satisfeit[other_family_relative.Custom('ES_OA')].

"
 ep2_wedding.3400.drink_family: "[jealousy_focus.GetFirstNameNoTooltip] é #EMP mí[jealousy_focus.Custom('ES_OA')]!#!"
 ep2_wedding.3400.drink_house: "Esquema receberá o [GetModifier('wedding_consorts_envy_modifier').GetNameWithTooltip|l]"
 ep2_wedding.3400.family: "Meu coração está partido..."
 ep2_wedding.3400.house: "Menos atenção de [jealousy_focus.GetFirstNameNoTooltip] pode ter suas vantagens."
 ep2_wedding.3400.a: "Membros da família próxima [jealousy_usurper.Custom('ES_DelDela')] [jealousy_usurper.Custom('GetBrideGroom')]"
 ep2_wedding.3400.tt: "Adúltero Revelado"
 ep2_wedding.3400.b: "Inveja dos Consortes"
 ep2_wedding.3400.b.tt: "Noite de Casamento Arruinada"
 ep2_wedding.3400.b.success: "Notícia Antiga"
 ep2_wedding.3400.b.failure: "Esse personagem recebeu de bom grado o novo relacionamento do(a) parceiro(a), buscando alívio."
 ep2_wedding.3400.c.drink: "Na Noite"
 ep2_wedding.3400.c.hashish: "Os recém-casados já se despediram, enviados pelas famílias à câmara nupcial para consumar a união. O restante de nós retorna ao salão de banquetes para festejar e celebrar.\n\n"
 ep2_wedding.3400.d: "Minha cabeça se vira diretamente para as mesas do banquete; é quase impossível resistir aos doces aromas da comida restante.\n\n"
 ep2_wedding.3400.e: "Muitos dos convidados já estão passando para a próxima fase da festa, incentivando os músicos e iniciando a próxima rodada de danças.\n\n"
 ep2_wedding.3400.e.success: "Com toda essa conversa sobre votos e cerimônias de consumação, minha mente se volta imediatamente para os atos indescritíveis que o feliz casal deve estar cometendo agora.\n\n"
 ep2_wedding.3400.e.failure: "Passamos a noite em uma [host.Custom('FortifiedBuilding')] de grande luxo, e não consigo deixar de pensar em quais coisas não fariam falta aos seus donos.\n\n"
 ep2_wedding.3410.t: "Enclausurad[ROOT.Char.Custom('ES_OA')] o dia inteiro, cercad[ROOT.Char.Custom('ES_OA')] por desconhecidos enquanto a cerimônia e depois o banquete se arrastam sem fim; alivia-me agora ter liberdade.\n\n"
 ep2_wedding.3410.opening: "Durante todo o dia, senti culpa pela ostentação das celebrações, enquanto os pobres plebeus e servos do lado de fora lutam.\n\n"
 ep2_wedding.3410.double: "Apesar de ter conhecido tantos rostos novos hoje, estou ansioso para conhecer mais convidados antes que esta oportunidade social inevitavelmente termine.\n\n"
 ep2_wedding.3410.lover: "Contemplando os convidados, trajados em suas melhores vestes e pompa, sinto o impulso de circular pelo salão e fazer minha presença ser notada por todos.\n\n"
 ep2_wedding.3410.primary: "Cercado[ROOT.Char.Custom('ES_OA')] por tanta gente, fiz o possível para não revelar as malfeitorias de [blab_guest.Custom('ES_DelDela')] [blab_guest.GetTitledFirstName|l] e carregar esse fardo, mas não sei por quanto tempo vou aguentar.\n\n"
 ep2_wedding.3410.secondary: "Cercado[ROOT.Char.Custom('ES_OA')] de tanta gente, fiz o possível para carregar o peso dos meus segredos sem deixar escapar nada, mas não sei por quanto tempo conseguirei aguentar.\n\n"
 ep2_wedding.3410.double_opinion: "Contemplo os convidados que se acotovelam, embriagados e empanturrados pelos festejos do dia, e me pergunto que boatos suas línguas retorcidas deixaram escapar hoje.\n\n"
 ep2_wedding.3410.positive_opinion: "Contemplando a multidão, eu me deleito no calor de uma ocasião feliz, tirando força dos rostos sorridentes e da concordância — mas quem é essa figura encurvada?\n\n"
 ep2_wedding.3410.negative_opinion: "Com as cerimônias concluídas e os votos proferidos, sou tomado pela preocupação e pela esperança pelo feliz casal; por todas as provações que virão na vida a dois e na paternidade.\n\n"
 ep2_wedding.3410.indifferent_opinion: "

Preciso zelar pela minha posição, antes que est[jealousy_usurper.Custom('ES_EA')] [jealousy_usurper.Custom2('InsultNoun', ROOT.Char)] o faça por mim."
 ep2_wedding.3410.a: "Agora então, onde está aquele(a) serviçal esbelto(a)?"
 ep2_wedding.3410.a.flavor: "Não há melhor momento para vasculhar os aposentos..."
 ep2_wedding.3410.b: "Finalmente, posso sair deste maldito lugar!"
 ep2_wedding.3410.b.tt: "Esta noite, devo olhar para os pobres de [ROOT.Char.GetCurrentLocation.GetTitle.GetNameNoTierNoTooltip]."
 ep2_wedding.3410.c: "Eu pretendia falar com [social_guest.GetFirstNameNoTooltip]."
 ep2_wedding.3410.d: "Minha presença aqui hoje não deve ser ofuscada."
 every_usurper_close_family_tt: "Este segredo está me consumindo, alguém precisa saber!"
 revealed_lover_wedding_night_opinion: "Vamos ver o que os criados ouviram esta noite..."
 wedding_consorts_envy_modifier: "Você descobrirá o [secret|El] de alguém"
 ruined_wedding_night_opinion: "Parece que [help_guest.GetFirstNameNoTooltip] bebeu demais..."
 wedding_old_news_modifier: "Parece que [help_guest.Custom('ES_AlAla')] o pobre [help_guest.GetFirstNameNoTooltip] bem que poderia receber uma ajuda…"
 wedding_old_news_modifier_desc: "Parece que [help_guest.Custom('ES_ElLa')] pobre [help_guest.GetFirstNameNoTooltip] está pegando no sono…"
 ep2_wedding.3420.t: "#EMP Vamos lá#! Por aqui..."
 ep2_wedding.3420.opening: "O [host.GetFaith.HouseOfWorship|l] estará calmo agora."
 ep2_wedding.3420.eat: "[ROOT.Char.GetFaith.HighGodName], abençoe esta união e faça-a feliz."
 ep2_wedding.3420.drink: "Segredo Descoberto"
 ep2_wedding.3420.lech: "Dúvidas Dinásticas"
 ep2_wedding.3420.steal: "Cansados após um dia inteiro de espera e socialização, eu, [ROOT.Char.Custom2('RelationToMeShort', my_family_relative_1)] e [ROOT.Char.Custom2('RelationToMeShort', my_family_relative_2)] nos acomodamos em uma mesa para refletir sobre a união."
 ep2_wedding.3420.flee: "Cansados após um dia inteiro de espera e socialização, eu e meus [ROOT.Char.Custom2('GetFamilyRelationPlural', my_family_relative_1)] nos acomodamos em uma mesa para refletir sobre a união."
 ep2_wedding.3420.charity: "\n\n[my_family_relative_1.GetFirstName] diz em voz baixa, "Olha,"
 ep2_wedding.3420.social: "noss[my_family_relative_1.Custom('ES_OA')] [my_family_relative_1.Custom2('RelationToMeShort', my_family_spouse)] me preocupa, de verdade."
 ep2_wedding.3420.posture: "Devo dizer que ainda tenho dúvidas, estou preocupado(a) com o(a) meu(minha) [my_family_relative_2.Custom2('RelationToMeShort', my_family_spouse)]."
 ep2_wedding.3420.blab: "[other_family_spouse.GetFirstName] é #EMP demasiado#! jovem demais para [my_family_spouse.Custom('ES_ElElla')]. Isso tudo acabará em lágrimas"."
 ep2_wedding.3420.blab_self: "[other_family_spouse.GetFirstName] é velho demais, não há como [other_family_spouse.GetSheHe] [my_family_spouse.Custom('ES_LoLa')] deixar feliz. Esta é a verdade"."
 ep2_wedding.3420.scheme: "[other_family_spouse.GetFirstName] é teimos[other_family_spouse.Custom('ES_OA')] como uma mula, enquanto [my_family_spouse.GetSheHe] é mans[my_family_spouse.Custom('ES_OA')]; [other_family_spouse.GetSheHe] manterá [my_family_spouse.GetHerHim] sob seu controle.""
 ep2_wedding.3420.help: "[other_family_spouse.GetFirstName] é manso[other_family_spouse.Custom('ES_OA')] como um cordeiro, o que pode oferecer um[other_family_spouse.Custom('ES_XA')] [other_family_spouse.GetWomanMan] a um[my_family_spouse.Custom('ES_XA')] [my_family_spouse.GetWomanMan] como [my_family_spouse.Custom('ES_ElElla')]?""
 ep2_wedding.3420.pray: "Est[other_family_spouse.Custom('ES_EA')] [other_family_spouse.GetWomanMan] carece de honra; [other_family_spouse.Custom('ES_LoLa')] observei-o(a) o dia todo; só trará miséria a [my_family_spouse.GetFirstName]"."
 ep2_wedding.3420.closing: "Este[other_family_spouse.Custom('ES_EA')] [other_family_spouse.Custom2('InsultAdjective', SCOPE.sC('my_family_relative_1'))] é agora uma mancha na reputação da nossa família; [other_family_spouse.Custom('ES_ElLa')] muito [other_family_spouse.Custom2('InsultNoun', SCOPE.sC('my_family_relative_1'))] não fará nenhum bem a [my_family_spouse.GetFirstName]!"."
 ep2_wedding.3420.a: "[other_family_spouse.GetSheHe|U] é um peso doentio, incapaz de apoiar [my_family_spouse.GetFirstName] em suas provações e interesses. Não é prudente."
 ep2_wedding.3420.b: "Este vínculo abre as portas para as intrigas [other_family_spouse.GetHouse.GetHeadOfHouse.GetPrimaryTitle.GetAdjectiveNoTooltip] para destruir [my_family_spouse.Custom('ES_ElLa')] [my_family_spouse.GetHouse.GetHeadOfHouse.GetPrimaryTitle.GetNameNoTooltip] e a Casa [other_family_spouse.GetHouse.GetBaseNameNoTooltip] de dentro para fora"."
 ep2_wedding.3420.c: "Um [other_family_spouse.Custom('ES_XA')] [other_family_spouse.GetWomanMan] plebeu como [other_family_spouse.Custom('ES_ElElla')] não está à altura desta família; mancha a reputação de [my_family_spouse.GetFirstName]."
 ep2_wedding.3420.d: "Vocês viram a aparência de [my_family_spouse.GetFirstName] cumprirá com seus deveres conjugais para com [other_family_spouse.Custom('ES_ElElla')] ou ao imaginar os semblantes de seus descendentes…""
 ep2_wedding.3420.e: "Est[other_family_spouse.Custom('ES_EA')] [other_family_spouse.Custom2('InsultNoun', SCOPE.sC('my_family_relative_1'))] da casa [other_family_spouse.GetHouse.GetBaseNameNoTooltip] não é dign[other_family_spouse.Custom('ES_OA')] de uma casa tão grande quanto a de [my_family_spouse.GetHouse.GetBaseNameNoTooltip]; macula [my_family_spouse.GetFirstName] ao se associar apenas ao nome…"."
 ep2_wedding.3420.f: "[other_family_spouse.GetSheHe|U] é um monstro; é só disso que se falou a noite toda! Como pudemos permitir que nos unissem a esse [other_family_spouse.Custom2('InsultNoun', SCOPE.sC('my_family_relative_1'))]? Espero que [other_family_spouse.Custom('ES_ElLa')] pobre [my_family_spouse.GetFirstName] consiga suportar isso…"."
 ep2_wedding.3420.g: "É[other_family_spouse.Custom('ES_EA')] [other_family_spouse.GetWomanMan] é um[other_family_spouse.Custom('ES_XA')] conhecid[other_family_spouse.Custom('ES_OA')] libertin[other_family_spouse.Custom('ES_OA')]; [other_family_spouse.Custom('ES_AlAla')] que foram depenados por incontáveis amantes; como podemos permitir que se inflija esse dano ao nome de [my_family_spouse.GetFirstName]?! Pensem nas calúnias, nos rumores… nas chacotas!"."
 ep2_wedding.3420.h: "Há algo em [other_family_spouse.Custom('ES_ElElla')]. [other_family_spouse.GetFirstName] tem um olho torto… Vocês perceberam? Espero que [my_family_spouse.GetFirstName] sim…""
 ep2_wedding.3420.i: "Como se pode confiar em um [other_family_spouse.Custom('ES_XA')] [my_family_relative_1.Custom2('GetUnbelieverTerm', other_family_spouse)] como [other_family_spouse.Custom('ES_ElElla')]? Vai desviar [my_family_spouse.GetFirstName] do caminho de [my_family_relative_1.GetFaith.HighGodName]."
 ep2_wedding.3420.j: "\n\n"Acho que vocês estão certos [my_family_relative_2.Custom2('RelationToMeShort', my_family_relative_1)]", suspira [my_family_relative_2.GetFirstName]. "Parece um casamento desastroso"."
 ep2_wedding.3420.j.tt: "\n\n"Certamente você entende, [my_family_relative_2.Custom2('RelationToMeShort', my_family_relative_1)]", repreende [my_family_relative_2.GetFirstName]. "A aliança com a casa [other_family_spouse.GetHouse.GetBaseNameNoTooltip] deve se sobrepor à felicidade de [my_family_spouse.GetFirstName]"."
 ep2_wedding.3420.k.drink: "\n\n"Vejo que ainda estais com vossas dúvidas, [my_family_relative_2.Custom2('RelationToMeShort', my_family_relative_1)]", resmunga [my_family_relative_2.GetFirstName]. "Os compromissos são necessários na política"."
 ep2_wedding.3420.k.health: "\n\n\"Venha, [my_family_relative_2.Custom2('RelationToMeShort', my_family_relative_1)]\", suspira [my_family_relative_2.GetFirstName]. \"Dêem tempo a eles! Concedam a eles ao menos uma lua juntos antes de fazer tais julgamentos\"."
 ep2_wedding.3420.k.fallback: "Temo que você esteja perto da verdade, [ROOT.Char.Custom2('RelationToMeShort', my_family_relative_1)]..."
 ep2_wedding.3420.k.flavor: "Confie em mim, é uma boa combinação."
 ep2_wedding.3420.l: "E daí? Deixe o amor para os bardos."
 ep2_wedding.3420.l.flavor: "Agora está nas mãos de [ROOT.Char.GetFaith.HighGodName]."
 secret_discovered_toast: "Segredo Descoberto"
 ep2_wedding.3500.t: "Quem é o próximo?"
 ep2_wedding.3500.intro: "Enquanto o casal troca seus votos, olho para [matchmaked_scope.Custom('ES_AlAla')] [matchmaked_scope.GetTitledFirstName|l], aplaudindo alegremente. Tenho tentado arranjar um par para [matchmaked_scope.GetHerHim], e este momento parece a oportunidade perfeita para lembrá-l[matchmaked_scope.Custom('ES_OA')] das alegrias do casamento.

"Não são uma gracinha?", pergunto inocentemente, olhando a multidão em busca de um candidato adequado."
 ep2_wedding.3500.intro_plural: "Já vi [matchmaked_scope.GetFirstNameNoTooltip] falando com [objective_scope.Custom('ES_ElLa')] [objective_scope.GetTitledFirstName|l], e eles formavam um lindo casal…"
 ep2_wedding.3500.intro_connector: "\n\nSei que [matchmaked_scope.GetSheHe] tem andado falando por aí com [objective_scope.Custom('ES_ElLa')] [objective_scope.GetTitledFirstName|l] antes, embora não estivesse muito entusiasmad[matchmaked_scope.Custom('ES_OA')] respeito."
 ep2_wedding.3500.relation_shared: "Por que você não segue o exemplo deles com [objective_scope.GetShortUINameNoTooltip]?"
 ep2_wedding.3500.relation: "[matchmaked_scope.GetFirstNameNoTooltip] segue o seu conselho"
 ep2_wedding.3500.young: "[matchmaked_scope.GetFirstNameNoTooltip] se recusa a ouvir"
 ep2_wedding.3500.old: "[objective_scope.GetShortUINameNoTooltip] parece muito sol[objective_scope.Custom('ES_OA')]…"
 ep2_wedding.3500.bold: "[matchmaked_scope.GetFirstNameNoTooltip] conversa com [objective_scope.GetFirstNameNoTooltip]"
 ep2_wedding.3500.shy: "Não acho que eles formariam um bom casal."
 ep2_wedding.3500.dishonorable: "Uma Combinação Inspirada"
 ep2_wedding.3500.dislike: "[CHARACTER.GetFirstNameNoTooltip] encontrou um casamento adequado para [TARGET_CHARACTER.GetFirstNameNoTooltip]"
 ep2_wedding.3500.health: "Um Convidado Legendário"
 ep2_wedding.3500.realms: "À medida que o banquete prossegue, acho tudo um pouco… decepcionante. Não há sedas ou tapeçarias impressionantes, o mais fino ouro não tem lugar aqui — muito menos as maiores gemas. Ao olhar pela janela, o céu noturno me parece, de algum modo, inspirador.\n\nLá fora existe a caça branca. Ela vaga livremente por nossas florestas e se esconde entre suas árvores. Caçar uma seria uma façanha lendária.\n\nOu talvez eu pudesse apenas… pintar de branco um dos nossos exemplares de [ROOT.Char.Custom('GetAnimalType')]?"
 ep2_wedding.3500.lowborn: "\n\nComo mais posso honrar meu próprio casamento?"
 ep2_wedding.3500.beauty: "Preciso me apressar, mandar meus serviçais começarem imediatamente."
 ep2_wedding.3500.renown: "Isso te ajudará a #EMP ganhar renome#!, mas um convidado atento pode desconfiar…"
 ep2_wedding.3500.criminal: "O risco é muito grande."
 ep2_wedding.3500.fornicator: "Todo convidado sociável, festeiro, bêbado, corajoso, caçador ou galante presente"
 ep2_wedding.3500.fallback: "Convidado Lendário"
 ep2_wedding.3500.faith: "Este personagem ficou impressionado com um animal branco fazendo uma entrada durante um banquete de casamento"
 ep2_wedding.3500.agree: "$ep2_wedding.2010.t$: Despertando Suspeitas"
 ep2_wedding.3500.alliance: "Quando o exemplar de [ROOT.Char.Custom('GetAnimalType')] entra no salão, sua pelagem pálida brilha intensamente sob o luar, uma febre quase fosforescente, um brilho antinatural. O engano é quase perfeito — uma maravilha. Os convidados ficam pasmos e se aproximam rapidamente do animal, sem ousar tocá-lo, pois sua natureza é sagrada.

No entanto, vejo [doubting_guest.Custom('ES_AlAla')] [doubting_guest.GetTitledFirstName|l] entre a multidão, revirando os olhos: "Vocês não percebem que é só tinta? [ROOT.Char.Custom('ES_ElLa')|U] [ROOT.Char.GetTitledFirstNameNoTooltip|l] nos tomou todos por idiotas"."
 ep2_wedding.3500.compromise: "Ah, não há mais sentido em manter a ilusão."
 ep2_wedding.3500.time: "Como ousa duvidar de mim no dia da minha festa?"
 ep2_wedding.3500.a: "[doubting_guest.GetFirstNameNoTooltip] acredita relutantemente em você"
 ep2_wedding.3500.b: "[doubting_guest.GetFirstNameNoTooltip] não acredita em uma única palavra"
 ep2_wedding.3500.d: "Não Muito Bem"
 ep2_wedding.3500.e: "Pratos dos melhores manjares cobrem as mesas, com [host.Custom('GetExpensiveMeal')] e [host.Custom('GetExpensiveDessert')] enchendo a sala com um delicioso aroma.\n\n[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] se excedeu nos preparativos e o poço do pátio agora transborda de [host.Custom('GetExpensiveDrink')], que é recolhido com um balde de prata preso a uma corrente de prata.\n\nAo me aproximar com curiosidade, vejo [drunk_guest.Custom('ES_AlAla')] [drunk_guest.GetTitledFirstName|l], cambaleando perigosamente pelo chão perto dele, taça na mão."
 #Ceremony Events
 ep2_wedding.4000.t: "Você convence [drunk_guest.GetFirstNameNoTooltip] a se afastar"
 ep2_wedding.4000.desc.intro: "Enquanto o casal troca seus votos, olho para [matchmaked_scope.Custom('ES_AlAla')] [matchmaked_scope.GetTitledFirstName|l], aplaudindo alegremente. Tenho tentado arranjar um par para [matchmaked_scope.GetHerHim], e este momento parece a oportunidade perfeita para lembrá-l[matchmaked_scope.Custom('ES_OA')] das alegrias do casamento.

"[drunk_guest.GetFirstNameNoTooltip] não cai"
 ep2_wedding.4000.desc.good_match: "\"Pronto!\""
 ep2_wedding.4000.desc.no_match: "Você empurra com sucesso [drunk_guest.GetFirstNameNoTooltip] para dentro do poço"
 ep2_wedding.4000.a: "[drunk_guest.GetFirstNameNoTooltip] resiste ao seu empurrão"
 ep2_wedding.4000.a.success: "[drunk_guest.GetFirstNameNoTooltip] morre na queda"
 ep2_wedding.4000.a.failure: "Seu intento de [THIS.Char.GetInvolvedActivityIntent.GetName] é bem-sucedido"
 ep2_wedding.4000.b: "Um Amigo de um Amigo"
 ep2_wedding.4000.b.success: "Ao observar [diplo_target.Custom('ES_AlAla')] [diplo_target.GetTitledFirstName|l] à distância, logo chego à conclusão de que não posso simplesmente me aproximar de [diplo_target.GetSheHe] e começar a falar do tempo, dos últimos tratados médicos ou da guerra, e rezar para que isso se transforme em uma aliança.\n\nLogo avisto [target_friend.Custom2('MyCharacterIntroduction', ROOT.Char)] do outro lado da sala, [diplo_target.Custom('ES_ElLa')] conhecido como [SCOPE.sC('diplo_target').Custom2('RelationToMeShort', SCOPE.sC('target_friend'))] de [diplo_target.GetFirstNameNoTooltip], virando alegremente taças de [ROOT.Char.Custom('RegionalAlcoholicDrink')].\n\n\"Dizei-me, onde estão os interesses de [diplo_target.GetFirstNameNoTooltip]?\", pergunto, atento.\n\n"
 ep2_wedding.4000.c: "\"Hah! Sob a cintura de alguém, posso te dizer isso!\""
 ep2_wedding_4000_log_success_title: "\"Apenas... apenas fale sobre livros e o quanto você odeia sair de casa.\""
 ep2_wedding_4000_log_success: "Ah, [diplo_target.Custom('ES_ElLa')] mais valente entre [Select_CString( diplo_target.IsFemale, 'as mulheres', 'os homens' )], versado[diplo_target.Custom('ES_OA')] na guerra e em suas artes."
 ep2_wedding.2010.t: "\"Aqui, obviamente! Um momento de celebração, boa comida, bebida fina e a companhia mais requintada.\""
 ep2_wedding.2010.desc.intro: "\" prospera na corte! Com grande cuidado, [diplo_target.GetSheHe|U] estudou as artes das sombras.\""
 ep2_wedding.2010.desc_spouse: "Fantástico! Vamos usar essa percepção imediatamente!"
 ep2_wedding.2010.a: "Você se aproxima de [diplo_target.GetFirstNameNoTooltip]"
 ep2_wedding.2010.a.tt: "Como sei que posso confiar em [target_friend.GetSheHe]?"
 ep2_wedding.2010.b: "Isto concederá um bônus às [schemes|lE] de [GetScheme('befriend').GetTypeName|l] que tenham como alvo [diplo_target.GetFirstNameNoTooltip]"
 ep2_wedding.2010.impressed_list: "[target_friend.GetFirstNameNoTooltip] parece estar dizendo a verdade"
 wbanquet_white_animal_opinion: "[target_friend.GetFirstNameNoTooltip] fica ofendido com sua desconfiança"
 wbanquet_white_animal_opinion_desc: "$ep2_wedding.2000.t$"
 ep2_wedding.2011.t: "Com meus conhecimentos recém-adquiridos, aproximo-me astutamente [diplo_target.Custom('ES_AlAla')] [diplo_target.GetTitledFirstName|l], que desfruta do banquete e da companhia de outros em outra mesa, onde foi estendida uma rica toalha. "Podemos falar um instante, [diplo_target.GetTitleAsNameNoTooltip|l]?", pergunto. "Não gostaria de interromper sua reunião".

[diplo_target.Custom('ES_ElLa')|U] [diplo_target.GetTitledFirstNameNoTooltip] levanta as sobrancelhas, com um toque de curiosidade nos olhos. "Pois não. Que assuntos o trazem até mim, nobre [ROOT.Char.GetFirstNameNoTooltip]?"."
 ep2_wedding.2011.desc: "Quando o exemplar de [ROOT.Char.Custom('GetAnimalType')] entra no salão, sua pelagem pálida brilha intensamente sob o luar, uma febre quase fosforescente, um brilho antinatural. O engano é quase perfeito — uma maravilha. Os convidados ficam pasmos e se aproximam rapidamente do animal, sem ousar tocá-lo, pois sua natureza é sagrada.

No entanto, vejo [doubting_guest.Custom('ES_AlAla')] [doubting_guest.GetTitledFirstName|l] entre a multidão, revirando os olhos: "#EMP Nada é miserável, a menos que você pense assim#!."
 ep2_wedding.2011.a: "\"Então... você ouviu falar sobre... um tratado?\""
 ep2_wedding.2011.b: "\"Você ouviu falar sobre a campanha do barão? Que cerco foi esse!\""
 ep2_wedding.2011.b.success: "\"Por favor, beba e coma comigo, e que esse banquete dure dias!\""
 ep2_wedding.2011.b.failure: "\"#EMP Psst#!, você ouviu os rumores sobre uma trama na corte?\""
 ep2_wedding.2020.t: "[diplo_target.GetShortUINameNoTooltip] o considera uma[GetPlayer.Custom('ES_XA')] [Select_CString( GetPlayer.IsFemale, 'aliada poderosa', 'aliado poderoso' )]"
 ep2_wedding.2020.desc: "Você estabelece uma aliança com [diplo_target.GetFirstNameNoTooltip]"
 ep2_wedding.2020.a: "[diplo_target.GetShortUINameNoTooltip] quer que você se torne seu suserano[ROOT.Char.Custom('ES_XA')]"
 ep2_wedding.2020.a.success: "[diplo_target.GetFirstNameNoTooltip] presta juramento de fidelidade a você"
 ep2_wedding.2020.a.failure: "[diplo_target.GetShortUINameNoTooltip] considera você uma alma afim"
 ep2_wedding.2020.b: "[diplo_target.GetShortUINameNoTooltip] fica ofendido por você pensar que [diplo_target.GetSheHe] teria algum interesse nisso"
 ep2_wedding.2020.b.success: "[diplo_target.GetFirstNameNoTooltip] está insultad[diplo_target.Custom('ES_OA')]"
 ep2_wedding.2020.c: "Meu amor, meu [spouse.GetWifeHusband]"
 ep2_wedding.2020.c.success: "Quantos convidados do casamento já suspeitavam que [spouse.Custom('ES_ElLa')] [spouse.GetTitledFirstName|l] já era meu amante? A portas fechadas, não há necessidade de fingirmos o contrário. Seu toque familiar, meu conhecimento do corpo dele/dela..., agora essas coisas são minhas para guardar.\n\nEnquanto observo meu amante e [spouse.GetWifeHusband], um único pensamento passa pela minha mente…"
 ep2_wedding.2020.c.failure: "[spouse.GetHerHim|U] o amo além das palavras."
 ep2_wedding.2020.c.death: "Nunca precisarei de mais ninguém além de [spouse.GetSheHe]."
 ep2_wedding.wedding_intent.success.tt: "Vou corrigir meu comportamento e ser fiel!"
 ep2_wedding.2000.t: "Você faz um esforço real para mudar."
 ep2_wedding.2000.desc.intro: "Suas promessas são vazias."
 ep2_wedding.2000.desc.lustful: "[ROOT.Char.GetFirstNameNoTooltip] me abandona por amor ao seu [spouse.GetWifeHusband]"
 ep2_wedding.2000.desc.nerd: "Fico pensando se [spouse.GetSheHe] gosta... daquela coisa."
 ep2_wedding.2000.desc.valiant: "A [spouse.GetFirstNameNoTooltip] se enoja com minha depravação"
 ep2_wedding.2000.desc.social: "$ep2_wedding.1330.d.yuck$"
 ep2_wedding.2000.desc.fishy: "A [spouse.GetFirstNameNoTooltip] fica intrigado(a) com meus gostos aventureiros"
 ep2_wedding.2000.a: "$ep2_wedding.1330.d.yum$"
 ep2_wedding.2000.a.tt: "[spouse.GetFirstNameNoTooltip] revela seus próprios gostos aventureiros"
 ep2_wedding.2000.b: "$ep2_wedding.1330.d.yeahmetoo$"
 ep2_wedding.2000.b.success.tt: "[spouse.GetFirstNameNoTooltip] te dirá se compartilha suas predileções"
 ep2_wedding.2000.b.success: "Como pude fazer isso com [soulmate.GetFirstNameNoTooltip]?"
 ep2_wedding.2000.b.failure: "Será que sou realmente o único amor?"
 ep2_wedding.2001.t: "As palavras tranquilizadoras de [spouse.GetShortUIName] tranquilizam minha mente"
 ep2_wedding.2001.desc: "[spouse.GetFirstNameNoTooltip] te tranquiliza".

[diplo_target.Custom('ES_ElLa')|U] [diplo_target.GetTitledFirstNameNoTooltip] levanta as sobrancelhas, com um toque de curiosidade nos olhos. "A dúvida continua a assombrar você"
 ep2_wedding.2001.a: "[spouse.GetFirstNameNoTooltip] confessa seus outros amores"
 ep2_wedding.2001.b: "A verdade é revelada"
 ep2_wedding.2001.b.flavor: "[spouse.GetFirstNameNoTooltip] revelará se tem outros amantes"
 ep2_wedding.2001.b.dull: "Finalmente, não precisamos mais esconder nosso amor!"
 ep2_wedding.2001.c: "Condolências pelo seu casamento"
 ep2_wedding.2001.d: "Tenho pena de vocês, [cynic.Custom2('RelationToMe', SCOPE.sC('nervous_spouse'))]…, [cynic.Custom('ES_ElLa')] [cynic.GetTitledFirstName|l] me conta como é a vida de casado:"
 ep2_wedding.2001.e: "\"Eu saberia,\" resmunga [cynic.GetSheHe]."
 ep2_wedding.2000.after.alliance: "\"Assim como eu e [disliked_spouse.GetFirstName],\" resmunga [cynic.GetSheHe]."
 ep2_wedding.2000.after.alliance.tt: "maridos traindo esposas, esposas traindo maridos, uma parada de mentiras e humilhações."
 ep2_wedding.2000.after.subjugate: "repleto de brigas, desconfiança e conflitos, o fim de qualquer paz. $ep2_wedding.1340.like_me_and$"
 ep2_wedding.2000.after.subjugate.tt: "uma cama fria e um[intended.Custom('ES_XA')] [intended.GetWifeHusband] desconfiad[intended.Custom('ES_OA')], um grilhão em vossas alegrias. $ep2_wedding.1340.like_me_and$"
 ep2_wedding.2000.after.friends: "uma marcha lenta e dolorosa rumo ao momento em que vocês descobrem qual dos dois vai desprezar o outro. "Como [divorced_spouse.GetFirstName] e eu", resmunga."
 ep2_wedding.2000.after.insult: "$ep2_wedding.1340.cheating$ $ep2_wedding.1340.i_would_know$"
 ep2_wedding.2000.after.insult.short: "$ep2_wedding.1340.cheating$ Como [adulterous_spouse.GetFirstName] e eu, resmunga."
 ep2_wedding.1330.t: "\n\nÉ assim que será meu casamento com [intended.Custom('ES_ElLa')] [intended.GetTitledFirstName|l]?"
 ep2_wedding.1330.desc: "[intended.GetFirstNameNoTooltip|U] é perfeito[intended.Custom('ES_OA')] para mim."
 ep2_wedding.1330.a: "Será que combinamos um com o outro?"
 ep2_wedding.1330.b: "Você está segur[ROOT.Char.Custom('ES_OA')] de que [intended.GetFirstNameNoTooltip] lhe cairá bem"
 ep2_wedding.1330.c: "Você teme que [intended.GetFirstNameNoTooltip] não seja adequado para você"
 ep2_wedding.1330.c.rakish.success: "Não se preocupe comigo, terei meus hobbies!"
 ep2_wedding.1330.c.rakish.failure: "Será que eles realmente podem me fazer feliz?"
 ep2_wedding.1330.c.breakup: "Você tem confiança de que seu estilo de vida permanecerá o mesmo"
 ep2_wedding.1330.d: "Você teme que o casamento mudará seu estilo de vida"
 ep2_wedding.1330.d.yuck: "Não se preocupe comigo, terei meus... #EMP hobbies#!"
 ep2_wedding.1330.d.yuck.tt: "Como poderei esconder meus segredos?"
 ep2_wedding.1330.d.yum: "Você tem confiança de que seus segredos estão seguros"
 ep2_wedding.1330.d.yum.tt: "Você teme que [intended.GetFirstNameNoTooltip] irá descobrir seus segredos"
 ep2_wedding.1330.d.yeahmetoo: "#EMP Por favor#!, eu sei tudo sobre casamento!"
 ep2_wedding.1330.d.yeahmetoo.tt: "Afinal, eu... uh..."
 ep2_wedding.1330.d.confession.tt: "Afinal, já fui casad[ROOT.Char.Custom('ES_OA')] antes…"
 ep2_wedding.1330.e: "Afinal, eu fui casad[ROOT.Char.Custom('ES_OA')]… quantas vezes?"
 ep2_wedding.1330.f: "Você tem confiança de que este casamento será território familiar"
 ep2_wedding.1330.f.mindatease: "Você teme que este casamento apresentará desafios que você nunca esperou"
 ep2_wedding.1330.f.mindatease.tt: "Saia da minha frente, seu infeliz amargado[cynic.Custom('ES_OA')]."
 ep2_wedding.1330.f.lingeringdoubts: "Será mesmo tão ruim?"
 ep2_wedding.1330.f.lingeringdoubts.tt: "As preocupações pré-casamento duram apenas até o final do casamento"
 ep2_wedding.1330.f.confession: "Um[ROOT.Char.Custom('ES_XAOpp')] [ROOT.Char.Custom('GetBrideGroom')] confiante[ROOT.Char.Custom('ES_OAOpp')]"
 ep2_wedding.1330.f.confession.desc: "Nervosismo Pré-Casamento"
 ep2_wedding.1330.f.confession.tt: "Perdido(a) de Palavras"
 ep2_wedding.1330.g: "Minha cabeça pulsa com o barulho dos móveis arrastados e a conversa dos convidados. A tensão deve estar evidente, porque meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('caring_relative'))] [caring_relative.Custom('ES_ElLa')] [caring_relative.GetTitledFirstName|l], me pega pelo braço e me conduz ao cômodo ao lado.\n\nO som dos preparativos se extingue. Falamos de coisas pequenas: tempos passados, pessoas que conhecemos, nem uma palavra sobre o casamento. Então ficamos sem palavras e nos calamos."
 ep2_wedding.1340.t: "Desfrutem de um momento de tranquilidade, você e [caring_relative.Custom('ES_ElElla')]."
 ep2_wedding.1340.desc.intro: "Diga a [caring_relative.GetShortUINameNoTooltip] o quanto significa tê-lo(a)[caring_relative.Custom('ES_LoLa')] aqui."
