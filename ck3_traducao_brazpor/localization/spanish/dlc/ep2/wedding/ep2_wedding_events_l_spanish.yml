 ep2_wedding.1110.a: "[1111_other.GetFirstNameNoTooltip|U] juntou-se a você"
 wedding_goblet_refusal_log_title: "[1111_other.GetFirstNameNoTooltip|U] te expulsou"
 wedding_goblet_refusal_log: "[1111_other.GetFirstNameNoTooltip|U] te expulsou"
 ep2_wedding.1110.b: "[1111_other.GetFirstNameNoTooltip|U] desaprova silenciosamente"
 ep2_wedding.1110.b.tt: "[1111_other.GetFirstNameNoTooltip|U] te desaprova"
 wedding_goblet_eject_log_title: "Expulso(a)"
 wedding_goblet_eject_log: "Por que Eu?"
 ep2_wedding.1110.c: "Acordo em uma cama fria na noite do meu casamento. [spouse_2.Custom('ES_ElLa')|U] [spouse_2.GetTitledFirstName|l] está de pé junto à janela, com os braços arrepiados no ar noturno.\n\n"
 wedding_goblet_fool_log_title: "\"Eu sou horrível. Todos dizem isso, mesmo que digam baixo."
 wedding_goblet_fool_log: "\"As coisas que eu fiz... ninguém vai me deixar esquecê-las."
 ep2_wedding.1111.desc: ""Eu…", faz uma pausa para escolher as palavras. "Mal consigo falar sem que todos riam de mim às escondidas."
 ep2_wedding.1111.desc_host: ""Sou um[spouse_2.Custom('ES_XA')] ninguém de origem humilde. Não pertenço à corte. Sinto que todos estão rindo de mim."
 ep2_wedding.1111.desc_conclusion: "Por que um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] quereria se casar com alguém como eu?"
 ep2_wedding.1111.a: "[spouse_2.GetShortUIName|U] reagirá de acordo com sua personalidade, e pode se sentir tranquilizado[spouse_2.Custom('ES_OA')] ou ofendido[spouse_2.Custom('ES_OA')]"
 wedding_goblet_reprimand_log_title: "São acalmadas as inseguranças de [spouse_2.GetShortUIName]"
 wedding_goblet_reprimand_log: "[spouse_2.GetShortUINameNoTooltip|U] aceita a praticidade do casamento"
 ep2_wedding.1111.b: "[spouse_2.GetShortUINameNoTooltip|U] se sente incompreendid[spouse_2.Custom('ES_OA')]"
 ep2_wedding.1111.b.1: "Eu escolhi você por seu caráter virtuoso."
 ep2_wedding.1111.b.1.tt: "Essa opção está disponível porque [spouse_2.GetShortUIName] é uma pessoa virtuosa"
 ep2_wedding.1111.b.2: "Eu preciso de alguém como você ao meu lado para governar."
 ep2_wedding.1111.b.2.tt: "Essa opção está disponível porque [spouse_2.GetShortUIName] tem a mente de um(a) governante"
 ep2_wedding.1111.b.3: "Esse casamento é prático para ambos."
 ep2_wedding.1111.b.3.tt: "Pare de reclamar, vou fazer de você um [spouse_2.GetTitleAsNameNoTooltip|l]."
 #Why Would You Marry Someone Like Me?
 ep2_wedding.1300.t: "Me casei com [spouse_2.Custom('ES_ElLa')] [spouse_2.GetWomanMan] mais bonit[spouse_2.Custom('ES_OA')] do mundo."
 ep2_wedding.1300.desc_intro: "Essa opção está disponível porque [spouse_2.GetShortUIName] é famoso(a) por sua beleza"
 ep2_wedding.1300.desc_appearance: "Eu escolhi você para me dar muitos herdeiros fortes."
 ep2_wedding.1300.desc_dark_past: "Esta opção está disponível porque [spouse_2.GetShortUIName] tem as qualidades adequadas para ser um[spouse_2.Custom('ES_XA')] [spouse_2.GetMotherFather] prolífico[spouse_2.Custom('ES_OA')]"
 ep2_wedding.1300.desc_voice: "$ep2_wedding.1300.t$"
 ep2_wedding.1300.desc_lowborn: "Pensamentos inquietos me chamam da minha cama de casamento."
 ep2_wedding.1300.desc_outro: "Sou horrível. Por que um[spouse_1.Custom('ES_XA')] [spouse_1.GetTitleAsNameNoTooltip|l] querria se casar com alguém como eu?"
 ep2_wedding.1300.followup.tt: "Por que um[spouse_1.Custom('ES_XA')] [spouse_1.GetTitleAsNameNoTooltip|l] quereria se casar com alguém como eu, depois de tudo o que fiz?"
 ep2_wedding.1300.followup.a: "Por que um[spouse_1.Custom('ES_XA')] [spouse_1.GetTitleAsNameNoTooltip|l] quereria se casar com alguém como eu, quando mal consigo falar sem que todos riam de mim?"
 ep2_wedding.1300.followup.b: "Por que um[spouse_1.Custom('ES_XA')] [spouse_1.GetTitleAsNameNoTooltip|l] quereria se casar com alguém de baixa linhagem como eu?"
 ep2_wedding.1300.followup.c: "\n\nMinha inquietação desperta [spouse_1.Custom('ES_AlAla')] [spouse_1.GetTitledFirstName|l] e quando percebo, já estou perguntando por que se casou justamente comigo."
 ep2_wedding.1300.virtue: "[spouse_1.GetSheHe|U] diz que me escolheu por meu caráter virtuoso."
 ep2_wedding.1300.virtue.tt: "[spouse_1.GetSheHe|U] diz que me escolheu para poder ajudar[spouse_1.GetHerHim] a governar."
 ep2_wedding.1300.rule_together: "[spouse_1.GetSheHe|U] diz que me escolheu por simples praticidade."
 ep2_wedding.1300.rule_together.tt: "[spouse_1.GetSheHe|U] me diz para parar de reclamar e ser grato(a) por esse casamento."
 ep2_wedding.1300.practical: "[spouse_1.GetSheHe|U] diz que [spouse_1.GetSheHe] também entende como é se sentir sem valor."
 ep2_wedding.1300.stop_whining: "[spouse_1.GetSheHe|U] diz que me escolheu por minha beleza."
 ep2_wedding.1300.understanding: "[spouse_1.GetSheHe|U] diz que me escolheu para que lhe desse herdeiros fortes."
 ep2_wedding.1300.beauty: "O que devo pensar disto?"
 ep2_wedding.1300.beauty.tt: "Quero ser digno[ROOT.Char.Custom('ES_OA')] de seu amor."
 ep2_wedding.1300.fertility: "Quero confiar em [spouse_1.GetSheHe]."
 ep2_wedding.1300.fertility.tt: "[spouse_1.GetSheHe|U] está certo(a), estou sendo bobo(a)[ROOT.Char.Custom('ES_OA')]."
 ep2_wedding.1301.t: "Eu sabia que [spouse_1.GetSheHe] não entenderia."
 ep2_wedding.1301.desc_intro: "[spouse_2.GetShortUIName] sorri enquanto você acalma as inseguranças dela."
 ep2_wedding.1301.desc_appearance: "[spouse_2.GetShortUIName] sente que [spouse_2.GetSheHe] pode confiar em você."
 ep2_wedding.1301.desc_dark_past: "[spouse_2.GetShortUIName] aceita que esse casamento faz sentido."
 ep2_wedding.1301.desc_voice: "[spouse_2.GetShortUIName] sente que não [spouse_2.Custom('ES_LoLa')] está ouvindo."
 ep2_wedding.1301.desc_lowborn: "Aproximação"
 ep2_wedding.1301.desc_midtro: "[CHARACTER.GetUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'ouviu', 'ouviu' )] as inseguranças de [TARGET_CHARACTER.LocalPlayerString( 'você', TARGET_CHARACTER.GetShortUIName )] e [Select_CString( CHARACTER.IsLocalPlayer, 'fez', 'fez' )] com que se sentisse querid[TARGET_CHARACTER.Custom('ES_OA')]"
 ep2_wedding.1301.desc_virtue: "$wedding_whyme_love_log_title$"
 ep2_wedding.1301.desc_rule_together: "[CHARACTER.GetUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'ouviu', 'ouviu' )] as inseguranças de [TARGET_CHARACTER.GetUIName] e [Select_CString( CHARACTER.IsLocalPlayer, 'fez', 'fez' )] com que se sentisse respeitad[TARGET_CHARACTER.Custom('ES_OA')]"
 ep2_wedding.1301.desc_practical: "Casamento Prático"
 ep2_wedding.1301.desc_stop_whining: "[CHARACTER.GetUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'ouviu', 'ouviu' )] as inseguranças de [TARGET_CHARACTER.GetUIName] e [Select_CString( CHARACTER.IsLocalPlayer, 'fez', 'fez' )] com que se sentisse idiota"
 ep2_wedding.1301.desc_understanding: "Mal-entendido"
 ep2_wedding.1301.desc_beauty: "[CHARACTER.GetUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'ouviu', 'ouviu' )] as inseguranças de [TARGET_CHARACTER.GetUIName] e [Select_CString( CHARACTER.IsLocalPlayer, 'fez', 'fez' )] com que se sentisse insignificante"
 ep2_wedding.1301.desc_fertility: "[spouse_1.GetSheHe|U] diz que me escolheu para que lhe desse herdeiros fortes."
 ep2_wedding.1301.desc_outro: "Começos Tímidos"
 ep2_wedding.1301.love: "#EMP Suspiro#!. Aqui estamos. E agora o que eu deveria fazer? Ele gosta de... abraços? Talvez só beijos. Viro o rosto quando ele olha diretamente para mim. Pelo menos também consigo ver que ele está inquieto, mexendo as mãos.\n\n"Eh…", tento dizer, pigarreando; os lençóis ainda não têm uma única ruga, "vocês estão muito bonitos[my_spouse.Custom('ES_OA')] esta noite".\n\n"M-Muito obrigado… também gosto muito do seu cabelo".\n\nMaldição, está claro que isso não está funcionando."
 ep2_wedding.1301.trust: "\"Você quer dar um passeio?\""
 ep2_wedding.1301.silly: "[my_spouse.GetFirstNameNoTooltip] acha o passeio encantador"
 ep2_wedding.1301.misunderstood: "[my_spouse.GetFirstNameNoTooltip] acha o passeio entediante"
 ep2_wedding.1301.outcome.love: "\"Você gosta... de ler?\""
 ep2_wedding.1301.outcome.trust: "[my_spouse.GetFirstNameNoTooltip] e você têm uma conversa adorável"
 ep2_wedding.1301.outcome.silly: "[my_spouse.GetFirstNameNoTooltip] acha a conversa entediante"
