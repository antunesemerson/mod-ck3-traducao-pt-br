 ep2_wedding.1320.b: "Essa Maldita Mesa"
 ep2_wedding.1310.b.nowound: "Com um grande suspiro, deixo todas as festividades para trás e fecho a porta da câmara nupcial. Foi um dia longo, mas um casamento precisa ser #EMP consumar-se#!, não precisa?\n\nNão pude deixar de notar que [spouse_2.Custom('ES_ElLa')] [spouse_2.GetTitledFirstName|l] foi ficando cada vez mais inquieto à medida que a noite avançava, mas não dei muita importância. Quem não fica um pouco nervoso no próprio casamento? No entanto, quando me inclino para pegar sua roupa de baixo, fico surpresa ao descobrir que ele está muito menos #EMP excitad[spouse_2.Custom('ES_OA')]#! do que eu esperava.\n\nEle quase pula da própria pele e exclama: "É este quarto! A cama! Ou aquela mesa de cabeceira! Talvez a tapeçaria? Minha virilidade foi amaldiçoada!!""
 ep2_wedding.1310.b.wound: "#EMP Tudo bem#!."
 wedding_dished_rival_log_title: "Certifique-se de que [spouse_2.GetFirstNameNoTooltip] não tenha mais desculpas"
 wedding_dished_rival_log: "Eu entendo. Não se preocupe."
 ep2_wedding.1320.c: "Os criados vêm e vão do meu quarto nupcial há uma hora, retirando freneticamente todos os móveis e a decoração. Agora, resta apenas uma mesa nua, solitária no centro da sala.\n\nQuando me sento nela, tão nua[GetPlayer.Custom('ES_OA')] quanto a mesa, esperando meu recém-casado[spouse_2.Custom('ES_OA')] [spouse_2.GetWifeHusband], [spouse_2.Custom('ES_ElLa')] [spouse_2.GetTitledFirstName|l], não consigo deixar de pensar, com um sorriso vingativo, que agora ele não terá mais desculpas."
 ep2_wedding.1310.c.hook: "\n\nQuando ele entra no quarto, a expressão de surpresa em seu rosto rapidamente se transforma em excitação."
 ep2_wedding.1310.c.apology: "\n\n[spouse_2.GetFirstNameNoTooltip] entra na alcova tarde, com o olhar baixo e inquieto. Pela forma como evita deliberadamente meu olhar inquisitivo, obtenho todas as respostas de que preciso."
 ep2_wedding.1310.c.refusal: "Isso é mais como!"
 wedding_hooked_rival_log_title: "#EMP SAIA! Você é mais vil do que uma minhoca!#!"
 wedding_hooked_rival_log: "Deixa pra lá. Não há pressa."
 wedding_apology_rival_log_title: "Você denunciou [secondary_recipient.GetShortUIName] como impotente"
 wedding_apology_rival_log: "Depois de finalmente deixar para fora a multidão que nos aclamava, [spouse_2.Custom('ES_ElLa')] [spouse_2.GetTitledFirstName|l] e eu estamos finalmente a sós em nossa câmara nupcial. Foi um dia longo, mas o casamento precisa ser #EMP consumar-se#!, certo? \n\nInfelizmente, [spouse_2.GetFirstNameNoTooltip] não demora muito a descobrir que #EMP algumas partes#! de mim não estão tão dispostas quanto outras, e nenhuma quantidade de apelos, subornos ou ameaças parece fazer muita diferença.\n\n“Estou tentando!”, exclamo. Isso é #EMP muy embarazoso#!!"
 wedding_refusal_rival_log_title: "#EMP Devo ter sido amaldiçoado(a)!!#!"
 wedding_refusal_rival_log: "Os lábios de [spouse_2.GetShortUIName] se curvam com sarcasmo, mas não diz nada ao sair da alcova"
 ep2_wedding.1320.d: "Estou apenas nervoso(a)..."
 #WEDDING NIGHT
 #That Cursed Table
 ep2_wedding.1060.t: "[spouse_2.Custom('ES_ElLa')|U] [spouse_2.GetTitledFirstName|l] voltou à câmara nupcial alguns minutos depois, seguid[spouse_2.Custom('ES_OA')] os por vários servos confusos que prontamente começaram a retirar todos os móveis e enfeites do quarto. Todas as minhas perguntas eram recebidas com um silêncio obstinado. Quando finalmente partiram, restava apenas uma mesa nua, com um[spouse_2.Custom('ES_XA')] [spouse_2.GetFirstNameNoTooltip] #EMP igual de desnud[spouse_2.Custom('ES_OA')]#! em cima.\n\n"Não vejo mais objetos #EMP malditos#!, o que dizeis?", sorri [spouse_2.GetSheHe] de forma sugestiva."
 ep2_wedding.1060.desc: "\n\nTodos os pensamentos deixam minha mente."
 ep2_wedding.1060.a: "\n\n"#EMP Oh#!" Começo a gaguejar para ganhar tempo. "Vejam… Não é isso. O que quero dizer é…" Mas sua expressão gélida me paralisa de imediato."
 ep2_wedding.1060.a.tt: "Tudo está bem quando termina bem!"
 ep2_wedding.1060.b: "Eu não estou fazendo isso #EMP de propósito#!, eu juro!"
 ep2_wedding.1061.desc: "[spouse_2.GetFirstNameNoTooltip] está ofendid[spouse_2.Custom('ES_OA')]."
 ep2_wedding.1061.desc_1: "[spouse_2.GetFirstNameNoTooltip] é paciente e compreensivo(a)."
 ep2_wedding.1061.desc_2: "\n\n[spouse_2.GetFirstNameNoTooltip] entra na alcova tarde, com o olhar baixo e inquieto. Pela forma como evita deliberadamente meu olhar inquisitivo, obtenho todas as respostas de que preciso."
 ep2_wedding.1061.a: "Mais uma taça"
 ep2_wedding.1061.b: "Após os cônjuges partirem para suas câmaras privadas, as celebrações arrastam-se pela noite, perdendo aos poucos a intensidade e a agitação. Um após o outro, a maioria dos convidados ou vai embora, adormece ou se retira para desfrutar dos prazeres da noite."
 ep2_wedding.1061.c: "\n\nA #EMP mayoría#! da maioria dos convidados, mas não [1110_drunk.GetTitledFirstName|l]. Tem pedido em voz alta uma taça atrás da outra, rindo às gargalhadas e recusando com teimosia qualquer tentativa dos criados de levá-l[1110_drunk.GetHerHim] para um canto mais tranquilo."
 THEY_ARE_ACCUSED_IMPOTENCY: "\n\nPreciso mesmo fazer algo a respeito de [1110_drunk.GetSheHe]…"
 ep2_wedding.1065.desc: "Algumas pessoas realmente não têm vergonha."
 ep2_wedding.1065.a: "Bem-vindo(a) que ficou tempo demais"
 ep2_wedding.1065.a.tt: "[CHARACTER.GetUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'quedaste', 'quedó' )] passou vergonha por se embebedar[Select_CString( CHARACTER.IsLocalPlayer, 'te', 'se' )] e se recusar a ir embora[Select_CString( CHARACTER.IsLocalPlayer, 'te', 'se' )]"
 ep2_wedding.1065.b: "Isso é o bastante!"
 ep2_wedding.1065.b1: "Seus guardas [1110_drunk.GetHerHim] acompanharão até a porta"
 ep2_wedding.1065.b2: "Expulso(a)"
 ep2_wedding.1066.desc: "[CHARACTER.GetUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'expulsou', 'expulsou' )] a [TARGET_CHARACTER.LocalPlayerString( 'você', TARGET_CHARACTER.GetUIName )] da recepção de casamento por estar bêbado e causando tumulto"
 ep2_wedding.1066.desc_1: "Se você não pode vencê-los, junte-se a eles!"
 ep2_wedding.1066.desc_2: "Vergonha Total"
 ep2_wedding.1066.a: "[CHARACTER.GetUIName|U] e [TARGET_CHARACTER.GetUIName] [CHARACTER.LocalPlayerString( 'quedasteis', 'quedaron' )] fizeram papel de tolos por estarem bêbados e desordeiros"
 ep2_wedding.1066.b: "A maioria dos convidados, mas não eu!#EMP mayoría#! dos convidados, mas não eu!\n\n\"Tragam-me outra taça! E mais uma!\", berro para qualquer criado que eu veja."
 ep2_wedding.1066.b_1: "Afinal, eu paguei por tudo, não mereço?"
 ep2_wedding.1066.b_2: "\n\nMas da mesa dela, porém, sinto o olhar julgador de [1111_other.Custom('ES_DelDela')] [1111_other.GetTitledFirstName|l]. \"Já não bebeu o bastante por hoje?\", pergunta friamente."
 #One More Goblet
