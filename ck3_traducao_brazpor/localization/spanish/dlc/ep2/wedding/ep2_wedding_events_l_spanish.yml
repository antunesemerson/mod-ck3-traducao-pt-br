 wedding_opinion_medium: "Diferenças Artísticas"
 came_to_my_wedding_opinion_host_medium: "Como se organizar um casamento digno do porte da minha família já não fosse estressante o bastante, também tenho de lidar com os parentes de [spouse_2.GetFirstName].\n\nSeu [spouse_2.Custom2('RelationToMe', SCOPE.sC('1000_relative'))], [1000_relative.Custom('ES_ElLa')] [1000_relative.GetTitledFirstName|l], chegou hoje bem cedo e, desde então, está me seguindo por toda parte, reclamando sem parar disso e daquilo. Enquanto sinto uma dor de cabeça lancinante crescendo atrás dos meus olhos, [1000_relative.GetSheHe] continua tagarelando sem se abalar."
 came_to_my_wedding_opinion_spouse_1_medium: "\n\n"Vocês estão #EMP segur[GetPlayer.Custom('ES_OA')]#! de que terão servos suficientes? Não estarão esperando que #EMP eu#! carregue os pratos de [ROOT.Char.Custom('GetExpensiveMeal')|l], certo?! As lendas dizem que, no casamento do meu bisavô, os criados eram tão numerosos que seus chapéus tapavammmm o sol!""
 came_to_my_wedding_opinion_spouse_2_medium: "\n\n"Que tipo de cor são essas flores?! Elas vão contrastar #EMP horrivelmente#! com a tez de [spouse_2.GetFirstNameNoTooltip]! E por que vocês escolheriam um arranjo tão #EMP insípido#! para as mesas? E nem me façam falar dessas tecidos #EMP berrantes#!!"."
 wedding_opinion_low: "\n\n"#EMP Sabía#! que vocês eram um péssimo par para meu pobre [spouse_2.GetFirstNameNoTooltip]! Olhem este lugar, umas flores miseráveis, mesas nuas e nem um fiozinho de ouro em lugar nenhum! Meu pobre coração se #EMP parte#! de dor pela vida miserável que espera essa pobre criança![Select_CString( spouse_2.IsFemale, 'desdichada niña', 'desdichado niño' )]!"."
 came_to_my_wedding_opinion_host_low: "\n\n"São mímicos? Para onde estão indo esses servos com essas luzes acesas? E por que essa caixa de madeira está #EMP rosnando#!?! Isso vai ser um desastre!""
 came_to_my_wedding_opinion_spouse_1_low: "\n\n"Essas flores vão fazer [spouse_2.GetFirstNameNoTooltip] espirrar! E essa lã é áspera demais! E o esquema de cores? Sei que [spouse_2.GetFirstNameNoTooltip] não vai gostar!"."
 came_to_my_wedding_opinion_spouse_2_low: "Tenho certeza de que podemos encontrar um meio-termo..."
