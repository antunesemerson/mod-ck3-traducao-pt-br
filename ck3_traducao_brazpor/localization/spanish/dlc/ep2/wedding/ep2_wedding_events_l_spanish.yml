 ep2_wedding.1070.h.tt.kill: "Sei que deveria passar um tempo com meu nov[other_spouse.Custom('ES_OA')] [other_spouse.GetWifeHusband] [other_spouse.GetFirstName] e sua família, mas não consigo me separar da minha amig[friend.Custom('ES_OA')], [friend.Custom('ES_ElLa')] [friend.GetTitledFirstName|l]! Já vejo que [other_guest.Custom('ES_ElLa')] [other_guest.GetTitledFirstName|l] começa a me olhar com fúria, $ep2_wedding.1310.howlingwithlaughter$"
 wedding_beasts_murder_kill_log_title: "Como anfitri[ROOT.Char.Custom('ES_OnOna')] da boda, sei que deveria passar um tempo com os noivos e suas famílias, mas não consigo me afastar da minha amig[friend.Custom('ES_OA')], [friend.Custom('ES_ElLa')] [friend.GetTitledFirstName|l]! Já vejo que [other_guest.Custom('ES_ElLa')] [other_guest.GetTitledFirstName|l] começa a me encarar com fúria, $ep2_wedding.1310.howlingwithlaughter$"
 wedding_beasts_murder_kill_log: "Sei que eu deveria estar conversando com os outros convidados, mas não consigo me separar de meu amig[friend.Custom('ES_OA')], [friend.Custom('ES_ElLa')|l] [friend.GetTitledFirstName|l]! Já вижo que [other_guest.Custom('ES_ElLa')] [other_guest.GetTitledFirstName|l] está tentando chamar minha atenção, $ep2_wedding.1310.howlingwithlaughter$"
