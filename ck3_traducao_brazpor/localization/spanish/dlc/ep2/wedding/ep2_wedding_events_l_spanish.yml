l_spanish:
 #MAINTENANCE
 ep2_wedding.0001.t: "[GetActivityType('activity_wedding').GetNameNoTooltip]: Noivado expirado"
 ep2_wedding.0001.desc: "O tempo tem escapado de mim. Achei que ainda tinha tempo para organizar uma [GetActivityType('activity_wedding').GetName|l] como se deve, mas uma carta furiosa [spouse_2.Custom('ES_DelDela')] [spouse_2.GetTitledFirstName|l] me lembra que sua paciência se esgotou e que meu tempo acabou."
 ep2_wedding.0001.desc_betrothed: "\n\nNão tendo conseguido organizar o casamento entre [spouse_1.Custom('ES_ElLa')] [spouse_1.GetTitledFirstName|l] e [spouse_2.GetFirstNameNoTooltip] no prazo acordado, o noivado é agora considerado inválido."
 ep2_wedding.0001.desc_self: "\n\nNão tendo conseguido organizar o casamento entre [spouse_2.GetFirstName] e eu no prazo acordado, o noivado é agora considerado nulo."
 ep2_wedding.0001.desc_conclusion: "\n\n[spouse_2.GetFirstNameNoTooltip] está claramente decepcionad[spouse_2.Custom('ES_OA')] e me lembra que haverá consequências…"
 ep2_wedding.0001.a: "Não estava destinado a acontecer."
 ep2_wedding.0002.t: "[GetActivityType('activity_wedding').GetNameNoTooltip]: Morte Prematura"
 ep2_wedding.0002.desc: "Esta manhã recebi uma notícia trágica: [dead_spouse.Custom('ES_ElLa')] [dead_spouse.GetTitledFirstName|l], que havia prometido se casar com [alive_spouse.Custom('ES_ElLa')] [alive_spouse.GetTitledFirstName|l] em um(a) [GetActivityType('activity_wedding').GetName|l], faleceu, e agora tudo o que eu havia planejado com tanto esmero foi por água abaixo!\n\nÉ hora de procurar um novo par."
 ep2_wedding.0002.a: "Uma tragédia da vida."
 ep2_wedding.0003.desc: "Nada poderia ter me preparado para a carta que agora tenho em minhas mãos trêmulas: minha prometid[dead_spouse.Custom('ES_OA')], [dead_spouse.Custom('ES_ElLa')] [dead_spouse.GetTitledFirstName|l], com quem eu ia me casar em uma [GetActivityType('activity_wedding').GetName|l], faleceu de repente.\n\nNão haverá celebrações para mim, e todos os cuidadosos planos da minha família foram por água abaixo."
 ep2_wedding.0003.a: "Uma verdadeira tragédia..."
 ep2_wedding.0100.t: "Início da Cerimônia de Casamento"
 ep2_wedding.0100.desc_host: "É uma sensação incrível quando você passa tanto tempo planejando algo, gastou #EMP tanto dinheiro#! com isso e por fim #EMP você tem#!!\n\nTudo está pronto: a decoração está no lugar, os convidados se misturam e os criados vão e vêm com os pratos carregados."
 ep2_wedding.0100.desc_host_outro: "Ambos cônjuges, [spouse_1.Custom('ES_ElLa')] [spouse_1.GetTitledFirstName|l] e [spouse_2.Custom('ES_ElLa')] [spouse_2.GetTitledFirstName|l], estão aqui, radiantes e trajados com suas melhores roupas.\n\nAo meu sinal, todos tomarão seus lugares e a cerimônia começará."
 ep2_wedding.0100.desc_host_spouse: "$ep2_wedding.0100.desc_host$ Estou andando de um lado para o outro, tomado pela empolgação e pelo nervosismo, quando aparece meu futur[my_spouse.Custom('ES_OA')] espos[my_spouse.Custom('ES_OA')], [my_spouse.Custom('ES_ElLa')] [my_spouse.GetTitledFirstName|l], radiante e trajad[my_spouse.Custom('ES_OA')] com suas melhores vestes.\n\nTudo pronto para começar."
 ep2_wedding.0100.desc_spouse: "Por fim chegou o tão aguardado dia, o dia do meu casamento com [my_spouse.Custom('ES_ElLa')] [my_spouse.GetTitledFirstName|l]!\n\nEstou ao mesmo tempo empolgad[ROOT.Char.Custom('ES_OA')] e apavorad[ROOT.Char.Custom('ES_OA')] com a cerimônia em si e com o futuro que ela me trará, mas não consigo deixar de ficar impressionad[ROOT.Char.Custom('ES_OA')] com o grandioso evento organizado pelo nosso gentil anfitrião, [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l].\n\nQuando vejo [host.Custom('ES_LoLa')], fazendo gestos frenéticos para mim, eu sei. É hora de começar."
 ep2_wedding.0100.desc_guest: "Olho ao redor, transbordando[ROOT.Char.Custom('ES_OA')] de emoção.\n\nPor toda parte há convidados se misturando, flores por todos os lados, servos agitados com pratos abarrotados e um anfitrião muito orgulhoso, [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l], verificando os últimos detalhes. Os cônjuges nervosos, mas animados, [spouse_1.Custom('ES_ElLa')] [spouse_1.GetTitledFirstName|l] e [spouse_2.Custom('ES_ElLa')] [spouse_2.GetTitledFirstName|l], estão de pé, prontos.\n\nA cerimônia está prestes a começar!"
 ep2_wedding.0100.desc_root_pregnant: "No entanto, enquanto me aproximo de meu(a) cônjuge, não consigo deixar de perceber os olhares julgadores de todos os convidados apontando diretamente para minha barriga claramente grávida. Bem..."
 ep2_wedding.0100.desc_spouse_pregnant: "No entanto, imediatamente fica claro que a atenção de todos — incluindo a minha — está fixada na barriga inequivocamente grávida da noiva... Isso será constrangedor."
 ep2_wedding.0100.a: "Mal posso esperar!"
 ep2_wedding.0101.desc: "Todo o meu planejamento está prestes a se concretizar.\n\nMas, por enquanto, que a cerimônia comece!"
 ep2_wedding.0150.t: "A Cerimônia de Casamento"
 ep2_wedding.0150.desc: "A cerimônia finalmente chegou ao seu clímax.\n\nOs ritos tradicionais foram concluídos, e tudo o que resta são os votos finais, o consentimento formal, o selo do casamento! Quando tanto [spouse_1.Custom('ES_ElLa')] [spouse_1.GetTitledFirstName|l] quanto [spouse_2.Custom('ES_ElLa')] [spouse_2.GetTitledFirstName|l] dizem \"sim, aceito\", a multidão começa a aplaudir, e todos nós testemunhamos o início de sua vida [Select_CString(And(spouse_1.IsFemale, spouse_2.IsFemale), 'juntas', 'juntos')]."
 ep2_wedding.0150.a: "Empolgante!"
 ep2_wedding.0151.desc_diplo: "Por trás de todos os rituais e cerimônias, os casamentos são, antes de tudo, eventos políticos. Conforme a cerimônia atinge seu clímax, minha mente já está focada no que está por vir. A aliança irá se manter? Meu(a) novo(a) cônjuge será uma ajuda válida na administração das minhas terras?\n\nE ainda há outra pergunta que devo responder antes disso, pois é hora de dar meu consentimento explícito ao casamento.$ep2_wedding.0151.desc_end$"
 ep2_wedding.0151.desc_religious: "Todos os passos de uma cerimônia são importantes. Afinal, a validade de qualquer ritual se baseia na reprodução correta de todas as suas partes.\n\nTenho prestado atenção em cada gesto, cada palavra, cada passo — não é todos os dias que se pode encenar seu #EMP casamento#!! Agora, o momento mais vital chegou, e devo dar meu consentimento à união.$ep2_wedding.0151.desc_end$"
 ep2_wedding.0151.desc_party: "Quando a cerimônia finalmente chega ao seu auge, e tanto a mim quanto ao meu cônjuge nos pedem que demos nosso consentimento formal, eu mal presto atenção, pois estou entusiasmad[ROOT.Char.Custom('ES_OA')] com a iminente celebração: montes de iguarias deliciosas, bebidas à vontade e muitos rostos felizes com os quais compartilhar tudo isso… Não consigo imaginar nada melhor! Mas, por ora, vamos acabar com as formalidades.$ep2_wedding.0151.desc_end$"
 ep2_wedding.0151.desc_seducer: "Todas as cerimônias de casamento são iguais: um exercício em acumular palavras vazias e promessas sem sentido. Como se a felicidade e a satisfação pudessem ser encontradas em uma única pessoa!\n\nConforme a cerimônia atinge seu auge e sou solicitado(a) a dar meu consentimento formal à união e meus votos, zombo, pois a pergunta soa igualmente irônica e sem propósito.$ep2_wedding.0151.desc_end$"
 ep2_wedding.0151.desc_shy: "Tudo é tão avassalador: as decorações, os convidados conversando, os rituais e bênçãos ocorrendo um após o outro, e os olhos penetrantes do(a) meu(minha) [spouse_2.Custom('GetBrideGroom')] me encarando, julgando cada movimento meu.\n\nTudo se mistura em um turbilhão de caos que causa nervosismo, até que chega o momento de compartilhar nossas promessas oficiais — rápido demais.$ep2_wedding.0151.desc_end$"
 ep2_wedding.0151.desc_arrogant: "O dia mal começou e já estou cansado(a) do incessante falatório das supostas autoridades religiosas, dos bem-intencionados, dos bajuladores e dos servos confusos. Não é surpresa que eu tenha estado fervendo de raiva durante a maior parte da cerimônia.\n\nQuando chega o momento de nosso consentimento formal ao casamento, minha paciência está se esgotando, e acabo respondendo com irritação.$ep2_wedding.0151.desc_end$"
 ep2_wedding.0151.desc_paranoid: "Mal me lembro de quase nada de toda a cerimônia, ocupad[ROOT.Char.Custom('ES_OA')] como estava avistando inimigos em cada sombra e imaginando em minha mente cenários assustadores para o futuro.\n\nAgora, é hora de formalizar nossa união dando nosso consentimento, e não consigo evitar me perguntar se estou trazendo para minha casa um[spouse_2.Custom('ES_XA')] amig[spouse_2.Custom('ES_OA')] ou um[spouse_2.Custom('ES_XA')] inimig[spouse_2.Custom('ES_OA')] mortal.$ep2_wedding.0151.desc_end$"
 ep2_wedding.0151.desc_appearance: "A maior parte da cerimônia já seguiu seu curso.\n\nEnquanto estou de pé, frente a frente com meu [spouse_2.Custom('GetBrideGroom')] para dar nosso consentimento formal ao casamento, tremo mais uma vez, tentando avaliar pela expressão se este corpo debilitado lhe causa repulsa e se se interporá no caminho de nossa felicidade. Então, é minha vez de falar.$ep2_wedding.0151.desc_end$"
 ep2_wedding.0151.desc: "A cerimônia passou como um borrão. Mal consigo lembrar de todos os passos, rituais e bênçãos pelos quais passei, e agora é hora dos nossos votos, do consentimento formal, do selo real no casamento.$ep2_wedding.0151.desc_end$"
 ep2_wedding.0151.desc_end: "\n\nEu quero passar o resto da minha vida com [spouse_2.GetFirstName]?"
 ep2_wedding.0151.desc.murder: "Chegou a hora de fazermos nossos votos. "Juro que não tomarei ninguém além de você como cônjuge[spouse_2.Custom('ES_OA')]", murmuro. "Até que a morte nos separe". A[spouse_2.Custom('ES_OA')] tranquilizo, apertando sua mão.

Por sorte, o restante de nossa vida juntos será #EMP muito#! breve.". A[spouse_2.Custom('ES_OA')] tranquilizo, apertando sua mão.

Por sorte, o restante de nossa vida juntos será #EMP muito#! breve."
 ep2_wedding.0151.a: "Haverá consequências..."
 ep2_wedding.0151.b: "Casamento Cancelado"
 ep2_wedding.0151.b.tt: "Minha recusa é recebida com exclamações de surpresa pela multidão, e um silêncio cheio de incerteza.\n\nVejo o rosto de [spouse_2.GetFirstNameNoTooltip] se transformar aos poucos de espanto em indignação, e de repente ouço a explosão de cochichos às minhas costas, mas não me importo. Simplesmente não posso aceitar me casar com [spouse_2.Custom('ES_ElElla')].\n\nAceitarei qualquer consequência que isso tenha."
 ep2_wedding.0152.t: "Não significa NÃO."
 ep2_wedding.0152.desc: "Início do Banquete de Casamento"
 ep2_wedding.0152.a: "Uma vez cumpridas todas as formalidades, chegou a hora de celebrar.\n\nFaço um sinal aos servos para que tragam a comida e as bebidas e conduzam os convidados ao local do banquete.\n\nQue comece o banquete de casamento!"
 ep2_wedding.0200.t: "A parte formal do casamento — a cerimônia — finalmente ficou para trás.\n\nTodos sorriem à espera da gigantesca refeição, do entretenimento empolgante e da farra geral que está prestes a nos ser oferecida.\n\nVamos comer!"
 ep2_wedding.0200.desc_host: "A cerimônia foi concluída sem problemas e agora estou casad[ROOT.Char.Custom('ES_OA')] com [my_spouse.Custom('ES_ElLa')] horrível[my_spouse.Custom('ES_OA')] [my_spouse.GetFirstName].\n\nEnquanto seguimos para o local do banquete, vejo convidados felizes, ansiosos para participar das festividades. Queria poder compartilhar sua alegria. Sento-me no lugar que me foi designado e rezo a [ROOT.Char.GetFaith.HighGodName], pedindo-lhe forças.\n\nE agora, que comece a farsa!"
 ep2_wedding.0200.desc: "Quando a cerimônia termina e todos nós seguimos para o local do banquete, sorrio para mim mesmo em segredo, imaginando as alegrias que minha vida de casad[ROOT.Char.Custom('ES_OA')] com [my_spouse.GetFirstName].\n\nNem todo mundo tem a sorte de se casar com uma pessoa tão agradável!\n\nDesejo que todos compartilhem minha felicidade, e vamos todos encher a barriga!"
 ep2_wedding.0200.desc_spouse_dislike: "Parece que passou uma eternidade desde que a cerimônia começou, mas agora que finalmente estou livre, estou morrendo de vontade de que chegue a parte mais #EMP interessante#! do dia: o banquete!

Claro que também saí com um #EMP cônjuge#! dessa epopeia toda, mas vou ter tempo de pensar nisso quando a refeição já tiver me arrancado um sorriso de orelha a orelha.

Por ora, vamos celebrar!"
 ep2_wedding.0200.desc_spouse_like: "Se eu achava que a cerimônia já era exaustiva por si só, nada poderia ter me preparado para o nervosismo que sinto logo em seguida.\n\nO banquete me aguarda, com sua avalanche de felicitações, barulhos, animadores e a consciência de que estou oficialmente casad[ROOT.Char.Custom('ES_OA')] e de que minha vida vai mudar drasticamente.\n\nPortanto, é com uma mão um tanto trêmula que pego minha taça e a ergo em celebração. Que comecem as festividades."
 ep2_wedding.0200.desc_spouse_party: "Parece que passou uma eternidade desde que a cerimônia começou, mas agora que finalmente estou livre, estou morrendo de vontade de que chegue a parte mais #EMP interessante#! do dia: o banquete!

Claro que também saí com um #EMP cônjuge#! dessa epopeia toda, mas vou ter tempo de pensar nisso quando a refeição já tiver me arrancado um sorriso de orelha a orelha.

Por ora, vamos celebrar!"
 ep2_wedding.0200.desc_spouse_shy: "O banquete começou a diminuir, com todos saciados e cansados, mas o dia ainda não acabou para [other_spouse.GetFirstName] e para mim.\n\nUma procissão de convidados nos leva ao nosso quarto, pois a legitimidade de um casamento depende de sua consumação!"
 ep2_wedding.0200.desc_spouse_arrogant: "Sinto como se tivesse comido, bebido, socializado, dançado e cantado por dias.\n\nLogo, as celebrações se acalmarão e os cônjuges se retirarão para seus aposentos privados para consumar o casamento. Para nós que permanecemos, porém, vamos servir mais uma bebida e brindar aos cônjuges!"
 ep2_wedding.0200.desc_spouse_fallback: "É hora!"
 ep2_wedding.0200.a: "Todos os parentes presentes de [spouse_2.GetUIName]"
 ep2_wedding.0300.t: "Casamento Anulado"
 ep2_wedding.0300.desc: "A notícia da repentina morte [dead_spouse.Custom('ES_DelDela')] [dead_spouse.GetTitledFirstName|l] cai sobre a festa de casamento como um trovão retumbante em um dia ensolarado.\n\nOs cânticos se calam, os rostos sorridentes se transformam em lágrimas, as flores ficam espalhadas pelo chão, pisoteadas pela multidão aflita.\n\nÉ uma verdadeira tragédia que um dia tão marcante para a felicidade se torne um dia de luto…"
 ep2_wedding.0300.desc_spouse: "Realmente uma tragédia..."
 ep2_wedding.0300.desc_guest: "[previous_host.GetUIName|U] recebeu um reembolso pelo [GetActivityType('activity_wedding').GetName|l] cancelado de [gold_i][THIS.Var('gwedding_gold_recoup_value').GetValue|V0]"
 ep2_wedding.0300.a: "A notícia da morte repentina de [dead_spouse.Custom('ES_DelDela')] [dead_spouse.GetTitledFirstName|l] me abala até o fundo da alma, inesperada e trágica como é no dia do nosso próprio casamento.\n\nAinda não faz nem um dia que nos casamos, e já você foi tirado de mim…"
 every_attending_relative_of_spouse_2: "Deixe-me sozinho(a) para lamentar..."
 ep2_wedding.0900.t: "[ROOT.Char.GetUIName|U] [Character.LocalPlayerString( 'has', 'ha' )] recebeu um reembolso pela [GetActivityType('activity_wedding').GetName|l] cancelada de [THIS.Var('gwedding_gold_recoup_value').GetValue|V0] [gold_i]"
 ep2_wedding.0900.desc: "No momento de seu falecimento, [previous_host.Custom2('MyCharacterIntroduction', ROOT.Char)] estava realizando uma [GetActivityType('activity_wedding').GetName|l]. Uma atividade deliciosa para a qual eu não havia sido convidado.\n\nAgora que partiu desta para melhor, a festa entrou em desordem e todos foram mandados de volta para casa, decepcionados."
 ep2_wedding.0900.a: "Eu deveria estar lá."
 ep2_wedding.9000.tt: "Eu estava mesmo ansioso para me casar com [free_spouse.Custom('ES_ElLa')] [free_spouse.GetTitledFirstName|l], mas parece que [ROOT.Char.GetFaith.HouseholdGodName] tinha outros planos para mim — ou para [free_spouse.GetFirstNameNoTooltip].\n\nEmbora o noivado continue em vigor, a promessa de um Grande Casamento agora é nula e sem efeito."
 ep2_wedding.0910.desc: "Isso é tão triste..."
 ep2_wedding.0910.a: "As notícias do encarceramento [prisoner_spouse.Custom('ES_DelDela')] [prisoner_spouse.GetTitledFirstName|l] põem fim a todas as celebrações. Parece que [ROOT.Char.GetFaith.HouseholdGodName] tinha outros planos para [prisoner_spouse.GetSheHe].\n\nEmbora o noivado continue de pé, a promessa de um Grande Casamento agora é nula e sem efeito."
 ep2_wedding.9015.tt: "Tão decepcionante."
 ep2_wedding.0915.desc: "A Conclusão"
 ep2_wedding.0915.a: "Quando —#EMP finalmente#!— o último convidado vai embora, olho ao redor e vejo o local deserto, os restos de comida, toda aquela quantidade de [ROOT.Char.Custom('RegionalDrink')] derramada pelo chão, os ecos das risadas das pessoas que ainda persistem no ar, e me sinto satisfeit[ROOT.Char.Custom('ES_OA')].\n\nQue dia tão incrível! Fiz um ótimo trabalho organizando tudo."
 ep2_wedding.0920.desc: "Outros personagens estarão mais propensos a aceitar as propostas de casamento desse personagem nos próximos 20 anos."
 ep2_wedding.0920.a: "Obrigado(a) a todos por virem!"
 ep2_wedding.0921.desc: "Nasce um novo dia, o primeiro da minha vida com [other_spouse.GetFirstName].\n\nÉ hora de deixar para trás as celebrações e a folia, por mais deliciosas que tenham sido, e seguir para a nossa nova normalidade."
 ep2_wedding.0921.a: "Um a um, todos os convidados vão embora, e já está na hora de eu partir também.\n\nO casamento foi uma ótima ocasião para conviver com meus pares e relaxar, e deixo o local cansad[ROOT.Char.Custom('ES_OA')] e satisfeit[ROOT.Char.Custom('ES_OA')], desejando aos cônjuges o melhor para que tenham uma união próspera e feliz."
 ep2_wedding.0950.t: "Parabéns novamente!"
 ep2_wedding.0950.desc: "A espera por [missing_spouse.GetFirstName] já dura tempo demais e agora está claro que [missing_spouse.GetSheHe] desapareceu pelo caminho.\n\nLogo, as pessoas começam a falar. Rumores vindos de uma cidade não muito longe daqui dizem que se [missing_spouse.GetHerHim] viu pela última vez comprando ervas em um mercado sórdido, enquanto outros jurariam tê-[missing_spouse.GetHerHim] visto embarcando em um navio rumo a terras distantes."
 ep2_grand_wedding_host_incentives_effect.tt: "

De qualquer forma, está claro que [missing_spouse.GetFirstNameNoTooltip] fugiu porque prefere viver como [Select_CString( missing_spouse.IsFemale, 'uma andarilha', 'um andarilho' )] do que casad[missing_spouse.Custom('ES_OA')] comigo."
 ep2_wedding.0950.a: "

Em qualquer caso, está claro que [missing_spouse.GetFirstNameNoTooltip] fugiu porque prefere viver como [Select_CString( missing_spouse.IsFemale, 'uma andarilha', 'um andarilho' )] do que casad[missing_spouse.Custom('ES_OA')] com [other_spouse.GetFirstName]."
 ep2_wedding.0960.desc: "Sempre é um dia triste quando todas as esperanças depositadas em um novo casamento vão por água abaixo, junto com todo o trabalho árduo investido na organização de um evento grandioso.\n\nInfelizmente, este casamento simplesmente não estava destinado a acontecer.\n\nEnquanto os servos começam a limpar, os convidados vão embora em grupos confusos e decepcionados, de volta às suas respectivas casas."
 ep2_wedding.0970.desc: "Que pena."
 ep2_wedding.0970.a: "$ep2_wedding.0900.t$"
 ep2_wedding.0997.desc_intro: "A notícia recente interrompeu as celebrações e deixou todos surpresos e confusos.\n\nAo que parece, não será possível continuar com o casamento devido ao status e aos bens do anfitrião; e, sem alguém forte para conduzi-lo, só nos resta voltar para casa, decepcionados."
 ep2_wedding.0997.desc_spouse: "

De qualquer forma, está claro que [missing_spouse.GetFirstNameNoTooltip] fugiu porque prefere viver como [Select_CString( missing_spouse.IsFemale, 'uma andarilha', 'um andarilho' )] do que casad[missing_spouse.Custom('ES_OA')] comigo."
 ep2_wedding.0997.desc_generic: "

Em qualquer caso, está claro que [missing_spouse.GetFirstNameNoTooltip] fugiu porque prefere viver como [Select_CString( missing_spouse.IsFemale, 'uma andarilha', 'um andarilho' )] do que casad[missing_spouse.Custom('ES_OA')] com [other_spouse.GetFirstName]."
 ep2_wedding.0998.desc: "Os convidados não ficaram impressionados com o entretenimento oferecido."
 ep2_wedding.0998.a: "$wedding_entertainment_title$"
 ep2_wedding.0999.t: "Comida do Grande Casamento"
 ep2_wedding.0999.desc: "Todos os convidados ficaram impressionados com a comida oferecida."
 ep2_wedding.0999.a: "$wedding_food_title$"
 wedding_entertainment_title: "Os convidados apreciaram a comida oferecida."
 host_wedding_entertainment_good: "$wedding_food_title$"
 host_wedding_entertainment_good_title: "Os convidados acharam a comida oferecida um pouco decepcionante."
 host_wedding_entertainment_normal: "$wedding_food_title$"
