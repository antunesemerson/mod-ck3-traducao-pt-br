l_spanish:
 ##################################################
 #MISC
 ep2_wedding_ewan_0041_attraction_modifier: "Fala da Cidade"
 ep2_wedding_ewan_0041_attraction_modifier_desc: "As melhores qualidades deste personagem estão nos lábios de todos."
 ep2_wedding_ewan_0051_snooty_modifier: "Arrogante"
 ep2_wedding_ewan_0051_snooty_modifier_desc: "Este personagem é conhecido por não ter tempo para plebeus, bajuladores e tolos que agem acima de sua posição."
 ep2_wedding_ewan_0051_approachable_modifier: "Acessível"
 ep2_wedding_ewan_0051_approachable_modifier_desc: "Considerado um bastião de bom tato, este personagem sempre tem tempo para uma conversa. Não importa quão árido seja o assunto."
 ep2_wedding_ewan.0000.desc.hate.fallback: "\"Bah, você é fácil de agradar,\" resmunga [char_2.GetFirstNameNoTooltip]. \"Esperava mais desse tipo de evento.\""
 ep2_wedding_ewan.0000.desc.boilerplate.char_intro: "Perto do meu assento, [char_1.Custom('ES_ElLa')] [char_1.GetTitledFirstName|l] e [char_1.Custom('ES_ElLa')] [char_2.GetTitledFirstName|l] compartilham suas opiniões"
 ep2_wedding_ewan.0000.flavour.hobnob.char_1: "Você passa a maior parte da noite confraternizando com este(a) [char_1.Custom('GetEducationTrait')|l]"
 ep2_wedding_ewan.0000.flavour.hobnob.char_2: "Você passa a maior parte da noite confraternizando com este(a) [char_2.Custom('GetEducationTrait')|l]"
 ##################################################
 #BANQUET PHASE
 ep2_wedding_ewan.0001.t: "Um Espetáculo Eclético"
 ep2_wedding_ewan.0001.desc.intro.bad: "Embora não seja o evento mais grandioso, as atrações da noite são uma emocionante variedade de atores, acrobatas, malabaristas e muito mais. $ep2_wedding_ewan.0000.desc.boilerplate.char_intro$ na exibição.\n\n"
 ep2_wedding_ewan.0001.desc.t1.love.diligent: "\"Bravo! Bravo! Suficiente para ser interessante sem ficar #EMP demais#! frívolo!\" exclama [char_1.GetFirstNameNoTooltip]."
 ep2_wedding_ewan.0001.desc.t1.love.shy: "\"É bom ter uma emoção de fundo sem sobrecarregar toda a conversa\", sussurra [char_1.GetFirstNameNoTooltip] meio baixinho."
 ep2_wedding_ewan.0001.desc.t1.love.humble: "\"A quantidade perfeita de artistas para ser decente,\" concorda [char_1.GetFirstNameNoTooltip] com satisfação."
 ep2_wedding_ewan.0001.desc.t1.love.content: "$ep2_wedding_ewan.0001.desc.t1.love.humble$"
 ep2_wedding_ewan.0001.desc.t1.love.honest: "\"Fico feliz que não haja muitos artistas,\" franz [char_1.GetFirstNameNoTooltip]. \"Tipos problemáticos, em geral.\""
 ep2_wedding_ewan.0001.desc.t1.love.just: "$ep2_wedding_ewan.0001.desc.t1.love.honest$"
 ep2_wedding_ewan.0001.desc.t1.love.craven: "Eu sempre fico um pouco nervoso se as apresentações forem #EMP demais#! ousadas,\" [char_1.GetFirstNameNoTooltip] gargalha."
 ep2_wedding_ewan.0001.desc.t1.love.paranoid: "\"Pessoas temperamentais, artistas. Isso é o suficiente — é arriscado ter muitos em um só lugar\", [char_1.GetFirstNameNoTooltip] concorda."
 ep2_wedding_ewan.0001.desc.intro.normal: "Um magnífico grupo de músicos, saltimbancos e atores está proporcionando o entretenimento da noite, encantando os convidados em todo o salão. $ep2_wedding_ewan.0000.desc.boilerplate.char_intro$ na exibição.\n\n"
 ep2_wedding_ewan.0001.desc.t2.love.content: "\"Ahh, a quantidade perfeita de animação para oferecer, eu diria,\" ri [char_1.GetFirstNameNoTooltip]."
 ep2_wedding_ewan.0001.desc.t2.love.compassionate: "$ep2_wedding_ewan.0001.desc.t2.love.content$"
 ep2_wedding_ewan.0001.desc.t2.love.generous: "\"Bom ver um pouco de variedade em exibição,\" diz [char_1.GetFirstNameNoTooltip], \"tantas vezes as pessoas são mesquinhas com essas coisas.\""
 ep2_wedding_ewan.0001.desc.t2.love.calm: "\"Muito pensamento é dedicado ao equilíbrio certo de ruído de fundo,\" reflete [char_1.GetFirstNameNoTooltip], \"é bom ver um pouco sem #EMP demais#! agitação.\""
 ep2_wedding_ewan.0001.desc.t2.love.patient: "$ep2_wedding_ewan.0001.desc.t2.love.calm$"
 ep2_wedding_ewan.0001.desc.t2.love.fickle: "\"Nunca sei exatamente o que esperar dos artistas,\" ri [char_1.GetFirstNameNoTooltip], \"então tenho que dizer que isso me parece um bom nível.\""
 ep2_wedding_ewan.0001.desc.t2.love.cynical: "\"A quantidade correta de artistas e nada mais,\" observa [char_1.GetFirstNameNoTooltip] com ironia, \"ótimo, não suporto os esforçados demais.\""
 ep2_wedding_ewan.0001.desc.intro.good: "O salão está repleto de uma parada tumultuada de trupes de teatro, músicos dançantes e charlatães exóticos, encantando os convidados em massa. $ep2_wedding_ewan.0000.desc.boilerplate.char_intro$ na exibição.\n\n"
 ep2_wedding_ewan.0001.desc.t3.love.lazy: "\"Faça uma cambalhota!\" grita [char_1.GetFirstNameNoTooltip] para um saltimbanco se divertindo, \"pelo [char_1.GetFaith.HealthGodName], eu #EMP adoro#! uma boa festa!\""
 ep2_wedding_ewan.0001.desc.t3.love.gregarious: "$ep2_wedding_ewan.0001.desc.t3.love.lazy$"
 ep2_wedding_ewan.0001.desc.t3.love.arrogant: "\"Agora #EMP isso#! é do jeito que eu gosto!\" gargalha [char_1.GetFirstNameNoTooltip], \"um evento grandioso, não, #EMP magnífico#!\""
 ep2_wedding_ewan.0001.desc.t3.love.ambitious: "$ep2_wedding_ewan.0001.desc.t3.love.arrogant$"
 ep2_wedding_ewan.0001.desc.t3.love.deceitful: "\"Eu tenho muito respeito pelos artistas,\" reflete [char_1.GetFirstNameNoTooltip], \"é preciso habilidade para transformar a falsidade em uma profissão remunerada.\""
 ep2_wedding_ewan.0001.desc.t3.love.arbitrary: "$ep2_wedding_ewan.0001.desc.t3.love.deceitful$"
 ep2_wedding_ewan.0001.desc.t3.love.brave: "\"Sim, sim, você pode tocar enquanto está no ar, não seja covarde!\" ri [char_1.GetFirstNameNoTooltip], repreendendo um músico, \"não é divertido sem um pouco de #EMP perigo#!.\""
 ep2_wedding_ewan.0001.desc.t3.love.trusting: "\"Que truques inusitados esses estranhos apresentam,\" ri [char_1.GetFirstNameNoTooltip], \"quase desejo que alguns deles venham morar comigo.\""
 ep2_wedding_ewan.0001.desc.midtro: "\n\n"
 ep2_wedding_ewan.0001.desc.t1.hate.lazy: "\"Hrmph, eu estava esperando algo um pouco mais... extravagante...\" resmunga [char_2.GetFirstNameNoTooltip]."
 ep2_wedding_ewan.0001.desc.t1.hate.gregarious: "$ep2_wedding_ewan.0001.desc.t1.hate.lazy$"
 ep2_wedding_ewan.0001.desc.t1.hate.arrogant: "\"Bah, eles são adequados, mas estão longe do espetáculo que eu estava esperando,\" lamenta [char_2.GetFirstNameNoTooltip]."
 ep2_wedding_ewan.0001.desc.t1.hate.ambitious: "$ep2_wedding_ewan.0001.desc.t1.hate.arrogant$"
 ep2_wedding_ewan.0001.desc.t1.hate.deceitful: "\"Sinceramente, eu esperava um pouco mais,\" reclama [char_2.GetFirstNameNoTooltip], \"acho esse tipo de pessoa fascinante.\""
 ep2_wedding_ewan.0001.desc.t1.hate.arbitrary: "$ep2_wedding_ewan.0001.desc.t1.hate.deceitful$"
 ep2_wedding_ewan.0001.desc.t1.hate.brave: "\"Deveria haver muito mais,\" reclama [char_2.GetFirstNameNoTooltip], \"esses poucos não são o suficiente para fazer algo realmente audacioso.\""
 ep2_wedding_ewan.0001.desc.t1.hate.trusting: "\"Eu estava esperando mais variedade, sinceramente,\" lamenta [char_2.GetFirstNameNoTooltip], \"você sempre pode pegar mais tipos de trabalho de qualquer cidade antiga, afinal.\""
 ep2_wedding_ewan.0001.desc.t2.hate.ambitious: "\"Está bom, suponho,\" [char_2.GetFirstNameNoTooltip] cospe, \"eu simplesmente prefiro ostentação verdadeiramente impressionante em vez dessas medidas pela metade.\""
 ep2_wedding_ewan.0001.desc.t2.hate.arrogant: "$ep2_wedding_ewan.0001.desc.t2.hate.ambitious$"
 ep2_wedding_ewan.0001.desc.t2.hate.greedy: "\"Bah, há muitos deles para aplaudir a economia, mas não o suficiente para apreciar a exibição do dinheiro de outra pessoa,\" lamenta [char_2.GetFirstNameNoTooltip]."
 ep2_wedding_ewan.0001.desc.t2.hate.wrathful: "\"Sinceramente, eu esperava um pouco mais de agitação do evento,\" [char_2.GetFirstNameNoTooltip] resmunga."
 ep2_wedding_ewan.0001.desc.t2.hate.impatient: "$ep2_wedding_ewan.0001.desc.t2.hate.wrathful$"
 ep2_wedding_ewan.0001.desc.t2.hate.stubborn: "\"Na minha opinião, isso deveria ser uma celebração para a cerimônia,\" opina [char_2.GetFirstNameNoTooltip], \"então deveria ter correspondido à sua importância e ter sido completo.\""
 ep2_wedding_ewan.0001.desc.t2.hate.zealous: "$ep2_wedding_ewan.0001.desc.t2.hate.stubborn$"
 ep2_wedding_ewan.0001.desc.t3.hate.diligent: "\"Eu acho que tudo isso é um pouco demais,\" reclama [char_2.GetFirstNameNoTooltip], \"tanta... frivolidade...\""
 ep2_wedding_ewan.0001.desc.t3.hate.shy: "\"Eu mal consigo ouvir meus próprios pensamentos,\" sussurra [char_2.GetFirstNameNoTooltip], \"é tudo tão... avassalador...\""
 ep2_wedding_ewan.0001.desc.t3.hate.humble: "\"Está bom, mas é tudo muito exibicionista,\" [char_2.GetFirstNameNoTooltip] resmunga, \"eu poderia fazer com um pouco mais de espaço para conversar.\""
 ep2_wedding_ewan.0001.desc.t3.hate.content: "$ep2_wedding_ewan.0001.desc.t3.hate.humble$"
 ep2_wedding_ewan.0001.desc.t3.hate.honest: "\"#EMP Atores#!\" [char_2.GetFirstNameNoTooltip] lamenta, \"todos eles são mentirosos profissionais. Poderíamos lidar com alguns a menos em uma ocasião tão importante.\""
 ep2_wedding_ewan.0001.desc.t3.hate.just: "$ep2_wedding_ewan.0001.desc.t3.hate.honest$"
 ep2_wedding_ewan.0001.desc.t3.hate.craven: "«Cuidado!», cospe [char_2.GetFirstNameNoTooltip], desviando-se de uma bola de malabares lançada. «Malditos mercenários empolados, nem conseguem comer minha refeição com segurança...[char_2.Custom('ES_OA')] tranquilo[char_2.Custom('ES_OA')]…»."
 ep2_wedding_ewan.0001.desc.t3.hate.paranoid: "\"Muitos rostos estranhos, muitas 'ferramentas' bizarras,\" [char_2.GetFirstNameNoTooltip] pragueja, \"Como aquele! Será que é uma espada falsa sendo engolida, ou um assassino à espreita?\""
 ep2_wedding_ewan.0001.a: "\"[char_1.GetFirstNameNoTooltip] claramente está certo.\""
 ep2_wedding_ewan.0001.a.host: "\"[char_1.GetFirstNameNoTooltip], fico feliz que esteja gostando!\""
 ep2_wedding_ewan.0001.b: "\"Eu tenho que concordar com [char_2.GetFirstNameNoTooltip].\""
 ep2_wedding_ewan.0001.b.host: "\"Eu imaginei de forma diferente quando os contratei, [char_2.GetFirstNameNoTooltip]\""
 ep2_wedding_ewan.0001.c: "Meu olhar ameaçador está fixo em [intent_target.GetFirstNameNoTooltip]..."
 ep2_wedding_ewan.0001.c.tt: "Seu olhar deixa [intent_target.GetFirstNameNoTooltip] desconfortável"
 ep2_wedding_ewan.0001.d: "Estou focado na verdadeira diversão."
 ep2_wedding_ewan.0011.t: "Comida à altura de um..."
 ep2_wedding_ewan.0011.desc.intro.bad: "Por qualquer padrão razoável, a comida da noite é uma empolgante mistura de texturas, sabores e espetáculo, embora esta seja uma ocasião especialmente especial. $ep2_wedding_ewan.0000.desc.boilerplate.char_intro$ sobre o banquete.\n\n"
 ep2_wedding_ewan.0011.desc.t1.love.temperate: "\"Por [char_1.GetFaith.HealthGodName], a culinária é #EMP sublime#!\" entusiasma-se [char_1.GetFirstNameNoTooltip], \"tão variada quanto apropriado exige, sem excessos!\""
 ep2_wedding_ewan.0011.desc.t1.love.humble: "\"É importante se permitir um agrado de vez em quando,\" reflete [char_1.GetFirstNameNoTooltip], \"e é exatamente assim que eu gosto de fazer."
 ep2_wedding_ewan.0011.desc.t1.love.content: "$ep2_wedding_ewan.0011.desc.t1.love.humble$"
 ep2_wedding_ewan.0011.desc.t1.love.impatient: "\"Ah, refresco substancial na hora certa,\" exclama [char_1.GetFirstNameNoTooltip], \"maravilhoso! Não suporto milhares de pequenas porções.\""
 ep2_wedding_ewan.0011.desc.t1.love.paranoid: "\"Hmm, um bom nível,\" observa [char_1.GetFirstNameNoTooltip], virando um pedaço robusto, \"muita decoração fantasiosa é um convite para o veneno.\""
 ep2_wedding_ewan.0011.desc.t1.love.stubborn: "\"Outro prato do mesmo,\" ri [char_1.GetFirstNameNoTooltip], \"eu sei do que eu gosto e gosto do que eles estão servindo!\""
 ep2_wedding_ewan.0011.desc.intro.normal: "Apresentando iguarias exóticas, obras culinárias elaboradas e cores ricas com aromas ainda mais intensos, os chefs do banquete capricharam para o casamento. $ep2_wedding_ewan.0000.desc.boilerplate.char_intro$ sobre o banquete.\n\n"
 ep2_wedding_ewan.0011.desc.t2.love.content: "\"Ahhh, está tudo tão bonito,\" concorda [char_1.GetFirstNameNoTooltip], \"uma mistura perfeita de forma e sabor.\""
 ep2_wedding_ewan.0011.desc.t2.love.compassionate: "$ep2_wedding_ewan.0011.desc.t2.love.content$"
 ep2_wedding_ewan.0011.desc.t2.love.generous: "\"#EMP Delicioso#!!\" ri [char_1.GetFirstNameNoTooltip], colocando algo arroxeado na boca, \"é bom ver algum dinheiro em exibição.\""
 ep2_wedding_ewan.0011.desc.t2.love.calm: "\"Um bom banquete, eu diria,\" gargalha [char_1.GetFirstNameNoTooltip], \"muito pensamento foi colocado para criar uma experiência sem perder de vista as coisas importantes.\""
 ep2_wedding_ewan.0011.desc.t2.love.patient: "$ep2_wedding_ewan.0011.desc.t2.love.calm$"
 ep2_wedding_ewan.0011.desc.t2.love.cynical: "\"A quantidade correta de esforço exibida aqui,\" observa [char_1.GetFirstNameNoTooltip] com ironia, \"suficiente para mostrar consideração, mas não o bastante para desperdiçar qualquer coisa.\""
 ep2_wedding_ewan.0011.desc.intro.good: "Visão, paladar, tato, olfato, até mesmo o som - nenhum sentido humano escapa à escala e grandiosidade da comida da noite, uma fabulosa mistura de arte e sabores. $ep2_wedding_ewan.0000.desc.boilerplate.char_intro$ sobre o banquete.\n\n"
 ep2_wedding_ewan.0011.desc.t3.love.gluttonous: "\"Outro! #EMP MAIS UM!#!\" berra [char_1.GetFirstNameNoTooltip], enquanto se empanturra em vez de fazer comentários detalhados."
 ep2_wedding_ewan.0011.desc.t3.love.arrogant: "\"#EMP Mmmmm#!!\" geme [char_1.GetFirstNameNoTooltip], \"agora #EMP isso#! é como se faz um banquete!\""
 ep2_wedding_ewan.0011.desc.t3.love.ambitious: "$ep2_wedding_ewan.0011.desc.t3.love.arrogant$"
 ep2_wedding_ewan.0011.desc.t3.love.patient: "\"Mais um prato?\" vibra [char_1.GetFirstNameNoTooltip], \"pelo [char_1.GetFaith.HealthGodName], eles nunca acabam! É maravilhoso!\""
 ep2_wedding_ewan.0011.desc.t3.love.trusting: "\"Não sei por que algumas pessoas ficam nervosas em banquetes\", ri [char_1.GetFirstNameNoTooltip], \"o que você poderia temer ao redor de alimentos tão magníficos?\""
 ep2_wedding_ewan.0011.desc.t3.love.fickle: "\"Oh, mais um desses! #EMP E#! aqueles!\" empolga-se [char_1.GetFirstNameNoTooltip], \"eu adoro um banquete onde você não precisa escolher apenas algumas delícias.\""
 ep2_wedding_ewan.0011.desc.midtro: "\n\n"
 ep2_wedding_ewan.0011.desc.t1.hate.gluttonous: "É que…, bufa [char_2.GetFirstNameNoTooltip], não se parece #EMP muito#! com o que eu esperava, nada mais."
 ep2_wedding_ewan.0011.desc.t1.hate.arrogant: "\"Bah, um banquete deveria quase falir o reino,\" resmunga [char_2.GetFirstNameNoTooltip], \"senão qual é o sentido?\""
 ep2_wedding_ewan.0011.desc.t1.hate.ambitious: "$ep2_wedding_ewan.0011.desc.t1.hate.arrogant$"
 ep2_wedding_ewan.0011.desc.t1.hate.patient: "\"Não tenho certeza por que a progressão dos pratos está tão apressada,\" reclama [char_2.GetFirstNameNoTooltip], \"todo mundo demorou uma eternidade para chegar aqui, e agora estamos acelerando a refeição?\""
 ep2_wedding_ewan.0011.desc.t1.hate.trusting: "\"A variedade está um pouco escassa,\" lamenta-se [char_2.GetFirstNameNoTooltip], \"qual é o problema em ter mais variedade de pratos?\""
 ep2_wedding_ewan.0011.desc.t1.hate.fickle: "$ep2_wedding_ewan.0011.desc.t1.hate.trusting$"
 ep2_wedding_ewan.0011.desc.t2.hate.ambitious: "\"Mediocridade,\" resmunga [char_2.GetFirstNameNoTooltip], \"é sinal de falta de ambição.\""
 ep2_wedding_ewan.0011.desc.t2.hate.arrogant: "$ep2_wedding_ewan.0011.desc.t2.hate.ambitious$"
 ep2_wedding_ewan.0011.desc.t2.hate.greedy: "\"A comida é boa,\" opina [char_2.GetFirstNameNoTooltip], \"mas não entendo gastar todo esse dinheiro nisso sem buscar algo #EMP fantástico#!.\""
 ep2_wedding_ewan.0011.desc.t2.hate.wrathful: "\"É bom\", [char_2.GetFirstNameNoTooltip] cospe, \"mas não é o suficiente para mim. Eu gosto de um banquete mais agitado do que isso.\""
 ep2_wedding_ewan.0011.desc.t2.hate.impatient: "$ep2_wedding_ewan.0011.desc.t2.hate.wrathful$"
 ep2_wedding_ewan.0011.desc.t2.hate.zealous: "\"Estou me divertindo,\" lamenta-se [char_2.GetFirstNameNoTooltip], \"só acho que as coisas poderiam ter ido um pouco mais longe para serem as #EMP melhores#!.\""
 ep2_wedding_ewan.0011.desc.t3.hate.temperate: "\"Não é tudo um tanto...\" [char_2.GetFirstNameNoTooltip] cheira, \"#EMP rico?#! Estilo sobre substância não é uma boa qualidade em uma refeição, eu acho.\""
 ep2_wedding_ewan.0011.desc.t3.hate.humble: "\"Nossa, certamente está agitado,\" reclama [char_2.GetFirstNameNoTooltip], \"eu mal tenho a chance de provar cada prato. Um ritmo mais lento não faria mal.\""
 ep2_wedding_ewan.0011.desc.t3.hate.content: "$ep2_wedding_ewan.0011.desc.t3.hate.humble$"
 ep2_wedding_ewan.0011.desc.t3.hate.impatient: "\"Bah!\" [char_2.GetFirstNameNoTooltip] pragueja fracamente, \"eu não suporto essas refeições interminavelmente longas seguindo e seguindo e seguindo...\""
 ep2_wedding_ewan.0011.desc.t3.hate.paranoid: "\"Banquetes desse porte são como uma floresta escura,\" [char_2.GetFirstNameNoTooltip] pondera, \"pode ser seguro, ou pode estar cheio de perigos esperando.\""
 ep2_wedding_ewan.0011.desc.t3.hate.stubborn: "\"Mãos longe!\" [char_2.GetFirstNameNoTooltip] rosna para um servidor, \"eu terminarei minha refeição quando estiver pronto! Muitos malditos pratos...\""
 ep2_wedding_ewan.0011.a: "\"Acho que estou do seu lado, [char_1.GetFirstNameNoTooltip].\""
 ep2_wedding_ewan.0011.a.host: "\"Eu escolhi os pratos principais pessoalmente, [char_1.GetFirstNameNoTooltip].\""
 ep2_wedding_ewan.0011.b: "\"[char_2.GetFirstNameNoTooltip] tem a ideia certa.\""
 ep2_wedding_ewan.0011.b.host: "\"Sim [char_2.GetFirstNameNoTooltip], as coisas não estão exatamente como eu imaginei.\""
 ep2_wedding_ewan.0011.c: "[intent_target.GetFirstNameNoTooltip] está sentad[intent_target.Custom('ES_OA')] tão perto das portas de serviço…"
 ep2_wedding_ewan.0011.c.tt.success: "Você tropeça em um servidor, derramando sopa em [intent_target.GetFirstNameNoTooltip]"
 ep2_wedding_ewan.0011.c.tt.failure: "O servidor desvia do seu pé"
 ep2_wedding_ewan.0011.d: "Assentir sem prestar atenção."
 ep2_wedding_ewan.0021.t: "Brilhante, Resplandecente"
 ep2_wedding_ewan.0021.desc.intro.bad: "Os enfeites do salão de banquetes são lindos, uma mistura de murais e flores raras — mesmo que não sejam estritamente as mais caras disponíveis. $ep2_wedding_ewan.0000.desc.boilerplate.char_intro$ sobre as decorações.\n\n"
 ep2_wedding_ewan.0021.desc.t1.love.content: "\"Ahhhh, #EMP maravilhoso#!\" gargalha [char_1.GetFirstNameNoTooltip], \"o suficiente de adornos para torná-lo especial, mas não o bastante para ofuscar o casal feliz.\""
 ep2_wedding_ewan.0021.desc.t1.love.lazy: "\"Sabe,\" pondera [char_1.GetFirstNameNoTooltip], \"isso é #EMP exatamente#! o nível de esforço que eu teria colocado. Aprovo!\""
 ep2_wedding_ewan.0021.desc.t1.love.humble: "$ep2_wedding_ewan.0021.desc.t1.love.content$"
 ep2_wedding_ewan.0021.desc.t1.love.forgiving: "\"Talvez não seja o mais magnífico que poderia ser,\" concorda [char_1.GetFirstNameNoTooltip], \"mas ainda é um esforço louvável com muito coração.\""
 ep2_wedding_ewan.0021.desc.t1.love.compassionate: "$ep2_wedding_ewan.0021.desc.t1.love.forgiving$"
 ep2_wedding_ewan.0021.desc.t1.love.arbitrary: "\"Não me importo com o que você diz,\" diz [char_1.GetFirstNameNoTooltip], \"eu gosto. Foi feito um esforço, você está sendo esnobe.\""
 ep2_wedding_ewan.0021.desc.t1.love.greedy: "$ep2_wedding_ewan.0021.desc.t1.love.lazy$"
 ep2_wedding_ewan.0021.desc.intro.normal: "O salão de banquetes está vestido em uma explosão de cores, aromas e visões — apenas os tecidos e flores mais raros estão ausentes do traje. $ep2_wedding_ewan.0000.desc.boilerplate.char_intro$ sobre as decorações.\n\n"
 ep2_wedding_ewan.0021.desc.t2.love.content: "\"Não sei como você não pode amar tudo isso,\" gargalha [char_1.GetFirstNameNoTooltip], \"olhe os comprimentos que foram tomados!\""
 ep2_wedding_ewan.0021.desc.t2.love.compassionate: "$ep2_wedding_ewan.0021.desc.t2.love.content$"
 ep2_wedding_ewan.0021.desc.t2.love.generous: "\"Foi investida uma boa quantidade de dinheiro aqui,\" observa [char_1.GetFirstNameNoTooltip], \"você vê aquele tapete? É de meio continente de distância.\""
 ep2_wedding_ewan.0021.desc.t2.love.calm: "\"Por [char_1.GetFaith.WealthGodName], está tudo #EMP simplesmente#! perfeito,\" entusiasma-se [char_1.GetFirstNameNoTooltip], \"apenas a quantidade certa para ser elegante sem exagerar!\""
 ep2_wedding_ewan.0021.desc.t2.love.patient: "$ep2_wedding_ewan.0021.desc.t2.love.calm$"
 ep2_wedding_ewan.0021.desc.t2.love.fickle: "\"Talvez não seja uma seleção muito focada de frivolidades,\" reflete [char_1.GetFirstNameNoTooltip], \"mas eu #EMP gosto#! disso. A variedade é importante nessas ocasiões.\""
 ep2_wedding_ewan.0021.desc.t2.love.cynical: "\"Há adornos suficientes aqui para agradar a multidão sem ser um desperdício,\" observa [char_1.GetFirstNameNoTooltip] aprovação, \"é muito bem pensado.\""
 ep2_wedding_ewan.0021.desc.intro.good: "Esculturas finas, tapeçarias exóticas, arranjos florais estranhos e mais enfeitam o salão de banquetes — um verdadeiro banquete para os olhos. $ep2_wedding_ewan.0000.desc.boilerplate.char_intro$ sobre as decorações.\n\n"
 ep2_wedding_ewan.0021.desc.t3.love.ambitious: "\"Agora, #EMP isso#! é o que eu estava esperando!\" exclama [char_1.GetFirstNameNoTooltip], \"um local digno de um casamento realmente #EMP grandioso#!\""
 ep2_wedding_ewan.0021.desc.t3.love.diligent: "$ep2_wedding_ewan.0021.desc.t3.love.ambitious$"
 ep2_wedding_ewan.0021.desc.t3.love.arrogant: "$ep2_wedding_ewan.0021.desc.t3.love.ambitious$"
 ep2_wedding_ewan.0021.desc.t3.love.honest: "\"Estou muito feliz em ver a quantidade correta de esforço em exibição,\" ri [char_1.GetFirstNameNoTooltip], \"não suporto quando um anfitrião faz algo tão importante pela metade.\""
 ep2_wedding_ewan.0021.desc.t3.love.just: "$ep2_wedding_ewan.0021.desc.t3.love.honest$"
 ep2_wedding_ewan.0021.desc.t3.love.greedy: "\"Certamente não estão sendo econômicos aqui\" ri [char_1.GetFirstNameNoTooltip], \"bom, não posso dizer que tenho medo de aproveitar a hospitalidade.\""
 ep2_wedding_ewan.0021.desc.t3.love.generous: "$ep2_wedding_ewan.0021.desc.t3.love.greedy$"
 ep2_wedding_ewan.0021.desc.midtro: "\n\n"
 ep2_wedding_ewan.0021.desc.t1.hate.ambitious: "\"Sinceramente, tenho que dizer que prefiro um...\" [char_2.GetFirstNameNoTooltip] procura a frase educada, \"#EMP toque mais pesado#! nas frivolidades.\""
 ep2_wedding_ewan.0021.desc.t1.hate.diligent: "$ep2_wedding_ewan.0021.desc.t1.hate.ambitious$"
 ep2_wedding_ewan.0021.desc.t1.hate.arrogant: "$ep2_wedding_ewan.0021.desc.t1.hate.ambitious$"
 ep2_wedding_ewan.0021.desc.t1.hate.honest: "\"Para mim, parece que o evento foi superestimado,\" reclama [char_2.GetFirstNameNoTooltip], \"por que convidar tantas pessoas se isso é tudo que se pode pagar?\""
 ep2_wedding_ewan.0021.desc.t1.hate.generous: "$ep2_wedding_ewan.0021.desc.t1.hate.honest$"
 ep2_wedding_ewan.0021.desc.t1.hate.just: "\"Suponho que esteja em um padrão bastante alto,\" resmunga [char_2.GetFirstNameNoTooltip], \"eu só esperava um pouco mais.\""
 ep2_wedding_ewan.0021.desc.t2.hate.ambitious: "\"Humf,\" resmunga [char_2.GetFirstNameNoTooltip]. \"É um desperdício de um bom potencial. Há muito o que contemplar aqui; por que #EMP not#! levá-lo mais adiante?\""
 ep2_wedding_ewan.0021.desc.t2.hate.arrogant: "$ep2_wedding_ewan.0021.desc.t2.hate.ambitious$"
 ep2_wedding_ewan.0021.desc.t2.hate.greedy: "\"Há muito gasto em exibição para respeitar,\" resmunga [char_2.GetFirstNameNoTooltip], \"não o suficiente para realmente aproveitar. Estou decepcionado.\""
 ep2_wedding_ewan.0021.desc.t2.hate.wrathful: "\"Até que gosto o suficiente,\" resmunga [char_2.GetFirstNameNoTooltip], \"mas gostaria muito mais se tivesse um pouco mais de tudo isso.\""
 ep2_wedding_ewan.0021.desc.t2.hate.impatient: "$ep2_wedding_ewan.0021.desc.t2.hate.wrathful$"
 ep2_wedding_ewan.0021.desc.t2.hate.stubborn: "\"Cerimônias são importantes, e isso ainda faz parte da cerimônia\", resmunga [char_2.GetFirstNameNoTooltip], \"deveria ter sido maior, melhor, mais bonito, tudo isso.\""
 ep2_wedding_ewan.0021.desc.t2.hate.zealous: "$ep2_wedding_ewan.0021.desc.t2.hate.stubborn$"
 ep2_wedding_ewan.0021.desc.t3.hate.content: "\"Sinceramente, acho tudo isso um pouco cansativo,\" lamenta [char_2.GetFirstNameNoTooltip], \"eu nem sei o que é um assento e o que é uma escultura decorativa.\""
 ep2_wedding_ewan.0021.desc.t3.hate.lazy: "$ep2_wedding_ewan.0021.desc.t3.hate.content$"
 ep2_wedding_ewan.0021.desc.t3.hate.humble: "$ep2_wedding_ewan.0021.desc.t3.hate.content$"
 ep2_wedding_ewan.0021.desc.t3.hate.compassionate: "\"Hmm, não tenho certeza,\" resmunga [char_2.GetFirstNameNoTooltip], \"não parece que tudo isso esteja distraindo um pouco da cerimônia?\""
 ep2_wedding_ewan.0021.desc.t3.hate.arbitrary: "\"É realmente tão bonito assim?\" [char_2.GetFirstNameNoTooltip] resmunga, \"quanto tudo isso pode custará\""
 ep2_wedding_ewan.0021.a: "\"Bah, eu prefiro o pensamento positivo de [char_1.GetFirstNameNoTooltip].\""
 ep2_wedding_ewan.0021.a.host: "\"Eu mesma escolhi muitas das decorações, [char_1.GetFirstNameNoTooltip].\""
 ep2_wedding_ewan.0021.b: "\"Receio que você tenha um bom ponto, [char_2.GetFirstNameNoTooltip].\""
 ep2_wedding_ewan.0021.b.host: "\"[char_2.GetFirstNameNoTooltip] está certo — não é exatamente o que eu tinha em mente.\""
 ep2_wedding_ewan.0021.c: "[intent_target.GetFirstNameNoTooltip] parece estar bastante sozinh[intent_target.Custom('ES_OA')]..."
 ep2_wedding_ewan.0021.d: "Não se envolva."
 ep2_wedding_ewan.0031.t: "Um Jantar Sociável"
 ep2_wedding_ewan.0031.desc.intro: "Sempre há muitas pessoas para ver nessas ocasiões, novos rostos para conhecer, velhos conhecidos para reencontrar, tudo isso no meio da agitação de uma festa movimentada.\n\nApenas daqui onde estou sentado, consigo ver"
 ep2_wedding_ewan.0031.desc.char_1.conversationalist_neighbour: "meu governante vizinho[char_1.Custom('ES_OA')] governante"
 ep2_wedding_ewan.0031.desc.char_1.conversationalist_covassal: "meu companheiro[char_1.Custom('ES_OA')] vassalo[char_1.Custom('ES_OA')]"
 ep2_wedding_ewan.0031.desc.char_1.conversationalist_vassal: "meu vassalo[char_1.Custom('ES_OA')] jurado[char_1.Custom('ES_OA')]"
 ep2_wedding_ewan.0031.desc.char_1.conversationalist_liege: "meu suserano[char_1.Custom('ES_XA')] imediato[char_1.Custom('ES_OA')]"
 ep2_wedding_ewan.0031.desc.char_1.conversationalist_other_ruler: "um[char_1.Custom('ES_XA')] governante estrangeiro[char_1.Custom('ES_OA')],"
 ep2_wedding_ewan.0031.desc.char_1.conversationalist_backup: "um[char_1.Custom('ES_XA')] notável [char_1.GetLadyLord],"
 ep2_wedding_ewan.0031.desc.midro: "[char_1.GetTitledFirstName|l], que parece um pouco precisad[char_1.Custom('ES_OA')] de melhor companhia, e a"
 ep2_wedding_ewan.0031.desc.char_2.conversationalist_neighbour: "$ep2_wedding_ewan.0031.desc.char_1.conversationalist_neighbour$"
 ep2_wedding_ewan.0031.desc.char_2.conversationalist_covassal: "$ep2_wedding_ewan.0031.desc.char_1.conversationalist_covassal$"
 ep2_wedding_ewan.0031.desc.char_2.conversationalist_vassal: "$ep2_wedding_ewan.0031.desc.char_1.conversationalist_vassal$"
 ep2_wedding_ewan.0031.desc.char_2.conversationalist_liege: "$ep2_wedding_ewan.0031.desc.char_1.conversationalist_liege$"
 ep2_wedding_ewan.0031.desc.char_2.conversationalist_other_ruler: "$ep2_wedding_ewan.0031.desc.char_1.conversationalist_other_ruler$"
 ep2_wedding_ewan.0031.desc.char_2.conversationalist_backup: "um[char_2.Custom('ES_XA')] notável [char_2.GetLadyLord],"
 ep2_wedding_ewan.0031.desc.outro: "[char_2.GetTitledFirstName|l], de bom humor e de bem com a vida.\n\nSeria interessante conhecer um pouco melhor qualquer uma dessas pessoas, e agora #EMP es#! é o momento ideal para embarcar em uma aventura social…"
 ep2_wedding_ewan.0031.a: "\"[conversationalist_neighbour.GetFirstNameNoTooltip], que bom te ver!\""
 ep2_wedding_ewan.0031.b: "\"Ahh, [conversationalist_covassal.GetFirstNameNoTooltip], fico feliz que você veio...\""
 ep2_wedding_ewan.0031.c: "\"Sempre um prazer, [conversationalist_vassal.GetFirstNameNoTooltip].\""
 ep2_wedding_ewan.0031.d: "\"[conversationalist_liege.GetLadyLord|U] [conversationalist_liege.GetFirstNameNoTooltip], você nos honra!\""
 ep2_wedding_ewan.0031.e: "\"[conversationalist_other_ruler.GetFirstNameNoTooltip]. Inesperado te ver aqui.\""
 ep2_wedding_ewan.0031.f: "\"[conversationalist_backup.GetFirstNameNoTooltip], como você está?\""
 ep2_wedding_ewan.0031.g: "Tem uma festa acontecendo! Por que se limitar a uma conversa?"
 ep2_wedding_ewan.0031.h: "Eh, há outras pessoas com quem eu preferiria falar."
 ep2_wedding_ewan.0041.t: "Discurso! Discurso!"
 ep2_wedding_ewan.0041.desc.intro: "Cada banquete de casamento é palco de um número francamente #EMP interminável#! de discursos. Alguns longos, outros curtos, alguns honestos, outros enganosos, agitando-se por todo o salão, pontuando cada prato do banquete em ondas.\n\nÀ medida que minha vez se aproxima, fico me perguntando — devo considerar o casal feliz ou"
 ep2_wedding_ewan.0041.desc.murder: "me gabar um pouco de minha futura vítima, [intent_target.GetFirstNameNoTooltip]?"
 ep2_wedding_ewan.0041.desc.seduce: "talvez apenas conquistar minha futura conquista, [intent_target.GetFirstNameNoTooltip]?"
 ep2_wedding_ewan.0041.desc.diplomacy: "apenas tentar chamar a atenção com minhas habilidades retóricas?"
 ep2_wedding_ewan.0041.desc.matchmaking: "dirigir algumas palavras gentis a [intent_target.GetFirstNameNoTooltip]?"
 ep2_wedding_ewan.0041.desc.mischief: "tentar agitar um pouco de empolgação?"
 ep2_wedding_ewan.0041.desc.recreation: "focar nas festividades?"
 ep2_wedding_ewan.0041.desc.outro: "\n\nAfinal, é fácil para as duplas intenções se perderem para a maioria nesse mar de palavras..."
 ep2_wedding_ewan.0041.a: "Elogie o casal feliz, como esperado."
 ep2_wedding_ewan.0041.b: "Elogie a festa."
 ep2_wedding_ewan.0041.c: "Ameace implicitamente [intent_target.GetFirstNameNoTooltip]."
 ep2_wedding_ewan.0041.d: "Direcione sutilmente o discurso para [intent_target.GetFirstNameNoTooltip]."
 ep2_wedding_ewan.0041.d.tt.success: "[intent_target.GetFirstNameNoTooltip] aprecia as dicas."
 ep2_wedding_ewan.0041.d.tt.failure: "[intent_target.GetSheHe|U] está extremamente envergonhad[intent_target.Custom('ES_OA')]."
 ep2_wedding_ewan.0041.e: "Mostre suas habilidades oratórias."
 ep2_wedding_ewan.0041.e.tt.success: "Um discurso excelente."
 ep2_wedding_ewan.0041.e.tt.failure: "Um discurso adequado."
 ep2_wedding_ewan.0041.f: "Elogie as boas qualidades de [intent_target.GetFirstNameNoTooltip]"
 ep2_wedding_ewan.0041.g: "Dê indícios de algumas verdades talvez ilícitas."
 ep2_wedding_ewan.0041.g.tt.success: "Isso... isso é verdade?"
 ep2_wedding_ewan.0041.g.tt.failure: "Que mentiras obviamente sensacionalistas."
 ep2_wedding_ewan.0041.h: "Sentar-se desconfortavelmente sem dizer nada."
 ep2_wedding_ewan.0041.i: "Diga algo doce, porém perfunctório."
 ep2_wedding_ewan.0051.t: "E Mais Uma Coisa"
 ep2_wedding_ewan.0051.desc.intro: "Em cada banquete. Sempre tem que haver alguém, sempre. Um idiota prolixo e malnascido te encurrala e #EMP no se calla ni para comer#!.\n\nDesta vez é [dolt.GetFirstName], que"
 ep2_wedding_ewan.0051.desc.boilerplate.stress_pitch: "tenta desesperadamente[dolt.Custom('ES_OA')] que eu invista parte dos meus \"vastos recursos como nobre [ROOT.Char.GetLadyLord] [ROOT.Char.GetTitleAsNameNoTooltip]\" em"
 ep2_wedding_ewan.0051.desc.drunkard: "$ep2_wedding_ewan.0051.desc.boilerplate.stress_pitch$ aquisição do que aparentemente é um estabelecimento de bebidas rústico e #EMP encantador#!."
 ep2_wedding_ewan.0051.desc.hashishiyah: "$ep2_wedding_ewan.0051.desc.boilerplate.stress_pitch$ aquisição de uma supostamente denegrida casa de bolos de haxixe."
 ep2_wedding_ewan.0051.desc.rakish: "$ep2_wedding_ewan.0051.desc.boilerplate.stress_pitch$ aquisição de um bordel com a equipe mais bela dos confins do mundo."
 ep2_wedding_ewan.0051.desc.reclusive: "$ep2_wedding_ewan.0051.desc.boilerplate.stress_pitch$ plano de financiar a criação de uma mansão de difícil acesso, capaz de proporcionar solidão até mesmo aos nobres mais famosos."
 ep2_wedding_ewan.0051.desc.flagellant: "$ep2_wedding_ewan.0051.desc.boilerplate.stress_pitch$ plano para algum tipo de... #EMP campo#! de postes de chicoteamento, capaz de canalizar a dor purificadora comunitária de dezenas de penitentes."
 ep2_wedding_ewan.0051.desc.profligate: "$ep2_wedding_ewan.0051.desc.boilerplate.stress_pitch$ um plano mal explicado… Tão mal explicado que eu nem consigo entender para que quer o dinheiro."
 ep2_wedding_ewan.0051.desc.journaller: "$ep2_wedding_ewan.0051.desc.boilerplate.stress_pitch$ fundação de um scriptorium que, aparentemente, consistirá principalmente nas obras #EMP #!, pelo menos inicialmente."
 ep2_wedding_ewan.0051.desc.athletic: "$ep2_wedding_ewan.0051.desc.boilerplate.stress_pitch$ ideia de um tipo novo de ginásio público, algo focado no treinamento de todos os tipos de aptidão ao longo do espectro do exercício."
 ep2_wedding_ewan.0051.desc.diligent: "está obcecad[dolt.Custom('ES_OA')] de forma positiva com o dia a dia do trabalho. O [dolt.GetWomanMan] não parece ter a menor ideia de como falar sobre qualquer outra coisa além das tarefas mais mundanas, ou mesmo perceber que nem todo mundo está interessado na sua vida triste e sem alegria."
 ep2_wedding_ewan.0051.desc.patient: "não cede de jeito nenhum. Já tentei todos os assuntos que consegui imaginar, tentei me desligar, tentei envolver outras pessoas, mas [dolt.GetSheHe] parece decidid[dolt.Custom('ES_OA')] a me importunar com uma implacabilidade sombria."
 ep2_wedding_ewan.0051.desc.impatient: "não tem paciência para nenhum assunto. Assim que tento me engajar em um tópico, já estamos passando para o próximo, sem qualquer conexão entre eles. Apenas um eterno bombardeio de pensamentos desconexos, para sempre."
 ep2_wedding_ewan.0051.desc.arrogant: "se mostra completa e lamentavelmente autocentrad[dolt.Custom('ES_OA')]. A conversa est? repleta de hipocrisia, ideias mal formuladas e pura idiotice, mas [dolt.Custom('ES_ElLa')] [dolt.GetWomanMan|l] est? totalmente convencid[dolt.Custom('ES_OA')] de que ? uma esp?cie de g?nio social fascinante."
 ep2_wedding_ewan.0051.desc.arbitrary: "é profundamente confuso. Está claro que suas palavras fazem sentido para #EMP [dolt.Custom('ES_ElElla')].#!, mas para mim soam quase totalmente desconexas? Faz meia hora que tento descobrir qual é o meu papel nesta conversa."
 ep2_wedding_ewan.0051.desc.zealous: "não para de falar e falar e falar e #EMP hablar#! sobre a relação pessoal que tem com sua fé e como eu deveria tentar deixar a verdadeira luz de [dolt.GetFaith.random_GoodGodNames] entrar em meu coração. Mas [dolt.Custom('ES_ElElla')] não fez uma única pergunta sobre #EMP mis#! crenças."
 ep2_wedding_ewan.0051.desc.fickle: "mostrando-se decidido[dolt.Custom('ES_OA')] a me empurrar planos ao mesmo tempo que totalmente relutante[dolt.Custom('ES_OA')] a se comprometer com uma única ideia. Em vez disso, é um desfile interminável de logorréia malfeita que afoga lentamente minha vontade de viver."
 ep2_wedding_ewan.0051.desc.vengeful: "está completamente obcecado[dolt.Custom('ES_OA')] em descarregar sua ira suprema sobre algum pobre rival por uma suposta ofensa. Não faço ideia de por que preciso participar dessa conspiração enlouquecida."
 #My continued apologies for the poetry randomiser.
 ep2_wedding_ewan.0051.desc.poet: "que é a mais atroz de todas as coisas imagináveis: um[dolt.Custom('ES_XA')] mau[dolt.Custom('ES_XA')] po[dolt.Custom('ES_TaTisa')] com um público cativo. Os versos que está \"testando\" comigo nem sequer são poemas: são dísticos mal rimados sem o menor senso de ritmo ou de métrica."
 ep2_wedding_ewan.0051.desc.outro: "\n\nVou gritar."
 ep2_wedding_ewan.0051.a: "Sair da conversa delicadamente."
 ep2_wedding_ewan.0051.a.tt.success: "Você se desvencilha"
 ep2_wedding_ewan.0051.a.tt.failure: "Isso #EMP nunca#! acaba"
 ep2_wedding_ewan.0051.b: "\"Por todos os habitantes do [ROOT.Char.GetFaith.random_NegativeAfterLife], você vai calar essa tagarelice?\""
 ep2_wedding_ewan.0051.b.custom.every_wrathful_guest: "Cada convidado [GetTrait('wrathful').GetName( reference )]"
 ep2_wedding_ewan.0051.c: "\"Cale a boca.\""
 ep2_wedding_ewan.0051.d: "Adormeça. Imediatamente."
 ep2_wedding_ewan.0051.d.custom.every_lazy_guest: "Cada convidado [GetTrait('lazy').GetName( reference )]"
 ep2_wedding_ewan.0051.e: "\"Um #EMP pub#! você diz...\""
 ep2_wedding_ewan.0051.f: "\"Uma #EMP loja de bolos#! você diz...\""
 ep2_wedding_ewan.0051.g: "\"Um #EMP bordel#! você diz...\""
 ep2_wedding_ewan.0051.h: "\"Um #EMP retiro privado#! você diz...\""
 ep2_wedding_ewan.0051.i: "\"Um campo de postes de chicoteamento #EMP#! você diz...\""
 ep2_wedding_ewan.0051.i.tt.deviant: "Essa opção está disponível por causa do seu [secret.GetName] [secret|El]"
 ep2_wedding_ewan.0051.j: "\"E não podemos perder dinheiro? De jeito nenhum?\""
 ep2_wedding_ewan.0051.k: "\"Um #EMP scriptorium#! você diz...\""
 ep2_wedding_ewan.0051.l: "\"Um #EMP ginásio#! você diz...\""
 ep2_wedding_ewan.0051.business_venture.tt: "Seu empreendimento comercial provavelmente levará muitos anos para se concretizar"
 ep2_wedding_ewan.0051.m: "\"Isso é... muito interessante...\""
 ep2_wedding_ewan.0051.m.tt.success: "Você consegue parecer genuinamente fascinado(a)"
 ep2_wedding_ewan.0051.m.tt.failure: "Você é tato, mas nada mais"
 ep2_wedding_ewan.0051.n: "Engula o sapo."
 ep2_wedding_ewan.0051.n.tt: "Você ouve cada. Última. Palavra."
 ep2_wedding_ewan.0052.t: "Assuntos Inacabados: No Azul"
 ep2_wedding_ewan.0052.desc.intro: "Há muitos anos, concordei em financiar um empreendimento comercial proposto por [dolt.GetFirstNameNoTooltip]. Para ser sincero(a), eu praticamente tinha esquecido do assunto —"
 ep2_wedding_ewan.0052.desc.dolt_availability.dead: "e mais ainda com [dolt.GetFirstNameNoTooltip] já morto[dolt.Custom('ES_OA')] e enterrado[dolt.Custom('ES_OA')]."
 ep2_wedding_ewan.0052.desc.dolt_availability.imprisoned: "especialmente porque [dolt.GetFirstNameNoTooltip] não está em condições de gerenciar muita coisa no momento."
 ep2_wedding_ewan.0052.desc.dolt_availability.free: "[dolt.GetFirstNameNoTooltip] nem mesmo tentou manter meu investimento além da quantia inicial, afinal de contas."
 ep2_wedding_ewan.0052.desc.midtro: "\n\nContra todas as probabilidades, no entanto, uma carta chegou esta manhã proclamando o sucesso inesperado de nosso negócio."
 ep2_wedding_ewan.0052.desc.drunkard: "A pequena taverna se transformou em um estabelecimento próspero de bebidas."
 ep2_wedding_ewan.0052.desc.hashishiyah: "O local de consumo de haxixe se tornou uma casa próspera de preguiça."
 ep2_wedding_ewan.0052.desc.rakish: "O pequeno bordel se transformou em um poço de prazer agitado."
 ep2_wedding_ewan.0052.desc.reclusive: "A mansão privada é, ironicamente, discretamente famosa — até os nobres mais notáveis parecem capazes de desaparecer lá por um tempo."
 ep2_wedding_ewan.0052.desc.flagellant: "O campo de postes de chicoteamento agora é uma propriedade de dor purificadora e enriquecedora, com aparentemente um apelo surpreendentemente amplo."
 ep2_wedding_ewan.0052.desc.profligate: "La carta #EMP sigue#! sin explicar en qué #EMP consiste#! el negocio para ser exactos, pero lo importante es que parece ser rentable."
 ep2_wedding_ewan.0052.desc.journaller: "O scriptorium cresceu o suficiente para assumir comissões de patronos ricos regularmente."
 ep2_wedding_ewan.0052.desc.athletic: "O ginásio se tornou extremamente popular entre nobres menores, cavaleiros errantes e #EMP viajantes#! ricos, procurando um ambiente para lutar e treinar sem precisar de sua própria propriedade."
 ep2_wedding_ewan.0052.desc.outro: "\n\nApós obter um retorno saudável de nossa prata, [dolt.GetFirstNameNoTooltip] fielmente devolveu minha parte dos lucros."
 ep2_wedding_ewan.0052.desc.outro.dolt_unavailable: "\n\nApós obter um retorno saudável de nossa prata, o administrador responsável pela operação fielmente devolveu minha parte dos lucros."
 ep2_wedding_ewan.0052.a: "Acho que vou recuperar #EMP tudo#! do meu investimento."
 ep2_wedding_ewan.0052.b: "Naturalmente, afinal, sou um gênio dos negócios."
 ep2_wedding_ewan.0052.c: "Uma surpresa agradável e inesperada!"
 ep2_wedding_ewan.0053.t: "Assuntos Inacabados: No Vermelho"
 ep2_wedding_ewan.0053.desc.intro: "$ep2_wedding_ewan.0052.desc.intro$"
 ep2_wedding_ewan.0053.desc.dolt_availability.dead: "$ep2_wedding_ewan.0052.desc.dolt_availability.dead$"
 ep2_wedding_ewan.0053.desc.dolt_availability.imprisoned: "$ep2_wedding_ewan.0052.desc.dolt_availability.imprisoned$"
 ep2_wedding_ewan.0053.desc.dolt_availability.free: "$ep2_wedding_ewan.0052.desc.dolt_availability.free$"
 ep2_wedding_ewan.0053.desc.midtro: "\n\nSurpreendentemente, uma carta anônima chegou esta manhã me informando sobre a destruição final de nosso empreendimento em um incêndio trágico."
 ep2_wedding_ewan.0053.desc.drunkard: "Parece que a reputação ruim da taverna piorou, levando a uma clientela ruim e, eventualmente, algum morador local sem nome tomando providências por conta própria."
 ep2_wedding_ewan.0053.desc.hashishiyah: "O local de consumo de haxixe não conseguiu atrair novos clientes e acabou sucumbindo às chamas quando alguém derrubou uma lanterna e não percebeu por vários minutos."
 ep2_wedding_ewan.0053.desc.rakish: "O pequeno bordel foi bem por um tempo, at? se tornar v?tima do que s? pode ser descrito como uma nova doen?a ven?rea horrivelmente virulenta. As chamas foram a ?nica op??o para purific?-lo."
 ep2_wedding_ewan.0053.desc.reclusive: "Após não conseguir atrair um interesse significativo, a localização exata da mansão privada foi, ironicamente, perdida. Apenas uma conflagração acidental por um grupo de bandidos locais realocou suas ruínas."
 ep2_wedding_ewan.0053.desc.flagellant: "O mercado esperado para aqueles que precisam de realização espiritual através da dor purificadora simplesmente nunca se materializou, e o campo de postes de chicoteamento se tornou lenha barata. Nunca há pecadores suficientes quando você precisa deles, nos dias de hoje."
 ep2_wedding_ewan.0053.desc.profligate: "O que exatamente queimou, onde ou como é tão misterioso quanto a proposta inicial, apenas resta fumaça, cinzas e confusão."
 ep2_wedding_ewan.0053.desc.journaller: "Apesar da boa remuneração oferecida, foi impossível encontrar copistas qualificados e alfabetizados dispostos a vasculhar os diários reunidos por [dolt.GetFirstNameNoTooltip]. O scriptorium nunca chegou a existir."
 ep2_wedding_ewan.0053.desc.athletic: "Parece que a maioria daqueles que desejam treinar seus corpos também estão em busca de uma briga com outros que estão fazendo o mesmo. Após uma série de duelos que terminaram em assassinatos, o ginásio sucumbiu a um tumulto que destruiu o prédio."
 ep2_wedding_ewan.0053.desc.outro: "\n\nDeveria ter sabido que não devia financiar um[dolt.Custom('ES_XA')] idiota tão desprezível quanto [dolt.GetFirstNameNoTooltip]."
 ep2_wedding_ewan.0053.a.alive: "Argh, quero es[dolt.Custom('ES_EA')] idiota carregad[dolt.Custom('ES_OA')] de correntes!"
 ep2_wedding_ewan.0053.a.dead: "? uma pena que esteja mort[dolt.Custom('ES_OA')] demais para estrangul?-l[dolt.Custom('ES_OA')]."
 ep2_wedding_ewan.0053.b: "Isso provavelmente era de se esperar."
 ep2_wedding_ewan.0061.t: "À minha querid[oldling.Custom('ES_OA')] [oldling.Custom2('RelationToMeShort', relative )]!"
 ep2_wedding_ewan.0061.desc.intro: "Apesar dos festejos, uma expressão de puro e abjeto horror rapidamente toma conta de [relative.Custom('ES_DelDela')] [relative.GetTitledFirstName|l] quando seu [relative.Custom2('RelationToMeShort', oldling )], [oldling.Custom('ES_ElLa')] [oldling.GetTitledFirstName|l], começa a se levantar, trêmulo, com a taça na mão.\n\n"
 ep2_wedding_ewan.0061.desc.arrogant: "[oldling.GetFirstNameNoTooltip], conhecid[oldling.Custom('ES_OA')] por ser fanfarr[oldling.Custom('ES_OnOna')] e valent?o, come?a a soltar uma longa diatribe sobre o papel que desempenhou na cria??o [relative.Custom('ES_DelDela')] [relative.Custom('GetBrideGroom')], repleta de piadas constrangedoras e anedotas embara?osas sobre a inf?ncia dest[relative.Custom('ES_EA')]."
 ep2_wedding_ewan.0061.desc.honest: "A maioria consideraria que a reputação de honestidade de [oldling.GetFirstNameNoTooltip] é uma bênção, mas aqui se mostra… equivocada, com [oldling.Custom('ES_ElLa')] velh[oldling.Custom('ES_OA')] bonach[oldling.Custom('ES_OnOna')] contando, com melancolia, as histórias mais embaraçosas da infância de [relative.Custom('ES_DelDela')] [relative.Custom('GetBrideGroom')]."
 ep2_wedding_ewan.0061.desc.deceitful: "O discurso de [oldling.GetFirstNameNoTooltip], algo fabulista na melhor das hipóteses, sobre a infância [relative.Custom('ES_DelDela')] [relative.Custom('GetBrideGroom')] é um tanto #EMP escandalosamente#! inexacto. O episódio com o burro parece especialmente desnecessário."
 ep2_wedding_ewan.0061.desc.gregarious: "O discurso de [oldling.GetFirstNameNoTooltip], marcado por uma festa na sua juventude, é uma lista quase interminável de anedotas interconectadas e sinuosas, nas quais apenas as mais embaraçosas se relacionam com [relative.Custom('ES_ElLa')] [relative.Custom('GetBrideGroom')]."
 ep2_wedding_ewan.0061.desc.ambitious: "Em seu discurso, sempre marcado pelo ?mpeto e pela ambi??o, [oldling.GetFirstNameNoTooltip] se assegura de atribuir a si grande parte do m?rito pela educa??o bem-sucedida que levou [relative.Custom('ES_AlAla')] [relative.Custom('GetBrideGroom')] a esta posi??o, apesar de ter tido uma inf?ncia desajeitada (e, ao que parece, cheia de acne)."
 ep2_wedding_ewan.0061.desc.diplomat: "Ao que parece, [oldling.GetFirstNameNoTooltip] famos[oldling.Custom('ES_OA')] por seu dom da palavra prateada, não consegue resistir à chance de contar a história dos primeiros anos de [relative.Custom('ES_DelDela')] [relative.Custom('GetBrideGroom')] e das muitas lições que tentou ensinar a ele. Em geral, sem sucesso, segundo ele."
 ep2_wedding_ewan.0061.desc.poet: "Em um destino pior que a morte para o público em geral, parece que [oldling.GetFirstNameNoTooltip] escreveu um longo e rebuscado poema sobre os momentos mais… adoravelmente constrangedores da infância [relative.Custom('ES_DelDela')] [relative.Custom('GetBrideGroom')]."
 ep2_wedding_ewan.0061.desc.sadistic: "Com o que só pode ser a mais absoluta malícia estampada em sua [oldling.Custom('MaskFace')] , [oldling.GetFirstNameNoTooltip] se lança em um #EMP insoportable#! relato detalhado e excruciante da infância de [relative.Custom('ES_DelDela')] [relative.Custom('GetBrideGroom')]. As anedotas pessoais são muitas e sem rodeios."
 ep2_wedding_ewan.0061.desc.drunkard: "Mantendo-se de pé com dificuldade, [oldling.GetFirstNameNoTooltip] começa a balbuciar lembranças turvas da infância de [relative.Custom('ES_DelDela')] [relative.Custom('GetBrideGroom')]. As impressões são um tanto exageradas, mas certamente dão vida à encenação."
 ep2_wedding_ewan.0061.desc.hashishiyah: "Durante um momento constrangedor, [oldling.GetFirstNameNoTooltip] piscando e com os olhos avermelhados, parece esquecer por que se levantou. Então, algo se encaixa e começa um relato da infância [relative.Custom('ES_DelDela')] [relative.Custom('GetBrideGroom')] que arranca algumas risadinhas."
 ep2_wedding_ewan.0061.desc.skill.diplomacy: "[oldling.GetFirstNameNoTooltip], sempre bom com as palavras, estava claramente ansioso por este momento: seu discurso rapidamente descamba para uma elaborada metáfora da vida [relative.Custom('ES_DelDela')] [relative.Custom('GetBrideGroom')] que talvez seja pouco menos que condescendentemente paternalista."
 ep2_wedding_ewan.0061.desc.skill.learning: "Fazendo prova de sua erudição, o discurso de [oldling.GetFirstNameNoTooltip] é uma miscelânea de referências literárias e piadas filosóficas de alto nível, que só ocasionalmente faz uma pausa para anedotas embaraçosas da infância de [relative.Custom('ES_DelDela')] [relative.Custom('GetBrideGroom')]."
 ep2_wedding_ewan.0061.desc.old: "O discurso de [oldling.GetFirstNameNoTooltip], que não é exatamente ágil para sua idade, digamos, é uma mistura confusa dos momentos mais humilhantes e comoventes da infância de [relative.Custom('ES_DelDela')] [relative.Custom('GetBrideGroom')] e de como as coisas costumavam #EMP solían#! ser naquele tempo."
 ep2_wedding_ewan.0061.desc.very_old: "[oldling.GetFirstNameNoTooltip], que já é mais velh[oldling.Custom('ES_OA')] que Matusalém, tem uma #EMP plétora#! de anedotas sobre [relative.Custom('ES_ElLa')] [relative.Custom('GetBrideGroom')] que desenterrar. E isso é, em essência, o que ele faz. Não há muito fio condutor, apenas um torrente de lembranças da infância e piadas internas da família."
 ep2_wedding_ewan.0061.desc.outro: "\n\nParece que [relative.GetFirstNameNoTooltip] quer morrer."
 ep2_wedding_ewan.0061.a: "Obrigado, [oldling.GetFirstNameNoTooltip], por este #EMP encantador discurso#!…"
 ep2_wedding_ewan.0061.b: "Comece a aplaudir educadamente para interromper ."
 ep2_wedding_ewan.0061.b.tt.success: "Você faz [oldling.GetFirstNameNoTooltip] parar."
 ep2_wedding_ewan.0061.b.tt.failure: "[oldling.GetSheHe|U] continua mesmo assim."
 ep2_wedding_ewan.0061.c: "Sorria e aguente."
 ep2_wedding_ewan.0061.d: "[oldling.Custom('ES_LoLa')|l] ovaciona e pede mais aos gritos."
 ep2_wedding_ewan.0061.d.tt.crit_success: "[oldling.GetFirstNameNoTooltip] começa uma história #EMP longa#!"
 ep2_wedding_ewan.0061.d.tt.success: "[oldling.GetFirstNameNoTooltip] se anima."
 ep2_wedding_ewan.0061.e: "Incentive [oldling.GetFirstNameNoTooltip] a continuar."
 ep2_wedding_ewan.0061.e.tt.crit_success: "$ep2_wedding_ewan.0061.d.tt.crit_success$"
 ep2_wedding_ewan.0061.e.tt.success: "$ep2_wedding_ewan.0061.d.tt.success$"
 ep2_wedding_ewan.0061.e.tt.failure: "[oldling.GetFirstNameNoTooltip] continua falando por mais alguns minutos."
 ep2_wedding_ewan.0061.f: "Pare de prestar atenção"
 ep2_wedding_ewan.0071.t: "Juramento em Momento"
 ep2_wedding_ewan.0071.desc: "\"[ROOT.Char.GetFirstNameNoTooltip]\", murmura meu senhor[liege.Custom('ES_XA')] [liege.GetTitledFirstName|l], \"sempre gostei bastante de você. Você se esforça muito para chamar minha atenção, e sua fama se espalha por [liege.GetPrimaryTitle.GetNameNoTier] como os galhos de uma árvore que oferece sombra.\"\n\nAssinto com a cabeça, presumindo que [liege.Custom('ES_ElLa')] [liege.GetWomanMan|l] está um pouco animad[liege.Custom('ES_OA')] com as festividades, pois não para de falar.\n\n\"Tenho uma proposta a fazer: você gosta de me agradar, e eu gosto de ser associado a você. Que tal falar bem de mim para seus admiradores e, em troca, eu faço saber que você conta com meu interesse especial?\"."
 ep2_wedding_ewan.0071.a: "Parece mais do que uma troca justa para mim!"
 ep2_wedding_ewan.0071.b: "Obrigado, mas não, obrigado."
