 ##### WEDDING #####
 ### ACTIVITY
 activity_wedding: "Grande Casamento"
 activity_wedding_selection_tooltip: "Faça um [GetActivityType('activity_wedding').GetName|l], uma magnífica celebração da união de um casal\n\nRecompensas previstas:\n$BULLET_WITH_TAB$[prestige|EU] [prestige_i]\n$BULLET_WITH_TAB$[opinion|EU] [opinion_i]\n$BULLET_WITH_TAB$ Perda de [stress|El] [stress_loss_i]"
 activity_wedding_desc: "Uma celebração grandiosa da união de um casal.\n\nMas não se trata apenas de uma cerimônia nupcial; é uma demonstração pública de influência, um evento social em que a nobreza se reúne para praticar as artes da diplomacia, da sedução e do assassinato… ou para compartilhar uma bebida com os amigos!"
 activity_wedding_host_desc: "$BULLET_WITH_TAB$Os [spouses|lE] selecionados se [Concept( 'married', 'casam' )|E]
$BULLET_WITH_TAB$[prestige_i|E] [prestige|E]
$BULLET_WITH_TAB$[legitimacy_i] [legitimacy|E]
$BULLET_WITH_TAB$[opinion|E] dos convidados
$BULLET_WITH_TAB$[GetVassalStance( 'courtly' ).GetTextIcon][GetVassalStance( 'courtly' ).GetName] [vassals|E] [opinion|E]
$BULLET_WITH_TAB$É possível ganhar [trait_level_track_xp|lE] de [GetTrait('lifestyle_reveler').GetName( GetNullCharacter )]
$BULLET_WITH_TAB$É possível perder [stress_loss_i][stress|E]
$BULLET_WITH_TAB$É possível ganhar [GetModifier( 'gwedding_magnificent_host_modifier' ).GetNameWithTooltip|L]
$BULLET_WITH_TAB$É possível ganhar [GetModifier( 'gwedding_gracious_host_modifier' ).GetNameWithTooltip|L]"
