l_spanish:
 travel_walking_modifier: "Caminhando"
 travel_walking_modifier_desc: "Você está sem montarias e seguindo a pé em direção ao seu destino"
 travel_guide_modifier: "Guia Local"
 travel_guide_modifier_desc: "Você contratou um guia local para ajudá-lo na navegação"
 temporary_travel_character_limit_tt: "e voltará a ser um [wanderer|El] imediatamente quando a [travel|El]"
 #New Travel Options
 experienced_captains_option: "Contratar Capitães Experientes"
 experienced_captains_option_desc: "Você enviará uma mensagem em busca de capitães experientes para se juntarem ao seu séquito, reduzindo significativamente o perigo de viajar pelo mar e oceano."
 captain_recruited.t: "Capitão Contratado"
 captain_recruited.tt: "Um marinheiro com o traço de [GetTrait('forder').GetName( GetNullCharacter )|l] se juntará ao seu séquito $temporary_travel_character_limit_tt$"
 hire_experienced_mercenaries_option: "Contratar Guardas Mercenários"
 hire_experienced_mercenaries_option_desc: "Você contratará mercenários experientes para se juntarem ao seu séquito como guardas, aumentando a segurança e a velocidade geral."
 mercenary_leader.t: "Capitão Mercenário Contratado"
 mercenary_leader_recruited.tt: "Um capitão [mercenary|lE] se juntará à sua comitiva $temporary_travel_character_limit_tt$"
 available_mercenary.tt: "Há um [mercenary|lE] disponível e não contratado dentro do alcance"
 hire_jungle_expert_option: "Contratar Caçador de Selva"
 hire_jungle_expert_option_desc: "Você enviará uma mensagem em busca de especialistas em terrenos de selva para se juntarem ao seu séquito, reduzindo significativamente o perigo de viajar por terrenos de selva."
 jungle_stalker_recruited.t: "Caçador de Selva Contratado"
 jungle_stalker_recruited.tt: "Um guia com o traço de [GetTrait('jungle_stalker').GetName( GetNullCharacter )|l] se juntará ao seu séquito $temporary_travel_character_limit_tt$"
 hire_mountaineer_option: "Contratar Montanhista"
 hire_mountaineer_option_desc: "Você enviará uma mensagem em busca de especialistas em terrenos montanhosos para se juntarem ao seu séquito, reduzindo significativamente o perigo de viajar por picos altos."
 mountaineer_recruited.t: "Montanhista Contratado"
 mountaineer_recruited.tt: "Um guia com o traço de [GetTrait('rough_terrain_expert').GetName( GetNullCharacter )|l] se juntará ao seu séquito $temporary_travel_character_limit_tt$"
 hire_forder_option: "Contratar Especialista em Terrenos Alagados"
 hire_forder_option_desc: "Você enviará uma mensagem em busca de especialistas em terrenos alagados para se juntarem ao seu séquito, reduzindo significativamente o perigo de viajar por terrenos alagados e planícies inundáveis."
 forder_recruited.t: "Especialista em Terrenos Alagados Contratado"
 forder_recruited.tt: "Um guia com o traço de [GetTrait('forder').GetName( GetNullCharacter )|l] se juntará ao seu séquito $temporary_travel_character_limit_tt$"
 wetlands_danger_reduction.tt: "[travel_danger|E] de [travel|lE] em províncias com terreno pantanoso ou planícies aluviais: @travel_danger_icon!#P -25#!"
 hire_rough_terrain_expert_option: "Contratar Guia de Floresta"
 hire_rough_terrain_expert_option_desc: "Você enviará uma mensagem em busca de especialistas em terrenos florestais para se juntarem ao seu séquito, reduzindo significativamente o perigo de viajar por florestas."
 rough_terrain_expert_recruited.t: "Guia de Floresta Contratado"
 rough_terrain_expert_recruited.tt: "Um guia com o atributo de [GetTrait('forest_fighter').GetName( GetNullCharacter )|l] se juntará ao seu séquito $temporary_travel_character_limit_tt$"
 hire_desert_warrior_option: "Contratar Guerreiro do Deserto"
 hire_desert_warrior_option_desc: "Você enviará uma mensagem em busca de especialistas em terrenos desérticos para se juntarem ao seu séquito, reduzindo significativamente o perigo de viajar por terras secas e áridas."
 desert_warrior_recruited.t: "Guerreiro do Deserto Contratado"
 desert_warrior_recruited.tt: "Um guia com o traço de [GetTrait('desert_warrior').GetName( GetNullCharacter )|l] se juntará ao seu séquito $temporary_travel_character_limit_tt$"
 court_physician_option: "Trazer Equipamento Médico"
 court_physician_option_suffix: "#weak (solo contra pestes)#!"
 court_physician_option_desc: "Você trará um suprimento saudável de equipamentos médicos em sua jornada para reduzir o [travel_danger|lE] causado por [epidemics|lE]."
 court_physician_option_tt: "Você deve empregar um [GetCourtPositionType('court_physician_court_position').GetName|l] elegível para viagens"
 cultural_ambassador_option: "Contratar Embaixador Cultural"
 cultural_ambassador_option_desc: "Você contratará alguém para servir como Embaixador Cultural em sua jornada, disseminando informações sobre sua cultura para todos os condados pelos quais você passar."
 cultural_ambassador_recruited.t: "Embaixador Cultural Contratado"
 cultural_ambassador_recruited.tt: "Será recrutado para o seu séquito um embaixador cultural com alta [diplomacy|El] $temporary_travel_character_limit_tt$"
 fancy_mounts_option: "Montarias Superiores"
 fancy_mounts_option_desc: "Seus estábulos experientes equipam seu séquito com as melhores montarias de todo o reino."
 military_recruits_option: "Treinar Cavaleiros"
 military_recruits_option_desc: "Você leva consigo seus cavaleiros mais fracos para treinar e aprender com os desafios enfrentados na estrada aberta."
 military_recruits_option.t: "Cavaleiro se Junta ao Séquito"
 military_recruits_option.desc: "Seus cavaleiros menos habilidosos foram adicionados ao seu séquito porque você escolheu a opção de viagem $military_recruits_option$."
 travel_events.0060.notification.a: "Melhoria no Traço do Cavaleiro: [selected_knight.GetShortUIName]"
 travel_events.0060.notification_desc: "[selected_knight.GetShortUIName] aumentou sua habilidade como resultado da experiência adquirida ao viajar em seu séquito."
 travel_events.0060.notification.b: "Cavaleiro #EMP Muito Aprimorado#!"
 travel_events.0060.notification.c: "Cavaleiro Aprimorado"
 travel_events.0060.notification.d: "Cavaleiro Ganhou Glória"
 superior_armaments_option: "Armaduras Superiores"
 superior_armaments_option_desc: "Seus ferreiros superiores equipam seu séquito com os melhores equipamentos e preparações para a jornada."
 anxious_option: "Apresse-se"
 anxious_option_desc: "O mundo é um lugar escuro e perigoso; é melhor apressar a jornada o máximo possível."
 circumspect_option: "Cauteloso"
 circumspect_option_desc: "Nunca deixe-os saber qual será seu próximo movimento."
 purchase_rough_terrain_gear_option: "Comprar Equipamento de Explorador"
 purchase_rough_terrain_gear_option_desc: "Atravessar montanhas e pântanos é um desafio — para os despreparados! Você comprará ganchos de escalada, cordas extras e todos os tipos de equipamentos necessários para atravessar o caminho mais traiçoeiro."
 purchase_desert_gear_option: "Comprar Kit de Explorador de Áreas Áridas"
 purchase_desert_gear_option_desc: "Você comprará véus para proteger o rosto da areia e camelos resistentes para ajudar na jornada."
 purchase_forest_gear_option: "Comprar Kit de Sobrevivência na Floresta"
 purchase_forest_gear_option_desc: "A floresta não tem dono — mas você a dominará com facões, serras, machados e #EMP muita#! graxa extra para as rodas!"
 adventurers_encourage_relationships_option: "Incentivar Relacionamentos"
 adventurers_encourage_relationships_option_desc: "Vínculos verdadeiros e duradouros não podem ser forçados; eles surgem de dificuldades compartilhadas. A estrada pode ser uma companheira cruel, mas para cada desafio superado, um novo relacionamento pode ser forjado."
 adventurers_encourage_relationships_option.tt: "Tus [followers|lE] pueden formar [friendships|lE] espontáneamente, convertirse en [lovers|lE] o [Concept('marry', 'casarse')|E], ya sea entre ellos o con [wanderers|lE] según [Concept('travel', 'viajáis')|E] por [baronies|lE]. Toda relación formada así te dará [prestige|lE] [prestige_i].\n#weak (Tus [children|lE], [spouses|lE] u otros por que te importen no se [Concept('marry', 'casarán')|E] ni tomarán [lovers|lE]. Esto no provocará que los [followers|lE] se vuelvan [GetTrait('adulterer').GetName( GetNullCharacter )]s.)#!"
 ep3_travel_option_events.0002.title: "Seu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('courtier_to_marry'))] [courtier_to_marry.GetFirstName] se casou com [marriage_material.GetFirstName]"
 ep3_travel_option_events.0003.title: "Seu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('courtier_to_befriend'))] [courtier_to_marry.GetFirstName] fez amizade com [friend_target.GetFirstName]"
 ep3_travel_option_events.0004.title: "Seu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('courtier_to_love'))] [courtier_to_love.GetFirstName] e [pls_love_me.GetFirstName] tornaram-se amantes"
 adventurers_search_for_secrets_option: "Procurar por Segredos"
 adventurers_search_for_secrets_option_desc: "Rumores são um mapa para um tesouro de segredos — mas é preciso uma mente astuta para segui-los, X marca o local!"
 adventurers_search_for_secrets_option.tt: "Ao passar por um [barony|lE], você pode descobrir um [secret|lE] de alguém que reside lá\n #weak (Chance % igual a sua [intrigue_i])#!"
 adventurers_search_for_secrets_option.title: "[GetTravelOption('adventurers_search_for_secrets_option').GetName] Bem-sucedido!"
 adventurers_proselytize_zealously_option: "Proselitismo aos Locais"
 adventurers_proselytize_zealously_option_desc: "Nos confins do mundo, eles ainda não ouviram falar da verdadeira fé. É nosso dever sagrado remediar isso."
 adventurers_proselytize_zealously_option.tt: "Al atravesar una [barony|lE], puedes convertir a tu [faith|lE] a un [wanderer|lE] que viva allí y ganar [piety|lE] [piety_i]\n#weak (% de probabilidad equivalente a tu [learning_i])#!"
 adventurers_proselytize_zealously_option.title: "[wanderer_to_convert.GetShortUIName] se converte para [ROOT.Char.GetFaith.GetName|l]!"
 adventurers_gather_inspiration_option: "Buscar Inspiração"
 adventurers_gather_inspiration_option_desc: "Há muita inspiração para encontrar na estrada — belas paisagens, pontos turísticos impressionantes e pessoas notáveis para conhecer. Isso realmente agita a fonte de inspiração da mente!"
 adventurers_gather_inspiration_option.tt: "Ao passar por uma [barony|lE], um [follower|lE] escolhido aleatoriamente tem uma chance de se tornar [inspired|lE]\n#weak (% de probabilidade equivalente a um sexto de sua [stewardship_i])#!"
 adventurers_gather_inspiration_option.title: "Seu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('inspired_follower'))] [inspired_follower.GetFirstName] recebe inspiração!"
 adventurers_gather_inspiration_option.effect: "[inspired_follower.GetUIName] recebeu a [inspired_follower.GetCurrentInspiration.GetName] - [inspired_follower.Custom('InspirationTypeDescriptionFuturePresent')].\n\n[inspired_follower.Custom('InspiredPersonQuality')]"
 adventurers_make_local_deals_option: "Negociação de Alto Risco"
 adventurers_make_local_deals_option_desc: "Há #EMP sempre#! um negócio a ser feito. Se as pessoas conhecem você, elas confiam em você e estão dispostas a negociar. Infelizmente, isso também significa que os bandidos sabem #EMP exatamente#! quem atacar..."
 adventurers_make_local_deals_option.tt: "Ao passar por uma [barony|lE], você recebe #V 25 %#! do valor do [loot|lE] da posse em [gold|lE] [gold_i]\n#weak (só é possível ganhar ouro uma vez por posse)#!"
 adventurers_scout_for_talent_option: "Procurar por Talentos"
 adventurers_scout_for_talent_option_desc: "Há muitas figuras cansadas do mundo para encontrar durante suas viagens — alguns deles certamente estarão em busca de emprego!"
 adventurers_scout_for_talent_option.tt: "Habilita eventos para recrutar [wanderers|lE] por [gold_i][gold|lE] se você tiver posições abertas para [officers|lE]"
 excellent.aptitude_tt: "A [aptitude|lE] de [local_character.GetUIName] é $aptitude_excellent$"
 good.aptitude_tt: "A [aptitude|lE] de [local_character.GetUIName] é $aptitude_good$"
 average.aptitude_tt: "A [aptitude|lE] de [local_character.GetUIName] é $aptitude_average$"
 poor.aptitude_tt: "A [aptitude|lE] de [local_character.GetUIName] é $aptitude_poor$"
 terrible.aptitude_tt: "A [aptitude|lE] de [local_character.GetUIName] é $aptitude_terrible$"
 ep3_travel_option_events.0001.t: "$adventurers_scout_for_talent_option$: Um Seguidor Disposto"
 ep3_travel_option_events.0001.intro: "Me deparo com um[local_character.Custom('ES_XA')] [local_character.GetWomanMan] ao passar por [location.GetTitle.GetNameNoTier]. É [ROOT.Char.Custom2('QuirkAdjectivePosOrNeg', SCOPE.sC('local_character'))] e está [ROOT.Char.Custom2('QuirkPresentPosOrNeg', SCOPE.sC('local_character'))] quando me aproximo.\n\n"
 ep3_travel_option_events.0001.court_physician_court_position: ""[local_character.GetFaith.HighGodName|U] esteja com vocês. Sou [local_character.GetFullName]; [local_character.Custom('ES_ElLa')] curandeir[local_character.Custom('ES_OA')] e herbalista residente de [location.GetNameNoTooltip]. Os moradores locais recorrem a mim para tratar o que os aflige: ossos quebrados, erupções na pele, e de vez em quando até trago crianças ao mundo. Minha paixão pela saúde e pelos humores me enche de uma ânsia de percorrer o mundo; desejo explorar".\n\n"
 ep3_travel_option_events.0001.bodyguard_court_position: "\"Olá, meu nome é [local_character.GetFullName]. Eu sei como quebrar a cara das pessoas. E sou muito bom nisso. Derrubei o mestre das cavalariças com um soco só na briga de ontem à noite.\"\n\n"
 ep3_travel_option_events.0001.travel_leader_court_position: "«¡Hola! ¿Os habéis perdido, viajer[ROOT.Char.Custom('ES_OA')]? Me llamo [local_character.GetFullName] y conozco bien estas tierras. Conduzco todos los días a mis ovejas por tan bellas/os [location.Custom('GetTerrainTypePlural')|l], pero mi corazón pertenece a los caminos lejanos. Ser [Select_CString(local_character.IsFemale, 'una exploradora', 'un batidor' )], un[local_character.Custom('ES_XA')] guía; ese es mi sueño».\n\n"
 ep3_travel_option_events.0001.second_camp_officer: "\"Saudações, meu nome é [local_character.GetFullName]. Supervisiono a carga dos carros no mercado de [location.GetNameNoTooltip] há anos. Organizei dezenas de camponeses nos moinhos locais. Sim, o que eu ainda não fiz...\"\n\n"
 ep3_travel_option_events.0001.quartermaster_camp_officer: "\"Organizei os armazéns de [location.GetNameNoTooltip] meticulosamente, mantenho listas e registros para contabilizar cada maçã, cebola e grão. Mas ficar aqui me entedia.\"\n\n"
 ep3_travel_option_events.0001.armorer_camp_officer: "\"Trabalho nas forjas, reparando malhas e placas para a guarnição de [location.GetNameNoTooltip]. Embora sempre haja trabalho, sinto o chamado da estrada há muito tempo.\"\n\n"
 ep3_travel_option_events.0001.chief_forager_camp_officer: ""Sou [local_character.GetFullName]. Passo os dias nos/as [location.Custom('GetTerrainTypePlural')|l], explorando [location.Custom('GetProvinceFoliageDesc')|l] e [location.Custom('GetProvinceGroundDesc')|l] em busca de [local_character.Custom('RegionalRootVegetablePlural')|l] e ovos de [local_character.Custom('GetRandomRegionalWildDaytimeBird')]. Levo minhas descobertas ao mercado de [location.GetNameNoTooltip] e os vendo a viajantes e vagabundos".\n\n"
 ep3_travel_option_events.0001.master_thief_camp_officer: "\"Melhor ficar de olho na sua bolsa de moedas, há muitos batedores de carteira por essas bandas. Claro, eu nunca roubaria de alguém como você... não, minha mente é astuta, e prefiro mirar em riquezas distantes.\"\n\n"
 ep3_travel_option_events.0001.head_porter_camp_officer: "«Saludos, me llamo [local_character.GetFullName]. Soy portador[local_character.Custom('ES_XA')]. Me gusta pensar que llevo todo el peso de [location.GetNameNoTooltip] a las espaldas, ¡jua, jua! Empaqueto y transporto objetos de toda clase: cerámica, comestibles, armas, lo que se os ocurra».\n\n"
 ep3_travel_option_events.0001.head_groom_camp_officer: "[local_character.GetFaith.HighGodName|U] que o Altíssimo esteja convosco. Meu nome é [local_character.GetFullName] e sou encarregado[local_character.Custom('ES_OA')] dos estábulos aqui em [location.GetNameNoTooltip]. Cuido de dezenas de animais, ajudo no nascimento de potros e restauro as selas gastas e outros equipamentos equestres.\n\n"
 ep3_travel_option_events.0001.huntperson_camp_officer: ""Seja bem-vind[ROOT.Char.Custom('ES_OA')]. Sou caçador[local_character.Custom('ES_XA')], meu nome é [local_character.GetFullName] e nos/as [location.Custom('GetTerrainTypePlural')] de [location.GetNameNoTooltip] é onde busco minhas presas. O/A [location.Custom('TerrainTypeProvince')] abriga muitos animais e todos eles são minhas presas: [local_character.Custom('GetRegionalDeerType')] e [local_character.Custom('GetRandomRegionalSmallGame')] e [local_character.Custom('GetRandomRegionalWildDaytimeBird')]".\n\n"
 ep3_travel_option_events.0001.kennelperson_camp_officer: "\"Olá, eu sou [local_character.GetFullName], cuido do canil aqui em [location.GetNameNoTooltip]. Os melhores amigos do homem, assim os chamo; meus cães, meus filhotes [local_character.Custom('ComplimentAdjective')]. Eu os treino, cuido deles, os preparo para a caça — companheiros leais como nenhum outro, eu prometo!\"\n\n"
 ep3_travel_option_events.0001.chief_engineer_camp_officer: "\"Construí catapultas nas oficinas de [location.GetNameNoTooltip], trabalhando dia e noite durante meses! Carregando troncos, apertando molas, martelando engrenagens... agora anseio pela estrada.\"\n\n"
 ep3_travel_option_events.0001.witness_camp_officer: "Ah, vejo como sois grandioso! Quão esplêndido é o vosso acampamento! Este lugar, [location.GetNameNoTooltip], costumava ser bom, mas não mais, e quero ir embora. Vós sois obviamente [ROOT.Char.Custom('ComplimentAdjective')], [ROOT.Char.Custom( 'RomanticComplimentAdjective')], um verdadeiro exemplo de [ROOT.Char.Custom('RomanticComplimentNoun')]!\n\n"
 ep3_travel_option_events.0001.person_haggler_camp_officer: "«Soy [local_character.GetFullName], [Select_CString(local_character.IsFemale, 'la carcelera', 'el carcelero' )]… Trabajo en los calabozos de [location.GetNameNoTooltip], donde me ocupo de los prisioneros. Negocio su libertad, los alimento, limpio, visto y transporto cuando se paga el rescate».\n\n"
 ep3_travel_option_events.0001.camp_cook_camp_officer: ""Olá, [ROOT.Char.Custom('RomanticComplimentNoun')], estais com fome? Vedes que sou cozinheir[local_character.Custom('ES_OA')]. Trabalho na taberna local. Vocês não acreditariam no que se pode fazer com [local_character.Custom('RegionalRootVegetablePlural')] e [local_character.Custom('GetRandomRegionalSmallGame')]! Mas, ah, como eu gostaria de trabalhar com ingredientes mais exóticos…".\n\n"
 ep3_travel_option_events.0001.master_bard_camp_officer: ""Saudações, meu nome é [local_character.GetFullName] [local_character.Custom('ES_ElLa')] [local_character.Custom('ComplimentAdjective')]! Eu toco e canto nas tavernas locais, mas a vontade de viajar enche meu coração! Preciso escapar deste lugar e ir para onde o mundo possa ouvir minha música!".\n\n"
 ep3_travel_option_events.0001.stooge_camp_officer: "«¡Estoy cansad[local_character.Custom('ES_OA')] de recibir más patadas que un perro! Aquí nadie me respeta, todos se ríen en cuanto se dice \"[local_character.GetFullName]\", ¡necios! ¡Prole de [local_character.Custom2('InsultNoun', ROOT.Char)] y [ROOT.Char.Custom2('InsultNoun', ROOT.Char)]! #EMP Arrg, estoy tan furios[local_character.Custom('ES_OA')], ¡tengo que salir de aquí!#!».\n\n"
 ep3_travel_option_events.0001.master_of_arms_camp_officer: "«¡Firmes! Soy [local_character.GetFullName], [Select_CString(local_character.IsFemale, 'la capitana', 'el capitán' )] de la guardia de la guarnición de [location.GetNameNoTooltip]. Meto en cintura a los mocosos, los pongo en forma y organizo los turnos de guardia. Todos confían en que les diga qué han de hacer».\n\n"
 ep3_travel_option_events.0001.light_cavalry_captain_camp_officer: ""[local_character.GetFaith.HighGodName|U] esteja convosco, sou [local_character.GetFullName]. Sou explorador[local_character.Custom('ES_XA')] e mensageiro[local_character.Custom('ES_OA')] e cavaleiro; meu coração pertence à natureza, longe da escória de cidades e vilas".\n\n"
 ep3_travel_option_events.0001.camelry_captain_camp_officer: ""Os camelos são minha vida. Eu os levei à batalha inúmeras vezes, ninguém foi capaz de resistir aos \"camelos conquistadores de '[local_character.GetFullName]\"! Desejo voltar a ver o mundo, desejo conquistar novamente!".\n\n"
 ep3_travel_option_events.0001.elephantry_captain_camp_officer: "\"Saudações, meu nome é [local_character.GetFullName]. Cuido das grandes bestas que conhecemos como elefantes, eu os preparo e alimento. Não há carga mais mortal do que a de um desses gigantes com presas.\"\n\n"
 ep3_travel_option_events.0001.heavy_cavalry_captain_camp_officer: "\"Eu sou [local_character.GetFullName], e servi como [local_character.Custom('KnightCultureNoTooltipLowercase')] na guarda de [location.GetNameNoTooltip], totalmente armado e com um cavalo encapuzado já enfrentei inúmeros inimigos do reino.\"\n\n"
 ep3_travel_option_events.0001.horse_archer_captain_camp_officer: ""Sou [local_character.GetFullName] e vivi na sela desde que era um[local_character.Custom('ES_XA')] moleque[local_character.Custom('ES_OA')]. [local_character.GetFaith.HighGodName|U] me abençoou com destreza, resistência e tenacidade. Tudo de que preciso é um arco e um cavalo".\n\n"
 ep3_travel_option_events.0001.archer_captain_camp_officer: "«Saludos, soy [local_character.GetFullName], [local_character.Custom('ES_ElLa')] vigilante; examino los/las [location.Custom('GetTerrainTypePlural')|l] de [location.GetNameNoTooltip] desde lo alto de mi torre. Si se acercan forajidos, mi arco habla por mí. Pero me he cansado de esta vida sedentaria, ¡deseo ir más lejos de lo que han llegado mis flechas!».\n\n"
 ep3_travel_option_events.0001.heavy_infantry_captain_camp_officer: "\"Saudações, meu nome é [local_character.GetFullName]. Visto uma armadura pesada e um escudo a serviço da guarnição de [location.GetNameNoTooltip]. Tenho feito isso há alguns anos, mas a última flecha passou bem perto de me matar, e comecei a pensar que há mais na vida.\"\n\n"
 ep3_travel_option_events.0001.light_infantry_captain_camp_officer: ""Sou [local_character.GetFullName], [local_character.GetWomanMan] de armas na guarnição de [location.GetNameNoTooltip]. Bater e correr, lançar uma azagaia, pegar um broquel e uma adaga — e então partir para o ataque. Sirvo aqui há tempo suficiente; o mundo tem mais a oferecer".\n\n"
 ep3_travel_option_events.0001.pike_captain_camp_officer: "“Sirvo há anos como lanceiro[local_character.Custom('ES_OA')] na guarnição de [location.GetNameNoTooltip]. Sei como as coisas são feitas: entrincheirar-se, enfrentar o inimigo e aguardar a carga com uma vontade de ferro.”\n\n"
 ep3_travel_option_events.0001.master_of_spoils_camp_officer: "«Hola, soy [local_character.GetFullName]. Me he cansado de estar sol[local_character.Custom('ES_OA')] mientras robo a la gente por los caminos. El oro no tiene nada de divertido si no se puede compartir con nadie… Y vuestra banda y vos parecéis bastante duros».\n\n"
 ep3_travel_option_events.0001.fallback: "\"Olá, eu sou [local_character.GetFullName]. Estou cansado de vagar sozinho por estas terras. Fiz muitos bicos, mas desejo me estabelecer daqui em diante.\"\n\n"
 ep3_travel_option_events.0001.excellent: ""Domino minha arte", diz com convicção. "Comigo ao seu lado, você será invencível"."
 ep3_travel_option_events.0001.good: ""Minhas habilidades podem ser úteis para você", continua. "Vamos falar sobre o pagamento?"."
 ep3_travel_option_events.0001.average: ""Eu estaria dispost[local_character.Custom('ES_OA')] a me juntar ao vosso acampamento", continua [local_character.GetSheHe]. "Algumas moedas bastarão para me convencer a deixar este lugar"."
 ep3_travel_option_events.0001.poor: ""Posso n?o ser [local_character.Custom('ES_ElLa')] melhor, mas estou dispost[local_character.Custom('ES_OA')]", diz [local_character.GetSheHe]. "Por umas poucas pe?as de ouro, me juntarei ao seu acampamento.""
 ep3_travel_option_events.0001.terrible: ""Tende piedade de mim, um[local_character.Custom('ES_XA')] pobre incapaz!", se humilha. "Farei qualquer coisa por uma moeda — até esvaziarei as latrinas com um #EMP sonrisa#!""
 ep3_travel_option_events.0001.a: "Vou te pagar com prazer para se juntar ao meu grupo!"
 ep3_travel_option_events.0001.provisions: "Só posso te pagar com comida e roupas."
 ep3_travel_option_events.0001.b: "Cai fora e não volte, [local_character.Custom2('InsultNoun', ROOT.Char)] inútil."
 estate_mounts_option: "Cavalos Magníficos"
