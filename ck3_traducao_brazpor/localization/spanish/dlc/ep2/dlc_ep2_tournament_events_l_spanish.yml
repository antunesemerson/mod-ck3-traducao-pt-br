l_spanish:
 ep2_tournament_events.0001.t: "$tournament_versus_header$ Um Combatente Aflito"
 ep2_tournament_events.0001.desc: "Estou tirando um pouco da sujeira dos olhos e me recomponho enquanto os gritos da multidão ecoam ao meu redor. [versus_contestant.GetFirstName] está um pouco distante; nos afastamos brevemente para recuperar o fôlego.\n\nO alvoroço dos espectadores se acalma um pouco quando começamos a circular lentamente um ao outro. Um movimento em falso poderia acabar com esta luta num instante. Os olhos de [versus_contestant.GetFirstNameNoTooltip] se estreitam quase imperceptivelmente.\n\nEnquanto giramos em volta, noto uma pequena nuvem de poeira se levantar sob o pé direito de [versus_contestant.GetFirstNameNoTooltip] a cada passo que dá. Será que ele está... mancando um pouco?"
 ep2_tournament_events.0001.a: "Se eu desviar para a direita aqui, vou descobrir..."
 ep2_tournament_events.0001.b: "\"Hah! Agora eu tenho você!\""
 ep2_tournament_events.0001.c: "É um blefe de [versus_contestant.GetFirstNameNoTooltip]. Lutarei do meu jeito."
 ep2_tournament_events.0001.a.tt: "Seu movimento determina se seu oponente está blefando ou não"
 ep2_tournament_events.0001.b.tt.win: "[versus_contestant.GetFirstNameNoTooltip] tem um ferimento na perna"
 ep2_tournament_events.0001.b.tt.lose: "[versus_contestant.GetFirstNameNoTooltip] estava blefando"
 ep2_tournament_events.0002.t: "$tournament_versus_header$ Jogando para a Multidão"
 ep2_tournament_events.0002.desc: "#EMP Zas!#!\n\nMeu corpo se choca contra a parede de madeira na borda da arena, onde [versus_contestant.GetFirstName] me lançou com um rosnado. Assim que faz isso, o rosto de [versus_contestant.GetFirstNameNoTooltip] se transforma em um sorriso presunçoso e, para meu espanto, ele se vira completamente para longe de mim.\n\nErgue os braços para a multidão que vaia e os flexiona, imitando um[versus_contestant.Custom('ES_XA')] fort[versus_contestant.Custom('ES_OA')] ambulante. Os aplausos da multidão se intensificam; esses camponeses volúveis estão adorando!"
 ep2_tournament_events.0002.a: "#EMP Assim#! é um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] #EMP de verdade#!!"
 ep2_tournament_events.0002.b: "Enfrente-me, covarde!"
 ep2_tournament_events.0002.c: "Vou ensiná-lo a me dar as costas!"
 ep2_tournament_events.0002.a.tt: "Flexione-se para a multidão!"
 ep2_tournament_events.0002.c.tt: "Ataque-os por trás"
 ep2_tournament_events.0003.t: "$tournament_versus_header$ Clemência Contestada"
 ep2_tournament_events.0003.desc: "A poeira se levanta ao redor do corpo de [versus_contestant.GetFirstName] enquanto cai de costas na terra. Estou vencendo esta luta, e todo mundo sabe disso.\n\nEm meio à cacofonia da multidão, [versus_contestant.GetFirstName] se arrasta até os joelhos e estende os dois braços.\n\n\"Chega! Já tive o suficiente. Nada mais.\" grita."
 ep2_tournament_events.0003.desc.dread: "Posso perceber pelos tremores no seu corpo que não é apenas minha habilidade que causa tamanha perda de luta. [versus_contestant.GetFirstNameNoTooltip] teme a mim."
 ep2_tournament_events.0003.desc.wounded: "A dor está claramente estampada no rosto de [versus_contestant.GetFirstNameNoTooltip]. Não é um[versus_contestant.Custom('ES_XA')] covarde, mas seria tolice continuar."
 ep2_tournament_events.0003.desc.craven: "Embora as feridas de [versus_contestant.GetFirstNameNoTooltip] neste torneio sejam evidentes, a forma como evita meus olhos e treme enquanto implora denuncia o verdadeiro motivo da rendição: simples covardia."
 ep2_tournament_events.0003.a: "Você é um covarde e uma vergonha!"
 ep2_tournament_events.0003.b: "Eu entendo. Por favor, levante-se; essa luta acabou."
 ep2_tournament_events.0003.c: "Seus ferimentos parecem sérios. Vamos encontrar um médico para você."
 ep2_tournament_events.0003.d: "Nunca me desafie novamente!"
 ep2_tournament_events.0003.e: "Você deve se orgulhar de sua luta, [versus_contestant.GetFirstNameNoTooltip]."
 ep2_tournament_events.0004.t: "$tournament_versus_header$ Morte Vinda de Cima"
 ep2_tournament_events.0004.desc: "Minha espada se choca com a do meu oponente, [versus_contestant.GetFirstName], e faíscas saltam quando as duas armas se chocam. Damos um passo atrás, girando para a esquerda.\n\n[versus_contestant.GetFirstNameNoTooltip] me atinge, a ponta da espada bate no chão depois de passar perto do meu corpo. Rápido como uma víbora, avanço e dou-lhe um chute com toda a força que posso. Arrancada de sua mão, a espada de [versus_contestant.GetFirstNameNoTooltip] gira pelo ar e cai, para horror de amb[GetPlayer.Custom('ES_OA')] s, entre a multidão!\n\nUm grito agudo corta o ar, e nos apressamos para ver [watching_crowd.GetFirstName] de joelhos, com a espada voadora tendo atingido diretamente seu braço."
 ep2_tournament_events.0004.a: "[versus_contestant.GetFirstNameNoTooltip], como pudestes #EMP fazer#! isso?"
 ep2_tournament_events.0004.b: "[watching_crowd.GetFirstNameNoTooltip]! Você está bem?"
 ep2_tournament_events.0004.b.success: "[watching_crowd.GetFirstNameNoTooltip] aceita suas desculpas"
 ep2_tournament_events.0004.b.failure: "[watching_crowd.GetFirstNameNoTooltip] não te perdoa"
 ep2_tournament_events.0004.c: "Bem, não há tempo a perder..."
 ep2_tournament_events.0004.c.tt: "Golpeie enquanto está distraído[versus_contestant.Custom('ES_OA')]!"
 ep2_tournament_events.0005.t: "$tournament_versus_header$ De Qualquer Maneira"
 ep2_tournament_events.0005.start: "Golpeio e golpeio de novo, arrebentando a guarda de [versus_contestant.GetFirstName]. Um forte empurrão com o ombro o faz deslizar para trás, com as pernas abertas, e vejo uma oportunidade única. Agindo puramente por instinto, balanço a perna em um amplo arco, e o pé se choca contra sua virilha com um pesado #EMP impacto#!.\n\n"
 ep2_tournament_events.0005.eunuch: "Meu golpe seguinte, um movimento contundente, apenas choca contra a arma de [versus_contestant.GetFirstNameNoTooltip]. Isso o força a recuar, mas meus ombros caem ao me lembrar de um detalhe específico sobre [versus_contestant.GetFirstNameNoTooltip]…\n\n“Não adianta muito chutar ali, [ROOT.Char.Custom('FormOfAddressForLiege')]!”, grita [versus_contestant.GetSheHe], balançando a cabeça. “Ao menos não desde que aconteceu.”\n\n #EMP Por supuesto.#! ![versus_contestant.GetFirstNameNoTooltip] é eunuco[versus_contestant.Custom('ES_OA')]!"
 ep2_tournament_events.0005.pain: "[versus_contestant.GetFirstNameNoTooltip] solta um grito entre um suspiro, uma tosse e um gemido. Dedos trêmulos mal seguram a arma enquanto seus olhos imediatamente se fecham de dor. Em questão de segundos, [versus_contestant.GetSheHe] está curvado, mal conseguindo ficar em pé."
 ep2_tournament_events.0005.a: "Hah! Agora eu te peguei!"
 ep2_tournament_events.0005.b: "Oh! Desculpe! Eu não quis fazer isso!"
 ep2_tournament_events.0005.c: "Ah. Sim. Eu tinha esquecido disso."
 ep2_tournament_events.0006.t: "$tournament_versus_header$ Uma Abertura"
 ep2_tournament_events.0006.desc: "O rangido de aço contra aço ecoa pela área enquanto [versus_contestant.GetFirstName] e eu golpeamos um ao outro. Quando [versus_contestant.GetSheHe] recua, eu [versus_contestant.Custom('ES_LoLa')] o sigo, e outro estrondo sonoro de nossas lâminas faz vibrações subirem pelo meu braço.\n\nDe repente, uma chance: [versus_contestant.GetFirstNameNoTooltip] escorrega, seu pé deslizando, e eu enfio o ombro em seu esterno, fazendo-o cair espalhado.\n\n[versus_contestant.GetFirstNameNoTooltip|U] demora a se recuperar e, de repente, minha mente volta aos manuais de treinamento com os quais passei horas aprendendo, e às coisas fantasiosas que eles sugeriam fazer caso surgisse uma clara vantagem.\n\nQuase inconscientemente, começo a desatarraxar o pomo da minha arma…"
 ep2_tournament_events.0006.a: "Finalmente! Uma chance!"
 ep2_tournament_events.0006.a.tt: "Use o cabo como um projétil!"
 ep2_tournament_events.0006.a.toast: "Um cabo lançado atinge seu rosto!"
 ep2_tournament_events.0006.b: "Ataque, canalha!"
 ep2_tournament_events.0006.b.tt: "Melhor chutá-los quando estão caídos!"
 ep2_tournament_events.0006.c: "Melhor que [versus_contestant.GetHerHim] ajude a se levantar."
 ep2_tournament_events.0007.t: "$tournament_versus_header$ Um Centavo Por Seu..."
 ep2_tournament_events.0007.desc: "Há poucas alegrias tão grandes quanto vencer facilmente um duelo. [versus_contestant.GetFirstName|U] recua pelo terreno irregular, mal aparando os golpes da minha arma enquanto avanço. Mais um golpe estrondoso encontra sua guarda, e [versus_contestant.GetSheHe] me agarra pelo braço em desespero. Abro um sorriso distorcido.\n\nEsperem. #EMP Esperem!#! [versus_contestant.GetFirstNameNoTooltip] me sussurra aos gritos enquanto lutamos, com as lâminas ainda presas uma à outra. Escute-me! Preciso dessa vitória! Meu meio gesto de desdém o apavora ainda mais.\n\nParem! Sou um[versus_contestant.Custom('ES_XA')] [versus_contestant.GetWomanMan] ric[versus_contestant.Custom('ES_OA')]. Por favor, posso fazer isso valer a pena para você. Cem moedas para que desista!"
 ep2_tournament_events.0007.a: "Cem moedas, você diz?"
 ep2_tournament_events.0007.b: "Digamos que dispensamos o ouro, mas adicionamos uma obrigação..."
 ep2_tournament_events.0007.c: "Você não pode comprar sua saída desta vez, [versus_contestant.GetFirstNameNoTooltip]."
 ep2_tournament_events.0010.t: "$tournament_versus_header$ Apostas Calculadas"
 ep2_tournament_events.0010.desc: "O tempo desacelera enquanto a espada de [versus_contestant.GetFirstName] se arqueia por cima da minha cabeça, sua lâmina cantando no ar. Não é um golpe insignificante; se eu ficar onde estou, ele me causará mais do que dano suficiente.\n\nDeveria ser algo simples, já que um ataque tão selvagem deixa quem o desferiu vulnerável a um contra-ataque, mas há uma sensação incômoda no fundo da minha cabeça. A careta-grunhido de [versus_contestant.GetFirstNameNoTooltip] ao lançar o golpe era compreensível, dado o esforço, mas me pareceu haver nela o menor vislumbre de satisfação. Seus olhos também quase pareciam se voltar para o meu lado enquanto ele preparava o movimento. Será que tudo isso não passa de uma finta?\n\nO golpe se aproxima. É hora de agir."
 ep2_tournament_events.0010.a: "Agora eu te peguei!"
 ep2_tournament_events.0010.a.success: "Seu contra-ataque funciona"
 ep2_tournament_events.0010.a.failure: "[versus_contestant.GetFirstNameNoTooltip] estava blefando"
 ep2_tournament_events.0010.b: "Prefiro bloquear a arriscar um contra-ataque."
 ep2_tournament_events.0010.b.success: "Seu bloqueio tem sucesso"
 ep2_tournament_events.0010.c: "É melhor viver para lutar outro dia."
 ep2_tournament_events.0010.c.tt: "Um simples passo lateral cede a posição, mas a discrição é a melhor parte da coragem aqui."
 ep2_tournament_events.0011.t: "$tournament_versus_header$ Uma Opção Útil"
 ep2_tournament_events.0011.desc: "Acontece em uma fração de segundo. Enquanto nossas espadas se chocam estrondosamente, o punho da arma de [versus_contestant.GetFirstName] escorrega, acertando as costas da minha mão da espada. Cambaleio para trás para ganhar espaço e agarro minha mão com a livre, com a espada frouxa à minha frente.\n\nA dor pulsante sobe pelo meu braço enquanto mexo os dedos, curioso. #EMP Parece#! que não está muito machucada — se é que está —, mas verificar isso é difícil, já que estou recuando para evitar um golpe de [versus_contestant.GetFirstNameNoTooltip] que avança. Ele sorri, vendo claramente uma vantagem, e desfere outro golpe que passa bem de raspão pelo meu flanco.\n\nNão posso simplesmente me esquivar para sempre. De uma forma ou de outra, terei de lidar com minha mão."
 ep2_tournament_events.0011.a: "\"Hah! Você acha que eu só treino com uma mão?!\""
 ep2_tournament_events.0011.a.tt: "Minha mão esquerda é tão boa quanto a direita!"
 ep2_tournament_events.0011.b: "Não há outra opção."
 ep2_tournament_events.0011.b.tt: "Hora de ver se as lições com a mão não dominante valeram a pena..."
 ep2_tournament_events.0011.b.success: "Sua estratégia tem sucesso"
 ep2_tournament_events.0011.b.failure: "[versus_contestant.GetFirstNameNoTooltip] não está preocupado(a)"
 ep2_tournament_events.0011.b.criticalfailure: "Você solta completamente a arma"
 ep2_tournament_events.0011.c: "Seja o que for, eu não recuo!"
 ep2_tournament_events.0011.c.tt: "Adotar uma postura de duas mãos pode aliviar um pouco da dor, mas não ajudará muito se minha mão estiver realmente danificada..."
 ep2_tournament_events.0011.c.opinion: "Todos os espectadores ganham #COLOR_GREEN 5#! opinião sobre você"
 ep2_tournament_events.0011.c.success: "Você luta com determinação"
 ep2_tournament_events.0011.c.failure: "Sua mão ferida desiste"
 ep2_tournament_events.0012.t: "$tournament_versus_header$ Assumindo o Manto"
 ep2_tournament_events.0012.desc: "Enquanto avanço a grandes passadas para enfrentar [versus_contestant.GetSheHe], se detém e abaixa sua arma. Minha capa esvoaça ao meu redor com a brisa leve.\n\n"Vai... usar isso?", pergunta com expressão de confusão e não pouca desconfiança. "Não vim para julgar, é claro. Estou segur[versus_contestant.Custom('ES_OA')] de que vai muito #EMP na moda#!"\n\nNão estou segur[ROOT.Char.Custom('ES_OA')] de que eu ache graça desse repentino sorrisinho de satisfação seu."
 ep2_tournament_events.0012.intrigue: "Além de meu adversário,[versus_contestant.Custom('ES_OA')] vejo uma mulher entre o público lutando com um cachecol rebelde enquanto o vento se agita mais uma vez. O plano demora a tomar forma, mas toma forma, sim..."
 ep2_tournament_events.0012.arrogant: "Na verdade, não gosto nada disso. Como ousa zombar de mim e do meu #EMP fabuloso#! traje?"
 ep2_tournament_events.0012.a: "Vou mostrar como eu #EMP luto#! com estilo!"
 ep2_tournament_events.0012.b: "É #EMP claro#! que não vou lutar com isso - hyah!"
 ep2_tournament_events.0012.b.tt: "Vamos ver como luta com uma capa lançada em seu rosto!"
 ep2_tournament_events.0012.c: "Claro que não. Por favor, um momento."
 ep2_tournament_events.0012.c.tt: "Sinceramente, uma 'capa de duelo'? O que eu estava #EMP pensando?!#!"
 ep2_tournament_events.0012.d: "Todos os grandes lutam assim, [versus_contestant.Custom2('InsultNoun', ROOT.Char)]!"
 ep2_tournament_events.0020.t: "$tournament_versus_header$ Diálogo de Luta"
 ep2_tournament_events.0020.desc: "Um leve vento agita o ar quando [versus_contestant.GetFirstName] se aproxima de mim com a espada em punho. Olho ao redor em busca de alguma vantagem, como faria qualquer bom duelista. Não há terreno irregular, nem sol baixo para cegar [versus_contestant.GetHerHim], nem pontos fracos em sua postura. Preparo-me para lutar de forma justa.\n\nUm grito da plateia — algum tolo caindo de um banco, sem dúvida — faz com que [versus_contestant.GetFirstNameNoTooltip] pare. Ele/ela volta a se concentrar em mim, inquietament[versus_contestant.Custom('ES_OA')]. Diz-se que algumas pessoas precisam estar livres de distrações para lutar. Talvez [versus_contestant.GetFirstNameNoTooltip] seja uma delas?"
 ep2_tournament_events.0020.secret: "\n\nQuase sem ser convidado, um pequeno conhecimento salta em minha cabeça. Não era [versus_contestant.GetSheHe] quem... ah, sim. Sim, de fato!"
 ep2_tournament_events.0020.a: "\"O que é isso, [versus_contestant.GetFirstNameNoTooltip]? Você fez #EMP o quê?!#!\""
 ep2_tournament_events.0020.a.tt: "Bem alto, para que todos possam ouvir!"
 ep2_tournament_events.0020.b: "Eu sei o que você fez, [versus_contestant.GetFirstNameNoTooltip]!"
 ep2_tournament_events.0020.b.tt: "Sussurre; um segredo contado a todos não tem mais força!"
 ep2_tournament_events.0020.c: "Falar sempre foi uma de minhas habilidades."
 ep2_tournament_events.0020.c.success: "[versus_contestant.GetFirstNameNoTooltip] é distraído(a) por suas palavras"
 ep2_tournament_events.0020.c.failure: "[versus_contestant.GetFirstNameNoTooltip] não é distraído(a) por suas palavras"
 ep2_tournament_events.0020.d: "Devo me concentrar na luta."
 ep2_tournament_events.0021.t: "$tournament_versus_header$ Qualquer Vantagem"
 ep2_tournament_events.0021.desc: "A espada de [versus_contestant.GetFirstName] roça a lâmina da minha e saltam faíscas quando recuo. [versus_contestant.GetSheHe|U] sorri sombriamente quando minhas costas atingem o perímetro da arena, e [versus_contestant.GetSheHe] circula para me cortar o caminho contra a barreira. Preciso de qualquer vantagem que seja.\n\nDe repente, deliciosamente, um lampejo de compreensão aflora em minha mente. Como fui tolo! De tudo o que eu podia ter esquecido! Talvez agora seja a hora de usá-lo…\n\n"Já terminou, [ROOT.Char.GetFirstName]?", rosna [versus_contestant.GetSheHe], brandindo sua arma. "Para mim, você parece estar quase acabad[ROOT.Char.Custom('ES_OA')]"."
 ep2_tournament_events.0021.a: "\"Verdadeiramente, você fala até mais do que [family.GetFirstNameNoTooltip] fazia.\""
 ep2_tournament_events.0021.b: "[versus_contestant.Custom2('InsultNoun', ROOT.Char)|U], eu me #EMP beneficiei#! a voss[family.Custom('ES_OA')] [versus_contestant.Custom2('RelationToMeShort', SCOPE.sC('family') )]!"
 ep2_tournament_events.0021.c: "Melhor não provocar[versus_contestant.GetHerHim]…"
 #Melee
 ep2_tournament_events.1001.t: "$tournament_contest_header$ Prédios em Chamas"
 ep2_tournament_events.1001.desc: "Em meio ao sangue e ao estrondo do combate corpo a corpo, é quase impossível manter o seu rumo. A massa de competidores se agita e balança - um amontoado incontrolável de humanidade. Ai daquele que ousar ficar em seu caminho! É claro que um camponês infeliz precisa apenas se afastar com pressa para evitar a briga. O problema é um pouco mais pronunciado, eu considero, quando a vítima é um prédio.\n\nO combate corpo a corpo se espalhou pela [activity.GetCurrentPhase.GetLocation.GetBaronyNameExplicitly] adequada, e mesmo agora posso ver competidores de ambos os lados arrancando pedaços da fachada do prédio para usar como escudos rudimentares ou até mesmo como mísseis. Acho que consigo até ouvir o crepitar das chamas ao longe..."
 ep2_tournament_events.1001.a: "Pare, malditos! Trégua!"
 ep2_tournament_events.1001.b: "Se eles estão lutando aqui, eu também vou lutar."
 ep2_tournament_events.1001.c: "#EMP Chega!#! Trégua!"
 ep2_tournament_events.1001.c.success: "O combate corpo a corpo cessa por agora"
 ep2_tournament_events.1001.c.failure: "Ninguém escuta"
 ep2_tournament_events.1001.d: "Talvez seja hora de partir."
 ep2_tournament_events.1002.t: "$tournament_contest_header$ Projeto de Reconstrução"
 ep2_tournament_events.1002.desc: "Saio da confus?o e volto em dire??o ao acampamento, mas logo percebo que uma presen?a furiosa se aproxima rapidamente.

"Você tem muita audácia, [mayor.GetFirstNameNoTooltip].".

[mayor.Custom('ES_ElLa')|U] [mayor.GetWomanMan] bem vestid[mayor.Custom('ES_OA')] ? [mayor.GetFirstName], como se apresenta com irrita??o ? ? [mayor.Custom('ES_ElLa')] alcaid[mayor.Custom('ES_EEsa')] do assentamento, agora em um estado bastante lastim?vel, e claramente me culpa pela situa??o.

"$tournament_contest_header$ Lâmina Caída"
 ep2_tournament_events.1002.a: "A refrega se intensifica com golpes por toda parte. Sou jogado de um lado para o outro e tento revidar na mesma moeda. As espadas rasgam as armaduras, as lanças batem nos discos metálicos dos escudos.\n\nUma dessas armas surge no meu campo de visão, em direção à minha cabeça. Mal consigo desviar, girando minha [tournament_weapon.GetName] que a desvia. Uma fuga afortunada.\n\nViro-me para brandir minha [tournament_weapon.GetName] mais uma vez, apenas para descobrir que ela foi totalmente arrancada do meu controle! Ela cai no chão empoeirado, sendo chutada para lá e para cá pelos combatentes exaustos."
 ep2_tournament_events.1002.b: "Ah! Minha arma!"
 ep2_tournament_events.1002.b.tt: "Você consegue recuperá-la com sucesso"
 ep2_tournament_events.1002.c: "A arma é chutada ainda mais para longe"
 ep2_tournament_events.1002.d: "Terá que esperar para depois."
 ep2_tournament_events.1003.t: "Uma arma secundária terá que servir por enquanto."
 ep2_tournament_events.1003.desc: "$tournament_contest_header$ [comely_stray.Custom('GetLassLad')|U] perdid[comely_stray.Custom('ES_OA')]"
 ep2_tournament_events.1003.a: "Um vislumbre, entre corpos em luta, elmos rasgados e poeira rodopiando; será um espírito? Tem uma beleza etérea.\n\nNão, não, não é nenhum espírito. Em seu rosto encantador está estampado um olhar de puro terror enquanto procura uma saída.\n\nAssim que abro a boca, [comely_stray.GetSheHe] tropeça e cai; torceu o tornozelo por ter pisado desajeitadamente em uma lança perdida, e seus olhos tristes se enchem de lágrimas enquanto se encolhe para se afastar das lâminas que giram."
 ep2_tournament_events.1003.a.tt.success: "Segure firme, meu querido!"
 ep2_tournament_events.1003.a.tt.failure: "Esqueça a batalha; tenho problemas maiores para resolver!"
 ep2_tournament_events.1003.b: "![rescuer_knight.GetFirstNameNoTooltip]! Ajudem[comely_stray.GetHerHim] a chegar em segurança!"
 ep2_tournament_events.1003.b.tt: "Terão que se virar sozinhos[comely_stray.Custom('ES_OA')]."
 ep2_tournament_events.1004.t: "Eles escapam ilesos"
 ep2_tournament_events.1004.desc: "Fica ferid[comely_stray.Custom('ES_OA')]"
 ep2_tournament_events.1004.a: "Eles têm um fim infeliz"
 ep2_tournament_events.1004.a.tt: "$tournament_contest_header$ Indo para o Ataque Final"
 ep2_tournament_events.1004.c: "Ao meu redor, as pessoas caem da briga tumultuada, com sangue escorrendo livremente de seus membros. Os escudos jazem partidos ao meio ao lado de lanças destroçadas e espadas descartadas, espalhando-se pelo campo de batalha.\n\nUm oponente sem rosto avança contra mim e aparo seu golpe; a vibração percorre meu braço. Desvio do próximo ataque, erro o meu, #X me acerco#! para seguir e…\n\nA sua réplica passa bem debaixo do meu queixo. Se eu tivesse ficado onde estava, teria errado. Em vez disso, recebo um golpe na garganta. Saio cambaleando da briga, tateando inutilmente pela ferida, e caio de joelhos."
 ep2_tournament_events.1004.d: "… argh!"
 ep2_tournament_events.1004.d.escape.tt: "Rendo-me! Eu me rendo…"
 ep2_tournament_events.1004.d.injured.tt: "Não passa de um ferimento superficial"
 ep2_tournament_events.1004.d.dead.tt: "Um final patético"
 ep2_tournament_events.1005.t: "#V Abandonas#! o torneio"
 ep2_tournament_events.1005.desc: "$tournament_header$ Capturado"
 ep2_tournament_events.1005.a: "Golpeio [surrendering_knight.GetFirstName] com minha espada, faíscas saltam da lâmina ao rasgar sua armadura. Empurrad[surrendering_knight.Custom('ES_OA')] para trás e para baixo pelos golpes martelantes, [surrendering_knight.GetFirstNameNoTooltip] acaba largando sua arma e ergue um braço em sinal de rendição.\n\n"
 ep2_tournament_events.1005.b: "Saio da briga em direção ao meu escudeiro para que [surrendering_knight.GetHerHim]o vigie enquanto eu retorno à confusão. Em geral, espera-se que os cativos paguem um resgate para recuperar a liberdade; [surrendering_knight.GetFirstNameNoTooltip] deveria render uma boa quantia!"
 ep2_tournament_events.1005.success: "Mantenho minha arma diante do rosto de [surrendering_knight.GetFirstNameNoTooltip], apreciando o medo e a raiva em seus olhos. Normalmente, um resgate em ouro ou equipamento basta como recompensa pela derrota, mas…"
 ep2_tournament_events.1005.fail: "Enquanto espero ansiosamente, [surrendering_knight.GetFirstNameNoTooltip] solta um suspiro.\n\n\"Não vou enganá-lo. Não tenho o dinheiro para pagar o resgate que vocês querem. Isto é tudo o que tenho\", diz, cansad[surrendering_knight.Custom('ES_OA')], segurando uma pequena bolsa que claramente contém muito poucas moedas dentro."
 ep2_tournament_events.1005.resign: "Você se arrependerá de ter me enfrentado!"
 ep2_tournament_events.1006.t: "Vou aceitar o resgate!"
 ep2_tournament_events.1006.start: "\"[artifact.GetNameNoTooltip]\" hein? Parece bastante bonito."
 ep2_tournament_events.1006.normal: "Bem, acho que vou aceitar."
 ep2_tournament_events.1006.rival: "Vai em liberdade, nobre adversário[surrendering_knight.Custom('ES_OA')]!"
 ep2_tournament_events.1006.broke: "$tournament_header$ Refúgio Acolhedor"
 ep2_tournament_events.1006.a: "Exaust[ROOT.Char.Custom('ES_OA')], cambaleio até o conforto austero de um refúgio. Ao meu redor há competidores de ambos os lados, armaduras rasgadas e retorcidas, espadas embotadas e lascadas. Pajens e servos correm de um lado para o outro ajudando aqueles a quem servem.\n\nVejo alguns dos meus companheiros se recompondo. Eles me cumprimentam, cansados, enquanto desabo ao seu lado, [Select_CString( ROOT.Char.IsFemale, 'exausta e dolorida', 'exausto e dolorido' )]. Da minha posição na sombra, vejo um vendedor astuto preparando comida e bebida, às pressas, para vender aos combatentes destroçados. [teammate_1.GetFirstName] e [teammate_2.GetFirstName] observam o vendedor com alguma esperança, enquanto [teammate_3.GetFirstName] murmura, fingindo animação, algo sobre um discurso."
 ep2_tournament_events.1006.b: "Chame o vendedor."
 ep2_tournament_events.1006.c: "As guloseimas revigoram todos vocês."
 ep2_tournament_events.1006.d: "A comida e a bebida são maravilhosas!"
 ep2_tournament_events.1006.e: "A pontuação da sua equipe #positive_value aumenta#!"
 ep2_tournament_events.1007.t: "A pontuação da sua equipe #positive_value aumenta significativamente#!"
 ep2_tournament_events.1007.desc: "\"Aproximem-se, todos vocês.\""
 ep2_tournament_events.1007.a: "Talvez algumas palavras inspiradoras levantem os ânimos?"
 ep2_tournament_events.1007.a.tt.success: "Suas palavras restauram o vigor deles."
 ep2_tournament_events.1007.a.tt.bigsuccess: "O discurso parece ter pouco efeito."
 ep2_tournament_events.1007.a.result: "A pontuação da sua equipe #positive_value aumenta#!"
 ep2_tournament_events.1007.a.bigresult: "É melhor deixá-los por conta própria."
 ep2_tournament_events.1007.b: "$tournament_contest_header$ Um Adversário Famoso"
 ep2_tournament_events.1007.b.tt: "Em meio ao sangue e ao estrondo da rixa, consigo distinguir uma figura se aproximando a cavalo. Os símbolos pendurados no pescoço de seu corcel revelam sua identidade antes mesmo de falar: um[famous_knight.Custom('ES_XA')] $knight_culture_player_no_tooltip_lowercase$ verdadeiramente célebre enfeita o campo.\n\n"
 ep2_tournament_events.1007.b.tt.success: ""[ROOT.Char.GetTitledFirstNameNoTooltip]!" troveja [famous_knight.GetFirstName|U], aproximando-se a galope curto, com a voz ecoando claramente pelo campo. Maneja a espada com desenvoltura, evidentemente um[famous_knight.Custom('ES_XA')] mestre[famous_knight.Custom('ES_OA')] de seu ambiente.\n\n"Desejo cruzar lâminas convosco. Venha, enfrente-me, e vejamos qual de nós se mostra mais forte!".[ROOT.Char.Custom('ES_OA')]"
 ep2_tournament_events.1007.b.tt.failure: ""Ah, [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitledFirstNameNoTooltip|l]! Isto sim é uma honra!". [famous_knight.GetFirstName|U] tira o elmo antes de continuar.\n\n"Enfim, se encontram os dois $knight_culture_player_plural_no_tooltip_lowercase$ mais famosos do mundo. Dois soldados de honra que competiram juntos na glória ensanguentada do campo de batalha, frente a frente enfim. Quantas vezes ensaiei em meus sonhos este momento de destino! A panóplia para encapsular a nobreza implícita de nossa camaradagem…"."
 ep2_tournament_events.1007.b.result: "Vamos ver quão nobre é essa camaradagem..."
 ep2_tournament_events.1007.c: "Pode até ser desleal jogar um torrão de terra no rosto dele enquanto está falando, mas certamente é eficaz!"
 ep2_tournament_events.1011.t: "Você prevalece na batalha."
 ep2_tournament_events.1011.start: "Você perde a luta."
 ep2_tournament_events.1011.unequal: "\"Venha, nobre adversário! Vamos nos testar em combate.\""
 ep2_tournament_events.1011.equal: "A discrição pode ser a melhor parte da coragem aqui..."
 ep2_tournament_events.1011.a: "Você consegue escapar com sucesso para a confusão da luta."
 ep2_tournament_events.1011.a.tt: "[famous_knight.GetFirstNameNoTooltip] te alcança."
 ep2_tournament_events.1011.a.success: "$tournament_contest_header$ Dos Bosques"
 ep2_tournament_events.1011.a.failure: "Os resistentes arbustos tremem e farfalham enquanto eu abro caminho por entre eles. Este bosque é um lugar perfeito para uma emboscada, ao lado do caminho que leva a um local de descanso.\n\nNão preciso esperar muito. [caught_opponent.GetFirstName] avança cambaleante pelo caminho, claramente ansios[caught_opponent.Custom('ES_OA')] por um descanso da luta. A luz salpicada do sol brilha em sua armadura enquanto o sussurro das folhas mascara minha aproximação pela vegetação rasteira.\n\nSem tirar os olhos de [caught_opponent.GetFirstNameNoTooltip], acabo me posicionando em um local privilegiado, a apenas dois ou três passos de onde [caught_opponent.GetSheHe] está prestes a pisar."
 ep2_tournament_events.1011.b: "Sou apenas um sussurro de galhos."
 ep2_tournament_events.1011.c: "\"[caught_opponent.GetFirstNameNoTooltip]! Enfrente-me em um combate honrado!\""
 ep2_tournament_events.1011.d.success: "Você vence o duelo."
 ep2_tournament_events.1011.d.failure: "Você perde o duelo."
 ep2_tournament_events.1012.t: "Devo ser rápid[ROOT.Char.Custom('ES_OA')]!"
 ep2_tournament_events.1012.desc: "A emboscada é bem-sucedida."
 ep2_tournament_events.1012.a: "A emboscada falha miseravelmente."
 ep2_tournament_events.1012.b: "Não seria correto prevalecer assim."
 ep2_tournament_events.1012.b.success: "$tournament_contest_header$ A Vantagem do Terreno Elevado"
 ep2_tournament_events.1012.b.failure: "Eu freio meu cavalo após investir contra um oponente e volto para a refrega. Ao me aproximar, vejo uma figura cair da montaria, surpreendida por um golpe de um oponente atrás dela.\n\nAparentemente iles[felled_participant.Custom('ES_OA')], [felled_participant.GetFirstName] olha em volta freneticamente procurando a montaria, mas ela já foi embora, assustada com o barulho.\n\nAproximo-me ainda mais, fixado em sua situação. Sentad[ROOT.Char.Custom('ES_OA')] sobre meu corcel, [felled_participant.GetSheHe] parece tão pequen[felled_participant.Custom('ES_OA')] e indefens[felled_participant.Custom('ES_OA')]… Não seria honroso, diria um observador, mas há muito pouco de honra na refrega…"
 ep2_tournament_events.1012.c: "\"Precisa de ajuda, [felled_participant.GetFirstNameNoTooltip]?\""
 ep2_tournament_events.1012.c.success: "[felled_participant.GetHerHim|U] o escudo o afasta da briga até que um assistente possa trazer outro cavalo."
 ep2_tournament_events.1012.c.failure: "Então seja assim. #EMP Hyah!#!"
 ep2_tournament_events.1012.d: "Resolveremos isso de forma justa, a pé."
 ep2_tournament_events.1013.t: "Você prevalece no duelo."
 ep2_tournament_events.1013.desc: "Você perde o duelo."
 ep2_tournament_events.1013.a: "Este não é o meu estilo de luta."
 ep2_tournament_events.1013.a.tt: "Afaste-se em busca de outros combates mais justos."
 ep2_tournament_events.1013.b: "$tournament_contest_header$ Um Misterioso $knight_culture_player_no_tooltip$"
 ep2_tournament_events.1013.c: "Os cavalos trovejam em disparada pela refrega. Minha investida me afasta do conflito, e dou meia-volta em um amplo círculo para observar.\n\nDe imediato, algo me chama a atenção. Um $knight_culture_player_no_tooltip_lowercase$ desfere golpes com vigor, ferocidade e não pouca habilidade, derrubando um oponente do cavalo e desmontando para continuar a batalha. Está claramente acima de seu desventurado adversário e logo o tem à mercê, recebendo uma boa quantia de ouro como pagamento do resgate.\n\nEsses emblemas me parecem familiares, mas é difícil distingui-los. Aproximo-me ao trote e desmonto, chamando a figura, mas ela se afasta resolutamente em busca de novos inimigos."
 ep2_tournament_events.1013.c.success: "Bem, acho que posso aproveitar as sobras deles."
 ep2_tournament_events.1013.c.failure: "Esta é uma boa oportunidade para derrotar alguns oponentes enfraquecidos e ganhar um pouco de dinheiro!"
 ep2_tournament_events.1013.d: "Eu preciso saber quem é!"
 ep2_tournament_events.1013.d.tt: "Você alcança o estranho."
 ep2_tournament_events.1015.t: "Ele se perde entre o público"
 ep2_tournament_events.1015.desc: "Você confronta a figura."
 ep2_tournament_events.1015.a: "É melhor deixá-los em paz."
 ep2_tournament_events.1015.a.tt: "$tournament_contest_header$ Mistério Solucionado"
 ep2_tournament_events.1015.b: "Fica claro rapidamente que minha presença não é bem-vinda. O $knight_culture_player_no_tooltip_lowercase$ lança olhares nervosos por cima do ombro para mim e segue um caminho errático pela confusão para me despistar, mas eu não vou desistir. Eventualmente, alcanço-os, coloco a mão em seu braço e tiro o capacete. Deixo escapar um suspiro involuntário.\n\n"
 ep2_tournament_events.1015.b.success: ""Espero ter provado que sou dign[mysterious_knight.Custom('ES_OA')]", diz [mysterious_knight.GetFirstName], inclinando levemente a cabeça. "Obrigado por confiarem em mim. Agora, deixem-me retribuir o favor" e ergue sua arma, a luz do sol refletindo na lâmina."
 ep2_tournament_events.1015.b.failure: "É uma[mysterious_knight.Custom('ES_XA')] #EMP [mysterious_knight.GetWomanMan]#!!\n\n“Por favor, eu vos imploro, não contem a ninguém”, suplica-me [mysterious_knight.GetSheHe|U]. Olha para o chão e então para mim, esperançoso[mysterious_knight.Custom('ES_OA')]. “Tudo o que quero é ter permissão para provar o meu valor!"
 ep2_tournament_events.1015.b.success.tt: "De todas as pessoas, acaba sendo meu [ROOT.Char.Custom2('RelationToMeShort', mysterious_knight)] [mysterious_knight.GetFirstName]! [mysterious_knight.GetSheHe|U] só pode oferecer um pequeno sorriso diante da minha expressão boquiaberta e estender um braço indicando a refrega turbulenta.\n\n"Não há tempo a perder com perguntas", [mysterious_knight.GetSheHe] corta meus protestos. "Temos uma batalha para vencer!""
 ep2_tournament_events.1015.c: "Tudo bem. Cubra minhas costas!"
 ep2_tournament_events.1016.t: "Você precisa me mostrar suas habilidades!"
 ep2_tournament_events.1016.start: "Observar atentamente, sem dúvida, vai te ensinar algumas coisas."
 ep2_tournament_events.1016.mulan: "Você aprende muito"
 ep2_tournament_events.1016.mulanunknown: "Você aprende um pouco"
 ep2_tournament_events.1016.relation: "Não! Você não pode #EMP fazer#! isso!"
 ep2_tournament_events.1016.a: "$tournament_contest_header$ Encurralado[ROOT.Char.Custom('ES_OA')]"
 ep2_tournament_events.1016.b: "Arremessado[ROOT.Char.Custom('ES_OA')] de minha montaria por uma arma de haste, cambaleio, a cabeça zune. Os perpetradores se voltam para mim imediatamente.\n\n"Peço desculpas pela recepção brusca", diz [knight_1.GetFirstName], "mas não vamos correr riscos". São três, todos fortemente armados. Seu objetivo é claro: sou um alvo de alto valor, que renderá grandes riquezas em resgate.\n\nQuando minha cabeça clareia, consigo distinguir duas figuras se aproximando por trás dos ombros dos meus agressores, trajando as cores da minha equipe. Os três desgraçados sorridentes não fazem ideia do perigo repentino que correm, mas meu resgate está certamente ao alcance, caso eu queira."
 ep2_tournament_events.1016.b.tt: "Fiquem para trás. #EMP Esses três são meus!#!"
 ep2_tournament_events.1016.b.success: "Você triunfa sozinho sobre os três"
 ep2_tournament_events.1016.b.failure: "Você está gravemente em desvantagem[ROOT.Char.Custom('ES_OA')]"
 ep2_tournament_events.1016.c: "Agora! Avance!"
 ep2_tournament_events.1017.t: "Você os pega desprevenidos"
 ep2_tournament_events.1017.desc: "Eles conseguem se retirar lutando"
 ep2_tournament_events.1017.a: "$tournament_contest_header$ Uma Casa Unida"
 ep2_tournament_events.1017.a.success: "Olhando através da confusão, vejo um[family.Custom('ES_XA')] companheir[family.Custom('ES_OA')] cercad[family.Custom('ES_OA')], lutando a pé, cercado por dois inimigos. Outro olhar revela o emblema manchado e rasgado que usa: as cores da nossa nobre Casa de [ROOT.Char.GetHouse.GetName].\n\nLanço meu corcel na briga e um dos adversários é arremessado ao longe. O outro, pego de surpresa, é rapidamente derrotado por nossas espadas combinadas. [family.GetFirstName] sorri agradecid[family.Custom('ES_OA')], inclinando-se diante de mim e do meu cavalo.\n\n\"Obrigado. Caso contrário, eles teriam me matado.\" Ele olha para baixo para os tecidos puídos, mas ainda vibrantes, que nós dois vestimos, afagando o brasão que repousa sobre seu coração. \"[ROOT.Char.GetHouse.GetMotto]\"."
 ep2_tournament_events.1017.a.failure: "\"[ROOT.Char.GetHouse.GetMotto]\", [family.GetFirstNameNoTooltip]."
 ep2_tournament_events.1017.b: "Eu sempre vou te proteger, enquanto eu respirar."
 ep2_tournament_events.1017.b.success: "Você os pega desprevenidos"
 ep2_tournament_events.1017.b.failure: "$tournament_contest_header$ Silêncio, Por Favor!"
 ep2_tournament_events.1018.t: "A multidão murmura placidamente enquanto [competitor.GetFirstName] faz sua marca. Acho que captei algumas palavras levadas pelo vento, e está claro que [competitor.GetFirstNameNoTooltip] também. [competitor.GetSheHe|U] se vira com certa petulância e se dirige à multidão.\n\n"Silêncio! Pelo amor de Deus, tenham um mínimo de respeito pelos competidores!", resmunga mal-humorad[competitor.Custom('ES_OA')]. Algumas risadinhas são ouvidas em resposta. Está claro que [competitor.GetSheHe] precisa de paz e tranquilidade para atirar uma flecha, mas me ocorre — enquanto [competitor.GetSheHe] se vira para brandir o punho contra a multidão mais uma vez — que isso talvez esteja indo longe demais."
 ep2_tournament_events.1018.desc: "\n\nDeixo minha mente divagar sobre o que pensei ter ouvido nas murmurações da multidão. Parecia bastante #EMP salaz#!, para dizer o mínimo..."
 ep2_tournament_events.1018.a: "\"Você aí. O que você disse?\""
 ep2_tournament_events.1018.b: "Essa multidão não será capaz de ficar quieta agora que aquele boato salaz foi ouvido alto e claro!"
 #Archery
 ep2_tournament_events.1501.t: "#EMP Cof!#! #EMP COF!#!"
 ep2_tournament_events.1501.desc: "Melhor deixar [competitor.GetSheHe] prosseguir."
 ep2_tournament_events.1501.secret: "$tournament_contest_header$ Dinâmica da Flecha"
 ep2_tournament_events.1501.a: "Os estandartes tremulam e se agitam quando me aproximo para disparar, golpead[ROOT.Char.Custom('ES_OA')] pelo vento. A poeira gira ao meu redor enquanto coloco uma flecha no arco, e o vento áspero me faz lacrimejar os olhos.\n\nEspero que ele amaine.\n\nContinuo esperando.\n\nNão acho que vá parar."
 ep2_tournament_events.1501.a.tt: "\n\nDeixo minha mente voltar ao que pensei ter ouvido nas tagarelices da multidão. Parecia bastante #EMP salaz#!, para dizer o mínimo..."
 ep2_tournament_events.1501.b: "Hah! Um pouco de vento não vai me deter!"
 ep2_tournament_events.1501.b.tt: "\"Na verdade, ainda não era a minha vez, não é mesmo?\""
 ep2_tournament_events.1501.c: "Apontar [contestant.Custom('ES_AlAla')] pobre e azarad[contestant.Custom('ES_OA')] [contestant.GetFirstNameNoTooltip] como o próximo da fila talvez funcione…"
 ep2_tournament_events.1502.t: "Os juízes concordam"
 ep2_tournament_events.1502.desc: "Você recebe a ordem de prosseguir"
 ep2_tournament_events.1502.secret: "Talvez se eu atirar #EMP atravessando#! o vento..."
 ep2_tournament_events.1502.a: "Você acerta o alvo"
 ep2_tournament_events.1502.b: "O vento está muito forte"
 ep2_tournament_events.1502.b.tt: "$tournament_contest_header$ Entediado no Alvo"
 ep2_tournament_events.1502.b.success: "#EMP Tuang!#!\n\nA flecha de um competidor sai do arco e se crava no alvo. Segue-se um leve aplauso. Eu me apoio no meu arco, entediad[ROOT.Char.Custom('ES_OA')], esperando minha vez.\n\n #EMP Tuang!#!\n\nOutra flecha acerta em cheio. [contestant.GetFirstName] se afasta para pegar seu arco. Preciso encontrar #EMP algo#! para fazer enquanto espero, senão vou enlouquecer."
 ep2_tournament_events.1502.b.failure: "… essa marca é muito temporária."
 ep2_tournament_events.1502.c: "Alguém notaria se eu apagasse e movesse nosso marcador alguns passos para trás?"
 ep2_tournament_events.1502.c.success: "Você tem sucesso"
 ep2_tournament_events.1502.c.failure: "Você é descoberto"
 ep2_tournament_events.1503.t: "Vou dar uma volta para conversar com a multidão."
 ep2_tournament_events.1503.desc: "Quem sabe que fofocas podem ser ouvidas?"
 ep2_tournament_events.1503.a: "Você descobre um [secret|lE] sobre outro competidor"
 ep2_tournament_events.1503.a.tt: "Você descobre um segredo"
 ep2_tournament_events.1503.a.success: "Você espanta o tédio com conversa"
 ep2_tournament_events.1503.a.failure: "Vou ter que suportar, suponho."
 ep2_tournament_events.1503.b: "Vou dar uma volta para conversar com a multidão."
 ep2_tournament_events.1503.b.flavor: "$tournament_versus_header$ Truques Sujos"
 ep2_tournament_events.1503.b.tt: "[versus_contestant.GetFirstName] e eu estamos no chão, em luta corporal. Uma chave de braço me coloca em uma posição de desvantagem e, de repente, [versus_contestant.GetFirstNameNoTooltip] está sobre mim e se esforça para garantir a vitória.\n\nO chão empoeirado se move sob nossos corpos tensos, o rosto do meu oponente roçando nele enquanto tenta me prender contra o chão. Minha mão livre, buscando qualquer tipo de alavanca, se fecha inconscientemente em torno da terra, deixando-me com um punhado de sujeira. Seu rosto está perto da minha mão, tão perto…"
 ep2_tournament_events.1503.b.success: "Hyah!"
 ep2_tournament_events.1503.b.failure: "Assim não é o modo de lutar."
 ep2_tournament_events.1503.c: "Você luta para se levantar"
 #Wrestling
 ep2_tournament_events.2001.t: "Jogue a sujeira no seu rosto."
 ep2_tournament_events.2001.desc: "$tournament_versus_header$ Se Intrometendo"
 ep2_tournament_events.2001.a: "[versus_contestant.GetFirstName] cai sobre mim com força, enquanto a sua agarrada me joga ao chão. Imediatamente começamos a lutar por uma posição melhor; eu tentando tirá-lo[versus_contestant.GetHerHim] de cima de mim, [versus_contestant.GetSheHe] tentando aproveitar a abertura.\n\n[versus_contestant.GetFirstNameNoTooltip] enfia um dos meus braços sob o joelho e começa a fazer força para encerrar completamente a luta. Em meu desespero, minha mão livre procura algo a que se agarrar, qualquer coisa que eu possa usar. Meio cego pela terra, sinto ar, depois o tecido áspero e grosso das roupas de luta, e de repente… uma fenda de nádegas?\n\nSe eu não fizer alguma coisa logo, este combate já está praticamente perdido. Então meu polegar se desdobra do punho…"
 ep2_tournament_events.2001.b: "Tudo vale no amor e na luta livre..."
 ep2_tournament_events.2001.b.success: "Vou perder com honra, se necessário!"
 ep2_tournament_events.2001.b.failure: "Hora de lutar para sair dessa!"
 ep2_tournament_events.2001.a.tt: "Todo membro próximo da família"
 ep2_tournament_events.2002.t: "$tournament_versus_header$ Interferência Externa"
 ep2_tournament_events.2002.desc: ""Ei! Árbitro, ei!".\n\nRecebo com não pouca alívio a voz do meu amig[friend.Custom('ES_OA')] [friend.GetFirstName]. A bendita distração faz com que o árbitro vá até a borda do fosso e meu oponente [versus_contestant.GetFirstName] vacila por uma fração de segundo, o bastante para atordoar[versus_contestant.GetHerHim] momentaneamente com uma pancada de antebraço no rosto.\n\nA multidão não gosta da jogada, e vários objetos começam a cair no fosso. Frutas, legumes e até um pequeno banco. De fato, esse banco cai perto o bastante para eu pegá-lo, e, com o árbitro de costas enquanto lida com os protestos de [versus_contestant.GetFirstNameNoTooltip] me dá a menor semente de uma ideia…"
 ep2_tournament_events.2002.a: ""#EMP Argh!#! Árbitro! Que me acertou com aquilo!""
 ep2_tournament_events.2002.b: "\"Aqui, [versus_contestant.GetFirstNameNoTooltip]!\""
 ep2_tournament_events.2002.b.tt: "Chega de trapaças por baixo dos panos."
 ep2_tournament_events.2002.a.tt: "Jogue o banquinho nas mãos de [versus_contestant.GetFirstNameNoTooltip] e agarre a cabeça."
 ep2_tournament_events.2003.t: "#EMP Crunch!#!"
 ep2_tournament_events.2003.desc: "$tournament_versus_header$ Uma Luta Carnuda"
 ep2_tournament_events.2003.a: "Meus braços tentam mais uma vez se fechar ao redor da parte traseira da barriga generosa de [versus_contestant.GetFirstName] e, como antes, tudo o que ele faz é rir e me lançar contra a parede do fosso com seu volume imenso. Ele desfila na minha direção, com a papada trêmula e as dobras ondulantes, enquanto a multidão grita de alegria.\n\nEmbora as dimensões prodigiosas do meu oponente sejam uma vantagem para ele, é claro que não há como todo esse volume ser apenas músculo. [versus_contestant.GetFirstNameNoTooltip] começa a circular para reduzir novamente o espaço disponível para mim. Certamente deve haver um jeito de tirar proveito disso?"
 ep2_tournament_events.2003.b: "Talvez se eu fizer com que se mova…"
 ep2_tournament_events.2003.c: "Apenas pegue[versus_contestant.GetHerHim] e pronto!"
 ep2_tournament_events.2003.a.tt: "Não é [Select_CString( versus_contestant.IsFemale, 'a única', 'o único' )] que tem um pouco de #EMP circunferência#!!"
 ep2_tournament_events.2003.b.tt: "Uma torre poderosa não se sustenta sem fundações."
 ep2_tournament_events.2004.t: "Não há glória em evitar uma luta!"
 ep2_tournament_events.2004.desc: "Você acerta com sucesso as pernas de [versus_contestant.GetFirstNameNoTooltip]"
 ep2_tournament_events.2004.a: "[versus_contestant.GetFirstName] facilmente resiste aos seus ataques"
 ep2_tournament_events.2004.b: "$tournament_versus_header$ Lutando com Desejo"
 ep2_tournament_events.2004.c: "Enquanto me atraco com meu oponente [versus_contestant.GetFirstName], um pequeno deslize me d? uma abertura. Um arremesso r?pido manda [versus_contestant.GetHerHim] ao ch?o, mas ele cai com eleg?ncia, e acabamos peito a peito no ch?o. O suor escorre tanto pelo meu corpo quanto pelo dele enquanto lutamos por posi??o, deixando-nos ambos escorregadiz[GetPlayer.Custom('ES_OA')]s.

#EMP Muito#! escorregadiz[GetPlayer.Custom('ES_OA')]s, na verdade. Enquanto nos separamos de mais um abra?o ? talvez um notavelmente menos combativo que o anterior? ?, percebo que o rosto de [versus_contestant.GetFirstNameNoTooltip] est? corado, e suspeito que n?o seja apenas pelo esfor?o."
 ep2_tournament_events.2004.d: "\"Devemos continuar em algum lugar mais privado?\""
 ep2_tournament_events.2004.e: "\"Estou gostando de nossa luta, [versus_contestant.GetFirstNameNoTooltip]. #EMP Muito#! mesmo.\""
 ep2_tournament_events.2004.d.tt.success: "Ahá! Baixou a guarda!"
 ep2_tournament_events.2004.d.tt.failure: "[versus_contestant.GetFirstNameNoTooltip] está interessado em seus avanços"
 ep2_tournament_events.2005.t: "[versus_contestant.GetFirstNameNoTooltip] está lisonjeado, mas recusa educadamente"
 ep2_tournament_events.2005.desc: "Enquanto me atraco com meu oponente [versus_contestant.GetFirstName], um pequeno deslize me d? uma abertura. Um arremesso r?pido manda [versus_contestant.GetHerHim] ao ch?o, mas ele cai com eleg?ncia, e acabamos peito a peito no ch?o. O suor escorre tanto pelo meu corpo quanto pelo dele enquanto lutamos por posi??o, deixando-nos ambos escorregadiz[GetPlayer.Custom('ES_OA')]s.

#EMP Muito#! escorregadiz[GetPlayer.Custom('ES_OA')]s, na verdade. Enquanto nos separamos de mais um abra?o ? talvez um notavelmente menos combativo que o anterior? ?, percebo que o rosto de [versus_contestant.GetFirstNameNoTooltip] est? corado, e suspeito que n?o seja apenas pelo esfor?o."
 ep2_tournament_events.2005.a: "..."
 ep2_tournament_events.2005.b: "Participação da Plateia"
 ep2_tournament_events.2005.c: "Obligo a [versus_contestant.GetFirstName] a bajar, presionando sus hombros hacia el suelo. Estoy a punto de hacerlo cuando oigo la llamada de un árbitro que me observa. Tardo un momento en darme cuenta de que ha sido a mi favor, y de que los jueces me conceden una caída.\n\nMe vuelvo a poner en pie, algo insegur[ROOT.Char.Custom('ES_OA')], sopesando si debería aceptar su error, cuando el volumen del público sube de repente. Me giro y veo a [opponent_friend.GetFirstName] correr hacia mí tras saltar la barrera, gesticulando furiosamente.\n\n"Es una injusticia! Sus hombros ni siquiera estaban #EMP cerca#! de tocar el suelo!", grita [opponent_friend.GetSheHe], agarrando a un árbitro de la muñeca."
 ep2_tournament_events.2005.b.tt.success: "Guardas! Tirem este encrenqueiro daqui![opponent_friend.Custom('ES_EA')] baderneiro daqui."
 ep2_tournament_events.2005.b.tt.failure: "É evidente que seus ombros haviam #EMP caído#!!"
 ep2_tournament_events.2005.b.tt.criticalfailure: "Você vence o debate"
 ep2_tournament_events.2006.t: "Os juízes ficam do lado de [opponent_friend.GetFirstNameNoTooltip]"
 ep2_tournament_events.2006.desc: "Não, você está certo. Não houve queda."
 ep2_tournament_events.2006.a: "..."
 ep2_tournament_events.2007.t: "Escolhas, Escolhas..."
 ep2_tournament_events.2007.desc: "Um poderoso golpe de ombro de [versus_contestant.GetFirstName] atinge minhas costelas com força e eu sou levado ao chão, mas [versus_contestant.GetSheHe] não me segue para uma imobilização. E com razão, já que meu punho passa rapidamente pelo ar onde estaria a cabeça [versus_contestant.GetHerHis]. A fase de avaliação dessa luta em particular claramente acabou.\n\nNós dois circulamos cautelosamente, [versus_contestant.GetFirstNameNoTooltip] com um leve sorriso malicioso. É a calma antes da tempestade, e um lutador astuto usa esses momentos para traçar uma estratégia."
 ep2_tournament_events.2007.a: "Concentre-se em chaves de pescoço."
 ep2_tournament_events.2007.b: "Trabalhe nas agarradas no corpo."
 ep2_tournament_events.2007.b.tt.success: "Só derrube [versus_contestant.GetHerHim] no chão."
 ep2_tournament_events.2007.b.tt.failure: "Você derruba eles"
 ep2_tournament_events.2007.c: "Funciona razoavelmente bem"
 #Fistfighting
 ep2_tournament_events.2501.t: "Desarticulado"
 ep2_tournament_events.2501.desc: "Ao me desvencilhar de uma breve imobilização com [versus_contestant.GetFirstName], [versus_contestant.GetHerHim] pego de surpresa e [versus_contestant.GetHerHim] agarro pelo pescoço! Completamente desprevenid[versus_contestant.Custom('ES_OA')], o pescoço de [versus_contestant.GetFirstNameNoTooltip] range sonoramente com o impacto, e a força o faz gritar de pânico.\n\nA multidão explode, mas os aplausos e gritos logo dão lugar a murmúrios de confusão quando afrouxo a pegada. No momento em que meu braço fez contato, um #EMP chasquido#! enjoativo me indicou que nem tudo ia bem, e a dor que percorre meu dedo confirma algum tipo de luxação.\n\n[versus_contestant.GetFirstNameNoTooltip] ainda está se recuperando. Se eu reagir rápido, talvez…"
 ep2_tournament_events.2501.a: "Certo, bem, só há uma coisa a fazer."
 ep2_tournament_events.2501.b: "Se eu favorecer minha outra mão, talvez ainda consiga vencer isso..."
 ep2_tournament_events.2501.c: "Estou ferid[GetPlayer.Custom('ES_OA')]! Preciso me render."
 ep2_tournament_events.2501.a.tt.criticalsuccess: "Tentar colocar o dedo de volta no lugar"
 ep2_tournament_events.2501.a.tt.success: "Seu tratamento improvisado funciona"
 ep2_tournament_events.2501.a.tt.failure: "Ai! Isso não ajudou em nada!"
 ep2_tournament_events.2502.t: "Lute!"
 ep2_tournament_events.2502.desc: "O Piscar Mais Fraco"
 ep2_tournament_events.2502.a: "Um braço se aperta ao redor do meu crânio, e eu reajo com uma cotovelada violenta no estômago de [versus_contestant.GetFirstName]. Escapo do seu agarre e tento um meu próprio, com os braços enredados e a respiração pesada.\n\nEnquanto lutamos para nos prender um ao outro, noto o fantasma de um sorriso passar pelo rosto do meu oponente. O que será que ele está sorrindo…\n\n#EMP Argh!#!! Meu #EMP OJO!#! O polegar de [versus_contestant.GetFirstNameNoTooltip] está firmemente enfiado na minha órbita ocular e preciso de um golpe poderoso no rosto para afastar[versus_contestant.GetHerHim] de mim. Cambaleio para trás, com as mãos sobre o olho machucado, enquanto meu oponente embaçado se aproxima de mim."
 ep2_tournament_events.2502.b: "É assim que vamos jogar, não é?!"
 ep2_tournament_events.2502.c: "Juiz! #EMP Juiz!#!"
 ep2_tournament_events.2502.a.tt: "Você não vai sair impune com isso!"
 ep2_tournament_events.2502.a.tt.success: "Você, [versus_contestant.Custom2('InsultNoun', ROOT.Char)] [versus_contestant.Custom2('InsultAdjective', ROOT.Char)]! Aproxime-se para que eu possa bater em você!"
 ep2_tournament_events.2502.a.tt.failure: "Você enfia o dedo no olho dela como vingança!"
 ep2_tournament_events.2502.b.tt: "[versus_contestant.GetFirstNameNoTooltip] é desclassificado(a)"
 ep2_tournament_events.2503.t: "A luta é permitida a continuar"
 ep2_tournament_events.2503.desc: "Você continua a luta!"
 ep2_tournament_events.2503.a: "Conduta Imprópria"
 ep2_tournament_events.2503.b: "Rodo meu oponente, [versus_contestant.GetFirstName], e agarro [versus_contestant.GetHerHim] em uma gravata de cabeça. Aperto o golpe, mas [versus_contestant.GetSheHe] quase parece #EMP aproveitar#! o contato. Jogo [versus_contestant.GetHerHim] no chão, mas [versus_contestant.GetFirstNameNoTooltip] fica mole e aceita, e um brilho inquietante começa a dançar em seus olhos selvagens.\n\nMe abaixo rapidamente para fazer a imobilização, mas, de repente, meu alvo vira um borrão de movimento, me atinge e me deixa no chão. Em vez de tentar a imobilização, [versus_contestant.GetSheHe] monta sobre mim e começa a desferir socos em meu rosto! Desesperado, acerto um soco direto em sua têmpora, mas, em resposta, sua boca espumosa se abre, avança e...\n\n#EMP Aaaaaarrrghh! Meu nariz!#!"
 ep2_tournament_events.2503.c: "Retire-os imediatamente deste ringue!"
 ep2_tournament_events.2503.d: "Traga meu médico!"
 ep2_tournament_events.2503.a.tt: "Alguém, encontre um médico!"
 ep2_tournament_events.2503.b.tt.success: "[versus_contestant.GetFirstNameNoTooltip] é prontamente desqualificado, e você avança na competição"
 ep2_tournament_events.2503.b.tt.failure: "Esqueça a competição, você precisa de um médico!"
 ep2_tournament_events.2503.c.tt: "[physician.GetFirstNameNoTooltip] faz maravilhas"
 ep2_tournament_events.2504.t: "[physician.GetFirstNameNoTooltip] consegue salvar seu nariz"
 ep2_tournament_events.2504.desc: "Nem os serviços de [physician.GetFirstNameNoTooltip] podem salvar seu nariz"
 ep2_tournament_events.2504.a: "Um corredor é enviado em busca de um novo $court_physician_court_position$"
 ep2_tournament_events.2504.b: "Levando uma surra"
 ep2_tournament_events.2504.c: "Me doem os braços.\n\nNão só o pescoço, que suportou tantas chaves. Não só o torso, embora esteja praticamente amaciado. Não, sinto #EMP os braços#! como se tivessem sido pisoteados por uma junta de cavalos conduzida por [ROOT.Char.GetFaith.DevilName]. Meu único consolo é que, enquanto [versus_contestant.GetHerHim] olho com a respiração ofegante e os olhos turvos, meu oponente [versus_contestant.GetFirstName] não está se saindo melhor do que eu.\n\n[Select_CString( ROOT.Char.IsFemale, 'As duas', 'Os dois' )] nos balançamos instáveis sobre os pés enquanto nos aproximamos mais uma vez, o sangue escorre livremente dos cortes. Estamos quase perto um do outro de novo quando somos separados, e os juízes se aglomeram ao nosso redor, preocupados. Estão nos oferecendo... um empate?"
 ep2_tournament_events.2504.a.tt: "Uma luta tão equilibrada não precisa ter um perdedor."
 ep2_tournament_events.2504.b.tt: "Um empate?! Vão ter que me arrastar para fora deste ringue!"
 ep2_tournament_events.2504.b.tt.criticalsuccess: "Você vence a luta"
 ep2_tournament_events.2504.b.tt.success: "[versus_contestant.GetFirstNameNoTooltip] vence a luta"
 ep2_tournament_events.2504.b.tt.failure: "Ambos caem exaustos"
 ep2_tournament_events.2504.c.tt: "Todos os cortesãos e convidados [GetTrait('sadistic').GetName( GetNullCharacter )|l]"
 ep2_tournament_events.2505.t: "Todos os cortesãos e convidados não-[GetTrait('sadistic').GetName( GetNullCharacter )|l]"
 ep2_tournament_events.2505.desc: "Uma Nova Perspectiva"
 ep2_tournament_events.2505.a: "Esquivo um agarrão, falho o contra-ataque…\n\nEstou tentando dar o troco, mas tudo o que posso fazer é resistir às furiosas tentativas de [versus_contestant.GetFirstName] de me prender em um agarrão. Desvio de uma tentativa, contra-ataco outra, corro para o lado, mas então [versus_contestant.GetSheHe] me agarra.\n\nA gravata de cabeça se aperta ao redor do meu pescoço como uma serpente horrível, enquanto a mão dele a empurra para o outro lado, como se estivesse pondo fim ao sofrimento de uma besta. Não consigo respirar, sinto meus olhos prontos para saltar das órbitas, as bochechas coradas pelo sangue represado e o pescoço rangendo como um galho frágil.\n\n#X Crac.#!\n\nO mundo fica monocromático. Meu corpo se contorce em espasmos.\n\nFico deitado de bruços, olhando para o céu."
 ep2_tournament_events.2505.b: "#DIE2 … Urgh!#!"
 ep2_tournament_events.2505.b.tt.success: "Golpes Desorientadores"
 ep2_tournament_events.2505.b.tt.failure: "Não há nada como uma boa luta para despertar os sentidos. Tudo fica mais nítido, mais brilhante, mais claro no som, na visão e no olfato. É o suficiente para fazer uma pessoa se sentir sobre-humana! E talvez privar alguém de um sentido fizesse o oposto...\n\nDesvio com desprezo para a esquerda para evitar uma agarrada de [versus_contestant.GetFirstName] e, quando [versus_contestant.GetSheHe] recua, desfecho um poderoso golpe com as duas mãos em ambos os lados da cabeça [versus_contestant.GetHerHis].\n\n[versus_contestant.GetFirstNameNoTooltip] berra de dor, com finos filetes de sangue escorrendo dos ouvidos. Está claro que esta luta está chegando a um desfecho rápido, mas as tentativas furiosas de agarrada lançadas na minha direção indicam que [versus_contestant.GetFirstNameNoTooltip] tentará se vingar ou cair tentando."
 ep2_tournament_events.2505.b.tt.doublefailure: "… faça isso de novo."
 ep2_tournament_events.2505.b.tt.sadistic: "Vamos terminar isso rápido."
 ep2_tournament_events.2505.b.tt.notsadistic: "A vitória está garantida, mas um fim rápido ainda seria misericordioso."
 ep2_tournament_events.2506.t: "\"Acho que você já teve o suficiente, [versus_contestant.GetFirstNameNoTooltip].\""
 ep2_tournament_events.2506.desc: "Você consegue convencer [versus_contestant.GetFirstNameNoTooltip] a desistir"
 ep2_tournament_events.2506.a: "[versus_contestant.GetFirstNameNoTooltip] continua seu ataque fracassado"
 ep2_tournament_events.2507.t: "Golpes Desorientadores"
 ep2_tournament_events.2507.desc: "Disputando a Atenção"
 ep2_tournament_events.2507.a: "Um borrão de movimento, um estalo sonoro, e o quintain de treinamento volta a girar de forma descontrolada. [knight1.Custom('ES_ElLa')|U] jovem $knight_culture_player_no_tooltip_lowercase$ que o pôs em movimento galopeia ileso e saúda vitorioso[knight1.Custom('ES_OA')]. Percebo que saúda vitoriosamente #EMP para mim#!, enquanto termina suas firulas com uma breve reverência da sela.\n\n#EMP Plong!#! [Select_CString( knight2.IsFemale, 'Outra cavaleira', 'Outro cavaleiro' )] enfrentou o quintain. Com habilidade semelhante, a trave giratória não o atinge, e tanto [knight2.GetWomanMan] quanto o cavalo passam sem dificuldade. Ele freia o cavalo bem ao lado [Select_CString( knight1.IsFemale, 'da primeira', 'do primeiro' )] $knight_culture_player_no_tooltip_lowercase$ e brandindo sua arma pomposamente, de novo em minha direção. Erguem as viseiras e, mesmo desta distância, consigo vê-los se encarar."
 ep2_tournament_events.2507.b: "[knight1.GetFirstNameNoTooltip] parece muito habilidoso[Select_CString( knight1.IsFemale, 'diestra', 'diestro' )]."
 ep2_tournament_events.2507.b.tt: "[knight2.GetFirstNameNoTooltip] é certamente a escolha aqui."
 ep2_tournament_events.2507.c: "O vencedor tem meu favor!"
 ep2_tournament_events.2507.c.success: "[knight1.GetFirstName] vence!"
 ep2_tournament_events.2507.c.failure: "[knight2.GetFirstName] vence!"
 ### Jousting Events
 ep2_tournament_events.3501.t: "Catastrófe de Construção"
 ep2_tournament_events.3501.desc: "Thunk. Thunk. Thunk. Os estalos irregulares das lanças se quebrando fornecem um fundo rítmico aos golpes surdos e pesados dos impactos do estafermo.\n\nThunk. Thunk. #EMP Croc.#! Mais combatentes têm sua vez, mas, de repente, algo parece estranho. Aquele último impacto não soou diferente...?\n\n[competitor.GetFirstName] se aproxima do estafermo e o golpe colossal que [competitor.GetSheHe] desfere o parte por inteiro. O poste sai girando pelo chão, e a estrutura em si vacila perigosamente antes de finalmente tombar no chão com um estrondo."
 ep2_tournament_events.3501.a: "Quem foi o responsável por isso?! Encontrem-nos e punam-nos!"
 ep2_tournament_events.3501.b: "Que torneio vergonhosamente mal conservado."
 ep2_tournament_events.3501.c: "Eu irei pagar pelo conserto."
 ep2_tournament_events.knight_1_wins: "Um golpe impressionante, [competitor.GetFirstNameNoTooltip]!"
 ep2_tournament_events.knight_2_wins: "$tournament_header$ O $knight_culture_player_no_tooltip_lowercase$ desafortunado"
 ep2_tournament_events.3501.d: "A multidão murmura de forma estranha, como se metade estivesse gemendo e a outra metade... extasiada? Espio entre as fileiras de competidores e solto um suspiro involuntário. [hapless_knight.GetFirstName] passou todo o treinamento até agora errando o alvo de forma vergonhosa e agora se prepara para mais uma investida.\n\nAo se aproximar, a lança lhe escapa completamente das mãos. [hapless_knight.GetFirstNameNoTooltip], em pânico, levanta a cabeça a tempo de ser #EMP atingid[hapless_knight.Custom('ES_OA')]#! no abdômen pelo estafermo! Os braços se abrem e se agarram desesperadamente ao poste, mas o impulso [hapless_knight.Custom('ES_LoLa')] arremessa. Alguns segundos depois, [hapless_knight.GetFirstNameNoTooltip] balança indefes[hapless_knight.Custom('ES_OA')] na extremidade do poste, preso[hapless_knight.Custom('ES_OA')] no ar."
 ep2_tournament_events.3502.t: "Que talento para a comédia física!"
 ep2_tournament_events.3502.desc: "[hapless_knight.GetFirstNameNoTooltip] aceita sua oferta de emprego"
 ep2_tournament_events.3502.a: "[hapless_knight.GetFirstNameNoTooltip] fica irritado com a sugestão"
 ep2_tournament_events.3502.b: "Está zombando do esporte! Expulsem[hapless_knight.GetHerHim]!"
 ep2_tournament_events.3502.c: "[hapless_knight.GetFirstNameNoTooltip] é expulso do Torneio por desacreditá-lo"
 ep2_tournament_events.3502.d: "[hapless_knight.GetFirstNameNoTooltip] consegue defender com sucesso o seu caso"
 ep2_tournament_events.3503.t: "A verdade, [hapless_knight.GetSheHe] me agrada bastante."
 ep2_tournament_events.3503.desc: "Hah! #EMP Hah!#!"
 ep2_tournament_events.3503.a: "Muito Lento"
 ep2_tournament_events.3503.a.tt.success: "Quando eu era pequen[GetPlayer.Custom('ES_OA')], meu velho instrutor me ensinou que meu último suspiro deveria me abandonar justamente antes do impacto da lança.\n\nUm passo, dois passos, três passos. Passo, trote. Abaixar a lança, recobrá-la, mirar a ponta. Inspirar, expirar, acertar o alvo.\n\nSucesso! Minha lança se estilhaça, mas percebo — tarde demais — que meu cavalo ainda estava apenas em trote, não em galope. A dor é instantânea e vívida quando a maça na ponta da haste #X se choca#! contra minhas costas, me derrubando completamente da sela.\n\nFico suspens[GetPlayer.Custom('ES_OA')] no ar, o mundo parado. Ah, como meu velho instrutor franziria a testa se eu fizesse qualquer coisa imperfeita...\n\nO mundo começa a se mover. O chão se precipita ao meu encontro e, de repente, tudo fica negro."
 ep2_tournament_events.3503.a.tt.failure: "..."
 ep2_tournament_events.3503.b: "Está zombando do esporte! Expulsem[hapless_knight.GetHerHim]!"
 ep2_tournament_events.3503.b.tt.success: "$tournament_versus_header$ Ferido"
 ep2_tournament_events.3503.b.tt.failure: "Ir até a marca, encaixar a lança, apoiá-la sobre a sela, esperar o sinal, inclinar-se para a frente, mirar…\n\nA sequência da justa já me é quase mecânica, mas, quando os dois impactos me sacodem, uma dor aguda e lancinante irrompe pelo meu braço.\n\nO sangue jorra livremente de uma ferida arroxeada no bíceps, a lança do meu oponente [versus_contestant.GetFirstName] cortou com violência a parte superior do meu braço.\n\nÉ um ferimento grave. Ninguém me acusaria de covardia por desistir e, de fato, vários pajens preocupados insistem que eu faça isso."
 ep2_tournament_events.3503.c: "Coloque-me de volta no meu cavalo!"
 ep2_tournament_events.3503.d: "Todos os [courtiers|lE] e [guests|lE] ganham #COLOR_GREEN 10#! de [opinion|lE] sobre você"
 ep2_tournament_events.3504.t: "Estou feito[GetPlayer.Custom('ES_OA')] de uma massa mais dura."
 ep2_tournament_events.3504.desc: "A discrição é a melhor parte da coragem."
 ep2_tournament_events.3504.a: "$tournament_versus_header$ Desmontado"
 ### Joust Events
 ep2_tournament_events.4001.t: "![versus_contestant.Custom('ES_EA')] [versus_contestant.GetWomanMan] um dos meus escudos reservas!"
 ep2_tournament_events.4001.desc: "Voc? se machucou[versus_contestant.Custom('ES_EA')]? Vamos te colocar de p?, [versus_contestant.Custom('ES_OA')]!"
 ep2_tournament_events.4001.a: "Tal é a natureza da justa."
 ep2_tournament_events.4001.a.tt: "$tournament_versus_header$ O Tronco Poderoso"
 ep2_tournament_events.4001.b: "Troto meu cavalo até a linha de largada quando algo me faz parar e semicerrar os olhos. A menos que meus olhos me enganem, algo realmente bizarro está acontecendo no outro lado da pista de justas.\n\nOs pajens do meu oponente, [versus_contestant.GetFirstName], esforçam-se para erguer a lança até [versus_contestant.GetSheHe] e com razão. A arma gigantesca é menos uma lança de madeira e mais um tronco de árvore arrancado pela raiz, uma haste colossal tão longa quanto dois homens.\n\nObservo, incrédulo, como [versus_contestant.GetFirstNameNoTooltip] a empunha com arrogância, apoiando-a no pescoço do cavalo para mantê-la firme. A multidão rumoreja com uma mistura de expectativa e indignação, com vozes se entrelaçando, algumas defendendo que seja permitido, outras protestando contra a injustiça."
 ep2_tournament_events.4001.c: "Certamente isso não pode ser permitido?!"
 ep2_tournament_events.4002.t: "Agora, onde está o juiz mais próximo?"
 ep2_tournament_events.4002.desc: "Vamos lá, você tem certeza de que quer vencer assim?"
 ep2_tournament_events.4002.a: "Você consegue persuadir[versus_contestant.GetHerHim]"
 ep2_tournament_events.4002.b: "Você não consegue persuadir[versus_contestant.GetHerHim]"
 ep2_tournament_events.4002.c: "Esse toco gigante não vai te salvar de mim!"
 ep2_tournament_events.4003.t: "Você supera sua desvantagem"
 ep2_tournament_events.4003.desc: "A lança de [versus_contestant.GetFirstNameNoTooltip] se mostra demais para ser superada"
 ep2_tournament_events.4003.a: "$tournament_versus_header$ Problemas à Vista"
 ep2_tournament_events.4003.a.tt: "Afasto o nervosismo habitual antes de uma justa me ocupando em verificar e rever meus vários equipamentos. Ao fazê-lo, porém, percebo uma presença ao meu lado. Meu oponente [versus_contestant.GetFirstName] está, curiosamente, a pé. Com a espada apoiada no ombro, ele se inclina para a frente para falar em um tom um tanto conspiratório.\n\n"[ROOT.Char.GetFirstName]! Que tal esticar as pernas comigo?", ele brada. Diante da minha expressão atônita, ele ri e aponta para o chão.\n\n"Que tal fazermos esta rodada a pé, hein? Uma pequena pausa para dar ao público algo diferente?"."
 ep2_tournament_events.4003.b: "Não importa para mim como eu vou te vencer!"
 ep2_tournament_events.4003.b.tt.win: "Você vence [versus_contestant.GetFirstNameNoTooltip] com a espada"
 ep2_tournament_events.4003.b.tt.lose: "Você não consegue superar [versus_contestant.GetFirstNameNoTooltip]"
 ep2_tournament_events.4003.c: "Volte para o seu cavalo, seu tolo."
 ep2_tournament_events.4003.c.tt.win: "A pie, sí. Pero #EMP con#! lanzas."
 ep2_tournament_events.4003.c.tt.lose: "$tournament_versus_header$ Uma[versus_contestant.Custom('ES_XA')] [versus_contestant.GetWomanMan] de honra?"
 ep2_tournament_events.4004.t: "O antebraço de [versus_contestant.GetFirstName] pende inutilmente enquanto assume sua posição. Uma careta se transforma em uma respiração ofegante sufocada ao tentar erguer a lança. Está claro que a última rodada cobrou um preço alto.\n\nObservo com admiração como os pajens de [versus_contestant.GetFirstNameNoTooltip] colocam a lança no lugar e a prendem ao braço. Parece que a necessidade de demonstrar sua honra leva meu adversári[versus_contestant.Custom('ES_OA')] a continuar competindo, mas não há esperança de vencer.\n\nSaúdo em resposta com minha própria lança enquanto a multidão nos aclama a ambos."
 ep2_tournament_events.4004.desc: "Seria desrespeitoso fazer algo menos do que o meu melhor."
 ep2_tournament_events.4004.a: "Atacas contra [versus_contestant.GetSheHe] como faria com qualquer outro."
 ep2_tournament_events.4004.a.success: "Honra demonstrada merece honra em igual medida!"
 ep2_tournament_events.4004.a.failure: "Você concede uma passagem de misericórdia ao seu oponente, erguendo sua lança para o céu."
 ep2_tournament_events.4004.b: "Uma oportunidade perfeita!"
 ep2_tournament_events.4004.c: "Você varre sua lança em um longo arco, garantindo derrubar seu oponente da sela."
 ep2_tournament_events.4005.t: "$tournament_versus_header$ Misericórdia"
 ep2_tournament_events.4005.desc: "Os dois cavalos começam a trotar. Minha lança começa a descer para sua posição, mas não vejo nenhum movimento semelhante por parte de meu adversari[versus_contestant.Custom('ES_OA')], [versus_contestant.GetFirstName]. Em vez disso, a lança dele aponta para longe de mim, bem fora do alvo.\n\nA “passada de misericórdia” é bastante conhecida entre os que estão familiarizados com justas; uma vez iniciada a passada, mirar deliberadamente para longe do oponente indicará que você deseja pedir uma reinicialização. Atender a esse pedido é uma questão de respeito aos competidores.\n\nÉ claro, isso só vale se #EMP ves#! perceber o desejo do seu oponente…"
 ep2_tournament_events.4005.a: "Não irei aceitar vitórias fáceis."
 ep2_tournament_events.4005.a.tt: "Respeitar os desejos de [versus_contestant.GetFirstNameNoTooltip] de uma passagem de misericórdia."
 ep2_tournament_events.4005.b: "Oh, querido, parece que eu não percebi o pedido deles!"
 ep2_tournament_events.4005.b.tt: "Você não deixa sua lança vacilar."
 ep2_tournament_events.4005.c: "$tournament_versus_header$ Condenado e Empregado"
 ep2_tournament_events.4005.c.tt: "[versus_contestant.GetFirstName|U] se cruza comigo montad[versus_contestant.Custom('ES_OA')] em seu cavalo depois de uma investida, ocupad[versus_contestant.Custom('ES_OA')] com a rédea de seu animal. Arrastando os pés ao lado está seu cavalariç[groom.Custom('ES_OA')]. Está vestid[groom.Custom('ES_OA')] com roupas surpreendentemente surradas, com o tecido desfiando nas costuras.\n\n"Como vos chamais, bom[groom.Custom('ES_XA')] [groom.GetWomanMan]?", [groom.GetSheHe|U] levanta a vista, sobressaltad[groom.Custom('ES_OA')], enquanto seu [versus_contestant.GetLadyLord] e seu cavalo continuam sem [groom.GetSheHe].\n\n"[groom.GetFirstName], [ROOT.Char.Custom('FormOfAddressForLiege')]". No meio de sua resposta, é impossível não notar o olhar invejoso que lança ao seu colega, elegantemente vestido, que cuida do meu cavalo."
 ep2_tournament_events.4006.t: "Que criatura miserável!"
 ep2_tournament_events.4006.desc: "Que tal um emprego?"
 ep2_tournament_events.4006.a: "[versus_contestant.GetFirstNameNoTooltip] não vai gostar disso..."
 ep2_tournament_events.4006.a.tt: "Talvez você queira ganhar algumas moedas?"
 ep2_tournament_events.4006.b: "[groom.GetHerHim|U] convence para dar uma forte palmada nos quartos traseiros do cavalo."
 ep2_tournament_events.4006.b.tt: "Sirva bem ao seu [versus_contestant.GetLadyLord][groom.GetFirstNameNoTooltip]."
 ep2_tournament_events.4007.t: "$tournament_versus_header$ Quem é Você?"
 ep2_tournament_events.4007.desc: "Enquanto o ruído desce em cascata das arquibancadas, meu cavalo agita as orelhas com leve inquietação. Faço um afago em sua crina para tranquilizá-lo. A multidão tem sido terrivelmente hostil nesta rodada. De fato, ao observá-la, ela se põe a cantar.\n\n#EMP [ROOT.Char.Custom('GetNegativeChant')]#!\n\nAlguns até se inclinam sobre as barreiras, e noto com alarme os rostos uivantes e salpicados de saliva da primeira fila que gritam comigo."
 ep2_tournament_events.4007.a: "Eles terão que lidar com minha vitória!"
 ep2_tournament_events.4007.b: "Você consegue se livrar dos abusos da multidão com sucesso"
 ep2_tournament_events.4007.b.tt: "A multidão entra em sua cabeça"
 ep2_tournament_events.4007.c: "Você sofre uma pequena lesão quando a multidão arremessa objetos em você"
 ep2_tournament_events.4007.c.tt: "Não tenho certeza se vencer seria do meu melhor interesse..."
 ep2_tournament_events.4007.d: "Abandone a competição."
 ep2_tournament_events.4008.t: "$tournament_versus_header$ O Paladino Penúrico"
 ep2_tournament_events.4008.desc: "Cranch! Duas lanças se estilhaçam brutalmente ao acertarem. Eu me equilibro com o recuo, como me ensinaram, erguendo-me enquanto meu cavalo reduz a marcha. Ao sacudir as teias de aranha do impacto na minha cabeça, a crescente comoção na multidão me faz olhar para trás, para o lugar de onde vim.\n\nMeu oponente, [versus_contestant.GetFirstName], está em apuros evidentes. Não é algo físico, pelo que vejo, mas está absort[versus_contestant.Custom('ES_OA')] no que parece ser uma discussão com um pobre pajem. Ao me aproximar, ouço alguns fragmentos da disputa deles.\n\nComo assim não temos mais? Você #EMP perdeu#! nosso único sobressalente?!"
 ep2_tournament_events.4008.a: "\n\nLeva alguns instantes, mas de repente eu me lembro. Talvez aqueles rumores sobre as atuais dificuldades financeiras de [versus_contestant.GetFirstNameNoTooltip] tivessem mais fundamento do que eu imaginava…"
 ep2_tournament_events.4008.a.success: "\n\nLenta, mas certamente, vou percebendo que [versus_contestant.GetFirstNameNoTooltip] não é de origem nobre. Provavelmente, conseguir dinheiro seja muito mais difícil para ela do que eu teria esperado…"
 ep2_tournament_events.4008.a.failure: "Hah, hah! Saia do campo de justas, seu miserável [versus_contestant.Custom2('InsultNoun', ROOT.Char)] miserável[versus_contestant.Custom('ES_OnOna')]!"
 ep2_tournament_events.4008.a.criticalfailure: "\"[versus_contestant.GetFirstNameNoTooltip]! Posso lhe oferecer uma lança?\""
 ep2_tournament_events.4008.b: "Bem, a competição deve continuar."
 ep2_tournament_events.4008.b.tt: "Abandone a competição."
 ep2_tournament_events.4009.t: "$tournament_header$ Cavaleiros"
 ep2_tournament_events.4009.desc: "Meu cavalo está pronto, é claro, mas a fera não é nada sem um cavaleiro habilidoso para controlá-la. Como resultado, me vejo com três possíveis cavaleiros diante de mim, todos clamando pela honra de serem escolhidos para me representar.\n\n"
 ep2_tournament_events.4009.desc.poor: "O primeiro é meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('jockey1') )] [jockey1.GetFirstName], um[jockey1.Custom('ES_XA')] candidat[jockey1.Custom('ES_OA')] adequad[jockey1.Custom('ES_OA')] levando em conta a experiência no manejo de cavalos que sua profissão lhe proporciona."
 ep2_tournament_events.4009.desc.lowborn: "Outro[jockey2.Custom('ES_OA')] voluntário[jockey2.Custom('ES_OA')] instantâneo[jockey2.Custom('ES_OA')] é meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('jockey2') )] [jockey2.GetFirstName], que talvez queira justificar minha hospitalidade."
 ep2_tournament_events.4009.a: "\n\n[Select_CString( jockey3.IsFemale, 'A última', 'O último' )|U] me parece [Select_CString( jockey3.IsFemale, 'uma verdadeira desconhecida', 'um verdadeiro desconhecido' )], um[jockey3.Custom('ES_XA')] [jockey3.GetWomanMan] da região sem importância que atende pelo nome de [jockey3.GetFirstName]."
 ep2_tournament_events.4009.b: "Nenhum dos três parece ser um candidato particularmente excepcional - todos eles são completos desconhecidos para mim, claramente plebeus em busca de fama e fortuna - mas eles são os únicos disponíveis."
 ep2_tournament_events.4009.c: "Você serve!"
 #### Horse Racing
 ep2_tournament_events.4500.t: "Bem, eu gosto de um jogo..."
 ep2_tournament_events.4500.desc: "Vamos com [jockey1.GetFirstNameNoTooltip]."
 ep2_tournament_events.4500.knight: "[jockey2.GetFirstNameNoTooltip] parece ser uma boa escolha."
 ep2_tournament_events.4500.guest: "Por que não arriscar com [jockey3.GetFirstNameNoTooltip]?"
 ep2_tournament_events.4500.nobody: "\n\n[Select_CString( jockey3.IsFemale, 'A última', 'O último' )|U] me parece [Select_CString( jockey3.IsFemale, 'uma verdadeira desconhecida', 'um verdadeiro desconhecido' )], um[jockey3.Custom('ES_XA')] [jockey3.GetWomanMan] da região sem importância que atende pelo nome de [jockey3.GetFirstName]."
 ep2_tournament_events.4500.fallback: "$tournament_contest_header$ Momento Roubado"
 ep2_tournament_events.4500.a: "Vivas estrondosos explodem da multid?o reunida quando [enemy.GetFirstName] termina seu recital com um floreio e uma rever?ncia. A ?nica pessoa que n?o est? a assobiar nem a aplaudir sou eu.

 #EMP Como#! p?de saber? Foi planejado? Ou talvez, de alguma forma, por alguma maquina??o de [ROOT.Char.GetFaith.DevilName], tenha sido simplesmente uma coincid?ncia que os versos de [enemy.GetFirstNameNoTooltip] acabassem quase #EMP iguais#! aos meus?

Os espectadores reunidos aguardam em sil?ncio, expectantes. ? a minha vez."
 ep2_tournament_events.4500.b: "Vou mostrar a eles que tudo se resume à #EMP apresentação#!."
 ep2_tournament_events.4500.c: "Hora de improvisar!"
 ep2_tournament_events.4500.knight.tt: "Você improvisa com sucesso"
 ep2_tournament_events.4500.guest.tt: "Sua tentativa é um desastre"
 ep2_tournament_events.4500.nobody.tt: "Isso foi planejado. Julguem!"
 #### Recital Events
 ep2_tournament_events.5501.t: "Todos pensam que você é um[GetPlayer.Custom('ES_XA')] idiota irracional"
 ep2_tournament_events.5501.desc: "Vivas estrondosos explodem da multid?o reunida quando [enemy.GetFirstName] termina seu recital com um floreio e uma rever?ncia. A ?nica pessoa que n?o est? a assobiar nem a aplaudir sou eu.

 #EMP Como#! p?de saber? Foi planejado? Ou talvez, de alguma forma, por alguma maquina??o de [ROOT.Char.GetFaith.DevilName], tenha sido simplesmente uma coincid?ncia que os versos de [enemy.GetFirstNameNoTooltip] acabassem quase #EMP iguais#! aos meus?

Os espectadores reunidos aguardam em sil?ncio, expectantes. ? a minha vez."
 ep2_tournament_events.5501.a: "Chega! Isso não é culpa dela!"
 ep2_tournament_events.5501.b: "Você persuade com sucesso a multidão"
 ep2_tournament_events.5501.b.success: "A multidão ignora seus apelos"
 ep2_tournament_events.5501.b.failure: "Vaiii! #EMP Vaiii!#!"
 ep2_tournament_events.5501.c: "Bem, isso é muito inapropriado."
 ep2_tournament_events.5501.c.success: "$tournament_contest_header$ Pânico de Palco"
 ep2_tournament_events.5501.c.failure: "Os trompetes soam! A multidão grita e vibra! Subo ao estrado do recital acenando. Um silêncio tenso cai quando assumo uma postura heroica, com o peito estufado e os braços abertos.\n\nAbro a boca. Está seca. Muito, muito seca. Tento falar, mas as palavras não saem. Centenas de olhos estão fixos em mim.\n\nPor que não consigo falar?!"
 ep2_tournament_events.5502.t: "Enquanto os murmúrios da multidão se intensificam, minhas mãos trêmulas fecham algo, algo grande e de couro: minha bolsa de moedas."
 ep2_tournament_events.5502.start: "O pânico me faz tremer, minha respiração ofegante de uma maneira... #EMP familiar#!. Um lembrete... de que a paixão nunca me falhou antes..."
 ep2_tournament_events.5502.culture: "Um nó no meu estômago, desconhecido há poucos momentos, aperta nauseantemente, e os murmúrios da multidão se intensificam."
 ep2_tournament_events.5502.friend: "Deve haver algo que eu possa fazer para superar isso..."
 ep2_tournament_events.5502.end: "Felizmente, tenho alguns versos antigos guardados na memória!"
 ep2_tournament_events.5502.a: "Eis aqui! Moeda grátis!"
 ep2_tournament_events.5502.c.success: "Posso escapar rapidamente enquanto todos se atrapalham!"
 ep2_tournament_events.5502.c.failure: "Alguma #EMP teatralidade#! não seria ruim."
 ep2_tournament_events.5502.b: "Os espectadores vão #EMP adorar#! isso!"
 ep2_tournament_events.5502.c: "Olhem! Um macaco de três cabeças!"
 ep2_tournament_events.5503.t: "Você distrai a multidão com sucesso"
 ep2_tournament_events.5503.desc: "A multidão não é enganada"
 ep2_tournament_events.5503.rich: "\"A-#EMP hem#!. Como nossos, uh, antepassados já c-c-cantaram...\""
 ep2_tournament_events.5503.seducer: "$tournament_contest_header$ A Vontade do Clima"
 ep2_tournament_events.5503.fallback: "#BOL Cracatuuum!#!\n\nUm relâmpago repentino precede o estrondo do trovão e, enquanto me dirijo à plataforma elevada, fica claro que o tempo, antes agradável, deu lugar a condições decididamente sombrias. Assim que dou o primeiro passo, a chuva começa a cair.\n\nA multidão se ergue, expectante, um tanto relutante, ficando cada vez mais encharcada a cada minuto. Abro a boca, e outro estrondo retumbante percorre toda a assembleia. Olho para o céu.\n\nBem, este será um desafio e tanto."
 ep2_tournament_events.5503.a: "Mas eu #EMP encantan#! os desafios!"
 ep2_tournament_events.5503.a.tt: "O clima dá pathos às suas palavras"
 ep2_tournament_events.5503.b: "Você é abafado pela tempestade"
 ep2_tournament_events.5503.b.tt: "E se formos atingidos por um raio?!"
 ep2_tournament_events.5503.c: "$tournament_contest_header$ Aproveitando uma Oportunidade"
 ep2_tournament_events.5503.c.tt: "Mais um verso pronto, mais um sucesso com o público. Estou me divertindo muito, e o barulhento apreço da multidão só eleva ainda mais o meu ânimo.\n\nEnquanto recebo alguns aplausos após uma frase especialmente espirituosa, vejo um[enemy.Custom('ES_OA')] de meus oponentes, [enemy.GetFirstName], ensaiando suas falas com algo de sobrancelhas franzidas no rosto. Uma nova salva de aplausos confirma minhas suspeitas: [enemy.GetSheHe] claramente não está muito contente[enemy.Custom('ES_OA')] com a recepção que estou tendo!\n\nPois então. Talvez tamanha"
 ep2_tournament_events.5503.d: "triste solitário"
 ep2_tournament_events.5503.d.win: "desajeitado solitário"
 ep2_tournament_events.5503.d.lose: "idoso[enemy.Custom('ES_OA')] murchado[enemy.Custom('ES_OA')] e decrépito[enemy.Custom('ES_OA')]"
 ep2_tournament_events.5503.e: "gord[enemy.Custom('ES_AnAna')] bochech[enemy.Custom('ES_OnOna')] e engordurad[enemy.Custom('ES_OA')]"
 ep2_tournament_events.5504.t: "falso[enemy.Custom('ES_OA')] brando[enemy.Custom('ES_OA')] e acanhado[enemy.Custom('ES_OA')]"
 ep2_tournament_events.5504.desc: "alma desafortunada"
 ep2_tournament_events.5504.a: "[enemy.Custom2('InsultNoun', ROOT.Char)|U] [enemy.Custom2('InsultAdjective', ROOT.Char)]"
 ep2_tournament_events.5504.a.success: "precisa de uma fala preparada #EMP especialmente#! especialmente para [enemy.GetSheHe]!\n\n"Se [ROOT.Char.GetFaith.HighGodName] em pessoa estivesse aqui, certamente diria a todos…"."
 ep2_tournament_events.5504.a.failure: "que dormir com [enemy.GetFirstNameNoTooltip] é realmente uma #EMP tragedia#!!"."
 ep2_tournament_events.5504.b: "até mesmo [ROOT.Char.GetFaith.HighGodNameSheHe] o declínio de [enemy.GetFirstNameNoTooltip] poderia deter!"."
 ep2_tournament_events.5505.t: "Que a carne de [enemy.GetFirstName] merecesse ser esfolada!."
 ep2_tournament_events.5505.desc: "até que nem [ROOT.Char.GetFaith.HighGodNameSheHe] pudesse arrancar [enemy.GetFirstNameNoTooltip]!"
 ep2_tournament_events.5505.start.malevirgin: "que [enemy.GetFirstNameNoTooltip] é tont[enemy.Custom('ES_OA')]!"
 ep2_tournament_events.5505.start.femalevirgin: "quem convidar [enemy.GetFirstNameNoTooltip] vai insistir em pagar!"
 ep2_tournament_events.5505.start.old: "que vencer a [enemy.GetFirstNameNoTooltip] nisso é brincadeira de criança!"."
 ep2_tournament_events.5505.start.fat: "não importa."
 ep2_tournament_events.5505.start.soft: "Todo parente próximo não Sadista:"
 ep2_tournament_events.5505.start.compassionate: "alma desafortunada"
 ep2_tournament_events.5505.start.fallback: "$tournament_contest_header$ Fama e Fortuna"
 ep2_tournament_events.5505.end: "Uma brisa suave varre o campo enquanto outro competidor faz seu disparo. O público é respeitoso e silencioso. Sinceramente, um pouco #EMP demasiado#! silencioso e respeitoso demais. Quase me parece ouvir um bocejo em meio aos educados aplausos quando a corda do arco vibra e a flecha acerta em cheio.\n\nDou um passo à frente para fazer a minha vez. Em seguida, vêm aclamações mais gentis, porém dispersas. Não é, de longe, uma reunião dinâmica.\n\nEnquanto posiciono uma flecha, uma ideia — não particularmente sensata, mas empolgante — me vem à mente.\n\nVamos ver se eles bocejam com isto!"
 ep2_tournament_events.5505.maidenless: "Serei lembrado por várias gerações!"
 ep2_tournament_events.5505.old: "Você acerta o alvo equilibrando-se em uma perna em uma cerca"
 ep2_tournament_events.5505.torturer: "Você escorrega e cai"
 ep2_tournament_events.5505.fat: "Vou dar a eles algo para aplaudir!"
 ep2_tournament_events.5505.idiot: "Você acerta o alvo vendado"
 ep2_tournament_events.5505.compassionate: "Você erra"
 ep2_tournament_events.5505.fallback: "Pensando bem..."
 ep2_tournament_events.5505.getout: "$tournament_contest_header$ Braço e Perna"
 ep2_tournament_events.5505.opinion.tt: "As vistas e sons de uma justa são sempre algo digno de se ver. O choque da lança contra o escudo corta o ruído dos cascos trovejantes enquanto os cavalos relincham e bufam.\n\nEnquanto ouço atentamente, outro ruído ecoa pelo campo. Um uivo curto e agudo prenuncia o som de uma agitação crescente. Corro para me juntar a ela.\n\nUm círculo de pessoas cerca [versus_contestant.GetFirstName], que claramente caiu do cavalo antes de sua luta. O braço dele(a) fica pendendo em um ângulo bastante horripilante; então, é um pequeno alívio que também pareça estar bastante atordoad[versus_contestant.Custom('ES_OA')]."
 #Honse Anchery
 ep2_tournament_events.6501.t: "Sim, ajudar você a se levantar. Com #EMP aquele#! braço..."
 ep2_tournament_events.6501.desc: "Chamem meu médico!"
 ep2_tournament_events.6501.a: "[physician.GetFirstNameNoTooltip] se sai muito bem"
 ep2_tournament_events.6501.a.tt.win: "[physician.GetFirstNameNoTooltip] não pode ajudar muito"
 ep2_tournament_events.6501.a.tt.lose: "Vamos encontrar ajuda para você."
 ep2_tournament_events.6501.b: "O[competitor.Custom('ES_EA')] tolo devia ter segurado com mais força."
 ep2_tournament_events.6501.b.tt.win: "$tournament_contest_header$ Erro Desastroso"
 ep2_tournament_events.6501.b.tt.lose: "Observo com olhar experiente enquanto [competitor1.GetFirstName] começa a se aproximar dos alvos. O primeiro disparo voa certeiro e crava no alvo. O segundo foi bem mais descontrolado, #EMP mucho#! muito\n\nMais agudo, ímpio, atravessa o ar. A segunda flecha não só não atingiu o alvo, como voou tão desviada que caiu no meio de um grupo de competidores à espera. Caiu, de fato, em [competitor2.GetFirstName]!\n\nUma multidão se volta contra [competitor2.Custom('ES_AlAla')] [competitor2.GetWomanMan] ferid[competitor2.Custom('ES_OA')]. Está deitad[competitor2.Custom('ES_OA')]. De costas, apertando a ferida em uma tentativa vã de estancar o sangue, com a flecha ainda cravada meio palmo fundo na carne."
