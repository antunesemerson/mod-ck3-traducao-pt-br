l_spanish:
 #RACE EVENTS
 jason_first_race_event.1.t: "Um Emaranhado de Pernas"
 jason_first_race_event.1.desc: "A todo galope, o cavaleiro [opponent.Custom('ES_DelDela')] [opponent.GetTitledFirstName|l] empurra #EMP [opponent.Custom('GetContestHorseRaceName')]#! contra meu cavalo e meu cavaleiro, [jockey.GetFirstName], ou talvez tenha sido #EMP [ROOT.Char.Custom('GetContestHorseRaceName')]#! quem desviou para cima deles? De qualquer forma, todo o grupo azarado se precipita de lado contra as barreiras.\n\nOnde antes havia um grupo inteiro de montarias em disparada, brilhando de suor, agora duas são arremessadas para fora, com seus cavaleiros lutando para controlá-las.\n\nO pelotão de corredores avança em disparada, com os dois cavalos bamboleantes agora uma distância atrás do resto."
 jason_first_race_event.1.desc.suspicious: "Do meio dos seus servos, [opponent.GetTitledFirstNameNoTooltip|l] grita em "surpresa"... de maneira pouco convincente."
 jason_first_race_event.1.desc.sympathetic: "Do meio dos seus servos, [opponent.GetTitledFirstNameNoTooltip|l] grita de horror."
 jason_first_race_event.1.a: "Uma artimanha! Fui trapaceado!"
 jason_first_race_event.1.a.tt: "Essa agressão é motivo para desqualificá-los!"
 jason_first_race_event.1.a.tt.win: "Desclassificam da corrida o cavalo de [opponent.GetFirstNameNoTooltip] por "jogo sujo""
 jason_first_race_event.1.a.tt.lose: "Você soa claramente mesquinh[GetPlayer.Custom('ES_OA')]... ninguém lhe dá atenção"
 jason_first_race_event.1.b: "[opponent.GetFirstNameNoTooltip] sozinho compartilha o infortúnio deste momento."
 jason_first_race_event.1.b.tt: "Você oferece sincera solidariedade ao seu desafortunad[opponent.Custom('ES_OA')] colega competidor[opponent.Custom('ES_XA')]."
 jason_first_race_event.1.c: ""Afrouxe as rédeas, [jockey.GetFirstNameNoTooltip]!""
 jason_first_race_event.1.c.tt: "Você chama seu jóquei para encorajá-l[jockey.Custom('ES_OA')] a prosseguir"
 jason_first_race_event.1.c.tt.win: "[jockey.GetFirstNameNoTooltip] estabiliza sua montaria"
 jason_first_race_event.1.c.tt.lose: "[jockey.GetFirstNameNoTooltip] não consegue ouvir você"
 jason_first_race_event.1.d: "Adeus, vitória?"
 jason_first_race_event.1.d.tt: "Eu apenas espero que [jockey.GetFirstNameNoTooltip] esteja bem..."
 contest_horse_race_collision_log_title: "Corredores Colidem"
 contest_horse_race_collision_log: "As inscrições de [Select_CString( CHARACTER.IsLocalPlayer, 'seus estábulos', CHARACTER.GetShortUIName )] e de [TARGET_CHARACTER.GetShortUIName] na corrida se chocaram uma contra a outra"
