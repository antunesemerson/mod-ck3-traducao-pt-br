l_spanish:
 tournament_events.8000.t: "Um Belo Favor"
 tournament_events.8000.desc.intro: "Enquanto me preparo para minha próxima partida, avisto [favor_giver_1.GetName] me saudando ao acenar com um [favor_giver_1.Custom('GetRandomFavor')], oferecendo-me seu favor."
 tournament_events.8000.desc.mid.two: "

Antes que eu possa responder, [favor_giver_2.GetName] aparece, segurando um [favor_giver_2.Custom('GetRandomFavor')] para mim e insistindo que eu aceite seu favor!"
 tournament_events.8000.desc.mid: "

Seu interesse em mim parece genuíno, e nada poderia ser mais galante do que vencer um confronto por um[favor_giver_1.Custom('ES_XA')] nobre [favor_giver_1.GetLadyLord]."
 tournament_events.8000.desc.outro.homo: "Eu aceito, [favor_giver_1.GetTitledFirstNameNoTooltip|l]."
 tournament_events.8000.desc.outro: "

Seu interesse em mim parece genuíno, e nada poderia ser mais galante do que vencer um confronto por um[favor_giver_1.Custom('ES_XA')] nobre [favor_giver_1.GetLadyLord]."
