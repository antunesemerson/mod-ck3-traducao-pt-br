l_spanish:
 ##### CONTEST #####
 ### SHARED
 contest_events_opening_prize_desc: "\"Para o vencedor: este artefato, [newly_created_artifact.GetType|l], cortesia de noss[host.Custom('ES_OA')] gentil anfitri[host.Custom('ES_OnOna')], [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l]!\"."
 contest_events_marriage_prize_desc: "\"Ao vencedor, a mão de [marriage_prize.GetTitledFirstName|l] em casamento, por decreto de noss[host.Custom('ES_OA')] cordial anfitri[host.Custom('ES_OnOna')]; [host.GetName]!\"."
 contest_events_opening_intent_contestant: "[intent_scope.GetName] também está competindo no concurso."
 contest_events_opening_intent_contestant_team: "Eu percebo que [intent_scope.GetName] foi colocado no meu time..."
 contest_events_opening_intent_contestant_opposing: "Eu percebo que [intent_scope.GetName] foi colocado no time adversário..."
 contest_events_opening_intent_spectator: "\n\n[intent_scope.GetName] não está participando da competição."
 contest_events_opening_intent_contestant_horse_race: "[intent_scope.GetName] también ha inscrito a su [intent_scope.Custom('ContestHorseRaceGender')], #EMP [intent_scope.Custom('GetContestHorseRaceName')]#!."
 contest_events_closing_win_winner: "\n\nDemostrei meu valor além de qualquer dúvida!"
 contest_events_closing_win_contestant: "\n\nPreciso me esforçar mais se quiser garantir a vitória neste torneio!"
 tournament_events_murder_sabotage_contest_tt: "Será mais fácil 'acidentalmente' matar [murder_target.GetFirstName] no próximo concurso"
 contest_events_closing_marriage_valid_host_only: "\n\nEm uma estranha reviravolta do destino, e graças a uma habilidade inegável, sou [Select_CString( ROOT.Char.IsFemale, 'la única', 'el único' )] [marriage_prize.Custom('GetBrideGroom')] viável…"
 contest_events_closing_marriage_valid: "Depende de mim se irei honrar minha palavra..."
 contest_events_closing_marriage_wedding_host: "\n\nDe acordo com sua própria decisão, como vencedor[host.Custom('ES_XA')]; [host.GetTitledFirstNameNoTooltip|l] se casou com seu [host.Custom2('RelationToMeShort', marriage_prize)]; [marriage_prize.GetFirstName]!"
 contest_events_closing_marriage_wedding: "\n\n“Tal como foi prometido, [host.GetTitledFirstNameNoTooltip|l] entregou em casamento a mão de [marriage_prize.GetFirstName] sua [host.Custom2('RelationToMeShort', marriage_prize)] ao(à) [contest_winner.GetFirstNameNoTooltip]!"
 contest_events_closing_marriage_betrothal_host: "\n\nDe acordo com sua própria decisão, como vencedor[host.Custom('ES_XA')]; [host.GetTitledFirstNameNoTooltip|l] foi prometido em casamento com seu [host.Custom2('RelationToMeShort', marriage_prize)]; [marriage_prize.GetFirstName]!"
 contest_events_closing_marriage_betrothal: "\n\nTal como prometido, [host.Custom('ES_ElLa')] [host.GetTitledFirstNameNoTooltip|l] ofereceu a seu [host.Custom2('RelationToMeShort', marriage_prize)], [marriage_prize.GetFirstName], em noivado com [contest_winner.GetFirstNameNoTooltip]!"
 contest_events_closing_marriage_reneged_winner: "\n\n[host.Custom('ES_ElLa')|U] [host.GetTitledFirstNameNoTooltip|l] recusou-se escandalosamente a honrar o prêmio prometido de sua [host.Custom2('RelationToMe', marriage_prize)] de [marriage_prize.GetFirstName]. Este casamento, sem dúvida, só pode ser visto como um insulto aos vencedores!"
 contest_events_closing_marriage_invalid_slots: "$contest_events_closing_marriage_invalid$ Depois de tudo, um[contest_winner.Custom('ES_XA')] [contest_winner.GetWomanMan] não precisa de tantos parceiros."
 contest_events_closing_marriage_invalid_family: "$contest_events_closing_marriage_invalid$ Não está certo que um[marriage_prize.Custom('ES_XA')] [marriage_prize.GetWomanMan] se case com seu [marriage_prize.Custom2('RelationToMeShort', contest_winner)]."
 contest_events_closing_marriage_invalid: "\n\nParece que a fortuna decretou que o prêmio prometido da mão em casamento [host.Custom('ES_DelDela')] [host.Custom2('RelationToMeShort', marriage_prize)] de [host.GetTitledFirstName|l], [marriage_prize.GetFirstName]."
 contest_events_closing_marriage_host_refused: "\n\nApenas [Select_CString( host.IsFemale, 'la misma', 'el mismo' )] [host.GetTitledFirstName|l] era um[host.Custom('ES_XA')] pretendente adequad[host.Custom('ES_OA')], e decidiu não se casar com seu [host.Custom2('RelationToMeShort', marriage_prize)]"
 contest_events_closing_marriage_host: "De forma estranha, e indiscutível habilidade, encontro-me entre os vencedores elegíveis..."
 contest_events_closing_marriage_three: "[bachelor_1.GetFullName], [bachelor_2.GetFullName] e [bachelor_3.GetFullName] estão todos ansiosos para se casar e são vitoriosos em seus próprios méritos."
 contest_events_closing_marriage_two: "[bachelor_1.GetFullName] e [bachelor_2.GetFullName] são ambos pretendentes possíveis, sendo vitoriosos em seus próprios direitos."
 contest_events_closing_marriage_one: "Parece que [bachelor_1.GetFullName] é [Select_CString( bachelor_1.IsFemale, 'a única', 'o único' )] pretendente apt[bachelor_1.Custom('ES_OA')]."
 contest_events_closing_marriage_none: "No entanto, nenhum dos vencedores é um pretendente elegível de qualquer maneira..."
 every_tournament_attendee_tt: "Todos os participantes do torneio"
 ### RACE ###
 #START
 contest_events.0500.t: "[activity.GetCurrentPhase.GetPhase.GetName]: O Concurso Começa"
 contest_events.0500.horse_race: "Os melhores cavalos em [host.GetPrimaryTitle.GetBaseNameNoTierNoTooltip], adornados nas cores de seus proprietários, são conduzidos ao redor da [activity.Custom('ContestHorseRaceTrack')] enquanto o heraldo anuncia o início do concurso. Os cavaleiros circulam enquanto esperam a chegada das bestas, alguns se esticando, outros se observando.\n\n"
 contest_events.0500.contestant_horse: "Meu cavalo mais rápido, #EMP [ROOT.Char.Custom('GetContestHorseRaceName')]#!, não passou despercebido pelos criadores e jogadores.\n\n"
 contest_events.0500.closing: "Nada supera uma boa corrida."
 mysterious_stranger_horse_race: "Parece que o/a [mysterious_stranger.Custom('ContestHorseRaceGender')] de [mysterious_stranger.GetFullName] , #EMP [mysterious_stranger.Custom('GetContestHorseRaceName')]#!, chamou a atenção de muitos como um improvável competidor.\n\n"
 contest_events.0500.a.contestant: "Esta será uma corrida emocionante."
 contest_events.0500.a: "Que espetáculo."
 contest_events.0500.b: "Eu tenho uma aposta para fazer..."
 contest_events.0500.c: "Meu cavalo #EMP irá#! participar!"
 contest_events.0500.d: "O de [rival_contestant.GetTitledFirstNameNoTooltip|l] #EMP no#! correrá."
 contest_events.0500.e: "Deve haver um jeito de colocar meu cavalo nessa corrida..."
 contest_events_place_wager_tt: "Faça uma aposta de [gold_i][gold|lE] no vencedor do [contest|El] [activity.GetCurrentPhase.GetPhase.GetName|l]"
 #END
 contest_events.0505.t: "Vencedor do Concurso"
 contest_events.0505.t.horse_race: "$tournament_phase_horse_race$: $contest_events.0505.t$"
 contest_events.0505.horse_race: "O cavalo de [contest_winner.GetShortUINameNoFormat|U], #EMP [contest_winner.Custom('GetContestHorseRaceName')|U]#!, cruza a linha enquanto a multidão explode, seguido de perto por #EMP [second_place.Custom('GetContestHorseRaceName')|U]#! de [second_place.GetShortUINameNoFormat] e #EMP [third_place.Custom('GetContestHorseRaceName')|U]#! de [third_place.GetShortUINameNoFormat].\n\n"
 contest_events.0505.first_horse: "Sim #EMP [ROOT.Char.Custom('GetContestHorseRaceName')|U]#! Você é lindo(a) [ROOT.Char.Custom('ContestHorseRaceGender')]"
 contest_events.0505.first_maydan: "Sim, meu #EMP Sabiq#!! Você é lindo(a) [ROOT.Char.Custom('ContestHorseRaceGender')]"
 contest_events.0505.second_horse: "Tão perto #EMP [ROOT.Char.Custom('GetContestHorseRaceName')]#!..."
 contest_events.0505.second_maydan: "Tão perto meu #EMP Mutabarriz#!, tão perto..."
 contest_events.0505.third_horse: "Terceiro lugar... bem feito #EMP [ROOT.Char.Custom('GetContestHorseRaceName')]#!, você conseguiu o pior melhor lugar..."
 contest_events.0505.third_maydan: "#EMP Mujalli…#! Acredite em mim, eu poderia estar mais satisfeito[GetPlayer.Custom('ES_OA')]…"
 contest_events.0505.contestant_horse: "#EMP [ROOT.Char.Custom('GetContestHorseRaceName')]#! nem chegou entre os primeiros. Preciso estar melhor preparado(a) da próxima vez!"
 contest_events.0505.spectator: "Um evento emocionante!"
 contest_events.0505.a.winner: "Eu, vosstr[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], ganhei!"
 contest_events.0505.a.marriage: "Acho que o prêmio será suficiente."
 contest_events.0505.a: "Muito bem, [contest_winner.GetTitledFirstNameNoTooltip|l]."
 contest_events.0505.b: "![ROOT.Char.GetIntentTarget.GetTitledFirstNameNoTooltip|l] ganhei por você!"
 contest_events.0505.c.winner: "Parece que iremos nos casar, [marriage_prize.GetFirstNameNoTooltip]."
 contest_events.0505.c: "Muito bem. A mão de [marriage_prize.GetTitledFirstNameNoTooltip|l] é sua."
 contest_events.0505.d.winner: "Eu venci! Eu #EMP realmente#! venci!"
 contest_events.0505.d.second: "Tão perto..."
 contest_events.0505.d.loser: "Sempre haverá próxima vez..."
 contest_events.0505.d: "A fortuna o favoreceu."
 contest_events.0510.t: "Última Volta da $tournament_contest_header$"
 contest_events.0510.desc: "Os cavalos continuam a correr em disparada pelo percurso, os cavaleiros restantes puxando as rédeas de seus animais para incentivá-los a ir ainda mais rápido. Já foi uma corrida cheia de acontecimentos, penso comigo, lembrando quando"
 contest_events.0510.flavor_1: "meu cavaleiro caiu da sela, mas se recuperou e voltou a montar.\n\n"
 contest_events.0510.flavor_2: "Eu gritei animadamente para incentivar meu cavaleiro.\n\n"
 contest_events.0510.flavor_3: "dois cavaleiros e seus cavalos se envolveram em uma colisão.\n\n"
 contest_events.0510.flavor_4: "a multidão quase entrou em tumulto.\n\n"
 contest_events.0510.flavor_5: "meu cavaleiro contornou o interior da pista, ganhando uma grande vantagem.\n\n"
 contest_events.0510.flavor_6: "uma colisão envolvendo vários cavalos derrubou três cavaleiros de uma só vez.\n\n"
 contest_events.0510.flavor_7: "meu cavalo foi atingido por um cavalo competidor.\n\n"
 contest_events.0510.flavor_8: "todos os espectadores ficaram encantados com um(a) belo(a) jóquei.\n\n"
 contest_events.0510.flavor_9: "um plebeu correu nu na pista.\n\n"
 contest_events.0510.flavor_fallback: "Resta apenas mais uma volta! Eu me inclino sobre a borda da arquibancada e grito para meu cavaleiro enquanto o grupo passa."
 contest_events.0510.a: "\"Bônus extra se você vencer!\""
 contest_events.0510.b: "\"Acerte-os! Na cara!\""
 contest_events.0510.c: "\"Pegue as rédeas deles!\""
 contest_events.0510.d: "\"Vai! #EMP Mais rápido!#!\""
 contest_events.0530.t: "Cavalos para Corridas do $tournament_contest_header$"
 contest_events.0530.pivotal_success: "A estratégia do meu cavaleiro funcionou! Meu cavalo avança rapidamente enquanto eles contornam a última curva em direção à reta final. Restam apenas momentos agora...\n\n"
 contest_events.0530.pivotal_neutral: "É difícil dizer se meu conselho fez alguma diferença, e todos os cavalos contornam a última curva em direção à reta final em um aglomerado.\n\n"
 contest_events.0530.pivotal_failure: "Desequilibrado e surpreso com meu chamado, meu cavaleiro vacila e quase cai. Meu cavalo perde um pouco de terreno enquanto eles contornam a última curva em direção à reta final. Isso vai ser acirrado...\n\n"
 contest_events.0530.ptv_close: "É quase impossível dizer quem vai levar a vitória. Eles estão lado a lado!"
 contest_events.0530.ptv_top: "Meu cavalo está se distanciando do pelotão perseguidor! Se ele conseguir se manter à frente dos meus rivais, nós vamos vencer!"
 contest_events.0530.ptv_top_spectator: "O cavalo de [pivotal_contestant.GetFirstName] escapou! Agora só precisam levá-lo até a linha de chegada!"
 contest_events.0530.ptv_bottom: "Meu cavalo está em último lugar, e sinto a vitória escapando pelos meus dedos. Precisamos de algo, #EMP qualquer coisa#!..."
 contest_events.0530.ptv_bottom_spectator: "O cavalo de [pivotal_contestant.GetFirstName] parece quase derrotado. Ele precisa de alguma coisa, #EMP lo que sea#!…"
 contest_events.0530.ptv_top_half: "Meu cavalo está confortavelmente entre os primeiros colocados, mas está acirrado. Só precisamos de um empurrão extra para vencer!"
 contest_events.0530.ptv_top_half_spectator: "O cavalo de [pivotal_contestant.GetFirstName] está na metade superior, mas é uma disputa apertada. A glória ainda está em jogo."
 contest_events.0530.ptv_bottom_half: "Meu cavalo está encurralado no segundo grupo de corredores, mas a vitória ainda não está fora de alcance. Se meu cavaleiro encontrar um espaço, talvez possamos fazer uma arrancada rumo à vitória..."
 contest_events.0530.ptv_bottom_half_spectator: "O cavalo de [pivotal_contestant.GetFirstName] está encurralado perto do fim do pelotão, mas ainda não acabou. Uma única ação ainda pode virar o jogo para ele…"
 contest_events.0530.ptv_fallback: "A corrida se aproxima de sua conclusão, os cavalos esticando seus pescoços para alcançar a linha."
 contest_events.0530.spectator: "\n\nO suor voa dos cavalos galopantes enquanto eles contornam uma curva final, seus cavaleiros os incentivando com vozes fracas, enquanto a multidão urra e grita na cena."
 contest_events.0530.final: "\n\nA multidão atinge o ápice. Os cavaleiros instigam seus cavalos em uníssono. A linha de chegada se aproxima."
 contest_events.0530.a: "Mais um esforço!"
 contest_events.0530.b: "Não falta muito!"
 contest_events.0520.t: "Cavalo de Guerra"
 contest_events.0520.desc: "A corrida de cavalos se aproxima, e a ideia de colocar meu cavalo de guerra, #EMP [ROOT.Char.Custom('WarhorseStoryName')]#!, em vez do meu corredor, #EMP [ROOT.Char.Custom('GetContestHorseRaceName')]#!, tem passado pela minha cabeça nos últimos dias.\n\nEu não estaria montando n eu mesmo, mas [ROOT.Char.Custom('HorseStorySheHe')] tem espírito mesmo assim..."
 contest_events.0520.a: "#EMP [ROOT.Char.Custom('WarhorseStoryName')]#! não vai me decepcionar."
 contest_events.0520.b: "Não, o lugar dele é no campo de batalha."
 contest_horse_race_enter_war_horse_tt: "Insira seu cavalo de guerra na Corrida de Cavalos"
 ### TEAM ###
 #START
 contest_events.0600.t: "[activity.GetCurrentPhase.GetPhase.GetName]: O Concurso Começa"
 contest_events.0600.melee: "Uma clara divisão foi estabelecida entre as duas equipes, que se enfrentam, provocando-se enquanto preparam seus equipamentos e sussurram planos. Cavalos são preparados ao fundo, os garanhões relinchando e resmungando. Será um dia de trabalho brutal.\n\n"
 contest_events.0600.contestant: "Meu time certamente derrotará essa turma de fanfarrões [other_team_captain.Custom('ES_DelDela')] [other_team_captain.GetTitledFirstName|l]!\n\n"
 contest_events.0600.champion_self: "Meu/minha campe[contest_champion.Custom('ES_OnOna')], [contest_champion.GetFirstName], e eu vamos mostrar a [other_team_captain.GetTitledFirstName] como se faz!\n\n"
 contest_events.0600.champion: "Meu campe[contest_champion.Custom('ES_OnOna')]; [contest_champion.GetFirstName], vai mostrar quem manda!\n\n"
 contest_events.0600.neither_qualify: "Nem eu nem meu campeão[contest_champion.Custom('ES_OnOna')] , [contest_champion.GetFirstName] , nem eu nos qualificamos."
 contest_events.0600.champion_qualify: "Meu campe[contest_champion.Custom('ES_OnOna')] , [contest_champion.GetTitledFirstName|l] , não se classificou desta vez."
 contest_events.0600.self_qualify: "Quando me aproximo dos jurados para confirmar meu lugar, sou rejeitado: não me classifiquei desta vez."
 contest_events.0600.closing: "Isso vai ser bom."
 contest_events.0600.a: "Ao campo!"
 contest_events.0600.a.contestant: "A glória será nossa!"
 contest_events.0600.captains_tt: "[my_team_captain.GetShortUIName|U] e [other_team_captain.GetShortUIName] são os capitães das equipes devido ao [rank|El] e experiência"
 contest_events.0600.team_tt: "Você está na equipe de [my_team_captain.GetShortUIName]"
 #END
 contest_events.0605.t.melee: "$tournament_phase_melee$: $contest_events.0605.t$"
 contest_events.0605.t: "Vencedores do Concurso"
 contest_events.0605.desc: "Soam as trombetas, a multidão clama, os competidores começam a se reunir. A competição acabou, e um time está se preparando para ter seu momento de glória. Um arauto se adianta, com a voz ecoando por todo o recinto.\n\n“Após muitas provas, algumas tribulações e, acima de tudo, uma competição verdadeiramente animada, temos nossos vencedores: o time [contest_winner.Custom('ES_DelDela')] [contest_winner.GetTitledFirstName|l] derrotou o [second_place.Custom('ES_DelDela')] [second_place.GetTitledFirstName|l] na competição!”.\n\n"
 contest_events.0605.desc.winner: "Bem jogado a todos! Hora de comemorar!"
 contest_events.0605.desc.loser: "Não consegui levar minha equipe à vitória desta vez..."
 contest_events.0605.desc.team_winner: "Bom jogo! Nada supera a emoção da vitória!"
 contest_events.0605.desc.team_loser: "Bem... teremos que treinar mais para a próxima vez..."
 contest_events.0605.desc.spectator: "Um esporte emocionante, mesmo para os espectadores!"
 contest_events.0605.a.host_winner: "![ROOT.Char.Custom('ES_ElLa')|U] [ROOT.Char.GetTitleAsNameNoTooltip] é imbatível!"
 contest_events.0605.a.host_loser: "Nem [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip] pode ganhar tudo…"
 contest_events.0605.a.winner: "Conseguimos. Nós vencemos!"
 contest_events.0605.a.loser: "Vamos pegar vocês na próxima vez!"
 contest_events.0605.a: "Que esporte caótico."
 contest_events.0610.t: "$tournament_contest_header$ Na Batalha"
 contest_events.0610.desc: "As sombras se alongam à medida que a batalha continua, a confusão diminuindo à medida que os competidores saem cambaleando. Girando meu cavalo, reflito sobre o que aconteceu até agora, como quando"
 contest_events.0610.flavor_1: "perdi a paciência e espanquei outro competidor até ficar ensanguentado.\n\n"
 contest_events.0610.flavor_2: "o prefeito do assentamento local ficou furioso depois que uma briga se espalhou pelas ruas.\n\n"
 contest_events.0610.flavor_3: "minha arma foi arrancada das minhas mãos, me fazendo correr atrás dela.\n\n"
 contest_events.0610.flavor_4: "uma alma cativante se perdeu na confusão.\n\n"
 contest_events.0610.flavor_5: "ganhei o direito de receber um grande resgate!\n\n"
 contest_events.0610.flavor_6: "procurando descanso, me abriguei brevemente em um refúgio.\n\n"
 contest_events.0610.flavor_7: "enfrentei um famoso guerreiro e sobrevivi para contar a história.\n\n"
 contest_events.0610.flavor_8: "me escondi nas árvores, preparando uma emboscada para os passantes desprevenidos.\n\n"
 contest_events.0610.flavor_9: "galopei pelo tumulto, observando outros caírem de seus cavalos.\n\n"
 contest_events.0610.flavor_10: "descobri um cavaleiro misterioso de grande habilidade lutando em meio à batalha.\n\n"
 contest_events.0610.flavor_11: "fui encurralado[GetPlayer.Custom('ES_OA')] por três cavaleiros inimigos.\n\n"
 contest_events.0610.flavor_12: "salvei um membro da Casa de uma situação perigosa.\n\n"
 contest_events.0610.flavor_fallback: "Os eventos estão claramente se intensificando, com linhas de batalha exaustas sendo traçadas mais uma vez. A oportunidade de deixar minha marca neste concurso é agora."
 contest_events.0610.a: "Vou conquistar uma vitória de soldado!"
 contest_events.0610.b: "\"Comigo! À vitória!\""
 contest_events.0610.c: "Talvez, se os atrairmos para cá..."
 contest_events.0610.d: "Talvez devamos apenas enfrentar isso?"
 contest_events.0610.d.tt: "Os dados já foram lançados; eu não devo interferir."
 contest_events.0620.t: "$tournament_contest_header$ Os Golpes Finais"
 contest_events.0620.pivotal_success: "O estratagema foi um golpe impressionante! A maré muda a favor da minha equipe, vários cavaleiros se libertando enquanto avançamos sobre o flanco deles, correndo em direção ao acampamento inimigo. Só podemos esperar que eles cheguem lá antes que a mesma coisa aconteça conosco.\n\n"
 contest_events.0620.pivotal_neutral: "É difícil dizer o quanto minha última manobra fez diferença. Certamente não perdemos terreno, mas a batalha tumultuada continua na mesma situação de antes.\n\n"
 contest_events.0620.pivotal_failure: "Como estratégias vão, essa certamente não foi a minha melhor. Embora eu não descrevesse nossa situação como completamente desastrosa, a equipe inimiga rompendo nosso centro e começando a avançar em direção ao nosso acampamento desprotegido ainda pode soar o sino da morte para nossas chances.\n\n"
 contest_events.0620.ptv_close: "É quase impossível dizer qual lado está mais próximo da vitória. Ainda há tudo a ser disputado."
 contest_events.0620.ptv_close_spectator: "Ambas as equipes estão quase empatadas! Quem vencerá será decidido por uma margem mínima."
 contest_events.0620.ptv_top: "Minha equipe está claramente em melhor forma! A vitória está tão próxima que consigo sentir o gosto!"
 contest_events.0620.ptv_top_spectator: "A equipe de [pivotal_contestant.GetFirstName] está claramente em vantagem! Tudo o que falta agora é confirmar a vitória!"
 contest_events.0620.ptv_bottom: "Minha equipe está perdendo, e claramente. Sinto a vitória escapando, de forma constante e certa. Seria necessário um esforço enorme para vencer a partir daqui..."
 contest_events.0620.ptv_bottom_spectator: "A equipe de [pivotal_contestant.GetFirstName] parece abalada e praticamente derrotada. Seria preciso um esforço colossal para vencer a partir daqui…"
 contest_events.0620.ptv_top_half: "Minha equipe está ganhando, mas é uma disputa acirrada. Só precisamos nos segurar!"
 contest_events.0620.ptv_top_half_spectator: "O time de [pivotal_contestant.GetFirstName] está levando a vantagem, mas a disputa está apertada. A glória ainda está em aberto."
 contest_events.0620.ptv_bottom_half: "Estamos perdendo, mas a vitória ainda não está fora de alcance. Apenas mais um último esforço...!"
 contest_events.0620.ptv_bottom_half_spectator: "O time de [pivotal_contestant.GetFirstName] está perdendo, mas ainda não acabou. Uma ação ainda pode virar o jogo a favor dele…"
 contest_events.0620.ptv_fallback: "A batalha continua, cada vez mais próxima de uma conclusão."
 contest_events.0620.spectator: "\n\nO som rítmico do metal batendo no metal continua a cortar o ar. Os espectadores, espalhados ao redor da confusão, incentivam seus favoritos, mesmo quando mais e mais concorrentes sucumbem ao resgate e à ruína."
 contest_events.0620.final: "\n\nPosso ver os arautos começando a se aproximar do campo para sinalizar o término do evento. O fim está próximo."
 contest_events.0620.a: "Mais um esforço!"
 contest_events.0620.b: "Falta pouco!"
 ### TURN ###
 #START
 contest_events.0700.t: "[activity.GetCurrentPhase.GetPhase.GetName]: O Concurso Começa"
 contest_events.0700.archery: "A multidão diversificada de competidores circula pelos alvos, comparando arcos e trocando histórias de seus melhores tiros. O rangido dos arcos e o estalo das cordas ecoam ao longe, pontuando o burburinho, um cheiro de resina pairando pelo ar calmo.\n\n"
 contest_events.0700.recital: "Os participantes circulam pela tenda principal, aquecendo as cordas vocais e memorizando estrofes enquanto a multidão enche o anfiteatro.\n\n"
 contest_events.0700.contestant: "Meus ouvidos se aguçam quando meu nome é mencionado, flutuando pela brisa suave. Isso pode ser um bom sinal ou um mau sinal..."
 contest_events.0700.champion: "Talvez meu campeão[contest_champion.Custom('ES_OnOna')] [contest_champion.GetName] me deixe orgulhoso[GetPlayer.Custom('ES_OA')] .\n\n"
 contest_events.0700.closing: "Que vença o melhor!"
 contest_events.0700.a: "Fico imaginando quem vai vencer!"
 contest_events.0700.a.contestant: "É hora de mostrar ao mundo minha habilidade."
 contest_events.0700.b: "Tenho uma aposta para fazer..."
 contest_events.0700.c: "Eu #EMP irei#! participar do meu próprio concurso."
 contest_events.0700.d: "[rival_contestant.Custom('ES_ElLa')|U] [rival_contestant.GetTitledFirstNameNoTooltip|l] não está em condições de competir."
 contest_events.0700.e: "Se eu encontrasse a pessoa certa para conversar..."
 mysterious_stranger_archery: "Parece que [Select_CString( mysterious_stranger.IsFemale, 'uma plebeia', 'um plebeu' )] chamad[mysterious_stranger.Custom('ES_OA')] [mysterious_stranger.GetFirstName] vem sendo o assunto em [activity.GetCurrentPhase.GetLocation.GetNameNoTooltip] desde que treinou no campo de tiro.\n\n"
 mysterious_stranger_recital: "Um[mysterious_stranger.Custom('ES_XA')] recém-chegad[mysterious_stranger.Custom('ES_OA')] de nome [mysterious_stranger.GetFirstName], até então desconhecid[mysterious_stranger.Custom('ES_OA')] entre os poetas e bardos de [host.GetPrimaryTitle.GetBaseNameNoTierNoTooltip], tem despertado muito interesse este ano.\n\n"
 #END
 contest_events.0705.t.recital: "$tournament_phase_recital$: $contest_events.0505.t$"
 contest_events.0705.t.archery: "$tournament_phase_archery$: $contest_events.0505.t$"
 contest_events.0705.desc: "«Soam as trombetas, a multidão clama, os competidores começam a se reunir. A competição acabou, e alguém está se preparando para seu momento de destaque. Um arauto se adianta, com a voz ecoando por todo o lugar.\n\n«Depois de muitas provas, algumas tribulações e, acima de tudo, uma competição verdadeiramente acirrada, temos nossos três finalistas. Em terceiro lugar, [third_place.Custom('ES_ElLa')] corajoso [third_place.GetTitledFirstName|l]. Em segundo[second_place.Custom('ES_OA')] lugar por pouco, [second_place.Custom('ES_ElLa')] [second_place.GetTitledFirstName|l]. Isso, claro, nos deixa com noss[contest_winner.Custom('ES_OA')] vencedor[contest_winner.Custom('ES_XA')]: [contest_winner.Custom('ES_ElLa')] [contest_winner.GetTitledFirstName|l]!».\n\n"
 contest_events.0705.first: "Eu sabia que poderia vencer!"
 contest_events.0705.second: "Segundo lugar, suponho que não posso reclamar."
 contest_events.0705.third: "Ah, sou [GetPlayer.Custom('ES_ElLa')] vencedor[GetPlayer.Custom('ES_XA')] menos vitorios[GetPlayer.Custom('ES_OA')]…"
 contest_events.0705.contestant: "Vou mostrar a eles - da próxima vez."
 contest_events.0705.spectator: "Um show de habilidade muito divertido!"
 contest_events.0705.first_champion: "Ninguém consegue com [contest_champion.Custom('ES_ElLa')] [contest_champion.GetTitledFirstName|l]!"
 contest_events.0705.second_champion: "Tenho orgulho[GetPlayer.Custom('ES_OA')] de [contest_champion.GetTitledFirstName|l]."
 contest_events.0705.third_champion: "Campe[contest_champion.Custom('ES_OnOna')] não, mas ao menos [contest_champion.GetTitledFirstName|l] esteve perto…"
 contest_events.0705.contestant_champion: "Meu campe[contest_champion.Custom('ES_OnOna')] [contest_champion.GetTitledFirstName|l], não conseguiu ficar entre os três primeiros…"
 contest_events.0705.spectator_champion: "Meu campe[contest_champion.Custom('ES_OnOna')]; [contest_champion.GetTitledFirstName|l], não competiu."
 contest_events.0705.a.winner: "Sim! Vos[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip] triunfa!"
 contest_events.0705.a.marriage: "Mudei de ideia, apenas o prêmio para você."
 contest_events.0705.a: "Muito bem, [contest_winner.GetTitledFirstNameNoTooltip|l]."
 contest_events.0705.b: "Fiz tudo isso por [ROOT.Char.GetIntentTarget.GetTitledFirstNameNoTooltip|l]!"
 contest_events.0705.c.winner: "Parece que vamos nos casar, [marriage_prize.GetFirstNameNoTooltip]."
 contest_events.0705.c: "Muito bem. A mão de [marriage_prize.GetTitledFirstNameNoTooltip|l] é sua."
 contest_events.0705.d.winner: "Eu venci! Eu #EMP realmente#! venci!"
 contest_events.0705.d.second: "Tão perto..."
 contest_events.0705.d.loser: "Sempre haverá uma próxima vez..."
 contest_events.0705.d: "A melhor [contest_winner.Custom('ES_ElLa')] venceu."
 contest_events.0710.t: "$tournament_contest_header$ Alvejando com Precisão"
 contest_events.0710.desc: "O crepúsculo começa a cair lentamente enquanto a competição continua, o estalar das cordas um ritmo marcado. Eu me apoio no meu arco, considerando o rumo que esse concurso tomou até agora, como quando"
 contest_events.0710.flavor_1: "outro competidor fez um escândalo por causa da falta de silêncio durante sua vez.\n\n"
 contest_events.0710.flavor_2: "um espectador foi tragicamente atingido por uma flecha.\n\n"
 contest_events.0710.flavor_3: "enviei um disparo bem no centro do alvo.\n\n"
 contest_events.0710.flavor_4: "enviei um disparo que caiu curto do alvo.\n\n"
 contest_events.0710.flavor_5: "um estranho misterioso chegou ao evento, gerando muitos rumores.\n\n"
 contest_events.0710.flavor_6: "o vento começou a soprar forte, me obrigando a improvisar.\n\n"
 contest_events.0710.flavor_7: "fiquei entediado durante a competição e vacilei com o desejo de causar um pouco de confusão.\n\n"
 contest_events.0710.flavor_8: "decidi que o concurso precisava de um pouco mais de animação.\n\n"
 contest_events.0710.flavor_9: "uma flecha se desviou no caminho para o alvo e atingiu outro competidor.\n\n"
 contest_events.0710.flavor_fallback: "A competição está chegando ao fim, enquanto as flechas continuam a voar em direção aos alvos — e além. Se eu quiser ter algum impacto a partir daqui, devo agir agora."
 contest_events.0710.a: "Sou um[GetPlayer.Custom('ES_OA')] com meu arco!"
 contest_events.0710.b: "'Adquirir' uma flecha melhor me daria uma vantagem..."
 contest_events.0710.c: "Com esse vento, essa trajetória deve ser suficiente."
 contest_events.0710.d: "Meu último disparo deve ser normal, acho."
 contest_events.0711.t: "$tournament_contest_header$ Palavra aos Sábios"
 contest_events.0711.desc: "A noite começa a cair sobre o cenário, mas tochas iluminam a competição que continua. Falo comigo mesmo em voz baixa, preparando meus lábios para a próxima rodada enquanto relembro os acontecimentos até agora, como quando"
 contest_events.0711.flavor_1: "outro competidor teve um verso suspeitosamente semelhante ao meu antes de subir ao palco.\n\n"
 contest_events.0711.flavor_2: "outro competidor conseguiu plagiar um verso famoso.\n\n"
 contest_events.0711.flavor_3: "tive que lidar com um ataque de medo de palco.\n\n"
 contest_events.0711.flavor_4: "os céus se abriram e encharcaram competidores e público.\n\n"
 contest_events.0711.flavor_5: "vi uma oportunidade de insultar outro competidor em verso.\n\n"
 contest_events.0711.flavor_6: "minha honra foi manchada por outro competidor, e tive que responder da mesma forma.\n\n"
 contest_events.0711.flavor_7: "meu verso foi tão bem que senti a compulsão de imediatamente segui-lo com outro.\n\n"
 contest_events.0711.flavor_8: "meu verso foi tão mal que senti a compulsão de imediatamente consertá-lo com outro.\n\n"
 contest_events.0711.flavor_fallback: "Eu dou um passo à frente para minha vez, subindo os degraus do pódio. É hora do verso final."
 contest_events.0711.a: "Uma canção sobre ganhar dinheiro e viver uma boa vida."
 contest_events.0711.b: "Embeleze a multidão com um conto de guerra e vitória!"
 contest_events.0711.c: "Apelo a uma força superior."
 contest_events.0711.d: "Vamos manter seguro e simples."
 contest_events.0720.t: "$tournament_contest_header$ Cordas Tensas"
 contest_events.0720.pivotal_success: "Dou um passo à frente, prendo, aponto, puxo e solto. A flecha assobia pelo ar, cravando-se profundamente no alvo. A multidão irrompe. Não há argumentos; é um ponto enorme a meu favor!\n\n"
 contest_events.0720.pivotal_neutral: "Meu tiro voa verdadeiro, mas agonizantemente não tão verdadeiro quanto eu gostaria. Ele bate no alvo, mas apenas na borda. Não vai me prejudicar, mas provavelmente não vai me dar muito crédito também.\n\n"
 contest_events.0720.pivotal_failure: "Ao puxar a corda até o queixo, sinto o mais leve tremor em meu braço. Eu solto em pânico, mas o estrago está feito. A flecha voa descontroladamente, vacilando no ar, antes de assobiar bem ao lado do alvo! A multidão geme, e eu coloco a mão na cabeça.\n\n"
 contest_events.0720.ptv_close: "É quase impossível dizer quem está ganhando. Sem dúvida, estou entre [Select_CString( GetPlayer.IsFemale, 'las favoritas', 'los favoritos' )], mas estamos todos praticamente empatados!"
 contest_events.0720.ptv_close_spectator: "Está tão acirrado no topo. Os líderes estão praticamente lado a lado!"
 contest_events.0720.ptv_top: "Estou vencendo! A vitória está tão próxima!"
 contest_events.0720.ptv_top_spectator: "![pivotal_contestant.GetFirstName] está vencendo com toda a clareza! Enquanto mantiver a calma, a vitória está praticamente garantida!"
 contest_events.0720.ptv_bottom: "Estou à deriva, muito atrás dos líderes. Seria necessário uma grande reviravolta de sorte para vencer a partir daqui..."
 contest_events.0720.ptv_bottom_spectator: "[pivotal_contestant.GetFirstName] parece quase derrotado[pivotal_contestant.Custom('ES_OA')]. Seria preciso uma grande reviravolta da sorte para vencer a partir daqui…"
 contest_events.0720.ptv_top_half: "Estou na metade de cima, mas não estou liderando. Com um pouco de sorte, isso ainda pode se transformar em uma vitória..."
 contest_events.0720.ptv_top_half_spectator: "[pivotal_contestant.GetFirstName] está na frente, mas ainda não venceu. A glória ainda está em disputa."
 contest_events.0720.ptv_bottom_half: "Estou perdid[GetPlayer.Custom('ES_OA')] na metade inferior da tabela de classificação, mas uma vitória não está totalmente fora do meu alcance…"
 contest_events.0720.ptv_bottom_half_spectator: "[pivotal_contestant.GetFirstName] está perdido[pivotal_contestant.Custom('ES_OA')] na metade inferior da tabela de classificação, mas uma vitória não está completamente fora de alcance…"
 contest_events.0720.ptv_fallback: "Mais flechas são disparadas, competidores desesperados soltando-as quase tão rapidamente quanto lhes é permitido."
 contest_events.0720.spectator: "\n\nUma maldição enquanto a corda do arco roça o antebraço. Um estalo vindo da corda, seja ela quebrada ou simplesmente alta, ecoa pela área. A multidão cai em um ritmo: silêncio absoluto quando um competidor se aproxima, aplausos estrondosos quando a flecha é lançada."
 contest_events.0720.final: "Restam apenas algumas flechas para cada competidor. O fim está próximo."
 contest_events.0720.a: "Apenas mais uma flechada..."
 contest_events.0720.b: "Apenas mais uma flechada!"
 contest_events.0721.t: "$tournament_contest_header$ Bem Versado"
 contest_events.0721.pivotal_success: "Termino meu último verso, mas a multidão não esperou pelo final. Os aplausos abafam minhas palavras, flores caem ao meu redor no palco enquanto me afasto.\n\n"
 contest_events.0721.pivotal_neutral: "Meu último verso recebe aplausos e aclamações, mas, enquanto me afasto do pódio, não consigo evitar a sensação incômoda de que não me fiz justiça por completo.\n\n"
 contest_events.0721.pivotal_failure: "Termino meu verso com um punho erguido e aplomb sonoro. No entanto, a multidão apenas aplaude educadamente, intercalando com algumas tosses. Meus ombros se curvam enquanto deixo o pódio. Minhas esperanças estão diminuindo...\n\n"
 contest_events.0721.ptv_fallback: "Cada vez mais competidores formam fila para subir ao pódio, nervosamente mudando de pé."
 contest_events.0721.spectator: "\n\nUma única palavra fora do lugar é o suficiente para fazer a multidão gemer desesperadamente neste momento, enquanto as entregas sucintas causam aplausos tumultuados. Os espectadores batem os pés e aplaudem enquanto os competidores se aproximam do palco, criando um clima febril."
 contest_events.0721.final: "Restam poucos competidores, e ainda menos tempo. Tudo se resume a isso."
 contest_events.0721.a: "Apenas mais um verso..."
 contest_events.0721.b: "Apenas mais um verso!"
 ### VERSUS ###
 #START
 contest_events.0800.t: "[activity.GetCurrentPhase.GetPhase.GetName]: Início do Concurso"
 contest_events.0800.joust: "Os concorrentes circulam a arena a cavalo, seus pajens com os braços erguidos, enquanto o arauto anuncia o início do concurso. Escudeiros se apressam de um lado para o outro, adornados com as cores de seus senhores, carregando equipamentos e suprimentos para os combates que virão.\n\n"
 contest_events.0800.wrestling: "Espalhados pela areia, os competidores sem camisa se aquecem para suas lutas enquanto o arauto anuncia o início do concurso. Alguns dos competidores esfregam terra no corpo, outros optam por óleos, todos procurando uma pequena vantagem nas lutas que estão por vir.\n\n"
 contest_events.0800.duel: "Os competidores marcham para o campo, ocupando seus lugares ao redor do quadrado de combate, enquanto o arauto anuncia o início do concurso. O ringue quadrado é examinado ao fundo, sacudido e chacoalhado para garantir que não haja flexibilidade caso um competidor colida com ele.\n\n"
 contest_events.0800.board_game: "Os competidores ocupam seus lugares nas mesas de jogo, afofando suas almofadas e solicitando bebidas, enquanto o arauto anuncia o início do concurso. Os próprios jogos são dispostos nas mesas, as peças polidas com um brilho espelhado.\n\n"
 contest_events.0800.desc: "As diversas entonações e volumes dos aplausos da multidão não deixam dúvidas sobre os favoritos."
 contest_events.0800.vs: "\n\nPara meu primeiro duelo, fui emparelhado contra meu [ROOT.Char.Custom2('RelationToMeShort', versus_contestant)], [versus_contestant.GetName]."
 contest_events.0800.champion_self: "Meu campe[contest_champion.Custom('ES_OnOna')] , [contest_champion.GetFirstName], e eu vamos dar uma lição a esses grosseirões!\n\n"
 contest_events.0800.a.contestant: "Estou pr[GetPlayer.Custom('ES_OA')]!"
 contest_events.0800.a.champion: "Vamos lá, [contest_champion.GetTitledFirstNameNoTooltip|l]! Conquiste o título de campeão!"
 contest_events.0800.a: "Que vença o melhor!"
 contest_events.0800.b: "Eu tenho uma aposta para fazer..."
 contest_events.0800.c: "Não seria correto que [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip|l] não competisse…"
 contest_events.0800.d: "[rival_contestant.GetTitledFirstNameNoTooltip]?! Não nos #EMP meus#! jogos!"
 contest_events.0800.e: "Talvez a lista possa ser alterada..."
 contest_events.0800.e.flavor: "Você, pajem! Tenho uma tarefa delicada..."
 contest_events.0800.f: "Claro, [versus_contestant.GetFirstNameNoTooltip] vai ceder ao seu suserano..."
 contest_events.0800.f.flavor: "É apenas apropriado."
 mysterious_stranger_joust: "A inclusão de \"[mysterious_stranger.GetFirstName] de [attending_barony.GetNameNoTierNoTooltip]\", um[mysterious_stranger.Custom('ES_XA')] [mysterious_stranger.Custom('KnightCultureNoTooltipLowercase')] habilidos[mysterious_stranger.Custom('ES_OA')] de cultura [mysterious_stranger.GetCulture.GetNameNoTooltip|l], mas de origem obscura, causou bastante alvoroço."
 mysterious_stranger_wrestling: "Chegou um[mysterious_stranger.Custom('ES_XA')] recém-chegad[mysterious_stranger.Custom('ES_OA')] de nome [mysterious_stranger.GetFirstName], bastante famoso em sua região, em busca de fazer um nome para si."
 mysterious_stranger_duel: "$mysterious_stranger_joust$"
 mysterious_stranger_board_game: "Um[mysterious_stranger.Custom('ES_XA')] [mysterious_stranger.GetWomanMan] de nome [mysterious_stranger.GetFirstName] entra este ano com a recomendação de um senhor local; pouco se sabe de seu estilo de jogo, além de rumores."
 #END
 contest_events.0805.t.board_game: "$tournament_phase_board_game$: $contest_events.0505.t$"
 contest_events.0805.t.duel: "$tournament_phase_duel$: $contest_events.0505.t$"
 contest_events.0805.t.wrestling: "$tournament_phase_wrestling$: $contest_events.0505.t$"
 contest_events.0805.t.joust: "$tournament_phase_joust$: $contest_events.0505.t$"
 contest_events.0805.desc: "Ressoam as trombetas, a multidão clama, os competidores começam a se reunir. A competição acabou, e alguém está se preparando para ter seu momento de glória. Um arauto avança, com a voz ecoando por todo o lugar.\n\n“Após muitas provas, algumas tribulações e, acima de tudo, uma competição verdadeiramente acirrada, [contest_winner.Custom('ES_ElLa')] [contest_winner.GetTitledFirstName|l] venceu [second_place.Custom('ES_AlAla')] [second_place.GetTitledFirstName|l] na final! [contest_winner.Custom('ES_ElLa')|U] [contest_winner.GetTitledFirstName|l] é noss[contest_winner.Custom('ES_OA')] vencedor[contest_winner.Custom('ES_XA')]!”.\n\n"
 contest_events.0805.first: "Realmente, não há ninguém em [host.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] que possa igualar minha habilidade!"
 contest_events.0805.second: "Eu não venci, mas cheguei muito perto..."
 contest_events.0805.contestant: "\"Preciso me esforçar mais da próxima vez!\" penso comigo mesmo, observando o braço do vencedor ser levantado."
 contest_events.0805.spectator: "Um evento muito divertido!"
 contest_events.0805.first_champion: "\n\nMeu/minha campe[contest_champion.Custom('ES_OnOna')] #EMP realmente#! venceu?! Tenho que recompensar [contest_champion.GetHerHim]!"
 contest_events.0805.second_champion: "\n\nEmbora não tenha vencido, ainda me sinto orgulhoso[GetPlayer.Custom('ES_OA')] do meu campe[contest_champion.Custom('ES_OnOna')]."
 contest_events.0805.contestant_champion: "\n\nMeu campe[contest_champion.Custom('ES_OnOna')]; [contest_champion.GetFirstName], mal correspondeu ao nome…"
 contest_events.0805.spectator_champion: "\n\nMeu campeão[contest_champion.Custom('ES_OnOna')], [contest_champion.GetFirstName], nem sequer se classificou."
 contest_events.0805.a.winner: "Ganhei! Eu, voss[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], ganhei!"
 contest_events.0805.a.marriage: "Só este [contest_prize.GetType|l] para você, na verdade."
 contest_events.0805.a: "Parabéns, [contest_winner.GetTitledFirstNameNoTooltip|l]."
 contest_events.0805.b: "Dedico a vitória [ROOT.Char.GetIntentTarget.Custom('ES_AlAla')] [ROOT.Char.GetIntentTarget.GetTitledFirstNameNoTooltip|l]!"
 contest_events.0805.c.winner: "Parece que vamos nos casar, [marriage_prize.GetFirstNameNoTooltip]."
 contest_events.0805.c: "Muito bem. A mão de [marriage_prize.GetTitledFirstNameNoTooltip|l] é sua."
 contest_events.0805.d.winner: "Eu venci! Eu #EMP realmente#!"
 contest_events.0805.d.second: "Tão perto..."
 contest_events.0805.d.loser: "Sempre haverá uma próxima vez..."
 contest_events.0805.d: "Uma vitória bem merecida."
 #SPECTATE
 contest_events.0810.t: "[activity.GetCurrentPhase.GetPhase.GetName|l] [activity.Custom('GetVersusRound')|U]: [contest_winner.GetFirstNameNoTooltip] e [contest_loser.GetFirstNameNoTooltip]"
 contest_events.0810.both_relation: "A disputa entre meu [ROOT.Char.Custom2('RelationToMeShort', contest_winner)] , [contest_winner.Custom('ES_ElLa')] [contest_winner.GetTitledFirstName|l] e meu [ROOT.Char.Custom2('RelationToMeShort', contest_loser)] , [contest_loser.Custom('ES_ElLa')] [contest_loser.GetTitledFirstName|l] foi decidida.\n\n"
 contest_events.0810.winner_relation: "A luta entre meu [ROOT.Char.Custom2('RelationToMeShort', contest_winner)] , [contest_winner.Custom('ES_ElLa')] [contest_winner.GetTitledFirstName|l] e [contest_loser.Custom('ES_ElLa')] [contest_loser.GetTitledFirstName|l] foi decidida.\n\n"
 contest_events.0810.loser_relation: "O duelo entre [contest_winner.Custom('ES_ElLa')] [contest_winner.GetTitledFirstName|l] e meu [ROOT.Char.Custom2('RelationToMeShort', contest_loser)], [contest_loser.Custom('ES_ElLa')] [contest_loser.GetTitledFirstName|l] foi decidido.\n\n"
 contest_events.0810.desc: "O duelo entre [contest_winner.Custom('ES_ElLa')] [contest_winner.GetTitledFirstName|l] e [contest_loser.Custom('ES_ElLa')] [contest_loser.GetTitledFirstName|l] foi decidido.\n\n"
 contest_events.0810.murder_success: "Meus planos cuidadosamente elaborados para [contest_loser.GetFirstNameNoTooltip] saíram exatamente como eu queria, esse(a) miserável [contest_loser.Custom2('InsultNoun', ROOT.Char)] não vai me incomodar nunca mais!"
 contest_events.0810.murder_fail_lose: "Minha sabotagem elaborada não teve o resultado esperado: [contest_loser.GetFirstNameNoTooltip] ainda vive, mas pelo menos esse miserável [contest_winner.Custom2('InsultNoun', ROOT.Char)] não venceu…"
 contest_events.0810.murder_fail_win: "Meu sabotagem não só falhou em matar[contest_winner.GetHerHim], mas [contest_winner.GetFirstNameNoTooltip], o(a) desgraçado(a) [contest_winner.Custom2('InsultNoun', ROOT.Char)], conseguiu vencer a maldita luta!"
 contest_events.0810.close: "Foi uma luta acirrada, mas no final [contest_winner.Custom2('GetVersusContestEndFlavor', contest_loser)]"
 contest_events.0810.average: "Ambos os competidores demonstraram habilidades impressionantes, mas, no fim das contas, [contest_winner.Custom2('GetVersusContestEndFlavor', contest_loser)]"
 contest_events.0810.far: "Após uma luta decepcionantemente unilateral, ninguém ficou surpreso quando [contest_winner.Custom2('GetVersusContestEndFlavor', contest_loser)]"
 contest_events.0810.champion_won: "É por isso que #EMP eso#! [contest_winner.GetSheHe] é meu campeão[contest_champion.Custom('ES_OnOna')]!"
 contest_events.0810.champion_lost: "Lá se vão as chances do meu campe[contest_champion.Custom('ES_OnOna')]…"
 tournament_versus_contest_end_flavor_joust_1: "[ROOT.Char.GetFirstNameNoTooltip] [Select_CString( ROOT.Char.IsLocalPlayer, 'descabalgué', 'descabalgó' )] derrubou da sela [Select_CString( ROOT.Char.IsLocalPlayer, 'mi persona', ROOT.Char.GetFirstNameNoTooltip )] em um poderoso intercâmbio de golpes."
 tournament_versus_contest_end_flavor_joust_2: "[ROOT.Char.GetFirstNameNoTooltip] [Select_CString( ROOT.Char.IsLocalPlayer, 'quebrei', 'quebrou' )] [Select_CString(ROOT.Char.IsLocalPlayer, 'minha', 'sua')] terceira lança contra o escudo de [Select_CString( second.IsLocalPlayer, 'minha pessoa', second.GetFirstNameNoTooltip )] com um golpe bem colocado."
 tournament_versus_contest_end_flavor_joust_3: "[ROOT.Char.GetFirstNameOrMeNoTooltip|U] teve mais pontos que [Select_CString( second.IsLocalPlayer, 'mi persona', second.GetFirstNameNoTooltip )] quando as últimas lanças se esgotaram."
 tournament_versus_contest_end_flavor_wrestling_1: "[ROOT.Char.GetFirstNameOrMeNoTooltip|U] [Select_CString( ROOT.Char.IsLocalPlayer, 'inmovilicé', 'inmovilizó' )] firmemente a [Select_CString( second.IsLocalPlayer, 'mi persona', second.GetFirstNameNoTooltip )] e se [Select_CString( ROOT.Char.IsLocalPlayer, 'me', 'le' )] proclamou vencedor[ROOT.Char.Custom('ES_XA')]."
 tournament_versus_contest_end_flavor_wrestling_2: "[ROOT.Char.GetFirstNameOrMeNoTooltip|U] [Select_CString( ROOT.Char.IsLocalPlayer, 'eché', 'echó' )] expulsou [Select_CString( second.IsLocalPlayer, 'mi persona', second.GetFirstNameNoTooltip )] do ringue em uma grande nuvem de poeira."
 tournament_versus_contest_end_flavor_wrestling_3: "[ROOT.Char.GetFirstNameOrMeNoTooltip|U] [Select_CString( ROOT.Char.IsLocalPlayer, 'derribé', 'derribó' )] decisivamente a [Select_CString( second.IsLocalPlayer, 'mi persona', second.GetFirstNameNoTooltip )]."
 tournament_versus_contest_end_flavor_duel_1: "[ROOT.Char.GetFirstNameOrMeNoTooltip|U] [Select_CString( ROOT.Char.IsLocalPlayer, 'desarmé', 'desarmó' )] desarmou decisivamente a [Select_CString( second.IsLocalPlayer, 'mi persona', second.GetFirstNameNoTooltip )] e a rendição foi inevitável."
 tournament_versus_contest_end_flavor_duel_2: "[ROOT.Char.GetFirstNameOrMeNoTooltip|U] [Select_CString( ROOT.Char.IsLocalPlayer, 'estampé', 'estampó' )] a [second.GetFirstNameOrMeNoTooltip|U] contra o chão, forçando a desistência."
 tournament_versus_contest_end_flavor_duel_3: "[ROOT.Char.GetFirstNameOrMeNoTooltip|U] [Select_CString( ROOT.Char.IsLocalPlayer, 'fui', 'foi' )] declarad[ROOT.Char.Custom('ES_OA')] vencedor[ROOT.Char.Custom('ES_XA')] por um veredicto retumbante."
 tournament_versus_contest_end_flavor_board_game_1: "[ROOT.Char.GetFirstNameOrMeNoTooltip|U] [Select_CString( ROOT.Char.IsLocalPlayer, 'decidí', 'decidió' )] a partida com uma sequência de movimentos bem jogados."
 tournament_versus_contest_end_flavor_board_game_3: "[ROOT.Char.GetFirstNameOrMeNoTooltip|U] [Select_CString( ROOT.Char.IsLocalPlayer, 'obligué', 'obligó' )] a [Select_CString( second.IsLocalPlayer, 'mi persona', second.GetFirstNameNoTooltip )] a uma posição de desistência."
 tournament_versus_contest_end_flavor_board_game_2: "[ROOT.Char.GetFirstNameOrMeNoTooltip|U] [Select_CString( ROOT.Char.IsLocalPlayer, 'arrasé', 'arrasó' )] quando [Select_CString( second.IsLocalPlayer, 'mi persona', second.GetFirstNameNoTooltip )] cometeu um dos erros clássicos."
 contest_events.0810.wound: "\n\nAs feridas de [contest_loser.GetFirstNameNoTooltip] falam de seu valor."
 contest_events.0810.death: "\n\nInfelizmente, [contest_loser.GetFirstNameNoTooltip] ficou mutilad[contest_loser.Custom('ES_OA')] por seus esforços e morreu pouco depois."
 contest_events.0810.qualify: "\n\n[contest_winner.GetFirstNameNoTooltip] chegou à semifinal."
 contest_events.0810.semi: "\n\n[contest_winner.GetFirstNameNoTooltip] chegou à final."
 contest_events.0810.final: "\n\nIsso significa que [contest_winner.GetFirstNameNoTooltip] venceu o concurso de [activity.GetCurrentPhase.GetPhase.GetName|l]."
 contest_events.0810.a.death: "Trágico..."
 contest_events.0810.a.murder_success: "Perfeito!"
 contest_events.0810.a.murder_fail_lose: "Não deu certo..."
 contest_events.0810.a.murder_fail_win: "Maldito[contest_winner.Custom('ES_OA')] seja esse[contest_winner.Custom('ES_EA')] [contest_winner.GetWomanMan]!"
 contest_events.0810.a.consorts: "Vocês dois me deixam orgulhoso[GetPlayer.Custom('ES_OA')]!"
 contest_events.0810.a.consort_winner: "Muito bem, querido!"
 contest_events.0810.a.consort_loser: "Você deu o seu melhor, querido."
 contest_events.0810.a.children: "Tenho muito orgulho[GetPlayer.Custom('ES_OA')] de vocês dois."
 contest_events.0810.a.child_win: "Muito bem, [contest_winner.Custom('GirlBoy')]!"
 contest_events.0810.a.child_lose: "Você deu o seu melhor, [ROOT.Char.Custom2('RelationToMeShort', contest_loser)]."
 contest_events.0810.a.champion_win: "Sim, [contest_winner.GetFirstNameNoTooltip]! É[contest_winner.Custom('ES_EA')] meu campe[contest_winner.Custom('ES_OnOna')]!"
 contest_events.0810.a.champion_lose: "Ah, [contest_loser.GetFirstNameNoTooltip]... Que campeão[contest_loser.Custom('ES_OnOna')]..."
 contest_events.0810.a.close_family: "O[ROOT.Char.Custom('ES_ElLa')|U] [ROOT.Char.Custom2('RelationToMeShort', contest_winner)] vence a [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.Custom2('RelationToMeShort', contest_loser)]!"
 contest_events.0810.a.close_family_win: "É[ROOT.Char.Custom('ES_EA')] é meu [ROOT.Char.Custom2('RelationToMeShort', contest_winner)]!"
 contest_events.0810.a.close_family_lose: "Má sorte, [ROOT.Char.Custom2('RelationToMeShort', contest_loser)]..."
 contest_events.0810.a.knights: "Muito bem lutado, $knight_culture_player_plural_no_tooltip_lowercase$!"
 contest_events.0810.a.knight_win: "Não mexam com os $knight_culture_player_plural_no_tooltip_lowercase$ de [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip]!"
 contest_events.0810.a.knight_lose: "Não é o meu $knight_culture_player_no_tooltip_lowercase$ favorito, é preciso dizer..."
 contest_events.0810.a.wager_win: "Sim! A aposta continua valendo!"
 contest_events.0810.a.wager_loss: "Lá se foi minha aposta..."
 contest_events.0810.a.bad_win: "Que [contest_winner.Custom2('InsultNoun', ROOT.Char)] com sorte..."
 contest_events.0810.a.bad_lose: "Ha! Não desta vez, [contest_loser.GetFirstNameNoTooltip]!"
 contest_events.0810.a.good_win: "Três vivas para [contest_winner.GetFirstNameNoTooltip]!"
 contest_events.0810.a.good_lose: "Não foi o seu dia, [contest_loser.GetFirstNameNoTooltip]!"
 contest_events.0810.a.house: "Um bom desempenho para a Casa [contest_winner.GetHouse.GetBaseNameNoTooltip]!"
 contest_events.0810.a.house_won: "Uma vitória para toda a Casa [contest_winner.GetHouse.GetBaseNameNoTooltip]!"
 contest_events.0810.a.house_lost: "Não foi um bom dia para a Casa [contest_loser.GetHouse.GetBaseNameNoTooltip]..."
 contest_events.0810.a: "Uma ótima competição!"
