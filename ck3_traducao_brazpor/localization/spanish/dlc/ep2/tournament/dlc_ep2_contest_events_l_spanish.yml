 #SUMMARY
 contest_events.0820.t: "[activity.GetCurrentPhase.GetPhase.GetName]: [activity.Custom('GetVersusRound')]"
 contest_events.0820.qualify: "A classificação de [activity.GetCurrentPhase.GetPhase.GetName|l] chegou ao fim, e já está claro quem seguirá para as quartas de final.\n\n"
 contest_events.0820.semi: "As quartas de final de [activity.GetCurrentPhase.GetPhase.GetName|l] terminaram!\n\nO arauto brada: \"[contest_summary_1.GetNameRegnal]; [contest_summary_2.GetNameRegnal]; [contest_summary_3.GetNameRegnal] e [contest_summary_4.GetNameRegnal] chegaram à semifinal!\".\n\n"
 contest_events.0820.final: "As semifinais da competição de [activity.GetCurrentPhase.GetPhase.GetName|l] terminaram!\n\nO arauto brada: \"[contest_summary_1.GetNameRegnal] e [contest_summary_2.GetNameRegnal] chegaram à final!\".\n\n"
 contest_events.0820.open: "Os confrontos da competição de [activity.GetCurrentPhase.GetPhase.GetName|l] finalmente começam de fato.\n\nQuem entre os dignos competidores será coroado em glória agora está nas mãos de [ROOT.Char.GetFaith.HighGodName]!\n\n"
 contest_events.0820.contestant: "Não há mais tempo para preparação. Por [ROOT.Char.GetFaith.WarGodName], mostrarei ao meu adversário uma coisa ou duas!\n\n"
 contest_events.0820.vs_resigned: "Minha próxima luta seria contra meu [ROOT.Char.Custom2('RelationToMeShort', versus_contestant)] , [versus_contestant.Custom('ES_ElLa')] [versus_contestant.GetTitledFirstName|l] , mas ele se rendeu[versus_contestant.Custom('ES_OA')]!\n\n"
 contest_events.0820.vs_disqualified: "Meu próximo duelo seria contra meu [ROOT.Char.Custom2('RelationToMeShort', versus_contestant)]; [versus_contestant.Custom('ES_ElLa')] [versus_contestant.GetTitledFirstName|l], mas foi desclassificad[versus_contestant.Custom('ES_OA')]!\n\n"
 contest_events.0820.vs: "Meu próximo duelo será contra meu [ROOT.Char.Custom2('RelationToMeShort', versus_contestant)], [versus_contestant.Custom('ES_ElLa')] [versus_contestant.GetTitledFirstName|l].\n\n"
 contest_events.0820.vs_final: "Cheguei à final! Tudo o que se interpõe entre a vitória e eu é [versus_contestant.Custom('ES_ElLa')] [versus_contestant.GetTitledFirstName|l].\n\n"
 contest_events.0820.intent_match: "Enquanto isso, [intent_scope.GetTitledFirstName|l] foi pareado com [intent_match.GetTitledFirstName|l].\n\n"
 contest_events.0820.woo_vow: "Examinando discretamente as arquibancadas em busca de [woo_target.Custom('ES_DelDela')] [woo_target.GetTitledFirstName|l], logo [woo_target.GetHerHim] me vê olhando para mim com pesar. Parece convencid[woo_target.Custom('ES_OA')] de que competirei…"
 contest_events.0820.a: "Eu posso fazer isso!"
 contest_events.0820.b: "Na verdade... eu desisto..."
 contest_events.0820.c.resigned: "Desistiu? Eu ganhei!"
 contest_events.0820.c.disqualified: "Por isso você segue as regras."
 contest_events.0820.d: "Uma rodada interessante..."
 contest_events.0820.d.contestant: "Estou pront[GetPlayer.Custom('ES_OA')]!"
 contest_events.0820.d.loser: "Eu vou vencer na próxima vez..."
 contest_events.0825.t: "$activity_tournament$: Resignação do(a) [activity.GetCurrentPhase.GetPhase.GetName|l]"
 contest_events.0825.desc: "Por medo do perigo, ou talvez por outros motivos, [resign_target.Custom('ES_ElLa')] [resign_target.GetTitledFirstName|l] aceitou a derrota diante de seu adversário, [versus_contestant.Custom('ES_ElLa')] [versus_contestant.GetTitledFirstName|l], na competição de [activity.GetCurrentPhase.GetPhase.GetName|l].\n\n"
 contest_events.0825.safe: "Por medo de passar vergonha ou talvez por outros motivos, [resign_target.Custom('ES_ElLa')] [resign_target.GetTitledFirstName|l] reconheceu a derrota diante de seu adversário, [versus_contestant.Custom('ES_ElLa')] [versus_contestant.GetTitledFirstName|l], na competição de [activity.GetCurrentPhase.GetPhase.GetName|l].\n\n"
 contest_events.0825.qualify: "[versus_contestant.GetFirstNameNoTooltip] avançará para as semifinais por padrão."
 contest_events.0825.semi: "[versus_contestant.GetFirstNameNoTooltip] avançará para a final por padrão."
 contest_events.0825.final: "[versus_contestant.GetFirstNameNoTooltip] vence o concurso por padrão!"
 contest_events.0825.a: "De fato?"
 contest_events.0825.b: "O que [resign_target.GetSheHe] fez #EMP O QUÊ?!#!"
 contest_events.0826.t: "$activity_tournament$: Desqualificação do(a) [activity.GetCurrentPhase.GetPhase.GetName|l]"
 contest_events.0826.desc: "Em uma demonstração de ira, [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] desclassificou [disqualify_target.Custom('ES_AlAla')] [disqualify_target.GetTitledFirstName|l] de [activity.GetCurrentPhase.GetPhase.GetName|l] da competição, abrindo caminho para que [versus_contestant.Custom('ES_ElLa')] [versus_contestant.GetTitledFirstName|l] avance.\n\n"
 contest_events.0826.a: "Uma surpresa, com certeza."
 contest_events.0826.b: "O que [disqualify_target.GetSheHe] fez #EMP O QUÊ?!#!"
 contest_events.0860.t: "$tournament_contest_header$ Em pleno vapor"
 contest_events.0860.desc: "As bandeiras tremulam e balançam ao vento, roubando o fôlego da multidão por um momento enquanto eu controlo meu cavalo. Ergo minha lança enquanto os eventos anteriores do concurso se repetem em minha mente, como quando"
 contest_events.0860.flavor_1: "eu lutei mesmo depois de ter sido atingido(a) com força em minha lateral.\n\n"
 contest_events.0860.flavor_2: "meu oponente foi jogado para fora do cavalo.\n\n"
 contest_events.0860.flavor_3: "meu oponente tentou usar uma lança de proporções gigantescas.\n\n"
 contest_events.0860.flavor_4: "meu adversário se aproximou de mim pedindo um duelo a pé.\n\n"
 contest_events.0860.flavor_5: "meu nobre oponente tentou se inclinar mesmo com uma ferida grave.\n\n"
 contest_events.0860.flavor_6: "meu oponente pediu para passar misericordiosamente.\n\n"
 contest_events.0860.flavor_7: "conversei com o pajem desgrenhado do meu oponente.\n\n"
 contest_events.0860.flavor_8: "a multidão me provocou enquanto eu me preparava para o confronto.\n\n"
 contest_events.0860.flavor_9: "emprestei uma lança para o meu oponente depois que ele ficou sem.\n\n"
 contest_events.0860.flavor_10: "outro competidor caiu do cavalo, sofrendo uma ferida horrível.\n\n"
 contest_events.0860.flavor_fallback: "Meu oponente se posiciona na outra extremidade da arena. É isso."
 contest_events.0860.a: "Talvez se eu acertar a cabeça deles..."
 contest_events.0860.b: "Aponte alto, ataque baixo."
 contest_events.0860.c: "Acho que vi uma dica em uma passada anterior..."
 contest_events.0860.d: "Sem truques. Apenas mirar no escudo."
 contest_events.0861.t: "$tournament_contest_header$ Encurralado(a)"
 contest_events.0861.desc: "A multidão clama por sangue enquanto eu avanço cambaleante para confrontar meu oponente novamente. Eu enxoto uma correnteza vermelha da minha testa e considero a luta até agora, refletindo sobre quando"
 contest_events.0861.flavor_1: "eu tentei identificar as fraquezas do meu oponente anteriormente.\n\n"
 contest_events.0861.flavor_2: "meu oponente pausou para agradar a multidão.\n\n"
 contest_events.0861.flavor_3: "eu usei sujeira para cegar meu oponente.\n\n"
 contest_events.0861.flavor_4: "eu recorri a alguns truques sujos para ter sucesso.\n\n"
 contest_events.0861.flavor_5: "um membro da multidão me deu uma assistência inesperada.\n\n"
 contest_events.0861.flavor_6: "meu oponente corpulento me desafiou com seu tamanho.\n\n"
 contest_events.0861.flavor_7: "meu oponente e eu acabamos em uma posição bastante amorosa.\n\n"
 contest_events.0861.flavor_8: "um amigo do meu oponente me acusou de trapacear.\n\n"
 contest_events.0861.flavor_9: "eu analisei meu oponente para garantir o sucesso.\n\n"
 contest_events.0861.flavor_10: "meu dedo saiu do lugar.\n\n"
 contest_events.0861.flavor_11: "meu oponente me cutucou no olho.\n\n"
 contest_events.0861.flavor_12: "meu oponente, babando pela boca, mordeu meu nariz.\n\n"
 contest_events.0861.flavor_13: "Bati minhas mãos sobre os ouvidos do meu oponente, rompendo seus tímpanos.\n\n"
 contest_events.0861.flavor_fallback: "para fazer meu movimento.\n\n"
 contest_events.0861.a: "Aquele fígado parece vulnerável..."
 contest_events.0861.b: "\"Venha! Vamos trancar como guerreiros!\""
 contest_events.0861.c: "Finja um ataque baixo, vá alto."
 contest_events.0861.d: "Mantenha simples, mantenha-se seguro."
 contest_events.0862.t: "$tournament_contest_header$ Riposte"
 contest_events.0862.desc: "Um coro estridente de metal contra metal ressoa enquanto duas lâminas se raspam, faíscas cintilando ao caírem no chão. Procuro por vantagens, relembrando quando"
 contest_events.0862.flavor_3: "a espada do meu oponente voou para a multidão.\n\n"
 contest_events.0862.flavor_4: "eu instintivamente chutei meu oponente na virilha.\n\n"
 contest_events.0862.flavor_5: "eu me vi com uma vantagem dramática e decidi como usá-la da melhor maneira.\n\n"
 contest_events.0862.flavor_6: "meu oponente tentou me subornar.\n\n"
 contest_events.0862.flavor_7: "tive que escolher entre um contra-ataque e um bloqueio contra meu oponente agressivo.\n\n"
 contest_events.0862.flavor_8: "vi uma oportunidade de usar minha outra mão durante o duelo.\n\n"
 contest_events.0862.flavor_9: "me vi lutando com uma capa de duelista.\n\n"
 contest_events.0862.flavor_10: "considerei distrair meu oponente com palavras.\n\n"
 contest_events.0862.flavor_11: "utilizei minha #EMP experiência íntima#! com um membro da família do meu oponente.\n\n"
 contest_events.0862.flavor_fallback: "Avançamos mais uma vez um contra o outro. Amb[GetPlayer.Custom('ES_OA')]as partes estamos machucad[GetPlayer.Custom('ES_OA')]os, cansad[GetPlayer.Custom('ES_OA')]os, e só pode haver um[GetPlayer.Custom('ES_OA')].\n\n"
 contest_events.0862.a: "Devo lembrar do meu treinamento."
 contest_events.0862.b: "\"O que? Está #EMP com medo?#!\""
 contest_events.0862.c: "Uma última blefe pode decidir isso..."
 contest_events.0862.d: "\"Venha então. Vamos lutar.\""
 contest_events.0863.t: "$tournament_contest_header$ Xeque"
 contest_events.0863.desc: "O suave clique das peças em movimento perturba a calma. Estamos no fim do jogo agora, e o resultado está em equilíbrio. Eu reflito sobre o que já aconteceu, como quando"
 contest_events.0863.flavor_1: "eu tentei perturbar o jogo do meu oponente com jogos mentais.\n\n"
 contest_events.0863.flavor_2: "meu oponente virou a mesa completamente com um estrondo poderoso.\n\n"
 contest_events.0863.flavor_3: "vi a oportunidade de fazer um movimento arriscado, mas recompensador.\n\n"
 contest_events.0863.flavor_4: "vi e considerei uma abertura para trapacear.\n\n"
 contest_events.0863.flavor_5: "intimidei meu oponente a cometer movimentos ruins.\n\n"
 contest_events.0863.flavor_6: "meu oponente pediu que eu respeitasse sua interpretação das regras.\n\n"
 contest_events.0863.flavor_fallback: "As peças se movem silenciosamente, urgentemente. Nenhum de nós tem muito tempo para forçar a vitória.\n\n"
 contest_events.0863.a: "Talvez eu possa aproveitar meu conhecimento em guerra?"
 contest_events.0863.b: "\"Você parece muito confiante...\""
 contest_events.0863.c: "Talvez seja hora de um movimento ousado?"
 contest_events.0863.d: "Jogar de forma segura é a jogada certa."
 contest_events.0870.t: "$tournament_contest_header$ Golpe Certeiro"
 contest_events.0870.pivotal_success: "Primeiro, o som da colisão. Em seguida, um instante depois, uma vibração tremenda sob meu braço. E, de repente, outro som: os aplausos da multidão. Minha lança atinge com força, estilhaçando-se no escudo do meu adversário. Mais notavelmente, eles erraram completamente!\n\n"
 contest_events.0870.pivotal_neutral: "Embora ambos tenhamos começado bem, meu braço oscila e mergulha, passando pelo escudo do meu oponente. A única trégua é que meu oponente erra tão alto quanto eu erro baixo, os gemidos da multidão são ensurdecedores.\n\n"
 contest_events.0870.pivotal_failure: "Vejo como a ponta da minha lança se aproxima, se aproxima e… #EMP falla#! a falhar ao atingir o escudo do meu oponente. Um instante depois, sou sacudid[GetPlayer.Custom('ES_OA')] para trás na minha sela, uma lança se estilhaça contra o meu próprio escudo, e o rugido da multidão é uma maldição para os meus ouvidos.\n\n"
 contest_events.0870.ptv_close: "É hora de mais uma passagem final. Tudo se resume a isso."
 contest_events.0870.ptv_top: "Estou na liderança, mas ainda resta mais uma disputa. Tudo que preciso é acertar esta última passagem..."
 contest_events.0870.ptv_top_spectator: "[pivotal_contestant.GetFirstName] está na liderança, mas ainda há uma passagem final restante..."
 contest_events.0870.ptv_bottom: "Estou bem abatid[GetPlayer.Custom('ES_OA')], além de machucad[GetPlayer.Custom('ES_OA')] e maltratad[GetPlayer.Custom('ES_OA')]. Minha única esperança real é golpear meu adversário com tanta força que ele não consiga continuar, mas seria preciso um milagre…"
 contest_events.0870.ptv_bottom_spectator: "[pivotal_contestant.GetFirstName] parece praticamente derrotado. A menos que ocorra uma reviravolta dramática, isso está praticamente definido."
 contest_events.0870.ptv_top_half: "Estou ganhando, mas ainda há muito com o que me preocupar. Um único golpe pode encerrar essa disputa a meu favor ou ao deles."
 contest_events.0870.ptv_top_half_spectator: "[pivotal_contestant.GetFirstName] está ganhando, mas está bem equilibrado. A glória ainda está em jogo."
 contest_events.0870.ptv_bottom_half: "Estou atrás na pontuação, mas ainda posso recuperar. Mais uma passagem para completar, mais uma oportunidade pela glória..."
 contest_events.0870.ptv_bottom_half_spectator: "[pivotal_contestant.GetFirstName] está perdendo, mas ainda não acabou. Uma ação ainda pode virar o jogo a favor dele..."
 contest_events.0870.ptv_fallback: "A última passagem da rodada está próxima, enquanto ambos os cavalos aceleram."
 contest_events.0870.spectator: "\n\nAs rodadas finais de um torneio de justas são tumultuadas: os espectadores vaiam e gritam, os médicos cuidam dos feridos e o calor das multidões apertadas aumenta tudo em uma atmosfera febril."
 contest_events.0870.final: "\n\nOs cascos dos cavalos estrondam. Lanças se abaixam. A multidão urra."
 contest_events.0870.winner_start: "Partimos para mais uma investida pela última vez e, enquanto meu cavalo se aproxima aos trotes, [versus_contestant.Custom('ES_AlAla')] [versus_contestant.GetTitledFirstName|l], tenho um bom pressentimento sobre esta justa."
 contest_events.0870.loser_start: "Nos preparamos mais uma vez, mas enquanto avanço, algo parece estranho; o ritmo do cavalo ou a forma como minha armadura está encaixada."
 contest_events.0870.winner_break: "Minha lança acerta em cheio o escudo dele(a) e produz um estrondo ensurdecedor e uma explosão de estilhaços, enquanto [versus_contestant.GetFirstName] passa voando ao meu lado. É tudo de que preciso para marcar os pontos!"
 contest_events.0870.winner_unhorse: "Minha lança o acerta em cheio no peito, [versus_contestant.GetFirstName] e [versus_contestant.GetHerHim] o derruba no chão em meio a uma chuva de lascas enquanto meu cavalo segue adiante."
 contest_events.0870.loser_break: "Minha lança desvia do alvo no último instante, e sinto que [versus_contestant.GetFirstName] acerta em cheio[versus_contestant.Custom('ES_OA')], sacudindo meu escudo antes do estrondo ensurdecedor e da explosão de estilhaços."
 contest_events.0870.loser_unhorse: "Não consigo manter a arma firme enquanto nos aproximamos, e vejo a lança dele contornar meu escudo e me atingir em cheio no peito. Aturdid[ROOT.Char.Custom('ES_OA')] no chão, [versus_contestant.Custom('ES_LoLa')] ouço-o cavalgar, triunfante."
 contest_events.0870.a: "A última passagem da rodada está próxima."
 contest_events.0870.b: "Apenas mais uma passagem para a rodada!"
 contest_events.0871.t: "$tournament_contest_header$ Indefinido"
 contest_events.0871.pivotal_success: "Uma mão em seu ombro, um tropeço habilidoso e um grande empurrão. Caímos no chão. Todo som é respiração ofegante e, ao longe, o rugido da multidão. Eu me arrasto por cima do meu adversário, me esforçando para aproveitar minha vantagem.\n\n"
 contest_events.0871.pivotal_neutral: "A respiração ofegante de ambos enche o ar enquanto lutamos para derrubar um ao outro. Finalmente, um pé enroscado no outro se mostra crucial, e caímos no chão. Atordoados por um instante, nos recuperamos e percebemos que estamos deitados de lado, imediatamente nos esforçando para obter uma vantagem.\n\n"
 contest_events.0871.pivotal_failure: "Tento arremessar meu oponente, mas assim que o faço, sou lançado pelos ares.[GetPlayer.Custom('ES_OA')] Aterriso com força, o ar deixa meus pulmões com um gemido, e imediatamente fico na defensiva, esforçando-me para evitar ser imobilizado.\n\n"
 contest_events.0871.ptv_close: "O combate está acirrado, muito acirrado. Um erro de qualquer um de [GetPlayer.Custom('ES_LoLa')]s dois poderia encerrá-lo em um instante."
 contest_events.0871.ptv_close_spectator: "A disputa está muito acirrada! Um erro de qualquer competidor pode encerrá-la em um instante."
 contest_events.0871.ptv_top: "Estou ganhando! Só preciso me manter para a vitória!"
 contest_events.0871.ptv_top_spectator: "[pivotal_contestant.GetFirstName] está ganhando! A vitória está próxima, com certeza!"
 contest_events.0871.ptv_bottom: "Estou perdendo, e por uma boa margem. O caminho para a vitória é estreito, mas ainda é possível..."
 contest_events.0871.ptv_bottom_spectator: "[pivotal_contestant.GetFirstName] está perdendo, e por uma boa margem. Seria necessário um milagre para vencer a partir daqui..."
 contest_events.0871.ptv_top_half: "Estou ganhando, mas a vitória está longe de ser certa. Mais um esforço..."
 contest_events.0871.ptv_top_half_spectator: "[pivotal_contestant.GetFirstName] está ganhando, mas a vitória está longe de ser certa."
 contest_events.0871.ptv_bottom_half: "Estou perdendo, mas a derrota está longe de ser certa. Ainda posso reverter a situação!"
 contest_events.0871.ptv_bottom_half_spectator: "[pivotal_contestant.GetFirstName] está perdendo, mas a derrota está longe de ser certa."
 contest_events.0871.ptv_fallback: "O suor escorre de mim. Nossos membros se enredam, ambos buscando vantagem."
 contest_events.0871.spectator: "\n\nOs corpos se desenroscam, se engajam e se separam novamente, a respiração pesada dos competidores sendo abafada pelo rugido da multidão. Eles se agarram novamente, a poeira rodopiando e grudando em áreas de pele suada."
 contest_events.0871.final: "A poeira rodopia, e a multidão grita de excitação. A disputa será decidida."
 contest_events.0871.winner_start: "Momentos depois, consigo pegar [versus_contestant.GetFirstName] desprevenido."
 contest_events.0871.loser_start: "Momentos depois, [versus_contestant.GetFirstName] de repente me pega desprevenido!"
 contest_events.0871.winner_pin: "Faço meu movimento, imobilizando [versus_contestant.GetFirstName] e segurando[versus_contestant.Custom('ES_LoLa')] com firmeza enquanto luta em vão para escapar."
 contest_events.0871.winner_throw: "Aproveito a oportunidade e agarro [versus_contestant.GetFirstName] pela cintura e [versus_contestant.GetHerHim] lanço com todas as minhas forças para fora do ringue, onde cai estatelad[versus_contestant.Custom('ES_OA')]."
 contest_events.0871.loser_pin: "Enquanto tento recuperar minha compostura, [versus_contestant.GetSheHe] me derruba no chão, me imobilizando com uma pegada firme. Luto em vão, incapaz de me libertar."
 contest_events.0871.loser_throw: "Enquanto tento em vão ganhar apoio, [versus_contestant.GetSheHe] me joga com força, me fazendo rolar para fora do ringue, caindo na sujeira."
 contest_events.0871.winner_end: "Os juízes encerram a disputa. Eu venci!"
 contest_events.0871.loser_end: "Os juízes encerram a disputa. Eu perdi..."
 contest_events.0871.a: "Vitória!"
 contest_events.0871.a.loser: "Confundido..."
 contest_events.0871.b: "Mais uma queda resolverá!"
 contest_events.0872.t: "$tournament_contest_header$ Aço contra Aço"
 contest_events.0872.pivotal_success: "Um golpe sonoro ressoa quando minha arma resvala em um capacete, meu oponente cambaleando para trás atordoado. Sigo rapidamente; um falso movimento para a esquerda, um golpe poderoso para a direita. Avanço enquanto meu adversário recua desesperadamente, minha espada sendo desviada por uma margem mínima.\n\n"
 contest_events.0872.pivotal_neutral: "Meu golpe por cima é desviado para o lado, e eu escapo do contra-ataque. As armas se chocam novamente, parando e avançando enquanto a multidão aplaude e suspira. Nenhum de nós consegue encontrar uma abertura.\n\n"
 contest_events.0872.pivotal_failure: "Meu golpe cansado erra o alvo, meu oponente nem se preocupando em se esquivar do meu ataque impreciso. Em vez disso, me vejo imediatamente na defensiva, defendendo golpe após golpe sem conseguir responder com nenhum ataque próprio. Recuo desesperadamente, me esquivando e desviando, qualquer coisa para permanecer na luta.\n\n"
 contest_events.0872.ptv_close: "O duelo ainda está tão equilibrado! Seu vencedor ainda pode ser qualquer um de nós."
 contest_events.0872.ptv_close_spectator: "O duelo ainda está tão equilibrado! Seu vencedor ainda pode ser qualquer um dos competidores."
 contest_events.0872.ptv_top: "Estou vencendo essa luta com uma certa margem. Só preciso me manter firme por mais alguns momentos..."
 contest_events.0872.ptv_top_spectator: "[pivotal_contestant.GetFirstName] está vencendo! Só mais alguns momentos antes da vitória, com certeza..."
 contest_events.0872.ptv_bottom: "Estou perdendo essa luta, e por uma boa distância. Preciso fazer algo em breve!"
 contest_events.0872.ptv_bottom_spectator: "[pivotal_contestant.GetFirstName] está perdendo essa luta, e por uma boa margem. Ele/Ela precisa fazer algo já!"
 contest_events.0872.ptv_top_half: "Estou vencendo, mas essa é a natureza de um duelo: preciso aproveitar minha vantagem agora, senão vou me arrepender."
 contest_events.0872.ptv_top_half_spectator: "[pivotal_contestant.GetFirstName] está vencendo, mas essa é a natureza de um duelo, as coisas podem mudar a qualquer momento."
 contest_events.0872.ptv_bottom_half: "Estou perdendo essa luta. Não por muito, talvez, mas preciso fazer algo em breve..."
 contest_events.0872.ptv_bottom_half_spectator: "[pivotal_contestant.GetFirstName] está perdendo essa luta. Talvez não por muito, mas precisa fazer algo logo…"
 contest_events.0872.ptv_fallback: "Aço encontra aço quando as espadas se chocam mais uma vez."
 contest_events.0872.spectator: "\n\nOs dois se enfrentam novamente, e faíscas brilhantes voam à luz do dia. Suspiros da multidão ecoam tão prontamente quanto os golpes das lâminas."
 contest_events.0872.final: "Grunhidos, estrondos, os gritos da multidão. Um coro brutal para o fim desse duelo."
 contest_events.0872.winner_start: "Sinto uma vitória e me apresso em conquistá-la antes que [versus_contestant.GetFirstName] se recupere."
 contest_events.0872.loser_start: "[versus_contestant.GetFirstName] muda repentinamente de tática, e sinto que o fim está próximo."
 contest_events.0872.winner_yield: "[versus_contestant.GetFirstName] se enfraquece sob meus golpes em rápida sucessão, mal conseguindo se manter em guarda, até que por fim se afasta, rendendo-se."
 contest_events.0872.winner_disarm: "Apanho a lâmina de sua espada com uma sequência rápida de golpes, quebrando sua empunhadura e enviando a arma girando para o chão."
 contest_events.0872.loser_yield: "Mal consigo me defender dos golpes precisos de [versus_contestant.GetFirstName] e minha energia se esgota rapidamente. Ergo o braço para me render, em vez de prolongar o inevitável."
 contest_events.0872.loser_disarm: "Faço o meu melhor para me manter em guarda contra seus golpes impetuosos, mas o último atinge minha espada de forma desajeitada, arrancando-a de minhas mãos e jogando-a na terra."
 contest_events.0872.a: "Mais um golpe..."
 contest_events.0872.b: "Mais um golpe!"
 contest_events.0873.t: "$tournament_contest_header$ Jogo Final"
 contest_events.0873.pivotal_success: "Não consigo evitar que minha expressão se desfaça por um momento e sorrio quando meu oponente cai perfeitamente na armadilha que eu havia preparado. Alguns movimentos depois, e transformo a abertura em uma vantagem.\n\n"
 contest_events.0873.pivotal_neutral: "Meu oponente ignora a armadilha que eu havia preparado, mas eu também percebo e desvio da que foi preparada para mim. Algumas jogadas tensas a mais se mostram infrutíferas para [GetPlayer.Custom('ES_LoLa')] s dois. A partida está em um impasse à medida que nos aproximamos do final.\n\n"
 contest_events.0873.pivotal_failure: "No momento em que minha mão solta a peça de jogo, sei que cometi um erro, e a armadilha tão astutamente preparada pelo meu oponente é acionada. Algumas jogadas a mais e fico claramente prejudicad[GetPlayer.Custom('ES_OA')] por meu erro, forçad[GetPlayer.Custom('ES_OA')] a ocupar uma posição que eu não queria de forma alguma.\n\n"
 contest_events.0873.ptv_close: "Como esse jogo vai terminar é um palpite de qualquer um. A margem de vitória é tão pequena e o custo dos erros é tão grande."
 contest_events.0873.ptv_top: "Estou ganhando com certa vantagem. Desde que eu possa pressionar essa vantagem com firmeza, a vitória está certamente próxima!"
 contest_events.0873.ptv_top_spectator: "[pivotal_contestant.GetFirstName] está ganhando por certa margem. Se conseguir pressionar e manter essa vantagem, a vitória certamente está no horizonte!"
 contest_events.0873.ptv_bottom: "Estou perdendo, e minha posição piora a cada jogada. Seria necessário algo como um milagre para vencer a partir daqui..."
 contest_events.0873.ptv_bottom_spectator: "[pivotal_contestant.GetFirstName] está perdendo, e sua posição piora a cada jogada. Seria necessário algo como um milagre para vencer a partir daqui..."
 contest_events.0873.ptv_top_half: "Estou ganhando, mas ainda não é algo certo. Qualquer erro pode ser custoso."
 contest_events.0873.ptv_top_half_spectator: "[pivotal_contestant.GetFirstName] está ganhando, mas ainda não é algo certo. Qualquer erro pode ser custoso."
 contest_events.0873.ptv_bottom_half: "Estou perdendo, mas minha posição ainda não é desesperadora. Se eu apenas encontrar uma abertura..."
 contest_events.0873.ptv_bottom_half_spectator: "[pivotal_contestant.GetFirstName] está perdendo, mas a posição ainda não é desesperadora. Se encontrasse alguma abertura…"
 contest_events.0873.ptv_fallback: "A posição do tabuleiro continua a se tornar mais complexa, porém de alguma forma mais simples, conforme rotas e estratégias potenciais são bloqueadas."
 contest_events.0873.spectator: "\n\nAs sobrancelhas se franzem enquanto o jogo avança inexoravelmente, os espectadores mantendo um silêncio sussurrante para evitar distrações; ou pior, revelar um movimento potencial que beneficiaria seu favorito."
 contest_events.0873.final: "Mais cliques suaves, mais tensão mental. O jogo final está em pleno andamento."
 contest_events.0873.winner_start: "Logo fica claro que não há volta para [versus_contestant.GetFirstName]."
 contest_events.0873.loser_start: "Momentos depois, percebo finalmente o perigo da minha posição. [versus_contestant.GetFirstName] esteve me atraindo desde o início!"
 contest_events.0873.winner_surprise: "[versus_contestant.GetSheHe|U] caiu direitinho na minha armadilha, sem perceber o final cuidadosamente planejado. Com um gesto despreocupado, minha última jogada se encaixa no tabuleiro."
 contest_events.0873.winner_grind: "[versus_contestant.GetHerHim|U] vou triturando-o e avançando inexoravelmente rumo à vitória, enquanto sua posição se enfraquece lenta, mas irremediavelmente."
 contest_events.0873.loser_surprise: "[versus_contestant.GetSheHe|U] me atraiu para uma armadilha durante metade do jogo, esperando pacientemente enquanto eu cometia erros. Neste momento, não há escapatória."
 contest_events.0873.loser_grind: "Parece que cada movimento que faço é um compromisso, perdendo palmo a palmo para o jogo superior de [versus_contestant.GetFirstName]. Em muito pouco tempo, minha posição se torna insustentável."
 contest_events.0873.a: "Apenas algumas jogadas restantes..."
 contest_events.0873.b: "Apenas algumas jogadas restantes!"
 ## FLAVOR
 #MURDER INTENT
 contest_events.1100.t: "$activity_tournament$: Sorte da Frenesi"
 contest_events.1100.desc: "Atravessando o tumulto caótico que envolve [activity.GetCurrentPhase.GetLocation.GetNameNoTooltip], desviando e driblando amigos e inimigos, enfim avisto meu/minha [murder_actor.Custom2('RelationToMeShort', murder_target)], [murder_target.Custom('ES_ElLa')] [murder_target.GetTitledFirstName|l], de costas para mim!\n\nAproximo-me sem ser visto; outro oponente distrai toda a atenção de [murder_target.GetHerHis]; neste barulho ensurdecedor e caos girante, ninguém está focado em mim...\n\nJá te peguei, [murder_target.Custom2('InsultNoun', ROOT.Char)]!"
 contest_events.1100.a: "Desvie disso!"
 contest_events.1100.b: "Isso não é honroso..."
 contest_events.1101.t: "$contest_events.1100.t$"
 contest_events.1101.desc: "Corro em direção a [murder_target.GetSheHe], reduzindo a distância, [murder_actor.Custom('signature_weapon')] em riste, e desfero o golpe com toda a minha força!"
 contest_events.1101.miss: "\n\nNesse exato momento, es[murder_target.Custom('ES_EA')] demoníac[murder_target.Custom('ES_OA')] [murder_target.Custom2('InsultAdjective', ROOT.Char)] desvia de uma estocada de seu outro inimigo, e [murder_actor.Custom('signature_weapon')] despenca na terra.\n\nMe recupero rapidamente, enquanto [murder_target.Custom('ES_ElLa')] [murder_target.GetTitledFirstName|l] uiva: \"Seu/sua maldit[murder_actor.Custom('ES_OA')] malnascid[murder_target.Custom('ES_OA')]!\". Seu rosto carrancudo desaparece na confusão enquanto ambos saltamos para nossas respectivas defesas."
 contest_events.1101.wound: "\n\n[murder_target.GetSheHe|U] se move ligeiramente, bem quando meu golpe acerta seu capacete, fazendo com que [murder_actor.Custom('signature_weapon')] ricocheteie em um ângulo.\n\n[murder_target.Custom('ES_ElLa')|U] [murder_target.GetTitledFirstName|l] uiva de dor e se vira para mim, os olhos se arregalam ao me reconhecer.\n\nOuço [murder_target.GetHerHim] rosnar \"Suj[murder_actor.Custom('ES_OA')] [murder_actor.Custom2('InsultNoun', SCOPE.sC('murder_target'))]\" antes que [murder_target.GetSheHe] desabe, e a tempestade da luta nos separe."
 contest_events.1101.kill: "\n\nMeu golpe atinge em cheio o elmo, que soa como um sino enquanto tal [murder_target.Custom2('InsultNoun', ROOT.Char)] cai no chão como um saco de batatas.\n\nSeu oponente rosna um agradecimento para mim, antes que uma expressão de preocupação se espalhe por seu rosto. Entrevejo os olhos [murder_target.Custom('ES_DelDela')] [murder_target.GetTitledFirstName|l] enquanto a massa agitada nos separa; eles não mostram reconhecimento."
 contest_events.1101.a: "Tome cuidado, [murder_target.Custom2('InsultNoun', ROOT.Char)]!"
 contest_events.1101.b: "\"[murder_target.Custom2('InsultNoun', ROOT.Char)|U] com sorte!\""
 contest_events.1101.c: "\"[murder_target.Custom2('InsultNoun', ROOT.Char)|U]!\""
 contest_events.1102.t: "$contest_events.1100.t$"
 contest_events.1102.desc: "Rodeado[GetPlayer.Custom('ES_OA')] de amigos e inimigos, faço todo o possível para manter a cabeça na confusão que se agita em [activity.GetCurrentPhase.GetLocation.GetNameNoTooltip], aparando os golpes desferidos contra mim por um oponente determinado."
 contest_events.1102.miss: "\n\nEnquanto desvio de uma dessas estocadas, [murder_actor.Custom('signature_weapon')] de alguém ressoa por trás de mim, errando por centímetros. Ao aumentar a distância entre meus dois adversários, vejo que a arma pertence nada menos que [murder_actor.Custom('ES_AlAla')] [murder_actor.GetTitledFirstName|l], cujo semblante carrancudo se dissolve agora na multidão!"
 contest_events.1102.wound: "\n\nDe repente sou surpreendido por um golpe por trás, desajeitado mas decidido, que ricocheteia no meu capacete e me faz cambalear.\n\nQuando me viro, uivando de dor, vejo [murder_actor.Custom('ES_AlAla')] [murder_actor.GetTitledFirstName|l], claramente incomodado[murder_actor.Custom('ES_OA')] por não ter causado mais dano, desaparecendo na massa caótica antes que eu desabe."
 contest_events.1102.kill: "\n\nNo instante seguinte, tenho os sentidos amortecidos, e os ouvidos zumbem. A terra se aproxima lentamente de mim enquanto desabo, caíd[murder_target.Custom('ES_OA')] no chão duro. Diviso o rosto de [murder_actor.GetSheHe], mas não consigo fazer nenhuma ligação antes que o mundo se perca na escuridão."
 contest_events.1102.a: "Seu miserável desgraçado[murder_actor.Custom('ES_OA')]!"
 contest_events.1102.b: "Maldito[murder_actor.Custom('ES_OA')] [ROOT.Char.Custom2('InsultNoun', ROOT.Char)]!"
 contest_events.1102.c: "#weak *gorgotea*#!"
 contest_events.1110.t: "Chance de Atacar"
 contest_events.1110.desc: "Esperei pacientemente por uma oportunidade de eliminar [murder_target.Custom('ES_ElLa')] [murder_target.GetTitledFirstName|l], e agora talvez tenha chegado a minha hora.\n\nA [activity.GetCurrentPhase.GetPhase.GetName] me proporcionará a cobertura ideal para um pequeno acidente…"
 contest_events.1110.a: "Desvie #EMP disso#!!"
 contest_events.1110.b: "Isso é demais!"
 contest_events.1131.t: "$tournament_contest_header$ Combate Mortal"
 contest_events.1131.team: "Embora tenham colocado no meu time meu [ROOT.Char.Custom2('RelationToMeShort', portrait_scope)] , [portrait_scope.GetTitledFirstName|l] — esse/a infeliz [portrait_scope.Custom2('InsultNoun', ROOT.Char)]— para a briga, quando me retiro para um beco para recuperar o fôlego e me encontro a sós com [portrait_scope.GetSheHe] , nós dois entendemos um ao outro."
 contest_events.1131.enemy: "Percorrendo [activity.GetCurrentPhase.GetLocation.GetNameNoTooltip] fazendo reconhecimento à frente da minha equipe, quando viro uma esquina e me encontro cara a cara com meu [ROOT.Char.Custom2('RelationToMeShort', portrait_scope)], [portrait_scope.GetTitledFirstName|l], que desempenha o mesmo papel no lado oposto."
 contest_events.1131.desc: "\n\nVejo em seu semblante a mesma determinação, o mesmo ódio que [portrait_scope.GetSheHe] deve ver no meu…\n\nSó há uma maneira de sair desta."
 contest_events.1131.win: "Você vence [portrait_scope.GetFirstNameNoTooltip]"
 contest_events.1131.lose: "[portrait_scope.GetFirstNameNoTooltip] supera você"
 contest_events.1131.a: "#EMP Morra!#!"
 contest_events.1131.b: "Arghghgh!"
 contest_events.1131.b.flavor: "#EMP FUJA!#!"
 contest_events.1133.t: "$contest_events.1131.t$"
 contest_events.1133.fled_both: "Dou a volta e corro o mais rápido que minhas pernas conseguem, chamando a atenção da minha equipe aos gritos.\n\nSó ao chegar ao fim da rua, olho para trás e avisto a [portrait_scope.GetFirstName] ao longe, tão envergonhado quanto eu.\n\nNão direi nada se [portrait_scope.GetSheHe] também…"
 contest_events.1133.chase_team: "Antes que eu possa reagir, [portrait_scope.GetFirstName] faz uma corrida em direção à saída, gritando agudamente por ajuda de nossos colegas de equipe."
 contest_events.1133.chase_enemy: "Antes que eu possa reagir, [portrait_scope.GetFirstName] faz uma corrida em direção à saída, gritando agudamente por ajuda de seus colegas de equipe."
 contest_events.1133.fled_team: "Sigo disparado[GetPlayer.Custom('ES_OA')] para a saída, corro de cabeça de volta para o restante da equipe e me abrigo atrás de seus escudos."
 contest_events.1133.fled_enemy: "Saio disparad[GetPlayer.Custom('ES_OA')] em direção à saída, corro a toda velocidade na direção dos meus companheiros, pedindo seu apoio aos gritos."
 contest_events.1133.fled: "\n\nAo chegar ao final da rua, olho para trás e vejo que [portrait_scope.GetFirstName] se rendeu e ofega, olhando furiosamente para mim."
 contest_events.1133.chase: "\n\n[portrait_scope.GetSheHe|U] é mais rápido do que parece e já está no fim da rua quando desisto, ofegante…"
 contest_events.1133.fight: "Lendo a mente um do outro, ambos entramos em ação, a espada de [portrait_scope.GetFirstName] e a minha mordem furiosamente enquanto trocamos bloqueios."
 contest_events.1133.nothing: "\n\nA briga é rapidamente interrompida pela chegada dos outros, nos deixando encarando um ao outro pela rua."
 contest_events.1133.wound_self_fled: "\n\n[portrait_scope.GetSheHe|U] me arranha pouco antes de eu sair do alcance dele, embora, felizmente, isso seja tudo o que ele consegue fazer…"
 contest_events.1133.wound_self: "\n\nTal [portrait_scope.Custom2('InsultNoun', ROOT.Char)] me supera e consegue me pegar desprevenido, me cortando antes que os outros cheguem."
 contest_events.1133.wound_enemy_fled: "\n\nSó consigo fazer um corte nele antes de ficar fora de alcance, mancando até os camaradas, [portrait_scope.Custom('ES_ElLa')] muito covarde..."
 contest_events.1133.wound_enemy: "\n\nEnquanto as faíscas voam, vejo uma oportunidade e faço um corte com força antes que se recupere, embora os outros cheguem antes que possamos continuar…"
 contest_events.1133.kill_fled: "\n\nQuando [portrait_scope.Custom('ES_ElLa')] muito [portrait_scope.Custom2('InsultAdjective', ROOT.Char)] dá meia-volta, escorrega e cai desajeitadamente no chão. Tudo termina antes que possa dar um grito por clemência…"
 contest_events.1133.kill: "\n\nNosso choque frenético se intensifica como um furacão, uma torrente de aço se chocando e faíscas ardentes. Ao avançarmos, de repente tenho a vantagem, e amb[GetPlayer.Custom('ES_OA')]s sabemos que isso acabou, tão rápido quanto começou."
 contest_events.1133.a.both_fled: "Ahem."
 contest_events.1133.a.wound: "Seu sortudo de merda[portrait_scope.Custom('ES_OA')]! Vou pegar você!"
 contest_events.1133.a.kill: "Acabou."
 contest_events.1133.a: "Por pouco..."
 ### ARCHERY ###
 #TRAGEDY
 contest_events.1520.t: "$tournament_contest_header$ Tragédia nos Alvos"
 contest_events.1520.opening: "Eu me posiciono na linha, puxando uma flecha do barril e, cuidadosamente, seguro meu arco, espiando pelo eixo em direção ao alvo distante.\n\nNo exato momento em que me comprometo, afrouxando o agarre, uma figura surge subitamente de trás do alvo!"
 contest_events.1520.skilled: "O tiro voa certeiro, diretamente em direção a eles!\n\n"
 contest_events.1520.unskilled: "O tiro erra, com certeza um fracasso, mas segue diretamente em direção a eles!\n\n"
 contest_events.1520.desc: "Um suspiro surge entre os espectadores e, após uma eternidade, a figura se curva, gemendo fracamente. Um ajudante logo confirma o pior: o camponês está completamente morto — nenhum ponto por #EMP isso#! flechada..."
 contest_events.1520.a: "A família será cuidada."
 contest_events.1520.b: "Não vamos deixar isso estragar nossa diversão."
 contest_events.1520.c: "Acho que já tive o bastante de arco e flecha por hoje..."
 contest_events.1521.t: "$contest_events.1520.t$"
 contest_events.1521.desc: "[contestant.Custom('ES_ElLa')|U] [contestant.GetTitledFirstName|l] se aproxima à linha, pega uma flecha do aljava e arma o arco com cuidado, mirando o alvo à distância.\n\nNo exato momento em que ele solta a flecha, uma silhueta surge de repente de trás do alvo!\n\n"
 contest_events.1521.resigned: "\n\n[contestant.GetFirstNameNoTooltip] se retirou voluntariamente da competição de arco e flecha, por respeito à alma infeliz."
 contest_events.1521.dismissed: "\n\n[contestant.GetFirstNameNoTooltip] descarta rapidamente o acidente, esperando impacientemente para fazer o próximo tiro."
 contest_events.1521.compensated: "\n\n[contestant.GetFirstNameNoTooltip] deu uma pequena ajuda do próprio bolso para a família do falecido."
 contest_events.1521.a: "Trágico."
 #NAIL
 contest_events.1530.t: "$tournament_contest_header$ Na Cabeça"
 contest_events.1530.desc: "Tenso a corda do arco algumas vezes para aquecer e respiro fundo.\n\nReunindo todo o meu controle, ergo o arco no ar e o abaixo lentamente até alinhá-lo com o alvo. Assim que a flecha sai das pontas dos meus dedos, intuo de imediato que o disparo foi bom.\n\nMomentos depois, um satisfatório som metálico o confirma: acertei em cheio o prego do alvo!"
 contest_events.1530.a: "Sim!"
 contest_events.1531.t: "$contest_events.1530.t$"
 contest_events.1531.desc: "[contestant.Custom('ES_ElLa')|U] [contestant.GetTitledFirstName|l] tensiona a corda do arco algumas vezes para se aquecer e respira fundo.\n\nReunindo todo o seu controle, puxa o arco no ar e o abaixa lentamente até alinhá-lo com o alvo. Assim que a flecha sai das pontas de seus dedos, fica claro que o disparo é bom.\n\nMomentos depois, um satisfatório som metálico o confirma: [contestant.GetFirstNameNoTooltip] acertou em cheio o prego do alvo!"
 contest_events.1531.a: "Sorte..."
 #BAD DAY
 contest_events.1540.t: "$tournament_contest_header$ Dia Ruim"
 contest_events.1540.desc: "Pego uma flecha com confiança, tomando meu lugar diante do alvo e absorvendo a atmosfera. A multidão se aquieta enquanto aperfeiçoo minha postura e encaixo a flecha.\n\nA primeira flecha erra por um fio de cabelo, cravando-se no alvo de terra. A segunda assobia muitos metros acima do alvo. A terceira cai a poucos metros de mim, lançada por uma soltura ruim.\n\n"
 contest_events.1540.unskilled: "A multidão ri enquanto volto, incapaz de esconder minha irritação. Preciso praticar mais..."
 contest_events.1540.sabotage: "Eu simplesmente não entendo! Consigo acertar o alvo quando pratico. A menos... Eu olho desconfiado para o meu arco..."
 contest_events.1540.a: "É o que é."
 contest_events.1541.t: "$contest_events.1540.t$"
 contest_events.1541.desc: "[contestant.Custom('ES_ElLa')|U] [contestant.GetTitledFirstName|l] recolhe uma flecha com confiança, tomando seu lugar diante do alvo. A multidão se cala enquanto ele aperfeiçoa sua postura e noca.\n\nO primeiro disparo erra por um fio, cravando-se no anteparo de terra. O segundo assovia bem acima do alvo. O terceiro cai a poucos metros de [contestant.GetSheHe], lançado por uma má soltura.\n\n"
 contest_events.1541.unskilled: "O público ri enquanto [contestant.GetSheHe] se volta, sem conseguir esconder sua irritação. Precisa praticar mais!"
 contest_events.1541.sabotage: "[contestant.Custom('ES_ElLa')|U] [contestant.GetTitledFirstNameNoTooltip|l] está claramente confus[contestant.Custom('ES_OA')]. \"Não entendo de jeito nenhum! Eu não sou tão ruim assim!\", choraminga, examinando seu arco com desconfiança."
 contest_events.1541.a: "Acontece."
 #MYSTERIOUS
 contest_events.1550.t: "$tournament_contest_header$ [contestant.GetFirstNameNoTooltip] Hood"
 contest_events.1550.desc: "A multidão se cala quando [contestant.Custom('ES_ElLa')] [contestant.GetTitledFirstName|l] dispara sua primeira flecha, fascinada em ver se est[contestant.Custom('ES_EA')] [contestant.GetWomanMan] é tão bom[contestant.Custom('ES_OA')] quanto sugerem os boatos nos arredores do torneio.\n\n"
 contest_events.1550.good: "Nem os boatos mais absurdos poderiam fazer jus ao seu desempenho."
 contest_events.1550.normal: "Apesar de tudo o que se diz, é [Select_CString( contestant.IsFemale, 'uma arqueira', 'um arqueiro' )] claramente medíocre. Não há nada a lhe reprochar, mas sua pontuação não é nada de extraordinário, empatada como está com alguns dos competidores menos experientes."
 contest_events.1550.bad: "Estão bastante decepcionados, depois de uma escandalosa exibição de falhas e erros grosseiros. Poder-se-ia muito bem perguntar se [Select_CString( contestant.IsFemale, 'esta', 'este' )] [contestant.GetWomanMan] havia segurado um arco alguma vez, muito menos se o havia usado."
 contest_events.1550.a: "Bravo!"
 contest_events.1550.a.good: "Espectacular."
 contest_events.1550.a.bad: "Desapontante."
 contest_events.1550.b: "Tenho que conhecer[contestant.GetHerHim]!"
 contest_events.1550.b.tt: "Você tentará conversar com [contestant.GetFirstName]"
 contest_events.1550.c: "Hmpf."
 contest_events.1550.d: "Alguém certamente se divertiu nos enganando."
 contest_events.1553.t: "$contest_events.1550.t$"
 contest_events.1553.desc: "Quando meus assistentes trazem [contestant.GetFirstName] para frente, [marshal.Custom('ES_ElLa')] [marshal.GetTitledFirstName|l] explode de repente: \"Ei! Eu te conheço! Peguem [contestant.GetHerHim]!\".\n\n\"Est[contestant.Custom('ES_EA')] daqui é [Select_CString( contestant.IsFemale, 'a chefe', 'o líder' )] de alguns bandidos locais, [ROOT.Char.Custom('FormOfAddressForLiege')]!\", rosna [marshal.GetFirstName]. \"Eles se escondem em [activity.GetCurrentPhase.GetLocation.GetTerrain.GetNameNoTooltip|l], roubando gado e assaltando viajantes inocentes\".\n\n\"Mentira!\", rebate desafiadoramente [Select_CString( contestant.IsFemale, 'a arqueira', 'o arqueiro' )]. \"Devolvemos o saque dos ricos aos seus legítimos donos: o povo!\""
 contest_events.1553.a: "Prendam[contestant.GetHerHim]!"
 contest_events.1553.b: "Uma execução pública resolveria."
 contest_events.1553.c: "Você está perdoado, [contestant.GetFirstNameNoTooltip], não desperdice isso."
 contest_events.1553.d: "Pague por seus crimes - em meu serviço."
 contest_events.1554.t: "$contest_events.1550.t$"
 contest_events.1554.desc: "Os assistentes que enviei para trazer [contestant.GetFirstName] voltam confusos.\n\nParece que [Select_CString( contestant.IsFemale, 'la arquera', 'el arquero' )] abandonou o campo de tiro assim que esgotou suas flechas — desde então, não houve nenhum sinal de [contestant.GetSheHe]…"
 contest_events.1554.a: "O que diabos..."
 ### HORSE RACE ###
 contest_events.3000.t: "$tournament_contest_header$ Encavalados"
 contest_events.3000.desc: "O cavaleiro de [contestant_1.GetFirstName] avança em disparada pela pista.\n\nNo último momento, ele se inclina desajeitadamente para o lado, deslizando pela terra, sem dar tempo de parar os cavalos de [contestant_2.GetFirstName] e [contestant_3.GetFirstName]!\n\nO gemido unânime da multidão preenche o ar antes mesmo de os três cavalos e cavaleiros colidirem.\n\n"
 contest_events.3000.a: "Ai!"
 contest_events.3000.b: "\"[contestant_1.GetFirstNameNoTooltip]! Como vocês deixaram isso acontecer?!\"."
 contest_events.3010.t: "$tournament_contest_header$ O Jockey Desajeitado"
 contest_events.3010.desc: "Ver o cavaleiro de [enemy_competitor.GetName] montado em seu corcel é como ver uma pedra rolar pela praça de uma aldeia. Ele cavalga como um[enemy_competitor.Custom('ES_XA')] autêntic[enemy_competitor.Custom('ES_OA')] lunátic[enemy_competitor.Custom('ES_OA')] e, infelizmente, meu próprio cavaleiro, [jockey.GetFirstName] foi vítima das corridas violentas e desajeitadas de est[enemy_competitor.Custom('ES_EA')].\n\nCom um relincho agoniado e um forte e doloroso estalo, meu cavalo é lançado contra a parede da pista, e tenho certeza de que [jockey.GetFirstNameNoTooltip] tem a perna machucada."
 contest_events.3010.a: "\"Isso obviamente viola as regras!\""
 contest_events.3010.a.success: "Você convence o juiz a penalizar o jóquei"
 contest_events.3010.a.failure: "Você não consegue convencer o juiz"
 contest_events.3010.b: "Vou fazer uma exceção."
 contest_events.3020.t: "$tournament_contest_header$ Um Jockey Genial"
 contest_events.3020.desc: "Entre os plebeus que assistem à corrida, não é segredo algum quem tem seu favor. Os camponeses olham para o cavaleiro de [enemy_competitor.GetName] com amor e admiração em igual medida. Desmaiam quando os cavalos passam em meio ao estrondo e aplaudem quando [enemy_competitor.GetFirstNameNoTooltip] elogia seu cavaleiro diante da multidão. [enemy_competitor.GetSheHe|U] observa a corrida com satisfação, sabendo que seu cavaleiro conta com o apoio irrestrito do público.\n\nE me pergunto: talvez, com o estímulo certo, eu consiga desviar a atenção da multidão para #EMP meu#! cavaleiro [jockey.GetFirstName]?"
 contest_events.3020.a: "\"Eis! Meu nobre cavaleiro!\""
 contest_events.3020.a.success: "Você atrai a atenção da multidão para o seu cavaleiro"
 contest_events.3020.a.failure: "A multidão não fica impressionada"
 contest_events.3020.b: "\"Você sabe como escolher, [enemy_competitor.GetFirstNameNoTooltip].\""
 contest_events.3020.c: "Vou encontrar [enemy_competitor.GetSheHe] depois da corrida para nos divertirmos."
 contest_events.3030.t: "$tournament_contest_header$ Como [ROOT.Char.GetFaith.CreatorName|U] [naked_peasant.GetHerHim] trouxe ao mundo"
 contest_events.3030.desc: "Enquanto os cavalos se preparam para a corrida, toda a multidão vibra e canta para seu corredor favorito. Até que soltam um suspiro coletivo e ficam completamente em silêncio. Um[naked_peasant.Custom('ES_XA')] [naked_peasant.GetWomanMan] despido[naked_peasant.Custom('ES_OA')] saiu correndo para a pista e está exibindo tudo o que [ROOT.Char.GetFaith.CreatorName|U] lhe deu, da cabeça aos pés.\n\nA multidão imediatamente começa a vaiar essa criatura impulsiva e a atirar tudo o que consegue pôr as mãos em"
 contest_events.3030.a: "Nojento! Guardas!"
 contest_events.3030.b: "Hah! Que espetáculo!"
 contest_events.3030.c: "Vou me juntar a [naked_peasant.GetSheHe]! Isso parece divertido!"
 contest_events.3030.d: "A nudez não é pecado!"
 contest_events.3030.a.success: "Você convence a multidão"
 contest_events.3030.a.failure: "A multidão não se comove"
 contest_events.3030.e: "Que os cavalos o pisoteiem."
 ### JOUST ###
 #BOUTS
 contest_events.0840.t: "Duelo [activity.GetCurrentPhase.GetPhase.GetName|l]"
 contest_events.0840.desc: "[versus_contestant.GetTitledFirstName] e eu lutamos!"
 contest_events.0840.a: "Habilidade"
 contest_events.0840.b: "Intriga"
 contest_events.0840.c: "Aprendizado"
 contest_events.0841.t: "Duelo [activity.GetCurrentPhase.GetPhase.GetName|l]: [activity.Custom('GetVersusRound')|l]"
 contest_events.0841.desc: "Depois que [versus_contestant.Custom('ES_ElLa')] [versus_contestant.GetTitledFirstName|l] e eu terminamos nossa última luta, prendo a respiração enquanto os pontos são contados…\n\n"
 contest_events.0841.winner: "Eu venci [versus_contestant.GetTitledFirstName|l]!"
 contest_events.0841.loser: "Os juízes logo anunciam que [versus_contestant.GetTitledFirstNameNoTooltip] me venceu!"
 contest_events.0841.qualify_win: "\n\nEstou classificado(a) para a semifinal do [activity.GetCurrentPhase.GetPhase.GetName|l]!"
 contest_events.0841.qualify: "\n\n[contest_winner.GetSheHe|U] chegou à semifinal da competição de [activity.GetCurrentPhase.GetPhase.GetName|l]!"
 contest_events.0841.semi_win: "\n\nEstou classificado(a) para a final do [activity.GetCurrentPhase.GetPhase.GetName|l]!"
 contest_events.0841.semi: "\n\n[contest_winner.GetSheHe|U] chegou à final da competição de [activity.GetCurrentPhase.GetPhase.GetName|l]!"
 contest_events.0841.final_win: "\n\nEu venci o concurso [activity.GetCurrentPhase.GetPhase.GetName|l]!"
 contest_events.0841.final: "\n\n[contest_winner.GetSheHe|U][activity.GetCurrentPhase.GetPhase.GetName|l]"
 contest_events.0841.a: "Lutamos bem."
 contest_events.0841.b: "Droga..."
 contest_events.0841.c: "[contest_winner.GetSheHe|U] trapaceou! Desqualificado(a)!"
 contest_events.0850.t: "$contest_events.0840.t$"
 contest_events.0850.desc: "$contest_events.0840.t$"
 contest_events.0850.a: "$contest_events.0840.t$"
 contest_events.0852.t: "$contest_events.0840.t$"
 contest_events.0852.desc: "Oh, quem ganhou?"
 contest_events.0852.a: "Ok"
 contest_events.0853.t: "$contest_events.0852.t$"
 contest_events.0853.desc: "$contest_events.0852.desc$"
 contest_events.0853.a: "$contest_events.0852.a$"
 contest_events.0910.t: "$tournament_contest_header$ Fora de Controle"
 contest_events.0910.melee: "Meu sangue ferve ao ver os cavaleiros de treino massacrarem seus oponentes, enquanto cada chance de glória me é roubada por um companheiro ou por uma retirada apressada.\n\nPor fim, [wrathful_victim.Custom('ES_ElLa')] [wrathful_victim.GetTitledFirstName|l] cai na lama aos meus pés, desequilibrad[wrathful_victim.Custom('ES_OA')] por um golpe ambicioso demais, com a espada fora de seu alcance.\n\n“Você quase acertou minha cabeça!”, rosno, encarando[wrathful_victim.GetHerHim]. É[wrathful_victim.Custom('ES_EA')] tola[wrathful_victim.Custom('ES_OA')] está à minha mercê."
 contest_events.0910.wrestling: "[wrathful_victim.Custom('ES_ElLa')|U] [wrathful_victim.GetTitledFirstName|l] e eu levamos o que parece uma eternidade rondando um ao outro, torrando sob o sol do meio-dia.\n\nCada vez que faço um movimento, [wrathful_victim.GetSheHe] se livra do meu agarrão no último momento, e estou prestes a perder a paciência.\n\nJusto quando estou prestes a investir contra es[wrathful_victim.Custom('ES_EA')] porc[wrathful_victim.Custom('ES_OA')], [wrathful_victim.Custom('ES_ElLa')] [wrathful_victim.GetTitledFirstName|l] tropeça, ficando completamente expost[wrathful_victim.Custom('ES_OA')] ao ataque."
 contest_events.0910.duel: "$contest_events.0910.melee$"
 contest_events.0910.a: "Vou te dar uma lição, seu miserável...!"
 contest_events.0910.b: "Levante-se, seu fraco!"
 contest_events.0911.t: "$contest_events.0910.t$"
 contest_events.0911.wrathful: "Deixo-me levar pela ira, golpeando brutalmente [wrathful_victim.GetFirstName] enquanto tenta suportar meus golpes.\n\n"
 contest_events.0911.melee: "O [activity.GetCurrentPhase.GetPhase.GetName|l] para de repente, quando todos os envolvidos ficam boquiabertos ao ver [wrathful_contestant.GetFirstName] derrubar [wrathful_victim.GetFirstName] ao chão com um rugido, espancando[wrathful_victim.GetHerHim] furiosamente.\n\n"
 contest_events.0911.wrestling: "Pouco depois de começar seu combate de [activity.GetCurrentPhase.GetPhase.GetName|l], [wrathful_contestant.Custom('ES_ElLa')] [wrathful_contestant.GetTitledFirstName|l] se exaspera com [wrathful_victim.Custom('ES_ElLa')] [wrathful_victim.GetTitledFirstName|l], perde completamente o controle de si mesm[wrathful_contestant.Custom('ES_OA')] e [wrathful_victim.GetHerHim] o derruba.\n\n"
 contest_events.0911.duel: "$contest_events.0911.melee$"
 contest_events.0911.dead: "Só quando sou afastado(a) e a névoa vermelha se dissipa, percebo que fui longe demais..."
 contest_events.0911.wound: "Quando me tiram de cima de [wrathful_victim.GetSheHe] , fica claro que ela/ele está sentindo muita dor."
 contest_events.0911.angry_host: "Isso é inaceitável!"
 contest_events.0911.host: "Isso é lamentável."
 contest_events.0911.a.dead: "Uma tragédia lamentável..."
 contest_events.0911.a.wound: "Você não vai esquecer isso tão cedo!"
 contest_events.0911.a: "Assim é a lei do mais forte."
 contest_events.0911.c.dead: "Uma resposta justa..."
 contest_events.0911.c: "Uau..."
 contest_events.0912.dead: "Quando finalmente afastam [wrathful_contestant.GetFirstNameNoTooltip] do caminho, já é tarde demais: [wrathful_victim.GetFirstNameNoTooltip] já está mort[wrathful_victim.Custom('ES_OA')]…"
 contest_events.0912.wound: "Quando afastam [wrathful_contestant.GetFirstNameNoTooltip] do(a) [wrathful_victim.GetSheHe], fica claro que está sentindo muita dor."
 contest_events.0912.b: "Esses excessos são inaceitáveis."
 contest_savagely_pummeled_log_title: "Esbofeteamento Brutal"
 contest_savagely_pummeled_log: "[CHARACTER.Custom('ES_ElLa')|U] [CHARACTER.GetTitledFirstName|l] espancou brutalmente [TARGET_CHARACTER.Custom('ES_AlAla')] [TARGET_CHARACTER.GetTitledFirstName|l]"
 contest_savagely_pummeled_death_log_title: "$contest_savagely_pummeled_log_title$"
 contest_savagely_pummeled_death_log: "[CHARACTER.Custom('ES_ElLa')|U] [CHARACTER.GetTitledFirstName|l] [CHARACTER.LocalPlayerString( 'apaleaste', 'apaleó' )] brutalmente [TARGET_CHARACTER.Custom('ES_AlAla')] [TARGET_CHARACTER.GetTitledFirstName|l] até matar[TARGET_CHARACTER.GetHerHim]"
 ### HORSE RACE ###
 #FALL
 contest_events.4500.t: "$tournament_contest_header$ Tombo Trágico"
 contest_events.4500.desc: "Quase dou pulos de alegria ao ver como meu [ROOT.Char.Custom('ContestHorseRaceGender')] de corrida #EMP [ROOT.Char.Custom('GetContestHorseRaceName')]#! se mantém no grupo da frente.\n\nQuando se aproximam do fim de mais uma volta, meu coração despenca quando meu [ROOT.Char.Custom('ContestHorseRaceGender')] e seu cavaleiro caem de repente, desaparecendo na poeira.\n\nQuando os outros passam, evitando por pouco o desastre, #EMP [ROOT.Char.Custom('GetContestHorseRaceName')]#! luta para ficar de pé — está claro que não pode continuar…"
 contest_events.4500.unskilled: "[ROOT.Char.Custom('GetContestHorseRaceName')] não é meu melhor [ROOT.Char.Custom('ContestHorseRaceGender')], mas essa vergonha manchará minha reputação como criador de cavalos de corrida…"
 contest_events.4500.sabotage: "Eu simplesmente não entendo! #EMP [ROOT.Char.Custom('GetContestHorseRaceName')]#! é um dos melhores cavalos por aí! A menos que... Eu olho desconfiado(a) para as arquibancadas..."
 contest_events.4500.a: "Maldição."
 contest_horse_race_crashed_out_log_title: "Queda na Corrida"
 contest_horse_race_crashed_out_log: "O cavalo de [CHARACTER.GetTitledFirstName], [CHARACTER.Custom('GetContestHorseRaceName')], caiu e se retirou da corrida"
 contest_events.4501.t: "$contest_events.1540.t$"
 contest_events.4501.desc: "[contestant.Custom('ES_ElLa')] [contestant.GetTitledFirstName|l] dá pulos de alegria ao ver como seu [contestant.Custom('ContestHorseRaceGender')] de corrida #EMP [contestant.Custom('GetContestHorseRaceName')]#! se mantém no grupo da frente.\n\nQuando se aproximam do fim de mais uma volta, sua [contestant.Custom('ContestHorseRaceGender')] e seu jinete caem de repente, desaparecendo na poeira! [contestant.GetFirstNameNoTooltip] está arrasad[contestant.Custom('ES_OA')].\n\nQuando os outros passam, evitando por pouco o desastre, #EMP [contestant.Custom('GetContestHorseRaceName')]#! luta para se levantar - está claro que não pode continuar…\n\n"
 contest_events.4501.unskilled: "A curto prazo, não acho que alguém aposte novamente em um cavalo [contestant.Custom('ES_DelDela')] [contestant.GetTitledFirstNameNoTooltip|l]…"
 contest_events.4501.sabotage: "A confusão [contestant.Custom('ES_DelDela')] [contestant.GetTitledFirstNameNoTooltip|l] é evidente. \"É que eu simplesmente não entendo! #EMP [contestant.Custom('GetContestHorseRaceName')]#! é um dos melhores cavalos da competição!\", grita, observando as arquibancadas com desconfiança."
 contest_events.4501.a: "Faz parte."
 #CHEER
 contest_events.4600.t: "$tournament_contest_header$ Encorajamento Enthusiástico"
 contest_events.4600.desc: "Eu observo os cavalos galopando diante das arquibancadas, absorvendo o cheiro de poeira levantada, o som da multidão gritando, o forte impacto de muitos cascos.\n\n"
 contest_events.4600.wager_entrant: "Embora eu tenha inscrito meu [ROOT.Char.Custom('ContestHorseRaceGender')] [ROOT.Char.Custom('GetContestHorseRaceName')], meu olhar está em #EMP [wager_owner.Custom('GetContestHorseRaceName')]#!, [wager_owner.Custom('ES_DelDela')] [wager_owner.GetTitledFirstName|l] e seu jóquei, pensando nas moedas que posso ganhar…"
 contest_events.4600.wager: "Estou seguindo atentamente [wager_owner.Custom('ES_AlAla')] [wager_owner.Custom('ContestHorseRaceGender')] [wager_owner.Custom('ES_DelDela')] [wager_owner.GetTitledFirstName|l], #EMP [wager_owner.Custom('GetContestHorseRaceName')]#!, e seu cavaleiro, e sonho com as moedas que posso ganhar…"
 contest_events.4600.entrant: "Meu [ROOT.Char.Custom('ContestHorseRaceGender')], #EMP [ROOT.Char.Custom('GetContestHorseRaceName')]#! mantém o ritmo à medida que as voltas avançam, seu cavaleiro competindo bem com os outros."
 contest_events.4600.a: "Corra! Corra, sua égua velha!"
 contest_events.4600.b: "Vamos lá, #EMP [ROOT.Char.Custom('GetContestHorseRaceName')]#!"
 contest_events.4600.b.wager: "Vamos lá, #EMP [ROOT.Char.Custom('GetContestHorseRaceName')]#!"
 contest_events.4600.c: "Com calma..."
 ### RECITAL ###
 contest_events.5000.t: "Um Recital Ruidoso"
 contest_events.5000.desc: "[enemy.GetFirstName] me lança um sorriso arrogante ao subir ao estrado, e não demoro a descobrir o porquê. A primeira linha é um grave insulto a mim, e o resto segue pelo mesmo caminho!\n\nO som dos aplausos e vaias da multidão enche meus ouvidos. Não tenho escolha a não ser me vingar contra sua honra com meu próprio poema! O verso de abertura é de suma importância.\n\n#POE “É verdade que [enemy.GetFirstName] rima como ninguém…"
 contest_events.5000.shagged_your_mum: "#POE ...eu deitei com a mãe dele!"
 contest_events.5000.shagged_your_dad: "#POE eu dormi com o pai dele!\""
 contest_events.5000.licentious: "#POE conhece muito pouco da arte do leito\"."
 contest_events.5000.stupid: "#POE em sua cabeça não caberia algo mais obtuso\"."
 contest_events.5000.ugly: "#POE não há quem elogie seu rosto\"."
 contest_events.5000.success: "Seu verso conquista a multidão"
 contest_events.5000.failure: "Seu verso é ineficaz"
 contest_events.5010.t: "Perdido na Tradução"
 contest_events.5010.desc: "[enemy.GetFirstName] me encara intensamente, com o pergaminho e a pena ainda na mão. Ele respira fundo e começa a despejar um monte de bobagens que não tenho a menor esperança de entender.\n\nEstá claro que, seja lá o que estiver dizendo, isso significa muito para [enemy.GetSheHe], pois continua me encarando fixamente, enquanto alguns membros da multidão silenciosa soltam exclamações e sussurram, sem dúvida traduzindo os versos para seus amigos."
 contest_events.5010.a: "Retaliar com um insulto!"
 contest_events.5010.b: "Devo tentar entender."
 contest_events.5020.t: "Um Verso Virtuoso"
 contest_events.5020.desc: "A multidão grita e vibra quando termino meu último recital, uma peça destinada a atingir a honra de [enemy.GetFirstName] e mostrar a todos o quão superior é realmente meu engenho! Não há dúvidas na mente de ninguém sobre quem é [Select_CString( ROOT.Char.IsFemale, 'a clara vencedora', 'o claro vencedor' )], mas na pura euforia do momento, sinto o impulso de presentear meu público adorador com um novo poema."
 contest_events.5020.a: "Mais um verso não faria mal!"
 contest_events.5020.b: "Devo fazer uma reverência e partir."
 contest_events.5030.t: "Um Lamento Lamentável"
 contest_events.5030.desc: "Solto um suspiro triunfante ao concluir o último verso do meu recital. Me preparo para o aplauso ensurdecedor da plateia, apenas para encontrar os terrenos do torneio silenciosos, exceto pelo vento sussurrando entre as árvores.\n\nIsso é um desastre, mas talvez essa situação possa ser corrigida com um novo poema composto e recitado no momento."
 contest_events.5030.a: "\"Eu tenho mais um!\""
 contest_events.5030.b: "Admita a derrota."
 ### BOARD GAME ###
 contest_events.5500.t: "$tournament_contest_header$ Distração Ardilosa"
 contest_events.5500.desc: "O silêncio é ensurdecedor: [versus_contestant.Custom('ES_ElLa')] [versus_contestant.GetTitledFirstName|l] vem refletindo sobre seu próximo movimento há o que parece uma eternidade, com os olhos fixos no tabuleiro de [activity.Custom('ContestBoardGameType')] sob sobrancelhas franzidas.\n\nEstá claro que quer vencer.\n\nAssim que a ideia de distrair [versus_contestant.GetHerHim] surge na minha cabeça, é difícil afastá-la..."
 contest_events.5500.a: "Sinto uma coceira chegando..."
 contest_events.5500.b: "Se ao menos eu pudesse me livrar dessa maldita tosse..."
 contest_events.5500.success: "[versus_contestant.GetFirstNameNoTooltip] tem dificuldade em se concentrar"
 contest_events.5500.mixed: "Você está um pouco exagerado"
 contest_events.5500.failure: "Você quase se engasga"
 contest_events.5500.nothing: "[versus_contestant.GetFirstNameNoTooltip] não se importa"
 contest_events.5500.c: "Ah, como era mesmo aquela melodia de menestrel?"
 contest_events.5500.d: "Truques baratos estão abaixo de mim."
 contest_events.5510.t: "$tournament_contest_header$ A Birra na Mesa"
 contest_events.5510.desc: "A mesa vira com um #EMP golpe#! tremendo e as peças de [activity.Custom('ContestBoardGameType')|l] saem voando.\n\nO humor de [versus_contestant.GetFirstName] mudou repentinamente há várias jogadas, quando [versus_contestant.GetSheHe] percebeu que um simples erro praticamente havia decidido a partida a meu favor.\n\n\"Sim, sim, você venceu, [ROOT.Char.GetTitledFirstName]!\", [versus_contestant.GetSheHe] choraminga, \"#EMP Feliz?!#!\""
 contest_events.5510.a: "Pegue-as! Eu preciso fazer minha última jogada!"
 contest_events.5510.b: "Esse comportamento antiesportivo é inaceitável!"
 contest_events.5510.c: "Vamos voltar algumas jogadas."
 contest_events.5510.d: "Sabe, você poderia ter simplesmente admitido a derrota..."
 contest_events.5520.t: "O gámbito [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip]"
 contest_events.5520.desc: "Contemplando calmamente o tabuleiro de [activity.Custom('ContestBoardGameType')|l] enquanto [versus_contestant.GetFirstName] reflete sobre seu próximo movimento, eu o vejo de repente.\n\nDistraíd[GetPlayer.Custom('ES_OA')] em minha estratégia ociosa, deixei passar uma abertura que me daria uma clara vantagem, desde que meu oponente não a tenha antecipado.\n\nEvito conscientemente fazer qualquer sinal externo de reconhecimento para não chamar atenção, enquanto examino os olhos de [versus_contestant.GetFirstName] para ver se percebeu ou se está armando uma armadilha…"
 contest_events.5520.a: "$tournament_contest_header$ Suavemente, suavemente..."
 contest_events.5520.a.success: "A manobra é um golpe de mestre"
 contest_events.5520.a.failure: "A manobra dá errado"
 contest_events.5520.b: "Eu diria que você está bastante expost[versus_contestant.Custom('ES_OA')], não é?"
 contest_events.5520.c: "É uma artimanha, minha estratégia atual está correta."
 contest_events.5530.t: "Destreza das Mãos"
 contest_events.5530.desc: "A partida de [activity.Custom('ContestBoardGameType')|l] parece estar indo perfeitamente. Estou pensando três, quatro, talvez até cinco jogadas à frente do meu oponente quando, de repente, [versus_contestant.GetFirstName] faz uma jogada que faz minha estratégia intrincada derreter como um floco de neve na chama de uma vela.\n\nFiquei completamente sem opções; se não fizer alguma loucura, certamente perderei a partida!"
 contest_events.5530.a: "Uma peça extra passaria despercebida..."
 contest_events.5530.a.success: "Você trapaceia com sucesso e vence"
 contest_events.5530.a.failure: "Sua decepção é percebida"
 contest_events.5530.b: "\"Na verdade, existe essa regra obscura...\""
 contest_events.5530.c: "Eu não vou trapacear!"
 contest_events.5540.t: "$tournament_contest_header$ Força em Vez de Estratégia"
 contest_events.5540.desc: "Parece que minha grande estratégia está desmoronando, e [versus_contestant.GetFirstName] está ganhando terreno rapidamente. Se isso fosse uma questão de guerra, eu consideraria uma rendição misericordiosa. Sinto minhas entranhas ferverem de raiva, e fecho os punhos com tanta força que parecem prontos para sangrar.\n\nEnquanto [versus_contestant.GetSheHe] se estica para pegar sua peça, seus olhos convencidos encontram os meus, e seu rosto se desfaz em uma expressão de choque e temor.\n\nTalvez eu possa aproveitar este momento para intimidar [versus_contestant.GetHerHim] a não fazer seu próximo movimento."
 contest_events.5540.a: "\"Toque nessa peça e eu quebrarei seus dedos.\""
 contest_events.5540.a.success: "Seu oponente desiste da partida"
 contest_events.5540.a.failure: "Seu oponente não se abala"
 contest_events.5540.b: "Eu não irei desonrar a mim mesmo."
 contest_events.5550.t: "$tournament_contest_header$ Regras de [versus_contestant.GetCulture.GetNameNoTooltip]!"
 contest_events.5550.desc: "Observo atentamente a partida de [activity.Custom('ContestBoardGameType')|l] enquanto meu oponente se prepara para fazer seu próximo movimento. Para minha surpresa, [versus_contestant.GetFirstName] pega sua peça e… quebra as regras bem diante de mim!\n\n\"Que tipo de trapaça é esta?\", protesto.\n\n\"Ah, perdoe-me\", meu oponente apoia as mãos sobre a mesa com arrogância. \"Eu tinha a impressão de que estávamos jogando pelas regras da versão [versus_contestant.GetCulture.GetName]\"."
 contest_events.5550.a: "Juiz!"
 contest_events.5550.a.success: "O juiz decide pelas regras de [ROOT.Char.GetCulture.GetName]"
 contest_events.5550.a.failure: "O juiz decide pelas regras de [versus_contestant.GetCulture.GetName]"
 contest_events.5550.b: "\"Rogo-vos, ensine-me essas regras de [versus_contestant.GetCulture.GetNameNoTooltip].\""
 contest_events.5550.c: "Talvez algumas moedas convençam o juiz a ficar ao meu lado."
 cultural_acceptance_board_game: "Aceitação cultural do jogo de tabuleiro do torneio"
 contest_events.5560.t: "$tournament_contest_header$ O Mestre das Marionetes"
 contest_events.5560.desc: "Minha partida contra [versus_contestant.GetName] vai muito mal. [versus_contestant.GetSheHe|U] joga em um nível que eu não teria acreditado ser possível.\n\nPercebo que seus olhos não param de se desviar para a multidão, e parece estar olhando diretamente para uma figura que está quase bem atrás de mim! Ela está fazendo gestos sutis com as mãos e movendo os lábios, sem dúvida dando instruções a [versus_contestant.GetFirstNameNoTooltip]."
 contest_events.5560.a: "\"Juiz! [versus_contestant.GetFirstNameNoTooltip|U] está trapaceando!\""
 contest_events.5560.a.success: "O juiz acredita em você"
 contest_events.5560.a.failure: "O juiz não acredita em você"
 contest_events.5560.b: "Meus movimentos devem se tornar imprevisíveis."
 contest_events.5560.b.success: "Você confunde [versus_contestant.GetFirstNameNoTooltip]"
 contest_events.5560.b.failure: "[versus_contestant.GetFirstNameNoTooltip] supera você"
 contest_events.5560.c: "Vou apenas focar no jogo."
 contest_events.5560.c.success: "Você supera [versus_contestant.GetFirstNameNoTooltip]"
 contest_events.5570.t: "$tournament_contest_header$ Uma Manobra Astuta"
 contest_events.5570.desc: "Estou totalmente concentrado no tabuleiro de xadrez, e todo o público também aguarda em silêncio, ansioso. De repente, com um forte estrondo de metal, a atenção de toda a plateia se volta para o tolo escudeiro que acabou de derrubar no chão um conjunto de armas e armaduras.\n\nNinguém está olhando para o tabuleiro; agora é minha chance de virar o jogo mexendo nas peças!"
 contest_events.5570.a: "Trocar algumas peças de lugar."
 contest_events.5570.a.success: "Você não é notado"
 contest_events.5570.a.failure: "Você é pego trapaceando"
 contest_events.5570.b: "Entrar em pânico e comer uma peça!"
 contest_events.5570.c: "Não vou desonrar a mim mesmo trapaceando."
