l_spanish:
 #HORSE RACES
 jason_race_events.1.t: "A Vontade da Multidão"
 jason_race_events.1.desc: "Do vasto mar de espectadores da corrida, plebeus gritam. Guerreiros itinerantes entoam insultos e insinuações vulgares. Entre eles, nós, nobres, rimos nervosamente. Olhamos para nossos guardas."
 jason_race_events.1.desc.guest_local_anger: "

"

A emoção das corridas sempre atrai o que há de pior no reino, em grandes números, e os incita com promessas de bebedeira e jogo. 

Às vezes, em dias funestos, os prazeres habituais simplesmente não bastam: só o sangue pode saciá-los.". Quem brada mais alto são os locais: em [ROOT.Char.GetCurrentLocation.GetName], [host.GetFirstNameNoTooltip] está entre pessoas que desprezam [host.GetHerHim].

Ao lançar um olhar sobre a multidão, avisto pedras, facas e armas de guerra."
 jason_race_events.1.desc.host_local_anger: "

"A competição continua sem interrupções". Quem brada mais alto são os locais: em [ROOT.Char.GetCurrentLocation.GetName], estou cercado por pessoas que me desprezam.

Ao fitar a multidão, vejo pedras, facas e armas de guerra."
 jason_race_events.1.desc.rowdy_fans: "

A emoção das corridas sempre atrai o que há de pior no reino, em grandes números, e os incita com promessas de bebedeira e jogo. 

Às vezes, em dias funestos, os prazeres habituais simplesmente não bastam: só o sangue pode saciá-los."
 jason_race_events.1.desc.end: "

Isto está prestes a virar um motim."
 jason_race_events.1.a: "A agitação é contida"
 jason_race_events.1.a.tt: "A violência da multidão se espalha pela região"
 jason_race_events.1.a.tt.win: "Você e sua comitiva se retiram em segurança."
 jason_race_events.1.a.tt.race: "Muitos participantes do $activity_tournament$ estão [GetTrait('wounded_1').GetName( GetNullCharacter )|l]"
 jason_race_events.1.a.tt.lose: "Muitos outros participantes do $activity_tournament$ estão [GetTrait('wounded_1').GetName( GetNullCharacter )|l]"
 jason_race_events.1.b: "Uma Curva em Alta Velocidade"
 jason_race_events.1.b.tt: "Os cavalos disparam pela pista, seus corpos em disparada cobertos por nuvens de poeira. Os gritos e xingamentos de seus jóqueis ficam inaudíveis entre o trotar dos cascos e o rugido da multidão.

Ainda assim, dá para notar que seu cavaleiro [jockey.GetFirstName] está totalmente concentrado em uma curva que se aproxima rapidamente. Enquanto os outros reduzem a velocidade para fazer a curva com firmeza, seu cavaleiro estimula o cavalo com força.

Com apenas a espessura de um dedo de folga, [jockey.GetFirstNameNoTooltip] e #EMP [ROOT.Char.Custom('GetContestHorseRaceName')]#! passam entre os que iam à frente. Uma manobra incrível - a multidão prende a respiração em uníssono!"
 jason_race_events.1.c: "Tal habilidade pertence ao campo de batalha!"
 jason_race_events.1.c.tt: "Minha cavalaria deveria ser treinada para cavalgar com a mesma audácia."
 jason_race_events.1.c.tt.win: "Minha comitiva poderia usar um novo batedor..."
 jason_race_events.1.c.tt.lose: "Um cavaleiro tão destemido deveria ir à nossa frente em todas as jornadas."
 jason_race_events.1.c.tt.lose_knights: "Um momento digno de mil histórias!"
 jason_race_events.1.d: "Vencendo ou perdendo, os corredores de mais ninguém causam uma impressão como os meus."
 jason_race_events.1.d.tt: "Quem sabe? Talvez tudo acabe bem."
 jason_race_events.1.d.tt.win: "A agitação é contida"
 jason_race_events.1.d.tt.lose: "A violência da multidão se espalha pela região"
 jason_race_events.1.d.tt.leave: "Você e sua comitiva se retiram em segurança."
 contest_wound_attendees_effect: "Muitos participantes do $activity_tournament$ estão [GetTrait('wounded_1').GetName( GetNullCharacter )|l]"
 contest_wound_non_root_attendees_effect: "Muitos outros participantes do $activity_tournament$ estão [GetTrait('wounded_1').GetName( GetNullCharacter )|l]"
