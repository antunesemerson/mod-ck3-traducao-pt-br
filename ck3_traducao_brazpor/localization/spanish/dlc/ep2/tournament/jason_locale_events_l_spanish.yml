l_spanish:
 #LOCALE EVENTS
 #VISITOR'S CAMP
 jason_locale_events.100.t: "[unreliable_knight.Custom('ES_ElLa')|U] que rejeita a luta"
 jason_locale_events.100.desc: "As ausências recentes do meu $knight_culture_player_no_tooltip_lowercase$, [unreliable_knight.Custom('ES_ElLa')] [unreliable_knight.GetTitledFirstName|l], não passaram despercebidas, nem os muitos servos que foram rejeitados à sua porta. A pedido do organizador do torneio, entro em seus aposentos.\n\n"
 jason_locale_events.100.desc.mess: "Derramadas bebidas mancham um chão cheio de iguarias roídas, objetos efêmeros estranhos e móveis revirados.\n\n"
 jason_locale_events.100.desc.self_harm: "Uma meia-luz sombria paira sobre um chão repleto de roupas rasgadas, objetos quebrados,"
 jason_locale_events.100.desc.smug: "[unreliable_knight.GetTitledFirstNameNoTooltip] me reconhece com uma reverência escassa, girando sua espada brilhante repetidamente em suas mãos.\n\n"
 jason_locale_events.100.desc.insanity: "penas, fezes e sangue.\n\nUma mão decepada repousa aos pés [unreliable_knight.Custom('ES_DelDela')] [unreliable_knight.GetTitledFirstNameNoTooltip|l]. De quem é? Não sei. Ele gesticula com ambas as mãos, resmungando sem parar:\n\n\"Mais mãos aparecerão, meu [ROOT.Char.GetTitleTierName], mais mãos. Vocês veem? Se eu participar dos torneios, aparecerão mais malditas mãos\"."
 jason_locale_events.100.desc.drunk: "Seu $knight_culture_player_no_tooltip_lowercase$está escandalosamente bêbado[unreliable_knight.Custom('ES_OA')]; continua virando mais vinho e se contorce diante de seu evidente autodesprezo. [Select_CString( unreliable_knight.IsFemale, 'Esta borrachina', 'Este borrachín')]ficará[unreliable_knight.Custom('ES_OA')] uma ruína pela manhã.\n\n\"Tenho, tenho #EMP –*hip*–#! que cavalgar, lutar ou seja lá o que era?\"."
 jason_locale_events.100.desc.hash: "Seu $knight_culture_player_no_tooltip_lowercase$ está visivelmente confuso, com o hálito cheirando a haxixe. A pele está pegajosa de suor, tem [unreliable_knight.Custom('EyeEyes')] semiabertos, solta uma risadinha e babando faz uma pergunta:\n\n\"Eu, uh, devo estar fazendo alguma coisa... nas próximas horinhas?\""
 jason_locale_events.100.desc.depressed: "o sangue de um $knight_culture_player_no_tooltip_lowercase$.\n\nAs lágrimas ficam vermelhas nas bochechas [unreliable_knight.Custom('ES_DelDela')] [unreliable_knight.GetTitledFirstNameNoTooltip|l].\n\n\"Não consigo sair aí\", soluça seu $knight_culture_player_no_tooltip_lowercase$. \"Não consigo enfrentá-los. Outra vez não, agora não. Por favor, meu [ROOT.Char.GetTitleTierName], #EMP por favor…#!, me poupe do fragor do torneio?\""
 jason_locale_events.100.desc.demand: "\"Todo o mundo sabe o quão grande e dign[unreliable_knight.Custom('ES_OA')] $knight_culture_player_no_tooltip_lowercase$ sou\", rosna [unreliable_knight.GetSheHe]. \"E, portanto, sem assistentes de alta linhagem nem grandes presentes de meu [ROOT.Char.GetLadyLord], devo #EMP negarme#! a competir\".\n\n\"Participar dos torneios na pobreza nos desonraria a ambos\"."
 jason_locale_events.100.a: "Você me deve seu serviço, lembra-se?"
 jason_locale_events.100.a.tt: "Talvez [unreliable_knight.GetSheHe] não esteja preparad[unreliable_knight.Custom('ES_OA')] para dar o seu melhor, mas est[unreliable_knight.Custom('ES_EA')] $knight_culture_player_no_tooltip_lowercase$ se #EMP inclinará#! diante da sua autoridade."
 jason_locale_events.100.b: "Participe! Eu lhe darei qualquer coisa!"
 jason_locale_events.100.b.tt: "E cuide dos meus melhores $knight_culture_player_plural_no_tooltip_lowercase$, eu juro!"
 jason_locale_events.100.c.mad: "Seu juramento está anulado, maníaco[unreliable_knight.Custom('ES_OA')]! Vá embora!"
 jason_locale_events.100.c.drunk: "Seu juramento est? perdido, b?bad[unreliable_knight.Custom('ES_OA')]! V? embora!"
 jason_locale_events.100.c.hash: "Seu juramento está invalidado, cretino[unreliable_knight.Custom('ES_OA')]! Fora daqui!"
 jason_locale_events.100.c.depressed: "Você não é mais um $knight_culture_player_no_tooltip_lowercase$ meu."
 jason_locale_events.100.c.demanding: "Seu juramento está anulado, falastrão[unreliable_knight.Custom('ES_AnAna')]! Fora daqui!"
 jason_locale_events.100.c.tt: "Despeça este inapropriado $knight_culture_player_no_tooltip_lowercase$ de seu serviço!"
 jason_locale_events.100.c.forbid_knight: "[unreliable_knight.GetShortUIName] está proibido de ser seu $knight_culture_player_no_tooltip_lowercase$"
 jason_locale_events.100.d: "Talvez você deva apenas... descansar."
 jason_locale_events.100.d.not_competing: "[unreliable_knight.GetShortUIName] não competirá nem ajudará em competições em equipe"
 knight_not_participating_log_title: "Retentor se Retira"
 knight_not_participating_log: "[TARGET_CHARACTER.Custom('ES_ElLa')|U] [TARGET_CHARACTER.GetTitledFirstName|l], guerreir[TARGET_CHARACTER.Custom('ES_OA')] [CHARACTER.Custom('ES_DelDela')] [CHARACTER.GetTitledFirstName|l], se retirou do torneio. Os rumores se espalham."
 knight_dismissed_log_title: "Retentor Demitido"
 knight_dismissed_log: "[CHARACTER.Custom('ES_ElLa')|U] [CHARACTER.GetTitledFirstName|l] dispensou [TARGET_CHARACTER.Custom('ES_AlAla')]o célebre competidor[TARGET_CHARACTER.Custom('ES_XA')], [TARGET_CHARACTER.Custom('ES_ElLa')] [TARGET_CHARACTER.GetTitledFirstName|l], de seu serviço após um incidente misterioso."
 jason_locale_events.210.t.camel_cavalry: "Mestres do Deserto"
 jason_locale_events.210.t.elephant_cavalry: "Cuidadores em Formação"
 jason_locale_events.210.t.horse_archer: "O Disparo de Despedida"
 jason_locale_events.210.t.heavy_cavalry: "Como um Trovão"
 jason_locale_events.210.t.crossbowmen: "Um Arco, Cruzado"
 jason_locale_events.210.t.heavy_infantry: "Permaneça, Inabalável"
 jason_locale_events.210.desc: "$knight_culture_player_plural_no_tooltip$ imitam os atos de guerra e os rivais amigáveis se pavoneiam, enquanto os intérpretes riem com o seu trabalho.\n\n\"Vocês [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip] têm as suas habilidades,\" admite [foreign_lord.GetName],"
 jason_locale_events.210.desc.teen: "$knight_culture_player_plural_no_tooltip$ imita os atos de guerra e os rivais amigáveis se exibem, enquanto os intérpretes riem enquanto trabalham.\n\n\"Vocês, os [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip], bem, vocês não estão mal\", resmunga [foreign_lord.GetName],"
 jason_locale_events.210.desc.camel_cavalry: "\"Mas vos careceis da vontade necessária para domar um camelo! E até vossos traseiros suínos jamais caberiam em uma de nossas selas!\".\n\nOs cavalariços próximos agarram as rédeas dos camelos: o desafio [foreign_lord.Custom('ES_DelDela')] [foreign_lord.GetTitleTierName] está falando sério. Embora os [foreign_lord.GetCulture.GetCollectiveNounNoTooltip] aterrorizem os cavalos e governem desertos e terras áridas montados em suas bestas…, o fedor dos camelos é realmente repugnante."
 jason_locale_events.210.desc.elephant_cavalry: "\"mas tem a raça [ROOT.Char.GetCulture.GetNameNoTooltip] algum guerreiro com coragem para se postar sobre um elefante em batalha — manejar lança e arco enquanto aquela grande tromba ecoa em fúria?\".\n\nAs presas douradas de um elefante brilham nas proximidades; a howdah sobre seu dorso range lá no alto. [foreign_lord.Custom('ES_ElLa')|U] [foreign_lord.GetTitleTierName] apresenta um desafio vasto e imprevisível."
 jason_locale_events.210.desc.horse_archer: "\"mas algum de vocês consegue girar na sela, cavalgando a toda velocidade, e lançar uma flecha por cima da cauda do cavalo? Vocês conseguem cronometrar isso entre os batidas dos cascos? O menor filho da cultura [foreign_lord.GetCulture.GetNameNoTooltip] pode fazer isso\".\n\nVejo meus [ROOT.Char.Custom('KnightCulturePluralNoTooltip')|l] puxando os arcos de chifre, afagando pôneis das estepes. Somos bons cavaleiros…, mas nos comparamos a um povo nascido em suas selas…?"
 jason_locale_events.210.desc.heavy_cavalry: "mas quem entre vocês já investiu contra uma linha inimiga, sem se importar com armas, esmagando tudo sob o cavalo e acertando em cheio com sua lança? Experimentem meu cavalo de guerra: vamos ver se conseguem derrubar até o pior cavaleiro da hoste [foreign_lord.GetCulture.GetNameNoTooltip].\n\nMeu povo não usa os arreios necessários para cavalgar com uma lança pesada na batalha: esse não é o nosso jeito. Ainda assim, posso tolerar tamanha bravata...?"
 jason_locale_events.210.desc.crossbowmen: "“mas vocês já #EMP visto#! ao menos viram uma dessas? Conseguiriam carregar uma e apontar?”.\n\n[foreign_lord.Custom('ES_ElLa')|U] [foreign_lord.GetTitleTierName] me entrega uma arma que, de fato, eu já tinha visto… de longe. É um arco forte colocado de lado na extremidade de um canal para flechas: os [foreign_lord.GetCulture.GetCollectiveNounNoTooltip] a usam para perfurar armaduras. Qualquer armadura."
 jason_locale_events.210.desc.heavy_infantry: "sim, vocês podem avançar e recuar! Mas e quanto a se manter firme contra um dos meus guerreiros, sobrecarregado pelo nosso pesado equipamento, até que o inimigo se parta contra você?\n\nMeus [ROOT.Char.Custom('KnightCulturePluralNoTooltip')|l] lutam dentro de uma impressionante armadura [foreign_lord.GetCulture.GetNameNoTooltip], erguem armas [foreign_lord.GetCulture.GetNameNoTooltip]s, e me admiro com seu peso. Suportar um duelo tão estranho… exigiria uma coragem impressionante."
 jason_locale_events.210.a: "Vou tentar!"
 jason_locale_events.210.b: "[root_culture_knight.Custom('ES_ElLa')|U] [root_culture_knight.GetTitledFirstNameNoTooltip|l] é a personificação da habilidade [ROOT.Char.GetCulture.GetNameNoTooltip]."
 jason_locale_events.210.b.same_heritage: "[root_culture_knight.Custom('ES_ElLa')|U] [root_culture_knight.GetTitledFirstName|l] é a personificação da habilidade [ROOT.Char.GetCulture.GetHeritage.GetNameNoTooltip] personificada"
 jason_locale_events.210.a.win: "Você representa nobremente o [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip]"
 jason_locale_events.210.a.lose: "Sua desajeitada e delicada performance convida piadas alegres"
 jason_locale_events.210.b.tt: "[root_culture_knight.GetSheHe|U] é igual a qualquer feito, não importa o quão desconhecido!"
 jason_locale_events.210.b.win: "[root_culture_knight.GetFirstNameNoTooltip] está à altura da expertise [foreign_lord.GetCulture.GetNameNoTooltip]"
 jason_locale_events.210.b.lose: "As tentativas de [root_culture_knight.GetFirstNameNoTooltip] são… bastante tristes"
 jason_locale_events.210.c: "Você poderia ceder alguns [foreign_lord.Custom('KnightCultureNoTooltip')|l] para nos ensinar?"
 jason_locale_events.210.c.tt: "Algum talento estrangeiro poderia beneficiar meus [ROOT.Char.Custom('KnightCulturePluralNoTooltip')|l] e homens de armas."
 jason_locale_events.210.d.camel_cavalry: "Nós, [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip], não precisamos de animais toscos!"
 jason_locale_events.210.d.tt.camel_cavalry: "Eu juro que vocês, [foreign_lord.GetCulture.GetCollectiveNounNoTooltip], prefeririam saborear o cuspe de camelo do que lutar contra nossas bravas tropas!"
 jason_locale_events.210.d.elephant_cavalry: "Nós, [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip], já somos altos o suficiente!"
 jason_locale_events.210.d.tt.elephant_cavalry: "Os tolos [foreign_lord.GetCulture.GetNameNoTooltip] correm o risco de serem pisoteados por seus próprios behemoths a qualquer momento! #EMP Nós corremos o risco de conquistar a glória!#!"
 jason_locale_events.210.d.horse_archer: "Nós, [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip], enfrentamos nossos inimigos!"
 jason_locale_events.210.d.tt.horse_archer: "Deixem os [foreign_lord.GetCulture.GetCollectiveNounNoTooltip] sem honra cavalgarem em círculos! Como devem invejar seus cavalos suas esposas e maridos..."
 jason_locale_events.210.d.heavy_cavalry: "Nós, [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip], atacamos com força suficiente!"
 jason_locale_events.210.d.tt.heavy_cavalry: "Não temos necessidade de colidir sem pensar!"
 jason_locale_events.210.d.crossbowmen: "Nós, [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip], não precisamos de engenhocas!"
 jason_locale_events.210.d.tt.crossbowmen: "Como covardes, os [foreign_lord.GetCulture.GetCollectiveNounNoTooltip] abatem os mais nobres guerreiros de longe. Mas nós, nunca faremos isso."
 jason_locale_events.210.d.heavy_infantry: "Nós, [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip], podemos nos defender!"
 jason_locale_events.210.d.tt.heavy_infantry: "Armadura? De que precisamos quando temos habilidade? Os [foreign_lord.GetCulture.GetCollectiveNounNoTooltip] são pesados como pedras: nós os enterraremos sob a terra."
 cultural_acceptance_knightly_camaraderie: "Troca de práticas marciais"
 cultural_acceptance_knightly_rivalry: "Inimizade entre guerreiros de torneio"
 tournament_open_minded_warrior_modifier: "Guerreiro de Mente Aberta"
 tournament_open_minded_warrior_modifier_desc: "Este personagem demonstra um grande interesse pelos caminhos marciais de outros povos."
 tournament_knight_humiliated_modifier: "O Melhor Cavaleiro Humilhado"
 tournament_knight_humiliated_modifier_desc: "Desafiantes estrangeiros envergonharam o cavaleiro eminente deste personagem: seus guerreiros são considerados motivo de riso."
 tournament_loyalty_martial_traditions_modifier: "Lealdade às Tradições Marciais"
 tournament_loyalty_martial_traditions_modifier_desc: "Este personagem defende veementemente a superioridade de suas formas nativas de guerra."
 #TAVERN
 jason_locale_events.200.t: "Lealdade, Arrotada"
 jason_locale_events.200.desc: "“Até o último grama da minha honra pertence a você!”, diz [drunk_knight.GetFullName] aos tropeços, babando.\n\nOs servos tentam conter[drunk_knight.GetHerHim], seus amigos oferecem desculpas. [drunk_knight.Custom('ES_ElLa')|U] $knight_culture_player_no_tooltip_lowercase$ bêbado[drunk_knight.Custom('ES_OA')] os afasta.\n\n“Soltem-me! Malditos sejam todos vocês! [ROOT.Char.GetTitleTierName], livrai-me do meu patético [drunk_knight_liege.GetLadyLord]! Meu juramento é vosso. Vós me aceitais?”.\n\nA risada me prende na garganta. Pois [drunk_knight.GetFirstNameNoTooltip] é um[drunk_knight.Custom('ES_XA')] $knight_culture_player_no_tooltip_lowercase$ de grande fama, a cuj[drunk_knight_liege.Custom('ES_OA')] [drunk_knight_liege.GetLadyLord], [drunk_knight_liege.GetTitledFirstName|l], concedeu grandes honras."
 jason_locale_events.200.desc.caution: "Essas tolices nascidas do vinho poderiam me render um[drunk_knight.Custom('ES_XA')] grande guerreir[drunk_knight.Custom('ES_OA')] e um[drunk_knight_liege.Custom('ES_XA')] inimig[drunk_knight_liege.Custom('ES_OA')] vingativ[drunk_knight_liege.Custom('ES_OA')]."
 jason_locale_events.200.desc.party: "E claro, sua derrota desagradaria [drunk_knight_liege.Custom('ES_AlAla')] [drunk_knight_liege.GetTitleTierName]… mas acho que percebo um deboche histórico #EMP histórica#!…"
 jason_locale_events.200.a: "Prove-se, $knight_culture_player_no_tooltip_lowercase$! #EMP Beba!#!"
 jason_locale_events.200.a.tt: "[drunk_knight.Custom('ES_ElLa')|U] embriagad[drunk_knight.Custom('ES_OA')] [drunk_knight.GetFirstNameNoTooltip] tentará provar seu valor… Como? Só a bebida sabe."
 jason_locale_events.200.a.tt.join: "[drunk_knight.GetFirstNameNoTooltip] se torna seu $knight_culture_player_no_tooltip_lowercase$, provocando a ira de [drunk_knight_liege.GetShortUIName]"
 jason_locale_events.200.a.tt.recruit: "\"O [ROOT.Char.GetTitleTierName] convoca, $knight_culture_player_plural_no_tooltip_lowercase$! Você responderá?\""
 jason_locale_events.200.a.tt.recruit_desc: "Mais $knight_culture_player_plural_no_tooltip_lowercase$ embriagados são juramentados a você"
 jason_locale_events.200.a.tt.join_three: "[drunk_knight.GetShortUIName] se torna seu $knight_culture_player_no_tooltip_lowercase$"
 jason_locale_events.200.a.tt.recruit_lieges: "Os suseranos dos seus novos cortesãos estão enfurecidos, especialmente [drunk_knight_liege.GetShortUIName]"
 jason_locale_events.200.a.tt.recruit_specific: "[extra_knight.GetFirstNameNoTooltip] e [extra_knight_2.GetFirstNameNoTooltip] são juramentados a você"
 jason_locale_events.200.a.tt.song: "Venham todos! Cantarei a história de [ROOT.Char.Custom('ES_DelDela')] grande [ROOT.Char.GetTitledFirstNameNoTooltip|l]!"
 jason_locale_events.200.a.tt.song_specific: "O apaixonado cantar modulado de [drunk_knight.GetFirstNameNoTooltip] anuncia seu juramento a você"
 jason_locale_events.200.a.tt.beatings: "\"Quer me ver lutar, não é?\""
 jason_locale_events.200.a.tt.beatings_specific: "[drunk_knight.GetFirstNameNoTooltip] demonstra seu valor com algumas surras brutais"
 jason_locale_events.200.a.tt.marry: "\"Apenas um casamento selará nosso vínculo!\""
 jason_locale_events.200.a.tt.marry_desc: "Um dos membros da sua [house|lE] ou [close_family|lE] irá se casar com [drunk_knight.GetUIName]"
 jason_locale_events.200.a.tt.marry_specific: "Seu [ROOT.Char.Custom2('RelationToMeShort', surprise_spouse)] [surprise_spouse.GetFirstNameNoTooltip] se casa com [drunk_knight.GetFirstNameNoTooltip]"
 jason_locale_events.200.a.tt.death: "\"Eu vou beber tanto quanto você, meu [ROOT.Char.GetTitleTierName]!\""
 jason_locale_events.200.a.tt.death_specific: "O talento de [drunk_knight.GetFirstNameNoTooltip] para a bebida… o traiu"
 jason_locale_events.200.b: "Que sua devoção nunca vacile... embora você o faça!"
 jason_locale_events.200.b.tt: "Realize o juramento cerimonial, que não pode ser revogado pela manhã."
 jason_locale_events.200.c: "Saia da frente, idiota. Seu suserano ficará sabendo disso."
 jason_locale_events.200.c.tt: "O que esse[drunk_knight.Custom('ES_EA')] traidor[drunk_knight.Custom('ES_XA')] bêbad[drunk_knight.Custom('ES_OA')] vai fazer? Vai vomitar em mim? Não é exatamente alguém em condições de lutar."
 jason_locale_events.200.c.unchallenged: "[drunk_knight.Custom('ES_ElLa')|U] $knight_culture_player_no_tooltip_lowercase$ recua"
 jason_locale_events.200.c.attacked: "[drunk_knight.GetSheHe|U] #bold dá um tapa#! em você"
 jason_locale_events.200.c.duel.tt: "Ambos sacam suas armas!"
 jason_locale_events.200.c.slap.tt: "Seus guardas intervêm, mas tarde demais!"
 jason_locale_events.200.c.won_brawl.tt: "Sua cabeça mais clara prevalece!"
 jason_locale_events.200.c.lost_brawl.tt: "Humilhado por um[drunk_knight.Custom('ES_XA')] bêbado[drunk_knight.Custom('ES_OA')]"
 jason_locale_events.200.d: "Silêncio. Cuide de sua honra, [drunk_knight.GetFirstNameNoTooltip]."
 jason_locale_events.200.d.tt: "Não se deve escolher palavras bêbadas e imprudentes em vez de juramentos de lealdade."
 tournament_wound_non_root_combatants_effect: "Alguns guerreiros de outros senhores ficam feridos"
 poached_drunk_knight_log_title: "Mudança de Lealdade"
 poached_drunk_knight_log: "[CHARACTER.Custom('ES_ElLa')|U] [CHARACTER.GetTitledFirstName|l] aproveitou os votos bêbados de [TARGET_CHARACTER.Custom('ES_DelDela')] [TARGET_CHARACTER.GetTitledFirstName|l] para roubar o guerreiro de[TARGET_CHARACTER.GetHerHim] a seu senhor."
 drunk_knight_dies_log_title: "Vítima da Farra"
 drunk_knight_dies_log: "[TARGET_CHARACTER.Custom('ES_ElLa')|U] [TARGET_CHARACTER.GetTitledFirstName|l] bebeu até a morte em uma farra selvagem com [CHARACTER.Custom('ES_ElLa')] [CHARACTER.GetTitledFirstName|l]."
 drunk_knight_marries_log_title: "As Promessas da Noite"
 drunk_knight_marries_log: "[TARGET_CHARACTER.Custom('ES_ElLa')|U] [TARGET_CHARACTER.GetTitledFirstName|l] saiu de uma noitada pesada com um novo senhor e um casamento na família [CHARACTER.Custom('ES_DelDela')] [CHARACTER.GetTitledFirstName|l]."
 drunk_knight_beats_log_title: "Terror da Taverna"
 drunk_knight_beats_log: "Entre um gole e outro, [TARGET_CHARACTER.Custom('ES_ElLa')] [TARGET_CHARACTER.GetTitledFirstName|l] deu uma surra em vários guerreiros renomados para conquistar um lugar entre os $knight_culture_player_plural_no_tooltip_lowercase$ [CHARACTER.Custom('ES_DelDela')] [CHARACTER.GetTitledFirstName|l]."
 drunk_oaths_log_title: "Recrutador dos Rostos Ruborizados"
 drunk_oaths_log: "[CHARACTER.Custom('ES_ElLa')|U] [CHARACTER.GetTitledFirstName|l] incentivou um grupo de $knight_culture_player_plural_no_tooltip_lowercase$ embriagados, sendo [TARGET_CHARACTER.Custom('ES_ElLa')] [TARGET_CHARACTER.GetTitledFirstName|l] [TARGET_CHARACTER.Custom('ES_ElLa')] o maior de todos, para abandonar seus senhores em favor de [CHARACTER.GetSheHe]."
 #TOURNAMENT GROUNDS
 jason_locale_events.0220.t: "Onde a Vitória é Fomentada"
 jason_locale_events.0220.desc: "Meus $knight_culture_player_plural_no_tooltip_lowercase$ estão reunidos para o treinamento do dia, com os assistentes carregados de equipamento. [senior_knight.Custom('ES_ElLa')|U] [senior_knight.GetTitledFirstName] e eu nos encontramos diante de todos.\n\n\"$knight_culture_player_plural_no_tooltip$! O que não souberdes, pedi humildemente que vos ensinem\", insta [senior_knight.GetFirstNameNoTooltip]. \"Juntos, representamos [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetTitleAsNameNoTooltip|l]! Preparemo-nos juntos para nossas glórias.\"\n\n[senior_knight.GetSheHe|U] se volta para mim, com [senior_knight.Custom('EyeEyes')] brilhando.\n\n\"Quais são vossas ordens?\""
 jason_locale_events.0220.a: "Observe nossos oponentes: aprenda suas fraquezas."
 jason_locale_events.0220.a.tt: "Esses $knight_culture_player_plural_no_tooltip_lowercase$ estão aqui para vencer competições. Nada mais importa."
 jason_locale_events.0220.b: "Habilidades? Bah! Estamos aqui para sermos vistos."
 jason_locale_events.0220.c: "Aos selins - desembainhem suas espadas!"
 jason_locale_events.0220.c.tt: "Vamos temperar a força e os reflexos, a cavalo e a pé."
 jason_locale_events.0220.d: "$knight_culture_player_plural_no_tooltip$! Mostrem sua agudeza, tanto de visão quanto de mente."
