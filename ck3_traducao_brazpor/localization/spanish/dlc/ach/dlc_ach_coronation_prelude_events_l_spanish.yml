l_spanish:
 prelude_events.0001.t: "Uma mão amiga"
 prelude_events.0001.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U] [ROOT.Char.GetTitledFirstName|l], ouvi dos confiáveis lábios de [regent.Custom('ES_DelDela')] [regent.GetTitledFirstName|l], voss[regent.Custom('ES_OA')] bom[regent.Custom('ES_XA')] regente, que tendes muito potencial", diz [guest.GetShortUIName] [guest.Custom('quirk_pos_pp')]. "[guest.Custom2('DescriptorPositive', ROOT.Char)|U] e [guest.Custom2('DescriptorPositive', ROOT.Char)], [ROOT.Char.Custom('ES_ElLa')] melhor [ROOT.Char.GetTitleAsNameNoTooltip|l] que poderíamos desejar!"."
 prelude_events.0001.a: ""Isso é fantástico! [regent.GetSheHe|U] faz todo o trabalho por mim!"."
 prelude_events.0001.b: ""Aceito com alegria o seu presente"."
 prelude_events.0001.b.tt.supporter: "[guest.GetShortUIName] se torna seu #high partidari[guest.Custom('ES_OA')]#!"
 prelude_events.0001.c.tt.every_supporter: "Você ganha #P 20#! [prestige_i] por $every_supporter$"
 prelude_events.0001.c: ""Divulguem a mensagem!""
 prelude_events.0001.c.opinion: "$every_detractor$ ganha #P 10#! de [opinion|lE] sobre você #weak (respeto) (-1,20/año)#!"
 every_supporter: "Cada [coronation_supporter|lE] ([THIS.ScriptValue('number_of_supporters_activity')|V0])"
 every_supporter_activity: "Cada [coronation_supporter|lE] ([THIS.ScriptValue('number_of_supporters_activity')|V0])"
 every_detractor: "Cada [coronation_detractor|lE] ([THIS.ScriptValue('number_of_detractors_activity')|V0])"
 every_detractor_activity: "Cada [coronation_detractor|lE] ([THIS.ScriptValue('number_of_detractors_activity')|V0])"
 silent_coronation_modifier: "Coroação silenciosa"
 silent_coronation_modifier_desc: "Este personagem deixa que suas ações falem por si mesmas."
 prelude_events.0010.t: "Notícias de casa"
 prelude_events.0010.desc: ""Vocês ouviram as notícias sobre noss[ROOT.Char.Custom('ES_OA')] querid[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitledFirstName|l]?". [guest.Custom('ES_ElLa')|U] [guest.GetTitledFirstName|l] mal consegue conter sua alegria ao falar com [guest_2.Custom('ES_ElLa')] [guest_2.GetTitledFirstName|l].

"Seu própri[regent.Custom('ES_OA')] regente, [regent.Custom('ES_ElLa')] [regent.GetTitledFirstName|l], diz que [ROOT.Char.GetFirstNameNoTooltip] mal consegue ficar acordad[ROOT.Char.Custom('ES_OA')] durante as reuniões do conselho. Como se pode esperar que governe este reino se nem sequer consegue governar a si mesm[ROOT.Char.Custom('ES_OA')]?".". [guest.Custom('ES_ElLa')|U] [guest.GetTitledFirstName|l] mal consegue conter sua alegria ao falar com [guest_2.Custom('ES_ElLa')] [guest_2.GetTitledFirstName|l].

"Farei com que meus agentes se infiltrem na corte de [guest.GetFirstNameNoTooltip]."
 prelude_events.0010.a: "Devemos derrotá-lo[guest.GetHerHim] por dentro."
 prelude_events.0010.b: "Seus agentes se infiltram na corte"
 prelude_events.0010.c: "Seus agentes não conseguem entrar"
 prelude_events.0010.c.tt.success: ""Aceitemos que você não ouviu nada…""
 prelude_events.0010.c.tt.failure: "[guest.GetShortUIName] deixa de ser #high detractor[guest.Custom('ES_XA')]#! teu[guest.Custom('ES_OA')] e se converte em teu #high partidari[guest.Custom('ES_OA')]#!"
 prelude_events.0010.d: "[regent.GetFirstNameNoTooltip] pode dizer o que lhe aprouver."
 prelude_events.0010.d.supporter.tt: "Conspiradores na corte"
 prelude_events.0010.e: "\"...à medida que seu poder enfraquece, sua cabeça sem coroa continuará assim.\" [faction_member.Custom('ES_ElLa')|U] [faction_member.GetTitledFirstName|l] se inclina mais para [faction_member_2.Custom('ES_ElLa')] [faction_member_2.GetTitledFirstName|l]. \"Esta coroação é o lugar perfeito para encontrar nobres dignos que pensem como [Select_CString(And(faction_member.IsFemale, faction_member_2.IsFemale), 'nosotras', 'nosotros')]\".\n\nClaro que estou bem ciente das intenções de a"
 prelude_events.0020.t: "[faction.GetName], liderada por [faction_member.Custom('ES_ElLa')] [faction_member.GetTitledFirstNameNoTooltip|l] pessoalmente."
 prelude_events.0020.desc.intro: "[faction.GetName], liderada por [faction_member_2.Custom('ES_ElLa')] [faction_member_2.GetTitledFirstNameNoTooltip|l] pessoalmente."
 prelude_events.0020.desc.faction_member: "[faction.GetName]."
 prelude_events.0020.desc.faction_member_2: "Se querem me ver sem coroa, terão de #EMP cortar#!."
 prelude_events.0020.desc.no_leader: ""Você talvez esteja falando de traição?""
 prelude_events.0020.desc.outro: ""Tenho ouvidos em todos os cantos, [faction_member.GetTitledFirstNameNoTooltip|l]"."
 prelude_events.0020.a: "[faction_member.GetShortUIName] está intimidado[faction_member.Custom('ES_OA')]"
 prelude_events.0020.b: "[faction_member.GetShortUIName] permanece indiferente"
 prelude_events.0020.b.tt.success: ""Sua lealdade #EMP no tiene precio#! para mim"."
 prelude_events.0020.b.tt.failure: "Que falem."
 prelude_events.0020.c: "[ROOT.Char.Custom('ES_AlAla')|U] esquecid[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitledFirstNameNoTooltip|l],"
 prelude_events.0020.d: "Alguns de vossos leais vassalos notaram que os mensageiros que levavam os convites para sua coroação parecem ter se perdido no caminho para nossas cortes.\n\nNão gostaríamos de perder tal ocasião."
 coronation_events.3001.opening: "Obrigado pelo lembrete."
 coronation_events.3001.desc: "Não houve nenhum erro."
 coronation_events.3001.a: "Sem convite para a coroação"
 coronation_events.3001.b: "É um prazer vê-lo"
 not_invited_coronation_opinion: "O pátio de [activity.GetCurrentPhase.GetLocation.GetName] brilha com um brilho dourado. Uma brisa agita as folhas enquanto os convidados circulam sob elas.\n\n"[ROOT.Char.GetFirstNameNoTooltip]!", viro-me para encontrar meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guest'))] [guest.GetFirstName] me chamando pelo nome."
 prelude_events.0030.t: "Tão bel[guest.Custom('ES_OA')] como sempre, ele se aproxima de mim. \"Eu esperava que você estivesse aqui,\" sorri de forma convidativa[guest.Custom('ES_XA')]."
 prelude_events.0030.desc.intro: "Com um grande sorriso, [guest.GetSheHe] praticamente trota até mim. "Amig[ROOT.Char.Custom('ES_OA')]!", grita. "Que bom te ver!"."
 prelude_events.0030.desc.lover: ""Ouvi dizer que os estábulos são excepcionalmente românticos"."
 prelude_events.0030.desc.friend: ""[guest.GetFirstNameNoTooltip], se eu puder lhe pedir um favor…"."
 prelude_events.0030.a: "$prelude_events.0030.b$"
 prelude_events.0030.b: ""Vejo que há uma taça de [ROOT.Char.Custom('GetExpensiveDrink_Singular')] por aqui"."
 prelude_events.0030.c: "Sempre é bom ver um rosto conhecido."
 prelude_events.0030.d: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'os escapasteis', 'se escaparon')] aos estábulos antes da coroação"
 prelude_events.0030.e: "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] [Select_CString(Or(TARGET_CHARACTER.IsLocalPlayer, CHARACTER.IsLocalPlayer), 'os escapasteis', 'se escaparon')] aos estábulos antes de uma coroação"
 lover_coronation_prelude_sneak_out: "Todo convidado [GetTrait('lifestyle_reveler').GetName( GetNullCharacter )|l] [GetTrait('gregarious').GetName( GetNullCharacter )|l] ou [GetTrait('drunkard').GetName( GetNullCharacter )|l]"
 lover_coronation_prelude_sneak_out_corresponding: "Você não"
 every_party_character: "O dia estava bom demais e, é claro, teve de ser estragado pela visão [guest.Custom('ES_DelDela')] [guest.Custom2('InsultAdjective')] [guest.GetTitledFirstName|l], meu/ minha odiad[guest.Custom('ES_OA')] rival.\n\n“Oh, [ROOT.Char.GetLadyLord|l] [ROOT.Char.GetFirstNameNoTooltip], finge não me ver até eu chegar perto demais de [guest.GetSheHe]. “Vão nos entreter durante o jantar? Ou essas são as roupas que um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] usa numa coroação?”."
 prelude_events.0040.t: "Não falará muito quando eu terminar."
 prelude_events.0040.desc: ""Me inspirei em sua mãe"."
 prelude_events.0040.a: "Escutarei cada palavra que [guest.GetFirstNameNoTooltip]."
 prelude_events.0040.b: "A [scheme|lE] terá #P mayor#! [success_chance|lE]"
 prelude_events.0040.c: ""Este não é o lugar para discutir"."
 prelude_events.0040.c.tt: "Todo convidado [GetTrait('callous').GetName( GetNullCharacter )|l], [GetTrait('vengeful').GetName( GetNullCharacter )|l] ou [GetTrait('wrathful').GetName( GetNullCharacter )|l]"
 prelude_events.0040.d: "Um rosto familiar"
 every_callous_vengeful_wrathful_guest: "O pátio está repleto de flores, os convidados riem impacientes, [ROOT.Char.Custom('GetIncidentalDetail')].\n\n"[guest.Custom2('RelationToMe', SCOPE.sC('root_scope'))|U]!". Meu"
 prelude_events.0050.t: "irritante"
 prelude_events.0050.desc.intro: "apreciad[guest.Custom('ES_OA')]"
 prelude_events.0050.desc.callous: "[ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guest'))] [guest.GetFirstName] me chama. "Aqui todos estão conspirando ou bêbados", sussurra. "Senti sua falta"."
 prelude_events.0050.desc.normal: ""O sentimento não é mútuo"."
 prelude_events.0050.desc.outro: ""Que nós [ROOT.Char.GetHouse.GetNameNoTooltip] permaneçamos juntos.""
 prelude_events.0050.a: "E o que vocês acham de [Select_CString( host.IsFemale, 'nossa anfitriã', 'nosso anfitrião' )], [host.GetLadyLord|l] [host.GetFirstNameNoTooltip]?"
 prelude_events.0050.b: ""Mas olhe para você! Casad[guest.Custom('ES_OA')] com a própria coroada!""
 prelude_events.0050.c: "A bela província de [province.GetNameNoTooltip]"
 prelude_events.0050.d: ""Devo dizer que é impressionante o que você conseguiu com apenas um pouco de [ROOT.Char.GetCapitalLocation.Custom('TerrainTypeProvince')], [ROOT.Char.GetLadyLord|l] [ROOT.Char.GetFirstNameNoTooltip]". [host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] [host.Custom('quirk_pos_present')].\n\n"Ouvi dizer que [ROOT.Char.GetCapitalLocation.GetNameNoTooltip] floresce sob sua orientação, seu [ROOT.Char.GetCapitalLocation.GetHolding.GetType.GetName|l] está bem cuidado e em ordem. Mas vejo uma sombra em seu rosto, [ROOT.Char.GetTitleAsNameNoTooltip|l], o que o preocupa?"."
 prelude_events.0060.t: ""É alegria! Tudo graças à sua gentil ajuda"."
 prelude_events.0060.desc: ""Se pudésseis ceder alguns artesãos de vossa capital…""
 prelude_events.0060.a: ""O que freia nosso crescimento é o ouro"."
 prelude_events.0060.b: "[host.GetShortUIName] concorda com as exigências"
 prelude_events.0060.c: "[host.GetShortUIName] encontra as exigências obscenas"
 prelude_events.0060.c.tt.success: ""Hoje não é o meu dia, [host.GetTitleAsNameNoTooltip|l]"."
 prelude_events.0060.c.tt.failure: "Construtores reais"
 prelude_events.0060.d: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'ofereceu seu', 'ofereceu seu' )] apoio a [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetShortUIName )] durante [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'sua', 'sua' )] coroação sem pedir nada em troca."
 bp4_advocate_domain_construction_county_modifier: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'ofereceu seu', 'ofereceu seu' )] apoio a [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUIName )] durante [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] coroação sem pedir nada em troca."
 friend_coronation_support: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'cobriu', 'cobriu' )] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetShortUIName )] de elogios durante [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'sua', 'sua' )] coroação."
 friend_coronation_support_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'cobriu', 'cobriu' )] [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUIName )] de elogios durante [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] coroação."
 friend_coronation_ambitious: "Apoiador"
 friend_coronation_ambitious_corresponding: "O proprietário deste condado sacrificou parte da honra em troca da ajuda na construção de um monarca recém-ordenado."
 supporter_hook: "Uma oferta cortesã"
 bp4_advocate_domain_construction_county_modifier_desc: "Um pequeno exemplar de [ROOT.Char.Custom('GetRandomRegionalWildDaytimeBird')] se esconde entre os pés dos convidados e os faz rir, incluindo meu senhor[host.Custom('ES_XA')] e o motivo pelo qual nos reunimos neste lugar: [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l].\n\n"[ROOT.Char.GetLadyLord|U] [ROOT.Char.GetFirstNameNoTooltip]", me chama pelo meu nome, sorrindo."
 prelude_events.0070.t: ""Sabeis que nossa amizade é muito importante para mim e que não desejo outra coisa além de ouvir seus conselhos. Eu lhe peço, sente-se ao meu lado."
 prelude_events.0070.desc.intro: ""Ouvi dizer que suas habilidades na arte da diplomacia são incomparáveis."
 prelude_events.0070.desc.friend: ""Notei que governais vosso senhorio com grande eficiência; a mão inconfundível de um[ROOT.Char.Custom('ES_XA')] bom tesoureiro[ROOT.Char.Custom('ES_XA')]."
 prelude_events.0070.desc.diplomacy: ""Dizem que nenhum amante está a salvo, nenhum pecador está livre, nenhum segredo está verdadeiramente oculto, enquanto você estiver por perto."
 prelude_events.0070.desc.stewardship: ""Meus cortesãos me dizem que não há texto antigo que vós não possais ler, nem autor famoso que vós não possais decifrar."
 prelude_events.0070.desc.intrigue: ""Foi-me dito que suas brilhantes estratégias vencem até mesmo nas piores situações."
 prelude_events.0070.desc.learning: "Não há nada de que eu precise mais do que um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] capaz em meu conselho."
 prelude_events.0070.desc.martial: ""Preciso me concentrar em… meu reino"."
 prelude_events.0070.desc.outro: "Ou, mais precisamente, em mim."
 prelude_events.0070.a: ""Será um prazer me juntar a você"."
 prelude_events.0070.a.flavor: ""Não tenho tempo para isso"."
 prelude_events.0070.b: "Em casa com conforto"
 prelude_events.0070.c: "Este personagem recusou uma oferta para se tornar conselheiro para se concentrar em seu próprio reino... ou assim diz."
 bp4_lazy_realm_focus_modifier: "Tenha o melhor"
 bp4_lazy_realm_focus_modifier_desc: ""Bom[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]", viro-me para me deparar com [guest.Custom('ES_ElLa')] [guest.GetTitledFirstName|l], junto a um[courtier.Custom('ES_XA')] [courtier.GetWomanMan] nervos[courtier.Custom('ES_OA')]. "Você sabe que eu o prezo e seria uma grande alegria poder ajudá-lo."

"Aqui lhe ofereço [courtier.Custom('ES_AlAla')] melhor e mais brilhante de minhas [courtier.GetWomenMen], [courtier.GetFirstName], meu habilidos[courtier.Custom('ES_OA')] [guest.Custom2('RelationToMe', SCOPE.sC('courtier'))]. Que isto sirva como"
 prelude_events.0080.t: "um sinal de amizade em nossa casa"."
 prelude_events.0080.desc.intro: "o início de uma amizade entre nossas casas"."

""Vocês acham que eu não sei reconhecer um espião?""
 prelude_events.0080.desc.same_house: ""Sei perfeitamente o que deve fazer"."
 prelude_events.0080.desc.fallback: "[courtier.GetFirstNameNoTooltip] será bem recebid[courtier.Custom('ES_OA')] em minha corte."
 prelude_events.0080.desc.friend: ""Poucas pessoas são tão generosas quanto você, [guest.GetTitleAsNameNoTooltip]"."
 prelude_events.0080.aa: "[TARGET_CHARACTER.GetShortUIName|U] ofereceu, de forma altruísta, um cortesão habilidoso a [Select_CString( CHARACTER.IsLocalPlayer, 'seu personagem', CHARACTER.GetShortUIName )] durante uma coroação."
 prelude_events.0080.a: "[CHARACTER.GetShortUIName|U] ofereceu altruisticamente um cortesão habilidoso a [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'seu personagem', TARGET_CHARACTER.GetShortUIName )] durante uma coroação."
 prelude_events.0080.b: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'rechazaste', 'rechazó' )] o cortesão de [TARGET_CHARACTER.GetShortUIName] e o acusou de ser um espião."
 prelude_events.0080.c: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'rechazaste', 'rechazó' )] rejeitou o cortesão de [CHARACTER.GetShortUIName] e o acusou de ser um espião."
 friend_coronation_offered_courtier: "Medidas paranoicas"
 friend_coronation_offered_courtier_corresponding: "Este personagem aumentou sua vigilância depois que lhe foi oferecido um cortesão suspeito"
 rival_rejected_courtier_paranoid: "Digno de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip]"
 rival_rejected_courtier_paranoid_corresponding: ""Com calma!", ouço a voz de um[guest.Custom('ES_XA')] [guest.GetWomanMan] e me viro para encontrar [guest.Custom('ES_AlAla')] [guest.GetTitledFirstName|l] dando tapinhas suaves no flanco do cavalo.\n\n"
 bp4_paranoid_measures_modifier: "[Select_CString( guest.IsFemale, 'Uma amiga', 'Um amigo' )] como jamais tive outr[guest.Custom('ES_OA')], mal consigo conter um sorriso quando abre os braços."
 bp4_paranoid_measures_modifier_desc: "Esta espécie de [guest.Custom('InsultNoun')] [guest.Custom('InsultAdjective')] conseguiu chegar não sei como à coroação. Mal consigo conter uma careta quando se aproxima de mim."
 prelude_events.0090.t: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guest'))], [guest.Custom('ES_ElLa')] [guest.GetTitledFirstName|l], aproxima-se de mim com um amplo sorriso."
 prelude_events.0090.desc.intro: "\n\n"O que me dizem?", aponta para um grupo de ovelhas às suas costas. "Um presente suficientemente digno?""
 prelude_events.0090.desc.blood_brother: ""[guest.Custom('SisterBrother')|U] meu[guest.Custom('ES_OA')]! Vamos comemorar [Select_CString(And(ROOT.Char.IsFemale, guest.IsFemale), 'juntas', 'juntos')]!""
 prelude_events.0090.desc.bad_opinion: ""Você pode levá-los de volta para [guest.GetCapitalLocation.GetNameNoTooltip].""
 prelude_events.0090.desc.fallback: ""Um grande presente #EMP genial#!""
 prelude_events.0090.desc.outro: ""Por favor, fique com elas! Sua presença já é presente suficiente"."
 prelude_events.0090.aa: "[TARGET_CHARACTER.GetShortUIName|U] ofereceu um rebanho a [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUIName )] durante [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] coroação"
 prelude_events.0090.a: "[CHARACTER.GetShortUIName|U] ofereceu um rebanho a [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetShortUIName )] durante [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'sua', 'sua' )] coroação"
 prelude_events.0090.b: "Edifícios promissores"
 prelude_events.0090.c: ""Que tipo de [ROOT.Char.GetTitleAsNameNoTooltip] deixa que os reinos de seus vassalos murchem e apodreçam? As pessoas falam, meu [ROOT.Char.GetLadyLord]", meu/ minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('vassal'))] [vassal.Custom('ES_ElLa')], [vassal.GetTitledFirstName|l] [vassal.Custom('quirk_pos_pp')].\n\n"Conclamo-vos a olhar para dentro e a lembrar que a fama de um reino é a fama do domínio"."
 friend_nomadic_guest_coronation_herd: ""Prometo que não vou me esquecer disso"."
 friend_nomadic_guest_coronation_herd_corresponding: ""Fazei florescer vosso domínio, [vassal.GetTitledFirstNameNoTooltip|l]"."
 prelude_events.0100.t: ""Talvez eu deva me concentrar em estudar as técnicas…""
 prelude_events.0100.desc: "Por causa do seu [GetModifier('coronation_vassal_building_modifier').GetName]"
 prelude_events.0100.a: "Promessa da construção"
 prelude_events.0100.b: "Este personagem ganhará [prestige|lE] [prestige_i] sempre que construir edifícios nos domínios de seus vassalos."
 prelude_events.0100.c: "[CHARACTER.GetShortUIName] contribuiu com algum ouro para os trabalhos de construção de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetShortUIName )]."
 coronation_vassal_building_tt: "[TARGET_CHARACTER.GetShortUIName] contribuiu com algum ouro para os trabalhos de construção de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUIName )]."
 coronation_vassal_building_modifier: "Inaudito"
 coronation_vassal_building_modifier_desc: "Percebo que [guest.Custom('ES_ElLa')] [guest.GetTitledFirstName|l] lança olhares furtivos na minha direção. [guest.Custom('quirk_pos_present')], e por fim se aproxima de mim. Com uma reverência respeitosa, começa:\n\n"Caríssim[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], nós, os [guest_culture.GetCollectiveNounNoTooltip] desejamos apoiar-vos agora e nos dias que virão. A coroa em breve repousará sobre a vossa cabeça, mas os nossos costumes repousarão em vosso coração?"."
 friend_coronation_paid_for_building: ""Falarei a língua dos vossos corações"."
 friend_coronation_paid_for_building_corresponding: "Todos devem conhecer meu amor pelos [guest_culture.GetCollectiveNounNoTooltip]."
 prelude_events.0110.t: "A coroação exige um foco diferente."
 prelude_events.0110.desc: "Dizer algumas palavras na coroação mudou a aceitação cultural"
 prelude_events.0110.a: "[CHARACTER.GetShortUIName|U] [CHARACTER.LocalPlayerString( 'mostrou', 'mostrou' )] interesse durante [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] coroação pelo idioma de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetShortUIName )]."
 prelude_events.0110.b: "[TARGET_CHARACTER.GetShortUIName|U] [TARGET_CHARACTER.LocalPlayerString( 'mostrou', 'mostrou' )] interesse durante [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'sua', 'sua' )] coroação pelo idioma de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUIName )]."
 prelude_events.0110.c: "Lembre-se dos seus amigos"
 cultural_acceptance_gain_coronation_impress_attendees: ""Não deve ser fácil", diz [guest.Custom('ES_ElLa')] [guest.GetTitledFirstName|l], [guest.Custom('quirk_pos_pp')]. "Só consigo imaginar o peso da coroa que em breve terá sobre sua cabeça".\n\n"Mas não se preocupe. Seus vassalos leais estarão ao seu lado, agora e sempre. Tome isto". Faz um gesto a um de seus servos, que então se curva para apresentar um presente elegantemente embrulhado. "[guest_artifact.GetName]", explica [guest.GetFirstNameNoTooltip]. "Tem me servido bem"."
 friend_coronation_learn_language: ""Retribuirei o gesto"."
 friend_coronation_learn_language_corresponding: ""Meu amor vale tão pouco assim?""
 prelude_events.0120.t: ""Obrigado por sua generosidade, [guest.GetTitleAsNameNoTooltip|l]"."
 prelude_events.0120.desc: "Que todos vejam como ele brilha!"
 prelude_events.0120.aa: "[guest_artifact.GetDesc]\n\nUm presente atencioso de [guest.GetShortUIName] para a coroação."
 prelude_events.0120.a: "[my_artifact.GetDesc]\n\nEntregue como parte de uma troca de presentes durante uma coroação."
 prelude_events.0120.b: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'participaram', 'participaram')] em uma troca de presentes durante a coroação de [Select_CString( CHARACTER.IsLocalPlayer, 'seu personagem', CHARACTER.GetShortUIName )]."
 prelude_events.0120.c: "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] [Select_CString(Or(TARGET_CHARACTER.IsLocalPlayer, CHARACTER.IsLocalPlayer), 'participaram', 'participaram')] em uma troca de presentes durante a coroação de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'seu personagem', TARGET_CHARACTER.GetShortUIName )]."
 coronation_gift_artifact_desc: "A graça sobre suas posses"
 coronation_gift_artifact_host_desc: "Que [coronator.GetFaith.HighGodName] vos cubra de bênçãos neste dia tão afortunado, [ROOT.Char.GetTitledFirstNameNoTooltip|l]. [coronator.Custom('ES_ElLa')|U] [coronator.GetTitledFirstName|l] inclina a cabeça, [coronator.Custom('quirk_pos_pp')].\n\nGostaria de comemorar a ocasião com uma bênção sobre o artefato que tanto apreciais: [my_artifact.GetName]."
 friend_coronation_gift_exchange: "Que [coronator.GetFaith.HighGodName] o proteja."
 friend_coronation_gift_exchange_corresponding: "[my_artifact.GetName]:\n$BULLET_WITH_TAB$ Ganha #positive_value +10 %#! por mês de [piety|lE] [piety_i]\n$BULLET_WITH_TAB$ Ganha #positive_value +10#! de [opinion|lE] do [clergy|lE]"
 prelude_events.0130.t: "Que sirva como lembrança da coroação."
 prelude_events.0130.desc: "[my_artifact.GetName]:\n $BULLET_WITH_TAB$ Ganha #positive_value +8 %#! mensal de [prestige|lE] [prestige_i]"
 prelude_events.0130.a: ""Meus convidados adorariam ver algo assim"."
 prelude_events.0130.a.tt: "Graças ao seu #high [trait|lE] [GetTrait('cynical').GetName( GetNullCharacter )]#! a [coronation_magnificence|lE] da [GetActivityType('activity_coronation').GetName|l] #P aumenta en gran medida#!"
 prelude_events.0130.b: "[my_artifact.GetDesc]\n\nParece emitir uma luz trêmula. Um lembrete da bênção recebida durante a coroação [artifact_owner.Custom('ES_DelDela')] [artifact_owner.GetTitledFirstName|l]."
 prelude_events.0130.b.tt: "Em sua luz gloriosa"
 prelude_events.0130.c: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] toma um segundo para observar a multidão, [host.Custom('quirk_pos_pp')]. As vozes dos cortesãos têm sido tão constantes quanto o canto dos pássaros, e não tenho dúvida de que [guest.Custom('ES_ElLa')] [guest.GetTitledFirstName|l] pretende juntar-se a eles.\n\n"Boa[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]!", diz deslizando até mim. "Posso me atrever a perguntar o que pensais da celebração? Não tenho dúvida de que o reinado [host.Custom('ES_DelDela')] [host.GetTitledFirstNameNoTooltip|l] será de amor e justiça.""
 prelude_events_0130_cynical_tt: "#EMP No decir nada.#!"
 coronation_blessed_artifact_desc: ""!Eles invejarão nossa sorte por termos estado aqui!""
 prelude_events.0140.t: "Graças ao seu [intent|lE] #high $coronation_offer_support$#!, a [coronation_magnificence|lE] da [GetActivityType('activity_coronation').GetName|l] #P aumenta notablemente#!"
 prelude_events.0140.desc: ""Que ele/ela reine por muitos anos!""
 prelude_events.0140.a: "O que sabeis sobre [guest.GetSheHe]?"
 prelude_events.0140.b: ""[ROOT.Char.GetTitledFirstNameNoTooltip]", [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] me chama com um grande sorriso. Ao lado de [host.GetSheHe] está outr[guest.Custom('ES_OA')] convidad[guest.Custom('ES_OA')], um[guest.Custom('ES_XA')] [guest.GetTitleAsNameNoTooltip] que eu não conheço.\n\n"Aqui está [guest.Custom('ES_AlAla')] [guest.GetTitledFirstName|l]", [host.Custom('ES_ElLa')] [host.GetTitledFirstNameNoTooltip|l] [guest.GetHerHim] apresenta. "Acredito que vocês teriam muito em comum. Talvez [guest.Custom('MatchingConversationSubject_alone')]"."
 prelude_events.0140.b.offer_support_tt: ""Seria um prazer acompanhar [guest.GetHerHim pelos terrenos"."
 prelude_events.0140.c: "[guest.GetSheHe|U] parece muito educado[guest.Custom('ES_OA')]."
 prelude_events.0150.t: "Eu me interessaria mais em conversar com [host.Custom('ES_ElLa')] [host.GetTitledFirstNameNoTooltip|l]."
 prelude_events.0150.desc: "Sou amig[ROOT.Char.Custom('ES_OA')] de #EMP todos#!, [host.GetTitledFirstNameNoTooltip|l]."
 prelude_events.0150.aa: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'sentisteis', 'sintieron')] uma conexão inegável depois de serem [Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale),'presentadas', 'presentados')] em uma coroação."
 prelude_events.0150.a: "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] [Select_CString(Or(TARGET_CHARACTER.IsLocalPlayer, CHARACTER.IsLocalPlayer), 'sentisteis', 'sintieron')] uma conexão inegável depois de serem [Select_CString(And(TARGET_CHARACTER.IsFemale, CHARACTER.IsFemale),'presentadas', 'presentados')] em uma coroação."
 prelude_events.0150.b: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'intimasteis', 'intimaron')] após serem [Select_CString(And(TARGET_CHARACTER.IsFemale, CHARACTER.IsFemale),'presentadas', 'presentados')] em uma coroação."
 prelude_events.0150.c: "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] [Select_CString(Or(TARGET_CHARACTER.IsLocalPlayer, CHARACTER.IsLocalPlayer), 'intimasteis', 'intimaron')] depois de serem [Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale),'presentadas', 'presentados')] em uma coroação."
 lover_coronation_introduction: "[ROOT.Char.GetDynasty.GetNameNoTooltip] na multidão"
 lover_coronation_introduction_corresponding: ""[guest.GetHouse.GetMotto]", diz uma voz familiar. Eu me viro e encontro meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('guest'))], [guest.Custom('ES_ElLa')] [guest.GetTitledFirstName|l], que chama minha atenção.\n\n"[ROOT.Char.GetFirstNameNoTooltip]", me saúda [guest.Custom('quirk_pos_pp')]. "É um prazer especial encontrar outr[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetDynasty.GetName] em uma ocasião assim. Parece que uma vida inteira se passou desde nosso último encontro"."
 friend_coronation_introduction: ""[ROOT.Char.GetDynasty.GetNameNoTooltip] prevalecerá!"."
 friend_coronation_introduction_corresponding: ""O prazer não pode ser retribuído"."
 prelude_events.0160.t: ""Que o mundo saiba que estamos aqui!""
 prelude_events.0160.desc: "Devemos permanecer humildes."
 prelude_events.0160.aa: "[CHARACTER.GetShortUIName|U] [CHARACTER.LocalPlayerString( 'insultou', 'insultou' )] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetShortUIName )] em uma coroação ao dizer que era uma vergonha para [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'sua', 'sua' )] dinastia."
 prelude_events.0160.a: "[TARGET_CHARACTER.GetShortUIName|U] [TARGET_CHARACTER.LocalPlayerString( 'insultou', 'insultou' )] [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUIName )] em uma coroação ao dizer que era uma vergonha para [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] dinastia."
 prelude_events.0160.b: "Dinastia afamada"
 prelude_events.0160.c: "Todos os convidados da coroação reconheceram o grande nível de fama de um dos membros desta dinastia."
 rival_coronation_dynasty_insult: "A voz de [guest.GetFaith.GetNameNoTooltip|l]"
 rival_coronation_dynasty_insult_corresponding: "À medida que a luz do dia se esvai, vejo [guest.Custom('ES_AlAla')] [guest.GetTitledFirstName|l] olhando em minha direção. Com um aceno de cabeça em reconhecimento, ele sorri e se aproxima.\n\n"Foi um dia esplêndido, não acham, [ROOT.Char.GetFirstNameNoTooltip]? Sem dúvida, devemos agradecer a [guest.GetFaith.HighGodName] por estas bênçãos. Nós, os [guest.GetFaith.GetAdherentNamePluralNoTooltip], reverenciamos Seus ensinamentos", declara com orgulho, tomando fôlego antes de continuar sua dissertação teológica."
 coronation_famed_dynasty_modifier: ""Delírios! Ouçam agora sobre [ROOT.Char.GetFaith.HighGodName]!""
 coronation_famed_dynasty_modifier_desc: "[guest.GetShortUIName] compreende a glória de [ROOT.Char.GetFaith.HighGodName]"
 prelude_events.0170.t: "[guest.GetShortUIName] se sente insultad[guest.Custom('ES_OA')]"
 prelude_events.0170.desc: "Uma discussão teológica não cairia mal."
 prelude_events.0170.aa: "[host.GetShortUIName] está impressionad[guest.Custom('ES_OA')]"
 prelude_events.0170.aa.success: "O público fica impressionado"
 prelude_events.0170.aa.failure: "Você faz papel de bobo"
 prelude_events.0170.a: ""Conte-me mais"."
 prelude_events.0170.a.crit_success: "Uma coroação não é lugar para tratar desses assuntos."
 prelude_events.0170.a.success: "Enviar esse tipo de tagarela para entediar um apoiador ignorante."
 prelude_events.0170.a.failure: "A diatribe de [guest.GetFirstNameNoTooltip] irritará o idiota sem cultura de [supporter.Custom('ES_EA')] [supporter.GetName]!"
 prelude_events.0170.b: "Você ganha um desconto de #P 50 %#! na conversão para [guest.GetFaith.GetName|l]"
 prelude_events.0170.c: "Por culpa de seu [intent|lE] #high $coronation_disrupt_loyalists$#!, a [coronation_magnificence|lE] de [GetActivityType('activity_coronation').GetName|l] fica #N reducida#!"
 prelude_events.0170.c.bad: "Um momento de quietude"
 prelude_events.0170.c.bad_flavor: "Deixo meus convidados para trás e entro no(a) [ROOT.Char.GetCurrentLocation.GetCounty.GetFaith.HouseOfWorship], em busca de um momento de quietude antes que o peso da coroa recaia sobre mim.\n\n"
 cheaper_to_convert_to_guest_faith_tt: "O altar dedicado a [ROOT.Char.GetFaith.HighGodName] brilha tenuemente, iluminado por uma dúzia de velas. Um silêncio fragrante invade as paredes frias. À minha direita, um mural de [ROOT.Char.GetFaith.WealthGodName] me oferece um olhar severo. À esquerda, a pintura que outrora foi [ROOT.Char.GetFaith.HealthGodName] vai se esvaindo lentamente, seu sorriso é quase imperceptível."
 prelude_events.0170.c.disrupt_loyalists_tt: "Por fim consigo deixar os outros convidados para trás e entro na [ROOT.Province.GetCounty.GetFaith.HouseOfWorship] em busca de um momento de tranquilidade.\n\n"
 prelude_events.0180.t: "[ROOT.Char.GetFaith.HighGodName], não abandone [host.GetPrimaryTitle.GetNameNoTierNoTooltip]."
 prelude_events.0180.desc.host: "[ROOT.Char.GetFaith.WarGodName], destrua [host.Custom('ES_ElLa')] [host.GetTitledFirstNameNoTooltip|l]!"
 prelude_events.0180.desc.outro: "Confio-me a [ROOT.Char.GetFaith.HealthGodName]."
 prelude_events.0180.desc.guest: "[ROOT.Char.GetFaith.WealthGodName] me ajudará a me guiar."
 prelude_events.0180.a: "Graças à sua [intent|lE] #high $coronation_impress_attendees$#!, a [coronation_magnificence|lE] da [GetActivityType('activity_coronation').GetName|l] #P aumenta en gran medida#!"
 prelude_events.0180.b: "Uma oração pela boa saúde"
 prelude_events.0180.c: "Este personagem se dedicou um momento durante uma coroação para rezar por boa saúde."
 prelude_events.0180.d: "Uma oração por riquezas"
 prelude_events.0180.a.impress_attendees_tt: "Este personagem reservou um momento durante uma coroação para rezar por riqueza."
 coronation_good_health_modifier: "Palavras de encorajamento"
 coronation_good_health_modifier_desc: "As chamas da lareira dançam uma espécie de [ROOT.Char.Custom('GetMedievalDance')]. A porta dos meus aposentos se abre de repente e ouço uma voz familiar chamando meu nome.\n\n"
 coronation_wealth_modifier: "[ROOT.Char.Custom('WifeHusband')] querido[ROOT.Char.Custom('ES_OA')], a voz de [councillor.GetFirstName] é suave e calma."
 coronation_wealth_modifier_desc: ""[ROOT.Char.GetTitledFirstNameNoTooltip]", meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('councillor'))] [councillor.GetFirstName]."
 prelude_events.0190.t: ""Sei que o dia está próximo em que você olhará seu reflexo no metal frio e se perguntará se está fazendo a coisa certa. Que se saiba, que se grite de todos os cantos desta fortaleza que eu estarei ao seu lado".\n\n[councillor.GetFirstName] saca um pequeno presente de sua bolsa. "Encomendei isto para você"."
 prelude_events.0190.desc.intro: ""É mais do que eu poderia pedir"."
 prelude_events.0190.desc.spouse: ""[councillor.GetFirstNameNoTooltip]…, obrigado"."
 prelude_events.0190.desc.other: "Agora me sinto mais em paz."
