l_spanish:
 ach_yearly_events.1001.t: "Assuntos fiscais"
 ach_yearly_events.1001.desc: "Al ocupar el cargo de [Concept( 'steward', GetPlayer.GetCouncillorPosition( 'councillor_steward' ).GetPositionName )|l] de mi señor[liege.Custom('ES_XA')], [liege.Custom('ES_ElLa')] [liege.GetTitledFirstName|l], a mí corresponde aconsejarle sobre cómo gestionar su tesorería. Una parte considerable de ello es explicar los beneficios e inconvenientes de ciertos hábitos de gasto.\n\n«Contadme de nuevo», pide. «¿Cuáles son las auténticas #EMP desventajas#! de ahorrar el dinero del señorío? Ahorrar para los malos momentos ha de ser bueno, ¿no?».\n\nBueno, no se equivoca, pero es una actitud algo simplista…"
 ach_yearly_events.1001.a: ""Se você não estiver segur[liege.Custom('ES_OA')]#EMP eu#!, eu posso cuidar disso para você…"."
 ach_yearly_events.1001.a.success: "[liege.GetFirstNameNoTooltip] te entrega as moedas com alegria"
 ach_yearly_events.1001.a.failure: "[liege.GetFirstNameNoTooltip] desconfia do seu plano"
 ach_yearly_events.1001.b: "Ter cautela é a atitude correta."
 ach_yearly_events.1001.c: "Um [liege.Custom('ES_XA')] [liege.GetTitleAsNameNoTooltip] merece viver bem!"
 ach_yearly_events.1001.d: "Talvez uma abordagem equilibrada seja melhor?"
 ach_yearly_events.1001.d.success: "[liege.GetFirstNameNoTooltip] aplaude seu bom senso"
 ach_yearly_events.1001.d.failure: "[liege.GetFirstNameNoTooltip] se zomba da sua neutralidade"
 ach_fence_sitter_modifier: "Em cima do muro"
 ach_fence_sitter_modifier_desc: "A indecisão deste personagem é bem conhecida, e ele é infame por se recusar a assumir um compromisso."
 ach_spending_advice_modifier: "Conselho de gastos"
 ach_spending_advice_modifier_desc: "Este personagem se especializa em dar conselhos financeiros sensatos."
 ach_cautious_spender_modifier: "Gastador cauteloso"
 ach_cautious_spender_modifier_desc: "Este personagem mantém um controle firme sobre as cordas da bolsa."
 ach_extravagant_spender_modifier: "Gastador extravagante"
 ach_extravagant_spender_modifier_desc: "Este personagem gasta com generosidade onde é necessário."
 ach_budgeting_mentor_modifier: "Mentor de orçamento"
 ach_budgeting_mentor_modifier_desc: "Este personagem é um especialista fiscal reconhecido, capaz de ensinar outros a gastar suas moedas da maneira mais sábia."
 ach_balanced_budget_modifier: "Orçamento equilibrado"
 ach_balanced_budget_modifier_desc: "Este personagem se beneficia de finanças muito bem administradas."
 ach_yearly_events.1002.t: "O monte de ratos"
 ach_yearly_events.1002.desc: "Con mi cargo de [Concept( 'chancellor', GetPlayer.GetCouncillorPosition( 'councillor_chancellor' ).GetPositionName )|l] de [liege.GetPrimaryTitle.GetNameNoTier], he jurado mantener a raya a los vasallos díscolos para impedir que las alimañas infesten [liege.GetPrimaryTitle.GetTierAsNameNoTooltip] en tropel…\n\nCon la [faction.GetName|l] acumulando fuerzas, los disidentes como [faction_member.GetName] viajan a todas partes, murmurando en oídos delicados.\n\n«[unjoined_vassal.GetPrimaryTitle.GetNameNoTier] es fuerte, tiene hambre», apremia [Select_CString( faction_member.IsFemale, 'la traidora', 'el traidor' )] a su [unjoined_vassal.GetTitleAsNameNoTooltip|l], [unjoined_vassal.GetFirstName]. «Confiad en esta fuerza, este hambre… y en la nuestra»."
 ach_yearly_events.1002.a: "A causa pestilenta deve ser isolada."
 ach_yearly_events.1002.b: "$ach_yearly_events.1002.a$"
 ach_yearly_events.1002.b.success: "Você envenena a ideia de rebelião"
 ach_yearly_events.1002.b.failure: "Sua censura zombeteira falha"
 ach_yearly_events.1002.c: "Sou tão servil assim? Minha voz deve ser ouvida!"
 ach_yearly_events.1002.c.flavor: "Sou a principal entre as vozes do reino. E a principal entre as vozes #EMP discrepantes#!!"
 ach_yearly_events.1002.d: "Lidaremos com os ratos… um por um."
 ach_yearly_events.1002.d.flavor: "Ao assumir o cargo de [Concept( 'chancellor', GetPlayer.GetCouncillorPosition( 'councillor_chancellor' ).GetPositionName )|l], tenho influência para calar est[faction_member.Custom('ES_EA')] [faction_member.GetTitleAsNameNoTooltip|l] rebelde."
 ach_chancellor_isolating_factions_modifier: "Chanceler isolando facções"
 ach_chancellor_isolating_factions_modifier_desc: "Un defensor de este gobernante convierte con habilidad en parias a rebeldes y detractores.\n#weak Los [vassals|lE] son menos dados a unirse a [factions|lE]#!"
 chancellor_isolates_factions_title: "[Concept( 'chancellor', GetPlayer.GetCouncillorPosition( 'councillor_chancellor' ).GetPositionName )] corrói o apoio da facção"
 chancellor_isolates_factions_desc: "[ROOT.Char.GetTitledFirstName] transforma o discurso entre seus vassalos a seu favor."
 chancellor_removes_faction_member_title: "[Concept( 'chancellor', GetPlayer.GetCouncillorPosition( 'councillor_chancellor' ).GetPositionName )] apazigua o membro da facção"
 chancellor_removes_faction_member_desc: "[ROOT.Char.GetTitledFirstName] demonstra ser [Select_CString( ROOT.Char.IsFemale, 'uma oponente en?rgica', 'um oponente en?rgico' )] de seus vassalos dissidentes."
 ach_yearly_events.1003.t: "Mestre dos Vencidos"
 ach_yearly_events.1003.desc: "El conflicto de mi señor[liege.Custom('ES_XA')] con [foe.GetPrimaryTitle.GetNameNoTier] se alarga. Al ejercer de [Concept( 'marshal', GetPlayer.GetCouncillorPosition( 'councillor_marshal' ).GetPositionName )|l], planeo la logística, recluto a [liege.Custom('GetLocalCommonerTermPlural')] para el servicio, acallo el descontento local…, pero los jinetes traen noticias preocupantes.\n\nEn [battle_province.GetName], los [liege.Custom('KnightCulturePluralNoTooltip')|l] de [liege.GetPrimaryTitle.GetNameNoTier] han fracasado. Se rompió la línea de combate de [commander.GetName] y nuestro ejército se lanzó a una huida desesperada. ¡Con nuestros [liege.Custom('FighterTermPlural')] en fuga, la hueste de [foe.GetName] avanza hacia [liege.GetPrimaryTitle.GetTierAsNameNoTooltip]!\n\nMis consejeros me incitan a hacer honor a mi puesto, a tomar las riendas de este desastre y a convertirlo en un guantelete para golpear."
 ach_yearly_events.1003.a: "Agora é quando precisamos do vigor de um [Concept( 'marshal', GetPlayer.GetCouncillorPosition( 'councillor_marshal' ).GetPositionName )|l]!"
 ach_yearly_events.1003.b: "[ROOT.Char.Custom('KnightCulturePluralNoTooltip')]! #EMP Cabalgad para salvar [liege.GetPrimaryTitle.GetNameNoTierNoTooltip]!#!"
 ach_yearly_events.1003.c: "Reunirei o exército destruído."
 ach_yearly_events.1003.c.success: "Os sobreviventes se reúnem sob o estandarte [liege.Custom('ES_DelDela')] [liege.GetTitledFirstNameNoTooltip|l]"
 ach_yearly_events.1003.c.failure: "Poucos atendem ao seu chamado"
 ach_yearly_events.1003.d: "Que os sobreviventes sejam chicoteados por sua falha."
 ach_yearly_events.1003.d.flavor: "… e aquele idiota de [liege.Custom('ES_EA')] também, se ficar [liege.GetTitleAsNameNoTooltip|l] respondendo sobre isso ser [Select_CString( liege.IsFemale, 'respondona', 'respondón' )] culpa minha #EMP mía#!."
 marshal_joins_war_title: "O Tesoureiro convoca para a guerra"
 marshal_joins_war_desc: "Sua derrota esmagadora encheu de fervor [marshal.Custom('ES_AlAla')] [marshal.GetTitledFirstName|l] pela causa!"
 marshal_joins_war_title_foe: "O Tesoureiro do inimigo se reúne para a guerra"
 marshal_joins_war_desc_foe: "A derrota esmagadora de [liege.GetShortUIName] estimulou seu Tesoureiro, [marshal.GetShortUIName] a se juntar à [combat_war.GetName]."
 marshal_aids_troop_recovery_title: "[Concept( 'marshal', GetPlayer.GetCouncillorPosition( 'councillor_marshal' ).GetPositionName )] reúne tropas derrotadas"
 marshal_aids_troop_recovery_desc: "[ROOT.Char.Custom('ES_ElLa')|U] [ROOT.Char.GetTitledFirstName|l] reage vigorosamente à derrota do seu exército."
 ach_marshal_reconstituting_army_modifier: "Marechal reconstrói exército"
 ach_marshal_reconstituting_army_modifier_desc: "Na sequência de uma derrota brutal, o Tesoureiro deste personagem se esforça arduamente para restaurar os militares à forma de combate."
 custom.every_liege_domain_county: "[liege.GetShortUIName]:\n$EFFECT_LIST_BULLET$ Todo [county|lE] de cada [domain|lE]"
 custom.every_liege_lending_vassal: "[liege.GetShortUIName]:\n$EFFECT_LIST_BULLET$ Todo [powerful_vassal|lE] com o [gold|lE] requerido"
 ach_yearly_events.1004.t: "A grande bolsa flácida"
 ach_yearly_events.1004.desc: "Mi [Select_CString( liege.IsFemale, 'empobrecida señora', 'empobrecido señor' )], [liege.Custom('ES_ElLa')] [liege.GetTitledFirstName|l], y yo, que ejerzo como su [Concept( 'steward', GetPlayer.GetCouncillorPosition( 'councillor_steward' ).GetPositionName )|l], hemos encontrado un momento para hablar. Si bien… es mientras una muchedumbre brama por lo vacío del tesoro [liege.Custom('GetTitleTierAdjective')].\n\n«¡Cuánto gritan, anhelando nuevas glorias!», interpreta generosamente [liege.Custom('ES_ElLa')] [liege.GetTitledFirstNameNoTooltip|l].\n\n«¿Con qué ganaremos tales glorias?», pregunto. «¿Lanzas bañadas en oro? ¿Flechas con puntas de gemas? La fortuna del señorío se ha gastado, pero no en #EMP glorias#!…».\n\n"
 ach_yearly_events.1004.desc_end: ""São meras ilusões!", replica. "Eu sei muito bem qual é o estado do tesouro…""
 ach_yearly_events.1004.desc_harsh: ""Você ocupa o cargo de [Concept( 'steward', GetPlayer.GetCouncillorPosition( 'councillor_steward' ).GetPositionName )|l]", responde. "Encontre o ouro. Encontre as pedras preciosas"."
 ach_yearly_events.1004.a: ""Posso lidar com seus vassalos e assumir a culpa"."
 ach_yearly_events.1004.a.flavor: "Quando a tesouraria é frágil, suponho que quem exerce como [Concept( 'steward', GetPlayer.GetCouncillorPosition( 'councillor_steward' ).GetPositionName )|l] deve ser forte… e odiado."
 ach_yearly_events.1004.b: "Com diligência e tempo, a riqueza pode surgir."
 ach_yearly_events.1004.b.success: "Com habilidade, você consegue reformar a administração local"
 ach_yearly_events.1004.b.failure: "Seus instintos se mostram assustadoramente inúteis"
 ach_yearly_events.1004.c: "Com diligência e tempo, a riqueza floresce."
 ach_yearly_events.1004.d: ""Quando seu povo começar a passar fome, mande-o para mim"."
 ach_yearly_events.1004.d.flavor: "Nenhum dever pode me impelir a consertar a bolsa esfolada deste devedor…"
 ach_stewardship_bankruptcy_modifier: "Administração voltada para a prosperidade"
 ach_stewardship_bankruptcy_modifier_desc: "Com a ameaça da falência sobre o reino, as leis locais foram reforçadas e as levas foram destinadas a deveres civis."
 ach_welcoming_lieges_creditors_modifier: "Dando as boas-vindas aos empobrecidos"
 ach_welcoming_lieges_creditors_modifier_desc: "A população local aumenta: a má gestão financeira em outros lugares leva famílias a se estabelecerem aqui."
 steward_aids_financial_recovery_title: "[Concept( 'steward', GetPlayer.GetCouncillorPosition( 'councillor_steward' ).GetPositionName )] busca solvência"
 steward_aids_financial_recovery_desc: "[ROOT.Char.Custom('ES_ElLa')|U] [ROOT.Char.GetTitledFirstName|l] reforma seu [domain|lE] em resposta às suas preocupações financeiras."
 steward_gathers_emergency_tithe_title: "[Concept( 'steward', GetPlayer.GetCouncillorPosition( 'councillor_steward' ).GetPositionName )] reúne o imposto dos vassalos"
 steward_gathers_emergency_tithe_desc: "Para responder às suas preocupações financeiras, [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitledFirstName|l] acumulou essa cobrança incomum e assumiu toda a culpa."
 custom.every_scope_faction_member: "Todo membro da #high [faction.GetName]#!"
 ach_yearly_events.1005.t: "[ROOT.Char.Custom('ES_ElLa')|U] [ROOT.Char.GetTitleAsNameNoTooltip|l] de [ROOT.Char.GetPrimaryTitle.GetNameNoTier]"
 ach_yearly_events.1005.desc: "«Han pasado años desde tu ascensión al trono de [ROOT.Char.GetPrimaryTitle.GetName]. Eres [ROOT.Char.Custom('ES_ElLa')] [Select_CString( ROOT.Char.IsFemale, ' auténtica soberana', 'auténtico soberano' )] de estas tierras, protector[ROOT.Char.Custom('ES_XA')] de las gentes que moran en mi señorío».\n\nLas palabras de [messenger.GetName] están llenas con convicción. Su preocupación por mi señorío es genuina.\n\n«Sin embargo, vuestra frente está desnuda, aún no ha sido honrada con una corona ungida. Vuestra mano está vacía, privada de adornos bendecidos. Si bien puede que nadie ose desafiar vuestro poder, #EMP debéis#! celebrar una coronación como es debido. Para que no tema por el futuro de [ROOT.Char.GetPrimaryTitle.GetNameNoTier]»."
 ach_yearly_events.1005.a: "Tragam os ferreiros para mim."
 ach_yearly_events.1005.b: "Que os preparativos comecem."
 ach_yearly_events.1005.c: "Vou realizá-lo mais tarde."
 ach_yearly_events.1010.t: "Reconhecimento [ROOT.Char.Custom('GetTitleTierAdjective')]"
 ach_yearly_events.1010.desc: "Tornei-me [ROOT.Char.GetTitleAsName] de [ROOT.Char.GetPrimaryTitle.GetNameNoTier]; uma figura grandiosa e temível entre as fileiras da humanidade; minha vontade moldará o destino de milhares a cada decisão.\n\nComo senhor[ROOT.Char.Custom('ES_XA')] de [title.GetNameNoTier], conquistei meu direito de governar."
 ach_yearly_events.1010.desc_vassals: "Mas agora, o povo [title.GetAdjectiveNoTooltip] e todos aqueles que se reuniram sob o poderoso estandarte de [ROOT.Char.GetPrimaryTitle.GetName], os [ROOT.Char.Custom('GetLocalCommonerTermPlural')] do meu vassalo [vassal_title_1.GetAdjective], a nobreza [vassal_title_2.GetAdjective]… Esses súditos [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip] devem reconhecer meu status [ROOT.Char.Custom('GetTitleTierAdjective')]."
 ach_yearly_events.1010.desc_no_vassals: "Mas agora, a nobreza [title.GetAdjectiveNoTooltip] e todos os povos submetidos ao poderoso estandarte de [ROOT.Char.GetPrimaryTitle.GetName]… Esses súditos [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip] devem reconhecer meu posto [ROOT.Char.Custom('GetTitleTierAdjective')]."
 ach_yearly_events.1010.desc_outro_regalia: "\n\nPreciso realizar novos e gloriosos ritos de inauguração e justificar minhas insígnias exaltadas."
 ach_yearly_events.1010.desc_outro_crown: "\n\nDevo realizar novos e gloriosos ritos de inauguração, e justificar minha coroa exaltada."
 ach_coronation_suggestion_tt: "Você deveria considerar realizar uma [coronation|lE]"
 ach_yearly_events.1010.a: "Outra coroação, ainda maior, é necessária."
