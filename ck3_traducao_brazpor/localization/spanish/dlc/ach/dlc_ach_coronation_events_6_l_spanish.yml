 coronation_events.6140.t: "[spouse.Custom('ES_ElLa')|U] consorte [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip]"
 # Spouse is root
 coronation_events.6140_desc_intro_spouse: "Com a conclusão dos ritos da entronização [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip], agora a consorte do povo deve ser devidamente entronizada [spouse.Custom('ES_AlAla')] de [host.Custom('GetTitleTierAdjective')].\n\n"
 coronation_events.6140_desc_polygamous_spouse: "Com os ritos da entronização de [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip], agora deve ser devidamente empossad[spouse.Custom('ES_LoLa')] s consortes de [host.Custom('GetTitleTierAdjective')].\n\n"
 coronation_events.6140_desc_spouse: "Enquanto meu [spouse.Custom2('RelationToMe', SCOPE.sC('host'))] observa, sou conduzido pelos rituais do trono [host.GetPrimaryTitle.GetAdjective]."
 coronation_events.6140_desc_foreign_wife_no_court_spouse: "Minha educação [spouse.GetCulture.GetName] não me preparou bem para os estranhos ritos de [host.GetCulture.GetName] entre preces [host.GetFaith.GetAdherentNamePlural]… Não falo [host.GetCulture.GetLanguage.GetName] e devo recitar os juramentos apenas pela lembrança de seus sons."
 coronation_events.6140_desc_foreign_wife_spouse: "Minha criação [spouse.GetCulture.GetName] não me preparou bem para os estranhos ritos [host.GetCulture.GetName] entre preces [host.GetFaith.GetAdherentNamePlural]… Não falo [host.GetCourtLanguage.GetName] e devo recitar os juramentos confiando apenas na memória de seus sons."
 coronation_events.6140_desc_lowly_wife_spouse: "Nós, os humildes membros de [spouse.GetHouse.GetName] raramente fomos sequer testemunhas de tão régios procedimentos. Os obscuros votos de lealdade a [host.GetFaith.random_GoodGodNames] que devo proferir representam um certo desafio…"
 coronation_events.6140_desc_regal_wife_spouse: "Sou de uma linhagem gloriosa: [spouse.Custom('ES_LoLa')]s [spouse.Custom('GetDaughterSon')]s de [spouse.GetHouse.GetName] dominamos as cerimônias e me comporto com circunspecção e compostura."
 coronation_events.6140_desc_mid_wife_spouse: "Recito as palavras tradicionais e falo em termos esplêndidos de [host.GetFirstNameNoTooltip], [host.GetFaith.HighGodName] e meu dever para com o senhorio de minha [spouse.Custom2('RelationToMe', SCOPE.sC('host'))]."
 coronation_events.6140_desc_crown_spouse: "\n\nPouco depois —e com grande cerimônia— é colocada sobre minha cabeça uma coroa digna [spouse.Custom('ES_DelDela')] [spouse.Custom('WifeHusband')] do povo [host.Custom('GetTitleTierAdjective')] de [host.GetFirstNameNoTooltip]. [host.GetPrimaryTitle.GetName|U] nos aclama enquanto nos sentamos [Select_CString(And(host.IsFemale, spouse.IsFemale), 'juntas', 'juntos')] em nossos tronos."
 coronation_events.6140_desc_neutral_spouse: "\n\nPouco tempo depois —e com grande cerimônia—, sou conduzido a um lugar de honra ao lado de [host.GetFirstNameNoTooltip] e assumo o trono como seu [spouse.Custom('WifeHusband')] [host.Custom('GetTitleTierAdjective')]."
 # For everyone else
 coronation_events.6140_desc: "Uma vez concluídos os ritos da entronização [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip], agora será devidamente empossada como [spouse.GetTitleAsName] [spouse.Custom('ES_AlAla')] consorte do povo [host.Custom('GetTitleTierAdjective')]\n\n"
 coronation_events.6140_desc_polygamous: "Uma vez concluídos os ritos da entronização [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip], agora será devidamente consagrado como [spouse.GetTitleAsName] [spouse.Custom('ES_AlAla')] consorte sênior do povo [host.Custom('GetTitleTierAdjective')].\n\n"
 coronation_events.6140_desc_guest: "[spouse.Custom('ES_ElLa')|U] [spouse.Custom('WifeHusband')] [host.Custom('ES_DelDela')] [host.GetTitledFirstNameRegnal|l] conduz os rituais com [host.Custom2('QuirkNounPosOrNeg', spouse.MakeScope.Char)] inconfundível."
 coronation_events.6140_desc_host: "Meu [host.Custom2('RelationToMe', SCOPE.sC('spouse'))] conduz os rituais com seu [host.Custom2('QuirkNounPosOrNeg', spouse.MakeScope.Char)] inconfundível."
 coronation_events.6140_desc_foreign_wife_no_court: "A educação dela [spouse.GetCulture.GetName] não a preparou bem para os ritos [host.GetCulture.GetName] em meio às preces de [host.GetFaith.GetAdherentNamePlural]: ela recita os juramentos em [host.GetCulture.GetLanguage.GetName] lembrando apenas de como soam."
 coronation_events.6140_desc_foreign_wife: "A educação dele/dela [spouse.GetCulture.GetName] não [spouse.Custom('ES_LoLa')] o/a preparou bem para os ritos [host.GetCulture.GetName] entre orações [host.GetFaith.GetAdherentNamePlural] : recita os juramentos em [host.GetCulture.GetCourtLanguage.GetName] recordando de memória como soam."
 coronation_events.6140_desc_lowly_wife: "Sua origem humilde fica de certa forma revelada quando [spouse.GetFirstName] se atrapalha com os votos mais obscuros de lealdade a [host.GetFaith.random_GoodGodNames]…"
 coronation_events.6140_desc_regal_wife: "Como testemunho de sua linhagem gloriosa, [spouse.GetFirstName] se levanta para recitar seus votos com gravidade e compostura."
 coronation_events.6140_desc_mid_wife: "[spouse.Custom('DaughterSon')|U] da [spouse.GetHouse.GetName], as palavras pronunciadas [host.Custom2('QuirkAdverbPosOrNeg', spouse.MakeScope.Char)] por [spouse.GetFirstName] carregam as marcas de sua nobre ascendência [spouse.GetCulture.GetName]."
 coronation_events.6140_desc_crown: "\n\nEm pouco tempo —e com grande cerimônia— a coroa é colocada sobre a cabeça de [spouse.GetFirstNameNoTooltip] pela primeira vez.. [host.GetPrimaryTitle.GetDefinitiveName|U] aclama seu [spouse.GetTitleAsNameNoTooltip]."
 coronation_events.6140_desc_neutral: "\n\nPouco depois — e com grande cerimônia — [spouse.GetFirstNameNoTooltip] é conduzido(a) ao seu lugar de honra ao meu lado, e ele(a) assume o trono como [spouse.GetTitleAsNameNoTooltip|l] de [host.GetPrimaryTitle.GetNameNoTier]"
 coronation_events.6140.a_like: "Infelizmente, preciso me livrar dest[spouse.Custom('ES_EA')] [spouse.GetWomanMan] tão [spouse.Custom('ComplimentAdjective')]…"
 coronation_events.6140.a_dislike: "#EMP Debo#! me livrar des[spouse.Custom('ES_EA')] [spouse.GetWomanMan] [spouse.Custom('InsultAdjective')]…"
 coronation_events.6140.a: "Preciso me livrar desta[spouse.Custom('ES_EA')] [spouse.GetWomanMan]"
 coronation_magnificence_spouse_effects_tt: "#EMP #low Estos efectos aumentarán por la [coronation_magnificence|lE] de la [coronation|lE]#!#!"
 coronation_events.6140.b_like: "Meu [spouse.GetTitleAsNameNoTooltip], meu doce amor… [spouse.GetFirstNameNoTooltip]!"
 coronation_events.6140.b_dislike: "Meu [spouse.GetTitleAsNameNoTooltip]… #EMP [spouse.GetSheHe]#!."
 coronation_events.6140.b: "Meu [spouse.GetWifeHusband], meu [spouse.GetTitleAsNameNoTooltip]… [spouse.GetFirstNameNoTooltip]."
 coronation_events.6140.c: "Minha parte na coroação do meu [host.Custom('WifeHusband')] terminou."
 coronation_events.6140.c_flavor: "Seguramente lidar com o mundo [ROOT.Char.GetPrimaryTitle.GetAdjective] ocupe grande parte do meu tempo. Mas ser [spouse.Custom('ES_ElLa')] consorte de espírito [host.Custom('GetTitleTierAdjective')] de [host.GetPrimaryTitle.GetNameNoTier]… isso já é algo."
 coronation_spouse_hostile_scheme_bonus_tt: "Você terá uma [success_chance|lE] de #P +15#! em [hostile_schemes|lE] contra [spouse.GetShortUIName]"
 coronation_events.6140.d_likes_spouse: "Um dia glorioso para [spouse.GetFirstNameNoTooltip]!"
 coronation_events.6140.d_dislikes_spouse: "Ainda é [Select_CString(spouse.IsFemale, 'uma desgraçada', 'um desgraçado' )]..."
 coronation_events.6140.d_dislikes_host: "Que [ROOT.Char.GetFaith.HighGodName] te ajude, [spouse.GetFirstNameNoTooltip]…"
 coronation_events.6140.d_likes_host: "Cuide bem do seu caro[host.Custom('ES_XA')] [host.Custom('WifeHusband')], [spouse.GetFirstNameNoTooltip]."
 coronation_events.6140.d: "[host.Custom('ES_ElLa')|U] [host.GetTitleAsNameNoTooltip] tem sua [spouse.GetTitleAsNameNoTooltip|l]."
 coronation_events.6140.aa: "Então… [spouse.GetSheHe] agora segue o credo [host.GetFaith.GetAdherentNameNoTooltip], não é?"
 coronation_events.6140.aa_success: "Se [spouse.GetHerHim] é convertida à fé"
 coronation_events.6140.aa_fail: "[spouse.GetSheHe|U] sofreu ritos pagãos por sua causa"
 coronation_events.6140.aa.flavor: "Não consegue ver [spouse.GetFirstNameNoTooltip] que, pela mão sagrada de [anointer.Custom('ES_DelDela')] [anointer.GetTitledFirstNameNoTooltipRegnal|l], pode-se dizer que esta cerimônia [spouse.GetHerHim] o(a) reconheceu como um(a) dos fiéis [host.GetFaith.GetAdjectiveNoTooltip]? Meu/minha [spouse.GetWifeHusband] deve abraçar sua conversão!"
 anointment_available_because_magnificence_tt: "#EMP #low Esta opção está disponível por a [coronation_magnificence|lE] de seu [anointment|lE]"
 ach_yearly_crown_name: "Coroa régia de [owner.GetFirstNameNoTooltip]"
 ach_yearly_crown_desc: "Encomendada às pressas por [owner.GetName] para ser usada em sua coroação de espírito [owner.Custom('GetTitleTierAdjective')], esta coroa cerimonial traz uma simbologia [owner.GetCulture.GetName] distinta, típica dos artesãos de [owner.GetCapitalLocation.GetName], entre suas modestas joias."
 ach_yearly_regalia_name: "Vestimenta de coroação de [owner.GetFirstNameNoTooltipRegnal]"
 ach_yearly_regalia_desc: "Fornecida pela casa [owner.Custom('GetTitleTierAdjective')] logo antes da coroação de [owner.GetName], esta insígnia invoca a fidelidade [owner.GetFaith.GetAdjective] a [owner.GetFaith.random_GoodGodNames] e o domínio régio sobre o povo [owner.GetCulture.GetName] em igual medida."
 coronation_events.6150.t: "Um intercessor [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip]"
 coronation_events.6150.desc: "Oh, [ROOT.Char.Custom('FormalComplimentAdjective')] [ROOT.Char.GetTitleAsName], vos sois o rosto a ser contemplado, vossa é a voz destes ritos sagrados!, prodiga [advisor.Custom('ES_ElLa')] [advisor.GetTitledFirstName|l], meu [advisor.GetCouncilTitle|l]. Grandes soberanos e muitos [ROOT.Char.Custom('GetLowOfficialPlural')] vieram contemplar vosso reinado… e que posição assumirão diante de [Select_CString( ROOT.Char.IsFemale, 'a nova', 'o novo' )] [ROOT.Char.GetTitleAsNameNoTooltip] de seu [ROOT.Char.GetPrimaryTitle.GetNameNoTier].\n\nEnquanto vós vos ocupais com palavras formais, assuntos oficiais… #EMP eu#! sou livre para trabalhar em cantos tranquilos e reforçar vossa vontade àqueles como… talvez [neighbor.GetName]?."
 coronation_events.6150.a: ""Interceda pela lealdade de [disobedient_vassal.GetFirstNameNoTooltip] em meu nome"."
 coronation_events.6150.a.flavor: "As notícias dos meus apelos se espalharão, da acolhida e da gentileza prometidas pelo meu lar… mas, por [ROOT.Char.GetFaith.HighGodName]! juro por [disobedient_vassal.GetFirstNameNoTooltip] que terei a obediência de"
 coronation_events.6150.b: ""Dê uma visita informal aos nossos ilustres visitantes!""
 coronation_events.6150.b.flavor: "! A presença de notáveis poderosos animará toda a [location.GetNameNoTooltip]! Levai-os perante os tesouros da minha coleção [ROOT.Char.Custom('GetTitleTierAdjective')] e que jamais se esqueça a lembrança de sua alta reverência!"
 coronation_tour_of_notables_modifier: "Agraciados pelos potentados"
 coronation_tour_of_notables_modifier_desc: "Permanece viva a lembrança dos poderosos governantes que se misturaram com a população local e se ajoelharam, admirados, diante dos tesouros locais."
 coronation_events.6150.c: "Tal [confederation.GetName] me irrita…"
 coronation_events.6150.c.flavor: "… por sorte, seus membros se aventuraram até aqui, e seus olhos brilhantes revelaram que eles trocariam a lealdade por ouro!"
