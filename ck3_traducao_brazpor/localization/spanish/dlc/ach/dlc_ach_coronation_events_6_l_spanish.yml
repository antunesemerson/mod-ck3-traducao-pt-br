l_spanish:
 coronation_events.6000.t: "A confederação se reúne"
 coronation_events.6000.desc: "As lágrimas brilham nos olhos dos meus companheiros chefes — lágrimas de alegria e riso!\n\nEntre nós está meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('host'))] [host.GetFirstName], humilde, sem se colocar acima dos demais como algum imperador frio e estrangeiro. Noss[host.Custom('ES_OA')] [host.GetTitleAsName|l] brinca com o cavalo de [other_vassal.GetFirstNameNoTooltip] até o animal morder os dedos d\n\nPode ser que já não estejamos alinhados como uma verdadeira linha de batalha de iguais, mas... ainda somos [host.GetPrimaryTitle.GetDefinitiveName] e este dia é nosso."
 coronation_events.6000.a: "Agora eu juro: #EMP a Confederação é eterna!#!."
 coronation_events.6000.a.flavor: "Que estes não sejam os anos derradeiros de [host.GetPrimaryTitle.GetNameNoTooltip]! Mas sim seu verdadeiro renascimento!"
 coronation_events.6000.b: ""Venham, família, que seus parentes juramentados os reconheçam!""
 coronation_events.6000.b.flavor: "Com risos de guerreiros e sorrisos de mulheres, minha família iluminará este banquete de coroação."
 coronation_events.6000.c: "Podem ser tempos estranhos, mas ainda somos um só."
 confederation_remove_destroy_chance_tt: "@alert_icon! #alert_trial [host.GetPrimaryTitle.GetName] ya no se destruirá cuando su [holder|lE] consiga otro [kingdom|lE]#!"
 if_host_accepts_oath_tt: "#high Si tu [liege|lE] acepta esta promesa:#!"
 confederation_join_war_offer_tt: "[loyal_vassal.GetShortUIName|U] [Select_CString( loyal_vassal.IsLocalPlayer, 'vai se unir', 'vai se unir' )] automaticamente a as [wars|lE] defensivas de [Select_CString( host.IsLocalPlayer, 'seu senhorio', host.GetShortUIName )] enquanto [host.GetPrimaryTitle.GetNameNoTier] continuar sendo o [primary_title|E] de [Select_CString( host.IsLocalPlayer, 'seu personagem', host.GetShortUIName )]"
 confederation_alliance: "[loyal_vassal.GetShortUIName|U] e [host.GetShortUIName] [Select_CString(Or(loyal_vassal.IsLocalPlayer, host.IsLocalPlayer), 'os convertís', 'se convierten')] em [allies|lE]"
 best_commander_gains_defender_tt: "Seu [commander|lE] mais habilidoso recebe #P 3#! de [martial|lE] [martial_i] e a característica [GetTrait('unyielding_defender').GetName( GetNullCharacter )|l]"
 custom.every_fellow_vassal: "Todo colega [vassal|lE]"
 confederation_camraderie: "Camaradagem entre os demais [confederates|lE]"
 custom.every_other_culture_confederation: "Todo [culture|lE] de cada [liege|lE] ou colega [vassal|lE]"
 tooltip_confederation_vote_strength_coronation: "Intrigas durante a [coronation|lE]: $VALUE|=+0$"
 confederation_elective_extra_vote: "Você ganha #P 1#! de [vote_strength|lE] de [GetLaw('confederation_elective_succession_law').GetName] por #high 10 años#!"
 confederation_elective_extra_vote_2: "Você recebe #P 2#! de [vote_strength|lE] de [GetLaw('confederation_elective_succession_law').GetName] por #high 10 años#!"
 improved_because_intent_tt: "#EMP #low Esta opción ha mejorado por tu intención [THIS.Char.GetInvolvedActivityIntent.GetName|l]#!#!"
 harm_confederation_candidate_vote_tt: "A [candidate_score|lE] de [Select_CString( confederation_heir.IsLocalPlayer, 'seu personagem', confederation_heir.GetShortUIName )] de [GetLaw('confederation_elective_succession_law').GetName] é reduzida em #N 20#! por #high 10 anos#!"
 confederation_harm_candidacy_tt: "Difamado durante a [coronation|lE]: $VALUE|=+0$"
 confederation_house_promoted_tt: "Politicagem de [house|lE] durante a [coronation|lE]: $VALUE|=+0$"
 house_confederation_vote_bonus_tt: "Os membros da sua [house|lE] ganham #P 20#! de [candidate_score|lE] de [GetLaw('confederation_elective_succession_law').GetName] durante #high 10 años#!"
 custom.house_members_beneath_host: "Cada membro da sua [house|lE] em [host.GetPrimaryTitle.GetName]"
 coronation_events.6001.t: "Nossas vozes e as eras"
 coronation_events.6001.desc: "#EMP "[Select_CString( ROOT.Char.IsFemale, 'A primeira', 'O primeiro' )] entre os caudilhos! [ROOT.Char.GetTitleAsName|U] por juramento sagrado e aclamação das tribos!"#!\n\n[loyal_vassal.Custom('ES_ElLa')|U] [loyal_vassal.GetTitledFirstName|l] empunha sua espada em minha direção, com a mão sobre o coração. Ele para de gritar e faz uma promessa solene.\n\n"Não conhecemos tal [old_de_jure.GetBaseName] em [loyal_vassal.GetPrimaryTitle.GetBaseNameNoTier]: mas amamos a [ROOT.Char.GetPrimaryTitle.GetDefinitiveName] e meu povo jura honrá-la para sempre! #EMP Para sempre!#!"."
 coronation_events.6001.a: ""Ouçam-me bem. Construirei um futuro para nós"."
 coronation_events.6001.b: ""Esta irmandade deve viver para sempre!""
 coronation_events.6001.c: "E ajudar nossa absurda confederação a sobreviver...? Não."
 coronation_events.6001.c.flavor: "Não quando eu poderia ser [Select_CString( ROOT.Char.IsFemale, 'uma verdadeira', 'um verdadeiro' )] [ROOT.Char.GetTitleAsNameNoTooltip|l], como nos tempos antigos..."
 coronation_events.6010.t: "Aquele que defende"
 coronation_events.6010.desc: "Um assentamento nos arredores de [location.GetTitle.GetBaseNameNoTier] queima.\n\n"Saqueadores", explica um [host.Custom('KnightCultureNoTooltipLowercase')] [host.GetPrimaryTitle.GetAdjective]. "Marginais das tribos. [assailer.Custom('ES_ElLa')|U] [assailer.GetTitleAsName|l] de [assailer.GetPrimaryTitle.GetNameNoTier] os manda até aqui. Paga essa escória para insultar [host.Custom('ES_AlAla')] [host.GetTitleAsName|l] da nossa confederação".\n\n"[host.Custom('ES_ElLa')|U] [host.GetTitledFirstNameNoTooltip|l] assume o trono #EMP sol[host.Custom('ES_OA')]#!", murmura um chefe. "Temo que sentiremos falta dos tempos em que nossos povos enfrentavam juntos as desgraças…"."
 coronation_events.6010.a: "#EMP Meus guerreiros ainda lutam por todos nós!#!."
 coronation_events.6010.b: ""Nosso trono não é algo sagrado…""
 coronation_events.6010.b.flavor: "… e proclamá-lo não é uma grande injustiça."
 coronation_events.6010.c: ""Se #EMP me#! escutasse, essas humilhações acabariam!""
 coronation_events.6010.d: "Todos devemos jurar a vigília de outrora."
 confederation_claim_throne: "Você desbloqueia a [scheme|lE] de [GetScheme('claim_throne').GetTypeName|l]"
 confederation_warrior_modifier_stacking_tt: "Este [modifier|lE] se acumulará se for concedido por outro dos [vassals|lE] durante a [coronation|lE]"
 confederation_warrior_modifier: "Guerreiros da Confederação"
 confederation_warrior_modifier_desc: "A banda de guerra deste personagem está repleta de defensores do reino exaltados."
 confederation_elective_claim_throne: "[succession|E] [GetLaw('confederation_elective_succession_law').GetName]: $VALUE|+=0$"
 coronation_vote_log_title: "Voto de confederação assegurado"
 coronation_vote_log: "A articulação política de [Select_CString( root_scope.IsLocalPlayer, 'tu personaje', root_scope.GetShortUIName )] [Select_CString( root_scope.IsLocalPlayer, 'te', 'le' )] ganhou #P 1#! de [vote_strength|lE] de [GetLaw('confederation_elective_succession_law').GetName] durante #high 10 años#!"
 coronation_vote_log_2_title: "Dois votos de confederação obtidos"
 coronation_vote_log_2: "O jogo político de [Select_CString( root_scope.IsLocalPlayer, 'tu personaje', root_scope.GetShortUIName )] [Select_CString( root_scope.IsLocalPlayer, 'te', 'le' )] ganhou #P 2#! de [vote_strength|lE] de [GetLaw('confederation_elective_succession_law').GetName] durante #high 10 años#!"
 coronation_house_candidates_log_title: "Os candidatos da casa buscam a sucessão"
 coronation_house_candidates_log: "A [house|lE] [root_scope.GetHouse.GetName] impressionou a todos e seus descendentes desfrutam de #P 20#! de [candidate_score|lE] em [GetLaw('confederation_elective_succession_law').GetName] durante #high 10 años#!"
 admires_regal_kingdoms: "Admira os reinos reais"
 admires_regal_kingdoms_desc: "Este governante revira os olhos diante dos ideais de Confederação. Esses mesmos olhos ficam sonhadoramente vidrados quando se mencionam pompa e circunstância."
 confederation_king_accepts_promise_tt: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] aceita sua promessa"
 confederation_king_rejects_promise_tt: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] rejeita sua promessa"
 coronation_confederation_de_jure_log_title: "De iure pela confederação"
 coronation_confederation_de_jure_log: "[host.GetShortUIName] e [host.GetShortUIName] [Select_CString(Or(loyal_vassal.IsLocalPlayer, host.IsLocalPlayer), 'reforzasteis', 'reforzaron')] o reconhecimento [de_jure|El] de [host.GetPrimaryTitle.GetDefinitiveName] em suas terras."
 coronation_confederation_defender_log_title: "Defensor juramentado à confederação"
 coronation_confederation_defender_log: "[loyal_vassal.GetShortUIName] [Select_CString( loyal_vassal.IsLocalPlayer, 'prometeu', 'prometeu' )] a [Select_CString( host.IsLocalPlayer, 'seu personagem', host.GetShortUIName )] ajudar a defender [host.GetPrimaryTitle.GetDefinitiveName]."
 confederate_king_youth_warrior_tt: "[host.GetShortUIName|U] e [warrior_youth.GetShortUIName] [Select_CString(Or(host.IsLocalPlayer, warrior_youth.IsLocalPlayer), 'os convertís', 'se convierten')] em [allies|lE]"
 adventurer_name_free_warriors: "Guerreiros livres [host.GetPrimaryTitle.GetAdjectiveNoTooltip]"
 adventurer_name_youths: "Jovens de [host.GetHouse.GetNameNoTooltip]"
 coronation_events.6011.t: "Uma causa comum"
 coronation_events.6011.desc: ""[assailer.GetName] traz o conflito! Para zombar da sua coroação, nosso vizinh[assailer.Custom('ES_OA')] nauseabund[assailer.Custom('ES_OA')] vizinh[assailer.Custom('ES_OA')] enviou saqueadores que viajaram de longe!", grita meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('loyal_vassal'))] [loyal_vassal.GetName] depois de me trazer a este lugar onde fui insultado por [assailer.Custom('ES_ElLa')] [assailer.GetTitledFirstNameNoTooltip|l]\n\nO que está queimando é um pequeno conjunto de cabanas nos arredores de [location.GetName]. Ainda assim, [loyal_vassal.Custom('ES_ElLa')] [loyal_vassal.GetTitledFirstNameNoTooltip|l] ferve de raiva.\n\n"[ROOT.Char.GetPrimaryTitle.GetDefinitiveName] ainda #EMP significa algo#!", jura, "e eu continuo pront[loyal_vassal.Custom('ES_OA')] a defendê-lo! Aceitai meu juramento de guerreir[loyal_vassal.Custom('ES_OA')]! A imundície de [assailer.GetPrimaryTitle.GetAdjective] — e todos os outros — vai enfrentar meus bandos de guerra quando escurecerem nossas terras!""
 coronation_events.6011.a: ""Baixem as armas. Tenham fé na paz [ROOT.Char.GetFaith.HighGodNamePossessive]"."
 coronation_events.6011.a.flavor: "Nossa confederação está bem abastecida para a guerra… Em vez disso, podemos abastecer os/as [ROOT.Char.GetFaith.HouseOfWorshipPlural] com oferendas."
 coronation_events.6011.b: ""Jovens e velhos: que nenhum guerreiro fique ocioso"."
 coronation_events.6011.b.flavor: "Em nossas casas, os jovens inquietos não sonham com guerra e aventura? Unamo-nos a eles, para que um dia possamos chamá-los para a batalha!"
 coronation_events.6011.c: "Lutem comigo, os mais valentes entre os [loyal_vassal.GetCulture.GetCollectiveNounNoTooltip]!"
 coronation_events.6011.d_house: "[ROOT.Char.GetHouse.GetName] defende este domínio."
 coronation_events.6011.d: ""Descanse. Seu dever como [ROOT.Char.GetTitleAsNameNoTooltip|l] é a vigília"."
 mass_mob_dev_tt: "Todo [county|lE] do [domain|lE] de [supporter.GetShortUIName] vê seu [development|lE] reduzido em #N [supporter.MakeScope.Var('mass_mobilitization_development_value').GetValue|0]#!"
 mass_mob_fertility_tt: "Todo [county|lE] do [domain|lE] de [supporter.GetShortUIName] vê sua [Concept('county_fertility', 'fertilidad')|E] reduzida em #N [supporter.MakeScope.Var('mass_mobilitization_fertility_value').GetValue|0]#!"
 mass_mob_dev_progress_tt: "Todo [county|lE] do [domain|lE] de [supporter.GetShortUIName] vê seu [development_growth|lE] reduzido em #N [supporter.MakeScope.Var('mass_mobilitization_development_progress_value').GetValue|0]#!"
 coronation_mobilized_army_name: "A grande mobilização de [host.GetTitleAsNameNoTooltip]"
 coronation_supporter_declare_war_tt: "[supporter.GetShortUIName] inicia uma guerra contra [foe.GetShortUIName] por [title_claim_1.GetName]"
 coronation_supporter_declare_war_no_title_tt: "[supporter.GetShortUIName] inicia uma guerra contra [foe.GetShortUIName]"
 coronation_supporter_declare_war_2_tt: "[supporter.GetShortUIName] inicia uma guerra contra [foe_2.GetShortUIName] por [title_claim_2.GetName]"
 coronation_supporter_declare_war_no_title_2_tt: "[supporter.GetShortUIName] inicia uma guerra contra [foe_2.GetShortUIName]"
 coronation_events.6020.t: "Um cão de guerra para o [ROOT.Char.GetTitleAsNameNoTooltip]"
 coronation_events.6020.desc: ""Como podemos sorrir?", rosna meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('supporter'))], [supporter.GetName]. "Façam correr as taças de [ROOT.Char.Custom('RegionalDrink')], louvem a paz, orem pelo futuro do reino..."\n\n[supporter.GetFirstNameNoTooltip] encara fixamente um grupo suspeito de nobres do país [foe.GetPrimaryTitle.GetAdjective].\n\n"...enquanto essa #EMP alimaña#! nos olha com ódio e trama a sua queda, meu [ROOT.Char.GetTitleAsName|l]!", cospe. "Dê-me licença para fazer soar meu chifre de guerra! Vou acabar com [foe.GetName], não tenham dúvida!""
 coronation_events.6020.a: ""Esvaziai vossas terras em vossos exércitos, e atacai!""
 coronation_events.6020.b: "Concentre toda a [supporter.GetPrimaryTitle.GetNameNoTierNoTooltip] na derrota [foe.Custom('ES_DelDela')] [foe_2.GetTitledFirstNameNoTooltip|l]!"
 coronation_events.6020.c: ""Esmaguem [foe.Custom('ES_AlAla')] [foe.GetTitledFirstNameNoTooltip|l], com minha permissão"."
 coronation_events.6020.d: ""[foe_2.Custom('ES_ElLa')|U] [foe_2.GetTitledFirstNameNoTooltip] é seu/ sua[foe_2.Custom('ES_OA')] inimig[foe_2.Custom('ES_OA')]!""
 coronation_events.6020.e: ""Venham, venham. Tal paixão pertence à minha mesa de jantar"."
 coronation_supporter_declares_war_log_title: "Partidário lançado à guerra"
 coronation_supporter_declares_war_log: "[supporter.GetShortUIName], empoderado[supporter.Custom('ES_OA')] e encorajado[supporter.Custom('ES_OA')] pela coroa, desafiou [supporter_war_target.GetShortUIName] para a guerra."
 coronation_events.6030.t: "Amigos [host.Custom('ES_DelDela')] novo[host.Custom('ES_OA')] [host.GetTitleAsNameNoTooltip|l]"
 coronation_events.6030.t_feast: "Amigos [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip|l]"
 coronation_events.6030.desc: "Ah, sim, [ROOT.Char.GetFirstName], murmura [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] com malícia. É #EMP bom#! ser [host.GetTitleAsNameNoTooltip]….\n\nDiante de [Select_CString(And(ROOT.Char.IsFemale, host.IsFemale), 'nós', 'nós')], uma sala repleta de carne nua. As cortesãs coram de forma sedutora enquanto [host.GetFirstNameNoTooltip] se vira para mim com um sorriso obsceno. Um[host.Custom('ES_XA')] [host.GetTitleAsNameNoTooltip] deve ser generoso. Qualquer uma des[fearsome_courtesan.Custom('ES_OA')]s [fearsome_courtesan.GetWomenMen] participantes… pode ser sua, por esta noite, por muitas noites… Es[fearsome_courtesan.Custom('ES_OA')]s [fearsome_courtesan.Custom('GirlBoyPlural')] ansiam compartilhar seus #EMP talentos#! com você."
 coronation_events.6030.a: "Aquele[fearsome_courtesan.Custom('ES_EA')] [fearsome_courtesan.GetWomanMan] imponente poderia #EMP aplastarme!#!"
 coronation_events.6030.a_flavor: "Ah, morrer asfixiado(a) em suas mãos!"
 coronation_events.6030.a_thighs: "Ah, morrer asfixiado entre suas coxas!"
 coronation_events.6030.b: "Este é um garoto #EMP malo#!…"
 coronation_events.6030.b_minx: "Temos aqui uma descarada muito #EMP lista#!…"
 coronation_events.6030.b_flavor: "Sua boca sorridente deve abrigar umas mentiras tão deliciosas…"
 coronation_events.6030.c: "Um homem mais velho e inteligente, com mãos como couro…"
 coronation_events.6030.c_dame: "Uma velha dama sábia, astuta e severa…"
 coronation_events.6030.c_flavor: "Alguém que, para variar, #EMP me#! me diga o que fazer… Um[experienced_courtesan.Custom('ES_XA')] [experienced_courtesan.GetWomanMan] de mundo que me guie com um toque experiente."
 coronation_events.6030.d: "Dois irmãos encantadores? Ficarei com os dois!"
 coronation_events.6030.d_sisters: "Duas irmãs encantadoras? Eu quero as duas!"
 coronation_events.6030.d_flavor: "Pois… [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip] não se sente generos[host.Custom('ES_OA')]?"
 coronation_events.6030.e_expose: "Lascívia vil! Todos ficarão sabendo disso!"
 coronation_events.6030.e: "Talvez possamos apenas conversar sobre poesia..."
 coronation_host_orgy_exposed_log_title: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] pego[host.Custom('ES_OA')] com cortesãs."
 coronation_host_orgy_exposed_log: "As festivas escapadas sexuais [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l] foram expostas e denunciadas por [exposer.Custom('ES_ElLa')] [exposer.GetTitledFirstName|l]."
 host_has_courtesan_hooks_tt: "#weak [host.GetShortUIName] tem [hooks|lE] sobre todos estes cortesãos e cortesãs#!"
 coronation_events.6100.t: "A coroação de [host.GetFirstNameNoTooltipRegnal]"
 # Host loc
 coronation_events.6100.desc_intro: "Adiante com os símbolos do poder [host.Custom('GetTitleTierAdjective')]."
 coronation_events.6100.desc_byzantine: "A [Glossary( 'clámide', 'CHLAMYS_GLOSS' )] púrpura, resplandecente à luz de mil velas, é posta sobre meus ombros. #EMP «¡Gloria a Dios en la alturas!»#!, clamam os reunidos. #EMP «¡Y paz en la Tierra!#!». O prelado entoa: «Em nome do Pai, do Cristo [Glossary( 'Pantocrátor', 'PANTOKRATOR_GLOSS')] e do Espírito Santo, eu vos conclamo, [host.GetFirstNameRegnal], a reinar como [Glossary( 'augusto', 'AUGOUSTOS_GLOSS')] dos [Glossary( 'romaioi', 'ROMAIOS_GLOSS' )] e pastor dos fiéis de Deus»."
 coronation_events.6100.desc_byzantine_femme: "A [Glossary( 'clámide', 'CHLAMYS_GLOSS' )] púrpura, resplandecente à luz de mil velas, é colocada sobre meus ombros. #EMP "Glória a Deus nas alturas!"#!, gritam os reunidos. #EMP "E paz na Terra!"#!. O prelado entoa: "Em nome do Pai, do Cristo [Glossary( 'Pantocrátor', 'PANTOKRATOR_GLOSS')] e do Espírito Santo, eu te encarrego, [host.GetFirstNameRegnal], reinar como [Glossary( 'augusta', 'AUGOUSTOS_GLOSS')] dos [Glossary( 'romaioi', 'ROMAIOS_GLOSS' )] e pastora dos fiéis de Deus.""
 CHLAMYS_GLOSS: "Uma vestimenta volumosa de seda usada pelos oficiais bizantinos, um símbolo de poder secular sobre o estado imperial. Presa por uma fíbula, a #G clámide#! trazia painéis grandes incrustados de gemas chamados #EMP tablia#!, que eram prerrogativa dos imperadores quando feitos em ouro."
 coronation_events.6100.desc_christian: "Cinge-se à minha cintura a reluzente [host.Custom('GetRegionalSword')]. O cetro da autoridade soberana, erguido em minha mão. Meus dedos se fecham em torno do [Glossary( 'globo crucífero', 'GLOBUS_CRUCIGER_GLOSS')]; ao meu corpo chegam os [Glossary( 'armillae', 'ARMILLS_GLOSS')] e o [Glossary( 'palio', 'PALLIUM_GLOSS')]. As preces ecoam."
 coronation_events.6100.desc_high: "A reluzente [host.Custom('GetRegionalSword')] é presa à minha cintura. Colocam sobre mim as joias mais belas, os mantos mais gloriosos. Como um só, o melhor de [host.GetPrimaryTitle.GetTierAsNameNoTooltip] — os [host.Custom('GetLowOfficialPlural')], [host.GetFaith.BishopNeuterPlural] e [host.Custom('KnightCulturePluralNoTooltipLowercase')] desta terra — clamam as últimas orações e, por fim: "#EMP [host.GetFaith.HighGodName], contempla noss[host.Custom('ES_OA')] amad[host.Custom('ES_OA')] [host.GetTitleAsNameNoTooltip]!#!"."
 coronation_events.6100.desc_low: "É cingido à minha cintura um velho exemplar de [host.Custom('GetRegionalSword')]. Colocam sobre mim joias chamativas e mantos gastos. Até a carrancuda hoste do [host.GetPrimaryTitle.GetTierAsNameNoTooltip] — os [host.Custom('GetLowOfficialPlural')], [host.GetFaith.BishopNeuterPlural] e [host.Custom('KnightCulturePluralNoTooltipLowercase')] desta terra miserável —, até eles são impelidos a murmurar as últimas orações e proferir o derradeiro: "#EMP [host.GetFaith.HighGodName], contempla noss[host.Custom('ES_OA')] [host.GetTitleAsNameNoTooltip]!#!"."
 coronation_events.6100.desc_generic: "A espada cintilante de [host.Custom('GetRegionalSword')] é presa ao meu corpo. Joias incrustadas e mantos pesados são colocados sobre mim. Em uníssono, a nobreza de [host.GetPrimaryTitle.GetTierAsNameNoTooltip] — os [host.Custom('GetLowOfficialPlural')], [host.GetFaith.BishopNeuterPlural] e [host.Custom('KnightCulturePluralNoTooltipLowercase')] desta terra — recita as orações finais, e a última: "#EMP [host.GetFaith.HighGodName], contempla noss[host.Custom('ES_OA')] [host.GetTitleAsNameNoTooltip]!#!"."
 coronation_events.6100.desc_ending_byzantine_cynical: "\n\nCom a graça dos tesouros [host.Custom('GetTitleTierAdjective')], me prostro diante de [crowner.Custom('ES_ElLa')] [crowner.GetTitledFirstNameRegnal|l]. Afirma que reino pela graça de Cristo, que apenas a misericórdia de Deus protege o [ROOT.Char.GetPrimaryTitle.GetTierAsName]…, mas eu sou [Select_CString(ROOT.Char.IsFemale, 'la pastora', 'el pastor' )] do povo. E sou [ROOT.Char.GetTitleAsNameNoTooltip]. O destino dos [Glossary( 'romaioi', 'ROMAIOS_GLOSS' )] pertence a mim, e somente a mim…"
 coronation_events.6100.desc_ending_byzantine: "\n\nCom a graça dos antigos tesouros [host.Custom('GetTitleTierAdjective')] me prostro diante de [crowner.Custom('ES_ElLa')] [crowner.GetTitledFirstNameRegnal|l] e diante de Cristo, pois é por Sua santa graça que reino, e por Sua misericórdia que [ROOT.Char.GetPrimaryTitle.GetTierAsName] perdura. E, por fim…"
 coronation_events.6100.desc_ending_non_abrahamic_vassal: "\n\nAgraciad[host.Custom('ES_OA')] com o tesouro [host.Custom('GetTitleTierAdjective')], eu me ajoelho. Pois o diadema do meu [host.GetPrimaryTitle.GetTierAsName], o símbolo de [host.GetPrimaryTitle.GetNameNoTierNoTooltip], a partir deste momento sempre estará… sobre minha cabeça."
 coronation_events.6100.desc_ending_non_abrahamic: "\n\nAgraciad[host.Custom('ES_OA')] com o tesouro [host.Custom('GetTitleTierAdjective')], ajoelho-me… só desta vez, a última. Por [host.Custom('ES_ElLa')] [host.GetTitleAsName] de [host.GetPrimaryTitle.GetNameNoTier], estou prestes a me tornar de fato em [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip], e [host.GetSheHe] não se ajoelha diante de ninguém."
 coronation_events.6100.desc_ending_vassal: "\n\nAgraciad[host.Custom('ES_OA')] com o tesouro [host.Custom('GetTitleTierAdjective')], me ajoelho. Para [host.Custom('ES_ElLa')] [host.GetTitleAsName|l] de [host.GetPrimaryTitle.GetNameNoTier], certamente vou me tornar [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip], e [host.GetSheHe] se ajoelha perante [host.GetLiege.Custom('ES_ElLa')] [host.GetLiege.GetTitleAsName] do país [host.GetLiege.GetPrimaryTitle.GetAdjective] e perante [host.GetFaith.HighGodName]."
 coronation_events.6100.desc_ending: "\n\nAgraciado[host.Custom('ES_OA')] com o tesouro [host.Custom('GetTitleTierAdjective')], me ajoelho... esta única e última vez. Por [host.Custom('ES_ElLa')] [host.GetTitleAsName] de [host.GetPrimaryTitle.GetNameNoTier], vou me tornar verdadeiramente em [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip], e [host.GetSheHe] só se ajoelha diante de [host.GetFaith.HighGodName]."
 # Guest loc
 coronation_events.6100.desc_byzantine_guest: "A [Glossary( 'clámide', 'CHLAMYS_GLOSS' )] púrpura, resplandecente à luz de mil velas, é colocada sobre os ombros de [host.GetFirstNameRegnal]. #EMP «¡Gloria a Dios en la alturas!»#!», gritam os reunidos. #EMP «¡Y paz en la Tierra!#!. O prelado entoa: «Em nome do Pai, do Cristo [Glossary( 'Pantocrátor', 'PANTOKRATOR_GLOSS')] e do Espírito Santo, eu te ordeno, [host.GetFirstNameRegnal], reinar como [Glossary( 'augusto', 'AUGOUSTOS_GLOSS')] dos [Glossary( 'romaioi', 'ROMAIOS_GLOSS' )] e pastor dos fiéis de Deus»."
 coronation_events.6100.desc_byzantine_femme_guest: "A [Glossary( 'clámide', 'CHLAMYS_GLOSS' )] púrpura, resplandecente à luz de mil velas, é colocada sobre os ombros de [host.GetFirstNameRegnal]. #EMP "Glória a Deus nas alturas!"#!, gritam os reunidos. #EMP "E paz na Terra!"#!. E o prelado entoa: "Em nome do Pai, do Cristo [Glossary( 'Pantocrátor', 'PANTOKRATOR_GLOSS')] e do Espírito Santo, eu te encarrego, [host.GetFirstNameRegnal], reinar como [Glossary( 'augusta', 'AUGOUSTOS_GLOSS')] dos [Glossary( 'romaioi', 'ROMAIOS_GLOSS' )] e pastora dos fiéis de Deus.""
 coronation_events.6100.desc_christian_guest: "É preso à cintura de [host.GetFirstName] tão reluzente [host.Custom('GetRegionalSword')]. O cetro da autoridade soberana — tomado em sua mão. Seus dedos envolvem o [Glossary( 'globo crucífero', 'GLOBUS_CRUCIGER_GLOSS')]; ao seu corpo chegam as [Glossary( 'armillae', 'ARMILLS_GLOSS')] e o [Glossary( 'palio', 'PALLIUM_GLOSS')]. As preces ecoam."
 coronation_events.6100.desc_high_guest: "Está cingida à cintura de [host.GetFirstName] tão reluzente [host.Custom('GetRegionalSword')]. Colocam sobre [host.GetSheHe] as joias mais belas, os mantos mais gloriosos. Em uníssono, a nata de seu [host.GetPrimaryTitle.GetTierAsNameNoTooltip|l] — os [host.Custom('GetLowOfficialPlural')], [host.GetFaith.BishopNeuterPlural] e [host.Custom('KnightCulturePluralNoTooltipLowercase')] daquela terra — clamam as últimas preces e, por fim: "#EMP [host.GetFaith.HighGodName], contempla noss[host.Custom('ES_OA')] amad[host.Custom('ES_OA')] [host.GetTitleAsNameNoTooltip|l]!#!"."
 coronation_events.6100.desc_low_guest: "Está cingido à cintura de [host.GetFirstName] um velho exemplar de [host.Custom('GetRegionalSword')]. Colocam sobre [host.GetSheHe] joias berrantes e mantos gastos. Até a rude comitiva de seu [host.GetPrimaryTitle.GetTierAsNameNoTooltip|l] — os [host.Custom('GetLowOfficialPlural')], [host.GetFaith.BishopNeuterPlural] e [host.Custom('KnightCulturePluralNoTooltipLowercase')] daquela terra miserável —, até eles se veem impelidos a murmurar as preces finais e pronunciar a derradeira: "#EMP [host.GetFaith.HighGodName], contempla noss[host.Custom('ES_OA')] [host.GetTitleAsNameNoTooltip|l]!#!"."
 coronation_events.6100.desc_generic_guest: "É presa à cintura de [host.GetFirstName] tão reluzente exemplo de [host.Custom('GetRegionalSword')]. Colocam sobre seu corpo joias cravejadas e tecidos pesados. Em uníssono, a nobreza de seu [host.GetPrimaryTitle.GetTierAsNameNoTooltip|l] — os [host.Custom('GetLowOfficialPlural')], [host.GetFaith.BishopNeuterPlural] e [host.Custom('KnightCulturePluralNoTooltipLowercase')] daquela terra — recita as últimas preces, e a última: "#EMP [host.GetFaith.HighGodName], contempla noss[host.Custom('ES_OA')] [host.GetTitleAsNameNoTooltip|l]!#!"."
 coronation_events.6100.desc_ending_byzantine_guest: "\n\nCom a graça do antigo tesouro [host.Custom('GetTitleTierAdjective')] de [host.GetFirstNameNoTooltipRegnal] se ajoelha diante de [crowner.Custom('ES_ElLa')] [crowner.GetTitledFirstNameRegnal|l] e diante de Cristo, pois é por Sua santa graça que governa, e por Sua divina misericórdia que [ROOT.Char.GetPrimaryTitle.GetTierAsName] perdura. E, por fim…"
 coronation_events.6100.desc_ending_non_abrahamic_vassal_guest: "\n\nAgraciad[host.Custom('ES_OA')] com o tesouro [host.Custom('GetTitleTierAdjective')], ajoelha-se. Pois a diadema de seu [host.GetPrimaryTitle.GetTierAsName] , o símbolo de [host.GetPrimaryTitle.GetNameNoTierNoTooltip], a partir deste momento, estará sempre… acima de sua cabeça."
 coronation_events.6100.desc_ending_non_abrahamic_guest: "\n\nAgraciad[host.Custom('ES_OA')] com o tesouro [host.Custom('GetTitleTierAdjective')], [host.GetFirstNameNoTooltipRegnal] se ajoelha… esta única e última vez. Pois [host.Custom('ES_ElLa')] [host.GetTitleAsName] de [host.GetPrimaryTitle.GetNameNoTier], certamente vai se tornar em [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip], e [host.GetSheHe] não se ajoelha perante ninguém."
 coronation_events.6100.desc_ending_vassal_guest: "\n\nAgraciad[host.Custom('ES_OA')] com os tesouros [host.Custom('GetTitleTierAdjective')]. [host.GetFirstNameNoTooltipRegnal] se ajoelha. Pois [host.Custom('ES_ElLa')] [host.GetTitleAsName] de [host.GetPrimaryTitle.GetNameNoTier] está prestes a realmente se tornar: [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip] e [host.GetSheHe] se ajoelha perante [host.GetLiege.Custom('ES_ElLa')] [host.GetLiege.GetTitleAsName] do reino [host.GetLiege.GetPrimaryTitle.GetAdjective] e diante de [host.GetFaith.HighGodName]."
 coronation_events.6100.desc_ending_guest: "\n\nAgraciad[host.Custom('ES_OA')] com o tesouro [host.Custom('GetTitleTierAdjective')], [host.GetFirstNameNoTooltipRegnal] se ajoelha… só esta única e última vez. Pois [host.Custom('ES_ElLa')] [host.GetTitleAsName] de [host.GetPrimaryTitle.GetNameNoTier], certamente se tornará em [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip], e [host.GetSheHe] só se ajoelha diante de [host.GetFaith.HighGodName]."
 GLOBUS_CRUCIGER_GLOSS: "Um orbe com uma cruz no topo, geralmente de metal precioso. É segurado na mão como um elemento das insígnias reais e um símbolo do domínio do Salvador sobre o mundo inteiro."
 ARMILLS_GLOSS: "Um par de braçadeiras cerimoniais finamente trabalhadas, para serem usadas nos braços de um prelado ou monarca. Os #G armillae#! costumavam ser adornados com cenas como a Ressurreição e a Crucificação de Cristo."
 PALLIUM_GLOSS: "O manto impressionante de um monarca, uma vestimenta aparentada ao #G loros#! imperial grego e ao #G palio#! usado pelos oficiais da Igreja."
 coronation_events.6100.a: "A coroa é colocada sobre minha testa."
 coronation_events.6100.a_guest: "Se le coloca la corona sobre la frente."
 coronation_events.6100.a_guest_low: "A coroa foi colocada… mas por quanto tempo?"
 coronation_events.6100.a_flavor_decent: "E assim, a [Glossary( 'corona de coronación', 'CORONATION_CROWN_GLOSS')] do senhorio [host.GetPrimaryTitle.GetAdjectiveNoTooltip]."
 coronation_events.6100.a_flavor_low_guest: "Colocada sobre [host.GetFirstNameNoTooltipRegnal], a [Glossary( 'corona de coronación', 'CORONATION_CROWN_GLOSS')] do título principal [host.GetPrimaryTitle.GetAdjectiveNoTooltip] fica bem estranha…"
 coronation_events.6100.a_flavor_low: "No meio desta maldita cerimônia, mal consigo apreciar o toque da [Glossary( 'corona de coronación', 'CORONATION_CROWN_GLOSS')] do senhorio [host.GetPrimaryTitle.GetAdjectiveNoTooltip]…"
 coronation_events.6100.a_flavor_giant: "Por [host.GetFaith.HighGodName], ¡[crowner.Custom('ES_AlAla')] [crowner.GetTitledFirstNameNoTooltip|l]mal consegue pôr a diminuta [Glossary( 'corona de coronación', 'CORONATION_CROWN_GLOSS')]!"
 coronation_events.6100.a_flavor_adolescent: "Eis a minha [Glossary( 'corona de coronación', 'CORONATION_CROWN_GLOSS')]! E… #EMP Oh#!… Está quase caindo sobre meus olhos…"
 CORONATION_CROWN_GLOSS: "As coroas usadas na cerimônia de coroação eram, em alguns casos, as de uso diário. As #G coroas de coroação#! também podiam ser relíquias empoeiradas, apresentadas apenas para a ocasião singular."
 coronation_events.6101.desc_crowning_intro: "Alguns diriam que é uma desfaçatez que um[host.Custom('ES_XA')] [host.GetTitleAsName]erga tão alto a coroa para colocá-la sobre si mesm[host.Custom('ES_OA')] e, com isso, #EMP proclamarse#! um[host.Custom('ES_OA')] de [host.GetHerHim]s monarcas escolhid[host.Custom('ES_OA')]s [host.GetFaith.HighGodNamePossessive].\n\n"
 coronation_events.6101.desc_no_being_crowned_intro: "Um[host.Custom('ES_XA')] [host.GetTitleAsName], quando está vestido[host.Custom('ES_OA')] para a cerimônia e armado[host.Custom('ES_OA')] com a aprovação de seu povo…, pode coroar a si mesmo[host.Custom('ES_OA')]. Esta é a nossa tradição, embora alguns [host.GetFaith.BishopNeuterPlural|l] invejem este direito [host.Custom('GetTitleTierAdjective')].\n\n"
 # Host loc
 coronation_events.6101.desc_crowning_priests_iberian: "#EMP Ja!#! Os #EMP íberos#! não estamos de acordo. Nós nos comprometemos humildemente diante de Deus e #EMP a Santíssima Virgem Maria#!, e depois fazemos o que nos agrada!"
 coronation_events.6101.desc_crowning_priests_high: "Mas aqueles poucos [host.GetFaith.PriestNeuterPlural] com dúvidas cantam com vozes agudas e me observam com assombro enquanto começo o rito."
 coronation_events.6101.desc_crowning_priests_low: "Certamente, sob a cobertura dos sussurros da multidão, [host.GetFaith.PriestNeuterPlural] murmuram condenações sombrias."
 coronation_events.6101.desc_crowning_priests_mid: "À [host.GetFaith.NegativeAfterLife] com meus detratores! Não preciso de [host.GetFaith.PriestNeuter] algum."
 coronation_events.6101.desc_words_christian: "Enquanto seguro a diadema com a cruz nas mãos, recito #EMP Senhor Deus, Tu que estás acima de todos os reis; ao teu domínio pertencem todos os reinos do céu e da terra#!, e me coro senhor[host.Custom('ES_XA')] de [host.GetPrimaryTitle.GetNameNoTier].\n\n"
 coronation_events.6101.desc_words_generic: "Enquanto seguro a faixa de metal adornada de joias entre os dedos, pronuncio um discurso a todos os [host.GetPrimaryTitle.GetTierAsNameNoTooltip|l] por inteiro. Prometo vigilância, justiça, força… e me coroo senhor[host.Custom('ES_XA')] de [host.GetPrimaryTitle.GetNameNoTier].\n\n"
 coronation_events.6101.desc_ending_humble: "Com passos lentos e sombrios, aproximo-me do trono que me aguarda. Não é pouca coisa tornar-se um [host.GetTitleAsNameNoTooltip]."
 coronation_events.6101.desc_ending: "Por fim, me aproximo do trono soberano como [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip] que sempre estive destinad[host.Custom('ES_OA')] a ser."
 # Guest loc
 coronation_events.6101.desc_crowning_priests_high_guest: "Mas esses poucos [host.GetFaith.PriestNeuterPlural] com dúvidas cantam com vozes agudas e olham com assombro enquanto [host.GetFirstName], com espírito [host.Custom('FormalComplimentAdjective')], inicia o rito."
 coronation_events.6101.desc_crowning_priests_low_guest: "Certamente, sob o véu da multidão sussurrante, ouço os [host.GetFaith.PriestNeuterPlural] murmurar condenações sombrias."
 coronation_events.6101.desc_crowning_priests_mid_guest: "Mas os [host.GetFaith.PriestNeuterPlural] parecem dispostos a aceitar este rito. Talvez algum governante de meu [host.GetFaith.ReligiousText] fez o mesmo no passado."
 coronation_events.6101.desc_words_christian_guest: "Enquanto segura o diadema com a cruz em suas mãos, recita #EMP Senhor Deus, Tu que estás acima de todos os reis; ao teu domínio pertencem todos os reinos do céu e da terra#! e continua; [host.GetFirstNameRegnal] se coroa senhor[host.Custom('ES_XA')] de [host.GetPrimaryTitle.GetNameNoTier].\n\n"
 coronation_events.6101.desc_words_generic_guest: "Enquanto segura a faixa de metal cravejada de joias em suas mãos, [host.GetFirstNameRegnal] proclama um discurso a todos os [host.GetPrimaryTitle.GetTierAsNameNoTooltip|l]. Promete vigilância, justiça, força — e se coroa senhor[host.Custom('ES_XA')] de [host.GetPrimaryTitle.GetNameNoTier].\n\n"
 coronation_events.6101.desc_ending_humble_guest: "Com passos lentos e solenes, [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip|l] aproxima-se do trono que o aguarda. A enormidade do que fez, no que se tornou, obscurece seu rosto."
 coronation_events.6101.desc_ending_guest: "[host.Custom('ES_ElLa')|U] [host.GetTitleAsNameNoTooltip|l] se aproxima orgulhosamente ao seu trono soberano."
 # Option loc
 coronation_events.6101.a_guest_neg: "E assim, vimos um[host.Custom('ES_XA')] [host.GetWomanMan] pervers[host.Custom('ES_OA')] amar a si mesm[host.Custom('ES_OA')]."
 coronation_events.6101.a_guest_pos: "Um[host.Custom('ES_XA')] [host.GetTitleAsNameNoTooltip] legítimo[host.Custom('ES_OA')]. Viva!"
 coronation_events.6101.a_guest: "[host.GetSheHe|U] a colocou. E [host.GetSheHe] a usará."
 coronation_events.6101.a: "Que eu possa sentar-me aqui por muitos anos ainda."
 coronation_events.6101.a_oh_noes: "Suponho que já é tarde demais para voltar atrás…"
 coronation_events.6102.t: "A entronização de [host.GetFirstNameNoTooltipRegnal]"
 coronation_events.6102_middle: "\n\nAvanço sozinho[host.Custom('ES_OA')] para realizar este rito supremo, engalanad[host.Custom('ES_OA')] com minhas vestes inaugurais."
 coronation_events.6102.desc_high_east_asian: "Campanas sonoras anunciam minha passagem histórica. Meus ministros reverentes, dignitários estrangeiros — os poucos favorecidos com este momento — estão prostrados. [host.Custom('ES_ElLa')|U] grande [host.GetTitleAsName|l] assume o assento de seu governo.\n\n"
 coronation_events.6102.desc_low_east_asian: "As luzes se apagam com a minha passagem? A grande sala do trono escureceu, quase em negro. Apenas os rostos abaixados por onde passo brilham, quase brancos como osso, colados ao chão, como se o povo de [host.GetPrimaryTitle.GetNameNoTier] já estivesse morto.\n\n"
 coronation_events.6102.desc_mid_east_asian: "Tudo ocorre segundo as rígidas harmonias da antiga cerimônia, todos os dignitários e ministros prostrados diante de mim; tomo o assento do meu governo.\n\n"
 coronation_events.6102.desc_high_east_asian_ending_japan: "Em tríades harmoniosas, ressoam poderosos éditos, são feitas submissões fervorosas e me são apresentados os [Glossary( 'tres tesoros sagrados', 'THREE_SACRED_TREASURES_GLOSS' )]. O selo [host.Custom('GetTitleTierAdjective')] é meu, e tudo está em ordem em [host.GetPrimaryTitle.GetNameNoTier]."
 coronation_events.6102.desc_high_east_asian_ending: "Em tríades harmoniosas, ecoam decretos poderosos, submissões fervorosas são realizadas, e antigos e sagrados tesouros são apresentados diante de mim. O Selo [host.Custom('GetTitleTierAdjective')] é meu, e tudo está em ordem em [host.GetPrimaryTitle.GetNameNoTier]."
 coronation_events.6102.desc_low_east_asian_ending_japan: "Os éditos são entoados de forma monótona, os [Glossary( 'tres tesoros sagrados', 'THREE_SACRED_TREASURES_GLOSS' )] são apresentados, mas assim que me sento no trono [host.Custom('GetTitleTierAdjective')]…, meus pensamentos se tornam distantes e sombrios…"
 coronation_events.6102.desc_low_east_asian_ending: "Os éditos são proclamados monotonamente, relíquias empoeiradas são apresentadas, mas, quando me sento no trono [host.Custom('GetTitleTierAdjective')]…, meus pensamentos se tornam distantes e sombrios…"
 coronation_events.6102.desc_mid_east_asian_ending_japan: "Proclamam-se editos, os ministros juram seus cargos e se revelam os [Glossary( 'tres tesoros sagrados', 'THREE_SACRED_TREASURES_GLOSS' )] , como deveriam estar sempre. E, enfim, o grande selo [host.Custom('GetTitleTierAdjective')] é meu."
 coronation_events.6102.desc_mid_east_asian_ending: "São proclamados éditos, os ministros juram seus cargos e os antigos tesouros são revelados, como devem estar sempre. E, enfim, o grande selo [host.Custom('GetTitleTierAdjective')] é meu."
 THREE_SACRED_TREASURES_GLOSS: "As insígnias imperiais do Japão, diz-se que foram trazidas à Terra pelo conquistador mítico do Japão, o antepassado divino de seus imperadores. Esses tesouros representam as três virtudes principais: #EMP Ame-no-murakumo-no-tsurugi#! —a "Espada Celestial das Nuvens Reunidas"— simboliza a bravura, o espelho de bronze #EMP Yata no kagami#! reflete a sabedoria, e a joia em forma de lágrima #EMP Yasakani no magatama#! idealiza a benevolência."
 coronation_events.6102.desc_high: "Mas… não estou sol[host.Custom('ES_OA')]. Do mais humilde esgoto à torre mais alta, aclamações estrondosas inflamam o ar vazio, como se os gritos de milhares estilhaçassem esta grande [host.Custom('ResidenceBuilding')], #EMP y provocasen sacudidas!#!\n\nAssumo o trono não como um[host.Custom('ES_XA')] [host.GetWomanMan], mas como um[host.Custom('ES_XA')] [host.GetPrimaryTitle.GetTierAsNameNoTooltip]. Não como mortal, mas — como meus súditos cantam e entoam — como um presente de [host.GetFaith.HighGodName] ao povo [host.GetPrimaryTitle.GetAdjective]; um apelo ao seu [host.GetFaith.PositiveAfterLife]!"
 coronation_events.6102.desc_low: "A caminhada é longa… e silenciosa. Cada passo ecoa como uma gota caindo em águas infinitamente profundas. [anointer.GetName], com lágrimas em seus olhos sacerdotais, começa um antigo canto:\n\n #EMP [host.GetFaith.random_GoodGodNames], livrai-nos do mal! Do abismo, do desespero: livrai os filhos de [host.GetPrimaryTitle.GetNameNoTier]! Perdoai-nos, ó [host.GetFaith.HighGodName], da desolação de [host.GetFaith.NegativeAfterLife]! Que noss[host.Custom('ES_OA')] [host.GetTitleAsNameNoTooltip] desafie os males do homem!#!\n\nDiante desta assembleia atribulada, eu assumo meu trono."
 coronation_events.6102.desc_mid: "As preces dos meus lábios se misturam aos cânticos que se avolumam. Juntos, meus súditos e eu rezamos: #EMP [host.GetFaith.random_GoodGodNames], guarda este [host.GetPrimaryTitle.GetTierAsNameNoTooltip|l] sempre sob [host.GetFaith.PositiveAfterLife], agora e para sempre! Pelos séculos dos séculos! Abençoa, ó [host.GetFaith.random_GoodGodNames], a força [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip]!#!.\n\n[host.Custom('GetLowOfficialPlural')|U], [host.Custom('KnightCulturePluralNoTooltipLowercase')] e [host.Custom('GetLocalCommonerTermPlural')] se curvam. Ocupo meu assento sagrado, o lugar do meu poder. #EMP Salve, [host.GetFirstNameNoTooltipRegnal]!#!, todos bradam: #EMP Pela vontade de [host.GetFaith.HighGodName], noss[host.Custom('ES_OA')] [host.GetTitleAsNameNoTooltip]!#!."
 # Guest loc
 coronation_events.6102_middle_guest: "\n\nÀ frente vai [host.GetFirstName], adornad[host.Custom('ES_OA')] com suas vestes inaugurais."
 coronation_events.6102.desc_high_east_asian_guest: "Sinos solenes marcam a travessia histórica [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip|l]. Seus ministros reverentes, dignitários estrangeiros — os poucos agraciados com este momento — estão prostrados. [host.Custom('ES_ElLa')|U] grande [host.GetTitleAsName|l] assume o assento de seu poder.\n\n"
 coronation_events.6102.desc_low_east_asian_guest: "As luzes se apagam com a passagem de [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip|l]? A grande sala do trono ficou escura, quase negra. Só os rostos abaixados junto aos quais passa a sua túnica suja brilham, quase brancos como osso, pressionados contra o chão, como se o povo de [host.GetPrimaryTitle.GetNameNoTier] já estivesse morto.\n\n"
 coronation_events.6102.desc_mid_east_asian_guest: "Tudo ocorre segundo os rigorosos preceitos da antiga cerimônia, todos se prostram diante de [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip|l], que assume o assento de seu governo.\n\n"
 coronation_events.6102.desc_high_east_asian_ending_japan_guest: "Em tríades harmoniosas, ressoam éditos poderosos, são feitas submissões fervorosas e são apresentados os [Glossary( 'tres tesoros sagrados', 'THREE_SACRED_TREASURES_GLOSS' )]. O selo [host.Custom('GetTitleTierAdjective')] é recebido, e tudo está certo em [host.GetPrimaryTitle.GetNameNoTier]."
 coronation_events.6102.desc_high_east_asian_ending_guest: "Em trios harmoniosos, ressoam decretos poderosos, são feitas submissões fervorosas e são apresentados tesouros antigos e sagrados. Recebe-se o selo [host.Custom('GetTitleTierAdjective')] e tudo está bem em [host.GetPrimaryTitle.GetNameNoTier]."
 coronation_events.6102.desc_low_east_asian_ending_japan_guest: "Os éditos são proclamados monotonamente, são apresentados os [Glossary( 'tres tesoros sagrados', 'THREE_SACRED_TREASURES_GLOSS' )], mas assim que é[host.Custom('ES_EA')] [host.GetTitleAsNameNoTooltip|l] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('host'))] se esparrama no trono [host.Custom('GetTitleTierAdjective')]…, meus pensamentos se tornam distantes e sombrios…"
 coronation_events.6102.desc_low_east_asian_ending_guest: "Os éditos são proclamados monoticamente, relíquias empoeiradas são apresentadas, mas assim que é[host.Custom('ES_EA')] [host.GetTitleAsNameNoTooltip|l] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('host'))] se esparrama no trono [host.Custom('GetTitleTierAdjective')]…, meus pensamentos se tornam distantes e sombrios…"
 coronation_events.6102.desc_mid_east_asian_ending_japan_guest: "Edictos são proclamados, os ministros juram seus cargos e são revelados os [Glossary( 'tres tesoros sagrados', 'THREE_SACRED_TREASURES_GLOSS' )], como devem estar sempre. E, por fim, recebe-se o grande selo [host.Custom('GetTitleTierAdjective')]."
 coronation_events.6102.desc_mid_east_asian_ending_guest: "Editos são proclamados, os ministros juram seus cargos, e antigos tesouros são desenterrados, como sempre devem ser. E, por fim, recebe-se o grande selo [host.Custom('GetTitleTierAdjective')]."
 coronation_events.6102.desc_high_guest: "Mas… não se pode dizer que ele realize o rito soz[host.Custom('ES_OA')]! Do córrego mais humilde à torre mais alta, aclamações estrondosas inflam o ar vazio — como se os gritos de milhares pudessem abalar esta [host.Custom('ResidenceBuilding')] e fazê-la tremer!\n\n[host.GetFirstNameNoTooltip] assume o trono não como um[host.Custom('ES_XA')] [host.GetWomanMan], mas como um[host.Custom('ES_XA')] [host.GetPrimaryTitle.GetTierAsNameNoTooltip|l]. Não como mortal, mas — como seus súditos cantam e entoam — como um presente de [host.GetFaith.HighGodName] ao povo [host.GetPrimaryTitle.GetAdjective]."
 coronation_events.6102.desc_low_guest: "A caminhada é longa... e silenciosa. Cada passo ressoa como uma gota caindo em um corpo de água infinitamente profundo. [anointer.GetName], com lágrimas em seus olhos sacerdotais, começa um lamento:\n\n #EMP Livra-nos, [host.GetFaith.random_GoodGodNames], do mal! Do abismo, do desespero: livra os filhos de [host.GetPrimaryTitle.GetNameNoTier]! Poupa-nos, ó [host.GetFaith.HighGodName], da desolação de [host.GetFaith.NegativeAfterLife]! Que noss[host.Custom('ES_OA')] [host.GetTitleAsNameNoTooltip] desafie os males do homem!#!\n\nEnquanto o povo [host.GetPrimaryTitle.GetAdjectiveNoTooltip] teme e lamenta, [host.Custom('ES_ElLa')] [host.GetTitledFirstNameNoTooltipRegnal|l] assume o trono."
 coronation_events.6102.desc_mid_guest: "As preces de seus lábios se fundem com os cânticos que se avolumam. Juntos, seus súditos e [host.GetSheHe] oram: #EMP [host.GetFaith.random_GoodGodNames], guarda este [host.GetPrimaryTitle.GetTierAsNameNoTooltip|l] sempre sob [host.GetFaith.PositiveAfterLife], agora e para sempre! Pelos séculos dos séculos! Abençoa, ó, [host.GetFaith.random_GoodGodNames], a força [host.Custom('ES_DelDela')] [host.GetTitleAsName]!#!.\n\n[host.Custom('GetLowOfficialPlural')|U], [host.Custom('KnightCulturePluralNoTooltipLowercase')] e [host.Custom('GetLocalCommonerTermPlural')] se inclinam profundamente. [host.GetNameNoTooltipRegnal] assume seu assento sagrado, o lugar de seu poder. #EMP Salve, [host.GetFirstNameNoTooltipRegnal]!#!, todos exclamam. #EMP Pela vontade de [host.GetFaith.HighGodName], noss[host.Custom('ES_OA')] [host.GetTitleAsNameNoTooltip|l]!#!."
 coronation_events.6102.a_guest_neg: "É uma mancha em seu trono elevado."
 coronation_events.6102.a_guest_pos: "Glória ao trono [host.GetPrimaryTitle.GetAdjectiveNoTooltip]!"
 coronation_events.6102.a_guest: "O rito foi concluído. Foi feito um[host.Custom('ES_XA')] [host.GetTitleAsNameNoTooltip]."
 coronation_events.6102.a_host_neg: "#EMP Assim#! começa meu reinado...?"
 coronation_events.6110.t_nomad: "Joias [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip]"
 coronation_events.6110.t: "Joias de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]"
 coronation_events.6110.desc: "Portados com solenidade, os ícones do poder [ROOT.Char.GetPrimaryTitle.GetAdjective] —junto com"
 coronation_events.6110.desc_crown: "a coroa"
 coronation_events.6110.desc_crowns: "as coroas"
 coronation_events.6110.desc_regalia: "as vestimentas"
 coronation_events.6110.desc_2: "que devo portar— tudo imerso em bênçãos devocionais. Os [ROOT.Char.GetFaith.PriestNeuterPlural] preparam minhas vestes de gala com movimentos rituais e invocações"
 coronation_events.6110.desc_st_peter: "a São Pedro, o portador das chaves do reino celestial."
 coronation_events.6110.desc_samuel: "o profeta Samuel."
 coronation_events.6110.desc_generic: "a [ROOT.Char.GetFaith.KnowledgeGodName]."
 coronation_events.6110.desc_old_artifact: "\n\nTão belo e formoso artefato como é [crowning_artifact.GetName] deve ser concedido para sempre a [ROOT.Char.GetPrimaryTitle.GetNameNoTier]? Já tendo, como temos, uma vestidura soberana como é [old_title_artifact.GetName]?"
 coronation_events.6110.desc_no_old_artifact: "\n\nCom esta cerimônia, meu querido artefato de [crowning_artifact.GetName] será concedido para sempre a [ROOT.Char.GetPrimaryTitle.GetNameNoTier]?"
 coronation_events.6110.desc_no_old_artifact_plural: "\n\nMeu amado artefato de [crowning_artifact.GetName] será concedido para sempre a [ROOT.Char.GetPrimaryTitle.GetNameNoTier]? Ou talvez [crowning_artifact_2.GetName]…?"
 coronation_events.6110.a: "#EMP Oh, [crowning_artifact.GetNameNoTooltip]. Oh, gloria de glorias!#!"
 coronation_events.6110.b: "Dedicar o artefato verdadeiramente [ROOT.Char.Custom('GetTitleTierAdjective')] de [crowning_artifact_2.GetNameNoTooltip]."
 coronation_events.6110.c: "Consagrar o nobre [crowning_artifact_3.GetNameNoTooltip]."
 coronation_events.6110.d: "[crowning_artifact_4.GetNameNoTooltip] [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip]."
 coronation_events.6110.e: "Para o reino: [crowning_artifact_5.GetNameNoTooltip]."
 coronation_events.6110.f: "[crowning_artifact.GetNameNoTooltip] pertence à minha Casa."
 coronation_events.6110.f_plural: "Estes tesouros pertencem à minha casa."
 coronation_artifact_unaltered_succession_tt: "Não será alterada a herança de [crowning_artifact.GetName]"
