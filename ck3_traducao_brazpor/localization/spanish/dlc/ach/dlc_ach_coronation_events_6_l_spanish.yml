l_spanish:
 coronation_events.6000.t: "A confederação se reúne"
 coronation_events.6000.desc: "As lágrimas brilham nos olhos dos meus companheiros chefes — lágrimas de alegria e riso!\n\nEntre nós está meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('host'))] [host.GetFirstName], humilde, sem se colocar acima dos demais como algum imperador frio e estrangeiro. Noss[host.Custom('ES_OA')] [host.GetTitleAsName|l] brinca com o cavalo de [other_vassal.GetFirstNameNoTooltip] até o animal morder os dedos d\n\nPode ser que já não estejamos alinhados como uma verdadeira linha de batalha de iguais, mas... ainda somos [host.GetPrimaryTitle.GetDefinitiveName] e este dia é nosso."
 coronation_events.6000.a: "Agora eu juro: #EMP a Confederação é eterna!#!."
 coronation_events.6000.a.flavor: "Que estes não sejam os anos derradeiros de [host.GetPrimaryTitle.GetNameNoTooltip]! Mas sim seu verdadeiro renascimento!"
 coronation_events.6000.b: ""Venham, família, que seus parentes juramentados os reconheçam!""
 coronation_events.6000.b.flavor: "Com risos de guerreiros e sorrisos de mulheres, minha família iluminará este banquete de coroação."
 coronation_events.6000.c: "Podem ser tempos estranhos, mas ainda somos um só."
 confederation_remove_destroy_chance_tt: "@alert_icon! #alert_trial [host.GetPrimaryTitle.GetName] ya no se destruirá cuando su [holder|lE] consiga otro [kingdom|lE]#!"
 if_host_accepts_oath_tt: "#high Si tu [liege|lE] acepta esta promesa:#!"
 confederation_join_war_offer_tt: "[loyal_vassal.GetShortUIName|U] [Select_CString( loyal_vassal.IsLocalPlayer, 'vai se unir', 'vai se unir' )] automaticamente a as [wars|lE] defensivas de [Select_CString( host.IsLocalPlayer, 'seu senhorio', host.GetShortUIName )] enquanto [host.GetPrimaryTitle.GetNameNoTier] continuar sendo o [primary_title|E] de [Select_CString( host.IsLocalPlayer, 'seu personagem', host.GetShortUIName )]"
 confederation_alliance: "[loyal_vassal.GetShortUIName|U] e [host.GetShortUIName] [Select_CString(Or(loyal_vassal.IsLocalPlayer, host.IsLocalPlayer), 'os convertís', 'se convierten')] em [allies|lE]"
 best_commander_gains_defender_tt: "Seu [commander|lE] mais habilidoso recebe #P 3#! de [martial|lE] [martial_i] e a característica [GetTrait('unyielding_defender').GetName( GetNullCharacter )|l]"
 custom.every_fellow_vassal: "Todo colega [vassal|lE]"
 confederation_camraderie: "Camaradagem entre os demais [confederates|lE]"
 custom.every_other_culture_confederation: "Todo [culture|lE] de cada [liege|lE] ou colega [vassal|lE]"
 tooltip_confederation_vote_strength_coronation: "Intrigas durante a [coronation|lE]: $VALUE|=+0$"
 confederation_elective_extra_vote: "Você ganha #P 1#! de [vote_strength|lE] de [GetLaw('confederation_elective_succession_law').GetName] por #high 10 años#!"
 confederation_elective_extra_vote_2: "Você recebe #P 2#! de [vote_strength|lE] de [GetLaw('confederation_elective_succession_law').GetName] por #high 10 años#!"
 improved_because_intent_tt: "#EMP #low Esta opción ha mejorado por tu intención [THIS.Char.GetInvolvedActivityIntent.GetName|l]#!#!"
 harm_confederation_candidate_vote_tt: "A [candidate_score|lE] de [Select_CString( confederation_heir.IsLocalPlayer, 'seu personagem', confederation_heir.GetShortUIName )] de [GetLaw('confederation_elective_succession_law').GetName] é reduzida em #N 20#! por #high 10 anos#!"
 confederation_harm_candidacy_tt: "Difamado durante a [coronation|lE]: $VALUE|=+0$"
 confederation_house_promoted_tt: "Politicagem de [house|lE] durante a [coronation|lE]: $VALUE|=+0$"
 house_confederation_vote_bonus_tt: "Os membros da sua [house|lE] ganham #P 20#! de [candidate_score|lE] de [GetLaw('confederation_elective_succession_law').GetName] durante #high 10 años#!"
 custom.house_members_beneath_host: "Cada membro da sua [house|lE] em [host.GetPrimaryTitle.GetName]"
 coronation_events.6001.t: "Nossas vozes e as eras"
 coronation_events.6001.desc: "#EMP "[Select_CString( ROOT.Char.IsFemale, 'A primeira', 'O primeiro' )] entre os caudilhos! [ROOT.Char.GetTitleAsName|U] por juramento sagrado e aclamação das tribos!"#!

[loyal_vassal.Custom('ES_ElLa')|U] [loyal_vassal.GetTitledFirstName|l] empunha sua espada em minha direção, com a mão sobre o coração. Para de gritar e faz uma promessa solene.

"Não reconhecemos [old_de_jure.GetBaseName] em [loyal_vassal.GetPrimaryTitle.GetBaseNameNoTier]: amamos [ROOT.Char.GetPrimaryTitle.GetDefinitiveName], e meu povo jura honrá-la para sempre! #EMP Para sempre!#!""#!

[loyal_vassal.Custom('ES_ElLa')|U] [loyal_vassal.GetTitledFirstName|l] empunha sua espada em minha direção, com a mão sobre o coração. Para de gritar e faz uma promessa solene.

"Não quando eu poderia ser [Select_CString( ROOT.Char.IsFemale, 'uma verdadeira', 'um verdadeiro' )] [ROOT.Char.GetTitleAsNameNoTooltip|l], como nos tempos antigos..."
 coronation_events.6001.a: "Aquele que defende"
 coronation_events.6001.b: "Um assentamento nos arredores de [location.GetTitle.GetBaseNameNoTier] queima.\n\n"Saqueadores", explica um [host.Custom('KnightCultureNoTooltipLowercase')] [host.GetPrimaryTitle.GetAdjective]. "Marginais das tribos. [assailer.Custom('ES_ElLa')|U] [assailer.GetTitleAsName|l] de [assailer.GetPrimaryTitle.GetNameNoTier] os manda até aqui. Paga essa escória para insultar [host.Custom('ES_AlAla')] [host.GetTitleAsName|l] da nossa confederação".\n\n"[host.Custom('ES_ElLa')|U] [host.GetTitledFirstNameNoTooltip|l] assume o trono #EMP sol[host.Custom('ES_OA')]#!", murmura um chefe. "Temo que sentiremos falta dos tempos em que nossos povos enfrentavam juntos as desgraças…"."
 coronation_events.6001.c: "#EMP Meus guerreiros ainda lutam por todos nós!#!."
 coronation_events.6001.c.flavor: ""Nosso trono não é algo sagrado…""
 coronation_events.6010.t: "… e proclamá-lo não é uma grande injustiça."
 coronation_events.6010.desc: ""Se #EMP me#! escutasse, essas humilhações acabariam!""
 coronation_events.6010.a: "Todos devemos jurar a vigília de outrora."
 coronation_events.6010.b: "Você desbloqueia a [scheme|lE] de [GetScheme('claim_throne').GetTypeName|l]"
 coronation_events.6010.b.flavor: "Este [modifier|lE] se acumulará se for concedido por outro dos [vassals|lE] durante a [coronation|lE]"
 coronation_events.6010.c: "Guerreiros da Confederação"
 coronation_events.6010.d: "A banda de guerra deste personagem está repleta de defensores do reino exaltados."
 confederation_claim_throne: "[succession|E] [GetLaw('confederation_elective_succession_law').GetName]: $VALUE|+=0$"
 confederation_warrior_modifier_stacking_tt: "Voto de confederação assegurado"
 confederation_warrior_modifier: "A articulação política de [Select_CString( root_scope.IsLocalPlayer, 'sua personagem', root_scope.GetShortUIName )] garantiu #P 1#! de [vote_strength|lE] de [GetLaw('confederation_elective_succession_law').GetName] durante #high 10 anos#!"
 confederation_warrior_modifier_desc: "Dois votos de confederação obtidos"
 confederation_elective_claim_throne: "O jogo político de [Select_CString( root_scope.IsLocalPlayer, 'sua personagem', root_scope.GetShortUIName )] garantiu #P 2#! de [vote_strength|lE] de [GetLaw('confederation_elective_succession_law').GetName] durante #high 10 anos#!"
 coronation_vote_log_title: "Os candidatos da casa buscam a sucessão"
 coronation_vote_log: "A [house|lE] [root_scope.GetHouse.GetName] impressionou a todos e seus descendentes desfrutam de #P 20#! de [candidate_score|lE] em [GetLaw('confederation_elective_succession_law').GetName] durante #high 10 años#!"
 coronation_vote_log_2_title: "Admira os reinos reais"
 coronation_vote_log_2: "Este governante revira os olhos diante dos ideais de Confederação. Esses mesmos olhos ficam sonhadoramente vidrados quando se mencionam pompa e circunstância."
 coronation_house_candidates_log_title: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] aceita sua promessa"
 coronation_house_candidates_log: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] rejeita sua promessa"
 admires_regal_kingdoms: "De iure pela confederação"
 admires_regal_kingdoms_desc: "[host.GetShortUIName] e [host.GetShortUIName] [Select_CString(Or(loyal_vassal.IsLocalPlayer, host.IsLocalPlayer), 'reforzasteis', 'reforzaron')] o reconhecimento [de_jure|El] de [host.GetPrimaryTitle.GetDefinitiveName] em suas terras."
 confederation_king_accepts_promise_tt: "Defensor juramentado à confederação"
 confederation_king_rejects_promise_tt: "[loyal_vassal.GetShortUIName] [Select_CString( loyal_vassal.IsLocalPlayer, 'prometeu', 'prometeu' )] a [Select_CString( host.IsLocalPlayer, 'seu personagem', host.GetShortUIName )] ajudar a defender [host.GetPrimaryTitle.GetDefinitiveName]."
 coronation_confederation_de_jure_log_title: "[host.GetShortUIName|U] e [warrior_youth.GetShortUIName] [Select_CString(Or(host.IsLocalPlayer, warrior_youth.IsLocalPlayer), 'os convertís', 'se convierten')] em [allies|lE]"
 coronation_confederation_de_jure_log: "Guerreiros livres [host.GetPrimaryTitle.GetAdjectiveNoTooltip]"
 coronation_confederation_defender_log_title: "Jovens de [host.GetHouse.GetNameNoTooltip]"
 coronation_confederation_defender_log: "Uma causa comum"
 confederate_king_youth_warrior_tt: ""[assailer.GetName] traz fogo! Para zombar da vossa coroação, noss[assailer.Custom('ES_OA')] vizinh[assailer.Custom('ES_OA')] repugnante enviou saqueadores de longe!", grita meu/minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('loyal_vassal'))], [loyal_vassal.GetName], depois de me trazer a este lugar do insulto de [assailer.GetTitledFirstNamePossessiveNoTooltip].

O que queima é apenas um pequeno conjunto de cabanas nos arredores de [location.GetName]. Ainda assim, [loyal_vassal.GetTitledFirstNameNoTooltip] treme de raiva.

"[ROOT.Char.GetPrimaryTitle.GetDefinitiveName] ainda #EMP significa algo#!", jura [loyal_vassal.GetSheHe], "e eu continuo pront[loyal_vassal.Custom('ES_OA')] para defendê-la! Aceitai meu juramento de guerreir[loyal_vassal.Custom('ES_OA')]! A imundície [assailer.GetPrimaryTitle.GetAdjective] — e todos os outros — enfrentará meus bandos guerreiros quando escurecerem nossas terras!""
 adventurer_name_free_warriors: ""Baixem as armas. Tenham fé na paz [ROOT.Char.GetFaith.HighGodNamePossessive]"."
 adventurer_name_youths: "Nossa confederação está bem abastecida para a guerra… Em vez disso, podemos abastecer os/as [ROOT.Char.GetFaith.HouseOfWorshipPlural] com oferendas."
 coronation_events.6011.t: ""Jovens e velhos: que nenhum guerreiro fique ocioso"."
 coronation_events.6011.desc: "Em nossas casas, os jovens inquietos não sonham com guerra e aventura? Unamo-nos a eles, para que um dia possamos chamá-los para a batalha!", grita meu/minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('loyal_vassal'))], [loyal_vassal.GetName], depois de me trazer a este lugar do insulto de [assailer.GetTitledFirstNamePossessiveNoTooltip].

O que queima é apenas um pequeno conjunto de cabanas nos arredores de [location.GetName]. Ainda assim, [loyal_vassal.GetTitledFirstNameNoTooltip] treme de raiva.

"Todo [county|lE] do [domain|lE] de [supporter.GetShortUIName] vê seu [development|lE] reduzido em #N [supporter.MakeScope.Var('mass_mobilitization_development_value').GetValue|0]#!"
 coronation_events.6011.a: "Todo [county|lE] do [domain|lE] de [supporter.GetShortUIName] vê sua [Concept('county_fertility', 'fertilidad')|E] reduzida em #N [supporter.MakeScope.Var('mass_mobilitization_fertility_value').GetValue|0]#!"
 coronation_events.6011.a.flavor: "Todo [county|lE] do [domain|lE] de [supporter.GetShortUIName] vê seu [development_growth|lE] reduzido em #N [supporter.MakeScope.Var('mass_mobilitization_development_progress_value').GetValue|0]#!"
 coronation_events.6011.b: "A grande mobilização de [host.GetTitleAsNameNoTooltip]"
 coronation_events.6011.b.flavor: "[supporter.GetShortUIName] inicia uma guerra contra [foe.GetShortUIName] por [title_claim_1.GetName]"
 coronation_events.6011.c: "[supporter.GetShortUIName] inicia uma guerra contra [foe.GetShortUIName]"
 coronation_events.6011.d_house: "[supporter.GetShortUIName] inicia uma guerra contra [foe_2.GetShortUIName] por [title_claim_2.GetName]"
 coronation_events.6011.d: "[supporter.GetShortUIName] inicia uma guerra contra [foe_2.GetShortUIName]"
 mass_mob_dev_tt: "Um cão de guerra para o [ROOT.Char.GetTitleAsNameNoTooltip]"
 mass_mob_fertility_tt: ""Como podemos sorrir?", rosna meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('supporter'))], [supporter.GetName]. "Façam correr as taças de [ROOT.Char.Custom('RegionalDrink')], louvem a paz, orem pelo futuro do reino..."

[supporter.GetFirstNameNoTooltip] encara fixamente um grupo suspeito de nobres do país [foe.GetPrimaryTitle.GetAdjective].

"...enquanto essa #EMP canalha#! nos olha com ódio e trama a sua queda, meu [ROOT.Char.GetTitleAsName|l]!", cospe. "Dê-me licença para fazer soar meu chifre de guerra! Vou acabar com [foe.GetName], não tenham dúvida!""
 mass_mob_dev_progress_tt: ""Esvaziai vossas terras em vossos exércitos, e atacai!""
 coronation_mobilized_army_name: "Concentre toda a [supporter.GetPrimaryTitle.GetNameNoTierNoTooltip] na derrota [foe.Custom('ES_DelDela')] [foe_2.GetTitledFirstNameNoTooltip|l]!"
 coronation_supporter_declare_war_tt: ""Esmaguem [foe.Custom('ES_AlAla')] [foe.GetTitledFirstNameNoTooltip|l], com minha permissão"."
 coronation_supporter_declare_war_no_title_tt: ""[foe_2.Custom('ES_ElLa')|U] [foe_2.GetTitledFirstNameNoTooltip] é seu/ sua[foe_2.Custom('ES_OA')] inimig[foe_2.Custom('ES_OA')]!""
 coronation_supporter_declare_war_2_tt: ""Venham, venham. Tal paixão pertence à minha mesa de jantar"."
 coronation_supporter_declare_war_no_title_2_tt: "Partidário lançado à guerra"
 coronation_events.6020.t: "[supporter.GetShortUIName], empoderado[supporter.Custom('ES_OA')] e encorajado[supporter.Custom('ES_OA')] pela coroa, desafiou [supporter_war_target.GetShortUIName] para a guerra."
 coronation_events.6020.desc: "Amigos [host.Custom('ES_DelDela')] novo[host.Custom('ES_OA')] [host.GetTitleAsNameNoTooltip|l]"

[supporter.GetFirstNameNoTooltip] encara fixamente um grupo suspeito de nobres do país [foe.GetPrimaryTitle.GetAdjective].

"Ah, morrer asfixiado(a) em suas mãos!"
 coronation_events.6020.a: "Ah, morrer asfixiado entre suas coxas!"
 coronation_events.6020.b: "Este é um garoto #EMP malo#!…"
 coronation_events.6020.c: "Temos aqui uma descarada muito #EMP lista#!…"
 coronation_events.6020.d: "Sua boca sorridente deve abrigar umas mentiras tão deliciosas…"
 coronation_events.6020.e: "Um homem mais velho e inteligente, com mãos como couro…"
 coronation_supporter_declares_war_log_title: "Uma velha dama sábia, astuta e severa…"
 coronation_supporter_declares_war_log: "Alguém que, para variar, #EMP me#! me diga o que fazer… Um[experienced_courtesan.Custom('ES_XA')] [experienced_courtesan.GetWomanMan] de mundo que me guie com um toque experiente."
 coronation_events.6030.t: "Dois irmãos encantadores? Ficarei com os dois!"
 coronation_events.6030.t_feast: "Duas irmãs encantadoras? Eu quero as duas!"
 coronation_events.6030.desc: "Pois… [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip] não se sente generos[host.Custom('ES_OA')]?"

Diante de nós, uma sala repleta de carne nua. As cortesãs coram de forma convidativa enquanto [host.GetFirstNameNoTooltip] se vira para mim com um sorriso obsceno. "Talvez possamos apenas conversar sobre poesia..."
 coronation_events.6030.a: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] pego[host.Custom('ES_OA')] com cortesãs."
 coronation_events.6030.a_flavor: "As festivas escapadas sexuais [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l] foram expostas e denunciadas por [exposer.Custom('ES_ElLa')] [exposer.GetTitledFirstName|l]."
 coronation_events.6030.a_thighs: "#weak [host.GetShortUIName] tem [hooks|lE] sobre todos estes cortesãos e cortesãs#!"
 coronation_events.6030.b: "A coroação de [host.GetFirstNameNoTooltipRegnal]"
 coronation_events.6030.b_minx: "Temos aqui uma descarada muito #EMP lista#!…"
 coronation_events.6030.b_flavor: "Adiante com os símbolos do poder [host.Custom('GetTitleTierAdjective')]."
 coronation_events.6030.c: "A [Glossary( 'clâmide', 'CHLAMYS_GLOSS' )] púrpura, resplandecente à luz de mil velas, é posta sobre meus ombros. #EMP "Glória a Deus nas alturas!"#!, clamam os reunidos. #EMP "E paz na Terra!"#!. O prelado entoa: "Em nome do Pai, do Cristo [Glossary( 'Pantocrator', 'PANTOKRATOR_GLOSS')] e do Espírito Santo, eu vos encarrego, [host.GetFirstNameRegnal], de reinar como [Glossary( 'augusto', 'AUGOUSTOS_GLOSS')] dos [Glossary( 'romaioi', 'ROMAIOS_GLOSS' )] e pastor dos fiéis de Deus.""
 coronation_events.6030.c_dame: "A [Glossary( 'clâmide', 'CHLAMYS_GLOSS' )] púrpura, resplandecente à luz de mil velas, é colocada sobre meus ombros. #EMP "Glória a Deus nas alturas!"#!, gritam os reunidos. #EMP "E paz na Terra!"#!. O prelado entoa: "Em nome do Pai, do Cristo [Glossary( 'Pantocrator', 'PANTOKRATOR_GLOSS')] e do Espírito Santo, eu te encarrego, [host.GetFirstNameRegnal], de reinar como [Glossary( 'augusta', 'AUGOUSTOS_GLOSS')] dos [Glossary( 'romaioi', 'ROMAIOS_GLOSS' )] e pastora dos fiéis de Deus.""
 coronation_events.6030.c_flavor: "Uma vestimenta volumosa de seda usada pelos oficiais bizantinos, um símbolo de poder secular sobre o estado imperial. Presa por uma fíbula, a #G clámide#! trazia painéis grandes incrustados de gemas chamados #EMP tablia#!, que eram prerrogativa dos imperadores quando feitos em ouro."
 coronation_events.6030.d: "Cinge-se à minha cintura a reluzente [host.Custom('GetRegionalSword')]. O cetro da autoridade soberana, erguido em minha mão. Meus dedos se fecham em torno do [Glossary( 'globo crucífero', 'GLOBUS_CRUCIGER_GLOSS')]; ao meu corpo chegam os [Glossary( 'armillae', 'ARMILLS_GLOSS')] e o [Glossary( 'palio', 'PALLIUM_GLOSS')]. As preces ecoam."
 coronation_events.6030.d_sisters: "A reluzente [host.Custom('GetRegionalSword')] é presa à minha cintura. Colocam sobre mim as joias mais belas, os mantos mais gloriosos. Como um só, o melhor de [host.GetPrimaryTitle.GetTierAsNameNoTooltip] — os [host.Custom('GetLowOfficialPlural')], [host.GetFaith.BishopNeuterPlural] e [host.Custom('KnightCulturePluralNoTooltipLowercase')] desta terra — clamam as últimas orações e, por fim: "#EMP [host.GetFaith.HighGodName], contempla noss[host.Custom('ES_OA')] amad[host.Custom('ES_OA')] [host.GetTitleAsNameNoTooltip]!#!"."
 coronation_events.6030.d_flavor: "É cingido à minha cintura um velho exemplar de [host.Custom('GetRegionalSword')]. Colocam sobre mim joias chamativas e mantos gastos. Até a carrancuda hoste do [host.GetPrimaryTitle.GetTierAsNameNoTooltip] — os [host.Custom('GetLowOfficialPlural')], [host.GetFaith.BishopNeuterPlural] e [host.Custom('KnightCulturePluralNoTooltipLowercase')] desta terra miserável —, até eles são impelidos a murmurar as últimas orações e proferir o derradeiro: "#EMP [host.GetFaith.HighGodName], contempla noss[host.Custom('ES_OA')] [host.GetTitleAsNameNoTooltip]!#!"."
 coronation_events.6030.e_expose: "A espada cintilante de [host.Custom('GetRegionalSword')] é presa ao meu corpo. Joias incrustadas e mantos pesados são colocados sobre mim. Em uníssono, a nobreza de [host.GetPrimaryTitle.GetTierAsNameNoTooltip] — os [host.Custom('GetLowOfficialPlural')], [host.GetFaith.BishopNeuterPlural] e [host.Custom('KnightCulturePluralNoTooltipLowercase')] desta terra — recita as orações finais, e a última: "#EMP [host.GetFaith.HighGodName], contempla noss[host.Custom('ES_OA')] [host.GetTitleAsNameNoTooltip]!#!"."
 coronation_events.6030.e: "

Com a graça dos tesouros [host.Custom('GetTitleTierAdjective')], prostro-me diante de [crowner.Custom('ES_ElLa')] [crowner.GetTitledFirstNameRegnal|l]. Afirma que reino pela graça de Cristo, que apenas a misericórdia de Deus protege [ROOT.Char.GetPrimaryTitle.GetTierAsName]... mas eu sou [Select_CString(ROOT.Char.IsFemale, 'a pastora', 'o pastor' )] do povo. Sou [ROOT.Char.GetTitleAsNameNoTooltip]. O destino dos [Glossary( 'romaioi', 'ROMAIOS_GLOSS' )] pertence a mim, somente a mim..."
 coronation_host_orgy_exposed_log_title: "\n\nCom a graça dos antigos tesouros [host.Custom('GetTitleTierAdjective')] me prostro diante de [crowner.Custom('ES_ElLa')] [crowner.GetTitledFirstNameRegnal|l] e diante de Cristo, pois é por Sua santa graça que reino, e por Sua misericórdia que [ROOT.Char.GetPrimaryTitle.GetTierAsName] perdura. E, por fim…"
 coronation_host_orgy_exposed_log: "\n\nAgraciad[host.Custom('ES_OA')] com o tesouro [host.Custom('GetTitleTierAdjective')], eu me ajoelho. Pois o diadema do meu [host.GetPrimaryTitle.GetTierAsName], o símbolo de [host.GetPrimaryTitle.GetNameNoTierNoTooltip], a partir deste momento sempre estará… sobre minha cabeça."
 host_has_courtesan_hooks_tt: "\n\nAgraciad[host.Custom('ES_OA')] com o tesouro [host.Custom('GetTitleTierAdjective')], ajoelho-me… só desta vez, a última. Por [host.Custom('ES_ElLa')] [host.GetTitleAsName] de [host.GetPrimaryTitle.GetNameNoTier], estou prestes a me tornar de fato em [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip], e [host.GetSheHe] não se ajoelha diante de ninguém."
 coronation_events.6100.t: "\n\nAgraciad[host.Custom('ES_OA')] com o tesouro [host.Custom('GetTitleTierAdjective')], me ajoelho. Para [host.Custom('ES_ElLa')] [host.GetTitleAsName|l] de [host.GetPrimaryTitle.GetNameNoTier], certamente vou me tornar [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip], e [host.GetSheHe] se ajoelha perante [host.GetLiege.Custom('ES_ElLa')] [host.GetLiege.GetTitleAsName] do país [host.GetLiege.GetPrimaryTitle.GetAdjective] e perante [host.GetFaith.HighGodName]."
 # Host loc
 coronation_events.6100.desc_intro: "Adiante com os símbolos do poder [host.Custom('GetTitleTierAdjective')]."
 coronation_events.6100.desc_byzantine: "A [Glossary( 'clâmide', 'CHLAMYS_GLOSS' )] púrpura, resplandecente à luz de mil velas, é colocada sobre os ombros de [host.GetFirstNameRegnal]. #EMP "Glória a Deus nas alturas!"#!, gritam os reunidos. #EMP "E paz na Terra!"#!. O prelado entoa: "Em nome do Pai, do Cristo [Glossary( 'Pantocrator', 'PANTOKRATOR_GLOSS')] e do Espírito Santo, eu te encarrego, [host.GetFirstNameRegnal], de reinar como [Glossary( 'augusto', 'AUGOUSTOS_GLOSS')] dos [Glossary( 'romaioi', 'ROMAIOS_GLOSS' )] e pastor dos fiéis de Deus.""
 coronation_events.6100.desc_byzantine_femme: "A [Glossary( 'clâmide', 'CHLAMYS_GLOSS' )] púrpura, resplandecente à luz de mil velas, é colocada sobre os ombros de [host.GetFirstNameRegnal]. #EMP "Glória a Deus nas alturas!"#!, gritam os reunidos. #EMP "E paz na Terra!"#!. E o prelado entoa: "Em nome do Pai, do Cristo [Glossary( 'Pantocrator', 'PANTOKRATOR_GLOSS')] e do Espírito Santo, eu te encarrego, [host.GetFirstNameRegnal], de reinar como [Glossary( 'augusta', 'AUGOUSTOS_GLOSS')] dos [Glossary( 'romaioi', 'ROMAIOS_GLOSS' )] e pastora dos fiéis de Deus.""
 CHLAMYS_GLOSS: "É preso à cintura de [host.GetFirstName] tão reluzente [host.Custom('GetRegionalSword')]. O cetro da autoridade soberana — tomado em sua mão. Seus dedos envolvem o [Glossary( 'globo crucífero', 'GLOBUS_CRUCIGER_GLOSS')]; ao seu corpo chegam as [Glossary( 'armillae', 'ARMILLS_GLOSS')] e o [Glossary( 'palio', 'PALLIUM_GLOSS')]. As preces ecoam."
 coronation_events.6100.desc_christian: "Está cingida à cintura de [host.GetFirstName] tão reluzente [host.Custom('GetRegionalSword')]. Colocam sobre [host.GetSheHe] as joias mais belas, os mantos mais gloriosos. Em uníssono, a nata de seu [host.GetPrimaryTitle.GetTierAsNameNoTooltip|l] — os [host.Custom('GetLowOfficialPlural')], [host.GetFaith.BishopNeuterPlural] e [host.Custom('KnightCulturePluralNoTooltipLowercase')] daquela terra — clamam as últimas preces e, por fim: "#EMP [host.GetFaith.HighGodName], contempla noss[host.Custom('ES_OA')] amad[host.Custom('ES_OA')] [host.GetTitleAsNameNoTooltip|l]!#!"."
 coronation_events.6100.desc_high: "Está cingido à cintura de [host.GetFirstName] um velho exemplar de [host.Custom('GetRegionalSword')]. Colocam sobre [host.GetSheHe] joias berrantes e mantos gastos. Até a rude comitiva de seu [host.GetPrimaryTitle.GetTierAsNameNoTooltip|l] — os [host.Custom('GetLowOfficialPlural')], [host.GetFaith.BishopNeuterPlural] e [host.Custom('KnightCulturePluralNoTooltipLowercase')] daquela terra miserável —, até eles se veem impelidos a murmurar as preces finais e pronunciar a derradeira: "#EMP [host.GetFaith.HighGodName], contempla noss[host.Custom('ES_OA')] [host.GetTitleAsNameNoTooltip|l]!#!"."
 coronation_events.6100.desc_low: "É presa à cintura de [host.GetFirstName] tão reluzente exemplo de [host.Custom('GetRegionalSword')]. Colocam sobre seu corpo joias cravejadas e tecidos pesados. Em uníssono, a nobreza de seu [host.GetPrimaryTitle.GetTierAsNameNoTooltip|l] — os [host.Custom('GetLowOfficialPlural')], [host.GetFaith.BishopNeuterPlural] e [host.Custom('KnightCulturePluralNoTooltipLowercase')] daquela terra — recita as últimas preces, e a última: "#EMP [host.GetFaith.HighGodName], contempla noss[host.Custom('ES_OA')] [host.GetTitleAsNameNoTooltip|l]!#!"."
 coronation_events.6100.desc_generic: "\n\nCom a graça do antigo tesouro [host.Custom('GetTitleTierAdjective')] de [host.GetFirstNameNoTooltipRegnal] se ajoelha diante de [crowner.Custom('ES_ElLa')] [crowner.GetTitledFirstNameRegnal|l] e diante de Cristo, pois é por Sua santa graça que governa, e por Sua divina misericórdia que [ROOT.Char.GetPrimaryTitle.GetTierAsName] perdura. E, por fim…"
 coronation_events.6100.desc_ending_byzantine_cynical: "

Com a graça dos tesouros [host.Custom('GetTitleTierAdjective')], prostro-me diante de [crowner.Custom('ES_ElLa')] [crowner.GetTitledFirstNameRegnal|l]. Afirma que reino pela graça de Cristo, que apenas a misericórdia de Deus protege [ROOT.Char.GetPrimaryTitle.GetTierAsName]... mas eu sou [Select_CString(ROOT.Char.IsFemale, 'a pastora', 'o pastor' )] do povo. Sou [ROOT.Char.GetTitleAsNameNoTooltip]. O destino dos [Glossary( 'romaioi', 'ROMAIOS_GLOSS' )] pertence a mim, somente a mim..."
 coronation_events.6100.desc_ending_byzantine: "\n\nAgraciad[host.Custom('ES_OA')] com o tesouro [host.Custom('GetTitleTierAdjective')], [host.GetFirstNameNoTooltipRegnal] se ajoelha… só esta única e última vez. Pois [host.Custom('ES_ElLa')] [host.GetTitleAsName] de [host.GetPrimaryTitle.GetNameNoTier], certamente se tornará em [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip], e [host.GetSheHe] só se ajoelha diante de [host.GetFaith.HighGodName]."
 coronation_events.6100.desc_ending_non_abrahamic_vassal: "Um orbe com uma cruz no topo, geralmente de metal precioso. É segurado na mão como um elemento das insígnias reais e um símbolo do domínio do Salvador sobre o mundo inteiro."
 coronation_events.6100.desc_ending_non_abrahamic: "Um par de braçadeiras cerimoniais finamente trabalhadas, para serem usadas nos braços de um prelado ou monarca. Os #G armillae#! costumavam ser adornados com cenas como a Ressurreição e a Crucificação de Cristo."
 coronation_events.6100.desc_ending_vassal: "O manto impressionante de um monarca, uma vestimenta aparentada ao #G loros#! imperial grego e ao #G palio#! usado pelos oficiais da Igreja."
 coronation_events.6100.desc_ending: "A coroa é colocada sobre minha testa."
 # Guest loc
 coronation_events.6100.desc_byzantine_guest: "A coroa foi colocada… mas por quanto tempo?"
 coronation_events.6100.desc_byzantine_femme_guest: "E assim, a [Glossary( 'corona de coronación', 'CORONATION_CROWN_GLOSS')] do senhorio [host.GetPrimaryTitle.GetAdjectiveNoTooltip]."
 coronation_events.6100.desc_christian_guest: "Colocada sobre [host.GetFirstNameNoTooltipRegnal], a [Glossary( 'corona de coronación', 'CORONATION_CROWN_GLOSS')] do título principal [host.GetPrimaryTitle.GetAdjectiveNoTooltip] fica bem estranha…"
 coronation_events.6100.desc_high_guest: "No meio desta maldita cerimônia, mal consigo apreciar o toque da [Glossary( 'corona de coronación', 'CORONATION_CROWN_GLOSS')] do senhorio [host.GetPrimaryTitle.GetAdjectiveNoTooltip]…"
 coronation_events.6100.desc_low_guest: "Por [host.GetFaith.HighGodName], [crowner.Custom('ES_AlAla')] [crowner.GetTitledFirstNameNoTooltip|l] mal consegue encaixar a diminuta [Glossary( 'coroa de coroação', 'CORONATION_CROWN_GLOSS')]!"
 coronation_events.6100.desc_generic_guest: "Eis a minha [Glossary( 'corona de coronación', 'CORONATION_CROWN_GLOSS')]! E… #EMP Oh#!… Está quase caindo sobre meus olhos…"
 coronation_events.6100.desc_ending_byzantine_guest: "As coroas usadas na cerimônia de coroação eram, em alguns casos, as de uso diário. As #G coroas de coroação#! também podiam ser relíquias empoeiradas, apresentadas apenas para a ocasião singular."
 coronation_events.6100.desc_ending_non_abrahamic_vassal_guest: "Alguns diriam que é uma desfaçatez que um[host.Custom('ES_XA')] [host.GetTitleAsName] erga tão alto a coroa para colocá-la sobre si mesm[host.Custom('ES_OA')] e, com isso, #EMP proclamar-se#! um[host.Custom('ES_OA')] dos monarcas escolhid[host.Custom('ES_OA')]s de [host.GetFaith.HighGodNamePossessive].

"
 coronation_events.6100.desc_ending_non_abrahamic_guest: "Um[host.Custom('ES_XA')] [host.GetTitleAsName], quando está vestid[host.Custom('ES_OA')] para a cerimônia e armad[host.Custom('ES_OA')] com a aprovação de seu povo..., pode coroar a si mesm[host.Custom('ES_OA')]. Esta é a nossa tradição, embora alguns [host.GetFaith.BishopNeuterPlural|l] invejem este direito [host.Custom('GetTitleTierAdjective')].

"
 coronation_events.6100.desc_ending_vassal_guest: "\n\nAgraciad[host.Custom('ES_OA')] com os tesouros [host.Custom('GetTitleTierAdjective')]. [host.GetFirstNameNoTooltipRegnal] se ajoelha. Pois [host.Custom('ES_ElLa')] [host.GetTitleAsName] de [host.GetPrimaryTitle.GetNameNoTier] está prestes a realmente se tornar: [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip] e [host.GetSheHe] se ajoelha perante [host.GetLiege.Custom('ES_ElLa')] [host.GetLiege.GetTitleAsName] do reino [host.GetLiege.GetPrimaryTitle.GetAdjective] e diante de [host.GetFaith.HighGodName]."
 coronation_events.6100.desc_ending_guest: "#EMP Ja!#! Os #EMP íberos#! não estamos de acordo. Nós nos comprometemos humildemente diante de Deus e #EMP a Santíssima Virgem Maria#!, e depois fazemos o que nos agrada!"
 GLOBUS_CRUCIGER_GLOSS: "Mas aqueles poucos [host.GetFaith.PriestNeuterPlural] com dúvidas cantam com vozes agudas e me observam com assombro enquanto começo o rito."
 ARMILLS_GLOSS: "Certamente, sob a cobertura dos sussurros da multidão, [host.GetFaith.PriestNeuterPlural] murmuram condenações sombrias."
 PALLIUM_GLOSS: "À [host.GetFaith.NegativeAfterLife] com meus detratores! Não preciso de [host.GetFaith.PriestNeuter] algum."
 coronation_events.6100.a: "Enquanto seguro a diadema com a cruz nas mãos, recito "#EMP Senhor Deus, Tu que estás acima de todos os reis; ao teu domínio pertencem todos os reinos do céu e da terra#!", e me coroo senhor[host.Custom('ES_XA')] de [host.GetPrimaryTitle.GetNameNoTier].

"
 coronation_events.6100.a_guest: "Enquanto seguro a faixa de metal adornada de joias entre os dedos, pronuncio um discurso a todos os [host.GetPrimaryTitle.GetTierAsNameNoTooltip|l] por inteiro. Prometo vigilância, justiça, força… e me coroo senhor[host.Custom('ES_XA')] de [host.GetPrimaryTitle.GetNameNoTier].\n\n"
 coronation_events.6100.a_guest_low: "Com passos lentos e sombrios, aproximo-me do trono que me aguarda. Não é pouca coisa tornar-se um [host.GetTitleAsNameNoTooltip]."
 coronation_events.6100.a_flavor_decent: "Por fim, me aproximo do trono soberano como [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip] que sempre estive destinad[host.Custom('ES_OA')] a ser."
 coronation_events.6100.a_flavor_low_guest: "Colocada sobre [host.GetFirstNameNoTooltipRegnal], a [Glossary( 'corona de coronación', 'CORONATION_CROWN_GLOSS')] do título principal [host.GetPrimaryTitle.GetAdjectiveNoTooltip] fica bem estranha…"
 coronation_events.6100.a_flavor_low: "Mas esses poucos [host.GetFaith.PriestNeuterPlural] com dúvidas cantam com vozes agudas e olham com assombro enquanto [host.GetFirstName], com espírito [host.Custom('FormalComplimentAdjective')], inicia o rito."
 coronation_events.6100.a_flavor_giant: "Certamente, sob o véu da multidão sussurrante, ouço os [host.GetFaith.PriestNeuterPlural] murmurar condenações sombrias."
 coronation_events.6100.a_flavor_adolescent: "Mas os [host.GetFaith.PriestNeuterPlural] parecem dispostos a aceitar este rito. Talvez algum governante de meu [host.GetFaith.ReligiousText] fez o mesmo no passado."
 CORONATION_CROWN_GLOSS: "Enquanto segura a diadema com a cruz em suas mãos, recita "#EMP Senhor Deus, Tu que estás acima de todos os reis; ao teu domínio pertencem todos os reinos do céu e da terra#!" e continua; [host.GetFirstNameRegnal] coroa a si mesm[host.Custom('ES_OA')] senhor[host.Custom('ES_XA')] de [host.GetPrimaryTitle.GetNameNoTier].

"
 coronation_events.6101.desc_crowning_intro: "Alguns diriam que é uma desfaçatez que um[host.Custom('ES_XA')] [host.GetTitleAsName] erga tão alto a coroa para colocá-la sobre si mesm[host.Custom('ES_OA')] e, com isso, #EMP proclamar-se#! um[host.Custom('ES_OA')] dos monarcas escolhid[host.Custom('ES_OA')]s de [host.GetFaith.HighGodNamePossessive].

"
 coronation_events.6101.desc_no_being_crowned_intro: "Um[host.Custom('ES_XA')] [host.GetTitleAsName], quando está vestid[host.Custom('ES_OA')] para a cerimônia e armad[host.Custom('ES_OA')] com a aprovação de seu povo..., pode coroar a si mesm[host.Custom('ES_OA')]. Esta é a nossa tradição, embora alguns [host.GetFaith.BishopNeuterPlural|l] invejem este direito [host.Custom('GetTitleTierAdjective')].

"
 # Host loc
 coronation_events.6101.desc_crowning_priests_iberian: "Que eu possa sentar-me aqui por muitos anos ainda."
 coronation_events.6101.desc_crowning_priests_high: "Suponho que já é tarde demais para voltar atrás…"
 coronation_events.6101.desc_crowning_priests_low: "A entronização de [host.GetFirstNameNoTooltipRegnal]"
 coronation_events.6101.desc_crowning_priests_mid: "\n\nAvanço sozinho[host.Custom('ES_OA')] para realizar este rito supremo, engalanad[host.Custom('ES_OA')] com minhas vestes inaugurais."
 coronation_events.6101.desc_words_christian: "Campanas sonoras anunciam minha passagem histórica. Meus ministros reverentes, dignitários estrangeiros — os poucos favorecidos com este momento — estão prostrados. [host.Custom('ES_ElLa')|U] grande [host.GetTitleAsName|l] assume o assento de seu governo.\n\n", e me coroo senhor[host.Custom('ES_XA')] de [host.GetPrimaryTitle.GetNameNoTier].

"
 coronation_events.6101.desc_words_generic: "Em tríades harmoniosas, ressoam poderosos éditos, são feitas submissões fervorosas e me são apresentados os [Glossary( 'tres tesoros sagrados', 'THREE_SACRED_TREASURES_GLOSS' )]. O selo [host.Custom('GetTitleTierAdjective')] é meu, e tudo está em ordem em [host.GetPrimaryTitle.GetNameNoTier]."
 coronation_events.6101.desc_ending_humble: "Em tríades harmoniosas, ecoam decretos poderosos, submissões fervorosas são realizadas, e antigos e sagrados tesouros são apresentados diante de mim. O Selo [host.Custom('GetTitleTierAdjective')] é meu, e tudo está em ordem em [host.GetPrimaryTitle.GetNameNoTier]."
 coronation_events.6101.desc_ending: "Os éditos são entoados de forma monótona, os [Glossary( 'tres tesoros sagrados', 'THREE_SACRED_TREASURES_GLOSS' )] são apresentados, mas assim que me sento no trono [host.Custom('GetTitleTierAdjective')]…, meus pensamentos se tornam distantes e sombrios…"
 # Guest loc
 coronation_events.6101.desc_crowning_priests_high_guest: "Proclamam-se editos, os ministros juram seus cargos e se revelam os [Glossary( 'tres tesoros sagrados', 'THREE_SACRED_TREASURES_GLOSS' )] , como deveriam estar sempre. E, enfim, o grande selo [host.Custom('GetTitleTierAdjective')] é meu."
 coronation_events.6101.desc_crowning_priests_low_guest: "São proclamados éditos, os ministros juram seus cargos e os antigos tesouros são revelados, como devem estar sempre. E, enfim, o grande selo [host.Custom('GetTitleTierAdjective')] é meu."
 coronation_events.6101.desc_crowning_priests_mid_guest: "As insígnias imperiais do Japão, diz-se que foram trazidas à Terra pelo conquistador mítico do Japão, o antepassado divino de seus imperadores. Esses tesouros representam as três virtudes principais: #EMP Ame-no-murakumo-no-tsurugi#! —a "Espada Celestial das Nuvens Reunidas"— simboliza a bravura, o espelho de bronze #EMP Yata no kagami#! reflete a sabedoria, e a joia em forma de lágrima #EMP Yasakani no magatama#! idealiza a benevolência."
 coronation_events.6101.desc_words_christian_guest: "Mas... não estou sol[host.Custom('ES_OA')]. Do mais humilde esgoto à torre mais alta, aclamações estrondosas inflamam o ar vazio, como se os gritos de milhares abalassem esta grande [host.Custom('ResidenceBuilding')], #EMP sacudindo-a até o chão!#!

Assumo o trono não como um[host.Custom('ES_XA')] [host.GetWomanMan], mas como um[host.Custom('ES_XA')] [host.GetPrimaryTitle.GetTierAsNameNoTooltip|l]. Não como mortal, mas — como meus súditos cantam e entoam — como um presente de [host.GetFaith.HighGodName] ao povo [host.GetPrimaryTitle.GetAdjective], um apelo ao seu [host.GetFaith.PositiveAfterLife]!" e continua; [host.GetFirstNameRegnal] coroa a si mesm[host.Custom('ES_OA')] senhor[host.Custom('ES_XA')] de [host.GetPrimaryTitle.GetNameNoTier].

"
 coronation_events.6101.desc_words_generic_guest: "Enquanto segura a faixa de metal cravejada de joias em suas mãos, [host.GetFirstNameRegnal] proclama um discurso a todos os [host.GetPrimaryTitle.GetTierAsNameNoTooltip|l]. Promete vigilância, justiça, força — e se coroa senhor[host.Custom('ES_XA')] de [host.GetPrimaryTitle.GetNameNoTier].\n\n"
 coronation_events.6101.desc_ending_humble_guest: "\n\nÀ frente vai [host.GetFirstName], adornad[host.Custom('ES_OA')] com suas vestes inaugurais."
 coronation_events.6101.desc_ending_guest: "Sinos solenes marcam a travessia histórica [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip|l]. Seus ministros reverentes, dignitários estrangeiros — os poucos agraciados com este momento — estão prostrados. [host.Custom('ES_ElLa')|U] grande [host.GetTitleAsName|l] assume o assento de seu poder.\n\n"
 # Option loc
 coronation_events.6101.a_guest_neg: "Tudo ocorre segundo os rigorosos preceitos da antiga cerimônia, todos se prostram diante de [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip|l], que assume o assento de seu governo.\n\n"
 coronation_events.6101.a_guest_pos: "Em tríades harmoniosas, ressoam éditos poderosos, são feitas submissões fervorosas e são apresentados os [Glossary( 'tres tesoros sagrados', 'THREE_SACRED_TREASURES_GLOSS' )]. O selo [host.Custom('GetTitleTierAdjective')] é recebido, e tudo está certo em [host.GetPrimaryTitle.GetNameNoTier]."
 coronation_events.6101.a_guest: "Em trios harmoniosos, ressoam decretos poderosos, são feitas submissões fervorosas e são apresentados tesouros antigos e sagrados. Recebe-se o selo [host.Custom('GetTitleTierAdjective')] e tudo está bem em [host.GetPrimaryTitle.GetNameNoTier]."
 coronation_events.6101.a: "Os éditos são proclamados monotonamente, são apresentados os [Glossary( 'tres tesoros sagrados', 'THREE_SACRED_TREASURES_GLOSS' )], mas assim que é[host.Custom('ES_EA')] [host.GetTitleAsNameNoTooltip|l] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('host'))] se esparrama no trono [host.Custom('GetTitleTierAdjective')]…, meus pensamentos se tornam distantes e sombrios…"
 coronation_events.6101.a_oh_noes: "Os éditos são proclamados monoticamente, relíquias empoeiradas são apresentadas, mas assim que é[host.Custom('ES_EA')] [host.GetTitleAsNameNoTooltip|l] [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('host'))] se esparrama no trono [host.Custom('GetTitleTierAdjective')]…, meus pensamentos se tornam distantes e sombrios…"
 coronation_events.6102.t: "Edictos são proclamados, os ministros juram seus cargos e são revelados os [Glossary( 'tres tesoros sagrados', 'THREE_SACRED_TREASURES_GLOSS' )], como devem estar sempre. E, por fim, recebe-se o grande selo [host.Custom('GetTitleTierAdjective')]."
 coronation_events.6102_middle: "Editos são proclamados, os ministros juram seus cargos, e antigos tesouros são desenterrados, como sempre devem ser. E, por fim, recebe-se o grande selo [host.Custom('GetTitleTierAdjective')]."
 coronation_events.6102.desc_high_east_asian: "Mas... [host.GetSheHe] dificilmente realiza o rito sozinh[host.Custom('ES_OA')]! Do mais humilde esgoto à torre mais alta, aclamações estrondosas inflamam o ar vazio, como se os gritos de milhares pudessem abalar esta [host.Custom('ResidenceBuilding')] até o chão!

[host.GetFirstNameNoTooltipRegnal] assume o trono não como um[host.Custom('ES_XA')] [host.GetWomanMan], mas como um[host.Custom('ES_XA')] [host.GetPrimaryTitle.GetTierAsNameNoTooltip|l]. Não como mortal, mas — como seus súditos cantam e entoam — como um presente de [host.GetFaith.HighGodName] ao povo [host.GetPrimaryTitle.GetAdjective]."
 coronation_events.6102.desc_low_east_asian: "A caminhada é longa... e silenciosa. Cada passo ressoa como uma gota caindo em um corpo de água infinitamente profundo. [anointer.GetName], com lágrimas em seus olhos sacerdotais, começa um lamento:\n\n #EMP Livra-nos, [host.GetFaith.random_GoodGodNames], do mal! Do abismo, do desespero: livra os filhos de [host.GetPrimaryTitle.GetNameNoTier]! Poupa-nos, ó [host.GetFaith.HighGodName], da desolação de [host.GetFaith.NegativeAfterLife]! Que noss[host.Custom('ES_OA')] [host.GetTitleAsNameNoTooltip] desafie os males do homem!#!\n\nEnquanto o povo [host.GetPrimaryTitle.GetAdjectiveNoTooltip] teme e lamenta, [host.Custom('ES_ElLa')] [host.GetTitledFirstNameNoTooltipRegnal|l] assume o trono."
 coronation_events.6102.desc_mid_east_asian: "As preces de seus lábios se fundem com os cânticos que se avolumam. Juntos, seus súditos e [host.GetSheHe] oram: #EMP [host.GetFaith.random_GoodGodNames], guarda este [host.GetPrimaryTitle.GetTierAsNameNoTooltip|l] sempre sob [host.GetFaith.PositiveAfterLife], agora e para sempre! Pelos séculos dos séculos! Abençoa, ó, [host.GetFaith.random_GoodGodNames], a força [host.Custom('ES_DelDela')] [host.GetTitleAsName]!#!.\n\n[host.Custom('GetLowOfficialPlural')|U], [host.Custom('KnightCulturePluralNoTooltipLowercase')] e [host.Custom('GetLocalCommonerTermPlural')] se inclinam profundamente. [host.GetNameNoTooltipRegnal] assume seu assento sagrado, o lugar de seu poder. #EMP Salve, [host.GetFirstNameNoTooltipRegnal]!#!, todos exclamam. #EMP Pela vontade de [host.GetFaith.HighGodName], noss[host.Custom('ES_OA')] [host.GetTitleAsNameNoTooltip|l]!#!."
 coronation_events.6102.desc_high_east_asian_ending_japan: "É uma mancha em seu trono elevado."
 coronation_events.6102.desc_high_east_asian_ending: "Glória ao trono [host.GetPrimaryTitle.GetAdjectiveNoTooltip]!"
 coronation_events.6102.desc_low_east_asian_ending_japan: "O rito foi concluído. Foi feito um[host.Custom('ES_XA')] [host.GetTitleAsNameNoTooltip]."
 coronation_events.6102.desc_low_east_asian_ending: "#EMP Assim#! começa meu reinado...?"
 coronation_events.6102.desc_mid_east_asian_ending_japan: "Joias [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip]"
 coronation_events.6102.desc_mid_east_asian_ending: "Joias de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]"
 THREE_SACRED_TREASURES_GLOSS: "Portados com solenidade, os ícones do poder [ROOT.Char.GetPrimaryTitle.GetAdjective] —junto com"
 coronation_events.6102.desc_high: "Mas... não estou sol[host.Custom('ES_OA')]. Do mais humilde esgoto à torre mais alta, aclamações estrondosas inflamam o ar vazio, como se os gritos de milhares abalassem esta grande [host.Custom('ResidenceBuilding')], #EMP sacudindo-a até o chão!#!

Assumo o trono não como um[host.Custom('ES_XA')] [host.GetWomanMan], mas como um[host.Custom('ES_XA')] [host.GetPrimaryTitle.GetTierAsNameNoTooltip|l]. Não como mortal, mas — como meus súditos cantam e entoam — como um presente de [host.GetFaith.HighGodName] ao povo [host.GetPrimaryTitle.GetAdjective], um apelo ao seu [host.GetFaith.PositiveAfterLife]!"
 coronation_events.6102.desc_low: "que devo portar— tudo imerso em bênçãos devocionais. Os [ROOT.Char.GetFaith.PriestNeuterPlural] preparam minhas vestes de gala com movimentos rituais e invocações"
 coronation_events.6102.desc_mid: "a São Pedro, o portador das chaves do reino celestial."
 # Guest loc
 coronation_events.6102_middle_guest: "a [ROOT.Char.GetFaith.KnowledgeGodName]."
 coronation_events.6102.desc_high_east_asian_guest: "\n\nTão belo e formoso artefato como é [crowning_artifact.GetName] deve ser concedido para sempre a [ROOT.Char.GetPrimaryTitle.GetNameNoTier]? Já tendo, como temos, uma vestidura soberana como é [old_title_artifact.GetName]?"
 coronation_events.6102.desc_low_east_asian_guest: "\n\nCom esta cerimônia, meu querido artefato de [crowning_artifact.GetName] será concedido para sempre a [ROOT.Char.GetPrimaryTitle.GetNameNoTier]?"
 coronation_events.6102.desc_mid_east_asian_guest: "\n\nMeu amado artefato de [crowning_artifact.GetName] será concedido para sempre a [ROOT.Char.GetPrimaryTitle.GetNameNoTier]? Ou talvez [crowning_artifact_2.GetName]…?"
 coronation_events.6102.desc_high_east_asian_ending_japan_guest: "#EMP Oh, [crowning_artifact.GetNameNoTooltip]. Oh, gloria de glorias!#!"
 coronation_events.6102.desc_high_east_asian_ending_guest: "Dedicar o artefato verdadeiramente [ROOT.Char.Custom('GetTitleTierAdjective')] de [crowning_artifact_2.GetNameNoTooltip]."
 coronation_events.6102.desc_low_east_asian_ending_japan_guest: "Consagrar o nobre [crowning_artifact_3.GetNameNoTooltip]."
 coronation_events.6102.desc_low_east_asian_ending_guest: "[crowning_artifact_4.GetNameNoTooltip] [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip]."
 coronation_events.6102.desc_mid_east_asian_ending_japan_guest: "Para o reino: [crowning_artifact_5.GetNameNoTooltip]."
 coronation_events.6102.desc_mid_east_asian_ending_guest: "[crowning_artifact.GetNameNoTooltip] pertence à minha Casa."
 coronation_events.6102.desc_high_guest: "Mas... [host.GetSheHe] dificilmente realiza o rito sozinh[host.Custom('ES_OA')]! Do mais humilde esgoto à torre mais alta, aclamações estrondosas inflamam o ar vazio, como se os gritos de milhares pudessem abalar esta [host.Custom('ResidenceBuilding')] até o chão!

[host.GetFirstNameNoTooltipRegnal] assume o trono não como um[host.Custom('ES_XA')] [host.GetWomanMan], mas como um[host.Custom('ES_XA')] [host.GetPrimaryTitle.GetTierAsNameNoTooltip|l]. Não como mortal, mas — como seus súditos cantam e entoam — como um presente de [host.GetFaith.HighGodName] ao povo [host.GetPrimaryTitle.GetAdjective]."
 coronation_events.6102.desc_low_guest: "[crowning_artifact.GetName] será herdado com [host.GetPrimaryTitle.GetName]"
 coronation_events.6102.desc_mid_guest: "[crowning_artifact_2.GetName] será herdado com [host.GetPrimaryTitle.GetName]"
 coronation_events.6102.a_guest_neg: "[crowning_artifact_3.GetName] será herdado com [host.GetPrimaryTitle.GetName]"
 coronation_events.6102.a_guest_pos: "[crowning_artifact_4.GetName] será herdado com [host.GetPrimaryTitle.GetName]"
 coronation_events.6102.a_guest: "[crowning_artifact_5.GetName] será herdado com [host.GetPrimaryTitle.GetName]"
 coronation_events.6102.a_host_neg: "@alert_icon! #alert_trial [host.GetPlayerHeir.GetShortUIName] no [Select_CString( host.GetPlayerHeir.IsLocalPlayer, 'heredarás', 'heredará' )] [crowning_artifact.GetName]#!"
 coronation_events.6110.t_nomad: "@alert_icon! #alert_trial [host.GetPlayerHeir.GetShortUIName] no [Select_CString( host.GetPlayerHeir.IsLocalPlayer, 'heredarás', 'heredará' )] [crowning_artifact_2.GetName]#!"
 coronation_events.6110.t: "@alert_icon! #alert_trial [host.GetPlayerHeir.GetShortUIName] no [Select_CString( host.GetPlayerHeir.IsLocalPlayer, 'heredarás', 'heredará' )] [crowning_artifact_3.GetName]#!"
 coronation_events.6110.desc: "@alert_icon! #alert_trial [host.GetPlayerHeir.GetShortUIName] no [Select_CString( host.GetPlayerHeir.IsLocalPlayer, 'heredarás', 'heredará' )] [crowning_artifact_4.GetName]#!"
 coronation_events.6110.desc_crown: "@alert_icon! #alert_trial [host.GetPlayerHeir.GetShortUIName] no [Select_CString( host.GetPlayerHeir.IsLocalPlayer, 'heredarás', 'heredará' )] [crowning_artifact_5.GetName]#!"
 coronation_events.6110.desc_crowns: "[artifact_target.GetName] será abençoado com um [modifier|lE]"
 coronation_events.6110.desc_regalia: "[chosen_artifact.GetDesc]\n\nEm [year] foi abençoado como item régio de [host.GetPrimaryTitle.GetNameNoTier] para a coroação de [host.Custom('ES_DelDela')] [host.GetTitledFirstNameRegnal|l]."
 coronation_events.6110.desc_2: "[old_title_artifact.GetName] será usado para seu [coronation|lE]"
 coronation_events.6110.desc_st_peter: "Artefato dedicado a [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]"
 coronation_events.6110.desc_samuel: "Agora, [chosen_artifact.GetName] será herdado com [host.GetPrimaryTitle.GetName]"
 coronation_events.6110.desc_generic: "Seu [faith|lE] não tem [head_of_faith|lE]"
 coronation_events.6110.desc_old_artifact: "O juramento aos [host.GetFaith.BishopNeuterPlural]"
 coronation_events.6110.desc_no_old_artifact: "O incenso paira no ar enquanto minha procissão de espírito [ROOT.Char.Custom('GetTitleTierAdjective')] entra na catedral."
 coronation_events.6110.desc_no_old_artifact_plural: "Fragrâncias sagradas flutuam no ar enquanto minha procissão de espírito [ROOT.Char.Custom('GetTitleTierAdjective')] entra no/a [ROOT.Char.GetFaith.HouseOfWorship]."
 coronation_events.6110.a: "Além dos portões de minha [host.Custom('ResidenceBuilding')], minha procissão de espírito [ROOT.Char.Custom('GetTitleTierAdjective')] segue em direção a um altar sagrado e aos oficiante à espera."
 coronation_events.6110.b: "A nobreza e os [host.GetFaith.AltPriestTermPlural] se empurram e trocam farpas para conseguir lugar. Algumas poucas vozes fracas se esforçam ao recitar preces sagradas."
 coronation_events.6110.c: "A nobreza, os [host.GetFaith.AltPriestTermPlural] e eu tomamos solenemente nossos lugares em meio à cadência comovente de preces sagradas."
 coronation_events.6110.d: "A nobreza se afasta para a chegada dos [host.GetFaith.AltPriestTermPlural], suas vozes se elevam como uma só em uma oração sagrada."
 coronation_events.6110.e: "\n\nAgora, o rito da petição dos [host.GetFaith.BishopNeuterPlural] enquanto [hof.Custom('ES_ElLa')] [hof.GetTitledFirstNameRegnal|l] observa atent[hof.Custom('ES_OA')]."
 coronation_events.6110.f: "\n\nAgora, o rito da petição dos [host.GetFaith.BishopNeuterPlural]."
 coronation_events.6110.f_plural: "Sou alvo do desprezo destes déspotas mesquinhos, que apresentam seu pedido sagrado como um insulto humilhante.\n\n"Servo[ROOT.Char.Custom('ES_XA')] de [ROOT.Char.GetFaith.HighGodName], você se arrepende dos seus muitos pecados? Você dedica seus caprichos mortais a preservar os amados [host.GetFaith.AltPriestTermPlural] de [ROOT.Char.GetFaith.HighGodNamePossessive]?""
 coronation_artifact_unaltered_succession_tt: "Sou reverenciado por estes intercessores pelo divino, e é com reverente deferência que eles suplicam:\n\n"Grande [host.GetTitleAsName], guardareis os fiéis e preservareis os direitos dos [host.GetFaith.AltPriestTermPlural] [ROOT.Char.GetFaith.HighGodNamePossessive]?"."
 coronation_events.6110.f_replacing: "Sou uma figura desconhecida para estes clérigos, e eles apresentam seu pedido costumeiro com verdadeiro interesse.\n\n"Ireis proteger os fiéis como [ROOT.Char.GetTitleAsName] e preservareis os direitos e privilégios dos [host.GetFaith.AltPriestTermPlural] [ROOT.Char.GetFaith.HighGodNamePossessive]?"."
 coronation_titling_artifact_tt: "#EMP "Serei um martelo contra o infiel!"#!"
 coronation_titling_artifact_2_tt: "Jurar, com ódio mortal, que vou exterminar hereges e não crentes agradará aos [host.GetFaith.AltPriestTermPlural]… e fará com que meu reinado siga um caminho de retidão!"
 coronation_titling_artifact_3_tt: "Distorcer a resposta tradicional a meu favor."
 coronation_titling_artifact_4_tt: "Há uma linha tão tênue entre prometer fidelidade a estes [ROOT.Char.GetFaith.PriestNeuterPlural]… e colocar meu mandato abençoado por [ROOT.Char.GetFaith.HighGodName] acima do deles…"
 coronation_titling_artifact_5_tt: "Explorar o clero"
 coronation_titling_artifact_will_be_lost_tt: "Em vez de agir como servo da fé, este governante exerce domínio sobre a classe clerical e suas rendas."
 coronation_titling_artifact_will_be_lost_2_tt: "Direi as palavras. Como devo."
 coronation_titling_artifact_will_be_lost_3_tt: ""Defenderei a santa Igreja de Cristo"."
 coronation_titling_artifact_will_be_lost_4_tt: ""Defenderei os fiéis de [ROOT.Char.GetFaith.HighGodNamePossessive]"."
 coronation_titling_artifact_will_be_lost_5_tt: "Juramento de perseguição"
 coronation_artifact_improved: "Uma parte fundamental da coroação deste governante foi um juramento inesquecivelmente feroz de perseguir os não crentes."
 crowning_artifact_desc: "O kurultai"
 old_title_artifact_remains_tt: "Súplica dos nobres"
 coronation_title_artifact_log_title: "Uma demonstração mútua de respeito durante os juramentos de coroação"
 coronation_title_artifact_log: "Nenhuma voz individual proclama o título [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsName] ao eterno céu azul! Nem #EMP uma só#! mão ergue o estandarte de rabo de cavalo! Todos os chefes das tribos, reunidos neste [Glossary( 'kurultai', 'KURULTAI_GLOSS' )], devem aprovar [Select_CString( ROOT.Char.IsFemale, 'aquela', 'aquele' )] que conduzirá seus cavalos à guerra."
 HOF_DOESNT_EXIST: "Um conselho de senhores dos cavalos, reunido para eleger seu novo governante em meio a banquetes, competições de luta e tiro com arco. Muitas vezes, grandes campanhas militares eram planejadas nessas ocasiões."
 coronation_events.6120.t: "A nobreza se aproxima para prestar homenagem ao seu [Glossary( 'autocrátor', 'AUTOKRATOR_GLOSS')]. Se estivéssemos em campanha, e eles fossem soldados, eu seria erguido sobre um grande escudo polido. Aqui, rastejam para me beijar os joelhos."
 coronation_events.6120.desc_cathedral: "Os vassalos de [ROOT.Char.GetPrimaryTitle.GetNameNoTier] vêm adiante para oferecer sua lealdade. Um após outro erguendo as mãos abertas, um após outro se curvando para dar beijos de vassalagem."
 coronation_events.6120.desc_holy_site: "

Mas... meus vassalos negligenciam os gestos de respeito. Alguém sibila "#EMP [ROOT.Char.GetFirstNameNicknamed]? [vassal_2.Custom('CulturalCurse')|U]!"#! e interrompe as palavras adequadas. [vassal_1.GetTitledFirstNameNicknamed] lança veneno em meus olhos durante seu juramento. [vassal_2.GetTitledFirstNameNicknamed] ousa portar uma arma na minha presença e mal sussurra."
 coronation_events.6120.desc_generic_intro: "

Ainda preciso me tornar [ROOT.Char.GetTitleAsNameNoTooltip|l] de verdade, mas há devoção nestas súplicas capaz de comover qualquer coração. As grandes vozes do reino tremem de sentimento, e seus rostos brilham de esperança!"
 coronation_events.6120.desc_low_magnificence: "\n\nÀ medida que se aproximam, reflito… sobre os sopros que carregam a palavra "[ROOT.Char.GetTitleAsName|l]". Não sinto nem a tensão do amor, nem o traço de lealdade…"
 coronation_events.6120.desc_high_magnificence: ""Estes dissidentes são marionetes de potências estrangeiras!""
 coronation_events.6120.desc_generic_mid: "Seu libelo alarmista não deixará a seus detratores outra escolha senão renunciar aos seus aliados estrangeiros."
 coronation_events.6120.desc_anointment: "Devo elogiar aqueles que são novos nesses costumes."
 coronation_events.6120.desc: "Ergo-me e presto homenagem aos lordes minoritários do reino!"
 coronation_events.6120.desc_low_clergy: "Meus partidários estão comigo!"
 coronation_events.6120.desc_high_clergy: "Contemplai, traidores! #EMP O poder de voss[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip]!#!."
 coronation_events.6120.desc_mid_clergy: "[vassal_2.Custom('ES_ElLa')|U] [vassal_2.GetTitledFirstNameNoTooltip|l] desembainha sua espada diante de mim… #EMP Farei com que use!#!"
 coronation_events.6120.a: "Eles me odeiam, mas não podem me deter."
 coronation_events.6120.a.flavor: "Submissão total. Que bela visão."
 coronation_events.6120.b: "São meus vassalos, os baluartes do meu domínio."
 coronation_events.6120.b.flavor: "#V Duelo#! com [vassal_2.GetFirstName]
@death_icon! #X Este duelo é até a morte!#!
Sua [prowess|lE]: [prowess_i]#V [host.GetProwess]#!
[prowess|E] de [vassal_2.GetFirstName]: [prowess_i]#V [vassal_2.GetProwess]#!"
 coronation_denying_clergy_modifier: "Apelar às massas"
 coronation_denying_clergy_modifier_desc: "As figuras mais influentes entre os [host.Custom('GetLocalCommonerTermPlural')] de [location.GetTitle.GetNameNoTier] são as próximas a avançar, representando meus súditos comuns de [host.GetPrimaryTitle.GetAdjective] na minha ausência. O [host.GetFaith.BishopNeuter|l] adverte esses anciãos curvados sobre meu grande poder e autoridade, e lhes pede sua aprovação simbólica para que eu me torne um [ROOT.Char.GetTitleAsName] legítim[ROOT.Char.Custom('ES_OA')].\n\n"
 coronation_events.6120.c_begrudging: "As figuras mais importantes entre os [host.Custom('GetLocalCommonerTermPlural')] de [location.GetTitle.GetNameNoTier] são os próximos a avançar, manifestando a adesão do povo comum. Com meu grande poder e autoridade, o [host.GetFaith.BishopNeuter] adverte esses anciãos curvados e pergunta se me aceitarão como legítim[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsName].\n\n"
 coronation_events.6120.c_christian: "Enquanto proferem as palavras costumeiras, outro som chega aos meus ouvidos. Além de [ROOT.Char.GetFaith.HouseOfWorship], as multidões à espera cantam [Glossary( 'Kýrie, eléison', 'KYRIE_ELEISON_GLOSS' )] em meu nome. Em uma única voz poderosa e tumultuosa, centenas de almas oferecem oração pela minha!"
 coronation_events.6120.c: "Enquanto pronunciam as palavras, outro som chega aos meus ouvidos. Além de [ROOT.Char.GetFaith.HouseOfWorship], as multidões expectantes clamam em jubilosa antecipação. Centenas de pessoas chamam meu nome uma e outra vez:

"#EMP [ROOT.Char.GetFirstName]! [ROOT.Char.GetFirstNameNoTooltip]! [ROOT.Char.GetFirstNameNoTooltip] de [ROOT.Char.GetPrimaryTitle.GetNameNoTier]!#!""
 coronation_swore_persecution_modifier: "Eles pronunciam as palavras, trêmulos, sob um rugido crescente. Além de [ROOT.Char.GetFaith.HouseOfWorship] a ralé imunda de [location.GetTitle.GetNameNoTier] uiva: que algazarra horrível! Algo os perturbou. Uma briga sem sentido, uma rixa local… ou, talvez, um[ROOT.Char.Custom('ES_XA')] nov[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip] [ROOT.Char.Custom('ES_AlAla')] que todos detestam."
 coronation_swore_persecution_modifier_desc: "Dizem as palavras costumeiras suficientemente bem, e eu prometo minha proteção em troca… pois meu mandato se estende além dos [ROOT.Char.GetFaith.PriestNeuterPlural] e nobres de alta linhagem. E meu lar, no meio da [capital_p.Custom('TerrainTypeProvince')] de [capital_p.GetTitle.GetNameNoTier] é compartilhado por muitos plebeus da cultura [capital_p.GetCulture.GetName]."
 coronation_events.6121.t_kurultai: "Que os presentes jamais esqueçam este dia!"
 coronation_events.6121.t: "Toda essa gente leal merece uma aparição pessoal! E pão da parte do seu [ROOT.Char.GetTitleAsNameNoTooltip]!"
 cultural_acceptance_favored_during_oath: "Basta de dissensão. Todos que se manifestarem devem ser espancados."
 coronation_events.6121.desc_kurultai: "Que esta turba ruidosa, e todos no reino, sejam recebidos por uma bota de [host.Custom('GetFighterTerm')]!"
 KURULTAI_GLOSS: "Mas eu reino acima de todos eles."
 coronation_events.6121.desc_byzantine: "Como #EMP suplican#! pelo meu domínio!"
 coronation_events.6121.desc_generic_intro: "É uma honra."
 coronation_events.6121.desc_low_approval: "

Mas... meus vassalos negligenciam os gestos de respeito. Alguém sibila "As três aprovações"
 coronation_events.6121.desc_high_approval: "

Ainda preciso me tornar [ROOT.Char.GetTitleAsNameNoTooltip|l] de verdade, mas há devoção nestas súplicas capaz de comover qualquer coração. As grandes vozes do reino tremem de sentimento, e seus rostos brilham de esperança!"
 coronation_events.6121.desc_mid_approval: "Fazem um apelo [host.Custom('ES_AlAla')] [host.GetTitleAsNameNoTooltip] para que honre seus direitos sagrados e defenda os fiéis. [host.GetFirstNameNoTooltip] concorda."
 coronation_events.6121.a: "Depois,"
 coronation_events.6121.a.flavor: "os [host.Custom('GetLocalCommonerTermPlural')] locais representam o povo comum [host.GetPrimaryTitle.GetAdjective]. E"
 coronation_events.6121.b: "os anciãos de [location.GetTitle.GetBaseNameNoTier], tremendo de medo, enquanto há tumultos além de sua [ROOT.Char.GetFaith.HouseOfWorship]. A gente daqui não tem o menor apreço por [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip].\n\n"
 coronation_events.6121.b_flavor: "os anciãos de [location.GetTitle.GetBaseNameNoTier] encaram com admiração [host.Custom('ES_AlAla')] [host.GetTitleAsNameNoTooltip] enquanto as multidões do lado de fora exaltam o nome [host.Custom('GetTitleTierAdjective')].\n\n"
 coronation_events.6121.c: "os anciãos de [location.GetTitle.GetBaseNameNoTier] pigarreiam seu reconhecimento simbólico e [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip] promete um amor [host.Custom('GetMaternalPaternal')] ao povo comum.\n\n"
 coronation_events.6121.d: "Os vassalos de [host.GetFirstNameNoTooltip] avançam sombriamente. A maioria deles mal se dá ao trabalho de proferir palavras de lealdade em meio aos seus gestos de ódio."
 coronation_events.6121.d_flavor: "Os vassalos de [host.GetFirstNameNoTooltip] dão um passo à frente para suplicar por si mesmos: a maioria irradia esperança e jura sinceramente sua lealdade e amor."
 coronation_events.6121.e_low: "Os vassalos de [host.GetFirstNameNoTooltip] avançam para se ajoelhar e jurar sua fidelidade. Alguns consideram este ato uma grande honra; outros murmuram sombriamente e não levantam os olhos do chão."
 coronation_events.6121.e_high: "E, finalmente… é a minha vez."
 coronation_events.6121.e_mid: "A cerimônia continua, sem parar."
 coronation_events.6121_duel_tt: "#V Duelo#! com [vassal_2.GetFirstName]
@death_icon! #X Este duelo é até a morte!#!
Sua [prowess|lE]: [prowess_i]#V [host.GetProwess]#!
[prowess|E] de [vassal_2.GetFirstName]: [prowess_i]#V [vassal_2.GetProwess]#!"
 coronation_events.6122.t: "Murmuro o que for costume."
 coronation_events.6122.desc_intro_foreign: "Ajoelho-me diante de [host.GetFirstNameNoTooltipRegnal] a verdadeira [host.Custom('ES_ElLa')] [host.Custom('ES_OA')].[host.GetTitleAsNameNoTooltip]"
 coronation_events.6122.desc_intro: "Ajoelho-me diante do meu [host.GetTitleAsNameNoTooltip]."
 coronation_events.6122.desc_high_approval_christian: "Os vassalos de [host.GetFirstNameNoTooltip] não se deixam enganar por esta farsa…"
 coronation_events.6122.desc_high_approval: "Enquanto pronunciam as palavras, outro som chega aos meus ouvidos. Além de [ROOT.Char.GetFaith.HouseOfWorship], as multidões expectantes clamam em jubilosa antecipação. Centenas de pessoas chamam meu nome uma e outra vez:

"Prova de sua honra e da virtude de [host.GetFirstNameNoTooltip]."
 coronation_events.6122.desc_low_approval: "Imagine estar comprometido com essa espécie de [host.Custom('InsultNoun')] repugnante…"
 coronation_events.6122.desc_mid_approval: "[host.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] se apresenta diante de [host.GetFirstNameNoTooltipRegnal]."
 coronation_events.6122.a: "O apoiador lidera os juramentos de lealdade"
 coronation_events.6122.a.flavor: "O detrator menospreza o juramento ao novo suserano"
 coronation_events.6122.b: "A unção"
 coronation_events.6122.b.flavor: "As águas sagradas"
 coronation_events.6122.c_low: "O óleo sagrado"
 coronation_events.6122.c_high: "Como #EMP suplican#! pelo meu domínio!"
 coronation_events.6122.c_mid: "Os momentos finais sagrados se aproximam."
 coronation_events.6122.c_v_low_humble: "Mas antes, a unção com óleo sagrado, o sinal da aceitação [anointer.Custom('ES_DelDela')] [anointer.GetTitledFirstNameRegnal|l]: não apenas da minha pessoa como governante de [ROOT.Char.GetPrimaryTitle.GetNameNoTier], mas como parte dos membros mais altos dos eleitos de Cristo."
 coronation_events.6122.c_v_low: "Mas primeiro, a unção: o sinal do mandato de Deus [host.Custom('ES_DelDela')] [host.GetTitledFirstNameRegnal|l]. [anointer.Custom('ES_ElLa')|U] [anointer.GetTitledFirstNameRegnal|l] porta pessoalmente o óleo sagrado e assume o papel do profeta Samuel para este rei David [host.GetPrimaryTitle.GetAdjective]."
 coronation_events.6123.t: "Primeiro, devo ser ungido com o óleo sagrado, investido como líder dos fiéis de [host.GetFaith.HighGodNamePossessive], como alguém acima do rebanho comum."
 coronation_events.6123.desc_intro: "Até que os [host.GetFaith.BishopNeuterPlural], o estamento nobre [host.GetPrimaryTitle.GetAdjective] e o povo comum tenham cumprido sua parte tradicional, [host.GetFirstName] não será [host.GetTitleAsNameNoTooltip|l] de verdade. Seu reinado não pode ser justo sem a aceitação deles.

Primeiro, os [ROOT.Char.GetFaith.PriestNeuterPlural]."
 coronation_events.6123.desc_low_clergy: "Uma série de rituais comumente praticados usados para inaugurar monarcas das fés dhármicas. O #G rajasuya#! inclui elementos como aspergir com águas sagradas, receber um arco com três flechas, pisar sobre uma pele de tigre e jogar dados."
 coronation_events.6123.desc_high_clergy: "Uma antiga cerimônia dhármica em que reis ou anciãos são aspergidos com águas reunidas dos rios sagrados e dos quatro cantos da costa da Índia. O ritual está associado à ascensão ao trono."
 coronation_events.6123.desc_mid_clergy: "Mas primeiro, a unção com óleo sagrado, o sinal da aceitação [anointer.Custom('ES_DelDela')] [anointer.GetTitledFirstNameRegnal|l]: não só de minha pessoa como governante de [ROOT.Char.GetPrimaryTitle.GetNameNoTier], mas como membro dos favorecidos entre os fiéis [host.GetFaith.HighGodNamePossessive]."
 coronation_events.6123.desc_then: "Mas primeiro, a unção: a marca do mandato [host.Custom('ES_DelDela')] [host.GetTitledFirstNameRegna|ll] de parte de [host.GetFaith.HighGodName]. [anointer.Custom('ES_ElLa')|U] [anointer.GetTitledFirstNameRegnal|l] carrega pessoalmente o óleo sagrado."
 coronation_events.6123.desc_pop_foreign: "os [host.Custom('GetLocalCommonerTermPlural')] locais representam o povo comum [host.GetPrimaryTitle.GetAdjective]. E"
 coronation_events.6123.desc_low_populace: "\n\n[anointer.Custom('ES_ElLa')|U] [anointer.GetTitledFirstName|l], com uma repulsa sutil,"
 coronation_events.6123.desc_high_populace: "\n\n[anointer.Custom('ES_ElLa')|U] [anointer.GetTitledFirstName|l], com orgulho [host.Custom('GetMotherlyFatherly')],"
 coronation_events.6123.desc_mid_populace: "\n\n[anointer.Custom('ES_ElLa')|U] [anointer.GetTitledFirstName|l], intercessor[anointer.Custom('ES_XA')] dos [host.GetFaith.GetAdherentNamePlural],"
 coronation_events.6123.desc_low_vassals: "\n\n[anointer.Custom('ES_ElLa')|U] [anointer.GetTitledFirstName|l], pastor[anointer.Custom('ES_XA')] de [anointer.GetPrimaryTitle.GetNameNoTier],"
 coronation_events.6123.desc_high_vassals: "\n\n[anointer.Custom('ES_ElLa')|U] [anointer.GetTitledFirstName|l], pastor[host.Custom('ES_XA')] de [host.GetPrimaryTitle.GetNameNoTier],"
 coronation_events.6123.desc_mid_vassals: "\n\n[anointer.Custom('ES_ElLa')|U] [anointer.GetTitledFirstName|l], solene e sábio[host.Custom('ES_OA')],"
 coronation_events.6123.desc_end_vassal: "E, finalmente… é a minha vez."
 coronation_events.6123.desc_end_spectator: "me marca com o óleo dourado pungente: nas mãos estendidas, na cabeça, no peito, nos ombros e nas dobras dos braços... esta unção concedida a profetas, [host.GetFaith.PriestNeuterPlural] e monarcas.\n\n"
 coronation_events.6123.a: "me marca com o óleo sagrado, dourado e de aroma suave: nas mãos trêmulas, na cabeça, no peito, nos ombros e nas dobras dos braços... esta unção compartilhada por profetas, [host.GetFaith.PriestNeuterPlural] e monarcas.\n\n"
 coronation_events.6123.a_flavor: "marca [host.Custom('ES_AlAla')] [host.GetFirstNameNoTooltip|l] com o sagrado óleo dourado: nas mãos, na cabeça, no peito, nos ombros e nas dobras dos braços… Uma bênção para profetas, [host.GetFaith.PriestNeuterPlural] e monarcas.\n\n"
 coronation_events.6123.b: "conduz aqueles que me consagrarão. De potes dourados saem as águas que dão vida. Em chuvas radiantes, elas são aspergidas sobre meu corpo e trazem doces lembranças de Saraswati, do Ganges, dos mares.\n\n"
 coronation_events.6123.b_flavor: "dirige aqueles que [host.GetHerHim] consagrarão. De vasos dourados fluem as águas que dão vida. Em chuvas radiantes, elas são derramadas sobre [host.GetFirstNameNoTooltip].\n\n"
 coronation_events.6123.c_vassal_resents: "Murmuro o que for costume."
 coronation_events.6123.c_vassal_pleased: "Minha pele reluz com a própria aprovação de [host.GetFaith.HighGodName]."
 coronation_events.6123.c_vassal_neutral: "Tenho a aprovação [host.GetFaith.HighGodNamePossessive]. E me sinto muito engordurado[ROOT.Char.Custom('ES_OA')]."
 coronation_events.6123.c_likes_disrespect: "A pele [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip] reluz com a aprovação de [host.GetFaith.HighGodNamePossessive]."
 coronation_events.6123.c_dislikes_disrespect: "A pele oleosa [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip|l] é uma ótima aprovação dos fiéis."
 coronation_events.6123.c_dislikes_loyalty: "Pelas deusas dos rios e pelos deuses dos mares, por [ROOT.Char.GetFaith.WaterGodName] por [host.GetFaith.FertilityGodName], sou honrado como [host.GetTitleAsName]."
 coronation_events.6123.c_likes_loyalty: "Pelas deusas dos rios e pelos deuses dos mares, por [ROOT.Char.GetFaith.WaterGodName] por [host.GetFaith.FertilityGodName], honrou-se a [host.GetFirstNameNoTooltip] como [host.GetTitleAsName]."
 coronation_events.6123.c_dislikes_host: "Do óleo sagrado… #EMP fuego santo!#!"
 coronation_events.6123.c: "E estas águas devem ser defendidas!"
 coronation_supporter_pledge_leader_log_title: "Com as ameaças pairando sobre o [host.GetFaith.GetNameNoTooltip|l], preciso de mais bênçãos para me tornar [Select_CString( ROOT.Char.IsFemale, 'uma autêntica campeã', 'um autêntico campeão' )] da fé? Não!"
 coronation_detractor_pledge_insult_log_title: "A palavra abençoada cabe a mim espalhar."
 coronation_events.6130.t_anointment: "Pela mão de [anointer.Custom('ES_DelDela')] [anointer.GetTitledFirstNameNoTooltip|l], eu conheço a graça de [host.GetFaith.HighGodNamePossessive]."
 coronation_events.6130.t_dharmic: "A ajuda de [anointer.Custom('ES_DelDela')] [anointer.GetTitledFirstNameNoTooltip|l] também é uma grande honra."
 coronation_events.6130.t: "Devo expressar minha gratidão ao prelado."
