 major_coronation_approval_modifier: "Com a conclusão dos ritos da entronização [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip], agora a consorte do povo deve ser devidamente entronizada [spouse.Custom('ES_AlAla')] de [host.Custom('GetTitleTierAdjective')].\n\n"
 major_coronation_approval_unsettled_modifier: "Com os ritos da entronização de [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip], agora deve ser devidamente empossad[spouse.Custom('ES_LoLa')] s consortes de [host.Custom('GetTitleTierAdjective')].\n\n"
 major_coronation_approval_modifier_desc: "Enquanto meu [spouse.Custom2('RelationToMe', SCOPE.sC('host'))] observa, sou conduzido pelos rituais do trono [host.GetPrimaryTitle.GetAdjective]."
 major_coronation_approval_unsettled_modifier_desc: "Minha educação [spouse.GetCulture.GetName] não me preparou bem para os estranhos ritos de [host.GetCulture.GetName] entre preces [host.GetFaith.GetAdherentNamePlural]… Não falo [host.GetCulture.GetLanguage.GetName] e devo recitar os juramentos apenas pela lembrança de seus sons."
 medium_coronation_approval_modifier: "Minha criação [spouse.GetCulture.GetName] não me preparou bem para os estranhos ritos [host.GetCulture.GetName] entre preces [host.GetFaith.GetAdherentNamePlural]… Não falo [host.GetCourtLanguage.GetName] e devo recitar os juramentos confiando apenas na memória de seus sons."
 medium_coronation_approval_unsettled_modifier: "Nós, os humildes membros de [spouse.GetHouse.GetName] raramente fomos sequer testemunhas de tão régios procedimentos. Os obscuros votos de lealdade a [host.GetFaith.random_GoodGodNames] que devo proferir representam um certo desafio…"
 medium_coronation_approval_modifier_desc: "Sou de uma linhagem gloriosa: nós, [spouse.Custom('GetDaughterSon')]s da Casa [spouse.GetHouse.GetName], dominamos as cerimônias e me conduzo com gravidade e compostura."
 medium_coronation_approval_unsettled_modifier_desc: "Recito as palavras tradicionais e falo em termos esplêndidos de [host.GetFirstNameNoTooltip], [host.GetFaith.HighGodName] e meu dever para com o senhorio de minha [spouse.Custom2('RelationToMe', SCOPE.sC('host'))]."
 minor_coronation_approval_modifier: "\n\nPouco depois —e com grande cerimônia— é colocada sobre minha cabeça uma coroa digna [spouse.Custom('ES_DelDela')] [spouse.Custom('WifeHusband')] do povo [host.Custom('GetTitleTierAdjective')] de [host.GetFirstNameNoTooltip]. [host.GetPrimaryTitle.GetName|U] nos aclama enquanto nos sentamos [Select_CString(And(host.IsFemale, spouse.IsFemale), 'juntas', 'juntos')] em nossos tronos."
 minor_coronation_approval_unsettled_modifier: "\n\nPouco tempo depois —e com grande cerimônia—, sou conduzido a um lugar de honra ao lado de [host.GetFirstNameNoTooltip] e assumo o trono como seu [spouse.Custom('WifeHusband')] [host.Custom('GetTitleTierAdjective')]."
 minor_coronation_approval_modifier_desc: "Aqui, os partidários leais servem obstinadamente ao seu suserano recém-coroado."
 minor_coronation_approval_modifier_unsettled_desc: "Uma vez concluídos os ritos da entronização [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip], agora será devidamente empossada como [spouse.GetTitleAsName] [spouse.Custom('ES_AlAla')] consorte do povo [host.Custom('GetTitleTierAdjective')]\n\n"
 major_coronation_approval_malus_modifier: "Uma vez concluídos os ritos da entronização [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip], agora será devidamente consagrado como [spouse.GetTitleAsName] [spouse.Custom('ES_AlAla')] consorte sênior do povo [host.Custom('GetTitleTierAdjective')].\n\n"
 major_coronation_approval_malus_unsettled_modifier: "[spouse.Custom('ES_ElLa')|U] [spouse.Custom('WifeHusband')] [host.Custom('ES_DelDela')] [host.GetTitledFirstNameRegnal|l] conduz os rituais com [host.Custom2('QuirkNounPosOrNeg', spouse.MakeScope.Char)] inconfundível."
 major_coronation_approval_malus_modifier_desc: "Meu [host.Custom2('RelationToMe', SCOPE.sC('spouse'))] conduz os rituais com seu [host.Custom2('QuirkNounPosOrNeg', spouse.MakeScope.Char)] inconfundível."
 major_coronation_approval_malus_unsettled_modifier_desc: "A educação dela [spouse.GetCulture.GetName] não a preparou bem para os ritos [host.GetCulture.GetName] em meio às preces de [host.GetFaith.GetAdherentNamePlural]: ela recita os juramentos em [host.GetCulture.GetLanguage.GetName] lembrando apenas de como soam."
 medium_coronation_approval_malus_modifier: "A educação dele/dela [spouse.GetCulture.GetName] não [spouse.Custom('ES_LoLa')] o/a preparou bem para os ritos [host.GetCulture.GetName] entre orações [host.GetFaith.GetAdherentNamePlural] : recita os juramentos em [host.GetCulture.GetCourtLanguage.GetName] recordando de memória como soam."
 medium_coronation_approval_malus_unsettled_modifier: "Sua origem humilde fica de certa forma revelada quando [spouse.GetFirstName] se atrapalha com os votos mais obscuros de lealdade a [host.GetFaith.random_GoodGodNames]…"
 medium_coronation_approval_malus_modifier_desc: "Como testemunho de sua linhagem gloriosa, [spouse.GetFirstName] se levanta para recitar seus votos com gravidade e compostura."
 medium_coronation_approval_malus_unsettled_modifier_desc: "[spouse.Custom('DaughterSon')|U] da [spouse.GetHouse.GetName], as palavras pronunciadas [host.Custom2('QuirkAdverbPosOrNeg', spouse.MakeScope.Char)] por [spouse.GetFirstName] carregam as marcas de sua nobre ascendência [spouse.GetCulture.GetName]."
 minor_coronation_approval_malus_modifier: "\n\nEm pouco tempo —e com grande cerimônia— a coroa é colocada sobre a cabeça de [spouse.GetFirstNameNoTooltip] pela primeira vez.. [host.GetPrimaryTitle.GetDefinitiveName|U] aclama seu [spouse.GetTitleAsNameNoTooltip]."
 minor_coronation_approval_malus_unsettled_modifier: "\n\nPouco depois — e com grande cerimônia — [spouse.GetFirstNameNoTooltip] é conduzido(a) ao seu lugar de honra ao meu lado, e ele(a) assume o trono como [spouse.GetTitleAsNameNoTooltip|l] de [host.GetPrimaryTitle.GetNameNoTier]"
 minor_coronation_approval_malus_modifier_desc: "Infelizmente, preciso me livrar dest[spouse.Custom('ES_EA')] [spouse.GetWomanMan] tão [spouse.Custom('ComplimentAdjective')]…"
 minor_coronation_approval_malus_unsettled_modifier_desc: "#EMP Debo#! me livrar des[spouse.Custom('ES_EA')] [spouse.GetWomanMan] [spouse.Custom('InsultAdjective')]…"
