 coronation_events.6140_desc_intro_spouse: "[spouse.GetSheHe|U] sofreu ritos pagãos por sua causa"
 coronation_events.6140_desc_polygamous_spouse: "Não consegue ver [spouse.GetFirstNameNoTooltip] que, pela mão sagrada de [anointer.Custom('ES_DelDela')] [anointer.GetTitledFirstNameNoTooltipRegnal|l], pode-se dizer que esta cerimônia [spouse.GetHerHim] o(a) reconheceu como um(a) dos fiéis [host.GetFaith.GetAdjectiveNoTooltip]? Meu/minha [spouse.GetWifeHusband] deve abraçar sua conversão!"
