 coronation_artifact_improved: "[artifact_target.GetName] será abençoado com um [modifier|lE]"
 crowning_artifact_desc: "[chosen_artifact.GetDesc]\n\nEm [year] foi abençoado como item régio de [host.GetPrimaryTitle.GetNameNoTier] para a coroação de [host.Custom('ES_DelDela')] [host.GetTitledFirstNameRegnal|l]."
 old_title_artifact_remains_tt: "[old_title_artifact.GetName] será usado para seu [coronation|lE]"
 coronation_title_artifact_log_title: "Artefato dedicado a [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]"
 coronation_title_artifact_log: "Agora, [chosen_artifact.GetName] será herdado com [host.GetPrimaryTitle.GetName]"
 HOF_DOESNT_EXIST: "Seu [faith|lE] não tem [head_of_faith|lE]"
 coronation_events.6120.t: "O juramento aos [host.GetFaith.BishopNeuterPlural]"
 coronation_events.6120.desc_cathedral: "O incenso paira no ar enquanto minha procissão de espírito [ROOT.Char.Custom('GetTitleTierAdjective')] entra na catedral."
 coronation_events.6120.desc_holy_site: "Fragrâncias sagradas flutuam no ar enquanto minha procissão de espírito [ROOT.Char.Custom('GetTitleTierAdjective')] entra no/a [ROOT.Char.GetFaith.HouseOfWorship]."
 coronation_events.6120.desc_generic_intro: "Além dos portões de minha [host.Custom('ResidenceBuilding')], minha procissão de espírito [ROOT.Char.Custom('GetTitleTierAdjective')] segue em direção a um altar sagrado e aos oficiante à espera."
 coronation_events.6120.desc_low_magnificence: "A nobreza e os [host.GetFaith.AltPriestTermPlural] se empurram e trocam farpas para conseguir lugar. Algumas poucas vozes fracas se esforçam ao recitar preces sagradas."
 coronation_events.6120.desc_high_magnificence: "A nobreza, os [host.GetFaith.AltPriestTermPlural] e eu tomamos solenemente nossos lugares em meio à cadência comovente de preces sagradas."
 coronation_events.6120.desc_generic_mid: "A nobreza se afasta para a chegada dos [host.GetFaith.AltPriestTermPlural], suas vozes se elevam como uma só em uma oração sagrada."
 coronation_events.6120.desc_anointment: "\n\nAgora, o rito da petição dos [host.GetFaith.BishopNeuterPlural] enquanto [hof.Custom('ES_ElLa')] [hof.GetTitledFirstNameRegnal|l] observa atent[hof.Custom('ES_OA')]."
 coronation_events.6120.desc: "\n\nAgora, o rito da petição dos [host.GetFaith.BishopNeuterPlural]."
 coronation_events.6120.desc_low_clergy: "Sou alvo do desprezo destes déspotas mesquinhos, que apresentam seu pedido sagrado como um insulto humilhante.\n\n"Servo[ROOT.Char.Custom('ES_XA')] de [ROOT.Char.GetFaith.HighGodName], você se arrepende dos seus muitos pecados? Você dedica seus caprichos mortais a preservar os amados [host.GetFaith.AltPriestTermPlural] de [ROOT.Char.GetFaith.HighGodNamePossessive]?""
 coronation_events.6120.desc_high_clergy: "Sou reverenciado por estes intercessores pelo divino, e é com reverente deferência que eles suplicam:\n\n"Grande [host.GetTitleAsName], guardareis os fiéis e preservareis os direitos dos [host.GetFaith.AltPriestTermPlural] [ROOT.Char.GetFaith.HighGodNamePossessive]?"."
 coronation_events.6120.desc_mid_clergy: "Sou uma figura desconhecida para estes clérigos, e eles apresentam seu pedido costumeiro com verdadeiro interesse.\n\n"Ireis proteger os fiéis como [ROOT.Char.GetTitleAsName] e preservareis os direitos e privilégios dos [host.GetFaith.AltPriestTermPlural] [ROOT.Char.GetFaith.HighGodNamePossessive]?"."
 coronation_events.6120.a: "#EMP "Serei um martelo contra o infiel!"#!"
 coronation_events.6120.a.flavor: "Jurar, com ódio mortal, que vou exterminar hereges e não crentes agradará aos [host.GetFaith.AltPriestTermPlural]… e fará com que meu reinado siga um caminho de retidão!"
 coronation_events.6120.b: "Distorcer a resposta tradicional a meu favor."
 coronation_events.6120.b.flavor: "Há uma linha tão tênue entre prometer fidelidade a estes [ROOT.Char.GetFaith.PriestNeuterPlural]… e colocar meu mandato abençoado por [ROOT.Char.GetFaith.HighGodName] acima do deles…"
 coronation_denying_clergy_modifier: "Explorar o clero"
 coronation_denying_clergy_modifier_desc: "Em vez de agir como servo da fé, este governante exerce domínio sobre a classe clerical e suas rendas."
 coronation_events.6120.c_begrudging: "Direi as palavras. Como devo."
 coronation_events.6120.c_christian: ""Defenderei a santa Igreja de Cristo"."
 coronation_events.6120.c: ""Defenderei os fiéis de [ROOT.Char.GetFaith.HighGodNamePossessive]"."
 coronation_swore_persecution_modifier: "Juramento de perseguição"
 coronation_swore_persecution_modifier_desc: "Uma parte fundamental da coroação deste governante foi um juramento inesquecivelmente feroz de perseguir os não crentes."
 coronation_events.6121.t_kurultai: "O kurultai"
 coronation_events.6121.t: "Súplica dos nobres"
 cultural_acceptance_favored_during_oath: "Uma demonstração mútua de respeito durante os juramentos de coroação"
 coronation_events.6121.desc_kurultai: "Nenhuma voz individual proclama o título [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsName] ao eterno céu azul! Nem #EMP una sola#! mão ergue o estandarte de rabo de cavalo! Todos os chefes das tribos, reunidos neste [Glossary( 'kurultái', 'KURULTAI_GLOSS' )], devem aprovar [Select_CString( ROOT.Char.IsFemale, 'aquella', 'aquel' )] que açoitará seus cavalos rumo à guerra."
 KURULTAI_GLOSS: "Um conselho de senhores dos cavalos, reunido para eleger seu novo governante em meio a banquetes, competições de luta e tiro com arco. Muitas vezes, grandes campanhas militares eram planejadas nessas ocasiões."
 coronation_events.6121.desc_byzantine: "A nobreza se aproxima para prestar homenagem ao seu [Glossary( 'autocrátor', 'AUTOKRATOR_GLOSS')]. Se estivéssemos em campanha, e eles fossem soldados, eu seria erguido sobre um grande escudo polido. Aqui, rastejam para me beijar os joelhos."
 coronation_events.6121.desc_generic_intro: "Os vassalos de [ROOT.Char.GetPrimaryTitle.GetNameNoTier] vêm adiante para oferecer sua lealdade. Um após outro erguendo as mãos abertas, um após outro se curvando para dar beijos de vassalagem."
 coronation_events.6121.desc_low_approval: "\n\nMas… meus vassalos negligenciam os gestos de respeito. Alguém sibila entre os dentes «#EMP ¿[ROOT.Char.GetFirstNameNicknamed]? ¡[vassal_2.Custom('CulturalCurse')|U]!».#! e interrompe as palavras adequadas. [vassal_1.Custom('ES_ElLa')|U] [vassal_1.GetTitledFirstNameNicknamed|l] me lança um olhar envenenado durante seu juramento. [vassal_2.Custom('ES_ElLa')|U] [vassal_2.GetTitledFirstNameNicknamed|l] se atreve a portar uma arma na minha presença e mal sussurra."
 coronation_events.6121.desc_high_approval: "\n\nAinda mal me tornei em [ROOT.Char.GetTitleAsNameNoTooltip|l] de verdade, mas há devoção nestas súplicas capaz de comover qualquer coração. As grandes vozes do reino tremem de sentimento, e seus rostos brilham de esperança!"
 coronation_events.6121.desc_mid_approval: "\n\nÀ medida que se aproximam, reflito… sobre os sopros que carregam a palavra "[ROOT.Char.GetTitleAsName|l]". Não sinto nem a tensão do amor, nem o traço de lealdade…"
 coronation_events.6121.a: ""Estes dissidentes são marionetes de potências estrangeiras!""
 coronation_events.6121.a.flavor: "Seu libelo alarmista não deixará a seus detratores outra escolha senão renunciar aos seus aliados estrangeiros."
 coronation_events.6121.b: "Devo elogiar aqueles que são novos nesses costumes."
 coronation_events.6121.b_flavor: "Ergo-me e presto homenagem aos lordes minoritários do reino!"
 coronation_events.6121.c: "Meus partidários estão comigo!"
 coronation_events.6121.d: "Contemplai, traidores! #EMP O poder de voss[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip]!#!."
 coronation_events.6121.d_flavor: "[vassal_2.Custom('ES_ElLa')|U] [vassal_2.GetTitledFirstNameNoTooltip|l] desembainha sua espada diante de mim… #EMP Farei com que use!#!"
 coronation_events.6121.e_low: "Eles me odeiam, mas não podem me deter."
 coronation_events.6121.e_high: "Submissão total. Que bela visão."
 coronation_events.6121.e_mid: "São meus vassalos, os baluartes do meu domínio."
 coronation_events.6121_duel_tt: "#V Duelo#! com [vassal_2.GetFirstName]\n@death_icon! #X ¡Este duelo es a muerte!.#!\nSeu [prowess|lE]: #V [host.GetProwess]#! [prowess_i]\n[prowess|E] de [vassal_2.GetFirstName]:#V [vassal_2.GetProwess]#! [prowess_i]"
 coronation_events.6122.t: "Apelar às massas"
 coronation_events.6122.desc_intro_foreign: "As figuras mais influentes entre os [host.Custom('GetLocalCommonerTermPlural')] de [location.GetTitle.GetNameNoTier] são as próximas a avançar, representando meus súditos comuns de [host.GetPrimaryTitle.GetAdjective] na minha ausência. O [host.GetFaith.BishopNeuter|l] adverte esses anciãos curvados sobre meu grande poder e autoridade, e lhes pede sua aprovação simbólica para que eu me torne um [ROOT.Char.GetTitleAsName] legítim[ROOT.Char.Custom('ES_OA')].\n\n"
 coronation_events.6122.desc_intro: "As figuras mais importantes entre os [host.Custom('GetLocalCommonerTermPlural')] de [location.GetTitle.GetNameNoTier] são os próximos a avançar, manifestando a adesão do povo comum. Com meu grande poder e autoridade, o [host.GetFaith.BishopNeuter] adverte esses anciãos curvados e pergunta se me aceitarão como legítim[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsName].\n\n"
 coronation_events.6122.desc_high_approval_christian: "Enquanto proferem as palavras costumeiras, outro som chega aos meus ouvidos. Além de [ROOT.Char.GetFaith.HouseOfWorship], as multidões à espera cantam [Glossary( 'Kýrie, eléison', 'KYRIE_ELEISON_GLOSS' )] em meu nome. Em uma única voz poderosa e tumultuosa, centenas de almas oferecem oração pela minha!"
 coronation_events.6122.desc_high_approval: "Enquanto pronunciam as palavras, outro som chega aos meus ouvidos. Além de [ROOT.Char.GetFaith.HouseOfWorship] as multidões expectantes clamam em jubilosa antecipação. Centenas de pessoas chamam meu nome uma e outra vez:\n\n«#EMP [¡ROOT.Char.GetFirstName]! [ROOT.Char.GetFirstNameNoTooltip]! [ROOT.Char.GetFirstNameNoTooltip] de [ROOT.Char.GetPrimaryTitle.GetNameNoTier]!#!»."
 coronation_events.6122.desc_low_approval: "Eles pronunciam as palavras, trêmulos, sob um rugido crescente. Além de [ROOT.Char.GetFaith.HouseOfWorship] a ralé imunda de [location.GetTitle.GetNameNoTier] uiva: que algazarra horrível! Algo os perturbou. Uma briga sem sentido, uma rixa local… ou, talvez, um[ROOT.Char.Custom('ES_XA')] nov[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip] [ROOT.Char.Custom('ES_AlAla')] que todos detestam."
 coronation_events.6122.desc_mid_approval: "Dizem as palavras costumeiras suficientemente bem, e eu prometo minha proteção em troca… pois meu mandato se estende além dos [ROOT.Char.GetFaith.PriestNeuterPlural] e nobres de alta linhagem. E meu lar, no meio da [capital_p.Custom('TerrainTypeProvince')] de [capital_p.GetTitle.GetNameNoTier] é compartilhado por muitos plebeus da cultura [capital_p.GetCulture.GetName]."
 coronation_events.6122.a: "Que os presentes jamais esqueçam este dia!"
 coronation_events.6122.a.flavor: "Toda essa gente leal merece uma aparição pessoal! E pão da parte do seu [ROOT.Char.GetTitleAsNameNoTooltip]!"
 coronation_events.6122.b: "Basta de dissensão. Todos que se manifestarem devem ser espancados."
 coronation_events.6122.b.flavor: "Que esta turba ruidosa, e todos no reino, sejam recebidos por uma bota de [host.Custom('GetFighterTerm')]!"
 coronation_events.6122.c_low: "Mas eu reino acima de todos eles."
 coronation_events.6122.c_high: "Como #EMP suplican#! pelo meu domínio!"
 coronation_events.6122.c_mid: "É uma honra."
 coronation_events.6122.c_v_low_humble: "O sofrimento do povo simples me comove."
 coronation_events.6122.c_v_low: "Escória plebeia imunda."
 coronation_events.6123.t: "As três aprovações"
 coronation_events.6123.desc_intro: "Até que os [host.GetFaith.BishopNeuterPlural]o estamento nobre [host.GetPrimaryTitle.GetAdjective]e o povo comum não tenham cumprido sua parte tradicional, [host.GetFirstName]não será [host.GetTitleAsNameNoTooltip]de verdade. Seu reinado não pode existir sem a aceitação deles.\n\nPrimeiro de tudo, os [ROOT.Char.GetFaith.PriestNeuterPlural]."
 coronation_events.6123.desc_low_clergy: "Com o queixo santarrão erguido, obrigam [host.Custom('ES_AlAla')] [host.GetTitleAsNameNoTooltip] a jurar não apenas a proteção dos fiéis [host.GetFaith.GetAdherentNamePlural], mas também o arrependimento de seus pecados."
 coronation_events.6123.desc_high_clergy: "Com admiração, louvam o grande amor [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip] ao proteger os [host.GetFaith.GetAdherentNamePlural] e pedem que se torne seu grande campeão."
 coronation_events.6123.desc_mid_clergy: "Fazem um apelo [host.Custom('ES_AlAla')] [host.GetTitleAsNameNoTooltip] para que honre seus direitos sagrados e defenda os fiéis. [host.GetFirstNameNoTooltip] concorda."
 coronation_events.6123.desc_then: "Depois,"
 coronation_events.6123.desc_pop_foreign: "os [host.Custom('GetLocalCommonerTermPlural')] locais representam o povo comum [host.GetPrimaryTitle.GetAdjective]. E"
 coronation_events.6123.desc_low_populace: "os anciãos de [location.GetTitle.GetBaseNameNoTier], tremendo de medo, enquanto há tumultos além de sua [ROOT.Char.GetFaith.HouseOfWorship]. A gente daqui não tem o menor apreço por [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip].\n\n"
 coronation_events.6123.desc_high_populace: "os anciãos de [location.GetTitle.GetBaseNameNoTier] encaram com admiração [host.Custom('ES_AlAla')] [host.GetTitleAsNameNoTooltip] enquanto as multidões do lado de fora exaltam o nome [host.Custom('GetTitleTierAdjective')].\n\n"
 coronation_events.6123.desc_mid_populace: "os anciãos de [location.GetTitle.GetBaseNameNoTier] pigarreiam seu reconhecimento simbólico e [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip] promete um amor [host.Custom('GetMaternalPaternal')] ao povo comum.\n\n"
 coronation_events.6123.desc_low_vassals: "Os vassalos de [host.GetFirstNameNoTooltip] avançam sombriamente. A maioria deles mal se dá ao trabalho de proferir palavras de lealdade em meio aos seus gestos de ódio."
 coronation_events.6123.desc_high_vassals: "Os vassalos de [host.GetFirstNameNoTooltip] dão um passo à frente para suplicar por si mesmos: a maioria irradia esperança e jura sinceramente sua lealdade e amor."
 coronation_events.6123.desc_mid_vassals: "Os vassalos de [host.GetFirstNameNoTooltip] avançam para se ajoelhar e jurar sua fidelidade. Alguns consideram este ato uma grande honra; outros murmuram sombriamente e não levantam os olhos do chão."
 coronation_events.6123.desc_end_vassal: "E, finalmente… é a minha vez."
 coronation_events.6123.desc_end_spectator: "A cerimônia continua, sem parar."
 coronation_events.6123.a: "Faço meu juramento, #EMP com a máxima devoção!#!"
 coronation_events.6123.a_flavor: "Ergam suas vozes, meus companheiros! Entoem o glorioso nome de [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip]!"
 coronation_events.6123.b: "Faço um escândalo com meu desprezo."
 coronation_events.6123.b_flavor: "A cerimônia fajuta de [host.GetFirstNameNoTooltip] exige minha submissão? Eu preferiria chocar seus miseráveis partidários e cuspir em seu rosto!"
 coronation_events.6123.c_vassal_resents: "Murmuro o que for costume."
 coronation_events.6123.c_vassal_pleased: "Ajoelho-me diante de [host.GetFirstNameNoTooltipRegnal] a verdadeira [host.Custom('ES_ElLa')] [host.Custom('ES_OA')].[host.GetTitleAsNameNoTooltip]"
 coronation_events.6123.c_vassal_neutral: "Ajoelho-me diante do meu [host.GetTitleAsNameNoTooltip]."
 coronation_events.6123.c_likes_disrespect: "Os vassalos de [host.GetFirstNameNoTooltip] não se deixam enganar por esta farsa…"
 coronation_events.6123.c_dislikes_disrespect: "Seu [host.GetTitleAsNameNoTooltip] merece coisa melhor!"
 coronation_events.6123.c_dislikes_loyalty: "O lugar de todo verme [host.GetPrimaryTitle.GetAdjectiveNoTooltip] é o chão…"
 coronation_events.6123.c_likes_loyalty: "Prova de sua honra e da virtude de [host.GetFirstNameNoTooltip]."
 coronation_events.6123.c_dislikes_host: "Imagine estar comprometido com essa espécie de [host.Custom('InsultNoun')] repugnante…"
 coronation_events.6123.c: "[host.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] se apresenta diante de [host.GetFirstNameNoTooltipRegnal]."
 coronation_supporter_pledge_leader_log_title: "O apoiador lidera os juramentos de lealdade"
 coronation_detractor_pledge_insult_log_title: "O detrator menospreza o juramento ao novo suserano"
 coronation_events.6130.t_anointment: "A unção"
 coronation_events.6130.t_dharmic: "As águas sagradas"
 coronation_events.6130.t: "O óleo sagrado"
 # Intro
 coronation_events.6130.desc.intro: "Os momentos finais sagrados se aproximam."
 coronation_events.6130.papal_intro_host: "Mas antes, a unção com óleo sagrado, o sinal da aceitação [anointer.Custom('ES_DelDela')] [anointer.GetTitledFirstNameRegnal|l]: não apenas da minha pessoa como governante de [ROOT.Char.GetPrimaryTitle.GetNameNoTier], mas como parte dos membros mais altos dos eleitos de Cristo."
 coronation_events.6130.papal_intro_guest: "Mas primeiro, a unção: o sinal do mandato de Deus [host.Custom('ES_DelDela')] [host.GetTitledFirstNameRegnal|l]. [anointer.Custom('ES_ElLa')|U] [anointer.GetTitledFirstNameRegnal|l] porta pessoalmente o óleo sagrado e assume o papel do profeta Samuel para este rei David [host.GetPrimaryTitle.GetAdjective]."
 coronation_events.6130.abrahamic_intro_host: "Primeiro, devo ser ungido com o óleo sagrado, investido como líder dos fiéis de [host.GetFaith.HighGodNamePossessive], como alguém acima do rebanho comum."
 coronation_events.6130.abrahamic_intro_guest: "Primeiro, [host.Custom('ES_ElLa')] [host.GetTitledFirstNameRegnal|l] deve ser ordenad[host.Custom('ES_OA')] com o óleo sagrado, recebendo assim tratamento preferencial acima do resto dos fiéis [host.GetFaith.HighGodNamePossessive] e ministério sobre as almas de seu domínio."
 coronation_events.6130.dharmic_intro_host: "As oferendas foram feitas, começa o [Glossary( 'rajasuya', 'RAJASUYA_GLOSS' )]; agora, o sagrado [Glossary( 'abhisheka', 'ABHISHEKA_GLOSS' )]. Recito os mantras védicos e os portadores das dezessete águas sagradas se reúnem."
 coronation_events.6130.dharmic_intro_guest: "As oferendas foram feitas, começa o [Glossary( 'rajasuya', 'RAJASUYA_GLOSS' )]; agora, o sagrado [Glossary( 'abhisheka', 'ABHISHEKA_GLOSS' )]. [host.Custom('ES_ElLa')|U] [host.GetTitledFirstNameRegnal|l] recita os mantras védicos e os portadores das dezessete águas sagradas se reúnem ao redor de [host.GetSheHe]."
 RAJASUYA_GLOSS: "Uma série de rituais comumente praticados usados para inaugurar monarcas das fés dhármicas. O #G rajasuya#! inclui elementos como aspergir com águas sagradas, receber um arco com três flechas, pisar sobre uma pele de tigre e jogar dados."
 ABHISHEKA_GLOSS: "Uma antiga cerimônia dhármica em que reis ou anciãos são aspergidos com águas reunidas dos rios sagrados e dos quatro cantos da costa da Índia. O ritual está associado à ascensão ao trono."
 coronation_events.6130.generic_intro_host: "Mas primeiro, a unção com óleo sagrado, o sinal da aceitação [anointer.Custom('ES_DelDela')] [anointer.GetTitledFirstNameRegnal|l]: não só de minha pessoa como governante de [ROOT.Char.GetPrimaryTitle.GetNameNoTier], mas como membro dos favorecidos entre os fiéis [host.GetFaith.HighGodNamePossessive]."
 coronation_events.6130.generic_intro_guest: "Mas primeiro, a unção: a marca do mandato [host.Custom('ES_DelDela')] [host.GetTitledFirstNameRegna|ll] de parte de [host.GetFaith.HighGodName]. [anointer.Custom('ES_ElLa')|U] [anointer.GetTitledFirstNameRegnal|l] carrega pessoalmente o óleo sagrado."
 # Bit about priest
 coronation_events.6130.faith_head_disapproves: "\n\n[anointer.Custom('ES_ElLa')|U] [anointer.GetTitledFirstName|l], com uma repulsa sutil,"
 coronation_events.6130.faith_head_likes: "\n\n[anointer.Custom('ES_ElLa')|U] [anointer.GetTitledFirstName|l], com orgulho [host.Custom('GetMotherlyFatherly')],"
 coronation_events.6130.faith_head: "\n\n[anointer.Custom('ES_ElLa')|U] [anointer.GetTitledFirstName|l], intercessor[anointer.Custom('ES_XA')] dos [host.GetFaith.GetAdherentNamePlural],"
 coronation_events.6130.christian_non_hof_non_cc: "\n\n[anointer.Custom('ES_ElLa')|U] [anointer.GetTitledFirstName|l], pastor[anointer.Custom('ES_XA')] de [anointer.GetPrimaryTitle.GetNameNoTier],"
 coronation_events.6130.christian_non_hof: "\n\n[anointer.Custom('ES_ElLa')|U] [anointer.GetTitledFirstName|l], pastor[host.Custom('ES_XA')] de [host.GetPrimaryTitle.GetNameNoTier],"
 coronation_events.6130.anointer_fallback: "\n\n[anointer.Custom('ES_ElLa')|U] [anointer.GetTitledFirstName|l], solene e sábio[host.Custom('ES_OA')],"
 # actual anointing happens
 coronation_events.6130.anointing_abrahamic_host_disrespectful: "me marca com o óleo dourado pungente: nas mãos estendidas, na cabeça, no peito, nos ombros e nas dobras dos braços... esta unção concedida a profetas, [host.GetFaith.PriestNeuterPlural] e monarcas.\n\n"
 coronation_events.6130.anointing_abrahamic_host: "me marca com o óleo sagrado, dourado e de aroma suave: nas mãos trêmulas, na cabeça, no peito, nos ombros e nas dobras dos braços... esta unção compartilhada por profetas, [host.GetFaith.PriestNeuterPlural] e monarcas.\n\n"
 coronation_events.6130.anointing_abrahamic_guest: "marca [host.Custom('ES_AlAla')] [host.GetFirstNameNoTooltip|l] com o sagrado óleo dourado: nas mãos, na cabeça, no peito, nos ombros e nas dobras dos braços… Uma bênção para profetas, [host.GetFaith.PriestNeuterPlural] e monarcas.\n\n"
 coronation_events.6130.anointing_dharmic_host: "conduz aqueles que me consagrarão. De potes dourados saem as águas que dão vida. Em chuvas radiantes, elas são aspergidas sobre meu corpo e trazem doces lembranças de Saraswati, do Ganges, dos mares.\n\n"
 coronation_events.6130.anointing_dharmic_guest: "dirige aqueles que [host.GetHerHim] consagrarão. De vasos dourados fluem as águas que dão vida. Em chuvas radiantes, elas são derramadas sobre [host.GetFirstNameNoTooltip].\n\n"
 # Ending
 coronation_events.6130.ending_abrahamic_host_zealous: "Minha pele reluz com a própria aprovação de [host.GetFaith.HighGodName]."
 coronation_events.6130.ending_abrahamic_host_cynical: "Tenho a aprovação [host.GetFaith.HighGodNamePossessive]. E me sinto muito engordurado[ROOT.Char.Custom('ES_OA')]."
 coronation_events.6130.ending_abrahamic_guest_zealous: "A pele [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip] reluz com a aprovação de [host.GetFaith.HighGodNamePossessive]."
 coronation_events.6130.ending_abrahamic_guest_cynical: "A pele oleosa [host.Custom('ES_DelDela')] [host.GetTitleAsNameNoTooltip|l] é uma ótima aprovação dos fiéis."
 coronation_events.6130.ending_dharmic_host: "Pelas deusas dos rios e pelos deuses dos mares, por [ROOT.Char.GetFaith.WaterGodName] por [host.GetFaith.FertilityGodName], sou honrado como [host.GetTitleAsName]."
 coronation_events.6130.ending_dharmic_guest: "Pelas deusas dos rios e pelos deuses dos mares, por [ROOT.Char.GetFaith.WaterGodName] por [host.GetFaith.FertilityGodName], honrou-se a [host.GetFirstNameNoTooltip] como [host.GetTitleAsName]."
 coronation_events.6130.a: "Do óleo sagrado… #EMP fuego santo!#!"
 coronation_events.6130.a_dharmic: "E estas águas devem ser defendidas!"
 coronation_events.6130.a.flavor: "Com as ameaças pairando sobre o [host.GetFaith.GetNameNoTooltip|l], preciso de mais bênçãos para me tornar [Select_CString( ROOT.Char.IsFemale, 'uma autêntica campeã', 'um autêntico campeão' )] da fé? Não!"
 coronation_events.6130.b: "A palavra abençoada cabe a mim espalhar."
 coronation_events.6130.c: "Pela mão de [anointer.Custom('ES_DelDela')] [anointer.GetTitledFirstNameNoTooltip|l], eu conheço a graça de [host.GetFaith.HighGodNamePossessive]."
 coronation_events.6130.c_dharmic: "A ajuda de [anointer.Custom('ES_DelDela')] [anointer.GetTitledFirstNameNoTooltip|l] também é uma grande honra."
 coronation_events.6130.c.flavor: "Devo expressar minha gratidão ao prelado."
 coronation_events.6130.d.faithful_host: "Reluzo com o toque [host.GetFaith.HighGodNamePossessive]!"
 coronation_events.6130.d.cynical_host: "O que os [host.GetFaith.GetAdherentNameNoTooltip] agora poderiam me negar?"
 coronation_events.6130.d.faithful_guest: "E, desse modo, [host.GetFaith.HighGodName] escolhe [host.Custom('ES_AlAla')] [host.GetTitledFirstNameNoTooltip|l]"
 coronation_events.6130.d.cynical_guest: "E assim, o clero aceita um[anointer.Custom('ES_XA')][host.GetTitleAsNameNoTooltip]."
 coronation_events.6130.d.faithful_host_dharmic: "Que minha mente descanse sempre a seus pés de lótus."
 coronation_events.6130.d.faithful_guest_dharmic: "Que as águas, puras e inquietas, tragam sabedoria."
 coronation_anointed_imperial_modifier: "Unção suprema"
 coronation_anointed_imperial_modifier_desc: "Este governante ungido não deixará que ninguém esqueça que seu reinado foi abençoado e endossado pelo mais alto prelado da fé."
 coronation_anointed_modifier: "Unção elevada"
 coronation_anointed_modifier_desc: "Este governante ungido dá grande importância ao seu cargo para conduzir os fiéis."
