 coronation_events.6140_desc_foreign_wife_no_court_spouse: "Coroa régia de [owner.GetFirstNameNoTooltip]"
 coronation_events.6140_desc_foreign_wife_spouse: "Encomendada às pressas por [owner.GetName] para ser usada em sua coroação de espírito [owner.Custom('GetTitleTierAdjective')], esta coroa cerimonial traz uma simbologia [owner.GetCulture.GetName] distinta, típica dos artesãos de [owner.GetCapitalLocation.GetName], entre suas modestas joias."
 coronation_events.6140_desc_lowly_wife_spouse: "Vestimenta de coroação de [owner.GetFirstNameNoTooltipRegnal]"
 coronation_events.6140_desc_regal_wife_spouse: "Fornecida pela casa [owner.Custom('GetTitleTierAdjective')] logo antes da coroação de [owner.GetName], esta insígnia invoca a fidelidade [owner.GetFaith.GetAdjective] a [owner.GetFaith.random_GoodGodNames] e o domínio régio sobre o povo [owner.GetCulture.GetName] em igual medida."
 coronation_events.6140_desc_mid_wife_spouse: "Um intercessor [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip]"
 coronation_events.6140_desc_crown_spouse: ""Oh, [ROOT.Char.Custom('FormalComplimentAdjective')] [ROOT.Char.GetTitleAsName], vós sois o rosto a ser contemplado, vossa é a voz destes ritos sagrados!", prodiga [advisor.Custom('ES_ElLa')] [advisor.GetTitledFirstName|l], meu [advisor.GetCouncilTitle|l]. Grandes soberanos e muitos [ROOT.Char.Custom('GetLowOfficialPlural')] vieram contemplar vosso reinado... e que posição assumirão diante de [Select_CString( ROOT.Char.IsFemale, 'a nova', 'o novo' )] [ROOT.Char.GetTitleAsNameNoTooltip] de seu [ROOT.Char.GetPrimaryTitle.GetNameNoTier].

