l_spanish:
 game_concept_coronation: "Coroação"
 game_concept_coronations: "Coroações"
 game_concept_coronation_desc: "A coroação é uma [activity|lE] em que um [ruler|lE] convida seus [vassals|lE], pares e [guests|lE] de todas as partes para testemunharem sua ascensão ao trono.

A coroação apresenta duas formas: uma coroação regular e uma [anointment|lE]; esta última oferece melhores recompensas, mas a um custo maior.

Recompensas previstas:
$activity_coronation_host_desc$"
 game_concept_coronation_i: "A magnificência de uma [coronation|E] determina o resultado da [activity|lE]; uma pontuação de magnificência maior dará um resultado melhor para o [host|lE].

Pode-se ganhar magnificência por meio de [intents|lE], [activity_options|lE] e eventos durante a atividade. Os [coronation_supporters|lE] e [coronation_detractors|lE] também podem afetar o valor."
 game_concept_oath: "Apoiador"
 game_concept_oaths: "Partidários"
 game_concept_oath_desc: "Os juramentos são realizados durante a [activity|lE] de [coronation|lE] pelo [host|lE] e desempenham um papel importante para garantir a [legitimacy|lE] de um novo [ruler|lE] quando ele sobe ao trono.

Os juramentos desbloqueiam [decisions|lE] especiais limitadas no tempo que o governante terá que cumprir para provar que é digno de seu [title|lE]. As recompensas obtidas serão afetadas pela [coronation_magnificence|lE] da coroação."
 game_concept_coronation_magnificence: "Os detratores são [activity_guests_short|lE] na [activity|lE] de [coronation|lE] que se opõem ao [host|lE] em sua ascensão ao trono. Eles tentarão prejudicar o [ruler|lE] e arruinar sua [legitimacy|lE].

Eles se opõem diretamente aos [coronation_supporters|lE], convidados que tentam ajudar o anfitrião."
 game_concept_coronation_magnificence_desc: "A magnificência de uma [coronation|E] determina o resultado da [activity|lE]; uma pontuação de magnificência maior dará um resultado melhor para o [host|lE].

Pode-se ganhar magnificência por meio de [intents|lE], [activity_options|lE] e eventos durante a atividade. Os [coronation_supporters|lE] e [coronation_detractors|lE] também podem afetar o valor."
 game_concept_coronation_supporter: "A unção é um tipo de [coronation|lE], em que o [ruler|lE] buscará que o [head_of_faith|lE] abençoe sua ascensão ao trono. Em certas fés, isso é necessário para que seja verdadeiramente considerado um governante [legitimate|lE] de suas terras.

Para assegurar o apoio do chefe de sua fé, o [host|lE] pode usar a [interaction|lE] [anointment_request|E]."
 game_concept_coronation_supporters: "Solicitar Unção"
 game_concept_coronation_supporter_desc: "Os apoiadores são [activity_guests_short|lE] na [activity|lE] de [coronation|lE] que apoiam o [host|lE] em sua ascensão ao trono. Eles terão oportunidades especiais para ajudar o [ruler|lE] a assegurar sua [legitimacy|lE].

Eles se opõem diretamente aos [coronation_detractors|lE], convidados que tentam frustrar os planos do anfitrião."
 game_concept_coronation_detractor: "Detrator"
 game_concept_coronation_detractors: "Detratores"
 game_concept_coronation_detractor_desc: "Os detratores são [activity_guests_short|lE] na [activity|lE] de [coronation|lE] que se opõem ao [host|lE] em sua ascensão ao trono. Eles tentarão prejudicar o [ruler|lE] e arruinar sua [legitimacy|lE].

Eles se opõem diretamente aos [coronation_supporters|lE], convidados que tentam ajudar o anfitrião."
 game_concept_coronation_anointment: "Unção"
 game_concept_anointment: "$game_concept_coronation_anointment$"
 game_concept_anointments: "Unções"
 game_concept_coronation_anointment_desc: "A unção é um tipo de [coronation|lE], em que o [ruler|lE] buscará que o [head_of_faith|lE] abençoe sua ascensão ao trono. Em certas fés, isso é necessário para que seja verdadeiramente considerado um governante [legitimate|lE] de suas terras.

Para assegurar o apoio do chefe de sua fé, o [host|lE] pode usar a [interaction|lE] [anointment_request|E]."
 game_concept_anointment_request: "Solicitar Unção"
 game_concept_request_anointment: "$game_concept_anointment_request$"
 game_concept_anointment_request_desc: "A [character_interaction|lE] "Solicitar unção" é uma interação especial que pode ser usada por um [ruler|lE] sobre o [Concept('head_of_faith', 'chefe de sua fé')|lE] para assegurar seu apoio em uma [anointment|lE]."
