l_spanish:
 guest_intent_coronation_events.0001.t: "Como testemunha"
 guest_intent_coronation_events.0001.desc.collective: ""Aí [host.GetHerHim] vocês têm". [guest.Custom('ES_ElLa')|U] [guest.GetTitledFirstName|l] aponta para [Select_CString( host.IsFemale, 'nuestra anfitriona', 'nuestro anfitrión' )], [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l], que está sozinho. Finalmente.\n\n"Esta é a nossa chance", insiste [guest.GetFirstNameNoTooltip]. "Estamos aqui para testemunhar e apoiar sua coroação. É justo que recebamos algo em troca"."
 guest_intent_coronation_events.0001.desc.alone: "Encontro [host.Custom('ES_AlAla')] [host.GetTitledFirstName|l] a sós no pátio. Enfim, tenho a chance de deixar minhas intenções conhecidas.\n\nComo testemunha de sua coroação, é justo que eu receba algo em troca"."
 guest_intent_coronation_events.0001.a: "Sejamos um exemplo de paz para o nosso povo."
 guest_intent_coronation_events.0001.b: "E o faremos na presença de [ROOT.Char.GetFaith.HighGodName]."
 guest_intent_coronation_events.0001.c: "Todos verão nossa proximidade com [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip|l]."
 cultural_acceptance_coronation_bear_witness: "Ao testemunhar a coroação e oferecer apoio, a aceitação cultural aumentou."
 guest_intent_coronation_events.0010.t: "Oferta de apoio"
 guest_intent_coronation_events.0010.desc.collective: "\"Nosso[host.Custom('ES_OA')] [host.GetTitledFirstName|l] de espírito [host.Custom('ComplimentAdjective')] finalmente ficou a sós\", observa meu [ROOT.Char.Custom2('RelationToMeShort',SCOPE.sC('guest'))], [guest.Custom('ES_ElLa')] [guest.GetTitledFirstName|l], [guest.Custom('quirk_pos_pp')]. \"Esta é a chance para que [Select_CString(And(ROOT.Char.IsFemale, guest.IsFemale), 'nosotras', 'nosotros')], seus [Select_CString(And(ROOT.Char.IsFemale, guest.IsFemale), 'partidarias', 'partidarios')], mostremos nossa lealdade\".\n\n\"Vá em frente, [ROOT.Char.GetFirstNameNoTooltip], não podemos desperdiçar esta oportunidade\"."
 guest_intent_coronation_events.0010.desc.alone: "Al fin nuestr[host.Custom('ES_OA')] [host.GetTitledFirstName|l] de espíritu [host.Custom('ComplimentAdjective')] se ha quedado a solas. Camino a paso lento hacia [host.GetSheHe] con una sonrisa en el rostro.\n\nNo puedo echar a perder esta oportunidad de mostrar mi lealtad."
 guest_intent_coronation_events.0010.a: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstNameNoTooltip|l] não esquecerá seus apoiadores."
 guest_intent_coronation_events.0010.b: "Ou talvez eu pudesse simplesmente fortalecer meu relacionamento com [host.Custom('ES_ElLa')] [host.GetTitleAsNameNoTooltip]…"
 guest_intent_coronation_events.0010.c: "Uma aliança seria o movimento mais vantajoso."
 friend_coronation_offer_support: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'apoiaste', 'apoiou' )] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'seu personagem', TARGET_CHARACTER.GetShortUIName )] durante [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'sua', 'sua' )] coroa??o."
 friend_coronation_offer_support_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'apoiaste', 'apoiou' )] [Select_CString( CHARACTER.IsLocalPlayer, 'seu personagem', CHARACTER.GetShortUIName )] durante a coroa??o."
 create_alliance_host_tt: "[petition_sender.GetShortUIName] e você formam uma [alliance|lE]"
 create_alliance_guest_tt: "[host.GetShortUIName] e você formam uma [alliance|lE]"
 guest_intent_coronation_events.0020.t: "Promoção do domínio"
 guest_intent_coronation_events.0020.desc.collective: "Encontro-me imerso em [ROOT.Char.Custom('ES_OA')] uma conversa sobre [guest.Custom('MatchingConversationSubject_alone')] que [guest.Custom('ES_ElLa')] [guest.GetTitledFirstName|l] não quer terminar.\n\n"Mas esperem!", diz de repente. "Parece que noss[host.Custom('ES_OA')] [host.GetLadyLord|l] [host.GetTitleAsNameNoTooltip] também está indo para seus aposentos. Esta é a nossa chance, [ROOT.Char.GetFirstName]. Façamos prosperar [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] e [guest.GetPrimaryTitle.GetNameNoTier]."
 guest_intent_coronation_events.0020.desc.alone: "Vejo-me incapaz de parar de pensar em [guest.Custom('MatchingConversationSubject_alone')] agora que volto aos meus aposentos. Mas logo percebo que não estou so[ROOT.Char.Custom('ES_OA')] nestes corredores.\n\n[guest.Custom('ES_ElLa')|U] [guest.GetTitledFirstName|l] também parece seguir na mesma direção. Esta pode ser a minha chance de garantir que [ROOT.Char.GetPrimaryTitle.GetNameNoTier] receba a ajuda que merece."
 guest_intent_coronation_events.0020.a: "Devemos concentrar nossos esforços no desenvolvimento de nossas cidades."
 guest_intent_coronation_events.0020.b: "Não há governo sem controle."
 guest_intent_coronation_events.0020.c: "A confiança do povo é o mais importante."
 guest_intent_coronation_events_advocate_domain_development_tt: "O restante de [character|lE] assistentes com a [intent|lE] #high Promover dominio#! aumenta o [development_growth|lE] nos [counties|lE] que possuírem em #P [EmptyScope.ScriptValue('major_development_progress_gain')|0]#!"
 guest_intent_coronation_events_advocate_domain_control_tt: "O restante de [character|lE] assistentes com a [intent|lE] #high Promover dominio#! aumenta o [control|lE] nos [counties|lE] que possuam em #P +[EmptyScope.ScriptValue('major_county_control_gain')|0]#!"
 guest_intent_coronation_events_advocate_domain_county_opinion_tt: "Todo outro [character|lE] presente com a [intent|lE] #high Promover Dom?nio#! ganha [GetModifier('coronation_advocate_domain_county_opinion_modifier').GetNameWithTooltip] nos [counties|lE] que possuir durante #V 10#! anos"
 coronation_advocate_domain_county_opinion_modifier: "Domínio defendido"
 coronation_advocate_domain_county_opinion_modifier_desc: "Este personagem defendeu seu domínio e o bem-estar de seu povo durante uma coroação."
 guest_intent_coronation_events.0030.t: "É meu direito"
 guest_intent_coronation_events.0030.desc.collective: "… vamos ver se vocês conseguem sair desta", declara orgulhosamente [guest.Custom('ES_ElLa')] [guest.GetTitledFirstName|l] movendo uma de suas peças em direção às minhas. Me preparo para responder, mas a porta da sala se abre abruptamente.\n\nNo limiar, [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] parece tão surpres[host.Custom('ES_OA')] quanto [Select_CString(And(ROOT.Char.IsFemale, guest.IsFemale), 'nós', 'nós')]. Nós nos levantamos imediatamente, mas [host.GetSheHe] faz um gesto para que nos sentemos novamente. Perdão, murmura. Tenho muito em que pensar.\n\n[guest.Custom('ES_ElLa')|U] [guest.GetTitledFirstNameNoTooltip|l] ergue uma sobrancelha. Esta pode ser nossa chance de abordar [Select_CString( host.IsFemale, 'nossa senhora', 'nosso senhor' )]."
 guest_intent_coronation_events.0030.desc.alone: "Me hallo perdid[ROOT.Char.Custom('ES_OA')] en mis pensamientos cuando la puerta de la estancia se abre de golpe.\n\nEn el umbral, [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] parece tan sorprendid[host.Custom('ES_OA')] como yo. Me levanto al instante, pero [host.GetSheHe] hace un gesto para que me vuelva a sentar. «Disculpadme», murmura. «Tengo muchas cosas en las que pensar».\n\nEsta puede ser la única oportunidad de dirigirme libremente a [Select_CString( host.IsFemale, 'mi señora', 'mi señor' )]."
 guest_intent_coronation_events.0030.a: "Dar bons conselhos pode nos conceder um favor."
 guest_intent_coronation_events.0030.b: "Devemos argumentar para reduzir nossos levantes."
 guest_intent_coronation_events.0030.c: "Precisa ser informado de que os impostos que pagamos são extorsivos."
 guest_intent_coronation_events.0040.t: "Aproveitar o momento"
 guest_intent_coronation_events.0040.desc.intro: "Todos os convidados parecem distraídos pelas apresentações dos malabaristas, pela comida, pela bebida e pela presença dos outros convidados. Por fim, [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] parece capaz de aproveitar um momento a sós.\n\n"
 guest_intent_coronation_events.0040.desc.collective: ""Precisamos falar com [host.GetSheHe] agora", cochicha [guest.Custom('ES_ElLa')] [guest.GetTitledFirstName|l] atrás da taça. "Estamos aqui por [host.GetSheHe]. É justo que obtenhamos algo com isso"."
 guest_intent_coronation_events.0040.desc.alone: "Preciso falar com [host.GetSheHe] imediatamente. Afinal, estou aqui por [host.GetSheHe]. É justo que eu tire algo disso."
 guest_intent_coronation_events.0040.a: "O ouro é a única moeda valiosa."
 guest_intent_coronation_events.0040.b: "O prestígio sempre compensa."
 guest_intent_coronation_events.0040.c: "Temos que convencer[host.GetHerHim] de que relaxe as fronteiras."
 guest_intent_coronation_events.0040.c.flavor: "Ame a terra do seu próximo, dizem…"
 guest_intent_coronation_events.0050.t: "Alteração"
 guest_intent_coronation_events.0050.desc.collective: "\"A escuridão desta noite reflete a escuridão de seu reinado\", sussurra [guest.Custom('ES_ElLa')] [guest.GetTitledFirstName|l], quando [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] passa por nós.\n\n\"Agora, [ROOT.Char.GetFirstNameNoTooltip], é hora de finalmente lançar alguma luz sobre este reino perverso\"."
 guest_intent_coronation_events.0050.desc.alone: "La oscuridad de la noche refleja la del reinado [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l]. [host.GetHerHim|U] veo pasar a lo lejos de camino a su alcoba.\n\nEsta es la mía. Por fin puedo arrojar algo de luz sobre este señorío maligno."
 guest_intent_coronation_events.0050.aa: "Esta é a coroação [claimant_scope.Custom('ES_DelDela')] [claimant_scope.GetTitledFirstNamePossessiveNoTooltip]."
 guest_intent_coronation_events.0050.a: "[host.GetFirstNameNoTooltip] deve ver do que somos capazes."
 guest_intent_coronation_events.0050.b: "Devo me concentrar em conquistar os outros convidados."
 guest_intent_coronation_events.0050.c: "É hora de humilhar nosso anfitrião."
 guest_intent_coronation_events.0050.d: "Não me oporei a [host.GetFirstNameNoTooltip] abertamente."
 guest_intent_coronation_events.0050.d_tt: "Outro [ruler|lE] com a [intent|lE] [THIS.Char.GetInvolvedActivityIntent.GetName] amea?ar? [Select_CString( host.IsLocalPlayer, 'seu personagem', host.GetShortUIName )] com uma [coronation_magnificence|lE] #N reduzida#!"
 guest_intent_coronation_events.0050.d_tt_acceptance: "#alert_trial @alert_icon! Es menos probable que [host.GetShortUIName] [Select_CString( host.IsLocalPlayer, 'cedas', 'ceda' )]#!"
 guest_intent_coronation_events.0050.e: "$guest_intent_coronation_events.0050.d$"
 guest_intent_coronation_events.0050.e_tt: "#alert_trial @alert_icon! No tendrás otra oportunidad de interrumpir a [host.GetShortUIName]#!"
 guest_intent_coronation_events.0100.t: "Peticionários"
 guest_intent_coronation_events.0100.desc.intro: ""Um momento, se me permitem…", me saúda [petition_sender.Custom('ES_ElLa')] [petition_sender.GetTitledFirstName|l], curvando-se obsequiosamente[petition_sender.Custom('ES_OA')]."
 guest_intent_coronation_events.0100.desc.intro_2: ""[ROOT.Char.GetTitledFirstNameNoTooltip]!". [petition_sender.Custom('ES_ElLa')|U] [petition_sender.GetTitledFirstName|l] se aproxima a mim de braços abertos."
 guest_intent_coronation_events.0100.desc.intro_3: ""Finalmente, [ROOT.Char.GetTitledFirstName|l]". [petition_sender.Custom('ES_ElLa')|U] [petition_sender.GetTitledFirstName|l] se inclina em uma reverência exagerada."
 guest_intent_coronation_events.0100.desc.intro_4: ""Apreciadíssim[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip]". [petition_sender.Custom('ES_ElLa')|U] [petition_sender.GetTitledFirstName|l] me saúda com uma reverência obsequiosa e um sorriso intrigante."
 guest_intent_coronation_events.0100.desc.intro_5: ""Aqui estáis, [ROOT.Char.GetTitledFirstNameNoTooltip|l]!". [petition_sender.Custom('ES_ElLa')|U] [petition_sender.GetTitledFirstName|l] caminha até mim com o maior dos sorrisos antes de oferecer uma reverência mal ensaiada."
 guest_intent_coronation_events.0100.desc.intro_6: ""Perdoe minha ousadia", [petition_sender.Custom('ES_ElLa')] [petition_sender.GetTitledFirstName|l] se inclina tanto que parece que vai se partir ao meio."
 guest_intent_coronation_events.0100.desc.intro_7: ""Ah, bom[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip]", [petition_sender.Custom('ES_ElLa')] [petition_sender.GetTitledFirstName|l] se inclina diante de mim, com as roupas cuidadosamente arrumadas."
 guest_intent_coronation_events.0100.desc.intro_8: ""Bom[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip]!". [petition_sender.Custom('ES_ElLa')|U] [petition_sender.GetTitledFirstName|l] praticamente grita meu título ao se inclinar diante de mim."
 guest_intent_coronation_events.0100.desc.intro_9: ""Finalmente, encontro um momento a sós com você, [ROOT.Char.GetTitledFirstNameNoTooltip|l]", [petition_sender.Custom('ES_ElLa')] [petition_sender.GetTitledFirstName|l] me saúda com uma reverência bem ensaiada."
 guest_intent_coronation_events.0100.desc.disrupt_loyalists: "Um sorrisinho sutil em seu rosto me faz duvidar de suas verdadeiras intenções."
 guest_intent_coronation_events.0100.desc.same_house: ""Isso me enche de alegria ao ver a grande honra que você traz à Casa [ROOT.Char.GetHouse.GetName]"."
 guest_intent_coronation_events.0100.desc.friendship: ""N?o ? todo dia que se v? [Select_CString( ROOT.Char.IsFemale, 'uma boa amiga', 'um bom amigo' )] ser coroad[ROOT.Char.Custom('ES_OA')].""
 guest_intent_coronation_events.0100.desc.winter: "A frieza do dia faz seu corpo tremer."
 guest_intent_coronation_events.0100.desc.summer: "A luminosidade do dia faz gotas de suor correrem pela sua testa."
 guest_intent_coronation_events.0100.desc.neutral_1: "[ROOT.Char.Custom('GetRandomExteriorDetail')]."
 guest_intent_coronation_events.0100.desc.neutral_2: "[petition_sender.Custom('quirk_pos_standalone')], e toma um gole de [ROOT.Char.Custom('RegionalDrink')] antes de continuar:"
 guest_intent_coronation_events.0100.desc.neutral_3: "[petition_sender.GetSheHe|U] [petition_sender.Custom('quirk_pos_present')] quando um exemplar de [ROOT.Char.Custom('GetRandomRegionalWildDaytimeBird')] [petition_sender.GetHerHim] interrompe-o ao dançar entre seus pés."
 guest_intent_coronation_events.0100.desc.cultural_acceptance: "\n\n"Pedimos compreensão entre nossos povos. Que seja lembrado como o apoiamos no início do seu reinado"."
 guest_intent_coronation_events.0100.desc.piety: "\n\n"Por favor, permitam-nos rezar a [petition_sender.GetFaith.HighGodName] para que abençoe vosso reinado e o torne longo e próspero"."
 guest_intent_coronation_events.0100.desc.legitimacy: "\n\n"Aqui damos testemunho de sua magnificência e seria uma grande honra se pudesse dizer algumas palavras em nosso favor"."
 guest_intent_coronation_events.0100.desc.opinion: "\n\n"Seus apoiadores mais leais e seus vassalos mais fiéis: estamos aqui em sua honra e para lhe oferecer nossa ajuda. O que quer que aconteça"."
 guest_intent_coronation_events.0100.desc.friend: "\n\n«Me presento aquí para apoyaros, mi apreciad[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip]. Permitidme seguir a vuestro lado, pase lo que pase»."
 guest_intent_coronation_events.0100.desc.alliance: "\n\n"Ofereço-vos meu apoio e lealdade inabaláveis. Uma aliança entre [Select_CString(And(ROOT.Char.IsFemale, petition_sender.IsFemale), 'nosotras', 'nosotros')] seria a maior das honras"."
 guest_intent_coronation_events.0100.desc.development: "\n\n"Peço a vós, meu [ROOT.Char.GetLadyLord], que concentreis a vossa atenção nas cidades de [petition_sender.GetPrimaryTitle.GetNameNoTier]. Como voss[petition_sender.Custom('ES_OA')] vassal[petition_sender.Custom('ES_OA')] mais leal, me dói ver suas terras abandonadas"."
 guest_intent_coronation_events.0100.desc.control: "\n\n"Gostaria de pedir sua ajuda para fazer cumprir a lei nas terras de [petition_sender.GetPrimaryTitle.GetNameNoTier]" ."
 guest_intent_coronation_events.0100.desc.popular_opinion: "\n\n"Vos peço que prestem atenção ao povo de [petition_sender.GetPrimaryTitle.GetNameNoTier], pois o bem-estar dele é de máxima importância para mim"."
 guest_intent_coronation_events.0100.desc.hook: "\n\n"Eu o apoiarei em seu reinado e divulgarei a palavra [ROOT.Char.Custom('ES_DelDela')] bom[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip]. Em troca, só peço que se lembre deste favor"."
 guest_intent_coronation_events.0100.desc.vassal_levies: "\n\n“Meu povo continua morrendo. Os campos estão abandonados, as casas foram queimadas. Por favor, permita-nos reduzir a quantidade de levies.”"
 guest_intent_coronation_events.0100.desc.vassal_taxes: "\n\n"Os impostos se tornaram opressivos, meu [ROOT.Char.GetLadyLord]. Nem mesmo os comerciantes mais ricos podem mais arcar em alimentar seus filhos"."
 guest_intent_coronation_events.0100.desc.gold: "\n\n"A coroa demonstraria realmente sua grande generosidade se fosse vista recompensando seus súditos por seu apoio"."
 guest_intent_coronation_events.0100.desc.prestige: "\n\n"Seria uma grande alegria para nós receber parte do prestígio que vem com o fato de sermos seus vassalos"."
 guest_intent_coronation_events.0100.desc.claim: "\n\n"As fronteiras do reino são rígidas demais, até mesmo estáticas. O melhor para todos seria deixar que governem aqueles com a mão mais severa"."
 guest_intent_coronation_events.0100.desc.faction_discontent: "\n\n"Vocês conhecem a facção [petition_sender_faction.GetName], não é? Nossa causa é justa! Estamos trabalhando neste lugar… sussurrando entre seus convidados, atiçando seus inimigos! Um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsName] tão poderos[ROOT.Char.Custom('ES_OA')], uma coroação tão elegante… Certamente vocês não têm nada a temer de nós…"."
 guest_intent_coronation_events.0100.desc.faction_members: "\n\n"Seus convidados estão ansiosos para ouvir falar da facção [petition_sender_faction.GetName]…, mas temem sua retaliação. Conceda-nos nossos direitos como vassalos — deixem-nos falar livremente sobre nossas queixas!"."
 guest_intent_coronation_events.0100.desc.magnificence_loss: "\n\n«¡Esto es una farsa!». [petition_sender.GetSheHe|U] se burla de mí, confiad[petition_sender.Custom('ES_OA')] en este espacio aislado. «¡Todos lo saben! ¿Un[host.Custom('ES_XA')] [host.GetTitleAsNameNoTooltip|l] rodead[host.Custom('ES_OA')] de enemigos? ¿Un[host.Custom('ES_XA')] [host.GetTitleAsNameNoTooltip|l] desairado por sus invitados? Escupo sobre vuestro reinado, sobre aquellos que se inclinan… ¡Escupo sobre esta coronación!»."
 guest_intent_coronation_events.0100.desc.magnificence_loss_subtle: "\n\n"Sozinho[ROOT.Char.Custom('ES_OA')], acima de todos os outros", diz [petition_sender.GetSheHe], misteriosamente, "[ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsName|l], em sua perfeita solidão, está livre da linguagem pestilenta da discórdia. Mas creio que devo assegurar [ROOT.Char.Custom('ES_AlAla')] grande [ROOT.Char.GetTitleAsNameNoTooltip|l]…"\n\n"… que esta assembleia está #EMP plagada#! de tais conversas desleais.""
 guest_intent_coronation_events.0100.desc.critical_fail: "\n\n"Acabou, [host.GetTitledFirstNameNoTooltip|l]. Agora esta é a coroação [claimant_scope.Custom('ES_DelDela')] [claimant_scope.GetTitledFirstName|l]"."
 guest_intent_coronation_events.0100.a: ""É um prazer consentir"."
 guest_intent_coronation_events.0100.a.bad: "Não respondo."
 guest_intent_coronation_events.0100.b.bad: ""Sil?ncio, c?o[petition_sender.Custom('ES_OA')]! #EMP Sil?ncio ou morte!#!""
 guest_intent_coronation_events.0100.b: ""Não ouvirei aduladores"."
 guest_intent_coronation_events.0100.a.tt: "[host.GetShortUIName] aceita sua petição"
 guest_intent_coronation_events.0100.b.tt: "[host.GetShortUIName] rejeita sua petição"
 guest_intent_coronation_events.0100.critical_fail.tt: "@warning_icon! #X Esto terminará la actividad#!"
 guest_intent_coronation_events.0100.b.rejected_detractor_tt: "Os demais [coronation_detractors|lE] envolvidos perdem #N 30#! de [opinion|lE] sobre [Select_CString( host.IsLocalPlayer, 'ti', host.GetShortUIName )] #weak (odio)#!"
 guest_intent_coronation_events.0100.b.rejected_tt: "Todos os demais convidados petitionantes perdem #N 10#! de [opinion|lE] de [host.GetShortUIName] por #high 20 años#! #weak (rechazado)#!"
 guest_intent_coronation_events.0100.a.piety_tt: "Todos os demais convidados que fazem petições ganham #P [THIS.ScriptValue('major_piety_gain')]#! [piety_i]"
 guest_intent_coronation_events.0100.aa: "#EMP Escupir a sus pies.#!"
 every_offer_support_guest_opinion: "Todo hóspede com a [intent|lE] $coronation_offer_support$:\nReceberá #P 50#! de [opinion|lE] com relação a [Select_CString( host.IsLocalPlayer, 'você', host.GetShortUIName )]"
 every_seize_advantages_guest_prestige: "Todo convidado com a [intent|lE] $coronation_seize_advantages$:\nGanhará #P [EmptyScope.ScriptValue('medium_prestige_gain')|0]#! de [prestige|lE] [prestige_i]"
 guest_intent_coronation_events_petition_sender_disrupt_tt: "@alert_icon!#alert_trial [host.GetShortUIName] decidirá si aceptar tu ultraje o no#!\n$EFFECT_LIST_BULLET$#low #EMP Es un resultado significativo para tu [intent|lE] [THIS.Char.GetInvolvedActivityIntent.GetName]#!#!"
 guest_intent_coronation_events_petition_sender_tt: "@alert_icon!#alert_trial [host.GetShortUIName] decidirá si aceptar tu petición o no#!\n$EFFECT_LIST_BULLET$#low #EMP Es un resultado significativo para tu [intent|lE] [THIS.Char.GetInvolvedActivityIntent.GetName]#!#!"
 coronation_medium_magnificence_increase_tt: "Esta opção #P aumentará#! #EMP moderadamente#! sua [coronation_magnificence|lE]"
 coronation_minor_magnificence_increase_tt: "Esta opção #P aumentará#! #EMP ligeramente#! sua [coronation_magnificence|lE]"
 coronation_disrupt_loyalists_host_rivalry_tt: "[host.GetShortUIName] se tornará seu [rival|lE] ou você avançará em direção à [rivalry|lE]"
 coronation_factions_modifier_tt: "Todo membro ganha [GetModifier('coronation_faction_bolstered_modifier').GetNameWithTooltip] durante #high 5 años#!"
