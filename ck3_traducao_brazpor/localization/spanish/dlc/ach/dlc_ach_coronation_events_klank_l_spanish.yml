 ach_realm_autonomy_vassal_lvl_1_desc: "Este vassalo está submetido à reforma de descentralização do suserano principal."
 ach_realm_autonomy_vassal_lvl_2: "$ach_realm_autonomy_vassal_lvl_1$"
 ach_realm_autonomy_vassal_lvl_2_desc: "$ach_realm_autonomy_vassal_lvl_1_desc$"
 ach_realm_autonomy_county_lvl_1: "Reforma de descentralização: objetivo"
 ach_realm_autonomy_county_lvl_1_desc: "Este condado é um alvo da reforma de descentralização de seu senhor supremo. Os recursos que normalmente fluíam para a capital agora são compartilhados com seus vassalos."
 ach_realm_autonomy_county_lvl_2: "$ach_realm_autonomy_county_lvl_1$"
 ach_realm_autonomy_county_lvl_2_desc: "$ach_realm_autonomy_county_lvl_1_desc$"
 ach_realm_autonomy_liege_lvl_1: "Reforma de descentralização: grande arquiteto"
 ach_realm_autonomy_liege_lvl_1_desc: "Este personagem tem uma visão grandiosa do futuro do reino, onde cada canto é tão esplêndido quanto a capital. Suas habilidades de Tesouraria e diplomacia decidirão o resultado da reforma."
 ach_realm_autonomy_liege_lvl_2: "$ach_realm_autonomy_liege_lvl_1$"
