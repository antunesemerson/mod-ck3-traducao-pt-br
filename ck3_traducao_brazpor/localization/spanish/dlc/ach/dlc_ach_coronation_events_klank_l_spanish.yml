 ach_realm_centralization_liege_lvl_1: "Reforma de centralização: grande arquiteto"
 ach_realm_centralization_liege_lvl_1_desc: "Este personagem tem uma visão grandiosa do futuro do senhorio, não importa o custo ou o que os vassalos que suportam o fardo possam pensar. Suas habilidades de Tesouraria e aprendizado decidirão o resultado de sua reforma."
