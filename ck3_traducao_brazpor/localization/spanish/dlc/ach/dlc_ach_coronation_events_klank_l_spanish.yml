 ach_no_reforms_modifier: "Um grande domínio"
 ach_no_reforms_modifier_desc: "O vasto domínio deste personagem é considerado perfeito como está, sem necessidade de reforma. O governante pode simplesmente relaxar e desfrutar de sua magnificência."
 coronation_events_klank.1016.t: "[Select_CString( host.IsFemale, 'La niña', 'El niño' )] que se tornou [host.GetTitleAsNameNoTooltip]"
 coronation_events_klank.1016.desc: "[teller.GetName] termina sua história peculiar sobre uma espécie de [supporter.Custom('GetRandomRegionalBird')] que brincava com um [supporter.Custom('RandomWeirdObject')] sobre os restos de [supporter.Custom('RegionalFarmAnimal')]. [listener.GetName] parece vagamente entretid[listener.Custom('ES_OA')].\n\nÉ a minha vez de compartilhar uma história. E tenho algo perfeito. Contarei a eles quando [memory.GetDescription|l], quando noss[host.Custom('ES_OA')] gentil [Select_CString( host.IsFemale, 'anfitriã', 'anfitrião' )] não era mais que [Select_CString( host.IsFemale, 'uma menina', 'um menino' )]."
 coronation_events_klank.1016.desc.supporter: "Pois está claro que [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] sempre teve destino à grandeza e que um dia seríamos testemunhas de sua ascensão ao trono."
 coronation_events_klank.1016.desc.detractor: "Pois está claro que [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] estava destinado a qualquer coisa menos um trono. Ai de todos os seus futuros súditos."
 coronation_events_klank.1016.a: "Desde a mais tenra idade, um[host.Custom('ES_XA')] indign[host.Custom('ES_OA')] [host.GetTitleAsNameNoTooltip]."
 coronation_events_klank.1016.b: "Desde a mais tenra idade, um[host.Custom('ES_XA')] dign[host.Custom('ES_OA')] [host.GetTitleAsNameNoTooltip]."
 coronation_events_klank.1016.c: "Na verdade, falarei apenas de mim mesmo."
 coronation_events_klank.1016.d: "Vou contar exatamente como aconteceu."
 custom.every_king_plus_attendee: "Todo [activity_guest|El] de [title_tier|El] de [king|El] ou superior"
