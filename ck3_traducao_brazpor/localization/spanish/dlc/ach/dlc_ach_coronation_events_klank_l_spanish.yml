l_spanish:
 coronation_events_klank.1001.t: "Uma multidão suspeitamente culta"
 coronation_events_klank.1001.desc: "Patifes, vagabundos, canalhas, todos eles... rondando como abutres, à espera do momento de arrancar sua libra de carne. Mas eles não podem escapar do meu olhar atento.\n\nLá estão eles. Meu/minha astut[first_culture_char.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('first_culture_char'))] [first_culture_char.GetFullName], vestid[first_culture_char.Custom('ES_OA')] com as melhores roupas [first_culture_char.GetCulture.GetName], e meu/minha ardilos[second_culture_char.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('second_culture_char'))] [second_culture_char.GetFullName], com trajes [second_culture_char.GetCulture.GetName] igualmente impressionantes. Seria uma conversa sem importância ou uma conspiração em gestação?\n\nAo menos sua aparência colorida enriquece o dia, como um bando de aves travessas."
 coronation_events_klank.1001.a: ""[Select_CString(And(first_culture_char.IsFemale, second_culture_char.IsFemale), 'Vós duas', 'Vós dois' )]! Ajoelhem-se diante de voss[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip].""
 coronation_events_klank.1001.b: "Esses estrangeiros não merecem minha atenção."
 coronation_events_klank.1002.t: "Uma multidão maravilhosamente culta"
 coronation_events_klank.1002.desc: "O território de [ROOT.Char.GetPrimaryTitle.GetName] é vasto e transborda de súditos leais de toda espécie. Nem todos são tão leais, é claro, mas o suficiente para garantir a estabilidade pelos anos que virão.\n\nLá estão eles, [Select_CString(And(first_culture_char.IsFemale, second_culture_char.IsFemale), 'entregues', 'entregues')] a uma profunda conversa; certamente falando sobre a benevolência do meu governo, a prosperidade do meu reino. Meu/minha leal [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('first_culture_char'))] [first_culture_char.GetFullName], vestid[first_culture_char.Custom('ES_OA')] com as melhores roupas [first_culture_char.GetCulture.GetName], e meu/minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('second_culture_char'))] [second_culture_char.GetFullName] de total confiança, em trajes [second_culture_char.GetCulture.GetName] igualmente impressionantes.\n\nSua aparência colorida enriquece o dia, como um bando de belas aves."
 coronation_events_klank.1002.a: "Faço um aceno de cabeça em reconhecimento."
 coronation_events_klank.1002.b: "Darei as boas-vindas cordialmente aos dignitários."
 coronation_events_klank.1003.t: "Novos alvoreceres, velas masmorras antigas"
 coronation_events_klank.1003.desc: "Ah, meu/minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child_of_executee'))] [child_of_executee.GetName]... Esta não é a primeira vez que alguém da Casa [child_of_executee.GetHouse.GetName] se coloca diante de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetHouse.GetName], sem saber qual será seu destino.\n\n[Select_CString( executed_previous_holder.IsFemale, 'A anterior', 'O anterior' )] [executed_previous_holder.GetTitleAsNameNoTooltip] de [child_of_executee.GetPrimaryTitle.GetNameNoTier], [executed_previous_holder.GetFirstName], [executed_previous_holder.GetDeathReason]. O motivo exato da execução permanece selado em sua tumba desde a morte do meu/minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('executor_ancestor'))]. Por anos, em vez de trazer em seus estandartes seu lema, #weak [child_of_executee.GetHouse.GetMotto]#!, a Casa [child_of_executee.GetHouse.GetNameNoTooltip] trouxe vergonha e raiva escritas em sangue.\n\nA presença de [child_of_executee.GetFirstNameNoTooltip] aqui hoje poderia ser vista como um ato humilde de submissão ou uma manobra de desafio."
 coronation_events_klank.1003.a: ""Como bom/boa [ROOT.Char.GetFaith.GetAdherentNameNoTooltip], eu te perdoo.""
 coronation_events_klank.1003.b: "O medo corre fundo em nosso sangue."
 coronation_events_klank.1003.c: ""É o começo de uma tradição maravilhosa. Guardas!""
 coronation_events_klank.1004.t: "Uma multidão coroada"
 coronation_events_klank.1004.desc.intro: "É um prazer extraordinário ver meus colegas governantes:"
 coronation_events_klank.1004.desc.intro_many_kings: "Minha coroação é, sem dúvida, o evento do ano, da década! É um prazer extraordinário ver meus muitos colegas governantes, entre eles:"
 coronation_events_klank.1004.desc.second_king: "[first_king.GetName] e [second_king.GetName]."
 coronation_events_klank.1004.desc.third_king: "[first_king.GetName], [second_king.GetName] e [third_king.GetName]."
 coronation_events_klank.1004.desc.fourth_king: "[first_king.GetName], [second_king.GetName], [third_king.GetName] e [fourth_king.GetName]."
 coronation_events_klank.1004.desc.fifth_king: "[first_king.GetTitledFirstNameRegnal|l], [second_king.GetTitledFirstNameRegnal|l], [third_king.GetTitledFirstNameRegnal|l], [fourth_king.GetTitledFirstNameRegnal|l] e [fifth_king.GetTitledFirstNameRegnal|l]."
 coronation_events_klank.1004.desc.extoll_reign_intent: "\n\nTerão uma aparência maravilhosa durante minha coroação, lá atrás, enquanto contemplam #EMP minha#! ascensão. Pois há muitas coroas cravejadas de joias na boa terra [ROOT.Char.GetFaith.HighGodNamePossessive], mas haverá apenas [Select_CString( ROOT.Char.IsFemale, 'uma verdadeira', 'um verdadeiro' )] [ROOT.Char.GetTitleAsNameNoTooltip|l]."
 coronation_events_klank.1004.desc.empower_loyalists_intent: "\n\nNa verdade, eu não poderia ter desejado melhores testemunhas da minha coroação. Simplesmente preciso falar com aqueles cujos corações são calorosos para comigo e estabelecer relações duradouras entre nossas cortes."
 coronation_events_klank.1004.desc.other_intent: "\n\nEm verdade, não poderia ter desejado melhores testemunhas de minha coroação. A soma de nossas riquezas, poder e esplendor é incomparável."
 coronation_events_klank.1004.desc.outro: "\n\nA presença desses soberanos é tanto uma bênção quanto uma oportunidade. Minha dignidade régia será exibida desde o primeiro dia do meu reinado até o último."
 coronation_events_klank.1004.a: "Nenhum deles estará abaixo de mim."
 coronation_events_klank.1004.a_tt: "#weak O ganho de [prestige|lE] e [legitimacy|lE] escala conforme o número de [kings|lE] e [emperors|lE] [independent|lE]s presentes em sua [coronation|lE]#!"
 coronation_events_klank.1004.b: ""Fico feliz por ter todos vocês aqui"."
 coronation_events_klank.1004.c: "Serei melhor do que eles."
 coronation_events_klank.1004.d: ""Sejam bem-vindos, meus companheiros!""
 forced_to_kneel_opinion: "Obrigados a se ajoelhar"
 coronation_events_klank.1005.t: "Contos de guerras perdidas"
 coronation_events_klank.1005.desc: "[friendly_king.GetName] vem gritando no ouvido de [npc_guest.GetName].\n\n“E digo a vocês que não há ninguém mais vil que [unfriendly_king.GetName]! [war_memory.GetDescription], só porque vendeu seus filhos e o futuro de [unfriendly_king.GetPrimaryTitle.GetName] ao [friendly_king.GetFaith.DevilName]! Mas tenho um plano! Só preciso de uma espada de verdade e de um aliado, ou dois, ou três, e me vingarei de [unfriendly_king.GetSheHe]!”.\n\nSem dúvida, esta não é a primeira vez que [friendly_king.GetFirstNameNoTooltip] fala sobre as injustiças que sofreu. Mas hoje... pode ser a última."
 coronation_events_klank.1005.a: "Escute suas tristes histórias."
 coronation_events_klank.1005.b: ""A justiça não é sua para reivindicar"."
 coronation_events_klank.1005.flavor: "Guarde sua espada, [friendly_king.GetTitledFirstNameNoTooltip|l]; isso não lhe trará nenhum benefício, pois seu coração está pesado e sua mente está nublada."
 coronation_events_klank.1005.c: ""[Select_CString(And(ROOT.Char.IsFemale, friendly_king.IsFemale),'Juntas','Juntos')] lhe daremos uma lição inesquecível"."
 coronation_events_klank.1005.c.tooltip: "[friendly_king.GetShortUIName] e #high tú#! poderão se convocar mutuamente para qualquer [war|lE] contra [unfriendly_king.GetShortUIName] por #high 6#! anos"
 coronation_events_klank.1005.c.vengeful: ""Ninguém poderia entendê-lo melhor. A vingança será nossa"."
 coronation_events_klank.1005.other_player_informed_tt: "Será informado [unfriendly_king.Custom('ES_AlAla')] [unfriendly_king.GetTitledFirstName|l] deste resultado"
 coronation_events_klank.1005.d: ""Fico feliz que você tenha o ouvido de [npc_guest.GetFirstNameNoTooltip]. #EMP A semana. Inteira.#!""
 coronation_events_klank.1006.t: "[npc_guest.Custom2('AppropriateGreeting', ROOT.Char)]"
 coronation_events_klank.1006.desc: "Tenho o prazer de informar que, durante sua coroação, [coronation_host.Custom('ES_ElLa')] ilustre [coronation_host.GetName] convenceu [friendly_king.GetName] a abandonar sua equivocada busca por vingança, após sua justa vitória em [war_memory.GetName]."
 coronation_events_klank.1006.a: "Interessante."
 coronation_events_klank.1007.t: "[npc_guest.Custom2('AppropriateGreeting', ROOT.Char)]"
 coronation_events_klank.1007.desc: "Lamento informar-vos de que, durante a [coronation_activity.GetName|l] de [coronation_host.GetName], [friendly_king.GetName] e [coronation_host.GetSheHe] fizeram um pacto para unir suas forças contra vós, servindo à errada busca de vingança de [friendly_king.Custom('ES_DelDela')] [friendly_king.GetTitledFirstNameNoTooltip|l] após a vossa justa vitória em [war_memory.GetName]."
 coronation_events_klank.1007.a: "Preocupante."
 coronation_events_klank.1008.t: "Um[dynasty_king.Custom('ES_XA')] [dynasty_king.GetTitleAsNameNoTooltip] [ROOT.Char.GetDynasty.GetNameNoTooltip]"
 coronation_events_klank.1008.desc.friendly: "Meu grande [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('dynasty_king'))], [dynasty_king.Custom('ES_ElLa')] [dynasty_king.GetTitledFirstName|l], deixou seu agradável assento em [dynasty_king.GetPrimaryTitle.GetName] para celebrar minha coroação. Sua presença aqui é um sinal de apoio, de confiança, de um vínculo de sangue compartilhado."
 coronation_events_klank.1008.desc.hostile: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('dynasty_king'))], [dynasty_king.Custom('ES_ElLa')] [dynasty_king.GetTitledFirstName|l], de espírito [ROOT.Char.Custom('InsultAdjective')], rastejou para fora de sua toca abominável em [dynasty_king.GetPrimaryTitle.GetName], com toda certeza para estragar minha coroação. Sua presença aqui é um espetáculo horrível. Pois não há ser humano mais distante de minha majestade. Além do sangue, nada há que nos una."
 coronation_events_klank.1008.desc.neutral: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('dynasty_king'))], [dynasty_king.Custom('ES_ElLa')] [dynasty_king.GetTitledFirstName|l] veio de [dynasty_king.GetPrimaryTitle.GetName] para presenciar minha coroação."
 coronation_events_klank.1008.desc.outro: "\n\n#EMP "[ROOT.Char.GetHouse.GetMotto]"#!, estas palavras têm guiado os [ROOT.Char.GetDynasty.GetName] ao longo de gerações. Nossos antepassados as mantiveram nas boas e nas más; agora cabe a [dynasty_king.Custom('ES_AlAla')] [dynasty_king.GetTitledFirstName|l] e a mim continuar sendo assim."
 coronation_events_klank.1008.a: "É um grande prazer vê-lo aqui."
 coronation_events_klank.1008.b: "$coronation_events_klank.1008.a$"
 coronation_events_klank.1008.c: "Bem-vind[dynasty_king.Custom('ES_OA')], [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('dynasty_king'))] meu[dynasty_king.Custom('ES_OA')]."
 coronation_events_klank.1008.d: "$coronation_events_klank.1008.c$"
 coronation_events_klank.1008.e: "Você testemunhará a ascensão de uma[ROOT.Char.Custom('ES_XA')] verdadeir[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetDynasty.GetNameNoTooltip]."
 coronation_events_klank.1008.f: "Ajoelhe-se! Ou haverá um [dynasty_king.Custom('ES_XA')] [dynasty_king.GetTitleAsNameNoTooltip] [ROOT.Char.GetDynasty.GetNameNoTooltip] a menos."
 coronation_events_klank.1008.g: "Eu sou [ROOT.Char.Custom('ES_ElLa')] verdadeir[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetDynasty.GetNameNoTooltip]."
 happened_because_intent_tt: "#EMP #low Tu intención de [THIS.Char.GetInvolvedActivityIntent.GetName|l] provocó este evento#!#!"
 coronation_events_klank.1009.t: "Em tempos de conflito"
 coronation_events_klank.1009.desc: "[left_struggle.GetName] e [right_struggle.GetName] estão há dias [Select_CString(And(left_struggle.IsFemale, right_struggle.IsFemale), 'enfrascadas', 'enfrascados')] em um debate acalorado. Os tempos são difíceis: todo o reino, toda a região está envolta em uma luta que dura décadas.\n\n"Os [first_struggle_faith.GetAdherentNamePlural] só estão esperando uma oportunidade para atacar os [right_struggle.GetFaith.GetAdherentNamePlural], enquanto os [first_struggle_culture.GetCollectiveNoun] aguardam ociosamente! [host.Custom('ES_ElLa')|U] [host.GetTitledFirstName|l] não poderá atravessar esse desafio!".\n\n[right_struggle.Custom('ES_ElLa')|U] [right_struggle.GetTitledFirstName|l] faz uma pausa para respirar enquanto [left_struggle.Custom('ES_ElLa')] [left_struggle.GetTitledFirstName|l] reúne os pensamentos para uma réplica. É o momento perfeito para eu intervir."
 coronation_events_klank.1009.a: "[char_struggle.GetNameNoTooltip] pode esperar. Hoje, aproveitem minha coroação."
 coronation_events_klank.1009.b: "Silêncio, detrator[right_struggle.Custom('ES_XA')]."
 coronation_events_klank.1009.c: "Em momentos de [char_struggle.GetCurrentPhase.GetNameNoTooltip], apoiamos [host.Custom('ES_AlAla')] [host.GetTitledFirstNameNoTooltip|l]."
 coronation_events_klank.1009.d: "[host.Custom('ES_ElLa')|U] [host.GetTitledFirstNameNoTooltip|l] é fraco demais para momentos de [char_struggle.GetCurrentPhase.GetNameNoTooltip]."
 coronation_events_klank.1009.e: "[Select_CString(And(left_struggle.IsFemale, right_struggle.IsFemale), 'As duas', 'Os dois')] estão errados."
 coronation_guest_struggle_support_log_title: "Apoio em tempos de contenda"
 coronation_guest_struggle_support_log: "[CHARACTER.Custom('ES_ElLa')|U] [CHARACTER.GetTitledFirstName|l] expressou publicamente sua confiança em [TARGET_CHARACTER.Custom('ES_ElLa')] [TARGET_CHARACTER.GetTitledFirstName|l] nestes tempos difíceis"
 coronation_guest_struggle_undermine_log_title: "Discordância em tempos de conflito"
 coronation_guest_struggle_undermine_log: "[CHARACTER.Custom('ES_ElLa')|U] [CHARACTER.GetTitledFirstName|l] expressou publicamente sua desconfiança em [TARGET_CHARACTER.Custom('ES_ElLa')] [TARGET_CHARACTER.GetTitledFirstName|l] nestes momentos difíceis"
 ach_enlightened_centrist: "Sempre há uma terceira opção"
 ach_enlightened_centrist_desc: "Este personagem tenta encontrar um meio-termo, mesmo que isso desagrade as pessoas ao seu redor."
 coronation_events_klank.1010.t: "O destino da Pérsia"
 coronation_events_klank.1010.desc.intro_detractor: "Que dia esplêndido na gloriosa [location.GetName], longe [caliph.Custom('ES_DelDela')] [caliph.Custom('InsultAdjective')] de [caliph.GetName]. [ROOT.Char.GetPrimaryTitle.GetNameNoTier|U] realmente floresceria se não fosse por essa espécie de [caliph.Custom('InsultNoun')] [caliph.Custom('InsultAdjective')].\n\n"
 coronation_events_klank.1010.desc.intro_supporter: "Que dia esplêndido na gloriosa [location.GetName], com a graça de [ROOT.Char.GetFaith.HighGodName], abençoados pelo esplendor [ROOT.Char.Custom('ComplimentAdjective')] de [caliph.GetName]. [ROOT.Char.GetPrimaryTitle.GetNameNoTier|U] verdadeiramente floresceria se todo [ROOT.Char.GetFaith.GetAdherentName] reconhecesse a sabedoria e a piedade de [caliph.Custom('ES_DelDela')] [caliph.GetTitleAsNameNoTooltip], assim como eu faço.\n\n"
 coronation_events_klank.1010.desc.intro_caliph: "Que dia esplêndido na gloriosa [location.GetName] com a coroação de [caliph.GetName] tão [ROOT.Char.Custom('ComplimentAdjective')] tão perto. [ROOT.Char.GetPrimaryTitle.GetName|U] floresceria de verdade se todo [ROOT.Char.GetFaith.GetAdherentName] reconhecesse a sabedoria e a piedade [caliph.Custom('ES_DelDela')] [caliph.GetTitleAsNameNoTooltip] como eu faço.\n\n"
 coronation_events_klank.1010.desc.mid_supporter: "Um de seus detratores se infiltrou na coroação e divaga de forma incoerente sobre a traição de [struggle_participant.GetFaith.DevilName], o futuro da Pérsia, a sabedoria de [struggle_participant.GetFaith.HighGodName] e sobre como os pés de [caliph.Custom('ES_AlAla')] [caliph.GetTitleAsNameNoTooltip]."
 coronation_events_klank.1010.desc.mid_detractor: "Um dos seus partidários entrou sorrateiramente nesta coroação e divaga incoerentemente sobre a traição de [struggle_participant.GetFaith.DevilName], o futuro da Pérsia, a sabedoria de [struggle_participant.GetFaith.HighGodName] e o cheiro dos pés [caliph.Custom('ES_DelDela')] [caliph.GetTitleAsNameNoTooltip]."
 coronation_events_klank.1010.outro: "Bem, é hora de pôr os pingos nos is.\n\n"A paz esteja com vós, [struggle_participant.GetTitledFirstNameNoTooltip], [ROOT.Char.Custom2('NegativeSupplimentaryGreeting', struggle_participant)|l]. A visão do vosso rosto me causa dor, [ROOT.Char.Custom2('NegativeSupplimentaryGreeting', struggle_participant)|l] Deveis…"."
 coronation_events_klank.1010.a: ""Afastai vossas falsas convicções"."
 coronation_events_klank.1010.b: ""Saiba que a natureza de [persian_struggle.GetCurrentPhase.GetName] é contrária aos [ROOT.Char.GetHouse.GetName]"."
 coronation_events_klank.1010.c: ""Reconhecer que a concessão é o único caminho viável"."
 coronation_events_klank.1010.d: "\"Ajoelhe-se diante do verdadeiro califa!\"."
 coronation_events_klank.1010.e: ""Vão embora e reclamem do lado de fora!""
 coronation_events_klank.1010.b.catalyst_unrest: "Você ativará um [struggle_catalyst|lE] em direção ao [struggle_persia_phase_unrest|lE]"
 coronation_events_klank.1010.b.catalyst_concession: "Você ativará um [struggle_catalyst|lE] em direção à [struggle_persia_phase_concession|lE]"
 coronation_events_klank.1010.b.catalyst_stabilization: "Você ativará um [struggle_catalyst|lE] em direção à [struggle_persia_phase_stabilisation|lE]"
 coronation_events_klank.1011.t: "A imensidão de [ROOT.Char.GetPrimaryTitle.GetName]"
 coronation_events_klank.1011.desc: "As terras sob meu domínio quase não têm fim, assim como minhas ambições. Meus vassalos mais poderosos estão aqui: [first_char.Custom('ES_ElLa')] [first_char.GetTitledFirstName|l], [second_char.Custom('ES_ElLa')] [second_char.GetTitledFirstName|l] e [third_char.Custom('ES_ElLa')] [third_char.GetTitledFirstName|l], prontos para se ajoelhar diante de mim, à espera da visão para o nosso futuro. Meu reinado moldará toda a extensão de [ROOT.Char.GetPrimaryTitle.GetNameNoTier] por décadas, por gerações. Agora é o momento perfeito para anunciar uma grande ambição soberana.\n\nEmbora impopular, centralizar o reino me colocaria uma espada poderosa na mão e ouro na bolsa. Mas meus vassalos, com sua autonomia e recursos, poderiam ser um escudo sólido que me protegeria de ameaças..."
 coronation_events_klank.1011.a: "Sou [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip]."
 coronation_events_klank.1011.a.custom_tooltip: "@alert_icon! Você dará início a um processo de centralização. Após #V 10#! anos, você colherá as recompensas:\n$EFFECT_LIST_BULLET$ Aumento do [development|lE] [development_i] em seu [domain|lE].\n$EFFECT_LIST_BULLET$ Redução do [development|lE] [development_i] nos [domains|lE] dos [vassals|El].\n$EFFECT_LIST_BULLET$ A mudança depende das suas [skills|lE] de [stewardship|lE] [stewardship_i] e [learning|lE] [learning_i]."
 custom.ten_most_powerful_vassals: "Seus dez vassalos mais poderosos presentes em sua coroação"
 coronation_events_klank.1011.a.county_modifier: "Todo [county|lE] de seu [domain|lE] recebe um [modifier|lE] [GetModifier('ach_realm_centralization_county_lvl_1').GetNameWithTooltip] durante 10 anos."
 custom.coronation_events_klank.1011.a.disrespect: "Seus [vassals|lE] #V detractores#! afetados por seu plano"
 custom.coronation_events_klank.1011.a.respect: "Seus demais [vassals|lE] afetados por seu plano"
 coronation_events_klank.1011.b: "Sem vassalos poderosos, eu não sou nada."
 coronation_events_klank.1011.b.custom_tooltip: "@alert_icon! Você dará início a um processo de descentralização e aumento da autonomia. Ao fim de #V 10#! anos, colherá as recompensas:\n$EFFECT_LIST_BULLET$ Aumento de [development|lE] [development_i] nos [domains|lE] dos [vassals|El].\n$EFFECT_LIST_BULLET$ A mudança depende de suas [skills|lE] de [stewardship|lE] [stewardship_i] e [diplomacy|lE] [diplomacy_i]."
 coronation_events_klank.1011.b.county_modifier: "Todo [county|lE] de seu [domain|lE] recebe um [modifier|lE] [GetModifier('ach_realm_autonomy_county_lvl_1').GetNameWithTooltip] por 10 anos."
 custom.coronation_events_klank.1011.b.disrespect: "$custom.coronation_events_klank.1011.a.disrespect$"
 custom.coronation_events_klank.1011.b.respect: "$custom.coronation_events_klank.1011.a.respect$"
 coronation_events_klank.1011.c: "Meu domínio está bem como está."
 coronation_events_klank.1012.t: "Grande plano de centralização [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l]"
 coronation_events_klank.1012.desc: "Durante sua coroação, [host.GetName] anunciou um plano grandioso e ambicioso para fortalecer o reino, concentrando-se no núcleo de [host.GetPrimaryTitle.GetName], que por acaso é o domínio pessoal [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l]. Os recursos necessários devem vir de algum lugar, pois não há nada verdadeiramente abundante neste mundo além da graça de [ROOT.Char.GetFaith.HighGodName]. Assim, isso acontece às custas da periferia, como o meu próprio domínio!\n\nViver em um reino poderoso, sob um[host.Custom('ES_XA')] [host.GetTitleAsNameNoTooltip|l] poderos[host.Custom('ES_OA')] tem suas vantagens..., mas e se esse poder fosse mal utilizado no futuro, usado contra mim? Um [ROOT.Char.GetPrimaryTitle.GetNameNoTier] é motivo de orgulho... e, talvez, de preocupação."
 coronation_events_klank.1012.a: "Sou [ROOT.Char.Custom('ES_ElLa')] serv[ROOT.Char.Custom('ES_OA')] mais humilde [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l]."
 coronation_events_klank.1012.b: "[ROOT.Char.GetPrimaryTitle.GetNameNoTooltip] pode sobreviver sem as ideias [host.Custom('ES_DelDela')][host.GetTitleAsNameNoTooltip]."
 coronation_events_klank.1012.b.desc: "Seu [domain|lE] não terá sua [development|lE] reduzida em 10 anos."
 coronation_events_klank.1012.ten_year_plan: "Ao final de 10 anos, o [development|lE] de seu [domain|lE] e o dos demais [vassals|lE] será reduzido, enquanto seu [liege|lE] se beneficiará. A mudança real depende das habilidades de [stewardship|lE] e [learning|lE] de seu [liege|lE]."
 coronation_events_klank.1013.t: "Grande plano de descentralização [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l]"
 coronation_events_klank.1013.desc: "Durante sua coroação, [host.GetName] anunciou um plano grandioso e ambicioso para fortalecer o reino, que se concentraria na periferia de [host.GetPrimaryTitle.GetName], o que inclui meu próprio domínio. Os recursos necessários devem vir de algum lugar, pois neste mundo nada é verdadeiramente abundante além da graça de [ROOT.Char.GetFaith.HighGodName]. [host.Custom('ES_ElLa')|U] [host.GetTitleAsNameNoTooltip|l] se ofereceu gentilmente para compartilhar a riqueza de seu domínio com todo o reino."
 coronation_events_klank.1013.a: "$coronation_events_klank.1012.a$"
 coronation_events_klank.1013.b: "$coronation_events_klank.1012.b$"
 coronation_events_klank.1013.b.desc: "Seu [domain|lE] não terá seu [development|lE] aumentado por 10 anos."
 coronation_events_klank.1013.ten_year_plan: "Após 10 anos, o [development|lE] de seu [domain|lE] e o dos demais [vassals|lE] aumentará. A mudança real depende das habilidades de [stewardship|lE] e [diplomacy|lE] de seu [liege|lE]."
 coronation_events_klank.1014.t: "Centralização de [ROOT.Char.GetPrimaryTitle.GetName] em conclusão"
 coronation_events_klank.1014.desc: "Há dez anos, em minha coroação, tracei um rumo para [ROOT.Char.GetPrimaryTitle.GetNameNoTier]. A pesar das complicações e penalidades, a riqueza fluiu diretamente para meu domínio, enquanto meus vassalos sofreram. Mas valeu a pena.\n\nAgora chegou a hora de colher as recompensas de minha Tesouraria e da perspicácia com que concretizei minha grande visão."
 coronation_events_klank.1014.county_effect: "Todo [county|lE] de seu [domain|lE] verá sua [development|lE] reduzido em 20 %"
 coronation_events_klank.1014.a: "Maravilhoso!"
 coronation_events_klank.1014.b: "Isto não é o fim."
 coronation_events_klank.1014.development_gain: "Sua reforma privou os [domains|lE] dos seus [vassals|El] de, no total, #P [ROOT.Char.MakeScope.Var('development_lost').GetValue]#! de [development|lE]. Seus [skills|El] de [stewardship|lE] e [learning|lE] permitem distribuir #P [ROOT.Char.MakeScope.Var('development_gain_percent').GetValue] %#! disso em seu [domain|lE]."
 custom.ten_most_powerful_vassals.1014: "[vassals|E] que foram submetidos à sua reforma:"
 coronation_events_klank.1014.b.county_effect: "Todo [county|lE] de seu [domain|lE] recebe um [modifier|lE] [GetModifier('ach_realm_centralization_county_lvl_2').GetNameWithTooltip] durante 10 anos."
 coronation_events_klank.1015.t: "Descentralização de [ROOT.Char.GetPrimaryTitle.GetName]: conclusão"
 coronation_events_klank.1015.desc: "Há dez anos, em minha coroação, tracei um rumo para [ROOT.Char.GetPrimaryTitle.GetNameNoTier]. Meus vassalos prosperaram graças às minhas sábias políticas, enquanto meu próprio domínio permaneceu subdesenvolvido. Mas valeu a pena.\n\nAgora chegou o momento de colher as recompensas da minha Tesouraria, da minha perspicácia e da diplomacia habilidosa que concretizou minha grande visão."
 coronation_events_klank.1015.county_effect: "Todo [county|lE] de seu [domain|lE] verá seu [development|lE] aumentado em #P [ROOT.Char.MakeScope.Var('development_gain_percent').GetValue] %#! por suas [skills|lE] de [stewardship|lE] e [diplomacy|lE]."
 coronation_events_klank.1015.a: "$coronation_events_klank.1014.a$"
 coronation_events_klank.1015.b: "$coronation_events_klank.1014.b$"
 custom.ten_most_powerful_vassals.1015: "$custom.ten_most_powerful_vassals.1014$"
 coronation_events_klank.1015.b.county_effect: "Todo [county|lE] de seu [domain|lE] recebe um [modifier|lE] [GetModifier('ach_realm_automomy_county_lvl_2').GetNameWithTooltip] durante 10 anos."
