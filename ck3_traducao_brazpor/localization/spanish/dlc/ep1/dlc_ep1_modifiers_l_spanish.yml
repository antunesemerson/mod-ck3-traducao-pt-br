 mythic_party_aftermath_modifier: "Consequências de Festa Mítica"
 mythic_party_aftermath_modifier_desc: "A corte deste personagem ainda carrega as cicatrizes devastadoras de uma festa tão gloriosamente devastadora que vive na memória local."
 world_shattering_party_aftermath_modifier: "Consequências de Festa de Impacto Mundial"
