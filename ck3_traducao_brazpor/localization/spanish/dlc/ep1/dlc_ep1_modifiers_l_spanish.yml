 what_did_i_just_drink_modifier: "O que eu acabei de beber?"
 what_did_i_just_drink_modifier_desc: "Aquilo foi... eu... minha cabeça... Ai."
 known_killjoy_modifier: "Matador de Alegria Conhecido"
