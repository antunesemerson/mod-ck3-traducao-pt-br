l_spanish:
 court_new.0001.t: "A Espada de Dâmocles"
 court_new.0001.desc.intro: "Ouço um estalo repentino quando uma seção dos andaimes se rompe e cai ao chão, quase atingindo um servo, não fossem os rápidos reflexos de [bodyguard_candidate.GetFirstName]."
 court_new.0001.desc.murdered: "Sou vivamente lembrado do horripilante assassinato de [murdered_person.GetName], arrebatad[murdered_person.Custom('ES_OA')] antes da hora."
 court_new.0001.desc.murderer: "Sou vivamente lembrado das tramas homicidas de [murder_dude.GetName], um[murder_dude.Custom('ES_XA')] canalha da pior espécie."
 court_new.0001.desc.paranoid: "Ultimamente, tenho visto sombras pelo canto do olho, espectros diabólicos sem dúvida movidos por intenções assassinas. Este último incidente apenas reforça minha sensação de perigo iminente."
 court_new.0001.desc.outro: "

Poderia ser outro complô vil? A vida de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] está sob a ameaça constante dos piores perigos, como se uma espada mal presa pairasse sobre minha cabeça, pronta para cair a qualquer momento.

Se ao menos eu tivesse alguém para zelar por mim, uma espécie de guardião para meu corpo mortal. Aquele sujeito, [bodyguard_candidate.GetFirstName], é diligente e robusto como poucos. Talvez eu devesse nomear [bodyguard_candidate.GetHerHim] para o cargo."
 court_new.0001.a: "[bodyguard_candidate.GetFirstNameNoTooltip] será um[bodyguard_candidate.Custom('ES_XA')] guarda-costas excelente."
 court_new.0001.a.murderer: "Eu não sou o único assassino neste lugar..."
 court_new.0001.b: "Tenho certeza de que ficarei bem sem [bodyguard_candidate.GetHerHim]."
