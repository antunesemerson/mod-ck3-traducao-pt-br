l_spanish:
 ep1_decision.0101.t: "Fora com o Velho"
 ep1_decision.0101.desc: "¡Cuentistas! ¡Holgazanes! ¡Inútiles!\n\nMi corte está #EMP plagada#! de parásitos, como pulgones en un jardín, alojados en todas las estancias disponibles, que roncan día y noche y abandonan sus orinales por los estrechos pasillos.\n\nEsto no puede quedar así. Sencillamente, no tenemos #EMP sitio#! para todos estos forasteros vagabundos"
 ep1_decision.0101.a: "[capital.GetNameNoTierNoTooltip] não é uma pousada. Sumam, sanguessugas!"
 ep1_decision.0101.b: "Todos aqueles que não têm um trabalho ou meu sangue, #EMP fora#!!"
 ep1_decision.0101.c: "Suponho que possamos colocar algumas camas nos estábulos..."
 ep1_decision.0111.t: "Decoração Grandiosa"
 ep1_decision.0111.desc: "Se presentan muchos posibles candidatos a la redecoración, los más cercanos y dignos de mención son: los señoríos de [option_1.GetTitledFirstName|l], [option_2.GetTitledFirstName|l] y [option_3.GetTitledFirstName|l]\n\nSeleccionar un estilo con fama de tener más renombre que mi propia corte sería una humillación personal, pero me daría un poco del aire de grandeza del señorío extranjero.\n\nPor el contrario, emular a un señorío menor mostraría magnanimidad y apoyaría mi leyenda en el extranjero a costa de cierta reputación en casa."
 ep1_decision.0111.toast.t: "[ROOT.Char.GetTitledFirstName] imitou uma das minhas salas"
 ep1_decision.0111.a.greater_cgv: "A corte de [option_1.GetPrimaryTitle.GetNameNoTooltip] é muito, muito grandiosa."
 ep1_decision.0111.a.lesser_cgv: "O povo [option_1.GetPrimaryTitle.GetAdjectiveNoTooltip] #EMP poderia#! se beneficiar da minha caridade."
 ep1_decision.0111.b.greater_cgv: "A arquitetura de [option_2.GetPrimaryTitle.GetNameNoTooltip] me parece fascinante!"
 ep1_decision.0111.b.lesser_cgv: "A arquitetura [option_2.GetPrimaryTitle.GetAdjectiveNoTooltip] é bruta, mas inspiradora!"
 ep1_decision.0111.c.greater_cgv: "Talvez uma sala de festas no estilo [option_3.GetPrimaryTitle.GetAdjectiveNoTooltip]?"
 ep1_decision.0111.c.lesser_cgv: "Talvez uma sala de festas [option_3.GetPrimaryTitle.GetAdjectiveNoTooltip] rústica fosse uma novidade?"
 ep1_decision.0111.d: "Tudo isso parece muito #EMP alarmantemente#! estrangeiro..."
 ep1_decision.0111.d.tt: "Seu [gold|lE] será reembolsado"
 promote_other_culture_development_decision_name: "Celebre Outras Culturas"
 promote_other_culture_development_decision_desc: "Recompense aqueles que nos serviram fielmente, para que possam crescer e se desenvolver junto com a dinastia que eles servem com tanta lealdade!"
 promote_other_culture_development_decision_tooltip: "Melhora o desenvolvimento de [counties|lE] de [cultures|lE] diferentes com uma alta [cultural_acceptance|lE]"
 promote_other_culture_development_decision_not_acceptance_tt: "Não há [culture|lE] com [cultural_acceptance|lE] maior que #V 75%#! em seu [realm|lE]"
 promote_other_culture_development_decision_confirm: "Distribuir as moedas"
 promote_other_culture_development_decision_effect_summary: "Cada [county|lE] [current_culture.GetName] no [realm|lE] recebe [GetModifier('promote_culture_modifier' ).GetNameWithTooltip|L] por 10 anos"
 promote_other_culture_development_decision_no_effect: "Cada [county|lE] no [realm|lE] de uma [culture|lE] com [cultural_acceptance|lE] maior que #V 75%#! recebe [GetModifier('promote_culture_modifier' ).GetNameWithTooltip|L] por 10 anos"
 promote_culture_leader_modifier: "Celebrando a Diversidade Cultural"
 ep1_decision.0201.t: "Linguistas na corte"
 ep1_decision.0201.desc: "Finalmente, a busca por um linguista [target_court_language.GetCourtLanguage.GetName] chegou ao fim. Os candidatos foram apresentados diante de mim, cada um com sua própria expertise em línguas estrangeiras."
 ep1_decision.0201.tt.aptitude: "A [aptitude|lE] de [selected_linguist.GetUIName] é [selected_linguist.GetCourtPositionAptitude( GetCourtPositionType( 'court_tutor_court_position' ) )]"
 ep1_decision.0201.a: "¡[good_linguist.GetNameNoTooltip] es un[good_linguist.Custom('ES_XA')] célebre lingüista de [target_court_language.GetCourtLanguage.GetNameNoTooltip]!"
 ep1_decision.0201.b: "[medium_linguist.GetNameNoTooltip] fará o trabalho."
 ep1_decision.0201.c: "[scholarly_linguist.GetNameNoTooltip] é um[scholarly_linguist.Custom('ES_XA')] especialista[scholarly_linguist.Custom('ES_OA')] famos[scholarly_linguist.Custom('ES_OA')] em [target_court_language.GetCourtLanguage.GetNameNoTooltip]!"
 ep1_decision.0201.d: "Eu sei que [cheap_linguist.GetNameNoTooltip] trabalhará praticamente de graça!"
 ep1_decision.0201.e: "Pensando melhor..."
 learn_court_language_toast_title: "Professor de [target_court_language.GetCourtLanguage.GetName] Contratado"
