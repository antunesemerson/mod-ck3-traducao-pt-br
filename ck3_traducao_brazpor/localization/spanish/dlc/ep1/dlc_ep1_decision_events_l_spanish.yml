l_spanish:
 ep1_decision.0101.t: "Fora com o Velho"
 ep1_decision.0101.desc: "Contadores de lorotas! Preguiçosos! Inúteis!

Minha corte está #EMP infestada#! de parasitas, como pulgões em um jardim, alojados em todos os aposentos disponíveis, roncando dia e noite e deixando seus penicos espalhados pelos corredores apertados.

Isso não pode continuar assim. Simplesmente não temos #EMP espaço#! para todos esses estrangeiros errantes."
 ep1_decision.0101.a: "Apresentam-se vários candidatos prováveis para a reforma, os mais próximos e notáveis para mim: os domínios de [option_1.GetTitledFirstName|l], [option_2.GetTitledFirstName|l] e [option_3.GetTitledFirstName|l].

Escolher um estilo considerado mais renomado do que minha própria corte seria uma humilhação pessoal, mas me daria um pouco da aura de grandiosidade do reino estrangeiro.

Por outro lado, imitar um reino menor demonstraria magnanimidade e construiria minha lenda no exterior, ao custo de certa reputação em casa."
 ep1_decision.0101.b: "[ROOT.Char.GetTitledFirstName] imitou uma das minhas salas"
 ep1_decision.0101.c: "A corte de [option_1.GetPrimaryTitle.GetNameNoTooltip] é muito, muito grandiosa."
 ep1_decision.0111.t: "O povo [option_1.GetPrimaryTitle.GetAdjectiveNoTooltip] #EMP poderia#! se beneficiar da minha caridade."
 ep1_decision.0111.desc: "Apresentam-se vários candidatos prováveis para a reforma, os mais próximos e notáveis para mim: os domínios de [option_1.GetTitledFirstName|l], [option_2.GetTitledFirstName|l] e [option_3.GetTitledFirstName|l].

Escolher um estilo considerado mais renomado do que minha própria corte seria uma humilhação pessoal, mas me daria um pouco da aura de grandiosidade do reino estrangeiro.

Por outro lado, imitar um reino menor demonstraria magnanimidade e construiria minha lenda no exterior, ao custo de certa reputação em casa."
 ep1_decision.0111.toast.t: "Seu [gold|lE] será reembolsado"
 ep1_decision.0111.a.greater_cgv: "Celebre Outras Culturas"
 ep1_decision.0111.a.lesser_cgv: "Recompense aqueles que nos serviram fielmente, para que possam crescer e se desenvolver junto com a dinastia que eles servem com tanta lealdade!"
 ep1_decision.0111.b.greater_cgv: "Melhora o desenvolvimento de [counties|lE] de [cultures|lE] diferentes com uma alta [cultural_acceptance|lE]"
 ep1_decision.0111.b.lesser_cgv: "Não há [culture|lE] com [cultural_acceptance|lE] maior que #V 75%#! em seu [realm|lE]"
 ep1_decision.0111.c.greater_cgv: "Distribuir as moedas"
