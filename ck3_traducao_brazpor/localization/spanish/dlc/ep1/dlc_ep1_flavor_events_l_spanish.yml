 #Exotic Arms
 ep1_flavor.2040.t: "Armas Exóticas"
 ep1_flavor.2040.desc: "Junto com seus estranhos bens, os comerciantes trazem histórias de terras distantes, impossíveis de verificar, cheias de maravilhas. \n\nUm grupo de comerciantes da nação [foreign_merchant.GetCulture.GetNameNoTooltip] me trouxeram mercadorias "#EMP [exotic_blade_holder.GetCulture.GetNameNoTooltip]#!" que dizem ter vindo da corte longínqua de um grande governante: "#EMP [exotic_blade_holder.GetFullNameNoTooltipRegnal]#!", nada menos. \n\n[foreign_merchant.GetTitledFirstName|l], o principal comerciante sorri misteriosamente,"
 ep1_flavor.2040.desc.artifact: "\"Eu vi o sua [my_artifact.GetName], se separar dele e eu lhe darei esta [exotic_blade.Custom('ArtifactType')|l] única no mundo...\""
 ep1_flavor.2040.desc.gold: "Esta [exotic_blade.Custom('ArtifactBaseWeaponType')|l] sem par poderia ser sua, por um preço especial, é claro, grande [ROOT.Char.GetTitleAsNameNoTooltip|l]...\n\nUma história, provavelmente!"
 ep1_flavor.2040.desc.outro: "Se ao menos eu tivesse algum meio de verificar a história [foreign_merchant.Custom('ES_DelDela')] mercachifre…"
 ep1_flavor.2040.desc.outro_antiquarian: "Eu procuro por [antiquarian.GetTitledFirstName|l] para orientação:"
 ep1_flavor.2040.desc.outro_good_praise: ""Certamente não é uma falsificação, meu senhor[ROOT.Char.Custom('ES_XA')]. Certamente, esta peça é [exotic_blade_holder.GetPrimaryTitle.GetAdjectiveNoTooltip] e de grande qualidade"."
 ep1_flavor.2040.desc.outro_good_unsure: ""Não estou familiarizad[antiquarian.Custom('ES_OA')] com a artesanato [exotic_blade_holder.GetPrimaryTitle.GetAdjectiveNoTooltip], mas esta peça parece ser finamente feita"."
 ep1_flavor.2040.desc.outro_good_warning: ""Não posso recomendar este objeto, meu senhor[ROOT.Char.Custom('ES_XA')]. As… marcas do martelo são… nostálgicas". [exotic_blade_holder.GetSheHe|U] assente estupidamente."
 ep1_flavor.2040.desc.outro_bad_warning: ""[exotic_blade_holder.GetPrimaryTitle.GetNameNoTierNoTooltip] ou não, esta é uma peça de má qualidade, meu senhor[ROOT.Char.Custom('ES_XA')] e duvido muito de sua suposta procedência"."
 ep1_flavor.2040.desc.outro_bad_unsure: ""Duvido dizer com certeza, mas não estou convencido[antiquarian.Custom('ES_OA')] de que este objeto seja o que dizem"."
 ep1_flavor.2040.desc.outro_bad_praise: "\"Que excelente obra de arte [exotic_blade_holder.GetPrimaryTitle.GetNameNoTierNoTooltip]! Veja só como é brilhante!\""
 ep1_flavor.2040.a: "\"Suponho que possa me desfazer dele...\""
 ep1_flavor.2040.tt_my: "Você perderá seu [my_artifact.GetName]"
 ep1_flavor.2040.tt_exotic: "Tornar-se-á o proprietário[ROOT.Char.Custom('ES_OA')] de [exotic_blade.GetNameNoTooltip]"
 ep1_flavor.2040.toast: "A [exotic_blade.Custom('ArtifactType')|l] é esplêndida"
 ep1_flavor.2040.toast_poor: "A [exotic_blade.Custom('ArtifactType')|l] é medíocre"
 ep1_flavor.2040.b: "\"Traga minha bolsa de moedas!\""
 ep1_flavor.2040.c: "\"Ha! '#EMP [exotic_blade_holder.GetCapitalLocation.GetTitle.GetDeJureLiege.GetDeJureLiege.GetNameNoTierNoTooltip]#!'... que absurdo! Fora com você!\""
 #The Greater Good
 ep1_flavor.2060.t: "O Bem Maior"
 ep1_flavor.2060.desc: "[detective_scope.GetFirstName], un[detective_scope.Custom('ES_XA')] subaltern[detective_scope.Custom('ES_OA')] local [sandford_scope.GetTitle.GetHolder.Custom('ES_DelDela')] [sandford_scope.GetTitle.GetHolder.GetTitleAsNameNoTooltip], solicita una audiencia privada y afirma saber quién está detrás de las recientes desapariciones [victim_scope.Custom('ES_DelDela')] [victim_scope.GetTitledFirstName|l] y otros viajeros a mi corte. \n\n«¡[ROOT.Char.Custom('FormOfAddressForLiege')|U]! He descubierto una oscura cábala dirigida por [grocer_scope.Custom('ES_ElLa')] [grocer_scope.GetTitledFirstName|l], un[grocer_scope.Custom('ES_XA')] tender[grocer_scope.Custom('ES_OA')]. Se hacen llamar los Guardianes de [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip], ¡y quienes, a su entender, empañan la grandeza de su [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] suelen desaparecer pronto!». \n\nCuando hago traer [grocer_scope.Custom('ES_AlAla')] tender[grocer_scope.Custom('ES_OA')], lo niega todo y alega que es[detective_scope.Custom('ES_EA')] [detective_scope.GetWomanMan] delira por haber pasado demasiados años en las malas calles de [ROOT.Char.GetCapitalLocation.GetNameNoTooltip]."
 ep1_flavor.2060.a: ""Tenho cer[ROOT.Char.Custom('ES_OA')] certeza de que há uma explicação razoável"."
 ep1_flavor.2060.a.tt: "[detective_scope.GetFirstName] e [grocer_scope.GetFirstName] saem"
 ep1_flavor.2060.b: "\"Prenda [grocer_scope.GetFirstNameNoTooltip], então venha trabalhar para mim!\""
 ep1_flavor.2060.b.title: "Um intrometido sanguinário"
 ep1_flavor.2060.c: "\"Uma pena você ter se envolvido, [detective_scope.GetFirstNameNoTooltip]...\""
 ep1_flavor.2060.c.title: "Não conseguiu pegar os assassinos"
 ep1_flavor.2060.death_tt: "[victim_scope.GetName] desapareceu misteriosamente"
 #When Minds Collide
 ep1_flavor.2070.t: "Quando Mentes Colidem"
 ep1_flavor.2070.desc.intro: "Ao passar pela biblioteca, os murmúrios de descontentamento de [symposium_courtier.GetTitledFirstName|l] chamam minha atenção. Está debatendo com [symposium_scholar.GetTitledFirstName|l], um[symposium_scholar.Custom('ES_XA')] [symposium_scholar.Custom('GetScholarType')|l] da cultura [symposium_scholar.GetCulture.GetNameNoTooltip] de certa reputação. \n\n"
 ep1_flavor.2070.desc.theo_same_faith: ""Vocês estão cometendo os mesmos erros que os iniciados [symposium_courtier.GetFaith.GetAdherentNamePluralNoTooltip]", diz [symposium_courtier.GetFirstNameNoTooltip] franzindo o nariz. "De fato, este é o caminho para a heresia". \n\n"Ora", suplica [symposium_scholar.Custom('GetYoungMiddleAgedOld')], "certamente [symposium_scholar.GetFaith.HighGodName] não pretendia que Seus ensinamentos fossem tão inflexíveis, especialmente quando foram deixados apenas para nós os interpretarmos"."
 ep1_flavor.2070.desc.theo_same_faith_diff_cult: ""Eu não tinha a menor ideia de quão distante o [symposium_courtier.GetFaith.GetNameNoTooltip] [symposium_ruler.GetPrimaryTitle.GetAdjectiveNoTooltip] havia se afastado dos ensinamentos de [symposium_scholar.GetFaith.HighGodNamePossessive]!", zomba [symposium_courtier.GetFirstNameNoTooltip].\n\n"Bobagem", replica [symposium_scholar.Custom('GetYoungMiddleAgedOld')] balançando o dedo. "São os [symposium_courtier.GetFaith.GetAdherentNamePluralNoTooltip] da nação [symposium_courtier.GetCulture.GetNameNoTooltip] os que se perderam e recaíram em práticas pagãs"."
 ep1_flavor.2070.desc.theo_same_relig: ""As diferenças entre [symposium_courtier.GetFaith.GetNameNoTooltip|l] e [symposium_scholar.GetFaith.GetNameNoTooltip|l] são mais do que meramente técnicas", prega [symposium_courtier.GetFirstNameNoTooltip]. "Sua heresia se desviou de [symposium_courtier.GetFaith.HighGodName]".\n\n"A verdadeira natureza de [symposium_courtier.GetFaith.GetReligion.GetNameNoTooltip|l] está abrangida por ambas as fés", diz solenemente [symposium_scholar.Custom('GetYoungMiddleAgedOld')]. "São os ignorantes que transformam as poças em rios"."
 ep1_flavor.2070.desc.theo_diff_relig: ""Nunca entendi os ensinamentos de [symposium_scholar.GetFaith.GetReligion.GetAdjectiveNoTooltip]", reflete [symposium_courtier.GetFirstNameNoTooltip]. "[symposium_scholar.GetFaith.HighGodName] parece uma figura pouco convincente em comparação com [symposium_courtier.GetFaith.HighGodName]."\n\nTal [symposium_scholar.Custom('GetYoungMiddleAgedOld')] sorri sarcasticamente: "Que compreensão profunda a sua! Se você fosse [symposium_scholar.GetFaith.BishopNeuter], certamente iria para o [symposium_scholar.GetFaith.PositiveAfterLife]!""
 ep1_flavor.2070.desc.mystic: ""Essas práticas esotéricas não têm lugar no reino [symposium_courtier.GetFaith.HighGodNamePossessive]", repreende severamente [symposium_courtier.GetFirstNameNoTooltip]". "Não passam de fumaça e espelhos, escondidos atrás de mistérios". \n\n[symposium_scholar.Custom('GetYoungMiddleAgedOld')] sorri com desdém. "Vocês só temem o que não entendem e carecem da coragem ou da inteligência para aprender"."
 ep1_flavor.2070.desc.medicine: ""Um médico tem sua utilidade, mas [symposium_courtier.GetFaith.HighGodName] é quem tem a palavra final sobre a vida e a morte", lamenta [symposium_courtier.GetFirstNameNoTooltip]. "Nenhuma cataplasma pode curar a alma". \n\n"Vejo que lhes falta compreensão do físico", suspira [symposium_scholar.Custom('GetYoungMiddleAgedOld')]. "Tantos poderiam ser salvos se não houvesse tanta ignorância"."
 ep1_flavor.2070.desc.ling_same_cult: ""A escrita [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip] está muito mais desenvolvida do que qualquer coisa que se possa encontrar em [symposium_ruler.GetPrimaryTitle.GetNameNoTierNoTooltip], boceja [symposium_courtier.GetFirstNameNoTooltip]. "Vocês devem levar alguns livros quando partirem". \n\n"É incrível o quão errado alguém pode estar", resmunga [symposium_scholar.Custom('GetYoungMiddleAgedOld')], "e ainda assim afirmar isso com tanta certeza…""
 ep1_flavor.2070.desc.ling_diff_cult: ""Por [symposium_courtier.GetFaith.HighGodName], escutem-se!", se desespera [symposium_courtier.GetFirstNameNoTooltip]. "Esse dialeto [symposium_scholar.GetCulture.GetNameNoTooltip] massacra o belo idioma [symposium_courtier.GetCulture.GetLanguage.GetNameNoTooltip], bem poderiam estar falando [ling_cul_1_bonus.GetLanguage.GetNameNoTooltip]!". \n\n[symposium_scholar.GetFirstNameNoTooltip] se recompõe: "A corte e a língua [symposium_ruler.Custom('ES_DelDela')] [symposium_ruler.GetTitledFirstName|l] são muito mais puras, de longe, que essa triste desculpa de [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip]"."
 ep1_flavor.2070.desc.ling_diff_lang: ""Vossa língua estrangeira carece de nuances para discutir estas ideias", diz [symposium_courtier.GetFirstNameNoTooltip] com desprezo. "Esse é, claro, o motivo de que tenhas aprendido #EMP [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip]#!". \n\nTal [symposium_scholar.Custom('GetYoungMiddleAgedOld')] revira os olhos e murmura com desdém alguns juramentos em [symposium_scholar.GetCulture.GetLanguage.GetNameNoTooltip] em voz baixa."
 ep1_flavor.2070.desc.fall_alchemy: ""Essa proporção jamais funcionará", balança a cabeça [symposium_courtier.GetFirstNameNoTooltip], enquanto se inclina sobre uns rabiscos em um pedaço de casca. "Isso já foi tentado antes". \n\nTal [symposium_scholar.Custom('GetYoungMiddleAgedOld')] responde, "Todos cometem erros — até os alquimistas —; talvez tenham deixado passar algo"."
 ep1_flavor.2070.desc.fall_stars: ""Não, não e não! Essas teorias foram desmentidas há séculos", [symposium_courtier.GetFirstNameNoTooltip] franze a testa com genuína incredulidade. "Vocês não leram os clássicos da astronomia?" \n\n"Vocês leem em vez de pensar, replica [symposium_scholar.Custom('GetYoungMiddleAgedOld')]. "Ainda há muito o que aprender"."
 ep1_flavor.2070.desc.fall_books: "«Es #EMP obvio#! que habéis estado leyendo los libros equivocados», dice [symposium_courtier.GetFirstNameNoTooltip] desdeñosamente. «Os daré una lista de recomendaciones [symposium_courtier.GetCulture.GetNameNoTooltip]s…» \n\n«Está bien», responde igualmente [symposium_scholar.Custom('GetYoungMiddleAgedOld')], «es #EMP obvio#! que no contienen mucho»."
 ep1_flavor.2070.a: "\"Diga, você ficaria um pouco mais, [symposium_scholar.GetFirstNameNoTooltip]?\""
 ep1_flavor.2070.c: ""Estais errado[symposium_scholar.Custom('ES_OA')] e eis o motivo""
 ep1_flavor.2070.c.lang: "\"Você acabou de dizer o que eu acho que disse?\""
 ep1_flavor.2070.c.success: "Você prova que [symposium_scholar.GetFirstNameNoTooltip] está errado"
 ep1_flavor.2070.c.failure: "[symposium_scholar.GetFirstNameNoTooltip] te constrange"
 ep1_flavor.2070.c.tt: "[symposium_scholar.GetFirstNameNoTooltip] pode se juntar à sua corte"
 ep1_flavor.2070.d: "\"Acho que é hora de você sair, [symposium_scholar.Custom('GetScholarType')|l].\""
 ep1_flavor.2070.e: "Fora, blasfem[symposium_scholar.Custom('ES_OA')]!"
