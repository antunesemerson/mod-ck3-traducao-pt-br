 #Court of Vipers
 ep1_flavor.2010.t: "Corte das Víboras"
 ep1_flavor.2010.desc: "A cada noite, quando as velas se apagam e a [ROOT.Char.Custom('FortifiedBuilding')] fica silenciosa, sussurros de uma conspiração para me [real_plot.GetSchemeType.GetTypeNameNoTooltip|l] assombram os aposentos."
 #SPYMASTER
 ep1_flavor.2010.desc_spy_real: "[spymaster.GetCouncilTitleFirstName] parece certo[spymaster.Custom('ES_OA')] de que meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('real_plotter'))] , [real_plotter.GetTitledFirstName|l] está por trás… \n\n"
 ep1_flavor.2010.desc_spy_1: "[spymaster.GetCouncilTitleFirstName] diz que meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('scapegoat_1'))] , [scapegoat_1.GetTitledFirstName|l] , está provavelmente, #EMP quizás#! por trás… \n\n"
 ep1_flavor.2010.desc_spy_2: "[spymaster.GetCouncilTitleFirstName] está quase meio certo[spymaster.Custom('ES_OA')] de que meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('scapegoat_2'))], [scapegoat_2.GetTitledFirstName|l], está por trás… \n\n"
 #COUNCILLOR 1
 ep1_flavor.2010.desc_1_real: "[councillor_1.GetCouncilTitleFirstName] discorda privadamente, argumentando que [real_plotter.GetTitledFirstName|l], meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('real_plotter'))], é o culpado, enquanto"
 ep1_flavor.2010.desc_1_1: "[councillor_1.GetCouncilTitleFirstName] discorda privadamente, argumentando que o odor fétido de [scapegoat_1.GetTitledFirstName|l], meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('scapegoat_1'))], merece investigação, enquanto"
 ep1_flavor.2010.desc_1_2: "[councillor_1.GetCouncilTitleFirstName] discorda privadamente, argumentando que [scapegoat_2.GetTitledFirstName|l], meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('scapegoat_2'))], tem uma aparência suspeita, enquanto"
 #COUNCILLOR 2
 ep1_flavor.2010.desc_2_real: "[councillor_2.GetCouncilTitleFirstName] me exorta a prender meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('real_plotter'))]; [real_plotter.GetTitledFirstName|l], \"traidor[real_plotter.Custom('ES_XA')] evidente\", antes que seja tarde demais\n\n"
 ep1_flavor.2010.desc_2_1: "[councillor_2.GetCouncilTitleFirstName] me insta a prender meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('scapegoat_1'))], [scapegoat_1.GetTitledFirstName|l], o \"fantasma de [scapegoat_1.GetCurrentLocation.GetNameNoTooltip]\", antes que seja tarde demais.\n\n"
 ep1_flavor.2010.desc_2_2: "[councillor_2.GetCouncilTitleFirstName] me insta a prender meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('scapegoat_2'))], [scapegoat_2.GetTitledFirstName|l], o \"[ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip] diabo\", antes que seja tarde demais.\n\n"
 #CONTEXT
 ep1_flavor.2010.desc_family: "Será que minha própria carne e sangue está conspirando contra mim?"
 ep1_flavor.2010.desc_consort: "Será que eu estou dividindo minha cama com alguém que quer me ver morto?"
 ep1_flavor.2010.desc_councillor: "Será que um dos meus conselheiros mais próximos realmente busca me prejudicar?"
 ep1_flavor.2010.desc_fallback: "Vejo traição em cada par de olhos; verifico as mãos dos cortesãos em busca de lâminas escondidas."
 ep1_flavor.2010.desc_outro: "Por [ROOT.Char.GetFaith.HighGodName], estou no meu limite..."
 #OPTIONS
 ep1_flavor.2010.a.real: "É [real_plotter.GetTitledFirstNameNoTooltip|l], tenho certeza[ROOT.Char.Custom('ES_OA')]!"
 ep1_flavor.2010.a.fake_1: "É [scapegoat_1.GetTitledFirstNameNoTooltip|l][ROOT.Char.Custom('ES_OA')], tenho certeza!"
 ep1_flavor.2010.a.fake_2: "É [scapegoat_2.GetTitledFirstNameNoTooltip|l], tenho certeza[ROOT.Char.Custom('ES_OA')]!"
 ep1_flavor.2010.b.real: "Não... será que é [real_plotter.GetTitledFirstNameNoTooltip]?"
 ep1_flavor.2010.b.fake_1: "Não... será que é [scapegoat_1.GetTitledFirstNameNoTooltip]?"
 ep1_flavor.2010.b.fake_2: "Não... será que é [scapegoat_2.GetTitledFirstNameNoTooltip]?"
 ep1_flavor.2010.c.real: "[real_plotter.GetTitledFirstNameNoTooltip|l] deve estar por trás disso."
 ep1_flavor.2010.c.fake_1: "[scapegoat_1.GetTitledFirstNameNoTooltip|l] deve estar por trás disso."
 ep1_flavor.2010.c.fake_2: "[scapegoat_2.GetTitledFirstNameNoTooltip|l] deve estar por trás disso."
 ep1_flavor.2010.d: "Seguirei o fio da meada."
 ep1_flavor.2010.e: "Nada além de rumores."
 ep1_flavor.2010.e.tt: "A trama contra você vai progredir."
 ep1_flavor.2010.d.success: "Você descobre o verdadeiro culpado."
 ep1_flavor.2010.d.failure: "Você só encontra mais dúvida."
 ep1_flavor.2010.d.success_tt: "O verdadeiro conspirador será exposto e preso."
 ep1_2010_failure_modifier: "Teia de Mentiras"
 ep1_2010_failure_modifier_desc: "A corte deste personagem é um emaranhado de interesses conspiratórios."
 ep1_flavor.2010.guilty: "A culpa é confirmada."
 ep1_flavor.2010.innocent: "A culpa está em dúvida."
 #Interservice Rivalry
 ep1_flavor.2020.t: "Rivalidade Inter-Serviços"
 ep1_flavor.2020.desc: "É natural que haja uma competição saudável entre soldados, mas a divisão entre minhas [SCOPE.Custom('GetMAAType1')] e minhas [SCOPE.Custom('GetMAAType2')] é evidente. \n\nSeu desenvolvimento se reflete na crescente animosidade entre seus oficiais, os [ROOT.Char.Custom('MountedWarriorTermPlural')] [knight_1.GetTitledFirstName|l] e [knight_2.GetTitledFirstName|l] que voltam a discutir diante de mim. \n\n"
 ep1_flavor.2020.desc_knight_1_archers: "\"...espero que você não fique sem flechas; então você teria que #EMP realmente#! lutar!\""
 ep1_flavor.2020.desc_knight_1_light_cavalry: "\"...bater e correr, não é? Parece mais #EMP recuar e fugir#! para mim!\""
 ep1_flavor.2020.desc_knight_1_heavy_infantry: ""… Quão #EMP valiente#! sois, blindad[knight_1.Custom('ES_OA')] da cabeça aos pés!""
 ep1_flavor.2020.desc_knight_1_pikemen: "\"...o que há de errado, com medo do inimigo chegar muito #EMP perto#! de você?\""
 ep1_flavor.2020.desc_knight_1_heavy_cavalry: "\"...eu entendo: Por que #EMP lutar#! contra o inimigo quando você pode simplesmente pisoteá-los?\""
 ep1_flavor.2020.desc_knight_1_archer_cavalry: "\"...você já #EMP viu#! um inimigo, se movendo tão rápido e tão longe?\""
 ep1_flavor.2020.desc_knight_1_skirmishers: "\"...praticando suavizar o terreno para os lutadores #EMP reais#! novamente?\""
 ep1_flavor.2020.desc_knight_1_elephant_cavalry: "\"...o quê, só um elefante? Você não quer montar algo #EMP maior#!?\""
 ep1_flavor.2020.desc_knight_1_camel_cavalry: "\"Cavalos do deserto? Mais parecem #EMP vacas#! se me perguntarem.\""
 ep1_flavor.2020.desc_bridge: "[knight_2.GetFirstNameNoTooltip] zomba, antes de [knight_1.GetFirstNameNoTooltip] retrucar com ferocidade:"
 ep1_flavor.2020.desc_knight_2_archers: ""Ah, por favor, não vou aceitar lições de combate de um[knight_2.Custom('ES_XA')] caçador[knight_2.Custom('ES_XA')] pretensioso"."
 ep1_flavor.2020.desc_knight_2_light_cavalry: ""Sim, isso realmente tem peso vindo de um[knight_2.Custom('ES_XA')] #EMP explorador[knight_2.Custom('ES_XA')]#! de pacotilha"."
 ep1_flavor.2020.desc_knight_2_heavy_infantry: "\"Fácil falar, enquanto se usa uma malha tão #EMP grossa#!."
 ep1_flavor.2020.desc_knight_2_pikemen: ""Vá se esconder atrás do seu muro de agulhas, tolo[knight_2.Custom('ES_OA')]"."
 ep1_flavor.2020.desc_knight_2_heavy_cavalry: "\"Pah, você perdeu qualquer perspectiva significativa, lá em cima em um cavalo de guerra imenso.\""
 ep1_flavor.2020.desc_knight_2_archer_cavalry: "«No me dará lecciones un[knight_2.Custom('ES_XA')] #EMP revientacaballos#! ilus[knight_2.Custom('ES_OA')] con un arco»."
 ep1_flavor.2020.desc_knight_2_skirmishers: "\"Venha e fale comigo quando você realmente desembainhar uma espada, quanto mais usá-la.\""
 ep1_flavor.2020.desc_knight_2_elephant_cavalry: ""Diz quem cavalga sobre um monstro gigante e com presas"."
 ep1_flavor.2020.desc_knight_2_camel_cavalry: "\"Eita, afaste-se de mim, o cheiro de camelo é avassalador.\""
 ep1_flavor.2020.a: "\"Os [SCOPE.Custom('GetMAAType1')|l] são a nossa espinha dorsal!\""
 ep1_flavor.2020.b: ""Não somos nada sem [SCOPE.Custom('GetMAAType2')|l]!""
 ep1_flavor.2020.c: "\"Qual é o uso de um sem o outro?\""
 ep1_flavor.2020.c.success: "Seu argumento é convincente"
 ep1_flavor.2020.c.failure: "Seu argumento não convence"
 ep1_flavor.2020.d: "\"Parem com isso, vocês dois.\""
 ep1_flavor_2020_both_modifier: "Reconhecimento Militar"
 ep1_flavor_2020_both_modifier_desc: "Os cavaleiros deste personagem são motivados pelo reconhecimento do seu suserano sobre a importância das suas tropas."
