 #Taking Sides
 ep1_flavor.2030.t: "Tomando Partido"
 ep1_flavor.2030.desc_intro: "A burocracia do título de senhorio [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip] costuma avançar por impulso próprio, mas, de vez em quando, um problema sem solução clara ergue sua feia cabeça.\n\nO de hoje é"
 ep1_flavor.2030.desc_1_monk: "[local_dispute_1.GetFirstName], um[local_dispute_1.Custom('ES_XA')] [local_dispute_1.Custom('NunMonk')] muito [local_dispute_1.GetFaith.GetAdjective] de [local_county_1.GetNameNoTier],"
 ep1_flavor.2030.desc_1_bishop: "[local_dispute_1.GetFirstName], o [local_dispute_1.GetTitleAsNameNoTooltip] [local_dispute_1.GetFaith.GetAdjective] de [local_dispute_1.GetPrimaryTitle.GetNameNoTier],"
 ep1_flavor.2030.desc_1_baron: "[local_dispute_1.GetFirstName], o [local_dispute_1.GetTitleAsNameNoTooltip] de [local_dispute_1.GetPrimaryTitle.GetNameNoTier],"
 ep1_flavor.2030.desc_1_scholar: "[local_dispute_1.GetFirstName], um[local_dispute_1.Custom('ES_XA')] eminente s?bi[local_dispute_1.Custom('ES_OA')] de [local_county_1.GetNameNoTier],"
 ep1_flavor.2030.desc_1_culture: "[local_dispute_1.GetFirstName], um[local_dispute_1.Custom('ES_XA')] líder da minoria [local_dispute_1.GetCulture.GetName] de [local_county_1.GetNameNoTier],"
 ep1_flavor.2030.desc_1_faith: "[local_dispute_1.GetFirstName], figura de proa da população [local_dispute_1.GetFaith.GetAdjective] de [local_county_1.GetNameNoTier],"
 ep1_flavor.2030.desc_1_judge: "[local_dispute_1.GetFirstName], um[local_dispute_1.Custom('ES_XA')] célebre mediador[local_dispute_1.Custom('ES_XA')] de [local_county_1.GetNameNoTier],"
 ep1_flavor.2030.desc_1_captain: "[local_dispute_1.GetFirstName], um[local_dispute_1.Custom('ES_XA')] comandante da guarnição local de [local_county_1.GetNameNoTier],"
 ep1_flavor.2030.desc_1_merchant: "[local_dispute_1.GetFirstName], um[local_dispute_1.Custom('ES_XA')] comerciante de destaque[local_dispute_1.Custom('ES_OA')] de [local_county_1.GetNameNoTier],"
 ep1_flavor.2030.desc_bridge: "e"
 ep1_flavor.2030.desc_2_monk: "[local_dispute_2.GetFirstName], um[local_dispute_2.Custom('ES_XA')] [local_dispute_2.Custom('NunMonk')] de fé [local_dispute_2.GetFaith.GetAdjectiveNoTooltip] muito célebre de [local_county_2.GetNameNoTier],"
 ep1_flavor.2030.desc_2_bishop: "[local_dispute_2.GetFirstName], [local_dispute_2.Custom('ES_ElLa')] [local_dispute_2.GetTitleAsNameNoTooltip] da fé [local_dispute_2.GetFaith.GetAdjective] de [local_dispute_2.GetPrimaryTitle.GetNameNoTier],"
 ep1_flavor.2030.desc_2_baron: "[local_dispute_2.GetFirstName], [local_dispute_2.GetTitleAsNameNoTooltip] de [local_dispute_2.GetPrimaryTitle.GetNameNoTier],"
 ep1_flavor.2030.desc_2_scholar: "[local_dispute_2.GetFirstName], um[local_dispute_2.Custom('ES_XA')] [local_dispute_2.GetWomanMan] de letras em [local_county_1.GetNameNoTier],"
 ep1_flavor.2030.desc_2_culture: "[local_dispute_2.GetFirstName], um[local_dispute_2.Custom('ES_XA')] porta-voz da minoria [local_dispute_1.GetCulture.GetName] de [local_county_1.GetNameNoTier],"
 ep1_flavor.2030.desc_2_faith: "[local_dispute_2.GetFirstName], um[local_dispute_2.Custom('ES_XA')] representante da minoria [local_dispute_2.GetFaith.GetAdjective] de [local_county_2.GetNameNoTier],"
 ep1_flavor.2030.desc_2_judge: "[local_dispute_2.GetFirstName], um[local_dispute_2.Custom('ES_XA')] eminente [local_county_2.GetTierAsNameNoTooltip|l] e juiz de [local_county_2.GetNameNoTier],"
 ep1_flavor.2030.desc_2_captain: "[local_dispute_2.GetFirstName], um[local_dispute_2.Custom('ES_XA')] oficial de justiça bem conhecid[local_dispute_2.Custom('ES_OA')] de [local_county_2.GetNameNoTier],"
 ep1_flavor.2030.desc_2_merchant: "[local_dispute_2.GetFirstName], um[local_dispute_2.Custom('ES_XA')] comerciante destacad[local_dispute_2.Custom('ES_OA')] assentad[local_dispute_2.Custom('ES_OA')] em [local_county_2.GetNameNoTier],"
 ep1_flavor.2030.desc_outro: "que têm se desentendido.\n\nMinha mente gira com detalhes mesquinhos, e logo fica claro que nenhuma das partes está certa, e somente uma sairá satisfeita daqui..."
 ep1_flavor.2030.a: "\"Eu decido em favor de [local_dispute_1.GetTitledFirstNameNoTooltip|l].\""
 ep1_flavor.2030.b: "\"[local_dispute_2.GetTitledFirstNameNoTooltip|l] está certo.\""
 ep1_flavor.2030.c: ""[local_dispute_1.Custom('GetLocalRole')|U], eu poderia me virar com alguém como você"."
 ep1_flavor.2030.c.tt: "[local_dispute_1.GetFirstNameNoTooltip] junta-se à sua corte"
 ep1_flavor.2030.d: "\"Venha trabalhar para mim, [local_dispute_2.Custom('GetLocalRole')|l].\""
 ep1_flavor.2030.d.tt: "[local_dispute_2.GetFirstNameNoTooltip] junta-se à sua corte"
