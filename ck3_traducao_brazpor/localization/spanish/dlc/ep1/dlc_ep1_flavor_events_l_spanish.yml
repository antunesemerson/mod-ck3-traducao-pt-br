l_spanish:
 tradition_header: "Tradições:"
 ep1_flavor.1000.t: "$tradition_header$ Um Eunuco Visitante"
 ep1_flavor.1000.desc: "Um[eunuch_target.Custom('ES_XA')] eunuc[eunuch_target.Custom('ES_OA')] itinerante se apresenta hoje em minha corte.\n\n"Saudações, ó grande [ROOT.Char.Custom('ComplimentAdjective')] [ROOT.Char.GetTitleTierName]", diz respeitosamente.\n\n"Meu nome é [eunuch_target.GetFirstName], andarilho de renome: emprestei meu conhecimento a nobres reis eruditos, servi nos haréns de grandes sultões e agora estou aqui, oferecendo meus serviços… por uma módica quantia".\n\nUma figura intrigante, talvez eu devesse empreg[eunuch_target.Custom('ES_LoLa')]?"
 ep1_flavor.1000.a: "Uma oferta justa, eu aceito."
 ep1_flavor.1000.b: "[eunuch_target.GetFirstNameNoTooltip], meu amig[eunuch_target.Custom('ES_OA')] [eunuch_target.Custom('ComplimentAdjective')], ficaria mais um pouco?"
 ep1_flavor.1000.c: "Não preciso de seus serviços."
 eunuch_moves_tt: "[eunuch_target.GetFirstNameNoTooltip] segue para a [new_court.GetBaseName]"
 ep1_flavor.1000.c.success: "Você convence [eunuch_target.GetFirstNameNoTooltip] a ficar"
 ep1_flavor.1000.c.failure: "[eunuch_target.GetFirstNameNoTooltip] te llama tacañ[ROOT.Char.Custom('ES_OA')] y sigue su camino"
 ep1_flavor.1200.t: "$tradition_header$ Truques do Ofício"
 ep1_flavor.1200.desc: "Um eunuco[eunuch_target.Custom('ES_OA')] se coloca diante de mim, [eunuch_target.Custom('quirk_pos_pp')].\n\n\"Vós sabeis muitas coisas, grande [ROOT.Char.GetTitleTierName]. Mas há coisas que escapam até mesmo à vossa mente inefável — segredos e conhecimentos que estou mais que dispost[eunuch_target.Custom('ES_OA')] a compartilhar convosco\", sussurra.\n\n\"Por um preço\".\n\nÉ claro. Ainda assim, isso me intriga."
 ep1_flavor.1200.a: "Ouvi dizer que você conhece o segredo da língua?"
 ep1_flavor.1200.b: "Tenho muitos inimigos. Como posso derrotá-los?"
 ep1_flavor.1200.c: "Meu reino deve prosperar, como posso garantir que isso aconteça?"
 ep1_flavor.1200.d: "Charlatão[eunuch_target.Custom('ES_OA')]! Seus segredos não passam de pura fantasia."
 secrets_of_language_modifier: "Segredos da Língua"
 secrets_of_language_modifier_desc: "Este personagem foi iniciado em segredos relacionados ao aprendizado da língua."
 secrets_of_murder_modifier: "Segredos da Vingança"
 secrets_of_murder_modifier_desc: "Este personagem foi iniciado em segredos relacionados à derrota dos inimigos."
 secrets_of_the_realm_modifier: "Segredos do Reino"
 secrets_of_the_realm_modifier_desc: "Este personagem teve acesso a segredos relacionados à gestão de seu capital."
 ### Court Type Flavor Events
 #The Secret DaughterSon
 ep1_flavor.0001.t: "[scion_actual.Custom('GetDaughterSon')|U] secreto[scion_actual.Custom('ES_OA')]"
 ep1_flavor.0001.desc: "Un pequeño asunto de negocios en la ciudad nos lleva a mi séquito y a mí, sedientos y hambrientos, a la pequeña taberna llena de humo.\n\nDe toda la gente del mundo, a quien menos esperaba encontrar era [scion_parent.Custom('ES_AlAla')] [scion_parent.GetTitledFirstName|l] sentad[scion_parent.Custom('ES_OA')] al fondo, mal disfrazad[scion_parent.Custom('ES_OA')] con capa y capucha. Junto a [scion_parent.Custom('ES_ElElla')] se sienta un[scion_actual.Custom('ES_XA')] joven que… ¡no puede ser!\n\nPor su rostro, la forma en que revisa el salón con asombro, y cómo imita los gestos distintivos de [scion_parent.GetFirstNameNoTooltip], estoy #EMP convencid[ROOT.Char.Custom('ES_OA')]#! de que debe de ser un[scion_actual.Custom('ES_XA')] bastard[scion_actual.Custom('ES_OA')] secret[scion_actual.Custom('ES_OA')] [scion_parent.Custom('ES_DelDela')] [scion_parent.GetTitleAsNameNoTooltip], que tal vez ve el mundo exterior por primera vez."
 ep1_flavor.0001.a: "[scion_parent.GetFirstNameNoTooltip]! Você me trouxe um[scion_actual.Custom('ES_XA')] [scion_actual.Custom('GetBrideGroom')]?"
 ep1_flavor.0001.a.tt.success: "Negocia à força uma [alliance|lE] [Concept( 'marriage', 'matrimonial' )|E]"
 ep1_flavor.0001.a.tt.failure: "[scion_parent.GetFirstNameNoTooltip] escapa com seu/sua [scion_actual.Custom('GetDaughterSon')]"
 ep1_flavor.0001.b: "[scion_parent.GetFirstNameNoTooltip]! Você trouxe um[prospective_spouse.Custom('ES_XA')] [scion_actual.Custom('GetBrideGroom')] para o meu [ROOT.Char.Custom2('RelationToMeShort',SCOPE.sC('prospective_spouse'))]?"
 ep1_flavor.0001.c: "Tragam o pregoeiro da cidade, #EMP imediatamente#!"
 ep1_flavor.0001.c.tt.success: "Você encontra provas suficientes para demonstrar a existência de [scion_actual.Custom('ES_DelDela')] bastardo[scion_actual.Custom('ES_OA')]"
 ep1_flavor.0001.c.tt.failure: "[scion_parent.GetFirstNameNoTooltip] cobre seus rastros muito bem"
 ep1_flavor.0001.d: "Não se preocupe, [scion_parent.GetTitleAsNameNoTooltip] meu[scion_parent.Custom('ES_OA')], pode confiar em mim para esquecer que o vi..."
 ep1_flavor.0001.tt.scion_escapes: "[scion_actual.GetFirstName] é escondid[scion_actual.Custom('ES_OA')] e nunca mais se tem notícias de [scion_actual.Custom('ES_ElElla')]"
 ep1_flavor.0001.e.no_bastards: "Uma criança #EMP secreta#!? Que estranho. Vamos comer em outro lugar."
 ep1_flavor.0001.e.fallback: "Isso não é da nossa conta. Vamos comer em outro lugar."
 ep1_flavor.0011.t: "Uma Bagunça Total"
 ep1_flavor.0011.desc: "«¡[ROOT.Char.Custom('FormOfAddressForLiege')|U], esto no es lo que parece!», grita [diplomat_1.Custom('ES_ElLa')] [diplomat_1.GetTitledFirstName|l] cuando entro en mi comedor favorito.\n\nLo que #EMP parece#! es que [diplomat_1.GetSheHe] ha destrozado totalmente la sala. Las paredes cubiertas de comida, las mesas, todas destrozadas, alguien ha amontonado las sillas en forma de pirámide y un[diplomat_2.Custom('ES_XA')] [diplomat_2.GetTitledFirstName|l] en coma (totalmente desnud[diplomat_2.Custom('ES_OA')]) está tumbad[diplomat_2.Custom('ES_OA')] boca arriba y embadurnad[diplomat_2.Custom('ES_OA')] de sopa en una de #EMP mis#! camas.\n\nSon dos diplomáticos que llegaron ayer. Les di permiso para una buena comida y una diversión ligera, no una fiesta propia de [ROOT.Char.GetFaith.NegativeAfterLife|U]."
 ep1_flavor.0011.a: "Vocês vão pagar por esses danos, seus malditos lambe-botas!"
 ep1_flavor.0011.b: "Tudo bem, vocês destruíram, vocês podem limpar. SERVOS! Uma vassoura!"
 ep1_flavor.0011.c: "Oh, não, essa festa ainda não acabou: alguém encha meu cálice!"
 ep1_flavor.0011.d: "Uma noite? Patético! Sai da frente [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetTitleAsNameNoTooltip] da festa!"
 ep1_flavor.0011.e: "Sair da sala sem dizer nada."
 ep1_flavor.0011.e.tt: "Você os deixa ambos a remoer em seu próprio medo."
 ep1_flavor.0021.t: "Dois Reinos Separados por uma Linguagem Cortesã"
 ep1_flavor.0021.desc: "Risadinhas me recebem ao entrar na câmara: uma turma de cortesãos, liderada por [nitpicker.Custom('ES_ElLa')] [nitpicker.GetTitledFirstName|l], se aglomera em torno de uma carta recente [rival_monarch.Custom('ES_DelDela')] [rival_monarch.GetTitledFirstName|l].\n\n[nitpicker.GetFirstNameNoTooltip] me chama com uma gargalhada.\n\n\"[ROOT.Char.Custom('FormOfAddressForLiege')|U] , #EMP tenéis#! que ler isto! Ela traz o selo oficial de [rival_realm.GetNameNoTier] , mas todas as outras palavras parecem ter sido escritas por um camponês analfabeto. Esses preguiçosos desmiolados nem sabem usar as consoantes corretas, muito menos falar bem [ROOT.Char.GetCourtLanguage.GetName] , e é #EMP desternillante#!.\""
 ep1_flavor.0021.a: "Esta missiva está faltando metade das vogais! Nojento!"
 ep1_flavor.0021.a.tt: "Ambos os [courts|lE] perdem [SCOPE.ScriptValue('ep1_flavour_0021_courts_lose_opinion_value')|N0] [opinion|lE] um do outro"
 ep1_flavor.0021.a.tt.success: "A grafia de [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip] é a melhor!"
 ep1_flavor.0021.a.tt.failure: "A grafia de [rival_monarch.GetPrimaryTitle.GetNameNoTooltip] é a melhor!"
 ep1_flavor.0021.b: "Eles não são nossos primos linguísticos?"
 ep1_flavor.0021.b.tt: "Ambas as [courts|lE] ganham [SCOPE.ScriptValue('ep1_flavour_0021_courts_gain_opinion_value')|P0] de [opinion|lE] uma da outra"
 ep1_flavor.0021.c: "Duas cortes nobres e nem um cérebro inútil entre elas..."
 ep1_flavor.0021.c.tt: "$ep1_flavor.0021.a.tt$"
 cultural_acceptance_courtly_spelling_differences: "Nobreza brigando por ortografia"
 cultural_acceptance_courtly_cousins: "Nobres se unem por uma língua cortês compartilhada"
 ep1_flavor.0031.t: "Novidade na Corte"
 ep1_flavor.0031.desc: "Se dice que las grandes mentes requieren grandes tradiciones, ¡y no hay mayores tradiciones de iniciación escolar que las de [ROOT.Char.GetPrimaryTitle.GetNameNoTier]!\n\nEsta semana se incorporan a la corte varios nuevos eruditos de gran talento, procedentes de todo el señorío, cada uno de los cuales está siendo sometido a diversas pruebas #EMP académicas#! en una posada local.\n\nPoso la mirada en [scholar_1.GetFirstName], que mira con desconfianza la misteriosa bebida espumosa plantada ante [scholar_1.GetSheHe]. Detrás [scholar_1.Custom('ES_DelDela')] cautelos[scholar_1.Custom('ES_OA')] erudit[scholar_1.Custom('ES_OA')], [scholar_2.GetFirstName] está llenando hasta arriba una #EMP jarra#! entera de algo espeso y viscoso, ante muchos vítores y abucheos de sus compañeros académicos."
 ep1_flavor.0031.a: "Bebe tudo, [scholar_1.GetFirstNameNoTooltip]!"
 ep1_flavor.0031.b: "Adoramos beber com [scholar_2.GetFirstNameNoTooltip], porque [scholar_2.GetFirstNameNoTooltip] é um[scholar_2.Custom('ES_XA')] camarada!"
 ep1_flavor.0031.c: "Existem algumas técnicas que apenas a experiência pode ensinar..."
 ep1_flavor.0031.c.tt: "Você mostra aos novos estudiosos como é feito"
 ep1_flavor.0031.d: "Estos rituales son #EMP impropios#! de unos eruditos."
 ep1_flavor.0031.inspire.scholar_1.tt: "[scholar_1.GetFirstNameNoTooltip] torna-se [Concept( 'inspired', 'inspirad' )|E][scholar_1.Custom('ES_OA')]"
 ep1_flavor.0031.inspire.scholar_2.tt: "[scholar_2.GetFirstNameNoTooltip] torna-se [Concept( 'inspired', 'inspirad' )|E][scholar_2.Custom('ES_OA')]"
 #Martial Exercise
 ep1_flavor.2000.t: "Exercício Marcial"
 ep1_flavor.2000.desc_intro: "Ao inspecionar um acampamento militar local, fica claro que [marshal_scope.Custom('ES_ElLa')] [marshal_scope.GetTitledFirstName|l] e também [knight_scope.Custom('ES_ElLa')] [knight_scope.GetTitledFirstName|l] tentam me encurralar. \n\n"Suserano[ROOT.Char.Custom('ES_XA')], quando reina a paz, os homens ficam ociosos. Algumas atividades os manteriam ocupados…", meu [marshal_scope.GetCouncilTitle|l]."
 ep1_flavor.2000.desc_archers: "\"Os [ROOT.Char.Custom('GetRegionalArcherMAA')|l] são indispensáveis, devemos garantir que suas flechas sempre acertem o alvo.\""
 ep1_flavor.2000.desc_infantry: "\"Nossa [ROOT.Char.Custom('GetRegionalInfantryMAA')|l] é vital para a vitória, não podemos permitir que eles fiquem fracos.\""
 ep1_flavor.2000.desc_cavalry: "\"Sua [ROOT.Char.Custom('GetRegionalCavalryMAA')|l] é seu ativo mais valioso, não os deixe se tornarem desleixados.\""
 ep1_flavor.2000.desc_archer_cavalry: "\"Os arqueiros montados são nossa espinha dorsal; competições de tiro com arco a cavalo os manterão formidáveis.\""
 ep1_flavor.2000.desc_skirmishers: "\"Nossos talentosos [ROOT.Char.Custom('GetRegionalSkirmisherMAA')|l] devem competir, para que sempre acertem seu alvo.\""
 ep1_flavor.2000.desc_elephant_cavalry: "\"Os temíveis elefantes nos garantem a vitória; eles devem estar prontos a todo momento.\""
 ep1_flavor.2000.desc_camel_cavalry: "\"Os vitalizantes cavaleiros de camelo são o núcleo de sua força, você deve se concentrar neles.\""
 ep1_flavor.2000.desc_levies: "\"As massas pobres precisam de atividade para que estejam em forma e úteis quando convocadas.\""
 ep1_flavor.2000.desc_bridge: "\n\n\"Não, os esforços são necessários em outro lugar.\" Interrompe [knight_scope.GetFirstNameNoTooltip],"
 ep1_flavor.2000.desc_outro: "\n\nSupongo que la práctica #EMP sí#! que lleva a la perfección…"
 ep1_flavor.2000.c: "\"O esporte é para a nobreza, e é chamado de caça.\""
 ep1_flavor.2000.culture_tt: "Cada cortesão e vassalo [THIS.Char.GetCulture.GetName]"
 ep1_flavor.2000.knight_tt: "Cada [THIS.Char.Custom('MountedWarriorTerm')]"
 ep1_flavor.2000.d: "\"Eu já gasto o suficiente com os soldados como está.\""
 ep1_flavor.2000.archers: "\"Treine até que todos possam acertar o alvo.\""
 ep1_flavor.2000.archers_longbow: "\"Homem e menino treinarão arco longo nos alvos.\""
 ep1_flavor.2000.infantry: "\"A [ROOT.Char.Custom('GetRegionalInfantryMAA')|l] adora uma boa briga.\""
 ep1_flavor.2000.cavalry: "\"Peguem as estacas! Os [ROOT.Char.Custom('GetRegionalCavalryMAA')|l] vão cavalgar!"
 ep1_flavor.2000.cavalry_joust: "\"Tilting requer boa técnica.\""
 ep1_flavor.2000.cavalry_tzykanion: "\"Os cavaleiros jogarão tyzkanion!\""
 ep1_flavor.2000.cavalry_chovgan: "\"Deixem-nos jogar chovgan!\""
 ep1_flavor.2000.archer_cavalry: "\"Os senhores dos cavalos treinarão com coelhos correndo.\""
 ep1_flavor.2000.skirmishers: "\"Meus [ROOT.Char.Custom('GetRegionalInfantryMAA')|l] nunca erram.\""
 ep1_flavor.2000.elephant_cavalry: "\"Os mahoots competirão pela glória!\""
 ep1_flavor.2000.camel_cavalry: "As corridas aprimorarão as habilidades do cavaleiro de camelo."
 ep1_flavor.2000.levies_caid: ""Que todo mundo chute o caid!""
 ep1_flavor.2000.levies: "\"Encoraje os camponeses a permanecerem ágeis.\""
