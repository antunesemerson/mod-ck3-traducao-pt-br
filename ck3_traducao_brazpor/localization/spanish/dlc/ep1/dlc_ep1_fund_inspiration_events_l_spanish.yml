 #Weapon
 fund_inspiration.0011.desc: "[inspiration_owner.GetTitledFirstName] [ROOT.Char.Custom2('QuirkPresentPosOrNeg', SCOPE.sC('inspiration_owner'))] antes de se curvar profundamente. 'É uma honra e um privilégio forjar uma arma para você', [inspiration_owner.GetSheHe] fala de maneira digna, mas há um brilho de excitação nos seus olhos que denuncia a sua seriedade.\n\n 'Diga-me, qual é a sua forma preferida de lutar com uma arma? Quero forjar algo que se adapte melhor a você.'"
 fund_inspiration.0011.a: "Algo que possa cortar e perfurar carne."
 fund_inspiration.0011.b: "Quero uma arma que faça pleno uso da minha força!"
 fund_inspiration.0011.c: "Prefiro manter meus inimigos à distância."
 fund_inspiration.0011.d: "Esqueça a forja, eu quero atirar."
 fund_inspiration.0011.d.tt: "Em vez disso, [inspiration_owner.Custom('ES_ElLa')] [inspiration_owner.GetTitledFirstName] fará um arco"
 fund_inspiration.0011.tooltip_action: "[inspiration_owner.GetFirstNameNoTooltip] começa a trabalhar em"
 fund_inspiration.0011.tooltip_axe: "$fund_inspiration.0011.tooltip_action$ um $signature_weapon_axe$"
 fund_inspiration.0011.tooltip_axe.tt: "Ao final da [inspiration|lE] você ganha um $signature_weapon_axe$"
