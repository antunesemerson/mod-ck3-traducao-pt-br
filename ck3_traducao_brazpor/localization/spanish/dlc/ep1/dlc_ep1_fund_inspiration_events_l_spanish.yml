 fund_inspiration.0011.tooltip_dagger.tt: "Ao final da [inspiration|lE] você ganha uma $signature_weapon_dagger$"
 fund_inspiration.0011.tooltip_hammer: "$fund_inspiration.0011.tooltip_action$ um $signature_weapon_hammer$"
 fund_inspiration.0011.tooltip_hammer.tt: "Ao final da [inspiration|lE] você ganha um $signature_weapon_hammer$"
 fund_inspiration.0011.tooltip_mace: "$fund_inspiration.0011.tooltip_action$ um $signature_weapon_mace$"
 fund_inspiration.0011.tooltip_mace.tt: "Ao final da [inspiration|lE] ganha uma $signature_weapon_mace$"
