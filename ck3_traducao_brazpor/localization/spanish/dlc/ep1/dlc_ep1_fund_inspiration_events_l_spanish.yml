 fund_inspiration.0011.tooltip_sword.tt: "Ao final da [inspiration|lE] você recebe uma $signature_weapon_sword$"
 fund_inspiration.0012.t: "Fundo de Inspiração para Armas"
 #Armor
 fund_inspiration.0021.desc: "“Não lamentareis vosso apoio, [ROOT.Char.Custom('FormOfAddressForLiege')]!”.\n\n[inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me assegura que criará uma obra-prima, mas também que valoriza minha contribuição. “Por favor, dizei-me, que tipo de armadura desejais?”."
 fund_inspiration.0021.mail: "Eu quero uma cota de malha flexível."
 fund_inspiration.0021.mail.tt: "Não muito chamativa, mas confiável"
 fund_inspiration.0021.plate: "Uma armadura completa de placas irá me manter segur@!"
 fund_inspiration.0021.plate.tt: "Ótima proteção e estilo, mas muito pesada e cara"
 fund_inspiration.0021.scale: "Uma armadura de escamas confiável é o que eu preciso."
 fund_inspiration.0021.scale.tt: "Oferece boa proteção, mas é um pouco menos flexível que algumas alternativas"
 fund_inspiration.0021.lamellar: "Você irá criar uma armadura lamelar resistente."
 fund_inspiration.0021.lamellar.tt: "Uma armadura flexível que oferece excelente proteção a um ótimo preço"
 fund_inspiration.0021.laminar: "Faça uma armadura laminar."
 fund_inspiration.0021.laminar.tt: "Uma armadura robusta e confiável"
 fund_inspiration.0021.brigandine: "Eu quero uma armadura segmentada."
 fund_inspiration.0021.brigandine.tt: "Uma armadura muito flexível e elegante"
 fund_inspiration.0022.t: "Fundo de Inspiração para Armaduras"
 #Book
 fund_inspiration.0031.desc: "\"Obrigado por acreditar em mim, [ROOT.Char.Custom('FormOfAddressForLiege')]!\". [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] sorri [ROOT.Char.Custom2('QuirkAdverbPosOrNeg', inspiration_owner)] antes de inclinar a cabeça.\n\n\"No entanto, não sei sobre o que escrever. Recentemente, tenho me interessado por temas relacionados a [SCOPE.Custom('ArtifactBookSubject')], você acha que seria um bom foco para o livro?\"."
 fund_inspiration.0031.education: "O livro será sobre [ROOT.Char.Custom('education_focus')]."
 fund_inspiration.0031.lifestyle_reveler: "Vamos escrever sobre alegria, sobre a #EMP vida#!, sobre banquetes!"
 fund_inspiration.0031.lifestyle_blademaster: "Nenhum tema é tão afiado quanto aquele que envolve lâminas!"
 fund_inspiration.0031.lifestyle_hunter: "Que seja sobre os detalhes da caça e do jogo!"
 fund_inspiration.0031.lifestyle_mystic: "Os livros explorarão minha abordagem não convencional da vida!"
 fund_inspiration.0031.lifestyle_herbalist: "O livro detalhará ervas e plantas!"
 fund_inspiration.0031.lifestyle_physician: "O corpo humano é um assunto que vale a pena investigar!"
 fund_inspiration.0031.lifestyle_cannibal: "Nada desperta minha #EMP fome#! de exploração como o corpo humano."
 fund_inspiration.0031.lifestyle_torturer: "Vamos documentar as muitas maneiras de quebrar a mente e o corpo de alguém."
 fund_inspiration.0031.lifestyle_witch: "Dedicarei o trabalho a [ROOT.Char.GetFaith.WitchGodName]."
 fund_inspiration.0031.lifestyle_deviant: "O livro deve se aprofundar no #EMP prazer#!!"
 fund_inspiration.0031.lifestyle_lunatic: "O livro explicará a realidade. Uma delas."
 fund_inspiration.0031.focus: "Ele refletirá meu foco na vida - escreva sobre [ROOT.Char.Custom('LifestyleFocus')]!"
 fund_inspiration.0031.skill_option: "Escrever sobre algo em que tenho talento…"
 fund_inspiration.0031.skill_option_martial: "$fund_inspiration.0031.skill_option$guerra."
 fund_inspiration.0031.skill_option_diplomacy: "$fund_inspiration.0031.skill_option$diplomacia."
 fund_inspiration.0031.skill_option_stewardship: "$fund_inspiration.0031.skill_option$mordomia."
 fund_inspiration.0031.skill_option_learning: "$fund_inspiration.0031.skill_option$assuntos acadêmicos."
 fund_inspiration.0031.skill_option_intrigue: "$fund_inspiration.0031.skill_option$intriga."
 fund_inspiration.0031.relationship_soulmate: "Meu amor por [relationship_scope.GetTitledFirstName|l] é lendário!"
 fund_inspiration.0031.relationship_nemesis: "Meu ódio por [relationship_scope.GetTitledFirstName|l] poderia encher muitos tomos!"
 fund_inspiration.0031.dynasty: "Você escreverá sobre a gloriosa dinastia [ROOT.Char.GetDynasty.GetName]."
 fund_inspiration.0031.mystical_animal: "Falarei novamente sobre minha caçada ao branco exemplar de [ROOT.Char.Custom('GetAnimalType')|l]."
 fund_inspiration.0031.pet_option_cat: "Por favor, escreva sobre meu amado gato, [ROOT.Char.Custom('CatStoryName')]!"
 fund_inspiration.0031.pet_option_dog: "Por favor, escreva sobre meu amado cachorro, [ROOT.Char.Custom('DogStoryName')]!"
 fund_inspiration.0031.c: "Detalha meus esforços para unir meu [united_title.GetNameNoTierNoTooltip]!"
 fund_inspiration.0031.d: "Criei [created_title.GetNameNoTierNoTooltip], isso sim é um assunto digno!"
 fund_inspiration.0031.e: "Meu sucesso ao restaurar [restored_title.GetNameNoTierNoTooltip]!"
 fund_inspiration.0031.f: "Confio no seu julgamento."
 fund_inspiration.0032.t: "Livro Inspiração Financiado"
 #Tapestry
 fund_inspiration.0041.desc: ""Obrigado por depositar sua confiança em mim, [ROOT.Char.Custom('FormOfAddressForLiege')]!". [inspiration_owner.Custom('ES_ElLa')|U] [inspiration_owner.GetTitledFirstName|l] sorri e continua: "Você não se engana ao confiar em mim, pois pratiquei minhas técnicas por anos e teci alguns tapetes e cortinas realmente maravilhosos".\n\n"No entanto, para você, creio que o melhor seria uma tapeçaria; uma bem tecida pode realmente atrair a atenção de uma sala e dizer algo sobre seu dono. A única questão é: o que a tapeçaria deve mostrar?"."
 fund_inspiration.0041.option_battle: "Um tributo à minha vitória na Batalha de [ROOT.Var('epic_battle_location').Province.GetNameNoTooltip]."
 fund_inspiration.0041.option_abstract: "Uma obra de beleza artística abstrata."
 fund_inspiration.0041.option_nature: "Algo que mostre a beleza selvagem da natureza."
 fund_inspiration.0041.option_history: "Algo que ilustre a história de [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip]."
 fund_inspiration.0041.option_life: "Uma representação do que é a vida em meu reino."
 #fund_inspiration.0042.desc: ""Thank you for putting your trust in me, [ROOT.Char.Custom('FormOfAddressForLiege')]! [inspiration_owner.GetTitledFirstName] smiles and continues "The idea I have for [inspiration_owner.Custom('InspirationTypeDescription')] is glorious indeed, and is sure to impress all of your courtiers and foreign guests!"\n\n"As soon as I am done, I shall send word to you so that you may be the first to gaze upon my work."
 fund_inspiration.0042.t: "Financiado Inspiração Tecelão"
 #Adventurer
 fund_inspiration.0051.desc: ""Não vos preocupeis, meu grande [ROOT.Char.GetTitleTierName]", [inspiration_owner.Custom('ES_ElLa')] [inspiration_owner.GetTitledFirstName|l] se inclina com um gesto dramático e [ROOT.Char.Custom2('QuirkPresentPosOrNeg', SCOPE.sC('inspiration_owner'))].\n\n"Ousarei explorar o mundo em vosso nome enquanto vós continuais governando vosso domínio. O que eu trouxer de volta será de tal calibre que sentireis minhas conquistas #EMP impregnados#! no legado da minha aventura!".\n\nFaz uma breve pausa antes de continuar. "Nesse sentido, há alguma região do mundo em que esteja interessad[ROOT.Char.Custom('ES_OA')], [ROOT.Char.Custom('FormOfAddressForLiege')]?"."
 fund_inspiration.0051.africa: "Viaje para a África!"
 fund_inspiration.0051.africa_west: "Quero que você explore a África Ocidental!"
 fund_inspiration.0051.africa_north: "Explore as partes norte da África!"
 fund_inspiration.0051.africa_east: "Explore o Leste da África em meu nome!"
 fund_inspiration.0051.europe: "Vá para a Europa!"
 fund_inspiration.0051.europe_north: "Viaje para o norte da Europa!"
 fund_inspiration.0051.europe_south: "Veja o que o sul da Europa tem a oferecer!"
 fund_inspiration.0051.europe_west: "Jornada para a Europa Ocidental!"
 fund_inspiration.0051.europe_east: "Explore a Europa Oriental!"
 fund_inspiration.0051.middle_east: "Jornada para o Oriente Médio!"
 fund_inspiration.0051.middle_east_jerusalem: "Eu quero que você vá para Jerusalém!"
 fund_inspiration.0051.middle_east_arabia: "Eu quero que você viaje para o Leste da Arábia!"
 fund_inspiration.0051.middle_east_persia: "A Pérsia é um destino que vale a pena!"
 fund_inspiration.0051.india: "A Índia sempre me fascinou!"
 fund_inspiration.0051.india_deccan: "Você deve visitar o planalto Deccan na Índia!"
 fund_inspiration.0051.india_bengal: "Você deve explorar Bengala!"
 fund_inspiration.0051.india_rajastan: "Por favor, vá para Rajasthan e experimente suas maravilhas!"
 fund_inspiration.0051.steppe: "Você vai explorar as grandes estepes!"
 fund_inspiration.0051.steppe_west: "Viaje para as estepes ocidentais!"
 fund_inspiration.0051.steppe_east: "Jornada para as estepes orientais!"
 fund_inspiration.0051.steppe_tarim: "Você deve explorar a Bacia de Tarim!"
 fund_inspiration.0051.asia_minor: "Jornada para a península da Ásia Menor!"
 fund_inspiration.0051.burma: "Para as selvas de Burma!"
 fund_inspiration.0051.tibet: "Vá para o Tibet, o telhado do mundo!"
 fund_inspiration.0051.east_asia: "Você deve explorar o Leste Asiático"
 fund_inspiration.0051.china: "O Reino do Meio nos chama!"
 fund_inspiration.0051.korea: "A península da Coreia"
 fund_inspiration.0051.japan: "Vá para as Terras do Sol Nascente"
 fund_inspiration.0051.southeast_asia: "Indochina promete riquezas"
 fund_inspiration.0051.d: "O mundo é seu, amig[inspiration_owner.Custom('ES_OA')] me[inspiration_owner.Custom('ES_OA')]!"
 fund_inspiration.0052.t: "Fundo de Inspiração para Aventura Concedido"
 activity_adventure: "Aventura"
 #Artisan
 fund_inspiration.0061.desc: ""Obrigado por financiar este empreendimento meu, [ROOT.Char.Custom('FormOfAddressForLiege')]". [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] tenta manter a compostura, mas vejo a empolgação em seu olhar.\n\n"Caixas, esculturas, #EMP tronos#!… Há tantas coisas que eu posso fazer! Deseja algo em especial?"."
 fund_inspiration.0061.chest: "Um baú magnífico para guardar coisas."
 fund_inspiration.0061.box: "Uma caixa elegante para guardar joias ou tesouros."
 fund_inspiration.0061.sculpture: "Eu quero uma estátua esplêndida!"
 fund_inspiration.0061.cabinet: "Faça um armário, bonito mas prático."
 fund_inspiration.0061.diwan: "Um diwan bonito e confortável."
 fund_inspiration.0061.table: "Eu gostaria de uma mesa elegante, mas também resistente!"
 fund_inspiration.0061.throne: "Crie um grande trono digno dos meus salões!"
 fund_inspiration.0061.scientific_apparatus: "Talvez um instrumento de aprendizado e conhecimento?"
 fund_inspiration.0061.urn: "Uma urna decorativa completaria meus salões."
 fund_inspiration.0061.icon: "Um ícone glorioso adornará minha parede."
 fund_inspiration.0062.t: "Fundado o Fundo de Inspiração do Artista"
 #(Metal)Smith
 fund_inspiration.0071.desc: ""Obrigado por financiar este meu empreendimento, [ROOT.Char.Custom('FormOfAddressForLiege')]!"

[inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] tenta manter a compostura, mas vejo a empolgação em seus olhos enquanto continua. "Posso fazer #EMP maravilhas#! com o metal. Deseja alguma coisa em especial?"."

[inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] tenta manter a compostura, mas vejo a empolgação em seus olhos enquanto continua. "Faça uma insígnia adequada à minha posição."
 fund_inspiration.0071.brooch: "Uma coroa régia, digna de repousar sobre minha cabeça!"
 fund_inspiration.0071.regalia: "Um cálice requintado."
 fund_inspiration.0071.crown: "Um aquamanil ornamental, para purificação ritual."
 fund_inspiration.0071.goblet: "Um queimador de incenso intricado."
 fund_inspiration.0071.aquamanile: "Fundo para Inspiração de Ferreiro de Metais"
 fund_inspiration.0071.incense_burner_sculpture: "Um queimador de incenso intricado."
 fund_inspiration.0072.t: ""Não vos arrependereis de me apoiar, [ROOT.Char.Custom('FormOfAddressForLiege')]!". [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se curva diante de [inspiration_owner.Custom('quirk_pos_pp')]\n\n"Dizei-me, posso conseguir frascos e enxofre? Tenho muito a estudar. Há alguma área específica que gostariam que eu começasse a investigar?"."
 #Alchemist
 fund_inspiration.0081.desc: "Metais sempre me fascinaram."
 fund_inspiration.0081.elixirs: "Um remédio para todas as doenças, uma panaceia!"
 fund_inspiration.0081.metals: "Eu quero viver para sempre."
 fund_inspiration.0081.panacea: "[inspiration_owner.GetTitledFirstNameNoTooltip|l] estudará e criará um [artifact|lE] conforme às suas instruções"
 fund_inspiration.0081.immortality: "[inspiration_owner.GetTitledFirstNameNoTooltip|l] estudará e criará um [artifact|lE] de acordo com seu próprio critério"
 fund_inspiration.0081.you_decide_option_tt: "Fundado o Fundo de Inspiração da Alquimia"
 fund_inspiration.0081.they_decide_option_tt: "[inspiration_owner.GetTitledFirstNameNoTooltip|l] estudará e criará um [artifact|lE] de acordo com seu próprio critério"
 fund_inspiration.0082.t: "[inspiration_owner.Custom('ES_ElLa')|U] [inspiration_owner.GetTitledFirstName|l] [ROOT.Char.Custom2('QuirkPresentPosOrNeg', SCOPE.sC('inspiration_owner'))] antes de fazer uma profunda reverência. "Claro que posso encordoar um arco para vós, meu [ROOT.Char.GetLadyLord]", seu entusiasmo transparece em meio aos seus esforços ansiosos para manter a formalidade.\n\n"Mas qual é o vosso estilo preferido de tiro? Desejo criar algo que se adapte melhor a vós"."
 #Bow
 fund_inspiration.0091.desc: "Entalhe para mim um poderoso arco longo."
 fund_inspiration.0091.a: "Cola e tendão golpeiam com mais força."
 fund_inspiration.0091.b: "Deveis entregar-me um belo artefato."
 fund_inspiration.0091.c: "$fund_inspiration.0011.tooltip_action$ um arco"
 fund_inspiration.0091.d: "Ao final da [inspiration|lE] você ganha um arco"
 fund_inspiration.0091.tooltip_bow: "$fund_inspiration.0011.tooltip_action$ um arco longo"
 fund_inspiration.0091.tooltip_bow.tt: "Ao final da [inspiration|lE] você ganha um arco longo"
 fund_inspiration.0091.tooltip_longbow: "$fund_inspiration.0011.tooltip_action$ um arco composto"
 fund_inspiration.0091.tooltip_longbow.tt: "No final da [inspiration|lE] você ganha um arco composto"
 fund_inspiration.0091.tooltip_composite: "$fund_inspiration.0011.tooltip_action$ uma besta"
 fund_inspiration.0091.tooltip_composite.tt: "Ao final da [inspiration|lE] você recebe uma besta"
