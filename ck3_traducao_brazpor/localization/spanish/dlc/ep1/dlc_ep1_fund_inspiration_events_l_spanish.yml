 inspiration_owner_type_alchemist: "Por aqui, [ROOT.Char.Custom('FormOfAddressForLiege')]! [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] faz sinal para dois servos que saíram de sua tecelagem carregando um rolo de tecido. \n\n[inspiration_owner.GetSheHe|U] assente. A bandeira se desdobra, sustentada por seu suporte de madeira. Não consigo deixar de me maravilhar com os detalhes refinados e as linhas impecáveis.\n\n"
 inspiration_owner_type_researcher: ""Sim, minha [ROOT.Char.GetLadyLord], vou tecer para vós um poderoso estandarte!" [inspiration_owner.GetTitledFirstName|l] está realmente empolgad[inspiration_owner.Custom('ES_OA')] de trabalhar para mim. "Os nobres do [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] conhecem bem meu trabalho, mas esta é uma nova honra!"\n\n"Confiai em mim, isto não será um simples estandarte de tecido, será o mais régio dos drapeados! Só preciso saber que brasão queres que eu costure"."
