 #INSPIRATION INVALIDATED
 fund_inspiration.9001.t: "inovação científica adicional."
 fund_inspiration.9001.desc: "[inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] já não é cortesão[inspiration_owner.Custom('ES_OA')] meu[inspiration_owner.Custom('ES_OA')], então não posso mais apoiar o sonho dele de"
 fund_inspiration.9001.desc_weapon: "[inspiration_owner.GetTitledFirstName] retorna à minha corte, não faz muito tempo que partiu."
 fund_inspiration.9001.desc_armor: "\n\nQuando [inspiration_owner.GetSheHe] volta a entrar em minha corte, se inclina para beijar o chão e meu sapato. "[ROOT.Char.Custom('FormOfAddressForLiege')|U], estarei para sempre em dívida com você por me permitir voltar à civilização... longe daquela terra lamacenta e carnívora chamada Europa"."
 fund_inspiration.9001.desc_book: "Um amontoado de terra, folhas e lama entra se arrastando em minha corte. Acho que minha hora chegou. Talvez eu não tenha rezado o suficiente. Mas, quando meus servos jogam um balde de água sobre ele, a sujeira desaparece e revela [inspiration_owner.GetTitledFirstName], de volta dos pântanos. [inspiration_owner.GetSheHe|U] imediatamente se apressa para beijar meu pé. "Eu já não aguentava mais, e fico muito feliz por estar de volta ao mundo civilizado."

E assim"
 fund_inspiration.9001.desc_weaver: "Ponha-se de pé."
 fund_inspiration.9001.desc_adventurer: "O [artifact|lE] criado pela [inspiration.GetName|l] de [artifact_quality_scope.GetShortUIName|U] será #P de alta calidad#!"
 fund_inspiration.9001.desc_artisan: "O [artifact|lE] criado pela [inspiration.GetName|l] de [artifact_quality_scope.GetShortUIName] pode ser #P de qualidade levemente superior#!"
 fund_inspiration.9001.desc_smith: "O [artifact|lE] criado pela [inspiration.GetName|l] de [artifact_quality_scope.GetShortUIName] será #N de baja calidad#!"
 fund_inspiration.9001.desc_alchemy: "O [artifact|lE] criado pela [inspiration.GetName|l] de [artifact_quality_scope.GetShortUIName] pode ser #N de qualidade ligeiramente inferior#!"
 fund_inspiration.9001.desc_research: "O conteúdo do livro [artifact|lE] provavelmente será de #P qualidade superior#!"
 fund_inspiration.9001.a: "O conteúdo do livro [artifact|lE] provavelmente será de #N qualidade inferior#!"
 fund_inspiration.9001.a_tt: "Negócios Inacabados"
 fund_inspiration.9002.desc: "[inherited_insp_owner.Custom('ES_ElLa')|U] [inherited_insp_owner.GetTitledFirstName|l], meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('inherited_insp_owner'))], pede falar em meio ao tumulto da sucessão. \n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], antes de seu falecimento, [old_ruler.Custom('ES_ElLa')] [old_ruler.GetTitledFirstNameRegnal|l] me encomendou uma obra; eu estava em pleno [inherited_insp_owner.Custom('InspirationTypeDescription')] para [old_ruler.GetSheHe]". \n\n"
 fund_inspiration.9002.desc_weapon: "\"Outros artistas também estavam trabalhando, e queremos saber se você patrocinará nossos esforços.\""
 fund_inspiration.9002.desc_armor: "\"O trabalho já começou, seria uma pena não concluí-lo...\""
 fund_inspiration.9002.desc_book: "O trabalho continuará!"
 fund_inspiration.9002.desc_weaver: "Essas distrações frívolas acabarão."
 fund_inspiration.9002.desc_adventurer: "Você patrocinará as encomendas de [old_ruler.GetTitledFirstNameRegnal]"
 fund_inspiration.9002.desc_artisan: "#X Qualquer ouro investido será perdido#!"
 fund_inspiration.9002.desc_smith: "forjar uma obra-prima."
 fund_inspiration.9002.desc_alchemy: "descobrir os mistérios deste mundo."
 fund_inspiration.9002.desc_research: "Inspiração:"
 fund_inspiration.9003.desc: "$fund_inspiration.title$ Pedido de Fundos"
 fund_inspiration.9004.desc: "[inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] insiste que os fundos que lhe forneci não são suficientes para criar um artefato digno da minha estatura.\n\n"Com um pouco mais de ouro, eu poderia criar algo #EMP verdaderamente#! magnífico!"."
 fund_inspiration.9004.desc_adventurer_tired_of_europe: "O que você precisar!"
 fund_inspiration.9004.desc_adventurer_stuck_in_swamp: "Se vira com o que tem."

E assim"
 fund_inspiration.9004.a: "meu olhar pousa nas ferramentas manchadas de vermelho e nas unhas arrancadas espalhadas pela mesa."
 change_artifact_quality_effect_gain: "meu olhar distraído vagueia pela mesa e pelas prateleiras cheias de partes de animais misteriosos, líquidos coloridos e plantas de aparência perigosa."
 change_artifact_quality_effect_slight_gain: "Eu ouço gemidos e soluços fracos de outra pessoa na sala. Depois de uma série de soluços, um som doloroso de vômito segue-se junto com o forte cheiro ácido do mesmo."
 change_artifact_quality_effect_loss: "\"Use as pessoas em meus calabouços como desejar.\""
 change_artifact_quality_effect_slight_loss: "\"Aqui, algum dinheiro para sequestrar alguns camponeses.\""
 change_artifact_book_content_quality_effect_gain: "\"A fronteira não está longe. Vá sequestrar alguns camponeses estrangeiros.\""
 change_artifact_book_content_quality_effect_loss: "As evidências apontam para você como a causa dos camponeses desaparecidos."
 fund_inspiration.9005.t: "Você se safou do sequestro de camponeses."
 fund_inspiration.9005.desc_intro: "Você recusa o pedido de [inspiration_owner.GetTitledFirstNameNoTooltip|l]"
 fund_inspiration.9005.desc_multiple: "$fund_inspiration.title$ Disrupções"
 fund_inspiration.9005.desc_single: ""Por #EMP [inspiration_owner.GetFaith.HighGodName]#!, [previous_inspired.GetWomanMan]! Deixe-me em paz!"

A atmosfera pacífica é rompida pelos gritos de [inspiration_owner.GetFirstName] quando [inspiration_owner.GetSheHe] invade o pátio. [previous_inspired.GetFirstName] [inspiration_owner.GetHerHim] segue rapidamente, mas para ao me ver.

"[ROOT.Char.Custom2('RelationToMeAddress', previous_inspired)|U], por favor, faça [inspiration_owner.GetFirstNameNoTooltip] cair na real! Estou apenas tentando ajudar [inspiration_owner.GetHerHim] porque tenho alguma experiência que pode melhorar o trabalho [inspiration_owner.GetHerHis]!""
 fund_inspiration.9005.a: "Convencer [inspiration_owner.GetFirstNameNoTooltip] a ouvir [previous_inspired.GetFirstNameNoTooltip]."
 fund_inspiration.9005.b: ""Vamos, ao menos escutemos[previous_inspired.GetHerHim]"."
 inherited_inspiration_continue_tt: "Ordenar que [previous_inspired.GetFirstNameNoTooltip] deixe [inspiration_owner.GetFirstNameNoTooltip] em paz."
 inherited_inspiration_end_tt: "[inspiration_owner.GetFirstNameNoTooltip] ouve [previous_inspired.GetFirstNameNoTooltip]"
