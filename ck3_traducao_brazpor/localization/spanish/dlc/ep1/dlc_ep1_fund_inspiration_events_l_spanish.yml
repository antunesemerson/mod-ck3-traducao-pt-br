 #INSPIRATION COMPLETED
 fund_inspiration.1001.t: "Isso é adorável!"
 fund_inspiration.1001.desc: "Que os preparativos comecem."
 fund_inspiration.1001.a: "Agora você pode celebrar uma [coronation|lE]"
 fund_inspiration.1001.b: "\n\nCom a coroa concluída, agora posso realizar minha coroação e consolidar minha autoridade como soberano[ROOT.GetCharacter.Custom('ES_OA')]."
 fund_inspiration.1001.b.coronation_ready: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U]!" [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima de mim com um sorriso largo, suor escorrendo pela testa e fuligem espalhada pelo rosto. "Trabalhei muitos dias e noites na forja, mas enfim terminei a obra!"

[inspiration_owner.GetSheHe|U] me apresenta um objeto envolto em pano e, quando revelo o que está escondido dentro, meus olhos se arregalam.

"
 fund_inspiration.1071.coronation: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U]!". [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)] me chama com um sorriso enorme e gesticula para que eu me aproxime de um suporte de armadura coberto. "Trabalhei muitos dias e noites na forja, mas por fim meu trabalho está concluído!"."
 fund_inspiration.1011.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U]!". [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)] gesticula para que eu me aproxime de um suporte de armadura coberto. Ele se esforça para manter uma postura profissional, mas consigo ver o fogo em seus olhos quando me diz que seu trabalho está terminado."

[inspiration_owner.GetSheHe|U] me apresenta um objeto envolto em pano e, quando revelo o que está escondido dentro, meus olhos se arregalam.

"
 fund_inspiration.1021.desc_opening_1: ""Talvez seu[soulmate.Custom('ES_OA')] amad[soulmate.Custom('ES_OA')] [soulmate.GetTitledFirstName] tenha falecido, mas este livro é testemunho do amor que vocês compartilharam."

"
 fund_inspiration.1021.desc_opening_2: ""Talvez [nemesis.Custom2('YourCharacterIntroductionNoComma', ROOT.Char)|U] tenha falecido, mas este livro é testemunho do ódio que sentistes por [nemesis.GetSheHe]".\n\n"
 fund_inspiration.1021.desc: "\"Seu gato amado pode ter falecido, mas este livro garantirá que ninguém jamais esqueça o felino chamado [inspiration_owner.Custom('CatStoryName')]!\"\n\n"
 fund_inspiration.1021.a: ""Pode ser que vosso querido cão tenha falecido, mas este livro garantirá que ninguém jamais se esqueça do canino chamado [inspiration_owner.Custom('DogStoryName')]!".\n\n"
 fund_inspiration.1031.desc_opening: ""O livro está pronto. Espero que o trabalho concluído ofusque minha falta de conhecimento sobre o assunto. Por favor, dê uma olhada!"\n\n"
 fund_inspiration.1031.desc_crime: "\"Meu livro - minha #EMP obra-prima#! está finalizada! Veja.\"\n\n"
 fund_inspiration.1031.desc_soulmate_died: "Estou impressionado[ROOT.Char.Custom('ES_OA')]!"

"
 fund_inspiration.1031.desc_nemesis_died: "Ah, [inspiration_sponsor.Custom('LoverPetName')] meu[inspiration_sponsor.Custom('ES_OA')]!"
 fund_inspiration.1031.desc_cat_died: ""Tenho uma surpresa para você!"

[inspiration_sponsor.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me entrega um belo livro e, quando o folheio, mal posso acreditar no que vejo. [inspiration_sponsor.GetSheHe|U] encomendou um livro com o único propósito de #EMP me difamar#!!

"Embora nenhuma palavra neste mundo possa expressar o desprezo que sinto por você e nenhuma ilustração possa retratar com precisão a monstruosidade que é o seu rosto, eu tentei. O mundo inteiro lerá isso e saberá o quão vil você é.""
 fund_inspiration.1031.desc_dog_died: "Aquele[inspiration_sponsor.Custom('ES_OA')] [inspiration_sponsor.Custom2('InsultNoun', ROOT.Char)]!"
 fund_inspiration.1031.desc_low_content_quality: "Mas eles #EMP saberão#! de mim!"
 fund_inspiration.1031.desc: "“Por aqui, [ROOT.Char.Custom('FormOfAddressForLiege')]!” [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] aponta para a porta de sua tecelagem, onde há meses vem trabalhando em minha encomenda. Ao atravessar a soleira, fico boquiabert[ROOT.Char.Custom('ES_OA')] ao contemplar a obra que está pendurada à minha frente.\n\n"
 fund_inspiration.1031.a: "[ROOT.Char.Custom('FormOfAddressForLiege')|U]! [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] anuncia sua chegada com uma voz surpreendentemente alta. [inspiration_owner.GetSheHe|U] segura com orgulho um pacote bem embrulhado em tecido.\n\nVolto de [inspiration_owner.Custom('InspirationAdventureDestination')] com um artefato da minha jornada!\n\nTomo o voluminoso embrulho em minhas mãos e afrouxo os cordões antes de retirar camada após camada de tecido. Em seu interior"
 fund_inspiration.1032.t: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U]!". [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] anuncia sua chegada com uma voz surpreendentemente alta. [inspiration_owner.GetSheHe|U] lidera orgulhosamente uma grande procissão até o trono. Atrás de [inspiration_owner.Custom('ES_ElElla')], um carro entra em sua sala de audiências.\n\n"Retorno de [inspiration_owner.Custom('InspirationAdventureDestination')] com um grande símbolo de virtude real!".\n\nQuando o carro se aproxima, percebo que ele traz um trono."
 fund_inspiration.1032.desc: "Ó[ROOT.Char.Custom('FormOfAddressForLiege')|U]! [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] anuncia sua chegada com um tom surpreendentemente alto. [inspiration_owner.GetSheHe|U] lidera orgulhosamente uma grande procissão até o trono. Atrás de [inspiration_owner.Custom('ES_ElElla')], vários ajudantes carregam o que parece ser uma caixa enorme.\n\nRetorno de [inspiration_owner.Custom('InspirationAdventureDestination')] com um prêmio da minha jornada!\n\nAproximo-me da caixa gigantesca quando um dos ajudantes afasta as tábuas que ocultam seu tesouro. No interior"
 fund_inspiration.1032.a: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U]!". [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] anuncia sua chegada com uma voz surpreendentemente alta. Orgulhosamente, ele/ela aponta para um móvel sendo carregado por dois ajudantes.\n\n"Retorno da minha viagem com um artefato!".\n\nAproximo-me do artefato para inspecionar o que me foi trazido por est[inspiration_owner.Custom('ES_EA')] [inspiration_owner.GetWomanMan] de [inspiration_owner.Custom('InspirationAdventureDestination')]."
 fund_inspiration.1033.desc: "é a caveira de [newly_created_artifact.GetFeatureText( 'animal_skull_type' )]. Peço a [inspiration_owner.GetFirstNameNoTooltip] os detalhes e me conta a história de como abateu essa fera enorme."

[inspiration_sponsor.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me entrega um belo livro e, quando o folheio, mal posso acreditar no que vejo. [inspiration_sponsor.GetSheHe|U] encomendou um livro com o único propósito de #EMP me difamar#!!

"Embora nenhuma palavra neste mundo possa expressar o desprezo que sinto por você e nenhuma ilustração possa retratar com precisão a monstruosidade que é o seu rosto, eu tentei. O mundo inteiro lerá isso e saberá o quão vil você é.""
 fund_inspiration.1033.a: "há uma tapeçaria. [inspiration_owner.GetFirstNameNoTooltip] se enche de orgulho enquanto me conta uma história sobre o mestre alfaiate que foi seu companheiro de viagem. A aventura compartilhada inspirou os motivos escolhidos nesta tapeçaria."
 fund_inspiration.1033.a_proud: "Mas eles #EMP saberão#! de mim!"
 fund_inspiration.1041.desc: "é um artefato diferente de tudo que já vi antes.\n\n[inspiration_owner.GetFirstNameNoTooltip] sorri orgulhosamente: "[epic.GetDesc]""
 fund_inspiration.1051.desc: "há um grande baú de pedra, no interior do qual há uma série de tábuas de pedra.\n\n[inspiration_owner.GetFirstNameNoTooltip] vangloria-se orgulhosamente: "Esta é a Arca da Aliança! Ela contém as tábuas de pedra dadas aos israelitas por Moisés."\n\nE então [inspiration_owner.GetFirstNameNoTooltip] passa a entreter a corte com a história de suas aventuras em [inspiration_owner.Custom('InspirationAdventureDestination')]. Uma história de adversários movidos por ideologias sombrias e visitas a muitos lugares pitorescos."
 fund_inspiration.1051_throne.desc: "\n\n[inspiration_owner.GetFirstNameNoTooltip] anuncia orgulhosamente: [epic.GetDesc]"
 fund_inspiration.1051_ark_covenant.desc: "\n\nCom um grande sorriso, [inspiration_owner.GetFirstNameNoTooltip] afirma: \"[epic.GetDesc]\""
 fund_inspiration.1051_cupboard.desc: "há vestimentas dignas de uma corte real.\n\n[inspiration_owner.GetFirstNameNoTooltip] sorri orgulhosamente e explica como conquistou a gratidão de um governante local de [inspiration_owner.GetCurrentLocation.GetNameNoTooltip], um longo relato que termina com este governante oferecendo [newly_created_artifact.GetName|l] ao senhor de [inspiration_owner.GetFirstNameNoTooltip]."
 fund_inspiration.1051.desc.skull: "há regalias dignas de uma corte real.

[inspiration_owner.GetFirstNameNoTooltip] sorri orgulhosamente e explica que se trata de um presente de um governante distante que ouviu falar da grandiosidade da sua corte e deseja impressioná-lo."
 fund_inspiration.1051.desc.goblet: "há um conjunto de armadura.\n\n[inspiration_owner.GetFirstNameNoTooltip] obsequia a corte com a história de como chegou a possuir este conjunto incomum que agora está lhe oferecendo."
 fund_inspiration.1051.desc.box: "há [newly_created_artifact.GetName].\n\n[inspiration_owner.GetFirstNameNoTooltip] passa a recontar a história de como esta arma veio parar em suas mãos. Uma história com muitas reviravoltas, algumas menos prováveis do que outras."
 fund_inspiration.1051.desc.hide: "há um colar.\n\n[inspiration_owner.GetFirstNameNoTooltip] parece bastante feliz por poder lhe oferecer este prêmio, mas não parece muito disposto[inspiration_owner.Custom('ES_OA')] a explicar como o obteve."
 #fund_inspiration.1051.desc.pillow: "Isso é magnífico!"
 fund_inspiration.1051.desc.tapestry: "Precisa ser cuidado por 'homens de topo'"
 #Epic Artifacts
 fund_inspiration.1051.desc.epic: "\"Por aqui, [ROOT.Char.Custom('FormOfAddressForLiege')]!\". [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)] gesticula com um sorriso enorme. \"Trabalhei muitos dias e noites e, enfim, terminei a encomenda!\".\n\n[inspiration_owner.GetSheHe|U] me apresenta um objeto envolto em pano e, quando ergo o tecido, arregalo os olhos.\n\n"
 fund_inspiration.1051.desc.epic.ark: "[ROOT.Char.Custom('FormOfAddressForLiege')|U]! [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me faz gestos para me aproximar de sua mesa abarrotada com um grande sorriso no rosto."
 fund_inspiration.1051.desc.epic.throne: "\"Eu sei que disse que poderia descobrir um jeito de prolongar a vida indefinidamente, mas infelizmente isso não foi possível."
 fund_inspiration.1051.desc.epic.cupboard: "No entanto, consegui criar um elixir que os impedirá de envelhecer! Até certo ponto. Por favor, provem, ou ao menos examinem o fruto do meu trabalho".\n\n"
 fund_inspiration.1051.desc.regalia: "No entanto, consegui produzir um elixir que devolverá parte de sua vigor perdido! Por favor, prove-o, ou ao menos inspecione o fruto do meu trabalho\".\n\n"
 fund_inspiration.1051.desc.regalia_2: "há regalias dignas de uma corte real.

[inspiration_owner.GetFirstNameNoTooltip] sorri orgulhosamente e explica que se trata de um presente de um governante distante que ouviu falar da grandiosidade da sua corte e deseja impressioná-lo."
 fund_inspiration.1051.desc.armor: ""Consegui! Criei a pedra filosofal! Esta é minha obra-prima, meu legado dourado. Por favor, admirem!"\n\n"
 fund_inspiration.1051.desc.weapon: ""Aquecei uma mistura de mercúrio com enxofre em um frasco, o que fez com que ela se vaporizasse e se condensasse no topo do frasco. Quando então quebrei o frasco e moí o composto resultante, havia criado o vermelhão, brilhante e vibrante! Aqui, registrei minhas descobertas".\n\n"
 fund_inspiration.1051.desc.necklace: ""Aquecei um pouco de minério de arsênico, o que produziu um pó branco solúvel em água. Tenho certeza de que é fatal quando ingerido, mas não deixará nenhum rastro de sabor ou cheiro! Aqui estão minhas descobertas registradas".\n\n"
 fund_inspiration.1051.a: ""Criei ouro! Como grandes mentes antes de mim teorizaram, o problema do chumbo era a falta de umidade e de calor."

Quando peço para observar o processo, [inspiration_owner.GetSheHe] insiste que a pequena peça de ouro sobre a mesa fala por si só. "Mas é claro que registrei minhas descobertas, dê uma olhada."

"
 fund_inspiration.1051.b: ""Criei prata! Como grandes mentes antes de mim teorizaram, a prata nasce do aquecimento de cobre e outros metais básicos até ficarem brancos."

Quando peço para observar o processo, [inspiration_owner.GetSheHe] insiste que o pequeno pedaço de prata sobre a mesa fala por si só. "Mas é claro que registrei minhas descobertas, dê uma olhada."

"
 fund_inspiration.1061.desc_floor_bound_artifact: ""Reuni neste tomo tudo o que sei sobre metais básicos e conhecimentos sobre transmutações. Aqui, dê uma olhada".\n\n"
 fund_inspiration.1061.desc: "Vou experimentar um gole imediatamente!"
 fund_inspiration.1081.desc_opening: "Fascinante!"
 fund_inspiration.1081.immortality_fail_desc_opening: "“[ROOT.Char.Custom('FormOfAddressForLiege')|U]!”. [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima a mim com um sorriso satisfeito no rosto. “Trabalhei muitos dias e noites na bancada, mas finalmente meu trabalho está concluído!”.\n\n[inspiration_owner.GetSheHe|U] me apresenta um objeto envolto em pano, e, ao revelar o que está escondido dentro, arregalo os olhos.\n\n"
 fund_inspiration.1081.immortality_fail_desc_young: "Bom trabalho! Muito bom!"
 fund_inspiration.1081.immortality_fail_desc_old: "No entanto, consegui produzir um elixir que devolverá parte de sua vigor perdido! Por favor, prove-o, ou ao menos inspecione o fruto do meu trabalho\".\n\n"
 fund_inspiration.1081.elixir_desc_desc_young: ""Meus experimentos deram fruto. Eis um elixir que impedirá o envelhecimento! Em certa medida. Por favor, olhem, e talvez até provem".\n\n"
 fund_inspiration.1081.elixir_desc_desc_old: "Inspiração Encerrada"
 fund_inspiration.1081.panacea_desc: "Que desastre! [inspiration_owner.GetTitledFirstName|l], meu beneficiár[inspiration_owner.Custom('ES_OA')] faleceu. [inspiration_owner.GetDeathReason] antes que pudesse realizar seu… realizar #EMP mi#! sonho!\n\n"
 fund_inspiration.1081.metals_philosophers_stone_desc: "Agora nunca saberei que tipo de obra-prima poderia ter forjado…"
 fund_inspiration.1081.metals_mercury_desc: "Agora nunca saberei que tipo de obra-prima poderia ter criado…"
 fund_inspiration.1081.metals_arsenic_desc: "Agora nunca saberei que tipo de obra-prima poderia ter escrito…"
 fund_inspiration.1081.metals_gold_desc: "Agora nunca saberei que tipo de obra-prima poderia ter tecido…"

Quando peço para observar o processo, [inspiration_owner.GetSheHe] insiste que a pequena peça de ouro sobre a mesa fala por si só. "Agora nunca saberei que tipo de obra-prima poderia ter criado…"

"
 fund_inspiration.1081.metals_silver_desc: "Agora nunca saberei quais descobertas poderia ter realizado…"

Quando peço para observar o processo, [inspiration_owner.GetSheHe] insiste que o pequeno pedaço de prata sobre a mesa fala por si só. "Você deixa de financiar a inspiração de [inspiration_owner.GetTitledFirstName|l]"

"
 fund_inspiration.1081.metals_fallback_desc: "criar uma armadura."
 fund_inspiration.1081.a_elixirs: "escrever um livro."
 fund_inspiration.1081.a: "tecer uma obra-prima."
 fund_inspiration.1091.desc: "partir em uma aventura."
 fund_inspiration.1091.a: "criar algo magnífico."
