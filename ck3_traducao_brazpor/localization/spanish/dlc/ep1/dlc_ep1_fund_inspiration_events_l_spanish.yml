 fund_inspiration.title: "$fund_inspiration.title$ Maior Qualidade"
 fund_inspiration.2001.t: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], veja que metal! Nunca tinha visto uma qualidade tão requintada"."
 fund_inspiration.2001.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], veja que tecido! As fibras, a profundidade da cor… Nunca tinha visto uma qualidade tão requintada"."
 fund_inspiration.2001.a: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], veja que fio! Nunca tinha visto uma qualidade tão requintada"."
 fund_inspiration.2001.b: ""Meu [ROOT.Char.GetLadyLord], olhe esse pigmento! Nunca havia visto uma qualidade tão fina"."
 fund_inspiration.2002.t: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], olhe para essa madeira! Nunca tinha visto uma qualidade tão requintada"."
 fund_inspiration.2002.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], veja esse papel! Nunca tinha visto uma qualidade tão requintada"."
 fund_inspiration.2002.desc.fingernails: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], veja essa tinta! As cores, a saturação… Nunca tinha visto uma qualidade tão requintada"."
 fund_inspiration.2002.desc.potions: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], olhe só! Nunca vi um minério tão puro."
 fund_inspiration.2002.desc.blind: ""Ó, [ROOT.Char.Custom('FormOfAddressForLiege')|U], olhai esses frascos! Nunca tinha visto um vidro tão transparente"."
 fund_inspiration.2002.a: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], olha só isso! Nunca vi materiais tão bons."
 fund_inspiration.2002.b: "

[inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se afasta de nossa procissão pelo mercado para abordar o mercador que vende o item cobiçado, entusiasmad[inspiration_owner.Custom('ES_OA')] por sua descoberta.

"Com isto, meu projeto poderia alcançar novos patamares. Eu poderia criar algo verdadeiramente #EMP maravilhoso#!! Por favor, meu[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], concedei-me este presente.""
 fund_inspiration.2002.c: "Seu projeto vale a pena investir!"
 fund_inspiration.2002.toast_outcome.negative: "Claro, mas certamente podemos conseguir um preço justo?"
 fund_inspiration.2002.toast_outcome.positive: "O comerciante é convencido a baixar os preços."
 fund_inspiration.2002.d: "O comerciante não é convencido."
 fund_inspiration.2003.t: "Absolutamente. Guardas, apreendam o que [inspiration_owner.GetFirstNameNoTooltip] precisa."
 fund_inspiration.2003.desc: "Você acha que eu sou[ROOT.Char.Custom('ES_OA')] rico?"

A atmosfera pacífica é rompida pelos gritos de [inspiration_owner.GetFirstName] quando [inspiration_owner.GetSheHe] invade o pátio. [previous_inspired.GetFirstName] [inspiration_owner.GetHerHim] segue rapidamente, mas para ao me ver.

"Digamos apenas que, se você quiser que a [inspiration_owner.Custom('ArtifactArmorTypeLowercase')] seja minimamente utilizável"
 fund_inspiration.2003.a: "Digamos que, se você quiser ter uma arma elegante"
 fund_inspiration.2003.b: "você terá que investir em uma nova.\""
 fund_inspiration.2003.c: "Claro, o que você precisar."
 fund_inspiration.2003.toast_outcome.positive: "É uma forja perfeitamente boa!"
 fund_inspiration.2003.toast_outcome.refusal: "$fund_inspiration.title$ Erudito Vagante"
 fund_inspiration.2003.toast_outcome.negative: "Meu [inspiration_owner.Custom('GetInspirationOwnerType')|l], [inspiration_owner.Custom('ES_ElLa')] [inspiration_owner.GetTitledFirstName|l], me apresenta a um[scholar_character.Custom('ES_XA')] [scholar_character.GetWomanMan], sem parar de sorrir e elogiar.\n\n“Este é [scholar_character.Custom('ES_DelDela')] [scholar_character.GetTitledFirstName|l], um[scholar_character.Custom('ES_XA')] erudit[scholar_character.Custom('ES_OA')] muito respeitad[scholar_character.Custom('ES_OA')] em meus círculos.”\n\nTal [scholar_character.GetWomanMan] se inclina e consegue parecer encantad[scholar_character.Custom('ES_OA')] e envergonhad[scholar_character.Custom('ES_OA')] ao mesmo tempo. “Por favor, não há necessidade disso. Estou aqui para oferecer meus serviços, [ROOT.Char.Custom('FormOfAddressForLiege')], se lhe aprouver.”"
 fund_inspiration.2004.t: "Sim. Por favor, ajude [inspiration_owner.GetFirstNameNoTooltip]."
 fund_inspiration.2004.desc_metal: "Certamente. Sereis meu instrutor[scholar_character.Custom('ES_XA')] pessoal"
 fund_inspiration.2004.desc_fabric: "Você não encontrará um lar aqui."
 fund_inspiration.2004.desc_thread: "[inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] insiste em que, para fazer uma armadura digna de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip] de minha glória, precisará de mais fundos.\n\n"Fabricar [inspiration_owner.Custom('ArtifactArmorTypeLowercase')] não é barato, só o material… Não é hora de ser mesquinho, [ROOT.Char.Custom('FormOfAddressForLiege')]!""
 fund_inspriation.2004.desc_paint: "Você terá o dinheiro."
 fund_inspiration.2004.desc_wood: "Não lhe darei mais ouro."
 fund_inspiration.2004.desc_paper: "$fund_inspiration.title$ Uma Palavra Amigável"
 fund_inspiration.2004.desc_ink: "Meu amig[friend.Custom('ES_OA')] [friend.GetTitledFirstName] me detém no corredor com um sorriso deslumbrante. 

"Ah, #EMP aí#! está você, [ROOT.Char.GetFirstNameNoTooltip]! Acabei de falar com [inspiration_owner.GetTitledFirstName]! Fiquei sabendo que [inspiration_owner.Custom('InspirationTypeDescriptionFuturePresent')] para você e não resisti a visitar seu [inspiration_owner.Custom('GetInspirationTypeRoom')]!"

"Falei com [inspiration_owner.GetHerHim] sobre como atender às suas expectativas e acho que você vai gostar dos resultados!""
 fund_inspiration.2004.desc_alchemy_metal: "\"Oh! Obrigado [friend.GetFirstNameNoTooltip]!\""
 fund_inspiration.2004.desc_elixirs: "$fund_inspiration.title$ Sabotagem"
 fund_inspiration.2004.desc_fallback: "Os gritos exasperados [inspiration_owner.Custom('ES_DelDela')] [inspiration_owner.GetTitledFirstName|l] estragam um momento de tranquilidade: "Como vou me dedicar a [inspiration_owner.Custom('InspirationTypeDescription')] quando não paro de perder minha [inspiration_owner.Custom('GetInspirationTypeTool')]?!". \n\n[inspiration_owner.GetFirstName] vem correndo até mim. "[ROOT.Char.Custom('FormOfAddressForLiege')|U], toda vez que faço um pouco de progresso, algo dá errado! Tenho certeza de que alguém na corte está sabotando meu trabalho!". [inspiration_owner.Custom('ES_OA')] bufa de frustração e sai furioso do salão, de volta para sua \n\n[inspiration_owner.Custom('GetInspirationOwnerType')] com raiva, de volta à sua [inspiration_owner.Custom('ES_OA')].[inspiration_owner.Custom('GetInspirationTypeRoom')]"
 fund_inspiration.2004.desc: "

[inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se afasta de nossa procissão pelo mercado para abordar o mercador que vende o item cobiçado, entusiasmad[inspiration_owner.Custom('ES_OA')] por sua descoberta.

"Hora de armar uma armadilha!"
 fund_inspiration.2004.a: "Você pega o sabotador"
 fund_inspiration.2004.b: "O sabotador escapa"
 fund_inspiration.2004.b.success: "Atos Furtivos"
 fund_inspiration.2004.b.failure: "Este personagem é um habilidoso espião."
 fund_inspiration.2004.c: "Depois da ceia, fiquei à espreita perto dos aposentos de [inspiration_owner.GetTitledFirstNamePossessive] com um punhado de guardas, vigiando o corredor enquanto o/a [ROOT.Char.Custom('FortifiedBuilding')] ia ficando mais escuro. \n\nJusto quando pensei em desistir, uma luz trêmula dança pelo corredor, seguida de uma silhueta encapuzada.\n\nA figura sombria empurra a porta do [inspiration_owner.Custom('GetInspirationTypeRoom')] e examina furtivamente o corredor mais uma vez, e o rosto é iluminado pela luz tremulante do queimador de óleo: [rival.GetTitledFirstName|l]!"
 fund_inspiration.2004.d: "\"A-ha! Para as masmorras!\""
 fund_inspiration.2005.t: ""Expulsem[rival.GetHerHim] daqui!""
 fund_inspiration.2005.desc_opening: "Eu vou lidar com isso do meu jeito..."
 fund_inspiration.2005.desc_weapon: "$fund_inspiration.title$ Opinião Considerada"
 fund_inspiration.2005.desc_armor: "Meu [inspiration_owner.Custom('GetInspirationOwnerType')], [inspiration_owner.GetTitledFirstName|l], me atualiza sobre o progresso dele, falando sem parar sobre os limites de [inspiration_owner.Custom('GetInspirationTypeTool')] e [inspiration_owner.Custom('GetInspirationTypeStation')] enquanto minha mente fervilha com ideias ousadas para meu [inspiration_owner.Custom('GetInspirationTypeObject')]... \n\nPode ser que [inspiration_owner.Custom('GetInspirationTypeVerb')] não seja #EMP mi#! meu ponto forte, mas isso não significa que eu não possa opinar sobre como meu dinheiro é gasto!"
 fund_inspiration.2005.desc_smith: "Eu tenho algumas sugestões..."
 fund_inspiration.2005.desc_ending: "Minha formação me dá algumas perspectivas únicas."
 fund_inspiration.2005.a: "Você já considerou #EMP este#! ângulo?"
 fund_inspiration.2005.b: "Deixe-me dar uma olhada em seus esboços..."
 fund_inspiration.2006.t: "Não, [inspiration_owner.GetFirstNameNoTooltip] sabe o que está fazendo."
 fund_inspiration.2006.desc: "Suas ideias funcionam bem"
 fund_inspiration.2006.a: "Você é ignorado"
 fund_inspiration.2006.b: "Suas ideias são ruins"
 fund_inspiration.2006.c: "Metade do seu investimento será devolvido:"
 fund_inspiration.2021.desc: "Um quarto do seu investimento será devolvido:"
 fund_inspiration.2021.a: "$fund_inspiration.title$ O Tesouro [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip]"
 fund_inspiration.2021.b: "Minha devoção é usada como exemplo por todos, desde poderosos reis até mendigos humildes, e, com isso, vêm os discípulos."
 fund_inspiration.2030.t: "Minhas realizações são mencionadas com reverência e inveja em todo o mundo, desde cortes estrangeiras até tavernas de vilarejos, e, com isso, vêm os apoiadores."
 fund_inspiration.2030.desc: "Meu amig[friend.Custom('ES_OA')] [friend.GetTitledFirstName] me detém no corredor com um sorriso deslumbrante. 

"uma pequena congregação de [donator.Custom('SisterBrother')]s de fé [donator.GetFaith.GetAdjectiveNoTooltip] de [barony_scope.GetNameNoTierNoTooltip], em [barony_scope.GetDeJureLiege.GetNameNoTier].\n\n"

"uma pequena banda mercenária [donator.GetCulture.GetNameNoTooltip] de [barony_scope.GetNameNoTierNoTooltip], em [barony_scope.GetDeJureLiege.GetNameNoTier].\n\n"
 fund_inspiration.2030.a: "uma pequena guilda [donator.Custom('dummy_peasant_profession')] de [barony_scope.GetNameNoTierNoTooltip], em [barony_scope.GetDeJureLiege.GetNameNoTier].\n\n"
 fund_inspiration.2040.t: ""Santíssim[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip]!""
 fund_inspiration.2040.desc: "\"Celestial Saoshyant!"
 fund_inspiration.2040.a: ""Salvador santo[ROOT.Char.Custom('ES_XA')] sant[ROOT.Char.Custom('ES_OA')]!""
 fund_inspiration.2040.b: ""Ó sant[ROOT.Char.Custom('ES_OA')] venerad[ROOT.Char.Custom('ES_OA')]!""
 fund_inspiration.2040.c: ""Oh, soberbo[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip]!""
 fund_inspiration.2040.c.tt: "\"Oh, sem igual [ROOT.Char.GetTitleAsNameNoTooltip]!"
 fund_inspiration.2040.c.flavor: "Meus amig[donator.Custom('ES_OA')]os e eu soubemos que está sendo feito um[a] [inspiration_owner.Custom('GetInspirationTypeObject')] que é uma verdadeira maravilha, e queremos doar para seu/sua [inspiration_owner.Custom('GetInspirationOwnerType')]! Seria uma grandíssima honra, Majestade — economizamos durante meses!"
 fund_inspiration.2040.c.success: "\"Sou #EMP eu#! quem está honrado.\""
 fund_inspiration.2040.c.failure: "\"Não, por favor, gentil [donator.Custom('NunMonk')], fique com isso.\""
 ep1_fund_inspiration_2040_scheme_modifier: ""Não, eu recuso! Fique com isso, amig[donator.Custom('ES_OA')]!""
 ep1_fund_inspiration_2040_scheme_modifier_desc: "\"É só isso?\""
 fund_inspiration.2041.desc: "Presente Aceito"
 fund_inspiration.2041.a: "Este condado ficou feliz em ter tido uma mão nos artefatos luxuosos de seu governante."
 fund_inspiration.2041.b: "Presente Recusado"
 fund_inspiration.2041.c: "Este condado está chateado por ter tido seus presentes recusados, mas agora tem um excedente de fundos."
 fund_inspiration.2050.t: "Presente Zombado"
 fund_inspiration.2050.desc: "Este condado está chateado por ter seus presentes zombados por seu governante."
 fund_inspiration.2050.a: "$fund_inspiration.title$ Joia Imperfeita"
 fund_inspiration.2050.b: "Distraído[ROOT.Char.Custom('ES_OA')] pelos assuntos da corte, fui adiando cada vez mais as notícias do meu [inspiration_owner.Custom('GetInspirationOwnerType')], [inspiration_owner.Custom('GetInspirationOwnerType')]."
 fund_inspiration.2050.c: "Agora o trabalho em meu [inspiration_owner.Custom('GetInspirationTypeObject')] está completamente paralisado, e parece que a culpa não foi inteiramente minha… \n\n"
 fund_inspiration.2050.d: "Agora, semanas de trabalho na minha [inspiration_owner.Custom('GetInspirationTypeObject')] foi desperdiçadas, e parece que não fui totalmente o culpado… \n\n"
 fund_inspiration.2050.e: "Me contam os delírios e o comportamento errático de [inspiration_owner.GetFirstNameNoTooltip], com suas constantes mudanças de ideia e recomeços do zero, e sua estranha técnica de [inspiration_owner.Custom('GetInspirationTypeTool')]."
 fund_inspiration.2050.success: "Me contam dos constantes mudanças de humor de [inspiration_owner.GetFirstNameNoTooltip] que, no pior dos casos, desfazem todo o trabalho feito em um frenesi de insegurança e ira."
 fund_inspiration.2050.nothing: "Me dizem que [inspiration_owner.GetFirstNameNoTooltip] passa os dias na cama, consumid[inspiration_owner.Custom('ES_OA')] por uma melancolia onipresente, incapaz de enfrentar o dia."
 fund_inspiration.2050.failure: "Me dizem que [inspiration_owner.GetFirstNameNoTooltip] gasta seu financiamento bebendo [ROOT.Char.Custom('RegionalAlcoholicDrink')] e fazendo papel de palhaço nas tavernas de [ROOT.Char.GetCapitalLocation.GetNameNoTooltip]."
 fund_inspiration_half_refund_tt: "Fui informado das grandes quantidades de haxixe que [inspiration_owner.GetFirstNameNoTooltip] gasta seu financiamento, antes de se trancar no escuro."
 fund_inspiration_quarter_refund_tt: "Me dizem que [inspiration_owner.GetFirstNameNoTooltip] se ausentava constantemente de sua [inspiration_owner.Custom('GetInspirationTypeRoom')], passando o tempo e meus fundos nos bordéis de [ROOT.Char.GetCapitalLocation.GetNameNoTooltip]."
 fund_inspiration.2060.t: "Falam-me das compras compulsivas de [inspiration_owner.GetFirstNameNoTooltip] no mercado, onde desperdiçou seu patrocínio em ideias fúteis que não levaram a lugar nenhum."
 fund_inspiration.2060.desc.religious: "Me relatam as doações compulsivas de [inspiration_owner.GetFirstNameNoTooltip] e as diversas causas em que gastou meu patrocínio em vez de em seu trabalho."
 fund_inspiration.2060.desc.fame: "Fala-se do mau gênio de [inspiration_owner.GetFirstNameNoTooltip] que, sem mim para o sobrepor, afastou qualquer um que pudesse ter corrigido seus erros e equívocos."
 fund_inspiration.2060.desc.court: "Dizem-me que [inspiration_owner.GetFirstNameNoTooltip] tem um apetite infinito e que gasta meus recursos em bolos e doces dos mercados."
 fund_inspiration.2060.desc: "Dizem-me que mal se viu [inspiration_owner.GetFirstNameNoTooltip] desde nossa última reunião, confinado[inspiration_owner.Custom('ES_OA')] em sua [inspiration_owner.Custom('GetInspirationTypeRoom')] onde, sem orientação, ele se desviou completamente do plano acordado."
 fund_inspiration.2060.desc.brotherhood: "Fico sabendo das feridas abertas de [inspiration_owner.GetFirstNameNoTooltip], que [inspiration_owner.Custom('ES_LoLa')] o/a confinam à cama, contorcendo-se de dor, e me pego esperando que [ROOT.Char.GetFaith.DeathDeityName] seja paciente com [inspiration_owner.GetSheHe]…"
 fund_inspiration.2060.desc.abbey: "Sou informado da gravidez de [inspiration_owner.GetFirstNameNoTooltip], cujas dores e imobilidade [inspiration_owner.Custom('ES_LoLa')] a deixaram incapaz de trabalhar…"
 fund_inspiration.2060.desc.mercenary: "Me falam da debilitante aflição de [inspiration_owner.GetFirstNameNoTooltip], que [inspiration_owner.Custom('ES_LoLa')] deixa muitas vezes acamado[inspiration_owner.Custom('ES_OA')] e sem disposição para trabalhar."
 fund_inspiration.2060.desc.guild: "\n\nE finalmente exijo que [inspiration_owner.GetHerHim] seja trazido(a) diante de mim."
 fund_inspiration.2060.piety: "\"Certifique-se de que as coisas voltem aos trilhos.\""
 fund_inspiration.2060.saoshyant: "\"Eu sei que você está fazendo o seu melhor, [inspiration_owner.GetFirstNameNoTooltip].\""
 fund_inspiration.2060.savior: "\"Tem que ser uma obra-prima, e logo!\""
 fund_inspiration.2060.saint: ""Vá embora daqui imediatamente, desperdiçador[inspiration_owner.Custom('ES_XA')]"."
 fund_inspiration.2060.prestige: "$fund_inspiration.title$ Liberdade Criativa"
 fund_inspiration.2060.grandeur: "“Isso é ridículo!”, protesta [rival.Custom('ES_ElLa')] [rival.GetTitledFirstName|l]. “Como guardião[rival.Custom('ES_AnAna')] da coleção pessoal [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip|l], tenho a responsabilidade de garantir a qualidade da sua obra!”."
 fund_inspiration.2060.desc_outro: ""Isso é ridículo!", protesta [rival.GetTitledFirstName]. "Sou um[rival.Custom('ES_XA')] artesã[rival.Custom('ES_OA')] reputad[rival.Custom('ES_OA')] [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip|l]! Eu poderia ajudar se vocês me deixassem ver sua obra!""
 fund_inspiration.2060.a: "\n\n"Você vai ver quando estiver pronto!", responde [inspiration_owner.GetTitledFirstName|l]. "É preciso deixar a pessoa trabalhar quando está [inspiration_owner.Custom('InspirationTypeDescriptionFuturePresent')] para a realeza!"."
 fund_inspiration.2060.b.religious: ""[rival.GetFirstNameNoTooltip] se #EMP asegurará#! de sua qualidade, [inspiration_owner.GetFirstNameNoTooltip]"."
 fund_inspiration.2060.b.prestige: ""Atenha-se aos seus próprios deveres, [rival.GetFirstNameNoTooltip]"."
 fund_inspiration.2060.c: "[rival.GetFirstNameNoTooltip] melhora o trabalho de [inspiration_owner.GetFirstNameNoTooltip]"
 ep1_fund_inspiration_2070_accept_modifier: "[rival.GetFirstNameNoTooltip] sufoca [inspiration_owner.GetFirstNameNoTooltip]"
 ep1_fund_inspiration_2070_accept_modifier_desc: "É hora de respirar novos ares."
 ep1_fund_inspiration_2070_refuse_modifier: "$fund_inspiration.title$ O toque de uma[event_spouse.Custom('ES_XA')] [event_spouse.GetWifeHusband|U]"
 ep1_fund_inspiration_2070_refuse_modifier_desc: "Vejo meu [event_spouse.GetWifeHusband], [event_spouse.GetFirstName], conversando animadamente com [inspiration_owner.GetTitledFirstName|l], listando ideias e sugestões para seu [inspiration_owner.Custom('GetInspirationTypeObject')]. Meu [inspiration_owner.Custom('GetInspirationOwnerType')] mal disfarça seu desprezo, claramente irritad[inspiration_owner.Custom('ES_OA')] por a interferência de minha espos[event_spouse.Custom('ES_OA')]. \n\n"...e, como sois [inspiration_owner.Custom('InspirationTypeDescription')]", continua [event_spouse.GetSheHe], "também poderia combinar com o velho trambolho do meu avô[event_spouse.Custom('ES_OA')], seu [inspiration_owner.Custom('GetInspirationTypeObject')]!" \n\nUma parte da alma de [inspiration_owner.GetFirstNameNoTooltip] parece estar morrendo."
 ep1_fund_inspiration_2070_mock_modifier: ""Ouça bem, [inspiration_owner.GetFirstNameNoTooltip]; minha [event_spouse.GetWifeHusband] deve ser ouvid[event_spouse.Custom('ES_OA')]!""
 ep1_fund_inspiration_2070_mock_modifier_desc: "Venha, querido, vamos deixar trabalhar [inspiration_owner.Custom('ES_AlAla')] especialista [inspiration_owner.Custom('ES_OA')]."
 fund_inspiration.2070.t: "[event_spouse.GetFirstNameNoTooltip] melhora o trabalho de [inspiration_owner.GetFirstNameNoTooltip]"
 fund_inspiration.2070.desc: "[event_spouse.GetFirstNameNoTooltip] sufoca [inspiration_owner.GetFirstNameNoTooltip]"
 fund_inspiration.2070.desc.stalled: "$fund_inspiration.title$ Artesão invejoso"
 fund_inspiration.2070.desc.wasted: "[inspiration_owner.GetTitledFirstName], meu [inspiration_owner.Custom('GetInspirationOwnerType')], fica olhando por cima da refeição para [other_inspiration_owner.GetTitledFirstName|l], outr[other_inspiration_owner.Custom('ES_OA')] pretendente ao meu patronato. \n\nEmbora [inspiration_owner.GetFirstNameNoTooltip] costuma ficar escondid[inspiration_owner.Custom('ES_OA')] e refletindo sobre sua [inspiration_owner.Custom('GetInspirationTypeStation')], na hora do jantar sempre estraga o clima. \n\nE esta noite finalmente explode:"
 fund_inspiration.2070.desc.lunatic: "\"Por que [other_inspiration_owner.GetFirstNameNoTooltip] recebe mais fundos do que eu? '[other_inspiration_owner.Custom('InspirationTypeDescriptionFuturePresent')|U]'! E daí?\""
 fund_inspiration.2070.desc.possessed: ""Não acredito que vocês tenham esvaziado seus cofres por semelhante [other_inspiration_owner.Custom2('InsultNoun', SCOPE.sC('inspiration_owner'))], [other_inspiration_owner.GetFirstNameNoTooltip], seria possível tirar resultados melhores dos catadores de sucata!""
 fund_inspiration.2070.desc.depressed: ""Vós deveis vos livrar desse peso morto, meu senhor[ROOT.Char.Custom('ES_XA')]; [other_inspiration_owner.GetFirstNameNoTooltip] não sabe qual é a ponta certa de sua [other_inspiration_owner.Custom('GetInspirationTypeTool')], nem se diga como se virar em qualquer [other_inspiration_owner.Custom('GetInspirationTypeRoom')]"."
 fund_inspiration.2070.desc.drunkard: "\"Seu trabalho é valioso para mim, [inspiration_owner.GetFirstNameNoTooltip].\""
 fund_inspiration.2070.desc.hashishiyah: "\"Eu vou igualar o seu financiamento, feliz?\""
 fund_inspiration.2070.desc.rakish: "\"Venha, qual é o problema?\""
 fund_inspiration.2070.desc.profligate: "\"Pare com essa tolice.\""
 fund_inspiration.2070.desc.improvident: "[inspiration_owner.GetFirstNameNoTooltip] abandona seu trabalho"
 fund_inspiration.2070.desc.irritable: "[inspiration_owner.GetFirstNameNoTooltip] perde a motivação"
 fund_inspiration.2070.desc.comfort_eater: "Você suaviza as coisas"
 fund_inspiration.2070.desc.reclusive: "Você piora a disputa"
 fund_inspiration.2070.desc.wounded: "$fund_inspiration.title$ Companheiro Conhecedor"
 fund_inspiration.2070.desc.pregnant: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('generous_vassal'))], [generous_vassal.Custom('ES_ElLa')] [generous_vassal.GetTitledFirstName|l], me aborda: "Bem-vind[ROOT.Char.Custom('ES_OA')][generous_vassal.Custom2('RelationToMeShort', ROOT.Char)],! Ouvi falar de vosso patrocínio [inspiration_owner.Custom('ES_DelDela')] [inspiration_owner.Custom('GetInspirationOwnerType')] [inspiration_owner.GetFirstName]. Dizem que é tal [inspiration_owner.Custom('InspirationTypeDescription')] que merece ser de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]". \n\n"Por favor, pegue isto e entregue-o."
 fund_inspiration.2070.desc.sick: "Não quero perder a oportunidade de ajudar na criação de uma obra-prima!"\n\n"
 fund_inspiration.2070.desc_outro: "Não gostaria de perder a oportunidade de participar de uma nova descoberta científica!\n\n"
 fund_inspiration.2070.a: "[generous_vassal.GetFirstNameNoTooltip] tem fama de ser uma pessoa generosa e parece que encontrou uma nova forma de gastar…"
 fund_inspiration.2070.b: "[generous_vassal.GetFirstNameNoTooltip] tem interesses em muitas coisas, entre elas artefatos preciosos e as mentes que os produzem..."
 fund_inspiration.2070.c: "[generous_vassal.GetFirstNameNoTooltip] tem interesses em muitas coisas, entre elas tecnologia e as mentes que a concebem..."
 fund_inspiration.2070.d: "[generous_vassal.GetFirstNameNoTooltip] sorri calorosamente, uma bolsa de moedas balançando em sua mão."
 fund_inspiration.2080.t: "Pobre [generous_vassal.GetFirstNameNoTooltip], deve ter tanto dinheiro que não sabe o que fazer com ele…"
 fund_inspiration.2080.antiquarian: "\"Que generoso!\""
 fund_inspiration.2080.artificer: ""Sim, eu me #EMP aseguraré#! de que ele/ela receba isso!""
 fund_inspiration.2080.desc: "Isso deve ser útil..."
 fund_inspiration.2080.a: "\"Não, por favor, fique com isso!\""
 fund_inspiration.2080.b: ""Atenha-se aos seus próprios deveres, [rival.GetFirstNameNoTooltip]"."
 fund_inspiration.2080.success: "$fund_inspiration.title$ Até Tarde"
 fund_inspiration.2080.failure: "O tempo desaparece no(a) [inspiration_owner.Custom('GetInspirationTypeRoom')] de [inspiration_owner.GetFirstName] bebendo [ROOT.Char.Custom('RegionalAlcoholicDrink')] enquanto discutimos com entusiasmo sobre o(a) [inspiration_owner.Custom('GetInspirationTypeObject')] que vai me [inspiration_owner.Custom('GetInspirationTypeVerb')]. Estou imaginando coisas, ou há uma… tensão indescritível? \n\n"
 fund_inspiration.2080.c: "Minha mente divaga, absorvendo as sutis peculiaridades de seu corpo, seus lábios sorridentes… Ponho minha mão sobre a sua. O/A [inspiration_owner.Custom('GetInspirationTypeTool')] cai de seus dedos trêmulos enquanto fito com anseio aqueles belos olhos. \n\n"
 fund_inspiration.2090.t: "Já está tarde quando meu [inspiration_owner.Custom('GetInspirationOwnerType')] larga sua [inspiration_owner.Custom('GetInspirationTypeTool')], toma um longo gole de sua taça e me sorri de maneira cúmplice. Será que [inspiration_owner.GetSheHe]... ? 

"
 fund_inspiration.2090.desc: "[inspiration_owner.GetSheHe|U] salta em meus braços como um animal, lançando o(a) [inspiration_owner.Custom('GetInspirationTypeStation')] pela sala."
 fund_inspiration.2090.a: "Em [inspiration_owner.GetSheHe] encontro a mesma paixão desesperada: cai em meu abraço caloroso…"
 fund_inspiration.2090.b: "Isso é errado, pelo [ROOT.Char.GetFaith.HighGodName], não posso ceder a essas tentações pecaminosas..."
 fund_inspiration.2090.success: "Não, as [ROOT.Char.GetFaith.ReligiousText] são claras! Adulterar é um pecado! Isso é a tentação do [ROOT.Char.GetFaith.DevilName]!"
 fund_inspiration.2090.failure: "De repente, [inspiration_owner.GetFirstNameNoTooltip] dá um passo à frente e me abraça! Meus braços detêm [inspiration_owner.GetHerHim], talvez com força demais... O calor [inspiration_owner.GetHerHis] esfria instantaneamente, endurecendo-se em confusão e medo."
 fund_inspiration.2100.t: "[inspiration_owner.GetSheHe|U] se aproxima, me atraindo para seu abraço quente. Meu corpo diz sim, mas meu coração grita não..."
 fund_inspiration.2100.desc: "Não posso negar que algo se agita em mim, meu coração acelera e me pego abraçando [inspiration_owner.GetHerHim] enquanto [inspiration_owner.GetSheHe] me abraça de volta... o que está #EMP acontecendo#!?"
 fund_inspiration.2100.desc.funds: "Não há dúvida das suas intenções! Mal consigo me conter enquanto varro seu/sua [inspiration_owner.Custom('GetInspirationTypeStation')] de lado."
 fund_inspiration.2100.desc.rival: "\"Venha aqui, coisa doce.\""
 fund_inspiration.2100.desc.fallback: "\"Oh... [inspiration_owner.GetFirstNameNoTooltip]...\""
 fund_inspiration.2100.a: "\"Isso não é para mim...\""
 fund_inspiration.2100.b: "\"Eu... preciso ir!\""
 fund_inspiration.2100.c: "\"Rápido, a porta!\""
 fund_inspiration.2100.d: "\"Oh! Eu não sou...\""
 fund_inspiration.2100.c.leave: "\"Não! A [ROOT.Char.GetFaith.ReligiousText] proíbe esta união...\""
 fund_inspiration.2100.c.worse: "\"Não! Eu não posso... o adultério é um pecado!\""
 fund_inspiration.2100.success: ""Não, não posso tentar[inspiration_owner.GetHerHim] ao adultério…""
 fund_inspiration.2100.failure: "\"Espere... como você #EMP ousa#!?!\""
 fund_inspiration.2110.t: "Largue-me, pecador[inspiration_owner.Custom('ES_XA')] libertino[inspiration_owner.Custom('ES_OA')]!"
 fund_inspiration.2110.desc: "Você sai apressadamente."
 fund_inspiration.2110.desc.part.2: "$fund_inspiration.title$ Capricho Volúvel"
 fund_inspiration.2110.desc.part.2.research: "Dou de cara com um[inspiration_owner.Custom('ES_XA')] [inspiration_owner.GetTitledFirstName] de aparência muito séria, meu [inspiration_owner.Custom('GetInspirationOwnerType')], e espero que não traga más notícias sobre o/a inigualável [inspiration_owner.Custom('GetInspirationTypeObject')] que em breve deverá estar pronto para mim. 

"Oh, então é você, meu senhor[ROOT.Char.Custom('ES_XA')]... Encontrei um muro no meu trabalho... Nada demais! Minhas ideias foram por água abaixo à medida que a pressão aumenta", [inspiration_owner.GetSheHe] ri nervosamente. 

"Só preciso de um pouco de... inspiração! Poderos[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip], não teria alguns... exemplos anteriores que eu possa examinar?""
 fund_inspiration.2110.desc.generous: "\"Para a biblioteca!\""
 fund_inspiration.2110.desc.dweeb: "\"Para a armaria!\""
 fund_inspiration.2110.desc.dweeb.research: "\"Para o grande salão!\""
 fund_inspiration.2110.desc.friend: "A qualidade ou o progresso da [inspiration|lE] de [inspiration_owner.GetFirstNameNoTooltip] pode melhorar"
 fund_inspiration.2110.desc.rich: "Certamente encontraremos algo que ajudará!"
 fund_inspiration.2110.a: "\"Eu sei o que você precisa!\""
 fund_inspiration.2110.b: "A musa de [inspiration_owner.GetFirstNameNoTooltip]"
 fund_inspiration.2110.b.flavor: "Retorna a musa de [inspiration_owner.GetFirstNameNoTooltip]"
 fund_inspiration.2110.c: "A musa de [inspiration_owner.GetFirstNameNoTooltip] dorme"
 #( ͡° ͜ʖ ͡°)
 fund_inspiration.2120.t: "A musa de [inspiration_owner.GetFirstNameNoTooltip] morre"
 fund_inspiration.2120.desc: "Que divertido será!"
 fund_inspiration.2120.desc.me: "\"Ah, eu tenho o tônico perfeito.\""
 fund_inspiration.2120.desc.them: "Já está tarde quando meu [inspiration_owner.Custom('GetInspirationOwnerType')] larga sua [inspiration_owner.Custom('GetInspirationTypeTool')], toma um longo gole de sua taça e me sorri de maneira cúmplice. Será que [inspiration_owner.GetSheHe]... ? 

"
 fund_inspiration.2120.desc.them_into_alot: "$fund_inspiration.title$ Fora com o Velho"
 fund_inspiration.2120.desc.them_into: "Com um último esforço [inspiration_owner.GetTitledFirstName|l] e eu entramos na minha biblioteca empoeirada — um cômodo no qual raramente tenho motivo para entrar.\n\n"
 fund_inspiration.2120.desc.me_zealous_homosexuality: "Apresento a [inspiration_owner.GetTitledFirstName|l] minha biblioteca bem cuidada, apontando alguns dos volumes e poções notáveis em exposição.\n\n"
 fund_inspiration.2120.desc.me_zealous_adultery: "Um soldado assustado mostra a [inspiration_owner.GetTitledFirstName|l] e a mim a desordem do meu arsenal. Nunca tinha descido aqui!\n\n"
 fund_inspiration.2120.desc.me_unattracted: "A [inspiration_owner.GetTitledFirstName|l] e eu somos conduzidos à minha extensa armeria, onde aponto alguns dos meus objetos favoritos, insinuando suas histórias.\n\n"
 fund_inspiration.2120.desc.me_chaste: "Enquanto dou a [inspiration_owner.GetTitledFirstName|l] um rápido passeio pelas curiosidades do meu grande salão, percebo que ele não é tão grandioso quanto poderia ser.\n\n"
 fund_inspiration.2120.desc.me_into: "Eu mostro a [inspiration_owner.GetTitledFirstName|l] meu grande salão, tendo muito orgulho de sua luxuosidade e das várias riquezas em exposição."
 fund_inspiration.2120.desc.me_into_alot: "[second.GetTitledFirstName] insistiu em vir e observa de longe, se contorcendo de dor cada vez que um objeto é manuseado ou identificado incorretamente.\n\n"
 fund_inspiration.2120.a: "[second.GetTitledFirstName] acompanha com alegria, sempre interessad[second.Custom('ES_OA')] nos processos criativos de seus pares.\n\n"
 fund_inspiration.2120.e: "[inspiration_owner.Custom('GetInspirationOwnerType')] se detém, como pasmado[inspiration_owner.Custom('ES_OA')] ao examinar meu [artifact_1.GetName]. \"Ah, que delicadeza, meu senhor[ROOT.Char.Custom('ES_XA')]… Poderia… poderia usar seu [inspiration_owner.Custom('GetInspirationMaterialType')]?\""
 fund_inspiration.2120.f.chaste: "Na loja [inspiration_owner.Custom('GetInspirationOwnerType')] para de repente e examina atentamente meu [artifact_1.GetName]. \"Sim… [inspiration_owner.Custom('GetInspirationMaterialType')] deveria servir… Você ainda… quer isto, meu senhor[ROOT.Char.Custom('ES_XA')]?\""
 fund_inspiration.2120.f: "Dá algumas voltas pelo aposento antes de voltar para mim, abatid[inspiration_owner.Custom('ES_OA')]. "Meu senhor[ROOT.Char.Custom('ES_XA')], aqui não há nada que me chame a atenção… há mais alguma coisa?""
 fund_inspiration.2120.h: "'O [artifact_1.GetNameNoTooltip]? Muito bem...'"
 fund_inspiration.2120.i: "'E quanto ao meu [artifact_2.GetNameNoTooltip]?'"
 fund_inspiration.2120.j: "'Deve haver alguma tranqueira por aí...'"
 fund_inspiration.2120.k.me: "Você encontra [inspiration_owner.Custom('GetInspirationMaterialType')] de qualidade"
 fund_inspiration.2120.k.them: "Você não encontra nada"
 fund_inspiration.2120.l: "Você encontra [inspiration_owner.Custom('GetInspirationMaterialType')] ruim"
 fund_inspiration.2120.m: "\"Você está apenas dando uma olhada.\""
 fund_inspiration.2120.leave_flavor: "[inspiration_owner.GetNameNoTooltip] encontra um verdadeiro tesouro"
 fund_inspiration.2130.t: "[inspiration_owner.GetNameNoTooltip] encontra [inspiration_owner.Custom('GetInspirationMaterialType')]"
 fund_inspiration.2130.desc: "Dou de cara com um[inspiration_owner.Custom('ES_XA')] [inspiration_owner.GetTitledFirstName] de aparência muito séria, meu [inspiration_owner.Custom('GetInspirationOwnerType')], e espero que não traga más notícias sobre o/a inigualável [inspiration_owner.Custom('GetInspirationTypeObject')] que em breve deverá estar pronto para mim. 

"[inspiration_owner.GetNameNoTooltip] encontra [inspiration_owner.Custom('GetInspirationMaterialType')] ruim", [inspiration_owner.GetSheHe] ri nervosamente. 

"\"Que desperdício de tempo!\""
 fund_inspiration.2130.a.library: "$fund_inspiration.title$ Escrita Impia"
 fund_inspiration.2130.a.armory: "[court_chaplain.Custom2('MyCharacterIntroduction', ROOT.Char)|U] irrompe na sala, agarrando um monte de papéis, seguid[inspiration_owner.Custom('ES_OA')] por um[inspiration_owner.Custom('ES_XA')] nervoso[inspiration_owner.Custom('ES_OA')] [inspiration_owner.GetTitledFirstName|l] que tenta arrancar os escritos de suas mãos.\n\n"
 fund_inspiration.2130.a.hall: "Est[inspiration_owner.Custom('ES_EA')] [inspiration_owner.GetWomanMan] está escrevendo sobre [ROOT.Char.GetFaith.WitchGodName]. #EMP [ROOT.Char.GetFaith.WitchGodName]#!!"
 fund_inspiration.2130.a.tt: ""Est[inspiration_owner.Custom('ES_EA')] [inspiration_owner.GetWomanMan] está escrevendo sobre #EMP comer carne humana#!!"
 fund_inspiration.2130.a.flavor: "Est[inspiration_owner.Custom('ES_EA')] [inspiration_owner.GetWomanMan] está escrevendo sobre atividades indescritíveis e sádicas!"
 fund_inspiration.2130.b: "Est[inspiration_owner.Custom('ES_EA')] [inspiration_owner.GetWomanMan] está escrevendo sobre atividades inconfessáveis e pervertidas!"
 fund_inspiration.2130.b.great: "Este[inspiration_owner.Custom('ES_EA')] [inspiration_owner.GetWomanMan] está escrevendo sobre coisas ímpias!"
 fund_inspiration.2130.b.good: "Com ilustrações! Devo assumir que vos não sabíeis de nada, [ROOT.Char.Custom('FormOfAddressForLiege')].\n\n[inspiration_owner.Custom('ES_ElLa')|U] [inspiration_owner.GetTitledFirstNameNoTooltip|l] zomba e se lança novamente sobre os papéis, mas meu [court_chaplain.Custom('CouncilPosition')] [inspiration_owner.Custom('ES_LoLa')] desvia.\n\nMas agora que est[inspiration_owner.Custom('ES_EA')] vil escritor[inspiration_owner.Custom('ES_XA')] foi expost[inspiration_owner.Custom('ES_OA')], certamente dedicareis o livro a [ROOT.Char.GetFaith.HighGodName], como é devido."
 fund_inspiration.2130.b.nothing: "Com certeza; eu não tinha ideia de que [inspiration_owner.GetSheHe] estava escrevendo sobre coisas assim."
 fund_inspiration.2130.b.bad: "[inspiration_owner.GetShortUIName] vai escrever sobre fé em vez de [inspiration_owner.Custom('ArtifactBookSubject')]"
 fund_inspiration.2130.b.terrible: "Você sabe o que seria o correto? Que [inspiration_owner.GetHerHim] deixe em paz!"
 fund_inspiration.2130.b.flavor: "Essas ilustrações parecem sem graça... Pegue este ouro para comprar nova tinta."
 fund_inspiration.2130.c: "$fund_inspiration.title$ Tópicos Marciais"
 fund_inspiration.2130.c.dead: "Encontro [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)] cercad[inspiration_owner.Custom('ES_OA')] de pergaminhos e manuscritos, folheando furiosamente as páginas.\n\n"
 fund_inspiration.2130.c.flavor: "Encontro [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)] cercad[inspiration_owner.Custom('ES_OA')] de pergaminhos e manuscritos, com a cabeça entre as mãos.\n\n"
 fund_inspiration.2130.d: "[inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima a mim com os braços cheios de pergaminhos e manuscritos.\n\n"
 fund_inspiration.2131.t: "[ROOT.Char.Custom('FormOfAddressForLiege')|U]! Há tantas áreas da arte da guerra dignas de atenção. Estratégia, composições de tropas, a batalha em si… nem sei por onde começar!"
 fund_inspiration.2131.desc_library_unused: "Quero que o livro seja educativo ou útil para o exército."
 fund_inspiration.2131.desc_library: "[inspiration_owner.GetTitledFirstNameNoTooltip|l] concentrará sua escrita em temas como estratégia e composições de tropas"
 fund_inspiration.2131.desc_armory_unused: "Talvez algo aludindo às áreas mais nobres do assunto."
 fund_inspiration.2131.desc_armory: "[inspiration_owner.GetTitledFirstNameNoTooltip|l] vai focar sua escrita em temas como cavalheirismo e proeza"
 fund_inspiration.2131.desc_great_hall_low: "Qual é o tópico que sua musa anseia?"
 fund_inspiration.2131.desc_great_hall: "[inspiration_owner.GetTitledFirstNameNoTooltip|l] decidirá livremente o tema do livro"
 fund_inspiration.2131.desc_antiquarian: "$fund_inspiration.title$ Tópicos Diplomáticos"
 fund_inspiration.2131.artificer: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U]! Há tantas áreas da diplomacia dignas de atenção. Comportamento cortesão, relações, #EMP poesía#!… Não sei nem por onde começar!""
 fund_inspiration.2131.desc_equipped: "Talvez algo relacionado à vida na corte."
 fund_inspiration.2131.desc_unequipped: "[inspiration_owner.GetTitledFirstNameNoTooltip|l] concentrará sua escrita em temas como alianças e eloquência"
 fund_inspiration.2131.desc_fallback: "Quero que o livro seja divertido!"
 fund_inspiration.2131.a: "[inspiration_owner.GetTitledFirstNameNoTooltip|l] focará sua escrita em temas como aventura e entretenimento"
 fund_inspiration.2131.b: "$fund_inspiration.title$ Tópicos Acadêmicos"
 fund_inspiration.2131.c: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U]! Há tantas áreas dignas de atenção. Religião, educação… Sem mencionar a própria arte da escrita!""
 fund_inspiration.2131.c.good: "Este empreendimento deve servir [ROOT.Char.GetFaith.HighGodName]!"
 fund_inspiration.2131.c.nothing: "[inspiration_owner.GetTitledFirstNameNoTooltip|l] focará sua escrita em temas como teologia e orações"
 fund_inspiration.2131.c.bad: "Quero que o livro seja educativo, ou pelo menos divertido!"
 fund_inspiration.2131.d: "[inspiration_owner.GetTitledFirstNameNoTooltip|l] focará sua escrita em temas como história e poesia"
 fund_inspiration.2131.d.great: "$fund_inspiration.title$ Tópicos de Governança"
 fund_inspiration.2131.d.good: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U]! Há tantas áreas da Tesouraria dignas de atenção. Leis, comércio, #EMP dinero#!… Nem sei por onde começar!""
 fund_inspiration.2131.d.nothing: "Foque em assuntos relacionados ao governo do reino."
 fund_inspiration.2131.d.bad: "[inspiration_owner.GetTitledFirstNameNoTooltip|l] concentrará sua escrita em temas como lei e administração"
 fund_inspiration.2131.d.terrible: "Estou interessado em desenvolvimento!"
 fund_inspiration.2131.e: "[inspiration_owner.GetTitledFirstNameNoTooltip|l] focará sua escrita em temas como edifícios e tributação"
 fund_inspiration.2131.f: "$fund_inspiration.title$ Tópicos de Intriga"
 fund_inspiration.3001.t: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U]! Há tantas áreas da intriga dignas de atenção. Conspirações, sedução, manipulação… Nem sei por onde começar!""
 fund_inspiration.3001.desc_opening: "Quero estar um passo à frente de #EMP todos#!!"
 fund_inspiration.3001.desc_witch: "[inspiration_owner.GetTitledFirstNameNoTooltip|l] focará sua escrita em temas como conspiração e manipulação"
 fund_inspiration.3001.desc_cannibal: "Quero homens aos meus pés!"
 fund_inspiration.3001.desc_torturer: "Quero mulheres aos meus pés!"
 fund_inspiration.3001.desc_lustful: "Quero que todos me desejem!"
 fund_inspiration.3001.desc_other: "Quero dominar a sedução."
 fund_inspiration.3001.desc_ending: "[inspiration_owner.GetTitledFirstNameNoTooltip|l] concentrará sua escrita em temas como a luxúria e a arte da sedução"
 fund_inspiration.3001.a: "$fund_inspiration.title$ Ódio Refrescante"
 fund_inspiration.3001.a_tt: "[inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me convidou para discutir o tema do livro que está escrevendo para mim.\n\n"
 fund_inspiration.3001.b: ""Não pude deixar de notar que a animosidade entre [prev_nemesis.Custom2('YourCharacterIntroduction', ROOT.Char)] e você vem esfriando. Você ainda quer dedicar este livro ao ódio que sente por [prev_nemesis.GetSheHe]?"."
 fund_inspiration.3001.c: ""Agora que [prev_nemesis.Custom2('YourCharacterIntroduction', ROOT.Char)] faleceu, vocês ainda querem dedicar este livro ao ódio que sentiam por [prev_nemesis.GetSheHe]?"."
 fund_inspiration.3011.t: "O ódio que sinto não esfriou tanto."
 fund_inspiration.3011.desc_opening_1: "[inspiration_owner.GetTitledFirstNameNoTooltip|l] continua escrevendo sobre seu ódio por [prev_nemesis.GetTitledFirstName|l]"
 fund_inspiration.3011.desc_opening_2: "[prev_nemesis.GetSheHe|U] não vale o esforço."
 fund_inspiration.3011.desc_opening_3: "$fund_inspiration.title$ Amor Murchando"
 fund_inspiration.3011.desc: "Não pude deixar de notar que [prev_soulmate.Custom2('YourCharacterIntroduction', ROOT.Char)] já não conta com a #EMP maior#! das graças, [ROOT.Char.Custom('FormOfAddressForLiege')]. Ainda pretende dedicar este livro ao amor que sente por [prev_soulmate.GetSheHe]?"
 fund_inspiration.3011.a: "A dor de ter perdido [prev_nemesis.Custom2('YourCharacterIntroduction', ROOT.Char)] imagino que ainda esteja muito fresca… Você ainda quer dedicar este livro ao amor que sentiu por [prev_soulmate.GetSheHe]?"
 fund_inspiration.3011.a.tt: "O que é o amor sem desejo e perda?"
 fund_inspiration.3011.b: "[inspiration_owner.GetTitledFirstNameNoTooltip|l] continua escrevendo sobre o amor que você compartilhou com [prev_soulmate.GetTitledFirstName|l]"
 fund_inspiration.3011.b.tt: "[prev_soulmate.GetSheHe|U] não vale o esforço."
 fund_inspiration.3011.d: "$fund_inspiration.title$ Tecido e Preenchimento"
 fund_inspiration.3011.d.tt: "\"[inspiration_owner.Custom2('YourCharacterIntroduction', ROOT.Char)|U] acabou com #EMP destrozado#! meu novo traje!\"\n\n[courtier.Custom2('MyCharacterIntroduction', ROOT.Char)|U] entra na sala, com o tecelão atrás. A peça de roupa que [courtier.GetFirstName] segura nas mãos está tão rasgada que não consigo dizer o que era antes.\n\n\"Você está exagerando! Eu estava apenas estudando o tecido, isso é importante para o meu projeto.\""
 fund_inspiration.3012.t: "Você está levando isso longe demais, estude suas próprias roupas se precisar!"
 fund_inspiration.3012.desc: "Se [inspiration_owner.GetSheHe] diz que é necessário, então é necessário."
 fund_inspiration.3012.a: "Talvez algo relacionado à vida na corte."
 fund_inspiration.3012.a.tt: "$fund_inspiration.title$ Composição em Vermelho, Azul e [ROOT.Char.GetTitleAsNameNoTooltip]"
 fund_inspiration.3012.b: "Visito meu ateliê de tecelagem para ver como minha tapeçaria está progredindo. Dentro há alguns cortesãos. Todos estão examinando as paredes, com as mãos cruzadas atrás das costas. As tapeçarias presentes são peculiares manchas de cor. Uma tem borrões desajeitados aqui e ali. Outra é branca com alguns quadrados. Outra tem linhas emaranhadas que giram. Que tipo de arte é esta?\n\n[artistic_courtier_1.GetTitledFirstNameNoTooltip|l] aponta para uma seção que parece uma mancha. "Não é verdade que este marrom sujo sobre o branco realmente sugere a violência inerente ao homem?"\n\n[artistic_courtier_2.GetTitledFirstNameNoTooltip|l] assente. "Acho que isso mostra [inspiration_owner.GetTitledFirstNameNoTooltip|l] em fúria contra sua infância — parece ter a forma de sua mãe"."
 fund_inspiration.3012.b.tt: "Concorde com compreensão e elogie o artista."
 fund_inspiration.3013.t: "\"Repugnante! Eu preciso ir ver alguma arte tradicional agora.\""
 fund_inspiration.3013.desc: "Seu investimento é devolvido e o trabalho é cancelado."
 fund_inspiration.3013.a: "\"[child.GetTitledFirstNameNoTooltip|l] poderia ter feito isso!\""
 fund_inspiration.3013.a.tt: ""Chegou a hora de eu partir para minha aventura, meu [ROOT.Char.GetTitleTierName]". [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se inclina o máximo que consegue, esmagad[inspiration_owner.Custom('ES_OA')] por pesados fardos.\n\n"Mas, antes de eu ir, digam-me, por favor, há algo específico ao qual queiram que eu fique de olho durante minha viagem?"."
 fund_inspiration.3013.b: "Traga-me algo de um animal exótico, um crânio ou uma pele."
 fund_inspiration.3013.b.tt: "Quero uma bugiganga feita de um material que você não pode encontrar aqui."
 fund_inspiration.3014.t: "Uma tapeçaria ou obra de arte que me faz desejar estar lá."
 fund_inspiration.3014.desc: "Eu confio nos seus instintos para me trazer algo ótimo."
 fund_inspiration.3014.a: "Eu quero possuir algo verdadeiramente único!"
 fund_inspiration.3014.a.tt: "$fund_inspiration.title$ Uma mudança de direção"
 fund_inspiration.3014.b: "Trazem perante mim um viajante que afirma trabalhar para [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)] e traz uma mensagem [inspiration_owner.Custom('ES_DelDela')] aventureir[inspiration_owner.Custom('ES_XA')].

"Não temais, meu grande [ROOT.Char.GetLadyLord], pois [inspiration_owner.GetTitledFirstNameNoTooltip] goza de boa saúde. Trago-vos notícias sobre a possibilidade de financiar uma aventura ainda maior! Vede, [inspiration_owner.GetTitledFirstNameNoTooltip] deve ter tomado o caminho errado e agora se encontra perto de [adventuring_location.GetNameNoTier]."

O companheiro de viagem de [inspiration_owner.GetFirstNameNoTooltip] desenrola um mapa sujo para me mostrar onde eles acabaram. "[inspiration_owner.GetSheHe|U] tem fundos suficientes para chegar a [inspiration_owner.Custom('InspirationAdventureDestination')], como planejado, mas sugere que, com financiamento adicional, poderia investigar um rumor local e trazer para casa um grande artefato.""
 fund_inspiration.3014.b.tt: "Que ridículo! Não vou financiar sua #EMP excursão autocomplacente#!!"
 fund_inspiration.3015.t: "[inspiration_owner.GetTitledFirstNameNoTooltip|l] retorna ao que se propôs a fazer."
 fund_inspiration.3015.desc: "A vida é uma aventura, explore essa área em busca de artefatos!"
 fund_inspiration.3015.a: "[inspiration_owner.GetTitledFirstNameNoTooltip|l] explora [adventuring_location.GetNameNoTierNoTooltip]."
 fund_inspiration.3015.a.tt: "[inspiration_owner.GetTitledFirstNameNoTooltip|l] focará sua escrita em temas como conspiração e manipulação"
 fund_inspiration.3015.b_men: "Quero homens aos meus pés!"
 fund_inspiration.3015.b_women: "A estepe e o galope da sela atravessam meu coração,"
 fund_inspiration.3015.b_both: "Tenho passado meses a cavalo. Meu traseiro jamais se recuperará! Acabei me acostumando ao gosto do leite de égua fermentado e às noites ao relento.\n\nCom este mensageiro, envio-vos uma ponta entalhada de um Morin Khuur — a cabeça de cavalo decorativa colocada no topo dos instrumentos. Talvez possais lhe dar uso."
 fund_inspiration.3015.b_none: "Vou guardar isso!"
 fund_inspiration.3015.b.tt: "Envie para o Músico da Corte."
 fund_inspiration.3030.t: "$fund_inspiration.title$ Ódio Refrescante"
 fund_inspiration.3030.desc_opening: "Minha viagem pela Índia continua!"
 fund_inspiration.3030.desc: "Quase fico cego com todas as joias que me mostram nas cortes que visito. Dou por mim a desejar a sujeira das estradas abertas.\n\nEnviei um mensageiro com um presente especialmente de mau gosto que me deram — um adorno em anel com uma cabeça de tigre, com joias no lugar dos olhos. Você já viu algo tão espalhafatoso?"
 fund_inspiration.3030.desc_dead: "Eu até gosto, [inspiration_owner.Custom('ES_ElElla')] ele perde com isso."
 fund_inspiration.3030.a: "Horrível! Desmonte e venda as gemas."
 fund_inspiration.3030.a.tt: "[inspiration_owner.GetTitledFirstNameNoTooltip|l] continua escrevendo sobre seu ódio por [prev_nemesis.GetTitledFirstName|l]"
 fund_inspiration.3030.b: "Sonho com o deserto,"
 fund_inspiration.3031.t: "Meu suserano[inspiration_sponsor.Custom('ES_XA')] meu[inspiration_sponsor.Custom('ES_OA')] , minha viagem pela África segue em andamento, e juntei-me a uma caravana de camelos que atravessa a terra de lado a lado.\n\nEnvio-vos uma joia que um dos meus companheiros de viagem me deu — um colar delicadíssimo coberto de contas feitas de casca de avestruz. Imagino que não tenhais visto um avestruz."
 fund_inspiration.3031.desc: "Uma boa descoberta! Vou usá-lo."
 fund_inspiration.3031.desc_dead: "Darei a ele [event_spouse.Custom('ES_AlAla')] [event_spouse.GetTitledFirstNameNoTooltip|l]."
 fund_inspiration.3031.a: "O que é o amor sem desejo e perda?"
 fund_inspiration.3031.a.tt: "Ah, ser um peregrino,"
 fund_inspiration.3031.b: "Minha jornada pelo Oriente Médio consiste principalmente em lutar contra hordas de vendedores ambulantes nos caminhos dos peregrinos.\n\nMuitas vezes, para não atrasar demais minha missão, cedo e compro alguma de suas bugigangas. Enviei um mensageiro levando essas quinquilharias ao seu encontro. Talvez elas lhe proporcionem alguma diversão."
 fund_inspiration.4001.t: "De que serve um[inspiration_owner.Custom('ES_XA')] aventureir[inspiration_owner.Custom('ES_OA')] que segue os caminhos conhecidos?"
 fund_inspiration.4001.desc: "Essas são algumas bijuterias bonitas..."
 fund_inspiration.4001.a: "Você está levando isso longe demais, estude suas próprias roupas se precisar!"
 fund_inspiration.4001.b: "Minhas aventuras estão encharcadas,"
 #Weaver is being too much of a modernist
 fund_inspiration.4010.t: "Isso não é um feriado! Continue a busca!"
 fund_inspiration.4010.desc: "Pobre alma, suponho que essas recompensas sejam suficientes."
 fund_inspiration.4010.a: "Você permite que [inspiration_owner.GetTitledFirstName|l] volte para casa"
 fund_inspiration.4010.b: "\"Repugnante! Eu preciso ir ver alguma arte tradicional agora.\""
 fund_inspiration.4010.b.tt: "Saudações da Anatólia,"
 fund_inspiration.4010.c: "Minhas viagens por a Ásia Menor me deixaram com um grande apreço por cordeiro, iogurte e berinjelas, e envio algumas receitas com este mensageiro.\n\nUm dos meus anfitriões me presenteou com um broche de ouro adornado com um cavalo-marinho, que também lhe envio. Estou segur[inspiration_owner.Custom('ES_OA')] de que minhas viagens trarão mais maravilhas no devido tempo."
 fund_inspiration.5011.desc: "Ordene que nossos chefs preparem esses pratos imediatamente!"
 fund_inspiration.5011.a: "Não sei se {T0} está se divertindo demais nesta missão…"
 fund_inspiration.5011.b: "Quero uma bugiganga feita de um material que você não pode encontrar aqui."
 fund_inspiration.5011.c: "Uma tapeçaria ou obra de arte que me faz desejar estar lá."
 fund_inspiration.5011.d: "$fund_inspiration.title$ Um[ROOT.Char.Custom('ES_XA')] governante modelo"
 fund_inspiration.5011.e: "[inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] capta minha atenção com alegria. "[ROOT.Char.Custom('FormOfAddressForLiege')|U], terminei um protótipo em miniatura do baú que me encomendaste, com fechadura e tudo".\n\nEstende a mão e nela há um baú minúsculo, revestido de folha de ouro e uma chave do tamanho de um grão de arroz.\n\n"Lá dentro há uma gema; experimente". Quando ele me entrega, a chave escorrega entre seus dedos e sai voando. Por mais que procure, não há sinal dela."
 fund_inspiration.5021.t: "Acabe com essa farsa, quebre o baú e devolva minha pedra!"
 fund_inspiration.5021.desc: "Trazem perante mim um viajante que afirma trabalhar para [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)] e traz uma mensagem [inspiration_owner.Custom('ES_DelDela')] aventureir[inspiration_owner.Custom('ES_XA')].

"[inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] segura uma caixinha minúscula, com entalhes finíssimos, da espessura de um fio de cabelo, gravados nela. "O protótipo da vossa última encomenda. Não quero que se perca. Podemos encontrar-lhe uma utilidade."

[antiquarian.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se anima. "Podíamos colocar nela uma relíquia do nosso tempo e enterrá-la em algum lugar — criar uma lembrança para que as crianças do futuro a descubram!""

O companheiro de viagem de [inspiration_owner.GetFirstNameNoTooltip] desenrola um mapa sujo para me mostrar onde eles acabaram. "Eu escreverei um poema pequeno e o selarei dentro."
 fund_inspiration.5021.a: "Eu prefiro ficar com ela."
 fund_inspiration.5021.a.tt: "[inspiration_owner.GetTitledFirstNameNoTooltip|l] retorna ao que se propôs a fazer."
 fund_inspiration.5021.b: "Eu estava me preparando para me deitar quando uma dor lancinante atravessa meu pé.

Ao examiná-lo, encontro uma escultura em miniatura incrustada na sola do pé, da qual sobressaem outros pezinhos.

[inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me olha timidamente da porta mais próxima. "Perdão, é o protótipo da sua última encomenda. Devo tê-lo deixado cair.""
 fund_inspiration.5021.b.tt: "\"Retire isso e tire-o da minha vista!\""
 ## Postcards from your Adventurer by Isabella Welch
 #Steppe
 fund_inspiration.6001.t: "Miniatura retirada com segurança."
 fund_inspiration.6001.desc: "Miniatura teimosa."
 fund_inspiration.6001.a: "Um pedaço da escultura foi deixado dentro do seu pé."
 fund_inspiration.6001.b: "Envie para o Músico da Corte."
 #India
 fund_inspiration.6002.t: "Por sua causa, isso deve ser apenas um protótipo."
 fund_inspiration.6002.desc: "Oh, é perfeito! Eu adoro!"
 fund_inspiration.6002.a: "Eu até gosto, [inspiration_owner.Custom('ES_ElElla')] ele perde com isso."
 fund_inspiration.6002.b: "[inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me traz uma caixinha e me a apresenta com um sorriso.\n\nQuando abro o presente, espero uma joia, um anel ou uma escultura, mas, para minha surpresa, dentro há um trono em miniatura, tão pequeno que só um rato poderia se sentar nele.\n\n"O protótipo de seu novo assento, [ROOT.Char.Custom('FormOfAddressForLiege')]. Pensei que isso o divertiria"."
 #Africa
 fund_inspiration.6003.t: "Tudo bem, mas continue com o projeto."
 fund_inspiration.6003.desc: "Eu sou #EMP muito#! crescido para brincar com brinquedos."
 fund_inspiration.6003.a: "Uma boa descoberta! Vou usá-lo."
 fund_inspiration.6003.b: "Carrego com orgulho minha caixa de móveis em miniatura pelo meu [ROOT.Char.Custom('FortifiedBuilding')], perguntando-me onde posso exibi-los melhor, quando esbarro em [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)].\n\nQuando vê o interior da caixa, enxuga uma lágrima. "Alguém de bom gosto, venha comigo".\n\nLeva-me até sua oficina e traz uma caixa secreta. Dentro há dezenas de peças de cenário, figuras e terrenos em miniatura. "Inventei um jogo — uma batalha de cerco fantasiosa. Você gostaria de se juntar a mim?""
 #Middle East
 fund_inspiration.6004.t: "Hmm, talvez outra hora."
 fund_inspiration.6004.desc: "Minha jornada pelo Oriente Médio consiste principalmente em lutar contra hordas de vendedores ambulantes nos caminhos dos peregrinos.\n\nMuitas vezes, para não atrasar demais minha missão, cedo e compro alguma de suas bugigangas. Enviei um mensageiro levando essas quinquilharias ao seu encontro. Talvez elas lhe proporcionem alguma diversão."
 fund_inspiration.6004.a: "$fund_inspiration.title$ Composição em Vermelho, Azul e [ROOT.Char.GetTitleAsNameNoTooltip]"
 fund_inspiration.6004.b: "Vou até a oficina do meu tecelão para ver como anda minha tapeçaria. Dentro há alguns cortesãos. Todos estão examinando as paredes, com as mãos atrás das costas. As tapeçarias presentes são estranhas manchas de cor. Uma tem borrões desajeitados aqui e ali. Outra é branca com alguns quadrados. Outra tem linhas emaranhadas girando. Que tipo de arte é esta?\n\n[artistic_courtier_1.GetTitledFirstName|l] aponta para uma seção que parece uma mancha. "Não é verdade que esse marrom imundo sobre o branco realmente sugere a violência inerente ao homem?"\n\n[artistic_courtier_2.GetTitledFirstNameNoTooltip|l] assente. "Acho que isso mostra a ira [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitledFirstNameNoTooltip|l] contra sua infância — parece ter o formato de sua mãe"."
 #Europe
 fund_inspiration.6005.t: "\"Nojento! Devo ir procurar alguma arte tradicional agora.\""
 fund_inspiration.6005.desc: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], até o momento encontrei algumas relíquias já bem conhecidas em minhas aventuras, que lhe envio com este mensageiro, mas não tenho certeza do que mais posso descobrir.

Os europeus são as criaturas mais fedorentas que já encontrei. Quando era crianç[inspiration_owner.Custom('ES_OA')], sonhava com os prados verdes e agradáveis, mas estou convencid[inspiration_owner.Custom('ES_OA')] de que metade deste mundo é feita de lama. Se sois um[inspiration_sponsor.Custom('ES_XA')] senhor[inspiration_sponsor.Custom('ES_XA')] generos[inspiration_sponsor.Custom('ES_OA')], por favor, ordene meu retorno."
 fund_inspiration.6005.a: "$fund_inspiration.title$ Estrofe infeliz"
 fund_inspiration.6005.b: "Dou de cara com [inspiration_owner.GetTitledFirstName|l] em sua escrivaninha, olhando pela janela, com muitos rascunhos borrados diante de [inspiration_owner.GetSheHe].\n\n"
 fund_inspiration.6005.b.tt: "\"A ideia de alguém me amar é impossível. Eu nunca sussurrei palavras de sentimento para alguém que as devolvesse.\"\n\n\"Assim, eu não tenho escrito para você - apenas conto as noites desde que deitei com alguém e desespero.\""
 #Asia minor
 fund_inspiration.6006.t: ""Ah, [ROOT.Char.Custom('FormOfAddressForLiege')]. Passei muitas horas tentando compor uma obra romântica digna do vosso patronato, mas não fiz nada além de chorar sobre meu pergaminho".\n\n"Pedis-me que faça o impossível. Meu amor é de um tipo que deve permanecer sem ser escrito"."
 fund_inspiration.6006.desc: "Ótimo! Canalize essa raiva agridoce!"
 fund_inspiration.6006.a: "Você faz [inspiration_owner.GetShortUIName] desprezar o amor."
 fund_inspiration.6006.b: "Você persuade [inspiration_owner.GetShortUIName] a escrever sobre amor."
 #Miniature furniture events by Isabella Welch
 #Artisan gives you a tiny chest and loses the tiny key
 fund_inspiration.6100.t: "Mas é um amor para ser vivido."
 fund_inspiration.6100.desc: "Escreva sua verdade, abençoo todas as musas."
 fund_inspiration.6100.a: "Invente algo! Todos que escrevem sobre amor são fraudes."
 fund_inspiration.6100.b: "Ainda é charmoso, acho que vou ficar com ele."
 #The tiny box
 fund_inspiration.6101.desc: "[inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] segura uma caixinha minúscula, com entalhes finíssimos, da espessura de um fio de cabelo, gravados nela. "O protótipo da vossa última encomenda. Não quero que se perca. Podemos encontrar-lhe uma utilidade."

[antiquarian.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se anima. "Na noite em que me disseste para escrever com o coração, descobri que só conseguia escrever sobre você. Deixa-me interpretar o vilão, se a fé chama nosso tipo de amor de perverso[inspiration_owner.Custom('ES_OA')]."
 fund_inspiration.6101.a: "Nunca senti minhas palavras fluírem como depois que me pediste para escrever um conto de amor como eu o experimento."
 fund_inspiration.6101.b: "\n\nAqui está um poema sobre uma bruxa que se apaixona por uma rainha que se perde na floresta perto de sua casa."
 fund_inspiration.6101.c: "\n\nAqui está uma balada sobre um príncipe que observa as estrelas com sua amada arquivista todas as noites no topo da torre da biblioteca, sonhando em se amar nos céus."
 #Stepping on the tiny sculpture
 fund_inspiration.6102.desc: "Eu estava me preparando para me deitar quando uma dor lancinante atravessa meu pé.

Ao examiná-lo, encontro uma escultura em miniatura incrustada na sola do pé, da qual sobressaem outros pezinhos.

[inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me olha timidamente da porta mais próxima. "Em uma visita a uma taverna de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], avisto um[inspiration_owner.Custom('ES_XA')] d[inspiration_owner.Custom('ES_LoLa')]s frequentador[inspiration_owner.Custom('ES_OA')]s no centro de toda a atenção.

[inspiration_owner.GetSheHe|U] é mais grisalh[inspiration_owner.Custom('ES_OA')] que o resto dos clientes, e cheira como se estivesse ali há uma era. Para meu horror, reconheço meu aventureir[inspiration_owner.Custom('ES_OA')] [inspiration_owner.GetTitledFirstName], que parece não ter saído da terra natal após meses de financiamento!

"E para minha próxima jornada, atravessarei o Mar Vermelho em um único gole!" [inspiration_owner.GetSheHe|U] esvazia prontamente uma taça inteira de vinho tinto, e vivas ecoam pelo salão de bebidas."
 fund_inspiration.6102.a: "Saia daqui e siga em frente!"
 fund_inspiration.6102.b: "Charlatão[inspiration_owner.Custom('ES_OA')]! Não vou pagar nem mais uma bebida sua!"
 fund_inspiration.6102.c: "Você convence [inspiration_owner.Custom('ES_AlAla')] aventureir[inspiration_owner.Custom('ES_OA')] a se recompor"
 fund_inspiration.6102.cure_toast: "A aventura continua!"
 fund_inspiration.6102.failure_toast: "Meu aventureiro[inspiration_owner.Custom('ES_OA')] foge com o ouro!"
 fund_inspiration.6102.failure_toast_desc: "$fund_inspiration.title$ Trazendo Música para a Selva"
 #Being shown the tiny cabinet
 fund_inspiration.6103.desc: "\n\n"Tenho andado pela selva a pé. O canto dos pássaros martela meu crânio, e isso me parece de fato um canto lúgubre. Os poucos habitantes daqui me dizem que lhes parece a música mais agradável. Está claro que nunca ouviram as obras de [court_musician.GetTitledFirstNameNoTooltip|l].\n\n"Tentei tocar uma de suas melodias em uma de suas flautas de cana, e os habitantes locais me expulsaram de sua cidade e me feriram com uma lâmina envenenada. Embora eu tenha sobrevivido, pensei: "se eu morrer levando música de câmara à selva, que assim seja!"."
 fund_inspiration.6103.a: "\n\n'Você pode imaginar o que fiz em seguida...'"
 fund_inspiration.6103.b: "Você começou a cantar e conquistou a simpatia deles!"
 #Artisan gives you the tiny throne
 fund_inspiration.6104.desc: "Um grande felino se interpôs entre você e seus agressores!"
 fund_inspiration.6104.a: "Meu aventureiro[inspiration_owner.Custom('ES_OA')] encanta os habitantes da selva"
 fund_inspiration.6104.b: "Meu aventureiro[inspiration_owner.Custom('ES_OA')] irrita os habitantes da selva"
 fund_inspiration.6104.c: "[inspiration_owner.Custom('ES_ElLa')|U] aventureir[inspiration_owner.Custom('ES_OA')] sai disparad[inspiration_owner.Custom('ES_OA')]"
 #Artisan and ROOT play with their miniatures
 fund_inspiration.6105.desc: "Meu aventureiro[inspiration_owner.Custom('ES_OA')] ajuda a expulsar o leopardo"
 fund_inspiration.6105.a: "Meu aventureiro[inspiration_owner.Custom('ES_OA')] fica ferido[inspiration_owner.Custom('ES_OA')] ao tentar fugir"
 fund_inspiration.6105.b: "$fund_inspiration.title$ Viagem por Terra"
 #Weaver is being too much of a modernist
 fund_inspiration.6200.t: "Espero que tenham voltado e cortado as perdas."
 fund_inspiration.6200.desc: "O barco quase não sobreviveu à jornada."
 fund_inspiration.6200.a: "Meu aventureiro[inspiration_owner.Custom('ES_OA')] arrasta um barco por um penhasco"
 fund_inspiration.6200.b: "Meu aventureir[inspiration_owner.Custom('ES_OA')] encalhad[inspiration_owner.Custom('ES_OA')] tentando consertar um barco quebrado."
 fund_inspiration.6200.b.tt: "Os habitantes locais tiveram pena e deram a você um novo barco com desconto."
 fund_inspiration.6200.c: "$fund_inspiration.title$ Sede Ardente"
 #Poet is uninspired, does not feel they understand love at the moment by Isabella Welch
 fund_inspiration.6300.t: "Ah, eu também sinto sede, e não estou no deserto."
 fund_inspiration.6300.intro: "Eu poderia considerar sua atenção se você trouxesse um grande prêmio."
 fund_inspiration.6300.no_relationship_desc: "Eu culpo o calor e queimo essas palavras."
 fund_inspiration.6300.no_love_desc: "$fund_inspiration.title$ Sussurros Pontianos"
 fund_inspiration.6300.homosexual_desc: "\n\n"Aventurei-me dentro de um kurgan, um antigo monte funerário da época dos citas. Centenas de cavalos mortos há muito tempo, empalhados, preservados e pregados às paredes para permanecerem em pé, cada um em seu próprio recinto. Era um estábulo dos condenados, perdido no tempo.\n\n"Lembrando-me do meu dever de buscar conhecimento para nosso domínio, considerei roubar uma relíquia do túmulo quando meu guia não estivesse olhando para trazê-la a você."
 fund_inspiration.6300.a: "Você colocou um dos ornamentos no bolso."
 fund_inspiration.6300.a.failure: "Você trouxe a sela de um dos cavalos para o nosso estudo."
 fund_inspiration.6300.a.success: "Você não ousou perturbar os mortos."
 fund_inspiration.6300.b: "$fund_inspiration.title$ Amante de [inspiration_owner.GetLadyLord|U] [inspiration_owner.GetFirstNameNoTooltip]"
 fund_inspiration.6300.c: "\n\n"Ejem, [ROOT.Char.Custom('FormOfAddressForLiege')], no decorrer de minhas viagens, fiquei em uma fazenda cuidada por [adventurer_lover.Custom('ES_ElLa')] [adventurer_lover.GetTitledFirstName|l]."
 fund_inspiration.6300.d: "\n\n"Forjei um bom artefato enquanto estava na fazenda! Mais precisamente, um filho! Embora isso possa parecer uma imposição, não posso levar a [adventurer_lover.GetTitledFirstName|l] em minhas viagens em seu estado. Ela não tem muita riqueza, e espero que possamos cuidar de [adventurer_lover.GetSheHe] na corte"."
 fund_inspiration.6300.e: "\n\n"Depois de tantas luas so[inspiration_owner.Custom('ES_OA')] na estrada, [adventurer_lover.GetSheHe] agita meu coração como uma criatura fantástica. Não consigo evitar pensar que este era o destino para o qual minha busca deveria me levar."
 fund_inspiration.6300.f: "\n\n'Livre dos olhos da corte, pude deitar nos braços de um homem por noites a fio.'"
 #Poet sends you a book on same sex love if you requested it, as a side project by Isabella Welch
 #fund_inspiration.6301.lover_t: "Não posso me afastar desta fazenda, sabendo que talvez nunca mais beije[adventurer_lover.GetHerHim] nunca. Ou [adventurer_lover.GetSheHe] viaja até você e se junta à nossa corte, ou minha jornada termina aqui.'"
 #fund_inspiration.6301.friend_t: "Saia daqui, se você desrespeitar meu patrocínio."
 fund_inspiration.6301.t: "[inspiration_owner.GetTitledFirstName] ficará na fazenda."
 fund_inspiration.6301.lover_desc: "Permitirei, mas não me culpe pelo escândalo."
 fund_inspiration.6301.friend_desc: "A criança não merece viver na pobreza."
 fund_inspiration.6301.female_desc: "CAMPEÕES? Na MINHA corte? NEM PENSAR."
 fund_inspiration.6301.male_desc: "$fund_inspiration.title$ Capítulo da Praia"
 fund_inspiration.6301.crime_desc: "\n\n"Enquanto eu me sufocava com o calor do deserto, descobri águas cristalinas, cuja mera visão me obrigou a tirar toda a roupa. Em vez de encarar isso como uma ofensa, meu guia riu com calma compreensão e começou a desenhar minha figura em uma folha. Nossos companheiros de viagem abanaram folhas de palmeira para me refrescar, num serviço ao qual eu poderia me afeiçoar.\n\n"Passamos muitas horas felizes nos divertindo na água. Na aldeia seguinte, contratei um tecelão para registrar o momento paradisíaco, e lhes envio uma lembrança com este mensageiro"."
 fund_inspiration.6301.a: "Meus olhos! Meus olhos!"
 fund_inspiration.6301.b: "Eu arrancaria meus olhos se já não fosse cego."
 #Adventurer hasn't actually gone on the adventure!
 fund_inspiration.6400.t: "Vou pendurá-lo no meu quarto!"
 fund_inspiration.6400.desc: "Em uma visita a uma taverna de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], avisto um[inspiration_owner.Custom('ES_XA')] d[inspiration_owner.Custom('ES_LoLa')]s frequentador[inspiration_owner.Custom('ES_OA')]s no centro de toda a atenção.

[inspiration_owner.GetSheHe|U] é mais grisalh[inspiration_owner.Custom('ES_OA')] que o resto dos clientes, e cheira como se estivesse ali há uma era. Para meu horror, reconheço meu aventureir[inspiration_owner.Custom('ES_OA')] [inspiration_owner.GetTitledFirstName], que parece não ter saído da terra natal após meses de financiamento!

"Recebo uma missiva do meu aventureiro[adventurer.Custom('ES_OA')]. Está tão coberta de lama que preciso abri-la com uma faca.\n\n"
 fund_inspiration.6400.a: "'Meu [ROOT.Char.GetLadyLord], estou em um pântano úmido, e todos os meus anos de tutela não me prepararam para isso. Estou caminhando através de lodos escorregadios noite e dia. Na noite passada, sonhei com um abraço amoroso e acordei com um tritão nos meus lábios em vez de uma língua.

'Estava me perguntando se haveria uma pequena chance de eu ir para um local mais #EMP civilizado#!. Como prova de quão obsceno este lugar é, enviei a desova que uma rã deixou em minhas botas encharcadas dentro de um frasco junto com minha mensagem.'"
 fund_inspiration.6400.b: "Isso fortalece o caráter!"
 fund_inspiration.6400.a.success: "Se você deseja ir para terras mais amenas, pode ir."
 fund_inspiration.6400.a.success_continue: "A aventura continua!"
 fund_inspiration.6400.a.failure: "$fund_inspiration.title$ Não as abelhas!"
 fund_inspiration.6500.t: "Recebo uma missiva do meu aventureiro[adventurer.Custom('ES_OA')]. Suas linhas estão manchadas com um respingo de sangue."
 fund_inspiration.6500.introduction: "

'As planícies e campinas por onde vagueio estão magnificamente adornadas com fauna e flora. Ao desmontar do meu corcel e inclinar-me para cheirar uma flor, projetou-se sobre mim a sombra de [grumpy_liege.GetTitledFirstName], senhor[grumpy_liege.Custom('ES_XA')] destas terras, um[grumpy_liege.Custom('ES_XA')] [grumpy_liege.GetWomanMan] que não tem uma boa opinião sobre você.

'"Os vermes de [ROOT.Char.GetTitledFirstNameNoTooltip] não sugarão meus prados." [grumpy_liege.GetSheHe|U] desmontou e ordenou aos guardas que me prendessem. Tiraram uma caixa que continha uma colmeia e a colocaram à força na minha cabeça! Fui #EMP atacado por abelhas#!! Ainda tenho um ferrão cravado no olho!'"
 fund_inspiration.6500.desc: "Vou enviar algumas denúncias para [grumpy_liege.Custom('ES_ElElla')]!"
 fund_inspiration.6500.action: "Isso lhe custará a cabeça!"
 fund_inspiration.6500.a: "As cicatrizes parecerão bastante atraentes!"
 fund_inspiration.6500.b: "Você fugiu para terras mais civilizadas."
 fund_inspiration.6500.c: "$fund_inspiration.title$ Arquitetos da Natureza"
 fund_inspiration.6500.a.success: "Recebo uma missiva do meu aventureir[inspiration_owner.Custom('ES_OA')], que esteve nas terras gélidas das florestas da taiga.\n\n"
 fund_inspiration.6500.a.failure: "Passei algum tempo cercado pela melhor companhia que um[inspiration_owner.Custom('ES_XA')] viajante[inspiration_owner.Custom('ES_OA')]: uma colônia de castores! Com este mensageiro, envio a você um livro de esboços das estruturas que eles usam para pescar nas águas! Ah, ser um roedor semiaquático!\n\n"
 fund_inspiration.6500.b.success: "Tenho certeza de que [court_architect.GetTitledFirstName|l] poderia aprender pelo menos uma coisa ou duas com um animal mais inteligente do que [court_architect.GetSheHe]."
 fund_inspiration.6500.b.failure: "Vou estudar isso minuciosamente."
 fund_inspiration.6500.c.tt: "Realmente, [court_architect.GetTitledFirstNameNoTooltip|l] poderia aprender uma lição."
 fund_inspiration.6500.c.tt_failure: "A aptidão arquitetônica de [court_architect.GetTitledFirstName|l] aumenta ligeiramente"
 fund_inspiration.6501.t: "Que animais mais #EMP adorables#!! [child.GetFirstNameNoTooltip] precisa ter este livro!"
 fund_inspiration.6501.desc: "Bom trabalho, enviarei fundos para estender suas viagens."
 fund_inspiration.6501.a: "Espero que tenham voltado e cortado as perdas."
 fund_inspiration.6501.b: "$fund_inspiration.title$ Sussurros de uma Fera"
 fund_inspiration.6501.b.success: "Recebo uma missiva do meu aventureir[inspiration_owner.Custom('ES_OA')], que tem estado navegando em uma balsa por planícies alagadas."
 fund_inspiration.6501.b.failure: "\n\nMeu [ROOT.Char.GetLadyLord], em nossas viagens, fomos perseguidos por uma criatura tão terrível que quase reluto em escrever sobre ela.\n\nO crocodilo pode alcançar até 15 metros de comprimento e é um monstro que engoliu uma de nossas mulas inteira. É uma fera esguia, com um corpo em forma de flecha, com um bico na frente e uma cauda ruidosa na parte traseira. Os espinhos e protuberâncias que o cobrem são venenosos ao toque."
 fund_inspiration.6501.c: "Impressionaremos os visitantes com uma tapeçaria desta fera!"
 fund_inspiration.6502.t: "Oh, é horrível demais para ser verdade!"
 fund_inspiration.6502.desc: "Eu sei o que é um crocodilo, imbecil!"
 fund_inspiration.6502.a: "Ah, eu também sinto sede, e não estou no deserto."
 fund_inspiration.6502.b: "$fund_inspiration.title$ Homens em Meias-calças"
 fund_inspiration.6502.c: "Recebo uma missiva do meu aventureir[inspiration_owner.Custom('ES_OA')], que tem estado rondando entre a serrapilheira da floresta."
 fund_inspiration.6503.t: "\n\n"Perdoai-me, [ROOT.Char.Custom('FormOfAddressForLiege')], mas na floresta encontrei um bando de justiceiros que roubam gente como vós. Enfrentados ao punho autoritário [enemy_liege.Custom('ES_DelDela')] [enemy_liege.GetTitledFirstName|l] que governa aqui, roubam tudo o que podem emboscando os nobres. Meu coração se juntou a esse bando de fora da lei, e não creio que voltarei à corte.\n\n"Além disso, suas meias-calças também ficam muito melhores do que a moda de vossa corte e me caem muito bem"."
 fund_inspiration.6503.desc: "Talvez você possa me ajudar a fazer mais pelos pobres?"
 fund_inspiration.6503.a: "Se você não voltar, enviarei um assassino atrás de você!"
 fund_inspiration.6503.b: "Você intimida [inspiration_owner.GetTitledFirstNameNoTooltip|l]"
 fund_inspiration.6503.c: "A aventura continua"
 fund_inspiration.6504.t: "[inspiration_owner.GetSheHe|U] foge da sua corte."
 fund_inspiration.6504.desc: "Você não impressiona [inspiration_owner.GetTitledFirstNameNoTooltip|l]"
 fund_inspiration.6504.pregnant: "Aproveite a sua vida de miséria!"
 fund_inspiration.6504.female_lover: "$fund_inspiration.title$ Andarilho no Mar de Neve"
 fund_inspiration.6504.male_lover_homosexual: "Recebo uma missiva do meu aventureir[inspiration_owner.Custom('ES_OA')] e, após as primeiras linhas, sei que será a última."
 fund_inspiration.6504.male_lover: "\n\n"Minha velhice me trouxe muitas maravilhas em meu tempo. Quando alcancei o cume nevado da montanha de onde agora escrevo estas palavras, o único ser vivo sobre um mar de névoa, soube que jamais voltaria a ver tamanha beleza pelo resto de meus dias.\n\n"Nunca foi meu desejo voltar da montanha, e agora vocês podem presumir que sou um[inspiration_owner.Custom('ES_OA')] com o gelo. Não choreis, pois eu não poderia ter feito אחרת. Minha marcha para [inspiration_owner.GetFaith.PositiveAfterLife] é tão firme quanto uma geleira"."
 fund_inspiration.6504.lover_ultimatum: "\n\n"Não sou mais do que uma coisa miserável e retorcida agora que minha saúde e meu corpo me traem. Mas, neste estado, nunca pensei que seria capaz de presenciar tal espetáculo: um reino nevado de nuvens e névoa do alto de uma montanha. Uma flor tão murcha não merece esta beleza.\n\n"Sabendo que minha hora talvez chegue a qualquer momento, decidi me entregar ao gelo. Talvez o frio me conserve intacto."
 fund_inspiration.6504.a: "\n\n"Eu estava no topo de uma montanha no momento mais cruel. Cada floco de neve em minha face mordida era o riso do inverno, o vilão. Já vi batalhas, mas nenhuma violência tão requintada quanto este duelo contra o sangue do meu próprio corpo. Minha mão dominante funciona bem o suficiente para escrever isto, mas a outra não tanto.\n\n"Saibam que fiquei verdadeiramente feliz por ter visto o mundo como o vi, e considero os demais vivos mais pobres do que eu"."
 fund_inspiration.6504.a.tt: "Nunca houve um[inspiration_owner.Custom('ES_XA')] maior amante do perigo!"
 fund_inspiration.6504.b: "$fund_inspiration.title$ [ROOT.Char.GetTitleAsNameNoTooltip|U] da Montanha"
 fund_inspiration.6504.c: "Recebo uma missiva de meu aventureiro[inspiration_owner.Custom('ES_OA')] e ela está coberta de poeira avermelhada, por sua jornada pelas montanhas desérticas."
 fund_inspiration.6504.d: "\n\n"Escalei outra fera, e sobre esses milhares de planaltos planos, não vi nenhum sinal de que outr[inspiration_owner.Custom('ES_OA')] [inspiration_owner.GetWomanMan] tenha pisado esta rocha. Hoje, enfrentei a maior altura que já escalei até agora.\n\n"Acho que a rocha clama por um nome digno, para comemorar esta conquista supervisionada pelo melhor [ROOT.Char.GetTitleAsNameNoTooltip] do cosmos"."
 fund_inspiration.6505.t: "Tenho certeza de que os locais já deram um nome para a montanha."
 fund_inspiration.6505.desc: "'Rocky' - um nome bobo!"
 fund_inspiration.6505.a: "'Lâmina do Deus da Guerra [ROOT.Char.GetFaith.WarGodNamePossessive]'"
 fund_inspiration.6505.a_blind: "'Manopla do Deus do Destino [ROOT.Char.GetFaith.FateGodNamePossessive]'"
 fund_inspiration.6505.a_one_eyed: "O nome do meu amado[lover.Custom('ES_OA')] [lover.GetFirstNameNoTooltip]."
 fund_inspiration.6505.b: "Dente de [ROOT.Char.GetFirstNameNoTooltip]!"
 fund_inspiration.6505.c: "Bastão de [ROOT.Char.GetFirstNameNoTooltip]!"
 fund_inspiration.6505.d: "Desgraça de [rival.GetFirstNameNoTooltip]!"
 #Adventurer unhappy about being in the swamp
 fund_inspiration.6506.t: "$fund_inspiration.title$ Não é um squalor irrazoável"
 fund_inspiration.6506.introduction: "$fund_inspiration.title$ Um nome para lembrar"
 fund_inspiration.6506.desc: "'Meu [ROOT.Char.GetLadyLord], estou em um pântano úmido, e todos os meus anos de tutela não me prepararam para isso. Estou caminhando através de lodos escorregadios noite e dia. Na noite passada, sonhei com um abraço amoroso e acordei com um tritão nos meus lábios em vez de uma língua.

'Estava me perguntando se haveria uma pequena chance de eu ir para um local mais #EMP civilizado#!. Como prova de quão obsceno este lugar é, enviei a desova que uma rã deixou em minhas botas encharcadas dentro de um frasco junto com minha mensagem.'"
 fund_inspiration.6506.a: "Somente [ROOT.Char.GetFaith.HighGodNameAlternate] me guia!"
 fund_inspiration.6506.b: "Não há necessidade de uma dedicação."
 #Adventurer gets bee'd in a meadow
 fund_inspiration.6507.t: "[newly_created_artifact.GetDesc]\n\nUma inscrição pequena, mas elegante na primeira página com esta dedicatória: "Ao meu amad[dedication_a.Custom('ES_OA')][dedication_a.GetFirstName]"."
 fund_inspiration.6507.introduction: "[newly_created_artifact.GetDesc]\n\nUma inscrição pequena, mas elegante, tecida sob a cena principal com esta dedicatória: "Ao meu amad[dedication_a.Custom('ES_OA')], [dedication_a.GetFirstName]"."
 fund_inspiration.6507.desc: "

'As planícies e campinas por onde vagueio estão magnificamente adornadas com fauna e flora. Ao desmontar do meu corcel e inclinar-me para cheirar uma flor, projetou-se sobre mim a sombra de [grumpy_liege.GetTitledFirstName], senhor[grumpy_liege.Custom('ES_XA')] destas terras, um[grumpy_liege.Custom('ES_XA')] [grumpy_liege.GetWomanMan] que não tem uma boa opinião sobre você.

'"[newly_created_artifact.GetDesc]\n\nUma pequena mas elegante inscrição na primeira página orgulhosamente declara '[owner.GetFaith.HighGodName] é minha força'."
 fund_inspiration.6507.a: "[newly_created_artifact.GetDesc]\n\nUma pequena mas elegante inscrição tecida abaixo da cena principal orgulhosamente declara '[owner.GetFaith.HighGodName] é minha força'."
 fund_inspiration.6507.b: "Ao meu querido[dedication_a.Custom('ES_OA')] [dedication_d.GetFirstNameNoTooltip]!"
 fund_inspiration.6507.c: "[newly_created_artifact.GetDesc]\n\nUma inscrição pequena, porém elegante, percorre um dos lados com a seguinte dedicatória: "Para meu querid[dedication_d.Custom('ES_OA')], [dedication_d.GetFirstName]"."
 #Adventurer studying beavers in the Taiga
 fund_inspiration.6508.t: "[newly_created_artifact.GetDesc]\n\nUma inscrição pequena, mas elegante, tecida sob a cena principal com esta dedicatória: "Ao meu querid[dedication_d.Custom('ES_OA')], [dedication_d.GetFirstName]"."
 fund_inspiration.6508.introduction: "$fund_inspiration.title$ Alguém para Impressionar"
 fund_inspiration.6508.desc: "Recentemente, meus esforços para impressionar fracassaram..."
 fund_inspiration.6508.architect_desc: "Minha amizade com [dedication_e.GetTitledFirstName|l] ainda está em terreno instável."
 fund_inspiration.6508.a: "[dedication_f.GetTitledFirstName|U] ainda me rejeita."
 fund_inspiration.6508.b: "É uma bagunça.\n\nNo entanto, tenho uma ideia brilhante. Farei com que [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)] adicione uma dedicatória à obra-prima que está criando! O homenageado lisonjeado ficará profundamente tocado por minha generosidade e munificência, e não terá escolha a não ser gostar mais de mim!"
 fund_inspiration.6508.b.tt: "Para [dedication_e.GetFirstNameNoTooltip]!"
 fund_inspiration.6508.c: "Para [dedication_f.GetFirstNameNoTooltip]!"
 fund_inspiration.6508.d: "Encontrarei outras maneiras de impressionar quem eu quiser."
 #Adventurer massively exaggerating what an alligator looks like-floodplains
 fund_inspiration.6509.t: "[newly_created_artifact.GetDesc]\n\nUma inscrição pequena, porém elegante na primeira página dedica-a assim: "A um[dedication_e.Custom('ES_XA')] amig[dedication_e.Custom('ES_OA')] fiel, [dedication_e.GetFirstName]"."
 fund_inspiration.6509.intro_desc: "[newly_created_artifact.GetDesc]\n\nUma inscrição pequena, mas elegante, tecida sob a cena principal dedica isto: "A um[dedication_e.Custom('ES_XA')] amig[dedication_e.Custom('ES_OA')] fiel, [dedication_e.GetFirstName]"."
 fund_inspiration.6509.desc: "[newly_created_artifact.GetDesc]\n\nUma inscrição pequena, porém elegante, percorre um dos lados com esta dedicatória: "Ao meu amad[dedication_f.Custom('ES_OA')][dedication_a.GetFirstName]"."
 fund_inspiration.6509.a: "[newly_created_artifact.GetDesc]\n\nUma pequena, mas elegante inscrição na primeira página com esta dedicatória: "Para meu querid[dedication_f.Custom('ES_OA')], [dedication_f.GetFirstName]"."
 fund_inspiration.6509.b: "[newly_created_artifact.GetDesc]

Uma inscrição pequena, mas elegante, tecida sob a cena principal, dedica a peça "À minha querida [dedication_f.GetFirstName]"."
 fund_inspiration.6509.c: "$fund_inspiration.title$ Um Vassalo para Lembrar?"
 #Adventurer meeting a vigilante band who hide in the forest
 fund_inspiration.6510.t: "Não! Para [dedication_g1.GetFirstNameNoTooltip] e [dedication_g2.GetFirstNameNoTooltip]!"
 fund_inspiration.6510.intro_desc: "Afinal, por que não? PARA MIM MESMO!"
 fund_inspiration.6510.desc: "Dedicações são superestimadas de qualquer maneira."
 fund_inspiration.6510.a: "[newly_created_artifact.GetDesc]\n\nUma pequena, porém elegante, inscrição corre ao longo do seu lado, afirmando que \"[owner.GetTitledFirstNameNoTooltip|U] dedicou isso a seus conselheiros confiáveis, [dedication_g1.GetTitledFirstName|l] e [dedication_g2.GetTitledFirstName|l]\"."
 fund_inspiration.6510.b: "[newly_created_artifact.GetDesc]\n\nUma pequena, porém elegante inscrição na primeira página com esta dedicatória: "[owner.GetTitledFirstNameNoTooltip|U] dedicou isto a seus fiéis conselheiros [dedication_g1.GetTitledFirstName|l] e [dedication_g2.GetTitledFirstName|l]"."
 fund_inspiration.6510.b.toast_outcome.positive: "[newly_created_artifact.GetDesc]\n\nUma pequena, porém elegante, inscrição tecida abaixo da cena principal afirma que \"[owner.GetTitledFirstNameNoTooltip|U] dedicou isso a seus conselheiros confiáveis, [dedication_g1.GetTitledFirstName|l] e [dedication_g2.GetTitledFirstName|l]\"."
 fund_inspiration.6510.b.toast_outcome.positive.continue: "[newly_created_artifact.GetDesc]\n\nUma inscrição pequena, mas elegante, percorre um dos lados com esta dedicatória: "À glória eterna de [owner.Custom('ES_DelDela')] [owner.GetTitledFirstName|l]"."
 fund_inspiration.6510.b.toast_outcome.positive.flee: "[newly_created_artifact.GetDesc]\n\nUma inscrição pequena, mas elegante na primeira página dedica o item “À glória eterna de [owner.Custom('ES_DelDela')] [owner.GetTitledFirstName|l]”."
 fund_inspiration.6510.b.toast_outcome.refusal: "[newly_created_artifact.GetDesc]\n\nUma inscrição pequena, mas elegante, tecida sob a cena principal, dedica o item "À glória eterna de [owner.Custom('ES_DelDela')] [owner.GetTitledFirstName|l]"."
 fund_inspiration.6510.c: "Aproveite a sua vida de miséria!"
 fund_inspiration.6511.t: "$fund_inspiration.title$ Um Lema para as Eras"
 fund_inspiration.6511.intro_desc: "Ouço [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)] murmurar para si do outro lado do salão. "Preciso de algo grande, algo #EMP épico#! que faça minha criação se destacar da multidão sem inspiração, mas o QUÊ?"

Quando seus olhos vibrantes encontram os meus, [inspiration_owner.GetSheHe] abre um enorme sorriso e acena para mim. "[ROOT.Char.Custom('FormOfAddressForLiege')|U]! Que ideia incrível! Simplesmente #EMP perfeito#!! O que você acha de acrescentar o lema da sua família à sua encomenda?""
 fund_inspiration.6511.old_age: "Claro, isso parece adorável!"
 fund_inspiration.6511.poor_health: "É tolo e desnecessário."
 fund_inspiration.6511.winter: "[newly_created_artifact.GetDesc]\n\nO lema da família [owner.GetHouse.GetName], #EMP '[owner.GetHouse.GetMotto]'#!, está elegantemente inscrito em um lado."
 fund_inspiration.6511.a: "[newly_created_artifact.GetDesc]\n\nO lema da família [owner.GetHouse.GetName], #EMP '[owner.GetHouse.GetMotto]'#!, está escrito em um estilo altamente decorativo na primeira página."
 fund_inspiration.6512.t: "[newly_created_artifact.GetDesc]\n\nO lema da família [owner.GetHouse.GetName], #EMP '[owner.GetHouse.GetMotto]'#!, está elegantemente tecido acima da cena principal."
 fund_inspiration.6512.intro_desc: "Recebo uma missiva de meu aventureiro[inspiration_owner.Custom('ES_OA')] e ela está coberta de poeira avermelhada, por sua jornada pelas montanhas desérticas."
 fund_inspiration.6512.desc: "$fund_inspiration.title$ Direção Criativa"
 fund_inspiration.6512.a: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U]! O trabalho em vosso precioso artefato avança bem!". [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] hoje parece estar de muito bom humor.\n\n"Não prometo nada, mas… se eu conseguisse produzir uma verdadeira obra-prima, que ideia vocês gostariam que guiasse minha mão?"."
 fund_inspiration.6512.b: "Para causar mais baixas para #EMP eles#!, menos para #EMP nós#!."
 fund_inspiration.6512.c: "Seu [artifact|lE] pode ganhar um [modifier|lE] de [casualties|lE]"
 fund_inspiration.6512.d: "Para instilar medo nas pessoas que eu ataco."
 fund_inspiration.6512.e: "Seu [artifact|lE] pode ganhar um [modifier|lE] de [Concept('raiding', 'asaltos')|E]"
 fund_inspiration.6512.f: "Para incentivar meus $knight_culture_player_plural_no_tooltip_lowercase$ à grandeza."
 fund_inspiration.6512.g: "Seu [artifact|lE] pode ganhar um [modifier|lE] relacionado aos [Concept('knight', 'caballeros')|E]"
 fund_inspiration.6512.h: "Para melhor aproveitar as vantagens do terreno."
 fund_inspiration.6512.i: "Seu [artifact|lE] pode ganhar um [modifier|lE] relacionado ao [terrain|lE]"
 #Artifact modifications: dedication
 fund_inspiration.7001.t: "Os [modifiers|lE] do [artifact|lE] resultantes serão aleatórios"
 fund_inspiration.7001.desc: "[inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima a mim com expressão pensativa. "Há alguém especial para vós, [ROOT.Char.Custom('FormOfAddressForLiege')]?"\n\nDeve perceber minha irritação diante de uma pergunta tão pessoal, pois continua: "Quero dizer, se desejais dedicar a alguém o artefato que encomendastes. Está ficando bom, mas uma inscrição significativa o tornaria ainda mais pessoal!"."
 fund_inspiration.7001.a: "Para fazer todos os governantes com inveja de mim!"
 fund_inspiration.7001.b: "Seu [artifact|lE] pode ganhar um [modifier|lE] de [opinion|lE] [opinion_i] de [rulers|lE]"
 fund_inspiration.7001.c: "Para trazer glória à minha dinastia."
 fund_inspiration.7001.d: "Seu [artifact|lE] pode ganhar um [modifier|lE] de [dynasty|lE]"
 artifact_dedication_inscribed_a: "Para comandar respeito de meus subordinados."
 artifact_dedication_written_a: "Seu [artifact|lE] pode receber um [modifier|lE] de [dread|lE] [dread_i] ou [tyranny|lE]"
 artifact_dedication_woven_a: "Para impressionar meus amantes!"
 artifact_dedication_inscribed_b: "Seu [artifact|lE] pode ganhar um [modifier|lE] de [attraction|lE]"
 artifact_dedication_written_b: "Para impressionar meus vassalos!"
 artifact_dedication_woven_b: "Seu [artifact|lE] pode ganhar um [modifier|lE] de [opinion|lE] [opinion_i] de [Concept('vassal', 'vasallos')|E]"
 artifact_dedication_inscribed_c: "Para impressionar toda minha corte."
 artifact_dedication_written_c: "Seu [artifact|lE] pode ganhar um [modifier|lE] de [opinion|lE] [opinion_i] de [courtiers|lE]"
 artifact_dedication_woven_c: "[newly_created_artifact.GetDesc]\n\nUma pequena mas elegante inscrição tecida abaixo da cena principal orgulhosamente declara '[owner.GetFaith.HighGodName] é minha força'."
 fund_inspiration.7002.c: "Para legitimar meu reinado."
 artifact_dedication_inscribed_d: "Seu artefato pode ganhar um modificador de curto reinado."
 artifact_dedication_written_d: "[newly_created_artifact.GetDesc]\n\nUma inscrição pequena, porém elegante na primeira página dedica-o: "Ao meu querid[dedication_d.Custom('ES_OA')], [dedication_d.GetFirstName]"."
 artifact_dedication_woven_d: "$fund_inspiration.title$ Fascinação Metálica"
 fund_inspiration.7003.t: "Encontro a [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)] curvad[inspiration_owner.Custom('ES_OA')] sobre um frasco contendo um curioso pó amarelo, cercad[inspiration_owner.Custom('ES_OA')] de pergaminhos e amostras de algum tipo de minério.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U]! Por favor, vejai, vede como este enxofre muda de cor? É um sinal de transmutação. Ele pode criar prata, ou até ouro! Ou aqui, vede como ele interage com o mercúrio? Maravilhoso... E este minério é de natureza arsenical, que... hum, peço desculpas, [ROOT.Char.Custom('FormOfAddressForLiege')]. Há tanto a estudar! Talvez demais"."
 fund_inspiration.7003.desc: "O que foi que você disse sobre ouro?"
 fund_inspiration.7003.desc_e: "[inspiration_owner.GetTitledFirstNameNoTooltip|l] concentrará seus estudos na criação de ouro"
 fund_inspiration.7003.desc_f: "Você disse prata?"
 fund_inspiration.7003.desc_end: "[inspiration_owner.GetTitledFirstNameNoTooltip|l] concentrará seus estudos na fabricação de prata"
 fund_inspiration.7003.a: "Mercúrio é verdadeiramente fascinante."
 fund_inspiration.7003.b: "[inspiration_owner.GetTitledFirstNameNoTooltip|l] focará seus estudos em mercúrio"
 fund_inspiration.7003.c: "Você disse arsênico?"
 artifact_dedication_inscribed_e: "[inspiration_owner.GetTitledFirstNameNoTooltip|l] concentrará seus estudos no arsênico"
 artifact_dedication_written_e: "$fund_inspiration.title$ Sonhos Dourados"
 artifact_dedication_woven_e: "[inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me convocou ao seu laboratório, delirando sobre um avanço em sua pesquisa.

"[ROOT.Char.Custom('FormOfAddressForLiege')|U], você está aqui! Excelente. Por favor, beba isto." [inspiration_owner.GetFirstNameNoTooltip] me guia para dentro do aposento e me conduz até uma mesa repleta de pergaminhos e frascos. É um desses frascos, que contém uma mistura dourada, que [inspiration_owner.GetSheHe] me faz engolir. "Ainda estou aperfeiçoando-o, é claro, mas #EMP deve#! ter um efeito verdadeiramente notável!"

Após horas de espera, tudo o que sinto é uma forte dor de cabeça, náuseas e tontura."
 artifact_dedication_inscribed_f: "Esta farsa deve ter lhe ensinado algo útil."
 artifact_dedication_written_f: "Envie este[inspiration_owner.Custom('ES_EA')] charlatão[inspiration_owner.Custom('ES_XA')] para as masmorras!"
 artifact_dedication_woven_f: "[newly_created_artifact.GetDesc]

Uma inscrição pequena, mas elegante, tecida sob a cena principal, dedica a peça "Estou inclinado sobre uma mesa, ouvindo meu alquimista, [inspiration_owner.Custom('ES_ElLa')] [inspiration_owner.GetTitledFirstName|l] explicar seu último experimento, quando [court_chaplain.Custom2('MyCharacterIntroduction', ROOT.Char)] invade o aposento.\n\n“Então é verdade, #EMP pasáis#! vosso tempo com est[inspiration_owner.Custom('ES_EA')]… est[inspiration_owner.Custom('ES_EA')] #EMP pagan[inspiration_owner.Custom('ES_OA')]#!”. [court_chaplain.GetFirstNameNoTooltip] observa as tigelas e as ilustrações espalhadas diante de nós e seu olhar fica ainda mais frio.\n\n“Isso precisa acabar, [ROOT.Char.Custom('FormOfAddressForLiege')]. [Select_CString(inspiration_owner.IsFemale, 'Esta charlatana', 'Este charlatán' )] vos leva por um mau caminho”."
 fund_inspiration.7004.t: "Você o quê? Como pôde?! Saia do meu reino."
 fund_inspiration.7004.desc: "[dedication_g1.GetTitledFirstName|U] e [dedication_g2.GetTitledFirstName] estão entre os vassalos mais poderosos do meu reino. Nunca sei como mantê-los satisfeitos para que não saiam por aí causando problemas. Talvez a bajulação seja o caminho?

Todo mundo ficaria contente de ter algo feito em seu nome, não ficaria? E eu tenho exatamente a coisa certa em produção! Devo avisar [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)] que estou dedicando sua obra-prima aos meus #EMP fiéis#! vassalos e conselheiros.

Por outro lado, é o meu #EMP artefato#!, então talvez eu devesse simplesmente...?"
 fund_inspiration.7004.a: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], [inspiration_owner.Custom('ES_ElLa')] [inspiration_owner.GetTitledFirstName|l] vem praticamente correndo até mim, descontrolad[inspiration_owner.Custom('ES_OA')] como um[inspiration_owner.Custom('ES_XA')] menin[inspiration_owner.Custom('ES_OA')].\n\nEncontrei este livro enquanto visitava o mercado de [barony_market.GetName]. É um livro atribuído ao lendário alquimista Jabir ibn Hayyan — o próprio mestre! Ao menos, segundo o mercador... Mesmo assim, imaginem a riqueza de conhecimento que ele deve conter!."
 fund_inspiration.7004.b: "Obrigado, estudarei isso."
 fund_inspiration.7004.c: "Você mantém o livro"
 artifact_dedication_inscribed_g: "Confio que você fará bom uso do livro."
 artifact_dedication_written_g: "Você dá o livro a [inspiration_owner.GetShortUIName]"
 artifact_dedication_woven_g: "Que achado! Com certeza renderá um bom preço."
 artifact_dedication_inscribed_h: "$fund_inspiration.title$ O Pensador[inspiration_owner.Custom('ES_XA')]"
 artifact_dedication_written_h: "[inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] não parece realizar nenhum experimento nem produzir nada digno de nota. Apenas fica sentado ao lado da janela, dia após dia.\n\nQuando exijo saber o que estou realmente financiando, ele apenas dá de ombros e aponta para a janela. \"Estou refletindo sobre a natureza do mundo, [ROOT.Char.Custom('FormOfAddressForLiege')]. É um mundo grande, então há muito o que considerar!\"."
 artifact_dedication_woven_h: "Não te pago para ficar aí só sentado[inspiration_owner.Custom('ES_OA')]!"
 #Artifact modifications: motto
 fund_inspiration.7010.t: "Não vou desperdiçar meu ouro com essa bobagem!"
 fund_inspiration.7010.desc: "Venda todo o equipamento alquímico que você comprou"

Quando seus olhos vibrantes encontram os meus, [inspiration_owner.GetSheHe] abre um enorme sorriso e acena para mim. ""Os alquimistas têm poder sobre toda a matéria, podem criar maravilhas, então por que a vida seria diferente? Por que [loved_one.GetFirstName] seria diferente?"

[inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] apenas balança a cabeça, sem considerar minha tristeza. De que adianta a ciência se não pode me conceder este único desejo?

"[ROOT.Char.Custom('FormOfAddressForLiege')|U], não posso realizar esse tipo de milagre. No entanto, descobri que ouvidos atentos podem ser mágicos à sua maneira quando a tristeza paira sobre nós. Por favor, sente-se.""
 fund_inspiration.7010.a: "Mas - eu - Você tem razão... Obrigado."
 fund_inspiration.7010.b: "Não. Você me trará de volta a [loved_one.GetFirstName]!"
 artifact_motto_inscribed: "[inspiration_owner.GetShortUINameNoTooltip] tentará o impossível"
 artifact_motto_written: "Vou a passos leves até o laboratório do meu alquimista, [inspiration_owner.GetTitledFirstName]. Oh, [loved_one.GetFirstName], finalmente vou te ver de novo! No entanto, quando [inspiration_owner.GetTitledFirstNameNoTooltip] abre a porta, meu coração afunda ao ver seu rosto. E por que [inspiration_owner.GetSheHe] não me deixa ver o interior do aposento?

"[ROOT.Char.Custom('FormOfAddressForLiege')|U], falhei com você. Por favor, não..."

Eu passo por [inspiration_owner.GetHerHim] e entro no laboratório, e o que vejo... Não consigo compreender. Tendões, montes de carne, pós e ervas, tudo encharcado de sangue e espalhado em um círculo pelo chão. E, por cima, uma única mecha de cabelo exatamente da mesma cor da que enfeitava a cabeça de [loved_one.GetFirstNameNoTooltip]."
 artifact_motto_woven: "Eu... Eu acho que vou vomitar."
 #Artifact modification: choose modifiers - weapons and armors
 fund_inspiration.7100.t: "Grupo de Estudos $fund_inspiration.title$"
 fund_inspiration.7100.desc: "Encontro [inspiration_owner.Custom2('MyCharacterIntroduction', ROOT.Char)] e [court_tutor.Custom2('MyCharacterIntroduction', ROOT.Char)] encolhidos em torno de uma mesa, comparando o que parecem pedras moídas.\n\n“Veja”, diz [inspiration_owner.GetFirstNameNoTooltip] “quando este pó é aquecido, primeiro ele escurece, mas #EMP entonces#!… Ah, bom dia, minha [ROOT.Char.GetLadyLord].”\n\n[court_tutor.GetFirstNameNoTooltip] levanta os olhos ao ser saudado e tem o bom senso de parecer um pouco envergonhado; deveria estar preparando as aulas de amanhã."
 fund_inspiration.7100.a: "É bom que vocês estejam compartilhando conhecimento."
 fund_inspiration.7100.a.tt: "Vergonha para vocês dois, voltem ao trabalho!"
 fund_inspiration.7100.b: "Bandidos na Estrada $fund_inspiration.title$"
 fund_inspiration.7100.b.tt: ""Meu senhor[ROOT.Char.Custom('ES_XA')], [adventurer.GetFirstName], aventureir[adventurer.Custom('ES_OA')], envia notícias!", exclama o servo, segurando uma carta na mão.

"Por dez dias e dez noites, meu grupo e eu estivemos escondidos. [bandit.GetLadyLord|U] [bandit.GetFirstName], bandid[bandit.Custom('ES_OA')], bloqueou a estrada pela qual devemos passar. O que nos aconselhais? Cautela? Ou devemos lutar contra eles, confiando em que [adventurer.GetFaith.HighGodName] nos mantenha a salvo? Assinado, [adventurer.GetFirstName]", diz o pergaminho.

Parece que [adventurer.GetSheHe] está em uma situação bem complicada."
 fund_inspiration.7100.c: "Mantenha-se discreto, eles eventualmente irão embora."
 fund_inspiration.7100.c.tt: "Sem coragem, sem glória! Faça-os pagar por desperdiçar meu tempo."
 fund_inspiration.7100.d: "Este ouro deve ser suficiente como suborno para deixá-lo passar."
 fund_inspiration.7100.d.tt: "O crânio [killed.Custom('ES_DelDela')] [killed.GetLadyLord] bandido[killed.Custom('ES_OA')], que foi morto pelas mãos de [creator.Custom('ES_DelDela')] aventureiro[creator.Custom('ES_OA')] [creator.GetTitledFirstName|l] em [background_wilderness_scope.GetName], mais tarde presenteado a [owner.GetTitledFirstName|l]. Tem um sorriso aterrador e órbitas oculares vazias e sem vida."
 fund_inspiration.7100.e: "[adventurer.GetFirstNameNoTooltip] corajosamente mata [bandit.GetFirstNameNoTooltip]"
 fund_inspiration.7100.e.tt: "[adventurer.GetFirstNameNoTooltip] cozinha e limpa o crânio de [bandit.GetFirstName] e o envia para você usar como [court_artifact|lE]"
 #Artifact modification: choose modifiers - regalia and crowns
 fund_inspiration.7110.a: "[adventurer.GetFirstNameNoTooltip] é ferido por [bandit.GetFirstNameNoTooltip]"
 fund_inspiration.7110.a.tt: "[adventurer.GetFirstNameNoTooltip] é morto por [bandit.GetFirstNameNoTooltip]"
 fund_inspiration.7110.b: "[adventurer.GetFirstNameNoTooltip] se esgueira na noite… e com o ouro de [bandit.GetFirstNameNoTooltip]"
 fund_inspiration.7110.b.tt: "[adventurer.GetFirstNameNoTooltip] escapa durante a noite"
 fund_inspiration.7110.c: "[adventurer.GetFirstNameNoTooltip] é pego tentando passar furtivamente pelo acampamento[adventurer.Custom('ES_OA')] ao tentar atravessar o acampamento"
 fund_inspiration.7110.c.tt: "$fund_inspiration.title$ Um grupo [adventurer.Custom('GetAnimalAdjective')] de [adventurer.Custom('GetAnimalPlural')] no terreno característico da província, [background_wilderness_scope.Custom('TerrainTypeProvince')]"
 fund_inspiration.7110.d: ""Meu [ROOT.Char.GetLadyLord], uma mensagem de seu [adventurer.Custom('ES_OA')] aventureiro [adventurer.Custom('ES_OA')], [adventurer.GetFirstName]", diz o servo, entregando-me um pergaminho.\n\n"Minha busca me levou à/ao [background_wilderness_scope.Custom('TerrainTypeProvince')] de [background_wilderness_scope.GetName], uma região notoriamente infestada de [adventurer.Custom('GetAnimalPlural')], mas tenho bons motivos para pensar que meu objetivo está perto! Aguardem meu retorno em breve. Assinado, [adventurer.GetFirstNameNoTooltip]", lê-se no pergaminho.\n\nDe fato, [adventurer.GetFirstNameNoTooltip] demonstra ambição ao escolher um caminho tão arriscado…"
 fund_inspiration.7110.d.tt: "Os conhecimentos de [adventurer.GetFirstNameNoTooltip] bastarão para manter[adventurer.Custom('ES_LoLa')] em segurança…"
 fund_inspiration.7110.e: "Por [ROOT.Char.GetFaith.HighGodName], espero que não precise lutar contra nenhuma!"
 fund_inspiration.7110.e.tt: "[adventurer.GetFirstNameNoTooltip] é cauteloso, eles vão pegar o caminho mais longo ao redor."
 fund_inspiration.7110.g: "[adventurer.GetFirstNameNoTooltip] consegue escapar de quaisquer [adventurer.Custom('GetAnimalPlural')]"
 fund_inspiration.7110.g.tt: "[adventurer.GetFirstNameNoTooltip] é atacado por um [adventurer.Custom('GetAnimalType')]!"
