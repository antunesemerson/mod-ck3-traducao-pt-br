 #Game Concept
 game_concept_house_feud: "Rixa"
 game_concept_house_feuds: "Rixas"
 game_concept_house_feuding: "Conflitando"
 game_concept_house_feud_desc: "Às vezes, uma rivalidade pode se transformar em uma vendetta contra uma [house|lE] em particular.\n\n#help Matar, [torturing|lE], torturar, roubar e vencer [wars|lE] contra os membros da [house|lE] alvo aumentarão a pontuação da sua Casa, enquanto ser vítima dessas ações a reduzirá.\n\nEnquanto houver uma rixa em andamento, todos os membros da [house|lE] receberão um bônus em [hostile_schemes|El] contra a [house|lE] rival e terão mais chance de mirar seus membros.\n\nQuando a rixa terminar, sua [house|lE] receberá uma recompensa com base no dano relativo infligido aos seus inimigos, variando de [GetModifier('house_feud_terrible_modifier').GetNameWithTooltip] a [GetModifier('house_feud_excellent_modifier').GetNameWithTooltip]."
 #Important Action
 action_ongoing_house_feud: "[house_feud|E] rixa familiar em andamento"
 action_ongoing_house_feud_label: "@dynasty_icon! Sua Casa está em Rixa com [recipient.GetHouse.GetBaseNameNoTooltip]"
 action_ongoing_house_feud_desc: "Sua família considera a casa [recipient.GetHouse.GetBaseName] sua inimiga e receberá recompensas por superá-la.\n\n#help Asesinar, [torturing|lE], poner los cuernos, robar y ganar [wars|lE] contra sus miembros aumentará la puntuación de tu casa, mientras que ser víctima de estas acciones la reducirá.#!\n"
 action_ongoing_house_feud_click: "#I Clique para ver o líder da [house_feud|lE]#!"
 action_ongoing_house_feud_unimportant: "@warning_icon! #N Tu casa está perdiendo la [house_feud|lE]#!"
