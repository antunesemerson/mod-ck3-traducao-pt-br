l_spanish:
 bp1_house_feud.0001.t: "Uma Casa Maldita"
 bp1_house_feud.0001.desc: "Tem aturado por tempo demais [house_feud_rival.Custom('ES_AlAla')] [house_feud_rival.GetTitledFirstName|l] e sua vilania.\n\nÀs vezes, sonho em lançar a casa [house_feud_rival.GetHouse.GetBaseName] na lama, removendo essa família de caráter [house_feud_rival.Custom2('InsultAdjective', ROOT.Char)] dos anais da história, junto com toda a miséria que me causaram.\n\nDeito-me acordado, tomado pelo meu próprio ódio, mas quem mereceria mais esse foco do que [house_feud_rival.GetFirstNameNoTooltip]?"
 bp1_house_feud.0001.target: "\n\nOs rumores podem ser verdadeiros? Foi isso provocado pelo que [relation.Custom('GetFamilyFeudShort')] há muito tempo?"
 bp1_house_feud.0001.a: "Isso será minha missão de vida."
 bp1_house_feud.0001.b: "Deve haver algum uso melhor para minha energia..."
 bp1_house_feud.0002.t: "Solidariedade Dinástica"
 bp1_house_feud.0002.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('house_feud_victim'))], [house_feud_victim.Custom('ES_ElLa')] [house_feud_victim.GetTitledFirstName|l], vive lamentando a vileza de seu rival, [house_feud_attacker.Custom('ES_ElLa')] [house_feud_attacker.GetTitledFirstName|l].\n\nCada vez que [house_feud_victim.GetHerHim] vejo, menciona a toca de \"[SCOPE.Custom('VenomousCreature')|U] da Casa [house_feud_attacker.GetHouse.GetBaseName] e me incita a lhe oferecer conselho ou ajuda para derrubar [house_feud_attacker.GetSheHe]."
 bp1_house_feud.0002.a: "Isso parece ser um assunto de família."
 bp1_house_feud.0002.b: "Como ousa [house_feud_attacker.GetFirstNameNoTooltip] desafiar a minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('house_feud_victim'))]?"
 bp1_house_feud.0002.c: "[house_feud_victim.GetSheHe|U] deve resolver seus próprios problemas."
 bp1_house_feud.0003.t: "Olho por Olho"
 bp1_house_feud.0003.desc: "Eu caminho do lado de fora da minha [ROOT.Char.Custom('ResidenceBuilding')] sem conseguir afastar as lembranças do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('house_feud_victim'))], [house_feud_victim.Custom('ES_ElLa')] [house_feud_victim.GetTitledFirstName|l], mort[house_feud_victim.Custom('ES_OA')] antes da hora por culpa de [house_feud_attacker.Custom('ES_DelDela')] [house_feud_attacker.GetTitledFirstName|l]... Essa besta imunda dos [house_feud_attacker.GetHouse.GetBaseName]!\n\nSó há uma forma de restaurar minha honra e vingar [house_feud_victim.GetFirstNameNoTooltip]..."
 bp1_house_feud.0003.a: "Uma maldição sobre a Casa [house_feud_attacker.GetHouse.GetBaseNameNoTooltip]!"
 bp1_house_feud.0003.b: "Eu mesm[ROOT.Char.Custom('ES_OA')] mandarei [house_feud_attacker.GetFirstNameNoTooltip] para [ROOT.Char.GetFaith.NegativeAfterLife]!"
 bp1_house_feud.0003.c: "A vingança não me [house_feud_victim.GetHerHim] devolverá."
 bp1_house_feud.0004.t: "Um inimigo de [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('old_house_head'))|U]"
 bp1_house_feud.0004.desc: "Com a morte [old_house_head.Custom('ES_DelDela')] [old_house_head.GetTitledFirstNameRegnal|l] da casa [ROOT.Char.GetHouse.GetName] recai sobre mim, junto com a responsabilidade de zelar pela família.\n\nA inimizade entre [house_feud_rival.Custom('ES_ElLa')] [house_feud_rival.GetTitledFirstName|l] e meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('old_house_head'))] não era segredo; o ódio dos [old_house_head.GetFirstNameNoTooltip] em relação aos [house_feud_rival.GetHouse.GetBaseName] se estendeu ao cotidiano da [old_house_head.Custom('GetCourt')|l] de [old_house_head.GetPrimaryTitle.GetNameNoTooltip].\n\nEstou dividido entre esquecer essas velhas disputas e respeitar o que teria desejado meu falecid[old_house_head.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('old_house_head'))]…"
 bp1_house_feud.0004.a: "A Casa [ROOT.Char.GetHouse.GetBaseNameNoTooltip] não esquece seus inimigos."
 bp1_house_feud.0004.b: "O ódio de [old_house_head.GetFirstNameNoTooltip] morreu com [old_house_head.GetSheHe]."
 bp1_house_feud.0005.t: "Atração pela Vingança"
 bp1_house_feud.0005.desc: "O vazio deixado pela morte de meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('house_feud_victim'))] , [house_feud_victim.GetFirstName] permanece em meu coração e se abre a cada vez que penso em seu assassino abjeto e na justiça que ainda precisa ser feita.\n\nDia após dia, a cruel lógica da vingança domina meu pensamento, alimentada todas as noites por sonhos agitados, nos quais vejo [house_feud_attacker.GetFirstName] e toda a Casa [house_feud_attacker.GetHouse.GetBaseName] assolados pela mesma dor que minha família suporta…"
 bp1_house_feud.0005.a: "'[ROOT.Char.GetHouse.GetMotto]!'"
 bp1_house_feud.0005.b: "[house_feud_attacker.GetFirstNameNoTooltip] não sairá impune."
 bp1_house_feud.0005.c: "Nada me devolverá a [house_feud_victim.GetFirstNameNoTooltip]…"
 bp1_house_feud.0005.c.rival: "[ROOT.Char.GetFaith.HighGodName] vai punir o mal."
 bp1_house_feud.0006.t: "[ROOT.Char.Custom('ES_ElLa')|U] verdadeiro[ROOT.Char.Custom('ES_OA')] [house_feud_rival.GetTitleAsNameNoTooltip|l] da [house_feud_claim.GetBaseNameNoTierNoTooltip]"
 bp1_house_feud.0006.desc: "O rosto sorridente [house_feud_rival.Custom('ES_DelDela')] [house_feud_rival.GetTitledFirstName|l] volta a invadir minha mente. Ergo-me e me afasto da fogueira com desculpas esfarrapadas, caminhando na escuridão.\n\nNão consigo tirar da cabeça esse(a) [house_feud_rival.Custom2('InsultNoun', ROOT.Char)]; a ideia de que [house_feud_rival.GetSheHe] e seus parentes permaneçam intocados e triunfem em [house_feud_rival.GetCapitalLocation.GetName]…\n\n"
 bp1_house_feud.0006.higher: "Juro por [ROOT.Char.GetFaith.HighGodName], #EMP soy#! [ROOT.Char.Custom('ES_ElLa')] legítim[ROOT.Char.Custom('ES_OA')] governante de [house_feud_claim.GetBaseNameNoTier]."
 bp1_house_feud.0006.same: "Eu não terei descanso até que [house_feud_claim.GetBaseNameNoTier] seja meu?"
 bp1_house_feud.0006.multi: "[house_feud_claim.GetBaseNameNoTier] e as demais terras onde os [house_feud_rival.GetTitledFirstName|l] devem ser minhas."
 bp1_house_feud.0006.previous: "As terras de [house_feud_previous.GetTitledFirstName|l] retornarão para nós."
 bp1_house_feud.0006.a: "A Casa de [house_feud_rival.GetHouse.GetBaseNameNoTooltip] deve acabar."
 bp1_house_feud.0006.b: "[house_feud_rival.GetFirstNameNoTooltip] é o problema."
 bp1_house_feud.0006.c: "Tome um pouco de [ROOT.Char.Custom('RegionalAlcoholicDrink')], pense em outras coisas..."
 bp1_house_feud.0007.t: "Ardendo em Cativeiro"
 bp1_house_feud.0007.house_arrest: "Estar confinado[GetPlayer.Custom('ES_OA')] nos aposentos de [house_feud_attacker.GetTitledFirstName|l]. Embora seja melhor do que uma masmorra, não é jeito de viver.\n\nA comida é ruim, o entretenimento pior ainda, mas tenho muito tempo para cultivar ressentimento contra meu captor[house_feud_attacker.Custom('ES_XA')]."
 bp1_house_feud.0007.dungeon: "Estar encerrad[GetPlayer.Custom('ES_OA')] nas masmorras de [house_feud_attacker.GetTitledFirstName|l] com apenas a agitação distante de [house_feud_attacker.GetCapitalLocation.GetNameNoTooltip] e o raro resmungo do guarda [house_feud_attacker.GetCulture.GetNameNoTooltip] como estímulo, tenho muito tempo para nutrir ressentimento contra meu captor[house_feud_attacker.Custom('ES_XA')]."
 bp1_house_feud.0007.camp: "Mofando-me na [house_feud_attacker.Custom('GetCourt')|l] [house_feud_attacker.Custom('ES_DelDela')] [house_feud_attacker.GetTitledFirstName|l], à mercê dos elementos e dos guardas zombeteiros, tenho muito tempo para nutrir ressentimento contra meu captor[house_feud_attacker.Custom('ES_XA')]."
 bp1_house_feud.0007.desc: "\n\n[house_feud_attacker.GetSheHe|U] me manteve retido por muito mais tempo do que é razoável, e só consigo imaginar um motivo mesquinho ou caprichoso para essa demora. Estou no meu limite..."
 bp1_house_feud.0007.a: "Eu destruirei essa casa miserável."
 bp1_house_feud.0007.b: "Um dia, eu colocarei [house_feud_attacker.GetFirstNameNoTooltip] em grilhões como estes."
 bp1_house_feud.0007.c: "Talvez [house_feud_attacker.GetSheHe] tenha uma boa razão..."
 bp1_house_feud.0008.t: "Prisão injusta"
 bp1_house_feud.0008.desc: "Um aroma de ervas e de um ensopado rico sai da cozinha de minha [ROOT.Char.Custom('ResidenceBuilding')|l], mas não consigo tirar da mente a difícil situação de meu apreciad[house_feud_victim.Custom('ES_OA')] [house_feud_victim.GetFirstName]."
 bp1_house_feud.0008.house_arrest: "\n\nEspero que seu captor[house_feud_attacker.Custom('ES_XA')], [house_feud_attacker.GetTitledFirstName|l], [house_feud_victim.GetHerHim] alimente bem enquanto estiver em cativeiro, mas nenhum [ROOT.Char.GetHouse.GetBaseName] deveria viver sob vigilância!"
 bp1_house_feud.0008.dungeon: "\n\nPensar na situação dela, trancad[house_feud_victim.Custom('ES_OA')] em uma prisão [house_feud_attacker.GetPrimaryTitle.GetAdjectiveNoTooltip] como uma criatura miserável… Um[house_feud_victim.Custom('ES_XA')] [ROOT.Char.GetHouse.GetBaseName]!"
 bp1_house_feud.0008.camp: "\n\nA ideia de que [house_feud_victim.GetHerHim] estejam acorrentad[house_feud_victim.Custom('ES_OA')] como um bicho de pouca monta na [ROOT.Char.Custom('GetCourt')|l] [house_feud_attacker.Custom('ES_DelDela')] [house_feud_attacker.GetTitledFirstName|l]… um[house_feud_victim.Custom('ES_XA')] [ROOT.Char.GetHouse.GetBaseName]!"
 bp1_house_feud.0008.closing: "\n\nVou ficando cada vez mais irado ao pensar nos muitos meses que meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('house_feud_victim'))] vem suportando seu cativeiro; [house_feud_attacker.GetFirstNameNoTooltip] foi longe demais ao tratar[house_feud_victim.GetHerHim] assim, seja [house_feud_attacker.GetTitleAsNameNoTooltip|l] ou não!"
 bp1_house_feud.0008.a: "Este maltrato de [house_feud_attacker.GetHouse.GetBaseNameNoTooltip] não será esquecido."
 bp1_house_feud.0008.b: "[house_feud_attacker.GetFirstNameNoTooltip] pagará por isso."
 bp1_house_feud.0008.c: "Só posso rezar por sua libertação."
 bp1_house_feud.0009.t: "Um[ROOT.Char.Custom('ES_XA')] [old_house_head.Custom2('RelationToMeShort', ROOT.Char)] vingativo[ROOT.Char.Custom('ES_OA')]"
 bp1_house_feud.0009.adult: "[ROOT.Char.GetCapitalLocation.GetName] continua de luto por meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('old_house_head'))]. Fora de meu [ROOT.Char.Custom('ResidenceBuilding')] posso escapar dos pranteadores e de seu lamento constante por \"[old_house_head.Custom('ES_ElLa')] [old_house_head.GetTitledFirstName|l]\" e ficar a sós com meus pensamentos.\n\nPensar que [old_house_head.GetSheHe] [old_house_head.GetDeathReasonHideKiller] por [house_feud_rival.Custom('ES_ElLa')] [house_feud_rival.GetTitledFirstName|l], espécie de [house_feud_rival.Custom2('InsultNoun', ROOT.Char)] [house_feud_rival.GetHouse.GetBaseName]…"
 bp1_house_feud.0009.child: "Com o passar do tempo, cada vez mais me contam sobre meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('old_house_head'))], incluindo como [old_house_head.GetSheHe] [old_house_head.GetDeathReasonHideKiller] por [house_feud_rival.GetTitledFirstName|l]…"
 bp1_house_feud.0009.reciprocate: "Eu lhe ensinarei o preço de sua vingança!"
 bp1_house_feud.0009.new: "O destino é uma amante cruel!"
 bp1_house_feud.0009.closing: "\n\nSe houver justiça neste mundo, e a honra de [ROOT.Char.GetHouse.GetBaseName] for restaurada, talvez eu tenha que entregá-la eu mesmo."
 bp1_house_feud.0009.a: "'[house_feud_rival.GetHouse.GetBaseNameNoTooltip]' será uma maldição a partir de hoje."
 bp1_house_feud.0009.b: "Um dia, acabarei com [house_feud_rival.GetFirstNameNoTooltip]."
 bp1_house_feud.0009.c: "Sangue suficiente de [ROOT.Char.GetHouse.GetBaseNameNoTooltip] foi derramado..."
 bp1_house_feud.0010.t: "Tratamento imperdoável"
 bp1_house_feud.0010.torture: "A dor foi insuportável, interminável… Eu não acreditava que [house_feud_attacker.GetTitledFirstName|l] fosse capaz de tamanha barbaridade, sem falar em tratar um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l], um[ROOT.Char.Custom('ES_XA')] nobre dessa maneira!\n\n"
 bp1_house_feud.0010.blinding: "Ainda não aceitei totalmente a perda da visão… talvez eu tenha subestimado [house_feud_attacker.GetTitledFirstName|l]… Choraria ao pensar em minha completa impotência, se a dor me permitisse.\n\n"
 bp1_house_feud.0010.castration: "A dor do meu… maltrato… persiste. Cada mudança de posição me lembra do que perdi. Planejar a vingança contra [house_feud_attacker.GetTitledFirstName|l] é a única coisa que me distrai.\n"
 bp1_house_feud.0010.house_arrest: "Embora eu possa me alegrar por não estar no calabouço de [house_feud_attacker.GetHouse.GetBaseNameNoTooltip], é um pequeno consolo dadas as circunstâncias."
 bp1_house_feud.0010.dungeon: "Aqui embaixo, neste buraco úmido, quão baixo eu caí nas mãos dest[house_feud_attacker.Custom('ES_EA')] miserável [house_feud_attacker.GetHouse.GetBaseNameNoTooltip]."
 bp1_house_feud.0010.free: "Vuelvo a estar livre, mas nunca mais estarei inteiro[GetPlayer.Custom('ES_OA')]. Só [house_feud_attacker.GetFirstNameNoTooltip] sabe o quanto me custou."
 bp1_house_feud.0010.a: "Todos eles vão desejar nunca ter nascido."
 bp1_house_feud.0010.b: "[house_feud_existing.GetHouse.GetBaseNameNoTooltip] encontraram seu adversário."
 bp1_house_feud.0010.c: "[house_feud_attacker.GetFirstNameNoTooltip] pagará por isso, de alguma forma."
 bp1_house_feud.0010.d: "Acho que já estou farto[GetPlayer.Custom('ES_OA')] de violência…"
 bp1_house_feud.0011.t: "Um[house_feud_victim.Custom('ES_XA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('house_feud_victim'))|U] maltratado[house_feud_victim.Custom('ES_OA')]"
 bp1_house_feud.0011.torture: "Mal conseguia suportar ouvir os relatos das torturas do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('house_feud_victim'))] , [house_feud_victim.GetFirstName] às mãos de [house_feud_attacker.GetTitledFirstName|l].\n\n"
 bp1_house_feud.0011.blinding: "A notícia do #EMP cegamiento#! do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('house_feud_victim'))], [house_feud_victim.Custom('ES_ElLa')] [house_feud_victim.GetTitledFirstName|l], às mãos de [house_feud_attacker.Custom('ES_DelDela')] [house_feud_attacker.GetTitledFirstName|l].\n\n"
 bp1_house_feud.0011.castration: "As notícias da #EMP castración#! da minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('house_feud_victim'))], [house_feud_victim.GetFirstName], pairam sobre a [ROOT.Char.Custom('GetCourt')].\n\n"
 bp1_house_feud.0011.house_arrest: "A única consolação é que [house_feud_victim.GetSheHe] está sendo poupado do [house_feud_attacker.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] [house_feud_attacker.Custom('GetDungeon')]..."
 bp1_house_feud.0011.dungeon: "Para piorar as coisas, [house_feud_victim.GetSheHe] também deve sofrer o [house_feud_attacker.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] [house_feud_attacker.Custom('GetDungeon')]..."
 bp1_house_feud.0011.camp: "Para piorar as coisas, [house_feud_victim.GetSheHe] também deve se afundar em um fétido [house_feud_attacker.Custom('GetDungeon')]..."
 bp1_house_feud.0011.free: "Embora [house_feud_victim.GetSheHe] agora esteja livre, esse maus-tratos certamente ficará com [house_feud_victim.GetHerHim] pelo resto de seus dias."
 bp1_house_feud.0011.closing: "\n\nSerá que posso deixar essa indignação de [house_feud_attacker.GetHouse.GetBaseName] impune?"
 bp1_house_feud.0011.a: "Todos os [house_feud_attacker.GetHouse.GetBaseNameNoTooltip] pagarão por isso."
 bp1_house_feud.0011.b: "Farei com que [house_feud_attacker.GetFirstNameNoTooltip] sofra."
 bp1_house_feud.0011.c: "Não há nada a ser feito..."
 bp1_house_feud.0012.t: "Usando Chifres de Corno"
 bp1_house_feud.0012.t.female: "Coroada Cuckquean"
 bp1_house_feud.0012.desc: "A ideia das relações carnais do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('house_feud_spouse'))] com semelhante [house_feud_attacker.Custom2('InsultNoun', ROOT.Char)], [house_feud_attacker.Custom('ES_ElLa')] [house_feud_attacker.GetTitledFirstName|l], me corrói.\n\nQue riam de mim pelas minhas costas, enquanto [house_feud_spouse.GetFirstName] desfruta do conforto da minha [ROOT.Char.Custom('ResidenceBuilding')]…"
 bp1_house_feud.0012.good: "\n\nComo pôde fazer isso comigo?"
 bp1_house_feud.0012.bad: "\n\nEu gostaria de nunca ter me casado com esse [house_feud_spouse.Custom2('InsultNoun', ROOT.Char)]…"
 bp1_house_feud.0012.a: "[house_feud_attacker.GetHouse.GetBaseNameNoTooltip] deve ser lidado."
 bp1_house_feud.0012.b: "Esqueça [house_feud_existing.GetHouse.GetBaseNameNoTooltip], isso é um escândalo!"
 bp1_house_feud.0012.c: "[house_feud_attacker.GetHerHim|U] vou matar."
 bp1_house_feud.0012.d: "Isso não ajuda em nada..."
 bp1_house_feud.0013.t: "Uma honra de [house_feud_spouse.Custom2('RelationToMe', ROOT.Char)]"
 bp1_house_feud.0013.desc: "As notícias do adultério [house_feud_spouse.Custom('ES_DelDela')] [house_feud_spouse.GetTitledFirstName|l] se espalham, e não consigo evitar ver um desdém velado por trás do sorriso de cada servo e [ROOT.Char.Custom('GetCourtier')|l].\n\n[house_feud_attacker.Custom('ES_ElLa')|U] [house_feud_attacker.GetTitledFirstName|l] zombou de mim e da minha família…"
 bp1_house_feud.0013.a: "Todos os [house_feud_attacker.GetHouse.GetBaseNameNoTooltip] pagarão por isso."
 bp1_house_feud.0013.b: "[house_feud_attacker.GetSheHe|U] faz [house_feud_existing.GetHouse.GetBaseNameNoTooltip] parecer virtuoso!"
 bp1_house_feud.0013.c: "Farei com que [house_feud_attacker.GetFirstNameNoTooltip] sofra."
 bp1_house_feud.0013.d: "Tudo isso está no passado..."
 bp1_house_feud.0014.t: "Um orgulho de [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('house_feud_victim'))]"
 bp1_house_feud.0014.desc: "[house_feud_victim.Custom('ES_ElLa')|U] [house_feud_victim.GetTitledFirstName|l] fracassou em manter sua casa em ordem. Seu [house_feud_victim.Custom2('RelationToMeShort', SCOPE.sC('house_feud_spouse'))], [house_feud_spouse.Custom('ES_ElLa')] [house_feud_spouse.GetTitledFirstName|l], é visto com tal [house_feud_attacker.Custom2('InsultAdjective', ROOT.Char)], [house_feud_attacker.Custom('ES_ElLa')] [house_feud_attacker.GetTitledFirstName|l], e traz vergonha e escárnio para nossa família…\n\nEm voz baixa, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('house_feud_victim'))] me explica tudo entre vasos empoeirados de [ROOT.Char.Custom('RegionalAlcoholicDrink')]. \"Precisamos fazer algo contra tal [house_feud_attacker.Custom2('InsultNoun', SCOPE.sC('house_feud_victim'))], [house_feud_victim.Custom2('RelationToMeShort', ROOT.Char)], isso não pode ficar sem resposta!\"."
 bp1_house_feud.0014.a: "A Casa [house_feud_attacker.GetHouse.GetBaseNameNoTooltip] ultrapassou os limites."
 bp1_house_feud.0014.b: "[house_feud_attacker.GetFirstNameNoTooltip] não pode sair impune."
 bp1_house_feud.0014.c: "É melhor perdoar e esquecer..."
 ### Ongoing Events ###
 bp1_house_feud.0100.t: "$story_cycle_house_feud_title$: Um Ressentimento Desproporcional"
 bp1_house_feud.0100.desc: "Não é um bom presságio que [house_feud_rival.Custom('ES_ElLa')] vilã[house_feud_rival.Custom('ES_OA')] continue sendo [house_feud_rival.GetTitleAsNameNoTooltip] enquanto eu sou apenas um[ROOT.Char.Custom('ES_XA')] vulgar [ROOT.Char.GetTitleAsNameNoTooltip]… Defender minha família de inimigos tão poderosos exige muita atenção.\n\n[relation.Custom('GetFamilyFeudShortFlavor')|U] foi injusto. Talvez esta rivalidade esteja dando mais trabalho do que vale a pena…"
 bp1_house_feud.0100.a: "Até um[house_feud_rival.Custom('ES_XA')] [house_feud_rival.GetTitleAsNameNoTooltip|l] deve enfrentar a justiça."
 bp1_house_feud.0100.b: "Isso já durou o suficiente..."
 bp1_house_feud.0110.t: "$story_cycle_house_feud_title$: Adversários Inferiores"
 bp1_house_feud.0110.desc: "A vileza [house_feud_rival.Custom('ES_DelDela')] [house_feud_rival.GetTitledFirstName|l] e toda a Casa [house_feud_rival.GetHouse.GetBaseName] está fora de dúvida, mas é apropriado para a família de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] se desentender com a de um[house_feud_rival.Custom('ES_XA')] [house_feud_rival.GetTitleAsNameNoTooltip|l]?\n\n[relation.Custom('GetFamilyFeudShortFlavor')] é imperdoável, mas devemos nos rebaixar, perdendo tempo com essa #EMP gentuza#!?"
 bp1_house_feud.0110.a: "[house_feud_rival.GetTitleAsNameNoTooltip] ou [ROOT.Char.GetTitleAsNameNoTooltip|l], a justiça deve ser feita."
 bp1_house_feud.0110.b: "Sim, [house_feud_rival.GetSheHe] está abaixo do meu nível..."
 bp1_house_feud.0200.t: "$story_cycle_house_feud_title$: Medidas Desesperadas"
 bp1_house_feud.0200.desc: "Nossa disputa com a Casa [house_feud_rival.GetHouse.GetBaseName] tem sido um desastre; não estamos mais perto da vingança e as atrocidades deles continuam.\n\nSe quisermos acabar com essa vingança adequadamente, talvez seja hora de aplicar o golpe de misericórdia..."
 bp1_house_feud.0200.a: "É hora de [house_feud_rival.GetTitledFirstNameNoTooltip|l]."
 bp1_house_feud.0200.b: "Os dias da casa [house_feud_target.GetTitledFirstNameNoTooltip|l] estão contados."
 bp1_house_feud.0200.c: "Eu tenho outros planos para eles."
 bp1_house_feud.0200.d: "Não, isso foi um erro..."
 bp1_house_feud.0210.t: "$story_cycle_house_feud_title$: Um Preço Alto"
 bp1_house_feud.0210.desc: "A vingança está longe de ser cobrada da Casa [house_feud_rival.GetHouse.GetBaseName]. Desde que nossa rivalidade começou, só houve novos ultrajes de [house_feud_rival.GetTitledFirstName|l] e seu ninho de víboras.\n\nÀs vezes me pergunto se não subestimamos nossos inimigos, e se não seria melhor cortar as perdas antes que seja tarde demais."
 bp1_house_feud.0210.recent: "[house_feud_recent_death.GetTitledFirstName] talvez tenha pensado assim..."
 bp1_house_feud.0210.a: "Não, vamos mostrá-los!"
 bp1_house_feud.0210.b: "Chega... já chega!"
 bp1_house_feud.0220.t: "$story_cycle_house_feud_title$: Os Limites do Rancor"
 bp1_house_feud.0220.desc: "Nossas ações legítimas contra a casa [house_feud_rival.GetHouse.GetBaseName] não passaram despercebidas; é praticamente certo que agora lamentam que [relation.Custom('GetFamilyFeudShort')].\n\nEmbora tais criaturas não mereçam piedade nem misericórdia, o dano original já foi reparado; prolongar este conflito indefinidamente talvez não seja do nosso melhor interesse."
 bp1_house_feud.0220.recent: "Talvez o sangue d [house_feud_recent_kill.GetTitledFirstName|l] seja suficiente..."
 bp1_house_feud.0220.a: "Não, estamos apenas começando."
 bp1_house_feud.0220.b: "Acabou."
 bp1_house_feud.0300.t: "$story_cycle_house_feud_title$: Uma Brigalhada Cansativa"
 bp1_house_feud.0300.desc: "Toda a [ROOT.Char.GetHouse.GetBaseNameNoTooltip] ouviu a história da origem da nossa inimizade com a casa [house_feud_rival.GetHouse.GetBaseNameNoTooltip]; como [relation.Custom('GetFamilyFeudLongFlavor')].\n\nEsta história já está velha. Será que vamos mesmo continuar com essa vingança para sempre por causa de [relation.Custom('GetFamilyFeudShort')] que aconteceu há anos?"
 bp1_house_feud.0300.a: "A Casa [ROOT.Char.GetHouse.GetBaseNameNoTooltip] não esquece seus inimigos."
 bp1_house_feud.0300.b: "Isso já durou demais."
 bp1_house_feud.0410.t: "$story_cycle_house_feud_title$: Ameaçados de Todos os Lados"
 bp1_house_feud.0410.desc: "«Por favor!», lamenta [house_feud_victim.GetTitledFirstName|l]. «Essa rixa insana tem que acabar! Tenho medo de ir a #EMP cualquier lugar#! e salto à mínima menção de um [house_feud_rival.GetHouse.GetBaseName]!».\n\nMeu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('house_feud_victim'))] está claramente abalado[house_feud_victim.Custom('ES_OA')]… Estou dividido entre o risco que isso representa para minha família e a necessidade de ensinar uma lição a [house_feud_rival.GetTitledFirstName|l]."
 bp1_house_feud.0410.a: "Você está certo... está na hora de acabar com isso."
 bp1_house_feud.0410.b: "Não, precisamos terminar o que começamos."
 bp1_house_feud.0420.t: "$story_cycle_house_feud_title$: apelo de [house_feud_liege.GetTitleAsNameNoTooltip]"
 bp1_house_feud.0420.desc: "Foi-me deixado claro que meu [house_feud_liege.GetLadyLord] , [house_feud_liege.GetTitledFirstName|l] não aprova a disputa da minha família com [house_feud_rival.GetTitledFirstName|l] e a casa [house_feud_rival.GetHouse.GetBaseName] e deseja que essas divisões de caráter [house_feud_liege.GetPrimaryTitle.GetAdjectiveNoTooltip].\n\nQuem é [house_feud_liege.GetSheHe] para exigir que a justiça não seja feita? Por outro lado, talvez não seja prudente provocar mais tensões, especialmente com [house_feud_liege.Custom('ES_ElLa')] [house_feud_liege.GetTitleAsNameNoTooltip|l]…"
 bp1_house_feud.0420.a: "Nunca perdoarei [house_feud_rival.GetTitledFirstNameNoTooltip|l]."
 bp1_house_feud.0420.b: "Muito bem..."
 ### Target Events ###
 bp1_house_feud.0500.t: "$story_cycle_house_feud_title$: Alvos da Ira"
 bp1_house_feud.0500.desc: "Embora eu duvidasse disso no começo, os mexericos da minha [ROOT.Char.Custom('GetCourt')] estão me convencendo de que [house_feud_rival.Custom('ES_ElLa')] [house_feud_rival.GetTitledFirstName|l] quer a minha cabeça, e tudo por causa de [relation.Custom('GetFamilyFeudShort')].\n\nToda [ROOT.Char.GetHouse.GetName] é alvo de [house_feud_rival.GetSheHe] por sua associação comigo, e esse ódio se infiltrou de cima a baixo em toda a sua família de caráter [house_feud_rival.Custom2('InsultAdjective', ROOT.Char)]."
 bp1_house_feud.0500.a: "A Casa d [house_feud_rival.GetFirstNameNoTooltip] irá se arrepender disso."
 bp1_house_feud.0500.b: "Tenho preocupações maiores."
 bp1_house_feud.0501.t: "$story_cycle_house_feud_title$: Rivalidade de [house_feud_attacker.GetHouse.GetBaseNameNoTooltip]"
 bp1_house_feud.0501.reciprocating: "[house_feud_attacker.Custom('ES_ElLa')|U] [house_feud_attacker.Custom2('InsultAdjective', ROOT.Char)] de [house_feud_attacker.GetFirstName] devolveu a inimizade pública de nossa família para a sua. Uma resposta patética e caluniosa a nossas queixas justas."
 bp1_house_feud.0501.new: "Disseram-me que [house_feud_attacker.Custom('ES_ElLa')] [house_feud_attacker.GetTitledFirstName|l], [house_feud_attacker.Custom2('InsultNoun', ROOT.Char)] desprezível, jurou que os [ROOT.Char.GetHouse.GetBaseName] seremos inimigos eternos de sua família."
 bp1_house_feud.0501.desc: "\n\nHa, pensar que [relation.Custom('GetFamilyFeudShortFlavor')] realmente despertou a irritação de alguns [house_feud_attacker.GetDynastyHouseName]!"
 bp1_house_feud.0501.a: "Oh, o sentimento é #EMP mútuo#!"
 bp1_house_feud.0501.b: "Parece que temos um novo inimigo."
 bp1_house_feud.0501.c: "Que infantil."
 bp1_house_feud.0501.c.busy: "Nossa atenção deve permanecer na Casa [house_feud_existing.GetBaseNameNoTooltip]."
 bp1_house_feud.0501.c.existing: "Tolo. Muito tolo."
 bp1_house_feud.0502.t: "$story_cycle_house_feud_title$: Tensões Aliviam"
 bp1_house_feud.0502.desc: "A distensão, se isso for possível, entre mim e [house_feud_attacker.GetTitledFirstName|l] parece confirmar que [house_feud_attacker.GetSheHe] abandonou sua vingança contra a casa [ROOT.Char.GetHouse.GetBaseNameNoTooltip]."
 bp1_house_feud.0502.another: "\n\nMe dizem que agora [house_feud_attacker.GetSheHe] é consumido(a) pelo ódio de [house_feud_new.GetHeadOfHouse.GetTitledFirstName|l] e à Casa [house_feud_new.GetBaseName]."
 bp1_house_feud.0502.peace: "\n\nÉ difícil acreditar, mas eu ficaria feliz em ficar livre das preocupações com uma ameaça da Casa [house_feud_attacker.GetHouse.GetBaseNameNoTooltip]."
 bp1_house_feud.0502.a: "Muito pouco, muito tarde."
 bp1_house_feud.0502.b: "Puede que #EMP sea#! hora de pasar página."
 bp1_house_feud.0502.c: "Então a guarda deles está baixa!"
 bp1_house_feud.0502.d: "Por que eu perco meu tempo com essa bobagem?"
 ### Notification Events ###
 bp1_house_feud.0600.t: "$story_cycle_house_feud_title$: Inimigos Compartilhados"
 bp1_house_feud.0600.desc: "Tenho refletido bastante sobre uma carta de tom bem duro que recebi esta manhã de minha [ROOT.Char.Custom2('RelationToMeShort', house_head_scope)], [house_head_scope.Custom('ES_ElLa')] [house_head_scope.GetTitledFirstName|l].\n\n[ROOT.Char.GetHouse.GetHeadOfHouse.GetSheHe|U] deixou claro seu firme desejo de que toda a nossa Casa se torne inimiga declarada dos \"cães [house_feud_rival.GetHouse.GetBaseName]\".\n\nNão posso defender que [relation.Custom('GetFamilyFeudShortFlavor')], mas e os riscos para a nossa família?"
 bp1_house_feud.0600.a: "Não posso recusar [ROOT.Char.GetHouse.GetHeadOfHouse.GetFirstNameNoTooltip]."
 bp1_house_feud.0600.b: "Já era hora!"
 bp1_house_feud.0600.c: "Isso não nos levará a lugar algum..."
 ### Scheme Events ###
 bp1_house_feud.0700.t: "$story_cycle_house_feud_title$: Fruto Proibido"
 bp1_house_feud.0700.desc: "Minhas suspeitas foram confirmadas, [owner.GetTitledFirstName|l]. um[owner.Custom('ES_XA')] odiad[owner.Custom('ES_OA')]. busca meu afeto…\n\n"
 bp1_house_feud.0700.desc_positive: "Sempre me disseram para ter cuidado com os inimigos da nossa família, mas não posso negar que há um certo... #EMP frisson#!."
 bp1_house_feud.0700.desc_neutral: "Talvez, se não fossem as disputas entre nossas famílias, eu teria considerado as investidas de [owner.GetTitledFirstName|l]."
 bp1_house_feud.0700.desc_negative: "Que ridículo de [owner.GetWomanMan], acha que sou, somos idiotas?"
 bp1_house_feud.0700.a: "Fora daqui, [house_feud_rival.Custom2('InsultNoun', ROOT.Char)] [house_feud_rival.GetHouse.GetBaseNameNoTooltip]!"
 bp1_house_feud.0700.b: "Uma rosa com qualquer outro nome ainda cheiraria doce."
 bp1_house_feud.0701.t: "Presa Cautelosa"
 bp1_house_feud.0701.desc: "\"O que se diz sobre a sanidade dos [owner.GetHouse.GetBaseName] deve ser verdade se vocês acham que eu sequer sonharia em cortejar você. Tente seus truques ridículos em outra pessoa\".\n\n[target.GetFirstName] [target.Custom('quirk_neg_present')] enquanto despeja seu desprezo sobre mim."
 bp1_house_feud.0701.a: "Eu pensei que você... esqueça..."
 #Maintenance Events
 bp1_house_feud.0810.t: "$story_cycle_house_feud_title$: Carregando a Tocha"
 bp1_house_feud.0810.child: "Ouvi muitas histórias sobre meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('old_house_head'))], [old_house_head.GetTitledFirstName|l], e suas disputas com a Casa [house_feud_rival.GetHouse.GetBaseName]."
 bp1_house_feud.0810.adult: "Com o falecimento do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('old_house_head'))] , [old_house_head.GetTitledFirstName|l] , agora me vejo questionando a disputa da nossa família com a Casa [house_feud_rival.GetHouse.GetBaseName]."
 bp1_house_feud.0810.desc: "\n\nPode ser que [relation.Custom('GetFamilyFeudShortFlavor')] tenha exigido uma resposta, mas será que nos interessa continuar com isso?\n\nA casa [ROOT.Char.GetHouse.GetBaseName] me vê como líder, para garantir sua sobrevivência e respeito, mas talvez sangue demais já tenha sido derramado por causa desta vingança…"
 bp1_house_feud.0810.a: "Não, é o que os [house_feud_rival.GetHouse.GetBaseNameNoTooltip] querem!"
 bp1_house_feud.0810.b: "Sim, tenho coisas mais importantes com que me preocupar."
 bp1_house_feud.0810.b.rival: "[house_feud_rival.GetFirstNameNoTooltip] é um[house_feud_rival.Custom('ES_XA')] canalha[house_feud_rival.Custom('ES_OA')] mas esta loucura deve acabar."
 bp1_house_feud.0830.t: "$story_cycle_house_feud_title$: O Sentimento Mais Doce"
 bp1_house_feud.0830.opening_drink: "Finalmente posso desfrutar de uma xícara de [ROOT.Char.Custom('RegionalAlcoholicDrink')],"
 bp1_house_feud.0830.opening: "Finalmente posso descansar tranquilo,"
 bp1_house_feud.0830.desc: "sabendo com a certeza de que a maldita Casa de [first_rival.GetHouse.GetBaseName] foi varrida do mundo, selando de uma vez por todas a vendeta que provocaram tão tola e insensatamente com [relation.Custom('GetFamilyFeudShortFlavor')]."
 bp1_house_feud.0830.first_owner: "\n\nTriunfei, e aquele idiota, [first_rival.GetTitledFirstName|l] está finalmente em [ROOT.Char.GetFaith.NegativeAfterLife]!"
 bp1_house_feud.0830.fallback: "\n\nEmbora [first_owner.Custom('ES_ElLa')] [first_owner.GetTitledFirstName|l] não tenha vivido para ver este dia, espero que agora esteja satisfeit[first_owner.Custom('ES_OA')] em [ROOT.Char.GetFaith.PositiveAfterLife]."
 bp1_house_feud.0830.losing: "\n\nEmbora eles tenham infligido um grande custo à nossa família nos anos seguintes, não há maior satisfação ou alívio do que saber que sua bandeira nunca voará novamente."
 bp1_house_feud.0830.winning: "\n\nNós dizimamos completamente o número deles, garantindo que ninguém cruze nossa família sem estar preparado para pagar um preço alto."
 bp1_house_feud.0830.even: "\n\nCada vez que infligíamos uma perda, havia retaliação, mas agora fechamos a última página da história da Casa [first_rival.GetHouse.GetBaseNameNoTooltip]."
 bp1_house_feud.0830.a: "Nunca atravesse a Casa [ROOT.Char.GetHouse.GetBaseNameNoTooltip]."
 bp1_house_feud.0840.t: "$story_cycle_house_feud_title$: O Próximo Inimigo"
 bp1_house_feud.0840.desc: "A odiosa casa [house_feud_rival.GetHouse.GetName] está agora nas mãos de [house_feud_rival.GetFirstName], um[house_feud_rival.Custom('ES_XA')] [house_feud_rival.GetTitleAsNameNoTooltip|l] certamente tão malign[house_feud_rival.Custom('ES_OA')] quanto seus predecessores."
 bp1_house_feud.0840.child: "Embora,[house_feud_rival.Custom('ES_XA')] [house_feud_rival.Custom('GirlBoy')]…"
 bp1_house_feud.0840.closing: "\n\nTodos conhecem \"[relation.Custom('GetFamilyFeudShortFlavor')]\", mas e o futuro?"
 bp1_house_feud.0840.a: "#EMP Nada#! muda! Os cães da [house_feud_rival.GetHouse.GetBaseNameNoTooltip] são todos iguais!"
 bp1_house_feud.0840.b: "Isso já foi longe demais."
 bp1_house_feud.0840.b.rival: "Maldit[house_feud_rival.Custom('ES_XA')] seja [house_feud_rival.GetFirstNameNoTooltip], mas já chega."
 #Victory Events
 bp1_house_feud.7000.t: "$story_cycle_house_feud_title$: [ROOT.Char.GetTitleAsNameNoTooltip|l] legítimo[ROOT.Char.Custom('ES_OA')]"
 bp1_house_feud.7000.desc: "Depois de muito esforço, finalmente arrancamos [house_feud_title.GetNameNoTier] das mãos de [previous_holder.Custom('ES_DelDela')] [previous_holder.GetTitledFirstName|l] e da Casa [house_feud_rival.GetHouse.GetBaseName]!\n\nUma vez reparada esta injustiça, talvez seja prudente pôr fim a esta antiga disputa, para que a razão pela qual ela começou não se perca no derramamento de sangue."
 bp1_house_feud.7000.a: "A Casa [house_feud_rival.GetHouse.GetBaseNameNoTooltip] ainda tem muito a pagar."
 bp1_house_feud.7000.b: "Acabou, nós vencemos."
 bp1_house_feud.7001.t: "$story_cycle_house_feud_title$: Sangue por Sangue"
 bp1_house_feud.7001.desc: "Por fim, nossa mão despachou [house_feud_attacker.Custom('ES_AlAla')] [house_feud_attacker.GetTitledFirstName|l], vil assassino[house_feud_attacker.Custom('ES_OA')] do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('house_feud_victim'))], [house_feud_victim.Custom('ES_ElLa')] [house_feud_victim.GetTitledFirstName|l]. A honra de nossa família foi restaurada.\n\nConseguido o objetivo da vendeta de [ROOT.Char.GetHouse.GetBaseName], talvez seja melhor deixar para trás este… #EMP refriega#!."
 bp1_house_feud.7001.a: "Eu ainda não terminei com [house_feud_attacker.GetHouse.GetBaseNameNoTooltip]."
 bp1_house_feud.7001.b: "Não vamos deixar o mundo todo cego."
 bp1_house_feud.7002.t: "$story_cycle_house_feud_title$: Um Encontro de Destinos"
 bp1_house_feud.7002.opening: "[house_feud_attacker.GetTitledFirstName], torturador impiedoso[house_feud_attacker.Custom('ES_XA')] de meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('house_feud_victim'))], [house_feud_victim.GetTitledFirstName|l], sofreu o mesmo destino em nossas mãos!"
 bp1_house_feud.7002.opening_self: "[house_feud_attacker.GetTitledFirstName][house_feud_attacker.Custom('ES_XA')][house_feud_victim.GetTitledFirstName|l]"
 bp1_house_feud.7002.desc: "\n\nAgora que a afronta original contra [ROOT.Char.GetHouse.GetBaseName] foi vingada, surge a questão de por quanto tempo travaremos esta guerra com a família [house_feud_attacker.GetHouse.GetBaseName]..."
 bp1_house_feud.7002.a: "Ainda há muito a fazer."
 bp1_house_feud.7002.b: "Nós vencemos."
 bp1_house_feud.7003.t: "$story_cycle_house_feud_title$: Vingança Venerável"
 bp1_house_feud.7003.opening: "[house_feud_attacker.GetTitledFirstName], maligno[house_feud_attacker.Custom('ES_OA')] sedutor[house_feud_attacker.Custom('ES_XA')] [house_feud_spouse.Custom('ES_DelDela')] [house_feud_spouse.GetTitledFirstName|l], [house_feud_spouse.GetWifeHusband] do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('house_feud_victim'))],"
 bp1_house_feud.7003.opening_self: "[house_feud_attacker.GetTitledFirstName], o maligno[house_feud_attacker.Custom('ES_OA')] sedutor[house_feud_attacker.Custom('ES_XA')] do meu [house_feud_spouse.GetWifeHusband], [house_feud_spouse.GetTitledFirstName|l],"
 bp1_house_feud.7003.desc: "por fim sofreu o mesmo destino, e pelas nossas mãos!\n\nCom esta ofensa agora resolvida, a disputa com os [house_feud_rival.GetHouse.GetBaseNameNoTooltip] parece estar chegando ao seu fim natural."
 bp1_house_feud.7003.a: "Este é apenas o começo!"
 bp1_house_feud.7003.b: "Uma conclusão satisfatória..."
 #Custom Loc
 house_feud_head_rivalry_flavor: "uma disputa pessoal entre [ROOT.Var('house_feud_house_1_first_head').Char.GetFirstName] e [ROOT.Var('house_feud_house_2_first_head').Char.GetFirstName] saiu do controle"
 house_feud_family_rivalry_flavor: "[ROOT.Var('house_feud_house_1_first_head').Char.GetFirstName] adotou uma disputa pessoal entre [ROOT.Var('house_feud_victim').Char.GetFirstName] e [ROOT.Var('house_feud_attacker').Char.GetFirstName]"
 house_feud_head_killed_flavor: "[ROOT.Var('house_feud_victim').Char.GetFirstName] [ROOT.Var('house_feud_victim').Char.GetDeathReasonHideKiller] morto por [ROOT.Var('house_feud_attacker').Char.GetFirstName], e seu [ROOT.Var('house_feud_victim').Char.Custom2('RelationToMeShort', ROOT.Var('house_feud_house_1_first_head').Char)]; [ROOT.Var('house_feud_house_1_first_head').Char.GetFirstName] jurou vingança"
 house_feud_family_killed_flavor: "[ROOT.Var('house_feud_victim').Char.GetFirstName] [ROOT.Var('house_feud_victim').Char.GetDeathReasonHideKiller] pelas mãos de [ROOT.Var('house_feud_attacker').Char.GetFirstName], e [ROOT.Var('house_feud_house_1_first_head').Char.GetFirstName] buscou justiça"
 house_feud_head_imprisoned_flavor: "[ROOT.Var('house_feud_victim').Char.GetFirstName] foi mant[house_feud_victim.Custom('ES_OA')] mantid[house_feud_victim.Custom('ES_OA')] sem motivo por [ROOT.Var('house_feud_attacker').Char.GetFirstName]"
 house_feud_family_imprisoned_flavor: "$house_feud_head_imprisoned_flavor$, e [ROOT.Var('house_feud_house_1_first_head').Char.GetFirstName] jurou vingança"
 house_feud_head_tortured_flavor: "[ROOT.Var('house_feud_victim').Char.GetFirstName] foi brutalmente torturado por [ROOT.Var('house_feud_attacker').Char.GetFirstName]"
 house_feud_family_tortured_flavor: "$house_feud_head_tortured_flavor$, e [ROOT.Var('house_feud_house_1_first_head').Char.GetFirstName] buscou reparação"
 house_feud_head_castrated_flavor: "[ROOT.Var('house_feud_victim').Char.GetFirstName] foi castrad[house_feud_victim.Custom('ES_OA')] brutalmente por [ROOT.Var('house_feud_attacker').Char.GetFirstName]"
 house_feud_family_castrated_flavor: "$house_feud_head_castrated_flavor$, e [ROOT.Var('house_feud_house_1_first_head').Char.GetFirstName] prometeu vingança"
 house_feud_head_blinded_flavor: "[ROOT.Var('house_feud_victim').Char.GetFirstName] foi cruelmente cegad[house_feud_victim.Custom('ES_OA')] por [ROOT.Var('house_feud_attacker').Char.GetFirstName]"
 house_feud_family_blinded_flavor: "$house_feud_head_blinded_flavor$, e [ROOT.Var('house_feud_house_1_first_head').Char.GetFirstName] prometeu vingança"
 house_feud_head_cuckolded_flavor: "[ROOT.Var('house_feud_attacker').Char.GetFirstName] traiu [ROOT.Var('house_feud_spouse').Char.GetFirstName] com [ROOT.Var('house_feud_victim').Char.GetFirstName]"
 house_feud_family_cuckolded_flavor: "$house_feud_head_cuckolded_flavor$, e [ROOT.Var('house_feud_house_1_first_head').Char.GetFirstName] prometeu vingança"
 house_feud_competing_claim_flavor: "[ROOT.Var('house_feud_house_1_first_head').Char.GetFirstName] reivindicou seu direito a [ROOT.Var('house_feud_title').Title.GetBaseNameNoTier], injustamente detido por [ROOT.Var('house_feud_house_1_first_head').Char.GetFirstName]"
 house_feud_inherited_rivalry_flavor: "[ROOT.Var('house_feud_house_1_first_head').Char.GetFirstName] continuou a rivalidade de [ROOT.Var('house_feud_victim').Char.GetFirstName], seu [ROOT.Var('house_feud_house_1_first_head').Char.Custom2('RelationToMeShort', ROOT.Var('house_feud_victim').Char)], com [ROOT.Var('house_feud_house_2_first_head').Char.GetFirstName]"
