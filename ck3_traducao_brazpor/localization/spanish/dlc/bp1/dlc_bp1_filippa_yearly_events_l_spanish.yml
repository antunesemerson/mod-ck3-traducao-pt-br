l_spanish:
 #A spouse/consort attempts to influence you into changing your heir
 bp1_yearly.2020.t: "Grandes Expectativas"
 bp1_yearly.2020.desc: "[bp1_yearly_2020_influencing_partner.GetTitledFirstName] se acerca a mí con una sonrisa amistosa. «¡Amor mío! ¿Habéis visto lo majestuos[bp1_yearly_2020_child_to_become_heir.Custom('ES_OA')] que se está volviendo nuestr[bp1_yearly_2020_child_to_become_heir.Custom('ES_OA')] [bp1_yearly_2020_child_to_become_heir.GetFirstName]? Prácticamente podría gobernar esta nación con una mano atada a la espalda; y voto a [bp1_yearly_2020_influencing_partner.GetFaith.HighGodNameAlternate] que os sentirías muy orgullos[ROOT.Char.Custom('ES_OA')]».\n\nMe mira de reojo, «Por supuesto, si puedo hacer #EMP lo que sea#! para que la idea resulte más atractiva… Sé bien que me lo haríais saber y llegaríamos a algún acuerdo, mi buen[ROOT.Char.Custom('ES_XA')] [bp1_yearly_2020_influencing_partner.Custom2('RelationToMeShort', ROOT.Char)]». Una sonrisa irónica permanece en sus labios.\n\n¿Ha dicho #EMP lo que sea#!?"
 bp1_yearly.2020.a: "Quero a cabeça [bp1_yearly_2020_target.Custom('ES_DelDela')] [bp1_yearly_2020_target.Custom('InsultAdjectiveGeneric')] de [bp1_yearly_2020_target.GetFirstNameNoTooltip] em uma bandeja."
 bp1_yearly.2020.b: "Estou #EMP interessado#! em mais cortesãos #EMP úteis#!."
 bp1_yearly.2020.b_tt: "[bp1_yearly_2020_influencing_partner.GetFirstNameNoTooltip] lhe oferecerá uma seleção de cortesãos habilidosos."
 bp1_yearly.2020.c: "Meus cofres #EMP estão#! bastante vazios."
 bp1_yearly.2020.c_tt_only_hook: "[bp1_yearly_2020_influencing_partner.GetTitledFirstName] oferece uma chantagem sobre seu [bp1_yearly_2020_influencing_partner.Custom2('RelationToMeShort', SCOPE.sC('bp1_yearly_2020_influencing_partners_parent_only_hook') )] [bp1_yearly_2020_influencing_partners_parent_only_hook.GetTitledFirstName|l]."
 bp1_yearly.2020.c_tt_halfsies: "[bp1_yearly_2020_influencing_partner.GetTitledFirstName] está sendo patrocinado pela metade e oferecerá um gancho sobre seu[bp1_yearly_2020_influencing_partner.Custom2('RelationToMeShort', SCOPE.sC('bp1_yearly_2020_influencing_partners_parent_halfsies') )] [bp1_yearly_2020_influencing_partners_parent_halfsies.GetTitledFirstName|l]."
 bp1_yearly.2020.c_tt_pay_and_hook: "Patrocinamos [bp1_yearly_2020_influencing_partner.GetTitledFirstName|l] e oferecerá um gancho sobre seu [bp1_yearly_2020_influencing_partner.Custom2('RelationToMeShort', SCOPE.sC('bp1_yearly_2020_influencing_partners_parent_pays') )] [bp1_yearly_2020_influencing_partners_parent_pays.GetTitledFirstName|l]."
 bp1_yearly.2020.d: "Isso parece muito #EMP suspeito#! Guardas!"
 bp1_yearly.2020.d_tt: "Quem sabe o que mais pode estar tramando!"
 bp1_yearly.2020.e: "Eu não preciso de nada de você, [bp1_yearly_2020_influencing_partner.GetFirstNameNoTooltip]."
 #Spouse brings up a bunch of skilled people for you to recruit
 bp1_yearly.2021.t: "Persona Grata"
 bp1_yearly.2021.desc: "[bp1_yearly_2020_influencing_partner.GetFirstName] viene a mí una vez más. «¡[bp1_yearly_2020_influencing_partner.Custom2('RelationToMeShort', ROOT.Char)|U]! Traigo noticias». Se apresura a llegar a mi lado, mientras revela una hoja suave con una serie de garabatos. «¡Esta buena gente estaría encantada de venir a trabajar para vos, aquí en nuestra corte!».\n\nLe echo un vistazo a la hoja. ¡Son unas habilidades impresionantes, eso se lo reconozco!"
 bp1_yearly.2021.a: "Um guerreiro treinado tem certa #EMP autoridad#!."
 bp1_yearly.2021.a_tt: "[bp1_yearly_2021_martial_person.GetShortUIName|U] se junta à sua corte"
 bp1_yearly.2021.b: "Uma pessoa instruída certamente beneficiaria minha corte."
 bp1_yearly.2021.b_tt: "[bp1_yearly_2021_learning_person.GetShortUIName|U] se junta à sua corte"
 bp1_yearly.2021.c: "As habilidades financeiras dest são incríveis!"
 bp1_yearly.2021.c_tt: "[bp1_yearly_2021_stewardship_person.GetShortUIName|U] se junta à sua corte"
 bp1_yearly.2021.d: "A diplomacia parece a opção tática."
 bp1_yearly.2021.d_tt: "[bp1_yearly_2021_diplomacy_person.GetShortUIName|U] se junta à sua corte"
 bp1_yearly.2021.e: "Um candidato muito #EMP intrigante#!!"
 bp1_yearly.2021.e_tt: "[bp1_yearly_2021_intrigue_person.GetShortUIName|U] se junta à sua corte"
 bp1_yearly.2021.f: "Eu mudei de ideia."
 #Letter event - Spouse is captured or killed by your rival
 bp1_yearly.2022.t: "[bp1_yearly_2020_target.Custom2('AppropriateGreetingNegative', ROOT.Char )]"
 bp1_yearly.2022.desc_intro: "[bp1_yearly_2020_target.Custom2('NegativeSupplimentaryGreeting', ROOT.Char )]"
 bp1_yearly.2022.desc_imprisoned: "\n\nEstá em meu poder certo indivíduo que jura que vós não tivestes nada a ver com o #EMP intento de asesinato#! contra minha pessoa. Não acredito em semelhante [bp1_yearly_2020_influencing_partner.Custom2('InsultNoun', SCOPE.sC('bp1_yearly_2020_target'))] traidor[bp1_yearly_2020_influencing_partner.Custom('ES_OA')] .\n\nConsiderai isto um aviso."
 bp1_yearly.2022.desc_dead: "\n\nVocê não vai acreditar no que me aconteceu outro dia. Um[bp1_yearly_2020_influencing_partner.Custom('ES_XA')] [bp1_yearly_2020_influencing_partner.Custom2('InsultNoun', SCOPE.sC('bp1_yearly_2020_target'))] malicios[bp1_yearly_2020_influencing_partner.Custom('ES_XA')] atentou contra a minha vida, mas [bp1_yearly_2020_influencing_partner.GetFaith.HighGodName] esteve comigo e me manteve a salvo. Por minha vez, guardo a cabeça dele como adorno no meu estudo pessoal.\n\nConsidere isso um aviso."
 bp1_yearly.2022.a_imprisoned: "Será #EMP [bp1_yearly_2020_target.Custom2('InsultNoun', ROOT.Char)]#!!"
 bp1_yearly.2022.b_dead: "O quê? Não! Não pode ser! [bp1_yearly_2020_influencing_partner.GetTitledFirstNameNoTooltip|l]…"
 #Concluding event
 bp1_yearly.2023.t: "Salve [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetLiege.GetTitleAsNameNoTooltip]"
 bp1_yearly.2023.desc_triumphant: "[bp1_yearly_2020_influencing_partner.GetFirstName] sorri triunfante na minha direção enquanto caminho a passos largos até [bp1_yearly_2020_influencing_partner.GetSheHe]."
 bp1_yearly.2023.desc_sad: "Olho ao redor da cozinha vazia. Repercute vazia, pois [bp1_yearly_2020_influencing_partner.GetFirstName] não está ao meu lado."
 bp1_yearly.2023.desc_hesitant: "[bp1_yearly_2020_influencing_partner.GetFirstName] olha para cima quando entro na cozinha e inclina levemente a cabeça."
 bp1_yearly.2023.desc_killed_target: "[bp1_yearly_2020_influencing_partner.GetSheHe|U] se asoma por detrás del mostrador para mostrar lo que parece un saco de arpillera muy manchado. Con un rápido movimiento, vacía el contenido sobre la superficie plana.\n\nLa mirada inmóvil de la cabeza de [bp1_yearly_2020_target.GetTitledFirstName|l] me saluda, y siento un estremecimiento en el estómago.\n¡Hoy ha resultado ser un día #EMP maravilloso#!!"
 bp1_yearly.2023.desc_imprisoned: "Com seu encarceramento nas mãos de um ser tão [bp1_yearly_2020_target.Custom('InsultAdjectiveGeneric')][bp1_yearly_2020_target.GetFirstName]…\n\nFecho os olhos numa tentativa de não pensar nos horrores aos quais podem sujeitar[bp1_yearly_2020_influencing_partner.GetHerHim] enquanto estiver em cativeiro.\n\nPara"
 bp1_yearly.2023.desc_died: "Ao morrer [bp1_yearly_2020_influencing_partner.GetSheHe] nas mãos de [bp1_yearly_2020_target.GetTitledFirstName|l], eu… eu… #EMP respiro#!.\nRespiro por alguns momentos em minha solidão.\n\nEu [bp1_yearly_2020_influencing_partner.GetHerHim] #EMP vengaré#!. Juro por [ROOT.Char.GetFaith.HighGodName], impedirei [bp1_yearly_2020_target.GetFirstName].\n\nPara"
 bp1_yearly.2023.desc_picked_martial: "\"Eu confio que m [bp1_yearly_2021_new_courtier.GetWomanMan] [bp1_yearly_2021_new_courtier.GetTitledFirstName|l] seja do seu agrado? Músculos de aço, eu te digo.\""
 bp1_yearly.2023.desc_picked_learning: ""[bp1_yearly_2021_new_courtier.GetTitledFirstName|l] é uma maravilha do conhecimento, não é?! Sempre invejei sua sagacidade"."
 bp1_yearly.2023.desc_picked_stewardship: "Espero que [bp1_yearly_2021_new_courtier.GetTitledFirstName|l] esteja enchendo seus cofres! Sempre foi uma verdadeira joia."
 bp1_yearly.2023.desc_picked_diplomacy: "«No dudo de que [bp1_yearly_2021_new_courtier.GetTitledFirstName|l] es capaz de hablar por sí mism[bp1_yearly_2021_new_courtier.Custom('ES_OA')]. ¡Al menos yo siempre tenía que pensarme las cosas un par de veces para no acabar haciendo #EMP siempre#! lo que me decía!»."
 bp1_yearly.2023.desc_picked_intrigue: "\"[bp1_yearly_2021_new_courtier.GetTitledFirstName|l] certamente tece uma teia intricada, não é [bp1_yearly_2021_new_courtier.GetSheHe]? Eu sempre tento ficar do seu lado bom.\""
 bp1_yearly.2023.desc_picked_none: "\n\n"Lamento que nenhum dos candidatos tenha sido do seu agrado, [bp1_yearly_2020_influencing_partner.Custom2('RelationToMeShort', ROOT.Char)]. Confio que, ainda assim, você possa apreciar o trabalho que fiz para reunir os melhores indivíduos que [ROOT.Char.GetCapitalLocation.GetName] e seus arredores podem oferecer".\n\n[bp1_yearly_2020_influencing_partner.GetSheHe|U] me olha com expectativa."
 bp1_yearly.2023.desc_outro: "\n\n[bp1_yearly_2020_influencing_partner.GetSheHe|U] me pisca o olho. “Agora é a sua vez de cumprir o combinado, meu [ROOT.Char.GetLiege.GetTitleAsNameNoTooltip|l]!”."
 bp1_yearly.2023.desc_outro_sad: "para recompensar a sua coragem, o certo a fazer seria honrar o seu pedido."
 bp1_yearly.2023.a: "Você mereceu isto, [bp1_yearly_2020_influencing_partner.GetTitledFirstNameNoTooltip|l]."
 bp1_yearly.2023.a_imprisoned_dead: "É a coisa honrada a se fazer."
 bp1_yearly.2023.b: "Sua capacidade de conspirar me preocupa, minha querida."
 bp1_yearly.2023.b_killer: "Não posso permitir que você fique livre depois disso."
 bp1_yearly.2023.c: "Olha, ambos sabemos que isso não está certo..."
 bp1_yearly.2023.c_imprisoned_dead: "#EMP Tecnicamente#!, [bp1_yearly_2020_influencing_partner.GetSheHe] não concluiu o trabalho..."
 #Mopey consort wants some guidance
 bp1_yearly.2030.t: "O que deve fazer um[bp1_yearly_2030_mopey_consort.Custom('ES_XA')] [bp1_yearly_2030_mopey_consort.Custom('GirlBoy')|U]"
 bp1_yearly.2030.desc: "Quando entro em meu [ROOT.Char.Custom('GetRoom')]“, noto que meu [ROOT.Char.Custom2('RelationToMeShort', bp1_yearly_2030_mopey_consort )], [bp1_yearly_2030_mopey_consort.Custom('ES_ElLa')] [bp1_yearly_2030_mopey_consort.GetTitledFirstName|l], está agindo de forma distante e fria. Vou até [bp1_yearly_2030_mopey_consort.GetSheHe] e ponho uma mão em seu ombro. \"O que foi?\", pergunto.\n\n[bp1_yearly_2030_mopey_consort.GetSheHe|U] me olha por um instante e solta um suspiro pesado. \"É este lugar, é tão... pouco estimulante.\"\n\nDá de ombros. \"É que eu não sei o que fazer comigo mesm[bp1_yearly_2030_mopey_consort.Custom('ES_OA')]\"."
 bp1_yearly.2030.a: "Talvez você pudesse socializar um pouco?"
 bp1_yearly.2030.a_tt_paranoia: "Mas e se acabarem discutindo #EMP sobre mim...#!"
 bp1_yearly.2030.a_tt_gregarious: "Tenho certeza de que isso vai funcionar bem."
 bp1_yearly.2030.b: "Aposto que [bp1_yearly_2030_target_consort.GetTitledFirstNameNoTooltip|l] pode ser #EMP estimulante#!…"
 bp1_yearly.2030.b_tt: "Tudo o que você precisa é amor?"
 bp1_yearly.2030.c: "Uma nova habilidade sempre refresca #EMP meu#! humor!"
 bp1_yearly.2030.d: "Francamente, tenho assuntos mais importantes para cuidar."
 bp1_yearly.2030.tt_success: "Relacionamento melhorado"
 bp1_yearly.2030.tt_failure: "Relacionamento degradado"
 bp1_yearly.2030.tt_potential_friend: "Eles aumentam ligeiramente sua afinidade um pelo outro"
 bp1_yearly.2030.tt_friend: "Eles se dão muito bem"
 bp1_yearly.2030.tt_best_friend: "O relacionamento floresce"
 bp1_yearly.2030.tt_lover: "Eles se dão muito bem #EMP realmente#!"
 bp1_yearly.2030.tt_potential_rival: "Eles têm um obstáculo"
 bp1_yearly.2030.tt_rival: "Eles acabam com uma forte antipatia um pelo outro"
 bp1_yearly.2030.tt_nemesis: "Eles se tornam inimigos mortais"
 bp1_yearly.2030.tt_nothing: "O relacionamento ainda está um pouco estagnado"
 #Consort is upset with other consort
 bp1_yearly.2040.t: "Disputas Domésticas"
 bp1_yearly.2040.desc: "[bp1_yearly_2040_upset_consort.Custom('ES_ElLa')|U] [bp1_yearly_2040_upset_consort.GetTitledFirstName|l] irrompe em meu [ROOT.Char.Custom('GetRoom')], soltando fumaça como uma panela no fogo. O calor que emana é um pouco intimidador.\n\n"Isso é #EMP INACEPTABLE#!; como ele, ela, se… argh! [bp1_yearly_2040_target_consort.GetFirstName] é tão #EMP [bp1_yearly_2040_target_consort.Custom2('InsultNoun', SCOPE.sC('bp1_yearly_2040_upset_consort'))]#!!". [bp1_yearly_2040_upset_consort.GetFirstNameNoTooltip] gesticula furiosamente com os braços. "Não podem fazer #EMP algo#!?!"."
 bp1_yearly.2040.desc_paranoia: "\n\nVisto el estado de [bp1_yearly_2040_upset_consort.GetFirstNameNoTooltip], no sé bien si #EMP ha#! pasado algo."
 bp1_yearly.2040.desc_default: "\n\nEstá claro que algo aconteceu."
 bp1_yearly.2040.desc_outro: "Preciso pisar com cuidado."
 bp1_yearly.2040.a: "#EMP Yo#! só ouvi dizer coisas bonitas sobre você."
 bp1_yearly.2040.a_tt: "Acalme a situação."
 bp1_yearly.2040.b: "Você sabe, [bp1_yearly_2040_target_consort.GetSheHe] #EMP disse#! algo sobre sua [bp1_yearly_2040_target_consort.Custom('RandomBodyFeatureNoun')]..."
 bp1_yearly.2040.b_tt: "Segue[bp1_yearly_2040_upset_consort.GetHerHim]."
 bp1_yearly.2040.c: "[bp1_yearly_2040_upset_consort.GetFirstNameNoTooltip], #EMP calmaos#!. Vá falar com [bp1_yearly_2040_target_consort.GetSheHe]."
 bp1_yearly.2040.c_tt: "Tudo pode ser resolvido através da comunicação."
 bp1_yearly.2040.d: "Eu #EMP realmente#! não me importo. Resolva isso."
 bp1_yearly.2040.d_tt: "Isso é ridículo!"
 bp1_yearly.2040.tt_success: "A situação foi resolvida."
 bp1_yearly.2040.tt_critical_success: "Eles riem do mal-entendido."
 bp1_yearly.2040.tt_severe_success: "[bp1_yearly_2040_upset_consort.GetFirstName] talvez tenha sido um pouco literal demais."
 bp1_yearly.2040.tt_failure: "A situação #EMP não#! foi resolvida."
 bp1_yearly.2040.tt_critical_failure: "A situação piorou."
 bp1_yearly.2040.tt_severe_failure: "As coisas tomam um rumo para pior."
 #Friendly consorts wants to start a study circle
 bp1_yearly.2050.t: "Um estudo sobre [bp1_yearly_2050_first_consort.Custom('SisterhoodBrotherhood')|U]"
 bp1_yearly.2050.desc_intro: "Meus consortes se aproximam enquanto estou passeando à tarde."
 bp1_yearly.2050.desc_intro_paranoid: "Meus consortes me emboscam enquanto estou passeando à tarde."
 bp1_yearly.2050.desc: "\n\n«Llevamos un tiempo hablando entre nosotr[bp1_yearly_2050_first_consort.Custom('ES_OA')]s, [ROOT.Char.GetTitledFirstName|l].\nNos gustaría hacer algo por la comunidad, y bajo la dirección de [highest_consort_skill_person.GetFirstName], nos gustaría inscribirnos, junto con otra gente, en "
 bp1_yearly.2050.desc_diplomacy: "estudos relacionados à diplomacia e à arte da espada envainada.\""
 bp1_yearly.2050.desc_martial: "estudos relacionados à guerra e à arte do combate corporal.\""
 bp1_yearly.2050.desc_stewardship: "estudos relacionados ao governo e à arte de gerenciar um domínio.\""
 bp1_yearly.2050.desc_intrigue: "estudos relacionados à intriga e à arte da sutileza e do subterfúgio.\""
 bp1_yearly.2050.desc_learning: "estudos relacionados ao aprendizado e à arte da palavra escrita.\""
 bp1_yearly.2050.desc_duo: "\n\nA dupla se olha e acena em uníssono."
 bp1_yearly.2050.desc_trio: "\n\nO trio se olha e acena em uníssono."
 bp1_yearly.2050.desc_quartet: "\n\nO quarteto se olha e acena em uníssono."
 bp1_yearly.2050.desc_paranoid: "[bp1_yearly_2050_first_consort.GetHerHim|U]s miro con atención. Siento un escalofrío en la nuca cada vez que [bp1_yearly_2050_first_consort.GetSheHe] usa la palabra #EMP nosotr[bp1_yearly_2050_first_consort.Custom('ES_OA')]s#!."
 bp1_yearly.2050.a: "Muito obrigado, isso será uma boa adição!"
 bp1_yearly.2050.a_tt: "Qualquer coisa para melhorar o reino!"
 bp1_yearly.2050.b: "Hmm, talvez possamos chegar a um #EMP compromisso.#!"
 bp1_yearly.2050.b_tt_greedy: "Eles pediram muito ouro."
 bp1_yearly.2050.c: "Eu não gosto nada dessa ideia. #EMP Guardas!#!"
 bp1_yearly.2050.c_tt_irritable: "Que ousadia a dess[bp1_yearly_2050_first_consort.Custom('ES_OA')]s [bp1_yearly_2050_first_consort.GetWomenMen]!"
 bp1_yearly.2050.c_tt_paranoid: "Quem sabe o que mais eles podem concordar..."
 bp1_yearly.2050.d: "#EMP No#! estou convencid[GetPlayer.Custom('ES_OA')] de que seja uma ideia frutífera."
 bp1_yearly.2050.d_tt: "É melhor não encorajar isso."
 #Friendly consorts want to tutor other consort's child
 bp1_yearly.2060.t: "Leva uma Aldeia"
 bp1_yearly.2060.desc_intro: "Tenho notado que [bp1_yearly_2060_first_consort.GetTitledFirstName|l] e [bp1_yearly_2060_second_consort.GetTitledFirstName|l] ultimamente passam muito tempo juntos. Esta manhã, o casal se aproxima de mim, visivelmente animado com alguma coisa.\n\n[ROOT.Char.GetTitledFirstName|l]! [bp1_yearly_2060_second_consort.GetFirstNameNoTooltip] e eu temos nos aproximado por meio do nosso interesse em comum em"
 bp1_yearly.2060.desc_diplomacy: "diplomacia e garantir que todos se deem bem,\""
 bp1_yearly.2060.desc_martial: "artes marciais e conhecimento de combate,\""
 bp1_yearly.2060.desc_stewardship: "economia e habilidades de administração,\""
 bp1_yearly.2060.desc_intrigue: "intriga e o subterfúgio da corte,\""
 bp1_yearly.2060.desc_learning: "aprender e compartilhar nosso amor pelo conhecimento,\""
 bp1_yearly.2060.desc_outro: "gorjeia [bp1_yearly_2060_first_consort.GetFirstNameNoTooltip].\n\n[bp1_yearly_2060_second_consort.GetFirstNameNoTooltip] interrompe: "Meu [bp1_yearly_2060_second_consort.Custom2('RelationToMeShort', bp1_yearly_2060_target_child)] [bp1_yearly_2060_target_child.GetFirstNameNoTooltip] tem mostrado grande potencial nesta área, e gostaríamos de lhe dar aulas particulares!"."
 bp1_yearly.2060.a: "Isso parece uma ótima ideia!"
 bp1_yearly.2060.a_paranoid: "Se você insiste."
 bp1_yearly.2060.a_tt_paranoid: "Quem sabe com o que mais estão doutrinando..."
 bp1_yearly.2060.b: "Seria preferível que melhorasse seu [bp1_yearly_2060_target_child.Custom('LowestSkillFlag')]."
 bp1_yearly.2060.c: "Não, eu não acho que isso seja uma boa ideia."
 bp1_yearly.2060.tt_success: "O tutoramento é bem-sucedido"
 bp1_yearly.2060.tt_critical_success: "[bp1_yearly_2060_target_child.GetFirstNameNoTooltip] absorve muito bem o conhecimento"
 bp1_yearly.2060.tt_failure: "O tutoramento não é bem-sucedido"
 #Childless older spouse ponders your relationship
 bp1_yearly.2070.t: "A História Até Agora"
 bp1_yearly.2070.desc: "Últimamente había notado a [bp1_yearly_2070_soulmate.GetFirstName] consternad[bp1_yearly_2070_soulmate.Custom('ES_OA')] y distante. En nuestra tradicional caminata por el paisaje que bordea nuestro hogar, me armo de valor para encararme con [bp1_yearly_2070_soulmate.GetSheHe].\n\n«Así que os habéis dado cuenta, ¿eh?»; camina más despacio y acaba deteniéndose para contemplar el panorama. La luz del sol brilla en su piel.\n\n«Os amo. Y amo nuestra vida en común», sus ojos se empañan. «Lo único que lamento es que nunca he podido proporcionaros, más bien, proporcionarnos un hijo que continúe en este mundo después de nosotros».\n\nSus palabras resuenan en mis oídos. ¡Llevar semejante carga sol[bp1_yearly_2070_soulmate.Custom('ES_OA')], mi dulce y fuerte [bp1_yearly_2070_soulmate.GetFirstName]!"
 bp1_yearly.2070.a: "Dulce [bp1_yearly_2070_soulmate.GetFirstNameNoTooltip], podré pasar todo este tiempo con #EMP vos#!."
 bp1_yearly.2070.a_tt: "Você abraça [bp1_yearly_2070_soulmate.GetFirstNameNoTooltip]."
 bp1_yearly.2070.b: "Isso simplesmente não era a vontade de [ROOT.Char.GetFaith.HighGodNamePossessive]."
 bp1_yearly.2070.b_tt: "[bp1_yearly_2070_soulmate.GetFirstNameNoTooltip] encontra algum consolo nisso."
