l_spanish:
 bp1_yearly.5001.t: "Terrores Noturnos"
 bp1_yearly.5001.desc: "Por que acordei? Sonolento, meu cérebro entorpecido percorre uma lista mental. A noite está fria, mas não gelada, minha cama está quente e confortável, e...\n\nHá uma silhueta aos pés da minha cama. À medida que se aproxima, ela se transforma na minha [ROOT.Char.Custom2('RelationToMeShort', sibling_murderer)] [sibling_murderer.GetFirstName]. Abro a boca para dizer que o quarto dela na verdade é o próximo depois do meu, quando noto o travesseiro em suas mãos.\n\nSó graças ao brilho lívido da luz da lua consigo ver o brilho selvagem, enlouquecido e assassino em seus olhos."
 bp1_yearly.5001.a: "Vou #bold matar #! você por essa traição!"
 bp1_yearly.5001.b: "Não! Eu não vou deixar!"
 bp1_yearly.5001.c: "AJUDA!"
 bp1_yearly.5001.win.tt: "Seu confronto tem um resultado positivo"
 bp1_yearly.5001.lose.tt: "Seu confronto não vai bem"
 bp1_yearly.5001.shout.tt: "Você grita por ajuda, esperando que alguém ouça você"
 bp1_yearly.5001.kill.tt: "[sibling_murderer.GetHerHim|U] você o tem à sua mercê"
 bp1_yearly.5001.die.tt: "Você perde a luta"
 bp1_yearly.5002.t: "$bp1_yearly.5001.t$: Ambições Negadas"
 bp1_yearly.5002.desc: "[sibling_murderer.GetFirstName] se lança sobre mim assim que me vê me mover, mas a súbita descarga de adrenalina me dá forças. Intercepto [sibling_murderer.GetFirstNameNoTooltip] no meio da minha cama e meu punho o acerta bem no queixo.\n\nEle cambaleia para trás, sem forças, e os golpes desorientados que desfere depois não conseguem impedir que [sibling_murderer.GetHerHim] o derrube no chão. Sentad[ROOT.Char.Custom('ES_OA')] firmemente sobre o peito dele, um golpe brutal despedaça o nariz de [sibling_murderer.GetFirstName] e faz a cabeça dele bater contra o chão de pedra, reduzindo sua resistência ardente a patéticos gemidos.\n\nÉ nessa posição que [guard.GetFirstName] me encontra, felizmente rápido para entender a situação. [sibling_murderer.GetFirstNameNoTooltip] olha para o chão, carrancudo, enquanto explico o que aconteceu."
 bp1_yearly.5002.a: "Meu própri[sibling_murderer.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', sibling_murderer)]. Como #EMP has podido#!?"
 bp1_yearly.5003.t: "$bp1_yearly.5001.t$: Remus"
 bp1_yearly.5003.desc: "Estou recostad[ROOT.Char.Custom('ES_OA')] , semidesnud[ROOT.Char.Custom('ES_OA')] , sol[ROOT.Char.Custom('ES_OA')] e desprevenid[ROOT.Char.Custom('ES_OA')]. [sibling_murderer.GetFirstNameNoTooltip] se encontra sobre mim antes que eu consiga processar completamente o choque e a traição. Aprisionando um dos meus braços sob sua perna, ele pressiona o travesseiro contra meu rosto com a mão livre enquanto a outra agarra meu punho que se debate e o prende ao poste da cama.\n\nO intervalo entre a torção repugnante que me quebra o braço e a dor aguda e intensa que se irradia até meu ombro parece durar horas. Enquanto meu punho fica pendendo inutilmente, com o membro dianteiro despedaçado se agitando desesperadamente para cima, [sibling_murderer.GetSheHe] move o dele em direção à minha garganta.\n\n“O trono é #EMP mío#!!”, sibila, desaparecendo de vista."
 bp1_yearly.5003.a: "[sibling_murderer.GetFirstNameNoTooltip]! #DIE1 N-não...#! #DIE2 [ROOT.Char.Custom2('RelationToMeShort', sibling_murderer)]...#!"
 bp1_yearly.5004.t: "$bp1_yearly.5001.t$: minha mão direita"
 bp1_yearly.5004.desc: "[sibling_murderer.GetFirstName] avança, cobrindo a distância entre [sibling_murderer.GetSheHe] e a cabeceira da minha cama num piscar de olhos, mas é tarde demais. Meu grito de socorro já estava saindo da minha garganta quando se moveu, e mesmo com o travesseiro abafando-o, já é possível ouvir o estrondo de um par de pés se aproximando rapidamente."
 bp1_yearly.5004.guard.death: "\n\nA porta se abre com estrondo e ali, abençoad[guard.Custom('ES_OA')] sea, está [guard.GetFirstName]. Ele se sobressalta e se vira para gritar, mas se cala quando minha [sibling_murderer.Custom2('RelationToMeShort', ROOT.Char)] sibila o nome dele. Só posso ouvir com horror crescente como [sibling_murderer.GetFirstNameNoTooltip] negocia rapidamente o silêncio e a lealdade de [guard.GetFirstNameNoTooltip].\n\nOndas avassaladoras e crescentes de pânico sobem pelo meu peito quando os passos se arrastam mais uma vez, pontuados pelo último e terrível #EMP chasquido#! do trinco da porta."
 bp1_yearly.5004.guard.save: "\n\nA porta se escancara com estrondo e ali, abençoad[guard.Custom('ES_OA')] seja, está [guard.GetFirstName]. Ele ofega e grita por cima do ombro, através da porta aberta. Momentos depois, dois guardas invadem o local, levantando meu futuro assassino[sibling_murderer.Custom('ES_OA')] e afastando-o[sibling_murderer.GetHerHim] de mim. \n\nPor sua parte, [sibling_murderer.GetFirstNameNoTooltip] olha sombriamente para o chão, sem poder ou querer sequer negar suas ações."
 bp1_yearly.5004.parent.save: "\n\nA porta se abre com estrondo e, recortad[sibling_parent.Custom('ES_OA')] contra a soleira, está meu [ROOT.Char.Custom2('RelationToMeShort', sibling_parent)] [sibling_parent.GetFirstName]. Leva um segundo para perceber o que está acontecendo, e ruge por socorro enquanto arranca [sibling_murderer.GetFirstNameNoTooltip] de cima de mim e o joga ao chão.\n\nEnquanto [sibling_parent.GetSheHe] embala minha cabeça em seus braços, a fuga de meu [ROOT.Char.Custom2('RelationToMeShort', sibling_murderer)] pela porta é frustrada pela chegada de [guard.GetFirstName], que [sibling_murderer.GetHerHim] pega e [sibling_murderer.GetHerHim] lança de volta ao quarto."
 bp1_yearly.5004.parent.death: "\n\nA porta se escancara com estrépito e, recortad[sibling_parent.Custom('ES_OA')] contra a soleira, está meu [ROOT.Char.Custom2('RelationToMeShort', sibling_parent)] [sibling_parent.GetFirstName]. Meu alívio inicial aos poucos se transforma em um terror frio e sombrio ao ver o sorriso arqueado nos lábios de meu [ROOT.Char.Custom2('RelationToMe', sibling_parent)] e seus olhos semicerrados e sinistros; a mistura me embrulha o estômago.\n\nEle(a) se vira e segue pelo corredor como se não tivesse nenhuma preocupação no mundo, puxando a tranca atrás de si.\n\n#EMP "Clic".#!"
 bp1_yearly.5005.t: "Pesadelos: Luxúria pelo Poder"
 bp1_yearly.5006.t: "$bp1_yearly.5001.t$: um amor de [ROOT.Char.Custom2('RelationToMe', sibling_parent)]"
 bp1_yearly.5006.a: "[ROOT.Char.Custom2('RelationToMeShort', sibling_parent)|U]! Você me salvou!"
 bp1_yearly.5007.t: "$bp1_yearly.5001.t$: Tendências Filicidas"
 bp1_yearly.5007.a: "#DIE1 [ROOT.Char.Custom2('RelationToMeShort', sibling_parent)|U]!#! #DIE2 ...por favor!#!"
 bp1_yearly.5008.t: "$bp1_yearly.5001.t$: Romulus"
 bp1_yearly.5008.desc: "[sibling_murderer.GetFirstName] está rápid[sibling_murderer.Custom('ES_OA')], mas fica claro instantaneamente que cometeu um erro fatal ao me subestimar. Ele salta sobre mim, mas eu já saí da cama e estou em movimento; seu impulso o trai ao tropeçar em uma laje irregular, fazendo-o cair desengonçado.\n\nUm passo à frente e meu pé o pega enquanto ele tenta se ajoelhar, fazendo seu crânio bater na parede com um estalo nauseante. O golpe seguinte de meu [ROOT.Char.Custom2('RelationToMeShort', sibling_murderer)] é desordenado e não acerta, e aproveito a oportunidade para alcançar a mesinha de cabeceira.\n\n[sibling_murderer.GetFirstNameNoTooltip] se vira e encontra uma faca pequena, mas extremamente afiada, contra a garganta. Pela primeira vez, vejo verdadeiro medo em seus olhos."
 bp1_yearly.5008.a: "Eles nunca encontrarão o seu corpo, [sibling_murderer.GetFirstNameNoTooltip]."
 bp1_yearly.5008.b: "Não me desafie novamente. Entendeu?"
 bp1_yearly.5601.t: "Vida em Cores"
 bp1_yearly.5601.start: "Que dia maravilhoso! O vento refresca, o sol está quente, e os insetos cantam alegremente na vegetação rasteira. Tudo parece brilhante e vívido, e é tudo porque esse[bp1_yearly_5601_dead_nemesis.Custom('ES_EA')] [bp1_yearly_5601_dead_nemesis.Custom2('InsultNoun', ROOT.Char)] [bp1_yearly_5601_dead_nemesis.Custom2('InsultAdjective', ROOT.Char)] de [bp1_yearly_5601_dead_nemesis.GetFirstName] finalmente está, abençoadamente, morto!\n\nNão consigo conter meu sorriso enquanto uma procissão de amigos e familiares passa por mim, a caminho de se despedirem de [bp1_yearly_5601_dead_nemesis.GetSheHe] pela última vez."
 bp1_yearly.5601.bodysnatcher: "Embora [bp1_yearly_5601_dead_nemesis.GetSheHe] já não possa dizer nada para detê-los, controlo-me um pouco ao pensar que a família de [bp1_yearly_5601_dead_nemesis.GetFirstNameNoTooltip] pudesse cometer a temeridade de defender tacitamente sua honra.\n\nA procissão passa por mim a caminho de enterrar o corpo."
 bp1_yearly.5601.notinsane: "As carrancas que recebo dos enlutados apenas fazem meu sorriso ficar ainda mais largo. Eu me viro para partir, e os olhos de um jovem mendigo se arregalam tanto quanto meu sorriso quando eu alegremente lhe jogo uma moeda de tal valor que toda a sua família comerá bem por semanas."
 bp1_yearly.5601.a: "Eu vou mostrá-los!"
 bp1_yearly.5601.a.tt: "Espere até a noite, então parta com uma pá..."
 bp1_yearly.5601.b: "Este é o melhor dia da minha vida!"
 bp1_yearly.5601.c: "É hora de seguir em frente."
 bp1_yearly.5602.t: "Avançando na Vida"
 bp1_yearly.5602.desc: "O ar da noite permanece imóvel e silencioso. O único ruído que se ouve é o raspar da minha pá, deslocando com facilidade a terra recém-empilhada. Pouco a pouco, o monte ao lado da sepultura cresce, e o corpo de [bp1_yearly_5601_dead_nemesis.GetFirstName] volta a ficar exposto ao ar fresco de que se havia separado há tão pouco tempo.\n\nArranco o pano que cobre seu rosto. Seus lábios estão entreabertos, retorcidos em um rictus de sorriso, e a terra e a sujeira ainda se agarram a seu pescoço enquanto o observo sem emoção.\n\nAgarro a pá mais uma vez e a alinho com aquele mesmo pescoço. O metal, afiado pela minha própria mão hoje mais cedo, está com um fio diabólico. Um golpe, dois golpes, três..."
 bp1_yearly.5602.a: "Vou fazer você útil, por uma vez."
 bp1_yearly.5602.b: "[ROOT.Char.GetFaith.HighGodName] tem a sua alma. Porcos terão a sua cabeça!"
 bp1_yearly.5701.t: "Saindo para se divertir?"
 bp1_yearly.5701.desc: "Tenho certeza[ROOT.Char.Custom('ES_OA')] de que a relação de [married_friend.GetFirstName] com seu cônjuge [friend_spouse.GetFirstName] é muito feliz e produtiva, mas ultimamente cada vez tem menos tempo para mim, um[ROOT.Char.Custom('ES_XA')] querid[ROOT.Char.Custom('ES_OA')] amig[ROOT.Char.Custom('ES_OA')], conforme o relacionamento deles se aprofunda. Toda vez que tento tirar[married_friend.GetHerHim] mesmo que seja para algo tão simples como um passeio, aparentemente está pres[married_friend.Custom('ES_OA')] com seus deveres matrimoniais.\n\nSinto falta dos velhos tempos em que podíamos"
 bp1_yearly.5701.desc.ladsladslads: "saíamos por aí, bebendo a melhor [ROOT.Char.Custom('RegionalDrink')] até vomitarmos, e depois fazíamos tudo de novo na noite seguinte!"
 bp1_yearly.5701.desc.nodrinky: "tínhamos uma ótima noite assistindo os bêbados locais caindo e se envergonhando!"
 bp1_yearly.5701.desc.ending: "\n\nQue tempos bons tivemos! Ah, se aquele[friend_spouse.Custom('ES_EA')] desgraçad[friend_spouse.Custom('ES_OA')] e [friend_spouse.Custom2('InsultAdjective', ROOT.Char)] de [friend_spouse.GetFirstNameNoTooltip] não nos impedisse de fazer aquilo de novo…"
 bp1_yearly.5701.a: "[friend_spouse.GetSheHe|U] não nos manterá afastados por mais tempo!"
 bp1_yearly.5701.b: "Talvez eu possa fazê-los ver o erro de seus caminhos..."
 bp1_yearly.5701.c: "Eu suponho que ambos seguimos em frente?"
 bp1_yearly.5701.tt.critical_success: "O relacionamento está irreparavelmente quebrado"
 bp1_yearly.5701.tt.success: "Uma cunha é colocada entre eles"
 bp1_yearly.5701.tt.failure: "Nenhum deles está feliz com você"
 bp1_yearly.5701.tt.critical_failure: "Você foi longe demais"
 bp1_yearly.5702.t: "Performance Virtuosa"
 bp1_yearly.5702.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('skilful_friend'))] [skilful_friend.GetFirstName] é tão talentoso!\n\n"
 bp1_yearly.5702.diplomacy: "Quando [skilful_friend.GetSheHe] fala, as pessoas ficam penduradas em cada uma de suas palavras. Sua língua rápida e ágil adoça as palavras de tal modo que até mesmo o mais cínico e irritadiço não pode evitar ser cativado por elas. Estou verdadeiramente convencido de que poderia vender madeira para uma floresta!"
 bp1_yearly.5702.martial: "A imensa perspicácia tática que abriga sua mente envergonharia os melhores comandantes do mundo. Com sua habilidade aparentemente inata de identificar e explorar os pontos fracos no campo de batalha, [skilful_friend.GetFirstNameNoTooltip] é um grande trunfo para tod[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetLadyLord] que saiba da importância da guerra."
 bp1_yearly.5702.stewardship: "Dizer que ela tem talento para o dinheiro seria pouco. Quando ela está encarregada dos assuntos fiscais, nem uma única moeda escapa à sua atenção, fazendo verdadeira mágica na hora de equilibrar os números.[skilful_friend.GetFirstNameNoTooltip] parece fazer mágica na hora de equilibrar as contas."
 bp1_yearly.5702.intrigue: "Entre todas as pessoas que eu detestaria ter como inimigo, [skilful_friend.GetFirstNameNoTooltip] está certamente perto do topo da lista. Um manipulador mestre e brilhante conspirador, suas habilidades são tão boas para roubar um doce de uma criada da cozinha quanto para lançar as bases da queda de dinastias."
 bp1_yearly.5702.learning: "Sua mente erudita é verdadeiramente imensa, e mal encontra rivais em minha [ROOT.Char.Custom('GetCourt')]. Mesmo agora, [skilful_friend.GetHerHim] o ouço em outra [ROOT.Char.Custom('GetRoom')], discorrendo sobre um assunto obscuro com toda a habilidade e a facilidade de um[skilful_friend.Custom('ES_XA')] mest[skilful_friend.Custom('ES_OA')] com décadas de experiência."
 bp1_yearly.5702.prowess: "Reconhecid[skilful_friend.Custom('ES_OA')] por toda parte como lutador[skilful_friend.Custom('ES_XA')] verdadeiramente brilhante, ninguém questiona sua habilidade com a espada. Ver como ataca um boneco de treino no pátio com todo o vigor e a graça de um[skilful_friend.Custom('ES_XA')] mestre[skilful_friend.Custom('ES_OA')] incutiria medo até no coração do duelista mais astuto."
 bp1_yearly.5702.fallback: "FALLBACK"
 bp1_yearly.5702.ending: "\n\nTalvez eu possa pedir[skilful_friend.GetHerHim] que me dê algumas dicas sobre essa área de especialidade!"
 bp1_yearly.5702.a: "Me ensine, [skilful_friend.GetFirstNameNoTooltip]!"
 bp1_yearly.5702.a.tt.success: "[skilful_friend.GetFirstNameNoTooltip] ensina a você os caminhos dele(a)"
 bp1_yearly.5702.a.tt.neutral: "Você não aprende nada útil, mas agradece a [skilful_friend.GetFirstNameNoTooltip] pelo esforço"
 bp1_yearly.5702.a.tt.failure: "Você é tão inepto[GetPlayer.Custom('ES_OA')] que [skilful_friend.GetFirstNameNoTooltip] desiste por pura frustração"
 bp1_yearly.5702.b: "Eu acho que sou tão bom quanto eles!"
 bp1_yearly.5702.b.tt.success: "Você ganha o concurso"
 bp1_yearly.5702.b.tt.failure: "Você perde o concurso"
 bp1_yearly.5702.c: "Nunca estarei no nível dele!"
 bp1_yearly.5703.t: "Estranhos Companheiros de Cama"
 bp1_yearly.5703.desc: "Me recosto, ofegante e suados[ROOT.Char.Custom('ES_OA')]o. [rival_lover.GetFirstName], minha conquista sexual da noite se estende languidamente ao meu lado. Quem teria imaginado que rivais tão ferrenhos seriam amantes tão… #EMP compatibles#!?\n\n“Feche os olhos”, diz [rival_lover.GetFirstNameNoTooltip] com malícia, com um sorriso brincalhão nos cantos da boca. Eu aquiesço, com as mãos cruzadas acima da cabeça enquanto me deleito no êxtase pós-coito. De repente, sinto o aço frio de algemas em meus pulsos, o que faz meus olhos se abrirem de imediato, para ver meu amante se arrastando até a mesa de cabeceira.\n\n“Esperei por isso por muito, muito tempo”, sibila. A luz da lua cintila na lâmina da faca."
 bp1_yearly.5703.a: "NÃO! Por favor, deixe-me falar!"
 bp1_yearly.5703.a.tt.success: "[rival_lover.GetHerHim|U] convence"
 bp1_yearly.5703.a.tt.failure: "[rival_lover.GetFirstNameNoTooltip] te fere"
 bp1_yearly.5703.a.tt.criticalfailure: "[rival_lover.GetSheHe|U] não mostra misericórdia"
 bp1_yearly.5703.b: "Espere! Você não quer mais disso?"
 bp1_yearly.5703.b.tt.success: "Seus poderes de sedução salvam você"
 bp1_yearly.5703.b.tt.failure: "Você não é tão bom[GetPlayer.Custom('ES_OA')] na cama"
 bp1_yearly.5703.c: "Deixe-me mostrar por que isso é uma má ideia…"
 bp1_yearly.5704.t: "Bem na hora em que está zangad[seduced_rival.Custom('ES_OA')]"
 bp1_yearly.5704.desc: "[seduced_rival.GetFirstName] está em meu [ROOT.Char.Custom('GetChamber')] mais uma vez, tagarelando bobagens sobre como [seduced_rival.GetHerHim] o(a) ofendi. Seus olhos flamejam enquanto amaldiçoa meu nome outra vez, e sua cólera só aumenta quando despacho sua ira com um aceno de cabeça desdenhoso.\n\nEnquanto [seduced_rival.GetSheHe] continua me repreendendo e eu lhe retruco na mesma moeda, pego-me a mim mesm[ROOT.Char.Custom('ES_OA')] fitando seus olhos de novo. Mal saio desse pequeno devaneio, meu olhar deriva para a curva de sua mandíbula, tão estranhamente distendida pela raiva. Sem perceber, noto como seu peito se ergue de maneira convidativa enquanto [seduced_rival.GetSheHe] continua sua diatribe e…\n\nEm #EMP dónde #! me meti?"
 bp1_yearly.5704.a: "Espero ver #EMP muito #! mais de você, [seduced_rival.GetFirstNameNoTooltip]."
 bp1_yearly.5704.b: "Isso é ridículo!"
 bp1_yearly.5705.t: "[lover_rival.GetSheHe|U] não vale a pena!"
 bp1_yearly.5705.desc: "Talvez ultimamente eu tenha estado um pouco satisfeit[ROOT.Char.Custom('ES_OA')] comigo mesm[ROOT.Char.Custom('ES_OA')]? Certamente, isso parece ser o que empurrou [concerned_friend.GetFirstName] a uma ação desesperada. Meu amig[concerned_friend.Custom('ES_OA')] me encurralou e trouxe à tona meu… complexo relacionamento com [lover_rival.GetFirstName].\n\n"Vocês estão sendo absolutamente ridícul[ROOT.Char.Custom('ES_OA')]!", afirma rotundamente. Claramente irritad[concerned_friend.Custom('ES_OA')] com meu ar sonhador pós-coital, estende a mão e me crava um dedo no peito. "#EMP Vocês sabem #! que disso não sairá nada de bom! Uma tragédia está se preparando e vocês sabem disso!""
 bp1_yearly.5705.a: "Mas... não [lover_rival.GetHerHim] vocês #EMP visto#!!?"
 bp1_yearly.5705.a.tt: "Esta opção está disponível graças à notável atratividade de [lover_rival.GetFirstNameNoTooltip]."
 bp1_yearly.5705.b: "Você simplesmente não entende nosso relacionamento!"
 bp1_yearly.5705.c: "Eu sei, eu sei. Você está certo."
 bp1_yearly.5706.t: "Pecados [rival_parent.Custom('ES_DelDela')] [SCOPE.sC('rival_child').Custom2('RelationToMeShort', SCOPE.sC('rival_parent'))]"
 bp1_yearly.5706.desc: "Ao percorrer [meeting_county.GetProvince.GetCounty.GetName], encontro [rival_parent.Custom2('MyCharacterIntroduction', ROOT.Char)] correndo em minha direção. Nos últimos tempos, temos trocado farpas cruéis à menor oportunidade. Então, espero que ele/ela despeje alguma tolice fétida, mas [rival_parent.GetFirstNameNoTooltip] passa por mim em silêncio.\n\nSó então percebo que alguém [rival_parent.Custom('ES_LoLa')] o/a acompanha: [rival_child.GetFirstName], seu/sua [rival_child.Custom('GetDaughterSon')]. Ele/ela me sorri com o mais leve traço de um ar coquete, antes de correr atrás de seu/sua [SCOPE.sC('rival_child').Custom2('RelationToMeShort', SCOPE.sC('rival_parent'))].\n\nVejo os dois desaparecerem. O que foi aquilo...?"
 bp1_yearly.5706.a: "Seria rude não responder à altura..."
 bp1_yearly.5706.a.tt: "O esquema de sedução terá uma chance aumentada de sucesso"
 bp1_yearly.5706.b: "Eu não toco no sangue daquela imundície!"
 bp1_yearly.5707.t: "Pecados [rival_parent.Custom('ES_DelDela')] [SCOPE.sC('rival_child').Custom2('RelationToMeShort', SCOPE.sC('rival_parent'))]: em flagrante"
 bp1_yearly.5707.start: "Consigo ouvir claramente os passos estrondosos mesmo no auge da paixão, e meu rosto se contorce em um sorriso de superioridade.\n\n[rival_parent.GetFirstName|U] irrompe na [ROOT.Char.Custom('GetRoom')], e a expressão horrorizada em seu rosto é absolutamente deliciosa. [rival_child.GetFirstName],"
 bp1_yearly.5707.child_dislike: "para minha surpresa, sorri tão amplamente quanto eu ao ver s [SCOPE.sC('rival_child').Custom2('RelationToMeShort', SCOPE.sC('rival_parent'))]. [rival_child.GetSheHe] ainda me abraça com força para me puxar mais para perto.\n\n\"Talvez agora você me leve a sério, #EMP [SCOPE.sC('rival_child').Custom2('RelationToMeShort', SCOPE.sC('rival_parent'))]#!!\""
 bp1_yearly.5707.child_deviant: "para minha surpresa, sorri tão amplamente quanto eu quando vê seu [SCOPE.sC('rival_child').Custom2('RelationToMeShort', SCOPE.sC('rival_parent'))]. [rival_child.GetSheHe|U] me surpreende ainda mais quando, com um gesto teatral, puxa a coberta para trás e nos expõe!\n\n\"Posso tentar convencer vocês a se juntarem a nós #EMP unáis a nosotros#! [SCOPE.sC('rival_child').Custom2('RelationToMeShort', SCOPE.sC('rival_parent'))]?\"."
 bp1_yearly.5707.child_like: "soltando um grito, se apressa em cobrir seu pudor com um cobertor.\n\nExplicações são exigidas, acusações são lançadas, enquanto pai e filho berram sobre meu corpo exausto e satisfeito."
 bp1_yearly.5707.a: "Hah! Hah! Te peguei, seu patife!"
 bp1_yearly.5707.a.deviant: "Em nome de [ROOT.Char.GetFaith.HighGodName]!, o que está acontecendo aqui?!"
 bp1_yearly.5707.a.doubledeviant: "E então, o que acha, [rival_parent.GetFirstNameNoTooltip]?"
 bp1_yearly.5707.b: "Por favor, [rival_child.GetFirstNameNoTooltip] e eu estamos apaixonad[ROOT.Char.Custom('ES_OA')]s!"
 bp1_yearly.5707.c: "Você criou bem sua prole, [rival_parent.GetFirstNameNoTooltip]!"
 bp1_yearly.5740.t: "Procurando por respostas"
 bp1_yearly.5740.desc: "Desperto com o chilrear dos pássaros e com a luz do sol da manhã entrando em minha [ROOT.Char.Custom('GetChamber')]. Bocejo, me espreguiço e me deito de novo, aproveitando o calor. Só depois de alguns momentos percebo algo.\n\nAo meu lado, tão perfeitamente aninhado no travesseiro quanto eu em minhas cobertas, há um objeto verdadeiramente misterioso.\n\nDe tamanho médio, esbranquiçado, perfeitamente sem graça…\n\nUm ovo."
 bp1_yearly.5740.a: "O que... qual é o #EMP significado#! disso?"
 bp1_yearly.5740.a.tt: "Eu preciso encontrar o culpado!"
 bp1_yearly.5740.b: "Que estranho. Ah, bem."
 bp1_yearly.5740.c: "Quem fez isso? Onde eles estão?! #EMP GUARDAS!#!"
 bp1_yearly.5741.t: "$bp1_yearly.5740.t$: Cozido"
 bp1_yearly.5741.desc: "Minha primeira parada é a cozinha, onde os servos fervilham ao redor das mesas enquanto preparam a comida. Vejo até mesmo eu sendo afastado de vários montes de comida, pois meu status como seu [ROOT.Char.GetLadyLord] não impressiona em nada os cozinheiros atarefados.\n\nFinalmente encontro o que estava procurando: um monte de ovos quase organizado! Cada um está aconchegado em uma pequena cavidade de feno dentro de uma grande caixa de madeira aberta no topo, dispostos em fileiras de dez. Dez, por dez, por dez, por… oito.\n\nFaltam #EMP dos#! ovos!"
 bp1_yearly.5741.a: "Outro?! Vou mandar flensar o culpado! #EMP Imediatamente!#!"
 bp1_yearly.5741.a.tt: "Não deixarei pedra sobre pedra!"
 bp1_yearly.5741.b: "Quem quer que tenha sido teve acesso à cozinha! Mistério resolvido!"
 bp1_yearly.5742.t: "$bp1_yearly.5740.t$: Atormentado!"
 bp1_yearly.5742.desc: "Descendo correndo as escadas até a adega, permito-me respirar seu ar úmido e fresco. Prateleiras e mais prateleiras de comida e bebida estão armazenadas aqui embaixo e, em nítido contraste com o burburinho da cozinha acima, o nível inferior está completamente vazio de outras pessoas. Apoiando-me em uma prateleira baixa, recomponho meus pensamentos. Quem quer que tenha colocado o ovo ali deve ter acesso aos meus aposentos e à cozinha, e...\n\nMeus pensamentos se dissipam. Minha mão, que havia deslizado distraidamente para um bolso, fica paralisada. Meus dedos, tateando incrédulos, retiram de minhas vestes o objeto sobre o qual tinham repousado.\n\nO objeto é duro. Morno. #EMP Ovoide.#!"
 bp1_yearly.5742.a: "Como? COMO?!"
 bp1_yearly.5742.b: "Que sorte! #EMP Dois#! ovos grátis!"
 bp1_yearly.5743.t: "$bp1_yearly.5740.t$: Criando um Plano"
 bp1_yearly.5743.desc: "Como se estivesse em transe, irrompo pelas portas da minha corte com os olhos arregalados. Meus vassalos e minha família estão dispostos à minha frente, [egg_spouse.Custom2('MyCharacterIntroduction', ROOT.Char)] e [egg_friend.Custom2('MyCharacterIntroduction', ROOT.Char)] particularmente chamativos em seu horror.\n\n\"Ovo! DOIS ovos!\" proclamo, brandindo o singelo objeto oblongo para eles. \"Quem foi?! Quem fez isso? Vou mandar jogá-lo ao mar!\".\n\nSeguem-se algumas risadas nervosas e confusas. Ergo o braço bem alto e, com um brado incoerente e estentóreo, atiro o objeto ofensivo diretamente no chão. As risadas se apagam no silêncio."
 bp1_yearly.5743.a: "[egg_spouse.GetFirstNameNoTooltip]! Confesse imediatamente!"
 bp1_yearly.5743.a.tt.success: "Você identificou corretamente o suspeito"
 bp1_yearly.5743.a.tt.failure: "Seu palpite está incorreto"
 bp1_yearly.5743.a.tt.outcome: "Chance de"
 bp1_yearly.5743.b: "[egg_friend.GetFirstNameNoTooltip]! Seu [egg_friend.Custom2('InsultNoun', ROOT.Char)]!"
 bp1_yearly.5743.c: "Nenhum de vocês está livre de suspeita! #EMP Nenhum!#!"
 bp1_yearly.5743.c.tt.success: "Você identificou corretamente... todos"
 bp1_yearly.5743.c.tt: "Todos os cortesãos"
 bp1_yearly.5744.t: "$bp1_yearly.5740.t$: Derrotado"
 bp1_yearly.5744.start: "A fúria da minha acusação dá peso à minha alegação, mas, à medida que o tempo passa, o desconcerto de"
 bp1_yearly.5744.spouse: "o rosto de [egg_spouse.GetFirstName]"
 bp1_yearly.5744.friend: "o rosto de [egg_friend.GetFirstName]"
 bp1_yearly.5744.crowd: "rosto de cada pessoa na multidão"
 bp1_yearly.5744.end: "não falha nem uma vez. Tento dar mais um passo à frente, mas todo o meu corpo cede e começa a tombar.\n\nNo instante seguinte, estou de costas, com um círculo de rostos preocupados ocupando minha visão, e um pano encharcado em água fria sendo passado de leve na minha têmpora.\n\n"Não, não, [ROOT.Char.Custom('FormOfAddressForLiege')]! Precisais descansar. Chamaremos um servo para ajudá-lo também a se limpar". As palavras desencarnadas se registram ao mesmo tempo em que minha mão toca minha face, espalhando levemente a gema do ovo quebrado no qual eu caí diretamente."
 bp1_yearly.5744.a: "…minha cabeça dói."
 bp1_yearly.5744.b: "Vou encontrar o culpado! Só... não agora."
 bp1_yearly.5745.t: "$bp1_yearly.5740.t$: Jogo de Galinhas"
 bp1_yearly.5745.desc: "Um dia de trabalho árduo é devidamente recompensado com um bom descanso! Minha cama, ampla e confortável, é iluminada pela luz tremeluzente do fogo, enquanto as chamas crepitantes fazem as sombras dançarem pela parede. Deslizo com gratidão para seu abraço quente, puxando as cobertas sobre meu corpo cansado e repousando minha cabeça sobre um travesseiro.\n\nSó então eu o vejo. A menos de um braço de distância de mim, repousando imaculado sobre seu próprio travesseiro, iluminado pelas chamas cintilantes da lareira.\n\nUm ovo."
 bp1_yearly.5745.a: "#DIE2 … No. … No,#! #DIE1 No, no, no,#! #EMP nooo!#!"
 bp1_yearly.5745.b: "É obra de [egg_spouse.GetFirstNameNoTooltip], eu simplesmente sei disso."
 bp1_yearly.5745.c: "É obra de [egg_friend.GetFirstNameNoTooltip]. Com certeza!"
 bp1_yearly.5745.d: "Eu me recuso a lidar com essas palhaçadas ridículas por mais tempo!"
