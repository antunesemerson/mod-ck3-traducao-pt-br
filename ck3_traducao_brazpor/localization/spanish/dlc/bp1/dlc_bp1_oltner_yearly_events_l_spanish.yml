l_spanish:
 bp1_yearly.4000.t: "Um Reflexo Familiar"
 bp1_yearly.4000.desc: "Lembro do dia em que [family_memory.GetDescription], meu [family_memory_participant.Custom('ComplimentAdjective')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('family_memory_participant'))]!\n\n"
 bp1_yearly.4000.desc.alive: "Memórias como essa me trazem conforto. Não importa o que aconteça, eu sei que minha família está lá por mim, e que a Casa [ROOT.Char.GetHouse.GetName] permanece forte."
 bp1_yearly.4000.desc.dead: "Como eu queria que voc? ainda estivesse aqui. Havia tantos risos a compartilhar, tantas diferen?as a resolver, tantas mem?rias a criar... A Casa [ROOT.Char.GetHouse.GetName] ? menor por n?o ter voc? nela."
 bp1_yearly.4000.desc_end: "\n\n #EMP \"[ROOT.Char.GetHouse.GetMotto].\"#! Sussurro baixinho."
 bp1_yearly.4000.a: "Se ao menos você estivesse aqui para dizer isso comigo..."
 bp1_yearly.4000.b: "Vou guardar esse pensamento com carinho!"
 bp1_yearly.4000.c: "Vou honrar sua memória com um poema!"
 bp1_yearly.4000.c.success: "Sua família aprecia o gesto."
 bp1_yearly.4000.c.failure: "Você fica triste e desmorona em lágrimas."
 bp1_yearly.4000.d: "[family_memory_participant.GetFirstNameNoTooltip] merece um presente por sua lealdade!"
 bp1_yearly.4000.family_first: "Que a Casa [ROOT.Char.GetHouse.GetNameNoTooltip] dure para sempre!"
 bp1_yearly.4001.desc: "Com os meus mais próximos reunidos, começo o recital:\n\n#POE [ROOT.Char.Custom('GeneratePoem_Title')]#!\n[ROOT.Char.Custom('GeneratePoem_Intro_Rhyming')]\n[ROOT.Char.Custom('GeneratePoem_Outro_Rhyming')]\n\n"
 bp1_yearly.4001.desc.success_poem: "Lágrimas correm pelas bochechas dos presentes. Acho que servi bem à sua memória, [family_memory_participant.GetFirstNameNoTooltip]."
 bp1_yearly.4001.desc.fail_poem: "… isso não foi muito bom, foi?"
 bp1_yearly.4001.a: "Que você descanse em paz."
 bp1_yearly.4001.b: "Envergonhei a sua memória!"
 bp1_yearly.4010.t: "Um Melhor Guardião"
 bp1_yearly.4010.desc: ""[ROOT.Char.GetWifeHusband] amado[ROOT.Char.Custom('ES_OA')], estou preocupado com a educação de nosso[child_to_change_guardian.Custom('ES_OA')] [child_to_change_guardian.Custom('GetDaughterSon')] [child_to_change_guardian.GetFirstName]", diz meu [parent_that_want_guardian_change.GetWifeHusband] [parent_that_want_guardian_change.GetFirstName] com preocupação na voz.\n\n"
 bp1_yearly.4010.desc.root: ""A verdade é… que vocês estão #EMP demasiad[ROOT.Char.Custom('ES_OA')] ocupad[ROOT.Char.Custom('ES_OA')]#! ocupados demais para criar[child_to_change_guardian.GetHerHim] de."
 bp1_yearly.4010.desc.other: "«Esa especie de [current_guardian.Custom2('InsultNoun', SCOPE.sC('parent_that_want_guardian_change'))] no es buen[current_guardian.Custom('ES_XA')] tutor[current_guardian.Custom('ES_XA')]. Tiene un espíritu demasiado… #EMP ¡[current_guardian.Custom2('InsultAdjective', SCOPE.sC('parent_that_want_guardian_change'))]!#!"
 bp1_yearly.4010.desc_end: "Nuestr[child_to_change_guardian.Custom('ES_OA')] [child_to_change_guardian.Custom('GetDaughterSon')] necesita un tutor bueno y dedicado, ¡alguien como mi [proposed_guardian.Custom('ComplimentAdjective')] [child_to_change_guardian.Custom2('RelationToMeShort', SCOPE.sC('proposed_guardian'))] [proposed_guardian.GetFirstName]!», continúa.\n\n«¿Queréis que haga los preparativos?», dice mirándome esperanzad[parent_that_want_guardian_change.Custom('ES_OA')]."
 bp1_yearly.4010.a: "Claro, querido(a). [proposed_guardian.GetFirstNameNoTooltip] é a melhor escolha."
 bp1_yearly.4010.a_effect: "A [education|lE] de [child_to_change_guardian.GetFirstName] progride"
 bp1_yearly.4010.b: "Eu escolhi [current_guardian.GetFirstNameNoTooltip] por uma razão, [parent_that_want_guardian_change.GetWomanMan]!"
 bp1_yearly.4010.b_alt: "Bah! Tenho tempo de sobra para educar[child_to_change_guardian.GetHerHim]!"
 bp1_yearly.4010.c: "Minha escolha é melhor, confie em mim!"
 bp1_yearly.4010.c_effect: "A [education|lE] de [child_to_change_guardian.GetFirstName] progride significativamente"
 bp1_yearly.4020.t: "Uma Amizade Poética"
 bp1_yearly.4020.desc: ""[ROOT.Char.GetFirstNameNoTooltip], meu grande amig[ROOT.Char.Custom('ES_OA')], voltei a lembrar da sua vitória contra [war_memory_participant.GetTitledFirstName|l], então decidi escrever um poema sobre o seu triunfo!", diz [poetry_friend.GetFirstName] limpando a garganta:\n\n[poetry_artifact.GetName]\n[poetry_artifact.GetDesc]"
 bp1_yearly.4020.a: "Eu farei com que seja recitado para a [ROOT.Char.Custom('GetCourt')]!"
 bp1_yearly.4020.b: "Obrigado, meu amigo. Vou guardar este poema com carinho."
 bp1_yearly.4020.c: "Hah! Vou enviar uma cópia para todos que [war_memory_participant.GetFirstNameNoTooltip] conhece!"
 bp1_yearly.4020.d: "Isso é demais, somente [ROOT.Char.GetFaith.HighGodName] merece tal louvor."
 bp1_yearly.4020.poetry: "[poetry_friend.Custom('GeneratePoem_Intro_Rhyming')]\n[poetry_friend.Custom('GeneratePoem_Outro_Rhyming')]"
 bp1_yearly.4020.poetry_title: "[poetry_friend.Custom('GeneratePoem_Title')]"
 artifact_poetry_name: "$bp1_yearly.4020.poetry_title$"
 artifact_poetry_description: "Uma obra poética dedicada à vitória [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitledFirstName|l] sobre [war_memory_participant.Custom('ES_ElLa')] [war_memory_participant.GetTitledFirstName|l], vulgar [war_memory_participant.Custom2('InsultAdjective', ROOT.Char)], escrita por [poetry_friend.Custom('ES_ElLa')] [poetry_friend.GetTitledFirstName|l], grande amig[poetry_friend.Custom('ES_OA')] [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitledFirstNameNoTooltip|l].\n\n$bp1_yearly.4020.poetry$"
 poetry_artifact_appended_desc: "Uma obra poética dedicada à vitória [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitledFirstName|l] sobre [war_memory_participant.Custom('ES_ElLa')] [war_memory_participant.GetTitledFirstName|l], vulgar [war_memory_participant.Custom2('InsultAdjective', ROOT.Char)], escrita por [poetry_friend.Custom('ES_ElLa')] [poetry_friend.GetTitledFirstName|l], grande amig[poetry_friend.Custom('ES_OA')] [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitledFirstNameNoTooltip|l].\n\nDiz assim:\n $artifact_poetry_description$"
 bp1_yearly.4020.a_effect: "[newly_created_artifact.GetName] é transformado em um [court_artifact|lE] e ganhará um modificador [grandeur|lE]"
 bp1_yearly.4020.b_effect: "Você ganha o [newly_created_artifact.GetName] [artifact|lE]"
 bp1_yearly.4030.t: "A Rival Sedutora"
 bp1_yearly.4030.desc: "«¡[ROOT.Char.Custom('CulturalCurse')|U]!», grito al leer la carta.\n\nEs[marriage_rival.Custom('ES_EA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('marriage_rival'))] [marriage_rival.Custom2('InsultAdjective', ROOT.Char)] mí[marriage_rival.Custom('ES_OA')], [marriage_rival.GetFirstName], ¡yo escupo en vuestro nombre!"
 bp1_yearly.4030.desc_bond_broken: "\n\nNão só usastes artimanhas e charme para convencer meu vassalo[marriage_vassal.Custom('ES_OA')] [marriage_vassal.GetTitledFirstName|l] para se casar convosco e romper os laços com [spurned_partner.GetFirstName], não; vós também vos voltastes contra [marriage_vassal.GetTitledFirstNameNoTooltip|l] contra mim!"
 bp1_yearly.4030.desc_no_broken_bonds: "\n\nNão só usastes enganos e encantos para convencer meu vassalo[marriage_vassal.Custom('ES_OA')] [marriage_vassal.GetTitledFirstName|l] para que se case convosco; não, também vós voltastes o [marriage_vassal.GetTitledFirstNameNoTooltip|l] contra mim!"
 bp1_yearly.4030.desc_end: "\n\nVuestra lengua ponzoñosa extiende mentira tras mentira sobre mí… ¡No amáis a [marriage_vassal.GetFirstNameNoTooltip], solo queréis que yo #EMP sufra!#!"
 bp1_yearly.4030.a: "Eu devo convencer [marriage_vassal.GetFirstNameNoTooltip] de como [marriage_rival.GetFirstNameNoTooltip] é traiçoeiro!"
 bp1_yearly.4030.b: "[marriage_vassal.GetSheHe|U] quebrou seu vínculo? Os [ROOT.Char.GetFaith.PriestNeuterPlural] choverão fogo sobre [marriage_vassal.GetSheHe] por isso!"
 bp1_yearly.4030.c: "Talvez [spurned_partner.GetFirstNameNoTooltip] possa ser útil..."
 bp1_yearly.4030.d: "Bah! Semejante [marriage_rival.Custom2('InsultNoun', ROOT.Char)] não conseguiu nada!"
 distrustful: "Desconfiado"
 bp1_yearly.4030.a.success: "[marriage_vassal.GetTitledFirstName] está convencido[marriage_vassal.Custom('ES_OA')] e arrependido[marriage_vassal.Custom('ES_OA')]"
 bp1_yearly.4030.a.failure: "[marriage_vassal.GetTitledFirstName] acha que você está contando mais mentiras"
 bp1_yearly.4030.b.success: "[marriage_vassal.GetTitledFirstName] reconhece o erro de seus caminhos"
 bp1_yearly.4030.b.failure: "[marriage_vassal.GetTitledFirstName] desvia dos argumentos dos [ROOT.Char.GetFaith.PriestNeuterPlural]"
 bp1_yearly.4040.t: "Minha querida [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('kindly_grandmother'))|U]"
 bp1_yearly.4040.desc.intro.1: "«Ay, mi querid[ROOT.Char.Custom('ES_OA')], querid[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetFirstNameNoTooltip], ¡cómo te adoro!». Dice mi [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('kindly_grandmother'))] [kindly_grandmother.GetFirstName] trayendo un plato de delicias. «Te he hecho una fuente de [ROOT.Char.Custom('FavoriteTreatDemand')], ¡sé cuánto te gusta!».\n\n¡Oh, qué bien me conoce! Por supuesto, es indigno de [kindly_grandmother.GetSheHe] hacer tales cosas con sus propias manos, pero… ¿quién soy yo para decir que no?"
 bp1_yearly.4040.desc.intro.2: "\"Mais [ROOT.Char.Custom('FavoriteTreatDemand')] para meu [ROOT.Char.Custom('GirlBoy')] enorme!\", minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('kindly_grandmother'))] [kindly_grandmother.GetFirstName] vovó querida grita da cozinha. \"Vamos, coma tudo!\".\n\nMmm, cheira maravilhoso... só mais uma mordida não pode fazer mal, pode?"
 bp1_yearly.4040.desc.feeding.1: "[ROOT.Char.GetFirstNameNoTooltip], que você esteja gostando do meu [ROOT.Char.Custom('FavoriteTreatDemand')] me faz [kindly_grandmother.Custom('ES_ElLa')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('kindly_grandmother'))] mais feliz do mundo!", grita [kindly_grandmother.GetFirstName] animada da cozinha. "Hoje preparei uma porção #EMP extra#! grande! Coma tudo agora!.\n\n#flatulence Broag…#! Ah, isso nunca para… Mas não posso dizer não e magoar minha querida [kindly_grandmother.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('kindly_grandmother'))], posso?"
 bp1_yearly.4040.desc.feeding.2: "\"Eu moldei este como [ROOT.Char.Custom('GetLivestockFowlIndef')]!\" Minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('kindly_grandmother'))] [kindly_grandmother.GetFirstName] canta, trazendo mais um prato de [ROOT.Char.Custom('FavoriteTreatDemand')]. \"Olhe, está voando direto para a sua boca!\"\n\nOh, querido [ROOT.Char.GetFaith.HighGodName], isso é demais! Mas... os seus sentimentos, eu devo pensar neles..."
 bp1_yearly.4040.desc.feeding.3: "«¿Dónde estás, [ROOT.Char.GetFirstNameNoTooltip]? ¡He bañado en mantequilla esta ración de [ROOT.Char.Custom('FavoriteTreatDemand')]!», susurra [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('kindly_grandmother'))] [kindly_grandmother.GetFirstName], su ojos registran la cocina, buscándome.\n\nEsto se está yendo de las manos… #EMP ¡¿Qué debo hacer!?#!"
 bp1_yearly.4040.desc.feeding.4: "«¿Quién hubiera imaginado que [ROOT.Char.Custom('FavoriteTreatDemand')] casaba tan bien con [ROOT.Char.Custom('GetExpensiveMeal')]? ¡Tu #EMP [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('kindly_grandmother'))]#! favorit[kindly_grandmother.Custom('ES_OA')], claro!», grita [kindly_grandmother.GetFirstName] llevando una fuente con el plato más vil que haya visto jamás. «¡La cena está lista, [ROOT.Char.GetFirstNameNoTooltip]!».\n\nNo importa lo bien que me esconda, ¡[kindly_grandmother.GetSheHe] siempre me encuentra! ¡Ay, mi pobre e hinchado cuerpo!"
 bp1_yearly.4040.a: "Eu adoraria comer seu [ROOT.Char.Custom('FavoriteTreatDemand')]!"
 bp1_yearly.4040.b: "Não, obrigado(a), estou bem."
 bp1_yearly.4040.c: "Outra mordida não faria mal..."
 bp1_yearly.4040.d: "Já comi o suficiente."
 bp1_yearly.4040.e: "Eu não posso magoar minha #EMP [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('kindly_grandmother'))|U]...#!"
 bp1_yearly.4040.f: "Eu fisicamente #EMP não posso#! comer mais uma mordida!"
 bp1_yearly.4040.desc.dead: "Ai, minha querid[kindly_grandmother.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('kindly_grandmother'))], sem você os intermináveis pratos de [ROOT.Char.Custom('FavoriteTreatDemand')], mas o alívio é agridoce. Eu preferiria muito mais ter você aqui ao meu lado do que ido para sempre.\n\nAdeus, [kindly_grandmother.GetFirstName], descanse em paz."
 bp1_yearly.4040.dead: "Talvez eu coma um prato de [ROOT.Char.Custom('FavoriteTreat')] em sua homenagem."
 bp1_yearly.4040.family_first: "Oh [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('kindly_grandmother'))], eu prefiro apenas conversar um pouco!"
 #XXX: "XXX"
