l_spanish:
 #Purchase a gift for your partner(s)
 bp1_yearly.2000.t: "Um Presente Adequado Para..."
 bp1_yearly.2000.desc.intro: "O corre-corre é notável entre as barracas dos comerciantes itinerantes. As estruturas temporárias estão abarrotadas até o teto e contêm toda sorte de quinquilharias."
 bp1_yearly.2000.desc.greed_flavor: "Essas peças parecem caras... mas talvez valham a pena."
 bp1_yearly.2000.desc.not_greed_flavor: "Essas peças são radiantes e fariam um lindo presente."
 bp1_yearly.2000.desc.single: "\n\nQuando [bp1_yearly_2000_partner_a.Custom('ES_ElLa')] [bp1_yearly_2000_partner_a.GetTitledFirstName|l] e eu passamos perto de um dos comerciantes que vendem joias, [bp1_yearly_2000_partner_a.GetSheHe] hesita levemente, ao mesmo tempo em que se inclina para olhar mais de perto.\n\nTalvez uma destas joias alegrasse o dia da minha [ROOT.Char.Custom2('PartnerOpinionDescription', SCOPE.sC('bp1_yearly_2000_partner_a') )] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('bp1_yearly_2000_partner_a'))]?"
 bp1_yearly.2000.desc.duo: "\n\nQuando passo perto de um dos comerciantes que vendem joias, hesito levemente e me inclino para olhar mais de perto.\n\nTalvez uma destas joias alegrasse o dia do meu [bp1_yearly_2000_partner_a.GetTitledFirstName|l] ou do meu [bp1_yearly_2000_partner_b.GetTitledFirstName|l]?"
 bp1_yearly.2000.a_single: "Uma [ROOT.Char.Custom('RandomJewelry')], adequada para [bp1_yearly_2000_partner_a.GetFirstNameNoTooltip]!"
 bp1_yearly.2000.a_duo: "Uma [ROOT.Char.Custom('RandomJewelry')], adequada para meu [bp1_yearly_2000_partner_a.Custom('ComplimentAdjective')] [bp1_yearly_2000_partner_a.GetFirstNameNoTooltip]."
 bp1_yearly.2000.b: "Semelhante [ROOT.Char.Custom('RandomJewelry')] teria uma aparência [ROOT.Char.Custom('RandomPositiveLookAdjective')] em alguém tão [bp1_yearly_2000_partner_b.Custom('ComplimentAdjective')] quanto [bp1_yearly_2000_partner_b.GetFirstNameNoTooltip]."
 bp1_yearly.2000.c: "Por que se contentar com um?"
 bp1_yearly.2000.c_flavor: "Vamos mimá-los!"
 bp1_yearly.2000.d: "O presente da minha companhia é brilhante o suficiente."
 #Follow-up event
 bp1_yearly.2001.t: "… Um governante"
 bp1_yearly.2001.t.first_title_duo: "… Um governante…"
 bp1_yearly.2001.t.second_title_duo: "e um[ROOT.Char.Custom('ES_XA')] bom[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan]"
 bp1_yearly.2001.desc.intro_high_opinion: ""Estimad[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetFirstNameNoTooltip], fico muito feliz em v?-lo(a)!\n\nVejo voc? governar nosso [ROOT.Char.Custom('GetRealmOrDomicile')] com dilig?ncia e gostaria de ajud?-lo(a) da melhor forma poss?vel.""
 bp1_yearly.2001.desc.intro: "\"[bp1_yearly_2001_partner.Custom2('RelationToMeShort', ROOT.Char)|U], parece que nos vemos cada vez menos!\n\nEu posso ter descoberto algumas informações úteis para o nosso governo.\""
 bp1_yearly.2001.desc.segway_secret_hook: "\n\n[bp1_yearly_2001_partner.GetSheHe|U] olha por cima do ombro"
 bp1_yearly.2001.desc.secret: "Eu ouvi algo que você não vai acreditar, escutando os serviçais outro dia."
 bp1_yearly.2001.desc.hook: "Eu posso ter... bem, não vamos falar sobre o que eu fiz na questão, mas o que eu vou dizer é que um conhecido mútuo me deve um favor."
 bp1_yearly.2001.desc.segway_lover: "\n\nUma brisa silenciosa agita seu cabelo"
 bp1_yearly.2001.desc.lover: "e eu não consigo evitar de admirar os traços de seu/sua [ROOT.Char.Custom('RandomPositiveLookAdjective')], tentando gravá-los em minha mente."
 bp1_yearly.2001.desc.segway_modifier: "\n\nEntão faz uma careta, como se lembrasse de algo importante. \"Eu poderia"
 bp1_yearly.2001.desc.close_modifier: "ficar de olhos abertos para qualquer comportamento... indelicado... que venha em nossa direção."
 bp1_yearly.2001.desc.finance_modifier: "procurar fornecer a você os melhores conselhos financeiros com base em minhas fontes."
 bp1_yearly.2001.desc.close_finance_modifier: "\n\nOu na verdade, eu estava enganado(a). Peço desculpas por ter desperdiçado seu tempo!"
 bp1_yearly.2001.desc.fallback: "\n\n\"...ou na verdade, eu estava enganado. Minhas desculpas por perder seu tempo!\""
 bp1_yearly.2001.desc.outro: "\n\n[bp1_yearly_2001_partner.GetSheHe|U] inclina a cabeça e me olha com expectativa."
 bp1_yearly.2001.a: "Ah, por favor, conte logo, [ROOT.Char.Custom('PartnerOpinionHighDescription')] meu[ROOT.Char.Custom('ES_OA')]!"
 bp1_yearly.2001.a.tt_secret: "O segredo de [bp1_yearly_2001_secret_owner.GetTitledFirstName|l]"
 bp1_yearly.2001.a_tt: "[bp1_yearly_2001_partner.GetShortUINameNoTooltip] irá compartilhar um segredo com você."
 bp1_yearly.2001.b: "Você me interessa mais #EMP tú#!, minha [ROOT.Char.Custom('LoverPetName')]!"
 bp1_yearly.2001.c: "Como você... não importa. Por favor, ilumine-me!"
 bp1_yearly.2001.c_tt: "[bp1_yearly_2001_partner.GetShortUINameNoTooltip] fornece uma pista sobre um assunto."
 bp1_yearly.2001.d: "Confio em que você dará cobertura para mim, [ROOT.Char.Custom('PartnerOpinionHighDescription')] meu[ROOT.Char.Custom('ES_OA')]."
 bp1_yearly.2001.e: "Eu #EMP apreciaria#! uma melhoria nas finanças."
 #You catch your spouses/consorts being lovers
 bp1_yearly.2010.t: "Dois navios na noite"
 bp1_yearly.2010.desc.intro: "À primeira vista, o corredor parece deserto. Com um passo firme, eu me dirijo para a primeira tarefa do dia.\n\nDe repente, eu ouço um riso abafado e paro imediatamente. Eu me inclino para a frente para pegar um vislumbre de [bp1_yearly_2010_first_partner.GetShortUIName] e [bp1_yearly_2010_second_partner.GetShortUIName],"
 bp1_yearly.2010.desc.default: "em um terno abraço sob a luz da manhã.\n\n"[bp1_yearly_2010_second_partner.GetFirstNameNoTooltip], não brinque comigo, meu [ROOT.Char.Custom('LoverPetName')]…". [bp1_yearly_2010_first_partner.GetSheHe|U] enterra o rosto no pescoço de [bp1_yearly_2010_second_partner.GetFirstNameNoTooltip].\n\n"Podemos passar a noite juntos amanhã, [ROOT.Char.Custom('LoverPetName')] meu[bp1_yearly_2010_first_partner.Custom('ES_OA')]", responde [bp1_yearly_2010_second_partner.GetFirstNameNoTooltip]. "Desde que eu possa passar meus dias com você, mais nada importa"."
 bp1_yearly.2010.desc.lustful: "quente e pesado, engajados em... oh #EMP meu#!.\n\nÀ luz do dia? E o que eles estão fazendo com aquela #EMP [ROOT.Char.Custom('DeviantObjectNoun')]#!?"
 bp1_yearly.2010.a: "Isso é doce. E possivelmente útil."
 bp1_yearly.2010.a_lustful: "Devo começar a fazer anotações!"
 bp1_yearly.2010.a_tt: "O que #EMP mais#! pode estar acontecendo debaixo do meu telhado..."
 bp1_yearly.2010.a_tt_lustful: "Estou #EMP adorando#! isso!"
 bp1_yearly.2010.b: "Talvez eles precisem de uma #EMP terceira#! pessoa para ajudar..."
 bp1_yearly.2010.tt: "Circunstâncias tão curiosas!"
 bp1_yearly.2010.c: "Isso é uma tragédia!"
 bp1_yearly.2010.c_tt: "Meu coração está partido."
 bp1_yearly.5100.t: "Flecha de Cupido"
 bp1_yearly.5100.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('unloved_courtier'))] [unloved_courtier.GetName] est? abatid[unloved_courtier.Custom('ES_OA')], e ? o quinto suspiro pesado e desanimado do dia que finalmente me faz perguntar com delicadeza sobre o assunto.\n\n"Sinto-me muito sol[unloved_courtier.Custom('ES_OA')]. Tudo o que quero ? algu?m especial! Algu?m que esteja ao meu lado durante o dia e compartilhe minha cama ? noite." Faz uma pausa e balan?a a cabe?a tristemente.\n\n"Mas o que estou dizendo? Voc?s n?o entendem minha situa??o, n?o ?, [ROOT.Char.Custom('FormOfAddressForLiege')]? Olhem para voc?s! Mas voc?s?"
 bp1_yearly.5100.desc.male: "és belamente rústico[ROOT.Char.Custom('ES_OA')]!"
 bp1_yearly.5100.desc.female: "vocês são naturalmente bel[ROOT.Char.Custom('ES_OA')]!"
 bp1_yearly.5100.desc.swole: "são atraentes[ROOT.Char.Custom('ES_OA')] e ainda por cima têm o porte de uma estátua!"
 bp1_yearly.5100.desc.scarred: "nobre, com essas cicatrizes!"
 bp1_yearly.5100.desc.fallback: "estais formad[ROOT.Char.Custom('ES_OA')] perfeitamente!"
 bp1_yearly.5100.desc.end: "Isso nunca foi um problema para você, não é mesmo?\""
 bp1_yearly.5100.a: "Seja você mesm[unloved_courtier.Custom('ES_OA')], [unloved_courtier.GetNameNoTooltip]!"
 bp1_yearly.5100.b: "Você está certo, nunca foi um problema para mim!"
 bp1_yearly.5100.c: "Eu vou te ajudar!"
 bp1_yearly.5100.d: "Não perca a esperança, [unloved_courtier.GetNameNoTooltip]."
 bp1_yearly.5100.toast: "Não funcionou."
 bp1_yearly.5101.t: "Flecha de Cupido: Um Alvo"
 bp1_yearly.5101.desc: "«¿Lo haríais, [ROOT.Char.Custom('FormOfAddressForLiege')]? ¿Me ayudaréis de verdad?».\n\nRecuerdo cómo se iluminó la cara de [unloved_courtier.GetName] cuando acepté, con cierta cautela, a ayudar[unloved_courtier.GetHerHim] a encontrar el amor. Sin embargo, no estoy precisamente versad[ROOT.Char.Custom('ES_OA')] en el arte del emparejamiento, así que me adentro entre la multitud de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTier] para buscar un amor en potencia con más esperanza que certeza.\n\nEscudriño la plaza del mercado y me fijo en varias personas, probables candidatas, pero por el bien de [unloved_courtier.GetNameNoTooltip] debería buscar a alguien que le convenga. Alguien…"
 bp1_yearly.5101.a: "… carinhoso e sensível."
 bp1_yearly.5101.b: "… justo e imparcial."
 bp1_yearly.5101.c: "… devoto e fervoroso."
 bp1_yearly.5101.d: "… na verdade, vamos escolher o mais marcante."
 bp1_yearly.5102.t: "Flecha de Cupido: Atingindo em Cheio"
 bp1_yearly.5102.desc: "Enquanto continuo minha busca, uma figura chama minha atenção. [potential_lover.GetSheHe|U]"
 bp1_yearly.5102.desc.compassionate: "está apartad[potential_lover.Custom('ES_OA')] em um canto da praça, aparentemente ajudando um gato de rua que parece desesperadamente precisar de uma bebida. Enquanto [potential_lover.GetSheHe] consola o animal patético, começo a imaginar certos pobres [ROOT.Char.Custom('GetCourtierPlural')] recebendo o mesmo altruísmo…"
 bp1_yearly.5102.desc.just: "parece estar em processo de resolver uma disputa entre dois fazendeiros. Escuta atentamente a versão da história de cada um e emite um julgamento equitativo com o qual ambas as partes parecem concordar."
 bp1_yearly.5102.desc.zealous: "escucha atentamente a un predicador que arenga a la multitud. A mí me parecen los desvaríos de un lunático, pero los ojos [potential_lover.Custom('ES_DelDela')] oyente arden con fervor y asiente con entusiasmo ante las divagaciones religiosas."
 bp1_yearly.5102.desc.peng: "não passaria despercebid[potential_lover.Custom('ES_OA')]: cercad[potential_lover.Custom('ES_OA')] por uma comitiva de admiradores, suas roupas um pouco gastas disfarçam uma aparência marcante."
 bp1_yearly.5102.desc.end: "\n\nBasta um convite para minha [ROOT.Char.Custom('GetCourt')] e a promessa de um[unloved_courtier.Custom('ES_XA')] pretendente para atrair a est[potential_lover.Custom('ES_EA')] [potential_lover.GetWomanMan], lisonjead[potential_lover.Custom('ES_OA')] e animad[potential_lover.Custom('ES_OA')] , que se revela chamar-se [potential_lover.GetName]. Ao entrar triunfalmente pela porta, vejo [unloved_courtier.GetName] absorvid[unloved_courtier.Custom('ES_OA')] em seu habitual desânimo apático do outro lado da corte.\n\n[unloved_courtier.GetNameNoTooltip] se vira para mim, expectante, com esperança brilhando em seus olhos."
 bp1_yearly.5102.a: "[unloved_courtier.GetNameNoTooltip]! Venha aqui!"
 bp1_yearly.5102.b: "Na verdade, talvez você prefira dispensar o encontro?"
 bp1_yearly.5102.c: "Perderíeis o tempo com um [unloved_courtier.Custom('ES_XA')] [unloved_courtier.GetWomanMan] da categoria de meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('unloved_courtier'))]."
 bp1_yearly.5102.a.success: "Eles se dão bem"
 bp1_yearly.5102.a.failure: "Não há química"
 #Your friend is concerned about your weight
 bp1_yearly.5301.t: "Um Problema de Peso"
 bp1_yearly.5301.start: "Tenho percebido que [concerned_friend.GetFirstName] ficou me observando a noite inteira enquanto comemos,"
 bp1_yearly.5301.thicc: "mas é só quando aceito com alegria uma terceira porção de [ROOT.Char.Custom('GetExpensiveDessert')] que bate na mesa de repente.\n\n\"Não posso deixar isso continuar por mais tempo!\", ele/ela me grita. \"Não posso ficar aqui sentado(a) vendo você se comer até a morte, [concerned_friend.Custom('ES_OA')]!\".[ROOT.Char.GetFirstName] Fico um pouco irritado(a), mas é difícil parecer indignado(a) com a boca cheia. \n\n talvez eu #EMP Tal vez#! de vez em quando, mas administrar meu [ROOT.Char.GetPrimaryTitle.GetTierAsName|l] é muito estressante!"
 bp1_yearly.5301.thinn: "pero es solo cuando sigo picoteando el primer plato mientras los siguientes se acumulan que golpea la mesa de repente.\n\n«¡No puedo dejarlo pasar más!», me grita. «¡Ni seguir sentad[concerned_friend.Custom('ES_OA')] viendo cómo os echáis a perder, [ROOT.Char.GetFirstName]!».\n\nMe molesto un poco, pero es difícil parecer indignad[ROOT.Char.Custom('ES_OA')] detrás de una pila creciente de platos. Tal vez #EMP no#! tenga demasiado tiempo para comer, ¡pero dirigir mi [ROOT.Char.GetPrimaryTitle.GetTierAsName|l] es un asunto que consume todo mi tiempo!"
 bp1_yearly.5301.a: "Sabe de uma coisa, [concerned_friend.GetFirstNameNoTooltip]? Você tem razão."
 bp1_yearly.5301.a.tt: "Os dois investigam maneiras de ficar em forma"
 bp1_yearly.5301.b: "Não sou tão gord[GetPlayer.Custom('ES_OA')]!"
 bp1_yearly.5301.b.tt: "Você procura uma maneira de provar o seu ponto de vista"
 bp1_yearly.5301.c: "Não estou magro demais[GetPlayer.Custom('ES_OA')]!"
 bp1_yearly.5301.d: "Você é um a falar de aparência!"
 bp1_yearly.5301.d.tt: "Os dois se engajam em uma briga de punhos um tanto patética"
 bp1_yearly.5301.d.tt.win: "Você ganha a briga"
 bp1_yearly.5301.d.tt.lose: "Você perde a briga"
 bp1_yearly.5302.t: "$bp1_yearly.5301.t$: Estrada Rochosa"
 bp1_yearly.5302.desc: "Es un día fresco y soleado, y puedo ver el sudor goteando por la barbilla de [concerned_friend.GetFirstName] mientras sigue animándome a avanzar. El saco de piedras que llevo a la espalda gime bajo el peso, y yo también mientras lo arrojo sobre la raya en la tierra que [concerned_friend.GetFirstNameNoTooltip] había dibujado con un palo. Aplaude encantad[concerned_friend.Custom('ES_OA')].\n\n«¡Ya parecéis más fuerte! Creo que es hora de pasar a algo un poco más grande».\n\n«Sé que se están llevando a cabo unas obras de drenaje en el campo de al lado y les vendría bien algo de ayuda. Si no, si os sentís con valor, encima de la cresta están talando un bosquecillo. ¿Qué os parece?»."
 bp1_yearly.5302.a: "Traga-me um machado!"
 bp1_yearly.5302.a.tt: "Você segue em direção ao bosque de árvores"
 bp1_yearly.5302.b: "Melhor ficar apenas com a drenagem."
 bp1_yearly.5302.b.tt: "Você parte para o campo próximo"
 bp1_yearly.5303.t: "$bp1_yearly.5301.t$: Derrubando Árvores"
 bp1_yearly.5303.desc: "La tala de árboles es un asunto peligroso para alguien tan inexpert[GetPlayer.Custom('ES_OA')] como yo. Incluso bajo la atenta mirada de [concerned_friend.GetFirstName], la combinación de falta de conocimiento y forma física en mí ya ha dado lugar a unos cuantos accidentes. Clavo el hacha en la madera de un tronco cercano y me paro para beber un trago de mi petaca. [concerned_friend.GetFirstNameNoTooltip] se acerca a mí, con su propia hacha colgada al hombro.\n\n«¡Creo que estáis en situación de enfrentaros a algo un poco más grande!», dice alegre, y señala con su hacha. El árbol que me indica es enorme, de tronco imponente, y lo miro con recelo mientras mis doloridos músculos se tensan con anticipación."
 bp1_yearly.5303.a: "Bem, não pode ser tão difícil, não é?"
 bp1_yearly.5303.a.criticalsuccess: "Você derruba a árvore com sucesso!"
 bp1_yearly.5303.a.failure: "Você não consegue derrubar a árvore sem ajuda"
 bp1_yearly.5303.a.wounded: "A árvore te acerta no caminho para baixo"
 bp1_yearly.5303.a.criticalfailure: "A árvore cai diretamente em cima de você!"
 bp1_yearly.5303.b: "Você poderia me dar uma mão, [concerned_friend.GetFirstNameNoTooltip]?"
 bp1_yearly.5304.t: "$bp1_yearly.5301.t$: Padrão Bog"
 bp1_yearly.5304.desc: "O terreno encharcado e pantanoso em que me ofereci para ajudar torna o trabalho suado. Trabalho duro ao lado dos camponeses ing?nuos com uma picareta, cavando valas e depositando sacos de lama ?mida longe da ?rea.\n\n[concerned_friend.GetFirstName] e eu estamos fazendo uma pausa, parados na estreita faixa entre duas ?reas de brejo, quando [waterboy.GetFirstName], do grupo de crian?as encarregadas de manter os trabalhadores hidratados, vem at? mim oferecendo uma garrafa. Mal tomei um gole quando [waterboy.GetFirstNameNoTooltip], ao tentar alcan?ar a garrafa, perde o equil?brio e cai diretamente no brejo!"
 bp1_yearly.5304.a: "Aguente, [waterboy.Custom('GirlBoy')]! Eu te peguei!"
 bp1_yearly.5304.b: "Alguém além de nós notaria se se afogasse?"
 bp1_yearly.5305.t: "$bp1_yearly.5301.t$: Em Boa Forma"
 bp1_yearly.5305.desc: "Uma vez conclu?das minhas tarefas, despedi-me dos camponeses com quem havia trabalhado ao lado de [concerned_friend.GetFirstName] ? eles me acenaram alegremente, sem suspeitar em nada da minha origem nobre ? e voltei ao meu alojamento habitual. Embora meus m?sculos estejam doloridos, sinto-me replet[ROOT.Char.Custom('ES_OA')] de for?a e vitalidade.\n\nAo ver uma grande bacia de ?gua do outro lado da sala, levanto-me e me aproximo dela. Tiro a camisa e, ? luz das velas, observo-me no reflexo da ?gua."
 bp1_yearly.5305.a: "Eu estou ótimo!"
 bp1_yearly.5305.b: "Eu devo tudo a você, [concerned_friend.GetFirstNameNoTooltip]."
 bp1_yearly.5306.t: "$bp1_yearly.5301.t$: Teste de Força"
 bp1_yearly.5306.start: "Hech[ROOT.Char.Custom('ES_OA')] una furia, irrumpo en mi [ROOT.Char.Custom('GetCourt')], con [concerned_friend.GetFirstName] detrás de mí.\n\n«¡[ROOT.Char.GetFirstName]! ¡Por favor, no tenéis que demostrarme nada! ¡Podemos olvidar lo que he dicho!». [concerned_friend.GetFirstName] se detiene ante un gesto desdeñoso de mi mano mientras escudriño la estancia en busca de algo lo bastante voluminoso. ¡¿Cómo osa [concerned_friend.GetSheHe] poner en duda mi honor de ese modo?!\n\n"
 bp1_yearly.5306.artifact: "Meu olhar se fixa no meu [bulky_artifact.GetName]."
 bp1_yearly.5306.throne: "Meu olhar se fixa em meu trono."
 bp1_yearly.5306.table: "Meu olhar se fixa em uma mesa pesada."
 bp1_yearly.5306.ending: "Para horror de [concerned_friend.GetFirstNameNoTooltip], tiro a camisa e imediatamente me posiciono para levantar seu peso imenso."
 bp1_yearly.5306.a: "Testemunhe-me, [concerned_friend.GetFirstNameNoTooltip]!"
 bp1_yearly.5306.a.success: "Você joga o trono para o ar!"
 bp1_yearly.5306.a.failure: "Você estica as costas"
 bp1_yearly.5306.a.criticalfailure: "Você deixa cair em cima de si mesmo!"
 bp1_yearly.5306.a.criticalsuccess: "Você a levanta no ar."
 bp1_yearly.5306.b: "… pensando melhor, talvez vocês estejam certos."
 bp1_yearly.5800.t: "Um cheiro estranho"
 bp1_yearly.5800.desc: "Al despertar junto a mi [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('surprised_sniffer'))] [surprised_sniffer.GetFirstName], suspiro y me estiro lánguidamente solo para ver a mi amor arrugar la nariz. Abro la boca para preguntary veo cómo [surprised_sniffer.GetFirstNameNoTooltip] retrocede más aún.\n\n«Escuchad, [ROOT.Char.GetFirstName], amor mío…», comienza a decir rápidamente, como si las palabras salieran de su boca por accidente. «Me cuesta sacar el tema, pero… últimamente no oléis especialmente bien».\n\nConfundid[ROOT.Char.Custom('ES_OA')] y por curiosidad, me #flatulence olfateo#! la axila.\n\nBueno, puede que tenga razón."
 bp1_yearly.5800.a: "Precisamos encontrar uma maneira de consertar isso!"
 bp1_yearly.5800.a.tt: "Você procura uma solução para o problema"
 bp1_yearly.5800.b: "Não é #EMP tão#! ruim assim!"
 bp1_yearly.5801.t: "$bp1_yearly.5800.t$: Qualidade Superior"
 bp1_yearly.5801.desc: "Bocejo cansadamente enquanto [surprised_sniffer.GetFirstName] me conduz animadamente para uma cidade próxima. Ele insistiu em partir o mais rápido possível — o que, em retrospecto, é um tanto ofensivo — e abrimos caminho entre a pequena multidão até onde um vendedor de frutas e ervas estava oferecendo suas mercadorias.\n\n"Certo!", diz [surprised_sniffer.GetFirstNameNoTooltip] com expectativa. "Escolha um destes. Eles farão com que o aroma inicial fique fresco e frutado!". [surprised_sniffer.GetFirstNameNoTooltip] revira os olhos diante da minha expressão perplexa.\n\n"Estamos fazendo um #EMP perfume#!, é claro!"."
 bp1_yearly.5801.a: "Isso é uma figueira?"
 bp1_yearly.5801.b: "Talvez um pouco de hortelã?"
 bp1_yearly.5801.c: "Eu gosto do cheiro de limão!"
 bp1_yearly.5801.d: "Romã seria caro..."
 bp1_yearly.5801.fig: "[perfume_bottle.GetDesc] Tem notas de figo"
 bp1_yearly.5801.mint: "[perfume_bottle.GetDesc] Tem notas de menta"
 bp1_yearly.5801.lemon: "[perfume_bottle.GetDesc] Tem notas de limão"
 bp1_yearly.5801.pomegranate: "[perfume_bottle.GetDesc] Tem notas de romã"
 bp1_yearly.5802.t: "$bp1_yearly.5800.t$: Do Coração"
 bp1_yearly.5802.desc: "Tras mi elección de hace una semana, casi se me había olvidado la misión de [surprised_sniffer.GetFirstName] de fabricarme una fragancia. Solo lo recuerdo cuando se detiene en seco en la calle y gira sobre sus talones, arrastrándome hasta un comerciante de especias al lado del camino.\n\n«¡Estos serían perfectos!», susurra. «¡Todo lo que hay aquí sería perfecto para el núcleo del perfume!».\n\nMiro las especias e inciensos reunidos, muchos de ellos extraños y exóticos a mi vista."
 bp1_yearly.5802.a: "O que é isso... cardamomo?"
 bp1_yearly.5802.b: "Você disse que isso se chama noz-moscada?"
 bp1_yearly.5802.c: "Este cheiro de canela é maravilhoso!"
 bp1_yearly.5802.d: "O incenso seria um perfume divino!"
 bp1_yearly.5802.cardamom: "[perfume_bottle.GetDesc], cardamomo aromático"
 bp1_yearly.5802.nutmeg: "[perfume_bottle.GetDesc], noz-moscada picante"
 bp1_yearly.5802.cinnamon: "[perfume_bottle.GetDesc], canela acolhedora"
 bp1_yearly.5802.frankincense: "[perfume_bottle.GetDesc], incenso picante"
 bp1_yearly.5803.t: "$bp1_yearly.5800.t$: Uma Base Forte"
 bp1_yearly.5803.desc: "Ao passar por um vendedor na beira de uma floresta que vende o que parecem ser tipos de madeira e produtos relacionados, só consigo sentir um pavor crescente por um segundo antes de os olhos de [surprised_sniffer.GetFirstName] se iluminarem e me puxar até eles.\n\n"Ora, #EMP estos#! seriam exatamente adequados para os nossos propósitos!", ele indica algumas das madeiras mais raras e suas resinas empilhadas à esquerda do mercador. "Isso daria ao cheiro uma base poderosa e faria com que durasse um dia inteiro!"."
 bp1_yearly.5803.a: "O carvalho é uma madeira fina!"
 bp1_yearly.5803.b: "Eu gosto de como essas resinas parecem."
 bp1_yearly.5803.c: "Sândalo? Que madeira incomum."
 bp1_yearly.5803.d: "Você chama isso de raspas de 'oud'? Elas cheiram doce!"
 bp1_yearly.5803.oak: "[perfume_bottle.GetDesc], carvalho forte"
 bp1_yearly.5803.resin: "[perfume_bottle.GetDesc], resina ambarina"
 bp1_yearly.5803.sandalwood: "[perfume_bottle.GetDesc], sândalo suave"
 bp1_yearly.5803.oud: "[perfume_bottle.GetDesc], oud pegajoso"
 bp1_yearly.5804.t: "$bp1_yearly.5800.t$: Uma Última Gota"
 bp1_yearly.5804.desc: "Apesar de mim mesmo, acabei gostando bastante da minha busca por ingredientes de perfumaria. Então, com certa expectativa, descubro que um vendedor em uma cidade daqui possui vários itens muito raros e cobiçados que podem me interessar.\n\nExamino as mercadorias. Alguns talos de capim seco, um pó branco e... o que parece ser umas pedras cinzentas, opacas e quebradiças?\n\nO mercador me olha com expectativa enquanto [surprised_sniffer.GetFirstName] observa as mercadorias."
 bp1_yearly.5804.a: "Bem, pelo menos esse capim seco cheira bem."
 bp1_yearly.5804.a.tt: "Você compra o vetiver."
 bp1_yearly.5804.b: "Eu suponho que esse pó branco reduziria bem."
 bp1_yearly.5804.b.tt: "Você compra o cânfora."
 bp1_yearly.5804.c: "Você disse que isso é #EMP vômito de baleia#!?!"
 bp1_yearly.5804.c.tt: "Você compra o âmbar cinzento."
 bp1_yearly.5804.d: "Nenhum desses parece ser útil!"
 bp1_yearly.5805.t: "$bp1_yearly.5800.t$: Aroma Sedutor"
 bp1_yearly.5805.desc: "Depois de entregar a um artesão local todos os ingredientes que reuni alguns dias atrás, com deleite e apreensão desenrolo as tiras de couro do perfume resultante.\n\nDentro há uma pequena e simples garrafa que contém uma mistura de cores; de início é [ROOT.Char.Custom('GetSimpleColor')] mas, quando a ergo à luz, ela se torna [ROOT.Char.Custom('GetComplexColor')].\n\nAbro a tampa grosseira e o cheiro acaricia meu olfato. Chamo [surprised_sniffer.GetFirstName] com entusiasmo, e nós dois nos maravilhamos com a fragrância que paira no meu [ROOT.Char.Custom('GetRoom')]."
 bp1_yearly.5805.a: "Sinto-me a pessoa mais rica do mundo!"
 bp1_yearly.5805.b: "Eu vou pegar um decant; meu amor pode ter a garrafa."
 bp1_yearly.5805.vetiver: "[perfume_bottle.GetDesc] e vetiver amadeirado e levemente couroso."
 bp1_yearly.5805.camphor: "[perfume_bottle.GetDesc] e cânfora herbal e picante."
 bp1_yearly.5805.ambergris: "[perfume_bottle.GetDesc] e âmbar-do-mar doce e terroso."
 bp1_yearly.5805.blended: "[perfume_bottle.GetDesc] e exala um aroma doce."
 bp1_yearly.5708.t: "Um Amigo Fiel"
 bp1_yearly.5708.start: "Caminho por um beco movimentado com meu amig[heathen_friend.Custom('ES_OA')] [heathen_friend.GetFirstName], quando ele desaparece de repente. Viro-me e [seduced_rival.GetHerHim] vejo mergulhad[heathen_friend.Custom('ES_OA')] em uma discussão com um comerciante cujas mercadorias parecem consistir principalmente em curiosas bugigangas. [heathen_friend.GetFirstNameNoTooltip|U], uma vez concluída sua transação, ele volta até mim, passando distraidamente os dedos pela nova compra.\n\n"
 bp1_yearly.5708.normal: ""É um ícone religioso. Não da sua fé [ROOT.Char.GetFaith.GetAdjective], minha [heathen_friend.Custom2('RelationToMeShort', ROOT.Char)], mas da minha", me explica. Um sorriso cruza seu rosto quando vislumbra meu próprio símbolo, suspenso de uma corrente em torno do meu pescoço."
 bp1_yearly.5708.aniconist: "\"É um pequeno bastão de incenso, minha [heathen_friend.Custom2('RelationToMeShort', ROOT.Char)]. Sinto que ele me ajuda a concentrar a mente enquanto pratico minha fé\", explica [heathen_friend.GetSheHe]. Um sorriso cruza seu rosto quando me olha."
 bp1_yearly.5708.end: "\"Sempre apreciei como você me trata tão bem apesar das nossas diferenças teológicas.\""
 bp1_yearly.5708.a: "Isso é uma bobagem pagã!"
 bp1_yearly.5708.b: "Bem, se [heathen_friend.GetFirstNameNoTooltip] não é tão ruim[heathen_friend.Custom('ES_OA')], então…"
 bp1_yearly.5708.b.tt: "Todos os vassalos com o traço [GetTrait('zealous').GetName( GetNullCharacter )] de [faith|lE] diferente perdem #negative_value 10#! de [opinion|lE] sobre você"
 bp1_yearly.5708.c: "Talvez eu possa aprender algo com [heathen_friend.GetFirstNameNoTooltip]?"
 bp1_yearly.5708.c.tt.success: "Você aprende mais sobre as costumes de [heathen_friend.GetFirstNameNoTooltip]"
 bp1_yearly.5708.c.tt.failure: "Você não consegue entender os costumes de [heathen_friend.GetFirstNameNoTooltip]"
 bp1_yearly.5709.t: "Isca, Linha..."
 bp1_yearly.5709.desc: "¡Qué día tan maravilloso para ir a pescar! Nada me podría borrar la sonrisa de la cara, si no fuera por una voz detrás de mi compañer[friend_backup.Custom('ES_OA')] de pesca [friend_backup.GetFirstName] y de mí.\n\n«¡Mira a quién tenemos aquí!». [rival_on_sight.GetFirstName], que claramente acaba de regresar de su propia excursión de pesca, está flanqueado por la figura de [rival_friend.GetFirstName]. [rival_on_sight.Custom('ES_ElLa')|U] primer[rival_on_sight.Custom('ES_OA')] se agacha y agarra un de sus capturas que se retuercen. «¡El parecido es #EMP asombroso#!!».\n\nMe doy la vuelta para poner los ojos en blanco e irme dramáticamente, pero un #EMP golpe seco#! y una humedad por la nuca me paran en seco. Los ojos de [friend_backup.GetFirstNameNoTooltip] se entrecierran mientras contempla el pescado que nos han tirado."
 bp1_yearly.5709.a: "Vamos resolver isso na porrada!"
 bp1_yearly.5709.a.tt.success: "Você ganha a briga"
 bp1_yearly.5709.a.tt.failure: "Você perde a briga"
 bp1_yearly.5709.b: "[rival_on_sight.GetFirstNameNoTooltip], seu [rival_on_sight.Custom2('InsultNoun', ROOT.Char)]! Desafio você!"
 bp1_yearly.5709.b.tt: "Inicie um [Concept( 'single_combat_duel', 'duelo' )|E] com [rival_on_sight.GetFirstNameNoTooltip]"
 bp1_yearly.5709.c: "Não vou me envolver em uma briga infantil."
 bp1_yearly.5709.c.tt: "Deixe-os com seu comportamento infantil."
 bp1_yearly.5711.t: "… e anzol"
 bp1_yearly.5711.desc: "[rival_on_sight.GetFirstName] cambaleia para ficar de p? ap?s nosso duelo, ainda teimosamente desafiante. Abre a boca para reclamar, mas mal consegue dizer uma palavra antes que eu a encha com o peixe que h? pouco usou como proj?til. Cambaleando, aproxima-se perigosamente da beira do cais.\n\nDou um passo ? frente e cravo um p? bem no est?mago. Por um momento que parece uma eternidade, fica suspens[rival_on_sight.Custom('ES_OA')] no ar: bra?os girando, olhos esbugalhados, peixe firmemente enfiado na cara, antes de despencar diretamente para baixo.\n\nO enorme baque na ?gua levanta uma grande coluna, e um[rival_friend.Custom('ES_XA')] horrorizad[rival_friend.Custom('ES_OA')] [rival_friend.GetFirstName] se apressa at? a beira do p?er para estender a m?o a seu amig[rival_on_sight.Custom('ES_OA')] que n?o para de gaguejar."
 bp1_yearly.5711.a: "Você também pode ir!"
 bp1_yearly.5711.b: "Hah, hah! Bem feito!"
 bp1_yearly.5712.t: "Alguma coisa errada?"
 bp1_yearly.5712.desc: "Me levanto con furia para enfrentarme a las burlas de [rival_on_sight.GetFirstName] y su compinche [rival_friend.GetFirstName]. Por mi inestabilidad, el intento de clavar el dedo en el pecho de [rival_friend.GetFirstNameNoTooltip] me hace pasarle de largo por completo. Solo le hace falta un barrido y, de repente, mi visión vuelve a estar oscurecida por la mugre.\n\n[rival_friend.GetFirstNameNoTooltip], con una sonrisa de satisfacción, aplaude sarcásticamente mientras ruedo sobre la espalda. Mi ira aumenta una vez más, pero nada más sentarme, ¡el maldito pez me golpea de nuevo en la cara con una sonora #EMP bofetada#!! [rival_friend.GetFirstNameNoTooltip] y [rival_friend.GetFirstNameNoTooltip] estallan en carcajadas mientras se alejan, para dejar que un[friend_backup.Custom('ES_XA')] preocupad[friend_backup.Custom('ES_OA')] [friend_backup.GetFirstName] me ponga finalmente de pie."
 bp1_yearly.5712.a: "Eu não vou esquecer disso, [rival_on_sight.GetFirstNameNoTooltip]!"
 bp1_yearly.5712.b: "Talvez eu devesse apenas ficar longe do seu caminho..."
 bp1_yearly.5713.t: "Relações Recheadas"
 bp1_yearly.5713.desc: "Me doy cuenta de que algo va mal con mi [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('destitute_spouse'))] [destitute_spouse.GetFirstName] en cuanto estamos juntos en el lecho. Está claramente distraíd[destitute_spouse.Custom('ES_OA')] y le agarro la mano suavemente mientras le pregunto qué le pasa.\n\n«Es… un asunto de dinero», suspira, pasándose la mano libre por la cabeza. «Tengo familiares pasando una mala racha y están a punto de perder su hogar. Pasé un tiempo allí en mi infancia…».\n\nMe mira suplicante. «¿Po… podríamos hacer algo? Estoy segur[destitute_spouse.Custom('ES_OA')] de que nos lo devolverían, solo tienen que recuperarse. Sé que cumplirían, ¡lo juro!»."
 bp1_yearly.5713.a: "Me ocuparé de ello. Ahora deja que yo me #EMP ocupe#! de #EMP ti…#!"
 bp1_yearly.5713.b: "Eles podem ter tudo o que precisam, e mais."
 bp1_yearly.5713.c: "Deixe comigo."
 bp1_yearly.5713.d: "Como você se atreve a me extorquir?!"
 bp1_yearly.5714.t: "Dizendo Adeus"
 bp1_yearly.5714.desc: "Hay un agujero profundo y sin fondo en mi corazón.\n\n[deceased_pal.GetFirstName] fue un[deceased_pal.Custom('ES_XA')] compañer[deceased_pal.Custom('ES_OA')] y confidente constante, y que [deceased_pal.GetHerHim] hayan arrancado de mi vida es como una herida mortal de la que nunca me recuperaré. En la mano tengo una nota que me pasó, la #EMP última#! nota que me pasará, caigo en la cuenta, amargamente. Trato de leerla, pero lo único que consigo es alejarla de mi cara para que las lágrimas no borren las preciosas palabras que contiene.\n\nAunque hay una multitud de dolientes a mi alrededor, jamás me he sentido tan sol[ROOT.Char.Custom('ES_OA')]."
 bp1_yearly.5714.a: "Nunca esquecerei este dia."
 bp1_yearly.5714.a.catharsis: "#weak Você experimenta algum nível de catarse#!"
 bp1_yearly.5714.a.sad: "#weak Sua tristeza flui livremente#!"
 bp1_yearly.5714.a.reallysad: "#weak Sua tristeza o sobrecarrega#!"
 bp1_yearly.5714.a.depressed: "#weak Você cai em depressão#!"
 bp1_yearly.5714.b: "Preciso ser forte e seguir em frente."
 bp1_yearly.5715.t: "Louco Falador"
 bp1_yearly.5715.desc: "«¡No! ¡Es que no se dice así! El venerable erudito que #EMP inventó#! la palabra dijo que se pronunciaba tal como yo digo…».\n\nMi [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('gibbet_friend'))] [gibbet_friend.GetFirstName] y yo estamos teniendo un debate acalorado que no muestra signos de aflojar. Al pasar por una horca cercana, hace un comentario sobre ella. Como domino el [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip], corrijo ligeramente su pronunciación —el primer fonema es mudo, no aspirado, #EMP obviamente#!— y tiene la osadía de discrepar, ¡y encima a gritos!\n\n«¡No puedo creer que sigáis manteniendo esta posición lingüística tan [ROOT.Char.Custom2('InsultAdjective', SCOPE.sC('gibbet_friend'))]!», suelta frustrad[gibbet_friend.Custom('ES_OA')] por mi insistencia."
 bp1_yearly.5715.a: "Concordaremos em discordar."
 bp1_yearly.5715.b: "É como eu digo. Isso é o fim!"
 bp1_yearly.5715.c: "É 'gibbet', e vou provar!"
 bp1_yearly.5715.c.tt.success: "Você vence o debate"
 bp1_yearly.5715.c.tt.failure: "Você perde o debate"
 bp1_yearly.5716.t: "Fora, [ROOT.Char.GetFaith.random_EvilGodNames]!"
 bp1_yearly.5716.desc: "Ao vagar pelo meu [ROOT.Char.Custom('GetCourt')], ouço uma voz alterada, à beira da raiva. Dou meia-volta e me deparo com uma cena insólita. [book_burner.GetFirstName] está de pé, erguendo-se sobre meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('book_child'))] [book_child.GetFirstName], repreendendo-o enquanto meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('book_burner'))] lança outro livro às garras de uma fogueira crepitante.\n\n"Você não vai ler mais nada dessa #EMP escoria impura#!!", ruge, condenando outro livro às chamas. "Nenhuma criança desta casa sofrerá a influência de [ROOT.Char.GetFaith.DevilNamePossessive]!"."
 bp1_yearly.5716.nobook: "\n\nPego um livro da pilha que [book_burner.GetFirstNameNoTooltip] marcou para destruição, encontrando apenas conteúdo inócuo sobre... construir pequenos castelos de terra?"
 bp1_yearly.5716.yesbook: "\n\nPego um livro da pilha que [book_burner.GetFirstNameNoTooltip] quer destruir exatamente no mesmo momento em que [book_burner.GetSheHe] também o agarra."
 bp1_yearly.5716.a: "Este pecado não será tolerado!"
 bp1_yearly.5716.b: "Bom, qualquer coisa para manter a paz..."
 bp1_yearly.5716.c: "Pare imediatamente com isso! A criança precisa aprender!"
 bp1_yearly.5717.t: "Briga de bêbados"
 bp1_yearly.5717.desc: "A taverna de [tavern_county.GetNameNoTier] ? normalmente o lugar perfeito para esquecer os problemas do mundo, mas esta noite ? uma exce??o.\n\nA m? sorte quis que, numa mesa ao lado de onde [bff_defender.GetFirstName] e eu estamos sentados, esteja meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('5717_nemesis'))], [5717_nemesis.GetFirstName], que tem sido um inc?modo desde que chegamos. S? bastou mais um derramamento "acidental" da sua [5717_nemesis.Custom('RegionalDrink')] sobre meu bra?o e, de repente, [bff_defender.GetFirstNameNoTooltip] se p?s de p?.\n\n[5717_nemesis.GetFirstNameNoTooltip] se levanta em seguida, e os dois est?o prestes a acertar as contas, bem b?bados, quando finalmente consigo tamb?m me p?r de p?."
 bp1_yearly.5717.a: "Bata no rosto de [bff_defender.GetFirstNameNoTooltip]!"
 bp1_yearly.5717.a.tt.win: "[bff_defender.GetNameNoTooltip] vence a luta"
 bp1_yearly.5717.a.tt.lose: "O [bff_defender.GetNameNoTooltip] perde a luta"
 bp1_yearly.5717.b: "[5717_nemesis.GetSheHe|U] não vale a pena, companheiro!"
 bp1_yearly.5717.c: "Dê lugar; [5717_nemesis.GetFirstNameNoTooltip] é meu."
 bp1_yearly.5717.c.tt: "#weak Vocês dois resolvem sua disputa lá fora...#!"
 bp1_yearly.5717.c.tt.duel: "Começa um [single_combat_duel|lE] entre você e [5717_nemesis.GetFirstNameNoTooltip]"
 bp1_yearly.5718.t.win: "Você venceu a luta"
 bp1_yearly.5718.t.lose: "Você perdeu a luta"
 bp1_yearly.5719.t: "Situações de impostos"
 bp1_yearly.5719.start: "Há muitos dias meu chanceler [chancellor.GetFirstName] vinha notando um desvio de renda que não era contabilizado. Agora, tendo visto a prova, me vejo convocando meu vassalo[disloyal_vassal.Custom('ES_OA')] [disloyal_vassal.GetFirstName] para esclarecer toda a história.\n\nAs provas de [chancellor.GetFirstNameNoTooltip] foram conclusivas e irrefutáveis; [disloyal_vassal.GetFirstNameNoTooltip] vinha desviando impostos que eram destinados a mim!"
 bp1_yearly.5719.normal: "[disloyal_vassal.Custom('ES_ElLa')|U] [disloyal_vassal.GetTitleAsNameNoTooltip|l] corrupt[disloyal_vassal.Custom('ES_OA')] n?o tenta se defender e sorri com petul?ncia.\n\n"? tudo verdade, [ROOT.Char.Custom('FormOfAddressForLiege')]. Eu queria cofres mais cheios."\n\n? um desafio aberto ? minha autoridade."
 bp1_yearly.5719.terrified: "[disloyal_vassal.Custom('ES_ElLa')|U] [disloyal_vassal.GetTitleAsNameNoTooltip|l] corrupt[disloyal_vassal.Custom('ES_OA')] tenta se defender, mas custa a encontrar as palavras e se acovarda diante da minha ira.\n\nVejo o medo em seu olhar enquanto caminho de um lado para o outro diante de [disloyal_vassal.GetSheHe], encenando meu ato de ponderar minha decis?o."
 bp1_yearly.5719.a: "Você vai devolver esse dinheiro e se lembrar deste dia!"
 bp1_yearly.5719.a.tt.dread: "#medium Esta opção está disponível para você devido ao seu alto nível de [dread|lE] #!"
 bp1_yearly.5719.b: "Pague o dinheiro de volta. Agora."
 bp1_yearly.5719.b.tt.win: "[disloyal_vassal.GetFirstNameNoTooltip] devolve o dinheiro com ressentimento[disloyal_vassal.Custom('ES_OA')]"
 bp1_yearly.5719.b.tt.lose: "[disloyal_vassal.GetFirstNameNoTooltip] despreza abertamente sua exigência"
 bp1_yearly.5719.c: "Talvez possamos chegar a um acordo?"
 bp1_yearly.5719.d: "Apenas... apenas não faça isso de novo!"
 bp1_yearly.5720.t: "Teste de Força"
 bp1_yearly.5720.desc: "J? tomei v?rias ta?as de [ROOT.Char.Custom('RegionalDrink')] durante esta refei??o, mas a maldita presen?a de [rival_challenger.GetFirstName] estraga minha noite.\n\n"[ROOT.Char.Custom2('InsultNoun', SCOPE.sC('rival_challenger'))|U], seu [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('rival_challenger'))]!", ruge. "Voc? n?o conseguiria vencer uma crian?a numa disputa de for?a! Eu poderia prender seu bra?o ? mesa agora mesmo, quase sem esfor?o!"
 bp1_yearly.5720.a: "Claro, com nossos braços #EMP esquerdos#!, sim?"
 bp1_yearly.5720.a.tt: "Isso pode não me tornar popular em [THIS.Char.Custom('GetCourt')], mas vai ser #EMP incrível#!..."
 bp1_yearly.5720.b: "Hah! Hah! Vamos lá, então!"
 bp1_yearly.5720.b.tt.win: "Você vence [rival_challenger.GetNameNoTooltip] com facilidade desdenhosa"
 bp1_yearly.5720.b.tt.bigwin: "Você quebra o braço de [rival_challenger.GetNameNoTooltip]"
 bp1_yearly.5720.c: "Prove isso, seu [rival_challenger.Custom2('InsultNoun', ROOT.Char)]!"
 bp1_yearly.5720.c.tt.win: "Você vence [rival_challenger.GetFirstNameNoTooltip]"
 bp1_yearly.5720.c.tt.lose: "[rival_challenger.GetFirstNameNoTooltip] prende seu braço na mesa"
 bp1_yearly.5720.d: "Eu não vou me envolver nesses joguinhos mesquinhos."
 bp1_yearly.5721.t: "Ao Redor do Fogo"
 bp1_yearly.5721.desc: "¡Qué noche más hermosa! La hoguera crepita y restalla, escupiendo humo hacia el cielo nocturno. La golosina con miel ensartada en el extremo de mi palo se carameliza lentamente, y observo con interés cómo su color cambia poco a poco.\n\nJunto a mí, [marshmallow_friend.GetFirstName] está haciendo lo mismo mientras los adultos beben [ROOT.Char.Custom('RegionalDrink')] y se entretienen con historias de eventos pasados, muchos años antes de que cualquiera de nosotr[ROOT.Char.Custom('ES_OA')]s naciera.\n\n[marshmallow_friend.GetSheHe|U] y yo no hemos hablado demasiado antes, pero estaría bien por una vez poder hablar con alguien de mi edad…"
 bp1_yearly.5721.a: "Você... você quer ser meu amig[marshmallow_friend.Custom('ES_OA')] [marshmallow_friend.GetFirstNameNoTooltip]?"
 bp1_yearly.5721.a.tt.yes: "Você faz amizade"
 bp1_yearly.5721.a.tt.no: "[marshmallow_friend.GetFirstNameNoTooltip] não está interessado"
 bp1_yearly.5721.b: "Isso foi divertido!"
 bp1_yearly.5721.c: "Eu poderia comer mais um doce..."
 bp1_yearly.5721.c.tt: "Com uma pequena distração, você provavelmente poderia pegar o doce que [marshmallow_friend.GetSheHe] está assando..."
 bp1_yearly.5722.t: "O Catapulta"
 bp1_yearly.5722.desc: "«¡Nos encontramos de nuevo, [ROOT.Char.GetFirstName], vulgar [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('rival_catapulter'))]!», se burla mi [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('rival_catapulter'))], [rival_catapulter.GetFirstName] cuando me aborda mientras inspecciono el nuevo equipo militar. «Por fin, nosotros, dos personas de honor, nos encontramos en igualdad de condiciones… ¡Ja! Picasteis».\n\nTardo un momento en procesar que [rival_catapulter.GetFirstNameNoTooltip] acaba de coger a mi gato [ROOT.Char.Custom('CatStoryName')] y otro momento en darme cuenta de que está huyendo. Una vez superada la impresión, [rival_catapulter.GetHerHim] persigo gritando, solo para ver cómo carga a mi querido felino en una catapulta cercana.\n\nDoy un paso hacia la máquina, con la mano extendida, pero es demasiado tarde.\n\n«Marramaaa#DIE1 mmmiii#!#DIE2 aaauuu#!»."
 bp1_yearly.5722.a: "Você não vai!"
 bp1_yearly.5722.a.tt: "Você luta corpo a corpo com [rival_catapulter.GetFirstNameNoTooltip] e [rival_catapulter.GetHerHim] o derruba antes que ele consiga escapar"
 bp1_yearly.5722.b: "[ROOT.Char.Custom('CatStoryName')]! #EMP Nãooooo!#!"
 bp1_yearly.5722.c: "Eu vou pegar você, [rival_catapulter.GetFirstNameNoTooltip]! Eu juro!"
 bp1_yearly.5723.t: "Uma Jogada Longa"
 bp1_yearly.5723.desc: "Los ojos de [rival_catapulter.GetFirstName] se abren como platos de miedo y sorpresa al aplastar[rival_catapulter.GetHerHim] contra el suelo.\n\n«Podríais haberme hecho daño a mí», pronuncio levantándome una vez más y pidiendo una cuerda a los guardias reunidos.\n\n«Podríais haber hecho daño hasta a mi familia», continúo atando juntos las manos y los pies de mi desdichad[rival_catapulter.Custom('ES_OA')] prisioner[rival_catapulter.Custom('ES_OA')].\n\n«Pero cometisteis el error mortal de hacer daño a #EMP [ROOT.Char.Custom('CatStoryName')]#!». Con las extremidades temblando, [rival_catapulter.GetFirstNameNoTooltip] abre la boca para suplicar.\n\nExtiendo el brazo hacia la palanca."
 bp1_yearly.5723.a: "#EMP Bwoing!#!"
 bp1_yearly.5723.b: "Eu vou te poupar. Por [ROOT.Char.Custom('CatStoryName')]."
 bp1_yearly.5724.t: "[ROOT.Char.Custom('CatStoryName')]: Felino Bem"
 bp1_yearly.5724.desc: "He pasado los últimos tres días bajo una nube oscura. Mi precioso e inocente [ROOT.Char.Custom('CatStoryName')]… Es como si ahora hasta le oyese maullar…\n\nNo, alto… Le #EMP oigo#! maullar. ¡Lo juro! Atravieso la habitación con entusiasmo hasta que tropiezo con una mesilla que me llega a la espinilla. Maldiciendo, me pongo en pie. Otro maullido, esta vez más fuerte y quejumbroso. Finalmente llego a la puerta y la abro de un tirón para encontrar allí a [ROOT.Char.Custom('CatStoryName')]: ¡sano, salvo y muy disgustado!\n\nInmediatamente, arropo a mi querido gato entre mis brazos, enterrando mi cara en su pelaje sucio y lleno de ramitas.\n\n[ROOT.Char.Custom('CatStoryName')] se agita furiosamente con mi abrazo."
 bp1_yearly.5724.a: "[ROOT.Char.Custom('CatStoryName')]! Você está #EMP vivo#!"
 bp1_yearly.5724.b: "Eu nunca mais vou te soltar!"
 bp1_yearly.5725.t: "[khutulun.Custom('ES_ElLa')|U] [khutulun.GetWomanMan] selvagem"
 bp1_yearly.5725.desc: "«¿#EMP Cómo#! no habéis oído hablar de [khutulun.GetSheHe], [ROOT.Char.Custom('FormOfAddressForLiege')]?».\n\nPongo los ojos en blanco y gruño despectivamente. Decir que las fantasías de [matchmaker_courtier.GetFirstName] eran en lo que menos estaba pensando sería quedarse corto.\n\n«¡Dicen que ha lanzado un desafío abierto a quien lo desee, mi [ROOT.Char.GetLadyLord]!». [matchmaker_courtier.GetFirstNameNoTooltip] lo intenta de nuevo, esta vez con insistencia. Baja la voz con complicidad y continúa. «Escuchad, sé que las cuestiones matrimoniales os aburren. Est[khutulun.Custom('ES_EA')] [khutulun.GetWomanMan] ofrece su mano en matrimonio a quien le supere en habilidad física».\n\nMe retrepo y reflexiono sobre la historia. ¿Un[khutulun.Custom('ES_XA')] [khutulun.GetWomanMan] con mentalidad marcial? Seguro que puedo regresar con la victoria y un[khutulun.Custom('ES_XA')] [khutulun.GetWifeHusband] nuev[khutulun.Custom('ES_OA')] a cuestas, por muy hábil que sea."
 bp1_yearly.5725.a: "Tudo bem, [matchmaker_courtier.GetFirstNameNoTooltip], iremos investigar."
 bp1_yearly.5725.b: "Chega de suas histórias absurdas!"
 bp1_yearly.5726.t: "Um [khutulun.Custom('GetBrideGroom')|U] Combativo"
 bp1_yearly.5726.desc: "Ap?s um duro dia de cavalgada, chegamos ao lugar que [matchmaker_courtier.GetFirstName] havia ouvido que nossa presa frequentava e encontramos uma cena surpreendente. Um[khutulun.Custom('ES_XA')] [khutulun.GetWomanMan] ?gil est? lutando com um[dummy_gender.Custom('ES_XA')] [dummy_gender.GetWomanMan] muito maior.\n\nNormalmente, isso n?o pareceria uma luta justa de forma alguma, mas, um instante depois, o combate termina de maneira surpreendente; a primeira figura, com um largo sorriso, ajuda magnanimamente seu oponente a se levantar antes de voltar os olhos para me encarar.\n\n"N?o vi voc? por estas bandas antes!", sorri ao se dirigir a mim, fazendo uma rever?ncia sard?nica e elaborada. "Meu nome ? [khutulun.GetFirstName]. Sei por que veio, mas vou avisar: quem me faz perder tempo tem de me pagar uma quantia pelo inc?modo.""
 bp1_yearly.5726.a: "Diga olá para seu[ROOT.Char.Custom('ES_OA')] novo[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetWifeHusband], [khutulun.GetFirstNameNoTooltip]!"
 bp1_yearly.5726.a.tt.win: "Você derrota [khutulun.GetFirstNameNoTooltip]"
 bp1_yearly.5726.a.tt.lose: "[khutulun.GetSheHe|U] te derrota"
 bp1_yearly.5726.b: "A discrição pode ser a melhor parte da coragem aqui..."
 bp1_yearly.5727.t: "Sinos de casamento?"
 bp1_yearly.5727.desc: "[khutulun.GetFirstName] resopla cansad[khutulun.Custom('ES_OA')] cuando volvemos a romper nuestro abrazo. A mí no me va mucho mejor; está claro cómo ha permanecido solter[khutulun.Custom('ES_OA')]. [khutulun.GetSheHe|U] sonríe, satisfech[khutulun.Custom('ES_OA')] con el desafío.\n\n«¡Seríais un[ROOT.Char.Custom('ES_XA')] buen[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] para mí!», comenta sin apartar la vista de mis movimientos. «¡Es una pena tener que decepcionaros!».\n\n[khutulun.GetFirstNameNoTooltip] vuelve a cargar hacia delante, pero esta vez estoy preparad[ROOT.Char.Custom('ES_OA')]. Un hábil paso lateral [khutulun.GetHerHim] desequilibra, y un pie en torno a [khutulun.GetSheHe] [khutulun.GetHerHim] hace caer.\n\nSu rostro es una mezcla de sorpresa, asombro y emoción cuando le ofrezco la mano."
 bp1_yearly.5727.a: "Um acordo é um acordo, então."
 bp1_yearly.5727.b: "Bem, eu consegui tudo o que precisava aqui."
 bp1_yearly.5727.c: "Apenas o melhor para [khutulun.GetFirstNameNoTooltip]!"
 bp1_yearly.5728.t: "Rivalidade ardente"
 bp1_yearly.5728.desc: "As fa?scas da fogueira sobem pregui?osamente para o c?u noturno com a fuma?a, mas n?o consigo apreciar a cena como normalmente apreciaria.\n\nMeu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('rival_burner'))] [rival_burner.GetFirstName] se ergue triunfante diante do fogo, desafiando-me a me aproximar. Em sua m?o, est? meu pr?prio artefato, [burned_artifact.GetName], roubado de mim por aquela serpente.\n\n"Nem mais um passo, [ROOT.Char.GetFirstName]!", chama. "Sua preciosa bugiganga vai queimar se voc? se mexer!"\n\n"[rival_burner.GetFirstNameNoTooltip]!", grito. "Devolva-me o que ? meu, e n?o teremos mais disputa!" [rival_burner.GetFirstNameNoTooltip] se limita a responder com um sorriso e p?e minha posse sobre o fogo."
 bp1_yearly.5728.a: "Queime-o então, seu [rival_burner.Custom2('InsultNoun', ROOT.Char)]!"
 bp1_yearly.5728.b: "Roubo? Está com medo de enfrentar-me?"
 bp1_yearly.5728.b.tt.duel: "Começa um [single_combat_duel|lE] entre você e [rival_burner.GetFirstNameNoTooltip]"
 bp1_yearly.5729.tt.lose: "[rival_burner.GetFirstNameNoTooltip] queima a posse"
 bp1_yearly.5730.t: "Onde há fumaça..."
 bp1_yearly.5730.desc: "[rival_burner.GetFirstName] se levanta con dificultad, maltrech[rival_burner.Custom('ES_OA')] y magullad[rival_burner.Custom('ES_OA')] tras nuestro duelo. Sus ojos arden tan intensamente como la hoguera junto a la que se encuentra cuando ve que me pongo mi [burned_artifact.GetName] bajo el brazo.\n\nCuando nuestros compañeros regresan del puesto anterior, algo más alejado, su conversación se interrumpe lentamente al vernos a [ROOT.Char.GetHerHim]s d[ROOT.Char.Custom('ES_OA')]s enfrentad[ROOT.Char.Custom('ES_OA')]s, un[ROOT.Char.Custom('ES_OA')] victorios[ROOT.Char.Custom('ES_OA')] y otr[rival_burner.Custom('ES_OA')] derrotad[rival_burner.Custom('ES_OA')].\n\nMiro mi [burned_artifact.GetNameNoTooltip] y luego vuelvo a mirar [rival_burner.Custom('ES_AlAla')] [rival_burner.GetWomanMan] que se jugó el pellejo para quemar mi posesión."
 bp1_yearly.5730.a: "Que isso lhe sirva de lição."
 bp1_yearly.5730.b: "Pegue-o. Que sempre lhe lembre desta noite."
 bp1_yearly.5730.b.tt: "[burned_artifact.GetName] recebe #N negative#! modificadores"
 #Coveted Claim
 bp1_yearly.8000.t: "Reivindicação Cobiçada"
 bp1_yearly.8000.desc: "[bp1_8000_informer.GetTitledFirstName], meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('bp1_8000_informer'))], passa o dia todo inquiet[bp1_8000_informer.Custom('ES_OA')], numa tentativa evidente de encontrar as palavras certas. \n\nPor fim, enquanto vamos para o jantar, começa sem jeito, "Meu [bp1_8000_informer.Custom2('RelationToMeShort', ROOT.Char)]…"
 bp1_yearly.8000.desc_vassal: "dizem que [bp1_8000_new_rival.GetTitledFirstName|l], voss[bp1_8000_new_rival.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('bp1_8000_new_rival'))], leva cada vez mais a sério suas supostas reivindicações sobre suas terras a cada dia que passa…"."
 bp1_yearly.8000.desc_foreign: "Ouvi rumores de que [bp1_8000_new_rival.GetFirstName], [bp1_8000_new_rival.Custom('ES_ElLa')] [bp1_8000_new_rival.GetTitleAsNameNoTooltip|l] de [bp1_8000_new_rival.GetPrimaryTitle.GetBaseNameNoTier], vê você como o foco de sua inimizade…"
 bp1_yearly.8000.desc_single: "\n\n[bp1_8000_new_rival.GetSheHe|U] fala abertamente sobre [ROOT.Char.Custom('ES_ElLa')] \"[ROOT.Char.GetTitleAsNameNoTooltip|l] ilegítim[ROOT.Char.Custom('ES_OA')] de [bp1_8000_claimed_title.GetNameNoTier]\" que usurpa dia após dia as terras e rendas que lhe pertencem por direito."
 bp1_yearly.8000.desc_multi: "\n\n[bp1_8000_new_rival.GetSheHe|U] afirma que se sente pessoalmente lesado[bp1_8000_new_rival.Custom('ES_OA')] pelo fato de vocês continuarem governando sobre seu domínio legítimo, [bp1_8000_claimed_title.GetNameNoTier] em particular."
 bp1_yearly.8000.a: "Ha! Essa venenosa [bp1_8000_new_rival.Custom2('InsultNoun', ROOT.Char)]!"
 bp1_yearly.8000.b: "Escreverei a [bp1_8000_new_rival.GetFirstNameNoTooltip] imediatamente."
 bp1_yearly.8000.b.success: "Sua carta amolece [bp1_8000_new_rival.GetTitledFirstNameNoTooltip|l]"
 bp1_yearly.8000.b.failure: "[bp1_8000_new_rival.Custom('ES_ElLa')|U] [bp1_8000_new_rival.GetTitledFirstNameNoTooltip|l] ignora sua carta"
 bp1_yearly.8000.c: "É traição, então."
 bp1_yearly.8000.c.success: "Seus homens prendem [bp1_8000_new_rival.GetTitledFirstNameNoTooltip|l]"
 bp1_yearly.8000.c.failure: "[bp1_8000_new_rival.Custom('ES_ElLa')|U] [bp1_8000_new_rival.GetTitledFirstNameNoTooltip|l] foge"
 bp1_yearly.8000.d: "Conversa fiada insignificante, tenho certeza."
 bp1_yearly.8000.d.rival: "Os rumores eram verdadeiros"
 bp1_yearly.8000.d.bluff: "Era blefe [bp1_8000_new_rival.Custom('ES_DelDela')] [bp1_8000_new_rival.GetTitledFirstNameNoTooltip|l]"
 bp1_yearly_8000_trusting_modifier: "Suserano confiável"
 bp1_yearly_8000_trusting_modifier_desc: "Este personagem é conhecido por dar o benefício da dúvida aos seus súditos."
 #Friends with Benefits
 bp1_yearly.8010.opening: "[bp1_8010_best_friend.Custom2('AppropriateGreeting', ROOT.Char)]"
 bp1_yearly.8010.desc: "Agradeço todos os dias a [bp1_8010_best_friend.GetFaith.HighGodName] por ter um[bp1_8010_best_friend.Custom('ES_XA')] tão [ROOT.Char.Custom('GetFriendNoun')] como você — há poucos outros em quem posso confiar com tamanha segurança. \n\nDeveríamos alinhar mais nossos interesses e lutar lado a lado. Venha, [ROOT.Char.GetFirstNameNoTooltip], nossos inimigos verão que não se brinca conosco!"
 bp1_yearly.8010.a: "Sim! Você terá minha [bp1_8010_best_friend.Custom('SignatureWeaponNameOrType')]!"
 bp1_yearly.8010.b: "Não tenho certeza, [bp1_8010_best_friend.GetFirstNameNoTooltip]..."
 #Rival of my Rival
 bp1_yearly.8020.opening: "[bp1_8020_friend.Custom2('AppropriateGreeting', ROOT.Char)]"
 bp1_yearly.8020.desc: "Fiquei sabendo das suas disputas com tal [bp1_8020_rival.Custom2('InsultNoun', SCOPE.sC('bp1_8020_friend'))] [bp1_8020_rival.Custom2('InsultAdjective', SCOPE.sC('bp1_8020_friend'))], [bp1_8020_rival.GetName], um tão desprezível exemplo de [bp1_8020_rival.GetWomanMan].\n\nDado o nosso interesse mútuo, tenho certeza de que nos daremos bem, amig[bp1_8020_friend.Custom('ES_OA')]."
 bp1_yearly.8020.a: "Eu aguardo ansiosamente a oportunidade de discutir isso mais a fundo."
 bp1_yearly.8020.b: "Mensageiros são tão pouco confiáveis nos dias de hoje..."
 bp1_yearly.8020.b.flavor: "Encaminhe a carta para [bp1_8020_rival.GetTitledFirstNameNoTooltip|l]"
 bp1_yearly.8020.b.joke: "[bp1_8020_rival.GetTitledFirstNameNoTooltip|l] aprecia sua abertura"
 bp1_yearly.8020.b.insult: "A mensagem enfurece [bp1_8020_rival.GetTitledFirstNameNoTooltip|l]"
 bp1_yearly.8020.c: "Isso é um jogo baixo, por um jogador baixo."
 bp1_yearly.8020.d: "Você não é mais meu amigo[bp1_8020_friend.Custom('ES_OA')] de mim[bp1_8020_friend.Custom('ES_OA')] [bp1_8020_friend.GetFirstNameNoTooltip]."
 #Diametrically Opposed
 bp1_yearly.8040.t: "Completamente opostos"
 bp1_yearly.8040.desc.opening: "Meu [Select_CString(bp1_yearly_8040_friend.IsFemale, 'buena compañera', 'buen compañero' )], [bp1_yearly_8040_friend.Custom('ES_ElLa')] [bp1_yearly_8040_friend.GetTitledFirstName|l], tem estado distante comigo nestes últimos dias, recusando todos os jantares comigo.\n\nHoje me pega sozinho no meu [ROOT.Char.Custom('GetChamber')|l]. "[ROOT.Char.GetFirstNameNoTooltip], sinto muito, mas preciso lhe dizer isto, como seu amigo".\n\n"Vocês verão,"
 bp1_yearly.8040.desc.diligent: "Negócios constantes e demandas por resultados"
 bp1_yearly.8040.desc.brave: "Tomadas de riscos desnecessários e audácia"
 bp1_yearly.8040.desc.just: "Julgamentos meticulosos e análise minuciosa de evidências"
 bp1_yearly.8040.desc.compassionate: "Vulnerabilidade ao sofrimento e cuidado com os outros"
 bp1_yearly.8040.desc.fickle: "Mudanças constantes de opinião e facilidade em ser convencido"
 bp1_yearly.8040.desc.temperate: "Distanciamento da mesa de banquetes"
 bp1_yearly.8040.desc.generous: "Bolsos soltos para quem pede ajuda"
 bp1_yearly.8040.desc.humble: "Desconsideração da própria importância"
 bp1_yearly.8040.desc.honest: "Recusa em enganar os outros, mesmo quando necessário"
 bp1_yearly.8040.desc.forgiving: "Ignorar insultos e tolerar deslealdade"
 bp1_yearly.8040.desc.wrathful: "Mau humor e explosões constantes"
 bp1_yearly.8040.desc.calm: "Serenidade diante de indignações legítimas"
 bp1_yearly.8040.desc.cynical: "Ceticismo em relação ao plano divino de [ROOT.Char.GetFaith.HighGodNamePossessive]"
 bp1_yearly.8040.desc.zealous: "Vontade de seguir os [ROOT.Char.GetFaith.AltPriestTermPlural]"
 bp1_yearly.8040.desc.paranoid: "Dúvida interminável em relação às motivações dos outros"
 bp1_yearly.8040.desc.trusting: "Fé implícita nas motivações de todos os outros"
 bp1_yearly.8040.desc.shy: "Aversão a conversar com os outros"
 bp1_yearly.8040.desc.gregarious: "Distrações com conversas ociosas e festas"
 bp1_yearly.8040.desc.lustful: "Escravidão aos seus desejos e tentações"
 bp1_yearly.8040.desc.chaste: "Aversão aos prazeres da carne"
 bp1_yearly.8040.desc.impatient: "Hábito imprudente de se precipitar nas coisas"
 bp1_yearly.8040.desc.patient: "Excessiva cautela e reação com tranquilidade aos eventos"
 bp1_yearly.8040.desc.content: "falta de impulso para ter sucesso e superar seus colegas"
 bp1_yearly.8040.desc.ambitious: "necessidade incessante de avançar, sem fim à vista"
 bp1_yearly.8040.desc.closing: "... o coloca em má situação. Certamente vocês veem que a um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] não convém se comportar assim?"."
 bp1_yearly.8040.a: "Como #EMP você#! se atreve a falar comigo dessa forma? Saia daqui!"
 bp1_yearly.8040.a.lazy: "Podemos conversar sobre isso depois?"
 bp1_yearly.8040.a.diligent: "Eu só preciso terminar isso e depois conversamos."
 bp1_yearly.8040.a.craven: "Assumir riscos é para tolos."
 bp1_yearly.8040.a.brave: "Parece covardia para mim."
 bp1_yearly.8040.a.arbitrary: "Eu posso agir como quiser."
 bp1_yearly.8040.a.just: "Não seria correto agir de outra forma."
 bp1_yearly.8040.a.callous: "Oh, cale a boca."
 bp1_yearly.8040.a.compassionate: "Eu não vou endurecer meu coração."
 bp1_yearly.8040.a.stubborn: "Você não vai mudar minha opinião."
 bp1_yearly.8040.a.fickle: "Sim, como você quiser!"
 bp1_yearly.8040.a.gluttonous: "Vamos conversar sobre isso depois do jantar."
 bp1_yearly.8040.a.temperate: "Tudo com moderação."
 bp1_yearly.8040.a.greedy: "O que, e deixar que outros peguem #EMP meu#! dinheiro?"
 bp1_yearly.8040.a.generous: "Há o suficiente para todos."
 bp1_yearly.8040.a.arrogant: "Eu sou [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip|l]!"
 bp1_yearly.8040.a.humble: "Solo soy un[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan], como cualquier otr[ROOT.Char.Custom('ES_OA')]."
 bp1_yearly.8040.a.deceitful: "A verdade não te libertará."
 bp1_yearly.8040.a.honest: "A verdade é que você é um mentiroso."
 bp1_yearly.8040.a.vengeful: "Vou me lembrar disso quando #EMP você#! pedir pela #EMP minha#! companhia."
 bp1_yearly.8040.a.forgiving: "Não se preocupe, eu já tinha esquecido sua grosseria."
 bp1_yearly.8040.a.wrathful: "Como #EMP você#! se atreve a falar comigo dessa forma?!"
 bp1_yearly.8040.a.calm: "Respire, não há necessidade de ficar chateado."
 bp1_yearly.8040.a.cynical: "#EMP Certamente#! isso é para [ROOT.Char.GetFaith.HighGodName] decidir, não é?"
 bp1_yearly.8040.a.zealous: "Isso cabe a [ROOT.Char.GetFaith.HighGodName] decidir!"
 bp1_yearly.8040.a.paranoid: "Não... não #EMP você#! também!"
 bp1_yearly.8040.a.trusting: "Obrigado, você sempre está do meu lado."
 bp1_yearly.8040.a.shy: "Você pode me deixar sozinho?"
 bp1_yearly.8040.a.gregarious: "Saia do caminho, as pessoas estão esperando por mim."
 bp1_yearly.8040.a.lustful: "Eu acho que você tem ficado sozinho por muito tempo."
 bp1_yearly.8040.a.chaste: "Não serei tão facilmente tentado."
 bp1_yearly.8040.a.impatient: "Não tenho tempo para isso."
 bp1_yearly.8040.a.patient: "A pressa é a mãe do fracasso."
 bp1_yearly.8040.a.content: "E quando será o suficiente?"
 bp1_yearly.8040.a.ambitious: "Não vou ficar para trás."
 bp1_yearly.8040.b: "Vamos concordar em discordar! Relaxe."
 bp1_yearly.8040.b.success: "[bp1_yearly_8040_friend.GetTitledFirstNameNoTooltip|l] muda de ideia"
 bp1_yearly.8040.b.failure: "[bp1_yearly_8040_friend.GetTitledFirstNameNoTooltip|l] continua impassível"
 bp1_yearly.8040.c: "Você está certo, [bp1_yearly_8040_friend.GetFirstNameNoTooltip]."
 bp_yearly_8040_trying_to_be_mindful_modifier: "Considerando defeitos"
 bp_yearly_8040_trying_to_be_mindful_modifier_desc: "Este personagem foi confrontado sobre sua personalidade e está tentando ser mais consciente."
 #A Murdered X
 bp1_yearly.8050.t: "[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('victim_scope'))|U] assassinado[victim_scope.Custom('ES_OA')]"
 bp1_yearly.8050.desc: "A perda do meu querid[victim_scope.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('victim_scope'))] , [victim_scope.GetFirstName] me pesa; a lenta corrente de súditos enlutados e suas palavras de consolo não são nada em comparação com o vazio em meu coração. \n\nAinda não consigo acreditar que [victim_scope.GetDeathReasonHideKiller] , nem que [murderer_scope.GetTitledFirstName|l] , seu assassino[murderer_scope.Custom('ES_OA')] , fique impune. \n\n"
 bp1_yearly.8050.desc.prisoner: "Embora [murderer_scope.GetSheHe] apodreça nas masmorras de [murderer_scope.GetImprisonedBy.GetTitledFirstNameNoTooltip|l], esse conhecimento não acalma a fúria em meu coração."
 bp1_yearly.8050.desc.free: "Meus punhos se fecham e o sangue lateja em meus ouvidos quando penso naquele monstro andando livre... uma afronta à justiça e a [ROOT.Char.GetFaith.HighGodName]."
 bp1_yearly.8050.a: "Um dia, eu vingarei você, [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('victim_scope'))]..."
 bp1_yearly.8050.b: "O rastro de sangue termina aqui."
 #At My Mercy
 bp1_yearly.8060.t: "À minha misericórdia"
 bp1_yearly.8060.opening: "Tiro um momento para observar o terreno [combat_location.GetTerrain.GetNameNoTooltip|l] de [combat_location.GetNameNoTooltip], repleto de mortos [primary_combat_winner.GetPrimaryTitle.GetAdjectiveNoTooltip]s e [primary_combat_loser.GetPrimaryTitle.GetAdjectiveNoTooltip]s, antes de me voltar para os prisioneiros de guerra acorrentados. \n\n"
 bp1_yearly.8060.desc.nemesis: "[captured_rival.GetTitledFirstName], é[captured_rival.Custom('ES_EA')] maldit[captured_rival.Custom('ES_OA')] [captured_rival.Custom2('InsultNoun', ROOT.Char)] de [ROOT.Char.GetFaith.NegativeAfterLife], está finalmente em minhas mãos. Há quanto tempo sonho em fazer desaparecer meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('captured_rival'))]…"
 bp1_yearly.8060.desc.war_leader: "Finalmente, tenho minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('captured_rival'))], [captured_rival.GetTitledFirstName|l], em minhas mãos, e a vitória em nossa guerra é agora quase certa...\n\n\"Eu me rendo\", [captured_rival.GetSheHe] rosna, \"Liberte-me e você terá o que quer.\""
 bp1_yearly.8060.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('captured_rival'))], [captured_rival.GetTitledFirstName|l], olha para mim carrancudo, aquecendo o meu coração."
 bp1_yearly.8060.closing.multi: "\n\nAtrás de [captured_rival_2.Custom('ES_ElLa')] vilão[captured_rival_2.Custom('ES_OA')] [captured_rival_2.GetTitledFirstName|l] se ajoelha, impaciente."
 bp1_yearly.8060.closing.ransom: "\n\n[captured_rival.GetSheHe|U] balbucia, um pouco desesperadamente, "Tenho direito ao privilégio do resgate!""
 bp1_yearly.8060.a.war_leader: "Essa guerra acabou, mas só para você."
 bp1_yearly.8060.a.ransom: "Cães não têm o direito de resgate."
 bp1_yearly.8060.a: "Seus dias acabaram, escória."
 bp1_yearly.8060.b: "Matem[captured_rival.GetHerHim]. Matem todos"
 bp1_yearly.8060.c: "Eu vou me certificar de que você nunca esqueça este dia, [captured_rival.GetFirstNameNoTooltip]."
 bp1_yearly.8060.d: "Lembre-se da minha misericórdia, verme."
 bp1_yearly.8060.d.multi: "Não se esqueça da minha misericórdia, miseráveis."
 #At X's Mercy
 bp1_yearly.8061.t: "À mercê de [combat_winner.GetTitledFirstNameNoTooltip|l]"
 bp1_yearly.8061.desc: "Estoy de pie, rodead[ROOT.Char.Custom('ES_OA')] por guardias enemigos, en el/la [combat_location.GetTerrain.GetNameNoTooltip|l] caótico/a de [combat_location.GetNameNoTooltip], mientras es[battle_rival_winner.Custom('ES_OA')] miserable [battle_rival_winner.GetTitledFirstName|l] observa su victoria.\n\nFinalmente se acerca, desenfundando alegremente [battle_rival_winner.Custom('SignatureWeaponNameOrType')] con un brillo aterrador en los ojos.\n\n"
 bp1_yearly.8061.killed: "Vejo que chegou ao fim..."
 bp1_yearly.8061.a: ""[battle_rival_winner.Custom2('InsultAdjective', ROOT.Char)|U] não…"."
 bp1_yearly.8061.b: "\"Não assim!\""
 bp1_yearly.8061.c: "[ROOT.Char.GetFaith.HighGodName] me proteja."
 bp1_yearly.8062.wounded: ""Isso vai doer", ele sorri."
 bp1_yearly.8062.a: ""[battle_rival_winner.Custom2('InsultNoun', ROOT.Char)|U]!""
 #Feudal Favoritism
 bp1_yearly.8070.t: "Favoritismo do [ROOT.Char.GetGovernment.GetNameNoTooltip]"
 bp1_yearly.8070.opening: "[claim_vassal.GetTitledFirstName] esteve em silêncio a tarde toda até que, por fim, explode quando vou pegar a travessa de [ROOT.Char.Custom('GetExpensiveMealAlt')].\n\n"É que simplesmente não consigo entender por que concedestes o [claim_title.GetName] [favorite_vassal.Custom('ES_AlAla')] [favorite_vassal.GetTitledFirstName|l]!"
 bp1_yearly.8070.strength_strong: "Meu direito legítimo a essas terras é reconhecido por todos!\"\n\n"
 bp1_yearly.8070.strength_weak: "Essas terras por direito me pertencem!\"\n\n"
 bp1_yearly.8070.claim: ""Por que [favorite_vassal.GetHerHim] favoreceis com essas terras em vez de mim? Acaso não tenho sido um[ROOT.Char.Custom('ES_XA')] vassal[ROOT.Char.Custom('ES_OA')] fiel?""
 bp1_yearly.8070.lowborn: "\"A elevação desse insolente plebeu no meu lugar é um insulto!\""
 bp1_yearly.8070.other: "\"Que grave ofensa eu causei, para que você me trate de forma tão ignóbil?\""
 bp1_yearly.8070.hostile: "\n\n\"Conceder terras a um maldito [favorite_vassal.GetFaith.GetAdherentName] em vez de mim!\" meu [ROOT.Char.Custom2('RelationToMe', claim_vassal)] engasga, \"É uma afronta à consciência!\""
 bp1_yearly.8070.culture: "\n\n\"Quero dizer...\" meu [ROOT.Char.Custom2('RelationToMe', claim_vassal)] engasga, \" nem é [claim_vassal.GetCulture.GetName]!\""
 bp1_yearly.8070.faith: "\n\n\"Quero dizer...\" meu [ROOT.Char.Custom2('RelationToMe', claim_vassal)] engasga, \" nem é um [ROOT.Char.GetFaith.GetAdherentName]!\""
 bp1_yearly.8070.a: "[favorite_vassal.GetFirstNameNoTooltip] possui qualidades que você não tem."
 bp1_yearly.8070.b: "Perdoe-me, [claim_vassal.GetFirstNameNoTooltip], [claim_title.GetNameNoTierNoTooltip] é seu."
 bp1_yearly.8070.c: "Vou conceder a você algum outro título."
 bp1_yearly.8070.d: "Não questione minhas decisões novamente."
 bp1_yearly.8070.d.success: "[claim_vassal.GetTitledFirstNameNoTooltip|l] está satisfeito"
 bp1_yearly.8070.d.failure: "[claim_vassal.GetTitledFirstNameNoTooltip|l] está insultad[claim_vassal.Custom('ES_OA')]"
 #Unwelcome Favor
 bp1_yearly.8100.t: "Favorito Impopular"
 bp1_yearly.8100.joke: "Ainda estou sorrindo com a piada que meu [ROOT.Char.Custom2('RelationToMe', sycophant_scope)] [sycophant_scope.GetFirstName] fez na sessão do conselho desta manhã, quando [jealous_scope.GetTitledFirstName|l] segura meu braço."
 bp1_yearly.8100.thighs: "Estou perdid[ROOT.Char.Custom('ES_OA')] em meus pensamentos, refletindo sobre as coxas bem torneadas da minha [ROOT.Char.Custom2('RelationToMe', sycophant_scope)], [sycophant_scope.GetTitledFirstName|l], quando ou?o [jealous_scope.GetTitledFirstName|l] tossir logo atr?s de mim."
 bp1_yearly.8100.desc: "\n\n"[jealous_scope.Custom2('RelationToMe', ROOT.Char)|U], faz tempo que venho querendo falar com você."
 bp1_yearly.8100.lover_known: "Sua... afeição por [sycophant_scope.GetFirstNameNoTooltip] não passa despercebida, e levanta... questões sobre suas razões.\"\n\n"
 bp1_yearly.8100.lover_secret: "Eu, e outros na corte, não conseguimos entender as honrarias e a responsabilidade que vós derramais sobre [sycophant_scope.GetSheHe]. Um nobre estimado do reino certamente vos seria mais útil”.\n\n"
 bp1_yearly.8100.lover: "Sei que você sente… muito carinho por [sycophant_scope.GetSheHe], mas, de verdade, uma cadeira no conselho?\n\n"
 bp1_yearly.8100.friend: "Entendo que vocês são amigos íntimos, mas há quem pense que vocês dão preferência a [sycophant_scope.GetHerHim] em detrimento de conselheiros mais merecedores".\n\n"
 bp1_yearly.8100.faction: "\"Francamente, se essas ofensas não forem corrigidas, apenas [jealous_scope.GetFaith.HighGodName] sabe o que acontecerá com [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]...\""
 bp1_yearly.8100.hostile: ""Quero dizer, voc? n?o sabe que tipo de [sycophant_scope.Custom2('InsultNoun', SCOPE.sC('jealous_scope'))] [sycophant_scope.Custom2('InsultAdjective', SCOPE.sC('jealous_scope'))] ? ess[sycophant_scope.Custom('ES_EA')] [sycophant_scope.GetWomanMan]?""
 bp1_yearly.8100.lowborn: ""Não é apropriado colocar a opinião de um plebeu acima, ou mesmo ao lado, da mais alta nobreza de [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]"."
 bp1_yearly.8100.rank: "Certamente a opinião de um [jealous_scope.Custom('ES_XA')] [jealous_scope.GetTitleAsNameNoTooltip] deveria estar acima da de um [sycophant_scope.Custom('ES_XA')] servi[sycophant_scope.Custom('ES_OA')] [sycophant_scope.GetTitleAsNameNoTooltip]!"
 bp1_yearly.8100.faith: "\"Será realmente sábio dar ouvidos a um [sycophant_scope.GetFaith.GetAdjective] [jealous_scope.Custom2('GetUnbelieverTerm', sycophant_scope)]?\""
 bp1_yearly.8100.culture: "\"Certamente outra voz de [jealous_scope.GetCulture.GetName] serviria melhor do que esse forasteiro [sycophant_scope.GetCulture.GetName]?\""
 bp1_yearly.8100.unskilled: ""Além da pequena ofensa, é óbvio que tal [sycophant_scope.GetWomanMan] não é apt[sycophant_scope.Custom('ES_OA')] para o cargo de [sycophant_scope.GetCouncilTitle]"."
 bp1_yearly.8100.skilled: "Por melhor[sycophant_scope.Custom('ES_OA')] que seja [sycophant_scope.GetSheHe] como [sycophant_scope.GetCouncilTitle], é um insulto evidente."
 bp1_yearly.8100.jealous: ""Pegue-me a mim — só para dar um exemplo —, um[jealous_scope.Custom('ES_XA')] [jealous_scope.GetTitleAsNameNoTooltip] leal de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]"."
 bp1_yearly.8100.fallback: ""
 bp1_yearly.8100.a: "Um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] pode escolher seu próprio conselho."
 bp1_yearly.8100.a.hostile: "Como você se atreve a falar mal de [sycophant_scope.GetFirstNameNoTooltip]!"
 bp1_yearly.8100.a.flavor: "[jealous_scope.GetFirstNameNoTooltip] pode guardar rancor"
 bp1_yearly.8100.b: "A meu ver, você quer o trabalho dele, [jealous_scope.GetFirstNameNoTooltip]."
 bp1_yearly.8100.b.flavor: "Espero que [sycophant_scope.GetFirstNameNoTooltip] entenda"
 bp1_yearly.8100.fired_tt: "Demite-se [sycophant_scope.GetShortUIName|U] do seu [council|lE] por cinco anos"
 bp1_yearly.8100.c: "Muito bem, eu vou demitir [sycophant_scope.GetFirstNameNoTooltip]."
 bp1_yearly.8100.c.flavor: "Embora isso me doa..."
 bp1_yearly.8100.d.flavor: "É uma figura, mesmo!"
 bp1_yearly.8100.d.success: "[sycophant_scope.GetTitledFirstNameNoTooltip|l] causa uma boa impressão"
 bp1_yearly.8100.d.failure: "[jealous_vassal.GetTitledFirstNameNoTooltip|l] não suporta [sycophant_scope.GetWomanMan]"
 bp1_yearly.8100.d.tt: "Esta opção está disponível porque [jealous_scope.GetFirstNameNoTooltip] é [jealous_scope.Custom2('RelationToMe', sycophant_scope)] de [sycophant_scope.GetFirstNameNoTooltip]"
 bp1_yearly.8100.reveal_tt: "[jealous_scope.GetTitledFirstName] pode revelar o Segredo de [sycophant_secret.GetName] entre você e [sycophant_scope.GetFirstName]"
 bp1_yearly.8100.support: "Meu [ROOT.Char.Custom2('RelationToMe', sycophant_scope)], [sycophant_scope.GetTitledFirstName|l], é uma presença reconfortante no meu conselho, sempre está ali para me apoiar, embora fique claro que [jealous_scope.GetTitledFirstName|l] vê isso de outro modo."
 bp1_yearly.8100.knowledgeable: "Vejo-me concordando com meu [ROOT.Char.Custom2('RelationToMe', sycophant_scope)|U] , [sycophant_scope.GetTitledFirstName|l], está tão bem informad[sycophant_scope.Custom('ES_OA')] que fico feliz por ter um[sycophant_scope.Custom('ES_XA')] conselheir[sycophant_scope.Custom('ES_OA')] tão capaz e de confiança. Está claro que [jealous_scope.GetTitledFirstName|l] não pensa o mesmo."
 #Sycophant's secret
 bp1_yearly.8110.t: "O segredo de [sycophant_scope.GetFirstNameNoTooltip]"
 bp1_yearly.8110.desc: "Ao fazer um passeio tranquilo antes do segundo sono, distraíd[ROOT.Char.Custom('ES_OA')] pelos pensamentos sobre os olhos encantadores da minha [ROOT.Char.Custom2('RelationToMe', sycophant_scope)], [sycophant_scope.GetTitledFirstName|l], uma forma familiar surge imponente diante de mim.\n\n\"Ah, [ROOT.Char.Custom('FormOfAddressForLiege')]... Não conseguia explicar a grande estima que vocês demonstravam por [sycophant_scope.GetFirstNameNoTooltip]... #EMP hasta ahora#!\".\n\n"
 bp1_yearly.8110.known_secret_homosexual: "\"Dê lugar para um vassalo mais merecedor em seu círculo íntimo, ou serei forçado a revelar seu relacionamento não natural.\""
 bp1_yearly.8110.known_secret_adulterer: ""Remova [sycophant_scope.GetHerHim] de seu conselho, ou seu adult?rio ?mpio ser? conhecido por todos.""
 bp1_yearly.8110.known_secret_other: ""Tirai do vosso conselho semelhante encrenqueiro [sycophant_scope.Custom2('InsultAdjective', SCOPE.sC('revealer_scope'))] ou serei forçado a trazer à tona o vosso relacionamento"."
 bp1_yearly.8110.c: "Muito bem..."
 bp1_yearly.8110.c.flavor: "Será do seu jeito!"
 bp1_yearly.8110.d: "Não tenho vergonha de nada."
 bp1_yearly.8110.e: "Você tem certeza de que [secondary_scope.GetFirstNameNoTooltip] gostaria disso?"
 every_powerful_vassal_tt: "Todo [powerful_vassal|lE]"
 #Sycophant's allure
 bp1_yearly.8120.t: "O charme de [sycophant_scope.GetFirstNameNoTooltip]"
 bp1_yearly.8120.desc: "Pardiez, qué genial es [sycophant_scope.Custom('ES_ElLa')] [sycophant_scope.GetTitledFirstName|l]… Abandono mi ensoñación cuando [matchmaker_scope.Custom('ES_ElLa')] [matchmaker_scope.GetTitledFirstName|l] entra en escena y cierra la puerta tras de sí.\n\n«[ROOT.Char.Custom('FormOfAddressForLiege')|U], acudo a vos en confianza con un asunto delicado…». Duda, «¿Creéis que… a lo mejor dais tantas responsabilidades y honores a [sycophant_scope.GetFirstNameNoTooltip] porque os… #EMP gusta#!?».\n\n[matchmaker_scope.GetFirstNameNoTooltip] se tira del cuello de su ropa con nerviosismo.\n\n«¿Quizás todos estarían mejor si #EMP vos#! os ocuparais de #EMP eso#! y dejarais las tareas a vuestros nobles?»."
 bp1_yearly.8120.a: "Saia."
 bp1_yearly.8120.a.flavor: "Deveria ter você açoitado!"
 bp1_yearly.8120.b: "[sycophant_scope.GetFirstNameNoTooltip]? Hah, de jeito nenhum!"
 bp1_yearly.8120.seduce: "[scheme|E] terá chance extra de [success_chance|lE]"
 bp1_yearly.8120.b.flavor: "Que noção ridícula!"
 bp1_yearly.8120.c: "O quê? #EMP Oh...#! Você pode estar certo..."
 bp1_yearly.8120.c.flavor: "Você acha que [sycophant_scope.GetSheHe] também gosta de mim?"
 bp1_yearly.8120.d: "Você #EMP é#! perspicaz, mas não vou ceder."
 bp1_yearly.8120.d.flavor: "O que deu a entender?"
 bp1_yearly.8121.t: "O aroma de [sycophant_scope.GetFirstNameNoTooltip]"
 bp1_yearly.8121.opening: "Pensamentos eróticos têm me atormentado desde minha conversa com [matchmaker_scope.GetTitledFirstName|l] sonhos com [sycophant_scope.GetTitledFirstName|l]…\n\n"
 bp1_yearly.8121.homosexual: "Sei que não é o que [ROOT.Char.GetFaith.HighGodName] pretendia entre um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] e outr[ROOT.Char.Custom('ES_OA')]… Ah, [ROOT.Char.GetFaith.PositiveAfterLife]!"
 bp1_yearly.8121.adultery: "Não seria justo trair [ROOT.Char.GetConsort.GetTitledFirstName|l], mas certamente [ROOT.Char.GetFaith.HighGodNameAlternate] tem seus motivos para me fazer sentir assim!"
 bp1_yearly.8121.other: "E se [sycophant_scope.GetSheHe] sentir o mesmo? Estou me torturando à toa? [ROOT.Char.GetFaith.FertilityGodName] me ajude..."
 bp1_yearly.8121.desc: "\n\nO que vou fazer…"
 bp1_yearly.8121.a: "Devo seguir meu coração."
 bp1_yearly.8121.a.flavor: "Essa oportunidade não pode ser desperdiçada"
 bp1_yearly.8121.b: "Isso só acabaria mal..."
 bp1_yearly.8121.b.friend: "[sycophant_scope.GetSheHe|U] ? s? um[sycophant_scope.Custom('ES_XA')] amigo[sycophant_scope.Custom('ES_OA')]! Um[sycophant_scope.Custom('ES_XA')] #EMP amig[sycophant_scope.Custom('ES_OA')]#!!"
 bp1_yearly.8121.b.flavor: "De volta aos negócios..."
 #Sycophant's enemies
 bp1_yearly.8130.t: "Os inimigos de [sycophant_scope.GetFirstNameNoTooltip]"
 bp1_yearly.8130.desc: "Meu [ROOT.Char.Custom2('RelationToMe', sycophant_scope)], [sycophant_scope.Custom('ES_ElLa')] [sycophant_scope.GetTitledFirstName|l], invade meus aposentos, derruba uma lamparina e quase p?e fogo em uma almofada.\n\n"[ROOT.Char.GetFirstNameNoTooltip]! Tenho certeza de que est?o me seguindo!", grita, apontando atr?s de si.\n\n"Havia homens rondando do lado de fora dos meus aposentos; minhas coisas foram mexidas!""
 bp1_yearly.8130.a: "Vamos lá, isso não é como você."
 bp1_yearly.8130.a.paranoid: "\"Vamos lá, provavelmente foi um servo."
 bp1_yearly.8130.a.flavor: "Não há nada com que se preocupar."
 bp1_yearly.8130.b: "Eu farei com que você seja guardado, dia e noite."
 bp1_yearly.8130.c: "[spymaster_scope.GetFirstNameNoTooltip] chegará ao fundo disso."
 bp1_yearly.8130.c.flavor: "A verdade não pode escapar de [spymaster_scope.GetSheHe]"
 bp1_yearly.8130.c.success: "[spymaster_scope.GetCouncilTitleFirstNameNoTooltip] encontra evidências."
 bp1_yearly.8130.c.failure: "Nenhuma evidência é encontrada."
 bp1_yearly.8130.exposed: "O [scheme|lE] contra [sycophant_scope.GetShortUIName] será exposta"
 bp1_yearly.8130.progress: "A [scheme|lE] contra [sycophant_scope.GetShortUIName] progredirá"
 bp1_yearly.8130.d: "Você deveria investigar isso, Spymaster."
 bp1_yearly.8130.d.flavor: "De todas as pessoas para se preocupar..."
 bp1_yearly.8130.d.success: "[spymaster_scope.GetFirstNameNoTooltip] encontra evidências."
 bp1_yearly.8130.d.failure: "[spymaster_scope.GetFirstNameNoTooltip] desaparece."
 bp1_yearly.8130.e: "Ninguém ameaça #EMP meu#! [ROOT.Char.Custom2('RelationToMe', sycophant_scope)]!"
 bp1_yearly.8130.e.flavor: ""
 bp1_yearly.8130.e.success: "Você descobre uma conspiração"
 bp1_yearly.8130.e.failure: "Nada é encontrado"
 bp1_yearly.8131.t.sycophant: "A astúcia de [spymaster_scope.GetFirstNameNoTooltip]"
 bp1_yearly.8131.t: "A justificação de [sycophant_scope.GetFirstNameNoTooltip]"
 bp1_yearly.8131.desc.sycophant: "Fico surpreso de ser chamado às masmorras nas profundezas de minha residência, e por ninguém menos que minha [ROOT.Char.Custom2('RelationToMe', sycophant_scope)], [sycophant_scope.Custom('ES_ElLa')] [sycophant_scope.GetTitledFirstName|l].\n\nAli, [sycophant_scope.GetHerHim] encontro em uma cela, preenchid[sycophant_scope.Custom('ES_OA')] de alívio, ao lado de um[murderous_scope.Custom('ES_XA')] menos feliz e mais algemad[murderous_scope.Custom('ES_OA')] [murderous_scope.GetTitledFirstName|l].\n\nSolto um suspiro e digo: "[sycophant_scope.GetFirstNameNoTooltip]! O que vocês tiver…", antes de ele me interromper: "Essa espécie de [murderous_scope.Custom2('InsultNoun', SCOPE.sC('sycophant_scope'))] tentou me assassinar — tenho as confissões dos seus capangas para provar isso!"."
 bp1_yearly.8131.desc.spymaster: "Quando eu me reclinava com meu [ROOT.Char.Custom2('RelationToMe', sycophant_scope)] , [sycophant_scope.Custom('ES_ElLa')] [sycophant_scope.GetTitledFirstName|l], recebemos uma mensagem do meu chefe[spymaster_scope.Custom('ES_EA')] de espionagem, [spymaster_scope.Custom('ES_ElLa')] [spymaster_scope.GetTitledFirstName|l], instruindo-nos a descer às masmorras.\n\nLá, nas entranhas úmidas da minha [ROOT.GetCharacter.Custom('FortifiedBuilding')], [spymaster_scope.GetHerHim] encontramos [murderous_scope.Custom('ES_XA')] triste [murderous_scope.GetTitledFirstName|l] acorrentad[murderous_scope.Custom('ES_OA')] ao seu lado.\n\n“Eis [murderous_scope.Custom('ES_ElLa')] culpado, [ROOT.Char.Custom('FormOfAddressForLiege')]”, ele se gaba. “Não há dúvida.”"
 bp1_yearly.8131.desc: "Estoy tens[ROOT.Char.Custom('ES_OA')] de expectación mientras mis guardias meten en mis mazmorras al agente capturado, atado, encapuchado y gimiendo.\n\n«¡Venid, [sycophant_scope.GetFirstName], veremos quién intentó contratar a vuestro asesino!».\n\nCon un ademán ostentoso y un grito ahogado, ¡mi carcelero revela nada menos que [murderous_scope.Custom('ES_AlAla')] [murderous_scope.GetTitledFirstName|l]!\n\n[sycophant_scope.GetFirstNameNoTooltip] y yo rugimos al unísono: «#EMPY ¡Vos!#!»."
 bp1_yearly.8131.tt: "A participação de [murderous_scope.GetTitledFirstName|l] em um [scheme|lE] para [sycophant_scheme.GetSchemeType.GetTypeNameNoTooltip] [sycophant_scope.GetFirstName] é descoberta"
 bp1_yearly.8131.a: "Parece que você tem algumas explicações a dar, [murderous_scope.GetFirstNameNoTooltip]."
 bp1_yearly.8131.a.flavor: "Através das #EMP barras#!!"
 bp1_yearly.8131.b: "[murderous_scope.GetSheHe|U] aprendeu sua lição."
 bp1_yearly.8131.b.flavor: "No es #EMP traición#!, después de todo"
 bp1_yearly.8131.c: "Quem mais está envolvido?"
 bp1_yearly.8131.c.flavor: "Passe-me o martelo!"
 bp1_yearly.8131.torture: "[Concept( 'torture', 'Torturarás' )|E] a [murderous_scope.GetShortUIName]"
 bp1_yearly.8131.agent: "Outro [agent|lE] envolvido no [scheme|E] pode ser descoberto."
 bp1_yearly.8131.attempted: "[agent_scope.GetTitledFirstNameNoTooltip|l] estava envolvid[agent_scope.Custom('ES_OA')] no compl?!"
 released_attempted_murderer_opinion: "Assassino Tentado Libertado"
 bp1_yearly.8132.t: "O medo de [sycophant_scope.GetFirstNameNoTooltip]"
 bp1_yearly.8132.desc.sycophant: "Meu [ROOT.Char.Custom2('RelationToMe', sycophant_scope)], [sycophant_scope.Custom('ES_ElLa')] [sycophant_scope.GetTitledFirstName|l], volta para mim ainda mais exasperad[sycophant_scope.Custom('ES_OA')].\n\nParece que ele esgotou todas as opções disponíveis para ele sem chegar mais perto de revelar provas de uma conspiração.\n\n“O que vou fazer, [ROOT.Char.GetFirstNameNoTooltip]?”, suspira, “Estou à mercê dos meus inimigos!”."
 bp1_yearly.8132.desc.spymaster: "Meu chefe[spymaster.Custom('ES_EA')] de espiões, [spymaster_scope.GetTitledFirstName|l], enfim admitiu que não consegue encontrar provas de nenhuma conspiração contra meu [ROOT.Char.Custom2('RelationToMe', sycophant_scope)] [sycophant_scope.GetFirstName].\n\nChegou até a sugerir que todo esse episódio é fruto da imaginação de [sycophant_scope.GetFirstNameNoTooltip]…"
 bp1_yearly.8132.desc: "Tenho investigado as preocupações de meu [ROOT.Char.Custom2('RelationToMe', sycophant_scope)] , [sycophant_scope.GetTitledFirstName|l] , colocando uma guarda em seus aposentos e interrogando os servos por todo o meu [ROOT.GetCharacter.Custom('FortifiedBuilding')] , mas sem sucesso.\n\n“Talvez tenha sido apenas um servo arrumando tudo?”, sugiro timidamente.\n\n[sycophant_scope.GetSheHe|U] anda de um lado para o outro em meu quarto, claramente cetic[sycophant_scope.Custom('ES_OA')]."
 bp1_yearly.8132.a: "Eu vou te guardar, apenas por precaução."
 bp1_yearly.8132.a.flavor: "Melhor prevenir do que remediar."
 bp1_yearly.8132.b: "Ou apenas uma brincadeira inofensiva?"
 bp1_yearly.8132.b.flavor: "Isso é uma perda de tempo"
 bp1_yearly.8134.t: "A ausência de [sycophant_scope.GetFirstNameNoTooltip]"
 bp1_yearly.8134.desc: "Faz muito tempo que não tenho notícias do meu [ROOT.Char.Custom2('RelationToMe', sycophant_scope)] , [sycophant_scope.GetTitledFirstName|l] , e começo a temer o pior.\n\nSe realmente houve uma ameaça contra a vida dele... oh, [ROOT.Char.GetFaith.HighGodName]..."
 bp1_yearly.8134.a: "Onde você está, [sycophant_scope.GetFirstNameNoTooltip]?"
 bp1_yearly.8134.a.flavor: "O que eu fiz..."
 #Sycophant's revenge
 bp1_yearly.8140.t: "A vingança de [sycophant_scope.GetFirstNameNoTooltip]"
 bp1_yearly.8140.desc: "Ao examinar minha coleção de bons barris de [ROOT.Char.Custom('RegionalAlcoholicDrink')|U], ouço a voz familiar do meu [ROOT.Char.Custom2('RelationToMe', sycophant_scope)], [sycophant_scope.GetFirstName].\n\nAconchegad[sycophant_scope.Custom('ES_OA')] entre os barris, ele lista maldições e impropérios contra [jealous_scope.GetTitledFirstName|l] de um criado ou outro.\n\nQuando estou prestes a perder o interesse, ouço algo que me congela o sangue: "Mate [jealous_scope.GetTitledFirstName|l]!"."
 bp1_yearly.8140.a: "[sycophant_scope.GetFirstNameNoTooltip]! Eu ouvi tudo!"
 bp1_yearly.8140.a.flavor: "Vergonha em você!"
 bp1_yearly.8140.b: "Sim! [jealous_scope.GetFirstNameNoTooltip] irá #EMP morrer#!!"
 bp1_yearly.8140.b.flavor: "Finalmente algo divertido!"
 bp1_yearly.8140.c: "#EMP Eu saio de fininho#!"
 bp1_yearly.8140.c.flavor: "Eu não ouvi #EMP nada#!"
 #Sycophant's joke
 bp1_yearly.8160.t: "O encanto de [sycophant_scope.GetFirstNameNoTooltip]"
 bp1_yearly.8160.desc: "Meu [ROOT.Char.Custom2('RelationToMe', sycophant_scope)], [sycophant_scope.GetFirstName] e eu passeamos despreocupadamente pelos meus jardins, rindo escandalosamente de uma rima que [sycophant_scope.GetSheHe] ouviu um servo contar quando cruzamos com [jealous_scope.Custom('ES_ElLa')] [jealous_scope.GetTitledFirstName|l].\n\nNos olha severamente, "[ROOT.Char.Custom('FormOfAddressForLiege')|U], há algo que desejo discutir, se tiver um momento?""
 bp1_yearly.8160.a: "Muito bem, o que é?"
 bp1_yearly.8160.a.flavor: "Isso precisa ser bom!"
 bp1_yearly.8160.b: "Junte-se a nós, você precisa ouvir essa!"
 bp1_yearly.8160.b.flavor: "O que poderia #EMP dar errado#!?"
 bp1_yearly.8160.b.success: "[sycophant_scope.GetFirstNameNoTooltip] ganha a simpatia [jealous_scope.GetHerHim]"
 bp1_yearly.8160.b.failure: "Essa é a gota d'água para [jealous_scope.GetFirstNameNoTooltip]"
 bp1_yearly.8160.d: "Não agora, [jealous_scope.GetFirstNameNoTooltip]!"
 bp1_yearly.8160.d.flavor: "Você não vê que estou #EMP ocupado#!?"
 bp1_yearly.8161.t: "A magia de [sycophant_scope.GetFirstNameNoTooltip]"
 bp1_yearly.8161.opening: "Enquanto os ecos dos últimos efeitos sonoros de [sycophant_scope.GetTitledFirstName|l] se dissipam ao canto dos pássaros, o semblante de [jealous_scope.GetTitledFirstName|l] permanece tão sério como sempre.\n\n"
 bp1_yearly.8161.desc: "Devagar, um sorriso aparece nos cantos de sua boca, espalhando-se at? virar um largo sorriso e, finalmente, uma gargalhada estrondosa!\n\n"Ha- #EMP *ofego*#! Essa ? a mais engra?ada- #EMP *ofego*#! Ah! Eu te julguei mal, [sycophant_scope.GetFirstNameNoTooltip]! Vamos comer!""
 bp1_yearly.8161.a: "#EMP cutuca as costelas#! [ROOT.Char.Custom('GetLaughType')]"
 bp1_yearly.8161.a.flavor: "Você quase me enganou!"
 bp1_yearly.8162.t: "A gafe de [sycophant_scope.GetFirstNameNoTooltip]"
 bp1_yearly.8162.desc: "Tenho a horrível sensação de que a piada não pegou.\n\nMeus receios se confirmam momentos depois, quando [jealous_scope.GetFirstNameNoTooltip] solta um suspiro de cortar o coração, revira os olhos e vai embora.\n\n[sycophant_scope.GetFirstName] dá de ombros, “Nossa, que puritan[jealous_scope.Custom('ES_OA')]…"."
 bp1_yearly.8162.a: "Por qué #EMP ese#!, [sycophant_scope.GetFirstNameNoTooltip]…"
 bp1_yearly.8162.a.flavor: "Fique com o material dos criados, hein?"
 #Sycophant's friend
 bp1_yearly.8170.t: "O amigo de [sycophant_scope.GetFirstNameNoTooltip]"
 bp1_yearly.8170.desc: "Cada vez vejo menos meu [ROOT.Char.Custom2('RelationToMe', sycophant_scope)] , [sycophant_scope.GetFirstName]. Parece que ele/ela tem passado muito tempo com meu [ROOT.Char.Custom2('RelationToMe', friendly_scope)] , [friendly_scope.GetTitledFirstName|l]…\n\nEncontro os dois; dão tapas nas coxas por alguma piada e abafam as risadinhas quando olham para mim.\n\nO que devo fazer quanto a isso?…"
 bp1_yearly.8170.a: "Estou acima disso."
 bp1_yearly.8170.a.flavor: "Não vou mais perder tempo com [sycophant_scope.GetSheHe]"
 bp1_yearly.8170.b: "Ah, [sycophant_scope.GetFirstNameNoTooltip], uma palavra?"
 bp1_yearly.8170.b.flavor: "Eu sei do que [sycophant_scope.GetSheHe] gosta"
 bp1_yearly.8170.b.success: "[sycophant_scope.GetFirstNameNoTooltip] segue"
 bp1_yearly.8170.b.failure: "[sycophant_scope.GetFirstNameNoTooltip] fica com [friendly_scope.GetFirstNameNoTooltip]"
 bp1_yearly.8170.c: "Eu não preciso mais de você, [sycophant_scope.GetFirstNameNoTooltip]."
 bp1_yearly.8170.c.flavor: "Tenha uma boa risada com #EMP isso#!!"
 #Sycophant's ultimatum
 bp1_yearly.8180.t: "O ultimato de [sycophant_scope.GetFirstNameNoTooltip]"
 bp1_yearly.8180.desc: "Mi [ROOT.Char.Custom2('RelationToMe', sycophant_scope)], [sycophant_scope.GetFirstName], me ha solicitado una audiencia privada, una formalidad tan poco habitual que solo implica malas noticias.\n\n«¡[ROOT.Char.GetFirstNameNoTooltip]! [ROOT.Char.GetTitleAsNameNoTooltip]… ¡No puedo soportarlo más! Me excluís, os entregáis a vuestro «deber», ¡cuando sabéis que he sido un[sycophant_scope.Custom('ES_XA')] consejer[sycophant_scope.Custom('ES_OA')] perfectamente capaz!».\n\n«Si así es como se me va a tratar, tendré que buscar nuevas perspectivas. He oído que [new_realm.GetHolder.GetName] sabe recompensar a súbdit[sycophant_scope.Custom('ES_OA')]s leales…»."
 bp1_yearly.8180.a: "Você sabe que não posso perder você, [sycophant_scope.GetFirstNameNoTooltip]."
 bp1_yearly.8180.a.flavor: "Você sabe disso muito bem..."
 bp1_yearly.8180.b: "Venha, você sabe que é mais complexo que isso!"
 bp1_yearly.8180.b.flavor: "Há muitos fatores em jogo..."
 bp1_yearly.8180.b.success: "[sycophant_scope.GetFirstNameNoTooltip] fica"
 bp1_yearly.8180.b.failure: "[sycophant_scope.GetFirstNameNoTooltip] sai"
 bp1_yearly.8180.c: "Vá então, se é isso que você pensa!"
 bp1_yearly.8180.c.flavor: "Fora!"
 bp1_yearly.8180.d: "Você está ameaçando traição!"
 bp1_yearly.8180.d.flavor: "Se eu não posso tê-lo..."
 #Sycophant's talents
 bp1_yearly.8190.t: "Os talentos de [sycophant_scope.GetFirstNameNoTooltip]"
 bp1_yearly.8190.opening: "Ao atravessar o pátio, fico contente por finalmente ouvir alguém apreciando meu [ROOT.Char.Custom2('RelationToMe', sycophant_scope)] , [sycophant_scope.GetFirstName].\n\n\"Ah, não escutem essas uvas verdes\", canta [friendly_scope.GetTitledFirstName|l]. \"Você é o melhor [sycophant_scope.Custom('ES_ElLa')] [sycophant_scope.GetCouncilTitle] que [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] tem há tempos — ao menos, que eu #EMP yo#! saiba!\".\n\n"
 bp1_yearly.8190.twitch: "Por um momento, tenho certeza de ter vislumbrado a [jealous_scope.GetTitledFirstName|l] nos estábulos sombreados do outro lado do pátio, antes de desaparecer na escuridão."
 bp1_yearly.8190.desc: "Eu sabia que o que vi em [sycophant_scope.GetSheHe] era real!"
 bp1_yearly.8190.a: "Finalmente, um colega apreciador de caráter!"
 bp1_yearly.8190.a.flavor: "A Sociedade de Apreciação de [sycophant_scope.GetFirstNameNoTooltip] cresce"
 bp1_yearly.8190.b: "Que tal sairmos juntos à noite, só nós três?"
 bp1_yearly.8190.b.flavor: "Mantenha seus amigos por perto"
 #Sycophant's rewards
 bp1_yearly.8191.t: "As recompensas de [sycophant_scope.GetFirstNameNoTooltip]"
 bp1_yearly.8191.opening: "Outra reunião interminável do conselho se arrasta lentamente, até que meus ouvidos se aguçam com o tom encantador do meu [ROOT.Char.Custom2('RelationToMe', sycophant_scope)] , [sycophant_scope.GetFirstName].\n\n\"Assuntos urgentes, [ROOT.Char.Custom('FormOfAddressForLiege')],"
 bp1_yearly.8191.taken: "[ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] necessita urgentemente um[sycophant_scope.Custom('ES_XA')] [sycophant_scope.Custom('GetTargetCourtPosition')] capaz; alguém que saiba bem como [sycophant_scope.Custom('GetTargetCourtPositionDesc')]… Uma tarefa em que [old_holder.GetTitledFirstName|l] falhou #EMP bastante#!"."
 bp1_yearly.8191.open: "[ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] precisa urgentemente de um[sycophant_scope.Custom('ES_XA')] [sycophant_scope.Custom('GetTargetCourtPosition')]; alguém que possa cuidar de [sycophant_scope.Custom('GetTargetCourtPositionDesc')]…"."
 bp1_yearly.8191.arrogant: "\n\nSeñala hacia sí, grandiosamente. «Dejad que solucione esto por vos, mi [ROOT.Char.GetLadyLord]. Esta clase de trabajo requiere cierta delicadeza»."
 bp1_yearly.8191.other: "\n\nPõe a mão sobre o coração. "É claro que, #EMP estoy#! dispost[sycophant_scope.Custom('ES_OA')] a assumir este importante fardo, meu [ROOT.Char.GetLadyLord]"."
 bp1_yearly.8191.desc: "\n\n[annoyed_scope.GetTitledFirstName] está claramente furioso."
 bp1_yearly.8191.a: "Uma excelente ideia, [sycophant_scope.GetFirstNameNoTooltip]!"
 bp1_yearly.8191.a.flavor: "Graças a [sycophant_scope.GetFirstNameNoTooltip]"
 bp1_yearly.8191.b: "Sim, é hora de [old_holder.GetFirstNameNoTooltip] se retirar!"
 bp1_yearly.8191.b.flavor: "![sycophant_scope.GetFirstNameNoTooltip] mostrará como se faz!"
 bp1_yearly.8191.c: "Que tal você assumir uma posição aberta?"
 bp1_yearly.8191.c.flavor: "Os talentos de [sycophant_scope.GetFirstNameNoTooltip] são infinitos"
 bp1_yearly.8191.d: "Eu acho que esse é um trabalho para [annoyed_scope.GetFirstNameNoTooltip]."
 bp1_yearly.8191.d.flavor: "[sycophant_scope.GetFirstNameNoTooltip] não consegue conseguir #EMP tudo#!"
 bp1_yearly.8191.e: "N?o h? assuntos #EMP mais#! urgentes?"
 bp1_yearly.8191.e.flavor: "[sycophant_scope.GetFirstNameNoTooltip] vai superar isso"
 #Sycophant's mistakes
 bp1_yearly.8192.t: "Os erros de [sycophant_scope.GetFirstNameNoTooltip]"
 bp1_yearly.8192.desc: "Enquanto me sento no div? para pensar em como recompensar o excelente trabalho recente do meu [ROOT.Char.Custom2('RelationToMe', sycophant_scope)], [sycophant_scope.GetFirstName], de repente se ouve o trinco da porta antes de surgir [insulting_scope.GetTitledFirstName|l].\n\n"Perdoai-me por falar com tanta liberdade, meu [ROOT.Char.GetLadyLord], mas este assunto com [sycophant_scope.GetFirstNameNoTooltip] est? saindo do controle!"\n\n"Esse tolo ? um[sycophant_scope.Custom('ES_XA')] incapaz como [sycophant_scope.GetCouncilTitle]; quanto mais dias estiver no comando, mais a situa??o vai piorar, at? chegar ? ru?na de todo o nosso [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]!""
 bp1_yearly.8192.a: "Eu não tinha ideia de que as coisas estavam tão ruins..."
 bp1_yearly.8192.a.flavor: "É hora de [sycophant_scope.GetFirstNameNoTooltip] sair"
 bp1_yearly.8192.b: "Não há lugar para ciúmes mesquinhos no meu conselho."
 bp1_yearly.8192.b.flavor: "Odiadores sempre odiarão"
 bp1_yearly.8192.fired_tt: "Despede-se de [insulting_scope.GetShortUIName|U] do seu [council|lE] por cinco anos"
 bp1_yearly.8192.c: "#EMP *ay*#! Não vê que estou #EMP ocupad[ROOT.Char.Custom('ES_OA')]#! aqui, [insulting_scope.GetFirstNameNoTooltip]?"
 bp1_yearly.8192.c.flavor: "Os talentos de [sycophant_scope.GetFirstNameNoTooltip] são infinitos"
