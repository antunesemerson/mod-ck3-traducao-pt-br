 confederation_threat_tt: "Todo [ruler|lE] vizinho, [suzerain|lE] de [ruler|lE] vizinho ou [ruler|lE] no mesmo [kingdom|lE] [de_jure|lE] que sua [capital|lE]:\n $EFFECT_LIST_BULLET$$superior_max_military_strength_tt$\n $EFFECT_LIST_BULLET$#bold No#! está [allied|lE] #high contigo#!\n $EFFECT_LIST_BULLET$ Pelo menos um destes:\n  $EFFECT_LIST_BULLET$ O título mais alto possuído é de [rank|lE] maior ou igual ao de reino\n  $EFFECT_LIST_BULLET$$considers_faith_evil_tt$\n  $EFFECT_LIST_BULLET$ Tem a característica: [GetTrait('conqueror').GetName( GetNullCharacter )|l]\n  $EFFECT_LIST_BULLET$ Tem a característica: [GetTrait('greatest_of_khans').GetName( GetNullCharacter )|l]"
 considers_faith_evil_tt: "Considera sua [faith|lE] como [faith_evil|lE]"
 mpo_decisions_events.0001.t: "Reunindo as Tribos"
 mpo_decisions_events.0001.desc: "Ao capricho de [ROOT.Char.GetFaith.HighGodName], meu [ROOT.Char.GetPrimaryTitle.GetTierAsName] pode ser quebrado como o cabo de uma flecha! Pois minha humilde tribo compartilha as terras de [home_kingdom.GetNameNoTier] com bandos de guerra como os temíveis [threat.GetCulture.GetCollectiveNoun] [threat.Custom('ES_DelDela')] [threat.GetTitledFirstName|l].\n\nMas e se as flechas do meu povo se unissem às de seus amigos e parentes? Poderia a mão do inimigo nos esmagar tão facilmente?\n\n#EMP Irmãos, irmãs — sem nomear nenhum senhor, mas uma voz para as tribos! Uma voz que despreze [threat.Custom('ES_AlAla')] [threat.GetTitledFirstNameNoTooltip|l] e todo o mundo!#!"
 mpo_decisions_events.0001.a: "Devo buscar os dispostos."
 mpo_decisions_events.0001.b: "#EMP Bah! Covardia!#!"
 every_confederation_member: "Cada companheiro [confederate|lE]"
 confederation_offerer_tt: "O [primary_title|lE] do [liege|lE] é uma [confederation|lE]"
 #But do the wolves circling the fire-light not hunt as a pack? Do they not fight as brothers?
 #EMP Let us live and die as one!#!
 leave_confederation_decision: "Abandonar a Confederação"
 leave_confederation_decision_desc: "Defendi meus companheiros confederados por tempo suficiente. Agora, estarei sozinho. E se a confederação não pode sobreviver sem mim — ela merece o esquecimento!"
 leave_confederation_decision_confirm: "[ROOT.Char.GetFaith.HighGodName] protege. Eu não farei."
 leave_confederation_decision_tooltip: "Deixe sua [confederation|lE] e abandone o apoio de seus [confederates|lE]"
 confederaton_blocks_faction: "Os [vassals|lE] de uma [confederation|lE] não podem criar esta [faction|lE]"
 mpo_confederation_member_modifier: "Pastagem de Confederação"
 mpo_confederation_member_modifier_desc: "Ao compartilhar as terras de pastagem dos confederados e tributários menores, a pressão sobre os pastos locais é aliviada."
 confederation_modifier_tt: "Os [confederates|lE] ganham [GetModifier('mpo_confederation_member_modifier').GetNameWithTooltip|l] e algo de [county_fertility|lE]"
 confederates_lose_opinion_tt: "Cada [confederate|lE] perde #N 20#! [opinion|lE] de #high você#!"
 mpo_decisions_events.0002.t: "Abandonando a Confederação"
 mpo_decisions_events.0002.desc: "A palavra enviada viaja rápido, e logo as vozes da [confederation.GetName] gritam em medo — [ROOT.Char.GetName] terminou com eles!\n\n"
 mpo_decisions_events.0002.desc_confederation_survives: "Em quem esses fracos poderão confiar agora? Em quem encontrarão misericórdia? #EMP Quem lhes trará a paz?#! A confederação só pode cair no caos.\n\nA prosperidade pertencerá a [ROOT.Char.GetPrimaryTitle.GetNameNoTier] sozinho."
 mpo_decisions_events.0002.desc_confederation_done: "Agora que apenas [other_confederate.Custom('ES_ElLa')] [other_confederate.GetTitledFirstName|l] mantém os juramentos… a confederação já não existe. Paz? Prosperidade? Agora pertencem apenas aos fortes."
 mpo_decisions_events.0002.a: "Eu sou tudo o que meu povo precisa."
 mpo_decisions_events.0003.t: "A Perda da Confederação"
 mpo_decisions_events.0003.desc: "Um presságio sinistro paira sobre meu povo, pois [leaver.Custom('ES_ElLa')] [leaver.GetTitledFirstName|l] renunciou à sua promessa de ficar ao nosso lado. Ele abandonou nossa confederação. Não cavalgaremos mais com [leaver.GetPrimaryTitle.GetNameNoTier] contra os poderosos.\n\n"
 mpo_decisions_events.0003.desc_confederation_survives: "A [confederation.GetName] ficou enfraquecida com isso. Mas ainda resistimos."
 mpo_decisions_events.0003.desc_confederation_done: "Como eu #EMP sozinho#! permaneço leal aos meus juramentos, minha confederação não tem mais significado. Não existe mais."
 mpo_decisions_events.0003.a: "Traidor!"
