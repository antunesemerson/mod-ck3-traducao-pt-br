 mpo_gok_world_conquest_decision_desc: "[ROOT.Char.GetPrimaryTitle.GetName] se estende mais longe que nossas grandes terras de grama, que os mares salgados, que os sonhos que qualquer nômade jamais teria alcançado.\n\nTudo isso foi conquistado a cavalo. Tudo pode ser mantido, governado… somente do trono. De lá, como [ROOT.Char.GetFaith.CreatorName], devo lançar meu olhar e considerar a construção de um novo universo, com leis [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip], de novas sabedorias e o reinado eterno [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip|l]."
 mpo_gok_world_conquest_decision_tooltip: "Estabeleça o lugar duradouro de sua [dynasty|lE] como soberanos poderosos: adote uma nova forma de [government|lE] ou reivindique todo o seu [realm|lE] apenas para os [nomads|lE]."
 mpo_gok_world_conquest_decision_confirm: "Reúnam as mentes mais sábias do meu [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip|l]."
