 invite_a_foreign_emissary_decision: "Buscar um Emissário Estrangeiro"
 invite_a_foreign_emissary_decision_tooltip: "Seus servos lhe sugerirão uma série de candidatos adequados para o cargo de [GetCourtPositionType('foreign_emissary_court_position').GetName()|l]"
 invite_a_foreign_emissary_decision_desc: "Preciso de alguém que entretenha minha corte com contos e histórias exóticas."
 mpo_decisions_events.0090.t: "Uma História ou Duas"
 mpo_decisions_events.0090.desc: "Afundo-me na cadeira e sinto o sono me dominar ao ouvir [courtier.GetFirstName] narrar a mesma história pela décima quinta vez. Preciso de alguém, #emp quien sea#!, que possa me contar algo novo.\n\nDepois de enviar mensagens por meio de mercadores itinerantes, duas pessoas finalmente aparecem em [ROOT.Char.GetCapitalLocation.GetName]. [Select_CString(And(great_foreign_emissary_option.IsFemale, good_foreign_emissary_option.IsFemale),'Ambas','Ambos')] contam histórias de terras exóticas, montanhas imponentes e páramos sem fim."
 mpo_decisions_events.0090.a: "[great_foreign_emissary_option.GetFirstNameNoTooltip] tem muitas histórias para contar."
 mpo_decisions_events.0090.b: "[good_foreign_emissary_option.GetFirstNameNoTooltip] parece simpático."
 mpo_decisions_events.0090.c: "As [Select_CString(And(great_foreign_emissary_option.IsFemale, good_foreign_emissary_option.IsFemale),'ambas','ambos')] lhes falta algo."
