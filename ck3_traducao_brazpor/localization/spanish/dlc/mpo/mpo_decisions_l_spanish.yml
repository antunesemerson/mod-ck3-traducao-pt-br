 mpo_decisions_events.0021.t: "O Costume da Saudação"
 mpo_decisions_events.0021.desc_intro: "Enquanto [friendship_target.GetSheHe] organiza a comida e bebida de boas-vindas,"
 mpo_decisions_events.0021.desc_warm: "meu [ROOT.Char.Custom2('RelationToMe', friendship_target)], [friendship_target.Custom('ES_ElLa')] [friendship_target.GetTitledFirstName], parece se perguntar o que fazer conosco. Ele nos apresenta a captura do dia. Falamos de grandes caçadas do passado. Meu [ROOT.Char.Custom2('RelationToMe', loc_heir)] tem pouco a dizer e sorri em silêncio."
 mpo_decisions_events.0021.desc_cold: "meu [ROOT.Char.Custom2('RelationToMe', friendship_target)], [friendship_target.Custom('ES_ElLa')] [friendship_target.GetTitledFirstName], permanece cinza e impassível como um velho túmulo. E embora meu [ROOT.Char.Custom2('RelationToMe', loc_heir)] saiba o que eu quero, [heir.GetFirstName] apenas [heir.Custom('quirk_pos_present')] e então desfruta silenciosamente do calor da lareira."
 mpo_decisions_events.0021.desc: "\n\nSou eu quem deve reunir esses dois cavalos no mesmo curral, quem deve forjar uma confiança que durará além da minha carne viva..."
 mpo_decisions_events.0021.a.success: "Você ajuda [friendship_target.GetFirstNameNoTooltip] a ver as qualidades mais nobres de [heir.GetFirstNameNoTooltip]"
 mpo_decisions_events.0021.a: "Só minhas palavras podem [Select_CString(And(heir.IsFemale, friendship_target.IsFemale),'unirlas','unirlos')]"
 mpo_decisions_events.0021.a.flavor: "Confie na sua maestria em diplomacia."
 mpo_decisions_events.0021.a.fail: "Sua presença ofusca a de [heir.GetFirstNameNoTooltip]"
 mpo_decisions_events.0021.b: "\"Assim como você, [heir.GetFirstNameNoTooltip] é um [lifestyle_trait.GetNameNoTooltip( loc_heir )|l]!\""
 mpo_decisions_events.0021.b.flavor: "Confiar em algo em comum entre seu herdeir[heir.Custom('ES_OA')] e seu [ROOT.Char.Custom2('RelationToMeShort', friendship_target)]. Cada um é um caráter [lifestyle_trait.GetNameNoTooltip( loc_heir )|l]."
 mpo_decisions_events.0021.b.success: "[heir.GetFirstNameNoTooltip] e [friendship_target.GetFirstNameNoTooltip] desfrutam de seu passatempo compartilhado"
 mpo_decisions_events.0021.b.fail: "Eles brigam e se desentendem"
 mpo_decisions_events.0021.c: "[Select_CString(And(heir.IsFemale, friendship_target.IsFemale),'Ambas','Ambos')] são habilidosos em um esporte tradicional."
 mpo_decisions_events.0021.c.flavor: "Confiar na experiência de [GetTrait('tourney_participant').GetName( GetNullCharacter )|l] que [Select_CString(And(heir.IsFemale, friendship_target.IsFemale),'ambas','ambos')] compartilham."
 mpo_decisions_events.0021.c.success: "A amizade é forjada na competição"
 mpo_decisions_events.0021.c.fail: "[heir.GetFirstNameNoTooltip] e [friendship_target.GetFirstNameNoTooltip] tratam um ao outro com dureza"
 mpo_decisions_events.0021.d: "[Select_CString(And(heir.IsFemale, friendship_target.IsFemale),'As duas','Os dois')] se parecem muito."
 mpo_decisions_events.0021.d.flavor: "Confiar nas características que [Select_CString(And(heir.IsFemale, friendship_target.IsFemale),'ambas','ambos')] têm em comum."
 mpo_decisions_events.0021.d.success: "[heir.GetFirstNameNoTooltip] e [friendship_target.GetFirstNameNoTooltip] se conectam por características compartilhadas"
 mpo_decisions_events.0021.d.fail: "Sua semelhança não [Select_CString(And(heir.IsFemale, friendship_target.IsFemale),'las','los')] os anima"
 mpo_decisions_events.0021.e: "\"Compartilhamos laços preciosos, e eles #EMP devem#! durar.\""
 mpo_decisions_events.0021.e.flavor: "Confiar em qualquer vínculo cultural, familiar e pessoal entre [friendship_target.Custom('ES_ElLa')] [friendship_target.GetTitledFirstNameNoTooltip] e você."
 mpo_decisions_events.0021.e.success: "Você facilmente expõe o parentesco com [friendship_target.GetFirstNameNoTooltip]"
 mpo_decisions_events.0021.e.fail: "[heir.GetFirstNameNoTooltip] só vê um[friendship_target.Custom('ES_XA')] desconhecid[friendship_target.Custom('ES_OA')] amigável"
 mpo_decisions_events.0021.f: "Presentes levantarão seus espíritos..."
 mpo_decisions_events.0021.f.flavor: "Confie na felicidade da riqueza."
 heir_friend_will_not_become_friends_tt: "[heir.GetFirstNameNoTooltip] e [friendship_target.GetFirstNameNoTooltip] não estabeleceram [Concept('friends', 'amistad')|E]"
 mpo_heir_friend_if_accept_tt: "Se [friendship_target.GetShortUIName] aceitar:"
 mpo_heir_friend_if_do_not_accept_tt: "Se [friendship_target.GetShortUIName] não aceitar:"
 mpo_decisions_events.0022.t: "Visitantes de [root_scope.GetCapitalLocation.GetNameNoTooltip]"
 mpo_decisions_events.0022.desc_intro: "Meu [ROOT.Char.Custom2('RelationToMeShort', root_scope)] , [root_scope.GetName] , chegou a [ROOT.Char.GetCapitalLocation.GetName]. [heir.GetFirstName] , seu herdeir[heir.Custom('ES_OA')] de aparência tão [heir.Custom('ComplimentAdjective')] , me abraça.\n\nEnquanto envolvo o [Glossary( 'khatag', 'KHATAG_GLOSS' )] de pele de cordeiro ao redor do dedo anelar e ofereço sua ponta em saudação,"
 KHATAG_GLOSS: "Um lenço cerimonial de seda ou pele de cordeiro que significa respeito, usado como presente, um sinal de boas-vindas e uma oferta em lugares sagrados. O #G khatag#! originou-se no Tibete, mas foi adotado tanto por budistas quanto por praticantes do Tengrismo na estepe euro-asiática."
 mpo_decisions_events.0022.desc_personal_charm: "[root_scope.GetFirstNameNoTooltip] fala nobremente de seu [root_scope.Custom2('RelationToMe', loc_heir)]: \"Uma alma verdadeiramente [heir.GetCulture.GetName]! Um[heir.Custom('ES_XA')] [heir.GetWomanMan] marcad[heir.Custom('ES_OA')] pelo destino! Falei a [heir.GetFirstNameNoTooltip] de vosso governo [friendship_target.Custom('ComplimentAdjective')]. E agora deseja conhecer-vos melhor até mesmo do que eu mesm[root_scope.Custom('ES_OA')]\"."
 mpo_decisions_events.0022.desc_lifestyle: "[heir.GetFirstNameNoTooltip] diz: \"Um espírito [lifestyle_trait.GetNameNoTooltip( loc_heir )|l] saúda outro! [Select_CString(And(ROOT.Char.IsFemale, heir.IsFemale),'Juntas','Juntos')] falaremos sobre o poder e os laços — e faremos o que realmente amamos\"."
 mpo_decisions_events.0022.desc_sports: "[heir.GetFirstNameNoTooltip] me convida para o campo aberto. \"Você e eu somos mestres do mesmo esporte! Enquanto falamos sobre parentesco e poder, vamos aprimorar as habilidades de um [ROOT.Char.GetCulture.GetName]!\""
 mpo_decisions_events.0022.desc_shared_traits: "[root_scope.GetFirstNameNoTooltip] ri. \"[heir.GetFirstNameNoTooltip] e vocês são como duas gotas d’água! Age da mesma forma. Sempre digo a ele: você é igual a [ROOT.Char.GetSheHe], que melhor [ROOT.Char.GetHerHim] entenderia e que mais [ROOT.Char.GetHerHim] apoiaria!\"."
 mpo_decisions_events.0022.desc_kinship: "[heir.GetFirstNameNoTooltip] aperta meu ombro com força.\n\n\"Para m [heir.Custom2('RelationToMeShort', root_scope)], você é o cavalo leal que se recusa a se desviar. Mas você ficará conosco nos anos que virão? Você me encontrará quando seu corpo estiver frio?\""
 mpo_decisions_events.0022.desc_gift: "[root_scope.GetFirstNameNoTooltip] nos presenteia a mim e a [heir.GetFirstNameNoTooltip] com [Glossary( 'deels', 'DEEL_GLOSS' )] forrados em caxemira e as rédeas de dois cavalos brancos. \"Assim como sois semelhantes em prosperidade\", diz, \"que também sejais semelhantes em amizade. Pois somente na amizade a prosperidade pode crescer.\""
 DEEL_GLOSS: "A túnica dobrada que é a forma tradicional de vestuário dos povos da estepe, usada por homens e mulheres."
 mpo_decisions_events.0022.desc_outro: "\n\nMeus dois visitantes seguem em frente, contando como [heir.GetFirstNameNoTooltip] um dia liderará a [root_scope.GetHouse.GetName]... e sobre o lugar de honra que desfrutarei na seu [root_scope.Custom('ResidenceBuilding')|l]."
 mpo_decisions_events.0022.a: "\"#EMP Fora, palavras!#! Nosso vínculo será selado em sangue.\""
 mpo_decisions_events.0022.b: "Por [Select_CString( heir.IsFemale, 'aquela', 'aquele' )] a quem foi prometido, obedecerei com prazer ao meu [root_scope.GetTitleAsNameNoTooltip|l]!"
 mpo_decisions_events.0022.c: "\"Que você retorne frequentemente, para sentar-se ao meu fogo.\""
 mpo_decisions_events.0022.d: "Teremos uma noite esclarecedora de conversa. Pouco mais."
 cultural_acceptance_friendly_visit: "Visitas amigáveis entre nobres"
 mpo_decisions_events.0023.t: "Além dos Costumes"
 mpo_decisions_events.0023.desc: "As últimas brasas brilham.\n\nJantamos e conversamos até altas horas da noite, acordando crianças adormecidas com nossas risadas e assustando-as com nossos cânticos guturais. Mal preciso cantar (ou falar) enquanto [friendship_target.Custom('ES_ElLa')] [friendship_target.GetTitledFirstName|l] e [heir.GetFirstName] tagarelam sobre as diversões do dia e sonham com as que ainda virão.\n\nEsta noite, levei duas almas nobres à amizade."
 mpo_decisions_events.0023.desc_fail: "As últimas brasas reluzem.\n\nAinda assim, as risadas são suaves; as palavras, agradáveis; mas voam para longe como passarinhos. Apesar da minha persuasão, o coração [friendship_target.Custom('ComplimentAdjective')] [friendship_target.Custom('ES_DelDela')] [friendship_target.GetTitledFirstName|l] parece oculto ao meu herdeir[heir.Custom('ES_OA')].\n\nSó posso esperar que, quando eu não for mais que ossos e pó, se forje uma amizade entre [Select_CString(And(heir.IsFemale, friendship_target.IsFemale),'ellas','ellos')] quando eu não for mais que ossos e pó."
 mpo_decisions_events.0023.desc_accidental_friend: "Tal vez meu [ROOT.Char.Custom2('RelationToMeShort', accidental_friend)], de quem [friendship_target.Custom('ES_ElLa')] [friendship_target.GetTitledFirstName|l] parece #EMP estar#! totalmente apaixonad[friendship_target.Custom('ES_OA')], traga [heir.GetFirstName] ao mesmo círculo."
 mpo_decisions_events.0023.a: "Um[friendship_target.Custom('ES_XA')] fiel incondicional de [heir.GetFirstNameNoTooltip]."
 mpo_decisions_events.0023.a_fail: "Uma decepção, mas ainda assim a noite está alegre."
 EVENT_WINDOW_OPTION_AVAILABLE_HASTILUDER: "Esta opção está disponível devido à experiência [GetTrait('tourney_participant').GetName( GetNullCharacter )|l]"
 study_commander_trait_decision: "Dominar a Arte do Comando"
 study_commander_trait_decision_desc: "O povo de [ROOT.Char.GetPrimaryTitle.GetNameNoTier] é um reflexo de seu líder. Não posso ficar de braços cruzados enquanto meus súditos morrem por minha terra, e meus comandantes falham em aprender com seus erros. Eu devo assumir as rédeas e guiá-los à grandeza."
 study_commander_trait_decision_tooltip: "Ganhe [stress|lE] em troca de uma chance de ganhar um [commander_trait|lE]"
 study_commander_trait_decision_confirm: "À Vitória!"
 study_commander_trait_decision_effect: "Você embarcará em uma jornada [Concept('stress','estresante')|E] em troca da chance de conseguir um [commander_trait|lE]"
 mpo_decisions_events.0200.t: "Para $study_commander_trait_decision$"
 mpo_decisions_events.0200.desc: "Vou até o arsenal e escolho uma boa lâmina do suporte. Observo os soldados, seus movimentos, sua embriaguez e sua falta de disciplina. Antes que eu possa me enojar, preciso aprender a liderá-los. Por que um homem se daria ao trabalho de obedecer à lei, se a lei não o obedece?\n\nAo me retirar, noto [commander_trait_mentor.GetName] me observando à distância. É um[commander_trait_mentor.Custom('ES_XA')] guerreir[commander_trait_mentor.Custom('ES_OA')] formidável, apesar dos fracos que o cercam neste arsenal. Talvez [commander_trait_mentor.GetSheHe] possa me ensinar uma ou duas coisas."
 mpo_decisions_events.0200.desc_my_mentor: "[commander_trait_mentor.GetSheHe|U] me ajudou antes nesta empreitada, então posso voltar a pedir ajuda."
 mpo_decisions_events.0200.desc_mentor: "[commander_trait_mentor.GetSheHe|U] já ajudou outros nesta empreitada antes, então tem uma boa reputação."
 mpo_decisions_events.0200.mentor: "Parece que terá um[ROOT.Char.Custom('ES_XA')] protegid[ROOT.Char.Custom('ES_OA')] nov[ROOT.Char.Custom('ES_OA')]."
 mpo_decisions_events.0200.my_mentor: "Nos encontramos de novo, [commander_trait_mentor.GetTitledFirstName|l]."
 mpo_decisions_events.0200.mentor_flavor: "Você conta com a ajuda de [commander_trait_mentor.GetNameNoTooltip] em sua missão para se tornar um[ROOT.Char.Custom('ES_XA')] comandante melhor."
 mpo_decisions_events.0200.mentor_traits: "Por causa do [commander_traits|lE] de [commander_trait_mentor.GetName]:"
 study_commander_trait_bonus: "Por causa de seus [traits|lE]:"
 mpo_decisions_events.0200.a: "Devo fazer isso sozinho[ROOT.Char.Custom('ES_OA')]."
 mpo_decisions_events.0200.alone: "Sua jornada será um tanto #bold imprevisível#! e #bold sem orientação#!"
 mpo_decisions_events.0200.martial: "Minha mente tática é afiada e será suficiente."
 mpo_decisions_events.0200.martial_flavor: "O caminho para a vitória é solitário, mas você será #bold orientado#! pelo seu conhecimento de guerra."
 mpo_decisions_events.0200.learning: "Prefiro aprender com os anais da história e a sabedoria dos estudiosos."
 mpo_decisions_events.0200.learning_flavor: "Você será #bold orientado#! pela sabedoria das batalhas passadas e pelos escritos dos grandes comandantes."
 mpo_decisions_events.0200.intrigue: "Vou ultrapassar meus inimigos e enganar meus adversários."
 mpo_decisions_events.0200.intrigue_flavor: "Você será #bold orientado#! pela sua astúcia, alimentada pelos sussurros da corte e da guerra."
 mpo_decisions_events.0201.t: "As Provas do Comando"
 mpo_decisions_events.0201.desc_intro: "Agora que comecei meu treinamento a sério, devo investigar quais são meus pontos fortes e fracos. Sei que muitas vezes sou [ROOT.Char.Custom('DescriptorNegativeStandalone')], mas não posso deixar que esse pecado seja a minha ruína.\n\nDevo focar no meu ponto mais fraco."
 mpo_decisions_events.0201.desc_mentor: "\n\n\"Toda luta será diferente, [ROOT.Char.GetFirstName]\", diz [commander_trait_mentor.GetNameNoTooltip]. \"Deveis estar preparados para tudo, para qualquer coisa. O inimigo não esperará que estejais preparad[ROOT.Char.Custom('ES_OA')]. Qual é o vosso ponto fraco na batalha? Contai-me\"."
 mpo_decisions_events.0201.martial_1: "No campo, sou um[ROOT.Char.Custom('ES_OA')] entre muitos. Mas sozinho, sou fraco."
 study_commander_trait_option_mentor_desc: "Você está enfrentando [commander_trait_mentor.GetNameNoTooltip]"
 study_commander_trait_option_success: "Você aprende muito com sua prova"
 study_commander_trait_option_success_ok: "Você avança no seu treinamento"
 study_commander_trait_option_fail: "Você não está pegando o jeito das coisas"
 study_commander_trait_option_fail_ok: "Você não está mais perto de dominar a arte do comando"
 mpo_decisions_events.0201.martial_1_mentor_success: "Você vence [commander_trait_mentor.GetNameNoTooltip] em um duelo"
 mpo_decisions_events.0201.martial_1_mentor_fail: "[commander_trait_mentor.GetNameNoTooltip] te vence"
 mpo_decisions_events.0201.martial_1_flavor: "Sua fraqueza é a incapacidade de lutar sozinho"
 mpo_decisions_events.0201.martial_1_tt: "Na tentativa de aprimorar suas habilidades em duelos, você treina com um soldado no quartel"
 mpo_decisions_events.0201.martial_1_success: "Você derrota seu oponente"
 mpo_decisions_events.0201.martial_1_fail: "O soldado te derrota"
 mpo_decisions_events.0201.martial_2: "Eu preciso aprender a lutar com os outros."
 mpo_decisions_events.0201.martial_2_flavor: "Sua fraqueza é a incapacidade de lutar com os outros"
 mpo_decisions_events.0201.martial_2_tt: "Você reúne um grupo de soldados para praticar formações no pátio"
 mpo_decisions_events.0201.martial_2_success: "Você lidera uma defesa impenetrável"
 mpo_decisions_events.0201.martial_2_fail: "Seus soldados estão desorganizados e facilmente derrotados"
 mpo_decisions_events.0201.learning_1: "Conhecer o inimigo é metade da batalha, navegar pelo campo é a outra metade."
 mpo_decisions_events.0201.learning_1_flavor: "Sua fraqueza está na falta de conhecimento sobre a paisagem"
 mpo_decisions_events.0201.learning_1_tt: "Você percorre as terras, procurando o melhor lugar para montar uma posição."
 mpo_decisions_events.0201.learning_1_mentor: "[commander_trait_mentor.GetNameNoTooltip] te auxilia na sua pesquisa"
 mpo_decisions_events.0201.learning_1_success: "Você encontra o local perfeito para emboscadas e defesas"
 mpo_decisions_events.0201.learning_1_fail: "Você se perde na selva"
 mpo_decisions_events.0201.learning_2: "Armas dão a maior vantagem, se você souber usá-las."
 mpo_decisions_events.0201.learning_2_flavor: "Você deseja aprimorar seu conhecimento sobre armas e máquinas de cerco"
 mpo_decisions_events.0201.learning_2_tt: "Você estuda os avanços nas armas, e como elas podem ser usadas a seu favor"
 mpo_decisions_events.0201.learning_2_mentor: "[commander_trait_mentor.GetNameNoTooltip] explica as complexidades das armas"
 mpo_decisions_events.0201.learning_2_success: "Você é capaz de usar as armas de maneira mais eficaz, e pode até melhorar as que você possui"
 mpo_decisions_events.0201.learning_2_fail: "As mudanças na história são demais para você compreender"
 mpo_decisions_events.0201.intrigue_1_flavor: "Você deseja melhorar sua habilidade de convencer, ou manipular seus inimigos e aliados"
 mpo_decisions_events.0201.intrigue_1: "Eu preciso entrar na mente dos outros."
 mpo_decisions_events.0201.intrigue_1_tt: "Você reúne um grupo de camponeses e tenta convencê-los a fazer sua vontade"
 mpo_decisions_events.0201.intrigue_1_mentor: "[commander_trait_mentor.GetNameNoTooltip] te dá conselhos sobre manipulação"
 mpo_decisions_events.0201.intrigue_1_success: "A multidão é convencida, apesar da relutância inicial"
 mpo_decisions_events.0201.intrigue_1_fail: "Ninguém parece ouvir o que você diz"
 mpo_decisions_events.0201.intrigue_2: "Às vezes, a melhor maneira de vencer é não lutar."
 mpo_decisions_events.0201.intrigue_2_flavor: "Você deseja melhorar sua habilidade de evitar conflitos"
 mpo_decisions_events.0201.intrigue_2_tt: "Você tenta convencer uma multidão a baixar as armas"
 mpo_decisions_events.0201.intrigue_2_success: "A multidão concorda com seus termos, e você evita uma luta"
 mpo_decisions_events.0201.intrigue_2_fail: "A multidão se enfurece ainda mais com suas palavras"
 mpo_decisions_events.0201.none_1: "Ninguém seguirá aquele que os permite passar fome."
 mpo_decisions_events.0201.none_1_flavor: "Você deseja aprender a racionar suprimentos de maneira mais eficaz"
 mpo_decisions_events.0201.none_1_tt: "Você especula sobre a melhor maneira de alimentar seus soldados"
 mpo_decisions_events.0201.none_1_success: "A comida é abundante, e seus soldados estão bem alimentados"
 mpo_decisions_events.0201.none_1_fail: "Seu plano falha, e seus soldados ficam com fome"
 mpo_decisions_events.0201.none_2: "Ser forte é o primeiro passo."
 mpo_decisions_events.0201.none_2_flavor: "Você deseja melhorar sua força física"
 mpo_decisions_events.0202.t: "Desenvolvimentos Inesperados"
 mpo_decisions_events.0202.desc_battlefield: "Ao retornar do campo de batalha,"
 mpo_decisions_events.0202.desc_study: "Ao retornar dos meus estudos,"
 mpo_decisions_events.0202.desc_terrain: "Ao retornar da minha viagem,"
 mpo_decisions_events.0202.desc_town: "Ao retornar da cidade,"
 mpo_decisions_events.0202.desc: "me saúda [situation_alerter.GetName]. E começa a falar sobre um acontecimento recente que acredita ser de meu interesse."
 mpo_decisions_events.0202.desc_1_intro: "Descreve um lugar não muito longe daqui.\n\n\"E um grupo de bandidos se estabeleceu lá,\" afirma. \"Devido a que"
 mpo_decisions_events.0202.desc_1_outro: "O exército não teve chance!\", exclama [situation_alerter.GetFirstNameNoTooltip]."
 mpo_decisions_events.0202.desc_2: "Ele me conta sobre uma fortaleza sitiada e sobre como os defensores perderam terreno rapidamente. \"Uma carga do trabuco e as muralhas desmoronaram\", diz com entusiasmo. \"Não é de admirar que o senhor dali tenha se rendido tão depressa; ele não poderia ter aguentado por muito mais tempo\"."
 mpo_decisions_events.0202.desc_3: "Me conta sobre um grupo de oficiais e soldados insatisfeitos que se tornaram traidores e tramaram uma conspiração para enfraquecer e depor seu comandante. \"E, no meio da noite, o esfaquearam!\", diz, \"O comandante nunca viu isso chegando\"."
 mpo_decisions_events.0202.desc_outro: "\n\n[situation_alerter.GetFirstNameNoTooltip] limpa a garganta, \"Então, o que você teria feito?\"."
 mpo_decisions_events.0202.martial_situation_1: "Eu teria aprendido o terreno, e usado isso a meu favor."
 mpo_decisions_events.0202.martial_situation_1_flavor: "Você conta a [situation_alerter.GetFirstNameNoTooltip] como é importante conhecer o terreno em que você está lutando"
 mpo_decisions_events.0202.learning_situation_1: "De onde vieram os bandidos?"
 mpo_decisions_events.0202.learning_situation_1_flavor: "Você explica a [situation_alerter.GetFirstNameNoTooltip] que aprender sobre o inimigo é o primeiro passo para derrotá-lo"
 mpo_decisions_events.0202.success: "[situation_alerter.GetFirstNameNoTooltip] acena com a cabeça em concordância"
 mpo_decisions_events.0202.fail: "[situation_alerter.GetFirstNameNoTooltip] me olha com uma sobrancelha levantada"
 mpo_decisions_events.0202.intrigue_situation_1: "Bandidos? Eu teria usado a ganância deles contra eles."
 mpo_decisions_events.0202.intrigue_situation_1_flavor: "Você mostra a [situation_alerter.GetFirstNameNoTooltip] como explorar a fraqueza de um inimigo"
 mpo_decisions_events.0202.none_situation_1: "Eles nunca teriam rompido minhas defesas!"
 mpo_decisions_events.0202.none_situation_1_flavor: "Você explica a [situation_alerter.GetFirstNameNoTooltip] que a melhor maneira de derrotar um inimigo é estar preparado"
 mpo_decisions_events.0202.martial_situation_2: "Por que se esconder atrás das suas muralhas? Destrua essa maldita coisa!"
 mpo_decisions_events.0202.martial_situation_2_flavor: "Você explica a [situation_alerter.GetFirstNameNoTooltip] que teria destruído o equipamento de cerco pela força"
 mpo_decisions_events.0202.learning_situation_2: "Para cada arma, há um contra."
 mpo_decisions_events.0202.learning_situation_2_flavor: "Você sugere estudar os designs das armas de cerco, procurando uma fraqueza ou até mesmo uma inovação"
 mpo_decisions_events.0202.intrigue_situation_2: "Se o poder está nas armas deles, tire-o deles"
 mpo_decisions_events.0202.intrigue_situation_2_flavor: "Você sugere a [situation_alerter.GetFirstNameNoTooltip] que teria saboteado o equipamento de cerco"
 mpo_decisions_events.0202.none_situation_2: "Evacue os civis e deixe as muralhas caírem."
 mpo_decisions_events.0202.none_situation_2_flavor: "Você explica a [situation_alerter.GetFirstNameNoTooltip] que teria salvado o povo e deixado o inimigo tomar a fortaleza"
 mpo_decisions_events.0202.martial_situation_3: "Reúna os leais e traga a luta para eles!"
 mpo_decisions_events.0202.martial_situation_3_flavor: "Você explica a [situation_alerter.GetFirstNameNoTooltip] que não perderia tempo em parar os traidores"
 mpo_decisions_events.0202.learning_situation_3: "Saiba o plano deles e garanta que falhe."
 mpo_decisions_events.0202.learning_situation_3_flavor: "Você sugere a [situation_alerter.GetFirstNameNoTooltip] que teria dissecado o plano do inimigo e encontrado uma maneira de impedi-lo de longe"
 mpo_decisions_events.0202.intrigue_situation_3: "Finja aliança com os traidores e os destrua por dentro."
 mpo_decisions_events.0202.intrigue_situation_3_flavor: "Você sugere a [situation_alerter.GetFirstNameNoTooltip] que teria infiltrado os traidores e sabotado seus planos"
 mpo_decisions_events.0202.none_situation_3: "Deixe todos saberem dos planos dos covardes!"
 mpo_decisions_events.0202.none_situation_3_flavor: "Você explica a [situation_alerter.GetFirstNameNoTooltip] que teria exposto os traidores e deixado o povo decidir seu destino"
 mpo_decisions_events.0203.t: "Os Momentos Silenciosos"
 mpo_decisions_events.0203.desc_intro: "Minha mente se afasta do campo de batalha, e me encontro em um lugar tranquilo. Estou sozinho, e o único som é o farfalhar das folhas ao vento lá fora."
 mpo_decisions_events.0203.desc: "Sangue é derramado nestas batalhas, e inúmeras vidas são perdidas. Mas não é em vão, nem com prazer. Neste momento, devo recordar os rostos dos que caíram, e os nomes dos que sobreviveram.\n\nPara quem estou fazendo isso, e por que?"
 mpo_decisions_events.0203.desc_mentor: "[commander_trait_mentor.GetNameNoTooltip] se senta perto e me fita intensamente. \"Vejo que estais atribulad[ROOT.Char.Custom('ES_OA')]\", diz. \"Mas deveis perguntar a vós mesmos por quem e por que lutais\"."
 mpo_decisions_events.0203.a: "Para garantir que [heir_person.GetName] possa governar como eu governei."
 mpo_decisions_events.0203.b: "Para que eu possa retornar para [ROOT.Char.Custom2('RelationToMeShort', love_person)], [love_person.GetFirstName]."
 mpo_decisions_events.0203.c: "Para matar meus inimigos."
 mpo_decisions_events.0203.c_rival: "Por mim mesmo[ROOT.Char.Custom('ES_OA')] para me regozijar com a morte de [hate_person.GetName]."
 mpo_decisions_events.0203.d: "Pela glória de [ROOT.Char.GetPrimaryTitle.GetNameNoTier]!"
 mpo_decisions_events.0203.d_landless: "Pelo povo que lidero."
 mpo_decisions_events.0203.e: "Para honrar [ROOT.Char.GetFaith.HighGodName]!"
 mpo_decisions_events.0203.sentiment: "Porque [target_person.GetFirstName] retribui o sentimento:"
 mpo_decisions_events.0203.dread: "Por causa de seu [dread|lE];"
 mpo_decisions_events.0203.prestige: "Por causa do seu [prestige_level|lE]:"
 mpo_decisions_events.0203.piety: "Por causa do seu [piety_level|lE]:"
 mpo_decisions_events.0204.t: "Um Novo Caminho"
 mpo_decisions_events.0204.desc: "Faz algum tempo que comecei a treinar, e acho que agora estou pront[ROOT.Char.Custom('ES_OA')] para colher os frutos do meu trabalho. É hora de testar meu valor e ver se realmente me tornei um mestre da arte de comandar."
 mpo_decisions_events.0204.desc_mentor: "É claro, fico feliz por ter recebido a orientação de [commander_trait_mentor.GetName]."
 mpo_decisions_events.0204.a: "Para a vitória!"
 mpo_decisions_events.0204.a_success: "Você #p ganha#! um [commander_trait|lE] aleatório"
 mpo_decisions_events.0204.a_success_desc: "Você pode tentar outro em #V 10#! anos"
 mpo_decisions_events.0204.a_fail: "Você #n falha#! em ganhar um [commander_trait|lE]"
 mpo_decisions_events.0204.a_fail_desc: "Você pode tentar novamente em #V 5#! anos"
