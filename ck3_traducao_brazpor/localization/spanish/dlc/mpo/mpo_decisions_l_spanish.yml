 invite_a_stargazer_decision_desc: "Busco conselhos sábios guiados pelos céus, pelos espíritos e pelo rosto mutável da natureza."
 adopt_nomadic_ways_decision: "Adotar os Costumes Nômades"
 adopt_nomadic_ways_decision_desc: "Pisei em muitos caminhos e vi o mundo de ponta a ponta. A vida em movimento é o que meu coração deseja, e chegou a hora de liderar aqueles que me seguirem."
