 settle_people_decision: "Migrar para Terras Conquistadas"
 settle_people_decision_desc: "Essas terras não nasceram para nós, mas se curvam à nossa vontade mesmo assim. Suas cidades têm nomes estrangeiros, seu solo foi cultivado por mãos que não são nossas — mas isso acabou.\n\nTomamos o que conquistamos e fincamos estacas na terra. Que nos chamem de conquistadores — nos tornaremos reis."
