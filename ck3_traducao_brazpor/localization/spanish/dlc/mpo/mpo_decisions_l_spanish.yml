 mpo_decisions_events.0070.desc: "Os membros da minha tribo buscaram [great_court_astrologer_option.GetHerHim] s [great_court_astrologer_option.Custom('GetDaughterSon')] s de xamãs, encontraram eremitas em suas tocas, estranhos com palavras sagradas nos lábios, exilados vagando pelos ermos... Tudo para encontrar quem ocupe o cargo de $court_astrologer_court_position$ para mim.\n\nTrazem-me pessoas santas. Cada uma conta histórias do meu destino e fala dos sinais que se observam na natureza."
 mpo_decisions_events.0070.a: "[great_court_astrologer_option.GetFirstNameNoTooltip] vê os dias por vir."
 mpo_decisions_events.0070.b: "[good_court_astrologer_option.GetFirstNameNoTooltip] servirá."
 mpo_decisions_events.0070.c: "Não sinto discernimento aqui."
