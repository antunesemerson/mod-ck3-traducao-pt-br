 confederation_kingdom_decision: "Erguer a Confederação"
 confederation_kingdom_decision_desc: "O que antes era um pacto de necessidade — guerreiros jurados a resistir juntos à tempestade — deve agora se tornar algo maior. Que os líderes das milícias se tornem senhores, os chefes se tornem vassalos, e a confederação permaneça unida sob um único estandarte."
 confederation_kingdom_decision_tooltip: "Dissolva a [confederation|lE] e forme um novo [kingdom|lE] com os [confederates|lE]"
 confederation_kingdom_decision_confirm: "Comigo como seu [ROOT.Char.Custom('get_queen_king')|l]!"
 mpo_decisions_events.0004.t: "O Nascimento de um [new_king_ruler.GetPrimaryTitle.GetTierAsNameNoTooltip|l]"
 mpo_decisions_events.0004.desc: "Antes, nos governávamos segundo nossa própria vontade, e nossas hostes de guerra não respondiam a ninguém além de nós. Agora, nos ajoelhamos — não como [ROOT.Char.GetWomenMen] abatidos, mas como vassalos.\n\nO que antes era um encontro de iguais tornou-se um [new_king_ruler.GetPrimaryTitle.GetTierAsName|l], e nossas lâminas estão sob o comando de [new_king_ruler.Custom('ES_ElLa')] [new_king_ruler.GetTitledFirstName|l]."
 mpo_decisions_events.0004.a: "$mpo_decisions_events.0005.a$"
 mpo_decisions_events.0004.b: "Não farei parte disso."
 mpo_decisions_events.0005.t: "$mpo_decisions_events.0004.t$"
 mpo_decisions_events.0005.desc: "Outrora éramos bandos de guerra unidos pela necessidade; nossa união era tão fugaz quanto as estações. Agora somos um só. A Confederação se tornou uma grande fera, e eu — a cabeça da criatura.\n\nOs chefes que cavalgavam ao meu lado se ajoelham a meu comando. Eles ficam aos lados do meu trono. Cantam à minha imponente mesa! Acordamos uma sucessão justa e, assim, os outros clãs aguardam honrosamente sua vez de governar.\n\nNasceu seu [new_king_ruler.GetPrimaryTitle.GetTierAsName|l]. E, enquanto eu viver, serei seu soberan[ROOT.Char.Custom('ES_OA')]."
 mpo_decisions_events.0005.a: "Que prosperemos, juntos!"
