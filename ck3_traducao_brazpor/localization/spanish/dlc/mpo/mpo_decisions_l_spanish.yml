 mpo_decisions_events.0300.t: "O Ritual da Terra"
 mpo_decisions_events.0300.desc: "[shaman.Custom('ES_ElLa')|U] [shaman.GetTitledFirstName|l] lança o olhar para o céu, recitando versos em que detalha sua devoção a [shaman.GetFaith.FertilityGodName].\n\n\"Recordemos agora como aqueles que vieram antes de nós cuidavam desta terra\", diz [shaman.GetSheHe], convidando os demais a compartilhar seus conselhos.\n\n\"O que nossos avôs aprenderam sobre o cordeiro recém-nascido? O que nossas tias-avós disseram sobre o solo?\"."
 mpo_decisions_events.0300.tt: "A assembleia em [fertility_county.GetName] começou."
 mpo_decisions_events.0300.a: "[shaman.GetFaith.FertilityGodName], ajude-nos a lembrar."
 mpo_decisions_events.0300.b: "Eu me juntarei a [shaman.GetNameNoTooltip] em suas reflexões."
 mpo_decisions_events.0300.b_tt: "Os resultados da assembleia serão #V mais eficazes#!"
 mpo_fertility_dance_county_modifier: "Assembleia da Fertilidade"
 mpo_fertility_dance_county_modifier_desc: "Uma grande reunião aconteceu neste condado, e todos compartilharam seus conhecimentos como pastores."
