l_spanish:
 call_for_confederation_decision: "Chamar para a Confederação"
 call_for_confederation_decision_desc: "Contra os grandes poderes que desprezam os fracos, toda alma [ROOT.Char.GetCulture.GetName] que lutar sozinha morrerá sozinha.\n\nPreciso encontrar aqueles que amam meu povo e fazer um juramento sagrado para lutar juntos até a morte."
 call_for_confederation_decision_tooltip: "Comece a convidar outros [rulers|lE] para uma [confederation|lE]"
 call_for_confederation_decision_confirm: "Quem ficará ao nosso lado?"
