 blend_traditions_decision_desc: "Sou [ROOT.Char.GetCulture.GetName], enquanto meu povo é [ROOT.Char.GetDomicile.GetCulture.GetCollectiveNoun]. Tenho tradições que me servem bem — mas a tradição [ROOT.Char.GetDomicile.GetCulture.GetNameNoTooltip] é rica e bem adequada para uma vida na estepe. Promoverei nossos costumes lado a lado até emergirmos como um só."
