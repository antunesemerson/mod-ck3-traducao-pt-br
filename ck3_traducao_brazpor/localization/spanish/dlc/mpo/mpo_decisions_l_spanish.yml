 develop_fertility_decision: "Gerenciar Pastagem"
 develop_fertility_decision_desc: "Não há [ROOT.Char.GetTitleAsNameNoTooltip|l] que possa governar sem sua horda. Devo supervisionar os movimentos dos animais que pastam para que a horda de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] não comece a diminuir.\n\nReuni os pastores e seus rebanhos, e vamos para pastos mais verdes. Eu irei com eles, pois não fujo do trabalho duro."
