 offer_confederation_members_tt: "Pode ser usado com [rulers|lE] [Concept('independent', 'independientes')|E] de nível [duke|lE] ou [count|lE] para adicioná-los a uma [confederation|lE] compartilhada"
 confederation_join_defensive_wars_tt: "Os [confederates|lE] sempre lutarão nas [wars|lE] defensivas uns dos outros"
