 become_nomadic_decision: "Tornar-se Nômade"
 become_nomadic_decision_desc: "A terra sob nossos pés nos prendeu por gerações, mas a estepe não favorece aqueles que ficam parados. Temos observado os cavaleiros das planícies abertas — como vagueiam para onde querem, livres de muralhas, sua riqueza é levada com eles como o próprio vento.\n\nAgora, nos livramos do peso da vida sedentária."
 become_nomadic_decision_tooltip: "Adote o [government|lE] [GetGovernment( 'nomad_government' ).GetNameWithIcon|l]"
 become_nomadic_decision_confirm: "Nenhum lar além da tenda."
 settle_the_steppe_decision: "Assentar-se na Estepe"
 settle_the_steppe_decision_desc: "A estepe alimentou nossos rebanhos, carregou nossos cavaleiros e espalhou nossos inimigos ao vento. Mas agora colocamos pedras onde antes trovejavam cascos. Não mais perseguiremos o horizonte — pois faremos com que o horizonte venha até nós.\n\nContinuamos filhos da estepe. Mas criaremos raízes em seu solo, ergueremos muros em seu vento e transformaremos a fogueira em lareira."
 settle_the_steppe_decision_tooltip: "Assente seus [ROOT.Char.GetDomicile.GetCulture.GetCollectiveNoun] [ROOT.Char.GetDomicile.GetFaith.GetAdherentNamePlural] como [GetGovernment('tribal_government').GetName|l], [GetGovernment('feudal_government').GetName|l] ou [GetGovernment('clan_government').GetName|l], abandonando seus costumes [GetGovernment( 'nomad_government' ).GetName] s."
