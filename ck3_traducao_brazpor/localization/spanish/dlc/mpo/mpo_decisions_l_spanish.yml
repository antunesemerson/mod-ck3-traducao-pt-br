 mpo_decision_introduce_heir: "Apresentar Herdeiro"
 introduce_heir_decision_desc: "Se meu sucessor[ROOT.Char.GetPlayerHeir.Custom('ES_XA')] tiver de dominar seu destino, precisará de amigos honrados. Preciso tornar seu rosto conhecido e fazer sua voz ser ouvida nos lares cobertos de seda dos poderosos.\n\nCondenad[ROOT.Char.GetPlayerHeir.Custom('ES_OA')] à perdição está [ROOT.Char.GetPlayerHeir.Custom('ES_ElLa')] [ROOT.Char.GetPlayerHeir.GetWomanMan] que permanece sozinho[ROOT.Char.GetPlayerHeir.Custom('ES_OA')] sob o céu."
 introduce_heir_decision_tooltip: "Faça com que seu [player_heir|lE] crie amizade [Concept('friends', 'amistad')|E] com um de seus [vassals|lE], [allies|lE] ou [relations|lE]"
 mpo_decision_introduce_heir_confirm: "#EMP [ROOT.Char.GetPlayerHeir.GetTitledFirstNameNoTooltip], sela seu cavalo!#!"
 mpo_decisions_events.0020.t: "Apresentar Herdeiro"
 mpo_decisions_events.0020.desc: "Sangue do meu sangue, meu [ROOT.Char.Custom2('RelationToMeShort', loc_heir)] [heir.GetFirstName], um dia deverá exigir a lealdade de todo o [ROOT.Char.GetHouse.GetName] e de muitos outros povos. Sem amigos fortes para dar apoio a [heir.GetHerHim], talvez a voz do meu herdeir[heir.Custom('ES_OA')].\n\nEnquanto montamos em nossos cavalos, faço o recenseamento daqueles que me são fiéis."
 mpo_decisions_events.0020.desc_multiple: "[target_1.Custom('ES_ElLa')|U] [target_1.GetTitledFirstName|l] de temperamento [target_1.Custom('ComplimentAdjective')] certamente dará um lugar a [heir.GetFirstNameNoTooltip] junto à sua lareira, mas a quem deve tentar impressionar #EMP más#!…?"
 mpo_decisions_events.0020.desc_one: "Eles são poucos, e há apenas um que eu verdadeiramente confio..."
 mpo_decisions_events.0020.a: "M [ROOT.Char.Custom2('RelationToMeShort', target_1)], [target_1.GetFirstNameNoTooltip] de [target_1.GetPrimaryTitle.GetNameNoTierNoTooltip]."
 mpo_decisions_events.0020.b: "M [ROOT.Char.Custom2('RelationToMeShort', target_2)], [target_2.GetFirstNameNoTooltip] de [target_2.GetPrimaryTitle.GetNameNoTierNoTooltip]."
 mpo_decisions_events.0020.c: "M [ROOT.Char.Custom2('RelationToMeShort', target_3)], [target_3.GetFirstNameNoTooltip] de [target_3.GetPrimaryTitle.GetNameNoTierNoTooltip]."
 mpo_decisions_events.0020.d: "M [ROOT.Char.Custom2('RelationToMeShort', target_4)], [target_4.GetFirstNameNoTooltip] de [target_4.GetPrimaryTitle.GetNameNoTierNoTooltip]."
 mpo_decisions_events.0020.e: "M [ROOT.Char.Custom2('RelationToMeShort', target_5)], [target_5.GetFirstNameNoTooltip] de [target_5.GetPrimaryTitle.GetNameNoTierNoTooltip]."
 mpo_decisions_events.0020.f: "Bah, esqueça isso."
