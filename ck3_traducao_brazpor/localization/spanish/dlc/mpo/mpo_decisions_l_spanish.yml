 mpo_pax_mongolica_decision: "$mpo_nomad_legacy_5_name$"
 mpo_pax_mongolica_decision_desc: "O esplendor de nossa dinastia brilha sobre a Grande Estepe. Cidades florescerão onde antes havia apenas cinzas.\n\nPostos avançados serão estabelecidos que cantam sobre a compaixão do Cã dos Cãs."
 mpo_pax_mongolica_decision_confirm: "Sem tempo a perder"
 mpo_pax_mongolica_decision_tooltip: "Ajude a construir as cidades da Grande Estepe"
 pax_mongolica_ruler_modifier: "$mpo_nomad_legacy_5_name$"
 pax_mongolica_ruler_modifier_desc: "Este personagem garantiu que as cidades da Grande Estepe estejam bem conectadas."
 pax_mongolica_every_county_in_steppe_tt: "Todo [county|El] do domínio de [the_great_steppe|lE] pertencente a um membro da sua [dynasty|lE]:"
 mpo_decisions_events.0400.t: "A Paz da Terra"
 mpo_decisions_events.0400.desc: "\"… Especiarias do longínquo oriente!\", \"Pimenta autêntica, colhida do covil de um dragão!\", \"A melhor seda, as cores mais ricas!\".\n\nOs mercadores gritam e acenam para todos os que estão dispostos a ouvir, exibindo suas mercadorias com entusiasmo insistente.\n\n\"É assim em toda parte, ó grande [ROOT.Char.GetTitleAsNameNoTooltip|l]\", [courtier.Custom('ES_ElLa')] [courtier.GetTitledFirstName|l] se inclina profundamente ao me saudar. \"O mundo inteiro está agora sob as asas da dinastia [ROOT.Char.GetDynasty.GetBaseNameNoTooltip]. As pessoas vêm às vossas cidades, atraídas por sua prosperidade\"."
 mpo_decisions_events.0400.a: "Mantenha os portões abertos."
 mpo_desperate_stance_decision: "Tempos Desesperados"
 mpo_desperate_stance_decision_desc: "A terra está estéril. Os bezerros morrem no ventre das mães, invisíveis sob o sol. Cavalos, tão magros quanto gravetos, desabam com estalos nauseantes.\n\nSó há um caminho: e é para fora."
 mpo_desperate_stance_decision_confirm: "Reúna o povo"
 mpo_desperate_stance_decision_tooltip: "Una seu povo em uma última postura desesperada"
 mpo_desperate_stance_decision_tt: "[the_great_steppe|E] está na [steppe_season|lE] $situation_steppe_havsarsan_zud_season$"
 mpo_decisions_events.0500.t: "Medidas Desesperadas"
 mpo_decisions_events.0500.desc: "Camadas de gelo cobrem a grama murcha, os focinhos do gado estão em carne viva de tanto tentar alcançá-la.\n\nMeu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('courtier'))|U] [courtier.GetShortUIName|U] se aproxima de mim, seu corpo encolheu ao tamanho de uma boneca:\n\n\"[ROOT.GetCharacter.Custom('GetMongolHonorific')|U] [ROOT.Char.GetTitleAsNameNoTooltip|l], seu povo morre a cada amanhecer; por favor, livrai-nos deste inferno vazio\"."
 mpo_decisions_events.0500.a: "Siga-me!"
 mpo_desperate_stance_invasion_cb_enable_var_tt: "Você poderá usar o [casus_belli|lE] $invasion_war$"
 expand_the_steppe_decision_generic: "Expandir as Estepes"
 expand_the_steppe_decision_desc: "Crescemos fortes em nossa terra natal, mas as conquistas e aventuras nos levaram cada vez mais para longe de nossos antigos pastos e terras de caça, e em direção a terras habitadas por povos assentados e costumes sedentários.\n\nDevemos introduzir nosso modo de vida nessas novas e estranhas terras."
