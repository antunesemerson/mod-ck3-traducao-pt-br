 mpo_decisions_events.0120.t: "O Caminho do Nômade"
 mpo_decisions_events.0120.desc.intro: "Chegou o momento de transformar meu acampamento em algo mais: um assentamento móvel que avança pelas estepes com as mudanças das estações.\n\n\"Espero que estas terras lhes sirvam bem\", diz o pastor que liderava o povo antes de nós, acolhendo-nos em sua tenda."
 mpo_decisions_events.0120.desc.subject: "\n\n[nomad.Custom('ES_ElLa')|U] [nomad.GetTitledFirstName|l] é meu senhor[nomad.Custom('ES_XA')] suprem[nomad.Custom('ES_OA')], continua em tom de advertência, e tributo é o que exige."
 mpo_decisions_events.0120.a: "\"Depois de tudo, estas eram as terras dele/dela\"."
 mpo_decisions_events.0120.b: "\"Não vim aqui para ser súdito de ninguém.\""
 mpo_decisions_events.0120.c: "\"Não há motivo para você partir.\""
 mpo_decisions_events.0120.d: "\"Assumiremos daqui em diante.\""
 invite_a_siege_engineer_decision: "Buscar um Engenheiro de Cerco"
 invite_a_siege_engineer_decision_tooltip: "Seus servos lhe sugerirão uma série de candidatos adequados para o cargo de [GetCourtPositionType('siege_engineer_court_position').GetName()|l]"
 invite_a_siege_engineer_decision_desc: "É hora de encontrar alguém que possa destruir as muralhas dos meus inimigos."
 mpo_decisions_events.0080.t: "Especialista de Terras Distantes"
 mpo_decisions_events.0080.desc: "Enviei mensageiros por toda parte em busca de alguém que possa me ajudar com sua experiência em engenharia. Embora, a princípio, pareça uma tarefa impossível, finalmente dois [Select_CString(And(great_siege_engineer_option.IsFemale, good_siege_engineer_option.IsFemale),'candidatas','candidatos')] se apresentam em meu acampamento.\n\nPelo que vejo, [great_siege_engineer_option.GetFirstName] é a melhor opção entre os [Select_CString(And(great_siege_engineer_option.IsFemale, good_siege_engineer_option.IsFemale),'as','os')] dois, mas custa muito mais do que [good_siege_engineer_option.GetFirstName]. Em qualquer caso, finalmente conseguirei alguém que ajude meus exércitos nesse ponto fraco."
 mpo_decisions_events.0080.a: "[great_siege_engineer_option.GetFirstNameNoTooltip] sabe o que faz."
 mpo_decisions_events.0080.b: "[good_siege_engineer_option.GetFirstNameNoTooltip] servirá."
 mpo_decisions_events.0080.c: "Não me interesso por [Select_CString(And(great_siege_engineer_option.IsFemale, good_siege_engineer_option.IsFemale),'ninguna de las','ninguno de los')] dois."
