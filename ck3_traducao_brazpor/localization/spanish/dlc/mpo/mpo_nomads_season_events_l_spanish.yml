l_spanish:
 mpo_nomads_season_events.0001.t: "Cavalgando a Tempestade"
 mpo_nomads_season_events.0001.desc: ""Você vê a forma das nuvens? Parecem ter sido rasgadas pelas garras de um falcão", diz meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('storm_chaser'))], [storm_chaser.Custom('ES_ElLa')] [storm_chaser.GetTitledFirstName|l], apontando para o céu. 

"Isso anuncia uma tempestade terrível. Eu digo que usemos isso a nosso favor. Levemos nossos cavalos e arcos para a tempestade furiosa, peguemos [raid_target.Custom('ES_AlAla')] [raid_target.GetTitledFirstName|l] de surpresa e roubemos seu rebanho."", diz meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('storm_chaser'))], [storm_chaser.Custom('ES_ElLa')] [storm_chaser.GetTitledFirstName|l], apontando para o céu. 

"Devemos cuidar do nosso próprio abrigo."
 mpo_nomads_season_events.0001.a: "Protegido Contra a Tempestade"
 mpo_nomads_season_events.0001.b: "Este acampamento tem suas iurtas bem presas ao chão, com os animais mantidos próximos uns dos outros, para se proteger contra tempestades."
 mpo_storm_shelter_modifier: "Estômagos Vazios"
 mpo_storm_shelter_modifier_desc: "O vento uivante açoita as paredes da minha iurta.

Fico surpreso com a chegada do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hungry_neighbour'))], [hungry_neighbour.Custom('ES_ElLa')] [hungry_neighbour.GetTitledFirstName|l], que enfrentou os perigos da tempestade para se prostrar diante de mim, colocando aos meus pés uma garrafa de [Glossary( 'kumis', 'KUMIS_GLOSS')] como oferenda. 

"São tempos terríveis, e meu povo está passando fome. Não me resta outra opção senão pedir ajuda.""
 mpo_nomads_season_events.0005.t: "Seu povo não passará mais fome."
 mpo_nomads_season_events.0005.desc: "O vento uivante açoita as paredes da minha iurta.

Fico surpreso com a chegada do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hungry_neighbour'))], [hungry_neighbour.Custom('ES_ElLa')] [hungry_neighbour.GetTitledFirstName|l], que enfrentou os perigos da tempestade para se prostrar diante de mim, colocando aos meus pés uma garrafa de [Glossary( 'kumis', 'KUMIS_GLOSS')] como oferenda. 

"tira os sapatos com cuidado, para não trazer esterco para dentro da minha iurta. 

"Não esqueci a generosidade que você demonstrou quando meu povo estava passando fome. Vim para pagar minha dívida.""
 mpo_nomads_season_events.0005.a: "mancha a entrada da minha iurta ao entrar.

"Meu #EMP querid[ROOT.Char.Custom('ES_OA')]#! [ROOT.Char.GetTitleTierName|l]!", declara. "Tenho de agradecer aos céus por um rebanho tão abundante. Há o suficiente para vender, se você puder pagar.""
 mpo_nomads_season_events.0005.b: "Diga-me seu preço."
 mpo_nomads_season_events.0005.c: "Aceito sua oferenda."
 mpo_nomads_season_events.0010.t: "Entre [rich_neighbour.Custom('SisterBrother')]s não há dívidas."
 mpo_nomads_season_events.0010.desc: "Me dê seu rebanho, ou me dê sua cabeça!"
 mpo_nomads_season_events.0010.desc_offered_herd: "tira os sapatos com cuidado, para não trazer esterco para dentro da minha iurta. 

"[rich_neighbour.Custom('ES_ElLa')|U] [rich_neighbour.GetTitledFirstName|l] e seus guarda-costas conseguem escapar"
 mpo_nomads_season_events.0010.desc_fallback: "mancha a entrada da minha iurta ao entrar.

"Por onde quer que eu vá, vejo meus súditos raspando o fundo de tigelas vazias, tentando salvar cada migalha de nossos suprimentos cada vez mais escassos. \n\nO silêncio é quebrado por um forte estrondo. A tigela de [Glossary( 'kumis', 'KUMIS_GLOSS')] [kurultai_2.Custom('ES_DelDela')] [kurultai_2.GetTitledFirstName|l] jaz tombada no chão, seu conteúdo se infiltrando na terra seca. [kurultai_1.Custom('ES_ElLa')|U] [kurultai_1.GetTitledFirstName|l] está de pé diante da cena, rindo, e diz: "Não vi nada.""
 mpo_nomads_season_events.0010.a: "Não lamente o #EMP kumis#! derramado, [kurultai_2.GetTitledFirstNameNoTooltip|l]."
 mpo_nomads_season_events.0010.b: "Vamos, lutem! Entretenham o resto de nós."
 mpo_nomads_season_events.0010.c: "Deixem isso para lá, vocês dois."
 mpo_nomads_season_events.0010.d: "[kurultai_1.Custom('ES_ElLa')|U] [kurultai_1.GetTitledFirstName|l] fica ferido na luta"
 mpo_nomads_season_events.0010.e: "[kurultai_2.Custom('ES_ElLa')|U] [kurultai_2.GetTitledFirstName|l] fica ferido na luta"
 mpo_nomads_season_events.0010.d.tt.success: "Você consegue derrotar [rich_neighbour.Custom('ES_AlAla')] [rich_neighbour.GetTitledFirstName|l] e seus guarda-costas"
 mpo_nomads_season_events.0010.d.tt.failure: "[rich_neighbour.Custom('ES_ElLa')|U] [rich_neighbour.GetTitledFirstName|l] e seus guarda-costas conseguem escapar"
 given_herd: "Você tem esta opção porque anteriormente deu [herd|lE] a este personagem."
 mpo_nomads_season_events.0015.t: "Ânimos em Brasa"
