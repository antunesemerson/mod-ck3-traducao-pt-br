 mpo_nomads_season_events.0015.a: "Não lamente o #EMP kumis#! derramado, [kurultai_2.GetTitledFirstNameNoTooltip|l]."
 mpo_nomads_season_events.0015.b: "Vamos, lutem! Entretenham o resto de nós."
