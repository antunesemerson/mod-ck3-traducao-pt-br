 # Contract 1
 nomadic_migration_contract_1_contract: "$nomadic_migration_contract_1_desc_title$"
 nomadic_migration_contract_1_desc_title: "Pastores Desagradáveis"
 nomadic_migration_contract_1_desc: "Após nos estabelecermos em [TaskContract.GetLocation.GetName], tivemos diversos conflitos com um grupo de pastores locais, segundo [TaskContract.GetEmployer.GetName]. Suas provocações já duram tempo demais — é hora de pôr fim a essa agitação."
 nomadic_migration_contract_1_request: "$nomadic_migration_contract_request$"
 mpo_contract_events.0005.t: "$nomadic_migration_contract_1_desc_title$"
 mpo_contract_events.0005.desc: "Solo lleva unos instantes tras una reunión con uno de los pastores en Karakórum descubrir el quid de la cuestión . [herder_character.GetName] afirma que su comunidad ha vivido en estas tierras desde hace generaciones, pero es justo ahora que están sufriendo escasez de alimentos, coincidiendo con nuestra llegada a la zona.\n\nSi bien se niegan a abandonar su hogar ancestral, una exhibición de autoridad les persuadiría de lo contrario… A no ser que, por supuesto, deseemos encontrar algún modo de convertir su presencia en una ventaja para nosotros."
 mpo_contract_events.0005.a: "Junte-se a mim, seremos mais fortes juntos."
 mpo_contract_events.0005.a.impressed: "Chegamos a um acordo"
 mpo_contract_events.0005.a.unimpressed: "Eles não se impressionam com nossos argumentos"
 mpo_contract_events.0005.b: "Trabalhem para mim, eu lidarei com seus problemas de comida."
 mpo_contract_events.0005.c: "Expulsem-nos de #emp nossas#! terras."
 # Contract 2
 nomadic_migration_contract_2_contract: "$nomadic_migration_contract_2_desc_title$"
 nomadic_migration_contract_2_desc_title: "O Rebanho Selvagem"
 nomadic_migration_contract_2_desc: "Um rebanho selvagem tem devastado os campos ao redor de [TaskContract.GetLocation.GetName]. Nossos próprios rebanhos sofrerão enquanto essas bestas forem deixadas soltas."
 nomadic_migration_contract_2_request: "$nomadic_migration_contract_request$"
 mpo_si_slaughtered_for_a_feast: "Grande Banquete"
 mpo_si_slaughtered_for_a_feast_desc: "Este personagem trouxe um verdadeiro banquete para seu povo."
 migration_contract_2_herd_reward_tt: "#V Você#! ganha [herd_i] #P [SCOPE.ScriptValue('miniscule_herd_value_static')]-[SCOPE.ScriptValue('minor_herd_value_static')]#! [herd|lE]"
 mpo_contract_events.0015.t: "$nomadic_migration_contract_2_desc_title$"
 mpo_contract_events.0015.desc: "Mesmo de longe, o rebanho pastando é uma visão impressionante. Eles se alimentaram vorazmente da terra, deixando pouco espaço para nossos próprios rebanhos prosperarem e se expandirem.\n\nNossos pastores aterrorizados pediram que lidássemos com eles antes que nosso próprio rebanho comece a passar fome e morrer."
 mpo_contract_events.0015.a: "Vou capturar alguns desses para nossos rebanhos."
 mpo_contract_events.0015.a.successful: "Você captura uma grande parte do rebanho selvagem"
 mpo_contract_events.0015.a.failure: "Você captura uma pequena parte do rebanho selvagem"
 mpo_contract_events.0015.b: "Abatam-nos e preparem um pequeno banquete."
 mpo_contract_events.0015.c: "Eles nos renderão uma pequena fortuna."
 # Contract 3
 nomadic_migration_contract_3_contract: "$nomadic_migration_contract_3_desc_title$"
 nomadic_migration_contract_3_desc_title: "Pastagens em Disputa"
 nomadic_migration_contract_3_desc: "Tem havido um conflito constante entre meus [TaskContract.GetTaker.Custom('KnightCulturePluralNoTooltip')] pelas melhores pastagens em torno de [TaskContract.GetLocation.GetName], que se agravou lentamente até que o orgulho os colocasse em forte desacordo."
 nomadic_migration_contract_3_request: "$nomadic_migration_contract_request$"
 mpo_contract_events.0025.t: "$nomadic_migration_contract_3_desc_title$"
 mpo_contract_events.0025.desc: "Após migrarmos para [task_contract.GetLocation.GetName], surgiu uma disputa contínua entre [task_contract.GetEmployer.GetFirstName] e [knight_2.GetFirstName] pelas pastagens próximas.\n\nEmbora fosse uma dor de cabeça menor no início, o conflito se intensificou e agora o orgulho impede que qualquer lado recue. Devo intervir antes que piore ainda mais e afete o moral no acampamento."
 mpo_contract_events.0025.a: "[task_contract.GetEmployer.GetFirstNameNoTooltip] tem razão, as terras são suas."
 mpo_contract_events.0025.b: "Na verdade, [knight_2.GetFirstNameNoTooltip] apresenta os melhores argumentos."
 mpo_contract_events.0025.c: "Meu próprio rebanho prosperará nessas terras."
 # Contract 4
 nomadic_migration_contract_4_contract: "$nomadic_migration_contract_4_desc_title$"
 nomadic_migration_contract_4_desc_title: "Falta de Ferramentas"
 nomadic_migration_contract_4_desc: "A migração para [TaskContract.GetLocation.GetName] causou um impacto em nosso estoque de materiais e ferramentas. Sem reabastecimento, isso certamente afetará nossa tribo em breve."
 nomadic_migration_contract_4_request: "$nomadic_migration_contract_request$"
 mpo_contract_events.0035.t: "$nomadic_migration_contract_4_desc_title$"
 mpo_contract_events.0035.desc: "A última migração para [task_contract.GetLocation.GetName] foi desgastante para meu povo, que agora carece de muitas ferramentas básicas usadas no dia a dia. Isso tem atrasado até mesmo as tarefas mais simples.\n\nSem um comerciante que nos traga os suprimentos necessários, meu povo continuará a sofrer."
 mpo_contract_events.0035.a: "Nossos comerciantes cuidarão disso."
 mpo_contract_events.0035.b: "Vamos encontrar um comerciante para conseguir as ferramentas."
 mpo_contract_events.0035.c: "Meu nome é conhecido por todos, alguém vai cuidar disso."
 mpo_contract_events.0035.d: "O povo terá que se virar sem elas."
 EVENT_WINDOW_OPTION_AVAILABLE_TRADE_YURT: "Esta opção está disponível devido a [GetDomicileBuilding('trade_yurt_01').GetName|l]"
 mpo_si_lacking_tools: "Falta de Ferramentas"
 mpo_si_lacking_tools_desc: "O povo deste personagem não tem as ferramentas necessárias para cuidar adequadamente do clã."
 mpo_si_lacking_tools_2: "$mpo_si_lacking_tools$"
 mpo_si_lacking_tools_2_desc: "$mpo_si_lacking_tools_desc$"
 mpo_si_lacking_tools_3: "$mpo_si_lacking_tools$"
 mpo_si_lacking_tools_3_desc: "$mpo_si_lacking_tools_desc$"
 # Contract 5
 nomadic_migration_contract_5_contract: "$nomadic_migration_contract_5_desc_title$"
 nomadic_migration_contract_5_desc_title: "Fragmentação da Tribo"
 nomadic_migration_contract_5_desc: "Desconectada do restante do povo sob minha liderança, a tribo em [TaskContract.GetLocation.GetName] exigiu um chefe local."
 nomadic_migration_contract_5_request: "$nomadic_migration_contract_request$"
 mpo_contract_events.0045.t: "$nomadic_migration_contract_5_desc_title$"
 mpo_contract_events.0045.desc: "La tribu de [task_contract.GetLocation.GetName], ya incluso antes de que migrásemos a esta zona, había perdido algo de contacto con el resto de [ROOT.Char.GetPrimaryTitle.GetName]. Y ahora, más aún, pues parece que quieren más independencia y un cacique propio.\n\nCuando llego, hay un[new_chieftain.Custom('ES_XA')] [new_chieftain.GetWomanMan] de nombre [new_chieftain.GetFirstName] que parece representarles. [new_chieftain.GetFirstNameNoTooltip] parece ser una persona razonable, dispuest[new_chieftain.Custom('ES_OA')] a jurarme obediencia siempre que se permita a su pueblo vivir a su manera."
 mpo_contract_events.0045.a: "Podemos conversar sobre isso."
 mpo_contract_events.0045.a.successful: "[new_chieftain.GetHerHim|U] convenço"
 mpo_contract_events.0045.a.failure: "Não há quem [new_chieftain.GetHerHim] convença"
 mpo_contract_events.0045.b: "[new_chieftain.GetFirstNameNoTooltip], você diz? Então que os governe."
 mpo_contract_events.0045.b.tt: "[task_contract.GetLocation.GetName] pode se tornar uma [divergent_culture|lE] de [task_contract.GetLocation.GetCulture.GetName]"
 mpo_contract_events.0045.c: "Um pequeno presente os lembrará de tudo que faço por eles."
 mpo_contract_events.0045.d: "Eles vão acabar se acostumando."
 mpo_si_accepting_cultures: "Aceitando a Fragmentação"
 mpo_si_accepting_cultures_desc: "Este personagem aceitou que tribos se fragmentem de sua própria tribo."
 # Contract 6
 nomadic_migration_contract_6_contract: "$nomadic_migration_contract_6_desc_title$"
 nomadic_migration_contract_6_desc_title: "Terras Venenosas"
 nomadic_migration_contract_6_desc: "As terras ao redor de [TaskContract.GetLocation.GetName] parecem ter causado um efeito debilitante no nosso rebanho local, que adoeceu após se estabelecer ali."
 nomadic_migration_contract_6_request: "$nomadic_migration_contract_request$"
 mpo_contract_events.0055.t: "$nomadic_migration_contract_6_desc_title$"
 mpo_contract_events.0055.desc: "Nosso rebanho está enfraquecido, seu passo firme agora vacila. Ao observar os animais, vejo vários deles simplesmente deitados, sem forças nem para se mover.\n\nEnquanto essa fraqueza continuar a se espalhar, todo o nosso rebanho em [task_contract.GetLocation.GetName] corre o risco de ser infectado. O que será da nossa tribo se isso acontecer?"
 mpo_contract_events.0055.a: "Eles vão resistir, eu cuidarei disso."
 mpo_contract_events.0055.a.successful: "O rebanho se recupera"
 mpo_contract_events.0055.a.failure: "O rebanho piora"
 mpo_contract_events.0055.b: "Vou mandar chamar alguém que possa ajudá-los."
 mpo_contract_events.0055.c: "Vamos abatê-los antes que a doença se espalhe ainda mais."
 mpo_si_slaughtered_animals: "Carne Armazenada"
 mpo_si_slaughtered_animals_desc: "Este personagem acumulou muita carne.\n#emp Desaparecerá la próxima vez que celebre un [GetActivityType('activity_feast').GetName|l]#!\n\nCusto de [GetActivityType('activity_feast').GetName|l]: #P -50 % [gold_i]#!"
 # Contract 7
 nomadic_migration_contract_7_contract: "$nomadic_migration_contract_7_desc_title$"
 nomadic_migration_contract_7_desc_title: "Vizinhos Problemáticos"
 nomadic_migration_contract_7_desc: "Cavaleiros de uma tribo vizinha estão avançando sem vergonha por [TaskContract.GetLocation.GetName], trazendo consigo um grande rebanho de animais."
 nomadic_migration_contract_7_request: "$nomadic_migration_contract_request$"
 mpo_contract_events.0065.t: "$nomadic_migration_contract_7_desc_title$"
 mpo_contract_events.0065.desc: "Aunque pocos, los jinetes de [neighbor_leader.GetPrimaryTitle.GetBaseName] se atreven a cabalgar por [task_contract.GetLocation.GetName] con una gran cabaña de bestias bajo su mando. Parece que han estado rastreando un rebaño perdido cuando nos hemos asentado en la zona.\n\nSi bien estas tierras parecían vacías a su llegada, no puedo permitirles que atraviesen mis dominios sin más.\n\n#bold Estas tierras son para mi grey y solo para ella.#!"
 mpo_contract_events.0065.a: "Vamos deixá-los partir em paz, mas com um custo."
 mpo_contract_events.0065.a.successful: "Eles pagam o preço"
 mpo_contract_events.0065.a.failure: "Não conseguimos detê-los"
 mpo_contract_events.0065.b: "Estas são #emp nossas#! terras, e esses são #emp nossos#! rebanhos."
 mpo_contract_events.0065.c: "Deixem-nos em paz."
 # Contract 8
 nomadic_migration_contract_8_contract: "$nomadic_migration_contract_8_desc_title$"
 nomadic_migration_contract_8_desc_title: "Os Restos"
 nomadic_migration_contract_8_desc: "Aparentemente encontramos os vestígios de um grupo anterior de pessoas na área. Há um rebanho de animais e yurts quebradas ao redor do nosso novo acampamento em [TaskContract.GetLocation.GetName]."
 nomadic_migration_contract_8_request: "$nomadic_migration_contract_request$"
 mpo_contract_events.0075.t: "$nomadic_migration_contract_8_desc_title$"
 mpo_contract_events.0075.desc: "Según recorro el/la [barony_location.Custom('HoldingNoHoldingTerrainRoaming')], me vuelvo a topar con la misma partida semidomada de animales que hemos observado varias veces. Incluso cuando nos acercamos, queda claro que ya han interactuado antes con personas.\n\nSi los dejamos a su aire, seguirán pastando en tierras que podrían ser para nuestra grey. ¿Los llevamos de vuelta a [ROOT.Char.GetCapitalLocation.GetName] o nos ocupamos de ellos de otro modo? ¿Cuál es la mejor solución para mi pueblo?"
 mpo_contract_events.0075.a: "Eles serão uma ótima adição aos nossos rebanhos."
 mpo_contract_events.0075.b: "Expulsem-nos de [task_contract.GetLocation.GetNameNoTooltip]."
 mpo_contract_events.0075.c: "Abatam os animais."
 # Contract 9
 nomadic_migration_contract_9_contract: "$nomadic_migration_contract_9_desc_title$"
 nomadic_migration_contract_9_desc_title: "Traçando Fronteiras"
 nomadic_migration_contract_9_desc: "Após nos estabelecermos em [TaskContract.GetLocation.GetName], surgiram desentendimentos sobre algumas das melhores terras de pasto próximas. [TaskContract.GetEmployer.GetName] tentou, sem sucesso, mediar a situação entre as tribos."
 nomadic_migration_contract_9_request: "$nomadic_migration_contract_request$"
 mpo_contract_events.0085.t: "$nomadic_migration_contract_9_desc_title$"
 mpo_contract_events.0085.desc: "[task_contract.GetEmployer.GetName] me explicou a situação a fundo. Ao que parece, depois de migrarmos para esta região, a tribo de [other_county.GetName] foi a primeira a tomar controle das pastagens, mas a área fica muito mais perto de [task_contract.GetLocation.GetName].\n\nEmbora [task_contract.GetEmployer.GetFirstNameNoTooltip] tenha tentado mediar, suas tentativas foram insuficientes. De qualquer forma, um dos dois lados acabará decepcionado, mas será preciso tomar uma decisão mais cedo ou mais tarde."
 mpo_contract_events.0085.a: "As terras de pasto ficarão com [task_contract.GetLocation.GetNameNoTooltip]."
 mpo_contract_events.0085.b: "Pertence a [other_county.GetNameNoTooltip]."
 mpo_si_spurned_tribe: "Tribo Rejeitada"
 # Contract 10
 nomadic_migration_contract_10_contract: "$nomadic_migration_contract_10_desc_title$"
 nomadic_migration_contract_10_desc_title: "A Velha Tribo"
 nomadic_migration_contract_10_desc: "Nosso acampamento em [TaskContract.GetLocation.GetName] foi abordado por pequenas comunidades que viviam na região antes de migrarmos para cá."
 nomadic_migration_contract_10_request: "$nomadic_migration_contract_request$"
 mpo_contract_events.0095.t: "$nomadic_migration_contract_10_desc_title$"
 mpo_contract_events.0095.desc: "Mi campamento ha recibido la visita de [new_chieftain.GetName], líder de tan solo un puñado de gente. Su dialecto es extranjero, pero habla con seguridad y orgullo sobre su pueblo y sus penalidades.\n\n#emp «[ROOT.Char.GetTitleAsNameNoTooltip], si encontráis lugar para nosotros entre vuestras yurtas, os ofrecemos nuestro rebaño y yo os serviré personalmente. Si no…, poco queda para nosotros en estas tierras».#!"
 mpo_contract_events.0095.a: "Vamos acolhê-los."
 mpo_contract_events.0095.b: "Eles não pertencem a este lugar, expulsem-nos."
 mpo_si_old_tribe: "Tribo Estrangeira"
 herd_starvation_title: "Rebanho Passa Fome!"
 herd_starvation_custom_tooltip: "@alert_icon! #alert_trial Se não [Concept('migrate', 'migras')|E] para novas terras, você perderá [herd|lE] a cada #V 3#! anos#!"
 msg_migration_into_realm_title: "Migração e Deslocamento"
 msg_migration_into_realm_desc: "[actor.GetUIName|U] [migrated|lE] para seu [target_title.GetBaseName] #weak ([target_title.GetName])#!"
 msg_migration_into_realm_tributary_title: "Migração Desloca Tributo"
 msg_migration_into_realm_tributary_desc: "[actor.GetUIName|U] se estabeleceu em [migrated|lE] em [target_title.GetBaseName] #weak ([target_title.GetName])#! e deslocando seu [tributary|lE] de [old_holder.GetShortUIName|U]"
 msg_migration_into_realm_fellow_tributary_title: "Migração Desloca Tributo Aliado"
 msg_migration_into_realm_fellow_tributary_desc: "[actor.GetUIName|U] migrou [migrated|lE] para [target_title.GetBaseName] #weak ([target_title.GetName])#! e desalojou seu colega [tributary|lE] de [old_holder.GetShortUIName|U]"
 msg_migration_into_realm_vassal_title: "Migração Desloca Vassalo"
 msg_migration_into_realm_vassal_desc: "[actor.GetUIName|U] migrou para [migrated|lE] para [target_title.GetBaseName] #weak ([target_title.GetName])#! deslocando seu [vassal|lE] , [old_holder.GetShortUIName|U]"
 msg_migration_into_realm_fellow_vassal_title: "Migração Desloca Vassalo Aliado"
