l_spanish:
 mpo_establish_paiza_system_decision: "Estabelecer o Sistema de Paizas"
 mpo_establish_paiza_system_decision_desc: "Será estabelecido um sistema de tábuas especiais para atrair estrangeiros ricos e fortalecer os súditos leais [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip|l]. Aqueles que portarem um [paiza|lE] que traga o nome [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitledFirstNameNoTooltip|l] carregarão minha autoridade e terão passagem segura por minhas terras. Aqueles que se atreverem a desrespeitar meu nome serão mortos como cães."
 mpo_establish_paiza_system_decision_tooltip: "Fortaleça seus súditos leais"
 mpo_establish_paiza_system_decision_confirm: "Pelo poder do Céu Eterno"
 mpo_establish_paiza_system_decision_is_gurkhan: "Você é o [gurkhan|lE]"
 mpo_establish_paiza_system_decision.grant_paiza_interaction_unlocked: "Desbloqueia a [character_interaction|lE] #V $mpo_interaction_grant_paiza$#! que pode ser usada em seus [courtiers|lE], [vassals|lE] e [tributaries|lE]"
 mpo_establish_paiza_system_decision.request_paiza_interaction_unlocked: "Desbloqueia a [character_interaction|lE] #V $mpo_interaction_ask_for_paiza$#! para seus [vassals|lE], [tributaries|lE] e [adventurers|lE] que visitam sua [court|lE]"
 mpo_establish_paiza_system_decision.paiza_obedient: "Os personagens que receberem os [artifacts|lE] paizas se tornam [Concept('obedient', 'obedientes')|E] em relação a você."
 mpo_establish_paiza_system_decision.paiza_abuse_authority_unlocked: "@alert_icon! Personagens portando Paizas ganham acesso à [decision|lE] #V $mpo_abuse_authority_paiza_decision$#!"
 mpo_establish_paiza_system_decision.leverage_khan_authority_unlocked: "@alert_icon! Personagens portando Paizas ganham acesso à [interaction|lE] #V $mpo_interaction_leverage_khan_authority$#!"
 mpo_establish_paiza_system_decision.call_for_merchants_decision_unlocked: "Desbloqueia a [decision|lE] [GetDecisionWithKey('mpo_call_for_merchants_decision').GetName]"
 mpo_establish_paiza_system_decision.paiza_recently_established: "[THIS.Char.GetName] já estabeleceu o sistema de paizas. Sua vida impede você de estabelecer um novo. Cada respiração patética sua é um insulto à sua autoridade."
 mpo_decisions_events.0099.t: "Sistema de Paizas Estabelecido"
 mpo_decisions_events.0099.desc: "Mi poder es como la misma estepa: se extiende infinitamente más allá del horizonte. Pero soy como una gota de agua en la lluvia, unida a un solo lugar.\n\nMás allá de la estepa, las gentes de las ciudades emplean libros de cuentas para transmitir el conocimiento más allá de su mirada finita. Usaré su idea para entregar paizas. Mis súbditos leales portarán las palabras más importantes de todas: #EMP mi nombre.#!\n\n[ROOT.Char.GetTitledFirstNameNoTooltip]: las runas grabadas en el artefacto infundirán miedo y obediencia absoluta."
 mpo_decisions_events.0099.a: "Minha vontade manifestada."
 paiza_artifact_title: "Paiza [patron.Custom('ES_DelDela')] [patron.GetTitledFirstNameNoTooltip|l]"
 paiza_artifact_desc: "[paiza|E], una sencilla pero amenazadora tablilla de metal que puede traer poder y desdicha por igual. En el reverso están grabadas las siguientes palabras:\n\nPor el poder del Cielo eterno. Por la protección de la buena fortuna imperial. Un edicto [patron.Custom('ES_DelDela')] [patron.GetTitledFirstName|l]: cualquiera que osare no respetarlo será castigado con la muerte."
 mpo_call_for_merchants: "Convocar Visitantes Ricos"
 mpo_call_for_merchants_decision: "$mpo_call_for_merchants$: Paiza"
 mpo_call_for_merchants_decision_desc: "A Grande Estepe é muito mais magnífica do que aquelas cidades estrangeiras gordas e mimadas. Ainda assim, elas possuem bens, engenhocas e ideias que podem nos ser úteis. Talvez algum de seus tolos ricos se aventure até aqui."
 mpo_call_for_merchants_decision_tooltip: "$mpo_call_for_merchants_decision.merchant_will_arrive$"
 mpo_call_for_merchants_decision_confirm: "Enviar os emissários"
 mpo_call_for_merchants_dead_merchant_toast: "Visitante abastado morre durante a viagem"
 mpo_call_for_merchants_dead_merchant_desc: "[merchant.Custom('ES_ElLa')|U] visitante abastado[merchant.Custom('ES_OA')] faleceu durante a viagem"
 mpo_call_for_merchants_small_decision: "$mpo_call_for_merchants$: Ofertas Locais"
 mpo_call_for_merchants_small_decision_desc: "$mpo_call_for_merchants_decision_desc$"
 mpo_call_for_merchants_small_decision_tooltip: "Melhore seus soldados ou permita a criação de [Concept('artifact', 'artefactos')|E]."
 mpo_call_for_merchants_small_decision_confirm: "Enviar o emissário"
 mpo_call_for_merchants_decision.merchant_will_arrive_smol: "$mpo_call_for_merchants_decision.merchant_will_arrive_generic$\n $BULLET_WITH_TAB$ Cerca de #P 20%#! do seu investimento em [gold|lE]"
 mpo_call_for_merchants_decision.merchant_will_arrive_generic: "Um estrangeiro rico viajará para sua corte à frente de uma caravana com destino a cidades estabelecidas e bem desenvolvidas. Ao retornar, você poderá receber os seguintes benefícios:\n $BULLET_WITH_TAB$ Cerca de #P 40 %#! da sua aplicação em [gold|lE]\n $BULLET_WITH_TAB$ Materiais de criação de [Concept('artifact', 'artefactos')|E] que desbloqueiem a [decision|lE] #V $commission_artifact_decision$#!\n $BULLET_WITH_TAB$ Armamentos para sua [horde|lE] e [archer_cavalry|lE]"
 mpo_call_for_merchants_decision.gold_needed_smol: "As ofertas mais lucrativas exigem um investimento maior em [gold|lE], até 800 [gold_i|E]"
 mpo_call_for_merchants_decision.robbed_merchants: "O último forasteiro que atendeu seu chamado desapareceu violentamente, e isso já se espalhou. Levará um tempo até que outra alma imprudente ouse aparecer."
 mpo_call_for_merchants_decision.merchant_will_arrive: "$mpo_call_for_merchants_decision.merchant_will_arrive_generic$\n $BULLET_WITH_TAB$ Progresso aleatório em [innovation|lE]"
 mpo_call_for_merchants_decision.buildings: "Várias [internal_upgrades|lE] para a [yurt_building|lE] [GetDomicileBuilding('trade_yurt_01').GetName|l] oferecem benefícios adicionais."
 mpo_call_for_merchants_decision.gold_needed: "As ofertas mais lucrativas exigem um investimento maior em [gold|lE], até 2400 [gold_i|E]"
 mpo_decisions_events.0100.t: "$mpo_call_for_merchants_decision$"
 mpo_decisions_events.0100.desc: "$mpo_decisions_events.2141.desc$"
 mpo_decisions_events.0100.a: "Tragam-me novas ideias."
 mpo_decisions_events.0100.a_not_unlocked: "Você não possui a [yurt_building|lE] [GetDomicileBuilding('trade_yurt_01').GetName|l]"
 mpo_decisions_events.0100.b: "O aço será bem aproveitado."
 mpo_decisions_events.0100.c: "Armadura para minha Horda."
 mpo_decisions_events.0100.d: "Primeiro, troquemos rebanho por ouro."
 mpo_decisions_events.0100.d.unlocked: "Podrás seleccionar las mercancías que solicites tras el trueque de [herd|lE].\n#weak Tienes disponible esta opción por poseer el [yurt_building|lE] de [GetDomicileBuilding('trade_yurt_01').GetName|l].#!"
 mpo_decisions_events.0100.e: "Sua riqueza. E sua vida. Agora."
 mpo_decisions_events.0100.e.warning: "@alert_icon! #alert_trial Nenhum outro visitante rico ousará ir à sua corte por duas décadas. Você não poderá tomar a decisão #V $mpo_call_for_merchants_decision$#! durante este período.#!"
 mpo_decisions_events.2141.t: "$mpo_call_for_merchants_small_decision$"
 mpo_decisions_events.2141.desc: "[paiza_merchant.GetName] ha llegado antes de lo previsto con polvo en sus botas y brillo en sus ojos.\n\n«Gracias por permitir mi presencia aquí, oh, sabi[ROOT.Char.Custom('ES_OA')] y poderos[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]. Me dicen que os interesan los bienes de [merchant_origin.GetNameNoTier], algo que puedo traer a vuestra yurta. Dirigiré una caravana hasta allí y regresaré.\n\nOs traeré con la mayor humildad aquello que deseéis. ¿Acero en bruto de los mejores hornos? ¿Conjuntos de armadura que rechacen cualquier golpe? ¿O quizá otra cosa?»."
 mpo_decisions_events.2141.b: "$mpo_decisions_events.0100.b$"
 mpo_decisions_events.2141.c: "$mpo_decisions_events.0100.c$"
 mpo_decisions_events.2141.d: "$mpo_decisions_events.0100.d$"
 mpo_decisions_events.2141.d.unlocked: "$mpo_decisions_events.0100.d.unlocked$"
 mpo_decisions_events.2141.e: "$mpo_decisions_events.0100.e$"
 mpo_decisions_events.2141.e.warning: "$mpo_decisions_events.0100.e.warning$"
 mpo_decisions_events.2141.upon_merchant_return: "$mpo_decisions_events.0100.upon_merchant_return$"
 mpo_decisions_events.0100.upon_merchant_return: "Quando [paiza_merchant.GetNameNoTooltip] retornar de sua viagem para [merchant_origin.GetName]:"
 mpo_decisions_events.0101.t: "O Estrangeiro Retorna"
 mpo_decisions_events.0101.desc: "[paiza_merchant.GetName] chegou e agora bebe [Glossary( 'kumis', 'KUMIS_GLOSS')] na minha iurta, após uma longa e árdua viagem até [merchant_origin.GetName].\n\nOs bens preciosos que solicitei estão sendo descarregados. O lobo das estepes e o cordeiro da cidade encontraram uma maneira de coexistir, ainda que apenas por um tempo."
 mpo_decisions_events.0101.a: "Maravilhoso!"
 mpo_decisions_events.0101.b: "Conte-me histórias de terras distantes"
 mpo_decisions_events.0101.b.desc: "[paiza_merchant.GetName] irá deleitar você com histórias sobre as terras por onde passou."
 mpo_decisions_events.2137.t: "As Viagens de [paiza_merchant.GetFirstNameNoTooltip]"
 mpo_decisions_events.2137.desc_intro: "[paiza_merchant.GetName] respira fundo, olha ao longe e começa a tecer uma história:\n #weak"
 mpo_decisions_events.2137.desc_interludium: "\n\n#![paiza_merchant.Custom('ES_ElLa')|U] o mercador toma fôlego e começa a divagar sobre outro reino:\n #weak"
 mpo_decisions_events.2137.a: "Entendo"
 mpo_decisions_events.2137.b: "Conte-me mais!"
 mpo_decisions_events.2137.c: "Fique em minha tenda."
 mpo_decisions_events.2138.t: "Rebanho por Ouro"
 mpo_decisions_events.2138.desc: "Você caminha até sua [GetDomicileBuilding('trade_yurt_01').GetName|l] com [paiza_merchant.GetName] para discutir os detalhes:\n\n“Posso comprar de você uma quantidade considerável do seu rebanho. Fiz contatos enquanto viajava até aqui. Não há comprador no atacado, mas, no caminho de volta, devo conseguir visitar o suficiente de pequenos criadores para obter lucro. Ou, pelo menos, não perder tanto.\n\nFaço esta oferta a você, por respeito a você e à sua majestade, meu [ROOT.Char.GetTitleAsNameNoTooltip|l]”."
 mpo_decisions_events.2138.desc_rate_1: "[GetDomicileBuilding('herd_trade_yurt_01').GetName] 6 [herd_i] por 1 [gold_i]"
 mpo_decisions_events.2138.desc_rate_2: "[GetDomicileBuilding('herd_trade_yurt_03').GetName] 4 [herd_i] por 1 [gold_i]"
 mpo_decisions_events.2138.desc_rate_3: "[GetDomicileBuilding('herd_trade_yurt_06').GetName] 2 [herd_i] por 1 [gold_i]"
 mpo_decisions_events.2138.a: "Fechado."
 mpo_decisions_events.2138.b: "Dê mais, ganhe mais."
 mpo_decisions_events.2138.c: "Vamos voltar."
 mpo_decisions_events.2138.c.desc: "Não realizarás a troca de [herd|lE] e voltarás a falar sobre o objetivo da viagem de [paiza_merchant.GetName]."
 mpo_decisions_events.2141.already_traded: "Você já trocou [herd|lE] por [gold|lE]"
 mpo_abuse_authority_paiza_decision: "Abusar da Autoridade do Gurcã"
 mpo_abuse_authority_paiza_decision_tooltip: "O [gurkhan|lE] fala por mim!"
 mpo_abuse_authority_paiza_decision_desc: "Carrego comigo o nome do Gurcã. As runas gravadas em minha paiza causam temor nos corações das pessoas. A terra ao meu redor é fértil, mas o povo que nela vive é fraco. Tomarei deles o que puder, não pela força bruta, mas em nome do Gurcã."
 mpo_abuse_authority_paiza_decision_confirm: "Em nome do [gurkhan|lE]!"
 mpo_abuse_authority_paiza_decision.paiza_patron_not_topdog: "O patrono da [paiza|lE] não é mais o [gurkhan|lE]"
 mpo_abuse_authority_paiza_decision.not_topdog_realm_or_steppe: "A autoridade do [gurkhan|lE] não é reconhecida aqui"
 mpo_abuse_authority_paiza_decision.no_more_paiza_abuse: "O [gurkhan|lE] reagiu aos seus atos"
 mpo_abuse_authority_paiza_decision.region_already_abused: "Estas terras já sofreram com o abuso da autoridade do [gurkhan|lE]"
 mpo_abuse_authority_paiza_decision.nothing_to_abuse: "Não há terras propícias para abusar nesta [location|lE]"
 mpo_decisions_events.0110.t: "Em Nome de [paiza_patron.GetTitleAsNameNoTooltip|l]"
 mpo_decisions_events.0110.desc: "Sou um[ROOT.Char.Custom('ES_XA')] súdit[ROOT.Char.Custom('ES_OA')] #EMP leal#! [paiza_patron.Custom('ES_DelDela')] [paiza_patron.GetTitledFirstName|l]. Carrego seu nome gravado no metal e sua vontade em minhas palavras e atos. Minha força é a dele.\n\n[local_boi.Custom('ES_ElLa')|U] fraco [local_boi.GetName] pode suplicar o quanto quiser, pois isso não mudará o decreto do grão-cã que sai da minha boca.\n\nToda a riqueza e todos os animais adequados destas terras devem ser reunidos imediatamente e trazidos a mim. Pois vossa fraqueza insulta a autoridade [paiza_patron.Custom('ES_DelDela')] [paiza_patron.GetTitleAsNameNoTooltip|l] e eu os darei um uso #EMP mejor#!."
 mpo_decisions_events.0110.a: "Reúnam tudo que se move!"
 mpo_decisions_events.0110.b: "\"Não digam uma palavra, cães!\""
 mpo_decisions_events.0110.c: "Mudei de ideia."
 mpo_decisions_events.0110.d: "Isso é #EMP errado.#! Vamos sair!"
 mpo_decisions_events.0110.b.success: "Sucesso"
 mpo_decisions_events.0110.b.success_desc: "Nem uma palavra do que aconteceu aqui chega a [paiza_patron.Custom('ES_AlAla')] [paiza_patron.GetTitledFirstName|l]"
 mpo_decisions_events.0110.b.failure: "[paiza_patron.Custom('ES_ElLa')|U] [paiza_patron.GetTitledFirstName|l] toma conhecimento desse abuso"
 custom.mpo_resources_gained_abuse: "Saque de [counties|lE] próximos"
 mpo_decisions_events.0111.t: "A Ira do Gurcã"
 mpo_decisions_events.0111.desc: "El gurkhan es como la misma estepa. El poder de [paiza_patron.GetName] se extiende por toda ella, su nombre se susurra en el viento.\n\nLlevo su nombre conmigo, grabado en el metal del paiza. Lo he usado para infundir miedo y obediencia en los corazones de las gentes. Parece que en exceso.\n\nAhora me toca a mí tener miedo. El gurkhan se ha enterado de mis acciones y las califica como un abuso de su palabra, de su nombre. Y por eso, me convertiré en un ejemplo atroz que pueda ver toda la estepa."
 mpo_decisions_events.0111.a: "Aceito o julgamento."
 mpo_decisions_events.0111.b: "\"Ah, mas meus atos foram justos, veja bem...\""
 mpo_decisions_events.0112.t: "$mpo_decisions_events.0111.t$"
 mpo_decisions_events.0112.desc: "Soy como la estepa misma. Mi poder y mi voluntad se extienden por toda ella. El viento susurra mi nombre.\n\nLos jinetes portan consigo mi nombre, grabado en el metal de sus paizas. Sin embargo, algunos de ellos lo retuercen como serpientes, escoria codiciosa como [paiza_abuser_1.GetName] y como [paiza_abuser.GetName], quien no hace mucho postrara ante mí su cuerpo de gusano y ahora abusa de mis leales súbditos, quienes acuden a mí en busca de respuestas, de justicia. ¡Que el viento lleve ahora mi verdadera voluntad!\n\n«Acaba de llegarme la noticia. Que sepan que [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitledFirstNameNoTooltip|l] dará un paso al frente contra cualquier perro castrado, ya sea [paiza_abuser.GetFirstNameNoTooltip], [paiza_abuser_1.GetFirstNameNoTooltip] o quien se tercie. ¡Mi nombre es mi nombre!»."
 mpo_decisions_events.0112.a: "Tragam-me suas cabeças!"
 mpo_decisions_events.0112.a.desc: "Outros [characters|lE] com suas [paiza|lE]s estar?o menos dispostos a abusar de sua autoridade se [paiza_abuser.GetFirstName] e [paiza_abuser_1.GetFirstName] estiverem mortos."
 mpo_decisions_events.0112.b: "Vou deixar passar... por enquanto."
 mpo_decisions_events.0112.c: "Nunca mais me incomodem com isso."
 mpo_decisions_events.0112.c.flavor: "Mais abusos de sua autoridade ocorrerão, mas você não será mais notificado."
 mpo_paiza_abuse_counter_effect.random: "Os atos do [gurkhan|lE] são tão aleatórios quanto só os humanos podem ser"
 mpo_paiza_abuse_counter_effect.angry: "@warning_icon! O [gurkhan|lE] está furioso com seu abuso de autoridade e quase certamente irá reagir"
 mpo_paiza_abuse_counter_effect.annoyed: "@alert_icon! O [gurkhan|lE] está irritado com seu abuso de autoridade e provavelmente irá reagir"
 mpo_paiza_abuse_counter_effect.indifferent: "O [gurkhan|lE] está indiferente ao seu abuso de autoridade e não tomará nenhuma ação desta vez"
 mpo_paiza_abuse_counter_effect.khan_reaction_action: "@alert_icon! O [gurkhan|El] reagirá de forma #EMP violenta#!"
 mpo_paiza_abuse_counter_effect.khan_reaction_angry: "O [gurkhan|lE] ficará #EMP furioso#!, mas não tomará nenhuma ação"
 mpo_paiza_abuse_counter_effect.khan_reaction_annoyed: "O [gurkhan|lE] ficará #EMP irritado#!, mas não tomará nenhuma ação"
 mpo_decisions_events.0111.a.effects: "[paiza_patron.GetName] recebe um [imprisonment_reason|lE] e um [execute_reason|lE] contra você."
