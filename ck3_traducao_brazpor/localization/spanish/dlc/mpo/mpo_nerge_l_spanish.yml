 ### Events ###
 mpo_nerge.0010.t: "A Grande Caçada Começa"
 mpo_nerge.0010.desc.intro: "Cavaleiros estão alinhados atrás de mim, em uma coluna que se estende à esquerda e à direita. Todos aguardam o sinal para começar, para que [ROOT.Char.GetTitleAsNameNoTooltip|l] inicie a grande caçada.\n\n"
 mpo_nerge.0010.desc.intro.master_of_hunt: "Os cavaleiros estão alinhados atrás de mim, em uma fila que se estende para a esquerda e para a direita. \"Meu [ROOT.Char.GetTitleAsNameNoTooltip|l], aguardam o sinal para começar\", me diz [master_of_hunt.GetFirstName] inclinando-se um pouco mais para perto de mim. \"Os preparativos estão prontos\".\n\n"
 mpo_nerge.0010.desc.outro: "Eu encaixo uma flecha, levanto o arco e solto a flecha. Com um grito de dor, vejo uma cabra gorda cair, contorcendo-se no chão. Seguem-se balidos em pânico enquanto o caos se espalha entre os animais, seguidos pelos batimentos rítmicos das patas dos cavalos enquanto os cavaleiros partem em busca da caça."
 mpo_nerge.0010.desc.outro.alt.moh: "Faço um aceno com a cabeça para ela, e ele ergue o arco já encordoado. Ele canta quando solta a flecha, seguido de um grito de animal. A caça está em andamento."
 mpo_nerge.0010.desc.outro.alt: "Faço um aceno com a cabeça para um dos meus cavaleiros, e ele ergue o arco encordoado. Ele soa enquanto solta a flecha, seguido de um grito de animal. A caça começou."
 mpo_nerge.0010.a: "Mostre-me a força de [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip]!"
 mpo_nerge.0015.t: "$mpo_nerge.0010.t$"
 mpo_nerge.0015.desc: "Depois de uma longa espera, finalmente estamos todos alinhados e, depois de idas e vindas, [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] ergue seu arco para matar o primeiro animal. Um grito de dor é seguido por balidos de pânico enquanto os animais enlouquecem.\n\nAssim que ouvimos o grito, vários cavaleiros partem imediatamente. Todos estão tentando provar a si mesmos, aos outros e a [host.Custom('ES_AlAla')] [host.GetTitleAsNameNoTooltip|l]."
 mpo_nerge.0015.a: "E mesmo assim, eu serei o melhor caçador aqui!"
 mpo_nerge.0110.t: "Caçada Fracassada"
 mpo_nerge.0110.desc: "Apesar de nossas melhores tentativas, a caça foi uma visão deprimente. Alguns animais caíram, mas não quase tantos quanto planejamos ou esperávamos.\n\nMeus companheiros cavaleiros olham para mim com olhos desanimados, a vergonha tão pesada neles quanto em mim. Como podemos mostrar nossos rostos em [ROOT.Char.GetCapitalLocation.GetName] depois disso?"
 mpo_nerge.0110.a: "Que vergonha..."
 mpo_nerge.0115.t: "Caçada Bem-Sucedida"
 mpo_nerge.0115.desc: "Finalmente, ao terminar a Caçada, olhamos para todos os animais mortos que conseguimos caçar. É uma cena e tanto, enquanto começamos a separar e a cortar os animais antes que estraguem.\n\nHá um bom clima enquanto fazemos o nosso trabalho, todos satisfeitos com os resultados da caça em si."
 mpo_nerge.0115.a: "A carne nos sustentará durante a temporada."
 mpo_nerge.0120.t: "Caçada Decente"
 mpo_nerge.0120.desc: "Foi uma caça bastante bem-sucedida, com dezenas e mais dezenas de animais agora mortos aos nossos pés. Felizmente, há pessoas suficientes para processá-los, então podemos cortá-los e levar toda a carne excedente para casa.\n\nO cheiro de sangue e suor paira no ar, e ainda assim, todos estão felizes compartilhando suas melhores histórias da caçada uns com os outros."
 mpo_nerge.0120.a: "Esta carne nos sustentará por várias temporadas."
 mpo_nerge.0125.t: "Grande Caçada"
 mpo_nerge.0125.desc: "Nossa caça foi um grande sucesso, e eu lentamente caminho pelas pequenas colinas de animais abatidos. É uma visão impressionante, sem dúvida, e todos estão ocupados cortando as carnes das bestas.\n\nOuço vários caçadores se gabando de suas caçadas, cada um contando uma história mais exagerada que a outra. Com certeza haverá carne suficiente para nos sustentar em muitos banquetes que virão."
 mpo_nerge.0125.a: "Que conquista!"
 mpo_nerge.0130.t: "Caçada Excelente"
 mpo_nerge.0130.desc: "Um mar de carne e sangue mancham o solo, e o cheiro de sangue paira denso no ar. Apesar disso, só se encontra alegria entre todos os caçadores, que estão felizes enquanto se movem entre os animais abatidos.\n\nOs acompanhantes e os outros membros da caça estão todos ocupados cortando os animais, mas eu não consigo me afastar da cena. Como vamos levar toda essa carne para casa?"
 mpo_nerge.0130.a: "Nosso povo se lembrará desta Caçada."
 mpo_nerge.1000.t: "O sinal de [ROOT.Char.Custom('EagleStoryName')]"
 mpo_nerge.1000.desc: "Minha águia, [ROOT.Char.Custom('EagleStoryName')], sobrevoou nosso grupo de caça, farejando presas. Ela volta a pousar no meu braço, trazendo o couro de [ROOT.Char.Custom('GetAnimalArticle')] [ROOT.Char.Custom('GetAnimalType')].\n\nA oferta da águia poderia guiar nossa caçada ou ser apenas um achado de sorte."
 mpo_nerge.1000.a: "[ROOT.Char.Custom('EagleStoryName')], nos guie até os [activity.Custom('GetAnimalPlural')]!"
 mpo_nerge.1000.a.tt.success: "A descoberta de [ROOT.Char.Custom('EagleStoryName')] nos leva a mais [activity.Custom('GetAnimalPlural')]"
 mpo_nerge.1000.a.tt.failure: "Não há [activity.Custom('GetAnimalPlural')] para serem encontrados"
 mpo_nerge.1000.b: "Meus melhores cavaleiros podem procurar por esse [ROOT.Char.Custom('GetAnimalType')]..."
 mpo_nerge.1000.b.tt.success: "Os cavaleiros encontram alguns [activity.Custom('GetAnimalPlural')]"
 mpo_nerge.1000.c: "Uma boa captura, mas há coisas melhores para serem encontradas."
 mpo_nerge.1005.t: "Uma Voz de Dúvida"
 mpo_nerge.1005.desc: "Centenas de feras selvagens foram abatidas, seus cadáveres e sangue manchando o chão. Mas, apesar desse sucesso iminente, alguns não estão satisfeitos com nossos despojos.\n\n\"Achei que viemos para testemunhar o poder\", diz [dissenter.GetFirstName], elevando a voz acima do tumulto da caçada. \"Devemos fazer mais. Se eu tivesse disparado a primeira flecha, teríamos carne suficiente para durar uma dúzia de invernos!\".\n\n[dissenter.GetFirstNameNoTooltip] me olha com olhos ardendo em uma luz feroz. \"Você não concorda, [ROOT.Char.GetTitleAsNameNoTooltip|l]?\""
 mpo_nerge.1005.a: "Muito bem, eu vou te mostrar o poder."
 mpo_nerge.1005.a.tt: "Você lidera um pequeno grupo de cavaleiros para caçar mais [activity.Custom('GetAnimalPlural')]"
 mpo_nerge.1005.a.tt.success: "Seu plano foi bem-sucedido"
 mpo_nerge.1005.a.tt.failure: "Seus cavaleiros falham em capturar qualquer presa"
 mpo_nerge.1005.b: "Prove seu valor, [dissenter.GetFirstNameNoTooltip]!"
 mpo_nerge.1005.b.tt: "[dissenter.GetFirstNameNoTooltip] lidera um pequeno grupo de cavaleiros"
 mpo_nerge.1005.c: "Meu objetivo não é te impressionar."
 mpo_nerge.1005.b.tt.success: "[dissenter.GetFirstNameNoTooltip] consegue capturar alguns [activity.Custom('GetAnimalPlural')]"
 mpo_nerge.1005.b.tt.failure: "[dissenter.GetFirstNameNoTooltip] se envergonha"
 mpo_nerge.1010.t: "Quebrando o Círculo"
 mpo_nerge.1010.desc: "Com cada caçador em sua posição adequada, nossos cavaleiros se aproximam de uma manada de [activity.Custom('GetAnimalPlural')]. Alguns trotam ligeiramente à frente de nossa formação, farejando as feras, enquanto outros estão prontos para atacar.\n\nImprudentemente, [chaser.GetFirstName] dispara à frente a galope, fazendo com que os exemplares de [activity.Custom('GetAnimalPlural')]. Sua tentativa de reuní-los é em vão, e as feras tentam escapar do nosso alcance."
 mpo_nerge.1010.a: "Deixe[chaser.Custom('ES_LoLa')] para os [activity.Custom('GetAnimalPlural')]!"
 mpo_nerge.1010.a.tt.death: "[chaser.GetFirstNameNoTooltip] é atropelado pelas [activity.Custom('GetAnimalPlural')]"
 mpo_nerge.1010.a.tt.injury: "[chaser.GetFirstNameNoTooltip] é ferido pelas [activity.Custom('GetAnimalPlural')]"
 mpo_nerge.1010.b: "Reagrupem-se e recolham o que pudermos dos restos."
 mpo_nerge.1010.b.tt.success: "Você consegue pegar várias [activity.Custom('GetAnimalPlural')] que estavam escapando"
 mpo_nerge.1010.b.tt.failure: "Somente algumas [activity.Custom('GetAnimalPlural')] ficaram para trás"
 mpo_nerge.1010.c: "Ainda é um[chaser.Custom('ES_OA')] dos nossos. Errar é humano."
 mpo_nerge.1010.c_obedience: "Enquanto se curvar diante de mim, será perdoado."
 mpo_nerge.1015.t: "Estampida das Estepes"
 mpo_nerge.1015.desc: "\"[GetPlayer.GetTitleAsNameNoTooltip|U]! As [activity.Custom('GetAnimalPlural')] quebraram o cerco!\" [hunter_1.GetFirstName] grita, com [hunter_2.GetFirstName] seguindo logo atrás.\n\nSobre o horizonte, dezenas de [activity.Custom('GetAnimalPlural')] correm em direção aos cavaleiros e ao acampamento. É claro que a caça deu errado, mas a retirada não é uma opção."
 mpo_nerge.1015.a: "Essa é a nossa chance, matem todas elas!"
 mpo_nerge.1015.a.tt.success: "As [activity.Custom('GetAnimalPlural')] são atropeladas"
 mpo_nerge.1015.a.tt.failure: "As bestas ferem vários cavaleiros"
 mpo_nerge.1015.b: "Deixe-as passar, mas abate os que ficam para trás."
 mpo_nerge.1015.c: "É natural que fugam, deixem-nas voltar para a natureza."
 mpo_nerge.1015.d: "[hunter_1.GetFirstNameNoTooltip] e [hunter_2.GetFirstNameNoTooltip] pagarão pelas perdas."
 mpo_nerge.1020.t: "Presas Dispersas"
 mpo_nerge.1020.desc: "\"Embora demonstre amplamente o nosso progresso, preocupa-me que deixemos vivos poucos exemplares de [activity.Custom('GetAnimalPlural')]\", explica [master_of_hunt.GetFirstName]. \"Não desejo deixar a terra desolada\".\n\nConseguimos matar bestas suficientes para nos alimentar por muitas luas, mas, à medida que o número de [activity.Custom('GetAnimalPlural')], a caça se torna tediosa. [master_of_hunt.GetFirstNameNoTooltip] ordenou aos cavaleiros que busquem mais enclaves, mas a quantidade de [activity.Custom('GetAnimalPlural')] está cada vez mais escassa."
 mpo_nerge.1020.a: "Pegue o que precisamos e deixe o resto ir."
 mpo_nerge.1020.a.tt: "Algumas [activity.Custom('GetAnimalPlural')] são deixadas para repovoar"
 mpo_nerge.1020.b: "Ceder é fraqueza. Devemos caçar!"
 mpo_nerge.1020.c: "Observe essas [activity.Custom('GetAnimalPlural')] — vamos encontrar as mais fracas."
 mpo_nerge.1020.c.tt: "Você tenta abater apenas as [activity.Custom('GetAnimalPlural')] menos viáveis"
 mpo_nerge.1020.c.tt.success: "As [activity.Custom('GetAnimalPlural')] permanecem ilesas"
 mpo_nerge.1020.c.tt.failure: "Quase nenhuma [activity.Custom('GetAnimalPlural')] restou"
 mpo_nerge_overhunting_modifier: "Caça Excessiva"
 mpo_nerge_overhunting_modifier_desc: "Este condado foi excessivamente caçado, e será mais difícil sustentar a vida aqui."
 mpo_nerge.1025.t: "O Maior Caçador"
 mpo_nerge.1025.desc: "Dezenas de [activity.Custom('GetAnimalPlural')] foram abatidos até agora, e o maior deles caiu por uma flecha desconhecida. Antes que alguém possa examinar a besta, [hunter_1.GetFirstName] avança ao trote para reivindicar a glória da caça. Em seguida vem [hunter_2.GetFirstName], e os dois começam a discutir sobre quem merece a honra.\n\n“Está claro como o dia que minha flecha atingiu a besta!”, exclama [hunter_1.GetFirstName]. “Você estava atrás demais para sequer tê-la acertado!””, zomba [hunter_2.GetFirstName].\n\nA tensão entre os dois cresce, e a discussão deles desvia a atenção da tarefa em mãos..."
 mpo_nerge.1025.a: "A glória não importa, todos compartilharemos os despojos."
 mpo_nerge.1025.a.flavor: "Que entrada perfeita para um banquete!"
 mpo_nerge.1025.a.tt: "Si #bold no#! celebras un [GetActivityType('activity_feast').GetName|l] antes de que trascurra un año, perderás [prestige|lE] y [opinion|lE]"
 mpo_nerge.1025.b: "Isso é mais fácil de decidir com um teste de força."
 mpo_nerge.1025.b.tt: "Os caçadores resolvem sua disputa com uma luta"
 mpo_nerge.1025.b.tt.hunter_1: "[hunter_1.GetFirstNameNoTooltip] vence a luta"
 mpo_nerge.1025.b.tt.hunter_2: "[hunter_2.GetFirstNameNoTooltip] vence a luta"
 mpo_nerge.1025.c: "Idiotas! Foi minha flecha que atingiu a besta!"
 mpo_nerge.1025.c.tt: "Você tenta reivindicar a caça para si mesmo"
 mpo_nerge.1025.c.tt.success: "Os outros caçadores se alinham com você"
 mpo_nerge.1025.c.tt.failure: "Ninguém acredita na sua alegação"
 mpo_nerge.1025.d: "Eu vi, [intent_target.GetFirstNameNoTooltip] atingiu a besta!"
 mpo_nerge_feast_discount: "Carne Preparada"
 mpo_nerge_feast_discount_desc: "Este personagem preparou carne de uma Nerge recente e pode organizar um banquete por menos.\n[GetActivityType('activity_feast').GetName] [GetActivityType('activity_feast').GetTextIcon]  Custo: -#P 50 %#!"
 mpo_nerge_promised_feast_fail: "Promessas Quebradas"
 mpo_nerge_promised_feast_fail_desc: "Este personagem fez uma promessa a alguém e falhou em cumpri-la."
 mpo_nerge.1026.t: "Promessas Quebradas"
 mpo_nerge.1026.desc: "Eu havia prometido aos caçadores um banquete com os despojos do nosso Nerge, mas, no final, a carne foi desperdiçada.\n\nÉ melhor não fazer promessas do que quebrá-las, e os caçadores não estão satisfeitos com a minha falha em cumprir."
 mpo_nerge.1026.a: "…"
 mpo_nerge.1030.t: "Uma Visão Rara"
 mpo_nerge.1030.desc: "A certa distância do grupo principal de caça, [master_of_hunt.GetFirstName] me diz que avistaram um belo exemplar [ROOT.Char.Custom('GetRegionalDeerType')] de cor branca. \"Não se parece com nada que eu tenha visto jamais\", afirma, com os olhos arregalados. \"Mas não estava sozinho. Havia outros animais menores com ele, todos tão brancos quanto a neve\".\n\nJá cacei lobos, cervos e gatos selvagens, mas matar uma criatura assim poderia me render grande renome."
 mpo_nerge.1030.a: "Será minha!"
 mpo_nerge.1030.a.tt.success: "O [ROOT.Char.Custom('GetRegionalDeerType')] cai pela sua flecha"
 mpo_nerge.1030.a.tt.failure: "O [ROOT.Char.Custom('GetRegionalDeerType')] escapa"
 mpo_nerge.1030.b: "Devemos rastrear o [ROOT.Char.Custom('GetRegionalDeerType')], mas não machucá-lo."
 mpo_nerge.1030.b.tt.success: "Você ganha insights sobre o [ROOT.Char.Custom('GetRegionalDeerType')]"
 mpo_nerge.1030.b.tt.failure: "O [ROOT.Char.Custom('GetRegionalDeerType')] escapa, mas permanece ileso"
 mpo_nerge.1030.b.tt.effect: "[county.GetName] ganhará um [GetModifier('hunt_sighting_legendary_modifier').GetNameWithTooltip|l] dentro de 2 anos"
 mpo_nerge.1030.c: "Estamos aqui para caçar, não para fazer turismo."
 mpo_nerge.1030.d: "Por que você está tentando me prender?"
 mpo_nerge.1031.t: "A Conservação compensa"
 mpo_nerge.1035.t: "Táticas da Caçada"
 mpo_nerge.1035.desc: "A agitação da caçada já passou, e muitos caçadores retornam ao acampamento para discutir seus planos, enquanto o restante observa os exemplares de [activity.Custom('GetAnimalPlural')] ao longe.\n\n\"Temos de ser brutais! Impiedosos, como somos com nossos inimigos!\", exclama [hunter_1.GetFirstName]. [hunter_2.GetFirstName] acena em concordância e acrescenta: \"Mas não haverá força no número se não trabalharmos juntos\". Antes que outra discussão comece, [hunter_3.GetFirstName] intervém para oferecer seu próprio conselho. \"Podemos nos ater à tradição\", afirma [hunter_3.GetFirstNameNoTooltip]. \"Mas com paciência. Observem os animais, aproximem-se deles lentamente e ataquem quando menos esperarem\".\n\nNo meio de suas conversas, eles se voltam para mim, aguardando minha opinião."
 mpo_nerge.1035.a: "Ataque rápido e forte!"
 mpo_nerge.1035.a.tt: "Esse método é #bold perigoso#!, mas trará melhores resultados."
 mpo_nerge.1035.b: "Dividam-se em grupos e coordenem."
 mpo_nerge.1035.b.tt: "Este método #bold dará menos frutos#!, mas melhorará a opinião que outros caçadores têm de você, ou até mesmo os tornará [Concept('obedient', 'obedientes')|E]."
 mpo_nerge.1035.c: "Uma emboscada é o melhor."
 mpo_nerge.1035.c.tt: "Esse método é relativamente #bold seguro#!, mas não trará muitos resultados."
 mpo_nerge.1035.d: "Deixe que nossas flechas decidam o resultado."
 mpo_nerge.1035.tt.success: "O plano foi bem-sucedido"
 mpo_nerge.1035.tt.failure: "O plano falhou"
 mpo_nerge_investigation: "Observação de Animais"
 mpo_nerge_investigation_desc: "Este personagem observou animais durante uma caçada e usa esse conhecimento para gerenciar seu rebanho."
 mpo_nerge.1040.t: "Esquecido"
 mpo_nerge.1040.desc: "\"Espere!\", [hunter.Custom('ES_ElLa')] [hunter.GetTitledFirstName|l] desmonta repentinamente da montaria e se ajoelha no chão. \"Achei que tinha visto... aqui!\".\n\n\"Deve ter pertencido a caçadores menos afortunados\", comenta com sarcasmo, apresentando um arco manchado de sangue, com a madeira lascada."
 mpo_nerge.1040.a: "\"Dê-o ao seu[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]\"."
 mpo_nerge.1040.b: "\"Se está nas minhas terras, pertence a mim.\""
 mpo_nerge.1040.c: "\"Você pode ficar com ele.\""
 mpo_nerge.1040.c.tt: "[hunter.GetShortUIName] fica com o [newly_created_artifact.GetName]"
 mpo_nerge.1040.d: "\"Volte para o seu cavalo!\""
 mpo_nerge.1050.t: "Uma Demonstração de Força"
 mpo_nerge.1050.desc: "\"Um espécime solitário de [ROOT.Char.Custom('GetAnimalTypeMismanaged')]\", anuncia [hunter.Custom('ES_ElLa')] [hunter.GetTitledFirstName|l] com voz baixa. \"Uma flecha certeira no coração e ele será nosso, [ROOT.Char.GetTitleAsNameNoTooltip|l]\".\n\n[hunter_2.Custom('ES_ElLa')|U] [hunter_2.GetTitledFirstName|l] acena com a cabeça e saca o arco, aguardando minhas instruções."
 mpo_nerge.1050.a: "[hunter.GetFirstNameNoTooltip], [hunter.Custom('SisterBrother')] meu[hunter.Custom('ES_OA')], nos movemos como um só!"
 mpo_nerge.1050.a.tt.success: "O animal cai aos seus pés"
 mpo_nerge.1050.a.tt.failure: "O animal escapa"
 mpo_nerge.1050.b: "\"Deixe comigo.\""
 mpo_nerge.1050.b.tt.success: "Você mata o animal"
 mpo_nerge.1050.b.tt.failure: "Você é humilhado"
 mpo_nerge.1050.c: "\"Acerte bem.\""
 mpo_nerge.1050.c.tt.success: "O animal morre"
 mpo_nerge.1050.c.tt.failure: "O animal desvia das flechas"
 mpo_nerge.1050.d: "\"Não deixe que isso seja uma distração!\""
 mpo_nerge.1060.t: "Uma Distração Deliciosa"
 mpo_nerge.1060.desc: "«Olhem!», [hunter.Custom('ES_ElLa')] [hunter.GetTitledFirstName|l] aponta para um grupo de [ROOT.Char.Custom('RegionalEdibleAnimalPlural')] selvagens, escondidos em um caminho à esquerda. «Vamos caçá-los! Meu ventre ronca de antecipação!»."
 mpo_nerge.1060.a: "\"Nunca vi uma armadilha mais óbvia.\""
 mpo_nerge.1060.b: "\"Uma chance de mostrar minha destreza!\""
 mpo_nerge.1060.b.tt.success: "Os animais perecem pelas suas mãos"
 mpo_nerge.1060.b.tt.failure: "Você se envergonha"
 mpo_nerge.1060.c: "\"Pegue o máximo que puder!\""
 mpo_nerge.1060.c.tt.success: "Você caça um número impressionante"
 mpo_nerge.1060.c.tt.failure: "Você mal pega algo"
 mpo_nerge.1060.c.tt_feast: "Seu próximo [GetActivityType('activity_feast').GetName|l] será #high gratuito#!"
 mpo_nerge.1060.d: "\"Não adianta seguir um bando perdido.\""
 nerge_evaded_trap_modifier: "Armadilha Evadida"
 nerge_evaded_trap_modifier_desc: "Este personagem acredita que identificou corretamente uma armadilha durante um nerge."
 mpo_nerge_1060_free_feast_desc: "Evento de Nerge"
