 mpo_interactions_events.0006.t: "Sangue do Meu Sangue"
 mpo_interactions_events.0006.desc_intro: "[blood_bro.GetFirstName] se corta a palma da mão e diz: \"Quando"
 mpo_interactions_events.0006.desc_anda: "nos tornamos [Glossary( 'anda', 'ANDA_GLOSS' )],"
 mpo_interactions_events.0006.desc_no_anda: "dizemos essas palavras"
 mpo_interactions_events.0006.desc: "nossas vidas se tornam uma. [ROOT.Char.Custom('SisterBrother')|U], juro amar você para sempre e protegê-lo bem\".\n\nEu faço o mesmo juramento, inflijo a mesma ferida em mim e uno meu sangue ao de meu nov[blood_bro.Custom('ES_OA')] [blood_bro.Custom('SisterBrother')].\n\nCom nosso pacto selado, trocamos bons presentes e compartilhamos uma única pele para passar a noite. Sonhamos com"
 mpo_interactions_events.0006.desc_shared_foe: "a desgraça de nossos inimigos, com dor e perdição para [shared_foe.Custom('ES_ElLa')] [shared_foe.GetTitledFirstName|l]!"
 mpo_interactions_events.0006.desc_memories: "dias brilhantes do passado."
 mpo_interactions_events.0006.desc_war_allies: "batalhas vencidas, e nossos cornos de guerra clamando."
 mpo_interactions_events.0006.desc_outro: "as batalhas que virão."
 ANDA_GLOSS: "O termo mongólico para irmão de sangue. Os mais notáveis a ostentar o status de #G anda#! foram Gengis Cã e Jamukha: com uma troca de ossos de nós, eles juraram seu juramento ainda crianças, e depois renovaram o vínculo como jovens adultos."
 mpo_interactions_events.0006.a: "Vemos nossos inimigos sofrerem."
 mpo_interactions_events.0006.a.flavor: "E nosso inimig[shared_foe.Custom('ES_OA')] comum, [shared_foe.Custom('ES_ElLa')] [shared_foe.GetTitledFirstNameNoTooltip|l], #EMP sufrirá el que más!#!"
 mpo_interactions_events.0006.b: "Todos sabem da alta posição de m [blood_bro.Custom('SisterBrother')]..."
 mpo_interactions_events.0006.c: "M [blood_bro.Custom('SisterBrother')], temível como um lobo!"
 mpo_interactions_events.0006.d: "Sempre, ouvirei a sabedoria de m [blood_bro.Custom('SisterBrother')]."
 mpo_interactions_events.0006.e: "Confio no coração nobre de meu [blood_bro.Custom('SisterBrother')]."
 mpo_interactions_events.0006.f: "Meu [blood_bro.Custom('SisterBrother')]. Sangue do meu sangue."
