 guardian_influenced_commander_fail: "Falha ao Ensinar Traço de Comandante"
 guardian_influenced_commander_fail_desc: "[actor.GetShortUINameNoTooltip] tentou incutir o traço [target_trait.GetName(actor)|l] em seu [recipient.Custom('GetDaughterSon')] , [recipient.GetShortUINameNoTooltip] mas fracassou."
 mpo_interactions_events.0101.t: "$influence_child_commander_interaction$: [target_trait.GetNameNoTooltip(GetPlayer)] — Sucesso"
 mpo_interactions_events.0101.desc_intro: "[recipient.GetName] parece entediado após olhar durante horas as táticas militares nos mapas. Levanto-me, jogo-lhe uma espada de treinamento e grito:\n\n\"Vamos sair. O primeiro golpe direto no corpo vence!\".\n\n"
 mpo_interactions_events.0101.logistician: "Puxo a espada de treino, pronto para lutar. [recipient.GetFirstNameNoTooltip] pega a sua e imediatamente entra no clima. Golpes ferozes, mas precisos. Lutamos por um bom tempo, mas sem um vencedor claro, o cansaço vence ambos.\n\n\"Vamos descansar, podemos continuar amanhã.\""
 mpo_interactions_events.0101.desc_logistician: "$mpo_interactions_events.0101.logistician$ Inicio um descanso, mas [recipient.GetFirstNameNoTooltip] se irrita e enfia a mão no saco.\n\n\"Não, podemos continuar!\", exclama e me entrega um pedaço de [recipient.Custom('GetLocalStreetFood')]."
 mpo_interactions_events.0101.military_engineer: "Trocamos golpes de forma equilibrada, mas nenhum deles atinge o alvo. Por fim, [recipient.GetFirstNameNoTooltip] abre uma distância maior entre nós e cai no chão.\n\n\"Você se machucou[recipient.Custom('ES_OA')]?\", começo a me preocupar"
 mpo_interactions_events.0101.desc_military_engineer: "$mpo_interactions_events.0101.military_engineer$, mas então uma pedra sai disparada em direção à minha cabeça.\n\n\"Quase te pego!\", grita enquanto recarrega uma funda pequena."
 mpo_interactions_events.0101.aggressive_attacker: "Imediatamente, corro em direção a [recipient.GetSheHe] e, implacavelmente, derrubo a espada dele com um golpe.\n\n\"Lembrem-se de que, durante uma batalha, é você ou eles. Usem toda a força que tiverem e mais!\"."
 mpo_interactions_events.0101.desc_aggressive_attacker: "$mpo_interactions_events.0101.aggressive_attacker$\n\nAntes que eu termine a frase, [recipient.GetFirstNameNoTooltip] pula sobre mim. Seu golpe pesado faz estilhaços voarem e quebra minha espada. Sem nada para me defender, preciso me render."
 mpo_interactions_events.0101.desc_unyielding_defender: "$mpo_interactions_events.0101.aggressive_attacker$\n\n[recipient.GetFirstNameNoTooltip] não vacila. Cada golpe é rebatido ou bloqueado, não consigo alcançar[recipient.GetHerHim]'"
 mpo_interactions_events.0101.forder: "Descemos até o rio para começar a luta. Depois de alguns golpes, sou empurrado[ROOT.Char.Custom('ES_OA')] na água. Pulo sobre alguns montículos de grama em busca de um terreno firme."
 mpo_interactions_events.0101.desc_forder: "$mpo_interactions_events.0101.forder$\n\nVocê é lento demais, velh[ROOT.Char.Custom('ES_OA')][ROOT.Char.Custom('ES_OA')]! [recipient.GetFirstNameNoTooltip] aparece à minha frente e me derruba na água."
 mpo_interactions_events.0101.flexible_leader: "\"Trabalha a posição dos pés, mantém a postura, procura aberturas e não se distraia!\", eu me lanço à frente esperando que meus devaneios tenham confundido [recipient.GetHerHim]."
 mpo_interactions_events.0101.desc_flexible_leader: "$mpo_interactions_events.0101.flexible_leader$ No entanto, [recipient.GetFirstNameNoTooltip] desvia e contra-ataca, encerrando o duelo antes mesmo de começar."
 mpo_interactions_events.0101.desert_warrior: "Circulamos um ao outro, esperando uma abertura. Quando vejo uma, ataco imediatamente. [recipient.GetFirstNameNoTooltip] espera até o último instante para lançar um punhado de"
 mpo_interactions_events.0101.desc_desert_warrior: "$mpo_interactions_events.0101.desert_warrior$ areia no meu rosto, me cegando. Erro o golpe e deixo uma grande abertura para [recipient.GetSheHe] vencer o duelo."
 mpo_interactions_events.0101.jungle_stalker: "[recipient.GetFirstNameNoTooltip] corre primeiro, se esconde na selva. Tento encontrar[recipient.GetHerHim] mas, quanto mais me adentro na floresta, mais escura e densa ela fica."
 mpo_interactions_events.0101.desc_jungle_stalker: "$mpo_interactions_events.0101.jungle_stalker$\n\n\"Te peguei!\" — [recipient.GetFirstNameNoTooltip] salta de uma árvore sobre mim, me pegando de surpresa e vencendo o duelo."
 mpo_interactions_events.0101.reaver: "Como aquecimento, trocamos alguns golpes rápidos."
 mpo_interactions_events.0101.desc_reaver: "$mpo_interactions_events.0101.reaver$ [recipient.GetFirstNameNoTooltip] me puxa para um clinch. Lutamos até que recua de repente.\n\n“Isso não é seu?” Ele sorri enquanto experimenta #EMP mi#! anel."
 mpo_interactions_events.0101.reckless: "[recipient.GetFirstNameNoTooltip] rola os dados. [recipient.GetSheHe|U] sacode o copo com força, esperando um bom resultado."
 mpo_interactions_events.0101.desc_reckless: "$mpo_interactions_events.0101.reckless$ Tento me afastar, mas subestimo sua velocidade. [recipient.GetFirstNameNoTooltip] se choca de cabeça comigo."
 mpo_interactions_events.0101.holy_warrior: "Antes da luta começar, faço uma prece:\n\n\"Ó querido [ROOT.Char.GetFaith.WarGodName]! Guia minhas mãos, para que meus golpes sejam rápidos e ferozes.\""
 mpo_interactions_events.0101.desc_holy_warrior: "$mpo_interactions_events.0101.holy_warrior$\n\n\"Dai-me força para ter misericórdia dos meus inimigos!\" — [recipient.GetFirstNameNoTooltip] termina e assume uma postura imaculada."
 mpo_interactions_events.0101.terrain_expert: "Entramos em uma fenda próxima. A luta se arrasta por um tempo, já que não conseguimos nos alcançar entre os galhos. Eventualmente,"
 mpo_interactions_events.0101.desc_open_terrain_expert: "$mpo_interactions_events.0101.terrain_expert$\n\n[recipient.GetFirstNameNoTooltip] vislumbra uma clareira atrás de mim.\n\n\"Agora te peguei!\", exclama e me empurra para a área aberta. Com o terreno aberto, seus movimentos são rápidos e imprevisíveis demais. Consegue me acertar um golpe com facilidade."
 mpo_interactions_events.0101.rough_terrain_expert: "$mpo_interactions_events.0101.terrain_expert$"
 mpo_interactions_events.0101.desc_rough_terrain_expert: "$mpo_interactions_events.0101.rough_terrain_expert$\n\n[recipient.GetFirstNameNoTooltip] avista um trecho de terreno irregular atrás de mim.\n\n\"Agora eu te peguei!\", exclama e me empurra para as pedras. Nas colinas rochosas, os movimentos dele(a) são rápidos demais e imprevisíveis. Ele(a) acerta um golpe em mim com facilidade."
 mpo_interactions_events.0101.forest_fighter: "$mpo_interactions_events.0101.terrain_expert$ [recipient.GetFirstNameNoTooltip] sobe em uma árvore.\n\n\"Pegue isso!\", ele quebra um galho e o arremessa em mim. Eu desvio, mas já é tarde. Sinto sua espada me atingir na perna."
 mpo_interactions_events.0101.desc_forest_fighter: "$mpo_interactions_events.0101.forest_fighter$"
 mpo_interactions_events.0101.desc_cautious_leader: "Tento alguns golpes, avanços e estocadas. [recipient.GetFirstNameNoTooltip] não abre brechas. Eu piso forte e grito, tentando intimidar[recipient.GetHerHim], mas não cede.\n\n“Basta!”, perco a calma e avanço sobre [recipient.GetSheHe], mas este era o momento que ele estava esperando! Ao notar a abertura, ele me acerta, vencendo o duelo."
 mpo_interactions_events.0101.organizer: "Pegamos as espadas de treino e começamos a luta. Por horas."
 mpo_interactions_events.0101.desc_organizer: "$mpo_interactions_events.0101.organizer$ Começo a me cansar, mas seus movimentos continuam rápidos e precisos. Já não consigo acompanhar o ritmo. Com meu último fôlego, tento uma estocada, mas [recipient.GetFirstNameNoTooltip] a esquiva facilmente e contra-ataca como se tivéssemos acabado de começar o treinamento. Eu me rendo."
 mpo_interactions_events.0101.winter_soldier: "$mpo_interactions_events.0101.desert_warrior$"
 mpo_interactions_events.0101.desc_winter_soldier: "$mpo_interactions_events.0101.winter_soldier$ neve no meu rosto. Distrair-se me deixa uma grande abertura para [recipient.GetSheHe] acertar e vencer o duelo."
 mpo_interactions_events.0101.a: "\"Um dia você será um[recipient.Custom('ES_XA')] grande comandante!\"."
 mpo_interactions_events.0101.a.flavor: "[recipient.GetFirstNameNoTooltip] parece já entender o espírito do [target_trait.GetNameNoTooltip(GetPlayer)|l]."
 mpo_interactions_events.0102.t: "$influence_child_commander_interaction$: [target_trait.GetNameNoTooltip(GetPlayer)] — Falha"
 mpo_interactions_events.0102.desc_intro: "$mpo_interactions_events.0101.desc_intro$"
 mpo_interactions_events.0102.desc_logistician: "$mpo_interactions_events.0101.logistician$ [recipient.GetFirstNameNoTooltip] inicia uma pausa, mas eu enfio a mão no meu saco e lhe entrego uma porção de [recipient.Custom('GetLocalStreetFood')].\n\n\"Não, podemos continuar!\"."
 mpo_interactions_events.0102.desc_military_engineer: "$mpo_interactions_events.0101.military_engineer$ quando ouço um leve gemido.\n\n\"Eu queria te acertar com o estilingue, m-mas…\", [recipient.GetFirstNameNoTooltip] irrompe em lágrimas enquanto me mostra os dedos emaranhados na tira."
 mpo_interactions_events.0102.desc_aggressive_attacker: "$mpo_interactions_events.0101.aggressive_attacker$\n\n[recipient.GetFirstNameNoTooltip] começa a brandir a espada à frente de [recipient.GetSheHe] e corre em minha direção de olhos fechados. [recipient.Custom('ES_LoLa')|U] deixo passar e lhe dou um golpe"
 mpo_interactions_events.0102.desc_unyielding_defender: "$mpo_interactions_events.0101.aggressive_attacker$\n\n[recipient.GetFirstNameNoTooltip] se viene abajo tras un par de golpes más. Suelta la espada y da pie a un golpe fuerte. Apenas consigo #EMP no#! pegarle con todas mis fuerzas."
 mpo_interactions_events.0102.desc_forder: "$mpo_interactions_events.0101.forder$ [recipient.GetFirstNameNoTooltip] tenta me alcançar, mas as pedras estão escorregadias demais. [recipient.GetSheHe|U] cai bem aos meus pés, então consigo acertar um golpe fácil em"
 mpo_interactions_events.0102.desc_flexible_leader: "$mpo_interactions_events.0101.flexible_leader$ Nem sequer estava preparado para aparar meu golpe e consigo acertar com facilidade.[recipient.Custom('ES_OA')] para aparar e dou um golpe limpo com facilidade."
 mpo_interactions_events.0102.desc_desert_warrior: "$mpo_interactions_events.0101.desert_warrior$ areia, mas a desvio de volta com meu escudo. Ceg[recipient.Custom('ES_OA')] ado, fica indefens[recipient.Custom('ES_OA')]; golpeio e venço com facilidade."
 mpo_interactions_events.0102.desc_jungle_stalker: "$mpo_interactions_events.0101.jungle_stalker$\n\n\"A-ah! Cobra!\" [recipient.GetFirstNameNoTooltip] cai de uma das árvores, rolando até meus pés, me dando uma vitória fácil."
 mpo_interactions_events.0102.desc_reaver: "$mpo_interactions_events.0101.reaver$ [recipient.GetHerHim|U] Eu o puxo para uma imobilização. Lutamos até que consigo tirar um anel do dedo dele.\n\n\"Tenha mais cuidado, porque da próxima vez pode ser a mão inteira!\"."
 mpo_interactions_events.0102.desc_reckless: "$mpo_interactions_events.0101.reckless$ Consigo sair da frente e faço com que perca o equilíbrio. [recipient.GetFirstNameNoTooltip] escorrega e cai rolando novamente."
 mpo_interactions_events.0102.desc_holy_warrior: "$mpo_interactions_events.0101.holy_warrior$\n\n“Menos conversa e mais luta!”, interrompe [recipient.GetFirstNameNoTooltip] e me ataca.\n\n“Perdoe-me, [ROOT.Char.GetFaith.HighGodName]!”, sussurro, e derrubo [recipient.GetFirstNameNoTooltip] com um único golpe."
 mpo_interactions_events.0102.desc_open_terrain_expert: "$mpo_interactions_events.0101.terrain_expert$\n\nVejo uma clareira atrás de [recipient.GetFirstNameNoTooltip].\n\n[recipient.Custom('ES_LoLa')|U] empurro para o espaço aberto. Com a vantagem de um campo amplo e plano, meus movimentos são rápidos demais e imprevisíveis. [recipient.GetFirstNameNoTooltip] não tem onde se esconder e desfero um golpe fácil."
 mpo_interactions_events.0102.desc_rough_terrain_expert: "$mpo_interactions_events.0101.rough_terrain_expert$\n\nVejo uma área de terreno acidentado atrás de [recipient.GetFirstNameNoTooltip].\n\n[recipient.Custom('ES_LoLa')|U] Empurro para as colinas rochosas. Com a vantagem de um terreno acidentado, meus movimentos são rápidos demais e imprevisíveis. [recipient.GetFirstNameNoTooltip] não tem onde se esconder e desfero um golpe fácil."
 mpo_interactions_events.0102.desc_forest_fighter: "$mpo_interactions_events.0101.forest_fighter$ Subo em uma das árvores.\n\n“Agarra isso!”, grito enquanto quebro um galho e o jogo nela. Ela se esquiva, mas já é tarde demais. Voo atrás dela e acerto um golpe fácil no corpo."
 mpo_interactions_events.0102.desc_cautious_leader: "[recipient.GetSheHe|U] tenta alguns golpes, avanços e estocadas. Não deixo brechas. [recipient.GetFirstNameNoTooltip] bate o pé e grita numa tentativa de me intimidar, mas não vacilo.\n\n\"Chega!\", perde a paciência e se lança contra mim, mas este era o momento que eu estava esperando! Ao notar a abertura, golpeio e venço o duelo."
 mpo_interactions_events.0102.desc_organizer: "$mpo_interactions_events.0101.organizer$ Percebo sua respiração pesada, seus movimentos ficando mais lentos e seus golpes falhando. Ele(a) já não consegue acompanhar. Com seu último suspiro, tenta desferir uma estocada, mas eu simplesmente saio do caminho. [recipient.GetFirstNameNoTooltip] desaba de exaustão."
 mpo_interactions_events.0102.desc_winter_soldier: "$mpo_interactions_events.0101.winter_soldier$ nieve, pero la esquivo. Se queda indefens[recipient.Custom('ES_OA')], golpeo y gano con facilidad."
 mpo_interactions_events.0102.a: "\"Talvez da próxima vez.\""
 mpo_interactions_events.0102.a.flavor: "Seu treino prova que ainda há um longo caminho para [recipient.GetFirstNameNoTooltip]."
 mpo_interactions_events.0102.b: "\"Vamos repetir o treino até você vencer!\""
