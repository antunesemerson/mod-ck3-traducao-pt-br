 mpo_restless_for_migration_modifier: "Bando Inquieto"
 mpo_restless_for_migration_modifier_desc: "Cada um dos cavaleiros deste nômade está pronto para atacar novas terras."
 mpo_bountiful_camels_modifier: "Rebanhos Abundantes de Camelos"
 mpo_bountiful_camels_modifier_desc: "O povo deste governante está bem-adaptado à vida no deserto, com muitos rebanhos de camelos."
 mpo_bountiful_sheep_modifier: "Rebanhos Abundantes de Ovelhas"
 mpo_bountiful_sheep_modifier_desc: "Lã, leite de ovelha e carne de cordeiro são algumas das principais preocupações deste governante e seu povo."
 mpo_bountiful_hunting_modifier: "Acampamentos de Caça"
 mpo_bountiful_hunting_modifier_desc: "Os nômades deste governante se sustentam principalmente caçando animais selvagens."
 mpo_bountiful_horses_modifier: "Cavalos Bem Alimentados"
 mpo_bountiful_horses_modifier_desc: "Os anfitriões deste nômade montam corcéis fortes e rápidos, com muitos reservas."
 mpo_bountiful_hunting_cheaper_hunts_tt: "Custo de [GetActivityType( 'activity_hunt' ).GetName|l]: #P -20 %#! @gold_icon! por #high 10 años#!"
