 mpo_nomad_events.1110.t: "Pastagens Úmidas"
 mpo_nomad_events.1110.desc_river: "As águas de um rio verde cantam"
 mpo_nomad_events.1110.desc_sea: "As águas de um vasto mar se quebram na costa"
 mpo_nomad_events.1110.desc_lake: "As águas de um calmo e azul lago descansam"
 mpo_nomad_events.1110.desc: "bem ali, além do meu acampamento em [capital_province.GetTitle.GetNameNoTier].\n\nMeus [ROOT.Char.GetCulture.GetCollectiveNoun] estão nos rasos, fazendo alarde de um peixe comprido como um sabre, cujas escamas marrom-acinzentadas brilham ao sol. Um[dummy_gender.Custom('ES_XA')] [dummy_gender.GetWomanMan] da região o ergue bem alto, vangloriando-se da captura.\n\nEsse grande peixe é prova de que há boa carne a se conseguir — se meus [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip] passarem os dias caçando criaturas que pastam na água."
 mpo_nomad_events.1110.a: "Construa barcos para explorar essas ricas águas."
 mpo_nomad_events.1110.a_repeat: "Nossos barcos nos servirão bem."
 mpo_nomad_events.1110.b: "#EMP Ahogaré#! a quem ousar descer do cavalo!"
 mpo_nomad_events.1110.c: "Redes, teçam muitas redes."
 custom.every_fishing_county_tt: "Cada [county|lE] de [domain|lE] costeiro, ribeirinho ou à beira do lago"
 fishing_counties_gold_scaling: "#weak O ganho de ouro é baseado em Condados de Domínio Costeiro, Ribeirinho e à Beira do Lago#!"
 maritime_tradition_unlock_tt: "#weak Disponível devido a uma [tradition|lE] [cultural|lE] náutica#!"
 nomad_unlocked_fishing_yurt_flag_tt: "Você desbloqueia #high $fishing_yurt_01_domicile_building$#! para seu [yurt_building|lE] #high $yurt_main_01_domicile_building$#!"
 mpo_nomad_events.1120.t: "Lobos do Inverno"
 mpo_nomad_events.1120.desc: "Os ventos gélidos não uivam sozinhos em [capital_province.GetTitle.GetNameNoTier]. Não neste inverno maligno. Não esta noite.\n\n#EMP "Lobos! Lobos entre os cordeiros!",#! surgem os gritos enquanto meus cavaleiros e eu corremos para montar.\n\nOs cordeiros, amontoados, soltam terríveis balidos de terror. Bestas de pelagem escura os puxam pelas patas e pelos pescoços, e disparam em direção aos bosques sem luz."
 mpo_nomad_events.1120.a: "Lobos? Bah! Meus cavaleiros são incontáveis."
 mpo_nomad_events.1120.a.flavor: "Nenhum predador em [capital_county.GetNameNoTierNoTooltip] poderia escapar dos meus exércitos..."
 mpo_nomad_events.1120.b: "Cavalgue rápido — cerquem-nas!"
 mpo_nomad_events.1120.b.success: "Nenhum lobo é mais rápido que o seu cavalo"
 mpo_nomad_events.1120.b.failure: "Na confusão, os lobos escapam"
 mpo_nomad_events.1120.c: "#EMP Flechas! Flechas!#! Vou pegar suas peles!"
 mpo_nomad_events.1120.c.success: "Suas flechas acabam com as bestas"
 mpo_nomad_events.1120.c.failure: "Suas flechas atingem cavalos e ovelhas"
 mpo_nomad_events.1120.d: "Parem! Eles só estão selecionando os fracos da manada."
 mpo_nomad_events.1120.d.flavor: "Nesta estação, não há cordeiros a serem roubados: apenas os velhos e os doentes. Não devemos negar esses aos lobos."
