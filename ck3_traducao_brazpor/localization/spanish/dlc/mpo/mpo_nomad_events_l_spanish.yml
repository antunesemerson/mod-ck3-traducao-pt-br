l_spanish:
 GetMongolHonorific_dreaded: "temido"
 GetMongolHonorific_dreadful: "terrível"
 GetMongolHonorific_mighty: "poderoso"
 GetMongolHonorific_fearsome: "assustador"
 GetMongolHonorific_frightful: "horripilante"
 nomad_events.ill_advised.header: "Mal-Aconselhado"
 nomad_events.0001.t: "$nomad_events.ill_advised.header$?"
 nomad_events.0001.desc: "Passos pesados e ruidosos interrompem o silêncio da noite.\n\n"Tenho certeza de que vós também vedes, [ROOT.Char.Custom('FormOfAddressForLiege')]," repreende meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('jealous_courtier'))|l] [jealous_courtier.GetFirstName] ao entrar em meu ger. "[achmach_scope.Custom('ES_ElLa')|U] [achmach_scope.GetTitledFirstName|l] se destaca um pouco demais em seu trabalho. Fala demais, recebe apoio demais e vai e vem com frequência demais. Tudo sempre parece sair a seu favor."\n\n[jealous_courtier.GetFirstNameNoTooltip] estreita os olhos: "Não será, meu [ROOT.GetCharacter.Custom('GetMongolHonorific')] [ROOT.Char.GetTitleAsNameNoTooltip|l], que [achmach_scope.GetFirstNameNoTooltip] usa... artes sombrias para conseguir o que deseja?""
 nomad_events.0001.a: "Expulsa-se [achmach_scope.GetFirstNameNoTooltip]"
 nomad_events.0001.b: "Palavras de um[jealous_courtier.Custom('ES_XA')] rival ciument[jealous_courtier.Custom('ES_OA')]."
 achmach_firing_tt: "@alert_icon! [achmach_scope.GetShortUIName] não poderá ser contratado novamente por 5 anos#!"
 nomad_events.0002.t: "$nomad_events.ill_advised.header$: Questionamentos"
 nomad_events.0002.desc.calm: "“Seja honesto[ROOT.Char.Custom('ES_OA')]”, [ROOT.GetCharacter.Custom('GetMongolHonorific')] [ROOT.Char.GetTitleAsNameNoTooltip|l]”, insiste [achmach_scope.Custom('ES_ElLa')] [achmach_scope.GetTitledFirstName|l], baixando a voz até quase não se distinguir do crepitar do fogo. “Será que eu poderia ter feito algo de outra forma? De que jeito falhei com você?”."
 nomad_events.0002.desc.angry: ""Não acredito que noss[ROOT.Char.Custom('ES_OA')] temível [ROOT.Char.GetTitleAsNameNoTooltip|l] tenha sido enganad[ROOT.Char.Custom('ES_OA')] dessa maneira", diz [achmach_scope.Custom('ES_ElLa')] [achmach_scope.GetTitledFirstNameNoTooltip|l] afastando o rosto do fogo. "Se vossa presença governante decidir dar ouvidos a rumores, espero que esteja certa de quais são verdadeiros"."
 nomad_events.0002.desc.fallback: ""Não lhe perguntarei, meu temível [ROOT.Char.GetTitleAsNameNoTooltip|l], por que fui afastado de seu lado, mas vou avisá-lo sobre algo", [achmach_scope.Custom('ES_ElLa')] [achmach_scope.GetTitledFirstNameNoTooltip|l] se volta para mim depois de beber [Glossary( 'kumis', 'KUMIS_GLOSS')]."
 nomad_events.0002.desc.outro: "\n\n"Ponderai sobre isto por um instante e perguntai-vos… há algum motivo para que [jealous_courtier.Custom('ES_ElLa')] [jealous_courtier.GetTitledFirstName|l] tenha falado mal de mim? Talvez alguém esteja tentando afastar-vos daqueles que mais cuidam de vós"."
 nomad_events.0002.a: "\"Me arrependo de tê-lo afastado do meu lado.\""
 nomad_events.0002.b: ""Minha decisão está tomada"."
 nomad_events.0003.t: "$nomad_events.ill_advised.header$: Onde Há Fumaça"
 nomad_events.0003.desc.intro: "A fogueira já virou quase toda cinzas neste ponto da noite. Conversas bêbadas vão ficando mais quietas antes de ficarem altas novamente. Meu/minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('jealous_courtier_2'))|l] [jealous_courtier_2.GetFirstName] se aproxima de mim sem muita sutileza.\n\n"
 nomad_events.0003.desc.rehired: ""Sua bondade é grande demais, oh, [ROOT.GetCharacter.Custom('GetMongolHonorific')]. Está claro que [achmach_scope.Custom('ES_ElLa')] [achmach_scope.GetTitledFirstName|l] deve ter usado demônios poderosos para enganá-lo assim.""
 nomad_events.0003.desc.not_rehired: ""Apesar de ter expulsado [achmach_scope.Custom('ES_AlAla')] [achmach_scope.GetTitledFirstName|l] do seu lado, temo que suas maquinações não tenham parado"."
 nomad_events.0003.desc.outro: "\n\n"Os sofrimentos que [achmach_scope.GetSheHe] causou parecem não ter fim!", suspira alto. "Não há dúvida de que [achmach_scope.GetFirstNameNoTooltip] sussurra encantamentos proibidos e feitiços perigosos, pois [Select_CString( dummy_attracted_gender.IsFemale, 'nossas mulheres', 'nossos homens' )] fugiram para seus braços!""
 nomad_events.0003.a: "Dá para entender o motivo..."
 nomad_events.0003.b: "Acabou."
 nomad_events.0003.c: "#EMP Ha, ha, ha!#!"
 nomad_events_0003_b_tt: "Sua natureza volúvel é mal vista"
 mpo_assertion_modifier: "Líder Protetor"
 mpo_assertion_modifier_desc: "Este personagem se impôs contra um conselheiro sedutor."
 nomad_events_0003_a_tt: "Seu [scheme|lE] começa com mais progresso e com o [modifier|lE] [GetModifier('extra_success_chance_modifier').GetNameWithTooltip]"
 nomad_events.0004.opening: "[ROOT.Char.Custom('ES_AlAla')|U] muito misericordioso [ROOT.Char.GetTitleAsNameNoTooltip|l] ,"
 nomad_events.0004.desc: "Imploro que aceite este humilde presente que reuni com grande esforço.\n\nObrigado por sua grande confiança em mim."
 nomad_events.0004.a: "Que gesto gentil."
 nomad_events.0005.desc: "Abutres virão para despir você.\n\nCuidado."
 nomad_events.0005.a: "O que é isso...?"
 nomad_events_0005_tt: "Você agora pode usar a [character_interaction|lE] $interrogate_interaction$ em [achmach_scope.GetShortUIName], [jealous_courtier.GetShortUIName] e [jealous_courtier_2.GetShortUIName]"
 nomad_events_0005_tt_only_one: "Você agora pode usar a [character_interaction|lE] $interrogate_interaction$ em [achmach_scope.GetShortUIName] e [jealous_courtier.GetShortUIName] para descobrir o significado da carta misteriosa"
 nomad_events.0006.t: "$nomad_events.ill_advised.header$: Interrogatórios"
 nomad_events.0006.desc.achmach: "A tenda [recipient.Custom('ES_DelDela')] [recipient.GetTitledFirstName|l] está tão escura que é difícil enxergar sem apertar os olhos. [recipient.GetFirstNameNoTooltip] se recosta sobre uma almofada [ROOT.Char.Custom('GetSimpleColor')].\n\n"Ah, [ROOT.GetCharacter.Custom('GetMongolHonorific')], por que vós me abençoais assim?"."
 nomad_events.0006.desc.courtier: "[recipient.Custom('ES_ElLa')|U] [recipient.GetTitledFirstName|l] repousa em sua cama e toma calmamente um pouco de [Glossary( 'boal', 'BOL_GLOSS')].\n\n"[ROOT.GetCharacter.Custom('GetMongolHonorific')]!", ele se levanta imediatamente quando entro e me entrega sua própria tigela: "Por favor, preciso perguntar por que você me visitou"."
 nomad_events.0006.desc.courtier_2: "[recipient.Custom('ES_ElLa')|U] [recipient.GetTitledFirstName|l] [recipient.Custom('quirk_pos_present')] quando entro em sua tenda. O cheiro de grama fresca ainda está presente em suas roupas.\n\n"Meu [ROOT.GetCharacter.GetLadyLord] [ROOT.GetCharacter.Custom('GetMongolHonorific')]! Por favor, diga-me como posso servi-lo.""
 nomad_events.0006.desc.calm: "\n\nEntrego a mensagem e aguardo uma explicação."
 nomad_events.0006.desc.fallback: "\n\nJogo a mensagem aos pés, exigindo uma explicação."
 nomad_events.0006.desc.achmach_outro: "\n\n"Ah, vejo que minha mensagem chegou até você. Já o avisei antes, temível. Posso privar os cães de comida até que não consigam mais andar, para que não mordam seu am[ROOT.Char.Custom('ES_OA')]"."
 nomad_events.0006.desc.courtier_outro: "\n\n\"Certamente você não acredita que isso se refere a mim, meu [ROOT.Char.GetTitleAsNameNoTooltip|l]. Apenas tentei protegê-lo!\""
 nomad_events.0006.desc.courtier_outro_2: "\n\n[recipient.GetFirstNameNoTooltip] se coça nervosamente no pescoço antes de insistir: "Não tenho nada a ver com isso"."
 nomad_events.0006.a: "Vou extrair a verdade de você como se ordenhasse uma égua."
 nomad_events.0006.b: "A carta claramente falava sobre magia negra."
 nomad_events.0006.c: "Por que vocês parecem tão nervosos[achmach_scope.Custom('ES_OA')]?"
 nomad_events.0006.d: "Transforme meus inimigos em carniça."
 nomad_events.0006.e: "Você não é confiável."
 nomad_events.0006.f: "Acredito que não se referia a você."
 bol: "bol"
 BOL_GLOSS: "Uma bebida fermentada feita com mel, semelhante ao hidromel."
 nomad_events_0006_d_tt: "Todas as suas [schemes|lE] de [GetScheme('murder').GetTypeName|l] terão maior [success_chance|lE] enquanto [achmach_scope.GetShortUIName] for seu [Concept('councillor', Select_CString(achmach_scope.IsFemale, 'consejera', 'consejero' ) )|E]"
 nomad_events_0006_c_success_info: "Você descobre o motivo da inquietação"
 nomad_events.0006.c.success: "[recipient.GetShortUIName] confessa"
 nomad_events_0006_c_success_loyal: "Era apenas ciúmes"
 nomad_events_0006_c_success_disloyal: "Testemunhou[recipient.Custom('ES_OA')] um ritual sombrio"
 nomad_events.0006.c.failure: "As intenções de [recipient.GetShortUIName] continuam incertas"
 ACHMACH_MURDER_BONUS: "Promessa de um conselheiro habilidoso"
 nomad_events.0007.t: "$nomad_events.ill_advised.header$: Um Galho Quebrado"
 nomad_events.0007.desc.imprisoned: "Poucas pessoas se aproximam dos prisioneiros. A falta de uma fogueira os faz tremer. Mas, quando me aproximo, noto que não se vê [achmach_scope.Custom('ES_AlAla')] [achmach_scope.GetTitledFirstName|l] por aqui."
 nomad_events.0007.desc.fallback: "Vejo [achmach_scope.Custom('ES_AlAla')] [achmach_scope.GetTitledFirstName|l] se esquivar da bebida e da luta muito mais cedo do que o normal. [achmach_scope.GetFirstNameNoTooltip] passa pela frente de sua tenda e segue em direção à natureza."
 nomad_events.0007.desc.outro: "\n\nUm estalo repentino torna fácil seguir seus passos e eu me [achmach_scope.GetHerHim] encontro agachad[achmach_scope.Custom('ES_OA')] no chão, com sua longa sombra pairando sobre algumas ferramentas.\n\n[achmach_scope.GetSheHe|U] quebra galhadas como se fossem gravetos frágeis, e as lascas voam em todas as direções."
 nomad_events.0007.aa: "Eu sabia! Está contra mim! Todos estão!"
 nomad_events.0007.a: "#EMP Ha!#! Já vi isso um milhão de vezes."
 nomad_events.0007.b: "O que você está #EMP realmente#! fazendo?"
 nomad_events.0007.b.success: "Você está seguro[ROOT.Char.Custom('ES_OA')] das intenções de [achmach_scope.GetShortUIName]"
 nomad_events.0007.b.failure: "Você ainda não tem clareza sobre as intenções de [achmach_scope.GetShortUIName]"
 nomad_events.0007.c: "Diga-me a verdade. #EMP Imediatamente.#!"
 nomad_events_0007_b_success_info: "Você descobrirá a verdadeira natureza do ritual"
 nomad_events.0008_0009.desc.intro: "A fumaça se eleva, pálida como a carne de um cadáver. [achmach_scope.Custom('ES_ElLa')|U] [achmach_scope.GetTitledFirstName|l] murmura uma invocação e, em seguida, proclama mais alto:\n\n"
 nomad_events.0008.t: "$nomad_events.ill_advised.header$: O Favor dos Céus"
 nomad_events.0008.desc: "$nomad_events.0008_0009.desc.intro$"Que o favor de [achmach_scope.GetFaith.HighGodName] proteja [ROOT.Char.Custom('ES_AlAla')] [ROOT.GetCharacter.Custom('GetMongolHonorific')] [ROOT.Char.GetTitleAsNameNoTooltip|l], [ROOT.Char.Custom('FormOfAddressForLiege')]. Que seus inimigos caiam ao chão, como a pedra da montanha elevada".\n\n[achmach_scope.GetFirstNameNoTooltip] se vira e me vê, [ROOT.Char.Custom2('QuirkPPPosOrNeg', SCOPE.sC('achmach_scope'))], "Grande [ROOT.GetCharacter.Custom('GetMongolHonorific')], agora o céu o protegerá", explica, entregando-me um amuleto feito de chifres."
 nomad_events.0008.a: "Esse [achmach_scope.GetFaith.HighGodName] de quem você fala... conte-me mais sobre ele."
 nomad_events.0008.b: "Sempre usarei isto."
 nomad_events.0008.c: "Esse trabalho é impressionante! Por favor, concentre-se nisso."
 magic_amulet: "Amuleto Protetor"
 magic_amulet_desc: "Uma galhada quebrada, úmida de sangue. As pontas foram queimadas."
 nomad_events_0008_b_tt: "Concede acesso à [decision|lE] $pray_to_protective_amulet_decision$ enquanto o [artifact|lE] [newly_created_artifact.GetName] estiver equipado."
 pray_to_protective_amulet_decision: "Rezar para o $magic_amulet$"
 pray_to_protective_amulet_decision_desc: "Um amuleto consagrado com fins protetores."
 pray_to_protective_amulet_decision_confirm: "Rezar."
 pray_to_protective_amulet_decision_tooltip: "Perder [stress|lE] por meio da oração"
 pray_to_protective_amulet_decision_valid_tt: "O [artifact|lE] $magic_amulet$ deve estar equipado"
 pray_to_protective_amulet_decision_toast: "A oração te acalma"
 nomad_events.0009.t: "$nomad_events.ill_advised.header$: Sangue no Osso"
 nomad_events.0009.desc: "$nomad_events.0008_0009.desc.intro$"Caia a ira de [achmach_scope.GetFaith.HighGodName] sobre [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitledFirstNameNoTooltip|l]. Que sua vida seja curta e cheia de dor".\n\n[achmach_scope.GetFirstNameNoTooltip] se vira, me vê e suas mãos agarram imediatamente o amuleto sobre o peito para se proteger."
 nomad_events.0009.a: "Vou rachar sua cabeça!"
 nomad_events.0009.b_imprisoned: "O que você tem aí?"
 nomad_events.0009.b: "Para o pó com você! E me dê isso."
 nomad_events.0009.c: "Esta é a #EMP última#! vez que me pegam desprevenido."
 mpo_eyes_everywhere_modifier: "Olhos em Todo Lugar"
 mpo_eyes_everywhere_modifier_desc: "Este personagem decidiu dedicar todos os esforços para impedir tramas contra si."
 nomad_events.0010.t: "$nomad_events.ill_advised.header$: Uma Faca no Escuro"
 nomad_events.0010.desc.intro: "Sonho com o céu infinito, nuvens girando, desaparecendo, chuva e trovões sem fim. Sinto uma gota d'água escorrendo pelo meu peito e o frio me acorda.\n\n"
 nomad_events.0010.desc.loyal: "Uma figura encapuzada está sobre mim, com uma faca em meu pescoço.\n\n"Abaixo!", [achmach_scope.Custom('ES_ElLa')] [achmach_scope.GetTitledFirstName|l] a afasta de mim com um empurrão e ela rosna quando bate as costas contra a parede."
 nomad_events.0010.desc.disloyal: "[achmach_scope.Custom('ES_ElLa')|U] [achmach_scope.GetTitledFirstName|l] está sobre mim, com uma faca no meu pescoço. [achmach_scope.Custom('ES_LoLa')|U] o empurro para o chão, mas ele se levanta quase imediatamente."
 nomad_events.0010.aaa: "Você não faz ideia com quem está mexendo..."
 nomad_events.0010.aa: "Estou #EMP fora#! daqui!!"
 nomad_events_0010_aa_tt: "Você corre com todas as forças"
 nomad_events.0010.a: "[achmach_scope.GetShortUIName], atrás de [assassin.GetSheHe]!"
 nomad_events.0010.a.success: "[achmach_scope.GetShortUIName] mata [assassin.Custom('ES_AlAla')] assassina[assassin.Custom('ES_OA')]"
 nomad_events.0010.a.failure: "[assassin.Custom('ES_ElLa')|U] fere[assassin.Custom('ES_OA')] a [achmach_scope.GetShortUIName]"
 nomad_events.0010.b: "Guardas! Guardas!"
 nomad_events.0010.b.success: "Seus guardas estavam esperando do lado de fora"
 nomad_events.0010.b.failure: "Seus guardas estavam distraídos"
 nomad_events.0010.c_imprisoned: "Volte para o seu buraco!"
 nomad_events.0010.c: "Você vai pagar por isso!"
 nomad_events.0010.c.success: "Você vence a luta"
 nomad_events.0010.c.failure: "[dueling_enemy.GetShortUIName] fere você"
 mpo_imprisoned_assassin_modifier: "Assassinos Aprisionados"
 mpo_imprisoned_assassin_modifier_desc: "Este personagem conseguiu aprisionar seu assassino."
 nomad_events.0100.t: "Não É Meu Rebanho"
 nomad_events.0100.desc: ""Você pode acreditar nisso, [ROOT.Char.GetTitleAsNameNoTooltip]?!", [vassal_1.Custom('ES_ElLa')] [vassal_1.GetTitledFirstName|l] trota na minha direção. "Aquela espécie de [vassal_2.Custom2('InsultAdjective', SCOPE.sC('vassal_1'))] de [vassal_2.GetFirstName] roubou alguns dos meus animais durante a noite, entrando furtivamente no cercado como um verme por uma fresta".\n\n"Exijo que tudo o que foi levado seja devolvido, ou eu mesmo os tomarei.""
 nomad_events.0100.aa: "\"Acho que esses eram meus.\""
 nomad_events.0100.a: "[vassal_2.Custom('ES_ElLa')|U] [vassal_2.GetTitledFirstNameNoTooltip|l] terá de devolver o rebanho."
 nomad_events.0100.b: "\"Não acredito nessas acusações.\""
 nomad_events.0100.c: "Você incomoda seu[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] com essa bobagem?"
 friend_supported_in_herd_dispute: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'apoiou', 'apoiou' )] [TARGET_CHARACTER.GetShortUIName] em uma disputa sobre o rebanho"
 friend_supported_in_herd_dispute_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] recebeu apoio de [Select_CString( CHARACTER.IsLocalPlayer, 'sua parte', CHARACTER.GetShortUIName )] durante uma disputa sobre rebanhos"
 nomad_events.0110.t: "Encurralado"
 nomad_events.0110.desc: "Neve. Os galhos das árvores rangem. Ouve-se o que parece ser um uivo distante. Só que... não está tão distante.\n\n"Socorro! Auxílio!" É impossível não reconhecer a voz [victim.Custom('ES_DelDela')] [victim.GetTitledFirstName|l] e saio correndo na direção dela. #EMP "Ajudem-me, por favor!"#!\n\nQuando chego, encontro [victim.GetFirstNameNoTooltip] abrigando-se atrás de algumas pedras e um lobo solitário se aproximando dele."
 nomad_events.0110.a: "\"$knight_culture_player_plural_no_tooltip$, peguem ele!\""
 nomad_events.0110.b: "\"Vou quebrar seu pescoço, besta!\""
 nomad_events.0110.b.success: "Você consegue afugentar o animal"
 nomad_events.0110.b.failure: "O animal te fere"
 nomad_events.0110.c: "\"Corra, [victim.GetFirstNameNoTooltip]!\""
 nomad_events.0110.c.success: "[victim.GetShortUIName] corre como nunca antes"
 nomad_events.0120.t: "Passeio ao Entardecer"
 nomad_events.0120.desc: "As nuvens tomam formas de animais sobre nossas cabeças e [companion.GetFirstName] e eu nos afastamos um pouco do acampamento.\n\n"Qual foi o lugar mais distante a que você já chegou, [ROOT.Char.GetTitleAsNameNoTooltip|l]?".\n\n"Para mim, não é tão longe", há quase vergonha em sua voz. "Mas um dia eu gostaria de ir para uma terra onde ninguém conheça minha língua"."
 nomad_events.0120.a: "\"Deixe-me te conhecer.\""
 nomad_events.0120.b: "Uma chance de conhecer melhor [companion.GetFirstNameNoTooltip]..."
 nomad_events.0120.c: "Preciso focar na cavalgada."
 lover_evening_ride: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'compartilharam', 'compartilharam')] um passeio romântico a cavalo ao entardecer"
 lover_evening_ride_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'compartilharam', 'compartilharam')] um passeio romântico ao entardecer a cavalo"
 friend_evening_ride: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'se deram bem', 'se deram bem')] durante um passeio a cavalo ao entardecer"
 friend_evening_ride_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] [Select_CString(Or(TARGET_CHARACTER.IsLocalPlayer, CHARACTER.IsLocalPlayer), 'se deram bem', 'se deram bem')] durante um passeio a cavalo ao entardecer"
 nomad_events.0130.t: "Um Bom Negócio"
 nomad_events.0130.desc: "Um rosto desconhecido puxa as rédeas de alguns cavalos, tentando acalmá-los.\n\n"Calma, calma", ele os acalma. "Ah, que feliz encontro!" Ele se vira para mim com um grande sorriso.\n\n"Se tiver interesse em comprar algumas das minhas mercadorias", oferece, apontando para os cavalos, "também tenho mais ovelhas naquele campo.""
 nomad_events.0130.a: "\"Vá. E deixe seus animais para trás.\""
 nomad_events.0130.b: ""Eu podia usar um[merchant.Custom('ES_XA')] comerciante decente"."
 nomad_events.0130.c: "\"Aceito de bom grado alguns.\""
 nomad_events.0130.d: "\"Não estou interessado.\""
 nomad_events.0140.t: "Longe de Casa"
 nomad_events.0140.desc: ""… Vocês já viram [merchant.GetHerHim|U]?\n\nOs murmúrios são quase inevitáveis quando passo pelo acampamento. O motivo logo se torna evidente: um[merchant.Custom('ES_XA')] [merchant.GetWomanMan] com roupas estranhas está ao lado da minha fogueira.\n\n"Saudações, [ROOT.GetCharacter.Custom('GetMongolHonorific')] [ROOT.GetCharacter.GetTitleAsNameNoTooltip|l]. Sou um[merchant.Custom('ES_XA')] comerciante de fé [merchant.GetFaith.GetAdjectiveNoTooltip] que foi parar em uma terra estranha. Desejo passar alguns anos em vossa corte"."
 nomad_events.0140.a: ""Conte-me mais sobre seu [merchant.GetFaith.GetNameNoTooltip|l]…"."
 nomad_events.0140.b: "\"Meu acampamento lhe dá as boas-vindas.\""
 nomad_events.0140.c: "\"Vá embora. Imediatamente.\""
 nomad_events.0140.a.tt: "Você recebe um desconto de #P 50%#! para se converter à fé [merchant.GetFaith.GetName|l]"
 nomad_events.0150.t: "Mais Uma Taça"
 nomad_events.0150.desc: "O [Glossary( 'kumis', 'KUMIS_GLOSS')] passa de mão em mão em tigelas cheias até a borda. "Aqui, aqui!", [companion.Custom('ES_ElLa')] [companion.GetTitledFirstName|l] gesticula para conseguir mais. "Voss[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] exige!", diz, sorrindo para mim. "Vocês são mais lentos que potrinhos! Apressai-vos!"\n\n"Ah!" Por fim, uma tigela chega às suas mãos, e [companion.GetSheHe] prontamente a oferece a mim.\n\n"Vamos beber agora, meu bom[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l], pois a noite é jovem e [Select_CString(And(ROOT.Char.IsFemale, companion.IsFemale), 'nós', 'nós')] logo não seremos mais!""
 nomad_events.0150.a: ""Você sabe quem é covarde de verdade? [rival.Custom('ES_ElLa')] idiota de [rival.GetFirstNameNoTooltip].""
 nomad_events.0150.a.tt: "Esta opção está disponível porque você tem um [rival|lE]"
 nomad_events.0150.b: "\"Vamos sim!\""
 nomad_events.0150.c: "Uma ótima ocasião para mostrar minha resistência."
 KUMIS_GLOSS: "Uma bebida alcoólica fermentada feita de leite de égua, comum nas Grandes Estepes. Também conhecida como #EMP airag#! nas línguas mongólicas."
 friend_drank_together: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'compartilharam', 'compartilharam')] uma noite de bebidas e piadas"
 friend_drank_together_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] [Select_CString(Or(TARGET_CHARACTER.IsLocalPlayer, CHARACTER.IsLocalPlayer), 'compartilharam', 'compartilharam')] uma noite de bebida e piadas"
 nomad_events.0160.t: "Uma Palavra Amável"
 nomad_events.0160.desc.intro: ""Há algo que não me sai da cabeça", diz [spouse.GetFirstName], deitad[spouse.Custom('ES_OA')] na cama. "Tenho reparado que, ultimamente, há algo diferente em você."\n\n"
 nomad_events.0160.desc.dread: ""Sua presença enche de terror [Select_CString( ROOT.Char.IsFemale, 'as mulheres', 'os homens' )]. Eles gritam, fogem e imploram por misericórdia"."
 nomad_events.0160.desc.prowess: ""Sua destreza não tem rival. [Select_CString( ROOT.Char.IsFemale, 'Outras mulheres', 'Outros homens' )] lançam olhares invejosos para você, cheios de ciúme."
 nomad_events.0160.desc.lover: "\"O amor que sinto por você cresce a cada dia. Como uma flor selvagem, ele nunca morre.\""
 nomad_events.0160.desc.brave: "Seu valor inspira [Select_CString( ROOT.Char.IsFemale, 'las mujeres', 'los hombres' )] e infunde em seus corações o desejo de segui-lo."
 nomad_events.0160.desc.generic: ""Sua mente é tão forte quanto seu braço. [Select_CString( ROOT.Char.IsFemale, 'As mulheres', 'Os homens' )] o seguirão a qualquer lugar."
 nomad_events.0160.desc.outro: "Tenho prestado atenção. E isto me impressionou".\n\nE faz um gesto para que eu me aproxime."
 nomad_events.0160.a: "\"Finalmente, você caiu na real.\""
 nomad_events.0160.b: "\"Também te amo, meu bem.\""
 nomad_events.0160.c: "\"Certifique-se de contar a todos.\""
 lover_admirable_thing: "[TARGET_CHARACTER.GetShortUIName|U] confessou sua profunda admiração por [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUIName )]"
 lover_admirable_thing_corresponding: "[CHARACTER.GetShortUIName|U] confessou sua profunda admiração por [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetShortUIName )]"
 nomad_events.0170.t: "Temido por Todos"
 nomad_events.0170.desc: "[spouse.GetFirstName] se senta junto ao fogo quando entro na tenda. Sobressaltad[spouse.Custom('ES_OA')], solta um pequeno suspiro quando me vê e baixa os olhos.\n\nNão diz nada enquanto me dispo e jogo água no rosto. Depois de um tempo, o silêncio pesa demais:\n\n\"Preciso falar com você, meu amad[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]\", sua voz é baixa, \"Todos têm medo de você. E eu não sou diferente deles\", confessa."
 nomad_events.0170.a: "\"Você me acha #EMP frac#!?\""
 nomad_events.0170.b: "\"Tenho escutado demais minha raiva.\""
 nomad_events.0170.c: "\"É o único caminho.\""
 dread_spouse_modifier: "Melhor Ser Temido"
 dread_spouse_modifier_desc: "Do que amado."
 nomad_events.0180.t: "O Elo Mais Fraco"
 nomad_events.0180.desc: "Ouço a risada [rival.Custom('ES_DelDela')] [rival.GetTitledFirstName|l] antes de ver[rival.GetHerHim]. [rival.GetSheHe|U] está de costas para mim, e seu hálito cheira a [Glossary( 'kumis', 'KUMIS_GLOSS')].\n\n"#EMP Quem#! governará quando [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitledFirstNameNoTooltip|l] virar comida de pássaro? Será [child.GetFirstName]? Seu braço é tão fraco que mal consegue impedir que os próprios dedos caiam."\n\n"Não. Certamente não será [child.Custom('ES_ElLa')] doce e dócil [child.GetFirstNameNoTooltip].""
 nomad_events.0180.a: "\"Você #EMP nunca#! mais vai falar da minha família assim.\""
 nomad_events.0180.b: "Está na hora de [child.GetFirstNameNoTooltip] aprender."
 nomad_events.0180.c: "Que as palavras de [rival.GetFirstNameNoTooltip] sejam levadas pelo vento."
 nomad_events.0190.t: "Velhos Tempos"
 nomad_events.0190.desc: ""O [Glossary( 'gorro lhe cai bem', 'TAKE_HAT_GLOSS')], meu bom [ROOT.Char.GetTitleAsNameNoTooltip|l]", [friend.Custom('ES_ElLa')] [friend.GetTitledFirstName|l] puxa as rédeas do cavalo e lhe dá tapinhas na cabeça até que ele se acalma, rindo. "Ei! Calma aí!"\n\nVira o olhar de volta para mim: "Não acredito que você seja [Select_CString( ROOT.Char.IsFemale, 'a mesma', 'o mesmo' )] de tantos anos atrás. Alguma vez pensou que acabaríamos assim?"\n\nEnquanto fala, não consigo evitar sorrir e pensar em quando [memory.GetDescription]."
 nomad_events.0190.a: "\"Você é tão próximo(a) ao meu coração quanto meu próprio sangue.\""
 nomad_events.0190.b: "\"Com você, me sinto em paz.\""
 nomad_events.0190.c: "\"Hah! E isso é só o começo!\""
 nomad_events.0190.d: "\"Que cada árvore ouça nossa história!\""
 mpo_good_memory_modifier: "Coração Aquecido"
 mpo_good_memory_modifier_desc: "As boas memórias enchem este personagem de alegria."
 TAKE_HAT_GLOSS: "Dito mongol que faz referência ao poder, ao ser régio."
 friend_cute_memory: "[CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'recordasteis', 'recordaron')] uma boa lembrança [Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale),'juntas','juntos')] muitos anos depois."
 friend_cute_memory_corresponding: "[TARGET_CHARACTER.GetShortUIName] e [CHARACTER.GetShortUIName] [Select_CString(Or(TARGET_CHARACTER.IsLocalPlayer, CHARACTER.IsLocalPlayer), 'recordasteis', 'recordaron')] uma boa lembrança [Select_CString(And(TARGET_CHARACTER.IsFemale, CHARACTER.IsFemale),'juntas','juntos')] muitos anos depois."
 nomad_events.0200.t: "Nos Meus Sonhos"
 nomad_events.0200.desc.intro: "[courtier.Custom('ES_ElLa')|U] [courtier.GetTitledFirstName|l] se senta ao meu lado enquanto termino meu [Glossary( 'boal', 'BOL_GLOSS')]. Com os olhos fixos nas chamas, começa a falar:\n\n"Na noite passada, tive um sonho. Um falcão branco desceu"
 nomad_events.0200.desc.good: "da lua e pousou em sua mão. Ele a acendeu com fogo e voou embora.\""
 nomad_events.0200.desc.bad: "do sol e foi devorado por um cão selvagem. Seu corpo jazia numa poça de sangue.\""
 nomad_events.0200.desc.outro: "\n\nO calor da fogueira parece ter aumentado. Minha testa pinga de suor."
 nomad_events.0200.a: "\"Esculpirei meu próprio destino sobre ossos caídos.\""
 nomad_events.0200.b: "\"Por favor, descubra o que isso significa.\""
 nomad_events.0200.c: "\"Maus presságios apenas forjam [ROOT.Char.GetWomenMen] melhores.\""
 nomad_events.0200.d: "\"Será o que [ROOT.Char.GetFaith.HighGodName] desejar.\""
 mpo_no_omens_modifier: "Destino Domado"
 mpo_no_omens_modifier_desc: "Este personagem não deixa sonhos decidirem seu destino."
 nomad_events.0210.t: "Nada Além de Raízes"
 nomad_events.0210.desc.intro: "Os cães vagam pelo acampamento; são cada vez menos, e seus ossos se veem através da pele fina. Uma ovelha caiu morta na noite passada. De manhã, não restava nada.\n\n"
 nomad_events.0210.desc.spouse: ""Querid[ROOT.Char.Custom('ES_OA')]…", [family.GetFirstName] se aproxima a mim, apertando com força um punhado de raízes. "Passei a manhã toda forrageando, mas isso foi tudo o que consegui encontrar"."
 nomad_events.0210.desc.child: "\"[ROOT.Char.GetMotherFather|U]...\" [family.GetFirstName] se aproxima de mim, os olhos vermelhos e as mãos segurando um punhado de raízes. \"Recolhi isso para você... Me desculpe por não ter achado mais.\""
 nomad_events.0210.aa: "[courtier.GetShortUINameNoTooltip] anda bem atraente ultimamente..."
 nomad_events.0210.a: "\"Não preciso da sua piedade.\""
 nomad_events.0210.b.child: ""Obrigado, [Select_CString( family.IsFemale, 'hija mía', 'hijo mío' )]"."
 nomad_events.0210.b.spouse: "\"Meu amor...\""
 nomad_events.0210.c: "\"Não vou permitir que você passe por isso.\""
 nomad_events_0210_c_tt: "Usar a [character_interaction|E] $mpo_ask_for_herd_interaction$ resultará em uma doação de [herd|lE] maior pelos próximos #value 5#! anos"
 friend_offered_roots: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'ofereceu', 'ofereceu' )] a [CHARACTER.GetShortUIName] algumas raízes colhidas na natureza quando mais precisava."
 friend_offered_roots_corresponding: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'ofereceu', 'ofereceu' )] a [TARGET_CHARACTER.GetShortUIName] algumas raízes colhidas na natureza quando mais precisava."
 nomad_events.0220.t: "Fraco é o Braço"
 nomad_events.0220.desc: "[spouse.GetFirstName] limpa os dentes com um graveto, deitad[spouse.Custom('ES_OA')] de lado. Revira os olhos quando finalmente nota que entrei na tenda.\n\n"O que você fez hoje?", pergunta. "Talvez tenha acariciado um cordeirinho perdido ou beijado as unhas dos pés de seus inimigos?"\n\n"Não me casei para desposar um galho frágil. Você deve permanecer forte como o poderoso [ROOT.Char.GetCurrentLocation.Custom('GetRandomAppropriateTree')].""
 nomad_events.0220.a: "\"Você tem razão. Isso precisa acabar.\""
 nomad_events.0220.b: "\"Vou treinar o máximo que puder.\""
 nomad_events.0220.c: "\"Não adianta lutar contra a natureza. Eu sou assim.\""
 nomad_events.0230.t: "Saudade de Casa"
 nomad_events.0230.desc: "Meus olhos pesam quando os abro. Não há sinal da luz da manhã. Os soluços de [spouse.GetFirstName] se tornam evidentes quando me acostumo a estar acordad[ROOT.Char.Custom('ES_OA')]'\n\n“Eu... eu sinto muito. Não queria perturbar seu sono. É que... estou com saudade de casa. Aqui não é a mesma coisa. As terras [ROOT.Char.GetCurrentLocation.GetCulture.GetNameNoTooltip] como as [spouse.GetCulture.GetNameNoTooltip].”"
 nomad_events.0230.a: "\"Eu sei como é essa sensação.\""
 nomad_events.0230.b: "\"Farei deste o seu lar.\""
 nomad_events.0230.c: "\"Você precisa deixar o passado para trás.\""
 lover_homesick_comfort: "[CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'consolaste', 'consoló' )] a [TARGET_CHARACTER.GetShortUIName] quando sentiu saudade de casa."
 lover_homesick_comfort_corresponding: "[TARGET_CHARACTER.GetShortUIName] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'consolaste', 'consoló' )] a [CHARACTER.GetShortUIName] quando sentiu saudade de casa."
 mpo_hardened_modifier: "Resignado(a)"
 mpo_hardened_modifier_desc: "Este personagem aprendeu que a nostalgia pode ser perigosa."
 nomad_events.0240.t: "Convidados Inesperados"
 nomad_events.0240.desc: "Os balidos não param por todo o acampamento. "Fazei-os parar!", ouço [courtier.Custom('ES_AlAla')] [courtier.GetTitledFirstName|l] lamentar, esfregando a testa com uma careta de dor.\n\n"Ah, [ROOT.Char.GetTitleAsNameNoTooltip|l]! Finalmente você está aqui!", sorri, apontando para o rebanho de ovelhas ao lado de [courtier.GetSheHe].\n\n"Nosso povo encontrou este rebanho perdido na fronteira com o território [ruler.Custom('ES_DelDela')] [ruler.GetTitledFirstName|l]. Temos motivos para acreditar que pertencem a [ruler.GetHerHim].""
 nomad_events.0240.a: "\"Fiquemos com todas, menos uma. Enviem sua cabeça para [ruler.GetFirstNameNoTooltip].\""
 nomad_events.0240.b: "\"Devolvam-nas para [ruler.GetShortUINameNoTooltip].\""
 nomad_events.0240.c: "\"Que dia de sorte.\""
 mpo_honorable_ruler: "Pastor Honrado"
 mpo_honorable_ruler_desc: "Este personagem devolveu um rebanho perdido ao seu verdadeiro dono."
 house_feud_stolen_herd: "rebanho roubado"
 house_feud_stolen_herd_flavor: "[ROOT.Var('house_feud_attacker').Char.GetFirstName] aumentou a rivalidade que já existia com [ROOT.Var('house_feud_victim').Char.GetFirstName] ao roubar seu rebanho."
 friend_returned_herd: "[CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'demostraste', 'demostró' )] sua honra ao devolver o rebanho de [TARGET_CHARACTER.GetShortUIName]."
 friend_returned_herd_corresponding: "[TARGET_CHARACTER.GetShortUIName] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'demostraste', 'demostró' )] provando sua honra ao devolver o rebanho de [CHARACTER.GetShortUIName]."
 nomad_events.0250.t: "[priest.GetWomanMan|U] de [priest.GetFaith.HighGodName]"
 nomad_events.0250.desc: ""[ROOT.GetCharacter.Custom('GetMongolHonorific')|U] [ROOT.Char.GetTitleAsNameNoTooltip]", chama uma voz estranha. "Por muitas luas, [priest.GetFaith.HighGodName] me fez procurá-lo."\n\n"Em meus sonhos, vi você deitado aos pés de um lobo. Você abriu sua boca ensanguentada, e dela caiu o símbolo de [priest.GetFaith.ReligiousSymbol].""
 nomad_events.0250.a: "\"Reconheço uma profecia quando ouço uma.\""
 nomad_events.0250.b: "\"Intrigante... fique conosco.\""
 nomad_events.0250.c: "\"Besteira! Eu o(a) expulso!\""
 chosen_by_the_heavens_modifier: "Escolhido pelos Céus"
 chosen_by_the_heavens_modifier_desc: "Este personagem está convencido de que foi escolhido pelos céus, e seu povo acredita nisso também."
 nomad_events.0260.t: "Assuntos Religiosos"
 nomad_events.0260.desc: ""Saudações, [ROOT.Char.GetName]. Meu nome é [priest.GetFullName]", diz [priest.Custom('ES_ElLa')] estranh[priest.Custom('ES_OA')] [priest.GetWomanMan] curvando-se diante de mim. "Venho da distante [distant_realm.GetBaseName] por ordem do meu [other_ruler.GetLadyLord|l], [other_ruler.Custom('ES_ElLa')] [other_ruler.GetTitledFirstName|l]".\n\n"Ele pediu que eu viesse mostrar-vos o caminho da verdadeira fé, o [priest.GetFaith.GetName|l]"."
 nomad_events.0260.a: "\"Você ousa desrespeitar minha fé!?\""
 nomad_events.0260.b: "\"Quero saber mais sobre [priest.GetFaith.GetNameNoTooltip].\""
 nomad_events.0260.c: "\"Seu deus mesquinho não é páreo para [ROOT.Char.GetFaith.HighGodName].\""
 nomad_events.0260.c.tt.crit_success: "Todos estão impressionados"
 nomad_events.0260.c.tt.success: "[priest.GetShortUINameNoTooltip] fica impressionad[priest.Custom('ES_OA')]"
 nomad_events.0260.c.tt.failure: "Você parece um tolo"
 nomad_events.0260.d: "\"Saia da minha vista.\""
 mpo_nomad_events.1080.t: "O Usador do Cangue"
 mpo_nomad_events.1080.desc_high_intro: "[neighbor_ruler.Custom('ES_ElLa')|U] [neighbor_ruler.GetTitledFirstName|l], cuja yurta se ergue nas proximidades de [neighbor_county.GetBaseNameNoTier], cavalga por minhas pastagens sem permissão. E, como lobos à presa, meus cavaleiros cercam sua tropa armada.\n\n"Grande [ROOT.Char.GetTitleAsNameNoTooltip|l]!","
 mpo_nomad_events.1080.desc_low_intro: "[neighbor_ruler.Custom('ES_ElLa')|U] [neighbor_ruler.GetTitledFirstName|l], que governa em [neighbor_county.GetBaseNameNoTier], um lugar próximo, cavalga por meus pastos. Quando soam os gritos de alerta, reúno meus [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] e vou ao encontro de seu bando armado.\n\n"Ora, [ROOT.Char.GetTitleAsNameNoTooltip|l]!","
 mpo_nomad_events.1080.desc_1: "saúda [neighbor_ruler.GetFirstNameNoTooltip], \"Caçamos um"
 mpo_nomad_events.1080.criminal: "um[escaped_warrior.Custom('ES_XA')] criminoso"
 mpo_nomad_events.1080.desc_2: "que fugiu para seu/sua [ROOT.Char.GetCapitalLocation.GetTerrain.GetNameNoTooltip|l]. Mesmo usando a [Glossary( 'canga', 'CANGUE_GLOSS' )] de punição, est[escaped_warrior.Custom('ES_EA')] [escaped_warrior.GetFirstName] escala como uma cabra; mesmo sem dormir, superou meus rastreadores em astúcia."\n\n"Nossa presa está em seu território, [ROOT.Char.GetTitleAsNameNoTooltip|l]. Você assumirá a caçada?""
 CANGUE_GLOSS: "Uma ferramenta de punição usada nas terras das estepes e na Ásia Oriental. O #G cangue#! é um pesado yoke de madeira preso aos ombros. Usado por dias ou semanas, ele exaure, humilha, dificulta o movimento e pode até causar a fome ao impedir que o portador se alimente."
 mpo_nomad_events.1080.a: "Es[escaped_warrior.Custom('ES_EA')] fugitiv[escaped_warrior.Custom('ES_OA')] parece habilidos[escaped_warrior.Custom('ES_OA')] e capaz…"
 mpo_nomad_events.1080.a.flavor: "A força de [escaped_warrior.GetFirstNameNoTooltip] não apodrecerá sob uma #EMP canga#!. Não, ela fortalecerá minha horda!"
 mpo_nomad_events.1080.b: "Afugente [neighbor_ruler.GetFirstNameNoTooltip] com uma chuva de flechas."
 mpo_nomad_events.1080.b.flavor: "Fugitivo ou não, [neighbor_ruler.Custom('ES_ElLa')] [neighbor_ruler.GetTitleAsNameNoTooltip|l] invadiu aqui — e deve ser expulso aos berros de agonia!"
 mpo_nomad_events.1080.c: "Nós vamos perseguir o cabrito fugitivo."
 BOUND_TO_FAMILY_WIDOW: "Você jurou cuidar da viúva de seu familiar."
 ranged_and_searched_modifier: "Alcançado e Procurado"
 ranged_and_searched_modifier_desc: "As patrulhas cavaleiras viajaram por todos os vales, depressões e cumes... e ao fazê-lo, revelaram pastagens escondidas e locais de fuga."
 family_widow_cant_divorce_tt: "@alert_icon! #alert_trial Você não pode [Concept('divorce', 'divorciar')|E] de [widow.GetFirstName] por #high 10 anos#!#!"
 family_widow_cant_dismiss_tt: "@alert_icon! #alert_trial Você não pode dispensar [widow.GetFirstName] por #high 10 anos#!#!"
 family_widow_seduce_romance_bonus_tt: "Quando as [schemes|lE] de [GetScheme('seduce').GetTypeName|l] ou [GetScheme('courting').GetTypeName|l] se direcionarem contra [widow.GetFirstName] : [success_chance|lE] #P +20#!"
 scheme_family_widow_seduce_romance: "Me salvou da Viudez: $VALUE|0=-+$"
 inspired_in_wifely_duties_modifier: "Amada e Inspirada"
 inspired_in_wifely_duties_modifier_desc: "Esta mulher gerencia sua casa com vigorosa devoção, pois conhece bem o amor e a lealdade de seus sogros."
 concubine_lavished_attention_modifier: "Mimada com Atenção"
 concubine_lavished_attention_modifier_desc: "Esta mulher conheceu a devoção de um governante e todos os luxos que a acompanham."
 truce_family_widow: "\nUm armistício será aceito quando [ROOT.Char.GetShortUIName] [Select_CString( ROOT.Char.IsLocalPlayer, 'te cases', 'se case' )] com a viúva [widow.GetShortUIName]"
 mpo_nomad_events.1091.t: "O Destino da Viúva"
 mpo_nomad_events.1091.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('dead_husband'))|l] está morto. [dead_husband.GetFirstName] pertence à brisa. Sua viúva, [widow.GetName], parte de nossa família desde que entrou pela primeira vez na iurta de meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('dead_husband'))|l] chora e lamenta.\n\nPode ser que o coração de [widow.GetFirstNameNoTooltip|U] pertença à [ROOT.Char.GetHouse.GetName], mas seu lugar entre nós, sua proteção, agora depende de mim... do meu dever de assumir o que meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('dead_husband'))|l] deixou para trás.\n\n"
 mpo_nomad_events.1091.desc.marry: "Nossos costumes exigem que eu me case com sua [widow.GetTitledFirstNameNoTooltip|l]."
 mpo_nomad_events.1091.desc.concubine: "Nossos costumes me obrigariam a tomar s [widow.GetTitledFirstNameNoTooltip|l] como minha mulher."
 mpo_nomad_events.1091.a: "#EMP Por fim, é meu/minha!#!"
 mpo_nomad_events.1091.a.flavor: "A esposa do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('dead_husband'))|l] , #EMP una diosa#! se merece até a última migalha e resíduo da minha devoção."
 mpo_nomad_events.1091.b: "Nosso casamento agradará [widow_relative.Custom('ES_AlAla')] [widow_relative.GetTitledFirstNameNoTooltip|l]…"
 mpo_nomad_events.1091.b.flavor: "…e a mim. Este casamento me será útil."
 mpo_nomad_events.1091.c: "Terei #EMP todos#! os tesouros do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('dead_husband'))|l], sim."
 mpo_nomad_events.1091.d: "Minha família protege os seus. Sempre."
 mpo_nomad_events.1091.e: "Agora você implora com os cães, [widow.GetWomanMan]."
 mpo_nomad_events.1100.t: "As Pastagens de [capital_province.GetTitle.GetNameNoTierNoTooltip]"
 mpo_nomad_events.1100.desc: "Rebanhos obedientes de gado, pastores e cavaleiros percorrem a [capital_province.GetTerrain.GetNameNoTooltip|l] que circunda minha grande iurta. Estamos usando esta terra, [capital_province.GetTitle.GetNameNoTier].\n\n"
 mpo_nomad_events.1100.desc.camel: "Mas, na secura e no calor, pouco cresce. Dos quatro animais de nosso rebanho, apenas um se dá bem com o vazio e relincha pela vontade de vagar pelas [capital_province.GetTerrain.GetNameNoTooltip|l] — o camelo.\n\nEnquanto nossos outros animais pastam nos melhores pontos, os camelos percorrem toda a [capital_province.GetTitle.GetNameNoTierNoTooltip]."
 mpo_nomad_events.1100.desc.sheep: "O solo aqui é árido e rochoso. Sua alimentação grosseira não é do gosto de nossos cavalos e bois, mas para as ovelhas e cabras — isso é um paraíso.\n\nLeite e lã chegam aos meus [ROOT.Char.GetCulture.GetCollectiveNoun] em abundância."
 mpo_nomad_events.1100.desc.hunting: "Mas aqui a vegetação cresce muito: há pouca pastagem aberta. Nosso gado fica magro, enquanto meus [ROOT.Char.GetCulture.GetCollectiveNoun] recorrem aos arcos e aves de caça para sua alimentação.\n\nComerciamos peles de cervo em lugar da lã de ovelha."
 mpo_nomad_events.1100.desc.horses: "Por vontade de [ROOT.Char.GetFaith.HighGodName], criou-se um lugar especial para os cavalos: um sereno mar de grama, onde pernas velozes e almas nobres servem às nossas montarias em sua satisfação.\n\nAqui meus [ROOT.Char.GetCulture.GetCollectiveNoun] fazem pastar seus corcéis até que estejam gordos e felizes."
 mpo_nomad_events.1100.a: "Onde há [capital_province.GetTerrain.GetNameNoTooltip|l], somos mestres."
 mpo_nomad_events.1100.a.flavor: "Conhecer um lugar é conhecer toda a abundância que ele oferece, prontamente e em segredo."
 mpo_nomad_events.1100.b: "Meu povo não tem amor por este lugar."
 mpo_nomad_events.1100.c.camel: "Troque outros animais por camelos!"
 mpo_nomad_events.1100.c.sheep: "Uma boa temporada de cordeiros está por vir."
 mpo_nomad_events.1100.c.hunting: "Aqui, caçamos ou morremos de fome."
 mpo_nomad_events.1100.c.horse: "Uma terra para cavalos."
