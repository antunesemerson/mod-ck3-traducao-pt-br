l_spanish:
 mpo_flavor_events_settled.0001.t: "A Tempestade Se Aproxima"
 mpo_flavor_events_settled.0001.desc: "O vento frio corta minhas bochechas como estilhaços de vidro. O tempo tem estado incomumente frio ultimamente.\n\nO relincho de um cavalo chama minha atenção justo quando me viro para voltar para dentro. Seu cavaleiro mal consegue segurar as rédeas.\n\n"Socorro...", murmura, prestes a desabar. "O grande inverno chegou. Meu povo morre tentando fugir da estepe.""
 mpo_flavor_events_settled.0001.aa: "\"Saia daqui!\""
 mpo_flavor_events_settled.0001.a: "\"Deixe-os vir!\""
 mpo_flavor_events_settled.0001.b: "\"Precisamos nos preparar para esses nômades.\""
 mpo_flavor_events_settled.0001.c: "\"Você pode descansar agora.\""
 mpo_settled_preparations_war_county_modifier: "Preparativos para Guerra"
 mpo_settled_preparations_war_county_modifier_desc: "Este personagem está se preparando para uma iminente invasão nômade, reforçando seus exércitos."
 mpo_settled_preparations_building_county_modifier: "Preparativos para a Terra"
 mpo_settled_preparations_building_county_modifier_desc: "Este personagem está se preparando para uma iminente invasão nômade, garantindo que seus condados estejam prontos."
 mpo_flavor_events_settled.0001.tt: "@alert_icon! #alert_trial [nomads|lE] podem tentar tomar nossas terras#!"
 mpo_flavor_events_settled.0010.t: "O Senhor dos Cavalos"
 mpo_flavor_events_settled.0010.desc: "#Emp "Chs! Chs!"#! [Select_CString(nomad.IsFemale, 'Uma estranha', 'Um estranho' )] golpeia suavemente os flancos de seu cavalo para acalmá-lo e, em seguida, avança em minha direção.\n\n"Saudações, honrável [ROOT.Char.GetTitleAsNameNoTooltip|l], sou [Select_CString(nomad.IsFemale, 'a enviada', 'o enviado' )] [nomad_lord.Custom('ES_DelDela')] grande [nomad_lord.GetTitledFirstName|l]. Meu/minha [nomad_lord.GetLadyLord] me enviou para propor uma trégua entre nossos povos.""
 mpo_flavor_events_settled.0010.a: "\"Por favor, aceite meu tributo.\""
 mpo_flavor_events_settled.0010.b: "\"Tenho certeza de que podemos chegar a um entendimento.\""
 mpo_flavor_events_settled.0010.b_perk_tt: "Seu [perk|lE] [GetPerk('defensive_measures_perk').GetName( GetNullCharacter )] permite que você negocie um preço melhor"
 mpo_flavor_events_settled.0010.c: "#EMP Cuspa no chão.#!"
 mpo_flavor_events_settled.0010.d: ""Envie meus cumprimentos a seu[nomad_lord.Custom('ES_OA')] [nomad_lord.GetLadyLord].""
