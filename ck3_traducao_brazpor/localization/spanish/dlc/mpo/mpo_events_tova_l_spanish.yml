l_spanish:
 mpo_events_tova.0001.t: "Uma Recepção Fria"
 mpo_events_tova.0001.desc: "Pouco depois do meu retorno, percebo que [demanding_relation.Custom('ES_ElLa')] [demanding_relation.GetTitledFirstName|l] me segue com um olhar expectante no rosto. Faz tempo que não nos vemos, já que [demanding_relation.GetSheHe] ficou na corte durante minha última viagem, mas está claro que deseja mais do que a minha companhia. \n\nMe olha atentamente com olhos brilhantes e pergunta: \"Você me trouxe alguma coisa da sua viagem?\". \n\nTateio os bolsos, mas não encontro nada além de uma espécie de [ROOT.Char.Custom('RandomWeirdObject')], de que não me lembro como foi parar ali."
 mpo_events_tova.0001.a: "Deixe-me contar sobre minhas viagens em vez disso."
 mpo_events_tova.0001.a.tt.failure: "Você não consegue impressionar [demanding_relation.Custom('ES_AlAla')][demanding_relation.GetTitledFirstName|l]."
 mpo_events_tova.0001.a.tt.success: "Você impressiona [demanding_relation.Custom('ES_AlAla')][demanding_relation.GetTitledFirstName|l]."
 mpo_events_tova.0001.b: "Vou ao mercado e compro algo para você."
 mpo_events_tova.0001.b.equipped_tt: "[wanderer_toy.GetName] comprado para [demanding_relation.Custom('ES_ElLa')] [demanding_relation.GetTitledFirstName|l]."
 gifted_toy_name: "Cavalo de Brinquedo"
 gifted_toy_desc: "Um cavalo de brinquedo de madeira, esculpido de forma primorosa."
 mpo_events_tova.0001.c: "Ser? que estou disposto a mentir para [Select_CString( demanding_relation.IsFemale, 'uma menina', 'um menino' )]?"
 mpo_events_tova.0001.c.tt.failure: "[demanding_relation.Custom('ES_AlAla')|U] [demanding_relation.GetTitledFirstName|l] não é facilmente enganado"
 mpo_events_tova.0001.c.tt.success: "Convence [demanding_relation.Custom('ES_AlAla')] [demanding_relation.GetTitledFirstName|l] de que o item é especial"
 mpo_events_tova.0002.t: "Acordes Distantes"
 DynamicIntroLanded: "Enquanto eu caminho pelos meus corredores"
 DynamicIntroWanderer: "Enquanto caminho pelo acampamento"
 mpo_events_tova.0002.desc: "[ROOT.Char.Custom('DynamicIntroLoc')], ouço o tênue fio de música vindo do pátio. \n\nOs acordes fluem em um coro harmonioso que me faz parar de repente e me atinge com uma profunda nostalgia. Não preciso ouvir a letra para saber que a canção fala de saudade de casa. \n\nAo seguir o som, dou de cara com minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('musician'))], [musician.Custom('ES_ElLa')] [musician.GetTitledFirstName|l]. Ele(a) percorreu uma longa distância desde seu lar e toca sua canção como se quisesse recordar de onde veio. \n\nDe fato, se eu fechar os olhos, consigo imaginar [journey_province.GetName], com [journey_province.Custom('TerrainInspirationLoc')]."
 mpo_events_tova.0002.a: "Eu deveria visitar este lugar algum dia."
 mpo_events_tova.0002.a.tt: "Você pode ganhar experiência extra de [wanderer_lifestyle|E] se visitar [journey_province.GetName] em um [GetActivityType('activity_journey').GetName|l]."
 mpo_events_tova.0002.b: "Usarei meu amor pela música para recrutar[musician.GetHerHim]."
 mpo_events_tova.0002.b.flavor: "Certamente um conjunto é mais desejável do que um acorde solitário?"
 mpo_events_tova.0002.b.tt.success: "Você consegue convencer [musician.Custom('ES_AlAla')] [musician.GetTitledFirstName|l] a se juntar a você"
 mpo_events_tova.0002.b.tt.failure: "Você não consegue convencer [musician.Custom('ES_AlAla')] [musician.GetTitledFirstName|l] a se juntar a você"
 cultural_acceptance_enjoyed_music: "A [cultural_acceptance|lE] entre os [journey_province.GetCounty.GetCulture.GetCollectiveNoun] e os [journey_provice.GetCounty.GetCulture.GetCollectiveNoun] aumentou em [minor_cultural_acceptance_gain]."
 mpo_events_tova.0002.c: "Sente-se por um tempo e aproveite a música."
 mpo_events_tova.0003.t: "Uma Piada Que Foi Longe Demais"
 mpo_events_tova.0003.desc: "O sombrio grasnar de uma ave carniceira me recebe assim que ultrapasso a orla da floresta, onde me deparo com a visão de forcas vazias balançando levemente nos galhos de uma árvore de [unruly_province.Custom('GetRandomRegionalWood')]. Três homens acorrentados se ajoelham sob as cordas com laço. Um deles se parece [unruly_province_owner.Custom('ES_AlAla')] [unruly_province_owner.GetTitledFirstName|l]. \n\n\"Esses vis canalhas zombaram da legítima autoridade de noss[unruly_province_owner.Custom('ES_OA')] [unruly_province_owner.GetTitleTierName|l]!\", grita o carrasco. \"Eles são rebeldes camponeses se passando por atores, e sua campanha de difamação terminará com a morte deles\". \n\n\"Por favor, ajudem-nos\", suplica um dos acusados para mim."
 mpo_events_tova.0003.a: "\"Na verdade, os atores são meus e eu quero eles de volta.\""
 mpo_events_tova.0003.a.tt: "Recrutar os atores convencendo o carrasco de que eles são seus súditos e só você pode decidir sobre o destino deles."
 mpo_events_tova.0003.a.tt.success: "Você convence o carrasco de que os atores e seu destino pertencem a você"
 mpo_events_tova.0003.a.tt.failure: "Seu engano é descoberto e [unruly_province_owner.Custom('ES_ElLa')] [unruly_province_owner.GetTitledFirstName|l] toma conhecimento de suas ações"
 mpo_events_tova.0003.b: "\"Essa punição não é condizente com o crime.\""
 mpo_events_tova.0003.b.tt: "Convencer o carrasco a poupar a vida dos prisioneiros."
 mpo_events_tova.0003.b.tt.success: "Você convence o carrasco a liberar os prisioneiros"
 mpo_events_tova.0003.b.tt.failure: "Você não consegue convencer o carrasco e [unruly_province_owner.Custom('ES_ElLa')] [unruly_province_owner.GetTitledFirstName|l] reprova sua intromissão."
 mpo_events_tova.0003.c: "Eu tenho outros compromissos. Vamos seguir em frente."
 mpo_events_tova.0003.c.tt: "Eles devem ser justamente punidos por seus caminhos malignos!"
 mpo_events_tova.0004.t: "Deslealdade Hierárquica"
 mpo_events_tova.0004.desc: "A penumbra da noite é dissipada pela luz de uma fogueira crepitante, onde um grupo de meus soldados aquartelados compartilha uma refeição. \n\n“Mesmo que eu feche os olhos e tampe o nariz, ainda tenho dificuldade para engolir essa gororoba. Não aguento muito mais esse mingau, nem fuçar entre grãos podres para conseguir minha refeição diária!”. \n\nÉ o que diz aquele que parece ser o líder do grupo, a julgar pelas aclamações e pelas vigorosas palmadas nas costas que recebe dos demais."
 mpo_events_tova.0004.a: "Rações mais restritas vão ensiná-los disciplina."
 mpo_events_tova.0004.a.flavor: "Espero que os soldados descontentes não tomem medidas drásticas..."
 mpo_events_tova.0004.a.tt: "Você vende uma parte das provisões do exército."
 mpo_events_tova.0004.b: "Eu vou cortar a cabeça do líder."
 mpo_events_tova.0004.b.tt: "O jovem ousado é morto imediatamente."
 mpo_events_tova.0004.c: "Eu vou pagar por provisões melhores."
 mpo_events_tova.0005.t: "Soldados Felizes"
 mpo_events_tova.0005.desc: "Uma coluna de fumaça se ergue adiante, e até de alguma distância sinto o agradável cheiro de uma carne assada de caça. Seguindo o cheiro, encontro um grupo de meus soldados estacionados saboreando nada menos que três codornizes. \n\n“Eu poderia me acostumar com essa vida”, proclama o mais barulhento do grupo. “A calma e o sossego fazem bem à alma, e por onde quer que vamos os camponeses têm comida de sobra. Temos sorte de viver em tempos tão pacíficos e de servir a um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleTierName|l] que trata seu povo tão bem”."
 mpo_events_tova.0005.a: "Faça esses preguiçosos entrarem nos eixos."
 mpo_events_tova.0005.b: "Disciplina-os por não estarem vigilantes."
 mpo_events_tova.0005.c: "Tome suas palavras amáveis e felicidade como inspiração."
 mpo_events_tova.0006.t: "Justa Retribuição"
 mpo_events_tova.0006.desc: "Más notícias, meu senhor[ROOT.Char.Custom('ES_XA')]: seus soldados saquearam e incendiaram celeiros em [maa_province.GetCounty.GetName]. Eles desandaram a reclamar de seus estômagos vazios e fizeram acusações traiçoeiras de que vós, meu senhor[ROOT.Char.Custom('ES_XA')], os obrigastes a roubar e saquear para ganhar o pão de cada dia. \n\nAlguns fugiram para o ermo do campo; os que não o fizeram foram mortos no local pelos que permanecem leais a vós. A fome deixa os homens desesperados, ao que parece."
 mpo_events_tova.0006.a: "Esses cães!"
 mpo_special_flavor_events.0001.t: "A Estepe da Água Infinita"
 mpo_special_flavor_events.0001.desc: "Ouvi histórias sobre o mar. Sobre sua beleza e seu horror, e como ele eclipsa a estepe em ambos os aspectos. Hoje, vejo essa imensa água com meus próprios olhos pela primeira vez.\n\nE finalmente entendo o brilho nos olhos dos contadores de histórias enquanto buscavam palavras para descrever essa extensão sem fim. Sento-me e contemplo o horizonte, onde o familiar céu límpido de Tengri toca suavemente a água azul.\n\nSinto uma névoa salina acariciando meu rosto com delicadeza. O ritmo sereno das ondas enche meus ouvidos. A tranquilidade do mar é avassaladora, ainda que por um momento."
 mpo_special_flavor_events.0001.a: "Que majestade..."
 mpo_special_flavor_events.0001.b: "Acho que vou ficar aqui por um tempo"
 mpo_events_tova.0025.t: "Tiro ao Osso"
 mpo_events_tova.0025.desc: "Ouço o som familiar de uma competição e os #EMP CRACS!#! das peças de osso ao colidirem contra seu alvo de madeira muito Antes que meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('challenger_anda'))], [challenger_anda.Custom('ES_ElLa')] [challenger_anda.GetTitledFirstName|l], se aproxime de mim com um brilho mais comum de desafio no olhar.\n\n“O que me diz? Vamos formar dupla para uma partida de [Glossary( 'shagai', 'SHAGAI_GLOSS')]!”"
 mpo_events_tova.0025.a: "Vamos enganar nossos oponentes."
 mpo_events_tova.0025.a.tt.success: "Você venceu o jogo usando táticas excelentes"
 mpo_events_tova.0025.a.tt.failure: "Sua mente se mostrou embotada"
 mpo_events_tova.0025.b: "Eu vou esmagar os tokens dos nossos oponentes!"
 mpo_events_tova.0025.b.tt.success: "Você venceu o jogo usando sua força"
 mpo_events_tova.0025.b.tt.failure: "Sua força se mostrou fraca"
 mpo_events_tova.0025.c: "Hoje não, amig[challenger_anda.Custom('ES_OA')]."
 mpo_sharp_wits_modifier: "Inteligência Afiada"
 mpo_sharp_wits_modifier.desc: "Este personagem aprimora seus sentidos e inteligência através de feitos táticos no tiro ao osso."
 mpo_thunder_knuckles_modifier: "Punhos Trovejantes"
 mpo_thunder_knuckles_modifier.desc: "Este personagem lança os ossos com força semelhante a um poderoso estrondo de trovão."
 mpo_events_tova.0030.t: "Uma Visão Sublime"
 mpo_events_tova.0030.desc: "O sol mal coloreia o horizonte quando meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('visionary'))], [visionary.Custom('ES_ElLa')] [visionary.GetTitledFirstName|l], corre ao meu lado com as bochechas coradas e os olhos brilhando.\n\n\"Meu [ROOT.Char.GetTitleTierName|l], devo compartilhar uma visão que me veio em sonhos!\" grita. \"Vi"
 mpo_events_tova.0030.desc_red: "um boi vermelho com sinos nos chifres, sacudindo a cabeça de um lado para o outro. Mugia"
 mpo_events_tova.0030.desc_white: "uma leoparda branca saltando das nuvens e abrindo sulcos profundos na areia. Rosnava"
 mpo_events_tova.0030.desc_green: "um galo verde correndo sobre os raios do sol e batendo as asas. Ele cocoricava"
 mpo_events_tova.0030.desc_outro: "que [ROOT.Char.Custom('ES_ElLa')] grande [ROOT.Char.GetTitledFirstNameNoTooltip|l] está destinad[ROOT.Char.Custom('ES_OA')] a governar sobre o céu e a terra!\"."
 mpo_events_tova.0030.a: "Você é verdadeiramente abençoado com talentos especiais!"
 mpo_events_tova.0030.b: "Os céus devem me favorecer e minhas ações."
 mpo_events_tova.0030.c: "Uma bela história."
 mpo_heavens_favor_modifier: "Favor dos Céus"
 mpo_heavens_favor_modifier.desc: "Este personagem é encorajado por visões afortunadas."
 mpo_heavens_favor_martial_modifier: "$mpo_heavens_favor_modifier$"
 mpo_heavens_favor_martial_modifier.desc: "$mpo_heavens_favor_modifier.desc$"
 mpo_heavens_favor_diplo_modifier: "$mpo_heavens_favor_modifier$"
 mpo_heavens_favor_diplo_modifier.desc: "$mpo_heavens_favor_modifier.desc$"
 mpo_events_tova.0035.t: "O Homem da Montanha"
 mpo_events_tova.0035.desc: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('distressed_anda'))], [distressed_anda.Custom('ES_ElLa')] [distressed_anda.GetTitledFirstName|l], afasta de um golpe a aba de feltro da minha iurta ao entrar. O peito sobe e desce[distressed_anda.Custom('ES_OA')] com frustração contida. \n\n\"Escutem isto!\", exclama. \"[pregnant_woman.Custom('ES_ElLa')|U] [pregnant_woman.GetTitledFirstName|l] está grávida e tenho certeza de que o filho não é meu\".\n\n\"Quando a confrontei, ela me disse que sonhou com um urso descendo de uma grande montanha, e que a fera se transformou em fumaça na forma de um homem, então a fumaça se assentou sobre sua barriga. Na manhã seguinte, sentiu os primeiros sinais de gravidez\"."
 mpo_events_tova.0035.a: "Regozije-se! Os céus enviaram-lhe um filho."
 mpo_events_tova.0035.a.tt: "O filho pode nascer com uma habilidade notável."
 mpo_events_tova.0035.b: "Ela te alimenta com nada além de mentiras."
 mpo_events_tova.0035.c: "Essa é a coisa mais engraçada que já ouvi!"
 mpo_events_tova.0045.t: "Um Amigo Precioso"
 mpo_events_tova.0045.desc: "\"Meu [ROOT.Char.GetTitleAsName|l], embora nossa amizade seja mais dura que o pescoço de uma ovelha, desejo lhe dar um presente como prova da minha lealdade inabalável\", me diz meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('generous_anda'))], [generous_anda.Custom('ES_ElLa')] [generous_anda.GetTitledFirstName|l], enquanto compartilhamos o calor da fogueira.\n\n"
 mpo_events_tova.0045.desc_knucklebone: "Ele enfia a mão no bolso e retira uma bolsa, que ao abrir revela uma peça de [Glossary( 'shagai', 'SHAGAI_GLOSS')] com peso de cobre. Então, ele continua: \"Venci muitos desafios com este osso e tenho certeza de que lhe trará boa sorte.\""
 mpo_events_tova.0045.desc_herd: "Ele aponta para os pastos de ovelhas à distância e continua: \"Trouxe um rebanho de ovelhas que ganhei em uma partida de [Glossary( 'shagai', 'SHAGAI_GLOSS')]. Que ele alimente e sustente você e sua família.\""
 mpo_events_tova.0045.desc_axe: "Ele revela um machado de guerra, finamente polido e, sem dúvida, igualmente afiado. Então, ele continua: \"Conquistei esta arma durante nossa última batalha juntos, arrancando-a das mãos frias de um inimigo caído.\""
 mpo_events_tova.0045.a: "Obrigado pela oferta generosa."
 mpo_events_tova.0045.a.equipped_tt: "Recebeu [gift.GetName]."
 mpo_events_tova.0045.b: "Sua amizade é o único presente que preciso."
 gifted_bone_name: "Osso de Jogo com Peso de Cobre"
 gifted_bone_desc: "Um osso de carneiro incrustado com cobre, usado em jogos de arremesso de ossos."
 gifted_axe_name: "Machado da Conquista"
 gifted_axe_desc: "Um machado de guerra, perfeitamente balanceado."
