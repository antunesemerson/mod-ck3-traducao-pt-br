 mpo_jamukha_flavor.0001.t: "Anos de Irmandade"
 mpo_jamukha_flavor.0001.desc: "[temujin.Custom('ES_ElLa')|U] [temujin.GetTitledFirstName|l] e eu nos sentamos junto ao fogo. Nossos povos se uniram ao nosso redor em um grande acampamento.

Anos se passaram desde que ofereci amizade pela primeira vez ao jovem guerreiro abandonado pelo clã de seu pai. Jogamos ossinhos sobre o gelo do rio Onon. Juramos que seríamos amigos para sempre.

Éramos crianças naquela época. Desde então, guerreamos juntos, e nossa amizade cresceu. Agora, como homens, conhecemos as palavras para ser [Glossary( 'anda', 'ANDA_GLOSS' )] por toda a vida."
 mpo_jamukha_flavor.0001.a: "Aos nobres caçadores, este personagem prometeu uma montanha de boa carne. E não entregou."
 mpo_jamukha_flavor.0001.a.tt: "@warning_icon! #X [temujin.GetShortUIName] pode prejudicar seu @prestige_icon![prestige|lE] e @dread_icon![dread|lE]#!"
 mpo_jamukha_flavor.0001.b: "[jamukha.GetShortUIName] e [togrul.GetShortUIName] entram em uma [alliance|lE] mútua"
 mpo_nerge_promised_feast_failed: "Ofensas que Nenhum Mongol Pode Suportar"
 mpo_nerge_promised_feast_failed_desc: "Tenho conduzido meu povo, já há algum tempo, ao lado de [temujin.Custom('ES_AlAla')] [temujin.GetTitledFirstName|l], leal aos seus caprichos, constante apesar da minha mente atribulada.

As mulheres sussurram veneno ao ouvido de [temujin.GetFirstNameNoTooltip]. Seus guardas noturnos me observam com ar sombrio quando me aproximo de sua iurta. Quanto tempo ainda suportarei esses desdéns?

"
 jamukha_temujin_response_warning_tt: "E [Select_CString(togrul.IsFemale, 'a poderosa', 'o poderoso' )] [togrul.GetName|l] me prometeu sua proteção se eu abandonasse [temujin.GetFirstNameNoTooltip]..."
 negotiate_togrul_alliance_effect_tooltip: "Homens com Sonhos Sangrentos"
 mpo_jamukha_flavor.0010.t: "Monto à noite até o acampamento [temujin.Custom('ES_DelDela')] [temujin.GetTitledFirstName|l], ardendo de ira e vergonha. O destino - pensamentos sombrios além da luz do fogo da minha mente - me compele.

Quando [temujin.GetFirstNameNoTooltip] e eu éramos crianças, repartimos o cadáver de uma marmota. Sua carne permaneceu em minhas entranhas, como veneno, todos esses anos. Nossas palavras de amizade queimam minha mente e arrancam minha pele quando me lembro delas. #EMP Como#! pude jurar fidelidade ao homem destinado a governar todos os mongóis - #EMP meu#! destino? Com minhas promessas de criança, dei a mim mesmo a vida de um traidor.

#EMP "Eu vou te destruir!"#!, grito enquanto [temujin.GetFirstNameNoTooltip] zomba. #EMP "Eu, [ROOT.Char.GetFirstName], sou khan dos [ROOT.Char.GetDomicile.GetCulture.GetCollectiveNoun]!"#!."
 mpo_jamukha_flavor.0010.desc: "Tenho conduzido meu povo, já há algum tempo, ao lado de [temujin.Custom('ES_AlAla')] [temujin.GetTitledFirstName|l], leal aos seus caprichos, constante apesar da minha mente atribulada.

As mulheres sussurram veneno ao ouvido de [temujin.GetFirstNameNoTooltip]. Seus guardas noturnos me observam com ar sombrio quando me aproximo de sua iurta. Quanto tempo ainda suportarei esses desdéns?

"
