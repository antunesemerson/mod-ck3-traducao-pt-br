l_spanish:
 mpo_temujin_flavor.0001.t: "Abandonado, Nunca Mais"
 mpo_temujin_flavor.0001.desc: "A noite se escurece. Restamos apenas [jamukha.Custom('ES_ElLa')] [jamukha.GetTitledFirstName|l] e eu no acampamento.\n\n\"[ROOT.Char.GetFirstNameNoTooltip]\", [jamukha.GetFirstNameNoTooltip] me aponta com sua adaga. \"Nos dias de guerra, lutei ao seu lado para recuperar sua senhora esposa. Nos dias de paz, ouvirei seu conselho, trocarei presentes com você e o seguirei até que minhas pernas não me sirvam mais\".\n\nA adaga toca a palma de sua mão e faz um corte profundo: \"Que o sangue jure o que a língua não pode\"."
 mpo_temujin_flavor.0001.a: "\"Estarei com você até meus olhos ficarem brancos.\""
 mpo_temujin_flavor.0001.b: "\"O lobo não precisa da ovelha.\""
 mpo_temujin_flavor.0010.t: "Adeus"
 mpo_temujin_flavor.0010.desc.intro: "\"Chegou a hora, [ROOT.GetCharacter.Custom('GetMongolHonorific')] [ROOT.Char.GetFirstNameNoTooltip],\" [jamukha.GetFirstName] senta-se à frente da fogueira. \"Sob sua justa liderança, floresci, mas a semente não cresce à sombra da árvore.\"\n\nEle se levanta."
 mpo_temujin_flavor.0010.desc.rejected: "\"Você me rejeitou uma vez. Espero que entenda.\""
 mpo_temujin_flavor.0010.desc.blood_brothers: "\"Foi diante desta mesma fogueira que juramos um voto que pretendo cumprir. Mas meu povo exige liberdade.\""
 mpo_temujin_flavor.0010.desc.fallback: "\"Meu povo só quer a mesma liberdade que o seu povo.\""
 mpo_temujin_flavor.0010.aa: "\"Vá, então! Se esconda como a minhoca que você é.\""
 mpo_temujin_flavor.0010.aa_remove_blood_brother: "Você deixa de ser [Concept('blood_brother',Select_CString(ROOT.Char.IsFemale, 'irmã de sangue', 'irmão de sangue'))|E] com [jamukha.GetShortUIName]"
 mpo_temujin_flavor.0010.a: "\"Você está forçando seu povo a comer terra.\""
 mpo_temujin_flavor.0010.a.tt.success: "[jamukha.GetShortUIName] é zombado"
 mpo_temujin_flavor.0010.a.tt.failure: "Ninguém parece se importar"
 mpo_temujin_flavor.0010.b: "\"#EMP Fique.#!"
 mpo_temujin_flavor.0010.c: "\"Você fez sua escolha.\""
 every_non_brave_compassionate_courtier: "Cada [courtier|lE] que não for [GetTrait('brave').GetName( GetNullCharacter )|l] ou [GetTrait('compassionate').GetName( GetNullCharacter )|l]"
 mpo_temujin_flavor.0020.t: "A traição de [jamukha.GetFirstNameNoTooltip]"
 mpo_temujin_flavor.0020.desc.intro: "\"[ROOT.Char.GetFirstNameNoTooltip]! [ROOT.Char.GetFirstNameNoTooltip]!\". Uma voz familiar me desperta no meio da noite. \"Sinto muito, mas chegamos a isso\", [jamukha.GetFirstName] está montad[jamukha.Custom('ES_OA')] em seu cavalo, bem na porta da minha tenda.\n\n\"Estou aqui para avisar vocês."
 mpo_temujin_flavor.0020.desc.blood_brothers: "Pelo sangue que derramamos juntos."
 mpo_temujin_flavor.0020.desc.friend: "Pela amizade que compartilhamos."
 mpo_temujin_flavor.0020.desc.rival: "Uma deferência que eu demonstraria a um[ROOT.Char.Custom('ES_XA')] dign[ROOT.Char.Custom('ES_OA')] rival\"."
 mpo_temujin_flavor.0020.desc.fallback: "Um gesto que devo à minha anterior [ROOT.Char.GetLadyLord]."
 mpo_temujin_flavor.0020.desc.outro: "\n\n\"A partir deste momento, irei caçar e perseguir você. Cortarei as águas profundas e corroerei a pedra brilhante. Não há nada que eu não faça para acabar com você — pois sou eu quem nasceu para liderar todos os Mongóis — #EMP não você!#!\""
 mpo_temujin_flavor.0020.a: "\"Você, quem eu chamei de irmão uma vez...\""
 mpo_temujin_flavor.0020.b: "\"Minha faca encontrará seu pescoço.\""
 mpo_temujin_flavor.0020.c: "\"Você vai se arrepender disso!\""
 temujin_jamukha_truce: "Antigo senhor"
 mpo_temujin_flavor.0020.cb.tt: "[temujin.GetShortUIName] e [jamukha.GetShortUIName] recebem [casus_bellis|lE] #high $retaliation_cb$#! um contra o outro"
 mpo_temujin_flavor.0020.jamukha_gok_requirement: "[jamukha.GetShortUIName] deve ser derrotado para tomar a [decision|El] #high $mpo_become_greatest_of_khans_decision$#!"
 mpo_temujin_flavor.0020.a_war_win: "Vencer uma #high ofensiva#! [war|lE] contra [jamukha.GetShortUIName] concederá bônus adicionais de @legitimacy_icon![legitimacy|lE] e @prestige_icon![prestige|lE]"
 mpo_temujin_flavor.0020.b_murder: "Você ganha um bônus #P #EMP maciço#!#! para [schemes|lE] de [GetScheme('murder').GetTypeName|l] direcionado a [jamukha.GetShortUIName]"
 TEMUJIN_JAMUKHA_MURDER_BONUS: "Você jurou assassinar [target.GetShortUIName]: $VALUE|+0=$"
 temujin_jamukha_war_modifier: "A Vingança de um Irmão"
 temujin_jamukha_war_modifier_desc: "Este personagem foi traído por alguém muito próximo ao seu coração."
 temujin_jamukha_war_smaller_modifier: "Uma Vingança Sangrenta"
 temujin_jamukha_war_smaller_modifier_desc: "Este personagem foi traído por alguém em quem confiava."
 mpo_temujin_flavor.0020.remove_friend: "Você deixa de ser [Concept('friends',Select_CString(ROOT.Char.IsFemale, 'amiga', 'amigo'))|E] de [jamukha.GetShortUIName]"
 mpo_temujin_flavor.0030.t: "A Ofensa dos [mergid.GetDynastyNameNoTooltip]"
 mpo_temujin_flavor.0030.desc: "\"[ROOT.Char.GetFirstNameNoTooltip],\" me chama em voz baixa [borte.GetFirstNameNoTooltip] ao entrar em minha tenda. Seu rosto está corado e seu cabelo está despenteado. \"Desde que os [mergid.GetDynastyName] me mantiveram cativ[borte.Custom('ES_OA')] ada, não me sinto bem.\"\n\nE ela cobre o ventre com mãos trêmulas."
 mpo_temujin_flavor.0030.a: "\"[mergid.GetFirstNameNoTooltip] pagará por isso\"."
 mpo_temujin_flavor.0030.b: "\"#EMP Você#! é a coisa mais importante aqui."
 mpo_temujin_flavor.0030.c: "\"Por que você me incomoda com essa bobagem?\""
 mpo_temujin_flavor.0030.a.tt: "Você recebe um [casus_belli|lE] #high $retaliation_cb$#! contra [mergid.GetShortUIName]"
 mpo_temujin_flavor.0030.pregnancy_tt: "[borte.GetShortUIName] logo mostrará sinais de gravidez"
 pregnancy.1002.d.borte: "O temido momento chegou..."
 pregnancy.1002.a.borte: "Agora está feito."
 birth.1003.desc.borte: "\n\nNo entanto, a sinceridade de [mother.GetFirstNameNoTooltip] é admirável e isso não deve me distrair do que está à minha frente."
 birth.1003.desc.empty: ""
