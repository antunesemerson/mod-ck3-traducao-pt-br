l_spanish:
 ##################################################
 ##Misc
 fp2_lyonese_monk.0000.t.revealed: "Ensinos Estranhos:"
 fp2_lyonese_monk.0000.t.council: "Concílio:"
 fp2_lyonese_monk_cancel_chain_effect.tt: "Durante a tentativa de prisão, [acolyte.GetFirstName] é morto(a)."
 fp2_lyonese_monk.0000.tt.continues_to_teach: "[acolyte.GetFirstName] continua a ensinar."
 fp2_lyonese_monk.0000.tt.teachings_fade: "Os ensinamentos de [acolyte.GetFirstName] se desvanecerão"
 fp2_lyonese_monk.0000.tt.is_humbled: "#EMP [acolyte.GetFirstName] es humillad[acolyte.Custom('ES_OA')]#!"
 fp2_lyonese_monk.0000.tt.is_paused: "#EMP A [acolyte.GetFirstName] se le hace reflexionar#!"
 fp2_lyonese_monk.0000.tt.is_emboldened: "#EMP [acolyte.GetFirstName] se ve envalentonad[acolyte.Custom('ES_OA')]#!"
 fp2_lyonese_monk.0000.tt.favour_elipandics: "A [GetFaithDoctrine('special_doctrine_adoptionist_school_elipandic_doctrine').GetBaseName|l] vence o debate."
 fp2_lyonese_monk.0000.tt.favour_felicians: "A [GetFaithDoctrine('special_doctrine_adoptionist_school_felicitous_doctrine').GetBaseName|l] vence o debate."
 fp2_lyonese_monk.0000.tt.favour_radicals: "O [GetFaithDoctrine('special_doctrine_adoptionist_school_radical_doctrine').GetBaseName|l] vence o debate"
 ##################################################
 ##Setup & Misc
 fp2_lyonese_monk.0001.t: "Uma Noite Açoitada pela Tempestade"
 fp2_lyonese_monk.0001.desc: "Os ventos açoitam e se voltam contra as pedras de [acolyte_host.GetCapitalLocation.GetTitle.GetNameNoTier]. Uivam pela noite como os cães de caça de [acolyte_host.GetFaith.NegativeAfterLife], tentando furiosamente me arrancar do meu refúgio.\n\nO chamado do meu quarto aquecido me aguarda, longe destes corredores cheios de corrente de ar, mas… será aquela a porta do salão? Viro-me, sobressaltado com o barulho inesperado, e me deparo com um[acolyte.Custom('ES_XA')] [acolyte.GetWomanMan] sant[acolyte.Custom('ES_OA')] encharcad[acolyte.Custom('ES_OA')] e esfarrapad[acolyte.Custom('ES_OA')], que cambaleia sobre o chão seco.\n\n\"Mi–\", tosse, cuspindo um torrão de fleuma úmida, \"Meu [acolyte_host.GetLadyLord], por favor! O vendaval está feroz e estou na estrada há muitos meses. Imploro-vos, permiti-me uma cama até o amanhecer e até a tormenta passar?\"."
 fp2_lyonese_monk.0001.a: "Claro, fique o tempo que quiser!"
 fp2_lyonese_monk.0001.b: "Você pode ficar por #EMP a#! noite."
 fp2_lyonese_monk.0001.c: "Em [acolyte_host.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] não há mendigo[acolyte.Custom('ES_OA')]s. #EMP Largo#!."
 fp2_lyonese_monk.0011.t: "Uma amizade de suas[dead_owner.Custom('ES_OA')] [acolyte_host.Custom2('RelationToMeShort', dead_owner)]"
 fp2_lyonese_monk.0011.desc: "\"Meu [acolyte_host.GetLadyLord], poderia me conceder um minuto do seu tempo?\", pergunta um[acolyte.Custom('ES_XA')] clérig[acolyte.Custom('ES_OA')] que tenho diante de mim. \"Meu nome é [acolyte.GetFullNameNoTooltip] e fui um[acolyte.Custom('ES_XA')] humilde servo[acolyte.Custom('ES_XA')] de seu[dead_owner.Custom('ES_OA')] [acolyte_host.Custom2('RelationToMeShort', dead_owner)]\".\n\n\"Sei que ainda deveis estar enlutad[ROOT.Char.Custom('ES_OA')], mas seu[dead_owner.Custom('ES_OA')] predecessor[dead_owner.Custom('ES_XA')] e eu tínhamos um acordo, e devo perguntar: permitis que eu fique em sua corte e continue ensinando aos vossos cortesãos os caminhos de [acolyte.GetFaith.HighGodName]?\"."
 fp2_lyonese_monk.0011.a: "Bem, eu suponho..."
 fp2_lyonese_monk.0011.b: "Junte seus pertences, vagabundo[acolyte.Custom('ES_OA')]"
 fp2_lyonese_monk.0021.t: "Feito e Acabado"
 fp2_lyonese_monk.0021.desc.intro: "Sem [acolyte.GetFullNameNoTooltip] que vagueie por meu domínio, a popularidade de seus ensinamentos começa a despencar. Sem pregador[acolyte.Custom('ES_XA')], não há pregados.\n\n"
 fp2_lyonese_monk.0021.desc.dead: "As consequências de sua morte são um assunto tranquilo, que duvido que muitos se lembrem daqui a uma década ou um século."
 fp2_lyonese_monk.0021.desc.imprisoned: "Embora [acolyte.GetFirstName] apenas definhe na prisão, as lembranças da maioria são curtas, e há uma sensação de esmagadora definitividade em sua sentença."
 fp2_lyonese_monk.0021.desc.gone: "Onde #EMP fue#! foi parar exatamente [acolyte.GetFirstName] é uma questão sem resposta, mas duvido que a maioria das pessoas tenha muito interesse nisso."
 fp2_lyonese_monk.0021.a: "Não pode ter sido tão importante…"
 fp2_lyonese_monk.0021.b: "Estava claro que dava mais trabalho do que valia a pena…"
 fp2_lyonese_monk.0021.c: "Tudo isso por nada?"
 fp2_lyonese_monk.0031.t: "Fé Despedaçada"
 fp2_lyonese_monk.0031.desc.acolyte_host: "Abraçar a luz da [acolyte_host.GetFaith.GetName] não foi algo que eu fizesse levianamente, e muitos se ofenderam comigo por meu ato de piedade.\n\nDe [acolyte.GetFirstName] esperava ouvir mais críticas, mas, em vez disso, simplesmente… desapareceu. Um dia aqui, no seguinte, já não estava mais.\n\nNão me lembro de palavras finais, mas me lembro de uma carranca triste."
 fp2_lyonese_monk.0031.desc.acolyte: "De todas as pessoas que se converteram, eu jamais esperaria que um[acolyte.Custom('ES_XA')] fanátic[acolyte.Custom('ES_OA')] como #EMP [acolyte.GetFirstName]#! abandonasse [acolyte_host.GetFaith.HighGodName]. Ainda assim, vivemos tempos estranhos, e ele o fez.\n\nSua pregação habitual foi abandonada, substituída por um tipo de zelo muito mais prosaico."
 fp2_lyonese_monk.0031.a: "Não preciso de [acolyte.GetFirstNameNoTooltip] quando tenho [acolyte_host.GetFaith.HighGodName]!"
 fp2_lyonese_monk.0031.b: "Não estava tão comprometi[acolyte.Custom('ES_OA')] do."
 fp2_lyonese_monk.0041.t: "Problemas Maiores"
 fp2_lyonese_monk.0041.desc.pope_hope_is_nope: "O impensável aconteceu — a completa destruição da Sé de Roma. A rocha literal e metafórica da nossa Igreja foi rasgada e ninguém tem tempo para questões mesquinhas de especificidades dogmáticas.\n\nAs almas de todos os fiéis de Cristo estão para sempre em risco sem uma liderança espiritual firme. O que mais importa diante disso?"
 fp2_lyonese_monk.0041.desc.schism: "Recentes turbulências criaram um abismo entre nós e a Papalidade — à luz disso, não temos tempo para discutir as mesquinhas especificidades do dogma. O que nos importa com as interpretações deles, seus problemas, sua tagarelice desordenada quando não reconhecemos mais a autoridade espiritual deles?\n\nCom certeza, alguém que pense que isso é algo menos que uma bênção não é bem-vindo na comunidade dos fiéis."
 fp2_lyonese_monk.0041.a.pope_hope_is_nope: "Quem nos guiará sem o Vigário de Cristo?"
 fp2_lyonese_monk.0041.a.backup: "Agora teremos um monte de #EMP controvérsias#! novas!"
 fp2_lyonese_monk.0051.t: "É um Mistério"
 fp2_lyonese_monk.0051.desc: "Desde meu encarceramento, o contato com o mundo exterior tem sido escasso. Só me chegam mensagens sussurradas e, ocasionalmente, algum bilhete amassado, e ainda assim, raramente.\n\nO último desses retalhos de informação foi que [acolyte.GetFirstName] desapareceu, para todos os efeitos. Não está claro se simplesmente partiu um dia ou se algo mais sinistro está em jogo, mas, de qualquer forma, o(a) se foi."
 fp2_lyonese_monk.0051.a: "O que terá acontecido?"
 ##################################################
 ##Private Teachings
 fp2_lyonese_monk.0201.t: "Apenas alguns amigos"
 fp2_lyonese_monk.0201.desc: "Desde sua chegada, [acolyte.GetFirstName] se tornou uma espécie de figura constante na corte. Estranhamente carismátic[acolyte.Custom('ES_OA')], pelo menos em questões teológicas, está sempre tendo pequenas conversas nas alcovas do keep com este $knight_culture_player_no_tooltip$ ou aquele cortesão.\n\nPor isso, eu esperava um pouco quando ele veio me pedir uma sala para sediar um grupo de estudo semanal da [acolyte.GetFaith.random_ReligiousText].\n\n\"Por favor, meu [acolyte_host.GetTitleAsNameNoTooltip]? Isso significaria o mundo para mim, e há tanto que eu poderia compartilhar com seus súditos sobre os caminhos e a vontade de [acolyte.GetFaith.HighGodName]. Eu só precisaria de sua permissão e de um pequeno espaço onde nos reunir\"."
 fp2_lyonese_monk.0201.a: "Eu acho que não iria prejudicar..."
 fp2_lyonese_monk.0201.a.tt: "[acolyte.GetFirstNameNoTooltip] começará a realizar sessões de estudo aos domingos"
 fp2_lyonese_monk.0201.b: "Um grupo de conspiradores #EMP da EMP#!? Eu acho que não!"
 fp2_lyonese_monk.0201.c: "Acho que você prolongou demais a sua estadia, [acolyte.GetFirstNameNoTooltip]."
 fp2_lyonese_monk.0211.t: "[baron.Custom2('AppropriateGreetingPositive', acolyte_host)]"
 fp2_lyonese_monk.0211.desc: "Devo informá-lo com alegria que estou renunciando imediatamente ao meu posto governando [baron_holding.GetNameNoTier].\n\nMinha fé me chama ao serviço de [acolyte.GetFaith.HighGodName], e pretendo dedicar o restante dos meus dias absolutamente ao seu serviço."
 fp2_lyonese_monk.0211.a: "Será que #EMP hacer#! isso?"
 fp2_lyonese_monk.0221.t: "Um sorriso sardônico"
 fp2_lyonese_monk.0221.desc: "Com uma grande reunião de monges e freiras tão perto do nosso castelo, os espíritos estão elevados. Ouço riso e cânticos nos jardins."
 fp2_lyonese_monk.0221.a: "Que bom que você está indo bem, [courtier.GetFirstNameNoTooltip]!"
 fp2_lyonese_monk.0221.b: "Tenho um mau pressentimento sobre isso..."
 fp2_lyonese_monk.0231.t: "Vaias ao Bispo"
 fp2_lyonese_monk.0231.desc: "Tudo isso está indo muito mal."
 fp2_lyonese_monk.0231.a: "As pessoas precisam mostrar mais #EMP respeito#! à Igreja."
 fp2_lyonese_monk.0231.b: "Está claro que precisa trabalhar mais em seus sermões."
 fp2_lyonese_monk.0241.t: "É tudo culpa dela"
 fp2_lyonese_monk.0241.desc: "Com um rugido poderoso, [acolyte_host.GetTitledFirstName] aponta para [acolyte.GetTitledFirstName].\n\n\"Meu [title]! É tudo culpa dess[acolyte.Custom('ES_EA')] canalh[acolyte.Custom('ES_OA')]! Camponeses desrespeitosos, cortesãos #EMP felizes#!, a estranha chegada de monges e freiras! Est[acolyte.Custom('ES_EA')] [acolyte.GetWomanMan] enche a cabeça deles de mentiras e heresias toda semana, e faz isso com #EMP vosso selo#!!\"\n\n[acolyte.GetFirstNameNoTooltip] fica quase vermelh[acolyte.Custom('ES_OA')] de raiva.\n\n\"Eu nego essas acusações! Sou um[acolyte.Custom('ES_XA')] fiel serv[acolyte.Custom('ES_OA')] de Cristo e [acolyte.GetFaith.ReligiousHeadName], [ROOT.Char.GetLadyLord], e [acolyte_host.GetFirstNameNoTooltip] é [acolyte_host.Custom('ES_ununa')] d[acolyte_host.Custom('ES_esas')] [acolyte_host.Custom('ES_LoLa')] que só está irritad[acolyte_host.Custom('ES_OA')] porque os padrões locais para clérigos aumentaram recentemente.\""
 fp2_lyonese_monk.0241.a: "Muito bem - empacote suas coisas, [acolyte.GetFirstNameNoTooltip]."
 fp2_lyonese_monk.0241.b: "Guardas! Prendam es[irate_theocrat.Custom('ES_EA')] desgraçad[irate_theocrat.Custom('ES_OA')] heterodox[irate_theocrat.Custom('ES_OA')]!"
 fp2_lyonese_monk.0241.c: "Eu acho que #EMP você é#! o problema aqui, [irate_theocrat.GetFirstNameNoTooltip]."
 fp2_lyonese_monk.0241.c.tt: "[acolyte.GetFirstNameNoTooltip] continuará a ensinar seus cortesãos."
 ##################################################
 ##Public Controversy
 fp2_lyonese_monk.0401.t: "[pope.Custom2('AppropriateGreetingNegative', acolyte_host)]"
 fp2_lyonese_monk.0401.desc: "Recentemente recebi correspondências preocupantes a respeito de ensinamentos desviados em sua corte.\n\nComo sei que sois um[acolyte_host.Custom('ES_XA')] bom[acolyte_host.Custom('ES_XA')] fiel da fé [pope.GetFaith.GetAdherentName], confio que esta epístola será suficiente para que façais o que é certo e banir[acolyte.Custom('ES_AlAla')] tal #EMP [acolyte.GetFirstName]#!, pela saúde espiritual de todos nós."
 fp2_lyonese_monk.0401.a: "A Santa Sé me obriga."
 fp2_lyonese_monk.0401.b: "Não me lembro de ter pedido a opinião de [papal_capital.GetNameNoTierNoTooltip]."
 fp2_lyonese_monk.0411.t: "$fp2_lyonese_monk.0000.t.revealed$ Espaço para ensinar"
 fp2_lyonese_monk.0411.desc: "\"Meu [acolyte_host.GetLadyLord|U], poderia me conceder um breve momento do seu tempo?\", [acolyte.GetFirstName] surge das sombras de um nicho quando saio da capela da minha torre de menagem. Penso por um segundo e concordo com a cabeça.\n\n\"Estou verdadeiramente, abjetamente agradecid[acolyte.Custom('ES_OA')] pelo seu apoio e patrocínio à minha missão de ensinar seus súditos a Palavra de [acolyte.GetFaith.HighGodName], mas me vejo esbarrando nos limites do que posso fazer com uma pequena sala e poucas horas por semana\".\n\n\"Estaria, em sua imensa sabedoria e generosidade, dispost[acolyte_host.Custom('ES_OA')] a me conceder o domínio de [acolyte_fief.GetNameNoTier]? Com as rendas do feudo, eu poderia passar de salvar dezenas de almas para salvar milhares!\"."
 fp2_lyonese_monk.0411.a: "Eu suponho... Eu suponho que eu poderia permitir isso..."
 fp2_lyonese_monk.0411.b: "Não seja ridículo!"
 fp2_lyonese_monk.0411.b.tt: "Os sonhos de [acolyte.GetFirstNameNoTooltip] são completamente esmagados"
 fp2_lyonese_monk.0421.t: "$fp2_lyonese_monk.0000.t.revealed$ Altas Tensões"
 fp2_lyonese_monk.0421.desc: "Um único jantar será suficiente para eu emitir meu julgamento. Afinal, #EMP o quê#! as clérigas e os clérigos têm para conversar com as pessoas, além da glória de Cristo, da extensão da pobreza local e da qualidade de seus pãezinhos?"
 fp2_lyonese_monk.0421.a: "[irate_theocrat.GetFirstNameNoTooltip], mostre um pouco de decoro!"
 fp2_lyonese_monk.0421.b: "[acolyte.GetFirstNameNoTooltip], #EMP respetaréis#! sua autoridade!"
 fp2_lyonese_monk.0421.c: "Vocês dois não têm mais em comum do que não têm?"
 fp2_lyonese_monk.0431.t: "[pope.Custom2('AppropriateGreetingNegative', acolyte_host)]"
 fp2_lyonese_monk.0431.desc.pope.different: "Talvez meu antecessor"
 fp2_lyonese_monk.0431.desc.pope.same: "Talvez eu"
 fp2_lyonese_monk.0431.desc.outro: "\"Entregai[acolyte.Custom('ES_LoLa')] para que seja julgad[acolyte.Custom('ES_OA')] imediatamente.\""
 fp2_lyonese_monk.0431.a: "Não é sábio irritar o trono de São Pedro..."
 fp2_lyonese_monk.0431.b: "Talvez haja um meio termo aqui."
 fp2_lyonese_monk.0431.b.tt.success: "[pope.GetTitledFirstNameNoTooltip|l] fica um pouco mais calmo"
 fp2_lyonese_monk.0431.b.tt.failure: "Seus argumentos desajeitados enfurecem o Papa"
 fp2_lyonese_monk.0431.c: "Maldição, eu sou o [acolyte_host.GetTitleAsNameNoTooltip]!"
 fp2_lyonese_monk.0441.t: "$fp2_lyonese_monk.0000.t.revealed$: O Conselho de [council_1_venue.GetNameNoTierNoTooltip]"
 fp2_lyonese_monk.0441.desc: "[council_1_venue.GetNameNoTier] está#EMP abarrotado#! de clérigos e eruditos, prontos para testemunhar um debate público entre [acolyte.GetFullNameNoTooltip] e [irate_theocrat.Custom2('MyCharacterIntroduction' , acolyte_host)], amb[acolyte.Custom('ES_OA')]s empenhad[acolyte.Custom('ES_OA')]s em mostrar os erros que consideram evidentes nos ensinamentos de [acolyte.Custom('ES_DelDela')] outr[acolyte.Custom('ES_OA')].\n\nOs primeiros dias não têm sido bons para [irate_theocrat.GetFirstNameNoTooltip]. Apesar de seus esforços para demonstrar que a teologia de [acolyte.GetFirstNameNoTooltip] é falha e enfatiza demais o componente humano da pessoa de Jesus, os [acolyte.GetFaith.PriestNeuterPlural] regionais ali reunidos parecem não estar muito interessados em seus argumentos.\n\n[acolyte.GetFirstNameNoTooltip], por outro lado, está tão segur[acolyte.Custom('ES_OA')] de sua causa que me convidou para supervisionar o discurso de encerramento, o que daria validade temporal a um evento que, de outro modo, é espiritual."
 fp2_lyonese_monk.0441.a: "Bem, se eles me pediram..."
 fp2_lyonese_monk.0441.b: "Assuntos de teologia não são da minha preocupação."
 fp2_lyonese_monk.0441.c: "Eu deixei isso ir longe demais!"
 ##################################################
 ##Schism
 fp2_lyonese_monk.0601.t: "[pope.Custom2('AppropriateGreetingNegative', acolyte_host)]"
 fp2_lyonese_monk.0601.desc: "Como um cão volta ao seu vômito, os tolos sempre retornam à heresia do [GetFaithByKey('adoptionist').GetName|l]. Pela graça de Jesus e de São Pedro, eu #EMP ordeno#! que entregueis [acolyte.Custom('ES_AlAla')] herege [acolyte.GetFullNameNoTooltip] para sua excoriação. Arrependei-vos agora, e o amor infinito da Igreja vos perdoará; mas, persistindo nesta heterodoxia, sereis #EMP castigará#! junto com [acolyte.GetSheHe]."
 fp2_lyonese_monk.0601.a: "Só posso implorar pelo perdão de [acolyte_host.GetFaith.HighGodNamePossessive]."
 fp2_lyonese_monk.0601.b: "Fui #EMP nombrad[ROOT.Char.Custom('ES_OA')]#! por [acolyte_host.GetFaith.HighGodName]!"
 fp2_lyonese_monk.0611.t: "$fp2_lyonese_monk.0000.t.revealed$: Tensões Altas"
 fp2_lyonese_monk.0611.desc: "\"Hereges! Mentirosos! Profanadores!\".\n\n\"Pagãos! Tolos! Idolatradores!\".\n\nDo alto das muralhas do castelo de [rioting_county.GetNameNoTier] contemplo as duas multidões rivais de burgueses e camponeses, cuspindo veneno umas contra as outras. Os estudantes e acólitos de [acolyte.GetFirstName] enfrentam uma turba de seus detratores.\n\nEntre os dois, há uma fina linha da minha guarda, que os mantém afastados por enquanto, mas a tensão está quase no ponto de ebulição."
 fp2_lyonese_monk.0611.a: "Eu posso desarmar essa situação."
 fp2_lyonese_monk.0611.b: "Por favor, meus súditos, acalmem-se!"
 fp2_lyonese_monk.0611.b.tt.success: "Você desarmou a situação."
 fp2_lyonese_monk.0611.b.tt.failure: "A violência irrompe de qualquer maneira."
 fp2_lyonese_monk.0611.c: "Tragam minha espada, vamos dispersar esses #EMP rebeldes#!."
 fp2_lyonese_monk.0611.c.tt: "Você toma partido dos zelotas heterodoxos."
 fp2_lyonese_monk.0611.d: "Hereges? Em #EMP minhas#! terras?"
 fp2_lyonese_monk.0611.d.tt: "Você toma partido dos zelotas ortodoxos."
 fp2_lyonese_monk.0611.e: "Tranquem os portões."
 fp2_lyonese_monk.0621.t: "$fp2_lyonese_monk.0000.t.revealed$ Uma Queixa Formal"
 fp2_lyonese_monk.0621.desc: "\"Meu/minha [acolyte_host.GetTitleAsNameNoTooltip], agradeço por ajudar meu/minha serv[acolyte.Custom('ES_OA')] de [acolyte.GetFaith.ReligiousHeadName] a encontrar o caminho correto.\""
 fp2_lyonese_monk.0621.a: "[pope.GetTitledFirstNameNoTooltip|l] não pôde me persuadir; como você espera persuadir?"
 fp2_lyonese_monk.0621.a.tt.success: "Você lança dúvidas sobre os argumentos dele"
 fp2_lyonese_monk.0621.a.tt.failure: "[zealous_vassal.GetFirstNameNoTooltip] só está enfurecid[zealous_vassal.Custom('ES_OA')]"
 fp2_lyonese_monk.0621.b: "Vassalo? Você não é nada além de um descontente!"
 fp2_lyonese_monk.0621.c: "[zealous_vassal.GetTitledFirstNameNoTooltip|l] está certo, isso foi longe demais."
 fp2_lyonese_monk.0631.t: "[neighbouring_ruler.Custom2('AppropriateGreetingNegative', acolyte_host)]"
 fp2_lyonese_monk.0631.desc: "Escrevo para informá-lo, do fundo do meu coração, que [pope.GetTitledFirstName|l] me presenteou recentemente com um mandado completo e #EMP legal#! de propriedade de [acolyte_host.GetPrimaryTitle.GetNameNoTier].\n\nQuando vier inspecionar minha nova propriedade, confio que você a entregará sem problemas."
 fp2_lyonese_monk.0631.a: "Um absurdo!"
 fp2_lyonese_monk.0641.t: "$fp2_lyonese_monk.0000.t.revealed$ Nada mais do que um homem"
 fp2_lyonese_monk.0641.desc: "Talvez esta reunião esteja se #EMP revelando#! mais útil do que eu esperava."
 fp2_lyonese_monk.0641.a: "Sim... #EMP sim#!, por que não? Se eles estão tão #EMP determinados#! em nos acusar."
 fp2_lyonese_monk.0641.a.tt.hidden_convert.character: "A rede de crentes ocultos de [acolyte.GetFirstNameNoTooltip]"
 fp2_lyonese_monk.0641.a.tt: "Será convocado um conclave eclesiástico"
 fp2_lyonese_monk.0641.b: "Cobra! Você planejou tudo isso desde o início!"
 ##################################################
 ##Council
 fp2_lyonese_monk.0801.t.first: "O Conselho de [council_2_venue.GetNameNoTierNoTooltip]"
 fp2_lyonese_monk.0801.t.second: "O Segundo Concílio de [council_2_venue.GetNameNoTierNoTooltip]"
 fp2_lyonese_monk.0801.desc.intro: "Uma fé nascente exige debate, então [acolyte.GetFirstName] reuniu um conclave de clérigos influentes simpatizantes de nossa causa. Três grupos dominam, disputando poder em meus salões enquanto nos preparamos para discutir a doutrina de nosso movimento.\n\nA [GetFaithDoctrine('special_doctrine_adoptionist_school_elipandic_doctrine').GetBaseName|l] defende uma interpretação nuançada, porém implacável, que concilia muitos pontos tradicionais da Trindade. A [GetFaithDoctrine('special_doctrine_adoptionist_school_felicitous_doctrine').GetBaseName|l] é mais rigorosa, mas se concentra no pragmatismo da crença em um mundo hostil. A minoritária [GetFaithDoctrine('special_doctrine_adoptionist_school_radical_doctrine').GetBaseName|l] transborda uma raiva mal disfarçada e vê a ortodoxia tradicional como pouco mais do que paganismo disfarçado.\n\nAfirmando que seu tempo em minha corte lhe ensinou o valor"
 fp2_lyonese_monk.0801.desc.elipandic: "debate e firmeza, [acolyte.GetFirstNameNoTooltip] está apoiando o [GetFaithDoctrine('special_doctrine_adoptionist_school_elipandic_doctrine').GetBaseName|l]."
 fp2_lyonese_monk.0801.desc.felicitous: "da humildade e do pragmatismo, [acolyte.GetFirstNameNoTooltip] se alia à [GetFaithDoctrine('special_doctrine_adoptionist_school_felicitous_doctrine').GetBaseName|l]."
 fp2_lyonese_monk.0801.desc.radical: "do fogo e da ferocidade, [acolyte.GetFirstNameNoTooltip] se alia à [GetFaithDoctrine('special_doctrine_adoptionist_school_radical_doctrine').GetBaseName|l]."
 fp2_lyonese_monk.0801.tt.invalidation_warning: "#WEAK Si se me [Concept( 'imprisoned', 'encarcela' )|E] y no puedo terminar el cónclave, lo dominarán las opiniones de [acolyte.GetFirstNameNoTooltip].#!"
 fp2_lyonese_monk.0801.a: "Naturalmente, assumirei um papel de liderança nas discussões."
 fp2_lyonese_monk.0801.a.tt: "Você se envolve em duelos [learning|lE] para defender seus pontos de vista."
 fp2_lyonese_monk.0801.b: "Minha influência será mais sentida do que vista..."
 fp2_lyonese_monk.0801.b.tt: "Você gasta [piety_i]#N [EmptyScope.ScriptValue('fp2_lyonese_monk_conclave_cost_value')|0]#! [piety|lE] por escolha firme #WEAK, mas não pode gastar $game_concept_piety$ que não possui#!"
 fp2_lyonese_monk.0801.c: "Este é um assunto exclusivo do clero."
 fp2_lyonese_monk.0801.c.tt: "O conclave será decidido sem sua contribuição"
 fp2_lyonese_monk.0811.t: "$fp2_lyonese_monk.0000.t.council$ Pai e Filho"
 fp2_lyonese_monk.0811.desc: "A questão mais óbvia que se coloca é a da consubstanciação, ou como é possível que Jesus tenha tido uma vida significativa como humano e sofrido, ao mesmo tempo em que existia como pessoa divina eterna.\n\nA [GetFaithDoctrine('special_doctrine_adoptionist_school_elipandic_doctrine').GetBaseName|l] sustenta que ambas não se excluem mutuamente, enquanto a [GetFaithDoctrine('special_doctrine_adoptionist_school_felicitous_doctrine').GetBaseName|l] proclama uma distinção firme que não invalida a divindade do Filho de Deus, mas simplesmente a subordina ainda mais ao Pai.\n\nOs membros da [GetFaithDoctrine('special_doctrine_adoptionist_school_radical_doctrine').GetBaseName|l] jogam frutas e gritam que a questão é apenas pompa sem sentido."
 fp2_lyonese_monk.0811.a: "A situação é complexa..."
 fp2_lyonese_monk.0811.a.tt.success: "Você convence os [acolyte_host.GetFaith.PriestNeuterPlural]"
 fp2_lyonese_monk.0811.a.tt.failure: "O clero zomba de você"
 fp2_lyonese_monk.0811.b: "Não é uma marca de vergonha ser escolhido por [acolyte.GetFaith.HighGodName]."
 fp2_lyonese_monk.0811.b.tt.success: "Você convence os [acolyte_host.GetFaith.PriestNeuterPlural]"
 fp2_lyonese_monk.0811.b.tt.failure: "O clero zomba de você"
 fp2_lyonese_monk.0811.c: "Ser #EMP uma vez#! um homem exclui ser #EMP eternamente#! Deus!"
 fp2_lyonese_monk.0811.c.tt.success: "Você convence os [acolyte_host.GetFaith.PriestNeuterPlural]"
 fp2_lyonese_monk.0811.c.tt.failure: "O clero zomba de você"
 fp2_lyonese_monk.0811.d: "Não tenho opinião sobre este assunto."
 fp2_lyonese_monk.0821.t: "$fp2_lyonese_monk.0000.t.council$ Praticidade vs. Princípio"
 fp2_lyonese_monk.0821.desc: "Ainda há muitíssimas pessoas aqui, e eu só preciso de mais um empurrão."
 fp2_lyonese_monk.0821.a: "Acomodação com o restante do cristianismo é vital."
 fp2_lyonese_monk.0821.a.tt.success: "Você convence os [acolyte_host.GetFaith.PriestNeuterPlural]"
 fp2_lyonese_monk.0821.a.tt.failure: "O clero zomba de você"
 fp2_lyonese_monk.0821.b: "A praticidade é inerentemente principiada."
 fp2_lyonese_monk.0821.b.tt.success: "Você convence os [acolyte_host.GetFaith.PriestNeuterPlural]"
 fp2_lyonese_monk.0821.b.tt.failure: "O clero zomba de você"
 fp2_lyonese_monk.0821.c: "A fé oculta é a fé sem fogo!"
 fp2_lyonese_monk.0821.c.tt.success: "Você convence os [acolyte_host.GetFaith.PriestNeuterPlural]"
 fp2_lyonese_monk.0821.c.tt.failure: "O clero zomba de você"
 fp2_lyonese_monk.0821.d: "Isso parece circunstancial..."
 fp2_lyonese_monk.0831.t: "$fp2_lyonese_monk.0000.t.council$ Um Deus"
 fp2_lyonese_monk.0831.desc: "O conclave chega a uma conclusão fervorosa, com pequenas brigas e discussões apaixonadas ecoando por [council_2_venue.GetNameNoTier], já que os três grupos eclesiásticos lutam tanto literalmente quanto metaforicamente por suas crenças.\n\nO cerne deste #EMP animado#! debate é formado por fundamentos simples.\n\nA [GetFaithDoctrine('special_doctrine_adoptionist_school_radical_doctrine').GetBaseName|l] insiste no que considera um monoteísmo puro, a [GetFaithDoctrine('special_doctrine_adoptionist_school_felicitous_doctrine').GetBaseName|l] dá grande ênfase a Deus Pai, mas não é tão abertamente crítica quanto os radicais exigem, e a [GetFaithDoctrine('special_doctrine_adoptionist_school_elipandic_doctrine').GetBaseName] preserva muitos exemplos de pensamento abertamente trinitário que os demais consideram censurável."
 fp2_lyonese_monk.0831.a: "O Pai, o Filho e o Espírito Santo ainda são um único ser."
 fp2_lyonese_monk.0831.a.tt.success: "Você influencia os [acolyte_host.GetFaith.PriestNeuterPlural]."
 fp2_lyonese_monk.0831.a.tt.failure: "O clero zomba de você."
 fp2_lyonese_monk.0831.b: "Uma separação entre o Pai e o Filho não diminui nenhum deles."
 fp2_lyonese_monk.0831.b.tt.success: "Você influencia os [acolyte_host.GetFaith.PriestNeuterPlural]."
 fp2_lyonese_monk.0831.b.tt.failure: "O clero zomba de você."
 fp2_lyonese_monk.0831.c: "A primazia do Pai é imutável."
 fp2_lyonese_monk.0831.c.tt.success: "Você influencia os [acolyte_host.GetFaith.PriestNeuterPlural]."
 fp2_lyonese_monk.0831.c.tt.failure: "O clero zomba de você."
 fp2_lyonese_monk.0831.d: "Nós nos dividimos tão rapidamente em linhas dogmáticas?"
 fp2_lyonese_monk.0841.t: "$fp2_lyonese_monk.0000.t.council$ Do Limiar"
 fp2_lyonese_monk.0841.desc.intro: "Neste dia nasce um #EMP nuevo#! credo [acolyte_host.GetFaith.GetAdherentName]!"
 fp2_lyonese_monk.0841.desc.pluralist: "Tendo chegado a um acordo com a necessidade de acomodar os outros em nossas terras,"
 fp2_lyonese_monk.0841.desc.righteous: "Tendo permanecido resolutos em lidar com os outros em nossas terras,"
 fp2_lyonese_monk.0841.desc.fundamentalist: "Tendo tomado uma decisão de converter os não salvos em nossas terras,"
 fp2_lyonese_monk.0841.desc.sanctioned_false_conversions: "não vemos problema em sermos práticos quando a situação é invertida."
 fp2_lyonese_monk.0841.desc.religious_law: "no entanto, permanecemos comprometidos em resolver nossas disputas teológicas de maneira aberta."
 fp2_lyonese_monk.0841.desc.pursuit_of_power: "não vemos motivos para não fazer o nosso melhor para #EMP estender#! essas terras a qualquer custo."
 fp2_lyonese_monk.0841.desc.felicitous: "\n\nApós um debate feroz, os eloquentes eruditos da [GetFaithDoctrine('special_doctrine_adoptionist_school_felicitous_doctrine').GetBaseName|l] triunfam enfim."
 fp2_lyonese_monk.0841.desc.elipandic: "\n\nCom um debate estoico, os eruditos racionais da [GetFaithDoctrine('special_doctrine_adoptionist_school_elipandic_doctrine').GetBaseName|l] saíram triunfantes."
 fp2_lyonese_monk.0841.desc.radical: "\n\nApós toda essa discussão sem sentido, apenas os mais incendiários da [GetFaithDoctrine('special_doctrine_adoptionist_school_radical_doctrine').GetBaseName|l] conservaram algo parecido com a clareza de visão, e agora esperamos que nos guiem."
 fp2_lyonese_monk.0841.desc.outro: "\n\nNão somos mais o mero sonho de um clérigo solitário e errante. Agora somos uma comunidade viva e vibrante, e uma que certamente toda a cristandade em breve abraçará."
 fp2_lyonese_monk.0841.a: "Deixem que nos chamem de hereges. Nós simplesmente temos nuances que eles não têm."
 fp2_lyonese_monk.0841.b: "Nossas palavras são sensatas, nossas ações também."
 fp2_lyonese_monk.0841.c: "Veja esses falsos cristãos e seu politeísmo expostos!"
 fp2_lyonese_monk.0841.d: "Só espero que tenhamos feito a escolha certa."
