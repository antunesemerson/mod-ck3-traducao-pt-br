l_spanish:
 #dlc_fp2_flavor_events_oltner
 rice_fields_modifier: "Campos de Arroz"
 rice_fields_modifier_desc: "Os camponeses neste Condado estão cultivando arroz nutritivo, enchendo seus estômagos e inspirando novas culinárias."
 fp2_flavor.0001.t: "Uma safra de novas ideias"
 fp2_flavor.0001.desc: "La capital [rice_propagator.Custom('ES_DelDela')] [rice_propagator.GetTitledFirstName|l] es verdaderamente próspera. Los campesinos de [rice_propagator_capital.GetNameNoTier] son rollizos, están felices ¡son de lo más #EMP productivos!#!\n\nLos musulmanes trajeron un nuevo cultivo a sus tierras: el arroz. Es fácil de cultivar y alimenta bien a la gente. Me pregunto si este será parte de su éxito. No me importaría tener un campesinado más productivo…\n\n¿Debería plantar arrozales en mi propia capital? Pero ¿por dónde empiezo?"
 fp2_flavor.0001.a: "O ouro soltará a língua de [rice_propagator.GetFirstNameNoTooltip]."
 fp2_flavor.0001.b: "[rice_propagator.GetFirstNameNoTooltip] compartilhará com um[ROOT.Char.Custom('ES_XA')] amig[ROOT.Char.Custom('ES_OA')], não é?"
 fp2_flavor.0001.c: "O segredo será meu... enviar um agente."
 fp2_flavor.0001.d: "Esqueça, eu não lidarei com muçulmanos."
 fp2_flavor.0001.b.success: "Você consegue convencer[rice_propagator.GetHerHim]"
 fp2_flavor.0001.b.failure: "[rice_propagator.GetFirstNameNoTooltip] está ofendid[rice_propagator.Custom('ES_OA')]"
 fp2_flavor.0001.c.success: "Seu agente rouba o segredo."
 fp2_flavor.0001.c.failure: "[rice_propagator.GetFirstNameNoTooltip] está furioso[rice_propagator.Custom('ES_OA')]"
