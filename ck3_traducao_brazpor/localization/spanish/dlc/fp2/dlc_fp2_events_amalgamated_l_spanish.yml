 awesome_toledo_sword_name: "A espada [great_swordsmith.Custom('ES_DelDela')] [great_swordsmith.GetTitledFirstNameNoTooltip|l]"
 awesome_toledo_sword_desc: "Esta espada foi a maior obra [great_swordsmith.Custom('ES_DelDela')] ferreir[great_swordsmith.Custom('ES_OA')] [great_swordsmith.GetName] de [toledo_county.GetNameNoTierNoTooltip], forjada usando técnicas secretas que levou para o túmulo. Um[great_swordsmith.Custom('ES_XA')] [great_swordsmith.GetWomanMan|U], mas arrogante, diz-se que pôs parte de sua alma na lâmina e, de fato, ela confere a seu portador uma vontade de ferro."
 fp2_struggle.1012.t: "A Obra-prima"
 fp2_struggle.1012.desc: ""Está pronto", diz [great_swordsmith.GetName].\n\n"Esta é a espada que vos prometi, uma de minhas melhores obras, com uma lâmina feita da mais fina liga imaginável, como só poderia ser fabricada na Ibéria. Ela realmente tem, como se costuma dizer, #italic alma de ferro#!. Uma arma digna de uma[ROOT.Char.Custom('ES_XA')] [Select_CString(ROOT.Char.IsFemale,'nobre dama','grande senhor')] como vós.""
 fp2_struggle.1012.a: "É… requintada. Pode ir em paz."
 fp2_struggle.1012.b: "Magnífico. Posso convencê-lo a ficar e me servir?"
 fp2_struggle.1012.swordsmith_leaves: "Tendo completado o seu trabalho, [great_swordsmith.GetName] parte para comandar a guilda de ferreiros, como você prometeu."
 fp2_struggle.1012_swordsmith_stays: "[great_swordsmith.GetName] permanece em sua corte"
 toledo_sword_name: "Espada de Toledo"
 toledo_sword_desc: "Esta lâmina é uma obra-prima de aço toledano, excepcionalmente forte e durável. Uma pequena inscrição perto da base diz que foi forjada por #italic el/la gran herrer[great_swordsmith.Custom('ES_XA')]#! [great_swordsmith.GetName] em [blacksmith_county.GetNameNoTierNoTooltip]."
 fp2_struggle.1050.t: "Sonhos de Destruição"
 fp2_struggle.1050.desc_opening: "[visionary_spouse.GetTitledFirstName] chega a mim no meio da noite, febril e pálid[visionary_spouse.Custom('ES_OA')]. "Tive sonhos", diz, "nos quais me encontro em um campo de morte."
 fp2_struggle.1050.desc_christian: "Nossas cidades foram arrasadas, nossas torres de igreja derrubadas, nosso povo pisoteado num lodaçal de seu próprio sangue."
 fp2_struggle.1050.desc_islamic: "Nossas bibliotecas foram queimadas, nossos minaretes caídos, nossos irmãos e irmãs pregados em cruzes, atacados por aves de rapina."
 fp2_struggle.1050.desc_rampaging_barbarian_heathen: "Nossas casas foram queimadas, nossas pedras rúnicas derrubadas, nossos guerreiros mortos sem honra ou glória."
 fp2_struggle.1050.desc_non_barbarian_heathen: "Nossas cidades foram arrasadas, nossos templos queimados, nosso povo morto ou levado embora para um destino desconhecido."
 fp2_struggle.1050.desc_islamic_heritage: "Eu vi a completa destruição de tudo o que construímos desde que nossos ancestrais chegaram a esta terra.\"\n\n"
 fp2_struggle.1050.desc_christian_bling_reference_drop: "As relíquias de nossos santos foram lançadas em um fogo ardente.\"\n\n"
 fp2_struggle.1050.desc_middle_neutral_version: "Tudo o que construímos foi destruído, e a morte e a desesperança reinaram sobre a terra.\"\n\n"
 fp2_struggle.1050.desc_love_and_warmth_ending: "\"Por favor, meu amor, me ajude. Estou tão assustado que meus sonhos sejam verdadeiros, que essas coisas aconteçam. Me abrace, sinto tanto frio.\""
 fp2_struggle.1050.desc_no_love_and_warmth_ending: ""[ROOT.Char.GetWifeHusband] amado[ROOT.Char.Custom('ES_OA')], escutai-me. Não é uma doença comum que me aflige. Temo que meus sonhos sejam verdadeiros, que estas coisas possam chegar a acontecer. Por favor, não o permitais. Deveis salvar a Ibéria"."
 fp2_struggle.1050.a: "Você é um[visionary_spouse.Custom('ES_XA')] brux[visionary_spouse.Custom('ES_OA')]?"
 fp2_struggle.1050.b: "Reúna-se, [ROOT.GetCharacter.GetFaith.HighGodName] está testando sua fé."
 fp2_struggle.1050.c: "Venha, me conte mais sobre suas visões."
 fp2_struggle.1050.d: "Deixe-me em paz, estou planejando minha próxima conquista."
 fp2_struggle.1050.spouse_imprisoned: "Você aprisiona [visionary_spouse.GetTitledFirstNameNoTooltip|l] por suspeita de bruxaria"
 fp2_struggle.1050.condition_might_improve: "O estado [visionary_spouse.Custom('ES_DelDela')] [visionary_spouse.GetTitledFirstNameNoTooltip|l] poderia melhorar"
 fp2_struggle.1050.condition_might_get_worse: "O estado [visionary_spouse.Custom('ES_DelDela')] [visionary_spouse.GetTitledFirstNameNoTooltip|l] pode piorar"
 fp2_struggle.1050.condition_might_get_very_worse: "O estado [visionary_spouse.Custom('ES_DelDela')] [visionary_spouse.GetTitledFirstNameNoTooltip|l] pode piorar muito"
 comforting_spouse_visionary_toast.success: "Você consolou [visionary_spouse.GetTitledFirstName|l]"
 comforting_spouse_visionary.failure: "Você não conseguiu consolar [visionary_spouse.GetTitledFirstName|l]"
 fp2_yearly.8004.t: "Escola de Tradutores de [translation_capital.GetNameNoTierNoTooltip]"
 fp2_yearly.8004.desc_opening: "Com o espírito de conciliação reinando na Ibéria, estudiosos de toda a região têm sido vistos nas bibliotecas de meu domínio. Talvez eu possa direcionar sua energia para algo proveitoso...\n\n"
 fp2_yearly.8004.desc_chaplain: "Mi [translation_enthusiast.GetCouncilTitle] [translation_enthusiast.GetTitledFirstName|l] tiene una idea. «Deberíamos organizar un equipo de traductores», dice, «y yo podría dirigirlo. Recorramos la tierra en busca de traductores cualificados, incluso infieles, y pongámoslos a trabajar bajo vuestros auspicios. ¡Si lo financiáis, [translation_capital.GetNameNoTierNoTooltip] tiene potencial para ser un faro de ilustración!»"
 fp2_yearly.8004.desc_wanderer: "Tal trotamundos sabi[translation_enthusiast.Custom('ES_OA')], [translation_enthusiast.GetTitledFirstName|l], presenta una oportunidad. «[ROOT.Char.Custom('FormOfAddressForLiege')|U]», dice, «domino una docena de idiomas y podría ayudaros a organizar un equipo de traductores. Recorramos la tierra en busca de traductores cualificados y pongámoslos a trabajar bajo vuestros auspicios. [translation_capital.GetNameNoTierNoTooltip] tiene potencial para ser un faro de ilustración»."
 fp2_yearly.8004.a: "Não vou poupar #italic esforços#! para encontrar as melhores pessoas."
 fp2_yearly.8004.b: "Já que você é tão capaz, #italic você#! pode fazer todas as traduções."
 fp2_yearly.8004.c: "Bibliotecas dão muito trabalho..."
 recruiting_brilliance_toast.success: "Você encontrou ótimos tradutores"
 recruiting_mediocrity_toast.failure: "Você empregou tradutores medíocres"
 fp2_yearly.8005.t: "Sob o Pinheiro Manso"
 fp2_yearly.8005.desc_opening: "No calor escaldante do meio-dia, eles se sentam sob a sombra de um grande pinheiro-do-paraná, tocando alaúdes e flautas."
 fp2_yearly.8005.desc_iberian: "Eles cantam em galaico-português, em catalão, sobre a vida, perda, amor agridoce."
 fp2_yearly.8005.desc_arabic: "Eles cantam em árabe sobre beleza, glória, amor perdido e encontrado novamente."
 fp2_yearly.8005.desc_language_neutral: "Eles cantam em muitas línguas, mas meu coração pode entender cada palavra."
 fp2_yearly.8005.desc_middle_part: "Eu posso ouvi-los da minha varanda, e eles mexem com minha alma.\n\nNo entanto, n?o sei a identidade desses m?sicos e, quando deixo meus sal?es elevados e me aproximo da ?rvore, eles j? se foram."
 fp2_yearly.8005.desc_post_troubadours: "Eu pensei que apenas os trovadores de Occitania possuíam tal talento e inteligência, mas talvez eu tenha me enganado...\n\nO que eu devo fazer com esses malditos #italic sentimentos#!?"
 fp2_yearly.8005.desc_pre_troubadours: "\n\nEles são enviados do [ROOT.Char.GetFaith.PositiveAfterLife|U]? São fantasmas criados pelo [ROOT.Char.GetFaith.DevilName] para me enredar? Talvez não... mas o que eu devo fazer com esses malditos #italic sentimentos#!?"
 fp2_yearly.8005.a: "Meu amor por [courtly_lover.GetFirstNameNoTooltip] enche meu coração de canções."
 fp2_yearly.8005.b: "Tão bonito..."
 fp2_yearly.8005.c: "Eu deveria patrocinar mais músicos!"
 fp2_yearly.8005.d: "Chega! Eu mandarei cortar essa maldita árvore."
 fp2_yearly.8002.t: "Um dilema alimentar"
 fp2_yearly.8002.desc: "Duas crianças recolhiam conchas na praia de [beached_whale_province.GetName] quando se depararam com uma carcaça de tamanho colossal. Os habitantes da costa afirmam que a carne dessa criatura morta permanece incorrupta e que é #italic muito#! saborosa. Mas meu [preoccupied_ulama.GetCouncilTitle|l] [preoccupied_ulama.GetFirstName] me puxa de lado com semblante preocupado.\n\n"Será que o consumo de carne de baleia é realmente permitido a nós, [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip]?", preocupa-se. "Não posso tomar uma decisão a respeito. Devemos esperar a declaração de um estudioso muito respeitado. Mas vocês deveriam proibir as pessoas de comerem a carne dessa besta. Só por precaução…"."
 fp2_yearly.8002.a: "Não, #italic eu#! posso torná-lo permitido."
 fp2_yearly.8002.b: "Me dê um pouco dessa carne! Eu #italic preciso#! experimentar."
 fp2_yearly.8002.c: "Muito bem, vamos esperar por uma decisão."
 fp2_yearly.8002.d: "Isso #italic não#! deve ser comido. Eu irei lá pessoalmente e queimá-lo."
 exploding_whale_toast: "O cadáver explodiu misteriosamente!"
 exploding_whale.tt: "A carcaça explode!"
 healthy_whale_toast: "Tinha um gosto muito bom"
 unhealthy_whale_toast: "Algo não está certo..."
 fp2_yearly.8003.t: "Voo Fantástico"
 fp2_yearly.8003.desc: "Est[flying_polymath.Custom('ES_EA')] célebre inventor[flying_polymath.Custom('ES_XA')], [flying_polymath.GetFirstName], veio me ver com um pedido muito estranho, trazendo um par de asas feitas de madeira e seda. \n\n"Os humanos há muito desejam voar pelos céus", diz ele, "e eu fiz os cálculos. Provarei que podemos! Permita-me saltar da torre mais alta de sua [ROOT.Char.Custom('ResidenceBuilding')], [ROOT.Char.Custom('FormOfAddressForLiege')], e depois lhe servirei fielmente!". \n\nInfelizmente, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('enthusiastic_child'))], [enthusiastic_child.Custom('ES_ElLa')] [enthusiastic_child.GetTitledFirstName|l], soube disso e está implorando para que eu deixe que ele veja o velho erudito decolar[flying_polymath.Custom('ES_OA')] idos[flying_polymath.Custom('ES_OA')]."
 fp2_yearly.8003.a: "Muito bem, vou permitir."
 fp2_yearly.8003.b: "Empreste-me essas asas - #italic Eu#! quero voar."
 fp2_yearly.8003.c: "Não, isso é loucura."
 flight_attempt_toast.success: "Você voou como uma águia"
 flight_attempt_toast.failure: "Você caiu no chão"
 fp2_yearly.8003_child_reaction: "Não há como saber como [enthusiastic_child.GetFirstNameNoTooltip] vai reagir ao ver isso."
 polymath_flight_attempt_toast.success: "[flying_polymath.GetFirstNameNoTooltip] voou!"
 polymath_flight_attempt_toast.failure: "[flying_polymath.GetFirstNameNoTooltip] caiu para a morte."
 fp2_yearly.8001.t: "Montagem das Cortes"
 fp2_yearly.8001.desc: "Mi [commoner_enthusiast.GetCouncilTitle|l], [commoner_enthusiast.Custom('ES_ElLa')] [commoner_enthusiast.GetTitledFirstName|l], ha reflexionado durante mucho tiempo sobre nuestras finanzas, y ahora sugiere que ha llegado el momento de reunir a las #italic Cortes#!, una novedosa forma de parlamento en la que los representantes elegidos de los burgos libres participan en las deliberaciones del consejo real.\n\n«A cambio de este privilegio», dice, «podríamos gravar aún más a las ciudades. Si realmente necesitamos oro, [ROOT.Char.Custom('FormOfAddressForLiege')], podríamos incluso permitir que algunos de los campesinos menos desarrapados asistieran a nuestras reuniones, aunque yo aconsejaría no hacerlo, pues seguramente eso enfurecería a la nobleza»."
 fp2_yearly.8001.a: "Convide os representantes das cidades."
 fp2_yearly.8001.b: "Convide todo mundo! E eu quero dizer #italic todo mundo#!."
 fp2_yearly.8001.c: "Não, os nobres sabem o que é melhor, como sempre souberam."
 fp2_flavor.8001_vassal_opinion: "Vassalos que são protetores de seus privilégios não vão gostar disso"
 fp2_yearly.8000.t: "Queimando os Vinhedos"
 fp2_yearly.8000.desc_muslim_opening: "Los fieles que se asentaron en Iberia han disfrutado durante mucho tiempo del buen vino que se elabora aquí. Sin embargo, [vinoclast_caliph.GetTitleTierName] [vinoclast_caliph.GetFirstName] ha decidido ahora que esto tiene que acabar.\n\n«El vino», declara su enviad[hof_emissary.Custom('ES_OA')] [hof_emissary.GetTitledFirstName|l], «es ciertamente #italic haram#! y no se puede seguir tolerando ni su producción ni su consumo. Por lo tanto, debéis prender fuego a los viñedos de [vineyard_county.GetName]."
 fp2_yearly.8000.desc_jewish_opening: "Os fiéis que se estabeleceram na Ibéria há muito desfrutam do bom vinho produzido aqui. No entanto, [vinoclast_caliph.GetTitleTierName] [vinoclast_caliph.GetFirstName] decidiu agora que isso deve chegar ao fim.\n\n“O vinho”, declara sua enviad[hof_emissary.Custom('ES_OA')] [hof_emissary.GetTitledFirstName|l], “certamente não é kosher, e nem sua produção nem seu consumo podem mais ser tolerados. Portanto, deveis incendiar os vinhedos de [vineyard_county.GetName]."
 fp2_yearly.8000.desc_jerez: "Mas, uma vez que a cidade de [jerez_vineyards.GetNameNoTier] tem os maiores vinhedos de toda a Ibéria, entendemos a gravidade de seu sacrifício, e o [vinoclast_caliph.GetTitleTierName] não esquecerá disso. Ainda assim, os vinhedos devem ser queimados!"
 fp2_yearly.8000.desc_not_jerez: "O [vinoclast_caliph.GetTitleTierName] entende a angústia que isso pode causar aos seus viticultores, mas pense em toda a terra que você liberará para fins melhores e mais justos! Os vinhedos devem ser destruídos."
 fp2_yearly.8000.a: "Destruir bom vinho? O [vinoclast_caliph.GetTitleTierName] ficou louco?"
 fp2_yearly.8000.b: "Eu os queimarei até virarem cinzas!"
 fp2_yearly.8000.c: "Não, eu devo proteger os viticultores."
 fp2_struggle.1020.t: "La muerte de [Select_CString(minority_councillor.IsFemale,'una','un')] [Select_CString(minority_councillor.IsFemale,'Councilwoman','Councilman')]"
 fp2_struggle.1020_desc_opening: "Que desastre! Em meio a tensões que estão prestes a explodir em [unrest_capital.GetNameNoTierNoTooltip], uma turba de [unrest_capital.GetCountyData.GetFaith.GetAdherentNamePluralNoTooltip] enraivecidos declarou meu conselheir[minority_councillor.Custom('ES_OA')] [minority_councillor.GetTitledFirstName|l] a causa de seu descontentamento, por causa de sua crença [minority_councillor.GetFaith.GetAdherentNameNoTooltip]."
 fp2_struggle.1020_desc_beaten_by_mob: "Quando [minority_councillor.GetNameNoTooltip] estava a caminho da minha [ROOT.Char.Custom('ResidenceBuilding')] a turba caiu sobre [minority_councillor.GetSheHe] e [minority_councillor.GetHerHim] espancaram brutalmente até a morte[minority_councillor.GetHerHim] .\n\n"
 fp2_struggle.1020_desc_burned_by_mob: "Na escuridão da noite, eles entraram sorrateiramente na minha [ROOT.Char.Custom('ResidenceBuilding')], amarraram [minority_councillor.GetNameNoTooltip] a um tear e o incendiaram.\n\n"
 fp2_struggle.1020_desc_hanged_and_disemboweled_by_mob: "[minority_councillor.GetHerHim|U] o agarraram quando se dirigia a uma reunião do conselho, [minority_councillor.GetHerHim] o penduraram no portão da minha [ROOT.Char.Custom('ResidenceBuilding')] e rasgaram-lhe o ventre, deixando as entranhas caírem livremente no chão úmido abaixo.\n\n"
 fp2_struggle.1020_desc_crucified_by_mob: "[minority_councillor.GetNameNoTooltip] estava visitando um conhecido aqui em [unrest_capital.GetNameNoTierNoTooltip] quando a turba furiosa [minority_councillor.GetHerHim] agarrou e [minority_councillor.GetHerHim] o pregou a uma cruz de madeira, onde logo pereceu.\n\n"
 fp2_struggle.1020_desc_defenestrated_by_mob: "Tomadas por um frenesi profano, conseguiram invadir minha [ROOT.Char.Custom('ResidenceBuilding')], agarrar [minority_councillor.GetNameNoTooltip] e arremessá[minority_councillor.GetHerHim] por uma janela até a morte.\n\n"
 fp2_struggle.1020_desc_molten_silver_by_mob: "Tomados por um frenesi profano, invadiram os aposentos [minority_councillor.Custom('ES_DelDela')] [minority_councillor.GetTitledFirstNameNoTooltip|l] da minha [ROOT.Char.Custom('ResidenceBuilding')], onde derreteram suas belas joias e passaram a despejá-las pela garganta.\n\n"
 fp2_struggle.1020_desc_torn_to_pieces_by_mob: "[minority_councillor.GetNameNoTooltip] estava indo dos banhos até minha [ROOT.Char.Custom('ResidenceBuilding')] quando a turba furiosa caiu sobre [minority_councillor.GetHerHim]. Dada a furiosa força de seu ódio, [minority_councillor.GetHerHim] fizeram em pedaços com as próprias mãos.\n\n"
 fp2_struggle.1020_desc_councillor_had_family: "A família [minority_councillor.Custom('ES_DelDela')] [minority_councillor.GetTitledFirstNameNoTooltip|l] me culpa pelo que ocorreu. Agora tenho diante de mim [councillor_executor.Custom2('HerHisCharacterIntroduction', minority_councillor)|U] que exige que eu peça desculpas por este horrível ato contra a casa de [minority_councillor.GetDynastyName]."
 fp2_struggle.1020_desc_councillor_had_no_family_faith: "parece que as pessoas de [minority_councillor.GetTitledFirstNameNoTooltip|l] #italic me #! me culpam pelo que aconteceu e [councillor_executor.GetTitledFirstName|l], um[councillor_executor.Custom('ES_XA')] líder da comunidade [minority_councillor.GetFaith.GetAdjectiveNoTooltip] compareceu diante de mim para exigir que eu compense os atribulados [minority_councillor.GetFaith.GetAdherentNamePluralNoTooltip] de [unrest_capital.GetNameNoTierNoTooltip] por este ato maligno."
 fp2_struggle.1020.a: "Pedir absolvição da dinastia [minority_councillor.GetDynastyNameNoTooltip]."
 fp2_struggle.1020.b: "Consertar as coisas com o povo [minority_councillor.Custom('ES_DelDela')] [minority_councillor.GetTitledFirstNamePossessiveNoTooltip]"
 fp2_struggle.1020.c: "Localizar os perpetradores."
 fp2_struggle.1020.d: "Enviar soldados para restaurar a ordem em [unrest_capital.GetNameNoTierNoTooltip]."
 fp2_yearly.8006.t: "Colonos Saqaliba"
 fp2_yearly.8006.desc: "Un grupo de varios cientos de pálidos #italic saqaliba#!, hombres y mujeres esclavizados de los confines orientales de Europa, han escapado del señorío [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('former_master'))] [former_master.GetTitledFirstName|l]. Por mucho que hable de cuánto los apreciaba en sus ejércitos y su harén, han afrontado muchos peligros para buscar la libertad en mi tierra.\n\n«Todos tenemos cicatrices», me dice [saqaliba_leader.GetFirstName], su líder, «en el cuerpo o el corazón. Pero somos fuertes y decididos. Anhelamos una tierra propia, donde poder hablar nuestro idioma ancestral. Si nos dejáis asentarnos en el/la [saqaliba_barony.GetName], trabajaremos duro para que prospere»."
 fp2_yearly.8006.a: "Eu até poderia nomeá-lo prefeito[saqaliba_leader.Custom('ES_EEsa')]…"
 fp2_yearly.8006.b: "Vocês podem ficar, mas seus amigos devem ir para outro lugar."
 fp2_yearly.8006.c: "Eu vou te mandar de volta para o seu mestre."
 furious_rival_8006.desc: "Seu rival [former_master.Custom('ES_ElLa')] [former_master.GetTitledFirstNameNoTooltip|l] pode reivindicar [Concept( 'claim', 'derechos' )|E] sobre o/a [saqaliba_county.GetName]"
 fp2_yearly.8006.flavor.b.tt: "Relutantemente, [saqaliba_leader.GetFirstNameNoTooltip] fica em sua corte, deixando seus seguidores saqaliba encontrarem seu próprio caminho."
 fp2_yearly.8006.flavor.c.tt: "Os saqaliba são devolvidos à força [former_master.Custom('ES_AlAla')] [former_master.GetTitledFirstNameNoTooltip|l]."
 #fp2_struggle_event_vero
 fp2_struggle.3001.t: "O Preço da Guerra"
 fp2_struggle.3001.desc: "[struggle_3001_steward.Custom2('MyCharacterIntroduction', ROOT.Char)|U] entra na sala com semblante sério. "Meu [ROOT.GetCharacter.GetLadyLord]", diz, "nossos cofres estão quase vazios. É perigoso nestes tempos". Não precisa dizer mais. Em silêncio, lanço a ele um olhar severo. "[ROOT.Char.Custom('FormOfAddressForLiege')|U]…", repete enquanto saio."
 fp2_struggle.3001.desc_no_war_intro: "\n\nTudo o que tenho é esta coroa. Esta coroa e o dever de servi-la bem. Mas de que vale uma coroa sem riquezas para sustentá-la?"
 fp2_struggle.3001.desc_war_intro: "\n\nTudo o que tenho ? esta coroa. Esta coroa e o dever de servi-la bem. Mas de que vale uma coroa que ser? tomada de qualquer forma ap?s minha derrota?"
 fp2_struggle.3001.desc_outro: "Estendo a mão e toco seu material frio... ouro.\n\nConheço alguns mercadores sem escrúpulos que estariam interessados nele..."
 fp2_struggle.3001.a: "Eu farei o que for preciso."
 fp2_struggle.3001.a_flavour: "Você perderá sua coroa."
 fp2_struggle.3001.b: "Mas aquela outra coroa..."
 fp2_struggle.3001.c: "Espere! Não sou o único com uma coroa nesta casa."
 fp2_struggle.3001.c_flavour: "Seu cônjuge perderá sua coroa."
 fp2_struggle.3001.d: "Esta coroa só sairá da minha cabeça quando eu estiver morto!"
 struggle_3001_spouse_crown_modifier: "Coroa Vendida"
 fp2_struggle.3011.t: "Donzelas em Perigo"
 fp2_struggle.3011.desc: "' [ROOT.GetCharacter.GetLadyLord]! O impensável aconteceu!' [struggle_3011_marshal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] leva um segundo para recuperar o fôlego, sua testa molhada de suor. 'As damas de [struggle_3011_county_town.GetNameNoTier] pegaram em armas para defender a cidade por conta própria.'"
 fp2_struggle.3011.desc_men: "Meu [ROOT.GetCharacter.GetLadyLord]! O impensável aconteceu! [struggle_3011_marshal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] leva um segundo para recuperar o fôlego, sua testa está úmida de suor. Os rapazes de [struggle_3011_county_town.GetName] pegaram em armas para defender a cidade eles mesmos."
 fp2_struggle.3011.desc_outro: "\n\n[bishop.GetTitledFirstName] irrompe na sala, logo em seguida. "Isso é antinatural, meu [ROOT.GetCharacter.GetLadyLord]!", exclama. "Se os deixarmos lutar, logo também pedirão terras, e então quem vai cuidar das crianças?".\n\n"Uma espada é uma espada", responde imediatamente [struggle_3011_marshal.GetFirstNameNoTooltip]. "Certamente concordais, meu [ROOT.GetCharacter.GetLadyLord]?""
 fp2_struggle.3011.a: "Eu gostaria que todos os meus súditos estivessem prontos para defender nossas terras!"
 fp2_struggle.3011.b: "Mulheres devem segurar apenas uma coisa em seus braços - bebês."
 fp2_struggle.3011.b_men: "Homens devem segurar apenas uma coisa em seus braços - bebês."
 fp2_struggle.3011.c: "Bruxas! #EMP Bruxas!#!"
 fp2_struggle.3011.d: "Oh, essas pobres senhoras! Eu vou resgatá-las desse mal!"
 fp2_order_of_the_hachet_modifier: "Não em Perigo"
 fp2_order_of_the_hachet_modifier_desc: "Homens e mulheres do condado defenderão igualmente."
 fp2_punished_order_of_the_hachet_modifier: "Forçados à Aflição"
 fp2_punished_order_of_the_hachet_modifier_desc: "Nesses condados, aqueles que defendem suas terras sem a aprovação de seu suserano são punidos mais severamente do que seus agressores."
 fp2_struggle.3021.t: "A Ira do Céu"
 fp2_struggle.3021.desc: "O rosto de [struggle_3021_knight.Custom2('MyCharacterIntroduction', ROOT.Char)|U] est? distorcido de medo quando visito o quartel. [struggle_3021_courtier.GetTitledFirstName|l] tenta ajudar [struggle_3021_knight.GetHerHim] e arqueia uma sobrancelha quando me v?.\n\n"Quer ao menos contar a su[ROOT.GetCharacter.Custom('ES_OA')] [ROOT.GetCharacter.GetLadyLord] o que aconteceu?"\n\n[struggle_3021_knight.GetFirstNameNoTooltip] ergue a cabe?a imediatamente. "M-minha [ROOT.GetCharacter.GetLadyLord]... o que vi n?o deveria ter sido visto. Figuras lan?avam pedras de p?lvora negra das ameias. As pedras se incendiavam e trovejavam ao atingir seus inimigos. Partiram um homem ao meio, minha [ROOT.GetCharacter.GetLadyLord]!"\n\n[struggle_3021_courtier.GetFirstNameNoTooltip] acena com interesse. "Se n?s tamb?m pud?ssemos ter esse poder... Talvez...""
 fp2_struggle.3021.a: "Certamente vale a pena pesquisar isso."
 fp2_struggle.3021.b: "Quem sabe quais perigos isso poderia trazer."
 fp2_struggle.3021.c: "Pó preto, você diz... um novo e ardente tempero."
 fp2_struggle.3021.d: "Isto é punição divina!"
 fp2_struggle.3021.e: "Trovoada para o deus do trovão."
 bad_struggle_3021_courtier_desc: "[struggle_3021_courtier.GetTitledFirstName] morre durante a pesquisa"
 good_struggle_3021_courtier_desc: "[struggle_3021_courtier.GetTitledFirstName] obtém sucesso em sua pesquisa"
 bad_stone_research_title: "Atordoado pelo Trovão"
 good_stone_research_title: "Pesquisa Bem-Sucedida!"
 fp2_lightning_stones_modifier: "Pedras Trovoadas"
 stone_poisoning_discovered: "Consequências"
 stone_poisoning_worked: "Um Tempero Ardente"
 stone_poisoning_worked_desc: "Pesquisa bem-sucedida sobre o misterioso pó preto."
 fp2_lightning_stones_poison_modifier: "Veneno de Pó Preto"
 #placeholderhugofp2eventtasf_events
 fp2_struggle.2000.t: "Mercado Desorganizado"
 fp2_struggle.2000.desc: "Enquanto inspeciono as ruas do mercado, encontro um[fp2_2000_market_inspector.Custom('ES_XA')] angustiad[fp2_2000_market_inspector.Custom('ES_OA')] muhtasib, [fp2_2000_market_inspector.GetFullName], que tenta fazer cumprir as normas do mercado entre os vendedores ambulantes. "Bancas desordenadas, óleo ao lado das portas da mesquita, coelhos esfolados e queijo em tigelas! Por Alá, é melhor vocês me ouvirem agora mesmo!".\n\nEst[fp2_2000_market_inspector.Custom('ES_EA')] muhtasib #emphasis debería#! punir as transgressões do mercado, com violência se necessário. No entanto, os mercadores, cegados pela ganância, o ignoram.\n\nO que posso fazer para ajudar[fp2_2000_market_inspector.Custom('ES_LoLa')]?"
 fp2_struggle.2000.a: "Intervir na questão e ameaçar chamar um qāḍī."
 fp2_struggle.2000.a.desc: "Muḥtasib corrige o caminho dos comerciantes desorientados,\nqāḍī os pune de acordo com seu julgamento"
 fp2_struggle.2000.a.a: "Os comerciantes obedecem suas palavras, mas permanecem convencidos"
 fp2_struggle.2000.a.a.notif: "Burocracia crescente"
 fp2_struggle.2000.a.b: "Você resolve a situação de maneira civil"
 fp2_struggle.2000.a.b.notif: "Compromisso agradável"
 fp2_struggle.2000.b: "Dê a todos uma repreensão severa!"
 fp2_struggle.2000.b.desc: "Eu tomo para mim a punição física do comerciante"
 fp2_struggle.2000.b.notif: "Demonstração de Diligência"
 fp2_struggle.2000.b.notif.desc: "Chocados ao ver um muḥtasib sendo repreendido, os comerciantes rapidamente desocuparam o mercado."
 fp2_struggle.2000.d: "Por que as regras deveriam atrapalhar os negócios?"
 fp2_struggle.2000.d.desc: "Permitir o comércio sem se preocupar com os costumes aumentará o comércio, mas gradualmente desestabilizará o mercado."
 fp2_struggle.2000.e: "Eu não vou tolerar essa desobediência! Guardas!"
 fp2_struggle.2000.f: "Já que estamos nisso, por que não construímos também um bordel?"
 fp2_struggle.2000.f.desc: "Você encoraja os comerciantes a violar ainda mais a ḥisba, tentando aliviar as tensões"
 fp2_struggle.2000.f.notif: "Leniência com comerciantes estrangeiros"
 fp2_struggle.2000.f.notif.desc: "As violações de mercado aumentaram agora que o muḥtasib deixou de fazer cumprir as regulamentações."
 fp2_struggle.2001.t: "A Aldeia Abandonada"
 fp2_struggle.2001.desc: "Enquanto percorro os terrenos do meu [ROOT.GetCharacter.Custom('FortifiedBuilding')], aproxima-se de mim um ancião camponês.\n\n"Grande [ROOT.Char.GetLadyLord], apiade-se de nós e salve nossa aldeia da tirania de [fp2_2001_desperate_county.GetHolder.GetName]". Ele tem negligenciado nosso assentamento por tempo demais. O povo anseia por um novo governante. Eles anseiam por você, [ROOT.Char.GetLadyLord]"."
 fp2_struggle.2001.desc.extra.a: "O [fp2_2001_desperate_county.GetName] pertence à sua aliad[fp2_2001_desperate_county.GetHolder.Custom('ES_OA')], [fp2_2001_desperate_county.GetHolder.GetName]. Fornecer apoio militar aos rebeldes seria um ato de agressão.\n\n"
 fp2_struggle.2001.desc.extra.b: "[fp2_2001_desperate_county.GetHolder.GetName], que é dono do [fp2_2001_desperate_county.GetName], possui um acordo de trégua com você. Ajudar os camponeses seria uma violação desse acordo."
 fp2_struggle.2001.a: "Você tem minha palavra, [fp2_2001_desperate_county.GetNameNoTierNoTooltip] será libertada!"
 fp2_struggle.2001.a.desc: "Você deve capturar [fp2_2001_desperate_county.GetNameNoTier] em #bold cinco anos#!"
 fp2_struggle.2001.a.a.desc: "[2001_scoped_chaplain.GetTitledFirstName] ficará muito desapontado se você falhar."
 fp2_struggle.2001.a.notif: "Reivindicação justa concedida"
 fp2_struggle.2001.b: "Você está disposto a abandonar [fp2_2001_desperate_elder.GetFaith.HighGodName] por isso?"
 fp2_struggle.2001.b.desc: "Você deve capturar [fp2_2001_desperate_county.GetNameNoTier] em #bold dez anos#!"
 fp2_struggle.2001.b.notif: "[fp2_2001_desperate_county.GetNameNoTierNoTooltip] se converte a [ROOT.Char.GetFaith.GetNameNoTooltip|l]"
 fp2_struggle.2001.b.notif.desc: "Seja por escolha ou por desespero, a vila de [fp2_2001_desperate_county.GetNameNoTier] adotou [ROOT.Char.GetFaith.GetName|l]."
 fp2_struggle.2001.c: "Prove sua resolução para mim; aponte suas lanças para [fp2_2001_desperate_county.GetHolder.GetFirstNameNoTooltip]!"
 fp2_struggle.2001.d: "Talvez você possa começar prestando homenagem ao seu novo[ROOT.Char.Custom('ES_OA')] novo[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetLadyLord]…"
 fp2_struggle.2001.d.notif: "Camponeses desesperados pagam taxa de libertação"
 fp2_struggle.2001.d.notif.desc: "Os camponeses do [fp2_2001_desperate_county.GetName] juntaram todos os bens valiosos que tinham para pagar a taxa de libertação."
 fp2_struggle.2001.e: "Desculpe-me, mas seu povo terá que se ajudar."
 fp2_struggle.2001.e.desc: "Você abandona os camponeses ao seu destino sob o domínio de [fp2_2001_desperate_county.GetHolder.GetName]."
 fp2_struggle.2001.f: "Apresentar-me-ei diante de [fp2_2001_desperate_county.GetHolder.GetTitleAsNameNoTooltip] e [fp2_2001_desperate_county.GetHolder.GetHerHim] o informarei de sua traição!"
 fp2_every_major_vassal_notifier: "Todo vassalo poderoso"
 fp2_every_major_same_faith_vassal_notifier: "Todo vassalo poderoso da mesma [dyloc_powerful_vassal_faith.GetAdjective] fé"
 fp2_every_major_different_faith_vassal_notifier: "Todo vassalo poderoso de uma fé não-[dyloc_powerful_vassal_faith.GetAdjective]"
 fp2_every_major_same_culture_vassal_notifier: "Todo vassalo poderoso da [dyloc_powerful_vassal_culture.GetNameNoTooltip] cultura"
 fp2_one_independent_ruler_of_each_culture_notifier: "Um [independent_ruler|lE] envolvido nesta [struggle|E] de cada [culture|lE]"
 fp2_struggle.2002.t.a: "Vila Liberada"
 fp2_struggle.2002.t.b: "Obrigações não cumpridas"
 fp2_struggle.2003.t: "Bando dos Pássaros Perdidos"
 fp2_struggle.2003.desc: "Um grupo de mercenários feridos e desiludidos chegou à [fp2_2003_county_town.GetName]. Os moradores afirmam ter ouvido falar de 'se estabelecer após saquear um alvo fácil' e começaram a ficar ansiosos.\n\nAs tensões estão altas e conflitos provavelmente surgirão se eu não intervir no assunto."
 fp2_struggle.2003.a: "Implorar para que partam."
 fp2_struggle.2003.a.a.notif: "Bandidos ignoram súplicas"
 fp2_struggle.2003.a.b.notif: "Resolução pacífica"
 fp2_struggle.2003.b: "Oferecer-lhes uma posição na guarnição da cidade."
 fp2_struggle.2003.b.desc: "A guarnição poderia usar tropas veteranas, e alimentar uma fera ferida é a maneira mais rápida de domesticá-la."
 fp2_struggle.2003.c: "Forçá-los a sair da cidade!"
 fp2_struggle.2003.c.desc: "Você organiza um ataque preventivo, usando a guarnição local em um ataque surpresa para expulsar os vândalos\n"
 fp2_struggle.2003.c.a: "Os mercenários matam os soldados"
 fp2_struggle.2003.c.b: "Os soldados subjuguam os mercenários"
 fp2_struggle.2003.c.b.notif: "Ameaça dos mercenários contida"
 fp2_struggle.2003.d: "\"Vocês todos parecem bons materiais de fazenda para mim!\""
 fp2_struggle.2003.d.desc: "Você oferece comprar terras e equipamentos dos locais e dar para os mercenários."
 fp2_struggle.2003.e: "Deixe os locais lidarem com isso."
 fp2_struggle.2003.e.desc: "As tensões já estão altas o suficiente, provocá-los só traria maiores riscos."
 fp2_struggle.2003.e.notif.a: "Mercenários saqueiam o campo."
 fp2_struggle.2003.e.notif.b: "Provocação de camponeses termina em tragédia."
 fp2_struggle.2003.e.notif.b.desc: "Os locais exigiram que os mercenários saíssem, mas isso foi suficiente para provocá-los a atacar."
 fp2_struggle.2003.e.notif.c: "Mercenários se estabelecem."
 fp2_struggle.2003.e.notif.c.desc: "Os mercenários tomaram gosto pela [fp2_2003_county_town.GetName]."
 fp2_struggle.2007.t: "Um Castelo Digno de Iberia."
 fp2_struggle.2007.desc.main: "estão maduras para o desenvolvimento", afirma meu [fp2_2007_scoped_steward.GetCouncilTitleFirstName]. "Com o vosso financiamento, poderíamos proteger [fp2_2007_free_real_estate.GetCounty.GetTitle.GetNameNoTier] contra nossos inimigos sempre à espreita a um custo #emphasis enormemente#! reduzido — [2007_vassal_sponsor.GetTitledFirstName|l] solicitou que se construísse um/a [ROOT.Char.Custom('FortifiedBuilding')] com arquitetura [fp2_2007_foreign_faith.GetAdjective] e oferece parte de seus próprios recursos em uma tentativa de influenciar a vossa opinião. No entanto, vossos outros vassalos exigem que vos atenhais aos arquitetos [ROOT.Char.GetFaith.GetAdherentNamePlural] locais. Independentemente de quem escolherdes, esta é uma oportunidade de ouro para fortalecer o senhorio como um todo". O único problema é a #EMP quién#! escolherá para esta oportunidade dourada…"
 fp2_struggle.2007.desc.a: ""Suas terras $fp2_struggle.2007.desc.main$"
 fp2_struggle.2007.desc.b: "As terras do [fp2_2007_castle_holder.GetTitledFirstName|l] $fp2_struggle.2007.desc.main$"
 fp2_struggle.2007.a: "Contratarei um arquiteto [ROOT.Char.GetFaith.GetAdherentNameNoTooltip]."
 fp2_struggle.2007.a.castile: "[ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip|U]? De fé [fp2_2007_foreign_faith.GetAdjectiveNoTooltip|U]? Quero um arquiteto de [fp2_2007_allegedprotocastilean.GetNameNoTooltip]!"
 fp2_struggle.2007.a.notif: "A construção de um castelo começará em [fp2_2007_free_real_estate.GetName]."
 fp2_struggle.2007.a.major_vassal_flavor: "A opinião de vassalos poderosos do mesmo fé não será influenciada, pois esse é o resultado esperado."
 fp2_struggle.2007.a.castile.favor: "Ninguém se oporá a um [fp2_2007_allegedprotocastilean.GetNameNoTooltip] porque eles são conhecidos por serem arquitetos exemplares."
 fp2_struggle.2007.b: "Eu vou contratar o arquiteto [fp2_2007_foreign_faith.GetAdjectiveNoTooltip]."
 fp2_struggle.2007.b.flavor: "Essa ação será vista como uma declaração, independentemente da fé."
 fp2_struggle.2007.c: "Eu vou projetar o castelo eu mesmo, como isso pode ser difícil?"
 fp2_struggle.2007.c.flavor: "Projetar um castelo sem gastar uma fortuna é uma tarefa monumentalmente difícil."
 fp2_struggle.2007.c.roco: "A $royal_architect_court_position$ lidará com essa tarefa."
 fp2_struggle.2007.c.notif.a.t: "Fundação Podre, Estrutura Desmoronando"
 fp2_struggle.2007.c.notif.a.desc: "Seus planos para o castelo são assombrados pelo fracasso"
 fp2_struggle.2007.c.notif.b.desc: "O projeto é bem-sucedido"
 fp2_struggle.2007.d: "Eu #EMP não#! financiarei nenhum castelo, especialmente se eles não serão meus!"
 fp2_struggle.2007.d.alt: "Essas terras não anseiam por um castelo, deixe-as em paz."
 fp2_struggle.2008.t: "Feitos ilícitos de [fps_2008_misdeed_actor.Custom('ES_DelDela')] [fps_2008_misdeed_actor.GetCouncilTitle]"
 fp2_struggle.2008.desc: "À noite, [fps_2008_misdeed_actor.GetCouncilTitleFirstName] se senta em uma sala do conselho mal iluminada. Seu olhar e sua pena estão voltados para relatórios de despesas discretos. No entanto, ao seu lado estão moldes de argila com o selo real, que só seriam necessários se pretendesse fraudar o reino. Quem diria que uma[fps_2008_misdeed_actor.Custom('ES_XA')] [fps_2008_misdeed_actor.GetWomanMan] de sua posição ousaria agir de forma tão vergonhosa sob os olhos de [ROOT.Char.GetFaith.HighGodName]!\n\nVergonhosa... mas habilidosamente. Se eu não [fps_2008_misdeed_actor.Custom('ES_LeLa')] a tivesse pegado em flagrante, ninguém teria percebido seu plano."
 fp2_struggle.2008.a: "Eu vi o suficiente, para as masmorras com você!"
 fp2_struggle.2008.b.a: "Ensine-me a forjar documentos e eu lhe mostrarei misericórdia."
 fp2_struggle.2008.b.flavor: "Você ignora as evidências em troca do conhecimento sobre a arte do engano."
 fp2_struggle.2008.c: "Esses fundos são para mim... certo?"
 fp2_struggle.2008.c.flavor: "Você oculta evidências de má conduta e participa do esquema de corrupção."
 fp2_struggle.2008.d: "Você será publicamente envergonhado na praça da cidade."
 fp2_struggle.2008.d.flavor: "Você expõe as ações [fps_2008_misdeed_actor.GetHerHim] para as pessoas, para que possam julgá-las. Indo contra o desejo de discrepância de seus vassalos e conselheiros."
 fp2_struggle.2009.t: "Capturando Ladrões Míticos"
 fp2_struggle.2009.desc: ""Você escolheu o castelo errado, idiota!", grita meu marechal enquanto ameaça o intrus[fp2_2009_garduna_young_thief.Custom('ES_OA')] intrus[fp2_2009_garduna_young_thief.Custom('ES_OA')] com uma espada.\n\nSob a pressão adicional do meu marechal, o jovem explica que faz parte de uma grande organização criminosa originária de [fp2_2009_involved_ruler.GetPrimaryTitle.GetName] e comandada pelo temido [fp2_2009_garduna_guild_master.GetFullNameNicknamed]. "Então, você está tentando montar uma nova guilda de ladrões bem debaixo do meu nariz, é?", pergunto, ao que o ladr[fp2_2009_garduna_young_thief.Custom('ES_OnOna')] se limita a acenar com a cabeça. Está dispost[fp2_2009_garduna_young_thief.Custom('ES_OA')] a trocar mais informações pela sua vida."
 fp2_struggle.2009.a: "Este reino não é grande o suficiente para #EMP dos#! [Select_CString(ROOT.Char.IsFemale,'reinas','reyes')]."
 fp2_struggle.2009.a.flavor: "Voc? deixa [fp2_2009_garduna_young_thief.Custom('ES_AlAla')] ladr[fp2_2009_garduna_young_thief.Custom('ES_OnOna')] partir em troca da localiza??o de seu l?der, ent?o parte em uma miss?o para derrot?-los e ganhar o t?tulo de "Matador de Ladr?es"."
 fp2_struggle.2009.b: "Diga-me onde seus cúmplices estão escondidos e talvez você ainda viva."
 fp2_struggle.2009.b.blues: "Ganha o [trait|lE] #TUT_KW [GetTrait('depressed_1').GetName(GetNullCharacter)]#! após entregar os seus amigos"
 fp2_struggle.2009.c: "Seu sindicato de ladr?es soa... #emphasis tribut?vel.#!"
 fp2_struggle.2009.d: "Trabalhe para mim, perturbe o [fp2_2009_involved_ruler.GetPrimaryTitle.GetNameNoTooltip]."
 fp2_struggle.2009.d.flavor.st: "Você paga à guilda dos ladrões para deixar suas terras em paz."
 fp2_struggle.2009.e: "Vou presenteá-lo com a sua cabeça decepada [fp2_2009_involved_ruler.Custom('ES_AlAla')] [fp2_2009_involved_ruler.GetTitledFirstNameNoTooltip|l]."
 fp2_struggle.2009.e.a: "A guilda dos ladrões pode retaliar desestabilizando um condado aleatório."
 #Note to spanish translators: please translate this as "Cazando a la Martes Foina", saying Garduña is too blatant.
 fp2_struggle.2010.t: "Caçando a Marta"
 fp2_struggle.2010.desc: "Tras viajar hasta [fp2_2009_involved_capital_county.GetNameNoTierNoTooltip], entro en una iglesia abandonada. [fp2_2009_garduna_guild_master.GetNameNoTooltip] ha estado esperando mi llegada.\n\n«¿[ROOT.Char.GetFirstNameNoTooltip], supongo? [ROOT.Char.Custom('signature_weapon')|U] me dice que no estáis aquí para ofrecerme un trato. Pero los ladrones tenemos más de comerciantes que de soldados. Vos y yo podríamos irnos satisfech[ROOT.Char.Custom('ES_OA')]s si me pagarais. Entonces, vuestro [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] dejará de interesarme»."
 fp2_struggle.2010.b: "Prepare-se para ser decapitado, cobra!"
 fp2_struggle.2010.c: "Pagar pela proteção soa melhor do que uma briga..."
 fp2_struggle.2011.desc: "Com [fp2_2009_garduna_guild_master.GetFirstName] derrotado, a guilda dos ladrões e suas operações foram enfraquecidas."
 fp2_struggle.2011.a: "É bom ser [Select_CString(ROOT.Char.IsFemale,'reina','rey')] #DIE2 de los ladrones#!"
 fp2_struggle.2012.t: "Relatório de fontes locais:"
 fp2_struggle.2012.desc: "Há uma gangue de ladrões impiedosos atacando [fp2_2009_involved_capital_county.GetNameNoTierNoTooltip]. Está claro que alguém deliberadamente financiou esses criminosos para agir contra nós. Por enquanto, seria sábio atribuir um marechal para proteger a região."
 fp2_struggle.2012.a: "Quem fez isso está jogando sujo!"
 fp2_struggle.2012.t.alt: "[fp2_2012_sender.Custom2('AppropriateGreetingPositive', ROOT.Char )]"
 fp2_struggle.2012.desc.alt: "Junto com esta carta, encontrareis a cabeça decepada de um dos ladrões que vinha assolando nossos respectivos domínios. Tomei a liberdade de executar[fp2_2009_garduna_young_thief.GetHerHim] e informar a vossa guarnição em [fp2_2009_involved_capital_county.GetNameNoTier] sobre a localização de seus cúmplices."
 fp2_struggle.2012.a.alt: "[fp2_2009_has_gifted_head.GetFirstNameNoTooltip] me trouxe um presente encantador!"
 fp2_struggle.2013.t: "O Segredo para a Liberdade"
 fp2_struggle.2013.desc: "[fp2_2013_prisoner_with_a_secret.GetFullNameRegnal] é um[fp2_2013_prisoner_with_a_secret.Custom('ES_XA')] prisioneiro[fp2_2013_prisoner_with_a_secret.Custom('ES_OA')] à minha mercê. Sabendo disso, apresenta uma súplica desesperada… "Contarei o segredo de [fp2_2013_secret_owner.GetFullNameRegnal] se me libertardes"."
 fp2_struggle.2013.a: "Conte-me o segredo e você será livre"
 fp2_struggle.2013.a.a: "Você irá aprender o segredo de [fp2_2013_secret_owner.GetFirstName] #TUT_KW#!"
 fp2_struggle.2013.b: "Por que fazer um acordo quando posso simplesmente torturá-lo?"
 fp2_struggle.2013.b.b: "[fp2_2013_prisoner_with_a_secret.GetFirstNameNoTooltip] resiste à tortura"
 fp2_struggle.2013.c: "Cobra traiçoeira! [fp2_2013_secret_owner.GetFirstNameNoTooltip] saberá disso!"
 fp2_struggle.2013.c.desc: "Sem aprender o segredo, você decide levar [fp2_2013_prisoner_with_a_secret.GetFirstNameNoTooltip] diante de [fp2_2013_secret_owner.GetFirstNameNoTooltip] para punir sua traição."
 fp2_struggle.2013.c.a: "[fp2_2013_secret_owner.GetFirstName] decidirá o destino de [fp2_2013_prisoner_with_a_secret.GetFirstNameNoTooltip]"
 fp2_struggle.2013.d: "Não faço promessas, me conte e talvez eu pense sobre isso mais tarde..."
 fp2_struggle.2014.t: "[ROOT.Char.Custom('ES_AlAla')] justo[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetNameNoTooltip]"
 fp2_struggle.2014.desc.start: "Obrigado por me devolver a [fp2_2013_prisoner_with_a_secret.GetNameNoTooltip]"
 fp2_struggle.2014.desc.light: "mas não acredito que tenha feito nada que mereça punição. [fp2_2013_prisoner_with_a_secret.GetHerHim|U] o deixei partir ileso.$fp2_struggle.2014.desc.end$"
 fp2_struggle.2014.desc.heavy.start: "Entendo que é[fp2_2013_prisoner_with_a_secret.Custom('ES_EA')] cerd[fp2_2013_prisoner_with_a_secret.Custom('ES_OA')] tentou vender meus segredos para salvar a própria pele."
 fp2_struggle.2014.desc.heavy.outcome.prison: "$fp2_struggle.2014.desc.heavy.start$ Eu vou garantir que nem [fp2_2013_prisoner_with_a_secret.GetSheHe], nem os segredos jamais vejam a luz do dia. $fp2_struggle.2014.desc.end$"
 fp2_struggle.2014.desc.heavy.outcome.death: "$fp2_struggle.2014.desc.heavy.start$ Em vez disso, eu ordenei que meu torturador retirasse tudo! $fp2_struggle.2014.desc.end$"
 fp2_struggle.2014.desc.end: "\n\nVocês me prestaram um grande favor, não esquecerei disso. Obrigado."
 fp2_struggle.2014.b: "É uma pena que [fp2_2013_prisoner_with_a_secret.GetFirstNameNoTooltip] não tenha sido executado, mas pelo menos eu ganhei favores."
 fp2_struggle.2015.t: "Carta no Verso"
 fp2_struggle.2015.desc: "Mientras paseo por la corte, veo un rostro desconocido que se acerca a mí. «Mi muy [ROOT.Char.Custom('ComplimentAdjective')] señor[ROOT.Char.Custom('ES_XA')], soy [fp2_struggle_2015_peasant_to_murder.GetFirstName], antigu[fp2_struggle_2015_peasant_to_murder.Custom('ES_OA')] cortesan[fp2_struggle_2015_peasant_to_murder.Custom('ES_OA')] de [fp2_struggle_2015_murder_requester_vassal.Custom2('YourCharacterIntroductionNoComma', ROOT.Char)]. Me ha pedido que me presente ante vos y forme parte de vuestra corte. También me ha dado una carta de presentación que solamente vos podéis leer». Entonces, me entrega una carta adjunta.\n\nTras romper el sello, la carta simplemente dice: «#EMP Querid[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetFirstName], por favor, asesina a quien porta esta carta#!. [fp2_struggle_2015_murder_requester_vassal.GetFirstNameNoTooltip]»"
 fp2_struggle.2015.a: "Sejam bem-vindos! Venham, tomem um copo de [ROOT.Char.Custom('GetExpensiveDrink_Singular')] #DIE2 (envenenado)#!."
 fp2_struggle.2015.a.a: "Você falha na tentativa de envenenamento"
 fp2_struggle.2015.a.murder_scheme: "[fp2_struggle_2015_murder_requester_vassal.GetTitledFirstName] continuará tentando assassinar [fp2_struggle_2015_peasant_to_murder.GetFirstName]"
 fp2_struggle.2015.a.b: "Cortesão envenenado!"
 fp2_struggle.2015.b: "Ignore a carta e aceite [fp2_struggle_2015_peasant_to_murder.GetFirstNameNoTooltip] em sua corte."
 fp2_struggle.2015.c: ""Querem vocês mort[fp2_struggle_2015_peasant_to_murder.Custom('ES_OA')], fujam enquanto puderem"."
 fp2_struggle.2015.c.a: "[fp2_struggle_2015_peasant_to_murder.GetFirstNameNoTooltip] \"misteriosamente falha\" em escapar"
 fp2_struggle.2015.c.b: "[fp2_struggle_2015_murder_requester_vassal.GetFirstNameNoTooltip] é enganado(a) pensando que [fp2_struggle_2015_peasant_to_murder.GetFirstNameNoTooltip] está morto(a)"
 fp2_struggle.2016.t: "[ROOT.Char.Custom('ES_AlAla')|U] tolo[ROOT.Char.Custom('ES_OA')],"
 fp2_struggle.2016.desc: "Sei que vocês assassinaram #DIE2 (a petición mía)#! meu queridíssim[fp2_struggle_2015_peasant_to_murder.Custom('ES_OA')] enviad[fp2_struggle_2015_peasant_to_murder.Custom('ES_OA')] [fp2_struggle_2015_peasant_to_murder.GetFirstNameNoTooltip]. Mas não se preocupem, como seu leal vassal[fp2_struggle_2015_murder_requester_vassal.Custom('ES_OA')] leal vassal[fp2_struggle_2015_murder_requester_vassal.Custom('ES_OA')], será um segredo entre vocês e eu. Contanto que continuemos a nos ajudar mutuamente, como bons amigos que somos."
 fp2_struggle.2016.a: "Fui enganado! Maldit[fp2_struggle_2015_murder_requester_vassal.Custom('ES_OA')] [fp2_struggle_2015_murder_requester_vassal.Custom2('InsultNoun', ROOT.Char)]!"
 fp2_struggle.2018.t: "Xadrez entre Amigos"
 fp2_struggle.2018.t.outcome.a: "Forjando uma Amizade"
 fp2_struggle.2018.t.outcome.b: "Desfrutando da Companhia"
 fp2_struggle.2018.t.outcome.c: "Um Tempo Desagradável"
 fp2_struggle.2018.desc.desc_combat_clarification: "Na minha mente, nossas espadas se chocavam, em uma feroz batalha de análise estratégica e pura determinação.\n\nÉramos apenas peças se movendo em um tabuleiro, mas nossa intensa concentração fez a sala e o tabuleiro se dissiparem no éter, deixando-nos em um campo de batalha criado pela nossa imaginação; avançando rumo à vitória passo a passo, movimento a movimento, lutando ferozmente por cada peão…\n\n"
 fp2_struggle.2018.desc.desc_intro: "Quando os minutos se transformam em horas e o anoitecer sinaliza o fim do tempo que passamos juntos, [fp2_2017_gamervassal.GetFirstNameNoTooltip] comenta…"
 fp2_struggle.2018.desc.good_intro_match: "\"Ah, que partida encantadora!"
 fp2_struggle.2018.desc.bad_intro_match: ""Ufa, que partida… Vocês deveriam praticar mais frequentemente, seus movimentos foram simples e previsíveis. Não há prazer em jogar contra um oponente que não sabe se defender."
 fp2_struggle.2018.desc.fought_hard: "$fp2_struggle.2018.desc.good_intro_match$ Você realmente lutou com unhas e dentes, eu posso respeitar isso."
 fp2_struggle.2018.desc.was_creative: "$fp2_struggle.2018.desc.good_intro_match$ Me pegaste de surpresa com aquela abertura de hipopótamo no flanco do rei, que movimento audacioso!"
 fp2_struggle.2018.desc.match_end_win: "E você também venceu, bem merecido!"
 fp2_struggle.2018.desc.match_end_loss: "Mas, no fim, fui eu quem venceu."
 fp2_struggle.2018.desc.match_end_loss_noticed: "Consegui vencer, embora eu ache que esse era o seu plano o tempo todo."
 fp2_struggle.2018.desc.social_pre_intro: "Passamos o tempo bebendo e conversando sobre toda sorte de assuntos, desde questões simples das aldeias próximas até os resultados dos duelos entre [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]."
 fp2_struggle.2018.desc.social_pre_intro_crit: "[fp2_2017_gamervassal.GetFirstName] ficou totalmente cativad[fp2_2017_gamervassal.Custom('ES_OA')] pela conversa e participou em todos os momentos, discutindo os temas em questão com grande paixão."
 fp2_struggle.2018.desc.social_pre_intro_good: "[fp2_2017_gamervassal.GetFirstName] estava claramente gostando da conversa e da hospitalidade.\n\n"
 fp2_struggle.2018.desc.social_pre_intro_bad: "[fp2_2017_gamervassal.GetFirstName] se entediou e ficou distraíd[fp2_2017_gamervassal.Custom('ES_OA')] o tempo todo…\n\n"
 fp2_struggle.2018.desc.social_intro: ""Acho que já bebi o bastante."
 fp2_struggle.2018.desc.social_good: "A rodada de [ROOT.Char.Custom('GetExpensiveDrink_Singular')] foi ótima, obrigado."
 fp2_struggle.2018.desc.outcome_0: "Me diverti muito, deveria te visitar com mais frequência!"
 fp2_struggle.2018.desc.outcome_1: "Foi divertido, talvez eu volte algum dia."
 fp2_struggle.2018.desc.outcome_2: "Preciso ir, minha [SCOPE.sC('fp2_2017_gamervassal').Custom2('RelationToMe', SCOPE.sC('fp2_2017_questgiver'))] provavelmente está me esperando. Adeus, [ROOT.Char.GetFirstNameNoTooltip]."
 fp2_struggle.2018.a: "Sucesso! Convenci [fp2_2017_gamervassal.GetHerHim] a meu favor!"
 fp2_struggle.2018.b: "Não nos tornamos exatamente amigos, mas nos divertimos!"
 fp2_struggle.2018.c: "Ah, isso não foi muito bem..."
 fp2_struggle.2020.t: "Açò és or, xata!"
 fp2_struggle.2020.desc: "Passando por [fp2_2020_valencia.GetName], uma camponesa me oferece uma caneca refrescante de leite com um sabor mais doce do que qualquer outro que eu j? tenha provado. "O que ? essa bebida maravilhosa que voc? me ofereceu?", pergunto, e ela responde: "Leite de am?ndoa-da-terra."\n\nN?o h? pessoa que possa resistir ao encanto dessa mistura em um dia quente de ver?o, nenhuma crian?a que possa evitar sorrir quando lhe oferecem uma caneca, e nenhum valenciano sem desejo por ela. #EMP Esta bebida n?o ? leite, ? ouro!#!"
 fp2_struggle.2020.a: "'De agora em diante, [fp2_2020_valencia.GetNameNoTooltip] deve cultivar exclusivamente amêndoas terrestres!'"
 fp2_struggle.2020.a.desc: "Você obriga os camponeses a cultivar exclusivamente amêndoas terrestres, criando produtos de luxo para a sua capital."
 fp2_struggle.2020.b: "'Dê-me todos os seus barris, isso será o centro da minha próxima festa!'"
 fp2_struggle.2020.c: "'Não vou cair na tentação dessa bebida, vá embora!'"
 fp2_struggle.2020.c.desc: "Com um coração pesado, você se livra do desejo por horchata. Ganhar notoriedade por resistir a grande tentação."
 fp2_struggle.2020.d: "Financie o plantio de mais amêndoas em toda a plantação."
 fp2_struggle.2021.t: "Retorno do Rei dos Ladrões"
 fp2_struggle.2021.desc: ""Olá, [ROOT.Char.GetFirstName]. Certamente vocês não esperavam me ver de novo."
 fp2_struggle.2021.desc.alt.cutout: "Especialmente depois que voc? destruiu minha organiza??o anos atr?s. Mas quebrar algo ? t?o f?cil quanto reconstru?-lo, e eu n?o quero mais brincar de gato e rato. Conceda-me passagem segura para [fp2_2021_old_napoly.GetNameNoTier] e voc? nunca mais ter? que me ver; a guilda ser? reconstru?da longe de voc? e de suas riquezas.""
 fp2_struggle.2021.desc.alt.paidoff: "Especialmente quando fizemos um acordo para n?o incomod?-lo novamente. Mas minha bolsa est? come?ando a ficar leve demais para meu conforto. Este pode ser um solo f?rtil para o crime, mas n?o para organiz?-lo. Desejo levar meus agentes e a mim para [fp2_2021_old_napoly.GetNameNoTier]; conceda-nos passagem segura e voc? n?o precisar? mais se preocupar conosco.""
 fp2_struggle.2021.desc.alt.work: "Mas eu gostei de trabalhar com você da última vez e preciso de gente confiável. Agora que estou na frente, gostaria de me aposentar, vocês podem garantir passagem segura para [fp2_2021_old_napoly.GetNameNoTier]?""
 fp2_struggle.2021.desc.alt.behead: "Eu não estou aqui para vingar [fp2_2009_garduna_young_thief.GetFirstName], mas para me aposentar. Aquela foi uma cabeça a mais e eu sei muito bem que a minha poderia ser a próxima. Conceda-me passagem segura para sair para [fp2_2021_old_napoly.GetNameNoTier] e você nunca mais me verá. Não há necessidade de esta reunião terminar em derramamento de sangue.\""
 fp2_struggle.2021.desc.outro: "Diz [fp2_2009_garduna_guild_master.GetFullNameNicknamed], enquanto segura nervosamente uma bolsa de moedas em uma mão e uma arma escondida na outra."
 fp2_struggle.2021.a: "\"Muito bem, eu vou ajudá-lo a sair para a Itália.\""
 fp2_struggle.2021.a.alt: "\"Em vez disso, que tal se aposentar na Itália?\""
 fp2_struggle.2021.a.a: "[fp2_2009_garduna_guild_master.GetFirstName] partirá para [fp2_2021_old_napoly.GetName] e desaparecerá"
 fp2_struggle.2021.b: "\"Na verdade, que tal se juntar às minhas fileiras?\""
 fp2_struggle.2021.c: "\"Soa exaustivo, que tal se tornar um espião em vez de um criminoso?\""
 fp2_struggle.2021.c.flavor: "Você oferece dinheiro suficiente para [fp2_2009_garduna_guild_master.GetFirstNameNoTooltip] operar uma rede de espionagem para que eles possam procurar segredos em seu nome."
 fp2_struggle.2021.c.a: "A rede de espionagem buscará e informará até dois segredos de outros governantes envolvidos na luta."
 fp2_struggle.2021.c.spynet.a: "Rede de Espionagem Encontrou Segredos:"
 fp2_struggle.2021.c.spynet.b: "A rede de espionagem falhou em encontrar segredos"
 fp2_struggle.2021.c.spynet.b.desc: "A rede de espiões liderada por [fp2_2009_garduna_guild_master.GetFirstName] não conseguiu encontrar segredos relevantes, mas teu chefe[fp2_2009_garduna_guild_master.Custom('ES_EA')] de espiões aprendeu muito com a experiência…"
 fp2_struggle.2021.d: "\"Não, você não vai escapar desta vez! Prepare-se!\""
 fp2_struggle.2021.d.alt: "Você está certo, sua cabeça #EMP será#! a próxima! #BER Pereça!#!"
 fp2_struggle.2021.d.a: "Matando Velhos Inimigos"
 fp2_struggle.2021.d.b: "@warning_icon! Você entrará em um duelo letal com [dueltarget.GetFirstName]"
 fp2_struggle.2023.t: "Um Rei para um Bardo"
 fp2_struggle.2023.desc: "Estou em uma tenda num acampamento na fronteira com [fp2_2023_foreign_king.GetPrimaryTitle.GetName] em plena avaliação das tensões entre nossos reinos. De repente, um[fp2_2023_enemy_knight.Custom('ES_XA')] [fp2_2023_enemy_knight.GetWomanMan] entra na tenda, exigindo ver o "novo comandante". Instintivamente, dou um passo à frente.\n\n"Então, vos sois o nov[ROOT.Char.Custom('ES_OA')] comandante? Muito bem, escolhei um desafio, quem perder pagará as bebidas desta noite do outro acampamento!", diz [fp2_2023_enemy_knight.GetFirstName], comandante do acampamento inimigo, alhe[fp2_2023_enemy_knight.Custom('ES_OA')] ao fato de que sou [ROOT.Char.GetFullNameRegnal]. e não um[ROOT.Char.Custom('ES_XA')] simples líder militar."
 fp2_struggle.2023.a.desc: "Você diz aos soldados quem você é, acaba com a festa e exige que suas tropas façam agachamentos como punição por confraternizar com o inimigo enquanto estiveram de serviço."
 fp2_struggle.2023.a.a: ""Seu tolo, eu sou [ROOT.GetCharacter.GetFullName]!""
 fp2_struggle.2023.b: "\"Apresentem seus piores poemas sobre os governantes um do outro!\""
 fp2_struggle.2023.b.desc: "Vocês escrevem poemas difamando o governante do outro lado e depois os leem para uma multidão animada."
 fp2_struggle.2023.b.a: "Você zomba de [fp2_2023_foreign_king.GetFirstNameRegnal]"
 fp2_struggle.2023.b.b: "Sua poesia é zombada"
 fp2_struggle.2023.c: "\"Vamos resolver isso com uma partida amigável, em guarda!\""
 fp2_struggle.2023.c.desc: "Você participa de uma partida não letal com o comandante inimigo para decidir quem paga as bebidas depois."
 fp2_struggle.2023.c.exptooltip: "Você pode ganhar Experiência adicional [martial_lifestyle|lE] da partida."
 fp2_struggle.2023.c.a: "Vencendo o Comandante Inimigo"
 fp2_struggle.2023.c.b: "[fp2_2023_enemy_knight.GetNameNoTooltip] te vence"
 fp2_struggle.2023.d: "\"Por que esperar até a taverna? Vamos competir bebendo cerveja!\""
 action_considered_haram_warning: "@warning_icon! #italic Esta ação é considerada#! #X haram#!#italic !#!"
 fp2_struggle.2023.d.a: "Você desmaia de bêbado[ROOT.Char.Custom('ES_OA')]"
 fp2_struggle.2023.d.b: "Bebendo o equivalente a um barril"
 fp2_struggle.2025.t: "Sofrendo Com o Sucesso"
 fp2_struggle.2025.desc: "Sob o brilho quente do sol, h? um peda?o de terra com campos malcuidados e pr?dios em ru?nas, o vento sussurrando lamenta??es de solid?o atrav?s de suas pedras decr?pitas. Este ? um dos muitos vilarejos assim em [fp2_2025_razed_land.GetNameNoTier]; os habitantes que partiram quando a guerra chegou nunca voltaram quando ela acabou e a bandeira de [ROOT.Char.GetPrimaryTitle.GetName] tremulou sobre ele.\n\n"Bonito, n?o ??", pergunta meu [ROOT.Char.Custom2('RelationToMe', fp2_2025_marshal)] [fp2_2025_marshal.GetFirstName]. "Esta ? uma terra livre, pronta para a reconstru??o. Poder?amos construir um monumento ao nosso sucesso bem aqui.""
 fp2_struggle.2025.a: "Nossos novos súditos precisam de tempo para lamentar, não lutar..."
 fp2_struggle.2025.b: "Ideia brilhante! Aqui se erguerá o maior dos monumentos!"
 fp2_struggle.2025.c: "Vamos restaurar esta cidade de volta ao que era."
 fp2_struggle.2025.d: "Vou estabelecer postos avançados temporários aqui para proteger minhas novas terras."
 fp2_struggle.2050.title_main_ichi: "Desconforto"
 fp2_struggle.2050.title_main_ni: "Rumores na Corte"
 fp2_struggle.2050.title_main_san: "Sussurros Hostis"
 fp2_struggle.2050.title_main_shi: "Preocupações"
 fp2_struggle.2050.t_about_generic: "Sobre El Cid"
 fp2_struggle.2050.t_about_muslim: "Sobre El Sidi"
 fp2_struggle.2050.t_generic_one: "$fp2_struggle.2050.title_main_ichi$ $fp2_struggle.2050.t_about_generic$"
 fp2_struggle.2050.t_generic_two: "$fp2_struggle.2050.title_main_ni$ $fp2_struggle.2050.t_about_generic$"
 fp2_struggle.2050.t_generic_three: "$fp2_struggle.2050.title_main_san$ $fp2_struggle.2050.t_about_generic$"
 fp2_struggle.2050.t_generic_four: "$fp2_struggle.2050.title_main_shi$ $fp2_struggle.2050.t_about_generic$"
 fp2_struggle.2050.t_muslim_one: "$fp2_struggle.2050.title_main_ichi$ $fp2_struggle.2050.t_about_muslim$"
 fp2_struggle.2050.t_muslim_two: "$fp2_struggle.2050.title_main_ni$ $fp2_struggle.2050.t_about_muslim$"
 fp2_struggle.2050.t_muslim_three: "$fp2_struggle.2050.title_main_san$ $fp2_struggle.2050.t_about_muslim$"
 fp2_struggle.2050.t_muslim_four: "$fp2_struggle.2050.title_main_shi$ $fp2_struggle.2050.t_about_muslim$"
 fp2_struggle.2050.desc_court: "Los susurros se extienden por mi corte como brasas que prenden el fuego. Da la sensación de que todos los que me rodean creen que [fp2_2050_el_cid.GetFullName] actuó a mis espaldas.\n\nRumores de tributos robados, enfrentamientos no autorizados y otras acciones provocan que se ponga en duda mi autoridad en mi propia corte. No tengo dudas sobre la integridad de [fp2_2050_el_cid.GetFirstName], pero ¿puedo permitirme mantener a un hombre que atrae tales maledicencias a mi corte? Ya no se pueden detener y, si no actúo pronto, se me considerará débil."
 fp2_struggle.2050.desc_knights: "Andando pelos corredores do [ROOT.GetCharacter.Custom('FortifiedBuilding')], percebo que todos os meus [ROOT.GetCharacter.Custom('KnightCulturePluralNoTooltipLowercase')] est?o abatidos. A presen?a de [fp2_2050_el_cid.GetFullNameNicknamed] inspira o soldado comum a realizar grandes feitos, mas faz o nobre [ROOT.GetCharacter.Custom('KnightCultureNoTooltipLowercase')] murchar sob seu brilho.\n\nComo comandante talentoso e guerreiro digno de f?bulas, n?o h? d?vida sobre o valor que [fp2_2050_el_cid.GetFirstNameNicknamed] traz para minhas fileiras, mas se a for?a de um homem causa fraqueza em outros... Posso realmente me permitir manter tal influ?ncia entre meus [ROOT.GetCharacter.Custom('KnightCulturePluralNoTooltipLowercase')]?"
 fp2_struggle.2050.desc_nobles: "Nobres de todo o reino se aproximaram de mim ultimamente para compartilhar preocupa??es, fofocas e coment?rios abertamente hostis sobre meu [ROOT.Char.Custom2('RelationToMe', fp2_2050_el_cid)] [fp2_2050_el_cid.GetFirstNameNicknamed]. ? claro que a nobreza n?o gosta do meu tratamento favor?vel a [fp2_2050_el_cid.GetFirstName] e deseja ver este rec?m-chegado [ROOT.GetCharacter.Custom('KnightCultureNoTooltipLowercase')] banido antes que qualquer plebeu tente seguir seus passos. [fp2_2050_el_cid.GetFirstName] pode ter sido um nobre, mas agora ? um [ROOT.GetCharacter.Custom('KnightCultureNoTooltipLowercase')] feito por si mesmo e uma amea?a percebida ao tecido social do reino.\n\nA decis?o ? minha, mas manter [fp2_2050_el_cid.GetFirstName] por perto coloca em perigo minha posi??o com a nobreza."
 fp2_struggle.2050.desc_faith: "Em todos os lugares que vou, vejo falta de respeito refletida nos olhos dos meus [ROOT.Char.Custom('DefaultPriestTitlePlural')]. Rumores infundados dizem que minha sede por terras e ouro me desviou de [ROOT.GetCharacter.GetFaith.HighGodName] e me levou a apoiar mercen?rios ?mpios como [fp2_2050_el_cid.GetFirstNameNicknamed], que n?o se importam com quem lutam.\n\nSuas mentes tolas s?o obscurecidas por del?rios romantizados de guerra cavalheiresca, onde apenas os piedosos defendem sua f?, quando na verdade ? por causa de pessoas como ele que nosso modo de vida est? seguro. De qualquer forma, se eu quiser permanecer nas boas gra?as do meu clero, talvez seja hora de considerar banir [fp2_2050_el_cid.GetFirstName]."
 fp2_struggle.2050.a: "Confio em meu [ROOT.Char.Custom2('RelationToMe', fp2_2050_el_cid)|l] e ele ficará!"
 fp2_struggle.2050.a.serve_tooltip: "[fp2_2050_el_cid.GetFirstNameNicknamedNoTooltip] continua a servi-lo."
 fp2_struggle.2050.a.notif.t: "[fp2_2050_el_cid.GetNicknameNoTooltip] permanece"
 fp2_struggle.2050.b: "[fp2_2050_el_cid.GetFirstNameNoTooltip] continuará a me servir, não importa o quê!"
 fp2_struggle.2050.c: "Talvez seja hora de deixá-lo ir..."
 fp2_struggle.2050.c.notif: "[fp2_2050_el_cid.GetFirstNameNicknamedNoTooltip] buscará emprego em outro lugar..."
 fp2_struggle.2051.t: "[fp2_2050_el_cid.GetFirstNameNicknamedNoTooltip]"
 fp2_struggle.2051.desc: "Un renombrado caballero de nombre [fp2_2050_el_cid.GetFullName], también conocido como «[fp2_2050_el_cid.GetNicknameNoTooltip]», ha llegado a mi corte buscando un señor al que servir. Es un comandante de indudable talento y un guerrero digno de leyenda.\n\n[fp2_2050_el_cid.GetFirstNameNoTooltip] no tiene reparos en trabajar con quien esté dispuesto a recibirlo con los brazos abiertos. Esta es una oportunidad para reclutar a un caballero capaz de cambiar el rumbo de la batalla por sí solo."
 fp2_struggle.2051.a: "Ah, bem-vindo! Você terá uma posição elevada em minha corte."
 fp2_struggle.2051.b: "Um homem do seu talento é sempre bem-vindo em meu reino."
 fp2_struggle.2051.c: "Procure emprego em outro lugar, [fp2_2050_el_cid.GetFirstNameNoTooltip]."
 #fp2_2004placeholder
 fp2_struggle.2004.t: "Uma Grande Armada"
 fp2_struggle.2004.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('2004_scoped_steward'))] , [2004_scoped_steward.GetFirstName] me informa que seus cronistas retornaram de viajar e estudar as tecnologias navais por todos os mares. Com o apoio de [2004_scoped_steward.GetSheHe] , conseguiríamos financiar o projeto de uma nova embarcação que superaria a dos nossos vizinhos e abriria caminho para uma era de supremacia marítima para [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip].\n\nPor outro lado, meu [2004_scoped_marshal.GetCouncilTitleFirstName] preferiria que gastássemos esse ouro em coisas que não fossem navios comerciais."
 fp2_struggle.2004.a: "Considere patrocinar o empreendimento"
 fp2_struggle.2004.a.a.desc: "Novos projetos de navios são criados"
 fp2_struggle.2004.a.b.desc: "Os construtores navais de [fp2_2004_dockyards.GetNameNoTierNoTooltip] tornam-se artesãos renomados"
 fp2_struggle.2004.b: "Esses fundos podem ser utilizados de forma melhor em outro lugar"
 fp2_struggle.2004.b.desc: "Você rejeita os esforços de [2004_scoped_steward.GetFirstNameNoTooltip] e mantém os fundos"
 fp2_struggle.2004.c: "Eu não quero um novo projeto de navio, eu quero um navio de prata pura!"
 fp2_struggle.2004.c.desc: "Você aposta seus fundos em uma oportunidade de renome excepcional, reunindo os melhores artesãos para construir o impossível - um navio de prata pura."
 fp2_struggle.2005.t: "Uma Armada à Frente do Tempo"
 fp2_struggle.2005.t.alt: "Mestres Artesãos de [fp2_2004_dockyards.GetNameNoTier]"
 fp2_struggle.2005.desc: "Os novos navios apresentam o seguinte design:"
 fp2_struggle.2005.desc.intro: ""Meu senhor[ROOT.Char.Custom('ES_XA')], por fim nossos navios estão prontos para zarpar!", diz [2005_scoped_steward.GetFirstName]. "Acredito que o senhor ficará muito satisfeito com o projeto".\n\n"
 fp2_struggle.2005.desc.cirt.notif: "Os novos designs são um sucesso excepcional! Na verdade, um novo estaleiro foi criado em [fp2_2004_dockyards.GetNameNoTier] apenas para produzir esses novos navios de última geração.\n\n"
 fp2_struggle.2005.desc.cirt.a.notif: "Infelizmente, desde o início da construção, os [fp2_2004_dockyards.GetName] caíram nas mãos de [fp2_2004_dockyards.GetHolder.GetName]. Conseguimos manter os projetos dos navios, mas os estaleiros agora são deles.\n\n"
 fp2_struggle.2005.desc.newdesigner.notif: "Quem criou o design original, [2004_scoped_steward.GetFirstName] já não está mais conosco, mas [2005_scoped_steward.GetFirstNameNicknamed] conseguiu assumir as rédeas e concluir o projeto sem [2004_scoped_steward.GetSheHe].\n\n"
 fp2_struggle.2005.desc.bottom.generic: "O fundo do navio utiliza"
 fp2_struggle.2005.desc.bottom.a: "$fp2_struggle.2005.desc.bottom.generic$ uma quilha de fundo chato, que permite uma navegação estável em águas calmas."
 fp2_struggle.2005.desc.bottom.b: "$fp2_struggle.2005.desc.bottom.generic$ um anteparo estanque projetado para evitar o afundamento quando ocorrerem danos."
 fp2_struggle.2005.desc.bottom.c: "$fp2_struggle.2005.desc.bottom.generic$ uma quilha afiada e profunda, capaz de cortar as ondas a uma velocidade imensa!"
 fp2_struggle.2005.desc.bottom.d: "$fp2_struggle.2005.desc.bottom.generic$ costados de tingladilho, tornando o casco ao mesmo tempo mais robusto e mais leve."
 fp2_struggle.2005.desc.unique.init: "Em seguida, acima dela encontra-se a peça mais única, sua"
 fp2_struggle.2005.desc.unique.a: "$fp2_struggle.2005.desc.unique.init$ dupla canoa grande com flutuadores laterais, proporcionando uma estabilidade sem precedentes."
 fp2_struggle.2005.desc.unique.b: "$fp2_struggle.2005.desc.unique.init$ conjunto de baluartes de madeira elevados em cada extremidade do casco, permitindo que os arqueiros chovam flechas sobre o inimigo."
 fp2_struggle.2005.desc.unique.c: "$fp2_struggle.2005.desc.unique.init$ construção imponente, semelhante a um castelo, no convés."
 fp2_struggle.2005.desc.unique.d: "$fp2_struggle.2005.desc.unique.init$ telhado de madeira coberto de espinhos para dissuadir o embarque."
 fp2_struggle.2005.desc.unique.e: "$fp2_struggle.2005.desc.unique.init$ aríete na proa para atravessar as embarcações inimigas em um confronto direto."
 fp2_struggle.2005.desc.sails.init: "Finalmente, o navio usa"
 fp2_struggle.2005.desc.sails.a: "$fp2_struggle.2005.desc.sails.init$ grandes velas quadradas empilháveis aproveitando a brisa do mar."
 fp2_struggle.2005.desc.sails.b: "$fp2_struggle.2005.desc.sails.init$ velas enormes e sobrepostas dignas das embarcações mais poderosas."
 fp2_struggle.2005.desc.sails.c: "$fp2_struggle.2005.desc.sails.init$ velas complexas de proa e popa para a maior manobrabilidade."
 fp2_struggle.2005.desc.sails.d: "$fp2_struggle.2005.desc.sails.init$ muitas grandes fileiras de remos. Tornando a embarcação tão firme quanto a vontade dos que a tripulam."
 fp2_struggle.2005.desc.outro: "\n\n\"Mais impressionante, não acha?\" Diz [2005_scoped_steward.GetFirstNameNicknamed]."
 fp2_struggle.2005.desc.outro.crit: "\n\n\"Isto certamente trará para nós uma era de supremacia naval!\" Proclama orgulhosamente [2005_scoped_steward.GetFirstNameNicknamed]."
 fp2_struggle.2005.a: "Você fez bem."
 fp2_struggle.2005.a.a: "Pena sobre os estaleiros, mas pelo menos temos os navios."
 fp2_struggle.2005.desc.alt.a: "Prata afundada"
 fp2_struggle.2005.desc.alt.a.desc: "Sabendo o quanto essa not?cia causar? tristeza, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('2005_scoped_steward'))], [2005_scoped_steward.GetFirstName], se aproxima com cautela para me comunicar o resultado da nossa tentativa de fazer a prata flutuar.\n\n"Apesar dos nossos melhores esfor?os, a ideia de construir um navio de metal ? uma loucura. Depois de conclu?do, o navio deixou o porto e afundou prontamente no abismo do oceano. Uma parte significativa do nosso tesouro agora est? fora de alcance, sob as cru?is ondas. Sinto muito, meu senhor[ROOT.Char.Custom('ES_XA')]."\n\n"
 fp2_struggle.2005.desc.alt.b: "Embarcações de prata"
 fp2_struggle.2005.desc.alt.b.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('2005_scoped_steward'))], [2005_scoped_steward.GetFirstName] sabia que era apenas um artifício para impressionar, algo para ganhar reputação. Não importa o quanto a tecnologia avance, barcos feitos de metal nunca flutuarão.\n\nPor isso, em vez de levar a tarefa a sério e tentar o impossível, ele revestiu uma embarcação de madeira com uma fina camada de prata para enganar os espectadores. Eu e meu novo \"navio metálico\" somos o assunto da cidade e a inveja do mundo!\n\n"
 #fp2_struggle_event_2006
 fp2_struggle.2006.t: "As Fronteiras da Fé"
 fp2_struggle.2006.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('fp2_2006_vassal_in_crisis'))] [fp2_2006_vassal_in_crisis.GetTitledFirstName|l] se aproxima de mim em particular, com uma clara dúvida em seu olhar.\n\nExplica-me que sua fé vacila por causa do tempo que passou guardando a fronteira contra o [fp2_2006_foreign_faith.GetNameNoTooltip|l], confraternizando com o inimigo. Não está brincando. É como se o menor erro pudesse afastar[fp2_2006_vassal_in_crisis.GetHerHim] de [ROOT.Char.GetFaith.HighGodName].\n\nAinda assim, esta é uma oportunidade para fortalecer nosso fervor, assim como nosso relacionamento."
 fp2_struggle.2006.a: "\"Alguém chame um padre!\""
 fp2_struggle.2006.a.a: "[fp2_2006_vassal_in_crisis.GetTitledFirstNameNoTooltip|l] permanece em dúvida"
 fp2_struggle.2006.a.b: "[fp2_2006_vassal_in_crisis.Custom('ES_ElLa')|U] [fp2_2006_vassal_in_crisis.GetTitledFirstNameNoTooltip|l] se sente ameaçad[fp2_2006_vassal_in_crisis.Custom('ES_OA')] pela presença [2006_scoped_chaplain.Custom('ES_DelDela')] [2006_scoped_chaplain.GetTitledFirstNameNoTooltip|l]"
 fp2_struggle.2006.a.c: "[2006_scoped_chaplain.GetCouncilTitleFirstNameNoTooltip] reafirma a fé [fp2_2006_vassal_in_crisis.Custom('ES_DelDela')] [fp2_2006_vassal_in_crisis.GetTitledFirstNameNoTooltip|l]"
 fp2_struggle.2006.a.desc: "Llamas [2006_scoped_chaplain.Custom('ES_AlAla')] [2006_scoped_chaplain.GetCouncilTitleFirstNameNoTooltip|l] para solucionar esta situación. [fp2_2006_vassal_in_crisis.GetFirstNameNoTooltip] se sentirá traicionad[fp2_2006_vassal_in_crisis.Custom('ES_OA')] porque le contaste a otros sus males."
 fp2_struggle.2006.b: "Eu mesmo vou reacender o seu fervor."
 fp2_struggle.2006.b.a.desc: "[fp2_2006_vassal_in_crisis.GetFirstNameNoTooltip] resiste à tentativa"
 fp2_struggle.2006.b.b.desc: "Você tranquiliza a fidelidade de [fp2_2006_vassal_in_crisis.GetFirstNameNoTooltip]"
 fp2_struggle.2006.c: "\"Escolha qualquer fé, desde que você #emphasis sirva#! #BER a mim#!.\""
 fp2_struggle.2006.c.desc: "Você permite que [fp2_2006_vassal_in_crisis.GetFirstNameNoTooltip] escolha uma fé por conta própria."
 fp2_struggle.2006.c.notif.t: "Liberdade de Amizade"
 fp2_struggle.2006.d: "Ameaçar denunciar[fp2_2006_vassal_in_crisis.GetHerHim] por heresia."
 fp2_struggle.2006.d.notif.t: "Combatendo a Dúvida com Medo"
 fp2_struggle.2006.e: "Esqueçam os assuntos da fé, #emphasis abracem a bruxaria!#!#"
 fp2_struggle.2006.e.alreadywitch: "[fp2_2006_vassal_in_crisis.GetFirstName] já era brux[fp2_2006_vassal_in_crisis.Custom('ES_OA')]! Não era uma crise de fé. [fp2_2006_vassal_in_crisis.GetFirstNameNoTooltip] só precisava de um amig[ROOT.Char.Custom('ES_OA')] que [fp2_2006_vassal_in_crisis.GetHerHim] entendesse."
 fp2_struggle.2006.generic.notif.a.t: "Vassalo Abraça [fp2_2006_foreign_faith.GetNameNoTooltip|l]"
 fp2_struggle.2006.generic.notif.b.t: "Vassalo Permanece Fiel"
 fp2_struggle.2006.e.notif.t: "Conjuradores Cordiais"
 fp2_struggle.2006.e.tacticalwitchfaithchange: "Converte-se para [fp2_2006_foreign_faith.GetName|l] para evitar perseguição"
 #fp2_flavor_events_vero
 fp2_flavor.3001.t: "Enquanto Morro"
 fp2_flavor.3001.desc: "O vento parece mais frio e os dias mais escuros, mais curtos, mais silenciosos. O trono parece o mesmo do dia em que sentei nele pela primeira vez. O trono sempre parecerá o mesmo. Mas eu não.\n\nÉ hora de me preparar para o inevitável, e vou encomendar um epitáfio antes de partir, para que eu possa partir em paz."
 fp2_flavor.3001.a: "Usaremos a língua [SCOPE.Custom('IberiaSacredLanguage')]."
 fp2_flavor.3001.b: "Essa não é a língua que todos nós falamos. Vou usar [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip]."
 fp2_flavor.3001.c: "Não farei distinções. É [SCOPE.Custom('IberiaSacredLanguage')] e [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip]."
 fp2_flavor.3001.d: "Não somos os únicos que vivem aqui."
 IberiaSacredLanguage_hebrew: "Hebraico"
 IberiaRomanceLanguage_castilian: "Castelhano"
 IberiaRomanceLanguage_sephardi: "Sefardita"
 IberiaRomanceLanguage_mozarabic: "Mozárabe"
 fp2_epitaph_modifier: "Epitáfio Poliglota"
 fp2_flavor.3011.t: "Uma Jogada Inesperada"
 fp2_flavor.3011.desc: "Meu grande amig[fp2_flavor_3011_best_friend.Custom('ES_OA')] [fp2_flavor_3011_best_friend.GetFirstName] n?o precisa anunciar-se antes de entrar em meu [ROOT.Char.Custom('GetChamber')]. Ah, seu sorriso alegre nunca deixa de me encantar. Mas... hoje h? algo diferente em [fp2_flavor_3011_best_friend.GetSheHe]; seu cabelo est? perfeitamente arrumado e suas roupas s?o t?o opulentas quanto elegantes.\n\n"[ROOT.Char.GetFirstNameNoTooltip], meu grande amig[ROOT.Char.Custom('ES_OA')]! Um [ROOT.Char.Custom('ResidenceBuilding')] inteiro... e voc? aqui, s?! N?o h? nada de que eu goste mais do que sua preciosa companhia e, se eu pudesse ? oh, c?us, se eu pudesse! ? passaria todos os meus dias e noites com voc? nesta mesma [ROOT.Char.Custom('GetRoom')].""
 fp2_flavor.3011.a: "E há apenas uma cama."
 fp2_flavor.3011.b: "Vou encontrar um alojamento digno de você!"
 fp2_flavor.3011.c_spouse: "Eu tenho um cônjuge!"
 fp2_flavor.3011.c: "Estou tão sozinh quanto quero estar."
 fp2_flavor.3021.t: "Uma Noite Sem Graça"
 fp2_flavor.3021.desc: "Quando meu grande amig[fp2_flavor_3021_best_friend.Custom('ES_OA')] [fp2_flavor_3021_best_friend.GetFirstName] me convidou para passar a noite, eu não esperava que acabaria preferindo comer couro molhado numa caverna.\n\nViro o rosto quando um dos convidados expõe suas feridas infectadas de pus: "Esta eu peguei enquanto cagava!".\n\n"Que noite agradável, não é?", aproxima-se de mim [fp2_flavor_3021_best_friend.GetFirstNameNoTooltip], taça na mão. Seu sorriso corado não é manchado nem pela atmosfera miserável, pela conversa miserável e pela comida miserável."
 fp2_flavor.3021.a: "Tão agradável quanto pode ser!"
 fp2_flavor.3021.b: "S-sim, [fp2_flavor_3021_best_friend.GetFirstNameNoTooltip]... E-eu, olha, esta noite é—"
 fp2_flavor.3021.c: "[fp2_flavor_3021_best_friend.GetFirstName] merece saber a verdade."
 fp2_flavor.3021.d: "Infelizmente, é hora de partir."
 fp2_flavor.3021.b.success_tt: "[fp2_flavor_3021_best_friend.GetFirstNameNoTooltip] entenderá suas preocupações"
 fp2_flavor.3021.b.success: "Uma Conversa de Sucesso"
 fp2_flavor.3021.b.fail: "Uma Conversa Constrangedora"
 #fp2_james_events
 fp2_james.0001.t: "Uma próspera comunidade [fp2_james_0001_jewish_trader.GetFaith.GetAdjectiveNoTooltip] em [fp2_james_0001_thriving_community.GetNameNoTierNoTooltip]"
 fp2_james.0001.desc: "A expansão dos portos comerciais em [fp2_james_0001_thriving_community.GetNameNoTier] tornou-se um próspero centro comercial para os judeus em toda a Ibéria!\n\nUm membro de uma importante família mercante [fp2_james_0001_jewish_trader.GetCulture.GetName] tem trazido cada vez mais de seu povo.\n\nEm breve, será o próprio coração da vasta rede comercial judaica por toda a Ibéria."
 fp2_james.0001.a: "Se eles não são [ROOT.Char.GetFaith.GetReligion.GetAdjective], eles não são bem-vindos!"
 fp2_james.0001.b: "Talvez [fp2_james_0001_jewish_trader.GetSheHe] deveria ser senhor[fp2_james_0001_jewish_trader.Custom('ES_XA')] de [fp2_james_0001_thriving_community.GetNameNoTooltip]!"
 fp2_james.0001.c: "Que ótimo desenvolvimento!"
 fp2_thriving_jewish_community_modifier: "Comunidade Judaica Próspera"
 fp2_thriving_jewish_community_modifier_desc: "Este condado está experimentando um boom econômico de famílias judaicas ricas estabelecendo redes de comércio na área."
 fp2_jewish_community_denied_modifier: "Locais Perseguidos"
 fp2_jewish_community_denied_modifier_desc: "O crescimento social e econômico desta área foi sabotado por leis que discriminam minorias religiosas."
 fp2_conversos_persecution_modifier: "Conversos Perseguidos"
 fp2_conversos_persecution_modifier_desc: "Apesar da conversão ao cristianismo, os judeus convertidos e seus descendentes continuam a ser perseguidos."
 fp2_james.0002.t: "Falsa Conversão"
 fp2_james.0002.desc: "Uma série de supostos [fp2_james_0002_conversos_character.GetFaith.GetAdherentName] foram instados por seus antigos [fp2_james_0002_jewish_faith.PriestNeuterPlural] a se converterem à verdadeira fé. Mas continuaram praticando o [fp2_james_0002_jewish_faith.GetName|U] em segredo!\n\nSe isso for verdade, isso minaria qualquer esforço de converter ao cristianismo as comunidades judaicas ibéricas.\n\nSuspeita-se que um[fp2_james_0002_conversos_character.Custom('ES_XA')] de seus líderes, [fp2_james_0002_conversos_character.GetName], promova os ensinamentos judaicos…"
 fp2_james.0002.a: "Não me importa de qualquer maneira."
 fp2_james.0002.a.tt: "Permitir a [fp2_james_0002_conversos_character.GetNameNoTooltip] que faça o que bem entender"
 fp2_james.0002.b: "Devo interrogar este herege."
 fp2_james.0002.c: "Verdade ou não, ele apodrecerá em minhas masmorras!"
 fp2_james.0003.t: "[fp2_james_003_jewish_refugee_leader.GetFaith.GetAdherentNameNoTooltip] Refugiados"
 fp2_james.0003.desc: "[fp2_james_003_jewish_refugee_leader.GetName] fugiu de [fp2_james_003_intolerant_ruler.GetPrimaryTitle.GetNameNoTier] junto com uma grande quantidade de seus colegas [fp2_james_003_jewish_refugee_leader.GetFaith.GetAdherentNamePluralNoTooltip].\n\n vem me suplicar por um lar para seu povo e irá prontamente prestar juramento de fidelidade à coroa [fp2_james_003_jewish_refugee_leader.GetPrimaryTitle.GetAdjective] em troca de proteção contra a perseguição."
 fp2_james.0003.a: "A [fp2_james_0003_province_to_convert.GetNameNoTooltip] lhe cairiam bem uns poucos colonos."
 fp2_james.0003.b: "[fp2_james_003_jewish_refugee_leader.GetSheHe|U] terá que procurar outro lugar."
 fp2_james.0002.b.succesful_interrogation: "A interrogatório é bem sucedido"
 fp2_james.0002.b.failed_interrogation: "A interrogatório é um desastre"
 fp2_james_0002.b.failed_interrogation.tt: "Todos os condados cristãos e judeus em seu reino"
 fp2_james.0002.a.offended_conversos: "Os Conversos estão ofendidos"
 fp2_james.0002.a.jewish_communities_thrive: "Comunidades judaicas prosperam!"
 fp2_james.0002.a.nothing_happened_toast: "Os Conversos são verdadeiros cristãos"
 cultural_acceptance_gain_conversos_tolerance: "Tolerância de Conversos"
 cultural_acceptance_loss_conversos_tolerance: "Intolerância de Conversos"
 fp2_james.0004.t: "Noites de [fp2_james_0004_place_of_murder.GetNameNoTooltip]"
 fp2_james.0004.desc: "[fp2_james_0004_place_of_murder.GetName] es un lugar incontrolable de diversas creencias y gobernanzas. Cada comunidad tiene sus líderes, lo que da lugar a una compleja red de jerarquías y liderazgos que, sencillamente, no puede continuar. Si todos rezaran a [ROOT.Char.GetFaith.HighGodName] de la manera adecuada y correcta y respondieran al mismo líder, mi influencia aumentaría.\n\n[fp2_james_0004_murder_baron.GetName] ha dado un paso al frente con el objetivo de convertirse en [fp2_james_0004_murder_baron.Custom('ES_ElLa')] nuev[fp2_james_0004_murder_baron.Custom('ES_OA')] líder del [fp2_james_0004_place_of_murder.GetTierAsNameNoTooltip|U] y organizará un banquete en el que ejecutará a todos los líderes religiosos locales como si fueran ganado."
 fp2_james.0004.a: "Mal posso esperar para ouvir seus gritos."
 fp2_james.0004.b: "Eu não sou um monstro #EMP total#!."
 fp2_james.0005.t: "Ponto de vista"
 fp2_james.0005.desc.intro: "[fp2_james_angry_priest.GetName] se aproximou de mim hoje exigindo que a [ROOT.Char.GetFaith.HouseOfWorship] recentemente convertida enfrente a direção errada!"
 fp2_james.0005.desc.christian: "\n\nEm seu estado anterior como mesquita, apenas o Mihrab enfrentava a direção leste em direção a Meca, mas agora, como uma igreja adequada, espera-se que todo o edifício enfrente o leste."
 fp2_james.0005.desc.muslim: "\n\nComo uma antiga igreja, a mesquita enfrenta o leste, impedindo a construção de um Mihrab para guiar os seguidores a enfrentar a cidade sagrada!"
 fp2_james.005.desc.outro: "\n\n[fp2_james_angry_priest.GetNameNoTooltip] sustenta que, nessas condições, é praticamente impossível conduzir adequadamente os serviços e pede que sejam concedidos alguns fundos para girar o edifício na direção correta."
 fp2_james.0005.a: "Qualquer coisa pela fé!"
 fp2_james.0005.b: "Você está desperdiçando meu tempo."
 fp2_toledo_nights_modifier: "Líderes Locais Sistematicamente Assassinados"
 fp2_toledo_nights_modifier_desc: "Os governantes religiosos locais deste Condado foram recentemente massacrados."
 fp2_toledo_nights_fallout_modifier: "Liderança Religiosa Assassinada"
 fp2_toledo_nights_fallout_modifier_desc: "Líderes religiosos foram recentemente assassinados em uma cidade próxima, causando repercussões em todo este reino."
 fp2_correctly_facing_church: "Templo devidamente orientado"
 fp2_correctly_facing_church_desc: "O local de culto neste Condado foi girado tijolo por tijolo para garantir uma adoração adequada."
 #fp2_nick_events (all three files)
 fp2_yearly.4001.t: "A sexta hora"
 fp2_yearly.4001.desc: "Nossa! Ser [ROOT.Char.GetTitleAsNameNoTooltip|l] realmente acaba com voc?. Tenho que labutar o dia todo e boa parte da noite tamb?m para manter tudo sob controle. Os camponeses levam uma vida aben?oada nesse sentido: n?o t?m tais press?es, que os sobrecarregam tanto e lhes causam tanta letargia!\n\nSer? que uma sonequinha me faria bem? Posso dormir para passar o mal-estar do almo?o e assim estarei pront[ROOT.Char.Custom('ES_OA')] para encarar o resto do dia!"
 fp2_yearly.4001.a: "Não! Eu tenho trabalho a fazer!"
 fp2_yearly.4001.b: "Mm, #EMP adorável.#!"
 fp2_yearly.4002.t: "Vivendo em Harmonia"
 fp2_yearly.4002.desc: "O cenho franzido do meu [realm_priest.GetCouncilTitle], [realm_priest.Custom('ES_ElLa')] [realm_priest.GetTitledFirstName|l], me prepara para o que será alguma bobagem sobre [ROOT.Char.GetFaith.HighGodName].\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U]", começa, "há um assunto de grave importância em vosso domínio. O condado de [interfaith_province.GetCounty.GetName] está cheio de gente que não segue a verdadeira fé! E, para piorar, vivem ao lado daqueles que seguem! E, e, e, #EMP fornicando#! entre eles e…".\n\nFecho os olhos enquanto a ladainha interminável continua. Temo pensar como [realm_priest.GetFirstNameNoTooltip] continuará se eu não fizer algo…"
 fp2_yearly.4002.a: "Deixem-nos viver em paz, [realm_priest.GetFirstNameNoTooltip]."
 fp2_yearly.4002.b: "Você está certo. Isso não pode continuar."
 fp2_yearly.4003.t: "O Caminho de Santiago"
 fp2_yearly.4003.desc: "A cidade sagrada de Santiago de Compostela ? um ?m? para os fi?is, atraindo peregrinos de terras pr?ximas e distantes. Por isso, a rota at? l? ? muito percorrida, serpenteando at? o local desde as encostas dos Pireneus. ? claro que, onde h? pessoas ricas o bastante para viajar at? o local sagrado, tamb?m h? aquelas que buscam lucrar com sua confian?a no Todo-Poderoso.\n\n? a quinta den?ncia em tantos dias de um assalto violento cometido por bandidos nos trechos da estrada que atravessam meu territ?rio, o que finalmente leva meu [steward.GetCouncilTitle|l] [steward.GetFirstName] a consultar-me sobre como lidar com este problema."
 fp2_yearly.4003.a: "Entrarei em contato com os guerreiros sagrados de [ho_province.GetProvince.GetCounty.GetNameNoTooltip]!"
 fp2_yearly.4003.b: "Pagar por guardas para patrulhar uma seção da estrada."
 fp2_yearly.4003.c: "[ROOT.Char.GetFaith.HighGodName] ajuda aqueles que se ajudam..."
 fp2_yearly.4003.tt: "A [holy_order|lE] local patrulhará a estrada em seu condado."
 fp2_yearly.4004.t: "O Mestre Errante"
 fp2_yearly.4004.desc: "Eu me dirigia ao salão de justiça quando uma confusão em sua extremidade mais distante chama minha atenção. Meus guardas se lançam sobre um[mozarab_wanderer.Custom('ES_XA')] [mozarab_wanderer.GetWomanMan] robust[mozarab_wanderer.Custom('ES_OA')] e suas armas caem ao chão num piscar de olhos. Tal estranh[mozarab_wanderer.Custom('ES_OA')] faz uma reverência com sua espada em minha direção, em saudação.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U]", começa enquanto afasto mais guardas com um gesto, "me encontro sem um suserano a quem servir, e, a julgar por sua proteção aqui, sua ajuda me cairia bem".\n\nPela cruz que carrega ao redor do pescoço, concluo que segue a fé [mozarab_wanderer.GetFaith.GetAdherentName]."
 fp2_yearly.4004.a: "De um[mozarab_wanderer.Custom('ES_XA')] [mozarab_wanderer.GetWomanMan] de seu talento? Com certeza!"
 fp2_yearly.4004.b: "Eu preferiria que meus $knight_culture_player_no_tooltip_lowercase$ s fossem [ROOT.Char.GetFaith.GetAdherentNameNoTooltip]."
 fp2_yearly.4004.c: "Fora daqui, pagão!"
 fp2_yearly.4004.tt: "[mozarab_wanderer.GetName] recusa-se a converter e volta a vagar"
 fp2_yearly.4004.b.succ: "[mozarab_wanderer.GetName] se une à sua corte"
 fp2_yearly.4004.b.fail: "[mozarab_wanderer.GetName] recusa-se a converter e volta a vagar"
 fp2_yearly.4004.c.tt: "[mozarab_wanderer.GetName] volta a vagar"
 fp2_yearly.4005.t: "Estabelecendo Enclaves"
 fp2_yearly.4005.desc.christian: "Os [mozarab_merchant.GetFaith.GetAdherentNamePlural] ocupam uma posição única na sociedade ibérica."
 fp2_yearly.4005.desc.muslim: "Os súditos de fé [mozarab_merchant.GetFaith.GetReligion.GetAdjectiveNoTooltip|U] ocupam uma posição única na sociedade ibérica."
 fp2_yearly.4005.desc: "É, então, incomum ver um de seus mercadores locais pedir uma audiência comigo.\n\n"Nós, os [mozarab_merchant.GetFaith.GetAdherentNamePlural] costumamos lidar com certo grau de dificuldade extra em nossas vidas". [mozarab_merchant.GetSheHe|U] fala de maneira serena e sem rancor, mas há claramente algo de aço em suas palavras.\n\n"Tudo o que queremos é que uma pequena seção das cidades em sua [mozarab_quarter.GetName] seja nossa e possamos viver entre o nosso povo. Vim até aqui para lhe pedir, [ROOT.Char.Custom('FormOfAddressForLiege')], para ver se Vossa Magnanimidade poderia nos conceder isso"."
 fp2_yearly.4005.a: "Vocês são bem-vindos em minhas cidades."
 fp2_yearly.4005.b: "Eu não vou permitir que você polua minhas cidades!"
 fp2_yearly.4006.t: "Arquiteto[mozarab_priest.Custom('ES_OA')] [ROOT.Char.GetFaith.HighGodNamePossessive]"
 fp2_yearly.4006.desc: "Hay que ser valiente para abordarme en la calle al salir de mi [ROOT.Char.GetFaith.HouseOfWorship] tras los ritos diarios, pero un[mozarab_priest.Custom('ES_XA')] [mozarab_priest.GetWomanMan] ha intentado exactamente eso. Observo el crucifijo que lleva al cuello con cierta sospecha mientras empieza a hablar.\n\n«[ROOT.Char.Custom('FormOfAddressForLiege')|U], solo os pido un minuto de vuestro tiempo. Solo quiero que mi rebaño pueda rezar en un/a [mozarab_priest.GetFaith.HouseOfWorship], ¡tal como deben hacer todos los buenos seguidores de [mozarab_priest.GetFaith.HighGodName]!». Tal nervios[mozarab_priest.Custom('ES_OA')] sacerdo[mozarab_priest.Custom('ES_TeTisa')] se detiene y me mira con ojos suplicantes.\n\nPermitir que los [mozarab_priest.GetFaith.GetAdherentNamePlural] construyan lugares de culto dificultaría su conversión, pero cierta indulgencia podría ayudar a la cohesión de mi señorío."
 fp2_yearly.4006.a: "Você tem minha aprovação. Construa suas [mozarab_priest.GetFaith.HouseOfWorshipPlural]."
 fp2_yearly.4006.b: "Voc?s #EMP jamais #!levantar?o uma dessas cho?as pag?s na minha terra!"
 fp2_yearly.4007.t: "Procure e Você Encontrará"
 fp2_yearly.4007.desc: "Volto de minhas ora??es com meu [realm_priest.GetCouncilTitle] [realm_priest.GetFirstName] ao meu lado, quando vejo um clar?o branco no ch?o. Ao me abaixar para peg?-lo, desenterro um objeto branco como osso, duro e circular: uma vieira.\n\nTais conchas s?o um s?mbolo dos peregrinos que percorrem esta estrada a caminho de Santiago, e qualquer um que possua uma ? especialmente uma com a marca de Santiago impressa nela ? concluiu a ?rdua jornada.\n\nViro a concha na m?o com cobi?a, consciente do olhar de reprova??o de [realm_priest.GetFirstNameNoTooltip] cravado em minha nuca."
 fp2_yearly.4007.a: "Eu vou ficar com isso, e você vai ficar de boca fechada."
 fp2_yearly.4007.b: "Tudo bem. #EMP Tudo bem!#! Eu vou deixar a maldita concha."
 fp2_yearly.4007.c: "A quem você acha que eles vão acreditar, [realm_priest.GetFirstNameNoTooltip]?"
 fp2_yearly.4007.c.tt.flavour: "Se eu ficar com essa concha, quem pode dizer que ela não é #EMP verdadeira?#!"
 fp2_yearly.4007.c.tt.success: "Você mantém a concha convincente."
 fp2_yearly.4007.c.tt.fail: "[realm_priest.GetFirstNameNoTooltip] rotula facilmente a concha como falsa"
 fp2_yearly.4008.t: "Contos de Lareira"
 fp2_yearly.4008.desc.intro: "O fogo crepita, projetando longas sombras na parede dos aposentos dos servos. Uma mulher idosa mantém as crianças boquiabertas com seus contos.\n\n"
 fp2_yearly.4008.desc.basque.a: "\"...o Aatxe é um espírito de caverna que é frequentemente visto na forma bestial de um touro vermelho, protegendo as pessoas de influências malignas e atacando ladrões.\""
 fp2_yearly.4008.desc.basque.b: "\"...o Gaueko é um espírito noturno. Ele se recusa a permitir que os humanos trabalhem fora após o anoitecer, e qualquer exibição de bravura noturna, como se gabar de não ter medo do escuro, atrairá sua ira.\""
 fp2_yearly.4008.desc.galician.a: ""Os ojáncanus são gigantes sanguinários e peludos com o dobro de dentes que um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan]. Seu ponto fraco é um único cabelo branco que — se arrancado — os mata instantaneamente"."
 fp2_yearly.4008.desc.galician.b: ""...os Estadea s?o os mortos errantes que assombram aldeias ? meia-noite. Cambaleando, seguem uma alma viva em transe que ? compelida a lider?-los at? o amanhecer. Se essa pessoa n?o conseguir passar sua parada fantasmag?rica para outro ser infeliz, ela murcha e morre em poucas semanas.""
 fp2_yearly.4008.desc.castilian.a: "\"...os Cavalos do Diabo aparecem quando as pessoas fazem fogueiras para purificar suas almas. Com crinas pretas como a noite, asas de libélula e bocas espumantes, eles aparecem das cinzas com uma explosão. Cada um é a alma de um pecador com sua própria história para contar.\""
 fp2_yearly.4008.desc.castilian.b: ""...os Ventolines s?o esp?ritos do ar que ajudam os marinheiros. Angelicais em apar?ncia, com olhos da cor da espuma do mar e asas que parecem ondas se quebrando, vivem nas nuvens carmesins do p?r do sol. Se um bom marinheiro se encontra sem vento, os Ventolines sopram nas velas para lev?-lo de volta ? costa.""
 fp2_yearly.4008.desc.catalan.a: "\"...o Cocollona é um monstro de rio. Ela era originalmente uma freira sem fé que foi punida por seus pecados e presa. Seus carcereiros só a permitiam fora para visitar o rio Onyar. Eventualmente, ela brotou escamas, e agora ela percorre embaixo de pontes esperando por presas desavisadas.\""
 fp2_yearly.4008.desc.catalan.b: "\"...o famoso Dip é o cão do inferno e o diplomata do diabo. Um assassino que bebe sangue, a criatura parecida com um lobo percorre os campos à noite, matando vacas e humanos infelizes. Manco em uma perna, seus olhos vermelhos brilhantes são a última coisa que muitos bêbados cambaleantes veem a caminho de casa.\""
 fp2_yearly.4008.desc.aragonese.a: "\"...os Omes Hail são gigantes relacionados com as próprias montanhas. Se esses espíritos se tornam visíveis, eles se transformam nos poderosos maciços que nos protegem dos nossos inimigos. Enraivecidos pela sua situação, os espíritos gritam e enviam rochas rolando encosta abaixo e para as aldeias abaixo.\""
 fp2_yearly.4008.desc.aragonese.b: "\"...o pacífico e benevolente Basajaun é um homem enorme com barba que chega aos seus pés. Duas vezes maior do que uma pessoa normal, ele patrulha as florestas com um tronco de árvore como bengala, alertando os pastores sobre tempestades iminentes ou até mesmo matilhas de lobos com um assobio rouco."
 fp2_yearly.4008.desc.spain.a: "\"...o Cuélebre é uma serpente incrivelmente enorme. Embora seja praticamente imortal, a serpente é preguiçosa e raramente sai de seu refúgio profundo em uma caverna. Seus tesouros são considerados quase inimagináveis, e sua saliva pode curar doenças.\""
 fp2_yearly.4008.desc.spain.b: "\"...os Mouros são seres antigos de grande poder que vivem aqui desde o começo do mundo. Grandes ferreiros, os Mouros raramente são vistos acima do solo. Suas donzelas são metamorfos encantados de grande beleza que guardam as passagens subterrâneas.\""
 fp2_yearly.4008.desc.spain.c: "\"...as Anjanas são fadas boas e gentis que cuidam das florestas. Com pupilas pretas e asas de gaze, elas ajudam animais feridos e pessoas perdidas. Elas pisam tão levemente que gravetos não quebram sob seu peso. Se você encontrar uma das suas pétalas de rosa coloridas, você pode ser feliz até a sua morte.\""
 fp2_yearly.4008.desc.ending: "\n\nO fogo crepita e desaparece enquanto a velha termina sua história e apressa as crianças para se prepararem para dormir."
 fp2_yearly.4008.a: "Que história divertida e antiga!"
 fp2_yearly.4008.b: "Ah! Bobagens de histórias de fantasmas!"
 fp2_yearly.4008.c: "Você conta uma ótima história, senhora idosa!"
 fp2_yearly.4009.t: "O Senhor Branco"
 fp2_yearly.4009.desc: "Hoje ? um dia especial. Dobro a esquina e avisto meu alvo, a ?rvore Malato da lenda de Jaun Zuria. A hist?ria do jovem guerreiro que fez um ex?rcito recuar est? gravada na mente de todas as crian?as [root_culture.GetName].\n\nPasso a m?o pelo tronco nodoso e meus dedos repousam em uma fenda da largura de um dedo. Segundo a lenda, os seguidores do Senhor Branco encravaram aqui uma espada para testemunhar sua determina??o de segui-lo a qualquer lugar."
 fp2_yearly.4009.a: "Eu também vencerei os inimigos de nosso povo!"
 fp2_yearly.4009.b: "Eu sou mais do que apenas [root_culture.GetNameNoTooltip]."
 fp2_yearly.4009.c: "Seria legal ter uma lembrança deste dia."
 fp2_yearly.4010.t: "Porcos de Pedra"
 fp2_yearly.4010.desc: "Era para ser uma simples viagem para visitar [verraco_county.GetName], mas eu encontrei algo raro e incomum.\n\nEnormes bestas de pedra em forma de javalis estão diante de mim na ampla paisagem. Pela erosão, eu suponho que são verdadeiramente antigas. Se realmente são tão antigas, então o que possivelmente levou essas pessoas a gastar o esforço para criar javalis monolíticos?"
 fp2_yearly.4010.a: "Talvez esses fossem túmulos... de santos?"
 fp2_yearly.4010.a.success: "As pessoas compram sua teoria"
 fp2_yearly.4010.a.fail: "As pessoas apontam que isso não tem base na realidade"
 fp2_yearly.4010.b: "Estes não servem para nada. Desmonte-os."
 fp2_yearly.4010.c: "Essas estátuas são blasfêmias! Derrube-as!"
 fp2_yearly.4010.d: "Toda essa conversa de porcos está me deixando entediado."
