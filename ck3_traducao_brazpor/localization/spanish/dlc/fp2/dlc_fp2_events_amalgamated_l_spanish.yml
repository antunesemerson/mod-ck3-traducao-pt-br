 ##### Intro #####
 fp2_struggle.0501.t: "A $iberian_struggle$"
 fp2_struggle.0501.desc: "A península Ibérica está em turbulência, um conflito nascido de seu passado lendário. Estrangeiros cobiçam a terra e as grandes potências muçulmanas e cristãs buscam influenciar seu povo. Mas aqueles que vivem e morrem em seu solo determinarão seu destino.\n\n"
 fp2_struggle.0501.desc.involved: "Não deixarei escapar minha visão para minha terra natal. Pela [ROOT.Char.GetFaith.HighGodName], a Casa [ROOT.Char.GetHouse.GetNameNoTooltip] resistirá à tempestade e verá minha vontade cumprida.\n\n"
 fp2_struggle.0501.desc.interloper: "Chegou a hora de eu assumir a situação e meu destino. Vejo todas as peças dispostas no tabuleiro. Conheço o caminho a seguir e não haverá impedimentos para a Casa [ROOT.Char.GetHouse.GetNameNoTooltip].\n\n"
 fp2_struggle.0501.desc.mottocall: "[ROOT.Char.GetHouse.GetMotto]!"
 fp2_struggle.0501.a: "Assuma o destino!"
 ##### Hostility #####
 #Struggle Ender
 fp2_struggle.0900.t: "$struggle_iberia_ending_hostility_decision$"
 fp2_struggle.0900.opening.basque: "N?s, [ROOT.Char.GetCulture.GetNameNoTooltip], suportamos s?culos de invas?es: visigodos, gauleses, mouros... mas, com o tempo, cada for?a deles fraquejou. Hoje, o destino da Ib?ria est? novamente em #EMP nossas#! m?os."
 fp2_struggle.0900.opening.andalusian: "A história de nosso povo é tão complexa quanto somos diversos e tão conturbada quanto somos fortes. O futuro da Ibéria será novamente decidido pelos herdeiros dos Omíadas."
 fp2_struggle.0900.opening.iberian: "Por tempo demais, os povos ibéricos sofreram nas mãos dos invasores mouros; hoje restauraremos a esperança que os herdeiros legítimos de Roma perderam há séculos."
 fp2_struggle.0900.opening: "O caos que a Ibéria sofreu nos séculos anteriores deixou uma marca nos corações de todos os seus habitantes. Hoje começa o próximo capítulo desta península..."
 fp2_struggle.0900.desc: "\n\nNão há outro reino que possa realmente contestar o domínio [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip] sobre a Ibéria, ou os sacerdotes e colonos que levam a palavra de [ROOT.Char.GetFaith.HighGodName] e a civilização [ROOT.Char.GetCulture.GetName] a suas aldeias.\n\nTudo o que resta é declarar esta vitória, tendo decidido como prosseguir com nosso governo."
 fp2_struggle.0900.a: "Esta será uma terra de [ROOT.Char.GetFaith.HighGodNameAlternate]!"
 fp2_struggle.0900.b: "O povoamento desta península será o nosso foco."
 fp2_struggle.0900.c: "[ROOT.Char.GetFaith.HighGodName] entregou a Ibéria ao [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip]!"
 #Other Players
 fp2_struggle.0910.opening.involved: "Embora venha de outro reino, a libertação da incerteza que assolou a região por séculos pode estar próxima..."
 fp2_struggle.0910.opening: "A notícia dos recentes acontecimentos na península Ibérica chegou à nossa corte, prometendo o fim dos conflitos que assolaram a região."
 fp2_struggle.0910.desc: "\n\n[struggle_ender.GetName], que agora controla a maior parte da Península, proclamou-se vencedor[struggle_ender.Custom('ES_XA')] definitivo[struggle_ender.Custom('ES_OA')] das lutas iniciadas há muito tempo pela invasão moura.\n\n"
 fp2_struggle.0910.closing.faith: "Proclamou que a Ibéria será uma terra [struggle_ender.GetFaith.GetAdjective] e que, [struggle_ender.GetFaith.HighGodName] mediante, todos os hereges e infiéis serão expulsos de seus domínios."
 fp2_struggle.0910.closing.culture: "Proclamou que a Ibéria pertence à nação [struggle_ender.GetCulture.GetName] e que todos os invasores estrangeiros e povos subjugados deverão aceitar essa realidade."
 fp2_struggle.0910.closing.combined: "Proclamou que a Ibéria e [struggle_ender.GetPrimaryTitle.GetNameNoTier] são uma só, e que [struggle_ender.GetFaith.HighGodName] foram entregues à nação [struggle_ender.GetCulture.GetName] [struggle_ender.GetFaith.GetAdjective]..."
 fp2_struggle.0910.a: "Isto ainda não acabou."
 fp2_struggle.0910.b: "Muito interessante."
 ##### Compromise #####
 #Struggle Ender
 fp2_struggle.0901.t: "$struggle_iberia_ending_compromise_decision$"
 fp2_struggle.0901.desc: "\n\nAgora fica claro que não haverá fim para este ciclo de derramamento de sangue se as coisas continuarem assim; esta península não suportará a unificação.\n\nDevemos nos contentar com [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] e deixar que os demais poderosos da Ibéria se virem sozinhos."
 fp2_struggle.0901.a: "Isso é para o melhor."
 fp2_struggle.0901.tt: "[THIS.Char.GetPrimaryTitle.GetDeJureLiege.GetNameNoTier] tornou-se um [de_jure|lE] [empire|lE]"
 #Other Players
 fp2_struggle.0911.desc: "\n\n[struggle_ender.GetTitledFirstName] renunciou oficialmente a qualquer intenção de unir a península sob uma coroa comum, e declarou ilegítimos quaisquer que ambicionem esse título.\n\nOs diversos reinos moldados por séculos de invasão e reconquista agora estão entrincheirados demais para serem unidos."
 fp2_struggle.0911.a: "Não esqueceremos o sonho de Hispania..."
 ##### Conciliation #####
 #Struggle Ender
 fp2_struggle.0902.t: "$struggle_iberia_ending_conciliation_decision$"
 fp2_struggle.0902.desc: "\n\nUma garantia jurada de proteção, que somente eu estou em condições de fazer cumprir, garantirá que os diversos povos da região possam viver e praticar sua fé livremente.\n\nSe [ROOT.Char.GetFaith.HighGodName] quiser, as guerras do passado ficarão no passado, e os demais príncipes ibéricos verão os benefícios da convivência."
 fp2_struggle.0902.a: "Enviar os arautos."
 #Other Players
 fp2_struggle.0912.desc: "\n\nArautos [struggle_ender.GetPrimaryTitle.GetAdjectiveNoTooltip]s anunciaram garantias de livre passagem e culto para todos, impostas por [struggle_ender.GetTitledFirstName|l], com ampla aclama??o do povo comum.\n\nMuitos ansiavam pelo fim do derramamento de sangue na Ib?ria; talvez #EMP esta#! paz seja duradoura."
 fp2_struggle.0912.a: "Uma surpresa, para ser sincero."
 #fp2_event_dan
 fp2_yearly.1001.t: "Xadrez Dois"
 fp2_yearly.1001.desc: "Depois de vencer mais uma partida de xadrez contra mim mes[ROOT.Char.Custom('ES_OA')] , não consigo evitar pensar que meu intelecto colossal poderia melhorar um pouco este jogo. \n\nMas qual seria a mudança mais lógica?"
 fp2_yearly.1001.a: "O rei é claramente fraco."
 fp2_yearly.1001.b: "O bispo deveria ser mais forte."
 fp2_yearly.1001.c: "Por que não posso torturar os peões?"
 fp2_yearly.1002.t: "Uma Posição Comprometedora"
 fp2_yearly.1002.desc: "No meio da noite, ouço sons estranhos vindos de um quarto no fim do corredor. Ao espiar pela porta, vejo meu [ROOT.Char.Custom2('RelationToMeShort', deviant_courtier)] nu[deviant_courtier.Custom('ES_OA')] amarrad[deviant_courtier.Custom('ES_OA')] sendo açoitad[deviant_courtier.Custom('ES_OA')] com uma vara de madeira por um[ROOT.Char.Custom('ES_XA')] serviç[ROOT.Char.Custom('ES_EA')] que parece estar usando algumas das minhas roupas antigas. Como se isso já não fosse estranho o bastante, parece que ele adora isso.\n\nEntre uma pancada e outra, ele grita: "Sim! Me castigue, [ROOT.GetCharacter.GetNameNoTooltip], eu tenho sido um[deviant_courtier.Custom('ES_XA')] [ROOT.Char.Custom2('RelationToMeShort', deviant_courtier)] mal[deviant_courtier.Custom('ES_OA')]!"."
 fp2_yearly.1002.b: "Cheira a material de chantagem."
 fp2_yearly.1002.c: "Isso parece divertido!"
 fp2_yearly.1002.a: "Vou simplesmente sair."
 fp2_yearly.1003.t: "Lutando contra... Gigantes?"
 fp2_yearly.1003.desc: "Una conmoción en mi patio capta mi atención y veo que varios campesinos traen en brazos a [injured_knight.Custom2('MyCharacterIntroduction', ROOT.Char)]. Es evidente que está malherid[injured_knight.Custom('ES_OA')].\n\nCuando exijo saber qué ha pasado, los campesinos me dicen que [injured_knight.GetHerHim] encontraron en un campo, donde afirmó que había combatido contra un gigante.\n\nSu escudero me aparta a un lado cuando terminan la narración: «La verdad, mi [ROOT.GetCharacter.GetLadyLord], es que intentó justar contra un molino de viento y perdió, pero los aldeanos parecen bastante encantados con su historia»."
 fp2_yearly.1003.a: "Salve, [injured_knight.Custom('ES_AlAla')] bravo cavaleir[injured_knight.Custom('ES_OA')]! Vou lhe comprar um novo corcel."
 fp2_yearly.1003.b: "Não aceitarei contos de fadas na minha corte."
 fp2_yearly.1004.t: "O Falcão de Quraysh"
 fp2_yearly.1004.desc: "Estou lendo uma história de [hawk_of_quraysh.GetName], também conhecido como O Falcão de Coraixá.\n\nConhecer sua vida é incrivelmente inspirador, desde sua fuga dos [abbasid_dynasty.GetName] até a fundação da dinastia [hawk_dynasty.GetName] na Ibéria, e não consigo evitar pensar que eu deveria levar algumas de suas lições para o coração."
 fp2_yearly.1004.a: "Eu também poderia inspirar meus homens como ele fez em Carmona."
 fp2_yearly.1004.b: "Seus acordos diplomáticos com os iemenitas são lendários."
 fp2_yearly.1004.c: "Somos parentes!"
 nick_the_hawk_of_quraysh: "O Falcão de Quraysh"
 fp2_hawk_of_quraysh_martial_modifier: "Inspiração marcial"
 fp2_hawk_of_quraysh_martial_modifier_desc: "Este personagem ganhou inspiração marcial do Falcão de Coraixe."
 fp2_hawk_of_quraysh_diplomacy_modifier: "Inspiração diplomática"
 fp2_hawk_of_quraysh_diplomacy_modifier_desc: "Este personagem ganhou inspiração diplomática do Falcão de Quirix."
 fp2_yearly.1005.t: "Viking Perdido"
 fp2_yearly.1005.desc: "Entre gritos y forcejeos, me presentan a un[hidden_viking.Custom('ES_XA')] [hidden_viking.GetWomanMan] enorme. Es obvio que se trata de un[hidden_viking.Custom('ES_XA')] asaltante viking[hidden_viking.Custom('ES_OA')], como los que sembraron el caos en nuestro señorío durante décadas.\n\n«Por favor, tened piedad. Me llamo [hidden_viking.GetName] y llevo años viviendo en [viking_county.GetNameNoTooltip]. Me dejaron atrás porque quedé herid[hidden_viking.Custom('ES_OA')]. Los aldeanos me salvaron; ahora son mi familia».\n\nSemejante viking[hidden_viking.Custom('ES_OA')] cae de rodillas, esperando que le perdone la vida. Varios campesinos confirman su historia."
 fp2_yearly.1005.a: "Você pode entreter meus cortesãos com sua história única."
 fp2_yearly.1005.b: "Um ato bom não equilibra o mal — você morre."
 fp2_yearly.1005.c: "Enquanto você serve a vila, pode viver por agora."
 fp2_yearly.1006.t: "Queijo Viking?"
 fp2_yearly.1006.desc: "Me paro ante un puesto de la carretera donden venden comidas sencillas. Su comerciante, [cheese_trader.GetName], me sirve distintos productos antes de agacharse bajo el mostrador y sacar una caja de madera tallada.\n\n«Para vos, mi señor[ROOT.Char.Custom('ES_XA')], este es el mejor queso de todo el señorío», me pone el taco en la mano, se inclina hacia mí y susurra en tono conspiratorio. «Lo hicieron unos vikingos queseros aquí, en Iberia».\n\nPese al extraño comentario, el queso está increíblemente bueno."
 fp2_yearly.1006.a: "Aceitarei seu queijo, mas não sua história ridícula."
 fp2_yearly.1006.b: "Devo encontrar esses 'Vikings do Queijo'..."
 fp2.1006.b.tt: "Você envia seus agentes para encontrar os 'Vikings do Queijo'."
 fp2_yearly.1006.c: "Que bobagem."
 fp2_yearly.1007.t: "$fp2_yearly.1006.t$"
 fp2_yearly.1007.desc: "Traem diante de mim um[fake_cheese_viking.Custom('ES_XA')] [fake_cheese_viking.GetWomanMan] fraquinho. No entanto, a pessoa à minha frente mal parece uma fabricante de queijo[fake_cheese_viking.Custom('ES_OA')] , muito menos uma viking[fake_cheese_viking.Custom('ES_OA')].\n\n\"Sinto muito, mas na verdade eu não sou uma viking[fake_cheese_viking.Custom('ES_OA')]. É só uma mentirinha para ajudar a vender o queijo\", balbucia."
 fp2_yearly.1007.a: "Bem, pelo menos resolvi o mistério."
 fp2_yearly.1007.b: "Quero metade dos seus lucros e metade do seu queijo."
 fp2_respected_clergy_chess: "Clero Respeitado no Xadrez"
 fp2_respected_clergy_chess_desc: "Mudou as regras do xadrez para respeitar o clero."
 fp2_cheese_artifact: "Queijo Envelhecido"
 fp2_cheese_artifact_desc: "Apesar dos rumores, este queijo não foi feito por vikings. No entanto, é extremamente bom."
 fp2_yearly.1008.t: "Consumindo o Queijo"
 fp2_yearly.1008.desc: "Chegou o momento. No fundo do meu depósito repousa um dos queijos mais incríveis do mundo conhecido, amadurecendo lentamente, aumentando sua potência.\n\n E agora eu o consumirei."
 fp2_yearly.1008.a: "[ROOT.Char.GetFaith.HealthGodName|U] chorou. Esse é um bom queijo."
 fp2_yearly.1008.b: "Na verdade, deixe o queijo envelhecer mais."
 #fp2_struggle_event_ola
 stoke_tension_toast.success: "Sua campanha de ódio teve sucesso."
 stoke_tension_toast.failure: "Sua participação foi revelada."
 delegated_stoke_tension_toast.success: "[tension_councillor.GetTitledFirstName] espalhou o ódio."
 ease_tension_toast.success: "Você mediou com sucesso."
 ease_tension_toast.failure: "Seus esforços fracassaram."
 bad_intrigue.tt: "Essa opção está disponível por causa de sua habilidade em Intriga baixa."
 fp2_struggle.1000.t: "Atiçando o Fogo"
 fp2_struggle.1000.desc: "Houve confrontos entre o governo [ROOT.Char.GetFaith.GetAdherentNameNoTooltip] e a população [tension_county.GetCountyData.GetFaith.GetAdjectiveNoTooltip] em [tension_county.GetName]. \"Vamos aproveitar esta oportunidade\", sugere meu [tension_councillor.GetCouncilTitle] [tension_councillor.GetFirstName]\", para recrutar capangas mercenários entre os baderneiros [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip]. E se eles continuarem a #italic adiestrándose#! em seu condado natal, isso também não é tão ruim! Na verdade, poderíamos até #italic fomentarlo#!…\". \n\n Deixo [tension_county.GetNameNoTierNoTooltip] queimar para alistar esses fanáticos violentos?"
 fp2_struggle.1000.a: "Vamos espalhar um pouco de ódio... discretamente."
 fp2_struggle.1000.b: "Confio em você para lidar com isso."
 fp2_struggle.1000.c: "Não, vou tentar aliviar a tensão."
 fp2_struggle.1000.d: "Se eu não puder parar essa loucura, talvez um governante [minority_courtier.GetFaith.GetAdherentNameNoTooltip] possa."
 not_my_problem_toast: "Mães solteiras e crianças em seu reino passarão fome por anos."
 fp2_struggle.1001.t: "Viúvas de Guerra"
 fp2_struggle.1001.desc: "[expectant_courtier.Custom('ES_ElLa')|U] [expectant_courtier.GetTitledFirstName|l] está grávida e começou a refletir sobre a situação de outras mães em [SelectLocalization( IsLandlessAdventurer( ROOT.Char ), 'nuestro campamento', 'nuestras tierras')], aquelas que as guerras e desventuras recentes deixaram sozinhas para cuidar de seus filhos. "Poderíamos, [ROOT.Char.Custom('FormOfAddressForLiege')], instituir um fundo especial para pagar às mães lactantes que não têm outros meios de sustento. Afinal, criar filhos é um trabalho tão árduo e louvável quanto qualquer outro"."
 fp2_struggle.1001.a: "Uma boa ideia! Vou criar tal fundo."
 fp2_struggle.1001.b: "Apenas as viúvas terão meu apoio."
 fp2_struggle.1001.b.tt: "Sua fé não aprova mulheres com filhos fora do casamento."
 fp2_struggle.1001.c: "Elas podem vir ficar no meu [ROOT.Char.Custom('GetCourt')]! Temos comida em abundância!"
 fp2_struggle.1001.c.tt: "Você convida todas as pobres mães solteiras do seu reino a ficarem em seu [ROOT.Char.Custom('GetCourt')]."
 fp2_struggle.1001.d: "Certamente, meus vassalos benevolentes podem ajudar a financiar isso."
 fp2_struggle.1001.e: "Sou vosso[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleTierName], não uma ama de leite!"
 fp2_struggle.1001.specialdescpositive: "Vassalos felizes em pagar ganham #positive_value 10#! #color_light_blue Opinião#! de você"
 fp2_struggle.1001.specialdescnegative: "Vassalos infelizes em pagar perdem #negative_value 10#! #color_light_blue Opinião#! de você"
 reading_avicenna_toast.success: "Você leu um grande livro sobre medicina."
 reading_avicenna_toast.failure: "Você pode ter entendido algo errado..."
 reading_hippocrates_toast.success: "Você leu todas as obras de Galeno."
 reading_hippocrates_toast.failure: "Por que o grego é tão difícil?"
 rolling_in_filth_toast: "Sua corte é um perigo para a saúde."
 fp2_struggle.1002.t: "Avanços da Cultura [xenophilic_culture.GetNameNoTooltip]"
 fp2_struggle.1002.desc_early_golden_age: "Os eruditos da cultura [xenophilic_culture.GetNameNoTooltip] fizeram recentemente grandes avan?os no conhecimento m?dico. Mas o grande pol?mata [great_physician.GetFirstName] foi exilad[great_physician.Custom('ES_OA')] da corte do meu [ROOT.GetCharacter.Custom2('RelationToMeShort', SCOPE.sC('neighboring_ruler'))] [neighboring_ruler.GetTitledFirstName|l] por um #italic poema e um erro#!, e busca um novo emprego. \n\n"
 fp2_struggle.1002.desc_late_golden_age: "Os eruditos da cultura [xenophilic_culture.GetNameNoTooltip] há muito tempo se dedicam ao estudo da medicina. Agora, o polímata [great_physician.GetFirstName] aspira a se juntar à minha corte, mas acabou de ser exilad[great_physician.Custom('ES_OA')] da corte do meu [ROOT.GetCharacter.Custom2('RelationToMeShort', SCOPE.sC('neighboring_ruler'))] [neighboring_ruler.GetTitledFirstName|l] por uma transgressão não especificada. \n\n"
 fp2_struggle.1002.desc_post_golden_age_christian: "Embora Averróis e Albucasis tenham morrido há muito tempo, os médicos da cultura [xenophilic_culture.GetNameNoTooltip] continuam tendo destaque em seu conhecimento. Agora, esse polímata [great_physician.GetFirstName] busca trabalho por ter sido exilad[great_physician.Custom('ES_OA')] da corte do meu [ROOT.GetCharacter.Custom2('RelationToMeShort', SCOPE.sC('neighboring_ruler'))] [neighboring_ruler.GetTitledFirstName|l] por uma transgressão não especificada. \n\n"
 fp2_struggle.1002.desc_post_golden_age_unchristian: "Embora Ibn Rushd e Al-Zahrawi tenham morrido há muito tempo, os médicos da cultura [xenophilic_culture.GetNameNoTooltip] continuam tendo um papel de destaque em seu conhecimento. Agora, tal polímata [great_physician.GetFirstName] busca trabalho por ter sido exilad[great_physician.Custom('ES_OA')] da corte do meu [ROOT.GetCharacter.Custom2('RelationToMeShort', SCOPE.sC('neighboring_ruler'))] [neighboring_ruler.GetTitledFirstName|l] por uma transgressão não especificada. \n\n"
 fp2_struggle.1002.desc_albucasis: ""Embora minhas habilidades sejam modestas", diz ele, "uma vez salvei a vida de uma escrava que havia cortado a própria garganta, ficando depois apenas com uma leve rouquidão na voz. E eu lhe pediria que fizesse algumas mudanças em seus hábitos de higiene…" \n\n"
 fp2_struggle.1002.desc_avenzoar: ""Pratiquei a medicina por toda a minha vida", diz ele, "e escrevi um livro sobre regime para uma vida saudável. Mas sou um inimig[great_physician.Custom('ES_OA')] feroz[great_physician.Custom('ES_OA')] de superstições e falsos remédios vendidos por bruxas e astrólogos, então peço que proíbam tais coisas…" \n\n"
 fp2_struggle.1002.desc_tufail: ""Estudo tanto os céus quanto a mente e as doenças da carne", diz. "Mas sou a favor dos benefícios de estudar o corpo humano em #italic autopsias#!… Poderíeis me proporcionar oportunidades para prosseguir com isso?" \n\n"
 fp2_struggle.1002.desc_no_historical_physician_early: "«He aprendido mucho», dice, «de las obras de los antiguos. Mas he rescatado sus conocimientos de los abismos de la prolijidad y podría emplearlos en vuestro beneficio». \n\n"
 fp2_struggle.1002.desc_no_historical_physician_late: ""Aprendi muito", diz, "das obras de Al-Zahrawi e Ibn Sina. Até melhorei suas técnicas. Posso remover cataratas e furúnculos e tratar doenças que antes eram consideradas incuráveis". \n\n"
 fp2_struggle.1002.desc_has_physician_and_is_christian: "Meu médic[scoped_physician.Custom('ES_OA')] atual, [scoped_physician.Custom('ES_ElLa')] [scoped_physician.GetTitledFirstName|l], me insiste a não substituir[scoped_physician.GetHerHim] por est[great_physician.Custom('ES_EA')] pagão[great_physician.Custom('ES_OA')]."
 fp2_struggle.1002.desc_has_physician_but_not_christian: "Meu médic[scoped_physician.Custom('ES_OA')] atual, [scoped_physician.Custom('ES_ElLa')] [scoped_physician.GetTitledFirstName|l], me aconselha a não substituir[scoped_physician.GetHerHim] por est[great_physician.Custom('ES_EA')] excêntric[great_physician.Custom('ES_OA')]."
 fp2_struggle.1002.desc_has_no_physician_but_is_christian: "Alguns cortesãos me instam a não me associar com est[great_physician.Custom('ES_EA')] infiel."
 fp2_struggle.1002.desc_has_no_physician: "Devo oferecer a es[great_physician.Custom('ES_EA')] [great_physician.GetWomanMan] um lugar em minha corte?"
 fp2_struggle.1002.a: "Preciso de[great_physician.Custom('ES_XA')] um nov[great_physician.Custom('ES_OA')] médic[great_physician.Custom('ES_OA')]…"
 fp2_struggle.1002.b: "Posso comprar livros e aprender medicina sozinho."
 fp2_struggle.1002.b.tt: "Você tenta aprender a partir de grandes obras de medicina."
 fp2_struggle.1002.c: "Para que eu preciso de você? Eu posso ler grego sozinho."
 fp2_struggle.1002.c.tt: "Você compra as obras de Galeno e tenta lê-las."
 fp2_struggle.1002.d: "Vou mandar você de volta para [neighboring_ruler.Custom('ES_AlAla')] [neighboring_ruler.GetTitledFirstNameNoTooltip|l]...algemado[great_physician.Custom('ES_OA')]."
 fp2_struggle.1002.e: "Minha saúde está bem como está, obrigado."
 fp2_struggle.1002.f: "Saia, a inovação só deve vir de Deus."
 fp2_struggle.1002.physicianleaves: "[great_physician.GetFirstName] procura emprego em outro lugar"
 fp2_struggle.1001.physician_imprisoned: "[great_physician.GetFirstName] está preso por [neighboring_ruler.GetName], por certos motivos"
 fp2_struggle.1010.t: "Alma de Ferro"
 fp2_struggle.1010.desc: "Ha llegado a mi corte un[great_swordsmith.Custom('ES_XA')] [great_swordsmith.GetWomanMan] llamad[great_swordsmith.Custom('ES_OA')] [great_swordsmith.GetName] que afirma ser un[great_swordsmith.Custom('ES_XA')] maestr[great_swordsmith.Custom('ES_OA')] herrer[great_swordsmith.Custom('ES_OA')] que ha viajado desde muy lejos.\n\n«[ROOT.Char.Custom('FormOfAddressForLiege')|U]», dice, «mi familia lleva forjando espadas en [toledo_holding.GetNameNoTierNoTooltip] desde tiempos remotos, y en el pasado llegó a forjar #italic falcatas#! para los ejércitos de Cartago. No hay aleación más fuerte que la que se hace aquí, en Iberia, y puedo perfeccionarla. Puedo forjaros las mejores armas de Iberia, pero, a cambio, me entregaréis el mando del gremio de herreros de [blacksmith_county.GetNameNoTierNoTooltip]. ¡Entonces verán que yo siempre fui mejor que ellos!»."
 fp2_struggle.1010.a: "Não, você deve trabalhar com a guilda, para o benefício de todos nós."
 fp2_struggle.1010.b: "Qualquer conhecimento que você possua, eu o extrairei..."
 fp2_struggle.1010.c: "Você terá isso, se fizer espadas para meus exércitos."
 fp2_struggle.1010.d: "Faça para mim a melhor lâmina da Ibéria, e a guilda será sua."
 fp2_struggle.1010.e: "Eu não irei irritar a guilda por sua vaidade."
 fp2_struggle.1010.smithgoesaway: "[great_swordsmith.GetNameNoTooltip] vai assumir o comando da guilda de ferreiros."
 fp2_struggle.1010.paranoid_rivals: "Armar seus soldados pode preocupar alguns governantes vizinhos."
 fp2_struggle.1010.smithmakesweapon: "[great_swordsmith.GetNameNoTooltip] permanece em sua corte enquanto forja a espada que você solicitou."
 fp2_struggle.1010.swordsmith_imprisoned: "Você aprisiona e tortura [great_swordsmith.GetNameNoTooltip] para aprender seus segredos."
 fp2_struggle.1010.compassionate_courtiers: "Nem todos os seus cortesãos podem aprovar isso."
 toledo_compromise_flavor: "Você força um acordo entre [great_swordsmith.GetNameNoTooltip] e a guilda."
 fp2_struggle.1010.swordsmith_leaves: "[great_swordsmith.GetNameNoTooltip] vai para outra corte."
 fp2_struggle.1011.t: "\"A Lâmina de [blacksmith_county.GetNameNoTierNoTooltip]"
 fp2_struggle.1011.desc: ""Terminei", diz [great_swordsmith.GetName], mas parece estranhamente cansad[great_swordsmith.Custom('ES_OA')].\n\n"Talvez os espíritos de meus antepassados tenham me guiado, pois esta é a melhor lâmina que já criei. Nunca mais farei algo semelhante, nem ninguém nesta terra, pois levarei comigo para o túmulo os segredos de sua confecção. Agora irei reclamar a guilda que me prometestes, embora essa vitória agora pareça estranhamente vazia. Seja como for, antes que nos separemos para sempre, deveis dar um nome à espada que forjei para vós"."
 fp2_struggle.1011.a: "#italic Martiello#!, o martelo."
 fp2_struggle.1011.b: "#italic Tiniebra#!, a escuridão."
 fp2_struggle.1011.c: "#italic Vermejo#!, o vermelho."
 fp2_struggle.1011.d: "#italic Jargonça#!, como a pedra preciosa azul."
 fp2_struggle.1011.e: "#italic Suhayl#!, o glorioso."
 fp2_struggle.1011.f: "#italic al-Battar#!, o cortador."
 fp2_struggle.1011.g: "#italic Qazeeb#!, de cabo forte."
 fp2_struggle.1011.h: "#italic Zumurrud#!, como o esmeralda ofuscante."
 fp2_struggle.1011.i: "#italic Ortzi#!, como o trovão."
 fp2_struggle.1011.j: "#italic Gaueko#!, o espírito da noite."
 fp2_struggle.1011.k: "#italic Gorri#!, o vermelho."
 fp2_struggle.1011.l: "#italic Aiztoto#!, a pequena faca."
 fp2_struggle.1011.m: "#italic Escremire#!, o esgrimista."
 fp2_struggle.1011.n: "#italic Folha#!, a folha."
 fp2_struggle.1011.o: "#italic Proeza#!, a valentia."
 fp2_struggle.1011.p: "#italic Trebalhar#!, o atormentador."
 fp2_struggle.1011.q: "#italic Sufax#!, como o grande herói dos tempos antigos."
 fp2_struggle.1011.r: "#italic Toumellalt#!, o branco."
 fp2_struggle.1011.s: "#italic Ayugu#!, o jugo."
 fp2_struggle.1011.u: "Bem, #italic Ironsoul#!, é claro."
 fp2_struggle.1011.v: "Eu gosto bastante de #italic Mistletoe#!..."
 fp2_struggle.1011.w: "#italic Moor-cleaver#, o que mais?"
 fp2_struggle.1011.x: "#italic Usurper's blade#! parece apropriado, dado o que fizemos às guildas..."
 fp2_struggle.1011.swordsmith_leaves: "Com o seu trabalho concluído, [great_swordsmith.GetName] deixa a tua corte."
