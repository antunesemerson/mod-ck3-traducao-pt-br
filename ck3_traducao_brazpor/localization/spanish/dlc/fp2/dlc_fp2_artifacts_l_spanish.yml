l_spanish:
 ##################################################
 #Uniques
 fp2_chalice_dona_urraca: "Cálice de Dona Urraca"
 fp2_chalice_dona_urraca_desc: "Um cálice ritual esculpido no ônix mais profundo e adornado com joias e treliças de ouro. Encomendado por [owner.GetTitledFirstName|l] para honrar a Igreja."
 fp2_santiago_aquamanile: "(Antigos) $fp2_santiago_bells$"
 #We have to use |U here so that al-Mansur is presented correctly.
 fp2_santiago_aquamanile_desc: "[reforger.GetTitledFirstName|U] forjou essas jarras a partir da escória derretida dos $fp2_santiago_bells$. Embora agora usadas para purificar ritualmente as mãos do dono, sua mera existência confirma a primazia do Islã sobre o Cristianismo."
 fp2_santiago_aquamanile_melted_desc: "Fundidas #EMP mais uma vez#!, mais recentemente por [reforger.GetTitledFirstName|l], as antigas $fp2_santiago_bells$ são algumas das jarras de água mais disputadas que existem. Sua forma atual proclama aos quatro ventos a primazia do islamismo na Ibéria."
 fp2_santiago_aquamanile_melted_tally_desc: "$fp2_santiago_aquamanile_melted_desc$\n\nO metal frequentemente forjado mudou de mãos [ROOT.Var('artefact_santiago_bells').GetValue] vezes."
 fp2_santiago_bells: "Sinos de Santiago"
 fp2_santiago_bells_desc: "Os ilustres Sinos de Santiago de Compostela são um lembrete forte, simples e, acima de tudo, #EMP sonoro#! da autoridade espiritual imutável de São Tiago."
 fp2_santiago_bells_melted_desc: "Recuperados das mãos do infiel, derretidos e retornados a algo parecido com sua forma original por [reforger.GetTitledFirstName|l], os ilustres Sinos de Santiago de Compostela ecoam para confortar toda a Cristandade."
 fp2_santiago_bells_melted_tally_desc: "$fp2_santiago_bells_melted_desc$\n\nO metal frequentemente forjado mudou de mãos [ROOT.Var('artefact_santiago_bells').GetValue] vezes."
 ##################################################
 #Multiples
 fp2_armillary_sphere: "Esfera Armilar"
 fp2_armillary_sphere_desc: "Um artefato astrológico intricado de [SCOPE.Custom('ArtifactQuality')] feitura. Os anéis são talhados em [newly_created_artifact.GetFeatureText( 'generic_material_wood' )] com incrustações de [newly_created_artifact.GetFeatureText( 'decoration_material_inlay' )] e modelam os caminhos serpenteantes do empíreo com maravilhoso detalhe."
 fp2_2p_chess_board: "Tabuleiro de Xadrez da Sorte"
 fp2_2p_chess_board_desc: "Vital para uma partida totalmente bem-sucedida contra [bg_loser.GetTitledFirstName|l], esta ferramenta de lazer levou sua sorte patenteada a [bg_victor.GetTitledFirstName|l]."
 fp2_4p_chess_board: "Tabuleiro de xadrez para quatro jogadores"
 fp2_4p_chess_board_desc: "Quando [bg_victor.GetTitledFirstName|l] venceu [bg_loser.GetTitledFirstName|l] no xadrez, sua primeira ideia foi comemorar sua destreza no jogo criando uma variante melhorada tão específica que jamais conseguiu fazer com que alguém a jogasse."
 fp2_votive_crowns: "Coroa Votiva Visigótica"
 fp2_votive_crowns_desc: "Projetada para ser pendurada sobre ou ao redor dos altares da igreja, e ocasionalmente em estátuas, oferecer uma coroa votiva a Deus é expressar submissão diante de uma autoridade superior a qualquer rei."
 fp2_andalusian_aquamanile: "Aquamanil Ritual"
 fp2_andalusian_aquamanile_desc: "Belíssimo aguamanil feito de [newly_created_artifact.GetFeatureText( 'goblet_material' )], com adornos de [newly_created_artifact.GetFeatureText( 'decoration_material_inlay' )] em dourado, destinado a conter água com a qual lavar ritualmente as mãos."
