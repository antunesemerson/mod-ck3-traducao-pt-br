 viz_extravagance.t4.activities.gambling.xtra_xtreme: "Este personagem aposta moedas, bestas, terras, vidas e qualquer outra coisa que lhes agrade — tudo em quantidades tão vastas que alguns se perguntam se sua riqueza é realmente #EMP sem fim#!."
 viz_extravagance.t4.activities.masquerade: "Este personagem realiza festas a fantasia regulares, definindo temas da história e mito para seus convidados seguirem, e esperando que cada um gaste uma renda mensal ou mais em cada traje."
 viz_extravagance.t4.activities.plants.ever_changing: "Este personagem acredita que a variedade de especiarias é a vida, e mantém um jardim de plantas, fragrâncias e ervas exóticas em constante mudança, todas florescendo e frutificando em diferentes épocas do ano e sob diferentes condições."
 viz_extravagance.t4.activities.feasts.cannibal: "Todos concordam que este personagem realiza alguns dos banquetes mais deliciosos que o reino já conheceu, repletos de suculentas peças de carne — embora poucos concordem que tipo de carne deve ser."
 viz_extravagance.t4.property.palace.pool: "Este personagem mantém um palácio separado para abrigar sua piscina massiva. Eles residem em outro lugar, e desta forma conseguem manter seus aposentos privados e escritórios totalmente separados de onde eles recebem os convidados."
 viz_extravagance.t4.property.palace.spa: "Este personagem possui um retiro espaçoso no campo, logo nos arredores de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], um lugar tranquilo longe do agito da cidade, mantido em privacidade por hectares e hectares de propriedades circundantes."
 viz_extravagance.t4.property.army: "Este personagem mantém um exército privado de bandidos e batedores, pronto para impor sua vontade em qualquer lugar em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 viz_extravagance.t4.property.livestock: "Os vastos rebanhos privados deste personagem, tanto equinos quanto bestas de carga, se espalham por grande parte do reino."
 viz_extravagance.t4.property.palace.guest: "Este personagem mantém um palácio privado especificamente para visitantes — uma declaração de riqueza e poder que poucos deixam de notar."
 viz_extravagance.t4.property.spire: "Este personagem conduz grande parte de seus negócios de vizir de uma torre sinistra, erguendo-se alto sobre a maioria dos edifícios em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Supostamente, é possível ver cada beco e esquina de suas muitas janelas."
 viz_extravagance.t4.property.palace.monthly: "Este personagem mantém uma dúzia ou mais de palácios em toda [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], mudando de um para o próximo mensalmente."
 viz_extravagance.t4.property.bordello: "Este personagem administra um bordel privado, onde seus artistas favoritos proporcionam os prazeres mais lascivos regularmente."
 viz_extravagance.t4.property.gaol: "Este personagem possui uma prisão privada de devedores — quando pessoas mais pobres não conseguem pagar suas dívidas para o vizir, a punição é rápida e clara. Até que sua família encontre o dinheiro, esperamos."
 viz_extravagance.t4.property.palace.torture: ""O Inferno de [ROOT.Char.GetDiarchy.GetDiarch.GetFirstNameNoTooltip]" como o chamam, o jardim de estranhas delícias e instrumentos horripilantes onde se diz que este personagem inflige suas cruéis atenções a seus inimigos e rivais."
 viz_extravagance.t4.charity.waystations: "Este personagem paga por estações de descanso e caravansarás em todo o reino, concentrando-se em atender a grupos menores e viajantes solitários."
 viz_extravagance.t4.charity.bridges: "Este personagem é renomado pelo dinheiro que gasta construindo e mantendo pontes novas por todo o reino, uma marca de prestígio supremo para qualquer funcionário público."
 viz_extravagance.t4.charity.dole: "Este personagem subsidia uma doação privada de alimentos para os cidadãos mais necessitados de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], garantindo que ninguém passe fome enquanto tiver moedas sobrando."
 viz_extravagance.t4.charity.housing: "Este personagem financia a construção de pequenos conjuntos habitacionais em áreas desocupadas de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], ou junto às suas paredes, para aqueles mais necessitados de abrigo."
 viz_extravagance.t4.charity.gardens: "Este personagem paga pela manutenção de um grande jardim público — um pequeno bastião de paz e tranquilidade em um mundo que às vezes parece ser demais cruel."
 viz_extravagance.t4.charity.civil_service.fire: "Este personagem é pessoalmente responsável pela manutenção de um serviço de combate a incêndios para [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] — algo quase inaudito no resto do mundo."
 viz_extravagance.t4.charity.aqueducts: "Este personagem é responsável pela criação e manutenção de vários aquedutos curtos trazendo água fresca para [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], algo que lhes rende a gratidão de muitos dos mais pobres da sociedade."
 viz_extravagance.t4.charity.festivals: "Este personagem paga por um grandioso festival anual para todos os residentes de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], um evento que a cidade aguarda o ano todo."
 viz_extravagance.t4.charity.pilgrimage: "Este personagem administra um fundo de caridade que fornece às pessoas uma mesada, equipamento adequado e conhecimento de viagem para iniciar uma peregrinação bem-sucedida."
 viz_extravagance.t4.charity.loans: "Este personagem administra um fundo de caridade que organiza remessas para empréstimos e dívidas, legais ou não, que afligem os pobres do reino."
