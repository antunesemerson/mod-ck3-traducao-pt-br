 ##Vizier Candidates
 vizier_candidate_has_studied_recently_modifier: "[ROOT.Char.Custom('VizierExtravagance_T4_Activities')]"
 vizier_candidate_has_studied_recently_modifier_desc: "[ROOT.Title.GetHolder.Custom('VizierExtravagance_T4_Activities')]"
 vizier_extravagance_treasure_title: "$vizier_extravagance_t4_title$ $vizier_extravagance_property_title$"
 vizier_extravagance_activities_title: "[ROOT.Char.Custom('VizierExtravagance_T4_Property')]"
 vizier_extravagance_property_title: "[ROOT.Title.GetHolder.Custom('VizierExtravagance_T4_Property')]"
 vizier_extravagance_charity_title: "$vizier_extravagance_t4_title$ $vizier_extravagance_charity_title$"
 vizier_extravagance_t1_title: "[ROOT.Char.Custom('VizierExtravagance_T4_Charity')]"
 vizier_extravagance_t1_treasure_modifier: "[ROOT.Title.GetHolder.Custom('VizierExtravagance_T4_Charity')]"
 vizier_extravagance_t1_treasure_modifier_custom_desc: "Este personagem passa por um número simplesmente desproporcional de lenços de linho finos - dez por dia no verão, mas ainda assim os joga fora após o uso."
 vizier_extravagance_t1_treasure_modifier_custom_desc.on_action: "Este personagem certamente tem acesso a uma quantidade anormalmente grande de perfumes, ungüentos e cosméticos finos para alguém de sua posição."
 vizier_extravagance_t1_activities_modifier: "Parece que este personagem nunca fica sem novas bugigangas para se adornar; ouro, prata e pedras preciosas reluzem por todo o seu rosto e [ROOT.Char.GetDiarchy.GetDiarch.Custom('HandHands')]."
 vizier_extravagance_t1_activities_modifier_custom_desc: "Os móveis deste personagem são sempre feitos das melhores madeiras e minérios estrangeiros importados - substituídos tão frequentemente quanto a moda permite, ditada pelo bom gosto."
 vizier_extravagance_t1_activities_modifier_custom_desc.on_action: "Este personagem tem um guarda-roupa aparentemente interminável de roupas finas em todas as últimas tendências - além de muitas prontas para criar suas próprias modas."
 vizier_extravagance_t1_property_modifier: "Este personagem raramente se preocupa em usar o mesmo chapéu por mais de uma ou duas semanas - por que se restringir quando há tantas variedades mais novas e altas a cada ano?"
 vizier_extravagance_t1_property_modifier_custom_desc: "Este personagem é conhecido por possuir uma pequena, mas fina, coleção de relíquias sagradas."
 vizier_extravagance_t1_property_modifier_custom_desc.on_action: "Os armários deste personagem são conhecidos por abrigar uma bela coleção de drogas, bebidas e poções exóticas, muitas das quais estão entre as substâncias mais raras acessíveis em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 vizier_extravagance_t1_charity_modifier: "Este personagem tem uma cópia de todos os jogos de tabuleiro conhecidos neste canto do mundo, com peças esculpidas em tudo, desde pedras preciosas até ossos de bestas lendárias."
 vizier_extravagance_t1_charity_modifier_custom_desc: "Este personagem possui algumas das ampulhetas mais meticulosamente precisas do planeta; para [Select_CString( ROOT.Char.GetDiarchy.GetDiarch.IsFemale, 'uma funcionária', 'um funcionário' )], há poucas ferramentas mais luxuosas que estas."
 vizier_extravagance_t1_charity_modifier_custom_desc.on_action: "Este personagem se deleita em organizar desfiles nos quais moedas e alimentos são atirados aos necessitados, sempre às suas próprias custas — e em seu próprio nome."
 vizier_extravagance_t2_title: "Este personagem é conhecido por abrir os jardins e salões inferiores de suas residências privadas para pequenos festivais, permitindo que os plebeus tenham uma breve amostra da grandiosidade nobre."
 vizier_extravagance_t2_treasure_modifier: "Este personagem regularmente realiza leilões de caridade, vendendo alguns de seus tesouros acumulados para arrecadar dinheiro para os necessitados do reino."
 vizier_extravagance_t2_treasure_modifier_custom_desc: "Este personagem gosta de banquetear regularmente a nobreza local em encontros privados. Alguns sussurram que sangue real já foi derramado para conseguir um convite."
 vizier_extravagance_t2_treasure_modifier_custom_desc.on_action: "Este personagem se deleita em organizar torneios competitivos de jogos de tabuleiro para a classe alta, com as grandes e boas pessoas de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] jogando todas as últimas variações."
 vizier_extravagance_t2_activities_modifier: "Este personagem tem uma fascinação um tanto embaraçosa com corridas de pombos competitivas; eles até mesmo possuem um pombal espaçoso."
 vizier_extravagance_t2_activities_modifier_custom_desc: "Este personagem é conhecido por realizar encontros #EMP discretos#! para alguns dos moradores mais... salaces de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 vizier_extravagance_t2_activities_modifier_custom_desc.on_action: "Este personagem se deleita em realizar grandes banquetes toda semana — a nobreza inferior de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] quase depende deles apenas para suas cozinhas."
 vizier_extravagance_t2_property_modifier: "Este personagem tem gosto pela arte e faz questão de patrocinar as artes e exibir os frutos de sua benevolência, às vezes até para os membros mais humildes da sociedade."
 vizier_extravagance_t2_property_modifier_custom_desc: "Este personagem gosta de festas regulares e fartas, mas faz questão de convidar os cidadãos mais notáveis de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], mesmo que sua classe os impeça de outra forma."
 vizier_extravagance_t2_property_modifier_custom_desc.on_action: "Este personagem possui uma casa na cidade ricamente decorada, mas adequadamente modesta, em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 vizier_extravagance_t2_charity_modifier: "Os interesses comerciais deste personagem são muitos e diversos, incluindo pequenas oficinas, guildas menores e domínios livres por toda a capital."
 vizier_extravagance_t2_charity_modifier_custom_desc: "Este personagem possui e mantém uma pequena arena privada para corridas de cavalos. O jogo que isso permite é, é claro, um benefício adicional."
 vizier_extravagance_t2_charity_modifier_custom_desc.on_action: "Este personagem possui uma mansão privada nos arredores de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] — perto o suficiente para ser conveniente, longe o suficiente para ser discreta."
 vizier_extravagance_t3_title: "Este personagem é [Select_CString( ROOT.Char.GetDiarchy.GetDiarch.IsFemale, 'la única propietaria', 'el único propietario' )] de uma estrada de pedágio especialmente lucrativa que leva a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Como ele chegou a possuí-la e quando o pedágio foi estabelecido é motivo de muita especulação."
 vizier_extravagance_t3_treasure_modifier: "Este personagem mantém uma rede de agentes por todo o reino, monitorando e mantendo seus interesses comerciais até nos postos mais distantes."
 vizier_extravagance_t3_treasure_modifier_custom_desc: "Este personagem paga para manter um amplo jardim no telhado em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], para espanto dos cidadãos abaixo."
 vizier_extravagance_t3_treasure_modifier_custom_desc.on_action: "Este personagem é conhecido por ter todos os inspetores e fiscais de um dos principais mercados da capital em sua folha de pagamento. Tudo para manter sua integridade para o reino, é claro."
 vizier_extravagance_t3_activities_modifier: "Este personagem é [Select_CString( ROOT.Char.GetDiarchy.GetDiarch.IsFemale, 'la dueña', 'el dueño' )] de um albergue barato em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], destinado deliberadamente aos mais pobres e menos capazes da sociedade."
 vizier_extravagance_t3_activities_modifier_custom_desc: "#EMP Dizem#! que este personagem tem em sua folha de pagamento uma das principais gangues de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]; ninguém consegue entender o que [Select_CString( ROOT.Char.GetDiarchy.GetDiarch.IsFemale, 'uma funcionária honrada', 'um funcionário honrado' )] poderia querer com uma gangue de brutamontes ferozes."
 vizier_extravagance_t3_activities_modifier_custom_desc.on_action: "Este personagem paga por uma pensão pública para acolher e educar um número definido de órfãos a cada ano. Os jovens recebem uma educação adequada, alimentação, alojamento e instrução ética até atingirem a maioridade."
 vizier_extravagance_t3_property_modifier: "Este personagem paga por um pequeno fundo acessível aos cidadãos da capital cujos prédios sofram danos — se eles não puderem arcar com os reparos, então recebem uma bolsa."
 vizier_extravagance_t3_property_modifier_custom_desc: "Este personagem subsidia uma série de festas religiosas anuais para os plebeus de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 vizier_extravagance_t3_property_modifier_custom_desc.on_action: "Este personagem paga pensões para alguns dos viúvos desamparados da capital."
 vizier_extravagance_t3_charity_modifier: "Este personagem paga pensões para algumas das viúvas desamparadas da capital."
 vizier_extravagance_t3_charity_modifier_custom_desc: "Este personagem paga por um fundo que alimenta e veste os mendigos e desamparados de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], uma linha vital para a escória do reino."
 vizier_extravagance_t3_charity_modifier_custom_desc.on_action: "Este personagem paga por um esquema que compra jarras de água de reposição para crianças jovens empregadas que quebram as suas enquanto vão buscar a água da manhã — sem que ninguém das casas das crianças ouça falar sobre seus pequenos acidentes."
 vizier_extravagance_t4_title: "Este personagem paga por um pequeno posto de guarda, e sentinela ocupante, para ficar do lado de fora de um dos prédios administrativos mais importantes em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 vizier_extravagance_t4_treasure_modifier: "Este personagem paga para que sementes sejam regularmente semeadas em certos becos para os pássaros da capital — apenas os bárbaros deixariam tais animais sofrerem e passarem fome."
 vizier_extravagance_t4_treasure_modifier_custom_desc: "Este personagem financia a manutenção (e pagou pela criação) de uma comunidade religiosa isolada, longe dos pecados da vida normal."
 vizier_extravagance_t4_treasure_modifier_custom_desc.on_action: "Este personagem paga para que alguns dos juízes profissionais do reino dediquem mais tempo a ouvir casos e viajar pelos seus circuitos."
 vizier_extravagance_t4_activities_modifier: "Este personagem paga por uma série de pequenas cozinhas gratuitas, alimentando os pobres agradecidos de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 vizier_extravagance_t4_activities_modifier_custom_desc: "Este personagem tem um cômodo dedicado a curiosidades exóticas e parafernálias estranhas de terras distantes; embora de pouco uso prático, #EMP é#! uma queridinha entre os convidados."
 vizier_extravagance_t4_activities_modifier_custom_desc.on_action: "Este personagem, segundo relatos, possui saco após saco de gemas preciosas. Aqueles poucos que viram sua coleção afirmam que cada bolsa é dedicada a uma família única de pedras preciosas."
 vizier_extravagance_t4_property_modifier: "Este personagem é um grande amante das artes, e suas residências frequentemente apresentam estátuas fundidas em metais preciosos ou esculpidas nas mais polidas pedras caras."
 vizier_extravagance_t4_property_modifier_custom_desc: "Este personagem aprecia armas e armaduras decorativas — suas residências são repletas de paramentos militares ornamentalmente elaborados, de espadas douradas a escudos incrustados de gemas."
 vizier_extravagance_t4_property_modifier_custom_desc.on_action: "Este personagem possui um conjunto de talheres de bezoar exorbitantemente caros: essas pedras arcanas são ditas retardar, neutralizar ou até reverter os efeitos dos venenos mais letais, tornando os utensílios tanto supremamente estilosos #EMP quanto#! práticos."
 vizier_extravagance_t4_charity_modifier: "$vizier_extravagance_t4_title$ $vizier_extravagance_charity_title$"
 vizier_extravagance_t4_charity_modifier_custom_desc: "Este personagem tem uma pequena coleção de pedras de mosca: um tipo de rocha mística que dizem repelir forçadamente moscas, mosquitos e outros insetos zumbidores dentro de um pequeno raio, o que as torna um enfeite muito apreciado na mesa de jantar."
 vizier_extravagance_t4_charity_modifier_custom_desc.on_action: "[ROOT.Title.GetHolder.Custom('VizierExtravagance_T4_Charity')]"
 viz_extravagance.t1.treasure.hankerchiefs: "Este personagem é conhecido por seus subornos meticulosamente organizados e escalonados, dizendo-se tão regulares e previsíveis que eles devem certamente ter cem bolsas de cada tamanho prontas para uso a qualquer momento — cada uma com uma contagem exata de moedas."
 viz_extravagance.t1.treasure.cosmetics: "Este personagem possui um mapa de todo o mundo conhecido. Diz-se que é um dos mais precisos do reino e que ocupa uma parede inteira, por isso muitas vezes ele pode ser encontrado contemplando-o, absort[ROOT.Char.GetDiarchy.GetDiarch.Custom('ES_OA')]."
 viz_extravagance.t1.treasure.jewellery: "Os muitos corcéis deste personagem raramente são vistos sem os mesmos adornos preciosos e enfeites ostentosos que [ROOT.Char.GetDiarchy.GetDiarch.GetSheHe] veste; desde selas de montaria cheias de pérolas até rédeas de prata."
 viz_extravagance.t1.treasure.furniture: "Este personagem frequentemente se vangloria de que sua cozinha possui algumas das maiores panelas e frigideiras feitas dos materiais mais raros acessíveis a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 viz_extravagance.t1.treasure.clothing: "Este personagem se deleita em realizar festividades em torno de uma espaçosa piscina artificial, construída com grande despesa em uma de suas residências particulares e cercada por almofadas felpudas, divãs e o tilintar de bebidas sendo servidas."
 viz_extravagance.t1.treasure.hats: "O orgulho e a alegria deste personagem são uma coleção inteira de competitivos cavalos de corrida — quase todos de linhagem estrangeira mais pura."
 viz_extravagance.t1.treasure.relics: "As festas deste personagem são conhecidas por seu componente interativo: bolsas de moedas escondidas na comida dos convidados, escrituras de terras que precisam apenas de um nome assinado deixado no banheiro, esculturas que se desdobram para revelar uma pedra preciosa para a primeira pessoa a desvendar seus segredos e muitos outros."
 viz_extravagance.t1.treasure.drugs: "Este personagem é um firme crente de que uma festa não termina até que as despensas do anfitrião se esgotem — consequentemente, algumas de suas festas são conhecidas por durar uma semana ou mais."
 viz_extravagance.t1.treasure.game_pieces: "Este personagem valoriza a música acima das outras artes, considerando sua ausência a verdadeira de todas as tragédias. Muitas de suas festividades são essencialmente grandes concertos — às vezes até grandes o suficiente para alguns plebeus participarem."
 viz_extravagance.t1.treasure.hourglasses: "Este personagem ama a teatralidade, a atuação e os malabarismos como poucos. Suas festas apresentam um número desproporcional de artistas itinerantes, e os clássicos antigos com novos rostos são uma peça comum em cada festa."
 viz_extravagance.t1.activities.parades: "Este personagem se considera um verdadeiro[ROOT.Char.GetDiarchy.GetDiarch.Custom('ES_XA')] poe[ROOT.Char.GetDiarchy.GetDiarch.Custom('ES_TaTisa')]. Concordem os outros ou não, os convites para os banquetes luxuosos em que ele faz suas leituras são muito disputados."
 viz_extravagance.t1.activities.festivals: "Este personagem acredita que qualquer um pode ser perdoado, desde que se arrependam e façam as pazes — eles usam sua posição administrativa para organizar anistias regulares para criminosos que se mostram suficientemente penitentes."
 viz_extravagance.t1.activities.auctions: "Este personagem ama nada mais do que os bufidos, rosnados e gritos de uma fera feroz lutando por sua vida. Domadores, cães e criaturas ferozes tanto exóticas quanto mundanas lutam em arenas na maioria de suas festas."
 viz_extravagance.t1.activities.feasts: "Este personagem é apaixonadamente religioso além do que a decência pede, e faz questão de encher suas festividades com sermões e [ROOT.Char.GetDiarchy.GetDiarch.GetFaith.PriestNeuterPlural] itinerantes."
 viz_extravagance.t1.activities.board_game_tourneys: "Este personagem tem a sorte de ter um monopólio na venda de itens essenciais dentro dos muros de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]; que eles controlem o escritório que concede tais monopólios é provavelmente sem relação."
 viz_extravagance.t1.activities.pigeon_racing: "Este personagem é dono e retira um generoso imposto de um dos mercados mais famosos de produtos exóticos em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 viz_extravagance.t1.activities.orgies: "Este personagem possui uma mina lucrativa próxima à capital, uma fonte vital de metais comuns para uso doméstico e mercantil."
 viz_extravagance.t1.activities.feasts.weekly: "Este personagem é dono de um conjunto verdadeiramente expansivo de armazéns escondidos perto do centro mercantil da capital. Tão bem abastecido com produtos de comércio exóticos que os locais o chamam de 'Os Cofres d [ROOT.Char.GetDiarchy.GetDiarch.GetFirstNameNoTooltip]'."
 viz_extravagance.t1.activities.exhibitions: "Este personagem emprega uma rede em todo o reino de mensageiros discretos (e mais importante #EMP leais#!), capazes de transmitir sua vontade e instruções para todos os postos avançados da terra."
 viz_extravagance.t1.activities.feasts.commoners: "Este personagem é [Select_CString( ROOT.Char.GetDiarchy.GetDiarch.IsFemale, 'la dueña', 'el dueño' )] de quase todas as oficinas de uma das ruas mais industriosas de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], uma via famosa por suas mercadorias variadas e bonitas."
 viz_extravagance.t1.property.townhouse: "Este personagem possui um/a [ROOT.Char.GetDiarchy.GetDiarch.GetFaith.HouseOfWorship] pessoal suntuoso, usado apenas por [ROOT.Char.GetDiarchy.GetDiarch.GetSheHe] sua família e seus aliados mais próximos."
 viz_extravagance.t1.property.minor_businesses: "Este personagem possui uma pequena fortaleza em uma região perigosa localizada próxima a [ROOT.Char.GetDiarchy.GetDiarch.GetFaith.PriestNeuterPlural]. Embora cara de manter, a rica colheita de criaturas capturadas na região é lucrativa."
 viz_extravagance.t1.property.small_arena: "O tesouro deste personagem é tão grande que ocupa seu próprio prédio — um complexo fortificado no coração de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] onde sua moeda está segura."
 viz_extravagance.t1.property.manse: "Este personagem mantém um pequeno palácio fortificado em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] — supostamente repleto de passagens secretas e rotas de fuga ocultas."
 viz_extravagance.t1.property.toll_road: "Este personagem financia pessoalmente várias escolas dedicadas ao ensino de crianças que, de outra forma, não teriam a menor esperança de educação."
 viz_extravagance.t1.property.agent_network: "Este personagem financia pessoalmente vários hospitais famosos em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], instituições que tratam os mais pobres da sociedade, mas dependem inteiramente de sua generosidade."
 viz_extravagance.t1.property.rooftop_garden: "Este personagem financia pessoalmente os funerais daqueles que morrem em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] sem os fundos, família ou amigos para morrer com dignidade."
 viz_extravagance.t1.property.market_officials_on_payroll: "Este personagem financia pessoalmente vários filósofos importantes e instituições focadas em explorar as maneiras mais profundas do mundo."
 viz_extravagance.t1.property.hostel: "Este personagem financia pessoalmente alguns dos advogados proeminentes, juristas e clérigos legais do reino, ajudando a esclarecer e fazer valer uma paz justa para todos."
 viz_extravagance.t1.property.gangers: "Este personagem financia pessoalmente o preenchimento de posições-chave no serviço civil, multiplicando o poder da burocracia muitas vezes ao fornecer financiamento onde mais importa."
 viz_extravagance.t1.charity.orphans: "Este personagem financia pessoalmente uma equipe leal de guardas e agentes para percorrer [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], garantindo que a lei seja obedecida exatamente na medida em que o visir exige."
 viz_extravagance.t1.charity.building_repair: "Este personagem financia pessoalmente alguns dos mais famosos estudiosos de teologia no reino, investindo no avanço da boa teoria [ROOT.Char.GetDiarchy.GetDiarch.GetFaith.GetAdjective] em nome de seus colegas fiéis."
 viz_extravagance.t1.charity.feasts.religious: "Este personagem financia pessoalmente diversos místicos, esotéricos e êxtases conhecidos que empregam seu estranho conhecimento pelos tribunais de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 viz_extravagance.t1.charity.widowers: "Este personagem financia pessoalmente a circuncisão e educação religiosa de um certo número de meninos órfãos das ruas de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] a cada ano."
 viz_extravagance.t1.charity.widows: "Este personagem financia pessoalmente [ROOT.Char.GetDiarchy.GetDiarch.GetFaith.PriestNeuterPlural] mendicantes para percorrer a terra, atendendo aos fiéis necessitados e oferecendo conselhos espirituais sólidos aos menos fiéis."
 viz_extravagance.t1.charity.beggars: "Este personagem possui dezenas dos espelhos mais nítidos que o dinheiro pode comprar, proporcionando um nível quase indecoroso de luxo vaidoso que mesmo poucos nobres podem sonhar."
 viz_extravagance.t1.charity.awkward_children: "Este personagem parece possuir um guarda-sol para cada dia do ano: alguns bordados com ouro, alguns com prata, alguns feitos de seda, alguns de damasco, alguns cravejados de rubis, alguns com esmeraldas, e assim por diante, e assim por diante..."
 viz_extravagance.t1.charity.civil_service.guard: "Este personagem possui uma tenda de viagem para cinquenta ou mais pessoas feita do mais luxuoso cetim — cada painel ricamente bordado, cada poste de um metal precioso ou laca cara."
 viz_extravagance.t1.charity.birds: "Este personagem se orgulha de possuir quantidades abundantes dos tecidos mais luxuosos do mundo conhecido: sedas, damascos, veludos, finos brocados, cobertores elaborados e um mar quase infinito de variações menores e especialidades regionais."
 viz_extravagance.t1.charity.monastery: "Este personagem cativa e aterroriza os convidados com sua coleção de animais de estimação exóticos: leões, tigres, estranhos veados estrangeiros, e criaturas mais bizarras além enfeitam sua menagerie pessoal."
 viz_extravagance.t1.charity.judges: "Este personagem possui um tapete especialmente famoso: cem cúbitos de comprimento e a metade de largura, confeccionado com seda floss, costurado com fios de ouro e adornado por um forro de cetim prateado, bordado com cenas religiosas e históricas que dizem contar toda a história do mundo."
 viz_extravagance.t1.charity.kitchens: "Este personagem possui um colchão supostamente tecido exclusivamente com fios de ouro, e que foi agraciado por algumas das figuras mais famosas da história recente."
 viz_extravagance.t2.treasure.cabinet_of_curiosities: "Este personagem possui fórmulas, pílulas e meios mais exóticos para garantir uma cópula segura, feliz e infrutífera."
 viz_extravagance.t2.treasure.gems: "O orgulho e a alegria deste personagem é uma escultura multiarticulada de si mesmo, cuja pose e vestimenta podem ser alteradas infinitamente à vontade do visir."
 viz_extravagance.t2.treasure.sculpture: "Este personagem possui uma famosa coleção de plantas raras, musgos e ervas — cada uma mantida em uma das quinhentas panelas de cristal."
 viz_extravagance.t2.treasure.decorative_martial_gear: "Este personagem é conhecido por realizar festas com doações surpresa aos convidados encantadores: uma piada espirituosa é recompensada com dez mil cabeças de gado, uma roupa deslumbrante com um palácio remoto e seus servos, ou uma conversa fascinante com um traje de seda tingida."
 viz_extravagance.t2.treasure.bezoar_cutlery: "Este personagem mantém os nobres vizinhos de suas propriedades satisfeitos com pequenos presentes aqui e ali: cem tapetes de luxo, três mil selas finas, doze potes de âmbar cinza, dez mil boas lanças, esse tipo de coisa."
 #Narrator's note: bezoars do not, in fact, stop poison. Le big RIP.
 viz_extravagance.t2.treasure.fly_stones: "Este personagem gosta de hospedar festas para seus aliados leais, seguidores e comparsas — puramente por coincidência, eles frequentemente distribuem uma fortuna em propriedades em tais eventos, mas sempre parecem ter mais presentes exorbitantes para dar."
 #Narrator's note: fly stones are sadly fictional.
 viz_extravagance.t2.treasure.indexed_bribes: "Os festins deste personagem se concentram no espetáculo: se não puderem contar com #EMP pelo menos#! um contorcionista saltitante equilibrando uma haste coroada por uma criança brincalhona fazendo malabarismo com brasas, então qual é o sentido?"
 viz_extravagance.t2.treasure.map_of_world: "Este personagem gosta de realizar exibições deliciosamente literais de riqueza em suas festas: eles regularmente fazem grandes chuvas de centenas ou milhares de moedas sobre seus convidados favoritos."
 viz_extravagance.t2.treasure.horse_armour: "Este personagem afirma ter inventado e dominado um esporte peculiar: corrida de palanquins, onde seus carregadores competem com desafiantes para levar sua carga a uma parte específica de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] no melhor tempo."
 viz_extravagance.t2.treasure.crockery: "Este personagem realiza abertamente festas com foco em delícias carnais, onde os convidados são mimados e servidos ao máximo, e da maneira mais oleosa, grau."
 viz_extravagance.t2.activities.feasts.pool: "Este personagem acredita que a riqueza é inútil se escondida: eles têm uma fascinação por realizar desfiles exibindo seus animais de estimação exóticos, belos cavalos, servos bem-vestidos e trajes caros, todos desfilando pelas ruas de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] regularmente."
 viz_extravagance.t2.activities.gambling.horse: "Este personagem mantém uma grande piscina forrada de almofadas — dar um mergulho não deve ser motivo para falta de luxo."
 viz_extravagance.t2.activities.feasts.interactive: "Os interesses comerciais deste personagem são uma confusão torcida e labiríntica de rotas comerciais interconectadas, monopólios, patronato e propriedades."
 viz_extravagance.t2.activities.feasts.long: "Este personagem mantém um palácio que, oficialmente, é apenas #EMP levemente#! menor do que o [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip|l]. Quem o viu pessoalmente geralmente tem suas dúvidas."
 viz_extravagance.t2.activities.concerts: "Este personagem mantém uma elaborada casa de banhos privada para si mesm[ROOT.Char.GetDiarchy.GetDiarch.Custom('ES_OA')] e seus aliados mais próximos, um centro político para as tramas mais sórdidas, embora reluzentemente limpas, de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 viz_extravagance.t2.activities.theatre: "Este personagem possui um estábulo simplesmente colossal, abrigando centenas ou mais dos melhores corcéis no reino."
 viz_extravagance.t2.activities.poetry: "Este personagem possui uma piscina cujo fundo eles mantêm revestido com uma espessa crosta de moedas de ouro — qual é o ponto da riqueza se você não pode flutuar sobre ela?"
 viz_extravagance.t2.activities.amnesties: "Este personagem é dono de dezenas de embarcações comerciais privadas, uma verdadeira frota de embarcações espalhadas pelo mundo."
 viz_extravagance.t2.activities.animal_baiting: "Este personagem parece estar continuamente adquirindo negócios de menor porte que não conseguem pagar suas dívidas, seja a vários agiotas ou ao próprio estado. A autopreservação impede que a maioria faça comentários sobre isso."
 viz_extravagance.t2.activities.sermons: "Este personagem possui quase um quarto completo de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], bairros inteiros caindo dentro de suas propriedades privadas."
 viz_extravagance.t2.property.monopoly: "Rumores sugerem que este personagem é o proprietário de um dos mais notórios antros de vícios em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], um estabelecimento onde qualquer mistura de substâncias exóticas pode ser adquirida. Com dinheiro suficiente, é claro."
 viz_extravagance.t2.property.exotic_market: "Este personagem patrocina um grande observatório, observando os céus e registrando os movimentos das estrelas."
 viz_extravagance.t2.property.mine: "Este personagem financia várias universidades locais, pequenas mas prestigiadas, promovendo a erudição e a academia em seu nome."
 viz_extravagance.t2.property.warehouses: "A moeda deste personagem frequentemente é direcionada para a criação, expansão e preservação de um número selecionado de bibliotecas, copiando grandes obras para proliferar o conhecimento entre a nobreza."
 viz_extravagance.t2.property.messenger_network: "Este personagem construiu e ainda subsidia um grande banho público em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], tornando-os populares entre os plebeus que, de outra forma, poderiam lutar para pagar por tal luxo expansivo."
 viz_extravagance.t2.property.workshops: "Este personagem dedica tempo não apenas para financiar hospitais locais, mas também para garantir que eles estejam equipados com o que há de mais moderno em ungüentos médicos, instrumentos cirúrgicos e parafernálias médicas esotéricas variadas."
 viz_extravagance.t2.property.personal_temple: "Este personagem fornece salários para uma ampla variedade de funções administrativas, distribuindo a carga de trabalho diária de maneira mais uniforme e reduzindo a pressão sobre o estado."
 viz_extravagance.t2.property.fort: "Este personagem financia a criação de moinhos d'água comunitários em aldeias empobrecidas e outras áreas rurais, melhorando substancialmente sua qualidade de vida."
 viz_extravagance.t2.property.treasury: "A lendária paranoia deste personagem supostamente se estende a manter metade completa dos mendigos e vagabundos do reino em sua folha de pagamento, fornecendo-lhes comida e alojamento ocasionalmente em troca de seus olhos e ouvidos."
 viz_extravagance.t2.property.defensible_palace: "Este personagem paga pessoalmente pela criação e enchimento de reservatórios fora da sagrada Meca, cuja água ajudará a sustentar peregrinos sedentos realizando o justo Hajj."
 viz_extravagance.t2.charity.schools: "Este personagem doa regularmente armas e armaduras à soldadesca que serve diversas causas sagradas, seja saqueando os inimigos da fé ou guardando seus adeptos."
 viz_extravagance.t2.charity.hospitals: "Este personagem possui milhares e milhares de almofadas, uma avalanche quase interminável de tafetá e seda que torna cada cômodo de todas as suas residências um deleite para sentar (ou, de fato, tirar uma soneca)."
 viz_extravagance.t2.charity.poor_funerals: "A este personagem gosta um pouco demais de brinquedos marciais; dizem que ele tem mais armas decorativas e armaduras do que unidades #EMP reales#! tem seu [ROOT.Char.GetTitleAsNameNoTooltip|l]."
 viz_extravagance.t2.charity.scholars.philosophical: "Este personagem possui um resgate imperial em perfumaria: âmbar precioso em jarra, água de rosas perfumada, ghaliya perfumada, pó de almíscar, extrato de madeira de áloe e, claro, açafrão, tudo em quantidades e recipientes que poderiam pagar exércitos inteiros."
 viz_extravagance.t2.charity.scholars.legal: "O gabinete vizirial deste personagem é esculpido a partir, e mobiliado com, pedra cara com incrustações de metal e vidro, irradiando um poder sóbrio e firme."
 viz_extravagance.t2.charity.civil_service.extra_positions: "Este personagem mantém um conjunto completo de louças e talheres festivos, onde, dizem, cada peça já pertenceu ao governante de um reino estrangeiro exótico ou antigo império falecido."
 viz_extravagance.t2.charity.police: "Este personagem é famoso por seu pomar precioso: um pátio repleto de árvores artificiais forjadas em ouro e prata, carregando frutas diversas esculpidas em pedras preciosas."
 viz_extravagance.t2.charity.scholars.theological: "Este personagem é famoso pela figura impressionante cortada por sua barca de prazer pessoal, assim como pelas numerosas embarcações menores que navegam pelos cursos d'água de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] em seu nome."
 viz_extravagance.t2.charity.scholars.mystical: "Este personagem infamemente possui uma espada decorativa tão comprida quanto três soldados colocados de pés à cabeça, posicionada ao longo de uma das largas paredes de seu salão favorito."
 viz_extravagance.t2.charity.circumcision: "Sussurra-se sobre este personagem por sua coleção de ingredientes alquímicos exóticos: plantas estrangeiras estranhas, minérios estranhos de profundezas abaixo da superfície da Terra e pós derivados da carne e ossos de criaturas lendárias."
 viz_extravagance.t2.charity.preachers: "Este personagem possui um único manuscrito iluminado apresentando uma imagem desagradável de um macaco — supostamente, a obra é extraordinariamente cara, mas a fonte desse valor não está clara."
 viz_extravagance.t3.treasure.mirrors: "Este personagem é conhecido por dar festas onde sua piscina é coberta com dezenas de milhares de moedas em flores, um espetáculo fragrante em uma escala além do que a maioria dos convidados verá em suas vidas."
 viz_extravagance.t3.treasure.parasols: "Este personagem dá presentes impulsivos que superam as fortunas que até mesmo os comerciantes mais sortudos poderiam esperar fazer em suas vidas."
 viz_extravagance.t3.treasure.silk_bigtop: "O que este personagem chama de 'um banquete privado entre amigos', a maioria dos outros chamaria de 'um festival expansivo uma vez por década'."
 viz_extravagance.t3.treasure.fabrics: "A menagerie deste personagem apresenta répteis sibilantes, pássaros radiantes, mamíferos enormes e aparentemente algo de todo o vasto panorama de bestas que o mundo tem a oferecer."
 viz_extravagance.t3.treasure.exotic_pets: "A largueza deste personagem paga por pacotes de ajuda tão generosos que alguns supostos 'nobres' nas proximidades parecem totalmente dependentes de suas doações para manter as aparências."
 viz_extravagance.t3.treasure.carpets: "Este personagem considera hospedar diplomatas estrangeiros de suma importância, apenas superado por gastar quantidades vastas de moedas demonstrando o quão inferiores são os reinos de seus convidados em comparação."
 viz_extravagance.t3.treasure.gold_mattress: "Este personagem aposta moedas, bestas, terras, vidas e qualquer outra coisa que lhes agrade — tudo em quantidades tão vastas que alguns se perguntam se sua riqueza é realmente #EMP sem fim#!."
 viz_extravagance.t3.treasure.birth_control: "Este personagem realiza festas a fantasia regulares, definindo temas da história e mito para seus convidados seguirem, e esperando que cada um gaste uma renda mensal ou mais em cada traje."
 viz_extravagance.t3.treasure.sculpture.articulated: "Este personagem acredita que a variedade de especiarias é a vida, e mantém um jardim de plantas, fragrâncias e ervas exóticas em constante mudança, todas florescendo e frutificando em diferentes épocas do ano e sob diferentes condições."
 viz_extravagance.t3.treasure.plants: "Todos concordam que este personagem realiza alguns dos banquetes mais deliciosos que o reino já conheceu, repletos de suculentas peças de carne — embora poucos concordem que tipo de carne deve ser."
 viz_extravagance.t3.activities.feasts.surprise: "Este personagem mantém um palácio separado para abrigar sua piscina massiva. Eles residem em outro lugar, e desta forma conseguem manter seus aposentos privados e escritórios totalmente separados de onde eles recebem os convidados."
 viz_extravagance.t3.activities.aid: "Este personagem possui um retiro espaçoso no campo, logo nos arredores de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], um lugar tranquilo longe do agito da cidade, mantido em privacidade por hectares e hectares de propriedades circundantes."
 viz_extravagance.t3.activities.scholars.debates: "Este personagem mantém um exército privado de bandidos e batedores, pronto para impor sua vontade em qualquer lugar em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 viz_extravagance.t3.activities.feasts.give_away: "Os vastos rebanhos privados deste personagem, tanto equinos quanto bestas de carga, se espalham por grande parte do reino."
 viz_extravagance.t3.activities.land_and_livestock_grants: "Este personagem mantém um palácio privado especificamente para visitantes — uma declaração de riqueza e poder que poucos deixam de notar."
 viz_extravagance.t3.activities.feasts.spectacle: "Este personagem conduz grande parte de seus negócios de vizir de uma torre sinistra, erguendo-se alto sobre a maioria dos edifícios em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Supostamente, é possível ver cada beco e esquina de suas muitas janelas."
 viz_extravagance.t3.activities.feasts.coin_shower: "Este personagem mantém uma dúzia ou mais de palácios em toda [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], mudando de um para o próximo mensalmente."
 viz_extravagance.t3.activities.gambling.palanquin: "Este personagem administra um bordel privado, onde seus artistas favoritos proporcionam os prazeres mais lascivos regularmente."
 viz_extravagance.t3.activities.orgies: "Este personagem possui uma prisão privada de devedores — quando pessoas mais pobres não conseguem pagar suas dívidas para o vizir, a punição é rápida e clara. Até que sua família encontre o dinheiro, esperamos."
 viz_extravagance.t3.activities.parades: ""O Inferno de [ROOT.Char.GetDiarchy.GetDiarch.GetFirstNameNoTooltip]" como o chamam, o jardim de estranhas delícias e instrumentos horripilantes onde se diz que este personagem inflige suas cruéis atenções a seus inimigos e rivais."
 viz_extravagance.t3.property.pool.cushions: "Este personagem paga por estações de descanso e caravansarás em todo o reino, concentrando-se em atender a grupos menores e viajantes solitários."
 viz_extravagance.t3.property.businesses: "Este personagem é renomado pelo dinheiro que gasta construindo e mantendo pontes novas por todo o reino, uma marca de prestígio supremo para qualquer funcionário público."
 viz_extravagance.t3.property.palace.huge: "Este personagem subsidia uma doação privada de alimentos para os cidadãos mais necessitados de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], garantindo que ninguém passe fome enquanto tiver moedas sobrando."
 viz_extravagance.t3.property.bathhouse: "Este personagem financia a construção de pequenos conjuntos habitacionais em áreas desocupadas de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], ou junto às suas paredes, para aqueles mais necessitados de abrigo."
 viz_extravagance.t3.property.stables: "Este personagem paga pela manutenção de um grande jardim público — um pequeno bastião de paz e tranquilidade em um mundo que às vezes parece ser demais cruel."
 viz_extravagance.t3.property.pool.gold: "Este personagem é pessoalmente responsável pela manutenção de um serviço de combate a incêndios para [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] — algo quase inaudito no resto do mundo."
 viz_extravagance.t3.property.fleet.commercial: "Este personagem é responsável pela criação e manutenção de vários aquedutos curtos trazendo água fresca para [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], algo que lhes rende a gratidão de muitos dos mais pobres da sociedade."
 viz_extravagance.t3.property.business.stolen: "Este personagem paga por um grandioso festival anual para todos os residentes de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], um evento que a cidade aguarda o ano todo."
 viz_extravagance.t3.property.tycoon: "Este personagem administra um fundo de caridade que fornece às pessoas uma mesada, equipamento adequado e conhecimento de viagem para iniciar uma peregrinação bem-sucedida."
 viz_extravagance.t3.property.den_of_vice: "Este personagem administra um fundo de caridade que organiza remessas para empréstimos e dívidas, legais ou não, que afligem os pobres do reino."
