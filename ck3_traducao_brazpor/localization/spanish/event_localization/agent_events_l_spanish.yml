l_spanish:
 scheme_type_contract: "contrato"
 scheme_type_scheme: "esquema"
 scheme_type_contracts: "contratos"
 scheme_type_schemes: "esquemas"
 #################################################
 #General Agent Events
 agent_events.0001.t: "Cúmplices"
 agent_events.0001.desc: "Desde que recluté a [char_1.GetTitledFirstName] y [char_2.GetTitledFirstName] para mi [scheme.Custom('GetSchemeContract')], ese par ha entablado bastante amistad entre sí.\n\nParece que las tareas compartidas y las preocupaciones mutuas han hecho surgir una pequeña chispa de entendimiento entre [Select_CString(And(char_1.IsFemale, char_2.IsFemale), 'las dos proscritas', 'los dos proscritos')].\n\nSu comprensión aún no es nada seria, pero un pequeño empujón podría hacer que floreciese una verdadera amistad."
 agent_events.0001.a: "Motivação, você diz..."
 agent_events.0001.b: "Talvez o relacionamento deles possa ser frutífero..."
 agent_events.0001.b.tt.success: "Laços de afeto se entrelaçam"
 agent_events.0001.b.tt.failure: "Você não consegue motivá-los mais"
 agent_events.0001.c: "Concentre-se gentilmente na tarefa em questão."
 agent_events.0001.d: "Bom para eles."
 agent_events.0011.t: "Condições de Trabalho Próximas"
 agent_events.0011.desc: "[char_1.GetTitledFirstName] e [char_2.GetTitledFirstName] parecem se divertir #EMP demasiado#! com o humilde papel que desempenham em meus planos.\n\nAlguns pontos em comum em nosso pequeno plano para [scheme.GetName|l] deu lugar a um respeito mútuo, que, por sua vez, está claramente se tornando um vínculo firme.\n\nPor mais impensável que seja sua origem."
 agent_events.0011.a: "Uma amizade forjada a meu favor!"
 agent_events.0011.b: "[char_1.GetFirstNameNoTooltip] #EMP é#! divertid..."
 agent_events.0011.c: "[char_2.GetFirstNameNoTooltip] poderia escolher melhor."
 agent_events.0011.d: "Que sejamos três amigos juntos."
 agent_events.0011.e: "Estou tão feliz que todos nós estamos nos dando bem!"
 agent_events.0011.f: "Isso não é um encontro social."
 agent_events.0012.t: "Condições de Trabalho Mais Próximas"
 agent_events.0012.desc: "[char_1.GetTitledFirstName] e [char_2.GetTitledFirstName|l] parecem se divertir #EMP demasiado#! com o humilde papel que têm em meus planos.\n\nOlhares furtivos, sussurros em voz baixa, trocas de cartas com pretextos… Se eu não fosse tão desconfiado, não reconheceria isso como sinais claros do início de uma relação prestes a criar raízes.\n\nNão é #EMP desde luego#! de jeito nenhum a chave de um plano para [scheme.GetName|l]."
 agent_events.0012.a: "E não estão eles gratos a mim por ajudar?"
 agent_events.0012.b: "Doubtless, suas paixões podem ser aproveitadas."
 agent_events.0012.c: "Talvez suas paixões pudessem ser aproveitadas..."
 agent_events.0012.c.tt.success: "Pombinhos fazem [scheme.GetNameNoTooltip] um jogo"
 agent_events.0012.c.tt.failure: "A faísca se apagou"
 agent_events.0012.d: "Isso não é o que estamos aqui para fazer!"
 agent_events.0012.e: "Quem se importa?"
 agent_events.0012.e.tt.become_lovers: "O início de algo mais"
 agent_events.0012.e.tt.not_lovers: "$agent_events.0012.c.tt.failure$"
 agent_events.0021.t: "Aprendendo com os Melhores"
 agent_events.0021.desc.intro: "Dois dos meus agentes, [char_1.Custom('ES_ElLa')] [char_1.GetTitledFirstName|l] e [char_2.Custom('ES_ElLa')] [char_2.GetTitledFirstName|l], parecem ter encontrado uma causa comum em nosso plano além do objetivo básico.\n\nImpressionad[char_2.Custom('ES_OA')] pela habilidade de seu colega com"
 agent_events.0021.desc.diplomacy: "as cartas, a oratória e a retórica em geral"
 agent_events.0021.desc.martial: "a logística, a vontade e a presença de liderança"
 agent_events.0021.desc.stewardship: "a aritmética, a contabilidade e o olho para os detalhes"
 agent_events.0021.desc.intrigue: "astúcia, malícia e negociatas implacáveis"
 agent_events.0021.desc.learning: "a sabedoria, a leitura e o conhecimento geral"
 agent_events.0021.desc.prowess: "inteligência, força e condicionamento físico"
 agent_events.0021.desc.outro: "necessários para [scheme.GetName|l] , [char_2.GetFirstNameNoTooltip] começou a estudar o que [char_1.GetFirstNameNoTooltip] faz de diferente, com a esperança de melhorar suas próprias habilidades.\n\nEm teoria, é inofensivo, mas isso não ajuda nosso objetivo geral."
 agent_events.0021.a: "Excelente!"
 agent_events.0021.b: "Coloque essa energia no plano, seu tolo."
 agent_events.0021.c: "Talvez haja algo que eu possa aprender com isso..."
 agent_events.0031.t: "Aprendendo na Prática"
 agent_events.0031.desc: "De todas las personas con las que he elegido involucrarme en mi [scheme.Custom('GetSchemeContract')] de nada, [char_1.GetTitledFirstName] probablemente no sea la #EMP más#! hábil.\n\nSin embargo, está claro que se esfuerza en aplicarse y está determinad[char_1.Custom('ES_OA')] a no dejar que mis esfuerzos se echen a perder, con el objetivo de mejorar su habilidad en asuntos de [scheme.Custom('GetSchemeType')|l].\n\nMejorarse a uno mismo es costoso, pero nos ayuda a todos al final."
 agent_events.0031.a: "Você pode ir além disso!"
 agent_events.0031.a.tt.success: "Empurrado ao limite"
 agent_events.0031.a.tt.failure: "Esforço sem efeito"
 agent_events.0031.b: "O crédito vai, naturalmente, ao nosso gênio."
 agent_events.0031.c: "O plano vai bem..."
 agent_events.0041.t: "Esquemas Estudiosos"
 agent_events.0041.desc: "[char_1.Custom('ES_ElLa')] [char_1.GetTitledFirstName|l] es ciertamente un activo para mi [scheme.Custom('GetSchemeContract')|l], que proporciona habilidad, conocimiento y guía lo mejor que puede cada momento.\n\nÚltimamente, eso significa ofrecerse a ayudar con #EMP mi#! asesoramiento para mejorar el conjunto de nuestras probabilidades.\n\nLa oferta es… #EMP tentadora#!, si bien presuntuosa."
 agent_events.0041.a: "Eu aceito."
 agent_events.0041.a.tt.success: "Você aprende uma coisa ou outra"
 agent_events.0041.a.tt.failure: "Uma perda de tempo"
 agent_events.0041.a.tt.they_attempt_to_teach_you: "[char_1.GetFirstName] tentará usar sua [skill|lE] para te ensinar #WEAK (isso é mais fácil quanto melhor [char_1.GetSheHe] for)#!"
 agent_events.0041.b: "Que curioso! Não."
 agent_events.0041.c: "Coloque sua mente na tarefa, não em mim."
 agent_events.1001.t: "Na Garganta Errada"
 agent_events.1001.desc: "Jamás he visto discutir a nadie tanto como [char_1.Custom('ES_AlAla')] [char_1.GetTitledFirstName|l] y [char_2.Custom('ES_AlAla')] [char_2.GetTitledFirstName|l], #EMP supuestamente#! [Select_CString(And(char_1.IsFemale, char_2.IsFemale), 'aliadas', 'aliados')] en mi [scheme.Custom('GetSchemeContract')]. Por desgracia, ven en [Select_CString(Or(char_1.IsFemale, char_2.IsFemale), 'la otra', 'el otro')] algo que no les gusta.\n\nAl principio, intenté dejar[Select_CString(And(char_1.IsFemale, char_2.IsFemale), 'las', 'los')] en paz con la esperanza de que arreglarían las cosas [Select_CString(And(char_1.IsFemale, char_2.IsFemale), 'solas', 'solos')], pero está claro que si no les paro los pies, nos puede salir caro al resto."
 agent_events.1001.a: "Dê uma palestra a ambos."
 agent_events.1001.a.tt.success: "Eles levam suas palavras a sério"
 agent_events.1001.a.tt.failure: "Seus argumentos caem em ouvidos surdos"
 agent_events.1001.b: "Apelo à razão."
 agent_events.1001.b.tt.success: "$agent_events.1001.a.tt.success$"
 agent_events.1001.b.tt.failure: "$agent_events.1001.a.tt.failure$"
 agent_events.1001.c: "O ódio não é uma ferramenta tão problemática..."
 agent_events.1001.d: "Vocês. Vão. Parar."
 agent_events.1001.e: "Deixe os idiotas brigarem."
 agent_events.1001.e.rivals_bicker: "Discussões incessantes"
 agent_events.1001.e.rivals_bicker_less: "Discussões ocasionais"
 agent_events.1011.t: "Feridas Infectadas"
 agent_events.1011.desc: "Tal vez fue estúpido por mi parte elegir como ayudantes para mi [scheme.Custom('GetSchemeContract')] a dos personas que parecen #EMP odiarse#! tanto; desde luego, las discusiones continuas y el rencor mezquino entre [char_1.Custom('ES_ElLa')] [char_1.GetTitledFirstName|l] y [char_2.Custom('ES_ElLa')] [char_2.GetTitledFirstName|l] parecen [Select_CString(And(char_1.IsFemale, char_2.IsFemale), 'decididas', 'decididos')] a demostrarlo.\n\nAun así, por mucho que se detesten, deberían ser capaces de centrarse en el trabajo que tienen por delante."
 agent_events.1011.a: "Obriguem-nos a trabalhar [Select_CString(And(char_1.IsFemale, char_2.IsFemale), 'juntas', 'juntos')]."
 agent_events.1011.b: "Tente mantê-los afastados."
 agent_events.1011.c: "Deixe como está."
 agent_events.2001.t: "Um Prazer Trabalhar Com"
 agent_events.2001.desc: "É uma grande sorte que eu tenha a oportunidade de planejar meu [scheme.Custom('GetSchemeContract')] com [relation.Custom2('MyCharacterIntroduction', ROOT.Char)] ao meu lado.\n\nNinguém poderia pedir uma ajudante melhor ou mais observadora, sempre dispost[relation.Custom('ES_OA')] a ir além por nossas necessidades, sempre focad[relation.Custom('ES_OA')] no melhor modo de fazer avançar meu[scheme.Custom('GetSchemeContract')].\n\nMais recentemente, o trabalho dela resultou em um atalho que deve nos poupar uma quantidade considerável de tempo."
 agent_events.2001.a: "Excelente notícia!"
 agent_events.2011.t: "Agendas Pessoais"
 agent_events.2011.desc: "Que loucura tomou conta de mim para colocar [relation.Custom2('MyCharacterIntroduction', ROOT.Char)] no meu [scheme.Custom('GetSchemeContract')]?\n\nEsse idiota só trouxe problemas desde o primeiro dia em que me envolvi com [relation.GetSheHe], uma pedra no sapato, irritante e feia.\n\nSem sabotar às claras, é claro, mas quando absolutamente tudo o que se toca dá errado sem motivo aparente, e sempre tem alguém sorrindo..."
 agent_events.2011.a: "Essa espécie de [relation.Custom2('InsultNoun', ROOT.Char)] amante da conspiração!"
 agent_events.2021.t: "Uma Pequena Competição"
 agent_events.2021.desc: "Se ve que mi [scheme.Custom('GetSchemeContract')] se ha convertido en una especie de juego para [agent_1.Custom('ES_ElLa')] [agent_1.GetTitledFirstName|l] y [agent_2.Custom('ES_ElLa')] [agent_2.GetTitledFirstName|l].\n\nAunque hasta ahora no habían ni tenido una cercanía especial ni tampoco discusiones especiales, se ve que disfrutan de una pugna tranquila sobre quién destaca más en sus tareas, en la que intentan dejar en evidencia a su oponente.\n\nPor ahora es poca cosa, pero tiene todas las semillas de poder ir a más."
 agent_events.2021.a: "Uma pequena competição amigável é boa!"
 agent_events.2021.b: "Uma rivalidade séria pode ter seus benefícios..."
 agent_events.2021.c: "Deixe-os em paz."
 agent_events.3001.t: "Queimando dos Dois Lados"
 agent_events.3001.desc: "Está claro que [relation.Custom2('MyCharacterIntroduction', ROOT.Char)] lo está dando todo por mi [scheme.Custom('GetSchemeContract')] de [scheme.GetName|l], y se pasa noches en vela y jornadas interminables por nuestros objetivos.\n\nTal vez… ¿tal vez es una crueldad usar así a alguien que significa tanto para mí? Desde luego, no puedo decir que a mí me gustaría que me utilizaran así.\n\nAun así, [relation.GetSheHe] #EMP es#! eficaz y es por una buena causa."
 agent_events.3001.a: "Por favor, dê o seu #EMP tudo#!."
 agent_events.3001.b: "Você poderia fazer mais, muito mais!"
 agent_events.3001.c: "Passe um tempo comigo em vez disso, [relation.GetFirstNameNoTooltip]."
 agent_events.3001.d: "Descanse um pouco, [relation.GetFirstNameNoTooltip], você já fez o suficiente."
 agent_events.3011.t: "Por Minha Causa"
 agent_events.3011.desc: ""#EMP Por favor#!, [ROOT.Char.GetFirstNameNoTooltip]. Vocês estão trabalhando demais, como se tal [scheme.Custom('GetSchemeContract')] os consumisse!", geme [relation.Custom2('MyCharacterIntroduction', ROOT.Char)] pela centésima vez, ou pelo menos é o que me parece.\n\nTenho #EMP estado#! estado sendo diligente ultimamente, sem dúvida, mas certamente não mais do que o necessário.\n\nA expressão abatida de preocupação [relation.Custom('MaskFace_BehindAcross')] a [relation.Custom('MaskFace')] de [relation.GetFirstNameNoTooltip] me diz que talvez não seja o caso."
 agent_events.3011.a: "Por você? Claro!"
 agent_events.3011.b: "Um[relation.Custom('ES_XA')] [ROOT.Char.Custom2('RelationToMeShort',SCOPE.sC('relation'))] #EMP de verdade#! não me pediria isso."
 agent_events.3011.c: "A única saída é através, [relation.GetFirstNameNoTooltip]..."
 agent_events.3021.t: "A Família que Fica Junta"
 agent_events.3021.desc: "Es un poco extraño que a [relation.Custom2('MyCharacterIntroduction', ROOT.Char)] y a mí nos haya unido tanto mi [scheme.Custom('GetSchemeContract')] de [scheme.GetName|l].\n\nAun así, hay cierta alegría en encontrar una tarea compartida, en trabajar juntos en pos de un objetivo. Las frustraciones que se comparten se reducen, los triunfos se multiplican y siempre hay algo de lo que hablar.\n\nMe alegra haberle metido en esta empresa."
 agent_events.3021.a: "Felicidade familiar..."
 agent_events.3031.t: "Desgarrados"
 agent_events.3031.desc: ""Juro por [relation.GetFaith.HealthGodName], você ainda é meu [relation.Custom2('RelationToMeShort',ROOT.Char)] [relation.Custom('ES_OA')]? Só de ver seu rosto já me enfureço nestes dias!", dispara [relation.GetFirstName].\n\nEssa discussão é bem típica de nossas interações ultimamente; há muitos desentendimentos sobre planos e práticas, expressões entendidas da pior maneira e até a menor divergência vira uma discussão de horas.\n\nA afinidade que eu esperava construir ao envolver[relation.GetHerHim] nessa tal [scheme.Custom('GetSchemeContract')|l], parece totalmente arruinada."
 agent_events.3031.a: "Por favor, [relation.GetFirstNameNoTooltip], não é assim."
 agent_events.3031.a.tt.success: "Seu apelo é adequadamente lamentável"
 agent_events.3031.a.tt.failure: "Suas palavras caem em ouvidos surdos"
 agent_events.3031.b: "Você simplesmente não entende minha visão!"
 agent_events.3041.t: "Segundas Intenções"
 agent_events.3041.desc: ""É meu [target_relation.Custom2('RelationToMeShort',SCOPE.sC('target'))], maldito seja!", grita [target_relation.GetFirstName], com frustração e preocupação por estar envolvido com o meu [scheme.Custom('GetSchemeContract')] de nada.\n\nÉ claro que, dado que estamos conspirando para [scheme.GetName|l] contra [target.GetFirstName].\n\n"Talvez eu possa… me retirar por um tempo. De qualquer forma, não sou útil para vocês nesse estado"."
 agent_events.3041.tt.forced_to_stay: "[relation.GetFirstName] será forçado a ficar no [scheme|lE] de [scheme.GetName|l]"
 agent_events.3041.a: "Por favor, #EMP lembre-se#! porque você está aqui."
 agent_events.3041.a.tt.forced_to_stay_longer: "$agent_events.3041.tt.forced_to_stay$ ainda mais tempo"
 agent_events.3041.b: "Deixe-me mudar sua mente..."
 agent_events.3041.b.tt.success: "[relation.GetFirstNameNoTooltip] ficará"
 agent_events.3041.b.tt.failure: "[relation.GetFirstNameNoTooltip] é livre para ir"
 agent_events.3041.c: "Você bem sabe que não pode ir."
 agent_events.3041.c.tt.success: "$agent_events.3041.b.tt.success$"
 agent_events.3041.c.tt.failure: "$agent_events.3041.b.tt.failure$"
 agent_events.3041.d: "Você pode ir a qualquer momento."
 agent_events.3051.t: "Um Inimigo Comum"
 agent_events.3051.desc: "Está claro por nuestras discusiones más recientes que a [target_rival.GetFirstName] le voy cayendo mejor, sobre todo a partir del respeto por cómo estoy manejando mi [scheme.Custom('GetSchemeContract')] de [scheme.GetName|l] contra su odiad[target.Custom('ES_OA')] rival, [target.Custom('ES_ElLa')] [target.GetTitledFirstName].\n\nUna forma extraña de encontrar puntos en común con alguien, pero, desde luego, una fervientemente sincera.\n\nTanto que, de hecho, [target_rival.GetFirstNameNoTooltip] parece decidid[target_rival.Custom('ES_OA')] a rembolsar mis trabajos contra su rival, ¡aunque sea de forma preventiva!"
 agent_events.3051.a: "Um favor por outro."
 agent_events.3051.b: "Talvez pudéssemos ser amigos?"
 agent_events.3051.c: "Por favor, passe seu tempo em nossos planos."
 agent_events.3061.t: "Graça Salvadora"
 agent_events.3061.desc: "Una de principales ventajas de que [target_spymaster.GetFirstName], jef[target_spymaster.Custom('ES_EA')] de espías [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l], se haya involucrado en mi [scheme.Custom('GetSchemeContract')] de [scheme.GetName|l] es que la persona que tiene más probabilidades de descubrirnos está trabajando habilidosamente para que sigamos siendo un secreto.\n\nAunque siempre ha sido útil mantener esta capa de silencio en torno a nuestros esfuerzos, [target_spymaster.GetFirstNameNoTooltip] ha sido #EMP especialmente#! hábil de un tiempo a esta parte y nos ha ganado varios meses de silencio seguro e ininterrumpido."
 agent_events.3061.a: "Uma surpresa agradável!"
 agent_events.3061.a.tt.extra_grace: "Seu [scheme|lE] [scheme.GetName] recebe vários meses de [secrecy_grace|lE] adicionais"
 agent_events.3071.t: "Se Eu Puder Sugerir"
 agent_events.3071.desc.intro.nemesis: "O profundo ódio [agent.Custom('ES_DelDela')] [agent.GetTitledFirstName|l] por [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l] motiva uma criatividade #EMP ciertamente#! assombrosa quando se lhe dá a oportunidade de se expressar."
 agent_events.3071.desc.intro.spymaster: "Como chefe[agent.Custom('ES_EA')] de espiões [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l], [agent.Custom('ES_ElLa')] [agent.GetTitledFirstName|l] tem muitas oportunidades de encontrar maneiras únicas de aumentar meu [scheme.Custom('GetSchemeContract')] de nada."
 agent_events.3071.desc.intro.councillor: "Sendo um[agent.Custom('ES_XA')] de [Select_CString( agent.IsFemale, 'las consejeras', 'los consejeros' )] de confiança [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l], as habilidades e a visão de [agent.Custom('ES_DelDela')] [agent.GetTitledFirstName|l] servem bem à nossa causa."
 agent_events.3071.desc.outro: "\n\nHoje, isso se manifesta como uma gama de possíveis agentes que poderíamos integrar ao empreendimento. Mais de um arrisca desestabilizar nossos esforços, mas qualquer um deles ainda poderia ser um poderoso acréscimo."
 agent_events.3071.a: "Algo para melhorar nossas chances, você diz..."
 agent_events.3071.b: "Uma maneira de acelerar nossos planos?"
 agent_events.3071.c: "Ajudar-nos a permanecer em segredo me intriga."
 agent_events.3071.d: "Meu plano já é impecável, obrigado."
 agent_events.4001.t: "Muito Longe"
 agent_events.4001.desc: "Da igual cuál pueda ser el valor que su otr[distant_agent.Custom('ES_OA')] aporte a mi [scheme.Custom('GetSchemeContract')], es innegable que la mera distancia [distant_agent.Custom('ES_DelDela')] [distant_agent.GetTitledFirstName|l] [scheme.GetTargetCharacter.Custom('ES_DelDela')] [scheme.GetTargetCharacter.GetTitledFirstName|l] nos causa… problemas.\n\nUn agente remoto no puede ser igual de útil que uno que tengamos que mover según necesitemos.\n\nAy, ahora pagamos el precio por ello."
 agent_events.4001.a: "Você é um fardo, [distant_agent.GetTitledFirstNameNoTooltip|l], vá embora!"
 agent_events.4001.b: "Maldição..."
 agent_events.4011.t: "Uma Sombra na Corte"
 agent_events.4011.desc: "Es una auténtica bendición tener a alguien como [skilled_agent.Custom('ES_ElLa')] [scheme.GetTargetCharacter.GetTitledFirstName|l] involucrad[skilled_agent.Custom('ES_OA')] en mi [scheme.Custom('GetSchemeContract')], alguien capaz de hacer progresar nuestro objetivos de distintos modos, que solo espera instrucciones.\n\nUna combinación envidiable de habilidad, acceso y cercanía [scheme.GetTargetCharacter.Custom('ES_AlAla')] [scheme.GetTargetCharacter.GetTitledFirstName|l] nos proporciona una gama de opciones sobre cómo aprovecharle."
 agent_events.4011.a: "Ganhas sutis são sempre as melhores."
 agent_events.4011.b: "O potencial futuro parece útil..."
 agent_events.4011.c: "A discrição é fundamental!"
 agent_events.4011.d: "Isso abre algumas portas para nós."
 #################################################
 #Agent Modifiers
 agent_events_0001_agents_focused_on_scheme_modifier: "Trabalhe, Não Fale"
 agent_events_0001_agents_focused_on_scheme_modifier_desc: "Não estamos aqui para socializar, estamos aqui para #EMP realizar#!."
 agent_events_0011_friends_working_on_scheme_together_modifier: "Atmosfera Convivial"
 agent_events_0011_friends_working_on_scheme_together_modifier_desc: "Este plano tem um grupo próximo de amigos por trás dele."
 agent_events_0012_lovers_get_weird_about_scheme_modifier: "Tudo Parte do Jogo"
 agent_events_0012_lovers_get_weird_about_scheme_modifier_desc: "Amantes em potencial podem encontrar romance nos lugares mais estranhos."
 agent_events_0021_scheme_speed_boost_modifier: "Focado no Objetivo"
 agent_events_0021_scheme_speed_boost_modifier_desc: "É importante, acima de tudo, lembrar o que devemos realizar."
 agent_events_0041_better_agent_focusing_modifier: "Talentos Redirecionados"
 agent_events_0041_better_agent_focusing_modifier_desc: "Só porque você pode ensinar alguém uma lição, não significa que você deva."
 agent_events_1001_rival_agents_squabble_modifier: "Agentes em Disputa"
 agent_events_1001_rival_agents_squabble_modifier_desc: "Vários dos agentes neste plano se recusam a parar de discutir sobre os detalhes mais mesquinhos."
 agent_events_1001_rival_agents_squabble_less_modifier: "Agentes Discutindo"
 agent_events_1001_rival_agents_squabble_less_modifier_desc: "Os agentes deste plano frequentemente têm problemas para trabalhar juntos, embora ainda consigam."
 agent_events_1001_rival_agents_forced_submission_modifier: "Submissão Forçada"
 agent_events_1001_rival_agents_forced_submission_modifier_desc: "Uma demonstração de força ajuda na intriga assim como na guerra."
 agent_events_1011_rival_agents_forced_to_work_together_modifier: "Rivais Forçados a Trabalhar Juntos"
 agent_events_1011_rival_agents_forced_to_work_together_modifier_desc: "Pode ser impraticável manter agentes hostis afastados, mas colocá-los juntos tem suas próprias dificuldades."
 agent_events_1011_rival_agents_kept_separate_modifier: "Rivais Mantidos Separados"
 agent_events_1011_rival_agents_kept_separate_modifier_desc: "Conflitos internos são evitáveis, ineficiências não são."
 agent_events_1011_rival_agents_left_alone_modifier: "Rivais Deixados Sozinhos"
 agent_events_1011_rival_agents_left_alone_modifier_desc: "Adultos crescidos podem resolver seus próprios problemas."
 agent_events_2021_competing_agents_encouraged_rivalry_modifier: "Rivalidade Estimulada"
