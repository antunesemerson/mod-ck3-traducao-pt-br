l_spanish:
 death_management.1000.killed.tt: "[dead_character.GetTitledFirstName] foi assassinad[dead_character.Custom('ES_OA')] por [killer.GetTitledFirstName|l]."
 death_management.1000.t: "Até Que a Morte Nos Separe"
 death_management.1000.murder: "Assassinaram [dead_character.GetTitledFirstName|l]!\n\n"
 death_management.1000.plaguestart: "Doenças e pestes continuam sua marcha assustadora por [realm.GetNameNoTier], derrubando camponeses e nobres igualmente. Essa verdade brutal e indiscriminada raramente se revela até momentos como estes.\n\n"
 death_management.1000.plaguespouse: "Posso apenas observar em silêncio enquanto os médicos se afastam do corpo de meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('dead_character'))]. Me aproximo e pego sua mão. Ainda está quente.\n\n"
 death_management.1000.like: "Como pode um coração suportar esse tipo de dor sem se partir? Não é possível! No entanto, aqui estou eu, meu coração batendo enquanto o seu ficou em silêncio. Oh, [dead_character.GetFirstName], meu [dead_character.Custom('LoverPetName')]. A vida não será a mesma sem você."
 death_management.1000.neutral: "Meu querid[dead_character.Custom('ES_OA')] [dead_character.GetFirstName]. Talvez eu não tenha te amado, mas sinto sua partida com mais intensidade do que jamais imaginei. Você sempre esteve ali, meu companheir[dead_character.Custom('ES_OA')] constante. Será que dei sua presença como garantida? Há tantas coisas que deixei por dizer..."
 death_management.1000.dislike: "[dead_character.GetFirstName|U], quando você deu seu último suspiro, o alívio me invadiu. Talvez eu devesse me envergonhar, mas, na verdade, não havia amor entre nós. Por fim, estou livre para recomeçar minha vida!"
 death_management.1000.murder_wedding: "Ah, que morte completamente inesperada. Não planejada de forma alguma. Ninguém poderia prever!"
 death_management.1000.a: "Pelo menos as memórias permanecem."
 death_management.1000.b: "Espero que você encontre paz, [dead_character.GetFirstNameNoTooltip]."
 death_management.1000.c: "Não poderia ter chegado em melhor hora!"
 death_management.1000.tt: "Seu [Select_CString( dead_character.IsFemale, 'esposa', 'esposo' )] , [dead_character.Custom('ES_ElLa')] [dead_character.GetTitledFirstName|l] , [dead_character.GetDeathReasonHideKiller]."
 death_management.1001.t: "Sobrevivendo a um filho"
 death_management.1001.murder: "[dead_character.GetTitledFirstName|l]\n\n"
 death_management.1001.tt: "Seu [THIS.Char.Custom2('RelationToMeShort', SCOPE.sC('dead_character'))], [dead_character.Custom('ES_ElLa')] [dead_character.GetTitledFirstName|l], [dead_character.GetDeathReasonHideKiller]."
 death_management.1001.plaguechild: "O estômago se me revira e contorce em uma agonia silenciosa enquanto o corpo do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('dead_character'))] [dead_character.GetFirstName]. Médicos e curandeiros trabalharam do amanhecer ao anoitecer para salvar[dead_character.GetHerHim], mas seus rostos sombrios diziam mais do que diriam.\n\nTão jovem, tão cheio de promessas. Tantos outros ainda terão de morrer assim.\n\n[ROOT.Char.GetFaith.HighGodName] nos livre."
 death_management.1001.child: "Coloquei tantas esperanças em você, filh[dead_character.Custom('ES_OA')] em mim[dead_character.Custom('ES_OA')]. Tudo o que você poderia ter aprendido, experimentado e feito. Havia tantas possibilidades. Talvez um dia você tivesse filhos próprios. Mas agora, nada disso jamais acontecerá…"
 death_management.1001.like: "Oh, [ROOT.Char.GetFaith.HighGodName], como você pôde fazer isso com [dead_character.GetFirstName]? Se eu pequei, por que não me castigaste em vez disso? Meu [dead_character.Custom('GetDaughterSon')] perfeito[dead_character.Custom('ES_OA')] não tinha culpa alguma! A vida ainda lhe reservava tantas coisas..."
 death_management.1001.neutral: "Eu achava que era velho demais para me surpreender com as crueldades deste mundo, mas jamais previ ter de enfrentar a morte da minha própri[dead_character.Custom('ES_OA')] [dead_character.Custom('GetDaughterSon')]. Minha única esperança é que [dead_character.GetSheHe] já esteja livre do sofrimento que eu devo suportar…"
 death_management.1001.dislike: "Não é dever de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom('MotherFather')] amar seus filhos? No entanto, não consigo chorar pela morte de [dead_character.GetFirstName]. Em algum momento, devo ter cometido um erro, algo que o obrigou a seguir por um caminho que jamais pude aprovar. Embora eu possa ter culpa pelo que ele se tornou, agora isso já pertence ao passado. Finalmente."
 death_management.1001.a: "Não merecia isso."
 death_management.1001.c: "É tarde demais para se arrepender."
 death_management.1001.d: "Descanse em paz, pobre [dead_character.GetFirstNameNoTooltip]."
 death_management.1004.t: "O Vazio Deixado"
 death_management.1004.desc: "Há uma presença em minha cama, tão intensamente física quanto sentia teu corpo quando me envolvias com teus braços. Mas essa presença não és tu, [dead_character.GetFirstName], mas sim toda a saudade e angústia que deixaste. Durante o dia tento me manter ocupad[ROOT.Char.Custom('ES_OA')], mas aqui, onde as lembranças são tão nítidas, não há escapatória."
 death_management.1004.a: "Será que a dor algum dia desaparecerá?"
 death_management.1004.a.tt: "Seu amante, [dead_character.Custom('ES_ElLa')] [dead_character.GetTitledFirstName|l], [dead_character.GetDeathReasonHideKiller]."
 death_management.lover.desc: "Minha amante, [dead_character.GetTitledFirstName|l], [dead_character.GetDeathReason]."
 death_management.1005.t: "As Memórias Permanecem"
 death_management.1005.desc: "Oh, [dead_character.GetFirstName]. Se você ainda estivesse comigo, sei que me dirias para ser forte. Que as coisas melhorariam. E você estaria certo, como sempre, mas primeiro devo praguejar e chorar. Como eu poderia não fazer isso quando você se foi deste mundo?"
 death_management.1005.desc.ritual_best_friend: "[dead_character.GetFirstName] morreu! Meu melhor e mais verdadeir[dead_character.Custom('ES_OA')] amig[dead_character.Custom('ES_OA')] foi ceifad[dead_character.Custom('ES_OA')], levad[dead_character.Custom('ES_OA')] pelo frio abraço de [ROOT.Char.GetFaith.DeathDeityName] antes da sua hora. Choro, me lamento, puxo meus cabelos e rasgo minhas roupas, mas sei que nunca mais [dead_character.Custom('ES_ElElla')] verei.\n\nComo... como posso seguir agora?\n\n[dead_character.GetFirstNameNoTooltip], querid[dead_character.Custom('ES_OA')] e doce [dead_character.GetFirstNameNoTooltip], gostaria que eu seguisse em frente, e tenho de esperar que sua memória possa me sustentar nestes tempos sombrios, mas a vida parece uma vela sem chama sem [dead_character.Custom('ES_ElElla')]."
 death_management.1005.a: "Você nunca será esquecid[dead_character.Custom('ES_OA')], velh[dead_character.Custom('ES_OA')] amig[dead_character.Custom('ES_OA')]."
 death_management.1005.a.tt: "Seu [Select_CString( dead_character.IsFemale, 'amiga', 'amigo' )], [dead_character.Custom('ES_ElLa')] [dead_character.GetTitledFirstName|l],[dead_character.GetDeathReasonHideKiller]."
 death_management.friend.desc: "Seu amig[dead_character.Custom('ES_OA')], [dead_character.GetTitledFirstName|l], faleceu."
 death_management.1007.t: "Um Giro do Destino"
 death_management.1007.start_murder: "Foram assassinados [dead_character.Custom('ES_AlAla')] [dead_character.GetTitledFirstName|l]!"
 death_management.1007.start: "Hoje, com a partida de [dead_character.GetTitledFirstName|l], o futuro do [ROOT.Char.GetPrimaryTitle.GetNameNoTier] mudou de curso."
 death_management.1007.same_or_higher_tier: "Nunca saberemos se seu reinado teria unido nossas terras,"
 death_management.1007.mytitle: "Nunca saberemos que tipo de [ROOT.Char.GetTitleTierName] teria sido,"
 death_management.1007.ruler: "Nunca saberemos que tipo de governante teria se tornado,"
 death_management.1007.end: "ou se a sua morte é uma bênção ou uma maldição para este [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip]"
 death_management.1007.a: "Um conto termina e outro começa."
 death_management.1007.a.tt: "Seu [Select_CString( dead_character.IsFemale, 'heredera', 'heredero' )], [dead_character.Custom('ES_ElLa')] [dead_character.GetTitledFirstName|l], [dead_character.GetDeathReasonHideKiller]."
 death_management.1006.t: "Uma Maldição Desfeita"
 death_management.1006.desc: "Os altos e baixos do destino nem sempre estiveram a meu favor… [ROOT.Char.GetFaith.HighGodName] sabe que fui amaldiçoad[ROOT.Char.Custom('ES_OA')] no dia em que conheci [dead_character.Custom('ES_AlAla')] [dead_character.GetTitledFirstName|l].\n\nMas hoje essa maldição foi quebrada! A sorte sorriu para mim e levou para a sepultura esse(a) [dead_character.Custom2('InsultNoun', ROOT.Char)] [dead_character.Custom2('InsultAdjective', ROOT.Char)]."
 death_management.1006.a.tt: "Seu [rival|lE]. [dead_character.GetFullName|l]. [dead_character.GetDeathReasonHideKiller]."
 death_management.parent.desc: "Seu [dead_character.Custom('MotherFather')]. [dead_character.GetFullName]. [dead_character.GetDeathReason]"
 death_management.sibling.desc: "Seu [dead_character.Custom('SisterBrother')]; [dead_character.GetFullName]; [dead_character.GetDeathReason]."
 death_management.betrothed.desc: "Seu [Concept( 'betrothed', Select_CString(dead_character.IsFemale, 'prometida', 'prometido' ) )|E], [dead_character.GetFullName], [dead_character.GetDeathReason]."
 death_management.liege_councillor.desc: "Seu [Concept( 'councillor', Select_CString(dead_character.IsFemale, 'consejera', 'consejero' ) )|E]; [dead_character.GetFullName]; [dead_character.GetDeathReason]."
 death_management.liege.desc: "Seu [Concept( 'vassal', Select_CString(dead_character.IsFemale, 'vassala', 'vassalo' ) )|E], [dead_character.GetFullName], [dead_character.GetDeathReason]."
 death_management.pinned.desc: "Uma pessoa de interesse para você, [dead_character.GetFullName], [dead_character.GetDeathReason]."
 death_management.elder.desc: "Seu [Concept('elder', Select_CString(deceased_elder.IsFemale, 'anciana', 'anciano' ))|El]; [deceased_elder.GetFullName]; [deceased_elder.GetDeathReason]."
 death_management.1008.desc: "[dead_character.GetTitledFirstName], cônjuge do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse_of_dead_character'))] [spouse_of_dead_character.GetFirstName], faleceu. Tantos planos pensados nos mínimos detalhes foram arruinados pelo capricho volúvel de [ROOT.Char.GetFaith.DeathDeityName], embora tais queixas possam parecer mesquinhas e insubstanciais em comparação com a dor de sua família…"
 death_management.1008.a: "Descanse em paz."
 death_management.1008.a.tt: "Cônjuge de [spouse_of_dead_character.GetFirstName], [dead_character.GetTitledFirstName|l], [dead_character.GetDeathReason]."
 death_management.spouse_child.desc: "Cônjuge do seu herdeir[spouse_of_dead_character.Custom('ES_OA')], [dead_character.GetTitledFirstName|l], [dead_character.GetDeathReason]."
 death_management.1009.t: "Uma Tragédia Inesperada"
 death_management.1009.desc: "[dead_character.GetTitledFirstName], noiv[dead_character.Custom('ES_OA')] de minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('betrothed_of_dead_character'))] [betrothed_of_dead_character.GetFirstName], faleceu. Todos esses planos cuidadosamente elaborados foram destruídos pelo capricho volúvel de [ROOT.Char.GetFaith.DeathDeityName], embora tais queixas possam parecer mesquinhas e insignificantes em comparação com a dor de sua família..."
 death_management.1009.a: "Descanse em paz, pequeno."
 death_management.1009.a.tt: "O noiv[betrothed_of_dead_character.Custom('ES_OA')] de [SCOPE.sC('betrothed_of_dead_character').GetFirstName], [dead_character.GetTitledFirstName], [THIS.Char.Custom('DiedHouse_arrest')] e o acordo de casamento é anulado."
 death_management.betrothed_child.desc: "O noiv[dead_character.Custom('ES_OA')] de [betrothed_of_dead_character.GetFirstName], [dead_character.GetTitledFirstName], [dead_character.GetDeathReason]."
 death_management.1010.t: "Sem Mais Lições"
 death_management.1010.murderer: "As notícias da morte de [dead_character.GetTitledFirstName|l] percorrem os corredores e me custa manter a compostura.\n\nSó quando estou na carruagem a caminho de casa é que começo a assimilar… Ele se foi."
 death_management.1010.under_12: "Foi tudo meio confuso… como é que saímos de uma manhã em que [dead_character.GetTitledFirstName|l] não me chamou para minhas lições até agora, sentado numa carruagem a caminho de casa?\n\nQuando perguntei por que [dead_character.GetFirstName] não estava se despedindo de mim, os murmúrios ao meu redor me deixaram claro que eu não veria[dead_character.Custom('ES_LoLa')] de novo."
 death_management.1010.12_or_over: "Me deram a notícia quando eu estava me preparando para minhas aulas e já não sei mais o que fazer. Meu mestre[dead_character.Custom('ES_OA')], [dead_character.GetTitledFirstName], faleceu.\n\nQuando volto para casa, me parece estranho que eu nunca mais vá ver [dead_character.Custom('ES_ElElla')] novamente."
 death_management.1010.under_12_liked_educator: "Tomara que ao menos tivesse se despedido de mim."
 death_management.1010.under_12_disliked_educator: "De qualquer forma, eu quero um novo professor!"
 death_management.1010.over_12_liked_educator: "Você me ensinou tanto, [dead_character.GetFirstName]."
 death_management.1010.over_12_disliked_educator: "Bom livramento, de verdade."
 death_management.1010.a.tt: "Com a morte d [dead_character.GetTitledFirstName|l], você não tem mais tutor."
 death_management.educator.desc: "Seu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('ward_of_dead_character'))], educador[dead_character.Custom('ES_XA')] [ward_of_dead_character.Custom('ES_DelDela')] [ward_of_dead_character.GetTitledFirstName|l], [dead_character.Custom('ES_ElLa')] [dead_character.GetTitledFirstName|l], [dead_character.GetDeathReasonHideKiller]."
 death_management.2000.t: "Até que [prison_holder.GetFirstNameNoTooltip] nos separe"
 death_management.2000.t.root_killer: "'Até eu nos separar"
 death_management.2000.t.no_killer: "Arrancado"
 death_management.2000.murderer: "Oh, [dead_character.GetFirstName], a vida poderia ter sido ainda mais longa juntos, mas foi assim que tinha que ser.\n\nNão me agrada ter o seu sangue nas minhas mãos, mas eu sei que se você pudesse dizer, você teria querido que eu seguisse em frente e encontrasse a felicidade."
 death_management.2000.like: "Como um coração pode suportar esse tipo de dor sem se partir? Não pode ser possível! No entanto, aqui estou eu, meu coração batendo enquanto o seu se calou.\n\nOh, [dead_character.GetFirstName], meu [dead_character.Custom('LoverPetName')]."
 death_management.2000.like_end_killer: "Não consigo tirar da minha cabeça a imagem d [prison_holder.GetTitledFirstName|l] tirando sua vida."
 death_management.2000.like_end: "Não consigo tirar da cabeça a imagem de você definhando, preso nas masmorras de [prison_holder.GetTitledFirstName|l]."
 death_management.2000.neutral: "Meu querid[dead_character.Custom('ES_OA')] [dead_character.GetFirstName]. Talvez eu não te amasse, mas lamento sua morte com mais pesar do que jamais imaginei ser possível. Você sempre esteve aí, meu companheir[dead_character.Custom('ES_OA')] constante."
 death_management.2000.neutral_end_killer: "Pensar que [prison_holder.GetTitledFirstName|l] te tiraria de mim de um jeito tão violento…"
 death_management.2000.neutral_end: "Pensar que você pereceria nas masmorras de [prison_holder.GetTitledFirstName|l]…"
 death_management.2000.dislike: "[dead_character.GetWifeHusband|U], ao expirar seu último suspiro, um alívio me invadiu, assim como a raiva. Talvez eu devesse me envergonhar, mas na verdade, não havia amor perdido entre nós."
 death_management.2000.dislike_end_killer: "Porém, o insulto de você perecer pelas mãos de um[prison_holder.Custom('ES_XA')] [prison_holder.Custom2('InsultNoun', ROOT.Char)] [prison_holder.Custom2('InsultAdjective', ROOT.Char)] como [prison_holder.Custom('ES_ElLa')] [prison_holder.GetTitledFirstName|l]…"
 death_management.2000.dislike_end_unknown_killer: "No entanto, o insulto de perecer nas mãos de um assassino..."
 death_management.2000.dislike_end_no_killer: "$death_management.2000.dislike_end$"
 death_management.2000.dislike_end: "No entanto, a ofensa de que você perecesse nas masmorras de um[prison_holder.Custom('ES_XA')] [prison_holder.Custom2('InsultNoun', ROOT.Char)] [prison_holder.Custom2('InsultAdjective', ROOT.Char)] como [prison_holder.GetFirstName]…"
 death_management.2000.a: "Que um[prison_holder.Custom('ES_XA')] [prison_holder.Custom2('InsultNoun', ROOT.Char)] [prison_holder.Custom2('InsultAdjective', ROOT.Char)] te arrancasse de meu lado…"
 death_management.2000.b: "É um crime imperdoável!"
 death_management.2000.c: "É imperdoável!"
 death_management.2000.d: "Que maneira de partir, não é mesmo..."
 death_management.2000.tt: "Seu cônjuge, [dead_character.GetTitledFirstName|l], morreu nas masmorras de [prison_holder.GetTitledFirstName|l]."
 death_management.2007.t: "Uma Reviravolta do Destino"
 death_management.2007.start: "Hoje, com a morte d [dead_character.GetTitledFirstName|l] nas masmorras d [prison_holder.GetTitledFirstName|l], o futuro do [ROOT.Char.GetPrimaryTitle.GetNameNoTier] mudou de curso. Nunca saberemos que tipo de"
 death_management.2007.mytitle: "[ROOT.Char.GetTitleTierName]"
 death_management.2007.ruler: "soberano"
 death_management.2007.end: "teria se tornado, ou se a morte dele é uma bênção ou uma maldição para este título.\n\nO que eu sei é que [prison_holder.GetFirstName] pagará por seus crimes."
 death_management.2007.a: "[prison_holder.GetSheHe|U] cometeu um ato imperdoável."
 death_management.2007.a.tt: "Seu herdeir[dead_character.Custom('ES_OA')], [dead_character.GetTitledFirstName|l] faleceu nas masmorras de [prison_holder.GetTitledFirstName|l]."
 death_management.2007.a.new_heir.tt: "[new_heir.GetTitledFirstName] é seu novo herdeir[new_heir.Custom('ES_OA')]"
 death_management.2001.t: "Sobrevivendo a um Filho"
 death_management.2001.opening: "[dead_character.GetTitledFirstName] meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('dead_character'))] morreu!\n\n"
 death_management.2001.child: "Pus tantas esperanças em você, filh[dead_character.Custom('ES_OA')] meu[dead_character.Custom('ES_OA')]. Tudo o que você poderia ter aprendido, vivido e feito. Havia tantas possibilidades. Talvez um dia você tivesse filhos próprios. Mas agora, nada disso jamais acontecerá, tudo graças a [prison_holder.GetTitledFirstName|l]…"
 death_management.2001.like: "Oh, [ROOT.Char.GetFaith.HighGodName], como você pôde permitir que [prison_holder.GetTitledFirstName|l] fizesse isso com [dead_character.GetFirstName]? Meu [dead_character.Custom('GetDaughterSon')] perfeito[dead_character.Custom('ES_OA')] não tinha culpa alguma!"
 death_management.2001.like_end_killer: "Rezo para que tal [prison_holder.Custom2('InsultNoun', ROOT.Char)] [prison_holder.Custom2('InsultAdjective', ROOT.Char)] de [prison_holder.GetFirstName] não conheça descanso, paz nem #EMP amor#!, como pagamento por acabar com a vida do meu [dead_character.Custom('GetDaughterSon')]."
 death_management.2001.like_end: "Rezo para que tal [prison_holder.Custom2('InsultNoun', ROOT.Char)] [prison_holder.Custom2('InsultAdjective', ROOT.Char)] de [prison_holder.GetFirstName] não conheça descanso, paz nem #EMP amor#! , como pagamento por permitir que meu [dead_character.Custom('GetDaughterSon')] definhasse em suas masmorras."
 death_management.2001.neutral: "Achei que era velho demais para me surpreender com as crueldades deste mundo, mas jamais previ ter de enfrentar a morte de meu própri[dead_character.Custom('ES_OA')] [dead_character.Custom('GetDaughterSon')] às mãos de [prison_holder.GetTitledFirstName|l]. Minha única esperança é que [dead_character.GetSheHe] já esteja livre do sofrimento que deve ter suportado…"
 death_management.2001.dislike: "Não é dever de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom('MotherFather')] amar os filhos? Ainda assim, não consigo chorar pela morte de [dead_character.GetFirstName]."
 death_management.2001.dislike_end_killer: "Sinto apenas raiva pelo insulto que me foi infligido por [prison_holder.GetTitleTierName] ao fazer com que meu [dead_character.Custom('GetDaughterSon')] perecesse por sua mão."
 death_management.2001.dislike_end: "Sinto apenas raiva pelo insulto que me foi feito por [prison_holder.GetTitleTierName] ao fazer com que meu [dead_character.Custom('GetDaughterSon')] perecesse em suas masmorras."
 death_management.2001.a: "Não merecia isso."
 death_management.2001.c: "É tarde demais para arrependimentos."
 death_management.2001.d: "Descanse em paz, pobre [dead_character.GetFirstNameNoTooltip]."
 death_management.2001.tt: "Seu [dead_character.Custom('GetDaughterSon')], [dead_character.GetTitledFirstName|l] faleceu nas masmorras de [prison_holder.GetTitledFirstName|l]."
 death_management.2002.t: "O Descanso Eterno"
 death_management.2002.child: "[dead_character.Custom('MotherFather')|U]? Por que você se foi? Me disseram que você não pôde evitar, que [prison_holder.GetTitledFirstName|l] foi o motivo de você ter ido embora. Mas por que ele a afastou de mim, [dead_character.Custom('MotherFather')]?"
 death_management.2002.like: "Ah, [dead_character.Custom('MotherFather')]. Eu posso ter crescido, mas sempre fui seu filh[ROOT.Char.Custom('ES_OA')]. O que farei agora que [prison_holder.GetTitledFirstName|l] te arrancou de perto de mim e deste mundo? Quem me amparará agora que as lágrimas me turvam a visão?"
 death_management.2002.neutral: "Pode ser que não estivéssemos muito unidos, [dead_character.GetFirstName], mas sempre serás meu [dead_character.Custom('MotherFather')]. Pensar que [prison_holder.GetTitledFirstName] me afastaria de você de um modo tão cruel, deixando-me com tantas perguntas. O que possuiu [prison_holder.Custom('ES_AlAla')] [prison_holder.GetTitleTierName] para cometer um crime tão hediondo? Será que tomei você como garantid[dead_character.Custom('ES_OA')]? [dead_character.Custom('MotherFather')|U]... Será que você realmente me amava?"
 death_management.2002.dislike: "Talvez teu sangue corra em minhas veias, mas nunca foste um[dead_character.Custom('ES_XA')] [dead_character.Custom('MotherFather')] de verdade para mim. Se tua morte pelas mãos de [prison_holder.GetTitledFirstName] não tivesse sido tamanha ofensa, eu não sentiria nada além de alívio com teu falecimento."
 death_management.2002.a: "Eu sempre te amarei, [dead_character.Custom('MotherFather')]."
 death_management.2002.b: "Acho que nunca saberei..."
 death_management.2002.c: "Garantirei que o pague."
 death_management.2002.d: "Eu... Eu quero meu [dead_character.Custom('MotherFather')]!"
 death_management.2002.tt: "Seu [dead_character.Custom('MotherFather')], [dead_character.GetTitledFirstName|l], faleceu nas masmorras de [prison_holder.GetTitledFirstName|l]."
 death_management.2008.t: "Tudo o Que Poderia Ter Sido"
 death_management.2008.desc.like: "Comecei a imaginar o futuro de [dead_character.GetTitledFirstName|l] e o meu… tudo o que alcançaríamos juntos e a família que construiríamos."
 death_management.2008.like_end_killer: "Tantos sonhos foram por água abaixo por culpa de [prison_holder.GetTitledFirstName|l], que assassinou meu prometid[dead_character.Custom('ES_OA')], acabando com o sonho antes mesmo de começar."
 death_management.2008.like_end: "Todos esses sonhos desmoronaram por culpa de [prison_holder.GetTitledFirstName|l], que deixou meu prometid[dead_character.Custom('ES_OA')] morrer em suas masmorras."
 death_management.2008.dislike_killer: "Quando me contaram a morte do meu prometid[dead_character.Custom('ES_OA')] [dead_character.GetTitledFirstName] pelas mãos de [prison_holder.GetTitledFirstName], não posso negar que senti alívio. É claro que ainda sinto raiva de [prison_holder.GetTitleTierName] por tirar a vida do meu pretendente de maneira tão violenta, mas me alegra não ter mais que me casar com [dead_character.GetHerHim]."
 death_management.2008.dislike: "Quando me contaram a morte do meu prometid[dead_character.Custom('ES_OA')] [dead_character.GetTitledFirstName] nas masmorras de [prison_holder.GetTitledFirstName], não posso negar que senti alívio. Claro, ainda sinto raiva de [prison_holder.GetTitleTierName], por deixar meu prometid[dead_character.Custom('ES_OA')] falecer sob seus cuidados, mas fico feliz por não ter mais que me casar com [dead_character.GetHerHim]."
 death_management.2008.desc.neutral: "Desde que meu noivado com [dead_character.GetTitledFirstName|l] me foi oficializado, senti tanto empolgação quanto medo ao pensar no nosso casamento iminente. Agora que [prison_holder.GetTitledFirstName|l] causou a morte de minha pretendida, [dead_character.Custom('ES_LoLa')] me faz falta, embora eu nunca realmente tenha conhecido[dead_character.Custom('ES_LoLa')]. Quem sabe o que poderíamos ter tido juntos?"
 death_management.2008.a.tt: "[dead_character.GetTitledFirstName], com quem você estava noivo, morreu nas masmorras de [prison_holder.GetTitledFirstName|l], o que anula o acordo matrimonial."
 death_management.2008.a: "Descanse em paz, [dead_character.GetFirstNameNoTooltip]."
 death_management.2008.b: "Pulamos direto para o #EMP Até que a morte nos separe#!"
 death_management.3000.t: "Até Que a Morte Nos Separe"
 death_management.3000.like: "Oh, [dead_character.GetFirstName] meu [dead_character.Custom('LoverPetName')]. Pensar que você morreria em minhas masmorras… Me pergunto se ele acreditaria em mim se eu lhe dissesse que ainda [dead_character.Custom('ES_LoLa')] amo, até agora."
 death_management.3000.neutral: "Meu querid[dead_character.Custom('ES_OA')] [dead_character.GetFirstName]. Talvez eu não tenha te amado, e talvez eu tenha sido a causa da sua morte, mas sinto a sua partida mais profundamente do que jamais pensei ser possível. Você sempre esteve aí, meu companheir[dead_character.Custom('ES_OA')] constante. Pensar que meu calabouço seria a sua morte..."
 death_management.3000.dislike: "Recentemente falecid[dead_character.Custom('ES_OA')] [dead_character.GetWifeHusband], o alívio me invadiu quando você deu seu último suspiro em minhas masmorras. Talvez eu devesse me envergonhar, mas, na verdade, não havia amor perdido entre nós"
 death_management.3000.a: "Que descanse em paz."
 death_management.3000.b: "Quem poderia ter adivinhado?"
 death_management.3000.c: "Boa viagem!"
 death_management.3000.tt: "Seu cônjuge, [dead_character.GetTitledFirstName|l], morreu em suas masmorras."
 death_management.3007.t: "Um Giro do Destino"
 death_management.3007.start: "Hoje, com a partida d [dead_character.GetTitledFirstName|l] em minhas masmorras, o futuro do [ROOT.Char.GetPrimaryTitle.GetNameNoTier] mudou seu curso. Nunca saberemos que tipo de"
 death_management.3007.mytitle: "[ROOT.Char.GetTitleTierName]"
 death_management.3007.ruler: "governante"
 death_management.3007.end: "teria se tornado, ou se sua morte é uma bênção ou uma maldição para este país.\n\nO que sei é que o que está feito está feito, e que a história de [dead_character.GetFirstName] chegou ao fim."
 death_management.3007.a: "Um conto se encerra e outro começa."
 death_management.3007.a.tt: "Seu herdeir[dead_character.Custom('ES_OA')], [dead_character.GetTitledFirstName|l] morreu em suas masmorras.\nAgora será seu novo herdeiro [new_heir.GetTitledFirstName|l]."
 death_management.3001.t: "Sobrevivendo a um Filho"
 death_management.3001.tt: "Seu [dead_character.Custom('GetDaughterSon')] de [dead_character.GetTitledFirstName|l] morreu em suas masmorras."
 death_management.3001.child: "Coloquei tantas esperanças em você, meu filh[dead_character.Custom('ES_OA')] meu[dead_character.Custom('ES_OA')]. Tudo o que você poderia ter aprendido, vivido e feito. Havia tantas possibilidades. Talvez um dia você tivesse seus próprios filhos. Mas agora, nada disso jamais acontecerá, tudo por causa das minhas ações…"
 death_management.3001.like: "Oh, [ROOT.Char.GetFaith.HighGodName], como você pôde permitir que falecesse [dead_character.GetFirstName]?\n\nRezo para que [dead_character.GetSheHe] encontre paz na vida após a morte, e que [ROOT.Char.GetFaith.HighGodName] perdoe meus crimes."
 death_management.3001.neutral: "Eu achava que era velho demais para ser surpreendido pelas crueldades deste mundo, mas nunca previ a dor que sentiria ao experimentar a morte do meu própri[dead_character.Custom('ES_OA')] [dead_character.Custom('GetDaughterSon')]. Minha única esperança é que Minha única esperança é que [dead_character.GetSheHe] já esteja livre do sofrimento que agora devo suportar…"
 death_management.3001.dislike: "Não é dever de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom('MotherFather')] amar os filhos? Ainda assim, não consigo chorar a morte de[dead_character.GetFirstName] por minhas próprias mãos."
 death_management.3001.a: "Não merecia isso."
 death_management.3001.c: "É tarde demais para arrependimentos."
 death_management.3001.d: "Descanse em paz, pobre [dead_character.GetFirstNameNoTooltip]."
 death_management.3002.t: "O Longo Repouso"
 death_management.3002.child: "[dead_character.Custom('MotherFather')|U]? Por que você se foi? Disseram que você não pôde evitar, que eu fui a razão pela qual você teve que partir. Mas isso não faz sentido. Certo, [dead_character.Custom('MotherFather')]?"
 death_management.3002.like: "Ah, [dead_character.Custom('MotherFather')]. Eu posso até ter crescido, mas sempre fui seu filho[ROOT.Char.Custom('ES_OA')]. O que vou fazer agora, quando fui eu quem causou sua morte? Quem vai me amparar agora que as lágrimas me cegam?"
 death_management.3002.neutral: "Pode ser que não fôssemos muito próximos, e que eu tenha causado sua morte, [dead_character.GetFirstName], mas você sempre será meu [dead_character.Custom('MotherFather')].\n\nAo partir deste mundo, mil perguntas me consumiram a mente. Será que te dei como cert[dead_character.Custom('ES_OA')]? Foi sua morte um erro que eu deveria ter evitado? [dead_character.Custom('MotherFather')|U]... Você realmente me amou?"
 death_management.3002.dislike: "Pode até ser que seu sangue corra em minhas veias, mas você nunca foi um[dead_character.Custom('ES_XA')] [dead_character.Custom('MotherFather')] de fato para mim. Não sinto nada além de alívio por sua morte, nem mesmo culpa por tê-la causado. Finalmente, sua sombra deixa de pairar sobre meu ombro."
 death_management.3002.a: "Eu sempre vou te amar, [dead_character.Custom('MotherFather')]."
 death_management.3002.b: "Acho que nunca saberei..."
 death_management.3002.c: "Que bom que se foi!"
 death_management.3002.d: "Eu... Eu quero meu [dead_character.Custom('MotherFather')]!"
 death_management.3002.tt: "Seu [dead_character.Custom('MotherFather')], [dead_character.GetTitledFirstName|l], morreu em seu calabouço."
 death_management.3006.t: "Sobrevivendo ao Meu Rival"
 death_management.3006.desc: "Quando o carcereiro me trouxe a boa nova, mal pude acreditar! Meu rival, [dead_character.Custom('ES_ElLa')] [dead_character.GetTitledFirstName|l], finalmente pereceu em minha masmorra.\n\nPensar que viverei em um mundo livre desse [dead_character.Custom2('InsultNoun', ROOT.Char)] e que fui eu quem causou isso. Estou tão feliz que poderia dançar!"
 death_management.3006.a: "Vou dançar sobre sua cova rasa!"
 death_management.3006.a.tt: "Seu [rival|lE] , [dead_character.GetFirstNameNoTooltip] morreu!"
 death_management.3008.t: "Tudo o Que Poderia Ter Sido"
 death_management.3008.desc.like: "Eu tinha começado a imaginar o futuro de [dead_character.GetTitledFirstName|l] e o meu… tudo o que conquistaríamos juntos e a família que construiríamos. Todos esses sonhos desabaram por causa das minhas ações, ao deixar que meu prometid[dead_character.Custom('ES_OA')] morresse em minhas masmorras."
 death_management.3008.desc.dislike: "Quando me contaram a morte do meu prometid[dead_character.Custom('ES_OA')] [dead_character.GetTitledFirstName|l] em minhas masmorras, não posso negar que senti alívio. Fico feliz por não ter mais que me casar com [dead_character.Custom('ES_ElElla')]!"
 death_management.3008.desc.neutral: "Desde que meu noivado com [dead_character.GetTitledFirstName|l], experimentei tanto entusiasmo quanto medo diante da ideia do nosso casamento iminente. Agora que minha pretendente morreu em minhas masmorras, [dead_character.Custom('ES_LoLa')] sinto sua falta, embora eu nunca a tenha realmente conhecido[dead_character.Custom('ES_LoLa')]. Quem sabe o que poderíamos ter vivido juntos?"
 death_management.3008.a.tt: "[dead_character.GetTitledFirstName], com quem você estava noivo(a), morreu em suas masmorras, e o acordo matrimonial está anulado."
 death_management.3008.a: "Descanse em paz, [dead_character.GetFirstNameNoTooltip]."
 death_management.3008.b: "Pulamos direto para #EMP Até que a morte nos separe#!."
 death_management.prisoner.desc: "Meu prisioneiro, [dead_character.GetTitledFirstName|l], morreu em minhas masmorras."
 death_management.4000.t: "Até Que a Morte Nos Separe"
 death_management.4000.like_opening: "Como um coração pode suportar esse tipo de dor sem se partir? Não pode ser possível! No entanto, aqui estou eu, meu coração batendo enquanto o seu se silencia.\n\n"
 death_management.4000.like_my_prison: "Oh, [dead_character.GetFirstName], meu [dead_character.Custom('LoverPetName')]. Você acreditaria em mim se eu dissesse que ainda guardo carinho por você? Mesmo depois de tudo que fiz?"
 death_management.4000.like: "Oh, [dead_character.GetFirstName] meu [dead_character.Custom('LoverPetName')]. Não consigo tirar da cabeça a imagem de você se definhando, aprisionad[dead_character.Custom('ES_OA')] por [house_arrest_holder.GetTitledFirstName|l]."
 death_management.4000.neutral_opening: "Meu querid[dead_character.Custom('ES_OA')] [dead_character.GetFirstName]. Talvez eu não tenha amado você, mas sinto sua partida com muito mais dor do que jamais pensei ser possível\n\n"
 death_management.4000.neutral_my_prison: "Espero que você possa perdoar meus pecados. Tanto o que fiz a você quanto todas as coisas que deixei não ditas."
 death_management.4000.neutral: "Sempre você esteve aí, meu companheir[dead_character.Custom('ES_OA')] constante. Pensar que você morreria prisioneir[dead_character.Custom('ES_OA')] de [house_arrest_holder.GetTitledFirstName|l]… Há tantas coisas que eu não cheguei a dizer!"
 death_management.4000.dislike_my_prison: "[dead_character.GetWifeHusband|U], quando você deu seu último suspiro sendo meu prisioneir[dead_character.Custom('ES_OA')], o alívio me invadiu. Talvez eu devesse me envergonhar, mas, na verdade, não houve amor entre nós. Finalmente, estou livre para começar minha vida de novo!"
 death_management.4000.dislike: "[dead_character.GetWifeHusband|U], quando você exala o último suspiro como prisioneir[dead_character.Custom('ES_OA')] de [house_arrest_holder.GetTitledFirstName|l], o alívio me invade. Talvez eu devesse sentir vergonha, mas, na verdade, não houve amor perdido entre nós. Finalmente, estou livre para recomeçar minha vida!"
 death_management.4000.a: "Pelo menos as memórias permanecem."
 death_management.4000.b: "Espero que você encontre paz, [dead_character.GetFirstNameNoTooltip]."
 death_management.4000.c: "Não poderia ser em dia melhor!"
 death_management.4000.tt: "Seu cônjuge, [dead_character.GetTitledFirstName|l], morreu em prisão domiciliar."
 death_management.4007.t: "Um Giro do Destino"
 death_management.4007.start_my_prison: "Hoje, com o falecimento do meu prisioneir[dead_character.Custom('ES_OA')] [dead_character.GetTitledFirstName], o futuro de [ROOT.Char.GetPrimaryTitle.GetNameNoTier] mudou seu curso. Nunca saberemos que tipo de"
 death_management.4007.start: "Hoje, com o falecimento de [dead_character.GetTitledFirstName|l] como prisioneir[dead_character.Custom('ES_OA')] de [house_arrest_holder.GetTitledFirstName|l], o futuro de [ROOT.Char.GetPrimaryTitle.GetNameNoTier] mudou de curso. Jamais saberemos que tipo de"
 death_management.4007.mytitle: "[ROOT.Char.GetTitleTierName]"
 death_management.4007.ruler: "soberano"
 death_management.4007.end_adventurer: "teria sido, ou se sua morte é uma bênção ou uma maldição para seus seguidores."
 death_management.4007.end: "teria sido, ou se sua morte é uma bênção ou uma maldição para o país."
 death_management.4007.end.heir: "\n\nMinha única esperança é que meu nov[new_heir.Custom('ES_OA')] herdeir[new_heir.Custom('ES_OA')] [new_heir.GetTitledFirstName|l] esteja à altura da tarefa."
 death_management.4007.a: "Um conto chega ao fim, e outro começa."
 death_management.4007.b: "Espero que minhas ações tenham sido as corretas."
 death_management.4007.a.tt: "Seu herdeiro, [dead_character.GetTitledFirstName|l], morreu em prisão domiciliar."
 death_management.4007.a.tt.heir: "Agora te sucederá [new_heir.GetTitledFirstName|l]."
 death_management.4001.t: "Sobreviver a um filho"
 death_management.4001.tt: "Seu [dead_character.Custom('GetDaughterSon')]; [dead_character.GetTitledFirstName|l] morreu em prisão domiciliar."
 death_management.4001.child_my_prison: "Ah, meu doce [dead_character.GetTitledFirstName|l]! Espero que tenha tomado a decisão certa, ao obrigar você a passar os últimos dias de sua vida encarcerad[dead_character.Custom('ES_OA')].\n\nTudo aquilo que você nunca aprenderá, experienciará ou fará…"
 death_management.4001.child: "Oh, meu doce [dead_character.GetTitledFirstName|l]! Com toda a sua inocência e juventude, por que você teve que passar os seus últimos dias na prisão de [house_arrest_holder.GetTitledFirstName]?\n\nO mundo é cruel, sem dúvida… mas, pelo menos, agora eu sei que você nunca experimentará os piores horrores dele."
 death_management.4001.like: "Oh, [ROOT.Char.GetFaith.HighGodName], como pudeste permitir que minha querid[dead_character.Custom('ES_OA')] [dead_character.Custom('GetDaughterSon')] [dead_character.GetFirstName] morresse na prisão de [house_arrest_holder.GetTitledFirstName]? Meu [dead_character.Custom('GetDaughterSon')] perfeit[dead_character.Custom('ES_OA')] não tinha culpa alguma!\n\nRezo para que [dead_character.GetFirstName] encontre paz e liberdade na outra vida."
 death_management.4001.like_my_prison: "Oh, [ROOT.Char.GetFaith.HighGodName], como pudeste permitir que minha querid[dead_character.Custom('ES_OA')] [dead_character.Custom('GetDaughterSon')] [dead_character.GetFirstName] partisse? Rezo para que [dead_character.GetSheHe] encontre tanto a paz quanto a força para me perdoar na outra vida."
 death_management.4001.neutral_opening: "Eu achava que já era velho demais para me surpreender com as crueldades deste mundo, mas nunca previ ter de experimentar a morte do meu própri[dead_character.Custom('ES_OA')] [dead_character.Custom('GetDaughterSon')].\n\n"
 death_management.4001.neutral_my_prison: "Mesmo que [dead_character.GetSheHe] tivesse de passar seus últimos momentos nesta terra como meu prisioneir[dead_character.Custom('ES_OA')], espero que agora possa encontrar a paz."
 death_management.4001.neutral: "Me dói que [dead_character.GetSheHe] tivesse que passar seus últimos momentos nesta terra como prisioneir[dead_character.Custom('ES_OA')] de [house_arrest_holder.GetTitledFirstName], mas espero que agora possa encontrar a paz."
 death_management.4001.dislike_opening: "Não é dever de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom('MotherFather')] amar os seus filhos?"
 death_management.4001.dislike_my_prison: "Mas não consigo chorar pela morte de [dead_character.GetFirstName] quando eu mesm[ROOT.Char.Custom('ES_OA')] [dead_character.Custom('ES_LoLa')] tinha aprisionad[dead_character.Custom('ES_OA')]."
 death_management.4001.dislike: "Ainda assim, não consigo chorar pela morte de [dead_character.GetFirstName], encarcerad[dead_character.Custom('ES_OA')] por [house_arrest_holder.GetTitledFirstName|l]."
 death_management.4001.dislike_end: "\n\nEm algum lugar do caminho, devo ter cometido um erro, algo que obrigou meu [dead_character.Custom('GetDaughterSon')] a seguir por um caminho que eu nunca poderia aprovar. Embora eu possa ser o culpado por aquilo em que se tornou, isso agora pertence ao passado. Finalmente."
 death_management.4001.a: "Não merecia isso."
 death_management.4001.c: "É tarde demais para arrependimentos."
 death_management.4001.d: "Descanse em paz, pequeno [dead_character.GetFirstNameNoTooltip]."
 death_management.4002.t: "O Descanso Eterno"
 death_management.4002.child: "[dead_character.Custom('MotherFather')|U]? Por que você foi embora? Eles me disseram que você não pôde evitar, e que eu não devo chorar porque agora você está em um lugar melhor que a prisão de [house_arrest_holder.GetTitledFirstName|l]. Mas por que não posso ir com você, [dead_character.Custom('MotherFather')]? Você não me ama mais? Você disse que sempre me amaria…"
 death_management.4002.like_opening: "Ah, [dead_character.Custom('MotherFather')]. Posso ter crescido, mas sempre fui seu filho.[ROOT.Char.Custom('ES_OA')]."
 death_management.4002.like_my_prison: "O que farei agora, quando você morreu sendo meu prisioneir[dead_character.Custom('ES_OA')]? Quem me amparará agora que as lágrimas me turvam os olhos? Você algum dia vai me perdoar?"
 death_management.4002.like: "O que farei agora que você morreu como prisioneir[dead_character.Custom('ES_OA')] de [house_arrest_holder.GetTitledFirstName]? Quem me amparará agora que as lágrimas me embaçam os olhos?"
 death_management.4002.neutral_opening: "Talvez não tenhamos sido muito próximos, [dead_character.GetFirstName] mas você sempre será meu [dead_character.Custom('MotherFather')]."
 death_management.4002.neutral_my_prison: "E pensar que você morreria sendo meu prisioneir[dead_character.Custom('ES_OA')], deixando-me com tantas perguntas... Eu dei sua presença por garantida? Você se orgulhava[dead_character.Custom('ES_OA')] de mim? [dead_character.Custom('MotherFather')|U]... Você realmente me amou?"
 death_management.4002.neutral: "E pensar que você morreria sendo prisioneir[dead_character.Custom('ES_OA')] de [house_arrest_holder.GetTitledFirstName], deixando-me com tantas perguntas... Será que eu tomei sua presença como certa? Você tinha orgulho[dead_character.Custom('ES_OA')] de mim? [dead_character.Custom('MotherFather')|U]... Você realmente me amou?"
 death_management.4002.dislike_opening: "Pode ser que seu sangue corra em minhas veias, mas você nunca foi um[dead_character.Custom('ES_XA')] [dead_character.Custom('MotherFather')] de verdade para mim."
 death_management.4002.dislike_my_prison: "Não sinto nada além de alívio por você ter morrido como meu prisioneir[dead_character.Custom('ES_OA')]. Por fim, sua sombra deixa de pairar sobre meu ombro."
 death_management.4002.dislike: "Não senti nada, a não ser alívio, quando você morreu como prisioneir[dead_character.Custom('ES_OA')] de [house_arrest_holder.GetTitledFirstName]. Finalmente, sua sombra deixou de pairar sobre meu ombro."
 death_management.4002.a: "Eu sempre irei te amar, [dead_character.Custom('MotherFather')]."
 death_management.4002.b: "Acho que nunca saberei..."
 death_management.4002.c: "Descanse em paz, [dead_character.Custom('MotherFather')]."
 death_management.4002.d: "Eu quero meu [dead_character.Custom('MotherFather')]!"
 death_management.4002.tt: "Seu [dead_character.Custom('MotherFather')], [dead_character.GetTitledFirstName|l] morreu em prisão domiciliar."
 death_management.4008.t: "Tudo Que Poderia Ter Sido"
 death_management.4008.desc.like_my_prison: "Apesar das minhas ações, nunca odiei [dead_character.GetTitledFirstName|l]. E, de vez em quando, até imaginava nosso futuro juntos… Tudo o que conquistaríamos e a família que criaríamos. Tantos sonhos desmoronaram quando me contaram que minha prometid[dead_character.Custom('ES_OA')] havia morrido sendo meu prisioneir[dead_character.Custom('ES_OA')]. Isto não era o que deveria acontecer!"
 death_management.4008.desc.like: "Quando me contaram a morte do meu prometid[dead_character.Custom('ES_OA')] [dead_character.GetTitledFirstName|l] como prisioneir[dead_character.Custom('ES_OA')] de [house_arrest_holder.GetTitledFirstName|l], todos os meus sonhos de uma vida com [dead_character.GetTitledFirstName|l] se despedaçaram. Agora nada do que eu tinha imaginado vai acontecer. Nossas esperanças, sonhos e a família que teríamos construído… Tudo se foi."
 death_management.4008.desc.dislike: "Quando me contaram a morte do meu prometid[dead_character.Custom('ES_OA')] [dead_character.GetTitledFirstName|l] como prisioneir[dead_character.Custom('ES_OA')] de [house_arrest_holder.GetTitledFirstName|l], não posso negar que senti alívio. É claro que não me agrada que ele tenha morrido, mas estou feliz por não ter mais de me casar com [dead_character.Custom('ES_ElElla')]. Teria sido infeliz[ROOT.Char.Custom('ES_OA')] e 'até que a morte nos separe' é muito tempo…"
 death_management.4008.desc.dislike_my_prison: "Quando me contaram que meu noiv[dead_character.Custom('ES_OA')] [dead_character.GetTitledFirstName] havia morrido sendo meu prisioneir[dead_character.Custom('ES_OA')], não posso negar que senti alívio. Claro, não me alegra que [dead_character.GetSheHe] tenha morrido, mas sim não ter mais que me casar com [dead_character.Custom('ES_ElElla')]. Teria sido infeliz[ROOT.Char.Custom('ES_OA')] e \"até que a morte nos separe\" parecia um conceito tão distante..."
 death_management.4008.desc.neutral_my_prison: "Desde que meu noivado com [dead_character.GetTitledFirstName|l], experimentei tanto empolgação quanto medo diante da ideia do nosso casamento iminente. Agora que [dead_character.GetSheHe] faleceu sendo meu prisioneir[dead_character.Custom('ES_OA')] [dead_character.Custom('ES_LoLa')] sinto falta de [dead_character.Custom('ES_LoLa')]. Quem sabe o que teríamos tido juntos?"
 death_management.4008.desc.neutral: "Desde que meu noivado com [dead_character.GetTitledFirstName|l], experimentei tanto entusiasmo quanto medo ao pensar em nosso casamento iminente. Agora que [dead_character.GetSheHe] faleceu como prisioneir[dead_character.Custom('ES_OA')] de [house_arrest_holder.GetTitledFirstName|l], [dead_character.Custom('ES_LoLa')] sinto sua falta, embora eu nunca tenha realmente conhecido[dead_character.Custom('ES_LoLa')]? Quem sabe o que teríamos tido juntos?"
 death_management.4008.a.tt: "[dead_character.GetTitledFirstName], com quem você havia noivado, morreu em prisão domiciliar e o acordo de casamento é anulado."
 death_management.4008.a: "Descanse em paz, [dead_character.GetFirstNameNoTooltip]."
 death_management.4008.b: "Pulamos direto para o #EMP Até que a morte nos separe#!"
 death_management.9998.t: "Conheça a Ti Mesmo: Próximo ao Fim"
 death_management.9998.desc: "Sinto isso nos meus ossos. [ROOT.Char.GetFaith.DeathDeityName] virá me buscar em breve. Como uma velha amizade, [ROOT.Char.GetFaith.DeathDeitySheHe] espera pacientemente para me receber."
 death_management.9998.a: "Estarei morto dentro de um ano."
 death_management.9998.a.tt: "Você deveria organizar seus assuntos."
 #### Battle Death Events ####
 #Intro 1
 death_management.intro.witnessed: "Tento me orientar em meio ao caos que envolve o/a [battle_death_location.GetTerrain.GetNameNoTooltip|l] de [battle_death_location.GetNameNoTooltip]."
 death_management.intro.war: "Notícias do [battle_death_location.GetTerrain.GetNameNoTooltip|l] de [battle_death_location.GetNameNoTooltip] finalmente chegam às mãos de um mensageiro exausto."
 death_management.intro: "O conflito entre o [battle_death_enemy.GetPrimaryTitle.GetNameNoTierNoTooltip] e o [battle_death_leader.GetPrimaryTitle.GetNameNoTierNoTooltip] pouco me interessava, até que o resumo do meu conselho sobre a batalha de [battle_death_location.GetNameNoTooltip] apareceu."
 #Intro 2
 death_management.intro.enemy: "À minha frente, [dead_character.GetFirstName] avança corajosamente em direção ao inimigo.\n\n"
 death_management.intro.friendly: "Do outro lado do campo, vejo [dead_character.GetFirstName] lutando desesperadamente.\n\n"
 death_management.intro.letter.lover: "Meu estômago se revira de medo por meu amado, enquanto pego o pergaminho.\n\n$death_management.intro.letter$"
 death_management.intro.letter.spouse: "Eu agarro o papel em busca de notícias sobre meu [dead_character.GetWifeHusband].\n\n$death_management.intro.letter$"
 death_management.intro.letter.family: "Eu sei imediatamente que algo terrível aconteceu com meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('dead_character'))].\n\n$death_management.intro.letter$"
 death_management.intro.letter.friend: "Não consigo deixar de me preocupar com o destino do meu amigo mais próximo.\n\n$death_management.intro.letter$"
 death_management.intro.letter.rival: "De alguma forma, eu já sei, mesmo antes de abrir, que ele contém boas notícias.\n\n$death_management.intro.letter$"
 death_management.intro.letter.heir: "Respiro fundo; tanto repousa no destino do meu herdeiro.\n\n$death_management.intro.letter$"
 death_management.intro.letter: "Lá, entre os despachos, está escrito:\n"
 #Death flavor
 death_management.death.witnessed.enemy: "Noss[battle_death_leader.Custom('ES_OA')]s [battle_death_leader.Custom('GetRandomEmployedMAA')] hostigam [dead_character.GetHerHim] sem descanso, e está claro que [dead_character.GetSheHe] está quase exaurid[dead_character.Custom('ES_OA')], enquanto outros soldados caem como moscas ao redor de [dead_character.GetHerHim]."
 death_management.death.witnessed.friendly: "[battle_death_enemy.Custom('GetRandomEmployedMAA')] [battle_death_enemy.GetPrimaryTitle.GetAdjectiveNoTooltip]s estão cercando [dead_character.GetHerHim] lentamente, e o cansaço [dead_character.GetHerHis] é evidente demais."
 death_management.death.war.enemy: "\"#EMP Confirmamos que [dead_character.GetTitledFirstName|l] morreu resistindo com tenacidade aos [battle_death_leader.Custom('GetRandomEmployedMAA')] de [battle_death_leader.GetPrimaryTitle.GetNameNoTooltip]."
 death_management.death.war.friendly: "\"#EMP Noss[dead_character.Custom('ES_OA')] valente [dead_character.GetTitledFirstName|l] morreu ao liderar um ataque contra o contingente [battle_death_enemy.GetPrimaryTitle.GetAdjectiveNoTooltip] de [battle_death_enemy.Custom('GetRandomEmployedMAA')]."
 death_management.death.uninvolved: "\"#EMP Confirmamos que [dead_character.GetTitledFirstName|l] morreu resistindo tenazmente aos [battle_death_leader.Custom('GetRandomEmployedMAA')] de [battle_death_leader.GetPrimaryTitle.GetNameNoTooltip]."
 #Killer
 death_management.killer.witnessed.enemy: "Em meros instantes, [battle_death_killer.GetTitledFirstName|l], [battle_death_killer.GetLiege.Custom2('RelationToMe', SCOPE.sC('battle_death_killer'))] de [battle_death_killer.GetLiege.GetTitledFirstName|l], avança resolutamente, empunhando [battle_death_killer.Custom('signature_weapon')] no alto, supera facilmente as últimas forças de [dead_character.GetFirstNameNoTooltip] e desfere o golpe de misericórdia."
 death_management.killer.witnessed.friendly: "O brilho de [battle_death_killer.Custom('signature_weapon')] chama minha atenção de repente e vejo como [battle_death_killer.GetTitledFirstName|l] , [battle_death_killer.GetLiege.Custom2('RelationToMe', SCOPE.sC('battle_death_killer'))] de [battle_death_killer.GetLiege.GetTitledFirstName|l], desfere o golpe fatal."
 death_management.killer: "[dead_character.GetSheHe|U] foi morto(a) por [battle_death_killer.GetTitledFirstName|l], [battle_death_killer.GetLiege.Custom2('RelationToMe', SCOPE.sC('battle_death_killer'))] de [battle_death_killer.GetLiege.GetTitledFirstName|l], em um confronto feroz\".#!"
 death_management.no_killer: "[dead_character.GetSheHe|U] recebeu uma flecha perdida durante uma escaramuça feroz\".#!"
 #Spouse
 death_management.1200.t: "Cônjuge Caído"
 death_management.1200.desc_sad: "\n\nNão deveria tê-lo(a) deixado ir... não assim..."
 death_management.1200.desc_happy: "\n\nFinalmente, essa espécie de [dead_character.Custom2('InsultNoun', ROOT.Char)] morreu!"
 death_management.1200.a: "[battle_death_killer.GetFirstNameNoTooltip] é [battle_death_killer.GetWomanMan] mort[battle_death_killer.Custom('ES_OA')]! Mort[battle_death_killer.Custom('ES_OA')]!"
 death_management.1200.b: "Nunca vou esquecer de você..."
 death_management.1200.c: "Você provou sua valentia, meu amor..."
 death_management.1200.d: "Finalmente, estou livre!"
 #Child
 death_management.1201.t: "[dead_character.Custom('GetDaughterSon')|U] caíd[dead_character.Custom('ES_OA')]"
 death_management.1201.desc: "\n\nNão pude salvar[dead_character.GetHerHim], mas nenhum pai ou mãe deveria sobreviver a seu [dead_character.Custom('GetDaughterSon')]…"
 death_management.1201.a: "[battle_death_killer.GetFirstNameNoTooltip] não sairá impune!"
 death_management.1201.b: "#EMP Mi valiente [dead_character.Custom('GetDaughterSon')]…#!"
 death_management.1201.c: "Não era sua hora, minh[dead_character.Custom('ES_OA')] [dead_character.Custom('GetDaughterSon')]..."
 death_management.1201.d: "Descanse em paz, [dead_character.Custom('GirlBoy')]."
 #Parent
 death_management.1202.t: "Padre caído"
 death_management.1202.desc: "\n\nÉ tarde demais para mudar as coisas, só espero que ele encontre a paz em [dead_character.GetFaith.PositiveAfterLife]."
 death_management.1202.a: "#EMP Por que você, [dead_character.Custom('GetMamaPapa')]?#!"
 death_management.1202.b: "[battle_death_killer.GetFirstNameNoTooltip] pagará por isso."
 #Lover
 death_management.1204.t: "Amante caído"
 death_management.1204.desc: "\n\nMeu coração se transforma em gelo, pois percebo que nunca mais sentirei o calor do abraço do meu amado..."
 death_management.1204.a: "#EMP Mi valiente [dead_character.GetFirstNameNoTooltip]#!…"
 death_management.1204.b: "… eu te vingarei!"
 #Best Friend
 death_management.1205.t: "Amistad caída"
 death_management.1205.desc: "\n\nNunca mais desfrutarei da preciosa companhia de sua pessoa querida…"
 death_management.1205.a: "Não, [dead_character.GetFirstNameNoTooltip]!"
 death_management.1205.b: "[battle_death_killer.GetFirstNameNoTooltip] pagará por isso!"
 #Rival
 death_management.1206.t: "Rival caído"
 death_management.1206.desc: "\n\nNão consigo deixar de sorrir ao pensar que [dead_character.GetFirstNameNoTooltip] morreu lutando #EMP mis#! guerras, isso me levantará o ânimo por dias!"
 death_management.1206.a: "Belo livramento."
 death_management.1206.b: "[dead_character.GetFirstNameNoTooltip] era para ser meu[dead_character.Custom('ES_OA')]!"
 death_management.1206.c: "Meu #EMP [battle_death_killer.Custom('ES_HeroeHeroina')]!#! enviarei a [battle_death_killer.GetFirstNameNoTooltip] uma [ROOT.Char.GetCurrentLocation.Custom('get_region_flower_type')]!"
 #Heir
 death_management.1207.t: "Heredero caído"
 death_management.1207.desc: "\n\nA sucessão do [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] deve ser reavaliada..."
 death_management.1207.a: "Você não estava pront[dead_character.Custom('ES_OA')]…"
 death_management.1207.b: "… mas também não está [battle_death_killer.GetFirstNameNoTooltip]!"
 death_battle_new_rivalry_title: "[avenger.GetTitledFirstNameNoTooltip|l] busca vingança"
 #Family Feud
 death_management.3006.b: "Que pena, eu esperava que durasse mais."
 death_management.3006.c: "$death_management.1006.e$"
 death_management.3006.d: "$death_management.1006.f$"
 death_management.1006.d: "Um[dead_character.Custom('ES_XA')] [dead_character.GetHouse.GetBaseNameNoTooltip] a menos para me preocupar!"
 death_management.1006.e: "Finalmente, acho que posso deixar isso para trás."
 death_management.1006.f: "Nunca desafie a Casa [ROOT.Char.GetHouse.GetBaseNameNoTooltip]."
