l_spanish:
 #Reclaiming Britannia, by Linnéa Thimrén
 british_isles.0001.t: "[reclaimer.GetCulture.GetNameNoTooltip] Britannia"
 british_isles.0001.desc: "Tempo demais esta nossa grande ilha esteve sob domínio estrangeiro, mas enfim ela volta a estar nas mãos celtas! Olho para os campos e é como se o sol brilhasse pela primeira vez em anos; como se a terra da abundância e da saúde, Tír na nÓg, tivesse voltado para nos dar as boas-vindas. As colinas e os vales de nossos antepassados voltam a ser abraçados por nossa cultura."
 british_isles.0001.custom: "Todos os [counties|lE] em Britannia"
 british_isles.0001.a: "Louvados sejam os ancestrais!"
 british_isles.0002.desc: "O [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('reclaimer'))] [reclaimer.GetName] anunciou oficialmente o renascimento de uma Britannia Celta.\n\nApós séculos de domínio estrangeiro, as Ilhas voltaram ao controle de seus proprietários originais."
 british_isles.0002.a: "Um flagelo [reclaimer.GetCulture.GetNameNoTooltip] sobre as terras..."
 british_isles.0002.b: "Britannia é nossa mais uma vez!"
 #Restoring the Danelaw, by Linnéa Thimrén
 british_isles.1001.t: "As Leis Restauradas"
 british_isles.1001.desc: "O Danelaw renasce por meus esforços; este reino conhecerá novamente o domínio [restorer.GetCulture.GetName]!\n\nEstou seguindo os passos de lendas como Guðrum e Eric Bloodaxe, campeões do passado, e pelo [restorer.GetFaith.WarGodName], não permitirei que o reino caia nas mãos dos anglo-saxões novamente!"
 british_isles.1001.a: "Uma nova era desponta!"
 british_isles.1002.t: "O Danelaw"
 british_isles.1002.desc_same_culture: "O Danelaw renasce graças aos esforços de [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('restorer'))] [restorer.GetName]! Mais uma vez, a grande ilha está sob o domínio [restorer.GetCulture.GetName]."
 british_isles.1002.desc: "O [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('restorer'))] [restorer.GetName] e seus saqueadores vis criaram um novo reino nas Ilhas e o proclamaram como o renascimento do Reino do Danelaw.\n\nResta saber se esta tentativa de restaurar o domínio [restorer.GetCulture.GetName] sobre a Inglaterra será mais bem-sucedida do que a última..."
 british_isles.1002.a: "Um flagelo [restorer.GetCulture.GetNameNoTooltip] sobre a terra."
 british_isles.1002.b: "Uma vitória para os [restorer.GetCulture.GetNameNoTooltip]!"
 british_isles.1002.c: "Hm, [restorer.GetCulture.GetNameNoTooltip], você diz? Conte comigo!"
 #Embrace English Culture, by Linnéa Thimrén
 british_isles.2001.t: "Nada de [embracer_former_culture.GetNameNoTooltip]"
 british_isles.2001.desc: "Os tempos em que a nação [embracer.GetCulture.GetNameNoTooltip] considerava a França nosso lar já se foram há muito. Nossos filhos nascem aqui, cercados por saxões, e para eles, a Normandia será apenas uma linha embaçada além das brumosas costas da Britânia.\n\nE, à medida que adotamos algumas dos costumes locais como nossos, também o legado de nossa cultura se espalha por todas as terras saxãs, dando origem a uma nova identidade inglesa."
 british_isles.2001.a: "Viva a Inglaterra!"
 british_isles.2002.desc: "O [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('embracer'))] [embracer.GetName], seus vassalos e toda a sua família responderam ao chamado de Albion e abraçaram a cultura inglesa."
 british_isles.2002.a: "Era apenas questão de tempo."
 british_isles.2002.b: "Traidores!"
 #Request Laudabiliter, by Flavio Verna
 british_isles.3001.t: "Declarar Laudavelmente,"
 british_isles.3001.desc: "Vosso desejo de estender o domínio sagrado da Igreja universal às tribos bárbaras da Irlanda é uma causa piedosa e justa. Como tal, a Santa Igreja Romana ordena que tomem posse desta ilha e ali realizem a vontade de Deus. \n\nSe alguma desgraça lhes acontecer antes do fim desta santa campanha, estendemos este mandato sagrado aos seus legítimos sucessores. Que a casa de [scoped_ruler.GetHouse.GetNameNoTooltip] continue a levar adiante esta causa sagrada perpetuamente, até que a vontade divina tenha sido realizada e a Irlanda esteja unida sob o governo de [scoped_ruler.GetCulture.GetNameNoTooltip]."
 british_isles.3001.a: "Prepare nossa frota!"
 british_isles.3002.t: "A Reivindicação da Irlanda"
 british_isles.3002.desc.irish: "Pela graça de Sua Santidade [scoped_pope.GetFirstName], vigário[scoped_pope.Custom('ES_OA')] de Cristo e herdeiro[scoped_pope.Custom('ES_OA')] ao trono de São Pedro, [scoped_ruler.GetFullName] recebeu o direito divino de reinar sobre a Irlanda e todas as tribos que nela habitam.\n\nTodo senhor irlandês que desobedecer ao mandato papal e se recusar a se submeter enfrentará a ira de [scoped_ruler.GetTitledFirstName|l], seus exércitos [scoped_ruler.GetCulture.GetName] e de Deus Todo-Poderoso."
 british_isles.3002.a: "Veremos sobre isso!"
 british_isles.3002.b: "Entendo..."
 #Refound Dumnonia, by Ewan Cowhig Croft
 british_isles.4001.t: "[founder.GetPrimaryTitle.GetAdjectiveNoTooltip] Reino Restaurado"
 british_isles.4001.desc: "[founder.GetPrimaryTitle.GetNameNoTierNoTooltip] não aceita invasores, de nenhum tipo. Por séculos, lutamos contra eles, batalhando para reconquistar nosso lar. Com grande astúcia e habilidade, finalmente consegui retomar as terras da antiga Dumnonia, refundando o Reino do [founder.GetPrimaryTitle.GetNameNoTierNoTooltip].\n\nA ameaça estrangeira foi resistida, o desaparecimento da antiga Britannia superado, e agora estou pronto para enfrentar quaisquer desafios que [founder.GetFaith.DevilName] possa nos lançar. Venha o que vier, [founder.GetPrimaryTitle.GetNameNoTierNoTooltip] prevalecerá."
 british_isles.4001.a: "Sou como Corineus renascido!"
 british_isles.4001.b: "Meu reino é o único título que importa."
 british_isles.4002.desc: "Após séculos de luta, [founder.GetFullName] restaurou o antigo reino de Dumnonia, chamado do [founder.GetPrimaryTitle.GetNameNoTier] por seus habitantes, e repeliu os invasores estrangeiros de sua ilha.\n\nEmbora os outros senhores das Ilhas Britânicas não estejam dispostos a permitir que esse poder recém-surgido invada o que consideram suas terras ancestrais, o povo [founder.GetPrimaryTitle.GetAdjective] já enfrentou invasões piores do que qualquer coisa que esta era moderna possa reunir. Já se preparam para resistir à inevitável retaliação sombria..."
 british_isles.4002.a: "Onen hag oll!"
 british_isles.4002.b: "Vamos empurrá-los de volta até o Fim da Terra."
 british_isles.4002.c: "Pequenos reinos vêm e vão."
 british_isles.1011.t: "Um Acordo Impensável"
 british_isles.1011.nord: "$k_england$ é uma terra difícil, mas generosa: os invernos são amenos e os verões úmidos, um lugar perfeito para que colonos e guerreiros prosperem.\n\nNo entanto, a competição de outros nórdicos e a resistência dos estados autóctones remanescentes se tornam cada vez mais ferozes. Todos nós lutamos por um ponto de apoio, forjando nossos próprios pequenos feudos e reinos insignificantes, incapazes de alcançar uma verdadeira dominância."
 british_isles.1011.brit: "A cada ano, as depredações nórdicas pioram. Eles enviam mais colonos, saqueiam mais ao longo de nossas costas e massacraram mais nosso clero.\n\nApesar disso, é difícil se unir contra a ameaça estrangeira. Entre conquistadores nórdicos e o orgulho de todo senhor $anglo_saxon$, parece que nunca teremos um[ntd_actor.Custom('ES_XA')] [ntd_actor.Custom('QueenKing')] de $k_england$."
 british_isles.1011.outro: "\n\nMeu inimig[ntd_recipient.Custom('ES_OA')] [ntd_recipient.GetTitledFirstName|l] está entre os principais dos meus pretendentes ao governo da terra. Se concordasse com uma #EMP partición#! do país, em vez de disputar por ele, poucos poderiam contestar nossa força combinada…"
 british_isles.1011.a: "Hmm. Envie a carta."
 british_isles.1011.a.tt: ""
 british_isles.1011.b: "A carta, e uma mão aberta de amizade."
 british_isles.1011.b.above_applies.tt: "#BOL Todos os efeitos do acordo acima se aplicam.#!"
 british_isles.1011.b.offer_faith.tt: "Você também oferece compartilhar sua [faith|lE] e se tornar [friends|lE]"
 british_isles.1011.c: "A diplomacia é a saída dos covardes!"
 british_isles.1011.c.tt: ""
 british_isles.1021.t: "$british_isles.1011.t$"
 british_isles.1021.intro: "Pode ser que [ntd_actor.GetTitledFirstName|l] seja meu principal oponente pelo domínio de $k_england$.\n\nAssim, a última coisa que eu esperava receber hoje era uma carta de próprio punho, com seu selo, oferecendo dividir o reino comigo.\n\n"
 british_isles.1021.nord: "Meu/Minha inimig[ntd_actor.Custom('ES_OA')] me oferece reconhecimento e apoio para um autogoverno n?rdico e um reino pr?prio para mim, igual em status ao dele. As terras onde eu ou os meus governar?amos ficariam sob #EMP minha#! jurisdi??o."
 british_isles.1021.brit: "Meu inimig[ntd_actor.Custom('ES_OA')] me oferece reconhecimento como [ntd_recipient.Custom('QueenKing')] de $k_england$ se eu concordar em apoiar o autogoverno nórdico e a igualdade de status nos territórios onde já possui terras."
 british_isles.1021.outro: "\n\nDevo admitir que a ideia de uma coroa real sobre minha cabeça é... intrigante."
 british_isles.1021.a: "Uma coroa que ninguém pode negar, você diz?"
 british_isles.1021.a.accepted: "O Acordo é Aceito"
 british_isles.1021.a.accepted.tt: "Você e [ntd_recipient.GetTitledFirstNameNoTooltip|l] dividem o Reino entre vocês"
 british_isles.1021.b: "Puede… Tal vez #EMP sea#! hora de cambiar…"
 british_isles.1021.b.above_applies.tt: "$british_isles.1011.b.above_applies.tt$"
 british_isles.1021.b.accepted.critical: "O Acordo #EMP e#! a Amizade são Aceitos"
 british_isles.1021.b.accepted.critical.tt: "$british_isles.1021.a.accepted.tt$"
 british_isles.1021.c: "Que absurdo! Deixe todo o mundo ver a sua covardia."
 british_isles.1021.c.rejected: "O Acordo é Rejeitado"
 british_isles.1021.c.rejected.tt: "Todo o mundo sabe de sua perfídia"
 british_isles.1021.invalidation.t: "Seu Acordo foi Invalidado"
 british_isles.1021.invalidation.tt: "Pode ser proposto novamente por meio do painel \"$DECISIONS_VIEW_TITLE$\""
 negotiate_the_danelaw_each_way_effect.accepted: "Se o acordo for aceito"
 negotiate_the_danelaw_each-way_effect.rejected: "Se o acordo for rejeitado"
 negotiate_the_danelaw_accept_effect.partition_active.tt: "$k_england$ e $k_danelaw_article$$k_danelaw$ ficarão [Concept( 'de_jure_partitioned', 'particionados de iure' )|E]"
 negotiate_the_danelaw_accept_effect.de_jure_holdings_recognised.tt: "Todos os [duchies|lE] $k_england_adj$ que [ntd_nord.GetTitledFirstName|l] possui pelo menos um [county|lE] se tornam parte [de_jure|lE] do $k_danelaw_article$$k_danelaw$"
 negotiate_the_danelaw_accept_effect.independent_holdings_recognised.tt: "Todos os [duchies|lE] do âmbito $k_england_adj$ com um [ruler|lE] de [culture|lE] do grupo $north_germanic_group$ ou uma [faith|lE] $germanic_religion_adj$ tornam-se parte [de_jure|lE] de $k_danelaw$"
 negotiate_the_danelaw_accept_effect.riled_independents_list: "Todos os governantes independentes dentro da $k_england$"
 TRUCE_SIGNED_PARTITION: "\nPaz assinada como parte da partilha do reino"
 resolve_danelaw_partition_effect.adjust_de_jures.tt: "Todas as partes [de_jure|E] de $k_danelaw$ ficam [Concept( 'de_jure_drift_drifted', 'derivadas' )|E] dentro de $k_england$"
 resolve_danelaw_partition_effect.coa_changed.tt: "$k_england$ usará o Brasão de Armas do $k_danelaw$"
 resolve_danelaw_partition_effect.all_claimants: "Todos os Reivindicantes"
 formalise_the_daneland_effect.partition_status.tt: "$k_england$ e o $k_danelaw$ já não são mais considerados [Concept( 'de_jure_partitioned', 'particionados de iure' )|E]"
 formalise_the_daneland_effect.adjust_de_jures.tt: "Todas as partes [de_jure|E] do $k_danelaw$ ficam [Concept( 'de_jure_drift_drifted', 'derivadas' )|E] dentro de $k_daneland$"
 formalise_the_daneland_effect.all_claimants: "Todos os Reivindicantes"
 british_isles.1022.t: "$british_isles.1011.t$"
 british_isles.1022.desc: "Em uma tentativa de solidificar seu próprio poder pessoal, parece que [ntd_actor.GetTitledFirstName|l] e [ntd_recipient.GetTitledFirstName|l] assinaram um tratado diabólico, dividindo o reino de $k_england$ entre eles!\n\nDaqui para frente, áreas atualmente sob controle nórdico estarão sujeitas ao $k_danelaw$, enquanto os demais estados nativos são reconhecidos como território $k_england_adj$."
 british_isles.1022.a: "Que traição descarada aos seus compatriotas é esta?"
 british_isles.1022.a.tt: "$k_england$ e $k_danelaw_article$$k_danelaw$ ficarão [Concept( 'de_jure_partitioned', 'particionados de iure' )|E]"
 british_isles.1051.t: "Um [partition_winner.GetTierAsNameNoTooltip] Unificado"
 british_isles.1051.desc: "Por fim, ninguém pode contestar meu governo como #EMP verdader[victor.Custom('ES_OA')]#! [victor.GetTitleAsNameNoTooltip] de [england.GetNameNoTierNoTooltip]. Agora que cuidamos do estado pretendente, minha hegemonia definitiva sobre toda a Britânia está praticamente assegurada."
 british_isles.1051.a: "Um reino, um[victor.Custom('ES_XA')] [victor.GetTitleAsNameNoTooltip]!"
 british_isles.1051.a.tt: "A [de_jure_partition|lE] entre $k_england$ e $k_danelaw$ é encerrada"
 british_isles.1052.t: "$british_isles.1051.t$"
 british_isles.1052.desc: "[loser.GetFaith.FateGodName|U] me pregou uma peça cruel hoje ao conceder uma vitória decisiva a [victor.GetTitledFirstName|l] na batalha por $k_england$.\n\nEmbora eu já não possa mais reivindicar as terras que um dia tive, este assunto não ficará resolvido enquanto minha linhagem ainda respirar."
 british_isles.1052.a: "Um dia se #EMP saldarán#! contas por este insulto."
 british_isles.1052.a.tt: "$british_isles.1051.a.tt$"
 british_isles.1053.t: "$british_isles.1051.t$"
 british_isles.1053.desc: "Eventos recentes deixaram [victor.GetTitledFirstName|l] como o único[victor.Custom('ES_OA')] contendente séri[victor.Custom('ES_OA')] ao trono $k_england_adj$. Embora nem todos ainda se curvem de bom grado diante do monarca exultante, ao menos se pode dizer que $k_england$ está, em espírito, unida novamente."
 british_isles.1053.a: "Estabilidade para $k_england$ afinal?"
 british_isles.1053.a.tt: "$british_isles.1051.a.tt$"
 british_isles.1061.t: "Lei da Terra"
 british_isles.1061.desc: "Faz muitos anos que os escandinavos chegaram pela primeira vez a estas generosas terras. Muitos anos de derramamento de sangue, violência e choques de temperamento, mas também de troca, desenvolvimento e mistura.\n\nOs descendentes desses primeiros colonos já não são verdadeiramente nórdicos, nem os habitantes locais são os mesmos $anglo_saxon_collective_noun$ que eram quando os escandinavos chegaram pela primeira vez.\n\nQuem somos agora é, talvez, difícil de dizer.\n\nExceto que somos todos aqueles que vieram antes de nós, maus e bons, e que nossa história será $k_daneland_adj$ a partir de agora."
 british_isles.1061.a: "Vamos escrevê-la juntos."
 british_isles.1062.t: "$british_isles.1061.t$"
 british_isles.1062.desc: "Que canalha[founder.Custom('ES_OA')]! Que desgraçado! É[founder.Custom('ES_EA')] #EMP [founder.Custom2('InsultNoun', ROOT.Char)]#! [founder.Custom2('InsultAdjective', ROOT.Char)], [founder.Custom2('InsultAdjective', ROOT.Char)]!\n\nEmbora os reinos de $k_england$ e o $k_danelaw$ estivessem divididos há tempo demais, #EMP todos#! todos sabiam que um dia seriam reunidos.\n\nAté hoje.\n\nEm uma declaração grandiosa e pomposa, [founder.Custom('ES_ElLa')] [founder.GetTitledFirstName|l] renunciou formalmente a qualquer direito de controlar $k_england$ e, por tabela, tirou toda a esperança de reunir facilmente meu reino com as terras do $k_danelaw$!"
 british_isles.1062.a: "Sua terra já foi $k_england_adj$, e #EMP será#! $k_england_adj$ novamente."
 british_isles.1063.t: "$british_isles.1061.t$"
 british_isles.1063.desc: "Há anos que $k_england$ está dividida entre as terras de [england.GetTitledFirstName|l] e [founder.GetTitledFirstName|l]. Embora, em teoria, tenham o mesmo posto, entende-se tacitamente que cada um dos reinos deseja eliminar o outro e impor seu monarca como governante único de uma $k_england$ unida.\n\nMas não mais.\n\nDe forma dramática, [founder.GetTitledFirstNameNoTooltip|l] anunciou que abre mão de qualquer reivindicação de domínio sobre o restante do reino e que, daqui em diante, governará um reino independente e soberano."
 british_isles.1063.a: "Talvez isso acalme alguns ânimos..."
 british_isles.1063.a.tt: "$british_isles.1051.a.tt$"
