l_spanish:
 blackmail.0001.t: "Chantagem Recusada!"
 blackmail.0001.desc: "Seja por um senso equivocado de orgulho, ou por medo de alguma represália maior, [recipient.GetTitledFirstName|l] afirma que eu não tenho nenhuma influência sobre [recipient.Custom('ES_ElElla')]!"
 blackmail.0001.a: "Uma ameaça foi feita, e só pode haver um desfecho..."
 blackmail.0001.b: "Odeio admitir, mas não posso revelar esse segredo."
 blackmail.1001.t: "Medo do Desconhecido"
 blackmail.1001.desc: "Meus vassalos não sabem nada sobre a chantagem, mas perceberam como minha vítima, [blackmail_target.GetTitledFirstName|l], age quando está ao meu lado. Viram o medo refletido em seus olhos..."
 blackmail.1001.a: "#EMP Todos#! deveriam ter medo de mim..."
 blackmail.1001.b: "\"Asseguro a todos vocês, nada inapropriado está acontecendo!\""
 blackmail.1002.t: "A Sombra à Espreita"
 blackmail.1002.desc: "A ameaça de ser expost[ROOT.Char.Custom('ES_OA')] está constantemente em minha mente. [blackmailer.GetTitledFirstName|l] sabe demais sobre mim, e as consequências de recusar qualquer uma de suas exigências são grandes demais para sequer contemplar.\n\nEstarei segur[ROOT.Char.Custom('ES_OA')], mesmo se eu ceder?"
 blackmail.1002.a: "Eu fico acordad[ROOT.Char.Custom('ES_OA')] à noite, preocupado."
 blackmail.1002.b: "Tudo vai ficar bem, [blackmailer.GetFirstNameNoTooltip] me disse!"
