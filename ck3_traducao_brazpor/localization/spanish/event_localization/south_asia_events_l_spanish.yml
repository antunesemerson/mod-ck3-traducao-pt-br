l_spanish:
 south_asia.0001.t: "Uma Nova Era"
 south_asia.0001.desc: "Multidões entoam meu nome enquanto sou purificado nas águas das fontes celestiais. Eu me levanto como o Chakravarti, governante legítimo e benevolente de todo o mundo.\n\nMeus [ROOT.Char.GetFaith.AltPriestTermPlural] me dizem que é hora de o mundo ser guiado pela minha luz, mas eu não preciso de suas garantias. Ao contemplar as planícies, posso sentir isso em minha alma."
 south_asia.0001.a: "O mundo pronuncia meu nome."
 south_asia.0002.t: "O Chakravarti"
 south_asia.0002.intro: "As multidões caminham há dias, ou até semanas, para assistir à cerimônia. A vida de [chakravarti.GetTitledFirstName|l] levou a este momento."
 south_asia.0002.text: "\n\nObservo, em silêncio estarrecido, enquanto meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('chakravarti'))] emerge das fontes sagradas. Seus [chakravarti.GetFaith.AltPriestTermPlural] [chakravarti.GetHerHim] o proclamam Chakravarti, noss[chakravarti.Custom('ES_OA')] [chakravarti.GetLadyLord] benevolente.\n\nAgora ninguém pode contestar que é [chakravarti.Custom('ES_ElLa')] legítim[chakravarti.Custom('ES_OA')] governante de todo o mundo."
 south_asia.0002.a: "É uma honra ter testemunhado este momento."
 south_asia.0002.b: "Permita-me me prostrar aos seus pés em exaltação!"
 south_asia.0003.text: "\n\nÉ somente quando meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('chakravarti'))] emerge dos mananciais sagrados que a força total do momento me atinge. Seus [chakravarti.GetFaith.AltPriestTermPlural] [chakravarti.GetHerHim] proclamam como chakravarti, legítim[chakravarti.Custom('ES_OA')] governante de todo o mundo.\n\nQuando [chakravarti.GetTitledFirstName|l] contempla as planícies abaixo, não consigo evitar sentir que isso é verdade."
 south_asia.0003.a: "Deixe-me me unir a você em seu triunfo, meu [chakravarti.Custom('ES_SennorSennora')]!"
 south_asia.0003.b: "O que espera [chakravarti.Custom('ES_AlAla')] governante do mundo?"
 south_asia.0004.relevant_religion: "Heralds têm chegado em grande número para trazer notícias do Império da Índia. Pela primeira vez em eras, um Chakravarti surgiu."
 south_asia.0004.desc: "Chegaram em grande número arautos da terra da Índia, anunciando a ascensão de seu "chakravarti", entusiasmados com sua benevolência."
 south_asia.0004.text: "\n\nCom grandes rituais e hordas de fiéis a seus pés, [chakravarti.GetTitledFirstName|l] adotou o título [chakravarti.Custom('ES_DelDela')] legítim[chakravarti.Custom('ES_OA')] governante de todo o mundo."
 south_asia.0004.a: "Será uma nova ameaça ou um grande aliad[chakravarti.Custom('ES_OA')]?"
 south_asia.0004.b: "Que os [ROOT.Char.Custom('GetDerogatoryNonbelieverPlural')] guardem suas ridículas afirmações!"
 south_asia.0011.t: "As Águas Sagradas"
 south_asia.0011.desc: "Durante um dia inteiro, do amanhecer ao pôr do sol, eu fico com a água fluindo pelo rio até a altura da minha cintura. Segurando-a em minhas mãos, eu levanto a água em direção ao céu antes de deixá-la cair. Repito isso várias vezes.\n\nEstou tremendo quando volto à terra seca, onde sou recebido pelos [ROOT.Char.GetFaith.PriestNeuterPlural] subordinados. Eu jurei minha proteção não apenas à água que fluiu por minhas mãos hoje, mas ao rio inteiro e, por meio dele, à eternidade da existência."
 south_asia.0011.a: "Ninguém pode duvidar de minha dedicação a [ROOT.Char.GetFaith.HighGodName]."
 south_asia.0012.desc: "Com controle sobre todo o curso do Ganges, [ruler_of_ganges.GetTitledFirstName|l] reivindicou a tutela espiritual de suas águas sagradas. É uma autoridade sem precedentes para alguém reivindicar, mas os [ruler_of_ganges.GetFaith.PriestNeuterPlural] a declararam verdadeira."
 south_asia.0012.a.like: "Parece que a eternidade tem um novo protetor."
 south_asia.0012.a.dislike: "Como se alguém fosse respeitar um[ruler_of_ganges.Custom('ES_XA')] oportunista como [ruler_of_ganges.Custom('ES_ElElla')]!"
 south_asia.0013.t: "Meu Propósito Divino Usurpado"
 south_asia.0013.desc: "Com a perda de território, o povo e os [ROOT.Char.GetFaith.PriestNeuterPlural] de meu domínio já não respeitam mais minha autoridade sobre o Ganges! Em seu lugar, [ruler_of_ganges.Custom('ES_ElLa')] [ruler_of_ganges.GetTitledFirstName|l] reivindicou o cargo de Administrador[ruler_of_ganges.Custom('ES_XA')] do rio sagrado que eu outrora ocupei."
 south_asia.0013.a: "Esse[ruler_of_ganges.Custom('ES_EA')] arrogante[ruler_of_ganges.Custom('ES_OA')] não é nada além de um[ruler_of_ganges.Custom('ES_XA')] impostor[ruler_of_ganges.Custom('ES_XA')]!"
 south_asia.0021.t: "O/A [founder.GetTitleAsNameNoTooltip] de $k_bene_israel$"
 south_asia.0021.desc: "Forçado a viver uma vida nômade e em pequenos enclaves pelo mundo, o povo judeu não teve um lar para chamar de seu. Parece que os séculos de peregrinação chegaram enfim ao fim.\n\n[founder.GetNameNoTooltip] foi coroad[founder.Custom('ES_OA')] [founder.GetTitleAsNameNoTooltip] de $k_bene_israel$. Embora parecesse improvável, o povo judeu encontrou seu lar na costa oeste da Índia, com o [founder.GetFaith.ReligiousHeadTitleName] restaurado e a declaração de um novo Israel, [founder.GetTitledFirstNameNoTooltip|l] acredita estar inaugurando uma nova era de ouro para os seguidores do judaísmo em todo o mundo."
 south_asia.0021.a: "Um novo lar para nós!"
 south_asia.0021.b: "Há apenas um Israel!"
 south_asia.0021.c: "Que coroação improvável."
 south_asia.0030.t: "Espalhando a Fé Theravada"
 south_asia.0030.desc: "Embora sejamos um dos últimos bastiões dos ensinamentos Theravada, nossos nobres continuam a abraçar a fé entusiasticamente. No entanto, o povo comum mantém um orgulho feroz em suas tradições e a adoração aos seus deuses malévolos Nat continua generalizada.\n\nUm governante prudente pode achar sábio fazer concessões ao lidar com essas questões, mas talvez uma abordagem mais rigorosa seja necessária..."
 south_asia.0030.a: "Esses camponeses simplórios precisam ser subjugados!"
 south_asia.0030.b: "Eles são livres para adorar seus deuses antigos, dentro dos limites razoáveis."
 south_asia.0030.c: "Vou lidar com isso depois."
 south_asia.0030.a.tt: "Todos os condados na região de Burma"
 south_asia.0030.a.ari.tt: "Todos os vassalos Ari"
 south_asia.0030.b.theravada.tt: "Todos os vassalos Theravada"
 south_asia.0031.t: "Situação Religiosa se Agrava"
 south_asia.0031.desc: "Uma coisa é ser um intruso cultural; é outra coisa afirmar hegemonia religiosa. O povo comum está irritado, e não faltam murmúrios de desprezo ao mencionarem seu nome entre os tipos mais tradicionais na corte, incluindo [ari_vassal.GetTitledFirstName|l].\n\nMinha mão pode se estender como pacificadora, ou cerrar-se como o punho de um governante implacável. Ou, ainda, posso recuá-la completamente e permitir que a chama se extinga com o tempo. Devo escolher sabiamente..."
 south_asia.0031.a: "Esmague a ralé e identifique qualquer um que ouse protegê-los."
 south_asia.0031.b: "Não podemos arcar com a destruição do reino."
 south_asia.0031.c: "Envie uma mensagem. Execute publicamente os líderes do motim."
 south_asia.0031.d: "Eu fiz o máximo que pude."
 south_asia.0031.a.tt: "Todos os condados"
 south_asia.0031.b.theravada: "Todos os vassalos Theravada"
 south_asia.0031.c.all.tt: "Todos os outros vassalos"
 south_asia.0032.t: "Tensões Religiosas se Aliviam"
 south_asia.0032.desc: "As divindades populares tradicionais birmanesas ainda permanecem enraizadas, especialmente nas áreas rurais. Retirar do povo o direito de cultuar como desejarem causaria mais mal do que bem, e assim a introdução de uma trigésima sétima divindade - Thagyamin, o Deus protetor budista - no panteão, como a primeira e mais importante delas, foi recebida de forma totalmente amistosa.\n\nAgora você tem diante de si uma oportunidade de ouro. O coração tradicional do budismo [ROOT.Char.GetFaith.GetAdherentName] se encontra em Lanka, mas é constantemente ameaçado pelas potências do continente. Como alternativa, talvez seja hora de decidirmos o caminho da nossa fé recém-fortalecida."
 south_asia.0032.a: "Convide refugiados religiosos de Lanka para sua corte."
 south_asia.0032.b: "Nós seremos os únicos guardiões de [ROOT.Char.GetFaith.GetNameNoTooltip|l]."
 south_asia.0032.a.tt: "[guests|lE] lankanos chegam"
 south_asia.0032.a.ruler.tt: "Todos os governantes Sinhala Theravada"
 south_asia.0032.a.lankan: "Refugiados religiosos de Lanka chegaram à sua corte"
 south_asia.0033.t: "Imposição da Vontade Religiosa"
 south_asia.0033.desc: "As insurreições religiosas acabaram. Aqueles corajosos e tolos o bastante para resistir foram abatidos, mas a maioria manteve a boca fechada e a cabeça baixa por medo da perseguição. Os líderes religiosos [ari_vassal.GetFaith.GetAdherentNamePlural] fugiram para o campo, onde puderam continuar a praticar seus rituais animistas. \n\nAgora a questão se volta para aqueles que antes eram tão descarados em seu apoio e, no entanto, agora mantêm a língua tão quieta."
 south_asia.0033.a: "Todos na minha corte devem admitir sua adesão à verdadeira fé!"
 south_asia.0033.b: "Sangue suficiente foi derramado; deixe-os ir."
 south_asia.0033.c: "Você teve sua chance. GUARDAS!"
 south_asia.0034.t: "Conflito Religioso Evitado"
 south_asia.0034.desc: "Levar o país à beira de uma guerra civil para defender a fé mostra zelo, mas saber quando manter minha mão mostra compaixão. O povo continua resmungando, mas que assim seja.\n\nA divisão religiosa no Vale Irrawaddy continua, mas pelo menos meu domínio sobre ele permanece intacto, e a possibilidade de conversão adicional por meios convencionais permanece possível."
 south_asia.0034.a: "Siddhārtha Gautama aprovaria minha compaixão."
 south_asia.0034.b: "E nós os converteremos."
 south_asia.0034.counties: "Todos os condados"
 south_asia.0034.vassals: "Todos os vassalos"
 south_asia.0034.aricounties: "Todos os condados Ari"
 south_asia.0035.t: "Preservando as Terras do Theravada"
 south_asia.0035.desc: "Todo verdadeiro seguidor das ideias de Buda aprecia a sagrada importância de preservar suas palavras. O Cânone Pāli, apesar de ter sido escrito centenas de anos após a morte de Siddhārtha Gautama, representa a coletânea mais precisa das palavras de Buda no mundo conhecido.\n\nCom as maquinações políticas no continente indiano, cresce a ameaça à segurança desses textos sagrados nas terras natais [ROOT.Char.GetFaith.GetAdjective] s da península de Lanka. Preciso agir!"
 south_asia.0035.a: "Enviaremos fiéis [ROOT.Char.GetFaith.GetAdherentNamePluralNoTooltip] para ajudá-los a preservar a fé."
 south_asia.0035.b: "Envie enviados e ofereça um vínculo de amizade."
 south_asia.0035.b.theravada.tt: "Qualquer governante independente Theravada"
 south_asia.0035.a.lanka: "Todos os condados em Lanka"
 south_asia.0036.t: "Lidando com os Ari"
 south_asia.0036.desc: "Com o futuro da fé fora do Vale Irrawaddy agora garantido, a única pergunta que resta é o que fazer com os monges restantes da fé [ari_faith.GetName|l] que ainda possuem tanto poder, mas ostentam seu hedonismo a cada oportunidade. Sua influência pode ser minada, mas não pode ser subestimada.\n\nEsses líderes religiosos que bebem vinho e sacrificam animais devem ser tratados, mas de maneira delicada, para que sua perseguição não seja vista como uma ameaça à paz ainda vulnerável na região."
 south_asia.0036.a: "O povo precisa saber de seus pecados. Dividir e conquistar."
 south_asia.0036.b: "Eles podem se converter ou podem fugir para as florestas e montanhas."
 south_asia.0036.b.tt: "Todos os outros condados em Burma"
 south_asia.0037.t: "A Fé Garantida"
 south_asia.0037.desc: "À medida que os últimos vestígios do poder dos monges se dissipam, é como se tivessem tirado uma pedra de moinho dos meus ombros. As relações religiosas no reino são harmoniosas, a fé prospera, e o povo me vê, com razão, como seu líder tanto político quanto espiritual.\n\nMinha grande jornada chegou ao fim, e meu reino pode ser chamado, com razão, de um verdadeiro bastião de uma fé [ROOT.Char.GetFaith.GetAdjective] forte e saudável."
 south_asia.0037.a: "Vamos fortalecer ainda mais a fé!"
 south_asia.0037.b: "Eu apenas sigo a vontade de Buda."
 south_asia.0037.b.tt: "Todos os vassalos"
 south_asia.0038.t: "A Grande Divisão"
 south_asia.0038.desc: "Há muitos anos, os fiéis do vale do Irrawaddy enfrentam uma verdadeira divisão religiosa. Os nobres que vivem na cidade e seus semelhantes seguem o [proselytiser.GetFaith.GetName|l], enquanto o povo comum e aqueles que vivem nas vastas florestas do vale continuam a adorar as variadas divindades e espíritos da fé ari.\n\nMeu senhor[proselytiser.Custom('ES_XA')] [proselytiser.GetFullName] assumiu para si a tarefa de curar essa divisão e estabelecer a fé theravada como a dominante em suas terras e, por extensão, nas minhas também. Mesmo agora, seus monges percorrem minhas terras, remodelando o cenário religioso à imagem que preferem."
 south_asia.0038.a: "A fé Theravada prosperará!"
 south_asia.0038.b: "Isso é um ultraje!"
 south_asia.0038.c: "Isso não passa de bobagem de sempre."
 south_asia.0038.tt: "Vários dos seus [counties|lE] podem adotar a fé Theravada."
 south_asia.0039.t: "Um Zelote Brutal"
 south_asia.0039.desc: "A obra evangelizadora de [proselytiser.GetFullName] parece ter ido muito mal. Sua abordagem truculenta para espalhar a fé theravada resultou em tumultos e protestos, que foram subsequentemente brutalmente reprimidos.\n\nTodo lorde ou dama que ousou proteger um adepto da fé ari, tão acuada, desapareceu ou agora insiste que foi mal citado, e ninguém ousa desafiar a paciência de seu fanátic[proselytiser.Custom('ES_OA')] senhor[proselytiser.Custom('ES_XA')].\n\nResta saber se haverá outras consequências para aqueles que se sabe terem ficado do lado dos oprimidos..."
 south_asia.0039.a: "Não passa de merecido."
 south_asia.0039.b: "Um dia, os fiéis caídos serão vingados."
 south_asia.0039.c: "Não passa de mais uma briga mesquinha entre [ROOT.Char.Custom('GetDerogatoryNonbelieverPlural')]."
 south_asia.0040.t: "Uma Fé Garantida?"
 south_asia.0040.desc: "[proselytiser.GetFullName], meu [proselytiser.GetLadyLord] e governante destas terras, trabalha arduamente para converter a população à sua fé, a [proselytiser.GetFaith.GetName|l]. À medida que suas maquinações avançam, tem sido impossível deter o fluxo de pregadores e bhāṇakas que se aventuram por minhas terras para espalhar sua fé, e a de sua [proselytiser.GetLadyLord].\n\nMesmo enquanto o theravada se firma, os seguidores tradicionais de Ari se dispersam para fortalezas nas florestas ao redor das montanhas de Arakan, diminuindo em número e se afastando do culto aberto."
 south_asia.0040.a: "Maravilhoso! A verdadeira fé florescerá!"
 south_asia.0040.b: "Essas ações não serão esquecidas."
 south_asia.0040.c: "Isso realmente não é da minha preocupação."
 south_asia.0040.tt: "Vários dos seus [counties|lE] podem adotar a fé Theravada."
 south_asia.0041.t: "Um Presente do Exterior"
 south_asia.0041.desc: "É o quinto monge do dia que passa pela minha corte que desperta meu interesse; é raro ver abertamente tantos membros da fé. Um rápido interrogatório revela o motivo dessa nova enxurrada de fiéis em minhas terras.\n\n[proselytiser.GetFullName], um[proselytiser.Custom('ES_XA')] [proselytiser.GetLadyLord] estrangeir[proselytiser.Custom('ES_OA')], tem estabelecido a fé [proselytiser.GetFaith.GetAdjective] em seu domínio, e a notícia das provações e tribulações que nossa fé compartilhada também enfrentou em meu domínio ao longo das gerações passadas chegou até ele.\n\nEm resposta, enviou muitos bhikkus para ajudar a espalhar e apoiar a fé em suas terras natais ancestrais."
 south_asia.0041.a: "Não esquecerei esse gesto."
 south_asia.0050.t: "Os Reinos de Hindustão"
 south_asia.0050.desc: "Mauryas, Kushanas, Guptas, Palas e Pratiharas, por milênios, a planície Indo-Gangética foi tanto o assento quanto o campo de batalha para muitos grandes impérios. Alguns governantes eram estrangeiros e muitos outros surgiram do próprio subcontinente.\n\nOs [founder.GetHouse.GetNameNoTooltip] não são tão antigos, mas conseguimos criar nosso próprio reino onde essas dinastias falharam. O tempo agora chegou para construirmos um império e uma estrutura governamental para governar a miríade de povos e crenças que habitam estas terras."
 south_asia.0050.a: "Uma nova capital se erguirá em Delhi!"
 south_asia.0050.b: "Faremos de Lahore o centro do Império"
 south_asia.0050.c: "O Império será governado a partir de [founder.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]"
 south_asia.0051.t: "O Sultanato de [founder.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]"
 south_asia.0051.desc: "Chegou-nos a notícia de que os [founder.GetHouse.GetNameNoTooltip] consolidaram seu domínio sobre a planície indo-gangética, fundando um novo Império Islâmico sobre as ruínas deixadas pelas dinastias hindus e budistas de outrora.\n\n[founder.GetFirstNameNoTooltip], apresentando-se como [founder.GetFullName] e com a ambição imperial de governar toda a Índia a partir de [founder.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], está se tornando cada vez mais temid[founder.Custom('ES_OA')] e admirad[founder.Custom('ES_OA')]."
 south_asia.0051.a: "$middle_europe_decisions.0016.a$"
 south_asia.0051.b: "Vamos esmagar esses pretensiosos iniciantes!"
 south_asia.0051.c: "Por fim [Select_CString( founder.IsFemale, 'uma campeã', 'um campeão' )] da verdadeira fé!"
 south_asia.0051.d: "Um desenvolvimento preocupante"
 south_asia.0051.e: "$middle_europe_decisions.0016.d$"
