 ##Notifications
 diarchies.0000.diarch_fulfills_mandate.t: "[liege.Custom('ES_ElLa')|U] [liege.GetDiarchTitle|l] promove o Mandato"
 diarchies.0000.diarch_fails_at_mandate.t: "[liege.Custom('ES_ElLa')|U] [liege.GetDiarchTitle|l] falha em promover o Mandato"
 diarchies.0000.diarch_skims_mandate.t: "[liege.Custom('ES_ElLa')|U] [liege.GetDiarchTitle|l] sonega o [mandate|lE]"
 diarchies.0000.diarch_fails_to_skim_mandate.t: "[liege.Custom('ES_ElLa')|U] [liege.GetDiarchTitle|l] não consegue desviar do [mandate|lE]"
 diarchies.0000.diarch_rejects_mandate.t: "[liege.Custom('ES_ElLa')|U] [liege.GetDiarchTitle|l] rejeita o [mandate|lE] por um [personality_trait|lE]"
 diarchies.0000.diarch_lax_with_mandate.t: "[liege.Custom('ES_ElLa')|U] [liege.GetDiarchTitle|l] evita os deveres do [mandate|lE]"
 diarchies.0000.diarch_mandate_fail.tt.obtain_gold.liege: "[diarch.GetSheHe|U] tentou obter [gold|lE] para você"
 diarchies.0000.diarch_mandate_fail.tt.obtain_gold.split: "[diarch.GetSheHe|U] tentou conseguir [gold|lE] para ambos"
 diarchies.0000.diarch_mandate_fail.tt.obtain_gold.self: "[diarch.GetSheHe|U] tentou obter [gold|lE] para si"
 diarchies.0000.diarch_mandate_fail.tt.acquire_character.liege: "[diarch.GetSheHe|U] tentou obter um [courtier|lE] para você"
 diarchies.0000.diarch_mandate_fail.tt.acquire_character.self: "[diarch.GetSheHe|U] tentou conquistar a lealdade de um [character|El] para si"
 diarchies.0000.diarch_mandate_fail.tt.acquire_troops.liege: "[diarch.GetSheHe|U] tentou adquirir soldados para você"
 diarchies.0000.diarch_mandate_fail.tt.acquire_troops.split: "[diarch.GetSheHe|U] tentou adquirir soldados para ambos"
 diarchies.0000.diarch_mandate_fail.tt.affect_contract.liege: "[diarch.GetSheHe|U] tentou afetar positivamente o [vassal_contract|lE] de um [vassal|E] para você"
 diarchies.0000.diarch_mandate_fail.tt.harass_peasants.liege: "[diarch.GetSheHe|U] tentou obter recursos da população camponesa"
 diarchies.0000.diarch_mandate_fail.tt.boost_authority.liege: "[diarch.GetSheHe|U] tentou aumentar sua autoridade"
 diarchies.0000.diarch_mandate_fail.tt.affect_faction.liege: "[diarch.GetSheHe|U] tentou desarmar uma [faction|lE]"
 diarchies.0000.diarch_mandate_fail.tt.network.self: "[diarch.GetSheHe|U] tentou conquistar a simpatia dos [vassals|El] em seu nome"
 diarchies.0000.diarch_mandate_fail.tt.train_self.self: "[diarch.GetSheHe|U] se concentrou no próprio treinamento em vez de treinar suas tropas"
 diarchy.0021.t: "Convocado para se tornar [liege.GetDiarchTitle]"
 diarchy.0021.desc.appointment_nature.child: "Sendo [liege.Custom2('MyCharacterIntroduction', ROOT.Char)] apenas uma criança é evidente que não pode governar com eficácia o [liege.GetPrimaryTitle.GetName]. Precisa de uma mão firme e segura que guie [liege.GetHerHim], pelo menos até atingir a maioridade."
 diarchy.0021.desc.appointment_nature.incapable: "Com [liege.Custom2('MyCharacterIntroduction', ROOT.Char)] reduzid[liege.Custom('ES_OA')] a um #EMP farrapo#! trêmulo e debilitado, nosso [liege.GetPrimaryTitle.GetName] está à beira da anarquia total. Principalmente porque, dada sua condição, quem sabe por quanto tempo ficaremos sem autoridade?"
 diarchy.0021.desc.appointment_nature.imprisoned: "Com [liege.Custom2('MyCharacterIntroduction', ROOT.Char)] aprisionad[liege.Custom('ES_OA')] por [liege.GetImprisonedBy.Custom('ES_ElLa')] [liege.GetImprisonedBy.GetTitledFirstName|l], o [liege.GetPrimaryTitle.GetName] está sem rumo e à deriva. A comunicação com noss[liege.Custom('ES_OA')] [liege.GetLadyLord] tem a frequência que seu carcereiro permite. E decidir quais cartas vêm #EMP realmente#! [liege.Custom('ES_DelDela')] [liege.GetTitleAsNameNoTooltip|l] é tema de debate constante."
 diarchy.0021.desc.appointment_nature.travelling: "Com [liege.Custom2('MyCharacterIntroduction', ROOT.Char)] ocupad[liege.Custom('ES_OA')] atualmente em terras estrangeiras, o [liege.GetPrimaryTitle.GetName] está em um estado de incerteza silenciosa. Não haver um[liege.Custom('ES_XA')] [liege.GetTitleAsNameNoTooltip] significa que não há autoridade vinculante e #EMP isso#! deixa os vassalos nervosos."
 diarchy.0021.desc.appointment_nature.war: "Com [liege.Custom2('MyCharacterIntroduction', ROOT.Char)] lutando em uma guerra longe, as tensões se espalham entre os que ficamos para trás. A comunicação com [liege.Custom('ES_ElLa')] [liege.GetTitleAsNameNoTooltip] é irregular e a pilha de disputas cresce a cada dia."
 diarchy.0021.desc.appointment_nature.fallback: "É evidente para todo o [liege.GetPrimaryTitle.GetName] que [liege.Custom2('MyCharacterIntroduction', ROOT.Char)] não pode assumir o fardo de governar, senão causará um dano irreparável às nossas terras."
 diarchy.0021.desc.diarchy_type.regency_temporary: "\n\nEmbora o dever não se espere que dure muito tempo, alguém deve cuidar do reino, arbitrar as disputas e manter o trono aquecido para [liege.Custom('ES_ElLa')] [liege.GetTitledFirstNameNoTooltip|l] como"
 diarchy.0021.desc.diarchy_type.regency_entrenched: "\n\nComo é provável que esta situação persista por algum tempo, o reino precisa saber a quem recorrer quando [liege.Custom('ES_ElLa')] [liege.GetTitledFirstNameNoTooltip|l] não puder dispensar justiça pessoalmente. Precisamos de alguém que sirva, permanentemente, como"
 diarchy.0021.desc.diarchy_type.fallback: "\n\nParece que não podemos continuar como estamos. Como [liege.Custom('ES_ElLa')] [liege.GetTitledFirstNameNoTooltip|l] não pode governar por si mesm[liege.Custom('ES_OA')], alguém deve atuar como seu"
 diarchy.0021.desc.outro: "[liege.GetDiarchTitle].\n\nNaturalmente, é[GetPlayer.Custom('ES_EA')] alguém sou eu."
 diarchy.0021.reminder.diarch_powers: "Você ganhou acesso a [diarch_powers|lE], que podem ser usados contra seu [liege|lE] e outros [vassals|lE]"
 diarchy.0021.reminder.scales_of_power: "As [scales_of_power|lE] foram ativadas e podem ser balançadas para desbloquear mais [diarch_powers|lE]"
 diarchy.0021.a: "Eu começarei meu #EMP reinado#! imediatamente!"
 diarchy.0021.a.sedate: "Eu já tenho tantas ideias para o reino!"
 diarchy.0021.b: "Ah, o reconhecimento."
 diarchy.0021.c: "Receio que tenho compromissos urgentes demais..."
 ##################################################
 ##Modifiers
 mandate_induced_fines_to_liege_modifier: "Multas Criminais Excessivas"
 mandate_induced_fines_to_liege_modifier_desc: "Este condado luta sob o jugo de multas criminais draconianas, impostas para enriquecer o reino em geral."
 mandate_induced_fines_split_modifier: "Multas Criminais Excessivas Divididas"
 mandate_induced_fines_split_modifier_desc: "Este condado luta sob o jugo de multas criminais draconianas, grande parte das quais vai diretamente para o senhor local."
 mandate_fines_being_ignored_modifier: "Multas Criminais Ignoradas"
 mandate_fines_being_ignored_modifier_desc: "Este condado está ignorando as exigências de multas mais severas para criminosos e ainda está irritado por sequer ter sido perguntado."
 mandate_hated_recruiter_modifier: "Recrutador Odiado"
 mandate_hated_recruiter_modifier_desc: "Este personagem é conhecido por ser #EMP implacável#! na avaliação de quem é adequado para o recrutamento."
 mandate_failed_to_drum_up_rural_recruits_modifier: "Recrutador Ineficiente"
 mandate_failed_to_drum_up_rural_recruits_modifier_desc: "Este personagem tem uma má reputação por tentar e falhar em reunir mais recrutas do que é considerado justo."
 mandate_squeezing_recruiting_sources_modifier: "Recrutamento Violento"
 mandate_squeezing_recruiting_sources_modifier_desc: "Se eles estão em idade de lutar, eles vão cumprir o serviço militar. Ou pagarão o preço."
 mandate_extra_recruiting_sources_modifier: "Recrutamento Extra-Legal"
 mandate_extra_recruiting_sources_modifier_desc: "Embora eles só precisem trazer tantas tropas para a guerra, este condado sabe que é melhor convocar algumas extras. Ou então."
 mandate_sellswords_bolster_ranks_modifier: "Mercenários Reforçam as Fileiras"
 mandate_sellswords_bolster_ranks_modifier_desc: "Sempre que um soldado do lar deste personagem morre ou se aposenta, não parece haver falta de mercenários ansiosos para ocupar seu lugar."
 mandate_sellswords_bolster_recruitment_modifier: "Mercenários Reforçam o Recrutamento"
 mandate_sellswords_bolster_recruitment_modifier_desc: "Mercenários em busca de uma fonte de receita mais #EMP permanente#! estão sempre dispostos a se juntar ao lar deste personagem."
 mandate_hired_thugs_modifier: "Arruaceiros Contratados"
 mandate_hired_thugs_modifier_desc: "Coisas desagradáveis parecem acontecer com os detratores deste personagem."
 mandate_emptied_gaols_modifier: "Cadeias Esvaziadas"
 mandate_emptied_gaols_modifier_desc: "Assassinos e bandidos se reúnem no condado, sabendo que aqui seus crimes serão perdoados em troca de serviço militar."
 mandate_baronial_troops_trained_modifier: "Tropas Baronais Fortalecidas"
 mandate_baronial_troops_trained_modifier_desc: "Mais das tropas deste personagem são adequadas para levar para a batalha do que se poderia esperar."
 mandate_baronial_troops_half_trained_modifier: "Tropas Baronais Meio Fortalecidas"
 mandate_baronial_troops_half_trained_modifier_desc: "$mandate_baronial_troops_trained_modifier_desc$"
 mandate_focused_on_own_training_modifier: "Focado na Forma Física"
 mandate_focused_on_own_training_modifier_desc: "Ao se concentrar regularmente nos fundamentos, este personagem se mantém em boa forma de combate."
 mandate_strained_self_training_modifier: "Treinamento Próprio Difícil"
 mandate_strained_self_training_modifier_desc: "Este personagem se machucou ao treinar as tropas e ainda não se recuperou completamente."
 shift_privileges_monopolies_sold_modifier: "Monopólios Vendidos"
 shift_privileges_monopolies_sold_modifier_desc: "Pessoas de má reputação têm vendido direitos exclusivos para vender ou produzir certos bens #EMP sem#! a permissão do governante local!"
 shift_privileges_scutage_exemptions_modifier: "Isenções de Escutagems"
 shift_privileges_scutage_exemptions_modifier_desc: "Documentos com selos superiores aos do governante local mostram que grande parte dos camponeses locais está isenta do serviço militar."
 shift_privileges_conflicting_deeds_modifier: "Atos Conflitantes"
 shift_privileges_conflicting_deeds_modifier_desc: "Um sujeito caluniador vendeu pequenas concessões de terra para diversos magnatas locais, que se sobrepõem ou anulam as do governante local."
 ##################################################
 ##Mandates - Fill Coffers
 diarchy.1201.t: "Corações Abertos, Bolsos Abertos"
 diarchy.1201.desc: "\"Impostos atrasados? Como assim #EMP impostos atrasados#!?\", zomba [exploitable_vassal.Custom('ES_ElLa')] [exploitable_vassal.GetTitledFirstName|l]. \"Eu pago minhas taxas à Coroa em dia e até o último centavo, como todo mundo, e não gosto de ser extorquido por mais\".\n\n[exploitable_vassal.GetFirstName] é mais… resistente do que eu esperava à ideia de pagar um dízimo extra, mas meu mandato como [liege.GetDiarchTitle] me obriga a tratar dessas questões para servir meu [liege.GetLadyLord]."
 diarchy.1201.a: "Pela autoridade de [liege.Custom('ES_DelDela')] [liege.GetTitledFirstNameNoTooltip|l], #EMP pagareis#!."
 diarchy.1201.a.t: "$diarchies.0000.diarch_fulfills_mandate.t$"
 diarchy.1201.b: "Você diz isso, mas esses registros mostram apenas receitas parciais..."
 diarchy.1201.b.tt.success: "[exploitable_vassal.GetFirstNameNoTooltip] cede"
 diarchy.1201.b.tt.failure: "[exploitable_vassal.Custom('ES_ElLa')|U] [exploitable_vassal.GetTitleAsNameNoTooltip] permanece firme"
 diarchy.1201.b.t: "$diarchies.0000.diarch_fails_at_mandate.t$"
 diarchy.1201.c: "[liege.Custom('ES_ElLa')|U] [liege.GetTitleAsNameNoTooltip] e eu não estamos pedindo. Estamos ordenando."
 diarchy.1201.c.tt.success: "$diarchy.1201.b.tt.success$"
 diarchy.1201.c.t.success: "$diarchies.0000.diarch_skims_mandate.t$"
 diarchy.1201.c.tt.failure: "$diarchy.1201.b.tt.failure$"
 diarchy.1201.c.t.failure: "$diarchies.0000.diarch_fails_to_skim_mandate.t$"
 diarchy.1201.d: "Eu não posso fazer isso — é claro que seus impostos estão em ordem, por favor, ignore-me."
 diarchy.1201.d.t: "$diarchies.0000.diarch_rejects_mandate.t$"
 diarchy.1201.e: "Você está certo. Considere essas dívidas esquecidas."
 diarchy.1201.e.t: "$diarchies.0000.diarch_lax_with_mandate.t$"
 diarchy.1211.t: "Termos e Condições"
 diarchy.1211.desc: "\"… e várias destas testemunhas dos vossos juramentos de fidelidade confirmam que prometestes #EMP superar#! vossas obrigações, não simplesmente igualá-las\", concluo. [exploitable_vassal.Custom('ES_ElLa')|U] [exploitable_vassal.GetTitledFirstName|l] me encara do outro lado da mesa, boquiabert[exploitable_vassal.Custom('ES_OA')].\n\n\"Estais sugerindo que o testemunho de algum nobre insignificante e anônimo prova que eu devo #EMP ainda mais#! a noss[liege.Custom('ES_OA')] [liege.GetLadyLord]?\", gagueja [exploitable_vassal.GetSheHe] ainda aturdid[exploitable_vassal.Custom('ES_OA')] pela audácia da minha afirmação.\n\nÉ uma sugestão arriscada, mas meu mandato como [liege.GetDiarchTitle] me exige promover a posição de [liege.Custom('ES_DelDela')] [liege.GetTitledFirstName|l]."
 diarchy.1211.a: "Estou, e se você não gosta desses testemunhos, tenho outros."
 diarchy.1211.a.t: "$diarchies.0000.diarch_fulfills_mandate.t$"
 diarchy.1211.b: "Os testemunhos são relevantes — esses juramentos são sagrados."
 diarchy.1211.b.tt.success: "Você convence [exploitable_vassal.GetFirstNameNoTooltip] a se submeter"
 diarchy.1211.b.tt.failure: "Sua posição desmorona sob escrutínio"
 diarchy.1211.b.t: "$diarchies.0000.diarch_fails_at_mandate.t$"
 diarchy.1211.c: "Bem, ou uma nova homenagem e um pequeno dízimo para o #EMP tesouro#!."
 diarchy.1211.c.tt.success: "[exploitable_vassal.GetFirstNameNoTooltip] paga"
 diarchy.1211.c.t.success: "$diarchies.0000.diarch_skims_mandate.t$"
 diarchy.1211.c.tt.failure: "[exploitable_vassal.Custom('ES_ElLa')|U] [exploitable_vassal.GetTitleAsNameNoTooltip] se recusa a ser chantageado"
 diarchy.1211.c.t.failure: "$diarchies.0000.diarch_fails_to_skim_mandate.t$"
 diarchy.1211.d: "Seria severo cobrar de você alguns erros de palavra..."
 diarchy.1211.d.t: "$diarchies.0000.diarch_rejects_mandate.t$"
 diarchy.1211.e: "Talvez... talvez tudo isso seja um pouco nebuloso..."
 diarchy.1211.e.t: "$diarchies.0000.diarch_lax_with_mandate.t$"
 diarchy.1221.t: "Seu Novo Lar"
 diarchy.1221.desc: "Por mandato [liege.Custom('ES_DelDela')] [liege.GetTitledFirstName|l], meu principal dever como regente é encher os cofres dele/dela. Uma forma fácil de fazer isso é ajudar a povoar os arredores de [recipient_county.GetNameNoTier], transferindo servos e pequenos proprietários de minha [actor_county.GetName] às terras de [liege.GetFirstNameNoTooltip].\n\nSó que o campesinato se recusa a ceder. Cada família removida à força é como arrancar um dente, como se lhes #EMP pareciera mal#! que seus superiores os deslocassem."
 diarchy.1221.a: "Eles irão para onde eu os mover quando eu os mover."
 diarchy.1221.a.t: "$diarchies.0000.diarch_fulfills_mandate.t$"
 diarchy.1221.b: "Talvez se eu oferecer recomendações adequadas?"
 diarchy.1221.b.tt.success: "O ouro tem sucesso onde o aço falhou"
 diarchy.1221.b.tt.failure: "Os moradores se unem em solidariedade"
 diarchy.1221.b.t: "$diarchies.0000.diarch_fails_at_mandate.t$"
 diarchy.1221.c: "As famílias mais abastadas #EMP poderiam#! servir de outra maneira..."
 diarchy.1221.c.tt.success: "Uma pequena taxa e a solidariedade local são quebradas"
 diarchy.1221.c.t.success: "$diarchies.0000.diarch_skims_mandate.t$"
 diarchy.1221.c.tt.failure: "Sua reputação por negociações desonestas se espalha"
 diarchy.1221.c.t.failure: "$diarchies.0000.diarch_fails_to_skim_mandate.t$"
 diarchy.1221.d: "Todo esse trabalho para presentear #EMP [liege.GetFirstNameNoTooltip]#! com moedas?"
 diarchy.1221.d.tt: "Você folga a tarde inteira"
 diarchy.1221.d.t: "$diarchies.0000.diarch_rejects_mandate.t$"
 diarchy.1221.e: "Ah, deixe-os ficar em suas terras se amam tanto sua sujeira!"
 diarchy.1221.e.t: "$diarchies.0000.diarch_lax_with_mandate.t$"
 diarchy.1231.t: "Cada centavo conta"
 diarchy.1231.desc: "O mandato que [liege.GetTitledFirstName|l] decretou me insta a buscar rendas para o trono, e uma forma de renda atualmente tragicamente pouco explorada pelo meu [liege.GetLadyLord] são os tribunais. Os magistrados e nobres menores multam diariamente os pequenos criminosos, mas ficam com a maior parte dos fundos arrecadados.\n\nO condado de [exploitable_county.GetNameNoTier] é especialmente rico nesse tipo de ralé, e aumentar o custo das multas aplicadas aos locais por suas infrações seria muito lucrativo, embora também muito impopular."
 diarchy.1231.a: "Quem se importa com o que eles pensam? Um criminoso é um criminoso."
 diarchy.1231.a.t: "$diarchies.0000.diarch_fulfills_mandate.t$"
 diarchy.1231.b: "Podemos encontrar um equilíbrio nas acusações, eu acredito."
 diarchy.1231.b.tt.success: "As pessoas não reclamam mais do que já reclamavam"
 diarchy.1231.b.tt.failure: "Os moradores se recusam a cumprir"
 diarchy.1231.b.t: "$diarchies.0000.diarch_fails_at_mandate.t$"
 diarchy.1231.c: "Todo esse trabalho certamente exige uma pequena remuneração..."
 diarchy.1231.c.tt.success: "$diarchy.1231.b.tt.success$"
 diarchy.1231.c.t.success: "$diarchies.0000.diarch_skims_mandate.t$"
 diarchy.1231.c.tt.failure: "$diarchy.1231.b.tt.failure$"
 diarchy.1231.c.t.failure: "$diarchies.0000.diarch_fails_to_skim_mandate.t$"
 diarchy.1231.d: "Deveríamos #EMP diminuir#! as multas, não aumentá-las!"
 diarchy.1231.d.t: "$diarchies.0000.diarch_rejects_mandate.t$"
 diarchy.1231.e: "Isso tudo parece estar além do meu escopo."
 diarchy.1231.e.t: "$diarchies.0000.diarch_lax_with_mandate.t$"
 diarchy.1241.t: "Um assunto tributário"
 diarchy.1241.desc: "Um dos meus deveres como [liege.GetDiarchTitle] é cumprir o mandato que me foi imposto por [liege.Custom('ES_ElLa')] [liege.GetTitledFirstName|l] que, no momento, exige dinheiro vivo e em espécie.\n\nTenho quebrado a cabeça para encontrar novas fontes de renda para a Coroa e sempre volto a uma solução óbvia, embora pouco ortodoxa: [diarch.Custom('GetFaithTaxExemptInstitution')|l].\n\nUm imposto especial sobre [diarch.Custom('GetFaithTaxExemptInstitution')], que tradicionalmente é isento de tributação, seria lucrativo. Só que… não exatamente piedoso."
 diarchy.1241.a: "[diarch.Custom('GetFaithTaxExemptInstitution')|U]? Eles tiveram tudo do jeito deles por tempo demais!"
 diarchy.1241.a.t: "$diarchies.0000.diarch_fulfills_mandate.t$"
 diarchy.1241.b: "Certamente uma taxa especial para despesas necessárias não daria errado, não é mesmo?"
 diarchy.1241.b.tt.success: "Apesar das reclamações, eles pagam o dízimo"
 diarchy.1241.b.tt.failure: "Seu nome é amaldiçoado e sua bolsa está vazia"
 diarchy.1241.b.t: "$diarchies.0000.diarch_fails_at_mandate.t$"
 diarchy.1241.c: "Claro, uma compensação é devida àqueles prejudicados por tais impostos..."
 diarchy.1241.c.tt.success: "$diarchy.1241.b.tt.success$"
 diarchy.1241.c.t.success: "$diarchies.0000.diarch_skims_mandate.t$"
 diarchy.1241.c.tt.failure: "$diarchy.1241.b.tt.failure$"
 diarchy.1241.c.t.failure: "$diarchies.0000.diarch_fails_to_skim_mandate.t$"
 diarchy.1241.d: "Tanta controvérsia só pelos cofres de [liege.GetFirstNameNoTooltip]? Nunca."
 diarchy.1241.d.t: "$diarchies.0000.diarch_rejects_mandate.t$"
 diarchy.1241.e: "Eu não posso fazer isso. Eu #EMP não#! vou fazer isso."
 diarchy.1241.e.t: "$diarchies.0000.diarch_lax_with_mandate.t$"
 ##################################################
 ##Mandates - Promote Authority
 diarchy.1701.t: "O Direito de Governar"
 diarchy.1701.desc: "Sendo [liege.GetDiarchTitle] [liege.Custom('ES_DelDela')] [liege.GetTitledFirstName|l], sou obrigado a cumprir o mandato de promover a autoridade central em [liege.GetPrimaryTitle.GetNameNoTier].\n\nHoje isso me levou a uma tensa sala do conselho, espremid[GetPlayer.Custom('ES_OA')] entre [councillor_1.Custom('ES_ElLa')] [councillor_1.GetTitledFirstName|l], [councillor_1.Custom('CouncilPosition')|l] e [councillor_2.Custom('ES_ElLa')] [councillor_2.GetTitledFirstName|l], [councillor_2.Custom('CouncilPosition')|l], enquanto gritavam um com o outro por bobagens pessoais.\n\nEu esperava conseguir um acordo para aprovar vários novos privilégios para [liege.Custom('ES_ElLa')] [liege.GetTitleAsNameNoTooltip], mas não vou chegar a lugar nenhum até essa discussão acabar."
 diarchy.1701.a: "Acho que vocês dois estão falando um do outro - permitam-me..."
 diarchy.1701.a.t: "$diarchies.0000.diarch_fulfills_mandate.t$"
 diarchy.1701.b: "Nobres senhores, estamos nos desviando…"
 diarchy.1701.b.tt.success: "Você controla a conversa"
 diarchy.1701.b.tt.failure: "Os conselheiros ignoram você"
 diarchy.1701.b.t: "$diarchies.0000.diarch_fails_at_mandate.t$"
 diarchy.1701.c: "[councillor_1.GetFirstNameNoTooltip] #EMP tiene#! está certa, e a Coroa apoia [councillor_1.GetHerHim]."
 diarchy.1701.c.tt.success: "[councillor_1.GetFirstNameNoTooltip] recebe com satisfação o seu apoio"
 diarchy.1701.c.t.success: "$diarchies.0000.diarch_skims_mandate.t$"
 diarchy.1701.c.tt.failure: "Você claramente não entende o debate deles"
 diarchy.1701.c.t.failure: "$diarchies.0000.diarch_fails_to_skim_mandate.t$"
 diarchy.1701.d: "#EMP Pelo amor de [diarch.GetFaith.HighGodName], vocês poderiam simplesmente#! #BER calar a boca?!#!"
 diarchy.1701.d.t: "$diarchies.0000.diarch_rejects_mandate.t$"
 diarchy.1701.d.custom.both_councillors: "Ambos os conselheiros:"
 diarchy.1701.e: "Eu me pergunto se eles notariam se eu tirasse uma soneca..."
 diarchy.1701.e.t: "$diarchies.0000.diarch_lax_with_mandate.t$"
 diarchy.1711.t: "Data de Expiração"
 diarchy.1711.desc: "\"Sinceramente, achei que essa questão já estava resolvida. Os meus acordos com [liege.Custom('ES_ElLa')] [liege.GetTitledFirstName|l] foram acertados da última vez que renegociamos minhas obrigações\", resmunga [exploitable_vassal.Custom('ES_ElLa')] [exploitable_vassal.GetTitledFirstName|l]. \"Não entendo como pode dizer que consegui invalidar totalmente meus juramentos? Certamente as palavras deveriam valer para sempre?\".\n\n[exploitable_vassal.GetFirstName] não está totalmente errado. Estou tateando no escuro com isso, mas eu sou [GetPlayer.Custom('ES_ElLa')] [liege.GetDiarchTitle|l] e meu mandato é claro como um belo dia de verão. Se os juramentos de [exploitable_vassal.GetFirstNameNoTooltip] forem parcialmente inválidos, então [liege.Custom('ES_ElLa')] [liege.GetTitleAsNameNoTooltip|l] terá margem para ajustá-los, e eu terei cumprido meu dever."
 diarchy.1711.a: "Não sou conhecido por minha mente justa e legal?"
 diarchy.1711.a.t: "$diarchies.0000.diarch_fulfills_mandate.t$"
 diarchy.1711.b: "Muito bem, vamos revisar os argumentos novamente..."
 diarchy.1711.b.tt.success: "Sua teoria legal é incontestável"
 diarchy.1711.b.tt.failure: "As lacunas em seu argumento são óbvias"
 diarchy.1711.b.t: "$diarchies.0000.diarch_fails_at_mandate.t$"
 diarchy.1711.c: "A Coroa #EMP poderia#! aceitar uma compensação em vez disso."
 diarchy.1711.c.tt.success: "[exploitable_vassal.GetFirstNameNoTooltip] lhe suborna"
 diarchy.1711.c.t.success: "$diarchies.0000.diarch_skims_mandate.t$"
 diarchy.1711.c.tt.failure: "O reino ouve sobre sua desonestidade"
 diarchy.1711.c.t.failure: "$diarchies.0000.diarch_fails_to_skim_mandate.t$"
 diarchy.1711.d: "Como você pode ser tão lerdo[exploitable_vassal.Custom('ES_OA')]? É muito simples!"
 diarchy.1711.d.t: "$diarchies.0000.diarch_rejects_mandate.t$"
 diarchy.1711.e: "Ah, esqueça. Isso não vale a pena."
 diarchy.1711.e.t: "$diarchies.0000.diarch_lax_with_mandate.t$"
 diarchy.1721.t: "Resolvendo Reclamações"
 diarchy.1721.desc: "\"Eu nem entendo por que vocês têm tanto interesse em se envolver, [diarch.GetFirstName]\", suspira [exploitable_vassal.Custom('ES_ElLa')] [exploitable_vassal.GetTitledFirstName|l]. \"Não é como se nossas queixas fossem responsabilidade sua\".\n\nNão é segredo que [exploitable_vassal.Custom('ES_ElLa')] [exploitable_vassal.GetTitleAsNameNoTooltip|l] tem ambições contrárias à vontade de [liege.Custom('ES_DelDela')] [liege.GetTitledFirstName|l]. Ambições que poderiam arrastar o reino para uma guerra civil desastrosa, se não forem contidas.\n\nComo [liege.GetDiarchTitle] do meu [liege.GetLadyLord|l], cabe a mim tentar apaziguar as tensões entre os dois, mas até agora [exploitable_vassal.GetFirstName] parece imune aos meus esforços."
 diarchy.1721.a: "Nós dois não fizemos um juramento a [liege.Custom('ES_AlAla')] [liege.GetTitledFirstNameNoTooltip]?"
 diarchy.1721.a.t: "$diarchies.0000.diarch_fulfills_mandate.t$"
 diarchy.1721.b: "Você está certo. Meu castelo certamente não será o primeiro a ser sitiado."
 diarchy.1721.b.tt.success: "[exploitable_vassal.Custom('ES_ElLa')] [exploitable_vassal.GetTitleAsNameNoTooltip] entende a indireta"
 diarchy.1721.b.tt.failure: "[exploitable_vassal.GetFirstNameNoTooltip] não se preocupa com suas ameaças"
 diarchy.1721.b.t: "$diarchies.0000.diarch_fails_at_mandate.t$"
 diarchy.1721.c: "Eu poderia ser persuadido a ignorar suas... atividades..."
 diarchy.1721.c.tt.success: "Você negocia por uma promessa vinculativa e uma pequena homenagem"
 diarchy.1721.c.t.success: "$diarchies.0000.diarch_skims_mandate.t$"
 diarchy.1721.c.tt.failure: "Talvez eles #EMP tenham#! queixas contra você"
 diarchy.1721.c.t.failure: "$diarchies.0000.diarch_fails_to_skim_mandate.t$"
 diarchy.1721.d: "Suponho que, no final das contas, não é #EMP meu#! problema."
 diarchy.1721.d.t: "$diarchies.0000.diarch_rejects_mandate.t$"
 diarchy.1721.e: "Envolvido? Apenas curioso! Esta foi apenas uma visita social."
 diarchy.1721.e.t: "$diarchies.0000.diarch_lax_with_mandate.t$"
 diarchy.1731.t: "Ajustando Contas"
 diarchy.1731.desc: "A multidão se aglomera diante de mim, uma gangue heterogênea de representantes irritados de [county_1.GetNameNoTier], [county_2.GetNameNoTier] e [county_3.GetNameNoTier], cidades e vilas distintas unidas por sua condenação [liege.Custom('ES_AlAla')] [liege.GetTitledFirstName|l]. Como seu desafortunad[GetPlayer.Custom('ES_OA')] [liege.GetDiarchTitle] e, conforme meu mandato, cabe a mim tentar apaziguá-los.\n\nSem uma liderança central clara, a turba me vaia, gritando preocupações e incidentes detalhados demais"
 diarchy_1731.tt.affected_counties_removed: "[county_1.GetNameNoTier], [county_2.GetNameNoTier] e [county_3.GetNameNoTier] abandonam a [faction.GetName|V]"
 diarchy.1731.a: "Por favor, sejam civilizados! Vou ouvir seus problemas em sequência."
 diarchy.1731.a.t: "$diarchies.0000.diarch_fulfills_mandate.t$"
 diarchy.1731.b: "Súditos nobres, não podemos encontrar uma causa comum?"
 diarchy.1731.b.tt.success: "Você acalma seus ânimos"
 diarchy.1731.b.tt.failure: "A multidão te ataca com produtos podres"
 diarchy.1731.b.t: "$diarchies.0000.diarch_fails_at_mandate.t$"
 diarchy.1731.c: "Essas questões são graves! #EMP Eu#! nunca permitiria isso."
 diarchy.1731.c.tt.success: "O povo acredita que você corrigirá suas injustiças"
 diarchy.1731.c.t.success: "$diarchies.0000.diarch_skims_mandate.t$"
 diarchy.1731.c.tt.failure: "Isso não é sobre #EMP você#!"
 diarchy.1731.c.t.failure: "$diarchies.0000.diarch_fails_to_skim_mandate.t$"
 diarchy.1731.d: "Pela ira inevitável de [diarch.GetFaith.HighGodName], vocês brutamontes #EMP poderiam parar de#! agir como idiotas?!"
 diarchy.1731.d.t: "$diarchies.0000.diarch_rejects_mandate.t$"
 diarchy.1731.e: "Sim, sim. Lidaremos com tudo isso. Eventualmente."
 diarchy.1731.e.t: "$diarchies.0000.diarch_lax_with_mandate.t$"
 diarchy.1741.t: "Veja por esse ângulo"
 diarchy.1741.desc: "\"Não nos opomos aos desejos [liege.Custom('ES_DelDela')] [liege.GetTitledFirstName|l]\", diz [councillor_1.Custom('ES_ElLa')] [councillor_1.GetTitledFirstName|l] com ar arrastado, zombando. \"Só não somos seus escravos. Não é tão difícil de entender\".\n\nPassei a maior parte da tarde tentando melhorar as relações entre meu [liege.GetLadyLord|l] e seus conselheiros, em vão, em grande parte por causa da teimosia desta[councillor_1.Custom('ES_EA')] ignorante.\n\nSuspiro por dentro. Sou [diarch.Custom('ES_ElLa')] [liege.GetDiarchTitle] e meu mandato exige esses deveres."
 diarchy.1741.a: "Acho que você não percebe o quanto [liege.Custom('ES_ElLa')] [liege.GetTitleAsNameNoTooltip] faz por você…"
 diarchy.1741.a.t: "$diarchies.0000.diarch_fulfills_mandate.t$"
 diarchy.1741.custom.several_councillors: "Todo [councillor|El] presente"
 diarchy.1741.b: "E você também não deveria, mas um melhor serviço incentiva a benevolência..."
 diarchy.1741.b.tt.success: "Você ilumina seus colegas"
 diarchy.1741.b.tt.failure: "O conselho continua difícil"
 diarchy.1741.b.t: "$diarchies.0000.diarch_fails_at_mandate.t$"
 diarchy.1741.c: "A coroa não reside #EMP solo#! em [liege.Custom('ES_ElLa')] [liege.GetTitleAsNameNoTooltip|l]."
 diarchy.1741.c.tt.success: "O conselho aprecia seu ponto de vista"
 diarchy.1741.c.t.success: "$diarchies.0000.diarch_skims_mandate.t$"
 diarchy.1741.c.tt.failure: "Você está claramente fazendo um show"
 diarchy.1741.c.t.failure: "$diarchies.0000.diarch_fails_to_skim_mandate.t$"
 diarchy.1741.d: "Não é tão difícil assim? #EMP O que#! vocês estão insinuando exatamente, seu [councillor_1.Custom2('InsultNoun', ROOT.Char)]?"
 diarchy.1741.d.t: "$diarchies.0000.diarch_rejects_mandate.t$"
 diarchy.1741.e: "Nunca vamos chegar a um acordo comum."
 diarchy.1741.e.t: "$diarchies.0000.diarch_lax_with_mandate.t$"
 ##################################################
 ##Mandates - Swell Armies
 diarchy.2201.t: "Traga a Juventude"
 diarchy.2201.desc: "Espera-se que os moradores de [exploitable_county.GetNameNoTier] forneçam um certo número de tropas [liege.Custom('ES_AlAla')] [liege.GetTitledFirstName|l], o que fazem devidamente quando solicitados.\n\nNo entanto, isso não quer dizer que seja toda a gente em idade de lutar na região, e minhas recentes investigações como [liege.GetDiarchTitle] mostraram que suas obrigações são quase #EMP escandalosamente#! leves. O número de pessoas que poderíamos recrutar praticamente ofusca os míseros contingentes efetivamente alistados.\n\nOs moradores resistem, mas meu mandato me impulsiona mesmo assim."
 diarchy.2201.a: "Se eles conseguem empunhar uma lança, também podem morrer por uma!"
 diarchy.2201.a.t: "$diarchies.0000.diarch_fulfills_mandate.t$"
 diarchy.2201.b: "Deixe os camponeses saberem que esta é a chance deles de #EMP saquear#!."
 diarchy.2201.b.tt.success: "Você estimula a imaginação dos camponeses"
 diarchy.2201.b.tt.failure: "Os locais desenvolvem pernas mancas aos montes"
 diarchy.2201.b.t: "$diarchies.0000.diarch_fails_at_mandate.t$"
 diarchy.2201.c: "Tenho certeza de que os mais ricos pagariam para serem ignorados..."
 diarchy.2201.c.tt.success: "Um pouco de imposto extra, algumas tropas adicionais"
 diarchy.2201.c.t.success: "$diarchies.0000.diarch_skims_mandate.t$"
 diarchy.2201.c.tt.failure: "Segue-se uma amarga recriminação"
 diarchy.2201.c.t.failure: "$diarchies.0000.diarch_fails_to_skim_mandate.t$"
 diarchy.2201.d: "Essas pessoas cumpriram suas obrigações. Isso é o suficiente."
 diarchy.2201.d.t: "$diarchies.0000.diarch_rejects_mandate.t$"
 diarchy.2201.e: "Não farei aqui o trabalho sujo [liege.Custom('ES_DelDela')][liege.GetTitleAsNameNoTooltip]."
 diarchy.2201.e.t: "$diarchies.0000.diarch_lax_with_mandate.t$"
 diarchy.2211.t: "Um Talento Raro"
 diarchy.2211.desc: "Por [hedge_knight_location.GetNameNoTier] passa [Select_CString( hedge_knight.IsFemale, 'uma cavaleira', 'um cavaleiro' )] com um talento raro, cuja espada sem dúvida seria muito valorizada nos exércitos [liege.Custom('ES_DelDela')] [liege.GetTitledFirstName|l].\n\nMeu mandato como [liege.GetDiarchTitle] me exige ficar atento a tais indivíduos, e já enviei numerosas súplicas a [hedge_knight.GetFirstName], tentando recrutar [hedge_knight.GetHerHim] para meu [liege.GetLadyLord|l].\n\nSó que [hedge_knight.Custom('ES_AlAla')] combatente errante não parece muito entusiasmado com a ideia de empenhar sua espada à nossa causa, rejeitando todos os enviados, um a um."
 diarchy.2211.a: "Apenas um $knight_culture_player_no_tooltip_lowercase$ #EMP concordará#! em servir. Eventualmente."
 diarchy.2211.a.t: "$diarchies.0000.diarch_fulfills_mandate.t$"
 diarchy.2211.b: "Talvez eu possa convencer [hedge_knight.GetFirstNameNoTooltip] pessoalmente?"
 diarchy.2211.b.tt.success: "Suas palavras [hedge_knight.GetHerHim] persuadem"
 diarchy.2211.b.tt.failure: "Seus apelos caem em ouvidos moucos"
 diarchy.2211.b.t: "$diarchies.0000.diarch_fails_at_mandate.t$"
 diarchy.2211.c: "Talvez o problema seja [liege.Custom('ES_ElLa')] [liege.Custom('MistressMaster')|l] potencial…"
 diarchy.2211.c.tt.success: "Você atrai [hedge_knight.GetFirstNameNoTooltip] para o seu serviço"
 diarchy.2211.c.t.success: "$diarchies.0000.diarch_skims_mandate.t$"
 diarchy.2211.c.tt.failure: "[hedge_knight.GetSheHe|U] não quer ter nada a ver com você"
 diarchy.2211.c.t.failure: "$diarchies.0000.diarch_fails_to_skim_mandate.t$"
 diarchy.2211.d: "Todo esse assunto está me causando ansiedade!"
 diarchy.2211.d.t: "$diarchies.0000.diarch_rejects_mandate.t$"
 diarchy.2211.e: "Deixemos [hedge_knight.GetHerHim] em paz; está claro que não está interessad[hedge_knight.Custom('ES_OA')]."
 diarchy.2211.e.t: "$diarchies.0000.diarch_lax_with_mandate.t$"
 diarchy.2221.t: "Donativos Marciais"
 diarchy.2221.desc: "Os assentamentos principais de [liege.GetPrimaryTitle.GetNameNoTier] oferecem inúmeros lugares para recrutar espadas de aluguel. A praça do mercado em que me encontro, atirando uma bolsa de moedas a uma multidão deles, é apenas um entre muitos.\n\nNormalmente, essas bandos improvisados de guerreiros são absorvidos por grupos mercenários maiores ou contratados para reforçar os levantes privados de pequenos lordes na guerra, um arranjo ineficiente.\n\nMeu mandato como [liege.GetDiarchTitle] exige que eu aumente os exércitos de [liege.Custom('ES_DelDela')] [liege.GetTitledFirstName|l] e, por isso, me vejo tentando recrutar alguns de forma mais direta."
 diarchy.2221.a: "Esta moeda é nada comparada ao saque que você ganhará!"
 diarchy.2221.a.t: "$diarchies.0000.diarch_fulfills_mandate.t$"
 diarchy.2221.b: "Esta prata é apenas uma amostra da Tesouraria de [liege.Custom('ES_DelDela')] [liege.GetTitledFirstName|l]!"
 diarchy.2221.b.tt.success: "Dinheiro bem gasto"
 diarchy.2221.b.tt.failure: "Um investimento ruim"
 diarchy.2221.b.t: "$diarchies.0000.diarch_fails_at_mandate.t$"
 diarchy.2221.c: "Sirvam-me, sirvam o [liege.Custom('ES_AlAla')] [liege.GetTitleAsNameNoTooltip] , de um jeito ou de outro vocês serão #EMP pagará#!."
 diarchy.2221.c.tt.success: "Uma boa safra de soldados"
 diarchy.2221.c.t.success: "$diarchies.0000.diarch_skims_mandate.t$"
 diarchy.2221.c.tt.failure: "Apenas uma pequena quantidade de tropas se alista"
 diarchy.2221.c.t.failure: "$diarchies.0000.diarch_fails_to_skim_mandate.t$"
 diarchy.2221.d: "Rompa e fuja diante de seus olhares."
 diarchy.2221.d.t: "$diarchies.0000.diarch_rejects_mandate.t$"
 diarchy.2221.e: "Claro, tenho certeza de que você pode escolher seus próprios empregadores..."
 diarchy.2221.e.t: "$diarchies.0000.diarch_lax_with_mandate.t$"
 diarchy.2231.t: "Um Uso Melhor para Você"
 diarchy.2231.desc: "Ultimamente, as prisões e os tribunais de [exploitable_county.GetNameNoTier] processam um número lamentavelmente alto de malfeitores. Em circunstâncias normais, a justiça encontraria esses canalhas rapidamente, e então seriam soltos à natureza ou à sepultura.\n\nFelizmente para eles, muitos têm ampla experiência com espada ou arco, e meu mandato como [liege.GetDiarchTitle|l] me exige encontrar novos soldados. A desagradável solução de serviço nos exércitos de [liege.Custom('ES_DelDela')] [liege.GetTitledFirstName|l] parece óbvia, e, embora isso atraia muitos bandidos resistentes e caçadores furtivos de olhar aguçado, a ideia deixou os camponeses em pé de guerra."
 diarchy.2231.a: "Continue em frente; essas reclamações passarão com o tempo."
 diarchy.2231.a.t: "$diarchies.0000.diarch_fulfills_mandate.t$"
 diarchy.2231.b: "Talvez precisemos apenas dos melhores?"
 diarchy.2231.b.tt.success: "Um equilíbrio é alcançado"
 diarchy.2231.b.tt.failure: "A maioria dos criminosos foge assim que pode"
 diarchy.2231.b.t: "$diarchies.0000.diarch_fails_at_mandate.t$"
 diarchy.2231.c: "Eles podem ser mais úteis sem registro do que registrados..."
 diarchy.2231.c.tt.success: "Um grupo violento é formado"
 diarchy.2231.c.t.success: "$diarchies.0000.diarch_skims_mandate.t$"
 diarchy.2231.c.tt.failure: "$diarchy.2231.b.tt.failure$"
 diarchy.2231.c.t.failure: "$diarchies.0000.diarch_fails_to_skim_mandate.t$"
 diarchy.2231.d: "Eu #EMP não#! posso fazer isso. Isso seria uma perversão da justiça!"
 diarchy.2231.d.t: "$diarchies.0000.diarch_rejects_mandate.t$"
 diarchy.2231.e: "Isso é muito controverso."
 diarchy.2231.e.t: "$diarchies.0000.diarch_lax_with_mandate.t$"
 diarchy.2241.t: "Separando o Trigo do Joio"
 diarchy.2241.desc: "O mandato que [liege.Custom('ES_ElLa')] [liege.GetTitledFirstName|l] me impôs exige que, como seu [liege.GetDiarchTitle], lhe encontre fontes regulares de novas tropas.\n\nQue melhor lugar para começar do que os recrutas mal organizados de [exploitable_vassal.Custom('ES_DelDela')] [exploitable_vassal.GetTitledFirstName|l]? Meus servidores e eu reunimos os moradores para avaliá-los, mas ainda temos dificuldade em conseguir um número suficiente com um nível que #EMP valha a pena#! convocá-los no futuro."
 diarchy.2241.a: "Após mim, soldados! Prestem atenção!"
 diarchy.2241.a.t: "$diarchies.0000.diarch_fulfills_mandate.t$"
 diarchy.2241.b: "Vamos lá, seus preguiçosos, eu vou colocá-los na linha!"
 diarchy.2241.b.tt.success: "Você os torna rápidos como o curso de um rio"
 diarchy.2241.b.tt.failure: "E que grupo lamentável de preguiçosos eles se mostram"
 diarchy.2241.b.t: "$diarchies.0000.diarch_fails_at_mandate.t$"
 diarchy.2241.c: "Talvez eu deva tentar treinar a mim mesmo também..."
 diarchy.2241.c.tt.success: "Um pouco de treinamento extra faz toda a diferença"
 diarchy.2241.c.t.success: "$diarchies.0000.diarch_skims_mandate.t$"
 diarchy.2241.c.tt.failure: "Distraído, você torce algo vital"
 diarchy.2241.c.t.failure: "$diarchies.0000.diarch_fails_to_skim_mandate.t$"
 diarchy.2241.d: "Parta sem dizer uma palavra."
 diarchy.2241.d.t: "$diarchies.0000.diarch_rejects_mandate.t$"
 diarchy.2241.e: "Isso é um #EMP completo#! desperdício do meu tempo."
 diarchy.2241.e.t: "$diarchies.0000.diarch_lax_with_mandate.t$"
 ##################################################
 ##Overthrow Diarch Scheme Events
 diarchy.0511.t: "$overthrow_regent$: Fracasso"
 diarchy.0511.desc.intro: "Maldição, com sua pele curtida, [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l] escapou dos meus capangas"
 diarchy.0511.desc.discovered: "e, o que é pior, um dos brutamontes foi capturado e #EMP cantó#! ao ser interrogado. Tanto [target.GetFirstNameNoTooltip] quanto [liege.Custom('ES_ElLa')] [liege.GetTitledFirstName|l] sabem exatamente o que eu tentei fazer!"
 diarchy.0511.desc.undiscovered: "mas ao menos os mercenários conseguiram se matar em vez de serem capturados.\n\nNão há nenhum rastro que leve até mim, ao menos não diretamente, e portanto nada que [target.GetFirstNameNoTooltip] ou [liege.Custom('ES_ElLa')] [liege.GetTitledFirstName|l] possam me atribuir."
 diarchy.0511.desc.outro: "\n\nPor enquanto, [target.Custom('ES_ElLa')] [target.GetDiarchTitle] do reino permanece inalterado."
 diarchy.0511.a: "Bah, isso é inútil."
 diarchy.0511.b: "Voltaremos. Vamos pegá-lo da próxima vez."
 diarchy.0521.t: "[liege.Custom('ES_AlAla')|U] nobre [liege.GetTitledFirstName|l],"
 diarchy.0521.desc.discovered: "[owner.Custom('ES_ElLa')|U] canalha [owner.Custom('ES_DelDela')] [owner.GetTitledFirstName|l] tentou mandar me sequestrar e confiscar as ferramentas do meu cargo!\n\nÉ evidente que pretendia me forçar a sair do cargo, tornando-se em vista disso seu[owner.Custom('ES_OA')] [liege.GetDiarchTitle|l]. Este crime repugnante não pode ficar impune."
 diarchy.0521.desc.undiscovered: "Escrevo para informá-lo que houve uma tentativa em minha liberdade — um grupo de rufiões tentou me sequestrar e levar as ferramentas do meu cargo.\n\nQuem os pagou não está claro, mas a manobra parece óbvia o suficiente. Controlar minha pessoa e meu simbolismo como [liege.GetDiarchTitle|l] pode permitir que seu mandante usurpe meu lugar legítimo."
 diarchy.0521.a: "Estou chocad!"
 diarchy.0521.b: "Sobre..."
 diarchy.0531.t: "$overthrow_regent$: Tentativa Fracassada"
 diarchy.0531.desc.intro: "Deslizo-me pelo corredor, com os sons da luta em andamento ainda ecoando em meus ouvidos. Esses mercenários vis pareciam sair das paredes! Completamente desarmad[GetPlayer.Custom('ES_OA')], foi apenas a intervenção oportuna de meus guardas que me permitiu escapar.\n\n"
 diarchy.0531.desc.discovered: "Sob interrogatório, um bandido capturado revela para quem eles estavam trabalhando: ninguém menos que [target.Custom2('MyCharacterIntroduction', owner)]!"
 diarchy.0531.desc.undiscovered: "Em questão de um ou dois minutos, todos estão mortos, e o segredo de quem os pagou morre com eles."
 diarchy.0531.desc.outro: "\n\nEstá claro que ser [target.Custom('ES_ElLa')] [target.GetDiarchTitle|l] me transformou em um alvo. Eu devia ter sabido..."
 diarchy.0531.a.paranoid: "Então #EMP há#! uma conspiração! Eu sabia!"
 diarchy.0531.a.trusting: "Como... como alguém poderia fazer isso?"
 diarchy.0531.a.scheme_discovered: "[owner.GetFirstNameNoTooltip], esse canalha!"
 diarchy.0531.a.scheme_secret: "Haverá outra tentativa. Tenho certeza disso."
 diarchy.0551.t: "$overthrow_regent$: Sucesso"
 diarchy.0551.desc: "Uma operação simples e robusta. Um bando de mercenários a meu serviço capturou noss[target.Custom('ES_OA')] antig[target.Custom('ES_OA')] [owner.GetDiarchTitle|l] em seus aposentos, tirando[target.GetHerHim] do prédio algemad[target.Custom('ES_OA')] e vendad[target.Custom('ES_OA')] em um velho saco.\n\nCom derramamento mínimo de sangue, e usando os selos tirados diretamente da mesa de [target.Custom('ES_DelDela')] [target.GetTitledFirstName|l], preparei uma confissão de uma ladainha de crimes que justificam a transferência de poder. O suficiente para tornar tudo oficial, embora não o bastante para eventualmente me causar problemas com [liege.Custom('ES_ElLa')] [liege.GetTitledFirstName|l] no futuro.\n\nÉ claro, farei questão de entregar a cópia do rascunho para [target.GetFirstNameNoTooltip]. Algo para ler durante seu confinamento."
 diarchy.0551.a: "Suave como seda."
 diarchy.0561.t: "[liege.Custom('ES_AlAla')|U] nobre [liege.GetTitledFirstName|l]"
 diarchy.0561.desc: "Tenho o prazer de informar que [target.Custom('ES_ElLa')] [target.GetTitledFirstName|l] renunciou ao cargo de [liege.GetDiarchTitle|l] em meu favor após uma discussão breve, porém acalorada.\n\nComo seus deveres estavam pesando tanto sobre [target.GetSheHe], ele/ela ficará comigo durante o tempo em que eu exercer meu mandato como [liege.GetDiarchTitle|l]. Pela sua saúde."
 diarchy.0561.a: "É o que é, por enquanto..."
 diarchy.0571.t: "$overthrow_regent$: Preso"
 diarchy.0571.desc.intro: "#EMP Minha cabeça#!. Eu... onde estou? [owner.GetTitledFirstName]?\n\n\"Bom ver que ainda está conosco, [target.GetFirstName]\", [owner.GetSheHe] sorri de lado, atirando um maço de papéis aos meus pés. \"Para sua apreciação: uma lista dos crimes que você admitiu como [owner.GetDiarchTitle|l] antes de me entregar seu cargo. Pensei que gostaria de uma cópia.\"\n\n"
 diarchy.0571.desc.outro.blind: "Não preciso ser capaz de ver as mentiras rabiscadas para saber a extensão da sua fabricação ou intuir que isso já tenha chegado a todos em [liege.GetPrimaryTitle.GetBaseNameNoTier]."
 diarchy.0571.desc.outro.sighted: "Folheio freneticamente o texto rabiscado, página após página de fabricação descarada e interpretação intencionalmente equivocada. Quero negar, negar tudo, mas sei que isso já chegou a todos em [liege.GetPrimaryTitle.GetBaseNameNoTier] agora."
 diarchy.0571.a: "![liege.Custom('ES_ElLa')|U] [liege.GetTitledFirstNameNoTooltip|l] se lembrará disso! Se lembrará!"
 ##################################################
 ##Interactions
 diarchy.8001.t: "[recipient.Custom2('AppropriateGreeting', actor )]"
 diarchy.8001.desc: "Seu pedido para liderar uma expedição em Nosso nome mútuo tem mérito, e assim lhe dou minha sanção. Você pode utilizar os recursos de nossos governadores conforme necessário.\n\nQue o inimigo trema e se quebre diante de suas fileiras."
 diarchy.8001.a: "Por [actor.Custom('GetBestEmpireWithAdjective')]!"
 getbestempirewithadjective.rome: "Gloriosa Roma"
 getbestempirewithadjective.mongolia: "Infinita Mongólia"
 getbestempirewithadjective.outremer: "Abençoado Ultramar"
 getbestempirewithadjective.slavia: "Imensa Slávia"
 getbestempirewithadjective.great_armenia: "Grande Armênia"
 getbestempirewithadjective.india: "Ilimitada Índia"
 getbestempirewithadjective.the_empire: "o Poderoso Império"
 diarchy.8002.t: "[recipient.Custom2('AppropriateGreetingNegative', actor )]"
 diarchy.8002.desc: "Eu preferiria pressionar uma faca contra minha própria garganta a consentir que #EMP você#! controle tal exército fora de minha supervisão.\n\nSeu pedido está negado — e este assunto está #EMP encerrado#!."
 diarchy.8002.a: "Seu tolo de mente fechada!"
 diarchy.8003.t: "[actor.Custom2('AppropriateGreeting', recipient )]"
 diarchy.8003.desc: "Embora governemos juntos, você certamente se lembra de que #EMP me deve#!. Estou cobrando esse favor agora, e em troca você apoiará de todo coração minha próxima expedição para conquistar território das terras estrangeiras."
 diarchy.8003.a: "Que tolo presunçoso!"
 diarchy.8004.t.vetoed: "Expedição Imperial Abortada"
 diarchy.8004.t.planned: "Expedição Imperial Planejada"
 diarchy.8004.desc.vetoed: "Há meses, os rumores vindos da corte imperial sugeriam que [actor.Custom('ES_ElLa')] co[recipient.GetTitleAsNameNoTooltip|l] [actor.GetFirstName] pressionava para lançar uma poderosa empreitada com os exércitos de [recipient.GetPrimaryTitle.GetDefinitiveName], com o objetivo de arrancar títulos da fronteira.\n\nMas agora, de forma súbita e decisiva, esses rumores cessaram.\n\nParece que [recipient.Custom('ES_ElLa')] [recipient.GetTitleAsNameNoTooltip|l] superior, [recipient.GetFirstName], não confia nos motivos de seu colega mais jovem."
 diarchy.8004.desc.planned: "Não é segredo que a corte imperial fervilha com conversas sobre uma grande empreitada militar, o envio dos exércitos do império contra alguma desafortunada nação fronteiriça para conquistar glória e territórios.\n\nEsse tipo de conversa, embora não seja raro, muitas vezes não passa disso… mas desta vez não é o caso. [actor.Custom('ES_ElLa')|U] co[recipient.GetTitleAsNameNoTooltip|l] [actor.GetFirstName] parece estar arquitetando um esforço sério, com a permissão de seu [recipient.GetTitleAsNameNoTooltip|l] superior[recipient.Custom('ES_XA')], [recipient.GetFirstName], para empurrar as fronteiras para frente.\n\n"
 diarchy.8004.desc.planned.forced: "Alegadamente, [actor.GetFirstNameNoTooltip] foi capaz de forçar a mão de seu colega sênior nisso. Pelo menos, é o que dizem os rumores."
 diarchy.8004.desc.planned.allowed: "Que [recipient.Custom('ES_ElLa')] [recipient.GetTitleAsNameNoTooltip|l] superior esteja dispost[recipient.Custom('ES_OA')] a confiar suas tropas a [actor.GetFirstNameNoTooltip] é um sinal inequívoco da enorme confiança entre [Select_CString(And(actor.IsFemale, recipient.IsFemale), 'as duas', 'os dois')]."
 diarchy.8004.a.vetoed: "Pelo menos evitamos uma guerra..."
 diarchy.8004.a.allowed: "Novas terras para competir..."
 diarchy.8005.t: "[attacker.Custom2('AppropriateGreeting', ROOT.Char )]"
 diarchy.8005.desc.boilerplate: "Como voss[attacker.Custom('ES_OA')] [attacker.GetLiege.GetTitleAsNameNoTooltip|l], estou reunindo uma expedição contra os cães covardes de[defender.GetPrimaryTitle.GetDefinitiveName]."
 diarchy.8005.desc: "$diarchy.8005.desc.boilerplate$\n\nSua governadoria faz fronteira com as terras que esperamos tomar, o que significa que você está obrigado a nos ajudar. Convoco você a enviar soldados para a linha de frente imediatamente!"
 diarchy.8005.a: "Mais uma vez ao combate!"
 diarchy.8005.b: "Não participarei da loucura [attacker.Custom('ES_DelDela')] #EMP co#![attacker.GetLiege.GetTitleAsNameNoTooltip|l]."
 diarchy.8006.t: "[attacker.Custom2('AppropriateGreeting', ROOT.Char )]"
 diarchy.8006.desc: "$diarchy.8005.desc.boilerplate$ Embora sua governadoria não faça fronteira com a frente de batalha, #EMP sois#! um[ROOT.Char.Custom('ES_OA')] de [Select_CString(ROOT.Char.IsFemale, 'nossas administradoras', 'nossos administradores' )] militares mais eminentes.\n\nSuas forças podem se unir à guerra, se desejardes sua própria parcela de glória."
 diarchy.8006.a: "$diarchy.8005.a$"
 diarchy.8006.b: "$diarchy.8005.b$"
 diarchy.8011.t: "Uma Gloriosa Expedição!"
 diarchy.8011.desc.all_titles_legally_yours: "Uma vez que a guerra acaba e a poeira baixa, observo as terras que conquistei para o império… e vejo que todas estão, #EMP que coincidência#!claramente dentro da minha jurisdição.\n\nTalvez manobras tão obscuras não tragam glória adicional, mas também não haverá reclamações graves.\n\nNo fim das contas, tudo é perfeitamente legal."
 diarchy.8011.desc.fallback: "A guerra acabou, as terras [defender.Custom('ES_DelDela')] [defender.GetTitledFirstName|l] jazem devastadas e a fronteira foi empurrada para trás mais uma vez.\n\nSó resta decidir como administrar os territórios conquistados.\n\nPor direito, #EMP deveriam#! corresponder [attacker.Custom('ES_AlAla')] [attacker.GetLiege.GetTitledFirstName|l], meu superior[attacker.Custom('ES_XA')], para distribuí-los — uma façanha que #EMP certamente#! reforçará minha influência em [attacker.GetLiege.GetCapitalLocation.GetTitle.GetBaseNameNoTier] — mas não sou eu co[attacker.GetLiege.GetTitleAsNameNoTooltip|l]? Não poderia ficar com eles e distribuí-los eu mesmo, ou nomear habitantes locais gratos pela oportunidade que lhes ofereço?"
 diarchy.8011.a: "Eu conquistei esses territórios, e irei mantê-los."
 diarchy.8011.tt.all_lands_remain_in_your_custody: "Você mantém todos os [vassals|lE] e [titles|lE] conquistados, mas não ganha [influence_i][influence|lE]"
 diarchy.8011.b: "Lutamos pelo império, e a ele pertencem os despojos!"
 diarchy.8011.tt.distribution.lands_given_to_emperor: "Os territórios conquistados serão transferidos para [attacker.Custom('ES_AlAla')] [attacker.GetLiege.GetTitledFirstName|l]"
 diarchy.8011.c: "Talvez eu possa ficar com #EMP um#! prêmio..."
 diarchy.8011.tt.distribution.reserve_prize: "Os territórios conquistados serão transferidos [attacker.Custom('ES_AlAla')] [attacker.GetLiege.GetTitledFirstName|l]; exceto [prize_county.GetBaseNameNoTier] e tudo o que houver em seu [duchy|lE]"
 diarchy.8011.d: "Governadores interinos irão administrar nossas novas terras."
 diarchy.8011.tt.distribution.interim_governors: "Os territórios conquistados são entregues a [characters|lE] locais adequados"
 diarchy.8011.tt.distribution.interim_governors.hook_and_opinion: "Você recebe um [hook|lE] favor de cada novo governador"
 diarchy.8011.e: "Que conveniente acidente."
 diarchy.8011.e.tt.keep_everything_but_legally: "Você mantém todas as terras conquistadas — e ninguém pode dizer que não é justo"
 diarchy_8011.turn_over_titles.tt.titles_to_transfer_all: "[attacker.GetShortUIName|U] [Select_CString(attacker.IsLocalPlayer, 'ganas', 'gana' )] [attacker.MakeScope.ScriptValue('request_imperial_expedition_influence_from_counties_full_value')|P0] de [influence|lE] [influence_i] por [counties|lE] transferidos"
 diarchy_8011.turn_over_titles.tt.vassals_to_transfer_all: "[attacker.GetShortUIName|U] [Select_CString(attacker.IsLocalPlayer, 'ganas', 'gana' )] [attacker.MakeScope.ScriptValue('request_imperial_expedition_influence_from_vassals_full_value')|P0] de [influence|lE] [influence_i] por [vassals|lE] transferidos"
 diarchy_8011.turn_over_titles.tt.titles_to_transfer_prize: "[attacker.GetShortUIName|U] [Select_CString(attacker.IsLocalPlayer, 'ganas', 'gana' )] [attacker.MakeScope.ScriptValue('request_imperial_expedition_influence_from_vassals_prize_value')|P0] de [influence|lE] [influence_i] por [counties|lE] transferidos"
 diarchy_8011.turn_over_titles.tt.vassals_to_transfer_prize: "[attacker.GetShortUIName|U] [Select_CString(attacker.IsLocalPlayer, 'ganas', 'gana' )] [attacker.MakeScope.ScriptValue('request_imperial_expedition_influence_from_counties_prize_value')|P0] de [influence|lE] [influence_i] por [vassals|lE] transferidos"
 diarchy_8011.turn_over_titles.tt.interim_governors.county: "[attacker.GetShortUIName|U] [Select_CString(attacker.IsLocalPlayer, 'ganas', 'gana' )] [attacker.MakeScope.ScriptValue('request_imperial_expedition_influence_from_counties_reduced_value')|P0] de [influence|lE] [influence_i] por [counties|lE] transferidos"
 diarchy_8011.turn_over_titles.tt.interim_governors.vassal: "[attacker.GetShortUIName|U] [Select_CString(attacker.IsLocalPlayer, 'ganas', 'gana' )] [attacker.MakeScope.ScriptValue('request_imperial_expedition_influence_from_vassals_reduced_value')|P0] de [influence|lE] [influence_i] por [vassals|lE] transferidos"
 diarchy.8012.t: "[attacker.Custom2('AppropriateGreeting', ROOT.Char )]"
 diarchy.8012.desc.keeping_all: "Você ficará feliz em saber que minha guerra foi bem-sucedida — #EMP muito#! bem-sucedida, na verdade.\n\nOs territórios conquistados ainda precisarão de uma mão firme e orientadora por algum tempo, e por isso permanecerei para garantir sua boa administração."
 diarchy.8012.desc.turning_over_all: "O valor enaltece [attacker.Custom('GetBestEmpireWithAdjective')] neste dia, e a mim e a você acima de tudo! Nossa expedição foi um verdadeiro sucesso, e as terras que subjugo agora estão à sua disposição.\n\nUm brinde a uma parceria feliz!"
 diarchy.8012.desc.turning_over_most: "Hoje saboreamos a mais doce das vitórias! Com a guerra vencida, já despachei administradores sob seu pagamento pessoal para a maior parte dos territórios conquistados.\n\nEspero que não se importe com o modesto prêmio de [prize_county.GetBaseNameNoTier] e seus territórios adjacentes. Uma pequena compensação por meu sangue e ouro gastos."
 #Death to the Corpse Emperor, etc.
 diarchy.8012.desc.interim_governors: "O caos da guerra deu lugar à doce vitória imperial, e estou feliz em declarar nossa expedição um sucesso!\n\nNo interesse da rapidez, entreguei os territórios conquistados a uma seleção de governadores locais. Eles, sem dúvida, nos servirão lealmente até que decidamos substituí-los — conjuntamente."
 diarchy.8012.desc.legal_shenanigans: "Tenho o prazer de relatar o sucesso de nossa guerra! Os territórios libertados, que ambos podemos concordar que fazem firmemente parte das terras sob meus títulos, certamente prosperarão sob minha administração.\n\nClaro, se houvesse algo mais, você sabe que eu o entregaria, mas, infelizmente..."
 diarchy.8012.tt.keeping_all: "[attacker.GetFirstName] mantém tudo #WEAK (por enquanto)#!, mas não ganha [influence|lE]"
 diarchy.8012.tt.turning_over_all: "[attacker.GetFirstName] entrega todos os [titles|lE] e [vassals|lE] conquistados a você"
 diarchy.8012.tt.turning_over_most: "[attacker.GetFirstName] te entrega a maior parte dos [titles|lE] e [vassals|lE] conquistados, mas fica com um [duchy|lE] para si"
 diarchy.8012.tt.interim_governors: "[attacker.GetFirstName] nomeou governadores locais #WEAK (por enquanto)#! para administrar os territórios conquistados"
 diarchy.8012.tt.legal_shenanigans: "[attacker.GetFirstName] mantém tudo: todos os [titles|lE] e [vassals|lE] farão parte da sua jurisdição, aconteça o que acontecer"
 diarchy.8012.desc.a.keeping_all: "#EMP Desagradecid[attacker.Custom('ES_OA')] ruin e insolente!#!"
 diarchy.8012.desc.a.turning_over_all: "Ahh, governar em sua essência."
 diarchy.8012.desc.a.turning_over_most: "Aceitável."
 diarchy.8012.desc.a.interim_governors: "Hmm, suponho que posso ver a lógica."
 diarchy.8012.desc.a.legal_shenanigans: "Esperto, [attacker.GetFirstNameNoTooltip]. Muito esperto."
 diarchy.8022.t: "Mutilação Política: Deposto"
 diarchy.8022.t.dead: "Execução Política"
 diarchy.8022.desc.intro: "Existem apenas duas maneiras de realmente remover alguém do trono imperial depois de sentar-se nele: morte ou deformidade.\n\n"
 diarchy.8022.desc.dead: "Infelizmente para [recipient.Custom('ES_ElLa')] co[actor.GetTitleAsNameNoTooltip|l] [recipient.GetFirstName], [actor.Custom('ES_ElLa')] [actor.GetTitleAsNameNoTooltip|l] superior, [actor.GetFirstName], escolheu o caminho decididamente mais #EMP infalível#! das duas."
 diarchy.8022.desc.maimed: "Por sorte para [recipient.Custom('ES_ElLa')] co[actor.GetTitleAsNameNoTooltip|l] [recipient.GetFirstName], [actor.Custom('ES_ElLa')] [actor.GetTitleAsNameNoTooltip|l] superior, [actor.GetFirstName], optou pela opção mais misericordiosa das duas."
 diarchy.8022.desc.outro: "\n\nOs rumores se espalham sobre qual de suas muitas desavenças levou [actor.GetFirstNameNoTooltip] a tomar uma medida tão drástica, mas no fundo isso já não importa mais. O que foi feito, foi feito.\n\nTalvez este tenha sido sempre o desfecho mais provável. Afinal, uma coroa não cabe em duas cabeças."
 diarchy.8022.tt.explanation: "[recipient.GetFirstName][Concept('co_emperor', Select_CString(recipient.IsFemale, 'coemperatriz', 'coemperador' ) )|E]"
 diarchy.8022.a: "Um crime revoltante!"
 diarchy.8022.b: "Este foi o melhor fim possível."
 diarchy.8022.c: "Assim é em [actor.GetCapitalLocation.GetTitle.GetBaseNameNoTierNoTooltip]."
 diarchy.8023.t: "Mutilação Política: Usurpação!"
 diarchy.8023.t.dead: "$diarchy.8022.t.dead$"
 diarchy.8023.desc.intro: "Em um ato decisivo de brutalidade, [actor.GetFirstName], antig[actor.Custom('ES_OA')] co[actor.GetTitleAsNameNoTooltip|l] de Sua Majestade Imperial [recipient.GetFirstName], fez"
 diarchy.8023.desc.dead: "executou brutalmente s Senior [actor.GetTitleAsNameNoTooltip|l]."
 diarchy.8023.desc.maimed: "deformou a carne de seu [actor.GetTitleAsNameNoTooltip|l] superior."
 diarchy.8023.desc.outro: "\n\nO simbolismo do ato é tão claro quanto nossas tradições e leis: agora [actor.GetPrimaryTitle.GetDefinitiveName] se curva perante [Select_CString(actor.IsFemale, 'una sola', 'un solo' )] [actor.GetWomanMan]."
 diarchy.8023.desc.outro.alive: "\n\n[recipient.GetFirstNameNoTooltip] terá de se contentar em preservar a vida, e pouco mais."
 diarchy.8023.tt.explanation: "[actor.GetFirstName] dep?e [recipient.GetFirstName] e agora reina como [Select_CString(actor.IsFemale, '?nica', '?nico' )] [actor.GetTitleAsName|l]"
 diarchy.8023.a: "A Casa [actor.GetHouse.GetBaseNameNoTooltip] finalmente ocupa seu lugar de direito!"
 diarchy.8023.b: "Isso é usurpação!"
 diarchy.8023.c: "$diarchy.8022.c$"
 diarchy.8031.t: "[recipient.Custom2('AppropriateGreetingPositive', actor )]"
 diarchy.8031.desc: "Seu pedido é tanto razoável quanto sensato: instruirei os governadores de [target.GetDefinitiveName] para que, doravante, eles o atendam em primeiro lugar.\n\nQue você traga a eles o mesmo nível de governo que busco oferecer ao resto do império."
 diarchy.8031.a: "Ahh, meu império dentro do império."
 diarchy.8032.t: "[recipient.Custom2('AppropriateGreetingNegative', actor )]"
 diarchy.8032.desc: "Sois a segunda pessoa mais poderosa de [recipient.GetPrimaryTitle.GetDefinitiveName], e ainda assim queres #EMP mais#!?\n\nNão, já estamos divididos o bastante com dois governantes [Select_CString(And(actor.IsFemale, recipient.IsFemale), 'supremas', 'supremos')]. Talvez até isso já seja demais."
 diarchy.8032.a: "Isso deveria ser uma parceria!"
 diarchy.8033.t: "[actor.Custom2('AppropriateGreeting', recipient )]"
 diarchy.8033.desc.intro: "Caro [recipient.GetTitleAsNameNoTooltip|l], lamento forçá-lo a assumir tantas responsabilidades em nossa parceria. A partir de agora, tomarei o controle direto de [target.GetName], para gerenciar seus governadores e reunir seu povo, aliviando o peso sobre seus nobres ombros.\n\n"
 diarchy.8033.desc.hook: "Considere sua dívida comigo quitada."
 diarchy.8033.desc.insufficient_influence: "Claro, aprecio sua contribuição em todos os assuntos, mas temo que já tenha resolvido a questão."
 diarchy.8033.tt.influence: "Você não tinha o [influence_i][influence|lE] necessário para resistir ao seu [co_emperor|lE]"
 diarchy.8033.a: "Revoltante!"
 diarchy.8041.t: "Seu soberano[actor.Custom('ES_OA')] [actor.GetFirstName] faz uma declaração pública,"
 diarchy.8041.desc: "Com grande pesar devo admitir que uma verdadeira praga de calamidades assola [actor.Custom('GetBestEmpireWithAdjective')]; nossos esgotos entopem, nossas fronteiras se desfazem e nossos filhos nascem imbecis.\n\nEstes problemas, todos e cada um deles, são, em última análise, culpa do meu supost[recipient.Custom('ES_OA')] #EMP co#![actor.GetTitleAsNameNoTooltip|l] [recipient.GetFirstName], um[recipient.Custom('ES_XA')] canalha que incita o desastre com cada respiração."
 diarchy.8041.a: "Espécie de [actor.Custom2('InsultNoun', ROOT.Char)] arrogante!"
 diarchy.8041.b: "Será que esses dois deveriam realmente brigar publicamente?"
 diarchy.8042.t: "$diarchy.8041.t$"
 diarchy.8042.desc: "Que todos saibam que a miríade de males que assolam o reino —dos estrangeiros à impiedade, passando pelos impostos altos— são #EMP todos#! obra do meu suposto[recipient.Custom('ES_OA')] [recipient.GetTopLiege.GetTitleAsNameNoTooltip|l] #EMP superior#!.\n\nSua gestão incompetente e ineficaz frustra todos os meus atos e piora a vida de vocês a cada dia."
 diarchy.8042.a: "Amaldiço[actor.Custom('ES_OA')] ingrat[actor.Custom('ES_OA')]!"
 diarchy.8042.b: "$diarchy.8041.b$"
 ##################################################
 ##Decisions
 betrayed_by_proxy: "Traído por Procuração"
 diarch_attempt_to_overthrow_liege.event.t: "Um Golpe Muito Aguardado:"
 diarch_attempt_to_overthrow_liege.desc.coup_start_boilerplate: "\n\n\"[liege.GetFirstName]!\", grita [usurper.GetFirstNameNoTooltip], \"Eu o declaro um[liege.Custom('ES_XA')] vulgar pretendente, indign[liege.Custom('ES_OA')] do vosso trono! Entregai-o [Select_CString( usurper.IsFemale, 'à verdadeira', 'ao verdadeiro' )] governante do senhorio: #EMP eu#!.\"\n\nVários cavaleiros de menor patente tentam barrar seu avanço, apenas para serem abertos de cabo a rabo em pouco tempo."
 #Diplomacy: You attempt to bloodlessly coup your liege.
 diarchy.9001.t: "$diarch_attempt_to_overthrow_liege.event.t$ Línguas Prateadas"
 diarchy.9001.desc.intro: "[usurper.Custom2('MyCharacterIntroduction', ROOT.Char)|U] irrompe na minha sala do trono. Atrás dele há uma hoste de figuras influentes da corte, e cada uma empunha uma arma com a serenidade de quem sabe que a ameaça é suficiente. $diarch_attempt_to_overthrow_liege.desc.coup_start_boilerplate$"
 diarchy.9001.desc.proxy.none: "$diarchy.9011.desc.proxy.none$"
 diarchy.9001.desc.proxy.betrayed: "$diarchy.9011.desc.proxy.betrayed$"
 diarchy.9001.desc.proxy.loyal: "$diarchy.9011.desc.proxy.loyal$"
 diarchy.9001.desc.outro: "\n\nEste é o momento em que a traição se revela."
 diarchy.9001.a: "Você acha que meus vassalos leais me abandonariam por #EMP você?#!"
 diarchy.9001.a.tt.success: "Sua oratória despedaça o pacto de [usurper.GetFirstNameNoTooltip]"
 diarchy.9001.a.tt.failure: "Já é um fato consumado"
 diarchy.9001.b.young: "Aponte para [proxy.GetFirstNameNoTooltip] em busca de ajuda."
 diarchy.9001.b.fallback: "[proxy.GetFirstNameNoTooltip], cuide desse [usurper.Custom('ES_EA')] canalha."
 diarchy.9001.b.tt.success: "A oratória de [proxy.GetFirstNameNoTooltip] destrói o pacto de [usurper.GetFirstNameNoTooltip]"
 diarchy.9001.b.tt.failure: "Já é um fato consumado"
 diarchy.9001.c: "Eu... eu não posso fazer nada..."
 diarchy.9001.d: "#DIE2 Guardas!#! #DIE1 Guardas!#! #BER GUARDAS!#!"
 diarchy.9001.d.tt.win: "Soldados leais chegam e dominam os conspiradores"
 diarchy.9001.d.tt.loss: "Seus últimos defensores possíveis são facilmente mortos"
 #Diplomacy: Usurper won, liege-side.
 diarchy.9002.t: "$diarchy.9001.t$"
 diarchy.9002.desc.intro: "Estou arruinad[GetPlayer.Custom('ES_OA')] Arruinadíssimo. Total e absolutamente arruinad[GetPlayer.Custom('ES_OA')] íssimo.\n\n"
 diarchy.9002.desc.proxy.proxy_fought: "[proxy.Custom('ES_ElLa')|U] [proxy.GetTitledFirstName|l] fez o melhor que pôde, mas os argumentos de [usurper.GetFirstName] foram mais fluidos e estavam bem ensaiados. Os traidores permaneceram leais ao seu patrono, e minha corte recuou para permitir acesso irrestrito de [usurper.GetSheHe]."
 diarchy.9002.desc.proxy.self_fought: "Todos os meus esforços resultam infrutíferos. [usurper.GetFirstName|U] passou tempo demais planejando isso, e a cada troca de palavras que fazemos, vejo mais alguns rostos familiares se juntarem ao lado dele. Não adianta. Perdi meu trono."
 diarchy.9002.desc.surrendered: "Sei como essa batalha vai acabar. Se eu lutar com palavras, provarei minha indignidade para governar. Se eu lutar com aço, acabarei capturado[GetPlayer.Custom('ES_OA')] ou algo pior. A única jogada vencedora é não jogar… #EMP por enquanto#!.\n\nNão se enganem, \"[usurper.GetTitleAsName|l]\" [usurper.GetFirstName], voltarei para buscar-vos."
 diarchy.9002.desc.scuffled: "Peço ajuda aos gritos, mas os poucos soldados que chegam são facilmente derrotados pelos conspiradores de [usurper.GetFirstName]. Depois de um tempo, o fluxo de possíveis salvadores seca, e todos podem ver o quão sol[GetPlayer.Custom('ES_OA')] estou."
 diarchy.9002.desc.outro: "\n\n[usurper.Custom('ES_ElLa')|U] usurpador[usurper.Custom('ES_XA')] faz um gesto e, com evidente relutância, quem até há pouco era minha própria guarda me acompanha para fora. Infelizmente, é óbvio de que lado sopra o vento."
 diarchy.9002.a: "Tenho minha liberdade, mas pouco mais."
 diarchy.9002.b: "Meu destino. Desfeito."
 #Diplomacy: Usurper won, usurper-side.
 diarchy.9003.t: "$diarchy.9001.t$"
 diarchy.9003.desc.intro: "Acabou. Agora eu governo com plena autoridade e só.\n\n"
 diarchy.9003.desc.proxy.proxy_fought: "Quando entramos no salão, noss[liege.Custom('ES_OA')] [usurper.GetTitleAsNameNoTooltip|l] até então, [liege.GetFirstName], enviou seu lacaio, [proxy.Custom2('MyCharacterIntroduction', ROOT.Char)], para abalar a determinação da minha comitiva. Lutamos com palavras tão afiadas quanto qualquer adaga, mas, no fim, todos puderam ver que a corte estava comigo."
 diarchy.9003.desc.proxy.self_fought: "Nosso[liege.Custom('ES_OA')] então ainda [usurper.GetTitleAsNameNoTooltip|l], [liege.GetFirstName], nos enfrentou pessoalmente quando meu séquito e eu entramos no salão do trono. Preciso reconhecer que ele fez um último esforço para recuperar a lealdade de seus cortesãos vacilantes, mas seus gritos caíram em ouvidos surdos e seus gestos encontraram apenas olhos cegos.\n\nLogo todos puderam ver quem era #EMP de verdade#! [usurper.Custom('ES_ElLa')] [usurper.Custom('MistressMaster')|l] daquele salão."
 diarchy.9003.desc.surrendered: "No fim, foi meio anticlimático. Quando meu grupo e eu entramos na sala, todos sabíamos por que estávamos ali e a que tínhamos vindo. Não houve resistência, muito menos por parte [liege.Custom('ES_DelDela')] então [usurper.GetTitleAsNameNoTooltip|l] [liege.GetFirstName], e eu mal precisei usar qualquer parte do discurso que havia preparado."
 diarchy.9003.desc.scuffled: "Assim que entramos no salão do trono, [usurper.Custom('ES_ElLa')] até então [usurper.GetTitleAsNameNoTooltip|l], [liege.GetFirstName] começou a berrar sua indignidade diante de todos, clamando aos gritos que alguém, qualquer um, [liege.GetHerHim] o salvasse. Nem sequer havíamos sacado nossas armas, embora isso não nos impedisse de passar à espada com rapidez os poucos guardas que chegaram. Simplesmente, não havia mais ninguém do lado de [liege.GetFirstNameNoTooltip]."
 diarchy.9003.desc.outro: "\n\nOs guardas se dispersaram e os nobres se ajoelharam. Mesmo agora, a palavra está se espalhando por todo o [usurper.GetPrimaryTitle.GetTierAsName|l], lealdades se deslocando para fora como ondulações em um lago."
 diarchy.9003.a: "E tudo isso sem derramar uma gota de sangue no #EMP meu#! trono!"
 diarchy.9003.a.some_blood: "E aqui estava eu, tentando evitar derramamento de sangue."
 #Diplomacy: Liege won, liege-side.
 diarchy.9004.t: "$diarchy.9001.t$"
 diarchy.9004.desc.proxy.proxy_fought: "Assim que [proxy.Custom('ES_ElLa')] [proxy.GetTitledFirstName|l] começa a falar, os traidores começam a ruir.\n\nA causa [usurper.Custom('ES_DelDela')] [usurper.GetTitledFirstName|l], unida mais pela ânsia de poder a qualquer custo do que por quaisquer noções sérias de lealdade, não demora a desmoronar diante dos próprios olhos."
 diarchy.9004.desc.proxy.self_fought: "Minhas palavras encontram seu alvo rapidamente, cada provocação cuidadosamente formulada desfaz os laços de ganância e ambição que são a única coisa que mantém unida a coalizão [usurper.Custom('ES_DelDela')] [usurper.GetTitledFirstName|l].\n\nSem união, sua causa está perdida, e traidores e mercenários, por igual, começam a se afastar em massa de [usurper.GetFirstNameNoTooltip]."
 diarchy.9004.desc.scuffled: "Meus gritos atraem para o salão todos os cavaleiros de baixo escalão e aspirantes a soldado que estão ao alcance da voz, muito mais guerreiros do que a banda [usurper.Custom('ES_DelDela')] [usurper.GetTitledFirstName|l] poderia enfrentar.\n\nEclode uma breve e violenta escaramuça, com os conspiradores mortos ou capturados e seu líder desarmad[usurper.Custom('ES_OA')]."
 diarchy.9004.desc.outro: "\n\nPermito-me dar um sorriso enquanto os guardas prendem [usurper.GetHerHim], e faço um gesto para que levem embora esse[usurper.Custom('ES_EA')] bastardo[usurper.Custom('ES_OA')]."
 diarchy.9004.a: "Que traidorzinho desprezível[usurper.Custom('ES_OA')] desprezível."
 #Diplomacy: Liege won, usurper-side.
 diarchy.9005.t: "$diarchy.9001.t$"
 diarchy.9005.desc.intro: "Falhei. Falhei completamente.\n\nNo início, tudo ia tão bem…"
 diarchy.9005.desc.proxy.proxy_fought: "com [liege.Custom('ES_ElLa')] [liege.GetTitledFirstName|l] clamando freneticamente por ajuda de [proxy.Custom('ES_DelDela')] [proxy.GetTitledFirstName|l]. Meu séquito me seguia, com o propósito claro e passos longos.\n\nEntão, aquele maldito chanceler abriu a boca, e tudo começou a desmoronar. Um a um, os nobres que me haviam seguido recuaram, até que fiquei sol[GetPlayer.Custom('ES_OA')], com a autoridade que eu havia construído laboriosamente desabando ao meu redor.\n\nOs guardas me prenderam rapidamente depois disso."
 diarchy.9005.desc.proxy.self_fought: "com meu grupo e eu confiantes em nossa vitória evidente. Isso só durou até o momento em que [liege.GetFirstNameNoTooltip] abriu a boca, para começar a nos atacar, a expor os pontos fracos do meu plano, as sutis falhas da minha autoridade.\n\nPensei que estava no controle total. Não percebi o quanto estava errad[GetPlayer.Custom('ES_OA')] até que os guardas me agarraram."
 diarchy.9005.desc.scuffled: "quando [liege.Custom('ES_AlAla')] [liege.GetTitledFirstName|l] entrou em pânico no momento em que meu grupo e eu entramos no salão do trono, com nosso propósito claro, e começou a gritar sobre uma tentativa de assassinato.\n\nEu… subestimei a lealdade de alguns mercenários e guardas contratados ao seu pagador[liege.Custom('ES_XA')]. Se lançaram sobre nós. Minhas belas palavras não significaram nada diante de uma paulada de um mercenário, e agora estou enclausurad[GetPlayer.Custom('ES_OA')] sob sete chaves."
 diarchy.9005.desc.outro: "\n\nEm um giro irônico, minha única esperança é a clemência [usurper.Custom('ES_DelDela')] mism[usurper.Custom('ES_OA')] senhor[usurper.Custom('ES_XA')] a quem tentei usurpar. Que [usurper.GetFaith.FateGodName] tenha piedade de mim."
 diarchy.9005.a: "Todo o meu planejamento cuidadoso!"
 #Intrigue: You attempt to coup your liege with just a little bloodshed, threatened and actual.
 diarchy.9011.t: "$diarch_attempt_to_overthrow_liege.event.t$ Facas Afiadas"
 diarchy.9011.desc.intro: "[usurper.Custom2('MyCharacterIntroduction', ROOT.Char)|U] irrompe no meu salão do trono. Às suas costas, há uma turba de nobres menores da corte, mercenários e ladrões, com adagas desembainhadas e sangue em suas mentes. $diarch_attempt_to_overthrow_liege.desc.coup_start_boilerplate$"
 diarchy.9011.desc.proxy.none: "Eu olho ao redor, procurando apoio entre meus conselheiros. Não há nenhum, ou nenhum disposto e qualificado para falar por mim."
 diarchy.9011.desc.proxy.betrayed: "Dou uma olhada ao redor, buscando apoio entre meus conselheiros. [proxy.Custom('ES_ElLa')|U] [proxy.GetTitledFirstName|l] encontra meu olhar frio e acerado, e se coloca atrás de [usurper.GetFirstNameNoTooltip]. Outra traição."
 diarchy.9011.desc.proxy.loyal: "Miro [proxy.Custom('ES_AlAla')] [proxy.GetTitledFirstName|l] em busca de apoio e vejo que já está se preparando para falar em meu nome."
 diarchy.9011.desc.outro: "$diarchy.9001.desc.outro$"
 diarchy.9011.a: "Você realmente pensa que me encurralou, pequena serpente?"
 diarchy.9011.a.tt.success: "Você mina a unidade do pacto, fazendo-o desmoronar"
 diarchy.9011.a.tt.failure: "Ignorando suas provocações, você é capturado[GetPlayer.Custom('ES_OA')]"
 diarchy.9011.b.young: "$diarchy.9001.b.young$"
 diarchy.9011.b.fallback: "$diarchy.9001.b.fallback$"
 diarchy.9011.b.tt.success: "[proxy.GetFirstNameNoTooltip] enfraquece a unidade do pacto, fazendo-o ruir"
 diarchy.9011.b.tt.failure: "Sem fazer caso aos gritos de [proxy.GetFirstName], você é feito prisioneiro[GetPlayer.Custom('ES_OA')]"
 diarchy.9011.c: "$diarchy.9001.c$"
 diarchy.9011.d: "$diarchy.9001.d$"
 diarchy.9011.d.tt.win: "$diarchy.9001.d.tt.win$"
 diarchy.9011.d.tt.loss: "$diarchy.9001.d.tt.loss$"
 #Intrigue: Usurper won, liege-side.
 diarchy.9012.t: "$diarchy.9011.t$"
 diarchy.9012.desc.intro: "$diarchy.9002.desc.intro$"
 diarchy.9012.desc.proxy.proxy_fought: "[proxy.GetTitledFirstName] dá um passo à frente por mim, e [proxy.GetSheHe] e [usurper.GetFirstName] trocam alfinetadas de um lado para o outro, mas sem resultado. Es[usurper.Custom('ES_EA')] desgraçad[usurper.Custom('ES_OA')] tomou todas as precauções, fez todos os subornos e acionou todos os contatos. Por fim, [proxy.GetFirstNameNoTooltip] se atira contra [usurper.GetFirstNameNoTooltip], mas a panelinha de [usurper.GetHerHis] o derruba no chão."
 diarchy.9012.desc.proxy.self_fought: "[usurper.GetFirstName] e eu discutimos verbalmente por minutos, mas não sou páreo para [usurper.GetSheHe]. É[usurper.Custom('ES_EA')] maldit[usurper.Custom('ES_OA')] tomou todas as precauções, aceitou todos os subornos, acionou todos os contatos.\n\nLevo a mão ao punho da minha arma, pront[GetPlayer.Custom('ES_OA')] para me defender, apenas para que uma lâmina se enrole ao redor do meu pescoço por trás. Um maldito guarda traidor."
 diarchy.9012.desc.surrendered: "[usurper.GetFirstName] parece quase decepcionad[usurper.Custom('ES_OA')] pela minha falta de resistência, mas sei que é inútil lutar contra [usurper.GetSheHe]. Não estaria aqui, agindo contra mim tão descaradamente, se [usurper.GetSheHe] não tivesse já todas as espadas do prédio ao seu lado e apontando para alguém que não esteja."
 diarchy.9012.desc.scuffled: "Os guardas que chamei chegam, mas ao entrarem na sala, a primeira onda é abatida pela segunda, esfaqueada pelas costas ou com as gargantas cortadas onde estão. [usurper.GetFirstName] não consegue esconder o sorriso que se estampa [usurper.Custom('MaskFace_BehindAcross')] seu [usurper.Custom('MaskFace')]."
 diarchy.9012.desc.outro: "\n\nGrito enquanto os traidores vêm atrás de mim, com as adagas em punho e as algemas pendendo da mão de [usurper.GetFirstNameNoTooltip].\n\nNinguém escuta. Ninguém se importa. Vejo-me algemad[GetPlayer.Custom('ES_OA')] e arrastad[GetPlayer.Custom('ES_OA')] dali."
 diarchy.9012.a: "Vocês não podem fazer isso! Sou [usurper.Custom('ES_ElLa')] [usurper.GetTitleAsNameNoTooltip|l]! #EMP [usurper.Custom('ES_ElLa')|U] [usurper.GetTitleAsNameNoTooltip]!"
 diarchy.9012.b: "$diarchy.9002.b$"
 #Intrigue: Usurper won, usurper-side.
 diarchy.9013.t: "$diarchy.9011.t$"
 diarchy.9013.desc.intro: "$diarchy.9003.desc.intro$"
 diarchy.9013.desc.proxy.proxy_fought: "[liege.GetFirstName] enviou seu capanga, [proxy.Custom('ES_ElLa')] [proxy.GetTitledFirstName|l], para convencer meus conspiradores a se afastarem de mim. Discutimos verbalmente por alguns minutos antes que [proxy.GetSheHe], exasperad[proxy.Custom('ES_OA')], tentasse avançar contra mim, mas foi imobilizad[proxy.Custom('ES_OA')] por um dos meus mercenários.\n\nNosso[liege.Custom('ES_OA')] ainda senhor[liege.Custom('ES_XA')] estava chocad[liege.Custom('ES_OA')] para resistir enquanto lhe colocávamos as algemas."
 diarchy.9013.desc.proxy.self_fought: "[liege.GetFirstName] tentou me desafiar, tentando minar o apoio do meu grupo no momento crucial, mas desviei com facilidade suas míseras provocações. Afinal de contas, ninguém deve jamais dar um golpe pela metade.\n\nQuando [liege.GetFirstNameNoTooltip] tentou sacar sua arma, sem dúvida com a esperança de arrancar minha cabeça, um dos meus traidores o imobilizou por trás. Colocar as algemas foi um jogo de criança."
 diarchy.9013.desc.surrendered: "Fiquei decepcionad[GetPlayer.Custom('ES_OA')] quando [liege.GetFirstName] não ofereceu nenhuma resistência, além de um gritinho de raiva quando [liege.GetHerHim] algemamos.\n\nCom certeza, foi a escolha mais #EMP inteligente#!, mas desde quando [liege.GetSheHe] optou pela #EMP inteligência#!?"
 diarchy.9013.desc.scuffled: "[liege.GetFirstName] pediu ajuda, mas, naturalmente, eu já havia previsto isso. Os tolos o bastante para responder ao chamado foram abatidos pelos meus traidores quase de imediato.\n\nNinguém mais sequer tentou ajudar enquanto avançávamos em direção a [Select_CString( liege.IsFemale, 'nuestra antigua señora', 'nuestro antiguo señor' )]."
 diarchy.9013.desc.outro: "\n\nCom a oposição na corte morta ou aprisionada e m ex-[usurper.GetTitleAsNameNoTooltip|l] sob custódia, o futuro parece promissor."
 diarchy.9013.a: "Um novo trono e um[liege.Custom('ES_XA')] nov[liege.Custom('ES_OA')] refém: já me sinto segur[GetPlayer.Custom('ES_OA')]."
 #Intrigue: Liege won, liege-side.
 diarchy.9014.t: "$diarchy.9011.t$"
 diarchy.9014.desc.proxy.proxy_fought: "Algumas palavras bem colocadas de [proxy.GetFirstName] e $diarchy.9014.desc.proxy.self_fought$"
 diarchy.9014.desc.proxy.self_fought: "o grupinho convencido [usurper.Custom('ES_DelDela')] [usurper.GetTitledFirstName|l] se desfaz em questão de instantes.\n\nComo qualquer ninho de víboras, eles têm tanta vontade de cravar os dentes uns nos outros quanto em mim, e não é preciso muita provocação para que alguns desertem ou comecem a lutar entre si.\n\nO sorriso de [usurper.GetFirstNameNoTooltip] vacila ao perceber que a tentativa de golpe já está arruinada…"
 diarchy.9014.desc.scuffled: "Aos meus gritos, chegam guardas em um número que surpreende até a #EMP mim#! e se lançam em grupo contra [usurper.Custom('ES_ElLa')] [usurper.GetTitledFirstName|l] e sua turba de conspiradores.\n\nOs traidores não demoram muito para perceber que estão irremediavelmente em desvantagem numérica e vencidos, e começam a depor as armas um a um. [usurper.Custom('ES_ElLa')|U] [usurper.GetTitledFirstNameNoTooltip|l] é [Select_CString( usurper.IsFemale, 'a última', 'o último' )] a fazê-lo."
 diarchy.9014.desc.outro: "\n\nQuando meus guardas se aproximam de [usurper.GetSheHe] para prender[usurper.GetHerHim] , ele/ela se deixa capturar. Com a conspiração desfeita, qualquer outra ação seria suicídio."
 diarchy.9014.a: "Decidirei o que fazer com #EMP você#! mais tarde."
 #Intrigue: Liege won, usurper-side.
 diarchy.9015.t: "$diarchy.9011.t$"
 diarchy.9015.desc.intro: "$diarchy.9005.desc.intro$"
 diarchy.9015.desc.proxy.proxy_fought: "Éramos fortes, estávamos unidos, preparados para as justas recompensas que nossos planos nos trariam. Até que es[proxy.Custom('ES_EA')] condenad[proxy.Custom('ES_OA')] [proxy.GetTitledFirstName|l] deu um passo à frente para interceder por seu lerd[liege.Custom('ES_OA')] senhor[liege.Custom('ES_XA')]. Eu… eu não estava preparado para os argumentos que apresentou, nem para as falhas que abriu em meus cuidadosos planos. Eles me deixaram. Todos me deixaram."
 diarchy.9015.desc.proxy.self_fought: "entramos como um só e poderoso grupo, adagas em mãos e prontos para a culminação. Eu não deveria ter deixado falar a [liege.GetFirstName], nunca deveria ter deixado que falasse com tanta eloquência! Cada uma de suas frases foi um argumento que dilacerou todas as desculpas que eu havia cuidadosamente preparado; cada ideia, uma punhalada no coração de nossa unidade. Um a um, meus camaradas foram se afastando."
 diarchy.9015.desc.scuffled: "Invadimos o salão do trono, prontos para fazer o que precisava ser feito. Até os gritos de [liege.GetTitledFirstName] trouxeram hordas de possíveis defensores, muito mais do que eu jamais teria imaginado que tomariam o partido de es[liege.Custom('ES_EA')] idiota. Meus mercenários mal tentam lutar e largam as armas assim que veem o quão em desvantagem numérica estamos."
 diarchy.9015.desc.outro: "\n\nCom a conspiração se desintegrando ao meu redor, não faço movimento algum para resistir quando os guardas se aproximam para me prender. Tenho sorte de não ser executado aqui e agora."
 diarchy.9015.a: "Todo aquele #EMP trabalho#! Desperdiçado."
 #Prowess: You try to slaughter your way to power.
 diarchy.9021.t: "$diarch_attempt_to_overthrow_liege.event.t$ Gleaming Swords"
 diarchy.9021.desc.intro: "[usurper.Custom2('MyCharacterIntroduction', ROOT.Char)|U] irrompe na minha sala do trono, apoiado por um grupo de mercenários, espadachins e traidores da corte. Armas em punho e prontos para matar quantas pessoas forem necessárias, seu objetivo sangrento brilha em seus olhos. $diarch_attempt_to_overthrow_liege.desc.coup_start_boilerplate$"
 diarchy.9021.desc.proxy.none: "$diarchy.9011.desc.proxy.none$"
 diarchy.9021.desc.proxy.betrayed: "$diarchy.9011.desc.proxy.betrayed$"
 diarchy.9021.desc.proxy.loyal: "Olho para [proxy.Custom('ES_ElLa')] [proxy.GetTitledFirstName|l] em busca de apoio, apenas para ver que já está se preparando para lutar por mim."
 diarchy.9021.a: "Seu patife! Eu mesmo vou te eliminar!"
 diarchy.9021.a.tt.commence_duel.self: "Você duelará em [Concept( 'single_combat_duel', 'combate singular' )|E] com [usurper.GetShortUIName] imediatamente"
 diarchy.9021.a.tt.success: "Você executa seu agressor"
 diarchy.9021.a.tt.failure: "[usurper.GetSheHe|U] te derrota no chão da sala do trono"
 diarchy.9021.b.young: "$diarchy.9001.b.young$"
 diarchy.9021.b.fallback: "$diarchy.9001.b.fallback$"
 diarchy.9021.b.tt.commence_duel.proxy: "Haverá imediatamente um [Concept( 'single_combat_duel', 'combate singular' )|E] entre [proxy.GetShortUIName] e [usurper.GetShortUIName]"
 diarchy.9021.c: "$diarchy.9001.c$"
 diarchy.9021.d: "$diarchy.9001.d$"
 diarchy.9021.d.tt.win: "$diarchy.9001.d.tt.win$"
 diarchy.9021.d.tt.loss: "$diarchy.9001.d.tt.loss$"
 #Prowess: Usurper won, liege-side.
 diarchy.9022.t: "$diarchy.9021.t$"
 diarchy.9022.desc.intro: "$diarchy.9002.desc.intro$"
 diarchy.9022.desc.proxy.proxy_fought: "[proxy.GetTitledFirstName] lutou o melhor que pôde, mas [usurper.GetFirstName] [proxy.GetHerHim] massacrou mesmo assim. Não… Não consigo acreditar que [Select_CString( proxy.IsFemale, 'uma mulher', 'um homem' )] como [proxy.GetSheHe] deu a própria vida por mim… #EMP em vão#!."
 diarchy.9022.desc.scuffled: "Meus guardas se apressam para a sala, mas [usurper.GetFirstName] escolheu bem seus conspiradores, e os mercenários e espadachins de sua companhia eliminam meus defensores quase assim que eles chegam. Eles... eles não chegarão a tempo. Eles #EMP não podem#!."
 diarchy.9022.desc.proxy.surrendered: "Apesar dos meus protestos, alguns guardas e mercenários tentam resistir às forças de [usurper.GetFirstName], mas são abatidos aos poucos. Atordoados pelo barulho, muitos dos guardas da minha casa correm para a sala do trono, mas vacilam ao ver o que está acontecendo."
 diarchy.9022.desc.outro: "\n\nSem me dar tempo para mais nada, [usurper.Custom('ES_ElLa')] usurpador[usurper.Custom('ES_XA')] avança a passos largos na minha direção, [usurper.Custom('signature_weapon')] ainda ensopada em sangue. É o fim."
 diarchy.9022.desc.outro.surrendered: "\n\nMinha última esperança se extingue quando o primeiro dos meus soldados juramentados se ajoelha diante de [usurper.Custom('ES_ElLa')] nov[usurper.Custom('ES_OA')] [usurper.GetTitleAsName|l].\n\nAcabou."
 diarchy.9022.a: "Você irá diretamente para [liege.GetFaith.random_NegativeAfterLife] por isso, [usurper.GetFirstNameNoTooltip]."
 diarchy.9022.b: "$diarchy.9002.b$"
 #Prowess: Usurper won, usurper-side.
 diarchy.9023.t: "$diarchy.9021.t$"
 diarchy.9023.desc.intro: "$diarchy.9003.desc.intro$"
 diarchy.9023.desc.proxy.proxy_fought: "O cadáver [proxy.Custom('ES_DelDela')] [proxy.GetTitledFirstName|l] cai de lado. A violência deve ser respondida com violência, e [liege.GetFirstName] escolheu seu caminho.\n\nEnquanto [usurper.Custom('ES_ElLa')] [usurper.GetTitleAsNameNoTooltip|l] ainda está atordoad[usurper.Custom('ES_OA')] com a morte de seu campe[proxy.Custom('ES_OnOna')] avanço a passos largos e [usurper.Custom('SignatureWeaponWoundVerb5')] [usurper.Custom('signature_weapon')] na garganta.\n\nNão é a morte mais rápida, mas também não é lenta. A corte e eu o vemos morrer sem dizer palavra, e [liege.GetHerHim] o atiro do trono."
 diarchy.9023.desc.proxy.self_fought: "Com meu poder assegurado e meu ex[liege.GetTitleAsNameNoTooltip|l] [liege.GetFirstNameNoTooltip] morto[liege.Custom('ES_OA')] em minhas mãos, há pouca oposição restante para que eu tome meu assento legítimo, exceto por alguns pigarros constrangidos da corte reunida."
 diarchy.9023.desc.surrendered: "Para minha surpresa, [liege.GetFirstName] se rende. Eu esperava ter de matar[liege.GetHerHim] mas parece que ele valoriza a coroa mais do que a própria vida.\n\nA maioria da minha corte zomba quando arrastam diante deles [liege.Custom('ES_AlAla')] ex[usurper.GetTitleAsNameNoTooltip|l] e [liege.GetHerHim] o tiram da sala do trono para abrir espaço para #EMP mí#!.\n\nBem, uma abdicação voluntária, por mais inesperada que seja, também me serve. É mais… legítima."
 diarchy.9023.desc.scuffled: "Como era de se esperar, [liege.GetFirstName] chamou os guardas assim que invadimos a sala do trono. Infelizmente para os tolos azarados de plantão, sou um [usurper.Custom('ES_LoLa')] s que planeja com antecedência, então minha comitiva avançou em massa e matou os recém-chegados.\n\nEnquanto meus soldados venciam a escaramuça, avancei contra [liege.GetFirstNameNoTooltip], que ainda gritava, e [usurper.Custom('SignatureWeaponWoundVerb5')] [usurper.Custom('signature_weapon')] em sua garganta.\n\nA morte encerra rapidamente o restante da luta, anunciada pelo som de eu arremessar meu [Select_CString( liege.IsFemale, 'antigua señora', 'antiguo señor' )] do trono."
 diarchy.9023.desc.outro: "\n\nTer o cadáver de [liege.GetFirstNameNoTooltip] enfriando-se no chão da sala do trono talvez seja uma maneira imprópria de começar meu reinado, mas necessária. E, no fim das contas, muito menos sangrenta do que uma guerra civil.\n\nEspero que o reino veja isso assim."
 diarchy.9023.a: "Algumas mortes aqui irão salvar vidas por todo o [usurper.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]."
 diarchy.9023.a.liege_survives: "Começando meu reinado com magnanimidade."
 #Prowess: Liege won, liege-side.
 diarchy.9024.t: "$diarchy.9021.t$"
 diarchy.9024.desc.proxy.proxy_fought: "Infelizmente, estou longe demais de [usurper.Custom('ES_DelDela')] [usurper.GetTitledFirstName] para ouvir sua maldição de morte, mas tenho o prazer de vê-lo expirar.\n\n[proxy.Custom('ES_ElLa')|U] [proxy.GetTitledFirstName|l] lutou bem a meu serviço, massacrando [usurper.Custom('ES_AlAla')] traidor[usurper.Custom('ES_XA')] aos pés do meu trono com uma facilidade quase desdenhosa. O ato incute determinação em meus guardas e despedaça o grupo de conspiradores. O que se segue são alguns minutos de derramamento de sangue desesperado enquanto os rebeldes vão sendo abatidos."
 diarchy.9024.desc.proxy.self_fought: "O cadáver [usurper.Custom('ES_DelDela')] [usurper.GetTitledFirstName|l] jaz despedaçado diante de mim, assassinad[usurper.Custom('ES_OA')] por minha própria mão.\n\nTomado por um pânico cego, o grupo de conspiradores se desmorona e tenta fugir, mas meus próprios guardas se sentem fortalecidos pelo meu sucesso e avançam contra eles. O que se segue são alguns minutos de derramamento de sangue desesperado, com os rebeldes sendo abatidos um a um."
 diarchy.9024.desc.scuffled: "Por sorte, meus oportunos gritos de socorro atraíram uma verdadeira #EMP horda#! de tropas leais e mercenários das salas próximas. Apesar de que o grupo de traidores [usurper.Custom('ES_DelDela')] [usurper.GetTitledFirstName|l] lutou bem, logo foram sobrepujados.\n\nVi morrer [usurper.GetFirstNameNoTooltip], um[usurper.Custom('ES_OA')] dos últimos a cair. Havia pânico em seu olhar quando o aço cintilava ao redor de [usurper.GetSheHe].\n\nAssim se paga a traição."
 diarchy.9024.desc.outro: "\n\nEspero que as notícias se espalhem rapidamente pelo resto do [liege.GetPrimaryTitle.GetTierAsName], e espero que isso sirva de lição para futuros usurpadores."
 diarchy.9024.a: "Abatido[usurper.Custom('ES_OA')] como [usurper.Custom('ES_ElLa')] maldito imundo[usurper.Custom('ES_OA')] que era."
 #Prowess: Liege won, usurper-side.
 diarchy.9025.t: "$diarchy.9021.t$"
 diarchy.9025.desc: "Assim que invadimos o salão do trono, um grito de pânico de [liege.Custom('ES_DelDela')] [liege.GetTitledFirstName|l] traz para cá uma verdadeira torrente de cavaleiros armados, ansiosos para morrer por sua [liege.Custom('MistressMaster')|l].\n\nMeu grupo e eu abrimos caminho entre a multidão de futuros cadáveres como podemos, mas são muitos. Temos que recuar, voltar atrás... por [usurper.GetFaith.FateGodName], também estão atrás de nós! Não... não há saída.\n\nNão, não, #EMP não!#! Tanta preparação, tanto esforço, tudo em vão!"
 diarchy.9025.a: "Não era para terminar desse jei-#BER AAARGGH!#!"
 ##################################################
 ##Vizierate Events
 vizierate.1001.t: "[propositioner.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 vizierate.1001.desc.intro: "Você concordará que [vizier.GetFirstName] está se mostrando um[vizier.Custom('ES_XA')] grão-vizir horrível, uma vergonha totalmente corrupta para o cargo, mas eu passei uma quantidade considerável de tempo e dinheiro preparando um plano para"
 vizierate.1001.desc.diplomacy: "trazer para o meu lado seus principais apoiadores e melhores agentes."
 vizierate.1001.desc.stewardship: "tentar burlar os seus interesses comerciais e subornar os seus guardas."
 vizierate.1001.desc.intrigue: "obstruir seus melhores guardas e capturar[vizier.GetHerHim] para torturá-lo."
 vizierate.1001.desc.outro: "Me nomeie vizir em vez disso, e deixe-me transformar #EMP os ativos #! em #EMP seu#! ouro."
 vizierate_1001_duel_for_vizierate_effect.tt.success: "O plano de [propositioner.GetFirstNameNoTooltip] funciona"
 vizierate_1001_duel_for_vizierate_effect.tt.failure: "[propositioner.GetFirstNameNoTooltip] sucumbe a uma catástrofe política"
 vizierate_1001_duel_for_vizierate_effect.tt.ex_vizier_remains_at_court: "[vizier.GetFirstName] permanece no seu [court|lE]"
 vizierate.1001.a: "Este plano pode funcionar..."
 vizierate.1001.b: "Essas finanças parecem complicadas..."
 vizierate.1001.c: "Arriscado, muito arriscado..."
 vizierate.1001.d: "Que conveniente enviar uma carta que posso compartilhar com [vizier.GetFirstNameNoTooltip]!"
 vizierate.1001.d.tt.filtered_out: "Será #EMP mucho#! muito menos provável que [propositioner.Custom('ES_ElLa')] [propositioner.GetTitledFirstName|l] herde [diarchy|lE] qualquer diarquia com você"
 vizierate.1001.e: "Sua política civil mesquinha está abaixo de mim."
