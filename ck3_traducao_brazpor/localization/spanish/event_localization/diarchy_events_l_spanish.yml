 ##Vizier Candidate Politicking Relation Reasons
 #We invert these relation reasons because they're always sent from the POV of the recipient, not the actor.
 vizierate_0001.reason.best_friend.saved_from_assassin: "[TARGET_CHARACTER.GetShortUIName|U] [TARGET_CHARACTER.LocalPlayerString( 'salvou', 'salvou' )] salvou [CHARACTER.LocalPlayerString( 'tu persona', CHARACTER.GetShortUIName )] de que um rival menor [CHARACTER.LocalPlayerString( 'te', 'le' )] o assassinasse na corte."
 vizierate_0001.reason.best_friend.saved_from_assassin_corresponding: "[CHARACTER.GetShortUIName|U] [CHARACTER.LocalPlayerString( 'salvou', 'salvou' )] [TARGET_CHARACTER.LocalPlayerString( 'tu persona', CHARACTER.GetShortUIName )] de que um rival menor [TARGET_CHARACTER.LocalPlayerString( 'te', 'le' )] o assassinasse na corte."
 vizierate_0001.reason.best_friend.natural_working_arrangement: "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] [TARGET_CHARACTER.LocalPlayerString( 'os compenetráis', 'se compenetran' )] com naturalidade e facilidade, o que [TARGET_CHARACTER.LocalPlayerString( 'os', 'les' )] os torna aliados firmes e amigos alegres."
 vizierate_0001.reason.best_friend.mutually_assured_destruction: "É um segredo de polichinelo que [TARGET_CHARACTER.GetShortUIName] e [CHARACTER.GetShortUIName] [CHARACTER.LocalPlayerString( 'sabéis', 'saben' )] algo #EMP incomprensible#! um sobre o outro e, curiosamente, esse risco compartilhado só fez com que [CHARACTER.LocalPlayerString( 'acercaros', 'acercarles' )]."
 vizierate_0001.reason.best_friend.mutually_assured_destruction_corresponding: "É um segredo que corre à boca pequena que [TARGET_CHARACTER.GetShortUIName] e [CHARACTER.GetShortUIName] [Select_CString(Or(TARGET_CHARACTER.IsLocalPlayer, CHARACTER.IsLocalPlayer), 'sabéis', 'saben')] algo #EMP incomprensible#! um do outro e, curiosamente, esse risco compartilhado só fez com que [TARGET_CHARACTER.LocalPlayerString( 'acercaros', 'acercarles' )]."
 vizierate_0001.reason.best_friend.natural_compliments: "As personalidades de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'sua pessoa', TARGET_CHARACTER.GetShortUIName )] e a de [Select_CString( CHARACTER.IsLocalPlayer, 'sua pessoa', CHARACTER.GetShortUIName )] se complementam perfeitamente."
 vizierate_0001.reason.best_friend.snarky_bffs: "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] não [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'podéis', 'pueden' )] evitar [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'lanzaros', 'lanzarse' )] alfinetadas e ironias, seja em particular ou em público. As farpas podem ser afiadas, mas por trás de cada uma há um sorriso."
 vizierate_0001.reason.friend.enemy_of_my_enemy: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'criou laços', 'criou laços' )] com [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUIName )] por causa do ódio compartilhado a um rival político."
 vizierate_0001.reason.friend.unlikely_friendship: "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'iniciaram', 'iniciaram' )] uma amizade baseada mais em diferenças refrescantes do que em ter algo em comum."
 vizierate_0001.reason.friend.foiled_conspiracy_together: "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'os unisteis', 'se unieron' )] brevemente para frustrar uma conspiração que [Select_CString( CHARACTER.IsLocalPlayer, 'os', 'les' )] ameaçava ambos, e [Select_CString( CHARACTER.IsLocalPlayer, 'habéis', 'han' )] permanecido em contato próximo desde então."
 vizierate_0001.reason.friend.foiled_conspiracy_together_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'os unisteis', 'se unieron' )] brevemente para frustrar uma conspiração que [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'te', 'os' )] ameaçava ambos, e [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'habéis', 'han' )] permanecido em estreito contato desde então."
 vizierate_0001.reason.friend.similar_personalities: "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] às vezes [Select_CString( CHARACTER.IsLocalPlayer, 'se parecem', 'se parecem' )] tanto que não é de admirar que [Select_CString( CHARACTER.IsLocalPlayer, 'se deem', 'se deem' )] tão bem."
 vizierate_0001.reason.friend.similar_personalities_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] às vezes [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'se parecem', 'se parecem' )] tanto que não é de se admirar que [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'se deem', 'se deem' )] tão bem."
 vizierate_0001.reason.friend.shared_pastimes: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'criou laços', 'criou laços' )] com [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUIName )] por hobbies compartilhados que continuam aproximando ambos."
 vizierate_0001.reason.friend.shared_pastimes_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'criou laços', 'criou laços' )] com [CHARACTER.GetShortUIName] por passatempos compartilhados que continuam aproximando ambos."
 vizierate_0001.reason.friend.policy_interests: "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'tomaram', 'tomaram' )] o mesmo lado em uma disputa sobre política e se mantiveram próximos desde então."
 vizierate_0001.reason.friend.friends_at_party: "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'chegaram', 'chegaram' )] a um acordo após uma série de eventos da corte."
 vizierate_0001.reason.friend.accidental_movement: "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'fizeram parte', 'fizeram parte' )] de um movimento cortesão efêmero. Ele desapareceu, mas [Select_CString( CHARACTER.IsLocalPlayer, 'sua', 'sua' )] aliança permanece."
 vizierate_0001.reason.friend.co_own_business: "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] [CHARACTER.LocalPlayerString( 'firmaram', 'firmaram' )] amizade após investir no mesmo negócio."
 vizierate_0001.reason.friend.unexpected_aid.fiscal: "[TARGET_CHARACTER.GetShortUIName|U] perdoou inesperadamente uma dívida que [CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'tinha', 'tinha' )] e eles mantiveram uma boa amizade desde então."
 vizierate_0001.reason.friend.unexpected_aid.fiscal_corresponding: "[CHARACTER.GetShortUIName|U] perdoou inesperadamente uma dívida que [TARGET_CHARACTER.GetShortUIName] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'tinha', 'tinha' )] e eles mantiveram uma boa amizade desde então."
 vizierate_0001.reason.friend.unexpected_aid.physical: "[TARGET_CHARACTER.GetShortUIName|U] e [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'seus', 'seus' )] guardas [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'vieram', 'vieram' )] em auxílio de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUIName )] durante uma altercação num beco."
 vizierate_0001.reason.friend.unexpected_aid.physical_corresponding: "[CHARACTER.GetShortUIName|U] e [Select_CString( CHARACTER.IsLocalPlayer, 'seus', 'seus' )] guardas [Select_CString( CHARACTER.IsLocalPlayer, 'vieram', 'vieram' )] em auxílio de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetShortUIName )] durante uma altercação em um beco."
 vizierate_0001.reason.friend.unexpected_aid.social: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'resgatou', 'resgatou' )] [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUIName )] de uma terrível gafe em um evento social crucial."
 vizierate_0001.reason.friend.unexpected_aid.social_corresponding: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'resgatou', 'resgatou' )] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetShortUIName )] de uma terrível gafe em um evento social crucial."
 vizierate_0001.reason.friend.unexpected_aid.intrigue: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'veio', 'veio' )] em auxílio de [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUIName )] durante uma intriga política tortuosa e [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'permaneceram', 'permaneceram' )] aliados."
 vizierate_0001.reason.friend.unexpected_aid.intrigue_corresponding: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'veio', 'veio' )] em auxílio de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetShortUIName )] durante uma intriga política tortuosa e [Select_CString( CHARACTER.IsLocalPlayer, 'permaneceram', 'permaneceram' )] aliados."
 vizierate_0001.reason.friend.fellow_minority.culture: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [CHARACTER.LocalPlayerString( 'criaram laços', 'criaram laços' )] por dificuldades culturais compartilhadas na corte."
 vizierate_0001.reason.friend.fellow_minority.faith: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(TARGET_CHARACTER.IsLocalPlayer, CHARACTER.IsLocalPlayer), 'criaram laços', 'criaram laços')] por uma marginalização religiosa compartilhada na corte."
 vizierate_0001.reason.rival.enemy_of_my_friend: "[TARGET_CHARACTER.GetShortUIName|U] [TARGET_CHARACTER.LocalPlayerString( 'iniciou', 'iniciou' )] uma inimizade com [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUIName )] quando [Select_CString( CHARACTER.IsLocalPlayer, 'entrou em conflito', 'entrou em conflito' )] com um dos [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'seus', 'seus' )] aliados."
 vizierate_0001.reason.rival.enemy_of_my_friend_corresponding: "[CHARACTER.GetShortUIName|U] [CHARACTER.LocalPlayerString( 'iniciou', 'iniciou' )] uma rixa com [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetShortUIName )] quando [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'entrou em conflito', 'entrou em conflito' )] com um de [Select_CString( CHARACTER.IsLocalPlayer, 'seus', 'seus' )] aliados."
 vizierate_0001.reason.rival.probable_rivalry: "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'têm', 'têm' )] personalidades tão contrastantes que era apenas uma questão de tempo até que a política da corte os colocasse em conflito."
 vizierate_0001.reason.rival.probable_rivalry_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'têm', 'têm' )] personalidades tão diferentes que era apenas questão de tempo até que entrassem em conflito."
 vizierate_0001.reason.rival.victim_of_conspiracy: "[TARGET_CHARACTER.GetShortUIName] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'culpa', 'culpa' )] [Select_CString( CHARACTER.IsLocalPlayer, 'você', CHARACTER.GetShortUIName )] de uma conspiração na corte que [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'te', 'le' )] custou muito caro."
 vizierate_0001.reason.rival.victim_of_conspiracy_corresponding: "[CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'culpa', 'culpa' )] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'você', TARGET_CHARACTER.GetShortUIName )] de uma conspiração na corte que [Select_CString( CHARACTER.IsLocalPlayer, 'te', 'le' )] custou muito caro."
 vizierate_0001.reason.rival.too_similar: "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName], apesar das semelhanças, não [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'deixam', 'deixam' )] de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'se importunar', 'se importunar' )] sem cessar."
