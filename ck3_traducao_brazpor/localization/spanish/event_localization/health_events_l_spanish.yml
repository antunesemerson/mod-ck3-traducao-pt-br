l_spanish:
 fire_court_physician_effect.tt: "[THIS.Char.GetShortUIName] não é mais [GetCourtPositionType('court_physician_court_position').GetName()|l]"
 #Recovery events, by Linnéa Thimrén and Petter Vilberg
 health.0001.desc: "Minha Ferida Sarou"
 health_wounded_title: "Ferid:"
 health.0002.t: "$health_wounded_title$ Cicatrização"
 health.0002.desc: "Minhas lesões estão melhorando aos poucos, e a dor já não é mais minha constante companheira. Ainda estou enfraquecid, mas hoje sou capaz de muitas coisas que eram impossíveis há apenas um mês."
 health.0002.a: "Aguardo ansiosamente minha recuperação completa."
 health.0003.t: "$health_wounded_title$ Por um Triz"
 health.0003.desc: "Parece que o pior já passou. Minhas feridas abertas e ossos quebrados começaram a se unir lentamente."
 health.0003.a: "Eu talvez consiga sobreviver a isso."
 health.0004.t: "$health_wounded_title$ O Fogo Acaba"
 health.0004.desc: "A pele ao redor está endurecida, mas a sensação de queimação em minha ferida passou. Parece que a infecção se foi."
 health.0004.a: "Agradeço a [ROOT.Char.GetFaith.HealthGodName]."
 health.wounded_1_success: "Tratamento de Ferida Bem-sucedido"
 health.wounded_1_failure: "Tratamento de Ferida Mal-sucedido"
 #Becoming wounded, by Linnéa Thimrén and Petter Vilberg
 health.0102.t: "$health_wounded_title$ Corte Profundo"
 health.0102.desc: "A dor percorre meu corpo a cada passo, e até o menor dos movimentos me deixa ofegante. Ao levar uma mão para tocar delicadamente minha ferida, ela sai ensanguentada, e tremo enquanto o sangue escorre pelo meu lado."
 health.0102.court_physician.desc: "\n\n\"Não se preocupe, [ROOT.Char.Custom('FormOfAddressForLiege')]. Sua ferida é profunda, mas meu conhecimento é mais profundo ainda\"."
 health.0102.a: "Só preciso sentar por um tempo..."
 health.0104.t: "$health_wounded_title$ Gravemente Ferid"
 health.0104.desc: "Será que vejo um osso embutido em minha carne, ou algo que deveria estar escondido ainda mais fundo? Enquanto minha pele se abre como as mandíbulas famintas da morte, fico hipnotizad pelo rio de sangue que jorra."
 health.0104.court_physician.desc: "\n\n\"Estais gravemente ferid[ROOT.Char.Custom('ES_OA')], [ROOT.Char.Custom('FormOfAddressForLiege')]. Precisamos cuidar de você imediatamente!\""
 health.0104.a: "[ROOT.Char.GetFaith.HealthGodName|U], liberte-me dessa dor!"
 #Infection/gangrene, by Linnéa Thimrén and Petter Vilberg
 health.0201.desc: "Ferida Infectada"
 health.0202.t: "$health_wounded_title$ Uma Mancha Interna"
 health.0202.desc: "Sinto como se cem facas estivessem cortando minha ferida! Com a carne escurecendo e o sangue ficando pálido, fica claro que a lesão está infectada."
 health.0202.unintelligent: "É como se muitas facas cortassem minha pele ao redor da ferida sempre que a toco. A carne está sensível, e acho que o sangue está com a cor errada."
 health.0202.court_physician.desc: "\n\n\"Sua ferida infeccionou, [ROOT.Char.Custom('FormOfAddressForLiege')]. Mas não se preocupe. Eu o ajudarei a superar isto\"."
 health.0202.a: "Espero sobreviver a isso."
 health.0203.desc: "Ferida Gangrenada"
 health.0204.t: "$health_wounded_title$ Notícias Sombrias"
 health.0204.desc: "Uma ferida deve doer, e algum inchaço não é incomum, então assumi que minha ferida estava cicatrizando. No entanto, agora há bolhas marcando minha pele, e o vermelho está se tornando preto. Meu corpo está apodrecendo diante dos meus olhos!"
 health.0204.court_physician.desc: "\n\n\"Contraístes gangrena, [ROOT.Char.Custom('FormOfAddressForLiege')]. Isso é muito grave... Precisamos tratá-l[ROOT.Char.Custom('ES_OA')] imediatamente!\""
 #Disease Contraction, by Mathilda Bjarnehed
 health.1001.t: "[SCOPE.Custom('EventTitleDisease')]: Meu Corpo Mortal"
 health.1001.desc: "[ROOT.Char.GetTitleAsNameNoTooltip] ou camponês, nobre ou plebeu, tanto faz. No fim, todos somos mortais.\n\nSou lembrado disso quando acordo tossindo nas primeiras horas da manhã, com uma dor surda pulsando em minha cabeça e garganta. Meu corpo é assolado por calafrios e fraqueza, e meus fluidos escorrem por todos os orifícios da cabeça.\n\n"
 health.1001.nophysician.desc: "Certamente deve haver alguém no reino que eu possa procurar para resolver esta condição amaldiçoada..."
 health.1001.court_physician.desc: "\"Ouvi você ofegando do outro extremo da [ROOT.Char.Custom('GetCourt')], [ROOT.Char.Custom('FormOfAddressForLiege')]\", [physician.GetFirstName], meu médic[physician.Custom('ES_OA')], enfia a cabeça na minha [ROOT.Char.Custom('GetChamber')|l], \"se precisar, conheço uma boa quantidade de remédios adequados\"."
 health.1001.a: "Tudo o que quero é ficar na cama..."
 health.1001.b: "Eu devo voltar para casa #EMP imediatamente!#!"
 health.1002.t: "[SCOPE.Custom('EventTitleDisease')]: Afiada como uma Faca"
 health.1002.desc: "Respirar é algo tão fácil, maravilhoso - um pequeno milagre que raramente nos damos conta. Agora, enquanto luto para manter a respiração regular e os ataques de tosse são seguidos por uma dor aguda no peito, está constantemente em minha mente."
 health.1002.court_physician.desc: "\n\nMeu médic[physician.Custom('ES_OA')]; [physician.GetFirstName]; me examina de cima a baixo. \"É pneumonia, [ROOT.Char.Custom('FormOfAddressForLiege')]. Não deve ser tomada de ânimo leve. Como devemos proceder?\""
 health.1002.a: "Por favor, não deixe que seja o fim!"
 health.1003.t: "[SCOPE.Custom('EventTitleDisease')]: O Preço da Indulgência"
 health.1003.court_amenities_gout.desc: "Minha corte é conhecida por ter refeições luxuriantes e incessantes. Conforme meus pés começam a inchar, fica claro que muitos de nós também terão que se preparar para uma dor incessante."
 health.1003.desc: "Chamam isso de \"a doença dos reis\", como se houvesse algo luxuoso ou invejável em minhas articulações inchadas e doloridas.\n\nEm especial, meu dedão do pé está dolorosamente inchado, e isso me faz mancar.\n\nQuando as dores chegam ao auge, não posso evitar desejar ser um[ROOT.Char.Custom('ES_XA')] simples camponês[ROOT.Char.Custom('ES_OA')]."
 health.1003.court_physician.desc: "\n\nMeu médic[physician.Custom('ES_OA')][physician.GetFirstName], coloca algumas pomadas ao meu lado. “Contais com minha simpatia, [ROOT.Char.Custom('FormOfAddressForLiege')]. Tenho algumas ideias que poderiam aliviar os sintomas da sua gota”."
 health.1003.a: "Traga-me algumas pomadas! Rápido!"
 health.1004.t: "[SCOPE.Custom('EventTitleDisease')]: Olhares Evitados"
 health.1004.desc: "Os primeiros sintomas foram sutis, e rapidamente os coloquei de lado. Talvez eu estivesse com medo demais para ver a verdade. No entanto, essa horrenda marca no meu rosto, essa lesão... É algo que não posso mais ignorar.\n\nMeus [ROOT.Char.Custom('GetCourtierPlural')|l] ainda seguem minhas ordens, mas algo mudou no modo como olham para mim. Será que há medo em seus olhos? Piedade? Nojo?"
 health.1004.court_physician.desc: "\n\n\"Sinto muito, [ROOT.Char.Custom('FormOfAddressForLiege')], a lepra é uma aflição permanente. No entanto, tenho métodos para aliviar seus sintomas\"."
 health.1004.a: "O que fiz para merecer essa maldição?"
 health.1005.t: "[SCOPE.Custom('EventTitleDisease')]: Febre do Acampamento"
 health.1005.desc: "Ouvi histórias sobre valentes soldados caindo como moscas antes mesmo de pôr os pés no campo de batalha. Mas um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] como eu? Esse pesadelo dolorido e febril não é um destino para mim.\n\nEnquanto mais uma refeição força seu caminho pela minha garganta, rezo por redenção, com as narinas ardendo pelo forte fedor da bile."
 health.1005.court_physician.desc: "\n\n\"Não se preocupe, [ROOT.Char.Custom('FormOfAddressForLiege')]! O tifo tem tratamento, eu asseguro.\"."
 health.1005.a: "Imploro, que isso acabe!"
 health.1006.t: "[SCOPE.Custom('EventTitleDisease')]: Pouco a Pouco"
 health.1006.desc: "Uma mancha vermelha, tão contrastante contra o tecido pálido. Eu a encaro incrédula, suprimindo outra tosse. Teria...? Eu teria...?\n\nEu limpo meus dedos nos lábios, minha mão tremendo quando a afasto. Sinto a umidade quente, mas temo olhar."
 health.1006.court_physician.desc: "\n\n\"Temo que tenha contraído tuberculose, [ROOT.Char.Custom('FormOfAddressForLiege')]. Vou tratá-l[ROOT.Char.Custom('ES_OA')] imediatamente.\""
 health.1006.a: "Este é o meu destino? Definhar lentamente?"
 health.1007.t: "[SCOPE.Custom('EventTitleDisease')]: Um Estranho Interior"
 health.1007.desc: "Há algo dentro de mim que não sou eu. Ele devora meu corpo, alimentando-se da minha força vital, aumentando sua força enquanto eu definho.\n\nPressiono minhas mãos contra o crescimento sob minha pele, meus dedos doendo para arrancá-lo. A ideia de que ele está crescendo me faz querer vomitar."
 health.1007.court_physician.desc: "\n\n\"Sim, infelizmente, é câncer. Conheço apenas um tratamento eficiente...\""
 health.1007.a: "Contra esse inimigo, não há vitória possível."
 health.1008.t: "[SCOPE.Custom('EventTitleDisease')]: O Fogo do Amor"
 health.1008.desc: "A ardência na virilha ficou tão insuportável que tive de me desculpar para fugir para o meu [ROOT.Char.Custom('GetChamber')|l]. Quando finalmente fiquei sozinho, pude me coçar em busca de alívio.\n\nMas não houve alívio algum, pois meus dedos encontraram bolhas e as abriram!"
 health.1008.partner.a: "[infecting_partner.GetFirstNameNoTooltip]...!"
 health.1008.no_partner.a: "Como? Quem?!"
 health.1013.t: "[SCOPE.Custom('EventTitleDisease')]: A Grande Peste"
 health.1013.desc: "Pensei que fossem apenas algumas bolhas. Embora estivesse enojado, amaldiçoando minha má sorte, nunca imaginei que pioraria. Agora, uma erupção vermelha está se espalhando pelo meu corpo.\n\nEu sei o que vem a seguir. Feridas, febre, todo tipo de dor e atrofia. E no final - se eu viver o suficiente - perderei minha sanidade."
 health.1013.court_physician.desc: "\n\n\"[ROOT.Char.Custom('FormOfAddressForLiege')|U]. Isso… não parece nada bom. Deixe-me ver o que posso fazer\"."
 health.1013.partner.a: "Você me amaldiçoou, [infecting_partner.GetFirstNameNoTooltip]."
 health.1013.no_partner.a: "Estou amaldiçoado. Verdadeiramente e completamente amaldiçoado."
 health.1014.t: "[SCOPE.Custom('EventTitleDisease')]: A Descida"
 health.1014.desc: "Onde estou?\n\nFico olhando para o corredor vazio à minha frente, com o coração disparado e as mãos tremendo. Como cheguei aqui? Minha mente está… fragmentada. Há imagens — escadas, quedas, sombras nos cantos — mas não consigo juntá-las.\n\nAlguém me observa.\n\nDou meia-volta, apenas para encontrar mais vazio."
 health.1014.a: "Não tenho medo de você. Está me ouvindo?! NÃO TENHO MEDO!"
 health.1010.t: "[SCOPE.Custom('EventTitleDisease')]: A Peste Vermelha"
 health.1010.desc: "Com a primeira onda de febre e vômito, eu esperava desesperadamente que não fosse algo pior do que a doença do suor. E eu melhorei um pouco, levantei da cama, retornei às minhas obrigações. Por uma semana, tudo estava bem - até que notei as primeiras manchas vermelhas na minha boca."
 health.1010.end.desc: "\n\nIsso foi há dois dias, e agora as lesões características estão se espalhando pela minha pele..."
 health.1010.court_physician.desc: "\n\n\"De fato, essas lesões são um sinal claro de varíola. Muito perigoso se não for tratado.\""
 health.1010.a: "[ROOT.Char.GetFaith.HealthGodName], imploro a você, ainda não! Eu não estou pronto!"
 health.1011.t: "[SCOPE.Custom('EventTitleDisease')]: O Toque do Ceifador"
 health.1011.desc: "O medo da peste me acompanhou constantemente ao longo da vida. Mesmo quando era pequen[ROOT.Char.Custom('ES_OA')]\n\nMas a peste já não é apenas uma história assustadora. Com cuidado, pressiono os dedos contra o caroço em minha axila. Uma força sombria e mortal está contaminando minha carne, me consumindo enquanto ainda respiro."
 health.1011.court_physician.desc: "\n\n\"[ROOT.Char.Custom('FormOfAddressForLiege')|U], farei tudo ao meu alcance, mas talvez seja prudente se preparar para o pior…\""
 health.1011.a: "Oh, [ROOT.Char.GetFaith.HealthGodName]! Salve-me deste pesadelo!"
 #Travel loc if you get ill on the road
 health.travel.t: "[SCOPE.Custom('EventTitleDisease')]: O Fim de uma Jornada?"
 health.travel.option.home: "Posso buscar o melhor cuidado em casa."
 health.travel.option.home.flavor: "Você abandona sua [ROOT.Char.GetInvolvedActivity.GetNameNoTooltip|l] e começa a viajar para casa."
 health.travel.option.continue: "Devemos seguir em frente."
 #Recover from diseases, by Mathilda Bjarnehed
 health.1101.t: "[SCOPE.Custom('EventTitleDisease')]: Meu Antigo Eu"
 health.1101.desc: "Ao acordar esta manhã e observar os primeiros raios de sol, levei um momento para perceber que dormi profundamente pela primeira vez em semanas. Não acordei tossindo nenhuma vez!\n\nFoi uma longa jornada de volta à saúde, mas me encontro mais uma vez em seu caloroso abraço."
 health.1101.a: "Estou feliz por estar bem novamente."
 health.1102.t: "[SCOPE.Custom('EventTitleDisease')]: Minha Força Retornando"
 health.1102.desc: "Devo admitir, em um certo momento eu temi por minha vida, mas agora essa angústia é apenas uma lembrança pálida. Cheio de gratidão, respiro fundo, me preparando para o dia que virá."
 health.1102.a: "Hora de conquistar o mundo!"
 health.1103.t: "[SCOPE.Custom('EventTitleDisease')]: Livre da Dor"
 health.1103.desc: "Eu tive que me controlar e abrir mão de muitos prazeres da vida, mas é um sacrifício que eu faria novamente com prazer. Há outras coisas para aproveitar na vida além de comida e bebida!\n\nAgora, quando minhas dores não me atrapalham mais, finalmente estou livre para buscá-las."
 health.1103.a: "A moderação valeu a pena!"
 health.1105.t: "[SCOPE.Custom('EventTitleDisease')]: Uma Batalha Vencida"
 health.1105.desc: "Diferentemente de muitos antes de mim, eu fui forte o suficiente para sobreviver aos estragos da temida febre do acampamento. Foi um desafio brutal, não nego, mas eu perseverei!"
 health.1105.a: "Eu vivo para lutar mais um dia!"
 health.1106.t: "[SCOPE.Custom('EventTitleDisease')]: Uma Segunda Chance"
 health.1106.desc: "Fui definhando, tossi e sangrei. Pensei que me consumiria até desaparecer. Sem dúvida, eu me sentia assim quando mal conseguia sair da cama.\n\nNo entanto, recuperei a saúde e as forças, ainda que aos poucos. E, enfim, estou pront[ROOT.Char.Custom('ES_OA')] para enfrentar o mundo e todos os seus desafios."
 health.1106.a: "Hora de conquistar o mundo!"
 health.1107.t: "[SCOPE.Custom('EventTitleDisease')]: Um Milagre Médico"
 health.1107.desc: "Dizem que sou uma maravilha, um milagre. As pessoas não deveriam se recuperar de algo assim.\n\nNo entanto, me sinto bem, e o caroço se foi. Não há outra conclusão - me recuperei do câncer."
 health.1107.a: "Vou viver a vida ao máximo!"
 health.1109.t: "[SCOPE.Custom('EventTitleDisease')]: Um Grande Alívio"
 health.1109.desc: "Eu temia que a Grande Praga levasse minha vida, mas parece que venci a luta. Estive sem sintomas por muitos meses. É hora de abandonar essa preocupação constante."
 health.1109.a: "Vou viver a vida ao máximo!"
 health.1110.t: "[SCOPE.Custom('EventTitleDisease')]: Escapando de [ROOT.Char.GetFaith.DeathDeityName]"
 health.1110.desc: "Embora cicatrizes possam permanecer, tanto na minha pele quanto na minha mente, parece que a aflição deixou meu corpo. Eu sobreviverei. Ainda há tempo."
 health.1110.a: "Glória a [ROOT.Char.GetFaith.HealthGodName]! Estou bem!"
 health.1110.a.tt: "Agora sou imune à [GetTrait('smallpox').GetName( GetNullCharacter )]"
 health.1111.t: "[SCOPE.Custom('EventTitleDisease')]: Contra Todas as Probabilidades"
 health.1111.desc: "Parece como se [ROOT.Char.GetFaith.DeathDeityName] tivesse cruzado minha porta, rondado ao lado da minha cama, mas no fim decidido deixar-me viver. Nunca esquecerei os tormentos do toque de [ROOT.Char.GetFaith.DeathDeityName], mas [ROOT.Char.GetFaith.DeathDeitySheHe|U] abriu meus olhos para o milagre da vida.\n\n A peste reivindicou muitas almas, mas eu não serei uma delas."
 health.1111.a: "Louvado seja [ROOT.Char.GetFaith.HealthGodName] por este milagre!"
 health.1111.a.tt: "Agora sou imune à [GetTrait('bubonic_plague').GetName( GetNullCharacter )]"
 #STD events, by Mathilda Bjarnehed
 health.2001.t: "[SCOPE.Custom('EventTitleDisease')]: Uma Desagradável Surpresa"
 health.2001.start.desc: "Quando me meti entre os lençóis para me juntar a [std_partner.GetFirstName], fiquei horrorizado ao ver bolhas purulentas nas partes mais íntimas dele!"
 health.2001.not_sick.desc: "Como pôde trazer uma aflição tão repugnante para nosso leito?"
 health.2001.sick.desc: "Fui eu que fiz isso com [std_partner.GetHerHim]?"
 health.2001.a.not_sick: "Saia da minha cama, [std_partner.Custom2('InsultNounSexual', ROOT.Char)] desleal!"
 health.2001.a.sick: "Perdoe-me, [std_partner.GetFirstNameNoTooltip], mas não posso compartilhar sua cama assim."
 health.2001.c.not_sick: "A mera ideia de tocar em você... Não posso!"
 health.2001.c.sick: "Perdoe-me, [std_partner.GetFirstNameNoTooltip], não podemos continuar assim."
 health.2001.d.not_sick: "Eu te perdoo, [std_partner.GetFirstNameNoTooltip]."
 health.2001.d.sick: "Meu querido, não consigo expressar o quanto sinto muito!"
 health.2001.c.tt: "Continuo visitando a cama de [std_partner.GetFirstName], arriscando a infecção ao fazer isso"
 health.2001.c.tt_sick: "Continuo visitando a cama de [std_partner.GetFirstName]"
 health.2002.t: "[SCOPE.Custom('EventTitleDisease')]: Ainda Pior"
 health.2002.start.desc: "O que [std_partner.GetFirstName] insistia que eram apenas bolhas finalmente mostrou sua verdadeira face. Uma erupção vermelha está se espalhando pela sua pele - um sinal claro da Grande Praga."
 health.2002.early_great_pox.desc: "\n\nIsso significa...?"
 health.2002.a.not_sick: "Afaste-se de mim!"
 health.2002.a.sick: "Eu... eu não posso. Isso é demais!"
 health.2002.b.not_sick: "Não posso estar com você assim, [std_partner.GetFirstName]!"
 health.2002.b.sick: "Querido, sinto muito, mas não posso..."
 health.2002.c: "Ficarei ao seu lado nisso, meu amor."
 health.2002.d.not_sick: "Isso poderia ter sido o meu fim."
 health.2002.d.sick: "Estamos amaldiçoados!"
 health.2003.t: "[SCOPE.Custom('EventTitleDisease')]: Abandonad"
 health.2003.start.desc: "Quando contei minha doença a [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('other_partner'))], busquei seu consolo, mas recebi sua rejeição. O nojo brilhava no olhar de quando [other_partner.GetSheHe]"
 health.2003.consort.desc: "me disse para ficar longe de sua cama."
 health.2003.lover.desc: "terminou tudo entre nós."
 health.2003.a: "Será que tudo será tirado de mim?"
 #Courtier/guest/prisoner has contagious disease
 health.2101.t: "[SCOPE.Custom('EventTitleDisease')]: Um Assassino em Nosso Meio"
 health.2101.smallpox_outbreak.desc: "A maldição da morte caiu sobre minha corte - um caso de varíola foi descoberto!"
 health.2101.smallpox_spreads.desc: "Mais uma alma foi amaldiçoada com varíola."
 health.2101.bubonic_plague_outbreak.desc: "[ROOT.Char.GetFaith.DeathDeityName|U] ergueu sua foice sobre meu reino - um caso da temida peste bubônica foi descoberto!"
 health.2101.bubonic_plague_spreads.desc: "Mais uma alma está à beira da morte, os terríveis bubões deformando a sua pele."
 health.2101.typhus_outbreak.desc: "Um perigoso caso de tifo se infiltrou na corte. Erupções cutâneas, tosse e febre acometem os afligidos."
 health.2101.typhus_spreads.desc: "Outro caso de tifo surgiu."
 health.2101.consumption_outbreak.desc: "Tosses intensas ecoam pela corte. A tuberculose percorre os corredores, reivindicando sua primeira vítima."
 health.2101.consumption_spreads.desc: "Mais almas infelizes se veem nas garras da tuberculose."
 health.2101.measles_outbreak.desc: "A erupção que se desenvolveu na pele dos afligidos era evidente: sarampo foi descoberto na corte."
 health.2101.measles_spreads.desc: "Cada vez mais pessoas adoecem e desenvolvem as erupções avermelhadas na pele que denunciam a presença do sarampo."
 health.2101.dysentery_outbreak.desc: "O fedor ao redor do local conta sua própria história. Disenteria foi descoberta na corte."
 health.2101.dysentery_spreads.desc: "Mais casos de disenteria continuam a surgir, os sanitários ocupados dia e noite."
 health.2101.ergotism_outbreak.desc: "O ergotismo se manifestou na corte, os movimentos espasmódicos da vítima tornando óbvio para todos presentes."
 health.2101.ergotism_spreads.desc: "Mais casos de ergotismo continuam a derrubar vítimas, incendiando seus membros sob a pele."
 health.2101.imporant.desc: "Meu/minha pobre [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('sick_character'))] [sick_character.GetFirstName] está lutando pela vida."
 health.2101.prisoner.desc: "A infeliz vítima é [sick_character.GetTitledFirstName|l] um[sick_character.Custom('ES_OA')] de meus prisioneiros."
 health.2101.courtier_or_guest.desc: "A vítima infeliz é meu [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('sick_character'))] [sick_character.GetTitledFirstName|l]."
 health.2101.immune.desc: "\n\nEmbora eu seja imune aos estragos desta doença devastadora, a presença de [sick_character.GetFirstName] representa um perigo para todos os demais em minha corte."
 health.2101.not_immune.desc: "\n\nA corrupção que habita sua carne é um perigo para todos nós. Enquanto [sick_character.GetSheHe] continuar afetad[sick_character.Custom('ES_OA')], ninguém na corte estará seguro."
 health.2101.a: "Isole[sick_character.Custom('ES_LoLa')] e rezem pela redenção."
 health.2101.a.tt: "A doença se espalhará livremente na minha corte."
 health.2101.b: "![sick_character.Custom('ES_AlAla')] [sick_character.GetTitledFirstNameNoTooltip|l] é banido da minha corte!"
 health.2101.c: "Fora!"
 #Important character has dangerous disease events, by Mathilda Bjarnehed
 health.2201.t: "[SCOPE.Custom('EventTitleDisease')]: meu pobre [ROOT.GetCharacter.Custom2('RelationToMeShort', SCOPE.sC('sick_character'))|U]"
 health.2201.start.desc: "Chegam-me notícias terríveis. Minha [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('sick_character'))] [sick_character.GetFirstName] adoeceu de"
 disease_ill_article: "$articleblank_blank$"
 disease_ill: "resfriado."
 disease_pneumonic: "pneumonia."
 disease_gout_ridden: "gota."
 disease_leper: "lepra."
 disease_typhus: "tifóide."
 disease_consumption: "tuberculose."
 disease_cancer: "câncer."
 disease_lovers_pox: "pústulas dos amantes."
 disease_early_great_pox: "pústulas dos amantes."
 disease_great_pox: "pústulas grandes."
 disease_smallpox: "varíola."
 disease_bubonic_plague: "peste bubônica."
 disease_measles: "sarampo."
 disease_ergotism: "fogo sagrado."
 disease_dysentery: "fluxo sanguinolento."
 missing_illness: "#D Doença ausente #!"
 health.2201.minor_disease.desc: "\n\nNormalmente, uma afecção menor não seria motivo de grande preocupação, mas a saúde de [std_partner.GetFirstName] é tão frágil que isso pode ser demais para [sick_character.Custom('ES_ElElla')]."
 health.2201.leprosy.desc: "\n\nEmbora talvez viva muitos anos, sua deformidade fará com que seja evitado e alvo de desconfiança. Nem eu consigo reprimir meu nojo ao pensar nas lesões que se espalham por toda a sua pele…"
 health.2201.lethal_disease.desc: "\n\nEsta aflição mata sem piedade, derruba o jovem e o velho, o pobre e o rico, o homem e a mulher. Temo que este seja o fim. Só um milagre pode salvar[sick_character.GetHerHim]."
 health.2201.major_disease.desc: "\n\nO futuro é incerto. A morte permanece perto de sua cama, mas nem tudo está perdido. [sick_character.GetFirstNameNoTooltip] poderia sobreviver, se a sorte estiver ao seu lado.\n\nSó [ROOT.Char.GetFaith.FateGodName] conhece seu destino."
 health.2201.court_physician.desc: "\n\nO médico quer saber como devo tratar meu [ROOT.GetCharacter.Custom2('RelationToMeShort' , SCOPE.sC('sick_character'))]."
 health.2201.court_physician.desc_sick_physician: "\n\nPode até ser meu médic[sick_character.Custom('ES_OA')] mas, ainda assim, recorre a mim em busca de orientação"
 health.2201.a: "É um inimigo do qual não posso proteger [sick_character.GetHerHim]."
 #There is no longer an outbreak!
 health.2102.t: "[SCOPE.Custom('EventTitleDisease')]: Um Novo Dia"
 health.2102.start1.desc: "O surto de"
 health.2102.smallpox.desc: "varíola"
 health.2102.bubonic_plague.desc: "peste"
 health.2102.start2.desc: "que devastou minha corte finalmente acabou."
 health.2102.physician.desc: "Suas vítimas já se recuperaram ou partiram deste mundo.\n\n[physician.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me assegura que todos os corpos foram devidamente descartados e que a ameaça desapareceu completamente."
 health.2102.no_physician.desc: "As vítimas se recuperaram ou partiram deste mundo; não há mais doença restante."
 health.2102.2_victims.desc: "\n\nNo entanto, o caminho para a recuperação é longo. Perdemos [victim_1.Custom2('MyCharacterIntroduction', ROOT.Char)] e [victim_2.Custom2('MyCharacterIntroduction', ROOT.Char)], entre muitos outros. A vida continua, mas as cicatrizes permanecem."
 health.2102.1_victim.desc: "\n\nNo entanto, o caminho para a recuperação é longo. Perdemos [victim_1.Custom2('MyCharacterIntroduction', ROOT.Char)] e muitos outros. A vida continua, mas as cicatrizes permanecem."
 health.2102.root_victim.desc: "\n\nAlgumas noites ainda acordo em suor frio, paralisad[ROOT.Char.Custom('ES_OA')] de medo. Eu consegui superar, mas as cicatrizes — as da minha pele e as da minha mente — permanecerão por muitos anos."
 health.2102.a.victim: "Finalmente, podemos descansar. E lamentar."
 health.2102.a.no_victim: "Finalmente, estamos seguros."
 health.2102.a.dead_and_survivors.tt: "#N [THIS.Var('dead_victims_num').GetValue|0]#! vítimas morreram e #P [THIS.Var('surviving_victims_num').GetValue|0]#! sobreviveram na corte"
 health.2102.a.no_survivors.tt: "#N [THIS.Var('dead_victims_num').GetValue|0]#! vítimas morreram na corte"
 health.2102.a.no_dead.tt: "#P [THIS.Var('surviving_victims_num').GetValue|0]#! vítimas morreram na corte"
 health.2102.a.dead.tt: "[THIS.Char.GetShortUIName] morreu durante o surto"
 health.2102.a.surviving.tt: "[THIS.Char.GetShortUIName] ficou doente, mas se recuperou durante o surto"
 health.2202.t: "[SCOPE.Custom('EventTitleDisease')]: Humores Equilibrados"
 health.2202.desc: "Enquanto caminho pelos corredores, ouço uma risada abafada. Aquela voz… Não estava acostumad[ROOT.Char.Custom('ES_OA')] a ouvi-la tão clara e viva.\n\nEmpurro a porta entreaberta e ali, à minha frente, está meu [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('sick_character'))] [sick_character.GetFirstName], aparentemente recuperad[sick_character.Custom('ES_OA')] da sua"
 health.2202.desc.happy: "\n\nMeu amad[sick_character.Custom('ES_OA')] [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('sick_character'))] volta a ficar bem! É difícil não derramar lágrimas de alegria…"
 health.2202.desc.angry: "\n\nComo isso pôde acontecer? Por que comigo, [ROOT.Char.GetFaith.HealthGodName]? #EMP Por quê!?#!"
 health.2202.desc.relieved: "\n\nUm enorme peso sai dos meus ombros quando [sick_character.GetFirstNameNoTooltip] me saúda, e preciso lutar para conter as lágrimas de alívio."
 health.2202.desc.neutral: "\n\nInclino a cabeça solenemente em sua direção."
 health.2202.a.happy: "Ótimas notícias! Glórias a [ROOT.Char.GetFaith.HealthGodName]!"
 health.2202.a.angry: "Que infelicidade..."
 health.2202.a.relieved: "Minha corte está um pouco mais segura."
 health.2202.a.neutral: "Sortudo."
 #Recruit physician event
 health.3001.disease.t: "[SCOPE.Custom('EventTitleDisease')]:"
 health.3001.t: "Médico da [ROOT.Char.Custom('GetCourt')]"
 health.3001.fallback_reason.desc: "Este mundo está cheio de perigos, até mesmo para um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleTierName|l] e seu [ROOT.Char.Custom('GetCourt')].\n\nPedi recomendações e reuni algumas opções entre as quais escolher."
 health.3001.decision.desc: "Este mundo está cheio de perigos, até mesmo para um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleTierName|l] e seus [ROOT.Char.Custom('GetCourtierPlural')]. A meu pedido, meus servos foram atrás de recomendações. Agora eles reuniram algumas opções para escolher."
 health.3001.already_sick.desc: "Finalmente, meus servos encontraram algumas pessoas que podem ser aptas a servir como meu médico. De qualquer forma, receio que não posso ser exigente agora."
 health.3001.a: "Aparentemente, [high_skill_option.GetFirstNameNoTooltip] é bastante experiente."
 health.3001.a.tt: "Um [GetCourtPositionType('court_physician_court_position').GetName()|l] também tem um salário mensal de [SCOPE.ScriptValue('court_position_physician_salary')][gold_i]"
 health.3001.a.aptitude: "A [aptitude|lE] de [Select_CString( high_skill_option.IsLocalPlayer, 'você', high_skill_option.GetShortUIName )] é [high_skill_option.GetCourtPositionAptitude( GetCourtPositionType( 'court_physician_court_position' ) )|l]"
 health.3001.b: "[low_skill_option.GetFirstNameNoTooltip] parece entusiasmad, se nada mais."
 health.3001.b.aptitude: "A [aptitude|lE] de [Select_CString( low_skill_option.IsLocalPlayer, 'você', low_skill_option.GetShortUIName )] é [low_skill_option.GetCourtPositionAptitude( GetCourtPositionType( 'court_physician_court_position' ) )|l]"
 health.3001.c: "[mystic_option.GetFirstNameNoTooltip] afirma estar treinado em 'medicina alternativa'."
 health.3001.c.aptitude: "A [aptitude|lE] de [Select_CString( mystic_option.IsLocalPlayer, 'você', mystic_option.GetShortUIName )] é [mystic_option.GetCourtPositionAptitude( GetCourtPositionType( 'court_physician_court_position' ) )|l]"
 health.3001.d.two: "Ambos não me impressionam."
 health.3001.d.more: "Nenhum deles me impressiona."
 health.3001.e: "[SCOPE.sC('excellent_skill_option').GetFirstNameNoTooltip] é amplamente conhecido nos círculos acadêmicos."
 health.3001.e.aptitude: "A [aptitude|lE] de [Select_CString( excellent_skill_option.IsLocalPlayer, 'você', excellent_skill_option.GetShortUIName )] é [excellent_skill_option.GetCourtPositionAptitude( GetCourtPositionType( 'court_physician_court_position' ) )|l]"
 health.3001.d.tt: "Não contrato ninguém como [GetCourtPositionType('court_physician_court_position').GetName()|l]"
 #Disease treatment, by Mathilda Bjarnehed & Milla Isaksson
 health.3101.t: "[SCOPE.Custom('EventTitleDisease')]: Hora do Tratamento"
 health.3101.start.desc: "O cheiro lúgubre de tinturas borbulhantes e unguentos amassados me ataca os sentidos enquanto avanço até a sala de trabalho d[physician.Custom('ES_DelDela')] médic[physician.Custom('ES_OA')] [physician.GetFirstName]. [physician.GetSheHe|U] ergue o olhar de uma unção que está preparando.\n\n\"Chegou a hora, [ROOT.Char.Custom('FormOfAddressForLiege')]. Conheço várias formas de tratar sua doença de"
 health.3101.safe_recommendation.desc: "Embora eu esteja bastante certo de que uma simples tintura bastaria,"
 health.3101.risky_recommendation.desc: "Eu recomendaria medidas drásticas, mas"
 health.3101.mystic_recommendation.desc: "Se me permite, gostaria de recomendar um… tratamento alternativo. Mas"
 health.3101.end.desc: "a escolha é sua, e somente sua\", diz com uma careta.\n\n\"Não será agradável\"."
 health.3101.a: "Faça apenas o necessário."
 health.3101.b: "É tarde demais para cautela!"
 health.3101.c: "Estou disposto a experimentar… coisas novas."
 health.3101.d: "Deixem-me em paz!"
 health.3101.e: "Chamem um médico! Agora!"
 health.3101.e.already_looking: "Em breve! A ajuda está a caminho!"
 health.3101.e_sick_physician: "Preciso de um novo médico!"
 health.3101.e.tt: "Meus servos buscarão possíveis candidatos a [GetCourtPositionType('court_physician_court_position').GetName()]"
 health.3101.tutorial.tt: "Escolher esta opção mostrará como nomear um [GetCourtPositionType('court_physician_court_position').GetName()|l], que talvez possa curar sua enfermidade."
 health.3101.f: "Oh [ROOT.Char.GetFaith.HighGodName], vou morrer assim...!?"
 health_3101_already_looking_tt: "Você já está procurando um [GetCourtPositionType('court_physician_court_position').GetName()|l]"
 safe_diseaste_treatment.tt: "Um tratamento seguro pode aliviar temporariamente os sintomas e tem poucos riscos"
 risky_diseaste_treatment.tt: "Um tratamento arriscado pode ter ótimos resultados, mas também pode piorar os sintomas ou causar lesões permanentes"
 mystic_diseaste_treatment.tt: "Tratamentos místicos são imprevisíveis. O resultado de rituais estranhos pode ser milagroso, mas também pode levar à loucura..."
 safe_wound_treatment.tt: "Um tratamento seguro pode aliviar temporariamente a dor e tem poucos riscos"
 risky_wound_treatment.tt: "Um tratamento arriscado pode ter ótimos resultados, mas também pode piorar os sintomas ou causar lesões permanentes"
 no_treatment_effect.tt: "Sem tratamento, a natureza segue seu curso"
 deny_treatment_effect.tt: "Nenhum tratamento será realizado, e a natureza segue seu curso"
 pick_own_treatment_effect.adult.tt: "[sick_character.GetTitledFirstName] decidirá que tipo de tratamento deseja."
 pick_own_treatment_effect.child.tt: "O médico decidirá que tipo de tratamento [sick_character.GetTitledFirstName|l] receberá"
 health.3102.t: "[SCOPE.Custom('EventTitleDisease')]: Meu [ROOT.GetCharacter.Custom2('RelationToMeShort', SCOPE.sC('sick_character'))] doente"
 health.3102.preamble: "A escuridão do ambiente é um pouco dissipada pelas chamas crepitantes. Na mesa do médico repousa [sick_character.GetFirstName], seu corpo rígido de antecipação nervosa.\n\n"
 health.3102.start.desc: "É hora de decidir como tratar [sick_character.GetFirstName] e seu"
 health.3102.start.desc_sick_physician: "É hora de decidir como tratar meu"
 health.3102.treatment: "Existem vários tratamentos em potencial que vão do típico ao heterodoxo. Cabe a mim decidir qual se encaixa melhor nas necessidades particulares de [sick_character.GetFirstNameNoTooltip]."
 health.3102.a: "Seja cauteloso. Faça apenas o necessário."
 health.3102.b: "Chegou a hora de medidas drásticas."
 health.3102.c: "Agora só um poder superior pode salvar[sick_character.Custom('ES_LoLa')]."
 health.3102.c_sick_physician: "Apenas uma força superior pode te salvar agora."
 health.3102.d: "Não haverá tratamento."
 health.3102.e_adult: "A decisão cabe ao meu [ROOT.GetCharacter.Custom2('RelationToMeShort' , SCOPE.sC('sick_character'))]."
 health.3102.e_child: "Confio em seu julgamento."
 health.3103.t: "[SCOPE.Custom('EventTitleDisease')]: Um Pouco Melhor"
 health.safe_treatment.1.desc: "[physician.Custom('ES_ElLa')|U] [physician.GetTitledFirstName|l] decidiu que o melhor método de tratamento seria um pouco de descanso. [physician.GetSheHe|U] me cercou de travesseiros macios e me cobriu gentilmente sob muitas camadas de cobertores. Antes de ir embora da minha [ROOT.Char.Custom('GetChambersOrTent')], [physician.GetFirstNameNoTooltip] fechou as cortinas. Era meio-dia.\n\nUm pouco de sono extra"
 health.safe_treatment.2.desc: "[physician.GetTitledFirstName] atribuiu minha doença a uma dieta pouco saudável. Para revigorar meu corpo, insistiu que eu consumisse apenas vegetais crus e chás de ervas durante uma semana. Para não me tentar, confiscou minhas reservas de guloseimas e nunca as devolveu.\n\nAs restrições alimentares"
 health.safe_treatment.3.desc: "[physician.GetTitledFirstName] me pediu para me deitar na cama e mostrar minhas mãos. Com firmeza, esfrega e bate nas minhas palmas até ficarem vermelhas, e então repete o tratamento nas solas dos meus pés. Como toque final, belisca-me suavemente de cima a baixo pelos membros.\n\nEste procedimento estranho"
 health.safe_treatment.4.desc: "[physician.GetTitledFirstName] me ofereceu uma poção transparente em um frasco dourado. Como já havia experimentado alguns remédios dele, no início fiquei preocupado, mas quando a bebi, não senti nem cheiro nem sabor. Perguntei sobre os ingredientes, mas ele me disse que era uma receita secreta.\n\nA poção misteriosa"
 health.safe_treatment.5.desc: "\"Relaxe a respiração\", me instruiu [physician.GetTitledFirstName|l]. A pena em sua mão parecia quase etérea quando começou a me tocar suavemente sob o nariz. \"Mal, vá embora!\", exortou [physician.Custom('ES_ElElla')] quando espirrei com força.\n\nA estranha coceira"
 health.safe_treatment.6.desc: "[physician.GetTitledFirstName] organizou uma pequena cerimônia em meu nome. Assim que minha família e meu círculo mais próximo estavam reunidos no salão principal, o [ROOT.Char.Custom('DefaultPriestTitle')] fez um sermão destacando minha virtude e benevolência. A cerimônia foi encerrada com uma hora de oração silenciosa.\n\nConectando-se com [ROOT.Char.GetFaith.HealthGodName]"
 health.safe_treatment.7.desc: "Passo as tardes com [physician.GetTitledFirstName|l] sentad[physician.Custom('ES_OA')] ao meu lado no leito, recitando trechos do meu [ROOT.Char.GetFaith.ReligiousText].\n\nAs palavras de [ROOT.Char.GetFaith.HealthGodName]"
 health.safe_treatment.8.desc: "[physician.GetTitledFirstName] convocou o [ROOT.Char.Custom('DefaultPriestTitle')] para trazer o melhor cantor da corte, que acabou sendo uma criança com uma voz tenor brilhante. Por vários dias seguidos, a criança cantou para me embalar até o sono.\n\nA voz reconfortante"
 health.safe_treatment.9.desc: "Saía vapor da taça quando [physician.GetTitledFirstName|l] mexeu o pó verde ali dentro. Explicou-me detalhadamente as propriedades curativas da erva, antes de me indicar que a bebesse. \"A raiz também está lá\", revelou com orgulho.\n\nA erva amarga"
 health.safe_treatment.10.desc: "[physician.GetTitledFirstName] insiste em que meus humores estão desequilibrados e que a melhor forma de restaurá-los será por meio de uma sangria. Depois de consultar os mapas astronômicos, [physician.GetSheHe] decide que devo ser sangrad[ROOT.Char.Custom('ES_OA')] pelas axilas e têmporas.\n\nA sangria"
 health.safe_treatment.11.desc: "[physician.GetTitledFirstName] disse para eu me despir e depois me ajoelhar com as nádegas levantadas. Aquilo já foi estranho o bastante, mas quando vi o instrumento em suas mãos, quase saí correndo. Deve ter percebido isso, porque me deu umas palmadinhas tranquilizadoras no ombro e disse para eu parar de contrair.\n\nO enema"
 health.safe_treatment.12.desc: "[physician.Custom('ES_ElLa')|U] [physician.GetTitledFirstName|l] entrou em meu [ROOT.Char.Custom('GetChambersOrTent')] segurando uma jarra de barro nos braços e foi se sentar à beira da cama. [physician.GetSheHe|U] tirou uma sanguessuga da jarra e lhe lançou um olhar muito terno antes de colocá-la cuidadosamente em meu rosto. \"Fique imóvel, [ROOT.Char.Custom('FormOfAddressForLiege')]. Melhor não perturbar sua alimentação.\"\n\nAs sanguessugas"
 health.safe_treatment.13.desc: "Quando [physician.Custom('ES_ElLa')] [physician.GetTitledFirstName|l] entrou em meu [ROOT.Char.Custom('GetChambersOrTent')], vinha acompanhada de um ar extremamente fétido. O mau cheiro vinha de um jarro em suas mãos — \"uma mistura de esterco de vaca e ervas para a sua cataplasma, [ROOT.Char.Custom('FormOfAddressForLiege')]\". Quando [physician.GetFirstName] passou a besuntar meu peito com ela, quase vomitei.\n\nNo fim, a cataplasma"
 health.safe_treatment.14.desc: "[physician.GetTitledFirstName] me trouxe uma mistura feita de espinheiro e sene. No início, achei a poção ineficaz, mas mais tarde no mesmo dia senti um tumulto em meus intestinos que me fez correr para o banheiro. Enquanto eu gemia de angústia, [physician.GetFirstName] me assegurou que a impureza havia sido expelida junto com minhas fezes.\n\nNo final, a limpeza"
 health.safe_treatment.15.desc: "[physician.GetTitledFirstName] me apresentou os restos carbonizados de um gato e me incentivou a comê-los. Enquanto eu comia, [physician.GetSheHe] me contou como perseguiu o felino gordinho por minhas posses durante horas. Acho que [physician.GetSheHe] queria elogios por seu trabalho árduo, mas o gosto repugnante da refeição me manteve em silêncio.\n\nNo final, a comida gordurosa"
 health.safe_treatment.16.desc: "[physician.Custom('ES_ElLa')|U] [physician.GetTitledFirstName|l] traz um balde que crocita para minha [ROOT.Char.Custom('GetChambersOrTent')] e me diz para expor a parte superior do corpo. Ele pega um sapo, o destripa com destreza e coloca o cadáver ainda se contorcendo sobre meu peito. Ele continua até que o balde fique vazio e meu torso esteja coberto.\n\nO tratamento com sapos"
 health.safe_treatment.17.desc: "[physician.Custom('ES_ElLa')|U] [physician.GetTitledFirstName|l] veio até minha [ROOT.Char.Custom('GetChambersOrTent')] e me ofereceu uma poção de cor amarela. Disse-me para tapar o nariz enquanto eu a bebia. Quando o líquido morno passou por meus lábios, eu o cuspi quase imediatamente. Exigi saber o conteúdo do copo e [physician.Custom('ES_ElElla')] me revelou que era urina fresca de uma porca prenha.\n\nO resíduo suíno"
 health.safe_treatment.18.desc: "[physician.Custom('ES_ElLa')|U] [physician.GetTitledFirstName|l] baixou a mão no balde que trouxe para a minha [ROOT.Char.Custom('GetChambersOrTent')]. Quando o tirou de novo, um peixinho pequeno se remexia entre os dedos dele. \"Abra bem\", disse e o soltou na minha boca. Lutei para não vomitar enquanto fazia cócegas no fundo da minha garganta.\n\nO que quer que houvesse naquele peixe"
 health.safe_treatment.19.desc: "O líquido no cálice estava morno e azedo. \"Ele afastará o calor restante\", explicou [physician.GetTitledFirstName|l].\n\nA poção"
 health.safe_treatment.20.desc: "Para equilibrar meus humores, [physician.GetTitledFirstName|l] me fez beber água salgada para induzir o vômito. Foi muito eficaz.\n\nEsvaziando meu estômago"
 health.safe_treatment.21.desc: "Para me livrar dos meus males, [physician.GetTitledFirstName|l] me ordenou dormir pendurad[ROOT.Char.Custom('ES_OA')] de cabeça para baixo por alguns dias. \"Isso vai reequilibrá-l[ROOT.Char.Custom('ES_OA')]\", me garantiu. \n\nSenti-me como um morcego.\n\nA estranha posição para dormir"
 health.3103.end.desc: "acabou sendo exatamente o que eu precisava. Por enquanto, os piores sintomas foram aliviados, e o mundo parece um pouco mais brilhante."
 health.3103.a: "Excelente trabalho, [physician.GetFirstNameNoTooltip]."
 health.3104.t: "[SCOPE.Custom('EventTitleDisease')]: Ainda Pior"
 health.3104.end.desc: "não fez nada para melhorar meu estado. Na verdade, acho que me sinto pior!"
 health.3104.a: "Vá embora. Quero descansar..."
 health.3105.t: "[SCOPE.Custom('EventTitleDisease')]: Um Milagre Médico"
 health.risky_treatment_medicine.1.desc: "O vaso que [physician.Custom('ES_ElLa')] [physician.GetTitledFirstName|l] trouxe consigo para minha [ROOT.Char.Custom('GetChambersOrTent')] emite um estranho zumbido. Antes que eu possa impedir[physician.Custom('ES_LoLa')], ele a joga no chão, onde explode em uma nuvem de cacos de cerâmica e um enxame de abelhas furiosas. Quando meu médic[physician.Custom('ES_OA')] foge da sala, fico eu como único alvo."
 health.risky_treatment_medicine.2.desc: "Não acredito no que vejo quando [physician.GetTitledFirstName|l] tira uma mão decepada da bolsa. As manchas negras em seus dedos me causam calafrios e exijo saber de onde a tirou. [physician.Custom('ES_ElElla')|U] me manda calar a boca e passa a esfregar a mão decepada contra meu peito."
 health.risky_treatment_medicine.3.desc: "[physician.GetTitledFirstName] me apresentou uma poção das mais peculiares. Ela não tinha cheiro nem sabor, possuindo a aparência de prata líquida. A mistura metálica era fácil de ingerir, mas eu não conseguia reprimir meu desconforto."
 health.risky_treatment_medicine.4.desc: "[physician.GetTitledFirstName] insiste em que a única cura para minha doença é correr nu[ROOT.Char.Custom('ES_OA')] à meia-noite. Durante a seguinte lua cheia, [physician.Custom('ES_ElElla')] me obriga a me despir e correr pelo campo. \"Não pareis até que suas pernas cedam!\", grita atrás de mim. \"Expulsai o mal com o suor!\""
 health.risky_treatment_medicine.5.desc: "O pó era amarelo e tinha um aroma delicioso. Fiquei consternad[ROOT.Char.Custom('ES_OA')] ao ver [physician.Custom('ES_AlAla')] [physician.GetTitledFirstName|l] misturá-lo com enxofre e espalhá-lo sobre a vesícula ainda morna de um castor. O animal havia sido encontrado com raiva, espumando pela boca, apresentando claros sinais da doença. \"Combatemos o mal com o mal, [ROOT.Char.Custom('FormOfAddressForLiege')].\""
 health.risky_treatment_medicine.6.desc: "[physician.GetTitledFirstName] se aproximou de mim com uma pequena faca. Segurou meu braço com firmeza e fez uma incisão precisa, mal rompendo a pele. Então passou a pressionar algo asqueroso contra a ferida. Só consegui suportar um breve olhar para a substância."
 health.risky_treatment_medicine.7.desc: "[physician.GetTitledFirstName] me entregou uma bandeja com uma espécie de pó cinzento. Ao que parece, era composto pelas crostas trituradas de alguém em um estado pior que o meu. [physician.GetTitledFirstName|l] não demonstrou nenhum sinal de estar brincando quando me disse para me inclinar e inalar o máximo que conseguisse."
 health.risky_treatment_medicine.8.desc: "O pó vermelho tinha uma cor tentadora. Um servo cometeu o erro de prová-lo em sua forma pura: sua língua inchou muito e [physician.GetTitledFirstName|l] o repreendeu severamente por isso. [physician.GetTitledFirstName|l] despejou o tempero em um cálice de água e mexeu meticulosamente antes de me dar uma colherada."
 health.risky_treatment_medicine.9.desc: "Abri os olhos arregalados quando [physician.Custom('ES_ElLa')] [physician.GetTitledFirstName|l] colocou uma cabra em minha [ROOT.Char.Custom('GetChambersOrTent')]. O cheiro horrível de sua flatulência fez com que eu tapasse o nariz, mas o médico afastou minha mão. \"Desculpe, [ROOT.Char.Custom('FormOfAddressForLiege')], mas este é o tratamento.\" Ele me recomendou respirar fundo."
 health.risky_treatment_surgery.1.desc: "[physician.Custom('ES_ElLa')|U] [physician.GetTitledFirstName|l] me deu um beberagem de sabor bastante estranho. Isso me faz sentir entorpecido e minhas pálpebras começaram a cair. \"Peço desculpas, [ROOT.Char.Custom('FormOfAddressForLiege')], mas não quereis estar despert[ROOT.Char.Custom('ES_OA')] para a próxima parte\", disse. O pânico tomou conta de mim e tentei me levantar da mesa de operação, mas meus membros não me obedeceram."
 health.risky_treatment_surgery.2.desc: "O assistente de [physician.GetTitledFirstName|l] assegurou que a poção me faria dormir. Como ele estava errado! Embora eu não pudesse nem falar nem me mover, continuei consciente de tudo o que fizeram comigo. Tentei gritar e me debater, mas era prisioner[ROOT.Char.Custom('ES_OA')] em meu próprio corpo. O procedimento pareceu nunca terminar…"
 health.risky_treatment_amputation.1.desc: "[physician.Custom('ES_ElLa')|U] [physician.GetTitledFirstName|l] aperta a última correia, me prendendo à mesa de operação. \"Não vou mentir para você, [ROOT.Char.Custom('FormOfAddressForLiege')]. Será terrivelmente doloroso, mas isso precisa ser feito\".\n\nTentei protestar quando ele trouxe a serra, mas, por causa da poção calmante que me fez beber, arrastei as palavras de forma incompreensível."
 health.risky_treatment_disfigurement.1.desc: "[physician.GetTitledFirstName] me informou que havia identificado o tecido contaminado causador da minha doença e que removê-lo provavelmente me curaria. Fiquei muito satisfeit[ROOT.Char.Custom('ES_OA')] e concordei com a cirurgia.\n\nQuem me dera que [physician.GetFirstName] tivesse me dito que o \"tecido\" era o meu rosto."
 health.risky_treatment_eye.1.desc: "[physician.Custom('ES_ElLa')|U] [physician.GetTitledFirstName|l] me faz beber um gole de papoula antes de me amarrar à mesa de operações. Quase adormeço enquanto prepara os instrumentos, mas quando ergue um bisturi em direção ao meu olho, desperto completamente. “Sinto muito, [ROOT.Char.Custom('FormOfAddressForLiege')], mas devemos arrancar o problema pela raiz”."
 health.3105.end.desc: "\n\nCuriosamente, eu já não sinto mais nenhum sintoma..."
 health.3105.a: "É um milagre!"
 health.3106.t: "[SCOPE.Custom('EventTitleDisease')]: Humores Equilibrados"
 health.3106.end.desc: "\n\nO tratamento foi quase tão desagradável quanto os meus sintomas, mas parece ter sido eficaz. Embora eu não esteja completamente curado, me sinto muito melhor."
 health.3106.a: "Viverei para ver outro dia."
 health.3107.t: "[SCOPE.Custom('EventTitleDisease')]: Tratamento Desastroso"
 health.3107.death.desc: "\n\nQuando acordei, pude sentir nos meus ossos. Algo deu errado. Muito, muito errado."
 health.3107.end.desc: "\n\nPensei que seria impossível me sentir pior do que já me sentia, mas [physician.GetFirstNameNoTooltip] com certeza provou que eu estava errado!"
 health.3107.a: "Sinto-me... fraco..."
 health.3107.b: "Isso não acontecerá novamente. Você me entende?"
 health.3107.c: "Todos sabíamos dos riscos. Você está perdoado."
 health.3107.d: "Guardas! Tranque[physician.Custom('ES_LoLa')] sob sete chaves!"
 health.3107.d.tt: "Uma vez na minha prisão, posso decidir o que fazer com [physician.GetTitledFirstName|l]"
 health.3107.e: "Tal traidor[physician.Custom('ES_XA')] merece morrer!"
 health.3107.f: "Oh [physician.GetFirstNameNoTooltip], o que você fez a si mesmo?"
 health.3108.t: "[SCOPE.Custom('EventTitleDisease')]: Um Poder Maior"
 health.mystic_treatment_occult.cannibal.desc: "“Beba isto”, sussurrou [physician.GetTitledFirstName|l]. Mal o líquido havia passado pelos meus lábios quando as estranhas sensações começaram. Meus membros ficaram dormentes, mas dentro de mim um fogo despertou…\n\n“Agora, coma isto.” Os pedaços estavam quentes, úmidos e mastigáveis. O fogo gostou disso e quis mais. Quando me passou o resto do braço pálido, eu me empanturrei até vomitar."
 health.mystic_treatment_occult.deviant.desc: "[physician.GetTitledFirstName] me fez tirar a roupa e massageou óleo sobre minha pele. Quando deslizou a mão em direção ao meu lugar mais íntimo, com os olhos buscando os meus, percebi que queria isso. Assenti.\n\nLogo, mais mãos se juntaram às de [physician.GetTitledFirstName|l]. Suaves, calejadas, enrugadas, delgadas, fortes. Quando minhas pernas fraquejaram, me segurou, e me rendi ao seu toque."
 health.mystic_treatment_occult.1.desc: "Acamad[ROOT.Char.Custom('ES_OA')] no leito, os servos me disseram que a fumaça da pira podia ser vista a quilômetros de distância. Naquela noite, a vida de mais de duas dúzias de bons animais foi encerrada em um grande sacrifício. Seguindo as ordens de [physician.GetTitledFirstName|l], venho esfregando a pele com as cinzas há duas semanas."
 health.mystic_treatment_occult.2.desc: "[physician.GetTitledFirstName] me indicou que eu entrasse na banheira vazia, deixando que eu me despisse em privado. Seu retorno foi anunciado por um alto \"béé!\". A [physician.GetTitledFirstName|l] era seguido por um servo e meia dúzia de cabras. Com mão hábil, [physician.GetFirstNameNoTooltip] foi agarrando as cabras e cortando a garganta delas sobre a banheira, uma por uma.\n\nAs manchas no chão não vão embora."
 health.mystic_treatment_occult.3.desc: "[physician.GetTitledFirstName] me disse que [ROOT.Char.GetFaith.HealthGodName] exige um sacrifício. Depois, naquela tarde, ouvi um grito.\n\nSeguindo o som, encontrei [physician.GetFirstNameNoTooltip] curvad[physician.Custom('ES_OA')] sobre um corpo, olhos tomados de pânico, mãos ensanguentadas. \"Foi para o bem do reino...!\" ele disse com dificuldade."
 health.mystic_treatment_occult.4.desc: "[physician.GetFirstName] me deu uma bolsa de ervas e me enviou em uma jornada, para encontrar meu \"guia espiritual\". Vaguei pela natureza selvagem por dias, comendo apenas raízes da bolsa, dormindo sob as estrelas. Finalmente, senti uma presença. Diante de mim estava uma grande besta com chifres. Virei-me e corri.\n\nDe volta em segurança em minha cama, o sono me escapa. Será que eu sou a besta?"
 health.mystic_treatment_occult.5.desc: "[physician.GetFirstNameNoTooltip] estava de pé ao pé da minha cama enquanto os servos acendiam as velas. Puseram um pote em minhas mãos — a julgar pelos sons, ele continha um pequeno animal apavorado. \"A criatura carregará seus fardos em seu lugar\", explicou. Então os cânticos começaram."
 health.mystic_treatment_questionable.1.desc: "[physician.GetFirstName] me colocou diante de um espelho alto e acendeu um círculo de velas ao meu redor. \"Precisamos entrar em contato com o outro você\", declarou casualmente. Quando ergui as sobrancelhas para ele, ele colocou a mão no meu ombro. \"Isso pode… alterar você\"."
 health.mystic_treatment_questionable.2.desc: "Apenas uma vela iluminava a sala. Voltado para a janela ao oeste, [physician.Custom('ES_ElLa')] [physician.GetTitledFirstName|l] me pintou as unhas com gotas de óleo. Senti calor na pele quando aproximou minha mão das chamas. \"Não tema, [ROOT.Char.Custom('FormOfAddressForLiege')]. Pela sabedoria de [ROOT.Char.GetFaith.HealthGodName], sereis purificad[ROOT.Char.Custom('ES_OA')]\"."
 health.mystic_treatment_questionable.3.desc: "\"A lua exige sua devoção\", [physician.GetTitledFirstName|l] disse, antes de me entregar um bolo coberto com algo de aroma picante. Poucos minutos após comer, olhei para o céu noturno e improvisei o maior poema do mundo. Mais tarde, as palavras me escapam..."
 health.mystic_treatment_questionable.4.desc: "[physician.GetTitledFirstName] me fez beber uma poção especialmente forte todas as noites antes de me deitar. \"Isso afrouxa a estrutura do seu ser, permitindo que os espíritos entrem em seu corpo\", me assegurou. \"Também é bastante… relaxante\", admitiu, sorrindo para mim."
 health.mystic_treatment_questionable.5.desc: "[physician.GetFirstName] me disse que a tarefa de interpretar o/a [ROOT.Char.GetFaith.ReligiousText] é um trabalho complicado, mas que a purificação pelo fogo é tão antiga quanto o próprio mundo. Mal sabia eu que me faria caminhar sobre brasas ardentes."
 health.mystic_treatment_questionable.6.desc: "[physician.GetTitledFirstName] me disse que [ROOT.Char.GetFaith.HealthGodName] exige uma prova da mente. Viajamos juntos até um pequeno lago. De mãos dadas, entramos na água. Fiquei assustad[ROOT.Char.Custom('ES_OA')] quando [physician.GetFirstNameNoTooltip] me agarrou pelos ombros e me manteve submers[ROOT.Char.Custom('ES_OA')]. Devo ter perdido a consciência, pois não me lembro do que aconteceu depois…"
 health.3108.end.desc: "\n\nAo despertar esta manhã, as dores e incômodos aos quais eu me acostumei tinham desaparecido. Será que me curou?"
 health.3108.a: "Não sei como me sentir... Ou no que acreditar."
 health.3109.t: "[SCOPE.Custom('EventTitleDisease')]: Sentimentos Conflitantes"
 health.3109.end.desc: "\n\nAinda não tenho certeza de como me sinto em relação ao que aconteceu, mas não posso negar que a maioria dos meus sintomas desapareceu desde então."
 health.3109.a: "Não sei o que eu esperava, mas não era isso."
 health.3110.t: "[SCOPE.Custom('EventTitleDisease')]: Na Escuridão"
 health.3110.end.desc: "\n\nMinha mente deve ter sido alterada, distorcida por algum truque sombrio. Eu nunca teria concordado com isso voluntariamente. As memórias me assombram..."
 #Punishment for mistreating important people
 health.3200.death.desc: "Embora eu veja claramente que é o rosto de [sick_character.GetTitledFirstName|l], ainda assim não se parece muito com [sick_character.Custom('ES_ElElla')]. Já não… está mais ali. O resto do corpo está envolto em um sudário grosso, cobrindo os detalhes horripilantes da falha de [physician.GetTitledFirstName|l]."
 health.3200.failure.desc: "Leva um momento para eu reconhecer [sick_character.GetTitledFirstName|l]. Está tão machucad[sick_character.Custom('ES_OA')] e inchad[sick_character.Custom('ES_OA')] que mal parece humano. Quando pego sua mão, meu [ROOT.GetCharacter.Custom2('RelationToMeShort', SCOPE.sC('sick_character'))] tenta falar, mas nenhum som sai de seus lábios."
 health.3200.failure.desc_2: "Ao me aproximar de [ROOT.Char.Custom('GetChambersOrTent')] de [ROOT.GetCharacter.Custom2('RelationToMeShort', SCOPE.sC('sick_character'))]; [sick_character.GetTitledFirstName|l], ouço um grito aterrador, quase inumano e cheio de dor. Arrombo a porta do quarto e encontro [sick_character.GetFirstNameNoTooltip] desmaiad[sick_character.Custom('ES_OA')] no chão, #EMP cubiert[sick_character.Custom('ES_OA')]#! de sangue."
 health.3200.failure.desc_3: "Leva um momento até eu compreender a gravidade dos danos que [sick_character.Custom2('MyCharacterIntroduction', ROOT.Char)] causou a si mesm[sick_character.Custom('ES_OA')]. Está cobert[sick_character.Custom('ES_OA')] de uma quantidade obscena de sangue e ainda empunha uma faca com movimentos vigorosos. Antes que eu possa intervir, lança um olhar decepcionado para a lâmina e desmaia de repente."
 health.3200.end.desc: "\n\n[physician.Custom('ES_ElLa')|U] médic[physician.Custom('ES_OA')] [physician.Custom2('InsultAdjective', ROOT.Char)] está em um canto da sala, torcendo as mãos com preocupação…"
 health.3200.death.tt: "[sick_character.GetTitledFirstName] morreu durante o tratamento."
 health.3201.desc: "Há algo selvagem nos olhos do meu[ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('sick_character'))] [sick_character.GetTitledFirstName|l]. Pergunto a ele o que viu, mas nenhuma palavra sai de seus lábios.\n\n"
 health.3201.occult.desc: "Um servo me diz que [physician.GetTitledFirstName|l] realizou algum tipo de ritual maligno, e essa é a causa de sua aflição. É uma história macabra, no mínimo."
 health.3201.occult.desc_sick_physician: "Um servo me diz que [physician.GetTitledFirstName|l] realizou uma espécie de ritual maligno, e essa é a causa de seu sofrimento. A história é macabra, no mínimo."
 health.3201.questionable.desc: "Parece que um dos tratamentos \"alternativos\" de [physician.GetFirstName] saiu terrivelmente errado."
 health.3201.c: "Não diga uma palavra sobre isso, [physician.GetFirstNameNoTooltip]!"
 court_physician_treatment_success_message_title: "Tratamento Bem-sucedido"
 court_physician_treatment_failure_message_title: "Tratamento Mal-sucedido"
 inform_relatives_about_disease_treatment_effect.safe_success.desc: "[physician.GetTitledFirstName] reduziu os sintomas de seu"
 inform_relatives_about_disease_treatment_effect.safe_failure.desc: "Seu tratamento, administrado por [physician.GetTitledFirstName|l], não foi bem-sucedido."
 inform_relatives_about_disease_treatment_effect.risky_critical_success.desc: "[physician.GetTitledFirstName] curou a [sick_character.GetTitledFirstName|l]"
 inform_relatives_about_disease_treatment_effect.risky_success.desc: "[physician.GetTitledFirstName] reduziu enormemente os sintomas de [sick_character.GetTitledFirstName|l]"
 inform_relatives_about_disease_treatment_effect.risky_failure.desc: "[physician.GetTitledFirstName] arruinou o tratamento de [sick_character.GetTitledFirstName|l]."
 inform_relatives_about_disease_treatment_effect.mystic_failure.desc: "[sick_character.GetTitledFirstName] não está como antes após o ritual fracassado de [physician.GetTitledFirstName|l]!"
 physician_level_up_chance_effect.t: "Conhecimento do $court_physician_court_position$ Aumenta"
 #Wound treatment, by Linnéa Thimrén
 health.4000.t: "$health_wounded_title$ Meu [ROOT.GetCharacter.Custom2('RelationToMeShort', SCOPE.sC('sick_character'))] ferid[sick_character.Custom('ES_OA')]"
 health.4000.start.desc: "Meu [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('sick_character'))] [sick_character.GetTitledFirstName|l] foi ferid[sick_character.Custom('ES_OA')],"
 health.4000.infected_wound.desc: "e sua carne adquiriu podridão e inchaço.\n\nSe for administrado o tratamento adequado e [ROOT.Char.GetFaith.HealthGodName] tiver misericórdia, [sick_character.GetTitledFirstName|l] deverá sobreviver."
 health.4000.gangrene.desc: "e sua carne contraiu podridão e morte.\n\nA negrura se espalha pela sua pele e só [ROOT.Char.GetFaith.HealthGodName] sabe se [sick_character.GetTitledFirstName|l] sobreviverá."
 health.4000.close_to_death_wounded.desc: "e o ferimento é muito profundo. Cada respiração é uma batalha, e temo que só um milagre pode salvar[sick_character.Custom('ES_LoLa')]."
 health.4000.very_wounded.desc: "e a ferida é profunda. Temo que seu corpo não seja forte o suficiente para lutar sozinho; sinto a morte à cabeceira de sua cama."
 health.4000.wounded.desc: "e obviamente está com dor. A aflição é leve, mas os males do corpo não devem ser subestimados."
 health.4000.a: "Não há nada que possa ser feito."
 health.4001.start.desc: "Chegou a hora de tratar suas feridas."
 health.4001.safe_recommendation.desc: "Tenho certeza de que um tratamento simples será suficiente, mas"
 health.4001.gangrene.desc: "Como a morte já está se espalhando pela carne, temo que seja necessário... #EMP medidas drásticas#!, mas"
 health.4001.infection.desc: "Como a ferida está infectada, preciso recomendar medidas drásticas, mas"
 health.4001.risky_recommendation.desc: "Recomendo medidas drásticas, mas"
 health.4002.start.desc: "Chegou a hora de tratar de vosstr[sick_character.Custom('ES_OA')] [ROOT.GetCharacter.Custom2('RelationToMeShort', SCOPE.sC('sick_character'))]."
 health.4002.start.desc_sick_physician: "Chegou a hora de me tratar."
 health.4101.t: "$health_wounded_title$ Cura"
 health.4101.desc_infection: "Quando [physician.GetFirstName] começou a machacar ervas e mel, pensei que estava brincando, pois umas ervas não poderiam me ajudar. E ao espalhar a cataplasma sobre minha ferida dolorida,"
 health.4101.desc_1: "Quando [physician.GetFirstName] despejou uma garrafa de vinho sobre minha ferida, a dor foi maior do que a própria ferida havia me causado.\n\n\"Aguente, por favor, minha [ROOT.Char.GetTitleTierName]. É necessário para expulsar a podridão de dentro.\"\n\nE de fato, depois de enfaixar firmemente a ferida,"
 health.4101.desc_2: "[physician.GetFirstName] rapidamente enfiou uma agulha e começou a trabalhar em minha ferida como se estivesse fazendo costura ao redor do fogo. A visão resultante dos pontos segurando minha carne juntos era macabra! Com o passar do tempo,"
 health.4101.desc_end: "a ferida começou a cicatrizar."
 health.4101.a: "Excelente trabalho, [physician.GetFirstNameNoTooltip]!"
 health.4102.t: "$health_wounded_title$ Dor"
 health.4102.desc_infection: "A bolsa que [physician.GetFirstName] trouxe para o meu [ROOT.Char.Custom('GetChambersOrTent')] se mexia sozinha e o interior se contorcia como se estivesse vivo. Quando [physician.GetFirstNameNoTooltip] tirou uma sanguessuga que se contorcia, empalideci. \"Agora aguente, meu [ROOT.Char.GetTitleTierName]…\".\n\nSeja qual fosse o efeito que esperava, certamente não era este; a sangria a que as criaturas me submeteram"
 health.4102.desc_end: "não fez nada para equilibrar meus humores, e a dor só piorou."
 health.4102.a: "Argh...! Não me toque!"
 health.4103.t: "$health_wounded_title$ Mãos Curativas"
 health.4103.risky_treatment_medicine.1.desc: "Quando [physician.GetFirstName] acendeu um fogo em meu [ROOT.Char.Custom('GetChambersOrTent')] presumi que fosse para que o calor ajudasse a equilibrar meus humores. Porém, quando seu assistente começou a me amarrar à cama, notei a barra de ferro aquecendo nas chamas."
 health.4103.risky_treatment_disfigurement.1.desc: "[physician.GetFirstName] me viu horrorizado quando tirou uma faca comprida e uma agulha torta de sua bolsa. Para que seu corpo se cure, precisamos retirar todo o tecido afetado e fechar a ferida.\n\nNão sei o que me dói mais, a dor aguda da carne arrancada e a sensação de repuxo da agulha atravessando a carne, ou minha aparência depois."
 health.4103.end.desc: "\n\nPara minha surpresa, logo descobri que meu corpo estava se recuperando!"
 health.4104.t: "$health_wounded_title$ Em Recuperação"
 health.4104.end.desc: "\n\nDepois de passar por aquele tratamento, é difícil encontrar alegria na recuperação do meu corpo, mas estou em recuperação."
 health.4105.t: "$health_wounded_title$ O Desastre Acontece"
 health.4105.end.desc: "\n\nEu não acreditava que poderia sentir mais dor, mas logo fui provado errado."
