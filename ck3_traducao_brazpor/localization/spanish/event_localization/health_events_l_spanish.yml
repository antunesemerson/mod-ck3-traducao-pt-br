 #Notification messages
 ########################
 disease_contraction_feed_message.t: "[message_receiver.Custom2( 'RelationToMeShort', CHARACTER.Self )|U] Fica Doente"
 disease_contraction_feed_message.d_1: "[LEFT_CHARACTER.GetShortUIName|U] [Select_CString( LEFT_CHARACTER.IsLocalPlayer, 'has', 'ha' )] recebeu o [trait|lE] [disease_trait.GetName( CHARACTER.Self )|LV]"
 disease_contraction_feed_message.d_2: "[LEFT_CHARACTER.GetShortUIName|U] e [RIGHT_CHARACTER.GetShortUIName|U] [Select_CString( LEFT_CHARACTER.IsLocalPlayer, 'habéis', 'han' )] adquirido o [trait|lE] [disease_trait.GetName( CHARACTER.Self )|LV]"
 disease_contraction_feed_message.d: "[LEFT_CHARACTER.GetShortUIName|U], [RIGHT_CHARACTER.GetShortUIName|U] e $message_consolidation_others$ [Select_CString( LEFT_CHARACTER.IsLocalPlayer, 'habéis', 'han' )] adquiriu [trait|lE] [disease_trait.GetName( LEFT_CHARACTER.Self )|LV]"
 disease_recovery_feed_message.t: "[message_receiver.Custom2('RelationToMeShort' , SCOPE.sC('sick_character'))|U] se recupera"
 #Suicide events, by Linnéa Thimrén
 health.6001.t: "A Tentativa"
 health.6001.desc_opening: "Vou acabar com a minha vida. Não consigo controlar a tristeza que cresce em meu coração pensando em tudo o que deixarei para trás, mas minha mente está decidida."
 health.6001.desc_depression: "O sofrimento parece interminável."
 health.6001.desc_sickness: "Meu corpo se tornou uma prisão, definhaldo..."
 health.6001.desc_lunacy: "As sombras falaram, e logo me juntarei a elas."
 health.6001.desc_loss: "Não suporto mais uma perda."
 health.6001.desc_stress: "Não aguento mais isso."
 health.6001.desc_ending: "\n\nO que ainda preciso decidir é como farei isso..."
 health.6001.warning: "Sempre há uma chance de que a tentativa falhe"
 health.6001.a: "Encontrarei um prédio alto o suficiente."
 health.6001.a_tribal: "Encontrarei um penhasco alto o suficiente."
 health.6001.b: "Chá preparado com uma planta letal... Parece quase palatável."
 health.6001.c: "Um banho quente e uma faca afiada devem bastar."
 health.6001.d: "Não tenho mais certeza de que é isso que quero fazer."
 health.6001.d_tt: "Não farei a tentativa"
 health.6002.desc_fall: "À medida que me aproximo à borda, o vento agarra o tecido da minha [ROOT.Char.Custom('GetClothingArticle')] e o agita ao meu redor. É uma longa queda."
 health.6002.desc_poison: "À medida que o chá ferve, o ar se enche de um odor fétido, como se me lembrasse de seu propósito. Despejo o líquido em uma xícara. Ele esfria rapidamente, e levanto a xícara em direção aos lábios."
 health.6002.desc_knife: "Sentado no banho quente, inalo o vapor enquanto alcanço a faca afiada ao meu lado."
 health.6002.desc_ending: "\n\n\"[ROOT.Char.GetFirstNameNoTooltip]! Não faça isso, [friendly_person.Custom2('RelationToMeShort' , ROOT.Char)]!\"\n\nViro-me e vejo [friendly_person.GetTitledFirstName|l] ali, estendendo a mão com uma expressão aterrorizada. \"Por favor, este não é o caminho.\""
 health.6002.a: "Não há nada que você possa fazer para me impedir."
 health.6002.a_success: "Sua tentativa é bem-sucedida"
 health.6002.a_failure: "Sua tentativa falha"
 health.6002.b: "Você está certo. As coisas ainda podem melhorar."
 health.6004.desc: "Um pequeno passo para fora da beirada, isso é tudo o que é necessário. Com o vento uivando ao meu redor, levanto o pé e avanço.\n\nPor um momento, parece que estou suspenso no ar, o mundo girando ao meu redor, e então tudo acontece muito rápido. O vento em meus ouvidos, a sensação de queda, o chão se aproximando..."
 health.6004.a: "Livre, finalmente."
 health.6005.desc: "Um pequeno passo para fora, rumo à beira, isso é tudo o que basta. Com o vento uivando ao meu redor, ergo o pé e…\n\nSou abruptamente puxado para trás, com um guarda me segurando."
 health.6005.desc_ending: "\"Sinto muito, [ROOT.Char.Custom('FormOfAddressForLiege')], mas vossa senhoria não está em seu juízo perfeito!\""
 health.6005.a: "Meus planos, arruinados..."
 health.6007.desc: "Respiro os vapores que saem da xícara de chá em minhas mãos e fecho os olhos. Lentamente, levanto a borda até meus lábios e dou um longo gole. Engulo.\n\nLogo o mundo começa a ficar cinza e indistinto, a escuridão se aproximando da borda da minha visão, e deito minha cabeça na mesa. Sinto minha respiração ficando cada vez mais curta. Fecho os olhos."
 health.6008.desc: "Respiro os vapores que saem da xícara de chá em minhas mãos e fecho os olhos. Lentamente, levanto a borda até meus lábios e–\n\nA xícara é arrancada da minha mão e jogada no chão, onde se despedaça. Um guarda está acima de mim, pânico em seus olhos."
 health.6010.desc: "O vapor do meu banho quente está pairando ao meu redor e respiro fundo enquanto pego a faca ao meu lado. A descanso suavemente em um dos meus braços e então pressiono. Com força.\n\nQuando tenho dois cortes idênticos em ambos os braços, deixo-os afundar na água que está rapidamente avermelhando. Inclino minha cabeça para trás e suspiro, pois o mundo começa a girar. Não vai demorar mais..."
 health.6011.desc: "Assim que estou prestes a cortar meu braço com a faca, com o vapor do banho quente me envolvendo, guardas irrompem e rapidamente arrancam a faca de minhas mãos.\n\n"
 health.6100.desc: "\"Olá, [ROOT.Char.GetTitledFirstNameNoTooltip|l]. Só queria fazer uma visita para perguntar como você está desde… aquele incidente de algum tempo atrás.\"\n\n[friendly_person.GetTitledFirstName|l] me pergunta com um carinho genuíno, e nem mesmo a menção à minha tentativa de suicídio consegue sufocá-lo completamente."
 health.6100.a: "Estou melhor, obrigado."
 health.6100.b: "Como estou não é da sua conta."
 health.6200.desc_opening: "Em um raro momento de clareza, sinto alguém ao meu lado na cama."
 health.6200.desc_close_person: "\n\nDeve ser meu [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('close_person'))] [close_person.GetTitledFirstName|l], uma das poucas pessoas que vêm me ver hoje em dia. Tento alcançar [close_person.GetHerHim], mas minhas mãos nem se movem…"
 health.6200.desc: "As únicas pessoas que vêm me visitar ultimamente são os serviçais, mas eu preciso de #EMP alguém#! para me libertar..."
 health.6200.a: "\"[close_person.GetFirstNameNoTooltip]... Por favor... Acabe com isso...\""
 health.6200.a_success: "[close_person.Custom('ES_ElElla')|U] concorda em fazê-lo"
 health.6200.a_failure: "[close_person.Custom('ES_ElElla')|U] me rejeita"
 health.6200.a_failure_tt: "Você não morre"
 health.6200.b: "Não posso pedir isso a [close_person.Custom('ES_ElElla')]. Um servo deve fazê-lo…"
 health.6200.b_2: "Um serviçal deve fazer isso..."
 health.6200.b_success: "Um serviçal atende ao seu desejo"
 health.6200.b_failure: "Nenhum serviçal concorda"
 health.6203.desc: "Sento-me ao lado da cama [incapable_person.Custom('ES_DelDela')] [incapable_person.GetTitledFirstName|l] quando, de repente, [incapable_person.GetSheHe] parece se agitar até quase despertar, com o olhar voltado para cima. Desde que ficou pres[incapable_person.Custom('ES_OA')] a este leito, mal disse uma palavra, mas de repente o silêncio é quebrado por uma voz ofegante.\n\n\"[ROOT.Char.GetFirstNameNoTooltip]? [ROOT.Char.GetFirstNameNoTooltip], por favor... Acabe com isto. Misericórdia...\""
 health.6203.desc_murder: "\n\n não faz ideia de que está se encaixando perfeitamente nos meus planos!"
 health.6203.a: "Eu... Eu entendo..."
 health.6203.b: "Não! Como você pode pedir algo assim de mim?!"
 health.6204.desc_opening: "Não consigo entender a resposta de [close_person.GetTitledFirstName|l], mas não sai do meu lado.\n\n"
 health.6204.desc_1: "Depois de um tempo, sinto movimento e, em seguida, noto uma leve pressão contra meu rosto. A pressão aumenta e descubro que não consigo respirar, e tudo o que sinto é… gratidão. [close_person.Custom('ES_ElElla')|U] aceitou. [close_person.Custom('ES_ElElla')|U]…"
 health.6204.desc_2: "Depois de um tempo, sinto movimento e, então, noto uma pressão fria e aguda contra o pescoço. Mal sinto o corte. Mas ouço como [close_person.Custom('ES_ElElla')] toma fôlego, ouço a faca tilintar no chão, uma espécie de gemido nos ouvidos… E então… nada."
 health.6204.a: "Livre, finalmente..."
 health.6205.desc_1: "Depois de um tempo, sinto movimento e, em seguida, noto uma leve pressão contra o meu rosto. A pressão aumenta e percebo que não consigo respirar, e tudo o que sinto é… gratidão. სწორედ quando estou prestes a desmaiar, o ar volta a jorrar para os meus pulmões. Ouço choros e uma voz histérica. Ouço passos saindo do meu [ROOT.Char.Custom('GetRoom')|l]."
 health.6205.desc_2: "Depois de um tempo, sinto movimento, e então sinto uma pressão fria e afiada contra o meu pescoço. A pressão aumenta e – e eu ouço a faca cair no chão. Ouço choros, uma voz suplicante, passos saindo do [ROOT.Char.Custom('GetRoom')|l]."
 health.6205.a: "Não... Por favor... Volte..."
 health.6206.desc: "\"[ROOT.Char.GetFirstNameNoTooltip]…\"\n\nOuço a voz de [close_person.GetFirstName] como se viesse do outro lado de um grande vazio. \"[ROOT.Char.GetFirstNameNoTooltip], não… não consigo\".\n\nO desespero me invade, e apenas o som de choros e de passos se afastando atravessa a névoa da minha mente."
 health.6207.desc: "Na próxima vez que um serviçal entra em meu [ROOT.Char.Custom('GetRoom')|l], me esforço para sair da névoa da minha mente, da letargia do meu corpo.\n\n\"Você... quem...?\".\n\n\"Eu, [ROOT.Char.Custom('FormOfAddressForLiege')]?\". Ele se aproxima rapidamente do leito. \"Sou [servant.GetFirstName]. Posso fazer algo por você?\"."
 health.6207.a: "\"[servant.GetFirstNameNoTooltip]... Por favor... Acabe com isso...\""
 health.6207.a_success: "[servant.Custom('ES_ElElla')|U] concorda em fazê-lo"
 health.6207.a_failure: "[servant.Custom('ES_ElElla')|U] se recusa"
 health.6209.desc_refusal: "\"Ó[ROOT.Char.Custom('FormOfAddressForLiege')|U]! Eu…\"\n\n"
 health.6209.desc: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U]! Jamais poderia…! Como vocês podem me pedir algo assim…?\"\n\nO desespero me invade e só o som de choros e passos se afastando atravessa a névoa da minha mente."
 health.6210.desc: "Estou esperando. Isso eu consigo lembrar mesmo entre a névoa da minha mente… estou esperando a libertação que [close_person.GetTitledFirstName|l] pode me dar, mas não chega. Por quê…? Por que não chega?"
 health.6210.a: "Será que [close_person.GetSheHe] também me abandonou…?"
 #Infirm events
 health.7000.t: "Prisioneiro do Meu Próprio Corpo"
 health.7000.desc: "Eu sabia que envelhecer significaria fazer tudo mais devagar, mas não imaginava que tudo chegaria a uma paralisação até a minha morte. Ultimamente, sinto uma malaise constante e tudo exige mais esforço do que antes. Estou preocupado que, se eu me deitar, talvez não consiga mais me levantar. Não há dúvidas de que o meu tempo está se esgotando."
 health.7000.desc_collapse: "Eu sei que estava me excedendo — deveria apenas ter ouvido o que meu corpo estava me dizendo, mas escolhi ignorar. \"Vou terminar isso antes de ir para a cama; só mais um pouco, e então descanso.\" De repente, senti tontura e, ao levantar, minha visão escureceu.\n\nNo dia seguinte, acordei em minha cama, incapaz de me levantar, já que meu corpo se recusa a me obedecer. Talvez [ROOT.Char.GetFaith.HighGodName] tenha decidido me punir por não tratar esse vaso destinado a servir [ROOT.Char.GetFaith.HighGodNameAlternate] com respeito."
 health.7000.desc_closing: "\n\nSinto que só me resta aguardar o doce abraço da morte me reclamar."
 health.7000.a: "Quanto tempo terei que esperar?"
 health.7000.a.lazy: "Pelo menos posso ficar deitado o dia todo..."
 health.7100.desc: "Que dia é hoje? Há quanto tempo estou descansando desta vez?\n\nVejo-me examinando os rostos de meus visitantes frequentes em busca de alguma indicação — rugas ou cicatrizes — #bold qualquer coisa#! que me sirva de prova de que o tempo ainda passa. De algum modo, as interações que tenho com os outros parecem que estão falando #bold para#! mim, e não #bold comigo#!.\n\nAinda sou eu, ou uma alma removida do meu corpo? Estou vivendo, ou apenas existindo?"
 health.7100.a: "Minha existência é uma tortura."
 health.7200.t: "Onde estou?"
 health.7200.desc: "Um momento, o que estou fazendo aqui? Eu não vim para cá… ou vim? Estou procurando algo?\n\nTalvez não fosse nada… espere, no que eu estava pensando mesmo?\n\nMinha cabeça dói…"
 health.7200.a: "Deveria voltar para a cama…"
 health.7300.t: "Visão turva"
 health.7300.desc: "O sol sempre foi tão brilhante? Seus raios perfuram meus olhos como pontas de lança, melhor eu me retirar para a sombra…\n\nAs sombras sempre foram tão fracas?"
 health.7300.a: "O mundo parece apagado e sem cor."
 health.7400.t: "Coração vacilante"
 health.7400.desc: "O peito está apertado — e estou sem fôlego como nunca antes, ofegante como um cão preto num dia quente. Uma dor leve se insinua na minha mandíbula, depois desce pelo meu braço, e então passa…\n\nMas eu não fiz nada?"
 health.7400.a: "Devo pegar leve."
 health.7500.t: "Ossos doloridos"
 health.7500.desc: "Ai! Por que minhas costas doem tanto? Eu apenas tropecei ao me levantar da cama, um pequeno passo em falso…\n\nSem hematoma nem ferida, mas com uma dor que percorre toda a minha coluna.\n\nCertamente vai passar."
 health.7500.a: "Eu deveria tomar cuidado."
