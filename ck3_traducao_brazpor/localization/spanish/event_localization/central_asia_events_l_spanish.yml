l_spanish:
 central_asia.0001.t: "O Mundo Diante de Mim"
 central_asia.0001.desc: "Todos os líderes dos clãs sabem por que foram chamados. Passamos uma longa noite isolados na iurta do palácio, e convocam xamãs e generais igualmente para falarem diante deles. Não há debate. Saio da tenda quando os primeiros raios do sol rompem o horizonte, e todo o exército reunido já está desperto, aguardando.\n\nMe saúdam, sabendo que eu não sou apenas seu governante, mas soberan[ROOT.Char.Custom('ES_OA')] universal do universo. —Gengis Khan."
 central_asia.0001.a: "É aqui que minha conquista verdadeiramente começa."
 central_asia.0001.mongol_invasion_cb: "Eu posso usar o [mongol_invasion_casus_belli|lE]"
 central_asia.0002.t: "Gengis Khan"
 central_asia.0002.desc: "Fui convocado por meu suserano para um Grande Kurultai, uma reunião de todos os líderes de clãs e vassalos do reino. Todos sabíamos o motivo, e nunca houve qualquer dúvida nas deliberações que duraram a noite toda, realizadas na iurta enfumaçada. [genghis_khan.GetFullNameNoTooltip] é senhor[genghis_khan.Custom('ES_XA')] do universo: Gêngis Khan.\n\nNão houve cerimônia de coroação, pois quem poderia julgá[genghis_khan.Custom('ES_LoLa')]? Em vez disso, ele fez uma declaração diante de seus exércitos reunidos.\n\n«Hoje partimos para conquistar tudo o que jaz sob o Grande Céu!»."
 central_asia.0002.a: "O mundo tremerá diante de nós!"
 central_asia.0003.desc: "Arautos nos trazem notícias de um novo governante nas estepes, alguém que se autodenomina "Gengis Khan", autoproclamado governante do universo. Uma horda unida de cavaleiros e guerreiros está se espalhando para subjugar aqueles que se recusam a se curvar.\n\nEssas são reivindicações ridículas, é claro, mas também chegaram até nós notícias da queda de grandes cidades diante de um conquistador feroz..."
 central_asia.0003.a.distant: "Isso tudo logo será esquecido."
 central_asia.0003.a.neighbor: "Devemos nos preparar. Há tempos difíceis pela frente."
 central_asia.0011.t: "O Berço das Estepes"
 central_asia.0011.desc: "A herança do passado não é apenas um poderoso símbolo, mas uma força orientadora por si só. Como eram antes, os povos diversos desta terra serão unidos e liderados sob a bandeira de Báctria. Minha bandeira.\n\nCom cascos trovejantes e pés marchantes, todos aqueles que viajam entre o Oriente e o Ocidente saberão que governamos o céu aberto."
 central_asia.0011.a: "Carregamos a força de muitos povos!"
 central_asia.0012.desc: "Meu/minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('bactrian_emperor'))], [bactrian_emperor.GetTitledFirstName|l], reivindicou as antigas terras da Báctria e pretende governá-las como uma só, como fizeram os reis nos tempos antigos.\n\nPara aqueles que viajam entre o Oriente e o Ocidente, esta terra pode parecer inóspita, mas sabemos que ela está verdadeiramente repleta de vida."
 central_asia.0012.a: "Carregamos a força de muitos povos!"
 central_asia.0013.desc: "[bactrian_emperor.GetFullName] reivindicou todas as terras da antiga Báctria e se declarou a única autoridade verdadeira sobre elas. Mas essa pessoa tola parece ter deixado passar um pequeno detalhe. Algumas das terras que [bactrian_emperor.GetSheHe] reivindica são minhas!"
 central_asia.0013.a: "Terá que arrancá-las do meu cadáver!"
