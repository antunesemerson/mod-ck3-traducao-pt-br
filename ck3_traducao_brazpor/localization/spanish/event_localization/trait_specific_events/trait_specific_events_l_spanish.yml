l_spanish:
 trait_specific.1001.desc: "Pessoas estranhas têm aparecido ao redor de [ROOT.Char.Custom('GetCourt')|l] ultimamente – algumas que só vejo como sombras no canto do meu olho, e outras que vejo rapidamente e depois parecem desaparecer.\n\nNão importa quantas eu coloque na tarefa, essas pessoas estranhas não podem ser encontradas, mas a intensidade das suas zombarias só aumenta!"
 trait_specific.1001.a: "Ali! Eu poderia jurar..."
 trait_specific.1002.desc: "Ultimamente tenho tido dificuldade em pensar com clareza – meus pensamentos estão dispersos como nuvens em um céu de verão.\n\nOs pássaros fora do meu [ROOT.Char.Custom('ResidenceBuilding')] começaram a cantar outra melodia. Outras pessoas falam em charadas intencionais, e #EMP ninguém#! reconhece que coentro é uma especiaria verdadeiramente horrível."
 trait_specific.1002.a: "Espere, no que eu estava pensando mesmo?"
 trait_specific.1010.t: "Loucura Emergente"
 trait_specific.1010.desc: "Esta última semana tenho estado em espiral, como uma folha em um tornado, girando, girando, girando. O que é realidade? O que é #EMP real#!? Eu não consigo mais responder a isso.\n\nTudo o que sei é que a mulher nas nuvens me entende — mas as sombras que se curvam se espalham cada vez mais a cada dia."
 trait_specific.1010.a: "Agarrando como roedores... Shoo, vão embora!"
 trait_specific.2001.t: "O Início"
 trait_specific.2001.desc: "Una sensación de malestar aumenta en mi estómago. Intento regresar a mi [ROOT.Char.Custom('GetChamber')], pero ¡la entrada se encoge ante mis propios ojos! ¿Q-qué está #EMP pasando?#!\n\nDe repente, huelo algo… algo que sé que he olido antes, pero… ¿#EMP dónde#!? Alguien me pregunta si estoy bien, pero no le puedo responder, no puedo hacer nada…"
 trait_specific.2001.a: "Quanto tempo fiquei id[ROOT.Char.Custom('ES_OA')]?"
 trait_specific.2002.desc: "Últimamente, he experimentado algunos… episodios. Algo se apodera de mí, toma posesión de mi cuerpo y me deja agotad[ROOT.Char.Custom('ES_OA')] y confundid[ROOT.Char.Custom('ES_OA')].\n\nHe tratado de ocultarlo a los demás, de esconderlo, pero es difícil controlar algo que aparece y desaparece a su antojo."
 trait_specific.2002.a: "Eles me olham como se eu estivesse #EMP poseíd[ROOT.Char.Custom('ES_OA')]#!."
 trait_specific.3001.desc: "Una flecha perdida me pasa silbando cerca de la cabeza y no siento #EMP nada#!: ni miedo ni pánico, ni siquiera ira.\n\nEsta ha sido una nueva pauta preocupante… Siento que existo detrás de una cortina que me aleja de sentir, me aleja del mundo. Y estoy tan #EMP cansad[ROOT.Char.Custom('ES_OA')]#!…"
 trait_specific.3001.a: "Acho que vou voltar para a cama."
 trait_specific.3002.desc_opening: "Qual é o significado de tudo isso? Por que passamos por esses movimentos dia após dia..."
 trait_specific.3999.t: "Dias Cinzentos"
 trait_specific.3999.desc: "Durante toda a minha vida, senti que a felicidade não vinha tão facilmente para mim quanto para os outros, e agora o sentimento é tão estranho para mim quanto o ar é para um peixe."
 trait_specific.3999.desc_end: "\n\nMotivação e energia escapam de mim. Enquanto minha vida afunda na monotonia cinzenta, sinto como se devesse entrar em pânico, mas até mesmo isso está além de mim agora."
 trait_specific.3999.a: "É tudo demais..."
 trait_specific.4001.t: "Leitura Alternativa"
 trait_specific.4001.landed: "Em um canto empoeirado da biblioteca, encontro um tomo"
 trait_specific.4001.adventurer: "No canto de um baú surrado, encontro um tomo"
 trait_specific.4001.desc: "encuadernado en cuero y grabado con símbolos extraños, en parte escondido detrás de otros libros. Es antiguo, pero es obvio que lo han usado hace poco.\n\nAl hojearlo, enseguida me doy cuenta de que se trata de unos… conocimientos #EMP no convencionales#!."
 trait_specific.4001.a: "Interessante... Eu olho ao redor antes de me sentar para ler."
 trait_specific.4001.a_tt: "Espero que quem esteve lendo o livro recentemente não esteja por perto para me ver..."
 trait_specific.4001.b: "Herética! Vou entregá-lo ao [ROOT.Char.GetFaith.PriestNeuterPlural]."
 trait_specific.5001.t: "Gourmet"
 trait_specific.5001.desc: "Carne de veado, alce, codorna... Há tantas coisas exóticas para experimentar neste mundo!\n\nTendo provado tantas carnes requintadas ao longo dos anos, não posso deixar de me perguntar o que mais existe por aí? Que aventuras de sabor poderão aguardar minha língua?"
 trait_specific.5001.a: "Devo experimentar tudo!"
 trait_specific.5001.a.tt: "Vou procurar por tipos mais exóticos de carne."
 trait_specific.5001.b: "A variação que tenho aqui está boa."
 trait_specific.5002.desc: "Em minha busca por carnes raras, um pensamento tomou raiz em minha mente. Mal posso admitir isso até para mim mesmo, mas não posso deixar de me perguntar como será o gosto da carne #EMP humana#!...\n\nEnquanto um servo de [ROOT.Char.Custom('GetCourt')|l] adoece, à beira da morte, me vejo ordenando que ele seja colocado sob meus cuidados pessoais."
 trait_specific.5002.a: "Perdoe-me – eu preciso descobrir!"
 trait_specific.5002.b: "Não farei nada além de rezar por sua alma."
 trait_specific.5003.t: "Levado ao Extremo"
 trait_specific.5003.desc: "Era para ser apenas uma saída curta, um passeio agradável pelo campo. Agora, já se passaram dias desde que vimos outra pessoa viva, e nossos suprimentos já se foram – já comemos os cavalos.\n\nNosso guia promete que alcançaremos a civilização dentro da semana, mas alguns dos servos já chegaram ao seu limite, e meu estômago ronca mais alto a cada hora que passa."
 trait_specific.5003.a: "Farei o que for necessário para sobreviver..."
 trait_specific.5003.b: "Nós podemos resistir a isso!"
 trait_specific.6001.t: "Gosto Alternativo"
 trait_specific.6001.desc: "Ultimamente, atividades regulares não têm... #EMP me satisfeito#!. Médicos recomendaram várias pomadas, mas nada desperta meu interesse.\n\nÀ medida que fico cada vez mais desesperado, tropeço em alguns livros, escondidos no fundo de uma pilha em uma barraca de mercadores, que retratam algumas... atividades incomuns. Descubro que não consigo parar de virar as páginas, e o calor começa a se agitar em minhas entranhas."
 trait_specific.6001.a: "Bem, se é isso que é necessário..."
 trait_specific.6001.b: "Eu sou melhor que isso!"
 trait_specific.6002.t: "Experimentando"
 trait_specific.6002.desc: "Me estiro para soltar su [lover.Custom('GetUpperClothingArticle')] a mi [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('lover') )], [lover.GetTitledFirstName|l], cuando se aparta de repente.\n\n«Llevo un tiempo queriendo probar cosas #EMP nuevas#!, [ROOT.Char.Custom('LoverPetName')] mí[ROOT.Char.Custom('ES_OA')]», arrulla, mientras busca debajo de la cama con una sonrisa astuta.\n\nLa mano vuelve a aparecer y agarra [ROOT.Char.Custom('DeviantObjectArticle')]. «Había pensado que podríamos… usar #EMP esto#!»."
 trait_specific.6002.a: "Muito bem, não me deixe esperando!"
 trait_specific.6002.b: "Você gosta de coisas como... #EMP isso?!#!"
 trait_specific.6002.b_known: "Eu sabia que ela/ele gostava de coisas estranhas, mas isso?!"
 trait_specific.7001.t: "Fundo do Copo!"
 trait_specific.7001.desc: "Nada pode me acalmar tão eficientemente quanto uma boa dose de [ROOT.Char.Custom('RegionalAlcoholicDrink')]. Depois de um dia difícil, depois de um bom dia, depois de #EMP qualquer#! dia... Eu sempre sei que encontrarei consolo no fundo dos meus copos."
 trait_specific.7001.a: "Traga-me outro!"
 trait_specific.7002.b: "Eu sou mais forte que isso."
 trait_specific.8001.t: "Interesse em Germinação"
 trait_specific.8001.desc: "Um mercador jovial me colocou um saquinho de sementes na mão; plantas que afirma que fortalecem tanto a saúde quanto a mente.\n\nDevo admitir que tenho pouca experiência no cuidado de plantas, mas quão difícil isso pode ser?"
 trait_specific.8001.a: "Usarei essas para começar um jardim privado!"
 trait_specific.8001.a.success: "Você cultiva um jardim exuberante"
 trait_specific.8001.a.small_success: "O projeto falha, mas você aprende muito"
 trait_specific.8001.a.failure: "As sementes se recusam a crescer"
 trait_specific.8002.b: "Elas devem valer alguma coisa..."
 trait_specific.9001.t: "Reflexões Noturnas"
 trait_specific.9001.desc: "Tomo um gole de [ROOT.Char.Custom('GetExpensiveDrink_Singular')] e examino os meus rabiscos mais recentes.\n\n#POE [ROOT.Char.Custom('GeneratePoem_Title')|U]#!\n[ROOT.Char.Custom('GeneratePoem_Intro_Rhyming')]\n[ROOT.Char.Custom('GeneratePoem_Outro_Rhyming')]\n\nSem dúvida, sou uma das grandes mentes artísticas da minha época!"
 trait_specific.9001.a: "Um belo verso! No que devo meditar em seguida?"
 trait_specific.9001.b: "Escrever é divertido, mas eu não sei sobre #EMP rimar#!."
 trait_specific.9001.c: "Talvez eu deva mandar encher uma banheira..."
 trait_specific.8501.t: "Risadas Suspeitas"
 trait_specific.8501.desc: "Estava falando com vários dos meus [ROOT.Char.Custom('GetCourtierPlural')] de um assunto bastante sério, quando não consigo deixar de notar as risadinhas de [mean_courtier.Custom('ES_DelDela')] [mean_courtier.GetTitledFirstName|l].\n\nSó quando me confronto com [mean_courtier.GetSheHe] e me pede para repetir a palavra "sospechoso" é que percebo que está zombando do meu ceceio."
 trait_specific.8501.a: "Grosseiro, mas o que posso fazer?"
 trait_specific.8501.b: "Aprisione[mean_courtier.GetHerHim]!"
 trait_specific.8501.c: "Se acha tão engraçado, talvez gostasse de ter o seu próprio."
 trait_specific.8501.d: "Diga de novo, desafio você."
 trait_specific.8501.e: "Talvez gostasse de uma olhada mais de perto."
 trait_specific.8501.f: "Na verdade, acho que você vai descobrir que [ROOT.Char.GetFaith.HealthGodName] tinha um problema de dicção."
 trait_specific.8501.g: "Você não vai #EMP acreditar#! no que posso fazer com esta língua..."
 trait_specific.8501.d.tt: "[mean_courtier.GetTitledFirstName] e você têm um [single_combat_duel|E]"
 trait_specific.8501.h: "Está tudo bem?"
