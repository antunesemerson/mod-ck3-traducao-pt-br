l_spanish:
 bastardy_pregnancy_announcement_tooltip: "O mundo descobre a verdadeira linhagem da criança"
 secret_bastard.0001.t: "Uma Linhagem Obscura"
 secret_bastard.0001.real_father: "A corte de [mother.GetTitledFirstName|l] celebra o nascimento de seu bebê, parece que sem saber a verdade. Que a criatura que dorme em seus braços na verdade não é de [assumed_father.GetTitledFirstName|l], mas minha!"
 secret_bastard.0001.real_father.no_assumed_father: "Sob a aparência de celebração, os rumores correm pela corte de [mother.GetTitledFirstName|l] após o nascimento de seu bebê. Se soubessem o que eu sei, que a criança que dorme nos braços dela é, na verdade, minha…"
 secret_bastard.0001.real_father.multiple: "A corte de [mother.GetTitledFirstName|l] celebra o nascimento de seus bebês, aparentemente sem saber da verdade. Que as criaturas que dormem em seus braços na verdade não são de [assumed_father.GetTitledFirstName|l], mas minhas!"
 secret_bastard.0001.real_father.no_assumed_father.multiple: "Sob a aparência de celebração, os rumores correm pela corte de [mother.GetTitledFirstName|l] após o nascimento de seus bebês. Se soubessem o que eu sei, que as crianças que dormem em seus braços são minhas…"
 secret_bastard.0001.assumed_father: "Meu [ROOT.Char.Custom2('RelationToMe', mother)], [mother.GetTitledFirstName|l], aperta contra o peito seu recém-nascido. Teria sido um momento de alegria se eu não soubesse a verdade.\n\nNão está segurando meu/minha filh[child.Custom('ES_OA')], mas sim um bastardo de [real_father.GetTitledFirstName|l]!"
 secret_bastard.0001.assumed_father.multiple: "Minha [ROOT.Char.Custom2('RelationToMe', mother)], [mother.GetTitledFirstName|l], segura seu filhos recém-nascidos no peito. Isso teria sido um momento de alegria se eu não soubesse a verdade.\n\nEssas não são minhas crianças que ela segura, mas sim o fruto da união ilegítima com [real_father.GetTitledFirstName|l]!"
 secret_bastard.0001.family_of_mother: "Minha [ROOT.Char.Custom2('RelationToMe', mother)], [mother.GetTitledFirstName|l], embala em seus braços seu/sua lind[child.Custom('ES_OA')] recém-nascid[child.Custom('ES_OA')]. Mas não consigo evitar me sentir incomodad[ROOT.Char.Custom('ES_OA')] ao saber a verdadeira linhagem de seu [child.Custom('GetDaughterSon')]. A criança não nasceu do casamento da minha [ROOT.Char.Custom2('RelationToMe', mother)] com [assumed_father.GetTitledFirstName|l], mas sim de uma união ilícita."
 secret_bastard.0001.family_of_mother.multiple: "Minha [ROOT.Char.Custom2('RelationToMe', mother)], [mother.GetTitledFirstName|l] embala seus belos recém-nascidos nos braços. No entanto, não posso deixar de sentir inquietação, sabendo a verdadeira linhagem deles. As crianças não são fruto do casamento de minha [ROOT.Char.Custom2('RelationToMe', mother)] com [assumed_father.GetTitledFirstName|l], mas sim de uma união ilícita com [real_father.GetTitledFirstName|l]!\n\nO que acontecerá com ela e as crianças se a verdade for revelada?"
 secret_bastard.0001.family_of_real_father: "[mother.GetTitledFirstName] e sua corte celebram que [assumed_father.GetTitledFirstName|l] teve descendência, mas as celebrações ficariam mais contidas se a verdade fosse conhecida.\n\nO bebê que [mother.GetFirstName] aperta contra o peito é o filho bastardo do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('real_father'))], [real_father.GetTitledFirstName|l]!"
 secret_bastard.0001.family_of_real_father.multiple: "[mother.GetTitledFirstName] e sua corte celebram o nascimento dos filhos [assumed_father.Custom('ES_DelDela')] [assumed_father.GetTitledFirstName|l], mas as celebrações seriam mais discretas se a verdade fosse conhecida.\n\nOs bebês que [mother.GetFirstName] segura contra o peito são filhos bastardos do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('real_father'))], [real_father.GetTitledFirstName|l]!"
 secret_bastard.0001.family_of_assumed_father: "A corte do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('assumed_father'))], [father.GetTitledFirstName|l] e sua [SCOPE.Char.Custom2('RelationToMe', mother)], [mother.GetTitledFirstName|l] celebra o nascimento de seu novo rebento. Mas o clima teria esfriado se a verdade fosse conhecida abertamente. \n\nO bebê de [mother.GetFirstName] é de fato a criança bastarda de [real_father.GetTitledFirstName|l]! Que vergonha isso traria à nossa casa se a verdadeira linhagem da criança fosse conhecida…"
 secret_bastard.0001.family_of_assumed_father.multiple: "A corte de meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('assumed_father'))], [father.GetTitledFirstName|l] e sua [SCOPE.Char.Custom2('RelationToMe', mother)], [mother.GetTitledFirstName|l] celebra o nascimento de seus novos rebentos. Mas o ambiente teria sido abalado se a verdade fosse conhecida abertamente. \n\nOs filhos de [mother.GetFirstName] são, na verdade, a prole bastarda de [real_father.GetTitledFirstName|l]! Que vergonha isso traria à nossa casa se a verdadeira linhagem das crianças fosse conhecida..."
 secret_bastard.0001.other: "Os festejos pelo rebento recém-nascido de [mother.GetTitledFirstName|l] acabaram de começar, mas o clima seria bem diferente se sua corte soubesse a verdade.\n\nA criança que ela segura em seus braços não é o resultado de seu casamento com [assumed_father.GetTitledFirstName|l], mas sim a filha bastarda de [real_father.GetTitledFirstName|l]!"
 secret_bastard.0001.other.multiple: "Os festejos pelos recém-nascidos de [mother.GetTitledFirstName|l] acabaram de começar, mas o clima seria bem diferente se sua corte soubesse a verdade.\n\nAs crianças que ela segura em seus braços não são resultado de seu casamento com [assumed_father.GetTitledFirstName|l], mas sim fruto do adultério com [real_father.GetTitledFirstName|l]!"
 secret_bastard.0001.a: "Se eles soubessem..."
 secret_bastard.0002.t: "De Origem Incerta"
 secret_bastard.0002.real_father: "[mother.GetTitledFirstName] carrega o peso de ter dado à luz a um bastardo sem pai.\n\nÉ uma situação terrível para uma solteira e seu filho, ainda assim, não posso deixar que se saiba que eu sou o verdadeiro pai\n\nAi, o que será do meu [SCOPE.sC('child').Custom('GetDaughterSon')]…?"
 secret_bastard.0002.family_of_mother: "Minha [ROOT.Char.Custom2('RelationToMe', mother)], [mother.GetTitledFirstName|l], deu à luz uma criança condenada a viver sem pai, na bastardia.\n\nÉ uma vergonha para nossa família, mas, até agora, [real_father.GetTitledFirstName|l] não se mostra disposto a se apresentar como o pai do bebê de [mother.GetFirstName], se é que ele sabe..."
 secret_bastard.0002.family_of_real_father: "É bem sabido que o recém-nascido de [mother.GetTitledFirstName|l] é uma criatura sem pai, mas eu conheço a verdade. Foi meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('real_father'))], [real_father.GetTitledFirstName|l], que gerou o bebê que agora está em seus braços! Só posso rezar para que [real_father.GetFirstName] saiba o que está fazendo."
 secret_bastard.0002.family_of_real_father.dislike: "Minhas esperanças não são altas."
 secret_bastard.0002.other: "Os rumores e acusações sussurradas correm soltos sobre quem será o pai da criatura recém-nascida de [mother.GetTitledFirstName|l].\n\nÉ claro que não sabem o que eu sei: que o pai do bebê é na verdade [real_father.GetTitledFirstName|l]!"
 secret_bastard.0002.a: "Um escândalo a espera."
 secret_bastard.0002.b: "\"Espere! A crianç[child.Custom('ES_OA')]… é mi[child.Custom('ES_OA')]!\""
 secret_bastard.0010.t: "Exposto"
 secret_bastard.0010.spouse_reveal: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('father'))] descobriu a verdadeira natureza do meu filho, e agora revelou a verdade ao mundo!"
 secret_bastard.0010.other_reveal: "Meu segredo cuidadosamente guardado foi exposto pela [secret_exposer.GetTitledFirstName|l]! Minha família hesita em falar comigo, e [father.GetFirstName] se recusa a olhar nos meus olhos."
 secret_bastard.0010.desc: "\n\nO que será de mim e do meu filho agora que todos sabem que [real_father.GetTitledFirstName|l] é o verdadeiro pai?"
 secret_bastard.0010.a: "Eu temo pelo nosso futuro!"
 secret_bastard.001.opening: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('mother'))], [mother.Custom('ES_ElLa')] [mother.GetTitledFirstName|l], há algum tempo vem mostrando sinais de gravidez,"
 secret_bastard.0011.t: "A Mancha da Bastardia"
 secret_bastard.0011.spouse_exposer: "e é hora de que o mundo saiba a verdade. [mother.GetFirstName] compartilhou leito com [real_father.GetTitledFirstName|l], e [real_father.GetFirstName] é o verdadeiro pai!"
 secret_bastard.0011.desc: "e nunca teria imaginado que a criança pudesse pertencer a mais ninguém além de mim.\n\nMas [mother.GetFirstName] acaba de confessar abertamente ao mundo que compartilhou a cama com [real_father.GetTitledFirstName|l] e que ele é o verdadeiro pai!"
 secret_bastard.0011.a: "Como ela pôde?"
 secret_bastard.0011.b: "E pensar que uma vez me jurou fidelidade."
 secret_bastard.0012.t: "O Escândalo"
 secret_bastard.0012.dislike_desc: "e todos pensavam que seu [mother.Custom2('RelationToMe', SCOPE.sC('father'))], [father.GetTitledFirstName|l], era o pai da criança. Agora ficou claro que o verdadeiro pai é ninguém menos que [real_father.GetTitledFirstName|l]!\n\nOh, meu Deus, que escândalo!"
 secret_bastard.0012.like_desc: "e todos pensavam que seu [mother.Custom2('RelationToMe', SCOPE.sC('father'))], [father.GetTitledFirstName|l], era o pai da criança. Agora ficou claro que o verdadeiro pai é ninguém menos que [real_father.GetTitledFirstName|l]!\n\nSe ao menos pudesse ter permanecido em segredo!"
 secret_bastard.0012.a: "Agora todos sabem."
 secret_bastard.0013.t: "Este Filho Meu"
 secret_bastard.0013.desc: "Minhas aventuras com [mother.GetTitledFirstName|l] resultaram em uma criança!"
 secret_bastard.0013.secret_exposer: "Eu tive que deixar claro, por toda parte. A criança que [mother.GetTitledFirstName|l] carrega é minha!\n\nAgora todos sabem."
 secret_bastard.0013.suspicious_desc: "e minhas suspeitas de que eu sou o pai da criança cresceram em conjunto com a barriga dela.\n\nAgora eu sei com certeza, assim como o resto do reino. A criança é minha!"
 secret_bastard.0013.a: "É melhor assim, com certeza."
 secret_bastard.0014.t: "Sinais de Traição"
 secret_bastard.0014.desc: "mas nunca tinha descartado que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('real_father'))] tivesse algo a ver. E, no entanto, agora está claro que [real_father.GetFirstName] é o verdadeiro pai do bebê ainda não nascido de [mother.GetFirstName]!"
 secret_bastard.0014.a: "Como você pôde fazer isso, [real_father.GetFirstNameNoTooltip]?"
 secret_bastard.1000.t: "Linhagem Conhecida"
 secret_bastard.1000.desc: "Chega de segredos ou tentativas de esconder a verdade.\n\nÉ bem sabido que o pai da criança que cresce dentro de mim não é outro senão [real_father.Custom2('MyCharacterIntroductionNoComma' , ROOT.Char)]."
 secret_bastard.1000.real_father_reveal: "Chega de segredos ou tentativas de encobrir a verdade!\n\n[real_father.Custom2('MyCharacterIntroduction' , ROOT.Char)|U] tornou público que ele é o pai do meu filho ainda não nascido."
 secret_bastard.1000.a: "Agora a verdade veio à tona."
 secret_bastard.1000.a.tt: "[real_father.GetShortUINameNoTooltip] será conhecido como o pai do meu filho quando ele nascer"
 secret_bastard.1001.t: "A Linhagem de um Neto"
 secret_bastard.1001.desc: "Que minha [ROOT.Char.Custom2('RelationToMe', mother)], [mother.GetTitledFirstName|l], porta um filho concebido em uma união pecaminosa não é segredo algum, afinal de contas, ela não é casada.\n\nMas saber que [real_father.GetTitledFirstName|l] é o [real_father.GetMotherFather] da criança…"
 secret_bastard.1001.a: "Como ele pôde colocar minha [ROOT.Char.Custom2('RelationToMe', mother)] nessa posição?"
 secret_bastard.1002.t: "Fora do Casamento"
 secret_bastard.1002.desc: "Que minha [ROOT.Char.Custom2('RelationToMe', mother)] [mother.GetTitledFirstName|l] porta um filho concebido em uma união pecaminosa não é segredo, já que afinal de contas ela não é casada.\n\nMas o [real_father.GetMotherFather] da criança havia sido um segredo até agora. [real_father.GetTitledFirstName|l] é o responsável!"
 secret_bastard.1003.t: "[mother.GetFirstNameNoTooltip] e Eu"
 secret_bastard.1003.desc: "Que minha [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('mother'))] [mother.GetTitledFirstName|l] está carregando meu filho em seu ventre agora é do conhecimento de todos.\n\nQue nosso caso pudesse levar a isso era uma possibilidade da qual eu tinha ciência, mas encarar essa realidade..."
 secret_bastard.1004.desc: "Faz tempo que [mother.GetTitledFirstName|l] carrega um filho de pai desconhecido, mas nunca pensei que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('real_father'))], [real_father.GetTitledFirstName|l], pudesse ter algo a ver com isso.\n\nMas, ai de mim, agora não há dúvida alguma de que é o pai!"
 secret_bastard.2000.t: "A Verdade é Conhecida"
 secret_bastard.2000.desc_opening: "[secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] revelou meu segredo ao mundo!"
 secret_bastard.2000.desc_opening.me: "Finalmente é hora do mundo saber."
 secret_bastard.2000.desc: "\n\nEu mantive em segredo a verdadeira linhagem de meu [child.Custom('GetDaughterSon')] [child.GetTitledFirstName|l] desde antes de ele nascer. No entanto, agora meu caso com seu verdadeiro pai, [real_father.GetTitledFirstName|l]!"
 secret_bastard.2000.a: "O que será de meu [child.Custom('GetDaughterSon')]?"
 secret_bastard.2001.t: "A Verdade"
 secret_bastard.2001.desc_opening.me: "Revelei minhas evidências de que"
 secret_bastard.2001.desc: "[child.GetFirstName] não é meu/minha filh[child.Custom('ES_OA')]."
 secret_bastard.2001.father: "Na verdade, seu pai é [real_father.Custom2('MyCharacterIntroduction', ROOT.Char)]."
 secret_bastard.2001.change_lineage_lowborn.twin: "\n\nÉ uma pena que tenha chegado a isso, mas é preciso que seja conhecido que eles são bastardos plebeus."
 secret_bastard.2001.change_lineage_lowborn: "\n\nÉ uma pena ter chegado a isso, mas precisava ficar sabido que é um[child.Custom('ES_XA')] bastard[child.Custom('ES_OA')] de baixa condição."
 secret_bastard.2001.change_lineage.twin: "\n\nÉ uma pena ter chegado a isso, mas é preciso que se saiba que são bastardos da casa [child.GetHouse.GetName]."
 secret_bastard.2001.change_lineage: "\n\nÉ uma pena que tenha chegado a isso, mas é preciso que se saiba que [child.GetSheHe] é um[child.Custom('ES_XA')] bastard[child.Custom('ES_OA')] da casa [child.GetHouse.GetName]."
 secret_bastard.2001.keep_lineage.twin: "\n\nEmbora seja impossível saber a verdade, a linhagem deles sempre estará envolta em rumores e incertezas."
 secret_bastard.2001.keep_lineage: "\n\nEmbora seja impossível saber a verdade, sua linhagem sempre estará envolta em rumores e incerteza."
 secret_bastard.2001.a: "É melhor assim."
 secret_bastard.2001.b: "É preciso que seja conhecido."
 secret_bastard.2002.t: "Um Segredo Revelado"
 secret_bastard.2002.i_am_exposer: "Fiz saber que, na verdade, [child.GetTitledFirstName|l] é meu filh[child.Custom('ES_OA')] meu[child.Custom('ES_OA')]! Isso implica que também confessei minhas indiscrições com [mother.GetTitledFirstName|l], mas a verdade precisava ser conhecida."
 secret_bastard.2002.other_exposer: "![secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] revelou que [child.GetTitledFirstName|l] é meu filh[child.Custom('ES_OA')] meu[child.Custom('ES_OA')]! Agora todo mundo está ciente das minhas indiscrições com [mother.GetTitledFirstName|l]!"
 secret_bastard.2002.known: "\n\nAs repercussões para [child.GetFirstName] podem ser nefastas. Não é fácil viver sendo de linhagem incerta."
 secret_bastard.2002.not_known: "\n\nClaro que sabia que meus devaneios com [mother.GetTitledFirstName|l] podiam resultar em filhos, mas eu não fazia ideia… Como ela pôde não me dizer isso antes?!"
 secret_bastard.2002.assumed_father_exists: "\n\nSempre haverá quem afirme que [child.Custom('ES_ElElla')] é realmente filh[child.Custom('ES_OA')] de [father.GetTitledFirstName|l], mas não podem fazer nada para dissipar a sombra da dúvida."
 secret_bastard.2002.a: "O segredo foi revelado!"
 secret_bastard.2002.b: "Oh, [child.GetFirstNameNoTooltip]..."
 secret_bastard.2003.t: "Um Segredo Obscuro"
 secret_bastard.2003.i_exposed: "Finalmente é hora de deixar a verdade ser conhecida."
 secret_bastard.2003.other_exposer: "O segredo que carreguei comigo por tanto tempo agora foi exposto por [secret_exposer.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]."
 secret_bastard.2003.known: "Por fim veio à tona que [real_father.GetTitledFirstName|l] é meu verdadeiro pai e não [father.GetTitledFirstName|l] como [mother.Custom('MotherFather')] havia feito todos acreditarem."
 secret_bastard.2003.not_known: "Sou um[ROOT.Char.Custom('ES_XA')] bastard[ROOT.Char.Custom('ES_OA')]? [father.GetTitledFirstName|l], a pessoa que eu sempre considerei meu pai, não tem nenhum parentesco comigo! [secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] revelou que meu/minha autêntic[father.Custom('ES_OA')] [father.Custom('MotherFather')] é aparentemente [real_father.GetTitledFirstName|l]."
 secret_bastard.2003.desc_ending_exposer: "\n\nEu não posso acreditar que meu pai— que [father.GetTitledFirstName|l] revelaria esse segredo para todos!"
 secret_bastard.2003.desc_ending_known: "\n\nMinha vida nunca mais será a mesma!"
 secret_bastard.2003.desc_ending_not_known: "\n\nPensar que minha [mother.Custom('MotherFather')] faria algo assim comigo!"
 secret_bastard.2003.a: "Que desastre!"
 secret_bastard.2004.t: "Uma Linhagem Confusa"
 secret_bastard.2004.likes: "Que [child.GetTitledFirstName|l] é filh[child.Custom('ES_OA')] ilegítim[child.Custom('ES_OA')] de [mother.GetTitledFirstName|l] e [real_father.GetTitledFirstName|l] é um segredo que me havia sido confiado, mas agora todos conhecem!\n\nÉ difícil acreditar que [child.GetTitledFirstName|l] seja o resultado de uma união tão vergonhosa. Só posso esperar que a catarse de ter revelado a verdade lhe faça bem."
 secret_bastard.2004.dislikes: "A verdade finalmente veio à tona!\n\nToda a corte sussurra sobre o fato de que [child.GetTitledFirstName|l] seja o resultado de uma união pecaminosa entre [real_father.GetTitledFirstName|l] e [mother.GetTitledFirstName|l].\n\n[child.GetSheHe|U] nunca agiu como convinha a um[child.Custom('ES_XA')] crianç[child.Custom('ES_OA')] legítim[child.Custom('ES_OA')] e agora finalmente será tratad[child.Custom('ES_OA')] como convém à sua posição."
 secret_bastard.2004.a: "Pobre [child.GetTitledFirstNameNoTooltip|l]!"
 secret_bastard.2004.b: "Imagine a vergonha que [child.GetFirstNameNoTooltip] deve estar sentindo!"
 secret_bastard.2004.c: "Pobres [child.GetFirstNameNoTooltip] e [child_twin.GetFirstNameNoTooltip]!"
 secret_bastard.2004.d: "Imagine a vergonha que eles devem estar sentindo!"
 secret_bastard.2005.t: "Um Segredo Revelado"
 secret_bastard.2005.alive: "[child.GetTitledFirstName] é filh[child.Custom('ES_OA')] ilegítim[child.Custom('ES_OA')] de meu [ROOT.Char.Custom2('RelationToMe', mother)] [mother.GetTitledFirstName|l] e [real_father.GetTitledFirstName|l]!\n\nE pensar que [mother.GetSheHe] se comportou de um modo tão vergonhoso com [father.GetTitledFirstName|l] , agindo pelas costas dele para cometer adultério."
 secret_bastard.2005.dead: "[child.GetTitledFirstName] é filh[child.Custom('ES_OA')] ilegítim[child.Custom('ES_OA')] de meu [ROOT.Char.Custom2('RelationToMe', mother)] [mother.GetTitledFirstName|l] e [real_father.GetTitledFirstName|l]!\n\nE pensar que o falecido [father.GetTitledFirstName|l] tenha sido enganado de um modo tão vil por [mother.GetTitledFirstName|l]."
 secret_bastard.2005.end: "\n\nComo poderei voltar a confiar em [mother.GetSheHe]?"
 secret_bastard.2005.a: "[mother.GetSheHe|U] é infiel!"
 secret_bastard.3000.t: "Um Segredo Revelado"
 secret_bastard.3000.married_known: "\"Você tem um[child.Custom('ES_XA')] bastard[child.Custom('ES_OA')]?\"\nMinha esposa me confronta com um fato chocante e eu não tenho nenhuma boa resposta a dar.\n\nEu já sabia que [child.GetTitledFirstName|l] era o resultado das minhas andanças com [mother.GetTitledFirstName|l], mas o fato de que agora sua verdadeira linhagem seja conhecida foi uma surpresa. O que eu faço agora?"
 secret_bastard.3000.married_not_known: "“Você tem um[child.Custom('ES_XA')] bastard[child.Custom('ES_OA')]?”\nMinha esposa me confronta com um fato chocante e não tenho nenhuma boa resposta a dar.\n\nEstou tão surpreso quanto qualquer um, embora, é claro, eu soubesse que havia o risco de isso acontecer. Mas que [mother.GetTitledFirstName|l] não me contasse antes a verdadeira linhagem de [child.GetTitledFirstName|l]... E agora o que faço?"
 secret_bastard.3000.known: "O segredo de que [child.GetTitledFirstName|l] é filh[child.Custom('ES_OA')] meu[child.Custom('ES_OA')] está de repente na boca de todos!\n\nEu já sabia que [child.GetFirstNameNoTooltip] era o resultado dos meus devaneios com [mother.GetTitledFirstName|l], mas as repercussões para [child.GetFirstNameNoTooltip] podem ser terríveis. Viver como um[child.Custom('ES_XA')] bastard[child.Custom('ES_OA')] não é fácil."
 secret_bastard.3000.not_known: "O segredo de que [child.GetTitledFirstName|l] é filh[child.Custom('ES_OA')] meu/minha está de repente na boca de todos!\n\nEmbora isso me surpreenda tanto quanto aos outros, é claro que eu sabia que havia esse risco. Mas que ela não me contasse antes..."
 secret_bastard.3000.a: "Agora todos também sabem!"
 secret_bastard.3000.b: "Isso é um desastre!"
 secret_bastard.3001.t: "Minha Verdadeira Herança"
 secret_bastard.3001.incest_marriage: "[real_father.GetTitledFirstName] é meu [real_father.Custom('MotherFather')]!\n\nSaber a verdade é um grande alívio, mas traz… complicações. Minha [incest_spouse.Custom('WifeHusband')], [incest_spouse.GetTitledFirstName|l], é o/a [real_father.Custom2('RelationToMe', SCOPE.sC('incest_spouse'))] de [real_father.GetFirstName], o que significa que também é minha [incest_spouse.Custom('SisterBrother')]!"
 secret_bastard.3001.known: "O fato de eu ter nascido fora dos laços do casamento tem me assombrado a vida toda. Saber que [real_father.GetTitledFirstName|l] é meu pai, mas nunca falar sobre isso, tem sido um fardo pesado de suportar.\n\nAgora que o segredo foi revelado, sinto um alívio!"
 secret_bastard.3001.not_known: "O fato de eu ter nascido fora dos laços do matrimônio me atormenta desde que nasci. Fui rejeitado e ridicularizado, mas minha mãe se recusou a me revelar minha verdadeira origem, por mais que eu implorasse.\n\n\"É melhor nunca falar dessas coisas.\"\n\nAgora que sei a verdade, enfim posso respirar aliviado. Saber que [real_father.GetTitledFirstName|l] é meu pai me traz uma calma que há muito me escapava."
 secret_bastard.3001.a: "Agora a verdade é conhecida!"
 secret_bastard.3001.b: "Finalmente sei quem é meu pai!"
