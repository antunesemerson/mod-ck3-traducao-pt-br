 secrets.0001.t: "Meu Segredo Exposto!"
 secrets.0001.desc: "[secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] revelou meu segredo para o mundo ver!\n\nMinha luxúria antinatural e desejos incontroláveis são amplamente conhecidos e aceitos como fato!"
 secrets.0001.a: "Como vou viver com essa vergonha?"
 secrets.0101.negative.desc: "[secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] acusou [owner.Custom2('MyCharacterIntroduction', ROOT.Char)] de ser um[owner.Custom('ES_XA')] pervertid[owner.Custom('ES_OA')]! Os detalhes do seu relato são de dar nojo!"
 secrets.0101.positive_1.desc: "[secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] acusou publicamente [owner.Custom2('MyCharacterIntroduction', ROOT.Char)] de ser um devasso sexual!"
 secrets.0101.worried.desc: "\n\nDevo conter meus desejos para que eles não me dominem. Quem sabe onde apontarão os dedos a seguir..."
 secrets.0101.positive_2.desc: "\n\nNão vejo qual é todo esse alvoroço. Não é como se a luxúria fosse uma aflição antinatural…"
 secrets.0101.b: "[owner.GetFirstNameNoTooltip] responderá por seus crimes. Guardas!"
 secrets.0003.desc: "[secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me denunciou publicamente por dormir com outr[ROOT.Char.Custom('ES_OA')]s [ROOT.Char.GetWomenMen]! Embora eu possa afirmar que se trata de um mal-entendido, os [ROOT.Char.Custom('DefaultPriestTitlePlural')] me consideram um[ROOT.Char.Custom('ES_XA')] pecador[ROOT.Char.Custom('ES_OA')] aos olhos de [ROOT.Char.GetFaith.HighGodName]."
 secrets.0003.a: "Se eu apenas tivesse a chance de explicar, eu... eu..."
 secrets.0103.negative.desc: "[secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] acusou [owner.Custom2('MyCharacterIntroduction', ROOT.Char)] de ter relações carnais com outr[owner.Custom('ES_OA')]s [owner.GetWomenMen]! Isto não pode ser o que [ROOT.Char.GetFaith.HighGodNameAlternate] pretendia!"
 secrets.0103.positive_1.desc: "[secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] acusou publicamente [owner.Custom2('MyCharacterIntroduction', ROOT.Char)] de sodomia!"
 secrets.0103.positive_2.desc: "\n\nA julgar pelos insultos vis de [secret_exposer.GetTitledFirstNameNoTooltip|l] , [secret_exposer.Custom('ES_ElElla')] acredita que [owner.GetTitledFirstNameNoTooltip|l] é [ROOT.Char.GetFaith.DevilName] em pessoa. Mas como o amor pode ser algo ruim?"
 secrets.0103.worried_2.desc: "\n\nDevo ter cuidado ao redor de [lover.GetFirstName], pelo seu bem, assim como pelo meu próprio. Quem sabe onde apontarão os dedos a seguir..."
 secrets.0103.worried_3.desc: "Alguma vez poderemos amar livremente, sem medo?"
 secrets.0103.dislikes_negative: "[ROOT.Char.GetFaith.HighGodName] o julgará, pecador!"
 secrets.0103.b: "Guardas! Acorrentem este[owner.Custom('ES_EA')] [owner.GetWomanMan]!"
 secrets.0004.desc: "[secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me denunciou por ser um monstro que aprecia o sabor da carne humana! Não creio que saiba do que está falando, mas todos parecem acreditar que os rumores são verdadeiros."
 secrets.0004.a: "Minha reputação está em frangalhos!"
 secrets.0104.negative.desc: "A bile me sobe à garganta ao pensar nas acusações que [secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)]. [owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)|U][owner.Custom('ES_XA')], um canibal! Não consigo tirar as imagens grotescas da cabeça…"
 secrets.0104.positive_1.desc: "[secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] acusou publicamente [owner.Custom2('MyCharacterIntroduction', ROOT.Char)] de ser um canibal!"
 secrets.0104.worried.desc: "Devo ter cuidado. Se eu não conter minha fome, posso ser o próximo..."
 secrets.0104.positive_2.desc: "Será que ele não entende como [ROOT.Char.GetFaith.HighGodName] se deleita com nosso banquete?"
 secrets.0104.dislikes_negative: "Você me enoja, [owner.GetFirstNameNoTooltip]!"
 secrets.0104.b: "Este ghoul pagará por seus crimes. Guardas!"
 secrets.0005.desc: "Ao contar a todo o mundo o que penso de [ROOT.Char.GetFaith.HighGodName], [secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)] convenceu os [ROOT.Char.Custom('DefaultPriestTitlePlural')] de que não sou um crente e sim um[ROOT.Char.Custom('ES_XA')] traidor[ROOT.Char.Custom('ES_XA')] a [ROOT.Char.GetFaith.HighGodNameAlternate]!"
 secrets.0005.a: "O que há de errado em pensar por mim mesm[ROOT.Char.Custom('ES_OA')]?!"
 secrets.0105.negative.desc: "[secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] acusou [owner.Custom2('MyCharacterIntroduction', ROOT.Char)] de não ser crente! Um[owner.Custom('ES_XA')] traidor[owner.Custom('ES_XA')] a [owner.GetFaith.HighGodName]! Quem ele pensa que é para questionar [owner.GetFaith.HighGodNameAlternate]?"
 secrets.0105.positive_1.desc: "[secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] acusou publicamente [owner.Custom2('MyCharacterIntroduction', ROOT.Char)] de ser um descrente!"
 secrets.0105.positive_2.desc: "A irracionalidade de [secret_exposer.GetFirstNameNoTooltip] é vergonhosa. Que mal [owner.GetFirstNameNoTooltip] causou?"
 secrets.0105.worried.desc: "Daqui para frente, devo escolher minhas palavras com cuidado, ou posso ser o próximo..."
 secrets.0105.dislikes_negative: "Será que não tem vergonha?!"
 secrets.0105.likes_positive: "O que há de errado em pensar por conta própria?"
 secrets.0006.desc: "[secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] espalhou rumores sujos sobre relações carnais entre mim e um parente não nomeado! As pessoas parecem muito ansiosas para acreditar n, também!"
 secrets.0006.a: "Quem são eles para dizer o que é verdadeiro amor?!"
 secrets.0106.t: "Um Segredo Exposto!"
 secrets.0106.negative.desc: "Por [ROOT.Char.GetFaith.HighGodName]! [secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] apresentou provas irrefutáveis ao reino de que [owner.Custom2('MyCharacterIntroduction', ROOT.Char)] se envolveu em perversões incestuosas!"
 secrets.0106.positive_1.desc: "[secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] acusou publicamente [owner.Custom2('MyCharacterIntroduction', ROOT.Char)] de ter relações incestuosas!"
 secrets.0106.worried.desc: "\n\nO sofrimento de [owner.GetTitledFirstNameNoTooltip|l] é evidente, mas sou obrigado a reter meu consolo. Juro que seus olhos me seguem aonde quer que eu vá…"
 secrets.0106.positive_2.desc: "Mas o amor entre parentes não é tão natural quanto respirar?"
 secrets.0106.likes_negative: "Nunca... Nunca teria pensado!"
 secrets.0106.dislikes_negative: "Nojento! Totalmente nojento!"
 secrets.0106.likes_positive: "Essa perseguição não está certa!"
 secrets.0106.dislikes_positive: "Não temos coisas mais importantes a cuidar?"
 secrets.0007.desc: "[secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] denunciou minhas práticas como ímpias e imperdoáveis! As pessoas agora me chamam de brux[ROOT.Char.Custom('ES_OA')] e inimig[ROOT.Char.Custom('ES_OA')] de [ROOT.Char.GetFaith.HighGodName]!"
 secrets.0007.a: "Eles não veem a verdade que vejo?"
 secrets.0107.negative.desc: "[secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] acusou [owner.Custom2('MyCharacterIntroduction', ROOT.Char)] de praticar bruxaria! É[owner.Custom('ES_EA')] [owner.GetWomanMan] malign[owner.Custom('ES_OA')] se uniu a [ROOT.Char.GetFaith.DevilName] para envenenar nossas mentes e nos afastar de [ROOT.Char.GetFaith.HighGodName]!"
 secrets.0107.positive_1.desc: "[secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] acusou publicamente [owner.Custom2('MyCharacterIntroduction', ROOT.Char)] de bruxaria!"
 secrets.0107.positive_2.desc: "Esse[secret_exposer.Custom('ES_EA')] tonto(a) fica tagarelando sobre "[secret_exposer.GetFaith.DevilName]". Está cego(a) à sabedoria de[secret_exposer.Custom('ES_OA')]?"
 secrets.0107.worried.desc: "\n\nQuero falar, mostrar a todos a verdade, mas eles ouviriam? Se o fizesse, temo que se voltassem contra mim em seguida..."
 secrets.0107.dislikes_negative: "À fogueira com [owner.Custom('ES_ElElla')]!"
 secrets.0107.b: "[owner.Custom('ES_ElLa')|U] brux[owner.Custom('ES_OA')] pagará por seus crimes!"
 secrets.0107.c: "Essas acusações não passam de malícia e mentiras."
 secrets.0008.desc: "[secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] revelou que eu [Select_CString( ObjectsEqual( secret_exposer, target ), target.GetHerHim, '' )] vejo [Select_CString( ObjectsEqual( secret_exposer, target ), '', target.GetTitledFirstName )] em segredo! Vendo a velocidade com que a verdade se espalha, talvez nossa paixão não estivesse tão oculta quanto quisemos acreditar."
 secrets.0008.forbidden.desc: "[secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] revelou ao mundo inteiro [Select_CString( ObjectsEqual( secret_exposer, target ), 'nossa', 'minha' )] relação com [Select_CString( ObjectsEqual( secret_exposer, target ), '', target.GetTitledFirstName )]!

Enquanto apontam os dedos e gritam insultos, não sinto vergonha. Só menti para manter meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('target'))] em segurança. Mas sinto, sim, medo… O que acontecerá conosco agora?"
 secrets.0008.a: "[secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] acusou seu [secret_exposer.Custom2('RelationToMeShort', primary_character)], [primary_character.Custom('ES_ElLa')] [primary_character.GetTitledFirstName|l], de que"
 secrets.0108.no_exposer.desc: "mantém um relacionamento incestuoso com seu própri[primary_character.Custom('ES_OA')] #EMP [primary_character.Custom2('RelationToMeShort', SCOPE.sC('secondary_character'))]#!! [primary_character.GetFirstNameNoTooltip] e [secondary_character.GetTitledFirstName|l] são amantes!\n\nJá vi e ouvi muitas coisas na minha vida, mas isso…"
 secrets.0108.exposer.desc: "cometido sodomia junto com [SCOPE.Custom('SecretRevealSecondCharacterIntroduction')]! Isso não pode ser o que [ROOT.Char.GetFaith.HighGodNameAlternate] pretendia!"
 secrets.0108.incest_bad.desc: "teve um caso extraconjugal com [SCOPE.Custom('SecretRevealSecondCharacterIntroduction')]! Como pôde profanar a santidade de seu casamento?"
 secrets.0108.sodomy_bad.desc: "copulado com [SCOPE.Custom('SecretRevealSecondCharacterIntroduction')]! Tais coisas não podem ser aceitas fora do casamento!"
 secrets.0108.adulterer_bad.desc: "um caso com [secondary_character.Custom2('HerHisCharacterIntroductionNoComma', primary_character)]. Há muitos que os julgam, mas sei que não há nada prejudicial no que [primary_character.GetFirstNameNoTooltip] e [secondary_character.GetFirstNameNoTooltip] compartilham..."
 secrets.0108.fornicator_bad.desc: "teve um caso com [SCOPE.Custom('SecretRevealSecondCharacterIntroduction')].\n\nNão vejo por que tanta confusão. Como se a luxúria fosse uma aflição antinatural…"
 secrets.0108.incest_is_good.desc: "[ROOT.Char.GetFaith.HighGodName] julgará esses pecadores!"
 secrets.0108.all_is_good.desc: "Esse crime não pode ficar impune. Guardas!"
 secrets.0108.dislikes_negative: "[secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] apresentou provas irrefutáveis de que"
 secrets.0108.b: "Embora não haja uma maneira de provar conclusivamente, [secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] trouxe provas de que"
 secrets.0110.start.desc: "[child.GetTitledFirstName] não é"
 secrets.0110.start.above_cutoff: "[child.GetFirstName] não é"
 secrets.0110.single_child.desc: "[child.Custom('GetDaughterSon')] de [father.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)], mas foi gerad[child.Custom('ES_OA')] por"
 secrets.0110.single_child_relation.desc: "os filhos de [father.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)], mas sim que eles foram gerados por"
 secrets.0110.is_not_fathers.desc: "[child.Custom('GetDaughterSon')] meu[child.Custom('ES_OA')] , mas foi gerad[child.Custom('ES_OA')] por"
 secrets.0110.are_not_fathers.desc: "o próprio [mother.Custom2('RelationToMeShort', SCOPE.sC('real_father'))] de [mother.GetTitledFirstName|l], [real_father.GetTitledFirstName|l]!\n\n"
 secrets.0110.is_not_mine.desc: "[real_father.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]!"
 secrets.0110.incest_real_father.desc: "[real_father.Custom('ES_ElElla')] mesmo[real_father.Custom('ES_OA')]!"
 secrets.0110.regular_real_father.desc: "\n\nNão há como provar indiscutivelmente qualquer coisa disso, mas tudo está começando a fazer sentido..."
 secrets.0110.regular_real_father_self_expose: "\n\nMesmo que seja uma ferida antiga, ainda me dói ser lembrado da infidelidade de [mother.GetFirstName]. E agora, devo carregar minha vergonha para que todos vejam."
 secrets.0110.father.child_above_cutoff: "\n\nComo você pôde, [mother.GetFirstName]? Eu sempre amei você e noss[child.Custom('ES_OA')] [child.Custom('GetDaughterSon')]… seu [child.Custom('GetDaughterSon')]. Em um golpe devastador, vocês dois me foram tirados."
 secrets.0110.father_knew.desc: "\n\nMil luas podem passar, mas nunca esquecerei a traição de [mother.GetFirstName]. Talvez eu venha a confiar n novamente, mas hoje não é o dia."
 secrets.0110.father_love.desc: "\n\nA realização me atinge como um martelo. Oh, querido [ROOT.Char.GetFaith.HighGodName], [consort_bastard.GetFirstNameNoTooltip] é m [ROOT.Char.Custom2('CloseOrExtendedFamilyRelationToMe', SCOPE.sC('consort_bastard'))]. Todo esse tempo... as coisas que fizemos..."
 secrets.0110.father_no_love.desc: "\n\nPor [ROOT.Char.GetFaith.HighGodName], isso significa que [consort_bastard.GetFirstNameNoTooltip] é meu [ROOT.Char.Custom2('CloseOrExtendedFamilyRelationToMe', SCOPE.sC('consort_bastard'))]! Eu sabia que havia #EMP algo#! ali, uma conexão especial… Agora me sinto mais próximo de [consort_bastard.Custom('ES_ElElla')] do que nunca."
 secrets.0110.incest_consort.desc: "\n\nOs rumores se espalham como fogo na corte, e [mother.GetFirstName] se trancou em seus aposentos. Devo confortá-la? Repreendê-la? Devo... estar preocupado?"
 secrets.0110.incest_consort_accepted.desc: "\n\nOs rumores se espalham como fogo na corte, mas não sei o que pensar, nem o que dizer. Como você pôde fazer isso, [real_father.GetFirstName]? Como posso confiar em você novamente?"
 secrets.0110.mother_spouse.desc: "\n\nComo minha própria [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('mother'))] nos fazer isso? Por outro lado, [child.GetFirstNameNoTooltip] não tem culpa alguma. Mas as repercussões para [child.Custom('ES_ElElla')] podem ser graves…"
 secrets.0110.real_father_spouse.desc: "\n\nComo pôde meu próprio [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('real_father'))] fazer isso conosco? Por outro lado, [child.GetFirstNameNoTooltip] não tem culpa nenhuma. Mas as repercussões para [child.Custom('ES_ElElla')] podem ser graves…"
 secrets.0110.mother_family.desc: "\n\n[child.GetFirstNameNoTooltip] não tem culpa, mas as consequências para [child.Custom('ES_ElElla')] podem ser graves. [real_father.Custom('ES_ElLa')|U] [real_father.GetTitledFirstNameNoTooltip|l] e [mother.Custom('ES_ElLa')] [mother.GetTitledFirstName|l], por outro lado…""
 secrets.0110.real_father_family.desc: "Estou sem palavras!"
 secrets.0110.general_end.desc: "Acho que vou vomitar."
 secrets.0110.a: "Você ainda está dormindo com [consort_bastard_parent_lover.Custom('ES_ElElla')], não está?!"
 secrets.0110.a.incest: "Minhas suspeitas estão corretas"
 secrets.0110.b: "O segredo de [consort_bastard_parent.GetTitledFirstName|l]"
 secrets.0110.b.success.desc: "[consort_bastard_parent_lover.GetTitledFirstNameNoTooltip|l] não é amante de [consort_bastard_parent.GetTitledFirstNameNoTooltip|l]"
 secrets.0110.b.success.tt: "Eu quase gostaria de nunca ter sabido..."
 secrets.0110.b.failure.desc: "meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))] [child.GetFirstName] foi gerad[child.Custom('ES_OA')] por"
 secrets.0110.c: "[child.GetTitledFirstName] foi gerad por"
 secrets.0112.single_child_relation.desc: "Oh, mãe. Não sei o que dizer, nem como me sentir. Pelo menos agora tudo está às claras."
 secrets.0112.single_child.desc: "\n\nComo meu próprio [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('real_father'))] pôde fazer isso conosco? [real_father.GetFirstNameNoTooltip], você sabe o que isso significa para nossa família?"
 secrets.0112.mother_family.desc: "Será que [child.GetFirstNameNoTooltip] conhece sua verdadeira linhagem, ou isso é tão novo para [child.Custom('ES_ElElla')] quanto é para mim? Essa revelação se tornará uma bênção — ou uma maldição?"
 secrets.0112.real_father_family.desc: "Minhas suspeitas estão corretas"
 secrets.0112.general_end.desc: "Quem poderia imaginar?"
 secrets.0112.b.success.desc: "[consort_bastard_parent_lover.Custom('ES_LoLa')|U] ainda está vendo?"
 secrets.0112.a: "Vamos deixar isso para trás."
 secrets.0112.b: "[secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] apresentou provas irrefutáveis da minha tentativa de assassinar [victim.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]! [ROOT.Char.Custom('CulturalCurse')|U]!\n\n"
 secrets.0112.c: "Agora que [victim.Custom('ES_ElElla')] sabe, devo agir com cuidado. Sua vingança pode vir amanhã, daqui a dez anos ou talvez nunca. Mas preciso estar preparad[ROOT.Char.Custom('ES_OA')] para quando ela chegar, se é que chegar."
 secrets.0115.start.desc: "Ao menos agora é[victim.Custom('ES_EA')] [victim.Custom2('InsultNoun', ROOT.Char)] está apodrecendo em sua tumba!"
 secrets.0115.victim_alive.desc: "Eu tinha minhas razões!"
 secrets.0115.victim_dead.desc: "Pelo [ROOT.Char.GetFaith.HighGodName]! [secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] apresentou provas irrefutáveis de uma tentativa de assassinato contra [victim.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)], arquitetada por [murderer.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]!\n\nSerá que esse[murderer.Custom('ES_EA')] [murderer.Custom2('InsultNoun', ROOT.Char)] cruel[murderer.Custom('ES_OA')] não tem respeito pela vida humana?"
 secrets.0115.a: "[secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] acusou [murderer.Custom2('MyCharacterIntroduction', ROOT.Char)] de ter planejado o assassinato de [victim.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]!\n\nAgora que a verdade está exposta, é melhor [murderer.GetFirstNameNoTooltip] tomar cuidado."
 secrets.0116.negative.desc: "[secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] acusou publicamente [murderer.Custom2('MyCharacterIntroduction', ROOT.Char)] de tentar tirar minha vida. Embora tente escondê-lo ou explicá-lo, as provas já estão aí, para todos verem."
 secrets.0116.positive.desc: "Pela graça de [ROOT.Char.GetFaith.HighGodName]! [secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] apresentou provas irrefutáveis de uma tentativa de assassinato contra #EMP mí!#!![murderer.Custom('ES_ElLa')|U] malvad[murderer.Custom('ES_OA')] [murderer.Custom2('InsultNoun', ROOT.Char)] por trás da trama não é outro senão [murderer.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]!\n\nConfie na minha palavra, ele vai se arrepender de seu fracasso."
 secrets.0106.victim_knows.desc: "Como pôde fazer isso?"
 secrets.0106.victim.desc: "Vai pagar, de um jeito ou de outro!"
 secrets.0116.likes_negative: "Tenho certeza de que [victim.GetFirstNameNoTooltip] teve o que mereceu!"
 secrets.0116.dislikes_negative: "Agora todos saberão quem [murderer.Custom('ES_ElElla')] de verdade."
 secrets.0116.likes_positive: "Guardas! Prendam esse criminoso nojento!"
 secrets.0116.victim_knows: "[murderer.Custom('ES_ElElla')|U] está livre. Por enquanto."
 secrets.0116.b: "[secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] apresentou provas irrefutáveis do meu envolvimento na morte de [victim.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]! [ROOT.Char.Custom('CulturalCurse')|U]!\n\n"
 secrets.0116.c: "Eu esperava que nunca chegássemos a isso. Um erro de idiota. Agora estou à mercê de [dynast.GetTitledFirstName|l] e se [dynast.Custom('ES_ElElla')] me perdoar, haverá muitos outros que anseiam por vingança…"
 secrets.0117.start.desc: "Eu esperava que nunca chegasse a isso. Um erro de tolo. Agora temo que toda a minha dinastia se volte contra mim..."
 secrets.0117.kinslayer.desc: "É melhor eu ficar de olho e preparar minhas defesas. Há muitos por aí sedentos por vingança..."
 secrets.0117.kinslayer_dynasty_head.desc: "Eu tinha minhas razões!"
 secrets.0117.regular.desc: "Assassino!"
 secrets.0117.a: "[secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] expôs um segredo terrível! [victim.Custom2('MyCharacterIntroduction', ROOT.Char)|U] encontrou uma morte prematura nas mãos de [murderer.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]!\n\n"
 secrets.0118.known_murder.t: "[murderer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] assassinou [victim.Custom2('MyCharacterIntroduction', ROOT.Char)] a sangue frio!\n\n"
 secrets.0118.negative_start.desc: "É melhor que esse[murderer.Custom('ES_EA')] [murderer.Custom2('InsultNoun', ROOT.Char)] [murderer.Custom2('InsultAdjective', ROOT.Char)] durma com um olho aberto. De um jeito ou de outro, vai se arrepender amargamente. Eu juro sobre a tumba de [victim.Custom('ES_DelDela')] [victim.GetTitledFirstNameNoTooltip|l]!"
 secrets.0118.negative_start_known.desc: "[murderer.GetFirstNameNoTooltip] deve se achar igual a [ROOT.Char.GetFaith.HighGodName], que tem domínio sobre a vida e a morte, maldita seja a lei! Não há redenção para um crime assim!"
 secrets.0118.negative_end_family.desc: "[secret_exposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] acusou [murderer.Custom2('MyCharacterIntroduction', ROOT.Char)] de ter causado o fim prematuro de [victim.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]!\n\nAgora que a verdade está exposta, é melhor [murderer.GetFirstNameNoTooltip] tomar cuidado."
 secrets.0118.negative_end.desc: "[murderer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] provocou o fim prematuro de [victim.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]! Hoje est[murderer.Custom('ES_EA')] [murderer.GetWomanMan] conquistou mais de um inimigo."
 secrets.0118.positive.desc: "Que enforquem e esfolem ess[secret_exposer.Custom('ES_EA')] canalha[secret_exposer.Custom('ES_OA')] três vezes maldit[secret_exposer.Custom('ES_OA')], [secret_exposer.Custom('ES_ElLa')] [secret_exposer.GetTitledFirstName|l], pois [secret_exposer.GetSheHe] saiu contando ao mundo inteiro sobre os fundos que reaproveitei de [secret_exposer.GetHerHim].

"
 secrets.0118.positive_known.desc: "Maldit[secret_exposer.Custom('ES_OA')] seja ess[secret_exposer.Custom('ES_EA')] covarde [secret_exposer.GetTitledFirstName|l], que saiu contando ao mundo inteiro sobre os fundos de [secret_target.Custom('ES_DelDela')] [secret_target.GetTitledFirstName|l] que eu reaproveitei.

"
 secrets.0121.start.desc.intro.self_exposed: "Que enforquem e esfolem ess[secret_exposer.Custom('ES_EA')] canalha[secret_exposer.Custom('ES_OA')] três vezes maldit[secret_exposer.Custom('ES_OA')], [secret_exposer.Custom('ES_ElLa')] [secret_exposer.GetTitledFirstName|l], pois [secret_exposer.GetSheHe] saiu contando ao mundo inteiro sobre os fundos que reaproveitei de [secret_exposer.GetHerHim].

"
 secrets.0121.start.desc.intro: "Maldit[secret_exposer.Custom('ES_OA')] seja ess[secret_exposer.Custom('ES_EA')] covarde [secret_exposer.GetTitledFirstName|l], que saiu contando ao mundo inteiro sobre os fundos de [secret_target.Custom('ES_DelDela')] [secret_target.GetTitledFirstName|l] que eu reaproveitei.

"
 secrets.0121.desc.victim_is_liege_or_above: "De acordo com [secret_exposer.Custom2('MyCharacterIntroduction', secret_target)], [secret_owner.Custom2('MyCharacterIntroduction', secret_target)] tem secretamente me roubado! As provas apresentadas são incontestáveis, as contagens correspondem exatamente aos impostos e dízimos perdidos ou desperdiçados em todo o meu reino.\n\n"
 secrets.0121.desc.victim_not_liege.root_has_liege: "Como [ROOT.Char.GetLadyLord|l] de [secret_owner.GetFirstNameNoTooltip] que sou, felizmente estou em posição de exigir uma indenização. #EMP O allá [secret_owner.GetSheHe]#!."
 secrets.0121.desc.victim_not_liege.root_has_no_liege: "Embora [secret_owner.GetFirstNameNoTooltip] não esteja sob meu poder direto, [secret_owner.GetSheHe] #EMP #! tem um[secret_owner.GetLiege.Custom('ES_XA')] [secret_owner.GetLiege.GetLadyLord|l] que poderia obrigar[secret_owner.GetHerHim] a pagar… [secret_owner.GetLiege.Custom('ES_ElLa')|U] [secret_owner.GetLiege.GetTitledFirstName|l] poderia até aceitar defender minha causa se eu oferecesse dividir com ele os impostos atrasados resultantes com [secret_owner.GetSheHe]."
 secrets.0121.a: "Dado que [secret_owner.GetFirstName] é independente da minha autoridade, não há caminho para eu recuperar minha prata perdida."
 secrets.0122.t: "Eu vou pegar meu dinheiro, [secret_owner.GetFirstNameNoTooltip]!"
 secrets.0122.start.desc.intro.self_exposed: "[secret_owner.GetFirstName] vai te pagar de volta #P [gold_i][secret.MakeScope.Var('embezzlement_stake').GetValue]#!, na íntegra, ou então haverá uma revolta"
 secrets.0122.start.desc.intro: "Eu não me importo com o ouro. Prefiro... ferro..."
 secrets.0122.desc.victim_is_vassal_or_below.secret_owner: "Errar é humano, perdoar é divino."
 secrets.0122.desc.victim_is_vassal_or_below.other: "[secret_target.GetFirstNameNoTooltip] perdoa suas \"dívidas\""
 secrets.0122.desc.victim_not_vassal: "$secrets.0122.a$"
 secrets.0122.a: "Você pede a [secret_owner.GetFirstName] para devolver seu #P [gold_i][secret.MakeScope.Var('embezzlement_stake').GetValue]#! — [secret_owner.GetSheHe|U] não se sente obrigad[secret_owner.Custom('ES_OA')] a fazer isso e é pouco provável que aceite"
 secrets.0122.a.tt: "Certamente [secret_owner.Custom('ES_ElLa')] [secret_owner.GetLiege.GetTitledFirstNameNoTooltip|l] verá como isso é injusto…"
 secrets.0122.b: "Você oferece dividir o #P [secret.MakeScope.Var('embezzlement_stake').GetValue][gold_i]#! meio a meio com [secret_owner.Custom('ES_ElLa')] [secret_owner.GetLiege.GetTitledFirstName|l] se [secret_owner.GetLiege.GetSheHe] força a pagar [secret_owner.GetFirstName]"
 secrets.0122.c: "$secrets.0122.c$"
 secrets.0122.c.tt: "Eu posso esperar..."
 secrets.0122.d: "[secret_owner.GetFirstNameNoTooltip] certamente será julgad[secret_owner.Custom('ES_OA')]. Mais cedo ou mais tarde."
 secrets.0122.d.tt: "[secret_target.Custom2('AppropriateGreeting', secret_owner)]"
 secrets.0122.e: "Agora todo o mundo sabe da sua transferência ilícita de impostos, dízimos e bens do meu tesouro.\n\nVocê devolverá esses ganhos ilícitos imediatamente ou enfrentará as consequências."
 secrets.0122.e.tt: "[secret_exposer.Custom2('MyCharacterIntroduction', secret_target)|U] me alertou sobre sua transferência ilícita de impostos, dízimos e bens do meu tesouro.\n\nVocê devolverá esses ganhos ilícitos imediatamente ou enfrentará as consequências."
 secrets.0122.f: "Isso é roubo dos meus ativos legítimos, mas #EMP tudo bem#!."
 secrets.0122.g: "Seu ouro chega na íntegra e na hora certa"
 secrets.0122.g.tt: "Você terá seu ouro quando provar meu aço!"
 secrets.0123.t: "[secret_owner.GetFirstNameNoTooltip] foge do Reino"
 secrets.0123.desc.self_exposed: "[secret_owner.GetFirstNameNoTooltip] tentou fugir sem sucesso"
 secrets.0123.desc: "[secret_owner.GetFirstNameNoTooltip] recusa-se categoricamente"
 secrets.0123.a: "[secret_target.Custom2('AppropriateGreetingPositive', SCOPE.sC('liege'))]"
 secrets.0123.a.tt: "[secret_owner.Custom2('YourCharacterIntroduction', SCOPE.sC('liege'))|U] roubou uma grande quantidade de ouro de mim, algo que não tenho como recuperar sem a sua ajuda.\n\nImploro que exija uma compensação em meu nome, e você pode ficar com metade do ouro por sua ajuda."
 secrets.0123.b: "Bem. É apenas o que você deve, afinal..."
 secrets.0123.b.tt.on_the_lamb: "Você e [secret_target.GetShortUIName] recebem #P [gold_i][secret.MakeScope.Var('embezzlement_stake_half').GetValue]#! cada"
 secrets.0123.b.tt.captured: "Você receberá a quantia na íntegra!"
 secrets.0123.b.tt.refused: "[secret_target.GetShortUIName] recebe #P [gold_i][secret.MakeScope.Var('embezzlement_stake').GetValue]#!"
 secrets.0124.t: "Se [secret_owner.Custom('ES_ElLa')] [secret_owner.GetTitledFirstName|l] aceitar"
 secrets.0124.desc: "Se [secret_owner.Custom('ES_ElLa')] [secret_owner.GetTitledFirstName|l] recusa"
 secrets.0124.a: "Isso parece ser um assunto pessoal."
 secrets.0124.a.tt: "[liege.Custom('ES_ElLa')|U] [liege.GetTitledFirstNameNoTooltip|l] não está interessado"
 secrets.0124.b: "[liege.Custom2('AppropriateGreeting', secret_owner)]"
 secrets.0124.b.tt: "Fico chocado ao saber do vosso roubo a [secret_target.Custom2('YourCharacterIntroduction', secret_owner)]. [secret_target.GetSheHe|U] buscou a mim por justiça e, como voss[liege.Custom('ES_OA')] senhor[liege.Custom('ES_XA')], ordeno que devolvais a [secret_target.GetFirstNameNoTooltip] metade do dinheiro que roubastes [secret_target.GetHerHim].

A outra metade me pagareis como penitência. Pelo bem do reino."
 secrets.0124.b.tt.conditional: "Ah, pegue então."
 secrets.0124.b.tt.conditional_failed: "Sua metade do ouro chega"
 secrets.0124.c: "Nenhum de vocês receberá nada além de aço de mim!"
 secrets.0124.c.tt: "[secret_owner.Custom('ES_ElLa')|U] [secret_owner.GetTitledFirstName|l] se rebelou em vez de pagar"
 secrets.0125.t: "[liege.Custom2('AppropriateGreeting', secret_owner)]"
 secrets.0125.desc: "Fico chocado ao saber do vosso roubo a [secret_target.Custom2('YourCharacterIntroduction', secret_owner)]. [secret_target.GetSheHe|U] buscou a mim por justiça e, como voss[liege.Custom('ES_OA')] senhor[liege.Custom('ES_XA')], ordeno que devolvais a [secret_target.GetFirstNameNoTooltip] metade do dinheiro que roubastes [secret_target.GetHerHim].

A outra metade me pagareis como penitência. Pelo bem do reino."
 secrets.0125.a: "Você não é meu suserano!"
 secrets.0125.a.tt: "$secrets.0125.b.tt$"
 secrets.0125.b: "Meu [secret_target.GetTitledFirstName|l] não mostrou clemência. Exposto meus planos de tomar o [secret_target.GetPrimaryTitle.GetBaseName] para mim a todos os [secret_target.GetPrimaryTitle.GetTierAsNameNoTooltip|l]!\n\nSe ao menos houvesse um modo de compensar minhas ações…"
 secrets.0125.b.tt: "Cada [vassal|lE]"
 secrets.0126.t: "Que [ROOT.Char.GetFaith.FateGodName] me mostre misericórdia."
 secrets.0126.desc: "[secret_exposer.Custom('ES_ElLa')|U] [secret_exposer.GetTitledFirstName|l] revelou todo o plano…\n\n"
 secrets.0126.a: "Suponho que [secret_target.Custom('ES_ElLa')] [secret_target.GetTitledFirstName|l] ia acabar descobrindo, de uma forma ou de outra…\n\n"
 secrets.0126.a.tt: "Eu deveria saber que nossa incursão contra a [secret_target.GetHouse.GetBaseName] não poderia permanecer secreta por muito tempo neste ninho de víboras que chamamos de [secret_owner.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip]!"
 secrets.0126.b: "Agora devemos estar preparados para resistir a fúria desenfreada [secret_target.Custom('ES_DelDela')] [secret_target.GetTitleAsNameNoTooltip|l]…"
 secrets.0126.b.tt: "Como [secret_owner.GetTitleAsNameNoTooltip|l], devo ser mais cauteloso se quiser evitar provocar a ira das grandes casas..."
 secrets.0131.desc: "Sabendo disso, com certeza [secret_target.GetFirstNameNoTooltip] tentará virar [secret_owner.GetTopLiege.Custom('ES_AlAla')] [secret_owner.GetTopLiege.GetTitleAsNameNoTooltip|l] contra a Casa [secret_owner.GetHouse.GetBaseName]…"
 every_fellow_vassal_tt: "Deixe o tolo falar!"
 secrets.0131.a: "Raider Revelado"
 secrets.0141.start.desc.intro.other_exposed: "As bênçãos de [secret_target.GetFaith.HighGodName] recaiam sobre [secret_exposer.Custom('ES_ElLa')] [secret_exposer.GetTitledFirstName|l] por descobrir a vilania de [secret_owner.GetHouse.GetBaseName]!\n\n"
 secrets.0141.start.desc.intro.self_exposed: "[secret_target.GetFaith.HighGodNameAlternate] seja louvado por me guiar na descoberta desta vilania da Casa [secret_owner.GetHouse.GetBaseName]!\n\n"
 secrets.0141.start.desc.intro: "Por fim, descobrimos quem estava por trás do escandaloso ataque à propriedade de [secret_target.GetHouse.GetBaseName]! Essa espécie de demônio [secret_owner.Custom('ES_DelDela')] [secret_owner.GetTitledFirstName|l] e sua casa abominável!"
 secrets.0141.desc.target_emperor: "Como [secret_target.GetTitleAsNameNoTooltip|l], posso usar o poder à minha disposição para responsabilizar essa família vil!"
 secrets.0141.desc.owner_emperor: "Devemos agir com cuidado, [secret_owner.Custom('ES_ElLa')] [secret_owner.GetTitleAsNameNoTooltip|l] poderá antecipar nossos próximos movimentos…"
 secrets.0141.desc.fallback: "Agora poderemos levar nossos inimigos perante [secret_target.GetTopLiege.Custom('ES_ElLa')] [secret_target.GetTopLiege.GetTitleAsNameNoTooltip|l], e [secret_target.GetTopLiege.GetPrimaryTitle.GetTierAsNameNoTooltip]!"
 secrets.0141.a: "Essa traição não vai ficar impune!"
 secrets.0142.t: "Teremos nossa vingança, de um jeito ou de outro..."
 secrets.0142.start.desc.intro.other_exposed: "[child.Custom('GetDaughterSon')|U] de outro homem"
 secrets.0142.start.desc.intro.self_exposed: "Será que é verdade?"
 secrets.0142.start.desc.intro: "Foi [child.GetFirstName] gerad[child.Custom('ES_OA')] por"
 secrets.0142.desc.target_emperor: "[mother.Custom2('RelationToMeShort', SCOPE.sC('real_father'))] de [mother.GetTitledFirstName|l], [real_father.GetTitledFirstName|l],"
 secrets.0142.desc.owner_emperor: "[real_father.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)],"
 secrets.0142.desc.fallback: "e não por mim?\n\nDevo chorar? Gritar? Punir? Perdoar? Tudo parece irreal, mas não posso negar as provas diante de mim…"
 secrets.0142.a: "Preciso de tempo para pensar..."
 secrets.0142.b: "Minha Verdadeira Origem"
 secrets.0500.single_child.t: "Por fim sei quem é meu verdadeir[real_father.Custom('ES_OA')] [real_father.Custom('MotherFather')], [real_father.GetTitledFirstName|l]. Mas queria que a revelação não viesse também com a descoberta de que meu [incest_spouse.Custom('WifeHusband')] [incest_spouse.GetTitledFirstName|l] também é meu [incest_spouse.Custom('SisterBrother')]!"
 secrets.0500.start.desc: "O fato de ter sido concebido fora dos laços do casamento me atormentava desde que nasci.\n\nAgora que sei a verdade, que [real_father.GetTitledFirstName|l] é meu [real_father.Custom('MotherFather')] , posso respirar com mais tranquilidade[ROOT.Char.Custom('ES_OA')]."
 secrets.0500.single_child.desc: "É uma brincadeira ou um sonho? [father.GetFirstName], que me criou, não é meu pai de verdade?

Não parece real, mas não posso negar as provas diante de mim. Fui gerad[ROOT.Char.Custom('ES_OA')] por outro homem, [real_father.GetTitledFirstName|l]."
 secrets.0500.incest_real_father.desc: "A verdade pode ser uma bênção ou uma maldição."
 secrets.0500.regular_real_father.desc: "Meu [child.Custom('GetDaughterSon')] perdid[child.Custom('ES_OA')]"
 secrets.0500.end.desc: "Pelo [ROOT.Char.GetFaith.HighGodName]! [child.GetTitledFirstName|l] é [child.Custom('GetDaughterSon')] meu[child.Custom('ES_OA')]?!"
 secrets.0500.a: "Eu sempre tive minhas suspeitas, mas agora que a verdade é certa, estou sem palavras."
 secrets.0501.t: "

Que [mother.Custom2('MyCharacterIntroduction', ROOT.Char)] engravidou fora do casamento é sabido por todos, mas #EMP minha#! participação exata havia ficado em segredo. Até agora, claro."
 secrets.0501.desc_incest_marriage: "\n\nTodos nós pensávamos que [father.Custom2('MyCharacterIntroduction', ROOT.Char)] era o pai. Imaginar que [mother.GetTitledFirstName|l] manteve a verdade escondida o tempo todo!"
 secrets.0501.desc_unmarried_mother: "\n\nSempre haverá quem afirme que [child.GetFirstNameNoTooltip] é realmente filh[child.Custom('ES_OA')] de [father.GetFirstNameNoTooltip], mas eu sei a verdade."
 secrets.0501.desc_married_mother: "É uma brincadeira ou um sonho? [father.GetFirstName], que me criou, não é meu pai de verdade?

Não parece real, mas não posso negar as provas diante de mim. Fui gerad[ROOT.Char.Custom('ES_OA')] por outro homem, [real_father.GetTitledFirstName|l]."
 secrets.0501.a: "Uma Conexão Próxima"
 secrets.0502.single_child.t: "Por [ROOT.Char.GetFaith.HighGodName], [sibling_partner.GetFirstName] é meu [sibling_partner.Custom('SisterBrother')]! Eu sabia que havia #EMP algo#!, uma conexão especial… Agora me sinto mais perto de [consort_bastard.Custom('ES_ElElla')] do que nunca."
 secrets.0502.single_child_start.desc: "A verdade da ascendência de [sibling_partner.GetFirstName] traz uma consequência nauseante. Se compartilhamos o mesmo pai…\n\nImagens das coisas que dissemos, das coisas que fizemos, passam diante do meu olhar interior. Todo esse tempo…"
 secrets.0502.lover.desc: "Sou realmente abençoado!"
 secrets.0502.unmarried.desc: "

Que [mother.Custom2('MyCharacterIntroduction', ROOT.Char)] engravidou fora do casamento é sabido por todos, mas #EMP minha#! participação exata havia ficado em segredo. Até agora, claro."
 secrets.0502.married.desc: "Sinto alívio e raiva ao mesmo tempo ao descobrir quem tentou tirar minha vida. [murderer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] é uma cobra tão [murderer.Custom2('InsultAdjective', ROOT.Char)]!\n\n"
 secrets.0502.end: "Não devo deixar isso passar impune — quem sabe o que pode acontecer da próxima vez. Fico imaginando qual seria a melhor ação a tomar..."
 secrets.0502.a.incest: "Mas seus planos fracassaram horrivelmente. Estou de pé, enquanto [murderer.Custom('ES_ElElla')] apodrece na terra!"
 secrets.0502.a: "Preciso planejar meu próximo movimento..."
 secrets.0502.b: "Boa viagem!"
 secrets.0503.t: "Que [ROOT.Char.GetFaith.HighGodNamePossessive]! [murderer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] tentou matar [victim.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]!"
 secrets.0503.incest_accepted.desc: "Pelo menos essa cobra está morta e enterrada! Que apodreça, [murderer.Custom2('InsultAdjective', ROOT.Char)]!"
 secrets.0503.incest.desc: "A menos que eu tome uma atitude, [victim.GetFirstNameNoTooltip] ainda pode estar em perigo."
 secrets.0502.likes_incest.a: "Finalmente, descobri a verdade! [murderer.Custom('ES_ElLa')|U] [murderer.Custom2('InsultNoun', ROOT.Char)] implacáv[murderer.Custom('ES_OA')] por trás da morte prematura de [victim.GetFirstName], meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('victim'))], não foi senão out[murderer.Custom('ES_OA')] que [murderer.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]!\n\n"
 secrets.0502.dislikes_incest.a: "Quando meus agentes revistaram sua residência, encontraram uma sala murada atrás da qual estava o corpo de [victim.GetFirstNameNoTooltip]\n\n"
 secrets.0510.t: "Ah, achou que sairia impune desse crime hediondo, mas marquem minhas palavras. [murderer.GetFirstNameNoTooltip] pagará caro por seus pecados."
 secrets.0510.traitor.desc: "Embora eu devesse me alegrar de que [murderer.Custom('ES_ElElla')] esteja apodrecendo na tumba, uma parte de mim desejaria que estivesse viv[murderer.Custom('ES_OA')] e respirando diante de mim. Sei de algumas coisas mais adequadas para [murderer.GetFirstNameNoTooltip] do que o descanso eterno…"
 secrets.0510.regular.desc: "Uma Descoberta"
 secrets.0510.alive.desc: "Ao final do último relatório do meu [spymaster.GetCouncilTitle] [spymaster.GetFirstName], ele faz uma pausa por um momento. "Você deve saber algo sobre seu[secret_holder.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('secret_holder'))]"."
 secrets.0510.dead.desc: "Rumores têm sido sussurrados sobre m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('secret_holder'))] por um tempo, mas eu não vi evidências deles até agora."
 secrets.0510.a.alive: "\n\nParece que [secret_holder.GetTitledFirstName|l] tem algumas preferências sexuais muito incomuns..."
 secrets.0510.a.dead: "\n\n[secret_holder.GetTitledFirstName] e [secret_lover.GetTitledFirstName|l] mantêm um romance ilícito!"
 secrets.0511.regular.desc: "\n\nPelo visto, [secret_holder.GetTitledFirstName|l] tem muitos segredos."
 secrets.0511.dead.desc: "Um gosto por [secret_holder.Custom('WomenMen')], você diz?"
 secrets.0511.alive.desc: "Parece que não sou o único a deixar meus instintos tomarem conta de mim."
 secrets.0512.regular.desc: "Será que entendeu mal o significado de 'criação de animais'…?"
 secrets.0512.immured.desc: "[secret_holder.GetFirstNameNoTooltip] e [secret_lover.GetFirstNameNoTooltip]? A mera ideia me perturba!"
 secrets.0512.alive.desc: "Se eu não soubesse que é verdade..."
 secrets.0512.dead.desc: "Amigos e Amantes"
 secrets.1001.t: "É difícil esconder segredos de um verdadeiro amigo, e há muito tempo eu sabia do interesse de [first_lover.GetTitledFirstName|l] pela minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('lover'))], [lover.GetTitledFirstName|l].\n\nAgora descobri que isso era mais do que um interesse. Os dois estão envolvidos em um relacionamento ilícito!"
 secrets.1001.opening_spymaster: "É difícil esconder segredos de um verdadeiro amigo, e eu já sabia há muito tempo que [first_lover.GetTitledFirstName|l] tinha interesse em [lover.GetTitledFirstName|l].\n\nAgora eu descobri que é mais do que um interesse. Os dois estão envolvidos em um relacionamento ilícito!"
 secrets.1001.opening_no_spymaster: "Não é de admirar que [first_lover.GetFirstNameNoTooltip] queira manter esse segredo."
 secrets.1001.sexual_habits: "Nossa Linhagem"
 secrets.1001.secret_relationships: "Aprender a verdade fez todas as peças se encaixarem."
 secrets.1001.fallback: "Apesar de todas as nossas semelhanças, há grandes diferenças entre nós, e agora eu entendo melhor o motivo."
 secrets.1001.a: "Eu deveria ter sabido que havia mais por trás de nossas diferenças do que apenas nossas desavenças intermináveis."
 secrets.1001.b: "

[bastard.GetTitledFirstName] não é meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('bastard'))] por inteiro, mas sim [bastard.Custom('GetDaughterSon')] de [real_father.GetTitledFirstName|l], na verdade!"
 secrets.1001.c: "Mal posso acreditar."
 secrets.1001.f: "No começo, eu não tinha certeza, mas o modo como [father.Char.GetSheHe] enfatiza "#EMP [ROOT.Char.Custom('SisterBrother')]#!" ao me cumprimentar deixou tudo claro como o dia."
 secrets.1001.option_fallback: "No início, eu não estava segur[ROOT.Char.Custom('ES_OA')] mas [father.GetSheHe] deixou isso muito claro ao enfatizar de forma zombeteira o “#EMP [ROOT.Char.Custom('SisterBrother')]#!” quando me saudou."
 secrets.1012.t: "\n\n[father.GetTitledFirstName] sabe quem é meu verdadeiro pai."
 secrets.1012.close_relation: "O que fará com esse conhecimento?"
 secrets.1012.desc: "Imperdoável?"
 secrets.1012.a: "Eu quase desejo nunca ter sabido! Pensar que m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('secret_holder'))], [secret_holder.GetTitledFirstName|l], é capaz de assassinato...\n\nNem mesmo [murdered_character.GetTitledFirstName|l] merecia um fim tão indigno."
 secrets.1101.t: "Repreender [secret_holder.GetFirstNameNoTooltip] por seus crimes!"
 secrets.1101.opening: "#F [secret_holder.GetFirstNameNoTooltip] pode estar arrependido.#!"
 secrets.1101.friendly: "Ah, bem. A política pode ser feia."
 secrets.1101.unfriendly: "M [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('close_character'))] se aproxima de mim, com uma expressão conflituosa em seu rosto.\n\n\"Eu sei o que você fez com [murdered_character.GetTitledFirstName|l],\" [close_character.GetFirstName] me diz. \"Pensar que você é capaz de um crime assim... Isso assombra meus pensamentos.\""
 secrets.1101.end: "

[bastard.GetTitledFirstName] não é meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('bastard'))] por inteiro, mas sim [bastard.Custom('GetDaughterSon')] de [real_father.GetTitledFirstName|l], na verdade!"
 secrets.1101.a: "Talvez consiga perdoá-lo, com o tempo."
 secrets.1102.friendly: "Ah, nunca poderia ficar brav[ROOT.Char.Custom('ES_OA')] com você, [target.GetFirstNameNoTooltip]!"
 secrets.1102.unfriendly: "Olhando por Mim"
 secrets.1102.end: "M [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('close_character'))] [close_character.GetTitledFirstName|l] se aproxima de mim, com uma expressão de preocupação em seu rosto."
 secrets.1102.a: "\n\nDescobri um dos agentes que ajudavam [known_scheme_owner.Custom('ES_AlAla')] [known_scheme_owner.GetTitledFirstName|l] na conspiração contra você! [agent.Custom('ES_ElLa')|U] [agent.GetTitledFirstName|l] tentava entregar um relatório a [known_scheme_owner.GetFirstName] no meio da noite."
 secrets.2002.t: "\n\n\"Encontrei um dos agentes envolvidos na conspiração contra você! [agent.GetTitledFirstName|l] estava tentando entregar um relatório ao seu mestre de tarefas no meio da noite.\""
 secrets.2002.desc: "\n\n\"Encontrei um agente envolvido em uma conspiração contra você! [agent.GetTitledFirstName|l] estava tentando entregar um relatório ao seu mestre de tarefas no meio da noite.\""
 secrets.2002.a: "Obrigad, [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('close_character'))]!"
 secrets.2002.a.tt: "Trapaças no exame reveladas"
 secrets.2002.b: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('minister'))], [minister.Custom('ES_ElLa')] [minister.GetTitledFirstName|l], entra em minha mansão com guardas a seu lado.\n\n"Você me decepcionou completamente, [ROOT.Char.GetFirstNameNoTooltip]! Você teve uma boa carreira, mas agora acabou", e bate a mão na minha mesa, deixando um documento. "Esta é uma prova irrefutável, o testemunho de várias testemunhas de que você trapaceou para passar nos seus exames"."
 secrets.2003.desc: ""Que absurdo! Testemunhas oculares não são confiáveis"."
 secrets.2003.a: ""Ainda que assim seja, sou um[ROOT.Char.Custom('ES_XA')] servidor[ROOT.Char.Custom('ES_XA')] fiel do Filho do Céu"."
 secrets.2003.b: ""Assim como uma figura de argila teme a chuva, a mentira teme a verdade"."
 secrets.2004.desc: "Subornos de um conhecido trapaceiro em exames"
 secrets.2004.a: "Trapaceiro de exames conhecido reembolsa"
 secrets.2004.b: "Trapaceiro em exames conhecido culpado"
