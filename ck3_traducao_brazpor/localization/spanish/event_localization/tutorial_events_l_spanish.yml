l_spanish:
 tutorial.0001.t: "Um Desenvolvimento Preocupante em Ennis"
 tutorial.0001.desc: "Já bem tarde da noite, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('potential_ally'))] [potential_ally.GetFirstName] bate à porta do meu aposento. Eu deixo [potential_ally.GetHerHim] entrar, e [potential_ally.GetSheHe] murmura algo preocupante, com o semblante totalmente solene. \n\n"[GetPlayer.GetFirstNameNoTooltip], você ouviu a notícia? [bad_guy.Custom('ES_ElLa')|U] [bad_guy.GetTitledFirstName|l] está tramando uma reivindicação falsa sobre suas terras. Detesto dizer isso, mas temo que [bad_guy.GetSheHe] esteja se preparando para a guerra.""
 tutorial.0001.a: "Falarei com [bad_guy.Custom('ES_ElLa')] [bad_guy.GetTitledFirstNameNoTooltip|l]."
 tutorial.0001.a_flavor: "#TUT Ao escolher esta opção, você tentará fazer amizade com [bad_guy.Custom('ES_ElLa')] [bad_guy.GetTitledFirstName|l], o que pode resultar em uma nova [Concept('friend', 'amizade')|E] e evitar totalmente uma [war|lE].#!"
 tutorial.0001.b: "Não temo [Select_CString( bad_guy.IsFemale, 'idiotas bêbadas', 'idiotas bêbados' )]."
 tutorial.0001.b_flavor: "#TUT Ao escolher esta opção, você declara que não tem medo de uma possível [war|lE] travada por [bad_guy.Custom('ES_ElLa')] [bad_guy.GetTitledFirstName|l]. Isso concede uma quantidade moderada de [prestige|lE].#!"
 tutorial.0001.c: "Uma pequena doação para o cofre de guerra é necessária."
 tutorial.0001.c.tt.success: "Você convence [potential_ally.Custom('ES_AlAla')] [potential_ally.GetTitledFirstNameNoTooltip|l]"
 tutorial.0001.c.tt.failure: "Você ofende [potential_ally.Custom('ES_AlAla')] [potential_ally.GetTitledFirstNameNoTooltip|l]"
 tutorial.0001.c_flavor: "#TUT Esta opção permite que você tente convencer [potential_ally.Custom('ES_AlAla')] [potential_ally.GetTitledFirstName|l] a ajudar você financeiramente. Se conseguir convencer [potential_ally.GetHerHim], o [gold|lE] extra pode ajudar a impedir ou vencer uma [war|lE].#!"
 tutorial.0002.t: "[bad_guy.Custom('ES_ElLa')|U] [bad_guy.GetTitledFirstNameNoTooltip] se prepara para a guerra"
 tutorial.0002.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('potential_ally'))] [potential_ally.GetFirstName] volta a se aproximar de mim, com os lábios curvados em um sorriso sem jeito. [potential_ally.GetSheHe|U] pigarreia desconfortavelmente. \n\n"[GetPlayer.GetFirstNameNoTooltip], [Select_CString(GetPlayer.IsFemale, 'minha amiga', 'meu amigo' )]! Houve um pequeno desdobramento em relação a [bad_guy.Custom('ES_AlAla')] [bad_guy.GetTitledFirstName|l]. Veja, estávamos bebendo na semana passada, e eu peguei [bad_guy.GetHerHim] se gabando de seus planos de invasão."\n\n"Temo que você tenha pouco tempo antes que [bad_guy.GetSheHe] faça sua jogada.""
 tutorial.0002.a: "Deve haver outro caminho..."
 tutorial.0002.a_flavor: "#TUT Esta opção permite que você tente resolver as coisas conversando com [bad_guy.Custom('ES_ElLa')] [bad_guy.GetTitledFirstName|l]. Há uma chance de que seja receptiv[bad_guy.Custom('ES_OA')] à sua [diplomacy|lE], mas também existe o risco de que se ofenda.#!"
 tutorial.0002.a.tt: "Você forma uma [Concept('alliance', 'aliança')|E] com [bad_guy.Custom('ES_ElLa')] [bad_guy.GetTitledFirstName|l]"
 tutorial.0002.a.tt.crit_success: "Você apresenta argumentos #EMP muito#! convincentes"
 tutorial.0002.a.tt.success: "Você faz um bom argumento"
 tutorial.0002.a.tt.failure: "Você ofende [bad_guy.Custom('ES_AlAla')] [bad_guy.GetTitledFirstName|l]"
 tutorial.0002.b: "Ha! Que brincalh[bad_guy.Custom('ES_OA')], est[bad_guy.Custom('ES_EA')] [bad_guy.GetFirstNameNoTooltip]."
 tutorial.0002.b_flavor: "#TUT Como você tem [Concept( 'friends', 'amizade' )|E] com [bad_guy.Custom('ES_ElLa')] [bad_guy.GetTitledFirstName|l], sabe que, embora [bad_guy.GetSheHe] fale muito, na verdade não está tramando nada.#!"
 tutorial.0002.c: "Cansei desses joguinhos. [bad_guy.GetFirstNameNoTooltip] se submeterá a #EMP mim. #!"
 tutorial.0002.c_flavor: "#TUT Esta opção permitirá que você tente transformar [bad_guy.Custom('ES_AlAla')] [bad_guy.GetTitledFirstNameNoTooltip|l] à força em [Concept('vassal', Select_CString(bad_guy.IsFemale, 'vassala', 'vassalo'))|E] sob seu domínio. Para conseguir isso, você terá que vencer uma [war|lE] contra [bad_guy.GetSheHe]!#!"
