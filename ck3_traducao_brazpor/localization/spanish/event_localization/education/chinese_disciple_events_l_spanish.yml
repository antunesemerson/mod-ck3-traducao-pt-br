l_spanish:
 # Event 0002 - Rivalry During Teaching
 chinese_students.0002.t: "Falta de disciplina"
 chinese_students.0002.desc: "\"[ROOT.Char.Custom('TeachingsAccordingToMovement')]\".\n\nFaço uma pausa para deixar minhas palavras penetrarem, mas [second_student.GetName] aproveita o momento. Com um olhar teatral e feroz para [first_student.GetName], pigarreia. \"[ROOT.Char.Custom('TeachingResponsesAccordingToMovement')]\", responde.\n\nOs dois passaram a semana inteira como cão e gato."
 # Options for Event 0002
 chinese_students.0002.a: "Nada de errado com uma competição saudável!"
 chinese_students.0002.a.tooltip: "[Select_CString(And(first_student.IsFemale, second_student.IsFemale), 'Ambas discípulas', 'Ambos discípulos')] ganham mérito, tornam-se mais [Select_CString(And(first_student.IsFemale, second_student.IsFemale), 'competitivas', 'competitivos')] e apreciam sua orientação. Você pode ganhar estresse dependendo do seu temperamento."
 chinese_students.0002.b: "Ter o favor da casa [most_renowned_student.GetHouse.GetNameNoTooltip] pode ser útil."
 chinese_students.0002.b.tooltip: "O estudante da dinastia mais prestigiosa ganhará mérito e reconhecimento (assim como o chefe de sua dinastia), enquanto o outro ficará ressentido com seu favoritismo."
 chinese_students.0002.c: "[underdog.GetShortUINameNoTooltip] precisa aprender o seu lugar."
 chinese_students.0002.c.tooltip: "O azarão perderá Mérito e ganhará estresse, enquanto o favorito ganhará Mérito. O azarão ressentirá sua severidade."
 chinese_students.0002.d: "![overdog.GetShortUINameNoTooltip] deveria saber melhor do que isso!"
 chinese_students.0002.d.tooltip: "O favorito perderá Mérito e ganhará estresse, enquanto o azarão ganhará Mérito. O favorito ficará ressentido com sua severidade."
 chinese_students.0002.e: "Ambos merecem uma lição de humildade."
 chinese_students.0002.e.tooltip: "Repreenderás [Select_CString(And(first_student.IsFemale, second_student.IsFemale), 'ambas discípulas', 'ambos discípulos')], o que lhes causará estresse e ressentimento. Você receberá um pouco de estresse pela perturbação, mas também algum mérito por impor disciplina."
 # Event 0003 - After the Rivalry Lesson
 chinese_students.0003.t: "$chinese_students.0002.t$"
 # Dynamic descriptions
 chinese_students.0003.desc.intro: "\"[mentor.Custom('TeachingsAccordingToMovement')]\".\n\nEnquanto meu [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('mentor'))], [mentor.Custom('ES_ElLa')] [mentor.GetTitledFirstName|l], transmite sabedoria, meu [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('second_student'))], [second_student.Custom('ES_ElLa')] [second_student.GetTitledFirstName|l], limpa a garganta e responde, \"[ROOT.Char.Custom('TeachingResponsesAccordingToMovement')]\", lançando-me um olhar de canto.\n\n"
 chinese_students.0003.desc.encourage_both: "Noss[mentor.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('mentor'))] alimenta a rivalidade. A competi??o se tornar? mais acirrada a cada li??o."
 chinese_students.0003.desc.punish_both: "Noss[mentor.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('mentor'))] repreende com fervor a [Select_CString(And(ROOT.Char.IsFemale, second_student.IsFemale),'ambas','ambos')]."
 chinese_students.0003.desc.favor: "Noss[mentor.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('mentor'))] interrompe [second_student.GetHerHim] bruscamente e continua com um olhar penetrante em sua dire??o."
 chinese_students.0003.desc.disfavor: "Noss[mentor.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('mentor'))] reconhece sua contribui??o com gentileza e, por um instante, franze a testa na minha dire??o. Meus ouvidos ardem de vergonha."
 # Options for Event 0003
 chinese_students.0003.a: "Provarei que [second_student.Custom('ES_ElLa')] [second_student.GetTitledFirstNameNoTooltip|l] está errado!"
 chinese_students.0003.b: "Pouco importa; a serenidade é minha força."
 chinese_students.0003.c: "Que todos saibam que eu prevaleci!"
 chinese_students.0003.d: "O triunfo exige humildade."
 chinese_students.0003.e: "Terei minha vingança!"
 chinese_students.0003.f: "Aprenderei com este revés."
 # Opinion Modifiers
 opinion_mentor_appreciation: "Aprecia a orientação [mentor.Custom('ES_DelDela')] mentor[mentor.Custom('ES_XA')]"
 opinion_mentor_favoritism_positive: "Valoriza o favoritismo"
 opinion_mentor_favoritism_negative: "O favoritismo lhe desagrada"
 opinion_mentor_strict_negative: "Resente-se com a rigidez [mentor.Custom('ES_DelDela')] mentor[mentor.Custom('ES_XA')]"
 TeachingsAccordingToMovementProHegemon_Teaching: "O eixo do Céu, ainda que invisível, põe tudo sob o céu em movimento. Quando a virtude se mantém firme no centro do reino, a harmonia se segue"
 TeachingsAccordingToMovementExpansion_Teaching: "Quando as margens do rio transbordam, alguns podem perecer, mas isso nutre novos campos para alimentar muitos. Assim, a grandeza se revela na coragem de abraçar terras além das nossas"
 TeachingsAccordingToMovementAdvancement_Teaching: "Cuidar do jardim dentro de nossas muralhas enche o ar com uma fragrância que atrai os outros. A verdadeira força e glória só crescem a partir de raízes profundamente fincadas em um solo bem cultivado"
 TeachingsAccordingToMovementConservative_Teaching: "Apesar do silêncio nos salões dos antepassados, ouça com atenção e você ouvirá ecos duradouros para guiar cada passo. Honre bem o caminho trilhado que nos trouxe até este momento"
 TeachingsAccordingToMovementUndecided_Teaching: "Quando o vento muda, o sábio ajusta suas velas para capturar sua força. A dança da contenção e da ambição, da tradição e da mudança, sempre em busca de equilíbrio, deve guiar você tanto na governança quanto na vida"
 TeachingsAccordingToMovementFallback_Teaching: "Até uma lanterna solitária dissipa a noite; a sabedoria não precisa de estandarte para guiar o caminho"
 TeachingsAccordingToMovementProHegemon_Response: "Há quem exalte o eixo com tanta força que esqueça seu propósito de manter a roda unida"
 TeachingsAccordingToMovementExpansion_Response: "Vi alguns tão empenhados em novos campos que negligenciam manter a paz em seu próprio jardim"
 TeachingsAccordingToMovementAdvancement_Response: "Alguns perseguem flores distantes e chamam isso de glória, mas esquecem os frutos que sustentam a própria casa"
 TeachingsAccordingToMovementConservative_Response: "Temo que aqueles que se apegam demais ao passado não possam lavrar novas terras, mesmo quando os velhos campos estiverem em pousio"
 TeachingsAccordingToMovementUndecided_Response: "Por desgracia, vi muitos exaltarem o equilíbrio como desculpa para a inação enquanto o mundo os deixava para trás"
 TeachingsAccordingToMovementFallback_Response: "Há quem voe de uma lanterna a outra, como mariposas atraídas por cada chama"
 # A Test of Wisdom: The Blank Scroll
 chinese_students.0010.t: "O Pergaminho em Branco"
 chinese_students.0010.desc: "Meu [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('mentor'))], [mentor.Custom('ES_ElLa')] [mentor.GetTitledFirstName|l], aproxima-se de mim segurando um pergaminho ornamentado nas mãos. Imaculado e intocado pela tinta, revela uma tela em branco de possibilidades.\n\n\"O pergaminho em branco é um teste da sua sabedoria e caráter\", entoa [mentor.GetFirstNameNoTooltip] solenemente. \"O que você escrever aqui reflete sua alma. Escolha suas palavras com cuidado, jovem discípul[ROOT.Char.Custom('ES_OA')]\".\n\nDeixando-me apenas com pincéis, tinta e meus pensamentos."
 # Strong areas - Safe choices
 chinese_students.0010.a.strength: "Uma oportunidade para reformar as leis ultrapassadas do reino!"
 chinese_students.0010.b.strength: "Um poema para minha [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('beloved'))], carregado de duplo sentido e jogos de palavras!"
 chinese_students.0010.c.strength.china: "!Só o Filho do Céu em pessoa merece as pinceladas do meu pincel!"
 chinese_students.0010.c.strength.other: "Só [ROOT.Char.GetTopLiege.GetShortUINameNoTooltip] merece as pinceladas do meu pincel!"
 chinese_students.0010.d.strength: "A filosofia flui naturalmente da minha mente para este pergaminho!"
 chinese_students.0010.e.strength: "Na estratégia militar é onde meus talentos brilham mais!"
 # Weak areas - Growth opportunities
 chinese_students.0010.a.weakness: "Embora a legislação me desafie, devo tentar me aventurar nisso…"
 chinese_students.0010.b.weakness: "Apesar das minhas palavras desajeitadas, expressarei o que sinto pela minha [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('beloved'))]..."
 chinese_students.0010.c.weakness.china: "Tentarei compor uma ode ao Filho do Céu…"
 chinese_students.0010.c.weakness.other: "Tentarei compor uma ode a [ROOT.Char.GetTopLiege.GetShortUINameNoTooltip]…"
 chinese_students.0010.d.weakness: "A filosofia põe à prova os meus limites, mas este tratado pode expandir a minha mente…"
 chinese_students.0010.e.weakness: "A guerra me confunde, mas o exército [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetAdjectiveNoTooltip] precisa de ideias novas…"
 chinese_students.0010.f: "A verdade mais profunda reside na palavra não dita."
 chinese_students.0010.tt: "#weak Se evaluarán los trabajos…#!"
 chinese_students.0010.law.success.tt: "Posso ganhar \"[GetModifier('wrote_law_modifier').GetNameWithTooltip]\""
 chinese_students.0010.poem.success.tt: "Posso obter \"[GetModifier('wrote_poem_loved_one_modifier').GetNameWithTooltip]\""
 chinese_students.0010.ode.success.tt: "Posso ganhar \"[GetModifier('wrote_ode_to_liege_modifier').GetNameWithTooltip]\""
 chinese_students.0010.treatise.success.tt: "Posso ganhar \"[GetModifier('wrote_philosophical_treatise_modifier').GetNameWithTooltip]\""
 chinese_students.0010.stratagem.success.tt: "Posso ganhar \"[GetModifier('wrote_strategy_scroll_modifier').GetNameWithTooltip]\""
 chinese_students.0010.blank.success.tt: "Posso obter \"[GetModifier('left_scroll_blank_modifier').GetNameWithTooltip]\""
 chinese_students.0010.failure.tt: "Posso ganhar uma experiência valiosa"
 chinese_students.0010.success: "Escrita de alta qualidade"
 chinese_students.0010.failure: "Escrito abaixo da média"
 chinese_students.0010.success_blank: "[mentor.Custom('ES_ElLa')|U] mentor[mentor.Custom('ES_XA')] entende sua visão"
 chinese_students.0010.failure_blank: "Sua visão está obscura demais"
 # Mentor evaluates the student's scroll
 chinese_students.0011.t: "Um momento de aprendizado"
 chinese_students.0011.desc.intro: "Meu estudante [scroll_student.GetShortUIName] aparece à minha porta, carregando reverentemente um pergaminho com uma bela caligrafia. Ele o apresenta com mãos trêmulas, ansios[scroll_student.Custom('ES_OA')] por meu veredito.\n\nDesenrolo-o cuidadosamente para examinar o que [scroll_student.GetFirstNameNoTooltip] escolheu escrever. Trata-se de…"
 chinese_students.0011.desc.law: "uma proposta para uma nova lei relacionada aos detalhes mais sutis da boa governança."
 chinese_students.0011.desc.love_letter: "uma carta de amor a [beloved.GetShortUIName], repleta de sentimentos ternos."
 chinese_students.0011.desc.emperor_ode: "uma ode à glória de [ROOT.Char.GetTopLiege.GetShortUIName] , que enaltece suas muitas virtudes."
 chinese_students.0011.desc.treatise: "um tratado de filosofia que explora as relações entre os cinco elementos e os quatro pilares."
 chinese_students.0011.desc.strategy: "um tratado de estratégia militar que propõe uma série de manobras pouco ortodoxas que poderiam ser empregadas nas campanhas do exército [scroll_student.GetTopLiege.GetPrimaryTitle.GetAdjectiveNoTooltip]."
 chinese_students.0011.desc.blank: "!um pergaminho em branco!"
 chinese_students.0011.desc.conclusion: "\n\nDemonstra uma janela reveladora para sua mente e personalidade."
 chinese_students.0011.desc.quality_success: "A qualidade deste trabalho é digna de ser exibida na biblioteca de [scroll_student.GetTopLiege.GetCapitalLocation.GetNameNoTooltip]!"
 chinese_students.0011.desc.quality_failure: "Infelizmente, apesar de um esforço considerável, o texto não é… muito bom."
 chinese_students.0011.desc.quality_success.blank: "Que escolha interessante e profunda!"
 chinese_students.0011.desc.quality_failure.blank: "Mas o que se passou pela cabeça dele(a)?!"
 chinese_students.0011.self_improvement: "Aceptable, pero creo que puede hacerlo mejor."
 # Dynamic positive evaluation descriptions by scroll type
 chinese_students.0011.positive_law: "Esta lei demonstra uma visão e uma sabedoria notáveis."
 chinese_students.0011.positive_love: "Que palavras tão ternas! A emoção é genuína e comovente."
 chinese_students.0011.positive_emperor: "Uma homenagem eloquente, digna do Filho do Céu."
 chinese_students.0011.positive_philosophy: "Estas reflexões filosóficas revelam um intelecto profundo."
 chinese_students.0011.positive_strategy: "Essas manobras mostram uma mente tática promissora."
 chinese_students.0011.positive_blank: "Extraordinário! A mais verdadeira sabedoria não pode ser encontrada na palavra escrita."
 chinese_students.0011.positive_law.worst: "Seu entendimento de assuntos legais melhora a cada dia!"
 chinese_students.0011.positive_love.worst: "Vejo que ele(a) está aprendendo a nobre arte dos jogos de palavras sedutores!"
 chinese_students.0011.positive_emperor.worst: "Demonstra um talento inesperado na arte do homenagem!"
 chinese_students.0011.positive_philosophy.worst: "Seu domínio dos conceitos filosóficos avança com uma velocidade surpreendente!"
 chinese_students.0011.positive_strategy.worst: "Demonstra uma clareza recém-descoberta em assuntos militares!"
 # Dynamic negative evaluation descriptions by scroll type
 chinese_students.0011.negative_law: "Uma tentativa grosseira de governança. Ainda tem muito a aprender."
 chinese_students.0011.negative_love: "Sentimentos batidos embrulhados em linguagem floridista. Que decepção."
 chinese_students.0011.negative_emperor: "A bajulação vazia revela uma mente superficial."
 chinese_students.0011.negative_philosophy: "Limitou-se a repetir as ideias de outros sem entendê-las."
 chinese_students.0011.negative_strategy: "Coloca [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetDefinitiveNameNoTooltip] em risco, só para sair na frente."
 chinese_students.0011.negative_blank: "Há tanta substância quanto em sua mente."
 wrote_law_modifier: "Arquiteto da ordem"
 wrote_poem_loved_one_modifier: "Poeta do coração"
 wrote_ode_to_liege_modifier: "Ode ao Trono Exaltado"
 wrote_philosophical_treatise_modifier: "Sábio do caminho"
 wrote_strategy_scroll_modifier: "Estrategista venerado"
 left_scroll_blank_modifier: "Mestre de wu wei"
 mentor_encouragement_modifier: "Incentivo para melhorar"
 opinion_mentor_respect: "Respeita os estudos árduos"
 opinion_mentor_disrespect: "Decepção pelos estudos"
 opinion_student_gratitude: "Gratidão pela orientação"
 opinion_student_scolded: "Repreendido pelo mentor[mentor.Custom('ES_XA')]"
 opinion_student_highroad: "Impressionado pela humildade"
 opinion_student_humility: "Agradecimento pela resposta humilde"
 chinese_students.0011.positive.toast: "Mentor[mentor.Custom('ES_XA')] aplaude meu pergaminho"
 chinese_students.0011.negative.toast: "Mentor[mentor.Custom('ES_XA')] avalia meu pergaminho com severidade"
 chinese_students.0011.self_improvement.toast: "Mentor[mentor.Custom('ES_XA')] incentiva a melhoria"
 # I Ching Divination Events (0020/0021)
 chinese_students.0020.t: "Consultar o caminho"
 chinese_students.0020.desc: "Meu [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('mentor'))] mentor[mentor.Custom('ES_ElLa')|l] [mentor.GetTitledFirstName|l], estende os antigos talos de milefólio diante de [Select_CString(And(ROOT.Char.IsFemale, mentor.IsFemale), 'nosotras', 'nosotros')], suas superfícies desgastadas captam a luz trêmula das velas. “O oráculo guarda um conhecimento infinito, jovem discípul[ROOT.Char.Custom('ES_OA')]”, entoa com reverência. “Mas ele só fala àqueles que se aproximam com habilidade e sinceridade. O que você lê neles?”.\n\nOs hexagramas do I Ching de"
 chinese_students.0020.desc.heaven: "[Glossary('Cielo','I_CHING_HEAVEN_GLOSS')]"
 chinese_students.0020.desc.thunder: "[Glossary('Trueno','I_CHING_THUNDER_GLOSS')]"
 chinese_students.0020.desc.water: "[Glossary('Agua','I_CHING_WATER_GLOSS')]"
 chinese_students.0020.desc.mountain: "[Glossary('Montaña','I_CHING_MOUNTAIN_GLOSS')]"
 chinese_students.0020.desc.wind: "[Glossary('Viento','I_CHING_WIND_GLOSS')]"
 comma_space: "-"
 comma_space_and: "-"
 chinese_students.0020.desc.conclusion: "emergem claramente enquanto [mentor.GetSheHe] fala. Sinto-os aguardando pacientemente para eu revelar os padrões cósmicos que guiam o mundo."
 chinese_students.0020.a.strength: "Os céus sempre me mostram o caminho!"
 chinese_students.0020.a.weakness: "Talvez os mistérios do céu não me iludam hoje…"
 chinese_students.0020.b.strength: "O trovão é meu domínio!"
 chinese_students.0020.b.weakness: "Este poderia ser o momento em que eu apreendesse a força do trovão…"
 chinese_students.0020.c.strength: "A água reflete perfeitamente meu entendimento!"
 chinese_students.0020.c.weakness: "A sabedoria da água é tão fugidia quanto sua natureza…"
 chinese_students.0020.d.strength: "Escalei a Montanha muitas vezes!"
 chinese_students.0020.d.weakness: "A montanha se ergue pesada em minha mente…"
 chinese_students.0020.e.strength: "O vento me é conhecido!"
 chinese_students.0020.e.weakness: "A sutileza do vento me confunde…"
 I_CHING_HEAVEN_GLOSS: "O hexagrama do céu representa a ordem divina, a governança e a liderança. Ele personifica os princípios de autoridade e estrutura, guiando aqueles que buscam governar com sabedoria e virtude."
 I_CHING_THUNDER_GLOSS: "O hexagrama do trovão simboliza o poder, a autoridade e a capacidade de impor a própria vontade. Ensina a importância da força e da firmeza diante da adversidade."
 I_CHING_WATER_GLOSS: "O hexagrama da Água simboliza a capacidade de adaptação, de fluir e a habilidade de superar os desafios da vida. Ensina a importância da flexibilidade e da resiliência diante da adversidade."
 I_CHING_MOUNTAIN_GLOSS: "O hexagrama da Montanha simboliza a estabilidade, a força e a capacidade de suportar dificuldades. Ensina a importância da perseverança e da fortaleza diante da adversidade."
 I_CHING_WIND_GLOSS: "O hexagrama do Vento simboliza a mudança, a flexibilidade e a capacidade de se adaptar a novas circunstâncias. Ele ensina a importância da adaptabilidade e da resiliência diante da adversidade."
 chinese_students.0020.tt: "#weak Se valorará el oráculo…#!"
 chinese_students.0020.heaven.success.tt: "Posso ganhar \"[GetModifier('heaven_divination_insight_modifier').GetNameWithTooltip]\""
 chinese_students.0020.thunder.success.tt: "Posso ganhar \"[GetModifier('thunder_divination_insight_modifier').GetNameWithTooltip]\""
 chinese_students.0020.water.success.tt: "Posso ganhar \"[GetModifier('water_divination_insight_modifier').GetNameWithTooltip|l]\""
 chinese_students.0020.mountain.success.tt: "Posso ganhar \"[GetModifier('mountain_divination_insight_modifier').GetNameWithTooltip]\""
 chinese_students.0020.wind.success.tt: "Posso ganhar \"[GetModifier('wind_divination_insight_modifier').GetNameWithTooltip|l]\""
 chinese_students.0020.failure.tt: "Posso adquirir uma experiência valiosa"
 chinese_students.0020.success: "Conhecimentos profundos de oráculo"
 chinese_students.0020.failure: "Interpretação imperfeita"
 # Event 0021 - Mentor's Evaluation
 chinese_students.0021.t: "O julgamento do oráculo"
 chinese_students.0021.desc: "Meu [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('divination_student'))] [divination_student.GetShortUIName] sai da câmara de adivinhação, com a mente atordoada pelo impacto das revelações do I Ching.\n\n[divination_student.Custom2('RelationToMe',ROOT.Char)|U], foi-me mostrado que…"
 chinese_students.0021.desc.heaven.success: "as seis linhas intactas revelam a força criativa pura de Qian. Assim como o Céu abrange tudo o que está abaixo dele, o governante também deve personificar a força temperada pela sabedoria\"."
 chinese_students.0021.desc.heaven.failure: "seis linhas intactas significam poder ilimitado! O Imperador deve governar com punho de ferro, esmagando toda oposição como o Céu esmaga aqueles que o desafiam!\""
 chinese_students.0021.desc.thunder.success: "a ação decisiva no momento certo traz a vitória, de acordo com o hexagrama de Zhen. Assim como o trovão desperta a vida dormente na primavera, a verdadeira liderança inspira outros a agir\"."
 chinese_students.0021.desc.thunder.failure: "Tal como o trovão atinge rápido e com estrondo, também nós devemos fazer todos tremerem! Hesitação é fraqueza, e o oráculo exige força imediata!\"."
 chinese_students.0021.desc.water.success: "assim como a água contorna os obstáculos, Kan nos ensina que a verdadeira sabedoria está em reconhecer o perigo e encontrar o caminho de menor resistência\"."
 chinese_students.0021.desc.water.failure: "assim como a água destrói tudo em seu caminho, devemos esmagar nossos inimigos como uma enchente, afogando toda resistência!\""
 chinese_students.0021.desc.mountain.success: "a quietude traz clareza. Ao manter a mente em silêncio e o corpo em repouso, Gen revela o verdadeiro caminho a seguir sem distrações\"."
 chinese_students.0021.desc.mountain.failure: "As montanhas esmagam aqueles que estão abaixo! Então devemos ser inabaláveis, recusando-nos a ceder, aconteça o que acontecer!\""
 chinese_students.0021.desc.wind.success: "a persistência sutil supera a força rígida. Assim como o vento molda a paisagem com o passar do tempo, a sutil influência de Xun alcança o que a força bruta não consegue\"."
 chinese_students.0021.desc.wind.failure: "assim como a tempestade, podemos abafar a oposição falando mais e mais alto! Para vencer os debates pelo futuro [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetAdjectiveNoTooltip], devemos ser quem fale com mais veemência!\"."
 chinese_students.0021.positive_heaven.best: "Sua compreensão da ordem do Céu mostra verdadeira sabedoria de governo!"
 chinese_students.0021.positive_heaven.worst: "Apesar das dificuldades, sua dedicação à liderança impressiona."
 chinese_students.0021.positive_thunder.best: "Compreende perfeitamente a natureza da ação decisiva!"
 chinese_students.0021.positive_thunder.worst: "Seu valor ao enfrentar o desafio de Trovão é admirável."
 chinese_students.0021.positive_water.best: "Sua leitura flui com adaptabilidade natural!"
 chinese_students.0021.positive_water.worst: "Sua persistência com os mistérios da água é admirável."
 chinese_students.0021.positive_mountain.best: "Seu(a) sossego revela uma percepção profunda!"
 chinese_students.0021.positive_mountain.worst: "Seu estudo diligente da montanha merece reconhecimento."
 chinese_students.0021.positive_wind.best: "Capta perfeitamente a sutil influência do vento!"
 chinese_students.0021.positive_wind.worst: "Sua sabedoria se mostra ao compreender a influência."
 chinese_students.0021.negative_heaven: "Carece de profundidade nos princípios de governança do Céu."
 chinese_students.0021.negative_thunder: "A força decisiva do trovão lhe escapa. É preciso agir com propósito."
 chinese_students.0021.negative_water: "A flexibilidade lhe escapa. É essencial para a sabedoria."
 chinese_students.0021.negative_mountain: "Seu espírito carece de quietude. Que busque a reflexão."
 chinese_students.0021.negative_wind: "Não capta o poder sutil do Vento. Que aprenda a suavidade."
 chinese_students.0021.balanced_evaluation: "Promete, mas precisa ser refinado."
 chinese_students.0021.positive.toast: "Aprovação do mentor"
 chinese_students.0021.negative.toast: "Correção do mentor"
 chinese_students.0021.balanced.toast: "Orientação do mentor"
 heaven_divination_insight_modifier: "Ordem do céu"
 thunder_divination_insight_modifier: "Força do trovão"
 water_divination_insight_modifier: "Fluxo da água"
 mountain_divination_insight_modifier: "Silêncio da montanha"
 wind_divination_insight_modifier: "Influência do vento"
 # Event 0030 - Showcase or Train Skill
 chinese_students.0030.t: "Força ou humildade"
 chinese_students.0030.desc: "No meio da prática diária, sinto os olhos de [mentor.GetShortUIName], minha [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('mentor'))], sobre mim. Trabalho em silêncio enquanto [mentor.GetSheHe] me avalia em silêncio. Depois do que me parece uma eternidade, ele fala.\n\n“Não basta conhecer nossas maiores forças. Ainda mais importante é conhecer nossas limitações mais profundas. Mostre-me o que você aprendeu sobre si, discípul[ROOT.Char.Custom('ES_OA')]”."
 chinese_students.0030.a.diplomacy: "Farei um apelo eloquente em prol da harmonia do reino."
 chinese_students.0030.a.martial: "Vou lhe mostrar minha forma impecável de lança."
 chinese_students.0030.a.stewardship: "Posso dizer exatamente onde os fundos do reino estão sendo mal alocados."
 chinese_students.0030.a.intrigue: "Talvez {T0} se interesse pelo meu engenhoso ciframento."
 chinese_students.0030.a.learning: "Posso recitar as Analectas de memória."
 chinese_students.0030.b.diplomacy: "Eu enfrentarei [mentor.GetSheHe] #emp directamente#! em um debate apaixonado!"
 chinese_students.0030.b.martial: "Ele não consegue nem #emp igualar#! minha forma impecável com a lança!"
 chinese_students.0030.b.stewardship: "¡Le diré lo que pienso de #emp sus#! finanzas!"
 chinese_students.0030.b.intrigue: "Posso compartilhar um ou dois segredos sobre #emp sus#!!"
 chinese_students.0030.b.learning: "#emp Nadie#! pode igualar meu conhecimento dos clássicos!"
 chinese_students.0030.c.diplomacy: "Tenho estado trabalhando nesta petição…"
 chinese_students.0030.c.martial: "Posso demonstrar minha forma com a lança, embora seja imperfeita…"
 chinese_students.0030.c.stewardship: "Há alguns totais dos livros-caixa com os quais tenho tido dificuldade…"
 chinese_students.0030.c.intrigue: "Tenho uma compreensão limitada das intrigas do palácio…"
 chinese_students.0030.c.learning: "Poderia relatar o que sei sobre os ensinamentos de Confúcio…"
 chinese_students.0030.talent.success: "Tenho um desempenho admirável"
 chinese_students.0030.talent.success.tt: "Posso ganhar o respeito dele/dela"
 chinese_students.0030.talent.failure: "Tenho um desempenho ruim"
 chinese_students.0030.talent.failure.tt: "Talvez eu seja repreendido"
 chinese_students.0030.show_off.success: "Supero os ensinamentos dele"
 chinese_students.0030.show_off.success.tt: "Posso conquistar o respeito dele ou dela e [merit|lE]"
 chinese_students.0030.show_off.failure: "Eu me faço de ridículo"
 chinese_students.0030.show_off.failure.tt: "Posso ser punido por minha arrogância"
 chinese_students.0030.improve.success: "Desempenho admiravelmente"
 chinese_students.0030.improve.success.tt: "Posso ganhar seu respeito e experiência valiosa"
 chinese_students.0030.improve.failure: "Meu mentor[mentor.Custom('ES_XA')] me ensina"
 chinese_students.0030.improve.failure.tt: "Posso ser repreendido, mas ganharei experiência valiosa"
 # Event 0031 - Mentor's Response
 chinese_students.0031.a.success.talent: "Desempenha-se admiravelmente."
 chinese_students.0031.a.success.show_off: "Não me resta mais nada para lhe ensinar!"
 chinese_students.0031.a.success.improve: "Fico satisfeito em ver seu progresso!"
 chinese_students.0031.a.failure.talent: "Tem uma opinião alta demais de si mesm[mentee.Custom('ES_OA')], mas todos nós começamos em algum lugar."
 chinese_students.0031.a.failure.show_off: "Onde foi que eu errei com este[mentee.Custom('ES_EA')]?!"
 chinese_students.0031.a.failure.improve: "Continua pres[mentee.Custom('ES_OA')] em seus conflitos."
 chinese_students.0031.b.success.talent: "Não há melhoria a ser obtida com elogios!"
 chinese_students.0031.b.success.show_off: "Arrogante e ousado, mas há pouco que eu possa criticar."
 chinese_students.0031.b.success.improve: "$chinese_students.0031.b.success.talent$"
 chinese_students.0031.b.failure.talent: "Sobre tudo, precisa aprender humildade."
 chinese_students.0031.b.failure.show_off: "Sem talento e com ainda menos humildade. É hora de se livrar do peso."
 chinese_students.0031.b.failure.improve: "[mentee.GetSheHe|U] tem um longo caminho pela frente."
 # Action description (what the student attempts)
 chinese_students.0031.desc.action.talent.diplomacy: "Dá um passo à frente e faz um apelo eloquente em prol da harmonia do reino."
 chinese_students.0031.desc.action.talent.martial: "Con una respiración medida, realiza una exhibición de lanza perfecta."
 chinese_students.0031.desc.action.talent.stewardship: "Libro de cuentas en mano, señala dónde se escapan los fondos del señorío."
 chinese_students.0031.desc.action.talent.intrigue: "[mentee.GetSheHe|U] desvenda um cifrado engenhoso, convidando-me a examiná-lo."
 chinese_students.0031.desc.action.talent.learning: "Con tranquilidad, empieza a recitar las Analectas de memoria."
 chinese_students.0031.desc.action.show_off.diplomacy: "Con una floritura audaz, se lanza a un debate animado donde desafía hasta mi sabiduría."
 chinese_students.0031.desc.action.show_off.martial: "Empunha uma lança, desafiando-me a igualar sua forma impecável."
 chinese_students.0031.desc.action.show_off.stewardship: "Sonriendo, critica mis cuentas con desdén teatral."
 chinese_students.0031.desc.action.show_off.intrigue: "Começa a relatar obscuros segredos do reino, insinuando sutilmente as maquinações que pertencem somente a mim."
 chinese_students.0031.desc.action.show_off.learning: "Afirmando um domínio sem igual, recita trechos obscuros dos Clássicos."
 chinese_students.0031.desc.action.improve.diplomacy: "Tímidamente, apresenta uma petição humilde, em busca de aperfeiçoar sua retórica."
 chinese_students.0031.desc.action.improve.martial: "Admitiendo sus fallos, realiza una temblorosa demostración de lanza para que se le corrija."
 chinese_students.0031.desc.action.improve.stewardship: "Apresenta cifras confusas e pede orientação para organizá-las."
 chinese_students.0031.desc.action.improve.intrigue: "Compartilha algumas ideias preliminares sobre as intrigas do palácio, ansioso para refiná-las."
 chinese_students.0031.desc.action.improve.learning: "Com alguma hesitação, [mentee.GetSheHe] narra fragmentos dos ensinamentos de Confúcio, esperando ser esclarecid[mentee.Custom('ES_OA')]."
 chinese_students.0031.t: "Jade ou pedra"
 chinese_students.0031.desc.intro: "Durante a prática diária com [mentee.GetShortUIName], meu [ROOT.Char.Custom2('RelationToMe',SCOPE.sC('mentee'))], observo seus esforços para demonstrar suas habilidades.\n\n"
 # Talent showcase (best skill)
 chinese_students.0031.desc.talent.diplomacy.success: "Suas palavras comedidas e tom respeitoso revelam um coração de diplomata[mentee.Custom('ES_OA')]que tece harmonia com destreza a partir de vozes discordantes."
 chinese_students.0031.desc.talent.diplomacy.failure: "Con la lengua trabada y tono inseguro, siembra confusión donde se buscaba armonía."
 chinese_students.0031.desc.talent.martial.success: "Sua postura permanece firme e atinge com precisão, com uma disciplina forjada em incontáveis horas no campo de treino."
 chinese_students.0031.desc.talent.martial.failure: "O jogo de pernas falha e os golpes soam vazios, revelando falhas em sua técnica."
 chinese_students.0031.desc.talent.stewardship.success: "O livro-caixa que ele(a) apresenta está equilibrado como a balança do Céu; cada moeda é colocada com discernimento deliberado."
 chinese_students.0031.desc.talent.stewardship.failure: "As colunas estão somadas incorretamente e manchas de tinta maculam as páginas, revelando descuido em meio à suposta perícia."
 chinese_students.0031.desc.talent.intrigue.success: "Sutil como a sombra à luz da lua, seu enigma astuto desvenda os motivos ocultos de quem escuta."
 chinese_students.0031.desc.talent.intrigue.failure: "Fios de engano entrelaçados até virarem absurdo, todos os segredos revelados pelo próprio deslize."
 chinese_students.0031.desc.talent.learning.success: "Sin detenerse, recita los clásicos, cada verso es un trazo de dedicación erudita."
 chinese_students.0031.desc.talent.learning.failure: "Com linhas esquecidas e significados confusos, [mentee.GetSheHe] expõe um estudo superficial por trás de afirmações audaciosas."
 # Show-off attempt (best skill)
 chinese_students.0031.desc.show_off.diplomacy.success: "O estilo encontra a substância: a eloquência deslumbra e, ainda assim, guia os corações rumo ao acordo."
 chinese_students.0031.desc.show_off.diplomacy.failure: "Mas parece que busca mais aplausos do que concórdia, transformando a eloquência em vaidade deslumbrante."
 chinese_students.0031.desc.show_off.martial.success: "As floreios espetaculares não revelam falhas; cada investida corta o ar com verdadeira maestria."
 chinese_students.0031.desc.show_off.martial.failure: "A lâmina brilha apenas por espetáculo, em busca de aplausos em vez de aperfeiçoar a forma perfeita."
 chinese_students.0031.desc.show_off.stewardship.success: "Bravatas à parte, ela apresenta contas tão exatas que nem mesmo a arrogância poderia diminuir seu valor."
 chinese_students.0031.desc.show_off.stewardship.failure: "Exibe colunas de moedas como adereços de palco, esquecendo que a verdadeira sabedoria reside no equilíbrio silencioso."
 chinese_students.0031.desc.show_off.intrigue.success: "Estratagemas impecáveis envoltas com elegância; cada pista sussurrada conduzia ouvintes invisíveis."
 chinese_students.0031.desc.show_off.intrigue.failure: "Seu labirinto de segredos parece ser urdido para impressionar, não por necessidade; a astúcia, embotada pelo orgulho."
 chinese_students.0031.desc.show_off.learning.success: "Uma recitação rápida deslumra e ilumina por igual, provando a compreensão por trás do floreio."
 chinese_students.0031.desc.show_off.learning.failure: "[mentee.GetSheHe|U] recita passagens de uma vez mais rápido do que respira, sem prestar atenção ao significado profundo contido na tinta."
 # Improvement request (worst skill)
 chinese_students.0031.desc.improve.diplomacy.success: "Con voz firme y argumentos sensatos, ha superado las expectativas a pesar de encontrarse en terreno desconocido."
 chinese_students.0031.desc.improve.diplomacy.failure: "Seu discurso hesitante revela sua incerteza, mas a humildade é o primeiro passo no caminho do diplomata."
 chinese_students.0031.desc.improve.martial.success: "A forma antes instável agora está posicionada com confiança, prova de uma prática diligente."
 chinese_students.0031.desc.improve.martial.failure: "Sua lança trêmula vacila, mas até o maior general já manejou uma espada de madeira com desajeito."
 chinese_students.0031.desc.improve.stewardship.success: "As somas das cifras são corretas e a tinta está limpa; a perseverança produziu ordem a partir da confusão."
 chinese_students.0031.desc.improve.stewardship.failure: "Suas contas falham e a tinta borra, mas um esforço humilde para alcançar a maestria merece orientação."
 chinese_students.0031.desc.improve.intrigue.success: "A artimanha se desenrola com uma sutileza surpreendente; sugere uma percepção surpreendente das correntes ocultas."
 chinese_students.0031.desc.improve.intrigue.failure: "Sua enganação desajeitada é transparente, mas a honestidade sobre as próprias limitações é a moeda mais rara."
 chinese_students.0031.desc.improve.learning.success: "Os versos fluíam de forma hesitante, mas correta; as sementes do saber criavam raízes firmes."
 chinese_students.0031.desc.improve.learning.failure: "Ele tropeçou nos Analectos, mas a sede de conhecimento ainda brilhava intensamente em seus olhos."
 chinese_students.0031.desc.conclusion: "\n\nLimpo a garganta, e o pátio silencia. Meu julgamento está pronto para ser ouvido."
 chinese_students.0031.kind_evaluation.toast: "Avaliação gentil"
 chinese_students.0031.harsh_evaluation.toast: "Avaliação severa"
 # Event 0032 - Mentorship Ends
 chinese_students.0032.t: "Os caminhos se separam"
 chinese_students.0032.desc: "[mentor.GetShortUIName] se aproxima, com as mãos cruzadas atrás das costas. \"Nossos caminhos se separam aqui, discípul[ROOT.Char.Custom('ES_OA')]\", diz com voz ponderada. \"Busque a sabedoria por conta própria agora. Minhas lições terminaram\"."
 chinese_students.0032.a: "Terei que me esforçar sem orientação."
