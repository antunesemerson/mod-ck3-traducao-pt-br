l_spanish:
 stress_trait_coping_decisions.1001.t: "Lidando com o Estresse: Beba!"
 stress_trait_coping_decisions.1001.desc: "Otra copa y mis hombros empiezan a relajarse un poco más. #EMP Así#! es como hay que pasar el tiempo… la sobriedad es sufrimiento."
 stress_trait_coping_decisions.1001.a: "Eu - #EMP arroto#! Já me sinto melhor!"
 stress_trait_coping_decisions.1002.t: "Lidando com o Estresse: Companheiro de Bebida!"
 stress_trait_coping_decisions.1002.desc: "\"[ROOT.Char.GetFirstNameNoTooltip]! Olá!\"\n\nDe repente, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('fellow_drunkard'))], [fellow_drunkard.Custom('ES_ElLa')] [fellow_drunkard.GetTitledFirstName|l], senta-se ao meu lado, com uma taça na mão. Ao que parece, ele também veio à taverna para relaxar, e passamos o resto da noite bebendo [Select_CString(And(ROOT.Char.IsFemale, fellow_drunkard.IsFemale),'juntas','juntos')].\n\nFaziam #EMP meses#! que eu não me sentia tão relaxad[ROOT.Char.Custom('ES_OA')]!"
 stress_trait_coping_decisions.1002.a: "Beba, meu amigo[fellow_drunkard.Custom('ES_OA')] [fellow_drunkard.Custom('ES_OA')]!"
 stress_trait_coping_decisions.1003.t: "Companheiro de Bebida!"
 stress_trait_coping_decisions.1003.desc: "Bebo sozinho na taverna quando, de repente, vejo meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('original_drunkard'))] [original_drunkard.Custom('ES_ElLa')] [original_drunkard.GetTitledFirstName|l], sentad[original_drunkard.Custom('ES_OA')] bem do outro lado.\n\nRapidamente me abro caminho e passamos o resto da noite bebendo [Select_CString(And(ROOT.Char.IsFemale, original_drunkard.IsFemale),'juntas','juntos')]. [original_drunkard.GetSheHe|U] sabe mesmo como se divertir!"
 stress_trait_coping_decisions.1004.t: "Lidando com o Estresse: Manhãs Desajeitadas"
 stress_trait_coping_decisions.1004.desc: "Acordo com a cabeça apoiada em um travesseiro macio e vários corpos quentes ao meu lado. Que noite deve ter sido! Eu mal me lembr…\n\n #EMP Bee!#!\n\n… Hum. Ao abrir os olhos, sou saudado por um olho semicerrado em um rosto muito #EMP blanca#! e #EMP mullida#!. De repente meu travesseiro se levanta e vai embora, e meus companheiros de sono o seguem de repente. Fico soz[ROOT.Char.Custom('ES_OA')] no feno."
 stress_trait_coping_decisions.1004.a: "Bem... tive uma boa noite de sono!"
 stress_trait_coping_decisions.1501.t: "Lidando com o Estresse: Névoa Calmante"
 stress_trait_coping_decisions.1501.desc: "Reclino-me no meu assento enquanto estendo a mão para pegar outro bolo. Seu sabor doce me enjoa, e uma névoa agradável vai levando embora meus problemas.\n\nNão me sentia tão tranquilo[ROOT.Char.Custom('ES_OA')] há #EMP semanas#!. Só estar aqui já basta, na companhia dessa bandeja de bolos cobertos de haxixe."
 stress_trait_coping_decisions.1501.a: "Isso é tudo que eu preciso."
 stress_trait_coping_decisions.2001.t: "Lidando com o Estresse: Desejos Insaciáveis"
 stress_trait_coping_decisions.2001.desc_woman: "Me deito em um emaranhado de corpos, [ROOT.Char.Custom('AttractionWomanManIndef')] em cima de mim, enquanto a liberação - e o alívio - me percorrem."
 stress_trait_coping_decisions.2001.desc_man: "Me deito em um emaranhado de corpos, [ROOT.Char.Custom('AttractionWomanManIndef')] cavalgando sobre mim, enquanto a liberação - e o alívio - me percorrem."
 stress_trait_coping_decisions.2001.desc_ending: "\n\nMinha mente está mais calma do que esteve em #EMP semanas#!, mas ainda assim meu pulso acelera! Magnífico!"
 stress_trait_coping_decisions.2001.a: "Mais uma vez. Venha aqui, [ROOT.Char.Custom('AttractionGirlBoyPlural')]!"
 stress_trait_coping_decisions.2002.t: "Lidando com o Estresse: O Preço da Paixão"
 stress_trait_coping_decisions.2002.desc_woman: "Acordo após uma noite incrível de paixão. E é[ROOT.Char.Custom('ES_EAOpp')] [ROOT.Char.Custom('AttractionWomanMan')], que insistiu em ficar por mais tempo do que todos os outros, se entregando a mim até eu pegar no sono… #EMP Vaya#!, foi toda uma #EMP experiencia#!!"
 stress_trait_coping_decisions.2002.desc_man: "Acordo depois de uma noite incrível de paixão. E essa[ROOT.Char.Custom('ES_EAOpp')] [ROOT.Char.Custom('AttractionWomanMan')], que insistiu em ficar mais do que todo mundo, me cavalgando até eu adormecer… #EMP Vaya#!, foi toda uma #EMP experiencia#!!"
 stress_trait_coping_decisions.2002.desc: "\n\nMe levanto para me vestir, mas parece que está faltando algo. Algo bastante importante. Algo como #EMP todas mis cosas#!! O aposento está vazio, não há nem sinal de roupas ou bolsa à vista.\n\n"
 stress_trait_coping_decisions.2002.desc_ending_rival: "No chão, encontro um bilhete: #EMP «Espero que disfrutaseis con la persona que os envié. Vuestr[rival.Custom('ES_OA')] rival, [rival.GetTitledFirstName|l]».#!"
 stress_trait_coping_decisions.2002.desc_ending: "Malditos sejam todos!"
 stress_trait_coping_decisions.2002.a: "Por favor... alguém... traga-me roupas!"
 stress_trait_coping_decisions.2002.b: "[rival.GetFirstNameNoTooltip]! Seu traidor!"
 stress_trait_coping_decisions.2004.t: "Lidando com o Estresse: Consequências"
 stress_trait_coping_decisions.2004.desc: "Numa tarde, uma camponesa se aproxima de repente a mim, agarrando um bebê e com lágrimas escorrendo pelas bochechas.\n\n\"[ROOT.Char.GetTitledFirstNameNoTooltip]!\", ela me repreende, \"Suas travessuras não estão isentas de consequências! Isto[baby.Custom('ES_EA')] [baby.Custom('GirlBoy')] é #EMP vuestr[ROOT.Char.Custom('ES_OA')]#!!\".\n\nQuase fico sem ar — mas será que me lembro do rosto dela, do corpo dela, brilhando fracamente à luz de velas em algum antro de iniquidade...?"
 stress_trait_coping_decisions.2004.a: "Um[baby.Custom('ES_XA')] [baby.Custom('GetDaughterSon')]! #EMP Mi#! [baby.Custom('GetDaughterSon')]!"
 stress_trait_coping_decisions.2004.b: "Pobre mulher confusa, cuidarei dessa criança mesmo assim..."
 stress_trait_coping_decisions.2004.c: "O que acha que sou? Guardas!"
 stress_trait_coping_decisions_2004_a_custom: "Toda [spouse|lE], [lover|lE] e [child|lE] legítimo"
 stress_trait_coping_decisions.2501.t: "Lidando com o Estresse: Sozinho"
 stress_trait_coping_decisions.2501.desc: "Enquanto me dirijo lentamente para o meu tranquilo [ROOT.Char.Custom('GetChamber')], finalmente me encontro completamente sozinho. Respiro profundamente. E solto o ar.\n\nOs servos foram instruídos a não deixar ninguém me perturbar, aconteça o que acontecer, e enquanto meus ombros relaxam, sei que isso é exatamente o que eu precisava."
 stress_trait_coping_decisions.2501.a: "Estou verdadeiramente em paz!"
 stress_trait_coping_decisions.3001.t: "Lidando com o Estresse: Deixe Sair"
 stress_trait_coping_decisions.3001.desc_vassal: "\"[vassal.GetTitledFirstName], [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('vassal'))] meu querido!\". Sorrio [ROOT.Char.Custom('quirk_neg_adverb')].\n\n\"Você nasceu assim, tão [vassal.Custom2('InsultAdjectiveArticle', ROOT.Char)] [vassal.Custom2('InsultNoun', ROOT.Char)] ou isso foi algo que desenvolveu com o tempo?\"."
 stress_trait_coping_decisions.3001.desc_has_vassals: "Assim que todos os vassalos estão sentados e [vassal.Custom('ES_ElLa')] [vassal.GetTitledFirstName|l] começa a falar, sorrio [ROOT.Char.Custom('quirk_neg_adverb')].\n\n\"[vassal.GetTitledFirstNameNoTooltip], desculpe interromper, mas por que sois sempre tão [vassal.Custom2('InsultNoun', ROOT.Char)] [vassal.Custom2('InsultAdjectiveArticle', ROOT.Char)]? E vós, [vassal_2.GetTitledFirstName|l], nascestes assim de [vassal_2.Custom2('InsultNoun', ROOT.Char)] ou isso se desenvolveu mais tarde na vida?\"."
 stress_trait_coping_decisions.3001.desc_has_target_character: "Quando todos estão sentados e [target_character.Custom('ES_ElLa')] [target_character.GetTitledFirstName|l] começa a falar, sorrio [ROOT.Char.Custom('quirk_neg_adverb')].\n\n\"[target_character.GetTitledFirstNameNoTooltip], desculpe interromper, mas por que você é sempre tão [target_character.Custom2('InsultAdjectiveArticle', ROOT.Char)] [target_character.Custom2('InsultNoun', ROOT.Char)]?\"."
 stress_trait_coping_decisions.3001.desc: "Assim que a [ROOT.Char.Custom('GetCourt')|l] se reúne, sorrio [ROOT.Char.Custom('quirk_neg_adverb')]. Chegou a hora.\n\n\"Ei, você aí! Você nasceu tão grosseiro assim ou isso veio depois, com o tempo?\""
 stress_trait_coping_decisions.3001.a_target: "A expressão no rosto de...!"
 stress_trait_coping_decisions.3001.a: "E #EMP você#!! Não pense que não estou vendo você!"
 stress_trait_coping_decisions.3501.t: "Lidando com o Estresse: Agonia Atarática"
 stress_trait_coping_decisions.3501.desc: "#EMP Chas!#!\n\nO chicote cai sobre minhas costas, e me estremeço com a clareza que ele traz. Dor é tudo o que sinto, e dor é tudo o que está em minha mente.\n\n #EMP Chas!#!\n\n #EMP Chas!#!"
 stress_trait_coping_decisions.3501.a: "Hng– Doce, doce dor!"
 stress_trait_coping_decisions.4001.t: "Lidando com o Estresse: O Preço que Pagamos"
 stress_trait_coping_decisions.4001.desc: "Caminho pelo mercado de [ROOT.Char.GetCurrentLocation.GetBaronyNameExplicitlyNoTooltip], aturdid[ROOT.Char.Custom('ES_OA')] de emoção: tecidos, joias, fios e bugigangas… Quero tudo!\n\nAcabo em uma barraca cuidada por um[ROOT.Char.Custom('ES_XA')] anciã[ROOT.Char.Custom('ES_OA')] que entende muito bem minha situação e promete me ajudar a escolher."
 stress_trait_coping_decisions.4001.a: "Dois desses. Não, espere. #EMP Três!#!"
 stress_trait_coping_decisions.4501.t: "Lidando com o Estresse: O Dom de Dar"
 stress_trait_coping_decisions.4501.desc: "Eu saio do [ROOT.Char.GetFaith.HouseOfWorship] com uma bolsa leve e um coração ainda mais leve.\n\nApenas o pensamento de todas as pessoas necessitadas que esse dinheiro pode ajudar é suficiente para me tranquilizar!"
 stress_trait_coping_decisions.4501.a: "[ROOT.Char.GetFaith.HighGodName] é generoso!"
 stress_trait_coping_decisions.5001.t: "Lidando com o Estresse: Confissão"
 stress_trait_coping_decisions.5001.desc_opening: "Reuni a [ROOT.Char.Custom('GetCourt')|l] hoje porque tenho algo a confessar."
 stress_trait_coping_decisions.5001.desc_secret: "Eu... Eu [secret.Custom('SecretDescriptionFirstPerson')].\""
 stress_trait_coping_decisions.5001.desc_sin: "Eu... Eu não resisto ao meu lado [ROOT.Char.Custom('SinfulTrait')|l] tanto quanto seria adequado.\""
 stress_trait_coping_decisions.5001.desc: "\"Eu... Tenho sido atormentado por pensamentos pecaminosos ultimamente. Ouçam-me...\""
 stress_trait_coping_decisions.5001.desc_ending: "\n\nO murmúrio surpreso que se espalha pela multidão não faz nada para impedir o alívio que sinto."
 stress_trait_coping_decisions.5001.a: "Sinto-me muito mais leve!"
 stress_trait_coping_decisions.5002.desc: "Eu… [secret.Custom('SecretDescriptionFirstPerson')]. Não, espere… Não fui eu! Foi [secret_character.GetTitledFirstName|l]!\"\n\nO grito indignado de minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('secret_character'))] não faz nada para impedir meu alívio."
 stress_trait_coping_decisions.5002.a: "De qualquer forma... Sinto-me muito mais leve!"
 stress_trait_coping_decisions.5501.t: "Lidando com o Estresse: Comer!"
 stress_trait_coping_decisions.5501.desc: "À medida que outro prato de [ROOT.Char.Custom('FavoriteTreat')] é colocado à minha frente, sinto-me relaxar.\n\nNada acalma a mente como uma boa comida!"
 stress_trait_coping_decisions.5501.a: "Traga-me mais [ROOT.Char.Custom('FavoriteTreat')]!"
 stress_trait_coping_decisions.5502.t: "Lidando com o Estresse: Banquete Surpresa"
 stress_trait_coping_decisions.5502.desc: "Enquanto esperava os cozinheiros prepararem minha refeição, me deparo com um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom('lowly_servant_type')] no corredor.\n\n[ROOT.Char.GetSheHe|U] tenta se desculpar, mas não podemos permitir isso agora, podemos? Acabei de encontrar a melhor refeição imaginável!\n\nLevo [ROOT.Char.GetHerHim] ao porão, onde ninguém poderá ouvir os gritos. E então, eu me dou um #EMP festín#!!"
 stress_trait_coping_decisions.5502.desc_landless: "Dando uma volta pelo acampamento enquanto espero que me preparem a comida, encontro um[ROOT.Char.Custom('ES_XA')] jovem de um dos assentamentos próximos.\n\n[ROOT.Char.GetSheHe|U] tenta se desculpar, mas não podemos permitir isso agora, podemos? Acabei de encontrar a melhor refeição imaginável!\n\nLevo [ROOT.Char.GetHerHim] até a beira das terras selvagens, onde um grito ou dois não fazem diferença. E então, eu me deleito com um #EMP festín#!!"
 stress_trait_coping_decisions.5502.a: "E tenho sobremesa me esperando lá em cima!"
 stress_trait_coping_decisions.5502.a_landless: "Agora #EMP isso#! é alívio."
 stress_trait_coping_decisions.6001.t: "Lidando com o Estresse: Abandonar a Comida"
 stress_trait_coping_decisions.6001.desc: "\"Informe ao cozinheiro que não participarei das refeições, nem agora nem no futuro próximo\".\n\nAssim que essas palavras saem da minha boca, me sinto muito mais leve[ROOT.Char.Custom('ES_OA')]. Chega de distrações, de engolir comida que mal consigo suportar! Agora posso me concentrar no que realmente importa."
 stress_trait_coping_decisions.6001.a: "Sim, está tudo bem."
 stress_trait_coping_decisions.6501.t: "Lidando com o Estresse: Tinta Fluindo"
 stress_trait_coping_decisions.6501.desc: "Pego uma caneta e abro meu diário.\n\nA cada frase que preenche o papel, sinto meus ombros relaxando - a clareza que esse processo traz é incomparável!"
 stress_trait_coping_decisions.6501.a: "Mergulho minha caneta mais uma vez..."
 stress_trait_coping_decisions.7001.t: "Lidando com o Estresse: Confidenciar"
 stress_trait_coping_decisions.7001.desc: "Depois de uma longa conversa com m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('confidant'))] [confidant.GetTitledFirstName|l], consigo sentir meus pensamentos se acalmando."
 stress_trait_coping_decisions.7001.desc_ending: "\n\nNo entanto, quando me reúno com minha [ROOT.Char.Custom('GetCourt')|l], vejo a inveja nos rostos dos [ROOT.Char.Custom('GetCourtierPlural')|l]... Afinal, quem não gostaria de ter a confiança de [confidant.GetFirstName]?"
 stress_trait_coping_decisions.7001.a: "Minha mente está tranquila."
 stress_trait_coping_decisions.7002.desc: "Depois de uma conversa longa e exaustiva, consigo sentir meus pensamentos se acalmando."
 stress_trait_coping_decisions.activity: "Lidando com o Estresse:"
 stress_trait_coping_decisions.7501.t: "$stress_trait_coping_decisions.activity$ Suar para Resolver"
 stress_trait_coping_decisions.7501.desc: "Enquanto termino mais uma volta ao redor da minha [ROOT.Char.Custom('ResidenceBuilding')|l], já posso sentir minhas preocupações caindo junto com o suor.\n\nAlgumas pessoas dizem que eu fujo dos meus problemas, mas eu digo que corro em direção às soluções!"
 stress_trait_coping_decisions.7501.a: "Mais uma volta!"
 stress_trait_coping_decisions.7502.t: "$stress_trait_coping_decisions.activity$ Quanto mais pesado, melhor"
 stress_trait_coping_decisions.7502.desc: "“Isso não é suficiente!”, digo a mim mesmo, enquanto largo [ROOT.Char.Custom('signature_weapon')] de treinamento. Tenho praticado sem parar, mas não estou cansado[ROOT.Char.Custom('ES_OA')]! Preciso de um desafio maior!\n\nSim... algo maior... ou talvez mais pesado!\n\nAlgo que me deixe exausto!"
 stress_trait_coping_decisions.7502.a: "[random_artifact.GetNameNoTooltip] será o suficiente!"
 stress_trait_coping_decisions.7502.b: "Vou encomendar uma [ROOT.Char.Custom('signature_weapon')] de treinamento extra pesada."
 stress_trait_coping_decisions.7502.c: "[lifted_child.GetFirstNameNoTooltip], venha aqui!"
 stress_trait_coping_decisions.7502.c.flavor: "Lá vai você!"
 stress_trait_coping_decisions.7502.d: "Não há necessidade de melhoria neste momento."
 stress_trait_coping_decisions.7502.success: "O desafio extra te revigora."
 stress_trait_coping_decisions.7502.failure: "Você superestima sua própria força."
 stress_trait_coping_decisions.7503.t: "$stress_trait_coping_decisions.activity$ Competição Amigável"
 stress_trait_coping_decisions.7503.desc: "Estou em pleno treinamento quando vejo [random_knight.Custom('ES_AlAla')] [random_knight.GetTitledFirstName|l], que também está se exercitando. [random_knight.GetHerHim|U] o(a) olho de cima a baixo… Não só parece gozar de boa saúde, como também de um condicionamento físico de ponta. Eu adoraria medir minha destreza contra a dele(a), mas de que maneira?\n\nDevo levar vários fatores em conta se quiser vencer? Força bruta, ou uma mistura que possa incluir resistência ou astúcia?"
 stress_trait_coping_decisions.7503.a: "Sugerir que os dois lutem."
 stress_trait_coping_decisions.7503.a.tt: "Você acredita que a superioridade pela pura habilidade vencerá."
 stress_trait_coping_decisions.7503.b: "[random_knight.GetHerHim|U] desafia para um duelo de treino."
 stress_trait_coping_decisions.7503.b.tt: "Você acredita que uma combinação de habilidade e técnica marcial levará à vitória."
 stress_trait_coping_decisions.7503.c: "\"Que tal uma corrida a pé?\""
 stress_trait_coping_decisions.7503.c.tt: "Você acredita que uma combinação de habilidade e saúde ajudará você a superar seus concorrentes."
 stress_trait_coping_decisions.7503.d: "Concentre-se em concluir sua rotina de treinamento regular."
 stress_trait_coping_decisions.7503.success: "Você emerge vitorioso!"
 stress_trait_coping_decisions.7503.failure: "[random_knight.GetTitledFirstNameNoTooltip|l] vence o desafio."
 stress_trait_coping_decisions.7504.desc: "Às vezes é difícil encontrar motivação para manter a constância quando faço exercícios sozinho.\n\nPoderia tentar encontrar um parceiro, alguém que não só me motive nos dias ruins, mas que também seja alguém com quem eu possa me comparar ao acompanhar meu próprio progresso.\n\nQue tipo de companheiro me convém mais? Alguém que eu possa admirar, alguém que me mantenha alerta ou talvez alguém que eu sei que nunca deveria querer ser?"
 stress_trait_coping_decisions.7504.a: "Devo treinar com alguém cuja habilidade eu invejo. Como [ideal_character.GetFirstNameNoTooltip]!"
 stress_trait_coping_decisions.7504.b: "[similar_character.GetFirstNameNoTooltip] tem uma aparência física semelhante e pode seguir minha rotina."
 stress_trait_coping_decisions.7504.c: "Ver [not_ideal_character.GetFirstNameNoTooltip] lutando será motivador."
 stress_trait_coping_decisions.7504.d: "Não há necessidade de companhia durante o treinamento."
