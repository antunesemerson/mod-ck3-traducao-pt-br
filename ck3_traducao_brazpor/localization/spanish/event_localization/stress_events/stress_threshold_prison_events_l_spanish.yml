l_spanish:
 #Level 1 Stress Events
 stress_threshold_prison.1001.t: "Colapso Mental: Problemas na Prisão"
 stress_threshold_prison.1001.desc: "Estando encarcerad[ROOT.Char.Custom('ES_OA')], confinad[ROOT.Char.Custom('ES_OA')] longe de tudo o que antes era saudável e agradável na vida…"
 stress_threshold_prison.1001.desc.normal: "é difícil não cair no desespero."
 stress_threshold_prison.1001.desc.cynical: "\n\nComo [ROOT.Char.GetFaith.HighGodName] permite a existência deste lugar de desespero? Como qualquer deus poderia?"
 stress_threshold_prison.1001.desc.depressed: "costumava me incomodar, mas estranhamente, não me incomoda mais."
 stress_threshold_prison.1001.inappetetic.gain: "Não consigo mais engolir essa comida ruim."
 stress_threshold_prison.1001.inappetetic.effect: "A comida permanece intocada no meu prato."
 stress_threshold_prison.1001.cynical.gain: "[ROOT.Char.GetFaith.HighGodName] me abandonou..."
 stress_threshold_prison.1001.cynical.effect: "Isso só prova que não há [ROOT.Char.GetFaith.HighGodName]..."
 stress_threshold_prison.1001.endure: "Por que ainda não fui libertado!?"
 stress_threshold_prison.1001.depressed.gain: "Como uma vida assim vale a pena ser vivida?"
 stress_threshold_prison.1001.depressed.effect: "Não existe dor. Já estou mort[ROOT.Char.Custom('ES_OA')] por dentro."
 stress_threshold_prison.1011.t: "Colapso Mental: Fome Intensa"
 stress_threshold_prison.1011.desc: "Já se passaram dias desde que consigo engolir qualquer coisa. Minha mente ansiosa se recusa a dar ao meu corpo forças para comer o mingau seco que os guardas me trazem.\n\nEstou me sentindo mais fraco a cada dia, mas o que uma pessoa pode fazer contra o próprio corpo?"
 stress_threshold_prison.1011.a: "A fome é melhor do que essa gororoba."
 stress_threshold_prison.1011.b: "Aquí #EMP hay#! fuentes alternativas de comida…"
 stress_threshold_prison.1011.c: "Pode lutar, uma colherada de cada vez!"
 stress_threshold_prison.1012.t: "Colapso Mental: Hora da Refeição"
 stress_threshold_prison.1012.desc: "Acham que aqui não há nada para comer, que estão me deixando morrer de fome, me quebrando.\n\nNão sabem que estou melhor alimentado do que nunca…\n\nEste é um salão de banquetes, repleto de comida deliciosa e brados de celebração."
 stress_threshold_prison.1012.a: "Quente e suculento e cheio de vida."
 stress_threshold_prison.1021.t: "Colapso Mental: Jogos Cruéis"
 stress_threshold_prison.1021.desc: "Há pouco divertimento a ser encontrado aqui nesta imunda [bg_override_char.Custom('GetDungeon')|l]. Uma poça de água parada, um balde nojento, um monte de pedrinhas…\n\nA silhueta escura [fellow_prisoner.Custom('ES_DelDela')] [fellow_prisoner.GetTitledFirstName|l] na cela ao lado de repente parece um alvo excelente."
 stress_threshold_prison.1021.a: "Dez pontos se eu acertar a cabeça!"
 stress_threshold_prison.1021.b: "A dor dos outros não faz nada por mim. Mas a minha..."
 stress_threshold_prison.1021.c: "Como pude sequer pensar em pensamentos tão sombrios!?"
 stress_threshold_prison.1031.t: "Colapso Mental: Um Agarrar-se ao Poder"
 stress_threshold_prison.1031.desc: "Al encerrarme aquí, se creen que me debilito y pacifico. ¡Ja!\n\n¡Aquí, en la oscuridad, con la mente, reúno fuerzas y practico cómo despedazar a mis enemigos miembro a miembro! Una y otra vez, todos los días renacen y todos los días los destruyo como si fueran alimañas.\n\nSobre todo, a mi miserable carceler[jailer.Custom('ES_OA')], [jailer.Custom('ES_ElLa')] [jailer.GetTitledFirstName|l]… ¡[jailer.GetSheHe] sufrirá como nadie!"
 stress_threshold_prison.1031.a: "Quando eu sair... ah, eles v?o #EMP pagar#!!"
 stress_threshold_prison.1031.b: "Por que esperar? Em minha mente, eles estão à minha mercê..."
 stress_threshold_prison.1031.c: "Não... isso está errado. Eu sou melhor do que isso."
 stress_threshold_prison.1041.t: "Colapso Mental: Necessidades Esquecidas"
 stress_threshold_prison.1041.desc: "Minha rotina é sempre a mesma à medida que a manhã se transforma em dia, se transforma em noite...\n\nO cheiro nauseante de comida estragada paira pesado no ar. Quando a pilha de pratos cresceu tanto? Quantas refeições eu perdi? Está ficando cada vez mais difícil manter um senso de normalidade..."
 stress_threshold_prison.1041.depressed: "É ainda mais difícil lembrar por que devo sequer tentar."
 stress_threshold_prison.1041.inappetetic: "Qual é o sentido da comida sem liberdade?"
 stress_threshold_prison.1041.flagellant: "A dor me dará algo em que me concentrar."
 stress_threshold_prison.1041.journaller.gain: "Talvez escrever possa quebrar a monotonia..."
 stress_threshold_prison.1041.journaller.effect: "Fico feliz por ter pelo menos meu diário."
 stress_threshold_prison.1041.athletic: "Posso estar preso, mas ainda posso me exercitar..."
 stress_threshold_prison.1041.optout: "Vou sair eventualmente... certo?"
 #Level 2 Stress Events
 stress_threshold_prison.2001.t: "Quebra Mental: Escavando para Sair"
 stress_threshold_prison.2001.desc: "¿Por qué no me #EMP dejan salir#!? ¿No he pasado ya bastante tiempo #EMP confinad[ROOT.Char.Custom('ES_OA')]#! aquí, en esta fría [bg_override_char.Custom('GetDungeon')|l]?\n\nAcuno las manos ensangrentadas sobre el pecho mientras me siento apoyad[ROOT.Char.Custom('ES_OA')] contra los barrotes. Si rasco lo bastante y lo bastante fuerte, mis ataduras acabarán cediendo, ¿verdad?\n\n¿… Verdad?"
 stress_threshold_prison.2001.a: "Eu devo continuar tentando!"
 stress_threshold_prison.2001.b: "Ah, esqueça. Por que se preocupar com... qualquer coisa?"
 stress_threshold_prison.2011.t: "Colapso Mental: Meu [ROOT.Char.Custom('prison_pet')|U] e Eu"
 stress_threshold_prison.2011.desc_rat: "Há muitos dias sou visitado pelo mesmo rato. Ele me olha com compaixão e confiança, algo que não experimentei há muito tempo."
 stress_threshold_prison.2011.desc_stone: "Uma presença constante ao meu lado, uma constante em uma vida de outra forma virada de cabeça para baixo. Minha pedra confiável é minha companheira e amiga, sempre presente quando eu preciso dela."
 stress_threshold_prison.2011.desc_spoon: "Uma das poucas constantes na minha vida aqui em [bg_override_char.Custom('GetDungeon')|l], uma fonte solitária de conforto e companhia... Minha colher está sempre aqui quando preciso dela, e nunca me julga — mesmo nos meus dias mais sombrios."
 stress_threshold_prison.2011.desc_cockroach: "E lá está ela de novo, a barata, sentada em seu canto escuro. É minha companheira, minha amiga confiável, minha #EMP filho#!.\n\nEla me observa, me fazendo companhia neste lugar miserável."
 stress_threshold_prison.2011.desc_end: "\n\nNunca senti tamanha conexão com outro ser, tamanha dedicação e empatia."
 stress_threshold_prison.2011.a: "Venha aqui, pequeno [ROOT.Char.Custom('prison_pet')], e deixe-me abraçar você."
 stress_threshold_prison.2021.t: "Colapso Mental: Os Cantos Mais Sombrios"
 stress_threshold_prison.2021.desc: "Los guardias me dicen que llevo días sol[ROOT.Char.Custom('ES_OA')], pero yo sé la verdad. #EMP Noto#! cómo me vigilan, me miden, evalúan mis miedos y debilidades…\n\nCada sonido me habla de su presencia, cada sombra, de su amenaza."
 stress_threshold_prison.2021.a: "Eu devo permanecer eternamente vigilante!"
 stress_threshold_prison.2021.b: "Eu preciso me esconder em algum lugar... qualquer lugar!"
 stress_threshold_prison.2021.c: "Talvez eu possa conversar com eles?"
 #Level 3 Stress Events
 stress_threshold_prison.3001.t: "Colapso Mental: Um Amigo em Necessidade"
 stress_threshold_prison.3001.desc: "Lo que nunca me contaron de las [bg_override_char.Custom('GetDungeonPlural')|l] es ¡lo #EMP terriblemente aburridas#! que son! Menos mal que [fictional_friend.Custom('ES_ElLa')] [fictional_friend.Custom('DuchessDuke')|l] [fictional_friend.Custom('RandomExampleName')] está aquí para hacerme compañía.\n\nMi buen[fictional_friend.Custom('ES_XA')] [fictional_friend.Custom('DuchessDuke')|l] bromea como nadie y siempre me mantiene de buen humor. Y lo list[fictional_friend.Custom('ES_OA')] que es.\n\n¿Qué decís, [fictional_friend.Custom('DuchessDuke')|l]? #EMP ¡Ja!#! ¡Muy bueno!"
 stress_threshold_prison.3001.a: "Venha aqui, você, pirata!"
 stress_threshold_prison.3011.t: "Colapso Mental: Verdadeira Família"
 stress_threshold_prison.3011.desc: "Resisto uma lágrima; eu estava tão desesperadamente #EMP perdid[ROOT.Char.Custom('ES_OA')]#!, mas agora as coisas estão melhores! Minha família está aqui comigo, me mantendo em segurança.\n\nMãe e pai me abraçam com força."
 stress_threshold_prison.3011.sibling: "M [sibling.Custom('SisterBrother')], [sibling.GetFirstName], me observa."
 stress_threshold_prison.3011.sibling_multiple: "M [sibling.Custom('SisterBrother')], [sibling.GetFirstName] — Todos os meus irmãos — me observam."
 stress_threshold_prison.3011.child: "M [child.GetDaughterSon], [child.GetFirstName], segura minha mão, mantendo a luz nos meus olhos brilhando."
 stress_threshold_prison.3011.child_multiple: "Meus filhos — todos os meus muitos filhos — se reúnem ao meu redor, mantendo a luz nos meus olhos brilhando."
 stress_threshold_prison.3011.fallback: "Eles estão todos reunidos ao meu redor, mantendo a luz nos meus olhos brilhando."
 stress_threshold_prison.3011.a: "Como pude pensar que fui abandonado?"
 stress_threshold_prison.3999.t: "Colapso Mental: Liberdade"
 stress_threshold_prison.3999.desc: "No puedo soportarlo más. Tengo la mente más despejada de lo que la he tenido en semanas, y puedo decir que estoy rot[ROOT.Char.Custom('ES_OA')] en más de un sentido.\n\nMi cuerpo no es más que puro dolor, incluso me duele respirar. La [bg_override_char.Custom('GetDungeon')|l] que me rodea ya no me parece opresiva, sino reconfortante. Acogedora.\n\nSé en mi interior que estos son mis últimos hálitos."
 stress_threshold_prison.3999.a: "[ROOT.Char.GetFaith.PositiveAfterLife|U] me abrace."
