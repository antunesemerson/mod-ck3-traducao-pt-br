l_spanish:
 stress_threshold.1701.t: "Colapso Mental: Voltando para Casa"
 stress_threshold.1701.desc.intro: "Enquanto caminho pelo meu[ROOT.Char.Custom('ES_OA')] frustrado, no meu [ROOT.Char.Custom('GetCourt')|l], muitos dos meus [ROOT.Char.Custom('GetCourtierPlural')|l] não param de me importunar com algum problema que estão tendo em [capital_province.GetNameNoTooltip].\n\n"
 stress_threshold.1701.desc.lazy: "Eu simplesmente não tenho energia para me importar e quero desesperadamente voltar para a cama!"
 stress_threshold.1701.desc.wrathful: "Em dias como esses, quando suas palavras se tornam um zumbido aborrecido e monótono em meus ouvidos, sinto vontade de punir todos eles."
 stress_threshold.1701.desc.impatient: "Eu gostaria que eles se apressassem e resolvessem as coisas por si mesmos, sem que eu precise lidar pessoalmente com cada. Pequena. Coisa."
 stress_threshold.1701.desc.arrogant: "Honestamente, às vezes, parece que todo o [ROOT.Char.Custom('GetRealmOrDomicile')|l] desabaria se eu não cuidasse de tudo sozinho."
 stress_threshold.1701.desc.arbitrary: "Talvez nem seja realmente um problema. Pode ser apenas um pequeno problema local de pouca importância, talvez."
 stress_threshold.1701.desc.trusting: "Com as coisas do jeito que estão ultimamente, está difícil me concentrar, mas tenho certeza de que ninguém diria coisas tão graves se não fossem verdadeiras."
 stress_threshold.1701.desc.stubborn: "Sinceramente, isso nem parece um problema tão sério. Se eles se esforçassem mais, nem perceberiam a falha."
 stress_threshold.1701.desc.fallback: "Às vezes, ser eu mesm[ROOT.Char.Custom('ES_OA')] é mentalmente exaustivo."
 stress_threshold.1701.desc.rump: "\n\nAlgo na discussão soa... Familiar. E-e esse plano não foi #EMP minha#! ideia? Isso é #EMP minha#! culpa?"
 stress_threshold.1701.a.rakish.gain: "Ao inferno com isso! Vou para a casa de prazer."
 stress_threshold.1701.a.rakish.effect: "$stress_threshold.1701.a.rakish.gain$"
 stress_threshold.1701.b.irritable.gain: "Eu juro por [ROOT.GetCharacter.GetFaith.HighGodName], vou socar alguém."
 stress_threshold.1701.b.irritable.effect: "$stress_threshold.1701.b.irritable.gain$"
 stress_threshold.1701.c.flagellant.gain: "Eu me flagelarei pelos meus pecados!"
 stress_threshold.1701.c.flagellant.effect: "$stress_threshold.1701.c.flagellant.gain$"
 stress_threshold.1701.d.profligate.gain: "Talvez uma capa nova me faça sentir melhor..."
 stress_threshold.1701.d.profligate.effect: "$stress_threshold.1701.d.profligate.gain$"
 stress_threshold.1701.g.journaller.gain: "Devo me livrar desses pensamentos através da escrita."
 stress_threshold.1701.g.journaller.effect: "$stress_threshold.1701.g.journaller.gain$"
 stress_threshold.1701.h.confider.gain: "Talvez [friend.GetFirstNameNoTooltip] me apoie?"
 stress_threshold.1701.h.confider.effect: "[friend.GetFirstNameNoTooltip] certamente me apoiará!"
 stress_threshold.1701.i.drunkard.gain: "Uma bebida forte resolve a maioria dos problemas..."
 stress_threshold.1701.i.drunkard.effect: "$stress_threshold.1701.i.drunkard.gain$"
 stress_threshold.1701.j.hashishiyah.gain: "O haxixe acalmará meus nervos aflitos..."
 stress_threshold.1701.j.hashishiyah.effect: "$stress_threshold.1701.j.hashishiyah.gain$"
 #NOTE: Discuss w/ Sean?
 stress_threshold.1701.k: "São apenas conversas vazias, nada a ver comigo."
 stress_threshold.1711.t: "Colapso Mental: Muito Ocupado"
 stress_threshold.1711.desc.intro: "Por [ROOT.GetCharacter.GetFaith.FateGodName], meus [ROOT.Char.Custom('GetCourtierPlural')|l] têm sido implacáveis em seus pedidos ultimamente. Este trabalho parece #EMP interminável#!. Mais um se aproxima, evidentemente aflito por algum assunto trivial.\n\n"
 stress_threshold.1711.desc.greedy: "\"Você tem algum imposto para mim? Não? Então não me importo muito.\""
 stress_threshold.1711.desc.diligent: "\"Lidarei com seus problemas daqui a algumas semanas, mas você não é importante o suficiente para um atendimento mais rápido.\""
 stress_threshold.1711.desc.patient: "$stress_threshold.1711.desc.diligent$"
 stress_threshold.1711.desc.deceitful: "\"Vocês não parecem um dos meus súditos? Vão incomodar outra[ROOT.Char.Custom('ES_OA')]\"."
 stress_threshold.1711.desc.ambitious: "\"Você acha que pode arrancar um selo real de mim, burguês? Eu sou um[ROOT.Char.Custom('ES_XA')] [ROOT.GetCharacter.GetTitleAsNameNoTooltip|l]!\""
 stress_threshold.1711.desc.just: "\"Se você veio em busca de justiça, saiba que eu não anulo as decisões dos meus juízes por uma moeda insignificante.\""
 stress_threshold.1711.desc.zealous: "\"Eu consigo sentir o cheiro do pecado em você, burguês!\""
 stress_threshold.1711.desc.fallback: "\"Por piedade de [ROOT.GetCharacter.GetFaith.HealthGodName], outro não!\""
 stress_threshold.1711.desc.rump: "\n\n[courtier.GetFirstName] fica boquiabert[courtier.Custom('ES_OA')], piscando rapidamente em choque. Foi algo que eu disse?"
 stress_threshold.1711.a.reclusive.gain: "Só mais uma. Depois quero ficar só."
 stress_threshold.1711.a.reclusive.effect: "$stress_threshold.1711.a.reclusive.gain$"
 stress_threshold.1711.b.flagellant.gain: "Flagelar-me dissipará o pecado..."
 stress_threshold.1711.b.flagellant.effect: "$stress_threshold.1711.b.flagellant.gain$"
 stress_threshold.1711.c.profligate.gain: "$stress_threshold.1701.d.profligate.gain$"
 stress_threshold.1711.c.profligate.effect: "$stress_threshold.1701.d.profligate.gain$"
 stress_threshold.1711.d.improvident.gain: "Sirva-se do tesouro, burguês. Você precisa disso."
 stress_threshold.1711.d.improvident.effect: "$stress_threshold.1711.d.improvident.gain$"
 stress_threshold.1711.e.journaller.gain: "Buscarei consolo em meu diário."
 stress_threshold.1711.e.journaller.effect: "$stress_threshold.1711.e.journaller.gain$"
 stress_threshold.1711.f.athletic.gain: "Vou dar um passeio. Agora."
 stress_threshold.1711.f.athletic.effect: "$stress_threshold.1711.f.athletic.gain$"
 stress_threshold.1711.g.drunkard.gain: "Bebida! Isso é demais para uma mente sóbria."
 stress_threshold.1711.g.drunkard.effect: "$stress_threshold.1711.g.drunkard.gain$"
 stress_threshold.1711.h.hashishiyah.gain: "Haxixe! Isso é demais para uma mente sóbria."
 stress_threshold.1711.h.hashishiyah.effect: "$stress_threshold.1711.h.hashishiyah.gain$"
 stress_threshold.1711.i: "Sou [ROOT.GetCharacter.GetTitleAsNameNoTooltip], eu consigo fazer isso!"
 stress_threshold.1721.t: "Colapso Mental: Impostor!"
 stress_threshold.1721.desc.intro: "Ultimamente, sinto como se eu não fosse dign[ROOT.Char.Custom('ES_OA')] de ser [ROOT.Char.GetTitleAsNameNoTooltip|l]. Será que outros duvidam de si mesmos como eu?\n\nTento ser bom[ROOT.Char.Custom('ES_OA')],"
 stress_threshold.1721.desc.chaste: "cast[ROOT.Char.Custom('ES_OA')], mas parece que estou sempre sendo tentad[ROOT.Char.Custom('ES_OA')] pelos prazeres da carne. Alguém como eu deveria ser capaz de lutar contra esses impulsos libidinosos."
 stress_threshold.1721.desc.temperate: "moderad[ROOT.Char.Custom('ES_OA')], mas parece que estou salivando o tempo todo. Tudo me dá fome. Por que estou sempre tão malditamente, desumanamente famint[ROOT.Char.Custom('ES_OA')]?"
 stress_threshold.1721.desc.generous: "generos[ROOT.Char.Custom('ES_OA')], mas não importa quanto eu dê, sempre há alguém com outra tigela de esmolas estendida. Os outros não parecem ter esses problemas."
 stress_threshold.1721.desc.calm: "calm[ROOT.Char.Custom('ES_OA')] mas #EMP todos#! meus [ROOT.Char.Custom('GetCourtierPlural')|l] parecem decididos a me deixar irritado. Pequenas crises dominam meus dias, e sinto que estou desmoronando como ninguém mais."
 stress_threshold.1721.desc.humble: "humilde, mas parece que todas as minhas ações exalam orgulho. Outros parecem viver tão modestamente, mas eu pareço exibir minha magnificência a cada oportunidade, e não suporto isso."
 stress_threshold.1721.desc.honest: "honest[ROOT.Char.Custom('ES_OA')], mas em cada decisão vejo omissões e pequenos erros distorcendo meu sentido. Os outros parecem tão diligentes e francos, então por que fui amaldiçoad[ROOT.Char.Custom('ES_OA')] com esta natureza desonesta?"
 stress_threshold.1721.desc.craven: "nobre, mas sou simplesmente covarde demais para agir tão bravamente quanto os outros, e parece que meus [ROOT.Char.Custom('GetCourtierPlural')|l] percebem isso constantemente."
 stress_threshold.1721.desc.content: "nobre, satisfeit[ROOT.Char.Custom('ES_OA')] com o que tenho e livre do peso de uma ambição desnecessária, mas sinto que ajo com muito mais inveja e orgulho do que os outros."
 stress_threshold.1721.desc.cynical_no_collide: "racional, mas meus [ROOT.Char.Custom('GetCourtierPlural')|l] sempre parecem adorar as filosofias dos outros e nunca as minhas reflexões."
 stress_threshold.1721.desc.paranoid: "cautelos[ROOT.Char.Custom('ES_OA')], mas não consigo prever tudo. Sempre há mais traidores para encontrar, mais conspirações ocultas. Os outros não parecem lidar com tanta traição, e só posso culpar a mim mesm[ROOT.Char.Custom('ES_OA')] por inspirá-la."
 stress_threshold.1721.desc.callous: "realista, mas meus [ROOT.Char.Custom('GetCourtierPlural')|l] interpretam tudo o que faço como algo mal-intencionado, reclamando sobre trivialidades. Outros não parecem ter tanta dificuldade em controlar seus subordinados."
 stress_threshold.1721.desc.compassionate: "compassiv[ROOT.Char.Custom('ES_OA')], mas os outros parecem ser muito mais amados do que eu. Simplesmente não consigo me conectar com as pessoas tão bem quanto gostaria."
 stress_threshold.1721.desc.fickle: "flexível, mas não importa quantas vezes eu mude de ideia, não importa quanta informação nova eu receba, outros parecem ser melhores em se adaptar do que eu."
 stress_threshold.1721.desc.vengeful: "just[ROOT.Char.Custom('ES_OA')], vingando afrontas e aplicando punições, mas os outros sempre parecem entregar a vingança muito mais depressa."
 stress_threshold.1721.desc.forgiving: "perdoador, mas ainda assim meus [ROOT.Char.Custom('GetCourtierPlural')|l] têm medo de vir até mim com seus problemas. Outros parecem ter centenas de confidentes, e eu não sei como posso fazer meu povo confiar em mim assim."
 stress_threshold.1721.desc.fallback: "nobre, mas estou repleto de imperfeições[ROOT.Char.Custom('ES_OA')] de imperfeições."
 stress_threshold.1721.desc.rump: "\n\nMaldito seja este universo por colocar responsabilidades tão pesadas em um[ROOT.Char.Custom('ES_XA')] infeliz como eu!"
 stress_threshold.1721.a.reclusive.gain: "Preciso ficar sozinho para refletir sobre isso."
 stress_threshold.1721.a.reclusive.effect: "$stress_threshold.1721.a.reclusive.gain$"
 stress_threshold.1721.b.irritable.gain: "$stress_threshold.1701.b.irritable.gain$"
 stress_threshold.1721.b.irritable.effect: "$stress_threshold.1701.b.irritable.gain$"
 stress_threshold.1721.c.flagellant.gain: "$stress_threshold.1701.c.flagellant.gain$"
 stress_threshold.1721.c.flagellant.effect: "$stress_threshold.1701.c.flagellant.gain$"
 stress_threshold.1721.d.profligate.gain: "$stress_threshold.1701.d.profligate.gain$"
 stress_threshold.1721.d.profligate.effect: "$stress_threshold.1701.d.profligate.gain$"
 stress_threshold.1721.e.improvident.gain: "A caridade me torna uma pessoa melhor, certo?"
 stress_threshold.1721.e.improvident.effect: "$stress_threshold.1721.e.improvident.gain$"
 stress_threshold.1721.f.contrite.gain: "Devo confessar meus pecados publicamente."
 stress_threshold.1721.f.contrite.effect: "$stress_threshold.1721.f.contrite.gain$"
 #NOTE: Discuss w/ Sean?
 stress_threshold.1721.g.comfort_eater.gain: "Vamos banquetear, banquetear até me sentir melhor!"
 stress_threshold.1721.g.comfort_eater.effect: "Façam outro banquete! E outro, e outro!"
 stress_threshold.1721.h.inappetetic.gain: "Diga ao cozinheiro para parar de preparar meus jantares."
 stress_threshold.1721.h.inappetetic.effect: "$stress_threshold.1721.h.inappetetic.gain$"
 stress_threshold.1721.i.journaller.gain: "$stress_threshold.1711.e.journaller.gain$"
 stress_threshold.1721.i.journaller.effect: "$stress_threshold.1711.e.journaller.gain$"
 stress_threshold.1721.j.confider.gain: "$stress_threshold.1701.h.confider.gain$"
 stress_threshold.1721.j.confider.effect: "$stress_threshold.1701.h.confider.effect$"
 stress_threshold.1721.k.drunkard.gain: "$stress_threshold.1701.i.drunkard.gain$"
 stress_threshold.1721.k.drunkard.effect: "$stress_threshold.1701.i.drunkard.gain$"
 stress_threshold.1721.l.hashishiyah.gain: "$stress_threshold.1701.j.hashishiyah.gain$"
 stress_threshold.1721.l.hashishiyah.effect: "$stress_threshold.1701.j.hashishiyah.gain$"
 stress_threshold.1721.m: "Sou tão bom[ROOT.Char.Custom('ES_OA')] quanto os demais!"
 stress_threshold.1721.n: "Talvez eu esteja desejando a carne mais rara..."
 stress_threshold.1731.t: "Colapso Mental: Sem tempo para mim"
 stress_threshold.1731.desc.intro: "Tem sido um trabalho tão exaustivo ultimamente. É como se eu não tivesse um único [ROOT.Char.Custom('GetCourtier')|l] que pudesse limpar a própria sujeira sem minha instrução expressa e detalhada!\n\nNo meio do planejamento de uma pequena escapada"
 stress_threshold.1731.desc.lustful: "para um bordel local, onde pretendo permanecer até ficar irritado e dolorido,"
 stress_threshold.1731.desc.gluttonous: "para uma taverna famosa, onde experimentarei uma culinária estrangeira exótica,"
 stress_threshold.1731.desc.brave: "para um torneio local com uma reputação particular de ferocidade,"
 stress_threshold.1731.desc.shy: "para um lugar local conhecido por sua serenidade,"
 stress_threshold.1731.desc.gregarious: "para confraternizar com alguns tipos locais amigáveis,"
 stress_threshold.1731.desc.sadistic: "para uma prisão local cheia de criminosos e camponeses,"
 stress_threshold.1731.desc.fallback: "para longe das responsabilidades de [ROOT.Char.Custom('GetCourt')|l],"
 stress_threshold.1731.desc.rump: "um servo vem correndo até mim, balbuciando sobre alguma nova catástrofe trivial."
 stress_threshold.1731.a.rakish.gain: "$stress_threshold.1701.a.rakish.gain$"
 stress_threshold.1731.a.rakish.effect: "$stress_threshold.1701.a.rakish.gain$"
 stress_threshold.1731.b.reclusive.gain: "Pode esperar, tudo pode esperar."
 stress_threshold.1731.b.reclusive.effect: "$stress_threshold.1731.b.reclusive.gain$"
 stress_threshold.1731.c.profligate.gain: "Vou apenas parar para comprar algumas coisas no caminho..."
 stress_threshold.1731.c.profligate.effect: "$stress_threshold.1731.c.profligate.gain$"
 stress_threshold.1731.d.comfort_eater.gain: "Vou pensar em voltar cedo durante o almoço."
 stress_threshold.1731.d.comfort_eater.effect: "$stress_threshold.1731.d.comfort_eater.gain$"
 stress_threshold.1731.e.journaller.gain: "$stress_threshold.1711.e.journaller.gain$"
 stress_threshold.1731.e.journaller.effect: "$stress_threshold.1711.e.journaller.gain$"
 stress_threshold.1731.f.confider.gain: "Vou conversar com [friend.GetFirstNameNoTooltip] sobre isso no caminho."
 stress_threshold.1731.f.confider.effect: "$stress_threshold.1731.f.confider.gain$"
 stress_threshold.1731.g.athletic.gain: "Talvez eu vá a pé para o meu refúgio..."
 stress_threshold.1731.g.athletic.effect: "$stress_threshold.1731.g.athletic.gain$"
 stress_threshold.1731.h.drunkard.gain: "Parece que vou beber durante toda a viagem."
 stress_threshold.1731.h.drunkard.effect: "$stress_threshold.1731.h.drunkard.gain$"
 stress_threshold.1731.i.hashishiyah.gain: "Nós temos biscoitos de haxixe para a viagem?"
 stress_threshold.1731.i.hashishiyah.effect: "$stress_threshold.1731.i.hashishiyah.gain$"
 stress_threshold.1731.g: "#EMP Tudo bem#!, vou cancelar meus planos."
 stress_threshold.2301.t: "Colapso Mental: Necessidades Crescentes"
 stress_threshold.2301.desc.intro: "Cada dia parece escorregar de minhas mãos recentemente, um trem interminável de decisões difíceis. Meu peito se aperta. Meus dedos coçam e formigam nas pontas, meus olhos parecem pequenos demais para o meu crânio.\n\nEu preciso me afastar, só por um tempo, eu preciso de"
 stress_threshold.2301.desc.lustful: "sentir o calor de outro em meus braços, apenas para me conectar um pouco com alguém."
 stress_threshold.2301.desc.gluttonous: "comer algo, qualquer coisa, para saciar esse vazio de significado."
 stress_threshold.2301.desc.greedy: "sentir a firmeza reconfortante de moedas frias entre meus dedos, algo confiável, algo que faça sentido."
 stress_threshold.2301.desc.gregarious: "conversar com alguém, qualquer pessoa, realmente #EMP falar#! e sentir que eles me entendem."
 stress_threshold.2301.desc.fallback: "simplesmente respirar sem me sentir esmagad[ROOT.Char.Custom('ES_OA')]; sorrir sem me sentir vaz[ROOT.Char.Custom('ES_OA')]."
 stress_threshold.2301.desc.rump: "\n\nIsso é pedir demais?"
 stress_threshold.2301.a.rakish.gain: "$stress_threshold.1701.a.rakish.gain$"
 stress_threshold.2301.a.rakish.effect: "$stress_threshold.1701.a.rakish.gain$"
 stress_threshold.2301.b.profligate.gain: "Talvez... Talvez uma nova cama? Ou três?"
 stress_threshold.2301.b.profligate.effect: "$stress_threshold.2301.b.profligate.gain$"
 stress_threshold.2301.c.comfort_eater.gain: "$stress_threshold.1721.g.comfort_eater.gain$"
 stress_threshold.2301.c.comfort_eater.effect: "$stress_threshold.1721.g.comfort_eater.effect$"
 stress_threshold.2301.d.drunkard.gain: "$stress_threshold.1701.i.drunkard.gain$"
 stress_threshold.2301.d.drunkard.effect: "$stress_threshold.1701.i.drunkard.gain$"
 stress_threshold.2301.e.hashishiyah.gain: "$stress_threshold.1701.j.hashishiyah.gain$"
 stress_threshold.2301.e.hashishiyah.effect: "$stress_threshold.1701.j.hashishiyah.gain$"
 stress_threshold.2301.f: "Eu odeio isso."
 stress_threshold.2311.t: "Colapso Mental: Assombrado pelo Passado"
 stress_threshold.2311.desc.intro: "Me sinto [Select_CString( ROOT.Char.IsFemale, 'sola y taciturna', 'solo y taciturno' )], com o coração pesado pelas lembranças, remoendo coisas que fiz há anos e anos."
 stress_threshold.2311.desc.generous: "Fui realmente um[ROOT.Char.Custom('ES_XA')] [ROOT.GetCharacter.GetTitleAsNameNoTooltip] generos[ROOT.Char.Custom('ES_OA')]? Eu realmente ajudei as pessoas?"
 stress_threshold.2311.desc.diligent: "Será que eu trabalhei o suficiente naquela época? Meu esforço evitou problemas ou os causou?"
 stress_threshold.2311.desc.wrathful: "Com que frequência eu me irritei com raiva? Minha ira foi bem direcionada ou mal direcionada?"
 stress_threshold.2311.desc.patient: "Terei sido cauteloso demais[ROOT.Char.Custom('ES_OA')]? Minha paciência não passou de pura indecisão glorificada?"
 stress_threshold.2311.desc.arrogant: "Meu orgulho me trouxe até aqui? Existe uma queda proporcional esperando para me condenar?"
 stress_threshold.2311.desc.humble: "Fui mesmo bom/boa o bastante? Não teria sido mais apropriad[ROOT.Char.Custom('ES_OA')] outr[ROOT.Char.Custom('ES_OA')] [ROOT.GetCharacter.GetTitleAsNameNoTooltip]?"
 stress_threshold.2311.desc.deceitful: "Será que estou enredad[ROOT.Char.Custom('ES_OA')] demais em minhas próprias mentiras? Achei que era mais espert[ROOT.Char.Custom('ES_OA')], mas será que meus enganos enfim me alcançaram?"
 stress_threshold.2311.desc.zealous: "Tenho mesmo a visão de [ROOT.GetCharacter.GetFaith.HighGodName]? Minha fé tem sido uma tocha na escuridão, ou uma pira para a minha própria tolice?"
 stress_threshold.2311.desc.fallback: "Eu estava certo? Eu estava errado?"
 stress_threshold.2311.desc.rump: "Será que já fiz a coisa certa alguma vez?\n\nMinha cabeça pulsa. Por que [ROOT.GetCharacter.GetFaith.HighGodName] me colocou neste caminho se sabia que isso me faria tão miserável?"
 stress_threshold.2311.a.rakish.gain: "$stress_threshold.1701.a.rakish.gain$"
 stress_threshold.2311.a.rakish.effect: "$stress_threshold.1701.a.rakish.gain$"
 stress_threshold.2311.b.irritable.gain: "$stress_threshold.1701.b.irritable.gain$"
 stress_threshold.2311.b.irritable.effect: "$stress_threshold.1701.b.irritable.gain$"
 stress_threshold.2311.c.flagellant.gain: "$stress_threshold.1701.c.flagellant.gain$"
 stress_threshold.2311.c.flagellant.effect: "$stress_threshold.1701.c.flagellant.gain$"
 stress_threshold.2311.d.improvident.gain: "Talvez uma doação de caridade acalme minha mente..."
 stress_threshold.2311.d.improvident.effect: "$stress_threshold.2311.d.improvident.gain$"
 stress_threshold.2311.e.contrite.gain: "$stress_threshold.1721.f.contrite.gain$"
 stress_threshold.2311.e.contrite.effect: "$stress_threshold.1721.f.contrite.gain$"
 stress_threshold.2311.f.inappetetic.gain: "Não consigo comer em um momento como esse."
 stress_threshold.2311.f.inappetetic.effect: "$stress_threshold.2311.f.inappetetic.gain$"
 stress_threshold.2311.g.journaller.gain: "$stress_threshold.1711.e.journaller.gain$"
 stress_threshold.2311.g.journaller.effect: "$stress_threshold.1711.e.journaller.gain$"
 stress_threshold.2311.h.confider.gain: "$stress_threshold.1701.h.confider.gain$"
 stress_threshold.2311.h.confider.effect: "$stress_threshold.1701.h.confider.effect$"
 stress_threshold.2311.i.athletic.gain: "$stress_threshold.1711.f.athletic.gain$"
 stress_threshold.2311.i.athletic.effect: "$stress_threshold.1711.f.athletic.gain$"
 stress_threshold.2311.j.drunkard.gain: "$stress_threshold.1701.i.drunkard.gain$"
 stress_threshold.2311.j.drunkard.effect: "$stress_threshold.1701.i.drunkard.gain$"
 stress_threshold.2311.k.hashishiyah.gain: "$stress_threshold.1701.j.hashishiyah.gain$"
 stress_threshold.2311.k.hashishiyah.effect: "$stress_threshold.1701.j.hashishiyah.gain$"
 stress_threshold.2311.l: "Não posso cometer erros, sou um[ROOT.Char.Custom('ES_XA')] [ROOT.GetCharacter.GetTitleAsNameNoTooltip]!"
 stress_threshold.2321.t: "Colapso Mental: Confuso com [ROOT.Char.Custom('GetCourt')|l]"
 stress_threshold.2321.desc.intro: "Tudo o que faço, as pessoas se aproveitam!"
 stress_threshold.2321.desc.impatient: "Minha vida é uma constante procissão de explicações longas e confusas para as quais não tenho tempo!"
 stress_threshold.2321.desc.honest: "Minha [ROOT.Char.Custom('GetCourt')|l] mente para minha cara, o dia todo, todos os dias, plebeus e nobres igualmente!"
 stress_threshold.2321.desc.trusting: "$stress_threshold.2321.desc.honest$"
 stress_threshold.2321.desc.compassionate: "Meu [ROOT.Char.Custom('GetCourtier')|l] explora minha compaixão constantemente, ansioso para explorar cada última gota de empatia no meu fígado!"
 stress_threshold.2321.desc.forgiving: "Minha misericórdia é testada diariamente, às vezes duas vezes por dia, por uma legião de ingratos fedorentos!"
 stress_threshold.2321.desc.fallback: "Minha [ROOT.Char.Custom('GetCourt')|l] está cheia de parasitas! Vampiros! Sanguessugas!"
 stress_threshold.2321.desc.rump: "Isso me faz ferver de raiva!\n\nEu simplesmente não aguento mais! Se eu não fizer algo a respeito, vou gritar!"
 stress_threshold.2321.a.irritable.gain: "E talvez eu vá gritar de qualquer maneira!"
