 stress_threshold.2351.t: "Colapso Mental: Comentários Impróprios"
 stress_threshold.2351.desc.intro: "Eu me sento, prestando pouca atenção, enquanto um camponês local termina seu relato de desgraça. Francamente, eu mal registrei o que estavam falando. Minha mente está cheia até transbordar com meus #EMP próprios#! problemas.\n\n"
 stress_threshold.2351.desc.content: "\"Você não pode simplesmente ser #EMP contente#! com o que sobrou?\""
 stress_threshold.2351.desc.cynical: "\"Pfft, como posso saber que você não está #EMP mentindo#!?\""
 stress_threshold.2351.desc.paranoid: "\"Uma história #EMP provável#!. Você provavelmente é só um espião astuto!\""
 stress_threshold.2351.desc.sadistic: "\"Sabe, acho que há um lugar #EMP perfeito#! no minha [ROOT.Char.Custom('GetDungeon')|l] para você.\""
 stress_threshold.2351.desc.vengeful: "\"Tenho certeza de que você mereceu #EMP tudo#! o que aconteceu com você.\""
 stress_threshold.2351.desc.fallback: "\"Por [ROOT.GetCharacter.GetFaith.HighGodName], você #EMP fede#!.\""
 stress_threshold.2351.desc.rump: "Eu respondo, sem pensar.\n\nO [ROOT.Char.Custom('GetRoom')|l] fica completamente em silêncio, todos os olhares voltados para o camponês perplexo e para mim. Evidentemente, essa não era a resposta que esperavam."
 stress_threshold.2351.a.reclusive.gain: "#EMP Saiam#!, todos vocês!"
 stress_threshold.2351.a.reclusive.effect: "$stress_threshold.2351.a.reclusive.gain$"
 stress_threshold.2351.b.irritable.gain: "O que vocês querem de mim, seus bebedores de leite?"
 stress_threshold.2351.b.irritable.effect: "$stress_threshold.2351.b.irritable.gain$"
 stress_threshold.2351.c.profligate.gain: "$stress_threshold.1701.d.profligate.gain$"
 stress_threshold.2351.c.profligate.effect: "$stress_threshold.1701.d.profligate.gain$"
 stress_threshold.2351.d.improvident.gain: "$stress_threshold.1711.d.improvident.gain$"
 stress_threshold.2351.d.improvident.effect: "$stress_threshold.1711.d.improvident.gain$"
 stress_threshold.2351.e.inappetetic.gain: "$stress_threshold.1721.h.inappetetic.gain$"
 stress_threshold.2351.e.inappetetic.effect: "$stress_threshold.1721.h.inappetetic.gain$"
 stress_threshold.2351.f.journaller.gain: "Talvez eu desenhe em meu diário enquanto ouço..."
 stress_threshold.2351.f.journaller.effect: "$stress_threshold.2351.f.journaller.gain$"
 stress_threshold.2351.g.drunkard.gain: "$stress_threshold.1701.i.drunkard.gain$"
 stress_threshold.2351.g.drunkard.effect: "$stress_threshold.1701.i.drunkard.gain$"
 stress_threshold.2351.h.hashishiyah.gain: "$stress_threshold.1701.j.hashishiyah.gain$"
 stress_threshold.2351.h.hashishiyah.effect: "$stress_threshold.1701.j.hashishiyah.gain$"
 stress_threshold.2351.i: "Peço desculpas, agora, por favor repita sua história..."
 stress_threshold.3401.t: "Colapso Mental: Atirando no Mensageiro"
 stress_threshold.3401.desc.intro: "Minha cabeça parece uma tempestade presa em um ovo. Eu me contorço, tentando me acomodar em meu trono, enquanto um mensageiro me conta uma história irrelevante sobre piratas, ou bandidos, ou saqueadores, ou algum tipo de bobagem camponesa.\n\nA pressão em meu crânio aumenta, exigindo uma liberação em algum lugar, e, quase involuntariamente, minha boca se abre para falar."
 stress_threshold.3401.desc.vengeful: "\"Você não jogou um ovo em mim alguns anos atrás?"
 stress_threshold.3401.desc.wrathful: "\"Como você se atreve a me trazer trivialidades?!"
 stress_threshold.3401.desc.impatient: "\"Desembucha, imbecil! Ah, muito lento!"
 stress_threshold.3401.desc.arbitrary: "\"Pelas [ROOT.GetCharacter.GetFaith.HighGodName], acho seu cheiro bastante potente."
 stress_threshold.3401.desc.paranoid: "\"Acha que vou cair nessas mentiras óbvias? Você é claramente algum assassino contratado!"
 stress_threshold.3401.desc.callous: "\"Não me importo com esses problemas insignificantes."
 stress_threshold.3401.desc.sadistic: "\"Seu serviço medíocre dá um mau exemplo."
 stress_threshold.3401.desc.fallback: "$stress_threshold.3401.desc.wrathful$"
 stress_threshold.3401.desc.rump: "#EMP Decapitem esse tolo!#!\"\n\nA corte ao nosso redor fica mortalmente em silêncio."
 stress_threshold.3401.a.reclusive.gain: "E depois todos vocês saiam da minha vista!"
 stress_threshold.3401.a.reclusive.effect: "$stress_threshold.3401.a.reclusive.gain$"
 stress_threshold.3401.a.reclusive.list: "Cada [character|lE] fora de sua casa imediata"
 stress_threshold.3401.b.irritable.gain: "E decapitem qualquer outra pessoa que tente falar comigo!"
 stress_threshold.3401.b.irritable.effect: "$stress_threshold.3401.b.irritable.gain$"
 stress_threshold.3401.c.journaller.gain: "Esprema o cadáver! #EMP Usarei os fluidos como tinta!#!"
 stress_threshold.3401.c.journaller.effect: "$stress_threshold.3401.c.journaller.gain$"
 stress_threshold.3401.d.confider.gain: "$stress_threshold.1701.h.confider.gain$"
 stress_threshold.3401.d.confider.effect: "$stress_threshold.1701.h.confider.effect$"
 stress_threshold.3401.e.drunkard.gain: "E tragam-me uma bebida! E uma de reserva!"
 stress_threshold.3401.e.drunkard.effect: "$stress_threshold.3401.e.drunkard.gain$"
 stress_threshold.3401.f.hashishiyah.gain: "E tragam alguns bolos de haxixe!"
 stress_threshold.3401.f.hashishiyah.effect: "$stress_threshold.3401.f.hashishiyah.gain$"
 stress_threshold.3401.g: "E tragam-me a cabeça para servir de apoio para os pés!"
 stress_threshold.3411.t: "Colapso Mental: Sou Indigno!"
 stress_threshold.3411.desc.intro: "Eu não consigo fazer isso. Simplesmente não consigo mais ser [ROOT.GetCharacter.GetTitleAsNameNoTooltip|l]! Como alguém consegue #EMP lidar#! com essa massa fervilhante de estresse? Não importa o quanto"
 stress_threshold.3411.desc.generous: "quanto eu dê, o quão generos[ROOT.Char.Custom('ES_OA')] que eu seja com meus súditos, alguns parecem estar sempre pobres, e outros parecem sempre me odiar."
 stress_threshold.3411.desc.diligent: "por mais que eu trabalhe, quantas noites sem dormir eu me afaste da cama, os problemas do reino sempre parecem se multiplicar e se agravar."
 stress_threshold.3411.desc.patient: "pacientemente eu ouço problema após problema, simplesmente nunca pareço ter soluções boas o suficiente."
 stress_threshold.3411.desc.humble: "por pouco que eu deixe meu orgulho se interpor no meu dever, ainda sinto como se estivesse sendo consumid[ROOT.Char.Custom('ES_OA')] viv[ROOT.Char.Custom('ES_OA')] pela minha própria arrogância."
 stress_threshold.3411.desc.shy: "por mais esforço que eu faça para realizar a corte, a visão de cortesãos amontoados me causa apoplexia de medo."
 stress_threshold.3411.desc.just: "just[ROOT.Char.Custom('ES_OA')] que eu seja, por mais fervorosamente que eu persiga o império da lei, o crime ainda viceja em cada canto do meu domínio."
 stress_threshold.3411.desc.trusting: "por muitas vezes que eu perdoe pessoas, faça empréstimos a elas ou lhes dê o benefício da dúvida, algo catastrófico e imprevisível sempre parece acontecer."
 stress_threshold.3411.desc.compassionate: "por mais que eu tente realizar a corte, ouvir o povo comum da terra, sempre há centenas esperando para pedir minha ajuda."
 stress_threshold.3411.desc.forgiving: "$stress_threshold.3411.desc.trusting$"
 stress_threshold.3411.desc.fallback: "por mais que eu tente, tudo o que faço parece ser um erro, cada conquista se desfaz em minhas mãos como cinzas."
 stress_threshold.3411.desc.rump: "\n\nEstá claro que #EMP nunca#! serei bom o bastante[ROOT.Char.Custom('ES_OA')] para governar. Algo #EMP tiene#! tem que ceder."
 stress_threshold.3411.a.reclusive.gain: "NÃO ME OLHEM!"
 stress_threshold.3411.a.reclusive.effect: "$stress_threshold.2351.a.reclusive.gain$"
 stress_threshold.3411.b.flagellant.gain: "Minha carne para o perdão!"
 stress_threshold.3411.b.flagellant.effect: "$stress_threshold.3411.b.flagellant.gain$"
 stress_threshold.3411.c.profligate.gain: "Grandes monumentos enganarão meus súditos..."
 stress_threshold.3411.c.profligate.effect: "$stress_threshold.3411.c.profligate.gain$"
 stress_threshold.3411.d.improvident.gain: "E se o tesouro pertencesse a todos?"
 stress_threshold.3411.d.improvident.effect: "$stress_threshold.3411.d.improvident.gain$"
 stress_threshold.3411.e.contrite.gain: "O mundo #EMP deve#! saber da minha inadequação!"
 stress_threshold.3411.e.contrite.effect: "$stress_threshold.3411.e.contrite.gain$"
 stress_threshold.3411.f.inappetetic.gain: "Esvaziem as despensas! Eu não mereço comida tentadora."
 stress_threshold.3411.f.inappetetic.effect: "$stress_threshold.3411.f.inappetetic.gain$"
 stress_threshold.3411.f.inappetetic.list: "Cada [courtier|lE] e [guest|lE] passaram fome ao seu lado"
 stress_threshold.3411.g.journaller.gain: "Meus velhos diários! Preciso estudar minhas falhas..."
 stress_threshold.3411.g.journaller.effect: "$stress_threshold.3411.g.journaller.gain$"
 stress_threshold.3411.h.confider.gain: "$stress_threshold.1701.h.confider.gain$"
 stress_threshold.3411.h.confider.effect: "$stress_threshold.1701.h.confider.effect$"
 stress_threshold.3411.i.athletic.gain: "Eu não posso fugir dessa responsabilidade, mas posso tentar."
 stress_threshold.3411.i.athletic.effect: "$stress_threshold.3411.i.athletic.gain$"
 stress_threshold.3411.j.drunkard.gain: "Tragam-me um barril de bebida para afogar minhas mágoas."
 stress_threshold.3411.j.drunkard.effect: "$stress_threshold.3411.j.drunkard.gain$"
 stress_threshold.3411.k.hashishiyah.gain: "Eu quero hashish suficiente para aniquilar essa vergonha."
 stress_threshold.3411.k.hashishiyah.effect: "$stress_threshold.3411.k.hashishiyah.gain$"
 stress_threshold.3411.l: "É isso! Eu abdico!"
 stress_threshold.3411.l.list: "Cada [vassal|lE] que não te odeiam"
 stress_threshold.3411.l.tt: "Todos os [claims|lE] contra seus [titles|lE] passam a estar [Concept( 'pressed', 'reinvindicados' )|E]"
 stress_threshold.3421.t: "Crise Mental: Domínio da Devassidão"
 stress_threshold.3421.desc.intro: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U]\", suplica o servo, \"Não podeis fazer algo? [burning_holding.GetNameNoTier] está queimando! Deveis enviar ajuda!\".\n\n"
 stress_threshold.3421.desc.lustful: "Eu me estico, minhas mãos entrando em contato com carne jovem e bela sem esforço. Um coro de gemidos atrás de mim parece não se importar com o visitante."
 #Go full Denethor:
 stress_threshold.3421.desc.gluttonous: "Continuo a enfiar comida na minha boca, só parando meu banquete individual após vários minutos constrangedores, quando fica claro que o mensageiro não sairá sem uma ordem explícita."
 stress_threshold.3421.desc.greedy: "Sigo contando as moedas, imperturbáve[ROOT.Char.Custom('ES_OA')] is. Os montes reluzentes de prata e ouro me cercam como as torres de um pequeno castelo, separados por tamanho e pureza, e constituem uma parte significativa de minhas riquezas."
 stress_threshold.3421.desc.lazy: "Meus olhos permanecem fechados. Eu me balanço suavemente em minha tipóia de pano, sozinho no mais alto torre que possuo, salvo pelo mensageiro e um resgate de [ROOT.GetCharacter.GetTitleAsNameNoTooltip|l]— na torre mais alta que possuo, entre travesseiros e cobertores macios."
 stress_threshold.3421.desc.arrogant: "Continuo com a construção do meu modelo de um novo e perfeito palácio ideal. Ele é como eu em cada detalhe e, porque estou criando, cada último detalhe é inerentemente correto."
 stress_threshold.3421.desc.craven: "Permaneço firmemente protegid[ROOT.Char.Custom('ES_OA')] atrás de uma porta pesada reforçada com ferro. Seria preciso uma dúzia de soldados robustos para invadir este lugar, e neste aposento seguro e sem janelas estou ainda mais longe do perigo."
 stress_threshold.3421.desc.gregarious: "Mal consigo ouvi-los por causa dos sons de risadas e alegria vindo de trás de mim. Minha festa está a todo vapor e já dura vários dias."
 stress_threshold.3421.desc.cynical: "Eu os encaro de volta na entrada do meu santuário, meu rosto uma máscara de incredulidade. Queimando, sinceramente? Uma mentira clara e óbvia. Como posso saber se isso é realmente um dos #EMP meus#! servos? Eles podem ser qualquer um! Melhor me livrar deles rapidamente."
 stress_threshold.3421.desc.zealous: "Continuo lendo [ROOT.GetCharacter.GetFaith.ReligiousText], cercad[ROOT.Char.Custom('ES_OA')] pelos símbolos sagrados da minha fé, suplicando a [ROOT.GetCharacter.GetFaith.HighGodName] que me guie. Só me viro quando fica claro que o mensageiro não irá embora."
 stress_threshold.3421.desc.stubborn: "Meus olhos permanecem fechados, minha cama impecável. Minha rotina é minha rotina e não vou mudá-la sem um motivo #EMP extremamente#! bom. Somente quando o mensageiro começa a perguntar novamente, eu me mexo."
 stress_threshold.3421.desc.fallback: "Fico na torre mais alta em [capital_holding.GetNameNoTier], olhando para a capital, meus lábios franzidos. Parece que não saio daqui há dias, e toda vez que o faço, algo dramaticamente errado acontece."
 stress_threshold.3421.desc.rump: "\n\n\"Acredito que dei instruções claras para não ser incomodado\", respondo. Apenas este quarto, esta realidade, realmente faz sentido para minha mente fragmentada."
 stress_threshold.3421.a.rakish.gain: "Traga-me uma companhia, e enviarei ajuda."
 stress_threshold.3421.a.rakish.effect: "$stress_threshold.3421.a.rakish.gain$"
 stress_threshold.3421.b.reclusive.gain: "Resolvam isso vocês mesmos! Deixem-me em paz!"
 stress_threshold.3421.b.reclusive.effect: "$stress_threshold.3421.b.reclusive.gain$"
 stress_threshold.3421.c.irritable.gain: "Malditos e malditos ingratos, vou resolver isso!"
 stress_threshold.3421.c.irritable.effect: "$stress_threshold.3421.c.irritable.gain$"
 stress_threshold.3421.d.flagellant.gain: "O que?! Eu devo ser flagelado por minha falha!"
 stress_threshold.3421.d.flagellant.effect: "$stress_threshold.3421.d.flagellant.gain$"
 stress_threshold.3421.e.profligate.gain: "Esvaziem o tesouro! Protejam os mercados!"
 stress_threshold.3421.e.profligate.effect: "$stress_threshold.3421.e.profligate.gain$"
 stress_threshold.3421.f.comfort_eater.gain: "Preparem uma refeição farta, vou sair em breve."
 stress_threshold.3421.f.comfort_eater.effect: "$stress_threshold.3421.f.comfort_eater.gain$"
 stress_threshold.3421.g.drunkard.gain: "Preparem um barril do melhor, vou sair em breve."
 stress_threshold.3421.g.drunkard.effect: "$stress_threshold.3421.g.drunkard.gain$"
 stress_threshold.3421.h.hashishiyah.gain: "Preparem um prato de bolos, vou sair em breve."
 stress_threshold.3421.h.hashishiyah.effect: "$stress_threshold.3421.h.hashishiyah.gain$"
 stress_threshold.3421.i: "Deixem todos #EMP queimarem#!."
