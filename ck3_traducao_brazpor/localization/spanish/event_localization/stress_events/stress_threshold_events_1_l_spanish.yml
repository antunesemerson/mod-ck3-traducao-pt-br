 stress_threshold.2331.t: "Colapso Mental: Autoridade Alienada"
 stress_threshold.2331.desc.intro: "Ultimamente, meus [ROOT.Char.Custom('GetCourtierPlural')|l] parecem evitar-me a todo custo. Ouço sussurros de que"
 stress_threshold.2331.desc.calm: "eles consideram minha perspectiva calma perturbadora, desprovida de emoção,"
 stress_threshold.2331.desc.brave: "minha coragem é confundida com sede de sangue,"
 stress_threshold.2331.desc.ambitious: "eles acham que eu não vou parar por nada para alcançar minhas ambições, que nada é sagrado para mim,"
 stress_threshold.2331.desc.just: "pensam que sou sever[ROOT.Char.Custom('ES_OA')], que sigo a lei à risca demais e não seu espírito,"
 stress_threshold.2331.desc.callous: "eles dizem que não tenho coração, que não me importo com ninguém além de mim mesmo,"
 stress_threshold.2331.desc.stubborn: "me consideram teimoso demais, inflexível demais, intransigente demais,[ROOT.Char.Custom('ES_OA')]"
 stress_threshold.2331.desc.fallback: "eles acham que sou muito impessoal, muito distante,"
 stress_threshold.2331.desc.rump: "mas isso só significa que lidero com mão firme. Não significa que sou um monstro.\n\n... Será?"
 stress_threshold.2331.a.reclusive.gain: "Eu também não quero ver #EMP eles#!"
 stress_threshold.2331.a.reclusive.effect: "$stress_threshold.2331.a.reclusive.gain$"
 stress_threshold.2331.a.reclusive.opinion_list: "Seus [THIS.Char.Custom('GetCourtierPlural')|l] são forçados a se afastar"
 stress_threshold.2331.b.irritable.gain: "Malditos ingratos!"
