 stress_threshold.2341.t: "Colapso Mental: Dever Desprezado"
 stress_threshold.2341.desc.intro: "Maldição, eu também preciso de tempo para mim! E o que acontece se eu me ausentar de ir à [ROOT.Char.Custom('GetCourt')|l] por alguns dias, ou até mesmo um mês? Liderar é minha prerrogativa, e eu a exercerei, ou a deixarei de exercer, a meu bel-prazer.\n\nSou [ROOT.Char.Custom('ES_ElLa')] [ROOT.GetCharacter.GetTitleAsNameNoTooltip|l],"
 stress_threshold.2341.desc.lazy: "e eu preciso descansar!"
 stress_threshold.2341.desc.craven: "e se eu escolher não me expor ao perigo, isso não é da conta de mais ninguém além de mim!"
 stress_threshold.2341.desc.shy: "e se eu não quiser enfrentar os meus [ROOT.Char.Custom('GetCourtierPlural')|l], eu não preciso!"
 stress_threshold.2341.desc.arbitrary: "e não tenho obrigações além das que escolho manter!"
 stress_threshold.2341.desc.fickle: "$stress_threshold.2341.desc.arbitrary$"
 stress_threshold.2341.desc.fallback: "e minhas escolhas são invioláveis!"
 stress_threshold.2341.a.reclusive.gain: "Vão embora! Todos vocês!"
 stress_threshold.2341.a.reclusive.effect: "$stress_threshold.2341.a.reclusive.gain$"
 stress_threshold.2341.a.reclusive.list_courtier: "$stress_threshold.2331.a.reclusive.opinion_list$"
