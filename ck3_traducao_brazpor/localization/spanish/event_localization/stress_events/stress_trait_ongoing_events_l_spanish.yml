 stress_trait_ongoing.4501.t: "Nem Uma Mordida Para Comer"
 stress_trait_ongoing.4501.desc: "As últimas semanas têm sido particularmente estressantes, e tudo o que eu quero é comer um bom prato de [ROOT.Char.Custom('FavoriteTreat')]... talvez vários...\n\nMaldito seja, talvez uma mesa inteira!\n\nMas, ah, o cozinheiro me informa que não só não há mais, como também não restam ingredientes para fazer mais."
 stress_trait_ongoing.4501.a: "Leve estas moedas. Faça o que for preciso, traga-me minha comida!"
 stress_trait_ongoing.4501.b: "Você tem #EMP algo#! em mãos que possa satisfazer meus desejos?"
 stress_trait_ongoing.4501.b.success: "Você descobre uma nova sobremesa favorita"
 stress_trait_ongoing.4501.b.cannibal: "Você desenvolve um gosto por carne humana"
 stress_trait_ongoing.4501.b.failure: "Seu desejo não é saciado"
 stress_trait_ongoing.4501.c: "Ugh... Eu acho que vou ter que ficar sem."
 stress_trait_ongoing.4502.t: "A Fome"
 stress_trait_ongoing.4502.desc: "As últimas semanas têm sido particularmente estressantes, e tudo o que eu quero é um bom pedaço suculento de carne. Um bom corte macio como um filé, ou talvez costelas?\n\nMinha boca saliva ao pensar nisso, e eu sei que não posso conter a fome. Não desta vez."
 stress_trait_ongoing.4502.a: "Como se alguém fosse sentir falta de [prisoner.Custom('ES_AlAla')] [prisoner.GetTitledFirstNameNoTooltip|l]."
 stress_trait_ongoing.4502.b: "[courtier.Custom('ES_ElLa')|U] [courtier.GetTitledFirstNameNoTooltip|l] merece isso de qualquer jeito…"
 stress_trait_ongoing.4502.c: "Hora de uma visita a [hapless_village.GetNameNoTier]!"
 stress_trait_ongoing.5001.t: "Banquete das Intenções"
 stress_trait_ongoing.5001.desc: "\"Venha comigo, [ROOT.Char.GetTitledFirstName|l], tenho uma surpresa para você!\", diz [giver.Custom2('MyCharacterIntroduction', ROOT.Char)] com entusiasmo. \"Percebi que você não tem se alimentado bem, então passei semanas em busca das iguarias mais raras que consegui encontrar!\".\n\nAo seguir[giver.GetHerHim] encontro uma mesa repleta de uma ampla variedade de pratos gourmet. [ROOT.Char.Custom('GetExpensiveMeal')|U] e [ROOT.Char.Custom('GetExpensiveMealAlt')]… [ROOT.Char.Custom('GetExpensiveDessert')]…, só o cheiro já me revira o estômago.\n\n\"Então? Devore, [ROOT.Char.Custom('FormOfAddressForLiege')]!\"."
 stress_trait_ongoing.5001.a: "\"É, uh... realmente bom. Mmm. Muito saboroso.\""
 stress_trait_ongoing.5001.a.flavor: "Vou comer a refeição, mas apenas por educação."
 stress_trait_ongoing.5001.b: "\"Você não deveria... não, sério. #EMP Servos!#! Levem isso embora.\""
 stress_trait_ongoing.5001.c.dog: "Fingir comer, mas alimentar tudo para [ROOT.Char.Custom('DogStoryName')] embaixo da mesa."
 stress_trait_ongoing.5001.c.cat: "Fingir comer, mas alimentar tudo para [ROOT.Char.Custom('CatStoryName')] embaixo da mesa."
 stress_trait_ongoing.5001.c.no_pet: "Fingir comer, mas alimentar tudo para um cachorro embaixo da mesa."
 stress_trait_ongoing.5001.c.success: "[giver.GetTitledFirstName] acha que eu gostei da refeição"
 stress_trait_ongoing.5001.c.failure: "[giver.GetTitledFirstName] nota que eu não comi a comida"
