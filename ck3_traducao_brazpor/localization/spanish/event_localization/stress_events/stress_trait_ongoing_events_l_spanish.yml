 stress_trait_ongoing.0506.t: "Doce Alívio"
 stress_trait_ongoing.0506.desc_leper: "Esta doen?a debilitante consome meu corpo lentamente, desfazendo minha carne dia ap?s dia. Posso ser [ROOT.GetCharacter.GetTitleAsNameNoTooltip|l], mas ?s vezes temo que meus [ROOT.Char.Custom('GetCourtierPlural')] me olhem e s? vejam [Select_CString( ROOT.Char.IsFemale, 'uma leprosa', 'um leproso' )]."
 stress_trait_ongoing.0506.desc_gout_ridden: "Essa dor latejante em meus membros é tão intensa, horas de agonia lenta me incapacitando dia após dia. Às vezes, me pergunto se seria melhor ou pior se fosse constante, em vez de ter que suportar a onda de tormento, da dor maçante à tortura lancinante e de volta."
 stress_trait_ongoing.0506.desc_cancer: "As semanas passam arrastadas, um jogo de espera para essa dor aguda ou aquela. Alguns dias são toleráveis, mas em outros mal consigo me mover ou falar, e minha respiração fica cada vez mais lenta. Sinto meu tempo restante na Terra escorrendo de mim, roubado por esse crescimento canceroso que mata meu corpo."
 stress_trait_ongoing.0506.desc_disfigured: "Minhas feridas podem ter cicatrizado externamente, mas internamente, a agonia da minha desfiguração ainda queima. Traço o caminho das cicatrizes antigas com um dedo, e a memória da miséria vem inundando de volta."
 stress_trait_ongoing.0506.desc_maimed: "Eu tosso, expelindo um pedaço de muco-sangue. Nem sei se isso é um problema novo ou não, não com a agonia constante que assola meu corpo mutilado e arruinado."
 stress_trait_ongoing.0506.desc_one_eyed: "O encaixe vazio que costumava abrigar meu olho ainda dói, às vezes. Principalmente dores agudas. Estranhos fantasmas visuais e explosões de formas não naturais nos piores dias."
 stress_trait_ongoing.0506.desc_one_legged: "Pressiono meus dedos contra o toco retorcido da minha perna ausente. ?s vezes, especialmente quando percorro rotas familiares, ainda consigo senti-la. A agonia do meu desmembramento volta a inundar meu c?rebro, t?o real como sempre."
 stress_trait_ongoing.0506.desc_wounded: "Grimasso enquanto meus dedos sondam o corte. Eles voltam com pó de crosta vermelho-preto, acompanhado de uma pontada aguda de dor que me lembra que minhas feridas ainda estão muito frescas e doloridas."
 stress_trait_ongoing.0506.desc_fallback: "Essa agonia assola meu corpo, um tormento muito severo para o meu cérebro castigado. Eu preciso de algum alívio, apenas alguma forma de lidar com isso."
 stress_trait_ongoing.0506.desc: "\n\nO haxixe deveria aliviar a dor, por um tempo. A única questão é se consumi-lo sozinho[ROOT.Char.Custom('ES_OA')], ou se a companhia ajudaria a me animar. [medication_friend.GetTitledFirstName|l] me perguntou se eu queria que me acompanhasse nesta noite…"
 stress_trait_ongoing.0506.a: "Eu só preciso ficar sozinho por um tempo."
 hashish_alone_modifier: "Auto-Medicação"
 hashish_alone_modifier_desc: "Este personagem está controlando sua dor com bolos de haxixe à noite."
 stress_trait_ongoing.0506.b: "Talvez [medication_friend.GetFirstNameNoTooltip] queira compartilhar?"
 hashish_with_friend_modifier: "Medicação com Companhia"
 hashish_with_friend_modifier_desc: "Este personagem está compartilhando suas noites com um bom amigo e um ótimo haxixe."
 stress_trait_ongoing.0511.t: "Assim Foi Sempre"
 stress_trait_ongoing.0511.desc: "Estou desfrutando de uma noite tranquila, sentad[ROOT.Char.Custom('ES_OA')] casualmente comendo um pequeno monte de docinhos cobertos com haxixe, quando de repente sinto na bochecha o hálito pesado e salpicado de saliva de um[crusty_old_person.Custom('ES_XA')] [crusty_old_person.GetTitledFirstName|l] furios[crusty_old_person.Custom('ES_OA')].\n\n\"Largue essa erva maldita, [ROOT.GetCharacter.GetFirstNameNoTooltip], e pare de nublar a sua mente! [crusty_old_person.GetFaith.HighGodName] não o colocou neste mundo para que você desperdice seu tempo em um torpor[ROOT.Char.Custom('ES_OA')]!\"."
 stress_trait_ongoing.0511.a: "Você está certo! Devo parar imediatamente."
 stress_trait_ongoing.0511.a_flavour: "Você joga os bolos de haxixe fora."
 stress_trait_ongoing.0511.b: "<inspira fundo> Certo, #EMP ancian[crusty_old_person.Custom('ES_OA')]#!."
 stress_trait_ongoing.0511.b_flavour: "Coma. Cada. Maldito. Bolo."
 stress_trait_ongoing_0516.t: "Um Andarilho So—"
 stress_trait_ongoing_0516.desc: "«… e é por isso que esta reunião é tão importante».\n\nHã? Ah, certo, sim, a reunião com [important_guest.GetTitledFirstName|l]. Sobre… Alguma coisa. De que #EMP estábamos#! estávamos falando? [important_guest.GetSheHe] parece muito sério(a) sobre isso, seja lá o que for.\n\nEstendo o braço, pego outro bolo coberto de haxixe e começo a mordiscá-lo pensativamente. [important_guest.GetFirstNameNoTooltip] ergue uma sobrancelha diante da minha pausa vazia e percebo que talvez eu tenha comido #EMP demasiados#! bolos."
 stress_trait_ongoing.0516.a: "Sim, claro, um encontro tão importante..."
 stress_trait_ongoing.0516.a.tt_success: "[important_guest.GetFirstNameNoTooltip] fica impressionado com suas respostas calmas e precisas."
 stress_trait_ongoing.0516.a.tt_fail: "Fica ofendido com a sua óbvia embriaguez."
 stress_trait_ongoing.0516.b: "Desculpe, mas estou me sentindo indispost[ROOT.Char.Custom('ES_OA')]."
 stress_trait_ongoing.0516.b_flavour: "Você sai da reunião mais cedo e vai deitar-se."
 stress_trait_ongoing.0516.c: "Relaxe, [important_guest.GetFirstNameNoTooltip]. Experimente um pouco de haxixe!"
 stress_trait_ongoing.0516.c_flavour: "Você faz um servo trazer mais bolos para compartilhar."
