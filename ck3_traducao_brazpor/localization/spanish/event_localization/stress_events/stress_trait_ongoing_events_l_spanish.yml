 stress_trait_ongoing.0501.t: "Uma Noite Relaxante"
 stress_trait_ongoing.0501.desc: "Os negócios de governar têm sido tão estressantes, recentemente. Se não é isso, é aquilo, se não é aquilo, é isso. Uma interminável parade de camponeses, sacerdotes e problemas, todos esperando que #EMP eu#! resolva cada uma de suas preocupações mesquinhas.\n\nEu mereço um dia para mim, sem pretendentes ou petições, sem diplomatas ou juízes. Só eu e este grande prato de bolos de haxixe..."
 stress_trait_ongoing.0501.adventurer: "Os negócios de liderar um acampamento têm sido tão estressantes, recentemente. Se não é isso, é aquilo, se não é aquilo, é isso. Uma interminável lista de tarefas pequenas, problemas e questões, todas esperando por #EMP minhas#! soluções.\n\nEu mereço um dia para mim, sem discursos motivacionais ou palestras, sem treinamentos ou reuniões. Só eu e este grande prato de bolos de haxixe..."
 stress_trait_ongoing.0501.administrative: "A tarefa de liderar a casa [ROOT.Char.GetDynastyHouse.GetBaseNameNoTooltip] tem sido tão estressante ultimamente. Se não é uma coisa, é outra, se não é aquilo, é isso. Uma lista interminável de tarefas, problemas e questões triviais, todos aguardando #EMP mis#! soluções.\n\nEu mereço um dia só para mim, sem conspirações ou vaidade, sem bajulação nem invenções. Só eu e este grande prato de bolos de haxixe…"
 stress_trait_ongoing.0501.a: "De volta ao trabalho!"
 stress_trait_ongoing.0501.b: "É só um dia de folga..."
 overworking_diplomacy_modifier: "Sobrecarga na Diplomacia"
 overworking_diplomacy_modifier_desc: "$overworking_stewardship_modifier_desc$"
 overworking_martial_modifier: "Sobrecarga nas Artes Marciais"
