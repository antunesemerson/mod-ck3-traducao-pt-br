 overworking_stewardship_modifier: "Sobrecarga na Administração"
 overworking_stewardship_modifier_desc: "Este personagem coloca o trabalho acima da sua saúde mental."
 overworking_intrigue_modifier: "Sobrecarga na Intriga"
 overworking_intrigue_modifier_desc: "$overworking_stewardship_modifier_desc$"
 overworking_learning_modifier: "Sobrecarga no Aprendizado"
