 stress_trait_ongoing.1501.t: "Obsessão"
 stress_trait_ongoing.1501.desc_1_a: "Vislumbrei o escote hipnotizante de [obsession.Custom('ES_DelDela')] [obsession.GetTitledFirstName|l] ao passar por ela esta manhã."
 stress_trait_ongoing.1501.desc_1_b: "Notei um volume sugestivo nas calças [obsession.Custom('ES_DelDela')] [obsession.GetTitledFirstName|l] quando passei por ela esta manhã."
 stress_trait_ongoing.1501.desc_1_c: "[obsession.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me sorriu calorosamente quando passei por ele esta manhã."
 stress_trait_ongoing.1501.desc_1_d: "Não pude evitar que meu olhar percorresse o corpo [obsession.Custom('ES_DelDela')] [obsession.GetTitledFirstName|l] quando passei ao seu lado esta manhã."
 stress_trait_ongoing.1501.bridge: "Desde então, tenho sido incapaz de parar de pensar em [obsession.GetSheHe], e minhas fantasias mórbidas continuam me distraindo do trabalho.\n\n"
 stress_trait_ongoing.1501.desc_2_a: "Seu generoso busto,"
 stress_trait_ongoing.1501.desc_2_b: "Seus quadris largos,"
 stress_trait_ongoing.1501.desc_2_c: "Seu membro tentador,"
 stress_trait_ongoing.1501.desc_2_d: "Seu corpo ágil,"
 stress_trait_ongoing.1501.desc_2_e: "Seus ombros largos,"
 stress_trait_ongoing.1501.desc_2_f: "Seu físico atraente,"
 stress_trait_ongoing.1501.desc_3_a: "o modo como seu corpo ágil desliza..."
 stress_trait_ongoing.1501.desc_3_b: "a maneira como suas formas rechonchudas balançam quando caminha…"
 stress_trait_ongoing.1501.desc_3_c: "o jeito como os músculos se contraem sob a pele quando passa…"
 stress_trait_ongoing.1501.desc_3_d: "a postura e dignidade que carrega consigo…"
 stress_trait_ongoing.1501.desc_3_e: "o jeito como ronda maliciosamente pela minha [ROOT.Char.Custom('ResidenceBuilding')]…"
 stress_trait_ongoing.1501.desc_3_f: "o passo medido com que anda…"
 stress_trait_ongoing.1501.end: "É demais! Preciso encontrar algum alívio dessa paixão, ou nunca conseguirei fazer nada!"
 stress_trait_ongoing.1501.warning: "\n\nInfelizmente, sei que [obsession.GetFirstName] não tem interesse em [ROOT.Char.Custom('ES_LoLa')] s [ROOT.Char.GetWomenMen], então também não vai ter interesse em mim."
 stress_trait_ongoing.1501.a: "Eu preciso saber se [obsession.GetSheHe] sente o mesmo!"
 stress_trait_ongoing.1501.a.flavor: "Isso resolverá as coisas, de uma maneira ou de outra."
 stress_trait_ongoing.1501.a.success: "[obsession.GetTitledFirstName] também tem me desejado"
 stress_trait_ongoing.1501.a.failure: "[obsession.GetTitledFirstName] rejeita minhas investidas"
 stress_trait_ongoing.1501.b: "Um pouco de fantasia não pode machucar, certo?"
 stress_trait_ongoing.1501.b.flavor: "Um tempo sozinho trará alívio temporário, pelo menos."
 stress_trait_ongoing.1501.c: "Uma ida ao bordel vai me ajudar a tirar[obsession.GetHerHim] da cabeça…"
 stress_trait_ongoing.1501.c.flavor: "#EMP Alguém#! certamente vai me ajudar a superar isso."
 stress_trait_ongoing.1501.d: "Não deveria objetificar [obsession.GetFirstNameNoTooltip], isso está #EMP mal#!!"
 stress_trait_ongoing.1501.d.flavor: "Essa obsessão é injusta tanto para [obsession.GetSheHe] quanto para mim."
