l_spanish:
 stress_threshold_special.1001.t: "Colapso Mental: Luto Devastador"
 stress_threshold_special.1001.desc_intro_standard: "A vida nunca foi fácil, mas sinto como se a perda de minha [ROOT.Char.Custom2('RelationToMeShort', deceased_character)] [deceased_character.GetFirstName] me tivesse levado ao limite.\n\n"
 stress_threshold_special.1001.desc_intro_lover: "Uma luz se apagou da minha vida.\n\nCom [deceased_character.GetFirstName], meu [deceased_character.Custom('LoverPetName')], partido, a vida de repente parece muito mais sombria."
 stress_threshold_special.1001.desc_intro_friend: "Meu amig[deceased_character.Custom('ES_OA')] [deceased_character.GetFirstName] sempre esteve lá por mim. Não esperava que sua morte fosse fácil, mas também nunca imaginei que seria tão difícil."
 stress_threshold_special.1001.desc_spouse: "[deceased_character.GetSheHe|U] foi meu parceiro na vida, me ajudando a superar tantos desafios e dificuldades. Embora possamos ter tido desentendimentos, enfrentar a vida sem [deceased_character.GetHerHim] simplesmente parece... assustador.

Como conseguirei viver sem [deceased_character.GetHerHim]?"
 stress_threshold_special.1001.desc_child_toddler: "Embora eu soubesse que isso acabaria acontecendo, descobri estar lamentavelmente despreparad[ROOT.Char.Custom('ES_OA')] para a morte de meu [ROOT.Char.Custom2('RelationToMe', deceased_character)].

De repente, já não posso recorrer a [deceased_character.GetHerHim] em busca de consolo ou conselho.

Só há um espaço vazio onde [deceased_character.GetSheHe] costumava estar... Será que algum dia poderá ser preenchido?"
 stress_threshold_special.1001.desc_child_older: "Ainda me lembro de [deceased_character.GetHerHim] como bebê. Tão pequeno e frágil. Apesar disso, [deceased_character.GetSheHe] sobreviveu, cresceu, ficou mais velh[deceased_character.Custom('ES_OA')] até... agora, quando parou de repente.

Eu tinha tantas esperanças para seu futuro... Tantas coisas que eu desejava ver que agora nunca acontecerão."
 stress_threshold_special.1001.desc_parent: "Embora eu soubesse que isso acabaria acontecendo, descobri estar lamentavelmente despreparad[ROOT.Char.Custom('ES_OA')] para a morte de meu [ROOT.Char.Custom2('RelationToMe', deceased_character)].

De repente, já não posso recorrer a [deceased_character.GetHerHim] em busca de consolo ou conselho.

Só há um espaço vazio onde [deceased_character.GetSheHe] costumava estar... Será que algum dia poderá ser preenchido?"
 stress_threshold_special.1001.desc_lover: "Cada dia é uma batalha, na qual luto para encontrar sentido na ausência de [deceased_character.GetHerHis]. Não consigo parar de pensar em todos os momentos maravilhosos que tivemos juntos...

Esses momentos nunca se repetirão."
 stress_threshold_special.1001.desc_friend: "

[deceased_character.GetSheHe|U] sempre estava dispost[deceased_character.Custom('ES_OA')] a me animar ou me ajudar quando eu estava em apuros. Com todos os meus problemas recentes, sua ausência é especialmente notável."
 stress_threshold_special.1001.depressed: "Colapso Mental: Desejos Repressos"
 stress_threshold_special.1001.drunkard: "Ah, como sinto falta dos dias de libertinagem e luxúria que eu costumava ter. Já faz tanto tempo desde que estive com outra pessoa... e dói dormir sozinho.\n\n"
 stress_threshold_special.1001.hashishiyah: "Sei que [ROOT.Char.Custom2('RelationToMe', target)] [target.GetFirstName] me receberia em seu leito de braços abertos. [target.GetSheHe|U] me deseja, eu sei... e, ah, como eu anseio por [target.GetHerHim]!"
 stress_threshold_special.1001.flagellant: "Eu vi a maneira como [target.Custom2('MyCharacterIntroduction', ROOT.Char)] olha para mim. [target.GetSheHe|U] me deseja, eu sei... e, ah, como eu anseio por [target.GetHerHim]!"
 stress_threshold_special.1001.inappetetic.trait: "Embora [target.GetFirstName] seja apenas um[target.Custom('ES_XA')] serviçal comum[target.Custom('ES_EA')], já vi como [target.GetSheHe] me olha. [target.GetSheHe|U] me deseja, eu sei... Ah, como eu anseio por [target.GetHerHim]!"
 stress_threshold_special.1001.inappetetic.effect: "

Quando fiz meus votos, pensei que conseguiria suportar o celibato, mas agora... já não tenho tanta certeza."
 stress_threshold_special.1001.journaller: "Esqueça. Eu não consigo mais resistir, eu #EMP preciso#! disso!"
 stress_threshold_special.1001.confider.shared: "Você perde a [perk|lE] [GetPerk( 'restraint_perk' ).GetName( GetPlayer)|V]"
 stress_threshold_special.1001.confider.assist: "Não... Isso não é mais quem eu sou. Eu devo controlar esses impulsos!"
 stress_threshold_special.1001.frozen_grief: "Devo seguir em frente. É o que [deceased_character.GetSheHe] teria querido."
 stress_threshold_special.1001.lunatic: "Mas [deceased_character.GetSheHe] não se foi! Está bem aqui comigo…"
 stress_threshold_special.1001.lunatic.flavor: "...e ficará comigo para sempre!"
