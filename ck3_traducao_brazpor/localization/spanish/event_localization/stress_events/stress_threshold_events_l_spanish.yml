l_spanish:
 stress_threshold_cooldown_message: "Se você ainda estiver [Concept( 'stressed', 'estresad' )|E][ROOT.Char.Custom('ES_OA')] durante [SCOPE.ScriptValue('stress_threshold_cooldown_duration_in_years')|V0] anos, poderá sofrer outra [mental_break|lE]"
 #System Messages
 stress_threshold.0010.toast: "Sobrecarregado pelo Estresse"
 stress_threshold.0010.text: "Você ganhou um [stress_level|lE]"
 stress_threshold.0400.toast: "Você ultrapassou seu limite de [stress|lE] e foi resetado para o [stress_level|lE] 3"
 #Level 1 Stress Events
 stress_threshold.1001.t: "Colapso Mental: Pensamentos Sombrios"
 stress_threshold.1001.desc: "A culpa e a vergonha têm me assombrado ultimamente. Todos os meus pecados, minhas falhas, minhas faltas... esses pensamentos sombrios me distraem das minhas responsabilidades e me mantêm despert[ROOT.Char.Custom('ES_OA')] à noite.\n\nSinto que preciso fazer algo para pôr fim a esta angústia mental, mas o que poderia ajudar?"
 stress_threshold.1001.contrite.gain: "Devo confessar todos os meus males!"
 stress_threshold.1001.contrite.effect: "Não posso mais esconder meus segredos!"
 stress_threshold.1001.flagellant.gain: "O açoite expulsará meus pecados."
 stress_threshold.1001.flagellant.effect: "![ROOT.Char.Custom('ES_OA')]! Por tudo!"
 stress_threshold.1001.improvident.gain: "Doar para caridade compensará meus pecados."
 stress_threshold.1001.improvident.effect: "Outros precisam mais do meu ouro do que eu!"
 stress_threshold.1001.drunkard.gain: "Será que umas bebidas ajudariam?"
 stress_threshold.1001.drunkard.effect: "Vou beber até esses pensamentos sumirem."
 stress_threshold.1001.hashishiyah.gain: "Um pouco de haxixe me tranquilizará..."
 stress_threshold.1001.hashishiyah.effect: "Uma noite relaxante com uma bandeja de bolos de haxixe ajudará."
 stress_threshold.1001.journaller.gain: "Escrever minhas preocupações me ajudará a me concentrar."
 stress_threshold.1001.journaller.effect: "Preciso de uma noite sozinh em minha oficina."
 stress_threshold.1001.endure: "Devo ser forte e resistir a esses impulsos!"
 stress_threshold.1011.t: "Colapso Mental: Desejos Licenciosos"
 stress_threshold.1011.desc: "Ultimamente sinto como se eu estivesse constantemente distraíd[ROOT.Char.Custom('ES_OA')] por pensamentos lascivos e fantasias eróticas. Com todas as dificuldades da minha vida diária, é fácil demais me perder em devaneios e esquecer a realidade.\n\nEsses desejos estão claramente interferindo na minha vida, mas o que devo fazer a respeito?"
 stress_threshold.1011.rakish.gain: "Uma viagem ao bordel trará alívio!"
 stress_threshold.1011.rakish.effect: "Que ninguém além de mim entre no bordel esta noite."
 stress_threshold.1011.rakish.tt: "Comportamento tão desavergonhado traz riscos inerentes..."
 stress_threshold.1011.reclusive.gain: "Devo me isolar para evitar a tentação!"
 stress_threshold.1011.reclusive.effect: "Só em solidão encontrarei paz!"
 stress_threshold.1011.conversion.interfaith: "Uma nova visão de [new_faith.HighGodName] pode me ajudar?"
 stress_threshold.1011.conversion.intrafaith: "Será que [new_faith.HighGodName] pode me ajudar onde [ROOT.Char.GetFaith.HighGodName] falhou?"
 stress_threshold.1011.conversion.judaism: "Os antigos mandamentos me ajudarão a me manter pur[ROOT.Char.Custom('ES_OA')]."
 stress_threshold.1011.conversion.christianity: "Jesus, livra-me das tentações!"
 stress_threshold.1011.exercise.gain: "Outra forma de liberar pressão pode ajudar..."
 stress_threshold.1001.exercise.effect: "Um bom exercício queimará esses desejos."
 stress_threshold.1011.endure: "Vou morder o lábio e tentar manter a concentração!"
 stress_threshold.1501.t: "Colapso Mental: Nada Importa"
 stress_threshold.1501.intro.desc: "A cada novo dia, está mais difícil encontrar uma razão para me levantar da cama."
 stress_threshold.1501.helper.desc: "[scoped_helper.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)|U] me espera, mas sei que suas palavras não me trarão conforto."
 stress_threshold.1501.nohelper.desc: "Após me arrastar para fora da cama, não encontro interesse nos negócios triviais da [ROOT.Char.Custom('GetCourt')|l], nem prazer em tomar meu café da manhã."
 stress_threshold.1501.faith.desc: "\n\nAté as palavras dos [scoped_ruler.GetFaith.AltPriestTermPlural] soam vazias para mim."
 stress_threshold.1501.fallback.desc: "\n\nO ritmo monótono desta vida se tornou insuportável."
 stress_threshold.1501.a: "Não aguento mais [scoped_helper.GetHerHim]!"
 stress_threshold.1501.b: "Acho que vou evitar o almoço novamente."
 stress_threshold.1501.c: "Só quero ficar em paz."
 stress_threshold.1501.d: "Por que comer quando tudo parece sem sabor?"
 stress_threshold.1501.e: "Não posso permitir que esses pensamentos sombrios me distraiam."
 stress_threshold.1501.f: "A vida como [scoped_ruler.GetFaith.GetAdherentName] não faz sentido."
 stress_threshold.1502.t: "Colapso Mental: Ressentimento"
 stress_threshold.1502.intro.desc: "Por que eu #EMP sempre#! tenho que fazer tudo sozinho? Como posso ser esperado para administrar os assuntos do [scoped_ruler.GetPrimaryTitle.GetNameNoTierNoTooltip] quando metade da minha [ROOT.Char.Custom('GetCourt')|l] é incapaz de seguir minhas ordens, e a outra nem sequer as entende?"
 stress_threshold.1502.courtier.desc: "\n\n[scoped_courtier.GetFirstName], em particular, tornou-se insuportável ultimamente. Mal suporto ouvir a tagarelice incessante do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('scoped_courtier'))]."
 stress_threshold.1502.nocourtier.desc: ""
 stress_threshold.1502.a: "Você não passa de um[scoped_courtier.Custom('ES_XA')] [scoped_courtier.Custom2('InsultAdjective', ROOT.Char)] [scoped_courtier.Custom2('InsultNoun', ROOT.Char)]!"
 stress_threshold.1502.b: "Guarda! Traga-me outro prisioneiro!"
 stress_threshold.1502.c: "Por que vocês têm que ser tão #EMP idiotas#! e incompetentes?!"
 stress_threshold.1502.d: "Uma visita ao [ROOT.Char.Custom('GetDungeon')|l] vai clarear minha mente..."
 stress_threshold.1502.e: "Só preciso aguentar."
 stress_threshold.1502.f: "E se eu escrever um diário sobre minhas desventuras?"
 stress_threshold.1502.g: "[scoped_ruler.GetFaith.HighGodName], eu preciso de uma bebida!"
 stress_threshold.1503.t: "Colapso Mental: Vazio Interior"
 stress_threshold.1503.desc: "Nada do que eu faço me satisfaz mais. Apesar de todos os meus esforços, não consigo encontrar nem felicidade nem paz de espírito. É como se algo estivesse... faltando.\n\nO que poderia preencher esse buraco que corrói minha alma?"
 stress_threshold.1503.a.a: "Talvez algumas jóias a mais?"
 stress_threshold.1503.a.b: "Preciso de uma coroa maior!"
 stress_threshold.1503.a.c: "Cansei das minhas roupas..."
 stress_threshold.1503.a.d: "Um novo e poderoso garanhão!"
 stress_threshold.1503.a.e: "Um novo quadro de um artista famoso!"
 stress_threshold.1503.b: "Esta dor só pode ser curada com uma coisa: [scoped_ruler.Custom('GetExpensiveMeal')]"
 stress_threshold.1503.e: "Se pelo menos houvesse algo que eu pudesse fazer..."
 stress_threshold.1504.t: "Colapso Mental: Uma Tarefa Interminável"
 stress_threshold.1504.desc: "Às vezes, sinto como se o mundo inteiro caísse diretamente sobre meus ombros. Minhas responsabilidades como [scoped_ruler.GetTitleAsNameNoTooltip|l] parecem não ter fim…\n\nCertamente, mal tenho um instante para mim mesm[ROOT.Char.Custom('ES_OA')]."
 stress_threshold.1504.a: "Eles não podem me deixar em paz nem por um momento?"
 stress_threshold.1504.b: "Preciso de algo que reequilibre meus humores..."
 stress_threshold.1504.e: "Este é o meu dever, afinal."
 stress_threshold.1504.f: "Estou cercad[ROOT.Char.Custom('ES_OA')] de idiotas!"
 stress_threshold.1504.g: "Vou colocar meus pensamentos por escrito."
 stress_threshold.1504.h: "Sela meu cavalo, preciso sair para um passeio!"
 stress_threshold.1504.i: "Preciso de um momento de silêncio para pensar."
 stress_threshold.1601.t: "Colapso Mental: Dando Voltas na Mesma Coisa"
 stress_threshold.1601.desc: "Não consigo me concentrar, meus pensamentos estão correndo em círculos! Eu tenho que supervisionar o [ROOT.Char.Custom('GetCourt')|l], tenho que observar as tropas, eu tenho que...\n\nComo posso encontrar descanso quando até meus pensamentos me traem assim?!"
 stress_threshold.1601.profligate.gain: "Se eu comprasse algo brilhante para me concentrar..."
 stress_threshold.1601.profligate.effect: "Sempre me sinto muito mais concentrad[ROOT.Char.Custom('ES_OA')] depois de comprar algo bonito!"
 stress_threshold.1601.inappetetic.gain: "Pensar em comida é uma distração."
 stress_threshold.1601.inappetetic.effect: "Vou matar a fome de qualquer distração!"
 stress_threshold.1601.comfort_eater.gain: "Um estômago cheio pode me ajudar a me concentrar."
 stress_threshold.1601.comfort_eater.effect: "Uma barriga cheia sempre me deixa mais concentrad[ROOT.Char.Custom('ES_OA')]."
 stress_threshold.1601.rakish.gain: "Talvez eu possa me concentrar na paixão..."
 stress_threshold.1601.rakish.effect: "Uma visita a um bordel vai me ajudar a focar meus pensamentos!"
 stress_threshold.1601.reclusive.gain: "Talvez, se eu estivesse sozinh[ROOT.Char.Custom('ES_OA')], poderia concentrar meus pensamentos..."
 stress_threshold.1601.reclusive.effect: "Sempre consigo me concentrar quando estou sozinh..."
 stress_threshold.1601.irritable.gain: "Talvez eu pudesse pensar se todo mundo #EMP ficasse em silêncio#!!"
 stress_threshold.1601.irritable.effect: "Vou mandar todo mundo ficar #EMP em silêncio#!"
 stress_threshold.1601.confider.gain: "[friend.GetFirstNameNoTooltip], amig[friend.Custom('ES_OA')] meu[friend.Custom('ES_OA')], me ajude a organizar meus pensamentos!"
 stress_threshold.1601.confider.effect: "\"[friend.GetFirstNameNoTooltip], por favor, escute-me como sempre faz!\""
 stress_threshold.1601.athletic.gain: "Me disseram que um corpo saudável propicia uma mente saudável..."
 stress_threshold.1601.athletic.effect: "Sempre me sinto mais tranquil[ROOT.Char.Custom('ES_OA')] após fazer algum exercício!"
 stress_threshold.1601.contrite.gain: "Vou limpar minha mente confessando minhas más ações."
 stress_threshold.1601.contrite.effect: "Devo confessar minhas más ações! Isso me trará clareza."
 stress_threshold.1601.flagellant.gain: "Dizem que a dor aviva a mente..."
 stress_threshold.1601.flagellant.effect: "Nada como a dor para focar os pensamentos."
 stress_threshold.1601.improvident.gain: "Será que um ato claro de caridade libera meus pensamentos?"
 stress_threshold.1601.improvident.effect: "Fazer uma doação para uma boa causa sempre acalma minha mente."
 stress_threshold.1601.drunkard.gain: "Vou me sentir mais centrado depois de um trago..."
 stress_threshold.1601.drunkard.effect: "Sempre me sinto mais concentrad[ROOT.Char.Custom('ES_OA')] depois de uma bebida."
 stress_threshold.1601.hashishiyah.gain: "Com sorte, um pouco de haxixe vai acalmar minha mente..."
 stress_threshold.1601.hashishiyah.effect: "Não me sinto mais calm[ROOT.Char.Custom('ES_OA')] do que após uma noite com alguns bolos de haxixe."
 stress_threshold.1601.journaller.gain: "Escrever meus pensamentos deveria me dar um pouco de clareza..."
 stress_threshold.1601.journaller.effect: "Escrever meus pensamentos sempre me traz clareza!"
 stress_threshold.1601.burdened.gain: "Sonhar com um lugar melhor pode ajudar."
 stress_threshold.1601.burdened.effect: "Sonhar com coisas boas sempre ajuda!"
 stress_threshold.1601.endure_no_option: "Eu tenho que... eu tenho que aguentar. Não posso fazer nada..."
 stress_threshold.1602.t: "Colapso Mental: Emoções Turbulentas"
 stress_threshold.1602.desc: "Minhas emoções se tornam mais instáveis a cada dia que passa. Uma alegria avassaladora substitui a mais profunda tristeza de um momento para o outro, e meu [ROOT.Char.Custom('GetCourt')|l] e eu ficamos exaustos.\n\nSe ao menos eu pudesse encontrar uma maneira de domar este turbilhão interior!"
 stress_threshold.1602.profligate.gain: "Algo novo... algo brilhante... pode me concentrar."
 stress_threshold.1602.profligate.effect: "Algo novo e brilhante só me trará pura alegria!"
 stress_threshold.1602.inappetetic.gain: "Se eu não comer, não terei energia para sentir..."
 stress_threshold.1602.inappetetic.effect: "Matarei toda emoção de fome."
 stress_threshold.1602.comfort_eater.gain: "Pelo menos, a comida me proporciona um claro sentimento de bem-estar."
 stress_threshold.1602.comfort_eater.effect: "Quando como, só sinto bem-estar."
 stress_threshold.1602.rakish.gain: "Um forte desejo pode ajudar a manter outros sentimentos à distância..."
 stress_threshold.1602.rakish.effect: "Nada me concentra como a força do desejo e da luxúria!"
 stress_threshold.1602.reclusive.gain: "Pode ser que eu me acalme se ficar sozinho..."
 stress_threshold.1602.reclusive.effect: "Sempre consigo clareza quando estou sozinho."
 stress_threshold.1602.irritable.gain: "Seria mais fácil se as pessoas #EMP me deixassem em paz#!!"
 stress_threshold.1602.irritable.effect: "Vou dizer o que penso sobre suas #EMP desconfianças#!"
 stress_threshold.1602.confider.gain: "Falar sobre isso com [friend.GetFirstNameNoTooltip] pode ajudar."
 stress_threshold.1602.confider.effect: "Falar com [friend.GetFirstNameNoTooltip] geralmente ajuda!"
 stress_threshold.1602.athletic.gain: "Correrei até não sentir nada além de satisfação."
 stress_threshold.1602.athletic.effect: "Uma corrida sempre acalma minhas emoções."
 stress_threshold.1602.contrite.gain: "Pode ser que eu me acalme se confessar meus pecados."
 stress_threshold.1602.contrite.effect: "Sempre me sinto mais equilibrad[ROOT.Char.Custom('ES_OA')] depois de me confessar!"
 stress_threshold.1602.flagellant.gain: "Talvez eu possa me livrar de todas as emoções exceto a dor..."
 stress_threshold.1602.flagellant.effect: "Só sentirei dor, nada mais."
 stress_threshold.1602.improvident.gain: "A gratidão pela caridade abafará tudo o mais."
 stress_threshold.1602.improvident.effect: "Sempre me sinto mais centrad[ROOT.Char.Custom('ES_OA')] depois de fazer uma doação..."
 stress_threshold.1602.journaller.gain: "Escreverei até que eu me sinta apenas concentrad[ROOT.Char.Custom('ES_OA')]."
 stress_threshold.1602.journaller.effect: "Escrever sobre meus sentimentos sempre funciona!"
 stress_threshold.1602.drunkard.gain: "Com bastante bebida, todas as emoções se desvanecem…"
 stress_threshold.1602.drunkard.effect: "Com a bebida, eu sempre posso deixar as emoções para trás!"
 stress_threshold.1602.hashishiyah.gain: "Algum haxixe pode me trazer paz."
 stress_threshold.1602.hashishiyah.effect: "O haxixe sempre me ajuda a me concentrar."
 stress_threshold.1602.burdened.gain: "Se eu pudesse pensar em alguma coisa, #EMP lo que sea#!."
 stress_threshold.1602.burdened.effect: "Se eu deixar meus pensamentos vagarem, minha ansiedade diminuirá."
 #Level 2 Stress Events
 stress_threshold.2001.t: "Colapso Mental: Ingratidão"
 stress_threshold.2001.desc: "Malditos ingratos! Eles não sabem os sacrifícios que faço por eles?\n\nTodos os dias me esforço sem parar como um[ROOT.Char.Custom('ES_XA')] serv[ROOT.Char.Custom('ES_OA')] para que este [ROOT.Char.Custom('GetRealmOrDomicile')|l] prospere, mas tudo o que todos fazem é reclamar e pedir mais!\n\nE agora até [victim.GetFirstName] chega a questionar minhas ordens!?"
 stress_threshold.2001.arbitrary.gain: "Eu sou [ROOT.Char.GetTitleAsNameNoTooltip], minha palavra é a lei!"
 stress_threshold.2001.arbitrary.effect: "Eu decido como as coisas são feitas aqui!"
 stress_threshold.2001.imprison_victim: "Vamos ver quão agradecid[victim.Custom('ES_OA')] se sente [victim.GetFirstNameNoTooltip] na [ROOT.Char.Custom('GetDungeon')|l]!"
 stress_threshold.2001.endure: "Venha, seja paciente com eles..."
 stress_threshold.2101.t: "Colapso Mental: Marginalização"
 stress_threshold.2101.desc: "Às vezes me sinto como um[ROOT.Char.Custom('ES_XA')] estranh[ROOT.Char.Custom('ES_OA')] em minha própria [ROOT.Char.Custom('GetCourt')|l].\n\nNão consigo deixar de notar os olhares estranhos que meus [ROOT.Char.Custom('GetCourtierPlural')|l], o desconforto que preenche qualquer [ROOT.Char.Custom('GetRoom')|l] em que entro... O que aconteceu com a minha vida? Por que não sou bem recebid[ROOT.Char.Custom('ES_OA')] entre os meus?"
 stress_threshold.2101.witch.gain: "Sou um[ROOT.Char.Custom('ES_XA')] marginal[ROOT.Char.Custom('ES_OA')] como [ROOT.Char.GetFaith.WitchGodName]."
 stress_threshold.2101.witch.effect: "Pelo menos eu sei que [ROOT.Char.GetFaith.WitchGodName] me entende."
 stress_threshold.2101.drunkard.effect: "[ROOT.Char.Custom('RegionalAlcoholicDrink')] pode ser meu único verdadeiro amigo."
 stress_threshold.2101.hashishiyah.effect: "Pelo menos este bolo com cobertura de haxixe não vai me julgar."
 stress_threshold.2101.endure: "Talvez eu esteja imaginando tudo isso..."
 stress_threshold.2201.t: "Colapso Mental: Ira Ardente"
 stress_threshold.2201.desc.insult_adventurer: ""Você pode ser meu [ROOT.Char.Custom('GetCourtier')|l] [character_to_yell_at.GetFirstName], mas você também é uma espécie de [character_to_yell_at.Custom2('InsultNoun', ROOT.Char)] [character_to_yell_at.Custom2('InsultAdjective', ROOT.Char)]!".\n\n"
 stress_threshold.2201.desc.insult: "Você pode ser [character_to_yell_at.GetTitleAsName], mas você também é uma espécie de [character_to_yell_at.Custom2('InsultNoun', ROOT.Char)] [character_to_yell_at.Custom2('InsultAdjectiveArticle', ROOT.Char)]!\n\n"
 stress_threshold.2201.desc: "Eu hesito ao ver o rosto do meu [ROOT.Char.Custom2('RelationToMePossessive', SCOPE.sC('character_to_yell_at'))], mas... Mas eu sinto tanta #EMP rabia#! sempre... e todo mundo está me provocando...\n\n"
 stress_threshold.2201.desc_liege: "O que aconteceu com você, [ROOT.Char.GetTitledFirstNameNoTooltip]? Este comportamento é inaceitável."
 stress_threshold.2201.desc_vassal: "Meu [ROOT.Char.Custom('ES_SennorSennora')], o que significa esse comportamento?"
 stress_threshold.2201.desc.calm: "E você normalmente é tão calmo..."
 stress_threshold.2201.desc.ending: "\""
 stress_threshold.2201.a: "Vocês me ouviram!"
 stress_threshold.2201.save: "Digam-me, como vocês responderiam a tal ataque?"
 stress_threshold.2201.save_tt: "Finjo que estou apenas testando [character_to_yell_at.GetHerHim] estava testando"
 stress_threshold.2201.liege: "Sinto muito, meu [ROOT.Char.Custom('ES_SennorSennora')]. Vou me controlar melhor."
 stress_threshold.2201.c: "Desculpe-me. Vou me controlar melhor."
 stress_threshold.2202.t: "Ira Ardente"
 stress_threshold.2202.desc.liege: "A ira sem provocação por parte do meu senhor[stress_character.Custom('ES_XA')] [stress_character.GetTitledFirstName|l] me pegou completamente de surpresa."
 stress_threshold.2202.desc.vassal: "A ira sem provocação por parte do meu vassalo[stress_character.Custom('ES_OA')] [stress_character.GetTitledFirstName|l] me pega totalmente de surpresa."
 stress_threshold.2202.desc.other_relationship: "A raiva sem provocação por parte do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('stress_character'))] , [stress_character.Custom('ES_ElLa')] [stress_character.GetTitledFirstName|l] me pegou totalmente de surpresa."
 stress_threshold.2202.desc: "[stress_character.GetSheHe|U] esteve submetid[stress_character.Custom('ES_OA')] a muito estresse ultimamente, mas"
 stress_threshold.2202.desc.rival: "quando lhe pediram explicações, apenas redobrou os insultos."
 stress_threshold.2202.desc.other: "se comportar assim..."
 stress_threshold.2202.a: "Eu também sei retribuir na mesma medida, [stress_character.Custom2('InsultNoun', ROOT.Char)]!"
 stress_threshold.2202.b: "Até mesmo [stress_character.GetSheHe] está lutando... É tranquilizador."
 #Level 3 Stress Events
 stress_threshold.3001.t: "Colapso Mental: As Vozes"
 stress_threshold.3001.desc: "Embora meu [ROOT.Char.Custom('GetCourt')|l] só lida com mentiras e falsidades, encontrei aqueles que dizem estar dispostos a me contar a verdade.\n\nVivem comigo. Na minha cabeça.\n\nDizem que sabem qual é a verdade.\n\nSerá que sabem de verdade?"
 stress_threshold.3001.possessed.gain: "Sim, apenas as vozes sabem a verdadeira verdade!"
 stress_threshold.3001.possessed.effect: "Sim, sim, eles sabem a verdade, a verdadeira verdade…"
 stress_threshold.3001.naked_run: "Preciso exorcizar esses demônios correndo nu[ROOT.Char.Custom('ES_OA')]!"
 stress_threshold.3001.endure: "Apenas... devo não ouvi-los..."
 stress_threshold.3101.t: "Colapso Mental: Tudo Errado"
 stress_threshold.3101.desc: "Tudo está… errado. Esta [ROOT.Char.Custom('GetRoom')|l] está errada. O chão está errado. Até o próprio ar está errado!\n\nPor que está tudo errado? Quem fez isso?\n\nQuem deixou tudo #EMP mal?!#!"
 stress_threshold.3101.kill_victim: "Tudo é culpa de [victim.GetFirstNameNoTooltip], eu sei!"
 stress_threshold.3101.lunatic.gain: "Os [ROOT.Char.Custom('GetRandomRegionalSmallGamePlural')]... esses pequenos bastardos astutos fizeram isso!"
 stress_threshold.3101.lunatic.effect: "Os astutos [ROOT.Char.Custom('GetRandomRegionalSmallGamePlural')] estão de volta!"
 stress_threshold.3101.lunatic.tt: "#F Tragam-me uma tocha!#!"
 stress_threshold.3201.t: "Colapso Mental: Sobrecarga"
 stress_threshold.3201.desc: "Está tudo demais, por que eu estou tentando sequer?\n\nEstamos no meio de um jantar quando tudo simplesmente... desmorona. Tenho que revisar as finanças da [ROOT.Char.Custom('GetCourt')|l], resolver uma dúzia de disputas pequenas, tenho que...\n\n\"Está tudo bem, meu [ROOT.Char.GetTitleAsNameNoTooltip|l]?\". Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('vassal'))], [vassal.Custom('ES_ElLa')] [vassal.GetTitledFirstName|l], expressa sua preocupação com cautela."
 stress_threshold.3201.depressed.gain: "E o que importa? Eu desisto."
 stress_threshold.3201.depressed.effect: "De qualquer forma, não serve para nada..."
 stress_threshold.3201.help: "\"[vassal.GetFirstNameNoTooltip]... Me ajude, por favor\"."
 stress_threshold.3201.wrathful.gain: ""Não, [vassal.Custom2('InsultNoun', ROOT.Char)] [vassal.Custom2('InsultAdjective', ROOT.Char)], ei, #EMP no#! estou bem!"."
 stress_threshold.3201.wrathful.effect: ""Vou te mostrar quem está #EMP bem#!, [vassal.Custom2('InsultNoun', ROOT.Char)] [vassal.Custom2('InsultAdjective', ROOT.Char)]!"."
 stress_threshold.3201.wrathful.effect.success: "Você dá uma surra em [vassal.GetTitledFirstName|l]"
 stress_threshold.3201.wrathful.effect.failure: "[vassal.GetTitledFirstName] luta contra você."
 stress_threshold.3301.t: "Colapso Mental: A Dor no Coração"
 stress_threshold.3301.desc_man: "O primeiro sinal de que algo vai mal é uma dor aguda no peito. Cambaleio em busca de apoio enquanto a dor se espalha pelo braço esquerdo. Sinto-me atordoad[ROOT.Char.Custom('ES_OA')]...\n\nNão... não tenho tempo para isso! Tenho coisas a fazer!\n\nQuando tento dar um passo, desabo no chão. Abro a boca para pedir ajuda, mas o único som que sai de mim é um gemido abafado.\n\nA dor no peito aumenta."
 stress_threshold.3301.desc_woman: "O primeiro sinal de que algo está errado é uma azia que não passa. Tento todos os remédios: lã macia sobre o abdômen, caminhadas tranquilas…\n\nDe repente, não consigo respirar fundo e cambaleio em busca de apoio. O quê... o que está acontecendo?! Tento pedir socorro, mas tudo o que consigo é um suspiro de dor.\n\n#EMP Duele!#!. Uma dor aguda se espalha de entre minhas escápulas pelo braço esquerdo, e, à medida que a dor aumenta, eu desabo no chão.\n\nA escuridão se segue rapidamente."
 stress_threshold.3301.a: "#EMP #DIE1 Ugh...!#!#!"
