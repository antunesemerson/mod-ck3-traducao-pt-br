 sex_scene.0001.t: "Um Momento Juntos"
 sex_scene.0001.opening_1: "[second.Custom('ES_LoLa')|U] abraço, seu corpo ansioso contra o meu, seu hálito pesado em meu ouvido."
 sex_scene.0001.opening_2: "Pele contra pele – nenhuma barreira existe entre nossos corpos enquanto buscamos um ao outro."
 sex_scene.0001.opening_3: "Seus olhos ardem de desejo enquanto se fixam nos meus, percorrendo meu corpo enquanto minhas roupas caem."
 sex_scene.0001.opening_4: "“Mostra-me como você se sente”, sussurra [second.Custom('ES_ElElla')] respirando pesadamente enquanto desamarra meu [ROOT.GetCharacter.Custom('GetClothingArticle')]."
 sex_scene.0001.opening_5: "À medida que a pele suave é libertada do tecido, uma onda de desejo súbito e forte me percorre."
 sex_scene.0001.opening_6: "Sua boca, aqueles lábios macios, aquela língua exploradora. Seus olhos sorriem para mim."
 sex_scene.0001.opening_7: "Ao ver[second.Custom('ES_LoLa')] diante de mim, a vontade é forte demais para controlar."
 sex_scene.0001.opening_8: "Nenhum som jamais inspirou tanto desejo em mim quanto as palavras que me sussurra ao ouvido."
 sex_scene.0001.second_1: "Sinto a pele arder com a ânsia de seu toque."
 sex_scene.0001.second_2: "[second.Custom('ES_ElElla')|U] sussurra meu nome cada vez mais alto à medida que nossos movimentos se tornam mais frenéticos."
 sex_scene.0001.second_3: "Entre beijos apaixonados, respiração pesada e batimentos cardíacos, não há fronteira entre o prazer dele/dela e o meu."
 sex_scene.0001.second_4: "Põe uma mão suave ao redor do meu pescoço, trazendo meus lábios para mais perto. Por um momento, resisto, mas apenas por um momento."
 sex_scene.0001.second_5: "Não há hesitação, nenhum atraso, nenhum tempo para gentileza. Há apenas meu desejo."
 sex_scene.0001.second_6: "Percorrer seu corpo com suaves toques dos meus dedos faz com que se contorça e se remexa sob meu toque, arqueando-se para obter mais."
 sex_scene.0001.second_7: "Nossos desejos doloridos se encontram, e com um empurrão suave, nos tornamos um só."
 sex_scene.0001.second_8: "[second.Custom('ES_ElElla')|U] se esfrega contra mim, seu corpo implorando por algum tipo de alívio."
 sex_scene.0001.second_9: "Guia minha mão entre suas pernas para me mostrar o quão [second.Custom('wet_hard')] está seu corpo."
 sex_scene.0001.third_1: "A intensidade nos consome ambos, o mundo girando em um eixo centrado neste momento."
 sex_scene.0001.third_2: "Eu sei que, neste momento, [second.Custom('ES_ElElla')] é meu[second.Custom('ES_OA')] e só meu[second.Custom('ES_OA')]…"
 sex_scene.0001.third_3: "Arrepios surgem em sua pele quando deixo meus dedos deslizarem suavemente por seu corpo. Logo, o toque se torna mais firme e mais faminto. Aderindo."
 sex_scene.0001.third_4: "Eu continuo, além de qualquer ponto de exaustão ou razão; não há nada além de nós dois."
 sex_scene.0001.third_5: "Ninguém nunca me fez sentir assim antes. [second.Custom('ES_ElElla')|U] me sorri. Ele sabe."
 sex_scene.0001.third_6: "Achei que saberia como apagar este fogo, mas [second.Custom('ES_ElElla')] faz com que arda cada vez mais forte, até que fique maior do que qualquer um pode suportar."
 sex_scene_ending_location: "[ROOT.Char.Custom2('sex_scene_ending_location' , SCOPE.sC('second') )]"
 sex_scene_ending_random: "[ROOT.Char.Custom2('sex_scene_ending_random' , SCOPE.sC('second') )]"
 sex_scene.0001.last_1: "Depois, acaricio suavemente seu corpo com minha mão."
 sex_scene.0001.last_2: "[second.Custom('ES_ElElla')|U], encharcad[second.Custom('ES_OA')] em suor de nós dois, cede e desaba sobre mim."
 sex_scene.0001.last_3: "Quando finalmente nos separamos, vejo as lembranças de prazer passarem diante de seu olhar, um reflexo do meu."
 sex_scene.0001.last_4: "Com um último beijo, consumidor de tudo, termina. Este momento voltará em sonhos pelo resto da minha vida."
 sex_scene.0001.last_5: "[second.GetSheHe|U] se mostra quase tímid[second.Custom('ES_OA')] quando nos separamos. Um contraste encantador com a paixão que acabamos de compartilhar."
 sex_scene.0001.last_6: "Quando [second.Custom('ES_ElElla')] se afasta, lança um olhar por cima do ombro para mim e morde o lábio em um sorriso carinhoso."
 sex_scene.0001.a: "Até a próxima vez, [second.GetFirstNameNoTooltip]."
