 #Garden
 sex_scene.0003.opening_garden_1: "Meu [second.Custom2('RelationToMe', SCOPE.sC('second'))] veio até mim enquanto eu passeava pelos jardins. O aroma de sua pele se mistura com a doçura das flores."
 sex_scene.0003.conclusion_garden_1: "[second.GetSheHe|U] me deixou satisfeit[ROOT.Char.Custom('ES_OA')] e descansad[ROOT.Char.Custom('ES_OA')] atrás de uma sebe."
 #Private chambers
 sex_scene.0003.opening_private_chambers_1: "Com o coração disparado, abro a porta para que [second.Custom('ES_ElElla')] entre em meus aposentos privados."
 sex_scene.0003.conclusion_private_chambers_1: "Horas depois, ainda estávamos traçando padrões com dedos acariciantes, escrevendo mensagens de amor na pele um do outro."
 #The Stables
 sex_scene.0003.opening_stables_1: "Teria sido um escândalo se tivessem me pegado com meu [second.Custom2('RelationToMe', SCOPE.sC('second'))], mas naquela noite não havia mais ninguém nos estábulos."
 sex_scene.0003.conclusion_stables_1: "Só espero que nossos gemidos de paixão tenham sido abafados pelos pisoteios e relinchos dos cavalos."
 #A copse
 sex_scene.0003.opening_copse_1: "Encontrei com meu [second.Custom2('RelationToMe', SCOPE.sC('second'))] em uma pequena mata não muito longe de sua residência. O coração me retumbava, embora eu soubesse que ninguém nos veria ali…"
 sex_scene.0003.conclusion_copse_1: "Durante um tempo depois que [second.Custom('ES_ElElla')] se foi, fiquei deitad[ROOT.Char.Custom('ES_OA')] sobre a grama, ainda guardando seu calor."
 #The kitchen
 sex_scene.0003.opening_kitchen_1: "Um servo poderia entrar na cozinha a qualquer momento! Quase protestei quando [second.Custom('ES_ElElla')] me puxou em direção a uma bancada, puxando minha [second.Custom('GetClothingArticle')]. Mas só quase."
 sex_scene.0003.conclusion_kitchen_2: "Horas mais tarde ainda conseguia sentir a viscosidade do creme que [second.Custom('ES_ElElla')] derramou sobre meu peito."
 sex_scene.0003.conclusion_kitchen_3: "Foi uma emoção tão intensa, por mais breve que tenha sido. Eu posso pular a sopa de amanhã, no entanto."
