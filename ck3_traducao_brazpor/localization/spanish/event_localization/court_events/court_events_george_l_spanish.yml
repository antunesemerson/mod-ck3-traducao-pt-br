l_spanish:
 ### Events
 ## Court Event 7030
 #Foreign Merchants wish to establish a merchant quarter
 court.7030.title: "Mercadores Estrangeiros"
 court.7030.desc: "Al dar una vuelta por la corte, veo a mi [ROOT.Char.GetCouncillorPosition( 'councillor_steward' ).GetPositionName], [steward.GetTitledFirstName|l], en animada conversación con un[foreign_merchant.Custom('ES_OA')] de mis invitad[foreign_merchant.Custom('ES_OA')]s extranjer[foreign_merchant.Custom('ES_OA')]s, [foreign_merchant.GetName]. Por curiosidad me acerco a la pareja.\n\n«[ROOT.Char.GetTitledFirstNameNoTooltip|l], represento los intereses de un grupo mercantil de mis paisanos [foreign_merchant.GetCulture.GetCollectiveNounNoTooltip], que ven gran potencial en fundar una comunidad comerciante [foreign_merchant.GetCulture.GetName] aquí en [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTier]», expone servilmente [foreign_merchant.GetNameNoTooltip].\n\n[steward.GetFirstNameNoTooltip] protesta «[ROOT.GetCharacter.Custom2('RelationToMeShort' , SCOPE.sC('steward'))|U], ¡no debemos favorecer a los #EMP extranjeros#! por encima de nuestra gente!»."
 court.7030.a: "Fundaremos uma comunidade mercante de [foreign_merchant.GetCulture.GetNameNoTooltip]."
 court.7030.b: "Um acordo pode ser firmado aqui."
 court.7030.c: "Vamos expandir as áreas mercantis para todos!"
 court.7030.d: "[foreign_merchant.GetCulture.GetCollectiveNounNoTooltip] não devem explorar nossos mercados!"
 court.7030.d.tt: "Expulse [foreign_merchant.GetFirstNameNoTooltip] de nosso domínio e tome legitimamente o ouro que ele surrupiou de nossos próprios mercadores!"
 ### Court Event 7040
 court.7040.title: "Pilar da Comunidade"
 court.7040.desc: "Percebi que meu [ROOT.Char.GetCouncillorPosition( 'councillor_court_chaplain' ).GetPositionName|l] anda de um lado para outro nervosamente pelo salão.\n\n"[chaplain.GetName], o que está acontecendo?", pergunto.\n\n"É sobre [ascetic.GetName], meu [ROOT.Char.GetLadyLord]. Ele/ela passou a subir todas as manhãs em uma coluna no pátio do palácio e permanecer ali o dia todo em tranquila contemplação. Recusa comida e bebida, e fala relativamente pouco quando questionado. Práticas ascéticas como essas não são desconhecidas, mas isso está incomodando alguns membros de sua corte, e estão me pedindo que faça algo a respeito"."
 court.7040.a: "Não dê atenção a ela; vai superar isso eventualmente."
 court.7040.b: "Enviai[ascetic.GetHerHim] a [head_of_faith.Custom('ES_ElLa')] [head_of_faith.GetTitledFirstNameNoTooltip|l], para ver o que ele/ela acha disso."
 court.7040.c: "A piedade de [ascetic.GetNameNoTooltip] é inspiradora, imitarei seu exemplo!"
 court.7040.d: "Se quer viver em isolamento, pode fazê-lo em outro lugar!"
 ### Court Event 7050 - Friend gifts you a cultural artifact from their time
 court.7050.title: "Um Presente de um Amigo"
 court.7050.desc: "Mientras continúan los asuntos en la corte, me alegra ver la cara de mi amig[friend.Custom('ES_OA')], [friend.GetName] entre las decenas de intrigantes y aduladores. Saludo cálidamente a [friend.GetFirstNameNoTooltip] y converso libremente con [friend.GetHerHim] como he podido hacer poca gente. A mitad de la conversación, [friend.GetName] saca una bolsita de sus ropas y me la pone en la mano. \n\n«Un regalo para vos, amig[ROOT.Char.Custom('ES_OA')] mí[ROOT.Char.Custom('ES_OA')], algo para que recordéis los buenos tiempos. Es especial para mí y para mi pueblo, los [friend.GetCulture.GetCollectiveNoun]. Espero que lo aceptes.»"
 court.7050.a: "Claro, meu amigo, [friend.Custom('ES_OA')] sempre o levarei comigo!"
 court.7050.a.tt: "Isso pode ter consequências não intencionais..."
 court.7050.b: "\"Você é muito gentil, aceito seu presente!\""
 court.7050.c: "Os meus são os [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip], não os [friend.GetCulture.GetCollectiveNounNoTooltip]! Rejeito seu presente"
 court.7051.title: "Símbolos Hereges?"
 court.7051.desc: "Desde que recibí [court_7050_artifact.GetName] como regalo de [friend.GetName], he llevado tal objeto siempre encima. Imagino que alguien en la corte debe de haberse dado cuenta porque se me ha acercado mi [court_chaplain.GetCouncilTitle|l] [court_chaplain.GetName], ¡que expresa su preocupación por si me aparta de la fe verdadera!\n\n«He notado que os ha dado por mostrar afecto hacia símbolos y objetos heréticos. Tales cosas se asocian con los cultos [ROOT.Char.Custom('GetDerogatoryNonbelieverPlural')]. Se suele decir que [court_chaplain.GetFaith.DevilName] llega a nosotros bajo la guisa de un amigo, solo para hacer que nos perdamos»."
 court.7051.a: "Fui enganado por [ROOT.Char.GetFaith.DevilName]!"
 court.7051.a.tt: "Apoie os [court_chaplain.GetFaith.GetAdherentNamePlural] em detrimento do seu amigo."
 court.7051.b: "Símbolos? Ícones? Do que você está falando?"
 court.7051.b.tt: "Finja ignorância sobre o artefato."
 court.7051.c: "Você não consegue distinguir entre cultura e fé?"
 court.7051.c.success: "Você convence [court_chaplain.GetNameNoTooltip]"
 court.7051.c.failure: "Você não consegue convencer [court_chaplain.GetNameNoTooltip]"
 court.7051.d: "Vá embora! Confio que [friend.GetNameNoTooltip] não vai me conduzir ao caminho errado!"
 ### Court Event 7070 - Architect wishes to give your palace a makeover
 court.7070.title: "Potencial Palaciano"
 court.7070.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], tenho estado falando sobre o estado atual do seu palácio em [palace_county.GetName] com seus cortesãos que estiveram hospedados lá. Como $royal_architect_court_position$ de sua corte, eu estaria faltando com meu dever se não o informasse de que esse palácio está em grande necessidade de reforma!", declara [architect.GetName].\n\n"Eu me perguntava, [ROOT.Char.Custom2('RelationToMeAddress',architect)], se poderíamos também aproveitar a oportunidade para reformar drasticamente toda a decoração e o estilo do palácio, talvez nos afastando da arquitetura clássica [ROOT.Char.GetCulture.GetName]. Tudo o que preciso é financiamento e algum tempo para rascunhar algumas ideias", pede [architect.GetFirstNameNoTooltip]."
 court.7070.a: "Excelente sugestão, você pode elaborar planos."
 court.7070.a.tt: "[architect.GetFirstNameNoTooltip] buscará inspiração em outras [cultures|lE] ao planejar a reforma do palácio e lhe apresentará opções que podem aumentar a [cultural_acceptance|lE] em relação a outras [cultures|lE]."
 court.7070.b: "Tal extravagância é desnecessária, simples reformas serão suficientes."
 court.7070.c: "O palácio está bem como está!"
 court.7071.title: "Arquitetura da Imitatio"
 court.7071.desc: "Tal como prometido, [architect.GetName] voltou com três planos detalhados para a proposta de reforma do palácio de [palace_county.GetName].\n\n\"Me inspirei em estilos [culture_option_1.GetProvince.GetCounty.GetCulture.GetCollectiveNoun] para o primeiro projeto, [culture_option_2.GetProvince.GetCounty.GetCulture.GetCollectiveNoun] para o segundo, e para o plano final mantive os estilos [ROOT.Char.GetCulture.GetCollectiveNoun] como influência principal, [ROOT.Char.Custom2('RelationToMeAddress',architect)]\".\n\nPelo que vejo, os três projetos parecem ser muito caros e incorporam novas adições, bem como reformas na estrutura existente; é improvável que seja um trabalho rápido ou barato."
 court.7071.a: "Vamos com o design [culture_option_1.GetProvince.GetCounty.GetCulture.GetNameNoTooltip]."
 court.7071.continue: "O projeto continua..."
 court.7071.b: "Vamos usar o design [culture_option_2.GetProvince.GetCounty.GetCulture.GetNameNoTooltip]."
 court.7071.c: "Este palácio será um monumento à superioridade [ROOT.Char.GetCulture.GetNameNoTooltip]!"
 court.7071.d: "Isso é demais, aborte o projeto."
 court.7072.title: "Renovações do Palácio Concluídas!"
 court.7072.desc.other_culture: "Tras meses de trabajo, me han informado de que el trabajo de construcción en el palacio de [palace_county.GetName] ya está terminado y he ido a [palace_county.GetNameNoTooltip] con mi $royal_architect_court_position$ [architect.GetName] para inspeccionar los resultados en persona.\n\nMientras contemplo el nuevo palacio, y luego me dirijo al interior, [architect.GetFirstNameNoTooltip] permanece a mi lado, esperando ansiosamente elogios y mecenazgo. Tras examinar el palacio con sus estilos poco familiares y su decoración extranjera, proclamo que es…"
 court.7072.desc.own_culture: "Tras meses de trabajo, me han informado de que el trabajo de construcción en el palacio de [palace_county.GetName] ya está terminado y he ido a [palace_county.GetNameNoTooltip] con mi $royal_architect_court_position$ [architect.GetName] para inspeccionar los resultados en persona. Mientras contemplo el nuevo palacio, y luego me dirijo al interior, [architect.GetFirstNameNoTooltip] permanece a mi lado, esperando ansiosamente elogios y mecenazgo. Tras examinar el palacio, con sus estilos familiares y su decoración tranquilizadora, proclamo que es…"
 court.7072.a: "\"Magnífico, verdadeiramente magnífico!\""
 court.7072.b: "\"Uma aberração, eu odeio isso!\""
 court.7072.c: "\"Aceitável, mas valerá a despesa?\""
 ## Exotic Pet
 court.7100.title: "Fera Capturada"
 court.7100.desc: "Sabe-se que na minha corte aconteceram todo tipo de acontecimentos estranhos, mas ver meu $master_of_hunt_court_position$ [huntmaster.GetFirstName] entrar em minha sala do trono com um #EMP [SCOPE.Custom('GetExoticPet')|l]#! preso a uma corrente, sinceramente, não era algo que eu teria previsto.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], apresento a Vossa Senhoria esta bela fera como presente, um prêmio da minha última caçada. #EMP Todos#! os governantes de hoje em dia têm animais exóticos para enfeitar sua corte e demonstrar sua majestade".\n\nEstá claro que [huntmaster.GetFirstNameNoTooltip] quer que eu fique com essa coisa!"
 court.7100.a: "O que eu faria com [SCOPE.Custom('GetExoticPet')]?"
 court.7100.a.tt: "Ordene a [huntmaster.GetFirstName] que se livre do animal imediatamente!"
 court.7100.b: "Esta fera será meu animal de estimação adorado!"
 court.7100.c: "Por que não #EMP você #! fica com ela em vez disso?"
 ## Court Musician Racket
 court.7200.title: "Alto e Orgulhoso"
 court.7200.intro.desc: "Eu me orgulho do luxo de minha corte, mas por várias noites, esse luxo tem se transformado em uma tortura musical exquisita."
 court.7200.drum.desc: "\n\nRecentemente, m $court_musician_court_position$ [loud_musician.GetFirstName] adquiriu um novo instrumento, algum tipo de tambor, e tem batido nele alto o tempo todo, seja de dia ou de noite."
 court.7200.trombone.desc: "\n\nRecentemente, m $court_musician_court_position$ [loud_musician.GetFirstName] obteve um novo instrumento, algum tipo de trombone de latão, e tem tocado-o alto o tempo todo, seja de dia ou de noite."
 court.7200.pipes.desc: "\n\nRecentemente, m $court_musician_court_position$ [loud_musician.GetFirstName] adquiriu um novo instrumento, algum tipo de conjunto de tubos, e tem tocado-o desafinadamente o dia e a noite toda."
 court.7200.guitar.desc: "\n\nRecentemente, m $court_musician_court_position$ [loud_musician.GetFirstName] obteve um novo instrumento, uma cítola eu acredito, e tem tocado-o alto o tempo todo, seja de dia ou de noite."
 court.7200.outro.desc: "\n\nAo confrontar [loud_musician.GetFirstNameNoTooltip], diz: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], estou apenas praticando minha arte, para que eu possa ser o $court_musician_court_position$ que você merece!"."
 court.7200.a: "Apenas diminua a música durante a noite?"
 court.7200.b: "Leve sua #EMP arte #! e suma daqui!"
 court.7200.c: "Se sua música fosse melhor, não reclamaríamos!"
 #Food Taster Displeased
 court.7300.t: "Onde Está o Molho de Cordeiro?"
 court.7300.desc: "Cabe esperar que quieran atentar contra mí y, por lo tanto, las personas en las que confío para la seguridad me deben ser leales y tener una buena disposición hacia mí. Hoy, sin embargo, mi $food_taster_court_position$ oficial, [taster.GetFirstName], parece muy disgustad[taster.Custom('ES_OA')], y algo indispuest[taster.Custom('ES_OA')], cuando me dirijo a [taster.Custom('ES_ElElla')].\n\n «[ROOT.Char.Custom('FormOfAddressForLiege')|U], no puedo soportarlo más. ¡La comida que sirven en vuestra corte es realmente #EMP infame#!! No me puedo creer que comáis estas gachas #EMP una noche tras otra…».#!\n\n«¡Esta porquería no es apta ni para la mesa de un campesino!»."
 court.7300.a: "#EMP Mesa de camponês? #! Precisamos resolver isso imediatamente!"
 court.7300.b: "A comida está boa, do que você está falando?"
 court.7300.c: "Ótimo, vou encontrar outra pessoa para ser paga para comer minha comida!"
 ## Troublesome Guests
 court.7400.title: "Excedendo a Hospitalidade?"
 court.7400.desc: "Mi corte se ha hecho famosa por el lujoso nivel de hospitalidad que ofrece y los huéspedes aquí a menudo demuestran ser… útiles.\n\nSin embargo, en ocasiones recibimos invitados #EMP redundantes#!, cuyo propósito no está claro y cuya presencia es una sangría innecesaria para mi tesorería.\n\nUn[guest.Custom('ES_OA')] de esos gorrones es [guest.GetFirstName], que lleva un tiempo aquí como invitad[guest.Custom('ES_OA')] de [guest_liege.GetTitledFirstName|l] y parece comer por doce.\n\nEs[guest.Custom('ES_EA')] [guest.GetWomanMan] me está dejando sin casa a bocados. #EMP Hay#! que hacer algo."
 court.7400.a: "Que fique."
 court.7400.a.tt: "Certamente eles terão utilidade em algum momento, não é mesmo?"
 court.7400.b: "Conheço a função perfeita para [guest.GetSheHe]…"
 court.7400.b.tt: "[guest.GetHerHim|U] emprega em algum cargo menor na sua corte."
 court.7400.c: "Miséravel parasit[guest.Custom('ES_OA')], volte de onde veio!"
 ## Child starts to go hunting
 court.7600.t: "Indomável por Coração"
 court.7600.desc: "Mi [child.Custom('GetDaughterSon')] [child.GetName] entra en el salón del trono con la cara cubierta de barro y sangre. Me levanto consternad[ROOT.Char.Custom('ES_OA')] y voy a reprender[child.GetHerHim] por su incorrección, cuando entra a zancadas [huntmaster.GetFirstName], que ostenta el puesto de $master_of_hunt_court_position$, igual de manchad[huntmaster.Custom('ES_OA')] de sangre y barro, pero con una sonrisa de oreja a oreja.\n\n«[ROOT.Char.Custom('FormOfAddressForLiege')|U], ¡[child.Custom('ES_ElLa')] [child.GetTitledFirstNameNoTooltip|l] aquí presente abatió a un poderoso ejemplar de [child.Custom('GetAnimalType')] en nuestra cacería! Tal vez la mejor pieza que he visto este año».\n\nAsumo que sus lecciones de caza van bien, pero no puedo evitar preguntarme si no habrá formas más productivas de invertir su tiempo…"
 court.7600.a: "Essas saídas serão substituídas por estudos mais proveitosos."
 court.7600.b: "Hum… talvez devamos colocar mais à prova meu [child.Custom('GetDaughterSon')]…"
 court.7600.b.tt: "Instrua [huntmaster.GetNameNoTooltip] a levar [child.GetNameNoTooltip] ao limite em outra caçada."
 court.7600.b.death: "[child.GetNameNoTooltip] morre durante a caçada"
 court.7600.b.wounding: "[child.GetNameNoTooltip] ferid[child.Custom('ES_OA')] na caçada"
 court.7600.b.victory: "Caçada bem-sucedida para [child.GetNameNoTooltip]"
 court.7600.c: "Eu não poderia estar mais orgulhoso!"
 7600_taking_child_to_hunt: "Levando Crianças para Caçar"
 7600_taking_child_to_hunt.tt: "Levar uma criança para caçar com segurança é uma responsabilidade que exige grande experiência. A [aptitude|lE] do seu $master_of_hunt_court_position$ aumenta."
 ## Child wants a destrier
 court.7610.title: "Um Pedido Estável"
 court.7610.desc: "Meu [child.Custom('GetDaughterSon')] [child.GetName] está crescendo e espera-se que um dia assuma um lugar elevado na sociedade. Pelo visto, decidiu que esse dia é hoje.\n\n[ROOT.Char.GetMotherFather|U], posso ter um destrier?\n\n #EMP Um cavalo de guerra?#! Para o meu #EMP [child.Custom('GetDaughterSon')]?!#! Enquanto reflito sobre o pedido, noto $master_of_horse_court_position$ [horsemaster.GetName] me olhando do outro lado da sala do trono.\n\nAo menos agora sei com quem meu [child.Custom('GetDaughterSon')] tem falado ultimamente…"
 court.7610.a: "Uma escolha audaciosa!"
 court.7610.b: "Que tal algo... menor?"
 court.7610.c: "N?o seja rid?cul[child.Custom('ES_OA')]."
 ## Negotiation over a falcon
 court.7620.title: "Pássaros de Penas Douradas"
 court.7620.desc: "En los flancos de mi salón del trono, puedo oír [huntmaster.Custom('ES_AlAla')] $master_of_hunt_court_position$ [huntmaster.GetName] enfrascad[huntmaster.Custom('ES_OA')] en una intensa negociación con [falconer.GetName] sobre la venta de un hermoso halcón peregrino, un ave de gran prestigio para cualquiera.\n\n[huntmaster.GetFirstNameNoTooltip] parece estar atascad[huntmaster.Custom('ES_OA')] en el regateo del precio, pues el cetrero se niega a ceder. Por la frustración en sus voces, llevan ya un #EMP rato#!,\n\nQuizás aprecien la intervención de su [ROOT.Char.GetTitleAsNameNoTooltip]… casi tanto como yo apreciaría una nueva ave."
 court.7620.a: "[falconer.GetFirstNameNoTooltip], você sabe que está pedindo demais!"
 court.7620.a.success: "Você consegue negociar com sucesso com [falconer.GetShortUINameNoTooltip]"
 court.7620.a.failure: "Você não consegue negociar com sucesso com [falconer.GetShortUINameNoTooltip]"
 court.7620.b: "Venha, farei uma oferta melhor para você."
 court.7620.c: "Apenas mantenha-o fora da minha sala do trono, está bem?"
 ## Argument over a hawking kill
 court.7630.title: "Aves de Rapina"
 court.7630.desc: "La caza parece sacar lo peor de mi círculo interno de cortesanos. Mi $master_of_horse_court_position$ [horsemaster.GetName] y mi $master_of_hunt_court_position$ [huntmaster.GetName] volvieron hace poco de una cacería y ahora discuten acaloradamente en mitad de mi salón del trono.\n\n«¡Mi ave lo sacó, así que debió matarlo!» chilla [horsemaster.GetFirstNameNoTooltip].\n\n «¡Mi ave tenía el cuerpo, así que no hay duda que la gloria es mía!», grita [huntmaster.GetFirstNameNoTooltip].\n\nParecen rabiosos por saber cuál es el halcón responsable de una pieza."
 court.7630.a: "A vitória pertence a [horsemaster.GetFirstNameNoTooltip]."
 court.7630.b: "Isso foi um sucesso d [huntmaster.GetFirstNameNoTooltip]."
 court.7630.c: "Por que vocês dois não podem compartilhar esse triunfo?"
 court.7630.c.tt: "Tente convencer o [horsemaster.GetShortUIName] e o [huntmaster.GetShortUIName] de que ambos são vencedores:"
 court.7630.c.success: "Você consegue encontrar o meio-termo com sucesso"
 court.7630.c.failure: "Você só piora as coisas"
 ## Courtier Abused their Bird
 court.7640.title: "Abuso Aviário"
 court.7640.desc: "«¡Apresad[avian_abuser.GetHerHim]!», brama mi $master_of_hunt_court_position$ [huntmaster.GetFirstName], y señala a [avian_abuser.GetName]. Mi guardia personal avanza vacilante, sin saber si seguir las órdenes de [huntmaster.GetFirstNameNoTooltip]. Alzo la mano para detenerlos y le pregunto a [huntmaster.GetFirstNameNoTooltip] qué motivo tiene para causar esta conmoción.\n\n«¡[ROOT.Char.Custom('FormOfAddressForLiege')|U], este #EMP monstruo#! hirió a propósito a su halcón en la última cacería! Debe ser castigad[avian_abuser.Custom('ES_OA')] con severidad, el honor lo #EMP exige#!»."
 court.7640.a: "É só um pássaro, deixe-o ir."
 court.7640.b: "Prendam esse[avian_abuser.Custom('ES_EA')] #EMP granuja!#!"
 court.7640.c: "Multem es[avian_abuser.Custom('ES_EA')] #EMP bellac[avian_abuser.Custom('ES_OA')]!#!"
 court.7640.d: "Açoitem es[avian_abuser.Custom('ES_EA')] #EMP perr[avian_abuser.Custom('ES_OA')]#!"
 ## Spymaster has a reverse carrier pigeon
 court.7700.t: "Aventure-se"
 court.7700.desc: "Hoje, no ombro de [spymaster.Custom2('MyCharacterIntroduction', ROOT.Char)] repousa um corvo de aparência curiosa. [spymaster.GetFirstNameNoTooltip] aproveita o burburinho do salão do trono para esconder nossa conversa de ouvidos curiosos e me explicar as incríveis qualidades da ave.\n\n"É uma ladra consumada, meu senhor[ROOT.Char.Custom('ES_XA')]. Ela não rouba ouro nem joias, mas bilhetes, chaves e cartas — coisinhas que carregam verdades incômodas que seus donos desejam ocultar"."
 court.7700.a: "Ladrão[eunuch.Custom('ES_OnOna')]! Guardas, prendam esse[eunuch.Custom('ES_EA')] canalha!"
 court.7700.b: "Vocês poderiam descobrir mais sobre [scheme.GetTargetCharacter.Custom('ES_ElLa')] [scheme.GetTargetCharacter.GetTitledFirstNameNoTooltip|l]?"
 court.7700.b.tt: "Aproveite isso para ajudar seu [scheme.GetName] em andamento."
 court.7700.c: "Que enganação deliciosamente traiçoeira..."
 court.7700.d: "Tal trapaça está abaixo de mim."
