l_spanish:
 court.0101.t: "Bandido na Corte"
 court.0101.desc.opening: "Trouxeram um[lowborn_criminal.Custom('ES_XA')] prisioneir[lowborn_criminal.Custom('ES_OA')] [lowborn_criminal.GetName] perante [executioner.GetName] por..."
 court.0101.desc.murderer: "um assassinato indescritível!\n\n"
 court.0101.desc.deviant: "atos de bestialidade e vícios impuros!\n\n"
 court.0101.desc.witch: "atos de maldade e crimes contra [lowborn_criminal.GetFaith.HighGodName]!\n\n"
 court.0101.desc.lazy: "desobedecendo as ordens de seu mestre. Como aprendiz do pedreiro da vila, [lowborn_criminal.GetName] foi acusado de responder de forma insolente ao seu mestre, desobedecer ordens e até mesmo desafiar a perícia de seu mestre."
 court.0101.desc.thief: "inúmeros atos de roubo por todo o reino.\n\n Esse bandido sugou até a última gota deste grandioso [ROOT.Char.GetPrimaryTitle.GetName] com suas apropriações de propriedades da coroa, como pão, vegetais e até mesmo roupas!"
 court.0101.desc.sumptuary: "violar a lei suntuária de [ROOT.Char.GetTitleAsNameNoTooltip].\n\n Foi visto usando todo tipo de tecidos berrantes e antiestéticos e roupas desalinhadas. Mais do que um crime contra [ROOT.Char.GetTitleAsNameNoTooltip], é um crime contra a decência comum."
 court.0101.desc.cannibal: "[lowborn_criminal.GetName] e sua família viviam em uma caverna perto de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] e atraíam viajantes com a promessa de comida e abrigo. Acredita-se que foi assim que sua família devorou mais de mil viajantes. Os moradores de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] exigem justiça."
 court.0101.desc.sadistic: "Tal criminoso abriu a garganta do moleiro e saqueou sua casa. Além disso, obrigou a esposa do moleiro a preparar ovos para ele, que ele passou a comer sobre o corpo do falecido moleiro, enquanto forçava a esposa a se juntar a [lowborn_criminal.GetSheHe]."
 court.0101.desc.priest: "Um[lowborn_criminal.Custom('ES_XA')] [lowborn_criminal.GetFaith.PriestNeuter], [lowborn_criminal.GetName], assassinou um membro de seu próprio rebanho. Tal miserável tentou obter perdão das autoridades [lowborn_criminal.GetFaith.GetAdjective] para que lhe concedessem o perdão, mas os guardas [lowborn_criminal.GetHerHim] o pegaram ao tentar entrar novamente em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] e prenderam prontamente esse [lowborn_criminal.GetFaith.PriestNeuter] malign[lowborn_criminal.Custom('ES_OA')]."
 court.0101.desc.stableboy: "[lowborn_criminal.GetName] foi peg[lowborn_criminal.Custom('ES_OA')] em flagrante em atos explícitos com meu [lowborn_criminal.Custom('servant_for_romance')]. Não é apenas um ato de infidelidade, é um insulto à honra da casa de [ROOT.Char.GetHouse.GetBaseNameNoTooltip]!"
 court.0101.desc.kinky: "Encontraram [lowborn_criminal.GetName] acorrentad[lowborn_criminal.Custom('ES_OA')] a um poste, cobert[lowborn_criminal.Custom('ES_OA')] de papa da cabeça aos pés com um aparelho feio preso às suas partes íntimas. As feridas em seu corpo indicam lesões pelo puro prazer e meu prisioneir[lowborn_criminal.Custom('ES_OA')] não parece nada dispost[lowborn_criminal.Custom('ES_OA')] a se envergonhar de seus desejos antinaturais."
 court.0101.desc.animals: "Meu/minha prisioneir[lowborn_criminal.Custom('ES_OA')] foi peg[lowborn_criminal.Custom('ES_OA')] em pleno cometimento de atos profanos com um animal de seu rebanho, um cavalo e um favo de mel. Tal ato de desvio desafia a vontade de [lowborn_criminal.GetFaith.HighGodName]. Não é apenas um crime contra a natureza, mas contra a decência e o bom senso!"
 court.0101.desc.baby_soup: "As pessoas da cidade de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] denunciaram [lowborn_criminal.GetName] pelo ato indescritível de ferver vivos os próprios filhos recém-nascidos junto com ervas e legumes. Esse ato monstruoso era uma tentativa de prolongar sua vida de forma antinatural!"
 court.0101.desc.suspicious_healer: "Acusaram [lowborn_criminal.GetName], que, como curandeiro[lowborn_criminal.Custom('ES_XA')] utilizou magia vil para trazer a morte aos doentes e idosos de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. As maldades de [lowborn_criminal.GetName] são tantas que não podem ser contadas, o que lhe rendeu o apelido de "Anjo de [lowborn_criminal.GetFaith.DeathDeityName]"."
 court.0101.desc.devil_worshiper: "Acreditava-se que [lowborn_criminal.GetName] era uma pessoa piedosa porque mantinha um santuário privado em seus aposentos, mas, ao ser inspecionado, descobriu-se que não adorava a [lowborn_criminal.GetFaith.HighGodName], mas sim a [lowborn_criminal.GetFaith.WitchGodName], e fazia sacrifícios profanos em seu nome!"
 court.0101.desc.outro: "\n\n[executioner.GetName] insiste em que está horrorizad[executioner.Custom('ES_OA')] com est[lowborn_criminal.Custom('ES_EA')] pecador[lowborn_criminal.Custom('ES_XA')] e lhe pergunta o que deve ser feito com este indivíduo deplorável."
 court.0101.a.cannibal: "Corte a família inteira para alimentar os cães."
 court.0101.a.sadistic: "Algumas voltas na roda [lowborn_criminal.Custom('ES_LoLa')] endireitarão."
 court.0101.a.priest.sky: "Deixe os abutres se banquetearem com o corpo... viv[lowborn_criminal.Custom('ES_OA')]."
 court.0101.a.priest: "Sepult[lowborn_criminal.Custom('ES_LoLa')] da maneira adequada... viv[lowborn_criminal.Custom('ES_OA')]."
 court.0101.a.stableboy: "Remova suas partes íntimas e alimente os cavalos com elas."
 court.0101.a.kinky: "Que se [lowborn_criminal.GetHerHim] açoite em público até a morte."
 court.0101.a.animals: "Queim[lowborn_criminal.GetHerHim] vivo com seu gado."
 court.0101.a.baby_soup: "Lançai[lowborn_criminal.Custom('ES_LoLa')] em um caldeirão de piche."
 court.0101.a.suspicious_healer: "Faça com que prove do seu próprio “remédio”."
 court.0101.a.devil_worshiper: "Talvez chamas abertas ajudem a se sentir mais perto de seu [lowborn_criminal.GetFaith.WitchGodMistressMaster]."
 court.0101.a: "Torturar até a morte é a única resposta."
 court.0101.b: "Faça com [lowborn_criminal.Custom('ES_ElElla')] o que quiser."
 court.0101.c.deviant: "Parece que ele/ela sabe como se divertir!"
 court.0101.c.beastiality: "E#EMP sim#!, um cavalo? É um[lowborn_criminal.Custom('ES_XA')] gênio criativ[lowborn_criminal.Custom('ES_OA')]!"
 court.0101.c: "![lowborn_criminal.GetNameNoTooltip] sabe como se divertir!"
 court.0101.d: "Prendam-no[lowborn_criminal.Custom('ES_LoLa')] , decidirei depois…"
 court.0102.t: "A Mancha Social da Execução"
 court.0102.desc: "Vejo [executioner.Custom2('MyCharacterIntroduction', ROOT.Char)] sentad[executioner.Custom('ES_OA')] com um olhar melancólico e, quando pergunto o que perturba sua mente sombria, ele suspira.\n\n “Veja, meu [ROOT.Char.GetLadyLord], todas as noites tenho que viajar muito longe de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] para dormir. Carrascos não têm permissão para entrar nos limites da cidade. Não é que eu não goste de torturar nem nada do tipo, mas um[executioner.Custom('ES_OA')] pode se sentir sol[executioner.Custom('ES_OA')] quando as únicas vozes que ouve são os gritos dos condenados”."
 court.0102.a: "Durma no castelo esta noite, amig[executioner.Custom('ES_OA')]."
 court.0102.b: "É uma vida difícil, mas alguém precisa vivê-la."
 court.0102.c: "Hah! Você não é mais digno de simpatia do que os ratos no meu esgoto!"
 court.0103.t: "Uma Oportunidade Macabra"
 court.0103.desc.opening: "[executioner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me chamou a atenção, pois ultimamente vem usando trajes cada vez mais caros e desfilando por aí feito um pavão.\n\nQuando [executioner.GetHerHim] pergunto a respeito, ele me sorri com seus dentes amarelados e diz que tem se apropriado dos bens de valor dos condenados."
 court.0103.desc.hair_and_teeth: "O negócio consiste em vender mechas de cabelo dos prisioneiros para fabricantes de bonecas, dentes para aqueles que não os têm e até mesmo globos oculares para os praticantes de bruxaria."
 court.0103.desc.jewelry: "Confessou que rouba peças de roupa e joias dos condenados e as vende, obtendo um bom lucro com as poucas posses que restam aos que estão nas masmorras. Até mesmo tem roubado dos corpos dos recém-falecidos!"
 court.0103.desc.meat: "Parece que está esquartejando os recém-falecidos e vendendo seus cortes no mercado como carne exótica! Afirma que essa é uma alternativa melhor do que conceder os ritos funerários aprovados, já que os condenados não são dignos de tais últimos pedidos."
 court.0103.desc.saint_bones: "Ele vem retirando carne e vísceras dos ossos de prisioneiros de baixa condição para vendê-los como artefatos falsificados, enganando visitantes estrangeiros e homens santos, que os compram como se fossem ossos de santos!"
 court.0103.desc.outro: "\n\nÉ óbvio que ele(a) vem lucrando bem com esse empreendimento, sem se importar com o que os outros possam pensar desse negócio monstruoso."
 court.0103.a: "Me inclua nisso e prometo que você terá mais prisioneiros!"
 court.0103.b: "Esse comércio macabro acaba agora!"
 court.0103.c: "Vou fingir que não ouvi isso."
 court.0104.t: "Uma Obsessão Doentia"
 court.0104.desc: ""Ooh! Ooh! Então o que você fez?". Ouço o tom alegre de meu querido[morbid_child.Custom('ES_OA')] pupilo[morbid_child.Custom('ES_OA')], [morbid_child.GetName], ecoando pelos salões de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Para minha surpresa, [morbid_child.GetHerHim] vejo olhando para [executioner.Custom2('MyCharacterIntroduction', ROOT.Char)] com uma espécie de admiração caprichosa que ainda não havia visto no meu [morbid_child.Custom('GirlBoy')]. "Eu acendi a chama e o rato começou a cavar direto no peito dele para escapar! Clássico, ele cantou como um rouxinol!". Meu carrasc[executioner.Custom('ES_OA')] solta um grito zombeteiro, para a diversão de meu [morbid_child.Custom('PetName')] [morbid_child.GetName]."
 court.0104.a: "Hilário! E então, o que aconteceu?"
 court.0104.b: "Essa fascinação sombria acaba agora!"
 court.0104.c: "Vou fingir que não ouvi nada."
 court.0106.t: "Teatros Sombrios para Feitos Sombrios"
 court.0106.desc: "Anoitece na corte, meu/minha carrasc[executioner.Custom('ES_OA')] sai de sua morada sombria e se apresenta à luz dos braseiros da corte. Sangue fresco mancha sua vestimenta esfarrapada e um par de alicates sujos lhe pinga na mão. "Meu [ROOT.Char.GetLadyLord], venho pensando ultimamente. Até onde posso ir ao fazê-los gritar?""
 court.0106.a: "Qualquer coisa para extrair uma confissão."
 court.0106.b: "Seja gentil com essas almas miseráveis."
 court.0106.c: "O que você faz naquele lugar terrível é problema seu."
 court.0107.t: "[unruly_child.GetNameNoTooltip] desesperad[unruly_child.Custom('ES_OA')]"
 court.0107.desc: "Do meu trono, ouço os gritos viscerais de [unruly_child.Custom2('MyCharacterIntroduction', ROOT.Char)] e sons de luta. Levanto-me de imediato e corro pelo corredor. Só paro ao ver [tutor.Custom2('MyCharacterIntroduction', ROOT.Char)] segurando [unruly_child.Custom('ES_AlAla')] pobre [unruly_child.Custom('GetLassLad')] com um braço enquanto segura desajeitadamente um livro com o outro.\n\nMal tenho tempo de exigir uma explicação quando ambos começam a gaguejar suas versões dos acontecimentos.\n\n"[unruly_child.GetNameNoTooltip] se recusa a deixar que eu leia a minha obra-prima sobre a arte de [tutor.Custom('GetTutorEducation')]!"\n\n"Já ouvi esse livro entediante mil vezes!", protesta [unruly_child.GetNameNoTooltip]. "É tão #EMP rollo!#!.""
 court.0107.a: "[unruly_child.GetNameNoTooltip], confie que [tutor.GetNameNoTooltip] sabe o que é melhor."
 court.0107.a.tt.1: "Há uma chance de que a educação de [unruly_child.GetShortUINamePossessiveNoTooltip] melhore"
 court.0107.a.tt.2: "[tutor.GetShortUINameNoTooltip] trabalhará ainda mais como [GetCourtPositionType('court_tutor_court_position').GetName()|l]"
 court.0107.b: "Esse livro parece fascinante; talvez eu possa comprá-lo de você?"
 court_position_liege_support: "Apoio do Suserano"
 court.0107.b.tt: "Você ganha um Artefato de Livro"
 court.0107.c: "Talvez o [unruly_child.Custom('GetLassLad')] deva aprender algo diferente..."
 buy_book_artifact: "Você ganha um Livro [court_artifact|lE]"
 court.0108.t: "Um Cortesão Espetacular"
 court.0108.desc: "[foreign_prince.Custom('GetPrincessPrince')] [foreign_prince.GetName] apareceu na corte e afirma ser um[foreign_prince.Custom('ES_XA')] exilad[foreign_prince.Custom('ES_OA')] de uma terra distante. Veio acompanhad[foreign_prince.Custom('ES_OA')] de um vasto conjunto de animais exóticos e já realizou obras de caridade incríveis nas ruas de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nEst[foreign_prince.Custom('ES_EA')] visitante pode ser exatamente quem diz ser."
 court.0108.a: "Não seja estraga-prazeres, [sceptical_courtier.GetNameNoTooltip]. Eles devem se casar pela manhã!"
 court.0108.b: "[sceptical_courtier.GetNameNoTooltip] tem razão! Para as masmorras com [foreign_prince.GetSheHe]!"
 court.0108.c: "Obrigado pela visita, [foreign_prince.Custom('GetPrincessPrince')] [foreign_prince.GetFirstNameNoTooltip], mas você deve ir embora."
 court.0109.t: "Um Especialista Anatômico"
 court.0109.desc: "Enquanto caminho pela corte, ouço [executioner.Custom2('MyCharacterIntroduction', ROOT.Char)] conversando com [learned_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)] sobre a natureza da cura e da medicina. [executioner.GetName] parece ter uma familiaridade notável com o funcionamento do corpo humano.\n\n“Não se passa o dia inteiro abrindo homens sem aprender uma ou duas coisas sobre o funcionamento da criação de [executioner.GetFaith.HighGodNamePossessive]”, diz depois de descrever como usar sanguessugas para purgar a corrupção de uma ferida infectada.\n\nPelo visto, [executioner.GetNameNoTooltip] vem usando sua experiência em anatomia humana para ajudar os moradores de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] e até os miseráveis em minha masmorra."
 court.0109.a: "É um desperdício ter você como carrasc[executioner.Custom('ES_OA')]! Venha ser meu/minha médic[executioner.Custom('ES_OA')]."
 court.0109.b: "Não perca seu tempo curando esses indigentes!"
 court.0109.c: "Fascinante, talvez você possa me ensinar alguns de seus métodos."
 court.0109.d: "Bom trabalho! Continue servindo os doentes e necessitados de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 court.0110.t: "Uma Palestra Sobre Luxúria"
 court.0110.desc.intro: "Desfilo pela minha corte, satisfeit[ROOT.Char.Custom('ES_OA')] depois de outra noite cheia de luxúria e paixão, quando me vejo encurralad[ROOT.Char.Custom('ES_OA')] por [parent.Custom2('MyCharacterIntroduction', ROOT.Char)] e [chaplain.Custom2('MyCharacterIntroduction', ROOT.Char)]! Eles me encaram com uma mistura de desgosto, predação e preocupação.\n"O que significa isso?", exijo saber.\n\n"
 court.0110.desc.deviant: ""Oh, [ROOT.Char.Custom('GetDaughterSon')] mí[ROOT.Char.Custom('ES_OA')], me preocupa muito sua alma. Todas as noites você se entrega a atos de bestialidade que fariam com que [ROOT.Char.GetFaith.FertilityGodName] lhe desse as costas de pura repulsa"."
 court.0110.desc.pox: "\"Você tem mais amantes do que um cão selvagem tem pulgas. Receio que a sífilis não seja a única coisa manchando seu corpo quando sua luxúria for satisfeita.\""
 court.0110.desc.notspecial: "\"Seu corpo é um templo e você o trata como um bordel! Será que haverá amantes suficientes para satisfazer o vazio onde deveria estar sua alma?\""
 court.0110.desc.outro: "Assim meu [parent.GetMotherFather] me repreende com pouca piedade.\n\n“Toda noite em que vocês se entregam a esses prazeres terrenos, vocês estão se aproximando um passo mais de [ROOT.Char.GetFaith.NegativeAfterLife]!”, acrescenta [chaplain.GetNameNoTooltip]. “Enfrentamos você agora para salvar sua alma, am[ROOT.Char.Custom('ES_OA')] querid[ROOT.Char.Custom('ES_OA')]. É preciso um voto de castidade; só isso, e nada menos do que isso, poderá salvar sua alma de uma eternidade de tormentos.”"
 court.0110.a: "Que insolência! Para a masmorra!"
 court.0110.b: "Você está certo, temo pela minha alma imortal."
 court.0110.c: "Não vou me restringir a uma prisão sensual!"
 court.0111.t: "Uma Relíquia de Vingança"
 court.0111.desc: "Enquanto perambulo pela corte, encontro uma discussão acalorada entre [executioner.Custom2('MyCharacterIntroduction', ROOT.Char)] e [antiquarian.Custom2('MyCharacterIntroduction', ROOT.Char)] sobre se o crânio de [rival.Custom2('MyCharacterIntroduction', ROOT.Char)] seria um artefato apropriado para minha corte.\n\nAh, [ROOT.Char.Custom('FormOfAddressForLiege')] eu queria lhe dar o crânio de [rival.Custom('ES_DelDela')] [rival.GetTitledFirstNameNoTooltip|l] como presente, caso ele tenha um fim prematuro.” [executioner.GetName] esfrega as mãos manchadas de sangue com uma alegria infantil. “Ou talvez transformar os dentes dele em um colar elegante!”\n\n“Certamente [ROOT.Char.Custom('FormOfAddressForLiege')] não pretende que eu tente disfarçar um objeto tão mórbido como uma relíquia digna da corte!”, protesta [antiquarian.Custom('ES_ElLa')] [antiquarian.GetTitledFirstNameNoTooltip|l]. “Talvez essa criatura devesse permanecer nas masmorras, onde é o seu lugar, e deixar a questão de relíquias e antiguidades para os especialistas.”"
 court.0111.a: "O crânio  seria uma curiosidade interessante para revelar em festas!"
 court.0111.b: "Uma ideia absolutamente grotesca."
 get_skull_artifact: "Você obtém uma [court_artifact|lE] do Crânio"
 court.0112.t: "Um Cadáver Escondido"
 court.0112.desc: "Vasculho as profundezas do meu ilustre guarda-roupa, ávido para ver que magníficos tecidos estão mais ao fundo. Encontro uma bolsa de tartã, bem mais pesada que as outras e, ao abri-la, caio para trás quando o forte fedor de um cadáver em decomposição atinge minhas narinas.\n\nO corpo de um desconhecido, parcialmente decomposto, mumificado e sentado em uma poça de seus próprios fluidos, se abre lentamente diante de mim.\n\nGrito como um bebê e, como se chamado[guilty_courtier.Custom('ES_OA')] por meu grito, vejo [guilty_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)] de pé na porta. Um olhar cúmplice de culpa e repulsa está estampado em seu rosto.\n\n“[ROOT.Char.Custom('FormOfAddressForLiege')|U], você deve acreditar em mim quando digo que eu estava apenas me defendendo! [corpse.GetSheHe|U] invadiu seus aposentos e, se eu não tivesse agido, teria me matado ou [guilty_courtier.GetFaith.HighGodName] sabe lá o que mais!”.\n\n[guilty_courtier.GetNameNoTooltip] está tão tomado[guilty_courtier.Custom('ES_OA')] de tristeza que me confessou tudo imediatamente, sem confronto.[guilty_courtier.Custom('ES_LoLa')]. “Imploro que feche os olhos e eu lhe encomendarei uma veste que fará até mesmo o(a) mais rico(a) [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitleAsNameNoTooltip|l] mais invejos[ROOT.Char.Custom('ES_OA')] vai ficar verde de inveja!”."
 court.0112.a: "Verde como este corpo? Um bom negócio."
 court.0112.a.tt: "Você obtém um Artefato da Realeza"
 court.0112.b: "Em breve, todos de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] saberão o que você fez!"
 court.0112.c: "Nunca mais vamos falar sobre isso."
 get_regalia_artifact: "Você obtém um [artifact|lE] de Regalia"
