l_spanish:
 #Sus about a budding friend(?)ship
 court.3000.t: "Desconfiança da Amizade"
 court.3000.desc.opening: "A ansiedade aperta meu estômago enquanto o ciúme ergue sua cabeça feia. Eu suspiro e encaro a causa da minha miséria.\n\n"
 court.3000.desc.opening.trustful: "Sinto uma pontada aguda de ciúme no peito ao olhar para a fonte de risadas. É um sentimento conhecido por mim, mas não é típico de mim sentir dessa maneira.\n\n"
 court.3000.desc: "Sé que debería agradecer que nuestr[foreign_guest.Custom('ES_OA')] invitad[foreign_guest.Custom('ES_OA')], [foreign_guest.GetTitledFirstName|l], parezca llevarse bien con [family_member.GetName], pero hay algo en la forma en que interactúan que me preocupa.\n\nSe sonríen como amistades de toda la vida… o amantes ardientes. Actúan descaradamente como si no hubiera nadie más en la habitación y me dejan alegremente fuera de sus conversaciones. ¿Cuál es su relación, y, debo hacer algo al respecto?"
 court.3000.a: "Eu #EMP devo#! interromper qualquer coisa que esteja florescendo entre eles."
 court.3000.a.tt.success: "A relação entre [foreign_guest.GetFirstNameNoTooltip] e [family_member.GetFirstNameNoTooltip] permanece a mesma"
 court.3000.a.tt.failure: "[foreign_guest.GetFirstNameNoTooltip] e [family_member.GetFirstNameNoTooltip] ignoram meus desejos e continuam com seu relacionamento"
 court.3000.b: "Devo incentivar a ligação deles para garantir que a visita seja agradável."
 court.3000.b.tt.success: "A relação entre [foreign_guest.GetFirstNameNoTooltip] e [family_member.GetFirstNameNoTooltip] se estreita e agradecem meu apoio"
 court.3000.b.tt.failure: "[foreign_guest.GetFirstNameNoTooltip] e [family_member.GetFirstNameNoTooltip] não apreciam minha intromissão"
 court.3000.c: "Seja qual for o relacionamento deles, vou me manter à margem."
 court.3000.c.tt.success: "A relação entre [foreign_guest.GetFirstNameNoTooltip] e [family_member.GetFirstNameNoTooltip] se aprofunda"
 court.3000.c.tt.neutral: "[foreign_guest.GetFirstNameNoTooltip] e [family_member.GetFirstNameNoTooltip] se aproximam"
 court.3000.d: "![foreign_guest.GetFirstNameNoTooltip] não é mais bem-vind[foreign_guest.Custom('ES_OA')] em minha corte!"
 court.3000.neutral_outcome: "O interesse mútuo entre eles diminui para como era antes."
 court.3000.friendly_outcome: "Os dois podem se tornar amigos ou até mesmo amantes..."
 court.3000.better_friends_outcome: "Os dois podem se tornar os melhores amigos e mais do que isso..."
 #A courtier shows you their written work after being inspired by other writers
 court.3010.t: "Obra Inspirada"
 court.3010.desc.opening: ""[ROOT.Char.Custom2('RelationToMeAddress', inspired_writer)|U]!". [inspired_writer.GetTitledFirstName|l] se aproxima a mim, apertando com força um manuscrito. "Escrevi uma obra de ficção depois de ler a literatura mais popular da vossa corte. Por favor, aceitai a honra de ser a primeir[ROOT.Char.Custom('ES_OA')] a ler minhas palavras!". Aceito o manuscrito e dou uma olhada em algumas das linhas.\n\n"
 court.3010.desc.low_learning: "Em todas as descrições do protagonista, mencionam seus belos e enormes globos azuis e [inspired_writer.GetFirstNameNoTooltip] destaca isso até mesmo em situações inadequadas."
 court.3010.desc.shy_or_chaste: "Meus olhos se fixam na descrição de uma cena noturna. Dois amantes entrelaçam delicadamente os dedos mindinhos, pois estão muito tímidos para segurar as mãos. Eles sussurram doces palavras enquanto caminham sob um mar de estrelas infinitas."
 court.3010.desc.lustful: "Cada frase que descreve uma mulher é extremamente detalhada e sempre apresenta palavras como balançando ou saltitando. Mas não são apenas as mulheres, também os homens. No entanto, suas descrições se concentram em seus músculos protuberantes e queixos cinzelados."
 court.3010.desc.adventurer_or_pilgrim: "O foco está em paisagens vastas e cênicas e como elas mudam com o aumento da distância de casa. Também há algumas passagens sobre desejo de viajar e saudades de casa, claramente as experiências do escritor."
 court.3010.desc.sadistic: "A violência descrita ultrapassa a tolerância da maioria das pessoas para sangue e obscenidades. Pinta uma cena sangrenta de vermelho, com cavaleiros caminhando em meio ao sangue até os joelhos."
 court.3010.desc.generic_fallback: "O cenário é familiar, assim como o nome do protagonista. Um momento, será que é uma tentativa de [inspired_writer.GetFirstNameNoTooltip] de continuar ou reescrever o trabalho de outra pessoa?"
 court.3010.desc.ending: "\n\nEu limpo a garganta e levanto o olhar do manuscrito, encontrando os olhos expectantes d [inspired_writer.GetFirstNameNoTooltip]."
 court.3010.a: "Meu Deus! Isso é... incrível! Você precisa escrever mais!"
 court.3010.a.tt: "Encorajad[inspired_writer.Custom('ES_OA')] por seus elogios, [inspired_writer.GetFirstNameNoTooltip] lhe pedir? que leia mais de sua obra no futuro."
 court.3010.b: "Estou preocupad com sua saúde mental se isso é algo que sua mente criou."
 court.3010.c: "Você definitivamente tem potencial, mas pode melhorar em algumas áreas."
 court.3010.c.neutral: "[inspired_writer.GetFirstNameNoTooltip], talvez a contragosto, aceita seus comentários e pode continuar escrevendo no futuro"
 court.3010.c.stress: "O que [inspired_writer.GetSheHe] queria - ou precisava - era encorajamento em vez de feedback"
 court.3010.c.depression: "Suas palavras feriram profundamente a alma deles"
 court.3011.desc.opening: "Ouço alguém se aproximando por trás e me viro para ver [inspired_writer.Custom('ES_AlAla')] [inspired_writer.GetTitledFirstName|l] muito animad[inspired_writer.Custom('ES_OA')]. "[ROOT.Char.Custom2('RelationToMeAddress', inspired_writer)|U]!", me chama enquanto diminui a distância entre nós e faz uma reverência mecânica. "Concluí! Meu primeiro rascunho!".\n\nEle me enfia um manuscrito nas mãos antes que eu possa dizer qualquer coisa. Um rápido olhar revela"
 court.3011.desc.low_learning: "descrições dos 'grandes e belos olhos azuis' do protagonista em situações inapropriadas."
 court.3011.desc.shy_or_chaste: "cenas românticas delicadas, porém irreais, entre dois amantes."
 court.3011.desc.lustful: "partes do corpo balançando, saltitando e protuberantes envolvidas nos lençóis da cama."
 court.3011.desc.adventurer_or_pilgrim: "paisagens vastas e cênicas e passagens sobre desejo de viajar."
 court.3011.desc.sadistic: "violência, gore e obscenidades."
 court.3011.desc.generic_fallback: "releituras e continuações de outras histórias mais famosas."
 court.3011.desc.ending: "\n\nEstá claro que [inspired_writer.GetFirstNameNoTooltip] encontrou sua inspiração."
 court.3011.a: "Isso é adorável! Você deve continuar a escrever mais!"
 court.3011.b.gregarious: "\"Gostaria de vê-l abordar um tópico diferente!\""
 court.3011.b.blunt: "\"Você vai estagnar se escrever sempre a mesma coisa.\""
 court.3011.c: "Terminei de ler seus manuscritos."
 court.3011.c.tt.stop: "[inspired_writer.GetFirstNameNoTooltip] para de mostrar suas escritas enquanto tenta coisas novas."
 court.3011.c.tt.gain_inspiration: "[inspired_writer.GetFirstNameNoTooltip] se sente inspirad para escrever uma obra-prima!"
 court.3011.c.tt.hurt: "[inspired_writer.GetFirstNameNoTooltip] se sente magoad com sua falta de apoio."
 #Latrine disaster events
 court.3020.t: "Um Cheiro Desagradável"
 court.3020.desc.opening: "«[ROOT.Char.Custom2('RelationToMeAddress', latrine_chancellor)|U]. Solo una cosa».\n\nMi [latrine_chancellor.GetCouncilTitle], [latrine_chancellor.GetTitledFirstName|l], se me acerca durante una breve pausa mientras atiendo asuntos de la corte. Me señala un lugar menos concurrido del salón y [latrine_chancellor.GetHerHim] sigo hasta allí.\n\n«Me preocupa el estado "
 court.3020.desc.castle: "Castelo de [capital.GetNameNoTooltip]."
 court.3020.desc.city: "Prefeitura de [capital.GetNameNoTooltip]."
 court.3020.desc.temple: "a casa de adoração em [capital.GetNameNoTooltip]."
 court.3020.desc.ending: "Enquanto realizávamos uma reunião em uma das salas, todos nós notamos um... cheiro horrível! Deve ter vindo das latrinas um andar abaixo. Peço que considere pagar para consertar as partes negligenciadas do prédio."
 court.3020.a: "Vou garantir que o problema seja resolvido o mais rápido possível."
 court.3020.b: "Meu [latrine_steward.GetCouncilTitle] pode cuidar desse assunto."
 court.3020.b.success: "[latrine_steward.GetFirstName] negocia bem e economiza dinheiro para você"
 court.3020.b.failure: "[latrine_steward.GetFirstName] acaba gastando mais dinheiro do que o necessário"
 court.3020.c: "Certamente meu $royal_architect_court_position$ pode consertar isso sem gastar dinheiro..."
 court.3020.c.success: "[royal_architect.GetFirstName] consegue criar uma solução sem custos"
 court.3020.c.failure: "[royal_architect.GetFirstName] não consegue pensar em nada que não custe dinheiro"
 court.3020.d: "Apenas tampe o buraco no chão!"
 court.3021.t: "Cuidado embaixo!"
 court.3021.desc: "Se solicitó mi presencia para mediar en una disputa entre [courtier1.GetTitledFirstName|l] y [courtier2.GetTitledFirstName|l]. Hoy mis cortesanos deben de estar #EMP terriblemente#! aburridos, pues muchos han venido a observar.\n\nMientras los dos discuten sobre [courtier1.Custom('subject_of_interest')], un crujido ensordecedor nos interrumpe. Todos los presentes, excepto yo, se tambalean mientras el suelo de madera se comba visiblemente. [ROOT.Char.GetFaith.HighGodName] debe de estar protegiéndome, pues estoy sentad[ROOT.Char.Custom('ES_OA')] en un rincón que no se ha visto afectado por el desastre.\n\nLos que están más cerca de la puerta se apresuran a salir, mientras otros solo aciertan a gritar mientras se hunde el suelo. Mi mirada se fija en los dos que están más cerca de mí."
 court.3021.a: "Por instinto, estendo a mão para [courtier1.GetFirstNameNoTooltip]."
 court.3021.b: "Levo [courtier2.Custom('ES_AlAla')] aterrorizad[courtier2.Custom('ES_OA')] [courtier2.GetFirstNameNoTooltip] ao recanto do estábulo."
 court.3021.c: "Recuo horrorizad ao ver todos caírem nas latrinas abaixo."
 court.3021.latrine_disaster: "Desastre das Latrinas em [capital.GetNameNoTooltip]"
 #Lady-in-waiting
 court.3030.t: "Exigente com a Moda"
 court.3030.desc.intro: "Sempre tão atent[fussy_liw.Custom('ES_OA')], minha $lady_in_waiting_court_position$, [fussy_liw.GetFirstName], me acompanha para garantir que eu me porte e me apresente na corte como devo.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U]! Por favor, esperai um momento para que eu ajeite vossas roupas!"\n\n"
 court.3030.desc.lovers: "Inclinome instintivamente para [fussy_liw.Custom('ES_ElElla')] mas me detenho ao perceber que estamos em público. Embora não seja nada incomum que meu/minha estimad[fussy_liw.Custom('ES_OA')] [fussy_liw.GetFirstNameNoTooltip] se mostre muito exigent[fussy_liw.Custom('ES_OA')] com meu traje,"
 court.3030.desc.generic: "A [fussy_liw.GetFirstNameNoTooltip] não parece se importar que estejamos em público enquanto me arruma o traje,"
 court.3030.desc.ending: "Não consigo evitar me sentir como um[ROOT.Char.Custom('ES_XA')] menin[ROOT.Char.Custom('ES_OA')] rebelde[ROOT.Char.Custom('ES_OA')]!\n\nEnquanto reflito em silêncio, percebo que há espectadores cochichando entre si e sinto a necessidade de me defender!"
 court.3030.a: "Faço uma cena: Como ousas #EMP pôr#! as mãos #EMP em mim#!?!"
 court.3030.b: "\"Você deveria fazer esses ajustes mais rápido e antes!\""
 court.3030.c: "Não digo nada, pois [fussy_liw.GetSheHe] está apenas fazendo o seu trabalho."
 court.3030.d: "\"Não há necessidade de ajustes.\""
 court.3031.t: "Acalmando as Coisas"
 court.3031.desc: "Enquanto observo as pessoas em silêncio, em um breve momento de calma na minha corte, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('liw'))] [liw.GetFirstName] se aproxima de mim.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], me concederia um momento?".\n\n[liw.Custom('quirk_pos_present')|U], enquanto aguarda minha permissão. Faço um gesto para que continue.\n\n"No meu trabalho, consegui ter uma boa ideia do que as pessoas pensam de vós e do que as motiva. Com esse conhecimento, posso tentar apaziguar as coisas com um grupo do vosso interesse, o que me diz?"."
 court.3031.a: "Melhore minha posição com meus vassalos das minorias."
 court.3031.b: "Fale bem de mim entre os Barões."
 court.3031.c: "Desejo estabelecer uma relação melhor com os [reference_county.GetProvince.GetCounty.GetCulture.GetCollectiveNounNoTooltip]."
 every_culture_county_3031: "Todo [county|El] do [realm|El] de [culture|El] [reference_county.GetCulture.GetName]"
 court.3031.d: "Não me importo com o que os outros pensam."
 #Homesickness
 court.3040.t: "Minha Saudade d [homesick_parent.GetMotherFather]"
 court.3040.desc: "Enquanto faço minha ronda social pela corte, ouço mais um suspiro pesado vindo do meu [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('homesick_parent'))]. Seja de propósito ou não, a presença solene de [homesick_parent.Custom('ES_DelDela')] [homesick_parent.GetTitledFirstName|l] não passou despercebida.\n\n\"Olá, filh[ROOT.GetCharacter.Custom('ES_OA')] meu[ROOT.GetCharacter.Custom('ES_OA')]\", diz, depois que o susto inicial passa. Não consigo dizer com certeza se [homesick_parent.Custom('ES_ElLa')] [homesick_parent.GetTitledFirstNameNoTooltip|l] é melodramátic[homesick_parent.Custom('ES_OA')] ou sincer[homesick_parent.Custom('ES_OA')]. \"Por favor, não ligue para mim. Estou apenas com saudades de casa, só isso...\"\n\nAntes que eu tenha tempo de responder, [homesick_parent.GetFirstNameNoTooltip] solta outro suspiro melancólico. Sair sem dizer uma palavra não vai mudar nada, então decido falar."
 court.3040.a: "Você só está sentindo falta das luxúrias de [homesick_parent.GetCulture.GetNameNoTooltip]!"
 court.3040.a.tt: "Aumentar um [court_amenity|lE] aleatório em um nível"
 court.3040.a.tt_2: "Nível da Amenidade da Corte Aumentado"
 court.3040.b: "Você deveria se manter ocupado em vez de lamentar."
 court.3040.c: "Um pouco de humor [homesick_parent.GetCulture.GetNameNoTooltip] ajudará!"
 court.3040.c.tt: "Certamente um $court_jester_court_position$ de sua cultura [homesick_parent.GetHerHim] fará rir."
 court.3040.d: "Seus sentimentos são seus problemas. Não os traga para a minha corte."
 #Chief Eunuch
 court.3050.t: "Carta de Difamação"
 court.3050.desc: ""Tenho uma sugestão maravilhosa para meu [ROOT.Char.GetLadyLord]", diz meu $chief_eunuch_court_position$ em tom conspiratório.\n\n"Um de seus detratores, [target.GetTitledFirstName|l], está aqui hoje. Se for seu desejo, posso redigir uma carta comprometedora contra sua pessoa para ridicularizar[target.GetHerHim] em público".\n\n[chief_eunuch.GetFirstNameNoTooltip] sorri de maneira [chief_eunuch.Custom('quirk_neg_adjective')] enquanto segura o riso. "O que quer que eu coloque na carta?"."
 court.3050.a: "Recordar ao tolo que eu conheço [target.Custom('ES_EA')] segredo dele deve fazer [target.GetHerHim] suar."
 court.3050.b: "Forje uma carta de rejeição zombando d [target.GetTitledFirstNameNoTooltip|l] por sua indesejabilidade."
 court.3050.c: "Plante evidências d [target.GetFirstNameNoTooltip] difamando outra pessoa."
 court.3050.d: "Vamos deixar as coisas como estão desta vez."
 #Cat
 court.3060.t: "Um Caçador Felino"
 court.3060.desc: ""Acho que encontrei o motivo pelo qual alguns dias há menos ratos do que outros!", declara alegremente meu [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('cat_finder'))], [cat_finder.GetTitledFirstName|l] enquanto se afasta para revelar um servo segurando um gato #EMP muito#! aborrecido.\n\nEle se contorce numa tentativa de se libertar dos braços arranhados do servo, miando de uma forma bastante encantadora.\n\n"Eu diria que este é um excelente caçador de ratos! Na verdade, ele estava no meio de uma luta com uma bem gorda quando o encontramos! O que acham, devemos adotar este gato?"."
 court.3060.a: "Eu adoraria ter um companheiro felino!"
 court.3060.b: "Por que você não fica com o gato, já que foi você quem o encontrou."
 court.3060.c: "Você não pode treinar um dos cães para caçar ratos?"
 court.3060.d: "Desta vez, não teremos um gato."
 #Royal Court
 court.3070.t: "[ROOT.Char.GetTitleTierName] desconhecid[ROOT.Char.Custom('ES_OA')]"
 court.3070.desc.opening: "«¡Y ni te imaginas qué pasó después!». Mi invitad[court_enjoyer.Custom('ES_OA')], [court_enjoyer.GetTitledFirstName|l], no deja de hablar sobre sí mism[court_enjoyer.Custom('ES_OA')] y todas las cosas que [court_enjoyer.GetHerHim] han pasado. Además de su parloteo incesante, no me siento a gusto con que un[court_enjoyer.Custom('ES_XA')] extrañ[court_enjoyer.Custom('ES_OA')] me hable de un modo tan informal.\n\nIntento excusarme con tal invitad[court_enjoyer.Custom('ES_OA')] diciendo que tengo otros asuntos y personas a las que atender, pero me interrumpe para preguntarme a qué me dedico o si estoy aquí para "
 court.3070.desc.opening_food: "aproveitar a boa comida como todo outro convidado."
 court.3070.desc.opening_lodging: "aproveitar as camas extravagantes como todo outro convidado."
 court.3070.desc.opening_fashion: "vestir como [ROOT.Char.GetTitleAsNameNoTooltip] por um dia como todo o resto dos convidados."
 court.3070.desc.opening_servants: "que me tratem como [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetTitleAsNameNoTooltip] por um dia como os outros convidados."
 court.3070.desc.middle: "\n\nConfundid[ROOT.Char.Custom('ES_OA')], consigo responder: «¡Soy #EMP [ROOT.Char.GetTitleAsNameNoTooltip]#!!…».\n\nSu rostro palidece y empieza a tartamudear.\n\n«¡Ruego me disculpéis, [ROOT.Char.Custom('FormOfAddressForLiege')]! ¡O-os prometo que no estoy aquí para aprovecharme de vuestra fortuna y "
 court.3070.desc.closing_food: "comer como [ROOT.Char.GetTitleAsNameNoTooltip]!"
 court.3070.desc.closing_lodging: "ficar na hospedagem mais luxuosa do reino!"
 court.3070.desc.closing_fashion: "me cercar das pessoas mais elegantes do reino!"
 court.3070.desc.closing_servants: "ter serviçais para atender a todas as minhas necessidades durante uma breve estadia!"
 court.3070.desc.closing: "Juro! É só que… fala-se muito mais da reputação da sua corte do que da sua aparência, [ROOT.Char.Custom('FormOfAddressForLiege')]!""
 court.3070.a: "Talvez eles se lembrem de mim se eu fizer um exemplo com você!"
 court.3070.b: "Façam saber que sou um[ROOT.Char.Custom('ES_XA')] anfitri[ROOT.Char.Custom('ES_OnOna')] acolhedor."
 court.3070.c: "Vou exigir um teste obrigatório para os convidados que desejam ficar aqui..."
 court.3070.d: "Na verdade, não me importo que todos não saibam quem sou eu."
