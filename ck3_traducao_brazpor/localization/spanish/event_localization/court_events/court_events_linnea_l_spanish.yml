l_spanish:
 court.5001.t: "Dias Solitários"
 court.5001.desc: "[friend.Custom2('MyCharacterIntroduction', ROOT.Char)|U] está entediadíssim[friend.Custom('ES_OA')], vejo isso em seu rosto e na forma como disputa minha atenção o tempo todo.\n\nSei que meus deveres tomam muito do meu tempo e [friend.Custom('ES_LoLa')] o deixo solitár[friend.Custom('ES_OA')] muitas vezes…"
 court.5001.a: "Farei mais tempo para [friend.GetSheHe]."
 court.5001.b: "\"Você sabe do que precisa? Um[friend.Custom('ES_XAOpp')] [friend.Custom('WifeHusbandOpp')]\"."
 court.5001.c_dog: "\"Você... Você pode ter [ROOT.Char.Custom('DogStoryName')].\""
 court.5001.c_cat: "\"Você... Você pode ter [ROOT.Char.Custom('CatStoryName')].\""
 court.5001.d: "Precisa de uma tarefa para se manter ocupad[friend.Custom('ES_OA')]."
 court.5010.t: "O Assombro"
 court.5010.desc: "Cada vez mais servos de olhos arregalados vêm me procurar. Afirmam ter visto a [family_member.Custom2('MyCharacterIntroduction', ROOT.Char)] pelos corredores.\n\n\"Não encontra descanso, [ROOT.Char.Custom('FormOfAddressForLiege')]. É por isso que perambula pelo lugar de sua morte!\"."
 court.5010.a: "Pare com esse disparate, ela já se foi e está mort[family_member.Custom('ES_OA')]!"
 court.5010.b: "É uma honra que [family_member.GetSheHe] nos visite, não [family_member.GetHerHim] incomodem."
 court.5010.c: "Vou pedir que alguém investigue isso."
 court.5020.t: "Conversa de Travesseiro"
 court.5020.desc: "[courtier.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima a mim freneticamente[courtier.Custom('ES_OA')] com grandes olheiras sob os olhos.\n\n\"Esse maldito gato seu se recusa a deixar meus aposentos em paz. Parece que não há melhor lugar para dormir em todo este prédio do que #EMP mi#! travesseiro. É preciso controlar essa criatura!\". [courtier.GetFirstNameNoTooltip] faz uma pausa antes de se forçar a se acalmar, \"Se lhe agradar, meu [ROOT.Char.GetLadyLord]\"."
 court.5020.a: "Está claro que agora é a almofada de [ROOT.Char.Custom('CatStoryName')]."
 court.5020.b: "Vou me certificar de que [ROOT.Char.Custom('CatStoryName')] fique longe."
 court.5021.desc: "Vejo [courtier.Custom2('MyCharacterIntroduction', ROOT.Char)] do outro lado da sala; ultimamente tem estado de bom humor, e as profundas olheiras que tinha desapareceram.\n\nO que me preocupa é que a minha adorada [ROOT.Char.Custom('CatStoryName')] parece ter desaparecido ao mesmo tempo…"
 court.5021.desc_mittens: "\n\n[courtier.GetFirstNameNoTooltip] me vê olhando e acena para mim, com novas luvas de cor [ROOT.Char.Custom('CatFurColor')] bem visíveis."
 court.5021.a: "Onde estará [ROOT.Char.Custom('CatStoryName')]?"
 court.5021.a_mittens: "Que lindas luvas – Oh não, #EMP [ROOT.Char.Custom('CatStoryName')]#!!"
 court.5021.b: "[courtier.GetFirstNameNoTooltip] também irá desaparecer."
 court.5021.c: "\"Seu destino será o mesmo que o de [ROOT.Char.Custom('CatStoryName')]\"."
 court.5025.t: "Acordo Proposto"
 court.5025.desc: "\"Que pelagem [ROOT.Char.Custom('CatFurColor')] reluzente e olhos de cor [ROOT.Char.Custom('CatEyeColor')]… Nunca vi um felino tão bonito!\"\n\n[buyer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] acaricia [ROOT.Char.Custom('CatStoryName')] com carinho antes de se voltar para mim. \"[ROOT.Var('price_for_pet').GetValue|0] moedas de ouro devem ser suficientes, não é?\"."
 court.5025.a: "[ROOT.Char.Custom('CatStoryName')] é seu!"
 court.5025.b: "Como você ousa, eu nunca venderia [ROOT.Char.Custom('CatStoryName')]!"
 court.5026.desc: "\"Que pelagem [ROOT.Char.Custom('DogFurColor')] reluzente e olhos da cor de [ROOT.Char.Custom('DogEyeColor')]… Nunca vi um cão mais magnífico!\"\n\n[buyer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] acaricia [ROOT.Char.Custom('DogStoryName')] com carinho antes de se virar para mim. \"[ROOT.Var('price_for_pet').GetValue|0] de ouro deve bastar, certo?\"."
 court.5026.a: "[ROOT.Char.Custom('DogStorySheHe')|U] é seu!"
 court.5026.b: "Como você ousa, eu nunca venderia [ROOT.Char.Custom('DogStoryName')]!"
 court.5030.t: "Hora de Brincar"
 court.5030.desc_opening: "Do outro lado da sala, vejo [child.Custom2('MyCharacterIntroduction', ROOT.Char)] brincando com seu brinquedo favorito, [child.Custom('child_favorite_toy')]."
 court.5030.desc_young: "Os adultos ao meu redor estão sempre infelizes e querem que eu os ajude, mas eu prefiro ajudar a derrotar o temível dragão com o qual [child.GetSheHe] parece estar lutando!"
 court.5030.desc: "Passei o dia inteiro ouvindo as pessoas reclamarem e resmungarem, e estou tão #EMP aburrid[ROOT.Char.Custom('ES_OA')]#! que não consigo evitar desviar minha atenção para qualquer jogo que [child.GetSheHe]…"
 court.5030.desc_ending: "\n\n[child.GetFirstNameNoTooltip] me vê olhando e me faz sinais para que eu vá até [child.Custom('ES_ElElla')]."
 court.5030.a: "Traga-me o meu [ROOT.Char.Custom('child_favorite_toy')]."
 court.5030.b_young: "Não, preciso levar isso a sério[ROOT.Char.Custom('ES_OA')]."
 court.5030.b: "Não, eu tenho que estudar."
 court.5040.t: "Brincadeira de Travessuras"
 court.5040.desc: "Mais uma vez, sou obrigada a ouvir as pessoas reclamarem – [prank_alternative_1.Custom2('MyCharacterIntroduction', ROOT.Char)] quer atenção, [prank_alternative_2.Custom2('MyCharacterIntroduction', ROOT.Char)] alega que minha corte ficou entediante, e [prank_alternative_3.Custom2('MyCharacterIntroduction', ROOT.Char)] acha que temos comido muitas refeições contendo bexigas de animais ultimamente, de todas as coisas.\n\n...Espere, tenho uma ideia."
 court.5040.a: "Devo resistir e me comportar como um[ROOT.Char.Custom('ES_XA')] verdadeir[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetLadyLord]."
 court.5040.b: "Uma bexiga inflada na cadeira d [prank_alternative_1.GetFirstNameNoTooltip] – isso sim é atenção!"
 court.5040.c: "[prank_alternative_2.GetFirstNameNoTooltip] soltando um pum não seria nada entediante."
 court.5040.d: "[prank_alternative_3.GetFirstNameNoTooltip] encontrará uma bexiga em sua cadeira em vez de um prato!"
 court.5041.desc_option_1: "Enquanto [prank_target.GetTitledFirstName|l] está distraíd[prank_target.Custom('ES_OA')] durante o jantar, espalho cuidadosamente pequenos pedaços da corda de uma lira no prato dela.\n\nMal consigo conter o riso quando [prank_target.GetFirstNameNoTooltip] se vira e encontra o prato diante dele repleto de larvas, mas preciso evitar suspeitas se quiser continuar esta cruzada!"
 court.5041.desc_option_2: "Sequei o sangue de um bezerro e o transformei em pó, que então polvilho sobre o bife de [prank_target.GetTitledFirstName|l] quando não está olhando. Instantaneamente, o pó se liquefaz em sangue, e tudo o que posso fazer é tentar não rir enquanto o rosto de [prank_target.GetFirstNameNoTooltip] se contorce de horror quando o bife começa a sangrar diante de [prank_target.GetSheHe]!"
 court.5041.desc_option_3: "Em segredo, incumbo alguns servos de me trazerem serpentes — tantas quanto possível. Então, quando [prank_target.GetTitledFirstName|l] está fora, faço com que soltem as serpentes nos aposentos dele. Os gritos ecoando pelos corredores quando ele retorna me fazem cair na gargalhada!"
 court.5041.desc_option_4: "Trituro um pouco de incenso até virar um pó bem fino antes de escondê-lo na mão. Então, ao nos sentarmos frente a frente à mesa, com uma vela entre nós, lanço a mão em direção à face de [prank_target.GetTitledFirstName|l]. Quando o pó atravessa a chama, ele se incendeia de forma espetacular!\n\n[prank_target.GetSheHe|U] grita, pensando que seu rosto está em chamas, mas eu sei que é só um truque e rio contente."
 court.5041.desc_option_5: "Abro cuidadosamente a porta dos aposentos de [prank_target.GetTitledFirstName|l] e, equilibrando-me em uma cadeira, coloco bem devagar um penico cheio sobre o batente da porta. Em seguida: uma batida rápida e uma fuga ainda mais rápida dobrando a esquina.\n\n“Quem é–” #EMP Baño!#!"
 court.5041.desc_opening: "#EMP Prrr!#!\n\nO som ecoa por todo o salão quando [prank_target.Custom2('MyCharacterIntroduction', ROOT.Char)] se senta. [prank_target.GetSheHe|U] fica cada vez mais vermelho enquanto o silêncio se prolonga. Eu me esforço para conter o riso, mas, se quiser pregar outra peça em[prank_target.GetHerHim] preciso evitar suspeitas!"
 court.5041.a: "Pararei e [prank_target.GetHerHim] consolarei."
 court.5041.option_1: "A próxima refeição estará cheia de \"larvas\"!"
 court.5041.option_2: "¡El próximo filete que se coma parecerá que sangra!"
 court.5041.option_3: "Vou soltar cobras nos aposentos!"
 court.5041.option_4: "![prank_target.GetHerHim|U] Vou assustá-lo com pó inflamável!"
 court.5041.option_5: "!Uma surpresa estará esperando por em cima da porta do aposento!"
 court.5042.desc_chastiser: "\n\nMas [chastiser.Custom2('MyCharacterIntroduction', ROOT.Char)] não acha graça nisso.\n\n“Sei que é você quem está aprontando essas brincadeiras infernais pela corte."
 court.5042.desc_chastiser_snake: "Pobre [prank_target.GetTitledFirstName|l], que salta a cada sombra, e o que as serpentes fizeram com o rosto de Vossa Graça... Uma vergonha."
 court.5042.desc_chastiser_no_snake: "Pobre[prank_target.Custom('ES_EA')] [prank_target.GetTitledFirstName|l], que se assusta com cada sombra! Uma vergonha... Vossa Graça.\""
 court.5042.desc_no_chastiser: "Meus cortesãos falham em ver a graça nisso, e deixam bem claro que condenarão qualquer outra brincadeira. E que estarão em alerta."
 court.5042.a: "Era apenas uma brincadeira!"
 court.5050.t: "Uma Cortesã Desprezada"
 court.5050.desc: "“Por que vocês concederiam um cargo na corte a esse [courtier_given_title.Custom2('InsultNoun', SCOPE.sC('courtier'))] [courtier_given_title.Custom('ES_DelDela')] [courtier_given_title.GetTitledFirstName|l] e não a mim?”.\n\n[courtier.Custom2('MyCharacterIntroduction', ROOT.Char)|U] está furios[courtier.Custom('ES_OA')]. Ao que parece, estava segur[courtier.Custom('ES_OA')] de que a honra recairia sobre [courtier.GetSheHe] e sobre mais ninguém."
 court.5050.a: "Ah, cai na real!"
 court.5050.b: "Você está certo, você merece um cargo."
 court.5050.c: "Se você vai brincar assim, devo começar a te pagar!"
 court.5055.t: "Talento Colorido"
 court.5055.desc: "Encontro [painter.Custom2('MyCharacterIntroduction', ROOT.Char)] sentad[painter.Custom('ES_OA')] no chão, cercad[painter.Custom('ES_OA')] de respingos de tinta e pedaços de tela pela terceira vez neste mês.\n\nMeus cortesãos sussurram que [painter.GetFirstNameNoTooltip] é um[painter.Custom('ES_XA')] gênio[painter.Custom('ES_OA')] artístico[painter.Custom('ES_OA')] em potencial, mas os servos reclamam de ter que esfregar os pisos para remover a tinta que sua #EMP inspiración#! deixa para trás."
 court.5055.a: "Você precisa se concentrar em estudos #EMP úteis#!, [painter.GetFirstNameNoTooltip]."
 court.5055.b: "O gênio dele será estimulado!"
 court.5055.b_tt: "[painter.GetFirstNameNoTooltip] continua suas atividades artísticas."
 court.5056.desc_opening: "O talento de [painter.Custom2('MyCharacterIntroduction', ROOT.Char)] com o pincel cresce a cada ano que passa; e seu interesse e competência em outras áreas também.\n\n"
 court.5056.desc_family: "\"Obrigado por acreditar em mim, [painter.Custom2('RelationToMeShort', ROOT.Char )]."
 court.5056.desc: "\"Obrigado por acreditar em mim e no meu talento, [ROOT.Char.Custom('FormOfAddressForLiege')]."
 court.5056.desc_ending: "\"Gostaria de iniciar um novo projeto; talvez você se interesse em voltar a ser meu benfeitor[ROOT.Char.Custom('ES_XA')]?\""
 court.5056.a: "Claro!"
 court.5056.b: "Você já tem idade suficiente para seguir seu próprio caminho na vida.[painter.Custom('ES_OA')]"
 court.5057.desc: "Com o passar dos anos, torna-se terrivelmente óbvio que [painter.Custom2('MyCharacterIntroduction', ROOT.Char)] não tem nem o talento nem a determinação para pintar a obra-prima que me prometeu.\n\n\"Eu era apenas uma criança em busca de atenção. E pensar que você realmente acreditou nas minhas bobagens!\"."
 court.5057.a: "Ah, as tolices da infância..."
 court.5057.b: "Ninguém me faz de tolo!"
 court.5060.t: "O Galante $knight_culture_player_no_tooltip$"
 court.5060.desc: "[knight.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se destacou em nossas batalhas recentes e minha corte está fervilhando de empolgação. Que $knight_culture_player_no_tooltip_lowercase$ consumado, que modelo, que #EMP [knight.GetWomanMan]#!!\n\nCom todos os elogios recaindo sobre [knight.GetSheHe], fica claro que se espera que [knight.GetHerHim] seja recompensado oficialmente de alguma forma."
 court.5060.a: "Eh… Falarei bem de [knight.GetSheHe]."
 court.5060.b: "É o novo[knight.Custom('ES_OA')] [knight.GetLadyLord] do [title_to_grant.GetNameNoTooltip]!"
 court.5060.c: "Uma linhagem de $knight_culture_player_no_tooltip_lowercase$ digna de louvor!"
 court.5060.d.champion: "Será meu $champion_court_position$!"
 court.5060.d.bodyguard: "Será minha $bodyguard_court_position$!"
 court.5060.d.akolouthos: "[knight.GetSheHe|U] servirá como meu $akolouthos_court_position$!"
 court.5070.t: "Tutor Dedicado"
 court.5070.desc: "[court_tutor.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima de mim com preocupações sobre o estado de nossos materiais educacionais.\n\n\"Podemos nos virar, mas imagine as alturas que nossas crianças poderiam alcançar se tivéssemos melhores materiais... Novas tábuas de cera, pergaminho, talvez até tinta!\""
 court.5070.a: "Mas você está fazendo um ótimo trabalho como está!"
 court.5070.b: "Claro que você terá os fundos!"
 court.5070.b.tt: "Isso avança a educação de todos os seus pupilos."
 court.5075.t: "Dois Poldros"
 court.5075.desc_opening: "[neighbor.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me presenteou com um presente muito gracioso: um par de poldros de boa linhagem, uma égua e um garanhão!\n\n"
 court.5075.desc_horse_master: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U]\", [master_of_the_horse.Custom2('MyCharacterIntroduction', ROOT.Char)] me faz sinal para que me aproxime da égua ou do garanhão."
 court.5075.desc: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U]\", meu mestre de estábulos me chama para me aproximar do animal."
 court.5075.desc_ending: "\"Olhe para esses músculos... E aquelas quartelas! Este servirá bem na guerra.\""
 court.5075.a: "Eles servirão aos senhores e às senhoras da corte."
 court.5075.b: "E ambos renderão um bom preço!"
 court.5075.c: "Eu mesmo treinarei a égua/cavalo."
 court.5075.c.success: "Você consegue treinar corretamente o cavalo."
 court.5075.c.failure: "O cavalo te derruba."
