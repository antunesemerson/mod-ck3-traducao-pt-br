l_spanish:
 court.placeholder_court_grandeur_loss: "Você perde #V 10#! de Grandeza da Corte"
 #Growing Debauchery
 court.1000.t: "Devassidão Crescente"
 court.1000.desc.opening: "Protegid[child.Custom('ES_OA')] em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], com todas as suas necessidades atendidas, [child.Custom2('MyCharacterIntroduction', ROOT.Char)] tem mostrado pouca inclinação para fazer qualquer coisa além de"
 court.1000.desc.drunkard: "passar seus dias na taverna, afogando-se em um suprimento infinito de [child.Custom('RegionalAlcoholicDrink')]."
 court.1000.desc.hashishiyah: "passar os dias enclausurad[child.Custom('ES_OA')] e entorpecid[child.Custom('ES_OA')] em algum canto com um suprimento infinito de bolos de haxixe."
 court.1000.desc.rakish: "passar seus dias no bordel, \"entretendo\" uma sequência infinita de \"convidados\"."
 court.1000.desc.ending: "\n\nOs enviados estrangeiros começaram a notar o seu comportamento, e não consigo deixar de me perguntar que rumores estarão sendo sussurrados sobre [child.GetHerHim] em cortes distantes..."
 court.1000.a: "Este comportamento é inaceitável. É preciso punir [child.GetFirstName]. Até humilhá-l[child.Custom('ES_LoLa')]."
 court.1000.a.tt: "Dar um exemplo com [child.GetFirstName] pode impedir que outros cortesãos ajam de maneira semelhante"
 court.1000.b: "[child.GetFirstNameNoTooltip] só precisa de um pouco de responsabilidade, algo importante para cuidar!"
 court.1000.b.success: "Os novos deveres de [child.GetFirstNameNoTooltip] mantêm [child.GetHerHim] ocupad[child.Custom('ES_OA')]"
 court.1000.b.failure: "[child.GetFirstNameNoTooltip] continua a se entregar aos vícios depois do trabalho"
 court.1000.c: "Ha! [child.GetSheHe|U] sabe aproveitar as coisas boas da vida!"
 court.1000.c.tt: "Mostrar permissividade com [child.GetFirstName] pode incentivar outros cortesãos a agir de maneira semelhante"
 court.1001.title: "[courtier.GetFirstName] Abraça a Devassidão"
 #Daydrinking
 court.1010.t: "Bebendo Durante o Dia"
 court.1010.desc: "As peripécias embriagadas de [courtier.Custom2('MyCharacterIntroduction', ROOT.Char)] já haviam sido assunto de fofoca, mas ultimamente parece que [courtier.GetSheHe] levou isso a um novo nível.\n\nFicar bêbad[courtier.Custom('ES_OA')] antes do meio-dia, desmaiar no pátio da residência, arrastar-se até a taverna à tarde e acordar de ressaca nos estábulos no dia seguinte... O comportamento degenerado de [courtier.GetFirstNameNoTooltip] é uma vergonha para todos os que residem em [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 court.1010.a: "[courtier.GetSheHe|U] não é apt[courtier.Custom('ES_OA')] para nada... e nunca será."
 court.1010.b: "[courtier.GetFirstNameNoTooltip] pode ficar sóbri[courtier.Custom('ES_OA')] nas masmorras!"
 court.1010.c: "Uma conversa séria colocará [courtier.GetHerHim] na linha."
 court.1010.c.success: "[courtier.GetFirstNameNoTooltip] para de beber... pelo menos em excesso"
 court.1010.c.failure: "[courtier.GetFirstNameNoTooltip] não muda seu comportamento"
 court.1010.d: "Se [courtier.GetFirstNameNoTooltip] deseja se comportar como tolo, tolo [courtier.GetSheHe] será!"
 court.1010.e: "Deixe os outros zombarem de [courtier.GetHerHim]... [ROOT.Char.GetFaith.NegativeAfterLife], eu vou rir com eles!"
 #Long Arm of the Law
 court.1020.opening: "[foreign_ruler.Custom2('AppropriateGreeting', ROOT.Char)]"
 court.1020.desc: "Chegou ao meu conhecimento que um[fugitive.Custom('ES_XA')] fugitiv[fugitive.Custom('ES_OA')] sem lei, [fugitive.GetTitledFirstName|l], está hospedado em sua corte. Entregue [fugitive.GetHerHim] para receber minha justiça, "
 court.1020.desc.forgive_this: "e eu perdoarei essa ofensa."
 court.1020.desc.forgive_all: "e eu perdoarei essa ofensa, bem como as anteriores."
 court.1020.desc.gold: "e eu compensarei você pelo incômodo."
 court.1020.desc.opinion: "e lembrarei de sua cooperação por muitos anos."
 court.1020.a: "Será feito."
 court.1020.b: "[fugitive.GetFirstNameNoTooltip] é meu convidad[fugitive.Custom('ES_OA')] e está sob minha proteção."
 court.1020.c: "[fugitive.GetFirstNameNoTooltip]? Não há ninguém com esse nome aqui..."
 #Poor Manners
 court.1030.t: "Má Educação"
 court.1030.desc: "#EMP ~BUrRRP~#!\n\nQuando o sonoro arroto ecoa pelo salão de jantar, toda conversa cessa de repente. [chaplain.Custom2('MyCharacterIntroduction', ROOT.Char)|U] dá tapinhas na barriga e sorri. \"Ahh, melhor fora do que dentro, como meu pai sempre dizia!\"\n\nVários cortesãos trocam olhares incrédulos, antes que [courtier.Custom2('MyCharacterIntroduction', ROOT.Char)] me olhe diretamente e exclame: \"Meu [ROOT.Char.GetTitleAsNameNoTooltip], isso foi completamente inadequado! Certamente, concorda?\""
 court.1030.a: "[chaplain.GetFirstNameNoTooltip] é um[chaplain.Custom('ES_XA')] [chaplain.GetWomanMan] de [chaplain.GetFaith.HighGodName]. Tratemos [chaplain.GetHerHim] como tal."
 court.1030.b: "[chaplain.Custom('GetActualBishopTitle')] ou não, [chaplain.GetFirstNameNoTooltip] #EMP irá#! aprender boas maneiras..."
 court.1030.b.flavor: "...ou então comerá com os porcos na pocilga!"
 court.1030.b.custom: "Todos os outros cortesãos"
 court.1030.c: "Ah, vamos lá, como se todos nós nunca tivéssemos soltado um antes?"
