l_spanish:
 court.9000.t: "Declaração de um Cavaleiro"
 court.9000.desc: "Enquanto me dirigia ao trono, ouço por acaso meu $knight_culture_player_no_tooltip_lowercase$ [flirty_knight.GetFirstName] declarar algo ao meu [flirty_spouse.GetWifeHusband], [flirty_spouse.GetFirstName].\n\n"[flirty_knight.Custom('GeneratePoem_Intro_Rhyming')]\n[flirty_knight.Custom('GeneratePoem_Outro_Rhyming')]".\n\nEle está recitando poesia romântica? Para #EMP mi#! [flirty_spouse.GetWifeHusband]?!"
 court.9000.a: "[flirty_knight.GetFirstNameNoTooltip], maldit[flirty_knight.Custom('ES_OA')] [flirty_knight.Custom2('InsultNounSexual', ROOT.Char)]! Para a masmorra com você!"
 court.9000.b: "[flirty_spouse.GetFirstNameNoTooltip]! Afaste-se de [flirty_knight.GetSheHe], seu [flirty_spouse.Custom2('InsultNounSexual', ROOT.Char)]!"
 court.9000.c: "Ah, amor cortês! Deixem essa maravilhosa poesia ecoar pelos corredores!"
 court_9000_a_tt: "Se algo estava acontecendo entre [flirty_spouse.GetFirstName] e [flirty_knight.GetFirstName], acaba aqui\n"
 court_9000_b_tt: "Se algo estava acontecendo entre [flirty_spouse.GetFirstName] e [flirty_knight.GetFirstName] é muito provável que acabe\n"
 court_9000_c_tt: "Se algo estava acontecendo entre [flirty_spouse.GetFirstName] e [flirty_knight.GetFirstName], é permitido que continue\n"
 court.9001.t: "Um Presente Cortês"
 court.9001.desc: "Vejo minha [flirty_spouse.GetWifeHusband] [flirty_spouse.GetFirstName] e meu [ROOT.GetCharacter.Custom2('RelationToMeShort' , SCOPE.sC('flirty_knight'))] [flirty_knight.GetFirstName] compartilhando o que parece ser um momento de paixão, com [flirty_knight.GetFirstNameNoTooltip] ajoelhad[flirty_knight.Custom('ES_OA')] diante de [flirty_spouse.GetSheHe].\n\n«[flirty_spouse.Custom('RomanticComplimentNoun')|U] meu[flirty_spouse.Custom('ES_OA')]! Por favor, aceite este humilde presente», diz [flirty_knight.GetFirstNameNoTooltip] e entrega [flirty_spouse.Custom('SeductionGiftTypeIndefiniteSimple')].\n\n«Oh!», gagueja [flirty_spouse.GetFirstNameNoTooltip]. «Adorei! É maravilhoso».\n\nO que exatamente está acontecendo aqui?"
 court.9001.a: "[flirty_spouse.GetFirstNameNoTooltip] é #EMP mí[flirty_spouse.Custom('ES_OA')].#! Empunhe sua espada!"
 court.9001.b: "Entregue isso! [flirty_knight.GetFirstNameNoTooltip] — Eu te desterro do reino!"
 court.9001.c: "O amor cortês é tão puro, tão inocente!"
 court.9001.a.tt: "#V ¡Te bates en duelo#! com [flirty_knight.GetFirstName] para que deixe em paz sua [flirty_spouse.GetWifeHusband]!\n#weak Este duelo NO es a muerte.#!\nSe você vencer, o coração de [flirty_spouse.GetFirstName] será só seu. Se perder, quem sabe o que acontecerá.\n\nSeu [prowess|lE]: [prowess_i]#V [root_for_loc.GetProwess]#!\n[prowess|lE][prowess_i] de [flirty_knight.GetFirstName]:#V [flirty_knight.GetProwess]#!"
 how_could_you_opinion: "Como você pôde"
 court.9002.trigger_failure: "Meu duelo contra [flirty_knight.GetFirstNameNoTooltip] foi invalidado"
 court.9004.t: "$court.9001.t$: Vitorioso"
 court.9004.desc: "“Depus minhas armas diante de você — sua alma é [ROOT.Char.Custom('ComplimentAdjective')] e merece mais o coração de [flirty_spouse.GetFirstName]!”, diz [flirty_knight.GetFirstName] derrotad[flirty_knight.Custom('ES_OA')].\n“A partir de agora eu o servirei sem questionar, [ROOT.Char.GetTitleTierName]”.\n\nMeu [flirty_spouse.GetWifeHusband] [flirty_spouse.GetFirstNameNoTooltip] se volta para mim, com um novo fogo no olhar.\n\n“[ROOT.Char.GetWifeHusband|U] você arriscou a vida por meu afeto! Oh, seu coração é nobre — de agora em diante sou apenas seu[flirty_spouse.Custom('ES_OA')]!”"
 court.9004.a: "[flirty_spouse.GetFirstNameNoTooltip] é só meu[flirty_spouse.Custom('ES_OA')]"
 court.9005.t: "$court.9001.t$: Derrotado"
 court.9005.desc: ""Nunca mereceste o amor de [flirty_spouse.GetFirstName]!", exclama [flirty_knight.GetFirstName].\n\n"Oh, [Select_CString(flirty_knight.IsFemale, 'mi heroína', 'mi héroe' )] de espírito [flirty_knight.Custom('ComplimentAdjective')], ah, se pudéssemos escapar deste lugar sombrio! Mas nosso amor, mesmo assim, conquistou o direito de florescer", diz [flirty_spouse.GetFirstNameNoTooltip] com um suspiro saudoso.\n\n[flirty_knight.GetFirstNameNoTooltip], impassív[flirty_knight.Custom('ES_OA')], lança sobre mim um olhar intimidador."
 court.9005.a: "[ROOT.Char.Custom('CulturalCurse')|U]!"
 court_9005_tt: "[flirty_spouse.GetFirstName] e [flirty_knight.GetFirstName] deixam sua corte para consumar seu amor em outro lugar"
 court.9100.t: "Entretenimento Epicurista"
 court.9100.desc: ""Ah, excelente! [food_lover_1.Custom('GetExpensiveMeal')|U], meu prato favorito!", brada alegremente [food_lover_1.GetFirstName], e se empanturra enquanto o servo se desespera para manter a bandeja firme.\n\n"Ah, meu adorável [food_lover_2.Custom('GetExpensiveDessert')], você é tão delicioso!", diz [food_lover_2.GetFirstName] com voz cantarolante.\n\n"Agora sim, isso é que é vida! Servos, mais [food_lover_1.Custom('GetExpensiveDrink')], agora!", exige [food_lover_3.GetFirstName].\n\nParece que meus cortesãos estão se divertindo!"
 court.9100.a: "Mais trabalho, menos entupir seus rostos!"
 court.9100.b: "Todos vocês merecem o melhor!"
 court.9100.c: "Deixe um pouco de bebida para mim, [food_lover_3.GetFirstNameNoTooltip] — É melhor compartilhar com os amigos!"
 court.9100.d: "Eu devo deixá-los em paz."
 court.9200.t: "Vínculo Bacanal"
 court.9200.desc: "«Nosso[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleTierName] é verdadeiramente generos[ROOT.Char.Custom('ES_OA')]! Basta provar o sabor #EMP espectacular#! deste prato de [food_lover_1.Custom('GetExpensiveMeal')]!», exclama liricamente [food_lover_1.GetFirstName].\n\n«Isso mesmo! [ROOT.Char.GetLadyLord] [ROOT.Char.GetFirstNameNoTooltip] é [food_lover_1.Custom('ComplimentAdjective')]… como este prato de [food_lover_2.Custom('FavoriteTreat')]», responde [food_lover_2.GetFirstName] com entusiasmo.\n\nÉ como se meus gastos com refeições suntuosas tivessem feito florescer uma nova amizade!"
 court.9200.a: "Você se importa se eu me juntar a vocês para uma [food_lover_1.Custom('GetExpensiveMeal')]?"
 court.9200.b: "Servos, vocês não veem que eles estão morrendo de fome? Tragam mais [food_lover_2.Custom('GetExpensiveDessert')]!"
 court.9200.c: "Seria indelicado perturbá-los enquanto comem!"
 court.9300.t: "Excesso Aberto"
 court.9300.desc: "«M… meu [ROOT.Char.GetTitleTierName]. Vosso[overindulger_target.Custom('ES_OA')] [ROOT.GetCharacter.Custom2('RelationToMeShort' , SCOPE.sC('overindulger_target'))] [overindulger_target.GetFirstName], não… #EMP ¡No deja de comer [overindulger_target.Custom('GetExpensiveDessert')]!»#!, gagueja meu [ROOT.Char.Custom2('RelationToMeShort',worried_courtier)] [worried_courtier.GetFirstName].\n\nNo exato momento vejo [overindulger_target.GetFirstNameNoTooltip] saindo da despensa, carregando uma pilha de [overindulger_target.Custom('GetExpensiveDessert')] nos braços.\n\n«Aconteceu algo, , meu senhor[ROOT.Char.Custom('ES_XA')]?», diz [overindulger_target.GetFirstNameNoTooltip] [overindulger_target.Custom('quirk_neg_pp')]."
 court.9300.a: "#EMP Vocês comeram minha [overindulger_target.Custom('GetExpensiveDessert')] real?!"
 court.9300.b: "Por [ROOT.Char.GetFaith.HighGodName], [overindulger_target.GetWomanMan]! Reaja!"
 court.9300.c: "Ah, você #EMP é melhor#! pagar por isso."
 court.9300.d: "Você está proibido de entrar na despensa a partir de agora..."
 court.9300.b.success: "Você convence [overindulger_target.GetFirstNameNoTooltip] a largar os [overindulger_target.Custom('GetExpensiveDessert')] e a te pagar de volta"
 court.9300.b.failure: "[overindulger_target.GetFirstNameNoTooltip] não é dissuadid e se recusa a lhe pagar de volta."
 court.9400.t: "Diversão com Torta"
 court.9400.desc: "Que temos aqui? Um #EMP enorme#!, bem no meio do meu salão do trono?!\n\n"Querem um pouco de bolo, [pie_presenting_courtier.Custom2('RelationToMeShort' , SCOPE.sC('you_target'))]?", diz com uma risadinha [pie_presenting_courtier.GetFirstName].\n"Vem com surpresa! Aqui está uma faca, por favor, sirvam-se de uma fatia!"\n\nPego a faca com relutância e corto cuidadosamente a crosta. De repente, [court_jester.Custom('ES_OA')] buf[court_jester.Custom('ES_OnOna')] da corte, [court_jester.GetFirstName] salta do bolo, rindo e gesticulando!"
 court.9400.a: "Sabe de uma coisa? Estou com fome. #EMP Entre de volta na torta.#!"
 court.9400.b: "Ah, [court_jester.GetFirstNameNoTooltip], que criatividade! Aqui, um presente de apreço."
 court.9400.c: "#EMP Assassino! Guardas!#!"
 court.9400.d: "Har har! Agora isso é entretenimento!"
 absolutely_horrified_opinion: "Absolutamente Horrificado"
 best_meal_of_my_life_modifier: "Melhor Refeição da Minha Vida"
 best_meal_of_my_life_modifier_desc: "Este personagem comeu algo absolutamente espetacular!"
 suspicious_against_pies_modifier: "Desconfiado Contra Tortas"
 suspicious_against_pies_modifier_desc: "Este personagem é extraordinariamente desconfiado e vigilante em relação a qualquer coisa que se pareça vagamente com uma torta. Isso se estende também a outros tipos de comida e a tudo mais, na verdade..."
 court.9500.t: "Um Pouco de Linguagem"
 court.9500.desc: ""Saudações, minha [ROOT.Char.Custom('ComplimentAdjective')] [ROOT.Char.GetTitleTierName]", diz [teacher_target.GetFirstName] [teacher_target.Custom('quirk_pos_pp')].\n\n"Tenho muito interesse na educação de vostr[child_to_learn_language.Custom('ES_OA')] [child_to_learn_language.Custom('GetDaughterSon')], [child_to_learn_language.GetFirstName]. Veja, eu falo [culture_language_to_learn.GetLanguage.GetNameNoTooltip], um idioma que acredito que seria muito útil para ele aprender", explica [teacher_target.GetSheHe] com um tom sincero.\n\n"Só preciso de dinheiro para penas, tinta, pergaminhos… e uma compensação pessoal, é claro"."
 court.9500.a: "Isso parece muito útil. Vou pagar #EMP qualquer coisa#! para ver isso acontecer."
 court.9500.b: "[child_to_learn_language.GetFirstNameNoTooltip], faça o seu melhor!"
 court.9500.c: "Pff! Quem precisa falar algo além de [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip]!?"
 court.9500.b.success: "[child_to_learn_language.GetFirstNameNoTooltip] consegue aprender [culture_language_to_learn.GetLanguage.GetNameNoTooltip]"
 court.9500.b.failure: "[child_to_learn_language.GetFirstNameNoTooltip] está estressad"
 court_maintenance.0010.t: "Um Trono Vazio"
 court_maintenance.0010.desc: "Meu cortesão [messenger.GetName] insistiu em me ver, embora eu tenha deixado claro que prefiro ficar soz[ROOT.Char.Custom('ES_OA')] inh\n\nMeu [ROOT.Char.Custom('ComplimentAdjective')] [ROOT.Char.GetTitleTierName]! Já faz bastante tempo desde a última vez que aparecestes na corte.\nFazemos o possível para manter as aparências na vossa ausência, mas a corte do senhorio [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip] não pode funcionar sem a presença do [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleTierName].\n\nMinha longa ausência da corte real a deixou sem liderança nem propósito."
 court_maintenance.0010.desc.seeking_gainful_employment: "Meus cortesãos estão cada vez mais comparando suas circunstâncias com as de cortes prestigiosas como a [great_cgv_court.GetPrimaryTitle.GetAdjectiveNoTooltip]."
 court_maintenance.0010.desc.general_ending: "Meus cortesãos estão cada vez mais comparando suas circunstâncias com as de cortes estrangeiras."
 court_maintenance.0010.a: "Está na hora de eu fazer uma visita à corte real."
 court_maintenance.0010.a.tooltip: "Você entrará na Corte Real."
 court_maintenance.0010.b: "Eu visitarei minha corte quando eu achar adequado."
 court_maintenance.0010.b.tooltip: "Alguns cortesãos podem deixar sua corte em favor do [great_cgv_court.GetPrimaryTitle.GetName]."
 court_maintenance.0010.b.brave: "Eu desejo emoção, não cerimônia ociosa!"
 court_maintenance.0010.b.depressed: "Eu simplesmente não consigo ver sentido em tudo isso..."
 court_maintenance.0010.b.paranoid: "Eu não posso estar exposto. Eu sempre preciso estar seguro!"
 court_maintenance.0010.c: "Um banquete lhes dará algo para fazer!"
 court_maintenance.0010.c.tooltip: "Você inicia um banquete em [SCOPE.GetRootScope.GetCharacter.GetCapitalLocation.GetTitle.GetNameNoTier]"
 court_maintenance.0011.t: "A corte de [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip]"
 court_maintenance.0011.t.regent: "A corte [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip]"
 court_maintenance.0011.desc: "«Como [ROOT.Char.GetTitleTierName], tendes novos deveres e responsabilidades. Espera-se que realizeis audiências com regularidade, resolvais as disputas do reino e permitais que vossos cortesãos participem de vossas rotinas diárias».\n\n[messenger.GetName] me olha com severidade, quase como se estivesse me dando uma lição. Talvez haja até um pouco de [ROOT.GetCharacter.Custom2('GetPrideEnvy' , SCOPE.sC('messenger'))] em seu olhar?\n\n[messenger.GetName] começa a desdobrar um belo estandarte, ostentando o emblema da Casa [ROOT.Char.GetHouse.GetName]. «Uma das formas pelas quais o mundo julgará vosso governo é por como adornais e cuidais de vossa corte real. Tomei a liberdade de mandar fazer isto como presente para marcar o início de vosso reinado real»."
 court_maintenance.0011.desc.regent: ""Como [ROOT.Char.GetTitleTierName|l], você tem novos deveres e responsabilidades. Espera-se que você convoque a corte regularmente, para resolver as disputas do reino e receber o conselho dos outros cortesãos [ceremonial_liege.Custom('ES_DelDela')] [ceremonial_liege.GetTitleAsNameNoTooltip] nas rotinas cotidianas de sua corte"."
 court_maintenance.0011.desc.ach: "Este presente marcará o início de vosso reinado. [messenger.GetName] desdobra um belo estandarte, ostentando o emblema da Casa [ROOT.Char.GetHouse.GetName].\n\nSois um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleTierName] de nome, mas ainda assim — o reino deve se reunir para uma grande cerimônia de coroação! Ali, podereis consolidar vossa autoridade e vos comprometer com [ROOT.Char.GetFaith.HighGodName] como protetor[ROOT.Char.Custom('ES_XA')] e defensor[ROOT.Char.Custom('ES_XA')] de [ROOT.Char.GetPrimaryTitle.GetNameNoTier]."
 court_maintenance.0011.coronation: "Que comecem os preparativos imediatamente."
 court_maintenance.0011.coronation.tooltip: "Você começará a preparar sua [coronation|lE]."
 court_maintenance.0011.crown_needed.tooltip: "Certas [activity_options|lE] de [coronation|lE] requerem um [artifact|lE] de #V corona#!"
 court_maintenance.0011.regalia_needed.tooltip: "Certas [activity_options|lE] de [coronation|lE] requerem um [artifact|lE] de #V vestiduras#!"
 court_maintenance.0011.artificier_crown.tooltip: "$court_maintenance.0011.crown_needed.tooltip$ Seu [GetCourtPositionType('court_artificer_court_position').GetName()|l] começará a fabricar uma imediatamente"
 court_maintenance.0011.local_artisan_crown.tooltip: "$court_maintenance.0011.crown_needed.tooltip$ Um artesão local começará a fazer uma imediatamente"
 court_maintenance.0011.artificier_regalia.tooltip: "$court_maintenance.0011.regalia_needed.tooltip$ Seu [GetCourtPositionType('court_artificer_court_position').GetName()|l] começará a fazer uma imediatamente"
 court_maintenance.0011.local_artisan_regalia.tooltip: "$court_maintenance.0011.regalia_needed.tooltip$ Um artesão local começará a confeccionar uma imediatamente"
 court_maintenance.0011.a: "Que contemplem seu nov[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleTierName]!"
 court_maintenance.0011.a.regent: "Vamos visitar o palácio."
 court_maintenance.0011.a.tooltip: "Você entrará na [royal_court|lE]"
 court_maintenance.0011.b: "Outras questões exigem minha atenção."
 court_maintenance.0011.b.tooltip: "Você pode escolher entrar em sua [royal_court|lE] mais tarde"
 court_maintenance.0011.b.tooltip.ach: "Você poderá realizar uma [coronation|lE] mais tarde"
 court_maintenance.0011.banner_tooltip: "[messenger.GetName] apresenta duas novas bandeiras, uma para sua casa e outra para sua dinastia."
 court_maintenance.0011.banner_house_tooltip: "[messenger.GetName] apresenta uma nova bandeira com o emblema de sua casa"
 court_maintenance.0011.banner_dynasty_tooltip: "[messenger.GetName] apresenta uma nova bandeira com o emblema de sua dinastia"
 court_maintenance.0011.coronation_discount: "Custo da próxima [coronation|lE] : #p -50 % [gold_i]#!"
 surprise_reaction: "surpresa"
 envy_reaction: "inveja"
 scorn_reaction: "desprezo"
 pride_reaction: "orgulho"
 gained_royal_court_toast: "Corte Real adquirida"
 gained_royal_court_toast_desc: "Você agora possui uma [royal_court|lE]"
 court_maintenance.0012.t: "Marca de Distinção"
 court_maintenance.0012.desc: "À medida que a fama da minha dinastia cresce, também se espalha a familiaridade com o glorioso emblema dos [ROOT.Char.GetDynasty.GetName]. \n\n"
 court_maintenance.0012.desc_illustrious: "A insígnia da minha família agora é conhecida em todo o mundo, notada por chanceleres, ensinada a crianças e encantando comerciantes em terras onde [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip] nunca sequer pôs os pés."
 court_maintenance.0012.desc_masterwork: "O emblema da minha família agora é de conhecimento comum, listado entre as grandes famílias reais da região e a mais alta nobreza do [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip]."
 court_maintenance.0012.desc_famed: "O brasão da minha família agora é reconhecido nos círculos regionais da nobreza, sendo considerado altamente entre as proeminentes linhagens [ROOT.Char.GetCulture.GetNameNoTooltip]."
 court_maintenance.0012.a: "Como deve ser."
 court_maintenance.0013.t: "Tesouro Dinástico"
 court_maintenance.0013.desc: "É minha responsabilidade defender a honra da família [ROOT.Char.GetDynasty.GetName] e carregar sua bandeira."
 court_maintenance.0013.desc_creator: "O estandarte pessoal [banner_scope.MakeScope.Var('banner_commissioner').Char.GetNameRegnal] por si só marcará a grandeza de sua linhagem."
 court_maintenance.0013.desc_fallback: "Somente meu estandarte pessoal será transmitido de geração em geração, marcando a glória de todos os meus descendentes."
 court_maintenance.0013.a: "Só pode haver um."
 court_maintenance.0013.tt: "Apenas um [dynasty|lE] banner pode ser possuído"
