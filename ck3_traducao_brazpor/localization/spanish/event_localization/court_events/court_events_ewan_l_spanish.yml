l_spanish:
 ##################################################
 ##Misc
 ##################################################
 #PATRONAGE
 court.2001.t: "Compadrio Competitivo"
 court.2001.desc: "Nem [crony_a.GetFirstName] nem [crony_b.GetFirstName] percebem enquanto me aproximo furtivamente da conversa animada no corredor.\n\n"A súplica #EMP física#! é a chave! Cada hematoma ganho de tanto se prostrar é uma moeda fresca na minha bolsa! Não há como errar com a prostração."\n\n"Besteira, é só empilhar adjetivos antes do título dele e você vai ser rico até morrer. Se ainda tiver ar nos pulmões antes de chegar a '[ROOT.Char.GetTitleAsNameNoTooltip]', você está fazendo errado."\n\nTosso e calo imediatamente os aduladores mortificados."
 court.2001.a: "Sinceramente, vocês dois poderiam se esforçar mais nisso."
 court.2001.a.sadistic: "Quem se curvar mais recebe esta moeda #EMP brilhante#!. Vamos lá."
 court.2001.a.sadistic.crony_a_wins: "[crony_a.GetFirstNameNoTooltip] se curva mais"
 court.2001.a.sadistic.crony_b_wins: "[crony_b.GetFirstNameNoTooltip] se curva mais"
 court.2001.b: "Eu vejo através das suas manipulações, lacaios!"
 court.2001.c: "Acho que vocês estão perdendo a forma mais óbvia de conquistar meu coração..."
 court.2001.d: "Isso está abaixo de mim."
 ##################################################
 #MAJESTY
 court.2201.t: "Uma Fatia do Bolo"
 court.2201.desc: ""...é meu! Dividir [ROOT.Char.GetPrimaryTitle.GetNameNoTier] entre os herdeiros não faz sentido!", grita [eldest_heir.GetFirstName] enquanto [eldest_heir.GetSheHe] e [younger_heir.Custom2('HerHisCharacterIntroduction', eldest_heir)] discutem aos berros no outro extremo da sala. ..."
 court.2201.a: "Você acha que é #EMP merecedor#! de mais, [eldest_heir.GetFirstNameNoTooltip]? Que tal #EMP nada#!!"
 court.2201.b: "Infelizmente, essas são apenas as regras do jogo, [younger_heir.GetFirstNameNoTooltip]..."
 court.2201.c: "Eles são família, eles vão se entender #EMP bem#! sem mim, não é mesmo?"
 court.2201.d: "Crianças, vocês querem saber o verdadeiro significado de família?"
 ##################################################
 #FOREIGN GUESTS
 court.2401.t: "Glamour de Segunda Mão"
 court.2401.desc: ""As melhores vestes da terra, bom[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l], sobretudo porque #EMP não são#! desta terra", ri [seller.GetFirstName] enquanto passo por diante de seus aposentos abertos. Sua voz transborda encanto e lábia.\n\n"Quase novas, tão boas quanto novas, e recém-saídas dos criadores de tendências da corte [grander_ruler.Custom('ES_DelDela')] [grander_ruler.GetTitledFirstName|l]! É o que #EMP todo mundo#! em [grander_ruler.GetPrimaryTitle.GetName] usará na próxima temporada.""
 court.2401.a: "Ora, essas #EMP parecem#! tentadoras..."
 court.2401.b: "Não precisamos de besteiras estrangeiras em minha corte!"
 court.2401.c: "Quem se importa com o que as pessoas vestem?"
 court.2411.t: "Salões Labirínticos"
 court.2411.desc: "Meu passeio me leva por uma ala em desuso do palácio, percorrendo aposentos amplos, embora empoeirados, que minha equipe sobrecarregada raramente visita, quando ouço um soluço carregado vindo de uma passagem lateral.\n\nAo investigar, encontro [lost_guest.Custom2('MyCharacterIntroduction', ROOT.Char)], caíd[lost_guest.Custom('ES_OA')] em desespero. [lost_guest.GetSheHe|U] se levanta assim que me vê, agarra-me pelos ombros e começa a balbuciar como um[lost_guest.Custom('ES_XA')] louc[lost_guest.Custom('ES_OA')].\n\n"[ROOT.Char.GetTitleAsNameNoTooltip], estou perdid[lost_guest.Custom('ES_OA')] nestas passagens há #EMP três dias#!! Não consigo encontrar a saída, apenas ciclos intermináveis de corredores conectados e câmaras mofadas sem um servo sequer à vista!""
 court.2411.a: "Pelo [ROOT.Char.GetFaith.HighGodName], deixe-me mostrar-lhe o caminho para fora!"
 court.2411.b: "Como assim... Como você pode ser #EMP tão#! tolo?"
 court.2411.c: "*Assobiando* Que emaranhado de salões eu mantenho..."
 ##################################################
 #RELATIONSHIPS
