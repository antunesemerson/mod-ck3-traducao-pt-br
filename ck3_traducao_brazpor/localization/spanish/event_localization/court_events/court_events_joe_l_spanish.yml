 ## Trampled Underfoot
 court.8001.t: "Pisoteado"
 court.8001.desc.intro: ""Quantas vezes eu j? te disse para ficar #EMP longe#! dos #EMP novos canteiros de [ROOT.Char.Custom('get_region_flower_type_plural')]#!?!"

[child_1.Custom2('MyCharacterIntroduction', ROOT.Char)] aparece cobert[child_1.Custom('ES_OA')] de p?talas e terra, perseguid[child_1.Custom('ES_OA')] pelo meu jardineir[gardener.Custom('ES_OA')], [gardener.GetFirstNameNoTooltip].

[child_1.GetFirstNameNoTooltip] grita:"

[child_1.Custom2('MyCharacterIntroduction', ROOT.Char)] aparece cobert[child_1.Custom('ES_OA')] de p?talas e terra, perseguid[child_1.Custom('ES_OA')] pelo meu jardineir[gardener.Custom('ES_OA')], [gardener.GetFirstNameNoTooltip].

[child_1.GetFirstNameNoTooltip] grita:"
 court.8001.desc.diplomacy: "\"Eu só estava olhando! Elas estão de uma cor diferente desta vez!\""
 court.8001.desc.martial: "\"Eu não fiz nada! Só estava brincando!\""
 court.8001.desc.stewardship: "\n\n[gardener.GetFirstNameNoTooltip] diz, furioso: "[Select_CString( child_1.IsFemale, 'Esta dichosa', 'Este dichoso' )] [child_1.Custom('GirlBoy')] pisoteou #EMP todo#! meu trabalho, [ROOT.Char.Custom('FormOfAddressForLiege')]! Levará #EMP semanas#! para consertar os danos…"."
 court.8001.desc.intrigue: "Às vezes vale a pena ser pego, [child_1.Custom('GirlBoy')] mi[child_1.Custom('ES_OA')]."
 court.8001.desc.learning: "Ah, mas você deve escolher bem suas batalhas, [child_1.Custom('GirlBoy')] meu[child_1.Custom('ES_OA')]!"
 court.8001.desc.fallback: "Eu conheço um lugar melhor para construir sua poderosa corte, [child_1.Custom('GirlBoy')] [child_1.Custom('ES_OA')]."
 court.8001.desc.closing: "O truque é não ser pego, [child_1.Custom('GirlBoy')] meu[child_1.Custom('ES_OA')] p."
 court.8001.a.diplomacy: "Também se pode aprender à distância, [child_1.Custom('GirlBoy')] meu[child_1.Custom('ES_OA')]."
 court.8001.a.martial: "[child_1.GetFirstNameNoTooltip] entende seu ponto"
 court.8001.a.stewardship: "Não! #EMP Não#! nos canteiros de flores..."
 court.8001.a.intrigue: "Beleza delicada, sempre esmagada por tolos desajeitados..."
 court.8001.a.learning: "[child_1.GetFirstNameNoTooltip] ajudará a replantá-las. Todas elas."
 court.8001.a.lesson_tt: "[child_1.GetFirstNameNoTooltip] tem mãos habilidosas para a jardinagem"
 court.8001.b.gardener: "Como #EMP ousa#! tratar [child_1.GetFirstNameNoTooltip] assim?!"
 court.8001.b.poet: "As crianças podem brincar onde quiserem, [gardener.GetFirstNameNoTooltip]."
 court.8001.c: "Você transmite um pouco de sabedoria"
 court.8001.c.gardener_tt: "Você não é útil"
 court.8001.d: "Como #EMP ousa#! tratar [child_1.GetFirstNameNoTooltip] assim?!"
 court.8001.e: "Despreparado"
 court.8001.a.success: "Desfruto de um raro momento de paz entre as reuniões do conselho quando [underequipped.Custom('ES_ElLa')] [underequipped.GetTitledFirstName|l] me puxa para o lado. \n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U]…", começa com cuidado,"
 court.8001.a.failure: ""Como seu[underequipped.Custom('ES_OA')] campe[underequipped.Custom('ES_OnOna')], ? uma honra represent?-lo,"
 ## Underequipped
 court.8010.t: "Como [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')] voss[ROOT.Char.Custom('ES_OA')], ? meu sagrado dever lutar suas batalhas,"
 court.8010.desc.intro: "mas isso é ridículo!".\n\nDesembainha a espada pela metade e chama minha atenção para suas inúmeras marcas e amassados. "Não se pode esperar que eu faça meu trabalho com esta barra desajeitada!""
 court.8010.desc.champion: "mas…"\n\nDúvida por um momento e então faz um gesto fraco, mas exasperado com sua bainha: "Como posso fazer meu trabalho com essa velharia?""
 court.8010.desc.bodyguard: "\n\n\"Certamente a qualidade é tudo quando se trata de"
 court.8010.desc.knight: "agindo em nome de [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip]!"
 court.8010.desc.bold: "proteger a vida de [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip]!"
 court.8010.desc.meek: "M melhores [underequipped.GetWomenMen] precisam de armas de qualidade!"
 court.8010.desc.body: "Será forjada uma arma de boa qualidade, à escolha de [underequipped.GetTitledFirstNameNoTooltip|l]"
 court.8010.desc.champion_end: "Uma boa arma foi forjada para [underequipped.GetTitledFirstName|l]"
 court.8010.desc.bodyguard_end: "Suponho que eu possa abrir mão de uma das minhas próprias armas..."
 court.8010.a: "É presenteada uma arma para [underequipped.GetTitledFirstNameNoTooltip|l]"
 court.8010.a.tt: "Vá ao arsenal — como todos os outros."
 court.8010.a.equipped_tt: "[underequipped.GetTitledFirstNameNoTooltip] pegará uma espada de qualidade inferior no arsenal"
 court.8010.c: "[underequipped.GetTitledFirstName] recebe uma espada do arsenal"
 court.8010.c.equipped_tt: "Saia da minha vista, [underequipped.Custom2('InsultNoun', ROOT.Char)] descarad[suspicious.Custom('ES_OA')]!"
 court.8010.d: "Vá ao arsenal — como todos os outros."
 court.8010.d.tt: "Ferida Sartorial"
 court.8010.d.equipped_tt: "Ocupad[ROOT.Char.Custom('ES_OA')] em meio a mais um dia na corte, percebo o tom de ira inconfund?vel do meu [couture_spouse.GetWifeHusband] [couture_spouse.Custom('ES_ElLa')] [couture_spouse.GetTitledFirstName|l]. Parece que algu?m tirou [couture_spouse.GetHerHim] do s?rio. 

Ao me aproximar, vejo minha convidad[couture_guest.Custom('ES_OA')] debochando com petul?ncia: "Estas chamadas #EMP modas#! s?o uma vergonha! S? serviriam para servos e crian?as em qualquer corte #EMP [couture_guest.GetCulture.GetNameNoTooltip]#! respeit?vel."

Meu [couture_spouse.GetWifeHusband] fica vermelh[couture_spouse.Custom('ES_OA')] e grita: "J? estou #EMP fart[couture_spouse.Custom('ES_OA')]#! de voc?. N?o me importa se voc? ? convidad[couture_guest.Custom('ES_OA')] de [ROOT.Char.GetTitleAsNameNoTooltip]!", para surpresa de [couture_guest.GetFirstNameNoTooltip]. 

[couture_spouse.GetFirstNameNoTooltip] me puxa de lado e reclama amargamente: "Ess[couture_guest.Custom('ES_EA')] [couture_guest.Custom2('InsultNoun', SCOPE.sC('couture_spouse'))] ingrat[couture_guest.Custom('ES_OA')] n?o para de zombar de n?s; ontem meus servos ouviram [couture_guest.GetHerHim] dizer que nossas tend?ncias est?o #EMP ultrapassadas#!!"."
 court.8010.e: "Vamos, amor, ele/ela só está brincando conosco."
 ## Sartorial Sting
 court.8020.t: "Ultrapassadas? #EMP UTRAPASSADAS?!#!"
 court.8020.desc: "Ocupad[ROOT.Char.Custom('ES_OA')] em meio a mais um dia na corte, percebo o tom de ira inconfund?vel do meu [couture_spouse.GetWifeHusband] [couture_spouse.Custom('ES_ElLa')] [couture_spouse.GetTitledFirstName|l]. Parece que algu?m tirou [couture_spouse.GetHerHim] do s?rio. 

Ao me aproximar, vejo minha convidad[couture_guest.Custom('ES_OA')] debochando com petul?ncia: "Cães de Caça Finos"

Meu [couture_spouse.GetWifeHusband] fica vermelh[couture_spouse.Custom('ES_OA')] e grita: "J? estou #EMP fart[couture_spouse.Custom('ES_OA')]#! de voc?. N?o me importa se voc? ? convidad[couture_guest.Custom('ES_OA')] de [ROOT.Char.GetTitleAsNameNoTooltip]!", para surpresa de [couture_guest.GetFirstNameNoTooltip]. 

[couture_spouse.GetFirstNameNoTooltip] me puxa de lado e reclama amargamente: "Quando [huntmaster.Custom('ES_ElLa')] [huntmaster.GetTitledFirstName|l], meu mestre[huntmaster.Custom('ES_OA')] ca?ador[huntmaster.Custom('ES_XA')], entra na sala, um bando de cortes?os encantados se lan?a sobre [huntmaster.GetHerHim]. 

Quando finalmente consegue passar, a causa da agita??o fica clara: em seus bra?os, ele carrega um cobertor cheio de filhotinhos se remexendo, aparentemente [ROOT.Char.Custom('get_region_dog_type')], e tamb?m muito impressionantes! 

Meu $master_of_hunt_court_position$ sorri amplamente: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], eu simplesmente tinha que lhe mostrar esta ninhada; quando esses c?ezinhos crescerem e forem treinados, ouso dizer que ser?o a inveja de toda partida de ca?a [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip]!" 

"
 court.8020.a: "Não posso deixar de notar m [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child_1'))] [child_1.Custom('ComplimentAdjective')], [child_1.GetFirstNameNoTooltip], se esforçando para ter uma boa visão dos cachorrinhos."
 court.8020.b: "De canto de olho, vejo dois dos meus filhos, [child_1.GetFirstName] e [child_2.GetFirstName], claramente encantados pelos filhotes e, em especial, pelo maior de todos."
 court.8020.d: "\n\n[huntmaster.GetTitledFirstNameNoTooltip|l] pega o maior de todos e rumina: "Este pode ser o maior cão de sua geração!"."
 poor_host_modifier: "Mal posso esperar pela estreia deles!"
 poor_host_modifier_desc: "O maior irá com meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child_1'))], [child_1.GetFirstNameNoTooltip]!"
 hunting_pooches_modifier: "Só [child_2.GetFirstNameNoTooltip] merece um garoto tão bom."
 hunting_pooches_modifier_desc: "Ah, tenho esperado por um cachorro tão magnífico!"
 ## Pawful of Pooches
 court.8030.t: "Pretensões Aristocráticas"
 court.8030.desc.intro: "Quando [huntmaster.Custom('ES_ElLa')] [huntmaster.GetTitledFirstName|l], meu mestre[huntmaster.Custom('ES_OA')] ca?ador[huntmaster.Custom('ES_XA')], entra na sala, um bando de cortes?os encantados se lan?a sobre [huntmaster.GetHerHim]. 

Quando finalmente consegue passar, a causa da agita??o fica clara: em seus bra?os, ele carrega um cobertor cheio de filhotinhos se remexendo, aparentemente [ROOT.Char.Custom('get_region_dog_type')], e tamb?m muito impressionantes! 

Meu $master_of_hunt_court_position$ sorri amplamente: "ambicios[ambitious.Custom('ES_OA')]; sempre em busca de mais;" 

"
 court.8030.desc.one: "arrogante[gentry.Custom('ES_OA')] [gentry.GetName], os privilegiados [gentry.GetHouse.GetName];"
 court.8030.desc.two: "[ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('generic_1'))] [generic_1.GetName], feliz por participar[generic_1.Custom('ES_OA')];"
 court.8030.desc.body: "[ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('generic_2'))] [generic_2.GetName], como [generic_2.GetHerHim] os guardas chamam;"
 court.8030.a: "[ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('generic_3'))] [generic_3.GetName] — um subordinado eminente e facilmente esquecível;"
 court.8030.b: "e notavelmente ausente: uma gota de humildade. \n\nEntre o burburinho de cortesãos cochichando, consigo distinguir as palavras "[worst_title.GetTierAsNameNoTooltip]" e "[worst_title.GetNameNoTier]", no que tenho certeza era o tom afetado de [button.GetFirstNameNoTooltip]. \n\nO trio descarado se vira para me olhar, e os pego com um olhar fulminante."
 court.8030.c: "Sim, sim, [courtier_1.GetTitledFirstNameNoTooltip|l]… [worst_title.GetNameNoTierNoTooltip] é seu."
 court.8030.d: "Este jogozinho pode acabar: [worst_title.GetTierAsNameNoTooltip] é d [courtier_2.GetFirstNameNoTooltip]!"
 ## Aristocratic Pretensions
 court.8040.t: "Eu sei o que vocês estão tramando! É hora de provar o seu valor!"
 court.8040.desc.intro: "\"Ao mais forte\""
 court.8040.desc.position_holder: "[courtier_1.GetFirstNameNoTooltip] quer mais"
 court.8040.desc.knight: "[courtier_2.GetFirstNameNoTooltip] é o/a últim[courtier_2.Custom('ES_OA')] em pé"
 court.8040.desc.relative: "[courtier_3.GetFirstNameNoTooltip] sai por cima"
 court.8040.desc.ambitious: "[new_noble.GetTitledFirstNameNoTooltip|l] recebe [worst_title.GetNameNoTierNoTooltip]"
 court.8040.desc.arrogant: "Cada um de vocês, me diga por que merece um título."
 court.8040.desc.lowborn: "[courtier_1.GetFirstNameNoTooltip] é muito convincente"
 court.8040.desc.gentry: "[courtier_2.GetFirstNameNoTooltip] impressiona com sua eloquência"
 court.8040.desc.generic_1: "[courtier_3.GetFirstNameNoTooltip] fala bem"
 court.8040.desc.generic_2: "[new_noble.GetFirstNameNoTooltip] jura não entrar em nenhuma facção por 20 anos"
 court.8040.desc.generic_3: "O que você está olhando?"
 court.8040.desc.body: "e notavelmente ausente: uma gota de humildade. \n\nEntre o burburinho de cortesãos cochichando, consigo distinguir as palavras "[worst_title.GetTierAsNameNoTooltip]" e "[worst_title.GetNameNoTier]", no que tenho certeza era o tom afetado de [button.GetFirstNameNoTooltip]. \n\nO trio descarado se vira para me olhar, e os pego com um olhar fulminante."
 court.8040.a: "Um Pequeno Pássaro"
 court.8040.b: "No in?cio pensei que fossem meras idiossincrasias, mas est? claro que um dos muitos servos da corte tem me feito sinais furtivos.

Aproximo-me de [servant.GetHerHim] com meus guardas em um momento tranquilo, e [servant.GetSheHe] sussurra com cumplicidade: "Grande [ROOT.Char.GetTitleAsNameNoTooltip], meu nome ? [servant.GetFirstName]. Ouvimos muita coisa ao servir seus convidados; eles mal percebem nossa presen?a...". 

Olho para [servant.GetHerHim] com desconfian?a, perguntando-me se realmente quero ouvir o que [servant.GetSheHe] vai dizer a seguir. [servant.GetSheHe|U] devolve o olhar, claramente insegur[servant.Custom('ES_OA')] de estar cometendo um erro. 

Por fim, [servant.GetSheHe] engole em seco: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], [vassal.Custom('ES_ElLa')] [vassal.GetTitledFirstName|l], voss[vassal.Custom('ES_OA')] [servant.Custom2('DescriptorNegative', SCOPE.sC('vassal'))] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('vassal'))], [vassal_secret.Custom('SecretDescriptionThirdPerson')] atr?s das portas fechadas do seu [ROOT.Char.Custom('FortifiedBuilding')]. Juro por [servant.GetFaith.HighGodName] como testemunha!"."
 court.8040.c: "Obrigado pelo seu serviço."
 court.8040.d: "[servant.GetFirstNameNoTooltip] se juntará à sua [court|lE]"
 court.8040.d.flavor_tt: "O que mais você ouviu?"
 court.8040.d.courtier_1_tt: "Você descobrirá um segredo de outra pessoa na corte"
 court.8040.d.courtier_2_tt: "Segredo d [vassal_2.GetTitledFirstName|l]"
 court.8040.d.courtier_3_tt: "Leve isso — você reportará apenas a mim."
 court.8040.grant_tt: "Seu [spymaster|lE] terá mais chances de interromper tramas enquanto esse modificador estiver presente"
 court.8040.e: "Prenda esse espião furtivo!"
 court.8040.e.courtier_1_tt: "[servant.GetFirstNameNoTooltip] é jogado nas masmorras"
 court.8040.e.courtier_2_tt: "[courtier_2.GetFirstNameNoTooltip] impressiona com sua eloquência"
 court.8040.e.courtier_3_tt: "Informantes Criados"
 joining_faction_block_tt: "Os boatos na corte deste personagem são relatados por uma rede de criados espiões."
 court.8040.f: "O que você está olhando?"
 ## A Little Bird
 court.8050.t: "Pauso por um momento no limiar do corredor, admirando a luz do sol, quando ouço uma risada debochada vindo da esquina. \n\n"Ah, e #EMP muito!#!", ouço meu [ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('snooty_1'))] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('snooty_1'))], [snooty_1.GetFirstName], rindo,"
 court.8050.desc: "No in?cio pensei que fossem meras idiossincrasias, mas est? claro que um dos muitos servos da corte tem me feito sinais furtivos.

Aproximo-me de [servant.GetHerHim] com meus guardas em um momento tranquilo, e [servant.GetSheHe] sussurra com cumplicidade: ""Você #EMP viste#! o banquete de ontem à noite? Eu preferiria mastigar minha gamela do que comer essa lavagem de porco!". \n\n". 

Olho para [servant.GetHerHim] com desconfian?a, perguntando-me se realmente quero ouvir o que [servant.GetSheHe] vai dizer a seguir. [servant.GetSheHe|U] devolve o olhar, claramente insegur[servant.Custom('ES_OA')] de estar cometendo um erro. 

Por fim, [servant.GetSheHe] engole em seco: "os criados — desisti de pedir qualquer coisa a eles: ou não sabem o que é ou nunca voltam!"
 court.8050.a: "\n\nSerá que é meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('snooty_2'))] [snooty_2.GetTitledFirstName|l] sufocando uma gargalhada? Que audácia..."
 court.8050.a.tt: "Estabelecerei um novo padrão de vestimenta especialmente para você, [snooty_1.GetFirstNameNoTooltip]."
 court.8050.b: "Talvez você possa sugerir alguns funcionários habilidosos, [snooty_1.GetFirstNameNoTooltip]?"
 court.8050.b.tt: "[snooty_1.GetFirstNameNoTooltip], tenho uma refeição especial planejada para amanhã."
 court.8050.b.tt_secret: "Em breve teremos um novo cozinheiro, [snooty_2.GetFirstNameNoTooltip]."
 court.8050.c: "Mudarei para quartos maiores hoje à noite, [snooty_2.GetFirstNameNoTooltip]."
 court.8050.c.tt: "Suponho que poderíamos contar com mais algumas mãos para ajudar."
 court.8050.d: "Saia do meu caminho, seus ingratos sanguessugas..."
 court.8050.d.tt_imprison: "Se vocês não gostam, vão arrumar outra pessoa para parasitar de[ROOT.Char.Custom('ES_OA')]!"
 #Modifiers
 servant_informants_modifier: "Todo vassalo ou cortesão não Cínico de uma fé Ascética"
 servant_informants_modifier_desc: "Dia adorável, não é?"
 ## Scornful Sycophants
 court.8060.t: "Lisonjeador Desdenhoso"
 court.8060.desc.intro: "Sentindo-se Útil"
 court.8060.desc.fashion: "Meu [ROOT.Char.Custom2('DescriptorPositive', SCOPE.sC('parent'))] [parent.GetMotherFather] perambula sem rumo pela corte todos os dias, deixando claro seu anseio por um prop?sito que eu estou ocupad[ROOT.Char.Custom('ES_OA')] demais para proporcionar. 

Hoje, finalmente, [parent.GetSheHe] me encurrala: "Ora, a? est? voc?, [ROOT.Char.GetFirstNameNoTooltip], para mim voc? ainda ? meu/minha pequen[ROOT.Char.Custom('ES_OA')] [ROOT.Char.Custom('GirlBoy')]! Deixe que eu tire um pouco do peso dos seus ombros, ainda h? tanto que eu posso lhe ensinar." 

Minha comitiva faz o poss?vel para olhar para qualquer outra coisa, mas isso s? piora meu constrangimento. 

"[ROOT.Char.Custom('GetDaughterSon')|U], o que foi? N?o se importa com seu/sua querid[parent.Custom('ES_OA')] e velh[parent.Custom('ES_OA')] [parent.Custom('GetMaPa')]? Depois de tudo que eu fiz por voc??"."
 court.8060.desc.servants_1: "Vou encontrar algo para você fazer, [parent.Custom('GetMamaPapa')]." 

"
 court.8060.desc.food_1: "Apenas arrume qualquer emprego..."
 court.8060.desc.body: "Estou #EMP muito#! ocupad[ROOT.Char.Custom('ES_OA')]'[parent.GetMotherFather]."
 court.8060.desc.lodgings: "[parent.GetMotherFather|U] se anima com seu papel"
 court.8060.desc.food_2: "[parent.GetMotherFather|U] se cansa de esperar"
 court.8060.desc.servants_2: "os criados — desisti de pedir qualquer coisa a eles: ou não sabem o que é ou nunca voltam!"
 court.8060.desc.outro: "Posição Prometida"
 court.8060.a.fashion: "Este personagem recebeu a garantia de uma posição na corte em um futuro próximo e conta isso para todos dispostos a ouvir."
 court.8060.a.servants: "Talvez você possa sugerir alguns funcionários habilidosos, [snooty_1.GetFirstNameNoTooltip]?"
 court.8060.a.food: "Repreensão [parent.Custom('GetMaternalPaternal')]"
 court.8060.b.food: "Meu [parent.GetMotherFather], [parent.GetTitledFirstName|l], est? cada vez mais irritadiço. 

Enquanto me sento no trono, contemplando as possíveis causas, [parent.GetSheHe] vem em minha direção furios[ROOT.Char.Custom('ES_OA')], assim como fazia quando eu me comportava mal quando era um[ROOT.Char.Custom('ES_XA')] crian?[ROOT.Char.Custom('ES_OA')].

"[ROOT.Char.GetFirstNameNoTooltip], [ROOT.Char.Custom('GetDaughterSon')] meu[ROOT.Char.Custom('ES_OA')]! Você tem que fazer alguma coisa com"
 court.8060.b.lodgings: "esses trapos lúgubres que você chama de roupas!"
 court.8060.b.servants: "seus servos incompetentes e sobrecarregados!"
 court.8060.c: "as acomodações escassas que você oferece aos seus hóspedes!"
 court.8060.d: "as ofertas terríveis em sua mesa de banquetes!"
 court.8060.e: "Não se importa com o que as pessoas pensam de você?!"

"Isso não é digno de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip]. Nesse ritmo, você ser? motivo de chacota em [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], que digo, de todos os [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip]!"
 court.8060.e.pious_tt: "Sim, [parent.Custom('GetMamaPapa')], vou resolver isso..."
 court.8060.f: "Ah, então você acha que é melhor do que meus cortesãos?"
 court.8060.f.flavor: "Cada [courtier|lE]"
 ## Feeling Useful
 court.8070.t: "Talvez você prefira as vestes de um [ROOT.Char.GetFaith.DevoteeMale]?"
 court.8070.desc: "Meu [ROOT.Char.Custom2('DescriptorPositive', SCOPE.sC('parent'))] [parent.GetMotherFather] perambula sem rumo pela corte todos os dias, deixando claro seu anseio por um prop?sito que eu estou ocupad[ROOT.Char.Custom('ES_OA')] demais para proporcionar. 

Hoje, finalmente, [parent.GetSheHe] me encurrala: "Bem, por que você não dá uma mão aos servos?" 

Minha comitiva faz o poss?vel para olhar para qualquer outra coisa, mas isso s? piora meu constrangimento. 

"[ROOT.Char.Custom('GetDaughterSon')|U], o que foi? N?o se importa com seu/sua querid[parent.Custom('ES_OA')] e velh[parent.Custom('ES_OA')] [parent.Custom('GetMaPa')]? Depois de tudo que eu fiz por voc??"."
 court.8070.a: "Humilhado"
 court.8070.a.tt: "Este personagem foi publicamente humilhado por seu filho e suserano por reclamar."
 court.8070.b: "Já pensou em dedicar sua vida a [ROOT.Char.GetFaith.HighGodName]?"
 court.8070.c: "Blocos de Construção"
 court.8070.d: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('architect'))], [architect.Custom('ES_ElLa')] [architect.GetTitledFirstName|l], leva muito a sério seus deveres como $royal_architect_court_position$."
