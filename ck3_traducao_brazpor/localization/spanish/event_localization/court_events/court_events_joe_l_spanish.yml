 court.8140.d.2: "\n\nMinha falha em condenar, e a proximidade contínua com est[criminal.Custom('ES_EA')] [criminal.Custom('GetCrimeDesc')] é percebida como uma tolerância aberta, manchando a reputação da minha corte aos olhos dos [ROOT.Char.GetFaith.AltPriestTermPlural] e dos fiéis…\n\nEles me forçaram a agir, e agora devo decidir se os crimes de [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('criminal'))] superam meu afeto por [criminal.GetSheHe]. Está claro que algo deve ser feito,"
 court.8140.d.3: "mesmo que [criminal.GetSheHe] seja um [criminal.Custom('ES_XA')] [criminal.GetDynasty.GetNameNoTooltip]…"
 court.8140.d.flavor_tt: "depois de tudo, é um[criminal.Custom('ES_XA')] simples viajante[criminal.Custom('ES_OA')]."
 court_event_discount_desc: "será que os cortesãos são tão difíceis de substituir?"
