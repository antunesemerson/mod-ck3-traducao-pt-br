 court.8150.desc.body: "A atividade culinária é impulsionada pela disputa constante de [vassal_1.GetTitledFirstName|l], [vassal_2.GetTitledFirstName|l] e [vassal_3.GetTitledFirstName|l] para exigir a refeição mais memorável dos meus cozinheiros sobrecarregados. \n\nHoje é meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('demander'))], [demander.GetFirstNameNoTooltip], que baba: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], esta noite farei com que as cozinhas preparem o molho mais saboroso conhecido pelo homem, servido com um assado de dez aves!", diz, lambendo os lábios com fome. \n\n"
 court.8150.desc.almoner_chaplain: "Segredos e Mentiras"
 court.8150.desc.chaplain: "Os dias passam sem que isso sequer me ocorra, mas toda vez que capto a aten??o de [criminal.GetTitledFirstName|l] na corte, s? consigo pensar em seus crimes. 

Pergunto-me quantos na corte sabem, talvez ningu?m? Talvez todos... A verdade acabar? vindo ? tona, e n?o far? nada bem ? minha reputa??o ter tais esc?ndalos entre meus cortes?os... 

? preciso lidar com [criminal.GetSheHe], ou terei de prestar contas a [ROOT.Char.GetFaith.HighGodName], para n?o falar da corte."
 court.8150.desc.almoner: "Basta é basta. O mundo precisa saber."
 court.8150.a: "Só um tolo não aproveitaria esse conhecimento."
 court.8150.b: "Seu lugar é na prisão."
 court.8150.c: "Está na hora de partir."
 court.8150.d: "Não há necessidade de agir ainda..."
 court.8150.a.tt: "Sob a Vigilância do Senhor"
 food_taster_mettle_tested_desc: "O senhor deste personagem está mantendo um olhar muito atento sobre ele — e suas atividades secretas."
 court.8150.b.tt: "Tribunal Sem Segredos"
 plenty_to_donate_almoner_desc: "Este personagem tem a reputação de caçar segredos e punir crimes implacavelmente."
 ## Foremost Knight
 court.8160.t: "Primeiro [ROOT.Char.Custom('MountedWarriorTerm')]"
 court.8160.desc.intro: "? de se esperar uma rivalidade saud?vel entre lutadores aguerridos, mas a crescente disc?rdia entre [knight_1.GetFirstName] e [knight_2.GetFirstName] est? azedando o clima na corte. 

Considera-se amplamente que [knight_1.GetTitledFirstNameNoTooltip|l] ? mais habilidoso, mas [knight_2.GetTitledFirstNameNoTooltip|l] claramente discorda dessa afirma??o. 

No meio de uma audi?ncia, [knight_2.Custom('ES_EA')] irrompe em minha sala do trono e, agarrando o punho de sua espada, grita: "[knight_1.GetFirstNameNoTooltip]! S? [Select_CString(And(knight_1.IsFemale, knight_2.IsFemale), 'uma de n?s', 'um de n?s')] pode afirmar ser [Select_CString(And(knight_1.IsFemale, knight_2.IsFemale), 'a', 'o')] [ROOT.Char.Custom('MountedWarriorTerm')] mais [Select_CString(And(knight_1.IsFemale, knight_2.IsFemale), 'destra', 'destro')] [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip], venha at? aqui fora e eu esclarecerei a quest?o!"

[knight_1.Custom('ES_ElLa')|U] [knight_1.GetTitledFirstNameNoTooltip|l] responde [knight_2.Custom('quirk_neg_adverb')]: "Eu te faria em peda?os onde est?s se n?o fosse pela presen?a de meu [ROOT.Char.GetTitleAsNameNoTooltip], seu [knight_2.Custom2('InsultNoun', SCOPE.sC('knight_1'))] de car?ter [knight_2.Custom('quirk_neg_adjective')]! Pe?a desculpas e talvez eu poupe sua vida!" 

Ser? melhor agir r?pido se quiser conter essa escalada..."
 court.8160.a: "[Select_CString(And(knight_1.IsFemale, knight_2.IsFemale), 'Ambas', 'Ambos')] me servireis diretamente."
 court.8160.a.tt: "A rivalidade entre [knight_1.GetFirstNameNoTooltip] e [knight_2.GetFirstNameNoTooltip] garante que, enquanto continuarem [Select_CString(And(knight_1.IsFemale, knight_2.IsFemale), 'empleadas', 'empleados')], darão o máximo em seus cargos: [aptitude|lE] aumentada."
 competing_knight_position_desc: "Cavaleiros Competidores"
 court.8160.a.tt_knight_1: "[knight_1.GetTitledFirstNameNoTooltip|l] vence o duelo"
 court.8160.a.tt_knight_2: "[knight_2.GetTitledFirstNameNoTooltip|l] vence o duelo"
 court.8160.b: "Peguem suas espadas! Dêem a eles espadas de treinamento."
 court.8160.c: "Eu vou humilhar ambos!"
 court.8160.c.tt: "Você lutará em combate individual com o [knight|E] de maior [prowess|E] ([knight_1.GetTitledFirstName|l])"
 court.8160.c.tt_win: "Você saiu vitorioso"
 court.8160.c.tt_lose: "Você foi derrotado"
 court.8160.d: "Prove isso para mim no campo de batalha, não na corte!"
 court.8163.t: "Você vence o duelo"
 court_humiliation_modifier: "Humilhação na Corte"
 court_humiliation_modifier_desc: "Este personagem foi desacreditado diante de toda a corte."
 court.8162.tt: "Tendo provado sua superioridade em um duelo justo, reconhece-se que [sc_victor.GetFirstNameNoTooltip] é [sc_victor.Custom('ES_ElLa')] melhor [ROOT.Char.Custom('MountedWarriorTerm')] e [Select_CString(sc_victor.IsFemale, 'a mais qualificada', 'o mais qualificado' )] para ser seu $bodyguard_court_position$ ou $champion_court_position$: [aptitude|lE] aumentada."
 best_knight_position_desc: "Melhor dos Cavaleiros"
 fostering_competitiveness_modifier: "Fomentando Competitividade"
 fostering_competitiveness_modifier_desc: "Este personagem fomenta a competitividade entre suas tropas no campo de batalha."
 ## Pariah of Court
 court.8170.t: "Pária da Corte"
 court.8170.desc.intro_scary: "As crianças da corte fogem quando [criminal.GetFirstName] [criminal.Custom('GetCrime')] se aproxima, e nem mesmo o [ROOT.Char.GetFaith.BishopNeuterPlural] mais fervoroso consegue evitar encolher-se diante de sua presença."
 court.8170.desc.intro_sordid: "[criminal.GetFirstName] [criminal.Custom('GetCrime')] é uma figura de desprezo na corte, assediad[criminal.Custom('ES_OA')] pelo ostracismo social e alvo de muitas piadas sórdidas."
 court.8170.desc.intro_religious: "Sou duramente julgado por minha hospitalidade para com [criminal.GetFirstName] o [criminal.Custom('GetCrime')|U], a quem quase todos evitam por causa de sua fé maligna."
 court.8170.desc.intro_fallback: "Minha corte não tolera minhas desculpas por minha hospitalidade para com "[criminal.GetFirstName] [criminal.Custom('GetCrime')]", a quem se considera uma aberração em um lugar, de resto, distinto."
 court.8170.desc.body: "\n\nMinha falha em condenar, e a proximidade contínua com est[criminal.Custom('ES_EA')] [criminal.Custom('GetCrimeDesc')] é percebida como uma tolerância aberta, manchando a reputação da minha corte aos olhos dos [ROOT.Char.GetFaith.AltPriestTermPlural] e dos fiéis…\n\nEles me forçaram a agir, e agora devo decidir se os crimes de [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('criminal'))] superam meu afeto por [criminal.GetSheHe]. Está claro que algo deve ser feito,"
 court.8170.desc.family: "mesmo que [criminal.GetSheHe] seja um [criminal.Custom('ES_XA')] [criminal.GetDynasty.GetNameNoTooltip]…"
 court.8170.desc.guest: "depois de tudo, é um[criminal.Custom('ES_XA')] simples viajante[criminal.Custom('ES_OA')]."
 court.8170.desc.fallback: "será que os cortesãos são tão difíceis de substituir?"
 court.8170.a.family: "Não — a família vem em primeiro lugar."
 court.8170.a.other: "Não cabe a mim julgar."
 court.8170.b: "Você precisa se arrepender, [criminal.GetFirstNameNoTooltip]!"
 court.8170.c1: "Visto que [criminal.GetSheHe] não viu a justiça, não verá mais nada!"
 court.8170.c2: "A maldita linhagem de [criminal.GetFirstNameNoTooltip] terminará com ele."
 court.8170.c3: "Somente a morte pode limpar seus crimes."
 court.8170.d: "Não posso mais te receber, [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('criminal'))]..."
 harbors_criminals_modifier: "Protetor de Personagens Sombrio"
 harbors_criminals_modifier_desc: "Este personagem não faz nada para levar os criminosos em seu próprio tribunal à justiça. Afinal, eles têm suas utilidades."
 fast_hard_justice_modifier: "Justiça Rápida e Severíssima"
 fast_hard_justice_modifier_desc: "Este personagem ganhou a reputação de lidar eficazmente com criminosos."
