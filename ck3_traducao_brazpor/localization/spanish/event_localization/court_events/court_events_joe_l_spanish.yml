 court.8140.c.1: "Pária da Corte"
 court.8140.c.2: "As crianças da corte fogem quando [criminal.GetFirstName] [criminal.Custom('GetCrime')] se aproxima, e nem mesmo o [ROOT.Char.GetFaith.BishopNeuterPlural] mais fervoroso consegue evitar encolher-se diante de sua presença."
 court.8140.c.3: "[criminal.GetFirstName] [criminal.Custom('GetCrime')] é uma figura de desprezo na corte, assediad[criminal.Custom('ES_OA')] pelo ostracismo social e alvo de muitas piadas sórdidas."
 court.8140.c.flavor_tt: "Sou duramente julgado por minha hospitalidade para com [criminal.GetFirstName] o [criminal.Custom('GetCrime')|U], a quem quase todos evitam por causa de sua fé maligna."
