 ## Questionable Concoction
 court.8100.t: "Sento-me em silêncio, ouvindo meu [ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('accuser') )] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('accuser'))], [accuser.GetTitledFirstName|l] envolver-se em um intenso debate teológico com meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('refuter'))], [refuter.GetTitledFirstName|l]. \n\nEst[refuter.Custom('ES_EA')] últim[refuter.Custom('ES_OA')] suplica [refuter.Custom('quirk_pos_adverb')],"
 court.8100.desc: "Ao caminhar entre audi?ncias, ou?o meu [ROOT.Char.Custom2('DescriptorPositive', SCOPE.sC('physician'))] $court_physician_court_position$, [physician.GetTitledFirstName|l], discutindo sua ?ltima extravag?ncia. 

"os sagrados laços do matrimônio devem ser compartilhados apenas com uma única pessoa; é assim que nos aproximamos do [accuser.GetFaith.PositiveAfterLife]." 

[physician.GetSheHe|U] tira um frasco com um l?quido amarelo-claro e o gira sob os narizes arrebitados dos meus cortes?os. 

"[accuser.GetFaith.CreatorName] criou homens e mulheres juntos, nenhum submisso ao outro, no início dos tempos."
