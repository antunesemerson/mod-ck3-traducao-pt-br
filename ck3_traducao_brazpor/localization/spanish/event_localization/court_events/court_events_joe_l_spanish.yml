 ## Upon the Block
 court.8110.t: ""Tal agitação é imprópria para esta corte; não me deixarei intimidar por seus jogos", rebate [vassal.Custom('quirk_pos_adverb')] [vassal.Custom('ES_ElLa')] [vassal.GetTitledFirstNameNoTooltip|l]. $court.8130.desc.body$ [vassal.Custom('ES_ElLa')|U] [vassal.GetTitleAsNameNoTooltip] [vassal.Custom('quirk_pos_present')] e responde: "Muito bem, com prazer colocarei est[champion.Custom('ES_EA')] [champion.Custom2('InsultAdjective', SCOPE.sC('vassal'))] brut[champion.Custom('ES_OA')] em seu lugar"."
 court.8110.desc.intro: "Meu [my_executioner.Custom('quirk_neg_adjective')] $executioner_court_position$, [my_executioner.GetTitledFirstName|l], vagueia tristemente pelo pal?cio [my_executioner.Custom('quirk_neg_pp')], com a sutileza de uma crian?a petulante.

No fim, j? n?o suporto mais essas exibi??es lament?veis em minha corte e exijo saber: "\n\nTodos buscam minha opinião sobre o assunto enquanto [mediator.GetFirstNameNoTooltip] mantém os dois separados."

[my_executioner.GetSheHe|U] se espanta, mas responde depressa: "[champion.GetTitledFirstNameNoTooltip|l] vence o duelo". 

