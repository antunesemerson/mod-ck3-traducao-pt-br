 court.8110.desc.leader_2: "O espet?culo da corte continua, dia ap?s dia, do amanhecer ao anoitecer. [vassal_2.Custom('ES_ElLa')|U] [vassal_2.GetTitledFirstName|l] improvisa sobre a minha grandeza, derramando clich?s e elogios. Perto dali, [vassal_1.Custom('ES_ElLa')] [vassal_1.GetTitledFirstName|l] se junta, faz gra?a para o p?blico, sorri estupidamente e espera um sinal do meu favor por suas palha?adas. Uma ?nica gota de suor escorre interminavelmente pela minha testa... 

[vassal_2.GetFirstNameNoTooltip] percebe minha dist?ncia e pergunta: "V?s estais bem, [ROOT.Char.Custom('FormOfAddressForLiege')]?", com uma preocupa??o quase sincera.

