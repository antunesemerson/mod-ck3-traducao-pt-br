l_spanish:
 ## Trampled Underfoot
 court.8001.t: "Pisoteado"
 court.8001.desc.intro: "\"Quantas vezes eu j? te disse para ficar #EMP longe#! dos #EMP novos canteiros de [ROOT.Char.Custom('get_region_flower_type_plural')]#!?!\"\n\n[child_1.Custom2('MyCharacterIntroduction', ROOT.Char)] aparece cobert[child_1.Custom('ES_OA')] de p?talas e terra, perseguid[child_1.Custom('ES_OA')] pelo meu jardineir[gardener.Custom('ES_OA')], [gardener.GetFirstNameNoTooltip].\n\n[child_1.GetFirstNameNoTooltip] grita:"
 court.8001.desc.diplomacy: "\"Eles estavam me perseguindo! Eu nunca perdi um jogo de #EMP pega-pega#!!\""
 court.8001.desc.martial: "\"Eu só estava me escondendo dos soldados... tivemos que emboscá-los para vencer a batalha!\""
 court.8001.desc.stewardship: "\"Não foi minha culpa! [gardener.GetSheHe|U] colocou elas em cima do nosso castelinho!\""
 court.8001.desc.intrigue: "\"Estávamos brincando de esconde-esconde, ninguém teria me encontrado se não fosse por #EMP [gardener.GetSheHe]#!!\""
 court.8001.desc.learning: "\"Eu só estava olhando! Elas estão de uma cor diferente desta vez!\""
 court.8001.desc.fallback: "\"Eu não fiz nada! Só estava brincando!\""
 court.8001.desc.closing: "\n\n[gardener.GetFirstNameNoTooltip] diz, furioso: \"[Select_CString( child_1.IsFemale, 'Esta dichosa', 'Este dichoso' )] [child_1.Custom('GirlBoy')] pisoteou #EMP todo#! meu trabalho, [ROOT.Char.Custom('FormOfAddressForLiege')]! Levará #EMP semanas#! para consertar os danos…\"."
 court.8001.a.diplomacy: "Às vezes vale a pena ser pego, [child_1.Custom('GirlBoy')] mi[child_1.Custom('ES_OA')]."
 court.8001.a.martial: "Ah, mas você deve escolher bem suas batalhas, [child_1.Custom('GirlBoy')] meu[child_1.Custom('ES_OA')]!"
 court.8001.a.stewardship: "Eu conheço um lugar melhor para construir sua poderosa corte, [child_1.Custom('GirlBoy')] [child_1.Custom('ES_OA')]."
 court.8001.a.intrigue: "O truque é não ser pego, [child_1.Custom('GirlBoy')] meu[child_1.Custom('ES_OA')] p."
 court.8001.a.learning: "Também se pode aprender à distância, [child_1.Custom('GirlBoy')] meu[child_1.Custom('ES_OA')]."
 court.8001.a.lesson_tt: "[child_1.GetFirstNameNoTooltip] entende seu ponto"
 court.8001.b.gardener: "Não! #EMP Não#! nos canteiros de flores..."
 court.8001.b.poet: "Beleza delicada, sempre esmagada por tolos desajeitados..."
 court.8001.c: "[child_1.GetFirstNameNoTooltip] ajudará a replantá-las. Todas elas."
 court.8001.c.gardener_tt: "[child_1.GetFirstNameNoTooltip] tem mãos habilidosas para a jardinagem"
 court.8001.d: "Como #EMP ousa#! tratar [child_1.GetFirstNameNoTooltip] assim?!"
 court.8001.e: "As crianças podem brincar onde quiserem, [gardener.GetFirstNameNoTooltip]."
 court.8001.a.success: "Você transmite um pouco de sabedoria"
 court.8001.a.failure: "Você não é útil"
 ## Underequipped
 court.8010.t: "Despreparado"
 court.8010.desc.intro: "Desfruto de um raro momento de paz entre as reuniões do conselho quando [underequipped.Custom('ES_ElLa')] [underequipped.GetTitledFirstName|l] me puxa para o lado. \n\n\"[ROOT.Char.Custom('FormOfAddressForLiege')|U]…\", começa com cuidado,"
 court.8010.desc.champion: "\"Como seu[underequipped.Custom('ES_OA')] campe[underequipped.Custom('ES_OnOna')], ? uma honra represent?-lo,"
 court.8010.desc.bodyguard: "\"Como seu[underequipped.Custom('ES_OA')] guarda-costas, ? uma honra proteg?-lo,"
 court.8010.desc.knight: "Como [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')] voss[ROOT.Char.Custom('ES_OA')], ? meu sagrado dever lutar suas batalhas,"
 court.8010.desc.bold: "mas isso é ridículo!\".\n\nDesembainha a espada pela metade e chama minha atenção para suas inúmeras marcas e amassados. \"Não se pode esperar que eu faça meu trabalho com esta barra desajeitada!\""
 court.8010.desc.meek: "mas…\"\n\nDúvida por um momento e então faz um gesto fraco, mas exasperado com sua bainha: \"Como posso fazer meu trabalho com essa velharia?\""
 court.8010.desc.body: "\n\n\"Certamente a qualidade é tudo quando se trata de"
 court.8010.desc.champion_end: "agindo em nome de [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip]!"
 court.8010.desc.bodyguard_end: "proteger a vida de [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip]!"
 court.8010.a: "M melhores [underequipped.GetWomenMen] precisam de armas de qualidade!"
 court.8010.a.tt: "Será forjada uma arma de boa qualidade, à escolha de [underequipped.GetTitledFirstNameNoTooltip|l]"
 court.8010.a.equipped_tt: "Uma boa arma foi forjada para [underequipped.GetTitledFirstName|l]"
 court.8010.c: "Suponho que eu possa abrir mão de uma das minhas próprias armas..."
 court.8010.c.equipped_tt: "É presenteada uma arma para [underequipped.GetTitledFirstNameNoTooltip|l]"
 court.8010.d: "Vá ao arsenal — como todos os outros."
 court.8010.d.tt: "[underequipped.GetTitledFirstNameNoTooltip] pegará uma espada de qualidade inferior no arsenal"
 court.8010.d.equipped_tt: "[underequipped.GetTitledFirstName] recebe uma espada do arsenal"
 court.8010.e: "Saia da minha vista, [underequipped.Custom2('InsultNoun', ROOT.Char)] descarad[suspicious.Custom('ES_OA')]!"
 ## Sartorial Sting
 court.8020.t: "Ferida Sartorial"
 court.8020.desc: "Ocupad[ROOT.Char.Custom('ES_OA')] em meio a mais um dia na corte, percebo o tom de ira inconfund?vel do meu [couture_spouse.GetWifeHusband] [couture_spouse.Custom('ES_ElLa')] [couture_spouse.GetTitledFirstName|l]. Parece que algu?m tirou [couture_spouse.GetHerHim] do s?rio. \n\nAo me aproximar, vejo minha convidad[couture_guest.Custom('ES_OA')] debochando com petul?ncia: \"Estas chamadas #EMP modas#! s?o uma vergonha! S? serviriam para servos e crian?as em qualquer corte #EMP [couture_guest.GetCulture.GetNameNoTooltip]#! respeit?vel.\"\n\nMeu [couture_spouse.GetWifeHusband] fica vermelh[couture_spouse.Custom('ES_OA')] e grita: \"J? estou #EMP fart[couture_spouse.Custom('ES_OA')]#! de voc?. N?o me importa se voc? ? convidad[couture_guest.Custom('ES_OA')] de [ROOT.Char.GetTitleAsNameNoTooltip]!\", para surpresa de [couture_guest.GetFirstNameNoTooltip]. \n\n[couture_spouse.GetFirstNameNoTooltip] me puxa de lado e reclama amargamente: \"Ess[couture_guest.Custom('ES_EA')] [couture_guest.Custom2('InsultNoun', SCOPE.sC('couture_spouse'))] ingrat[couture_guest.Custom('ES_OA')] n?o para de zombar de n?s; ontem meus servos ouviram [couture_guest.GetHerHim] dizer que nossas tend?ncias est?o #EMP ultrapassadas#!!\"."
 court.8020.a: "Vamos, amor, ele/ela só está brincando conosco."
 court.8020.b: "Suponho que seja um bom local para investimento..."
 court.8020.d: "Ultrapassadas? #EMP UTRAPASSADAS?!#!"
 poor_host_modifier: "Anfitrião Inadequado"
 poor_host_modifier_desc: "Este personagem quebrou as regras não escritas da hospitalidade."
 hunting_pooches_modifier: "Cães de Caça Finos"
 hunting_pooches_modifier_desc: "A corte deste personagem possui cães de caça particularmente impressionantes."
 ## Pawful of Pooches
 court.8030.t: "Um Punhado de Cachorros"
 court.8030.desc.intro: "Quando [huntmaster.Custom('ES_ElLa')] [huntmaster.GetTitledFirstName|l], meu mestre[huntmaster.Custom('ES_OA')] ca?ador[huntmaster.Custom('ES_XA')], entra na sala, um bando de cortes?os encantados se lan?a sobre [huntmaster.GetHerHim]. \n\nQuando finalmente consegue passar, a causa da agita??o fica clara: em seus bra?os, ele carrega um cobertor cheio de filhotinhos se remexendo, aparentemente [ROOT.Char.Custom('get_region_dog_type')], e tamb?m muito impressionantes! \n\nMeu $master_of_hunt_court_position$ sorri amplamente: \"[ROOT.Char.Custom('FormOfAddressForLiege')|U], eu simplesmente tinha que lhe mostrar esta ninhada; quando esses c?ezinhos crescerem e forem treinados, ouso dizer que ser?o a inveja de toda partida de ca?a [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip]!\" \n\n"
 court.8030.desc.one: "Não posso deixar de notar m [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child_1'))] [child_1.Custom('ComplimentAdjective')], [child_1.GetFirstNameNoTooltip], se esforçando para ter uma boa visão dos cachorrinhos."
 court.8030.desc.two: "De canto de olho, vejo dois dos meus filhos, [child_1.GetFirstName] e [child_2.GetFirstName], claramente encantados pelos filhotes e, em especial, pelo maior de todos."
 court.8030.desc.body: "\n\n[huntmaster.GetTitledFirstNameNoTooltip|l] pega o maior de todos e rumina: \"Este pode ser o maior cão de sua geração!\"."
 court.8030.a: "Mal posso esperar pela estreia deles!"
 court.8030.b: "O maior irá com meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child_1'))], [child_1.GetFirstNameNoTooltip]!"
 court.8030.c: "Só [child_2.GetFirstNameNoTooltip] merece um garoto tão bom."
 court.8030.d: "Ah, tenho esperado por um cachorro tão magnífico!"
 ## Aristocratic Pretensions
 court.8040.t: "Pretensões Aristocráticas"
 court.8040.desc.intro: "Três dos meus cortesãos discutem deliberada e abertamente sobre meu \"grande número\" de títulos ao alcance dos meus ouvidos. Lamentam em voz alta como deve ser exaustivo para [ROOT.Char.GetTitleAsNameNoTooltip] administrar tantas propriedades pessoalmente… \n\nSão como unha e carne:"
 court.8040.desc.position_holder: "fiel [position_holder.GetName], servidor[position_holder.Custom('ES_XA')] da corte;"
 court.8040.desc.knight: "galante [knight.GetName]. Meu [ROOT.Char.Custom('MountedWarriorTerm')] distinguid[knight.Custom('ES_OA')];"
 court.8040.desc.relative: "[relative.GetName], meu parente que se acha no direito;"
 court.8040.desc.ambitious: "ambicios[ambitious.Custom('ES_OA')]; sempre em busca de mais;"
 court.8040.desc.arrogant: "presunçoso [arrogant.GetName] — cabeça erguida;"
 court.8040.desc.lowborn: "[lowborn.GetName], feit[lowborn.Custom('ES_OA')] por si mesm[lowborn.Custom('ES_OA')], que aproveita qualquer oportunidade;"
 court.8040.desc.gentry: "arrogante[gentry.Custom('ES_OA')] [gentry.GetName], os privilegiados [gentry.GetHouse.GetName];"
 court.8040.desc.generic_1: "[ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('generic_1'))] [generic_1.GetName], feliz por participar[generic_1.Custom('ES_OA')];"
 court.8040.desc.generic_2: "[ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('generic_2'))] [generic_2.GetName], como [generic_2.GetHerHim] os guardas chamam;"
 court.8040.desc.generic_3: "[ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('generic_3'))] [generic_3.GetName] — um subordinado eminente e facilmente esquecível;"
 court.8040.desc.body: "e notavelmente ausente: uma gota de humildade. \n\nEntre o burburinho de cortesãos cochichando, consigo distinguir as palavras \"[worst_title.GetTierAsNameNoTooltip]\" e \"[worst_title.GetNameNoTier]\", no que tenho certeza era o tom afetado de [button.GetFirstNameNoTooltip]. \n\nO trio descarado se vira para me olhar, e os pego com um olhar fulminante."
 court.8040.a: "Sim, sim, [courtier_1.GetTitledFirstNameNoTooltip|l]… [worst_title.GetNameNoTierNoTooltip] é seu."
 court.8040.b: "Este jogozinho pode acabar: [worst_title.GetTierAsNameNoTooltip] é d [courtier_2.GetFirstNameNoTooltip]!"
 court.8040.c: "Você aí! [courtier_3.GetTitledFirstNameNoTooltip]? O título é seu!"
 court.8040.d: "Eu sei o que vocês estão tramando! É hora de provar o seu valor!"
 court.8040.d.flavor_tt: "\"Ao mais forte\""
 court.8040.d.courtier_1_tt: "[courtier_1.GetFirstNameNoTooltip] quer mais"
 court.8040.d.courtier_2_tt: "[courtier_2.GetFirstNameNoTooltip] é o/a últim[courtier_2.Custom('ES_OA')] em pé"
 court.8040.d.courtier_3_tt: "[courtier_3.GetFirstNameNoTooltip] sai por cima"
 court.8040.grant_tt: "[new_noble.GetTitledFirstNameNoTooltip|l] recebe [worst_title.GetNameNoTierNoTooltip]"
 court.8040.e: "Cada um de vocês, me diga por que merece um título."
 court.8040.e.courtier_1_tt: "[courtier_1.GetFirstNameNoTooltip] é muito convincente"
 court.8040.e.courtier_2_tt: "[courtier_2.GetFirstNameNoTooltip] impressiona com sua eloquência"
 court.8040.e.courtier_3_tt: "[courtier_3.GetFirstNameNoTooltip] fala bem"
 joining_faction_block_tt: "[new_noble.GetFirstNameNoTooltip] jura não entrar em nenhuma facção por 20 anos"
 court.8040.f: "O que você está olhando?"
 ## A Little Bird
 court.8050.t: "Um Pequeno Pássaro"
 court.8050.desc: "No in?cio pensei que fossem meras idiossincrasias, mas est? claro que um dos muitos servos da corte tem me feito sinais furtivos.\n\nAproximo-me de [servant.GetHerHim] com meus guardas em um momento tranquilo, e [servant.GetSheHe] sussurra com cumplicidade: \"Grande [ROOT.Char.GetTitleAsNameNoTooltip], meu nome ? [servant.GetFirstName]. Ouvimos muita coisa ao servir seus convidados; eles mal percebem nossa presen?a...\". \n\nOlho para [servant.GetHerHim] com desconfian?a, perguntando-me se realmente quero ouvir o que [servant.GetSheHe] vai dizer a seguir. [servant.GetSheHe|U] devolve o olhar, claramente insegur[servant.Custom('ES_OA')] de estar cometendo um erro. \n\nPor fim, [servant.GetSheHe] engole em seco: \"[ROOT.Char.Custom('FormOfAddressForLiege')|U], [vassal.Custom('ES_ElLa')] [vassal.GetTitledFirstName|l], voss[vassal.Custom('ES_OA')] [servant.Custom2('DescriptorNegative', SCOPE.sC('vassal'))] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('vassal'))], [vassal_secret.Custom('SecretDescriptionThirdPerson')] atr?s das portas fechadas do seu [ROOT.Char.Custom('FortifiedBuilding')]. Juro por [servant.GetFaith.HighGodName] como testemunha!\"."
 court.8050.a: "Obrigado pelo seu serviço."
 court.8050.a.tt: "[servant.GetFirstNameNoTooltip] se juntará à sua [court|lE]"
 court.8050.b: "O que mais você ouviu?"
 court.8050.b.tt: "Você descobrirá um segredo de outra pessoa na corte"
 court.8050.b.tt_secret: "Segredo d [vassal_2.GetTitledFirstName|l]"
 court.8050.c: "Leve isso — você reportará apenas a mim."
 court.8050.c.tt: "Seu [spymaster|lE] terá mais chances de interromper tramas enquanto esse modificador estiver presente"
 court.8050.d: "Prenda esse espião furtivo!"
 court.8050.d.tt_imprison: "[servant.GetFirstNameNoTooltip] é jogado nas masmorras"
 #Modifiers
 servant_informants_modifier: "Informantes Criados"
 servant_informants_modifier_desc: "Os boatos na corte deste personagem são relatados por uma rede de criados espiões."
 ## Scornful Sycophants
 court.8060.t: "Lisonjeador Desdenhoso"
 court.8060.desc.intro: "Pauso por um momento no limiar do corredor, admirando a luz do sol, quando ouço uma risada debochada vindo da esquina. \n\n\"Ah, e #EMP muito!#!\", ouço meu [ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('snooty_1'))] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('snooty_1'))], [snooty_1.GetFirstName], rindo,"
 court.8060.desc.fashion: "\"Juro que, quando dou uma volta, às vezes me sinto como na corte [snooty_1.Custom('ES_DelDela')] avó[snooty_1.Custom('ES_OA')] [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip]. Que tendências tão tradicionais e fora de moda!\".\n\n"
 court.8060.desc.servants_1: "\"Você espera #EMP o dia todo#! por um serviçal e então chegam dois de uma vez, sem o que você pediu!\" \n\n"
 court.8060.desc.food_1: "\"Você #EMP viste#! o banquete de ontem à noite? Eu preferiria mastigar minha gamela do que comer essa lavagem de porco!\". \n\n"
 court.8060.desc.body: "Outra voz de risadinhas interrompe: 'Nossa, pensei que eu fosse a única que percebeu! Sem mencionar"
 court.8060.desc.lodgings: "o #EMP tamanho#! dos nossos aposentos! Mal há espaço suficiente para o catre de um criado!'"
 court.8060.desc.food_2: "a comida deste lugar é realmente terrível — e porções tão #EMP pequenas#!"
 court.8060.desc.servants_2: "os criados — desisti de pedir qualquer coisa a eles: ou não sabem o que é ou nunca voltam!"
 court.8060.desc.outro: "\n\nSerá que é meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('snooty_2'))] [snooty_2.GetTitledFirstName|l] sufocando uma gargalhada? Que audácia..."
 court.8060.a.fashion: "Estabelecerei um novo padrão de vestimenta especialmente para você, [snooty_1.GetFirstNameNoTooltip]."
 court.8060.a.servants: "Talvez você possa sugerir alguns funcionários habilidosos, [snooty_1.GetFirstNameNoTooltip]?"
 court.8060.a.food: "[snooty_1.GetFirstNameNoTooltip], tenho uma refeição especial planejada para amanhã."
 court.8060.b.food: "Em breve teremos um novo cozinheiro, [snooty_2.GetFirstNameNoTooltip]."
 court.8060.b.lodgings: "Mudarei para quartos maiores hoje à noite, [snooty_2.GetFirstNameNoTooltip]."
 court.8060.b.servants: "Suponho que poderíamos contar com mais algumas mãos para ajudar."
 court.8060.c: "Saia do meu caminho, seus ingratos sanguessugas..."
 court.8060.d: "Se vocês não gostam, vão arrumar outra pessoa para parasitar de[ROOT.Char.Custom('ES_OA')]!"
 court.8060.e: "As distrações mundanas apenas nos separam do [ROOT.Char.GetFaith.PositiveAfterLife]."
 court.8060.e.pious_tt: "Todo vassalo ou cortesão não Cínico de uma fé Ascética"
 court.8060.f: "Dia adorável, não é?"
 court.8060.f.flavor: "As aparências devem ser mantidas"
 ## Feeling Useful
 court.8070.t: "Sentindo-se Útil"
 court.8070.desc: "Meu [ROOT.Char.Custom2('DescriptorPositive', SCOPE.sC('parent'))] [parent.GetMotherFather] perambula sem rumo pela corte todos os dias, deixando claro seu anseio por um prop?sito que eu estou ocupad[ROOT.Char.Custom('ES_OA')] demais para proporcionar. \n\nHoje, finalmente, [parent.GetSheHe] me encurrala: \"Ora, a? est? voc?, [ROOT.Char.GetFirstNameNoTooltip], para mim voc? ainda ? meu/minha pequen[ROOT.Char.Custom('ES_OA')] [ROOT.Char.Custom('GirlBoy')]! Deixe que eu tire um pouco do peso dos seus ombros, ainda h? tanto que eu posso lhe ensinar.\" \n\nMinha comitiva faz o poss?vel para olhar para qualquer outra coisa, mas isso s? piora meu constrangimento. \n\n\"[ROOT.Char.Custom('GetDaughterSon')|U], o que foi? N?o se importa com seu/sua querid[parent.Custom('ES_OA')] e velh[parent.Custom('ES_OA')] [parent.Custom('GetMaPa')]? Depois de tudo que eu fiz por voc??\"."
 court.8070.a: "Vou encontrar algo para você fazer, [parent.Custom('GetMamaPapa')]."
 court.8070.a.tt: "[parent.GetFirstNameNoTooltip] esperará por uma [court_position|lE] nos próximos meses"
 court.8070.b: "Já pensou em dedicar sua vida a [ROOT.Char.GetFaith.HighGodName]?"
 court.8070.c: "Apenas arrume qualquer emprego..."
 court.8070.d: "Estou #EMP muito#! ocupad[ROOT.Char.Custom('ES_OA')]'[parent.GetMotherFather]."
 court.8071.satisfied: "[parent.GetMotherFather|U] se anima com seu papel"
 court.8071.disappoint: "[parent.GetMotherFather|U] se cansa de esperar"
 #Modifiers
 promised_court_position_modifier: "Posição Prometida"
 promised_court_position_modifier_desc: "Este personagem recebeu a garantia de uma posição na corte em um futuro próximo e conta isso para todos dispostos a ouvir."
 ## Maternal Reproach
 court.8080.t: "Repreensão [parent.Custom('GetMaternalPaternal')]"
 court.8080.desc.intro: "Meu [parent.GetMotherFather], [parent.GetTitledFirstName|l], est? cada vez mais irritadiço. \n\nEnquanto me sento no trono, contemplando as possíveis causas, [parent.GetSheHe] vem em minha direção furios[ROOT.Char.Custom('ES_OA')], assim como fazia quando eu me comportava mal quando era um[ROOT.Char.Custom('ES_XA')] crian?[ROOT.Char.Custom('ES_OA')].\n\n\"[ROOT.Char.GetFirstNameNoTooltip], [ROOT.Char.Custom('GetDaughterSon')] meu[ROOT.Char.Custom('ES_OA')]! Você tem que fazer alguma coisa com"
 court.8080.desc.fashion: "esses trapos lúgubres que você chama de roupas!"
 court.8080.desc.servants: "seus servos incompetentes e sobrecarregados!"
 court.8080.desc.lodgings: "as acomodações escassas que você oferece aos seus hóspedes!"
 court.8080.desc.food: "as ofertas terríveis em sua mesa de banquetes!"
 court.8080.desc.outro: "Não se importa com o que as pessoas pensam de você?!\"\n\n\"Isso não é digno de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip]. Nesse ritmo, você ser? motivo de chacota em [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], que digo, de todos os [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip]!"
 court.8080.a: "Sim, [parent.Custom('GetMamaPapa')], vou resolver isso..."
 court.8080.b: "Ah, então você acha que é melhor do que meus cortesãos?"
 court.8080.b.tt: "Cada [courtier|lE]"
 court.8080.c.nun: "Talvez você prefira o hábito de uma [ROOT.Char.GetFaith.DevoteeFemale]?"
 court.8080.c.monk: "Talvez você prefira as vestes de um [ROOT.Char.GetFaith.DevoteeMale]?"
 court.8080.c.fallback: "Você já pensou em se dedicar a [ROOT.Char.GetFaith.HighGodName]?"
 court.8080.d.fashion: "Acho que você #EMP deveria#! costurar substituições para nós."
 court.8080.d.servants: "Bem, por que você não dá uma mão aos servos?"
 court.8080.d.lodgings: "Talvez você possa ceder seu quarto para outra pessoa?"
 court.8080.d.food: "Muito bem, então encontre outro lugar para comer..."
 court.8080.e: "Você não pode mais falar comigo dessa maneira!"
 #Modifiers
 court_8080_degraded_modifier: "Humilhado"
 court_8080_degraded_modifier_desc: "Este personagem foi publicamente humilhado por seu filho e suserano por reclamar."
 ## Building Blocks
 court.8090.t: "Blocos de Construção"
 court.8090.desc.intro: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('architect'))], [architect.Custom('ES_ElLa')] [architect.GetTitledFirstName|l], leva muito a sério seus deveres como $royal_architect_court_position$."
 court.8090.desc.intro_alt: "[architect.Custom('ES_ElLa')|U] [architect.GetTitledFirstName|l], um[architect.Custom('ES_XA')] muito conhecid[architect.Custom('ES_OA')] arquitet[architect.Custom('ES_OA')] de [my_county.GetNameNoTier], está visitando a corte."
 court.8090.desc.intro_end: "Seu apaixonado debate com meu [steward.GetHeldCourtAndCouncilPositionsString|l]; [steward.Custom('ES_ElLa')] [steward.GetTitledFirstName|l], domina a sala. \n\n“Sim, exatamente!”, exclama [architect.GetFirstNameNoTooltip],“Essas ruínas estão repletas de pedra lavrada que poderia ser facilmente transferida"
 court.8090.desc.religious: "o [ROOT.Char.GetFaith.HouseOfWorship] de [temple_barony.GetNameNoTier]!\""
 court.8090.desc.castle: "da [ROOT.Char.Custom('FortifiedBuilding')] de [ROOT.Char.GetTitleAsNameNoTooltip] em [my_barony.GetNameNoTier]!\""
 court.8090.desc.outro: "\n\n[steward.GetFirstNameNoTooltip] esfrega o queixo, em dúvida. \"Ainda assim, isso parece muito trabalho, e os locais que usam esses materiais não vão gostar.\" \n\n[architect.GetFirstNameNoTooltip] revira os olhos diante dessa refutação razoável,"
 court.8090.desc.chaplain: "mas sou interrompid[architect.Custom('ES_OA')] por meu [chaplain.GetHeldCourtAndCouncilPositionsString]; “Há nas proximidades, em [temple_barony.GetNameNoTier] uma [ROOT.Char.GetFaith.HouseOfWorship] que está desesperadamente precisando de ampliação”, grita [chaplain.GetTitledFirstName|l]. “É para lá que os escombros deveriam ir!”."
 court.8090.desc.fallback: "sorrindo com desdém[architect.Custom('ES_OA')]: \"Podemos fazer um uso muito melhor disso do que os camponeses jamais poderiam, você sabe disso!\""
 court.8090.a: "[my_barony.GetNameNoTierNoTooltip] #EMP poderia#! usar um pouco de trabalho..."
 court.8090.b: "Irá para a casa [ROOT.Char.GetFaith.HighGodNamePossessive] de [temple_barony.GetNameNoTierNoTooltip]."
 court.8090.c: "[Select_CString(architect.IsFemale, 'Uma arquiteta', 'Um arquiteto' )] de seu renome pode fazer melhor!"
 court.8090.c.tt: "Esta opção está disponível porque [architect.GetFirstNameNoTooltip] é seu $royal_architect_court_position$"
 court.8090.d: "Deixe esses blocos gastos para os plebeus."
 #Modifiers
 court_8090_commoners_modifier: "Ruínas Comuns"
 court_8090_commoners_modifier_desc: "O povo comum deste condado se beneficia ao usar antigas ruínas como materiais de construção."
 ## Questionable Concoction
 court.8100.t: "Poção Questionável"
 court.8100.desc: "Ao caminhar entre audi?ncias, ou?o meu [ROOT.Char.Custom2('DescriptorPositive', SCOPE.sC('physician'))] $court_physician_court_position$, [physician.GetTitledFirstName|l], discutindo sua ?ltima extravag?ncia. \n\n\"...supostamente, ? a po??o mais forte que existe e vem apenas dos confins mais distantes do mundo, ou assim dizem os mercadores e alquimistas com quem falei.\" \n\n[physician.GetSheHe|U] tira um frasco com um l?quido amarelo-claro e o gira sob os narizes arrebitados dos meus cortes?os. \n\n\"Dizem que concede vigor e longa vida, e ? favorecida por aqueles que v?o para a batalha, mas s? os mais fortes conseguem suportar seu poder.\""
 court.8100.a: "A poção mais forte, você diz? Me dê aqui."
 court.8100.b: "Realmente? Deixe que m $food_taster_court_position$ experimente primeiro."
 court.8100.b.tt_forgiving: "[food_taster.GetTitledFirstName] não é $trait_forgiving$:"
 court.8100.c: "Apenas [ROOT.Char.GetFaith.HighGodName] pode nos conceder força."
 court.8100.d: "Essa porcaria não serve nem para uma fera, quanto mais para um homem!"
 court.8100.tt.handle_potion: "Você lida com a poção mais forte"
 court.8100.tt.need_weaker: "Deveria ter encontrado uma poção mais fraca"
 court.8100.tt.too_strong: "A poção é muito forte para você"
 #Modifiers
 strong_potion_modifier: "Poção Forte"
 strong_potion_modifier_desc: "Este personagem conseguiu lidar com as poções mais fortes."
 feeling_unwell_modifier: "Sentindo-se Mal"
 feeling_unwell_modifier_desc: "Este personagem deveria ter encontrado poções mais fracas."
 ## Upon the Block
 court.8110.t: "Sobre o Cadafalso"
 court.8110.desc.intro: "Meu [my_executioner.Custom('quirk_neg_adjective')] $executioner_court_position$, [my_executioner.GetTitledFirstName|l], vagueia tristemente pelo pal?cio [my_executioner.Custom('quirk_neg_pp')], com a sutileza de uma crian?a petulante.\n\nNo fim, j? n?o suporto mais essas exibi??es lament?veis em minha corte e exijo saber: \"Qual #EMP ?#! o problema?!\"\n\n[my_executioner.GetSheHe|U] se espanta, mas responde depressa: \"[ROOT.Char.Custom('FormOfAddressForLiege')|U], perdoai-me, ? s? que j? faz semanas que n?o tenho uma boa morte...\". \n\n\"Vamos, ?[prisoner_1.Custom('ES_EA')]"
 court.8110.desc.leader_1: "agitador[prisoner_1.Custom('ES_XA')] repugnante, [prisoner_1.GetTitledFirstName|l],"
 court.8110.desc.heretic: "herege insolente, [prisoner_1.GetTitledFirstName|l]"
 court.8110.desc.heathen: "vil pagã[prisoner_1.Custom('ES_OA')], [prisoner_1.GetTitledFirstName|l],"
 court.8110.desc.infidel: "infiel ímpi[prisoner_1.Custom('ES_OA')], [prisoner_1.GetTitledFirstName|l],"
 court.8110.desc.noble: "demônio desprezível, [prisoner_1.GetTitledFirstName|l],"
 court.8110.desc.fallback: "do odioso [prisoner_1.Custom('GetCrime')], [prisoner_1.GetTitledFirstName|l]"
 court.8110.desc.body: "está apenas #EMP definhar#!, esperando você anunciar a data da execução."
 court.8110.desc.religious: "Não importa para [ROOT.Char.GetFaith.DeathDeityName] quando a alma ímpia alcança o [ROOT.Char.GetFaith.NegativeAfterLife]..."
 court.8110.desc.leader_2: "Enquanto viver, pode ser um símbolo para outros renegados…\""
 court.8110.desc.criminal: "Permita-me acabar com [prisoner_1.Custom('GetCrimeDesc')] de seu sofrimento..."
 court.8110.a: "Muito bem, é a vez d [prisoner_1.GetTitledFirstNameNoTooltip|l]."
 court.8110.b: "Não, é a vez d [prisoner_2.GetTitledFirstNameNoTooltip|l] a seguir."
 court.8110.c: "Sim, e #EMP você#! é um [my_executioner.Custom('GetCrime')]"
 court.8110.c.flavor: "M $executioner_court_position$ deve saber o seu lugar"
 court.8110.d: "Você está gostando disso demais, [my_executioner.GetFirstNameNoTooltip]."
 court.8110.e: "Não há pressa."
 ## Novel Perspectives
 court.8120.t: "Perspectivas Novas"
 court.8120.desc.intro: "Sento-me em silêncio, ouvindo meu [ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('accuser') )] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('accuser'))], [accuser.GetTitledFirstName|l] envolver-se em um intenso debate teológico com meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('refuter'))], [refuter.GetTitledFirstName|l]. \n\nEst[refuter.Custom('ES_EA')] últim[refuter.Custom('ES_OA')] suplica [refuter.Custom('quirk_pos_adverb')],"
 court.8120.desc.same_religion: "\"...mas [refuter.GetFaith.GetNameNoTooltip] #EMP ?#! mais próximo da verdadeira palavra de [refuter.GetFaith.HighGodName]; é a destila??o mais pura das revelações [refuter.GetFaith.GetReligion.GetAdjectiveNoTooltip]s\".\n\n[accuser.GetTitledFirstNameNoTooltip|l] zomba, [accuser.Custom('quirk_neg_pp')]. \"Leiam o/a [accuser.GetFaith.ReligiousText] e vereis que"
 court.8120.desc.other_religion: "“mas os ensinamentos atrasados [accuser.GetFaith.GetReligion.GetAdjectiveNoTooltip] não podem ser seriamente comparados com os de nosso [refuter.GetFaith.GetReligion.GetNameNoTooltip|l]; [accuser.GetFaith.HighGodName] é mera distorção da verdade [refuter.GetFaith.HighGodNamePossessive]”.\n\nZomba [accuser.Custom('quirk_neg_pp')] [accuser.GetTitledFirstNameNoTooltip|l]. “Pensem bem e verão que"
 court.8120.desc.marriage: "os sagrados laços do matrimônio devem ser compartilhados apenas com uma única pessoa; é assim que nos aproximamos do [accuser.GetFaith.PositiveAfterLife]."
 court.8120.desc.divorce: "o divórcio é para aqueles que não desejam se entregar incondicionalmente a outro, em busca da pureza e [accuser.GetFaith.PositiveAfterLife]. \n\n"
 court.8120.desc.adultery: "[accuser.GetFaith.CreatorName] não pretende que cometamos fornicação fora do casamento e persigamos nossas paixões; é #EMP por isso que#! temos esses laços!"
 court.8120.desc.witchcraft: "os rituais profanos das bruxas estão em contradição com a busca pelo [accuser.GetFaith.PositiveAfterLife]."
 court.8120.desc.equality: "[accuser.GetFaith.CreatorName] criou homens e mulheres juntos, nenhum submisso ao outro, no início dos tempos."
 court.8120.desc.cosanguity: "[accuser.GetFaith.CreatorName] não pretendia que membros da mesma família se casassem ou se reproduzissem; essa é uma tentação que desafia a natureza!"
 court.8120.desc.outro: "\n\n\"Por isso não falo com os perdidos…\" [refuter.GetTitledFirstNameNoTooltip|l] suspira de frustração. \"Se não escutas a verdade, só espero que de algum modo vocês sejam poupados do infernal [accuser.GetFaith.NegativeAfterLife]\"."
 court.8120.a.accuser: "O que diz faz sentido, [refuter.GetFirstNameNoTooltip]."
 court.8120.a.refuter: "O que ela/e diz faz sentido, [accuser.GetFirstNameNoTooltip]."
 court.8120.c: "Venham amigos, há muitas maneiras de honrar o criador."
 court.8120.d: "Olhem aqui, estas são as verdades [ROOT.Char.GetFaith.GetAdjectiveNoTooltip]!"
 court.8120.d.tt: "Todo [vassal|lE], [courtier|lE] e [guest|lE] [THIS.Char.GetFaith.GetAdherentName] fervoroso"
 court.8120.e: "Não quero mais ouvir esse tipo de conversa, [accuser.GetFirstNameNoTooltip]."
 court.8120.f: "Não nos compete debater o divino."
 my_holy_book: "[ROOT.Char.GetFaith.ReligiousText] de [ROOT.Char.GetTitledFirstNameNoTooltip|l]"
 my_holy_book_description: "[ROOT.Char.GetTitledFirstNameNoTooltip|l] da coleção pessoal encadernada de ensinamentos [ROOT.Char.GetFaith.GetAdjectiveNoTooltip]s de [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip], com um/a [ROOT.Char.GetFaith.ReligiousSymbol] dourado na capa."
 ## Contrived Conflict
 court.8130.t: "Conflito Fabricado"
 court.8130.desc.intro: "Enquanto eu estava sentado em meu trono, refletindo sobre uma coisa e outra, irrompe uma comoção. \n\nMeu $champion_court_position$ [champion.GetFirstName] ruge: \"Eu sei exatamente o que você quis dizer, espécie de [vassal.Custom2('InsultNoun', SCOPE.sC('champion'))]! Como #EMP osas#! faltar ao respeito a noss[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip]?\", bem na cara de [vassal.Custom('ES_DelDela')] desconcertad[vassal.Custom('ES_OA')] [vassal.GetTitledFirstName|l]. [mediator.Custom2('MyCharacterIntroduction', ROOT.Char)] intervém rapidamente para [Select_CString(And(champion.IsFemale, vassal.IsFemale), 'separarlas', 'separarlos')], mas a atmosfera já foi irremediavelmente prejudicada. \n\n"
 court.8130.desc.bold: "\"Tal agitação é imprópria para esta corte; não me deixarei intimidar por seus jogos\", rebate [vassal.Custom('quirk_pos_adverb')] [vassal.Custom('ES_ElLa')] [vassal.GetTitledFirstNameNoTooltip|l]. $court.8130.desc.body$ [vassal.Custom('ES_ElLa')|U] [vassal.GetTitleAsNameNoTooltip] [vassal.Custom('quirk_pos_present')] e responde: \"Muito bem, com prazer colocarei est[champion.Custom('ES_EA')] [champion.Custom2('InsultAdjective', SCOPE.sC('vassal'))] brut[champion.Custom('ES_OA')] em seu lugar\"."
 court.8130.desc.craven: "\"M-m-mas eu n-não disse nada parecido!\". [vassal.GetTitledFirstNameNoTooltip|l] diz incrédulamente. $court.8130.desc.body$ [vassal.GetTitleAsNameNoTooltip] [vassal.Custom('quirk_pos_present')] e gagueja: \"O-o quê?! Vamos lá, com certeza isso n-não vai ser necessário?!\""
 court.8130.desc.body: "\"Ouvi isso com meus próprios ouvidos!\", insiste [champion.GetFirstNameNoTooltip]. \"Exijo satisfação por esta ofensa, minha [ROOT.Char.GetLadyLord]!\"."
 court.8130.desc.outro: "\n\nTodos buscam minha opinião sobre o assunto enquanto [mediator.GetFirstNameNoTooltip] mantém os dois separados."
 court.8130.a: "[champion.GetFirstNameNoTooltip] defenderá minha honra."
 court.8130.a.tt_champion: "[champion.GetTitledFirstNameNoTooltip|l] vence o duelo"
 court.8130.a.tt_vassal: "[vassal.GetTitledFirstNameNoTooltip|l] vence o duelo"
 court.8130.a.tt: "[champion.GetTitledFirstName] e [vassal.GetTitledFirstName|l] se enfrentam em [single_combat_duel|lE]"
 court.8130.b: "Um mal-entendido. [vassal.GetFirstNameNoTooltip] é um[vassal.Custom('ES_XA')] vassal[vassal.Custom('ES_OA')] leal."
 court.8130.b.tt_me: "Eu venço o duelo"
 court.8130.c: "Eu preciso de agentes mais ponderados."
 court.8130.d: "O que disse #EMP qué?!#! Tragam-me [ROOT.Char.Custom('signature_weapon')]!"
 court.8130.d.tt: "[vassal.GetTitledFirstName] e eu temos um [single_combat_duel|lE]"
 court.8130.e: "Acalmem-se, não haverá duelo."
 ## Royal Lapse
 court.8140.t: "Lapso Real"
 court.8140.desc: "O espet?culo da corte continua, dia ap?s dia, do amanhecer ao anoitecer. [vassal_2.Custom('ES_ElLa')|U] [vassal_2.GetTitledFirstName|l] improvisa sobre a minha grandeza, derramando clich?s e elogios. Perto dali, [vassal_1.Custom('ES_ElLa')] [vassal_1.GetTitledFirstName|l] se junta, faz gra?a para o p?blico, sorri estupidamente e espera um sinal do meu favor por suas palha?adas. Uma ?nica gota de suor escorre interminavelmente pela minha testa... \n\n[vassal_2.GetFirstNameNoTooltip] percebe minha dist?ncia e pergunta: \"V?s estais bem, [ROOT.Char.Custom('FormOfAddressForLiege')]?\", com uma preocupa??o quase sincera.\n\n\"Preciso de uma pausa.\""
 court.8140.a: "Peço desculpas, você estava dizendo?"
 court.8140.a.flavor_tt: "Recomponha-se, você é [ROOT.Char.GetTitleAsNameNoTooltip]!"
 court.8140.b: "Perdoe-me, tenho outros assuntos para tratar."
 court.8140.b.flavor_tt: "Eu preciso [ROOT.Char.Custom('GetStressDesire')|l]. AGORA."
 court.8140.c.1: "[vassal_1.GetTitledFirstNameNoTooltip], conduza-nos em oração."
 court.8140.c.2: "[vassal_1.GetTitledFirstNameNoTooltip], organize um banquete para mim!"
 court.8140.c.3: "[vassal_1.GetTitledFirstNameNoTooltip], vamos pegar a estrada."
 court.8140.c.flavor_tt: "Agora, isso deixaria minha mente perturbada mais tranquila!"
 court.8140.d.1: "[vassal_2.GetTitledFirstNameNoTooltip], convoque uma caça!"
 court.8140.d.2: "[vassal_2.GetTitledFirstNameNoTooltip], traga-me um novo cavalo."
 court.8140.d.3: "[vassal_2.GetTitledFirstNameNoTooltip], o que sua ciência recomenda?"
 court.8140.d.flavor_tt: "Isso parece encantador!"
 court_event_discount_desc: "Evento de Corte"
 court.8140.c.tt: "Você pode organizar uma [GetActivityType('activity_feast').GetName|l] nos próximos 5 anos por metade do preço."
 court.8140.d.tt: "Você pode organizar um [GetActivityType('activity_hunt').GetName|l] nos próximos 5 anos por metade do preço."
 healthy_strolls_modifier: "Caminhadas Saudáveis"
 healthy_strolls_modifier_desc: "Este personagem aprendeu a apreciar o valor de caminhadas diárias e ar fresco."
 enjoy_the_travel_modifier: "Aproveitar a Viagem"
 enjoy_the_travel_modifier_desc: "Este personagem gosta de estar na estrada e tira o máximo proveito disso."
 court.8140.c.tt.2: "Você pode organizar uma [GetActivityType('activity_pilgrimage').GetName|l] nos próximos 10 anos com um desconto de 25%."
 ## Prandial Excess
 court.8150.t: "Excesso Prandial"
 court.8150.desc.intro: "A cada dia parece que minha corte está agitada com a conversa sobre o próximo banquete, e muitos têm se tornado mais corpulentos ultimamente..."
 court.8150.desc.taster: "\n\n[food_taster.GetTitledFirstName], meu $food_taster_court_position$, parece cada vez mais letárgic[food_taster.Custom('ES_OA')] com cada sessão, suando mais profusamente a cada vez que uma iguaria estrangeira é levada à boca. \n\n"
 court.8150.desc.body: "A atividade culinária é impulsionada pela disputa constante de [vassal_1.GetTitledFirstName|l], [vassal_2.GetTitledFirstName|l] e [vassal_3.GetTitledFirstName|l] para exigir a refeição mais memorável dos meus cozinheiros sobrecarregados. \n\nHoje é meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('demander'))], [demander.GetFirstNameNoTooltip], que baba: \"[ROOT.Char.Custom('FormOfAddressForLiege')|U], esta noite farei com que as cozinhas preparem o molho mais saboroso conhecido pelo homem, servido com um assado de dez aves!\", diz, lambendo os lábios com fome. \n\n"
 court.8150.desc.almoner_chaplain: "Meu $high_almoner_court_position$, [high_almoner.GetTitledFirstName|l] e [chaplain.GetCouncilTitleFirstName] fazem um gesto de desaprovação, balançando a cabeça com um desprezo inequívoco."
 court.8150.desc.chaplain: "[chaplain.GetCouncilTitleFirstName] suspira com desaprovação, \"Esses prazeres fugazes não são nada comparados à graça [chaplain.GetFaith.HighGodNamePossessive]…\"."
 court.8150.desc.almoner: "[high_almoner.GetTitledFirstName], m $high_almoner_court_position$, torce o nariz, resmungando sobre os pobres famintos..."
 court.8150.a: "Mal posso esperar!"
 court.8150.b: "Só o melhor para #EMP minha#! corte."
 court.8150.c: "Essa extravagância foi longe demais!"
 court.8150.d: "Você nunca ficará satisfeit?"
 court.8150.a.tt: "Forjad[food_taster.Custom('ES_OA')] no fogo de mil pratos, o valor [food_taster.Custom('ES_DelDela')] [food_taster.GetTitledFirstNameNoTooltip|l] foi posto à prova e saiu vitorios[food_taster.Custom('ES_OA')] e mais forte: [aptitude|lE] aumentada."
 food_taster_mettle_tested_desc: "Mettle Testado"
 court.8150.b.tt: "Desde que a corte parou de comer em excesso, [high_almoner.Custom('ES_ElLa')] [high_almoner.GetTitledFirstNameNoTooltip|l] tem um suprimento quase inesgotável de comida para doar aos necessitados: [aptitude|lE] aumentada."
 plenty_to_donate_almoner_desc: "Muito para Doar"
 ## Foremost Knight
 court.8160.t: "Primeiro [ROOT.Char.Custom('MountedWarriorTerm')]"
 court.8160.desc.intro: "? de se esperar uma rivalidade saud?vel entre lutadores aguerridos, mas a crescente disc?rdia entre [knight_1.GetFirstName] e [knight_2.GetFirstName] est? azedando o clima na corte. \n\nConsidera-se amplamente que [knight_1.GetTitledFirstNameNoTooltip|l] ? mais habilidoso, mas [knight_2.GetTitledFirstNameNoTooltip|l] claramente discorda dessa afirma??o. \n\nNo meio de uma audi?ncia, [knight_2.Custom('ES_EA')] irrompe em minha sala do trono e, agarrando o punho de sua espada, grita: \"[knight_1.GetFirstNameNoTooltip]! S? [Select_CString(And(knight_1.IsFemale, knight_2.IsFemale), 'uma de n?s', 'um de n?s')] pode afirmar ser [Select_CString(And(knight_1.IsFemale, knight_2.IsFemale), 'a', 'o')] [ROOT.Char.Custom('MountedWarriorTerm')] mais [Select_CString(And(knight_1.IsFemale, knight_2.IsFemale), 'destra', 'destro')] [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip], venha at? aqui fora e eu esclarecerei a quest?o!\"\n\n[knight_1.Custom('ES_ElLa')|U] [knight_1.GetTitledFirstNameNoTooltip|l] responde [knight_2.Custom('quirk_neg_adverb')]: \"Eu te faria em peda?os onde est?s se n?o fosse pela presen?a de meu [ROOT.Char.GetTitleAsNameNoTooltip], seu [knight_2.Custom2('InsultNoun', SCOPE.sC('knight_1'))] de car?ter [knight_2.Custom('quirk_neg_adjective')]! Pe?a desculpas e talvez eu poupe sua vida!\" \n\nSer? melhor agir r?pido se quiser conter essa escalada..."
 court.8160.a: "[Select_CString(And(knight_1.IsFemale, knight_2.IsFemale), 'Ambas', 'Ambos')] me servireis diretamente."
 court.8160.a.tt: "A rivalidade entre [knight_1.GetFirstNameNoTooltip] e [knight_2.GetFirstNameNoTooltip] garante que, enquanto continuarem [Select_CString(And(knight_1.IsFemale, knight_2.IsFemale), 'empleadas', 'empleados')], darão o máximo em seus cargos: [aptitude|lE] aumentada."
 competing_knight_position_desc: "Cavaleiros Competidores"
 court.8160.a.tt_knight_1: "[knight_1.GetTitledFirstNameNoTooltip|l] vence o duelo"
 court.8160.a.tt_knight_2: "[knight_2.GetTitledFirstNameNoTooltip|l] vence o duelo"
 court.8160.b: "Peguem suas espadas! Dêem a eles espadas de treinamento."
 court.8160.c: "Eu vou humilhar ambos!"
 court.8160.c.tt: "Você lutará em combate individual com o [knight|E] de maior [prowess|E] ([knight_1.GetTitledFirstName|l])"
 court.8160.c.tt_win: "Você saiu vitorioso"
 court.8160.c.tt_lose: "Você foi derrotado"
 court.8160.d: "Prove isso para mim no campo de batalha, não na corte!"
 court.8163.t: "Você vence o duelo"
 court_humiliation_modifier: "Humilhação na Corte"
 court_humiliation_modifier_desc: "Este personagem foi desacreditado diante de toda a corte."
 court.8162.tt: "Tendo provado sua superioridade em um duelo justo, reconhece-se que [sc_victor.GetFirstNameNoTooltip] é [sc_victor.Custom('ES_ElLa')] melhor [ROOT.Char.Custom('MountedWarriorTerm')] e [Select_CString(sc_victor.IsFemale, 'a mais qualificada', 'o mais qualificado' )] para ser seu $bodyguard_court_position$ ou $champion_court_position$: [aptitude|lE] aumentada."
 best_knight_position_desc: "Melhor dos Cavaleiros"
 fostering_competitiveness_modifier: "Fomentando Competitividade"
 fostering_competitiveness_modifier_desc: "Este personagem fomenta a competitividade entre suas tropas no campo de batalha."
 ## Pariah of Court
 court.8170.t: "Pária da Corte"
 court.8170.desc.intro_scary: "As crianças da corte fogem quando [criminal.GetFirstName] [criminal.Custom('GetCrime')] se aproxima, e nem mesmo o [ROOT.Char.GetFaith.BishopNeuterPlural] mais fervoroso consegue evitar encolher-se diante de sua presença."
 court.8170.desc.intro_sordid: "[criminal.GetFirstName] [criminal.Custom('GetCrime')] é uma figura de desprezo na corte, assediad[criminal.Custom('ES_OA')] pelo ostracismo social e alvo de muitas piadas sórdidas."
 court.8170.desc.intro_religious: "Sou duramente julgado por minha hospitalidade para com [criminal.GetFirstName] o [criminal.Custom('GetCrime')|U], a quem quase todos evitam por causa de sua fé maligna."
 court.8170.desc.intro_fallback: "Minha corte não tolera minhas desculpas por minha hospitalidade para com \"[criminal.GetFirstName] [criminal.Custom('GetCrime')]\", a quem se considera uma aberração em um lugar, de resto, distinto."
 court.8170.desc.body: "\n\nMinha falha em condenar, e a proximidade contínua com est[criminal.Custom('ES_EA')] [criminal.Custom('GetCrimeDesc')] é percebida como uma tolerância aberta, manchando a reputação da minha corte aos olhos dos [ROOT.Char.GetFaith.AltPriestTermPlural] e dos fiéis…\n\nEles me forçaram a agir, e agora devo decidir se os crimes de [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('criminal'))] superam meu afeto por [criminal.GetSheHe]. Está claro que algo deve ser feito,"
 court.8170.desc.family: "mesmo que [criminal.GetSheHe] seja um [criminal.Custom('ES_XA')] [criminal.GetDynasty.GetNameNoTooltip]…"
 court.8170.desc.guest: "depois de tudo, é um[criminal.Custom('ES_XA')] simples viajante[criminal.Custom('ES_OA')]."
 court.8170.desc.fallback: "será que os cortesãos são tão difíceis de substituir?"
 court.8170.a.family: "Não — a família vem em primeiro lugar."
 court.8170.a.other: "Não cabe a mim julgar."
 court.8170.b: "Você precisa se arrepender, [criminal.GetFirstNameNoTooltip]!"
 court.8170.c1: "Visto que [criminal.GetSheHe] não viu a justiça, não verá mais nada!"
 court.8170.c2: "A maldita linhagem de [criminal.GetFirstNameNoTooltip] terminará com ele."
 court.8170.c3: "Somente a morte pode limpar seus crimes."
 court.8170.d: "Não posso mais te receber, [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('criminal'))]..."
 harbors_criminals_modifier: "Protetor de Personagens Sombrio"
 harbors_criminals_modifier_desc: "Este personagem não faz nada para levar os criminosos em seu próprio tribunal à justiça. Afinal, eles têm suas utilidades."
 fast_hard_justice_modifier: "Justiça Rápida e Severíssima"
 fast_hard_justice_modifier_desc: "Este personagem ganhou a reputação de lidar eficazmente com criminosos."
 ## Secrets and Lies
 court.8180.t: "Segredos e Mentiras"
 court.8180.desc.intro: "Os dias passam sem que isso sequer me ocorra, mas toda vez que capto a aten??o de [criminal.GetTitledFirstName|l] na corte, s? consigo pensar em seus crimes. \n\nPergunto-me quantos na corte sabem, talvez ningu?m? Talvez todos... A verdade acabar? vindo ? tona, e n?o far? nada bem ? minha reputa??o ter tais esc?ndalos entre meus cortes?os... \n\n? preciso lidar com [criminal.GetSheHe], ou terei de prestar contas a [ROOT.Char.GetFaith.HighGodName], para n?o falar da corte."
 court.8180.a: "Basta é basta. O mundo precisa saber."
 court.8180.b: "Só um tolo não aproveitaria esse conhecimento."
 court.8180.c: "Seu lugar é na prisão."
 court.8180.d: "Está na hora de partir."
 court.8180.e: "Não há necessidade de agir ainda..."
 liege_scrutiny_modifier: "Sob a Vigilância do Senhor"
 liege_scrutiny_modifier_desc: "O senhor deste personagem está mantendo um olhar muito atento sobre ele — e suas atividades secretas."
 court_without_secrets_modifier: "Tribunal Sem Segredos"
 court_without_secrets_modifier_desc: "Este personagem tem a reputação de caçar segredos e punir crimes implacavelmente."
