l_spanish:
 #Empty Granaries
 hold_court.6000.t: "Celeiros Vazios"
 hold_court.6000.desc_intro: "Diante de mim está [6000_poor.Custom2('MyCharacterIntroduction', ROOT.Char)] com a cabeça baixa.\n\n[ROOT.Char.Custom('FormOfAddressForLiege')|U], [6000_province.GetNameNoTooltip] foi duramente atingida ultimamente por causa"
 hold_court.6000.desc_occupation: "ocupação inimiga."
 hold_court.6000.desc_raiding: "saques e pilhagens."
 hold_court.6000.desc_epidemics: "epidemias."
 hold_court.6000.desc_winter: "inverno rigoroso."
 hold_court.6000.desc_middle: "O povo está passando fome, nossas terras não estão se recuperando e nosso gado não é mais suficiente para sobreviver!"
 hold_court.6000.desc_count: "[6000_count.Custom2('MyCharacterIntroduction', 6000_poor)|U] não tem dinheiro ou vontade de nos ajudar."
 hold_court.6000.desc_ending: "Imploramos que intervenha e salve seus fiéis súditos com sua grande magnanimidade!\"\n\n se curva profundamente e se cala."
 hold_court.6000.a: "Algum ouro ajudará a amenizar seus sofrimentos."
 hold_court.6000.b: "Concederei isenção de impostos para que se recuperem."
 hold_court.6000.c: "Eu conheço a pessoa certa para o trabalho."
 hold_court.6000.c.tt: "Envias a [inspector.GetTitledFirstName|l] como inspetor[inspector.Custom('ES_XA')] oficial para supervisionar a recuperação do condado"
 hold_court.6000.d: "Tenho certeza de que você pode resolver isso sozinho."
 #From Beyond the Border
 hold_court.6030.t: "De Além da Fronteira"
 hold_court.6030.desc: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], venho da comunidade religiosa de [6030_church.GetName], no [6030_border.GetName].\n\nAli, um grupo de [6030_monk.GetWomenMen] sábios e piedosos vem há séculos reunindo e preservando os conhecimentos tradicionais da cultura [6030_monk.GetCulture.GetName]."
 hold_court.6030.a: "Aceito graciosamente."
 hold_court.6030.b: "Por favor, fique e me ensine mais!"
 hold_court.6030.b.tt.2: "Todos os governantes da cultura [6030_monk.GetCulture.GetName]"
 hold_court.6030.c: "Não me importo, apenas saia da minha vista."
 hold_court.6030.d: "Sua cultura inferior não merece ser lembrada!"
 hold_court.6030.d.tt: "Todos os seus vassalos da cultura [6030_monk.GetCulture.GetName]"
 #A Lost Treasure
 hold_court.6040.t: "Um Tesouro Perdido"
 hold_court.6040.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], represento a comunidade religiosa de [6040_church.GetName]".\n\n"Enquanto vasculhávamos nosso modesto arquivo, encontramos um livro peculiar. A capa está empoeirada, a encadernação é frágil e as páginas estão amareladas pelo tempo, mas ele contém desenhos extremamente incomuns e nenhum dos [6040_monk.GetFaith.PriestNeuterPlural] reconhece sequer a escrita".\n\n"Temos certeza de que ele é único no mundo, um tesouro de conhecimento perdido há muito tempo, um verdadeiro tesouro! Por isso o oferecemos a você. Talvez seja a cópia original do testamento de [6040_monk.GetFaith.HighGodName] ou talvez sejam memórias da criação do mundo!"."
 hold_court.6040.a: "Obrigado, vou adicioná-lo à minha coleção."
 hold_court.6040.b: "#EMP Fascinante!#! Chame o meu antiquário!"
 hold_court.6040.b.tt: "Seu antiquário não tem ideia"
 hold_court_6040_b_fake: "O livro é uma falsificação mal feita - sem valor e inútil"
 hold_court_6040_b_generic: "O livro é realmente antigo, mas é apenas um [6040_monk.Custom('GetOldBook')]."
 hold_court_6040_b_clueless: "Nem mesmo o seu antiquário pode lançar alguma luz sobre as origens e o propósito do livro"
 hold_court_6040_b_artifact: "O livro é uma cópia antiga e preciosa de uma obra-prima!"
 hold_court.6040.c: "Deixe-me dar uma olhada nele, #EMP agora mesmo#!"
 hold_court.6040.c.tt: "É uma falsificação mal feita!"
 hold_court.6040.c.tt.2: "O livro continua sendo um mistério para você"
 hold_court.6040.c.tt.3: "É um manuscrito bonito, mas nada de especial"
 hold_court.6040.c.tt.4: "É um texto raro e valioso"
 hold_court_6040_c_clueless: "A escrita e o conteúdo do livro estão além da sua compreensão"
 hold_court.6040.d: "Deve ser obra do [ROOT.Char.GetFaith.DevilName]! QUEIME-O!"
 hold_court.6040.e: "Quem se importa com livros?"
 #A Holy Tomb
 hold_court.6050.t: "Um Túmulo Sagrado"
 hold_court.6050.desc: "O camponês[6050_pop.Custom('ES_OA')] que está diante de mim parece prestes a explodir de empolgação.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U]! Os milagres! A santidade! Fomos #EMP ABENÇOADOS#!!!".\n\nSuas divagações entusiasmadas são confusas, mas finalmente entendo o ponto principal: ele quer que eu patrocine o culto a um[6050_holy.Custom('ES_XA')] sant[6050_holy.Custom('ES_OA')]."
 hold_court.6050.desc_hof: "\n\nComo [head_of_faith|lE] é prerrogativa minha decidir se devo condenar ou promover este culto."
 hold_court.6050.a: "Sua Santidade receberá a veneração que merece."
 hold_court.6050.b: "Eu já sei. Ess[6050_holy.Custom('ES_EA')] sant[6050_holy.Custom('ES_OA')] me visitou em sonhos."
 hold_court.6050.c: "Eu vou erradicar essa blasfêmia agora mesmo!"
 hold_court.6050.d: "Eu não me importo com superstições camponesas."
 tougher_to_convert: "Comunidade Religiosa Forte"
 tougher_to_convert_desc: "A identidade religiosa deste condado foi recentemente fortalecida, tornando-os mais difíceis de converter.\n\n#N -25%#! Velocidade de Conversão de Fé"
 easier_to_convert: "Comunidade Religiosa Enfraquecida"
 easier_to_convert_desc: "A identidade religiosa deste condado foi recentemente enfraquecida, tornando-os mais suscetíveis a novas crenças.\n\n#P +25%#! Velocidade de Conversão de Fé"
 easier_to_culture_convert: "Comunidade Cultural Enfraquecida"
 easier_to_culture_convert_desc: "A identidade cultural deste condado foi recentemente enfraquecida, tornando-os mais suscetíveis a novas culturas.\n\n#P +25%#! Velocidade de Conversão Cultural"
 #A Convenient offer
 hold_court.6060.t: "Uma Oferta Conveniente"
 hold_court.6060.desc: "[6060_rich.Custom2('MyCharacterIntroduction', ROOT.Char)|U] está diante de mim, com uma expressão esperançosa no rosto.\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U],"
 hold_court.6060.desc_merchant: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], permiti-me que me apresente: meu nome é [6060_rich.GetTitledFirstName|l] e sou um[6060_rich.Custom('ES_XA')] comerciante ric[6060_rich.Custom('ES_OA')] da capital.\n\n"
 hold_court.6060.desc_ending: "\"Não pude deixar de notar que, nos últimos tempos, as finanças do reino não estão muito saudáveis. É claro que você as tem administrado de maneira exemplar, mas - talvez - você possa encontrar algum uso para um pouco mais de ouro.\n\n\"Estou disposto a comprar um assentamento menor de suas mãos em troca de uma generosa quantia de ouro. Seria aceitável?\""
 hold_court.6060.a: "Muito bem. Você pode ficar com [6060_offer.GetNameNoTooltip]."
 hold_court.6060.b: "Tome a terra e construa uma cidade sobre ela."
 hold_court.6060.b.tt.success: "[6060_rich.GetFirstNameNoTooltip] concorda em pagar mais"
 hold_court.6060.b.tt.failure: "[6060_rich.GetFirstNameNoTooltip] mantém sua última oferta e você fica parecendo um[ROOT.Char.Custom('ES_XA')] idiota ganancios[ROOT.Char.Custom('ES_OA')]"
 hold_court.6060.c: "Eu não preciso do seu ouro."
 character_title_cannot_be_revoked_tt: "Você não poderá revogar o título por 25 anos."
 protected_from_revocation.tt: "Os títulos deste personagem estão protegidos contra revogação."
 #Budding Ally
 hold_court.6070.t: "Aliado em Crescimento"
 hold_court.6070.desc: ""Meu [ROOT.Char.GetLadyLord], meu nome é [6070_embassy.GetTitledFirstName|l] e sou embaixador[6070_embassy.Custom('ES_XA')] de voss[6070_sender.Custom('ES_OA')] aliad[6070_sender.Custom('ES_OA')], [6070_sender.GetTitledFirstName|l]. Trago-lhe seus cumprimentos amistosos e uma oferta."\n\n"Meu [6070_sender.Custom('ES_SennorSennora')] valoriza vossa amizade.""
 hold_court.6070.a: "Eu aceito de bom grado sua oferta."
 hold_court.6070.b: "É claro! [6070_friend.GetFirstNameNoTooltip], mostre[6070_child.Custom('ES_LeLa')] uma volta!"
 hold_court.6070.c: "Eu aceito - mas espero um noivado em troca."
 hold_court.6070.d: "Sinto muito, mas não posso aceitar essa responsabilidade agora."
 hold_court.6070.e: "Todo mundo sabe que é[6070_child.Custom('ES_EA')] crianç[6070_child.Custom('ES_OA')] é uma ameaça, não me [6070_child.GetHerHim] empurrem isso!"
 #Settling the [people]
 hold_court.6080.t: "Assentando o [6080_culture.GetNameNoTooltip]"
 hold_court.6080.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], represento ao povo [6080_culture.GetNameNoTooltip] de [6080_county.GetNameNoTooltip]", afirma [6080_count.Custom2('MyCharacterIntroduction', ROOT.Char)].\n\n"Somos súditos devotos e fiéis, mas nossa terra é pobre, pouco desenvolvida e escassamente povoada. Por favor, permitam que nos estabeleçamos ali e que a administremos segundo nossas tradições!\n\nSob vossa benevolente proteção, nossa terra ainda pode prosperar, e vós ganhareis um novo vassalo fiel!"."
 hold_court.6080.a: "Muito bem. Seu povo pode povoar o condado de [6080_county.GetNameNoTooltip] por mim."
 hold_court.6080.a.tt: "Você não poderá revogar esse título até a morte d [6080_count.GetFirstNameNoTooltip]"
 hold_court.6080.b: "Eu sei o que é melhor para o condado de [6080_county.GetNameNoTooltip]."
 hold_court.6080.c: "\"Seu povo sempre terá um lugar seguro em [6080_province.GetNameNoTooltip].\""
 #Heretics at Large
 hold_court.6090.t: "Hereges à Solta"
 hold_court.6090.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], lamento informar-vos que a situação religiosa em minhas terras está fora de controle…"\n\n"Tenho tentado fazer com que meus súditos vejam a luz da nossa verdadeira fé, mas são muitos os que persistem em suas crenças erradas! Rogo-vos que useis vossa autoridade e poder para me ajudar!""
 hold_court.6090.desc.almoner: "\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], se me permite", intervém [high_almoner.Custom2('MyCharacterIntroduction', ROOT.Char)], "não creem que poderiam ser persuadidos ao conceder esmolas generosas aos fiéis #EMP correctos#!?"."
 hold_court.6090.desc.executioner: "\n\n\"I bet they just need #EMP a firm hand!#!\" says [executioner.Custom2('MyCharacterIntroduction', ROOT.Char)] with a dark smile."
 hold_court.6090.a: "[court_chaplain.GetFirstNameNoTooltip], veja o que você pode fazer."
 hold_court.6090.b: "[high_almoner.GetFirstNameNoTooltip], organize algumas esmolas locais."
 hold_court.6090.c: "A convivência pacífica é sempre a melhor solução."
 title_granted_to_local_leader_tt: "[6090_main_county.GetName] será concedido a um local da fé [6090_main_county.GetCountyData.GetFaith.GetName|l] Você terá uma [hook|lE] sobre eles."
 hold_court.6090.d: "[executioner.GetFirstNameNoTooltip], dê um exemplo com alguns descrentes."
 hold_court.6090.e: "Isso parece ser um problema seu, não meu."
 #A Land at War
 hold_court.6100.t: "Uma Terra em Guerra"
 hold_court.6100.desc: "Diante de mim estão [6100_vassal_1.Custom2('MyCharacterIntroduction', ROOT.Char)] e [6100_vassal_2.Custom2('MyCharacterIntroduction', ROOT.Char)].\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U]", começa [6100_vassal_1.GetFirstNameNoTooltip], "a guerra entre [6100_vassal_2.Custom('ES_ElLa')] [6100_vassal_2.GetTitledFirstNameNoTooltip|l] e eu se prolonga por causa da sua teimosa recusa em aceitar a razão, então viemos até você para pedir mediação".\n\n"Então agora a culpa é #EMP culpa mía#!?!", interrompe [6100_vassal_2.GetFirstNameNoTooltip]. "Seu canalha[6100_vassal_1.Custom('ES_OA')] insano! Diga-lhe você, [ROOT.Char.Custom('FormOfAddressForLiege')]!"."
 hold_court.6100.desc.jester: "\n\n[jester.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se anima: "Ah, eu #EMP encantan#! as brigas mesquinhas! Combinam bem com RIMAS ENGRAÇADAS!"."
 hold_court.6100.a: "Qualquer um veria que [6100_vassal_1.GetFirstNameNoTooltip] tem razão."
 hold_court.6100.b: "A posição d [6100_vassal_2.GetFirstNameNoTooltip] é legítima."
 hold_court.6100.c: "Parem imediatamente com a luta, ou então..."
 hold_court.6100.d: "Estou fart[ROOT.Char.Custom('ES_OA')] dessas bobagens. À prisão os dois!"
 hold_court.6100.e: "Vamos resolver isso como guerreiros honrosos."
 hold_court.6100.e.tt: "Os dois contendores resolverão a guerra por meio de um duelo"
 hold_court.6100.f: "Haha, boa ideia! Vocês dois troquem algumas rimas!"
 hold_court.6100.f.1: ""Criatur[6100_vassal_2.Custom('ES_OnOna')] nascid[6100_vassal_2.Custom('ES_OA')] num arbusto\nque deveria viver numa caverna...\nTe odeio tanto\nque você me dá calafrios?..."
 hold_court.6100.f.1.t: "Você gargalha com as tentativas fracas de [6100_vassal_1.GetShortUIName|U]"
 hold_court.6100.f.2: ""Vagabund[6100_vassal_1.Custom('ES_OA')] de vinhedo!\nNão assusta nem uma menina...\nVou te dar uma lição\nporque você não tem perdão?..."
 hold_court.6100.f.2.t: "Você ri alto das terríveis rimas de [6100_vassal_2.GetShortUIName|U]"
 hold_court.6100.g: "Vocês estão me incomodando com suas brigas insignificantes. Saiam."
 hold_court.6100.g.tt: "A guerra continua a todo vapor"
 hold_court.6101.t: "[sc_victor.GetTitledFirstName|U] vence o duelo"
 hold_court.6101.tt: "É declarado que [sc_victor.GetTitledFirstName|U] vencedor[sc_victor.Custom('ES_XA')] da guerra"
 #A Ravished Land
 hold_court.6110.t: "Uma Terra Devastada"
 hold_court.6110.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], sou apenas um humilde camponês, mas imploro por sua ajuda! A terra do meu povo foi devastada pela longa e sangrenta guerra entre seus vassalos [6110_vassal_1.Custom('ES_ElLa')] [6110_vassal_1.GetTitledFirstName|l] e [6100_vassal_2.Custom('ES_ElLa')] [6110_vassal_2.GetTitledFirstName|l]!".\n\n"Os campos ardem, os animais são abatidos e os camponeses morrem! Por favor, ponham fim ao derramamento de sangue!"."
 hold_court.6110.desc.almoner: "\n\n"Que a misericórdia de [almoner.GetFaith.HighGodName] e a generosidade dos filhos de [almoner.GetFaith.HighGodNamePossessive] sejam um bálsamo para os seus sofrimentos" sugere baixinho [almoner.Custom2('MyCharacterIntroduction', ROOT.Char)]."
 hold_court.6110.a: "A guerra acabou e [6110_vassal_1.Custom('ES_ElLa')] [6110_vassal_1.GetTitledFirstNameNoTooltip|l] é [Select_CString( 6110_vassal_1.IsFemale, 'la ganadora', 'el ganador' )]."
 hold_court.6110.b: "\"Ambas as partes devem ser interrompidas imediatamente!\""
 hold_court.6110.c: "Esta guerra é um absurdo, [6110_vassal_2.Custom('ES_ElLa')] [6110_vassal_2.GetTitledFirstName|l] é [Select_CString( 6110_vassal_2.IsFemale, 'la ganadora', 'el ganador' )]."
 hold_court.6110.e: "Um camponês não deve se intrometer nos assuntos da nobreza."
 6110_custom_every_realm_1: "Todos os condados no reino de [6110_vassal_1.GetShortUIName]"
 6110_custom_every_realm_2: "Todos os condados no reino de [6110_vassal_2.GetShortUIName]"
 #The Day of Truth
 hold_court.6120.t: "O Dia da Verdade"
 hold_court.6120.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U]!", [steward.Custom2('MyCharacterIntroduction', ROOT.Char)] entra em cena. "Tenho uma ideia para melhorar a tributação".\n\n"Podeis enviar avaliadores para interrogar vossos súditos sobre cada propriedade: nome, proprietário, extensão e valor, além de quantas pessoas e animais vivem nela!"."
 hold_court.6120.desc.seneschal: "\n\n"Por favor, [ROOT.Char.Custom('FormOfAddressForLiege')], permitam-me supervisionar esta questão", diz [seneschal.Custom2('YourCharacterIntroduction', ROOT.Char)]."
 hold_court.6120.desc.swans: "\n\n\"E eu fornecerei uma lista de todos os cisnes em suas terras! Minha favorita é [keeper_swans.Custom('GetSwanName')]! Já te contei recentemente como a barriguinha dela é macia e fofinha? Ontem nós saímos para passear e...\" Decido ignorar [keeper_swans.Custom2('MyCharacterIntroduction', ROOT.Char)] enquanto ele tagarela sobre a maldita ave."
 hold_court.6120.desc.jester: "\n\n\"Mas números são #EMP booooring!#!\" reclama [jester.Custom2('MyCharacterIntroduction', ROOT.Char)] \"Vamos dançar em vez disso!\""
 hold_court.6120.a: "Muito bem, prossiga com a pesquisa."
 hold_court.6120.a.tt: "A pesquisa começa. Levará alguns meses para ser concluída."
 hold_court.6120.b: "[seneschal.GetFirstNameNoTooltip], cuide disso."
 hold_court.6120.c: "Se eu quiser melhorar a tributação, posso apenas pedir #EMP mais#! impostos..."
 6120_every_vassal: "Cada um de seus vassalos"
 hold_court.6120.d: "Não vale a pena."
 hold_court.6120.e: "De fato, vamos dançar e afastar os números malignos!"
 swan_name_illfated: "Malfadado"
 swan_name_rose: "Rosa"
 swan_name_honky: "Honky Honk"
 swan_name_honker: "Honker"
 swan_name_hugo: "Hugo"
 swan_name_leda: "Leda"
 swan_name_anklebiter: "Mordedor de Tornozelo"
 swan_name_angrynipper: "Mordedor Furioso"
 swan_name_odette: "Odette"
 hold_court.6121.t: "O Dia da Verdade: Pesquisa Concluída"
 hold_court.6121.desc: ""Já está feito, [ROOT.Char.Custom('FormOfAddressForLiege')]", afirma [6121_responsible.Custom2('MyCharacterIntroduction', ROOT.Char)] enquanto se inclina diante de mim.\n\n"Há meses, encomendastes um levantamento de todas as vossas terras; agora ele foi concluído, e os detalhes sobre propriedade e valor da terra estão todos reunidos neste livro. Desde que esta descrição seja fiel à realidade, a vossa tributação será mais eficiente em todo o vosso domínio!"."
 hold_court.6121.a: "Excelente trabalho, [6121_responsible.GetFirstNameNoTooltip]!"
 #The Cadastre
 hold_court.6130.t: "O Cadastro"
 hold_court.6130.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U]", diz [6130_proposer.Custom2('MyCharacterIntroduction', ROOT.Char)]. "Proponho um levantamento cadastral de todos os condados que vós possuís".\n\n"Um melhor conhecimento e mapeamento de vossas terras certamente aumentará sua prosperidade!"."
 hold_court.6130.a: "Muito bem, [6130_proposer.GetFirstNameNoTooltip]. Você pode prosseguir."
 hold_court.6130.a.tt: "\"[6130_proposer.GetFirstNameNoTooltip] começa a trabalhar na pesquisa cadastral. Isso levará vários meses para ser concluído, e quando estiver completo, oferecerá as seguintes recompensas:\""
 hold_court.6130.d: "Mapas são superestimados."
 hold_court.6131.t: "O Cadastro: Concluído!"
 hold_court.6131.desc: "[6131_proposer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se curva brevemente diante de mim e me explica com um sorriso satisfeito: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], talvez se lembre de que, há alguns meses, investiu uma grande quantia de ouro em um cadastro de seus condados". \n\n"Supervisionei pessoalmente essa questão e posso dizer com orgulho que o trabalho está concluído!"."
 hold_court.6131.desc_tutor: "Também estou satisfeito em ouvir um relatório detalhado do aprendizado d [6130_tutored.GetTitledFirstName|l] sob a orientação de [6130_helper.Custom2('MyCharacterIntroduction', ROOT.Char)]."
 hold_court.6131.desc_hunt: "\n\nTambém estou satisfeito em ouvir um relatório detalhado da grande ajuda oferecida por [6130_helper.Custom2('MyCharacterIntroduction', ROOT.Char)]."
 hold_court.6131.desc_dead: "\n\nPor sorte, [6130_helper.GetTitledFirstName|l] não viveu o suficiente para ver a conclusão do cadastro que havia jurado ajudar a realizar."
 hold_court.6131.a: "Ouro bem gasto!"
 all_realm_county: "Cada [county|lE] do [realm|lE]"
 #A Cumbersome Gift
 hold_court.6140.t: "Um Presente Incômodo"
 hold_court.6140.desc: "A sala do trono silencia quando [6140_gifter.Custom2('MyCharacterIntroduction', ROOT.Char)] entra triunfalmente, seguido[6140_gifter.Custom('ES_OA')] por dois servos que lutam para arrastar #EMP um exemplar acorrentado de [ROOT.Char.Custom('GetAnimalType')]#!.\n\nCom um sorriso de orgulho, [6140_gifter.GetFirstNameNoTooltip] proclama: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], faço-lhe a entrega de um presente digno [ROOT.Char.Custom('ES_DelDela')] governante mais poderos[ROOT.Char.Custom('ES_OA')] do mundo! Caçamos este magnífico animal no/a [6140_province.GetTerrain.GetNameNoTooltip] de [6140_province.GetCounty.GetName], e agora o ofereço como símbolo da minha lealdade e do vosso poder sem igual!""
 6140_bear: "urso"
 6140_tiger: "tigre"
 6140_lion: "leão"
 hold_court.6140.a: "Obrigado, eu realmente precisava de um novo tapete."
 hold_court.6140.a.tt: "O animal é morto para obter sua pele."
 hold_court.6140.artifact_tt: "Você recebe um Pelego [court_artifact|lE]"
 hold_court.6140.artifact_toast: "Pelego adquirido"
 hold_court.6140.b: "De fato: uma fera poderosa para um governante poderoso!"
 hold_court.6140.c: "Meu bobo da corte vai aprender a montá-lo! Não é mesmo, [jester.GetFirstNameNoTooltip]?"
 hold_court.6140.c.success: "Isso pode ser feito!"
 hold_court.6140.c.success.tt: "[jester.GetFirstNameNoTooltip] aprende a montar no/a no/a [ROOT.Char.Custom('GetAnimalType')]"
 hold_court.6140.c.soft_failure: "[jester.GetFirstNameNoTooltip] cai de bunda"
 hold_court.6140.c.soft_failure.tt: "Todos riem do fracasso d [jester.GetFirstNameNoTooltip]"
 hold_court.6140.c.middle_failure: "[jester.GetFirstNameNoTooltip] se machuca[jester.Custom('ES_OA')]"
 hold_court.6140.c.middle_failure.tt: "[jester.GetFirstNameNoTooltip] não tem sucesso"
 hold_court.6140.c.hard_failure: "[jester.GetFirstNameNoTooltip] morre!"
 hold_court.6140.c.hard_failure.tt: "[jester.GetFirstNameNoTooltip] fracassa miseravelmente..."
 hold_court.6140.d: "Tenho certeza de que meus #EMP convidados#! nas masmorras vão #EMP adorar#! isso..."
 hold_court.6140.e: "Isso parece perigoso e fedorento! Leve isso embora."
 6140_every_courtier_or_guest: "Cada cortesão ou convidado em sua corte"
 6140_every_prisoner: "Cada prisioneiro em suas celas"
 #The End Is Nigh!
 hold_court.6150.t: "O Fim Está Próximo!"
 hold_court.6150.desc: "Assim que chega sua vez de falar, a agitada [6150_preacher.Custom('ES_OA')] [6150_preacher.GetWomanMan] que tenho diante de mim começa a gritar: #EMP O FIM ESTÁ PRÓXIMO!#!\n\nOs sinais são claros e estão por toda parte:"
 hold_court.6150.desc_county: "o povo de [6150_county.GetName] sabe disso muito bem —"
 hold_court.6150.desc_unsafety: "distúrbios, bandidos, ladrões, violência e o desaparecimento da justiça entre os homens!"
 hold_court.6150.desc_nature: "colheitas fracassando, gafanhotos invadindo os campos, frio interminável, enchentes e a Peste caminhando entre nós!"
 hold_court.6150.desc_looting: "primeiro de tudo, os bárbaros às nossas portas, saqueando nossas colheitas, matando nosso povo, arrasando nossas cidades e espalhando doença e fome!"
 hold_court.6150.desc_infidels: "os infiéis estão em toda parte, minando-nos tanto além das fronteiras quanto dentro de nosso próprio reino!"
 hold_court.6150.desc_lost_hgw: "o que poderia ser mais claro do que os exércitos de [ROOT.GetCharacter.GetFaith.HighGodName] sendo derrotados pelos infiéis?"
 hold_court.6150.desc_visions: "raios em um céu claro, pássaros migrando fora de temporada, vozes entoando à noite, cobras falantes!"
 hold_court.6150.desc_monk: "as datas e os cálculos todos batem!"
 hold_court.6150.desc_fallback: "violência, corrupção, vícios — os fiéis esqueceram [ROOT.GetCharacter.GetFaith.HighGodName]!"
 hold_court.6150.desc_christianism: "\n\n\"O Dia do Juízo Final está sobre nós!"
 hold_court.6150.desc_buddhism: "\n\n\"O tempo de Maitreya chegou!"
 hold_court.6150.desc_islam: "\n\n\"O Último Julgamento está chegando!"
 hold_court.6150.desc_judaism: "\n\n\"A Guerra de Gog e Magog está sobre nós!"
 hold_court.6150.desc_germanic: "\n\n\"Ragnarök está sobre nós!"
 hold_court.6150.desc_hinduism: "\n\n\"Kalki está chegando!"
 hold_court.6150.desc_zoroastrianism: "\n\n\"O Frashokereti começou!"
 hold_court.6150.desc_religion_fallback: "\n\n\"O mundo como o conhecemos está prestes a acabar!"
 hold_court.6150.desc_solution: "\n\n\"Há apenas uma maneira de nos salvarmos:"
 hold_court.6150.desc_celibacy: "castidade e pureza! Renuncie às tentações da carne!"
 hold_court.6150.desc_burn: "queime #EMP todos#! os infiéis!"
 hold_court.6150.desc_alcohol: "renuncie a todos os vícios, começando pelos excessos de álcool e comida!"
 hold_court.6150.desc_reclusive: "rejeite o mundo e suas tentações!"
 hold_court.6150.desc_flagellant: "mortifique a carne e derrame sangue por sua salvação!"
 hold_court.6150.desc_eating: "purifique seu coração ao purificar seu corpo! A salvação não pode ser alcançada com um estômago pesado!"
 hold_court.6150.desc_end: "\n\n\"Arrependa-se agora!! Pois o dia está próximo!!\""
 hold_court.6150.a: "A salvação deve ser alcançada por todos os meios!"
 hold_court.6150.a.tt: "Você já está familiarizad com essas práticas de arrependimento."
 hold_court.6150.a.wrath: "Você ordena que [6150_heretics_p.GetName] seja purificada de todos os pecadores"
 hold_court.6150.b: "Sábio[6150_preacher.Custom('ES_OA')] [6150_preacher.GetFirstNameNoTooltip], por favor, fique e me ensine o caminho!"
 hold_court.6150.c: "Absurdo! Queimem este[6150_preacher.Custom('ES_EA')] herege delirante!"
 hold_court.6150.d: "Tirem esse tolo[6150_preacher.Custom('ES_EA')] da minha frente."
 #Empty Coffers
 hold_court.6160.t: "Cofres Vazios"
 hold_court.6160.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U]", começa [6160_vassal.Custom2('MyCharacterIntroduction', ROOT.Char)] com aspecto contrito, "este último período tem sido muito difícil para o meu domínio, foram necessários gastos extras em todas as frentes e, infelizmente, meus cofres estão vazios…\n\nMe dói dizer isso, mas decidi apelar para a vossa munificência para me ajudar a pagar minhas dívidas."
 hold_court.6160.desc_friend: "\n\n\"Em nome dos laços que nos unem, por favor, me ajude!"
 hold_court.6160.desc_hook: "\n\n\"Se você fizer isso, considerarei a dívida que me deve paga."
 hold_court.6160.desc_fallback: "\n\n\"Não esquecerei de sua generosidade em meu momento de necessidade!\""
 hold_court.6160.a: "Muito bem — mas você me deve!"
 hold_court.6160.b: "Muito bem — agora não lhe devo nada."
 hold_court.6160.c: "É o mínimo que eu poderia fazer por você!"
 hold_court.6160.d: "Como meu Grande Esmoler ensina, a caridade é o caminho dos piedosos."
 hold_court.6160.e: "As dívidas indicam má administração, [seneschal.GetFirstNameNoTooltip], ajudai[6160_vassal.GetHerHim]!"
 hold_court.6160.f: "Desculpe, não tenho dinheiro para ajudar."
 #Ignoble Imprisonment
 hold_court.6170.t: "Prisão Ignóbil"
 hold_court.6170.desc: "[6170_vassal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se apresenta diante de mim com expressão preocupada. "[ROOT.Char.Custom('FormOfAddressForLiege')|U], venho em nome de [6170_relative.Custom2('MyCharacterIntroduction', 6170_vassal)].\n\n[6170_rival.Custom2('YourCharacterIntroduction', 6170_vassal)] [6170_relative.Custom('ES_LoLa')] o fez encarcerar por motivos banais e absurdos. Meu coração sangra ao ver as condições deprimentes que meu pobre [6170_vassal.Custom2('RelationToMe', SCOPE.sC('6170_relative'))]…".\n\n"Por favor, demonstre misericórdia para com [6170_relative.GetSheHe] e ordene que seja libertad[6170_relative.Custom('ES_OA')]!"."
 hold_court.6170.a: "Que [6170_relative.GetFirstNameNoTooltip] seja libertad!"
 hold_court.6170.b: "[6170_rival.GetFirstNameNoTooltip] deve ter tido uma boa razão para prender[6170_relative.GetHerHim]."
 hold_court.6170.c: "Concederei apenas uma pequena mercê."
 hold_court.6170.d: "Corte-lhe a cabeça, acabe com o problema!"
 hold_court.6170.e: "Sinceramente, não me importo com suas disputas."
 #A Shadow in the Night
 hold_court.6190.t: "Uma Sombra na Noite"
 hold_court.6190.desc: "A pessoa que se aproxima do meu trono é claramente uma[6190_local.Custom('ES_XA')] camponesa[6190_local.Custom('ES_OA')]. "[ROOT.Char.Custom('FormOfAddressForLiege')|U]", começa seu discurso, "represento a comunidade local de [capital.GetNameNoTooltip].\n\nNos últimos meses, nossos cemitérios têm sido assolados pelo desaparecimento de corpos! Todos foram desenterrados e não deixaram nenhum rastro. No início, temíamos que fosse obra de animais selvagens ou de poderes obscuros, mas então pegamos sua[physician.Custom('ES_OA')] $court_physician_court_position$, [physician.Custom('ES_ElLa')] [physician.GetTitledFirstName|l] em flagrante, enquanto levava os mortos para seus experimentos!"\n\n"Por favor, ponha fim a esta blasfêmia!""
 hold_court.6190.a: "Estudar o corpo humano é uma triste necessidade."
 hold_court.6190.b: "Por que você não me convidou, [physician.GetFirstNameNoTooltip]?!"
 hold_court.6190.c: "Corpos frescos — #EMP vivos#! — são melhores como cobaias..."
 hold_court.6190.d: "#EMP GUARDIAS!#! Prendam [physician.Custom('ES_AlAla')] assaltante[physician.Custom('ES_OnOna')] de túmulos!"
 hold_court.6190.e: "[physician.GetFirstNameNoTooltip], apenas pare com isso."
 #A Land of Foreigners
 hold_court.6210.t: "Uma Terra de Estrangeiros"
 hold_court.6210.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], lamento informar-vos de que cheguei ao meu limite de paciência!". A [6210_vassal.Custom2('MyCharacterIntroduction', ROOT.Char)] está claramente exasperad[6210_vassal.Custom('ES_OA')].\n\n"Não há como entender as pessoas sobre as quais devo governar, com seus costumes ridículos e #EMP horrível#! gosto culinário!""
 hold_court.6210.a: "[steward.GetFirstNameNoTooltip], mostre a eles nossos costumes."
 hold_court.6210.b: "Vamos mostrar a eles nossa grandeza, eles mudarão de ideia!"
 hold_court.6210.b.tt: "Você envia o seu $royal_architect_court_position$ para desenvolver a infraestrutura dos condados."
 hold_court.6210.c: "Respeitamos as tradições de todos os nossos súditos."
 hold_court.6210.d: "Contanto que paguem seus impostos, eu não me importo."
 #A Massive Problem
 hold_court.6230.t: "Um Problema #EMP Enorme#!"
 hold_court.6230.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], um momento da vossa atenção, se me permitis...", fala [6230_vassal.Custom2('MyCharacterIntroduction', ROOT.Char)|U]. "[6230_province.GetName] está sofrendo de um problema bastante #EMP incômodo#! nestas últimas semanas...\n\n"Vedes, uma manada de elefantes #EMP totalmente descontrolada#! devasta todo o condado.""
 hold_court.6230.a: "Pegue algum ouro e reconstrua."
 hold_court.6230.b: "Enviarei alguém para deter as feras."
 hold_court.6230.b.success: "Seus caçadores capturam os elefantes selvagens."
 hold_court.6230.b.success.tt: "Elefantes Domesticados."
 hold_court.6230.b.failure: "Os elefantes continuam em sua fúria."
 hold_court.6230.b.failure.tt: "Elefantes em Fúria."
 hold_court.6230.c: "Elefantes, cavalos, é a mesma coisa... [m_horse.GetFirstNameNoTooltip], resolva isso!"
 hold_court.6230.c.success: "Seu $master_of_horse_court_position$ captura os elefantes."
 hold_court.6230.d: "$hinduism_good_god_ganesh$ os guia."
 hold_court.6230.e: "Eu não tenho tempo para essa bobagem."
 hold_court.6230.f: "Mate todas as feras malditas."
