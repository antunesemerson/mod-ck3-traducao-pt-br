 #Holder Improves
 court.8311.t: "Aprendendo as Manhas"
 court.8311.desc: "Apesar de um domínio bastante questionável no início até mesmo da mecânica mais básica de [position_holder.Custom('GetCourtPositionSubject')], meu [position_holder.GetHeldCourtPositionsString|l], [position_holder.Custom('ES_ElLa')] [position_holder.GetTitledFirstName|l], parece que finalmente está se encaixando em seu papel.\n\nMuitos na corte notaram suas habilidades em crescimento, ainda que um tanto limitadas. No mínimo, parece que está realmente tentando merecer seu sustento."
 court.8311.a: "É adorável perceber isso, [position_holder.GetFirstNameNoTooltip]!"
 bonus_aptitude_role_tt: "[aptitude|E] de [position_holder.Custom('GetTargetCourtPosition')|l]: #P +[SCOPE.ScriptValue('cp_bonus_aptitude_value')]#!"
 cp_bonus_aptitude: "Aprendendo as Manhas"
 #Salary Review
 court.8321.t: "A Abordagem da Cenoura"
 court.8321.desc: "Meu [position_holder.GetHeldCourtPositionsString|l] [position_holder.Custom('ComplimentAdjective')], [position_holder.Custom('ES_ElLa')] [position_holder.GetTitledFirstName|l], conseguiu se estabelecer de alguma forma em seu papel, embora não sem alguns problemas iniciais.\n\n[position_holder.GetFirstNameNoTooltip] não escondeu o fato de que acha que deveria ser melhor recompensado se quiser se dedicar de verdade ao seu trabalho.\n\n\"Vamos, [ROOT.Char.Custom('FormOfAddressForLiege')]\", estou a serviço de [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip|l] de [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]! Não deveria receber mais do que as migalhas da mesa se eu for passar os dias imers[position_holder.Custom('ES_OA')]o em [position_holder.Custom('GetCourtPositionSubject')] em vosso nome?\"."
 court.8321.a: "Muito bem, mas é melhor que você faça por merecer."
 court.8321.b: "Que tal um pequeno bônus, em vez disso?"
 court.8321.b.success: "[position_holder.GetFirstNameNoTooltip] aceita a oferta"
 court.8321.b.failure: "[position_holder.GetFirstNameNoTooltip] se sente insultad[position_holder.Custom('ES_OA')]"
 court.8321.c: "Não há fundos disponíveis no momento..."
