l_spanish:
 #Court Position Boons
 employer_booner_invalidated_tt: "#weak O modificador será removido se [position_holder.GetShortUIName|V] perder esta [court_position|lE] ou não estiver na mesma [court|lE] que [THIS.Char.GetShortUIName|V]#!"
 employer_boon_target_invalidated_title: "Cortesão Perde Benfeitoria"
 employer_booner_invalidated_title: "Benfeitoria da Posição na Corte Perdida"
 #Physician
 court.8190.t: "[Select_CString( position_holder.IsFemale, 'La buena doctora', 'El buen doctor' )] [position_holder.GetFirstNameNoTooltip]"
 court.8190.desc: "Meu [position_holder.Custom('ComplimentAdjective')] [GetCourtPositionType('court_physician_court_position').GetName()|l], [position_holder.Custom('ES_ElLa')] [position_holder.GetTitledFirstName|l], é [Select_CString( position_holder.IsFemale, 'una auténtica sanadora', 'un auténtico sanador' )]sempre tem à mão o remédio ou cataplasma adequado aos primeiros indícios do mais leve mal de qualquer cortesão.\n\nQuase é desperdiçar seus talentos, de tanto que se esforça para tratar os exigentes habitantes da corte [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip]."
 court.8190.a: "Eu poderia usar um pouco mais de atenção."
 court.8190.b: "Cuidarás do meu herdeir[heir.Custom('ES_OA')], [heir.GetFirstNameNoTooltip]."
 court.8190.c: "Concentre seus esforços em meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))][child.GetFirstNameNoTooltip]."
 court.8190.d: "M [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('spouse'))], [spouse.GetFirstNameNoTooltip], poderia usar seus talentos."
 court.8190.e: "Cuide d [relation.GetFirstNameNoTooltip], por enquanto."
 court.8190.f: "M [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('family'))], [family.GetFirstNameNoTooltip], é seu paciente prioritário."
 court.8190.g: "Cuide das queixas do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('house'))], [house.GetFirstNameNoTooltip]."
 employer_booner_court_physician_modifier: "Atenção Próxima"
 employer_booner_court_physician_modifier_desc: "Este personagem é o foco constante das energias de um $court_physician_court_position$ habilidoso."
 #Tutor
 court.8191.t: "Tutoria Especial"
 court.8191.desc: "Meu [position_holder.Custom('ComplimentAdjective')] [GetCourtPositionType('court_tutor_court_position').GetName()|l], [position_holder.Custom('ES_ElLa')] [position_holder.GetTitledFirstName|l], é [Select_CString( position_holder.IsFemale, 'una maestra', 'un maestro' )] de grande talento, mantendo os garotos rebeldes na linha enquanto conduz sua educação.\n\nSua atenção se estende às crianças da corte [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip], mas ainda há espaço para que uma delas receba um acompanhamento mais próximo sob sua vigilância confiável."
 court.8191.a: "#EMP Eu#! quero aprender mais!"
 court.8191.b: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('heir'))], [heir.GetFirstNameNoTooltip], est? na linha de sucess?o e deve ser s?bio[heir.Custom('ES_OA')]."
 court.8191.c: "Acho que m [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('struggling'))], [struggling.GetFirstNameNoTooltip], precisa de ajuda."
 court.8191.d: "Por que não se concentram no meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hostage'))] [hostage.GetFirstNameNoTooltip]?"
 court.8191.e: "M [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('interesting'))], [interesting.GetFirstNameNoTooltip], poderia usar seus talentos."
 court.8191.f: "Cuide da educação de meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('oldest'))], [oldest.GetFirstNameNoTooltip]."
 court.8191.g: "É hora de que meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('youngest'))] , [youngest.GetFirstNameNoTooltip] , afie sua pena."
 court.8191.h: "Concentre-se no meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('extra'))] [extra.GetFirstNameNoTooltip]."
 court.8191.i: "M [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('bonus'))], [bonus.GetFirstNameNoTooltip], seria o que mais se beneficiaria."
 employer_booner_court_tutor_modifier: "Tutoria Especial"
 employer_booner_court_tutor_modifier_desc: "Este personagem é o foco constante dos esforços de um Tutor da Corte habilidoso.\nMelhora a [education|lE] deste [Concept( 'child', 'vástago' )|E]"
 #Seneschal
 court.8192.t: "Uma Administração Rigorosa"
 court.8192.desc: "Desde sua nomeação como meu [GetCourtPositionType('seneschal_court_position').GetName()|l] , [position_holder.Custom('ES_ElLa')] [position_holder.GetTitledFirstName|l] tem sido um ser [position_holder.Custom('ComplimentAdjective')] sempre presente, garantindo o funcionamento tranquilo da minha corte e casa.\n\nEnquanto reflito sobre minha boa nomeação, ouço sua voz atrás de mim: «[position_holder.Custom2('RelationToMeShort', ROOT.Char)|U] , descobri que há muitas economias a serem feitas em sua [ROOT.Char.Custom('ResidenceBuilding')|l] , embora eu me pergunte onde vocês acham que a economia é mais necessária?».\n\nEla levanta seu livro-caixa e uma sobrancelha inquisitiva."
 court.8192.a: "Acho que podemos economizar nos móveis."
 court.8192.b: "Certifique-se de tirar o máximo dos servos."
 court.8192.c: "Por que comprometer?"
 court.8192.c.success: "Você ajuda a [position_holder.GetFirstNameNoTooltip]"
 court.8192.c.failure: "[position_holder.GetFirstNameNoTooltip] está sobrecarregad"
 employer_booner_seneschal_1_modifier: "Economias em Acomodações"
 employer_booner_seneschal_1_modifier_desc: "Os vassalos deste personagem são observados por um Senescal habilidoso."
 employer_booner_seneschal_2_modifier: "Supervisor"
 employer_booner_seneschal_2_modifier_desc: "A corte deste personagem está sob o controle de um Senescal habilidoso.\nManutenção de [court_amenity|lE] em Acomodações: #P -25%#!"
 employer_booner_seneschal_3_modifier: "Economias do Supervisor"
 employer_booner_seneschal_3_modifier_desc: "A corte e os servos deste personagem estão sob o controle de um Senescal habilidoso.\nManutenção de [court_amenity|lE] em Acomodações: #P -25%#!"
 #Wet Nurse
 court.8193.t: "Bem Cuidado"
 court.8193.desc: "Meu [position_holder.Custom('ComplimentAdjective')] [GetCourtPositionType('wet_nurse_court_position').GetName()|l], [position_holder.Custom('ES_ElLa')] [position_holder.GetTitledFirstName|l], é muito habilidosa com as crianças, cuidando dos pestinhas como se fossem seus próprios bebês.\n\nFico um pouco surpreso quando me pergunta, enquanto repreende uma das crianças: \"Há alguma criança de vossa [ROOT.Char.Custom('GetCourt')] que achais que precisa da minha atenção especial, meu [ROOT.Char.GetTitleAsNameNoTooltip|l]?\"."
 court.8193.a: "!#EMP Yo#! deveria ter todo o seu tempo!"
 court.8193.b: "Meu herdeir[heir.Custom('ES_OA')] mais jovem, [heir.GetFirstNameNoTooltip], vem em primeiro lugar[heir.Custom('ES_OA')]"
 court.8193.c: "Cuidem do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('baby'))] recém-nascid[baby.Custom('ES_OA')], [baby.GetFirstNameNoTooltip]."
 court.8193.d: "M [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hostage'))], [hostage.GetFirstNameNoTooltip], será bem cuidado."
 court.8193.e: "Concentre-se em meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('interesting'))] [interesting.GetFirstNameNoTooltip]."
 court.8193.f: "[Select_CString( sickest.IsFemale, 'La pequeña', 'El pequeño' )], minha [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('sickest'))], [family.GetFirstNameNoTooltip], tem prioridade."
 court.8193.g: "Passe mais tempo com meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('second_sickest'))][second_sickest.GetFirstNameNoTooltip]."
 court.8193.h: "Faça um esforço especial por meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('extra'))] [extra.GetFirstNameNoTooltip]."
 court.8193.i: "Quero que m [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('bonus'))], [bonus.GetFirstNameNoTooltip] cresça forte."
 employer_booner_wet_nurse_modifier: "Favorito da Ama"
 employer_booner_wet_nurse_modifier_desc: "Este personagem é o foco constante das energias de uma Ama habilidosa."
 #High Almoner
 court.8194.t: "Objetos de Caridade"
 court.8194.desc: "Meu [GetCourtPositionType('high_almoner_court_position').GetName()|l] [position_holder.Custom('ComplimentAdjective')], [position_holder.Custom('ES_ElLa')] [position_holder.GetTitledFirstName|l], lida com suas responsabilidades com grande zelo, e a caridade [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip] ganha maior reputação.\n\nPor isso, fico um tanto surpreso quando [position_holder.GetFirstNameNoTooltip] me chama, com uma bolsa de moedas tilintando na palma da mão: \"Meu tempo se divide entre os realmente necessitados e os piedosos lordes e damas de [ROOT.Char.GetCapitalLocation.GetBaronyNameExplicitlyNoTooltip]; preciso de sua orientação, [ROOT.Char.Custom('FormOfAddressForLiege')]…\"."
 court.8194.a: "Concede a graça [ROOT.Char.GetFaith.WealthGodNamePossessive] aos pobres."
 court.8194.b: "Garanta que essas esmolas cheguem aos lugares certos..."
 court.8194.c: "Vejo uma forma que beneficia a todos."
 court.8194.c.success: "Você ajuda a [position_holder.GetFirstNameNoTooltip]"
 court.8194.c.failure: "[position_holder.GetFirstNameNoTooltip] está sobrecarregad"
 employer_booner_high_almoner_1_modifier: "Alívio Direcionado"
 employer_booner_high_almoner_1_modifier_desc: "Os súditos necessitados deste personagem são o foco de um Alto Esmoler atento."
 employer_booner_high_almoner_2_modifier: "Caridade Performática"
 employer_booner_high_almoner_2_modifier_desc: "As consciências dos vassalos piedosos deste personagem são o foco de um Alto Esmoler atento."
 employer_booner_high_almoner_3_modifier: "Alívio Performático"
 employer_booner_high_almoner_3_modifier_desc: "Os súditos necessitados e as consciências dos vassalos piedosos deste personagem são o foco de um Alto Esmoler atento."
 #Bodyguard
 court.8195.t: "Cuidando de Si"
 court.8195.desc: "Meu [GetCourtPositionType('bodyguard_court_position').GetName()|l] [position_holder.Custom('ComplimentAdjective')], [position_holder.Custom('ES_ElLa')] [position_holder.GetTitledFirstName|l], é [Select_CString( position_holder.IsFemale, 'una guerrera', 'un guerrero' )] que inspira e é um espetáculo no campo de treino, além de uma presença tranquilizadora no meu [ROOT.Char.Custom('ResidenceBuilding')|l].\n\nUm dia se aproxima de mim, espada de treino em mãos, com [portrait.GetFirstName] atrás, e me diz: «Recebi pedidos de treinamento e, com sua permissão, os atenderei, [ROOT.Char.Custom('FormOfAddressForLiege')]. Quer que eu ensine alguém em particular?»."
 court.8195.a: "Você lutará #EMP comigo#!!"
 court.8195.b: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('heir'))|l] e herdeir[heir.Custom('ES_OA')], [heir.GetFirstNameNoTooltip], deve ser forte."
 court.8195.c: "Creio que meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('struggling'))|l] , [struggling.GetFirstNameNoTooltip] , lhe faria bem sua orientação."
 court.8195.d: "Concentrem-se no treinamento do meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('hostage'))|l] [hostage.GetFirstNameNoTooltip]."
 court.8195.e: "M [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('interesting'))], [interesting.GetFirstNameNoTooltip], poderia usar sua atenção."
 court.8195.f: "Treine m [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('oldest'))], [oldest.GetFirstNameNoTooltip]."
 court.8195.g: "É hora de que meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('youngest'))], [youngest.GetFirstNameNoTooltip], aprenda a lutar."
 court.8195.h: "Cuide de meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('extra'))] [extra.GetFirstNameNoTooltip]."
 court.8195.i: "M [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('bonus'))], [bonus.GetFirstNameNoTooltip], seria o que mais se beneficiaria."
 employer_booner_bodyguard_modifier: "Prática de Espadachim"
 employer_booner_bodyguard_modifier_desc: "Este personagem está recebendo treinamento pessoal de um Guarda-Costas habilidoso."
 #Master of Horse
 court.8196.t: "Na Sela"
 court.8196.desc: "Praticamente todos concordam que os talentos do meu [GetCourtPositionType('master_of_horse_court_position').GetName()|l] [position_holder.Custom('ComplimentAdjective')], [position_holder.Custom('ES_ElLa')] [position_holder.GetTitledFirstName|l], são inestimáveis.\n\nO adestramento e a precisão dos cavalos progrediram muito em pouco tempo, e ele/ela tem uma habilidade natural para manter sob controle tanto os animais quanto seus capitães.\n\nHoje, [position_holder.GetFirstNameNoTooltip] se aproxima de mim no salão do trono e me pergunta diretamente: \"Meu [ROOT.Char.GetTitleAsNameNoTooltip|l], devo elaborar diretrizes adequadas para as cocheiras ou me concentrar no treinamento?\"."
 court.8196.a: "Economize tudo o que puder nos cavalos."
 court.8196.b: "Uma sela vazia é inútil."
 court.8196.c: "Você não pode fazer ambos?"
 court.8196.c.success: "Você ajuda a [position_holder.GetFirstNameNoTooltip]"
 court.8196.c.failure: "[position_holder.GetFirstNameNoTooltip] está sobrecarregad"
 employer_booner_master_of_horse_1_modifier: "Estabulagem Econômica"
 employer_booner_master_of_horse_1_modifier_desc: "Os estábulos deste personagem são o foco constante das energias de um Mestre dos Cavalos habilidoso."
 employer_booner_master_of_horse_2_modifier: "Promoção de Capitães"
 employer_booner_master_of_horse_2_modifier_desc: "Os oficiais de cavalaria deste personagem são o foco constante das energias de um Tesoureiro habilidoso.\nA [councillor_task|lE] \"treinar comandantes\" é mais eficaz"
 employer_booner_master_of_horse_3_modifier: "Promoção Econômica"
 employer_booner_master_of_horse_3_modifier_desc: "Os estábulos e os oficiais de cavalaria deste personagem são o foco constante das energias de um Mestre dos Cavalos habilidoso.\nA [councillor_task|lE] \"Treinar Comandantes\" é mais eficaz"
 task_train_commanders_master_of_horse_2_bonus_desc: "\n $TAB$$employer_booner_master_of_horse_2_modifier$: #P +[SCOPE.ScriptValue('marshal_train_commanders_monthly_chance_value_base')|P]%#!"
 task_train_commanders_master_of_horse_3_bonus_desc: "\n $TAB$$employer_booner_master_of_horse_3_modifier$: #P +[SCOPE.ScriptValue('marshal_train_commanders_monthly_chance_value_base')|P]%#!"
 #Caravan Master
 court.8197.t: "[position_holder.Custom('QueenKing')] da Estrada"
 court.8197.desc: "Meu [position_holder.Custom('ComplimentAdjective')] [GetCourtPositionType('travel_leader_court_position').GetName()|l], [position_holder.Custom('ES_ElLa')] [position_holder.GetTitledFirstName|l], é [Select_CString(position_holder.IsFemale, 'una organizadora', 'un organizador' )] magistral: desde que [travel_leader.GetHerHim] contratei, até a estadia mais breve é pura facilidade e rapidez.\n\nTrabalha dia e noite, repondo suprimentos e atualizando os itinerários de [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip]. Por um momento, fico surpreso quando me pergunta com toda seriedade: “Meu [ROOT.Char.GetTitleAsNameNoTooltip|l], o que vale mais: seu tempo ou sua saúde?”."
 court.8197.a: "Eu só quero chegar ao meu destino inteiro!"
 court.8197.b: "Não devemos perder tempo, tenho muito a fazer."
 court.8197.c: "Minha segurança e meu tempo são igualmente valiosos!"
 court.8197.c.success: "Você ajuda a [position_holder.GetFirstNameNoTooltip]"
 court.8197.c.failure: "[position_holder.GetFirstNameNoTooltip] está sobrecarregad"
 employer_booner_travel_leader_1_modifier: "Viagens Seguras"
 employer_booner_travel_leader_1_modifier_desc: "Este personagem é o foco constante das energias de um Mestre das Caravanas habilidoso."
 employer_booner_travel_leader_2_modifier: "Aproveitando o Tempo"
 employer_booner_travel_leader_2_modifier_desc: "Este personagem é o foco constante das energias de um Mestre das Caravanas habilidoso."
 employer_booner_travel_leader_3_modifier: "Tempo Seguro"
 employer_booner_travel_leader_3_modifier_desc: "Este personagem é o foco constante das energias de um Mestre das Caravanas habilidoso."
 #Antiquarian
 court.8198.t: "Curador Atento"
 court.8198.desc: "Meu [position_holder.Custom('ComplimentAdjective')] [GetCourtPositionType('antiquarian_court_position').GetName()|l], [position_holder.Custom('ES_ElLa')] [position_holder.GetTitledFirstName|l], cuida muito bem do meu tesouro: os itens são mantidos bem limpos e sem poeira, e está sempre pront[antiquarian.Custom('ES_OA')] para oferecer alguma curiosidade a qualquer hóspede curioso, ou nem tanto.\n\nCom a responsabilidade por todos os tesouros da corte [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip], é compreensível que seu tempo seja bastante escasso, e ele me pergunta, depois de eu elogiar seu bom trabalho, se: \"...há objetos que achais que merecem atenção especial, [ROOT.Char.Custom('FormOfAddressForLiege')]?\"."
 court.8198.a: "Você poderia olhar este [weak_1.Custom('ArtifactType')]?"
 court.8198.b: "Há #EMP um#! [weak_2.Custom('ArtifactType')] sem brilho."
 court.8198.c: "Dê uma olhada neste [weak_3.Custom('ArtifactType')] para mim."
 court.8198.d: "Este [broken_1.Custom('ArtifactType')] poderia usar alguns reparos."
 court.8198.e: "Meu [broken_2.Custom('ArtifactType')] está caindo aos pedaços."
 court.8198.f: "Cuide deste [broken_3.Custom('ArtifactType')]."
 court.8198.g: "E o que acha do meu [weak_4.Custom('ArtifactType')]?"
 court.8198.h: "Repare o [broken_4.Custom('ArtifactType')], por favor?"
 court.8198.i: "Não, apenas continue com o bom trabalho!"
 employer_booner_antiquarian_modifier: "Curador Atento"
 employer_booner_antiquarian_modifier_desc: "O relicário deste personagem é o foco constante das energias de um Antiquário habilidoso."
 court_8198_artifact_prowess_tooltip: "[THIS.Artifact.GetName] ganha [prowess|lE]: #P +2#!"
 court_8198_artifact_court_grandeur_baseline_add_tooltip: "[THIS.Artifact.GetName] ganha Bônus de [court_grandeur|lE]: #P +2#!"
 court_8198_artifact_monthly_prestige_add_tooltip: "[THIS.Artifact.GetName] ganha [prestige|lE] Mensal: #P +0.02#!"
 court_8198_artifact_monthly_dynasty_prestige_tooltip: "[THIS.Artifact.GetName] ganha [dynasty_prestige|lE] Mensal: #P +0.01#!"
 court_8198_artifact_dynasty_opinion_tooltip: "[THIS.Artifact.GetName] ganha [opinion|lE] de [dynasty|lE]: #P +3#!"
 #Hunt Master
 court.8199.t: "Mestre da Caça"
 court.8199.desc: "Meu [GetCourtPositionType('master_of_hunt_court_position').GetName()|l] [position_holder.Custom('ComplimentAdjective')], [position_holder.Custom('ES_ElLa')] [position_holder.GetTitledFirstName|l] tem estado fazendo uma grande exibição e todos concordam que a caça em [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip] nunca foi tão abundante.\n\nFico feliz em ver[position_holder.GetHerHim] quando põe a cabeça na minha sala do trono, recém-chegad[position_holder.Custom('ES_OA')] do campo com uma pergunta urgente: \"Meu [ROOT.Char.GetTitleAsNameNoTooltip], alguns dos seus vassalos têm me pedido ajuda com suas caçadas, mas também tenho planos para melhorar seus terrenos de caça. O que devo fazer?\"."
 court.8199.a: "Mantenha meus súditos felizes."
 court.8199.b: "Melhorias, você diz?"
 court.8199.c: "Por que não os dois?"
 court.8199.c.success: "Você ajuda a [position_holder.GetFirstNameNoTooltip]"
 court.8199.c.failure: "[position_holder.GetFirstNameNoTooltip] está sobrecarregad"
 employer_booner_master_of_hunt_1_modifier: "Conselho de Caça"
 employer_booner_master_of_hunt_1_modifier_desc: "Os campos de caça dos vassalos deste personagem são o foco constante das energias de um Mestre da Caça habilidoso."
 employer_booner_master_of_hunt_2_modifier: "Manejo de Jogo Inovador"
 employer_booner_master_of_hunt_2_modifier_desc: "Os terrenos de caça deste personagem são o foco constante das energias de um Mestre da Caça habilidoso.\n[prestige|E] [prestige_i] dos [activity|lE] [GetActivityType( 'activity_hunt' ).GetName|l]: #P +20 %#!"
 employer_booner_master_of_hunt_3_modifier: "Conselho Inovador"
 employer_booner_master_of_hunt_3_modifier_desc: "Os terrenos de caça deste personagem e de seus vassalos são o foco constante das energias de um Mestre de Caça habilidoso.\n[prestige|E] [prestige_i] da [activity|lE] [GetActivityType( 'activity_hunt' ).GetName|l]: #P +20 %#!"
 #Royal Architect
 court.8200.t: "Fundamentos Sólidos"
 court.8200.desc: "As habilidades da minha [GetCourtPositionType('royal_architect_court_position').GetName()|l] [position_holder.Custom('ComplimentAdjective')], [position_holder.Custom('ES_ElLa')] [position_holder.GetTitledFirstName|l], recebem muitos elogios na corte; até o mais simples reparo é feito com um cuidado e uma precisão difíceis de encontrar em [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], ou, na verdade, em qualquer outro lugar.\n\nMas tem passado a semana inteira mergulhad[position_holder.Custom('ES_OA')] em pensamentos e por fim compartilha seu dilema comigo: \"[ROOT.Char.Custom('FormOfAddressForLiege')|U], durante meu trabalho, percebi maneiras de agilizar seus projetos de construção, mas talvez meus esforços fossem melhor empregados ajudando na expansão das vilas?\"."
 court.8200.a: "Vós sois #EMP mi#! arquiteto[position_holder.Custom('ES_OA')]."
 court.8200.b: "Atenda às necessidades do povo."
 court.8200.c: "Alguém talentoso poderia fazer ambas as coisas."
 court.8200.c.success: "Você ajuda a [position_holder.GetFirstNameNoTooltip]"
 court.8200.c.failure: "[position_holder.GetFirstNameNoTooltip] está sobrecarregad"
 employer_booner_royal_architect_1_modifier: "Montagem Eficiente"
 employer_booner_royal_architect_1_modifier_desc: "A construção deste personagem é o foco constante das energias de um Arquiteto Real habilidoso."
 employer_booner_royal_architect_2_modifier: "Supervisão Civil"
 employer_booner_royal_architect_2_modifier_desc: "As vilas deste personagem são o foco constante das energias de um Arquiteto Real habilidoso.\nProgresso de [councillor_task|lE] de Aumentar Desenvolvimento no Condado: #P +10%#!"
 employer_booner_royal_architect_3_modifier: "Supervisão Eficiente"
 employer_booner_royal_architect_3_modifier_desc: "A construção e as vilas deste personagem são o foco constante das energias de um Arquiteto Real habilidoso.\nProgresso de [councillor_task|lE] de Aumentar Desenvolvimento no Condado: #P +10%#!"
 #Cupbearer
 court.8201.t: "Mestre do Cálice"
 court.8201.desc: "Meu [GetCourtPositionType('cupbearer_court_position').GetName()|l] [position_holder.Custom('ComplimentAdjective')], [position_holder.Custom('ES_ElLa')] [position_holder.GetTitledFirstName|l], é uma pessoa de confiança que leva suas responsabilidades com considerável desembaraço.\n\nNão cuida apenas de encher minha taça, mas também a de muitos dos meus convidados e cortesãos, sempre com um sorriso.\n\nTal entusiasmo e habilidade são raros, [position_holder.GetFirstNameNoTooltip] é muito útil…"
 court.8201.a: "Trate bem meus visitantes, [position_holder.GetFirstNameNoTooltip]."
 court.8201.b: "Mantenha meus servos em forma."
 court.8201.c: "Eu espero o mais alto padrão de serviço."
 court.8201.c.success: "Você ajuda a [position_holder.GetFirstNameNoTooltip]"
 court.8201.c.failure: "[position_holder.GetFirstNameNoTooltip] está sobrecarregad"
 employer_booner_cupbearer_1_modifier: "Cálices Transbordantes"
 employer_booner_cupbearer_1_modifier_desc: "Os vassalos deste personagem estão sob o cuidado atento de um Escanção habilidoso."
 employer_booner_cupbearer_2_modifier: "Atenção Especial"
 employer_booner_cupbearer_2_modifier_desc: "Os servos deste personagem estão sob a vigilância cuidadosa de um Escanção habilidoso.\nManutenção de [court_amenity|lE] dos Servos: #P -25%#!"
 employer_booner_cupbearer_3_modifier: "Atenção Transbordante"
 employer_booner_cupbearer_3_modifier_desc: "Os vassalos e servos deste personagem estão sob o cuidado atento de um Escanção habilidoso.\nManutenção de [court_amenity|lE] dos Servos: #P -25%#!"
 #Lady-in-Waiting
 court.8203.t: "Olhos em Toda Parte"
 court.8203.desc: "Meu [GetCourtPositionType('lady_in_waiting_court_position').GetName()|l] , [position_holder.Custom('ES_ElLa')] [position_holder.GetTitledFirstName|l], com seu caráter [position_holder.Custom('ComplimentAdjective')], estabeleceu-se em seu papel de forma admirável e parece capaz de antecipar todos os meus caprichos.\n\nAlém disso, nada lhe escapa na corte, desde os boatos mais triviais até as notícias mais graves.\n\nPoderia ser um grande trunfo, se esses talentos recebessem alguma direção…"
 court.8203.a: "[position_holder.GetFirstNameNoTooltip], eu preciso da sua ajuda..."
 court.8203.b: "Nem mesmo os sussurros mais silenciosos devem ser ignorados."
 court.8203.c: "Segredos e charme, faça desses suas armas."
 court.8203.c.success: "Você ajuda a [position_holder.GetFirstNameNoTooltip]"
 court.8203.c.failure: "[position_holder.GetFirstNameNoTooltip] está sobrecarregad"
 employer_booner_lady_in_waiting_1_modifier: "Apoio Moral"
 employer_booner_lady_in_waiting_1_modifier_desc: "As estratégias sociais deste personagem são orientadas por uma Dama de Companhia habilidosa."
 employer_booner_lady_in_waiting_2_modifier: "Sussurradora da Corte"
 employer_booner_lady_in_waiting_2_modifier_desc: "A coleta de fofocas deste personagem é orientada por uma Dama de Companhia habilidosa.\nProgresso de [councillor_task|lE] Descobrir Segredos dentro do Reino: #P +10#!"
 employer_booner_lady_in_waiting_3_modifier: "Apoio da Corte"
 employer_booner_lady_in_waiting_3_modifier_desc: "As estratégias sociais e a coleta de fofocas deste personagem são orientadas por uma Dama de Companhia habilidosa.\nProgresso de [councillor_task|lE] Descobrir Segredos dentro do Reino: #P +10#!"
 #Food Taster
 court.8204.t: "Medida da Corte"
 court.8204.desc: "A julgar pela expansão do sorriso e da barriga, meu [GetCourtPositionType('food_taster_court_position').GetName()|l] [position_holder.Custom('ComplimentAdjective')], [position_holder.Custom('ES_ElLa')] [position_holder.GetTitledFirstName|l], nasceu para as refeições de um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l].\n\nCada vez passa mais tempo nas cozinhas, provando as amostras e dando conselhos aos cozinheiros.\n\nNão deveria desperdiçar seu raro entusiasmo em um cargo tão relativamente ingrato…"
 court.8204.a: "Não deixe nada escapar ao seu olhar, [position_holder.GetFirstNameNoTooltip]."
 court.8204.b: "As cozinhas estão sob seu comando!"
 court.8204.c: "Quero olhos na comida, #EMP e#! nos funcionários."
 court.8204.c.success: "Você ajuda a [position_holder.GetFirstNameNoTooltip]"
 court.8204.c.failure: "[position_holder.GetFirstNameNoTooltip] está sobrecarregad"
 employer_booner_food_taster_1_modifier: "Triagem dos Servos"
 employer_booner_food_taster_1_modifier_desc: "Os servos deste personagem estão sob a vigilância atenta de um Provador habilidoso."
 employer_booner_food_taster_2_modifier: "Menu Aprovado"
 employer_booner_food_taster_2_modifier_desc: "A cozinha deste personagem está sob a vigilância atenta de um Provador habilidoso.\nManutenção dos [court_amenity|lE] dos Alimentos: #P -25%#!"
 employer_booner_food_taster_3_modifier: "Menu Triado"
 employer_booner_food_taster_3_modifier_desc: "Os servos e a cozinha deste personagem estão sob a vigilância atenta de um Provador habilidoso.\nManutenção dos [court_amenity|lE] dos Alimentos: #P -25%#!"
 #Poor Holder
 court.8301.t: "Expectativas Não Atendidas"
 court.8301.intro: "O tema da incompetência de meu [position_holder.GetHeldCourtPositionsString], [position_holder.GetFirstName], tem sido cada vez mais motivo de chacota. Pensando bem, seus talentos deixam bastante a desejar…\n\n"
 court.8301.detractor: "O principal dentre os seus detratores é meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('detractor'))], [detractor.Custom('ES_ElLa')] [detractor.GetTitledFirstName|l], que não faz nenhum esforço para esconder seu desprezo.\n\n"
 court.8301.desc: "\"Vamos, meu senhor\", [position_holder.GetFirstName] gagueja diante de uma corte que ri às escondidas depois que sua confusa compreensão sobre [position_holder.Custom('GetCourtPositionSubject')] voltou a ser alvo de zombarias contundentes, \"#EMP sou#! bom[position_holder.Custom('ES_OA')] no meu trabalho… não sou?\""
 court.8301.a: "Vamos falar sobre sua remuneração, [position_holder.GetFirstNameNoTooltip]..."
 court.8301.b: "Acho que é hora de você se afastar."
 court.8301.c: "#weak *suspiro*#! #EMP Sí…#! Ah, sim, claro! Vocês são fantástic[position_holder.Custom('ES_OA')]!"
