 #Holder Improves
 court.8311.t: "Aprendendo as Manhas"
 court.8311.desc: "A pesar de un dominio bastante cuestionable al principio de la mecánica más básica siquiera sobre [position_holder.Custom('GetCourtPositionSubject')], mi [position_holder.GetHeldCourtPositionsString|l], [position_holder.Custom('ES_ElLa')] [position_holder.GetTitledFirstName|l], parece que por fin se esta haciendo con su papel.\n\nMuchos en la corte han tomado nota de sus habilidades, florecientes, aunque aún algo limitadas. Como mínimo, parece que se esfuerza de verdad por ganarse el puesto."
 court.8311.a: "É adorável perceber isso, [position_holder.GetFirstNameNoTooltip]!"
 bonus_aptitude_role_tt: "[aptitude|E] de [position_holder.Custom('GetTargetCourtPosition')|l]: #P +[SCOPE.ScriptValue('cp_bonus_aptitude_value')]#!"
 cp_bonus_aptitude: "Aprendendo as Manhas"
 #Salary Review
 court.8321.t: "A Abordagem da Cenoura"
 court.8321.desc: "Mi [position_holder.GetHeldCourtPositionsString|l] [position_holder.Custom('ComplimentAdjective')], [position_holder.Custom('ES_ElLa')] [position_holder.GetTitledFirstName|l], ha conseguido, de un modo u otro, asentarse en su papel, aunque no sin ciertos problemas iniciales.\n\n[position_holder.GetFirstNameNoTooltip] no ha ocultado el hecho de que cree que su recompensa debería ser mejor para volcarse a fondo en su trabajo.\n\n«Vamos, [ROOT.Char.Custom('FormOfAddressForLiege')], ¡estoy al servicio [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip|l] de [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]! ¿No he de recibir algo más que las sobras de la mesa si he de pasar los días inmers[position_holder.Custom('ES_OA')] en [position_holder.Custom('GetCourtPositionSubject')] en vuestro nombre?»."
 court.8321.a: "Muito bem, mas é melhor que você faça por merecer."
 court.8321.b: "Que tal um pequeno bônus, em vez disso?"
 court.8321.b.success: "[position_holder.GetFirstNameNoTooltip] aceita a oferta"
 court.8321.b.failure: "[position_holder.GetFirstNameNoTooltip] se sente insultad[position_holder.Custom('ES_OA')]"
 court.8321.c: "Não há fundos disponíveis no momento..."
