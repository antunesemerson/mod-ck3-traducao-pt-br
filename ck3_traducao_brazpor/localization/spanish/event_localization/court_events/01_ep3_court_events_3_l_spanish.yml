l_spanish:
 #The Peak of Elegance
 court_events.3000.t: "O Pico da Elegância"
 court_events.3000.desc: "[chancellor.Custom2('MyCharacterIntroduction',ROOT.Char)|U] e [steward.Custom2('MyCharacterIntroduction',ROOT.Char)] parecem estar hoje de bom humor.\n\n\"Junte-se a nós, meu senhor[ROOT.Char.Custom('ES_XA')]!\", exclama [chancellor.GetFirstNameNoTooltip]. \"Estávamos falando de algo do seu interesse. Seus investimentos para promover e manter a moda [ROOT.Char.GetCulture.GetNameNoTooltip] como o auge da elegância estão dando frutos!\".\n\n\"Os governantes estrangeiros admiram e invejam você, mas [steward.GetFirstNameNoTooltip] e eu não conseguimos chegar a um acordo sobre a melhor maneira de aproveitar sua reputação\"."
 court_events.3000.a: "Todos devem saber que eu sou o ápice da moda."
 court_events.3000.b: "A moda de [ROOT.Char.GetCulture.GetNameNoTooltip] deve ser um exemplo para todos."
 court_events.3000.c: "Todos devem comprar nossos chapéus!"
 #The Same Old Soup
 court_events.3010.t: "A Mesma Velha Sopa"
 court_events.3010.desc: "\"Eu imploro, m [ROOT.Char.Custom2('RelationToMeAddress', SCOPE.sC('courtier'))],\" [courtier.Custom2('MyCharacterIntroduction', ROOT.Char)] se aproxima de mim com olhos suplicantes.\n\n\"Você precisa fazer algo sobre a comida servida na corte! Todos nós comemos como camponeses, emissários estrangeiros fazem caretas à nossa mesa, e governantes e artistas vizinhos usam nossos pratos tradicionais como exemplos de mau gosto e hábitos bárbaros!\""
 court_events.3010.a: "Certo, vou contratar alguns cozinheiros estrangeiros."
 court_events.3010.b: "Mas é saudável e piedoso!"
 court_events.3010.c: "É para a minha segurança."
 cheaper_food_for_15_years: "$court_food_quality_decent$ é #P 20%#! mais barato por 15 anos"
 court_events.3010.c.tt: "Quando sua sopa tem o mesmo sabor e aparência todos os dias, é muito mais difícil deslizar qualquer veneno despercebido!"
 #What's in a Bed?
 court_events.3020.t: "O Que Há em uma Cama?"
 court_events.3020.desc: "[courtier.Custom2('MyCharacterIntroduction', ROOT.Char)|U] hoje está com uma aparência especialmente lastimável.\n\n"Nesta corte vivemos como animais! Ou, pior ainda, como #EMP campesinos!#! Os aposentos estão lotados, famílias inteiras se espremem na mesma cama, os urinóis são deixados por toda parte; nos reviramos em nossa própria sujeira e fedor…"."
 court_events.3020.desc_physician: "\n\n[physician.Custom2('MyCharacterIntroduction', ROOT.Char)|U] intervém: "O miasma ruim também contribui para as epidemias!"."
 court_events.3020.desc_architect: "\n\n"Tem que haver algo que possamos fazer", diz [architect.Custom2('MyCharacterIntroduction', ROOT.Char)]."
 court_events.3020.a: "Nós merecemos melhor."
 court_events.3020.b: "Isso requer um[expert.Custom('ES_XA')] especialista[expert.Custom('ES_OA')]: [expert.GetFirstNameNoTooltip]!"
 court_events.3020.c: "![architect.GetFirstNameNoTooltip] e [physician.GetFirstNameNoTooltip], resolvam isso!"
 court_events.3020.d: "Tenho certeza de que não é tão ruim."
 cheaper_lodgings_for_15_years: "$court_lodging_standards_middling$ são #P 15%#! mais baratos por 15 anos"
 cheaper_lodgings_for_15_years_1: "$court_lodging_standards_middling$ são #P 25%#! mais baratos por 15 anos"
 #It Came to Me in a Dream
 court_events.3030.t: "Veio a Mim em um Sonho"
 court_events.3030.desc: ""Generos[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l]! Deixai-me expressar toda a minha gratidão e trazer-vos muito boas novas!", exclama [inspiration_owner.Custom('ES_ElLa')] [inspiration_owner.GetTitledFirstName|l] enquanto corre para me encontrar.\n\n"Tenho desfrutado plenamente dos aposentos que me concedestes. São tão espaçosos que posso andar de um lado para o outro enquanto penso e trabalhar tranquilamente, sem ser perturbado; a vista do jardim é de uma beleza inspiradora; e a cama... Oh, a cama! É tão confortável que sinto como se estivesse dormindo sobre uma nuvem! Na verdade, uma inspiração divina para tornar ainda melhor o/a vosso/a [inspiration_owner.Custom('GetInspirationTypeObject')] enquanto dormia me ocorreu. Preciso voltar logo ao trabalho!"."
 court_events.3030.a: "Que tal uma cama ainda melhor?"
 court_events.3030.b: "Fico muito feliz em ouvir isso!"
 #Empty Court
 court_events.3040.t: "Corte Vazia"
 court_events.3040.desc: "Quando sinto uma vontade repentina de comer algo e não consigo encontrar um único servo que possa me ajudar, percebo que isso se tornou algo bastante comum. Não consigo fazer nada em minha corte porque nunca há servos suficientes!\n\nMinha reflexão é interrompida pela aparição de [steward.Custom2('MyCharacterIntroduction', ROOT.Char)]. \"Meu [ROOT.Char.GetTitleAsNameNoTooltip|l], o que pensais sobre a guerra que devasta nosso vizinho, o [war_realm.GetName]? Incontáveis refugiados da província ocupada de [occupied_prov.GetName] estão atravessando nossas fronteiras neste exato momento!\".\n\nPoderia ser esta a solução que eu estava procurando?"
 court_events.3040.a: "As portas de nossas cidades se abrirão para eles!"
 court_events.3040.b: "Muito bem, eles podem trabalhar para nós."
 court_events.3040.c: "Não precisamos deles."
 cheaper_servants_for_15_years: "$court_servants_some$ são #P 20%#! mais baratos por 15 anos"
 #At the Table of the X
 court_events.3050.t: "À mesa [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip|l]"
 court_events.3050.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U]", começa [chancellor.Custom2('MyCharacterIntroduction', ROOT.Char)]; "chamou minha atenção a reputação que as refeições luxuosas servidas à sua mesa conquistaram!".\n\n"Tantas iguarias exóticas, sabores tão tentadores… Seus vassalos #EMP suspiran#! por participar de seus banquetes!".\n\nIsso acabou de me dar uma ideia…"
 court_events.3050.a: "Que desejem a mesa do [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip|l]!"
 court_events.3050.b: "Vamos convidá-los à mesa [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip|l]!"
 court_events.3050.a.tt: "Você ganha #P $food_improves_opinion$#!: Aumenta a eficácia de [domestic_affairs|lE] por #P 15#! anos"
 court_events.3050.b.tt: "Você ganha #P $food_improves_feasts$#!: #P +15#! aceitação de convidados e #P -15%#! custo em ouro para suas atividades de Festa por #P 15#! anos"
 food_improves_feasts: "Cozinha Renomada"
 food_improves_opinion: "$food_improves_feasts$"
 food_improves_feasts_desc: "$food_improves_feasts$: $VALUE|=+0$"
 chancellor_domestic_affairs_opinion_food_bonus_desc: "\n $TAB$$food_improves_opinion$: #P +[SCOPE.ScriptValue('chancellor_domestic_affairs_opinion_food_bonus')|2]#!"
 chancellor_domestic_affairs_tyranny_food_bonus_desc: "\n $TAB$$food_improves_opinion$: #P +[SCOPE.ScriptValue('chancellor_domestic_affairs_tyranny_food_bonus')|P0]%#!"
 #A Faceless Sea
 court_events.3060.t: "Um Mar Sem Rosto"
 court_events.3060.desc: "Para onde quer que eu olhe, vejo pessoas vestindo minhas cores: correndo de um lado para outro, fofocando, polindo armaduras velhas, trazendo comida, levando mensagens…\n\nQuantos há hoje em dia? Vêm e vão como a maré, e acho impossível acompanhar o rosto das pessoas conhecidas! Em quem posso confiar?\n\nEntregue[ROOT.Char.Custom('ES_OA')] às minhas reflexões, aproxima-se de mim [spymaster.Custom2('MyCharacterIntroduction', ROOT.Char)]. "[ROOT.Char.Custom('FormOfAddressForLiege')|U], vejo que está estudando os servos. São tantos! Em um mar de pessoas sem rosto, ninguém consegue saber com certeza quem é quem. Seria muito fácil infiltrar agentes onde quer que fossem necessários… Claro, seus inimigos também poderiam tirar proveito disso, mas pense em todas as possibilidades…"."
 court_events.3060.a: "Tantas possibilidades..."
 court_events.3060.a.tt: "... para cravarem uma faca em minhas costas também!"
 court_events.3060.b: "Coloque-os para trabalhar em vez disso!"
 #Rags and not Riches?
 court_events.3070.t: "Papel e Não Riquezas?"
 court_events.3070.desc: "Durante suas viagens, [guest.Custom('ES_ElLa')] [guest.GetTitledFirstName|l] está de visita em minha corte. Até agora, não ficou nada impressionad[guest.Custom('ES_OA')].\n\nAh, vejo, então isso é o que por aqui passa por \"moda\"… Perdoai-me, [ROOT.Char.Custom('FormOfAddressForLiege')], mas a simplicidade de vosso traje faz com que eu mal consiga distingui-lo de seus servos! Talvez eu possa compartilhar alguns conselhos, se me permitirdes."
 court_events.3070.a: "Vamos ver o que você tem a oferecer."
 court_events.3070.b: "Eu abracei a humildade. Você deveria experimentar também."
 court_events.3070.c: "#EMP Como você se atreve?!#!"
 cheaper_fashion_for_15_years: "$court_fashion_decent$ é #P 20%#! mais barato por 15 anos"
 free_fashion_for_15_years: "$court_fashion_acceptable$ é #P grátis#! por 15 anos"
 #Silvertongue
 court_events.3080.t: "Língua de Prata"
 court_events.3080.desc: "[poet.Custom('ES_ElLa')|U] [poet.GetWomanMan] que se uniu hoje à minha corte tem um toque excêntrico e um sorriso que transborda carisma e confiança.\n\n«Glorios[ROOT.Char.Custom('ES_OA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] , permiti-me apresentar-me: chamo-me [poet.GetFirstNameNicknamed], e sou [Select_CString( poet.IsFemale, 'una poetisa', 'un poeta' )] com o maior dos talentos! Minha fama se estende por todo o continente, mas, nesta ocasião especial, decidi que meus dias de andanças terminaram e gostaria de oferecer-vos —[ROOT.Char.Custom('ES_ElLa')] mais #EMP benevolente#! e #EMP magnífic[ROOT.Char.Custom('ES_OA')]#! [ROOT.Char.GetLadyLord] de todos — meus serviços inestimáveis»."
 court_events.3080.a: "Você deverá escrever meus discursos."
 court_events.3080.b: "Sua expertise pode ajudar meus planos..."
 court_events.3080.c: "Escreva palavras doces como mel para meus amantes!"
 court_events.3080.d: "Não precisamos de suas habilidades agora."
 #I Want a Pony!
 court_events.3090.t: "Eu Quero um Ponei!"
 court_events.3090.desc: "[ROOT.Char.GetMotherFather|U], você pode me ensinar a cavalgar? Quero ser [child.Custom('ES_ElLa')] a maior [Select_CString( child.IsFemale, 'guerreira', 'guerreiro' )] do mundo conhecido!\n\nA voz entusiasmada de [child.GetFirstName] me encontra em um raro momento de pausa entre meus muitos compromissos oficiais. Sua ambição é um tanto precoce, mas no fundo é apenas [Select_CString( child.IsFemale, 'uma menina', 'um menino' )]… O que há de errado em entrar na brincadeira por um tempo?"
 court_events.3090.a: "Claro, vamos lá!"
 court_events.3090.b: "Estude agora — pônei depois!"
 court_events.3090.b.tt: "Se você estudar muito agora, prometo que lhe darei o melhor cavalo de guerra quando você crescer!"
 court_events.3090.b.tt_effect: "[child.GetShortUIName|U] receberá um Cavalo de Guerra no aniversário de 16 anos"
 court_events.3090.c: "Não tenho tempo para isso, [child.Custom('GetDaughterSon')]."
 court_events.3091.desc_no_parent: "Parece que foi ontem que te peguei de surpresa, [parent.GetMotherFather], e declarei meu desejo de ser [Select_CString( ROOT.Char.IsFemale, 'uma grande guerreira', 'um grande guerreiro' )]; só que antes eu precisava aprender a montar a cavalo.\n\nNa verdade…, eu só queria passar mais tempo com você. Mas você, com sabedoria, pensou no meu futuro. Estudei muito desde aquele dia, como me pediu. Completei 16 anos, mas você já não está mais aqui.\n\nConsegui um cavalo de guerra, exatamente como você me prometeu naquele dia, para honrar sua memória."
 court_events.3091.desc: "Meu décimo sexto aniversário não marca apenas minha passagem para a vida adulta, mas também a realização de uma promessa de longa data que meu [parent.GetMotherFather] me fez há muito tempo.\n\nDurante anos, cumpri minha parte do acordo estudando muito. Será que meu [parent.GetMotherFather] se lembrará de sua parte?\n\nAinda estou perdido em meus pensamentos quando [parent.Custom('GetMamaPapa')] aparece no jardim, conduzindo pela rédea um majestoso cavalo de guerra. Ele se lembrou!"
 court_events.3091.a: "Vou fazer você se orgulhar!"
 court_events.3092.desc: "Parece que foi ontem que você me pegou de surpresa, [child.GetFirstName], você era pouco mais que um [child.Custom('ES_XA')] [child.Custom('GirlBoy')] que declarava orgulhosamente sua intenção de se tornar [Select_CString( child.IsFemale, 'uma grande guerreira', 'um grande guerreiro' )]!\n\nSorrindo, conduzo pela rédea um majestoso cavalo de guerra. Naquele dia, prometi a você o melhor cavalo que já enfeitasse nosso [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] se você mantivesse seus estudos em dia. Você se lembra?\n\nO sorriso que toma conta do rosto do meu [child.Custom('GetDaughterSon')] quando sobe pela primeira vez nas costas do cavalo é todo o reconhecimento de que preciso."
 court_events.3092.a: "De nada, [child.Custom('GetDaughterSon')]!"
 #A Language for the X's Court
 court_events.3100.t: "Uma língua para a corte [ROOT.Char.Custom('ES_DelDela')] [ROOT.Char.GetTitleAsNameNoTooltip|l]"
 court_events.3100.desc: ""Temível [ROOT.Char.GetTitleAsNameNoTooltip|l], vosso poder e glória estão além de qualquer dúvida, mas vossa corte se sente ignorada, já que vós simplesmente não falais o mesmo idioma que eles", começa nervosamente [chancellor.Custom2('MyCharacterIntroduction', ROOT.Char)].\n\n"Talvez aprender [ROOT.Char.GetCourtLanguage.GetName] vos aproximasse do vosso povo? Eu poderia oferecer minha humilde ajuda, se me permitirdes"."
 court_events.3100.a: "Acho que devo começar a estudar."
 court_events.3100.b: "[linguist.GetFirstNameNoTooltip], ensine-me!"
 court_events.3100.c: "Não tenho tempo para essa bobagem."
 court_events.3100.a.tt: "Eu inicio um [scheme|lE] [GetScheme('learn_language').GetTypeName|l] contra [chancellor.GetShortUIName] com [GetModifier('pressured_to_learn_court_language_modifier').GetNameWithTooltip]"
 #The Best Builder
 court_events.3110.t: "O Melhor Construtor"
 court_events.3110.desc: "«[ROOT.Char.Custom('FormOfAddressForLiege')|U]», [steward.Custom2('MyCharacterIntroduction', ROOT.Char)] se aproxima a mim com a preocupação estampada no rosto. «Trago notícias preocupantes».\n\n«[vassal.Custom('ES_ElLa')|U] [vassal.GetTitledFirstName|l] de [vassal.GetPrimaryTitle.GetBaseNameNoTier] vem construindo sua capital de uma forma tão impressionante que o povo comum começou a compará-la a [ROOT.Char.GetCapitalLocation.GetBaronyNameExplicitly], e até se atreveram a dizer que a outra fica devendo!».\n\n«Temo que a única forma de salvarmos nossa reputação seja uma vigorosa demonstração de poder»."
 court_events.3110.a: "Vou superar [vassal.GetSheHe]!"
 court_events.3110.architect: "Seu [GetCourtPositionType('royal_architect_court_position').GetName()|l] vai ao trabalho"
 court_events.3110.b: "Multe[vassal.GetHerHim] com severidade."
 court_events.3110.b.tt: "Tenho certeza de que deve ter infringido alguma lei em algum momento!"
 court_events.3110.c: "Suponho que fico feliz por [vassal.GetSheHe]."
 MODIFIER_DEFINITION_VALUE_ARCHITECT_SCALE: " 	#weak Aumento por n?vel de [aptitude|lE] de seu/sua [GetCourtPositionType('royal_architect_court_position').GetName()|l]#!"
 court_events.3110.a.success: "Seu programa de construção começa com sucesso"
 court_events.3110.a.failure: "Seu programa de construção falha"
 court_events.3110.a.success.tt: "Programa de Construção Iniciado"
 court_events.3110.a.failure.tt: "Programa de Construção Falhou"
 court_events.3110.b.success: "Você encontra a desculpa perfeita"
 court_events.3110.b.success.tt: "[vassal.GetShortUINameNoTooltip] paga"
 court_events.3110.b.failure: "A posição [vassal.Custom('ES_DelDela')] [vassal.GetTitleAsNameNoTooltip|l] é irreprochável"
 court_events.3110.b.failure.tt: "[vassal.GetShortUINameNoTooltip] não está em falta"
 court_events.3115.desc: "[relative.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima a mim, com a preocupação estampada no rosto. \"Trago notícias preocupantes\".\n\n\"A Casa [vassal.GetHouse.GetBaseName], sob a direção de [vassal.Custom('ES_DelDela')].[vassal.GetTitledFirstName|l]. tem expandido sua propriedade familiar para refletir seu poder e riqueza além de qualquer expectativa, a ponto de nossa própria propriedade parecer insignificante em comparação!\".\n\nPrecisamos fazer algo, e logo, se quisermos salvar as aparências!\"."
 #I Could Do Better!
 court_events.3120.t: "Eu Poderia Fazer Melhor!"
 court_events.3120.desc: "[inspired.Custom2('MyCharacterIntroduction', ROOT.Char)|U] já faz algum tempo que está olhando de forma desconfortável para meu [artifact.GetName]. Sua expressão de dor não sugere nada de bom.\n\n«O quê, [inspired.GetFirstNameNoTooltip]?! Falai!», finalmente explodo.\n\n«Perdão, [ROOT.Char.Custom('FormOfAddressForLiege')], não queria incomodá-lo. É que esse [artifact.GetType] é tão… #EMP ¿de aficionados?#! Parece tão tosco, desleixado, #EMP ordinario!#!! Um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleAsNameNoTooltip|l] de seu tamanho merece algo melhor! #EMP Yo#! eu teria feito algo melhor…»."
 court_events.3120.a: "Então faça algo melhor agora, [inspired.GetFirstNameNoTooltip]. Eu confio em você."
 court_events.3120.b: "Concentre-se na sua própria criação!"
 court_events.3120.c: "Mostre-me que você ainda pode fazer melhor!"
 court_events.3120.d: "Não incomode."
 artifact_improved_tt: "Artefato Melhorado"
 court_events.3120.a.tt: "[artifact.GetNameNoTooltip] receberá #V 2#! #P bonificaciones#! aleatórias"
 gains_weapon_inspiration_tt: "[inspired.GetShortUIName|U] ganha uma [inspiration|lE] de Arma"
 gains_armor_inspiration_tt: "[inspired.GetShortUIName|U] ganha uma [inspiration|lE] de Armadura"
 gains_smith_inspiration_tt: "[inspired.GetShortUIName|U] ganha uma [inspiration|lE] de Ferreiro"
 gains_weaver_inspiration_tt: "[inspired.GetShortUIName|U] ganha uma [inspiration|lE] de Tecelão"
 gains_artisan_inspiration_tt: "[inspired.GetShortUIName|U] ganha uma [inspiration|lE] de Artesão"
