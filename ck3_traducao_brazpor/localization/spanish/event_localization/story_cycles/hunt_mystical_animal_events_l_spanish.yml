l_spanish:
 start_hunt_mystical_animal_story_cycle_effect.tt: "#EMP Não descansarei até encontrar minha presa!#!"
 hunt_mystical_animal.1001.t: "[ROOT.Char.Custom('GetAnimalType')] [ROOT.Char.Custom('GetLegendaryColor')]"
 hunt_mystical_animal.1001.desc: "A fera esquiva me aparece em sonhos, julgando-me com a profundidade sombria de seus olhos enquanto [ROOT.Char.Custom('GetAnimalChargePresent')] e exibe com orgulho sua pelagem imaculada [ROOT.Char.Custom('GetLegendaryColor')].\n\nEstamos nos(as) [legendary_county.GetCountyData.GetCapital.Custom('GetTerrainTypePlural')] sob uma lua inchada. Não importa o quanto eu tente, não consigo me aproximar da minha presa.\n\nEnquanto desperto com sobressalto, sinto minha determinação se fortalecer..."
 hunt_mystical_animal.1001.a: "Em breve não escapará de mim!"
 hunt_mystical_animal.1002.desc: "Cavalgando pelas [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] de [ROOT.Char.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], chegamos a uma curva na estrada e a vejo mais uma vez, reluzindo ao sol: [ROOT.Char.Custom('GetAnimalType')] [ROOT.Char.Custom('GetLegendaryColor')].\n\nMe viro para avisar os outros, mas quando olho de volta, [ROOT.Char.Custom('GetAnimalType')] já desapareceu..."
 hunt_mystical_animal.1002.a: "Ela me provoca!"
 hunt_mystical_animal.1003.desc: "Desde que comecei minha busca, chegam relatos de avistamentos de [ROOT.Char.Custom('GetAnimalType')] [ROOT.Char.Custom('GetLegendaryColor')] de todos os cantos de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip].\n\nSeparar os relatos e distinguir o que é verdade do que é ficção é uma tarefa enorme. Se ao menos os relatos fossem mais confiáveis..."
 hunt_mystical_animal.1003.a: "Contratarei pessoas para procurar minha presa!"
 hunt_mystical_animal.1003.b: "Essa tarefa é grande demais. Não farei isso."
 hunt_mystical_animal.1003.b.tt: "Abandone sua perseguição a #V [THIS.Char.Custom('GetAnimalType')] [THIS.Char.Custom('GetLegendaryColor')]#!."
 hunt_mystical_animal.1003.c: "Meu [steward.GetCouncilTitle|l] cuidará disso."
 hunt_mystical_animal.1003.d: "Eu posso fazer isso. Eu #EMP devo#!!"
 hunt_mystical_animal.1003.e: "[m_hunt.GetTitledFirstNameNoTooltip], organize uma equipe de busca!"
 hunt_mystical_animal.1004.desc: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U]!\", [m_hunt.Custom('ES_ElLa')] [m_hunt.GetTitledFirstName|l] mal consegue se conter. \"Temos relatos de pessoas que viram [ROOT.Char.Custom('GetAnimalType')] [ROOT.Char.Custom('GetLegendaryColor')] em [legendary_county.GetCountyData.GetCapital.Custom('GetTerrainTypePlural')] de [legendary_county.GetCountyData.GetCapital.GetNameNoTooltip]!\"\n\n\"Alguns afirmam que, por onde passa, deixa doença; outros, prosperidade, mas todos parecem bastante certos de que está na região.\"\n\nEstá aqui? Em [ROOT.Char.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]?!"
 hunt_mystical_animal.1004.a: "Vamos cavalgar!"
 hunt_mystical_animal.1004.a.tt: "Desta vez não escapará de mim."
 hunt_mystical_animal.1004.a.success: "Você encontra #V [THIS.Char.Custom('GetAnimalType')] [THIS.Char.Custom('GetLegendaryColor')]#!"
 hunt_mystical_animal.1004.b: "Não permitirei que me manipule assim."
 hunt_mystical_animal.1005.desc: "\n\nNum piscar de olhos, [activity.Custom('GetAnimalType')] [activity.Custom('GetAnimalChargePresent')] para longe, desaparecendo na [ROOT.Char.GetCurrentLocation.Custom('GetProvinceFoliageDesc')], tão rápido quanto apareceu."
 hunt_mystical_animal.1005.a: "Maldição! Eu #EMP vou#! pegar você!"
 hunt_mystical_animal.1006.desc: "Espio para fora nesta manhã nebulosa e vejo [ROOT.Char.Custom('GetAnimalType')] [ROOT.Char.Custom('GetLegendaryColor')] nos limites dos meus [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')], #EMP zombando#! de mim.\n\nAo me virar, me deparo com o tecido dos meus lençóis e, ao tentar me desvencilhar deles, cambaleio na direção de uma cabeça de [ROOT.Char.Custom('GetAnimalType')] pendurada em uma viga.\n\nFecho os olhos, mas não há escapatória. [ROOT.Char.Custom('GetAnimalType')] [ROOT.Char.Custom('GetLegendaryColor')] está lá, rindo de mim!"
 hunt_mystical_animal.1006.a: "EU VOU PEGAR VOCÊ!"
 hunt_mystical_animal.1006.b: "Você! Agora você é [ROOT.Char.Custom('GetAnimalType')] [ROOT.Char.Custom('GetLegendaryColor')]! Volte aqui!"
 hunt_mystical_animal.1007.desc: "Tenho vasculhado a terra em busca de [activity.Custom('GetAnimalType')] [activity.Custom('GetLegendaryColor')], devastando a natureza de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]; desta vez não vai escapar!\n\nEnquanto sigo seu rastro por [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTree')], cada vez mais fundo na vegetação, as coisas começam a mudar de forma.\n\nVejo cogumelos do tamanho de [ROOT.Char.Custom('ResidenceBuildingPlural')], árvores menores que ratos e lagartas grandes como cavalos."
 hunt_mystical_animal.1007.a: "Não importa em que buraco você se esconda, eu vou encontrar você!"
 hunt_mystical_animal.1007.b: "Ah, esses cogumelos... Parecem apetitosos."
 hunt_mystical_animal.1007.b.success: "Delicioso!"
 hunt_mystical_animal.1007.b.failure: "Ah, estou me sentindo um pouco enjoado..."
 hunt_mystical_animal.1008.desc: "À medida que os dias passam, não ouço nada sobre [ROOT.Char.Custom('GetAnimalType')] [ROOT.Char.Custom('GetLegendaryColor')], e fico inquieto...\n\nCertamente alguém deve ter visto minha presa? E quanto a todos os camponeses que percorrem as [legendary_county.GetCountyData.GetCapital.Custom('GetTerrainTypePlural')]? Talvez eu deva pedir a ajuda deles..."
 hunt_mystical_animal.1008.a: "Envie uma missiva!"
 hunt_mystical_animal.1008.b: "Não vou me rebaixar a isso."
 hunt_mystical_animal.1008.c: "Enviarei [knight.GetFirstNameNoTooltip]."
 hunt_mystical_animal.1009.desc: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U], essa sua busca por uma mera fera... Tenho de admitir que isso me preocupa.\"\n\n[court_chaplain.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima de mim enquanto eu examino os relatos de avistamentos de [ROOT.Char.Custom('GetAnimalType')] [ROOT.Char.Custom('GetLegendaryColor')].\n\n\"Evidentemente, tudo o que chame tanta atenção pode ter sido enviado por [ROOT.Char.GetFaith.DevilName]; não presuma que sua existência seja um sinal de [ROOT.Char.GetFaith.HighGodNameAlternate]!\""
 hunt_mystical_animal.1009.a: "[ROOT.Char.Custom('GetAnimalType')] é um mensageiro de [ROOT.Char.GetFaith.HighGodName]!"
 hunt_mystical_animal.1009.a.success: "\"Você pode estar certo...\""
 hunt_mystical_animal.1009.a.failure: "\"Sobre o que você está falando?!\""
 hunt_mystical_animal.1009.b: "Isso não é da sua conta."
 hunt_mystical_animal.1009.c: "Você está certo, no que eu estava pensando?"
 hunt_mystical_animal.9001.desc: "Sigo as pegadas cada vez mais fundo nas [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] de [ROOT.Char.GetCurrentLocation.GetBaronyNameExplicitlyNoTooltip] quando o ar subitamente se aquieta ao meu redor.\n\nComo se surgisse do próprio ar, [activity.Custom('GetAnimalType')] [activity.Custom('GetLegendaryColor')] fica diante de mim, a pelagem reluzindo na luz do sol, olhos profundos como sonhos. Ergo meu arco..."
 hunt_mystical_animal.9001.a: "... e deixo a flecha voar."
 hunt_mystical_animal.9002.desc: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U]!\", [m_hunt.Custom('ES_ElLa')] [m_hunt.GetTitledFirstName|l] se aproxima vacilante. \"[Select_CString( dummy_gender.IsFemale, 'Uma camponesa', 'Um camponês' )] da região lhe enviou um presente. [dummy_gender.GetSheHe|U] afirma que essa coloração [activity.Custom('GetLegendaryColor')] é natural, mas eu jamais vi algo assim!\"\n\nCom uma crescente apreensão, aproximo-me do embrulho, e ali está: [activity.Custom('GetAnimalType')] [activity.Custom('GetLegendaryColor')] que venho caçando há anos."
 hunt_mystical_animal.9002.a: "Isso deve ser uma piada...!"
