l_spanish:
 SITUATION_LIST_STORY_CYCLE_MODIFIERS_HEADER: "Modificadores"
 SITUATION_LIST_STORY_CYCLE_DECISIONS_HEADER: "Decisões"
 not_yet_chosen: "ainda por escolher"
 story_cycle_pet_dog: "Cachorro de estimação"
 story_cycle_pet_dog_desc: "#F Un compañero canino fiel camina a tu lado, te ofrece protección y un vínculo de lealtad que pocos humanos pueden igualar.#!"
 DOG_INFORMATION_STRING: "Se chama #V [Story.Custom('DogStoryNameAll')].#!\nTem um pelo [Story.Custom('DogFurColorAll')], os olhos [Story.Custom('DogEyeColorAll')] e [Story.Custom('DogStoryPuppyOrAgeAll')].\nNão há [Story.Custom('DogStoryGirlBoyAll')] melhor."
 dog_age_puppy: "é um filhote"
 dog_age_proper: "tem [Story.MakeScope.Var('dog_age_variable').GetValue|0] anos"
 cat_age_kitten: "é um gatinho"
 cat_age_proper: "tem [Story.MakeScope.Var('cat_age_variable').GetValue|0] anos"
 story_cycle_pet_cat: "Gato de estimação"
 story_cycle_pet_cat_desc: "#F Un orgulloso felino te hace compañía; es un cazador diestro que te ofrece afecto solo bajo sus propias condiciones.#!"
 CAT_INFORMATION_STRING: "Seu nome é #V [Story.Custom('CatStoryNameAll')].#!\nTem uma pelagem [Story.Custom('CatFurColorAll')], os olhos [Story.Custom('CatEyeColorAll')] e [Story.Custom('CatStoryKittenOrAgeAll')].[Story.Custom('CatStupidOrNotStupidAll')]"
 dumb_but_sweet_orange_boy: "\nÉ um/uma [Story.Custom('CatStoryGirlBoyAll')] idiota de pelagem [Story.Custom('CatFurColorAll')], mas muito doce."
 story_cycle_pet_eagle: "Águia caçadora"
 story_cycle_pet_eagle_desc: "#F En tu guantelete hay posada un águila cazadora, siempre vigilante, siempre hambrienta, que trae la muerte desde el cielo.#!"
 EAGLE_INFORMATION_STRING: "Seu águia se chama #V [Story.Custom('EagleStoryNameAll')].#!\nTem [Story.MakeScope.Var('eagle_age_variable').GetValue|0] anos."
 bp2_hostage_loyalty: "Um refém leal"
 bp2_hostage_loyalty_desc: "Um dos seus [hostages|El] está começando a se afeiçoar a você e aos seus costumes."
 hostage: "[hostage|E]"
 HOSTAGE_STORY_PRACTICAL_INFORMATION_STRING: "Tu [Concept('hostage',Select_CString(Story.MakeScope.Var('hostage_target').Char.IsFemale,'cautiva', 'cautivo'))|E], [Story.MakeScope.Var('hostage_target').Char.GetUIName], crece en tu [court|El], lo que afecta a su lealtad. Mantén su [opinion|El] alta y toma las elecciones correctas en los eventos para tener mayor probabilidad de que te sea leal cuando se haga adult[Story.MakeScope.Var('hostage_target').Char.Custom('ES_OA')].\n\nLealtad actual: [Story.MakeScope.Var('theon_points').GetValue|0+]"
 LOYALTY_LABEL: "Pontos de lealdade"
 claimant: "[claimant|E]"
 diverted_crusaders: "Cruzados desviados"
 frankokratia_story: "Francocracia"
 frankokratia_story_desc: "Um pretendente ao [GetTitleByKey('e_byzantium').GetName] atraiu oportunistas ocidentais de sua cruzada, voltando espadas gananciosas contra o próprio coração da cristandade…"
 FRANKOKRATIA_STORY_PRACTICAL_INFORMATION_STRING: "Uma [war|El] contra o [GetTitleByKey('e_byzantium').GetHolder.GetShortUIName] decidirá o futuro de [GetTitleByKey('e_byzantium').GetName]. Ou bem [Story.MakeScope.Var('byz_claimant').Char.Custom('ES_ElLa')] [claimant|El] [Story.MakeScope.Var('byz_claimant').Char.GetUIName] se apodera do trono e paga aos cruzados por seus esforços — ou será fundado um novo [GetTitleByKey('e_latin_empire').GetBaseName] sob o domínio [GetFaithByKey('catholic').GetAdjective]."
 story_conqueror: "Conquistador"
 story_conqueror_desc: "Sua ambição não conhece limites! O mundo está diante de você, pronto para ser tomado."
 CONQUEROR_STORY_PRACTICAL_INFORMATION_STRING: "Los conquistadores reciben muchas bonificaciones potentes, como la reducción de [factions|El], acceso a [vassalize_casus_belli|El] y, de vez en cuando, eventos poderosos.\n\nDejarás de ser conquistador si:\n$BULLET_WITH_TAB$No eres [independent|El]\n$BULLET_WITH_TAB$Quedas degradado a [count|El]\n$BULLET_WITH_TAB$Te quedas [Concept('unlanded', 'sin tierras')|E]\n$BULLET_WITH_TAB$Llevas #V 10#! años sin librar [war|El]s\n$BULLET_WITH_TAB$Estás muy [Concept('debt', 'endeudado')|E]\n$BULLET_WITH_TAB$Pierdes #V 3#! [wars|El] o más\n$BULLET_WITH_TAB$Quedas [GetTrait('incapable').GetName( GetNullCharacter )|l]"
 story_destiny_child: "Criança predestinada"
 story_destiny_child_desc: "Nasceu uma criança de grande promessa, como se tivesse sido escolhida pelos próprios destinos."
 DESTINY_CHILD_STORY_PRACTICAL_INFORMATION_STRING: "Muito de vez em quando, nasce uma criança destinada à grandeza. Ela se desenvolve mais rápido do que o normal e alcança alturas que outros não conseguem.\n\nCuide bem de [Story.MakeScope.Var('destiny_child').Char.GetUIName] e considere seriamente trabalhar para que [Story.MakeScope.Var('destiny_child').Char.GetSheHe] se torne seu [player_heir|El]; por exemplo, fazendo com que seja seu [designated_heir|El]."
 CHILD_OF_DESTINY: "A criança predestinada"
 story_cycle_martial_lifestyle_warhorse: "Cavalo de guerra"
 story_cycle_martial_lifestyle_warhorse_desc: "Você tem à sua disposição um cavalo de guerra especialmente bem treinado. Que seus inimigos tremam diante da sua carga."
 WARHORSE_STORY_PRACTICAL_INFORMATION_STRING: "Seu cavalo de guerra se chama #V [Story.Custom('WarhorseStoryNameAll')]#!. É [Story.Custom('HorseStoryMareStallionAll')]."
 DOPPELGANGER: "Seu [Glossary( 'doppelgänger', 'DOPPELGANGER_GLOSS' )]"
 story_doppelganger: "O espelho no barro"
 DOPPELGANGER_GLOSS: "Um sósia ou duplo de uma pessoa viva, muitas vezes encontrado por acaso. No folclore alemão, é uma aparição inquietante e um mau presságio — ver o próprio duplo pode anunciar doença ou morte."
 story_doppelganger_desc: "Se ha encontrado a un[Story.MakeScope.Var('doppelganger_character').Char.Custom('ES_XA')] campesin[Story.MakeScope.Var('doppelganger_character').Char.Custom('ES_OA')] que es exactamente igual a ti, un[Story.MakeScope.Var('doppelganger_character').Char.Custom('ES_XA')] verdader[Story.MakeScope.Var('doppelganger_character').Char.Custom('ES_OA')] [Glossary( 'doppelgänger', 'DOPPELGANGER_GLOSS' )]…"
 DOPPELGANGER_STORY_PRACTICAL_INFORMATION_STRING: "Um[Story.MakeScope.Var('doppelganger_character').Char.Custom('ES_XA')] camponês[Story.MakeScope.Var('doppelganger_character').Char.Custom('ES_OA')] que se parece com você e fala como você pode ser uma oportunidade… ou uma maldição. Por enquanto, [Story.MakeScope.Var('doppelganger_character').Char.GetUIName] reside em sua [court|El]."
 story_cycle_hunt_mystical_animal: "A caça de um animal místico"
 story_cycle_hunt_mystical_animal_desc: "Durante uma caçada, você vislumbrou uma besta branca mística. Capturá-la seria como encontrar o santo graal!"
 WHITE_ANIMAL_INFORMATION_STRING: "Sigues el rastro de un ejemplar de #V [Story.MakeScope.Var('animal_type').GetFlagName|l] de blanco pelaje#!.\n\nCazarlo te traerá grandes recompensas, pero ganarás [stress|El] cada vez que el animal se te escape. De cuando en cuando, un [GetModifier('hunt_sighting_legendary_modifier').GetNameWithTooltip] te permitirá continuar con la cacería.\n\nEncuentros con el ejemplar de [Story.MakeScope.Var('animal_type').GetFlagName] de pelaje blanco: [Story.MakeScope.Var('encounters').GetValue|0V] #weak (desde la primera vez)#!"
 LEGENDARY_COUNTY_LABEL: "Lar atual do exemplar de [Story.MakeScope.Var('animal_type').GetFlagName] de pelagem branca"
 story_sycophant: "O adulador"
 story_sycophant_desc: "Um dos seus cortesãos é um bajulador óbvio que irrita seus vassalos com sua mera presença."
 SYCOPHANT_INFORMATION_STRING: "Meu [Story.GetOwner.Custom2( 'RelationToMeShort', Story.MakeScope.Var('sycophant_character').Char )] [Story.MakeScope.Var('sycophant_character').Char.GetShortUIName] e meu [Story.GetOwner.Custom2( 'RelationToMeShort', Story.MakeScope.Var('jealous_character').Char )] [Story.MakeScope.Var('jealous_character').Char.GetShortUIName] estão à beira de uma briga. Posso escolher um favorito, mas fazer isso certamente enfurecerá o outro. O tempo dirá como essa situação vai se desenrolar…"
 SYCOPHANT_LABEL: "O adulador"
 JEALOUS_VASSAL_LABEL: "Meu vassalo mais ciumento"
 story_cycle_pet_rock: "Pedra de estimação"
 story_cycle_pet_rock_desc: "Ao seu lado há uma pedra de estimação; seu rosto imutável combina perfeitamente com seu peculiar senso de companhia."
 PET_ROCK_INFORMATION_STRING: "Sua rocha se chama #V [Story.GetOwner.Custom('RockStoryName')].#!\nSeu exterior áspero é de cor [Story.GetOwner.Custom('RockColor')]."
 story_cycle_admin_eunuch: "Eunuco eminente"
 story_cycle_admin_eunuch_desc: "Um eunuco de habilidade particular encontrou seu caminho até sua corte. Uma oportunidade, ou uma ameaça...?"
 EUNUCH_INFORMATION_STRING: "Con el tiempo, surgirá la posibilidad de conceder a [Story.MakeScope.Var('eunuch').Char.GetShortUIName] mayor poder e influencia. Hacerlo aumentará la fuerza del [modifier|El] [GetModifier('admin_eunuch_liege_4_modifier').GetNameWithTooltip].\n\nPero cuidado: desdeñar a su persona o darle #EMP demasiado#! poder sin garantizar su lealtad puede tener consecuencias funestas…\n\nHasta ahora has rechazado sus peticiones [Story.MakeScope.Var('eunuch_refusals').GetValue|0V] veces."
 EUNUCH_LABEL: "O eunuco"
 UPSET_COURTIERS: "Súditos irritados com o eunuco"
 POETRY_BOOK_LABEL: "Meu livro de poesia"
 commission_epic_story: "Encomendar epopeia"
 commission_epic_story_desc: "Você encomenda uma grande epopeia para relatar os feitos de sua família."
 EPIC_INFORMATION_STRING: "Seu [Story.GetOwner.Custom('CommissionEpicScribe')][AddTextIf(Story.MakeScope.Var('composer').IsSet, Concatenate(Concatenate(', ', Story.MakeScope.Var('composer').Char.GetShortUIName), ','))] cria uma [Story.Custom('CompositionTypeAll')|l] épica para aumentar o [dynasty_prestige|El] da [dynasty|El] [Story.GetOwner.GetDynasty.GetName] e conseguir um [artifact|El].\n\nA chance de uma [Story.Custom('CompositionTypeAll')|l] excepcional é de [Story.MakeScope.Var('final_outcome_chance').GetValue|0+/%]"
 COMPOSER: "O compositor da sua epopeia"
 story_foreign_raised_reformer: "Reformador formado no exterior"
 story_foreign_raised_reformer_desc: "Você foi criado longe da terra que agora chama de lar.\nTão diferente… e, no entanto, e se o seu lar fosse mais como aquela?"
 REFORMER_INFORMATION_STRING: "[Story.MakeScope.Var('foreign_educator').Char.GetShortUIName], alguien de la comunidad [Story.MakeScope.Var('advanced_culture').Culture.GetName] y fe [Story.MakeScope.Var('advanced_culture_faith').Faith.GetAdjective] te crio en [Story.MakeScope.Var('advanced_realm').Title.GetBaseName]. Te impresionó la [culture|El] [Story.MakeScope.Var('advanced_culture').Culture.GetName] y desearías que tu pueblo fuera más como ellos.\n\nEmpezarás a tener oportunidades para ganar puntos de reforma o de reafirmación:\n$BULLET_WITH_TAB$#indent_newline:7 Si buscas la reforma conseguirás [innovations|El], [cultural_acceptance|El], [traditions|El] o puede que hasta una [GetBuilding('generic_university').GetName|l]. Pero ten en cuenta que la reforma es un proceso largo y costoso.#!\n$BULLET_WITH_TAB$#indent_newline:7 Si buscas la reafirmación, ganarás [opinion|El] de los [vassals|El], [dynasty_prestige|El], bonificaciones para la [war|El] en forma de [casus_bellis|El] y [special_troops|El].#!"
 REFORM_LABEL: "Progresso rumo à reforma da sua [culture|El]"
 REAFFIRMATION_LABEL: "Progresso rumo à reafirmação da sua [culture|El]"
 REFORM_MIN_VALUE_LABEL: ""
 REFORM_MAX_VALUE_LABEL: "Máx.: #V 3#!"
 REAFFIRMATION_MIN_VALUE_LABEL: ""
 REAFFIRMATION_MAX_VALUE_LABEL: "Máx.: #V 2#!"
 ECCENTRIC_MIN_VALUE_LABEL: ""
 ECCENTRIC_MAX_VALUE_LABEL: "Máx.: #V 5#!"
 IMAGINARY_FRIEND_INFORMATION_STRING: "Seu amigo imaginário se chama [Story.MakeScope.Var('imaginary_friend_name').Char.GetShortUINameNoTooltip]. Você ocasionalmente terá oportunidades de interagir com [Story.MakeScope.Var('imaginary_friend_name').Char.GetSheHe]."
 ECCENTRIC_VALUE: "Progresso rumo a obter o traço [GetTrait('eccentric').GetName( GetNullCharacter )|l]"
 story_cycle_imaginary_friend: "Amigo imaginário"
 story_cycle_imaginary_friend_desc: "Por fim, um amigo para brincar! Quem se importa se ele não é real? Para mim, ele é real!"
 story_greatest_of_khans: "O maior dos cãs"
 story_greatest_of_khans_desc: "Nos céus há muitas grandes luzes. Nos céus estão o sol, a lua e as estrelas. Mas na terra só pode haver um Khan."
 GREATEST_OF_KHANS_INFORMATION_STRING: "$become_greatest_of_khans_decision_enable_gok_invasion_cb$\n$gok_enable_offer_submission_or_ruin_tt$\n\n@alert_icon! #alert_trial Se sua [dynasty|El] perde o controle de [Story.GetOwner.GetPrimaryTitle.GetName|l], deixa de ser [GetGovernment( 'nomad_government' ).GetName|l] ou não tiver conseguido tomar a [decision|El] #high $mpo_gok_world_conquest_decision$#! até o ano de #high [Story.MakeScope.Var('gok_final_date').GetValue|0]#!, estas bonificações serão perdidas e [Story.GetOwner.GetPrimaryTitle.GetName|l] poderá se tornar vulnerável e desmoronar!#!"
