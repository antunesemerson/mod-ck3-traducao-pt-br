l_spanish:
 murders_at_court.1001.t: "Assassinatos na Corte: Reze pelos Mortos Sem Nome"
 murders_at_court.1001.desc_physician: "«Esta mañana se encontraron trozos de otro cuerpo, [ROOT.Char.Custom('FormOfAddressForLiege')]», dice [physician.Custom2('MyCharacterIntroduction', ROOT.Char)], señalando la mesa que tenemos delante. Hay charcos de sangre sobre ella en torno a pequeños montones de carne; hilos de tejidos descansan en un cieno oscuro.\n\n«Como veis, no es una persona… entera. No hay ni lo bastante para identificarla»."
 murders_at_court.1001.desc: "«Esta mañana se encontraron trozos de otro cuerpo, [ROOT.Char.Custom('FormOfAddressForLiege')]», dice un guardia señalando la mesa que tenemos delante. Hay charcos de sangre sobre ella en torno a pequeños montones de carne; hilos de tejidos descansan en un cieno oscuro.\n\n«Como veis, no es una persona… entera. No hay ni lo bastante para identificarla»."
 murders_at_court.1001.a: "Vou rezar pela vítima."
 murders_at_court.1001.b: "Certifique-se de que todos estejam presentes, o tempo #EMP todo#!."
 murders_at_court.1001.b.tt: "Vou limitar os movimentos de todos na corte — esperançosamente, pressionando o assassino a se revelar."
 murder_at_court_movement_restricted_courtiers_craven: "Cada cortesão covarde"
 murder_at_court_movement_restricted_courtiers_other: "Cada outro cortesão"
 murder_at_court_movement_restricted_courtiers: "Cada cortesão"
 murders_at_court.1001.c: "Dobre a guarda!"
 murders_at_court.1001.c.tt: "Guardas extras certamente dissuadirão o assassino – ou pelo menos o impedirão."
 murders_at_court.1001.d: "Alguém viu algo? Por favor, eu preciso de sua ajuda!"
 murders_at_court.1001.d.tt: "Divulgarei por todo o reino que estou procurando por informações e pistas."
 murders_at_court.1001.e: "Vou investigar isso. Pessoalmente."
 murders_at_court.1001.e.tt: "Aplicarei meu conhecimento neste caso."
 murders_at_court.1002.t: "Assassinatos na Corte: Assassinato pela Manhã"
 murders_at_court.1002.desc_named: "Cuando sale el sol, me informan de que han asesinado a [victim.Custom2('MyCharacterIntroduction', ROOT.Char)] durante la noche. [victim.GetHerHim|U] destriparon brutalmente y [victim.Custom('ES_LoLa')] dejaron tirad[victim.Custom('ES_OA')] para que lo encontrase cualquiera…\n\nSe retira el cuerpo enseguida y, para cuando el sol se pone, no quedan rastros de este acto espeluznante."
 murders_at_court.1002.desc: "Otro día, otro cuerpo. Me apena darme cuenta de que, tras los recientes asesinatos, se ha instaurado una sensación de rutina sobre [ROOT.Char.Custom('ResidenceBuilding')].\n\nEl cuerpo destripado de un[ROOT.Char.Custom('ES_XA')] joven es retirado enseguida y, para cuando el sol se pone, no quedan rastros de este acto espeluznante."
 murders_at_court.1003.t: "Assassinatos na Corte: Até Que a Morte Nos Separe"
 murders_at_court.1003.desc_opening: "Encontro [spouse.GetTitledFirstName|l] em nossos aposentos. Seu corpo jaz em uma poça de seu próprio sangue."
 murders_at_court.1003.desc_like: "Gemendo, caio no chão, apertando seu corpo contra meu peito."
 murders_at_court.1003.desc: "Caio no chão, abraçando-o contra o meu peito."
 murders_at_court.1003.desc_end: "– está tão frio... Oh, [ROOT.Char.GetFaith.HighGodName], por que está tão frio?!"
 murders_at_court.1004.t: "Assassinatos na Corte: Meu Filho"
 murders_at_court.1004.desc: "Encontro meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('child'))] [child.GetTitledFirstName|l] frí[child.Custom('ES_OA')] e mort[child.Custom('ES_OA')] em sua própria cama. A roupa de cama está encharcada de sangue, e o lento #EMP goteo#! contra o chão soa na câmara."
 murders_at_court.2001.t: "Assassinatos na Corte: Escalada"
 murders_at_court.2001.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('victim'))] [victim.GetTitledFirstName|l] jaz estendido no chão frio, o sangue escorre pelas muitas facadas que cobrem seu corpo.\n\nPor que este assassino está me provocando assim?"
 murders_at_court.2002.t: "Assassinatos na Corte: Um Passo à Frente"
 murders_at_court.2002.desc: "A cabeça decepada de meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('heir'))] [heir.GetTitledFirstName|l] repousa sobre minha mesa quando volto aos meus aposentos, com a boca aberta em um grito silencioso. Meu [ROOT.Char.Custom2('DescriptorPositive', SCOPE.sC('heir'))] herdeiro… Oh, [ROOT.Char.GetFaith.HighGodName], por quê? É preciso deter esse assassino que nos atormenta!"
 murders_at_court.2002.a: "Eu devo rezar por nosso [ROOT.Char.Custom('RealmType')]!"
 murders_at_court.2003.t: "Assassinatos na Corte: Um Assassino Revelado"
 murders_at_court.2003.desc: "Un agudo dolor en la espalda. Aspiro y la agonía en aumento me hace gritar. Cuando intento girarme, me desplomo siguiendo el #EMP goteo#! de mi sangre al suelo.\n\nLa vista se me oscurece, pero veo a mi [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('murderer'))] [murderer.GetTitledFirstName|l] de pie a mi lado con una amplia sonrisa. Me estiro hacia [murderer.GetHerHim] y me recompensa con una patada que hace que la estancia dé vueltas; vueltas y más vueltas, luz y oscuridad, oscuridad y más oscuridad…"
 murders_at_court.2003.a: "[murderer.GetFirstNameNoTooltip]... Por quê...?"
 murders_at_court.2101.t: "Assassinatos na Corte: Herdeiro Assassinado"
 murders_at_court.2101.desc_opening: "Vejo o corpo inerte de meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('other_heir'))] [other_heir.GetTitledFirstName|l] e sinto tontura. Deve ser meu sangue que está manchando o chão sob [other_heir.GetHerHim], porque nada está chegando ao meu cérebro.\n\n"
 murders_at_court.2101.desc_family: "Me encolho ao lado dele, segurando uma bochecha fria em minha mão. Seus olhos estão arregalados, mas mais de surpresa do que de horror. "Foi alguém que você conhecia?""
 murders_at_court.2101.desc: "[other_heir.GetSheHe|U] parece mais surpres[other_heir.Custom('ES_OA')] que assustad[other_heir.Custom('ES_OA')]... Talvez conhecesse seu assassino?"
 murders_at_court.2201.t: "Assassinatos na Corte: O Invisível"
 murders_at_court.2201.desc: "\"Mas... os olhos se foram! Arrancados como pedras em um campo!\" O [ROOT.GetCharacter.Custom('lowly_servant_type')] que encontrou a mais recente vítima do assassino é retirado – o rosto pálido, mãos tremendo e ainda gritando.\n\nAo olhar para os buracos vermelhos e cegos que deveriam conter olhos, arrepio-me com desconforto. Para que o assassino precisa de olhos? Algum tipo de ritual?"
 murders_at_court.5001.t: "Assassinatos na Corte: O Assistente"
 murders_at_court.5001.desc: "Un curioso hombre ha acudido a mí tras oír hablar de los asesinatos que asolan mi corte.\n\n«Soy [watson.Custom('ES_ElLa')] [watson.GetTitledFirstName|l], [ROOT.Char.Custom('FormOfAddressForLiege')]. Creo que podría ayudaros»."
 murders_at_court.5001.a: "Posso usar toda ajuda possível!"
 #murders_at_court.5001.b: ""
 murders_at_court.5001.c: "Isso não tem nada a ver com você!"
 murders_at_court.8001.t: "Assassinatos na Corte: Memento Mori"
 murders_at_court.8001.desc: "Enquanto damos descanso a [story_owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)], juro que encontrarei quem fez isso. Parece que o assassino interrompeu sua onda de crimes, e tenho que me perguntar se [story_owner.GetTitleAsNameNoTooltip] foi o alvo o tempo todo…"
 murders_at_court.8001.a: "Que você descanse em paz, [story_owner.GetFirstNameNoTooltip]."
 murders_at_court.8002.desc: "Mientras damos reposo a [story_owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] apenas puedo contener la risa. ¡Qué cara puso al final! Unos dicen que era [ROOT.Char.Custom2('DescriptorPositive', SCOPE.sC('story_owner'))], ¡ja!\n\nAl menos las cosas se calmarán un poco ahora que el temido asesino está ocupado con otras cosas."
 murders_at_court.8002.a: "Como governar o [ROOT.Char.Custom('RealmType')]!"
 murders_at_court.8003.t: "Assassinatos na Corte: Herança"
 murders_at_court.8003.desc: "[predecessor.GetTitledFirstName] frequentemente falava sobre os assassinos que assediavam sua corte, assassinatos cruéis e horripilantes.\n\nContinuam em seu lugar todas as medidas que tomou para conter os assassinos, e só posso esperar que sejam suficientes…"
 murders_at_court.8003.a: "Que a maldição que assolou a corte tenha morrido com [predecessor.GetSheHe]."
 murders_at_court.9001.t: "Assassinatos na Corte: Uma Confrontação"
 murders_at_court.9001.desc_opening_watson: "Uma carta está esperando por mim e [watson.GetTitledFirstName|l] quando nos recolhemos aos meus aposentos, escrita com tinta vermelha — não, com #EMP sangue#!.\n\n"
 murders_at_court.9001.desc_opening: "Uma carta está esperando por mim quando volto aos meus aposentos, escrita com tinta vermelha — não, com #EMP sangue#!.\n\n"
 murders_at_court.9001.desc_heir: "#EMP Pelo bem do [ROOT.Char.Custom('RealmType')], você interromperá esta busca. Eu vivi minha vida inteira bem debaixo do seu nariz, e ainda assim você é tão cego. Revelar minha identidade só lhe traria dor.#!"
 murders_at_court.9001.desc_rival: "#EMP Tornei minha missão de vida #EMP acabar#! com você — acabar com sua família e seu reinado. Nada que você faça pode me fazer parar, mas se você não interromper essa intromissão, me forçará a cometer atos ainda mais sombrios.#!"
 murders_at_court.9001.desc_witch: "#EMP Voc? acha que sua intromiss?o pode realizar algo? As for?as sombrias j? est?o em movimento, e ao se colocar no meu caminho, voc? s? coloca a si mesmo e aqueles que voc? ama em perigo.#!"
 murders_at_court.9001.desc_cannibal: "#EMP Você não entende. Eu preciso disso para viver, para sobreviver, para encontrar #EMP alimento#!. Encerre esta busca imediatamente ou minha fome devorará tudo!#!"
 murders_at_court.9001.desc_vassal: "#EMP Pelo bem do [ROOT.Char.Custom('RealmType')], você interromperá esta busca. Sou necessário– #EMP valorizado#!, e você só se arrependerá se descobrir minha identidade.#!"
 murders_at_court.9001.desc_fallback: "#EMP Você interromperá esta busca imediatamente. Nada de bom pode surgir ao revelar minha identidade, e farei questão de que nada de bom venha a você se continuar tentando.#!"
 murders_at_court.9001.desc_ending: "\n\nEsta caligrafia... Ela se parece muito com a de [murderer.Custom2('MyCharacterIntroduction', ROOT.Char)]!"
 murders_at_court.9001.a: "Será que pode ser...?"
 murders_at_court.9001.a.tt: "Vou confrontar [murderer.GetTitledFirstNameNoTooltip|l] sobre isso"
 murders_at_court.9001.b: "Acho que esses assassinatos permanecerão sem solução."
 murders_at_court.9001.b.tt: "Qual é o pior que pode acontecer?"
 murders_at_court.9001.c: "[watson.GetFirstNameNoTooltip], o que você acha?"
 murders_at_court.9001.c.tt: "Não acho que seja tão simples assim..."
 murders_at_court.9002.t: "Assassinatos na Corte: Consequências"
 murders_at_court.9002.desc: "Encuentro a [the_one_to_kill.Custom2('MyCharacterIntroduction', ROOT.Char)] ahorcad[the_one_to_kill.Custom('ES_OA')] en el exterior de mi [ROOT.Char.Custom('ResidenceBuilding')]. Su cuerpo está frío, pálido, inmóvil… Pero ¿qué es esto? ¡Han metido una nota en los pliegues de sus ropas!\n\n#EMP Esta es mi última víctima, mi último regalo para vos, [ROOT.Char.GetTitledFirstNameNoTooltip|l]. Pero no temáis, siempre estaré cerca, observándoos.#!"
 murders_at_court.9002.a: "Pensar que um monstro desses anda livre...[murderer.Custom('ES_OA')] por seus crimes!"
 murders_at_court.9003.t: "Assassinatos na Corte: Legado Sombrio"
 murders_at_court.9003.a: "Você será punido por seus crimes!"
 murders_at_court.9003.b: "Olho por olho, vida por vida...!"
 murders_at_court.9003.c: "Está livre, [murderer.GetTitledFirstNameNoTooltip|l]."
 murders_at_court.9003.d: "Deve ser entediante cometer esses atos sozinho..."
 murders_at_court.9003.e: "Oh... Eu– Eu sinto muito."
 murders_at_court.9004.t: "Assassinatos na Corte: Pego em Flagrante"
 murders_at_court.9004.desc_letter_event: "[watson.GetTitledFirstName] e eu passamos horas examinando a carta, mas o cheiro… Ah, cheira como meu [murderer.Custom2('MyCharacterIntroduction', ROOT.Char)] [murderer.GetTitledFirstName|l]!"
 murders_at_court.9004.desc: ""Meu [ROOT.Char.GetTitleAsNameNoTooltip], [victim.GetTitledFirstName|l] e [murderer.GetTitledFirstName|l] desapareceram".\n\nDispenso meus guardas e vejo nos olhos de [watson.GetTitledFirstName|l] a mesma preocupação que sinto nos meus; [murderer.GetTitledFirstNameNoTooltip|l] poderia ser…"
 murders_at_court.9004.desc_ending: "\n\nQuando finalmente encontramos [murderer.GetTitleAsNameNoTooltip] a [victim.GetTitledFirstName|l] avançando sobre \n\n\"Pare aí mesmo!\""
 murders_at_court.9021.t: "Assassinatos na Corte: Magia Sombria"
 murders_at_court.9021.desc: "Quando meus guardas e eu finalmente encontramos [murderer.Custom2('MyCharacterIntroduction', ROOT.Char)] vimos que está ajoelhado diante de um antigo tomo, com os joelhos nus, a testa pressionada contra o chão e os braços erguidos acima da cabeça em um ângulo quase antinatural.\n\n"
 murders_at_court.9031.t: "Assassinatos na Corte: A Fome"
 murders_at_court.9031.desc: "Quando meus guardas e eu finalmente encontramos [murderer.Custom2('MyCharacterIntroduction', ROOT.Char)] está roendo o que parece ser um #EMP dedo#! humano."
 murders_at_court.9041.t: "Assassinatos na Corte: Escapou"
 murders_at_court.9041.desc_opening: "A única coisa que me espera quando finalmente encontro [murderer.Custom2('MyCharacterIntroduction', ROOT.Char)] é"
 murders_at_court.9041.desc_witch: "pedaços de ossos, algo que parece suspeitosamente com olhos humanos, e"
 murders_at_court.9041.desc_cannibal: "pedaços de ossos que parecem ter sido roídos, e"
 murders_at_court.9041.desc: "uma carta zombando dos meus esforços. De [murderer.GetTitledFirstNameNoTooltip|l] não há nem rastro."
 murders_at_court.9041.a: "Todos saberão de suas más ações!"
 murders_at_court.9041.b: "É melhor manter isso em segredo..."
 murders_at_court.9099.t: "Assassinatos na Corte: Negócios Sangrentos"
 murders_at_court.9099.t_wrong: "Assassinatos na Corte: O Erro"
 murders_at_court.9099.desc_wrong: "Cuando por fin encuentro a [murderer.Custom2('MyCharacterIntroduction', ROOT.Char)], ni siquiera intenta huir. En realidad, en su mirada solo hay confusión.\n\n«¡Por fin os encuentro, criminal!».\n\n«Perdón, pero ¿qué estáis diciendo? ¡¿Insinuáis que fui #EMP yo#! quien asesinó a toda esa gente?!"
 murders_at_court.9099.desc_nothing: "Quando por fim encontro [murderer.Custom2('MyCharacterIntroduction', ROOT.Char)] , nem sequer tenta fugir de mim e dos guardas.\n\n"
 murders_at_court.9099.desc: ""Olá, [ROOT.Char.GetFirstNameNoTooltip]", diz, me olhando de cima a baixo. "Já estava na hora de vocês me encontrarem. Espero que tenham apreciado meus... #EMP obsequios#!?"\n\nO sorriso que se espalha pelo rosto dele me causa arrepios."
 murders_at_court.9989.desc: "Entretanto, não posso deixar de notar que os assassinatos pararam assim que [murderer.GetTitledFirstName|l] deixou a corte..."
 murders_at_court.9989.a: "Vou ficar de olho nele."
 murders_at_court.9999.t: "Assassinatos na Corte: Uma Maldição Levantada"
 murders_at_court.9999.desc_opening: "Com o tempo passando e nenhum corpo novo aparecendo, gradualmente relaxo novamente. O assassino parou!\n\n"
 murders_at_court.9999.desc: "Entretanto, não posso deixar de notar que os assassinatos pararam assim que [murderer.GetTitledFirstName|l] morreu..."
 murders_at_court.9999.a: "Agora que se foi, nunca terei certeza absoluta…"
