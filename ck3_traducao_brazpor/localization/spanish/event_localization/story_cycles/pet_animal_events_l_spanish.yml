l_spanish:
 ##############
 ## CAT
 ##############
 pet_animal.0001.t: "O Gato"
 pet_animal.0001.desc: "Enquanto o gato descansa no meu colo, ronronando contente, penso em como deveria chamar[ROOT.Char.Custom('CatStoryHerHim')]? Algo histórico? Algo que aluda ao seu pelo [ROOT.Char.Custom('CatFurColor')]? Algo que descreva a sensação reconfortante que sinto quando [ROOT.Char.Custom('CatStoryHerHim')] acaricio atrás da orelha?\n\nAh, já sei! [ROOT.Char.Custom('CatStoryHerHim')|U] chamarei…"
 pet_animal.0001.a: "Que ótimo nome!"
 pet_animal.0101.t: "[ROOT.Char.Custom('CatStoryName')]: O Doador de Presentes"
 pet_animal.0101.desc: "Dois olhos [ROOT.Char.Custom('CatEyeColor')] me seguem enquanto atravesso o corredor, e um miado baixo quebra o silêncio quando [ROOT.Char.Custom('CatStoryName')] pula na direção do meu tornozelo."
 pet_animal.0101.desc_old: "[ROOT.Char.Custom('CatStoryName')] teve dias melhores, mas a idade nunca [ROOT.Char.Custom('CatStoryHerHim')] o deteve!"
 pet_animal.0101.desc_young: "[ROOT.Char.Custom('CatStoryName')] pode ser jovem, mas, ainda assim, é feroz!"
 pet_animal.0101.desc_middle: "Um felino em seu auge, mas, ainda assim, não me deixa marcas."
 pet_animal.0101.desc_ending: "\n\nQuando [ROOT.Char.Custom('CatStoryName')] sai saltitando, vejo que deixou para mim um presente reluzente onde estava escondendo-se."
 pet_animal.0101.a_female: "Obrigado, bela dama!"
 pet_animal.0101.a_male: "Obrigado, nobre cavalheiro!"
 pet_animal.0103.t: "[ROOT.Char.Custom('CatStoryName')]: Vassalo Encantado"
 pet_animal.0103.desc: "Quando saio, sou recebido pela visão da minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('vassal'))], [vassal.Custom('ES_ElLa')] [vassal.GetTitledFirstName|l], que está ajoelhado ao lado de [ROOT.Char.Custom('CatStoryName')], acariciando-lhe ternamente a cabeça.\n\n\"Você tem um gato encantador, [ROOT.Char.Custom('FormOfAddressForLiege')]\"."
 pet_animal.0103.a: "Você é muito perspicaz!"
 pet_animal.0104.t: "[ROOT.Char.Custom('CatStoryName')]: Conforto Ronronante"
 pet_animal.0104.desc: "Depois de mais um dia estressante, me jogo em uma cadeira; por quanto tempo vou conseguir continuar assim?\n\nDe repente, ouço um miado suave e [ROOT.Char.Custom('CatStoryName')] pula no meu colo e começa a ronronar. Fico um tempo com [ROOT.Char.Custom('CatStorySheHe')], apenas ouvindo o som calmante e acariciando sua pelagem [ROOT.Char.Custom('CatFurColor')]."
 pet_animal.0104.a: "Acho que consigo fazer isso por mais um tempo."
 pet_animal.0105.t: "[ROOT.Char.Custom('CatStoryName')]: Segredo Revelado"
 pet_animal.0105.desc_opening: "#EMP Miau!#!\n\nOlho para baixo e vejo que meu [ROOT.Char.Custom('CatStoryName')] deixou um pergaminho aos meus pés… selado no estilo inconfundível da minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('person'))] [person.GetTitledFirstName|l]. Cedendo à curiosidade, dou uma olhada no texto…\n\n"
 pet_animal.0105.desc_murder: "\"... o assassinato que cometi pesa sobre mim, e...\""
 pet_animal.0105.desc_lover: "\"... o amor que sinto por outro...\""
 pet_animal.0105.desc_homosexual: "\"... os desejos que sinto por pessoas do mesmo gênero...\""
 pet_animal.0105.desc_deviant: "\"... a devassidão que cometi...\""
 pet_animal.0105.desc_cannibal: "\"... pois provei a carne de humanos...\""
 pet_animal.0105.desc_murder_attempt: "\"... quando tentei tirar a vida de outro...\""
 pet_animal.0105.desc_non_believer: "\"... pois não acredito em [person.GetFaith.HighGodName]...\""
 pet_animal.0105.desc_incest: "\"... que sinto esses desejos por alguém da minha própria família...\""
 pet_animal.0105.desc_witch: "\"... meu coven de bruxas vai...\""
 pet_animal.0105.desc_fallback: "\"... manter esse segredo pesa sobre mim...\""
 pet_animal.0105.a: "Pensar que estava escondendo algo assim…!"
 pet_animal.0105.b: "O mundo precisa saber disso."
 pet_animal.0106.t: "[ROOT.Char.Custom('CatStoryName')]: Sensibilidade"
 pet_animal.0106.desc: "\"[ROOT.Char.GetFirstNameNoTooltip], esse gato tem que ir embora!\"\n\nMeu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))] [spouse.GetTitledFirstName|l] segura a [ROOT.Char.Custom('CatStoryName')] pela pele do pescoço, com os olhos vermelhos e o nariz escorrendo. \"Não aguento mais isso, quase não consigo respirar quando está por perto!\""
 pet_animal.0106.a: "Vou dar [ROOT.Char.Custom('CatStoryHerHim')] a [receiver_1.GetFirstNameNoTooltip]…"
 pet_animal.0106.b: "[receiver_2.GetFirstNameNoTooltip] poderia usar uma companhia..."
 pet_animal.0106.c: "[receiver_3.GetFirstNameNoTooltip] cuidará ... [ROOT.Char.Custom('CatStorySheHe')]"
 pet_animal.0106.d: "Eu não vou dar [ROOT.Char.Custom('CatStoryName')]..."
 pet_animal.0106.e: "Acho que vou ter que me livrar de [ROOT.Char.Custom('CatStorySheHe')]…"
 pet_animal.0107.t: "[ROOT.Char.Custom('CatStoryName')]: O Gato"
 pet_animal.0107.desc: "\"Meu [giver.Custom2('RelationToMe', SCOPE.sC('spouse'))] já não suporta a companhia do meu pobre [ROOT.Char.Custom('CatStoryName')]… Então confio a vocês o cuidado de [ROOT.Char.Custom('CatStorySheHe')] em meu lugar\".\n\nMeu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('giver'))] [giver.GetTitledFirstName|l] me apresenta um gato [receiver.Custom('CatFurColor')]. \"[ROOT.Char.Custom('CatStoryName')] é um… uma companhia excelente\"."
 pet_animal.0107.a: "Obrigado, vou cuidar [ROOT.Char.Custom('CatStoryHerHim')] com carinho!"
 pet_animal.0107.b: "Obrigado. Tenho certeza de que [ROOT.Char.Custom('CatStorySheHe')] será valioso."
 pet_animal.0108.t: "[receiver.Custom('CatStoryName')]: Vida Sem Você"
 pet_animal.0108.t_dead: "Vida Sem Você"
 pet_animal.0108.desc_opening: "Vou visitar meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('receiver'))] [receiver.GetTitledFirstName|l] para ver como vai o(a) pequeno(a) [receiver.Custom('CatStoryName')].\n\n"
 pet_animal.0108.desc_alive_landed: "[receiver.GetSheHe|U] me recebe do lado de fora de seu [receiver.Custom('ResidenceBuilding')], um gato [receiver.Custom('CatFurColor')] em seus braços. \"[receiver.Custom('CatStorySheHe')|U] está bem…"
 pet_animal.0108.desc_alive: "[receiver.GetSheHe|U] me encontra do lado de fora, o gato de pelagem [receiver.Custom('CatFurColor')] em seus braços. \"[receiver.Custom('CatStorySheHe')|U] está indo bem –"
 pet_animal.0108.desc_alive_1: "gosta de caçar os pássaros locais!\""
 pet_animal.0108.desc_alive_2: "gosta de tentar limpar as galinhas!\""
 pet_animal.0108.desc_dead_opening: "Visito m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('receiver'))] [receiver.GetTitledFirstName|l] para ver como o gato está se saindo sob seu cuidado.\n\n"
 pet_animal.0108.desc_dead_landed: "[receiver.GetSheHe|U] me recebe do lado de fora de sua [receiver.Custom('ResidenceBuilding')], sem nenhum gato à vista."
 pet_animal.0108.desc_dead: "[receiver.GetSheHe|U] me encontra do lado de fora, nenhum gato à vista."
 pet_animal.0108.desc_dead_ending: "\"Ah, deve estar brincando por aí…\"\n\n[receiver.GetSheHe|U] olha para todo lado, menos para mim."
 pet_animal.0108.a: "Estou aliviado!"
 pet_animal.0108.b: "Onde está o meu gato?!"
 pet_animal.0109.t: "[ROOT.Char.Custom('CatStoryName')]: Caçador de Roedores"
 pet_animal.0109.desc: "Quando [ROOT.Char.Custom('CatStoryName')] se aproxima a mim com mais uma rata morta, só posso elogiar[ROOT.Char.Custom('ES_LoLa')|l]. Nunca antes tivemos tão poucos roedores em nossa residência!"
 pet_animal.0109.a: "Continue com o bom trabalho!"
 pet_animal.0110.t: "[ROOT.Char.Custom('CatStoryName')]: O Encrenqueiro"
 pet_animal.0110.desc: "[vassal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima de mim, com raiva nos olhos e um gato na mão, segurado pela nuca. Ao empurrar o gato contra o meu rosto, vejo que é o meu querido [ROOT.Char.Custom('CatStoryName')]!\n\n“Encontrei esse pequeno monstro entre as minhas coisas — o que não foi arranhado estava coberto de urina!”."
 pet_animal.0110.a: "Vou compensar você!"
 pet_animal.0110.b: "É apenas um gato…"
 pet_animal.0197.t: "[ROOT.Char.Custom('CatStoryName')]: Partiu"
 pet_animal.0197.desc_court_5020: "Desde que comecei a limitar as idas e vindas de [ROOT.Char.Custom('CatStoryName')] cada vez [ROOT.Char.Custom('CatStoryHerHim')] vejo menos.\n\nJá faz semanas desde que [ROOT.Char.Custom('CatStoryHerHim')] vi pela última vez e temo que [ROOT.Char.Custom('CatStoryName')] tenha me deixado para sempre.\n\nMeus cortesãos parecem estar contentes com seus aposentos sem pelos, mas meu colo nunca pareceu tão vazio…"
 pet_animal.0197.desc: "Ultimamente, [ROOT.Char.Custom('CatStoryName')] se afasta cada vez mais de casa e passa períodos mais longos fora.\n\nJá faz semanas desde que [ROOT.Char.Custom('CatStoryHerHim')] vi pela última vez e temo que [ROOT.Char.Custom('CatStoryName')] tenha me deixado para sempre."
 pet_animal.0197.a: "Por favor, volte, [ROOT.Char.Custom('CatStoryName')]!"
 #Cat dies :(
 pet_animal.0199.t: "[ROOT.Char.Custom('CatStoryName')]: Dia de Tristeza"
 pet_animal.0199.desc: "[ROOT.Char.Custom('CatStoryName')] não é mais tão jovem como antes e, conforme se arrasta até meu colo, noto como treme.\n\nAcaricio suavemente seu pelo [ROOT.Char.Custom('CatFurColor')] e [ROOT.Char.Custom('CatStoryHerHim')] ronrona até a noite, mas quando o silêncio cai, sei que não [ROOT.Char.Custom('CatStorySheHe')] despertará novamente."
 pet_animal.0199.a: "Sentirei saudades de você, [ROOT.Char.Custom('CatStoryName')]!"
 pet_animal.0199.b: "Vou garantir que você estará para sempre ao meu lado!"
 pet_animal.0199.b.tt: "Você recebe uma pequena pele bronzeada [court_artifact|lE]"
 #Extra cat events
 pet_animal.0200.t: "[ROOT.Char.Custom('CatStoryName')]: Thunk!"
 pet_animal.0200.desc: "Estou à minha mesa, lendo alguns relatórios que me são enviados de todos os cantos do meu reino. [ROOT.Char.Custom('CatStoryName')] pula ao meu lado, buscando o calor de um raio de sol e se aconchega contente junto ao meu trabalho.\n\nEstendo a mão para acariciar seu pelo [ROOT.Char.Custom('CatFurColor')] e se espreguiça languidamente em resposta. Uma bela espreguiçada!\n\nMas acabou sendo #EMP demasiado#! forte demais, pois [ROOT.Char.Custom('CatStoryName')] se vira e cai da mesa, aterrissando sobre as patas. Com um olhar altivo — como se isso fosse, de alguma forma, culpa #EMP mía#!— vai embora, emburrado."
 pet_animal.0200.a: "Hah! Seu pequeno tolo!"
 pet_animal.0201.t: "[ROOT.Char.Custom('CatStoryName')]: Vacilante"
 pet_animal.0201.desc: "Tem sido um dia longo. Estico as pernas à minha frente enquanto relaxo à minha mesa de escrita, meus ossos cansados descansando pela primeira vez hoje. Do outro lado da sala, [ROOT.Char.Custom('CatStoryName')] passeia por uma prateleira, explorando as partes mais altas do cômodo. [ROOT.Char.Custom('CatStorySheHe')] gosta de estar nas alturas:\n\nMeu [cat_artifact.GetName|l]! Sentado na ponta da prateleira, [ROOT.Char.Custom('CatStoryName')] está indo diretamente até ele, com os olhos felinos arregalados de interesse. Observo horrorizad[ROOT.Char.Custom('ES_OA')] como uma pata se estende…"
 pet_animal.0201.a: "Não!"
 pet_animal.0201.a.tt: "Pegue-o!"
 pet_animal.0201.a.success: "Você consegue pegá-lo com sucesso"
 pet_animal.0201.a.failure: "[cat_artifact.GetNameNoTooltip] cai no chão"
 pet_animal.0201.b: "Oh não, você não vai, seu pequeno—"
 pet_animal.0201.b.success: "Você consegue pegar [ROOT.Char.Custom('CatStoryName')]"
 pet_animal.0201.b.failure: "[ROOT.Char.Custom('CatStoryName')] não está feliz com você"
 pet_animal.0201.b.tt: "Pegue[ROOT.Char.Custom('CatStoryHerHim')]!"
 pet_animal.0202.t: "[ROOT.Char.Custom('CatStoryName')]: Esforços Amorosos"
 pet_animal.0202.desc: "As velas tremeluzem e os lençóis sussurram enquanto [cat_lover.GetFirstName] e eu nos entrelaçamos na cama. Tentamos ficar em silêncio, mas às vezes os sons são um pouco altos demais! Os suspiros, os gemidos, os… miados?\n\nDou um salto e encontro [ROOT.Char.Custom('CatStoryName')] sentado bem feliz sobre um travesseiro ao nosso lado, ronronando satisfeito. Enquanto penso, de boca aberta[ROOT.Char.Custom('ES_OA')] o que fazer, [ROOT.Char.Custom('CatStorySheHe')] começa a lamber ruidosamente uma pata.\n\n[cat_lover.GetFirstNameNoTooltip|U] me lança um olhar arrogante. Dou um empurrão sem muito entusiasmo no felino satisfeito; [ROOT.Char.Custom('CatStorySheHe')] rola de barriga para cima, pronto para brincar."
 pet_animal.0202.a: "\"Ah, pelo amor de— #EMP sai daqui!#!\""
 pet_animal.0202.a.success: "Você consegue afastar o gato com sucesso"
 pet_animal.0202.a.failure: "[ROOT.Char.Custom('CatStoryName')] se recusa obstinadamente a sair"
 pet_animal.0202.b: "Seria falta de educação perturbar[ROOT.Char.Custom('CatStoryHerHim')]…"
 pet_animal.0203.t: "[ROOT.Char.Custom('CatStoryName')]: Traição!"
 pet_animal.0203.desc: "Será que ouço um #EMP arrullo#!? E alguns… miados abafados?\n\nSentad[random_courtier.Custom('ES_OA')] em uma alcova está [random_courtier.GetFirstName], que embala [ROOT.Char.Custom('CatStoryName')] nos braços. O felino [random_courtier.GetHerHim] olha com adoração, com as patas recolhidas como um bebê, e [Select_CString( random_courtier.IsFemale, 'la enamorada', 'el enamorado' )] [random_courtier.GetFirstNameNoTooltip] [ROOT.Char.Custom('CatStoryHerHim')] balança carinhosamente.\n\nOfereço uma saudação, mas embora [Select_CString( random_courtier.IsFemale, 'la humana', 'el humano' )] responda, o gato se limita a ronronar contente e enterra o rosto na dobra de um braço. Apesar de mim, sinto uma pontada de ciúme."
 pet_animal.0203.a: "Ei! Devolva meu gato aqui!"
 pet_animal.0203.b: "Bom, suponho que não sou o favorit[ROOT.Char.Custom('ES_OA')]…"
 pet_animal.0204.t: "[ROOT.Char.Custom('CatStoryName')]: O Médico dos Gatos"
 pet_animal.0204.desc: "Tremo um pouco e me cubro com as cobertas. Esta doença miserável já me faz sentir mal há dias, e não mostra sinais de melhorar tão cedo.\n\nEnquanto mexo nas cobertas, um miado alegre anuncia a chegada do meu gato, [ROOT.Char.Custom('CatStoryName')]. Ele me olha com um vago ar de preocupação, dando uma elaborada volta pelo meu leito de enferm[ROOT.Char.Custom('ES_OA')] mer.\n\nFinalmente, com um pequeno e satisfeito #EMP murr!#!, [ROOT.Char.Custom('CatStorySheHe')] se acomoda para amassar as cobertas e, por fim, se enrosca na dobra do meu cotovelo."
 pet_animal.0204.a: "Awn. Você veio me fazer companhia, [ROOT.Char.Custom('CatStoryName')]?"
 pet_animal.0205.t: "[ROOT.Char.Custom('CatStoryName')]: Uma Interrupção"
 pet_animal.0205.desc: "Sento-me e faço um gesto para que meu conselho faça o mesmo. As pessoas mais poderosas do reino estão aqui. Abro a boca para falar e… \n\n#EMP Miau!#!. Olho ao redor em busca do culpado. #EMP Miau!#!\n\n.[ROOT.Char.Custom('CatStoryName')] salta sobre a longa mesa, ronronando satisfeito. Ele/ela esfrega a cabeça na minha mão com alegria; [cat_disapprover.GetFirstName], por sua vez, franze os lábios em desaprovação:\n\n\"Poderíeis talvez fazer com que levem o animal, [ROOT.Char.Custom('FormOfAddressForLiege')]? Temos assuntos de grande importância para discutir.\""
 pet_animal.0205.a: "Respeite [ROOT.Char.Custom('CatStoryName')], ou perca a língua."
 pet_animal.0205.b: "Criado! Venha buscar este gato!"
 pet_animal.0205.c: "Vamos, [ROOT.Char.Custom('CatStorySheHe')] não é problema. Pode ficar."
 pet_animal.0205.c.tt: "Venha aqui, bolinha de pelos!"
 ##############
 ## DOG
 ##############
 dog_got_pregnant_tooltip: "Ela está esperando filhotes!"
 pet_animal.1001.t: "O cachorro"
 pet_animal.1001.desc: "Enquanto afago o cachorro na cabeça, ele abana a cauda felizmente. Que nome [ROOT.Char.Custom('CatStoryHerHim')] combinaria? Algo histórico? Algo que aluda ao seu pelo [ROOT.Char.Custom('DogFurColor')]? É uma decisão importante, e quando ele se vira para eu acariciar sua barriga, fico distraíd[ROOT.Char.Custom('ES_OA')] por um momento.\n\nUm momento, já sei! [ROOT.Char.Custom('DogStoryHerHim')|U] chamarei…"
 pet_animal.1101.t: "[ROOT.Char.Custom('DogStoryName')]: Pés e Patas"
 pet_animal.1101.desc: "Tornou-se um hábito sair para caminhar diariamente com [ROOT.Char.Custom('DogStoryName')], e não sei qual de nós dois aproveita mais o ar fresco e o sol!\n\n[ROOT.Char.Custom('DogStoryName')] salta à frente, olha para trás para mim e late, como se dissesse: #EMP date prisa!#!"
 pet_animal.1101.a: "E continuamos andando!"
 pet_animal.1102.t: "[ROOT.Char.Custom('DogStoryName')]: Fugitivo"
 pet_animal.1102.desc: "Estou cavalgando, com [ROOT.Char.Custom('DogStoryName')] ao meu lado quando [ROOT.Char.Custom('DogStorySheHe')] sai correndo de repente em direção ao [ROOT.Char.Custom('TerrainType')].\n\nMinha comitiva me assegura que ele voltará, mas e se não?"
 pet_animal.1102.a: "Aqui, [ROOT.Char.Custom('DogStoryName')], eu disse aqui! Espere por mim!"
 pet_animal.1102.a.tt: "Você tenta pegar[ROOT.Char.Custom('DogStoryHerHim')]"
 pet_animal.1102.b: "Vou ter paciência."
 pet_animal.1102.b.tt: "[ROOT.Char.Custom('DogStorySheHe')|U] voltará..."
 pet_animal.1103.desc_followed: "Encontro [ROOT.Char.Custom('DogStoryName')] depois de alguns minutos de busca, abanando a cauda alegremente e fingindo que nada está errado."
 pet_animal.1103.desc: "Eventualmente, [ROOT.Char.Custom('DogStoryName')] volta trotando, fingindo que nada está errado."
 pet_animal.1103.desc_ending: "\n\n[ROOT.Char.Custom('DogStoryName')] leva algo na boca e, quando o coloca suavemente à minha frente, vejo que são algumas moedas de ouro."
 pet_animal.1103.a: "Obrigado!"
 pet_animal.1104.desc_followed: "Procuro por muito tempo, mas não encontro sinal de [ROOT.Char.Custom('DogStoryName')]."
 pet_animal.1104.desc: "Não importa quanto tempo eu espere, [ROOT.Char.Custom('DogStoryName')] não volta."
 pet_animal.1104.desc_ending: "\n\nEnquanto cavalgamos de volta, o espaço vazio ao lado do meu cavalo faz algo dentro de mim doer."
 pet_animal.1104.a: "[ROOT.Char.Custom('DogStoryName')], por que você me deixou?"
 pet_animal.1105.desc_ending: "\n\nQuando estava prestes a desistir, um cavaleiro da minha comitiva volta com notícias perturbadoras: jura que viu a [rival.Custom2('MyCharacterIntroduction', ROOT.Char)] rondando por aí!"
 pet_animal.1105.a: "Se [rival.GetSheHe] teve algo a ver com isso..."
 pet_animal.1106.desc_ending: "\n\nQuando eu estava prestes a ir embora, aparece [friend.Custom2('MyCharacterIntroduction', ROOT.Char)] do nada, puxando [ROOT.Char.Custom('DogStoryName')].\n\n\"Meu amig[ROOT.Char.Custom('ES_OA')] meu[ROOT.Char.Custom('ES_OA')], acho que você perdeu alguém!\""
 pet_animal.1106.a: "Tanta sorte! Muito obrigado!"
 pet_animal.1107.t: "[ROOT.Char.Custom('DogStoryName')]: Vassalo Encantado"
 pet_animal.1107.desc: "Dou de cara com meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('vassal'))] , [vassal.Custom('ES_ElLa')] [vassal.GetTitledFirstName|l] , que está agachado ao lado de [ROOT.Char.Custom('DogStoryName')], coçando vigorosamente a barriga dele.\n\n“Esse seu cachorro é mesmo um encanto, [ROOT.Char.Custom('FormOfAddressForLiege')]!”."
 pet_animal.1107.a_female: "Ela é uma boa garota!"
 pet_animal.1107.a_male: "Ele é um bom garoto!"
 pet_animal.1108.t: "[ROOT.Char.Custom('DogStoryName')]: Protetor Peludo"
 pet_animal.1108.desc: "Estou em meus aposentos quando [ROOT.Char.Custom('DogStoryName')] começa a latir de repente para a porta. Ouço um guincho surpreso e, quando abro a porta de uma vez, meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('agent'))] [agent.GetFirstName] fica paralisad[agent.Custom('ES_OA')]."
 pet_animal.1108.a: "O que você está fazendo aqui? Me conte!"
 pet_animal.1109.t: "[ROOT.Char.Custom('DogStoryName')]: O Encontro"
 pet_animal.1109.desc: "Estou passeando com [ROOT.Char.Custom('DogStoryName')] quando, de repente, vejo [other_owner.Custom2('MyCharacterIntroduction', ROOT.Char)] se aproximar com um belo cachorro de pelagem [other_owner.Custom('DogFurColor')].\n\nAntes que qualquer um de nós possa reagir, [ROOT.Char.Custom('DogStoryName')] e o outro cachorro saem correndo."
 pet_animal.1109.a: "Tenho certeza de que eles ficarão bem."
 pet_animal.1109.a.tt: "Eu #EMP espero#! que eles fiquem bem"
 pet_animal.1110.desc: "[other_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] e eu encontramos os dois cachorros depois de um tempo, no meio de uma cópula rigorosa.\n\n"
 pet_animal.1110.desc_your_dog: "\"Bem, [ROOT.Char.GetTitledFirstNameNoTooltip|l]... acho que em breve seremos parentes!\""
 pet_animal.1110.desc_their_dog: "\"[ROOT.Char.Custom('DogStoryName')], como você pôde deixar que esse vira-lata…!\"\n\nDeixa a frase a meio, mas consigo ver a raiva em seus olhos."
 pet_animal.1110.a: "Bem... É natural."
 pet_animal.1111.desc: "[other_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] e eu encontramos os dois cachorros depois de um tempo, no meio de uma luta brincalhona.\n\n\"É bom ver [other_owner.Custom('DogStoryName')] se divertindo assim!\""
 pet_animal.1111.a: "Não poderia concordar mais!"
 pet_animal.1112.desc: "[other_owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] e eu encontramos os cães depois de um tempo, em meio a uma luta feroz.\n\n\"Tirem esse vira-lata daí!\"\n\n"
 pet_animal.1112.desc_dead: "Quando consigo finalmente que [ROOT.Char.Custom('DogStoryName')] se afaste, o cadáver do cachorro de [other_owner.GetFirstNameNoTooltip] já está esfriando."
 pet_animal.1112.desc_alive: "Quando finalmente consigo afastar [ROOT.Char.Custom('DogStoryName')], [other_owner.GetTitledFirstNameNoTooltip|l] sai sem sequer olhar para trás."
 pet_animal.1112.a: "Você está bem, [ROOT.Char.Custom('DogStoryName')]?"
 pet_animal.1113.t: "[ROOT.Char.Custom('DogStoryName')]: A Reunião do Conselho"
 pet_animal.1113.desc: "Enquanto meus conselheiros e eu nos reunimos para uma reunião, meu cachorro [ROOT.Char.Custom('DogStoryName')] se aproxima de mim com olhos suplicantes e uma cauda caída.\n\n não gosta de ficar sozinho, mas esta é uma reunião importante..."
 pet_animal.1113.a: "Deixar que me acompanhe."
 pet_animal.1113.a_success: "[ROOT.Char.Custom('DogStoryName')] se comporta"
 pet_animal.1113.a_success.tt: "Nada de ruim acontece"
 every_councillor: "Todo [councillor|lE]"
 pet_animal.1113.a_failure: "[ROOT.Char.Custom('DogStoryName')] faz de tudo, exceto se comportar"
 pet_animal.1113.a_failure.tt: "Algo... ruim acontece"
 pet_animal.1113.b: "Um cachorro não tem lugar em uma reunião do conselho."
 pet_animal.1113.b.tt: "Você fecha a porta na frente dos olhos suplicantes do cachorro"
 pet_animal.1113.b_success: "[ROOT.Char.Custom('DogStoryName')] espera pacientemente"
 pet_animal.1113.b_failure: "[ROOT.Char.Custom('DogStoryName')] sai em aventuras"
 pet_animal.1114.desc: "\"Sinto muito, [ROOT.Char.GetTitledFirstNameNoTooltip|l]\", diz meu [councillor.GetCouncilTitle] [councillor.GetTitledFirstName|l]. \"Não posso concordar com…\"\n\n#EMP *Grrr*#!\n\n[ROOT.Char.Custom('DogStoryName')] emite um rosnado gutural e [councillor.GetTitledFirstNameNoTooltip|l] recua, olhando para o cachorro, depois para mim, e de volta para o cachorro.\n\n\"Pensando melhor, devo admitir que é uma ideia excelente!\""
 pet_animal.1014.a_girl: "Tão boa menina, [ROOT.Char.Custom('DogStoryName')]!"
 pet_animal.1014.a_boy: "Tão bom menino, [ROOT.Char.Custom('DogStoryName')]!"
 pet_animal.1115.desc: "\"Passemos ao próximo assunto\", diz em tom monótono meu [councillor.GetCouncilTitle] [councillor.GetTitledFirstName|l]. \"É de extrema importância que…\"\n\n#EMP *Phhffrrt*#!\n\nO silêncio que se instala só é rompido pelos latidos alegres de [ROOT.Char.Custom('DogStoryName')], que acabou de fazer suas necessidades."
 pet_animal.1115.a: "Cachorro malcriado!"
 pet_animal.1116.desc_opening: "Saio da sala de reuniões e vejo que [ROOT.Char.Custom('DogStoryName')] já não está. Começo a procurar por todos os lados, vasculhando tudo. E se tiver se perdido e estiver assustado?\n\n"
 pet_animal.1116.desc: "De repente, me deparo com [courtier.Custom2('MyCharacterIntroduction', ROOT.Char)], que tem um cachorro praticamente no colo, coçando vigorosamente a barriga dele. Um cachorro que se parece suspeitosamente com [ROOT.Char.Custom('DogStoryName')].\n\n\"Você tem um companheiro precioso, [ROOT.Char.GetTitledFirstNameNoTooltip|l]!\""
 pet_animal.1116.a: "Haha, sim. É incrível..."
 pet_animal.1117.desc: "De repente, me deparo com [courtier.Custom2('MyCharacterIntroduction', ROOT.Char)], que está repreendendo um cachorro que se parece muito com [ROOT.Char.Custom('DogStoryName')] e que está cercado por pedaços rasgados de papel e tecido.\n\n\"[ROOT.Char.GetTitledFirstNameNoTooltip|l]! Esta… Esta #EMP bestia#! arruinou completamente meus aposentos! Tudo está em frangalhos!\""
 pet_animal.1117.a: "Eh... Ups. Cachorro travesso!"
 pet_animal.1118.t: "[ROOT.Char.Custom('DogStoryName')]: O Encrenqueiro"
 pet_animal.1118.desc: "[vassal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima de mim, com raiva nos olhos e arrastando um cachorro pelo pescoço. Ao se aproximar mais, vejo que o cachorro é o meu [ROOT.Char.Custom('DogStoryName')]!\n\n\"Encontrei esta fera entre minhas coisas. O que não estava roído estava coberto de excrementos!\"."
 pet_animal.1118.a: "Vou compensar você!"
 pet_animal.1118.b: "É apenas um cachorro..."
 pet_animal.1190.t: "[ROOT.Char.Custom('DogStoryName')]: Filhote"
 pet_animal.1190.desc: "[ROOT.Char.Custom('DogStoryName')] deu à luz a um filhote adorável! Por mais que eu o adore – e sua pequena cauda balançando –, eu não posso cuidar dele também..."
 pet_animal.1190.a: "Vou dar para [receiver_1.GetFirstNameNoTooltip]..."
 pet_animal.1190.b: "[receiver_2.GetFirstNameNoTooltip] poderia usar uma companhia..."
 pet_animal.1190.c: "[receiver_3.GetFirstNameNoTooltip] vai cuidar dele..."
 pet_animal.1190.d: "Vou vender no mercado."
 pet_animal.1191.t: "O Filhote"
 pet_animal.1191.desc: "[giver.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se aproxima de mim com um filhote nos braços.\n\n\"Eu não posso cuidar dele, mas talvez você possa dar um lar a ele?\""
 pet_animal.1191.a: "Com certeza! Me dá ele!"
 pet_animal.1191.b: "Eu... #EMP posso cuidar#! dele."
 pet_animal.1192.t: "[receiver.Custom('DogStoryName')]: Vida Sem Você"
 pet_animal.1192.desc_opening: "Visito m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('receiver'))] [receiver.GetTitledFirstName|l] para ver como o pequeno [receiver.Custom('DogStoryName')] está em seu cuidado.\n\n"
 pet_animal.1192.desc_alive_landed: "[receiver.GetSheHe|U] me recebe do lado de fora de sua [receiver.Custom('ResidenceBuilding')], um cão de pelagem [receiver.Custom('DogFurColor')] ao seu lado. \"[receiver.Custom('DogStorySheHe')|U] está bem…"
 pet_animal.1192.desc_alive: "[receiver.GetSheHe|U] me recebe do lado de fora, um cachorro [receiver.Custom('DogFurColor')] ao seu lado. \"[receiver.Custom('DogStorySheHe')|U] está bem…"
 pet_animal.1192.desc_alive_1: "Adora perseguir as galinhas!\""
 pet_animal.1192.desc_alive_2: "\"Gosta de seguir os cavalos!\""
 pet_animal.1192.desc: "[receiver.GetSheHe|U] me recebe do lado de fora de sua [receiver.Custom('ResidenceBuilding')], sem nenhum cachorro à vista. \"Ah, [receiver.Custom('DogStorySheHe')] deve estar brincando por aí…\"\n\n[receiver.GetSheHe|U] olha para qualquer lugar menos para mim."
 pet_animal.1192.a: "Estou aliviado!"
 pet_animal.1192.b: "Onde está [receiver.Custom('DogStoryName')]?"
 #Dog dies :(
 pet_animal.1199.t: "[ROOT.Char.Custom('DogStoryName')]: Dia de Tristeza"
 pet_animal.1199.desc: "[ROOT.Char.Custom('DogStoryName')] vem ao meu lado há muitos anos, e a passagem do tempo não poupa nem os cães. Ajoelho-me ao seu lado e começa a abanar o rabo lentamente, mas não consegue sequer erguer a cabeça.\n\nFico ali, fazendo-lhe companhia até tarde da noite, acariciando-lhe o dorso [ROOT.Char.Custom('DogFurColor')] até que o rabo fique imóvel."
 pet_animal.1199.a: "Vou sentir saudades de você, [ROOT.Char.Custom('DogStoryName')]!"
 ##############
 ## CAT AND DOG
 ##############
 pet_animal.2001.t: "Abraços Noturnos"
 pet_animal.2001.desc: "Retiro-me para meus aposentos quando a noite cai e encontro [ROOT.Char.Custom('CatStoryName')] e [ROOT.Char.Custom('DogStoryName')] enroscados no chão! O pelo [ROOT.Char.Custom('DogFurColor')] de [ROOT.Char.Custom('DogStoryName')] brilha… é óbvio que [ROOT.Char.Custom('CatStoryName')] esteve limpando[ROOT.Char.Custom('DogStoryHerHim')]."
 pet_animal.2001.a: "Eles são tão fofos juntos!"
 pet_animal.2002.t: "Como Cães e Gatos"
 pet_animal.2002.desc: "Estou atravessando o pátio quando [ROOT.Char.Custom('CatStoryName')] e [ROOT.Char.Custom('DogStoryName')] entram por lados opostos.\n\nNão tenho tempo para reagir – eles estão às gargantas um do outro em questão de segundos. Tufos de pelos [ROOT.Char.Custom('DogFurColor')] voam, e posso ouvir ambos rosnando. Novamente. Essa luta constante precisa acabar!"
 pet_animal.2002.a: "Parem com isso imediatamente, [ROOT.Char.Custom('DogStoryName')]!"
 pet_animal.2002.a.tt: "Tento controlar o cachorro"
 pet_animal.2002.b: "[ROOT.Char.Custom('CatStoryName')], chega!"
 pet_animal.2002.b.tt: "Tento controlar o gato"
 pet_animal.2002.c: "Eu não quero ficar no meio disso..."
 pet_animal.2002.c.tt: "Tenho certeza de que eles vão resolver isso"
 pet_animal.2003.desc: "Procurei por toda a residência, com [ROOT.Char.Custom('CatStoryName')] nas minhas costas, mas não vejo [ROOT.Char.Custom('DogStoryName')] por lugar nenhum!\n\nParo para pensar, ajoelhando-me para acariciar [ROOT.Char.Custom('CatStoryName')], quando vejo um tufo de pelo [ROOT.Char.Custom('DogFurColor')] ensanguentado preso em seus dentes. Quando o arranco, ele sibila e salta para um canto do quintal — um canto com algo [ROOT.Char.Custom('DogFurColor')] estendido no chão."
 pet_animal.2003.a: "Ah, não! [ROOT.Char.Custom('CatStoryName')], você não fez isso...!"
 pet_animal.2004.desc_opening: "Quando eu estava saindo da residência, [ROOT.Char.Custom('DogStoryName')] vem até mim trotando, balançando a cauda alegremente.\n\n"
 pet_animal.2004.desc_female: "\"Oi! Quem é uma boa menina? Sim, quem é–\""
 pet_animal.2004.desc_male: "\"Oi! Quem é um bom menino? Sim, quem é–\""
 pet_animal.2004.desc: "\n\nQuando [ROOT.Char.Custom('DogStorySheHe')] se aproxima, vejo que sua boca está pingando sangue e vísceras. Com o coração afundando, caminho na direção de onde veio e logo encontro o corpo inerte do meu gato [ROOT.Char.Custom('CatStoryName')]."
 pet_animal.2004.a: "Ah, não... [ROOT.Char.Custom('DogStoryName')], como você pôde?"
 pet_animal.2005.desc_opening: "Não consigo encontrar nem [ROOT.Char.Custom('CatStoryName')] nem [ROOT.Char.Custom('DogStoryName')]. Vasculho o [ROOT.Char.Custom('ResidenceBuilding')] e a área circundante, mas ninguém os viu.\n\n"
 pet_animal.2005.desc: "Assim que estou virando, vejo uma pequena poça de sangue no chão, e depois outra, e outra... Elas me levam a um monte de pelos ensanguentados – dois corpos rasgados enroscados no chão, e não há como confundir quem são."
 pet_animal.2005.a: "Por que vocês simplesmente não podiam se dar bem?"
 pet_animal.2006.desc: "Quando volto a me virar, os vejo, deitados em um monte no chão. Ah, não! Eles finalmente... Mas, quando me aproximo deles, [ROOT.Char.Custom('CatStoryName')] levanta a cabeça e me olha com olhos cansados antes de voltar a dormir."
 pet_animal.2006.a: "Ah, eles... Eles realmente resolveram isso!"
 ##############
 ## OTHER PEOPLE
 ##############
 pet_animal.5001.t: "O Gato do Inimigo"
 pet_animal.5001.desc: "Ao passar por [rival_home.GetName] em um recado, sou abordado por um gato [rival.Custom('CatFurColor')]. Onde já vi esse gato antes…? Ah! É o gato da minha [ROOT.Char.Custom2('RelationToMe' , SCOPE.sC('rival'))], [rival.Custom('ES_ElLa')] [rival.GetTitledFirstName|l]!\n\nEle mia para mim e ronrona, enquanto um sorriso cruel se espalha pelo meu rosto."
 pet_animal.5001.a: "#EMP Psst psst#! – Eu não vou machucar você..."
 pet_animal.5001.a.tt: "É apenas um rápido golpe de faca"
 pet_animal.5001.b: "Vou fazer carinho no gato daquele imbecil!"
 pet_animal.5002.t: "O Cachorro do Inimigo"
 pet_animal.5002.desc: "Ao passar por [rival_home.GetName] em uma tarefa, sou abordado por um cachorro [rival.Custom('DogFurColor')]. Onde eu já vi esse cachorro antes…? Ah! É o cachorro do meu [ROOT.Char.Custom2('RelationToMe' , SCOPE.sC('rival'))] [rival.Custom('ES_ElLa')] [rival.GetTitledFirstName|l]!\n\nSinto um sorriso cruel se espalhar pelo meu rosto enquanto ele late feliz para mim, abanando o rabo."
 pet_animal.5002.a: "Venha aqui, eu não vou machucar você..."
 pet_animal.5002.b: "Vou fazer carinho no cachorro daquele imbecil!"
 ##############
 ## DECISION EVENTS
 ##############
 pet_animal.6001.t: "Acariciando [ROOT.Char.Custom('DogStoryName')|U]"
 pet_animal.6001.desc: "Ao acariciar o pelo [ROOT.Char.Custom('DogFurColor')] de [ROOT.Char.Custom('DogStoryName')] sinto minhas preocupações se dissiparem. Ter a lealdade inabalável de alguém, e saber que ele sempre ficará ao meu lado… Se ao menos as pessoas ao meu redor fossem mais como você, [ROOT.Char.Custom('DogStoryName')]!\n\nSentamo-nos juntos por muitos minutos. [ROOT.Char.Custom('DogStoryName')] abana o rabo e meus ombros relaxam, até que eu esteja pront[ROOT.Char.Custom('ES_OA')] para voltar a enfrentar o mundo."
 pet_animal.6001.a: "Obrigado, meu amigo!"
 pet_animal.6002.desc: "Encontro a [ROOT.Char.Custom('DogStoryName')] lá fora, brincando com algumas crianças. Ao me ver, ele rapidamente vem correndo com o rabo abanando, e quando me agacho, ele prontamente se vira de barriga para cima.\n\nPasso vários minutos acariciando sua barriga [ROOT.Char.Custom('DogFurColor')]. Faz muito tempo que eu não me sentia tão relaxad[ROOT.Char.Custom('ES_OA')]."
 pet_animal.6003.desc: "Ao sair, vejo que [ROOT.Char.Custom('DogStoryName')] vem correndo em minha direção com um galho na boca. Acho que posso dedicar alguns minutos para brincar de buscar com [ROOT.Char.Custom('DogStorySheHe')]. Sim, isso seria relaxante.\n\n#EMP Um momento, o que é isto?#!\n\nQuando me abaixo para pegá-lo, vejo que não é galho nenhum, mas sim uma #EMP reivindicação sobre [target_county.GetName]!#! Como diabos você conseguiu isso, [ROOT.Char.Custom('DogStoryName')]?"
 pet_animal.6003.a: "Muito bem, [ROOT.Char.Custom('DogStoryGirlBoy')], [ROOT.Char.Custom('DogStoryName')]. #EMP Bien hecho, [ROOT.Char.Custom('DogStoryGirlBoy')]!#!"
 pet_animal.6003.b: "[neighboring_ruler.Custom('ES_ElLa')|U] [neighboring_ruler.GetTitledFirstNameNoTooltip|l] ficará muito feliz[neighboring_ruler.Custom('ES_OA')] em recuperar isto!"
 pet_animal.6004.desc: "Encontro a [ROOT.Char.Custom('DogStoryName')] do lado de fora, cochilando ao sol. Me abaixo ao lado dele e deixo minha mão passar pelos pelos [ROOT.Char.Custom('DogFurColor')] e…\n\nMeu único aviso é um rosnado baixo e um lampejo de dentes antes de sentir algo #EMP rasgado#! no braço. Me afasto rapidamente antes que volte a me atacar novamente, mas a dor…!"
 pet_animal.6004.a: "Isso... Deve ter sido um engano!"
 pet_animal.6004.b: "Seu #EMP monstro#!"
 pet_animal.6051.t: "Acariciando [ROOT.Char.Custom('CatStoryName')|U]"
 pet_animal.6051.desc: "Encontro [ROOT.Char.Custom('CatStoryName')] dormindo em meu leito e, quando me sento ao seu lado, me recebe com um gorjeio suave e confuso.\n\nNo entanto, assim que começo a passar os dedos por seu pelo [ROOT.Char.Custom('CatFurColor')], começa rapidamente a ronronar de contentamento, e o som parece relaxar todo o meu ser."
 pet_animal.6052.desc: "Encontro a [ROOT.Char.Custom('CatStoryName')] do lado de fora, desfilando pelo quintal com toda a pompa. Assim que me vê, mia e vem até mim, esfregando-se na minha perna.\n\nPasso vários minutos agachad[ROOT.Char.Custom('ES_OA')] ao seu lado, acariciando[ROOT.Char.Custom('CatStoryHerHim')] e coçando[ROOT.Char.Custom('CatStoryHerHim')] sob o queixo. Quando me levanto novamente, me sinto mais leve[ROOT.Char.Custom('ES_OA')] do que me sentia há muito tempo."
 ##############
 ## EAGLE
 ##############
 pet_animal.3001.t: "A Águia"
 pet_animal.3001.desc: "Coloco meu novo filhote de águia sobre a luva e acaricio suavemente suas penas. Certamente, é uma criatura digna e feroz, não um pássaro qualquer.\n\nEnquanto imagino as caçadas por vir, devo pensar em que nome lhe darei antes de sairmos para que caçe seu primeiro raposo ou lebre."
 pet_animal.3010.t: "A desaparição de [ROOT.Char.Custom('EagleStoryName' )|U]"
 pet_animal.3010.desc: "[eagle_informer.GetFirstName] se aproxima a mim, com preocupação estampada no rosto. \"É sobre [ROOT.Char.Custom('EagleStoryName')], [ROOT.Char.Custom('FormOfAddressForLiege')]. Não consigo encontrar [ROOT.Char.Custom('EagleStoryHerHim')] em lugar nenhum!\".\n\nOlha ao redor, como se esperasse que [ROOT.Char.Custom('EagleStoryName')] despencasse do céu a qualquer momento. [eagle_informer.GetFirstNameNoTooltip] me mostra o poleiro vazio, e [Select_CString(And(ROOT.Char.IsFemale, eagle_informer.IsFemale),'ambas','ambos')] nos perguntamos para onde [ROOT.Char.Custom('EagleStoryName')] pode ter ido."
 pet_animal.3010.desc_thief: "\n\nInspecionando o local, noto algumas penas no chão e mais algumas presas nos galhos de uma árvore próxima, será que [ROOT.Char.Custom('EagleStoryName')] saiu por conta própria?"
 pet_animal.3010.a: "Farei o que for preciso para encontrar [ROOT.Char.Custom('EagleStoryName')]!"
 pet_animal.3010.a_tt: "Mais pessoas estarão à procura da sua águia, e será mais provável que ela seja encontrada"
 pet_animal.3010.b: "Alguém se [ROOT.Char.Custom('EagleStoryHerHim')] deve ter levado…"
 pet_animal.3010.b_tt: "Você reúne suspeitos e começa uma investigação sobre o desaparecimento da sua águia"
 pet_animal.3010.c: "Acabará aparecendo eventualmente."
 pet_animal.3010.c_tt: "Você deixa o retorno da sua águia ao acaso"
 pet_animal.3010.d_mean: "Eu não me importava com [ROOT.Char.Custom('EagleStoryName')] de qualquer maneira."
 pet_animal.3010.d_old: "Já estava ficando mais velho."
 pet_animal.3010.d: "Talvez seja melhor assim."
 pet_animal.3010.d_tt: "Você abandona a busca pela águia"
 pet_animal.3011.t: "[ROOT.Char.Custom('EagleStoryName')]: O Retorno"
 pet_animal.3011.desc: "Já fazia muito tempo desde o desaparecimento da minha águia [ROOT.Char.Custom('EagleStoryName')] e eu quase tinha perdido a esperança de voltar a caçar com [ROOT.Char.Custom('EagleStorySheHe')]."
 pet_animal.3011.desc_freedom: "Começo a relembrar o tempo que compartilhamos e me dirijo à sua percha habitual. Para meu deleite, lá está [ROOT.Char.Custom('EagleStoryName')]. me olhando com os seus olhos penetrantes. Ele voltou!"
 pet_animal.3011.desc_found: "Por acaso, chega um mensageiro com notícias sobre o avistamento de uma ave que corresponde à sua descrição. Corro até o local e lá está ela, empoleirada em um galho, olhando para mim como se nada tivesse acontecido."
 pet_animal.3011.desc_stolen: "[ROOT.Char.Custom('EagleStoryHerHim')|U] encontro em mãos de [eagle_thief.GetName], que tenta vender[ROOT.Char.Custom('EagleStoryHerHim')] ao maior lance. Intervenho rapidamente e [ROOT.Char.Custom('EagleStoryName')] volta aos meus braços."
 pet_animal.3011.desc_change: "\n\nEmbora eu fique muito feliz em ver novamente [ROOT.Char.Custom('EagleStoryName')], não consigo deixar de notar que minha águia mudou."
 pet_animal.3011.desc_brave: "[ROOT.Char.Custom('EagleStoryName')] parece mais ousada, como se tivesse visto o mundo e não tivesse mais medo dele."
 pet_animal.3011.desc_curious: "[ROOT.Char.Custom('EagleStoryName')] sobrevoa o acampamento e inspeciona tudo com um olhar ansioso."
 pet_animal.3011.desc_loyal: "[ROOT.Char.Custom('EagleStoryName')] se agarra a mim, tornando minha luva seu poleiro particular."
 pet_animal.3011.desc_calm: "Antes, [ROOT.Char.Custom('EagleStoryName')] se agitava e não parava de se mexer, mas agora se acomoda com calma, mesmo sem capuz."
 pet_animal.3011.desc_wise: "[ROOT.Char.Custom('EagleStoryName')] me olha com um olhar de cumplicidade, como se tivesse visto coisas que eu jamais poderia imaginar."
 pet_animal.3011.desc_cunning: "[ROOT.Char.Custom('EagleStoryName')] parece ter aprendido alguns truques, e não tem medo de usá-los."
 pet_animal.3011.desc_observant: "[ROOT.Char.Custom('EagleStoryName')] voa alto, observando tudo com olhar atento."
 pet_animal.3011.desc_protective: "[ROOT.Char.Custom('EagleStoryName')] bica qualquer um que chegue perto demais, quando antes não ligava nem um pouco."
 pet_animal.3011.desc_aggressive: "[ROOT.Char.Custom('EagleStoryName')] quase me atravessa a luva com as garras, e vejo que não se deve brincar com [ROOT.Char.Custom('EagleStorySheHe')]."
 pet_animal.3011.a: "Bem-vinda de volta, [ROOT.Char.Custom('EagleStoryName')]!"
 pet_animal.3011.b: "[eagle_thief.GetName] vai pagar por isso!"
 pet_animal.3012.desc: "Após meses de busca, cheguei à conclusão de que jamais tornarei a ver minha querida águia [ROOT.Char.Custom('EagleStoryName')]. [eagle_informer.GetName] tenta me consolar: \"[ROOT.Char.Custom('FormOfAddressForLiege')|U], tenho certeza de que ainda está por aí, em algum lugar, e acabará voltando\", mas eu sei como é.\n\nFoi-se, e devo aceitar isso."
 pet_animal.3012.a: "Adeus, [ROOT.Char.Custom('EagleStoryName')]."
 pet_animal.3013.t: "A Busca por [ROOT.Char.Custom('EagleStoryName')]"
 pet_animal.3013.desc: "Como conheço a [ROOT.Char.Custom('EagleStoryName')], há poucas probabilidades de que tenha partido por conta própria. Examino cuidadosamente seu último paradeiro e vou perguntando se [ROOT.Char.Custom('EagleStoryHerHim')] o viram.\n\nAlgumas das pessoas a quem interrogo ficam bastante nervosas, e me pergunto se sabem mais do que deixam transparecer. Pensando bem,"
 pet_animal.3013.desc_thief_1: "identifico [accused_thief_1.GetName] como suspeit[accused_thief_1.Custom('ES_OA')] por sua natureza [accused_thief_1.Custom2('InsultAdjective', ROOT.Char)]."
 pet_animal.3013.desc_thief_2: "$pet_animal.3013.desc_thief_1$ Mas [accused_thief_2.GetName] é outr[accused_thief_2.Custom('ES_OA')] candidat[accused_thief_2.Custom('ES_OA')] provável, dado o quão [accused_thief_2.Custom2('InsultAdjective', ROOT.Char)] que é…"
 pet_animal.3013.desc_thief_single: "Só consigo pensar em uma pessoa que poderia ter feito isso..."
 pet_animal.3013.desc_thief_none: "Não consigo imaginar quem teria levado [ROOT.Char.Custom('EagleStoryName')]."
 pet_animal.3013.a: "[accused_thief_1.GetName] levou minha preciosa águia!"
 pet_animal.3013.b: "Ou talvez tenha sido [accused_thief_2.GetName]?"
 pet_animal.3013.d: "Não posso acusar ninguém sem provas."
 pet_animal.3013.tt: "Você acusa [accused_thief.GetNameNoTooltip] de roubar sua águia."
 pet_animal.3013.wrong: "[accused_thief.GetName] não roubou [ROOT.Char.Custom('EagleStoryName')]."
 pet_animal.3013.unknown: "O destino de sua águia permanece desconhecido..."
 rival_stole_from_me_eagle: "[CHARACTER.GetShortUIName|U] tentou roubar a águia de caça de [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'seu personagem', TARGET_CHARACTER.GetShortUIName )]."
 rival_stole_from_me_eagle_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] tentou roubar a águia de caça de [Select_CString( CHARACTER.IsLocalPlayer, 'seu personagem', CHARACTER.GetShortUIName )]."
 pet_animal.3020.t: "O Ciclo Continua"
 pet_animal.3020.desc_intro: "Eu olho para [ROOT.Char.Custom('EagleStoryName')], lembrando o dia em que eu"
 pet_animal.3020.desc_intro_standard: "[ROOT.Char.Custom('EagleStoryHerHim')] capturei do ninho"
 pet_animal.3020.desc_intro_lure: "[ROOT.Char.Custom('EagleStoryHerHim')] atraí até mim"
 pet_animal.3020.desc_intro_gift: "[ROOT.Char.Custom('EagleStoryHerHim')] recebi como presente"
 pet_animal.3020.desc_intro_market: "[ROOT.Char.Custom('EagleStoryHerHim')] comprei na barraca de um mercador"
 #pet_animal.3020.desc_intro_rescue: "rescued [ROOT.Char.Custom('EagleStoryHerHim')] from a trap."
 pet_animal.3020.desc_intro_stolen: "[ROOT.Char.Custom('EagleStoryHerHim')] arranquei das garras de outro"
 pet_animal.3020.desc_intro_none: "[ROOT.Char.Custom('EagleStoryHerHim')] encontrei"
 pet_animal.3020.desc: "e todas as memórias que compartilhamos. Ao longo dos anos, adquiriu um caráter bastante [ROOT.Char.Custom('EaglePersonalityTrait1')] e me fez companhia; não consigo imaginar sair para caçar sem [ROOT.Char.Custom('EagleStorySheHe')].\n\n"
 pet_animal.3020.desc_normal: "Mas esta criatura não foi feita para ser contida por alguém como eu, e o melhor seria deixar[ROOT.Char.Custom('EagleStoryHerHim')] livre para que criasse sua própria descendência. Será este o momento?"
 pet_animal.3020.desc_let_go: "Esse dilema já me foi apresentado antes, e escolhi manter [ROOT.Char.Custom('EagleStoryName')] ao meu lado. Sei que deveria ser livre, mas ainda não parece fraca. Talvez eu deva esperar mais um pouco?"
 pet_animal.3020.desc_let_go_2: "No entanto, faz tempo demais que [ROOT.Char.Custom('EagleStoryName')] está em minhas mãos. Está na hora de libertar[ROOT.Char.Custom('EagleStoryHerHim')]."
 pet_animal.3020.a_tt: "Você solta sua águia na natureza."
 pet_animal.3020.a_second: "Não, a liberdade já está muito atrasada."
 pet_animal.3020.b: "Ainda não posso me separar de [ROOT.Char.Custom('EagleStorySheHe')]."
 pet_animal.3020.b_second: "Ainda lhe restam alguns anos."
 pet_animal.3020.b_tt: "Você mantém sua águia ao seu lado por mais algum tempo, contemplando a liberação para um momento posterior."
 pet_animal.3020.c: "Nunca deixarei [ROOT.Char.Custom('EagleStoryName')] ir!"
 pet_animal.3020.c_tt: "A ideia de devolver sua águia à natureza está completamente fora de questão."
 pet_animal.3020.warning_less: "#warning Isso tem uma pequena chance de afetar a saúde da sua águia.#!"
 pet_animal.3020.warning: "#warning Isso tem uma chance de afetar a saúde da sua águia.#!"
 pet_animal.eagle_weak_title: "A saúde de [ROOT.Char.Custom('EagleStoryName')] piora"
 pet_animal.eagle_unweak_title: "A saúde de [ROOT.Char.Custom('EagleStoryName')] melhora"
 pet_animal.3030.t_eye: "O olho de [ROOT.Char.Custom('EagleStoryName')]"
 pet_animal.3030.t_wing: "A asa de [ROOT.Char.Custom('EagleStoryName')]"
 pet_animal.3030.t_claw: "A garra de [ROOT.Char.Custom('EagleStoryName')]"
 pet_animal.3030.desc_intro: "Ultimamente, percebi que [ROOT.Char.Custom('EagleStoryName')] tem ficado bastante estressada."
 pet_animal.3030.desc_training: "Após nossa última sessão de treino, percebi algo estranho em [ROOT.Char.Custom('EagleStoryName')]."
 pet_animal.3030.desc_eye: "A [ROOT.Char.Custom('EagleStoryName')] tem falhado a precisão habitual e um de seus olhos tem estado mais fechado que o normal. Suspeitando do pior, ergo a mão diante do olho inútil, e [ROOT.Char.Custom('EagleStoryName')] nem sequer reage! Parece estar murcho, o que explicaria seus problemas recentes."
 pet_animal.3030.desc_wing: "[ROOT.Char.Custom('EagleStoryName')] perdeu algumas penas e já não consegue voar tão alto quanto antes. Ao tocar sua asa com suavidade, noto que ela está mais caída do que o normal, o que explicaria seus problemas recentes."
 pet_animal.3030.desc_claw: "Uma [ROOT.Char.Custom('EagleStoryName')] teve uma de suas garras quebrada, e já não consegue agarrar minha manopla com tanta firmeza quanto antes. Ao examinar a garra, percebo que ela está rachada, o que explicaria seus problemas recentes."
 pet_animal.3030.desc_weak: "Isso me preocupa ainda mais, pois [ROOT.Char.Custom('EagleStoryName')] já não estava bem."
 pet_animal.3030.desc_outro: "\n\nUma lesão pode piorar se não for tratada, mas como encontrarei a cura?"
 pet_animal.3030.court_physician: "Se [court_physician.GetFirstName] pode curar os doentes, poderá curar minha águia."
 pet_animal.3030.court_huntsman: "Você entende de animais, não é, [court_huntsman.GetFirstName]?"
 pet_animal.3030.random_smart_courtier: "[random_smart_courtier.GetFirstName] sabe bastante; talvez possa ajudar."
 pet_animal.3030.self: "Eu sei como tratar essa doença."
 pet_animal.3030.none: "Devo deixar a natureza seguir seu curso."
 pet_animal.3030.very_good: "Eles restauram sua águia à saúde total com sucesso."
 pet_animal.3030.good: "Eles tratam a lesão da sua águia."
 pet_animal.3030.good_self: "Você trata com sucesso a lesão da sua águia."
 pet_animal.3030.very_good_self: "Você restaura sua águia à saúde total com sucesso."
 pet_animal.3030.nothing: "Nada do que eles fazem parece ajudar."
 pet_animal.3030.bad: "De alguma forma, eles pioram a condição da sua águia."
 pet_animal.3040.t: "Como Treinar Sua Águia" #corny
 pet_animal.3040.desc: "Com [ROOT.Char.MakeScope.Var('eagle_age_variable').GetValue] anos, [ROOT.Char.Custom('EagleStoryName')] já é muito habilidoso na hora de caçar, mas sempre há espaço para melhorar. Decido passar algum tempo treinando[ROOT.Char.Custom('EagleStoryHerHim')] para ver se pode ficar ainda melhor, ou se eu consigo aprender algo novo sobre [ROOT.Char.Custom('EagleStorySheHe')]."
 pet_animal.3040.training_bad_title: "Sessão de Treinamento Falhada"
 pet_animal.3040.training_good_title: "Sessão de Treinamento Bem-Sucedida"
 pet_animal.3040.training_bad_desc: "A sessão de treinamento vai mal"
 pet_animal.3040.training_good_desc: "A sessão de treinamento vai bem"
 pet_animal.3040.training_very_bad: "E [ROOT.Char.Custom('EagleStoryName')] se machuca no processo"
 pet_animal.3040.training_bad: "[ROOT.Char.Custom('EagleStoryName')] perde um pouco de seu vigor"
 pet_animal.3040.training_neutral: "Mas felizmente, [ROOT.Char.Custom('EagleStoryName')] não se machuca"
 pet_animal.3040.personality_less_effective: "A personalidade da sua águia está #N menos útil#!"
 pet_animal.3040.training_good_generic: "Você e [ROOT.Char.Custom('EagleStoryName')] se tornam um pouco mais habilidosos"
 pet_animal.3040.personality_level: "O caráter [ROOT.Char.Custom('EaglePersonalityTraitTooltip')] de [ROOT.Char.Custom('EagleStoryName')] é #P más servicial#!"
 pet_animal.3040.personality: "Você aprende mais sobre a #bold personalidad#! de [ROOT.Char.Custom('EagleStoryName')]"
 pet_animal.3040.personality_change: "A #bold personalidad#! de [ROOT.Char.Custom('EagleStoryName')] muda"
 pet_animal.3040.personality_change_tooltip: "Sua águia ganha um novo traço de personalidade"
 pet_animal.3040.personality_new_brave: "É bastante audaz"
 pet_animal.3040.personality_new_curious: "Está intrigado(a) com o que o rodeia."
 pet_animal.3040.personality_new_cunning: "Te faz travessuras astutas com você"
 pet_animal.3040.personality_new_loyal: "Fica ao seu lado"
 pet_animal.3040.personality_new_wise: "É mais inteligente que outras aves"
 pet_animal.3040.personality_new_calm: "Não é uma criatura ávida"
 pet_animal.3040.personality_new_aggressive: "É bastante feroz"
 pet_animal.3040.personality_new_observant: "É bastante perspicaz"
 pet_animal.3040.personality_new_protective: "Tem um forte instinto de te proteger"
 pet_animal.3040.personality_bonus_stewardship: "@skill_stewardship_icon! #P Mais propensa#! com o treinamento de [stewardship|lE]"
 pet_animal.3040.personality_bonus_martial: "@skill_martial_icon! #P Mais propenso#! com o treinamento de [martial|lE]"
 pet_animal.3040.personality_bonus_intrigue: "@skill_intrigue_icon! #P Mais propenso#! com o treinamento de [intrigue|lE]"
 pet_animal.3040.personality_bonus_learning: "@skill_learning_icon! #P Mais propenso#! com o treinamento de [learning|lE]"
 pet_animal.3040.personality_bonus_diplomacy: "@skill_diplomacy_icon! #P Mais propenso#! com o treinamento de [diplomacy|lE]"
 pet_animal.3040.martial: "Uma lição no campo de batalha nunca fez mal a nenhum caçador experiente."
 pet_animal.3040.stewardship: "[ROOT.Char.Custom('EagleStorySheHe')|U] saberá sobre as terras do nosso reino e como navegar por elas."
 pet_animal.3040.intrigue: "Para ser um bom caçador, é preciso ser capaz de enganar a presa."
 pet_animal.3040.learning: "O conhecimento é poder, e [ROOT.Char.Custom('EagleStoryName')] será uma ave sábia."
 pet_animal.3040.diplomacy: "Ensinarei a [ROOT.Char.Custom('EagleStoryName')] mais sobre as pessoas."
 pet_animal.3040.money: "Posso destinar algumas moedas para o seu desenvolvimento."
 pet_animal.3040.money_tt: "Você contrata um treinador para ajudar"
 pet_animal.3040.none: "O aprimoramento deve ser deixado ao acaso."
 pet_animal.3050.t: "A Águia do Inimigo"
 pet_animal.3050.desc: "Ao passar por [rival_home.GetName]em uma tarefa, avisto uma águia de aspecto [rival.Custom('EaglePersonalityTraitTooltip')]. Onde já vi essa ave antes…? Ah! É [rival.Custom('EagleStoryName')] a águia de minha [ROOT.Char.Custom2('RelationToMe' , SCOPE.sC('rival'))] [rival.Custom('ES_ElLa')] [rival.GetTitledFirstName|l]!\n\nAo trinar para mim com um olhar penetrante, um sorriso maligno se espalha pelo meu rosto."
 pet_animal.3050.a.tt: "Você tenta ferir a águia de [rival.GetFirstNameNoTooltip]"
 pet_animal.3050.steal: "Vou pegar essa ave para mim!"
 pet_animal.3050.steal.tt: "Você tenta roubar a águia de [rival.GetFirstNameNoTooltip]"
 pet_animal.3050.b: "Vou pegar essa ave para [token_child.GetName]!"
 pet_animal.3050.b.flavor: "Nada de errado em roubar por uma boa causa"
 pet_animal.3050.b.tt: "Você tenta roubar a águia de [rival.GetFirstNameNoTooltip] para [token_child.GetName]"
 pet_animal.3050.good: "Você consegue causar danos a [rival.GetFirstNameNoTooltip]"
 pet_animal.3050.bad: "A águia permanece ilesa"
 pet_animal.3050.c: "Eu poderia ganhar uma boa grana com [rival.Custom('EagleStoryName')]..."
 pet_animal.3050.c_tt: "Você tenta vender a águia do seu rival por uma boa quantia"
 pet_animal.3050.c.tt: "O que é bom para o ganso é bom para o ganso"
 pet_animal.3050.d: "Que fofo!"
 pet_animal.3060.t: "Uma Caçadora em Formação"
 pet_animal.3060.t_girl: "Uma Caçadora em Formação"
 pet_animal.3060.desc_intro: "[token_child.GetName] cresceu e se tornou alguém bastante [token_child.Custom('ComplimentAdjective')] e não poderia estar mais orgulhos[ROOT.Char.Custom('ES_OA')] de [token_child.GetSheHe]. Apesar de suas conquistas, [token_child.GetFirstNameNoTooltip] enfrentará muitos problemas se não lhe ensinarem a caçar corretamente.\n\n"
 pet_animal.3060.desc: "Decido usar minha águia, [ROOT.Char.Custom('EagleStoryName')] para nos ajudar, e assim minha ave pode criar mais carinho por [token_child.GetFirstNameNoTooltip]."
 pet_animal.3060.desc_child: "Por sorte, [token_child.GetFirstNameNoTooltip] aprende rápido, tendo já uma águia própria. [token_child.Custom('EagleStoryName')] é o nome dela, e [token_child.GetNameNoTooltip] já sente muito carinho por [ROOT.Char.Custom('EagleStorySheHe')]."
 pet_animal.3060.a: "Espero que [token_child.GetFirstNameNoTooltip] se torne um grande caçador algum dia!"
 pet_animal.3060.a_girl: "[token_child.GetFirstNameNoTooltip] se tornará uma grande caçadora algum dia!"
 pet_animal.3060.good: "[token_child.GetFirstNameNoTooltip] manuseia bem a águia"
 pet_animal.3060.decent: "[token_child.GetFirstNameNoTooltip] deveria trabalhar um pouco suas habilidades de falcoaria"
 pet_animal.3070.t: "O canto de [ROOT.Char.Custom('EagleStoryName')]"
 pet_animal.3070.desc: "Embora normalmente não mantenha minha águia à vista dos outros, [ROOT.Char.Custom('EagleStoryName')] tem piado alto a semana inteira. Como não quero ouvir esse barulho irritante o dia todo, seu novo lar temporário fica no pátio.\n\nQuando vou ver[ROOT.Char.Custom('EagleStoryHerHim')] mais tarde, encontro [target.GetName] prestando atenção à melodia de [ROOT.Char.Custom('EagleStoryName')]. \"Este pássaro é seu?\", pergunta [target.GetFirstNameNoTooltip] e eu faço um aceno sem muita vontade.\n\n\"[ROOT.Char.Custom('RandomPositiveLookAdjective')|U]!\", exclama, embora eu não possa dizer que concorde."
 pet_animal.3070.a: "Fico feliz que alguém goste disso."
 eagle_funny_sing_modifier: "Solilóquio Aviário"
 pet_animal.3080.t: "O presente de [ROOT.Char.Custom('EagleStoryName')]"
 pet_animal.3080.desc: "Me encontro correndo atrás de [ROOT.Char.Custom('EagleStoryName')] que, de repente, disparou como um raio quando cavalgávamos. Quando finalmente [ROOT.Char.Custom('EagleStoryHerHim')] alcanço, [ROOT.Char.Custom('EagleStorySheHe')] está ocupado com uma criatura peluda e contorcida em suas garras! Impressionad[ROOT.Char.Custom('ES_OA')] com a captura, [ROOT.Char.Custom('EagleStoryHerHim')] deixo com sua presa.\n\n\"SQUAWWW!\", grita enquanto larga a criatura sem vida aos meus pés."
 pet_animal.3080.a: "Que... doce?"
 pet_animal.3199.t: "[ROOT.Char.Custom('EagleStoryName')]: Último Voo"
 pet_animal.3199.desc_intro: "[ROOT.Char.Custom('EagleStoryName')] voou ao meu lado por muitos anos, e o tempo não poupou [ROOT.Char.Custom('EagleStorySheHe')]."
 pet_animal.3199.desc: "Embora me doa dizer, suas penas ficaram opacas e já não consegue mais voar com o vigor que tinha antes."
 pet_animal.3199.desc_dying: "Com a saúde se deteriorando, sei que não estará comigo por muito mais tempo."
 pet_animal.3199.desc_outro: "\n\nTiro o capuz dos olhos de [ROOT.Char.Custom('EagleStoryHerHim')] e o solto no céu. [ROOT.Char.Custom('EagleStoryName')] Sobe alto, e ainda mais alto, mas sei que não voltará."
 pet_animal.3199.a: "Sentirei sua falta, [ROOT.Char.Custom('EagleStoryName')]!"
 artifact_animal_feather_name_eagle: "Pena de [ROOT.Char.Custom('EagleStoryName')]"
 artifact_bird_feather_pet_description: "A pena de uma águia de caça querida, arrancada por [ROOT.Char.Custom('ES_ElLa')] [ROOT.Char.GetTitledFirstName|l]."
