l_spanish:
 peasant_affair.1001.t: "Reencontros Inesperados"
 peasant_affair.1001.desc_opening: "\"Ó, [ROOT.Char.Custom('FormOfAddressForLiege')|U], meu coração não encontraria paz até tornar a encontrar-vos! Sou eu, [peasant_character.GetFirstNameNoTooltip]. Certamente vos lembrais de mim, meu [ROOT.Char.Custom('LoverPetName')]?\".\n\n"
 peasant_affair.1001.desc_child: "Não posso acreditar no que vejo: [Select_CString( peasant_character.IsFemale, 'la hermosa mujer', 'el bello hombre' )] com quem me entreti há muitas luas, [peasant_character.GetMotherFather] de minha querid[peasant_child.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('peasant_child'))], [peasant_child.Custom('ES_ElLa')] [peasant_child.GetTitledFirstName|l], apareceu em minha [ROOT.Char.Custom('GetCourtType')|l]."
 peasant_affair.1001.desc_their_child: "Não acredito no que meus olhos veem: [Select_CString( peasant_character.IsFemale, 'la hermosa mujer', 'el bello hombre' )]com quem me diverti há muitas luas apareceu em minha [ROOT.Char.Custom('GetCourtType')|l]. Ao lado dela está o que parece ser seu [peasant_child.Custom('GetDaughterSon')]e não consigo evitar reagir à idade dele…"
 peasant_affair.1001.desc_rakish_night: "N?o acredito no que vejo: [Select_CString( peasant_character.IsFemale, 'a bela mulher', 'o belo homem' )] com quem me diverti h? muitas luas durante uma noite selvagem de abandono apareceu em minha [ROOT.Char.Custom('GetCourtType')|l]."
 peasant_affair.1001.desc: "Não posso acreditar no que vejo: [Select_CString( peasant_character.IsFemale, 'la hermosa mujer', 'el bello hombre' )] com quem encontrei perto de minha [ROOT.Char.Custom('FortifiedBuilding')] há muitas luas apareceu em minha [ROOT.Char.Custom('GetCourtType')|l]."
 peasant_affair.1001.a_1: "Insisto que você fique aqui como parte da minha [ROOT.Char.Custom('GetCourtType')|l]!"
 peasant_affair.1001.a_2: "[peasant_character.GetFirstNameNoTooltip], não é? Você é bem-vindo para ficar aqui."
 peasant_affair.1001.b: "[peasant_child.GetFirstNameNoTooltip] merece um [peasant_character.GetMotherFather]..."
 peasant_affair.1001.c: "Você não encontrará um lar aqui."
 peasant_affair.2001.t: "A pessoa dos meus sonhos"
 peasant_affair.2001.desc_opening: "Mais uma vez acordo com o coração acelerado e o resquício de um fogo ardente em minhas entranhas.\n\n"
 peasant_affair.2001.desc_rakish_night: "Muitas noites se passaram desde que compartilhei a cama com o belo[peasant_character.Custom('ES_OA')] [peasant_character.GetWomanMan] a quem encontrei em uma das minhas escapadas noturnas, mas meu anseio só cresce…"
 peasant_affair.2001.desc_known_father: "Muitas noites se passaram desde que compartilhei a cama com m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('peasant_character'))], [peasant_character.GetTitledFirstName|l], mas meu desejo só cresce..."
 peasant_affair.2001.desc_unknown_peasant: "Muitas noites se passaram מאז que compartilhei a cama com o/a bel[peasant_character.Custom('ES_OA')] [peasant_character.GetWomanMan] com quem esbarrei longe da minha [ROOT.Char.Custom('FortifiedBuilding')], mas minha saudade só aumenta…"
 peasant_affair.2001.desc_child: "Especialmente porque meu querido[peasant_child.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('peasant_child'))] [peasant_child.GetTitledFirstName|l], o resultado da nossa paixão é uma lembrança constante de[peasant_character.GetSheHe]!"
 peasant_affair.2001.a: "Devo encontrar[peasant_character.GetHerHim]!"
 peasant_affair.2001.a.tt: "#F Comece a busca imediatamente!#!"
 peasant_affair.2001.b: "Seria melhor se eu esquecesse [peasant_character.GetSheHe]."
 peasant_affair.2001.c: "Não vou vacilar, isso é um teste da minha determinação!"
 peasant_affair.2002.desc_opening: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U], não encontramos nenhum vestígio [peasant_character.Custom('ES_DelDela')] camponês[peasant_character.Custom('ES_OA')] que nos fizestes procurar. Com os recursos limitados à minha disposição, é tudo o que posso fazer…\"\n\n"
 peasant_affair.2002.desc_child: "Enquanto meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('searching_character'))], [searching_character.Custom('ES_ElLa')] [searching_character.GetTitledFirstName|l], se inclina e suplica, meus olhos se detêm no rosto curioso do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('peasant_child'))], [peasant_child.Custom('ES_ElLa')] [peasant_child.GetTitledFirstName|l]."
 peasant_affair.2002.desc: "Enquanto meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('searching_character'))], [searching_character.Custom('ES_ElLa')] [searching_character.GetTitledFirstName|l], se curva e se humilha, meus pensamentos vagam até aquela noite mágica…"
 peasant_affair.2002.a: "Deve ser me[peasant_character.Custom('ES_OA')], custe o que custar!"
 peasant_affair.2002.b: "Certamente nenhum camponês vale tanto assim."
 peasant_affair.2003.desc_opening: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], eu vos apresento [peasant_character.Custom('ES_AlAla')] [peasant_character.GetTitledFirstName|l], trazido perante vossa insistência.\n\n"
 peasant_affair.2003.desc_dead_brought_child: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U], trago notícias. Infelizmente, a pessoa que nos mandastes procurar deixou este mundo, mas trouxemos a vós seu [peasant_child.Custom('GetDaughterSon')]\".\n\nQue brincadeira cruel, encontrar[peasant_character.GetHerHim] enfim apenas para perder[peasant_character.GetHerHim] para sempre! Mas esse[peasant_child.Custom('ES_EA')] [peasant_child.Custom('GirlBoy')], poderia ser meu[peasant_child.Custom('ES_OA')]…?"
 peasant_affair.2003.desc_dead: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], trago notícias. Infelizmente, a pessoa que nos mandastes procurar deixou este mundo.\n\nQue brincadeira cruel do destino, encontrar [peasant_character.GetHerHim] por fim só para perder [peasant_character.GetHerHim] para sempre!"
 peasant_affair.2003.desc_dislike: "[Select_CString( peasant_character.IsFemale, 'La mujer', 'El hombre' )]dos meus sonhos luta contra a presa [searching_character.Custom('ES_DelDela')] [searching_character.GetTitledFirstName|l], com o rosto contorcido de raiva e medo.\n\n\"Por favor, meu [ROOT.Char.GetLadyLord] , deixem-me ir! Aquela noite foi um erro, só desejo ser deixado em paz.\""
 peasant_affair.2003.desc_dislike_their_child: "[Select_CString( peasant_character.IsFemale, 'La campesina', 'El campesino' )] da peoa dos meus sonhos luta contra a presa [searching_character.Custom('ES_DelDela')] [searching_character.GetTitledFirstName|l], com o rosto distorcido de raiva e medo enquanto aperta seu [peasant_child.Custom('GetDaughterSon')] junto ao corpo.\n\n“Por favor, [ROOT.Char.Custom('FormOfAddressForLiege')], deixai-nos ir! Só desejo criar a #EMP mi#! [peasant_child.Custom('GetDaughterSon')] eu so[peasant_character.Custom('ES_OA')].”"
 peasant_affair.2003.desc_their_child: "Finalmente! Quando aparece diante de mim, é como se o tempo que compartilhamos nunca tivesse acabado. No entanto, ao lado dele está quem parece ser seu [peasant_child.Custom('GetDaughterSon')] e não posso evitar reagir à idade que tem…"
 peasant_affair.2003.desc: "Por fim! Quando aparece diante de mim, é como se o tempo que compartilhamos nunca tivesse acabado. Pelo sorriso caloroso de [peasant_character.GetSheHe] também não me esqueceu."
 peasant_affair.2003.a_alive: "Por favor, [peasant_character.GetFirstNameNoTooltip], fique aqui em [ROOT.Char.Custom('GetCourtType')|l]."
 peasant_affair.2003.a_dead: "Por favor, [peasant_child.GetFirstNameNoTooltip], fique aqui em [ROOT.Char.Custom('GetCourtType')|l]."
 peasant_affair.2003.b: "[peasant_child.GetFirstNameNoTooltip], filh[peasant_child.Custom('ES_OA')] meu[peasant_child.Custom('ES_OA')], quero que você conheça seu [peasant_character.GetMotherFather]."
 peasant_affair.2003.c: "Agora que você finalmente está aqui… detenha[peasant_character.Custom('ES_LoLa')]!"
 peasant_affair.2003.c.tt: "#F Um[peasant_character.Custom('ES_XA')] [peasant_character.GetWomanMan] com tal poder contra mim n?o pode andar livre!#!"
 peasant_affair.2003.d: "Mande essa criança embora!"
 peasant_affair.2003.d.tt: "#F Vamos simplesmente esquecer toda essa confusão.#!"
 peasant_affair.2003.e: "Que destino cruel!"
 peasant_affair.2003.f: "É meu filh[peasant_child.Custom('ES_OA')] meu[peasant_child.Custom('ES_OA')] , não é? Leve[peasant_child.GetHerHim]!"
 peasant_affair.2003.g: "Solte [peasant_character.GetHerHim] agora mesmo! Você está livre para ir."
 peasant_affair.2004.desc_opening: "\"[ROOT.Char.Custom('FormOfAddressForLiege')|U], não há nem rastro da pessoa que nos mandastes procurar. Sinceramente, é provável que ela já tenha morrido…\"\n\n"
 peasant_affair.2004.a: "Nunca mais ver seu rosto... Que suplício!"
 peasant_affair.3001.t: "Um Pedido Tão Pequeno"
 peasant_affair.3001.available_desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('peasant_character'))] [peasant_character.GetFirstName]se aproxima de mim com o que ele/ela acha ser um pedido humilde.\n\n\"Sabeis que [peasant_child.GetTitledFirstName|l] é filh[peasant_child.Custom('ES_OA')] vosso[peasant_child.Custom('ES_OA')]. Por favor, reconhecei[peasant_child.GetHerHim] como parte de vosso linhagem\"."
 peasant_affair.3001.unavailable_desc: "\n\nSerá que não percebe que, com meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('other_spouse'))] [other_spouse.GetTitledFirstName|l], a situação não está totalmente em minhas mãos?"
 peasant_affair.3001.a: "Vou reconhecer [peasant_child.GetTitledFirstNameNoTooltip|l] como meu sangue e nome."
 peasant_affair.3001.b: "A criança pode ser do meu sangue, mas não terá o meu nome."
 peasant_affair.3001.c: "De fato, o bastardo é meu."
 peasant_affair.3001.d: "Nunca farei uma coisa dessas!"
 peasant_affair.3001.d.tt: "Deixo claro a [peasant_character.GetTitledFirstNameNoTooltip|l] que isso nunca acontecerá."
 peasant_affair.3002.t: "Um Pedido Tão Pequeno"
 peasant_affair.3002.available_desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('peasant_character'))] [peasant_character.GetFirstName] se aproxima de mim com o que ele acha ser um pedido humilde.\n\n\"Você sabe tão bem quanto eu que [peasant_child.GetTitledFirstName|l] é meu[peasant_child.Custom('ES_OA')]. Eu lhe imploro, por favor, deixe isso ser conhecido.\""
 peasant_affair.3002.unavailable_desc: "\n\nSerá que não sabe que, com meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('other_spouse'))] [other_spouse.GetTitledFirstName|l], as coisas não são tão simples?"
 peasant_affair.3002.a: "É justo que conheça sua linhagem."
 peasant_affair.3002.b: "Não, eu nunca poderia."
 peasant_affair.3003.t: "Uma Lembrança"
 peasant_affair.3003.desc: "\"Certamente você se lembra do tempo que passamos juntos tanto quanto eu, não é?\" [peasant_character.GetTitledFirstName|l] me encontrou a sós em um corredor. Ele se aproxima de mim para sussurrar ao meu ouvido, \"Não posso abrir mão… do que tivemos.\""
 peasant_affair.3003.a: "[ROOT.Char.GetFaith.HighGodName] me ajude, como poderia dizer não?"
 peasant_affair.3003.b: "É perigoso até mesmo sermos vistos juntos!"
 peasant_affair.3004.t: "Uma Oportunidade"
 peasant_affair.3004.desc: "[peasant_character.GetTitledFirstName] parece pensativo[peasant_character.Custom('ES_OA')] enquanto [peasant_character.Custom('quirk_pos_present')]. \"Vocês precisam de um[peasant_character.Custom('ES_XA')] [peasant_character.Custom('WifeHusband')]\", diz por fim. \"Sei que não sou de nobre nascimento, mas pensem em tudo o que compartilhamos…\""
 peasant_affair.3004.a: "Só poderia ser você."
 peasant_affair.3004.b: "Nós não podemos nos casar, mas isso não significa que não podemos ficar juntos."
 peasant_affair.3004.c: "Não podes ser meu [peasant_character.Custom('WifeHusband')], mas me pertences."
 peasant_affair.3004.d: "O casamento está fora de questão."
