l_spanish:
 adultery.0002.t: "Outra Pessoa"
 adultery.0002.consort_start.desc: "[lover_spouse.Custom2('MyCharacterIntroduction', ROOT.Char)|U] também não se encontra em nossa [ROOT.Char.Custom('GetChamber')|l] esta noite. [lover_spouse.GetSheHe|U] está distante ultimamente… Está pensativ[lover_spouse.Custom('ES_OA')] e quase nunca está na [ROOT.Char.Custom('GetCourt')|l]."
 adultery.0002.soulmate_start.desc: "Já faz muito tempo desde a última vez que tive a [lover_spouse.Custom2('MyCharacterIntroduction', ROOT.Char)] entre meus braços. Ultimamente está distante… Ela/Ele me dá uma desculpa atrás da outra para não podermos nos encontrar."
 adultery.0002.desc: "\n\nSerá que não sou do agrado dele? Será que ele está simplesmente ocupado? Ou será que ele pode estar esquentando a cama de outra pessoa…?"
 adultery.0002.a: "\"Você tem outra pessoa, [lover_spouse.GetFirstNameNoTooltip]?\""
 adultery.0002.a.tt: "Eu enfrento a [lover_spouse.GetTitledFirstNameNoTooltip|l]"
 adultery.0002.b: "Vou investigar isso por conta própria."
 adultery.0002.b.tt: "Se [lover_spouse.Custom('ES_ElElla')] foi infiel, eu ficarei sabendo disso"
 adultery.0002.b.success: "Descubro com sucesso sobre a vida amorosa"
 adultery.0002.b.success.innocent: "[lover_spouse.GetTitledFirstName] é inocente"
 adultery.0002.b.failure: "Não encontro provas de infidelidade"
 adultery.0002.c: "Cada movimento será vigiado."
 adultery.0002.c.tt: "Meu [spymaster|lE] continuará espionando [lover_spouse.GetShortUIName]"
 adultery.0002.d: "![lover_spouse.Custom('ES_ElElla')|U] jamais desrespeitaria a santidade do nosso casamento!"
 adultery.0002.d.concubine_or_soulmate: "Nunca me desrespeitaria assim!"
 adultery.0003.t: "Acusações"
 adultery.0003.desc: "[spouse.Custom2('MyCharacterIntroduction', ROOT.Char)|U] tem estado tens[spouse.Custom('ES_OA')] há algum tempo, e, quando nos encontramos a sós, fica claro para mim o motivo.\n\n"Seja sincer[ROOT.Char.Custom('ES_OA')] comigo", diz [spouse.Custom('ES_ElElla')] em tom grave. "Tem outra pessoa? Você tem um[ROOT.Char.Custom('ES_XAOpp')] amante?""
 adultery.0003.a: "Claro que não!"
 adultery.0003.a.tt_lie: "Espero que acredite…"
 adultery.0003.a.tt_truth: "Que chegue a suspeitar de algo assim…"
 adultery.0003.b: "Eu pensei que você não tivesse percebido..."
 adultery.0003.b.tt: "Talvez ela te perdoe, ou talvez não…"
 adultery.0004.desc: ""Como pode dizer uma coisa dessas, [spouse.GetFirstNameNoTooltip]? Eu jamais teria um[lover_spouse.Custom('ES_XAOpp')] amante!".\n\n[lover_spouse.GetTitledFirstName|l] parece realmente muito contrariad[lover_spouse.Custom('ES_OA')] por ter de negar as acusações."
 adultery.0004.b: "Não tenho escolha a não ser acreditar n."
 adultery.0004.b.malicious: "Por enquanto..."
 #Shares some text with infidelity_confrontation.1000, the event for discovering a lover secret
 adultery.0006.apologetic_start.desc: "[lover_spouse.GetFirstNameNoTooltip] permanece em silêncio, como se tivesse congelado, mas noto isso em seu olhar. Meus medos são verdadeiros. Eu também pareço ter congelado[ROOT.Char.Custom('ES_OA')], exceto em meu coração, que bate com força.\n\nAs palavras enfim escapam dos lábios de [lover_spouse.GetFirstNameNoTooltip], assim como as lágrimas de seus olhos. \"Por favor, [lover_spouse.Custom2('RelationToMe', SCOPE.sC('spouse'))] meu[ROOT.Char.Custom('ES_OA')], você precisa me perdoar. Eu imploro! Eu... eu contarei tudo. Compartilhei minha cama com"
 adultery.0006.your_lovername.desc: "[sex_partner.Custom2('YourCharacterIntroductionNoComma', ROOT.Char)]."
 adultery.0006.my_lovername.desc: "[sex_partner.Custom2('MyCharacterIntroductionNoComma', lover_spouse)]."
 adultery.0006.unapologetic_start.desc: "[lover_spouse.GetFirstNameNoTooltip] não esperava minha acusação, isso está claro. Mas o susto não dura muito.\n\nVocês demoraram um tempão para perceber, #EMP [lover_spouse.Custom2('RelationToMe', SCOPE.sC('spouse'))]#!. Suas palavras pingam veneno. Sim, tenho me deitado com…"
 adultery.0006.male_lover.desc: "um homem sem importância. Eu nem sei o nome dele."
 adultery.0006.female_lover.desc: "uma mulher sem importância. Eu nem sei o nome dela."
 adultery.0006.apologetic_end.desc: "Aconteceu apenas uma vez, juro!"
 adultery.0006.unapologetic_end.desc: "Aconteceu apenas uma vez, mas confie nas minhas palavras. Eu faria de novo com prazer."
 adultery.0006.a: "Todos saberão da sua traição, [lover_spouse.Custom2('InsultNounSexual', ROOT.Char)]!"
 adultery.0006.b: "Eu te perdoo. Dessa vez."
 adultery.0006.c: "Si pierdo la confianza, ¿qué nos queda ya?"
 adultery.0007.start.desc: "Meus receios não eram infundados. Encontrei provas da infidelidade de [lover_spouse.GetFirstNameNoTooltip]!\n\n"
 adultery.0007.lover_my.desc: "Est[lover_spouse.Custom('ES_EA')] [lover_spouse.Custom2('InsultNoun', ROOT.Char)] mentiros[lover_spouse.Custom('ES_OA')] recebeu [sex_partner.Custom2('MyCharacterIntroduction', ROOT.Char)] na própria cama."
 adultery.0007.lover_herhis.desc: "Est[lover_spouse.Custom('ES_EA')] [lover_spouse.Custom2('InsultNoun', ROOT.Char)] mentiros[lover_spouse.Custom('ES_OA')] recebeu [sex_partner.Custom2('HerHisCharacterIntroduction', lover_spouse)] em sua cama."
 adultery.0007.male_lover.desc: "Se maculou com um plebeu vulgar, um homem sem importância."
 adultery.0007.female_lover.desc: "Se manchou com uma plebeia vulgar, uma mulher sem importância."
 adultery.0007.end.desc: "Pelo que posso perceber, aconteceu apenas uma vez. É pouco consolo diante da traição…"
 adultery.0008.t: "Descoberto"
 adultery.0008.sex_partner.desc: "Eu pensei que tinha sido tão cuidadoso, que não havia evidências do meu pequeno caso com [sex_partner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]. No entanto, de alguma forma incompreensível, [spouse.Custom2('MyCharacterIntroduction', ROOT.Char)] descobriu e expôs nosso segredo para o mundo!"
 adultery.0008.no_sex_partner.desc: "Eu pensei que tinha sido tão cuidadoso, que não havia evidências do meu pequeno caso. No entanto, de alguma forma incompreensível, [spouse.Custom2('MyCharacterIntroduction', ROOT.Char)] descobriu meu caso e o expôs para o mundo!"
 adultery.0008.a: "[ROOT.Char.Custom('CulturalCurse')|U]!"
 adultery.0009.desc: "Suas lágrimas doem mais do que qualquer palavra. A desolação me invade quando ela esconde o rosto atrás de um lenço.\n\n“Eu... Eu achava que o nosso amor seria para sempre”, sussurra entre soluços. “Prometemos. O #EMP prometiste#! prometeu, [ROOT.Char.GetFirstNameNoTooltip] e, ainda assim, você compartilhou sua cama com outra pessoa. Não posso mais confiar em você. Acabou.”"
 adultery.0009.a: "Eu sou um tolo..."
 adultery.1001.t: "Uma Questão de Lealdade"
 adultery.1001.opening: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('mother'))]. [mother.GetTitledFirstName|l] está grávida e eu deveria estar radiante. No entanto, tem agido de um modo estranho, e não consigo me livrar da sensação de que algo está errado.\n\n"
 adultery.1001.default: "Sou mesmo o pai, como ela afirma, ou ela traiu nossa união?"
 adultery.1001.hard_to_believe: "É difícil acreditar que [mother.GetSheHe] jamais me trairia assim, mas será que eu não sou o pai?"
 adultery.1001.easy_to_believe: "Parece muito provável que [mother.GetSheHe] me tenha traído e que eu não seja o pai do seu filho."
 adultery.1001.desc_sadistic: "Não descartaria que tivesse concebido o filho de outra pessoa apenas para me torturar."
 adultery.1001.desc_lustful: "Sempre me preocupou que o apetite insaciável dela fosse algo geral e não apenas para mim. Será que a criança pode ser de outra pessoa?"
 adultery.1001.desc_deceitful: "[mother.GetSheHe|U] afirma que sou o pai, mas já mentiu para mim muitas vezes."
 adultery.1001.desc_root_trusting: "Suspeito que talvez eu não seja o pai, mas… [mother.Custom('ES_ElElla')|l] nunca me ocultaria algo assim, não é?"
 adultery.1001.desc_root_lunatic: "Eles sussurraram para mim. Eu entendo. Eu acho que entendo. Como eu poderia ser o pai daquela coisa dentro dela? Aquela coisa cruel e aterrorizante?"
 adultery.1001.desc_lunatic: "[mother.GetSheHe|U] afirma que sou o pai, mas também diz que as sombras falam com ela."
 adultery.1001.a: "[mother.GetSheHe|U] deve me dizer!"
 adultery.1001.a.tt: "Enfrento [mother.GetFirstNameNoTooltip]"
 adultery.1001.b: "Vou investigar isso discretamente."
 adultery.1001.b_no_scheme: "Devo investigar isso mais tarde..."
 adultery.1001.b_cannot_start_scheme: "#F Não tenho tempo para investigar isso agora, mas vou me lembrar...#!"
 adultery.1001.c: "Eu devo ser o pai. Com certeza."
 adultery.1001.c.tt: "#F Por que devo me preocupar com algo que não é verdade?#!"
 adultery.1002.t: "Uma Suspeita Furtiva"
 adultery.1002.desc_paranoid: ""Eu sei que a criança não é realmente minha!" Os olhos da minha [spouse.Custom('WifeHusband')] se abrem bem ao fazer a acusação. "De quem é?", insiste. "De quem?""
 adultery.1002.desc_chaste: ""O filho que você carrega é realmente meu?", pergunta minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))]. "Sei que minha devoção como [spouse.GetWomanMan]… tem sido a [spouse.GetFaith.HighGodName] antes de qualquer outra coisa"."
 adultery.1002.desc_craven: ""A... A criança é realmente minha?" Meu/minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('adultery_spouse'))] parece ter medo da resposta."
 adultery.1002.desc_vengeful: ""É mesmo meu o filho que você carrega?", pergunta meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('adultery_spouse'))]. "Juro por [adultery_spouse.GetFaith.HighGodName] que, se você mentir para mim…"."
 adultery.1002.desc_compassionate: ""A criança que você carrega é realmente minha?" meu/minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('adultery_spouse'))] pergunta. "Eu não quero que você sofra, não importa o que você tenha feito.""
 adultery.1002.worried: ""Diga-me, é mesmo meu?" [adultery_spouse.GetTitledFirstName|l] parece turbad[adultery_spouse.Custom('ES_OA')]. O olhar preocupado de meu/minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('adultery_spouse'))] se cruza com o meu."
 adultery.1002.desc_sadistic: ""Você não teria engravidado com outro[spouse.Custom('ES_OA')] [spouse.GetWomanMan], teria?". Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))] me observa com atenção. "Você sabe que isso seria quase tão ruim para você quanto mentir para mim, não sabe?", diz com um sorriso."
 adultery.1002.desc_lunatic: ""O filho é meu?!" [adultery_spouse.GetTitledFirstName|l] revira os olhos violentamente na cabeça. "Eles vão me contar, você sabe!"."
 adultery.1002.conclusion: "\n\nEu [ROOT.Char.Custom2('QuirkPersonalTowardsOther', SCOPE.sC('adultery_spouse'))]."
 adultery.1002.a: "Eu preciso te contar a verdade."
 adultery.1002.a.confession_tt: "[adultery_spouse.GetShortUIName] vai descobrir a verdade"
 adultery.1002.b: "Claro que é seu, [adultery_spouse.GetFirstNameNoTooltip]!"
 adultery.1002.b.tt: "#F Con suerte, no hará más preguntas.#!"
 adultery.1002.c: "Claro que é seu, [adultery_spouse.GetFirstNameNoTooltip]!"
 adultery.1002.c.tt: "#F [adultery_spouse.Custom('ES_ElElla')|U] certamente deve acreditar que é!#!"
 adultery.1003.desc: "\"Claro que a criança é sua.\" [mother.GetFirstName] [ROOT.Char.Custom2('QuirkPresentPosOrNeg', SCOPE.sC('mother'))]. \"Por que você pensaria de outra forma?\""
 adultery.1003.a: "Só precisava que [mother.Custom('ES_ElElla')] dissesse isso."
 adultery.1003.a.tt: "#F É reconfortante saber.#!"
 adultery.1003.b: "Eu não acredito em você!"
 adultery.1003.duel_success: "Descobrir a verdade"
 adultery.1003.duel_success_tt: "Se o pai da criança que [mother.GetFirstNameNoTooltip] está esperando for outro, encontrarei provas de sua infidelidade"
 adultery.1003.duel_failure: "Agentes descobertos"
 adultery.1004.default_reaction: "As lágrimas se acumulam nos olhos de [mother.GetTitledFirstName|l]."
 adultery.1004.reaction_callous: "[mother.GetTitledFirstName] me encara, o rosto imóvel."
 adultery.1004.reaction_sadistic: "[mother.GetTitledFirstName] me dá um sorriso sarcástico."
 adultery.1004.reaction_gluttonous: "[mother.GetTitledFirstName] tenta esconder as lágrimas que surgem em seus olhos atrás de seu pãozinho doce."
 adultery.1004.reaction_deceitful: "\"Estou tão cansada de mentir.\" [mother.GetTitledFirstName|l] parece à beira das lágrimas."
 adultery.1004.reaction_compassionate: ""Você deveria se sentar, meu bem". Há verdadeira preocupação nos olhos [mother.Custom('ES_DelDela')][mother.GetTitledFirstName|l]."
 adultery.1004.reaction_honest: ""Não quero mentir, nem a você nem a ninguém". Os olhos [mother.Custom('ES_DelDela')] [mother.GetTitledFirstName|l] estão vermelhos de tanto chorar."
 adultery.1004.reaction_lunatic: "[mother.GetTitledFirstName] parece estranhamente lúcid[mother.Custom('ES_OA')] quando me olha. Então seu olhar fica enevoado. “Os sussurros já lhe contaram?”"
 adultery.1004.reaction_positive_opinion: ""Você tem que entender, eu nunca quis te magoar". As lágrimas escorrem pelo rosto [mother.Custom('ES_DelDela')] [mother.GetTitledFirstName|l]."
 adultery.1004.reaction_negative_opinion: "Os lábios [mother.Custom('ES_DelDela')] [mother.GetTitledFirstName|l] formam uma linha fina em sua expressão rígida. Sabe? É quase um alívio."
 adultery.1004.default_admission: "\n\nApós um longo silêncio, [mother.Custom('ES_ElElla')] finalmente admite. [real_father.GetTitledFirstName|l] é o verdadeiro pai do meu filho."
 adultery.1004.a: "Como isso pode ser? Preciso de tempo para pensar."
 adultery.1004.a.tt: "Guardo o segredo para mim. Por enquanto."
 adultery.1004.b: "Esse segredo deve ficar entre nós!"
 adultery.1004.c: "Todos saberão da sua infidelidade!"
 adultery.1006.t: "[adultery_spouse.Custom('ES_ElElla')|U] sabe"
 adultery.1006.very_positive_opinion: ""Sim, [real_father.GetTitledFirstName|l] é o pai". Foi quase um alívio não ter que continuar escondendo esse segredo dele."
 adultery.1006.very_negative_opinion: "\"Sim, [real_father.GetTitledFirstName|l] é o pai.\" Não pude deixar de aproveitar para esfregar isso na cara."
 adultery.1006.fallback: "\"Sim, [real_father.GetTitledFirstName|l] é o pai...\" Fui deixado sem escolha além de confessar."
 adultery.1006.conclusion: "\n\nAo menos só meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('adultery_spouse'))]."
 adultery.1006.a: "E agora, o que acontece?"
 adultery.1009.t: "Suspeitas Descartadas"
 adultery.1009.desc: "Parece que meus medos eram infundados. Apesar de todos os esforços dos meus espiões, não encontrei nenhum indício de que [mother.GetTitledFirstName|l] tenha sido infiel.\n\nInfelizmente, [mother.GetSheHe] tomou conhecimento das minhas suspeitas e está muito decepcionad[mother.Custom('ES_OA')] comigo."
 adultery.1009.a: "Claro que eu sempre confiei em você, querida!"
 adultery.1009.a.flavor_tt: "Eu apenas precisava ter certeza."
 adultery.2001.t: "M [adultery_child.Custom('GetDaughterSon')|U]"
 adultery.2001.desc_dislike: "Às vezes tenho dúvidas sobre [adultery_child.GetTitledFirstName|l]. As coisas que diz, sua personalidade irritante, a maneira como sempre consegue me tirar do sério... É tão alhe[adultery_child.Custom('ES_OA')] a mim quanto qualquer um dos meus súditos comuns."
 adultery.2001.desc_suspicious_mother: "Meu/minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('adultery_spouse'))] [adultery_spouse.GetTitledFirstName|l] esconde algo sobre noss[adultery_child.Custom('ES_OA')] [adultery_child.Custom('GetDaughterSon')], estou convencid[ROOT.Char.Custom('ES_OA')]! Os olhares furtivos, o protecionismo de [adultery_child.GetTitledFirstName|l], o modo como [adultery_spouse.GetSheHe] evita minhas perguntas..."
 adultery.2001.desc_mother_lover: "Desde que descobri que meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('adultery_spouse'))] [adultery_spouse.GetTitledFirstName|l] havia sido infiel à nossa união, olho com suspeita para todos que se aproximam dele; para cada cortesão, meu [ROOT.Char.Custom('ChildChildrenGender')]…"
 adultery.2001.desc_fallback: "Sempre que falo sobre [adultery_child.GetTitledFirstName|l] com meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('adultery_spouse'))] [adultery_spouse.GetTitledFirstName|l], no início ela se distancia. A princípio, não dei importância, mas agora começo a suspeitar que [adultery_spouse.GetFirstName] está escondendo algo."
 adultery.2001.desc_end: "\n\nNão questiono a origem de meu[adultery_child.Custom('GetDaughterSon')] [adultery_child.GetTitledFirstName|l] levemente, mas a dúvida me corrói."
 adultery.2001.a: "Preciso ter certeza[ROOT.Char.Custom('ES_OA')]!"
 adultery.2001.b: "É claro que é minha [adultery_child.Custom('GetDaughterSon')]."
 adultery.2001.a.tt: "Se [adultery_child.GetFirstNameNoTooltip] não é meu filho legítimo:"
 adultery.2001.a.duel_success: "Espio com sucesso minha família"
 adultery.2001.a.duel_success.tooltip: "Você descobre a verdade, seja ela qual for"
 adultery.2001.a.duel_failure: "Fui pego tentando descobrir a verdade"
 adultery.2002.t_a: "Nosso Filho"
 adultery.2002.desc_no_child: "Saúdo meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('adultery_spouse'))] [adultery_spouse.GetTitledFirstName|l] quando caminha pelo jardim, mas [adultery_spouse.GetSheHe] se vira de forma ostensiva.\n\nParece que minhas preocupações iniciais sobre sua fidelidade não passaram de desconfianças. No entanto, não acho que [adultery_spouse.GetFirstNameNoTooltip] vá se esquecer delas tão cedo."
 adultery.2002.desc_not_born: "Saúdo meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('adultery_spouse'))] [adultery_spouse.GetTitledFirstName|l] quando passeia pelo jardim, mas [adultery_spouse.GetSheHe] se vira de forma ostensiva.\n\nParece que minhas desconfianças iniciais sobre sua fidelidade não passaram de receios. No entanto, não creio que [adultery_spouse.GetFirstNameNoTooltip] o esqueça tão cedo."
 adultery.2002.desc_spouse: "Saúdo meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('adultery_spouse'))] [adultery_spouse.GetTitledFirstName|l] quando passeia pelo jardim, mas se vira de forma ostensiva.\n\nMinhas apreensões iniciais sobre a linhagem de [adultery_child.GetTitledFirstName|l] ficaram só nisso, mas não acho que [adultery_spouse.GetTitledFirstName|l] vá esquecer isso tão cedo."
 adultery.2002.desc: "Saúdo meu [adultery_child.Custom('GetDaughterSon')] [adultery_child.GetTitledFirstName|l] quando caminha pelo jardim e tento dissipar minhas sombrias dúvidas.\n\nMinhas preocupações iniciais sobre a linhagem de [adultery_child.GetTitledFirstName|l] se resumiram a isso, mas não creio que [adultery_child.GetSheHe] esqueça isso tão cedo."
 adultery.2002.a_spouse: "Se eles acham que podem me esconder coisas, estão enganados!"
 adultery.2002.a_unborn: "[adultery_spouse.GetSheHe|U] não pode me esconder nada!"
 adultery.2002.a: "[adultery_child.GetSheHe|U] não pode me esconder nada!"
 adultery.2002.a_spouse_tt: "#F Vou observá-los ainda mais de perto!#!"
 adultery.2002.a.tt_unborn: "#F [adultery_spouse.Custom('ES_LoLa')|U] vigilaré aún más de cerca!#!"
 adultery.2002.a.tt: "#F [adultery_child.Custom('ES_LoLa')|U] vigilaré aún más de cerca!#!"
 adultery.2002.b: "Que alívio!"
 adultery.2003.desc: "Sim, pa… [ROOT.Char.GetFirstNameNoTooltip], [real_father.GetTitledFirstName|l] é meu verdadeir[real_father.Custom('ES_OA')] [real_father.Custom('MotherFather')]!\n\nA dor da traição da minha [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('adultery_spouse'))] [adultery_spouse.GetTitledFirstName|l] quase fica ofuscada pelo alívio de finalmente saber a verdade. E pensar que [adultery_spouse.GetSheHe] e [adultery_child.GetFirstName] me esconderam isso…"
 adultery.2003.a: "Como eles puderam me enganar assim?!"
 adultery.2006.t: "Minha Herança"
 adultery.2006.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('owner'))] [owner.GetTitledFirstName|l] soube que eu sou [ROOT.Char.Custom('GetDaughterSon')] do meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('real_father'))] [real_father.GetTitledFirstName|l] e não de [owner.Custom('ES_ElElla')]! Pelo menos isso ainda não é de conhecimento geral… ainda."
 adultery.2006.a: "Como vou conseguir encarar[owner.GetHerHim] agora?"
 adultery.2008.t: "Meu/minha [adultery_child.Custom('GetDaughterSon')|U]?"
 adultery.2008.desc: "Esse medo que crescia em meu peito sempre esteve justificado!\n\nMeus espiões descobriram que não sou o pai de [adultery_child.GetTitledFirstName|l]. ! É o resultado de uma união ilícita entre [adultery_spouse.GetFirstName] e [real_father.Custom2('MyCharacterIntroduction', ROOT.Char)]!"
 adultery.2008.a: "Que todos saibam — essa não é minha filha!"
 adultery.2008.b: "Preciso de tempo para pensar."
 adultery.2008.b.tt: "Guardo isso para mim por enquanto"
 adultery.2009.t: "Meu/minha [adultery_child.Custom('GetDaughterSon')|U]?"
 adultery.2009.desc: "Apesar de seguir [adultery_child.Custom('ES_AlAla')] [adultery_child.GetTitledFirstName|l] por toda parte, meus espiões não encontraram nenhum indício pelo qual eu deva suspeitar de sua linhagem.\n\nInfelizmente, [adultery_child.GetFirstNameNoTooltip] continua furios[adultery_child.Custom('ES_OA')] porque cheguei a nutrir suspeitas."
 adultery.2009.a: "Então, afinal, ele é meu filh[adultery_child.Custom('ES_OA')] de mim[adultery_child.Custom('ES_OA')]."
 adultery.3001.t: "O Segredo"
 adultery.3001.desc: "«Ah![ROOT.Char.Custom('GetDaughterSon')|U] meu[ROOT.Char.Custom('ES_OA')]! Meu querido[ROOT.Char.Custom('ES_OA')] meu[ROOT.Char.Custom('ES_OA')], eu tinha que te contar! Você vai conseguir me perdoar?».\n\nMinha mãe está no chão e as lágrimas correm pelo seu rosto. Eu não sei o que dizer."
 adultery.3001.desc_father: "[father.GetFirstName], que eu sempre achei que era meu pai, não tem nenhum parentesco comigo. Meu verdadeiro progenitor é [real_father.GetTitledFirstName|l]!"
 adultery.3001.desc_no_father: "M [real_father.Custom('MotherFather')] é o [real_father.GetTitledFirstName|l]!"
