l_spanish:
 friendship.0001.t: "Afastando-se"
 friendship.0001.desc_opening: "Tempos e pessoas mudam. Às vezes, aqueles que estão mais próximos de nós parecem se tornar estranhos.\n\n\"[ROOT.Char.GetTitledFirstNameNoTooltip|l],\" [friend_in_question.Custom2('MyCharacterIntroduction', ROOT.Char)] sorri tristemente."
 friendship.0001.desc_murder: "\"Você cometer um assassinato... Sinto que não há mais amizade entre nós.\""
 friendship.0001.desc: "\"Sinto que não há mais amizade entre nós.\""
 friendship.0001.a: "É o jeito das coisas."
 friendship.0001.b: "Mas... Lembre-se de todos os bons momentos!"
 friendship.0001.b.tt: "[friend_in_question.GetSheHe|U] dará outra chance ao nosso relacionamento"
 friendship.0002.t: "Afastando-se"
 friendship.0002.desc: "Tempos e as pessoas mudam. Às vezes, as pessoas mais próximas se tornam estranhas.\n\nEstá claro que a [first_friend.GetTitledFirstName|l] e a mim já não nos une uma amizade."
 friendship.0002.a: "É o jeito das coisas."
 friendship.0003.t: "Algo Mais"
 friendship.0003.desc_intro: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('friend_as_potential_lover'))]"
 friendship.0004.desc_intro: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('first_friend'))]"
 friendship.0003.desc: "[friend_as_potential_lover.GetTitledFirstName] é muito importante para mim. Descubro que penso muito em [friend_as_potential_lover.GetHerHim] e às vezes mal suporto a distância que nos separa.\n\nIsso é uma medida da profundidade da nossa amizade, ou algo mais?"
 friendship.0003.a: "Deveria escrever para ele/ela, sempre me dá bons conselhos."
 friendship.0003.goes_for_it_tooltip: "Você confessa o que sente por [friend_as_potential_lover.GetTitledFirstName|l]"
 friendship.0003.b: "Não, somos apenas amigos e nada mais."
 friendship.0004.desc: "[first_friend.GetTitledFirstName] é tão importante para mim que me pego pensando muito em [first_friend.GetSheHe] e às vezes não suporto a distância que nos separa.\nIsso é um sinal da profundidade da nossa amizade ou algo mais?"
 friendship.0004.a: "Ah, não posso negar mais esse desejo!"
 friendship.0004.goes_for_it_tooltip: "Com o coração na mão, você decide confessar seus sentimentos"
 friendship.0004.b: "Não, somos bons amigos e só isso."
 friendship.0005.t: "Uma Rejeição Cuidadosa"
 friendship.0005.desc: "Embora eu tenha tentado ser ambígu[ROOT.Char.Custom('ES_OA')], [friend_as_potential_lover.GetTitledFirstName|l] soube perfeitamente o que eu queria dizer, como sempre. Sua resposta foi expressa com gentileza, cheia de carinho, mas doeu muito em mim.\n\nTem muito afeto por mim, mas só como amig[ROOT.Char.Custom('ES_OA')]."
 friendship.0005.a: "Tento não mostrar a dor no meu rosto. \"Oh, você entendeu errado.\""
 friendship.0005.b: "Por que está me afastando se sei que sente o mesmo, [friend_as_potential_lover.GetFirstNameNoTooltip]?"
 friendship.0005.c: "Há beleza nisso também."
 friendship.0007.t: "Quando o Cuidado se Torna Paixão"
 friendship.0007.desc: "Meu coração dispara quando estendo a mão para tocar a bochecha de [friend_as_potential_lover.GetTitledFirstName|l], embora eu já saiba que [friend_as_potential_lover.GetSheHe] não se afastará.\n\nNosso abraço expressa mais amor do que jamais senti."
 friendship.0007.a: "Oh, [friend_as_potential_lover.GetFirstNameNoTooltip]!"
 friendship.0008.t: "Quando o Cuidado se Torna Paixão"
 friendship.0008.desc: "Meu coração dispara quando estendo a mão para tocar a bochecha de [first_friend.GetTitledFirstName|l], embora eu já saiba que [first_friend.GetSheHe] não se afastará.\n\nNosso abraço transborda mais amor do que jamais senti antes."
 friendship.0008.a: "Oh, [first_friend.GetFirstNameNoTooltip]!"
 friendship.0009.t: "O Que Poderia Ter Sido"
 friendship.0009.desc: "Após o falecimento dela, tenho passado muitas noites sozinho, pensando em [friend_as_potential_lover.GetFirstName]. Leal, gentil e caloros[friend_as_potential_lover.Custom('ES_OA')] até o fim... Não consigo deixar de pensar no que poderia ter sido, se não tivessem me [friend_as_potential_lover.Custom('ES_LoLa')] tirado de mim tão cedo."
 friendship.0009.a: "Descanse em paz, meu querid[friend_as_potential_lover.Custom('ES_OA')] [friend_as_potential_lover.GetFirstNameNoTooltip]"
 friendship.0010.t: "Afastando-se"
 friendship.0010.desc: "Nunca esperava aquela expressão confusa no rosto de [best_friend.GetTitledFirstName|l] quando lhe contei meus sonhos. Achei que sempre me entenderia, que sempre estaria ao meu lado.\n\nMas, às vezes, quando nos encontramos, é como se eu estivesse falando com um estranho."
 friendship.0010.a: "Precisamos trabalhar nisso, reconstruir nossa amizade!"
 friendship.0010.b: "Isso não vale mais a pena."
 friendship.0010.a.success: "Eu conserto nossa relação"
 friendship.0010.a.failure: "Meus esforços foram em vão"
 friendship.0010.a.success.message: "[best_friend.GetTitledFirstName] e eu continuamos sendo os melhores amigos."
 friendship.0010.a.failure.message: "Fracassei ao tentar reparar meu relacionamento com [best_friend.GetTitledFirstName|l]."
 friendship.0011.t: "Afastando-se"
 friendship.0011.desc: "O fim é lento e sem drama, mas tão inevitável quanto a passagem do tempo. Antigamente, pensei que [other_best_friend.GetTitledFirstName|l] seria para sempre meu amig[other_best_friend.Custom('ES_OA')] mais próxim[other_best_friend.Custom('ES_OA')], mas o pedido de desculpas tenso de hoje não me surpreende."
 friendship.0011.a: "Tivemos bons momentos, mas é hora de deixar ir."
 friendship.0014.t: "Uma Traição"
 friendship.0014.desc: "Com tudo pelo que passamos juntos, ainda não consigo acreditar que [friend_to_rival.GetTitledFirstName|l] tenha feito o que fez.\nÉ uma traição a cada gesto amigável que compartilhamos. De fato, uma traição à nossa amizade! Antes dividíamos o pão, mas agora ganhou um[ROOT.Char.Custom('ES_XA')] inimig[ROOT.Char.Custom('ES_OA')] para a vida toda."
 friendship.0014.a: "[friend_to_rival.GetFirstName] pagará!"
 friendship.0015.opening: "[original_friend.Custom2('AppropriateGreeting', ROOT.Char)]"
 friendship.0015.desc: "Eu denuncio a amizade que você tão descuidadamente zombou!\nPor todas as suas promessas e gestos que se resolveram em desonra... Conhecendo você como conheço agora, não deveria ter ficado surpreso.\n\nVocê trouxe esse sofrimento sobre si mesmo."
 friendship.0015.a: "Aqui não há idiota maior que você, [original_friend.GetFirstNameNoTooltip]."
 friendship.0018.t: "Mais Amigos do que Tempo"
 friendship.0018.desc: "Uma [ROOT.GetCharacter.Custom('friendship_metaphor_with_tending')|U].\nCom tantos amigos espalhados ao vento, mal tenho tempo para me comunicar por carta, muito menos dar a atenção que eles merecem.\nTalvez seja mais fácil para mim deixar alguém... se afastar."
 friendship.0018.a: ""Sinto muito por estar escrevendo com notícias lamentáveis, [friend_1.GetTitledFirstNameNoTooltip|l]…"."
 friendship.0018.b: ""Você tem sido bom[friend_2.Custom('ES_OA')] comigo, [friend_2.GetFirstNameNoTooltip], mas…"."
 friendship.0018.c: ""Não é você, sou eu, [friend_3.GetFirstNameNoTooltip]…"."
 friendship.0018.d: "Não decepcionarei nenhum dos meus amigos!"
 friendship.0018.e: "Oh não, eu consigo lidar com isso."
 friendship.0019.t: "Encerrando a Comunicação"
 friendship.0019.desc: "Há muito tempo espero uma nova carta de [first_friend.GetTitledFirstName|l], mas nada chega. Tenho enviado minhas próprias missivas, sem obter resposta.\nA conclusão inevitável parece ser que já não me considera um[ROOT.Char.Custom('ES_XA')] amig[ROOT.Char.Custom('ES_OA')] merecedor[ROOT.Char.Custom('ES_XA')] de tempo e atenção."
 friendship.0019.a_1: "Sou um dos poucos que teria atendido ao seu chamado em seu momento de necessidade, [first_friend.GetFirstNameNoTooltip]."
 friendship.0019.a_2: "Eu também não tenho sido [ROOT.Char.Custom('ES_LoLa')] melhor amig[ROOT.Char.Custom('ES_OA')], [first_friend.GetFirstNameNoTooltip]."
 friendship.1002.opening: "[sender.Custom2('AppropriateGreeting', ROOT.Char)]"
 friendship.1002.desc: "Por favor, aceite este presente como um gesto de apreciação pela nossa amizade duradoura."
 friendship.1002.a: "Que nossa amizade floresça para sempre!"
 friendship.1003.desc: "Meus caçadores capturaram vivo este cervo, e sua graça e majestade me lembraram de você!\n\nAceite-o, por favor, como um símbolo de nossa amizade eterna!"
 friendship.1003.a: "Deixe-o vagar pelos jardins!"
 friendship.1003.b: "Ele fornecerá cortes de carne verdadeiramente delicados..."
 garden_stag_modifier: "Veado do Jardim"
 impromptu_venison_feast_modifier: "Banquete Improvisado de Carne de Veado"
 friendship.1004.desc: "Como gesto de apreço por nossa longa amizade, quero compartilhar algo que talvez lhe interesse.\n\nFaça com a informação o que lhe aprouver."
 friendship.1004.a: "Como generoso!"
 friendship.1006.t: "Apoio"
 friendship.1006.desc: "Preocupad[friend.Custom('ES_OA')] com a guerra atual, minha amig[friend.Custom('ES_OA')] [friend.GetTitledFirstName|l] ajudou a pagar minhas despesas com seu próprio tesouro!"
 friendship.1006.desc_2: "\n\n[friend.GetFirstNameNoTooltip] chegou esta manhã cedo ao meu acampamento principal à frente de uma caravana de carroças repleta de seu ouro e agora está cuidando de pagar meus soldados. Certamente, quanta generosidade da sua parte."
 friendship.1006.a: "Não poderia estar mais agradecid[ROOT.Char.Custom('ES_OA')]."
 friendship.1006.b: "[friend.GetFirstNameNoTooltip], preciso de #EMP mais!#!"
 friendship.1007.t: "Traidoria e Astúcia"
 friendship.1007.desc: "Incapaz de lidar com a sua própria guerra, [friend_at_war.GetTitledFirstName|l] recebeu ajuda através de um grande pagamento de ouro d [friend_providing_gift.GetTitledFirstName|l]!"
 friendship.1007.a: "Desonroso!"
 friendship.1008.t: "Uma Figura Exemplar"
 friendship.1008.desc: "[courtier_on_offer.Custom('ES_ElLa')|U] [courtier_on_offer.GetTitledFirstName|l] me serviu com dedicação por muito tempo e se destacou em seus deveres. Isso me fez pensar que poderia ser útil para [friend_receiving_gift.Custom('ES_ElLa')] [friend_receiving_gift.GetTitledFirstName|l] em sua [friend_receiving_gift.Custom('GetCourt')]."
 friendship.1008.a: "[friend_receiving_gift.GetFirstNameNoTooltip] apreciará seus serviços."
 friendship.1008.a.success: "[friend_receiving_gift.GetFirstName] aceita sua oferta."
 friendship.1008.a.failure: "[friend_receiving_gift.GetFirstName] recusa sua oferta."
 friendship.1008.b: "Não, preciso de [courtier_on_offer.Custom('ES_AlAla')] [courtier_on_offer.GetTitledFirstNameNoTooltip|l] aqui."
 friendship.1008.b.tt: "[courtier_on_offer.Custom('ES_ElLa')|U] [courtier_on_offer.GetTitledFirstName|l] permanece em seu [THIS.Char.Custom('GetCourt')]"
 friendship.1009.t: "Um Conselho"
 friendship.1009.desc: "Não é a primeira vez que ouço falar de como é grande servo[courtier_on_offer.Custom('ES_XA')] que é [courtier_on_offer.Custom('ES_ElLa')] [courtier_on_offer.GetTitledFirstName|l] e agora [first_friend.Custom('ES_ElLa')] [first_friend.GetTitledFirstName|l] [courtier_on_offer.GetHerHim] enviou para minha [friend_receiving_gift.Custom('GetCourt')] como uma prova da amizade que nos une."
 friendship.1009.a: "Seja bem-vind[courtier_on_offer.Custom('ES_OA')] ao meu serviço, [courtier_on_offer.GetFirstNameNoTooltip]!"
 friendship.1009.b: "Não serás tão bom[courtier_on_offer.Custom('ES_OA')] se [first_friend.GetTitledFirstNameNoTooltip|l] se livra de você com tanta facilidade."
 friendship.1009.rejection_tooltip: "[courtier_on_offer.GetTitledFirstNameNoTooltip|l] é enviad[courtier_on_offer.Custom('ES_OA')] de volta"
 friendship.2001.t: "A Necessidade de Contar"
 friendship.2001.desc: "Meus segredos são fardos desconfortáveis que nunca poderei deixar de carregar, mas, se eu os compartilhasse com alguém, talvez fossem mais leves de suportar.\n\nEstou certo[ROOT.Char.Custom('ES_OA')] de que [friend_receiving_confession.GetTitledFirstName|l] me entenderia."
 friendship.2001.a: "Venha mais perto, [friend_receiving_confession.GetFirstNameNoTooltip], tenho algo para confessar."
 friendship.2001.b: "Não... ninguém pode saber!"
 friendship.2002.t: "Um Segredo Uma Vez Contado"
 friendship.2002.desc: "[confessor.GetTitledFirstName] veio até mim para compartilhar algo que tem pesado em seu espírito.\n\nMostrei a maior compreensão ao meu [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('confessor'))]. Por dentro, senti mais do que um pouco de curiosidade…"
 friendship.2002.a: "Você está certo em confiar em mim, [confessor.GetFirstNameNoTooltip]."
 friendship.2002.b: "[confessor.GetFirstNameNoTooltip], tenho uma confissão minha."
 friendship.2003.t: "Um Segredo Compartilhado"
 friendship.2003.desc: "Quando compartilhei meu segredo com [friend_receiving_confession.GetTitledFirstName|l], seus olhos se arregalaram.\n "[SCOPE.GetRootScope.GetCharacter.GetFirstName], eu também tenho algo para te contar!".\n\nNo fim das contas, [friend_receiving_confession.GetFirstName] também tinha um segredo parecido!"
 friendship.2003.a: "É bom que ambos saibamos."
 friendship.2004.t: "Um Terrível Fardo"
 friendship.2004.desc: "Não posso continuar guardando a verdade dentro de mim. Ela consome minha alma. Alguém precisa saber.\n\n[friend_receiving_confession.GetTitledFirstName|l] me entenderá e aliviará meu peso."
 friendship.2004.a: "Devo contá-lo."
 friendship.2005.t: "Um Segredo Uma Vez Contado"
 friendship.2005.desc: "[confessor.GetTitledFirstName] me disse que tinha um segredo obscuro que precisava compartilhar comigo, mas jamais teria imaginado isso!\n\nAo menos meu amig[confessor.Custom('ES_OA')] não terá de viver com o peso desse conhecimento soz[confessor.Custom('ES_OA')] inho."
 friendship.2005.a: "Você estava certo em confiar em mim, amigo."
 friendship.2005.b: "[confessor.GetFirstNameNoTooltip], tenho uma confissão própria..."
 friendship.2006.t: "Um Segredo Compartilhado"
 friendship.2006.desc: "Eu estava preocupado que [friend_receiving_confession.GetTitledFirstName|l] não entenderia meu segredo quando o compartilhasse, mas [friend_receiving_confession.GetSheHe] me entendeu melhor do que eu jamais teria imaginado.\n\nEu sei muito bem como você se sente, [ROOT.GetCharacter.GetFirstName]. Muito bem, inclusive. Na verdade..."
 friendship.2006.a: "Não consigo acreditar em quanta coisa temos em comum, meu/minha [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('friend_receiving_confession'))] [friend_receiving_confession.GetFirstNameNoTooltip]."
 friendship.2007.t: "Uma Palavra Gentil"
 friendship.2007.desc: "Por coincidência, meus caminhos se cruzaram com os de [talking_target.GetTitledFirstName|l] e, para minha surpresa, parece que não tem uma boa impressão da minha amig[friend_interceded_for.Custom('ES_OA')] [friend_interceded_for.GetTitledFirstName|l]!\n\nTalvez eu deva aproveitar esta oportunidade para mudar sua opinião."
 friendship.2007.a: "Deixe-me contar uma história sobre [friend_interceded_for.GetFirstNameNoTooltip]…"
 friendship.2007.b: "As pessoas deveriam estar falando sobre #EMP mim#! ao invés disso."
 friendship.2007.utter_failure_tt: "Arruino desastrosamente a reputação de [friend_interceded_for.GetFirstName]"
 friendship.2007.failure_tt: "Eu só pioro as coisas para [friend_interceded_for.GetFirstName]"
 friendship.2007.success_tt: "Melhoro a opinião de [talking_target.GetFirstName] sobre [friend_interceded_for.GetFirstName]"
 friendship.2009.t: "Um Constrangimento"
 friendship.2009.desc: "Oh não. Não sei o que aconteceu, mas quanto mais eu falava para [talking_target.GetTitledFirstName|l] sobre [friend_interceded_for.GetFirstName], mais a expressão parecia azedar.\n\nIsso piorou tanto as coisas para [friend_interceded_for.GetFirstName] que está se perguntando o que eu poderia ter dito para [talking_target.GetFirstNameNoTooltip]!"
 friendship.2009.a: "Sinto muito, [friend_interceded_for.GetFirstNameNoTooltip]."
 friendship.2010.t: "Um Constrangimento"
 friendship.2010.desc: "Enquanto [friend_doing_interceding.GetTitledFirstName|l] passava um tempo com [talking_target.GetSheHe], meu amig[friend_doing_interceding.Custom('ES_OA')] descobriu que [talking_target.GetTitledFirstName|l] e eu tínhamos uma relação… tensa.\n\nAo tentar convencer [talking_target.GetFirstName] de minhas virtudes, parece que a situação piorou ainda mais!"
 friendship.2010.a: "Oh não. [friend_doing_interceding.GetFirstNameNoTooltip]!"
 friendship.2012.t: "Muito Esforço para Pouco Ganho"
 friendship.2012.desc: "Tentei apresentar [friend_interceded_for.GetTitledFirstName|l] da melhor maneira possível, mas [talking_target.GetTitledFirstName|l] simplesmente desviava o olhar sempre que eu mencionava o nome dele.\n\nSuspeito que não tenha ficado muito impressionad[talking_target.Custom('ES_OA')]."
 friendship.2012.a: "Mas [friend_interceded_for.GetFirstNameNoTooltip] é tão incrível!"
 friendship.2013.t: "Uma Reavaliação de Relações"
 friendship.2013.desc: "Enquanto passava uma noite na companhia de [friend_doing_interceding.GetTitledFirstName|l], compartilhou várias histórias sobre [friend_interceded_for.GetTitledFirstName|l]. Depois de ouvir sobre suas ações durante horas, devo admitir que fui injust[ROOT.Char.Custom('ES_OA')] ao julgar[friend_interceded_for.Custom('ES_LoLa')]."
 friendship.2013.a: "Talvez [friend_interceded_for.GetFirstNameNoTooltip] não seja tão ruim[friend_interceded_for.Custom('ES_OA')]."
 friendship.2014.t: "Recomendações"
 friendship.2014.desc: "Enquanto passava um tempo com [talking_target.GetSheHe], minha amig[friend_doing_interceding.Custom('ES_OA')], [friend_doing_interceding.GetTitledFirstName|l], descobriu que [talking_target.GetTitledFirstName|l] e eu tínhamos uma relação... tensa.\n\nMas [friend_doing_interceding.GetFirstName] não deixou isso passar e, de algum modo, convenceu [talking_target.GetTitledFirstName|l] de que eu não sou tão ruim[ROOT.Char.Custom('ES_OA')] quanto pensa!"
 friendship.2014.a: "Devo muitos agradecimentos ao meu amig[friend_doing_interceding.Custom('ES_OA')]!"
 friendship.2015.t: "Mudança de Convicção"
 friendship.2015.desc: "Tentei apresentar [friend_interceded_for.GetTitledFirstName|l] da melhor forma possível e, pouco a pouco, [talking_target.GetTitledFirstName|l] começou a ouvir com cada vez mais interesse.\n\nQuando murmurou para si mesmo \"Nunca soube disso!\", soube que tinha causado uma boa impressão."
 friendship.2015.a: "Meu amig[friend_interceded_for.Custom('ES_OA')] é um[friend_interceded_for.Custom('ES_XA')] grande [friend_interceded_for.GetWomanMan]!"
 friendship.3001.t: "Os Amigos Escolhidos"
 friendship.3001.desc: "Meu [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('spouse_benefitting') )] [spouse_benefitting.GetTitledFirstName|l] se cerca de boas pessoas.\n\n[friend_being_approved.GetTitledFirstName|l] é um exemplo do bom gosto que meu [spouse_benefitting.GetWifeHusband] tem para escolher amigos."
 friendship.3001.a: "Há tantas pessoas boas em minha vida."
 friendship.3002.t: "Aqueles que Escolhemos"
 friendship.3002.desc: "Meu [first_spouse.GetWifeHusband] [first_spouse.GetTitledFirstName|l] sorria enquanto comentava o quão boas são as escolhas que faço nas pessoas com quem me rodeio.\n\nDeve estar se referindo a pessoas como meu amig[friend_being_approved.Custom('ES_OA')] [friend_being_approved.GetTitledFirstName|l]."
 friendship.3002.a: "Há tantas pessoas boas em minha vida."
 friendship.3003.t: "Aqueles que Escolhemos"
 friendship.3003.desc: "Meu [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('spouse_suffering') )] [spouse_suffering.GetTitledFirstName|l] se cerca de certas pessoas horríveis.\n\nSeu amig[friend_being_disapproved.Custom('ES_OA')] [friend_being_disapproved.GetTitledFirstName|l] é um dos [friend_being_disapproved.Custom('ES_LoLa')] piores."
 friendship.3003.a: "Como vuelva a visitarnos otra vez…"
 spouse_responds_tt: "[spouse_suffering.GetFirstName] pode abandonar seu amig[friend_being_disapproved.Custom('ES_OA')] ou não…"
 friendship.3004.t: "Aqueles que Escolhemos"
 friendship.3004.desc: "Como seria fácil se as pessoas da minha vida se dessem bem. Ah, meu [ROOT.GetCharacter.Custom2('RelationToMe', SCOPE.sC('spouse'))] [spouse.GetTitledFirstName|l] não consegue suportar meu bom[friend_being_disapproved.Custom('ES_XA')] amig[friend_being_disapproved.Custom('ES_OA')] [friend_being_disapproved.GetTitledFirstName|l]."
 friendship.3004.a: "Não [friend_being_disapproved.Custom('ES_LoLa')] abandonarei por nada."
 friendship.3004.b: "[spouse.GetFirstNameNoTooltip] vem em primeiro lugar."
 friendship.3005.t: "Escolha de Amigos"
 friendship.3005.desc: "Meu/minha bom/boa amig[spouse_suffering.Custom('ES_OA')] - ou deveria dizer ex-amig[spouse_suffering.Custom('ES_OA')] - [spouse_suffering.GetTitledFirstName|l] me informou que já não sou bem recebid[ROOT.Char.Custom('ES_OA')] em sua corte!\n\nNão me disse o motivo, mas sei que seu [spouse.GetWifeHusband], [spouse.GetTitledFirstName|l], está por trás disso."
 friendship.3005.a: "Como você pôde fazer isso comigo, [spouse_suffering.GetFirstNameNoTooltip]?"
 friendship.3006.t: "Relações Favoráveis"
 friendship.3006.desc: "Ao meu bom[friend_on_council.Custom('ES_OA')] amig[friend_on_council.Custom('ES_OA')] e conselheir[friend_on_council.Custom('ES_OA')], [friend_on_council.GetTitledFirstName|l] [hooked_councillor.GetTitledFirstName|l] deve um favor e deixou claro a [hooked_councillor.GetFirstNameNoTooltip] que isso deve ser retribuído da forma que eu pedir."
 friendship.3006.a: "Obrigado, meu amigo!"
 friendship.3006.b: "Confio que você usará essa influência melhor do que eu, [friend_on_council.GetFirstNameNoTooltip]."
 friendship.3007.t: "O Conforto de um Amigo"
 friendship.3007.opening: "Há poucas coisas de que eu goste mais do que da companhia de [friend.GetTitledFirstName|l]."
 friendship.3007.fallback: "\n\n parece saber exatamente o que fazer para aliviar minha mente atribulada. Isso me ajudou muito quando [friend.GetSheHe] me convidou para sair no outro dia."
 friendship.3007.malicious: "\n\nPassamos uma noite incomodando os serviçais, pegando no pé deles por cada pequeno erro e reclamando de cada detalhe. Quem diria que atos mesquinhos de tormento realmente têm uma forma de aliviar uma mente atribulada!"
 friendship.3007.benevolent: "\n\nCaminhamos juntos pela cidade, distribuindo moedas para os pobres e perdoando um audacioso ladrão de carteiras. Alguns atos de caridade e perdão podem realmente aliviar uma mente estressada."
 friendship.3007.dominant: "\n\n[friend.Custom('ES_ElElla')|U] me arrastrou de uma atividade para outra. Esse ritmo frenético realmente me ajudou a tirar meus problemas da cabeça."
 friendship.3007.submissive: "\n\nA companhia dela em meu passeio pelo campo realmente aliviou minha mente atribulada, mesmo que eu tenha sido quem teve que tomar a iniciativa para a atividade."
 friendship.3007.extroverted: "\n\nUma noite animada na cidade e muitos novos conhecidos realmente tiraram minha mente dos problemas!"
 friendship.3007.introverted: "\n\nRealmente aliviou minha mente ter uma noite tranquila em casa, bebendo vinho e conversando sobre nossos problemas."
 friendship.3007.emotional: "\n\n[friend.Custom('ES_ElElla')|U] me incentivou a jogar pratos e gritar nos travesseiros. Depois que a tempestade emocional passou, eu realmente me senti melhor."
 friendship.3007.levelheaded: "\n\n[friend.GetSheHe|U] escutou em silêncio todos os meus problemas e me ajudou a colocá-los em perspectiva. Depois de um tempo, percebi que não eram tão ruins quanto eu imaginava."
 friendship.3007.end_chill: "\n\nApós essa pequena pausa, voltei a me sentir pront[ROOT.Char.Custom('ES_OA')] para cumprir meu dever. Que sorte ter um[friend.Custom('ES_XA')] amig[friend.Custom('ES_OA')] como [friend.GetTitledFirstName|l]!"
 friendship.3007.end_severe: "\n\nDepois dessa breve pausa, senti-me mais em paz do que havia sentido em muito tempo![friend.Custom('ES_XA')] ami[friend.Custom('ES_OA')] como [friend.GetTitledFirstName|l]!"
 friendship.3007.a: "Uma pequena pausa agradável."
 friendship.3007.b: "Passar tempo com [friend.GetFirstNameNoTooltip] sempre me faz muito bem."
 friendship.3007.c: "Eu não tinha percebido o quanto precisava disso."
 friendship.3007.d: "Eu esqueci completamente dos problemas do mundo por um tempo."
