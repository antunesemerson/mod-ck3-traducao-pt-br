l_spanish:
 mentor_student.0001.t: "O Que Já Foi"
 mentor_student.0001.desc: "\"Isso não pode continuar assim, [ROOT.Char.GetFirstNameNoTooltip]!\", exclama [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('mentor_to_lose') )] [mentor_to_lose.GetTitledFirstName], [mentor_to_lose.Custom('quirk_neg_pp')].\n\n\"Nossa relação acabou, somos diferentes demais para que isso funcione. Você agora está por conta própria.\""
 mentor_student.0001.a: "Muito bem."
 mentor_student.0002.desc: "\"Não há mais nada que eu possa te ensinar.\"\n\n[ROOT.Char.Custom2('RelationToMe', SCOPE.sC('mentor_to_lose') )] [mentor_to_lose.GetTitledFirstName|l] sorri [mentor_to_lose.Custom('quirk_pos_adverb')] e acena. \"Você aprendeu muito, mas para avançar ainda mais em seus estudos, precisa seguir seu próprio caminho.\""
 mentor_student.0002.a: "[mentor_to_lose.GetSheHe|U] realmente me ensinou muito!"
 mentor_student.0002.b: "Sinto que nossa relação ficará ainda mais forte agora."
 mentor_student.0003.t: "Pensando Melhor"
 mentor_student.0003.desc: "[ROOT.Char.Custom2('RelationToMe', SCOPE.sC('mentor_to_lose') )] [mentor_to_lose.GetTitledFirstName|l] sorri [mentor_to_lose.Custom('quirk_neg_adverb')] enquanto me conta suas últimas #EMP vitórias#!.\n\nTalvez eu ainda tenha coisas a aprender, mas está cada vez mais difícil tolerar [mentor_to_lose.GetFirstName] como pessoa."
 mentor_student.0003.a: "Essa relação acabou."
 mentor_student.0003.b: "Se esse é o preço pelo conhecimento..."
