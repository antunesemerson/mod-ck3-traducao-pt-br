l_spanish:
 sibling.0001.t: "Merecidos Benefícios"
 sibling.0001.desc: "¡[sibling.GetTitledFirstName] ha venido buscando una audiencia oficial conmigo!\n\n«Querid[ROOT.Char.Custom('ES_OA')] [sibling.Custom2('RelationToMe' , ROOT.GetCharacter )]: os he servido con lealtad. ¿No sería momento de recompensarme por mi trabajo?»."
 sibling.0001.a: "Eu vou conceder a você um título e terras próprias!"
 sibling_promised_land_tt: "[sibling.GetFirstName] desejará que eu lhe conceda um título próprio muito em breve."
 sibling.0001.b: "Peça-me qualquer favor, [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('sibling'))] meu[sibling.Custom('ES_OA')]."
 sibling.0001.c: "Tome este presente e prove ao mundo o seu valor, querid[sibling.Custom('ES_OA')] [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('sibling'))]!"
 sibling_funded_for_invasion: "[sibling.GetFirstName] vai procurar um reino adequado para tentar a sorte."
 sibling_becomes_councillor_tt: "[sibling.GetFirstName] se convierte en un[sibling.Custom('ES_OA')] de mis consejer[sibling.Custom('ES_OA')]s."
 sibling.0001.e: "Você não fez nada além do seu dever!"
 sibling.0002.desc: "Meu [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('sibling') )] [sibling.GetFirstName] veio me procurar para me lembrar de que eu lhe prometi terras e um título próprio.\n\n“Já esperei o suficiente, [sibling.Custom2('RelationToMe' , ROOT.Char )]”."
 sibling.0002.a: "Vou pagar para você esquecer essa promessa."
 sibling.0002.b: "Não tenho nada para te dar, [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('sibling') )]."
 sibling.0003.desc: "Mi [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('sibling') )], [sibling.GetFirstName], ha venido a verme, y me ha traído diezmos de sus nuevas tierras.\n\n«¡[SCOPE.sC('sibling').Custom2('RelationToMe' , ROOT.Char )|U]! ¡Que estos regalos nos unan para siempre por juramento así como ya lo estamos por sangre!»."
 sibling.0003.a: "Pela família e pelo reino!"
 sibling.0004.t: "[sibling.Custom('ES_ElLa')|U] [sibling.Custom('SisterBrother')] e [vassal.Custom('ES_ElLa')] [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('vassal') )]"
 sibling.0004.opening: "[vassal.GetTitledFirstName] veio novamente reclamar da minha[ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('sibling') )] [sibling.GetTitledFirstName|l]."
 sibling.0004.fallback: "\n\nEles simplesmente não conseguem se entender, e desta vez parece que um deles foi longe demais."
 sibling.0004.a: "Meu [ROOT.GetCharacter.Custom2('RelationToMeShort' , SCOPE.sC('sibling') )] age em meu nome."
 sibling.0004.b: "Se recomponha, [sibling.GetFirstNameNoTooltip]!"
 sibling.0004.c: "Devo repreender vocês dois como crianças?!"
 sibling.0005.t: "Fonte de Problemas"
 sibling.0005.desc: "Durante mucho tiempo he sabido que algún día se saldarían las cuentas de [sibling.Custom2('MyCharacterIntroduction', ROOT.Char )].\n\n[vassal.Custom('ES_ElLa')|U] [vassal.GetTitledFirstName|l] me ha presentado una petición, no solo de su parte, si no de todos mis [ROOT.GetCharacter.Custom('powerful_vassals_loc')|l], para que haga algo con mi intolerable [ROOT.GetCharacter.Custom2('RelationToMeShort' , SCOPE.sC('sibling') )]."
 sibling.0005.a: ""Não ouse falar assim de [sibling.GetSheHe]!""
 sibling.0005.b: "Deve aprender que seu comportamento é inaceitável."
 sibling.0005.c: "Chega, [sibling.GetFirstNameNoTooltip]!"
 sibling.1001.t: "Apoio Diplomático"
 sibling.1001.desc: "Meu [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('sibling') )], [sibling.Custom('ES_ElLa')] [sibling.GetTitledFirstName|l], veio até mim com algumas ideias de como aproveitar sua língua afiada.\n\n“Posso servir como emissári[sibling.Custom('ES_OA')] ou até ditar seus despachos e ordens.”"
 sibling.1001.a: "Eu sei exatamente onde você seria mais útil."
 accepted_sibling_help_tt: "Um sibling valioso pode sentir que lhe é devida alguma recompensa..."
 sibling.1001.b: "Recuso-me a ficar em dívida com você, [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('sibling') )]."
 sibling.1002.t: "Conhecimento Marcial"
 sibling.1002.desc: "Meu [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('sibling') )], [sibling.Custom('ES_ElLa')] [sibling.GetTitledFirstName|l], veio até mim para enfatizar seu entendimento de guerra.\n\n“Deixe-me treinar seus soldados, e eles lutarão como nenhum exército que você já viu antes.”"
 sibling.1002.a: "Eu sei exatamente onde você seria mais útil."
 sibling.1002.b: "Recuso-me a ficar em dívida com você, [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('sibling') )]."
 sibling.1003.t: "Segredos e Sussurros"
 sibling.1003.desc: "Meu [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('sibling') )], [sibling.Custom('ES_ElLa')] [sibling.GetTitledFirstName|l], se ofereceu para me informar sobre o que acontece na minha corte.\n\n\"Ter alguém verdadeiramente leal na [ROOT.Char.Custom('GetCourt')|l]...\"."
 sibling.1003.a: "Laços familiares são os únicos em que realmente posso confiar."
 sibling.1003.b: "Você acha que eu confio em você, [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('sibling') )]?"
 sibling.1004.t: "O Fluxo do Ouro"
 sibling.1004.desc: "Enquanto examinava as contas do [ROOT.Char.Custom('GetRealmOrDomicile')|l], meu [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('sibling') )] [sibling.Custom('ES_ElLa')] [sibling.GetTitledFirstName|l], não conseguiu deixar de rir.\n\n[ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('sibling') )|U], por favor, permita-me mostrar a quem quer que seja responsável por essa bagunça como se faz."
 sibling.1004.a: "Sim, [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('sibling') )], faça meu tesouro crescer."
 sibling.1004.b: "Eu sei o motivo — você quer pôr as mãos no meu dinheiro..."
 sibling.1005.t: "Contemplações sobre a Divindade"
 sibling.1005.desc: "Poucas pessoas podem se igualar a meu [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('sibling') )]. [sibling.Custom('ES_ElLa')] [sibling.GetTitledFirstName|l], em discernimento.\n\nAgora me oferece compartilhar um pouco disso comigo, como conselheir[sibling.Custom('ES_OA')] da [ROOT.Char.Custom('GetCourt')|l] em todos os assuntos espirituais."
 sibling.1005.a: "Por favor, conduza minha mão, [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('sibling') )]."
 sibling.1005.b: "Eu nunca colocaria minha alma em suas mãos."
 sibling.2001.t: "Um Incômodo"
 sibling.2001.opening: "Eu mal posso suportar a presença d [sibling.GetTitledFirstName|l]."
 sibling.2001.fallback: "\n\nSe meu [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('sibling') )] não está botando fogo em alguma coisa por acidente ou desperdiçando meu ouro, está irritando meus [ROOT.Char.Custom('GetCourtierPlural')|l]."
 sibling.2001.a: "Ai de mim, mas ainda é da família!"
 sibling.2001.b: "Já basta, [ROOT.GetCharacter.Custom2('RelationToMeShort' , SCOPE.sC('sibling') )]!"
 sibling.8001.t: "O Custo da Família"
 sibling.8001.desc: "Minha codicios[sibling.Custom('ES_OA')] [ROOT.GetCharacter.Custom2('RelationToMe' , SCOPE.sC('sibling') )], [sibling.Custom('ES_ElLa')] [sibling.GetTitledFirstName|l], cada vez fica com mais moedas minhas como \"mesada\".\n\nAgora foi longe demais. Exigiu dinheiro para um empreendimento comercial, mas guardou tudo para si!"
 sibling.8001.a: "Minha bolsa agora está fechada, [ROOT.GetCharacter.Custom2('RelationToMeShort' , SCOPE.sC('sibling') )]!"
 sibling.8002.t: "Bolsos Profundos"
 sibling.8002.desc: "Mi [ROOT.GetCharacter.Custom('trait_generous_adjective')] [ROOT.Char.Custom2('RelationToMeShort' , SCOPE.sC('sibling') )], [sibling.Custom('ES_ElLa')] [sibling.GetTitledFirstName|l], ha viajado por [province.GetName] para escuchar las quejas de los campesinos y repartir generosamente regalos y promesas.\n\nLes dejó muy claro que eran mercedes [ROOT.Char.Custom('ES_DelDela')] #EMP «[ROOT.Char.GetTitledFirstNameNoTooltip|l] [Select_CString( ROOT.Char.IsFemale, 'la Buena', 'el Bueno' )]»#!…"
 sibling.8002.a: "Bom trabalho, [ROOT.GetCharacter.Custom2('RelationToMeShort' , SCOPE.sC('sibling') )]."
 sibling.8002.b: "Isso foi feito com MEU ouro?!"
 sibling.8003.t: "Indiscrições"
 sibling.8003.desc: "Meu [ROOT.GetCharacter.Custom('trait_lustful_adjective')] [ROOT.Char.Custom2('RelationToMeShort' , SCOPE.sC('sibling') )], [sibling.Custom('ES_ElLa')] [sibling.GetTitledFirstName|l], tomou muitas decisões ruins, mas se envolver com um/a [sibling.Custom('servant_for_romance')] de baixa condição pode ser a pior delas!"
 sibling.8003.a: "Ah, meu [ROOT.Char.Custom2('RelationToMeShort' , SCOPE.sC('sibling') )] fará o que quiser…"
 risk_of_sibling_producing_bastard_tt: "Isso pode ter consequências..."
 sibling.8003.b: "[sibling.GetSheHe|U] pode não ver mais o [sibling.Custom('servant_for_romance')]!"
 sibling.8004.t: "Respeito aos Superiores"
 sibling.8004.desc: "En su viaje por [province.GetName], mi [ROOT.Char.Custom2('RelationToMeShort' , SCOPE.sC('sibling') )] parece haber disgustado enormemente a los campesinos de varios pueblos y aldeas. [sibling.GetTitledFirstName|l] no solo exigió alojamiento y que [sibling.GetHerHim] trataran como si fuera [ROOT.GetCharacter.Custom2('using_my_title' , SCOPE.sC('sibling') ) ], sino que también castigó a la gente por la más mínima falta de respeto."
 sibling.8004.a: "Eu entendo por que eles estão chateados."
 peasants_dislike_sibling_tt: "Os camponeses de [province.GetName] não estão satisfeitos"
 sibling.8005.t: "Uma Recepcão Vazia"
 sibling.8005.desc: "Se suponía que [ROOT.Char.Custom2('RelationToMeShort' , SCOPE.sC('sibling') )] [sibling.GetTitledFirstName|l] tenía que recibir a [vassal.GetTitledFirstName|l] en su visita a mi corte.\n\nPero [vassal.GetFirstName] se retrasó unos días y, ahora que ha llegado, mi [ROOT.GetCharacter.Custom('trait_impatient_adjective')] de [ROOT.GetCharacter.Custom2('RelationToMeShort' , SCOPE.sC('sibling') )] no aparece en ninguna parte y mi invitad[vassal.Custom('ES_OA')] se ha quedado sin recibimiento."
 sibling.8005.a: "Alguns presentes irão compensar."
 sibling.8005.b: "\"[sibling.GetFirstNameNoTooltip]!!!\""
 sibling.8006.t: "Rigoroso, Mas Justo"
 sibling.8006.desc: "Enquanto visitava a corte [vassal.Custom('ES_DelDela')] [vassal.GetTitledFirstName|l], meu [ROOT.Char.Custom2('RelationToMeShort' , SCOPE.sC('sibling') )] [sibling.Custom('ES_ElLa')], [sibling.GetTitledFirstName|l] , foi solicitado que julgasse em meu nome.\n\n[vassal.GetFirstNameNoTooltip] elogiou muito o senso de justiça de [sibling.GetFirstNameNoTooltip] e parece muito content[vassal.Custom('ES_OA')] com a visita de meu [sibling.Custom('SisterBrother')]."
 sibling.8006.a: "[sibling.GetFirstNameNoTooltip] deveria passar mais tempo na corte de [vassal.GetFirstNameNoTooltip]."
 sibling.8006.b: "Eu também tenho casos que minha [ROOT.Char.Custom2('RelationToMeShort' , SCOPE.sC('sibling') )] poderia julgar por mim!"
