l_spanish:
 bishop.2001.t: "O Direito do Clero"
 bishop.2001.desc.a: "[scoped_bishop.GetCouncilTitle] [scoped_bishop.GetFirstName] está furios[scoped_bishop.Custom('ES_OA')]. \n\nAfirma que no tengo derecho a encarcelar a [scoped_prisoner.GetTitledFirstName|l]. «¡Es del clero! Independientemente de sus crímenes, ningún gobernante laico tiene la autoridad para juzgar[scoped_prisoner.Custom('ES_LoLa')]!»."
 bishop.2001.desc.b: "Meu prisioneir[scoped_prisoner.Custom('ES_OA')], [scoped_prisoner.GetTitledFirstName|l], recita uma passagem de [scoped_prisoner.GetFaith.ReligiousText] com voz firme e ergue o olhar, aguardando seu julgamento. "[scoped_prisoner.GetFirstNameNoTooltip] demonstrou ser membro do clero", declara [scoped_bishop.GetCouncilTitle] [scoped_bishop.GetFirstName], enquanto permanece ao lado [scoped_prisoner.Custom('ES_DelDela')] prisioneir[scoped_prisoner.Custom('ES_OA')] e me lan?a um olhar de desprezo. "Como tal, deve ficar sob cust?dia clerical.""
 bishop.2001.desc.c: "[scoped_prisoner.GetTitledFirstName] recita con voz temblorosa un párrafo del [scoped_prisoner.GetFaith.ReligiousText] que tiene delante. A continuación, guarda silencio.\n\n«[scoped_prisoner.GetFirstNameNoTooltip] ha demostrado ser miembro del clero», declara [scoped_bishop.GetCouncilTitle] [scoped_bishop.GetFirstName] mientras permanece al lado [scoped_prisoner.Custom('ES_DelDela')] prisioner[scoped_prisoner.Custom('ES_OA')] y me mira con desprecio. «Y, como tal, debe estar bajo custodia clerical»."
 bishop.2001.a: "Certamente, poderia recitar uma passagem de minha escolha?"
 tooltip.bishop.2001.a.success: "[scoped_prisoner.GetTitledFirstName|l] recita corretamente o trecho"
 bishop.2001.success.a.desc.tt: "[scoped_prisoner.GetTitledFirstName|l] é colocad sob custódia clerical."
 tooltip.bishop.a.2001.fail: "[scoped_prisoner.GetTitledFirstName] não consegue ler o segundo verso"
 bishop.2001.failure.a.desc.tt: "[scoped_prisoner.GetTitledFirstName|l] é jogad de volta à masmorra."
 bishop.2001.b: "Você não me deixa escolha."
 bishop.2001.c: "Não tropece na saída..."
 tooltip.bishop.c.2001.success: "[scoped_prisoner.GetTitledFirstName|l] sofre um acidente"
 bishop.2001.success.c.desc.tt: "[scoped_prisoner.GetFirstName] morre após sua libertação."
 tooltip.bishop.c.2001.fail: "[scoped_prisoner.GetTitledFirstName] consegue sair iles"
 bishop.2001.failure.c.desc.tt: "[scoped_prisoner.GetFirstName] escapa dos meus assassinos!"
 bishop.2001.d: "¡Es mi prisioner[scoped_prisoner.Custom('ES_OA')] y se quedará en mis mazmorras!"
 bishop.2002.t: "Minha Família [ROOT.Char.GetFaith.GetAdjectiveNoTooltip]"
 bishop.2002.desc.b: "Levanto a mão para chamar [scoped_relative.GetFirstName] do outro lado do salão, mas meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('scoped_relative'))] só me lança um olhar constrangido antes de sair correndo."
 bishop.2002.desc.c: "Olho ao redor da mesa de jantar, tentando iniciar uma conversa, mas encontro apenas olhares constrangidos e cabeças se virando para o lado."
 bishop.2002.desc.a: "\n\nMi propia familia se ha vuelto contra mí por ese pedazo de [scoped_bishop.Custom2('InsultNoun', ROOT.Char)] [scoped_bishop.Custom2('InsultAdjective', ROOT.Char)] [scoped_bishop.Custom('ES_DelDela')] [scoped_bishop.GetCouncilTitle|l] [scoped_bishop.GetFirstName]. Ha tomado la costumbre de susurrar mentiras en los oídos de mis familiares cada vez que acuden a recibir su consejo espiritual. Afirma que soy un[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetTitleTierName] malvad[ROOT.Char.Custom('ES_OA')] y que [ROOT.GetCharacter.GetFaith.HighGodName] ha maldecido a nuestra casa."
 bishop.2002.a: "Também tenho algumas coisas a dizer sobre [scoped_bishop.Custom('ES_ElElla')]…"
 tooltip.bishop.2002.a.success: "Convenço meus parentes de que [scoped_bishop.GetTitledFirstName|l] mente"
 bishop.2002.success.a.desc.tt: "Expresso a tentativa de difamação de [scoped_bishop.GetFirstName]."
 tooltip.bishop.a.2002.fail: "Minha família permanece impassível diante de minhas palavras"
 bishop.2002.failure.a.desc.tt: "Meus parentes se recusaram a me ouvir."
 bishop.2002.b: "Será que um gesto público de contrição ajudaria?"
 bishop.2002.c: "Não deixarei que um[scoped_bishop.Custom('ES_XA')] [scoped_bishop.GetCouncilTitle] minar minha reputação!"
 bishop.2003.t: "O Sacerdote do Povo"
 bishop.2003.desc: "Não passa um dia sem que [scoped_bishop.Custom('ES_ElLa')] [scoped_bishop.GetCouncilTitle|l] [scoped_bishop.GetFirstName] zombe de mim em seus sermões.\n\nÉ óbvio que é[scoped_bishop.Custom('ES_EA')] [scoped_bishop.Custom2('InsultNoun', ROOT.Char)] obsess[scoped_bishop.Custom('ES_OA')] é um agente de [ROOT.Char.GetFaith.DevilName] e não descansará até colocar os camponeses contra mim."
 bishop.2003.a: "Uma doação e algumas concessões [scoped_bishop.GetHerHim] acalmarão…"
 bishop.2003.b.a: "Tenho tudo completamente sob controle!"
 bishop.2003.b.b: "Bah. O que pode dar de pior?"
 bishop.2003.c: "Não tolerarei insubordinação de meus próprios vassalos!"
 bishop.2003.c.infidel: "Chegou a hora de calar para sempre."
 bishop.2002.everyrelative.custom: "Todos os outros [family_member|lE] [scoped_bishop.GetFaith.GetAdjective] da minha família"
 bishop.2002.everypiousrelative.custom: "Todos os [family_member|lE] piedosos [scoped_bishop.GetFaith.GetAdjective] da minha família"
 bishop.2003.countyunrest.custom: "Todo [county|lE] [scoped_bishop.GetFaith.GetAdjective] do meu [domain|lE]"
 bishop.2003.everytheocrat.custom: "Cada vassalo [theocratic|lE] [scoped_bishop.GetFaith.GetAdjective]"
 bishop.2004.t: "Aos Olhos dos Fanáticos"
 bishop.2004.desc: "De un tiempo a esta parte, mi [scoped_bishop.GetCouncilTitle|l] [scoped_bishop.GetFirstName] se queja sobre mi supuesta «falta de piedad» en todos sus sermones.\n\nBien se ve que ha llegado al punto de llamarme «[root_scope.Custom2('InsultNoun', SCOPE.sC('scoped_bishop'))] impí[root_scope.Custom('ES_OA')]», y mis vasallos más fanáticos están empezando a escuchar[scoped_bishop.GetHerHim]…"
 bishop.2004.theologian: "Essas são mentiras flagrantes e calúnias!"
 bishop.2004.a: "Suponho que outra 'doação de boa fé' possa ajudar..."
 bishop.2004.b: "Bah! Deixe-os acreditar no que quiserem."
