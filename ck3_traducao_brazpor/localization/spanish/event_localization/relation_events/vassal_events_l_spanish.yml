l_spanish:
 vassal.1001.t: "Como [ROOT.Char.GetFaith.HighGodName|U] Desejar"
 vassal.1001.desc: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('religious_liege'))], o/a [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('religious_liege'))] [religious_liege.GetTitledFirstName|l], está passando por meus domínios. Enquanto observa os edifícios [ROOT.Char.Custom2('QuirkPresentPosOrNeg', SCOPE.sC('religious_liege'))], franze a testa.\n\n"Sabe o que está faltando nesta vista? Uma [religious_liege.GetFaith.HouseOfWorship] — um glorioso tributo a [religious_liege.GetFaith.HighGodName]!""
 vassal.1001.a: "Eu prometo que um [ROOT.Char.GetFaith.HouseOfWorship] será construído!"
 vassal.1001.a.tt: "#F [religious_liege.GetFirstNameNoTooltip] lembrará da promessa, e me deve um [favor|lE] se for cumprida dentro de dez anos#!"
 vassal.1001.b_zealous: "Quem você pensa que é para falar em nome de [ROOT.Char.GetFaith.HighGodName]?!?!"
 vassal.1001.b: "Nada disso é necessário."
 vassal.1010.desc: "\"Você realmente se superou desta vez, [ROOT.Char.GetFirstNameNoTooltip]. É verdadeiramente uma construção magnífica.\" M [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('religious_liege'))], [religious_liege.GetTitledFirstName|l], [religious_liege.Custom('quirk_pos_present')], e aponta para o recém-construído [religious_liege.GetFaith.HouseOfWorship].\n\n\"Tenho certeza de que [religious_liege.GetFaith.HighGodName] está tão impressionado quanto eu!\""
 vassal.1010.a: "Eu vivo para servir a [religious_liege.GetFaith.HighGodName]."
 vassal.1020.desc_religious: ""Que um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] devot[ROOT.Char.Custom('ES_OA')] faça promessas vazias… E sobre construir um/a [religious_liege.GetFaith.HouseOfWorship] a [religious_liege.GetFaith.HighGodName] nada menos!""
 vassal.1020.desc_not_as_religious: "\"Você me mentiu, [ROOT.Char.GetFirstNameNoTooltip]... E sobre construir um [religious_liege.GetFaith.HouseOfWorship] para [religious_liege.GetFaith.HighGodName], ainda por cima!\""
 vassal.1020.desc: "\n\nMeu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('religious_liege'))]. [religious_liege.GetTitledFirstName|l], não esconde seu desagrado quando [religious_liege.Custom('quirk_neg_present')]."
 vassal.1020.a: "Errar é humano!"
 vassal.1020.a_religious: "Espero que [religious_liege.GetFaith.HighGodName] me perdoe..."
 vassal.1020.a.tt: "#F Talvez eu devesse ter cumprido minha promessa e construído aquele [THIS.Char.GetFaith.HouseOfWorship]...#!"
 vassal.1101.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], notei que há espaço para um/a [religious_vassal.GetFaith.HouseOfWorship] em seus domínios".\n\nMeu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('religious_vassal'))], [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('religious_vassal'))] [religious_vassal.GetTitledFirstName|l], [ROOT.Char.Custom2('QuirkPresentPosOrNeg', SCOPE.sC('religious_vassal'))] antes de continuar. "Se construirdes um/a, certamente tereis a gratidão de [religious_vassal.GetFaith.HighGodNameAlternatePossessive], bem como a minha."
 vassal.1101.a.tt: "#F [religious_vassal.GetFirstNameNoTooltip] se lembrará da promessa e me deverá um [favor|lE] se for cumprida dentro de dez anos#!"
 vassal.1110.desc: ""Vocês se superaram desta vez, [ROOT.Char.Custom('FormOfAddressForLiege')]. É um edifício magnífico". Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('religious_vassal'))], [religious_vassal.Custom('ES_ElLa')] [religious_vassal.GetTitledFirstName|l], [religious_vassal.Custom('quirk_pos_present')] e aponta para o seu [religious_vassal.GetFaith.HouseOfWorship] recém-construído.\n\n"Tenho certeza de que [religious_vassal.GetFaith.HighGodName] está tão impressionado quanto eu!"."
 vassal.1110.a: "Eu vivo para servir a [religious_vassal.GetFaith.HighGodName]."
 vassal.1120.desc_religious: ""Que um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.GetWomanMan] devoto[ROOT.Char.Custom('ES_OA')] como você faça promessas vazias… E ainda por cima sobre construir um/a [religious_vassal.GetFaith.HouseOfWorship] a [religious_vassal.GetFaith.HighGodName], nada menos!""
 vassal.1120.desc_not_as_religious: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], você me mentiu… E ainda por cima sobre construir um/a [religious_vassal.GetFaith.HouseOfWorship] para [religious_vassal.GetFaith.HighGodName], nada menos!"."
 vassal.1120.desc: "M [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('religious_vassal'))], [religious_vassal.GetTitledFirstName|l], [religious_vassal.Custom('quirk_neg_present')] e balança a cabeça.\n\n\"Que [religious_vassal.GetFaith.HighGodNameAlternate|U] te perdoe.\""
 vassal.1120.a: "Errar é humano!"
 vassal.1120.a.tt: "#F Talvez eu devesse ter cumprido minha promessa e construído aquele [THIS.Char.GetFaith.HouseOfWorship]...#!"
 vassal.2001.t: "Ensinando os Jovens"
 vassal.2001.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], acho que o jovem [child_to_educate.GetFirstName] aprenderia muito se tivesse a oportunidade de estudar sob sua tutela".\n\n[vassal_proposing_education.Custom2('RelationToMe', SCOPE.sC('child_to_educate'))] [vassal_proposing_education.Custom('ES_DelDela')] [vassal_proposing_education.GetTitledFirstName|l] [ROOT.Char.Custom2('QuirkPresentPosOrNeg', SCOPE.sC('child_to_educate'))] antes de nos cumprimentar."
 vassal.2001.a: "Claro, [child_to_educate.Custom('ES_LoLa')] educarei."
 vassal.2001.b: "Seu [child_to_educate.Custom('GetDaughterSon')] é sua responsabilidade!"
 vassal.2101.t: "Banquete Fervoroso"
 vassal.2101.desc: ""Muitos meses se passaram מאז que os lordes e damas do reino se reuniram para um banquete, meu [ROOT.Char.GetTitleTierName]".\n\n[party_vassal.GetTitledFirstName|l] continua [ROOT.Char.Custom2('QuirkAdverbPosOrNeg', party_vassal)], "Corrigir isso lhe beneficiaria — sem falar naqueles entre nós que apreciam um bom banquete — se isso fosse resolvido logo!"."
 vassal.2101.a: "Eu prometo que um banquete será realizado em breve!"
 vassal.2101.a_hyped: "Claro que devemos fazer um banquete! Não sei por que esperei tanto tempo."
 vassal.2101.a.tt: "#F [party_vassal.GetFirstNameNoTooltip] se lembrará da promessa que fiz e ficará grato se for cumprida dentro de dez anos#!"
 vassal.2101.b: "Vou realizar um banquete quando eu quiser."
 vassal.2101.b_arrogant: "Quem você pensa que é?!"
 vassal.2101.b_greedy: "Você tem ideia de quanto isso custaria?!"
 vassal.2101.b_lazy: "Tenho certeza de que farei isso eventualmente..."
 vassal.2101.b_shy: "Um banquete? Com pessoas? Acho que não..."
 vassal.2110.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U]! Você realmente se superou desta vez!".\n\nMeu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('party_vassal'))], [party_vassal.Custom('ES_ElLa')] [party_vassal.GetTitledFirstName|l], parece ainda estar se recuperando do banquete que lhe prometi, mas mesmo assim está de bom humor."
 vassal.2110.a: "Certamente foi um banquete para ser lembrado!"
 vassal.2120.desc_party: ""Que alguém tão dedicado a se divertir quanto você fizesse promessas vazias… Devo admitir que estou desapontado"."
 vassal.2120.desc_regular: ""Que alguém tão [party_vassal.Custom2('DescriptorPositive', ROOT.Char)] como você fizesse promessas vazias… Devo admitir que estou decepcionado"."
 vassal.2120.desc: "\n\nM [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('party_vassal'))], [party_vassal.GetTitledFirstName|l], [party_vassal.Custom('quirk_neg_present')] e balança a cabeça."
 vassal.2120.a: "Devo ter esquecido!"
 vassal.2201.t: "Ministrações Monetárias"
 vassal.2201.desc: ""Meu [ROOT.Char.GetTitleTierName], não pude deixar de notar que vós poderíeis beneficiar-vos de alguma ajuda monetária".\n\nMeu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('vassal_loan_holder'))], [vassal_loan_holder.GetFirstName], [vassal_loan_holder.Custom('quirk_pos_present')] enquanto propõe um acordo: um empréstimo para aliviar o peso da minha tesouraria."
 vassal.2201.a: "Sua ajuda é apreciada, [vassal_loan_holder.GetFirstNameNoTooltip]."
 vassal.2201.a.money_loan_tooltip: "Eu irei pegar emprestado [gold_i] #bold [THIS.Var('amount_to_loan_root').GetValue]#! de ouro d [vassal_loan_holder.GetFirstNameNoTooltip]."
 vassal.2201.a.repay_loan: "Eu precisarei usar a decisão #bold Pagar Empréstimo#! para reembolsar o empréstimo."
 vassal.2201.b: "Não estou #EMP tan#! desesperad[ROOT.Char.Custom('ES_OA')]!"
 vassal.2205.desc_inherited: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], meu falecido [original_lender.Custom('ES_OA')] [vassal_loan_holder.Custom2('RelationToMe', SCOPE.sC('original_lender'))] vos emprestou dinheiro no passado.\n\n[vassal_loan_holder.GetFirstName] [ROOT.Char.Custom2('QuirkPresentPosOrNeg', SCOPE.sC('vassal_loan_holder'))] antes de continuar. Como seu sucessor [vassal_loan_holder.Custom('ES_XA')], venho pedir que o devolvais."
 vassal.2205.desc_inherited_loan: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], emprestei no passado uma quantia em ouro a vosstr[original_loaner.Custom('ES_OA')] falecid[original_loaner.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('original_loaner'))]".\n\n[vassal_loan_holder.GetFirstName] [ROOT.Char.Custom2('QuirkPresentPosOrNeg', SCOPE.sC('vassal_loan_holder'))] antes de continuar. "Como seu sucessor, a obrigação de devolver esse empréstimo recai agora sobre você"."
 vassal.2205.desc_all_new_char: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], meu falecido [original_lender.Custom('ES_OA')] [vassal_loan_holder.Custom2('RelationToMe', SCOPE.sC('original_lender'))] emprestou uma quantia em ouro ao seu [original_loaner.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('original_loaner'))].\n\n[vassal_loan_holder.GetFirstName] [ROOT.Char.Custom2('QuirkPresentPosOrNeg', SCOPE.sC('vassal_loan_holder'))] antes de continuar. Agora, o dever de devolvê-lo recai sobre vós."
 vassal.2205.desc_first_time: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], o empréstimo foi útil?".\n\n[vassal_loan_holder.Custom('ES_ElLa')|U] [vassal_loan_holder.GetTitledFirstName|l] veio pedir a devolução do ouro que me emprestou."
 vassal.2205.desc_second_time: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], não gosto deste jogo. Vocês me devem dinheiro e confio que vossa promessa de reembolso não tenha sido uma mentira".\n\n[vassal_loan_holder.Custom('ES_ElLa')] [vassal_loan_holder.GetTitledFirstName] [vassal_loan_holder.Custom('quirk_neg_present')] quando se apresenta diante de mim pela segunda vez."
 vassal.2205.desc_three_times: "«¡Me estoy cansando, [ROOT.Char.Custom('FormOfAddressForLiege')]! Esta es la última vez que os lo pido de un modo civilizado. ¿Dónde está el dinero que me debéis?».\n\n[vassal_loan_holder.Custom('quirk_neg_pp')|U], [vassal_loan_holder.Custom('ES_ElLa')] [vassal_loan_holder.GetTitledFirstName|l] irradia enojo y ha perdido la paciencia."
 vassal.2205.desc_more_times: ""Se eu soubesse que você era um[ROOT.Char.Custom('ES_XA')] [ROOT.Char.Custom2('InsultNoun', SCOPE.sC('vassal_loan_holder'))] tão [ROOT.Char.Custom2('InsultAdjectiveArticle', SCOPE.sC('vassal_loan_holder'))] e mentiroso, jamais lhe teria feito esse favor".\n\nO dinheiro em meu tesouro é de pouco consolo quando [vassal_loan_holder.Custom('ES_ElLa')] [vassal_loan_holder.GetTitledFirstName|l] [vassal_loan_holder.Custom('quirk_neg_present')] antes de ir embora."
 vassal.2205.z: "Aqui! Pegue e vá embora!"
 vassal.2205.a: "Claro que você receberá seu ouro!"
 vassal.2205.a.tt: "#F ¡Debo pagarle lo antes posible!#!"
 vassal.2205.b: "Não me incomode com assuntos tão triviais."
 vassal.2205.c_greedy: "Quem estou enganando? O ouro é um grande conforto!"
 vassal.2205.c: "No entanto, era muito dinheiro..."
 vassal.2301.t: "Meu/Minha talentoso[skilled_vassal.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('skilled_vassal'))|U]"
 vassal.2301.desc_opening: "[skilled_vassal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] provou ser altamente capaz,"
 vassal.2301.desc_diplomacy: "especialmente em assuntos diplomáticos."
 vassal.2301.desc_martial: "especialmente em assuntos marciais."
 vassal.2301.desc_stewardship: "especialmente em assuntos administrativos."
 vassal.2301.desc_intrigue: "especialmente em assuntos #EMP discretos#!."
 vassal.2301.desc_learning: "especialmente em assuntos acadêmicos."
 vassal.2301.desc_ending: "\n\n"Há uma série de projetos que eu gostaria de realizar em [develop_county.GetName]. Com a sua bênção, é claro"."
 vassal.2301.a: "Assuma o controle, [skilled_vassal.GetFirstNameNoTooltip]!"
 vassal.2301.b_diplomacy: "Não, #EMP você#! vai deixar a minha experiência diplomática de lado."
 vassal.2301.b_martial: "Destreza marcial? Ha! Farei estas modifica??es #EMP pessoalmente#!."
 vassal.2301.b_stewardship: "Eu posso cuidar desse assunto administrativo sozinh."
 vassal.2301.b_intrigue: "Acho que #EMP eu#! devo lidar com assuntos tão delicados."
 vassal.2301.b_learning: "Eu sou muito mais qualificad para lidar com esse assunto."
 vassal.2301.c: "Vassalos não devem tomar liberdades assim."
 vassal.2401.t: "Esperança Cintilante"
 vassal.2401.desc_family: "\"[ROOT.Char.Custom2('RelationToMe', SCOPE.sC('vassal_needs_gold'))|U], eu preciso de algum financiamento.\""
 vassal.2401.desc_other: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], meu [ROOT.Char.GetTitleTierName], preciso de algum financiamento."
 vassal.2401.desc: "\n\nM [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('vassal_needs_gold'))], [vassal_needs_gold.GetTitledFirstName|l], olha para mim [ROOT.Char.Custom2('QuirkAdverbPosOrNeg', SCOPE.sC('vassal_needs_gold'))] antes de continuar, \"Estou até dispost a fazer concessões... Por favor, sei que você tem os meios para me ajudar!\""
 vassal.2401.a: "Ouro para [possible_county.GetNameNoTierNoTooltip] é razoável, certo?"
 vassal.2401.b: "Você tem desfrutado de um contrato muito #EMP vantajoso#!..."
 vassal.2401.c: "Você não consegue gerenciar seu próprio ouro?!"
 vassal.2451.t: "Um Contrato Melhor"
 vassal.2451.desc: "M [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('negotiating_vassal'))], [negotiating_vassal.GetTitledFirstName|l], se aproxima de mim com um sorriso [ROOT.Char.Custom2('QuirkAdjectivePosOrNeg', SCOPE.sC('negotiating_vassal'))].\n\n\"Gostaria que pudéssemos... renegociar meu contrato, meu [ROOT.Char.GetTitleTierName]. Qualquer melhoria seria, é claro, bem recebida por meu tesouro ou minhas terras.\""
 vassal.2451.a: "Eu #EMP tenho#! interesse em [possible_county.GetNameNoTierNoTooltip]..."
 vassal.2451.b: "Meu tesouro poderia precisar de um reabastecimento, com certeza."
 vassal.2451.c: "Você não encontrará acordo aqui, [negotiating_vassal.GetFirstNameNoTooltip]."
 vassal.2501.t: "Um Pedido de Paz"
 vassal.2501.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], esta guerra…". Meu [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('peaceful_vassal'))] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('peaceful_vassal'))], [peaceful_vassal.Custom('ES_ElLa')] [peaceful_vassal.GetTitledFirstName], suspira antes de continuar. "É muito dura para as tropas… e dura para todos nós. Devo admitir que tenho dúvidas".\n\nDeveria fazer algo para aliviar seus crescentes receios?"
 vassal.2501.a: "Aplicar menos pressão sobre [peaceful_vassal.Custom('ES_ElElla')] pode ajudar."
 vassal.2501.b: "Devo lembrá-l de quem é o [ROOT.Char.GetTitleTierName]?!"
 vassal.2501.c: "Você precisa aprender a conter suas dúvidas."
 vassal.2601.t: "Desejando a Guerra"
 vassal.2601.desc: ""[ROOT.Char.Custom('FormOfAddressForLiege')|U], tens motivos para atacar [holder_of_claim.Custom('ES_AlAla')] [holder_of_claim.GetTitledFirstName|l], mas conténs a tua mão…". Meu [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('warmongering_vassal'))] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('warmongering_vassal'))], [warmongering_vassal.Custom('ES_ElLa')] [warmongering_vassal.GetTitledFirstName|l], [ROOT.Char.Custom2('QuirkPresentPosOrNeg', SCOPE.sC('warmongering_vassal'))] antes de continuar. "Por quê? Faz tempo demais que estamos em paz, deveis aproveitar esta oportunidade!"."
 vassal.2601.a: "Você está certo, [warmongering_vassal.GetFirstNameNoTooltip]!"
 vassal.2601.a.tt: "#F [warmongering_vassal.GetFirstName] vai se lembrar da promessa que fiz#!"
 vassal.2601.b: "Eu não vou ser pressionado a agir prematuramente."
 vassal.2610.desc: ""Vocês fizeram a coisa certa, [ROOT.Char.Custom('FormOfAddressForLiege')]. Nós mostraremos [recipient.Custom('ES_AlAla')] [ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('recipient'))] [recipient.GetTitledFirstName|l] o que podemos fazer! Vocês reivindicarão [claim_to_fight_for.GetNameNoTier]!"."
 vassal.2610.a: "Nós vamos vencer esta guerra!"
 vassal.2620.desc: "Meu [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('warmongering_vassal'))] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('warmongering_vassal'))], [warmongering_vassal.Custom('ES_ElLa')] [warmongering_vassal.GetTitledFirstName|l],[warmongering_vassal.Custom('quirk_neg_present')].\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], [holder_of_claim.Custom('ES_ElLa')] [holder_of_claim.GetTitledFirstName|l] não viu sua ira nem seu exército. Por que prometeste uma guerra que nunca planeavas começar?"."
 vassal.2620.a: "Tem acontecido tantas outras coisas..."
 vassal.2701.t: "[ROOT.Char.Custom('CommanderTraitBeingTaughtNoTooltip')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('teacher'))|U]"
 vassal.2701.desc: "M [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('teacher'))] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('teacher'))], [teacher.GetTitledFirstName|l], é conhecid por sua habilidade em assuntos militares — especialmente em áreas onde eu me sinto carente."
 vassal.2701.a: "Você vai me ensinar, [teacher.GetFirstNameNoTooltip]?"
 vassal.2701.a.tt: "Eu não ganho a Característica [THIS.Char.Custom('CommanderTraitBeingTaught')]"
 vassal.2701.a.random_list.success: "O treinamento foi bem-sucedido"
 vassal.2701.a.random_list.failure: "O treinamento foi malsucedido"
 vassal.2701.c: "Eu tenho coisas melhores para fazer!"
 vassal.2702.desc_success_inclination: "«¡Impresionante, [ROOT.Char.Custom('FormOfAddressForLiege')]!».\n\nPuede que mi predisposición por las enseñanzas [teacher.Custom('ES_DelDela')] [teacher.GetTitledFirstName|l] no sorprenda a nadie, pero estoy satisfech[ROOT.Char.Custom('ES_OA')] de todos modos."
 vassal.2702.desc_success_no_inclination: ""Impressionante, [ROOT.Char.Custom('FormOfAddressForLiege')]!".\n\nEmbora nunca tenha tido talento nato para assuntos militares, me vejo adotando os ensinamentos [teacher.Custom('ES_DelDela')] [teacher.GetTitledFirstName|l] com uma sede e habilidade que até eu mesmo me surpreendo."
 vassal.2702.desc_failure: "Apesar dos melhores esforços [teacher.Custom('ES_DelDela')] [teacher.GetTitledFirstName|l], nada do que ele me diz ou demonstra faz sentido. É uma empreitada condenada."
 vassal.2702.a: "Finalmente eu entendo toda essa comoção!"
 vassal.2702.b: "É um mau[teacher.Custom('ES_XA')] mestre[teacher.Custom('ES_OA')] ou eu não tenho jeito para isso?"
 vassal.2801.t: "As Demandas de um Suserano"
 vassal.2801.desc: "\"[ROOT.Char.GetTitledFirstNameNoTooltip|l], eu não pude deixar de notar que nenhuma melhoria foi feita em [develop_county.GetNameNoTier] por um bom tempo, mesmo que você claramente tenha os meios para empreender tais empreendimentos.\""
 vassal.2801.a: "Vou cuidar disso imediatamente!"
 vassal.2801.b: "Se você pudesse diminuir minhas outras obrigações..."
 vassal.2901.t: "[claim_to_propose.GetNameNoTier|U]"
 vassal.2901.desc: ""Meu [ROOT.Char.GetTitleTierName], estais em posse de algo… algum lugar… que deveria ser meu".\n\nMeu [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('claim_vassal'))] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('claim_vassal'))] [claim_vassal.GetFirstName] se apresentou diante de mim e insiste que eu lhe conceda: [claim_to_propose.GetName]."
 vassal.2901.a: "Vou ver o que posso fazer."
 vassal.2901.a.tt: "#F [claim_vassal.GetFirstNameNoTooltip] vai se lembrar da minha promessa e ficar grato se ela for cumprida!#!"
 vassal.2901.b: "[claim_to_propose.GetNameNoTierNoTooltip] me pertence!"
 vassal.2901.z: "Você deve receber o que pede."
 vassal.2910.desc: ""Obrigado, meu [ROOT.Char.GetTitleTierName]!".\n\nMeu [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('recipient'))] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('recipient'))], [recipient.GetFirstName], está content[recipient.Custom('ES_OA')] com o título que lhe concedi e eu com o favor que possuo."
 vassal.2910.a: "Tudo tem o seu preço!"
 vassal.2911.desc: "Meu [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('claim_vassal'))] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('claim_vassal'))] está furios[claim_vassal.Custom('ES_OA')]. Finalmente percebeu que minha promessa de conceder a ele/ela o [claim_to_propose.GetName] não passou de palavras vazias."
 vassal.2911.a: "Eu não tinha obrigação de atender a um pedido tão absurdo."
 vassal.3001.t: "Problema Familiar"
 vassal.3001.desc_child: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('vassal_to_ask'))] [vassal_to_ask.GetTitledFirstName|l] está ali, cercad[vassal_to_ask.Custom('ES_OA')] pelo amor e seus muitos [vassal_to_ask.Custom('ChildChildrenGender')]. Isso me lembra a dura frieza que impregna minha própria casa… uma sensação que poderia se dissipar com outro filho."
 vassal.3001.desc_no_child: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('vassal_to_ask'))] [vassal_to_ask.GetTitledFirstName|l] está ali, rodead[vassal_to_ask.Custom('ES_OA')] pelo amor e seus muitos [vassal_to_ask.Custom('ChildChildrenGender')]. Isso me lembra os quartos vazios e os corredores silenciosos da minha própria casa."
 vassal.3001.desc: "\n\nClaro que nós tentamos, m [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('spouse'))] [spouse.GetFirstName] e eu, mas deve haver algo que estamos fazendo errado..."
 vassal.3001.a: "Talvez [vassal_to_ask.GetFirstNameNoTooltip] possa me dar algumas dicas!"
 vassal.3001.b: "Este é um assunto particular."
 vassal.3002.desc: ""[ROOT.Char.GetFirstNameNoTooltip], vocês foram abençoados com múltiplos [ROOT.Char.Custom('ChildChildrenGender')], e eu não tive a mesma sorte. Vocês têm algum conselho sobre como… remediar isso?".\n\nNão consigo acreditar! Meu [ROOT.Char.Custom2('RelationDescriptor', SCOPE.sC('liege_with_trouble'))] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('liege_with_trouble'))], [liege_with_trouble.GetTitledFirstName|l], pedindo-me conselhos de alcova!"
 vassal.3002.a: "Como soam testículos secos de porco e vinho?"
 vassal.3002.a.critical_success: "Meu conselho teve resultados surpreendentes"
 vassal.3002.a.success: "Meu conselho teve bons resultados"
 vassal.3002.a.failure: "Meu conselho causou mais problemas do que ajudou"
 vassal.3002.b: "Eu não quero ter nada a ver com o que acontece lá dentro!"
 vassal.3002.c: "Acho que [spouse.GetTitledFirstNameNoTooltip|l] precisa de algumas lições."
 vassal.3002.c.tt_success: "[liege_with_trouble.GetTitledFirstNameNoTooltip|l] concorda"
 vassal.3002.c.tt_failure: "Está ofendid[liege_with_trouble.Custom('ES_OA')]"
 vassal.3002.d: "Acho que um... #EMP tutoramento pessoal#! seria bom para você."
 vassal.3002.d.tt_success: "Tem interesse em aulas particulares"
 vassal.3002.d.tt_failure: "Se siente insultad[liege_with_trouble.Custom('ES_OA')]"
 vassal.3003.desc_good_counsel: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('vassal_to_ask'))], [vassal_to_ask.Custom('ES_ElLa')] [vassal_to_ask.GetTitledFirstName|l], me deu uma poção para beber e afirmou: "Vocês notarão a diferença imediatamente, [ROOT.Char.Custom('FormOfAddressForLiege')]!".\n\nSua vagueza sobre os ingredientes me deixou um pouco preocupado, mas já sinto a vitalidade correndo forte pelas minhas veias!"
 vassal.3003.desc_bad_counsel: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('vassal_to_ask'))], [vassal_to_ask.Custom('ES_ElLa')] [vassal_to_ask.GetTitledFirstName|l], me deu uma poção para beber e afirmou: "Você notará a diferença imediatamente, [ROOT.Char.Custom('FormOfAddressForLiege')]!".\n\nSua vaguidão sobre os ingredientes me deixou um pouco preocupado, e, enquanto sinto meus humores quentes diminuírem, amaldiçoo seu mau conselho!"
 vassal.3003.desc_making_a_move_on_spouse: "«Enviadme a vuestr[spouse.Custom('ES_OA')] [spouse.GetWifeHusband] y le enseñaré a satisfaceros mejor, [ROOT.Char.Custom('FormOfAddressForLiege')]»."
 vassal.3003.desc_making_a_move: ""Mas, [ROOT.Char.Custom('FormOfAddressForLiege')] é tão difícil dar dicas. Seria muito mais fácil apenas lhe mostrar…""
 vassal.3003.desc_refusal: "Que audácia a [vassal_to_ask.Custom('ES_DelDela')] [ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('vassal_to_ask'))] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('vassal_to_ask'))]! Embora tenha sido eu quem se aproximou de [vassal_to_ask.GetTitledFirstName|l] com essa delicada questão, me rejeitou."
 vassal.3003.a: "![spouse.GetTitledFirstNameNoTooltip]! Venha ao nosso quarto!"
 vassal.3003.b: "Estou condenad[ROOT.Char.Custom('ES_OA')] a uma vida sem descend?ncia?"
 vassal.3003.spouse: "Vou enviá-lo(a) imediatamente!"
 vassal.3003.spouse.tt: "Fertilidade Aumentada"
 vassal.3003.c: "Sim, algumas aulas particulares podem ajudar."
 vassal.3003.d: "A audácia!"
 vassal.3004.desc_spouse: "Pode-se questionar a eficiência da minha lição particular com [spouse.GetTitledFirstName|l], mas certamente ele não fez nenhuma queixa.\n\nSe a sua [spouse.Custom2('RelationToMe', SCOPE.sC('liege_with_trouble'))] tiver sorte, terá aprendido uma coisa ou duas!"
 vassal.3004.desc_refused: "[liege_with_trouble.GetTitledFirstName] me rejeitou!\n\nEspero que seu [liege_with_trouble.Custom2('RelationToMe', SCOPE.sC('spouse'))] tenha mais sorte na alcova…!"
 vassal.3004.desc: "Pode-se questionar a eficiência da minha aula particular com [liege_with_trouble.GetTitledFirstName|l], mas certamente [liege_with_trouble.Custom('ES_ElElla')] não tem do que reclamar.\n\nSe seu [liege_with_trouble.Custom2('RelationToMe', SCOPE.sC('spouse'))] tiver sorte, [liege_with_trouble.GetTitledFirstName|l] terá aprendido uma coisa ou duas…!"
 vassal.3004.a: "![liege_with_trouble.Custom('ES_ElElla')|U] está perdendo isso!"
 vassal.3004.b: "Retribuir com minhas habilidades é o mínimo que posso fazer!"
 vassal.3004.c: "[spouse.GetFirstNameNoTooltip] é um excelente alun!"
 vassal.5010.opening: "[vassal.Custom2('AppropriateGreeting', ROOT.Char)]"
 vassal.5010.desc: "Talvez n?o seja o meu lugar questionar sua estrat?gia, mas me pergunto por que voc? permite que os inimigos de nossa f? sigam com seus atos perversos sem interfer?ncia. Temos os meios e o direito de aplicar a justi?a de [ROOT.Char.GetFaith.HighGodNamePossessive] sobre eles, ent?o certamente devemos faz?-lo!"
 vassal.5010.a: "Dentro de seis meses, marcharemos contra eles!"
 vassal.5010.a.tt: "#F Eu prometo declarar guerra contra os infiéis.#!"
 vassal.5010.b: "Quando chegar o momento certo..."
 vassal.5010.b.tt: "#F Eu prometi tudo e nada ao mesmo tempo.#!"
 vassal.5010.c: "Não diga ao [ROOT.Char.Custom('ES_AlAla')] [ROOT.Char.GetTitleTierName] o que ele deve fazer!"
 vassal.5020.t: "Uma Promessa Piedosa Quebrada"
 vassal.5020.desc: "Já se passou um ano desde que fiz a promessa de enviar exércitos contra os inimigos da fé. [vassal.GetTitledFirstName|l] ficará descontente com minha falta de ação prometida."
 vassal.5020.a: "Talvez eu tenha falado precipitadamente."
 vassal.5020.b: "Palavras são apenas palavras ao vento."
 vassal.5050.desc: "Me gustaría pediros que, con vuestro gran juicio, consideraseis mis derechos sobre [claim.GetName]. ¿Es acaso justo que [claimed_title_holder.Custom('ES_ElLa')] [claimed_title_holder.GetTitledFirstName|l] se siente tranquilamente en su castillo usurpado y se burle de los derechos de nacimiento de mi dinastía? Por favor, [ROOT.Char.Custom('FormOfAddressForLiege')], ¡apoyad a vuestr[ROOT.Char.Custom('ES_OA')] leal vasall[ROOT.Char.Custom('ES_OA')] y tomad las armas si no reconoce voluntariamente mi derecho!"
 vassal.5050.a: "Dentro de um ano, agirei em seu nome!"
 vassal.5050.a.tt: "#F Me comprometo a reivindicar los derechos [vassal.Custom('ES_DelDela')] [vassal.GetTitledFirstName|l].#!"
 vassal.5050.b: "Quando chegar o momento certo..."
 vassal.5050.b.tt: "#F Agirei apenas se e quando perceber algum benefício.#!"
 vassal.5050.c: "Tenho muitos outros assuntos urgentes."
 vassal.5060.t: "Uma Promessa Quebrada"
 vassal.5060.desc: "Já se passou um ano desde que me comprometi com [vassal.GetTitledFirstName|l] a ir à guerra por sua reivindicação sobre o [claim.GetName]. A [vassal.GetTitledFirstName|l] não ficará nada feliz com minha falta de ação em seu favor."
 vassal.5060.a: "Talvez não devesse ter feito tal compromisso."
 vassal.5060.b: "Mas o momento simplesmente não é o certo, você vê?"
