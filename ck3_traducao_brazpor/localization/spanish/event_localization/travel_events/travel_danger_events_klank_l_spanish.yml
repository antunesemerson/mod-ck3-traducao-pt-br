l_spanish:
 travel_danger_events.3000.t: "$travel_danger_prefix$ Em Um Caminho de Montanha"
 travel_danger_events.3000.desc.first_time: "Um passo após o outro, avanço lentamente por uma estreita trilha de montanha. De repente, ouço um estrondo e um grito rapidamente silenciado.\n\nSurpreendid[ROOT.Char.Custom('ES_OA')] pela comoção, me viro. Em vez de ver [fallen_victim.GetFirstName] caminhando atrás de mim, há apenas o rosto igualmente confuso e cansado de [char_next_in_line.GetFirstName] parado diante de pedras recém-reviradas.\n\n\"Onde está [fallen_victim.GetFirstNameNoTooltip]?\", exijo saber, minha voz mal consegue sair da minha boca seca.\n\nA única resposta é um leve assobio do vento."
 travel_danger_events.3000.desc.second_time: "Caminho pelo aparentemente interminável e estreito trilho da montanha. Sinto o véu do cansaço nublando minha mente. Ouço sussurros enganosos de memórias meio esquecidas e o vento assobiando baixinho.\n\nMas há algo muito real no grito dilacerante de [fallen_victim.GetFirstName]. Com arrepios subindo pela minha coluna, viro-me lentamente e, mais uma vez, vejo uma lacuna do tamanho de uma pessoa em nossa ordem de marcha.\n\n\"Nós...? Acabamos de... perder mais uma pessoa?\", digo lentamente. A [char_next_in_line.GetFirstName] não precisa falar. Seu rosto congelado de terror já é resposta suficiente."
 travel_danger_events.3000.a.first_time: "Cuidado onde pisa! Devemos continuar avançando."
 travel_danger_events.3000.a.second_time: "Ah, [fallen_victim.GetFirstNameNoTooltip]! Eu #EMP disse#! para você prestar atenção onde pisa!"
 travel_danger_events.3000.a.tt: "O terreno traiçoeiro fez mais uma vítima, certamente não a primeira, com certeza não a última."
 travel_danger_events.3000.b: "[fallen_victim.GetFirstNameNoTooltip]! [fallen_victim.GetFirstNameNoTooltip]! Vamos salvá-l!"
 travel_danger_events.3000.b.tt: "Você e seu séquito tentam um resgate na montanha. #EMP #X Isto é muito perigoso.#! #! Muitos perecerão."
 travel_danger_events.3000.b.found_nothing: "[fallen_victim.GetFirstNameNoTooltip] não foi encontrad."
 travel_danger_events.3000.b.found_cloth: "Apenas um pano rasgado e ensanguentado foi encontrado."
 travel_danger_events.3000.b.found_fallen_victim: "Contra todas as probabilidades, [fallen_victim.GetFirstNameNoTooltip] foi encontrad viv."
 travel_danger_events.3000.c.first_time: "[fallen_victim.GetSheHe] estará em nossas preces."
 travel_danger_events.3000.c.second_time: "Querido [ROOT.Char.GetFaith.HighGodName], livra-nos do perigo!"
 travel_danger_events.3000.d.first_time: "Não poderia ter feito isso melhor eu mes[ROOT.Char.Custom('ES_OA')]!"
 travel_danger_events.3000.d.second_time: "É ainda mais engraçado na segunda vez!"
 travel_danger_events.3001.t: "$travel_danger_prefix$ Avalanche!"
 travel_danger_events.3001.desc: "Depois de uma jornada longa e árdua entre os picos montanhosos nevados, eu me aqueço lentamente ao lado da fogueira rugindo na pousada local enquanto [first_avalanche_victim.GetFirstName] e [second_avalanche_victim.GetFirstName] cuidam de nossa caravana do lado de fora. De repente, há um estrondo distante, porém poderoso, profundo e reverberante.\n\n\"Avalanche!\" alguém grita. Antes que alguém lá dentro tenha a chance de reagir, o som fica mais alto e mais alto até crescer com uma grande força sacudindo as paredes e o chão. Depois de um batimento cardíaco ou uma eternidade, há um silêncio ainda mais terrível."
 travel_danger_events.3001.a: "[ROOT.Char.GetCulture.GetCollectiveNoun] sabem como sobreviver nas montanhas."
 travel_danger_events.3001.a.alternate: "[travel_leader.GetCulture.GetCollectiveNoun] sabem como sobreviver nas montanhas."
 travel_danger_events.3001.a.flavor: "Isso não é nada comparado à avalanche própria dos [ROOT.Char.GetCulture.GetName]!"
 travel_danger_events.3001.a.flavor.alternate: "Meu $travel_leader_court_position$ [travel_leader.GetFirstName] tomou as precauções necessárias contra quaisquer perigos da montanha, graças à sua herança [travel_leader.GetCulture.GetName]."
 travel_danger_events.3001.b: "Aguente firme, a ajuda está chegando!"
 travel_danger_events.3001.b.flavor: "Com pessoas enterradas sob a neve, a velocidade é primordial!"
 travel_danger_events.3001.b.success: "Resgate rápido de avalanche"
 travel_danger_events.3001.b.failure: "Resgate difícil de avalanche"
 travel_danger_events.3001.c: "Vou ficar aqui dentro... por um tempo."
 travel_danger_events.3002.opening: "[ROOT.Char.GetTitledFirstName],"
 travel_danger_events.3002.desc: "Lamento informar-vos, meu senhor[ROOT.Char.Custom('ES_XA')], de que uma terrível avalanche passou recentemente por [avalanche_location.GetName].\n\nEla ceifou muitas vidas e transtornou a vida dos que sobreviveram, incluindo os viajantes que por ali passavam."
 travel_danger_events.3002.a.special: "Eu sei! Eu estava #EMP lá!#!"
 travel_danger_events.3002.a.default: "Que terrível!"
 travel_danger_events.3002.b: "Isso deverá ajudá-los a se recuperar."
 travel_danger_events.3003.t: "$travel_danger_prefix$ Presos na Neve"
 travel_danger_events.3003.desc: "Há dias que está nevando. A estrada parece completamente intransitável. No entanto, ao olhar à frente, vejo um pequeno grupo de pessoas se aproximando rapidamente através dos montes de neve. Em breve, um[maron_leader.Custom('ES_XA')] [maron_leader.GetWomanMan] se posta diante de mim e fala com um grande sorriso:\n\n\"Parece que vocês estão em um grande aperto. Mas não temam, por um preço justo, ajudaremos vocês a retomar suas viagens.\""
 travel_danger_events.3003.a: "Ajudar os outros é sua própria recompensa!"
 travel_danger_events.3003.a.success: "Meu séquito começa a se mover rapidamente novamente!"
 travel_danger_events.3003.a.failure: "Meu séquito ainda está preso na neve"
 travel_danger_events.3003.b: "É um preço justo."
 travel_danger_events.3003.c: "Nós vamos nos virar sozinhos."
 travel_danger_events.3003.c.flavor: "Nossa experiência com inverno nos ajudará a começar a nos mover novamente... se tivermos uma."
 travel_danger_events.3003.c.complete_success: "Meu séquito começa a se mover rapidamente novamente!"
 travel_danger_events.3003.c.partial_success: "Meu séquito começa a se mover lentamente novamente"
 travel_danger_events.3003.c.failure: "Meu séquito está preso na neve"
 travel_danger_events.3004.t: "$travel_danger_prefix$ Rajada Branca"
 travel_danger_events.3004.desc: "\"Uma borrasca branca! Virem a bombordo!\"\n\nO grito horripilante do timoneiro não combina com o tempo calmo, mas meus ouvidos são tomados por um rugido do vento cada vez mais alto. Em menos de um segundo, a névoa branca e úmida envolve todo o navio. Com um estrondo maior que o do vento, o mastro principal se parte e cai ao mar.\n\nE, tão repentinamente quanto chegou, a borrasca segue seu curso. Nosso barco balança preguiçosamente no mar calmo, arrastando as velas rasgadas e os remos quebrados."
 travel_danger_events.3004.a: "Precisamos erguer velas improvisadas de alguma forma!"
 travel_danger_events.3004.a.success: "Nosso navio navega novamente!"
 travel_danger_events.3004.a.failure: "Nós à deriva lentamente com o vento"
 travel_danger_events.3004.b: "Não tenham medo! Temos mais velas."
 travel_danger_events.3004.b.flavor: "Devido à experiência marítima do meu séquito, estávamos preparados para isso. Uma nova estrutura de velas é rapidamente erguida a partir das velas e vigas de madeira armazenadas."
 travel_danger_events.3004.c: "Alguém #EMP vai#! nos encontrar... Espero"
 travel_danger_events.3004.c.success: "Um navio que passa oferece ajuda"
 travel_danger_events.3004.c.failure: "Por dias, nenhum outro navio é avistado"
 travel_danger_events.3005.t: "$travel_danger_prefix$ Um Fogo na Noite"
 travel_danger_events.3005.desc: "Estamos caminhando entre as colinas tarde da noite. A escuridão chega repentinamente, trazida pelas nuvens escuras sobre nós. Em seguida, há um estrondo distante e alto de trovão. Logo depois, outro, combinado com um deslumbrante clarão de relâmpago.\n\nE mais um raio, iluminando intensamente a área, a imagem posterior queimada em meus olhos. Pisco e vejo onde o raio atingiu: agora, há um incêndio em arbustos que se espalha rapidamente. E está se aproximando de nós!"
 travel_danger_events.3005.a: "CORRAM!"
 travel_danger_events.3005.a.success: "Corremos para longe do fogo"
 travel_danger_events.3005.a.failure: "O fogo nos alcança enquanto corremos!"
 travel_danger_events.3005.b: "Apague o fogo antes que ele se espalhe muito!"
 travel_danger_events.3005.b.success: "Você consegue extinguir o fogo com sucesso"
 travel_danger_events.3005.b.failure: "O fogo é detido, mas a um custo"
 travel_danger_events.3005.b.c_failure: "O fogo envolve meu séquito!"
