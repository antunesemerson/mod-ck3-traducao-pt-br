 travel_danger_events.5000.t: "$travel_danger_prefix$ Um Grupo Briguento"
 travel_danger_events.5000.intro.land: "Enquanto atravessamos [location.GetName], nossa caravana para em uma clareira cercada por [location.Custom('GetProvinceFoliageDesc')]. Avan?o em dire??o ? como??o, apenas para encontrar [entourage_member_one.GetFirstName] e [entourage_member_two.GetFirstName] em uma discuss?o acalorada.

"
 travel_danger_events.5000.intro.sea: "Ao ouvir v?rios baques e gritos furiosos vindos de fora, saio ?s pressas de baixo do conv?s, apenas para encontrar [entourage_member_one.GetFirstName] e [entourage_member_two.GetFirstName] em uma discuss?o tensa.

"
 travel_danger_events.5000.craven: ""Pela última vez, [entourage_member_two.GetFirstNameNoTooltip], não tenho mais nada para dar! Como ousa pedir mais ouro depois de eu ter deixado você me esvaziar completamente!" [entourage_member_one.GetFirstNameNoTooltip] grita com raiva.

"Mas eu preciso de mais! Não seja tão mesquinho, [entourage_member_one.GetFirstNameNoTooltip]!""

"[entourage_member_one.GetFirstNameNoTooltip], incomodad[entourage_member_one.Custom('ES_OA')], vira-se para mim e explica: "[entourage_member_two.GetFirstNameNoTooltip] n?o me deixa em paz! Diga a essa esp?cie de [entourage_member_one.Custom2('InsultNoun', SCOPE.sC('entourage_member_two'))] [entourage_member_one.Custom2('InsultAdjective', SCOPE.sC('entourage_member_two'))] que preciso de paz!"

"Eu s? estava brincando sobre o pequeno [entourage_member_one.Custom2('PointOfRidicule', SCOPE.sC('entourage_member_two'))] [entourage_member_one.Custom('ES_DelDela')] pobre [entourage_member_one.GetFirstNameNoTooltip], ? s?rio!""
 travel_danger_events.5000.brave: ""Como ousa me derrubar do cavalo, [entourage_member_one.GetFirstNameNoTooltip], seu/sua [entourage_member_one.Custom2('InsultNoun', SCOPE.sC('entourage_member_two'))] [entourage_member_one.Custom2('InsultAdjective', SCOPE.sC('entourage_member_two'))]!" exclama [entourage_member_two.GetFirstNameNoTooltip], prostrad[entourage_member_two.Custom('ES_OA')] sobre [location.Custom('GetProvinceGroundDesc')].

"Não posso ser responsabilizado por sua evidente falta de habilidade", responde [entourage_member_one.GetFirstNameNoTooltip] com um sorriso de superioridade." [entourage_member_one.GetFirstNameNoTooltip] cospe no ch?o.

[entourage_member_two.GetFirstNameNoTooltip] apenas se encolhe de medo, chorando em sil?ncio para si."
 travel_danger_events.5000.chaste: ""[Select_CString( entourage_member_one.IsFemale, 'Porca pecadora e glutona', 'Porco pecador e glut?o' )]! Voc? n?o consegue pensar em nada al?m de comida nem por uma ?nica hora?"

 "? que estou com #EMP taaanta#! fome! S? consigo pensar em todos os [entourage_member_two.Custom('GetExpensiveDessert')] que deixamos em [ROOT.Char.GetCapitalLocation.GetNameNoTooltip]", lamenta [entourage_member_two.GetFirstNameNoTooltip], com um fio de baba escorrendo lentamente pela boca." [entourage_member_one.GetFirstNameNoTooltip] cobre o rosto de vergonha.

"Parece que [entourage_member_one.GetFirstNameNoTooltip] exalta as virtudes de [entourage_member_one.GetFaith.GetNameNoTooltip|l]. "...mas voc? n?o compreende a import?ncia de [entourage_member_one.GetFaith.HighGodName] para viver uma boa vida. ? primordial que..."

"#EMP Outra vez n?o!#!", diz [entourage_member_two.GetFirstNameNoTooltip] revirando os olhos. "[entourage_member_two.GetFaith.HighGodName], se est? me ouvindo, salve-me deste(a) [entourage_member_one.Custom2('InsultNoun', SCOPE.sC('entourage_member_two'))]! Eu imploro!""
 travel_danger_events.5000.stubborn: ""Não vou mais tolerar a sua idiotice, seu/sua [entourage_member_two.Custom2('InsultNoun', SCOPE.sC('entourage_member_one'))] [entourage_member_two.Custom2('InsultAdjective', SCOPE.sC('entourage_member_one'))]!" [entourage_member_one.GetFirstNameNoTooltip] bate o p? em [location.Custom('GetProvinceGroundDesc')].

"Você é quem não para de reclamar durante toda esta viagem! Fica gritando '#EMP Já chegamos?#!' em cada encruzilhada!", retruca [entourage_member_two.GetFirstNameNoTooltip].", grita [entourage_member_one.GetFirstNameNoTooltip].

"Você convence [entourage_member_one.GetFirstNameNoTooltip] e [entourage_member_two.GetFirstNameNoTooltip] a resolverem suas diferenças"
 travel_danger_events.5000.generous: "[entourage_member_one.GetFirstNameNoTooltip] e [entourage_member_two.GetFirstNameNoTooltip] não conseguem resolver suas diferenças" [entourage_member_one.GetFirstNameNoTooltip] grita com raiva.

"[entourage_member_two.GetFirstNameNoTooltip] deixa o seu séquito"
 travel_danger_events.5000.gregarious: "Não temos tempo para suas brigas mesquinhas!", exclama [entourage_member_one.GetFirstNameNoTooltip], com uma express?o sombria no rosto.

[entourage_member_two.GetFirstNameNoTooltip] treme de desconforto, aparentemente dispost[entourage_member_two.Custom('ES_OA')] a voltar correndo para [ROOT.Char.GetCapitalLocation.GetNameNoTooltip]."
 travel_danger_events.5000.shy: "[entourage_member_two.GetFirstNameNoTooltip] vence"

"Ap?s v?rios dias de viagem exaustiva, paramos em uma estalagem aqui em [location.GetName], em busca de hospedagem para passar a noite. Envio meu [ROOT.Char.Custom2('RelationToMeShort', travel_leader )|l] [travel_leader.GetName] para perguntar sobre uma poss?vel hospedagem. No entanto, a express?o desanimada em seu rosto quando ele retorna ao s?quito n?o pressagia nada bom.

"
