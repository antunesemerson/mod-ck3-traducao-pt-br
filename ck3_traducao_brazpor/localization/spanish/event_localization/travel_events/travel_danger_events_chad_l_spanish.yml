"#EMP Outra vez n?o!#!", diz [entourage_member_two.GetFirstNameNoTooltip] revirando os olhos. "[entourage_member_two.GetFaith.HighGodName], se est? me ouvindo, salve-me deste(a) [entourage_member_one.Custom2('InsultNoun', SCOPE.sC('entourage_member_two'))]! Eu imploro!""
 travel_danger_events.5000.fallback: ""Não vou mais tolerar a sua idiotice, seu/sua [entourage_member_two.Custom2('InsultNoun', SCOPE.sC('entourage_member_one'))] [entourage_member_two.Custom2('InsultAdjective', SCOPE.sC('entourage_member_one'))]!" [entourage_member_one.GetFirstNameNoTooltip] bate o p? em [location.Custom('GetProvinceGroundDesc')].

"Você é quem não para de reclamar durante toda esta viagem! Fica gritando '#EMP Já chegamos?#!' em cada encruzilhada!", retruca [entourage_member_two.GetFirstNameNoTooltip]."
 travel_danger_events.5000.a: "Vamos l?, com certeza vocês dois podem se entender."
