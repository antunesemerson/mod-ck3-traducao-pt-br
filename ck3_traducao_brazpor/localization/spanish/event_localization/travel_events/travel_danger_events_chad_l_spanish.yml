[travel_leader.GetSheHe|U] apenas baixa a cabeça em desespero. Essa criatura, essa espécie de [angry_char.Custom2('InsultNoun')|l] [angry_char.Custom2('InsultAdjective')], [angry_char.Custom('ES_ElLa')] [angry_char.GetTitledFirstName|l], est? determinada a transformar esta viagem num inferno para mim!" exclama [entourage_member_two.GetFirstNameNoTooltip], prostrad[entourage_member_two.Custom('ES_OA')] sobre [location.Custom('GetProvinceGroundDesc')].

""[ROOT.Char.Custom('FormOfAddressForLiege')|U], o proprietário da estalagem diz que estão lotados, embora houvesse poucos frequentadores no salão comum. Suspeito que ele possa ter recusado porque estas terras pertencem a [angry_char.GetName]...""
 travel_danger_events.5000.patient: "[angry_char.GetFirstNameNoTooltip] vai se arrepender..."

"Não se preocupe, vamos encontrar acomoda??o em outro lugar."
 travel_danger_events.5000.impatient: "#EMP ME. DEIXEM. ENTRAR!#!"

"Você tenta entrar à força na estalagem com violência"
