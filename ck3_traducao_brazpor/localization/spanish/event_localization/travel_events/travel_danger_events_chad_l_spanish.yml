 "Vou falar com o estalajadeiro."
 travel_danger_events.5000.paranoid: "Você tenta convencer o estalajadeiro a permitir que você e o seu séquito fiquem", grita [entourage_member_one.GetFirstNameNoTooltip] em estado de pânico absoluto.

"O estalajadeiro não se convence"
