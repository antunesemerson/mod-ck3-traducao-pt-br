l_spanish:
 #Travel Completion Events
 #Generic completion
 travel_completion_event.1000.t: "$travel_event_prefix$ Chegada"
 travel_completion_event.1000.desc.home: "Finalmente, depois de tudo, estou em casa! Não há nada melhor do que chegar de novo a [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] depois de uma longa jornada. Estou ansioso para descansar por um tempo,"
 travel_completion_event.1000.desc.abroad: "Após uma longa jornada, enfim cheguei a [final_destination_province.GetName]! Ficarei livre, por algum tempo, das trilhas empoeiradas e das assaduras da sela,"
 travel_completion_event.1000.desc.activity: "já que chegou a hora de participar de [ROOT.Char.GetInvolvedActivity.GetName|l].\n\n"
 travel_completion_event.1000.desc.mandala_contract: "depois de ter cumprido meus deveres sagrados por enquanto.\n\n"
 travel_completion_event.1000.desc.no_activity: "mas o chamado da estrada continua a me chamar.\n\n"
 travel_completion_event.1000.stats: "Meu séquito relata que viajamos por [travel_plan_scope.MakeScope.Var('travel_plan_elapsed_days').GetValue] dias e atravessamos [travel_plan_scope.MakeScope.Var('travel_plan_provinces_traversed').GetValue] baronias.\n\n"
 travel_completion_event.1000.stats.travel_leader: "Meu [GetCourtPositionType('travel_leader_court_position').GetNameNoTooltip()|l], [travel_leader_scope.GetName], informa que viajamos por [travel_plan_scope.MakeScope.Var('travel_plan_elapsed_days').GetValue] dias e atravessamos [travel_plan_scope.MakeScope.Var('travel_plan_provinces_traversed').GetValue] baronias.\n\n"
 travel_completion_event.1000.desc.memory: "Nunca vou esquecer quando [travel_conc_memory.GetDescription]."
 travel_completion_event.1000.desc.cultural_ambassador: "Meu Embaixador Cultural teve a oportunidade de promover a aceitação da [ROOT.Char.GetCulture.GetName]!\n\n"
 travel_completion_event.1000.a: "Graças a [ROOT.Char.GetFaith.HighGodName], posso entrar novamente..."
 travel_completion_event.1000.a.adventurer: "Graças a [ROOT.Char.GetFaith.HighGodName], uma cama confortável novamente..."
 travel_completion_event.1000.b: "Viajar é maravilhoso, mas o retorno ao lar é sempre mais doce."
 travel_completion_event.1000.b.adventurer: "Viajar é maravilhoso, mas ainda mais confortável."
 cultural_ambassador_cultural_acceptance_gain_desc: "Viajando com um Embaixador Cultural"
 cultural_ambassador_toast.t: "[cultural_ambassador.GetFirstNameNoTooltip] aumenta a Aceitação Cultural"
 cultural_ambassador_option.tt: "Efeitos do seu Embaixador Cultural:\n$EFFECT_LIST_BULLET$A [cultural_acceptance|lE] entre cada [culture|E] que você visitou e a [SCOPE.GetRootScope.GetCharacter.GetCulture.GetName] aumentou em #positive_value +1%#!"
 finally_there_perk_title_message: "[GetPerk('finally_there_perk').GetName( GetNullCharacter )]"
 souvenirs_aplenty_perk_title_message: "[GetPerk('souvenirs_aplenty_perk').GetName( GetNullCharacter )]"
 no_stone_unturned_perk_title_message: "[GetPerk('no_stone_unturned_perk').GetName( GetNullCharacter )]"
 no_stone_unturned_perk_cooldown_title_message: "[GetPerk('no_stone_unturned_perk').GetName( GetNullCharacter )]: Sem efeito"
 no_stone_unturned_perk_cooldown_message: "O condado ainda está afetado pela sua última visita."
