l_spanish:
 #Travel Start Events
 #Generic start (no activity)
 travel_start_event.1000.t_murder: "Um Começo Macabro"
 travel_start_event.1000.t_sick: "Um Começo Tentativo"
 travel_start_event.1000.t_migrating: "Rumo a Pastos Mais Verdes"
 travel_start_event.1000.t: "Um Novo Começo"
 travel_start_event.1000.intro_activity: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('host'))], [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l], está organizando uma [ROOT.Char.GetInvolvedActivity.GetShortName|l] em [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetName] e chegou a hora de partirmos."
 travel_start_event.1000.intro_my_activity: "Eu estarei organizando um [ROOT.Char.GetInvolvedActivity.GetShortName|l] em [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetName] e chegou a hora de partirmos."
 travel_start_event.1000.desc_sick: "Eu estou bem ciente de que sair na estrada na minha condição, doente, é considerar um risco adicional além do perigo regular que vem com a viagem. No entanto, mesmo no meu estado desfavorável, o show deve continuar.\n\nVamos partir em direção a [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetName] e que [ROOT.Char.GetFaith.HighGodName] cuide de nossas viagens."
 travel_start_event.1000.desc: "Com tudo pronto e carregado, finalmente chegamos ao ponto em que podemos iniciar nossa jornada de [ROOT.Char.GetCurrentLocation.GetName] até nosso próximo destino em [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetName].\n\nEnquanto nos afastamos do domínio e nossas montarias começam a pisar em terras novas, tenho certeza de que retornaremos em breve e em uma só peça.[ROOT.Char.Custom('ES_OA')] de que voltaremos em breve e inteiros."
 travel_start_event.1000.desc_migrating: "O acampamento ressoa como o rugido de uma cachoeira: crianças correndo, animais reclamando e grunhindo, adultos terminando de arrumar.\n\nDezenas e dezenas de lembranças organizadas sem cuidado em fardos e tralhas.\n\nLanço um último olhar para [ROOT.Char.GetCurrentLocation.GetName] enquanto dou um tapinha no flanco do meu cavalo. Só posso esperar que [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetName] seja tão acolhedor conosco quanto este lugar foi."
 travel_start_event.1010.tt.tournament.every_knight: "Como você está participando de um [GetActivityType( 'activity_tournament' ).GetName|l] todos os [knight|lE] [Concept( 'unlanded', 'sin tierras' )|E] disponíveis que você tiver o acompanharão para competir"
 travel_start_event.1000.a: "Mal posso esperar!"
 travel_start_event.1000.a_cynical: "Suponho que devemos..."
 travel_start_event.1000.a_craven: "Espero que dê certo..."
 travel_start_event.1000.a_hajj: "Esperei por isso a minha vida toda."
 travel_start_event.1000.a_hajj_revisit: "Mal posso esperar para ver as muralhas brilhantes novamente."
 travel_start_event.1000.take_test: "Preciso provar meu mérito nos exames."
 travel_start_event.1000.take_test_tt: "Como os [governors|lE] [Concept('landed', 'com terras')|E] não podem realizar exames, você precisa se aposentar para desbloquear novos [merit_levels|lE]"
 #Travelling to a Tournament
 travel_start_event.1010.t_sick_tournament: "$activity_tournament$: $travel_start_event.1000.t_sick$"
 travel_start_event.1010.t_tournament: "$activity_tournament$: $travel_start_event.1000.t$"
 ##Tournament
 travel_start_event.1010.desc_tournament_intro: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('host'))], [host.Custom('ES_ElLa')] [ROOT.Char.GetInvolvedActivity.GetHost.GetTitledFirstName|l], está organizando uma competição de [ROOT.Char.GetInvolvedActivity.GetShortName|l] nas imediações de [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetName] e chegou a hora de partirmos."
 travel_start_event.1010.desc_sick_tournament: "\n\nEmbora meu corpo debilitado esteja afetando minha saúde, maldito[GetPlayer.Custom('ES_OA')] seja se eu não comparecer a este evento — que promete ser espetacular — e que será comentado por anos."
 travel_start_event.1010.desc_tournament: "\n\nNós representaremos a casa de [ROOT.Char.GetHouse.GetName] e faremos o povo [ROOT.Char.GetCulture.GetNameNoTooltip] se orgulhar."
 travel_start_event.1010.desc_tournament_outro_negative: "\n\nEspero que o resto de [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetNameNoTooltip] não esteja tão podre quanto [host.Custom('ES_ElLa')] [host.GetTitledFirstNameNoTooltip|l], mas devemos ter cuidado com o que se esconde na toca do leão."
 travel_start_event.1010.desc_tournament_outro_positive_culture: "\n\nEnquanto estivermos lá, também devemos aproveitar a oportunidade para experimentar a cultura de [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetCulture.GetNameNoTooltip]."
 travel_start_event.1010.desc_tournament_outro_positive: "\n\nEstando longe de casa, também devemos aproveitar a oportunidade para expandir nossos horizontes e desfrutar de qualquer hospitalidade."
 ##My Tournament
 travel_start_event.1010.desc_sick_my_tournament: "Incerto quanto ao tempo que me resta, é importante para mim finalmente participar da competição de [ROOT.Char.GetInvolvedActivity.GetShortName|l] que levei tanto tempo organizando. Olhando para trás, desejo ter planejado na minha capital em vez de hospedar em [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetName]\n\nEmbora perceba que minha saúde debilitada será um risco se eu escolher competir, certamente terei muitos [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] capazes de lutar em meu lugar."
 travel_start_event.1010.desc_my_tournament: "Com rostos frescos e atentos, os membros do meu séquito estão ansiosos para seguir para a competição de [ROOT.Char.GetInvolvedActivity.GetShortName|l] que estou organizando em [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetName]."
 travel_start_event.1010.desc_my_tournament_outro_shy: "Isso deve ser um evento bem-sucedido e também próspero para o condado.\n\nEsperançosamente, todos terão um bom tempo e apreciarão o esforço do evento."
 travel_start_event.1010.desc_my_tournament_outro: "Nós iremos lá e seremos vitoriosos.\n\nMostrar nossa riqueza e prestígio a todos os meus estimados convidados não é um benefício tão terrível assim."
 #Setting off on a Tour
 travel_start_event.1020.t_sick_tour: "$activity_tour$: $travel_start_event.1000.t_sick$"
 travel_start_event.1020.t_tour_majesty: "$activity_tour$: Um Começo Majestoso"
 travel_start_event.1020.t_tour_tax: "$activity_tour$: Um Começo Lucrativo"
 travel_start_event.1020.t_tour_dread: "$activity_tour$: Um Começo Temível"
 travel_start_event.1020.desc_tour_intro: "Chegou a hora de partir para minha [ROOT.Char.GetInvolvedActivity.GetShortName|l] de [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]. Minha corte está pronta, mobilizada e ansiosa para partir.\n\nNossa primeira parada será [next_stop_liege.Custom('FortifiedBuilding')] de [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('next_stop_liege'))], [next_stop_liege.Custom('ES_ElLa')] [next_stop_liege.GetTitledFirstName|l] [next_stop_liege.GetCapitalLocation.GetName];"
 travel_start_event.1020.desc_sick_tour: "será interesante conocer al pueblo.\n\nA pesar de mi mala salud, estoy segur[ROOT.Char.Custom('ES_OA')] de que se hablará de tal [ROOT.Char.GetInvolvedActivity.GetShortNameNoTooltip|l] durante años."
 travel_start_event.1020.desc_tour_majesty: "Estou ansioso para visitar [next_stop_liege.GetHerHim] e ver meu reino, uma propriedade de cada vez.\n\nEstou certo[ROOT.Char.Custom('ES_OA')] de que os súditos de [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip] falarão da minha benevolência por muito tempo."
 travel_start_event.1020.desc_tour_tax: "Tenho vontade de ajudar o povo a contribuir para a tesouraria do reino por qualquer meio disponível.\n\nSem dúvida, os súditos de [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip|l]não terão nenhum excedente escondido da coroa quando esta viagem terminar."
 travel_start_event.1020.desc_tour_dread: "Tenho vontade de incutir medo em meus súditos patéticos, uma posse por vez.\n\nCertamente, vou garantir que os súditos de [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip] jamais se esqueçam da minha [ROOT.Char.GetInvolvedActivity.GetShortNameNoTooltip|l]…"
 due_to_activity_options_tt: "Devido às suas [activity_options|lE]:"
 #Travelling to a Wedding
 travel_start_event.1030.t_red_wedding: "$activity_wedding$: $travel_start_event.1000.t_murder$"
 travel_start_event.1030.t_sick_wedding: "$activity_wedding$: $travel_start_event.1000.t_sick$"
 travel_start_event.1030.t_wedding: "$activity_wedding$: $travel_start_event.1000.t$"
 ##Red Wedding
 travel_start_event.1030.desc_sick_red_wedding: "O sino toca para muitas pessoas, incluindo a mim. Chegou a hora de partir para o [ROOT.Char.GetInvolvedActivity.GetShortName|l] que organizei em [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetName].\n\nMinha doença não me impedirá do que precisa acontecer e este [ROOT.Char.GetInvolvedActivity.GetNameNoTooltip|l] irá e deve acontecer. Eu vou garantir que todos que sobreviverem realmente se lembrem dessas núpcias."
 travel_start_event.1030.desc_red_wedding: "Assim como chegou a hora de mim e do meu séquito partir para o meu [ROOT.Char.GetInvolvedActivity.GetShortName|l] em [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetName]; também chegou a hora dos convidados do [ROOT.Char.GetInvolvedActivity.GetNameNoTooltip] partir deste mundo.\n\nCom esse evento feito da maneira certa, essas núpcias não serão esquecidas em breve... pelos que ficaram vivos."
 ##Host Wedding
 travel_start_event.1030.desc_host_wedding: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('host'))], [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l], celebra seu [ROOT.Char.GetInvolvedActivity.GetCurrentPhase.GetPhase.GetName|l] em [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetName] e chegou a hora de partirmos.\n\n[host.GetSheHe|U] contrairá [host.Custom('GetCulturallyAppropriateMarriageReference')|l] com [host_spouse_to_be.Custom('ES_ElLa')] [host_spouse_to_be.GetTitledFirstName|l]"
 travel_start_event.1030.desc_host_wedding_negative: "e eu estarei lá para zombar deles."
 travel_start_event.1030.desc_host_wedding_positive: "e eu estarei lá, desejando-lhes bem em sua união."
 travel_start_event.1030.desc_host_wedding_default: "e o casamento deve ser bom, como a maioria dos casamentos é."
 travel_start_event.1030.desc_host_wedding_outro_negative: "\n\nQue sua união esteja tão podre quanto um peixe de um mês; e, se nada mais, poderei abusar da hospitalidade [host.Custom('ES_DelDela')] [host.GetTitledFirstNameNoTooltip|l] para desfrutar de boa comida e bebida."
 travel_start_event.1030.desc_host_wedding_outro_positive: "\n\nQue o casamento deles seja tão fértil quanto uma colheita no outono; e duas vezes mais doce."
 travel_start_event.1030.desc_host_wedding_outro_default: "\n\nEstou ansioso para relaxar e desfrutar das celebrações que acompanham tal ocasião."
 ##Wedding
 travel_start_event.1030.desc_wedding: "Mi [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('host'))], [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l], celebra un/a [ROOT.Char.GetInvolvedActivity.GetShortName|l] en [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetName] y ha llegado la hora de que partamos.\n\nLa ceremonia unirá a su [host.Custom2('RelationToMe', SCOPE.sC('first_spouse'))], [first_spouse.Custom('ES_ElLa')] [first_spouse.GetTitledFirstName|l], y a [host.Custom2('RelationToMe', SCOPE.sC('second_spouse'))], [second_spouse.Custom('ES_ElLa')] [second_spouse.GetTitledFirstName|l], en [host.Custom('GetCulturallyAppropriateMarriageReference')|l]."
 travel_start_event.1030.desc_wedding_outro_sick: "\n\nComo minha saúde está em declínio, ainda aguardo ansiosamente este evento para relaxar e apreciar as festividades."
 travel_start_event.1030.desc_wedding_outro_negative: "$travel_start_event.1040.desc_feast_outro_negative$"
 travel_start_event.1030.desc_wedding_outro_positive: "\n\nTenho certeza de que [host.Custom('ES_ElLa')] [host.GetTitledFirstNameNoTooltip|l] organizou uma festividade memorável e aguardo com expectativa participar dela."
 travel_start_event.1030.desc_wedding_outro_default: "$travel_start_event.1030.desc_host_wedding_outro_default$"
 ##My Literal Wedding
 travel_start_event.1030.desc_my_spouse_wedding: "Realizarei meu [ROOT.Char.GetInvolvedActivity.GetCurrentPhase.GetPhase.GetName] em [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetName] e chegou a hora de partirmos.\n\nPor meio dessa união, me casarei com [my_spouse_to_be.Custom('ES_ElLa')] [my_spouse_to_be.GetTitledFirstName|l] e será de fato uma celebração memorável."
 travel_start_event.1030.desc_my_spouse_wedding_outro_negative: "\n\nEmbora eu não sinta um carinho excessivo por [my_spouse_to_be.Custom('ES_ElLa')] [my_spouse_to_be.GetTitledFirstName|l], estou cert[ROOT.Char.Custom('ES_OA')] de que nos daremos bem."
 travel_start_event.1030.desc_my_spouse_wedding_outro_positive: "\n\nEstou muito animad[ROOT.Char.Custom('ES_OA')] com a ideia de passar o resto da minha vida com meu [ROOT.Char.Custom('PartnerOpinionHighDescription')] [my_spouse_to_be.Custom('ES_ElLa')] [my_spouse_to_be.GetTitledFirstNameNoTooltip|l]."
 travel_start_event.1030.desc_my_spouse_wedding_outro_default: "\n\nTenho certeza [ROOT.Char.Custom('ES_OA')] de que vou gostar muito de passar o resto da minha vida com [my_spouse_to_be.Custom('ES_ElLa')] [my_spouse_to_be.GetTitledFirstName|l]."
 ##My Wedding
 travel_start_event.1030.desc_my_wedding: "$travel_start_event.1000.intro_my_activity$\n\nNos juntaremos com meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('first_spouse'))], [first_spouse.Custom('ES_ElLa')] [first_spouse.GetTitledFirstName|l], e com meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('second_spouse'))], [second_spouse.Custom('ES_ElLa')] [second_spouse.GetTitledFirstName|l], em [host.Custom('GetCulturallyAppropriateMarriageReference')|l], para benefício de todos os envolvidos."
 travel_start_event.1030.desc_my_wedding_outro_sick: "\n\nEmbora minha saúde esteja me traindo, ainda farei um esforço para garantir que todos os convidados fiquem impressionados e se sintam cuidados."
 travel_start_event.1030.desc_my_wedding_outro_negative: "\n\nAgora, o casal feliz melhor estar grato por isso."
 travel_start_event.1030.desc_my_wedding_outro_positive: "\n\nEu não poderia estar mais animado para ver esses dois acabarem juntos."
 travel_start_event.1030.desc_my_wedding_outro_default: "\n\nSerá uma cerimônia agradável, e nossos convidados devem ficar impressionados."
 #Travelling to a Feast
 travel_start_event.1040.t_murder_feast: "$activity_feast$: $travel_start_event.1000.t_murder$"
 travel_start_event.1040.t_sick_feast: "$activity_feast$: $travel_start_event.1000.t_sick$"
 travel_start_event.1040.t_feast: "$activity_feast$: $travel_start_event.1000.t$"
 ##Feast
 travel_start_event.1040.desc_feast: "Mi [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('host'))], [host.Custom('ES_ElLa')] [host.GetTitledFirstName], celebra un/a [ROOT.Char.GetInvolvedActivity.GetCurrentPhase.GetPhase.GetName|l] en [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetName] y ha llegado la hora de que partamos."
 travel_start_event.1040.desc_feast_celebration: "\n\nTal [ROOT.Char.GetInvolvedActivity.GetNameNoTooltip|l] é para celebrar os últimos feitos e conquistas [celebratory_guest.Custom('ES_DelDela')] [celebratory_guest.GetTitledFirstName]."
 travel_start_event.1040.desc_feast_outro_sick: "\n\nMesmo que minha saúde esteja me traindo, acredito que participar deste evento pode ser uma boa maneira de tirar minha mente disso e aliviar um pouco o estresse."
 travel_start_event.1040.desc_feast_outro_negative: "\n\nPreciso tomar cuidado com as costas e com a comida durante esta visita, pois [host.Custom('ES_ElLa')] [host.GetTitledFirstNameNoTooltip|l] é uma criatura traiçoeira."
 travel_start_event.1040.desc_feast_outro_positive: "\n\nEstou ansioso para passar mais tempo com [host.Custom('ES_ElLa')] [host.GetTitledFirstNameNoTooltip|l] durante este [ROOT.Char.GetInvolvedActivity.GetNameNoTooltip|l]."
 travel_start_event.1040.desc_feast_outro_default: "\n\nEstou ansioso para experimentar a [host.Custom('RegionalDrink')] da região de [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetNameNoTooltip], além de desfrutar da culinária local."
 ##My Murder Feast
 travel_start_event.1040.desc_sick_murder_feast: "Chegou a hora de acertar as contas com meus convidados de [ROOT.Char.GetInvolvedActivity.GetCurrentPhase.GetPhase.GetName|l].\n\nAgora partiremos para [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetName|l][ROOT.Char.Custom('ES_OA')], onde meu banquete particular acontecerá — e preciso me apressar antes que eu mesmo deixe este mundo."
 travel_start_event.1040.desc_murder_feast: "Eu apresentarei aos meus convidados o meu conjunto específico de festividades quando eu organizar [ROOT.Char.GetInvolvedActivity.GetCurrentPhase.GetPhase.GetName|l] [ROOT.Char.GetInvolvedActivity.GetShortName|l] em [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetName].\n\nTudo está preparado com o máximo de detalhes, e tenho certeza de que eles se sentirão bem-vindos. Será um banquete para lembrar... para aqueles que ficarem vivos."
 #My Feast
 travel_start_event.1040.desc_my_feast: "$travel_start_event.1000.intro_activity$"
 travel_start_event.1040.desc_my_feast_celebration_host: "\n\nO [ROOT.Char.GetInvolvedActivity.GetShortNameNoTooltip|l] é em minha homenagem e a todas as minhas magníficas realizações e feitos."
 travel_start_event.1040.desc_my_feast_celebration: "\n\nEste [ROOT.Char.GetInvolvedActivity.GetNameNoTooltip|l] é em honra de [celebratory_guest.Custom('ES_ElLa')] [celebratory_guest.GetTitledFirstName|l], um ser humano verdadeiramente extraordinário que merece reverência adicional."
 travel_start_event.1040.desc_my_feast_outro_sick: "\n\nNão tenho me sentido bem ultimamente, mas este banquete certamente distrairá minha mente das coisas."
 travel_start_event.1040.desc_my_feast_outro_extrovert: "\n\nGarantirei que este [ROOT.Char.GetInvolvedActivity.GetShortNameNoTooltip|l] seja uma festa memorável; uma da qual as pessoas falarão por anos!"
 travel_start_event.1040.desc_my_feast_outro_introvert: "\n\nEmbora eu não goste particularmente desse tipo de evento, eles são um mal necessário de vez em quando."
 travel_start_event.1040.desc_my_feast_outro: "\n\nEstou ansioso para um bom banquete e para relaxar um pouco!"
 travel_start_event.1040.a: "É o que eles teriam querido."
 #Travelling to a Play Date
 travel_start_event.1050.t_sick_playdate: "$activity_playdate$: $travel_start_event.1000.t_sick$"
 travel_start_event.1050.t_playdate: "$activity_playdate$: $travel_start_event.1000.t$"
 ##Play Date
 travel_start_event.1050.desc_playdate: "$travel_start_event.1000.intro_activity$"
 travel_start_event.1050.desc_sick_playdate: "\n\nEmbora não esteja me sentindo bem ultimamente, as coisas provavelmente funcionarão bem e eu me divertirei de qualquer maneira."
 travel_start_event.1050.desc_playdate_negative: "\n\nEmbora eu não seja muito fã[GetPlayer.Custom('ES_OA')] [host.Custom('ES_DelDela')] [host.GetTitledFirstName|l], mas estou ansioso para passar um tempo com meus pares."
 travel_start_event.1050.desc_playdate_positive: "\n\nTenho tanta vontade de passar um tempo com meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('host'))] [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l], e mal posso esperar para chegarmos!"
 travel_start_event.1050.desc_playdate_default: "\n\nEstou ansioso para passar um tempo com meus pares e explorar a propriedade em [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetNameNoTooltip]."
 travel_start_event.1050.desc_playdate_outro: "\n\nE quem sabe, talvez até mesmo eu [ROOT.Char.Custom('ChildhoodTraitActivity')]."
 ##My Play Date
 travel_start_event.1050.desc_my_playdate: "$travel_start_event.1000.intro_my_activity$"
 travel_start_event.1050.desc_my_playdate_learning: "\n\nTenho planos intrigantes para nós sermos educados e possivelmente fazer novos amigos."
 travel_start_event.1050.desc_my_playdate_bossy: "\n\nEssas crianças aprenderão que em minha propriedade, minha vontade é lei. Mas tenho certeza de que nos daremos bem."
 travel_start_event.1050.desc_my_playdate_pensive: "\n\nEncarar meus pares não é algo que eu esteja com muita vontade de fazer agora ou… bem, nunca.\n\nMas, embora eu não esteja particularmente feliz com esse arranjo, suponho que preciso manter a compostura e entrar na onda desses caprichos para manter meu status social intacto."
 travel_start_event.1050.desc_my_playdate_victim: "\n\n[playdate_victim.GetTitledFirstName|U] estará lá, então isso promete ser um bom momento..., pelo menos para mim.\n\nExibir a posse de [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetNameNoTooltip] também deve ser divertido."
 travel_start_event.1050.desc_my_playdate_default: "\n\nMeus cortesãos e eu planejamos muitas atividades para nós participarmos, e estou ansioso para receber meus pares."
 travel_start_event.1050.desc_my_playdate_outro: "\n\nDeve ser muito divertido e uma ótima oportunidade para eu mostrar a propriedade de [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetNameNoTooltip], também."
 travel_start_event.1051.t: "$activity_playdate$: Hora de Brincar"
 travel_start_event.1051.many: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('child_1'))], [child_1.Custom('ES_ElLa')] [child_1.GetTitledFirstName|l], junto com [child_2.Custom('ES_ElLa')] [child_2.GetTitledFirstName|l] e as outras crianças,"
 travel_start_event.1051.three: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('child_1'))], [child_1.Custom('ES_ElLa')] [child_1.GetTitledFirstName|l], junto com [child_2.Custom('ES_ElLa')] [child_2.GetTitledFirstName|l] e [child_3.Custom('ES_ElLa')] [child_3.GetTitledFirstName|l],"
 travel_start_event.1051.two: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('child_1'))], [child_1.Custom('ES_ElLa')] [child_1.GetTitledFirstName|l], junto com [child_2.Custom('ES_ElLa')] [child_2.GetTitledFirstName|l],"
 travel_start_event.1051.one: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('child_1'))], [child_1.Custom('ES_ElLa')] [child_1.GetTitledFirstName|l],"
 travel_start_event.1051.desc: "foi convidad[child_1.Custom('ES_OA')] por [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l] para um encontro de pares."
 travel_start_event.1051.single: "\n\n[child_1.GetSheHe|U] arrumou as malas e está pront[child_1.Custom('ES_OA')] e claramente animad[child_1.Custom('ES_OA')] para partir para [host.GetCapitalLocation.GetNameNoTooltip]."
 travel_start_event.1051.multiple: "\n\nEles estão prontos e empolgados para partir para [host.GetCapitalLocation.GetNameNoTooltip]."
 travel_start_event.1051.a_cynical: "Muito bem..."
 travel_start_event.1051.a: "Divirta-se, [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))]!"
 travel_start_event.1051.a.multiple: "Divirtam-se, crianças!"
 travel_start_event.1051.b: "Acho que não!"
 playdate_depart_tt: "[THIS.Char.Custom('ES_ElLa')|U] [THIS.Char.GetTitledFirstName|l] parte para [host.GetInvolvedActivity.GetName|l]"
 playdate_blocked_tt: "Todos os seus filhos ou pupilos convidados para [host.GetInvolvedActivity.GetName|l]"
 playdate_forbidden_title: "$activity_playdate$ Proibido"
 playdate_forbidden_tt: "[carer.GetTitledFirstName] proibiu a [child_1.GetFirstName] e outros de comparecer ao seu encontro com rapazes"
 playdate_forbidden_single_tt: "[carer.GetTitledFirstName] proibiu a [child_1.GetFirstName] comparecer ao seu encontro com rapazes"
 #Going on a Pilgrimage
 travel_start_event.1060.t_sick_pilgrimage: "$activity_pilgrimage$: $travel_start_event.1000.t_sick$"
 travel_start_event.1060.t_hajj: "O Hajj"
 travel_start_event.1060.t_pilgrimage: "$activity_pilgrimage$: $travel_start_event.1000.t$"
 travel_start_event.1060.desc_sick_pilgrimage: "Posso senti-lo em meu corpo; a dor sutil e a lenta decadência que acompanham minha doença. Em meus dias mais sombrios, a única coisa que me mantém vivo é saber que [ROOT.Char.GetFaith.HighGodName] tem um plano para nós.\n\nNo entanto, como carecia de Sua presença, agora me fica claro que devo empreender minha [ROOT.Char.GetInvolvedActivity.GetShortNameNoTooltip|l] a [ROOT.Char.GetInvolvedActivity.GetCurrentPhase.GetLocation.GetCounty.GetTitle.GetNameNoTier] para me aproximar de [ROOT.Char.GetFaith.HighGodNameAlternate]. Também é um manto tranquilizador para minha alma, para que, quando eu finalmente falecer, não tenha nada a temer."
 travel_start_event.1060.desc_hajj_pilgrimage: "Chegou a hora de eu fazer a peregrinação a Meca. Foi me ordenado, como foi para todos os muçulmanos, mostrar minha submissão a [ROOT.Char.GetFaith.HighGodName]."
 travel_start_event.1060.desc_pilgrimage: "Durante toda a preparação desta viagem, tive essa sensação de serenidade e de que tudo acabaria bem.\n\nÉ um prazer embarcar em minha [ROOT.Char.GetInvolvedActivity.GetShortNameNoTooltip|l] até [ROOT.Char.GetInvolvedActivity.GetCurrentPhase.GetLocation.GetCounty.GetTitle.GetNameNoTier] para me aproximar ainda mais de [ROOT.Char.GetFaith.HighGodName]. Agora mais do que nunca, tenho a certeza de que [ROOT.Char.GetFaith.HighGodNameSheHe] velará por mim em minhas viagens."
 travel_start_event.1060.tt.random_pilgrim_counter: "Você adicionou [THIS.Char.MakeScope.Var('rando_pilgrim_counter').GetValue] potenciais [THIS.Char.Custom('GetPilgrimSingularPlural')] à sua [THIS.Char.GetInvolvedActivity.GetShortName|l] para [THIS.Char.GetInvolvedActivity.GetCurrentPhase.GetLocation.GetCounty.GetTitle.GetNameNoTier]"
 travel_start_event.1060.desc_yatra_pilgrimage: "Ao partir em [Glossary('yatra', 'YATRA_GLOSS')] sinto uma mistura de entusiasmo e apreensão. Lembro a mim mesmo que a jornada é tão importante quanto o destino. Todas as dificuldades que eu possa suportar serão, em si mesmas, um ato de devoção.\n\nEspero que empreender tal [ROOT.Char.GetInvolvedActivity.GetShortName|l] a [ROOT.Char.GetInvolvedActivity.GetCurrentPhase.GetLocation.GetCounty.GetTitle.GetNameNoTier] me deixe mais próximo de [ROOT.Char.GetFaith.HighGodName]."
 #Yatra gloss
 YATRA_GLOSS: "Viagem, procissão em sânscrito. Os integrantes de tais peregrinações são chamados de yatri."
 #Travelling to a Hunt
 travel_start_event.1070.t_sick_hunt: "$activity_hunt$: $travel_start_event.1000.t_sick$"
 travel_start_event.1070.t_hunt: "$activity_hunt$: $travel_start_event.1000.t$"
 ##Hunt
 travel_start_event.1070.desc_hunt: "$travel_start_event.1000.intro_activity$"
 travel_start_event.1070.desc_hunt_negative: "Tenho que ter cuidado com esta viagem. Não confio nem um pouco em [host.Custom('ES_DelDela')] [host.GetTitledFirstNameNoTooltip|l]."
 travel_start_event.1070.desc_hunt_positive: "Estou ansioso para passar mais tempo com [host.GetSheHe]."
 travel_start_event.1070.desc_hunt_default: "Deveria poder representar orgulhosamente a casa de [ROOT.Char.GetHouse.GetName]."
 travel_start_event.1070.desc_sick_hunt_outro: "\n\nE à medida que minha saúde está falhando, espero que essa caçada ajude a tirar minha mente das coisas e aliviar um pouco do meu estresse."
 travel_start_event.1070.desc_hunt_outro_standard: "\n\nIsso deveria ser um bom esporte, se o evento for devidamente organizado."
 travel_start_event.1070.desc_hunt_outro_dangerous: "\n\nVamos caçar bestas perigosas; destreza e astúcia são de extrema importância."
 travel_start_event.1070.desc_hunt_outro_legendary: "\n\nNossa presa é uma besta lendária, e a presa será minha..."
 travel_start_event.1070.desc_hunt_outro_falconry: "\n\nCaçar com aves é um empreendimento muito nobre, no qual tenho certeza de me destacar[ROOT.Char.Custom('ES_OA')] de me destacar."
 ##My Hunt
 travel_start_event.1070.desc_my_hunt: "$travel_start_event.1000.intro_my_activity$"
 travel_start_event.1070.desc_my_hunt_hunter: "Finalmente, uma chance de seguir minha paixão e praticar minhas habilidades."
 travel_start_event.1070.desc_my_hunt_humble: "Estou ansioso para passar tempo ao ar livre."
 travel_start_event.1070.desc_my_hunt_arrogant: "Não tenho dúvida de que em breve voltarei para casa, cobert[ROOT.Char.Custom('ES_OA')] de glória."
 travel_start_event.1070.desc_sick_my_hunt_outro: "\n\nEmbora não esteja com saúde no auge, farei o meu melhor para entreter meus convidados. Tenho certeza de que esse evento será agradável para todos os envolvidos."
 travel_start_event.1070.desc_my_hunt_outro_standard: "\n\nÉ verdade, nada se compara a uma boa e velha caçada!"
 travel_start_event.1070.desc_my_hunt_outro_dangerous: "\n\nNuestra presa será feroz; seguro que atraerá a los temerarios a la partida de caza."
 travel_start_event.1070.desc_my_hunt_outro_legendary: "\n\nA presa que buscamos é algo lendário, se é real..."
 travel_start_event.1070.desc_my_hunt_outro_falconry: "\n\nA habilidade das minhas aves mostrará aos outros como manter um viveiro."
 #Travelling to a Witch Ritual
 travel_start_event.1080.t_sick_witch_ritual: "$activity_witch_ritual$: $travel_start_event.1000.t_sick$"
 travel_start_event.1080.t_witch_ritual: "$activity_witch_ritual$: $travel_start_event.1000.t$"
 ##Witch Ritual
 travel_start_event.1080.desc_witch_ritual: "$travel_start_event.1000.intro_activity$"
 travel_start_event.1080.desc_witch_ritual_negative: "\n\nEmbora eu não seja muito devot[GetPlayer.Custom('ES_OA')] [host.Custom('ES_DelDela')] [host.GetTitledFirstNameNoTooltip|l], estou ansioso para compartilhar conhecimentos e aprender com outros irmãos."
 travel_start_event.1080.desc_witch_ritual_positive: "\n\nComo [host.Custom('ES_ElLa')] [host.GetTitledFirstNameNoTooltip|l] é um[host.Custom('ES_XA')] [host.Custom('MagicUserTerm')] excelente, estou ansioso para passar um tempo com [host.GetSheHe], assim como com meus irmãos, para compartilhar meus conhecimentos e aprimorar minhas habilidades."
 travel_start_event.1080.desc_witch_ritual_default: "\n\nTer a oportunidade de passar tempo com meus colegas costuma ser uma ocasião rara, e estou ansioso para encontrar minhas irmãs e irmãos, aprimorar minhas habilidades e compartilhar meu conhecimento."
 travel_start_event.1080.desc_sick_witch_ritual_outro: "\n\nEnquanto minha saúde está fraca, certamente não quero perder este evento."
 travel_start_event.1080.desc_witch_ritual_outro: "\n\nIsso tem todos os elementos de um grande evento, de fato, um que as luas lembrarão por muito tempo!"
 ##My Witch Ritual
 travel_start_event.1080.desc_my_witch_ritual: "$travel_start_event.1000.intro_my_activity$"
 travel_start_event.1080.desc_my_witch_ritual_learned: "\n\nPor ser um[ROOT.Char.Custom('ES_XA')] poderos[ROOT.Char.Custom('ES_OA')] e erudit[ROOT.Char.Custom('ES_OA')] [ROOT.Char.Custom('MagicUserTerm')], me certificarei de disseminar meu conhecimento entre meus irmãos e irmãs para que todos possamos viver vidas mais sábias."
 travel_start_event.1080.desc_my_witch_ritual_mystic: "\n\nComo místic[ROOT.Char.Custom('ES_OA')] y vidente, preveo cosas buenas en nuestro futuro y mi sabiduría debería ser muy apreciada por mis hermanos en los festejos por nuestro/a [ROOT.Char.GetFaith.WitchGodMistressMaster]."
 travel_start_event.1080.desc_my_witch_ritual_health: "\n\nConhecedor[ROOT.Char.Custom('ES_XA')] como sou do corpo e das enfermidades, meus ensinamentos devem servir para que o restante de meus irmãos também possa viver uma vida longa e saudável."
 travel_start_event.1080.desc_my_witch_ritual_default: "\n\n¡Seré un[ROOT.Char.Custom('ES_XA')] gran anfitri[ROOT.Char.Custom('ES_OnOna')] para los miembros de nuestra hermandad que han viajado desde todo lugar para reunirse, estrechar lazos y festejar a nuestro/a [ROOT.Char.GetFaith.WitchGodMistressMaster]!"
 travel_start_event.1080.desc_sick_my_witch_ritual_outro: "$travel_start_event.1080.desc_sick_witch_ritual_outro$"
 travel_start_event.1080.desc_my_witch_ritual_outro: "$travel_start_event.1080.desc_witch_ritual_outro$"
 #Travelling to an Imperial Examination
 travel_start_event.1100.t_sick_exam: "$activity_imperial_examination$: $travel_start_event.1000.t_sick$"
 travel_start_event.1100.t_sick_exam_local: "$activity_local_examination$: $travel_start_event.1000.t_sick$"
 travel_start_event.1100.t_exam: "$activity_imperial_examination$: $travel_start_event.1000.t$"
 travel_start_event.1100.t_exam_local: "$activity_local_examination$: $travel_start_event.1000.t$"
 ##Imperial Examination
 travel_start_event.1100.desc_exam: "$travel_start_event.1000.intro_activity$\n\nRumores dizem que esta rodada de exames se concentrará em"
 travel_start_event.1100.desc_exam_learning: "o conhecimento acadêmico, e, por isso, me certifiquei de voltar a me familiarizar com os clássicos para me preparar."
 travel_start_event.1100.desc_exam_stewardship: "governança, e por isso tenho aprimorado meu conhecimento sobre todos os assuntos de Estado."
 travel_start_event.1100.desc_exam_martial: "as estratagemas da guerra, e assim passei meus dias examinando registros militares em preparação."
 ##My Imperial Examination
 travel_start_event.1100.desc_my_exam_imperial: "$travel_start_event.1000.intro_my_activity$\n\nComo [ROOT.Char.GetTitleAsName|l], espero ver eruditos virtuosos de todos os cantos do senhorio competindo entre si para demonstrar que são dignos de governar todos aqueles que contemplam os céus."
 travel_start_event.1100.desc_my_exam_local: "$travel_start_event.1000.intro_my_activity$\n\nEspero que os habitantes mais capazes se juntem a mim imediatamente em [location.GetName], prontos para provar seu valor."
 travel_start_event.1100.desc_sick_exam_outro: "\n\nApesar do meu corpo debilitado, não quero perder este evento."
 travel_start_event.1100.desc_exam_wrong_gender: "\n\nSé que se cuestionará mi lugar en este examen, pero me #EMP ganaré#! el mérito."
 travel_start_event.1100.desc_exam_outro: "\n\nMe pergunto se conseguirei me destacar entre os demais."
 travel_start_event.1100.desc_my_exam_outro: "\n\nA saber quem se destacará entre os demais."
 wrong_examination_gender_tt: "@warning_icon! #X Devido à [gender_law|lE] do senhorio#!"
 tgp_wrong_examination_gender_female_modifier: "Participação reprovável"
 tgp_wrong_examination_gender_female_modifier_desc: "Esta personagem decidiu participar de um Exame, apesar de seu gênero."
 tgp_wrong_examination_gender_male_modifier: "$tgp_wrong_examination_gender_female_modifier$"
 tgp_wrong_examination_gender_male_modifier_desc: "$tgp_wrong_examination_gender_female_modifier_desc$"
 #Travelling to a Mandala Ritual
 travel_start_event.1110.t_sick: "Ritual do mandala: $travel_start_event.1000.t_sick$"
 travel_start_event.1110.t: "Ritual mandala: $travel_start_event.1000.t$"
 travel_start_event.1110.desc: "A estrada me chama! Preciso partir e guiar meus seguidores em [contract_location.GetName], assegurando que sintam o abraço da minha benevolência."
 travel_start_event.1110.desc_sick_outro: "\n\nApesar do meu corpo debilitado, preciso reunir minhas forças e seguir em frente."
 travel_start_event.1110.desc_outro: "\n\nVamos ver o que eles têm a oferecer."
 #Traveling to a Debate
 travel_start_event.1120.t_special_guest: "Debate: o desafio"
 travel_start_event.1120.t_sick_debate: "Debate: $travel_start_event.1000.t_sick$"
 travel_start_event.1120.t_debate: "Debate: $travel_start_event.1000.t$"
 travel_start_event.1120.desc_special_guest: "Meu [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('host'))], [host.Custom('ES_ElLa')] [host.GetTitledFirstName|l], deseja debater comigo pela liderança do [ROOT.Char.Custom('GetMyMovement')]."
 travel_start_event.1120.desc_my_debate: "$travel_start_event.1000.intro_my_activity$"
 travel_start_event.1120.desc_debate: "$travel_start_event.1000.intro_activity$"
 travel_start_event.1120.desc_sick_debate_outro: "\n\nEmbora meu corpo esteja me traindo, o futuro de [primary_title.GetName] é mais importante."
 travel_start_event.1120.a_leader: "Veremos quem tem a perspicácia para triunfar."
 travel_start_event.1120.desc_debate_outro: "\n\nÉ meu dever garantir que o futuro de [primary_title.GetName] siga na direção certa."
 travel_start_event.1120.desc.undecided: "\n\nNo entanto, fui informado de que se espera que eu pertença a um dos movimentos dominantes para poder participar."
 travel_start_event.1120.conservatives: "Me unirei ao [GetSituation('dynastic_cycle').GetTopParticipantGroupByKey( 'conservative_movement' ).GetNameNoTooltip]."
 travel_start_event.1120.conservatives.tt: "Você se junta a [GetSituation('dynastic_cycle').GetTopParticipantGroupByKey( 'conservative_movement' ).GetName]"
 travel_start_event.1120.expansionists: "Os membros de [GetSituation('dynastic_cycle').GetTopParticipantGroupByKey( 'expansion_movement' ).GetNameNoTooltip] são os mais sensatos."
 travel_start_event.1120.expansionists.tt: "Você se junta a [GetSituation('dynastic_cycle').GetTopParticipantGroupByKey( 'expansion_movement' ).GetName]"
 travel_start_event.1120.advancement: "O [GetSituation('dynastic_cycle').GetTopParticipantGroupByKey( 'advancement_movement' ).GetNameNoTooltip] me chama a atenção."
 travel_start_event.1120.advancement.tt: "Você se junta a [GetSituation('dynastic_cycle').GetTopParticipantGroupByKey( 'advancement_movement' ).GetName]"
 travel_start_event.1120.pro_hegemon: "O [GetSituation('dynastic_cycle').GetTopParticipantGroupByKey( 'pro_hegemon_movement' ).GetNameNoTooltip] nos guiará a todos!"
 travel_start_event.1120.pro_hegemon.tt: "Você se junta a [GetSituation('dynastic_cycle').GetTopParticipantGroupByKey( 'pro_hegemon_movement' ).GetName]"
 travel_start_event.1120.bye: "Não tenho interesse em me juntar a nenhum deles."
