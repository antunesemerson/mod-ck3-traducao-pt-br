l_spanish:
 travel_danger_events.2000.t: "$travel_danger_prefix$ Os Olhos da Selva"
 travel_danger_events.2000.desc: "Algo me observa desde que pusemos os pés na selva de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]. Já vi o brilho dos olhos, ouvi o farfalhar das folhas.

Ele me segue, me espreita, #EMP me caça#!.

Os homens que enviei para investigar não voltaram. Que criatura é essa que ronda as profundezas esmeraldas da selva?"
 travel_danger_events.2000.a: "A chuva não deu trégua enquanto viajávamos por [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]. Eu vinha observando nervosamente o rio enquanto suas águas turvas inchavam cada vez mais, como uma bolha cheia de pus. 

Meu [ROOT.Char.Custom2('RelationToMe', flood_victim)] [flood_victim.GetFirstNameNoTooltip] reclama, mais uma vez: "Faz dias que estamos marchando por este esgoto maldito, encharcado e afundado. Quando é que...?"

Antes que possa terminar a frase, a margem finalmente cede. Uma enxurrada de água espessa e escura avança em direção aos nossos suprimentos, e a [flood_victim.GetFirstNameNoTooltip]!"
 travel_danger_events.2000.b: "Salvem os suprimentos!"
 travel_danger_events.2000.c: "Salvem [flood_victim.GetFirstNameNoTooltip]!"
 travel_danger_events.2001.t: "Queimou Minha Selva"
 travel_danger_events.2001.desc: "A chuva não deu trégua enquanto viajávamos por [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]. Eu vinha observando nervosamente o rio enquanto suas águas turvas inchavam cada vez mais, como uma bolha cheia de pus. 

