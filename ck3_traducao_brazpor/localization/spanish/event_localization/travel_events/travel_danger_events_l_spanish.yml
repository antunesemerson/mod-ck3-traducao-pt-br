l_spanish:
 #Travel Danger Event Prefix
 travel_danger_prefix: "Perigo:"
 #travel_danger_events.0001.t: "Bandits!"
 #travel_danger_events.0001.desc: "You have encountered bandits because of low control!"
 #travel_danger_events.0001.a: "Run"
 #travel_danger_events.0001.b: "Fight"
 #Hills Terrain
 travel_danger_events.1000.t: "$travel_danger_prefix$ Montanhas de um Molehill"
 travel_danger_events.1000.desc: "A estrada ficou incrivelmente íngreme nas últimas horas e todos começam a se cansar. Como não se vê o fim das colinas, meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('travel_leader'))], [travel_leader.GetFirstName], se aproxima de mim e diz:\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], nossas montarias não podem continuar assim por muito mais tempo. Os pobres animais precisam de uma pausa ou temo que desabem! Temos de parar para descansar!".\n\n[travel_leader.GetSheHe|U] sabe muito bem que isso atrasaria nossa viagem até [destination.GetName]…"
 travel_danger_events.1000.a: "Tem razão. Seria prudente descansar."
 travel_danger_events.1000.b: "\"Não vou tolerar atrasos. Continuamos adiante!\""
 travel_danger_events.1001.t: "$travel_danger_events.1000.t$"
 travel_danger_events.1001.desc: "Avanço um pouco mais, ansioso para chegar a [destination.GetName] como planejado. Ao alcançar o topo da maior colina até agora, acho que nossas dificuldades talvez finalmente cheguem ao fim, quando…\n\n#EMP PLAS!… PLAS, PLAS, PLAS!#!\n\nMe viro para ver a origem do barulho e suspiro ao ver que todas as nossas montarias começam a cair no chão! Parece que [travel_leader.GetFirstName] estava certo… Esses pobres animais só conseguem aguentar tanto esforço. Eu deveria ter ouvido quando ainda tinha chance."
 travel_danger_events.1001.a: "\"[travel_leader.GetFirstNameNoTooltip], vá até a cidade mais próxima e compre montes frescos.\""
 travel_danger_events.1001.b: "\"Prosseguimos a pé!\""
 travel_danger_events.1002.t: "$travel_danger_prefix$ Encostas Traiçoeiras"
 travel_danger_events.1002.desc: "Enquanto viajamos por [current_location.GetName], contemplo a bela vista da encosta da montanha. Quando desvio o olhar para voltar a me concentrar no caminho pedregoso à frente, percebo que fomos cercados por um grupo de rufiões! [Select_CString( bandit.IsFemale, 'Uma mulher', 'Um homem' )] de aparência assustadora, presumivelmente seu líder, se coloca diante da nossa caravana.\n\n"Passar por estas montanhas vai custar caro. Não me importa quem você é, qualquer um que passe pelas minhas montanhas paga"."
 travel_danger_events.1002.a: "\"Vamos conversar sobre isso.\""
 travel_danger_events.1002.a.success: "Você persuade os bandidos"
 travel_danger_events.1002.a.success.desc: "Você e seu séquito viajam livremente pelo desfiladeiro da montanha"
 travel_danger_events.1002.a.failure: "Você não persuade os bandidos"
 travel_danger_events.1002.a.failure.desc: "Você paga os bandidos para permitir sua passagem"
 travel_danger_events.1002.b: "\"Não vou ceder tão facilmente. #EMP À batalha!#!\""
 travel_danger_events.1002.b.success: "Você vence os bandidos"
 travel_danger_events.1002.b.success.desc: "$travel_danger_events.1002.a.success.desc$"
 travel_danger_events.1002.b.failure: "Os bandidos te vencem"
 travel_danger_events.1002.b.failure.desc: "$travel_danger_events.1002.a.failure.desc$"
 travel_danger_events.1002.c: "\"Guardas! Resolvam esses idiotas!\""
 travel_danger_events.1002.c.tt: "Você envia seus guardas da [travel_option|lE] para lidar com os bandidos"
 travel_danger_events.1002.d: ""E se eu pagasse a você para nos guiar pelas montanhas?""
 travel_danger_events.1002.e: "É a terra deles..."
 travel_danger_events.1003.t: "$travel_danger_prefix$ Fundo Encharcado"
 travel_danger_events.1003.desc: "Sé que debemos andar con cuidado por las ciénagas de [current_location.GetName]. Este espeluznante lugar me inquieta hasta la médula y hay un sinfín de peligros contra los que prevenirse. Mi séquito ha recibido instrucciones para tomar todas las precauciones necesarias.\n\nEchando la vista atrás desde la cabeza de la columna, hago recuento de mis compañeros…\n\n#EMP ¡Falta uno de nosotros!#!"
 travel_danger_events.1003.a: "Poderia enviar meu [Select_CString( travel_leader.IsFemale, 'chefe', 'chefe' )] da caravana, [travel_leader.GetFirstNameNoTooltip], para encontrar o retardatário."
 travel_danger_events.1003.b.success: "Companheiro ausente encontrado"
 travel_danger_events.1003.b.success.desc: "[missing_companion.GetShortUIName] retorna para o seu séquito."
 travel_danger_events.1003.b.failure: "Companheiro ausente perdido"
 travel_danger_events.1003.b: "Eles estão tão bons quanto mortos. Deixem-nos."
 travel_danger_events.1006.t: "$travel_danger_prefix$ Árvores Familiares"
 travel_danger_events.1006.desc: "«¿No hemos visto antes ese árbol enorme? Juraría que estamos dando vueltas», grita mi [Select_CString( travel_leader.IsFemale, 'jefa', 'jefe' )] de la caravana, [travel_leader.GetName].\n\nTal vez tenga razón… Llevamos horas en este bosque sin señales de salida. ¿Seguimos aún #EMP en#! [current_location.GetName]? La densa cubierta arbórea hace imposible saber la hora del día o incluso la dirección en la que vamos.\n\nA este paso, nunca llegaremos a [destination.GetName]…"
 travel_danger_events.1006.a: "Eu sei #EMP exatamente#! onde estamos!"
 travel_danger_events.1006.a.success: "Você encontra o caminho certo"
 travel_danger_events.1006.a.success.desc: "Experiência de Perigo Adquirida"
 travel_danger_events.1006.a.failure: "Você luta para encontrar o caminho certo"
 travel_danger_events.1006.b: "Envie alguém para encontrar um guia local."
 travel_danger_events.1006.b.hire_guide: "Você procura por um guia para contratar"
 travel_danger_events.1006.c: "Envie batedores à frente."
 travel_danger_events.1006.c.major_speed_decrease: "Sua viagem está significativamente atrasada"
 travel_danger_events.1006.c.minor_speed_decrease: "Sua viagem está ligeiramente atrasada"
 travel_danger_events.1007.t: "$travel_danger_prefix$ Nem Uma Gota"
 travel_danger_events.1007.desc: "Nossa jornada até [destination.GetName] infelizmente nos trouxe diretamente pelos desertos de [current_location.GetName]. Não estávamos preparados para percorrer este trecho longo sem uma única fonte de água, e muitos dos meus companheiros começaram a parecer tão horríveis quanto [ROOT.Char.Custom('RegionalRootVegetablePlural')] secos.\n\nPreciso fazer algo... e rápido!"
 travel_danger_events.1007.a: "Eu conheço um oásis próximo que pode ser a nossa salvação."
 travel_danger_events.1007.a.tt: "Seu plano de viagem será redirecionado para o oásis."
 travel_danger_events.1007.b: "Meu [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('water_hider'))] [water_hider.GetFirstNameNoTooltip] bebe como um #EMP cavalo#!, basta!"
 travel_danger_events.1007.b.success: "Companheiros inspirados"
 travel_danger_events.1007.b.success.desc: "[water_hider.GetFirstName] morre de sede"
 travel_danger_events.1007.b.failure: "Falha em inspirar os companheiros"
 travel_danger_events.1007.b.failure.desc: "[water_hider.GetFirstName] está severamente desidratado"
 travel_danger_events.1007.c: "Precisamos continuar."
 travel_danger_events.1007.c.tt: "Você interroga [water_hider.GetFirstName] sobre um suprimento secreto de água"
 travel_danger_events.1007.c.success: "Água encontrada após a interrogatório"
 travel_danger_events.1007.c.failure: "Nenhuma água encontrada após a interrogatório"
 dehydrated_modifier: "Desidratado"
 dehydrated_modifier_desc: "Este personagem ficou desidratado após viajar pelo deserto."
 travel_danger_events.1007.d: "Ainda bem que trouxemos água extra!"
 travel_danger_events.1008.t: "$travel_danger_prefix$ Consequências"
 travel_danger_events.1008.desc: "Nossa jornada nos trouxe até [current_location.GetName]. O que antes era uma linda [current_location_barony.Custom('BaronyTownType')] foi reduzido a um fantasma do que já foi.\n\nPilhões de escombros fumegantes que antes eram lares se erguem, sufocados pela destruição causada por um exército implacável. Entre lágrimas e cobert[zombie.Custom('ES_OA')] de sujeira, um[zombie.Custom('ES_XA')] [zombie.GetWomanMan] vasculha o que pode ter sido uma fazenda em busca do que restou de seus pertences.\n\nEle nos percebe, claramente fora de lugar nessa terra devastada, e dispara na direção de nosso séquito!"
 travel_danger_events.1008.a: ""Guardas! Parem[zombie.GetHerHim]!""
 travel_danger_events.1008.a.tt: "[zombie.GetFirstNameNoTooltip] morto sob suas ordens"
 travel_danger_events.1008.b: "Tenho certeza de que não nos quer mal."
 travel_danger_events.1008.c: "\"#EMP Pare!#! Pegue isso e siga seu caminho.\""
 travel_danger_events.1008.good_intentions: "[zombie.GetFirstNameNoTooltip] não tem más intenções"
 travel_danger_events.1008.bad_intentions: "[zombie.GetFirstNameNoTooltip] tem intenções obscuras"
 travel_danger_events.1009.t: "$travel_danger_events.1008.t$, Boas Intenções"
 travel_danger_events.1009.desc: "[zombie.Custom('ES_ElLa')|U] [zombie.GetWomanMan] mirrado[zombie.Custom('ES_OA')] cruza rapidamente o terreno que nos separa, sem prestar a menor atenção às dezenas de corpos espalhados pelo chão. Ele baixa a cabeça e me dirige a palavra:\n\n"[ROOT.Char.Custom('FormOfAddressForLiege')|U], meu lar foi reduzido a cinzas e me roubaram o sustento. Lanço-me à vossa misericórdia. #EMP Ayudadme, por favor!#!""
 travel_danger_events.1009.a: "\"Coitado de você...\""
 travel_danger_events.1009.b: "#EMP Matad[zombie.GetHerHim] igual!#!"
 travel_danger_events.1009.c: ""Eu colocarei você sob minha proteção!""
 travel_danger_events.1009.d: "Na verdade, não é meu problema, não é?"
 travel_danger_events.1010.t: "$travel_danger_events.1008.t$, Más Intenções"
 travel_danger_events.1010.desc: "[zombie.Custom('ES_ElLa')|U] [zombie.GetWomanMan] magr[zombie.Custom('ES_OA')] percorre rapidamente o terreno que nos separa, sem dar a menor atenção às dezenas de corpos espalhados pelo chão. Avança contra mim, com a boca escancarada em um rosnado e uma fúria selvagem nos olhos."
 travel_danger_events.1010.a: "\"Eu posso lidar com isso!\""
 travel_danger_events.1010.a.success: "Afastou [Select_CString( zombie.IsFemale, 'a infeliz', 'o infeliz' )]"
 travel_danger_events.1010.a.failure: "Ferido por um[zombie.Custom('ES_XA')] infeliz"
 travel_danger_events.1010.b: "#EMP Guardas!#!"
 travel_danger_events.1010.b.success: "Infeliz rechaçou[zombie.Custom('ES_OA')]"
 travel_danger_events.1010.b.failure: "Membro do séquito ferido"
 travel_danger_events.1010.tt: "[zombie.GetFirstNameNoTooltip] se afasta rapidamente"
 travel_danger_events.1011.t: "$travel_danger_prefix$ Mordido pelo Gelo"
 travel_danger_events.1011.t_twice: "$travel_danger_prefix$ Tormentos Congelantes"
 travel_danger_events.1011.t_thrice: "$travel_danger_prefix$ Congelamento Mortal"
 travel_danger_events.1011.desc: "Há dias está nevando e o frio é insuportável. Olho ao redor e vejo que meu grupo também está tendo dificuldades com isso, então decido seguir a pé junto deles. Depois de caminharmos por mais uma hora em meio à tempestade de neve, [frostbite_victim.GetTitledFirstName] me puxa para o lado, tremendo, e geme:\n\n\"Por favor, [frostbite_victim.Custom2('RelationToMeShort', ROOT.Char)] meu [ROOT.Char.Custom('ES_OA')], já não sinto [frostbite_victim.Custom('GetFrostbittenBodyPart')]!\"."
 travel_danger_events.1011.desc_frostbite_twice: "Mais uma vez, a viagem cobra um alto preço de nossa caravana. As constantes nevascas e as temperaturas extremamente baixas nos obrigaram a montar acampamento. Dou uma olhada em [frostbite_victim.Custom('ES_AlAla')] [frostbite_victim.GetTitledFirstName|l], pois já sofreu queimaduras pelo frio antes e agora jaz em uma cama improvisada.\n\n\"Não me sinto muito bem, meu [frostbite_victim.Custom2('RelationToMeShort', ROOT.Char)|l]\". Como eu esperava, o frio voltou a atacar [frostbite_victim.Custom('GetFrostbittenBodyPart')] [frostbite_victim.Custom('ES_DelDela')] pobre [frostbite_victim.GetNameNoTooltip]!"
 travel_danger_events.1011.desc_frostbite_thrice: "O inverno nos surpreende novamente com seu tratamento severo. As estradas estão cheias de vento e escorregadias, e a visibilidade é tão baixa quanto nossa moral. Tenho que verificar [frostbite_victim.Custom('ES_AlAla')] [frostbite_victim.GetTitledFirstName|l] pois já sofreu de congelamento duas vezes.\n\n“Está tão frio, [frostbite_victim.Custom2('RelationToMeShort', ROOT.Char)|l] meu[ROOT.Char.Custom('ES_OA')]”, sussurra para mim, enquanto desmaia; o frio atingiu a [frostbite_victim.Custom('ES_AlAla')] pobre [frostbite_victim.GetNameNoTooltip] pela terceira vez e finalmente está lhe arrancando o último suspiro."
 travel_danger_events.1011.desc_head: "$travel_danger_events.1011.desc$ Olho mais de perto o [frostbite_victim.Custom('GetFrostbittenBodyPart')], a ponta está coberta de gelo e um pouco inchada. Acho que isso pode piorar se eu não fizer nada!"
 travel_danger_events.1011.desc_upper_limb: "$travel_danger_events.1011.desc$ [frostbite_victim.GetNameNoTooltip] tenta cerrar o punho, mas a dor é forte demais. Se inchou [frostbite_victim.Custom('GetFrostbittenBodyPart')] e a cor varia em tons de azul e preto."
 travel_danger_events.1011.desc_lower_limb: "$travel_danger_events.1011.desc$ Ordeno que tire sua bota para dar uma olhada em [frostbite_victim.Custom('GetFrostbittenBodyPart')]. Está totalmente azul-escuro já e, neste ponto, talvez seja tarde demais para salvá-lo."
 travel_danger_events.1011.desc_head_twice: "$travel_danger_events.1011.desc_frostbite_twice$ Desta vez examino [frostbite_victim.Custom('GetFrostbittenBodyPart')] e comparo com a orelha. Noto uma tonalidade mais clara de azul, embora possa ser porque a congelamento em [frostbite_victim.Custom('GetFrostbittenBodyPart')] ainda está fresco."
 travel_danger_events.1011.desc_upper_limb_twice: "$travel_danger_events.1011.desc_frostbite_twice$ A antiga congelamento do dedo piorou ainda mais e agora se propagou para todo o [frostbite_victim.Custom('GetFrostbittenBodyPart')]! a este passo ele perderá o braço inteiro!"
 travel_danger_events.1011.desc_lower_limb_twice: "$travel_danger_events.1011.desc_frostbite_twice$ Agarro a bota de [frostbite_victim.GetNameNoTooltip] para ajudá-lo a tirá-la. Lutamos por um tempo, mas eventualmente conseguimos revelar a parte do corpo inchada de [frostbite_victim.Custom('GetFrostbittenBodyPart')]. Logo ele vai perder a perna inteira!"
 travel_danger_events.1011.desc_head_thrice: "$travel_danger_events.1011.desc_frostbite_thrice$ a congelação se espalhou para a [frostbite_victim.Custom('GetFrostbittenBodyPart')] que ainda estava bem e agora todo o rosto está de um azul escuro e frio como gelo. Como isso é sequer possível?"
 travel_danger_events.1011.desc_upper_limb_thrice: "$travel_danger_events.1011.desc_frostbite_thrice$ [frostbite_victim.Custom('GetFrostbittenBodyPart')|U] que já foi perdida facilita que a congelamento se espalhe pela parte superior do corpo. O peito e o pescoço dela estão escurecendo a cada minuto."
 travel_danger_events.1011.desc_lower_limb_thrice: "$travel_danger_events.1011.desc_frostbite_thrice$ Depois de perder a [frostbite_victim.Custom('GetFrostbittenBodyPart')] dos congelamentos anteriores, o frio foi direto para o abdômen e todo o corpo está lentamente ficando azul."
 travel_danger_events.1011.a: "Vamos queimar a [to_be_burned.GetNameNoTooltip] para aquecer [frostbite_victim.GetHerHim]."
 travel_danger_events.1011.a.success: "[frostbite_victim.GetTitledFirstNameNoTooltip] se sente mais quente"
 travel_danger_events.1011.a.failure: "$travel_danger_events.1011.c.tt$"
 travel_danger_events.1011.a_frostbite_treatment_burn_failure: "Talvez, queimar o [to_be_burned.GetNameNoTooltip] ajude desta vez?"
 travel_danger_events.1011.b_physician: "Certamente [court_physician.Custom('ES_ElLa')] [court_physician.GetTitledFirstNameNoTooltip|l] sabe como tratá-la!"
 travel_danger_events.1011.b_physician_success: "$travel_danger_events.1011.b.success$"
 travel_danger_events.1011.b_physician_failure: "$travel_danger_events.1011.a.failure$"
 travel_danger_events.1011.b: "Li sobre um tratamento em um manuscrito uma vez."
 travel_danger_events.1011.b.success: "O tratamento do congelamento é bem-sucedido"
 travel_danger_events.1011.b.failure: "O tratamento do congelamento falha"
 travel_danger_events.1011.b_root_knows_winter: "Sou meio que um especialista em[GetPlayer.Custom('ES_OA')] invernos."
 travel_danger_events.1011.b_frostbite_treatment_root_failure: "Talvez eu tenha estragado da primeira vez, mas agora sei melhor!"
 travel_danger_events.1011.b_physician_knows_winter: "[court_physician.GetNameNoTooltip] conhece o inverno melhor do que qualquer um de nós!"
 travel_danger_events.1011.b_frostbite_treatment_physician_failure: "Talvez [court_physician.GetNameNoTooltip] possa fazer um trabalho melhor desta vez?"
 travel_danger_events.1011.c: "Devemos continuar nos movendo."
 travel_danger_events.1011.c.tt: "A congeladura de [frostbite_victim.Custom('ES_DelDela')] [frostbite_victim.GetTitledFirstNameNoTooltip|l] permanece inalterada"
 travel_danger_events.1011.c.tt_mild: "[frostbite_victim.GetShortUIName] mantém o [GetModifier('travel_mild_frostbite_modifier').GetNameWithTooltip|l]"
 travel_danger_events.1011.c.tt_severe: "[frostbite_victim.Custom('ES_ElLa')|U] [frostbite_victim.GetTitledFirstNameNoTooltip|l] mantém o [GetModifier('travel_severe_frostbite_modifier').GetNameWithTooltip|l]"
 travel_danger_events.1011.c.success: "[frostbite_victim.Custom('ES_ElLa')|U] [frostbite_victim.GetTitledFirstNameNoTooltip|l] suporta"
 travel_danger_events.1011.c.failure: "A queimadura por frio [frostbite_victim.Custom('ES_DelDela')] [frostbite_victim.GetTitledFirstNameNoTooltip|l] piora"
 travel_danger_events.1011.c_frostbite_treatment_none_success: "Já suportou isso uma vez, aguentará de novo!"
 travel_danger_events.1011.c_frostbite_treatment_none_failure: "Desta vez ficará bem, precisamos ir agora!"
 travel_danger_events.1012.t: "$travel_danger_prefix$ Fruto Tentador"
 travel_danger_events.1012.desc: "Nossa jornada nos leva por partes traiçoeiras de [ROOT.Char.GetCurrentLocation.GetName]. Enquanto procuro por perigos à frente, um arbusto agitado chama minha atenção, poderia ser um animal selvagem? Enquanto me preparo para o impacto, [poisonous_plant_eater.GetFirstName] sai do arbusto, segurando uma planta.\n\n\"Você me assustou, [poisonous_plant_eater.GetFirstNameNoTooltip]! De qualquer forma, deixe-me ver o que você tem aqui, algum tipo de fruta?"
 travel_danger_events.1012.desc_food_taster: "$travel_danger_events.1012.desc$ Devemos perguntar a [food_taster.GetFirstName] sobre isso.\"\n\n\"Devo dizer, é uma iguaria peculiar e nada sugere perigo imediato, no entanto...\" \"Então é seguro comer!\" [poisonous_plant_eater.GetFirstNameNoTooltip] interrompe rapidamente."
 travel_danger_events.1012.desc_unknown: "$travel_danger_events.1012.desc$", exclamo.\n\n"Sim! Parece e cheira #EMP deliciosamente#!, eu me pergunto qual será o gosto! Talvez eu dê só uma mordidinha", diz [poisonous_plant_eater.GetFirstNameNoTooltip]."
 travel_danger_events.1012.desc_again: "Mais uma vez, o caminho à nossa frente é perigoso, então, por segurança, temos de parar para passar a noite. Enquanto os outros montam o acampamento, flagro [poisonous_plant_eater.GetFirstName] colhendo outra fruta desconhecida.\n\n“Admiro sua curiosidade, [poisonous_plant_eater.GetFirstNameNoTooltip]”.\n\nSorrio, mas [poisonous_plant_eater.GetSheHe] me lança um olhar malicioso e então exclama:\n\n“Desculpe, [poisonous_plant_eater.Custom2('RelationToMe', ROOT.Char)|l] meu[ROOT.Char.Custom('ES_OA')], não consigo me conter!”, enquanto tenta cravar os dentes na fruta."
 travel_danger_events.1012.a: "\"Espera, e se for venenosa?!\""
 travel_danger_events.1012.a_again: "\"Pare de colocar #EMP tudo#! na sua boca!\""
 travel_danger_events.1012.a.tt: "Você pega a planta e a joga para longe"
 travel_danger_events.1012.regular_plant: "É apenas uma planta inofensiva afinal"
 travel_danger_events.1012.touched_poisonous_plant: "Uma erupção cutânea aparece onde a planta tocou"
 travel_danger_events.1012.b: "Deixe [poisonous_plant_eater.GetFirstNameNoTooltip] comer."
 travel_danger_events.1012.ate_poisonous_plant: "Causa uma dor de estômago dolorosa"
 travel_danger_events.1012.ate_delicious_plant: "Reaviva o corpo e a mente"
 travel_danger_events.1012.c: "\"Somente se eu puder experimentar primeiro!\""
 travel_danger_events.1012.c.tt: "Você pega a fruta e a come"
 travel_danger_events.1013.t: "$travel_danger_prefix$ Fuga ou desaparecimento?"
 travel_danger_events.1013.desc: "Ao conseguirmos atravessar um caminho perigoso em [ROOT.Char.GetCurrentLocation.GetName], de repente sou tomado por uma estranha sensação de que falta alguém. Não me lembro de ter visto [runaway_character.GetFirstName] o dia todo.\n\n"
 travel_danger_events.1013.desc_rival: "$travel_danger_events.1013.desc$ Não que eu esteja reclamando, não ter que ver o rosto do meu rival conta como um bom dia para mim. No entanto, isso pode assustar meus outros companheiros a não irem mais adiante na [ROOT.Char.GetCurrentLocation.Custom('TerrainTypeProvince')]."
 travel_danger_events.1013.desc_lover: "$travel_danger_events.1013.desc$Ao mesmo tempo, as pessoas repetem o rumor de que [runaway_character.GetSheHe] queria se reunir com [current_location_holder.Custom('ES_ElLa')] [current_location_holder.GetTitledFirstName|l]. Sei que estamos passando por suas terras, mas não entendo por que [runaway_character.GetFirstNameNoTooltip] faria isso. Aposto que está perdido em algum lugar de [ROOT.Char.GetCurrentLocation.Custom('TerrainTypeProvince')] neste exato momento!"
 travel_danger_events.1013.desc_knight: "$travel_danger_events.1013.desc$[runaway_character.GetSheHe|U] guardava a retaguarda enquanto entrávamos em uma província devastada pela guerra. Talvez essa não tenha sido a melhor ideia, conhecendo seu destemor; provavelmente já está rumo às linhas de frente! A menos que... esteja apenas perdid[runaway_character.Custom('ES_OA')] por aqui?"
 travel_danger_events.1013.desc_child: "$travel_danger_events.1013.desc$É preocupante, ele é apenas um[runaway_character.Custom('ES_XA')] [runaway_character.Custom('GirlBoy')]! E se ele tiver se perdido em algum lugar de [ROOT.Char.GetCurrentLocation.Custom('TerrainTypeProvince')]? Com certeza está sol[runaway_character.Custom('ES_OA')] e, mais importante, faminto[runaway_character.Custom('ES_OA')]!"
 travel_danger_events.1013.a: "Vamos montar uma equipe de busca por [runaway_character.GetSheHe]."
 travel_danger_events.1013.success: "O grupo de busca encontra [runaway_character.GetFirstNameNoTooltip]"
 travel_danger_events.1013.success_root: "Você encontra [runaway_character.GetFirstNameNoTooltip]"
 travel_danger_events.1013.failure: "[runaway_character.GetFirstNameNoTooltip] não pode ser encontrado"
 travel_danger_events.1013.failure_root: "Você vagueia pela [ROOT.Char.GetCurrentLocation.Custom('TerrainTypeProvince')] sem rumo"
 travel_danger_events.1013.runaway_joins: "[runaway_character.GetFirstNameNoTooltip] junta-se à sua corte"
 travel_danger_events.1013.runaway_return: "Regressa ao [entourage|lE]"
 travel_danger_events.1013.b: "Eu vou encontrar [runaway_character.GetHerHim] pessoalmente!"
 travel_danger_events.1013.c: "Não quero arriscar que mais pessoas se percam."
 delayed_toast: "Você está atrasado"
 travel_hired_foreign_guide: "Guia Estrangeiro Contratado"
 travel_danger_events.1020.t: "[ROOT.Char.GetCurrentLocation.Custom('TerrainTypeProvince')|U] de"
 #Horse gets startled, I fall off
 #Hearing the horse whinnying, I rush off
 #Horse is stuck, about to die
 #Whatever will I do, oh my, oh my?
 travel_danger_events.1020.t.wetlands: "aflição"
 travel_danger_events.1020.t.floodplains: "Medo"
 travel_danger_events.1020.t.jungle: "Perigo"
 travel_danger_events.1020.t.taiga: "terror"
 travel_danger_events.1020.desc.intro: "Levamos dias vagando para chegar ao nosso destino, a comitiva está cansada e também minha poderosa montaria, [ROOT.Char.Custom('WarhorseStoryName')]. Quando estou prestes a desmontar, algo assusta minha [ROOT.Char.Custom('HorseStoryMareStallion')] e ela dispara em uma direção aleatória. Tento me agarrar à sela como se minha vida dependesse disso antes de ser jogad[ROOT.Char.Custom('ES_OA')] ao chão com um baque forte.\n\nEnquanto me levanto lentamente da queda, [ROOT.Char.Custom('WarhorseStoryName')] começa a relinchar ao longe, e toda a minha comitiva vem logo atrás para descobrir o que está acontecendo.\n\nMeu corcel luta pela sua vida,#!"
 travel_danger_events.1020.wetlands: "o pântano está devorando [ROOT.Char.Custom('HorseStoryHerHim')] pouco a pouco."
 travel_danger_events.1020.floodplains: "a corrente [ROOT.Char.Custom('HorseStoryHerHim')] o capturou e ele não consegue se soltar."
 travel_danger_events.1020.jungle: "a areia escorrendo por seus flancos, lenta mas constantemente, e [ROOT.Char.Custom('HorseStoryHerHim')] arrasta para um poço de areia."
 travel_danger_events.1020.taiga: "tentando encontrar uma saída de um sumidouro — um esforço inútil."
 travel_danger_events.1020.a: ""Lute contra ela, [ROOT.Char.Custom('WarhorseStoryName')]!""
 travel_danger_events.1020.a.success: "Você salva [ROOT.Char.Custom('WarhorseStoryName')]"
 travel_danger_events.1020.a.failure: "Seu cavalo é arrastado para baixo"
 travel_danger_events.1020.b: ""Não fiquem aí parados, façam #EMP algo!#!""
 travel_danger_events.1020.b.success: "[horse_helper.GetFirstNameNoTooltip] salva a [ROOT.Char.Custom('WarhorseStoryName')]"
 travel_danger_events.1020.b.failure: "Tanto [horse_helper.GetFirstNameNoTooltip] como [ROOT.Char.Custom('WarhorseStoryName')] são arrastados para baixo"
 travel_danger_events.1020.c: "Não há nada que possamos fazer…"
