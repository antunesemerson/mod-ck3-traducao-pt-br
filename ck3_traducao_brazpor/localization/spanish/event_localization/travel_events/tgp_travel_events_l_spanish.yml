l_spanish:
 tgp_travel_events.0025.t: "A família em primeiro lugar"
 tgp_travel_events.0025.desc: "Meu [ROOT.Char.GetTitleAsNameNoTooltip|l], desejo ver as paisagens! Não me deixais ir na frente em minha carruagem“ Minha visão fica terrivelmente obstruída atrás da vossa”, pede-me [spouse.Custom('ES_ElLa')] [spouse.GetTitledFirstName|l] durante uma parada em [ROOT.Char.GetCurrentLocation.GetName]. [spouse.GetFirstNameNoTooltip] contém um bocejo com a mão e me olha com ar sonolent[spouse.Custom('ES_OA')]. \n\nAntes que eu tenha a chance de responder, [crusty_person.Custom('ES_ElLa')] [crusty_person.GetTitledFirstName|l] se intromete com um sorriso adocicado. Certamente, não devemos esquecer a ordem que um[spouse.Custom('ES_XA')] bom[spouse.Custom('ES_XA')] cônjuge deve seguir. O decoro exige que vosso[spouse.Custom('ES_OA')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('spouse'))] permaneça em seu lugar designado."
 tgp_travel_events.0025.a: "Como [spouse.Custom('ES_ElLa')] [spouse.GetTitleAsNameNoTooltip|l] desejar."
 tgp_travel_events.0025.a.tt: "Sua relação com [spouse.Custom('ES_ElLa')] [spouse.GetTitledFirstName|l] ganha fertilidade aumentada."
 soulmate_travel_bond: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'congeniasteis', 'congeniaron')] durante uma viagem [Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'juntas', 'juntos')]. O lar estava quente naquela noite."
 lover_travel_bond: "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'congeniasteis', 'congeniaron')] durante uma viagem [Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'juntas', 'juntos')]. A lareira esteve aquecida naquela noite."
 tgp_travel_events.0025.b: "Tenta [crusty_person.Custom('ES_ElLa')] [crusty_person.GetTitledFirstName|l] semejar a discórdia entre [Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'nosotras', 'nosotros')]?"
 tgp_travel_events.0025.b.flavor: "Devo vigiar[crusty_person.GetHerHim] atentamente."
 tgp_travel_events.0025.b.success: "Você descobre o que [crusty_person.Custom('ES_ElLa')] [crusty_person.GetTitledFirstName|l] esconde"
 tgp_travel_events.0025.b.failure: "Você não consegue descobrir o que está escondido [crusty_person.Custom('ES_ElLa')] [crusty_person.GetTitledFirstName|l]"
 tgp_travel_events.0025.c: "Amor, você pode ir atrás."
 tgp_travel_events.0025.d: "Silêncio, pessoal!"
 tgp_travel_events.0030.t: "Poesia à beira da estrada"
 tgp_travel_events.0030.desc: "Ao chegar a um entroncamento, encontro vários poemas pregados nas placas de divisa. \n\nParece que foram escritos por outros viajantes; alguns mencionam lugares tão distantes quanto [poem_province.GetName] e [poem_province.Custom('TerrainInspirationLoc')].\n\nUm poema em particular chama minha atenção. Ele detalha"
 tgp_travel_events.0030.desc.wanderer_poem: "as muitas jornadas que o poeta percorreu em sua vida, e a riqueza que o ar livre dá à alma."
 tgp_travel_events.0030.desc.diplomacy_poem: "a terrível disputa entre duas famílias nobres, dilaceradas por uma disputa de herança."
 tgp_travel_events.0030.desc.martial_poem: "as muitas guerras travadas pelo poeta, um guerreiro que manejou magistralmente a espada e a pena."
 tgp_travel_events.0030.desc.stewardship_poem: "as muitas tribulações de um nobre que sofreu com secas e fomes."
 tgp_travel_events.0030.desc.intrigue_poem: "o intenso caso de amor entre dois filhos de famílias em guerra."
 tgp_travel_events.0030.desc.learning_poem: "uma descrição particularmente impressionante da paisagem rural. Claramente escrita por um poeta magistral."
 tgp_travel_events.0030.desc.fallback: "$tgp_travel_events.0030.desc.wanderer_poem$"
 tgp_travel_events.0030.a: "Tentar extrair insights de um poema."
 tgp_travel_events.0030.a.success: "Você interpreta o poema com sucesso"
 tgp_travel_events.0030.a.failure: "Você falha em interpretar o poema"
 tgp_travel_events.0030.b: "Que pitoresco!"
 tgp_travel_events.0035.t: "A raiz é fraca"
 tgp_travel_events.0035.desc: "Lutando [ROOT.Char.Custom('TerrainStruggleLoc')], vejo "
 tgp_travel_events.0035.desc.farmlands: "as colinas onduladas de [farming_county.GetProvince.GetName] se abrem à minha frente."
 tgp_travel_events.0035.desc.ricefields: "os terraços de arroz de [farming_county.GetProvince.GetName] se estendem diante de mim."
 tgp_travel_events.0035.desc.outro: "\n\nUm[farmer.Custom('ES_XA')] agricultor[farmer.Custom('ES_OA')] está à beira da estrada, curvado sobre a roda que caiu de seu carroça. Ele vê a mim e ao meu enviado, e sua expressão se transforma na de um[farmer.Custom('ES_XA')] [farmer.GetMotherFather] sever[farmer.Custom('ES_OA')].\" Vocês convocaram meu filho para lutar na sua guerra. Se ele estivesse aqui, eu não teria de me matar de trabalhar assim\". \n\nAo olhar para os campos, percebo o quão espalhados os agricultores estão. Devem compartilhar um destino semelhante."
 tgp_travel_events.0035.a: "Parar para ajudar[farmer_char.GetHerHim]."
 tgp_travel_events.0035.b: "Preciso melhorar as condições dos meus camponeses."
 tgp_travel_events.0035.c: "Não tenho tempo!"
 tgp_travel_events.0040.t: "Os pelos de um boi"
 tgp_travel_events.0040.desc: "A monotonia da minha jornada é agravada pelo zumbido das cigarras entre as ervas daninhas. Mas, ao contornar"
 tgp_travel_events.0040.desc.farmlands: "um muro de pedra, pego um fazendeiro brincando de luta com uma criança no campo próximo, ao lado de um boi especialmente grande."
 tgp_travel_events.0040.desc.ricefields: "numa curva nos arrozais, flagro um fazendeiro brincando de lutinha com uma criança na água, ao lado de um boi particularmente grande."
 tgp_travel_events.0040.desc.outro: "\n\n«Meu [ROOT.Char.GetTitleAsNameNoTooltip|l]!», grita o fazendeiro para mim. «Este boi é meu. Foi roubado dos meus estábulos na noite passada! Deve ter sido o inútil [parent.Custom('ES_DelDela')] de seu [parent.GetMotherFather], [Select_CString(parent.IsFemale, 'una borracha y una ladrona', 'un borracho y un ladrón' )] e est[farmer_child.Custom('ES_EA')] [farmer_child.Custom('GirlBoy')] sempre encobre seus crimes.» \n\nOlho para a criança.[farmer_child.Custom('AlAla')] [farmer_child.Custom('GirlBoy')], que empalidece visivelmente e treme dos pés à cabeça."
 tgp_travel_events.0040.a: "Executar o(a) seu(sua) [parent.GetMotherFather] para servir de exemplo."
 tgp_travel_events.0040.b: "[farmer_child.Custom('ES_ElLa')|U] [farmer_child.Custom('GirlBoy')] pode quitar a dívida na corte."
 tgp_travel_events.0040.c: "Deixe passar."
 tgp_travel_events.0041.t: "Uma dívida paga"
 tgp_travel_events.0041.desc: "Com a mudança das estações, a estadia de [farmer_child.Custom('ES_DelDela')] [farmer_child.GetTitledFirstName|l] chega ao fim. \n\nPrimeiro, serviu como escudeiro de estábulo forte e confiável, [farmer_child.Custom('ES_OA')] de estábulo forte e confiável,"
 tgp_travel_events.0041.desc.court_position: "então ascendeu ao cargo de [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('farmer_child'))]. Seu trabalho árduo ampliou sua educação e [farmer_child.GetHerHim] o transformou em um[farmer_child.Custom('ES_XA')] [farmer_child.GetWomanMan] formidável!"
 tgp_travel_events.0041.desc.knight: "então passou a ser [Select_CString(farmer_child.IsFemale, 'guerrera', 'caballero' )] do meu exército."
 tgp_travel_events.0041.desc.stables: "e trabalhou de perto com os cavalos ao longo dos anos, criando muitos corcéis magníficos."
 tgp_travel_events.0041.desc.kitchens: "depois passou a trabalhar com os chefs nas cozinhas, esfregando panelas e descascando incontáveis legumes."
 tgp_travel_events.0041.desc.study: "então passou a trabalhar sob as ordens dos eruditos da corte, carregando cartuchos de tinta e mantendo os arquivos."
 tgp_travel_events.0041.desc.fallback: "$tgp_travel_events.0041.desc.study$"
 tgp_travel_events.0041.desc.alive: "Está claro que ele aprendeu muitas coisas durante sua estadia. \n\nAgora é hora de libertar[farmer_child.GetHerHim] de volta com [Select_CString(parent.IsFemale, 'la borracha', 'el borracho' )] de seu [parent.GetMotherFather] e os campos de [thieving_county.GetProvince.GetName]."
 tgp_travel_events.0041.desc.dead: "\n\n[Select_CString(parent.IsFemale, 'La borracha', 'El borracho' )] de seu [parent.GetMotherFather] morreu e é seu dever voltar e cuidar das terras da família."
 tgp_travel_events.0041.a: "Seguro que le irá bien de vuelta en su hogar."
 tgp_travel_events.0041.tt_pay_first: "#weak... mas devo prestar homenagem à família como compensação.#!"
 tgp_travel_events.0041.c: "[farmer_child.Custom('ES_ElLa')|U] [farmer_child.GetTitledFirstName|l] deveria continuar como meu Mestre dos Cavalos[farmer_child.Custom('ES_XA')]."
 tgp_travel_events.0041.d: "[farmer_child.Custom('ES_ElLa')|U] [farmer_child.GetTitledFirstName|l] deveria continuar como meu copeir[farmer_child.Custom('ES_OA')]."
 tgp_travel_events.0041.e: "[farmer_child.Custom('ES_ElLa')|U] [farmer_child.GetTitledFirstName|l] deveria continuar como [Select_CString(farmer_child.IsFemale, 'poetisa', 'poeta' )] da minha corte."
 tgp_travel_events.0041.f: "[farmer_child.Custom('ES_ElLa')|U] [farmer_child.GetTitledFirstName|l] deve permanecer na corte como tutor[farmer.Custom('ES_XA')]."
 tgp_travel_events.0041.g: "¡[farmer.Custom('ES_ElLa')|U] [farmer_child.GetTitledFirstName|l] continuará a meu serviço!"
 tgp_travel_events.0041.g.tt: "[farmer.Custom('ES_ElLa')|U] [farmer_child.GetTitledFirstName|l] continuará a seu serviço como seu [THIS.Char.Custom2('RelationToMeShort', SCOPE.sC('farmer_child'))]."
 tgp_travel_events.0045.t: "Métodos agrícolas pouco desenvolvidos"
 tgp_travel_events.0045.desc: "Do alto de uma colina com vista para os campos de [foreign_county.GetName], percebo os camponeses labutando a terra e se acabando de tanto esforço ao plantar as sementes à mão. \n\nPelo tempo que me lembro, lá em casa sempre usamos máquinas semeadoras. Parece que esses ocidentais ainda não fizeram essa descoberta."
 tgp_travel_events.0045.a: "Talvez eu possa arranjar uma troca com o governante deles."
 tgp_travel_events.0045.b: "Posso tentar lhes ensinar nossos costumes."
 tgp_travel_events.0045.b.flavor: "Espero que gestos com as mãos e desenhos superem a barreira do idioma."
 tgp_travel_events.0045.b.success: "Eu mostro a superioridade de uma cultura confuciana educada e inovadora."
 tgp_travel_events.0045.b.failure: "A troca provoca certa fascinação, mas não consigo fazer meu ponto ser compreendido"
 cultural_acceptance_taught_methods: "A [cultural_acceptance|lE] entre [foreign_county.GetCulture.GetCollectiveNoun] e [foreign_county.GetCulture.GetCollectiveNoun] aumenta em [minor_cultural_acceptance_gain]."
 tgp_travel_events.0045.c: "Isso não é da minha conta."
