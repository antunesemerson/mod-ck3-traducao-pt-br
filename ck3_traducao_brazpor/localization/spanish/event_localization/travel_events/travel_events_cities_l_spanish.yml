 #Generic:
 travel_city_companion_impressed: "\n\nM [ROOT.Char.Custom2('RelationToMe', sightseeing_companion)] murmura para mim enquanto aprecia este espetáculo acadêmico: “Eu realmente poderia passar uma vida inteira aqui, [ROOT.Char.Custom2('RelationToMeAddress', sightseeing_companion)]”\n"
 travel_city_companion_idea: "\n\nMeu [ROOT.Char.Custom2('RelationToMe', sightseeing_companion)] [sightseeing_companion.GetName] reflete pensativamente[sightseeing_companion.Custom('ES_OA')] "[ROOT.Char.Custom2('RelationToMeAddress', sightseeing_companion)|U], poderíamos passar um tempo aqui estudando seus costumes"."
